body:
  text: 舊唐書卷六十九列傳第十九侯君集張亮薛萬徹兄萬均盛彥師盧祖尚劉世讓劉蘭李君羡等附侯君集豳州三水人也性矯飾好矜誇玩弓矢而不能成其藝乃以武勇自稱太宗在藩引入幕府數從征伐纍除左虞候車騎將軍封全椒縣子漸蒙恩遇參預謀議建成元吉之誅也君集之策居多太宗即位遷左衛將軍以功進封潞國公賜邑千戶尋拜右衛大將軍貞觀四年遷兵部尚書參議朝政時將討吐谷渾伏允命李靖為西海道行軍大總管以君集及任城王道宗並為之副九年三月師次鄯州君集言於靖曰大軍已至賊虜尚未走險宜簡精鋭長驅疾進彼不我虞必有大利若此策不行潛遁必遠山障為阻討之實難靖然其計乃簡精鋭輕齎深入道宗追及伏允之衆於庫山破之伏允輕兵入磧以避官軍靖乃中分士馬為兩道並入靖與薛萬均李大亮趣北路使侯君集道宗趣南路歷破邏真谷踰漢哭山經途二千餘里行空虛之地盛夏降霜山多積雪轉戰過星宿川至於柏海頻與虜遇皆大克獲北望積石山觀河源之所出焉乃旋師與李靖會於大非川平吐谷渾而還十一年與長孫無忌等俱受世封授君集陳州刺史改封陳國公明年拜吏部尚書進位光祿大夫君集出自行伍素無學術及被任遇方始讀書典選舉定考課出為將領入參朝政並有時譽高昌王麴文泰時遏絶西域商賈太宗徵文泰入朝而稱疾不至詔以君集為交河道行軍大總管討之文泰聞王師將起謂其國人曰唐國去此七千里沙磧闊二千里地無水草冬風凍寒夏風如焚風之所吹行人多死常行百人不能得至安能致大軍乎若頓兵於吾城下二十日食必盡自然魚潰乃接而虜之何足憂也及軍至磧口而文泰卒其子智盛襲位君集率兵至柳谷候騎言文泰剋日將葬國人咸集諸將請襲之君集曰不可天子以高昌驕慢無禮使吾恭行天罰今襲人於墟墓之間非問罪之師也於是鼓行而前攻其田地賊嬰城自守君集諭之不行先是大軍之發也上召山東善為攻城器械者悉遣從軍君集遂刊木填隍推撞車撞其睥睨數丈頽穴拋車石擊其城中其所當者無不糜碎或張氈被用障拋石城上守陴者不復得立遂拔之虜其男女七千餘口仍進兵圍其都城智盛窮蹙致書於君集曰有罪於天子者先王也天罰所加身已喪背智盛襲位未幾不知所以愆闕冀尚書哀憐君集報曰若能悔禍宜束手軍門智盛猶不出因命士卒填其隍塹發拋車以攻之又為十丈高樓俯視城內有行人及飛石所中處皆唱言之人多入室避石初文泰與西突厥欲谷設約有兵至共為表𩹉及聞君集至欲谷設懼而西走千餘里智盛失援計無所出遂開門出降君集分兵略地遂平其國俘智盛及其將吏刻石紀功而還君集初破高昌曾未奏請輒配沒無罪人又私取寶物將士知之亦競來盜竊君集恐發其事不敢制及京師有司請推其罪詔下獄中書侍郎岑文本以為功臣大將不可輕加屈辱上疏曰君集等或位居輔佐或職惟爪牙並蒙拔擢受將帥之任不能正身奉法以報陛下之恩舉措肆情罪負盈積實宜繩之刑典以肅朝倫但高昌昏迷人神共棄在朝議者以其地在遐荒咸欲置之度外唯陛下運獨見之明授決勝之略君集等奉行聖算遂得指期平殄若論事實並是陛下之功君集等有道路之勞未足稱其勳力而陛下天德弗宰乃推功於將帥露布初至便降大恩從征之人皆霑滌蕩及其凱旋特蒙曲宴又對萬國加之重賞內外文武咸欣陛下賞不踰時而不經旬日並付大理雖乃君集等自挂網羅而在朝之人未知所犯恐海內又疑陛下唯録其過似遺其功臣以下才謬參近職既有所見不敢默然臣聞古之人君出師命將克敵則獲重賞不克則受嚴刑是以當其有功也雖貪殘淫縱必蒙青紫之寵當其有罪也雖勤躬潔己不免鈇鉞之誅故周書曰記人之功忘人之過宜為君者也昔漢二師將軍李廣利捐五萬之師糜億萬之費經四年之勞唯獲駿馬三十匹雖斬宛王之首而貪不愛卒罪惡甚多武帝為萬里征伐不録其過遂封廣利海西侯食邑八千戶又校尉陳湯矯詔興師雖斬郅支單于而湯素貪盜所收康居財物事多不法為司隸所繫湯乃上疏曰與吏士共誅郅支幸得擒滅今司隸乃收繫案驗是為郅支報讎也元帝赦其罪封湯關內侯賜黃金百斤又晉龍驤將軍王濬有平吳之功而王渾等論濬違詔不受節度軍人得孫皓寶物並燒皓宮及船濬上表曰今年平吳誠為大慶於臣之身更為咎纍武帝赦而不推拜輔國大將軍封襄陽侯賜絹萬匹近隋新義郡公韓擒虎平陳之日縱士卒暴亂叔寶宮內文帝亦不問罪雖不進爵拜擒虎上柱國賜物八千段由斯觀之將帥之臣廉慎者寡貪求者衆是以黃石公軍勢曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者邀趨其利愚者不計其死是知前聖莫不收人之長棄人之短良為此也臣又聞夫天地之道以覆載為先帝王之德以含弘為美夫以區區漢武及歷代諸帝猶能宥廣利等況陛下天縱神武振宏圖以定六合豈獨正茲刑網不行古人之事哉伏惟聖懷當自已有斟酌臣今所以陳聞非敢私君集等庶以螢爝末光增暉日月倘陛下降雨露之澤收雷電之威録其微勞忘其大過使君集重升朝列復預驅馳雖非清貞之臣猶是貪愚之將斯則陛下聖德雖屈法而德彌顯君集等愆過雖蒙宥而過更彰足使立功之士因茲而皆勸負罪之將由斯而改節矣疏奏乃釋君集自以有功於西域而以貪冒被囚志殊怏怏十七年張亮以太子詹事出為洛州都督君集激怒亮曰何為見排亮曰是公見排更欲誰冤君集曰我平一國來逢屋許大嗔何能仰排因攘袂曰鬱鬱不可活公能反乎當與公反耳亮密以聞太宗謂亮曰卿與君集俱是功臣君集獨以語卿無人聞見若以屬吏君集必言無此兩人相證事未可知遂寢其事待君集如初尋與諸功臣同畫像於凌煙閣時庶人承乾在東宮恐有廢立又知君集怨望遂與通謀君集子壻賀蘭楚石時為東宮千牛承乾令數引君集入內問以自安之術君集以承乾劣弱意欲乘釁以圖之遂贊承乾陰圖不軌嘗舉手謂承乾曰此好手當為用之君集或慮謀泄心不自安每中夜蹶然而起歎吒久之其妻怪而謂之曰公國之大臣何為乃爾必當有故若有不善之事孤負國家宜自歸罪首領可全君集不能用及承乾事發君集被收楚石又詣闕告其事太宗親臨問曰我不欲令刀筆吏辱公故自鞫驗耳君集辭窮太宗謂百僚曰往者家國未安君集實展其力不忍置之於法我將乞其性命公卿其許我乎羣臣爭進曰君集之罪天地所不容請誅之以明大法太宗謂君集曰與公長訣矣而今而後但見公遺像耳因歔欷下泣遂斬於四達之衢籍沒其家君集臨刑容色不改謂監刑將軍曰君集豈反者乎蹉跌至此然嘗為將破滅二國頗有微功為言於陛下乞令一子以守祭祀由是特原其妻及一子徙於嶺南張亮鄭州滎陽人也素寒賤以農為業倜儻有大節外敦厚而內懷詭詐人莫之知大業末李密略地滎汴亮杖策從之未被任用屬軍中有謀反者亮告之密以為至誠署驃騎將軍隸於徐績及績以黎陽歸國亮頗贊成其事乃授鄭州刺史會王世充陷鄭州亮不得之官孤軍無援遂亡命於共城山澤後房玄齡李績以亮倜儻有智謀薦之於太宗引為秦府車騎將軍漸蒙顧遇委以心膂會建成元吉將起難太宗以洛州形勝之地一朝有變將出保之遣亮之洛陽統左右王保等千餘人陰引山東豪傑以俟變多出金帛恣其所用元吉告亮欲圖不軌坐是屬吏亮卒無所言事釋遣還洛陽及建成死授懷州總管封長平郡公貞觀五年歷遷御史大夫轉光祿卿進封鄅國公賜實封五百戶後歷豳夏鄜三州都督七年魏王泰為相州都督而不之部進亮金紫光祿大夫行相州大都督長史十一年改封鄖國公亮所蒞之職潛遣左右伺察善惡發擲姦隱動若有神抑豪強而恤貧弱故所在見稱初亮之在州也棄其本妻更娶李氏李素有淫行驕妬特甚亮寵憚之後至相州有鄴縣小兒以賣筆為業善歌舞李見而悅之遂與私通假言亮先與其母野合所生收為亮子名曰慎幾亮前婦子慎微每以養慎幾致諫亮不從李尤好左道所至巫覡盈門又干預政事由是亮之聲稱漸損十四年入為工部尚書明年遷太子詹事出為洛州都督及侯君集誅以亮先奏其將反優詔褒美遷刑部尚書參預朝政太宗將伐高麗亮頻諫不納因自請行以亮為滄海道行軍大總管管率舟師自東萊渡海襲沙卑城破之俘男女數千口進兵頓於建安城下營壘未固士卒多樵牧賊衆奄至軍中惶駭亮素怯懦無計策但踞胡床直視而無所言將士見之翻以亮為有膽氣其副總管張金樹等乃鳴鼓令士衆擊賊破之太宗知其無將帥材而不之責有方術人程公穎者亮親信之初在相州陰召公穎謂曰相州形勝之地人言不出數年有王者起公以為何如公穎知其有異志因言亮臥似龍形必當大貴又有公孫常者頗擅文辭自言有黃白之術尤與亮善亮謂曰吾嘗聞圖讖有弓長之君當別都雖有此言實不願聞之常又言亮名應圖籙亮大悅二十年有陝人常德玄告其事並言亮有義兒五百人太宗遣法官按之公穎及常證其罪亮曰此二人畏死見誣耳又自陳佐命之舊冀有寬貸太宗謂侍臣曰亮有義兒五百畜養此輩將何為也正欲反耳命百僚議其獄多言亮當誅唯將作少匠李道裕言亮反形未具明其無罪太宗既盛怒竟斬於巿籍沒其家歲餘刑部侍郎有闕令執政者妙擇其人纍奏皆不可太宗曰朕得其人也往者李道裕議張亮云反形未具此言當矣雖不即從至今追悔遂授道裕刑部侍郎薛萬徹雍州咸陽人自燉煌徙焉隋左禦衛大將軍世雄子也世雄大業末卒於涿郡太守萬徹少與兄萬均隨父在幽州俱以武略為羅藝所親待尋與藝歸附高祖授萬均上柱國永安郡公萬徹車騎將軍武安縣公會竇建德率衆十萬來寇范陽藝逆拒之萬均謂藝曰衆寡不敵今若出鬬百戰百敗當以計取之可令羸兵弱馬阻水背城為陳以誘之觀賊之勢必渡水交兵萬均請精騎百人伏於城側待其半渡擊之破賊必矣藝從其言建德果引軍渡水萬均邀擊大破之明年建德率衆二十萬復攻幽州賊已攀堞萬均與萬徹率敢死士百人從地道而出直掩賊背擊之賊遂潰走及太宗平劉黑闥引萬均為右二護軍恩顧甚至隱太子建成又引萬徹置於左右建成被誅萬徹率宮兵戰於玄武門鼓譟欲入秦府將士大懼及梟建成首示之萬徹與數十騎亡於終南山太宗纍遣使諭意萬徹釋仗而來太宗以其忠於所事不之罪也萬均貞觀初歷遷殿中少監柴紹之擊梁師都以萬徹為副未至朔方數十里突厥四面而至官軍稍却萬均與萬徹橫出擊之斬其驍將虜陳亂因而乘之殺傷被野鼓行而進遂圍師都俄而師都見殺城降突厥不敢來援萬徹後從李靖擊突厥頡利可汗於塞北以功授統軍進爵郡公及靖將擊吐谷渾請萬徹同行及至賊境與諸將各率百餘騎先行卒與虜數千騎相遇萬徹單騎馳擊之虜無敢當者還謂諸將曰賊易與耳躍馬復進諸將隨之斬數千級人馬流血勇冠三軍又與萬均破吐谷渾天柱王於赤水源獲其雜畜二十萬計追至河源萬均此後官至左屯衛大將軍纍封潞國公而卒萬徹尋丁母憂解職俄起為右衛將軍出為蒲州刺史會薛延率回紇同羅之衆渡磧南擊李思摩萬徹副李績援之與虜相遇率數百騎為先鋒擊其陳後騎皆散賊顧見遂大潰追奔數十里斬首三千餘級獲馬萬五千匹以功別封一子為縣侯十八年授左衛將軍尚丹陽公主拜駙馬都尉尋遷右衛大將軍轉杭州刺史遷代州都督復召拜右武衛大將軍太宗從容謂從臣曰當今名將唯李績道宗萬徹三人而已李績道宗不能大勝亦不大敗萬徹非大勝即大敗太宗嘗召司徒長孫無忌等十餘人宴於丹霄殿各賜以貘皮萬徹預焉太宗意在賜萬徹而誤呼萬均因愴然曰萬均朕之勳舊不幸早亡不覺呼名豈其魂靈欲朕之賜也因令取貘皮呼萬均以同賜而焚之於前侍坐者無不感歎二十二年萬徹又為青丘道行軍大總管率甲士三萬自萊州泛海伐高麗入鴨緑水百餘里至泊汋城高麗震懼多棄城而遁泊汋城主所夫孫率步騎萬餘人拒戰萬徹遣右衛將軍裴行方領步卒為支軍繼進萬徹及諸軍乘之賊大潰追奔百餘里於陳斬所夫孫進兵圍泊汋城其城因山設險阻鴨緑水以為固攻之未拔高麗遣將高文率烏骨安地諸城兵三萬餘人來援分置兩陳萬徹分軍以當之鋒刃才接而賊大潰萬徹在軍仗氣凌物人或奏之及謁見太宗謂曰上書者論卿與諸將不協朕録功棄過不罪卿也因取書焚之尋為副將右衛將軍裴行方言其怨望於是廷驗之萬徹辭屈英國公李績進曰萬徹職乃將軍親惟主壻發言怨望罪不容誅因除名徙邊會赦得還永徽二年授寧州刺史入朝與房遺愛款昵因謂遺愛曰今雖患腳坐置京師漢輩猶不敢動遺愛謂萬徹曰公若國家有變我當與公立荊王元景為主及謀泄吏逮之萬徹不之伏遺愛證之遂伏誅臨刑大言曰薛萬徹大健兒留為國家效死力固好豈得坐房遺愛殺之乎遂解衣謂監刑者疾斫執刀者斬之不殊萬徹叱之曰何不加力三斫乃絶萬徹長兄萬淑亦有戰功貞觀初至營州都督檢校東夷校尉封梁郡公季弟萬備有孝行母終廬於墓側太宗降璽書弔慰仍旌表其門後官至左衛將軍並先萬徹卒初武德貞觀之際有盛彥師盧祖尚劉世讓劉蘭李君羡等並有功名而不終其位盛彥師者宋州虞城人大業中為澄城長義師至汾陰率賓客千餘人濟河上謁拜銀青光祿大夫行軍總管從平京城俄與史萬寶鎮宜陽以拒東寇及李密之叛將出山南史萬寶懼密威名不敢拒謂彥師曰李密驍賊也又輔以王伯當決策而叛其下兵士思欲東歸若非計出萬全則不為也兵在死地殆不可當彥師笑曰請以數千之衆邀之必梟其首萬寶曰計將安出對曰軍法尚詐不可為公説之便領衆踰熊耳山南傍道而止令弓弩者夾路乘高刀楯者伏於溪谷令曰待賊半渡一時齊發弓弩據高縱射刀楯即亂出薄之或問之曰聞李密欲向洛州而公入山何也彥師曰密聲言往洛實走襄城就張善相耳必當出人不意若賊入谷口我自後追之山路險隘無所展力一夫殿後必不能制今吾先得入谷擒之必矣李密既度陝州以為餘不足慮遂擁衆徐行果踰山南渡彥師擊之密衆首尾斷絶不得相救遂斬李密追擒伯當以功封葛國公拜武衛將軍仍鎮熊州太宗討王世充遣彥師與萬寶軍於伊闕絶其山南之路賊平除宋州總管初彥師之入關也王世充以其將陳寶遇為宋州刺史處其家不以禮及此彥師因事殺之平生所惡數十家亦皆殺之州中震駭重足而立會徐圓朗反彥師為安撫大使因戰遂沒於賊圓朗禮厚之令彥師作書報其弟令舉城降己彥師為書曰吾奉使無狀被賊所擒為臣不忠誓之以死汝宜善侍老母勿以吾為念圓朗初色動而彥師自若圓朗乃笑曰盛將軍乃有壯節不可殺也待之如舊賊平彥師竟以罪賜死盧祖尚者字季良光州樂安人也父禧隋虎賁郎將纍葉豪富傾財散施甚得人心大業末召募壯士逐捕羣盜時年甚少而武力過人又御衆嚴整所向有功羣盜畏憚不敢入境及宇文化及作亂州人請祖尚為刺史祖尚時年十九升壇歃血以誓其衆泣涕歔欷悲不自勝衆皆感激王世充立越王侗祖尚遣使從之侗授祖尚光州總管及世充自立遂舉州歸款高祖嘉之賜璽書勞勉拜光州刺史封弋陽郡公武德六年從趙郡王孝恭討輔公祏為前軍總管攻其宣歙二州克之進擊賊帥馮惠亮陳正通並破之賊平以功授蔣州刺史又歷壽州都督瀛州刺史並有能名貞觀初交州都督遂安公壽以貪冒得罪太宗思求良牧朝臣咸言祖尚才兼文武廉平正直徵至京師臨朝謂之曰交州大藩去京甚遠須賢牧撫之前後都督皆不稱職卿有安邊之略為我鎮之勿以道遠為辭也祖尚拜謝而出既而悔之以舊疾為辭太宗遣杜如晦諭旨祖尚固辭又遣其妻兄周範往諭之曰匹夫相許猶須存信卿面許朕豈得後方悔之宜可早行三年必自相召卿勿推拒朕不食言對曰嶺南瘴癘皆日飲酒臣不便酒去無還理太宗大怒曰我使人不從何以為天下命斬之於朝時年三十餘尋悔之使復其官蔭劉世讓字元欽雍州醴泉人也仕隋徵仕郎高祖入長安世讓以湋川歸國拜通議大夫時唐弼餘黨寇扶風世讓自請安輯許之俄得數千人復為安定道行軍總管率兵以拒薛舉戰敗世讓及弟寶俱為舉軍所獲舉將至城下令紿説城中曰大軍五道已趣長安宜開門早降世讓偽許之因告城中曰賊兵多少極於此矣宜善自固以圖安全舉重其執節竟不之害太宗時屯兵高咵世讓潛遣寶逃歸言賊中虛實高祖嘉之賜其家帛千匹及賊平得歸授彭州刺史尋領陝東道行軍總管與永安王孝基擊呂崇茂於夏縣諸軍敗績世讓與唐儉俱為賊所獲獄中聞獨孤懷恩有逆謀逃還以告高祖時高祖方濟河將幸懷恩之營聞難驚曰劉世讓之至豈非天命哉因勞之曰卿往陷薛舉遣弟潛效款誠今復冒危告難是皆憂國忘身也尋封弘農郡公賜莊一區錢百萬纍轉並州總管統兵屯於鴈門突厥處羅可汗與高開道苑君璋合衆攻之甚急鴻臚卿鄭元璹先使在蕃可汗令元璹來説之世讓厲聲曰大丈夫奈何為夷狄作説客耶經月餘虜乃退及元璹還述讓忠貞勇幹高祖下制褒美之錫以良馬未幾召拜廣州總管將之任高祖問以備邊之策世讓答曰突厥南寇徒以馬邑為其中路耳如臣所計請於崞城置一智勇之將多儲金帛有來降者厚賞賜之數出奇兵略其城下芟踐禾稼敗其生業不出歲餘彼當無食馬邑不足圖也高祖曰非公無可任者乃使馳驛往經略之突厥懼其威名乃縱反間言世讓與可汗通謀將為亂高祖不之察遂誅世讓籍沒其家貞觀初突厥來降者言世讓初無逆謀始原其妻子劉蘭字文郁青州北海人也仕隋鄱陽郡書佐頗涉經史善言成敗然性多凶狡見隋末將亂交通不逞于時北海完富蘭利其子女玉帛與羣盜相應破其本鄉城邑武德中淮安王神通為山東道安撫大使蘭率宗黨往歸之以功纍遷尚書員外郎貞觀初梁師都尚據朔方蘭上言攻取之計太宗善之命為夏州都督府司馬時梁師都以突厥之師頓於城下蘭偃旗臥鼓不與之爭鋒賊徒宵遁蘭追擊破之遂進軍夏州及師都平以功遷豐州刺史徵為右領軍將軍十一年幸洛陽以蜀王愔為夏州都督愔不之藩以蘭為長史總其府事時突厥攜離有郁射設阿史那摸末率其部落入居河南蘭縱反間以離其部落頡利果疑摸末摸末懼而頡利又遣兵追之蘭率衆逆擊敗之太宗以為能超拜豐州刺史再轉夏州都督封平原郡公貞觀末以謀反腰斬右驍衛大將軍丘行恭探其心肝而食之太宗聞而召行恭讓之曰刑典自有常科何至於此必若食逆者心肝而為忠孝則劉蘭之心為太子諸王所食豈至卿邪行恭無以答李君羡者洺州武安人也初為王世充驃騎惡世充之為人乃與其黨叛而來歸太宗引為左右從討劉武周及王世充等每戰必單騎先鋒陷陳前後賜以宮女馬牛黃金雜綵不可勝數太宗即位纍遷華州刺史封武連郡公貞觀初太白頻晝見太史占曰女主昌又有謠言當有女武王者太宗惡之時君羡為左武衛將軍在玄武門太宗因武官內宴作酒令各言小名君羡自稱小名五娘子太宗愕然因大笑曰何物女子如此勇猛又以君羡封邑及屬縣皆有武字深惡之會御史奏君羡與妖人員道信潛相謀結將為不軌遂下詔誅之天授二年其家屬詣闕稱冤則天乃追復其官爵以禮改葬史臣曰侯君集摧凶克敵效用居多恃寵矜功粗率無檢棄前功而罹後患貪愚之將明矣張亮聽公穎之妖言恃弓長之邪讖義兒斯畜惡迹遂彰雖道裕云反狀未形而詭詐之性於斯驗矣萬徹籌深行陳勇冠戎夷不能保其首領以至誅戮夫二三子非慎始而保終也贊曰君子立功守以謙沖小人得位足為身害侯張凶險望窺聖代雄若韓彭難逃葅醢
