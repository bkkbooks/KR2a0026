body:
  text: 舊唐書卷一百九列傳第五十九馮盎阿史那社爾子道真叔祖蘇尼失蘇尼失子忠附契苾何力黑齒常之李多祚李嗣業白孝德馮盎高州良德人也纍代為本部大首領盎少有武略隋開皇中為宋康令仁壽初潮成等五州獠叛盎馳至京請討之文帝敕左僕射楊素與盎論賊形勢素曰不意蠻夷中有此人大可奇也即令盎發江嶺兵擊之賊平授金紫光祿大夫仍除漢陽太守武德三年廣新二州賊帥高法澄洗寶徹等並受林士弘節度殺害隋官吏盎率兵擊破之既而寶徹兄子智臣又聚兵於新州自為渠帥盎趨往擊之兵交盎却兜鍪大呼曰爾等頗識我否賊多棄戈肉袒而拜其徒遂潰擒寶徹智臣等嶺外遂定或有說盎曰自隋季崩離海內騷動今唐雖應運而風教未浹南越一隅未有所定公克平五嶺二十餘州豈與趙他九郡相比今請上南越王之號盎曰吾居南越于茲五代本州牧伯唯我一門子女玉帛吾之有也人生富貴如我殆難常恐弗克負荷以墜先業本州衣錦便足餘復何求越王之號非所聞也四年盎以南越之衆降高祖以其地為羅春白崖儋林等八州仍授盎上柱國高羅總管封吳國公尋改封越國公拜其子智戴為春州刺史智彧東合州刺史徙封盎耿國公貞觀五年盎來朝太宗宴賜甚厚俄而羅竇諸洞獠叛詔令盎率部落二萬為諸軍先鋒時有賊數萬屯據險要不可攻逼盎持弩語左右曰盡吾此箭可知勝負連發七矢而中七人賊退走因縱兵乘之斬首千餘級太宗令智戴還慰省之自後賞賜不可勝數盎奴婢萬餘人所居地方二千里勤於簿領詰擲姦狀甚得其情二十年卒贈左騎衛大將軍荊州都督阿史那社爾突厥處羅可汗子也年十一以智勇稱於本蕃拜為拓設建牙于磧北與欲谷設分統鐵勒紇骨同羅等諸部在位十年無所課斂諸首領或鄙其不能富貴社爾曰部落既豐於我便足諸首領咸畏而愛之武德九年延回紇等諸部皆叛攻破欲谷設社爾擊之復為延所敗貞觀二年遂率其餘衆保于西偏依可汗浮圖後遇頡利滅而西蕃葉護又死奚利邲咄陸可汗兄弟爭國社爾揚言降之引兵西上因襲破西蕃半有其國得衆十餘萬自稱都布可汗謂其諸部曰首為背叛破我國者延之罪也今我據有西方大得兵馬不平延而取安樂是忘先可汗為不孝也若天令不捷死亦無恨其酋長咸諫曰今新得西方須留鎮壓若即棄去遠擊延只恐葉護子孫必來復國社爾不從親率五萬餘騎討延於磧北連兵百餘日遇我行人劉善因立同娥設為嘻利始可汗社爾部兵又苦久役多委之逃延因縱擊敗之復保高昌國其舊兵在者才萬餘人又與西蕃結隙九年率衆內屬拜左騎衛大將軍歲餘令尚衡陽長公主授駙馬都尉典屯兵於苑內十四年授行軍總管以平高昌諸人咸即受賞社爾以未奉詔旨秋毫無所取及降別敕然後受之及所取唯老弱故弊而已軍還太宗美其廉慎以高昌所得寶刀并雜綵千段賜之仍令檢校北門左屯營封畢國公十九年從太宗征遼至駐蹕陳頻遭流矢拔而又進其所部兵士人百其勇盡獲殊勳師旋兼授鴻臚卿二十一年為崑丘道行軍大總管征龜茲明年軍次西突厥擊處密大破之餘衆悉降又下龜茲大撥換城虜龜茲王白訶黎布失畢及大臣那利等百餘人而還屬太宗崩請以身殉葬高宗遣使喻以先旨不許遷右衛大將軍永徽四年加位鎮軍大將軍六年卒贈輔國大將軍并州都督陪葬昭陵起冢以象葱山仍為立碑諡曰元子道真位至左屯衛大將軍貞觀初阿史那蘇尼失者啓民可汗之母弟社爾叔祖也其父始畢可汗以為沙鉢羅設督部落五萬家牙直靈州之西北驍雄有恩惠甚得種落之心及頡利政亂而蘇尼失所部獨不攜離突利之來奔也頡利乃立蘇尼失為小可汗及頡利為李靖所破獨騎而投之蘇尼失遂舉其衆歸國因令子忠擒頡利以獻太宗賞賜優厚拜北寧州都督右衛大將軍封懷德郡王貞觀八年卒忠以擒頡利功拜左屯衛將軍妻以宗女定襄縣主賜名為忠單稱史氏貞觀九年遷右衛大將軍永徽初封薛國公纍遷右驍衛大將軍所歷皆以清謹見稱時人比之金日磾上元初卒贈鎮軍大將軍陪葬昭陵子暕襲封薛國公垂拱中歷位司僕卿契苾何力其先鐵勒別部之酋長也父葛隋大業中繼為莫賀咄特勤以地逼吐谷渾所居隘狹又多瘴癘遂入龜茲居于熱海之上特勤死何力時年九歲降號大俟利發至貞觀六年隨其母率衆千餘家詣沙州奉表內附太宗置其部落於甘涼二州何力至京授左領軍將軍七年與涼州都督李大亮將軍薛萬均同征吐谷渾軍次赤水川萬均率騎先行為賊所攻兄弟皆中槍墮馬徒步而鬬兵士死者十六七何力聞之將數百騎馳往突圍而前縱橫奮擊賊兵披靡萬均兄弟由是獲免時吐谷渾主在突淪川何力復欲襲之萬均懲其前敗固言不可何力曰賊非有城郭逐水草以為生若不襲其不虞便恐鳥驚魚散一失機會安可傾其巢穴耶乃自選驍兵千餘騎直入突淪川襲破吐谷渾牙帳斬首數千級獲駝馬牛羊二十餘萬頭渾主脫身以免俘其妻子而還有詔勞於大斗拔谷萬均乃排毀何力自稱己功何力不勝憤怒拔刀而起欲殺萬均諸將勸止之太宗聞而責問其故何力言萬均敗恧之事太宗怒將解其官回授何力固讓曰以臣之故而解萬均恐諸蕃聞之以為陛下厚蕃輕漢轉相誣告馳競必多又夷狄無知或謂漢臣皆如此輩固非安寧之術也太宗乃止尋令北門宿衛檢校屯營事敕尚臨洮縣主十四年為葱山道副大總管討平高昌時何力母姑臧夫人母弟賀蘭州都督沙門並在涼府十六年詔許何力覲省其母兼撫巡部落時薛延強盛契苾部落皆願從之何力至聞而大驚曰主上於汝有厚恩任我又重何忍而圖叛逆諸首領皆曰可敦及都督已去何故不行何力曰我弟沙門孝而能養我以身許國終不能去也於是衆共執何力至延所置於可汗牙前何力箕踞而坐拔佩刀東向大呼曰豈有大唐烈士受辱蕃庭天地日月願知我心又割左耳以明志不奪也可汗怒欲殺之為其妻所抑而止初太宗聞何力之延明非其本意或曰人心各樂其土何力今入延猶魚之得水也太宗曰不然此人心如鐵石必不背我會有使自延至具言其狀太宗泣謂羣臣曰契苾何力竟如何遽遣兵部侍郎崔敦禮持節入延許降公主求何力由是還拜右驍衛大將軍太宗既許公主於延行有日矣何力抗表固言不可太宗曰吾聞天子無戲言既已許之安可廢何力曰然臣本請延緩其事不謂總停臣聞六禮之內壻合親迎宜告延親來迎婦縱不敢至京邑即當使詣靈州畏漢必不敢來論親未可有成日既憂悶臣又攜離不盈一年自相猜忌延志性狠戾若死必兩子相爭坐而制之必然之理太宗從之延恐有詐竟不至靈州自後常悒悒不得志一年而死兩子果爭權各立為主太宗征遼東以何力為前軍總管軍次白崖城為賊所圍被矟中腰瘡重疾甚太宗自為傅藥及拔賊城敕求傷之者高突勃付何力自殺之何力奏言犬馬猶為其主況於人乎彼為其主況致命冒白刃而刺臣是其義勇士也本不相識豈是冤讎遂捨之二十二年為崑丘道總管擊龜茲獲其王訶梨布失畢及諸首領等太宗崩何力欲殺身以殉高宗諭而止之永徽二年處月處密叛以何力為弓月道大總管討平之擒其渠帥處密時健俟斤合支賀等以歸顯慶二年遷左驍衛大將軍纍封郕國公兼檢校鴻臚卿龍朔元年又為遼東道行軍大總管九月次于鴨緑水其地即高麗之險阻莫離支男生以精兵數萬守之衆莫能濟何力始至會層冰大合趣即渡兵鼓譟而進賊遂大潰追奔數十里斬首三萬級餘衆盡降男生僅以身免會有詔班師乃還其年九姓叛以何力為鐵勒道安撫大使乃簡精騎五百馳入九姓中賊大驚何力乃謂曰國家知汝被詿誤遂有翻動使我捨汝等過皆可自新罪在酋渠得之則已諸姓大喜共擒僞葉護及設特勤等同惡二百餘人以歸何力數其罪而誅之乾封元年又為遼東道行軍大總管兼安撫大使高麗有衆十五萬屯於遼水又引靺鞨數萬據南蘇城何力奮擊皆大破之斬首萬餘級乘勝而進凡拔七城乃回軍會英國公李績於鴨緑水共攻辱夷大行二城破之績頓軍於鴨緑柵何力引蕃漢兵五十萬先臨平壤績仍繼至共拔平壤城執男建虜其王還授鎮軍大將軍行左衛大將軍徙封涼國公仍檢校右羽林軍儀鳳二年卒贈輔國大將軍並州都督陪葬昭陵諡曰烈有三子明光貞明左鷹揚衛大將軍兼賀蘭都督襲爵涼國公光則天時右豹韜衛將軍為酷吏所殺貞司膳少卿黑齒常之百濟西部人長七尺餘驍勇有謀略初在本蕃仕為達率兼郡將猶中國之刺史也顯慶五年蘇定方討平百濟常之率所部隨例送降款時定方縶左王及太子隆等仍縱兵劫掠丁壯者多被戮常之恐懼遂與左右十餘人遁歸本部鳩集亡逸共保任存山築柵以自固旬日而歸附者三萬餘人定方遣兵攻之常之領敢死之士拒戰官軍敗績遂復本國二百餘城定方不能討而還龍朔三年高宗遣使招諭之常之盡率其衆降纍轉左領軍員外將軍儀鳳中吐蕃犯邊常之從李敬玄擊之劉審禮之沒賊敬玄欲抽軍却阻泥溝而計無所出常之夜率敢死之兵五百人進掩賊營吐蕃首領跋地設棄軍宵遁敬玄因此得還高宗歎其才略擢授左武衛將軍兼檢校左羽林軍賜金五百兩絹五百匹仍充河源軍副使時吐蕃贊婆及素和貴等賊徒三萬餘屯於良非川常之率精騎三千夜襲賊營殺獲二千級獲羊馬數萬贊婆等單騎而遁擢常之為大使又賞物四百匹常之以河源軍正當賊衝欲加兵鎮守恐有運轉之費遂遠置烽戍七十餘所度開營田五千餘頃歲收百餘萬石開耀中贊婆等屯於青海常之率精兵一萬騎襲破之燒其糧貯而還常之在軍七年吐蕃深畏憚之不敢復為邊患嗣聖元年遷左武衛大將軍仍檢校左羽林軍垂拱二年突厥犯邊命常之率兵拒之躡至兩井忽逢賊三千餘衆常之見賊徒爭下馬著甲遂領二百餘騎身當先鋒直衝賊遂棄甲而散俄頃賊衆大至及日將暮常之令伐木營中燃火如烽燧時東南忽有大風起賊疑有救兵相應遂狼狽夜遁以功進封燕國公三年突厥入寇朔州常之又充大總管以李多祚王九言為副追躡至黃花堆大破之追奔四十餘里賊散走磧北時有中郎將爨寶璧表請窮追餘賊制常之與寶璧會遙為聲援寶璧以為破賊在朝夕貪功先行竟不與常之謀議遂全軍而沒尋為周興等誣構云與右鷹揚將軍趙懷節等謀反繫獄遂自縊而死常之嘗有所乘馬為兵士所損副使牛師奬等請鞭之常之曰豈可以損私馬而決官兵乎竟赦之前後所得賞賜金帛等皆分給將士及死時甚惜之李多祚代為靺鞨酋長多祚驍勇善射意氣感激少以軍功歷位右羽林軍大將軍前後掌禁兵北門宿衛二十餘年神龍初張柬之將誅張易之兄弟引多祚將籌其事謂曰將軍在北門幾年曰三十年矣柬之曰將軍擊鐘鼎食金章紫綬貴寵當代位極武臣豈非大帝之恩乎曰然又曰將軍既感大帝殊澤能有報乎大帝之子見在東宮逆豎張易之兄弟擅權朝夕危逼宗社之重於將軍誠能報恩正屬今日多祚曰苟緣王室惟相公所使終不顧妻子性命因即引天地神祇為要誓詞氣感動義形於色遂與柬之等定謀誅易之兄弟以功進封遼陽郡王食實封八百戶仍拜其子承訓為衛尉少卿其年將有事於太廟特令多祚與安國相王登輦夾侍監察御史王覿上疏諫曰竊惟祔廟之禮在於尊祖奉先肅事之儀豈厭惟親與德伏見恩敕令安國相王與李多祚參乘且多祚夷人有功於國適可加之寵爵豈宜逼奉至尊侍帝弟而連衡與吾君而共輦誠恐萬方之人不允所望昔文帝引趙談參乘盎伏車前曰臣聞天子所共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是斥而下之多祚雖無趙談之纍亦非卿相之重不自循省無聞固讓豈國乏良輔更無其人史官所書將示於後何袁盎之強諫獨微臣之不及惟陛下詳擇焉上謂覿曰多祚雖是夷人緣其有功委以心腹特令侍輦卿勿復言也節愍太子之殺武三思也多祚與羽林大將軍李千里等率兵以從太子令多祚先至玄武樓下冀上問以殺三思之意遂按兵不戰時有宮闈令楊思勗於樓上侍帝請拒其先鋒多祚子壻羽林中郎將野呼利為先軍總管思勗挺刃斬之兵衆大沮多祚俄為左右所殺並殺其二子籍沒其家睿宗即位下制曰以忠報國典冊所稱感義捐軀名節斯在故右羽林大將軍上柱國遼陽郡王李多祚三韓貴種百戰餘雄席寵禁營乃心王室仗茲誠信翻陷誅夷賴彼神明重清姦慝永言徽烈深合褒崇宜追歿後之榮以復生前之命可還舊官仍宥其妻子李嗣業京兆高陵人也身長七尺壯勇絶倫天寶初隨募至安西頻經戰鬬于時諸軍初用陌刀咸推嗣業為能每為隊頭所向必陷節度使馬靈察知其勇健每出師令嗣業與焉纍遷至中郎將天寶七載安西都知兵馬使高仙芝奉詔總軍專征勃律選嗣業與郎將田珍為左右陌刀將于時吐蕃聚十萬衆於娑勒城據山因水斷崖谷編木為城仙芝夜引軍渡信圖河奄至城下仙芝謂嗣業與田珍曰不午時須破此賊嗣業引步軍持長刀上山頭拋櫑蔽空而下嗣業獨引一旗於絶險處先登諸將因之齊上賊不虞漢軍暴至遂大潰填溪谷投水溺死僅十八九遂長驅至勃律城擒勃律王吐蕃公主斬藤橋以兵三千人戍於是拂林大食諸胡七十二國皆歸國家款塞朝獻嗣業之功也由此拜右威衛將軍十載又從平石國及破九國胡並背叛突騎施以跳蕩加特進兼本官初仙芝紿石國王約為和好乃將兵襲破之殺其老弱虜其丁壯取金寶瑟瑟駝馬等國人號哭因掠石國王東獻之于闕下其子逃難奔走告於諸胡國羣胡忿之與大食連謀將欲攻四鎮仙芝懼領兵二萬深入胡地與大食戰仙芝大敗會夜兩軍解仙芝衆為大食所殺存者不過數千事窘嗣業白仙芝曰將軍深入胡地後絶救兵今大食戰勝諸胡知必乘勝而併力事漢若全軍沒嗣業與將軍俱為賊所虜則何人歸報主不如馳守白石嶺早圖奔逸之計仙芝曰爾戰將也吾欲收合餘燼明日復戰期一勝耳嗣業曰愚者千慮或有一得勢危若此不可膠柱固請行乃從之路隘人馬魚貫而奔會跋汗那兵衆先奔人及駝馬塞路不克過嗣業持大棒前驅擊之人馬應手俱斃胡等遁路開仙芝獲免仙芝表其功加驃騎左金吾大將軍及祿山反兩京陷上在靈武詔嗣業赴行在嗣業自安西統衆萬里威令肅然所過郡縣秋毫不犯至鳳翔謁見上曰今日得卿勝數萬衆事之濟否實在卿也遂與郭子儀僕固懷恩等常犄角為先鋒將嗣業每持大棒衝擊賊衆披靡所向無敵祿山之亂兩京未復肅宗在鳳翔至德二年九月嗣業從廣平王收復京城與賊大戰于香積寺北西拒灃水東臨大川十里間軍容不斷嗣業時為鎮西北庭支度行營節度使為前軍朔方右行營節度使郭子儀為中軍關內行營節度王思禮為後軍戈鋋鼓鞞震曜山野距賊軍數里列長陳而待之賊將李歸仁初以鋭師數來挑戰我師攢矢而逐之賊軍大至逼我追騎突入我營我師囂亂嗣業謂郭子儀曰今日之事若不以身啖寇決戰於陳萬死而冀其一生不然則我軍無孑遺矣嗣業乃脫衣徒搏執長刀立於陳前大呼當嗣業刀者人馬俱碎殺十數人陳容方駐前軍之士盡執長刀而出如牆而進嗣業先登奮命所向摧靡是時賊先伏兵於營東偵者知之元帥廣平王分回紇鋭卒令擊其伏兵賊將大敗嗣業出賊營之背與回紇合勢表𩹉夾攻自午及酉斬首六萬級填溝壑而死者十二三賊帥張通儒安守忠李歸仁等收合殘卒東走保陝郡慶緒又命嚴莊率衆數萬赴陝助通儒輩以拒官軍廣平王郭子儀王思禮等大軍營於陝西嗣業與子儀遇賊於新店與之力戰數合我師初勝而後敗嗣業逐急應接回紇從南山望見官軍敗曳白旗而下徑抵賊背穿賊陳賊陳西北角先陷嗣業又率精騎前擊表𩹉齊進賊衆大敗走河北子儀遂收東都嗣業以功加開府儀同三司衛尉卿封虢國公食實封二百戶乾元二年諸將同圍相州是時築堤引漳水灌城經月餘城不拔是時軍無統帥諸將自圖全人無鬬志賊每出戰嗣業被堅衝突履鋒冒刃為流矢所中數日瘡欲愈臥於帳中忽聞金鼓之聲因而大叫瘡中血出數升注地而卒上聞之震悼嗟惜久之詔曰臨難忘身為臣之大節念功加贈經國之常典故衛尉卿兼懷州刺史充北庭行營節度使虢國公李嗣業植操沈厚秉心忠烈懷幹時之勇略有戡難之遠謀久仕邊陲備經任使自凶渠構亂中夏不寧持感激之誠總驍果之衆親當矢石頻立勳庸壯節可嘉將謀於百勝忠誠未遂空恨於九原言念其功良深憫悼死於王事禮有可加宜贈裂土之封用廣飾終之義可贈武威郡王其賻贈及緣葬事所司倍於常式仍令官給靈輿遞還所在以其子佐國襲其官爵食實封二百戶白孝德安西胡人也驍悍有膽力乾元中事李光弼為偏裨史思明攻河陽使驍將劉龍仙率鐵騎五千臨城挑戰龍仙捷勇自恃舉右足加馬鬣上嫚罵光弼光弼登城望顧諸將曰孰可取者僕固懷恩請行光弼曰此非大將所為歷選其次左右曰白孝德可光弼乃招孝德前問曰可乎曰可光弼問所要幾何兵孝德曰可獨往耳光弼壯之終問所欲對曰願選五十騎於軍門為繼兼請大軍鼓譟以增氣勢他無所用光弼撫其背以遣之孝德挾二矛策馬截流而渡半濟懷恩賀曰克矣光弼曰未及何知其克懷恩曰觀其攬轡便辟可萬全者龍仙見其獨來甚易之足不降鬣稍近將動孝德搖手示之若使其不動龍仙不之測乃止孝德呼曰侍中使余致辭非他也龍仙去十步與之言褻罵如初孝德息馬伺便因瞋目曰賊識我乎龍仙曰誰耶曰我國之大將白孝德也龍仙曰是何猪狗孝德發聲虓噉持矛躍馬而搏之城上鼓譟五十騎繼進龍仙矢不暇發環走堤上孝德追及斬首攜之而歸賊徒大駭其後纍戰功至安西北庭行營節度鄜坊邠寧節度使歷檢校刑部尚書封昌化郡王以家難去職服闋復舊官大曆十四年九月轉太子少傅尋卒時年六十六贈太子太保史臣曰歷代武臣壯勇出衆者有諸節行勵俗者鮮矣矧蠻夷之人乎如馮盎智勇守節社爾廉慎知足蘇尼失恩惠史忠清謹凡用兵破吐蕃谷渾勇也心如鐵石忠也不解萬均官恕也阻延之親智也捨高突勃之死識也立大功居顯位夙夜匪懈者何力有焉常之以私馬恕官兵與將士均賞賜古之名將無以加焉多祚忘身許國孝德壯勇立功皆三軍之傑也豈九夷之陋哉嗣業力贊中興終歿王事未可倫而擬也贊曰君子之居九夷無陋壯哉嗣業孰出其右
