body:
  text: 舊唐書卷一百七十四列傳第一百二十四李德裕子燁李德裕字文饒趙郡人祖栖筠御史大夫父吉甫趙國忠懿公元和初宰相祖父自有傳德裕幼有壯志苦心力學尤精西漢書左氏春秋恥與諸生從鄉賦不喜科試年才及冠志業大成貞元中以父譴逐蠻方隨侍左右不求仕進元和初以父再秉國鈞避嫌不仕臺省纍辟諸府從事十一年張弘靖罷相鎮太原辟為掌書記由大理評事得殿中侍御史十四年府罷從弘靖入朝真拜監察御史明年正月穆宗即位召入翰林充學士帝在東宮素聞吉甫之名既見德裕尤重之禁中書詔大手筆多詔德裕草之是月召對思政殿賜金紫之服踰月改屯田員外郎穆宗不持政道多所恩貸戚里諸親邪謀請謁傳導中人之旨與權臣往來德裕嫉之長慶元年正月上疏論之曰伏見國朝故事駙馬緣是親密不合與朝廷要官往來玄宗開元中禁止尤切訪聞近日駙馬輒至宰相及要官私第此輩無他才伎可以延接唯是泄漏禁密交通中外羣情所知以為甚弊其朝官素是雜流則不妨來往若職在清列豈可知聞伏乞宣示宰臣其駙馬諸親今後公事即於中書見宰相請不令詣私第上然之尋轉考功郎中知制誥二年二月轉中書舍人學士如故初吉甫在相位時牛僧孺李宗閔應制舉直言極諫科二人對詔深詆時政之失吉甫泣訴於上前由是考策官皆貶事在李宗閔傳元和初用兵伐叛始於杜黃裳誅蜀吉甫經畫欲定兩河方欲出師而卒繼之元衡裴度而韋貫之李逢吉沮議深以用兵為非而韋李相次罷相故逢吉常怒吉甫裴度而德裕於元和時久之不調而逢吉僧孺宗閔以私怨恆排擯之時德裕與李紳元稹俱在翰林以學識才名相類情頗款密而逢吉之黨深惡之其月罷學士出為御史中丞時元稹自禁中出拜工部侍郎平章事三月裴度自太原復輔政是月李逢吉亦自襄陽入朝乃密賂纖人構成于方獄六月元稹裴度俱罷相稹出為同州刺史逢吉代裴度為門下侍郎平章事既得權位鋭意報怨時德裕與牛僧孺俱有相望逢吉欲引僧孺懼紳與德裕禁中沮之九月出德裕為浙西觀察使尋引僧孺同平章事由是交怨愈深潤州承王國清兵亂之後前使竇易直傾府藏賞給軍旅寖驕財用殫竭德裕儉於自奉留州所得盡以贍軍雖施與不豐將卒無怨二年之後賦輿復集德裕壯年得位鋭於布政凡舊俗之害民者悉革其弊江嶺之間信巫祝惑鬼怪有父母兄弟厲疾者舉室棄之而去德裕欲變其風擇鄉人之有識者諭之以言繩之以法數年之間弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之內除淫祠一千一十所又罷私邑山房一千四百六十以清寇盜人樂其政優詔嘉之昭愍皇帝童年纘曆頗事奢靡即位之年七月詔浙西造銀盝子妝具二十事進內德裕奏曰臣百生多幸獲遇昌期受寄名藩常憂曠職孜孜夙夜上報國恩數年已來災旱相繼罄竭微慮粗免流亡物力之間尚未完復臣伏準今年三月三日赦文常貢之外不令進獻此則陛下至聖至明細微洞照一恐聚斂之吏緣以成奸一恐凋瘵之人不勝其弊上弘儉約之德下敷惻憫之心萬國羣氓鼓舞未息昨奉五月二十三日詔書令訪茅山真隱將欲師處謙守約之道發務實去華之美雖無人上塞丹詔實率土已偃玄風豈止微臣獨懷抃賀況進獻之事臣子常心雖有敕文不許亦合竭力上貢唯臣當道素號富饒近年已來比舊即異貞元中李錡任觀察使日職兼鹽鐵百姓除隨貫出榷酒錢外更置官酤兩重納榷獲利至厚又訪聞當時進奉亦兼用鹽鐵羡餘貢獻繁多自後莫及至薛蘋任觀察使時又奏置榷酒上供之外頗有餘財軍用之間實為優足自元和十四年七月三日敕却停榷酤又準元和十五年五月七日赦文諸州羡餘不令送使唯有留使錢五十萬貫每年支用猶缺十三萬貫不足常須是事節儉百計補填經費之中未免懸缺至於綾紗等物猶是本州所出易於方圓金銀不出當州皆須外處回市去二月中奉宣令進盝子計用銀九千四百餘兩其時貯備都無二三百兩乃諸頭收市方獲制造上供昨又奉宣旨令進妝具二十件計用銀一萬三千兩金一百三十兩尋令並合四節進奉金銀造成兩具進納訖今差人於淮南收買旋到旋造星夜不輟雖力營求深憂不逮臣若因循不奏則負陛下任使之恩若分外誅求又纍陛下慈儉之德伏乞陛下覽前件榷酤及諸州羡餘之目則知臣軍用褊短本末有由伏料陛下見臣奏論必賜詳悉知臣竭愛君守事之節盡納忠罄直之心伏乞聖慈宣令宰臣商議何以遣臣上不違宣索下不闕軍儲不困疲人不斂物怨前後詔敕並可遵承輒冒宸嚴不勝戰汗之至時準赦不許進獻踰月之後徵貢之使道路相繼故德裕因訴而諷之事奏不報又詔進可幅盤絛繚綾一千匹德裕又論曰臣昨緣宣索已具軍資歲計及近年物力聞奏伏料聖慈必垂省覽又奉詔旨令織定羅紗袍段及可幅盤絛繚綾一千匹伏讀詔書倍增惶灼臣伏見太宗朝臺使至涼州見名鷹諷李大亮獻之大亮密表陳誠太宗賜詔云使遣獻之遂不曲順再三嘉歎載在史書又玄宗命中使於江南採鵁鶄諸鳥汴州刺史倪若水陳論玄宗亦賜詔嘉納其鳥即時皆放又令皇甫詢於益州織半臂背子琵琶扞撥鏤牙合子等蘇頲不奉詔書輒自停織太宗玄宗皆不加罪欣納所陳臣竊以鵁鶄鏤牙至為微細若水等尚以勞人損德瀝款效忠當聖祖之朝有臣如此豈明王之代獨無其人蓋有位者蔽而不言必非陛下拒而不納又伏覩四月二十三日德音云方召侯伯有位之士無或棄吾謂不可教其有違道傷理徇欲懷安面刺廷攻無有隱諱則是陛下納誨從善道光祖宗不盡忠規過在臣下況玄鵝天馬椈豹盤絛文彩珍奇只合聖躬自服今所織千匹費用至多在臣愚誠亦所未諭昔漢文帝衣弋綈之衣元帝罷輕纖之服仁德慈儉至今稱之伏乞陛下近覽太宗玄宗之容納遠思漢文孝元之恭己以臣前表宣示羣臣酌臣當道物力所宜更賜節減則海隅蒼生無不受賜臣不勝懇切兢惶之至優詔報之其繚綾罷進元和已來纍敕天下州府不得私度僧尼徐州節度使王智興聚貨無厭以敬宗誕月請於泗州置僧壇度人資福以邀厚利江淮之民皆羣黨渡淮德裕奏論曰王智興於所屬泗州置僧尼戒壇自去冬於江淮已南所在懸榜招置江淮自元和二年後不敢私度自聞泗州有壇戶有三丁必令一丁落髮意在規避王徭影庇資産自正月已來落髮者無算臣今於蒜山渡點其過者一日一百餘人勘問唯十四人是舊日沙彌餘是蘇常百姓亦無本州文憑尋已勒還本貫訪聞泗州置壇次第凡僧徒到者人納二緡給牒即回別無法事若不特行禁止比到誕節計江淮已南失却六十萬丁壯此事非細繫於朝廷法度狀奏即日詔徐州罷之敬宗荒僻日甚遊幸無恆疏遠賢能昵比羣小坐朝月不二三度大臣罕得進言海內憂危慮移宗社德裕身居廉鎮傾心王室遣使獻丹扆針六首曰臣聞心乎愛矣遐不謂矣此古之賢人所以篤於事君者也夫迹疏而言親者危地遠而意忠者忤然臣竊念拔自先聖偏荷寵光若不愛君以忠則是上負靈鑒臣頃事先朝屬多陰沴嘗獻大明賦以諷頗蒙先朝嘉納臣今日盡節明主亦由是心昔張敞之守遠郡梅福之在遐徼尚竭誠盡忠不避尤悔況臣嘗學舊史頗知針諷雖在疏遠猶思獻替謹獻丹扆針六首仰塵睿鑒伏積兢惶其宵衣針曰先王聽政昧爽以俟雞鳴既盈日出而視伯禹大聖寸陰為貴光武至仁反支不忌無俾姜后獨去簪珥彤管記言克念前志其正服針曰聖人作服法象可觀雖在宴遊尚不懷安汲黯莊色能正不冠楊阜毅然亦譏縹紈四時所御各有其官非此勿服惟辟所難其罷獻針曰漢文罷獻詔還騄耳鑾輅徐驅焉用千里厥後令王亦能恭己翟裘既焚筒布則毀道德為麗慈仁為美不過天道斯為至理其納誨針曰惟后納誨以求厥中從善如流乃能成功漢驁流湎舉白浮鍾魏睿侈汰凌霄作宮忠雖不忤善亦不從以規為瑱是謂塞聰其辨邪針曰居上處深在察微萌雖有讒慝不能蔽明漢之有昭德過周成上書知僞照奸得情燕蓋既折王猷洽平百代之後乃流淑聲其防微針曰天子之孝敬遵王度安必思危乃無遺慮亂臣猖蹶非可遽數玄黃莫辨觸瑟始仆柏谷微行豺豕塞路睹貌獻飧斯可誡懼帝手詔答曰卿文雅大臣方隅重寄表率諸部肅清全吳化洽行春風澄坐嘯眷言善政想歎在懷卿之宗門纍著聲績冠內廷者兩代襲侯伯者六朝果能激愛君之誠喻詩人之旨在遠而不忘忠告諷上而常深慮微博我以端躬約豫以循禮三復規諫纍夕稱嗟置之座隅用比韋弦之益銘諸心腑何啻藥石之功卿既以投誠朕每懷開諫苟有過舉無忘密陳山川既遐眷屬何已必當克己以副乃誠德裕意在切諫不欲斥言託針以盡意宵衣諷坐朝稀晚也正服諷服御乖異也罷獻諷徵求玩好也納誨諷侮棄讜言也辨邪諷信任羣小也防微諷輕出遊幸也帝雖不能盡用其言命學士韋處厚殷勤答詔頗嘉納其心焉德裕久留江介心戀闕廷因事寄情望回聖奬而逢吉當軸枳棘其塗竟不得內徙寶曆二年亳州言出聖水飲之者愈疾德裕奏曰臣訪聞此水本因妖僧誑惑狡計丐錢數月已來江南之人奔走塞路每三二十家都顧一人取水擬取之時疾者斷食葷血既飲之後又二七日蔬飧危疾之人俟之愈病其水斗價三貫而取者益之他水沿路轉以市人老疾飲之多至危篤昨點兩浙福建百姓渡江者日三五十人臣於蒜山渡已加捉搦若不絶其根本終無益黎氓昔吳時有聖水宋齊有聖火事皆妖妄古人所非乞下本道觀察使令狐楚速令填塞以絶妖源從之敬宗為兩街道士趙歸真說以神仙之術宜訪求異人以師其道僧惟貞齊賢正簡說以祠禱修福以致長年四人皆出入禁中日進邪說山人杜景先進狀請於江南求訪異人至浙西言有隱士周息元壽數百歲帝即令高品薛季稜往潤州迎之仍詔德裕給公乘遣之德裕因中使還獻疏曰臣聞道之高者莫若廣成玄元人之聖者莫若軒黃孔子昔軒黃問廣成子理身之要何以長久對曰無視無聽抱神以靜形將自正神必自清無勞子形無搖子精乃可長生慎守其一以處其和故我修身千二百歲矣吾形未嘗衰又云得吾道者上為皇而下為王玄元語孔子曰去子之驕氣與多欲態色與淫志是皆無益於子之身吾所告子者是已故軒黃發謂天之歎孔子興猶龍之感前聖於道不其至乎伏惟文武大聖廣孝皇帝陛下用玄祖之訓修軒黃之術凝神間館物色異人將以覿冰雪之姿屈順風之請恭惟聖感必降真仙若使廣成玄元混迹而至語陛下之道授陛下之言以臣度思無出於此臣所慮赴召者必迂怪之士苟合之徒使物淖冰以為小術衒耀邪僻蔽欺聰明如文成五利一無可驗臣所以三年之內四奉詔書未敢以一人塞詔實有所懼臣又聞前代帝王雖好方士未有服其藥者故漢書稱黃金可成以為飲食器則益壽又高宗朝劉道合玄宗朝孫甑生皆成黃金二祖竟不敢服豈不以宗廟社稷之重不可輕易此事炳然載於國史以臣微見倘陛下睿慮精求必致真隱唯問保和之術不求餌藥之功縱使必成黃金止可充於玩好則九廟靈鑒必當慰悅寰海兆庶誰不歡心臣思竭愚衷以裨玄化無任兢憂之至息元至京帝館之於山亭問以道術自言識張果葉靜能詔寫真待詔李士昉問其形狀圖之以進息元山野常人本無道學言事誕妄不近人情及昭愍遇盜而殂文宗放還江左德裕深識守正皆此類也文宗即位就加檢校禮部尚書大和三年八月召為兵部侍郎裴度薦以為相而吏部侍郎李宗閔有中人之助是月拜平章事懼德裕大用九月檢校禮部尚書出為鄭滑節度使德裕為逢吉所擯在浙西八年雖遠闕庭每上章言事文宗素知忠藎採朝論徵之到未旬時又為宗閔所逐中懷於悒無以自申賴鄭覃侍講禁中時稱其善雖朋黨流言帝乃心未已宗閔尋引牛僧孺同知政事二憾相結凡德裕之善者皆斥之於外四年十月以德裕檢校兵部書成都尹劍南西川節度副大使知節度事管內觀察處置西山八國雲南招撫等使裴度於宗閔有恩度征淮西時請宗閔為彰義觀察判官自後名位日進至是恨度援德裕罷度相位出為興元節度使牛李權赫於天下西川承蠻寇剽虜之後郭釗撫理無術人不聊生德裕乃復葺關防繕完兵守又遣人入南詔求其所俘工匠得僧道工巧四千餘人復歸成都五年九月吐蕃維州守將悉怛謀請以城降其州南界江陽岷山連嶺而西不知其極北望隴山積雪如玉東望成都若在井底一面孤峯三面臨江是西蜀控吐蕃之要地至德後河隴陷蕃唯此州尚存吐蕃利其險要將婦人嫁於此州閽者二十年後婦人生二子成長及蕃兵攻城二子內應其州遂陷吐蕃得之號曰無憂城貞元中韋臯鎮蜀經略西山八國萬計取之不獲至是悉怛謀遣人送款德裕疑其詐遣人送錦袍金帶與之託云候取進止悉怛謀乃盡率郡人歸成都德裕乃發兵鎮守因陳出攻之利害時牛僧孺沮議言新與吐蕃結盟不宜敗約語在僧孺傳乃詔德裕却送悉怛謀一部之人還維州贊普得之皆加虐刑德裕六年復修邛峽關移巂州於臺登城以扞蠻德裕所歷征鎮以政績聞其在蜀也西拒吐蕃南平蠻蛋數年之內夜犬不驚瘡痏之民粗以完復會監軍王踐言入朝知樞密嘗於上前言悉怛謀縛送以快戎心絶歸降之義上頗尤僧孺其年冬召德裕為兵部尚書僧孺罷相出為淮南節度使七年二月德裕以本官平章事進封贊皇伯食邑七百戶六月宗閔亦罷德裕代為中書侍郎集賢大學士其年十二月文宗暴風恙不能言者月餘八年正月十六日始力疾御紫宸見百僚宰臣退問安否上歎醫無名工者久之由是王守澄進鄭注初注構宋申錫事帝深惡之欲令京兆尹杖殺之至是以藥稍效始善遇之守澄復進李訓善易其年秋上欲授訓諫官德裕奏曰李訓小人不可在陛下左右頃年惡積天下皆知無故用之必駭視聽上曰人誰無過俟其悛改朕以逢吉所託不忍負言德裕曰聖人有改過之義訓天性奸邪無悛改之理上顧王涯曰商量別與一官遂授四門助教制出給事中鄭肅韓佽封之不下王涯召肅面喻令下俄而鄭注亦自絳州至訓注惡德裕排己九月十日復召宗閔於興元授中書侍郎平章事代德裕出德裕為興元節度使德裕中謝日自陳戀闕不願出藩追敕守兵部尚書宗閔奏制命已行不宜自便尋改檢校尚書左僕射潤州刺史鎮海軍節度蘇常杭潤觀察等使代王璠德裕至鎮奉詔安排宮人杜仲陽於道觀與之供給仲陽者漳王養母王得罪放仲陽於潤州故也九年三月左丞王璠戶部侍郎李漢進狀論德裕在鎮厚賂仲陽結託漳王圖為不軌四月帝於蓬萊殿召王涯李固言路隨王璠李漢鄭注等面證其事璠漢加誣構結語甚切至路隨奏曰德裕實不至此誠如璠漢之言微臣亦合得罪羣論稍息尋授德裕太子賓客分司東都其月又貶袁州長史路隨坐證德裕罷相出鎮浙西其年七月宗閔坐救楊虞卿貶處州李漢坐黨宗閔貶汾州十一月王璠與李訓造亂伏誅而文宗深悟前事知德裕為朋黨所誣明年三月授德裕銀青光祿大夫量移滁州刺史七月遷太子賓客十一月檢校戶部尚書復浙西觀察使德裕凡三鎮浙西前後十餘年開成二年五月授揚州大都督府長史淮南節度副大使知節度使事代牛僧孺初僧孺聞德裕代己乃以軍府事交付副使張鷺即時入朝時揚州府藏錢帛八十萬貫匹及德裕至鎮奏領得止四十萬半為張鷺支用訖僧孺上章訟其事詔德裕重檢括果如僧孺之數德裕稱初到鎮疾病為吏隱欺請罰詔釋之補闕王績魏崔黨韋有翼拾遺令狐綯韋楚老樊宗仁等連章論德裕妄奏錢帛以傾僧孺上竟不問四年四月就加檢校尚書左僕射五年正月武宗即位七月召德裕於淮南九月授門下侍郎同平章事初德裕父吉甫年五十一出鎮淮南五十四自淮南復相今德裕鎮淮南復入相一如父之年亦為異事會昌元年兼左僕射開成末回紇為黠戛斯所攻戰敗部族離散烏介可汗奉大和公主南來會昌二年二月牙於塞上遣使求助兵糧收復本國權借天德軍以安公主時天德軍使田牟請以沙陀退渾諸部落兵擊之上意未決下百僚商議識者多云如牟之奏德裕曰頃者國家艱難之際回紇繼立大功今國破家亡竄投無所自居塞上未至侵淫以窮來歸遽行殺伐非漢宣待呼韓邪之道也不如聊濟資糧徐觀其變宰相陳夷行曰此借寇兵而資盜糧非計也不如擊之便德裕曰田牟韋仲平言沙陀退渾並願擊賊此緩急不可恃也夫見利則進遇敵則散是雜虜之常態必不肯為國家扞禦邊境天德一城戍兵寡弱而欲與徑虜結讎陷之必矣不如以理恤之俟其越軼用兵為便帝以為然許借米三萬石俄而回紇宰相嗢沒斯殺赤心相以其衆來降赤心部族又投幽州烏介勢孤而不與之米其衆飢乏漸近振武保大柵杷頭峯突入朔州州界沙陀退渾皆以其家保山險雲州張獻節嬰城自固虜大縱掠卒無拒者上憂之與宰臣計事德裕曰杷頭峯北便是沙磧彼中野戰須用騎兵若以步卒敵之理難必勝今烏介所恃者公主如令勇將出奇奪得公主虜自敗矣上然之即令德裕草制處分代北諸軍固關防以出奇形勢授劉沔沔令大將石雄急擊可汗于殺胡山敗之迎公主還宮語在石雄傳尋進位司空三年二月趙蕃奏黠戛斯攻安西北庭都護府宜出師應援德裕奏曰據地志安西去京七千一百里北庭去京五千二百里承平時向西路自河西隴右出玉門關迤邐是國家州縣所在皆有重兵其安西北庭要兵便於側近徵發自艱難已後河隴盡陷吐蕃若通安西北庭須取回紇路去今回紇破滅又不知的屬黠戛斯否縱令救得便須却置都護須以漢兵鎮守每處不下萬人萬人從何徵發饋運取何道路今天德振武去京至近兵力常苦不足無事時貯糧不支得三年朝廷力猶不及況保七千里安西哉臣所以謂縱令得之實無用也昔漢宣帝時魏相請罷車師之田漢元帝時賈捐之請棄珠崖郡國朝賢相狄仁傑亦請棄四鎮立斛瑟羅為可汗又請棄安東却立高氏蓋不欲貪外虛內耗竭生靈此三臣者當自有之時尚欲棄之以肥中國況隔越萬里安能救之哉臣恐蕃戎多計知國力不及僞且許之邀求中國金帛陛下不可中悔此則將實費以換虛事即是滅一回紇而又生之恐計非便乃止德裕又以大和五年吐蕃維州守將以城降為牛僧孺所沮終失維州奏論之曰臣在先朝出鎮西蜀其時吐蕃維州首領悉怛謀雖是雜虜久樂皇風將彼堅城降臣本道臣尋差兵馬入據其城飛章以聞先帝驚歎其時與臣不足者望風嫉臣遽獻疑言上罔宸聽以為與吐蕃盟約不可背之必恐將此為辭侵犯郊境詔臣還却此城兼執送悉怛謀等令彼自戮復降中使迫促送還昔白起殺降終于杜郵致禍陳湯見徙是為郅支報讎感歎前事愧心終日今者幸逢英主忝備台司輒敢追論伏希省察且維州據高山絶頂三面臨江在戎虜平川之衝是漢地入兵之路初河隴盡沒此州獨存吐蕃潛將婦人嫁與此州門子二十年後兩男長成竊開壘門引兵夜入因茲陷沒號曰無憂因並力於西邊遂無虞於南路憑凌近甸宵旰纍朝貞元中韋臯欲經略河湟須以此城為始盡鋭萬旅急攻纍年吐蕃愛惜既甚遂遣舅論莽熱來援雉堞高峻臨衝難及於層霄鳥徑屈盤猛士多糜於礧石莫展公輸之巧空擒莽熱而還及南蠻負恩援地驅劫臣初到西蜀衆心未安外揚國威中緝邊備其維州執臣信令乃送款與臣臣告以須俟奏聞所冀探其情僞其悉怛謀尋率一城之兵衆並州印甲仗塞途相繼空壁歸臣臣大出牙兵受其降禮南蠻在列莫敢仰視況西山八國隔在此州比帶使名都成虛語諸羌久苦蕃中征役願作大國王人自維州降後皆云但得臣信牒帽子便相率內屬其蕃界合水棲雞等城既失險厄自須抽歸可減八處鎮兵坐收千里舊地臣見莫大之利乃為恢復之基繼具奏聞請以酬賞臣自與錦袍金帶顒俟詔書且吐蕃維州未降已前一年猶圍魯州以此言之豈守盟約況臣未嘗用兵攻取彼自感化來降又沮議之人不知事實犬戎遲鈍土曠人稀每欲乘秋犯邊皆須數歲就食臣得維州踰月未有一使入疆自此之後方應破膽豈有慮其後怨鼓此游詞臣受降之時指天為誓寧忍將三百餘人性命棄信偷安纍表上陳乞垂矜赦答詔嚴切竟令執還加以體披桎梏舁於竹畚及將就路冤叫呼天將吏對臣無不流涕其部送者便遭蕃帥譏誚曰既已降彼何須送來乃却將此降人戮于漢界之上恣行殘害用固攜離乃至擲其嬰孩承以槍槊臣聞楚靈誘殺蠻子春秋明譏周文外送鄧叔簡冊深鄙況乎大國負此異類絶忠款之路快凶虐之情從古以來未有此事臣實痛悉怛謀舉城受酷由臣陷此無辜乞慰忠魂特加褒贈帝意傷之尋賜贈官其年德裕兼守司徒四月澤潞節度使劉從諫卒軍人以其姪稹擅總留後三軍請降旄鉞帝與宰臣議可否德裕曰澤潞國家內地不同河朔前後命帥皆用儒臣頃者李抱真成立此軍身歿之後德宗尚不許繼襲令李緘護喪歸洛洎劉悟作鎮長慶中頗亦自專屬敬宗因循遂許從諫繼襲開成初於長子屯軍欲興晉陽之甲以除君側與鄭注李訓交結至深外託效忠實懷窺伺自疾病之初便令劉稹管兵馬若不加討伐何以號令四方若因循授之則藩鎮相效自茲威令去矣帝曰卿算用兵必克否對曰劉稹所恃者河朔三鎮耳但得魏鎮不與稹同破之必矣請遣重臣一人傳達聖旨言澤潞命帥不同三鎮自艱難已來列聖皆許三鎮嗣襲已成故事今國家欲加兵誅稹禁軍不欲出山東其山東三州委鎮魏出兵攻取上然之乃令御史中丞李回使三鎮諭旨賜魏鎮詔書云卿勿為子孫之謀欲存輔車之勢何弘敬王元逵承詔聳然從命初議出兵朝官上疏相繼請依從諫例許之繼襲而宰臣四人亦有以出師非便者德裕奏曰如師出無功臣請自當罪戾請不纍李紳讓夷等及弘敬元逵出兵德裕又奏曰貞元大和之間朝廷伐叛詔諸道會兵才出界便費度支供餉遲留逗撓以困國力或密與賊商量取一縣一柵以為勝捷所以師出無功今請處分元逵弘敬只令收州勿攻縣邑帝然之及王宰石雄進討經年未拔澤潞及弘敬元逵收邢洺磁三州稹黨遂離以至平殄皆如其算時王師方討澤潞三年十二月太原橫水戍兵因移戍榆社乃倒戈入太原城逐節度使李石推其都將楊辨為留後武宗以賊稹未殄又起太原之亂心頗憂之遣中使馬元貫往太原宣諭覘其所為元貫受楊辨賂欲保祐之四年正月使還奏曰楊辨兵馬極多自牙門列隊至柳子十五餘里明光甲曳地德裕奏曰李石比以城內無兵抽橫水兵一千五百人赴榆社安能朝夕間便致十五里兵甲耶元貫曰晉人驍敢盡可為兵重賞招致耳德裕曰招召須財昨橫水兵亂止為缺絹一匹李石無處得楊辨從何致耶又太原有一聯甲並在行營安致十五里明光耶元貫詞屈德裕奏曰楊辨微賊決不可恕如國力不及寧捨劉稹即時請降詔令王逢起榆社軍又令王元逵兵自土門入會于太原河東監軍呂義忠聞之即日召榆社本道兵誅楊辨以聞自開成五年冬回紇至天德至會昌四年八月平澤潞首尾五年其籌度機宜選用將帥軍中書詔奏請雲合起草指蹤皆獨決於德裕諸相無預焉以功兼守太尉進封衛國公三千戶五年武宗上徽號後纍表乞骸不許德裕病月餘堅請解機務乃以本官平章事兼江陵尹荊南節度使數月追還復知政事宣宗即位罷相出為東都留守東畿汝都防禦使德裕特承武宗恩顧委以樞衡決策論兵舉無遺悔以身扞難功流社稷及昭肅棄天下不逞之伍咸害其功白敏中令狐綯在會昌中德裕不以朋黨疑之置之臺閣顧待甚優及德裕失勢抵掌戟手同謀斥逐而崔鉉亦以會昌末罷相怨德裕大中初敏中復薦鉉在中書乃相與掎托構致令其黨人李咸者訟德裕輔政時陰事乃罷德裕留守以太子少保分司東都時大中元年秋尋再貶潮州司馬敏中等又令前永寧縣尉吳汝納進狀訟李紳鎮揚州時謬斷刑獄明年冬又貶潮州司戶德裕既貶大中二年自洛陽水路經江淮赴潮州其年冬至潮陽又貶崖州司戶至三年正月方達珠崖郡十二月卒時年六十三德裕以器業自負特達不羣好著書為文奬善嫉惡雖位極台輔而讀書不輟有劉三復者長於章奏尤奇待之自德裕始鎮浙西迄於淮甸皆參佐賓筵軍政之餘與之吟詠終日在長安私第別構起草院院有精思亭每朝廷用兵詔令制置而獨處亭中凝然握管左右侍者無能預焉東都於伊闕南置平泉別墅清流翠篠樹石幽奇初未仕時講學其中及從官藩服出將入相三十年不復重遊而題寄歌詩皆銘之於石今有花木記歌詩篇録二石存焉有文集二十卷記述舊事則有次柳氏舊聞御臣要略伐叛志獻替録行於世初貶潮州雖蒼黃顛沛之中猶留心著述雜序數十篇號曰窮愁志其論冥數曰仲尼罕言命不語神非謂無也欲人嚴三綱之道奉五常之教修天爵而致人爵不欲信富貴于天命委福祿於冥數昔衛卜協于沙丘為諡已久秦塞屬於臨洮名子不悟朝歌未滅而國流丹烏白帝尚在而漢斷素蛇皆兆發於先而符應於後不可以智測也周孔與天地合德與神明合契將來之數無所遁情而狼跋於周鳳衰于楚豈親戚之義不可去也人倫之教不可廢也條侯之貴鄧通之富死於兵革可也死于女室可也唯不宜以餒終此又不可以理得也命偶時來盜有名器者謂禍福出於胸懷榮枯生於口吻沛然而安溘然而笑曾不知黃雀遊於茂樹而挾彈者在其後也乙丑歲豫自荊楚保釐東周路出方城間有隱者困于泥塗不知其所如謂方城長曰此官人居守後二年南行萬里則知憾豫者必因天譴譖豫者乃自鬼謀雖抱至冤固不為恨豫嘗三遇異人非卜祝之流皆遁世者初掌記北門管涔隱者謂豫曰君明年當在人君左右為文翰之職須值少主豫聞之愕然變色隱者亦悔失言避席求去豫問曰何為事少主對曰君與少主已有宿緣其年秋登朝至明年正月穆宗纘緒召入禁苑及為中丞閩中隱者叩門請見豫下榻與語曰時事非久公不早去冬必作相禍將至矣若亟請居外則代公者受患公後十年終當作相自西而入是秋出鎮吳門時年三十六歲經八稔尋又仗鉞南燕秋暮有邑子于生引鄴郡道士至才升階未及命席謂豫曰公當為西南節制孟冬望舒前符節至矣三者皆與之協不差歲月自憲闈竟十年居相位由西蜀而入代豫持憲者俄亦竄逐唯再謫南荒未嘗有前知之士為豫言之豈禍患不可移者神道所祕莫得預聞其自序如此斯論可以警夫躁競者故書於事末德裕三子燁檢校祠部員外郎汴宋亳觀察判官大中二年坐父貶象州立山尉二子幼從父歿於崖州燁咸通初量移郴州郴縣尉卒於桂陽子延古史臣曰臣總角時亟聞耆德言衛公故事是時天子神武明於聽斷公亦以身犯難酬特達之遇言行計從功成事遂君臣之分千載一時觀其禁掖彌綸巖廊啓奏料敵制勝襟靈獨斷如由基命中罔有虛發實奇才也語文章則嚴馬扶輪論政事則蕭曹避席罪其竊位即太深文所可議者不能釋憾解仇以德報怨泯是非於度外齊彼我於環中與夫市井之徒力戰錐刀之末淪身瘴海可為傷心古所謂攫金都下忽於巿人離婁不見於眉睫才則才矣語道則難贊曰公之智決利若青萍破虜誅叛摧枯建瓴功成北闕骨葬南溟嗚呼煙閣誰上丹青
