body:
  text: 舊唐書卷一百七十七列傳第一百二十七崔慎由父從弟安潛伯父能能子彥曾慎由子胤崔珙兄琯弟璪璵球璵子淡淡子遠盧鈞裴休兄儔弟俅楊收兄發弟嚴子巨鏻嚴子涉注韋保衡路巖夏侯孜子潭澤劉瞻劉瑑曹確畢諴杜審權子讓能彥林弘徽劉鄴豆盧瑑崔慎由字敬止清河武城人高祖融位終國子司業諡曰文自有傳曾祖翹位終禮部尚書東都留守祖異位終渠州刺史父從少孤貧寓居太原與仲兄能同隱山林苦心力學屬歲兵荒至於絶食弟兄採梠拾橡實飲水棲衡而講誦不輟怡然終日不出山巖如是者十年貞元初進士登第釋褐山南西道推官府公嚴震待以殊禮以父憂免弟兄廬于父墓手植松柏免喪不應辟命久之西川節度使韋臯開西南夷置兩路運糧使奏從掌西山運務後權知邛州事及臯薨副使劉闢阻命欲并東川以謀告從從以書諭闢闢怒出兵攻之從嬰城拒守卒不從之高崇文平蜀從事坐纍多伏法惟從以拒闢免盧坦在宣州辟為團練觀察副使元和初入朝纍遷吏部員外郎九年裴度為中丞奏從為侍御史知雜守右司郎中度作相用從自代為中丞從氣貌孤峻正色立朝彈奏不避權幸事關臺閣或付仗內者必抗章論列請歸有司選辟御史必先質重貞退者改給事中數月出為陝州大都督府長史陝虢團練觀察使兼御史中丞賜紫金魚袋入為尚書右丞淄青賊平鎮州王承宗懼上章請割德棣二州自贖又令二子入侍憲宗選使臣宣諭以從中選議者以承宗罪惡貫盈每多姦譎入朝二子必非血胤人頗憂之從次魏州田弘正以路由寇境欲以五百騎援之從辭之以童奴十數騎徑至鎮州於鞠場宣敕三軍大集從諭以逆順辭情慷慨軍士感動承宗泣下禮貌益恭遂按德棣戶口符印而還其年八月出為興元尹御史大夫山南西道節度觀察等使監軍使知上意欲大用之每為中貴傳達意旨欲其賂遺從終不答穆宗即位召拜尚書左丞長慶二年檢校禮部尚書鄜州刺史鄜坊丹延節度等使鄜畤內接畿甸神策軍鎮相望踰禁犯法纍政不能制而從撫遏舉奏軍士惕然党項羌有以羊馬來市者必先遺帥守從皆不受撫諭遣之羣羌不敢為盜四年入為吏部侍郎尋改太常卿寶曆二年檢校吏部尚書充東都留守大和三年入為戶部尚書李宗閔秉政以從與裴度李德裕厚善惡之改檢校尚書右僕射太子賓客東都分司從請告百日罷官物論咎執政宗閔懼四年三月召拜檢校左僕射兼揚州大都督府長史御史大夫充淮南節度副大使知節度事揚府舊有貨麴之利資産奴婢交易者皆有貫率羊有口算每歲收利以給用從悉除之舊制官吏祿俸有布帛加估之給節度使獨不在此例從至一例估折給之六年十月卒于鎮贈司空諡曰貞從少以貞晦恭讓自處不交權利忠厚方嚴正人多所推仰階品合立門戟終不之請四為大鎮家無妓樂士友多之慎由大和初擢進士第又登賢良方正制科聰敏強記宇量端厚有父風釋褐諸侯府大中初入朝為右拾遺員外郎知制誥正拜舍人召充翰林學士戶部侍郎再歷方鎮入朝為工部尚書十年以本官同平章事兼集賢殿大學士轉監修國史上柱國加太中大夫兼禮部尚書初慎由與蕭鄴同在翰林情不相洽及慎由作相罷鄴學士俄而鄴自判度支為平章事恩顧甚隆鄴引劉瑑同知政事十二年二月詔曰太中大夫中書侍郎兼禮部尚書同中書門下平章事監修國史上柱國賜紫金魚袋崔慎由繼美德門承家貴位搢紳偉望禮樂上流挺松筠之貞姿服蘭蓀之懿行自居名器纍歷清華禁林才擅於多能綸閣詞推於巨麗物情愈茂延譽甚高再列二卿之崇亟闡六條之化爰加奬任益委重難屢啓嘉謨俄參大柄而周涉寒暑備見器能道已著於始終恩豈殊於中外可檢校禮部尚書梓州刺史兼御史大夫劍南東川節度使咸通初改為華州刺史潼關防禦鎮國軍等使加檢校司空河中尹河中晉絳節度使入為吏部尚書移疾請老拜太子太保分司東都卒子胤弟安潛安潛字進之大中三年登進士第咸通中纍歷清顯出為許州刺史忠武軍節度觀察等使乾符中遷成都尹劍南西川節度等使黃巢之亂從僖宗幸蜀王鐸為諸道行營都統奏安潛為副收復兩京以功纍加至檢校侍中龍紀初青州王敬武卒以安潛代敬武子師範拒命安潛赴鎮至棣州刺史張蟾出州兵攻青州為師範所敗朝廷竟授之節鉞安潛還京師纍加太子太傅卒贈太師諡曰貞孝子柅艤柅景福中為起居郎艤為右拾遺柅纍官至尚書從兄能少勵志苦學纍辟使府元和初為蜀州刺史六年轉黔中觀察使坐為南蠻所攻陷郡邑貶永州刺史穆宗即位弟從居顯列召拜將作監長慶四年九月出為廣州刺史御史大夫嶺南節度使卒子彥曾有幹局大中末歷三郡刺史咸通初纍遷太僕卿七年檢校左散騎常侍徐州刺史御史大夫充武寧軍節度使彥曾通於法律性嚴急以徐軍驕命彥曾治之長於撫養而短於軍政用親吏尹戡徐行儉當要職二人貪猥不恤軍旅士卒怨之先是六年南蠻寇五管陷交址詔徐州節度使孟球召募二千人赴援分八百人戍桂州舊三年一代至是戍卒求代尹戡以軍帑匱乏難以發兵且留舊戍一年其戍卒家人飛書桂林戍卒怒牙官許佶趙可立王幼誠劉景傅寂張實王弘立孟敬文姚周等九人殺都頭王仲甫立糧料判官龐勛為都將羣伍突入監軍院取兵甲乃剽湘潭衡山兩縣虜其丁壯乃擅回戈沿江自浙西入淮南界由濁河達泗口其衆千餘人每將過郡縣先令倡卒弄傀儡以觀人情慮其邀擊既離泗口彥曾令押牙田厚簡慰喻又令都虞候元密伏兵任山館龐勛遣吏送狀啓訴以軍士思歸勢不能遏願至府外解甲歸兵便還家彥曾怒誅之勛等擁衆攻宿州陷之出官帑召募翌日得兵二千人乃虜奪舟船五千餘艘步卒在船騎軍夾岸鼓譟而進元密發伏邀之為賊所敗時亡命者歸賊如市彥曾驅城中丁男城守九年九月十四日賊逼徐州十五日後每旦大霧不開十六日彥曾並誅逆卒家口十七日昏霧尤甚賊四面斬關而入龐勛先謁漢高祖廟便入牙城監軍張道謹相見不交一言乃止大彭館收尹戡徐行儉及判官焦璐李梲崔蘊溫廷皓韋廷乂並殺之翌日賊將趙可立害彥曾龐勛自稱武寧軍節度使慎由子胤胤字昌遐乾寧二年登進士第王重榮鎮河中辟為從事入朝纍遷考功吏部二員外郎轉郎中給事中中書舍人大順中歷兵部吏部二侍郎尋以本官同平章事時王室多故南北司爭權咸樹朋黨外結藩帥胤長於陰計巧於附麗外示凝重而心險躁自李茂貞王行瑜怙亂兵勢不遜杜讓能韋昭度繼遭誅戮而宰臣崔昭緯深結行瑜以自固而待胤以宗人之分屢加薦用纍遷中書侍郎判戶部事昭宗出幸石門胤與同列徐彥若王摶等從車駕還宮加禮部尚書並賜號扶危匡國致理功臣三年李茂貞犯京師扈昭宗幸華州帝復雪杜讓能韋昭度李磎之枉懲昭緯之前慝罷胤政事檢校兵部尚書廣州刺史嶺南東道節度等使時朱全忠方霸於關東胤密致書全忠求援全忠上疏理胤之功不可離輔弼之地胤已至湖南復召拜平章事胤既獲汴州之援頗弄威權恨徐彥若王摶發昭緯前事深排抑之俄出彥若為南海節度又托王摶交結敕使同危宗社令全忠上疏論之光化中貶摶溪州司馬賜死於藍田驛誅中尉宋道弼景務修自是朝廷權政皆歸於己兼領三司使務宦官側目不勝其忿及劉季述幽昭宗於東內以德王監國季述畏全忠之強不敢殺胤但罷知政事落使務守本官而已胤復致書於全忠請出師反正故全忠令大將張存敬急攻晉絳河中胤以天子幽囚諸侯觀釁有神策軍巡使孫德昭者頗怒季述之廢立胤伺知之令判官石戩與德昭遊伺其深意每酒酣德昭泣下戩知其誠乃與之謀曰今中外大臣自廢立已來無不含怒至於軍旅亦懷憤惋今謀反者獨季述仲先耳足下誅此二豎復帝寶位垂名萬代今正其時持疑不斷則功落他人之手也德昭謝曰豫軍吏耳社稷大計不敢自專如相公委使不敢避也胤乃割衣帶手書以通其意十二月晦德昭伏兵誅季述昭宗反正胤進位司空復知政事兼領度支鹽鐵三司等使明年夏朱全忠攻陷河中晉絳進兵至同華中尉韓全誨以胤交結全忠慮汴軍逼京師請罷知政事落使務其年冬全誨挾帝幸鳳翔胤怨帝廢黜不扈從遣使告全忠請於岐陽迎駕令太子太師盧知猷率百官迎全忠入京師初全忠至華州遣掌書記裴鑄入奏鳳翔言欲以兵士迎駕及入京師又上表曰臣獨兼四鎮逮事兩朝分數千里之封疆受二十年之恩渥微同物類猶解感知忝齒人倫寧忘報效臣昨將兵士奔赴闕庭尋過京畿遠迎車駕初因幕吏面奉德音尋有宰臣頻飛密札或以京都紛擾委制置於中朝或以鑾輅播遷俾奉迎於近甸臣是以遠離藩鎮不憚疲勞昨奉詔書兼宣口敕令臣速抽兵士且歸本藩仍遣百官俾赴行在覩綸言於鳳紙若面丹墀認御札於龍衣如親翠蓋然知從來書詔出自宰臣每降宣傳皆非聖旨致臣誤將師旅遽入關畿比令迎駕之行翻挂脅君之過臣今見與茂貞要約釋兩地猜嫌早致萬乘歸京以副八紘懇望其宰臣百官已下非臣輒有阻留伏乞詔赴行朝以備還駕昭宗得全忠表怒胤尤甚是月二十六日詔曰食君之祿合務於盡忠秉國之鈞宜思於致理其有疊膺異渥繼執重權遽萌狂悖之心忽構傾危之計人知不可天固難容扶危定亂致理功臣開府儀同三司守司空兼門下侍郎同平章事充太清宮使弘文館大學士延資庫使諸道鹽鐵轉運等使判度支上柱國魏國公食邑五千戶崔胤奕葉公台蟬聯圭組冠歲名升於甲乙壯年位列於公卿趣向有聞行藏可尚朕採於羣議詢彼輿情有冀小康遂登大用殊不知漏巵難滿小器易盈曾無報國之心但作危邦之計四居極位一無可稱豈有都城合聚兵甲暗養死士將亂國經聚貔武以保其一坊致刁斗遠連於右輔始則將京兆府官錢委元規召卒後則用度支使榷利令陳班聚兵事去公朝權歸私室百辟休戚由其顧眄之間四方是非繫彼指呼之際令狐渙姦纖有素操守無堪用作腹心共張聲勢遂令濫居深密日在禁闈罔惑朕躬僞行書詔致茲播越職爾之由豈有權重位崇恩深奬厚曾無惕厲轉恣睢盱顯構外兵將圖不軌朕以庶士流散兵革繁多遂命宰臣與之商議五降內使一貢表章堅臥不來拒召如此況又拘留庶吏廢闕晨趨人既奔驚朕須巡幸果見兵纏輦轂火照宮闈烟塵漲天干戈匝野致朕奔迫及於岐陽翠輦未安鐵騎旋至圍逼行在焚燒屋廬覩此阽危咎將誰執近省全忠章表兼遣幕吏敷陳言宰臣繼飛密緘促其兵士西上靜詳構扇孰測苞藏無功及人為國生事於戲君人之道委之宰衡庶務殷繁豈能親理盡將機事付爾主張負我何多構亂至此仍存大體不謂無恩可責授朝散大夫守工部尚書初天復反正之後宦官尤畏胤事無大小咸稟之每內殿奏對夜則繼之以燭常說昭宗請盡誅內官但以宮人掌內司事中尉韓全誨張弘彥袁易簡等伺知之於帝前求哀請命乃詔胤密事進囊封勿更口奏宦官無由知其謀乃求知書美婦人進內以偵陰事由是胤謀頗泄宦官每相聚流涕愈不自安故全誨等為劫幸之謀由胤忌嫉之太過也及全忠攻鳳翔胤寓居華州為全忠畫圖王之策天復二年全忠自岐下還河中胤迎謁于渭橋捧巵上壽持板為全忠唱歌仍自撰歌辭贊其功業三年李茂貞殺韓全誨等與全忠通和昭宗急詔徵胤赴行在凡四降詔三賜朱書御札稱病不赴及帝出鳳翔胤乃迎於中路即日降制復舊官知政事進位司徒兼判六軍諸衛事仍詔移家入左軍賜帳幄器用十車胤奏京兆尹鄭元規為六軍副使胤與全忠奏罷左右神策內諸司等使及諸道監軍副監小使內官三百餘人同日斬之于內侍省諸道監軍隨處斬首以聞昭宗初幸鳳翔命盧光啓韋貽範蘇檢等作相及還京胤皆貶斥之又貶陸扆為沂王傅王溥太子賓客學士薛貽矩夔州司戶韓偓濮州司戶姚洎景王府咨議應從幸羣官貶逐者三十餘人唯用裴贄為相以其孤立易制也內官既盡屠戮諸使悉罷天子宣傳詔命惟令宮人寵顏等宣事而欺君𢀿國所不忍聞胤所悅者闒茸下輩所惡者正人君子人人悚懼朝不保夕其年十月全忠子友倫宿衛京師因擊鞠墜馬而卒全忠愛之殺會鞠者十餘人而疑胤陰謀由是怒胤初天子還宮全忠東歸胤以事權在己慮全忠急於篡代乃與鄭元規謀招致兵甲以扞茂貞為辭全忠知其意從之胤毀城外木浮圖取銅鐵為兵仗全忠令汴州軍人入關應募者數百人及友倫死全忠怒遣其子宿衛軍使友諒誅胤而應募者突然而出四年正月初貶太子賓客尋為汴軍所殺胤傾險樂禍外示寬宏初拜平章事其季父安潛謂所親曰吾父兄刻苦樹立門戶一旦終當為緇郎所壞果如其言胤纍加至侍中封魏國公初朱全忠雖竊有河南方鎮憚河朔河東未萌問鼎之志及得胤為鄉導乃電擊潼關始謀移國自古與盜合從覆亡宗社無如胤之甚也子有鄰崔珙博陵安平人祖懿父頲貞元初進士登第元和初纍官至少府監四年出為同州刺史卒頲有子八人皆至達官時人比漢之荀氏號曰八龍長曰琯貞元十八年進士擢第又制策登科釋褐諸侯府入朝為尚書郎大和初纍遷給事中宣慰幽州稱旨俄而興元兵亂殺李絳命琯平亂褒中三軍寂然從命使還改工部侍郎四年冬拜京兆尹五年四月改尚書右丞六年十二月出為江陵尹御史大夫荊南節度使八年入為兵部侍郎轉吏部權判左丞事開成二年真拜左丞時弟珙為京兆尹兄弟並居顯列以本官權判兵部西銓吏部東銓事三年檢校戶部尚書判東都尚書省事東都留守東畿汝都防禦等使會昌中遷銀青光祿大夫檢校吏部尚書興元尹充山南西道節度使以弟珙罷相貶官琯亦罷鎮歸東都五年卒詔曰孔氏以顏冉之行首於四科漢代以荀陳之門方之八凱乃眷時哲得茲令名用舉飾終之恩以抒殲良之歎故山南西道節度使崔琯誠明履正粹密鄰幾有子政之精忠得公綽之不欲禮樂二事以為身文仁義五常自成家範往以茂器列于大僚屬賢相受誣廟堂議法由長孺之道以佑正人微京兆之言豈聞非罪既是魏其之直益彰王鳳之邪莊色于朝羣公聳視讜詞不撓淑問攸歸歷踐名藩皆留遺愛居常慎獨清則畏知爰自青襟迄于白首厲翼之志始終不渝未陟台階實辜公論追榮左相式示優崇可贈尚書左僕射珙琯之母弟也以書判拔萃高等纍佐使府性威重尤精吏術大和初纍官泗州刺史入為太府卿七年正月拜廣州刺史嶺南節度使延英中謝帝問以撫理南海之宜珙奏對明辨帝深嘉之時高瑀鎮徐州承智興之後軍驕難制軍士數犯法上欲擇威望之帥以臨之久難其才會珙言事慷慨謂宰臣曰崔珙言事神氣精爽此可以臨徐人即以王茂元代珙鎮廣南授珙兼檢校工部尚書徐州刺史兼御史大夫充武寧軍節度徐泗濠觀察使開成初就加檢校兵部尚書二年檢校吏部尚書右金吾大將軍充街使六月遷京兆尹是歲京畿旱珙奏滻水入內者十分量減九分賜貧民溉田從之三年正月盜發親仁里欲殺宰相李石其賊出於禁軍珙坐捕盜不獲罰俸料會昌初李德裕用事與珙親厚纍遷戶部侍郎充諸道鹽鐵轉運等使尋以本官同中書門下平章事纍兼刑部尚書門下侍郎進階銀青光祿大夫兼尚書左僕射素與崔鉉不叶及李讓夷引鉉輔政代珙領使務乃掎托珙領使日妄破宋滑院鹽鐵錢九十萬貫文又言珙嘗保護劉從諫坐貶澧州刺史再貶恩州司馬宣宗即位以赦召還為太子賓客出為鳳翔節度使三年崔鉉復知政事珙辭疾請罷制曰將相大臣與國同體誠欲自便豈宜不從苟非其時涉于避事前鳳翔隴州節度觀察處置等使光祿大夫檢校尚書右僕射兼鳳翔尹御史大夫上柱國安平郡開國公食邑二千戶崔珙早以器能周歷顯重行己每稱其友悌在公亦竭其精忠自負譴前朝遠移南徼及我嗣守頗聞嘉名由是剖竹近關揚旍右輔為國垣翰適資謀猷近者犬戎輸誠歸我故地下議納款且籌開疆宜其率先啓行副此寵待忽覽退間之請頗乖毗倚之誠陳力之方豈無其道匪躬之故或異於是以其故老特為優容俾居青宮之輔仍從分洛之命君臣禮分豫無愧焉可太子少師分司東都未幾卒子涓大中四年進士擢第珙弟璪璵球珦以書判拔萃開成中纍遷至刑部郎中會昌中歷三郡刺史位終方鎮璪開成初為吏部郎中轉給事中會昌初出為陝虢觀察使遷河南尹入為御史中丞轉吏部侍郎大中初改兵部侍郎充諸道鹽鐵轉運使崔鉉再輔政罷璪使務檢校兵部尚書兼河中尹御史大夫充河中晉絳磁隰等州節度觀察使七年入為左丞再遷刑部尚書子滔大中初登進士第璵字朗士長慶初進士擢第又制策登科開成末纍遷至禮部員外郎會昌初以考功郎中知制誥拜中書舍人大中五年遷禮部侍郎六年選士時謂得才七年權知戶部侍郎進封博陵子食邑五百戶轉兵部侍郎子淡淡大中十三年登進士第纍遷禮部員外郎位終吏部侍郎淡子遠遠龍紀元年登進士第大順初以員外郎知制誥召充翰林學士正拜中書舍人乾寧三年轉戶部侍郎博陵縣男食邑三百戶轉兵部侍郎承旨尋以本官同平章事遷中書侍郎兼吏部尚書天祐初從昭宗東遷洛陽罷相守右僕射二年為柳璨希朱全忠旨纍貶白州長史行至滑州被害於白馬驛遠文才清麗風神峻整人皆慕其為人當時目為釘座梨言席上之珍也球字叔休寶曆二年登進士第會昌中為鳳翔節度判官入朝為尚書郎子瀆瀆大中末亦進士登第崔氏咸通乾符間昆仲子弟紆組拖紳歷臺閣踐藩嶽者二十餘人大中以來盛族時推甲等盧鈞字子和本范陽人祖炅父繼鈞元和四年進士擢第又書判拔萃調補校書郎纍佐諸侯府大和五年遷左補闕與同職理宋申錫之枉由是知名歷尚書郎出為常州刺史九年拜給事中開成元年出為華州刺史潼關防禦鎮國軍等使其年冬代李從易為廣州刺史御史大夫嶺南節度使南海有蠻舶之利珍貨輻湊舊帥作法興利以致富凡為南海者靡不梱載而還鈞性仁恕為政廉潔請監軍領市舶使己一不干預自貞元已來衣冠得罪流放嶺表者因而物故子孫貧悴雖遇赦不能自還凡在封境者鈞減俸錢為營槥櫝其家疾病死喪則為之醫藥殯殮孤兒稚女為之婚嫁凡數百家由是山越之俗服其德義令不嚴而人化三年將代華蠻數千人詣闕請立生祠銘功頌德先是土人與蠻獠雜居婚娶相通吏或撓之相誘為亂鈞至立法俾華蠻異處婚娶不通蠻人不得立田宅由是徼外肅清而不相犯會昌初遷襄州刺史山南東道節度使四年誅劉稹以鈞檢校兵部尚書兼潞州大都督府長史昭義節度澤潞邢洺磁觀察等使是冬詔鈞出潞軍五千戍代北鈞升城門餞送其家設幄觀之潞卒素驕因與家人訣別乘醉倒戈攻城門監軍以州兵拒之至晚撫勞方定詔鈞入朝拜戶部侍郎判度支遷戶部尚書大中初檢校尚書右僕射汴州刺史御史大夫宣武軍節度宋亳汴潁觀察等使就加檢校司空四年入為太子少師進位上柱國范陽郡開國公食邑二千戶六年復檢校司空太原尹北都留守河東節度使九年詔曰河東軍節度使盧鈞長才博達敏識宏深藹山河之靈抱瑚璉之器多能不耀用晦而彰由嶺表而至太原五換節鉞仁聲載路公論彌高藩垣之和氣不衰臺閣之清風常在宜升揆路以表羣僚可尚書左僕射鈞踐歷中外事功益茂後輩子弟多至台司至是急徵謂當輔弼雖居端揆心殊失望常移病不視事與親舊遊城南別墅或纍日一歸宰臣令狐綯惡之乃罷僕射仍加檢校司空守太子太師物議以鈞長者罪綯弄權綯懼十一年九月以鈞檢校司徒同中書門下平章事興元尹充山南西道節度使入為太子太師卒裴休字公美河內濟源人也祖宣父肅肅貞元中自常州刺史兼御史中丞越州刺史浙東團練觀察等使時山賊栗鍠誘山越為亂陷浙東郡縣肅召州兵討平之因紀其事號平戎記上之德宗嘉賞肅生三子儔休俅皆登進士第休志操堅正童齔時兄弟同學于濟源別墅休經年不出墅門晝講經籍夜課詩賦虞人有以鹿贄儔者儔俅炮之召休食休曰我等窮生菜食不充今日食肉翌日何繼無宜改饌獨不食長慶中從鄉賦登第又應賢良方正升甲科大和初歷諸藩辟召入為監察御史右補闕史館修撰會昌中自尚書郎歷典數郡大中初纍官戶部侍郎充諸道鹽鐵轉運使轉兵部侍郎兼御史大夫領使如故六年八月以本官同平章事判使如故自大和已來重臣領使者歲漕江淮米不過四十萬石能至渭河倉者十不三四漕吏狡敗溺百端官舟沉溺者歲七十餘隻緣河姦吏大紊劉晏之法洎休領使分命僚佐深按其弊因是所過地里悉令縣令兼董漕事能者奬之自江津達渭口以四十萬之傭歲計緡錢二十八萬貫悉使歸諸漕吏巡院無得侵牟舉新法凡十條奏行之又立稅茶法十二條奏行之物議是之初休典使三歲漕米至渭河倉者一百二十萬斛更無沉舟之弊纍轉中書侍郎兼禮部尚書休在相位五年十年罷相檢校戶部尚書汴州刺史御史大夫充宣武軍節度使其年冬進階金紫光祿大夫上柱國河東縣子食邑五百戶守太子少保分司東都十一年冬檢校戶部尚書潞州大都督府長史御史大夫充昭義節度潞磁邢洺觀察使十三年十月加檢校吏部尚書太原尹北都留守河東節度觀察等使十四年八月以本官兼鳳翔尹充鳳翔隴州節度使咸通初入為戶部尚書纍遷吏部尚書太子少師卒休性寬惠為官不尚皎察而吏民畏服善為文長於書翰自成筆法家世奉佛休尤深於釋典太原鳳翔近名山多僧寺視事之隙遊踐山林與義學僧講求佛理中年後不食葷血常齊戒屏嗜欲香爐貝典不離齊中詠歌贊唄以為法樂與尚書紇干臮皆以法號相字時人重其高潔而鄙其太過多以詞語嘲之休不以為忤俅字冠識亦登進士第休子楊收字藏之同州馮翊人自言隋越公素之後高祖悟虛應賢良制科擢第位終朔州司馬曾祖幼烈位終寧州司馬祖藏器邠州三水丞父遺直位終濠州録事參軍家世為儒遺直客於蘇州講學為事因家于吳遺直生四子發假收嚴發字至之大和四年登進士第又以書判拔萃釋褐校書郎湖南觀察推官再辟西蜀從事入朝為監察轉侍御史纍遷至禮部郎中大中三年改左司郎中宣宗追尊順宗憲宗等尊號禮院奏廟中神主已題舊號請改造及重題詔禮官議發與都官郎中盧搏獻議曰臣等伏尋舊典栗主升祔之後在禮無改造之文亦無重加尊諡改題神主之例求之曠古敻無其文周加太王王季文王之諡但以德合王周遂加王號未聞改諡易主且文物大備禮法可稱最在兩漢並無其事光武中興都洛陽遣大司馬鄧禹入關奉高祖已下十一帝后神主祔洛陽宗廟蓋神主不合新造故也自魏晉迄於周隋雖代有放恣之君亦有知禮講學之士不聞加諡追尊改主重題書之史策可以覆視今議者惟引東晉重造鄭太后神主事為證伏以鄭太后本琅邪王妃薨後已祔琅邪邸廟其後母以子貴將升祔太廟賀循請重造新主改題皇后之號備禮告祔當時用之伏以諸侯廟主與天子廟主長短不同若以王妃八寸之主上配至極禮似不同時諂神貪君之私用此謬禮改造神主比量晉事又絶非宜且宣懿非穆宗之后實武宗之母母以子之貴已祔別廟正為得禮饗薦無虧今若從祀至尊題主稱為太后因臣因子正得其宜今乃別造新主題去太字即是穆宗上仙之後臣下追致作嬪之禮瀆亂正經實驚有識臣當時並列朝行實知謬戾以漢律擅論宗廟者以大不敬論又其時無詔下議遂默塞不敢出言今又欲重用東晉謬禮穢媟聖朝大典猥蒙下問敢不盡言臣謹按國朝前例甚有明文武德元年五月備法駕於長安通義里舊廟奉迎宣簡公懿王景皇帝神主升祔太廟既言於舊廟奉迎足明必奉舊主其加諡追尊之禮自古本無其事自則天太后攝政之後纍有之自此之後數用其禮歷檢國史並無改造重題之文若故事有之無不書於簡冊臣等愚見宜但告新諡于廟而止其改造重題之文開元初太常卿韋縚以高宗廟題武后神主云天后聖帝武氏縚奏請削去天后聖帝之號別題云則天順聖皇后武氏詔從之即不知其時削舊題耶重造主耶亦不知用何代典禮禮之疑者決在宸衷以臣所見但以新諡寶冊告陵廟正得其宜改造重題恐乖禮意時宰相覆奏就神主改題而知禮者非之以發議為是改授太常少卿出為蘇州刺史蘇發之鄉里也恭長慈幼人士稱之還改福州刺史福建觀察使甌閩之人美其能政耆老以善績聞朝廷以發長於邊事移授廣州刺史嶺南節度使屬前政不率蠻夏咸怨發以嚴為理軍亂為軍人所囚致於郵舍坐貶婺州刺史卒于治所子乘亦登進士第有俊才尤能為歌詩歷顯職假字仁之進士擢第故相鄭覃刺華州署為從事從覃鎮京口得大理評事入為監察轉侍御史由司封郎中知雜事轉太常少卿出為常州刺史卒官初遺直娶元氏生發假繼室長孫氏生收嚴收長六尺二寸廣顙深頤疏眉秀目寡言笑方於事上博聞強記初家寄涔陽甚貧收七歲喪父居喪有如成人而長孫夫人知書親自教授十三略通諸經義善於文詠吳人呼為神童兄發戲令詠蛙即曰兔邊分玉樹龍底耀銅儀會當同鼓吹不復問官私又令詠筆仍賦鑽字即曰雖匪囊中物何堅不可鑽一朝操政事定使冠三端每良辰美景吳人造門觀神童請為詩什觀者壓敗其藩收嘲曰爾幸無羸角何用觸吾藩若是升堂者還應自得門收以母奉佛幼不食肉母亦勗之曰俟爾登進士第可肉食也收以仲兄假未登第久之不從鄉賦開成末假擢第是冬收之長安明年一舉登第年才二十六時發為潤州從事因家金陵收得第東歸路由淮右故相司徒杜悰鎮揚州延收署節度推官奏授校書郎悰領度支以收為巡官悰罷相鎮東蜀奏授掌書記得協律郎悰移鎮西川復管記室宰相馬植奏授渭南尉充集賢校理改監察御史收辭曰僕兄弟進退以義頃仲兄假鄉賦未第收不出衡門今假從事侯府僕不忍先為御史相公必欲振恤孤生俟僕禀兄旨命可也馬公嘉之收即密達意於西蜀杜公願復為參佐悰即表為節度判官馬公乃以收弟嚴為渭南尉集賢校理代收之任周墀罷相鎮東蜀表嚴為掌書記墀至鎮而卒悰乃辟嚴為觀察判官兄弟同幕為兩使判官時人榮之俄而假自浙西觀察判官入為監察御史收亦自西川入為監察兄弟並居憲府特為新例裴休作相以收深於禮學用為太常博士時收弟嚴亦自揚州從事入為監察尋丁母喪歸蘇州既除崔珙罷相鎮淮南以收為觀察支使入為侍御史改職方員外郎分司東都宰相夏侯孜領度支用收為判官罷職改司勳員外郎長安令秩滿改吏部員外郎上言先人未葬旅殯毗陵擬遷卜於河南之偃師請兄弟自往從之及葬東周會葬者千人時故府杜悰夏侯孜皆在洛二公聯薦收於執政宰相令狐綯用收為翰林學士以庫部郎中知制誥正拜中書舍人賜金紫轉兵部侍郎學士承旨左軍中尉楊玄價以收宗姓深左右之乃加銀青光祿大夫中書侍郎同平章事纍遷門下侍郎刑部尚書收以交址未復南蠻擾亂請治軍江西以壯出嶺之師乃於洪州置鎮南軍屯兵積粟以餉南海天子嘉之進位尚書右僕射太清太微宮使弘文館大學士晉陽縣男食邑三百戶收居位稍務華靡頗為名輩所譏而門吏僮奴倚為姦利時楊玄價弟兄掌機務招來方鎮之賂屢有請託收不能盡從玄價以為背己由是傾之八年十月罷知政事檢校工部尚書出為宣歙觀察使韋保衡作相又發收陰事言前用嚴撰為江西節度納賂百萬明年八月貶為端州司馬尋盡削官封長流歡州又令內養郭全穆齎詔賜死九年三月十五日全穆追及之宣詔訖收謂全穆曰收為宰相無狀得死為幸心所悲者弟兄淪喪將盡只有弟嚴一人以奉先人之祀豫欲昧死上塵天聽可容一刻之命以俟秉筆乎全穆許之收自書曰臣畎畝下才謬當委任心乖報國罪積彌天特舉朝章賜之顯戮臣誠悲誠感頓首死罪臣出自寒門旁無勢援幸逢休運纍污清資聖奬曲流遂叨重任上不能罄輸臣節以答寵光下不能回避禍胎以延俊乂苟利尸素頻歷歲時果至聖朝難寬大典誠知一死未塞深愆固不合將泉壤之詞上塵天聽伏乞陛下哀臣愚蠢稍緩雷霆臣頃蒙擢在台衡不敢令弟嚴守官闕下旋蒙聖造令刺浙東所有罪愆是臣自負伏乞聖慈貸嚴微命臣血屬皆幼更無近親只有弟嚴才力悴家族所恃在嚴一人俾存歿曲全在陛下弘覆臣無任魂魄望恩之至全穆復奏懿宗愍然宥嚴判官朱侃常潾閻均族人楊公慶嚴季實楊全益何師玄李孟勳馬全祐李羽王彥復等皆配流嶺表收子鑒巨鏻皆登進士第巨乾寧初以尚書郎知制誥召充翰林學士拜中書舍人戶部侍郎封晉陽男食邑三百戶從昭宗東遷為左散騎常侍卒鏻登第後補集賢校理藍田尉乾寧中纍遷尚書郎嚴字凜之會昌四年進士擢第是歲僕射王起典貢部選士三十人嚴與楊知至竇緘源重鄭朴五人試文合格物議以子弟非之起覆奏武宗敕曰楊嚴一人可及第餘四人落下嚴釋褐諸侯府咸通中纍遷吏部員外轉郎中拜給事中工部侍郎尋以本官充翰林學士兄收作相封章請外職拜越州刺史御史中丞浙東團練觀察使收罷相貶官嚴坐貶邵州刺史收得雪嚴量移吉王傅乾符四年纍遷兵部侍郎五年判度支其年病卒二子涉注涉乾符二年登進士第昭宗朝纍遷吏部郎中禮刑二侍郎乾符四年改吏部侍郎天祐初轉左丞從昭宗遷洛陽改吏部尚書輝王即位本官平章事加中書侍郎涉性端厚秉禮乾寧之後賊臣竊發王室寖微及天祐東遷大事去矣涉為時所嬰不能自退及命相之日與家人相向灑泣曰吾不能脫此網羅禍將至矣謂其子凝式曰今日之命吾家重不幸矣必纍爾等涉謙退善處竟以令終注中和二年進士登第昭宗朝纍官考功員外刑部郎中尋知制誥正拜中書舍人召充翰林學士纍遷戶部侍郎輝王纘曆兄涉為宰相注避嫌辭內職守戶部侍郎韋保衡者字蘊用京兆人祖元貞父賣心皆進士登第賣心字端士大和初登第後纍佐使府入朝亟歷臺閣大中四年拜禮部侍郎五年選士頗得名人載領方鎮節度卒保衡咸通五年登進士第纍拜起居郎十年正月尚懿宗女同昌公主公主郭淑妃所生妃有寵出降之日傾宮中珍玩以為贈送之資尋以保衡為翰林學士轉郎中正拜中書舍人兵部侍郎承旨不期年以本官平章事保衡恃恩權素所不悅者必加排斥王鐸貢舉之師蕭遘同門生以素薄其為人皆擯斥之以楊收路巖在中書不加禮接媒孽逐之自起居郎至宰相二年之間階至特進扶風縣開國侯食邑二千戶集賢殿大學士十一年八月公主薨自後恩禮漸薄咸通末淮徐盜起素所怨者發其陰事保衡竟得罪賜死弟保乂進士登第尚書郎知制誥召充翰林學士歷禮戶兵三侍郎學士承旨坐保衡免官路巖者字魯瞻陽平冠氏人也祖季登大曆六年登進士第纍辟諸侯府升朝為尚書郎遷左諫議大夫卒生三子羣庠單皆登進士第羣字正夫既擢進士又書判拔萃纍佐使府入朝為監察御史穆宗初即位遣使西北邊犒宴軍士稱旨纍加兵部郎中大和二年遷諫議大夫以本官充侍講學士四年罷侍講為翰林學士五年正拜中書舍人學士如故羣精經學善屬文性仁孝志行貞潔父母歿後終身不茹葷血歷踐臺閣受時君異寵未嘗以勢位自矜與士友結交榮達如一八年正月病卒君子惜之二子嶽巖大中中相次進士登第巖幼聰敏過人父友踐方鎮書幣交辟久之方就數年之間出入禁署纍遷中書舍人戶部侍郎咸通三年以本官同平章事年始三十六在相位八年纍兼左僕射懿宗時王政多僻宰臣用事巖既承委遇稍務奢靡頗通賂遺及韋保衡尚公主素惡巖為人保衡作相罷巖知政事以檢校左僕射出為成都尹劍南西川節度使未幾改荊南節度詔令六月下峽赴鎮尋復罷之嶽歷兩郡刺史入為給事中子德延夏侯孜字好學本譙人父審封孜寶曆二年登進士第釋褐諸侯府纍遷婺絳二郡刺史入為諫議大夫轉給事中十年改刑部侍郎十一年兼御史中丞遷尚書右丞上柱國賜紫金魚袋十一年二月遷朝議大夫守戶部侍郎判戶部事再加兵部侍郎充諸道鹽鐵轉運等使懿宗即位以本官同平章事領使如故纍加左僕射門下侍郎封譙郡侯與路巖楊收同輔政咸通八年罷相檢校司空同平章事兼成都尹充劍南西川節度使屬南蠻入寇蜀中饑饉軍儲不備蠻陷巂州蜀川大擾尋移孜為河中尹檢校司徒河中晉絳節度使九年龐勛據徐州南蠻深入天子懲孜治蜀無政詔曰河中晉絳隰節度使開府儀同三司檢校司徒同中書門下平章事河中尹上柱國譙郡開國公食邑二千戶夏侯孜早以文詞遂登科第纍更清貫亦有能名東陽推撫俗之能故絳著臨人之稱其後用司風憲寵領藩條皆以公才不辜時選洎掌于經費備歷重難居然要會之權頗得均平之道録其績效擢處鈞衡造膝之時亦聞其算畫沃心之際備見其謀猷於是念彼邊隅控臨巴蜀藉其才術再靜蠻陬翻致帑廩空虛軍資窘竭冤流闔境寇逼連甍雖易帥已來頻移星琯而無備之後歲有干戈昨者徼障初安瘡痍復釁敷尋事實果驗根由既乖經濟之源益昧君臣之義出於物論非獨豫懷是議難處近藩爰更散秩可太子少保分司東都未幾卒子潭澤皆登進士第潭纍官至禮部侍郎中和三年選士多至卿相子坦劉瞻字幾之彭城人祖升父景瞻大中初進士擢第四年又登博學宏詞科歷佐使府咸通初升朝纍遷太常博士劉瑑作相以宗人遇之薦為翰林學士轉員外郎中正拜中書舍人戶部侍郎承旨出為太原尹河東節度使入拜京兆尹復為戶部侍郎翰林學士十年以本官同平章事加中書侍郎兼刑部尚書集賢殿大學士十一年八月同昌公主薨懿宗尤嗟惜之以翰林醫官韓宗召康仲殷等用藥無效收之下獄兩家宗族枝蔓盡捕三百餘人狴牢皆滿瞻召諫官令上疏無敢極言瞻自上疏曰臣聞修短之期人之定分賢愚共一今古攸同喬松蕣花稟氣各異至如籛鏗壽考不因有智而延齡顏子早亡不為不賢而促壽此皆含靈稟氣修短自然之理也一昨同昌公主久嬰危疾深軫聖慈醫藥無徵幽明遽隔陛下過鍾宸愛痛切追思爰責醫工令從嚴憲然韓宗召等因緣藝術備荷寵榮想於診候之時無不盡其方術亦欲病如沃雪藥暫通神其奈禍福難移竟成差跌原其情狀亦可哀矜而差誤之愆死未塞責自陛下雷霆一怒朝野震驚囚九族於狴牢因兩人之藥誤老幼械繫三百餘人咸云宗召荷恩之日寸祿不霑進藥之時又不同議此乃禍從天降罪匪己為物議沸騰道路嗟嘆陛下以寬仁厚德御宇十年四海萬邦咸歌聖政何事遽移前志頓易初心以達理知命之君涉肆暴不明之謗且殉宮女而違道囚平人而結冤此皆陛下安不思危忿不顧難者也陛下信崇釋典留意生天大要不過喜捨慈悲方便布施不生惡念所謂福田則業纍盡消往生忉利比居濁惡未可同年伏望陛下盡釋繫囚易怒為喜虔奉空王之教以資愛主之靈中外臣僚同深懇激帝閲疏大怒即日罷瞻相位檢校刑部尚書同平章事江陵尹充荊南節度等使再貶康州刺史量移虢州刺史入朝為太子賓客分司翰林學士戶部侍郎鄭畋右諫議大夫高湘比部郎中知制誥楊知至禮部郎中魏簹兵部員外張顏刑部員外崔彥融御史中丞孫瑝等皆坐瞻親善貶逐京兆尹溫璋仰藥而卒劉瑑者彭城人祖璠父煟瑑開成初進士擢第會昌末纍遷尚書郎知制誥正拜中書舍人大中初轉刑部侍郎瑑精於法律選大中以前二百四十四年制敕可行用者二千八百六十五條分為六百四十六門議其輕重別成一家法書號大中統類奏行用之出為河南尹遷檢校工部尚書汴州刺史宣武軍節度使十一年五月加檢校禮部尚書太原尹北都留守河東節度觀察等使其年十二月入朝拜戶部侍郎判度支尋以本官同平章事領使如故十二年纍加集賢殿大學士罷相又歷方鎮卒弟頊亦登進士第曹確字剛中河南人父景伯貞元十九年進士擢第又登制科確開成二年登進士第歷聘藩府入朝為侍御史以工部員外郎知制誥轉郎中入內署為學士正拜中書舍人賜金紫權知河南尹事入為兵部侍郎咸通五年以本官同平章事加中書侍郎監修國史確精儒術器識謹重動循法度懿宗以伶官李可及為威衛將軍確執奏曰臣覽貞觀故事太宗初定官品令文武官共六百四十三員顧謂房玄齡曰朕設此官員以待賢士工商雜色之流假令術踰儕類止可厚給財物必不可超授官秩與朝賢君子比肩而立同坐而食大和中文宗欲以樂官尉遲璋為王府率拾遺竇洵直極諫乃改授光州長史伏乞以兩朝故事別授可及之官帝不之聽可及善音律尤能轉喉為新聲音辭曲折聽者忘倦京師屠沽效之呼為拍彈同昌公主除喪後帝與淑妃思念不已可及乃為歎百年舞曲舞人珠翠盛飾者數百人畫魚龍地衣用官絁五千匹曲終樂闋珠璣覆地詞語悽惻聞者涕流帝故寵之嘗於安國寺作菩薩蠻舞如佛降生帝益憐之可及嘗為子娶婦帝賜酒二銀樽啓之非酒乃金翠也人無敢非之者唯確與中尉西門季玄屢論之帝猶顧待不衰僖宗即位崔彥昭奏逐之死於嶺表確纍加右僕射判度支事在相位六年九年罷相檢校司徒平章事潤州刺史鎮海軍節度觀察等使以出師扞龐勛功就加太子太師弟汾亦進士登第纍官尚書郎知制誥正拜中書舍人出為河南尹遷檢校工部尚書許州刺史忠武軍節度觀察等使入為戶部侍郎判度支弟兄並列將相之任人士榮之確與畢諴俱以儒術進用及居相位廉儉貞苦君子多之稱為曹畢畢諴者字存之鄆州須昌人也伯祖構高宗時吏部尚書構弟栩酆王府司馬生凌凌為汾州長史生勻為協律郎勻生諴少孤貧燃薪讀書刻苦自勵既長博通經史尤能歌詩端賣心好古交遊不雜大和中進士擢第又以書判拔萃尚書杜悰鎮許昌辟為從事悰領度支諴為巡官悰鎮揚州又從之悰入相諴為監察轉侍御史武宗朝宰相李德裕專政出悰為東蜀節度悰之故吏莫敢餞送問訊唯諴無所顧慮問遺不絶德裕怒出諴為磁州刺史宣宗即位德裕得罪凡被譴者皆徵還諴入為戶部員外郎分司東都歷駕部員外郎倉部郎中故事勢門子弟鄙倉駕二曹居之者不悅唯諴受命恬然恭遜口無異言執政多之改職方郎中兼侍御史知雜期年召為翰林學士中書舍人遷刑部侍郎自大中末党項羌叛屢擾河西宣宗召學士對邊事諴即援引古今論列破羌之狀上悅曰吾方擇能帥安集河西不期頗牧在吾禁署卿為朕行乎諴欣然從命即用諴為邠寧節度河西供軍安撫等使諴至軍遣使告喻叛徒諸羌率化又以邊境禦戎以兵多積穀為上策乃召募軍士開置屯田歲收穀三十萬石省度支錢數百萬詔書嘉之就加檢校工部尚書移鎮澤潞充昭義節度使二年改太原尹北都留守河東節度使太原近胡九姓為亂諴明賞罰謹斥候期年諸部革心就加檢校尚書左僕射移授汴州刺史充宣武軍節度宋亳汴觀察等使其年入為戶部尚書領度支月餘改禮部尚書同平章事纍遷中書侍郎兵部尚書集賢大學士在相位三年十月以疾固辭位詔守兵部尚書以其本官同平章事出鎮河中十二月二十三日卒于鎮時年六十二諴謹重長於文學尤精吏術在相位以同官任情不法固辭而免君子美之子紹顏知顏登進士第纍歷顯官杜審權字殷衡京兆人也國初萊成公如晦六代孫祖佐位終大理正佐生二子元潁元絳元潁穆宗朝宰相絳位終太子賓客絳生二子審權蔚並登進士第審權釋褐江西觀察判官又以書判拔萃拜右拾遺轉左補闕大中初遷司勳員外郎轉郎中知雜又以本官知制誥正拜中書舍人十年權知禮部貢舉十一年選士三十人後多至達官正拜禮部侍郎其年冬出為陝州大都督府長史陝虢都團練觀察使加檢校戶部尚書河中尹河中晉絳節度使懿宗即位召拜吏部尚書三年以本官同平章事纍加門下侍郎右僕射九年罷相檢校司空兼潤州刺史鎮海軍節度使蘇杭常等州觀察使時徐州戍將龐勛自桂州擅還據徐泗大擾淮南審權與淮南節度使令狐綯荊南節度使崔鉉奉詔出師掎角討賊而浙西饋運不絶繼破徐戎賊平召拜尚書左僕射十一年制曰開府儀同三司檢校司空守尚書左僕射上柱國襄陽郡開國公食邑二千戶杜審權韻合黃鍾行真白璧沖粹孕靈嶽之秀精明涵列宿之光塵外孤標雲間獨步踐歷華貫餘二十年鑒裁名流凡幾百輩清切之任無不試重難之務無不經靜而立名嚴以肅物絶分毫徇己之意秉尺寸度量之懷貞方飾躬溫茂繕性儉不逼下畏以居高語默適時喜慍莫見頃罷機務鎮于金陵值淮夷猖狂干戈悖起纍發猛士挫彼賊鋒廣備糗糧助茲軍食深惟將相之大體頗覩文武之全才王導以蕭灑之名不忘戎事謝安以恬淡之德亦在兵間及駟馬來朝擢居端揆嚴重自處恬曠不渝虞芮之故都前蹤尚爾郇瑕之舊地往事依然兼以股肱之良為吾腹心之寄改佩相印更握兵符仍五教之崇名極一時之盛禮可檢校司徒同平章事河中尹充河中晉絳節度觀察等使數年以本官兼許州刺史忠武軍節度觀察等使入為太子太傅分司東都卒贈太師諡曰德三子讓能彥林弘徽讓能咸通十四年登進士第釋褐咸陽尉宰相王鐸鎮汴奏為推官入為長安尉集賢校理丁母憂以孝聞服闋淮南節度使劉鄴辟掌記室得殿中賜緋入為監察牛蔚鎮興元奏為節度判官入為右補闕歷侍御史起居郎禮部兵部員外郎蕭遘領度支以本官判度支案黃巢犯京師奔赴行在拜禮部郎中史館修撰尋以本官知制誥正拜中書舍人謝日面賜金紫之服尋召充翰林學士六飛在蜀關東用兵徵發招懷書詔雲委讓能詞才敏速筆無點竄動中事機僖宗嘉之纍遷戶部侍郎從駕還京加禮部尚書進階銀青光祿大夫封建平縣開國子食邑五百戶轉兵部尚書學士承旨沙陀逼京師僖宗蒼黃出幸是夜讓能宿直禁中聞難作步出從駕出城十餘里得遺馬一匹無羈勒以紳束首而乘之駕在鳳翔朱玫兵遽至僖宗急幸寶雞近臣唯讓能獨從翌日孔緯等六七人至邠師攻關帝幸梁漢棧道為石協所毀崎嶇險阻之間不離左右帝顧謂之曰朕之失道再致播遷險難之中卿常在側古所謂忠于所事卿無負矣讓能謝曰臣家世歷重任蒙國厚恩陛下不以臣愚擢居近侍臨難苟免臣之恥也獲扞牧圉臣之幸也至褒中加金紫光祿大夫改兵部侍郎同平章事時朱玫立襄王稱制天下牧伯附之者十六七貢賦殆絶朝士才十數人行帑無寸金衛兵不宿飽帝垂泣側席無如之何讓能首陳大計請以重臣使河中諭王重榮以大義果承詔請雪以圖討逆京師平拜特進中書侍郎兼兵部尚書集賢殿大學士進封襄陽郡開國公食邑二千戶駕在鳳翔李昌符作亂倏然變起讓能單步入侍時朝臣受僞署者衆法司請行極法以戒事君讓能固爭之獲全者十七八昭宗纂嗣賜扶危啓運保乂功臣加開府儀同三司尚書左僕射封晉國公增邑千戶仍賜鐵券誅秦宗權許蔡平定加司空門下侍郎監修國史昭宗郊禮畢進位司徒太清宮使弘文館大學士延資庫使諸道鹽鐵轉運等使加食邑一千戶明年冊拜太尉加食邑一千戶自大順已來鳳翔李茂貞大聚兵甲恃功驕恣會楊復恭走山南茂貞欲兼有梁漢之地亟請問罪詔未允而出師昭宗怒其專不得已而從之及山南平詔授以茂貞鎮興元徐彥若鎮鳳翔仍割果閬兩州隸武定軍茂貞怒上章論列語辭不遜又與讓能書曰宰相之職外撫四夷內安百姓陰陽不順猶資燮理之功宇宙將傾須假扶持之力即萬靈舒慘四海安危盡繫朝綱咸由廟算既為重任方屬元臣況今國步猶艱皇居未壯曩日九衢三市草擁荒墟當時萬戶千門霜凝白骨大廈傾欹而未已沉痾綿息以無餘皆云非賢后無以拯社稷之危非真宰無以革寰區之弊今明公捨築入夢投竿為師踐履中台制臨外閫不究興亡之理罕聞沉斷之機蓋意有所不平心有所未悟輒思上問願審臧謀竊見楊守亮擅舉干戈阻艱西道將圖割據吞併東川居巴賨為一窟豺狼在梁漢致十年荊棘果聞敗衄尋挫凶狂既前去而不諧思却歸而無地當道與邠州見為隔絶綱運方舉問罪兵師忽聞朝廷授武定之雙旌割果閬之兩郡未審是何名目酬何功勞紊大國之紀綱𢀿天子之州縣非惟取笑於童稚抑亦包羞於馬牛自謂奇謀信為獨見伏慮是明公賞凶黨無君之輩挫忠臣奉國之心要助姦邪須摧正直又聞公切於保位利在安家商量不自於中書剸割全通於內地雖知深奧罕測津涯亦聞駭異羣情頗是喧騰衆口其悖戾如此京師百姓聞茂貞聚兵甲羣情恟恟數千百人守闕門候中尉西門重遂出擁馬論列曰乞不分割山南請姑息鳳翔與百姓為主重遂曰此非吾事出於宰相也昭宗怒詔讓能只在中書調發畫計不歸第月餘宰相崔昭緯陰結邠岐為城社凡讓能出一言即日達於茂貞行瑜茂貞令健兒數百人雜市人於街崔昭緯鄭延昌歸第市人擁肩輿訴曰岐帥無罪幸相公不加討伐致都邑不寧二相輿中喻之曰大政聖上委杜太尉吾等不預市豪褰簾熟視又不之識因投瓦石擊二相之輿崔鄭下輿散走匿身獲免是日喪堂印公服天子怒捕魁首誅之由是用兵之意愈堅京師之人相與藏竄嚴刑不能已讓能奏曰陛下初臨大寶國步未安自艱難已來且行貞元故事姑息藩鎮茂貞邇在國門不宜起怨臣料此時未可行也帝曰政刑削弱詔令不出城門此賈生慟哭之際也又書不云乎藥不瞑眩厥疾弗瘳朕不能孱孱度日坐觀凌弱卿為我主張調發用兵吾委諸王讓能對曰陛下憤藩臣之倔強必欲強幹弱枝以隆王室此則中外大臣所宜戮力以成陛下之志不宜獨任微臣帝曰卿位居元輔與朕同休共戚無宜避事讓能泣辭曰臣待罪台司未乞骸骨者思有以報國恩耳安敢愛身避事況陛下之心憲祖之志也但時有所不便勢有所必然他日臣雖受朝錯之誅但不足以殄七國之患敢不奉詔繼之以死景福二年秋上以嗣覃王為招討使神策將李鐬副之率禁軍三萬送彥若赴鎮崔昭緯密與邠鳳結託心害讓能言討伐非上意出於太尉也九月茂貞出軍逆戰王師敗于盩厔岐兵乘勝至三橋讓能奏曰臣固預言之矣請歸罪於臣可以紓難上涕下不能已曰與卿訣矣即日貶為雷州司戶茂貞在臨驛請誅讓能尋賜死時年五十三駕自石門還京念讓能之冤追贈太師子光乂曉以父枉橫不求聞達曉入梁位亦至宰輔彥林弘徽乾符中相次登進士第彥林光化中纍官至尚書郎知制誥拜中書舍人天祐初為御史中丞弘徽纍官至中書舍人遷戶部侍郎充弘文館學士判館事與兄同日被害劉鄴字漢藩潤州句容人也父三復聰敏絶人幼善屬文少孤貧母有廢疾三復丐食供養不離左右久之不遂鄉賦長慶中李德裕拜浙西觀察使三復以德裕禁密大臣以所業文詣郡干謁德裕閲其文倒屣迎之乃辟為從事管記室母亡哀毀殆不勝喪德裕三為浙西凡十年三復皆從之大和中德裕輔政用為員外郎居無何罷相復鎮浙西三復從之汝州刺史劉禹錫以宗人遇之深重其才嘗為詩贈三復序曰從弟三復三為浙右從事凡十餘年往年主公入相薦用登朝中復從公之京口未幾而罷昨以尚書員外郎奉使至潞旋承新命改轅而東三從公皆在舊地徵諸故事敻無其比因賦詩餞別以志之又從德裕歷滑臺西蜀揚州纍遷御史中丞會昌中德裕用事自諫議給事拜刑部侍郎弘文館學士判館事朝廷用兵誅劉稹澤潞既平朝議以劉從諫妻裴氏是裴問之妹欲原之法司定罪以劉稹之叛裴以酒食會潞州將校妻女泣告以固逆謀三復奏曰劉從諫苞藏逆謀比雖已露今推窮僕妾尤得事情據其圖謀語言制度服物人臣僭亂一至於斯雖生前幸免於顯誅而死後已從於追戮凡在朝野同深慶快且自古人臣叛逆合有三族之誅尚書曰乃有顛越不恭我則劓殄滅之無遺育無俾易種于茲新邑如此則阿裴已不得免於極法矣又況從諫死後主張狂謀罪狀非一劉稹年既幼小逆節未深裴為母氏固宜誡誘若廣說忠孝之道深陳禍福之源必冀虺毒不施梟音全革而乃激厲凶黨膠固叛心廣招將校之妻適有酒食之宴號哭激其衆意贈遺結其羣情遂使叛黨稽不捨之誅孽童延必死之命以至周歲方就誅夷此阿裴之罪也雖以裴問之功或希減等而國家有法難議從輕伏以管叔周公之親弟也有罪而且誅之以周公之賢尚不捨兄弟之罪況裴問之功效安能破朝廷法耶據阿裴廢臣妾之道懷逆亂之謀裴問如周公之功尚合行周公之戮況於朝典固在不疑阿裴請準法從之三復未幾病卒鄴六七歲能賦詩李德裕尤憐之與諸子同硯席師學大中初德裕貶逐鄴無所依以文章客遊江浙每有制作人皆稱誦高元裕廉察陝虢署為團練推官得祕書省校書郎咸通初劉瞻高璩居要職以故人子薦為左拾遺召充翰林學士轉尚書郎中知制誥正拜中書舍人戶部侍郎學士承旨鄴以李德裕貶死珠崖大中朝以令狐綯當權纍有赦宥不蒙恩例懿宗即位綯在方鎮屬郊天大赦鄴奏論之曰故崖州司戶參軍李德裕其父吉甫元和中以直道明誠高居相位中外咸理訏謨有功德裕以偉望宏才繼登台衮險夷不易徑正無羣稟周勃厚重之姿慕楊秉忠貞之節頃以微纍竄于遐荒既迫衰殘竟歸冥寞其子燁坐貶象州立山縣尉去年遇陛下布惟新之命覃作解之恩移授郴州郴縣尉今已歿於貶所倘德裕猶有親援可期振揚微臣固不敢上論以招浮議今骨肉將盡生涯已空皆傷棨戟之門遽作荊榛之地孤骨未歸於塋兆一男又沒於湘江特乞聖明俯垂哀愍俾還遺骨兼賜贈官上弘録舊之仁下激徇公之節詔從之鄴尋以本官領諸道鹽鐵轉運使其年同平章事判度支轉中書侍郎兼吏部尚書纍加太清宮使弘文館大學士僖宗即位蕭倣崔彥昭秉政素惡鄴乃罷鄴知政事檢校尚書左僕射同平章事揚州大都督府長史淮南節度使是日鄴押班宣麻竟通事引鄴內殿謝不及笏記鄴自十餘句語云霖雨無功深愧代天之用烟霄失路未知歸骨之期帝為之惻然黃巢渡淮而南詔以浙西高駢代還尋除鳳翔尹鳳翔隴右節度使以疾辭拜左僕射巢賊犯長安鄴從駕不及與崔沆豆盧瑑匿於金吾將軍張直方之家旬日賊嚴切追捕三人夜竄為賊所得迫以僞命稱病不應俱為賊所害豆盧瑑者河東人祖願父籍皆以進士擢第瑑大中十三年亦登進士科咸通末纍遷兵部員外郎轉戶部郎中知制誥召充翰林學士正拜中書舍人乾符中纍遷戶部侍郎學士承旨六年與吏部侍郎崔沆同日拜平章事宣制日大風雷雨拔樹左丞韋蟾與瑑善往賀之瑑言及雷雨之異蟾曰此應相公為霖作解之祥也瑑笑答曰霖何甚耶及巢賊犯京師從僖宗出開遠門為盜所制乃匿於張直方之家遇害識者以風雷不令之兆也弟瓚璨皆進士登第纍歷清要瓚子革中興位亦至宰輔史臣曰近代衣冠人物門族昌盛從頲之後實富名流而彥曾屬徐亂之秋胤接李亡之數計則繆矣天可逃乎楊劉曹畢諸族門非世胄位以藝升伏膺典墳俯拾青紫而收得位求侈以至敗名行己飭躬此為深誡杜氏三世輔相太尉陷於橫流臨難忘身可為流涕贊曰漢代荀陳我朝崔杜有子有弟多登宰輔裴士改節楊子敗名膏粱移性信而有徵
