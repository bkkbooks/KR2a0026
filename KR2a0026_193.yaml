body:
  text: 舊唐書卷一百八十七上列傳第一百三十七上忠義上夏侯端劉感常達羅士信呂子臧張道源族子楚金附李公逸張善相李玄通敬君弘馮立謝叔方王義方成三郎尹元貞高睿子仲舒崔琳附王同皎周憬附蘇安恆俞文俊王求禮燕欽融郎岌附安金藏語曰無求生以害仁有殺身以成仁孟軻曰生亦我所欲義亦我所欲捨生而取義可也古之德行君子動必由禮守之以仁造次顛沛不愆于素有若仲由之結纓鉏麑之觸樹紀信之蹈火豫讓之斬衣此所謂殺身成仁臨難不苟者也然受刑一代顧瞻七族不犯難者有終身之利隨市道者獲當世之榮苟非氣義不羣貞剛絶俗安能碎所重之支體徇他人之義哉則由麑信讓之徒君人者常宜血祀況自有其臣乎即如安金藏剖腹以明皇嗣段秀實挺笏而擊元凶張巡姚誾之守城杲卿真卿之罵賊又愈於金藏秀實等各見本傳今採夏侯端李憕已下附于此篇夏侯端壽州壽春人梁尚書左僕射詳之孫也仕隋為大理司直高祖龍潛時與其結交大業中高祖帥師於河東討捕乃請端為副時煬帝幸江都盜賊日滋端頗知玄象善相人説高祖曰金玉牀搖動此帝座不安參墟得歲必有真人起於實沉之次天下方亂能安之者其在明公但主上曉察情多猜忍切忌諸李強者先誅金才既死明公豈非其次若早為計則應天福不然者則誅矣高祖深然其言及義師起端在河東為吏所捕送于長安囚之高祖入京城釋之引入臥內與語極歡授祕書監屬李密為王世充所破以衆來降關東之地未有所屬端固請往招諭之乃加大將軍持節為河南道招慰使至黎陽李績發兵送之自澶水濟河傳檄郡縣東至于海南至于淮二十餘州並遣使送款行次譙州會亳州刺史丁叔則及汴州刺史王要漢並以所部降於世充路遂隔絶端素得衆心所從二千人雖糧盡不忍委去端知事必不濟乃坐澤中盡殺私馬以會軍士因歔欷曰今王師已敗諸處並沒卿等土壤悉皆從偽特以共事之情未能見委然我奉王命不可從卿有妻子無宜效我可斬吾首持歸於賊必獲富貴衆皆流涕端又曰卿不忍見殺吾當自刎衆士抱持之皆曰公於唐家非有親屬但以忠義之故不辭於死諸人與公共事經涉艱危豈有害公而取富貴復與同進潛行五日餒死者十三四又為賊所擊奔潰相失者大半端唯與三十餘人東走採生豆而食之猶持節與之俱臥起謂衆人曰平生不知死地乃在此中我受國恩所以然耳今卿等何乃相伴死乎可散投賊猶全性命吾當抱此一節與之俱殞衆又不去屬李公逸為唐守杞州聞而勒兵迎館之于時河南之地皆入世充唯公逸感端之義獨堅守不下世充遣使召端解衣遺之禮甚厚仍送除書以端為淮南郡公吏部尚書端對其使者曰夏侯端天子大使豈受王世充之官自非斬我頭將往見汝何容身苟活而屈於賊乎遂焚其書拔刀斬其所遺衣服因發路西歸解節旄懷之取竿加刃從間道得至宜陽初山中險峻先無蹊徑但冒履榛梗晝夜兼行從者三十二人或墜崖溺水遇猛獸而死又半其餘至者皆鬢髮禿落形貌枯瘠端馳驛奉見但謝無功殊不自言艱苦高祖憫之復以為祕書監俄出為梓州刺史所得料錢皆散施孤寡貞觀元年病卒劉感岐州鳳泉人後魏司徒高昌王豐生之孫也武德初以驃騎將軍鎮涇州薛仁杲率衆圍之感嬰城拒守城中糧盡遂殺所乘馬以分將士感一無所噉唯馬骨取汁和木屑食之城垂陷者數矣長平王叔良援兵至仁杲解圍而去感與叔良出戰為賊所擒仁杲復圍涇州令感語城中云援軍已敗徒守孤城何益也宜早出降以全家室感許之及至城下大呼曰逆賊飢餓亡在朝夕秦王率數十萬衆四面俱集城中勿憂各宜自勉以全忠節仁杲大怒執感於城邊埋腳至膝馳騎射殺之至死聲色逾厲賊平高祖購得其尸祭以少牢贈瀛州刺史封平原郡公諡曰忠壯令其子襲官爵並賜田宅常達陝人也初仕隋為鷹揚郎將數從高祖征伐甚蒙親待及義兵起達在霍邑從宋老生來拒戰老生敗達懼自匿不出高祖謂達已死令人閲尸求之及達奉見高祖大悅以為統軍武德初拜隴州刺史時薛舉屢攻之不能克乃遣其將仵士政以數百人偽降達達不之測厚加撫接士政伺隙以其徒劫達擁城中二千人而叛牽達以見於舉達詞色抗厲不為之屈舉指其妻謂達曰識皇后否達曰正是癭老嫗何足可識竟釋之有賊帥張貴謂達曰汝識我否答曰汝逃死奴瞋目視之貴怒拔刀將斫達人救之獲免及仁杲平高祖見達謂曰卿之忠節便可求之古人命起居舍人令狐德棻曰劉感常達須載之史策也執仵士政撲殺之賜達布帛三百段復拜隴州刺史卒羅士信齊州歷城人也大業中長白山賊王簿左才相孟讓來寇齊郡通守張須陀率兵討擊士信年始十四固請自效須陀謂曰汝形容未勝衣甲何可入陳士信怒重著二甲左右雙鞬而上馬須陀壯而從之擊賊濰水之上陳才列士信馳至賊所刺倒數人斬一人首擲於空中用槍承之戴以略陳賊衆愕然無敢逼者須陀因而奮擊賊衆大潰士信逐北每殺一人輒劓其鼻而懷之及還則驗鼻以表殺賊之多少也須陀甚加歎賞以所乘馬遺之引置左右每戰須陀先登士信為副煬帝遣使慰喻之又令畫工寫須陀士信戰陳之圖上于內史及須陀為李密所殺士信隨裴仁基率衆歸于密署為總管使統所部隨密擊王世充敗士信躍馬突進身中數矢乃陷於世充軍世充知其驍勇厚禮之與同寢食後世充破李密得密將邴元真等盡拜為將軍不復專重之士信恥與為伍率所部千餘人奔于穀州高祖以為陝州道行軍總管使圖世充及大軍至洛陽士信以兵圍世充千金堡中有大罵之者士信怒夜遣百餘人將嬰兒數十至于堡下詐言從東都來投羅總管因令嬰兒啼譟既而佯驚曰此千金堡吾輩錯矣忽然而去堡中謂是東都逃人遽出兵追之士信伏兵於路俟其開門奮擊大破之殺無遺類世充平擢授絳州總管封剡國公尋從太宗擊劉黑闥於河北有洺水人以城來降遣士信入城據守賊悉衆攻之甚急遇雨雪大軍不得救經數日城陷為賊所擒黑闥聞其勇意欲活之士信詞色不屈遂遇害年二十太宗聞而傷惜購得其尸葬之諡曰勇士信初為裴仁基所禮嘗感其知己之恩及東都平遂以家財收斂葬於北邙又云我死後當葬此墓側及卒果就仁基左而託葬焉呂子臧蒲州河東人也大業末為南陽郡丞高祖克京師遣馬元規撫慰山南子臧堅守不下元規遣使諷諭之前後數輩皆為子臧所殺及煬帝被殺高祖又遣其壻薛君倩賫手詔諭旨子臧乃為煬帝發喪成禮而後歸國拜鄧州刺史封南陽郡公時朱粲新敗子臧率所部數千人與元規並力將擊之謂元規曰朱粲新破之後上下危懼一戰可擒若更遷延部衆稍集力強食盡必死戰於我為患不細也元規不納子臧請以本兵獨戰又不許俄而粲衆大至元規懼退保南陽子臧謂元規曰言不見納以至於此老夫今坐公死矣粲果率兵圍之遇霖雨城壁皆壞所親者知城必陷固勸其降子臧曰安有天子方伯降賊者乎於是率其麾下赴敵而死俄而城陷元規亦遇害張道源並州祁人也年十五父死居喪以孝行稱縣令郭湛改其所居為復禮鄉至孝里道源嘗與友人客遊友人病中宵而卒道源恐驚擾主人遂共尸臥達曙方哭親步營送至其本鄉里高祖舉義召授大將軍府戶曹參軍及平京城遣道源撫慰山東燕趙之地爭來款附高祖下書褒美纍封范陽郡公後拜大理卿時何稠士澄有罪家口籍沒仍以賜之道源歎曰人有否泰蓋亦是常安可因己之泰利人之否取其子女以為僕妾豈近仁者之心乎皆捨之一無所取尋轉太僕卿後歷相州都督武德七年卒官贈工部尚書諡曰節道源雖歷職九卿身死日唯有粟兩石高祖深異之賜其家帛三百段族子楚金楚金少有志行事親以孝聞初與兄越石同預鄉貢進士州司將罷越石而薦楚金辭曰以順則越石長以才則楚金不如固請俱退時李績為都督歎曰貢士本求才行相推如此何嫌雙居也乃俱薦擢第楚金高宗時纍遷刑部侍郎儀鳳年有妖星見楚金上疏極言得失高宗優納賜帛二百段則天臨朝歷位吏部侍郎秋官尚書賜爵南陽侯為酷吏周興所陷配流嶺表竟卒於徙所著翰苑三十卷紳誡三卷並傳於時李公逸汴梁雍丘人也隋末與族弟善行以義勇為人所附初歸王世充知其必敗遣間使請降高祖因以雍丘置杞州拜為總管封陽夏郡公又以善行為杞州刺史世充遣其從弟辨率衆攻之公逸遣使請援高祖以其懸隔賊境未即出兵公逸乃留善行居守自入朝請援行至襄城為世充伊州刺史張殷所獲送于洛陽世充謂曰卿越鄭臣唐其説安在公逸答曰我於天下唯聞有唐世充怒斬之善行竟沒於賊高祖聞而悼惜封其子為襄邑縣公張善相許州襄城人也大業末為里長每督縣兵逐小盜為衆所附遂據本郡歸於李密密敗以城歸國高祖授伊州總管王世充數攻之善相頻遣使請救兵既不赴城中糧盡自知必敗謂僚屬曰死當斬吾頭以歸世充衆皆泣曰寧與公同死終不獨生後城陷被擒送於世充辭色不撓罵世充極口尋被害高祖歎曰吾負善相善相不負吾封其子為襄城郡公李玄通雍州藍田人仕隋鷹揚郎將義兵入關率所部歸國纍除定州總管劉黑闥反叛攻之城陷被擒黑闥重其才欲以為大將玄通歎息曰吾荷朝恩作藩東夏孤城無援遂陷虜庭當守臣節以忠報國豈能降志輒受賊官拒而不受故吏有以酒食餽之者玄通曰諸君哀吾困辱故以酒食來相寬慰吾當為諸君一醉遂與樂飲謂守者曰吾能舞劍可借吾刀守者與之及曲終太息而言大丈夫受國厚恩鎮撫方面不能保全所守亦何面目視息世間哉因潰腹而死高祖聞而為之流涕拜其子伏護為大將敬君弘絳州太平人齊右僕射顯雋曾孫也武德中為驃騎將軍封黔昌縣侯掌屯營兵於玄武門加授雲麾將軍隱太子建成之誅也其餘黨馮立謝叔方率兵犯玄武門君弘挺身出戰其所親止之曰事未可知當且觀變待兵集成列而戰未晚也君弘不從乃與中郎將呂世衡大呼而進並遇害太宗甚嗟賞之贈君弘左屯衛大將軍世衡右驍衛將軍馮立同州馮翊人也有武藝略涉書記隱太子建成引為翊衛車騎將軍託以心膂建成被誅其左右多逃散立歎曰豈有生受其恩而死逃其難於是率兵犯玄武門苦戰久之殺屯營將軍敬君弘謂其徒曰微以報太子矣遂解兵遁於野俄而來請罪太宗數之曰汝在東宮潛為間構阻我骨肉汝罪一也昨日復出兵來戰殺傷我將士汝罪二也何以逃死對曰出身事主期之效命當職之日無所顧憚因伏地歔欷悲不自勝太宗慰勉之立歸謂所親曰逢莫大之恩幸而獲濟終當以死奉答未幾突厥至便橋立率數百騎與虜戰於咸陽殺獲甚衆太宗聞而嘉歎拜廣州都督前後作牧者多以黷貨為蠻夷所患由是數怨叛立到不營産業衣食取給而已嘗至貪泉歎曰此吳隱之所酌泉也飲一杯水何足道哉吾當汲而為食豈止一杯耶安能易吾性乎遂畢飲而去在職數年甚有惠政卒於官謝叔方雍州萬年人也初從巢剌王元吉征討數有戰功元吉奏授屈嘻直府左軍騎太宗誅隱太子及元吉于玄武門叔方率府兵與馮立合軍拒戰于北闕下殺敬君弘呂世衡太宗兵不振秦府護軍尉遲敬德傳元吉首以示之叔方下馬號哭而遁明日出首太宗曰義士也命釋之歷遷西伊二州刺史善綏邊鎮胡戎愛而敬之如事嚴父貞觀末纍加銀青光祿大夫歷洪廣二州都督永徽中卒王義方泗州漣水人也少孤貧事母甚謹博通五經而謇傲獨行初舉明經因詣京師中路逢徒步者自云父為潁上令聞病篤倍道將往焉徒步不前計無所出義方解所乘馬與之不告姓名而去俄授晉王府參軍直弘文館特進魏徵甚禮之將以姪女妻之義方竟娶徵之姪女告人曰昔不附宰相之勢今感知己之言故也轉太子校書無何坐與刑部尚書張亮交通貶為儋州吉安丞行至海南舟人將以酒脯致祭義方曰黍稷非馨義在明德乃酌水而祭為文曰思帝鄉而北顧望海浦而南浮必也行愆諸己義負前修長鯨擊水天吳覆舟因忠獲戾以孝見尤四維霧廓千里安流靈應如響無作神羞時當盛夏風濤蒸毒既而開霽南渡吉安蠻俗荒梗義方召諸首領集生徒親為講經行釋奠之禮清歌吹籥登降有序蠻酋大喜貞觀二十三年改授洹水丞時張亮兄子皎配流在崖州來依義方而卒臨終託以妻子及致尸還鄉義方與皎妻自誓於海神使奴負柩令皎妻抱其赤子乘義方之馬身獨步從而還先之原武葬皎告祭張亮送皎妻子歸其家而往洹水轉雲陽丞擢為著作佐郎顯慶元年遷侍御史時中書侍郎李義府執權用事婦人淳于氏有美色坐事繫大理義府悅之託大理丞畢正義枉法出之高宗又敕給事中劉仁軌侍御史張倫重按其事正義自縊高宗特原義府之罪義方以義府姦蠹害政將加彈奏以問其母母曰昔王陵母伏劍成子之義汝能盡忠立名吾之願也雖死不恨義方乃先奏曰臣聞春鶯鳴於獻歲蟋蟀吟於始秋物有微而應時人有賤而言忠臣去歲冬初雲陽下縣丞耳今春及夏陛下擢臣著作佐郎極文學之清選未幾又拜臣侍御史濫朝廷之雄職顧視生涯隕首非報唯欲有犯無隱以廣天聽伏以李義府枉殺寺丞陛下已赦之臣不應更有鞫問然天子置三公九卿二十七大夫八十一元士本欲水火相濟鹽梅相成然後庶績咸熙風雨交泰亦不可獨是獨非皆由聖旨昔唐堯失之於四凶漢祖失之於陳豨光武失之於逢萌魏武失之於張邈此四帝者英傑之主然失之於前得之於後今陛下繼聖撫育萬邦蠻陬夷落猶懼疏網況輦轂咫尺姦臣肆虐足使忠臣抗憤義士扼腕縱令正義自縊彌不可容便是畏義府之權勢能殺身以滅口此則生殺之威上非主出賞罰之柄下移佞寵臣恐履霜堅冰積小成大請重鞫正義死由雪冤氣於幽泉誅姦臣於白日乃廷劾義府曰臣聞附下罔上聖主之所宜誅心狠貌恭明時之所必罰是以隱賊掩義不容唐帝之朝竊幸乘權終齒漢皇之劍中書侍郎李義府因緣際會遂階通顯不能盡忠竭節對揚王休策蹇勵駑祗奉皇眷而反憑附城社蔽虧日月請託公行交遊羣小貪冶容之美原有罪之淳于恐漏泄其謀殞無辜之正義雖挾山超海之力望此猶輕回天轉日之威方斯更劣此而可恕孰不可容金風屆節玉露啓塗霜簡與秋典共清忠臣將鷹鸇並擊請除君側少答鴻私碎首玉階庶明臣節高宗以義方毀辱大臣言詞不遜左遷萊州司戶參軍秩滿家于昌樂聚徒教授母卒遂不復仕進總章二年卒年五十五撰筆海十卷文集十卷門人何彥光員半千為義方制師服三年喪畢而去半千者齊州全節人也事義方經十餘年博涉經史知名河朔則天時官至天官侍郎撰三國春秋二十卷行於代自有傳成三郎幽州漁陽人也光宅年為左豹韜衛長上果毅李孝逸之討徐敬業以為前鋒與賊戰於高郵官軍敗績被擒送于江都賊黨唐之奇紿其衆曰此李孝逸也將斬之三郎大呼曰我是果毅成三郎不是將軍李孝逸官軍已圍爾數重破爾在於朝夕我死妻子受榮爾死家口配沒終不及我之奇怒斬之敬業平贈左監門將軍諡曰勇時曲阿令尹元貞亦死敬業之難尹元貞者瀛州河間人也在曲阿聞敬業攻陷潤州率兵赴援及戰敗被擒敬業臨以白刃脅令附己將加任用元貞詞色慷慨竟不之屈尋遇害敬業平贈潤州刺史諡曰壯高睿雍州萬年人隋尚書左僕射熲孫也父表仁穀州刺史睿少以明經纍除桂州都督尋加銀青光祿大夫轉趙州刺史封平昌縣子聖曆初突厥默啜來寇睿嬰城固守長史唐波若見城圍甚急遂潛謀應賊睿覺之將自殺不死俄而城陷被擒更令招喻諸縣未降者睿竟不從遂為所殺初賊將至州境或謂睿曰突厥所向無前百姓喪膽明公力不能禦不若降之睿曰吾為天子刺史不戰而降其罪大矣則天聞而深歎息之贈冬官尚書諡曰節及賊退唐波若伏誅家口籍沒因下制曰故趙州刺史高睿狂賊既至死節不降長史唐波若不能固城相率歸賊高睿已加褒贈波若等身死破家賞罰既行須敦懲勸宜頒示天下咸使知聞子仲舒博通經史尤明三禮及詁訓之書神龍中為相王府文學王甚敬重之開元中纍授中書舍人侍中宋璟中書侍郎蘇頲每詢訪故事焉時又有中書舍人崔琳深達政理璟等亦禮焉嘗謂人曰古事問高仲舒今事問崔琳則又何所疑矣仲舒纍遷太子右庶子卒王同皎相州安陽人陳侍中駙馬都尉寬之曾孫其先自琅邪仕江左陳亡徙家河北同皎長安中尚皇太子女定安郡主授朝散大夫行太子典膳郎敬暉等討張易之兄弟也遣同皎與右羽林將軍李多祚迎太子於東宮請太子至玄武門指麾將士太子初拒而不許同皎諷諭切至太子乃就駕以功授右千牛將軍封琅邪郡公賜實封五百戶及郡主進封為公主拜同皎為駙馬都尉尋加銀青光祿大夫遷光祿卿神龍二年同皎以武三思專權任勢謀為逆亂乃招集壯士期以則天靈駕發引劫殺三思同謀人撫州司倉冉祖雍具以其計密告三思三思乃遣校書郎李悛上言同皎潛謀殺三思後將擁兵詣闕廢黜皇后帝然之遂斬同皎于都亭驛前籍沒其家臨刑神色不變天下莫不冤之睿宗即位令復其官爵執冉祖雍李悛並誅之初與同皎叶謀有武當丞周憬者壽州壽春人也事既泄遁於比干廟中自刎而死臨終謂左右曰比干古之忠臣也倘神道聰明應知周憬忠而死也韋后亂朝寵樹邪佞武三思干上犯順虐害忠良吾知其滅亡不久也可懸吾頭於國門觀其身首異門而出其後皆如其言蘇安恆冀州武邑人也博學尤明周禮及春秋左氏傳大足元年投匭上疏曰陛下欽聖皇之顧託受嗣子之推讓應天順人二十年矣豈不思虞舜褰裳周公復辟良以大禹至聖成王既長推位讓國其道備焉故舜之於禹是其族親旦與成王不離叔父且族親何如子之愛叔父何如母之恩今太子孝敬是崇春秋既壯若使統臨宸極何異陛下之身陛下年德既尊寶位將倦機務殷重浩蕩心神何不禪位東宮自怡聖體臣聞自昔明王之孝理天下者不見二姓而俱王也當今梁定河內建昌諸王等承陛下之蔭覆並得封王臣恐千秋萬歲之後於事非便臣請黜為公侯任以間簡臣又聞陛下有二十餘孫今無尺土之封此非長久之計也臣請四面都督府及要衝州郡分土而王之縱今年尚幼小未嫻養人之術請擇立師傅成其孝敬之道將以夾輔周室藩屏皇家使纍葉重光饗祀不輟斯為美矣豈不大哉疏奏則天召見賜食慰諭而遣之長安二年又上疏曰忠臣不順時而取寵烈士不惜死而偷生故君道不明者忠臣之過歟臣道不軌者烈士之過歟昔者先皇晏駕留其顧託將以萬機殷廣令陛下兼知其事雖唐堯虞舜居其位而共工歡兜在其間陛下骨肉之恩阻陛下子母之愛忘臣謂聖情以運祚將喪極斯大節天下謂陛下微弱李氏貪天之功何以年在耄倦而不能復子明辟使忠言莫進姦佞成朋夷狄紛擾屠害黎庶陛下雖納隍軫念亦罔能救此生靈臣聞天下者神堯文武之天下也昔有隋失馭小人道長羣雄駭鹿四海瞻烏皇唐親事戎旃鳳翔參野削平宇縣龍踐宸極歃血為盟指河為誓非李氏不王非功臣不封陛下雖居正統實唐氏舊基故詩曰惟鵲有巢唯鳩居之此言雖小可以喻大陛下自坤生德乘乾作主豈不以上符天意下順人心東宮昔在諒陰相王又非長子陛下恐宗祀中絶所以應其謳歌當今太子追回年德俱盛陛下貪其寶位而忘母子深恩臣聞京邑翼翼四方取則陛下蔽太子之元良枉太子之神器何以教天下母慈子孝焉能使天下移風易俗焉惟陛下思之將何聖顏以見唐家宗廟將何誥命以謁大帝墳陵陛下何故日夜積憂不知鐘鳴漏盡臣愚以天意人事還歸李家陛下雖安天位殊不知物極則反器滿則傾故語曰當斷不斷反受其亂此之謂也陛下不如高揖機務自恬聖躬命史臣以書之令樂府以歌之斯亦太平之盛事也臣聞見過不諫非忠臣也畏死不言非勇士也臣何惜一朝之命而不安萬乘之國哉故曰苟利國家雖死可矣願陛下稍輟萬機詳臣愚見陛下若以臣為忠則從諫如流擇是而用若以臣為不忠則斬取臣頭以令天下疏奏不納明年御史大夫魏元忠為張易之兄弟所構安恆又抗疏申理之曰臣聞明王有含天下之量有濟天下之心能進天下之善除天下之惡若為君王而不行此四者則當神冤鬼怒陰錯陽亂欲使國家榮泰其可得乎陛下革命之初勤於庶政親總萬機博採謀猷傍求俊乂故海內以陛下為納諫之主矣暮年已來怠於政教讒邪結黨水火成災百姓不親五品不遜故四海之內以陛下為受佞之主矣當今邪正莫辨訴訟含冤豈陛下昔是而今非蓋居安忘危之失也臣竊見御史大夫檢校太子右庶子同鳳閣鸞臺平章事魏元忠廉直有聞位居宰輔履忠正之基者用元忠為龜鏡踐邪佞之路者嫉元忠若仇讎麟臺監張易之兄弟在身無德於國無功不逾數年遂極隆貴自當飲冰懷懼酌水思清夙夜兢兢以答恩造不謂溪壑其志豺狼其心欲指鹿而獻馬先害忠而損善將斯亂代之法汙我明君之朝自元忠下獄臣見長安城內街談巷議皆以陛下委任姦宄斥逐賢良以元忠必無不順之言以易之必有交亂之意相逢偶語人心不安雖有忠臣烈士空撫髀於私室而鉗口不敢言者皆懼易之等威權恐無辜而受戮亦徒虛死耳今賊虜強盛徵斂煩重以臣言之萬姓不勝其弊況又聞陛下縱逸讒慝禁錮良善賞刑失中則遐邇生變臣恐四夷因之則窺覘得失以為邊郡之患百姓因之即結聚義兵以除君側之惡復恐逐鹿之黨叩關而至亂階之徒從中相應爭鋒於朱雀門內問鼎於大明殿前陛下將何事以謝之復何方以禦之臣今為陛下計安百姓之心者莫若收雷電之威解元忠之網復其爵位君臣如初則天下幸甚陛下好生惡殺縱不能斬佞臣頭以塞人望臣請奪其榮寵翦其羽翼無使權柄在手驕橫日滋專國倍於穰侯回天過於左悺則社稷危矣惟陛下圖之臣本微賤不識元忠易之豈此可親而彼可疏但恐讒邪長而忠臣絶伏願陛下暫垂天鑒察臣此心即微臣朝志得行夕死無恨疏奏易之等大怒欲遣刺客殺之賴正諫大夫朱敬則鳳閣舍人桓彥範著作郎魏知古等保護以免安恆神龍初為集藝館內教節愍太子之殺武三思也或言安恆預其謀遂下獄死睿宗即位知其冤下制曰故蘇安恆文學基身鯁直成操往年抗疏忠讜可嘉屬回邪擅構奄從非命興言軫悼用惻于懷宜贈寵章式旌徽烈可贈諫議大夫時又有俞文俊王求禮亦以直言見稱俞文俊者荊州江陵人則天載初年新豐因風雷山移乃改縣名為慶山四方畢賀文俊詣闕上書曰臣聞天氣不和而寒暑併人氣不和而疣贅生地氣不和而塠阜出今陛下以女主處陽位反易剛柔故地氣隔塞而山變為災陛下謂之慶山臣以為非慶也臣愚以為宜側身修德以答天譴不然恐殃禍至矣則天大怒流於嶺外後為六道使所殺王求禮者許州長社人則天時為左拾遺時武懿宗統兵討契丹畏不敢進及賊平懿宗奏滄瀛等數百家從賊請誅之求禮廷折之曰此等素無武備城池不完遇賊畏懼苟從之以求生豈素有背叛之心也懿宗擁強兵數十萬聞賊輒退使其滋蔓又欲移罪於草澤詿誤之人豈為臣之道臣請先斬懿宗以謝河北懿宗不能答則天遂寬脅從者之罪後都城三月雨雪鳳閣侍郎蘇味道以為瑞雪率羣官表賀求禮曰公為宰相不能燮理陰陽非時降雪又將災而為瑞誣罔視聽若以三月雪為瑞雪即臘月雷亦為瑞雷耶味道不從求禮纍遷左臺殿中侍御史神龍初為衛王掾病卒燕欽融洛州偃師人也景龍末為許州司戶參軍時韋庶人干預國政盛封拜羣從子弟又與悖逆庶人及駙馬都尉武延秀中書令宗楚客等將圖危宗社欽融連上奏其事庶人大怒勸中宗召欽融廷見撲殺之宗楚客又私令執法者加刃欽融因而致死睿宗即位下制曰故許州司戶參軍燕欽融先陳忠讜頗列章奏雖干非其位而進不顧身永言奄亡誠所傷悼方開諫路宜慰窀穸可贈諫議大夫仍令備禮改葬特授一子官先是定州人郎岌亦備陳韋庶人及宗楚客將為逆亂之狀中宗不納而韋庶人勸杖殺之睿宗即位追贈諫議大夫安金藏京兆長安人初為太常工人載初年則天稱制睿宗號為皇嗣少府監裴匪躬內侍范雲仙並以私謁皇嗣腰斬自此公卿已下並不得見之唯金藏等工人得在左右或有誣告皇嗣潛有異謀者則天令來俊臣窮鞫其狀左右不勝楚毒皆欲自誣唯金藏確然無辭大呼謂俊臣曰公不信金藏之言請剖心以明皇嗣不反即引佩刀自剖其胸五藏並出流血被地因氣絶而仆則天聞之令輿入宮中遣醫人却納五藏以桑白皮為線縫合傅之藥經宿金藏始蘇則天親臨視之歎曰吾子不能自明不如爾之忠也即令俊臣停推睿宗由是免難金藏神龍初喪母寓葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出又自李樹盛冬開花犬鹿相狎本道使盧懷慎上聞敕旌表其門景雲中纍遷右武衛中郎將玄宗即位追思金藏忠節下制褒美擢拜右驍衛將軍乃令史官編次其事元二十年又特封代國公仍於東嶽等諸碑鐫勒其名竟以壽終贈兵部尚書
