body:
  text: 舊唐書卷六十三列傳第十三封倫倫子言道兄子行高蕭瑀子銳兄子鈞鈞子瓘鈞兄子嗣業裴矩矩子宣機宇文士及封倫字德彝觀州蓨人北齊太子太保隆之孫父子繡隋通州刺史倫少時其舅盧思道每言曰此子智識過人必能致位卿相開皇末江南作亂內史令楊素往征之署為行軍記室船至海曲素召之倫墜於水中人救免溺乃易衣以見竟寢不言素後知問其故曰私事也所以不白素甚嗟異之素將營仁壽宮引為土木監隋文帝至宮所見制度奢侈大怒曰楊素為不誠矣殫百姓之力雕飾離宮為吾結怨於天下素惶恐慮將獲譴倫曰公當弗憂待皇后至必有恩詔明日果召素入對獨孤后勞之曰公知吾夫妻年老無以娛心盛飾此宮豈非孝順素退問倫曰卿何以知之對曰至尊性儉故初見而怒然雅聽后言后婦人也惟麗是好后心既悅帝慮必移所以知耳素嘆伏曰揣摩之才非吾所及素負貴恃才多所凌侮唯擊賞倫每引與論宰相之務終日忘倦因撫其牀曰封郎必當據吾此座驟稱薦於文帝由是擢授內史舍人大業中倫見虞世基幸於煬帝而不閑吏務每有承受多失事機倫又託附之密為指畫宣行詔命諂順主心外有表疏如忤意者皆寢而不奏決斷刑法多峻文深誣策勳行賞必抑削之故世基之寵日隆而隋政日壞皆倫所為也宇文化及之亂逼帝出宮使倫數帝之罪帝謂曰卿是士人何至於此倫赧然而退化及尋署內史令從至聊城倫見化及勢蹙乃潛結化及弟士及請於濟北運糧以觀其變遇化及敗與士及來降高祖以其前代舊臣遣使迎勞拜內史舍人尋遷內史侍郎高祖嘗幸溫湯經秦始皇墓謂倫曰古者帝王竭生靈之力殫府庫之財營起山陵此復何益倫曰上之化下猶風之靡草自秦漢帝王盛為厚葬故百官衆庶競相遵仿凡是古冢丘封悉多藏珍寶咸見開發若死而無知厚葬深為虛費若魂而有識被發豈不痛哉高祖稱善謂倫曰從今之後宜自上導下悉為薄葬太宗之討王世充詔倫參謀軍事高祖以兵久在外意欲旋師太宗遣倫入朝親論事勢倫言於高祖曰世充得地雖多而羈縻相屬其所用命者唯洛陽一城而已計盡力窮破在朝夕今若還兵賊勢必振更相連結後必難圖未若乘其已衰破之必矣高祖納之及太宗凱旋高祖謂侍臣曰朕初發兵東討衆議多有不同唯秦王請行封倫贊成此計昔張華協同晉武亦復何以加也封平原縣公兼天冊府司馬會突厥寇太原復遣使來請和親高祖問羣臣和之與戰策將安出多言戰則怨深不如先和倫曰突厥憑凌有輕中國之意必謂兵弱而不能戰如臣計者莫若悉衆以擊之其勢必捷勝而後和恩威兼著若今歲不戰明年必當復來臣以擊之為便高祖從之六年以本官檢校吏部尚書曉習吏職甚獲當時之譽八年進封道國公尋徙封於密蕭瑀嘗薦倫於高祖高祖任倫為中書令太宗嗣位瑀遷尚書左僕射倫為右僕射倫素險詖與瑀商量可奏者至太宗前盡變易之由是與瑀有隙貞觀元年遘疾於尚書省太宗親自臨視即命尚輦送還第尋薨年六十太宗深悼之廢朝三日冊贈司空諡曰明初倫數從太宗征討特蒙顧遇以建成元吉之故數進忠款太宗以為至誠前後賞賜以萬計而倫潛持兩端陰附建成時高祖將行廢立猶豫未決謀之於倫倫固諫而止然所為祕隱時人莫知事具建成傳卒後數年太宗方知其事十七年治書侍御史唐臨追劾倫曰臣聞事君之義盡命不渝為臣之節歲寒無貳苟虧其道罪不容誅倫位望鼎司恩隆胙土無心報效乃肆姦謀熒惑儲藩獎成元惡置于常典理合誅夷但苞藏之狀死而後發猥加褒贈未正嚴科罪惡既彰宜加貶黜豈可仍疇爵邑尚列台槐此而不懲將何沮勸太宗令百官詳議民部尚書唐儉等議倫罪暴身後恩結生前所歷衆官不可追奪請降贈改諡詔從之於是改諡繆黜其贈官削所食實封子言道尚高祖女淮南長公主官至宋州刺史倫兄子行高以文學知名貞觀中官至禮部郎中蕭瑀字時文高祖梁武帝曾祖昭明太子祖詧後梁宣帝父巋明帝瑀年九歲封新安郡王幼以孝行聞姊為隋晉王妃從入長安聚學屬文端正鯁亮好釋氏常修梵行每與沙門難及苦空必詣微旨常觀劉孝標辯命論惡其傷先王之教迷性命之理乃作非辯命論以釋之大旨以為人稟天地以生孰云非命然吉凶禍福亦因人而有若一之於命其蔽已甚時晉府學士柳顧言諸葛穎見而稱之曰自孝標後數十年間言性命之理者莫能詆詰今蕭君此論足療劉子膏肓煬帝為太子也授太子右千牛及踐祚遷尚衣奉御檢校左翊衞鷹揚郎將忽遇風疾命家人不即醫療仍云若天假餘年因此望為栖遁之資耳蕭后聞而誨之以爾才智足堪揚名顯親豈得輕毀形骸而求隱逸若以此致譴則罪在不測病且愈其姊勸勉之故復有仕進志累加銀青光祿大夫內史侍郎既以后弟之親委之機務後數以言忤旨漸見疎斥煬帝至鴈門為突厥所圍瑀進謀曰如聞始畢託校獵至此義成公主初不知其有違背之心且北蕃夷俗可賀敦知兵馬事昔漢高祖解平城之圍乃是閼氏之力況義成以帝女為妻必恃大國之援若發一單使以告義成假使無益事亦無損臣又竊聽輿人之誦乃慮陛下平突厥後更事遼東所以人心不一或致挫敗請下明詔告軍中赦高麗而專攻突厥則百姓心安人自為戰煬帝從之於是發使詣可賀敦諭旨俄而突厥解圍去於後獲其諜人云義成公主遣使告急於始畢稱北方有警由是突厥解圍蓋公主之助也煬帝又將伐遼東謂羣臣曰突厥狂悖為寇勢何能為以其少時未散蕭瑀遂相恐動情不可恕因出為河池郡守即日遣之既至郡有山賊萬餘人寇暴縱橫瑀潛募勇敢之士設奇而擊之當陣而降其衆所獲財畜咸賞有功由是人竭其力薛舉遣衆數萬侵掠郡境瑀要擊之自後諸賊莫敢進郡中復安高祖定京城遣書招之瑀以郡歸國授光祿大夫封宋國公拜民部尚書太宗為右元帥攻洛陽以瑀為府司馬武德元年遷內史令時軍國草創方隅未寧高祖乃委以心腹凡諸政務莫不關掌高祖每臨軒聽政必賜升御榻瑀既獨孤氏之壻與語呼之為蕭郎國典朝儀亦責成於瑀瑀孜孜自勉繩違舉過人皆憚之常奏便宜數十條多見納用手敕曰得公之言社稷所賴運智者之策以能成人之美納諫者之言以金寶酬其德今賜金一函以報智者勿為推退瑀固辭優詔不許其年州置七職務取才望兼美者為之及太宗臨雍州牧以瑀為州都督高祖常有敕而中書不時宣行高祖責其遲瑀曰臣大業之日見內史宣敕或前後相乖者百司行之不知何所承用所謂易必在前難必在後臣在中書日久備見其事今皇基初構事涉安危遠方有疑恐失機會比每受一敕臣必勘審使與前敕不相乖背者始敢宣行遲晚之愆實由於此高祖曰卿能用心若此我有何憂初瑀之朝也關內產業並先給勳人至是特還其田宅瑀皆分給諸宗子弟唯留廟堂一所以奉蒸嘗及平王世充瑀以預軍謀之功加邑二千戶拜尚書右僕射內外考績皆委之司會為羣僚指南庶務繁總瑀見事有時偏駁而持法稍深頗為時議所少瑀嘗薦封倫於高祖高祖以倫為中書令太宗即位遷尚書左僕射封倫為右僕射倫素懷險詖與瑀商量將為可奏者至太宗前盡變易之于時房玄齡杜如晦既新用事疎瑀親倫瑀心不能平遂上封事論之而辭旨寥落太宗以玄齡等功高由是忤旨廢于家俄拜特進太子少師未幾復為尚書左僕射賜實封六百戶太宗常謂瑀曰朕欲使子孫長久社稷永安其理如何瑀對曰臣觀前代國祚所以長久者莫若封諸侯以為盤石之固秦幷六國罷侯置守二代而亡漢有天下郡國參建亦得年餘四百魏晉廢之不能永久封建之法實可遵行太宗然之始議封建尋坐與侍中陳叔達於上前忿諍聲色甚厲以不敬免歲餘授晉州都督明年徵授左光祿大夫兼領御史大夫與宰臣參議朝政瑀多辭辯每有評議玄齡等不能抗然心知其是不用其言瑀彌怏怏玄齡魏徵溫彥博嘗有微過瑀劾之而罪竟不問因此自失由是罷御史大夫以為太子少傅不復預聞朝政六年授特進行太常卿八年為河南道巡省大使人有坐當推劾苦未得其情者遂置格置繩以至於死太宗特免責之九年拜特進復令參預政事太宗嘗從容謂房玄齡曰蕭瑀大業之日進諫隋主出為河池郡守應遭剖心之禍翻見太平之日北叟失馬事亦難常瑀頓首拜謝太宗又曰武德六年以後太上皇有廢立之心而不之定也我當此日不為兄弟所容實有功高不賞之懼此人不可以厚利誘之不可以刑戮懼之真社稷臣也因賜瑀詩曰疾風知勁草版蕩識誠臣又謂瑀曰卿之守道耿介古人無以過也然而善惡太明亦有時而失瑀再拜謝曰臣特蒙誡訓又許臣以忠諒雖死之日猶生之年也魏徵進而言曰臣有逆衆以執法明主恕之以忠臣有孤特以執節明主恕之以勁昔聞其言今覩其實蕭瑀不遇明聖必及於難太宗悅其言十七年與長孫無忌等二十四人並圖形於凌煙閣是歲立晉王為皇太子拜瑀太子太保仍知政事太宗之伐遼東也以洛邑衝要襟帶關河以瑀為洛陽宮守車駕自遼還請解太保仍同中書門下太宗以瑀好佛道嘗賚繡佛像一軀幷繡瑀形狀於佛像側以為供養之容又賜王褒所書大品般若經一部幷賜袈裟以充講誦之服焉瑀嘗稱玄齡以下同中書門下內臣悉皆朋黨比周無至心奉上累獨奏云此等相與執權有同膠漆陛下不細諳知但未反耳太宗謂瑀曰為人君者驅駕英材推心待士公言不亦甚乎何至如此太宗數日謂瑀曰知臣莫若君夫人不可求備自當捨其短而用其長朕雖才謝聰明不應頓迷臧否因數為瑀信誓瑀既不自得而太宗積久銜之終以瑀忠貞居多而未廢也會瑀請出家太宗謂曰甚知公素愛桑門今者不能違意瑀旋踵奏曰臣頃思量不能出家太宗以對羣臣吐言而取捨相違心不能平瑀尋稱足疾時詣朝堂又不入見太宗謂侍臣曰瑀豈不得其所乎而自慊如此遂手詔曰朕聞物之順也雖異質而成功事之違也亦同形而罕用是以舟浮楫舉可濟千里之川轅引輪停不越一毫之地故知動靜相循易為務曲直相反難為功況乎上下之宜君臣之際者矣朕以無明於元首期託德於股肱思欲去偽歸真除澆反朴至於佛教非意所遵雖有國之常經固弊俗之虛術何則求其道者未驗福於將來修其教者翻受辜於既往至若梁武窮心於釋氏簡文銳意於法門傾帑藏以給僧祇殫人力以供塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之徵何其繆也而太子太保宋國公瑀踐覆車之餘軌襲亡國之遺風棄公就私未明隱顯之際身俗口道莫辯邪正之心修累葉之殃源祈一躬之福本上以違忤君主下則扇習浮華往前朕謂張亮云卿既事佛何不出家瑀乃端然自應請先入道朕即許之尋復不用一迴一惑在於瞬息之間自可自否變於帷扆之所乖棟梁之大體豈具瞻之量乎朕猶隱忍至今瑀尚全無悛改宜即去茲朝闕出牧小藩可商州刺史仍除其封二十一年徵授金紫光祿大夫復封宋國公從幸玉華宮遘疾薨於宮所年七十四太宗聞而輟膳高宗為之舉哀遣使弔祭太常諡曰肅太宗曰易名之典必考其行瑀性多猜貳此諡失於不直更宜摭實改諡曰貞褊公冊贈司空荊州都督賜東園祕器陪葬昭陵臨終遺書曰生而必死理之常分氣絕後可著單服一通以充小斂棺內施單席而已冀其速朽不得別加一物無假卜日惟在速辦自古賢哲非無等例爾宜勉之諸子遵其遺志斂葬儉薄子銳嗣尚太宗女襄城公主歷太常卿汾州刺史公主雅有禮度太宗每令諸公主凡厥所為皆視其楷則又令所司別為營第公主辭曰婦人事舅姑如事父母若居處不同則定省多闕再定省多闕再三固讓乃止令於舊宅而改創焉永徽初公主薨詔葬昭陵瑀兄璟亦有學行武德中為黃門侍郎累轉祕書監封蘭陵縣公貞觀中卒贈禮部尚書瑀兄子鈞隋遷州刺史梁國公珣之子也博學有才望貞觀中累除中書舍人甚為房玄齡魏徵所重永徽二年歷遷諫議大夫兼弘文館學士時有左武候引駕盧文操踰垣盜左藏庫物高宗以引駕職在糾繩身行盜竊命有司殺之鈞進諫曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫為名愚衷所懷不敢不奏帝謂曰卿職在司諫能盡忠規遂特免其死罪顧謂侍臣曰此乃真諫議也尋而太常樂工宋四通等為宮人通傳信物高宗特令處死乃遣附律鈞上疏言四通等犯在未附律前不合至死手詔曰朕聞防禍未萌先賢所重宮闕之禁其可漸歟昔如姬竊符朕用為永鑒不欲今茲自彰其過所搦憲章想非濫也但朕翹心紫禁思覿引裾側席朱楹冀旌折檻今乃喜得其言特免四通等死遠處配流鈞尋為太子率更令兼崇賢館學士顯慶中卒所撰韻旨二十卷有集三十卷行於代子瓘官至渝州長史母終以毀卒瓘子嵩別有傳鈞兄子嗣業少隨祖姑隋煬帝后入于突厥貞觀九年歸朝以深識蕃情充使統領突厥之衆累轉鴻臚卿兼單于都護府長史調露中單于突厥反叛嗣業率兵戰敗配流嶺南而死裴矩字弘大河東聞喜人祖佗後魏東荊州刺史父訥之北齊太子舍人矩襁褓而孤為伯父讓之所鞠及長博學早知名仕齊為高平王文學齊亡隋文帝為定州總管召補記室甚親敬之文帝即位遷給事郎直內史省奏舍人事伐陳之役領元帥記室及陳平晉王廣令矩與高熲收陳圖籍歸之祕府累遷吏部侍郎以事免大業初西域諸蕃款張掖塞與中國互市煬帝遣矩監其事矩知帝方勤遠略欲吞并夷狄乃訪西域風俗及山川險易君長姓族物產服章撰西域圖記三卷入朝奏之帝大悅賜物五百段每日引至御座顧問西方之事矩盛言西域多珍寶及吐谷渾可并之狀帝信之仍委以經略拜民部侍郎俄遷黃門侍郎參預朝政令往張掖引致西蕃至者十餘國三年帝有事於恆嶽咸來助祭帝將巡河右復令矩往燉煌矩遣使說高昌王鞠伯雅及伊吾吐屯設等啗以厚利導使入朝及帝西巡次燕支山高昌王伊吾設等及西蕃胡二十七國盛服珠玉錦罽焚香奏樂歌舞相趨謁於道左復令武威張掖士女盛飾縱觀騎乘填咽周亙數十里帝見之大悅及滅吐谷渾蠻夷納貢諸蕃懾服相繼來庭雖拓地數千里而役戍委輸之費歲巨萬計中國騷動焉帝以矩有綏懷之略加位銀青光祿大夫其年帝幸東都矩以蠻夷朝貢者多諷帝大徵四方奇技作魚龍曼延角觝於洛邑以誇諸戎狄終月而罷又令三市店肆皆設帷帳盛酒食遣掌蕃率蠻夷與人貿易所至處悉令邀延就座醉飽而散夷人有識者咸私哂其矯飾焉帝稱矩至誠謂宇文述牛弘曰裴矩大識朕意凡所陳奏皆朕之成算朕未發頃矩輒以聞自非奉國用心孰能若是尋令與將軍薛世雄城伊吾而還賜錢四十萬矩因進計縱反間於射匱使潛攻處羅後處羅為射匱所迫竟隨使者入朝帝甚悅賜矩貂裘及西域珍器從帝巡于塞北幸啟民可汗帳時高麗遣使先通于突厥啟民不敢隱引之見帝矩因奏曰高麗之地本孤竹國也周代以之封箕子漢時分為三郡晉氏亦統遼東今乃不臣列為外域故先帝欲征之久矣但以楊諒不肖師出無功當陛下時安得不有事於此使冠帶之境仍為蠻貊之鄉乎今其使者朝於突厥親見啟民從化必懼皇靈之遠暢慮後服之先亡脅令入朝當可致也請面詔其使還本國遣語其王令速朝覲不然者當率突厥即日誅之帝納焉高麗不用命始建征遼之策王師臨遼以本官領虎賁郎將明年復從至遼東兵部侍郎斛斯政亡入高麗帝令矩兼掌兵部事以前後渡遼功進位右光祿大夫矩後從幸江都及義兵入關屈突通敗問至帝問矩方略矩曰太原有變京畿不靜遙為處分恐失事機唯鑾輿早還方可平定矩見天下將亂恐為身禍每遇人盡禮雖至胥吏皆得其歡心時從駕驍果多逃散矩言於帝曰車駕留此已經二歲人無匹合則不能久安請聽兵士於此納室私相奔誘者因而配之帝從其計軍中漸安咸曰裴公之惠也是時帝既昏侈逾甚矩無所諫諍但悅媚取容而已宇文化及弒逆署為尚書右僕射化及敗竇建德復以為尚書右僕射令專掌選事時建德起自羣盜事無節文矩為之創定朝儀權設法律憲章頗備建德大悅每諮訪焉及建德敗矩與偽將曹旦及建德之妻齎傳國八璽舉山東之地來降封安邑縣公武德五年拜太子左庶子俄遷太子詹事令與虞世南撰吉凶書儀參按故實甚合禮度為學者所稱至今行之八年兼檢校侍中及太子建成被誅其餘黨尚保宮城欲與秦王決戰王遣矩曉諭之宮兵乃散尋遷民部尚書矩年且八十而精爽不衰以曉習故事甚見推重太宗初即位務止姦吏或聞諸曹案典多有受賂者乃遣人以財物試之有司門令史受餽絹一匹太宗怒將殺之矩進諫曰此人受賂誠合重誅但陛下以物試之即行極法所謂陷人以罪恐非導德齊禮之義太宗納其言因召百僚謂曰裴矩遂能廷折不肯面從每事如此天下何憂不治貞觀元年卒贈絳州刺史諡曰敬撰開業平陳記十二卷行於代子宣機高宗時官至銀青光祿大夫太子左中護宇文士及雍州長安人隋右衞大將軍述子化及弟也開皇末以父勳封新城縣公隋文帝嘗引入臥內與語奇之令尚煬帝女南陽公主大業中歷尚輦奉御從幸江都以父憂去職尋起為鴻臚少卿化及之潛謀逆亂也以其主壻深忌之而不告既弒煬帝署為內史令初高祖為殿內少監時士及為奉御深自結託及隨化及至黎陽高祖手詔召之士及亦潛遣家僮間道詣長安申赤心又因使密貢金環高祖大悅謂侍臣曰我與士及素經共事今貢金環是其來意也及至魏縣兵威日蹙士及勸之西歸長安化及不從士及乃與封倫求於濟北徵督軍糧俄而化及為竇建德所擒濟北豪右多勸士及發青齊之衆北擊建德收河北之地以觀形勢士及不納遂與封倫等來降高祖數之曰汝兄弟率思歸之卒為入關之計當此之時若得我父子豈肯相存今欲何地自處士及謝曰臣之罪誠不容誅但臣早奉龍顏久存心腹往在涿郡嘗夜中密論時事後於汾陰宮復盡丹赤自陛下龍飛九五臣實傾心西歸所以密申貢獻冀此贖罪耳高祖笑謂裴寂曰此人與我言天下事至今已六七年矣公輩皆在其後時士及妹為昭儀有寵由是漸見親待授上儀同從太宗平宋金剛以功復封新城縣公妻以壽光縣主仍遷秦王府驃騎將軍又從平王世充竇建德以功進爵郢國公遷中書侍郎再轉太子詹事太宗即位代封倫為中書令真食益州七百戶尋以本官檢校涼州都督時突厥屢為邊寇士及欲立威以鎮邊服每出入陳兵盛為容衛又折節禮士涼土服其威惠徵為殿中監以疾出為蒲州刺史為政寬簡吏人安之數歲入為右衛大將軍甚見親顧每延入閤中乙夜方出遇其歸沐仍遣馳召同列莫與為比然尤謹密其妻每問向中使召有何樂事士及終無所言尋錄其功別封一子為新城縣公在職七年復為殿中監加金紫光祿大夫及疾篤太宗親問撫之流涕貞觀十六年卒贈左衞大將軍涼州都督陪葬昭陵士及撫幼弟及孤兄子以友愛見稱親戚故人貧乏者輒遺之然厚自封植衣食服玩必極奢侈諡曰恭黃門侍郎劉洎駁之曰士及居家侈縱不宜為恭竟諡曰縱史臣曰封倫多揣摩之才有附託之巧黨化及而數煬帝或有赧顏託士及以歸唐朝殊無愧色當建成之際事持兩端背蕭瑀之恩奏多異議太宗明主也不見其心玄齡賢相焉尚容其諂狡算醜行死而後彰苟非唐臨之劾唐儉等議則姦人得計矣蕭瑀骨鯁亮直儒術清明執政隋朝忠而獲罪委質高祖知無不為及太宗臨朝房杜用事不容小過欲居成功既形猜貳之言寧固或躍之位易名而祇加褊字所幸者猶多奉佛而不失道情非善也而何謂裴矩方略寬簡士及通變謹密皆一時之稱也贊曰封倫揣摩諂詐蕭瑀骨鯁儒術裴矩方略寬簡士及通變謹密
