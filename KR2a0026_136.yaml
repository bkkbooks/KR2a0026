body:
  text: 舊唐書卷一百三十二列傳第八十二李抱玉李抱真王虔休盧從史李芃李澄族弟元素李抱玉武德功臣安興貴之裔代居河西善養名馬為時所稱羣從兄弟或徙居京華習文儒與士人通婚者稍染士風抱玉少長西州好騎射常從軍幕沉毅有謀小心忠謹乾元初太尉李光弼引為偏裨屢建勳績由是知名二年自特進右羽林軍大將軍知軍事遷鴻臚卿員外置同正員持節鄭州諸軍事兼鄭州刺史攝御史中丞鄭陳潁亳四州節度時史思明陷洛陽光弼守河陽賊兵鋒方盛光弼謂抱玉曰將軍能為我守南城二日乎抱玉曰過期若何光弼曰過期而救不至任棄城也賊帥周摰領安太清徐黃玉等先次南城將陷之抱玉乃紿之曰吾糧盡明日當降賊衆大喜斂軍以俟之抱玉因得繕完設備明日堅壁請戰賊怒欺紿急攻之抱玉出奇兵表𩹉夾攻殺傷甚衆摰軍退光弼自將于中灘城摰捨南城攻中灘不勝乃整軍將攻北城光弼以兵出戰大敗之固河陽復懷州皆功居第一遷澤州刺史兼御史中丞代宗即位擢為澤潞節度使潞州大都督府長史兼御史大夫加領陳鄭二州遷兵部尚書抱玉上言臣貫屬涼州本姓安氏以祿山構禍恥與同姓去至德二年五月蒙恩賜姓李氏今請割貫屬京兆府長安縣許之因是舉宗並賜國姓廣德元年冬吐蕃寇京師乘輿幸陝諸軍潰卒及村閭亡命相聚為盜京城南面子午等五谷羣盜頗害居人朝廷遣薛景仙領兵為五谷使招討連月不捷乃詔抱玉兼鳳翔節度使討之抱玉探知賊帥行止之處先分屯諸谷乃設奇潛使輕鋭數百南自洋州入攻之賊帥高玉方與諸偷會遽為鋭卒數十人掩擒之因大搜獲偷黨悉斬之餘黨不討自潰旬日內五谷平以功遷司空餘並如故時吐蕃每歲犯境上以岐陽國之西門寄在抱玉恩寵無比遷同中書門下平章事又兼山南西道節度使河西隴右山南西道副元帥判梁州事連統三道節制兼領鳳翔潞梁三大府秩處三公抱玉以任位崇重抗疏懇讓司空及山南西道節度判梁州事乞退授兵部尚書上嘉其謙讓許之抱玉凡鎮鳳翔十餘年雖無破虜之功而禁暴安人頗為當時所稱大曆十二年卒上甚悼之輟朝三日贈太保李抱真抱玉從父弟也抱玉為澤潞節度使甚器抱真任以軍事纍授汾州別駕當是時僕固懷恩反于汾州抱真陷焉乃脫身歸京師代宗以懷恩倚回紇所將朔方兵又徑憂甚召見抱真問狀因奏曰郭子儀領朔方之衆人多思之懷恩欺其衆曰子儀為朝恩所殺詐而用之今復子儀之位可不戰而克其後懷恩子瑒為其下所殺懷恩奔遁多如抱真策因是遷殿中少監居頃之為陳鄭澤潞節度留後抱真因中謝言曰臣雖無可取當今百姓勞逸繫在牧守願得一郡以自試上許之改授澤州刺史兼為澤潞節度副使居二年轉懷州刺史復為懷澤潞觀察使留後凡八年抱玉卒抱真仍領留後抱真密揣山東當有變上黨且當兵衝是時乘戰餘之地土瘠賦重人益困無以養軍士籍戶丁男三選其一有材力者免其租徭給弓矢令之曰農之隙則分曹角射歲終吾當會試及期按簿而徵之都試以示賞罰復命之如初比三年則皆善射抱真曰軍可用矣於是舉部內鄉兵得成卒二萬前既不廩費府庫益實乃繕甲兵為戰具遂雄視山東是時天下稱昭義軍步兵冠諸軍無幾復代李承昭為昭義軍及磁邢節度觀察留後加散騎常侍德宗即位拜檢校工部尚書兼潞州長史昭義軍節度支度營田澤潞磁邢觀察使建中二年田悅以魏博反乃悉兵圍邢州及臨洺益急詔河東節度使馬燧及神策兵救之抱真與燧敗悅兵於雙岡斬悅將楊朝光又擊破悅于臨洺遂解臨洺及邢州之圍以功加檢校兵部尚書復與燧大破悅於洹水悅以數百騎走歸魏州復與燧圍魏州又敗悅於城下以功加檢校右僕射時悅窘蹙朱滔王武俊皆反聯兵救悅抱真與燧等退次魏縣上幸奉天中使告問至諸將皆仰天慟哭李懷光席卷奔命馬燧李芃各引兵歸鎮朱泚既汙宮闕時李希烈陷大梁李納亦反鄆州無何上幸梁州李懷光又竊據河中抱真獨於擾攘傾潰之中以山東三州外抗羣賊內輯軍士羣賊深憚之興元初遷檢校左僕射平章事時朱滔悉幽薊軍借兵回紇擁衆五萬南向以應泚攻圍貝州初羣賊附於希烈希烈僭偽有臣屬羣賊意羣心稍離上自奉天下罪己之詔悉赦羣賊抱真乃遣門客賈林以大義説武俊合從擊朱滔武俊許之時兩軍尚相疑抱真乃以數騎徑入武俊營其將去也賓客皆止之抱真遣軍司馬盧玄卿勒軍部分曰僕今日此舉繫天下安危僕死不還領軍事以聽朝命亦唯子奮勵士馬東向雪僕之恥亦唯子言訖而去武俊設備甚嚴抱真曰朱泚希烈僭竊大位朱滔攻圍貝州此輩皆欲陵駕吾屬足下既不能自振數賊之上捨九葉天子而北面臣反虜乎乃者聖上奉天下罪己之詔可謂禹湯之主也因言及播越持武俊哭涕泗交下武俊亦哭感動左右因退臥武俊帳中酣寢久之武俊感其不疑待之益恭指心仰天曰此身已許公死敵矣遂與結為兄弟而別約明日合戰遂擊破朱滔于經城以功加檢校司空實封五百戶貞元初朝于京師居頃之還鎮抱真沉斷多智計嘗欲招致天下賢俊聞人之善必令持貨幣數千里邀致之至與語無可採者漸退之時天下無事乃大起臺榭穿池沼以自娛晚節又好方士以冀長生有孫季長者為抱真鍊金丹紿抱真曰服之當升仙遂署為賓僚數謂參佐曰此丹秦皇漢武皆不能得唯我遇之他年朝上清不復偶公輩矣復夢駕鶴沖天寤而刻木鶴衣道士衣以習乘之凡服丹二萬丸腹堅不食將死不知人者數日矣道士牛洞玄以豬肪穀漆下之殆盡病少間季長復曰垂上仙何自棄也益服三千丸頃之卒初抱真久疾好禨祥或令厭勝為巫祝所惑請降官爵以禳除之是年凡七上章讓司空復為檢校左僕射貞元十年卒時年六十二廢朝三日贈太保賻以布帛米粟有差抱真薨之日其子殿中侍御史緘匿喪不發營田副使盧會昌令抱真從甥元仲經潛與緘謀其明日將吏會集仲經詐為抱真令曰吾疾甚不能蒞職今令緘掌軍事諸軍善佐之節度副使李説及諸將吏俯首皆曰諾須臾緘盛服而出衆皆拜之緘乃悉府藏頒賞軍士盧會昌仍詐為抱真表請以職事付緘翌日又令諸將連奏請緘領軍上已聞抱真卒乃遣中使第五守進馳傳觀變且令以軍事屬於大將王延貴守進至潞州緘詐言抱真疾病請見明日如此者凡三日緘乃出造中使左右皆陳兵甚嚴備中使謂緘曰朝廷已知相公薨歿令以兵務屬延貴侍御宜歸發喪行服也緘愕然出謂諸將曰有詔不許緘掌事諸公意若何將吏莫有對者緘懼而退遽以使印及管鑰歸監軍是日乃發喪畢一哭中使召延貴以口詔令視事趣遣緘赴東都元仲經逃于外延貴捕得殺之既歸罪仲經盧會昌得不坐緘初謀亂遣裨將陳榮詐以文書告成德節度使王武俊求假財帛武俊大怒曰吾與汝府公善者冀恭王命非同惡也今聞已亡孰詐令其子而不俟朝旨耶何敢告我況有求也乃囚陳榮而遣使讓緘焉王虔休字君佐汝州梁人也本名延貴少涉獵書籍鄉里間以信義畏慕之尤好武藝大曆中汝州刺史李深用之為將久之澤潞節度李抱真聞名厚以財帛招之纍授兵馬使押衙建中初抱真統兵馬與諸將征討河北其雙岡水寨營等陳虔休攻戰居多擢為步軍都虞候纍加兼御史中丞大夫賜實封百戶洎抱真卒裨將元仲經等議立抱真子緘軍中擾亂虔休正色言於衆曰軍州是天子軍州將帥闕合待朝命何乃云云妄生異意軍中服從其言由是竟免潰亂朝廷知而嘉之以雍王為昭義節度觀察大使授虔休潞州左司馬依前兼御史大夫掌留後仍賜名虔休號令安撫軍州大理二歲遷潞州長史昭義軍節度澤潞磁邢洺觀察使尋加檢校工部尚書貞元十五年卒年六十二廢朝三日贈左僕射賻以布帛米粟虔休性恭勤儉省節用管內州倉庾皆積糧儲可支軍人數歲又嘗撰誕聖樂曲以進其表曰臣聞於師夫君子為能知樂是故審音以知聲審樂以知政則理道備矣清明廣大終始周旋與天地同其和與四時合其序豈止於鐘鼓管磬云乎哉臣伏見開元中天長節著于甲令每於是日海縣歡娛稱萬壽之無疆樂一人之有慶故能追堯接舜邁禹踰湯自周已後不能議矣臣竊以陛下降誕之辰未有惟新之曲雖太和已布於六氣而大樂未宣於八音無乃臣子之分或有所闕愚臣不揆頑昧敢思祖述每思歌竊抃忘寢與食久矣適遇有知音者與臣論及樂章探微賾奧窮理盡性臣乃遣造繼天誕聖樂一曲大抵以宮為調表五音之奉君也以土為德知五運之居中也凡二十五遍法二十四氣而足成一歲也每遍一十六拍象八元八凱登庸於朝也所冀雲門咸池永傳於律呂空桑孤竹合薦於宮懸不聞惉懘之聲長作中和之樂可使九域之人頓忘於肉味四夷之俗皆播於薰風與唐惟休終古盡善臣不勝懇款屏營之至謹昧死陳獻以聞其所造譜謹同封進先時有太常樂工劉玠流落至潞州虔休因令造此曲以進今中和樂起此也盧從史其先自元魏已來冠冕頗盛父虔少孤好學舉進士歷御史府三院刑部郎中江汝二州刺史祕書監從史少矜力習騎射遊澤潞間節度使李長榮用為大將德宗中歲每命節制必令採訪本軍為其所歸者長榮卒從史因軍情且善迎奉中使得授昭義軍節度使漸狂恣不道至奪部將妻妾而辨給矯妄從事孔戡等以言直不從引去前年丁父憂朝旨未議起復屬王士真卒從史竊獻誅承宗計以希上意用是起授委其成功及詔下討賊兵出逗留不進陰與承宗通謀令軍士潛懷賊號又高其芻粟之價售於度支諷朝廷求宰相且誣奏諸軍與賊通兵不可進上深患之護軍中尉吐突承璀將神策兵與之對壘從史往往過其營博戲從史沓貪好得承璀出寶帶奇玩以炫耀之時其愛悅而遺焉從史喜甚日益狎上知其事取裴之謀因戒承璀伺其來博揖語幕下伏壯士突起持捽出帳後縛之內車中馳以赴闕從者驚亂斬十數人餘號令乃定且宣諭密詔追赴闕庭都將烏重胤素懷忠順乃嚴戒其軍衆不敢動會夜使疾驅未明出境道路人莫知元和五年四月制曰邪以蓄衆自致覆車姦以事君所宜用鉞故楚人告變韓信患釋於事先蜀土徵災鍾會禍生於部下況害深楚蜀功匪鍾韓構此厲階布於公議懷私負德合置於嚴科屈法申恩尚從於寬典前昭義軍節度副大使知節度事盧從史擢自裨將居于大藩不思報國之誠每設徇身之計比丁家禍曾無戚容行棄人倫孝虧天性屬常山稱亂朝制未行固願興師苟求復位刻期效用請以身先指日投誠誓云獨致示於懷撫推以信誠排衆論以釋其苴麻決中心而授之鈇鉞委以重任命之專征章奏所陳事無違者恩光是貸豫何愛焉而乃冒利蓄姦隳政敗度成師既出保敵而交通邪計以行臨戎而向背諸侯盡力而不應遺寇遊魂而是託臣節既喪恩豈念於生成台位干求禮頓虧於忠敬肆其醜行熾以凶威至於逼脅軍中潛施賊號陵汙麾下實玷皇風貨以藩身虐而用衆士庶怨而罔恤將校勞而不圖稟於陶鈞行事至此視於天地負我何多且辜覆載之仁寧逭神鬼之責況頃年上請就食山東及遣旋師不時恭命致動其衆覬生其心賴劉濟抗忠正之辭使邪豎絶遲回之計加以遍毀鄰境密疏事情反覆百端高下萬變心無恥愧事至滿盈朕念以始終務於含貸所期悔過豈謂踰凶而昭義軍忠節夙彰義聲昭著發其衆怒叶以一心顧大惡而不容幸全軀而自免宜從大戮以正彝章尚以曾列方隅嘗經任使惜君臣之體抑中外之情俾投魑魅之鄉以解人神之憤可貶歡州司馬嗚呼姦由事驗自開棄絶之門禍實己招豈漏恢疏之網凡百多士宜諒朕懷子繼宗等四人並貶嶺外李芃字茂初趙郡人也解褐上邽主簿三遷試大理評事攝監察御史山南東道觀察支使嚴武為京兆尹舉為長安尉李勉為江西觀察使署奏祕書郎兼監察御史為判官永泰初轉兼殿中侍御史時宣饒二州人方清陳莊聚衆據山洞西絶江路劫商旅以為亂芃乃請於秋浦置州守其要地以破其謀李勉然其計以聞代宗嘉之以宣州之秋浦青陽饒州之至德置池州焉芃攝行州事無幾乃兼侍御史居無何魏少遊代勉為使復署奏檢校虞部員外郎賜金紫為都團練副使頃之攝江州刺史州人便之丁母憂免喪永平軍節度李勉署奏檢校工部郎中兼侍御史為判官尋攝陳州刺史歲中即值李靈曜反於汴州勉署芃兼亳州防禦使練達軍事兵備甚肅又開陳潁運路以通漕挽德宗嗣位授檢校太常少卿兼御史中丞河陽三城鎮遏使撫勞備至資廩善者必先軍士間一年為節度使路嗣恭之副加檢校左庶子河陽三城懷州節度觀察使以東畿汜水等五縣隸焉時河南北連大兵詔益以神策汝陝之師芃進收新鄉共城遂圍衛州明年詔與河東節度馬燧等諸軍破田悅於洹水以功加檢校兵部尚書纍封開郡王實封一百戶進圍悅於魏州將符璘以精騎五百夜降芃開營以納之明日歸璘於招討使上居奉天斂軍還興元初檢校右僕射無何以疾固讓罷歸芃將請告謂所親曰今年夏被蝗旱人主厭兵革然則天下城壘堅厚矣戈鋋銛利矣以力勝之則有得失其可盡乎除弊之急莫先德化循而理之斯易致耳方鎮之戴翼時主宜先退讓貪權持祿吾所不取也吾既疾病豈能言而不踐乎乃手疏乞罷貞元元年卒年六十四廢朝一日贈太子太保李澄遼東襄平人隋蒲山公寬之後也居京兆父鎬清江太守以澄贈工部尚書澄以武藝為偏將纍除試將作監隸於江淮都統李峘建中初以檢校太子賓客兼御史中丞隸於永平軍節度使李勉及勉移理汴州乃奏澄為滑州刺史四年冬李希烈陷汴州勉奔歸行在澄遂以城降希烈偽署尚書令兼滑州永平軍節度使興元元年春澄密令親信人盧融間道齎表達於奉天上嘉之乃以帛詔藏於蠟丸中加澄刑部尚書兼汴州刺史汴滑節度觀察使澄祕而未宣乃集州兵嚴加訓習希烈頗疑之乃令養子六百人戍之以虞其變希烈苦攻寧陵邀澄率其衆至石柱澄令縱火焚營而偽遁誘六百人因驚行剽而加其罪果大俘掠悉令斬之以告希烈不能窮詰焉無幾希烈遣其將翟暉等寇陳州久之未復是歲十月澄以汴州兵寡度希烈不能制己又會中官薛盈珍持節且至加檢校兵部尚書封武威郡王賜實封五百戶澄乃乘勢力焚賊旌節誓衆歸國及十一月希烈既失澄又聞翟暉大敗由是奔歸蔡州澄遽率衆將復汴州屯於城北門恇怯不敢進及宣武軍節度使劉洽師至城東門賊將田懷珍開關以納之翌日澄方自北入洽已據子城澄乃舍於浚儀縣兩軍將士日有忿競不自安會鄭州賊將孫液通款於澄澄遣其子清赴之先是河陽軍節度使李芃遣其將雍皓攻鄭州皓所過縱掠液拒之尤固及清至遂納之皓怒攻液清以衆助之殺登城者數十人皓方引退又焚陽武而歸澄乃出赴鄭州朝廷特授清檢校太子賓客兼御史中丞更名克寧貞元元年三月就加澄檢校左僕射義成軍鄭滑許等州節度使二年卒年五十四廢朝一日贈司空賵布帛粟有差仍令左散騎常侍歸崇敬充弔祭使所緣喪葬並勒官給澄實以八月癸未終克寧祕之以九月庚寅欲自起視事其行軍司馬馬鉉不許克寧陰遣殺之乃墨絰而出加卒於城門將為不順劉洽出師屯於境上以制之且使告諭切至由是克寧不敢妄發然道路絶商旅者凡十四五日及賈耽代澄克寧護喪將歸乃悉索府中財貨以夜出城軍人從而剽奪及明殆盡澄柩至京師又賜克寧莊一所錢千貫粟麥二千石澄初封隴西郡公進武威郡王每上疏連稱二封頗為時人所哂李元素字大朴蒲山公密之孫任侍御史時杜亞為東都留守惡大將令狐運會盜發洛城之北運適與其部下畋于北郊亞意其為盜遂執訊之逮繫者四十餘人監察御史楊寧按其事亞以為不直密表陳之寧遂得罪亞將逞其宿怒且以得賊為功上表指明運為盜之狀上信而不疑宰臣以獄大宜審奏請覆之命元素就決亞迎路以獄成告元素驗之五日盡釋其囚以還亞大驚且怒親追送馬上責之元素不答亞遂上疏又誣元素元素還奏言未畢上怒曰出俟命元素曰臣未盡詞上又曰且去元素復奏曰一出不得復見陛下乞容盡詞上意稍緩元素盡言運冤狀明白上乃寤曰非卿孰能辨之後數月竟得其真賊元素由是為時器重遷給事中時美官缺必指元素遷尚書右丞數月鄭滑節度盧羣卒遂命元素兼御史大夫鎮鄭滑就加檢校工部尚書在鎮稱理元和初徵拜御史大夫自貞元中位缺久難其人至是元素以名望召拜中外聳聽及居位一無修舉但規求作相久之寖不得志見客必曰無以某官散相疏也見屬官必先拜脂韋在列大失人情李錡為亂江南遂授元素浙西道節度觀察處置等使數月受代入拜國子祭酒尋遷太常卿轉戶部尚書判度支元素少孤奉長姊友敬加於人及其姊歿沉悲遘疾上疏懇辭職從之數月以出妻免官初元素再娶妻王氏石泉公方慶之孫性柔弱元素為郎官時娶之甚禮重及貴溺情僕妾遂薄之且又無子而前妻之子已長無良元素寢疾昏惑聽譖遂出之給與非厚妻族上訴乃詔曰李元素病中上表懇切披陳云妻王氏禮義殊乖願與離絶初謂素有醜行不能顯言以其大官之家所以令自處置訪聞不曾告報妻族亦無明過可書蓋是中情不和遂至於此脅以王命當日遣歸給送之間又至單薄不唯王氏受辱實亦朝情悉驚如此理家合當懲責宜停官仍令與王氏錢物通所奏數滿五千貫元和五年卒贈陝州大都督史臣曰李抱玉李抱真以武勇之材兼忠義之行有唐之良將也且如農隙教潞人之射數騎入武俊之營非有奇謀孰能如是惜乎服食求仙為藥所誤王虔休不黨僭命有足可嘉盧從史動多懷姦自貽伊戚芃則老也知足澄則過而改圖元素為御史時執德不回居大夫日其心甚短因緣七出益露醜聲善少惡多又何足算贊曰抱玉抱真我朝良將虔休之心亦多可尚史懷姦謀芃將祿讓澄迷卻行素貪一嚮吾誰與欺豈如忠諒
