body:
  text: 舊唐書卷五本紀第五高宗下麟德三年春正月戊辰朔車駕至泰山頓是日親祀昊天上帝於封祀壇以高祖太宗配饗己巳帝升山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后文德皇太后配饗皇后為亞獻越國太妃燕氏為終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟德三年為乾封元年諸行從文武官及朝覲華戎嶽牧致仕老人朝朔望者三品已上賜爵二等四品已下七品以上加階八品已下加一階勳一轉諸老人百歲已上版授下州刺史婦人郡君九十八十節級齊州給復一年半管嶽縣二年所歷之處無出今年租賦乾封元年正月五日已前大赦天下賜酺七日癸酉宴羣臣陳九部樂賜物有差日昳而罷丙子皇太子弘設會丁丑以前恩薄普進爵及階勳等男子賜古爵兗州界置紫雲仙鶴萬歲觀封巒非煙重輪三寺天下諸州置觀寺一所丙戌發自泰山甲午次曲阜縣幸孔子廟追贈太師增修祠宇以少牢致祭其褒聖侯德倫子孫並免賦役二月己未次亳州幸老君廟追號曰太上玄元皇帝創造祠堂其廟置令丞各一員改谷陽縣為真源縣縣內宗姓特給復一年夏四月甲辰車駕至自泰山先謁太廟而後入五月庚寅改鑄乾封泉寶錢六月壬寅高麗莫離支蓋蘇文死其子男生繼其父位為其弟男建所逐使其子獻誠詣闕請降詔左驍衛大將軍契苾何力率兵以應接之秋七月乙丑徙封殷王旭輪為豫王庚午左侍極檢校右相嘉興子陸敦信緣老病乞辭機揆拜大司成兼知左侍極大司憲兼檢校右中護劉仁軌兼右相檢校右中護八月辛丑兼司元太常伯兼檢校左相巨鹿男竇德玄卒丁未殺司衛少卿武惟良淄州刺史武懷運仍改姓蝮氏冬十月己酉命司空英國公績為遼東道行軍大總管以伐高麗二年春正月丁丑以去冬至于是月無雨雪避正殿減膳親録囚徒罷乾封錢復行開元通寶錢二月戊戌涪陵郡王愔薨辛丑改萬年宮依舊名九成宮夏六月乙卯西臺侍郎楊武西臺侍郎道國公檢校太子左中護戴至德正諫議大夫檢校東臺侍郎安平郡公李安期東臺侍郎張文瓘並同東西臺三品秋八月己丑朔日有蝕之丙辰東臺侍郎李安期出為荊州大都督府長史三年春正月庚寅詔繕工大監兼瀚海都護劉審禮為西域道安撫大使壬子以右相劉仁軌為遼東道副大總管二月戊午遼東道破薛賀水五萬人陳斬首五千餘級獲生口三萬餘人器械牛馬不可勝計丙寅以明堂制度歷代不同漢魏以還彌更訛舛遂增損古今新制其圖下詔大赦改元為總章元年二月戊寅幸九成宮己卯分長安萬年置乾封明堂二縣分理於京城之中癸未皇太子弘釋奠於國學贈顏回太子少師曾參太子少保夏四月丙辰有彗星見於畢昴之間乙丑上避正殿減膳詔內外羣官各上封事極言過失於是羣臣上言星雖孛而光芒小此非國眚不足上勞聖慮請御正殿復饌帝曰朕獲奉宗廟撫臨億兆謫見于天誡朕之不德也當責躬修德以禳之羣臣復進曰星孛于東北此高麗將滅之徵帝曰高麗百姓即朕之百姓也既為萬國之主豈可推過於小蕃竟不從所請乙亥彗星滅辛巳西臺侍郎楊武卒秋八月癸酉至自九成宮九月癸巳司空英國公績破高麗拔平壤城擒其王高藏及其大臣男建等以歸境內盡降其城一百七十戶六十九萬七千以其地為安東都護府分置四十二州二年春正月封諸王嫡子皆為郡王二月東臺侍郎同東西臺三品兼知左史事張文瓘署位始入銜三月東臺侍郎郝處俊同東西臺三品癸酉皇后親祀先蠶夏四月乙酉幸九成宮置司列少常伯司戎少常伯各兩員五月庚子移高麗戶二萬八千二百車一千八十乘牛三千三百頭馬二千九百匹駝六十頭將入內地萊營二州般次發遣量配於江淮以南及山南並涼以西諸州空間處安置六月戊申朔日有蝕之括州大風雨海水泛溢永嘉安固二縣城郭漂百姓宅六千八百四十三區溺殺人九千七十牛五百頭損田苗四千一百五十頃冀州大水漂壞居人廬舍數千家並遣使賑給秋七月劍南益瀘巂茂陵邛雅綿翼維始簡資榮隆果梓普遂等一十九州旱百姓乏絶總三十六萬七千六百九十戶遣司珍大夫路勵行存問賑貸癸巳冀州大都督府奏自六月十三日夜降雨至二十日水深五尺其夜暴水深一丈已上壞屋一萬四千三百九十區害田四千四百九十六頃遣右衛大將軍涼國公契苾何力為駕海道行軍大總管秋八月甲戌改瀚海都護府為安北都護府九月己亥發自九成宮壬寅停華林頓大搜于岐乙巳至岐州高祖初仕隋為扶風太守故曲赦岐州管內高祖時胥徒隨材擢用賜高年衣物粟帛各有差冬十月丁巳至自九成宮十一月庚辰發九州人夫轉發太原倉米粟入京丁亥徙封豫王旭輪為冀王仍令單名輪十二月戊申司空太子太師英國公績薨是冬無雪三年春正月丁丑右相樂成男劉仁軌致仕辛卯列遼東地為州縣二月戊申以旱親録囚徒祈禱名山大川癸丑日色出如赭三月甲戌朔大赦天下改元為咸亨元年三月丁丑改蓬萊宮為含元殿壬辰太子少師同東西臺三品許敬宗致仕夏四月吐蕃寇陷白州等一十八州又與于闐合衆襲龜茲撥換城陷之罷安西四鎮辛亥以右威衛大將軍薛仁貴為邏娑道行軍大總管右衛員外大將軍阿史那道真左衛將軍郭待封為副領兵五萬以擊吐蕃庚午幸九成宮雍州大雨雹五月丙戌詔曰諸州縣孔子廟堂及學館有破壞並先來未造者遂使生徒無肄業之所先師闕奠祭之儀久致飄露深非敬本宜令所司速事營造六月壬寅朔日有蝕之秋七月戊子前西臺侍郎李敬玄起復本職仍依舊同東西臺三品薛仁貴郭待封至大非川為吐蕃大將論欽陵所襲大敗仁貴等並坐除名吐谷渾全國盡沒唯慕容諾曷鉢及其親信數千帳內屬仍徙於靈州界八月甲子至自九成宮梁州都督趙王福薨丙寅以久旱避正殿尚食減膳九月甲申衛國夫人楊氏薨贈魯國夫人諡曰忠烈閏月壬子故贈司徒周忠孝公士太尉太子太師太原郡王贈魯國忠烈太夫人贈太原王妃甲寅葬太原王妃京官文武九品已上及外命婦送至便橋宿次冬十月癸酉大雪平地三尺餘行人凍死者贈帛給棺木令雍同華州貧窶之家有年十五已下不能存活者聽一切任人收養為男女充驅使皆不得將為奴婢丙申太子右中護兼攝正諫大夫同東西臺三品趙仁本為左肅機罷知政事十二月庚寅諸司及百官各復舊名是歲天下四十餘州旱及霜蟲百姓飢乏關中尤甚詔令任往諸州逐食仍轉江南租米以賑給之二年春正月乙巳幸東都留皇太子弘於京監國令侍臣戴至德張文瓘李敬玄等輔之唯以閻立本郝處俊從甲子至東都二月丁亥雍州人梁金柱請出錢三千貫賑濟貧人夏四月戊子大風折木六月戊寅左散騎常侍兼檢校祕書太子賓客周國公武敏之以罪復本姓賀蘭氏除名流雷州丁亥以旱親録囚徒秋九月地震司徒潞州刺史徐王元禮薨冬十月搜揚明達禮樂之士十一月甲午朔日有蝕之庚戌幸許汝等州教習癸酉冬狩校獵於許州葉縣昆水之陽十二月丙戌還東都三年春正月辛丑發梁益等一十八州兵募五千三百人遣右衛副率梁積壽往姚州擊叛蠻辛未制雍洛二州人聽任本州官二月己卯侍中永安郡公薑恪卒於河西鎮守夏四月戊寅幸合璧宮壬午於水南教旗上問中書令閻立本黃門侍郎郝處俊伊尹負鼎俎干湯應是補緝時政不知鑄鼎所緣復在何國將為國之重器歷代傳寶閻立本以古義對五月乙未五品已上改賜新魚袋並飾以銀三品已上各賜金裝刀子礪石一具六月丙子於洛州柏崖置倉八月壬子特進高陽郡公許敬宗卒九月乙卯冀州大都督府復為魏州魏州復為冀州壬寅沛王賢徙封雍王冬十月己未皇太子監國壬戌車駕還京師乙亥中書侍郎同中書門下三品道國公戴至德加兼戶部尚書黃門侍郎同中書門下三品張文瓘檢校大理卿黃門侍郎甑山縣公同中書門下三品郝處俊為中書侍郎兼檢校吏部侍郎同中書門下三品李敬玄為吏部侍郎並依舊同中書門下三品十一月戊子朔日有蝕之甲辰至自東都十二月癸卯太子左庶子劉仁軌同中書門下三品是冬左監門大將軍高侃大敗新羅之衆於橫水四年春正月甲午詔咸亨初收養為男女及驅使者聽量酬衣食之直放還本處丙辰絳州刺史鄭王元懿薨二月壬午以左金吾將軍裴居道女為皇太子弘妃夏四月丙子幸九成宮閏五月丁卯燕山道總管李謹行破高麗叛黨於瓠盧河之西高麗平壤餘衆遁入新羅秋七月庚午九成宮太子新宮成上召五品已上諸親宴太子宮極歡而罷辛巳婺州暴雨水泛溢漂溺居民六百家紹令賑給八月辛丑上痁疾令太子受諸司啓事己酉大風毀太廟鴟吻冬十月壬午中書令博陵縣子閻立本卒乙未皇太子弘納妃畢曲赦岐州大酺三日庚子還京師乙巳至自九成宮十一月丙寅上製樂章有上元二儀三才四時五行六律七政八風九宮十洲得一慶雲之曲詔有司諸大祠享即奏之十二月丙午弓月疏勒二國王入朝請降五年春二月壬午遣太子左庶子同中書門下三品劉仁軌為雞林道大總管以討新羅仍令衛尉卿李弼右領大將軍李謹行副之三月辛亥朔日有蝕之己巳皇后祀先蠶夏四月辛卯以尚輦奉御周國公武承嗣為宗正卿五月己未詔春秋二社本以祈農如聞此外別為邑會此後除二社外不得聚集有司嚴加禁止六月壬寅太白入東井秋八月壬辰追尊宣簡公為宣皇帝懿王為光皇帝太祖武皇帝為高祖神堯皇帝太宗文皇帝為文武聖皇帝太穆皇后為太穆神皇后文德皇后為文德聖皇后皇帝稱天皇皇后稱天后改咸亨五年為上元元年大赦戊戌敕文武官三品已上服紫金玉帶四品深緋五品淺緋並金帶六品深緑七品淺緑並銀帶八品深青九品淺青鍮石帶庶人服黃銅鐵帶一品已下文官並帶手巾算袋刀子礪石武官欲帶亦聽之九月辛亥百僚具新服上宴之於麟德殿癸丑追復長孫無忌官爵仍以其曾孫翼襲封趙國公許歸葬於昭陵先造之墳十一月丙午朔幸東都己酉狩於華山之曲武原戊辰至東都十二月蔣王惲薨戊子于闐王伏闍雄來朝辛卯波斯王卑路斯來朝壬寅天后上意見十二條請王公百僚皆習老子每歲明經一準孝經論語例試於有司又請子父在為母服三年虢王鳳薨二年春正月甲寅熒惑犯房壬戌支汗郡王獻碧玻璃丙寅以于闐為毗沙都督府以尉遲伏闍雄為毗沙都督分其境內為十州以伏闍雄有擊吐蕃功故也庚午龜茲王白素稽獻銀頗羅辛未吐蕃遣其大臣論吐渾彌來請和不許二月雞林道行軍大總管大破新羅之衆於七重城斬獲甚衆新羅遣使入朝獻方物伏罪赦之復其王金法敏官爵三月丁未日色如赭丁巳天后親蠶於邙山之陽時帝風疹不能聽朝政事皆決於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之內外稱為二聖帝欲下詔令天后攝國政中書侍郎郝處俊諫止之夏四月分括州永嘉永固二縣置溫州析臨海縣為樂安永寧二縣幸巳周王顯妃趙氏以罪幽死己亥皇太子弘薨于合璧宮之綺雲殿時帝辛合璧宮是日還東都五月己亥追諡太子弘為孝敬皇帝六月戊寅以雍王賢為皇太子大赦秋七月辛亥洛州復置緱氏縣以管孝敬皇帝恭陵慈州刺史嵵王上金坐事於澧州安置八月庚子太子左庶子同中書門下三品樂成侯劉仁軌為左僕射依舊監修國史中書門下三品大理卿張文瓘為侍中中書侍郎同三品甑山公郝處俊為中書令監修國史如故吏部侍郎檢校太子左庶子監修國史李敬玄吏部尚書兼太子左庶子同中書門下三品依前監修國史左丞許圉師為戶部尚書九月丙午宰相劉仁軌戴至德張文瓘郝處俊並兼太子賓客冬十月析永州營道江華唐興三縣置道州壬午星孛於角亢之南長五尺十二月丁亥龜茲王白素稽獻名馬三年春正月戊戌徙封冀王輪為相王二月甲戌移安東都護府於遼東乙亥堅昆獻名馬丁亥幸汝州之溫湯三月癸卯黃門侍郎來恆中書侍郎薛元超並同中書門下三品甲辰還東都閏三月己巳朔吐蕃入寇鄯廓河芳等四州乙酉洛州牧周王顯為洮州道行軍元帥領工部尚書劉審禮等十二總管并州都督相王輪為涼州道行軍元帥領左衛將軍契苾何力等軍以討吐蕃二王竟不行戊午敕制比用白紙多為蟲𢀿今後尚書省下諸司州縣宜並用黃紙其承制敕之司量為卷軸以備披檢庚寅車駕還京夏四月戊申至自東都甲寅中書侍郎李義琰同中書門下三品戊午幸九成宮六月癸丑黃門侍郎高智周同中書門下三品秋七月彗起東井指北河漸東北長三丈掃中台指文昌宮五十八日方滅八月乙未吐蕃寇疊州庚子以星變避殿減膳放京城繫囚令文武官各上封事言得失壬寅置南選使簡補廣交黔等州官吏青齊等州海泛溢又大雨漂溺居人五千家遣使賑恤之九月甲子朔車駕還京丙申郇王素節削戶三分之二於袁州安置癸丑於北京置金鄰州十一月丁卯敕新造上元舞圓丘方澤享太廟用之餘祭則停壬申以陳州言鳳凰見於宛丘改上元三年曰儀鳳元年大赦庚寅吏部尚書李敬玄為中書令十二月丙申皇太子賢上所注後漢書賜物三萬段戊午遣使分道巡撫宰相來恆河南道薛元超河北道左丞崔知悌等江南道二年春正月乙亥上躬籍田於東郊庚辰京師地震壬辰幸司竹園即日還宮二月丁巳工部尚書高藏授遼東都督封朝鮮郡王遣歸安東府安輯高麗餘衆司農卿扶餘隆熊津州都督封帶方郡王令往安輯百濟餘衆仍移安東都護府於新城以統之夏四月以河南河北旱遣使賑給八月徙封周王顯為英王改名哲乙巳太白犯軒轅十二月乙卯敕關內河東諸州召募勇敢以討吐蕃詔京文武職事官三品已上每年各舉文武才能堪任將帥牧守者一人是冬無雪三年四月丁亥朔以旱避正殿親録囚徒悉原之戊申大赦改來年正月一日為通乾癸丑涇州獻二小兒連心異體年四歲五月壬戌幸九成宮以相王輪為洛州牧秋七月丁巳宴近臣諸親於咸亨殿上謂霍王元軌曰去冬無雪今春少雨自避暑此宮甘雨頻降夏麥豐熟秋稼滋榮又得敬玄表奏吐蕃入龍支張虔勗與之戰一日兩陳斬馘極多又太史奏七月朔太陽合虧而不虧此蓋上天垂祐宗社降靈豈虛薄所能致此又男輪最小特所留愛比來與選新婦多不稱情近納劉延景女觀其極有孝行復是私衷一喜思與叔等同為此歡各宜盡醉上因賦七言詩效柏梁體侍臣並和九月丁巳還京師辛酉至自九成宮癸亥侍中張文瓘卒丙寅洮河道行軍大總管中書令李敬玄左衛大將軍劉審禮等與吐蕃戰于青海之上王師敗績審禮被俘上以蕃寇為患問計於侍臣中書舍人郭正一等咸以備邊不深討為上策十月丙午徐州刺史密王元曉薨閏十月戊寅熒惑犯鈐十一月乙未昏霧四塞連夜不解丙申雨木冰壬子黃門侍郎同中書門下三品來恆卒十二月詔停明年通乾之號以反語不善故也四年正月辛未戶部尚書平恩縣公許圉師卒己酉幸東都庚戌尚書右僕射道國公戴至德薨二月壬戌吐蕃贊普卒遣使弔祭之乙丑東都飢官出糙米以救飢人夏四月戊午熒惑入羽林星左丞崔知悌為戶部尚書中書令郝處俊為侍中五月壬午盜殺正諫大夫明崇儼丙戌皇太子賢監國戊戌造紫桂宮於澠池之西六月辛亥制大赦天下改儀鳳四年為調露元年秋七月己卯朔詔以今年冬至有事嵩嶽禮官學士詳定儀注八月丁巳侍中郝處俊左庶子高智周黃門侍郎崔知溫給事中劉景先兼修國史九月壬午吏部侍郎裴行儉討西突厥擒其十姓可汗阿史那都支及別帥李遮匐以歸冬十月單于大都護府突厥阿史德溫傅及奉職二部相率反叛立阿史那泥熟匐為可汗二十四州首領並叛遣單于大都護長史蕭嗣業將軍花大智李景嘉等討之與突厥戰為賊所敗嗣業配流桂州壬子令將軍曹懷舜率兵往恆州守井陘崔獻往絳州守龍門以備突厥庚申前詔封嵩山宜停癸亥吐蕃文成公主遣其大臣論塞調傍來告喪請和親不許遣郎將宋令文使吐蕃會贊普之葬十一月戊寅朔左庶子同三品高智周罷知政事癸未以吏部侍郎裴行儉為禮部尚書賞擒都支遮匐之功也甲辰裴行儉為定襄道大總管與營州都督周道務等兵十八萬并西軍程務挺東軍李文暕等總三十萬以討突厥甲寅臨軒試應嶽牧舉人二年春正月乙酉宴諸王諸司三品已上諸州都督刺史於洛城南門樓奏新造六合還淳之舞二月丙午詔曰故符璽郎李延壽撰正典一部辭殫雅正雖已淪亡功猶可録宜賜其家絹五十匹壬子霍王元軌率文武百僚請出一月俸料助軍以討突厥癸丑幸汝州溫湯丁巳至少室山戊午親謁少姨廟賜故玉清觀道士王遠知諡曰升真先生贈太中大夫又幸隱士田遊巖所居己未幸嵩陽觀及啓母廟並命立碑又幸逍遙谷道士潘師正所居甲子自溫湯還東都三月裴行儉大破突厥於黑山擒其首領奉職偽可汗泥熟匐為其部下所殺傳首來降夏四月乙丑幸紫桂宮戊辰黃門侍郎裴炎崔知溫中書侍郎王德真並同中書門下三品五月癸未熒惑犯輿鬼丁酉太白經天秋七月吐蕃寇河源屯于良非川河西鎮撫大使李敬玄與吐蕃將贊婆戰于湟中官軍敗績時左武衛將軍黑齒常之力戰大破蕃軍遂擢為河源軍經略大使令李敬玄鎮鄯州為之援丙申江王元祥薨是月突厥餘衆圍雲州中郎將程務挺擊破之八月丁未自紫桂宮還東都丁巳鄯州都督李敬玄左遷衡州刺史甲子廢皇太子賢為庶人幽於別所乙丑立英王哲為皇太子改調露二年為永隆元年赦天下大酺三日太子左庶子同中書門下三品張大安坐庶人左遷普州刺史九月河南河北諸州大水遣使賑恤溺死者官給棺槥其家賜物七段冬十月壬寅蘇州刺史曹王明封零陵郡王於黔州安置坐附庶人賢也己酉自東都還京十一月朔日有蝕之洛州飢減價官糶以救飢人二年春正月突厥寇原慶等州乙亥命將軍李知十王杲等分兵禦之癸巳遣禮部尚書裴行儉為定襄道大總管率師討突厥溫傅部落己亥詔雍岐華同民戶宜免兩年地稅河南河北遭水處一年上詔雍州長史李義玄曰朕思還淳返朴示天下以質素如聞遊手墮業此類極多時稍不豐便致飢饉其異色綾錦并花間裙衣等糜費既廣俱害女工天后我之匹敵常著七破間裙豈不知更有靡麗服飾務遵節儉也其紫服赤衣閭閻公然服用兼商賈富人厚葬越禮卿可嚴加捉搦勿使更然二月丙午皇太子親行釋奠禮三月辛卯左僕射同三品劉仁軌兼太子少傅侍中郝處俊為太子少保罷知政事五月丙戌定襄道總管曹懷舜與突厥史伏念戰於橫水官軍大敗懷舜減死配流嶺南六月壬子故江王元祥男以犯名教斬於大理寺後園七月太平公主出降薛紹赦京城繫囚閏七月丁未黃門侍郎裴炎為侍中黃門侍郎崔知溫中書侍郎薛元超並為中書令庚申上以服餌令皇太子監國丙寅雍州大風害稼米價騰踊是月裴行儉大破突厥史伏念之衆伏念為程務挺急追遂執溫傅來降行儉於是盡平突厥餘黨行儉執伏念溫傅振旅凱旋八月丁卯朔河南河北大水許遭水處往江淮已南就食丁亥戶部尚書崔知悌卒辛卯改交州為安南都護府九月丙申彗星見於天市長五尺冬十月丙寅朔日有蝕之乙丑改永隆二年為開耀元年曲赦定襄軍及緣征突厥官吏兵募等丙寅斬阿史那伏念及溫傅等五十四人於都市丁亥新羅王金法敏薨仍以其子政襲位十一月癸卯徙庶人賢于巴州十二月吐火羅獻金衣一領上不受辛未太子少保甑山縣公郝處俊薨永淳元年正月乙未朔以年飢罷朝會關內諸府兵令於鄧綏等州就穀二月癸未以太子誕皇孫滿月大赦改開耀二年為永淳元年大酺三日戊午立皇孫重照為皇太孫欲開府置僚屬吏部郎中王方慶曰按周禮有嫡子無嫡孫漢魏已來皇太子在不立太孫但封王耳晉立愍懷太子子彧為太孫齊立文惠太子子昭業為太孫便居東宮而皇太子在而立太孫未有前例上曰自我作古可乎曰可然竟不立府僚是春關內旱日色如赭四月甲子朔日有蝕之丙寅幸東都皇太子京師留守命劉仁軌裴炎薛元超等輔之上以穀貴減扈從兵士庶從者多殍踣於路辛未以裴行儉為金牙道行軍大總管與將軍閻懷旦等三總管兵分道討十姓突厥阿史那車薄行儉未行而卒安西副都護王方翼破車薄咽西域平戊寅次澠池之紫桂宮乙酉至東都丁亥黃門侍郎郭待舉兵部侍郎岑長倩中書侍郎郭正一吏部侍郎魏玄同並同中書門下同承受進止平章事上謂參知政事崔知溫曰待舉等歷任尚淺且令預聞政事未可即與卿等同名稱自是外司四品已下知政事者遂以平章為名五月壬寅置東都苑總監自丙午連日澍雨洛水溢壞天津及中橋立德弘教景行諸坊溺居民千餘家六月關中初雨麥苗潦損後旱京兆岐隴螟蝗食苗並盡加以民多疫癘死者枕藉於路詔所在官司埋瘞丁丑以岐州刺史蘇良嗣為雍州長史京師人相食寇盜縱橫秋七月己亥造奉天宮於嵩山之陽仍置嵩陽縣又於藍田造萬全宮庚申零陵王明薨是秋山東大水民飢吐蕃寇柘松翼等州冬十月甲子京師地震丙寅黃門侍郎劉景先同平章事十二月南天竺于闐各獻方物突厥餘黨阿史那骨篤祿等招合殘衆據黑沙城入寇并州北境二年春正月甲午朔幸奉天宮遣使祭嵩嶽少室箕山具茨等山西王母啓母巢父許由等祠二月甲午洛州長史李仲玄為宗正卿庚午突厥寇定州媯州之境己卯左領軍衛大將軍薛仁貴卒三月庚寅突厥阿史那骨篤祿阿史德元珍等圍單于都護府丙午彗見五車北二十五日而滅癸丑中書令崔知溫卒夏四月己巳還東都甲申綏州部落稽白鐵余據城平縣反命將軍程務挺將兵討之五月庚寅幸芳桂宮阻雨還東都突厥寇蔚州殺刺史李思儉豐州都督崔智辨率師出朝那山掩擊之為賊所敗遂寇嵐州秋七月己丑封皇孫重福為唐昌郡王甲辰相王輪改封豫王更名旦己丑令唐昌郡王重福為京留守劉仁軌副之召皇太子至東都己巳河水溢壞河陽城水面高於城內五尺北至鹽坎居人廬舍漂沒皆盡南北並壞庚戌熒惑入輿鬼犯質星十一月皇太子來朝癸亥幸奉天宮時天后自封岱之後勸上封中嶽每下詔草儀注即歲飢邊事警急而止至是復行封中嶽禮上疾而止上苦頭重不可忍侍醫秦鳴鶴曰刺頭微出血可愈天后帷中言曰此可斬欲刺血於人主首耶上曰吾苦頭重出血未必不佳即刺百會上曰吾眼明矣戊戌命將軍程務挺為單于道安撫大使以招討總管討山賊元珍骨篤祿賀魯等詔皇太子監國裴炎劉齊賢郭正一等於東宮同平章事丁未自奉天宮還東都上疾甚宰臣已下並不得謁見十二月己酉詔改永淳二年為弘道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣曰民庶喜否曰百姓蒙赦無不感悅上曰蒼生雖喜我命危篤天地神祇若延吾一兩月之命得還長安死亦無恨是夕帝崩於真觀殿時年五十六宣遺詔七日而殯皇太子即位于柩前園陵制度務從節儉軍國大事有不決者取天后處分羣臣上諡曰天皇大帝廟號高宗文明元年八月庚寅葬於乾陵天寶十三載改諡曰天皇大弘孝皇帝史臣曰大帝往在藩儲見稱長者暨升旒扆頓異明哉虛襟似納於觸鱗下詔無殊於扇暍既蕩情於帷薄遂忽怠於基扃惑麥斛之佞言中宮被毒聽趙師之誣説元舅銜冤忠良自是脅肩姦佞於焉得志卒致盤維盡戮宗社為墟古所謂一國為一人興前賢為後愚廢信矣哉贊曰藉文鴻業僅保餘位封岱禮天其德不類伏戎于寢構堂終墜自蘊禍胎邦家殄瘁木文勘記
