body:
  text: 舊唐書卷一百二十三列傳第七十三劉晏第五琦班宏王紹李巽劉晏字士安曹州南華人年七歲舉神童授祕書省正字纍授夏縣令有能名歷殿中侍御史遷度支郎中杭隴華三州刺史尋遷河南尹時史朝義盜據東都寄理長水入為京兆尹頃之加戶部侍郎兼御史中丞判度支委府事於司録張羣杜亞綜大體議論號為稱職無何為酷吏敬羽所構貶通州刺史復入為京兆尹戶部侍郎判度支時顏真卿以文學正直出為利州刺史晏舉真卿自代為戶部乃加國子祭酒寶應二年遷吏部尚書平章事領度支鹽鐵轉運租庸使坐與中官程元振交通元振得罪晏罷相為太子賓客尋授御史大夫領東都河南江淮山南等道轉運租庸鹽鐵使如故時新承兵戈之後中外艱食京師米價斗至一千官廚無兼時之積禁軍乏食畿縣百姓乃挼穗以供之晏受命後以轉運為己任凡所經歷必究利病之由至江淮以書遺元載曰浮于淮泗達于汴入于河西循底柱硤石少華楚帆越客直抵建章長樂此安社稷之奇策也晏賓于東朝猶有官謗相公終始故舊不信流言賈誼復召宣室弘羊重興功利敢不悉力以答所知驅馬陝郊見三門渠津遺迹到河陰鞏洛見宇文愷置梁公堰分黃河水入通濟渠大夫李傑新堤故事飾像河廟凜然如生涉滎郊浚澤遙瞻淮甸步步探討知昔人用心則潭衡桂陽必多積穀關輔汲汲只緣兵糧漕引瀟湘洞庭萬里幾日淪波挂席西指長安三秦之人待此而飽六軍之衆待此而強天子無側席之憂都人見泛舟之役四方旅拒者可以破膽三河流離者於茲請命相公匡戴明主為富人侯此今之切務不可失也使僕湔洗瑕穢率罄愚懦當憑經義請護河隄冥勤在官不辭水死然運之利病各有四五焉晏自尹京入為計相共五年矣京師三輔百姓唯苦稅畝傷多若使江湖米來每年三二十萬即頓減徭賦歌舞皇澤其利一也東都殘毀百無一存若米運流通則飢人皆附村落邑廛從此滋多受命之日引海陵之倉以食鞏洛是計之得者其利二也諸將有在邊者諸戎有侵敗王略者或聞三江五湖貢輸紅粒雲帆桂楫輸納帝鄉軍志曰先聲後實可以震耀夷夏其利三也自古帝王之盛皆云書同文車同軌日月所照莫不率俾今舟車既通商賈往來百貨雜集航海梯山聖神輝光漸近貞觀永徽之盛其利四也所可疑者函陝凋殘東周尤甚過宜陽熊耳至武牢成臯五百里中編戶千餘而已居無尺椽人無煙爨蕭條悽慘獸遊鬼哭牛必羸角輿必説輹棧車挽漕亦不易求今於無人之境興此勞人之運固難就矣其病一也河汴有初不修則毀澱故每年正月發近縣丁男塞長茭決沮淤清明桃花已後遠水自然安流陽侯宓妃不復太息頃因寇難總不掏拓澤滅水岸石崩役夫需於沙津吏旋於濘千里洄上罔水舟行其病二也東垣底柱澠池二陵北河運處五六百里戍卒久絶縣吏空拳奪攘姦宄窟穴囊橐夾河為藪豺狼狺狺舟行所經寇亦能往其病三也東自淮陰西臨蒲坂亙三千里屯戍相望中軍皆鼎司元侯賤卒儀同青紫每云食半菽又云無挾纊挽漕所至船到便留即非單車使折簡書所能制矣其病四也惟小子畢其慮奔走之惟中書詳其利病裁成之晏纍年已來事缺名毀聖慈含育特賜生全月餘家居遽即臨遣恩榮感切思殞百身見一水不通願荷鍤而先往見一粒不運願負米而先趨焦心苦形期報明主丹誠未克漕引多虞屏營中流掩泣獻狀自此每歲運米數十萬石以濟關中又至德初為國用不足令第五琦於諸道榷鹽以助軍用及晏代其任法益精密官無遺利初歲入錢六十萬貫季年所入逾十倍而人無厭苦大曆末通計一歲征賦所入總一千二百萬貫而鹽利且過半纍遷吏部尚書大曆四年六月與右僕射裴遵慶同赴本曹視事敕尚食增置儲供許內侍魚朝恩及宰臣已下常朝官咸詣省送上八年知三銓選事十二年三月誅宰臣元載晏奉詔訊鞫晏以載居任樹黨布于天下不敢專斷請他官共事敕御史大夫李涵右散騎常侍蕭昕兵部侍郎袁禮部侍郎常衮諫議大夫杜亞同推載皆款伏初晏承旨門下侍郎同平章事王縉亦處極法晏謂涵等曰重刑再覆國之常典況誅大臣得不覆奏又法有首從二人同刑亦宜重取進止涵等從命及晏等覆奏代宗乃減縉罪從輕縉之生晏平反之力也十三年十二月為尚書左僕射時宰臣常衮專政以晏久掌銓衡時議平允兼司儲蓄職舉功深慮公望日崇上心有屬竊忌之乃奏晏朝廷舊德宜為百吏師長外示崇重內實去其權及奏上以晏使務方理代其任者難其人使務知三銓並如故李靈曜之亂也河南節帥所據多不奉法令征賦亦隨之州縣雖益減晏以羡餘相補人不加賦所入仍舊議者稱其能自諸道巡院距京師重價募疾足置遞相望四方物價之上下雖極遠不四五日知故食貨之重輕盡權在掌握朝廷獲美利而天下無甚貴甚賤之憂得其術矣凡所任使多收後進有幹能者其所總領務乎急促趨利者化之遂以成風當時權勢或以親戚為託晏亦應之俸給之多少命官之遲速必如其志然未嘗得親職事其所領要務必一時之選故晏沒後二十餘年韓洄元琇裴腆包佶盧徵李衡繼掌財賦皆晏故吏其部吏居數千里之外奉教令如在目前雖寢興宴語而無欺紿四方動靜莫不先知事有可賀者必先上章奏江淮茶橘晏與本道觀察使各歲貢之皆欲其先至有土之官或封山斷道禁前發者晏厚以財力致之常先他司由是甚不為藩鎮所便晏理家以儉約稱而重交敦舊頗以財貨遺天下名士故人多稱之善訓諸子咸有學藝任事十餘年權勢之重鄰於宰相要官重職頗出其門既有材力視事敏速乘機無滯然多任數挾權貴固恩澤有口者必利啖之當大曆時事貴因循軍國之用皆仰於晏未嘗檢轄德宗嗣位言事者稱轉運可罷多矣初楊炎為吏部侍郎晏為尚書各恃權使氣兩不相得炎坐元載貶晏快之昌言於朝及炎入相追怒前事且以晏與元載隙憾時人言載之得罪晏有力焉炎將為載復讎又時人風言代宗寵獨孤妃而又愛其子韓王迥晏密啓請立獨孤為皇后炎因對揚流涕奏言賴祖宗福祐先皇與陛下不為賊臣所間不然劉晏黎幹之輩搖動社稷凶謀果矣今幹以伏罪晏猶領權臣為宰相不能正持此事罪當萬死崔祐甫奏言此事曖昧陛下以廓然大赦不當究尋虛語朱泚崔寧又從傍與祐甫救解之寧言頗切炎大怒故斥寧令出鎮鄜坊以摧挫之遂罷晏轉運等使尋貶為忠州刺史炎欲誣構其罪知庾準與晏素有隙舉為荊南節度以伺晏動靜準乃奏晏與朱泚書祈救解言多怨望炎又證成其事上以為然是月庚午晏已受誅使回奏報誣晏以忠州謀叛下詔暴言其罪時年六十六天下冤之家屬徙嶺表連纍者數十人貞元五年上悟方録晏子執經授太常博士少子宗經祕書郎執經上請削官贈父特追贈鄭州刺史第五琦京兆長安人少孤事兄華敬順過人及長有吏才以富國強兵之術自任天寶初事韋堅堅敗貶官纍至須江丞時太守賀蘭進明甚重之會安祿山反進明遷北海郡太守奏琦為録事參軍祿山已陷河間信都等五郡進明未有戰功玄宗大怒遣中使封刀促之曰收地不得即斬進明之首進明惶懼莫知所出琦乃勸令厚以財帛募勇敢士出奇力戰遂收所陷之郡令琦奏事至蜀中琦得謁見奏言方今之急在兵兵之強弱在賦賦之所出江淮居多若假臣職任使濟軍須臣能使賞給之資不勞聖慮玄宗大喜即日拜監察御史勾當江淮租庸使尋拜殿中侍御史尋加山南等五道度支使促辦應卒事無違闕遷司金郎中兼御史中丞使如故於是創立鹽法就山海井竈收榷其鹽官置吏出糶其舊業戶並浮人願為業者免其雜徭隸鹽鐵使盜私市罪有差百姓除租庸外無得橫賦人不益稅而上用以饒遷戶部侍郎兼御史中丞專判度支領河南等道支度都勾當轉運租庸鹽鐵鑄錢司農太府出納山南東西江西淮南館驛等使乾元二年以本官加同中書門下平章事初琦以國用未足幣重貨輕乃請鑄乾元重寶錢以一當十行用之及作相又請更鑄重輪乾元錢一當五十與乾元錢及開元通寶錢三品並行既而穀價騰貴餓殣死亡枕藉道路又盜鑄爭起中外皆以琦變法之弊封奏日聞乾元二年十月貶忠州長史既在道有告琦受人黃金二百兩者遣御史劉期光追按之琦對曰二百兩金十三斤重忝為宰相不可自持若其付受有憑即請準法科罪期光以為此是琦伏罪也遽奏之請除名配流夷州馳驛發遣仍差綱領送至彼寶應初起為朗州刺史甚有能政入遷太子賓客屬吐蕃寇陷京師代宗幸陝關內副元帥郭子儀請琦為糧料使兼御史大夫充關內元帥副使未幾改京兆尹車駕克復專判度支兼諸道鑄錢鹽鐵轉運常平等使纍封扶風郡公又加京兆尹改戶部侍郎判度支前後領財賦十餘年魚朝恩伏誅琦坐與款狎出為處州刺史歷饒湖二州入為太子賓客東都留司上以其材將復任用召還京師信宿而卒年七十贈太子少保子峯峯婦鄭氏女皆以孝著旌表其門班宏衛州汲人也祖思簡春官員外郎父景倩祕書監宏少舉進士授右司禦胄曹後為薛景先鳳翔掌書記又為高適劍南觀察判官纍拜大理司直攝監察御史時青城山有妖賊張安居以左道惑衆事覺多誣引大將冀以緩死宏驗理而速殺之人心乃安既而郭英乂代適以厭人望奏署祕書郎兼雒令以疾免大曆三年遷起居舍人尋兼理匭使四遷至給事中時李寶臣卒於其位子惟嶽匿喪求位上遣宏使成德問疾且喻之惟嶽厚賂宏皆不受還報合旨遷刑部侍郎兼京官考使時右僕射崔寧考兵部侍郎劉乃上下宏駁曰夷荒靖難專在節制尺籍伍符不校省司夫上行宣美之名則下開趨競之路上行阿容下必朋黨因削去之乃知而謝曰乃雖不敏敢掠一美以徼二罪乎尋除吏部侍郎為吐蕃會盟使李揆之副貞元初仍歲旱蝗上以賦調為急改戶部侍郎為度支使韓滉之副遷尚書復副竇參參初為大理司直宏已為刑部侍郎及參為相領度支上以宏久司國計因令副之且曰朕藉參宰相以臨遠衆務悉委於卿勿以辭也參以宏先貴常私解悅之曰參後來一朝居尚書之上甚不自安一年之後當歸此使宏心喜歲餘參絶不復言宏性剛愎為人間之且怒食言公事多異揚子院鹽鐵轉運委藏也宏以御史中丞徐粲主之既不理且以賄聞參欲代之宏執不可參又選諸院吏未嘗訪宏乃疏參所用者過惡以聞事輒留中無何參以使勞加吏部尚書而宏進封蕭國公怨參以虛號寵之間惡愈甚每奉詔營建宏必極壯麗親程課役又厚結權幸以傾參張滂先善於宏宏薦為司農少卿及參欲以滂分掌江淮鹽鐵詢之於宏宏以滂嫉惡慮以法繩徐粲因曰滂強戾難制不可用滂知之八年三月參遂為上所疏乃讓度支使遂以宏專判而參不欲使務悉歸於宏問計京兆尹薛王玉王玉曰二子交惡而滂剛決若分鹽鐵轉運於滂必能制宏參乃薦滂為戶部侍郎鹽鐵使判轉運尚隸於宏以悅之江淮兩稅悉宏主之置巡院然令宏滂共擇其官滂請鹽鐵舊簿書於宏宏不與之每署院官宏滂更相是非莫有用者滂乃奏曰班宏與臣相戾巡院多闕官臣掌財賦國家大計職不修無所逃罪今宏若此何以輯事遂令分掌之無幾宏言於宰相趙憬陸贄曰宏職轉運年運江淮米五十萬斛前年增七十萬斛以實太倉幸無過今職移於人不知何謂滂時在側忿然曰尚書失言甚矣若運務畢舉朝廷固不奪之蓋由喪公錢縱姦吏故也且凡為度支胥吏不一歲資纍巨萬僮馬第宅僭於王公非盜官財何以致是道路喧喧無不知之聖上故令滂分掌公向所言無乃歸怨於上乎宏默然不對是日宏稱疾於第滂往問之宏不見憬贄乃以宏滂之言上聞由是遵大曆故事如劉晏韓滉所分滂至揚州按徐粲逮僕妾子姪得贓巨萬乃徙嶺表故參得罪宏頗有力焉勤恪官署晨入夕歸下吏勞而未嘗厭苦清白勤幹稱之於時貞元八年七月卒年七十三廢朝加贈諡曰敬王紹本家于太原今為京兆萬年人舊名與憲宗同永貞年改焉少時顏真卿器重之因紹舊名字之曰德素奏授武康尉蕭復為常州刺史辟為從事包佶領租庸鹽鐵亦以紹為判官時李希烈阻兵江淮租輸所在艱阻特移運路自潁入汴紹奉佶表詣闕屬德宗西幸紹乃督緣路輕貨趣金商路倍程出洋州以赴行在德宗親勞之謂紹曰六軍未有春服我猶衣裘紹俯伏流涕奏曰包佶令臣間道進奉數約五十萬上曰道路回遠經費懸急卿之所奏豈可望耶後五日而所督繼至上深賴焉貞元中為倉部員外郎時屬兵革旱蝗之後令戶部收闕官俸兼稅茶及諸色無名之錢以為水旱之備紹自拜倉部便準詔主判及遷戶部兵部郎中皆獨司其務擢拜戶部侍郎尋判度支後二年遷戶部尚書德宗臨馭歲久機務不由台司自竇參陸贄已後宰臣備位而已德宗以紹謹密恩遇特異凡主重務八年政之大小多所訪決紹未嘗泄漏亦不矜衒順宗即位王叔文始奪其權拜兵部尚書尋除檢校吏部尚書東都留守元和初遷檢校尚書右僕射徐州刺史武寧軍節度復以濠泗二州隸焉時承張愔之後兵驕難治紹修輯軍政人甚安之六年徵拜兵部尚書兼判戶部事九年卒年七十二贈左僕射諡曰敬李巽字令叔趙郡人少苦心為學以明經調補華州參軍拔萃登科授鄠縣尉周歷臺省由左司郎中出為常州刺史踰年召為給事中出為湖南觀察使鋭於為理五年改江西觀察使加檢校散騎常侍兼御史大夫巽持下以法吏不敢欺而動必察之順宗即位入為兵部侍郎司徒杜佑判度支鹽鐵轉運使以巽幹治奏為副使佑辭重位巽遂專領度支鹽鐵使榷管之法號為難重唯大曆中僕射劉晏雅得其術賦入豐羡巽掌使一年征課所入類晏之多歲明年過之又一年加一百八十萬貫舊制每歲運江淮米五十萬斛抵河陰久不盈其數唯巽三年登焉遷兵部尚書明年改吏部尚書使任如故巽精於吏職蓋性使然也雖在私家亦置案牘簿書勾檢如公署焉人吏有過絲亳無所貸雖在千里外其恐栗如在巽前初程虉附王叔文貶竄巽知其吏才明辨奏而用之憲宗不違其請虉勾檢簿籍又精於巽故課最加衍亦虉之助焉巽為吏部尚書臥疾郎官相率省問巽初不言其病與之考校程課商略功利至其夕而卒然性強很狡惡忌刻頗甚乘德宗之怒謀殺竇參物論冤之初參為宰相不悅於巽自左司郎中出為常州刺史仍促其行不數月參貶郴州司馬久之巽自給事中為湖南觀察使郴即屬郡也宣武軍節度使劉士寧以擅襲父任物議不可朝廷不得已而授之及參之貶士寧嘗以絹數千匹賂參巽在湖南具奏其事言參與藩鎮交通德宗怒遂賜參死議者冤之巽廉察江西徇喜怒之情而無罪被戮者多矣元和四年四月卒時年七十一贈尚書左僕射史臣曰歷代操利柄為國計者莫不損下益上危人自安變法以弄權斂怨以構禍皆有之矣如劉晏通擁滯任才能富其國而不勞於民儉於家而利於衆或問曰鄭子産吏不能欺宓子賤吏不忍欺西門豹吏不敢欺三子者古之賢人也吏皆懷其欺而不能不忍不敢也晏之吏遠近自不欺者何也答曰蓋任其才而得其人也晏歿故吏二十餘年繼掌財賦不其是哉史記貨殖云平糶齊物關市不乏治國之道也晏治天下無甚貴甚賤之物泛言治國者其可及乎舉真卿才忠也減王縉罪正也忠正之道復出於人嗚呼木秀於林風必摧之常衮見忌於前楊炎致冤於後可為長歎息矣時譏有口者以利啖之苟不塞讒口何以持重權即無以展其才濟其國矣是其術也又何譏焉第五琦促辦應卒民不加賦而國豐饒亦庶幾矣然鑄錢變法物貴身危其何陋哉凡利國者農商之外不可為也宏滂爭權樹黨皆非令人紹之謹密幹事巽之皎察精辨亦足可稱贊曰豐財忠良晏道為長琦宏滂巽咸以利彰
