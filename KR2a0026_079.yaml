body:
  text: 舊唐書卷七十五列傳第二十五蘇世長子良嗣韋雲起孫方質孫伏伽張玄素蘇世長雍州武功人也祖彤後魏通直散騎常侍父振周宕州刺史建威縣侯周武帝時世長年十餘歲上書言事武帝以其年小召問讀何書對曰讀孝經論語武帝曰孝經論語何所言對曰孝經云為國者不敢侮於魚衆寡論語云為政以德武帝善其對令於獸門館讀書以其父歿王事因令襲爵世長於武帝前劈踴號武帝為之改容隋文帝受禪世長又屢上便宜頗有補益超遷長安令大業中為都水少監使於上江督運會江都難作世長為煬帝發喪慟哭哀感路人王世充僭號署為太子太保行臺右僕射與世充兄子弘烈及將豆盧褒俱鎮襄陽時弘烈娶褒女為妻深相結託高祖與褒有舊璽書諭之不從頻斬使者武德四年洛陽平世長首勸弘烈歸降既至京師高祖誅褒而責世長來晚之故世長頓顙曰自古帝王受命為逐鹿之喻一人得之萬夫斂手豈有獲鹿之後忿同獵之徒問爭肉之罪也陛下應天順人布德施惠又安得忘管仲雍齒之事乎且臣武功之士經涉亂離死亡略盡惟臣殘命得見聖朝陛下若復殺之是絶其類也實望天恩使有遺種高祖與之有故笑而釋之尋授玉山屯監後於玄武門引見語及平生恩意甚厚高祖曰卿自謂諂佞耶正直耶對曰臣實愚直高祖曰卿若直何為背世充而歸我對曰洛陽既平天下為一臣智窮力屈始歸陛下向使世充尚在臣據漢南天意雖有所歸人事足為勍敵高祖大笑嘗嘲之曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖旨口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國惟蒙屯監即日擢拜諫議大夫從幸涇陽校獵大獲禽獸於旌門高祖入御營顧謂朝臣曰今日畋樂乎世長進曰陛下遊獵薄廢萬機不滿十旬未為大樂高祖色變既而笑曰狂態發耶世長曰為臣私計則狂為陛下國計則忠矣及突厥入寇武功郡縣多失戶口是後下詔將幸武功校獵世長又諫曰突厥初入大為民害陛下救恤之道猶未發言乃於其地又縱畋獵非但仁育之心有所不足百姓供頓將何以堪高祖不納又嘗引之於披香殿世長酒酣奏曰此殿隋煬帝所作耶是何雕麗之若此也高祖曰卿好諫似直其心實詐豈不知此殿是吾所造何須設詭疑而言煬帝乎對曰臣實不知但見傾宮鹿臺琉璃之瓦並非受命帝王愛民節用之所為也若是陛下作此誠非所宜臣昔在武功幸常陪侍見陛下宅宇才蔽風霜當此之時亦以為足今因隋之侈民不堪命數歸有道而陛下得之實謂懲其奢淫不忘儉約今初有天下而於隋宮之內又加雕飾欲撥其亂寧可得乎高祖深然之後歷陝州長史天策府軍咨祭酒秦府初開文學館引為學士與房玄齡等一十八人皆蒙圖畫令文學褚亮為之贊曰軍咨諧噱超然辨悟正色于庭匪躬之故貞觀初聘于突厥與頡利爭禮不受賂遺朝廷稱之出為巴州刺史覆舟溺水而卒世長機辨有學博涉而簡率嗜酒無威儀初在陝州部內多犯法世長莫能禁乃責躬引咎自撻於都街伍伯嫉其詭鞭之見血世長不勝痛大呼而走觀者咸以為笑議者方稱其詐子良嗣高宗時遷周王府司馬王時年少舉事不法良嗣正色匡諫甚見敬憚王府官屬多非其人良嗣守文檢括莫敢有犯深為高宗所稱遷荊州大都督府長史高宗使宦者緣江採異竹將於苑中植之宦者科舟載竹所在縱暴還過荊州良嗣囚之因上疏切諫稱遠方求珍異以疲道路非聖人抑己愛人之道又小人竊弄威福以虧皇明言甚切直疏奏高宗下制慰勉遽令棄竹於江中永淳中為雍州長史時關中大飢人相食盜賊縱橫良嗣為政嚴明盜發三日內無不擒擲則天臨朝遷工部尚書尋代王德真為納言纍封溫國公為西京留守則天賦詩餞送賞遇甚渥時尚方監裴匪躬檢校京苑將鬻苑中果菜以收其利良嗣駁之曰昔公儀相魯猶能拔葵去織未聞萬乘之主鬻其果菜以與下人爭利也匪躬遂止無幾追入都遷文昌左相同鳳閣鸞臺三品載初元年春罷文昌左相加位特進仍依舊知政事與地官尚書韋方質不協及方質坐事當誅辭引良嗣則天特保明之良嗣謝恩拜伏便不能復起輿歸其家詔御醫張文仲韋慈藏往視疾其日薨年八十五則天輟朝三日舉哀於觀風門敕百官就宅赴弔贈開府儀同三司益州都督賜絹布八百段米粟八百石兼降璽書弔祭其子踐言太常丞尋為酷吏所陷配流嶺南而死追削良嗣官爵籍沒其家景龍元年追贈良嗣司空踐言子務玄襲爵溫國公開元中為邠王府長史韋雲起雍州萬年人伯父澄武德初國子祭酒綿州刺史雲起隋開皇中明經舉授符璽直長嘗因奏事文帝問曰外間有不便事汝可言之時兵部侍郎柳述在帝側雲起應聲奏曰柳述驕豪未嘗經事兵機要重非其所堪徒以公主之壻遂居要職臣恐物議以陛下官不擇賢濫以天秩加於私愛斯亦不便之大者帝甚然其言顧謂述曰雲起之言汝藥石也可師友之仁壽初詔在朝文武舉人述乃舉雲起進授通事舍人大業初改為通事謁者又上疏奏曰今朝廷之內多山東人而自作門戶更相剡薦附下罔上共為朋黨不抑其端必傾朝政臣所以痛心扼腕不能默已謹件朋黨人姓名及姦狀如左煬帝令大理推究於是左丞郎蔚之司隸別駕郎楚之並坐朋黨配流漫頭赤水餘免官者九人會契丹入抄營州詔雲起護突厥兵往討契丹部落啓民可汗發騎二萬受其處分雲起分為二十營四道俱引營相去各一里不得交雜聞鼓聲而行聞角聲而止自非公使勿得走馬三令五申之後擊鼓而發軍中有犯約者斬紇干一人持首以徇於是突厥將帥來入謁之皆膝行股戰莫敢仰視契丹本事突厥情無猜忌雲起既入其界使突厥詐云向柳城郡欲共高麗交易勿言營中有隋使敢漏泄者斬之契丹不備去賊營百里詐引南度夜復退還去營五十里結陳而宿契丹弗之知也既明俱發馳騎襲之盡獲其男女四萬口女子及畜産以半賜突厥餘將入朝男子皆殺之煬帝大喜集百官曰雲起用突厥而平契丹行師奇譎才兼文武又立朝謇諤朕今親自舉之擢為治書御史雲起乃奏劾曰內史侍郎虞世基職典樞要寄任隆重御史大夫裴蘊特蒙殊寵維持內外今四方告變不為奏聞賊數實多或減言少陛下既聞賊少發兵不多衆寡懸殊往皆莫克故使官軍失利賊黨日滋此而不繩為害將大請付有司詰正其罪大理卿鄭善果奏曰雲起詆訾名臣所言不實非毀朝政妄作威權由是左遷大理司宜煬帝幸揚州雲起告歸長安屬義旗入關於長樂宮謁見義寧元年授司農卿封陽城縣公武德元年加授上開府儀同三司判農圃監事是歲欲大發兵討王世充雲起上表諫曰國家承喪亂之後百姓流離未蒙安養頻年不熟關內阻飢京邑初平物情未附鼠竊狗盜猶為國憂盩厔司竹餘氛未殄藍田谷口羣盜實多朝夕伺間極為國害雖京城之內每夜賊發北有師都連結胡寇斯乃國家腹心之疾也捨此不圖而窺兵函洛若師出之後內盜乘虛一旦有變禍將不小臣謂王世充遠隔千里山川懸絶無能為害待有餘力方可討之今內難未弭且宜弘於度外如臣愚見請暫戢兵務穡勸農安人和衆關中小盜自然寧息秦川將卒賈勇有餘三年之後一舉便定今雖欲速臣恐未可乃從之會突厥入寇詔雲起總領豳寧已北九州兵馬便宜從事四年授西麟州刺史司農卿如故尋代趙郡王孝恭為夔州刺史轉遂州都督懷柔夷獠咸得衆心遷益州行臺民部尚書尋轉行臺兵部尚書行臺僕射竇軌多行殺戮又妄奏獠反冀得集兵因此作威肆其凶暴雲起多執不從雲起又營私産交通生獠以規其利軌亦對衆言之由是構隙情相猜二隱太子之死也敕遣軌息馳驛詣益州報軌軌乃疑雲起弟慶儉堂弟慶嗣及親族並事東宮慮其聞狀或將為變先設備而後告之雲起果不信問曰詔書何在軌曰公建成黨也今不奉詔同反明矣遂執殺之初雲起年少時師事太學博士王頗頗每與之言及時事甚嘉歎之乃謂之曰韋生識悟如是必能自取富貴然剛腸嫉惡終當以此害身竟如頗言子師實垂拱初官至華州刺史太子少詹事封扶陽郡公師實子方質則天初鸞臺侍郎地官尚書同鳳閣鸞臺平章事時改修垂拱格式方質多所損益甚為時人所稱俄而武承嗣三思當朝用事諸宰相咸傾附之方質疾假承嗣等詣宅問疾方質據牀不為之禮左右云踞見權貴恐招危禍方質曰吉凶命也大丈夫豈能折節曲事近戚以求苟免也尋為酷吏周興來子珣所構配流儋州仍籍沒其家尋卒神龍初雪免孫伏伽貝州武城人大業末自大理寺史纍補萬年縣法曹武德元年初以三事上諫其一曰臣聞天子有諍臣雖無道不失其天下父有諍子雖無道不陷於不義故云子不可不諍於父臣不可不諍於君以此言之臣之事君猶子之事父故也隋後主所以失天下者何也止為不聞其過當時非無直言之士由君不受諫自謂德盛唐堯功過夏禹窮侈極欲以恣其心天下之士肝腦塗地戶口減耗盜賊日滋而不覺知者皆由朝臣不敢告之也向使修嚴父之法開直言之路選賢任能賞罰得中人人樂業誰能搖動者乎所以前朝好為變更不師古訓者止為天誘其咎將以開今聖唐也陛下龍舉晉陽天下響應計不旋踵大位遂隆陛下勿以唐得天下之易不知隋失之不難也陛下貴為天子富有天下動則左史書之言則右史書之既為竹帛所拘何可恣情不慎凡有搜狩須順四時既代天理安得非時妄動陛下二十日龍飛二十一日有獻鷂雛者此乃前朝之弊風少年之事務何忽今日行之又聞相國參軍事盧牟子獻琵琶長安縣丞張安道獻弓箭頻蒙賞勞但普天之下莫非王土率土之濱莫非王臣陛下必有所欲何求而不得陛下所少者豈此物哉願陛下察臣愚忠則天下幸甚其二曰百戲散樂本非正聲有隋之末大見崇用此謂淫風不可不改近者太常官司於人間借婦女裙襦五百餘具以充散妓之服云擬五月五日於玄武門遊戲臣竊思審實損皇猷亦非貽厥子孫謀為後代法也故書云無以小惡為無傷而弗去恐從小至於大故也論語云放鄭聲遠佞人又云樂則韶舞以此言之散妓定非功成之樂也如臣愚見請並廢之則天下不勝幸甚其三曰臣聞性相近而習相遠以其所好相染也故書云與治同道罔弗興與亂同事罔弗亡以此言之興亂其在斯與皇太子及諸王等左右羣僚不可不擇而任之也如臣愚見但是無義之人及先來無賴家門不能雍睦及好奢華馳獵馭射專作慢遊狗馬聲色歌舞之人不得使親而近之也此等止可悅耳目備驅馳至於拾遺補闕決不能為也臣歷窺往古下觀近代至於子孫不孝兄弟離間莫不為左右亂之也願陛下妙選賢才以為皇太子僚友如此即克隆盤石永固維城矣高祖覽之大悅下詔曰秦以不聞其過而亡典籍豈無先誡臣僕諂諛故弗之覺也漢高祖反正從諫如流洎乎文景繼業宣元承緒不由斯道孰隆景祚周隋之季忠臣結舌一言喪邦諒足深誡永言於此常深歎息朕每惟寡薄恭膺寶命雖不能性與天道庶思勉力常冀弼諧以匡不逮而羣公卿士罕進直言將申虛受之懷物所未諭萬年縣法曹孫伏伽至誠慷慨詞義懇切指陳得失無所回避非有不次之舉曷貽利行之益伏伽既懷諒直宜處憲司可治書侍御史仍頒示遠近知朕意焉兼賜帛三百匹時軍國多事賦斂繁重伏伽屢奏請改革高祖並納焉二年高祖謂裴寂曰隋末無道上下相蒙主則驕矜臣惟諂佞上不聞過下不盡忠至使社稷傾危身死匹夫之手朕撥亂反正志在安人平亂任武臣守成委文吏庶得各展器能以匡不逮比每虛心接待冀聞讜言然惟李綱善盡忠款孫伏伽可謂誠直餘人猶踵弊風俯首而已豈朕所望哉及平王世充竇建德大赦天下既而責其黨與並令配遷伏伽上表諫曰臣聞王言無戲自古格言去食存信聞諸舊典故書云爾無不信朕不食言又論語云一言出口駟不及舌以此而論言之出口不可不慎伏惟陛下光臨區宇覆育羣生率土之濱誰非臣妾絲綸一發取信萬方使聞之者不疑見之者不惑陛下今月二日發雲雨之制光被黔黎無所間然公私蒙賴既云常赦不免皆赦除之此非直赦其有罪亦是與天下斷當許其更新以此言之但是赦後即便無事因何王世充及建德部下赦後乃欲遷之此是陛下自違本心欲遣下人若為取則若欲子細推尋逆城之內人誰無罪故書云殲厥渠魁脅從罔治若論渠魁世充等為首渠魁尚免脅從何辜且古人云跖狗吠堯蓋非其主在東都城內及建德部下乃有與陛下積小故舊編髮友朋猶尚有人敗後始至者此等豈忘陛下皆云被壅故也以此言之自外疏者竊謂無罪又書云非知之艱行之惟艱上古以來何代無君所以祇稱堯舜之善者何也直由為天子者實難善名難得故也往者天下未平威權須應機而作今四方既定設法須與人共之但法者陛下自作之還須守之使天下百姓信而畏之今自為無信欲遣兆人若為信畏故書云無偏無黨王道蕩蕩無黨無偏王道平平賞罰之行達乎貴賤聖人制法無限親疏如臣愚見世充建德下僞官經赦合免責情欲遷配者請並放之則天下幸甚又上表請置諫官高祖皆納焉太宗即位賜爵樂安縣男貞觀元年轉大理少卿太宗嘗馬射伏伽上書諫曰臣聞千金之子坐不垂堂百金之子立不倚衡以此言之天下之主不可履險乘危明矣臣又聞天子之居也則禁衛九重其動也則出警入蹕此非直尊其居處乃為社稷生靈之大計耳故古人云一人有慶兆人賴之臣竊聞陛下猶自走馬射帖娛悅近臣此乃無禁乘危竊為陛下有所不取也何者一則非光史冊二則未足顯揚又非所以導養聖躬亦不可以垂範後代此祇是少年諸王之所務豈得既為天子今日猶行之乎陛下雖欲自輕其奈社稷天下何如臣愚見竊謂不可太宗覽之大悅五年坐奏囚誤失免官尋起為刑部郎中纍遷大理少卿轉民部侍郎十四年拜大理卿後出為陝州刺史永徽五年以年老致仕顯慶三年卒張玄素蒲州虞鄉人隋末為景城縣戶曹竇建德攻陷景城玄素被執將就戮縣民千餘人號泣請代其命曰此人清慎若是今倘殺之乃無天也大王將定天下當深加禮接以招四方如何殺之使善人解體建德遽命釋之署為治書侍御史固辭不受及江都不守又召拜黃門侍郎始應命建德平授景城都督府録事參軍太宗聞其名及即位召見訪以政道對曰臣觀自古以來未有如隋室喪亂之甚豈非其君自專其法日亂向使君虛受於上臣弼違於下豈至於此且萬乘之重又欲自專庶務日斷十事而五條不中中者信善其如不中者何況一日萬機已多虧失以日繼月乃至纍年乖謬既多不亡何待如其廣任賢良高居深視百司奉職誰敢犯之臣又觀隋末沸騰被於宇縣所爭天下者不過十數人餘皆保邑全身思歸有道是知人欲背主為亂者鮮矣但人君不能安之遂致於亂陛下若近覽危亡日慎一日堯舜之道何以能加太宗善其對擢拜侍御史尋遷給事中貞觀四年詔發卒修洛陽宮乾陽殿以備巡幸玄素上書諫曰微臣竊思秦始皇之為君也藉周室之餘六國之盛將貽之萬葉及其子而亡良由逞嗜奔欲逆天害人者也是知天下不可以力勝神祇不可以親恃惟當弘儉約薄賦斂慎終如始可以永固方今承百王之末屬凋弊之餘必欲節之以禮制陛下宜以身為先東都未有幸期即何須補葺諸王今並出藩又須營構興發漸多豈疲人之所望其不可一也陛下初平東都之始層樓廣殿皆令撤毀天下翕然同心欣仰豈有初則惡其侈靡今乃襲其雕麗其不可二也每承音旨未即巡幸此則事不急之務成虛費之勞國無兼年之積何用兩都之好勞役過度怨讟將起其不可三也百姓承亂離之後財力凋盡天恩含育粗見存立飢寒猶切生計未安三五年間恐未平復奈何營未幸之都奪疲人之力其不可四也昔漢高祖將都洛陽婁敬一言即日西駕豈不知地惟土中貢賦所均但以形勝不如關內也伏惟陛下化凋弊之人革澆漓之俗為日尚淺未甚淳和斟酌事宜詎可東幸其不可五也臣又嘗見隋室造殿楹棟宏壯大木非隨近所有多從豫章採來二千人曳一柱其下施轂皆以生鐵為之若用木輪便即火出鐵轂既生行一二里即有破壞仍數百人別齎鐵轂以隨之終日不過進三二十里略計一柱已用數十萬功則餘費又過於此臣聞阿房成秦人散章華就楚衆離及乾陽畢功隋人解體且以陛下今時功力何如隋日役瘡痍之人襲亡隋之弊以此言之恐甚於煬帝深願陛下思之無為由余所笑則天下幸甚太宗曰卿謂我不如煬帝何如桀紂對曰若此殿卒興所謂同歸於亂且陛下初平東都太上皇敕大殿高門並宜焚毀陛下以瓦木可用不宜焚灼請賜與貧人事雖不行然天下翕然謳歌至德今若遵舊制即是隋役復興五六年間趨捨頓異何以昭示子孫光敷四海太宗歎曰我不思量遂至於此顧謂房玄齡曰洛陽土中朝貢道均朕故修營意在便於百姓今玄素上表實亦可依後必事理須行露坐亦復何苦所有作役宜即停之然以卑干尊古來不易非其忠直安能若此可賜綵二百四侍中魏徵歎曰張公論事遂有回天之力可謂仁人之言其利博哉纍遷太子少詹事轉右庶子時承乾居春宮頗以遊畋廢學玄素上書諫曰臣聞皇天無親惟德是輔苟違天道人神同棄然古三驅之禮非欲教殺將為百姓除害故湯羅一面天下歸仁今苑中娛獵雖名異遊畋若行之無常終虧雅度且傅說曰學不師古匪說攸聞然則弘道在於學古學古必資師訓既奉恩詔令孔穎達侍講望數存問以補萬一仍博遣有名行學士兼朝夕侍奉覽聖人之遺教察既行之往事日知其所不足月無忘其所能此則盡善盡美夏啓周誦焉足言哉夫為人上者未有不求其善但以性不勝情耽惑成亂耽惑既甚忠言遂塞所以臣下苟順君道漸虧古人有言勿以小惡而不去小善而不為故知禍福之來皆起於漸殿下地居儲兩當須廣樹嘉猷既有好畋之淫何以主斯匕鬯慎終如始猶懼漸衰始尚不慎終將安保尋又兼太子少詹事十三年又上書諫曰臣聞周公以大聖之材猶握髮吐飧引納白屋而況後之聖賢敢輕斯道是以禮制皇太子入學而行齒胄欲使太子知君臣父子長幼之道然君臣之義父子之親尊卑之序長幼之節用之方寸之內弘之四海之外皆因行以遠聞假言以光被伏惟殿下睿質已隆尚須學文以飾其表至如孔穎達趙弘智等非惟宿德鴻儒亦兼達政要望令數得侍講開釋物理覽古諭今增暉睿德而雕蟲小伎之流祇可時命追隨以代博奕耳若其騎射畋遊酣歌戲玩苟悅耳目終穢心神漸染既久必移情性古人有言心為萬事主動而無節即亂臣恐殿下敗德之源在於此矣承乾並不能納太宗知玄素在東宮頻有進諫十四年擢授銀青光祿大夫行太子左庶子時承乾久不坐朝玄素諫曰宮內止有婦人耳不知如樊姬之徒可與弘益聖德者有幾若遂無賢哲便是親嬖幸遠忠良人不見德何以光敷三善且宮儲之寄於國為重所以廣置羣僚以輔睿德今乃動經時月不見宮臣納誨既疏將何補闕承乾嫉其數諫遣戶奴夜以馬撾擊之殆至於死承乾又嘗於宮中擊鼓聲聞于外玄素叩閣請見極言切諫承乾乃出宮內鼓對玄素毀之是歲太宗嘗對朝問玄素歷官所由玄素既出自刑部令史甚以慚恥諫議大夫褚遂良上疏曰臣聞君子不失言於人聖主不戲言於臣言則史書之禮成之樂歌之居上能禮其臣臣始能盡力以奉其上近代宋孝武輕言肆口侮弄朝臣攻其門戶乃至狼狽良史書之以為非是陛下昨見問張玄素云隋任何官奏云縣尉又問未為縣尉已前奏云流外又問在何曹司玄素將出閣門殆不能移步精爽頓盡色類死灰朝臣見之多所驚怪大唐創曆任官以才卜祝庸保量能使用陛下禮重玄素頻年任使擢授三品翼贊皇儲自不可更對羣臣窮其門戶棄昔日之殊恩成一朝之愧恥人君之御臣下也禮義以導之惠澤以驅之使其負戴玄天罄輸臣節猶恐德禮不加人不自勵若無故忽略使其羞慚鬱結於懷衷心靡樂責其伏節死義其可得乎書奏太宗謂遂良曰朕亦悔此問今得卿疏深會我心承乾既敗德日增玄素又上書諫曰臣聞孔子云能近取譬可謂仁之方也已然書傳所載言之或遠尋覽近事得失斯存至如周武帝平定山東卑宮菲食以安海內太子贇舉措無端穢德日著烏丸軌知其不可具言於武帝武帝慈仁望其漸改及至踐祚狂暴肆情區宇崩離宗祀覆滅即隋文帝所代是也文帝因周衰弱憑藉女資雖無大功於天下然布德行仁足為萬姓所賴勇為太子不能近遵君父之節儉而務驕侈今之山池遺跡即殿下所親覩是也此時亦恃君親之恩自謂太山之固詎知邪臣敢進其說向使動靜有常進退合度親君子疏小人捨浮華尚恭儉雖有邪臣間之何能致慈父之隙豈不由積德未弘令聞不著讒言一至遂成其禍竊惟皇儲之寄荷戴殊重如其積德不弘何以嗣守成業聖上以殿下親則父子事兼家國所應用物不為節限恩旨未踰六旬用物已過七萬驕奢之極孰云過此龍樓之下惟聚工匠望苑之內不覩賢良今言孝敬則闕視膳問安之禮語恭順則違君父慈訓之方求風聲則無愛學好道之實觀舉措則有因緣誅戮之罪宮臣正士未嘗在側羣邪淫巧昵近深宮愛好者皆遊手雜色施與者並圖畫雕鏤在外瞻仰已有此失居中隱密寧可勝計哉宣猷禁門不異闤闠朝入暮出穢聲已遠臣以德音日損頻上諫書自爾已來縱逸尤甚右庶子趙弘智經明行修當今善士臣每奏請望數召進與之談論庶廣徽猷令旨反有猜嫌謂臣妄相推引從善如流尚恐不逮飾非拒諫必招敗損方崇閉塞之源不慕欽明之術雖抱睿哲之資終罹罔念之咎古人云苦藥利病苦言利行伏惟居安思危日慎一日書入承乾不納乃遣刺客將加屠害俄屬宮廢玄素隨例除名十八年起授潮州刺史轉鄧州刺史永徽中以年老致仕龍朔三年加授銀青光祿大夫麟德元年卒史臣曰伏伽上疏於高祖玄素進言於太宗從疏賤以干至尊懷切直以明正理可謂至難矣既而並見抽奬咸蒙顧遇自非下情忠到效匪躬之節上聽聰明致如流之美孰能至於此乎書曰木從繩則正后從諫則聖斯之謂矣世長幼而聰悟長能規諫雲起屏絶朋黨罔避驕豪歷覽言行咸有可觀而雲起吐茹無方世長終成詭詐其不令也宜哉方諸孫張二子知不逮矣贊曰言為身文感義忘身不有忠膽安輕逆鱗蘇韋果俊伽素忠純悟主匡失猗歟諍臣
