body:
  text: 舊唐書卷八十九列傳第三十九狄仁傑族曾孫兼謨王方慶姚璹弟珽狄仁傑字懷英並州太原人也祖孝緒貞觀中尚書左丞父知遜夔州長史仁傑兒童時門人有被害者縣吏就詰之衆皆接對唯仁傑堅坐讀書吏責之仁傑曰黃卷之中聖賢備在猶不能接對何暇偶俗吏而見責耶後以明經舉授汴州判佐時工部尚書閻立本為河南道黜陟使仁傑為吏人誣告立本見而謝曰仲尼云觀過知仁矣足下可謂海曲之明珠東南之遺寶薦授並州都督府法曹其親在河陽別業仁傑赴並州登太行山南望見白雲孤飛謂左右曰吾親所居在此雲下瞻望佇立久之雲移乃行仁傑孝友絶人在並州有同府法曹鄭崇質母老且病當充使絶域仁傑謂曰太夫人有危疾而公遠使豈可貽親萬里之憂乃詣長史藺仁基請代崇質而行時仁基與司馬李孝廉不協因謂曰吾等豈獨無愧耶由是相待如初仁傑儀鳳中為大理丞周歲斷滯獄一萬七千人無冤訴者時武衛大將軍權善才坐誤斫昭陵柏樹仁傑奏罪當免職高宗令即誅之仁傑又奏罪不當死帝作色曰善才斫陵上樹是使我不孝必須殺之左右矚仁傑令出仁傑曰臣聞逆龍鱗忤人主自古以為難臣愚以為不然居桀紂時則難堯舜時則易臣今幸逢堯舜不懼比干之誅昔漢文時有盜高廟玉環張釋之廷諍罪止棄市魏文將徙其人辛毗引裾而諫亦見納用且明主可以理奪忠臣不可以威懼今陛下不納臣言瞑目之後羞見釋之辛毗於地下陛下作法懸之象魏徒流死罪俱有等差豈有犯非極刑即令賜死法既無常則萬姓何所措其手足陛下必欲變法請從今日為始古人云假使盜長陵一抔土陛下何以加之今陛下以昭陵一株柏殺一將軍千載之後謂陛下為何主此臣所以不敢奉制殺善才陷陛下於不道帝意稍解善才因而免死居數日授仁傑侍御史時司農卿韋機兼領將作少府二司高宗以恭陵玄宮狹小不容送終之具遣機續成其功機於埏之左右為便房四所又造宿羽高山上陽等宮莫不壯麗仁傑奏其太過機竟坐免官左司郎中王本立恃寵用事朝廷懾懼仁傑奏之請付法寺高宗特原之仁傑奏曰國家雖乏英才豈少本立之類陛下何惜罪人而虧王法必欲曲赦本立請棄臣於無人之境為忠貞將來之誡本立竟得罪繇是朝廷肅然尋加朝散大夫纍遷度支郎中高宗將幸汾陽宮以仁傑為知頓使並州長史李沖玄以道出妬女祠俗云盛服過者必致風雷之災乃發數萬人別開御道仁傑曰天子之行千乘萬騎風伯清塵雨師灑道何妬女之害耶遽令罷之高宗聞之歎曰真大丈夫也俄轉寧州刺史撫和戎夏人得歡心郡人勒碑頌德御史郭翰巡察隴右所至多所按劾及入寧州境內耆老歌刺史德美者盈路翰既授館召州吏謂之曰入其境其政可知也願成使君之美無為久留州人方散翰薦名於朝徵為冬官侍郎充江南巡撫使吳楚之俗多淫祠仁傑奏毀一千七百所唯留夏禹吳太伯季札伍員四祠轉文昌右丞出為豫州刺史時越王貞稱兵汝南事敗緣坐者六七百人籍沒者五千口司刑使逼促行刑仁傑哀其詿誤緩其獄密表奏曰臣欲顯奏似為逆人申理知而不言恐乖陛下存恤之旨表成復毀意不能定此輩咸非本心伏望哀其詿誤特敕原之配流豐州豫囚次於寧州父老迎而勞之曰我狄使君活汝輩耶相攜哭於碑下齊三日而後行豫囚至流所復相與立碑頌狄君之德初越王之亂宰相張光輔率師討平之將士恃功多所求取仁傑不之應光輔怒曰州將輕元帥耶仁傑曰亂河南者一越王貞耳今一貞死而萬貞生光輔質其辭仁傑曰明公董戎三十萬平一亂臣不戢兵鋒縱其暴橫無罪之人肝腦塗地此非萬貞何耶且凶威脅從勢難自固及天兵暫臨乘城歸順者萬計繩墜四面成蹊公奈何縱邀功之人殺歸降之衆但恐冤聲騰沸上徹于天如得尚方斬馬劍加於君頸雖死如歸光輔不能詰心甚銜之還都奏仁傑不遜左授復州刺史入為洛州司馬天授二年九月丁酉轉地官侍郎判尚書同鳳閣鸞臺平章事則天謂曰卿在汝南時甚有善政欲知譖卿者乎仁傑謝曰陛下以臣為過臣當改之陛下明臣無過臣之幸也臣不知譖者並為善友臣請不知則天深加歎異未幾為來俊臣誣構下獄時一問即承者例得減死來俊臣逼脅仁傑令一問承反仁傑歎曰大周革命萬物唯新唐朝舊臣甘從誅戮反是實俊臣乃少寬之判官王德壽謂仁傑曰尚書必得減死德壽意欲求少階級憑尚書牽楊執柔可乎仁傑曰若何牽之德壽曰尚書為春官時執柔任其司員外引之可也仁傑曰皇天后土遣仁傑行此事以頭觸柱流血被面德壽懼而謝焉既承反所司但待日行刑不復嚴備仁傑求守者得筆硯拆被頭帛書冤置綿衣中謂德壽曰時方熱請付家人去其綿德壽不之察仁傑子光遠得書持以告變則天召見覽之而問俊臣俊臣曰仁傑不免冠帶寢處甚安何由伏罪則天使人視之俊臣遽命仁傑巾帶而見使者乃令德壽代仁傑作謝死表附使者進之則天召仁傑謂曰承反何也對曰向若不承反已死於鞭笞矣何為作謝死表曰臣無此表示之乃知代署也故得免死貶彭澤令武承嗣屢奏請誅之則天曰朕好生惡殺志在恤刑渙汗已行不可更返萬歲通天年契丹寇陷冀州河北震動徵仁傑為魏州刺史前刺史獨孤思莊懼賊至盡驅百姓入城繕修守具仁傑既至悉放歸農畝謂曰賊猶在遠何必如是萬一賊來吾自當之必不關百姓也賊聞之自退百姓咸歌誦之相與立碑以紀恩惠俄轉幽州都督神功元年入為鸞臺侍郎同鳳閣鸞臺平章事加銀青光祿大夫兼納言仁傑以百姓西戍疏勒等四鎮極為凋弊乃上疏曰臣聞天生四夷皆在先王封疆之外故東拒滄海西隔流沙北橫大漠南阻五嶺此天所以限夷狄而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣此則今日之四境已逾於夏殷者也詩人矜薄伐於太原美化行於江漢則是前代之遠裔而國家之域中至前漢時胸奴無歲不陷邊殺掠吏人後漢則西羌侵軼漢中東寇三輔入河東上黨幾至洛陽由此言之則陛下今日之土宇過於漢朝遠矣若其用武荒外邀功絶域竭府庫之實以爭磽確不毛之地得其人不足以增賦獲其土不可以耕織苟求冠帶遠夷之稱不務固本安人之術此秦皇漢武之所行非五帝三皇之事業也若使越荒外以為限竭資財以騁欲非但不愛人力亦所以失天心也昔始皇窮兵極武以求廣地男子不得耕於野女子不得蠶於室長城之下死者如亂麻於是天下潰叛漢武追高文之宿憤藉四帝之儲實於是定朝鮮討西域平南越擊胸奴府庫空虛盜賊蜂起百姓嫁妻賣子流離於道路者萬計末年覺悟息兵罷役封丞相為富民侯故能為天所祐也昔人有言與覆車同軌者未嘗安此言雖小可以喻大近者國家頻歲出師所費滋廣西戍四鎮東戍安東調發日加百姓虛弊開守西域事等石田費用不支有損無益轉輸靡絶杼軸殆空越磧踰海分兵防守行役既久怨曠亦多昔詩人云王事靡盬不能藝稷黍豈不懷歸畏此罪念彼恭人涕零如雨此則前代怨思之辭也上不是恤則政不行而邪氣作邪氣作則蟲螟生而水旱起若此雖禱祀百神不能調陰陽矣方今關東饑饉蜀漢逃亡江淮以南徵求不息人不復業則相率為盜本根一搖憂患不淺其所以然者皆為遠戍方外以竭中國爭蠻貊不毛之地乖子養蒼生之道也昔漢元納賈捐之之謀而罷珠崖郡宣帝用魏相之策而棄車師之田豈不欲慕尚虛名蓋憚勞人力也近貞觀年中克平九姓冊李思摩為可汗使統諸部者蓋以夷狄叛則伐之降則撫之得推亡固存之義無遠戍勞人之役此則近日之令典經邊之故事竊見阿史那斛瑟羅陰山貴種代雄沙漠若委之四鎮使統諸蕃封為可汗遣禦寇患則國家有繼絶之美荒外無轉輸之役如臣所見請捐四鎮以肥中國罷安東以實遼西省軍費於遠方並甲兵於塞上則恆代之鎮重而邊州之備實矣況綏撫夷狄蓋防其越逸無侵侮之患則可矣何必窮其窟穴與螻蟻計校長短哉且王者外寧必有內憂蓋為不勤修政故也伏惟陛下棄之度外無以絶域未平為念但當敕邊兵謹守備蓄鋭以待敵待其自至然後擊之此李牧所以制胸奴也當今所要者莫若令邊城警守備遠斥候聚軍實蓄威武以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則寇無所得自然賊深入必有顛躓之慮淺入必無虜獲之益如此數年可使二虜不擊而服矣仁傑又請廢安東復高氏為君長停江南之轉輸慰河北之勞弊數年之後可以安人富國事雖不行識者是之尋檢校納言兼右肅政臺御史大夫聖曆初突厥侵掠趙定等州命仁傑為河北道元帥以便宜從事突厥盡殺所掠男女萬餘人從五回道而去仁傑總兵十萬追之不及便制仁傑河北道安撫大使時河朔人庶多為突厥逼脅賊退後懼誅又多逃匿仁傑上疏曰臣聞朝廷議者以為契丹作梗始明人之逆順或因迫脅或有願從或受僞官或為招慰或兼外賊或是土人跡雖不同心則無別誠以山東雄猛由來重氣一顧之勢至死不回近緣軍機調發傷重家道悉破或至逃亡剔屋賣田人不為售內顧生計四壁皆空重以官典侵漁因事而起取其髓腦曾無心愧修築池城繕造兵甲州縣役使十倍軍機官司不矜期之必取枷杖之下痛切肌膚事迫情危不循禮義愁苦之地不樂其生有利則歸且圖賒死此乃君子之愧辱小人之常行人猶水也壅之則為泉疏之則為川通塞隨流豈有常性昔董卓之亂神器播遷及卓被誅部曲無赦事窮變起毒害生人京室丘墟化為禾黍此由恩不普洽失在機先臣一讀此書未嘗不廢卷歎息今以負罪之伍必不在家露宿草行潛竄山澤赦之則出不赦則狂山東羣盜緣茲聚結臣以邊塵暫起不足為憂中土不安以此為事臣聞持大國者不可以小道理事廣者不可以細分人主恢弘不拘常法罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問自然人神道暢率土歡心諸軍凱旋得無侵擾制從之軍還授內史聖曆三年則天幸三陽宮王公百僚咸經侍從唯仁傑特賜宅一區當時恩寵無比是歲六月左玉鈐衛大將軍李楷固右武威衛將軍駱務整討契丹餘衆擒之獻俘於含樞殿則天大悅特賜楷固姓武氏楷固務整並契丹李盡忠之別帥也初盡忠之作亂楷固等屢率兵以陷官軍後兵敗來降有司斷以極法仁傑議以為楷固等並有驍將之才若恕其死必能感恩效節又奏請授其官爵委以專征制並從之及楷固等凱旋則天召仁傑預宴因舉觴親勸歸賞於仁傑授楷固左玉鈐衛大將軍賜爵燕國公則天又將造大像用功數百萬令天下僧尼每日人出一錢以助成之仁傑上疏諫曰臣聞為政之本必先人事陛下矜羣生迷謬溺喪無歸欲令像教兼行覩相生善非為塔廟必欲崇奢豈令僧尼皆須檀施得尚捨而況其餘今之伽藍制過宮闕窮奢極壯畫繢盡工寶珠殫於綴飾瓌材竭於輪奐工不使鬼止在役人物不天來終須地出不損百姓將何以求生之有時用之無度編戶所奉常若不充痛切肌膚不辭箠楚遊僧一說矯陳禍福翦髮解衣仍慚其少亦有離間骨肉事均路人身自納妻謂無彼我皆託佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘倍急切於官徵法事所須嚴於制敕膏腴美業倍取其多水碾莊園數亦非少逃丁避罪併集法門無名之僧凡有幾萬都下檢括已得數千且一夫不耕猶受其弊浮食者衆又劫人財臣每思惟實所悲痛往在江表像法盛興梁武簡文捨施無限及其三淮沸浪五嶺騰煙列剎盈衢無救危亡之禍緇衣蔽路豈有勤王之師比年已來風塵屢擾水旱不節征役稍繁家業先空瘡痍未復此時興役力所未堪伏惟聖朝功德無量何必要營大像而以勞費為名雖斂僧錢百未支一尊容既廣不可露居覆以百層尚憂未遍自餘廊廡不得全無又云不損國財不傷百姓以此事主可謂盡忠臣今思惟兼採衆議咸以為如來設教以慈悲為主下濟羣品應是本心豈欲勞人以存虛飾當今有事邊境未寧宜寬征鎮之徭省不急之費設令雇作皆以利趨既失田時自然棄本今不樹稼來歲必饑役在其中難以取給況無官助義無得成若費官財又盡人力一隅有難將何救之則天乃罷其役是歲九月病卒則天為之舉哀廢朝三日贈文昌右相諡曰文惠仁傑常以舉賢為意其所引拔桓彥範敬暉竇懷貞姚崇等至公卿者數十人初則天嘗問仁傑曰朕要一好漢任使有乎仁傑曰陛下作何任使則天曰朕欲待以將相對曰臣料陛下若求文章資歷則今之宰臣李嶠蘇味道亦足為文吏矣豈非文士齷齪思得奇才用之以成天下之務者乎則天悅曰此朕心也仁傑曰荊州長史張柬之其人雖老真宰相才也且久不遇若用之必盡節於國家矣則天乃召拜洛州司馬他日又求賢仁傑曰臣前言張柬之猶未用也則天曰已遷之矣對曰臣薦之為相今為洛州司馬非用之也又遷為秋官侍郎後竟召為相柬之果能興復中宗蓋仁傑之推薦也仁傑嘗為魏州刺史人吏為立生祠及去職其子景暉為魏州司功參軍頗貪暴為人所惡乃毀仁傑之祠長子光嗣聖曆初為司府丞則天令宰相各舉尚書郎一人仁傑乃薦光嗣拜地官員外郎蒞事稱職則天喜而言曰祁奚內舉果得其人開元七年自汴州刺史轉揚州大都督府長史坐贓貶歙州別駕卒初中宗在房陵而吉頊李昭德皆有匡復讜言則天無復辟意唯仁傑每從容奏對無不以子母恩情為言則天亦漸省悟竟召還中宗復為儲二初中宗自房陵還宮則天匿之帳中召仁傑以廬陵為言仁傑慷慨敷奏言發涕流遽出中宗謂仁傑曰還卿儲君仁傑降階泣賀既已奏曰太子還宮人無知者物議安審是非則天以為然乃復置中宗於龍門具禮迎歸人情感悅仁傑前後匡復奏對凡數萬言開元中北海太守李雍撰為梁公別傳備載其辭中宗返正追贈司空睿宗追封梁國公仁傑族曾孫兼謨兼謨登進士第祖郊父邁仕官皆微兼謨元和末解褐襄陽推官試校書郎言行剛正使府知名憲宗召為左拾遺纍上書言事歷尚書郎長慶大和中歷鄭州刺史以治行稱入為給事中開成初度支左藏庫妄破漬污縑帛等贓罪文宗以事在赦前不理兼謨封還敕書文宗召而諭之曰嘉卿舉職然朕已赦其長官典吏亦宜在宥然事或不可卿勿以封敕為艱遷御史中丞謝日文宗顧謂之曰御史臺朝廷綱紀臺綱正則朝廷理朝廷正則天下理凡執法者大抵以畏忌顧望為心職業由茲不舉卿梁公之後自有家法豈復為常之心哉兼謨謝曰朝法或未得中臣固悉心彈奏會江西觀察使吳士矩違額加給軍士破官錢數十萬計兼謨奏曰觀察使守陛下土地宣陛下詔條臨戎賞軍州有定數而士矩與奪由己盈縮自專不唯貽弊一方必致諸軍援例請下法司正行朝典士矩坐貶蔡州別駕兼謨尋轉兵部侍郎明年檢校工部尚書太原尹充河東節度使會昌中纍歷方鎮卒王方慶雍州咸陽人也周少司空石泉公褒之曾孫也其先自琅邪南度居於丹陽為江左冠族褒北徙入關始家咸陽焉祖鼒隋衛尉丞伯父弘讓有美名貞觀中為中書舍人父弘直為漢王元昌友畋獵無度乃上書切諫其略曰夫宗子維城之託者所以固邦家之業也大王功無任城戰克之效行無河間樂善之譽爵高五等邑富千室當思答極施之洪慈保無疆之永祚其為計者在乎修德冠屨詩禮畋獵史傳覽古人成敗之所由鑒既往存亡之異軌覆前戒後居安慮危奈何列騎齊驅交橫壟畝野有遊客巷無居人貽衆庶之憂逞一情之樂從禽不息實用寒心元昌覽書而遽止漸見疏斥轉荊王友龍朔中卒方慶年十六起家越王府參軍嘗就記室任希古受史記漢書希古遷為太子舍人方慶隨之卒業永淳中纍遷太僕少卿則天臨朝拜廣州都督廣州地際南海每歲有崑崙乘舶以珍物與中國交市舊都督路元睿冒求其貨崑崙懷刃殺之方慶在任數載秋毫不犯又管內諸州首領舊多貪縱百姓有詣府稱冤者府官以先受首領參餉未嘗鞫問方慶乃集止府僚絶其交往首領縱暴者悉繩之由是境內清肅當時議者以為有唐以來治廣州者無出方慶之右有制褒之曰朕以卿歷職著稱故授此官既美化遠聞實副朝寄今賜卿雜綵六十段並瑞錦等物以彰善政也證聖元年召拜洛州長史尋加銀青光祿大夫封石泉縣男萬歲登封元年轉並州長史封琅邪縣男未行遷鸞臺侍郎同鳳閣鸞臺平章事俄轉鳳閣侍郎依舊知政事神功元年七月清邊道大總管建安王攸宜破契丹凱還欲以是月詣闕獻俘內史王及善以為將軍入城例有軍樂既今上孝明高皇帝忌月請備而不奏方慶奏曰臣按禮經但有忌日而無忌月晉穆帝納后用九月九日是康帝忌月于時持疑不定下太常禮官荀訥議稱禮祇有忌日無忌月若有忌月即有忌時忌歲益無理據當時從訥所議軍樂是軍容與常不等臣謂振作於事無嫌則天從之則天嘗幸萬安山玉泉寺以山徑危懸欲御腰輿而上方慶諫曰昔漢元帝嘗祭廟出便門御樓船光祿勳張猛奏曰乘船危就橋安元帝乃從橋即前代舊事今山徑危險石路曲狹上瞻駭目下視寒心比於樓船安危不等陛下蒸人父母奈何踐此畏塗伏望停輿駐蹕則天納其言而止是歲改封石泉子時有制每月一日於明堂行告朔之禮司禮博士辟閭仁諝奏議其略曰經史正文無天子每月告朔之事唯禮記玉藻云天子聽朔於南門之外其每月告朔者諸侯之禮也臣謹按禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令無天子每月告朔之事若以為無明堂故無告朔之禮有明堂即合告朔則周秦有明堂而無天子每月告朔之事臣等參求既無其禮不可習非以天子之尊而用諸侯之禮方慶又奏議其略曰明堂天子布政之宮也謹按穀梁傳云閏者附月之餘日天子不以告朔非禮也閏以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣寧有他月而廢其禮乎先儒舊說天子行事一年十八度入明堂矣大享不問卜一入也每月告朔十二入也四時迎氣四入也巡狩之年一入也今禮官議唯歲首一入耳與先儒既異在臣不敢同宋朝何承天纂集其文以為禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃托前儒因循故事而已隋煬帝命學士撰江都集禮祇抄撮舊禮更無異文貞觀顯慶禮及祠令不言告朔者蓋為歷代不傳所以其文乃闕各有緣由不足依據今禮官引為明證在臣誠實有疑則天又令春官廣集衆儒取方慶仁諝所奏議以定得失時成均博士吳揚善太學博士郭山惲等奏按周禮及三傳皆有天子告朔之禮秦滅詩書由是告朔禮廢望依方慶議有制從之則天以方慶家多書籍嘗訪求右軍遺跡方慶奏曰臣十代從伯祖羲之書先有四十餘紙貞觀十二年太宗購求先臣並已進之唯有一卷見今在又進臣十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寶五代祖騫高祖規曾祖褒並九代三從伯祖晉中書令獻之已下二十八人書共十卷則天御武成殿示羣臣仍令中書舍人崔融為寶章集以並其事復賜方慶當時甚以為榮方慶又舉令文期喪大功未葬不預朝賀未終喪不預宴會比來朝官不遵禮法身有哀容陪預朝會手舞足蹈公違憲章名教既虧實玷皇化伏望申明令式更禁斷從之方慶漸以老疾乞從間逸乃授麟臺監修國史及中宗立為東宮方慶兼檢校太子左庶子聖曆二年一月則天欲季冬講武有司稽緩延入孟春方慶上疏曰謹按禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武以習射御角校才力蓋王者常事安不忘危之道也孟春之月不可以稱兵兵者甲胄干戈之總名兵金性剋木春盛德在木而舉金以害盛德逆生氣孟春行冬令則水潦為敗雪霜大摯首種不入蔡雍月令章句云太陰新休少陽尚微而行冬令以導水氣故水潦至而敗生物也雪霜大摯折陽者也太陰干時雨雪而霜故大傷首種首種謂宿麥也麥以秋種故謂之首種入收也春為沍寒所傷故至夏麥不成長也今孟春講武是行冬令以陰政犯陽氣害發生之德臣恐水潦敗物霜雪損稼夏麥不登無所收入也伏望天恩不違時令至孟冬教習以順天道手制答曰比為久屬太平多歷年載人皆廢戰並悉學文今者用整兵威故令教習卿以春行冬令則水潦為敗舉金傷木則便害發生循覽所陳深合典禮若違此請乃月令虛行佇啓直言用依來表是歲正授太子左庶子封石泉公餘並如故俸料同職事三品兼侍皇太子讀書方慶又上言謹按史籍所載人臣與人主言及上表未有稱皇太子名者當為太子皇儲其名尊重不敢指斥所以不言晉尚書僕射山濤啓事稱皇太子而不言名濤中朝名士必詳典故其不稱名應有憑准朝官尚猶如此宮臣諱則不疑今東宮殿及門名皆有觸犯臨事論啓回避甚難孝敬皇帝為太子時改弘教門為崇教門沛王為皇太子改崇賢館為崇文館皆避名諱以遵典禮此即成例足為軌模伏望天恩因循舊式付司改換制從之長安二年五月卒贈兗州都督諡曰貞中宗即位以宮僚之舊追贈吏部尚書方慶博學好著述所撰雜書凡二百餘卷尤精三禮好事者多詢訪之每所酬答咸有典據故時人編次名曰禮雜答問聚書甚多不減祕閣至於圖畫亦多異本諸子莫能守其業卒後尋亦散亡長子光輔開元中官至潞州刺史少子晙工書知名尤善琴棋而性多嚴整官至殿中侍御史姚璹字令璋散騎常侍思廉之孫也少孤撫弟妹以友愛稱博涉經史有才辨永徽中明經擢第纍補太子宮門郎與司議郎孟利貞等奉令撰瑤山玉彩書書成遷祕書郎調露中纍遷至中書舍人封吳興縣男則天臨朝遷夏官侍郎坐從父弟敬節同徐敬業之亂貶桂州都督府長史時則天雅好符瑞璹至嶺南訪諸山川草樹其名號有武字者皆以為上膺國姓列奏其事則天大悅召拜天官侍郎善於選補時人稱之長壽二年遷文昌左丞同鳳閣鸞臺平章事自永徽以後左右史雖得對仗承旨仗下後謀議皆不預聞璹以為帝王謨訓不可暫無紀述若不宣自宰相史官無從得書乃表請仗下所言軍國政要宰相一人專知撰録號為時政記每月封送史館宰相之撰時政記自璹始也是歲九月坐事轉司賓少卿罷知政事延載初擢拜納言有司以璹從父弟犯法奏言不合更為侍臣璹上言昔王敦稱兵犯順王導仍典樞機嵇康戮於晉朝嵇紹忠於晉室竊惟前古尚不為疑今奉聖恩豈由臣下必以體例有乖伏請甘從屏退則天曰此乃我意卿復何言但當盡忠無聽浮說時武三思率蕃夷酋長請造天樞於端門外刻字紀功以頌周德璹為督作使證聖初璹加秋官尚書同平章事是歲明堂災則天欲責躬避正殿璹奏曰此實人火非曰天災至如成周宣榭卜代愈隆漢武建章盛德彌永臣又見彌勒下生經云當彌勒成佛之時七寶臺須臾散壞覩此無常之相便成正覺之因故知聖人之道隨緣示化方便之利博濟良多可使由之義存於此況今明堂乃是布政之所非宗廟之地陛下若避正殿於禮未為得也左拾遺劉承慶廷奏云明堂宗祀之所今既被焚陛下宜輟朝思過璹又持前議以爭之則天乃依璹奏先令璹監造天樞至是以功當賜爵一等璹表請回贈父一官乃追贈其父豫州司戶參軍處平為博州刺史天后將封嵩嶽命璹總知撰儀注並充封禪副使及重造明堂又令璹充使督作以功加銀青光祿大夫時有大石國使請獻獅子璹上疏諫曰獅子猛獸唯止食肉遠從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹犬不蓄漁獵總停運不殺以闡大慈垂好生以敷至德凡在翾飛蠢動莫不感荷仁恩豈容自菲薄於身而厚資給於獸求之至理必不然乎疏奏遽停來使又九鼎初成制令黃金千兩塗之璹進諫曰夫鼎者神器貴在質朴自然無假別為浮飾臣觀其狀先有五彩輝煥錯雜其間豈待金色方為炫耀則天又從之尋屬契丹犯塞命梁王武三思為榆關道安撫大使璹為副使以備之及還坐事神功初左授益州大都督府長史蜀中官吏多貪暴璹屢有發擲姦無所容則天嘉之降璽書勞之曰夫嚴霜之下識貞松之擅奇疾風之前知徑草之為貴物既有此人亦宜哉卿早荷朝恩委任斯重居中作相弘益已多防邊訓兵心力俱盡歲寒無改終始不渝乃眷蜀中氓俗殷雜久缺良守弊於侵漁政以賄成人無措足是用命卿出鎮寄茲存養果能攬轡澄清下車整肅吏不敢犯姦無所容前後糾擲蓋非一緒貪殘之伍屏跡於列城剽奪之儔遁形於外境詎勞期月康此黎元言念德聲良深嘉尚宜布琅邪之化當以豫州為法則天又嘗謂侍臣曰凡為長官能清自身者甚易清得僚吏者甚難至於姚璹可謂兼之矣時新都丞朱待辟坐贓至死逮捕繫獄待辟素善沙門理中陰結諸不逞因待辟以殺璹為名擬據巴蜀為亂人密表告之者制令璹按其獄璹深持之事涉疑似引而誅死者僅以千數則天又令洛州長史宋元爽御史中丞霍獻可等重加詳覆亦無所發明逮繫獄數百人不勝酷毒遞相附會以就反狀因此籍沒者復五十餘家其餘稱知反配流者亦十八九道路冤之監察御史袁恕己劾奏其事則天初令璹與恕己對定又尋令罷推俄拜地官尚書歲餘轉冬官尚書仍西京留守長安中纍表乞骸骨制聽致仕進爵為伯遇官名復舊為工部尚書神龍元年卒遺令薄葬贈越州都督諡曰成弟珽珽少好學以勤苦自立舉明經纍除定汴滄虢豳等五州刺史加銀青光祿大夫轉秦州刺史以善政有聞璽書褒美賜絹百匹神龍元年纍封宣城郡公三遷太子詹事仍兼左庶子時節愍太子舉事不法珽前後上書進諫今載四事其一曰臣聞賈誼曰選天下之端士孝悌博聞有道術者使與太子居處出入故太子見正事聞正言行正道左右前後皆正人也夫習與正人居之不能無正習與不正人居之不能無不正太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦針大夫進謀故習與智長化與心成夫教得而左右正則太子正矣太子正而天下定矣臣又聞之木從繩則正后從諫則聖善言古者所以驗於今伏惟殿下睿德洪深天姿聰敏近代成敗前古安危莫不懸鑒在心動合典禮臣以庸朽濫居輔弼虛備耳目叨預股肱輒薦塵露庶裨山海伏以內置作坊工巧得入宮闈之內禁衛之所或言語內出或事狀外通小人無知不識輕重因為詐僞有玷徽猷臣望並付所司以停宮內造作如或要須役造猶望宮外安置庶得工匠不於宮禁出入其二曰臣聞漢文帝身衣弋綈足履革齊高帝欄檻用銅者皆易以鐵經侯帶玉具劍環珮以過魏太子不視經侯曰魏國亦有寶乎太子曰主信臣忠魏之寶也經侯委劍珮而去太子使追還之謂曰珠玉珍玩寒不可衣飢不可食無遺我賊經侯杜門不出臣觀聖賢經籍務以簡素為貴皇王政化皆以菲薄為德伏惟殿下留心恭儉靡尚浮奢臣愚猶望損之又損之居簡以行簡減省造作節量用度其三曰臣聞銀榜銅樓宮闈嚴祕門閣來往皆有簿曆殿下時有所須唯門司宣令或恐姦僞之輩因此妄為增減脫有文狀舛錯事理便即差違且近日呂升之便乃代署宣敕伏賴殿下睿敏當即覺其姦僞自餘臣下庸淺豈能深辨真虛望墨令及覆事行下並用內印印畫署之後冀得免有詐假乃是長久規模臣又聞之忠臣事君有犯而無隱明主馭下納諫以進德故書云有言逆於志必求諸道有言順於心必求諸非道伏惟殿下仁明昭著聖敬日躋探幽洞微窮神索隱事之善惡毫釐靡差理有危疑錙銖無爽臣以庸謏叨侍春闈職居獻替豈敢緘默其四曰臣聞聖人不專其德賢智必有所師故曰與善人言如入芝蘭之室久自芬芳與不善人言如火銷膏不覺而盡今司經見無學士供奉未有侍讀伏望時因視膳奏請置人所冀講席談筳務盡忠規之道披文擲句方資審諭之勤臣又聞臣之事主必盡乃誠君之進賢務求忠讜伏惟殿下養德儲闈以端靜為務恭膺守器以學業為先經所以立行修身史所以諳識成敗雅誥既習忠孝乃成傳記方通安危斯辨知父子君臣之道識古今鑒戒之規經史為先斯乃急務至於工巧造作僚吏直司實為末事無足勞慮臣以庸淺獻替是司臣而不言負譴聖日言而獲罪是所甘心伏願留意經書簡略細事一蒙採納萬殞無辭乞降儲明俯矜狂瞽疏奏太子雖稱善竟不悛革太子敗詔遣索其宮中得珽諫書中宗嘉其切直時宮臣皆貶黜唯珽擢拜右散騎常侍歲餘遷祕書監睿宗即位纍授戶部尚書轉太子賓客先天二年加金紫光祿大夫復拜戶部尚書珽與兄璹數年間俱為定州刺史戶部尚書時人榮之開元二年卒年七十四珽嘗以其曾祖察所撰漢書訓纂多為後之注漢書者隱沒名氏將為己說珽乃撰漢書紹訓四十卷以發明舊義行於代史臣曰天子有諍臣七人雖無道不失其天下致廬陵復位唐祚中興諍由狄公一人以蔽或曰許之太甚答曰當革命之時朋邪甚衆非推誠竭力致身忘家者孰能與於此乎仁傑流死不避骨鯁有彰雖逢好殺無辜能使終畏大義竟存天下豈不然乎王方慶干城南海羽翼東宮臺閣樞機無不功濟所謂君子不器者也苟非文學斯焉取斯璹成都布政始卒不侔相國上章或否或中且焚明堂而避正殿固諍何多黜唐頌而立天樞一言非措矧乃妄求符瑞已失忠貞精擇楚茅難裨過咎不常其德罔畏承羞珽規諫有才牧守多善儲幄之任可謂得人贊曰犯顏忤旨返政扶危是人難事狄能有之終替武氏克復唐基功之莫大人無以師方慶之才周旋特立璹也無常珽能操執
