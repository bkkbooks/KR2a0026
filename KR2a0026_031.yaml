body:
  text: 舊唐書卷二十七志第七禮儀七貞觀十四年太宗因修禮官奏事之次言及喪服太宗曰同爨尚有緦麻之恩而嫂叔無服又舅之與姨親疏相似而服紀有殊理未為得宜集學者詳議餘有親重而服輕者亦附奏聞於是侍中魏徵禮部侍郎令狐德棻等奏議曰臣聞禮所以決嫌疑定猶豫別同異明是非者也非從天降非從地出人情而已矣夫親族有九服術有六隨恩以薄厚稱情以立文然舅之與姨雖為同氣論情度義先後實殊何則舅為母之本族姨乃外戚他族求之母族姨不在焉考之經典舅誠為重故周王念齊每稱舅甥之國秦伯懷晉實切渭陽之詩在舅服止一時為姨居喪五月循名喪實逐末棄本蓋古人之情或有未達所宜損益實在茲乎記曰兄弟之子猶子也蓋引而進之也嫂叔之不服蓋推而遠之也禮繼父同居則為之朞未嘗同居則不為服從母之夫舅之妻二夫人相為服或曰同爨緦然則繼父之徒並非骨肉服重由乎同爨恩輕在乎異居故知制服雖繫於名亦緣恩之厚薄者也或有長年之嫂遇孩童之叔劬勞鞠養情若所生分饑共寒契闊偕老譬同居之繼父方他人之同爨情義之深淺寧可同日而言哉在其生也愛之同於骨肉及其死也則曰推而遠之求之本原深所未諭若推而遠之為是則不可生而共居生而共居之為是則不可死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顏弘都則竭誠致感馬援則見之必冠孔伋則哭之為位此並躬踐教義仁深孝友察其所尚之旨豈非先覺者歟但于其時上無哲王禮非下之所議遂使深情鬱乎千載至理藏於萬古其來久矣豈不惜哉今屬欽明在辰聖人有作五禮詳洽一物無遺猶且永念慎終凝神遐想以為尊卑之雖煥乎大備喪紀之制或情理未周爰命秩宗更詳考正臣等奉遵明旨觸類旁求採托羣經討論傳記或引兼名實無文之禮咸秩敦睦之情畢舉變薄俗於既往垂篤義於將來信六籍所不能談超百王而獨得者也諸儒所守互有異同詳求厥中申明聖旨謹按曾祖父母舊服齊衰三月請加為齊衰五月嫡子婦舊服大功請加為朞衆子婦小功今請與兄弟子婦同為大功九月嫂叔舊無服今請服小功五月報其弟妻及夫兄亦小功五月舅服緦麻請與從母同服小功制可之顯慶二年九月修禮官長孫無忌等又奏曰依古喪服甥為舅緦麻舅報甥亦同此制貞觀年中八座議奏舅服同姨小功五月而今律疏舅報於甥服猶三月謹按旁尊之服禮無不報已非正尊不敢降也故甥為從母五月從母報甥小功甥為舅緦麻舅亦報甥三月是其義矣今甥為舅使同從母之喪則舅宜進甥以同從母之報修律疏人不知禮意舅報甥服尚止緦麻於例不通禮須改正今請修改律疏舅報甥亦小功又曰庶母古禮緦麻新禮無服謹按庶母之子即是己昆季為之杖朞而己與之無服同氣之內吉凶頓殊求之禮情深非至理請依典故為服緦麻制又從之龍朔二年八月所司奏司文正卿蕭嗣業嫡繼母改嫁身亡請申心制據令繼母改嫁及為長子並不解官既而有敕雖云嫡母終是繼母據禮緣情須有定制付所司議定奏聞司禮太常伯隴西郡王博乂等奏稱緬尋喪服母名斯定嫡繼慈養皆在其中惟出母制特言出妻之子明非生己則皆無服是以令云母嫁又云出妻之子出言其子以著所生嫁即言母通包養嫡俱當解任並合心喪其不解者惟有繼母之嫁繼母為名正據前妻之子嫡於諸孽禮無繼母之文甲令今既見行嗣業理申心制然奉敕議定方垂永則令有不安亦須釐正竊以嫡繼慈養皆非所生並同行路嫁雖比出稍輕於父終為義絶繼母之嫁既殊親母慈嫡義絶豈合心喪望請凡非所生父卒而嫁為父後者無服非承重者杖朞並不心喪一同繼母有符情禮無玷舊章又心喪之制惟施服屈杖朞之服不應解官而令文三年齊斬亦入心喪之例杖朞解官又有妻喪之舛又依禮庶子為其母緦麻三月既是所生母服準例亦合解官令文漏而不言於事終須修附既與嫡母等嫁同一令條總議請改理為允愜者依集文武官九品已上議得司衛正卿房仁裕等七百三十六人議請一依司禮狀嗣業不解官得右金吾衛將軍薛孤吳仁等二十六人議請解嗣業官不同司禮狀者母非所生出嫁義絶仍令解職有紊緣情杖朞解官不甄妻服三年齊斬謬曰心喪庶子為母緦麻漏其中制此並令文疏舛理難因襲依房仁裕等議總加修附垂之不朽其禮及律疏有相關涉者亦請準此改正嗣業既非嫡母改醮不合解官詔從之上元元年天后上表曰至如父在為母服止一朞雖心喪三年服由尊降竊謂子之於母慈愛特深非母不生非母不育推燥居濕咽苦吐甘生養勞瘁恩斯極矣所以禽獸之情猶知其母三年在懷理宜崇報若父在為母服止一朞尊父之敬雖周報母之慈有闕且齊斬之制足為差減更令周以一朞恐傷人子之志今請父在為母終三年之服高宗下詔依議行焉開元五年右補闕盧履冰上言准禮父在為母一周除靈三年心喪則天皇后請同父沒之服三年然始除靈雖則權行有紊彝典今陛下孝理天下動合禮經請仍舊章庶叶通典於是下制令百官詳議並舅及嫂叔服不依舊禮亦合議定刑部郎中田再思建議曰乾尊坤卑天一地二陰陽之位分矣夫婦之道配焉至若死喪之威隆殺之等禮經五服之制齊斬有殊考妣三年之喪貴賤無隔以報免懷之慈以酬罔極之恩者也稽之上古喪期無數暨乎中葉方有歲年禮云五帝殊時不相沿樂三王異代不相襲禮白虎通云質文再而變正朔三而復自周公制禮之後孔父刊經已來爰殊厭降之儀以標服紀之節重輕從俗斟酌隨時故知禮不從天而降不由地而出也在人消息為適時之中耳春秋諸國魯最知禮以周公之後孔子之邦也晉韓起來聘言周禮盡在魯矣齊仲孫來盟言魯猶秉周禮尚有子張問高宗諒陰三年子思不聽其子服出母子游謂同母異父昆弟之服大功子夏謂合從齊衰之制此等並四科之數十哲之人高步孔門親承聖訓及遇喪事猶此致疑即明自古已來升降不一者也三年之制說者紛然鄭玄以為二十七月王肅以為二十五月又改葬之服鄭云服緦三月王云訖葬而除又繼母出嫁鄭云皆服王云從于繼育乃為之服又無服之殤鄭云子生一月哭之一日王云以哭之一日易服之月鄭王祖經宗傳各有異同荀摯采古求遺互為損益方知去聖漸遠殘缺彌多故曰會禮之家名為聚訟寧有定哉而父在為母三年行之已踰四紀出自高宗大帝之代不從則天皇后之朝大帝御極之辰中宮獻書之日往時參議將可施行編之於格服之已久前王所是疏而為律後王所是著而為令何必乖先帝之旨阻人子之情虧純孝之心背德義之本有何妨於聖化有何紊於彝倫而欲服之周年與伯叔母齊焉與姑姊妹同焉夫三年之喪如白駒之過隙君子喪親有終身之憂何況再周乎夫禮者體也履也示之以迹孝者畜也養也因之以心小人不恥不仁不畏不義服之有制使愚人企及衣之以衰使見之摧痛以此防人人猶有朝死而夕忘者以此制人人猶有釋服而從吉者方今漸歸古朴須敦孝義抑賢引愚理資寧戚食稻衣錦所不忍聞若以庶事朝儀一依周禮則古之人臣見君也公卿大夫贄羔鴈圭璧今何故不依乎周之用刑也墨劓宮刖今何故不行乎周則侯甸男衛朝聘有數今何故不行乎周則不五十不仕七十不入朝今何故不依乎周則井邑丘甸以立征稅今何故不行乎周則分土五等父死子及今何故不行乎周則冠冕衣裘乘車而戰今何故不行乎周則三老五更膠序養老今何故不行乎諸如此例不可勝述何獨孝思之事愛一年之服於其母乎可為痛心可為慟哭者詩云哀哀父母生我劬勞禮云父之親子也親賢而下無能母之親子也賢則親之無能則憐之阮嗣宗晉代之英才方外之高士以為母重於父據齊斬升數粗細已降何忍服之節制減至於周豈後代之士盡慚於古循古未必是依今未必非也又同爨服緦禮經明義嫂叔遠別同諸路人引而進之觸類而長猶子咸衣苴枲季父不服緦麻推遠之情有餘睦親之義未足又母之昆弟情切渭陽翟酺訟舅之冤寧氏宅甥之相我之出也義亦殷焉不同從母之尊遂降小功之服依諸古禮有爽俗情今貶舅而宗姨是陋今而榮古此並太宗之制也行之百年矣輒為刊復實用有疑於是紛議不定履冰又上疏曰禮父在為母十一月而練十三月而祥十五月而禫心喪三年上元中則天皇后上表請同父沒之服亦未有行至垂拱年中始編入格易代之後俗乃通行臣開元五年頻請仍舊恩敕並嫂叔舅姨之服亦付所司詳議諸司所議同異相參所司惟執齊斬之文又曰亦合典禮竊見新修之格猶依垂拱之僞致有祖父母安存子孫之妻亡沒下房筵几亦立再周甚無謂也據周易家人卦云利女貞女正位于內男正位于外男女正天地之大義家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦家道正而天下正矣禮女在室以父為天出嫁以夫為天又在家從父出嫁從夫夫死從子本無自專抗尊之法即喪服四制云天無二日土無二王國無二君家無二尊以一理之也故父在為母服周者避二尊也伏惟陛下正持家國孝理天下而不斷在宸衷詳正此禮無隨末俗顧念兒女之情臣恐後代復有婦奪夫政之敗者疏奏未報履冰又上奏曰臣聞夫婦之道人倫之始尊卑法於天地動靜合於陰陽陰陽和而天地生成夫婦正而人倫式序自家刑國牝雞無晨四德之禮不愆三從之義斯在即喪服四制云天無二日土無二王國無二君家無二尊以一理之也故父在為母服周者見無二尊也準舊儀父在為母一周除靈再周心喪父必三年而後娶者達子之志焉豈先聖無情於所生固有意於家國者矣原夫上元肇年則天已潛秉政將圖僭篡預自崇先請升慈愛之喪以抗尊嚴之禮雖齊斬之儀不改而几筵之制遂同數年之間尚未通用天皇晏駕中宗蒙塵垂拱之末果行聖母之僞符載初之元遂啓易代之深釁孝和雖名反正韋氏復效晨鳴孝和非意暴崩韋氏旋即稱制不蒙陛下英算宗廟何由克復易云臣弒其君子弒其父非一朝一夕之故其斯之謂矣臣謹尋禮意防杜實深若不早圖刊正何以垂戒於後所以薄言禮教請依舊章恩敕通明蒙付所司詳議且臣所獻者蓋請正夫婦之綱豈忘母子之道諸議多不討其本源所非議者大凡祇論罔極之恩喪也寧戚禽獸識母而不識父秦燔書後禮經殘缺後儒纘集不足可憑豈得與伯叔母服同豈得與姑姊妹制等三王不相襲禮五帝不相沿樂齊斬足為升降歲年何忍不同此並道聽途說之言未習先王之旨又安足以議經邦理俗之禮乎臣請據經義以明之所云罔極之恩者春秋祭祀以時思之君子有終身之憂霜露之感豈止一二周之服哉故聖人恐有朝死而夕忘曾鳥獸之不若為立中制使賢不肖共成文理而已所云喪也寧戚者孔子答林放之問至如太奢太儉太易太戚皆非禮中苟不得中名為俱失不如太儉太戚焉毀而滅性猶愈於朝死夕忘焉此論臨喪哀毀之容豈比於同宗異姓之服所云禽獸識母而不識父者禽獸羣居而聚麀而無家國之禮少雖知親愛其母長不解尊嚴其父引此為諭則亦禽獸之不若乎所云秦燔書後禮經殘缺後儒纘集不足可憑者人間或有遺逸豈亦家戶到而燔之假若盡燔苟不可信則墳典都謬庠序徒立非聖之談復云安屬所云與伯叔姑姊服同者伯叔姑姊有筵杖之制三年心喪乎所云五帝不相沿樂三王不相襲禮誠哉是言此是則天懷私苞禍之情豈可復相沿樂襲禮乎所云齊斬足為升降者母齊父斬不易之禮按三年問云將由修飾之君子與三年之喪若駟之過隙遂之則是無窮也然則何以周也曰至親以周斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也然則何以三年曰加重焉耳故父加至再周父在為母加三年心喪今者還同父沒之制則尊厭之律安施喪服四制又曰凡禮之大體體天地法四時則陰陽順人情故謂之禮訾之者是不知禮之所由生非徒不識禮之所由制亦恐未達孝子之通義臣謹按孝經以明陛下孝治之合至德要道請論世俗訾禮之徒夫至德謂孝悌要道謂禮樂移風易俗莫善於樂安上治民莫善於禮又禮有無體之禮無聲之樂按孝經援神契云天子孝曰就就之為言成也天子德被天下澤及萬物始終成就則其親獲安故曰就也諸侯孝曰度度者法也諸侯居國能奉天子法度得不危溢則其親獲安故曰度也卿大夫孝曰譽譽之為言名也卿大夫言行布滿能無惡稱譽達遐邇則其親獲安故曰譽也士孝曰究究者以明審為義士始升朝辭親入仕能審資父事君之禮則其親獲安故曰究也庶人孝曰畜畜者含畜為義庶人含情受朴躬耕力作以畜其德則其親獲安故曰畜也陛下以韋氏構逆中宗降禍宸衷哀憤睿情卓烈初無一旅之衆遂殄九重之妖定社稷於阽危拯宗枝於塗炭此陛下孝悌之至通於神明光於四海無所不通使諸侯得守其法度卿大夫得盡其言行士得資親以事君庶人得用天而分地此陛下無體之禮以安上理人也上元以來政由武氏文明之後法在凶人賊害宗親誅滅良善勳階歲纍酺赦年頻佞之則榮華正之則遷謫神龍景雲之際其事尤繁先天開元之間斯弊都革此陛下之無聲之樂以移風易俗也臣前狀單略議者未識臣之懇誠謹具狀重進請付中書門下商量處分臣言若讜然敢側足於軒墀臣言不忠伏請竄跡於荒裔左散騎常侍元行沖奏議曰天地之性惟人最靈者蓋以智周萬物惟睿作聖明貴賤辨尊卑遠嫌疑分情理也是以古之聖人徵性識本緣情制服有申有厭天父天夫故斬衰三年情理俱盡者因心立極也生則齊體死則同穴比陰陽而配合同兩儀而成化而妻喪杖期情禮俱殺者蓋以遠嫌疑尊乾道也父為嫡子三年斬衰而不去職者蓋尊祖重嫡崇禮殺情也資於事父以事君孝莫大於嚴父故父在為母罷職齊周而心喪三年謂之尊厭者則情申而禮殺也斯制也可以異於飛走別於華夷羲農堯舜莫之易也文武周孔同所尊也今若捨尊厭之重虧嚴父之義略純素之嫌貽非聖之責則事不師古有傷名教矣姨兼從母之名即母之女黨加於舅服有理存焉嫂叔不服避嫌疑也若引同爨之緦以忘推遠之跡既乖前聖亦謂難從謹詳三者之疑並請依古為當自是百僚議竟不決至七年八月下敕曰惟周公制禮當歷代不刊況子夏為傳乃孔門所受格條之內有父在為母齊衰三年此有為而為非尊厭之義與其改作不如師古諸服紀宜一依喪服文自是卿士之家父在為母行服不同或既周而禫禫服六十日釋服心喪三年者或有既周而禫禫服終三年者或有依上元之制齊衰三年者時議者是非紛然元行沖謂人曰聖人制厭降之禮豈不知母恩之深也以尊祖貴禰欲其遠別禽獸近異夷狄故也人情易搖淺識者衆一紊其度其可止乎二十年中書令蕭嵩與學士改修定五禮又議請依上元敕父在為母齊衰三年為定及頒禮乃一依行焉二十三年藉田禮畢下制曰服制之紀或有所未通宜令禮官學士詳議聞奏太卿韋縚奏曰謹按儀禮喪服舅緦麻三月從母小功五月傳曰何以小功以名加也堂姨舅舅母恩所不及外祖父母小功五月傳曰何以小功以尊加也舅緦麻三月並是情親而服屬疏者也外祖正尊同於從母之服姨舅一等服則輕重有殊堂姨舅親即未疏恩絶不相為服親舅母來承外族同爨之禮不加竊以古意猶有所未暢者也且為外祖小功此則正尊情甚親而服屬疏者也請加至大功九月姨舅儕類親既無別服宜齊等請為舅加至小功五月堂姨舅疏降一等親舅母從服之例先無制服之文並望加至袒免臣聞禮以飾情服從義制或有沿革損益可明事體既大理資詳審望付尚書省集衆官吏詳議務從折衷永為典則於是太子賓客崔沔建議曰竊聞大道既隱天下為家聖人因之然後制禮禮教之設本為正家家道正而天下定矣正家之道不可以二總一定議理歸本宗父以尊崇母以厭降豈忘愛敬宜存倫序是以內有齊斬外服皆緦麻尊名所加不過一等此先王不易之道也前聖所志後賢所傳其來久矣昔辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣貞觀修禮時改舊章漸廣渭陽之恩不遵洙泗之典及弘道之後唐隆之間國命再移於外族矣禮亡徵兆儻或斯見天人之際可不誡哉開元初補闕盧履冰嘗進狀論喪服輕重敕令僉議于時羣議紛拏各安積習太常禮部奏依舊定陛下運稽古之思發獨斷之明至開元八年特降別敕一依古禮事符故實人知向方式固宗盟社稷之福更圖異議竊所未詳願守八年明旨以為萬代成法職方郎中韋述議曰天生萬物惟人最靈所以尊尊親親別生分類存則盡其愛敬沒則盡其哀戚緣情而制服考事而立言往聖討論亦已勤矣上自高祖下至玄孫以及其身謂之九族由近而及遠稱情而立文差其輕重遂為五服雖則或以義降或以名加教有所從理不踰等百王不易三代可知日月同懸咸所仰也自微言既絶大義復乖雖文質有遷而必遵此制謹按儀禮喪服傳曰外親之服皆緦麻鄭玄謂外親異姓正服不過緦麻外祖父母小功五月以尊加也從母小功五月以名加也舅甥外孫中外昆弟依本服緦麻三月若以匹敵外祖則祖也舅則伯叔父之別也姨舅伯叔則父母之恩不殊而獨殺於外氏聖人之心良有以也喪服傳曰禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖也諸侯及其太祖天子及其始祖聖人究天道而厚於祖禰繫姓族而親其子孫近則別其賢愚遠則異於禽獸由此言之母黨比於本族不可同貫明矣且家無二尊喪無二斬人之所奉不可二也特重於大宗者降其小宗為人後者減其父母之服女子出嫁殺其本家之喪蓋所存者遠所抑者私也今若外祖及舅更加服一等堂舅及姨列於服紀之內則中外之制相去幾何廢禮徇情所務者末古之制作者知人情之易搖恐失禮之將漸別其同異輕重相懸欲使後來之人永不相雜微旨斯在豈徒然哉且五服有上殺之義必循源本方及條流伯叔父母本服大功九月從父昆弟亦大功九月並以上出於祖其服不得過於祖也從祖祖父母從祖父母從祖昆弟皆小功五月以出於曾祖服不得過於曾祖也族祖祖父母族祖父母族祖昆弟皆緦麻三月以其出於高祖其服不得過於高祖也堂舅姨既出於外曾祖若為之制服則外曾祖父母及外伯叔祖父母亦宜制服矣外祖加至大功九月則外曾祖合至小功外高祖合至緦麻若舉此而捨彼事則不均棄親而録疏理則不順推而廣之是與本族無異矣服皆有報則堂外甥外曾孫姪女之子皆須制服矣聖人豈薄其骨肉背其恩愛情之親者服制乃輕蓋本於公者薄於私存其大者略其細義有所斷不得不然苟可加也亦可減也往聖可得而非則禮經可得而隳矣先王之制謂之彝倫奉以周旋猶恐失墜一紊其庸可止乎且舊章淪胥為日已久矣所存者無幾又欲棄之雖曰未達不知其可請依儀禮喪服為定禮部員外郎楊仲昌議曰謹按儀禮曰外服皆緦又曰外祖父母以尊加從母以名加並為小功五月其為舅緦鄭文貞公魏徵已議同從母例加至小功五月訖今之所加豈異前旨雖文貞賢也而周孔聖也以賢改聖後學何從堂舅姨堂舅母並升為袒免則何以祖述禮經乎如以外祖父母加至大功則豈無加報於外孫乎如外孫為報服大功則本宗庶孫何同等而相淺乎儻必如是深所不便竊恐內外乖序親疏奪倫情之所沿何所不至理必然也昔子路有姊之喪而不除孔子問之子路對曰吾寡兄弟而不忍也子曰先王制禮行道之人皆不忍也子路聞而除之此則聖人因言以立訓援事抑情之明例也禮不云乎無輕議禮明其蟠於天地並彼日月賢者由之安敢小有損益也況夫喪服之紀先王大猷奉以周旋以匡人道一辭寧措千載是遵涉於異端豈曰弘教伏望各依正禮以厚儒風太常所謂增加愚見以為不可又戶部郎中楊伯成左監門録事參軍劉秩並同是議與沔等略同議奏上又手敕侍臣等曰朕以為親姨舅既服小功則舅母於舅有三年之服服是受我而厚以服制情則舅母之服不得全降於舅也宜服緦麻堂姨舅古今未制服朕思敦睦九族引而親之宜服袒免又鄭玄注禮記云同爨緦若比堂姨舅於同爨親則厚矣又喪服傳云外親之服皆緦是亦不隔於堂姨舅也若以所服不得過本而須為外曾祖父母及外伯叔祖父母制服亦何傷乎是皆親親敦本之意卿等更熟詳之侍中裴耀卿中書令張九齡禮部尚書李林甫等奏曰外族之親禮無厭降外甥既為舅母制服舅母還合報之夫外甥既為報服則與夫之姨舅以類是同外甥之妻不得無服所增者頗廣所引者漸疏微臣愚蒙猶有未達玄宗又手制答曰從服有六此其一也降殺之制禮無明文此皆自身率親用為制服所有存抑盡是推恩朕情有未安故令詳議非欲苟求變古以示不同卿等以為外族之親禮無厭降報服之制所引甚疏且姨舅者屬從之至近也以親言之則亦姑伯之匹敵也豈有所引者疏而降所親者服又婦從夫者也夫之姨舅夫既有服從夫而服由是睦親實欲令不肖者企及賢者俯就卿等宜熟詳之耀卿等奏曰陛下體至仁之德廣推恩之道將弘引進以示睦親再發德音更令詳議臣等按大唐新禮親舅加至小功與從母同服此蓋當時特命不以輕重遞增蓋不欲參於本宗慎於變禮者也今聖制親姨舅小功更制舅母緦麻堂姨舅袒免等服取類新禮垂示將來通於物情自我作則羣儒風議徒有稽留並望準制施行制從之天寶六載正月出嫁母宜終服三年
