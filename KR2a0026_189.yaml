body:
  text: 舊唐書卷一百八十五上列傳第一百三十五上良吏上韋仁壽陳君賓張允濟李桐客李素立孫至遠至遠子畬薛大鼎賈敦頤弟敦實李君球崔知溫高智周田仁會子歸道韋機孫岳岳子景駿權懷恩叔祖萬紀馮元常弟元淑蔣儼王方翼薛季昶漢宣帝曰使政平訟息民無愁歎與我共理其惟良二千石乎故漢代命官重外輕內郎官出宰百里郡守入作三公世祖中興尤深吏術慎選名儒為輔相不以吏事責功臣政優則增秩賜金績負則論輸左校選任之道皇漢其優隋政不綱彝倫斯紊天子事巡遊而務征伐具僚逞側媚而竊恩權是時朝廷無正人方岳無廉吏跨州連郡莫非豺虎之流佩紫懷黃悉奮爪牙之毒以至土崩不救旋踵而亡武德之初餘風未殄太宗皇帝削平亂迹湔洗污風唯思稼穡之艱不以珠璣為寶以是人知恥格俗尚貞修太平之基率由茲道洎天后玄宗之代貞元長慶之間或以卿士大夫涖方州或以御史郎官宰畿甸行古道也所病不能自武德已還歷年三百其間岳牧不乏循良今錄其政術有聞為之立傳所冀表吏師而儆不恪也韋仁壽雍州萬年人也大業末為蜀郡司法書佐斷獄平恕其得罪者皆曰韋君所斷死而無恨高祖入關遣使定巴蜀使者承制拜仁壽巂州都督府長史時南寧州內附朝廷每遣使安撫類皆受賄邊人患之或有叛者高祖以仁壽素有能名令檢校南寧州都督寄聽政於越巂使每歲一至其地以慰撫之仁壽將兵五百人至西洱河承制置八州十七縣授其豪帥為牧宰法令清肅人懷歡悅及將還酋長號泣曰天子遣公鎮撫南寧何得便去仁壽以城池未立為辭諸酋長乃相與築城立廨舍旬日而就仁壽又曰吾奉詔但令巡撫不敢擅住及將歸蠻夷父老各揮涕相送因遣子弟隨之入朝貢方物高祖大悅仁壽復請徙居南寧以兵鎮守有詔特聽以便宜從事令益州給兵送之刺史竇軌害其功託以蜀中山獠反叛未遑遠略不時發遣經歲餘仁壽病卒陳君賓陳鄱陽王伯山子也仕隋為襄國太守武德初以郡歸款封東陽公拜邢州剌史貞觀元年累轉鄧州刺史州邑喪亂之後百姓流離君賓至纔期月皆來復業二年天下諸州並遭霜澇君賓一境獨免當年多有儲積蒲虞等州戶口盡入其境逐食太宗下詔勞之曰朕以隋末亂離毒被海內率土百姓零落殆盡州里蕭條十不存一寤寐思之心焉若疚是以日昃忘食未明求衣曉夜孜孜惟以安養為慮每見水旱降災霜雹失所撫躬責己自漸德薄恐貧乏之黎庶不免饑餒傾竭倉廩普加賑恤其有一人絕食若朕奪之分命庶僚盡心匡救去年關內六州及蒲虞陝鼎等復遭亢旱禾稼不登糧儲既少遂令分房就食比聞刺史以下及百姓等並識朕懷逐糧戶到遞相安養迴還之日各有贏糧乃別齎布帛以申贈遺如此用意嘉歎良深一則知水旱無常彼此遞相拯贍不慮凶年二則知禮讓興行輕財重義四海士庶皆為兄弟變澆薄之風敦仁慈之俗政化如此朕復何憂其安置客口官人支配得所並令考司錄為功最養戶百姓不吝財帛已敕主者免今年調物宜知此意善相勸勉其年入為太府少卿轉少府少監九年坐事除名後起授虔州刺史卒張允濟青州北海人也隋大業中為武陽令務以德教訓下百姓懷之元武縣與其鄰接有人以牸牛依其妻家者八九年牛孳產至十餘頭及將異居妻家不與縣司累政不能決其人詣武陽質於允濟允濟曰爾自有令何至此也其人垂泣不止具言所以允濟遂令左右縛牛主以衫蒙其頭將詣妻家村中云捕盜牛賊召村中牛悉集各問所從來處妻家不知其故恐被連及指其所訴牛曰此是女壻家牛也非我所知允濟遂發蒙謂妻家人曰此即女壻可以牛歸之妻家叩頭服罪元武縣司聞之皆大慚又嘗道逢一老母種葱者結菴守之允濟謂母曰但歸不煩守也若遇盜當來告令老母如其言居一宿而葱大失母以告允濟悉召葱地十里中男女畢集允濟呼前驗問果得盜葱者曾有行人候曉先發遺衫於路行十數里方覺或謂曰我武陽境內路不拾遺但能迴取物必當在如言果得遠近稱之政績尤異遷高陽郡丞時無郡將允濟獨統大郡吏人畏悅及賊帥王須拔攻圍時城中糧盡吏人取槐葉藁節食之竟無叛者貞觀初累遷刑部侍郎封武城縣男出為幽州刺史尋卒李桐客冀州衡水人也仕隋為門下錄事大業末煬帝幸江都時四方兵起謀欲徙都丹陽召百僚會議公卿希旨俱言江右黔黎皆思望幸巡狩吳會勒石紀功復禹之跡今其時也桐客獨議曰江南卑濕地狹州小內奉萬乘外給三軍吳人力屈恐不堪命且踰越險阻非社稷之福御史奏桐客謗毀朝政僅而獲免後隋滅從宇文化及至黎陽轉沒竇建德建德平太宗召授秦府法曹參軍貞觀初累遷通巴二州所在清平流譽百姓呼為慈父後卒於家李素立趙州高邑人北齊梁州刺史義深曾孫也祖駼散騎常侍父政藻隋水部郎中大業末充使淮南為盜所殺素立武德初為監察御史時有犯法不至死者高祖特命殺之素立諫曰三尺之法與天下共之法一動搖則人無所措手足陛下甫創鴻業遐荒尚阻奈何輦轂之下便棄刑書臣忝法司不敢奉旨高祖從之自是屢承恩顧素立尋丁憂高祖令所司奪情授以七品清要官所司擬雍州司戶參軍高祖曰此官要而不清又擬祕書郎高祖曰此官清而不要遂擢授侍御史高祖曰此官清而復要貞觀中累轉揚州大都督府司馬時突厥鐵勒部相率內附太宗於其地置瀚海都護府以統之以素立為瀚海都護又有闕泥孰別部猶為邊患素立遣使招諭降之夷人感其惠率馬牛以饋素立素立唯受其酒一盃餘悉還之為建立廨舍開置屯田久之轉綿州刺史永徽初遷蒲州刺史及將之任所餘糧儲及什物皆令州司收之唯齎己之書籍而去道病卒高宗聞而特為廢朝一日諡曰平其孫至遠有重名長壽中為天官郎中內史李昭德重其才薦於則天擢令知流內選事或勸至遠謝其私恩至遠曰李公以公見用豈得以私謁也竟不謝遂為昭德所銜因事出為壁州刺史卒至遠子畬初為汜水主簿處事敏速有聲稱雖村童廁養之輩一閱之後無不知替代姓名者累轉國子司業事母甚謹閨門邕睦累代同居每歲時拜慶長幼男女咸有禮節及妻卒時母已先病畬恐傷母意約家人不令哭聲使聞於母朝夕定省不曾見其憂念之色士友甚以此稱之及母級過毀卒於喪至遠弟從遠景雲中歷黃門侍郎太府卿素立從兄子遊道則天時官至冬官尚書同鳳閣鸞臺三品薛大鼎蒲州汾陽人周太子少傅博平公善孫也父粹隋介州長史漢王諒謀反授絳州刺史諒敗伏誅大鼎以年幼免死配流辰州後得還鄉里義旗初建於龍門謁高祖因說請勿攻河東從龍門直渡據永豐倉傳檄遠近則足食足兵既總天府據百二之所斯亦拊背扼喉之計高祖深然之時將士咸請先攻河東遂從衆議授大將軍府察非掾貞觀中累轉鴻臚少卿滄州刺史州界有無棣河隋末填廢大鼎奏開之引魚鹽於海百姓歌之曰新河得通舟楫利直達滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被大鼎又以州界卑下遂決長蘆及漳衡等三河分洩夏潦境內無復水害時與瀛州刺史賈敦頤曹州刺史鄭德本俱有美政河北稱為鐺脚刺史永徽四年授銀青光祿大夫行荊州大都督府長史明年卒有二子克構克勤克構天授中官至麟臺監克勤歷司農少卿為來俊臣所陷伏誅克構坐配流嶺表而死賈敦頤曹州冤句人也貞觀中歷遷滄州刺史在職清潔每入朝盡室而行唯弊車一乘羸馬數匹羈勒有闕以繩為之見者不知其刺史也二十三年轉瀛州刺史州界滹沱河及滱水每歲泛溢漂流居人敦頤奏立堤堰自是無復水患永徽五年累遷洛州刺史時豪富之室皆籍外占田敦頤都括獲三千餘頃以給貧乏又發姦摘伏有若神明尋卒弟敦實敦實貞觀中為饒陽令政化清靜老幼懷之時敦頤復授瀛州刺史舊制大功以上不復連官朝廷以其兄弟在職俱有能名竟不遷替咸亨元年累轉洛州長史甚有惠政時洛陽令楊德幹杖殺人吏以立威名敦實曰政在養人義須存撫傷生過多雖能亦不足貴也常抑止德幹德幹亦為之稍減四年遷太子右庶子初敦頤為洛州刺史百姓共樹碑於大市通衢及敦實去職復刻石頌美立于兄之碑側時人號為棠棣碑敦實後為懷州刺史永淳初以年老致仕及病篤子孫迎醫視之敦實曰未聞良醫能治老也終不服藥垂拱四年卒時年九十餘子膺福先天中歷左散騎常侍昭文館學士坐預竇懷貞等謀逆伏誅李君球齊州平陵人也父義滿屬隋亂糾合宗黨保固村閭外盜不敢侵逼以功累授齊郡通守武德初遠申誠款詔以其宅為譚州仍拜為總管封平陵郡公君球少任俠頗涉書籍貞觀中齊州都督齊王據州城舉兵作亂君球與兄子行均守縣城事平太宗聞而嘉之擢授遊擊將軍仍改其本縣為全節縣君球累補左驍衞義全府折衝都尉龍朔三年高宗將伐高麗君球上疏諫曰臣聞心之病者不能緩聲事之急者不能安言性之慈者不能隱情且食君之祿者死君之事今臣食陛下之祿矣其敢愛身乎臣聞司馬法曰國雖大好戰必亡天下雖安忘戰必危兵者凶器戰者危事故聖主明王重行之也愛人力之盡恐府庫之殫懼社稷之危生中國之患故古人云務廣德者昌務廣地者亡昔秦始皇好戰不已至于失國是不愛其內而務其外故也漢武遠討朔方殆乎萬里廣拓南海分為八郡終於戶口減半國用空虛至於末年方垂哀痛之詔自悔其失彼高麗者辟側小醜潛藏山海之間得其人不足以彰聖化棄其地不足以損天威何至乎疲中國之人傾府庫之實使男子不得耕耘女子不得蠶織陛下為人父母不垂惻隱之心傾其有限之貲貪於無用之地設令高麗既滅即不得不發兵鎮守少發則兵威不足多發則人心不安是乃疲於轉戍萬姓無聊生也萬姓無聊即天下敗矣天下既敗陛下何以自安故臣以為征之不如不征滅之不如不滅書奏不納尋遷蔚州刺史未行改為興州刺史累遷揚州大都督府長史政尚嚴肅人吏憚之盜賊屏跡高宗頻降書勞勉時有吐谷渾犯塞以君球素有威重轉為靈州都督尋卒官崔知溫許州鄢陵人祖樞司農卿父義真陝州刺史知溫初為左千牛麟德中累轉靈州都督府司馬州界有渾斛薛部落萬餘帳數侵掠居人百姓咸廢農業習騎射以備之知溫表請徙於河北斛薛不願遷移時將軍契苾何力為之言於高宗遂寢其奏知溫前後十五上詔竟從之於是百姓始就耕穫後斛薛入朝因過州謝曰前蒙奏徙河北實有怨心然牧地膏腴水草不乏部落日富始荷公恩拜伏而去知溫四遷蘭州刺史會有党項三萬餘衆來寇州城城內勝兵既少衆大懼不知所為知溫使開城門延賊賊恐有伏不敢進俄而將軍權善才率兵來救大破党項之衆善才因其降欲盡坑之以絕後患知溫曰弗逆克奔古人之善戰誅無噍類禍及後昆又谿谷崢嶸草木幽蔚萬一變生悔之何及善才然其計又欲分降口五百人以與知溫知溫曰向論安危之策乃公事也豈圖私利哉固辭不受党項餘衆由是悉來降附知溫累遷尚書左丞轉黃門侍郎同中書門下三品兼修國史永隆二年七月遷中書令永淳三年三月卒年五十七贈荊州大都督子泰之開元中官至工部尚書少子諤之諤之神龍初為將作少匠預誅張易之有功封博陵縣侯賜實封二百戶開元初累遷少府監知溫兄知悌知悌高宗時官至戶部尚書高智周常州晉陵人少好學舉進士累補費縣令與丞尉均分俸錢政化大行人吏刊石以頌之尋授祕書郎弘文館直學士預撰瑤山玉彩文館辭林等三遷蘭臺大夫時孝敬在東宮智周與司文郎中賀凱司經大夫王真儒等俱以儒學詔授為侍讀總章元年請假歸葬其父母因謂所親曰知進而不知退取患之道也乃稱疾去職俄起授壽州刺史政存寬惠百姓安之每行部必先召學官見諸生試其講誦訪以經義及時政得失然後問及墾田獄訟之事咸亨二年召拜正諫大夫兼檢校禮部侍郎尋遷黃門侍郎同中書門下三品兼修國史俄轉御史大夫累表固辭煩劇之任高宗嘉其意拜右散騎常侍又請致仕許之永淳二年十月卒於家年八十二贈越州都督府智周少與鄉人蔣子慎善同詣善相者曰明公位極人臣而胤嗣微弱蔣侯官祿至薄而子孫轉盛子慎後累年為建安尉卒其子繪來謁智周智周已貴矣曰吾與子父有故子復有才因以女妻之永淳中為緱氏尉鄭州司兵卒繪子捷舉進士開元中歷臺省仕至湖延二州刺史子貴贈揚州大都督捷子冽渙並進士及第冽歷禮吏戶部三侍郎尚書左丞渙天寶末給事中永泰初右散騎常侍高氏殄滅已久果符相者之言初冽兄弟在父艱廬於墓側植松柏千餘株又同時榮貴人推其友愛冽子鍊渙子銖亦進士舉田仁會雍州長安人祖軌隋幽州刺史信都郡公父弘陵州刺史襲信都郡公仁會武德初應制舉授左衞兵曹累遷左武候中郎將貞觀十八年太宗征遼發後薛延陀數萬騎抄河南太宗令仁會及執失思力率兵擊破之逐北數百里延陀脫身走免太宗嘉其功降璽書慰勞永徽二年授平州刺史勸學務農稱為善政轉郢州刺史屬時旱仁會自曝祈禱竟獲甘澤其年大熟百姓歌曰父母育我田使君精誠為人上天聞田中致雨山出雲倉廩既實禮義申但願常在不患貧五遷勝州都督州界有山賊阻險劫奪行李仁會發騎盡捕殺之自是外戶不閉盜賊絕跡入為太府少卿麟德二年轉右金吾將軍所得祿俸估外有餘輒以納官時人頗譏其邀名仁會強力疾惡晝夜巡警自宮城至於衢路絲毫越法無不立發每日庭引百餘人躬自閱罰略無寬者京城貴賤咸畏憚之時有女巫蔡氏以鬼道惑衆自云能令死者復生市里以為神明仁會驗其假妄奏請徙邊高宗曰若死者不活便是妖妄若死者得生更是罪過竟依仁會所奏仁會總章二年遷太常正卿咸亨初又轉右衞將軍以年老致仕儀鳳四年卒年七十八諡曰威神龍中以子歸道贈戶部尚書歸道弱冠明經舉長壽中累補司賓丞仍通事舍人內供奉久之轉左衞郎將聖曆初突厥默啜遣使請和制遣左豹韜衞將軍閻知微入蕃冊為立功報國可汗默啜又遣使入朝謝恩知微遇諸途便與之緋袍銀帶兼表請蕃使入都日大備陳設歸道上言曰突厥背恩積稔悔過來朝宜待聖恩寬其罪戾解辮削袵須稟天慈知微擅與袍帶國家更將何物充賜望反初服以俟朝恩且小蕃使到不勞大備之儀則天然之及默啜將至單于都護府乃令歸道攝司賓卿迎勞之默啜又奏請六胡州及單于都護府之地則天不許默啜深怨遂拘縶歸道將害之歸道辭色不撓更責以無厭求請兼喻其禍福默啜意稍解會有制賜默啜粟三萬石雜綵五萬段農器三千事幷許之結婚於是歸道得還遂面陳默啜不利之狀請加防禦則天納焉頃之默啜果叛挾閻知微入寇趙定等州擢拜歸道夏官侍郎甚見親委累遷左金吾將軍司膳卿兼押千騎未幾除尚方監加銀青光祿大夫轉殿中監仍令依舊押千騎宿衞於玄武門敬暉等討張易之昌宗也遣使就索千騎歸道既先不預謀拒而不與及事定暉等將誅之歸道執辭免令歸私第中宗嘉其忠壯召拜太僕少卿驟除殿中少監右金吾將軍歲餘病卒贈輔國大將軍追封原國公中宗親為文以祭之子賓庭開元中為光祿卿韋機雍州萬年人祖元禮隋浙州刺史父恪洛州別駕機貞觀中為左千牛冑曹充使往西突厥冊立同俄設為可汗會石國反叛路絕三年不得歸機裂裳錄所經諸國風俗物產名為西征記及還太宗問蕃中事機因奏所撰書太宗大悅擢拜朝散大夫累遷至殿中監顯慶中為檀州刺史邊州素無學校機敦勸生徒創立孔子廟圖七十二子及自古賢達皆為之贊述會契苾何力東討高麗軍衆至檀州而灤河泛漲師不能進供其資糧數日不乏何力全師還以其事聞高宗以為能超拜司農少卿兼知東都營田甚見委遇有宦者於苑中犯法機杖而後奏高宗嗟賞賜絹數十疋謂曰更有犯者卿即鞭之不煩奏也上元中遷司農卿檢校園苑造上陽宮并移中橋從立德坊曲徙於長夏門街時人稱其省功便事有道士朱欽遂為天后所使馳傳至都所為橫恣機囚之因密奏曰道士假稱中宮驅使依倚形勢臣恐虧損皇明為禍患之漸高宗特發中使慰諭機而欽遂配流邊州天后由是不悅儀鳳中機坐家人犯盜為憲司所劾免官永淳中高宗幸東都至芳桂宮驛召機令白衣檢校園苑將復本官為天后所擠而止俄令檢校司農少卿事會卒子餘慶餘慶官至右驍衞兵曹早卒餘慶子岳岳亦以吏幹著名則天時累轉汝州司馬會則天幸長安召拜尚舍奉御從駕還京因召見則天謂曰卿是韋機之孫勤幹固有家風也卿之家事朕悉知之因問家人名賞慰良久尋拜太原尹岳素不習武固辭邊任由是忤旨左遷宋州長史歷海虢二州刺史所在皆著威名睿宗時入為殿中少監甚承恩顧及竇懷貞李晉等伏誅以岳嘗與交往為姜皎所陷左遷渠州別駕稍遷陝州刺史開元中卒於潁州別駕岳子景駿景駿明經舉神龍中累轉肥鄉令縣北界漳水連年泛溢舊隄迫近水漕雖修築不息而漂流相繼景駿審其地勢拓南數里因高築隄暴水至隄南以無患水去而隄北稱為腴田漳水舊有架柱長橋每年修葺景駿又改造為浮橋自是無復水患至今賴焉時河北飢景駿躬撫合境村閭必通贍恤貧弱獨免流離及去任人吏立碑頌德開元中為貴鄉令縣人有母子相訟者景駿謂之曰吾少孤每見人養親自恨終天無分汝幸在溫凊之地何得如此錫類不行令之罪也因垂泣嗚咽仍取孝經付令習讀之於是母子感悟各請改悔遂稱慈孝累轉趙州長史路由肥鄉人吏驚喜競來犒餞留連經日有童稚數人年甫十餘歲亦在其中景駿謂曰計吾為此令時汝輩未生既無舊恩何慇懃之甚也咸對曰此間長宿傳說縣中廨宇學堂館舍隄橋並是明公遺跡將謂古人不意親得瞻覩不覺欣戀倍於常也其為人所思如此十七年遷房州刺史州帶山谷俗參蠻夷好淫祀而不修學校景駿始開貢舉悉除淫祀又通狹路并造傳館行旅甚以為便二十年轉奉先令未行而卒權懷恩雍州萬年人周荊州刺史千金郡公景宣玄孫也其先自天水徙家焉祖弘壽大業末為臨汾郡司倉書佐高祖鎮晉陽引判留守事以從義師之功累轉秦王府長史太宗遇之甚厚又從平王世充拜太僕卿累封盧國公卒諡曰恭父知讓襲爵官至博州刺史懷恩初以蔭授太子洗馬咸亨初累轉尚乘奉御襲爵盧國公時有奉乘安畢羅善於調馬甚為高宗所寵懷恩奏事遇畢羅在帝左右戲無禮懷恩退而杖之四十高宗知而嗟賞之謂侍臣曰懷恩乃能不避強禦真良吏也即日拜萬年令為政清肅令行禁止前後京縣令無及之者後歷慶萊衞邢四州刺史洛州長史懷恩姿狀雄毅束帶之後妻子不敢仰視所歷皆以威名御下人吏重足而立俄出為宋州刺史時汴州刺史楊德幹亦以嚴肅與懷恩齊名至是懷恩路由汴州德幹送之出郊懷恩見新橋中途立木以禁車過者謂德幹曰一言處分豈不得何用此為德幹大慚時議以為不如懷恩也轉益州大都督府長史尋卒姪楚璧官至左領軍衞兵曹參軍開元十年駕在東都楚璧乃與故兵部尚書李迥秀男齊損從祖弟金吾淑陳倉尉盧玢及京城左屯營押官長上折衝周履濟楊楚劍元令琪等舉兵反立楚璧兄子梁山年十五詐稱襄王男號為光帝擁左屯營兵百餘人梯上景風門逾城而入踞長樂恭禮門入宮城求留守刑部尚書王志愔不獲屬天曉屯營兵自相翻覆盡殺梁山等傳首東都楚璧並坐籍沒懷恩叔祖萬紀萬紀性強正好直言貞觀中為治書侍御史以公事奏劾魏徵溫彥博等太宗以為不避豪貴甚禮之遷尚書左丞封冀氏男再轉齊王祐府長史祐既失德數匡正之竟為祐所殺語在祐傳祐既死贈萬紀齊州都督武都公諡曰敬子玄福高宗時為兵部侍郎馮元常相州安陽人自長樂徙家焉北齊右僕射子琮曾孫也舉明經高宗時累遷監察御史為劍南道巡察使興利除害蜀土賴焉永淳中為尚書左丞元常清鑒有理識甚為高宗之所賞嘗密奏中宮權重宜稍抑損高宗雖不能用深以其言為然則天聞而甚惡之及臨朝四方承旨多獻符瑞嵩陽令樊文進瑞石則天命於朝堂示百官元常奏言狀涉諂偽不可誣罔士庶則天不悅出為隴州刺史俄而天下岳牧集乾陵會葬則天不欲元常赴陵所中途改授眉州刺史劍南先時光火賊夜掠居人晝潛山谷元常至喻以恩信許其首露仍切加捕逐賊徒捨器杖面縛自陳者相繼又轉廣州都督便道之任不許詣都尋屬安南首領李嗣仙殺都護劉延祐剽陷州縣敕元常討之率士卒濟南海先馳檄示以威恩喻以禍福嗣仙徒黨多相率歸降因縱兵誅其魁首安慰居人而旋雖屢有政績則天竟不賞之尋為酷吏周興所陷追赴都下獄死元常閨門雍肅雅有禮度雖小功之喪未嘗寢於私室甚為士類所稱從父弟元淑則天時為清漳令政有殊績百姓號為神明又歷浚儀始平二縣令皆單騎赴職未嘗以妻子之官所乘馬午後則不與蒭云令其作齋身及奴僕每日一食而已俸祿之餘皆供公用并給與貧士人或譏其邀名元淑曰此吾本性不為苦也中宗時降璽書勞勉仍令史官編其事跡卒於祠部郎中蔣儼常州義興人貞觀中為右屯衞兵曹參軍太宗將征遼東募使高麗者衆皆畏憚儼謂人曰主上雄略華夷畏威高麗小蕃豈敢圖其使者縱其凌虐亦見吾死所也遂出請行及至高麗莫離支置於窟室中脅以兵刃終不屈撓會高麗敗得歸太宗奇之拜朝散大夫再遷幽州司馬以善政為巡察使劉祥道所薦擢為會州刺史再遷殿中少監數陳意見高宗每優納之再轉蒲州刺史蒲州戶口殷劇前後刺史多不稱職儼下車未幾令行禁止稱為良牧永淳元年拜太僕卿以父名卿固辭乃除太子右衞副率時徵隱士田遊巖為太子洗馬在宮竟無匡輔儼乃貽書以責之曰足下負巢由之峻節傲唐虞之聖主養煙霞之逸氣守林壑之遁情有年載矣故能聲出區宇名流海內主上屈萬乘之重申三顧之榮遇子以商山之客待子以不臣之禮將以輔導儲貳漸染芝蘭耳皇太子春秋鼎盛聖道未周拾遺補闕臣子恆務僕以不才猶參廷諜誠以素非德望位班卒伍言以人廢不蒙採掇足下受調護之寄是可言之秋唯唯而無一談悠悠以卒年歲向使不餐周粟僕何敢言祿及親矣將何酬塞想為不達謹書起予遊巖竟不能答儼尋檢校太常卿文明中封義興縣子歷右衞大將軍太子詹事以年老致仕垂拱三年卒于家年七十八文集五卷王方翼并州祁人也高宗王庶人從祖兄也祖裕武德初隋州刺史裕妻即高祖妹同安大長公主也太宗時以公主屬尊年老特加敬異數幸其第賞賜累萬方翼父仁表貞觀中為岐州刺史仁表卒妻李氏為主所斥居於鳳泉別業時方翼尚幼乃與傭保齊力勤作苦心計功不虛棄數年闢田數十頃修飾館宇列植竹木遂為富室公主卒後歸長安友人趙持滿犯罪被誅暴尸於城西親戚莫敢收視方翼歎曰欒布之哭彭越大義也周文之掩朽骼至仁也絕友之義蔽主之仁何以事君乃收其屍具禮葬之高宗聞而嘉歎由是知名永徽中累授安定令誅大姓皇甫氏盜賊止息號為善政五遷肅州刺史時州城荒毀又無壕塹數為寇賊所乘方翼發卒濬築引多樂水環城為壕又出私財造水碾磑稅其利以養飢餒宅側起舍十餘行以居之屬蝗儉諸州貧人死於道路而肅州全活者甚衆州人為立碑頌美會吏部侍郎裴行儉西討遮匐奏方翼為副兼檢校安西都護又築碎葉鎮城立四面十二門皆屈曲作隱伏出沒之狀五旬而畢西域諸胡競來觀之因獻方物永隆中車簿反叛圍弓月城方翼引兵救之至伊麗河賊前來拒因縱擊大破之斬首千餘級俄而三姓咽悉發衆十萬與車簿合勢以拒方翼屯兵熱海與賊連戰流矢貫臂徐以佩刀截之左右莫有覺者既而所將蕃兵懷貳謀執方翼以應賊方翼密知之悉召會議佯出軍資以賜之續續引去便令斬之會大風又振金鼓以亂其聲遂誅七千餘人因遣裨將分道討襲咽等賊既無備因是大潰擒首領突騎施等三百人西域遂定以功遷夏州都督屬牛疫無以營農方翼造人耕之法施關鍵使人推之百姓賴焉永淳二年詔徵方翼將議西域之事於奉天宮謁見賜食與語方翼衣有舊時血漬之處高宗問其故方翼具對熱海苦戰之狀高宗使袒視其瘡歎曰吾親也賞賜甚厚俄屬綏州白鐵余舉兵反乃詔方翼副程務挺討之賊平封太原郡公則天臨朝以方翼是庶人近屬陰欲除之及程務挺被誅以方翼與務挺連職素善追赴都下獄遂流于崖州而死子珤珣並知名珤開元中皆為中書舍人珣至祕書監薛季昶絳州龍門人也則天初上封事解褐拜監察御史頻按制獄稱旨累遷御史中丞萬歲通天元年夏官郎中侯味虛統兵討契丹不利奏言賊徒熾盛常有蛇虎導其軍則天命季昶按驗其狀便為河北道按察使季昶先馳至軍斬味虛以聞又有藁城尉吳澤者貪虐縱橫嘗射殺驛使截百姓子女髮以為髢州將不能制甚為人吏所患季昶又杖殺之由是威震遠近州縣望風懾懼然後布以恩信旌揚善吏有汴州孝女李氏年八歲父卒柩殯在堂十餘載每日哭臨無限及年長母欲嫁之遂截髮自誓請在家終養及喪母號毀殆至滅性家無丈夫自營棺椁州里欽其至孝送葬者千餘人葬畢廬於墓側蓬頭跣足負土成墳手植松柏數百株季昶列上其狀有制持表門閭賜以粟帛久視元年季昶自定州刺史入為雍州長史威名甚著前後京尹無及之者俄遷文昌左丞歷魏陝二州刺史長安末為洛州長史所在皆以嚴肅為政神龍初以預誅張易之兄弟功加銀青光祿大夫拜戶部侍郎時季昶勸敬暉等因兵勢殺武三思暉等不從竟以此敗語在暉傳季昶亦因是累貶自桂州都督授儋州司馬初季昶與昭州首領周慶立及廣州司馬光楚客不協及將之儋州懼慶立見殺將往廣州又惡楚客乃歎曰薛季昶行事至是耶因自製棺仰藥而死睿宗即位下制曰故儋州司馬薛季昶剛幹義烈早承先顧驅策中外績譽昭宣有莊湯之推舉同汲黯之強直屬醜正操衡除其異己橫加竄責卒至殂亡言念忠冤有懷嘉悼可贈左御史大夫仍同敬暉等例與一子官
