body:
  text: 舊唐書卷一百三十一列傳第八十一李勉李臯子象古道古李勉字玄卿鄭王元懿曾孫也父擇言為漢褒相岐四州刺史安德郡公所歷皆以嚴幹聞在漢州張嘉貞為益州長史判都督事性簡貴待管內刺史禮隔而引擇言同榻坐談政理時人榮之勉幼勤經史長而沉雅清峻宗於虛玄以近屬陪位累授開封尉時昇平日久且汴州水陸所湊邑居庬雜號為難理勉與聯尉盧成軌等並有擒姦擿伏之名至德初從至靈武拜監察御史屬朝廷右武勳臣恃寵多不知禮大將管崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於有司肅宗特原之歎曰吾有李勉始知朝廷尊也遷司膳員外郎時關東獻俘百餘詔並處斬囚有仰天歎者勉過問之對曰某被脅制守官非逆者勉乃哀之上言曰元惡未殄遭點污者半天下皆欲澡心歸化若盡殺之是驅天下以資兇逆也肅宗遽令奔騎宥釋由是歸化日至克復西京累歷清要四遷至河南少尹累為河東節度王思禮朔方河東都統李國貞行軍司馬尋遷梁州都督山南西道觀察使勉以故吏前密縣尉王晬勤幹俾攝南鄭令俄有詔處死勉問其故乃為權倖所誣勉詢將吏曰上方藉牧宰為人父母豈以譖言而殺不辜乎即停詔拘晬飛表上聞晬遂獲宥而勉竟為執政所非追入為大理少卿謁見面陳王晬無罪政事條舉盡力吏也肅宗嘉其守正乃除太常少卿王晬後以推擇拜大理評事龍門令終有能名時稱知人肅宗將大用勉會李輔國寵任意欲勉降禮於己勉不為之屈竟為所抑出歷汾州虢州刺史改京兆尹檢校右庶子兼御史中丞都畿觀察使尋兼河南尹明年罷尹以中丞歸西臺又除江西觀察使賊帥陳莊連陷江西州縣偏將呂太一武日昇相繼背叛勉與諸道力戰悉攻平之部人有父病以蠱道為木偶人署勉名位瘞于其隴或以告曰為父禳災亦可矜也捨之大曆二年來朝拜京兆尹兼御史大夫政尚簡肅宦官魚朝恩為觀軍容使仍知國子監事恃寵含威天憲在舌前尹黎幹寫心候事動必求媚每朝恩入監傾府人吏具數百人之餼以待之及勉莅職旬月朝恩入監府吏先期有請勉曰軍容使判國子監事勉候太學軍容宜厚具主禮勉忝京尹軍容倘惠顧府廷豈敢不具蔬饌朝恩聞而銜之因不復至太學勉亦尋受代四年除廣州刺史兼嶺南節度觀察使番禺賊帥馮崇道桂州叛將朱濟時等阻洞為亂前後累歲陷沒十餘州勉至遣將李觀與容州刺史王翃併力招討悉斬之五嶺平前後西域舶泛海至者歲纔四五勉性廉潔舶來都不檢閱故末年至者四十餘在官累年器用車服無增飾及代歸至石門停舟悉搜家人所貯南貨犀象諸物投之江中耆老以為可繼前朝宋璟盧奐李朝隱之徒人吏詣闕請立碑代宗許之十年拜工部尚書及滑亳永平軍節度令狐彰卒遺表舉勉自代因除之在鎮八年以舊德清重不嚴而理東諸侯雖暴驁者亦宗敬之十一年汴宋留後田神玉卒詔加勉汴州刺史汴宋節度使未行汴州將李靈曜阻兵北結田承嗣承嗣使姪悅將銳兵戍之詔勉與李忠臣馬燧等攻討大破之悅僅以身免靈曜北走勉騎將杜如江擒之以獻代宗褒賞甚厚既而李忠臣代鎮汴州而勉仍舊鎮忠臣遇下貪虐明年為麾下所逐詔復加勉汴宋節度使移理汴州餘並如故德宗嗣位加檢校吏部尚書尋加平章事建中元年檢校左僕射充河南汴宋滑亳河陽等道都統餘如故四年李希烈反以他盜為名悉衆來寇汴州勉城守累月救援莫至謂其將曰希烈兇逆殘酷若與較力必多殺無辜吾不忍也遂潛師潰圍南奔宋州詔以司徒平章事徵既至朝廷素服請罪優詔復其位勉引過備位而已無何盧嵵自新州員外司馬除澧州刺史給事中袁高以嵵邪佞𢀿政貶未塞責停詔執表遂授澧州別駕他日上謂勉曰衆人皆言盧嵵姦邪朕何不知卿知其狀乎對曰天下皆知其姦邪獨陛下不知所以為姦邪也時人多其正直然自是見疏累表辭位遂罷知政事加太子太保貞元四年卒年七十二上頗愍悼之冊贈太傅賻物有差喪葬官給勉坦率素淡好古尚奇清廉簡易為宗臣之表善鼓琴好屬詩妙知音律能自制琴又有巧思及在相位向二十年祿俸皆遺親黨身沒而無私積其在大官禮賢下士終始盡心以名士李巡張參為判官卒於幕三歲之內每遇宴飲必設虛位於筵次陳膳執酹辭色悽惻論者美之或曰勉失守梁城亦可貶也議者曰不然當賊烈之始亂其慓悍陰禍兇焰不可當天方厚其毒而降之罰況勉應變非長援軍莫至又其時關輔已俶擾矣人心已動搖矣以文吏之才當虎狼之隊其全師奔宋非量力之恥也與其坐受喪敗不猶愈乎李臯字子蘭曹王明玄孫嗣王戢之子少補左司禦率府兵曹參軍天寶十一載嗣封授都水使者三遷至祕書少監皆同正多智數善因事以自便奉太妃鄭氏以孝聞上元初京師旱米斗直數千死者甚多臯度俸不足養亟請外官不允乃故抵微法貶溫州長史無幾攝行州事歲儉州有官粟數十萬斛臯欲行賑救掾吏叩頭乞候上旨臯曰夫人日不再食當死安暇稟命若殺我一身活數千人命利莫大焉於是開倉盡散之以擅貸之罪飛章自劾天子聞而嘉之答以優詔就加少府監臯行縣見一媼垂白而泣哀而問之對曰李氏之婦有二子鈞鍔宦遊二十年不歸貧無以自給時鈞為殿中侍御史鍔為京兆府法曹俱以文藝登科名重於時臯曰入則孝出則悌行有餘力然後可以學文若二子者豈可備於列位由是舉奏並除名勿齒改處州別駕行州事以良政聞徵至京未召見因上書言理道拜衡州刺史坐小法貶潮州刺史時楊炎謫官道州知臯事直及為相復拜衡州初臯為御史覆訊懼貽太妃憂竟出則素服入則公服言貌如平常太妃竟不知及為潮州詭詞謂遷至是復位方泣以白且言非疾不敢有聞建中元年遷湖南觀察使前使辛京杲貪殘有將王國良鎮邵州武岡縣豪富京杲以死罪加之國良危懼因人所苦遂散財聚衆據縣以叛諸道同討聯歲不能下臯授命日乃曰驅疲甿誅反側非所以奉聖朝事遣使遺國良書曰觀將軍非敢大逆蓋遭讒嫉救誤死而已將軍遇我何不速降我與將軍同為辛京杲所構我已蒙聖朝昭雪使我何心持刃殺將軍耶將軍以為不然我以陣術破將軍陣以攻法屠將軍城非將軍所度也國良捧書且憂且喜遣使請降亦未必決臯即日赴縣受降中道有候騎馳告曰國良軍中有變言降是詐也臯曰非爾輩所知遂留麾下兵單騎假稱使者徑入國良壘中國良召使者入臯遂大叫軍中曰有人識曹王否只我是國良何不速降一軍愕眙不敢動適有識者走至傳呼曰是國良匍匐叩頭請罪臯執手約為兄弟盡焚攻守之備散倉庫給兵士令復農桑有詔赦國良罪賜名惟新建中二年丁母艱奉喪至江陵會梁崇義反乃授起復左衞大將軍復還湖南尋加散騎常侍李希烈反遷江西道節度使洪州刺史兼御史大夫至州集將吏而令曰嘗有功未申者別為行有策謀及器能堪佐軍者別為行有裨將伊慎李伯潛劉旻皆自占臯察其詞氣驗其有功悉補大將擢王鍔委之中軍以馬彝許孟容為賓佐繕甲兵具戰艦將軍二萬餘初伊慎將江西兵從李希烈平襄州及反懼臯任之乃陰遣遺之鎖甲又詐為慎書往復置遺于境上聞即遣中使斬慎臯表請捨令自効會與賊夾江為陣中使又至臯乃勉令以功自贖賜之以所乘馬及器甲令將鋒而先臯率軍繼之責其有功果大破賊斬首數百級慎方得免罪賊樹堡柵於蔡山臯度峻險不可攻乃聲言西取蘄州理戰艦分兵傍南涯與舟師泝江而上賊以老弱守柵引軍循江隨戰艦南北與臯兵相直去蔡山三百餘里臯令步兵登舟順流東下不日拔蔡山賊還救間一日方至大破之因進拔蘄州降其將李良又取黃州斬首千餘兵益振舒王為元帥加臯前軍兵馬使德宗居奉天淮南節度陳少遊強取鹽鐵錢其使包佶以財幣泝江次于蘄口時希烈已屠汴州又遣驍將杜少誠將步騎萬餘來寇蘄黃將絕江道臯遣伊慎將七千衆禦之遇于永安戍慎列三柵相去纔四里列鼓角中柵少誠至分兵圍之部隊未嚴聲鼓而三柵齊出奮擊不為行陣賊亂少誠敗走斬首萬級封尸為京觀以功加銀青光祿大夫進封五百戶上至梁州進獻繼至臯以上蒙塵于外不敢居城府乃於西塞山上游大洲屯軍從近縣為軍市商貨畢至加工部尚書駕還京師又遣伊慎王鍔將兵圍安州州城阻溳水為固攻之累日不下希烈遣甥劉戒虛將步騎八千來援臯命李伯潛分師迎擊於應山獲戒虛及大將二裨將二十斬首千餘面縛戒虛等之城下乃使人說之賊曰得大將及賓佐一二人為信當降臯乃使王鍔馬彝繩城而入城中大呼乃出降希烈又遣兵援隨州臯令伊慎擊於厲鄉大破之復平靜白雁等關希烈懼乃戢兵貞元初拜江陵尹荊南節度等使江漢倚臯為固未幾李思登以隨州降凡下州四縣十七大小十餘陣未嘗敗衂淮西既平請護喪祔東都上遣中使弔贈父右僕射母曹國太妃葬畢來朝詔還鎮出東都以拜墓觀者榮之先江陵東北有廢田傍漢古隄二處每夏則溢臯始命塞之廣田五千頃畝得一鍾規江南廢洲為廬舍架江為二橋流人自占二千餘戶自荊至樂鄉凡二百里旅舍鄉聚凡十數大者皆數百家楚俗佻薄不穿井飲陂澤臯始命合錢開井以便人初平希烈吳少誠殺陳仙奇上以襄鄧要阨三年除襄州刺史山南東道節度等使割汝隨隸焉練兵積糧市迴鶻馬益騎兵嘗大畋以教士少誠憚之性勤儉知人疾苦設監司能參聽下持將吏短長賞罰必信所至常平物價貴則出賣之給將吏廩俸豪家不得擅其利常運心巧思為戰艦挾二輪蹈之翔風鼓浪疾若挂帆席所造省易而久固又造欹器進入內中每遺人物常自秤量署之官匹帛皆印之絕吏之私初扶風馬彝未知名臯始辟之卒以正直稱漢陽王張柬之有林園在州西公府多假之游宴臯將買之彝斂袵而言曰張漢陽有中興功今遺業當百代保之王縱欲之奈何令其子孫自鬻焉臯謝曰主吏失詞為足下羞微足下安得聞此言以改過遷善知人任下為己任故賓從將佐多至大官貞元八年三月暴卒于位年六十廢朝三日贈右僕射賻弔有差諡曰成子象古道古復古象古自衡州刺史為安南都護元和十四年為楊清所殺妻子支黨無噍類焉楊清者代為南方酋豪屬象古貪縱人心不附又惡清之強自驩州刺史召為牙門將鬱鬱不快無何邕管黃家賊叛詔象古發兵數道共討之象古命清領兵三千赴焉清與其子志烈及所親杜士交潛謀迴戈夜襲安南數日城陷象古故及於害朝廷命唐州刺史桂仲武為都護且招諭之赦清以為瓊州刺史仲武至境清不納復約束部署刑戮憯虐人無聊生仲武使人諭其酋豪數月間歸附繼至約兵七千餘人收其城斬清及其子志貞籍沒其家志烈與士交敗保于長州之鑿溪尋以所部兵來降道古登進士第遷司門員外郎便佞巧宦早升朝籍常以酒肴棋博游公卿門角賭之際每偽為不勝而厚償之故當時有虛名而嗜利者悉與之狎歷利隨唐睦四州刺史由黔中觀察為鄂岳沔蘄安黃團練觀察使時元和十一年也初以柳公綽在鎮無功議將代之裴度言道古嗣曹王臯之子臯嘗以江漢兵遏希烈之亂威惠至今在人復用其子必能繼美憲宗然之故有此授及赴鎮倍道而行以數騎徑入安州城時公綽殊未意道古至惶駭而出家財多為所奪十二年道古攻申州克其羅城乃進圍逼其中城城中守卒夜帥婦人登城而呼懸門竊發分出其衆道古之衆驚亂為虜所殺初李聽守安州未嘗退衂及道古至誣奏聽移去之乃自帥兵出穆陵士卒驕惰賜給多闕其度支供軍錢道古半以奉權倖半以沒己人皆怨怒不肯力戰賊亦易道古以羸兵抵之故道古前後再攻破申州外城而不能拔至李愬入蔡州乃降元和十三年入為宗正卿道古在鄂州日以貪暴聞懼終得罪乃薦山人柳泌以媚於上後又為左金吾衞將軍憲宗季年頗信方士銳於服食詔天下搜訪奇士宰相皇甫鎛方諛媚固寵道古言柳泌有道術鎛得而進之待詔翰林憲宗服餌過當暴成狂躁之疾以至棄代穆宗在東宮扼腕於其事及居喪皆竄逐誅之鎛既貶責授道古循州司馬終以服丹藥歐血而卒史臣曰李勉李臯稟性端莊處身廉潔臨民莅事動有美聲可謂宗臣之英也若夫治軍旅禦寇戎謀必臧戰必勝則又勉不及臯遠矣道古便佞姦以事君何父子之不相類也贊曰我宗之英曰臯與勉才雖不同道豈相遠
