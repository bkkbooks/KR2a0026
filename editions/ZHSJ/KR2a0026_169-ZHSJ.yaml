body:
  text: 舊唐書卷一百六十五列傳第一百一十五韋夏卿王正雅族孫凝柳公綽子仲郢孫璧玭弟公權伯父子華子華子公度崔玄亮溫造子璋郭承嘏殷侑孫盈孫徐晦韋夏卿字雲客杜陵人父迢檢校都官郎中嶺南節度行軍司馬夏卿苦學大曆中與弟正卿俱應制舉同時策入高等授高陵主簿累遷刑部員外郎時久旱蝗詔於郎官中選赤畿令改奉天縣令以課最第一轉長安令改吏部員外郎轉本司郎中拜給事中出為常州刺史夏卿深於儒術所至招禮通經之士時處士竇羣寓於郡界夏卿以其所著史論薦之于朝遂為門人改蘇州刺史貞元末徐州張建封卒初授夏卿徐州行軍司馬尋授徐泗濠節度使夏卿未至建封子愔為軍人立為留後因授旄鉞徵夏卿為吏部侍郎轉京兆尹太子賓客檢校工部尚書東都留守遷太子少保卒時年六十四贈左僕射夏卿有風韻善談讌與人同處終年而喜慍不形於色撫孤侄恩踰己子早有時稱其所與游辟之賓佐皆一時名士為政務通適不喜改作始在東都傾心辟士頗得才彥其後多至卿相世謂之知人王正雅字光謙其先太原人東都留守翃之子伯父翊代宗朝御史大夫以貞亮鯁直名於當代卒諡曰忠惠正雅少時以孝行修謹聞元和初舉進士登甲科禮部侍郎崔邠甚知之累從職使府元和十一年拜監察御史三遷為萬年縣令當穆宗時京邑號為難理正雅抑強扶弱政甚有聲會柳公綽為京兆尹上前褒稱穆宗命以緋衣銀章就縣宣賜遷戶部郎中尋加知臺雜事再遷太常少卿出為汝州刺史充本州防禦使有中人為監軍怙權干政正雅不能堪乃謝病免入為大理卿會宋申錫事起獄自內出卒無證驗是時王守澄之威權鄭注之寵勢雖宰相重臣無敢顯言其事者唯正雅與京兆尹崔琯上疏請出造事者付外考驗其事別具狀聞由是獄情稍緩申錫止於貶官中外翕然推重之大和五年十一月卒贈左散騎常侍正雅從弟重翊之子也位止河東令重子衆仲登進士第累官衡州刺史衆仲子凝凝字致平少孤宰相鄭肅之甥少依舅氏年十五兩經擢第嘗著京城六崗銘為文士所稱再登進士甲科崔璪領鹽鐵辟為巡官歷佐梓潼宣歙使幕宰相崔龜從奏為鄠縣尉集賢校理遷監察御史轉殿中宰相崔鉉出鎮揚州奏為節度副使入為起居郎歷禮部兵部考功三員外遷司封郎中長安令中丞鄭處誨奏知臺雜換考功郎中遷中書舍人時政不協出為同州刺史賜金紫暮年移疾華州敷水別墅踰年以禮部侍郎徵凝性堅正貢闈取士拔其寒俊而權豪請託不行為其所怒出為商州刺史明年檢校右散騎常侍潭州刺史湖南團練觀察使入為兵部侍郎領鹽鐵轉運使又以不奉權倖改祕書監出為河南尹檢校禮部尚書宣州刺史宣歙觀察使凝咸通中兩佐宣城使幕備究人之利病滌除積弊民俗阜康踰歲黃巢自嶺表北歸大掠淮南攻圍和州凝令牙將樊儔率師據采石以援之儔犯令凝即斬之以徇命別將烏穎代儔赴援竟解歷陽之圍賊怒引衆攻宣城大將王涓請出軍逆戰凝曰賊忿恚而來宜持重待之彼衆我寡萬一不捷則州城危矣涓銳意請行凝即閱集丁壯分守要害登陴設備涓果戰死賊乘勝而來則守有備矣賊為梯衝之具急攻數月禦備力殫吏民請曰賊之凶勢不可當願尚書歸款退之懼覆尚書家族凝曰人皆有族予豈獨全誓與此城同存亡也既而賊退去時乾符五年也其年夏疾甚有大星墜於正寢八月卒于郡時年五十八無子以弟子鑣為嗣鑣兄鉅位終兵部侍郎柳公綽字起之京兆華原人也祖正禮邠州士曹參軍父子溫丹州刺史公綽幼聰敏年十八應制舉登賢良方正直言極諫科授祕書省校書郎貞元元年也貞元四年復應制舉再登賢良方正科時年二十一制出授渭南尉公綽性謹重動循禮法屬歲飢其家雖給而每飯不過一器歲稔復初家甚貧有書千卷不讀非聖之書為文不尚浮靡慈隰觀察使姚齊梧奏為判官得殿中侍御史冬薦授開州刺史入為侍御史再遷吏部員外郎武元衡罷相鎮西蜀與裴度俱為元衡判官尤相善先度入為吏部郎中度以詩餞別有兩人同日事征西今日君先捧紫泥之句元和初憲宗頗出遊畋銳意用兵公綽欲因事諷諫五年十一月獻太醫箴一篇其辭曰天布寒暑不私於人品類既一崇高以均惟謹好愛能保其身清淨無瑕輝光以新寒暑滿天地之間浹肌膚於外好愛溢耳目之前誘心知於內清潔為隄奔射猶敗氣行無間隙不在大睿聖之姿清明絕俗心正無邪志高寡欲謂天高矣氛蒙晦之謂地厚矣橫流潰之聖德超邁萬方賴之飲食所以資身也過則生患衣服所以稱德也侈則生慢唯過與侈心必隨之氣與心流疾亦伺之聖心不惑孰能移之畋遊恣樂流情蕩志馳騁勞形咤叱傷氣惟天之重從禽為累不養其外前修所忌聖心非之孰敢違之人乘氣生嗜欲以萌氣離有患氣凝則成巧必喪真智必誘情去彼煩慮在此誠明醫之上者理於未然患居慮後防處事先心靜樂行體和道全然後能德施萬物以享億年聖人在上各有攸處庶政有官羣藝有署臣司太醫敢告諸御憲宗深嘉之翌日降中使奬勞之曰卿所獻之文云氣行無間隙不在大何憂朕之深也踰月拜御史中丞公綽素與裴厚李吉甫出鎮淮南深怨六年吉甫復輔政以公綽為潭州刺史兼御史中丞充湖南觀察使湖南地氣卑濕公綽以母在京師不可迎侍致書宰相乞分司洛陽以便奉養久不許八年移為鄂州刺史鄂岳觀察使乃迎母至江夏九年吳元濟據蔡州叛王師討伐詔公綽以鄂岳兵五千隸安州刺史李聽率赴行營公綽曰朝廷以吾儒生不知兵耶即日上奏願自征行許之公綽自鄂濟溳江直抵安州李聽以廉使之禮事之公綽謂之曰公所以屬鞬負弩者豈非為兵事耶若去戎容被公服兩郡守耳何所統攝乎以公名家曉兵若吾不足以指麾則當赴闕不然吾且署職名以兵法從事矣聽曰唯公所命即署聽為鄂岳都知兵馬使中軍先鋒行營兵馬都虞候三牒授之乃選卒六千屬聽戒其部校曰行營之事一決都將聽感恩畏威如出麾下其知權制變甚為當時所稱鄂軍既在行營公綽時令左右省問其家如疾病養生送死必厚廩給之軍士之妻冶容不謹者沉之于江行卒相感曰中丞為我輩知家事何以報効故鄂人戰每克捷十一年入為給事中李師道歸朝遣公綽往鄆州宣諭使還拜京兆尹以母憂免十四年起為刑部侍郎領鹽鐵轉運使轉兵部侍郎兼御史大夫領使如故長慶元年罷使復為京兆尹兼御史大夫時河朔復叛朝廷用兵補授行營諸將朝令夕改驛騎相望公綽奏曰自幽鎮用兵使命繁併館遞匱乏鞍馬多闕又敕使行李人數都無限約其衣緋紫乘馬者二十三十匹衣黃綠者不下十匹五匹驛吏不得視券牒隨口即供驛馬既盡遂奪路人鞍馬衣冠士庶驚擾怨嗟遠近喧騰行李將絕伏望聖慈聊為定限乃下中書條疏人數自是吏不告勞以言直為北司所惡尋轉吏部侍郎二年九月遷御史大夫韓弘病自河中入朝以弘守司徒中書令詔百僚問疾弘遣其子達情言不能接見公綽謂其子曰聖上以公官重令百司省問異禮也如拜君賜宜力疾公見安有臥令子弟傳言耶弘懼挾扶而出人皆聳然三年改尚書左丞又拜檢校戶部尚書襄州刺史山南東道節度使行部至鄧縣縣二吏犯法一贓賄一舞文縣令以公綽守法必殺贓吏獄具判之曰贓吏犯法法在姦吏壞法法亡誅舞文者公綽馬害圉人命斬之賓客進言曰可惜良馬圉人自防不至公綽曰安有良馬害人乎亟命殺之牛僧孺罷相鎮江夏公綽具戎容於郵舍候之軍吏自以漢上地高於鄂禮太過公綽曰奇章才離台席方鎮重宰相是尊朝廷也竟以戎容見有道士獻丹藥試之有驗問所從來曰鍊此丹於薊門時朱克融方叛公綽遽謂之曰惜哉至藥來於賊臣之境雖驗何益乃沉之于江而逐道士鄧縣人鄭懷政病狂妄稱天子公綽捕而殺之敬宗即位加檢校左僕射寶曆元年入為刑部尚書二年授邠州刺史邠寧慶節度使所部有神策諸鎮屯列要地承前不受節度使制置遂致北虜深入公綽上疏論之因詔諸鎮皆稟邠寧節度使制置三年入為刑部尚書京兆人有姑鞭婦致死者府斷以償死公綽議曰尊毆卑非鬬且其子在以妻而戮其母非教也竟減死大和四年復檢校左僕射太原尹北都留守河東節度觀察等使是歲北虜遣梅祿將軍李暢以馬萬匹來市託云入貢所經州府守帥假之禮分嚴其兵備留館則戒卒於外懼其襲奪太原故事出兵迎之暢及界上公綽使牙將祖孝恭單馬勞問待以修好之意暢感義出涕徐驅道中不妄馳獵及至闢牙門令譯引謁宴以常禮及市馬而還不敢侵犯陘北有沙陀部落自九姓六州皆畏避之公綽至鎮召其酋朱耶執宜直抵雲朔塞下治廢柵十一所募兵三千付之留屯塞上以禦匈奴其妻母來太原者請梁國夫人對酒食問遺之沙陀感之深得其効六年以病求代三月授兵部尚書徵還京師四月卒贈太子太保諡曰成公綽天資仁孝初丁母崔夫人之喪三年不沐浴事繼親薛氏三十年姻戚不知公綽非薛氏所生外兄薛宮早卒一女孤配張毅夫資遺甚於己子性端介寡合與錢徽蔣乂杜元穎薛存誠文雅相知交情款密凡六開府幕得人尤盛錢徽掌貢之年鄭朗覆落公綽將赴襄陽首辟之朗竟為名相盧簡辭崔璵夏侯孜韋長李續李拭皆至公卿為吏部侍郎與舅左丞崔從同省人士榮之子仲郢弟公權公諒仲郢字諭蒙元和十三年進士擢第釋褐秘書省校書郎牛僧孺鎮江夏辟為從事仲郢有父風動修禮法僧孺歎曰非積習名教安能及此入為監察御史五年遷侍御史富平縣人李秀才籍在禁軍誣鄉人斫父墓柏射殺之法司以專殺論文宗以中官所庇決杖配流右補闕蔣係上疏論之不省仲郢執奏曰聖王作憲殺人有必死之令聖明在上當官無壞法之臣今秀才犯殺人之科愚臣備監決之任此賊不死是亂典章臣雖至微豈敢曠職其秀才未敢行決望別降敕處分乃詔御史蕭傑監之傑又執奏帝遂詔京兆府行決不用監之然朝廷嘉其守法會昌中三遷吏部郎中李德裕頗知之武宗有詔減冗官吏部條疏欲牒天下州府取額外官員仲郢曰諸州每冬申闕何煩牒耶倖門頓塞仲郢條理旬日減一千二百員時議為愜遷諫議大夫五年淮南奏吳湘獄御史崔元藻覆按得罪仲郢上疏理之人皆危懼德裕知其無私益重之武宗築望仙臺仲郢累疏切諫帝召諭之曰聊因舊趾增葺愧卿忠言德裕奏為京兆尹謝日言曰下官不期太尉恩奬及此仰報厚德敢不如奇章門館德裕不以為嫌時廢浮圖法以銅像鑄錢仲郢為京畿鑄錢使錢工欲於模加新字仲郢止之唯淮南加新字後竟為僧人取之為像設鐘磬紇干臮訴表甥劉詡毆母詡為禁軍小校仲郢不俟奏下杖殺為北司所譖改右散騎常侍權知吏部尚書銓事宣宗即位德裕罷相出仲郢為鄭州刺史周墀自江西移鎮滑臺過鄭觀其境內大理甚奬之俄而墀入輔政遷為河南尹莅事踰月召拜戶部侍郎居無何墀罷知政事同列有疑仲郢與墀善左授祕書監數月復出為河南尹以寬惠為政言事者以為不類京兆之政仲郢曰輦轂之下彈壓為先郡邑之治惠養為本何取類耶大中年轉梓州刺史劍南東川節度使孔目吏邊章簡者以貨交近倖前後廉使無如之何仲郢因事決殺部內肅然不俟行法而自理在鎮五年美績流聞徵為吏部侍郎入朝未謝改兵部侍郎充諸道鹽鐵轉運使大中十二年罷使守刑部尚書咸通初轉兵部加金紫光祿大夫河東男食邑三百戶俄出為興元尹山南西道節度使鳳州刺史盧方乂以輕罪決部民數日而斃其妻列訴又旁引他吏械繫滿獄仲郢召其妻謂之曰刺史科小罪誡人但本非死刑雖未出辜其實病死罰方乂百直繫者皆釋郡人深感之因決贓吏過當以太子賓客分司東都踰年為虢州刺史數月檢校尚書左僕射東都留守盜發先人墓棄官歸華原除華州刺史不拜數月以本官為鄆州刺史天平軍節度觀察等使授節鉞於華原別墅卒於鎮初仲郢自拜諫議後每遷官羣烏大集於昇平里第廷樹戟架皆滿凡五日而散詔下不復集家人以為候唯除天平烏不集仲郢嚴禮法重氣義嘗感李德裕之知大中朝李氏無祿仕者仲郢領鹽鐵時取德裕兄子從質為推官知蘇州院事令以祿利贍南宅令狐綯為宰相頗不悅仲郢與綯書自明其要云任安不去常自愧於昔人吳詠自裁亦何施於今日李太尉受責既久其家已空遂絕蒸嘗誠增痛惻綯深感歎尋與從質正員官仲郢以禮法自持私居未嘗不拱手內齋未嘗不束帶三為大鎮廄無名馬衣不薰香退公布卷不捨晝夜九經三史一鈔魏晉已來南北史再鈔手鈔分門三十卷號柳氏自備又精釋典瑜伽智度大論皆再鈔自餘佛書多手記要義小楷精謹無一字肆筆撰尚書二十四司箴韓愈柳宗元深賞之有文集二十卷子珪璧玭珪字鎮方大中五年登進士第累辟使府早卒璧大中九年登進士第文格高雅嘗為馬嵬詩詩人韓琮李商隱嘉之馬植鎮陳許辟為掌書記又從植汴州李瓚鎮桂管奏為觀察判官軍政不愜璧極言不納拂衣而去桂府尋亂入為右補闕僖宗幸蜀召充翰林學士累遷諫議大夫充職玭應兩經舉釋褐秘書正字又書判拔萃高湜辟為度支推官踰年拜右補闕湜出鎮澤潞奏為節度副使入為殿中侍御史李蔚鎮襄陽辟為掌書記湜再鎮澤潞復為副使入為刑部員外湜為亂將所逐貶高要尉玭三上疏申理湜見疏本歎曰我自辨析亦不及此尋出廣州節度副使明年黃巢陷廣州郡人鄧承勳以小舟載玭脫禍召為起居郎賊陷長安為刃所傷出奔行在歷諫議給事中位至御史大夫玭嘗著書誡其子弟曰夫門地高者可畏不可恃可畏者立身行己一事有墜先訓則罪大於他人雖生可以苟取名位死何以見祖先於地下不可恃者門高則自驕族盛則人之所嫉實藝懿行人未必信纖瑕微累十手爭指矣所以承世冑者修己不得不懇為學不得不堅夫人生世以無能望他人用以無善望他人愛用愛無狀則曰我不遇時時不急賢亦由農夫鹵莽而種而怨天澤之不潤雖欲弗餒其可得乎予幼聞先訓講論家法立身以孝悌為基以恭默為本以畏怯為務以勤儉為法以交結為末事以氣義為凶人肥家以忍順保交以簡敬百行備疑身之未周三緘密慮言之或失廣記如不及求名如儻來去吝與驕庶幾減過莅官則潔己省事而後可以言守法守法而後可以言養人直不近禍廉不沽名廩祿雖微不可易黎甿之膏血榎楚雖用不可恣褊狹之胸襟憂與福不偕潔與富不並比見門家子孫其先正直當官耿介特立不畏強禦及其衰也唯好犯上更無他能如其先遜順處己和柔保身以遠悔尤及其衰也但有暗劣莫知所宗此際幾微非賢不達夫壞名災己辱先喪家其失尤大者五宜深誌之其一自求安逸靡甘澹泊苟利於己不恤人言其二不知儒術不悅古道懵前經而不恥論當世而解頤身既寡知惡人有學其三勝己者厭之佞己者悅之唯樂戲譚莫思古道聞人之善嫉之聞人之惡揚之浸漬頗僻銷刻德義簪裾徒在廝養何殊其四崇好慢遊躭嗜麥曲糵以銜杯為高致以勤事為俗流習之易荒覺已難悔其五急於名宦暱近權要一資半級雖或得之衆怒羣猜鮮有存者茲五不是甚於痤疽痤疽則砭石可瘳五失則巫醫莫及前賢炯戒方冊具存近代覆車聞見相接夫中人已下修辭力學者則躁進患失思展其用審命知退者則業荒文蕪一不足採唯上智則研其慮博其聞堅其習精其業用之則行捨之則藏苟異於斯豈為君子初公綽理家甚嚴子弟克稟誡訓言家法者世稱柳氏云公權字誠懸幼嗜學十二能為辭賦元和初進士擢第釋褐秘書省校書郎李聽鎮夏州辟為掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之久矣即日拜右拾遺充翰林侍書學士遷右補闕司封員外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也歷穆敬文三朝侍書中禁公綽在太原致書于宰相李宗閔云家弟苦心辭藝先朝以侍書見用頗偕工祝心實恥之乞換一散秩乃遷右司郎中累換司封兵部二郎中弘文館學士文宗思之復召侍書遷諫議大夫俄改中書舍人充翰林書詔學士每浴堂召對繼燭見跋語猶未盡不欲取燭宮人以蠟淚揉紙繼之從幸未央宮苑中駐輦謂公權曰我有一喜事邊上衣賜久不及時今年二月給春衣訖公權前奉賀上曰單賀未了卿可賀我以詩宮人迫其口進公權應聲曰去歲雖無戰今年未得歸皇恩何以報春日得春衣上悅激賞久之便殿對六學士上語及漢文恭儉帝舉袂曰此澣濯者三矣學士皆贊詠帝之儉德唯公權無言帝留而問之對曰人主當進賢良退不肖訥諫諍明賞罰服澣濯之衣乃小節耳時周墀同對為之股慄公權辭氣不可奪帝謂之曰極知舍人不合作諫議以卿言事有諍臣風彩却授卿諫議大夫翌日降制以諫議知制誥學士如故開成三年轉工部侍郎充職嘗入對上謂曰近日外議如何公權對曰自郭旼除授邠寧物議頗有臧否帝曰旼是尚父之從子太皇太后之季父在官無過自金吾大將授邠寧小鎮何事議論耶公權曰以旼勳德除鎮攸宜人情論議者言旼進二女入宮致此除拜此信乎帝曰二女入宮參太后非獻也公權曰瓜李之嫌何以戶曉因引王珪諫太宗出廬江王妃故事帝即令南內使張日華送二女還旼公權忠言匡益皆此類也累遷學士承旨武宗即位罷內職授右散騎常侍宰相崔珙用為集賢學士判院事李德裕素待公權厚及為珙奏薦頗不悅左授太子詹事改賓客累遷金紫光祿大夫上柱國河東郡開國公食邑二千戶復為左常侍國子祭酒歷工部尚書咸通初改太子少傅改少師居三品二品班三十年六年卒贈太子太師時年八十八公權初學王書遍閱近代筆法體勢勁媚自成一家當時公卿大臣家碑板不得公權手筆者人以為不孝外夷入貢皆別署貨貝曰此購柳書上都西明寺金剛經碑備有鍾王歐虞褚陸之體尤為得意文宗夏日與學士聯句帝曰人皆苦炎熱我愛夏日長公權續曰薰風自南來殿閣生微涼時丁袁五學士皆屬繼帝獨諷公權兩句曰辭清意足不可多得乃令公權題於殿壁字方圓五寸帝視之歎曰鍾王復生無以加焉大中初轉少師中謝宣宗召昇殿御前書三紙軍容使西門季玄捧硯樞密使崔巨源過筆一紙真書十字曰衞夫人傳筆法於王右軍一紙行書十一字曰永禪師真草千字文得家法一紙草書八字曰謂語助者焉哉乎也賜錦綵瓶盤等銀器仍令自書謝狀勿拘真行帝尤奇惜之公權志耽書學不能治生為勳戚家碑板問遺歲時鉅萬多為主藏豎海鷗龍安所竊別貯酒器杯盂一笥緘縢如故其器皆亡訊海鷗乃曰不測其亡公權哂曰銀杯羽化耳不復更言所寶唯筆硯圖畫自扃鐍之常評硯以青州石末為第一言墨易冷絳州黑硯次之尤精左氏傳國語尚書毛詩莊子每說一義必誦數紙性曉音律不好奏樂常云聞樂令人驕怠故也公綽伯父子華永泰初為嚴武西蜀判官奏為成都令累遷池州刺史入為昭應令知府東十三縣捕賊尋檢校金部郎中修葺華清宮使元載欲用為京兆尹未拜而卒自知死日預為墓誌有知人之明公綽生三日視之謂其弟子溫曰保惜此兒福祚吾兄弟不能及興吾門者此兒也因以起之為公綽字子華二子公器公度公度善攝生年八十餘步履輕便或祈其術曰吾初無術但未嘗以元氣佐喜怒氣海常溫耳位止光祿少卿公器子遵遵子璨璨仕至宰相自有傳崔玄亮字晦叔山東磁州人也玄亮貞元十一年登進士第從事諸侯府性雅淡好道術不樂趨競久遊江湖至元和初因知己薦達入朝再遷監察御史轉侍御史出為密湖曹三郡刺史每一遷秩謙讓輒形於色大和初入為太常少卿四年拜諫議大夫中謝日面賜金紫朝廷推其名望遷右散騎常侍來年宰相宋申錫為鄭注所構獄自內起京師震懼玄亮首率諫官十四人詣延英請對與文宗往復數百言文宗初不省其諫欲置申錫於法玄亮泣奏曰孟軻有言衆人皆曰殺之未可也卿大夫皆曰殺之未可也天下皆曰殺之然後察之方置於法今至聖之代殺一凡庶尚須合於典法況無辜殺一宰相乎臣為陛下惜天下法實不為申錫也言訖俯伏嗚咽文宗為之感悟玄亮由此名重於朝七年以疾求為外任宰相以弘農便其所請乃授檢校左散騎常侍虢州刺史是歲七月卒於郡所中外無不歎惜始玄亮登第弟純亮寅亮相次升進士科藩府辟召而玄亮最達玄亮孫貽孫位至侍郎溫造字簡輿河內人祖景倩南鄭令父輔國太常丞造幼嗜學不喜試吏自負節概少所降志隱居王屋以漁釣逍遙為事壽州刺史張建封聞風致書幣招延造欣然謂所親曰此可人也徙家從之建封動靜咨詢而不敢縻以職任及建封授節彭門造歸下邳有高天下之心建封恐一旦失造乃以兄女妻之時李希烈方悖侵寇藩隣屢陷郡邑天下城鎮恃兵者從而動搖多逐主帥自立留後邀求節鉞德宗患之以范陽劉濟方輸忠款但未能盡達朝廷倚賴之意乃密詔建封選特達識略之士往喻之建封乃強署造節度參謀使于幽州造與語未訖濟俯伏流涕曰濟僻在遐裔不知天子神聖大臣忠藎願得率先諸侯效以死節造還建封以其名上聞德宗愛其才召至京師謂之曰卿誰家子年復幾何造對曰臣五代祖大雅外五代祖李勣臣犬馬之年三十有二德宗奇之欲用為諫官以語泄事寢長慶元年授京兆府司錄參軍奉使河朔稱旨遷殿中侍御史既而幽州劉總請以所部九州聽朝旨穆宗選可使者或薦造帝召而謂之曰朕以劉總輸忠雖書詔便蕃未盡朕之深意以卿素能辦事為朕此行造對曰臣府縣走吏初受憲職望輕事重恐辱國命無能諭旨帝曰我在東宮時聞劉總請覲及我即位比年上書不絕及約以行期即瘖默不報卿識機知變往喻我懷無多讓也乃拜起居舍人賜緋魚袋充太原鎮州幽州宣諭使造初至范陽劉總具櫜鞬郊迎乃宣聖旨示以禍福總俯伏流汗若兵加於頸矣及造使還總遂移家入覲朝廷遂以張弘靖代之及朱克融逐弘靖鎮州殺田弘正朝廷用兵乃先令造銜命河東魏博澤潞橫海深冀易定等道喻以軍期事皆稱旨俄而坐與諫議大夫李景儉史館飲酒景儉醉謁丞相出造為朗州刺史在任開後鄉渠九十七里溉田二千頃郡人獲利乃名為右史渠居四年召拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自夏州入拜金吾違制進馬一百五十匹造正衙彈奏祐股戰汗流祐私謂人曰吾夜踰蔡州城擒吳元濟未嘗心動今日膽落于溫御史吁可畏哉遷左司郎中再知雜事尋拜御史中丞大和二年十一月宮中昭德寺火寺在宣政殿東隔垣火勢將及宰臣兩省京兆尹中尉樞密皆環立於日華門外令神策兵士救之晡後稍息是日唯臺官不到造奏曰昨宮中遺火緣臺有繫囚恐緣為姦追集人吏隄防所以至朝堂在後臣請自罰三十直其兩巡使崔蠡姚合火滅方到請別議責罰敕曰事出非常臺有囚繫官曹警備亦為周慮即合待罪朝堂候取進止量罰自許事涉乖儀溫造姚合崔蠡各罰一月俸料造性剛褊人或激觸不顧貴勢以氣淩藉嘗遇左補闕李虞於街怒其不避捕祗承人決脊十下左拾遺舒元褒等上疏論之曰國朝故事供奉官街中除宰相外無所迴避溫造蔑朝廷典禮淩陛下侍臣恣行胸臆曾無畏忌凡事有小而關分理者不可失也分理一失亂由之生遺補官秩雖卑陛下侍臣也中丞雖高法吏也侍臣見淩是不廣敬法吏壞法何以持繩前時中書舍人李虞仲與造相逢造乃曳去引馬知制誥崔咸與造相逢造又捉其從人當時緣不上聞所以暴犯益甚臣聞元和長慶中中丞行李不過半坊今乃遠至兩坊謂之籠街喝道但以崇高自大不思僭擬之嫌若不糾繩實虧彝典敕曰憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道路相高並列通班合知名分如聞喧競亦已再三既招人言甚損朝體其臺官與供奉官同道聽先後而行道途即祗揖而過其參從人則各隨本官之後少相辟避勿言衝突又聞近日已來應合導從官事力多者街衢之中行李太過自今後傳呼前後不得過三百步然造之舉奏無所吐茹朝廷有喪不以禮配不以類者悉劾之獲偽官王果等九十餘人杖殺南曹吏李賨等六人刑於都市遷尚書右丞加大中大夫封祁縣開國子賜金紫四年興元軍亂殺節度使李絳文宗以造氣豪嫉惡乃授檢校右散騎常侍興元尹山南西道節度使造辭赴鎮以興元兆亂之狀奏之文宗盡悟其根本許以便宜從事帝慮用兵勞費造奏曰臣計諸道征蠻之兵已迴俟臣行程至褒縣望賜臣密詔使受約束比臣及興元諸軍相續而至臣用此足矣乃授造手詔四通神策行營將董重質河中都將溫德彝郃陽都將劉士和等咸令稟造之命造行至褒城會興元都將衞志忠征蠻迴謁見造即留以自衞密與志忠謀又召亞將張丕李少直各諭其旨暨發褒城以八百人為衙隊五百人為前軍入府分守諸門造下車置宴所司供帳於廳事造曰此隘狹不足以饗士卒移之牙門坐定將卒羅拜志忠兵周環之造曰吾欲問新軍去住之意可悉前舊軍無得錯雜勞問既畢傳言令坐有未至者因令舁酒巡行及酒匝未至者皆至牙兵圍之亦合坐卒未悟席上有先覺者揮令起造傳言叱之因帖息不敢動即召坐卒詰以殺絳之狀志忠張丕夾階立拔劍呼曰殺圍兵齊奮其賊首教練使丘鑄等并官健千人皆斬首於地血流四注監軍楊叔元在座遽起求哀擁造靴以請命遣兵衞出之以俟朝旨敕旨配流康州其親刃絳者斬一百斷號令者斬三斷餘並斬首內一百首祭李絳三十首祭王景延趙存約等並投屍於江以功就加檢校禮部尚書五年四月入為兵部侍郎以耳疾求退七月檢校戶部尚書東都留守判東都尚書省事東畿汝防禦使造至洛中九月制改授河陽懷節度觀察等使造以河內膏腴民戶凋瘵奏開浚懷州古秦渠枋口堰役工四萬溉濟源河內溫武陟四縣田五千餘頃七年十一月入為御史大夫造初赴鎮漢中遇大雨平地水深尺餘乃禱雞翁山祈晴俄而疾風驅雲即時開霽文宗嘗聞其事會造入對言之乃詔封雞翁山為侯九年五月轉禮部尚書其年六月病卒時年七十贈右僕射有文集八十卷造於晚年積聚財貨一無散施時頗譏之子璋嗣璋以廕入仕累佐使府歷三郡刺史咸通末為徐泗節度使徐州牙卒曰銀刀軍頗驕橫璋至誅其惡者五百餘人自是軍中畏法入為京兆尹持法太深豪右一皆屏迹會同昌公主薨懿宗怒殺醫官其家屬宗枝下獄者三百人璋上疏切諫以為刑法太深帝怒貶璋振州司馬制出璋歎曰生不逢時死何足惜是夜自縊而卒郭承嘏字復卿曾祖尚父汾陽王祖晞諸衞將軍父鈞承嘏生而秀異乳保之年即好筆硯比及成童能通五經元和四年禮部侍郎張弘靖知其才擢升進士第累辟使幕歷渭南尉入朝為監察御史遷起居舍人丁內艱以孝聞終喪為侍御史職方兵部二員外兵部郎中大和六年拜諫議大夫頻上疏言時政得失文宗以鄭注為太僕卿承嘏論諫激切注甚懼之本官知匭院事九年轉給事中開成元年出為華州刺史兼御史中丞詔下兩省迭詣中書求承嘏出麾之由給事中盧載封還詔書奏曰承嘏自居此官繼有封駁能奉其職宜在瑣闥牧守之才易為推擇文宗謂宰臣曰承嘏久在黃扉欲優其祿俸暫令廉問近關而諫列拜章惜其稱職甚美事也乃復為給事中文宗以淮南諸道累歲大旱租賦不登國用多闕及是以度支戶部分命宰臣鎮之承嘏論之曰宰相者上調陰陽下安黎庶致君堯舜致時清平俾之閱簿書算緡帛非所宜也帝深嘉之遷刑部侍郎時因朔望以刑法官得對文宗從容顧問恩禮甚厚未及大用以二年二月卒承嘏身歿之後家無餘財喪祭所費皆親友共給而後具搢紳之流無不痛惜贈吏部尚書殷侑陳郡人父懌侑為兒童時勵志力學不問家人資產及長通經以講習自娛貞元末以五經登第精於歷代沿革禮元和中累為太常博士時迴紇請和親朝廷計費五百萬緡朝廷方用兵伐叛費用百端欲緩其期乃命宗正少卿李孝誠奉使宣諭以侑為副侑謹重有節概臨事俊辯既至虜庭可汗初待漢使盛陳兵甲欲臣漢使而不答拜侑堅立不動宣諭畢可汗責其倨宣言欲留而不遣行者皆懼侑謂虜使曰可汗是漢家子壻欲坐受使臣拜是可汗失禮非使臣之倨也可汗憚其言卒不敢逼使還拜虞部員外郎王承宗拒命遣侑銜命招諭之承宗尋稟朝旨獻德棣二州遣二子入朝遷侑諫議大夫凡朝廷之得失悉以陳論前後上八十四章以言激切出為桂管觀察使寶曆元年檢校右散騎常侍洪州刺史轉江西觀察使所至以潔廉著稱入為衞尉卿文宗初即位滄州李同捷叛而王廷湊助逆欲加兵鎮州詔五品已上都省集議時上銳於破賊宰臣莫敢異議獨侑以廷湊再亂河朔方徇招懷雖附兇徒未甚彰露宜且含容專討同捷其疏末云伏願以宗社安危為大計以善師攻心為神武以含垢安人為遠圖以網漏吞舟為至誡文宗雖不納深所嘉之滄景平以侑嘗為滄州行軍司馬大和四年加檢校工部尚書滄齊德觀察使時大兵之後滿目荊榛遺骸蔽野寂無人煙侑不以妻子之官始至空城而已侑攻苦食淡與士卒同勞苦周歲之後流民襁負而歸侑上表請借耕牛三萬以給流民乃詔度支賜綾絹五萬匹買牛以給之數年之後戶口滋饒倉廩盈積人皆忘亡初州兵三萬悉取給於度支侑一歲而賦入自贍其半二歲而給用悉周請罷度支給賜而勸課多方民吏胥悅上表請立德政碑以功加檢校吏部尚書侑以郭下清池縣在子城北非便奏移於南郭之內六年入為刑部尚書尋復檢校吏部尚書鄆州刺史兼御史大夫充天平軍節度鄆曹濮觀察等使自元和末收復師道十二州為三鎮朝廷務安反側征賦所入盡留贍軍貫緡尺帛不入王府侑以軍賦有餘賦不上供非法也乃上表起大和七年請歲供兩稅榷酒等錢十五萬貫粟五萬石詔曰鄆曹濮等州元和已來地本殷實自分三道十五餘年雖頒詔書竟未入賦殷侑承兵戈之後當歉旱之餘勤力奉公謹身守法纔及周歲已致阜安而又體國輸忠率先入貢成三軍奉上之志陳一境樂輸之心尋有表章良用嘉歎尋就加檢校右僕射九年御史大夫溫造劾侑不由制旨增監軍俸入賦斂於人上不問以庾承宣代還其年濮州錄事參軍崔元武於五縣人吏率斂及縣官料錢以私馬撎估納官計絹一百二十匹大理寺斷三犯俱發以重者論祇以中私馬為重止令削三任官而刑部覆奏令決杖配流獄未決侑奏曰法官不習法律三犯不同即坐其所重元武所犯皆枉法取受準律枉法十五匹已上絞律疏云即以贓致罪頻犯者並累科據元武所犯令當入處絞刑疏奏元武依刑部奏決六十流賀州乃授侑刑部尚書八月檢校右僕射復為天平軍節度使上以溫造所奏深文故也開成元年復召為刑部尚書時初經李訓之亂上問侑治安之術侑極言委任責成宜在朝之耆德新進小生無宜輕用帝深嘉之賜錦綵三百匹及中謝又令中使就第賜金十斤其年七月檢校左僕射出為襄州刺史山南東道節度使二年三月以病求代以太子賓客分司東都十一月復檢校右僕射出為忠武節度陳許蔡觀察等使三年七月卒于鎮時年七十二贈司空侑以通經入仕觀風撫俗所莅有聲而晚年急於大用稍通權倖物望減於往時子羽羽大和五年登進士第藩府辟召不至通顯子盈孫盈孫乾符末為成都掾駕在西川用為太常博士禮學有祖風光啟二年冬隨駕自成都還三年二月駐蹕鳳翔時宗廟為賊所焚車駕至京告享無所四月盈孫謂宰執曰太廟十一室并祧廟八室及三太后三室因光啟元年十二月二十五日車駕出宮其緣室法物神主本司載行至鄠縣並被盜剽奪皇帝還宮合先製造宰相鄭延昌奏曰太廟大殿二十二間功績至大計料支費不少兼宗廟制度損益重難今未審依元料修奉為復別有商量敕付禮院詳議時博士四人杜用勵在利州崔澄在河中封舜卿在巴南獨盈孫獻議曰太廟制度歷代參詳皆符典經難議損益謹按舊制十一室二十三間十一架垣墉廣袤之度堂室淺深之規階陛等級之差棟宇崇低之則前古所謂奢不能侈儉不能踰者也今以朝廷帑藏方虛費用稍廣須資變禮將務從宜固不可易前聖之規模狹大朝之制度當憑典實別有參詳謹按至德二年以太廟方修新作神主於長安殿安置便行饗告之禮如同宗廟之儀以俟廟成方為遷祔當時議論無所是非竊知今者京城除大內正衙外別無殿宇伏聞先有詔旨且以少府監大廳權充太廟伏緣十一室於五間之中陳設隘狹伏請接續廳之兩頭成十一室薦饗之三太后廟即於監內西南別取屋宇三間且充廟室候太廟修奉畢日別議遷祔敕旨依奏其神主法物樂懸皆盈孫奏重修製知禮者稱為博洽龍紀元年十一月昭宗郊祀圓丘兩中尉楊復恭及兩樞密皆請朝服盈孫上疏曰臣昨赴齋宮見中尉樞密內臣皆具朝服臣尋前代及國朝典令無內官朝服製度伏以皇帝陛下承天御歷聖祚中興祗見宗祧克陳大禮皆稟高祖太宗之成制必循虞夏商周之舊經軒冕服章式遵彝憲若內官要衣朝服令依所守官本品之服事雖無據粗可行之臣忝禮司合具陳奏時中貴皆如宰相大臣朝服故盈孫論之帝雖不從嘉其所守轉祕書少監卒徐晦進士擢第登直言極諫制科授櫟陽尉皆自楊憑所薦及憑得罪貶臨賀尉交親無敢祖送者獨晦送至藍田與憑言別時故相權德輿與憑交分最深知晦之行因謂晦曰今日送臨賀誠為厚矣無乃為累乎晦曰晦自布衣受楊公之眷方茲流播爭忍無言而別如他日相公為姦邪所譖失意於外晦安得與相公輕別德輿嘉其真懇大稱之於朝不數日御史中丞李夷簡請為監察晦白夷簡曰生平不踐公門公何取信而見奬拔夷簡曰聞君送楊臨賀不顧犯難肯負國乎由是知名歷殿中侍御史尚書郎出為晉州刺史入拜中書舍人寶曆元年出為福建觀察使二年入為工部侍郎出為同州刺史兼御史中丞大和四年徵拜兵部侍郎五年為太子賓客分司東都晦性強直不隨世態當官守正唯嗜酒太過晚年喪明乃至沉廢以禮部尚書致仕開成三年三月卒贈兵部尚書史臣曰溫柳二公以文行飾躬砥礪名節當官守法侃侃有大臣之節而竟不登三事位止正卿所以知公輔之量以和為貴漢武帝畏汲黯而相孫弘太宗重魏徵而委玄齡其旨遠也韋崔名士薦賢致主綽有古風殷司空治民斯為循吏而忠規壯節至晚不衰徐郭讜言鬱為佳士如數君者實為令人贊曰柳氏禮法公忠節概搏擊為優彌綸則隘夏卿奬拔晦叔匡將徐郭之議金玉鏘鏘
