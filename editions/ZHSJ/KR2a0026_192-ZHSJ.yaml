body:
  text: 舊唐書卷一百八十六下列傳第一百三十六下酷吏下姚紹之周利貞王旭吉溫王鈞嚴安之盧鉉附羅希奭毛若虛敬羽裴昇畢曜附姚紹之湖州武康人也解褐典儀累拜監察御史中宗朝武三思恃庶人勢駙馬都尉王同皎謀誅之事洩令紹之按問而誅同皎紹之初按問同皎張仲之祖延慶謀衣袖中發調弩射三思伺其便未果宋之遜以其外妹妻延慶曰今日將行何事而以妻為之遜固抑與延慶且洽其心矣之遜子曇密發之乃敕右臺大夫李承嘉與紹之按於新開門內初紹之將直盡其事詔宰相李嶠等對問諸相懼三思威權但僶俛佯不問仲之延慶言曰宰相中有附會三思者嶠與承嘉耳言復說誘紹之其事乃變遂密置人力十餘命引仲之對問至即為紹之所擒塞口反接送獄中紹之還謂仲之曰張三事不諧矣仲之固言三思反狀紹之命棒之而臂折大呼天者六七謂紹之曰反賊臂且折矣命已輸汝當訴爾於天帝因裂衫以束之乃自誣反而遇誅紹之自此神氣自若朝廷側目累遷左臺侍御史奉使江左經汴州辱錄事參軍魏傳弓尋拜監察御史紹之後坐贓樜詔傳弓按之獲贓五千餘貫以聞當坐死韋庶人妹保持之遂黜放為嶺南瓊山尉傳弓初按紹之紹之在揚州色動謂長吏盧萬石曰頃辱傳弓今為所按紹之死矣逃入西京為萬年尉擒之擊折其足因授南陵令員外置開元十三年累轉括州長史同正員不預知州事死周利貞神龍初為侍御史附託權要為桓彥範敬暉等五王嫉之出為嘉州司馬時中書舍人崔湜與桓敬善武三思用事禁中彥範憂之託心腹於湜湜反露其計於三思為三思所中盡流嶺南湜勸盡殺之以絕其歸望三思問誰可使者利貞即湜之表兄因舉為此行利貞至皆鴆殺之因擢為左臺御史中丞先天元年為廣州都督時湜為中書令與僕射劉幽求不叶陷幽求徙于嶺表諷利貞殺之為桂州都督王晙護之逗留獲免無何玄宗正位利貞與薛季昶宋之問同賜死於桂州驛王旭太原祁人也曾祖珪貞觀初為侍中尚永寧公主旭解褐鴻州參軍轉兗州兵曹神龍元年正月張柬之桓彥範等誅張易之昌宗兄弟尊立孝和皇帝其兄昌儀先貶乾封尉旭斬之齎其首赴于東都遷幷州錄事參軍唐隆元年玄宗誅韋庶人等幷州長史周仁軌韋氏之黨有詔誅之旭不覆敕又斬其首馳赴西京開元二年累遷左臺侍御史時光祿少卿盧崇道以崔湜妻父貶於嶺外逃歸匿於東都為讎家所發詔旭究其獄旭欲擅其威權因捕崇道親黨數十人皆極其楚毒然後結成其罪崇道及三子並杖死於都亭驛門生親友皆決杖流貶時得罪多是知名之士四海冤之旭又與御史大夫李傑不叶遞相糾訐傑竟左遷衢州刺史旭既得志擅行威福由是朝廷畏而鄙之五年遷左司郎中常帶侍御史旭為吏嚴苛左右無敢支梧每銜命推劾一見無不輸款者時宋王憲府掾紀希虬兄任劍南縣令被告有贓私旭使至蜀鞫之其妻美旭威逼之因奏決殺縣令納贓數千萬至六年希虬遣奴詐為祗承人受顧在臺事旭累月旭賞之召入宅中委以腹心其奴密記旭受饋遺囑託事乃成數千貫歸謁希虬希虬銜泣見憲以家冤憲憫之執其狀以奏詔付臺司劾之贓私累巨萬貶龍平尉憤恚而死甚為時人之所慶快吉溫天官侍郎頊弟琚之孽子也譎詭能諂事人遊於中貴門愛若親戚性禁害果於推劾天寶初為新豐丞時太子文學薛嶷承恩倖引溫入對玄宗目之而謂嶷曰是一不良漢朕不要也時蕭炅為河南尹河南府有事京臺差溫推詰事連炅堅執不捨賴炅與右相李林甫善抑而免之及溫選炅已為京兆尹一唱萬年尉即就其官人為危之時驃騎高力士常止宿宮禁或時出外第炅必謁焉溫先馳與力士言謔甚洽握手呼行第炅覷之歎伏及他日溫謁炅於府庭遽布心腹曰他日不敢隳國家法今日已後洗心事公炅復與盡歡會林甫與左相李適之駙馬張不叶適之兼兵部尚書兄均為兵部侍郎林甫遣人訐出兵部銓曹主簿事令史六十餘人偽濫事圖覆其官長詔出付京兆府與憲司對問數日竟不究其由炅使溫劾之溫於院中分囚於兩處溫於後廳佯取兩重囚訊之或杖或壓痛苦之聲所不忍聞即云若存性命乞紙盡答令史輩素諳溫各自誣伏罪及溫引問無敢違者晷刻間事輯驗囚無栲訊決罰處常云若遇知己南山白額獸不足縛也會李林甫將起刑獄除不附己者乃引之於門與羅希奭同鍛鍊詔獄五載因中官納其外甥武敬一女為盛王琦妃擢京兆府士曹時林甫專謀不利於東儲以左驍衞兵曹柳勣杜良娣妹壻令溫推之溫追著作郎王曾前右司禦率府倉曹王修己左武衞司戈盧寧左威衞騎曹徐徵同就臺鞫數日而獄成勣等杖死積屍於大理寺六載林甫又以戶部侍郎兼御史中丞楊慎矜違忤其旨御史中丞王鉷與慎矜親而嫉之同構其事云蓄圖讖以己是隋煬帝子孫闚於興復林甫又奏付溫鞫焉慎矜下獄繫之使溫於東京收捕其兄少府少監慎餘弟洛陽令慎名於汝州捕其門客史敬忠敬忠頗有學嘗與朝貴遊蹉跎不進與溫父琚情契甚密溫孩孺時敬忠嘗抱撫之溫令河南丞姚開就擒之鎖其頸布袂蒙面以見溫溫驅之於前不交一言欲及京使典誘之云楊慎矜今款招已成須子一辨若解人意必活忤之必死敬忠迴首曰七郎乞一紙溫佯不與見詞懇乃於桑下令答三紙辯皆符溫旨喜曰丈人莫相怪遂徐下拜及至溫湯始鞫慎矜以敬忠詞為證及再搜其家不得圖讖林甫恐事洩危之乃使御史盧鉉入搜鉉乃袖讖書而入於隱僻中詬而出曰逆賊牢藏祕記今得之矣指於慎矜小妻韓珠團婢見舉家惶懼且行捶擊誰敢忤焉獄乃成慎矜兄弟賜死溫自是威振衣冠不敢偶言溫早以嚴毒聞頻知詔獄忍行枉濫推事未訊問已作奏狀計贓數及被引問便懾懼即隨意而書無敢惜其生者因不加栲擊獄成矣林甫深以溫為能擢戶部郎中常帶御史林甫雖倚以爪牙溫又見安祿山受主恩驃騎高力士居中用事皆附會其間結為兄弟常謂祿山曰李右相雖觀察人事親於三兄必不以兄為宰相溫雖被驅使必不超擢若三兄奏溫為相即奏兄堪大任擠出林甫是兩人必為相矣祿山悅之時祿山承恩無敵驟言溫能玄宗亦忘曩歲之語十載祿山加河東節度因奏溫為河東節度副使幷知節度營田及管內採訪監察留後事其載又加兼鴈門太守仍知安邊郡鑄錢事賜紫金魚袋及丁所生憂祿山又奏起復為本官尋復奏為魏郡太守兼侍御史楊國忠入相素與溫交通追入為御史中丞仍充京畿關內採訪處置使溫於范陽辭祿山令累路館驛作白紬帳以候之又令男慶緒出界送攏馬出驛數十步及至西京朝廷動靜輒報祿山信宿而達十三載正月祿山入朝拜左僕射充閑廏使因奏加溫武部侍郎兼御史中丞充閑廏苑內營田五坊等副使時楊國忠與祿山嫌隙已成溫轉厚於祿山國忠又忌之其冬河東太守韋陟入奏於華清宮陟自謂失職託於溫結歡於祿山廣載河東土物饋於溫又及權貴國忠諷評事吳豸之使鄉人告之召付中書門下對法官鞫之陟伏其狀貶桂嶺尉溫澧陽長史溫判官員錫新興尉明年溫又坐贓七千匹及奪人口馬奸穢事發貶端州高要尉溫至嶺外遷延不進依於張博濟止於始安郡八月遣大理司直蔣沇鞫之溫死於獄中博濟及始安太守羅希奭死於州門初溫之貶斥玄宗在華清宮謂朝臣曰吉溫是酷吏子姪朕被人誑惑用之至此屢勸朕起刑獄以作威福朕不受其言今去矣卿等皆可安枕也初開元九年有王鈞為洛陽尉十八年有嚴安之為河南丞皆性毒虐笞罰人畏其不死皆杖訖不放起須其腫憤徐乃重杖之懊血流地苦楚欲死鈞與安之始眉目喜暢故人吏懾懼溫則售身權貴噬螫衣冠來頗異耳溫九月死始興十一月祿山起兵作亂人謂與溫報讎耳祿山入洛陽城即偽位玄宗幸蜀後祿山求得溫一子纔六七歲授河南府參軍給與財帛初溫之按楊慎矜侍御史盧鉉同其事鉉初為御史作韋堅判官及堅為李林甫所嫉鉉以堅款曲發於林甫冀售其身及按慎矜鉉先與張瑄同臺情旨素厚貴取媚於權臣誣瑄與楊慎矜共解圖讖持之為驢駒拔橛以成其獄又為王鉷閑廏判官鉷緣邢縡事朝堂被推鉉證云大夫將白帖索廏馬五百匹以助逆我不與之鉷死在晷刻鉉忍誣之衆咸怒恨焉及被貶為廬江長史在郡忽見瑄為祟乃云端公何得來乞命不自由鉉須臾而卒羅希奭本杭州人也近家洛陽鴻臚少卿張博濟堂外甥為吏持法深刻天寶初右相李林甫引與吉溫持獄又與希奭姻婭自御史臺主簿再遷殿中侍御史自韋堅皇甫惟明李適之柳勣裴敦復李邕鄔元昌楊慎矜趙奉璋下獄事皆與溫鍛鍊故時稱羅鉗吉網惡其深刻也八載除刑部員外轉郎中十一載李林甫卒出為中部始安二太守仍充當管經略使十四載以張博濟吉溫韋陟韋誡奢李從一員錫等流貶皆於始安希奭或令假攝右相楊國忠奏遣司直蔣沇往按之復令張光奇替為始安太守仍降敕曰前始安郡太守充當管經略使羅希奭幸此資序叨居牧守地列要荒人多竄殛尤加委任冀絕姦訛翻乃嘯結逋逃羣聚不逞應是流貶公然安置或差攝郡縣割剝黎甿或輟借館宇侵擾人吏不唯輕侮典憲實亦隳壞紀綱擢髮數愆豈多其罪可貶海東郡海康尉員外置張博濟往託回邪跡惟憑恃嘗自抵犯又坐親姻前後貶官歲月頗久逗留不赴情狀難容及命按舉仍更潛匿亡命逭刑莫斯為甚並當切害合峻常刑宜於所在各決重杖六十使夫為政之士克守章程負罪之人期於悛革凡厥在位宜各悉心時員錫李從一韋誡奢吉承恩並決杖遣司直宇文審往監之毛若虛絳州太平人也眉毛覆於眼其性殘忍初為蜀川縣尉使司以推勾見任天寶末為武功丞年已六十餘矣肅宗收兩京除監察御史審國用不足上策徵剝財貨有潤於公者日有進奉漸見任用稱旨每推一人未鞫即先收其家資以定贓數不滿望即攤徵鄉里近親峻其威權人皆懼死輸納不差晷刻乾元二年鳳翔府七坊押官先行剽劫州縣不能制因有劫殺事縣尉謝夷甫因衆怒遂搒殺之其妻訴於李輔國輔國奏請御史孫鎣鞫之鎣不能正其事又令中丞崔伯陽三司使雜訊之又不證成其罪因令若虛推之遂歸罪於夷甫伯陽與之言若虛頗不遜伯陽數讓之若虛馳謁告急肅宗曰卿且出對曰臣出即死矣肅宗潛留若虛簾內召伯陽至伯陽頗短若虛上怒叱出之因流貶伯陽同推官十餘人皆於嶺外遠惡處宰相李峴以左右於鎣等亦被貶斥於是若虛威震朝列公卿懾懼矣尋擢為御史中丞上元元年貶賓化尉而死敬羽寶鼎人也父昭道開元初為監察御史羽貌寢而性便僻善候人意旨天寶九載為康成縣尉安思順為朔方節度使引在幕下及肅宗於靈武即大位羽尋擢為監察御史以苛刻徵剝求進及收兩京後轉見委任作大枷有尾榆著即悶絕又臥囚於地以門關輾其腹號為肉餺飥掘地為坑實以棘刺以敗席覆上領囚臨坑訊之必墜其中萬刺攢之又捕逐錢貨不減毛若虛上元中擢為御史中丞太子少傅宗正卿鄭國公李遵為宗子通事舍人李若冰告其贓私詔羽按之羽延遵各危坐於小牀羽小瘦遵豐碩頃間問即倒請垂足羽曰尚書下獄是囚羽禮延坐何得慢耶遵絕倒者數四請問羽徐應之授紙筆書贓數千貫奏之肅宗以勳舊捨之但停宗正卿及嗣薛王珍潛謀不軌詔羽鞫之羽召支黨羅於廷索尾榆枷之布栲訊之具以繞之信宿成獄珍坐死右衞將軍竇如玢試都水使者崔昌等九人並斬太子洗馬趙非熊陳王府長史陳閎楚州司馬張昴左武衞兵曹參軍焦自榮前鳳翔府郿縣主簿李廣文館進士張敻等六人決殺駙馬都尉薛履謙賜自盡左散騎常侍張鎬貶辰州司戶胡人康謙善賈資產億萬計楊國忠為相授安南都護至德中為試鴻臚卿專知山南東路驛人嫉之告其陰通史朝義謙髭鬚長三尺過帶按之兩宿鬢髮皆禿膝踝亦栲碎視之者以為鬼物非人類也乞捨其生以後送狀奏殺之沒其資產羽與毛若虛在臺五六年間臺中囚繫不絕又有裴昇畢曜同為御史皆酷毒人之陷刑當時有毛敬裴畢之稱裴畢尋又流黔中羽寶應元年貶為道州刺史尋有詔殺之羽聞之衣凶服南奔溪洞為吏所擒臨刑袖中執州縣官吏犯贓私狀數紙曰有人通此狀恨不得推究其事主州政者無宜寢也贊曰王德將衰政在姦臣鷹犬搏擊縱之者人遭其毒螫可為悲辛作法為害延濫不仁
