body:
  text: 舊唐書卷八十列傳第三十褚遂良韓瑗來濟上官儀褚遂良散騎常侍亮之子也大業末隨父在隴右薛舉僭號署為通事舍人舉敗歸國授秦州都督府鎧曹參軍貞觀十年自祕書郎遷起居郎遂良博涉文史尤工隸書父友歐陽詢甚重之太宗嘗謂侍中魏徵曰虞世南死後無人可以論書徵曰褚遂良下筆遒勁甚得王逸少體太宗即日召令侍書太宗嘗出御府金帛購求王羲之書迹天下爭齎古書詣闕以獻當時莫能辯其真偽遂良備論所出一無舛誤十五年詔有事太山先幸洛陽有星孛于太微犯郎位遂良言於太宗曰陛下撥亂反正功超前烈將告成東嶽天下幸甚而行至洛陽彗星輒見此或有所未允合者也且漢武優柔數年始行岱禮臣愚伏願詳擇太宗深然之下詔罷封禪之事其年遷諫議大夫兼知起居事太宗嘗問曰卿知起居記錄何事大抵人君得觀之否遂良對曰今之起居古左右史書人君言事且記善惡以為鑒誡庶幾人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必記黃門侍郎劉洎曰設令遂良不記天下亦記之矣太宗以為然時魏王為太宗所愛禮秩如嫡其年太宗問侍臣曰當今國家何事最急中書侍郎岑文本曰傳稱導之以德齊之以禮由斯而言禮義為急遂良進曰當今四方仰德誰敢為非但太子諸王須有定分陛下宜為萬代法以遺子孫太宗曰此言是也朕年將五十已覺衰怠既以長子守器東宮弟及庶子數將五十心常憂慮頗在此耳但自古嫡庶無良佐何嘗不傾敗國家公等為朕搜訪賢德以傅儲宮爰及諸王咸求正士且事人歲久即分義情深非意窺窬多由此作於是限王府官僚不得過四考十七年太宗問遂良曰舜造漆器禹雕其俎當時諫舜禹者十餘人食器之間苦諫何也遂良對曰雕琢害農事纂組傷女工首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必諫其漸及其滿盈無所復諫太宗以為然因曰夫為人君不憂萬姓而事奢淫危亡之機可反掌而待也時皇子年幼者多任都督刺史遂良上疏曰昔兩漢以郡國理人除郡以外分立諸子割土分疆雜用周制皇唐州縣粗依秦法皇子幼年或授刺史陛下豈不以王之骨肉鎮扞四方此之造制道高前烈如臣愚見有小未盡何者刺史郡帥民仰以安得一善人部內蘇息遇一不善合州勞弊是以人君愛恤百姓常為擇賢或稱河潤九里京師蒙福或人興歌詠生為立祠漢宣帝云與我共理者惟良二千石如臣愚見陛下兒子內年齒尚幼未堪臨人者且留京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習自知為人審堪臨州然後遣出臣謹按漢明章和三帝能友愛子弟自茲已降取為準的封立諸王雖各有國土年尚幼小者召留京師訓以禮法垂以恩惠訖三帝世諸王數十百人唯二王稍惡自餘餐和染教皆為善人則前事已驗惟陛下詳察太宗深納之其年太子承乾以罪廢魏王泰入侍太宗面許立為太子因謂侍臣曰昨青雀自投我懷云臣今日始得與陛下為子更生之日也臣唯有一子臣百年之後當為陛下殺之傳國晉王父子之道故當天性我見其如此甚憐之遂良進曰陛下失言伏願審思無令錯誤也安有陛下百年之後魏王執權為天下之主而能殺其愛子傳國於晉王者乎陛下昔立承乾為太子而復寵愛魏王禮數或有踰於承乾者良由嫡庶不分所以至此殷鑒不遠足為龜鏡陛下今日既立魏王伏願陛下別安置晉王始得安全耳太宗涕泗交下曰我不能即日召長孫無忌房玄齡李勣與遂良等定策立晉王為皇太子時頻有飛雉集於宮殿之內太宗問羣臣曰是何祥也對曰昔秦文公時有童子化為雉雌者鳴於陳倉雄者鳴於南陽童子曰得雄者王得雌者霸文公遂以為寶雞後漢光武得雄遂起南陽而有四海陛下舊封秦王故雄雉見於秦地此所以彰表明德也太宗悅曰立身之道不可無學遂良博識深可重也尋授太子賓客時薛延陀遣使請婚太宗許以女妻之納其財聘既而不與遂良上疏曰臣聞信為國本百姓所歸是以文王許枯骨而不違仲尼寧去食而存信延陀曩歲乃一俟斤耳值神兵北指盪平沙塞狼山瀚海萬里蕭條陛下兵加諸外而恩起於內以為餘寇奔波須立酋長璽書鼓纛立為可汗其懷恩光仰天無極而餘方戎狄莫不聞知以共沐和風同飡恩信頃者頻年遣使請婚大國陛下復降鴻私許其姻媾於是報吐蕃告思摩示中國五尺童子人皆知之於是御幸北門受其獻食于時百僚端笏戎夷左袵虔奉觀宴皆承德音口歌手舞樂以終日百官會畢亦各有言咸以為陛下欲得百姓安寧不欲邊境交戰遂不惜一女而妻可汗預在含生所以感德今一朝生進退之意有改悔之心臣為國家惜茲聲聽君子不失色於物不失口於人晉文公圍原命三日糧原不降命去之諜出曰原將降矣軍吏請待之公曰信國之寶也民之庇也得原失信何以庇之陛下慮生意表信在言前今者臨事忽然乖殊所惜尤少所失滋多情既不通方生嫌隙一方所以相畏忌邊境不得無風塵西州朔方能無勞擾彼胡以主被欺而心怨此士以此無信而懷慚不可以訓戎兵不可以勵軍事伏惟陛下以聖德神功廓清四表自君臨天下十有七載以仁恩而結庶類以信義而撫戎夷莫不欣然負之無力其見在之人皆思報厚德其所生胤嗣亦望報陛下子孫今者得一公主配之以成陛下之信有始有卒其唯聖人乎且又龍沙以北部落無算中國擊之終不能盡亦由可比敗芮芮興突厥亡延陀盛時以古人虛外實內懷之以德為惡在夷不在華失信在彼不在此伏惟陛下聖德無涯威靈遠震遂平高昌破吐渾立延陀滅頡利輕刑薄賦庶事無壅菽粟豐賤祥符累臻此則堯舜禹湯不及陛下遠矣伏願旁垂愷悌廣茲含育而常嗔絕域有意遠藩非偃伯興文之道非止戈為武之義臣以庸暗忝居左右敢獻瞽言不勝戰懼時太宗欲親征高麗顧謂侍臣曰高麗莫離支賊殺其王虐用其人夫出師弔伐當乘機便今因其弒虐誅之甚易遂良對曰陛下兵機神算人莫能知昔隋末亂離手平寇亂及北狄侵邊西蕃失禮陛下欲命將擊之羣臣莫不苦諫陛下獨斷進討卒並誅夷海內之人徼外之國畏威懾伏為此舉也今陛下將興師遼東臣意熒惑何者陛下神武不比前代人君兵既渡遼指期克捷萬一差跌無以威示遠方若再發忿兵則安危難測太宗深然之兵部尚書李勣曰近者延陀犯邊陛下必欲追擊此時陛下取魏徵之言遂失機會若如聖策延陀無一人生還可五十年間疆埸無事帝曰誠如卿言由魏徵誤計耳朕不欲以一計不當而尤之後有良算安肯矢謀由是從勣之言經畫渡遼之師遂良以太宗銳意三韓懼其遺悔翌日上疏諫曰臣聞有國家者譬諸身兩京等於心腹四境方乎手足他方絕域若在身外臣近於坐下伏奉口敕布語臣下云自欲伐遼臣數夜思量不達其理高麗王為陛下之所立莫離支輒殺其主陛下討逆收地斯實乘機關東賴陛下德澤久無征戰但命二三勇將發兵四五萬飛石輕梯取如迴掌夫聖人有作必履常規貴能克平兇亂駕馭才傑惟陛下弘兩儀之道扇三五之風提厲人物皆思効命昔侯君集李靖所謂庸夫猶能掃萬里之高昌平千載之突厥皆是陛下發蹤指示聲歸聖明臣旁求史籍訖乎近代為人之主無自伐遼人臣往征則有之矣漢朝則荀彘楊僕魏代則毋丘儉王頎司馬懿猶為人臣慕容真僭號之子皆為其主長驅高麗虜其人民削平城壘陛下立功同於天地美化包於古昔自當超邁於百王豈止俯同於六子陛下昔翦平寇逆大有爪牙年齒未衰猶堪任用匪唯陛下之所使亦何行而不克方今太子新立年實幼少自餘藩屏陛下所知今一旦棄金湯之全渡遼海之外臣忽三思煩愁並集大魚依於巨海神龍據於川泉此謂人君不可輕而遠也且以長遼之左或遇霖淫水潦騰波平地數尺夫帶方玄菟海途深渺非萬乘所宜行踐東京太原謂之中地東撝可以為聲勢西指足以摧延陀其於西京逕路非遠為其節度以設軍謀繫莫離支頸獻皇家之廟此實處安全之上計社稷之根本特乞天慈一垂省察太宗不納十八年拜黃門侍郎參綜朝政高麗莫離支遣使貢白金遂良言於太宗曰莫離支虐弒其主九夷所不容陛下以之興兵將事弔伐為遼山之人報主辱之恥古者討弒君之賊不受其賂昔宋督遺魯君以郜鼎桓公受之於太廟臧哀伯諫曰君人者昭德塞違今滅德立違而置其賂器於太廟百官象之其又何誅焉武王克商遷九鼎於洛邑義士猶或非之而況將昭違亂之賂器置諸太廟其若之何夫春秋之書百王取法若受不臣之筐篚納弒逆之朝貢不以為愆何所致伐臣謂莫離支所獻自不得受太宗納焉以其使屬吏太宗既滅高昌每歲調發千餘人防遏其地遂良上疏曰臣聞古者哲后必先事華夏而後夷狄務廣德化不事遐荒是以周宣薄伐至境而止始皇遠塞中國分離漢武負文景之聚財玩士馬之餘力始通西域初置校尉軍旅連出將三十年復得天馬於宛城採蒲萄於安息而海內虛竭生人失所租及六畜算至舟車因之凶年盜賊並起搜粟都尉桑弘羊復希主意遣士卒遠田輪臺築城以威西域帝翻然追悔情發於中棄輪臺之野下哀痛之詔人神感悅海內乃康向使武帝復用弘羊之言天下生靈皆盡之矣是以光武中興不踰葱嶺孝章即位都護來歸陛下誅滅高昌威加西域收其鯨鯢以為州縣然則王師初發之歲河西供役之年飛芻輓粟十室九空數郡蕭然五年不復陛下歲遣千餘人遠事屯戍終年離別萬里思歸去者資裝自須營辦既賣菽粟傾其機杼經途死亡復在其外兼遣罪人增其防遏彼罪人者生於販肆終朝惰業犯禁違公止能擾於邊城實無益於行陣所遣之內復有逃亡官司捕捉為國生事高昌途路沙磧千里冬風冰冽夏風如焚行人去來遇之多死易云安不忘危理不忘亂設令張掖塵飛酒泉烽舉陛下豈能得高昌一人菽粟而及事乎終須發隴右諸州星馳電擊由斯而言此河西者方於心腹彼高昌者他人手足豈得糜費中華以事無用書曰不作無益害有益其此之謂乎陛下道映先天威行無外平頡利於沙塞滅吐渾於西海突厥餘落為立可汗吐渾遺甿更樹君長復立高昌非無前例此所謂有罪而誅之既伏而立之四海百蠻誰不聞見蠕動懷生畏威慕德宜擇高昌可立者立之徵給首領遣還本國負戴洪恩長為藩翰中國不擾既富且寧傳之子孫以貽永世二十年太宗於寢殿側別置一院令太子居絕不令往東宮遂良復上疏諫曰臣聞周世問安三至必退漢儲視膳五日乃來前賢作法規模弘遠禮曰男子十年出就外傅出宿於外學書計也然則古之達者豈無慈心減茲私愛欲使成立凡人尚猶如此況君之世子乎自當春誦夏絃親近師傅體人間之庶事適君臣之大道使翹足延首皆聆善聲若獻歲之有陽春玄天之有日月弘此懿德乃作元良伏惟陛下道育三才功包九有親樹太子莫不欣欣既云廢昏立明須稱天下瞻望而教成之道實深乖闕不離膝下常居宮內保傅之說無暢經籍之談蔑如且朋友不可以深交深交必有怨父子不可以滯愛滯愛或生愆伏願遠覽殷周近遵漢魏不可頓革事須階漸嘗計旬日半遣還宮專學藝以潤身布芳聲於天下則微臣雖死猶曰生年太宗從之遂良前後諫奏及陳便宜書數十上多見採納其年加銀青光祿大夫二十一年以本官檢校大理卿尋丁父憂解明年起復舊職俄拜中書令二十三年太宗寢疾召遂良及長孫無忌入臥內謂之曰卿等忠烈簡在朕心昔漢武寄霍光劉備託葛亮朕之後事一以委卿太子仁孝卿之所悉必須盡誠輔佐永保宗社又顧謂太子曰無忌遂良在國家之事汝無憂矣仍命遂良草詔高宗即位賜爵河南縣公永徽元年進封郡公尋坐事出為同州刺史三年徵拜吏部尚書同中書門下三品監修國史加光祿大夫其月又兼太子賓客四年代張行成為尚書右僕射依舊知政事六年高宗將廢皇后王氏立昭儀武氏為皇后召太尉長孫無忌司空李勣尚書左僕射于志寧及遂良以籌其事將入遂良謂無忌等曰上意欲廢中宮必議其事遂良今欲陳諫衆意如何無忌曰明公必須極言無忌請繼焉及入高宗難於發言再三顧謂無忌曰莫大之罪絕嗣為甚皇后無胤息昭儀有子今欲立為皇后公等以為何如遂良曰皇后出自名家先朝所娶伏事先帝無愆婦德先帝不豫執陛下手以語臣曰我好兒好婦今將付卿陛下親承德音言猶在耳皇后自此未聞有愆恐不可廢臣今不敢曲從上違先帝之命特願再三思審愚臣上忤聖顏罪合萬死但願不負先朝厚恩何顧性命遂良致笏於殿陛曰還陛下此笏仍解巾叩頭流血帝大怒令引出長孫無忌曰遂良受先朝顧命有罪不加刑翌日帝謂李勣曰冊立武昭儀之事遂良固執不從遂良既是受顧命大臣事若不可當且止也勣對曰此乃陛下家事不合問外人帝乃立昭儀為皇后左遷遂良潭州都督顯慶二年轉桂州都督未幾又貶為愛州刺史明年卒官年六十三遂良卒後二歲餘許敬宗李義府奏言長孫無忌所構逆謀並遂良扇動乃追削官爵子孫配流愛州弘道元年二月高宗遺詔放還本郡神龍元年則天遺制復遂良及韓瑗爵位韓瑗雍州三原人也祖紹隋太僕少卿父仲良武德初為大理少卿受詔與郎楚之等掌定律令仲良言於高祖曰周代之律其屬三千秦法已來約為五百若遠依周制繁紊更多且官吏至公自當奉法苟若徇己豈顧刑名請崇寬簡以允惟新之望高祖然之於是採定開皇律行之時以為便貞觀中位至刑部尚書秦州都督府長史潁州縣公瑗少有節操博學有吏才貞觀中累至兵部侍郎襲父潁川公永徽三年拜黃門侍郎四年與中書侍郎來濟皆同中書門下三品監修國史五年加銀青光祿大夫六年遷侍中其年兼太子賓客時高宗欲廢王皇后瑗涕泣諫曰皇后是陛下在藩府時先帝所娶今無愆過欲行廢黜四海之士誰不惕然且國家屢有廢立非長久之術願陛下為社稷大計無以臣愚不垂採察帝不納明日瑗又諫悲泣不能自勝帝大怒促令引出尋而尚書左僕射褚遂良以忤旨左授潭州都督瑗復上疏理之曰古之聖王立諫鼓設謗木冀欲聞逆耳之言甘苦口之議發揚大化裨益洪猷垂令譽於將來播休聲於不朽者也伏見詔書以褚遂良為潭州都督臣夙夜思之用增感激臣識慚知遠業謝通經載撫愚情誠為未可遂良運偶昇平道昭前烈束髮從宦方淹累稔趨侍陛下俄歷歲年不聞涓滴之愆常覩勤勞之効竭忠誠於早歲罄直道於茲年體國忘家捐身徇物風霜其操鐵石其心誠可重於皇明詎專方於曩昔且先帝納之於帷幄寄之以心膂德逾水石義冠舟車公家之利言無不可及纏悲四海遏密八音竭忠國家親承顧託一德無二千古懍然此不待臣言陛下備知之矣臣嘗有此心未敢聞奏且萬姓失業旰食忘勞一物不安納隍軫慮在於微細寧得過差況社稷之舊臣陛下之賢佐無聞罪狀斥去朝廷內外甿黎咸差舉措觀其近日言事披誠懇切詎肯後陛下之德異於堯舜懼陛下之過塵於史冊而乃深遭厚謗重負醜言可以痛志士之心損陛下之明也臣聞晉武弘裕不貽劉毅之誅漢祖深仁無恚周昌之直而遂良被遷已經寒暑違忤陛下其罰塞焉伏願緬鑒無辜稍寬非罪俯矜微款以順人情疏奏帝謂瑗曰遂良之情朕亦知之矣然其悖戾犯上以此責之朕豈有過卿言何若是之深也瑗曰遂良可謂社稷忠臣臣恐以諛佞之輩蒼蠅點白損陷忠貞昔微子去之而殷國以亡張華不死而綱紀不亂國之欲謝善人其衰今陛下富有四海八紘清泰忽驅逐舊臣而不垂省察乎伏願違彼覆車以收往過垂勸誡於事君則羣生幸甚帝竟不納瑗以言不見用憂憤上表請歸田里詔不許顯慶二年許敬宗李義府希皇后之旨誣奏瑗與褚遂良潛謀不軌以桂州用武之地故授遂良桂州刺史實以為外援於是更貶遂良為愛州刺史左授瑗振州刺史四年卒官年五十四明年長孫無忌死敬宗等又奏瑗與無忌通謀遣使殺之及使至瑗已死更發棺驗屍而還籍沒其家子孫配徙嶺表神龍元年則天遺制令復其官爵來濟揚州江都人隋左翊衞大將軍榮國公護子也宇文化及之難闔門遇害濟幼逢家難流離艱險而篤志好學有文詞善談論尤曉時務舉進士貞觀中累轉通事舍人太子承乾之敗太宗謂侍臣曰欲何以處承乾羣臣莫敢對濟進曰陛下上不失作慈父下得盡天年即為善矣帝納其言俄除考功員外郎十八年初置太子司議郎妙選人望遂以濟為之仍兼崇賢館直學士尋遷中書舍人與令狐德棻等撰晉書永徽二年拜中書侍郎兼弘文館學士監修國史四年同中書門下三品五年加銀青光祿大夫以修國史功封南陽縣男賜物七百段六年遷中書令檢校吏部尚書時高宗欲立昭儀武氏為宸妃濟密表諫曰宸妃古無此號事將不可武皇后既立濟等懼不自安后乃抗表稱濟忠公請加賞慰而心實惡之顯慶元年兼太子賓客進爵為侯中書令如故二年又兼太子詹事尋而許敬宗等奏濟與褚遂良朋黨構扇左授台州刺史五年徙庭州刺史龍朔二年突厥入寇濟總兵拒之謂其衆曰吾嘗挂刑網蒙赦性命當以身塞責特報國恩遂不釋甲冑赴賊沒於陣時年五十三贈楚州刺史給靈輿遞還鄉有文集三十卷行於代濟兄恆有學行與濟齊名上元中官至黃門侍郎同中書門下三品上官儀本陝州陝人也父弘隋江都宮副監因家于江都大業末弘為將軍陳稜所殺儀時幼藏匿獲免因私度為沙門遊情釋典尤精三論兼涉獵經史善屬文貞觀初楊仁恭為都督深禮待之舉進士太宗聞其名召授弘文館直學士累遷祕書郎時太宗雅好屬文每遣儀視草又多令繼和凡有宴集儀嘗預焉俄又預撰晉書成轉起居郎加級賜帛高宗嗣位遷祕書少監龍朔二年加銀青光祿大夫西臺侍郎同東西臺三品兼弘文館學士如故本以詞彩自達工於五言詩好以綺錯婉媚為本儀既貴顯故當時多有效其體者時人謂為上官體儀頗恃才任勢故為當代所嫉麟德元年宦者王伏勝與梁王忠抵罪許敬宗乃構儀與忠通謀遂下獄而死家口籍沒子庭芝歷位周王府屬與儀俱被殺庭芝有女中宗時為昭容每侍帝草制誥以故追贈儀為中書令秦州都督楚國公庭芝黃門侍郎岐州刺史天水郡公仍令以禮改葬史臣曰褚河南上書言事亹亹有經世遠略魏徵王珪之後骨鯁風彩落落負王佐器者殆難其人名臣事業河南有焉昔齊人饋樂而仲尼去戎王溺妓而由余奔婦人之言聖哲懼罹其禍況二佞據衡軸之地為正人之魑魅乎古之志士仁人一言相期死不之悔況於君臣之間受託孤之寄而以利害禍福忘平生之言哉而韓來諸公可謂守死善道求福不回者焉贊曰褚公之言和樂愔愔鍾石在簴動成雅音二猘雙吠三賢一心人皆觀望我不浮沉
