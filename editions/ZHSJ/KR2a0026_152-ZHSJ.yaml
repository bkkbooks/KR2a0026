body:
  text: 舊唐書卷一百四十八列傳第九十八裴李吉甫李藩權德輿子璩裴字弘中河東聞喜人垂拱中宰相居道七代孫弱冠舉進士貞元中制舉賢良極諫對策第一授美原縣尉秩滿藩府交辟皆不就拜監察御史轉殿中侍御史尚書禮部考功二員外郎時吏部侍郎鄭珣瑜請考詞判守正不受請託考覈皆務才實元和初召入翰林為學士轉考功郎中知制誥尋遷中書舍人李吉甫自翰林承旨拜平章事詔將下之夕感出涕謂曰吉甫自尚書郎流落遠地十餘年方歸便入禁署今纔滿歲後進人物罕所接識宰相之職宜選擢賢俊今則懵然莫知能否卿多精鑒今之才傑為我言之取筆疏其名氏得三十餘人數月之內選用略盡當時翕然稱吉甫有得人之稱三年詔舉賢良時有皇甫湜對策其言激切牛僧孺李宗閔亦苦詆時政考官楊於陵韋貫之升三子之策皆上第居中覆視無所同異及為貴倖泣訴請罪於上憲宗不得已出於陵貫之官罷翰林學士除戶部侍郎然憲宗知好直信任彌厚其年秋李吉甫出鎮淮南遂以代為中書侍郎同平章事明年加集賢院大學士監修國史奏集賢御書院請準六典登朝官五品已上為學士六品已下為直學士自非登朝官不問品秩並為校理其餘名目一切勒停史館請登朝官入館者並為修撰非登朝官並為直史館仍永為常式皆從之元和五年中風病憲宗甚嗟惜中使旁午致問至於藥膳進退皆令疏陳疾益痼罷為兵部尚書仍進階銀青明年改太子賓客卒廢朝賻禮有加贈太子少傅初在翰林承旨屬憲宗初平吳蜀勵精思理機密之務一以關小心敬慎甚稱中旨及作相之後懇請旌別淑慝杜絕蹊徑齊整法度考課吏理皆蒙垂意聽納吐突承璀自春宮侍憲宗恩顧莫二承璀承間欲有所關說憲宗憚誡勿復言在禁中常以官呼而不名楊於陵為嶺南節度使與監軍許遂振不和遂振誣奏於陵憲宗令追與慢官曰以遂振故罪一藩臣不可請授吏部侍郎嚴綬在太原其政事一出監軍李輔光綬但拱手而已具奏其事請以李鄘代之王士真死其子承宗以河北故事請代父為帥憲宗意速於太平且頻盪寇孽謂其地可取吐突承璀恃恩謀撓權遂伺君意請自征討盧從史陰苞逆節內與承宗相結約而外請興師以圖厚利一一陳其不可且言武俊有大功於朝前授李師道而後奪承宗是賞罰不一無以沮勸天下逗留半歲憲宗不決承璀之策竟行及師臨賊境從史果攜貳承璀數督戰從史益驕倨反覆官軍病之時王師久暴露無功上意亦怠後從史遣其衙門將王翊元入奏延與語微動其心且喻以為臣之節翊元因吐誠言從史惡稔可圖之狀遣再往比復還遂得其大將烏重胤等要領因從容啟言從史暴戾有無君之心今聞其視承璀如嬰孩往來神策壁壘間益自恃不嚴是天亡之時也若不因其機而致之後雖興師未可以歲月破也憲宗初愕然熟思其計方許之因請密其謀憲宗曰此唯李絳梁守謙知之時絳承旨翰林守謙掌密命後承璀竟擒從史平上黨其年秋班師以承璀首唱用兵今還無功陛下縱念舊勞不能加顯戮亦請貶黜以謝天下遂罷承璀兵柄先是天下百姓輸賦於州府一曰上供二曰送使三曰留州建中初定兩稅時貨重錢輕是後貨輕錢重齊人所出固已倍其初征而其留州送使所在長吏又降省估使就實估以自封殖而重賦於人及為相奏請天下留州送使物一切令依省估其所在觀察使仍以其所蒞之郡租賦自給若不足然後徵於支郡其諸州送使額悉變為上供故江淮稍息肩雖年少驟居相位而器局峻整有法度雖大僚前輩其造請不敢干以私諫官言時政得失舊事操權者多不悅其舉職在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及參謝之際廷語之曰獨孤與李二補闕孜孜獻納今之遷轉可謂酬勞無愧矣嚴補闕官業或異於斯昨者進擬不無疑緩休復悚恧而退在翰林舉李絳崔羣同掌密命及在相位用韋貫之裴度知制誥擢李夷簡為御史中丞其後繼踵入相咸著名跡其餘量材賦職皆叶人望選任之精前後莫及議者謂作相才與時會知無不為于時朝無倖人百度寖理而再周遘疾以至休謝公論惜之李吉甫字弘憲趙郡人父棲筠代宗朝為御史大夫名重於時國史有傳吉甫少好學能屬文年二十七為太常博士該洽多聞尤精國朝故實沿革折衷時多稱之遷屯田員外郎博士如故改駕部員外宰臣李泌竇參推重其才接遇頗厚及陸贄為相出為明州員外長史久之遇赦起為忠州刺史時贄已謫在忠州議者謂吉甫必逞憾於贄重搆其罪及吉甫到部與贄甚歡未嘗以宿嫌介意六年不徙官以疾罷免尋授郴州刺史遷饒州先是州城以頻喪四牧廢而不居物怪變異郡人信驗吉甫至發城門管鑰剪荊榛而居之後人乃安憲宗嗣位徵拜考功郎中知制誥既至闕下旋召入翰林為學士轉中書舍人賜紫憲宗初即位中書小吏滑渙與知樞密中使劉光琦暱善頗竊朝權吉甫請去之劉闢反帝命誅討之計未決吉甫密贊其謀兼請廣徵江淮之師由三峽路入以分蜀寇之力事皆允從由是甚見親信二年春杜黃裳出鎮擢吉甫為中書侍郎平章事吉甫性聰敏詳練物務自員外郎出官留滯江淮十五餘年備詳閭里疾苦及是為相患方鎮貪恣乃上言使屬郡刺史得自為政進羣材甚有美稱三年秋裴均為僕射判度支交結權倖欲求宰相先是制策試直言極諫科其中有譏刺時政忤犯權倖者因此均黨揚言皆執政教指冀以搖動吉甫賴諫官李約獨孤郁李正辭蕭俛密疏陳奏帝意乃解吉甫早歲知奬羊士諤擢為監察御史又司封員外郎呂溫有詞藝吉甫亦眷接之竇羣亦與羊呂善羣初拜御史中丞奏請士諤為侍御史溫為郎中知雜事吉甫怒其不先關白而所請又有超資者持之數日不行因而有隙羣遂伺得日者陳克明出入吉甫家密捕以聞憲宗詰之無姦狀吉甫以裴久在翰林憲宗親信必當大用遂密薦代己因自圖出鎮其年九月拜檢校兵部尚書兼中書侍郎平章事充淮南節度使上御通化門樓餞之在揚州每有朝廷得失軍國利害皆密疏論列又於高郵縣築堤為塘溉田數千頃人受其惠五年冬裴病免明年正月授吉甫金紫光祿大夫中書侍郎平章事集賢殿大學士監修國史上柱國趙國公及再入相請減省職員幷諸色出身胥吏等及量定中外官俸料時以為當京城諸僧有以莊磑免稅者吉甫奏曰錢米所徵素有定額寬緇徒有餘之力配貧下無告之民必不可許憲宗乃止又請歸普潤軍於涇原七年京兆尹元義方奏永昌公主準禮令起祠堂請其制度初貞元中義陽義章二公主咸於墓所造祠堂一百二十間費錢數萬及永昌之制上令義方減舊制之半吉甫奏曰伏以永昌公主稚年夭枉舉代同悲況於聖情固所鍾念然陛下猶減制造之半示折衷之規昭儉訓人實越今古臣以祠堂之設禮典無文德宗皇帝恩出一時事因習俗當時人間不無竊議昔漢章帝時欲為光武原陵明帝顯節陵各起邑屋東平王蒼上疏言其不可東平王即光武之愛子明帝之愛弟賢王之心豈惜費於父兄哉誠以非禮之事人君所當慎也今者依義陽公主起祠堂臣恐不如量置墓戶以充守奉翌日上謂吉甫曰卿昨所奏罷祠堂事深愜朕心朕初疑其冗費緣未知故實是以量減覽卿所陳方知無據然朕不欲破二十戶百姓當揀官戶委之吉甫拜賀上曰卿此豈是難事有關朕身不便於時者苟聞之則改此豈足多耶卿但勤匡正無謂朕不能行也七年七月上御延英顧謂吉甫曰朕近日畋遊悉廢唯喜讀書昨於代宗實錄中見其時綱紀未振朝廷多事亦有所鑒誡向後見卿先人事迹深可嘉歎吉甫降階跪奏曰臣先父伏事代宗盡心盡節迫於流運不待聖時臣之血誠常所追恨陛下耽悅文史聽覽日新見臣先父忠於前朝著在實錄今日特賜褒揚先父雖在九泉如覩白日因俯伏流涕上慰諭之八年十月上御延英殿問時政記記何事時吉甫監修國史先對曰是宰相記天子事以授史官之實錄也古者左史記言今起居舍人是右史記事今起居郎是永徽中宰相姚璹監修國史慮造膝之言或不可聞因請隨奏對而記於仗下以授于史官今時政記是也上曰間或不修何也曰面奉德音未及施行總謂機密故不可書以送史官其間有謀議出於臣下者又不可自書以付史官及已行者制令昭然天下皆得聞知即史官之記不待書以授也且臣觀時政記者姚璹修之於長壽及璹罷而事寢賈耽齊抗修之於貞元及耽抗罷而事廢然則關時政化者不虛美不隱惡謂之良史也是月迴紇部落南過磧取西城柳谷路討吐蕃西城防禦使周懷義表至朝廷大恐以為迴紇聲言討吐蕃意是入寇吉甫奏曰迴紇入寇且當漸絕和事不應便來犯邊但須設備不足為慮因請自夏州至天德復置廢館一十一所以通緩急又請發夏州騎士五百人營於經略故城應援驛使兼護党項九年請於經略故城置宥州六胡州以在靈鹽界開元中廢六州曰國家舊置宥州以寬宥為名領諸降戶天寶末宥州寄理於經略軍蓋以地居其中可以總統蕃部北以應接天德南援夏州今經略遙隸靈武又不置軍鎮非舊制也憲宗從其奏復置宥州詔曰天寶中宥州寄理於經略軍寶應已來因循遂廢由是昆夷屢擾党項靡依蕃部之人撫懷莫及朕方弘遠略思復舊規宜於經略軍置宥州仍為上州於郭下置延恩縣為上縣屬夏綏銀觀察使淮西節度使吳少陽卒其子元濟請襲父位吉甫以為淮西內地不同河朔且四境無黨援國家常宿數十萬兵以為守禦宜因時而取之頗叶上旨始為經度淮西之謀元和九年冬暴病卒年五十七憲宗傷悼久之遣中使臨弔常贈之外內出絹五百匹以恤其家再贈司空吉甫初為相頗洽時情及淮南再徵中外延望風采秉政之後視聽時有所蔽人心疑憚之時負公望者慮為吉甫所忌多避畏憲宗潛知其事未周歲遂擢用李絳大與絳不協而絳性剛訐於上前互有爭論人多直絳然性畏慎雖其不悅者亦無所傷服物食味必極珍美而不殖財產京師一宅之外無他第墅公論以此重之有司諡曰敬憲及會議度支郎中張仲方駁之以為太優憲宗怒貶仲方賜吉甫諡曰忠懿吉甫嘗討論易象異義附於一行集注之下及綴錄東漢魏晉周隋故事訖其成敗損益大端目為六代略凡三十卷分天下諸鎮紀其山川險易故事各寫其圖於篇首為五十四卷號為元和郡國圖又與史官等錄當時戶賦兵籍號為國計簿凡十卷纂六典諸職為百司舉要一卷皆奏上之行於代子德脩德裕李藩字叔翰趙郡人曾祖至遠天后時李昭德薦為天官侍郎不詣昭德謝恩時昭德怒奏黜為壁州刺史祖畬開元時為考功郎中事母孝謹母卒不勝喪死至遠畬皆以志行名重一時父承為湖南觀察使亦有名藩少恬淡修檢雅容儀好學父卒家富於財親族弔者有挈去不禁愈務散施不數年而貧年四十餘未仕讀書揚州困於自給妻子怨尤之晏如也杜亞居守東都以故人子署為從事洛中盜發有誣牙將令狐運者亞信之拷掠竟罪藩知其冤爭之不從遂辭出後獲真盜宋瞿曇藩益知名張建封在徐州辟為從事居幕中謙謙未嘗論細微杜兼為濠州刺史帶使職建封病革兼疾驅到府陰有冀望藩與同列省建封出而泣語兼曰僕射公奄忽如此公宜在州防遏今棄州此來欲何也宜疾去不若此當奏聞兼錯愕不虞遂徑歸建封死兼悔所志不就怨藩甚既歸揚州兼因誣奏藩建封死時搖動軍中德宗大怒密詔杜佑殺之佑素重藩懷詔旬日不忍發因引藩論釋氏曰因報之事信有之否藩曰信然曰審如此君宜遇事無恐因出詔藩覽之無動色曰某與兼信為報也佑曰慎勿出口吾已密論持百口保君矣德宗得佑解怒不釋亟追藩赴闕及召見望其儀形曰此豈作惡事人耶乃釋然除秘書郎王紹持權邀藩一相見即用終不就王仲舒韋成季呂洞輩為郎官朋黨輝赫日會聚歌酒慕藩名強致同會藩不得已一至仲舒輩好為訛語俳戲後召藩堅不去曰吾與仲舒輩終日不曉所與言何也後果敗遷主客員外郎尋換右司時順宗冊廣陵王淳為皇太子兵部尚書王純請改名紹時議非之皆云皇太子亦人臣也東宮之臣改之宜也非其屬而改之諂也如純輩豈為以禮事上耶藩謂人曰歷代故事皆自不識大體之臣而失之因不可復正無足怪也及太子即位憲宗是也宰相改郡縣名以避上名唯監察御史韋淳不改既而有詔以陸淳為給事中改名質淳不得已改名貫之議者嘉之藩尋改吏部員外郎元和初遷吏部郎中掌曹事為吏所蔽濫用官闕黜為著作郎轉國子司業遷給事中制敕有不可遂於黃敕後批之吏曰宜別連白紙藩曰別以白紙是文狀豈曰批敕耶裴言於帝以為有宰相器屬鄭絪罷免遂拜藩門下侍郎同平章事藩性忠藎事無不言上重之以為無隱四年冬顧謂宰臣曰前代帝王理天下或家給人足或國貧下困其故何也藩對曰古人云儉以足用蓋足用繫於儉約誠使人君不貴珠玉唯務耕桑則人無淫巧俗自敦本百姓既足君孰與不足自然帑藏充羨稼穡豐登若人君竭民力貴異物上行下效風俗日奢去本務末衣食益乏則百姓不足君孰與足自然國貧家困盜賊乘隙而作矣今陛下永鑒前古思躋富庶躬尚勤儉自當理平伏願以知之為非艱保之為急務宮室輿馬衣服器玩必務損之又損示人變風則天下幸甚帝曰儉約之事是我誠心貧富之由如卿所說唯當上下相勗以保此道似有踰濫極言箴規此固深期於卿等也藩等拜賀而退帝又問曰禳災祈福之說其事信否藩對曰臣竊觀自古聖達皆不禱祠故楚昭王有疾卜者謂河為祟昭王以河不在楚非所獲罪孔子以為知天道仲尼病子路請禱仲尼以為神道助順繫於所行己既全德無愧屋漏故答子路云丘之禱久矣書云惠迪吉從逆凶言順道則吉從逆則凶詩云自求多福則禍福之來咸應行事若苟為非道則何福可求是以漢文帝每有祭祀使有司敬而不祈其見超然可謂盛德若使神明無知則安能降福必其有知則私己求媚之事君子尚不可悅也況於明神乎由此言之則履信思順自天祐之苟異於此實難致福故堯舜之德唯在修己以安百姓管仲云義於人者和於神蓋以人為神主故但務安人而已虢公求神以致危亡王莽妄祈以速漢兵古今明誡書傳所紀伏望陛下每以漢文孔子之意為準則百福具臻帝深嘉之時河東節度使王鍔用錢數千萬賂遺權倖求兼宰相藩與權德輿在中書有密旨曰王鍔可兼宰相宜即擬來藩遂以筆塗兼相字却奏上云不可德輿失色曰縱不可宜別作奏豈可以筆塗詔耶曰勢迫矣出今日便不可止日又暮何暇別作奏事果寢李吉甫自揚州再入相數日罷藩為詹事後數月上思藩召對復有所論列元和六年出為華州刺史兼御史大夫未行卒年五十八贈戶部尚書藩為相材能不及裴孤峻頗後韋貫之然人物清規亦其流也權德輿字載之天水略陽人父臯字士繇後秦尚書翼之後少以進士補貝州臨清尉安祿山以幽州長史充河北按察使假其才名表為薊縣尉署從事臯陰察祿山有異志畏其猜虐不可以潔退欲潛去又慮禍及老母天寶十四年祿山使臯獻戎俘自京師迴過福昌福昌尉仲臯從父妹壻也密以計約之比至河陽詐以疾亟召至臯示已喑瞪而瞑乃勉哀而哭手自含襲既逸臯而葬其棺人無知者從吏以詔書還臯母初不知聞臯之死慟哭傷行路祿山不疑其詐死許其母歸臯時微服匿跡候母於淇門既得侍其母乃奉母晝夜南去及渡江祿山已反矣由是名聞天下淮南採訪使高適表臯試大理評事充判官屬永王璘亂多劫士大夫以自從臯懼見迫又變名易服以免玄宗在蜀聞而嘉之除監察御史會丁母喪因家洪州時南北隔絕或踰歲不聞詔命有中使奉宣至洪州經時未復過有求取州縣苦之時有王遘為南昌令將執按之因見臯白其事臯不言久之垂涕曰方今何由可致一敕使而遽有此言因掩涕而起遘遽拜謝之浙西節度使顏真卿表臯為行軍司馬詔徵為起居舍人又以疾辭嘗曰本自全吾志豈受此之名耶李季卿為江淮黜陟使奏臯節行改著作郎復不起兩京蹂於胡騎士君子多以家渡江東知名之士如李華柳識兄弟者皆仰臯之德而友善之大曆三年卒於家年四十六元和中諡曰貞孝初臯卒韓洄王定為服朋友之喪李華為其墓表以為分天下善惡一人而已前贈秘書監至是因子德輿為相立家廟至元和十二年復贈太子太保德輿生四歲能屬詩七歲居父喪以孝聞十五為文數百篇編為童蒙集十卷名聲日大韓洄黜陟河南辟為從事試秘書省校書郎貞元初復為江西觀察使李兼判官再遷監察御史府罷杜佑裴冑皆奏請二表同日至京德宗雅聞其名徵為太常博士轉左補闕八年關東大水上疏請降詔恤隱遂命奚陟等四人使裴延齡以巧倖判度支九年自司農少卿除戶部侍郎仍判度支德輿上疏曰臣伏以爵人於朝與衆共之況經費之司安危所繫延齡頃自權判逮今間歲不稱之聲日甚於初羣情衆口諠於朝市不敢悉煩聖聽今謹略舉所聞多云以常賦正額支用未盡者便為剩利以為己功又重破官錢買常平先所收市雜物遂以再給估價用充別貯利錢又云邊上諸軍皆至懸闕自今春已來並不支糧伏以疆埸之事所虞非細誠聖謨前定終事切有司陛下必以延齡孤貞獨立為時所抑醜正有黨結此流言何不以新收剩利徵其本末為分析條奏又擇朝賢信臣與中使一人巡覆邊軍察其資儲有無虛實倘延齡受任已來精心勤力每事省約別收羨餘於正數各有區分邊軍儲蓄實猶可支身自斂怨為國惜費自宜更示優奬以洗羣疑明書厥勞昭示天下如或言者非謬罔上實多豈以邦國重務委之非據臣職在諫曹合採羣議正拜已來今已旬日道路云云無不言此豈京師士庶之衆愚智之多合而為黨共有讎嫉陛下亦宜稍迴聖鑑俯察羣心況臣之事君如子事父今當聖明不諱之代若猶愛身隱情是不忠不孝莫大之罪敢瀝肝血伏待刑書十年遷起居舍人歲中兼知制誥轉駕部員外郎司勳郎中職如舊遷中書舍人是時德宗親覽庶政重難除授凡命於朝多補自御札始德輿知制誥給事有徐岱舍人有高郢居數歲岱卒郢知禮部貢舉獨德輿直禁垣數旬始歸嘗上疏請除兩省官德宗曰非不知卿之勞苦禁掖清切須得如卿者所以久難其人德輿居西掖八年其間獨掌者數歲貞元十七年冬以本官知禮部貢舉來年真拜侍郎凡三歲掌貢士至今號為得人轉戶部侍郎元和初歷兵部吏部侍郎坐郎吏誤用官闕改太子賓客復為兵部侍郎遷太常卿五年冬宰相裴寢疾德輿拜禮部尚書平章事與李藩同作相河中節度王鍔來朝貴倖多譽鍔者上將加平章事李藩堅執以為不可德輿繼奏曰夫平章事非序進而得國朝方鎮帶宰相者蓋有大忠大勳大曆已來又有跋扈難制者不得已而與之今王鍔無大忠勳又非姑息之時欲假此名實恐不可上從之運糧使董溪于臯謨盜用官錢詔流嶺南行至湖外密令中使皆殺之他日德輿上疏曰竊以董溪等當陛下憂山東用兵時領糧料供軍重務聖心委付不比尋常敢負恩私恣其贓犯使之萬死不足塞責弘寬大之典流竄太輕陛下合改正罪名兼責臣等疏略但詔令已下四方聞知不書明刑有此處分竊觀衆情有所未喻伏自陛下臨御已來每事以誠實與天地合德與四時同符萬方之人沐浴皇澤至如于董所犯合正典章明下詔書與衆同棄即人各懼法人各謹身臣誠知其罪不容誅又是已過之事不合論辯上煩聖聰伏以陛下聖德聖姿度越前古頃所下一詔舉一事皆合理本皆順人心伏慮他時更有此比但要有司窮鞫審定罪名或致之極法或使自盡罰一勸百孰不甘心巍巍聖朝事體非細臣每於延英奏對退思陛下求理之言生逢盛明感涕自賀況以愚滯朴訥聖鑒所知伏惟恕臣迂疏察臣丹懇及李吉甫自淮南詔徵未一年上又繼用李絳時上求理方切軍國無大小一付中書吉甫絳議政頗有異同或於上前論事形於言色其有詣於理者德輿亦不能為發明時人以此譏之竟以循默而罷復守本官尋以檢校吏部尚書為東都留守後拜太常卿改刑部尚書先是許孟容蔣乂等奉詔刪定格敕孟容等尋改他官乂獨成三十卷表獻之留中不出德輿請下刑部與侍郎劉伯芻等考定復為三十卷奏上十一年復以檢校吏部尚書出鎮興元十三年八月有疾詔許歸闕道卒年六十贈左僕射諡曰文德輿自貞元至元和三十年間羽儀朝行性直亮寬恕動作語言一無外飾蘊藉風流為時稱嚮於述作特盛六經百氏游泳漸漬其文雅正而弘博王侯將相洎當時名人薨歿以銘紀為請者什八九時人以為宗匠焉尤嗜讀書無寸景暫倦有文集五十卷行於代子璩中書舍人史臣曰裴精鑒默識舉賢任能啟沃帝心弼諧王道如崔羣裴度韋貫之輩咸登將相皆之薦達立言立事知無不為吉甫該洽典經詳練故實仗裴之抽擢致朝倫之式序吉甫知之能別髦彥知吉甫之善任賢良相須而成不忌不克叔翰修身慎行力學承家批制敕有夕郎之風塗御書見宰執之器而乃輕財散施天爵是期偉哉自待之意也德輿孝悌力學髫齔有聞疏延齡恣行巧佞論臯謨不書明刑三十年羽儀朝行實臯之餘慶所鍾此四子者所謂經緯之臣又何慚於王佐矣贊曰二李秉鈞信為名臣甫柔而黨藩俊而純裴公鑒裁朝無屈人權之藻思文質彬彬
