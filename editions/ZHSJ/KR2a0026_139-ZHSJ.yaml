body:
  text: 舊唐書卷一百三十五列傳第八十五盧嵵子元輔白志貞裴延齡韋渠牟李齊運李實韋執誼王叔文王伾附程虉皇甫鎛弟鏞盧嵵字子良故相懷慎之孫父奕天寶末為東臺御史中丞洛城為安祿山所陷奕守司而遇害嵵以門蔭解褐清道率府兵曹朔方節度使僕固懷恩辟為掌書記試大理評事監察御史以病免入補鴻臚丞遷殿中侍御史膳部員外郎出為忠州刺史至荊南謁節度使衞伯玉伯玉不悅嵵移病歸京師歷刑部員外郎金部吏部二郎中嵵貌陋而色如藍人皆鬼視之不恥惡衣糲食人以為能嗣懷慎之清節亦未識其心頗有口辯出為虢州刺史建中初徵為御史中丞時尚父子儀病百官造問皆不屏姬侍及聞嵵至子儀悉令屏去獨隱几以待之嵵去家人問其故子儀曰嵵形陋而心險左右見之必笑若此人得權即吾族無類矣及居糾彈顧問之地論奏稱旨遷御史大夫旬日為門下侍郎同中書門下平章事既居相位忌能妬賢迎吠陰害小不附者必致之於死將起勢立威以久其權楊炎以嵵陋貌無識同處台司心甚不悅為嵵所譖逐於崖州德宗幸奉天崔寧流涕論時事嵵聞惡之譖於德宗言寧與朱泚盟誓故至遲迴寧遂見殺惡顏真卿之直言令奉使李希烈竟歿於賊初京兆尹嚴郢與楊炎有隙嵵乃擢郢為御史大夫以傾炎炎既貶死心又惡郢圖欲去之宰相張鎰忠正有才上所委信嵵頗惡之會朱滔朱泚弟兄不睦有泚判官蔡廷玉者離間滔滔論奏請殺之廷玉既貶殿中侍御史鄭詹遣吏監送廷玉投水而卒嵵因奏曰恐朱泚疑為詔旨請三司按鞫詹又御史所為稟大夫命幷令按郢詹與張鎰善每伺嵵晝眠輒詣鎰嵵知之他日嵵假寢佯熟伺詹果來方與鎰語嵵遽至鎰閣中詹趨避嵵嵵遽言密事鎰曰殿中鄭侍御在此嵵佯愕曰向者所言非他人所宜聞時三司使方按詹郢獄未具而奏殺詹貶郢為驩州刺史鎰尋罷相出鎮鳳翔其陰禍賊物如此李揆舊德慮德宗復用乃遣使西蕃天下無不扼腕痛憤然無敢言者戶部侍郎判度支杜佑甚承恩顧為嵵媒孽貶饒州刺史初上即位擢崔祐甫為相頗用道德寬大以弘上意故建中初政聲藹然海內想望貞觀之理及嵵為相諷上以刑名整齊天下初李希烈請討梁崇義崇義誅而希烈叛盡據淮右襄鄧之郡邑恆州李寶臣死其子惟岳邀節鉞遂與田悅締結以抗王師由是河北河南連兵不息度支使杜佑計諸道用軍月費一百餘萬貫京師帑廩不支數月且得五百萬貫可支半歲則用兵濟矣嵵乃以戶部侍郎趙贊判度支贊亦計無所施乃與其黨太常博士韋都賓等謀行括率以為泉貨所聚在於富商錢出萬貫者留萬貫為業有餘官借以給軍冀得五百萬貫上許之約以罷兵後以公錢還敕既下京兆少尹韋禎督責頗峻長安尉薛萃荷校乘車搜人財貨意其不實即行搒箠人不勝冤痛或有自縊而死者京師囂然如被賊盜都計富戶田宅奴婢等估纔及八十八萬貫又以僦櫃納質積錢貨貯粟麥等一切借四分之一封其櫃窖長安為之罷市百姓相率千萬衆邀宰相於道訴之嵵初雖慰諭後無以遏即疾驅而歸計僦質與借商纔二百萬貫德宗知下民流怨詔皆罷之然宿師在野日須供饋明年六月趙贊又請稅間架算除陌凡屋兩架為一間分為三等上等每間二千中等一千下等五百所由吏秉筆執籌入人第舍而計之凡沒一間杖六十告者賞錢五十貫文除陌法天下公私給與貿易率一貫舊算二十益加算為五十給與物或兩換者約錢為率算之市主人牙子各給印紙人有買賣隨自署記翌日合算之有自貿易不用市牙子者驗其私簿投狀自其有私簿投狀其有隱錢百沒入二千杖六十告者賞錢十千出於其家法既行主人市牙得專其柄率多隱盜公家所入百不得半怨讟之聲囂然滿於天下及十月涇師犯闕亂兵呼於市曰不奪汝商戶僦質矣不稅汝間架除陌矣是時人心愁怨涇師乘間謀亂奉天之奔播職嵵之由故天下無賢不肖視嵵如讎德宗在奉天為朱泚攻圍李懷光自魏縣赴難或謂王翃趙贊曰懷光累歎憤以為宰相謀議乖方度支賦斂煩重京尹刻薄軍糧乘輿播遷三臣之罪也今懷光勳業崇重聖上必開襟布誠詢問得失使其言入豈不殆哉翃贊白於嵵嵵大駭懼從容奏曰懷光勳業宗社是賴臣聞賊徒破膽皆無守心若因其兵威可以一舉破賊今若許其朝覲則必賜宴賜宴則留連使賊得京城則從容完備恐難圖之不如使懷光乘勝進收京城破竹之勢不可失也帝然之乃詔懷光率衆屯便橋克期齊進懷光大怒遂謀異志德宗方悟為嵵所構物議喧騰歸咎於嵵乃貶為新州司馬白志貞恩州司馬趙贊為播州司馬遇赦移吉州長史在貶所謂人曰吾必再入用是日上果用嵵為饒州刺史給事中袁高宿直當草嵵制遂執以謁宰相盧翰劉從一曰嵵作相三年矯誣陰賊排斥忠良朋附者欬唾立至青雲睚眦者顧盼已擠溝壑傲很背德反亂天常播越鑾輿瘡痍天下皆嵵之為也幸免誅戮唯示貶黜尋已稍遷近地更授大郡恐失天下望惟相公執奏之事尚可救翰從一不悅遂改命舍人草制明日詔下袁高執奏曰盧嵵為政極恣兇惡三軍將校願食其肉百辟卿士嫉之若讎諫官趙需裴佶宇文炫盧景亮張薦等上疏曰伏以吉州長史盧嵵外矯儉簡內藏奸邪三年擅權百揆失序惡直醜正亂國殄人天地神祇所知蠻夷華夏同棄伏惟故事皆得上聞自嵵為相要官大臣動踰月不敢奏聞百僚惴惴常懼顛危及京邑傾淪皇輿播越陛下炳然覺悟出棄遐荒制曰忠讜壅於上聞朝野為之側目由是忠良激勸內外歡欣今復用為饒州刺史衆情失望皆謂非宜臣聞君之所以臨萬姓者政也萬姓之所以載君者心也倘加巨奸之寵必失萬姓之心乞迴聖慈遽輟新命疏奏不答諫官又論曰盧嵵蒙蔽天聽隳紊朝典致亂危國職嵵之由可謂公私巨蠹中外棄物自聞再加擢用忠良痛骨士庶寒心臣昨者瀝肝上聞冒死不恐冀迴宸睠用快羣情至今拳拳未奉聖旨物議騰沸行路驚嗟人之無良一至於此伏乞俯從衆望永棄奸臣幸免誅夷足明恩貸特加榮寵恐造禍階臣等忝列諫司今陳狂瞽給事中袁高堅執不下乃改授澧州別駕翌日延英上謂宰臣曰朕欲授嵵一小州刺史可乎李勉對曰陛下授嵵大郡亦可其如兆庶失望何上曰衆人論嵵奸邪朕何不知勉曰盧嵵奸邪天下人皆知唯陛下不知此所以為奸邪也德宗默然良久散騎常侍李泌復對上曰盧嵵之事朕已可袁高所奏如何泌拜而言曰累日外人竊議以陛下同漢之桓靈臣今親承聖旨乃知堯舜之不迨也德宗大悅慰勉之嵵尋卒於澧州子元輔字子望少以清行聞於時進士擢第授崇文館校書郎德宗思嵵不已乃求其後特恩拜左拾遺再遷左司員外郎歷杭常絳三州刺史以課最高徵為吏部郎中遷給事中改刑部侍郎自兵部侍郎出為華州刺史潼關防禦鎮國軍等使復為兵部侍郎元輔自祖至曾以名節著於史冊元輔簡絜貞方綽繼門風歷踐清貫人亦不以父之醜行為累人士歸美大和三年八月卒時年五十六白志貞者太原人本名琇珪出於胥吏事節度使李光弼小心勤恪動多計數光弼深委信之帳中之事與琇珪參決代宗素知之光弼薨後用為司農少卿遷太卿在寺十餘年德宗嘗召見與語引為腹心遂用為神策軍使檢校左散騎常侍兼御史大夫賜名志貞善伺候上意言無不從建中四年李希烈陷汝州命志貞為京城召募使時尚父子儀壻端王傅吳仲孺家財巨萬以國家召募有急懼不自安乃上表請以子弟率奴客從軍德宗嘉之超授五品官由是志貞請令節度觀察團練等使幷嘗為是官者令家出子弟甲馬從軍亦與其男官是時豪家不肖子幸之貧而有知者苦之自是京師人心搖震不保家室時禁軍募致悉委志貞兩軍應赴京師殺傷殆盡都不奏聞皆以京師沽販之徒以填其闕其人皆在市廛及涇師犯闕詔志貞以神策軍拒賊無人至者上無以禦寇乃圖出幸時令狐建以龍武軍四百人從駕至奉天仍以志貞為行在都知兵馬使聞李懷光至恐暴揚其罪乃與盧杞同沮懷光入朝衆議喧沸言致播遷盧嵵志貞之罪也故與嵵同貶遇赦量移閬州別駕貞元二年遷果州刺史宰臣李勉及諫官表疏論列言志貞與盧嵵罪均未宜用固執不許凡旬日方下其詔貞元三年遷潤州刺史兼御史大夫浙西觀察使是年六月卒裴延齡河東人父旭和州刺史延齡乾元末為汜水縣尉遇東都陷賊因寓居鄂州綴緝裴駰所注史記之闕遺自號小裴後華州刺史董晉辟為防禦判官黜陟使薦其能調授太常博士盧嵵為相擢為膳部員外郎集賢院直學士改祠部郎中崔造作相改易度支之務令延齡知東都度支院及韓滉領度支召赴京守本官延齡不待詔命遽入集賢院視事宰相延賞惡其輕率出為昭應令與京兆尹鄭叔則論辨是非攻訐叔則之短時李泌為相厚於叔則中丞竇參恃恩寵惡泌而佑延齡叔則坐貶為永州刺史延齡改著作郎竇參尋作相用為太府少卿轉司農少卿貞元八年班宏卒以延齡守本官權領度支自揣不通殖貨之務乃多設鉤距召度支老吏與謀以求恩顧乃奏云天下每年出入錢物新陳相因常不減六七千萬貫唯有一庫差舛散失莫可知之請於左藏庫中分置別庫欠負耗賸等庫及季庫月庫納諸色錢物上皆從之且欲多張名目以惑上聽其實於錢物更無增加唯虛費簿書人吏耳其年遷戶部侍郎判度支奏請令京兆府以兩稅青苗錢市草百萬圍送苑中宰相陸贄趙憬議以為若市送百萬圍草即一府百姓自冬歷夏般載不了百役供應須悉停罷又妨奪農務請令府縣量市三二萬圍各貯側近處他時要即支用京西有汙池卑濕處時有蘆葦生焉亦不過數畝延齡乃奏曰廏馬冬月合在槽櫪秣飼夏中即須牧放臣近尋訪知長安咸陽兩縣界有陂池數百頃請以為內廏牧馬之地且去京城十數里與苑廏中無別上初信之言於宰相對曰恐必無此上乃差官閱視事皆虛妄延齡既慚且怒又誣奏李充為百姓妄請積年和市物價特敕令折填謂之底折錢嘗因奏對請積年錢帛以實帑藏上曰若為可得錢物延齡奏曰開元天寶中天下戶僅千萬百司公務殷繁官員尚或有闕自兵興已來戶口減耗大半今一官可兼領數司伏請自今已後內外百司官闕未須補置收其闕官祿俸以實帑藏後因對事上謂延齡曰朕所居浴堂院殿一𧸐以年多之故似有損蠹欲換之未能對曰宗廟事至重殿𧸐事至輕況陛下自有本分錢物用之不竭上驚曰本分錢何也對曰此是經義證據愚儒常材不能知陛下正合問臣唯臣知之準禮經天下賦稅當為三分一分充乾豆一分充賓客一分充君之庖廚乾豆者供宗廟也今陛下奉宗廟雖至敬至嚴至豐至厚亦不能一分財物也只如鴻臚禮賓諸國蕃客至於迴紇馬價用一分錢物尚有贏羨甚多況陛下御膳宮廚皆極簡儉所用外分賜百官充俸料飧錢等猶未能盡據此而言庖廚者之餘其數尚多皆陛下本分也用修數十殿亦不合疑慮何況一𧸐上曰經義如此人總不曾言之頷之而已又因計料造神龍寺須長五十尺松木延齡奏曰臣近於同州檢得一谷木可數千條皆長八十尺上曰人言開元天寶中側近求覓長五六十尺木尚未易須於嵐勝州採市如今何為近處便有此木延齡奏曰臣聞賢材珍寶異物皆在處常有但遇聖君即出見今此木生關輔蓋為聖君豈開元天寶合得有也時陸贄秉政上素所禮重每於延英極論其誕妄不可令掌財賦德宗以為排擯待延齡益厚贄上書疏其失曰前歲秋首班宏喪亡特詔延齡繼司邦賦數日之內遽衒功能奏稱勾獲隱欺計錢二十萬貫請貯別庫以為羨餘供御所須永無匱乏陛下欣然信納因謂委任得人既賴盈餘之財稍弘心意之欲興作浸廣宣索漸多延齡務實前言且希睿旨不敢告闕不敢辭難勾獲既是虛言無以應命供辦皆承嚴約苟在及期遂乃搜求市廛豪奪入獻追捕夫匠迫脅就功以敕索為名而不酬其直以和雇為稱而不償其傭都城之中列肆為之晝閉興役之所百工比於幽囚聚詛連郡遮訴盈路持綱者莫敢致詰巡察者莫敢為言時有訐而言之翻謂黨邪醜直天子轂下囂聲沸騰四方觀瞻何所取則蕩心于上斂怨于人欺天陷君遠近危懼此其罪之大者也總制邦用度支是司出納貨財太府攸職凡是太府出納皆稟度支文符太府依符以奉行度支憑案以勘覆互相關鍵用絕姦欺其出納之數則每旬申聞見在之數則每月計奏皆經度支勾覆又有御史監臨旬旬相承月月相繼明若指掌端如貫珠財貨多少無容隱漏延齡務行邪諂公肆誣欺遂奏云左藏庫司多有失落近因檢閱使置簿書乃於糞土之中收得十三萬兩其匹段雜貨又百萬有餘皆是文帳脫遺並同已棄之物今所收獲即是羨餘悉合移入雜庫以供別敕支用者其時特宣進止並依所奏施行太府卿韋少華抗疏上陳殊不引伏確稱每月申奏皆是見在數中請令推尋足驗奸詐兩司既有論執理須詳辨是非陛下縱其妄欺不加按問以在庫之物為收獲之功以常賦之財為羨餘之費罔上無畏示人不慚此又罪之大者也國家府庫出納有常延齡險猾售奸詭譎求媚遂於左藏之內分建六庫之名意在別貯贏餘以奉人主私欲曾不知王者之體天下為家國不足則取之於人人不足則資之於國在國為官物在人為私財何謂贏餘須別收貯是必巧詐以變移官物暴法以刻削私財捨此二途其將安取陛下方務崇信不加檢裁姑務保持曾無詰責延齡謂能蔽惑不復懼思奸威既沮於四方憸態復行於內府由是蹂躪官屬傾倒貨財移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戲夫理天下者以義為本以利為末以人為本以財為末本盛則其末自舉末大則其本必傾自古及今德義立而利用不豐人庶安而財貨不給因以喪邦失位者未之有也故曰不患寡而患不均不患貧而患不安有德必有人有人必有土有土必有財百姓足君孰與不足蓋謂此也自古及今德義不立而利用克宣人庶不安而財貨可保因以興邦固位者未之有也故曰財散則人聚財聚則人散與其有聚斂之臣寧有盜臣無令侵削兆人為天子取怨于下也且陛下初膺寶曆志翦羣兇師旅繁興徵求寖廣榷算侵剝下無聊生是以涇原叛徒乘人怨咨白晝犯闕都邑甿庶恬然不驚反與賊衆相從比肩而入宮殿雖蚩蚩之性靡所不為然亦由德澤未浹而暴令驅之以至於是也于時內府之積尚如丘山竟資兇渠以餌貪卒此則陛下躬覩之矣是乃失人而聚貨夫何利之有焉車駕既幸奉天逆泚旋肆圍逼一壘之內萬乘所屯窘如涸流庶物空匱嘗欲發一健步出覘賊軍其人懇以苦寒為辭跪奏乞一襦袴陛下為之求覓不致竟閔默而遣之又嘗宮壼之中服用有闕聖旨方以戎事為急不忍重煩於人乃剝親王飾帶之金賣以給直是時行從將吏赴難師徒蒼黃奔馳咸未冬服漸屬凝冱且無薪蒸饑凍內攻矢石外迫晝則荷戈奮迅夜則映堞呻吟凌風飈冒霜雪踰四旬而衆無攜貳卒能走強賊全危城者陛下豈有嚴刑重賞使之然耶唯以不厚其身不藏其貨與衆庶同其憂患與士伍共其有無乃能使人捐軀命而扞寇讎餒之不離凍之不憾臨危而不易其守見死而不去其君所謂聖人感人心而天下和平此其効也及乎重圍既解諸路稍通賦稅漸臻貢獻繼至乃於行宮外廡之下別置瓊林大盈之司未賞功勞遽私賄玩甚沮惟新之望頗攜死義之心於是輿誦興譏而軍士始怨矣財聚人散不其然乎旋屬蟊賊內興翠華南狩奉天所積財貨悉復殲於亂軍既遷岷梁日不暇給獨憑大順遂復皇都是知天子者以得人為資以蓄義為富人苟歸附何患蔑資義苟修崇何憂不富豈在貯之內府方為己有哉故藏於天下者天子之富也藏於境內者諸侯之富也藏於囷倉篋櫝者農夫商賈之富也奈何以天子之貴海內之富而猥行諸侯之棄德守農商之鄙業哉陛下若謂厚取可以恢武功則建中之取既無成矣若謂多積可以為己有則建中之積又不在矣若謂徇欲不足傷理化則建中之失傷已甚矣若謂斂怨不足致危亡則建中之亂危亦至矣然而遽能靖滔天之禍成中興之功者良以陛下有側身修勵之志有罪己悔懼之辭罷息誅求敦尚節儉渙發大號與人更新故靈祇感陛下之誠臣庶感陛下之意釋憾迴慮化危為安陛下亦當為宗廟社稷建不拔之永圖為子孫黎元立可久之休業懲前事徇欲之失復日新盛德之言豈宜更縱憸邪復行剋暴事之追悔其可再乎臣又竊慮陛下納彼盜言墮其奸計以為搏噬拏攫怨集有司積聚豐盈利歸君上是又大謬所宜慎思夫人主昏明繫於所任咎繇夔契之道長而虞舜享濬哲之名皇甫棸楀之嬖行而周厲嬰顛覆之禍自古何嘗有小人柄用而災患不及邦國者乎譬猶操兵以刃人天下不委罪於兵而委罪於所操之主畜蠱以殃物天下不歸咎於蠱而歸咎於所畜之家理有必然不可不察臣伏慮陛下以延齡之進獨出宸衷延齡之言多順聖旨今若以罪置辟則似為衆所擠故欲保持用彰堅斷若然陛下與人終始之意則美矣其於改過勿吝去邪勿疑之道或未盡善今希旨自默浸以成風奬之使言猶懼不既若又阻抑誰當貢誠或恐未亮斯言請以一事為證只如延齡兇妄流布寰區上自公卿近臣下迨輿臺賤品喧喧談議億萬為徒能以上言其人有幾陛下誠令親信博採輿詞參較比來所聞足鑒人間情偽臣以卑鄙位當台衡既極崇高又承渥澤豈不知觀時附會足保舊恩隨衆沉浮免貽厚責謝病黜退獲知幾之名黨奸苟容無見嫉之患何急自苦獨當豺狼上違歡情下餌讒口良以內顧庸昧一無所堪夙蒙眷知唯以誠直綢繆帷扆一紀于茲聖慈既以此見容愚臣亦以此自負從陛下歷播遷之危覩陛下致興復之難至今追思猶為心悸所以畏覆車而駭慮懼燬室而悲鳴蓋情激於衷雖欲罷而不能自默也因事陳請雖已頻煩天聽尚高未垂諒察輒申悃款以極愚誠憂深故語煩意懇故詞切以微臣自固之謀則過於陛下慮患之計則忠糜軀奉君所不敢避沽名衒直亦不忍為願迴睿聰為國熟慮社稷是賴豈唯微臣書奏德宗不悅待延齡益厚時鹽鐵轉運使張滂京兆尹李充司農卿李銛以事相關皆證延齡矯妄德宗罷陸贄知政事為太子賓客滂充銛悉罷職左遷十一年春暮上數畋于苑中時久旱人情憂惴延齡遽上疏曰陸贄李充等失權心懷怨望今專大言於衆曰天下炎旱人庶流亡度支多欠闕諸軍糧草以激怒羣情後數日上又幸苑中適會神策軍人訴度支欠廏馬芻草上思延齡言即時迴駕下詔斥逐贄充滂銛等朝廷中外惴恐延齡方謀害在朝正直之士會諫議大夫陽城等伏閤切諫事遂且止贄充等雖已貶黜延齡憾之未已乃掩捕李充腹心吏張忠捶掠楚痛令為之詞云前後隱沒官錢五十餘萬貫米麥稱是其錢物多結託權勢充妻常於犢車中將金寶繒帛遺陸贄妻忠不勝楚毒並依延齡教抑之辭具於款占忠妻母於光順門投匭訴冤詔御史臺推問一宿得其實狀事皆虛乃釋忠延齡又奏京兆府妄破用錢穀請令比部勾覆以比部郎中崔元嘗為陸贄所黜故也及崔元勾覆錢穀又無交涉延齡既銳意以苛刻剝下附上為功每奏對際皆恣騁詭怪虛妄他人莫敢言者延齡言之不疑亦人之所未嘗聞德宗頗知其誕妄但以其敢言無隱且欲訪聞外事故斷意用之延齡恃之謂必得宰相尤好慢罵毀詆朝臣班行為之側目及臥病載度支官物置於私家亦無敢言者貞元十二年卒時年六十九延齡死中外相賀唯德宗悼惜不已冊贈太子少保韋渠牟京兆萬年人六代祖範魏西陽太守後周封郿城公渠牟少慧悟涉覽經史初為道士後為僧興元中韓滉鎮浙西奏授試秘書郎累轉四門博士貞元十二年四月德宗誕日御麟德殿召給事中徐岱兵部郎中趙需禮部郎中許孟容與渠牟及道士萬參成沙門譚延等十二人講論儒道釋三教渠牟枝詞游說捷口水注上謂其講耨有素聽之意動數日轉秘書郎奏詩七十韻旬日遷右補闕內供奉僚列初不有之在延英既對宰相多使中貴人召渠牟於官次同輩始注目矣歲終遷右諫議大夫時延英對秉政賦之臣晝漏率下二三刻為常渠牟奏事率漏下五六刻上笑語款狎往往外聞渠牟形神佻躁無士君子器志向不根道德衆雅知不能以正道開悟上意陸贄免相後上躬親庶政不復委成宰相廟堂備員行文書而已除守宰御史皆帝自選擇然居深宮所狎而取信者裴延齡李齊運王紹李實韋執誼洎渠牟皆權傾相府延齡李實奸欺多端甚傷國體紹無所發明而渠牟名素輕頗張恩勢以招趨嚮者門庭填委茅山處士崔芊徵至闕下鄭隨自山人再至補闕馮伉自醴泉令為給事中皇太子侍讀皆渠牟延薦之上既偏有所聽浮薄率背本衒進不復藏器蘊德皆奔馳請謁刓蹄甘辭以附渠牟居無何遷太府卿賜金紫又轉太常卿貞元十七年卒時年五十三贈刑部尚書仍諡曰忠李齊運者蔣王惲之孫也解褐寧王府東閣祭酒七遷至監察御史江淮都統李峘辟為幕府累轉工部郎中為長安縣令職事修理歷京兆少尹陝府長史建中末改河中尹晉絳慈隰觀察使時李懷光自山東卷甲奔難晝夜倍道比至河中力疲休兵三日齊運傾力犒設軍人皆悅懷光既反驅兵還保河中齊運不能敵棄城而走除為京兆尹兼御史大夫時賊據京城李晟軍東渭橋齊運擾攘之中徵募工役版築城壘飛芻輓粟以應晟收復之際頗有力焉貞元中蝗旱方熾齊運無政術乃以韓洄代之改宗正卿兼御史大夫閑廏宮苑使改檢校禮部尚書兼殿中監尋正拜禮部尚書兼殿中監使如故其後十餘歲宰臣內殿對後齊運常次進貢其計慮以決羣議齊運無學術不知大體但甘言取信而已薦李錡為浙西觀察使受賂數十萬計舉李詞為湖州刺史既而邑人告其贓犯上以齊運故不問而遣之齊運被疾歲餘不能朝請朝廷除授往往降中人就宅咨決末以妾衞氏為正室身為禮部尚書冕服以行其禮人士嗤誚貞元十二年卒時年七十二贈尚書左僕射李實者道王元慶玄孫以蔭入仕六轉至潭州司馬洪州節度使嗣曹王臯辟為判官遷蘄州刺史臯為山南東道節度使復用為節度判官檢校太子賓客員外郎臯卒新帥未至實知留後刻薄軍士衣食軍士怨叛謀殺之實夜縋城而出歸詣京師用為司農少卿加檢校工部尚書司農卿貞元十九年為京兆尹卿及兼官如故尋封嗣道王自為京尹恃寵強愎不顧文法人皆側目二十年春夏旱關中大歉實為政猛暴方務聚斂進奉以固恩顧百姓所訴一不介意因入對德宗問人疾苦實奏曰今年雖旱穀田甚好由是租稅皆不免人窮無告乃徹屋瓦木賣麥苗以供賦斂優人成輔端因戲作語為秦民艱苦之狀云秦地城池二百年何期如此賤田園一頃麥苗伍石米三間堂屋二千錢凡如此語有數十篇實聞之怒言輔端誹謗國政德宗遽令決殺當時言者曰瞽誦箴諫取其詼諧以託諷諫優伶舊事也設謗木採芻蕘本欲達下情存諷議輔端不可加罪德宗亦深悔京師無不切齒以怒實故事府官避臺官實常遇侍御史王播于道實不肯避導從如常播詰其從者實怒奏播為三原令謝之日庭詬之陵轢公卿百執事隨其喜怒誣奏遷逐者相繼朝士畏而惡之又誣奏萬年令李衆貶虔州司馬奏虞部員外郎房啟代衆升黜如其意怙勢之色謷然在眉睫間故事吏部將奏科目奧密朝官不通書問而實身詣選曹迫趙宗儒且以勢恐之前歲權德輿為禮部侍郎實託私薦士不能如意後遂大錄二十人迫德輿曰可依此第之不爾必出外官悔無及也德輿雖不從然頗懼其誣奏二十一年有詔蠲畿內逋租實違詔徵之百姓大困官吏多遭笞罰剝割掊斂聚錢三十萬貫胥吏或犯者即按之有乞丐絲髮固死無者且曰死亦不屈亦杖殺之京師貴賤同苦其暴虐順宗在諒闇逾月實斃人於府者十數遂議逐之乃貶通州長史制出市人皆袖瓦石投其首實知之由月營門自苑西出人人相賀後遇赦量移虢州在道卒韋執誼者京兆人父浼官卑執誼幼聰俊有才進士擢第進制策高等拜右拾遺召入翰林為學士年纔二十餘德宗尤寵異相與唱和歌詩與裴延齡韋渠牟等出入禁中略備顧問德宗載誕日皇太子獻佛像德宗命執誼為畫像贊上令太子賜執誼縑帛以酬之執誼至東宮謝太子卒然無以藉言太子因曰學士知王叔文乎彼偉才也執誼因是與叔文交甚密俄丁母憂服闋起為南宮郎德宗時召入禁中初貞元十九年補闕張正一因上書言事得召見王仲舒韋成季劉伯芻裴茝常仲孺呂洞等以嘗同官相善以正一得召見偕往賀之或告執誼曰正一等上疏論君與王叔文朋黨事執誼信然之因召對奏曰韋成季等朋聚覬望德宗令金吾伺之得其相過從飲食數度於是盡逐成季等六七人當時莫測其由及順宗即位久疾不任朝政王叔文用事乃用執誼為宰相乃自朝議郎吏部郎中騎都尉賜緋魚袋授尚書左丞同平章事仍賜金紫叔文欲專國政故令執誼為宰相於外己自專於內執誼既為叔文引用不敢負情然迫於公議時時立異密令人謝叔文曰不敢負約為異欲共成國家之事故也叔文詬怒遂成仇怨執誼既因之得位亦欲矛盾掩其迹及憲宗受內禪王伾王叔文徒黨並逐尚以執誼是宰相杜黃裳之壻故數月後貶崖州司戶初執誼自卑官常忌諱不欲人言嶺南州縣名為郎官時嘗與同舍詣職方觀圖每至嶺南州執誼遽命去之閉目不視及拜相還所坐堂見北壁有圖不就省七八日試觀之乃崖州圖也以為不祥甚惡之不敢出口及坐叔文之貶果往崖州卒於貶所王叔文者越州山陰人也以棋待詔粗知書好言理道德宗令直東宮太子嘗與侍讀論政道因言宮市之弊太子曰寡人見上當極言之諸生稱贊其美叔文獨無言罷坐太子謂叔文曰向論宮市君獨無言何也叔文曰皇太子之事上也視膳問安之外不合輒預外事陛下在位歲久如小人離間謂殿下收取人情則安能自解太子謝之曰苟無先生安得聞此言由是重之宮中之事倚之裁決每對太子言則曰某可為相某可為將幸異日用之密結當代知名之士而欲僥倖速進者與韋執誼陸質呂溫李景儉韓曄韓泰陳諫柳宗元劉禹錫等十數人定為死交而凌準程虉又因其黨以進藩鎮侯伯亦有陰行賂遺請交者德宗崩已宣遺詔時上寢疾久不復關庶政深居施簾帷閹官李忠言美人牛昭容侍左右百官上議自帷中可其奏王伾常諭上屬意叔文宮中諸黃門稍稍知之其日召自右銀臺門居于翰林為學士叔文與吏部郎中韋執誼相善請用為宰相叔文因王伾伾因李忠言忠言因牛昭容轉相結搆事下翰林叔文定可否宣于中書俾執誼承奏於外與韓泰柳宗元劉禹錫陳諫凌準韓曄唱和曰管曰葛曰伊曰周凡其黨僴然自得謂天下無人叔文賤時每言錢穀為國大本將可以盈縮兵賦可操柄市士叔文初入翰林自蘇州司功為起居郎俄兼充度支鹽鐵副使以杜佑領使其實成於叔文數月轉尚書戶部侍郎領使學士如故內官俱文珍惡其弄權乃削去學士之職制出叔文大駭謂人曰叔文須時至此商量公事若不帶此職無由入內王伾為之論請乃許三五日一入翰林竟削內職叔文始入內廷陰搆密命機形不見因騰口善惡進退之人未窺其本信為奇才及司兩使利柄齒于外朝愚智同曰城狐山鬼必夜號窟居以禍福人亦神而畏之一旦晝出路馳無能必矣叔文在省署不復舉其職事引其黨與竊語謀奪內官兵柄乃以故將范希朝統京西北諸鎮行營兵馬使韓泰副之初中人尚未悟會邊上諸將各以狀辭中尉且言方屬希朝中人始悟兵柄為叔文所奪中尉乃止諸鎮無以兵馬入希朝韓泰已至奉天諸將不至乃還無幾叔文母死前一日叔文置酒饌於翰林院宴諸學士及內官李忠言俱文珍劉光奇等中飲叔文白諸人曰叔文母疾病比來盡心戮力為國家事不避好惡難易者欲以報聖人之重知也若一去此職百謗斯至誰肯助叔文一言者望諸君開懷見察又曰羊士諤非毀叔文欲杖殺之而韋執誼懦而不遂叔文生平不識劉闢乃以韋臯意求領三川闢排門相干欲執叔文手豈非凶人耶叔文已令掃木場將斬之韋執誼苦執不可每念失此兩賊令人不快又自陳判度支已來興利除害以為己功俱文珍隨語折之叔文無以對叔文未欲立皇太子順宗既久疾未平羣臣中外請立太子既而詔下立廣陵王為太子天下皆悅叔文獨有憂色而不敢言其事但吟杜甫題諸葛亮祠堂詩末句云出師未捷身先死長使英雄淚滿襟因歔欷泣下人皆竊笑之皇太子監國貶為渝州司戶明年誅之王伾杭州人始為翰林侍書待詔累遷至正議大夫殿中丞皇太子侍書順宗即位遷左散騎常侍依前翰林待詔伾闒茸不如叔文唯招賄賂無大志貌寢陋吳語素為太子之所褻狎而叔文頗任氣自許粗知書好言事順宗稍敬之不得如伾出入無間叔文入止翰林而伾入至柿林院見李忠言牛昭容等然各有所主伾主往來傳授王叔文主決斷韋執誼為文誥劉禹錫陳諫韓曄韓泰柳宗元房啟凌準等謀議唱和採聽外事而伾與叔文及諸朋黨之門車馬填湊而伾門尤盛珍玩賂遺歲時不絕室中為無門大櫃唯開一竅足以受物以藏金寶其妻或寢臥於上與叔文同貶開州司馬王叔文最所重者李景儉呂溫叔文用事時景儉居喪於東都呂溫使吐蕃留半歲叔文敗方歸陸質為皇太子侍讀尋卒伾叔文既逐詔貶其黨韓曄饒州司馬韓泰虔州司馬陳諫台州司馬柳宗元永州司馬劉禹錫朗州司馬凌準連州司馬程虉郴州司馬韋執誼崖州司馬韓曄宰相滉之族子有俊才依附韋執誼累遷尚書司封郎中叔文敗貶池州刺史尋改饒州司馬量移汀州刺史又轉永州卒陳諫至叔文敗已出為河中少尹自台州司馬量移封州刺史轉通州卒凌準貞元二十年自浙東觀察判官侍御史召入王叔文與準有舊引用為翰林學士轉員外郎坐叔文貶連州準有史學尚古文撰邠志二卷韓泰貞元中累遷至戶部郎中王叔文用為范希朝神策行營節度行軍司馬泰最有籌畫能決陰事深為伾叔文之所重坐貶自虔州司馬量移漳州刺史遷郴州柳宗元劉禹錫自有傳程虉京兆長安人嘗侍父疾鄉里以孝悌稱明經及第釋褐揚州海陵主簿登開元禮科授華州鄭縣尉精於吏職剖判無滯杜確刺同州帥河中皆從為賓佐貞元末擢授監察御史遷虞部員外郎充鹽鐵轉運揚子院留後時王叔文用事由逕放利者皆附之虉亦被引用叔文敗坐貶岳州刺史改郴州司馬元和初鹽鐵使李巽薦虉曉達錢穀請棄瑕錄用擢為侍御史復為揚子留後累檢校兵部郎中淮南等五道兩稅使虉自悔前非厲己竭節江淮錢穀之弊多所鏟革入為太府少卿太卿轉衞尉卿兼御史中丞充鹽鐵轉運副使時淮西用兵國用不足虉使江表以調征賦且諷有土者以饒羨入貢至則不剝下不浚財經費以贏人頗便之由是專領鹽鐵轉運使兼御史大夫十三年九月轉工部侍郎同中書門下平章事領使如故議者以虉起錢穀吏一旦位冠百僚人情大為不可虉自知叨據以謙遜自牧月餘日不敢知印秉筆虉知西北邊軍政不理建議置巡邊使上問誰可使者虉請自行議未決無疾而卒元和十四年四月也贈左僕射諡曰恭虉性廉約歿官第家無餘財人士多之皇甫鎛安定朝那人祖鄰幾汝州刺史父愉常州刺史鎛貞元初登進士第登賢良文學制科授監察御史丁母憂免喪坐居喪時薄游除詹事府司直轉吏部員外郎判南曹凡三年頗鈐制奸吏改吏部郎中三遷司農卿兼御史中丞賜金紫判度支俄拜戶部侍郎時方討淮西切於饋運鎛勾剝嚴急儲供辦集益承寵遇加兼御史大夫十三年與鹽鐵使程虉同日以本官同平章事領使如故鎛雖有吏才素無公望特以聚斂媚上刻削希恩詔書既下物情駭異至於賈販無識亦相嗤誚宰相崔羣裴度以物議上聞憲宗怒而不聽度上疏乞罷知政事因論之曰臣日昨於延英陳乞伏奉聖旨未遂愚衷竊以上古明王聖帝致理興化雖由元首亦在股肱所以述堯舜之道則言稷契臯夔紀太宗玄宗之德則言房杜姚宋自古至今未有不任輔弼而能獨理天下者況今天下異於十年已前方驅駕文武廓清寇亂建昇平之業十已得八九然華夏安否繫於朝廷朝廷輕重在於宰相如臣駑鈍夙夜戰兢常以為上有聖君下無賢臣不能增日月之明廣天地之德遂使每事皆勞聖心所以平賊安人費力如此實由臣輩不稱所職方期陛下博採物議旁求人望致之輔弼責之化成而乃忽取微人列於重地始則殿庭班列相與驚駭次則街衢市肆相與笑呼伏計遠近流聞與京師無異何者天子如堂宰臣如陛陛高則堂高陛卑則堂不得高矣宰臣失人則天子不得尊矣伏以陛下叡哲文明唯天所授凡所閱視洞達無遺所以比來選任宰相縱道不周物才不濟時公望所歸皆有可取況皇甫鎛自掌財賦唯事割剝以苛為察以刻為明自京北京西城鎮及百司幷遠近州府應是仰給度支之處無不苦口切齒願食其肉猶賴臣等每加勸誡或為奏論庶事之中抑令通濟比者淮西諸軍糧料所破五成錢其實只與一成兩成士卒怨怒皆欲離叛臣到行營方且慰喻直其遷延不進供軍漸難俱能前行必有優賞以此約定然後切勒供軍官且支九月一日兩成已上錢俱容努力方將小安不然必有潰散今舊兵悉向淄青討伐忽聞此人入相則必相與驚擾以為更有前時之事則無告訴之憂雖侵刻不少然漏落亦多所以罷兵之後經費錢數一千三十萬貫此事猶可直以性惟狡詐言不誠實朝三暮四天下共知惟能上惑聖聰足見奸邪之極程虉雖人品凡俗然心事和平處之煩劇或亦得力但升之相位便在公卿之上實亦非宜如皇甫鎛天下之人怨入骨髓陛下今日收為股肱列在台鼎切恐不可伏惟圖之倘陛下納臣懇款速賜移易以副天下之望則天下幸甚伏聞李翛疾病亦求入來如浙西觀察使且與亦得臣知一言出口必犯天威但使言行甘心獲戾今者臣若不退天下之人謂臣有負恩寵今退既未言又不聽如火燒心若箭攢體臣自無足惜惜陛下今日事勢何者淮西盪定河北咸寧承宗斂手削地程權束身赴闕韓弘輿疾討賊此豈京師氣力能制其命祇是朝廷處置能服其心今既開中興再造區夏陛下何忍却自破除使億萬之衆離心四方諸侯解體凡百君子皆欲慟哭況陛下任臣之意豈比常人臣事陛下之心敢同衆士所以昧死重封以聞如不足觀臣當引領受責陛下引一市肆商徒與臣同列在臣亦有何損陛下實有所傷不勝憤懣惶恐之至時憲宗以世道漸平欲肆意娛樂池臺館宇稍增崇飾而虉鎛探知上旨數貢羨餘以備經構故帝獨排物議相之見裴度疏以為朋黨竟不省覽鎛知公議不可益以巧媚自固奏減內外官俸錢以贍國用敕下給事中崔祐封還詔書其事方罷時內出積年庫物付度支估價例皆陳朽鎛盡以善價買之以給邊軍羅縠繒綵觸風斷裂隨手散壞軍士怨怒皆聚而焚之裴度奏事因言邊軍焚賜之意鎛因引其足奏曰此靴乃內庫出者臣以俸錢二千買之堅韌可以久服所言不可用皆詐也帝以為然由是鎛益無忌憚裴度有用兵伐叛之功鎛心嫉之與宰相李逢吉令狐楚合勢擠度出鎮太原崔羣有公望為搢紳所重屢言時政之弊鎛惡之因議憲宗尊號乃奏曰昨羣臣議上徽號崔羣於陛下惜孝德兩字憲宗怒黜羣為湖南觀察使又與金吾將軍李道古叶為奸謀薦引方士柳泌僧大通言可致長生中尉吐突承璀恩寵莫二鎛厚賂結其歡心故及相位穆宗在東宮備聞鎛之奸邪及居諒闇聽政之日詔皇甫鎛器本凡近性惟險狹行靡所顧文無可觀雖早踐朝倫而素乖公望自掌邦計屬當軍興以剝下為徇公既鼓衆怒以矯迹為孤立用塞人言洎塵台司益𢀿時政不知經國之大體不慮安邊之遠圖三軍多凍餒之憂百姓深凋瘵之弊事皆罔蔽言悉虛誣遠近咸知朝野同怨而又恣求方士上惑先朝潛通奸人罪在難捨合加竄殛以正刑章俾黜遐荒尚存寬典又詔曰山人柳泌輒懷左道上惑先朝固求牧人貴欲疑衆自知虛誕仍便奔逃僧大通醫方不精藥術皆妄既延禍釁俱是奸邪邦國固有常刑人神所宜共棄宜付京兆府決重杖一頓處死柳泌本曰楊仁力少習醫術言多誕妄李道古奸回巧宦與泌密謀求進言之於皇甫鎛因徵入禁中自云能致靈藥言天台山多靈草羣仙所會臣嘗知之而力不能致願為天台長吏因以求之起徒步為台州刺史仍賜金紫諫官論奏曰列聖亦有好方士者亦與官號未嘗令賦政臨民憲宗曰煩一郡之力而致神仙長年臣子於君父何愛焉由是莫敢有言者裴潾以極言被黜泌到天台驅役吏民於山谷間聲言採藥鞭笞躁急歲餘一無所得懼詐發獲罪舉家入山谷浙東觀察使追捕送於京師鎛與李道古懇保證之必能可致靈藥乃待詔翰林院憲宗服泌藥日益煩躁喜怒不常內官懼非罪見戮遂為弒逆大通自云壽一百五十歲久得藥力又有田佐元者鳳翔虢人自言有奇術能變瓦礫為金白衣授虢縣令初柳泌繫京兆府獄吏叱之曰何苦作此虛矯泌曰吾本無此心是李道古教我且云壽四百歲府吏防虞周密恐其隱化及解衣就誅一無變異但灸灼之瘢痕浹身而已鎛卒於貶所鎛弟鏞端士也亦進士擢第累歷宣歙鳳翔使府從事入為殿中侍御史轉比部員外郎河南縣令都官郎中河南少尹時鎛為宰相領度支恩寵殊異鏞惡其太盛每弟兄讌語即極言之鎛頗不悅乃求為分司除右庶子及鎛獲罪朝廷素知鏞有先見之明不之罪徵為國子祭酒改太子賓客秘書監開成初除太子少保分司卒年四十九鏞能文尤工詩什樂道自怡不屑世務當時名士皆與之交有集十八卷著性言十四篇史臣曰奸邪害正自古有之而矯誕無忌妬賢傷善未有如延齡皇甫之甚也臣每讀陸丞相論延齡疏未嘗不泣下霑衿其守正効忠為宗社大計非端士益友安能感激犯難如此異哉德宗之為人主也忠良不用讒慝是崇乃至身播國屯幾將覆滅尚獨保延齡之是不悟盧嵵之非悲夫執誼叔文乘時多僻而欲斡運六合斟酌萬幾劉柳諸生逐臭市利何狂妄之甚也章武雄材睿斷翦削厲階洎逐羣度而相虉鎛蓋季年之妖惑也夫何言哉贊曰貞元之風好佞惡忠齡鎛害善為國𢀿蟲裴陸獻替嫉惡如風天聽匪諶吾道斯窮
