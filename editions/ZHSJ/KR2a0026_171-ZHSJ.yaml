body:
  text: 舊唐書卷一百六十七列傳第一百一十七趙宗儒竇易直李逢吉段文昌子成式宋申錫李程趙宗儒字秉文八代祖彤仕後魏為征南將軍父驊為秘書少監宗儒舉進士初授弘文館校書郎滿歲又以書判入高等補陸渾主簿數月徵拜右拾遺充翰林學士時父驊祕書少監與父並命出於一日當時榮之建中四年轉屯田員外郎內職如故居父憂免喪授司門司勳二員外郎貞元六年領考功事定百吏考績黜陟公當無所畏避右司郎中獨孤良器殿中侍御史杜倫各以過黜之尚書左丞裴郁御史中丞盧紹比皆考中上宗儒貶之中中又祕書少監鄭雲逵考其同官孫昌裔入上下宗儒復入中上凡考之中上者不過五十人餘多減入中中德宗聞而善之遷考功郎中丁母憂終喪授吏部郎中十一年遷給事中十二年與諫議大夫崔損同日以本官同中書門下平章事俱賜紫金魚袋十四年罷相為右庶子宗儒端居守道勤奉朝請而已德宗聞而嘉之二十年遷吏部侍郎召見勞之曰知卿閉關六年故有此拜曩者與先臣並命尚念之耶宗儒因俯伏流涕德宗崩順宗命為德宗哀冊文辭頗悽惋元和初檢校禮部尚書判東都尚書省事兼御史大夫充東都留守畿汝都防禦使入為禮部戶部二尚書尋檢校吏部尚書守江陵尹兼御史大夫荊南節度營田觀察等使散冗食之戍二千人六年又入為刑部尚書八年轉檢校吏部尚書興元尹兼御史大夫充山南西道節度觀察等使九年召拜御史大夫俄遷檢校右僕射河中尹兼御史大夫晉絳慈隰節度觀察等使赴鎮後擅用供軍錢八千餘貫坐罰一月俸十一年七月入為兵部尚書九月改太子少傅權知吏部尚書銓事十四年九月拜吏部尚書穆宗即位以初釋服令尚書省官試先朝所徵集應制舉人宗儒奏曰準今月十五日敕比者先朝徵集應制人等已及時限恐皆來自遠方難於久住酌宜審事遂委有司定日就試如聞所集之人多已分散須知審的然後裁定宜令所司商量聞奏者伏以制科所設本在親臨南省試人亦非舊典今覃恩既畢庶政惟新況山陵日近公務繁迫待問之士就試非多臣等商量恐須權罷從之復拜太子少傅判太常卿事長慶元年二月檢校右僕射守太常卿太常有師子樂備五方之色非會朝聘享不作幼君荒誕伶官縱肆中人掌教坊者移牒取之宗儒不敢違以狀白宰相宰相以為事在有司執守不合關白以宗儒怯不任事改太子少師寶曆元年遷太子太保昭愍晏駕為大明宮留守大和四年拜檢校司空兼太子太傅文宗召見諮以理道對曰堯舜之化慈儉而已願陛下守而勿失文宗嘉納之五年宋申錫被誣上召師保已下議其刑上以宗儒高年宣令不拜尋拜疏請老六年詔以司空致仕是歲九月卒年八十七廢朝冊贈司徒宗儒以文學進前後三鎮方任八領選部略於儀矩切於治生時論以此少之竇易直字宗玄京兆人祖元昌彭州九隴縣令父彧廬州刺史易直舉明經為祕書省校書郎再以判入等授藍田尉累歷右司兵部吏部三郎中元和六年遷御史中丞謝日賜緋魚袋八年改給事中九月出為陝虢都防禦觀察使仍賜紫入為京兆尹萬年尉韓晤姦贓事發易直令曹官韋正晤訊之得贓三十萬上意其未盡詔重鞫坐贓三百萬貶易直金州刺史正晤長流昭州十三年六月遷宣州刺史宣歙池都團練觀察等使長慶二年七月汴州將李逐其帥李愿易直聞之欲出官物以賞軍或謂易直曰賞給無名却恐生患乃已軍士已聞之時江淮旱水淺轉運司錢帛委積不能漕州將王國清指以為賞激諷州兵謀亂先事有告者乃收國清下獄其黨數千大呼入獄中篡取國清而出之因欲大剽易直登樓謂將吏曰能誅為亂者每獲一人賞十萬衆喜倒戈擊亂黨並擒之國清等三百餘人皆斬之九月以李德裕代還為吏部侍郎十一月改戶部兼御史大夫判度支四年五月以本官同平章事判使如故改門下侍郎封晉陽郡公寶曆元年七月罷判度支大和二年十月罷相檢校左僕射平章事襄州刺史山南東道節度使五年入為左僕射判太常卿事十一月檢校司空鳳翔尹鳳翔隴節度使六年以疾求還京師七年四月卒贈司徒諡曰恭惠易直自入仕十年餘常居散秩不應請辟及居方任亦以公廉聞在相位未嘗論用親黨凡於公舉即無所避然元和中吏部尚書鄭餘慶議僕射上日儀制不與隔品官亢禮易直時為御史中丞奏駁餘慶所議及易直為左僕射却行隔品致敬之禮時論非之李逢吉字虛舟隴西人貞觀中學士李玄道曾孫祖顏父歸期逢吉登進士第釋褐授振武節度掌書記入朝為左拾遺左補闕改侍御史充入吐蕃冊命副使工部員外郎又充入南詔副使元和四年使還拜祠部郎中轉右司六年遷給事中七年與司勳員外郎李巨並為太子諸王侍讀九年改中書舍人十一年二月權知禮部貢舉騎都尉賜緋四月加朝議大夫門下侍郎同平章事賜金紫其貢院事仍委禮部尚書王播署牓逢吉天與姦回妬賢傷善時用兵討淮蔡憲宗以兵機委裴度逢吉慮其成功密沮之由是相惡及度親征學士令狐楚為度制辭言不合旨楚與逢吉相善帝皆黜之罷楚學士罷逢吉政事出為劍南東川節度使檢校兵部尚書穆宗即位移襄州刺史山南東道節度使逢吉於帝有侍讀之恩遣人密結倖臣求還京師長慶二年三月召為兵部尚書時裴度亦自太原入朝以度招懷河朔功復留度與工部侍郎元稹相次拜平章事度在太原時嘗上表論稹姦邪及同居相位逢吉以為勢必相傾乃遣人告和王傅于方結客欲為元稹刺裴度及捕于方鞫之無狀稹度俱罷相位逢吉代度為門下侍郎平章事自是寖以恩澤結朝臣之不逞者造作謗言百端中傷裴度賴學士李紳韋處厚等顯於上前言度為逢吉排斥而度於國有功不宜擯棄故得以僕射在朝時已失河朔而王智興擅據徐州李據汴州國威不振天下延頸俟度再秉國鈞以攘暴亂及為逢吉嫁禍奪其權四海為之側目朝士上疏論列者十餘人屬時君荒淫政出羣小而度竟逐外藩學士李紳有寵逢吉惡之乃除為中丞又欲出於外乃以吏部侍郎韓愈為京兆尹兼御史大夫放臺參以紳褊直必與愈爭及制出紳果移牒往來愈性木強遂至語辭不遜喧論於朝逢吉乃罷愈為兵部侍郎紳為江西觀察使紳中謝日帝留而不遣翼城人鄭注以醫藥得幸於中尉王守澄逢吉令其從子仲言賂注求結於守澄仲言辯譎多端守澄見之甚悅自是逢吉有助事無違者敬宗初即位年方童丱守澄從容奏曰陛下得為太子逢吉之力也是時杜元穎李紳堅請立深王為太子乃貶紳端州司馬朝士代逢吉鳴吠者張又新李續之張權輿劉栖楚李虞程昔範姜洽李仲言時號八關十六子又新等八人居要劇而胥附者又八人有求於逢吉者必先經此八人納賂無不如意者逢吉尋封涼國公邑千戶兼右僕射昭愍即位左右屢言裴度之賢曾立大勳帝甚嘉之因中使往興元即令問訊寶曆初度連上章請入覲逢吉之黨坐不安席如矢攢身乃相與為謀欲沮其來張權輿撰非衣小兒之謠傳於閭巷言度相有天分應謠讖而韋處厚於上前解析言權輿所撰之言既不能沮又令衞尉卿劉遵古從人安再榮告武昭謀害逢吉武昭者有才力裴度破淮蔡時奬用之累奏為刺史及度被斥昭以門吏久不見用客于京師途窮頗有怨言逢吉冀法司鞫昭行止則顯裴度任用以沮入朝之行逢吉又與同列李程不協太學博士李涉金吾兵曹茅彙者於京師貴遊間以氣俠相許二人出入程及逢吉之門水部郎中李仍叔程之族知武昭鬱鬱恨不得官仍叔謂昭曰程欲與公官但逢吉阻之昭愈憤怒因酒與京師人劉審張少騰說刺逢吉之言審以昭言告張權輿乃聞于逢吉即令茅彙召昭相見逢吉厚相結託自是疑怨之言稍息逢吉待茅彙尤厚嘗與彙書云足下當字僕為自求僕當字足下為利見文字往來其間甚密及裴度求覲無計沮之即令訐武昭事以暴揚其迹再榮既告李仲言誡彙曰言武昭與李程同謀則活否則爾死彙曰冤死甘心誣人以自免予不為也及昭下獄逢吉之醜迹皆彰昭死仲言流象州茅彙流巂州李涉流康州李虞自拾遺為河南士曹敬宗待裴度益厚乃自漢中召還復知政事逢吉檢校司空平章事襄州刺史山南東道節度使仍請張又新李續之為參佐大和二年改汴州刺史宣武軍節度使五年八月入為太子太師東都留守東畿汝防禦使加開府儀同三司八年李訓用事三月徵拜左僕射兼守司徒時逢吉已老病足不任朝謁即以司徒致仕九年正月卒時年七十八贈太尉諡曰成段文昌字墨卿西河人高祖志玄陪葬昭陵圖形凌煙閣祖德皎贈給事中父諤循州刺史贈左僕射文昌家于荊州倜儻有氣義節度使裴冑知之而不能用韋皐在蜀表授校書郎李吉甫刺忠州文昌嘗以文干之及吉甫居相位與裴同加奬擢授登封尉集賢校理俄拜監察御史遷左補闕改祠部員外郎元和十一年守本官充翰林學士文昌武元衡之子壻也元衡與宰相韋貫之不協憲宗欲召文昌為學士貫之奏曰文昌志尚不修不可擢居近密至是貫之罷相李逢吉乃用文昌為學士轉祠部郎中賜緋依前充職十四年加知制誥十五年穆宗即位正拜中書舍人尋拜中書侍郎平章事長慶元年拜章請退朝廷以文昌少在西蜀詔授西川節度使同中書門下平章事文昌素洽蜀人之情至是以寬政為治嚴靜有斷蠻夷畏服二年雲南入寇黔中觀察使崔元略上言朝廷憂之乃詔文昌禦備文昌走一介之使以喻之蠻寇即退敬宗即位徵拜邢部尚書轉兵部兼判左丞事文宗即位遷御史大夫尋檢校尚書右僕射揚州大都督府長史同平章事淮南節度使大和四年移鎮荊南文昌於荊蜀皆有先祖故第至是贖為浮圖祠又以先人墳墓在荊州別營居第以置祖禰影堂歲時伏臘良辰美景享薦之徹祭即以音聲歌舞繼之如事生者搢紳非焉六年復為劍南西川節度九年三月賜春衣中使至受宣畢無疾而卒年六十三贈太尉有文集三十卷文昌布素之時所向不偶及其達也揚歷顯重出入將相洎二十年其服飾玩好歌童妓女苟悅於心無所愛惜乃至奢侈過度物議貶之子成式成式字柯古以蔭入官為祕書省校書郎研精苦學祕閣書籍披閱皆遍累遷尚書郎咸通初出為江州刺史解印寓居襄陽以閑放自適家多書史用以自娛尤深於佛書所著酉陽雜俎傳於時宋申錫字慶臣祖素父叔夜申錫少孤貧有文學登進士第釋褐祕書省校書郎韋貫之罷相出湖南辟為從事其後累佐使府長慶初拜監察御史二年遷起居舍人寶曆二年轉禮部員外郎尋充翰林侍講學士申錫始自策名及在朝行清慎介潔不趨黨與當長慶寶曆之間時風囂薄朋比大扇及申錫被用時論以為激勸文宗即位拜戶部郎中知制誥大和二年正拜中書舍人復為翰林學士初文宗常患中人權柄太盛自元和寶曆比致宮禁之禍及王守澄之領禁兵恃其宿舊跋扈尤甚有鄭注者依恃守澄為姦利出入禁軍賣官販權中外咸扼腕視之文宗雅知之不能堪申錫時居內廷文宗察其忠厚可任以事嘗因召對與申錫從容言及守澄無可奈何令與外廷朝臣謀去之且約命為宰相申錫頓首謝之未幾拜左丞踰月加平章事申錫素能謹直寵遇超輩時情大為屬望及到中書剖斷循常望實頗不相副大和五年忽降中人召宰相入赴延英路隨李宗閔牛僧孺等既至中書東門中人云所召無宋申錫申錫始知被罪望延英以笏叩頭而退隨等至文宗以神策軍中尉王守澄所奏得本軍虞候豆盧著狀告宋申錫與漳王謀反隨等相顧愕然初守澄於浴堂以鄭注所構告于文宗守澄即時於市肆追捕又將以二百騎就靖恭里屠申錫之家會內官馬存亮同入諍於文宗曰謀反者適宋申錫耳何不召南司會議今卒然如此京師企足自為亂矣守澄不能難乃止乃召三相告之又遣右軍差人於申錫宅捕孔目官張全真家人買子緣信等又於十六宅及市肆追捕胥吏以成其獄文宗又召師保僕射尚書丞郎常侍給事諫議舍人御史中丞京兆尹大理卿同於中書及集賢院參驗其事翌日開延英召宰臣及議事官帝自詢問左常侍崔玄亮給事中李固言諫議大夫王質補闕盧鈞舒元褒羅泰蔣係裴休竇宗直韋溫拾遺李羣韋端符丁居晦袁都等一十四人皆伏玉階下奏以申錫獄付外請不於禁中訊鞫文宗曰吾已謀於公卿大僚卿等且出玄亮固言援引今古辭理懇切玄亮泣涕久之文宗意稍解貶申錫為右庶子漳王為巢縣公再貶申錫為開州司馬初申錫既得密旨乃除王璠為京兆尹以密旨喻之璠不能謀而注與守澄知之潛為其備漳王湊文宗之愛弟也賢而有人望豆盧著者職屬禁車與注親表文宗不省其詐乃罷申錫為庶子時京城恟恟衆庶譁言以為宰相真連十宅謀反百僚震駭居一二日方審其詐諫官伏閤懇論文宗震怒叱諫官令出者數四時中外屬望大僚三數人廷辯其事僕射竇易直曰人臣無將將而必誅聞者愕然唯京兆尹崔琯大理卿王正雅連上疏請出內獄且曰王師文未獲即獄未具請出豆盧著與申錫同付外廷勘當時人情翕然推重初議申錫抵死顧物論不可又將投於嶺表文宗終悟外廷之言乃有開州之命初申錫既被罪怡然不以為意自中書歸私第止於外廳素服以俟命其妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫曰吾自書生被厚恩擢相位不能鋤去姦亂反為所羅織夫人察申錫豈反者乎因相與泣下申錫自居內廷及為宰相以時風侈靡居要位者尤納賄賂遂成風俗不暇更方遠害且與貞元時甚相背矣申錫至此約身謹潔尤以公廉為己任四方問遺悉無所受既被罪為有司驗劾多獲其四方受領所還問遺之狀朝野為之歎息七年七月卒於開州詔曰申錫雖不能周慎自抵憲章聞其亡歿遐荒良用悲惻宜許其歸葬鄉里以示寬恩開成元年九月詔復申錫正議大夫尚書左丞同中書門下平章事上柱國賜紫兼贈兵部尚書仍以其子慎微為城固縣尉李程字表臣隴西人父鷫伯程貞元十二年進士擢第又登宏辭科累辟使府二十年入朝為監察御史其年秋召充翰林學士順宗即位為王叔文所排罷學士三遷為員外郎元和中出為劍南西川節度行軍司馬十年入為兵部郎中尋知制誥韓弘為淮西都統詔程銜命宣諭明年拜中書舍人權知京兆尹事十二年權知禮部貢舉十三年四月拜禮部侍郎六月出為鄂州刺史鄂岳觀察使入為吏部侍郎封渭源男食邑三百戶敬宗即位之五月以本官同平章事敬宗沖幼好治宮室畋遊無度欲於宮中營新殿程諫曰自古聖帝明王以恭儉化天下陛下在諒闇之中不宜興作願以瓦木迴奉園陵上欣然從之程又奏請置侍講學士數陳經義程辯給多智算能移人主之意尋加中書侍郎進封彭原郡公寶曆二年罷相檢校兵部尚書同平章事太原尹北京留守河東節度使大和四年三月檢校尚書左僕射平章事河中尹河中晉絳節度使六年就加檢校司空七月徵為左僕射中謝日奏曰臣所忝官上禮前後儀注不同在元和長慶中僕射數人上日不受四品已下官拜近日再定儀注四品已下官悉許受拜王涯竇易直已行之於前今御史臺云已聞奏太常寺定取十五日上臣進退未知所據時中丞李漢以為受四品已下拜太重敕曰僕射上儀近已詳定所緣拜禮皆約令文已經施行不合更改宜準大和四年十一月六日敕處分程藝學優深然性放蕩不修儀檢滑稽好戲而居師長之地物議輕之七年六月檢校司空汴州刺史宣武軍節度使九年復為河中晉絳節度使就加檢校司徒開成元年五月復入為右僕射兼判太常卿事十一月兼判吏部尚書銓事二年三月檢校司徒出為襄州刺史山南東道節度使卒有司諡曰繆子廓廓進士登第以詩名聞於時大中末累官至潁州刺史再為觀察使廓子晝亦登進士第史臣曰宗儒易直以寬柔養望坐致公台與時沉浮壽考終吉可謂能奉身矣逢吉起徒步而至鼎司欺蔽幼君依憑內豎蛇虺其腹毒害正人而不與李訓同誅天道福淫明矣申錫小器大謀貶死為幸程不持士範歿獲醜名君子操修豈宜容易贊曰趙竇優柔坐享公侯蝮蛇野葛逢吉之流豈無令人主輔謨猷程錫弼諧于道難周
