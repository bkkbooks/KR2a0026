body:
  text: 舊唐書卷一百六十二列傳第一百一十二潘孟陽李翛王遂曹華韋綬鄭權盧士玫韓全義高霞寓高瑀崔戎陸亘張正甫子毅夫毅夫子禕潘孟陽禮部侍郎炎之子也孟陽以父蔭進登博學宏辭科累遷殿中侍御史降為司議郎孟陽母劉晏女也公卿多父友及外祖賓從故得薦用累至兵部郎中德宗末王紹以恩倖數稱孟陽之材因擢授權知戶部侍郎年未四十順宗即位永貞內禪王叔文誅杜佑始專判度支請孟陽代叔文為副時憲宗新即位乃命孟陽巡江淮省財賦仍加鹽鐵轉運副使且察東南鎮之政理時孟陽以氣豪權重領行從三四百人所歷鎮府但務遊賞與婦女為夜飲至鹽鐵轉運院廣納財賄補吏職而已及歸大失人望罷為大理卿三年出為華州刺史遷梓州刺史劍南東川節度使與武元衡有舊元衡作相復召為戶部侍郎判度支兼京北五城營田使以和糴使韓重華為副太府卿王遂與孟陽不協議以營田非便持之不下孟陽忿憾形於言二人俱請對上怒不許乃罷孟陽為左散騎常侍明年復拜戶部侍郎孟陽氣尚豪俊不拘小節居第頗極華峻憲宗微行至樂遊原見其宏敞工猶未已問之左右以孟陽對孟陽懼而罷工作性喜宴公卿朝士多與之遊時指怒者不一俄以風緩不能行改左散騎常侍元和十年八月卒贈兵部尚書憲宗每事求理常發江淮宣慰使左司郎中鄭敬奉使辭上誡之曰朕宮中用度一匹已上皆有簿籍唯賑卹貧民無所計算卿經明行修今登車傳命宜體吾懷勿學潘孟陽奉使所至但務酣飲遊山寺而已其為人主所薄如此李翛不知何許人起於寒賤以莊憲皇后妹壻元和已來驟階仕進以恩澤至坊州絳州刺史無他才性纖巧承迎常飾廚傳以奉往來中使及禁軍中尉賓客以求善譽治民蒞事粗有政能上以為才召拜司農卿遷京兆尹十年莊憲太后崩翛為山陵橋道置頓使恃能惜費每事減損靈駕至灞橋頓從官多不得食及至渭城北門門壞先是橋道司請改造渭城北門計錢三萬翛以勞費不從令深鑿軌道以通靈駕掘土既深旁柱皆懸因而頓壞所不及轀輬車者數步而已初欲壞城之東北墉以出靈駕中人皆不可乃停駕徹去壞門土木而後行翛懼誣奏轀輬軸折山陵使李逢吉令御史封其車軸自陵還奏請免翛官上以用兵務集財賦以翛前後進奉不之責但罰俸而已逢吉極言其罪乃削銀青階翌日復賜金紫自此朝廷端士多遭譖毀義士為之側目時宿師於野饋運不集浙西重鎮號為殷阜乃以翛為潤州刺史浙西觀察使今設法鳩聚財貨淮西用兵頗賴其賦十四年以病求還京師未朝謁而卒王遂宰相方慶之孫也以吏能聞於時尤長於興利銳於操下法頗嚴酷累遷至鄧州刺史以曉達錢穀入為太府卿潘孟陽判度支與遂私憾互有爭論遂為西北供軍使言營田非便與孟陽會議相非各求請對上怒俱不見出遂為柳州刺史遂親吏韋行素柳季常請課料於兩池務屬遂罷務季常等為吏所誣各笞四十遂柳州制出左丞呂元膺執奏曰遂以補吏犯贓法當從坐其除官制云清能業官據遂犯狀不宜有清字柳州大郡出守為優謹封還制書上令喻之方行數年用兵淮西天子藉錢穀吏以集財賦知遂強幹乃用為宣州刺史宣歙觀察使淮蔡平王師東討召拜光祿卿充淄青行營諸軍糧料使以光祿職當祠祭改檢校左散騎常侍兼御史大夫初師之出也歲計兵食三百萬石及鄆賊誅遂進羨餘一百萬上以為能時分師道所據十二州為三鎮乃以遂為沂州刺史沂兗海等州觀察使遂性狷忿不存大體而軍州民吏久染污俗率多獷戾而遂數因公事訾詈將卒曰反虜將卒不勝其忿牙將王弁乘人心怨怒十四年七月遂方宴集弁譟集其徒害遂於席判官張實李甫等同遇害及曹華代遂至鎮盡擒亂黨王弁等誅之遂器用不弘僻於聚斂而非兼撫之才但峻威刑以繩亂俗其所製笞杖率踰常制遂既死監軍使封其杖進呈上令出示於朝以誡廉使曹華宋州楚丘人仕宣武軍為牙校貞元末吳少誠叛本軍以華驍果有智算用為襄城戍將蔡賊攻襄城華屢敗之德宗特賜旗甲元和九年以功授寧州刺史未行而吳元濟叛朝廷命河陽帥烏重胤討賊重胤請華為懷汝節度行營副使前後數十戰大破賊於青陵城賊平授棣州刺史封陳留郡王棣鄰於鄆賊屢侵逼華招募羣盜之勁者補之軍卒分據要路其後賊至皆擊敗之鄆人不敢北顧及李師道誅分所管十二州為三鎮王遂為沂兗海觀察使褊刻不能馭衆為牙將王弁所害朝廷遂授華左散騎常侍沂州刺史沂海兗觀察使華至鎮視事三日宴將吏伏甲士千人於幕下羣校既集華喻之曰吾受命廉問奉聖旨以鄆州將士分割三處有道途轉徙之勞今有頒給北州兵稍厚鄆州士卒處右州兵處左冀易以區別分定並令州兵出外既出闔門乃謂鄆卒曰天子深知鄆人之勞然前害主帥者不能免罪甲士自幕中出周環之凡鄆一千二百人立斬于庭血流成渠是日門屏之間有赤霧高丈餘久之方散自是海沂之人重足股慄無敢為盜者華惡沂之地褊請移理於兗許之初李正己盜有青鄆十二州傳襲四世垂五十年人俗頑驁不知禮教華令將吏曰鄒魯儒者之鄉不宜忘於禮義乃躬禮儒士習俎豆之容春秋釋奠於孔子廟立學講經儒冠四集出家財贍給俾成名入仕其往者如歸及鎮州軍亂殺田弘正華表請以本軍進討就加檢校工部尚書升兗海為武寧節度賜之節鉞李叛於大梁華不俟命赴討方遣兵三千人取宋州華逆擊敗之由是宋亳不從亂平以功加檢校尚書右僕射以河朔拒命移華為滑州刺史義成軍節度使長慶三年七月卒於鎮時年六十九華雖出自戎行而動必由禮尤重士大夫未嘗以富貴驕人下迨僕隸走使之徒必待之以誠信人以為難贈司空韋綬字子章京兆人少有至性喪父刺血寫佛經初為長安縣尉遭朱泚之亂變服乘驢赴奉天于鎮襄陽辟為賓佐嘗因言政面刺之縱恣入朝為工部員外轉屯田郎中元和十年改職方郎中充太子諸王侍讀再遷諫議大夫時穆宗在東宮方幼好戲綬講書之隙頗以嘲誚悅之嘗密齎家所造食入宮餉太子憲宗嘗召對綬奏曰太子學書至依字輒去旁人臣問之太子云君父以此字可天下奏事臣子不合全書上益嘉太子之賢賜綬錦綵綬無威儀時以人間鄙說戲言以取悅太子太子因入侍道綬語憲宗不悅謂侍臣曰凡侍讀者當以經義輔導太子納之軌物而綬語及此予何望耶乃罷侍讀出為虔州刺史穆宗即位以師友之恩召為尚書右丞兼集賢院學士甚承恩顧出入禁中綬以七月六日是穆宗載誕節請以是日百官詣光順門賀太后然後上皇帝壽時政道頗僻敕出人不敢議久之宰臣奏古無生日稱賀之儀其事終寢綬在集賢遇重陽賜宰臣百官曲江宴綬請與集賢學士別為一會從之長慶元年三月轉禮部尚書判集賢院事帝嘗問禳災祈福其可必乎綬對曰昔宋景公以一善言而法星退之三舍此禳災以德也漢文帝除祕祝每於祠祭盡敬而已言無所祈以明福不可以求致也而二君卒能變已變之災享自致之福著於史傳其理甚明如失德以祈災消媚神以祈福至神苟有知當因以致譴非祈禳之道也時人主失德綬因以諷之二年十月檢校戶部尚書興元尹山南西道節度使辭日請門戟十二自將赴鎮又訴家貧請賜錢二百萬又面乞授子元弼官上皆可之綬御事無術洎臨戎鎮庶政隳紊二年八月卒贈尚書右僕射博士劉端夫請諡為通殿中侍御史孟琯上言以為非當博士權安請諡為繆竟不施行鄭權滎陽開封人也登進士第釋褐涇原從事節度使劉昌符病亟請入覲度軍情必變以權寬厚容衆俾主留務及昌符上路兵果亂權挺身入白刃中抗辭喻以逆順因殺其首亂者數人三軍畏伏德宗聞而嘉之時天子厭兵藩鎮將吏得軍情者多超授官爵自試衞佐擢授行軍司馬御史中丞入朝為倉部郎中累遷至河南尹十一年代李遜為襄州刺史山南東道節度使十二年轉華州刺史潼關防禦鎮國軍使十三年遷德州刺史德棣滄景節度使時朝廷用兵討李師道權以德棣之兵臨境奏於平原安德二縣之間置歸化縣以集降民滄州刺史李宗奭與權不協每事多違不稟節制權奏之上令中使追之宗奭諷州兵留己上言懼亂未敢離郡乃以烏重胤鎮橫海代權歸朝滄州將吏懼共逐宗奭宗奭方奔歸京師詔以悖慢之罪斬於獨柳之下其弟宗爽長流汀州授權邠寧節度會天德軍使上章論宗奭之冤為權誣奏權降授原王傅尋遷右金吾衞大將軍充左街使穆宗即位改左散騎常侍充入迴鶻告哀使憚其遠役辭以足疾不獲免肩輿而行權器度魁偉有辭辯既至虜廷與虜主爭論曲直言辭激壯可汗深敬異之長慶元年使還出為河南尹入拜工部侍郎遷本曹尚書以家人數多俸入不足求為鎮守旬月檢校右僕射廣州刺史嶺南節度使初權出鎮有中人之助南海多珍貨權頗積聚以遺之大為朝士所嗤四年十月卒盧士玫山東右族以文儒進性端厚與物無競雅有令聞始為吏部員外郎稱職轉郎中京兆少尹奉憲宗園寢刑簡事集時論推其有才權知京兆尹事會幽州劉總願釋兵柄入朝請用張弘靖代己復請析瀛莫兩州用士玫為帥朝廷一皆從之士玫遂授檢校右常侍充瀛莫兩州都防禦觀察使無何幽州亂害賓佐縶弘靖取裨將朱克融領軍務遣兵襲瀛莫朝廷慮防禦之名不足抗凶逆即日除士玫檢校工部尚書充瀛莫節度使士玫亦罄家財助軍用堅拒叛徒者累月竟以官軍救之不至又瀛莫之卒親愛多在幽州遂為其下陰導克融之兵以潰士玫及從事皆被拘執送幽州囚於賓館及朝廷宥克融之罪士玫方得歸東洛尋拜太子賓客留司洛中旋除虢州刺史復為賓客寶曆元年七月卒贈工部尚書韓全義出自行間少從禁軍事竇文場及文場為中尉用全義為帳中偏將典禁兵在長武城貞元十三年為神策行營節度長武城使代韓潭為夏綏銀宥節度詔以長武兵赴鎮全義貪而無勇短於撫御制未下軍中知之相與謀曰夏州沙磧之地無耕蠶生業盛夏移徙吾所不能是夜戍卒鼓譟為亂全義踰城而免殺其親將王栖巖趙虔曜等賴都虞候高崇文誅其亂首而止之全義方獲赴鎮明年吳少誠拒命詔徵十七鎮之師討之時軍無統帥兵無多少皆以內官監之師之進退不由主將十五年冬王師為賊所敗于小河德宗以文場素待全義乃用為蔡州四面行營招討使仍以陳許節度使上官涗副之諸鎮之師皆取全義節度全義將略非所長能以巧佞財賄結中貴人以被薦用及師臨賊境又制在監軍每議兵出一帳之中中人十數紛然爭論莫決蔡賊聞之屢求決戰十六年五月遇賊於水南廣利城旗鼓未交諸軍大潰為賊所乘全義退保五樓賊對壘相望潰兵未集乃與監軍賈英秀賈國良等保水縣賊距水五六里而軍全義懼其凌突退保陳州其汴宋河北之軍皆亡歸本鎮唯陳許將孟元陽神策將蘇光榮等數千人守水全義誘潞州大將夏侯仲宣滑將時昂河陽將權文度河中將郭湘等誅之由是軍情稍固少誠知王師無能為致書幣以告監軍願求昭洗德宗召大臣議宰相賈耽曰昨全義五樓退軍賊不追襲者應望國家恩貸臣伏恐須開生路上然之又得監軍等奏即下制洗滌加其爵秩十七年全義自陳州班師而中人掩其敗迹上待之如初全義武臣不達朝儀託以足疾不任謁見全義司馬崔放入對德宗勞問放引過言招撫無功德宗曰全義為招討使招得吳少誠歸國其功大矣何必殺人乃為功耶旋命還鎮令中使就第賜宴錫賚頗厚自還至辭都不謁見而去議者以隳敗法制從古已還未如貞元之甚憲宗在藩常惡其事及即位全義懼求入覲詔以太子太保致仕其年七月卒高霞寓范陽人祖仙父栖鶴皆以孝聞凡五代同爨德宗朝采訪使洪經綸奏旌表其門閭鄉里稱美其事霞寓少讀左氏春秋及孫吳兵法好大言頗以節概自許貞元中徒步造長武城使高崇文待以猶子之分擢授軍職累奏憲宗甚見委信元和初詔授兼御史大夫從崇文將兵擊劉闢連戰皆克下鹿頭城降李文悅仇良輔蜀平以功拜彭州刺史尋繼崇文為長武城使封感義郡王元和五年以左威衞將軍隨吐突承璀擊王承宗又加左散騎常侍明年改豐州刺史三城都團練防禦使六遷至檢校工部尚書元和十年朝廷討吳元濟以霞寓宿將乃析山南東道為兩鎮以霞寓為唐鄧隋節度使霞寓雖稱勇敢素昧機略至於統制尤非所長及達所部乃率兵趣蕭陂與賊決戰既小勝又進至文城柵賊軍偽敗而退霞寓逐之不已因為伏兵所掩王師大衂霞寓僅以身免坐貶歸州刺史後以恩例徵為右衞大將軍十三年出為振武節度使入為左武衞大將軍長慶元年授邠寧節度使三年就加檢校右僕射四年加檢校司空又加司徒寶曆二年疽發首不能理事求歸闕下其夏授右金吾衞大將軍檢校司徒途次奉天而卒年五十五贈太保霞寓卒伍常材始因宦官進用遂階節將位望既高言多不遜朝廷知之欲議移罷霞寓頗懷憂恐捨私第為佛寺上言請額為懷恩用資聖福大率姦妄兇狡如此又非斥朝列侮慢僚屬鄙辭俚語日聞於時高瑀渤海蓨人少好論兵釋褐右金吾冑曹累辟諸府從事歷陳蔡二郡刺史入為太僕卿大和初忠武節度使王沛卒物議以陳許軍四征有功必自擇帥或以禁軍之將得之宰相裴度韋處厚議瑀深沉方雅曾刺陳蔡人懷良政又熟忠武軍情欲請用瑀事未聞陳許表至果請瑀為帥乃授檢校左散騎常侍許州刺史忠武節度使自大曆已來節制之除拜多出禁軍中尉凡命一帥必廣輸重賂禁軍將校當為帥者自無家財必取資於人得鎮之後則膏血疲民以償之及瑀之拜以內外公議搢紳相慶曰韋公作相債帥鮮矣三年就加檢校工部尚書比年水旱人民薦饑瑀召集州民繞郭立堤塘一百八十里蓄洩既均人無饑年加檢校右僕射六年移授徐州刺史武寧軍節度等使議者以徐泗王智興之後軍士驕恣宜得雄帥鎮之乃以太府卿崔珙代瑀徵為刑部尚書以疾求分司拜太子少傅其月復授檢校右僕射陳許蔡節度使八年六月卒贈司空瑀性寬和有體量為官雖無赫赫之譽所至皆理尤得士心論者美之崔戎字可大高伯祖玄暐神龍初有大功封博陵郡王祖嬰郢州刺史父貞固太原榆次尉戎舉兩經登科授太子校書調判入等授藍田主簿為藩鎮名公交辟裴度領太原署為參謀時王承宗據鎮州叛度請戎單車往諭之承宗感泣受教入為殿中侍御史累拜吏部郎中遷諫議大夫尋為劍南東西兩川宣慰使西州承蠻寇之後戎既宣撫兼再定征稅廢置得所公私便之還拜給事中駁奏為當時所稱改華州刺史遷兗海沂密都團練觀察等使將行州人戀惜遮道至有解鞾斷者理兗一年大和八年五月卒贈禮部尚書陸亘字景山吳郡人祖元明睦州司馬父持詮惠陵臺令亘以書判授集賢殿正字華原縣尉應制舉授萬年縣丞自京兆府兵曹參軍拜太常博士寺有禮生孟真久於其事凡吉凶大儀禮官不能達率訪真真亦賴是須要姑息元和七年冊皇太子將撰儀注真亦欲參預亘笞之由是禮儀不專於胥吏自虞部員外郎出為鄧州刺史其後入為戶部郎中秘書少監太常少卿歷刺兗蔡虢蘇四郡遷越州刺史浙東團練觀察等使移宣歙觀察使加御史大夫大和八年九月卒年七十一贈禮部尚書亘強明嚴毅所至稱理初赴兗州延英面奏曰凡節度使握兵分屯屬郡者刺史不能制遂為一州之弊宜有處分因詔天下兵分屯屬郡者隸于刺史越之永嘉郡城于海壖常陷寇境集官吏廩祿之半以代常賦因循相踵吏返為倖亘按舉贓罪表請郡守以降增給其俸人皆賴之張正甫字踐方南陽人曾祖大禮坊州刺史祖紹貞尚書右丞父泚蘇州司馬正甫登進士第從樊澤為襄陽從事累轉監察御史于代澤辟留正甫正甫堅辭之遂誣奏貶郴州長史後由邕府徵拜殿中侍御史遷戶部員外郎轉司封員外兼侍御史知雜事遷戶部郎中改河南尹由尚書右丞為同州刺史入拜左散騎常侍集賢殿學士判院事轉工部尚書五年檢校兵部尚書太子詹事明年以吏部尚書致仕正甫仁而端亮涖官清強居外任所至稱理大和八年九月卒年八十三累贈太師子毅夫毅夫登進士第初正甫兄式大曆中進士登第繼之以正甫式子元夫傑夫徵夫又相次登科大和中文章之盛世共稱之元夫大和初兵部郎中知制誥遷中書舍人出為汝州刺史毅夫位至戶部侍郎弘文館學士判院事諸羣從登第者數人而毅夫子禕最知名禕字冠章釋褐汴州從事戶部判官入為藍田尉集賢校理趙隱鎮浙西劉鄴鎮淮南皆辟為賓佐入為監察御史遷左補闕乾符中詔入翰林為學士累官至中書舍人黃巢犯京師從僖宗幸蜀拜工部侍郎判戶部事奉使江淮還為當塗者不協改太子賓客左散騎常侍轉吏部侍郎歷刑部兵部尚書從昭宗在華為韓建所構貶衡州司馬昭宗還京徵拜禮部尚書太常卿充禮儀使遷兵部尚書禕苦心為文老而益壯為刑部時劉鄴子覃當巢寇時避禍於金吾將軍張直方之第被害僖宗還京而惡覃者以託附逆黨死不以義下三司詳罪禕上章申理言覃父子併命於賊廷豈附逆耶其家竟獲洗雪覃亦贈官其行義始終皆如此類史臣曰孟陽王遂儒雅之曹才有可稱竟以財媚時君陷為俗吏蹈道之論可不懼耶全義官由妄進霞寓位以卒升勇毅不足以啟行謀慮不足以應變敗亡之辱不亦宜乎朝無責帥之刑蓋自恥也權瑀長者末塗喪真雖牽於食貧純則偽矣贊曰蘊仁則哲蘊利則狂搢紳之胤勿效潘王全義逃責貞元失策霞寓薄刑元和復興
