body:
  text: 舊唐書卷九十四列傳第四十四蘇味道李嶠崔融盧藏用徐彥伯蘇味道趙州欒城人也少與鄉人李嶠俱以文辭知名時人謂之蘇李弱冠本州舉進士累轉咸陽尉吏部侍郎裴行儉先知其貴甚加禮遇及征突厥阿史那都支引為管記孝敬皇帝妃父裴居道再登左金吾將軍訪當時才子為謝表託於味道援筆而成辭理精密盛傳於代延載初歷遷鳳閣舍人檢校鳳閣侍郎同鳳閣鸞臺平章事尋加正授證聖元年坐事出為集州刺史俄召拜天官侍郎聖曆初遷鳳閣侍郎同鳳閣鸞臺三品味道善敷奏多識臺閣故事然而前後居相位數載竟不能有所發明但脂韋其間苟度取容而已嘗謂人曰處事不欲決斷明白若有錯誤必貽咎譴但摸稜以持兩端可矣時人由是號為蘇摸稜長安中請還鄉改葬其父優制令州縣供其葬事味道因此侵毀鄉人墓田役使過度為憲司所劾左授坊州刺史未幾除益州大都督府長史神龍初以親附張易之昌宗貶授郿州刺史俄而為益州大都督府長史未行而卒年五十八贈冀州刺史味道與其弟太子洗馬味玄甚相友愛味玄若請託不諧輒面加凌折味道對之怡然不以為忤論者稱焉有文集行於代李嶠趙州贊皇人隋內史侍郎元操從曾孫也代為著姓父鎮惡襄城令嶠早孤事母以孝聞為兒童時夢有神人遺之雙筆自是漸有學業弱冠舉進士累轉監察御史時嶺南邕嚴二州首領反叛發兵討擊高宗令嶠往監軍事嶠乃宣朝旨特赦其罪親入獠洞以招諭之叛者盡降因罷兵而還高宗甚嘉之累遷給事中時酷吏來俊臣構陷狄仁傑李嗣真裴宣禮等三家奏請誅之則天使嶠與大理少卿張德裕侍御史劉憲覆其獄德裕等雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉孔子曰見義不為無勇也乃與德裕等列其枉狀由是忤旨出為潤州司馬詔入轉鳳閣舍人則天深加接待朝廷每有大手筆皆特令嶠為之時初置右御史臺巡按天下嶠上疏陳其得失曰陛下創置右臺分巡天下察吏人善惡觀風俗得失斯政途之綱紀禮法之準繩無以加也然猶有未折衷者臣請試論之夫禁網尚疏法令宜簡簡則法易行而不煩雜疏則所羅廣而無苛碎竊見垂拱二年諸道巡察使所奏科目凡有四十四件至於別準格敕令察訪者又有三十餘條而巡察使率是三月已後出都十一月終奏事時限迫促簿書填委晝夜奔逐以赴限期而每道所察文武官多至二千餘人少者一千已下皆須品量才行褒貶得失欲令曲盡行能則皆不暇此非敢墮於職而慢於官也實才有限而力不及耳臣望量其功程與其節制使器周於用力濟於時然後進退可以責成得失可以精覈矣又曰今之所察但準漢之六條推而廣之則無不包矣無為多張科目空費簿書且朝廷萬機非無事也機事之動恆在四方是故冠蓋相望郵驛繼踵今巡使既出其外州之事悉當委之則傳驛大減矣然則御史之職故不可得閑自非分州統理無由濟其繁務請大小相兼率十州置御史一人以周年為限使其親至屬縣或入閭里督察姦訛觀採風俗然後可以求其實効課其成功若此法果行必大裨政化且御史出持霜簡入奏天闕其於勵己自修奉職存憲比於他吏可相百也若其按劾姦邪糾擿欺隱比於他吏可相十也陛下試用臣言妙擇賢能委之心膂假溫言以樹之陳賞罰以勸之則莫不盡力而効死矣何政事之不理何禁令之不行何妖孽之敢興則天善之乃下制分天下為二十道簡擇堪為使者會有沮議者竟不行尋知天官侍郎事遷麟臺少監聖曆初與姚崇偕遷同鳳閣鸞臺平章事俄轉鸞臺侍郎依舊平章事兼修國史久視元年嶠舅天官侍郎張錫入知政事嶠轉成均祭酒罷知政事及修史舅甥相繼在相位時人榮之嶠尋檢校文昌左丞東都留守長安三年嶠復以本官平章事尋知納言事明年遷內史嶠後固辭煩劇復拜成均祭酒平章事如故長安末則天將建大像於白司馬坂嶠上疏諫之其略曰臣以法王慈敏菩薩護持唯擬饒益衆生非要營修土木伏聞造像稅非戶口錢出僧尼不得州縣祗承必是不能濟辦終須科率豈免勞擾天下編戶貧弱者衆亦有傭力客作以濟糇糧亦有賣舍貼田以供王役造像錢見有一十七萬餘貫若將散施廣濟貧窮人與一千濟得一十七萬餘戶拯飢寒之弊省勞役之勤順諸佛慈悲之心霑聖君亭育之意人神胥悅功德無窮疏奏不納中宗即位嶠以附會張易之兄弟出為豫州刺史未行又貶為通州刺史數月徵拜吏部侍郎封贊皇縣男無幾遷吏部尚書進封縣公神龍二年代韋安石為中書令初嶠在吏部時志欲曲行私惠冀得復居相位奏置員外官數千人至是官僚倍多府庫減耗乃抗表引咎辭職幷陳利害十餘事中宗以嶠昌言時政之失輒請罷免手制慰諭而不允尋令復居舊職三年又加修文館大學士監修國史封趙國公景龍三年罷中書令以特進守兵部尚書同中書門下三品睿宗即位出為懷州刺史尋以年老致仕初中宗崩嶠密表請處置相王諸子勿令在京及玄宗踐祚宮內獲其表以示侍臣或請誅之中書令張說曰嶠雖不辯逆順然亦為當時之謀吠非其主不可追討其罪上從其言乃下制曰事君之節危而不變為臣則忠貳乃無赦特進趙國公李嶠往緣宗韋弒逆朕恭行戡定揖讓之際天命有歸嶠有窺覦不知逆順狀陳詭計朕親覽焉以其早負辭學累居台輔忍而莫言特掩其惡今忠邪既辨具物惟新賞罰倘乖下人安勸雖經赦令猶宜放斥矝其老疾俾遂餘生宜聽隨子虔州刺史暢赴任尋起為廬州別駕而卒有文集五十卷崔融齊州全節人初應八科舉擢第累補宮門丞兼直崇文館學士中宗在春宮制融為侍讀兼侍屬文東朝表疏多成其手聖曆中則天幸嵩嶽見融所撰啟母廟碑深加歎美及封禪畢乃命融撰朝覲碑文自魏州司功參軍擢授著作佐郎尋轉右史聖曆二年除著作郎仍兼右史內供奉四年遷鳳閣舍人久視元年坐忤張昌宗意左授婺州長史頃之昌宗怒解又請召為春官郎中知制誥事長安二年再遷鳳閣舍人三年兼修國史時有司表稅關市融深以為不可上疏諫曰伏見有司稅關市事條不限工商但是行人盡稅者臣謹按周禮九賦其七曰關市之賦竊惟市縱繁巧關通末遊欲令此徒止抑所以咸增賦稅臣謹商度今古料量家國竊將為不可稅謹件事跡如左伏惟聖旨擇焉往古之時淳樸未散公田籍而不稅關防譏而不征中代已來澆風驟進桑麻疲弊稼穡辛勤於是各徇通財爭趨作巧求徑捷之欲速忘歲計之無餘遂使田萊日荒倉廩不積蠶織休廢弊縕闕如飢寒猥臻亂離斯起先王懲其若此所以變古隨時依本者恆科占末者增稅夫關市之稅者謂市及國門關門者也唯斂出入之商賈不稅來往之行人今若不論商人通取諸色事不師古法乃任情悠悠末代於何瞻仰濟濟盛朝自取嗤笑雖欲憲章姬典乃是違背周官臣知其不可者一也臣謹案易繫辭稱庖羲氏沒神農氏作日中為市致天下之人聚天下之貨交易而退各得其所班志亦云財者帝王聚人守位養成羣生奉順天德理國安人之本也仕農工商四人有業學以居位曰仕闢土殖穀曰農作巧成器曰工通財鬻貨曰商聖王量能授事四人陳力受職然則四人各業久矣今復安得動而搖之蕭何云人情一定不可復動班固又云曹參相齊齊國安集大稱賢相參去屬其後相曰以齊獄市為寄慎勿擾也後相曰理無大於此者乎參曰不然夫獄市者所以幷容也今若擾之姦人安所容乎吾是以先之夫獄市兼受善惡若窮極姦人無所容竄姦人無所容竄久且為亂秦人極刑而天下叛孝武峻法而刑獄繁此其效也老子曰我無為而人自化我好靜而人自正參欲以道化其本不欲擾其末臣知其不可者二也四海之廣九州之雜關必據險路市必憑要津若乃富商大賈豪宗惡少輕死重義結黨連羣喑嗚則彎弓睚眦則挺劍小有失意且猶如此一旦變法定是相驚乘茲困窮或致騷動便恐南走越北走胡非唯流逆齊人亦自攪亂殊俗又如邊徼之地寇賊為鄰興胡之旅歲月相繼倘因科賦致有猜疑一從散亡何以制禁求利雖切為害方深而有司上言不識大體徒欲益帑藏助軍國殊不知軍國益擾帑藏逾空臣知其不可者三也孟軻又云古之為關也將以禦暴今之為關也將以為暴今行者皆稅本末同流且如天下諸津舟航所聚旁通巴漢前指閩越七澤十藪三江五湖控引河洛兼包淮海弘舸巨艦千軸萬艘交貿往還昧旦永日今若江津河口置鋪納稅納稅則檢覆檢覆則遲留此津纔過彼鋪復止非唯國家稅錢更遭主司僦賂船有大小載有少多量物而稅觸途淹久統論一日之中未過十分之一因此壅滯必致吁嗟一朝失利則萬商廢業萬商廢業則人不聊生其間或有輕訬任俠之徒斬龍刺蛟之黨鄱陽暴謔之客富平悍壯之夫居則藏鏹出便竦劍加之以重稅因之以威脅一旦獸窮則搏鳥窮則攫執事者復何以安之哉臣知其不可者四也五帝之初不可詳已三王之後厥有著云秦漢相承典章大備至如關市之稅史籍有文秦政以雄圖武力捨之而不用也漢武以霸略英才去之而勿取也何則關為禦暴之所市為聚人之地稅市則人散稅關則暴興暴興則起異圖人散則懷不軌夫人心莫不背善而樂禍易動而難安一市不安則天下之市心搖矣一關不安則天下之關心動矣況澆風久扇變法為難徒欲禁末遊規小利豈知失玄默亂大倫魏晉眇小齊隋齷齪亦所不行斯道者也臣知其不可者五也今之所以稅關市者何也豈不以國用不足邊寇為虞一行斯術冀有殷贍然也微臣敢借前箸以籌之伏惟陛下當聖期御玄籙沉璧于洛刻石于嵩鑄寶鼎以窮姦坐明堂而布政神化廣洽至德潛通東夷暫驚應時平殄南蠻纔動計日歸降西域五十餘國廣輪一萬餘里城堡清夷亭堠靜謐比為患者唯苦二蕃今吐蕃請命邊事不起即目雖尚屯兵久後終成弛柝獨有默啜假息孤恩惡貫禍盈覆亡不暇征役日已省矣繁費日已稀矣然猶下明制遵太樸愛人力惜人財王侯舊封妃主新禮所有支料咸令減削此陛下以躬率先堯舜之用心也且關中河北水旱數年諸處逃亡今始安輯倘加重稅或慮相驚況承平歲積薄賦日俗荷深恩人知自樂卒有變法必多生怨生怨則驚擾驚擾則不安中既不安外何能禦文王曰帝王富其人霸王富其地理國若不足亂國若有餘古人有言帝王藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋惟陛下詳之必若師興有費國儲多窘即請倍算商客加斂平人如此則國保富強人免憂懼天下幸甚臣知其不可者六也陛下留神繫表屬想政源冒茲炎熾早朝晏坐一日二日機務不遺先天後天虛心密應時政得失小子何知率陳瞽辭伏紙惶懼疏奏則天納之乃寢其事四年除司禮少卿仍知制誥時張易之兄弟頗招集文學之士融與納言李嶠鳳閣侍郎蘇味道麟臺少監王紹宗等俱以文才降節事之及易之伏誅融左授袁州刺史尋召拜國子司業兼修國史神龍二年以預修則天實錄成封清河縣子賜物五百段璽書褒美融為文典麗當時罕有其比朝廷所須洛出寶圖頌則天哀冊文及諸大手筆並手敕付融撰哀冊文用思精苦遂發病卒時年五十四以侍讀之恩追贈衞州刺史諡曰文有集六十卷二子禹錫翹開元中相次為中書舍人盧藏用字子潛度支尚書承慶之姪孫也父璥有名於時官至魏州司馬藏用少以辭學著稱初舉進士選不調乃著芳草賦以見意尋隱居終南山學辟穀練氣之術長安中徵拜左拾遺時則天將營興泰宮於萬安山藏用上疏諫曰臣愚雖不達時變竊嘗讀書見自古帝王之迹衆矣臣聞土階三尺茅茨不翦采椽不斲者唐堯之德也卑宮室菲飲食盡力於溝洫者大禹之行也惜中人十家之產而罷露臺之制者漢文之明也並能垂名無窮為帝皇之烈豈不以克念徇物博施濟衆以臻於仁恕哉今陛下崇臺邃宇離宮別館亦已多矣更窮人之力以事土木臣恐議者以陛下為不愛人務奉己也且頃歲已來雖年穀頗登而百姓未有儲蓄陛下西幸東巡人未休息土木之役歲月不空陛下不因此時施德布化復廣造宮苑臣恐人未易堪今左右近臣多以順意為忠朝廷具僚皆以犯忤為患至令陛下不知百姓失業亦不知左右傷陛下之仁也臣聞忠臣不避死亡之患以納君於仁明主不惡切直之言以垂名千載陛下誠能發明恕之制以勞人為辭則天下必以陛下為惜人力而苦己也小臣固陋不識忌諱敢冒死上聞乞下臣此章與執事者議其可否則天下幸甚神龍中累轉起居舍人兼知制誥俄遷中書舍人藏用常以俗多拘忌有乖至理乃著析滯論以暢其事辭曰客曰天道玄微神理幽化聖人所以法象衆庶由其運行故大撓造甲子容成著律曆黃公裁變玄女啟謨八門御時六神直事從之者則兵強國富違之者則將弱朝危有同影響若合符契先生亦嘗聞之乎主人曰何為其然也子所謂曲學所習曘昧所守徒識偏方之詭說未究亨衢之通論蓋易曰先天不違傳稱人神之主范圍不過三才所以虛中進退非邪百王所以無外故曰國之將興聽於人將亡聽於神又曰禍福無門唯人所召人無釁焉妖不自作由是言之得喪興亡並關人事吉凶悔吝無涉天時且皇天無親唯德是輔為不善者天降之殃高宗修德桑穀以變宋君引過法星退舍此天道所以從人者也古之為政者刑獄不濫則人壽賦斂蠲省則人富法令有常則國靜賞罰得中則兵強所以禮者士之所歸賞者士之所死禮賞不倦則士爭先苟違此途雖卜時行刑擇日出令必無成功矣自叔世遷訛俗多徼倖競稱怪力爭誦詭言屈政教而就孤虛棄信賞而從推步附會前史變易舊經依託空文以為徵據覆軍敗將者則隱祕無聞偶同幸中者則共相文飾豈唯德之增惑亦乃學人自是嗚呼習俗訛謬一至此焉昔者甲子興師非成功之日往亡用事異制勝之辰人事苟修何往不濟至若環城自守接陣重圍無闕地形不乖天道若兵強將智粟積城堅雖復屢轉魁剛頻移太歲坐推白虎行計貪狼自符雞鬬之祥多貽蟻附之困故曰任賢使能則不時日而事利明法審令則不卜筮而事吉養勞賞功則不禱祠而得福此所謂天時不如地利地利不如人和太公犯雨逆天時也韓信背水乖地利也並存人事俱成大業削樹而斬龐涓舉火而屠張郃未必暗同歲德冥會日遊俱運三門並占四殺杜郵齒劍抑唯計沮垓下悲歌實階刓印若以並資厭勝不事良圖則長平盡坑固須恆濟襄城無噍亦可常保是知拘而多忌終喪大功百姓與能必遺小數金雞玉鶴方為楚國之殃萬畢枕中適構淮南之禍刻符指盜反更亡身被髮邀神翻招夷族嗟乎威斗赭鞭不禳赤伏之運築城斷岡何救素靈之哭火災不驗裨竈無力以窺天超乘階凶王孫取監於觀德九徵九變是曰長途人謀鬼謀良歸有道此並經史陳迹賢聖通規仁遠乎哉詎宜滯執客乃蹙然避席曰鄙人困蒙不階至道請事斯語歸于正途而今而後焚蓍龜毀律曆廢六合斥五行浩然清慮則將奚若答曰此所謂過猶不及也夫甲子所以配日月律曆所以通歲時金木所以備法象蓍龜所以筮吉凶聖人以此神明德行輔助謀猷存之則協贊成功執之則凝滯於物消息之義其在茲乎客於是循牆匍匐帖然無氣口心醉不知所以答矣景龍中為吏部侍郎藏用性無挺特多為權要所逼頗隳公道又遷黃門侍郎兼昭文館學士轉工部侍郎尚書右丞先天中坐託附太平公主配流嶺表開元初起為黔州都督府長史兼判都督事未行而卒年五十餘有集二十卷藏用工篆隸好琴棋當時稱為多能之士少與陳子昂趙貞固友善二人並早卒藏用厚撫其子為時所稱然初隱居之時有貞儉之操往來于少室終南二山時人稱為隨駕隱士及登朝趑趄詭佞專事權貴奢靡淫縱以此獲譏于世徐彥伯兗州瑕丘人也少以文章擅名河北道安撫大使薛元超表薦之對策擢第累轉蒲州司兵參軍時司戶韋暠善判事司士李亘工於翰札而彥伯以文辭雅美時人謂之河中三絕彥伯聖曆中累除給事中時王公卿士多以言語不慎密為酷吏周興來俊臣等所陷彥伯乃著樞機論以誡于代其辭曰書曰唯口起羞惟甲冑起戎又云齊乃位度乃口易曰慎言語節飲食又云出其言善千里應之出其言不善千里違之禮亦云可言也不可行也君子不言也可行也不可言也君子不行也嗚呼先聖知言之為大也知言之為急也精微以勸之典謨以告之禮經以防之守名教者何可不修其詁訓而服其糟粕乎故曰言語者君子之樞機動則物應物應則得失之兆見也得之者江海比鄰失之者肝膽楚越然後知否泰榮辱繫於言乎夫言者德之柄也行之主也志之端也身之文也既可以濟身亦可以覆身故中庸鏤其心右階銘其背南容復於白圭箕子疇於洪範良有以也是以掎摭瑕玷參詳躁競審無常以階亂將不密以致危利生於口森然覆邦之說道不由衷變彼如簧之刺可不懼之哉其有識暗邪正慮微形朕破金湯之籥封禍亂之根用詀讘為全計以號詉為令德至若梧宮問答荊齊所以奔命韓魏加肘智伯所以危殘蔡侯繩息媯也亟招甲兵之罰鄭曼圖宗卿也而受鼎鑊之誅史遷輕議終下蠶室張紘詭說更齒龍淵凡此過言其流匪一或穢猶糞土或動成刀劍或苟且其心或脂膏其吻挾邪作蠱守之而不懈往輒破的去之而彌遠亦何異韓臯聚音厖也羣吠得死為幸何循名之立乎雖復伯玉沮顏追謝於元凱蔣濟貽恨失譽於王陵犀首沒齒於季章曹瞞舌於劉主當何及哉孔子曰予欲無言又云終身為善一言敗之惜也老子亦云多言數窮又云聰明深察而近於死者議人者也何聖人之深思偉慮杜漸防萌之至乎夫不可言而言者曰狂可言而不言者曰隱鉗舌拱默曷通彼此之懷括囊而處孰啟謨明之訓則上言者下聽也下言者上用也睿哲之言猶天地也人覆燾而生焉大雅之言猶鐘鼓也人考擊而樂焉作以龜鏡姬公之言也出為金石曾子之言也存其家邦國僑之言也立而不朽臧孫之言也是謂德音詣我宗極滿于天下貽厥後昆殷宗甘之於酒醴孫卿諭之以琴瑟闕里重於四時郢都輕其千乘豈不韙哉豈不休哉但楙探世猷克念丕訓審思而應精慮而動謀其心以後發擇其交以後談不蹙趨於非黨不屏營於詭遇非先王之至德不敢行非先王之法言不敢道翦其諜諜之緒撲其炎炎之勢自然介爾景福錫茲純嘏則悔吝何由而生怨惡何由而至哉孔子曰終日行不遺己患終日言不遺己憂如此乃可以言也戒之哉戒之哉神龍元年遷太常少卿兼修國史以預修則天實錄成封高平縣子賜物五百段未幾出為衞州刺史以善政聞璽書勞勉俄轉蒲州刺史入為工部侍郎尋除衞尉卿兼昭文館學士景龍三年中宗親拜南郊彥伯作南郊賦以獻辭甚典美景雲初加銀青光祿大夫遷右散騎常侍太子賓客仍兼昭文館學士先天元年以疾乞骸骨許之開元二年卒彥伯事寡嫂甚謹撫諸姪同於己子自晚年屬文好為強澀之體頗為後進所效焉有文集二十卷行於時史臣曰才出於智行出於性故文章巧拙由智之深淺也行義詭實由性之善惡也然則智性稟之於氣不可使之彊也蘇味道李嶠等俱為輔相各處穹崇觀其章疏之能非無奧贍驗以弼諧之道罔有貞純故狄仁傑有言曰蘇李足為文吏矣得非齷齪者乎摸稜之病尤足可譏崔融盧藏用徐彥伯等文學之功不讓蘇李止有守常之道而無應變之機規諫之深崔比盧徐稍為優矣贊曰房杜姚宋俱立大功咸以二族譚為美風蘇李文學一代之雄有慚輔弼稱之豈同凡人有言未必有德崔與盧徐皆攻翰墨文雖堪尚義無可則備位守常斯言罔忒
