body:
  text: 舊唐書卷一百四十三列傳第九十三李懷仙朱希彩附朱滔劉怦子濟澭濟子總程日華子懷直懷直子權李全略子同捷李懷仙柳城胡人也世事契丹降將守營州祿山之叛懷仙以裨將從陷河洛安慶緒敗又事史思明善騎射有智數朝義時偽授為燕京留守范陽尹寶應元年元帥雍王統迴紇諸兵收復東都朝義渡河北走乃令副元帥僕固懷恩率兵追之時羣凶瓦解國威方振賊黨聞懷恩至望風納款朝義以餘孽數千奔范陽懷仙誘而擒之斬首來獻屬懷恩私欲樹黨以固兵權乃保薦懷仙可用代宗復授幽州大都督府長史檢校侍中幽州盧龍等軍節度使與賊將薛嵩田承嗣張忠志等分河朔而帥之既而懷恩叛逆西蕃入寇朝廷多故懷仙等四將各招合遺孽治兵繕邑部下各數萬勁兵文武將吏擅自署置貢賦不入於朝廷雖稱藩臣實非王臣也朝廷初集姑務懷安以是不能制懷仙大曆三年為其麾下兵馬使朱希彩所殺希彩自稱留後恆州節度使張忠志以懷仙世舊無辜覆族遣將率衆討之為希彩所敗朝廷不獲已宥之以河南副元帥黃門侍郎同平章事王縉為幽州節度使授希彩御史中丞充幽州節度副使權知軍州事詔縉赴鎮希彩聞縉之來蒐選卒伍大陳戎備以逆之縉晏然建旌節而希彩迎謁甚恭縉知終不可制勞軍旬日而還尋加希彩御史大夫充幽州節度留後十二月加希彩幽州大都督府長史幽州盧龍軍節度使五年封高密郡王既得位暴橫自恣無禮於朝廷七年孔目官李瑗因人之怒伺隙斬之軍人立其兵馬使朱泚為留後泚自有傳朱滔賊泚之弟也平州刺史朱希彩為幽州節度以滔同姓甚愛之常令將腹心親兵及泚為節度使遂使滔將勁兵三千赴京師請率先諸軍備塞自祿山反後山東范陽外雖示順實皆倔強不庭泚首効臣節代宗喜甚命滔勒兵東入長安通化門西出開遠門出師勞還未有兵還王城者今而許之蓋示優異召滔對于三殿代宗臨軒勞問既而曰卿材孰與泚多滔曰各有長短統御士衆方略明辨臣不及泚臣年二十八獲謁龍顏泚長臣五歲未朝鳳闕此不及臣代宗愈喜大曆九年泚朝覲因乞留西征吐蕃以滔試殿中監權知幽州盧龍節度留後兼御史大夫及田承嗣反與李寶臣李正己等解磁州圍建中二年寶臣死其子惟岳謀襲父位滔與成德軍節度張孝忠征之大破惟岳於束鹿滔命偏師守束鹿進圍深州惟岳乃統萬餘衆及田悅援兵圍束鹿惟岳將王武俊以騎三千方陳橫進滔繪帛為狻猊象使猛士百人蒙之鼓譟奮馳賊為驚亂隨擊大破之惟岳焚營而遁以功加檢校司徒為幽州盧龍軍節度使以德棣二州隸焉朝廷以康日知為深趙二州團練使王武俊為恆冀二州團練使滔怒失深州武俊怒失寶臣故地滔構武俊同己反馬燧圍田悅于魏州悅告急滔與武俊遂連兵救悅敗李懷光於愜山三年十一月滔僭稱大冀王偽署百官與李納田悅王武俊並稱王南結李希烈興元初田悅王武俊以朱泚據京師滔兵強盛首尾相應田悅常謂武俊曰朱滔心險不可隄防遂相率歸順泚既僭號立滔為皇太弟仍令以重賂招誘迴紇南攻魏貝即西入關興元元年正月滔驅率燕薊之衆及迴紇雜虜號五萬次南河攻圍貝州三月田緒殺田悅魏州亂滔令大將馬寔分兵逼魏州營于王莽河德宗在山南慮二凶兵合遣使授王武俊平章事令與李抱真叶力擊滔四月恆潞兩軍次經城北行營相距十里抱真自率二百騎徑入武俊軍面申盟約結為兄弟五月四日進軍距貝州三十里而軍翌日滔令大將馬寔盧南史引迴紇契丹來挑戰武俊遣騎將趙珍提精騎三百當之抱真將王虔休掎角待之武俊與其子士清自當迴紇契丹部落兩軍既合鼓譟震地迴紇恃捷穿武俊陣而過武俊乘騎勒馬不動俟迴紇引退因而薄之迴紇勢不能止武俊父子縱馬急擊獲迴紇三百騎滔陣亂東走兩邊追斬俘馘數萬計遇夜夾滔壘而軍是夜滔以殘衆千人奔德州委棄戈甲山積滔至瀛州殺騎將蔡雄楊布以其前鋒先敗又殺陰陽人尹少伯以其言舉兵必勝故也六月李晟收京城朱泚姚令言死滔還幽州為武俊所攻僅不能軍上章待罪九月詔曰朱滔累獻款疏深効懇誠省之惻然良用憫嘆宜委武俊抱真開示大信深加曉諭若誠心益固善跡克彰朕當掩釁錄勳與之昭雪貞元元年尋卒於位時年四十贈司徒劉怦幽州昌平人也父貢嘗為廣邊大斗軍使怦即朱滔姑之子積軍功為雄武軍使廣屯田節用以辦理稱稍遷涿州刺史居數年朱滔將兵討田承嗣奏署怦領留府事以寬緩得衆心時李寶臣為田承嗣間說與之通謀承嗣又以滄州與寶臣乃以兵劫朱滔於瓦橋關滔脫身走乘勝欲襲取幽州怦設方略鎮撫寶臣不敢進以功加御史中丞寶臣死子惟岳拒朝命德宗令滔與張孝忠同力討之及惟岳平滔怨朝廷違約不與深州含怒不已會王武俊亦怨割地深趙相謀叛欲救田悅怦時知幽州留後事遣人齎書謂滔曰司徒位崇太尉尊居宰相恩寵冠藩臣之右榮遇極矣今昌平故里朝廷改為太尉鄉司徒里此亦大夫不朽之名也但以忠順自持則事無不濟竊思近日務大樂戰不顧成敗而家滅身屠者安史是也暴亂易亡今復何有怦忝密親世荷恩遇默而無告是負重知惟司徒圖之無貽後悔也滔雖不用其言亦嘉其盡言卒無疑貳凡出征伐必以怦總留後事及僭稱大冀王偽署怦為右僕射范陽留守及泚據京邑召滔南河至貝州挫敗而還兵甲盡喪怦聞滔將至悉蒐范陽兵甲夾道排列二十餘里以迎滔歸於府第人皆嘉怦忠義貞元元年滔卒三軍推怦權撫軍府事怦為衆所服卒有其地朝廷因授怦幽州大都督府長史兼御史大夫幽州盧龍節度副大使知節度事管內營田觀察押奚契丹經略盧龍軍使居位三月以貞元元年九月卒年五十九廢朝三日贈兵部尚書賜布帛有差子濟繼為幽州節度使濟怦之長子初母難產既產侍者初見濟是一大蛇黑氣勃勃莫不驚走及長頗異常童所居室焚人皆驚救濟從容而出衆異之累歷本管州縣牧宰及怦為節度使以濟兼御史中丞充行軍司馬怦卒軍人習河朔舊事請濟代父為帥朝廷姑務便安因而從之累加至檢校兵部尚書貞元五年遷左僕射充幽州節度使時烏桓鮮卑數寇邊濟率軍擊走之深入千餘里虜獲不可勝紀東北晏然貞元中朝廷優容藩鎮方甚兩河擅自繼襲者尤驕蹇不奉法惟濟最務恭順朝獻相繼德宗亦以恩禮接之尋加同中書門下平章事順宗即位再遷檢校司徒元和初加兼侍中及詔討王承宗諸軍未進濟獨率先前軍擊破之生擒三百餘人斬首千餘級獻逆將於闕優詔褒之又為詩四韻上獻以表忠憤之志明年春將大軍次瀛州累攻樂壽博陸安平等縣前後大獻俘獲賞功頗厚仍與子孫六品官者凡四人未幾有疾會赦承宗錄功拜兼中書令濟在鎮二十餘年雖輸忠款竟不入覲又謀殺其弟澭澭歸國為信臣及濟疾次子總與濟親吏唐弘實通謀酖殺濟數日乃發喪時年五十四詔贈太師廢朝三日賻禮有加諡曰莊武弟源貞元十六年八月為檢校工部尚書兼左武衞將軍初為涿州刺史不受兄教令濟奏之貶漠州參軍復不受詔濟帥師至涿州源出兵拒之未合而自潰濟擒源至幽州上言請令入覲故授官以徵之澭濟之異母弟也喜讀書工武藝輕財愛士得人死力事朱滔常陳逆順之理後怦為盧龍軍節度使病將卒澭在父側即以父命召兄濟自漠州至竟得授節度使濟常感澭奉己澭為瀛州刺史亦許以澭代己任其後濟乃以其子為副大使澭既怒濟遂請以所部西捍隴塞拔其所部兵一千五百人男女萬餘口直趨京師在道無一人犯令者德宗寵遇特授秦州刺史以普潤縣為理所及順宗傳位稱太上皇有山人羅令則詣澭言異端數百言皆廢立之事澭立命繫之令則又云某之黨多矣約以德宗山陵時伺便而動澭械令則送京師杖死之後錄功賜其額曰保義其軍蕃戎畏之不敢為寇常有復河湟之志議者壯之元和二年十二月卒總濟之第二子也性陰賊險譎元和五年濟奉詔討王承宗使長子緄假為副使領留務時總為瀛州刺史濟署為行營都兵馬使屯軍饒陽師久無功總潛伺其隙與判官張玘孔目官成國寶及帳內小將為謀使詐自京至曰朝廷以相公逗留不進除副大使為節度使矣明日又使人曰副大使旌節已到太原又使人走而呼曰旌節過代州舉軍驚恐濟驚惶憤怒不知所為因殺主兵大將數十人及與緄素厚者乃追緄以張玘兄臯代知留務濟自朝至日昃不食渴索飲總因置毒而進之濟死緄行至涿州總矯以父命杖殺之總遂領軍務朝廷不知其事因授以斧鉞累遷至檢校司空及王承宗再拒命總遣兵取賊武強縣遂駐軍持兩端以利朝廷供饋賞賜是時吳元濟尚存王承宗方跋扈易定孤危憲宗暫務姑息加總同中書門下平章事及元濟就擒李師道梟首王承宗憂死田弘正入鎮州總既無黨援懷懼每謀自安之計初總弒逆後每見父兄為祟甚慘懼乃於官署後置數百僧厚給衣食令晝夜乞恩謝罪每公退則憩于道場若入他室則忷惕不敢寐晚年恐悸尤甚故請落髮為僧冀以脫禍乃以判官張臯為留後總以落髮上表歸朝穆宗授天平軍節度使既聞落髮乃賜紫號大覺師總行至易州界暴卒輟朝五日贈太尉擇日備禮冊命賻絹布一千五百段米粟五百石先是元和初王承宗阻兵總父濟備陳征伐之術請身先之及出軍累拔城邑旋屬被病不克成功總既繼父願述先志且欲盡更河朔舊風長慶初累疏求入覲兼請分割所理之地然後歸朝其意欲以幽涿營州為一道請弘靖理之瀛州漠州為一道請盧士玫理之平薊媯檀為一道請薛平理之仍籍軍中宿將盡薦於闕下因望朝廷升奬使幽薊之人皆有希羨爵祿之意及疏上穆宗且欲速得范陽宰臣崔植杜元穎又不為久大經略但欲重弘靖所授而未能省其使局惟瀛漠兩州許置觀察使其他郡縣悉命弘靖統之時總所薦將校又俱在京師旅舍中久而不問如朱克融輩僅至假衣丐食日詣中書求官不勝其困及除弘靖又命悉還本軍克融輩雖得復歸皆深懷觖望其後果為叛亂總既以土地歸國授其弟約及男等一十一人領郡符加命服者五人升朝班佐宿衞者六人程日華定州安喜人本單名華父元皓事安祿山為帳下將從陷兩京頗稱勇力史思明時為定州刺史華少事本軍為張孝忠牙將初李寶臣授恆州節度吞削藩鄰有恆冀深趙易定滄德等八州寶臣既卒惟岳拒朝命以圖繼襲寶臣部將張孝忠以定州歸國授成德軍節度使令與朱滔討惟岳及惟岳誅朝廷以恆冀授王武俊深趙授康日知易定滄授張孝忠分為三帥時惟岳將李固烈守滄州孝忠令華詣固烈交郡固烈將歸真定悉取滄州府藏累乘而還軍人怒殺固烈皆奪其財相與詣華曰李使君貪鄙而死軍州請押牙權領不獲已從之孝忠因授華知滄州事未幾朱滔合武俊謀叛滄定往來艱阻二盜遂欲取滄州多遣人遊說又加兵攻圍華俱不聽從乘城自固久之錄事參軍李宇為華謀曰使君受圍累年張尚書不能致援論功獻捷須至中山所謂勞而無功者也請為足下至京師自以一州為使華即遣之宇入闕備陳華當二盜之間疲於矢石德宗深嘉之拜華御史中丞滄州刺史復置橫海軍以華為使尋加工部尚書御史大夫賜名日華仍歲給義武軍糧餉數萬自是別為一使孝忠唯有易定二州而已武俊遣人說華歸己華曰相公欲敝邑仍舊隸恆州且借騎二百以抗賊俟道路通即從命武俊喜即以二百騎助之華乃留其馬遣人皆還武俊怒其背約又以朱滔方攻圍慮為所有而止及武俊歸國河朔無事日華即遣所留馬還武俊別陳珍幣謝過武俊歡然而釋貞元四年卒贈兵部尚書子懷直懷直習河朔事父卒自知留後事朝廷嘉父之忠起復授檢校工部尚書兼御史大夫升橫海軍為節度以懷直為留後又於弓高縣置景州管東光景城二縣以為屬郡累加至檢校尚書右僕射五年起復正授節度觀察使懷直荒於畋獵數日方還不恤軍政軍士不勝寒餒其帳下將從父兄懷信因衆怒閉門不內懷直因來朝覲貞元九年也德宗優容之依前檢校右僕射兼龍武統軍賜安業里甲第妓女一人既而懷信死懷直子執恭知留後事乃遣懷直歸滄州十六年卒年四十九廢朝一日贈揚州大都督執恭代襲父位朝廷因而授之元和六年入朝憲宗禮遇遣之加尚書左僕射嘗夢滄州衙門樓額悉帖權字遂奏請改名權十三年淮西賊平藩方惕息權以父子世襲如三鎮事例心不自安乃請入朝十三年至京師表辭戎帥因命華州刺史鄭權代之以靖安里私第側狹賜地二十畝令廣其居尋遷檢校司空邠州刺史邠寧節度使十四年十一月卒贈司徒權兄弟子姪在朝列宿衞者三十餘人李全略者本姓王名日簡為鎮州小將事王武俊元和中節度使王承宗沒軍情不安自拔歸朝授代州刺史及長慶初鎮州軍亂殺田弘正穆宗為之旰食以日簡嘗為鎮將召問其計日簡遂於御前極言利害兼願有以自効因授德州刺史經略其事明年擢拜橫海軍節度使賜姓李氏名全略以崇樹之未幾令子同捷入侍兼進錢千萬踰歲同捷歸覲乃奏請授滄州長史知州事兼主中軍兵馬朝廷初不之許後慮其有奇策將副經略之旨遂從之及得請全略乃陰結軍士潛為久計外示忠順內蓄姦謀棣州刺史王稷善撫衆且得其心全略忌而殺之仍孥戮其屬凡所為事大率類此寶曆二年四月卒子同捷初為副大使居喪擅領留後事仍重賂藩鄰以求纘襲朝廷知其所為經年不問屬昭愍晏駕文宗即位同捷冀易世之後稍行恩貸即令母弟同志同巽入朝令掌書記崔長奉表備達懇誠請從朝旨詔授同捷檢校左散騎常侍兗州刺史兗海節度使以天平節度使烏重胤為滄州節度以代之詔下同捷託以三軍乞留拒命乃命烏重胤率鄆齊兵加討又詔徐帥王智興滑帥李聽平盧康志睦魏博史憲誠易定張璠幽州李載義等四面進攻同捷世行姦詐自以嘗在成德軍為將校燕趙之師可結為城社乃以玉帛子女賂河北三鎮以求旄鉞李載義初受朝命堅於効順乃囚同捷姪及所賂玉帛妓女四十七人表獻又表朝廷加載義左僕射王廷湊司徒以悅其心事廷湊本蓄狼心欲吞橫海乃出兵于境以赴同捷王智興師次棣州詔曰李同捷幸襲舊勳不思纘緒斬麻未幾私行墨縗毒殺忠良擾惑部校稽之國憲難逭常刑朕以頃在先朝已稽中旨實遵成命未議改圖乃由留務之權授以戎帥拔負海之陋置之中華推恩含垢斯亦至矣而同捷益懷迷執閉境練兵大詬鄰封拒捍中使遐邇憤怨中外驚嗟叛命既彰大義當絕事非獲已良用憮然其同捷在身官爵並宜削奪令諸軍進討俄而烏重胤卒授神策節度使李寰代重胤出師無功召還乃加王智興平章事充行營招撫使史憲誠遣大將丌志沼與子唐帥兵二萬五千攻德州大和二年九月智興收棣州因割隸淄青時諸軍在野朝廷特置供軍糧料使日費寖多兩河諸帥每有小捷虛張俘級以邀賞賚實欲困朝廷而緩賊也繒帛征馬賜之無算同捷既窘王廷湊援之不及乃令人誘丌志沼俾倒戈攻憲誠許以代為魏博節度志沼信其言而叛憲誠告難詔李聽以諸道兵攻之志沼敗奔于鎮州李寰赴闕又以李祐代為橫海節度三年三月詔諫議大夫柏耆軍前慰撫四月李祐收德州同捷乞降于祐祐疑其詐柏耆請以騎兵三百入滄州祐從之耆徑入滄州取同捷與其家屬赴京師其月二十六日至德州界諜言廷湊兵來劫篡耆乃斬同捷首傳而獻捷百僚稱賀同捷母孫妻崔兒元達等既獻詔悉宥之配於湖南安置史臣曰國家崇樹藩屏保界山河得其人則區宇以寧失其授則干戈勃起若懷仙之輩習亂河朔志深狡𢀿忠義之談罔經耳目以暴亂為事業以專殺為雄豪或父子弟兄或將帥卒伍迭相屠滅以成風俗斯乃王道寖微教化不及惜哉蒸民陷彼虎吻其間劉總粗貯臣誠然而殺父兄以圖榮落鬢髮而避禍未旋踵而暴卒他境斯謂報應之驗與贊曰國法不綱賊臣鴟張雖曰父子凶如虎狼惡稔族滅身屠地亡蠢茲伏莽汙我彝章
