body:
  text: 舊唐書卷八十五列傳第三十五唐臨孫紹張文瓘兄文琮從弟文收徐有功唐臨京兆長安人周內史瑾孫也其先自北海徙關中伯父令則開皇末為左庶子坐陷事太子勇誅死臨少與兄皎俱有令名武德初隱太子總兵東征臨詣軍獻平王世充之策太子引直典書坊尋授右衛率府鎧曹參軍宮殿廢出為萬泉丞縣有輕囚十數人會春暮時雨臨白令請出之令不許臨曰明公若有所疑臨請自當其罪令因請假臨召囚悉令歸家耕種與之約令歸繫所囚等皆感恩貸至時畢集詣獄臨因是知名再遷侍御史奉使嶺外按交州刺史李道彥等申叩冤繫三千餘人累轉黃門侍郎加銀青光祿大夫儉薄寡欲不治第宅服用簡素寬於待物嘗欲弔喪令家童自歸家取白衫家僮誤將餘衣懼未敢進臨察知之使召謂曰今日氣逆不宜哀泣向取白衫且止之也又嘗令人煮藥失制潛知其故謂曰陰暗不宜服藥宜即棄之竟不揚言其過其寬恕如此高宗即位檢校吏部侍郎其年遷大理卿高宗嘗問臨在獄繫囚之數臨對詔稱旨帝喜曰朕昔在東宮卿已事朕朕承大位卿又居近職以疇昔相委故授卿此任然為國之要在於刑法法急則人殘法寬則失罪務令折中稱朕意焉高宗又嘗親錄死囚前卿所斷者號叫稱冤臨所入者獨無言帝怪問狀囚曰罪實自犯唐卿所斷既非冤濫所以絕意耳帝歎息良久曰為獄者不當如此耶永徽元年為御史大夫明年華州刺史蕭齡之以前任廣州都督贓事發制付羣官集議及議奏帝怒令於朝堂處置臨奏曰臣聞國家大典在於賞刑古先聖王惟刑是卹虞書曰罪疑惟輕功疑惟重與其殺弗辜寧失弗經周禮刑平國用中典刑亂國用重典天下太平應用堯舜之典比來有司多行重法勳必須刻削論罪務從重科非是憎惡前人止欲自為身計今議蕭齡之事有輕有重重者流死輕者請除名以齡之受委大藩贓罪狼籍原情取事死有餘辜然既遣詳議終須近法竊惟議事羣官未盡識議刑本意律有八議並依周禮舊文矜其異於眾臣所以特制議法禮王族刑於隱者所以議親刑不上大夫所以議貴知重其親貴議欲緩刑非為嫉其賢能謀致深法今既許議而加重刑是與堯舜相反不可為萬代法高宗從其奏齡之竟得流於嶺外尋遷刑部尚書加金紫光祿大夫復歷兵部度支吏部三尚書顯慶四年坐事貶為潮州刺史卒官年六十所撰冥報記二卷大行於世兄皎武德初為秦府記室從太宗征討專掌書檄深見親待貞觀中累轉吏部侍郎先是選集無限隨到補職時漸太平選人稍眾皎始請以冬初一時大集終季春而畢至今行之歷遷益州長史卒贈太常卿子之奇調露中為給事中坐嘗為章懷太子僚屬徙邊文明元年起為括蒼令與徐敬業作亂伏誅臨孫紹博學善三禮神龍中為太常博士景龍二年韋庶人上言自妃主及命婦宮官葬日請給鼓吹中宗特制許之紹上疏諫曰竊聞鼓吹之樂本為軍容昔黃帝涿鹿有功以為警衛故棡鼓曲有靈夔吼鵰鶚爭石墜崖壯士怒之類自昔功臣備禮適得用之丈夫有四方之功以恩加寵錫假如郊天祀地誠是重儀惟有宮懸本無案據故知軍樂所備尚不洽於神祇鉦鼓之音豈能接於閨閫準式公主王妃已下葬禮惟有團扇方扇綵帷錦鄣之色加之鼓吹歷代未聞又準令五品官婚葬元無鼓吹惟京官五品得借四品鼓吹為儀令特給五品以上母妻五品官則不當給限便是班秩本因夫子儀飾乃復過之事非倫次難為定制參詳義理不可常行請停前敕各依常典疏奏不納紹尋遷左臺侍御史兼太常博士中宗將親拜南郊國子祭酒祝欽明等希旨皇后為亞獻紹與博士蔣欽緒固爭以為不可又則天父母二陵各置守戶五百人武三思及子崇訓墓各置守戶六十人以武氏外戚乃與昭陵禮同三思等復逾親王之制又上疏切諫當時雖皆不從深為議者所美睿宗即位又數陳時政損益累轉給事中仍知禮儀事先天二年冬今上講武於驪山紹以修儀注不合旨坐斬時今上既怒講武失儀坐紹於纛下右金吾將軍李邈遽請宣敕遂斬之時人既痛惜紹而深咎於邈尋有敕罷邈官遂擯廢終其身張文瓘貝州武城人大業末徙家魏州之昌樂瓘幼孤事母兄以孝友聞貞觀初舉明經補幷州參軍時英國公李勣為長史深禮之累遷水部員外郎時兄文琮為戶部侍郎舊制兄弟不許並居臺閣遂出為雲陽令龍朔年累授東西臺舍人參知政事尋遷東臺侍郎同東西臺三品兼知左史事時初造蓬萊上陽合璧等宮又征討四夷馬有萬匹倉庫漸虛文瓘因進諫曰人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宮室使土崩瓦解戶口減半臣聞制化於未亂保邦於未危人罔常懷懷於有仁陛下不制於未亂之前安能救於既危之後百姓不堪其弊必構禍難殷鑒不遠近在隋朝臣願稍安撫之無使生怨上深納其言於是節減馬數千匹賜文瓘繒錦百段咸亨三年官名復舊改授黃門侍郎兼太子左庶子俄遷大理卿依舊知政事文瓘至官旬日決遣疑事四百餘條無不允當自是人有抵罪者皆無怨言文瓘嘗有疾繫囚相與齋禱願其視事當時咸稱其執法平恕以比戴冑上元二年拜侍中兼太子賓客大理諸囚聞文瓘改官一時慟哭其感人心如此文瓘性嚴正諸司奏議多所糾駁高宗甚委之或時臥疾在家朝廷每有大事上必問諸宰臣曰與文瓘議未奏云未者則遣共籌之奏云已議者皆報可從之其後新羅外叛高宗將發兵討除時文瓘疾病在家乃輿疾請見奏曰比為吐蕃犯邊兵屯寇境新羅雖未即順師不內侵若東西俱事征討臣恐百姓不堪其弊請息兵修德以安百姓高宗從之儀鳳二年卒年七十三贈幽州都督諡曰懿以其經事孝敬皇帝特敕陪葬恭陵四子潛沛洽涉中宗時潛官至魏州刺史沛同州刺史洽衛尉卿涉殿中監父子兄弟五人皆至三品官時人謂之萬石張家及韋溫等被誅之際涉為亂兵所殺兄文琮貞觀中為持書侍御史三遷亳州刺史為政清簡百姓安之永徽初表獻太宗文皇帝頌優制褒美賜絹百匹徵拜戶部侍郎從母弟房遺愛以罪貶授房州刺史文琮作詩祖餞及遺愛誅坐是出為建州刺史州境素尚淫祀不修社稷文琮下教書曰春秋二社蓋本為農惟獨此州廢而不立禮典既闕風俗何觀近年已來田多不熟抑不祭先農所致乎神在於敬何以邀福於是示其節限條制百姓欣而行之尋卒文集二十卷子戩官至江州刺史撰喪儀纂要七卷行於時戩弟錫則天時為鳳閣侍郎同鳳閣鸞臺平章事先是姊子李嶠知政事錫拜官而嶠罷相出為國子祭酒舅甥相代為相時人榮之錫與鄭杲俱知天官選事坐贓則天將斬之以徇臨刑而特赦之中宗時累遷工部尚書兼修國史尋令於東都留守中宗崩韋庶人臨朝詔錫與刑部尚書裴談並同中書門下三品旬日出為絳州刺史累封平原郡公以年老致仕而卒文琮從父弟文收隋內史舍人虔威子也尤善音律嘗覽蕭吉樂譜以為未甚詳悉更博採羣言及歷代沿革裁竹為十二律吹之備盡旋宮之義時太宗將創制禮樂召文收於太常令與少卿祖孝孫參定雅樂太樂有古鍾十二近代惟用其七餘有五俗號啞鍾莫能通者文收吹律調之聲皆響徹時人咸服其妙尋授協律郎十一年文收表請釐正太樂上謂侍臣曰樂本緣人人和則樂和至如隋煬帝末年天下喪亂縱令改張音律知其終不和諧若使四海無事百姓安樂音律自然調和不藉更改竟不依其請十四年景雲見河水清文收採朱雁天馬之義制景雲河清樂名曰燕樂奏之管絃為樂之首今元會第一奏者是也咸亨元年遷太子率更令卒官撰新樂書十二卷徐有功國子博士文遠孫也舉明經累轉蒲州司法參軍紹封東莞男為政寬仁不行杖罰吏人感其恩信遞相約曰若犯徐司法杖者眾必斥罰之由是人爭用命終於代滿不戮一人載初元年累遷司刑丞時酷吏周興來俊臣丘神勣王弘義等構陷無辜皆抵極法公卿震恐莫敢正言有功獨存平恕詔下大理者有功皆議出之前後濟活數十百家常於殿庭論奏曲直則天厲色詰之左右莫不悚慄有功神色不撓爭之彌切尋轉秋官員外郎轉郎中俄而鳳閣侍郎任知古冬官尚書裴行本等七人被構陷當死則天謂公卿曰古人以殺止殺我今以恩止殺就羣公乞知古等錫以再生各授以官佇申來效俊臣張知默等又抗表請申大法則天不許之俊臣乃獨引行本重驗前罪奏曰行本潛行悖逆告張知謇與廬陵王反不實罪當處斬有功駁奏曰俊臣乖明主再生之賜虧聖人恩信之道為臣雖當嫉惡然事君必將順其美行本竟以免死道州刺史李仁褒及弟榆次令長沙又為唐奉一所構高宗末私議吉凶謀復李氏將誅之有功又固爭之不能得秋官侍郎周興奏有功曰臣聞兩漢故事附下罔上者腰斬面欺者亦斬又禮云析言破律者殺有功故出反囚罪當不赦請推按其罪則天雖不許繫問然竟坐免官久之起為左臺侍御史則天特褒異之時遠近聞有功授職皆欣然相賀有功嘗上疏論天官秋官及朝堂三司理匭使愆失其略曰陛下即位已來海內職員一定而天下選人漸多掌選之曹用捨不平補擬乖次囑請公行顏面罔懼遂使囂謗滿路怨讟盈朝浸以為常殊無愧憚又往屬唐朝季年時多逆節鞫訊結斷刑獄至嚴革命以來載祀遽積餘風未殄用法猶深今推鞫者猶行酷法妄劾斷臣即按驗奏而劾之獲其枉狀請即付法斷罪亦奪祿貶考以慙其德其三司受表及理匭申冤使不速與奪致令擁塞有理不為申者亦望準前彈奏貶考奪祿臣昔處法司緣蒙擢用臣無以上答至造願以執法酬恩無縱詭隨不避強禦猛噬鷙擊是臣之分如蒙允納請降敕施行庶不越旬時亦可以除殘革弊刑措不用天下幸甚後潤州刺史竇孝諶妻龐氏為奴誣告云夜解祈福則天令給事中薛季昶鞫之季昶鍛鍊成其罪龐氏當坐斬有功獨明其無罪而季昶等返陷有功黨援惡逆奏付法法司結刑當棄市有功方視事令史垂泣以告有功曰豈吾獨死而諸人長不死耶乃徐起而歸則天覽奏召有功詰之曰卿比斷獄失出何多對曰失出臣下之小過好生聖人之大德願陛下弘大德則天下幸甚則天默然於是龐氏減死流於嶺表有功除名為庶人尋起為左司郎中累遷司刑少卿有功謂所親曰今身為大理人命所懸必不能順旨詭辭以求苟免故前後為獄官以諫奏枉誅者三經斷死而執志不渝酷吏由是少衰時人比漢之于張焉或曰若獄官皆然刑措何遠久之轉司僕少卿長安二年卒年六十二贈司刑卿中宗即位制曰忠正之臣自昔攸尚褒贈之典舊章所重故贈大理卿徐有功節操貞勁器懷亮直徇古人之志業實一代之賢良司彼刑書深存敬慎周興來俊臣等性惟殘酷務在誅夷不順其情立加誣害有功卓然守法雖死不移無屈撓之心有忠烈之議當其執斷並遇平反定國釋之何以加此朕惟新庶政追想前跡其人既歿其德可稱追往贈終慰茲泉壤可贈越州刺史仍遣使就家弔祭賜物百段授一子官今上踐祚竇孝諶之子希瑊等請以身之官爵讓有功子惀以報舊恩惀由是自太子司議郎恭陵令累遷申王府司馬卒史臣曰文法理具之大者故舜命臯陶為士昌言誡敕勤亦至焉蓋人命所懸一失其平冤不可復聖王所以疚心也如臨之守法文瓘之議刑時屬哲王可以理奪當賊后遷鼎之際酷吏羅織之辰徐有功獨抗羣邪持平不撓此所以為難也比釋之定國徐又過之希瑊讓爵酬恩可知遺愛贊曰聽訟惟明持法惟平二者或爽人何以生猗歟徐公獬豸之精世皆紛濁不改吾清
