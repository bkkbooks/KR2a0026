body:
  text: 舊唐書卷十三本紀第十三德宗下貞元四年春正月庚戌朔上御丹鳳樓制曰朕以菲薄託於王公之上恭承天地之序虔奉祖宗之訓遐想至理思臻大和而誠不感物化不柔遠聲教猶鬱征賦仍繁頃者務於安人不憚屈己與西蕃結好申以齊盟而戎心不厭背義虧信劫脅士庶屢犯封疆元元何辜皆朕之失乃者輦轂之下兇狂結構上帝垂祐悉自伏誅刑以止殺諒非獲已今三陽布和萬物資始思與羣公兆庶惟新政理宜敷在宥之澤以覃作解之恩可大赦天下大辟已下罪咸赦除之是日質明含元殿前階基欄檻壞損三十餘間壓死衞士十餘人京師地震辛亥又震壬子又震壬戌以左龍武大將軍王栖曜為麟州刺史鄜坊丹延節度使丁卯京師地震戊辰又震庚午又震以宣武軍行營節度使劉昌為涇州刺史四鎮北庭行軍涇原等州節度使癸酉京師地震甲戌以華州潼關節度使李元諒兼隴右節度使臨洮軍使乙亥地震金房尤甚江溢山裂廬舍多壞居人露處陳留雨木如大指長寸餘有孔通中下而植於地凡十里許辛巳李泌以京官俸薄請取中外給用除陌錢及闕官俸外一分職田額內官俸及刺史執刀司馬軍事等錢令戶部別庫貯之以給京官月俸令御史中丞竇參專掌之歲得錢三百萬貫謂之戶部別處錢朝臣歲支不過五十萬常有二百餘萬以資國用壬午地震甲申又震乙酉又震丙申又震甲辰太僕郊牛生犢六足又豕生兩首四足築延喜門北複道屬永春門涇原劉昌復築連雲堡戊辰鹿入京師市門甲寅地震宴羣臣於麟德殿設九部樂內出舞馬上賦詩一章羣臣屬和己未地震丁卯有司條奏省官其左右常侍太子賓客請依前置四員從之庚午地震詔涇原劉昌於平涼會盟所收被害將士骸骨葬於淺水原為二冢立石堠志之題曰懷忠冢辛未地震中書省梧樹有鵲以泥為巢癸巳以太子左庶子暢悅為桂管觀察使改左右射生為左右神威軍福建兵亂逐觀察使吳詵丁未隴右李元諒築良原城丁巳右龍武統軍張伯儀卒辛酉以吉州刺史張庭為安南都護本管經略使升鄆州為大都督府壬戌加置諫議大夫八員分中書四員為右門下四員為左檢校左庶子蕭復卒於饒州丙寅地震丁卯又震月犯歲星辛未太子賓客吳湊為福建觀察使乙亥熒惑歲鎮三星聚營室凡二十日是月吐蕃寇涇邠寧慶鄜等州焚彭原縣邊將閉城自固賊驅人畜三萬計凡二旬而退吐蕃入寇以秋冬今盛暑而來華人陷蕃者道之也六月丁丑鄂岳觀察使李竦卒乙酉以尚書左丞杜祐為陝州長史陝虢觀察使徵夏縣處士先除著作郎陽城為諫議大夫城以褐衣詣闕上賜之章服而後召乙丑桂管都防禦觀察使暢悅卒乙未以諫議大夫何士幹為鄂岳沔蘄黃等州都團練觀察使乙亥封皇子皇弟邕王謜等七人為王兼卿監祭酒等官癸卯熒惑退行入羽林秋七月庚戌以左金吾將軍張獻甫為邠寧節度使陳許防禦兵馬使韓全義檢校工部尚書充長武城及諸軍行營節度使癸丑邠寧軍因韓遊瓌受代憚張獻甫之嚴乘其無帥縱兵大掠仍脅監軍楊明義奏請范希朝為帥都虞候楊朝晟斬其亂首二百餘人方定朝命仍以希朝副獻甫己未奚室韋寇振武軍壬戌詔以太尉中書令西平郡王李晟長子愿為銀青光祿大夫太子賓客賜勳上柱國與晟門並列戟乙丑以前撫州刺史戴叔倫為容州刺史兼御史中丞本管經略使丁丑以兵部尚書崔漢衡為晉州刺史晉慈隰觀察使壬申詔嗣王郡王朝會班位在本官班之上左右庶子准令左右丞侍郎之下諸司四品之上今在少卿之下非也宜改之乙亥以蘇州刺史孫晟為桂州刺史桂管觀察使荊河自陝州至河陰水色如墨流入汴口至汴州一宿而復又汴鄭管內烏皆入田緒李納之境銜柴為城方十餘里高二三尺緒納惡而去之信宿復如之烏口皆流血八月以權判吏部侍郎吉中孚為中書舍人乙酉檢校司徒兼太子太師汧國公李勉薨甲午京師地震其聲如雷九月丙午詔比者卿士內外左右朕躬朝夕公門勤勞庶務今方隅無事烝庶小康其正月晦日三月三日九月九日三節日宜任文武百僚選勝地追賞為樂每節宰相及常參官共賜錢五百貫文翰林學士一百貫文左右神威神策等軍每廂共賜錢五百貫文金吾英武威遠諸衞將軍共賜錢二百貫文客省奏事共賜錢一百貫文委度支每節前五日支付永為常式戊申晉慈隰觀察使崔漢衡加都防禦使名癸丑賜百僚宴於曲江亭仍作重陽賜宴詩六韻賜之羣臣畢和上品其優劣以劉太真李紓為上等鮑防于邵為次等張濛殷亮等二十人又次之唯李晟馬燧李泌三宰相之詩不加優劣庚申吐蕃寇邠寧坊等州冬十月詔中書門下選常參官曾為牧宰有理行者以名聞宰臣奏于頎董晉等十二人前任有治迹詔頎等於左右丞廳各言政要左右丞條奏上乃御宣政殿親試其言而後用之丙戌以右神策將軍李長榮為河陽三城懷州團練使仍賜名元戊子迴紇公主將妾媵六十餘人馬二千匹來迎咸安公主命刑部尚書關播送公主歸蕃十二月辛巳少府監李觀卒五年春正月壬辰朔乙卯詔四序嘉辰歷代增置漢崇上巳晉紀重陽或說禳除雖因舊俗與衆共樂咸合當時朕以春方發生候及仲月勾萌畢達天地和同俾其昭蘇宜助暢茂自今宜以二月一日為中和節以代正月晦日備三令節數內外官司休假一日宰臣李泌請中和節日令百官進農書司農獻穜稑之種王公戚里上春服士庶以刀尺相問遺村社作中和酒祭勾芒以祈年穀從之丁卯右散騎常侍宜城縣子柳渾卒二月己丑貶京兆尹鄭叔則為永州長史戊戌以滄景留後程懷直為滄景觀察使庚子以大理卿董晉為門下侍郎同中書門下平章事以御史中丞竇參為中書侍郎平章事兼轉運使以戶部侍郎班宏為戶部尚書依前度支轉運副使三月甲辰中書侍郎同平章事李泌卒乙卯以兵部郎中姚南仲為御史中丞司農卿薛王玉為京兆尹以大理卿李速為黔州刺史黔州觀察使癸亥以資州刺史龐復為安南都護本管經略使丙寅貶禮部侍郎劉太真為信州刺史以給事中杜黃裳為河南尹戊辰詔以李懷光外孫燕八八為左衞率府冑曹參軍賜姓名曰李承緒仍賜錢千貫俾自營居業夏四月乙未以太子少師蕭昕為工部尚書致仕給半祿料永為常式初致仕官只給半祿無料上加之以待老臣半料自昕始也五月戊辰宋州麥一莖九岐者百餘本六月乙未以光祿卿裴腆為桂管觀察使秋七月以嗣滕王湛然為太子賓客入迴紇使八月辛未以同州刺史竇覦為戶部侍郎九月壬戌詔以褚遂良已下至李晟等二十七人圖形於凌煙閣以繼國初功臣之像冬十月丙午西川韋臯奏與東蠻合力大破吐蕃於故巂州擒其將臧遮遮自是吐蕃挫銳竟復巂州庚午百僚請復徽號不允己丑易定節度使檢校司空平章事張孝忠以擅出兵襲蔚州降檢校司空為左僕射桂管觀察御史中丞孫晟卒癸巳以戶部侍郎竇覦為揚州長史兼御史大夫淮南節度使十二月庚午迴紇汨咄祿長壽天親毘伽可汗卒辛未以淮南節度使杜亞為東都留守畿汝州都防禦使兵部侍郎裴諝為河南尹司農卿李翼為陝虢都防禦觀察使壬申以陝虢觀察使杜祐檢校禮部尚書兼揚州長史淮南節度使六年春正月戊辰朔戊申大雪二月戊辰朔百僚會宴於曲江亭上賦中和節羣臣賜宴七韻是日百僚進兆人本業三卷司農獻黍粟各一斗岐州無憂王寺有佛指骨寸餘先是取來禁中供養乙亥詔送還本寺丙戌以中書舍人陸贄權兵部侍郎甲午以吏部侍郎劉滋為吏部尚書丁酉王武俊守棣州將趙鎬以郡歸李納武俊怒以兵攻之三月庚子百僚宴于曲江亭上賦上巳詩一篇賜之壬寅渾瑊自河中來朝戊午牂柯蠻來朝甲子以旱日色如血無光夏四月甲辰大風雷閏月庚申太白辰星聚東井戊午始雨五月丙寅朔上御紫宸受朝上以是月一陰生臣子道長父子必以是朔面焉故取朔日受朝壬午以寧州刺史范希朝為單于大都護麟勝節度使是夏淮南浙東西福建等道旱井泉多涸人渴乏疫死者衆秋七月丙寅淮南節度使竇覦卒癸酉復呼親王母曰太妃公主母曰太儀八月丁未工部尚書致仕鮑防卒九月乙丑收諸道進奏院官印悉毀之己卯詔十一月八日有事於南郊太廟行從官吏將士等一切並令自備食物其諸司先無公廚者以本司闕職物充其王府官度支量給廩物其儀仗禮物並仰御史撙節處分冬十月己亥文武百僚京城道俗抗表請徽號上曰朕以春夏亢旱粟麥不登朕精誠祈禱獲降甘雨既致豐穰告謝郊廟朕倘因禋祀而受徽號是有為為之勿煩固請也辛亥迴紇弔祭使鴻臚卿郭鋒復命迴紇遣達北勒梅錄將軍來告九姓迴紇登里邏沒密施俱錄忠貞毘伽可汗之喪十一月庚午日南至上親祀昊天上帝於郊丘禮畢還宮御丹鳳樓宣赦見禁囚徒減罪一等立仗將士及諸軍兵賜十八萬段匹今後刺史縣令以四考為限青州李納以棣州還王武俊幷其兵士三千是歲吐蕃陷我北庭都護府節度使楊襲古奔西州迴紇大相頡干迦斯紿襲古請合軍收復北庭乃殺襲古安西因是阻絕唯西州猶固守之迴紇亦為吐蕃所逼取浮圖川乃遷部落羊馬於牙帳之南以避之七年春正月壬戌朔己巳襄王僙薨庚辰以湖南觀察使裴冑為洪州刺史江西觀察使以常州刺史李衡為潭州刺史湖南觀察使蔡州置汝南縣黑衣大食遣使朝貢以中書舍人韓臯為御史中丞二月己巳涇原帥劉昌復築平涼城城去故原州一百五十里本原之屬縣地當禦戎之衝要昌復浹辰而功畢分兵戍之邊患稍弭庚子侍中渾瑊自河中來朝三月辛酉陳許節度使曲環奏請權停當道冗官待一二年後民力稍給則復之壬戌左龍武統軍戴休顏卒甲子涇原節度使劉昌築胡谷堡改名彰義堡堡在平涼西三十五里亦禦戎之要地壬申詔頃來賜衣文彩不常非制也朕今思之宜有定制節度使宜以鶻銜綬帶觀察使宜以鴈銜威儀威儀瑞草也關輔牛疫死十亡五六上遣中使以諸道兩稅錢買牛散給畿民無牛者辛巳詔神威神策六軍將士自相訟軍司推劾與百姓相訟委府縣推劾小事移牒大事奏取處分軍司府縣不得相侵癸未義武軍節度使檢校司空平章事張孝忠卒夏四月庚子太子少師致仕蕭昕卒汴州獻白烏戊午詔仲夏之時萬物敷暢陽德方茂陰事始承昔者觀于法象因天地交會之序為父子相見之儀沿習成風古今不易王者制事在於因人酌其情而用中順其俗以為禮咸覿之義既行於父子之間資事之情豈隔於君臣之際申恩卿士自我為初起今年五月朔御正殿召見文武百官外官因朝奏咸聽就列仍編禮式以為常典己未安南首領杜英翰叛攻都護府都護高正平憂死五月庚申朔上御宣政殿見百官從新制也辛未置柔遠軍於安南都護府甲申端王遇薨許州獻白烏戊子以衡州刺史齊映為桂管觀察使六月庚子朔乙巳太常卿崔縱卒秋七月庚午以信州刺史鄭叔則為福建觀察使癸酉上幸章敬寺賦詩九韻皇太子與羣臣畢和題之寺壁戊寅以邕王謜為義武軍節度使易定觀察等大使以定州刺史張昇雲為留後庚辰以虔州刺史趙昌為安南都護經略招討使八月己丑以翰林學士歸從敬為工部尚書甲午給事中鄭瑜為中書舍人丙申貶宗正卿李翰為雅王傅翰林學士陸贄為兵部侍郎罷學士庚戌夏州奏開延化渠引烏水入庫狄澤溉田二百頃九月庚申兵部尚書致仕馬炫卒冬十月癸丑每御延英令諸司官長二人奏本司事尋又敕常參官每一日二人引對訪以政事謂之巡對十一月乙丑令常參官趨朝入閣不得奔走周親已下喪者禁慘服朝會須服本色綾袍金玉帶丁酉以前福建觀察使吳湊為陝州長史陝虢觀察使是冬無雪八年春正月丙辰朔癸酉罷桂管經略招討使二月丁亥許州人李狗兒持杖入含元殿擊欄檻又格擒者誅之庚子京師雨土己酉吏部尚書李紓卒乙丑山南東道節度使檢校戶部尚書嗣曹王臯薨庚午宣武軍節度使司徒平章事劉玄佐卒癸酉劍南西川節度使韋臯奏請有當道閑員官吏增其俸祿從之己亥以湖南觀察使李衡為洪州刺史江西觀察使襄州軍亂掠府庫民財殆盡都將徐誠斬其亂首楊清潭方止丙子以荊南節度使樊澤為襄州刺史山南東道節度使以江西觀察使裴冑為江陵尹荊南節度使以戶部尚書班宏判度支戶部侍郎張滂為諸道鹽鐵轉運使己卯以陝虢觀察使吳湊為汴州刺史宣武軍節度汴宋等州觀察使辛巳以同州刺史姚南仲為陝虢觀察使壬午以左庶子李充為京兆尹以蘇州刺史齊抗為潭州刺史湖南觀察使夏四月丁丑貶左金吾大將軍嗣虢王則之為昭州司馬左諫議大夫知制誥吳通玄為泉州司馬給事中竇申道州司馬戊子以雅王傅李翰為金吾衞大將軍翰前為竇參所惡貶官至是參敗上遽召翰口授將軍便令金吾仗上事翌日除書方下庚寅以汴州長史劉士寧為汴州刺史宣武軍節度使時吳湊行次汜水聞其有變而還乙未貶中書侍郎平章事竇參為郴州別駕竇申景州司戶尋杖殺申諸竇皆貶以尚書左丞趙憬兵部侍郎陸贄為中書侍郎同中書門下平章事丁酉韋臯請十二而稅以給官吏從之丙午以東都河南淮南江南嶺南山南東道兩稅等物令戶部侍郎張滂主之以河內河東劍南山南西道等財戶部尚書判度支班宏主之一遵大曆故事如劉晏韓滉分掌焉給事中韋夏卿左遷常州刺史坐交諸竇也是月吐蕃寇靈州五月乙卯朔上御宣政殿受朝丙辰初增稅京兆青苗畝三錢以給掌閑彍騎戊午以光祿少卿崔穆為黔州觀察使己未大風吹壞廬舍門闕丙寅以大理卿王翃為福建觀察使戊辰初令授臺省官者各具舉主於授官詔先是郎官缺左右丞舉之御史缺大夫中丞舉之詔書不具所舉及趙憬陸贄為相建議郎官不宜專於左右丞宜令尚書丞郎各舉其可詔書具所舉官名御史亦如之異日考殿最以舉主能否從之癸酉平盧淄青節度使檢校司徒平章事李納卒癸未前太僕少卿劉士幹有罪賜死劉玄佐養子也六月吐蕃寇涇州秋七月甲寅朔戶部尚書判度支蕭國公班宏卒以桂管觀察使齊映為洪州刺史江西觀察使以翰林學士歸崇敬為兵部尚書致仕辛巳大雨八月乙丑以天下水災分命朝臣宣撫賑貸河南河北山南江淮凡四十餘州大水漂溺死者二萬餘人辛卯以青州刺史李師古為鄆州大都督府長史平盧淄青等州節度觀察海運陸運押新羅渤海兩蕃等使丁未詔以歲凶罷九日賜宴九月丁巳韋臯攻吐蕃之維州獲蕃將論莽熱以獻貶太子賓客于邵江州別駕尋卒乙亥以太子賓客薛王玉為嶺南節度使冬十月己亥追封故皇弟遐為均王庚戌復命金吾置門藉十一月壬子朔日有蝕之己巳貶右庶子姜公輔泉州別駕嚴震奏破吐蕃於芳州壬申詔自今死刑勿決先杖十二月庚寅詔賜遭水縣乏絕戶米三十萬石丁未以給事中李巽為潭州刺史湖南觀察使閏月癸酉門下省奏郵驛條式應給紙券除門下外諸使諸州不得給往還券至所詣州府納之別給俾還朝常參官在外除授及分司假寧往來並給券從之甲戌牂柯室韋靺鞨皆遣使朝貢九年春正月庚辰朔朝賀畢上賦退朝觀仗歸營詩乙酉劍南東川節度使王叔邕來朝癸卯初稅茶歲得錢四十萬貫從鹽鐵使張滂所奏茶之有稅自此始也甲辰禁賣劍銅器天下有銅山任人採取其銅官買除鑄鏡外不得鑄造二月庚戌朔先是宰相以三節賜宴府縣有供帳之弊請以宴錢分給各令諸司選勝宴會從之是日中和節宰相宴于曲江亭諸司隨便自是分宴焉易定留守張昇雲為義武軍節度使辛酉詔復築鹽州城貞元三年城為吐蕃所毀自是塞外無堡障犬戎入寇既城之後邊患息焉三月己亥以駕部郎中知制誥張式為虢州刺史夏四月辛酉地震有聲如雷河中關輔尤甚壞城壁廬舍地裂水涌五月庚申廢諸州府執刀甲辰以義成軍節度使檢校右僕射賈耽為左僕射同中書門下平章事以尚書左丞盧邁本官同平章事以鄭州刺史李融為滑州刺史義成軍節度使乙巳韋臯奏遣軍出西山破吐蕃峨和城定廉城通鶴軍凡平堡五十餘所是日以蕃俘器仗來獻丙戌以門下侍郎平章事董晉為禮部尚書罷知政事甲寅加韋臯檢校右僕射以司農少卿裴延齡為戶部侍郎判度支庚申以給事中李衡為戶部侍郎諸道鹽鐵轉運使秋七月乙未敕縣令以四考為限無替者宜至五考庚子以信州刺史孫公器為邕管經略使故事宰相秉筆決事每人十日一易至是賈耽趙憬陸贄盧邁同平章政事百僚有所關白更相讓而不言始詔令旬日秉筆後詔每日更秉筆劍南西山羌女國王湯立志哥鄰王董臥庭白狗王羅陀怱弱水王董避和逋租王弟鄧告知南水王姪尚悉曩等六國君王自來朝貢六國初附吐蕃韋臯出西山討吐蕃故六蠻內附各授官秩遣之八月庚戌太尉中書令西平郡王李晟薨贈太師廢朝五日己巳皇太子長男廣陵王淳納妃郭氏九月己卯罷九日宴以太師晟喪也冬十月己酉侍中馬燧對于延英燧足疾詔令不拜行仆於地命宦者扶持之上謂之曰前日卿與太尉晟俱來今公獨至因歔欷泣下及燧退上送及階癸酉環王國獻犀牛上令見于太廟十一月乙酉日南至上親郊圓丘是日還宮御丹鳳樓制曰朕以寡德祗膺大寶勵精理道十有五年夙夜惟寅罔敢自逸小大之務莫不祗勤皇靈懷顧宗社垂祐年穀豐阜荒服會同遠至邇安中外咸若永惟多祐實荷玄休是用虔奉禮章躬薦郊廟克展因心之敬獲申報本之誠慶感滋深悚惕惟勵大福所賜豈獨在予思與萬方均其惠澤可大赦天下辛卯華州潼關鎮國軍隴右節度使李元諒卒於良原以其部將阿史那統元諒之衆戍良原壬寅河南尹東都留守裴諝卒甲辰制以冬薦官宜令尚書丞郎於都堂訪以理術試時務狀考其通否及歷任考課事迹定為三等幷舉主姓名仍令御史一人為監試如授官後政事能否委御史臺觀察使以聞而殿最舉主十二月丙午朔制今後使府判官副使行軍已下使罷後如是檢校試五品以上官不合集於吏部選任準罷使郎官御史例冬季聞奏丙辰宣武軍亂逐節度使劉士寧壬戌以通王諶為宣武軍節度使以宣武軍節度副使李萬榮為汴州刺史宣武軍節度汴宋等州觀察留後朔方靈鹽節度副大使太子少師檢校左僕射餘姚郡王杜希全卒十年春正月乙亥朔乙酉以虔王諒為朔方靈鹽豐節度大使以朔方等道行軍司馬李欒為留後壬辰南詔異牟尋大破吐蕃於神川使來獻捷己亥昭義節度使檢校司空平章事李抱真請降官乃授檢校左僕射時抱真病巫祝言宜降爵故有是請二月丙午以瀛州刺史劉澭為秦州刺史隴右經略軍使理普潤縣仍以普潤軍為名乙卯以給事中齊抗為河南尹乙丑義成軍節度使鄭滑觀察使李融卒丁卯詔君臣之際義莫重焉每聞薨殂良深悼惻應文武朝臣薨卒者其月俸料宜全給仍更准本官一月俸料以為賻贈三月乙亥黃霧四塞日無光以華州刺史李復為滑州刺史義成軍節度使滄州程懷直來朝賜安業坊宅妓一人復令還鎮庚辰南詔異牟尋攻收吐蕃鐵橋已東城壘一十六擒其王五人降其民衆十萬口壬申以同州刺史盧徵為華州刺史潼關防禦鎮國軍等使辛丑以延州刺史李如暹所部蕃落賜名曰安塞軍以如暹為軍使夏四月戊辰地震癸丑復震恆州奏見巨人迹以雲南告捷使高細龍為左武衞將軍是月太白晝見有大鳥飛集宮中食雜骨是春霖雨罕有晴日六月壬寅朔昭義軍節度使檢校左僕射同中書門下平章事義陽王李抱真卒詔以其將王延貴權知昭義軍事癸丑以祠部郎中袁滋兼御史中丞為冊南詔使甲寅以辰州刺史房孺復為容管經略使丙寅韋臯奏西山峨和城擊破吐蕃城柵斬首二千八百級庚午度支使裴延齡兼靈鹽等州鹽池井榷使辛未晦有水鳥集於左藏庫是夜暴雨大風折木秋七月壬申朔以邕王謜為昭義軍節度使以昭義軍押衙王延貴為潞府左司馬充昭義節度留後賜名虔休抱真別將權知洺州事元誼不悅虔休為留後據洺州叛陰結田緒庚辰賜南詔異牟尋金印銀窠其文曰貞元冊南詔印先是吐蕃以金印授南詔韋臯因其舊而請之汴州軍亂攻節度留後李萬榮不勝而潰萬榮悉捕斬其孥己亥前汴州節度使劉士寧宜於郴州安置欽州守鎮黃少卿叛攻邕管經略使孫公器又陷欽橫潯貴等州吐蕃大將論乞髯陽沒藏悉諾硉以其家內附授歸義將軍因置四品已下武官以授四夷歸附者仍定懷化大將軍已下俸錢九月辛未朔以袁州刺史董鎮為邕管經略使戊子賜百僚九日宴上賦詩賜之辛卯南詔獻鐸槊浪人劍吐蕃印八紐戊戌定州張昇雲改名茂昭冬十月癸卯御宣政殿試賢良方正能直言極諫等舉人壬戌刑部尚書劉滋卒十一月乙酉諸道鹽鐵轉運使張滂為衞尉卿以浙西觀察使王緯為諸道鹽鐵轉運使庚寅秘書監致仕穆寧卒十二月庚子朔壬戌貶中書侍郎平章事陸贄為太子賓客十一年春正月庚午朔乙亥嶺南節度使薛王玉卒乙未以秘書少監王礎為黔中經略觀察使衞尉少卿武少儀為邕管經略使丙申以邕管經略使王鍔為廣州刺史嶺南節度使二月癸卯以衢州刺史李若初為福建觀察使乙巳冊渤海大欽茂之子嵩為渤海郡王忽汗州都督乙卯於涇州彰信堡置潘原縣甲子九姓迴紇骨咄祿毘伽奉誠可汗卒三月庚午司徒兼侍中馬燧以疾請罷侍中不許辛未賜宰臣兩省供奉官宴於曲江亭乙丑以吏部侍郎鄭瑜為河南淮南水陸轉運使丙申諸州準例薦隱居丘園不求聞達蔡廣成等九人各授試官令給公乘到京日量才用夏四月旱壬戌貶太子賓客陸贄為忠州別駕京兆尹李充信州長史衞尉卿張滂汀州長史癸亥以兵部侍郎韓臯為京兆尹甲子賜南詔敕書始列中書三官奉宣行復舊制也丙寅幽州劉濟奏大破奚王啜剌等六萬餘衆五月丁卯朔庚午命有司慮囚旱故也丁丑以宣武留後李萬榮為汴州刺史宣武節度副使知節度事以昭義軍節度留後王休為潞州大都督府長史昭義軍節度副大使知節度事管內度支營田潞澤磁邢洺觀察使又以朔方留後李欒為靈州大都督府長史朔方靈鹽豐夏四州受降定遠城天德軍節度副大使知節度事管內度支營田觀察押蕃落等使甲申河東節度使檢校工部尚書太原尹李自良卒庚寅遣使冊九姓迴紇騰里羅羽錄沒密施合胡六骨咄祿毘伽懷信可汗癸巳以通王諶為河東節度使以河東行軍司馬李悅為河東節度營田觀察留後北都副留守甲午初鑄河東監軍印監軍有印自王定遠始也六月河陽獻白烏甲辰晉慈隰觀察使崔漢衡卒癸丑以絳州刺史姚齊梧為晉慈隰都防禦觀察使秋七月丙寅朔右諫議大夫陽城為國子司業河東監軍王定遠配流崖州坐專殺也辛卯江西觀察使洪州刺史齊映卒八月辛亥司徒兼侍中北平郡王馬燧薨贈太傅丙辰以楚州刺史路寰為洪州刺史江西觀察使閏月己丑國子司業裴澄表上乘輿月令十二卷禮典十二卷九月己卯賜宰臣兩省供奉官宴於曲江賦詩六韻賜之丁巳加韋臯統押近界諸蠻及西山八國雲南安撫等使滄州大將程懷信逐其帥程懷直冬十月丁丑以虔王諒為橫海軍節度大使以兵馬使程懷信為留後十一月丙申日南至不受朝賀以司徒馬燧葬也辛丑太常定馬燧諡曰景武上曰景太祖諡改莊武可也己酉潭州獻赤烏十二月戊辰上獵苑中戒多殺止行三驅之禮勞士而還十二年春正月甲午朔庚子元誼李文通率洺州兵五千民五萬家東奔田緒壬子以前滄州節度使程懷直為左龍武統軍乙丑成德軍節度使檢校司徒兼侍中渾瑊兼中書令興元節度使嚴震魏博田緒西川韋臯並加檢校左右僕射同中書門下平章事於是方鎮皆進兼官上制貞元廣利藥方五百八十六首頒降天下三月癸巳朔甲午韋臯奏收降蠻七千戶得吐蕃所賜金字告身五十五片乙巳以戶部侍郎裴延齡為戶部尚書戊申以兵部尚書董晉充東都留守判東都尚書省東畿汝州都防禦使四月壬戌朔戊辰左右十軍使奏去年冬車駕幸諸營欲於銀臺亭子門外立碑以紀聖迹從之庚午魏博節度使度支營田觀察使檢校左僕射平章事魏州長史駙馬都尉鴈門郡王田緒卒庚辰上降誕日命沙門道士加文儒官討論三教上大悅五月辛卯朔丙申邠寧節度使張獻甫卒甲辰以邠寧都虞候楊朝晟為邠州刺史邠寧慶節度使銀夏度使韓潭讓所授禮部尚書乞雪崔寧許其家收葬丁巳駙馬郭曖王士平曖弟煦暄坐代宗忌辰飲宴貶官歸第六月壬戌故驩州司戶竇參許其家收葬乙丑初置左右護軍中尉監中護軍監以授宦官以左右神策軍使竇文場霍僊鳴為左右神策護軍中尉監以左右神威軍使張尚進焦希望為左右神威中護軍監辛巳宣歙觀察使宣州刺史劉贊卒七月乙未以東都留守兵部尚書董晉檢校左僕射同中書門下平章事汴州刺史宣武軍節度使宋亳潁觀察使時李萬榮病萬榮子迺自署為兵馬使軍人又逐迺汴州亂故命董晉帥之以太子賓客王翃為東都留守判東都尚書省事東畿汝都防禦使是日汴州節度使李萬榮卒八月辛未朔日有蝕之己巳以前魏博節度副使田季安為魏州長史魏博節度觀察等使庚午增修望仙門廣夾城十王宅六王宅癸酉以虢州刺史崔衍為宣歙池觀察使以乞髯子湯忠義為歸德將軍丙子以汝州刺史陸長源為宣武行軍司馬丙戌門下侍郎平章事趙憬薨九月甲午以河東行軍司馬李景略為豐州刺史天德軍豐州西受降城都防禦使丙午戶部尚書判度支裴延齡卒庚戌幸魚藻宮即日還內壬子吐蕃寇慶州冬十月壬戌詔以京畿旱放租稅甲戌諫議大夫崔損給事中趙宗儒並同中書門下平章事俱賜金紫以少府監崔穆為晉州刺史晉慈隰觀察使十一月辛卯昭義王虔休造誕聖樂曲以獻十二月己未大雪平地二尺竹柏多死環王國所獻犀牛甚珍愛之是冬亦死上著刑政箴一首癸未迴紇南詔劍南西山國女國王並來朝賀十三年春正月戊子朔庚寅太子少師致仕關播卒壬寅吐蕃贊普遣使修好塞上以聞上以犬戎負約不受其使東都尚書省火二月丁巳賜宰臣兩省供奉官宴於曲江亭乙亥度支郎中蘇弁為戶部侍郎判度支兵部郎中王紹判戶部三月戊子造會慶亭於麟德殿前乙巳以福建都團練使李若初為明州刺史浙東觀察使以婺州刺史柳冕為福建觀察使夏四月壬戌上幸興慶龍堂祈雨乙丑大雪庚午義成軍節度使鄭滑觀察營田檢校左僕射滑州刺史李復卒己卯以大理卿于為陝州長史陝虢觀察使庚辰以陝虢都防禦觀察轉運等使姚南仲為滑州刺史義成軍節度鄭滑觀察使五月丙戌朔韋臯收復巂州畫圖來上壬子以庫部郎中翰林學士鄭餘慶為工部侍郎知吏部選事六月己卯朔以衡州刺史陳雲為邕管經略使辛巳引龍首渠水自通化門入至太清宮前壬午韋臯奏於巂州破吐蕃生擒大籠官七人馬畜器械不可勝紀秋七月丙戌宰相盧邁請告累月四表避相位是日命宰臣問疾於盧邁私第己丑右神策中尉霍僊鳴病賜馬十匹令於諸寺齋僧壬辰浚湖渠魚藻池深五尺乙未地震甲辰以兵部郎中判戶部王紹為戶部侍郎乙丑詔今後嗣王薨葬所司並供鹵簿永為常式八月丁巳詔京兆尹韓臯修昆明池石炭賀蘭兩堰兼湖渠壬午容管經略使房孺復卒九月己丑盧邁懇讓相位乃授太子賓客辛卯九日宴宰臣百官於曲江上賦詩以賜之己未江西觀察使路寰卒甲辰升定州為大都督府以湖南觀察使李巽為江州刺史江西觀察使以禮部侍郎呂渭為潭州刺史湖南觀察使冬十月癸丑朔以前滁州刺史房濟為容管經略使丙辰黔中觀察使奏溪州人戶訴被前刺史魏從琚於兩稅外每年加進朱砂一千觔水銀二百馱戶民疾苦請停從之淮西吳少誠擅開淘刁河汝河詔使不能禁癸酉宰相賈耽以疾避相位不允丁丑徐泗節度使張建封來朝上嘉之次日於延英召對癸巳贈太傅馬燧祔廟命所司供少牢祭仍給鹵簿從宅至廟十二月庚辰右龍武統軍韓遊瓌卒十四年春正月壬午朔庚寅詔諸道州府應貞元八年至十一年兩稅及榷酒錢在百姓腹內者總五百六十萬七千貫並除放甲午敕比來朝官或相過從金吾皆上聞其間如是親故或嘗同僚伏臘歲時須有還往亦人倫常禮今後不須奏聞因張建封奏議也二月壬子朔戊午上御麟德殿宴文武百僚初奏破陣樂徧奏九部樂及宮中歌舞妓十數人列於庭先是上制中和樂舞曲是日奏之日晏方罷比詔二月一日中和節宴以雨雪改用此日上又賦中春麟德殿宴羣臣詩八韻羣臣頒賜有差乙亥賜光蔡節度曰彰義軍三月丙申右神策行營節度鳳翔隴右觀察使檢校尚書右僕射鳳翔尹邢君牙卒以右神策將軍張昌為鳳翔尹右神策行營節度鳳翔隴右節度使仍改名敬則夏四月乙丑以左諫議大夫平章事崔損為修奉八陵使先是昭陵寢殿為火所焚至是獻昭乾定泰五陵各造屋三百八十間橋元建三陵據闕補造五月庚辰朔甲午前東都留守東畿汝都防禦使檢校吏部尚書杜亞卒丙午戶部侍郎判度支蘇弁為太子詹事上特召度支郎中于于延英兼御史中丞賜金紫令判度支閏月庚申以左神策行營節度韓全義為夏州刺史兼鹽夏綏銀節度使以代韓潭甲子貶太子詹事蘇弁為汀州司戶兄贊善大夫衮為永州司戶前京兆府士曹冕為信州司戶六月癸卯太子賓客盧邁卒乙巳以旱儉出太倉粟賑貸秋七月以吉州刺史杜春為邕管經略使乙卯貶京兆尹韓臯為撫州司馬召右金吾將軍吳湊于延英面授京兆尹即令入府視事是夏熱甚壬申以給事中同中書門下平章事趙宗儒為太子左庶子以左諫議大夫平章事崔損為門下侍郎平章事以工部侍郎鄭餘慶為中書侍郎同平章事左神策護軍中尉霍僊鳴卒丁丑以宦者第五守亮代僊鳴為中尉己卯左右神策置統軍品秩奉給視六軍統軍例甲午崔損修奉八陵寢宮畢羣臣於宣政殿行稱賀浙西觀察使潤州刺史王緯卒九月丁未朔己酉山南東道節度使檢校尚書右僕射襄州刺史樊澤卒乙卯以同州刺史崔宗為陝州大都督府長史陝虢觀察水陸轉運使以浙東觀察李若初為潤州刺史浙西觀察使及諸道鹽鐵轉運使又以常州刺史裴肅為越州刺史浙東觀察使丙辰以陝虢觀察使于為襄州刺史山南東道節度使丁卯嵵王倕薨以太常卿杜確為同州刺史本州防禦長春宮使癸酉諫議大夫田登奏言兵部武舉人持弓挾矢數千百人入皇城恐非所宜上聞之瞿然乃命停武舉冬十月癸酉以歲凶穀貴出太倉粟三十萬石開場糶以惠民庚子夏州韓全義奏破吐蕃鹽州十一月己未韋臯進開西南蠻事狀十卷開復南詔之由十二月戊子太子少師致仕郢國公韋倫卒癸酉出東都含嘉倉粟七萬石開場糶以惠河南饑民己亥南詔異牟尋遣使賀正旦明州鎮將栗鍠殺刺史盧雲十五年春正月丙午朔甲寅雅王逸薨甲戌浙西觀察使李若初卒二月罷中和節宴會年凶故也丁丑宣武軍節度使檢校左僕射平章事汴州刺史董晉卒乙酉以行軍司馬陸長源檢校禮部尚書汴州刺史御史大夫宣武軍節度度支營田汴宋亳潁觀察等使以常州刺史李錡為潤州刺史浙西觀察使及諸道鹽鐵轉運使是日汴州軍亂殺陸長源及節度判官孟叔度丘穎軍人臠而食之監軍俱文珍以宋州刺史劉逸準久為汴之大將以書招之俾靜亂乙丑以宋州刺史劉逸準檢校工部尚書兼汴州刺史宣武軍節度使仍賜名全諒乙未裴肅奏於台州擒栗鍠以獻斬於獨柳樹癸卯罷三月羣臣宴賞歲饑也出太倉粟十八萬石糶於京畿諸縣三月甲寅吳少誠寇唐州殺監軍邵國朝掠居民千餘而去丁巳以度支郎中兼中丞于為戶部侍郎依前判度支戊午昭義軍節度使檢校工部尚書王虔休卒戊辰以河陽三城節度使李元為潞州長史昭義軍節度澤潞磁邢洺觀察使以河陽節度押衙衡濟為懷州刺史河陽三城懷州節度使辛未太子少師致仕于頎卒壬申於易州滿城縣置永清軍癸酉令江淮歲運米二百萬石雖有是命然歲運不過四十萬石四月丁丑以久旱令陰陽人法術祈雨壬午內侍省加置內給事二員癸未以安州刺史伊慎為安黃節度營田觀察使庚寅應京城內外諸軍縣鎮職員官見共五萬八千二百七十一人宜令每人賜粟一石乙未特進兵部尚書歸崇敬卒五月甲辰朔戊辰宗正卿嗣吳王巘薨六月己卯黔中觀察使御史中丞王礎卒癸巳山南西道節度使檢校尚書左僕射平章事嚴震卒秋七月乙巳以興州刺史興元都虞候嚴礪為興元尹兼御史大夫山南西道節度度支營田觀察等使丙午故唐安公主賜諡曰莊穆公主賜諡自唐安始也丁未以王礎卒廢朝一日觀察使卒廢朝自礎始也戊午貶諫議大夫苗拯萬州刺史左拾遺李繁播州參軍以私議除拜嚴礪不當而無章疏而偽言累上疏故也鄭滑大水八月壬申朔丙申陳許節度使檢校尚書右僕射許州刺史曲環卒丁酉以洋州刺史韋士宗為黔中觀察使丙午以陳許兵馬使前陳州刺史上官涗為許州刺史陳許節度使吳少誠謀逆漸甚陷臨潁進圍許州庚戌宣武軍節度使檢校工部尚書汴州刺史劉全諒卒丙辰制吳少誠非次擢用授以節旄秩居端揆之榮任總列城之重期申報效奉我典章而秉心匪彝自底不類兇狡成性扇構多端擅動甲兵暴越封壤壽州茶園輒縱凌奪唐州詔使潛搆殺傷干犯國章罪在無赦朕以王者之德在乎好生人君之體務於含垢寧屈己以宥罪不殘人以興師以上稽宗社之威外抑忠賢之請庶有悛革尚議優容幸鄰境之喪逞貪亂之志焚略縣邑殘暴吾民朕尤冀知非為之忍恥亟頒恩命未許出師至乃攻逼許州肆其蠆毒恣行殺戮流害黎蒸惡稔禍盈人神同棄興言致討實悼于懷宜令諸道各出師徒掎角齊進吳少誠在身官爵並宜削奪己巳自今中和重陽二節每節只禁屠一日辛酉以大理評事宣武軍都知兵馬使韓弘檢校工部尚書兼汴州刺史御史大夫宣武軍節度使冬十月己丑邕王謜薨吏部侍郎奚陟卒十一月乙巳冬至罷朝會兵興也壬子襄州于奏于朗山破淮西賊三千人十二月庚午朔方等道副元帥河中絳州節度使檢校司徒兼奉朔中書令渾瑊薨乙未戰淮西賊於小河王師不利諸軍自潰丁酉以同州刺史杜確為河中尹河中絳州觀察使十六年春正月庚子朔乙巳恆冀定州許河陽四鎮之師與賊戰皆不利而退南詔獻奉聖樂舞曲上閱於麟德殿前二月己酉以左神策行營銀夏節度等使韓全義為蔡州行營招討使陳許節度使上官涗副之己丑左龍武統軍程懷直卒己酉華州刺史潼關防禦鎮國軍使盧徵卒壬子以尚書右丞袁滋為華州刺史潼關防禦鎮國軍使夏四月丁亥黔中知宴設吏傅近逐觀察使韋士宗己丑以義成軍節度使姚南仲為右僕射以權知新羅國事金俊邕襲祖開府檢校太尉雞林州都督新羅國王辛卯以義成軍行軍司馬盧羣為滑州刺史兼御史中丞義成軍節度使壬申檢校兵部尚書京兆尹吳湊卒五月戊戌朔以雨罷朝庚戌韓全義與蔡賊將吳少誠戰於水南王師敗績徐泗濠節度使檢校尚書右僕射徐州刺史張建封卒壬子徐州軍亂不納行軍司馬韋夏卿迫建封子愔為留後丙寅韋士宗却入黔州丁卯以吏部侍郎顧少連為京兆尹六月丙午鄆州李師古淮南杜祐並加同平章事以祐兼領徐泗濠節度以前虢州參軍張愔起復驍衞將軍兼徐州刺史御史中丞本州團練使知徐州留後秋七月湖南觀察使呂渭卒八月癸酉以河中尹王為潭州刺史湖南觀察使九月宥吳少誠駙馬都尉郭曖卒義成軍節度使盧羣卒丙午前太常卿裴郁卒戊辰以左丞李元素為滑州刺史兼御史大夫義成軍節度使庚戌貶中書侍郎同中書門下平章事鄭餘慶為郴州司馬戶部侍郎判度支于為泉州司戶以戶部侍郎王紹判度支以戶部郎中崔從質為戶部侍郎癸酉吳少誠賊迫官軍水砦下營韓全義退保陳州諸軍散還本道官軍不振以河南少尹張式為河南尹水陸轉運使庚申以太常卿齊抗為中書侍郎同平章事癸亥以虔王諒為徐州節度使張愔為留後冬十月辛未興元嚴礪希監軍旨誣奏流人通州別駕崔河圖長流崖州賜死人士傷之吳少誠引兵歸蔡州上表待罪戊子詔雪吳少誠復其官爵乙丑河東節度使檢校禮部尚書太原尹兼御史大夫北都留守李悅卒甲午以河東行軍司馬鄭儋檢校工部尚書太原尹河東節度使十一月癸卯泗州濠州宜隸淮南觀察使戊申以太府卿韋渠牟為太常寺卿十二月戊寅罷吏部復考判官及禮部別頭貢舉十七年春正月甲午朔甲寅韓全義自蔡州行營還詔歸鎮華州二月癸巳朔賜羣臣宴於曲江亭上賦中和節賜宴曲江詩六韻賜之丁酉雨雹己亥雨霜戊申夜雷震雨雹庚戌大雨雪兼雹三月乙丑賜羣臣宴於曲江亭己巳黔中觀察使韋士宗復為三軍所逐癸酉衢州刺史鄭式瞻進絹五千匹銀二千兩上曰式瞻犯贓已詔御史按問所進宜付左藏庫丁丑省天下州府別駕司馬田曹參軍京兆河南太原三府外諸府判司雙曹者省一夏四月丁未始命駙馬及郡縣主壻無子者養男不用母蔭辛亥以諫議大夫裴佶為黔中觀察使五月壬戌朔日有蝕之乙酉邠寧節度使檢校工部尚書邠州刺史楊朝晟卒丙戌以工部侍郎趙植為廣州刺史兼御史大夫嶺南節度使六月戊戌以定平鎮兵馬使李朝寀檢校工部尚書兼邠州刺史朔方邠寧慶節度使以中官楊志廉為右神策護軍中尉浙西人崔善真詣闕上書論浙西觀察使李錡罪狀上覽奏不悅令械善真送於李錡為鑿坑待善真既至和械推而埋之由是錡恣橫叛己酉以邠寧兵馬使高固為邠州刺史兼御史大夫邠寧慶節度使丁巳成德軍節度使恆冀深趙德棣觀察等使恆州大都督府長史檢校太尉中書令琅邪郡王王武俊薨贈太師諡曰忠烈秋七月戊寅吐蕃寇鹽州辛巳以前成德軍節度副使檢校工部尚書知恆府事清河郡王王士真起復授恆州長史充成德軍節度使乙酉太常卿韋渠牟卒己丑吐蕃陷麟州殺刺史郭鋒毀城壘而去八月戊午以河東行軍司馬嚴綬檢校工部尚書兼太原尹御史大夫河東節度使九月壬戌韋臯奏大破吐蕃於雅州戊辰羣臣宴曲江上賦九日賜宴曲江亭詩六韻賜之丁丑禮部尚書李齊運卒冬十月加韋臯檢校司徒中書令封南康郡王賞破吐蕃功也戊午鹽州刺史杜彥先委城奔慶州辛未宰相賈耽上海內華夷圖及古今郡國縣道四夷述四十卷甲戌翰林待詔戴少平死十六日復生庚戌以京兆尹顧少連為吏部尚書以吏部侍郎韋夏卿為京兆尹淮南節度使杜祐進通典凡九門共二百卷十八年春正月戊午朔大雨雪罷朝賀乙丑驃國王遣使悉利移來朝貢幷獻其國樂十二曲與樂工三十五人乙亥韋臯以所擒蕃相論莽熱來獻庚辰以常州刺史賈全為越州刺史浙東觀察使二月戊子朔賜羣臣宴於馬璘之山池三月癸未以劍南東川行軍司馬李康為梓州刺史兼御史大夫劍南東川節度使乙丑賜羣臣宴於馬璘之山池己巳以蘄州刺史鄭紳為鄂州刺史鄂岳蘄沔觀察使癸酉以浙東團練副使齊總為衢州刺史總以橫賦進奉希恩給事中許孟容封還制書丙戌以河中行軍司馬鄭元為河中尹兼御史大夫河中絳節度使五月癸亥以竇羣為左拾遺庚辰以祠部員外郎裴泰為檢校兵部郎中充安南都護本管經略使六月癸巳以吏部尚書顧少連為兵部尚書東都留守東都畿汝防禦使前東都留守檢校禮部尚書王翃卒秋七月庚辰蔡申光三州春水夏旱賜帛五萬段米十萬石鹽三千石八月壬寅以邕管經略使徐申為廣州刺史嶺南節度使甲辰以嶺南節度掌書記試大理評事張正元為邕州刺史御史中丞邕管經略使給事中許孟容以非次遷授封還詔書丁未以戶部侍郎判度支王紹為戶部尚書判度支九月乙卯朔以太常少卿楊憑為潭州刺史湖南觀察使癸亥賜羣臣宴於馬璘山池上賦九日賜宴詩六韻賜之冬十月丁亥以刑部尚書王鍔為淮南節度副使兼行軍司馬己酉鄜坊丹延節度使檢校禮部尚書王栖耀卒十一月丙辰以同州刺史劉公濟為鄜州刺史鄜坊丹延節度使十二月乙巳貶大理卿李正臣為衞尉少卿正臣為御史彈劾下獄不堪其辱而死戊申黎州蠻牂柯使入朝十九年春正月癸丑朔二月壬午朔賜宴馬璘山池丁亥修含元殿賜安黃節度曰奉義軍丙申以桂管留後韋武為桂州刺史桂管觀察使己亥安南經略使裴泰為州將王季元所逐甲辰淮南節度使杜祐來朝三月壬子朔以杜祐檢校司空同中書門下平章事太清宮使以淮南行軍司馬王鍔檢校尚書右僕射兼揚州大都督府長史淮南節度使丁卯以今年孟夏禘饗前議太祖懿獻之位未決至此禘祭方正太祖東向之位已下列序昭穆其獻祖懿祖祔于德明興聖之廟每禘祫年就本室饗之乙亥以司農卿李實為京兆尹夏四月乙未涇原節度使劉昌奏請移行原州於平涼城從之戊戌百官以祔廟畢蹈舞稱賀五月辛亥荊南節度使檢校工部尚書江陵尹裴冑卒乙未以荊南行軍司馬裴筠為江陵尹兼御史大夫荊南節度使甲子四鎮庭行軍涇原節度使檢校右僕射涇州刺史劉昌卒甲戌以涇原節度留後段佑為涇州刺史兼御史大夫四鎮北庭行軍涇原節度使乙亥吐蕃遣使論頻熱入朝甲辰以陳許行軍司馬劉昌裔檢校工部尚書兼許州刺史陳許節度使自正月至是未雨分命祈禱山川秋七月戊午以關輔饑罷吏部選禮部貢舉己未中書侍郎平章事齊抗為太子賓客病免也甲戌始雨乙亥尚書右僕射姚南仲薨貸京畿民麥種八月乙未大雨霖冬十月乙未以太子賓客韋夏卿為東都留守東都畿汝都防禦使閏月丁巳門下侍郎同平章事崔損卒十一月戊寅朔以鹽州兵馬使李興幹為鹽州刺史許專達于上不隸夏州丙午振武麟勝節度使范希朝來朝戊午以振武行軍司馬閻巨源檢校工部尚書兼單于大都護振武麟勝節度使庚申以太常卿高郢為中書侍郎同中書門下平章事壬申監察御史崔薳入臺近不練故事違式入右神策軍上怒笞四十配流崖州二十年春正月丁丑朔丙申天德軍防禦團練使豐州刺史李景略卒以其判官任迪簡代領其任己亥以鄜坊丹延節度使劉公濟為工部尚書以其行軍司馬裴玢代領其任二月丙午朔罷中和節宴歲儉也庚戌大雷震雨雹三月甲申以吐蕃贊普卒廢朝己亥以國子祭酒趙昌為安南都護御史大夫本管經略使夏四月辛酉太子賓客齊抗卒丙寅吐蕃使臧河南觀察使論乞冉等五十四人來朝貢陳許節度賜號忠武軍五月甲戌朔罷御宣政殿乙亥以史館修撰秘書監張薦為工部侍郎兼御史大夫充入吐蕃弔祭使七月癸酉朔大雨雹辛卯福建觀察使柳冕奏置萬安監牧於泉州界置羣牧五悉索部內馬牛羊近萬頭匹監吏主之八月戊申以房州刺史郄士美為黔中觀察使己未以昭義兵馬使盧從史為檢校工部尚書兼潞州長史昭義軍節度澤潞磁邢洺觀察使九月庚辰賜羣臣宴於馬璘山池冬十月甲辰於景州南皮縣置唐昌軍辛亥易定節度使張茂昭來朝十一月丁酉以監察御史李程秘書正字張聿藍田縣尉王涯並為翰林學士十二月吐蕃南詔日本國並遣使朝貢庚午以桂管防禦使顏証為桂州刺史桂管觀察使二十一年春正月辛未朔御含元殿受朝賀是日上不康丙子以浙東觀察判官凌準為翰林學士癸巳會羣臣於宣政殿宣遺詔皇太子宜於柩前即位是日上崩於會寧殿享壽六十四甲午遷神柩於太極殿丙申發喪羣臣縞素皇太子即位永貞元年九月丁卯羣臣上諡曰神武孝文廟號德宗十月己酉葬于崇陵昭德皇后王氏祔焉史臣曰德宗皇帝初總萬機勵精治道思政若渴視民如傷凝旒延納於讜言側席思求於多士其始也去無名之費罷不急之官出永巷之嬪嬙放文單之馴象減太官之膳誡服玩之奢解鷹犬而放伶倫止榷酤而絕貢奉百神咸秩五典克從御正殿而策賢良輟廷臣而治畿甸此皆前王之能事有國之大猷率是而行夫何敢議加以天才秀茂文思雕華灑翰金鑾無愧淮南之作屬辭鉛槧何慙隴坻之書文雅中興敻高前代二南三祖豈盛於茲然而王霸迹殊淳醨代變揆時而理斟酌斯難苟於交喪之秋輕取鄙夫之論歷觀近世靡不敗亡德宗在藩齒冑之年曾為統帥及出震承乾之日頗負經綸故從初罷郭令戎權非次聽楊炎謬計遂欲混同華裔束縛奸豪南行襄漢之誅北舉恆陽之伐出車雲擾命將星繁罄國用不足以餽軍竭民力未聞于破賊一旦德音掃地愁歎連甍果致五盜僭擬於天王二朱憑陵於宗社奉天之窘可為涕零罪己之言補之何益所賴忠臣戮力否運再昌雖知非竟逐於楊炎而受佞不忘於盧嵵用延賞之私怨奪李晟之兵符取延齡之奸謀罷陸贄之相位知人則哲其若是乎貞元之辰吾道窮矣贊曰聰明文思惟睿作聖保姦傷善聽斷不令御曆三九適逢天幸賜宴之辰徒矜篇咏
