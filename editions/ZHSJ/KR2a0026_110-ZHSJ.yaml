body:
  text: 舊唐書卷一百六列傳第五十六李林甫楊國忠張暐王琚王毛仲陳玄禮附李林甫高祖從父弟長平王叔良之曾孫叔良生孝斌官至原州長史孝斌生思誨官至揚府參軍思誨即林甫之父也林甫善音律初為千牛直長其舅楚國公姜皎深愛之開元初遷太子中允時源乾曜為侍中乾曜姪孫光乘姜皎妹壻乾曜與之親乾曜之男潔白其父曰李林甫求為司門郎中乾曰郎官須有素行才望高者哥奴豈是郎官耶數日除諭德哥奴林甫小字累遷國子司業十四年宇文融為御史中丞引之同列因拜御史中丞歷刑吏二侍郎時武惠妃愛傾後宮二子壽王盛王以母愛特見寵異太子瑛益疏薄林甫多與中貴人善乃因中官干惠妃云願保護壽王惠妃德之初侍中裴光庭妻武三思女詭譎有材略與林甫私中官高力士本出三思家及光庭卒武氏銜哀祈於力士請林甫代其夫位力士未敢言玄宗使中書令蕭嵩擇相嵩久之以右丞韓休對玄宗然之乃令草詔力士遽漏於武氏乃令林甫白休休既入相甚德林甫與嵩不和乃薦林甫堪為宰相惠妃陰助之因拜黃門侍郎玄宗眷遇益深二十三年以黃門侍郎平章事裴耀卿為侍中中書侍郎平章事張九齡為中書令林甫為禮部尚書同中書門下三品並加銀青光祿大夫林甫面柔而有狡計能伺候人主意故驟歷清列為時委任而中官妃家皆厚結託伺上動靜皆預知之故出言進奏動必稱旨而猜忌陰中人不見於詞色朝廷受主恩顧不由其門則構成其罪與之善者雖廝養下士盡至榮寵尋歷戶兵二尚書知政事如故尋又以太子瑛鄂王瑤光王琚皆以母失愛而有怨言駙馬都尉楊洄白惠妃玄宗怒謀於宰臣將罪之九齡曰陛下三箇成人兒不可得太子國本長在宮中受陛下義方人未見過陛下奈何以喜怒間忍欲廢之臣不敢奉詔玄宗不悅林甫惘然而退初無言既而謂中貴人曰家事何須謀及於人時朔方節度使牛仙客在鎮有政能玄宗加實封九齡又奏曰邊將訓兵秣馬儲蓄軍實常務耳陛下賞之可也欲賜實賦恐未得宜惟聖慮思之帝默然林甫以其言告仙客仙客翌日見上泣讓官爵玄宗欲行實封之命兼為尚書九齡執奏如初帝變色曰事總由卿九齡頓首曰陛下使臣待罪宰相事有未允臣合盡言違忤聖情合當萬死玄宗曰卿以仙客無門籍耶卿有何門閥九齡對曰臣荒徼微賤仙客中華之士然陛下擢臣踐臺閣掌綸誥仙客本河湟一使典目不識文字若大任之臣恐非宜林甫退而言曰但有材識何必辭學天子用人何有不可玄宗滋不悅九齡與中書侍郎嚴挺之善挺之初娶妻出之妻乃嫁蔚州刺史王元琰時元琰坐贓詔三司使推之挺之救免其罪玄宗察之謂九齡曰王元琰不無贓罪嚴挺之囑託所由輩有顏面九齡曰此挺之前妻今已婚崔氏不合有情玄宗曰卿不知雖離之亦却有私玄宗籍前事以九齡有黨與裴耀卿俱罷知政事拜左右丞相出挺之為洺州刺史元琰流于嶺外即日林甫代九齡為中書集賢殿大學士修國史拜牛仙客工部尚書同中書門下平章事知門下省事監察御史周子諒言仙客非宰相器玄宗怒而殺之林甫言子諒本九齡引用乃貶九齡為荊州長史玄宗終用林甫之言廢太子瑛鄂王瑤光王琚為庶人太子妃兄駙馬都尉薛鏽長流瀼州死於故驛人謂之三庶聞者冤之其月佞媚者言有烏鵲巢於大理獄戶天下幾致刑措玄宗推功元輔封林甫晉國公仙客豳國公其冬惠妃病三庶人為祟而薨儲宮虛位玄宗未定所立林甫曰壽王年已成長儲位攸宜玄宗曰忠王仁孝年又居長當守器東宮乃立為皇太子自是林甫懼巧求陰事以傾太子林甫既秉樞衡兼領隴右河西節度又加吏部尚書天寶改易官名為右相停知節度事加光祿大夫遷尚書左僕射六載加開府儀同三司賜實封三百戶而恩渥彌深凡御府膳羞遠方珍味中人宣賜道路相望與宰相李適之雖同宗屬而適之輕率嘗與林甫同論時政多失大體由是主恩益疏以至罷免黃門侍郎陳希烈性便佞嘗曲事林甫適之既罷乃引希烈同知政事林甫久典樞衡天下威權並歸於己台司機務希烈不敢參議但唯諾而已每有奏請必先賂遺左右伺察上旨以固恩寵上在位多載倦於萬機恆以大臣接對拘檢難徇私欲自得林甫一以委成故杜絕逆耳之言恣行宴樂袵席無別不以為恥由林甫之贊成也林甫京城邸第田園水磑利盡上腴城東有薛王別墅林亭幽邃甲於都邑特以賜之及女樂二部天下珍玩前後賜與不可勝紀宰相用事之盛開元已來未有其比然每事過慎條理衆務增修綱紀中外遷除皆有恆度而耽寵固權己自封植朝望稍著必陰計中傷之初韋堅登朝以堅皇太子妃兄引居要職示結恩信實圖傾之乃潛令御史中丞楊慎矜陰伺堅隙會正月望夜皇太子出遊與堅相見慎矜知之奏上上大怒以為不軌黜堅免太子妃韋氏林甫因是奏李適之與堅昵狎及裴寬韓朝宗並曲附適之上以為然賜堅自盡裴韓皆坐之斥逐後楊慎矜權位漸盛林甫又忌之乃引王鉷為御史中丞託以心腹鉷希林甫意遂誣罔密奏慎矜左道不法遂族其家楊國忠以椒房之親出入中禁奏請多允乃擢在臺省令按刑獄會皇太子良娣杜氏父有鄰與子婿柳勣不叶勣飛書告有鄰不法引李邕為證詔王鉷與國忠按問鉷與國忠附會林甫奏之於是賜有鄰自盡出良娣為庶人李邕裴敦復枝黨數人並坐極法林甫之苞藏安忍皆此類也林甫自以始謀不佐皇太子慮為後患故屢起大獄以危之賴太子重慎無過流言不入林甫嘗令濟陽別駕魏林告隴右河西節度使王忠嗣林往任朔州刺史忠嗣時為河東節度自云與忠王同養宮中情意相得欲擁兵以佐太子玄宗聞之曰我兒在內何路與外人交通此妄也然忠嗣亦左授漢陽太守八載咸寧太府趙奉章告林甫罪狀二十餘條告未上林甫知之諷御史臺逮捕以為妖言重杖決殺十載林甫兼領安西大都護朔方節度俄兼單于副大都護十一載以朔方副使李獻忠叛讓節度舉安思順自代國家武德貞觀已來蕃將如阿史那社爾契苾何力忠孝有才略亦不專委大將之任多以重臣領使以制之開元中張嘉貞王晙張說蕭嵩杜暹皆以節度使入知政事林甫固位志欲杜出將入相之源嘗奏曰文士為將怯當矢石不如用寒族蕃人蕃人善戰有勇寒族即無黨援帝以為然乃用思順代林甫領使自是高仙芝哥舒翰皆專任大將林甫利其不識文字無入相由然而祿山竟為亂階由專得大將之任故也林甫恃其早達輿馬被服頗極鮮華自無學術僅能秉筆有才名於時者尤忌之而郭慎微苑咸文士之闒茸者代為題尺林甫典選部時選人嚴迥判語有用杕杜二字者林甫不識杕字謂吏部侍郎韋陟曰此云杖杜何也陟俯首不敢言太常少卿姜度林甫舅子度妻誕子林甫手書慶之曰聞有弄麞之慶客視之掩口初楊國忠登朝林甫以微才不之忌及位至中司權傾朝列林甫始惡之時國忠兼領劍南節度會南蠻寇邊林甫請國忠赴鎮帝雖依奏然待國忠方渥有詩送行句末言入相之意又曰卿止到蜀郡處置軍事屈指待卿林甫心尤不悅林甫時已寢疾其年十月扶疾從幸華清宮數日增劇巫言一見聖人差減帝欲視之左右諫止乃敕林甫出於庭中上登降聖閣遙視舉紅巾招慰之林甫不能興使人代拜於席翌日國忠自蜀還謁林甫拜於牀下林甫垂涕託以後事尋卒贈太尉揚州大都督給班劍西園秘器諸子以吉儀護柩還京師發喪於平康坊之第林甫晚年溺於聲妓姬侍盈房自以結怨於人常憂刺客竊發重扃複壁絡板甃石一夕屢徙雖家人不之知有子二十五人女二十五人岫為將作監崿為司儲郎中嶼為太常少卿子壻張博濟為鴻臚少卿鄭平為戶部員外郎杜位為右補闕楊齊宣為諫議大夫元撝為京兆府戶曹初林甫嘗夢一白多鬚長丈夫逼己接之不能去既寤言曰此形狀類裴寬寬謀代我故也時寬為戶部尚書兼御史大夫故因李適之黨斥逐之是時楊國忠始為金吾冑曹參軍至是不十年林甫卒國忠竟代其任其形狀亦類寬焉國忠素憾林甫既得志誣奏林甫與蕃將阿布思同構逆謀誘林甫親族間素不悅者為之證詔奪林甫官爵廢為庶人岫崿諸子並謫於嶺表林甫性沉密城府深阻未嘗以愛憎見於容色自處台衡動循格令衣冠士子非常調無仕進之門所以秉鈞二十年朝野側目憚其威權及國忠誣構天下以為冤楊國忠本名釗蒲州永樂人也父珣以國忠貴贈兵部尚書則天朝幸臣張易之即國忠之舅也國忠無學術拘檢能飲酒蒱博無行為宗黨所鄙乃發憤從軍事蜀帥以屯優當遷益州長史張寬惡其為人因事笞之竟以屯優授新都尉稍遷金吾衞兵曹參軍太真妃即國忠從祖妹也天寶初太真有寵劍南節度使章仇兼瓊引國忠為賓佐既而擢授監察御史去就輕率驟履清貫朝士指目嗤之時李林甫將不利於皇太子掎摭陰事以傾之侍御史楊慎矜承望風旨誣太子妃兄韋堅與皇甫惟明私謁太子以國忠怙寵敢言援之為黨以按其事京兆府法曹吉溫舞文巧詆為國忠爪牙之用因深竟堅獄堅及太子良娣杜氏親屬柳勣杜昆吾等痛繩其罪以樹威權於京城別置推院自是連歲大獄追捕擠陷誅夷者數百家皆國忠發之林甫方深阻保位國忠凡所奏劾涉疑似於太子者林甫雖不明言以指導之皆林甫所使國忠乘而為邪得以肆意上春秋高意有所愛惡國忠探知其情動契所欲驟遷檢校度支員外郎兼侍御史監水陸運及司農出納錢物內中市買召募劍南健兒等使以稱職遷度支郎中不期年兼領十五餘使轉給事中兼御史中丞專判度支事是歲貴妃姊虢國韓國秦國三夫人同日拜命兄銛拜鴻臚卿八載玄宗召公卿百僚觀左藏庫喜其貨幣山積面賜國忠金紫兼權太府卿事國忠既專錢穀之任出入禁中日加親幸初楊慎矜希林甫旨引王鉷為御史中丞同構大獄以傾東宮既帝意不迴慎矜稍避事防患因與鉷有隙鉷乃附國忠奏誣慎矜誅其昆仲由是權傾內外公卿惕息吉溫為國忠陳移奪執政之策國忠用其謀尋兼兵部侍郎京兆尹蕭炅御史中丞宋渾皆林甫所親善國忠皆誣奏譴逐林甫不能救王鉷為御史大夫兼京兆尹恩寵侔於國忠而位望居其右國忠忌其與己分權會邢縡事泄乃陷鉷兄弟誅之因代鉷為御史大夫權京兆尹賜名國忠乃窮竟邢縡獄令引林甫交私鉷銲與阿布思事狀而陳希烈哥舒翰附會國忠證成其狀上由是疏薄林甫南蠻質子閤羅鳳亡歸不獲帝怒甚欲討之國忠薦閬州人鮮于仲通為益州長史令率精兵八萬討南蠻與羅鳳戰于瀘南全軍陷沒國忠掩其敗狀仍其戰功仍令仲通上表請國忠兼領益部十載國忠權知蜀郡都督府長史充劍南節度副大使知節度事仍薦仲通代己為京兆尹國忠又使司馬李宓率師七萬再討南蠻宓渡瀘水為蠻所誘至和城不戰而敗李宓死於陣國忠又隱其敗以捷書上聞自仲通李宓再舉討蠻之軍其徵發皆中國利兵然於土風不便沮洳之所陷瘴疫之所傷饋餉之所乏物故者十八九凡舉二十萬衆棄之死地隻輪不還人銜冤毒無敢言者國忠尋兼山南西道採訪使十一載南蠻侵蜀蜀人請國忠赴鎮林甫亦奏遣之將辭雨泣懇陳必為林甫所排帝憐之不數月召還會林甫卒遂代為右相兼吏部尚書集賢殿大學士太清太微宮使判度支劍南節度山南西道採訪兩京出納租庸鑄錢等使並如故國忠本性疏躁強力有口辯既以便佞得宰相剖決機務居之不疑立朝之際或攘袂扼腕自公卿已下皆頤指氣使無不讋憚故事宰相居台輔之地以元功盛德居之不務威權出入騎從簡易自林甫承恩顧年深每出車騎滿街節將侍郎有所關白皆趨走辟易有同案吏舊例宰相午後六刻始出歸第林甫奏太平無事以巳時還第機務填委皆決於私家主書吳珣持籍就左相陳希烈之第希烈引籍署名都無可否國忠代之亦如前政國忠自侍御史以至宰相凡領四十餘使又專判度支吏部三銓事務鞅掌但署一字猶不能盡皆責成胥吏賄賂公行國忠既以宰臣典選奏請銓日便定留放不用長名先天已前諸司官知政事午後歸本司決事兵部尚書侍郎亦分銓注擬開元已後宰臣數少始崇其任不歸本司故事吏部三銓三注三唱自春及夏才終其事國忠使胥吏於私第暗定官員集百僚於尚書省對注唱一日令畢以誇神速資格差謬無復倫序明年注擬又於私第大集選人令諸女弟垂簾觀之笑語之聲朗聞於外故事注官訖過門下侍中給事中國忠注官時呼左相陳希烈於座隅給事中在列曰既對注擬過門下了矣吏部侍郎韋見素張倚皆衣紫是日與本曹郎官同咨事趨走於屏樹之間既退國忠謂諸妹曰兩員紫袍主事何如人相對大噱其所昵京兆尹鮮于仲通中書舍人竇華侍御史鄭昂諷選人於省門立碑以頌國忠銓綜之能貴妃姊虢國夫人國忠與之私於宣義里構連甲第土木被綈繡棟宇之盛兩都莫比晝會夜集無復禮度有時與虢國並轡入朝揮鞭走馬以為諧謔衢路觀之無不駭歎玄宗每年冬十月幸華清宮常經冬還宮國忠山第在宮東門之南與虢國相對韓國秦國甍棟相接天子幸其第必過五家賞賜宴樂每扈從驪山五家合隊國忠以劍南幢節引於前出有餞路還有軟脚遠近餉遺珍玩狗馬閹侍歌兒相望於道進封衞國公食實封三百戶俄拜司空時安祿山恩寵特深總握兵柄國忠知其跋扈終不出其下將圖之屢於上前言其悖逆之狀上不之信是時祿山已專制河北聚幽幷勁騎陰圖逆節動未有名伺上千秋萬歲之後方圖叛換及見國忠用事慮不利於己祿山遙領內外閑使遂以兵部侍郎吉溫知留後兼御史中丞京畿採訪使內伺朝廷動靜國忠使門客蹇昂何盈求祿山陰事圍捕其宅得李超安岱等使侍御史鄭昂縊殺於御史臺又奏貶吉溫於合浦以激怒祿山幸其搖動內以取信於上上竟不之悟由是祿山惶懼遂舉兵以誅國忠為名玄宗聞河朔變起欲以皇太子監國自欲親征謀於國忠國忠大懼歸謂姊妹曰我等死在旦夕今東宮監國當與娘子等併命矣姊妹哭訴於貴妃貴妃銜土請命其事乃止及哥舒翰守潼關諸將以函關距京師三百里利在守險不利出攻國忠以翰持兵未決慮反圖己欲其速戰自中督促之翰不獲已出關及接戰桃林王師奔敗哥舒受擒敗國喪師皆國忠之誤惑也自祿山兵起國忠以身領劍南節制乃布置腹心於梁益間以圖自全之計六月九日潼關不守十二日凌晨上率龍武將軍陳玄禮左相韋見素京兆尹魏方進國忠與貴妃及親屬擁上出延秋門諸王妃主從之不及慮賊奄至令內侍曹大仙擊鼓于春明門外又焚芻藁之積煙火燭天既渡渭即令斷便橋辰時至咸陽望賢驛官吏駭竄無復貴賤坐宮門大樹下亭午上猶未食有老父獻帝令具飯始得食翌日至馬嵬軍士飢而憤怒龍武將軍陳玄禮懼亂先謂軍士曰今天下崩離萬乘震蕩豈不由楊國忠割剝甿庶朝野怨咨以至此耶若不誅之以謝天下何以塞四海之怨憤衆曰念之久矣事行身死固所願也會吐蕃和好使在驛門遮國忠訴事軍士呼曰楊國忠與蕃人謀叛諸軍乃圍驛擒國忠斬首以徇是日貴妃既縊韓國虢國二夫人亦為亂兵所殺御史大夫魏方進死左相韋見素傷良久兵解陳玄禮等見上謝罪曰國忠撓敗國經構興禍亂使黎元塗炭乘輿播越此而不誅患難未已臣等為社稷大計請矯制之罪帝曰朕識之不明任寄失所近亦覺悟審其詐佞意欲到蜀肆諸市朝今神明啟卿諧朕夙志將疇爵賞何至言焉是時祿山雖據河洛其兵鋒東止於梁宋南不過許鄧李光弼郭子儀統河朔勁卒連收恆定若崤函固守兵不妄動則兇逆之勢不討自弊及哥舒翰出師凡不數日乘輿遷幸朝廷陷沒百僚繫頸妃主被戮兵滿天下毒流四海皆國忠之召禍也國忠子暄昢曉晞暄為太常卿兼戶部侍郎尚延和郡主昢為鴻臚卿尚萬春公主兄弟各立第於親仁里窮極奢侈國忠娶蜀倡裴氏女曰裴柔國忠既死柔與虢國夫人皆自剄死暄死於馬嵬昢陷賊被殺曉走漢中郡漢中王瑀榜殺之晞走至陳倉為追兵所殺國忠之黨翰林學士張漸竇華中書舍人宋昱吏部郎中鄭昂等憑國忠之勢招來賂遺車馬盈門財貨山積及國忠敗皆坐誅滅其喪王室俱一時之沴氣焉張暐汝州襄城人也祖德政武德中鄆州刺史暐景龍初為銅鞮令家本豪富好賓客以弋獵自娛會臨淄王為潞州別駕暐潛識英姿傾身事之日奉遊處及樂人趙元禮自山東來有女美麗善歌舞王幸之止於暐第生廢太子瑛唐隆元年六月王清內難升為皇太子召暐拜宮門大夫每與諸王姜皎崔滌李令問王守一薛伯陽在太子左右以接歡其年擢拜左臺侍御史數月遷左御史臺中丞先天元年太子即位帝居武德殿太平公主有異謀廣樹朋黨暐與僕射劉幽求請先為備太平聞之白於睿宗乃流暐於嶺南峯州幽求謫於嶺外及太平之敗幽求追拜尚書左僕射兼侍中暐為大理卿封鄧國公實封三百戶逾月又加權兼雍州長史其年十二月改元開元以雍州為京兆府長史為尹暐首遷京兆尹入侍宴私出主都政以為榮寵之極暐亦有應務才幹遷太子詹事判尚書左右丞再除左羽林大將軍三為左金吾大將軍又為殿中監太僕卿二十年以暐年高加特進子履冰季良弟晤皆居清列天寶初暐還鄉拜掃特賜錦袍繒綵御賜詩以寵異之乘傳來往敕郡縣供擬暐鬢髮華皓在輿中子弟車馬連接數里衣冠榮之中使中路追賜藥物至襄城月餘詔還京五載薨年九十餘贈開府儀同三司其後履冰為金吾將軍季良殿中監俱列棨戟時人美之暐壽考善保終始王琚懷州河內人也叔父隱客則天朝為鳳閣侍郎琚少孤而聰敏有才略好玄象合鍊之學神龍初年二十餘嘗謁駙馬王同皎同皎甚器之益歡洽言及刺武三思事琚義而許之與周璟張仲之為忘年之友及同皎敗琚恐為吏所捕變姓名詣於江都傭書於富商家主人後悟其非傭者以女嫁之資給其財經四五年睿宗登極琚具白主人厚資其行裝乃至長安遇玄宗為太子監國為太平公主所忌思立孱弱以竊威權太子憂危沙門普潤先與玄宗筮克清內難加三品食實封常入太子宮琚見之說以天時人事歷然可觀普潤白玄宗玄宗異之及琚於吏部選補諸暨主簿於東宮過謝及殿而行徐視高中官曰殿下在簾下琚曰在外只聞有太平公主不聞有太子太子有大功於社稷大孝於君親何得有此聲玄宗遽召見之琚曰頃韋庶人智識淺短親行弒逆人心盡搖思立李氏殿下誅之為易今社稷已安太平則天之女凶狡無比專思立功朝之大臣多為其用主上以元妹之愛能忍其過賤臣淺識為殿下深憂玄宗命之同榻而坐玄宗泣曰四哥仁孝同氣唯有太平言之恐有違犯不言憂患轉深為臣為子計無所出琚曰天子之孝貴於安宗廟定萬人徵之於昔蓋主漢帝之長姊帝幼蓋主共養帝於宮中後與上官桀燕王謀害大司馬霍光不議及君上漢主恐危劉氏以大義去之況殿下功格天地位尊儲貳太平雖姑臣妾也何敢議之今劉幽求張說郭元振一二大臣心輔殿下太平之黨必有移奪安危之計不可立談玄宗又曰公有何小藝可隱跡與寡人遊處琚曰飛丹鍊藥談諧嘲詠堪與優人比肩玄宗益喜與之為友恨相知晚呼為王十一翌日奏授詹事府司直內供奉兼崇文學士日與諸王及姜皎等侍奉焉獨琚常預秘計踰月又拜太子舍人尋又兼諫議大夫內供奉又贈其父故下邽丞仲友楚州刺史先天元年七月玄宗居尊位在武德殿八月擢拜中書侍郎時劉幽求張暐並流於嶺外琚見事迫請早為之計二年七月三日琚與岐王範薛王業姜皎李令問王毛仲王守一並預誅逆以鐵騎至承天門時睿宗聞鼓譟聲召郭元振升承天樓宣詔下關侍御史任知古召募數百人於朝堂不得入頃間琚等從玄宗至樓上誅蕭至忠岑羲竇懷貞常元楷李慈李猷等睿宗遜居百福殿十日拜琚銀青光祿大夫戶部尚書封趙國公食實封五百戶皎銀青光祿大夫工部尚書封楚國公實封五百戶令問銀青光祿大夫殿中監宋國公實封三百戶毛仲輔國大將軍左武衞大將軍檢校閑兼知監牧使霍國公實封五百戶守一銀青光祿大夫太常卿員外置同正員進封晉國公實封五百戶琚皎令問並固讓尚書殿中監不上十八日琚皎依舊官各加實封二百戶通前七百戶累日玄宗讌於內殿賜功臣金銀器皿各一床雜綵各一千匹絹一千匹列於庭讌慰終夕載之而歸琚轉見恩顧每延入閣中迄夜方出歸休之日中官至第召之中宮亦使尚宮就琚宅問訊琚母時果珍味賚之助其甘旨琚在帷幄之側常參聞大政時人謂之內宰相無有比者又贈其父魏州刺史或有上說於玄宗曰彼王琚麻嗣宗譎詭縱橫之士可與履危不可得志天下已定宜益求純樸經術之士玄宗乃疏之十一月令御史大夫持節巡天兵以北諸軍十二月改年號為開元又改官名與蘇頲同為紫微侍郎二年二月迴未及京便除澤州刺史削封歷衡郴滑虢沔夔許潤九州剌史又復其封二十年丁母憂二十二年起復右庶子兼巂州剌史又改同蒲通鄧蔡五州刺史天寶後又為廣平鄴郡二太守性豪侈著勳中朝又食實封典十五州常受饋遺下檐帳設皆數千貫玄宗念舊常優容之侍兒二十人皆居寶帳家累三百餘口作造不遵於法式雖居州伯與佐官胥吏酋豪連榻飲謔或樗蒱藏鉤以為樂每移一州車馬填路數里不絕攜妓從禽恣為歡賞垂四十年矣時李邕王弼與琚皆年齒尊高久在外郡書疏尺題來往有譴謫留落之句右相林甫以琚等負材使氣陰議除之五載正月琚果為林甫構成其罪貶琚江華郡員外司馬削階封至任未幾林甫使羅希奭重按之希奭排馬牒至琚懼仰藥竟不能死及希奭至遂自縊而卒死非其罪人用憐之寶應元年贈太子少保王毛仲本高麗人也父游擊將軍職事求婁犯事沒官生毛仲因隸于玄宗性識明悟玄宗為臨淄王常伏事左右及出兼潞州別駕又見李宜德趫捷善騎射為人蒼頭以錢五萬買之景龍三年冬玄宗還長安以二人挾弓矢為翼初太宗貞觀中擇官戶蕃口中少年驍勇者百人每出遊獵令持弓矢於御馬前射生令騎豹文韉著畫獸文衫謂之百騎至則天時漸加其人謂之千騎分隸左右羽林營孝和謂之萬騎亦置使以領之玄宗在藩邸時常接其豪俊者或賜飲食財帛以此盡歸心焉毛仲亦悟玄宗旨待之甚謹玄宗益憐其敏惠及四年六月中宗遇弒韋后稱制令韋播高嵩為羽林將軍令押千騎營榜棰以取威其營長葛福順陳玄禮等相與見玄宗訴冤會玄宗已與劉幽求麻嗣宗薛崇簡等謀舉大計相顧益歡令幽求諷之皆願決死從命及二十日夜玄宗入苑中宜德從焉毛仲避之不入乙夜福順等至玄宗曰與公等除大逆安社稷各取富貴在於俄頃何以取信福順等請號而行斯須斬韋播韋璿高嵩等頭來玄宗舉火視之又召鍾紹京領總監丁匠刀鋸百人至因斬關而入后及安樂公主等皆為亂兵所殺其夜少帝以玄宗著大勳進封平王以紹京幽求知政事署詔敕崇簡嗣宗及福順宜德功大者為將軍次者為中郎將其時梓宮在殯舉城縞素及明玄宗引新立功者皆衣紫衣緋持滿鐵騎而出傾城聚觀歡慰其犯逆者盡曝屍於城外毛仲數日而歸玄宗不責又超授將軍及玄宗為皇太子監國因奏改左右萬騎左右營為龍武軍與左右羽林為北門四軍以福順等為將軍以押之龍武官盡功臣受賜賚號為唐元功臣長安良家子避征徭納資以求隸於其中遂每軍至數千人毛仲專知東宮駝馬鷹狗等坊未逾年已至大將軍階三品矣及先天二年七月毛仲預誅蕭岑等功授輔國大將軍左武衞大將軍檢校內外閑兼知監牧使進封霍國公實封五百戶毛仲奉公正直不避權貴兩營萬騎功臣閑官吏皆懼其威人不敢犯苑中營田草萊常收率皆豐溢玄宗以為能開元十四年贈其父秦州刺史毛仲雖有賜莊宅奴婢駝馬錢帛不可勝紀常於閑側內宅住每入侍讌賞與諸王姜皎等御幄前連榻而坐玄宗或時不見則悄然如有所失見之則歡洽連宵有至日晏其妻已邑號國夫人賜妻李氏又為國夫人每入內朝謁二夫人同承賜賚生男孩稚已授五品與皇太子同遊故中官楊思勗高力士等常避畏之七年進位特進行太僕卿餘並如故九年持節充朔方道防禦討擊大使仍以左領軍大總管王晙與天兵軍節度張說東與幽州節度裴伷先等計會毛仲部統嚴整羣牧孳息遂數倍其初芻粟之類不敢盜竊每歲迴殘常致數萬斛不三年扈從東封以諸牧馬數萬匹從每色為一隊望如雲錦玄宗益喜於岳下以宰相源乾曜張說加左右丞相毛仲加開府儀同三司自玄宗先天正位後以后父王同皎及姚崇宋璟及毛仲十五年間四人至開府又敕張說為監牧頌以美之十七年從朝五陵又贈毛仲父益州大都督毛仲益驕嘗求為兵部尚書玄宗不悅毛仲怏怏見於詞色又福順子娶毛仲女宜德唐地文等數十人皆與毛仲善倚之多為不法中官等妬其全盛逾己專發其罪尤倨慢之中官高品者毛仲視之蔑如也如卑品者小忤意則挫辱如己之僮僕力士輩恨入骨髓毛仲承恩遇妻產嘗借苑中亭子納涼玄宗借之中官構之彌甚曰北門奴官太盛豪者皆一心不除之必起大患後毛仲索甲仗於太原軍器監時嚴挺之為少尹奏之玄宗恐其黨震懼為亂乃隱其實狀詔曰開府儀同三司兼殿中監霍國公內外閑監牧都使王毛仲是惟微細非有功績擢自家臣升于朝位恩寵莫二委任斯崇無涓塵之益肆驕盈之志往屬艱難遽茲逃匿念深惟舊義在優容仍荷殊榮蔑聞悛悔在公無竭盡之效居常多怨望之詞迹其深愆合從誅殛恕其庸昧宜從遠貶可瀼州別駕員外置長任差使馳驛領送至任勿許東西及判事左領軍大將軍耿國公葛福順貶壁州員外別駕左監門將軍盧龍子唐地文貶振州員外別駕右武衞將軍成紀侯李守德貶嚴州員外別駕守德本宜德也立功後改名右威衞將軍王景耀貶黨州員外別駕右威衞將軍高廣濟貶道州員外別駕毛仲男太子僕守貞貶施州司戶太子家令守廉貶溪州司戶率更令守慶貶鶴州司倉左監門長史守道貶涪州參軍連累者數十人又詔殺毛仲及永州而縊之其後中官益盛而陳玄禮以淳樸自檢宿衞宮禁志節不衰天寶中玄宗在華清宮乘馬出宮門欲幸虢國夫人宅玄禮曰未宣敕報臣天子不可輕去就玄宗為之迴轡他年在華清宮逼正月半欲夜遊玄禮奏曰宮外即是曠野須有備預若欲夜遊願歸城闕玄宗又不能違及安祿山反玄禮欲於城中誅楊國忠事不果竟於馬嵬斬之從玄宗入巴蜀迴封蔡國公實封三百戶上元元年八月致仕史臣曰李林甫以諂佞進身位極台輔不懼盈滿蔽主聰明生既唯務陷人死亦為人所陷得非彼蒼假手以示禍淫者乎楊國忠稟性奸回才薄行穢領四十餘使恣弄威權天子莫見其非羣臣由之杜口致祿山叛逆鑾輅播遷梟首覆宗莫救艱步以玄宗之睿哲而惑於二人者蓋巧言令色先意承旨財利誘之迷而不悟也開元任姚崇宋璟而治幸林甫國忠而亂與夫齊桓任管仲隰朋幸竪刁易牙亦何異哉書曰臣有作福作威害于而家凶于而國孔子曰佞人殆誠哉是言也張暐王琚王毛仲皆鄧通閎孺之流也琚有締構之功過多僭侈死於非罪亦何惜之贊曰天啟亂階甫忠當國蔽主聰明秉心讒慝暐同二王亦承恩德吁哉僭踰不知紀極
