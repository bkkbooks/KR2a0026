body:
  text: 舊唐書卷一百五十七列傳第一百七王翃兄翊郗士美李鄘子柱柱子磎辛祕馬摠韋弘景王彥威王翃太原晉陽人也兄翊乾元中累官至京兆少尹性謙柔淡於聲利自商州刺史遷襄州刺史山南東道節度觀察等使入朝充北蕃宣慰使稱職代宗素重之及即位目為純臣遷刑部侍郎御史中丞居憲司雖不能舉振綱條然以謹重知名大曆二年卒翊為侍郎時翃自折衝授辰州刺史遷朗州有威望智術所莅立名大曆五年遷容州刺史容管經略使自安史之亂頻詔徵發嶺南兵募隸南陽魯炅軍炅與賊戰於葉縣大敗餘衆離散嶺南谿洞夷獠乘此相恐為亂其首領梁崇牽自號平南十道大都統及其黨覃問等誘西原賊張侯夏永攻陷城邑據容州前後經略使陳仁琇李抗侯令儀耿慎惑元結長孫全緒等雖容州刺史皆寄理藤州或寄梧州及翃至藤州言於衆曰吾為容州刺史安得寄理他邑乃出私財募將健許奏以好爵以是人各盡力不數月斬賊魁歐陽珪馳於廣州見節度使李勉求兵為援勉曰容州陷賊已久羣獠方強卒難圖也若務速攻祇自敗耳郡不可復也翃請曰大夫如未暇出師但請移牒諸州揚言出千兵援助冀藉聲勢成萬一之功勉然之翃乃以手札告諭義州刺史陳仁璀藤州刺史李曉庭等盟約討賊翃復募三千餘人同力戰日數合節度使牒止翃用兵翃慮惑將士匿其牒奮起士卒大破賊數萬衆擒其帥梁崇牽賊遁數百里外盡復容州故境翃發使以聞奏置順州以遏餘寇前後大小百餘戰生擒賊帥上獻者七十餘人累加銀青光祿大夫兼御史中丞充招討處置使翃又令其將張利用李實等分兵討襲西原遂收復鬱林諸州部內漸安後因哥舒晃殺節度使呂崇賁嶺南復亂翃遣大將李實悉所管兵赴援廣州西原賊率覃問復招合夷獠曰容州兵馬盡赴廣州郡可圖也於是悉衆來襲翃知其來伏兵禦之生擒覃問其衆大敗代宗聞而壯之遣中使慰勞加金紫光祿大夫時西蕃入寇河中元帥郭子儀統兵備之乃徵翃為河中少尹充節度留後領子儀之務有悍將凌正者橫暴擾軍政約其徒夜譟斬關以逐翃有告者翃縮夜漏數刻以差其期賊驚而遁卒誅正軍城乂安歷汾州刺史京兆尹屬發涇原兵討李希烈軍次滻水翃備供頓肉敗糧臭衆怒以叛翃奔至奉天加御史大夫改將作監從幸山南車駕還京改大理卿出為福州刺史福建觀察使入為太子賓客貞元十二年檢校禮部尚書代董晉為東都留守判尚書省事東畿汝防禦使凡開置二十餘屯市勁觔良鐵以為兵器簡練士卒軍政頗修無何吳少誠阻命翃賦車籍甲不待完繕東畿之人賴之十八年卒時七十餘贈禮部尚書郗士美字和夫高平金鄉人也父純字高卿為李邕張九齡等知遇尤以詞學見推與顏真卿蕭穎士李華皆相友善舉進士繼以書判制策三中高第登朝歷拾遺補闕員外郎中諫議大夫中書舍人處事不迴為元載所忌魚朝恩署牙將李琮為兩街功德使琮暴橫於銀臺門毀辱京兆尹崔昭純詣元載抗論以為國恥請速論奏載不從遂以疾辭退歸東洛凡十年自號伊川田父清名高節稱於天下及德宗即位崔祐甫作相召拜左庶子集賢學士到京以年老乞身表三上除太子詹事致仕東歸洛陽德宗召見屢加褒歎賜以金紫公卿大夫皆賦詩祖送於都門搢紳以為美談有文集六十卷行於世士美少好學善記覽父友顏真卿蕭穎士輩嘗與之討論經傳應對如流既而相謂曰吾曹異日當交於二郗之間矣未冠為陽翟丞李抱真鎮潞州辟為從事雅有參贊之績其後易二帥皆詔士美佐之由坊州刺史為黔州刺史兼御史大夫持節黔中經略招討觀察鹽鐵等使時溪州賊帥向子琪連結夷獠控據山洞衆號七八千士美設奇略討平之詔書勞慰加檢校右散騎常侍封高平郡公再遷京兆尹每別殿延問必咨訪大政出為鄂州觀察使貞元十八年伊慎有功特授安黃節度二十年慎來朝其子宥主留事朝廷未能去會宥母卒於京師利主軍權不時發喪士美命從事託以他故過其境宥果迎之告以凶問先備肩籃即日遣之元和五年拜河南尹明年三月檢校工部尚書潞州大都督府長史充昭義節度前政之豐給浮費至皆減損號令嚴肅及朝廷討王承宗士美遣兵馬使王獻領勁兵一萬為先鋒獻兇惡恃亂逗撓不進遽令召至數其罪斬之下令曰敢後出者斬士美親鼓之兵既合而賊軍大敗下三營環柏鄉屢以捷聞上大悅曰吾故知士美能辦吾事于時四面七八鎮兵共十餘萬以環鎮冀未有首功多犯法士美兵士勇敢畏法威聲甚振承宗大懼指期有破亡之勢會詔班師至今兩河間稱之十二年以疾徵為工部尚書稍間拜忠武節度使檢校刑部尚書至鎮踰月寢疾元和十四年九月卒年六十四贈尚書左僕射諡曰景士美善與人交然諾之際豁如也當時名稱翕然李鄘字建侯江夏人北海太守邕之姪孫父暄官至起居舍人鄘大曆中舉進士又以書判高等授祕書正字為李懷光所辟累遷監察御史及懷光據蒲津叛鄘與母妻陷賊中恐禍及親因偽白懷光曰兄病在洛請母往視之懷光許焉且戒妻子無得從鄘皆遣行後懷光知責之對曰鄘名隸軍籍不得隨侍老母奈何不使婦隨姑行也懷光無以罪之時與故相高郢同在賊廷乃密奏賊軍虛實及攻取之勢德宗賜手詔以勞之後事泄懷光嚴兵召郢與鄘詰責鄘詞激氣壯三軍義之懷光不敢殺囚之獄中懷光死馬燧就獄致禮表為河東從事尋以言不行歸養洛中襄州節度使嗣曹王臯致禮延辟署從事奏兼殿中侍御史入為吏部員外郎徐州張建封卒其子愔為將校所迫俾領軍務詔擇臨難不懾者即其軍以諭之遂命鄘為徐州宣慰使鄘直抵其軍召將士傳朝旨陳禍福脫監軍使桎梏令復其位兇黨不敢犯及愔上表稱兵馬留後鄘以為非詔令所加不宜稱號立使削去方受其表遷吏部郎中順宗登極拜御史中丞遷京兆尹尚書右丞元和初以京師多盜復選為京兆尹擒奸禁暴威望甚著尋拜檢校禮部尚書鳳翔尹鳳翔隴右節度使是鎮承前命帥多用武將有神策行營之號初受命必詣軍修謁鄘既受命表陳其不可詔遂去神策行營字但為鳳翔隴右節度未幾遷鎮太原入為刑部尚書兼御史大夫諸道鹽鐵轉運使五年冬出為揚州大都督府長史淮南節度使鄘前在兩鎮皆以剛嚴操下遽變舊制人情不安故未幾即改去至淮南數歲就加檢校左僕射政嚴事理府廩充積及王師征淮夷鄆寇李師道表𩹉相援鄘發楚壽等州二萬餘兵分壓賊境日費甚廣未嘗請於有司時憲宗以兵興國用不足命鹽鐵副使程异乘驛諭江淮諸道俾助軍用鄘以境內富實乃大籍府庫一年所蓄之外咸貢於朝廷諸道以鄘為倡首悉索以獻自此王師無匱乏之憂先是吐突承璀監淮南軍貴寵莫貳鄘亦以剛嚴素著而差相敬憚未嘗稍失承璀歸遂引以為相十二年徵拜門下侍郎同平章事鄘出入顯重素不以公輔自許年侵勢過頗安外鎮登祖筵聞樂而泣下曰宰相之任非吾所長也行頗緩至京師又辭疾歸第既未朝謁亦不領政事竟以疾辭改授戶部尚書俄換檢校左僕射兼太子賓客分司東都尋以太子少傅致仕元和十五年八月卒贈太子太保諡曰肅鄘強直無私飾與楊憑穆質許孟容王仲舒友善皆任氣自負然鄘當官嚴重為吏以峻法立操所至稱理而剛決少恩鎮揚州七年令行禁止擒擿生殺一委軍吏參佐束手居人頗陷非法物議以此少之子柱官至浙東觀察使柱子磎字景望博學多通文章秀絕大中十三年一舉登進士第歸仁晦鎮大梁穆仁裕鎮河陽自監察殿中相次奏為從事入為尚書水部員外郎累遷吏部郎中兼史館修撰拜翰林學士中書舍人廣明中分司洛下遇巢讓之亂逃於河橋光啟中避亂淮海有偽襄王詔命磎皆不從王鐸鎮滑臺杖策詣之鐸表薦于朝昭宗雅重之復召入翰林為學士拜戶部侍郎遷禮部尚書景福二年十月與韋招度並命中書門下平章事宣制日水部郎中知制誥劉崇魯掠其麻哭之奏云李磎奸邪挾附權倖以忝學士不合為相時宰臣崔昭緯與昭度及磎素不相協密遣崇魯沮之也乃左授太子少師磎因上十章及納諫論三篇自雪且數崇魯之惡議者重其才而鄙其訟昭宗素愛其才而急於大用至乾寧初又上第十一表乃復命為相數月與昭度同為王行瑜等所殺磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及注解書傳之闕疑僅百餘卷經亂悉亡王行瑜死德音昭雪贈司徒諡曰文子沇字東濟有俊才與父同日遇害詔贈禮部員外郎辛祕隴西人少嗜學貞元年中累登五經開元禮科選授華原尉判入高等調補長安尉高郢為太常卿嘉其禮學奏授太常博士遷祠部兵部員外郎仍兼博士山陵及郊丘二禮儀使皆署為判官當時推其達禮元和初拜湖州刺史未幾屬李錡阻命將收支郡遂令大將監守五郡蘇常杭睦四州刺史或以戰敗或被拘執賊黨以祕儒者甚易之祕密遣衙門將丘知二勒兵數百人候賊將動逆戰大破之知二中流矢墜馬起而復戰斬其將焚其營一州遂安賊平以功賜金紫由是僉以祕材堪將帥及太原節度范希朝領全師出討王承宗徵祕為河東行軍司馬委以留務尋召拜左司郎中出為汝州刺史九年徵拜諫議大夫改常州刺史選為河南尹莅職修政有可稱者十二年拜檢校工部尚書代郗士美為潞州大都督府長史御史大夫充昭義軍節度澤潞磁洺邢等州觀察使是時以再討王承宗澤潞壓境凋費尤甚朝議以兵革之後思能完復者遂以命祕凡四歲府庫積錢七十萬貫餱糧器械稱是及歸道病先自為墓誌將歿又為書一通命緘致几上其家發之皆送終遵儉之旨久歷重任無豐財厚產為時所稱元和十五年十二月卒年六十四贈左僕射諡曰昭馬摠字會元扶風人少孤貧好學性剛直不妄交遊貞元中姚南仲鎮滑臺辟為從事南仲與監軍使不叶監軍誣奏南仲不法及罷免摠坐貶泉州別駕監軍入掌樞密福建觀察使柳冕希旨欲殺摠從事穆贊鞫摠贊稱無罪摠方免死後量移恩王傅元和初遷虔州刺史四年兼御史中丞充嶺南都護本管經略使摠敦儒學長於政術在南海累年清廉不撓夷獠便之於漢所立銅柱之處以銅一千五百斤特鑄二柱刻書唐德以繼伏波之迹以綏蠻功就加金紫八年轉桂州刺史桂管經略觀察使入為刑部侍郎裴度宣慰淮西奏為制置副使吳元濟誅度留摠蔡州知彰義軍留後尋檢校工部尚書蔡州刺史兼御史大夫充淮西度使摠以申光蔡等州久陷賊寇人不知法威刑勸導咸令率化奏改彰義軍曰淮西賊之偽迹一皆削盪十三年轉許州刺史忠武軍節度陳許等州觀察處置等使明年改華州刺史潼關防禦鎮國軍等使十四年遷檢校刑部尚書鄆州刺史天平軍節度鄆曹濮等州觀察等使就加檢校尚書左僕射入為戶部尚書長慶三年卒贈右僕射摠理道素優軍政多暇公務之餘手不釋卷所著奏議集年曆通曆子鈔等書百餘卷行於世韋弘景京兆人後周逍遙公敻之後祖嗣立終宣州司戶父堯終洋州興道令弘景貞元中始舉進士為汴州浙東從事元和三年拜左拾遺充集賢殿學士轉左補闕尋召入翰林為學士普潤鎮使蘇光榮為涇原節度使弘景草麻漏光榮之功罷學士改司門員外郎轉吏部員外左司郎中改吏部度支郎中張仲方貶李吉甫諡上怒貶仲方弘景坐與仲方善出為綿州刺史宰相李夷簡出鎮淮南奏為副使賜以金紫入為京兆少尹遷給事中劉士涇以駙馬交通邪倖穆宗用為太僕卿弘景與給事薛存慶封還詔書論士涇曰伏以司僕正卿位居九列在周之命伯冏其人所以惟月膺名象河稱重漢朝亦以石慶之謹愿陳萬年之行潔皆踐斯職謂之大僚今士涇戚里常人班散秩以父任將帥家富貲財聲名不在於士林行義無聞於朝野忽長卿寺有瀆官常以親則人物未賢以勳則寵待常厚今叨顯任誠謂謬官傳曰惟名與器不可假人蓋士涇之謂臣等職司違失實在守官其劉士涇新除太僕卿敕未敢行下穆宗遣宰臣宣諭弘景等固執如前宰臣不得已改衞尉少卿穆宗復遣諭弘景曰士涇父昌有邊功士涇為少列十餘年又尚雲安公主宜有加恩朕思賞勞睦親之意竟行前命穆宗怒乃令弘景使安南邕容宣慰時論翕然推重時蕭俛以清直在位弘景議論常所輔助遷刑部侍郎轉吏部侍郎銓綜平允權邪憚其嚴勁不敢干以非道掌選二歲改陝虢觀察使歲滿徵拜尚書左丞駁吏部授官不當者六十人弘景素以鯁亮稱及居綱轄之地郎吏望風脩整會吏部員外郎楊虞卿以公事為下吏所訕獄未能辨詔下弘景與憲司就尚書省詳讞虞卿多朋游人多嚮附之弘景素所不悅時已請告在第及準詔就召以公服來謁弘景謂之曰有敕推公虞卿失容自退轉禮部尚書充東都留守判東都尚書省事繕完宮室至今賴之大和五年五月卒年六十六贈尚書左僕射弘景歷官行事始終以直道自立議論操持無所阿附當時風教尤為倚賴自長慶已來目為名卿王彥威太原人世儒家少孤貧苦學尤通三禮無由自達元和中遊京師求為太常散吏卿知其書生補充檢討官彥威於禮閤掇拾自隋已來朝廷沿革吉凶五禮以類區分成三十卷獻之號曰元和新禮由是知名特授太常博士憲宗晏駕未定諡淮南節度使李夷簡以憲宗功高列聖宜特稱祖穆宗下禮官議彥威奏曰據禮經三代之制始封之君謂之太祖太祖之外又祖有功而宗有德故夏后氏祖顓頊而宗禹殷人祖契而宗湯周人郊祀后稷祖文王而宗武王自東漢魏晉漸違經意沿革不一子孫以推美為先自始祖已下並有建祖之制蓋非典訓不可法也國朝祖宗制度本於周禮以景皇帝為太祖又祖神堯而宗太宗自高宗已降但稱宗謂之尊名可為成法不然則太宗造有區夏理致昇平玄宗掃清內難翊戴聖父肅宗龍飛靈武收復兩都此皆應天順人撥亂返正至於廟號亦但稱宗謹按經義祖者始也宗者尊也故傳曰始封必為祖書曰德高可宗故號高宗今宜本三代之定制去魏晉之亂法守貞觀開元之憲章而擬議大名垂以為訓大行廟號宜稱宗制從之故事祔廟之禮先告於太極殿然後奉神主赴太廟祔禮畢不再告于太極殿時憲宗祔廟禮畢執政詳舊典令有司再告祔享禮畢于太極殿彥威執議以為不可執政怒會宗正寺進祝版誤以憲宗為睿宗執政銜其強奏祝版參差博士之罪彥威坐削一階奪兩季俸彥威殊不低迴每議禮事守正不阿附君子稱之累轉司封員外郎中弘文館舊不置學士文宗特置一員以待彥威尋使魏博宣慰特賜金紫五年遷諫議大夫朝廷自誅李師道收復淄青十二州未定戶籍乃命彥威充十二州勘定兩稅使朝法振舉人不以為煩以本官兼史館修撰彥威通悉典故宿儒碩學皆讓之時以僕射上事儀注前後不定中丞李漢奏定朝議未以為允中書門下奏請依元和七年已前儀注左右僕射上日請受諸司四品六品丞郎已下拜彥威奏論曰臣謹按開元禮凡受冊官並與卑官答拜國朝官品令三師三公正一品尚書令正二品並是冊拜授官上之日亦無受朝官再拜之文僕射班次三公又是尚書令副貳之職雖端揆之重有異百僚然與羣官比肩事主禮曰非其臣即答拜之又曰大夫之臣不稽首非尊家臣以避君也即僕射上日受常參官拜事頗非儀況元和七年已經奏議酌為定制編在國章近年上儀又有受拜之禮禮文乍變物論未安請依元和七年敕為定時李程為左僕射宰執難於改革雖不從其議論者稱之興平縣人上官興因醉殺人亡竄吏執其父下獄興自首請罪以出其父京兆尹杜悰御史中丞宇文鼎以其首罪免父有光孝義請減死配流彥威與諫官上言曰殺人者死百王共守若許殺人不死是教殺人興雖免父不合減死詔竟許決流彥威詣中書投宰相面論語訐氣盛執政怒左授河南少尹未幾改司農卿李宗閔重之既秉政授青州刺史兼御史大夫充平盧軍節度淄青等觀察使開成元年召拜戶部侍郎尋判度支彥威儒學雖優亦勤吏事然貨泉之柄素非所長性既剛訐自恃有餘嘗紫宸廷奏曰臣自計司按見管錢穀文簿皆量入以為出使經費必足無所刻削且百口之家猶有歲蓄而軍用錢物一切通用悉隨色額占定終歲支給無毫釐之差倘臣一旦愚迷欲自欺竊亦不可得也名曰度支占額圖既而又進供軍圖曰起至德乾元之際迄於永貞元和之初天下有觀察者十節度二十有九防禦者四經略者三掎角之師犬牙相制大都通邑無不有兵都計中外兵額至八十餘萬長慶戶口凡三百三十五萬而兵額約九十九萬通計三戶資一兵今計天下租賦一歲所入總不過三千五百餘萬而上供之數三之一焉三分之中二給衣賜自留州留使兵士衣賜之外其餘四十萬衆仰給度支伏以時逢理安運屬神聖然而兵不可弭食哉惟時憂勤之端兵食是切臣謬司邦計虔奉睿圖輒纂事功庶裨聖覽又纂集國初已來至貞元帝代功臣如左氏傳體事號曰唐典進之彥威既掌利權心希大用時內官仇士良魚弘志禁中用事先是左右神策軍多以所賜衣物於度支中估判使多曲從厚給其價開成初有詔禁止然趨利者猶希意從其請託至是彥威大結私恩凡內官請託無不如意物議鄙其躁妄復脩王播舊事貢奉羨餘殆無虛日會邊軍上訴衣賜不時兼之朽故宰臣惡其所為令攝度支人吏付臺推訊彥威略不介懷入司視事及人吏受罰左授衞尉卿停務方還私第三年七月檢校禮部尚書代殷侑為許州刺史充忠武軍節度陳許觀察等使會昌中入為兵部侍郎歷方鎮檢校兵部尚書卒贈僕射諡曰靖史臣曰世以治軍戎決權變非儒者之事而王翃郗士美釋掖之儒衣奮將軍之旗鼓俾士赴湯火威振藩籬何其壯也所謂非秦無人吾謀適不用也二子遭遇英主伸其效用宜哉李建侯不屈於賊庭馬會元見伸於貝錦臨危挺操所謂貞臣將相之榮固其宜矣辛潞州之特達韋僕射之峻整王尚書之果敢皆一時之偉器也若以道自牧求福不回即能臣也而彥威欲為巧宦不亦疏乎贊曰見危致命臨難不恐士美建侯仁者之勇弘景陸離駁正黃扉貪名喪道狂哉彥威
