body:
  text: 舊唐書卷一百七十九列傳第一百二十九蕭遘弟蘧孔緯子崇弼韋昭度崔昭緯張濬朱朴鄭綮劉崇望兄崇龜弟崇魯崇謨徐彥若父商弟彥樞子綰陸扆柳璨弟瑊瑀蕭遘蘭陵人開元朝宰相太師徐國公嵩之四代孫嵩生衡衡生復德宗朝宰相復生湛湛生寘咸通中宰相寘生遘以咸通五年登進士第釋褐祕書省校書郎太原從事入朝為右拾遺再遷起居舍人與韋保衡同年登進士第保衡以幸進無藝同年門生皆薄之遘形神秀偉志操不羣自比李德裕同年皆戲呼太尉保衡心銜之及保衡作相掎遘之失貶為播州司馬途經三峽維舟月夜賦詩自悼慮保衡見害遽有神人謂之曰相公勿憂予當禦侮奉衞遘心異之過峽州經白帝祠即所覩之神人也保衡誅以禮部員外郎徵還轉考功員外郎知制誥乾符初召充翰林學士正拜中書舍人累遷戶部侍郎翰林承旨黃巢犯闕僖宗出幸以供饋不給須近臣掌計改兵部侍郎判度支中和元年三月自褒中幸成都次綿州以本官同平章事加中書侍郎累兼吏部尚書監修國史遘少負大節以經濟為己任洎處台司風望尤峻奏對朗拔天子器之光啟初王綱不振是時天下諸侯半出羣盜強弱相噬怙衆邀寵國法莫能制有李凝古者從支詳為徐州從事詳為衙將時溥所逐而賓佐陷於徐及溥為節度使因食中毒而惡凝古者譖之云為支詳報讎行酖溥收凝古殺之凝古父損時為右常侍溥上章披訴言損與凝古同謀內官田令孜受溥厚賂曲奏請收損下獄中丞盧渥附令孜鍛鍊其獄侍御史王華嫉惡堅執奏證損無罪令孜怒奏移損付神策獄按問王華拒不奉詔奏曰李損位居近侍當死即死安可取辱於黃門之手遘非時進狀請開延英奏曰李凝古行酖之謀其事曖昧已遭屠害今不復論李損父子相別三四年音問斷絕安得誣罔同謀時溥恃勳壞法凌蔑朝廷而抗表請按侍臣悖戾何甚厚誣良善人皆痛心若李損羅織而誅行當便及臣等帝為之改容損得免止於停任時田令孜專總禁軍公卿僚庶無不候其顏色唯遘以道自處未嘗屈降是年冬令孜奏安邑兩池鹽利請直屬禁軍王重榮上章論列乃奏移重榮別鎮重榮不受令孜請率禁軍討之重榮求援於太原李克用引軍赴之拒戰沙苑禁軍大敗逼京城僖宗懼出幸鳳翔諸藩上章抗論令孜生事離間方面遘素惡令孜乃與裴澈致書召朱玫玫以邠州之軍五千迎駕仍與河中太原修睦請同匡王室由是諸鎮繼上章請駕還京令孜聞玫軍至迫脅天子幸陳倉時僖宗倉卒出城夜中百官不及扈從玫怒令孜弄權又以天子不諒其忠語辭怨望乃訴于遘曰主上六年奔播百端艱險中原士庶與賊血戰肝腦塗地十室九空比至收復京都十亡七八殘民遺老方喜車駕歸宮主上不念生靈轉輸之勞甲士血戰之效將勤王之功業為敕使之竉榮而更志在亂邦與國生事召戎結怨不自他人昨奉指蹤徑來奔問不蒙見信翻類脅君古者忠而獲罪正如此也吾等報國之心極矣戰賊之力殫矣安能垂頭疊翼喘喘於閽寺之手哉春秋之義喪君有君相公徐思其宜改圖可也遘曰主上臨御十餘年未聞過行比來喪亂播越失於授任非才近年令孜掣肘動不如意上每言之流涕不已昨去陳倉上無行意令孜陳兵帳下列卒階前造次迫行不容俟旦靜言此賊罪不容誅至尊之心孰不深鑒足下乃心王室止有歸兵還鎮拜表迎鑾德業功名益光圖史捨此已往理或未安改圖之言未敢聞命玫曰李家王子極多有天下者豈一王哉遘曰廢立危事雖有伊尹霍光之賢尚貽後悔古人云勿為福始勿為禍先如公矢謀未見其利玫退而宣言曰我冊箇王子為主不從者斬及立襄王請遘為冊文遘曰少嬰衰疾文思減落比來禁署未免倩人請命能者竟不措筆乃命鄭昌圖為之玫滋不悅及還長安以昌圖代遘為相署遘太子太保乃移疾滿百日退居河中之永樂縣遘在相位五年累兼尚書右僕射進封楚國公僖宗再還京宰相孔緯與遘不協以其受偽命奏貶官尋賜死於永樂咸通中王鐸掌貢籍遘與韋保衡俱以進士中選而保衡暴貴與鐸同在中書及僖宗在蜀遘又與鐸並居相位帝嘗召宰臣鐸年高升階足跌踣勾陳中遘旁掖起帝目之喜曰輔弼之臣和予之幸也謂遘曰適見卿扶王鐸予喜卿善事長矣遘對曰臣扶王鐸不獨司長臣應舉歲鐸為主司以臣中選門生也上笑曰王鐸選進士朕選宰相於卿無負矣遘謝之而退遘為大臣士行無缺逢時不幸為偽熅所樜不以令終人士惜之弟蘧時為永樂令孔緯字化文魯曲阜人宣尼之裔曾祖岑父位終祕書省著作佐郎諫議大夫巢父兄也祖戣位終禮部尚書自有傳父遵孺終華陰縣丞緯少孤依諸父溫裕溫業皆居方鎮與名公交故緯聲籍早達大中十三年進士擢第釋褐祕書省校書郎崔慎由鎮梓州辟為從事又從崔鉉為揚州支使得協律郎崔慎由鎮華州河中緯皆從之歷觀察判官宰相楊收奏授長安尉直弘文館御史中丞王鐸奏為監察御史轉禮部員外郎宰相徐商奏兼集賢直學士改考功員外郎丁內憂免服闋以右司員外郎入朝宰臣趙隱嘉其能文薦為翰林學士轉考功郎中知制誥賜緋正拜中書舍人累遷戶部侍郎謝日面賜金紫之服乾符中罷學士出為御史中丞緯器志方雅嫉惡如讎既總憲綱中外不繩而自肅歷戶部兵部吏部三侍郎居選曹動循格令權要有所託私書盈几不之省執政怒之改太常卿黃巢之亂從僖宗幸蜀改刑部尚書判戶部事宰臣蕭遘在翰林時與緯情旨不協至是因戶部取給不充移之散秩改太子少保光啟元年從駕還京是時田令孜軍敗沙陀逼京師帝移幸鳳翔邠帥朱玫引兵來迎駕令孜挾帝幸山南時中出幸百官不及扈從而隨駕者黃門衞士數百人而已帝駐寶雞候百官詔授緯御史大夫遣中使傳詔令緯率百僚赴行在時京師急變從駕官屬至盩厔並為亂兵所剽資裝殆盡緯承命見宰相論事蕭遘裴澈以田令孜在帝左右意不欲行辭疾不見緯緯遣臺吏促百官上路皆以袍笏不具為詞緯無如之何乃召三院御史謂之曰吾輩世荷國恩身居憲秩雖六飛奔迫而咫尺天顏累詔追徵皆無承稟非臣子之義也凡布衣交舊緩急猶相救卹況在君親策名委質安可背也言竟泣下三院曰夫豈不懷但盩厔剽剝之餘乞食不給今若首途聊營一日之費俟信宿繼行可也緯拂衣起曰吾妻危疾旦不保夕丈夫豈以妻子之故怠君父之急乎公輩善自為謀吾行決矣即日見李昌符告曰主上再有詔命令促百僚前進觀羣公立意未有發期僕忝憲闈不宜居後道途多梗明公幸假五十騎送至陳倉昌符嘉之謂緯曰路無頓遞裹糧辦耶乃送錢五十緡令騎士援緯達散關緯知朱玫必蓄異志奏曰關城小邑不足以駐六師請速幸梁州翌日車駕離陳倉纔入關而邠岐之兵圍寶雞攻散關微緯之言幾危矣至褒中改兵部侍郎同中書門下平章事尋改中書侍郎集賢殿大學士王行瑜斬朱玫平定京城遷門下侍郎監修國史從駕還京駐蹕岐陽進階特進兼吏部尚書領諸道鹽鐵轉運使車駕還宮進位左僕射賜持危啟運保乂功臣食邑四千戶食實封二百戶賜鐵券恕十死罪賜天興縣莊善和里宅各一區兼領京畿營田使僖宗晏駕充山陵使僖宗祔廟緯準故事不入朝昭宗遣中使召赴延英令緯依舊視事進加司空以國學盜火所焚令緯完葺仍兼領國子祭酒蔡賊秦宗權伏誅進階開府儀同三司進位司徒封魯國公十一月昭宗謁郊廟兩中尉內樞密請朝服所司申前例中貴人無朝服助祭之禮少府監亦無素製冠服中尉怒立令製造下太常禮院禮官舉故事亦稱無中尉朝服助祭之文諫官亦論之緯奏曰中貴不衣朝服助祭國典也陛下欲以權道寵內臣則請依所兼之官而為之服天子召諫官謂之曰大禮日近無宜立異為朕容之於是內官以朝服助祭郊禮畢進位兼太保大順元年夏幽州汴州請討太原宰臣張濬請自率禁軍為招討上持疑未決問計於緯緯以討之為便語在濬傳其年秋濬軍為太原所擊大敗而還濬罷相貶官緯坐附濬以檢校太保江陵尹荊南節度觀察等使未離闕下再貶均州刺史緯濬密遣人求援於汴州朱全忠上章論救緯至商州有詔俾令就便遂寓居華州乾寧二年五月三鎮入京師殺宰相韋昭度李谿帝以大臣朋黨外交方鎮思用骨鯁正人遣中使趨華州召緯入朝以疾未任上路六月授太子賓客其日之夕改吏部尚書翌日拜司空兼門下侍郎同平章事太清宮使修奉太廟弘文館大學士延資庫使階爵功臣名食邑並如故旬日之內驛騎敦促相望于路扶疾至京師延英中謝奏曰臣前時待罪宰相智術短淺有負弼諧陛下特貸刑書曲全腰領臣期於死報泉壤不望生叩玉階復拜龍顏實臣榮幸然臣比嬰衰疾伏枕累年形骸雖存生意都盡平居勉強御事猶疏況比羸寧勝重委國祚方泰英彥盈庭豈以朽腐之人再塵機務臣力疾一拜殿庭乞陛下許臣自便因嗚咽流涕緯久疾拜蹈艱難上令中使止之改容軫念令閤門使送緯中書視事不旬日沙陀次河中同州王行約入京師謀亂天子出幸石門緯從駕至莎城疾漸危篤先還京城九月卒於光德里第贈太尉緯家尚節義挺然不屈雖權勢燻灼未嘗假以恩禮大順初天武都頭李順節恃恩頗橫不期年領浙西節度使俄加平章事謝日臺吏申中書稱天武相公衙謝準例班見百僚緯判曰不用立班順節粗暴小人不閑朝法盛飾趨中書既見無班心甚怏怏他日因會順節微言之緯曰必知公慊也夫百辟卿士天子庭臣也比來班見宰相以輔臣居班列之首奉長之義也公握天武健兒而於政事廳受百僚班見意自安乎必若須此儀俟去都頭二字可也順節不敢復言其秉禮不回多此類也孔氏自元和後昆仲貴盛至正卿方鎮者六七人未有為宰輔者至緯始在鼎司子崇弼亦登進士第仕至散騎常侍韋昭度字正紀京兆人祖縃父逢昭度咸通八年進士擢第乾符中累遷尚書郎知制誥正拜中書舍人從僖宗幸蜀拜戶部侍郎中和元年權知禮部貢舉明年以本官同平章事兼吏部尚書昭宗即位閬州刺史王建攻陳敬瑄於成都隔絕貢奉乃以昭度檢校司空同平章事成都尹劍南西川節度招撫宣慰等使昭度赴鎮敬瑄不受代詔東川顧彥朗與王建合勢討之昭度為行營招討卒歲止拔漢州王建謂昭度曰相公勞師弊衆遠事蠻夷訪聞京洛以東羣侯相噬禍難未已朝廷不治腹心之疾也相公宜亟還京師咨謀匡合平定兩河國家之利也敬瑄小醜以日月制之擒之必矣此事責建可辦昭度然之奏請還都昭度未及京師建以重兵守劍門急攻成都下之殺敬瑄自稱留後昭度還以檢校司空充東都留守召還為右僕射景福二年冬宰相杜讓能為鳳翔所殺復委昭度知政事與李谿並命時宰相崔昭緯專政惡李谿之為人降制日令知制誥劉崇魯哭麻以沮之谿上表論列天子待谿益厚明年春復命谿同平章事昭緯不勝其忿先是邠州王行瑜求為尚書令昭度奏議云國朝已來功如郭子儀未省曾兼此官乃賜號尚父崔昭緯宗人鋌曾為行瑜從事朝廷每降制敕不便於昭緯者即令鋌訴於行瑜俾上章論列朝旨小有依違即表章不遜至是李谿入拜昭緯謂鋌曰前時尚父之命已行而昭度沮之今又引谿同列此人姦纖惑上視聽宗社不寧恐復有杜太尉之事行瑜與李茂貞上章言命相非其人懼危宗社天子優詔曉諭言谿有才其年五月行瑜茂貞華州韓建以兵入覲面奏昭度李谿之姦邪請加譴逐制敕未行三鎮兵害昭度於都亭驛及行瑜誅降制復其官爵令其家收葬崔昭緯清河人也祖庇滑州酸棗縣尉父鄂州觀察使昭緯進士及第昭宗朝歷中書舍人翰林學士戶部侍郎同平章事性姦纖忌前達內結中人外連藩閫屬朝廷微弱每託援以凌人主昭宗明察心不能堪以誘召三鎮將兵詣闕賊殺宰輔內臣帝深切齒會太原之師誅行瑜罷相授右僕射後又以託附汴州再貶梧州司馬尋降制曰崔昭緯頃居內署粗著微勞擢於侍從之司委以燮調之任不能忠貞報國端慎處身潛交結於姦臣致漏泄於機事星霜累換匡輔蔑聞爾罪一也又快其私忿輒恣陰謀託崔鋌之險巇連行瑜之計畫遂致稱兵向闕怙衆脅君故宰臣韋昭度李谿並以無辜見害幾危宗社顯辱君親爾罪二也及行瑜敗滅京國甫安而乃自懼欺誣別謀託附又於藩閫潛請薦論不唯苟免罪愆兼亦再希任用貪榮冒寵僭濫無厭敗俗傷風賢愚共鄙爾罪三也又將厚賂欲結諸王輕侮我憲章玷瀆我骨肉貨財之數文字具存賴諸王作朕腹心嫉其𢀿害盡將昭緯情款兼其親吏姓名直具奏聞拒其求託昭緯曾居宰輔久歷清崇但欲逞其回邪都不顧其事體觀其識見實駭聽聞爾罪四也自姦邪既露情狀難容尚示寬刑未行嚴憲投于荒裔冀其自新而不能退省過尤恭承制命速赴貶所用守常規而猶自務宴安尋聞所在留駐攪擾藩鎮侮慢朝章曾無稟畏之心可驗苞藏之計罔知愆咎唯謗朝廷爾罪五也朕以恩澤者帝王之雨露刑法者邦國之雷霆無雨露則庶物不榮無雷霆則萬邦不肅朕體天道以化育遵王度以澄清罪既昭彰理難含垢凡百多士宜體予懷宜所在賜自盡時昭緯行次至荊南中使至斬之兄昭符仕至禮部尚書昭愿太子少保昭矩給事中昭遠考功員外郎張濬字禹川河間人祖仲素位至中書舍人父鐐官卑家寓州濬倜儻不羈涉獵文史好大言為士友之所擯棄初從鄉賦隨計咸薄其為人濬憤憤不得志乃田衣野服隱於金鳳山學鬼谷縱橫之術欲以捭闔取貴仕乾符中樞密使楊復恭因使遇之自處士薦為太常博士累轉度支員外郎黃巢將逼關輔濬託疾請告侍其母挈族避亂商州賊犯京師僖宗出幸途無供頓衞軍不得食漢陰令李康獻糗餌數百騾綱軍士始得食僖宗召康問曰卿為縣令安操心及此康對曰臣為塵吏敢有此進獻張濬員外教臣也帝異之急召至行在拜兵部郎中未幾拜諫議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徵兵諸侯奏用濬為都統判官時王敬武初破弘霸郎軍威大振累詔徵平盧兵敬武獨不赴援鐸遣濬往說之敬武已受偽命復怙強不迎詔使濬至謁見責之曰公為天子守藩王臣齎詔宣諭而侮慢詔使既未識君臣禮分復何顏以御軍民哉敬武愕然謝咎既宣詔軍士按兵默然濬並召將佐集於鞠場面諭之曰人生效忠仗義所冀粗分順逆懸知利害黃巢前日販鹽虜耳公等捨累葉天子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安若能此際排難解紛陳師鞠旅共誅寇盜迎奉鑾輿則富貴功名指掌可取吾惜公輩捨安而即危也諸將改容引過謂敬武曰諫議之言是也即時出軍從濬入援京師賊平累遷戶部侍郎僖宗再幸山南拜平章事判度支濬初發迹依楊復恭及復恭失勢乃依田令孜以至重位而反薄復恭及再幸山南復恭代令孜為中尉罷濬知政事昭宗初在藩邸深嫉宦官復恭有援立大勳恃恩任事上心不平之當時趨向者多言濬有方略能畫大計復用為宰相判度支上嘗問濬致理何事最急對曰莫若強兵兵強而天下服上由是專務蒐補兵甲欲以武功勝天下後延英論前代為治得失濬曰不必遠徵漢晉之弊臣竊見陛下春秋鼎盛英睿如此內外逼於強臣臣每思之實痛心而泣血也會朱全忠誅秦宗權安居受殺李克恭以潞州降全忠幽州李匡威雲州赫連鐸等奏請出軍討太原詔四品以上官議皆言國祚未安不宜生事假如得太原亦非國家所有濬議曰先帝頻至播越王室不寧原其亂階由克用全忠之矛盾也請因其奏乘全忠立功可斷兩雄之勢上曰收復之功克用第一今乘其危困而加兵諸侯其謂我何濬懇論用兵之利害蓋欲示外勢而擠復恭也上旨未決宰臣孔緯曰張濬所陳萬代之利也陛下所惜即目之利也以臣所料師渡河而賊必自破昨計度軍中轉餉犒勞一二年間必無闕事陛下斷意行之既二相俱論乃以濬為河東行營兵馬都招討宣慰使以京兆尹孫揆副之仍授揆昭義節度使華州韓建為供軍使朱全忠為太原西南面招討使李匡威赫連鐸為太原東北面招討使全忠以汴軍三千為濬牙隊大順元年六月濬率軍五十二都兼邠寧鄜夏雜虜共五萬人騎發自京師昭宗御安喜樓臨送濬酒酣泣奏曰陛下動為賊臣掣肘臣所以誓死憤惋為陛下除其僭逼楊復恭聞之不悅中尉內使餞於長樂復恭奉巵酒屬濬濬辭曰聖人賜酒已醉矣復恭戲曰相公握禁兵擁大旆獨當一面不領復恭意作面子耶濬笑曰賊平之後方見面子復恭銜之時汴華邠岐之師渡河會濬於晉州汴將朱崇節權知潞州事太原將李存孝攻之濬慮賊平汴人據昭義乃令孫揆分兵赴鎮中使韓歸範送旌節至軍八月揆與歸範赴潞州至潞並為存孝擒送太原九月汴將葛從周棄潞州十月濬軍至陰地邠岐華三鎮之師營平陽李存孝擊之一戰而敗委兵仗潰散進攻晉州數日中夜濬斂衆遁走比曙喪師殆半存孝進收晉絳慈隰等州濬狼狽由含山踰王屋出河清坼屋木縛筏濟河部下離散將盡李克用上章論訴曰晉州長寧關使張承暉於當道錄到張濬榜并詔曰張濬充招討制置使令率師討臣兼削臣屬籍官爵者臣誠冤誠憤頓首頓首伏以宰臣張濬欺天蔽日廊廟不容讒臣於君奪臣之位憑燕帥妄奏與汴賊結恩矯託皇威擅宣王命徵集師旅撓亂乾坤悞陛下中興之謀資黔黎重傷之困臣實何罪而陛下伐之此則宰臣持權面欺陛下況臣父子二代受恩四朝破徐方救荊楚收鳳闕碎梟巢致陛下今日冠通天之冠佩白玉之璽臣之屬籍懿皇所賜臣之師律先帝所命臣無逆節濬討何名陛下若厭逐功臣欲用文吏自可遷臣封邑以侯就第奈何加諸其罪孰肯無詞若以臣雲中之伐獲罪於時則拓拔思恭取鄜延朱全忠侵徐鄆陛下何不討之假令李孝德不忠於主伐之為是則朱瑄時溥有何罪耶此乃同坐而異名賞彼而誅此使天下藩服強者扼腕弱者自動流言竊議為臣怨嗟固非中興之術也且陛下阽危之秋則奬臣為韓彭伊霍既安之後罵臣曰戎羯蕃夷海內握兵立事如臣者衆矣寧不懼陛下他時之罵哉臣昨遇燕軍以禮退舍匡威淺昧厚自矜誇乃言臣中矢石覆士卒致內外吠聲一發短謀競陳悞陛下君臣之分況命官選將自有典刑不必幸臣之弱而後取之倘臣延期挺命尚固一方彼實何顏以見陛下此則姦邪朋黨輕弄邦典陛下凝旒端扆何由知之今張濬既以出軍微臣固難束手臣便欲叫閽輕騎面叩玉階訴邪佞於陛下之彤墀納詔命於先皇之宗廟然後束身司敗甘處憲章時克用令所擒中使奉表表至而濬敗朝廷聳震制曰漢武因恭儉富庶之後建置朔方孫弘沮之十不得一而良史以弘有宰相體者誠以愛人治國為先拓境開疆為末及孝宣值雄才削平之餘將議北征魏相爭之五將尋罷果致中興號為賢輔況朕承天厭兵戈之後人思休息之時敢望臯夔共成堯日庶幾孫魏粗及漢年苟易於斯如何倚注光祿大夫門下侍郎兼戶部尚書同中書門下平章事上柱國清河郡開國伯食邑一千二百戶充河東行營諸道兵馬招討制置等使張濬早以盛名稱為奇士由是再加徵用委以鈞衡謂其必致小康克勝大任而乃罔思守道但欲邀功用不詭之詢謀起無名之兵革自云一舉止在旬時堅請抗論勢莫能奪輕葛亮渭濱之役小裴度淮右之行經歷寒暄耗費百萬虛誕彰于朝野詐詭布於華夷橫草蔑聞燎原愈急俾擁旄乘驛之使囚在虜庭勤王奉國之軍懷歸本土忘廊廟之威重結藩屏之仇讎欲使海內生靈竭其貢賦不獨河中郡邑蕩為丘墟潛生厲階欲誰歸咎於戲徵晁錯之故事思王恢之舊章國有明文爾當何逭尚以愛人以禮理體宜然廉鎮劇權武昌善地宜罷樞軸之務仍停支度之司勉自思惟以逃後命可檢校戶部尚書鄂州刺史武昌軍節度觀察等使尋貶連州刺史馳驛發遣行至藍田關不行留華州依韓建時朝廷微弱竟不能詰乾寧二年三鎮殺韋昭度帝召孔緯欲大用亦以濬為兵部尚書又領天下租庸使三年天子幸華州罷濬使務守尚書右僕射上疏乞致仕授左僕射致仕乃還洛陽居於長水縣別墅濬雖退居山墅朝廷或有得失必章疏上言德王廢立之際濬致書諸藩請圖匡復王師範青州起兵欲取濬為謀主事雖不果其迹頗泄朱全忠將圖篡代懼濬搆亂四方不欲顯誅密諷張全義令圖之乃令牙將楊麟率健卒五十人有如劫盜圍其墅而殺之天復三年十二月晦夜也永寧縣吏葉彥者張氏待之素厚楊麟之來彥知之告濬第二子格曰相公之禍不可免郎君宜自為謀格濬父子號咷而已濬謂格曰留則併命去或可免汝自圖之勿以吾為累冀存後祀也格拜辭而去葉彥率義士三十人送渡漢江而旋格由荊江上峽入蜀王建僭號用為宰相中興平蜀任圜攜格而還格感葉彥之惠訪之身已歿而厚報其家濬第三子竄於楊行密自乾寧之後賊臣內侮王室寖微昭宗不堪凌弱欲簡拔奇材以為相然採於羣小之論未嘗獲一名人登用之徒無不為時嗤誚朱朴者乾寧中為國子博士腐儒木強無他才伎道士許巖士出入禁中嘗依朴為姦利從容上前薦朴有經濟才昭宗召見對以經義甚悅即日拜諫議大夫平章事在中書與名公齒筆札議論動為笑端數月巖士事敗俱為韓建所殺鄭綮者以進士登第歷監察殿中倉戶二員外金刑右司三郎中家貧求郡出為廬州刺史黃巢自嶺表還經淮南剽掠綮移黃巢文牒請不犯郡界巢笑而從之一郡獨不被寇天子嘉之賜緋魚袋罷郡有錢千緡寄州帑後郡數陷盜不犯鄭使君寄庫錢至楊行密為刺史送所寄於京師還綮綮善為詩多侮劇刺時故落格調時號鄭五歇後體初去廬江與郡人別云唯有兩行公廨淚一時灑向渡頭風滑稽皆此類也王徽為御史大夫奏綮為兵部郎中知臺雜遷給事中賜金紫僖宗自山南還以宰相杜讓能弟弘徽為中書舍人綮以弘徽兄在中書弟不宜同居禁近封還制書天子不報綮即移病休官無幾以左散騎常侍徵還朝政有闕無不上章論列事雖不行喧傳都下執政惡之改國子祭酒物議以綮匡諫而置之散地不可執政懼復用為常侍光化初昭宗還宮庶政未愜綮每形於詩什而嘲之中人或誦其語於上前昭宗見其激訐謂有蘊蓄就常奏班簿側注云鄭綮可禮部侍郎平章事中書胥吏詣其家參謁綮笑而問之曰諸君大悞俾天下人並不識字宰相不及鄭五也胥吏曰出自聖旨特恩來日制下抗其手曰萬一如此笑殺他人明日果制下親賓來賀搔首言曰歇後鄭五作宰相時事可知矣累表遜讓不獲既入視事侃然守道無復詼諧終以物望非宜自求引退三月餘移疾乞骸以太子少保致仕光化二年卒時議以昭宗命台臣濬朴綮三人尤謬季末之妖也劉崇望字希徒其先代郡人隨元魏孝文帝徙洛陽遂為河南人八代祖隋大理卿坦生政會輔太宗起義晋陽官至戶部尚書封渝國公圖形凌烟閣政會生玄意尚太宗女南平公主歷洪饒八州採訪使玄意生奇位至吏部侍郎奇生慎知仕至獲嘉令慎知生褧仕至東阿令褧生藻位終祕書郎藻生符進士登第咸通中位終蔡州刺史生八子崇龜崇望崇魯崇最知名崇龜咸通六年進士擢第累遷起居舍人禮部兵部二員外丁母憂免廣明元年春鄭從讜罷相鎮太原奏崇龜為度支判官檢校吏部郎中御史中丞賜金紫中和三年入朝為兵部郎中拜給事中大順中遷左散騎常侍集賢殿學士判院事改戶部侍郎檢校戶部尚書出為廣州刺史清海軍節度嶺南東道觀察處置等使卒崇望咸通十五年登進士科王凝廉問宣歙辟為轉運巡官戶部侍郎裴坦領鹽鐵辟為參佐崔安潛鎮許昌成都崇望昆仲四人皆在安潛幕下入為長安尉直弘文館遷監察御史右補闕起居郎弘文館學士轉司勳吏部二員外郎崔安潛為吏部尚書崇望判南曹滌除宿弊復清選部田令孜干政藩鎮怨望河中尤甚不修職貢僖宗在山南以蒲坂近關欲其効用選使諭旨以崇望為諫議大夫既至諭以大義重榮奉詔恭順誓心匡復請殺朱玫自贖使還上悅召入翰林充學士累遷戶部侍郎承旨轉兵部在禁署四年昭宗即位拜中書侍郎同平章事累兼兵部吏部尚書大順初同列張濬畫策討太原崇望以為不可濬果敗濬黜崇望代為門下侍郎監修國史判度支明年玉山都頭楊守信協楊復恭稱兵闕下陣于通化門上陳兵於延嘉門是夜命崇望守度支庫明日曉入含光門未開門內禁軍列于左右俟門開即劫掠兩市及聞傳呼宰相來門方啟崇望駐馬慰諭之曰聖上在街東親總戎事公等禁軍何不樓前殺賊立取功名切不可剽掠街市圖小利以成惡名也將士唯唯從崇望至長樂門守信見兵來即遁去軍士呼萬歲是日庫市獲全軍人不亂繄崇望之方略也尋加左僕射時溥與朱全忠爭衡全忠謀兼徐泗上表請以重臣鎮徐乃以崇望守本官充武寧軍節度使溥不受代行至華陰而還拜太常卿王重盈死王珂王珙爭河中節鉞朝廷以宰相崔胤為河中節度使珂李克用之子壻也河東進奏官薛志勤揚言曰崔相雖重德如作鎮河中代王珂不如光德劉公於我公事素也及三鎮以兵入朝殺害大臣以志勤之言責授崇望昭州司馬及王行瑜誅太原上表言崇望無辜放逐時已至荊南有詔召還拜吏部尚書未至王搏再知政事兼吏部尚書乃改崇望兵部尚書時西川侵寇顧彥暉欲併東川以崇望檢校右僕射平章事梓州刺史劍南東川節度使未至鎮召還復為兵部尚書光化二年卒時年六十二冊贈司空崇魯廣明元年登進士第鄭從讜奏充太原推官時兄崇龜為節度判官昆仲同居幕府尋轉掌書記中和二年入朝拜右拾遺左補闕景福初以水部員外郎知制誥二年杜讓能得罪昭宗復命韋昭度為相翰林學士李谿同平章事崇魯與崔昭緯相善昭緯恃邠岐之援讓能既誅之後權歸於己昭宗師李谿為文懼居位得寵則恩顧漸衰乃私與崇魯謀沮之及谿宣制之日出班而哭謂昭緯曰朝廷雖乏賢不可用纖人為宰輔谿比依復恭重遂居內職前日杜太尉狼籍為朝廷深恥今則削弱如此安可更遵覆轍乎由是谿命不行谿自十一月初至歲暮聯上十表訴冤其詞詆毀所不忍聞明年春復命谿為平章事昭緯召李茂貞王行瑜韓建稱兵入朝殺昭度與谿其年太原誅王行瑜昭緯貶官崇魯坐貶崖州司戶初崇龜在外聞崇魯哭麻大恚數日不食謂所親曰吾家兄弟進身有素未嘗以聲利敗名吾門不幸生此等兒崇謨中和三年進士及第乾寧末為太常少卿弘文館直學士徐彥若天后朝大理卿有功之裔曾祖宰祖陶父商三世繼登進士科商字義聲大中十三年及第釋褐祕書省校書郎累遷侍御史改禮部員外郎尋知制誥轉郎中召充翰林學士拜中書舍人戶部侍郎判本司事檢校戶部尚書襄州刺史山南東道節度等使入為御史大夫咸通初加刑部尚書充諸道鹽鐵轉運使遷兵部尚書東莞子食邑五百戶四年以本官同平章事六年罷相檢校右僕射江陵尹荊南節度觀察等使入為吏部尚書累遷太子太保卒彥若咸通十二年進士擢第乾符末以尚書郎知制誥正拜中書舍人昭宗即位遷御史中丞轉吏部侍郎檢校戶部尚書代李茂貞為鳳翔隴節度使茂貞不受代復拜中丞改兵部侍郎同平章事進加中書侍郎累兼左僕射監修國史扈昭宗石門還宮加開府儀同三司守司空進封齊國公太清宮修奉太廟等使加弘文館大學士賜扶危匡國致理功臣名昭宗自華還宮進位太保門下侍郎時崔胤專權以彥若在己上欲事權萃於其門二年九月以彥若檢校太尉同平章事廣州刺史清海軍節度嶺南東道節度等使卒於鎮弟彥樞位至太常少卿子綰天祐初歷司勳兵部二員外戶部兵部二郎中陸扆字祥文本名允迪吳郡人徙家于陝今為陝州人曾祖灃位終殿中侍御史祖師德淮南觀察支使父鄯陝州法曹參軍扆光啟二年登進士第其年從僖宗幸興元九月宰相韋昭度領鹽鐵奏為巡官明年宰相孔緯奏直史館得校書郎尋丁母憂免龍紀元年冬召授藍田尉直弘文館遷左拾遺兼集賢學士中丞柳玭奏改監察御史大順二年三月召充翰林學士改屯田員外郎賜緋景福元年加祠部郎中知制誥二年元日朝賀面賜金紫之服五月拜中書舍人扆文思敏速初無思慮揮翰如飛文理俱愜同舍服其能天子顧待特異嘗金鑾作賦命學士和扆先成帝覽而嗟挹之曰朕聞貞元時有陸贄吳通玄兄弟能作內庭文書後來絕不相繼今吾得卿斯文不墜矣乾寧初轉戶部侍郎二年改兵部進階銀青光祿大夫嘉興男三百戶三年正月宣授學士承旨尋改左丞其年七月改戶部侍郎同平章事故事三署除拜有光署錢以宴舊僚內署即無斯例扆拜輔相之月送學士光院錢五百貫特舉新例內署榮之八月加中書侍郎集賢殿大學士判戶部事九月覃王率師送徐彥若赴鳳翔師之起也扆堅請曰播越之後國步初集不宜與近輔交惡必為他盜所窺加以親王統兵物議騰口無益於事祇貽後患昭宗已發兵怒扆沮議是月十九日責授硤州刺史師出果敗車駕出幸四年二月復授扆工部尚書八月轉兵部尚書從昭宗自華還宮明年正月復拜中書侍郎同平章事光化三年四月兼戶部尚書進封吳郡開國公食邑一千戶九月轉門下侍郎監修國史天復元年五月進階特進兼兵部尚書加食邑五百戶車駕自鳳翔還京赦後諸道皆降詔書獨鳳翔無詔扆奏曰鳳翔近在國門責其心迹罪實難容然比來職貢無虧朝廷未與之絕一朝獨無詔命示人不廣也崔胤怒奏貶扆沂王傅分司東都削階至正議大夫居無何崔胤誅復授吏部尚書階封如故從昭宗遷洛其年秋昭宗遇弒明年五月責授濮州司戶與裴樞崔遠獨孤損等被害於滑州白馬驛時年五十九子璪後為緱氏令柳璨河東人曾祖子華祖公器僕射公綽之再從弟也父遵璨少孤貧好學僻居林泉晝則採樵夜則燃木葉以照書性謇直無緣飾宗人璧玭貴仕於朝鄙璨朴鈍不以諸宗齒之光化中登進士第尤精漢史魯國顏蕘深重之蕘為中書舍人判史館引為直學士璨以劉子玄所撰史通譏駁經史過當璨紀子玄之失別為十卷號柳氏釋史學者伏其優贍遷左拾遺公卿朝野託為牋奏時譽日洽以其博奧目為柳篋子昭宗好文初寵待李谿頗厚洎谿不得其死心常惜之求文士似谿者或薦璨高才召見試以詩什甚喜無幾召為翰林學士崔胤得罪前一日召璨入內殿草制敕胤死之日既夕璨自內出前驅傳呼相公來人未見制敕莫測所以翌日對學士上謂之曰朕以柳璨奇特似可奬任若令預政事宜授何官承旨張文蔚曰陛下拔用賢能固不拘資級恩命高下出自聖懷若循兩省遷轉拾遺超等入起居郎臨大位非宜也帝曰超至諫議大夫可乎文蔚曰此命甚愜即以諫議大夫平章事改中書侍郎任人之速古無茲例同列裴樞獨孤損崔遠皆宿素名德遽與璨同列意微輕之璨深蓄怨昭宗遷洛諸司內使宿衞將佐皆朱全忠腹心也璨皆將迎接之以恩厚相交結故當時權任皆歸之二年五月西北長星竟天掃太微文昌帝座諸宿全忠方謀篡代而妖星謫見占者云君臣俱災宜刑殺以應天變蔣玄暉張廷範謀殺衣冠宿望難制者璨即首疏素所不快者三十餘人相次誅殺班行為之一空冤聲載路傷害既甚朱全忠心惡之會全忠授九錫蔣玄暉等別陳意見王殷至大梁誣玄暉等通導宮掖欲興復李氏全忠怒捕廷範令河南聚衆五車分裂之兼誅璨臨刑呼曰負國賊柳璨死其宜矣初璨遷洛後累兼戶部尚書守司空進階光祿大夫鹽鐵轉運使其弟瑀瑊坐璨笞死史臣曰嗚呼李氏之失馭也孛沴之氣紛如仁義之徒殆盡狐鳴鴟嘯瓦解土崩帶河礪獄之門寂無琨逖奮挺揭竿之類唯効敦玄手未捨於棘矜心已萌于問鼎加以囂浮士子闒茸鯫儒昧管葛濟時之才無王謝扶顛之業邀功射利陷族喪邦濬緯養虎於前胤璨剝廬於後逐徐薛於瘴海置綮朴於巖廊殿廷有哭制之夫輔弼走破輿之黨九疇既紊百怪斯呈木將朽而𢀿蝎生厲既篤而夔魖見妖徒若此亡國宜然何必長星更臨衰運贊曰蕭召朱玫孔符張濬身世罹殃邦家起釁如木斯𢀿自潰於中抵巇侮亂安責伏戎
