body:
  text: 舊唐書卷一百六十九列傳第一百一十九李訓鄭注王涯王璠賈餗舒元輿郭行餘羅立言李孝本李訓肅宗時宰相揆之族孫也始名仲言進士擢第形貌魁梧神情灑落辭敏智捷善揣人意寶曆中從父逢吉為宰相以訓陰險善計事愈親厚之初與茅彙等欲中傷李程及武昭事發訓坐長流嶺表會赦得還丁母憂居洛中時逢吉為留守思復為宰相且深怨裴度居常憤鬱不樂訓揣知其意即以奇計動之自言與鄭注善逢吉以為然遺訓金帛珍寶數百萬令持入長安以賂注注得賂甚悅乘間薦于中尉王守澄乃以注之藥術訓之易道合薦于文宗守澄以訓縗粗難入禁中帝令訓戎服號王山人與注入內帝見其指趣甚奇之及訓釋服在京師大和八年自流人補四門助教召入內殿面賜緋魚其年十月遷國子周易博士充翰林侍講學士入院日賜宴宣法曲弟子二十人就院奏法曲以寵之兩省諫官伏閤切諫言訓姦邪海內聞知不宜令侍宸扆終不聽文宗性守正嫉惡以宦者權寵太過繼為禍胎元和末弒逆之徒尚在左右雖外示優假心不堪之思欲芟落本根以雪讎恥九重深處難與將相明言前與侍講宋申錫謀謀之不臧幾成反噬自是巷伯尤橫因鄭注得幸守澄俾之援訓冀黃門之不疑也訓既在翰林解易之際或語及巷伯事則再三憤激以動上心以其言論縱橫謂其必能成事遂以真誠謀於訓注自是二人寵幸言無不從而深祕之謀往往流聞於外上慮中人猜慮乃疏易義五條示於百辟有能出訓之意者賞之蓋欲知上以師友寵之九年七月改兵部郎中知制誥充翰林學士九月遷禮部侍郎同平章事仍賜金紫之服詔以平章之暇三五日一入翰林訓既秉權衡即謀誅內豎中官陳弘慶者自元和末負弒逆之名忠義之士無不扼腕時為襄陽監軍乃召自漢南至青泥驛遣人封杖決殺王守澄自長慶已來知樞密典禁軍作威作福訓既作相以守澄為六軍十二衞觀軍容使罷其禁旅之權尋賜酖殺之訓愈承恩顧每別殿奏對他宰相莫不順成其言黃門禁軍迎拜戢斂訓本以纖達門庭趨附之士率皆狂怪險異之流時亦能取正人偉望以鎮人心天下之人有冀訓以致太平者不獨人主惑其言訓雖為鄭注引用及祿位俱大勢不兩立託以中外應赴之謀出注為鳳翔節度使俟誅內豎即兼圖注約以其年十一月誅中官須假兵力乃以大理卿郭行餘為邠寧節度使戶部尚書王璠為太原節度使京兆少尹羅立言權知大尹事太府卿韓約為金吾街使刑部郎中知雜李孝本權知中丞事皆訓之親厚者冀王璠郭行餘未赴鎮間廣令召募豪俠及金吾臺府之從者俾集其事是月二十一日帝御紫宸班定韓約不報平安奏曰金吾左仗院石榴樹夜來有甘露臣已進狀訖乃蹈舞再拜宰相百官相次稱賀李訓奏曰甘露降祥俯在宮禁陛下宜親幸左仗觀之班退上乘軟舁出紫宸門由含元殿東階升殿宰相侍臣分立於副階文武兩班列於殿前上令宰相兩省官先往視之既還曰臣等恐非真甘露不敢輕言言出四方必稱賀也上曰韓約妄耶乃令左右軍中尉樞密內臣往視之既去訓召王璠郭行餘曰來受敕旨璠恐悚不能前行餘獨拜殿下時兩鎮官健皆執兵在丹鳳門外訓已令召之唯璠從兵入邠寧兵竟不至中尉樞密至左仗聞幕下有兵聲驚恐走出閽者欲扃鎖之為中人所叱執關而不能下內官迴奏韓約氣懾汗流不能舉首中官謂之曰將軍何及此耶又奏曰事急矣請陛下入內即舉軟輿迎帝訓殿上呼曰金吾衞士上殿來護乘輿者人賞百千內官決殿後罘罳舉輿疾趨訓攀呼曰陛下不得入內金吾衞士數十人隨訓而入羅立言率府中從人自東來李孝本率臺中從人自西來共四百餘人上殿縱擊內官死傷者數十人訓時愈急邐迆入宣政門帝瞋目叱訓內官郄志榮奮拳擊其胸訓即僵仆於地帝入東上閤門門即闔內官呼萬歲者數四須臾內官率禁兵五百人露刃出閤門遇人即殺宰相王涯賈餗舒元輿方中書會食聞難出走諸司從吏死者六七百人是日訓中拳而仆知事不濟乃單騎走入終南山投寺僧宗密訓與宗密素善欲剃其髮匿之從者止之乃趨鳳翔欲依鄭注出山為盩厔鎮將宗楚所得械送京師至昆明池訓恐入軍別受搒掠乃謂兵士曰所在有兵得我者即富貴不如持我首行免被奪取乃斬訓持首而行訓弟仲景再從弟戶部員外郎元臯皆伏法仇士良以宗密容李訓遣人縛入左軍責以不告之罪將殺之宗密怡然曰貧僧識訓年深亦知反叛然本師教法遇苦即救不愛身命死固甘心中尉魚弘志嘉之奏釋其罪鄭注絳州翼城人始以藥術游長安權豪之門本姓魚冒姓鄭氏故時號魚鄭注用事時人目之為水族元和十三年李愬為襄陽節度使注往依之愬得其藥力因厚遇之署為節度衙推從愬移鎮徐州又為職事軍政可否愬與之參決注詭辯陰狡善探人意旨與愬籌謀未嘗不中其意然挾邪任數專作威福軍府患之時王守澄監徐軍深怒注一日以軍情患注白于愬愬曰彼雖如此實奇才也將軍試與之語苟不如旨去未為晚愬即令謁監軍守澄初有難色及延坐與語機辯縱衡盡中其意遂延于內室促膝投分恨相見之晚翌日守澄謂愬曰誠如公言實奇士也自是出入守澄之門都無限隔愬署為巡官齒於賓席及守澄入知樞密當長慶寶曆之際國政多專於守澄注晝伏夜動交通賂遺初則讒邪姦巧之徒附之以圖進取數年之後達僚權臣爭湊其門累從山東京西諸軍歷衞佐評事御史又檢校庫部郎中為昭義節度副使既以陰事誣陷宋申錫守道正人始側目焉大和七年罷邠寧行軍司馬入京師御史李款閤內彈之曰鄭注內通敕使外結朝官兩地往來卜射財貨晝伏夜動干竊化權人不敢言道路以目請付法司旬日內諫章十數文宗不納尋授注通王府司馬充右神策判官中外駭歎八年九月注進藥方一卷令守澄召注對浴堂門賜錦綵召對之夕彗出東方長三尺光耀甚緊其年十二月拜太僕卿兼御史大夫注起第善和里通於永巷長廊複壁日聚京師輕薄子弟方鎮將吏以招權利間日入禁軍與守澄款密語必移時或通夕不寐李訓既附注以進承間入謁而輕浮躁進者盈於注門九年八月遷工部尚書充翰林侍講學士召自九仙門帝面賜告身時李訓已在禁庭二人相洽日侍君側講貫太平之術以為朝夕可致昇平兩姦合從天子益惑其說是時訓注之權赫於天下既得行其志生平恩讎絲毫必報因楊虞卿之獄挾忌李宗閔李德裕心所惡者目為二人之黨朝士相繼斥逐班列為之一空人人惴慄若崩厥角帝微知之下詔慰諭人情稍安訓注天資狂妄偷合苟容至於經略謀猷無可稱者初浴堂召對上訪以富人之術乃以榷茶為對其法欲以江湖百姓茶園官自造作量給直分命使者主之帝惑其言乃命王涯兼榷茶使又言秦中有災宜興工役以禳之文宗能詩嘗吟杜甫江頭篇云江頭官殿鎖千門細柳新蒲為誰綠始知天寶已前環曲江四岸有樓臺行宮廨署心切慕之既得注言即命左右神策軍差人淘曲江昆明二池仍許公卿士大夫之家於江頭立亭館以時追賞時兩軍造紫雲樓彩霞亭內出樓額以賜之注言無不從皆此類也九月檢校尚書左僕射鳳翔尹鳳翔節度使蓋與李訓謀事有期欲中外協勢十一月注聞訓事發自鳳翔率親兵五百餘人赴闕至扶風聞訓敗乃還監軍使張仲清已得密詔迎而勞之召至監軍府議事注倚兵衞即赴之仲清已伏兵幕下注方坐伏兵發斬注傳首京師部下潰散注家屬屠滅靡有孑遺初未獲注京師憂恐至是人人相慶注兩目不能遠視自言有金丹之術可去痿弱重膇之疾始李愬自云得効乃移之守澄亦神其事由是中官視注皆憐之卒以是售其狂謀而守澄自貽其患復致衣冠塗地豈一時之沴氣歟既籍沒其家財得絹一百萬匹他貨稱是王涯字廣津太原人父晃涯貞元八年進士擢第登宏辭科釋褐藍田尉二十年十一月召充翰林學士拜右拾遺左補闕起居舍人皆充內職元和三年為宰相李吉甫所怒罷學士守都官員外郎再貶虢州司馬五年入為吏部員外七年改兵部員外郎知制誥九年八月正拜舍人十年轉工部侍郎知制誥加通議大夫清源縣開國男學士如故十一年十二月加中書侍郎同平章事十三年八月罷相守兵部侍郎尋遷吏部穆宗即位以檢校禮部尚書梓州刺史劍南東川節度使其年十一月吐蕃南北掎角入寇西北邊騷動詔兩川兵拒之時蕃軍逼雅州涯上疏曰臣當道出軍徑入賊腹有兩路一路從龍州清川鎮入蕃界徑抵故松州城是吐蕃舊置節度之所一路從綿州威蕃柵入蕃界徑抵棲雞城皆吐蕃險要之地又曰臣伏見方今天下無犬吠之警海內同覆盂之安每蕃戎一警則中外咸震致陛下有旰食軫懷之憂斯乃臣等居大官受重寄者之深責也雖承詔發卒心馳寇廷期於為國討除使戎人芟剪晝夜思忖何補涓毫所以慺慺愚心願陳萬一臣觀自古長策昭然可徵在於實邊兵選良將明斥候廣資儲杜其姦謀險其走集此立朝士大夫皆知不獨微臣知之也祇在舉行之耳然臣愚見所及猶欲布露者誠願陛下不愛金帛之費以釣北虜之心臨遣信臣與之定約曰犬戎悖亂負恩為邊鄙患者數矣能制而服之者唯在北蕃如能發兵深入殺若干人取若干地則受若干之賞開懷以示之厚利以啗之所以勸聳要約者異於他日則匈奴之銳可得出矣一戰之後西戎之力衰矣穆宗不能用其謀長慶元年幽鎮復亂王師征之未聞克捷涯在鎮上書論用兵曰伏以幽鎮兩州悖亂天紀迷亭育之厚德肆豺虎之非心囚繫鼎臣戕賊戎帥毒流列郡釁及賓僚凡在有情孰不扼腕咸欲橫戈荷戟問罪賊廷伏以國家文德誕敷武功繼立遠無不服邇無不安矧茲二方敢逆天理臣竊料詔書朝下諸鎮夕驅以貔貅問罪之師當猖狂失節之寇傾山壓卵決海灌熒勢之相懸不是過也但以常山燕郡虞虢相依一時興師恐費財力且夫罪有輕重事有後先攻堅宜從易者如聞范陽肇亂出自一時事非宿謀情亦可驗鎮州構禍殊匪偶然扇動屬城以兵拒境如此則幽薊之衆可示寬刑鎮冀之戎必資先討況廷湊闒茸不席父祖之恩成德分離人多迫脅之勢今以魏博思復讎之衆昭義願盡敵之師參之晉陽輔以滄易掎角而進易若建瓴盡屠其城然後北首燕路在朝廷不為失信於軍勢實得機宜臣之愚忠輒在於此臣又聞用兵若鬬先扼其喉今瀛莫易定兩賊之咽喉也誠宜假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先迫冀趙次下井陘此百舉百全之勢也臣受恩深至無以上酬輕冒陳聞不勝戰越洎涯疏至盧士玫已為賊劫陷瀛莫州凶勢不可遏俄而二凶俱宥之三年入為御史大夫敬宗即位改戶部侍郎兼御史大夫充鹽鐵轉運使俄遷禮部尚書充職寶曆二年檢校尚書左僕射興元尹山南西道節度使就加檢校司空大和三年正月入為太常卿文宗以樂府之音鄭衞太甚欲聞古樂命涯詢於舊工取開元時雅樂選樂童按之名曰雲韶樂樂曲成涯與太常丞李廓少府監庾承憲押樂工獻於棃園亭帝按之於會昌殿上悅賜涯等錦綵四年正月守吏部尚書檢校司空復領鹽鐵轉運使其年九月守左僕射領使奏李師道前據河南十二州其兗鄆淄青濮州界舊有銅鐵冶每年額利百餘萬自收復未定稅額請復係鹽鐵司依建中元年九月敕例制置從之七年七月以本官同平章事進封代國公食邑二千戶八年正月加檢校司空門下侍郎弘文館大學士太清宮使九年五月正拜司空仍令所司冊命加開府儀同三司仍兼領江南榷茶使十一月二十一日李訓事敗文宗入內涯與同列歸中書會食未下筯吏報有兵自閤門出逢人即殺涯等蒼惶步出至永昌里茶肆為禁兵所擒幷其家屬奴婢皆繫於獄仇士良鞫涯反狀涯實不知其故械縛既急搒笞不勝其酷乃令手書反狀自誣與訓同謀獄具左軍兵馬三百人領涯與王璠羅立言右軍兵馬三百人領賈餗舒元輿李孝本先赴郊廟徇兩市乃腰斬於子城西南隅獨柳樹下涯以榷茶事百姓怨恨詬罵之投瓦礫以擊之中書房吏焦寓焦璿臺吏李楚等十餘人吏卒爭取殺之籍沒其家涯子工部郎中集賢殿學士孟堅太常博士仲翔其餘稚小妻女連襟係頸送入兩軍無少長盡誅之自涯已下十一家資貨悉為軍卒所分涯積家財鉅萬計兩軍士卒及市人亂取之竟日不盡涯博學好古能為文以辭藝登科踐揚清峻而貪權固寵不遠邪佞之流以至赤族涯家書數萬卷侔於秘府前代法書名畫人所保惜者以厚貨致之不受貨者即以官爵致之厚為垣竅而藏之複壁至是人破其垣取之或剔取函奩金寶之飾與其玉軸而棄之涯之死也人以為冤昭義節度使劉從諫三上章求示涯等三相罪名仇士良頗懷憂恐初宦官縱毒凌藉南司及從諫奏論凶焰稍息人士賴之王璠字魯玉父礎進士文辭知名元和五年擢進士第登宏辭科風儀修飾操履甚堅累辟諸侯府元和中入朝為監察御史再遷起居舍人副鄭覃宣慰於鎮州長慶中累歷員外郎十四年以職方郎中知制誥寶曆元年二月轉御史中丞時李逢吉為宰相與璠親厚故自郎官掌誥便拜中丞恃逢吉之勢稍橫嘗與左僕射李絳相遇於街交車而不避絳上疏論之曰左右僕射師長庶僚開元中名之丞相其後雖去三事機務猶總百司之權表狀之中不署其姓尚書已下每月合衙上日百僚列班宰相居上中丞御史列位於廷禮儀之崇中外特異所以自武德貞觀已來聖君賢臣布政除弊不革此禮謂為合宜苟有不安尋亦合廢近年緣有才不當位恩加特拜者遂從權便不用舊儀酌於羣情事實未當今或有僕射初除就中丞院門相看即與欲參何殊或中丞新授亦無見僕射處又參賀處或僕射先至中丞後來憲度乖宜尊卑倒置倘人才忝位自合別授賢良若朝命守官豈得有虧法制伏望下百僚詳定事體使永可遵行敕旨令兩省詳議兩省奏曰元和中伊慎忝居師長之位太常博士韋謙削去舊儀今李絳所論於禮甚當逢吉素惡絳之直天子雖許行舊儀中書竟無處分乃罷璠中丞遷工部侍郎尋罷絳僕射以太子少師分司東都其弄權怙寵如此璠二年七月出為河南尹大和二年以本官權知東都選十月轉尚書右丞敕選畢入朝三年改吏部侍郎四年七月拜京兆尹兼御史大夫十二月遷左丞判太常卿事六年八月檢校禮部尚書潤州刺史浙西觀察使八年李訓得幸累薦于上召還復拜右丞璠以逢吉故吏自是傾心於訓權倖傾朝九年五月遷戶部尚書判度支謝日召對浴堂錫之錦綵其年十一月李訓將誅內官令璠召募豪俠乃授太原節度使託以募爪牙為名訓敗之日璠歸長興里第是夜為禁軍所捕舉家下獄斬璠於獨柳樹家無少長皆死璠子遐休直弘文館李訓舉事之日遐休於館中禮上同職駕部郎中令狐定等五六人送之是日悉為亂兵所執定以兄楚為僕射軍士釋之獨執遐休誅之初璠在浙西繕城壕役人掘得方石上有十二字云山有石石有玉玉有瑕瑕即休璠視莫知其旨京口老人講之曰此石非尚書之吉兆也尚書祖名崟崟生礎是山有石也礎生尚書是石有玉也尚書之子名遐休休絕也此非吉徵果赤族賈餗字子美河南人祖渭父寧餗進士擢第又登制策甲科文史兼美四遷至考功員外郎長慶初策召賢良選當時名士考策餗與白居易俱為考策官選文人以為公尋以本官知制誥遷庫部郎中充職四年為張又新所構出為常州刺史大和初入為太常少卿二年以本官知制誥三年七月拜中書舍人四年九月權知禮部貢舉五年牓出後正拜禮部侍郎凡典禮闈三歲所選士七十五人得其名人多至公卿者七年五月轉兵部侍郎八年十一月遷京兆尹兼御史大夫九年四月檢校禮部尚書潤州刺史浙西觀察使制出未行拜中書侍郎同平章事進金紫階封姑臧男食邑三百戶未幾加集賢殿學士監修國史其年十一月李訓事發兵交殿廷禁軍肆掠餗易服步行出內潛身人間翌日自投神策軍與王涯等皆族誅餗雖中立自持然不能以身犯難排斥姦纖脂韋其間遂至覆族逢時多僻死非其罪世多冤之舒元輿者江州人元和八年登進士第釋褐諸府從事大和初入朝為監察轉侍御史初天寶中玄宗祀九宮壇次郊壇行事御署祝板元輿為監察監祭事以為太重奏曰臣伏見祀九宮貴神祝板九片陛下親署御名及稱臣於九宮之神臣伏以天子之尊除祭天地宗廟之外無合稱臣者王者父天母地兄日姊月而貴神以九宮為目是宜分方而守其位臣數其名號太一天一招搖軒轅咸池青龍太陰天符攝提也此九神於天地猶子男也於日月猶侯伯也陛下為天子豈可反臣於天之子男耶臣竊以為過縱陰陽者流言其合祀則陛下當合稱皇帝遣某官致祭于九宮之神不宜稱臣與名臣雖愚瞽未知其可乞下禮官詳議從之尋轉刑部員外郎元輿自負奇才銳於進取乃進所業文章乞試効用宰執謂其躁競五年八月改授著作郎分司東都時李訓丁母憂在洛與元輿性俱詭激乘險蹈利相得甚歡及訓為文宗寵遇復召為尚書郎九年以右司郎中知臺雜七月權知中丞事九年拜御史中丞兼判刑部侍郎是月以本官同平章事與訓同知政事而深謀詭算熒惑主聽皆生於二凶也訓竊發之日兵自內出元輿易服單馬出安化門為追騎所擒送左軍族誅之郭行餘者亦登進士第大和初累官至楚州刺史五年移刺汝州兼御史中丞九月入為大理卿李訓在東都時與行餘親善行餘數相餉遺至是用為九列十一月訓欲竊發令其募兵乃授邠寧節度使訓敗族誅羅立言者父名歡貞元末登進士第寶曆初檢校主客員外郎為鹽鐵河陰院官二年坐糴米不實計贓一萬九千貫鹽鐵使惜其吏能定罪止削所兼侍御史大和中為司農少卿主太倉出納物以貨厚賂鄭注李訓亦重之訓將竊發須兵集事以京兆府多吏卒用立言為京兆少尹知府事訓敗日族誅長安縣令孟琯貶硤州長史萬年縣令姚中立朗州長史以兩縣捕賊官受立言指使故也初立言集兩縣吏卒萬年捕賊官鄭洪懼禍託疾既而詐死令家人喪服聚哭姚中立陰知其故恐以詐聞不免其累乃以狀告洪之詐仇士良拘洪入軍洪銜中立之告謂士良曰追集所由皆因縣令處分予何罪也故中立坐貶洪免死李孝本者宗室之子也累官至刑部郎中而依于訓注以求進舒元輿作相訓用孝本知臺雜權知中丞事最預訓謀竊發之日孝本從人殺內官十餘人於殿廷知事不濟單騎走投鄭注至咸陽西原為追騎所捕族誅之坐訓注而族者凡十一家人以為冤史臣曰王者之政以德覇者之政以權古先后王率由茲道而遂能息人靖亂垂統作則者如梓人共柯而殊工良奕同枰而獨勝蓋在得其術則事無後艱昭獻皇帝端冕深帷憤其廝養欲鏟宮居之弊載澄刑政之源當宜禮一代正人訪先朝耆德修文教而厚風俗設武備以服要荒俾西被東漸皆陶於景化柔祗蒼昊必降於闕祥自然懷德以寧無思不服況區區宦者獨能悖化哉故豎刁易牙不廢齊桓之覇韓嫣籍孺何妨漢帝之明蓋有管仲亞夫之賢屬之以大政故也此二君者制御閽寺得其道也而昭獻忽君人之大體惑纖狡之庸儒雖終日橫經連篇屬思但得好文之譽庸非致治之先且李訓者狙詐百端陰險萬狀背守澄而勸酖出鄭注以擅權祇如盡隕四星兼權八校小人方寸即又難知但慮為蚤蝨而採溪蓀翻獲螾蜓之患也嗚呼明主夫何不思遽致血濺黃門兵交青瑣苟無藩后之勢黃屋危哉涯餗綽有士風晚為利喪致身鬼蜮之伍何逃瞰室之災非天不仁子失道也贊曰奭旦興周斯高亡秦禍福非天治亂由人訓注姦偽血赬象魏非時乏賢君迷倒置
