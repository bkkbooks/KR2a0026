body:
  text: 舊唐書卷一百五列傳第五十五宇文融韋堅楊慎矜王鉷宇文融京兆萬年人隋禮部尚書平昌公之玄孫也祖節貞觀中為尚書右丞明習法令以幹局見稱時江夏王道宗嘗以私事託於節節遂奏之太宗大悅賜絹二百匹仍勞之曰朕所以不置左右僕射者正以卿在省耳永徽初累遷黃門侍郎同中書門下三品代于志寧為侍中坐房遺愛事配流桂州而卒父嶠萊州長史融開元初累轉富平主簿明辯有吏幹源乾曜孟溫相次為京兆尹皆厚禮之俄拜監察御史時天下戶口逃亡免役多偽濫朝廷深以為患融乃陳便宜奏請檢察偽濫搜括逃戶玄宗納其言因令融充使推勾無幾獲偽濫及諸免役甚衆特加朝散大夫再遷兵部員外郎兼侍御史融於是奏置勸農判官十人並攝御史分往天下所在檢括田疇招攜戶口其新附客戶則免其六年賦調但輕稅入官議者頗以為擾人不便陽翟尉皇甫憬上疏曰臣聞智者千慮或有一失愚夫千計亦有一得且無益之事繁則不急之務衆不急之務衆則數役數役則人疲人疲則無聊生矣是以太上務德以靜為本其次化之以安為上但責其疆界嚴之隄防山水之餘即為見地何必聚人阡陌親遣括量故奪農時遂令受弊又應出使之輩未識大體所由殊不知陛下愛人至深務以勾剝為計州縣懼罪據牒即徵逃亡之家隣保代出隣保不濟又便更輸急之則都不謀生緩之則慮法交及臣恐逃逸從此更深至如澄流在源止沸由火不可不慎今之具僚向逾萬數蠶食府庫侵害黎人國絕數載之儲家無經月之畜雖其厚稅亦不可供戶口逃亡莫不由此縱使伊臯申術管晏陳謀豈息茲弊若以此給將何以堪雖東海南山盡為粟帛亦恐不足豈括田稅客能周給也左拾遺楊相如上書咸陳括客為不便上方委任融侍中源乾曜及中書舍人陵堅皆贊成其事乃貶憬為盈川尉於是諸道括得客戶凡八十餘萬田亦稱是州縣希融旨意務於獲多皆虛張其數亦有以實戶為客者歲終徵得客戶錢數百萬融由是擢拜御史中丞言事者猶稱括客損居人上令集百僚於尚書省議公卿已下懼融恩勢皆雷同不敢有異詞唯戶部侍郎楊瑒獨建議以括客不利居人徵籍外田稅使百姓困弊所得不補所失無幾瑒出為外職融乃馳傳巡歷天下事無大小先牒上勸農使而後申中書省司亦待融指撝而後決斷融之所至必招集老幼宣上恩命百姓感其心至有流淚稱父母者融使還具奏乃下制曰人惟邦本本固邦寧必在安人方能固本永言理道實獲朕心思所以康濟黎庶寵綏華夏上副宗廟乾坤之寄下答宇縣貢獻之勤何嘗不夜分輟寢日旰忘食然後以眇眇之身當四海之貴雖則長想遐邇不可家至日見至于宣布政教安輯逋亡言念再三其勤至矣莫副朕命實用恧焉當扆永懷靜言厥緒豈人流自久招諭不還上情靡通于下衆心罔達於上求之明發想見其人當屬括地使宇文融謁見于延英殿朕以人必土著因議逃亡嘉其忠讜堪任以事乃授其田戶紀綱兼委之郡懸釐革便令充使奉以安人遂能恤我黎元克將朕命發自夏首來於歲終巡按所及歸首百萬仍聞宣制之日老幼欣躍惟令是從多流淚以感朕心咸吐誠以荷王命猶恐朕之薄德未孚于人撫字安存更冀良算遂命百司長吏方州岳牧僉議都堂廣徵異見羣詞盈於札翰環省彌于旬日庶廣朕意豈以為勞稽衆考言謂斯折衷欲人必信期於令行凡爾司存勉以遵守夫食為人天富而後教經教彝體前哲至言故平糴行於昔王義倉加於近代所以存九年之蓄收上中之斂穰賤則農不傷財災饉則時無菜色救人活國其利博哉今流戶大來王田載理敖庾之務寤寐所懷其客戶所稅錢宜均充所在常平倉用仍許預付價直任粟麥兼貯并舊常平錢粟並委本道判官勾當處置使斂散及時務以矜恤且分災恤患州黨之常情損餘濟闕親隣之善貸故木鐸云徇里胥均功夜績相從齊俗以贍今陽和布澤丁壯就田言念魚眾惸事資拯助宜委使司與州縣商量勸作農社貧富相恤耕耘以時仍每至雨澤之後種穫忙月州縣常務一切停減使趨時急於備寇尺壁賤於寸陰是則天無虛施人無遺力又政在經遠功惟久著今逃亡初復居業未康循逃戶及籍外剩田猶宜勞徠理資存撫其十道分判官三五年內使就厥功令有終始當道覆屯及須推劾並以委之不須廣差餘使示專其事不擾于人政術有能必行賞罰其已奏復業歸首勾當州縣每季一申不須挾名致有勞擾其歸首戶各令新首處與本貫計會年戶色役勿欺隱及其兩處徵科宣布天下使明知朕意中書令張說素惡融之為人又患其權重融之所奏多建議爭之融揣其意先事圖之中書舍人張九齡言於說曰宇文融承恩用事辯給多詞不可不備也說曰此狗鼠輩焉能為事融尋兼戶部侍郎從東封還又密陳意見分吏部為十銓典選事所奏又為說所抑融乃與御史大夫崔隱甫連名劾說廷奏其狀說由是罷知政事融恐說復用為己患數譖毀之上惡其朋黨尋出融為魏州刺史俄轉汴州刺史又上表請用禹貢九河舊道開稻田以利人并迴易陸運本錢官收其利雖興役不息而事多不就十六年復入為鴻臚卿兼戶部侍郎明年拜黃門侍郎與裴光庭並兼同中書門下平章事融既居相位欲以天下為己任謂人曰使吾居此數月庶令海內無事矣於是薦宋璟為右丞相裴耀卿為戶部侍郎許景先為工部侍郎甚允朝廷之望然性躁急多言又引賓客故人晨夕飲謔由是為時論所譏時禮部尚書信安王褘為朔方節度使殿中侍御史李宙劾之驛召將下獄褘既申訴得理融坐阿黨李宙出為汝州刺史在相凡百日而罷裴光庭時兼御史大夫又彈融交遊朋黨及男受贓等事貶昭州平樂尉在嶺外歲餘司農少卿蔣岑舉奏融在汴州迴造船脚隱沒鉅萬給事中馮紹烈又深文案其事實融於是配流巖州地既瘴毒憂恚發疾遂詣廣府將停留未還都督耿仁忠謂融曰明公負朝廷深譴以至於此更欲故犯嚴命淹留他境仁忠見累誠所甘心亦恐朝廷知明公在此必不相容也融遽還卒于路上聞之思其舊功贈台州刺史韋堅京兆萬年人父元珪先天中銀青光祿大夫開元初兗州刺史堅姊為贈惠宣太子妃堅妻又楚國公姜皎女堅妹又為皇太子妃中外榮盛故早從官二十五年為長安令以幹濟聞與中貴人善探候主意見宇文融楊慎矜父子以勾剝財物爭行進奉而致恩顧堅乃以轉運江淮租賦所在置吏督察以裨國之倉廩歲益鉅萬玄宗以為能天寶元年三月擢為陝郡太守水陸轉運使自西漢及隋有運渠自關門西抵長安以通山東租賦奏請於咸陽擁渭水作興成堰截灞滻水傍渭東注至關西永豐倉下與渭合於長安城東九里長樂坡下滻水之上架苑牆東面有望春樓樓下穿廣運潭以通舟楫二年而成堅預於東京汴宋取小斛底船三二百隻置於潭側其船皆署牌表之若廣陵郡船即於背上堆積廣陵所出錦鏡銅器海味丹陽郡船即京口綾衫段晉陵郡船即折造官端綾繡會稽郡船即銅器羅吳綾絳紗南海郡船即瑁真珠象牙沉香豫章郡船即名瓷酒器茶釜茶鐺茶椀宣城郡船即空青石紙筆黃連始安郡船即蕉葛蚺膽翡翠船中皆有米吳郡即三破糯米方文綾凡數十郡駕船人皆大笠子寬袖衫芒屨如吳楚之制先是人間戲唱歌詞云得丁紇反体都董反紇那也紇囊得体耶潭𩹉船車鬧揚州銅器多三郎當殿坐看唱得体歌至開元二十九年田同秀上言見玄元皇帝云有寶符在陝州桃林縣古關令尹喜宅發中使求而得之以為殊祥改桃林為靈寶縣及此潭成陝縣尉崔成甫以堅為陝郡太守鑿成新潭又致揚州銅器翻出此詞廣集兩縣官使婦人唱之言得寶弘農野弘農得寶耶潭𩹉船車鬧揚州銅器多三郎當殿坐看唱得寶歌成甫又作歌詞十首自衣缺胯綠衫錦半臂偏袒膊紅羅抹額於第一船作號頭唱之和者婦人一百人皆鮮服靚妝齊聲接影鼓笛胡部以應之餘船洽進至樓下連檣彌亙數里觀者山積京城百姓多不識驛馬船檣竿人人駭視堅跪上諸郡輕貨又上百牙盤食府縣進奏教坊出樂迭奏玄宗歡悅下詔敕曰古之善政者貴於足食欲求富國者必先利人朕關輔之間尤資殷贍比來轉輸未免艱辛故置此潭以通漕運萬代之利一朝而成將允叶於永圖豈苟求於縱觀其陝郡太守韋堅始終檢校夙夜勤勞賞以懋功則惟常典宜特與三品仍改授一三品京官兼太守判官等並即量與改轉其專知檢校始末不離潭所者并孔目官及至典選日優與處分仍委韋堅具名錄奏應役人夫等雖各酬傭直終使役日多並放今年地稅且啟鑿功畢舟楫已通既涉遠途又能先至永言勸勵稍宜甄獎其押運綱各賜一中上考準前錄奏船夫等宜共賜錢二千貫以充宴樂外郡進土物賜貴戚朝官賜名廣運潭時堅姊故惠宣太子妃亦出寶物供樓上鋪設進食竟日而罷李林甫以堅姜氏壻甚狎之至是懼其詭計求進承恩日深堅又與李適之善益怒之恐入為相乃與腹心構成其罪四月進銀青光祿大夫左散騎常侍陝郡太守水陸轉運使勾當緣河及江淮南租庸轉運處置使並如故又以判官元撝豆盧友除監察御史三年正月堅又加兼御史中丞封韋城男九月拜守刑部尚書奪諸使以楊慎矜代之五載正月望夜堅與河西節度鴻臚卿皇甫惟明夜遊同過景龍觀道士房為林甫所發以堅戚里不合與節將狎暱是構謀規立太子玄宗惑其言遽貶堅為縉雲太守惟明為播川太守尋發使殺惟明於黔中籍其資財六月又貶堅為江夏員外別駕又構堅與李適之善貶適之為宜春太守七月堅又長流嶺南臨封郡堅弟將作少匠蘭鄠縣令冰兵部員外郎芝堅男河南府戶曹諒並遠貶至十月使監察御史羅希奭逐而殺之諸弟及男諒並死堅妻姜氏林甫以其久遭輕賤特放還本宗倉部員外郎鄭章貶南豐丞殿中侍御史鄭欽說貶夜郎尉監察御史豆盧友貶富水尉監察御史楊惠貶巴東尉連累者數十人又敕嗣薛王琄夷陵郡員外別駕長任其母隨男任女婿新貶巴陵太守盧幼林長流合浦郡肅宗時為皇太子恐懼上表稱與新婦離絕七載嗣薛王琄停仍於夜郎郡安置其母亦勒隨男堅貶黜後林甫諷所司發使於江淮東京緣河轉運使恣求堅之罪以聞因之綱典船夫溢於牢獄郡縣徵剝不止隣伍盡成裸形死於公府林甫死乃停楊慎矜隋煬帝玄孫也曾祖隋齊王暕祖正道大業末隨宇文化及至河北為竇建德所破因與其祖母蕭皇后入于建德軍建德送于突厥處羅可汗牙貞觀初李靖擊破頡利可汗胡酋康蘇密以蕭后及正道歸授尚衣奉御父隆禮長安中天官郎中神龍後歷洛梁滑汾懷五州刺史皆以清嚴能檢察人吏絕於欺隱聞景雲中以名犯玄宗上字改為崇禮開元初擢為太府少卿雖錢帛充牣丈尺間皆躬自省閱時議以為前後為太府者無與為比擢拜太府卿加銀青光祿大夫進封弘農郡公在職二十年公清如一年九十餘授戶部尚書致仕時太平且久御府財物山積以為經楊卿者無不精好每歲勾剝省便出錢數百萬貫慎矜沉毅有材幹任氣尚朋執初為汝陽令有能名崇禮罷太府玄宗訪其子堪委其父任者宰臣以慎餘慎矜慎名三人皆勤恪清白有父風而慎矜為其最因拜監察御史知太府出納慎餘先為司農丞除太子舍人監京倉尋丁父憂二十六年服闋累遷侍御史仍知太府出納慎名授大理評事攝監察御史充都含嘉倉出納使甚承恩顧慎矜於諸州納物者有水漬傷破及色下者皆令本州徵折估錢轉市輕貨州縣徵調不絕於歲月矣在臺數年又專知雜事風格甚高天寶二年遷權判御史中丞充京畿採訪使知太府出納使並如故時右相李林甫握權慎矜以遷拜不由其門懼不敢居其任固讓之因除諫議大夫兼侍御史仍依舊知太府出納以鴻臚少卿蕭諒為御史中丞諒至臺無所撝讓頗不相能竟出為陝郡太守林甫以慎矜屈於己復擢為御史中丞仍充諸道鑄錢使餘如故時散騎常侍陝郡太守韋堅兼御史中丞為水陸漕運使權傾宰相侍御史王鉷推堅獄慎矜引身中立以候望鉷恨之林甫亦憾焉慎矜與鉷父中外兄弟鉷即表姪少相狎鉷入臺慎矜為臺端亦有推引及鉷遷中丞雖與鉷同列每呼為王鉷鉷恃與林甫善漸不平之五載慎矜遷戶部侍郎中丞使如故林甫見慎矜受主恩心嫉之又知王鉷於慎矜有間又誘而啗之鉷乃伺其隙以陷之慎矜奪鉷職田背詈鉷詆其母氏鉷不堪其辱慎矜性疏快素昵於鉷嘗話讖書於鉷又與還俗僧史敬忠游處敬忠有學業鉷於林甫構成其罪云慎矜是隋家子孫心規克復隋室故蓄異書與凶人來往而說國家休咎時天寶六載十一月玄宗在華清宮林甫令人發之玄宗震怒擊之於尚書省詔刑部尚書蕭隱之大理卿李道邃少卿楊璹侍御史楊釗殿中侍御史盧鉉同鞫之又使京兆士曹吉溫往東京收慎矜兄少府少監慎餘弟洛陽令慎名等雜訊之又令溫於汝州捕史敬忠獲之便赴行在所先令盧鉉收太府少卿張瑄於會昌驛繫而推之瑄不肯答辯鉉百端拷訊不得乃令不良枷瑄以手力絆其足以木按其足間其枷柄向前挽其身長校數尺腰細欲絕眼鼻皆血出謂之驢駒拔撅瑄竟不肯答又使鉉與御史崔器入城搜慎矜宅無所得拷其小妻韓珠團乃在豎櫃上作一闇函盛讖書等鉉於袖中出而納之詬以示慎矜慎矜曰他日不見今乃來是命也吾死矣及溫以敬忠至戲水驛東十餘里使典說之若至溫湯即求首陳不可得矣去溫湯十餘里敬忠乞紙筆於桑樹下具吐之比見慎矜敬忠證之慎矜皆引實二十五日詔楊慎矜慎餘慎名並賜自盡史敬忠決重杖一百鮮于賁范滔並決重杖配流遠郡慎矜外甥前通事舍人辛景湊決杖配流義陽郡司馬嗣虢王巨與敬忠相識解官於南賓郡安置太府少卿張瑄決六十長流嶺南臨封郡亦死於流所慎矜兄弟并史敬忠莊宅官收以男女配流嶺南諸郡其張瑄万俟承暉鮮于賁等準此配流乃使監察御史顏真卿送敕至東京殿中侍御史崔𧜛引慎名令河南法曹張萬頃宣敕示之慎名見慎矜賜自盡初尚撫膺及聞慎餘及身皆爾遂止及宣敕了慎名曰今奉聖恩不敢稽留晷刻但以寡姊老年請作數行書以別之𧜛揖真卿真卿許之慎名神色不變入房中作書曰拙於謀運不能靜退兄弟并命唯姊尚存老年孤何以堪此書後又數條事又宅中作一板池池中魚一皆放之遂縊而死監察御史平冽齎敕至大理寺慎餘聞死合掌指天而縊初慎矜至溫湯正食忽見一鬼物長丈餘朱衣冠幘立於門扇後慎矜叱之良久不滅以熱羹投之乃滅無何下獄死兄弟甚友愛事寡姊如母皆偉儀形風韻高朗愛客喜飲籍甚於時慎名嘗覽鏡見其鬚面神彩有過於人覆鏡歎惋曰吾兄弟三人盡長六尺餘有如此貌如此材而見容當代以期全難矣何不使我少體弱耶竟如其言王鉷太原祁人也祖方翼夏州都督為時名將生珣開元初並歷中書舍人珣兵部侍郎秘書監鉷即之孽子開元十年為鄠縣尉京兆尹稻田判官二十四年再遷監察御史二十九年累除戶部員外郎常兼侍御史天寶二年充京和市和糴使遷戶部郎中三載長安令柳升以賄敗初韓朝宗為京兆尹引升為京令朝宗又于終南山下為苟家觜買山居欲以避世亂玄宗怒敕鉷推之朝宗自高平太守眨為吳興別駕又加鉷長春宮使四載加勾戶口色役使又遷御史中丞兼充京畿採訪使五載又為京畿關內道黜陟使又兼充關內採訪使時右相李林甫怙權用事志謀不利於東儲以除不附己者而鉷有吏幹倚之轉深以為己用既為戶口色役使時有敕給百姓一年復鉷即奏徵其脚錢廣張其數又市輕貨乃甚於不放輸納物者有浸漬折估皆下本郡徵納又敕本郡高戶為租庸脚士皆破其家產彌年不了恣行割剝以媚於時人用嗟怨古制天子六宮皆有品秩高下其俸物因有等差唐法沿於周隋妃嬪宮官位有尊卑亦隨其品而給授以供衣服鉛粉之費以奉於宸極玄宗在位多載妃御承恩多賞賜不欲頻於左右藏取之鉷探旨意歲進錢寶百億萬便貯於內庫以恣主恩錫賚鉷云此是常年額外物非征稅物玄宗以為鉷有富國之術利於王用益厚待之丁嫡母憂起復舊職使如故七載又加檢察內作事遷戶部侍郎仍兼御史中丞賜紫金魚袋八載兼充閑廄使及苑內營田五坊宮苑等使隴右羣牧都使支度營田使餘並如故太白山人李渾言于金星洞見老人云有玉版石記符聖上長生久視玄宗令鉷入山洞求而得之因上尊號加鉷銀青光祿大夫都知總監及栽接等使九載五月兼京兆尹使並如故鉷威權轉盛兼二十餘使近宅為使院文案堆積胥吏求押一字即累日不遂中使賜遺不絕於門雖晉公林甫亦畏避之林甫子岫為將作監供奉禁中鉷子準衞尉少卿亦鬬雞供奉每謔岫岫常下之萬年尉韋黃裳長安尉賈季隣常於廳事貯錢數百繩名倡珍饌常有備擬以候準所適又於宅側自有追歡之所鉷與弟戶部郎中銲召術士任海川遊其門問其相命言有王否海川震懼潛匿不出鉷懼洩其事令逐之至馮翊郡得誣以他事杖殺之定安公主男韋會任王府司馬聞之話於私庭乃被侍兒說於傭保者或有憾於會告於鉷鉷遣賈季隣收於長安獄入夜縊之明辰載屍還其家會皇堂外甥同產兄王繇尚永穆公主而惕息不敢言十載封太原縣公又兼殿中監十一載四月銲與故鴻臚少卿邢璹子縡情密累年縡潛構逆謀引右龍武軍萬騎刻取十一月殺龍武將軍因燒諸城門及市分數百人殺楊國忠及右相李林甫左相陳希烈等先期二日事發玄宗臨朝召鉷上於玉案前過狀與鉷鉷好弈棋縡善棋鉷因銲與之交故至是意銲在縡處金城坊密召之日晏始令捕賊官捕之萬年尉薛榮先長安尉賈季隣等捕之逢銲於化度寺門季隣為鉷所引用為赤尉銲謂之曰我與邢縡故舊縡今反恐事急妄相引請足下勿受其言榮先等至縡門縡等十餘人持弓刃突出榮先等遂與格戰季隣以銲語白鉷鉷謂之曰我弟何得與之有謀乎鉷與國忠共討逐縡縡下人曰勿損大夫下人國忠為劍南節度使有隨身官以白國忠曰賊有號不可戰須臾驃騎大將軍內侍高力士領飛龍小兒甲騎四百人討之縡為亂兵所斬擒其黨善射人韋瑤等以獻國忠以白玄宗玄宗以鉷委任深必不與之知情鉷與銲別生嫉其富貴故欲陷鉷耳遂特原銲不問然意欲鉷請罪之上密令國忠諷之國忠不敢洩上意諷鉷曰且主上眷大夫深今日大夫須割慈存門戶但抗疏請罪郎中郎中亦未必至極刑大夫必存何如併命鉷俯首久曰小弟先人餘愛平昔頻有處分義不欲捨之而謀存乃進狀十二日鉷入朝左相陳希烈言語侵之鉷恨之憤訴言氣頗高鉷朝迴於中書侍郎廳修表令人進狀門司已不納矣須臾敕希烈推之鉷以表示宰相林甫曰大夫後之矣遂不許俄銲至國忠問大夫知否銲未及應侍御史裴冕恐銲引之冕叱詈之曰足下為臣不忠為弟不義聖上以大夫之故以足下為戶部郎中又加五品恩亦厚矣大夫豈知縡事乎國忠愕然謂銲曰實知即不可隱不知亦不可妄引銲方曰七兄不知季隣證其罪及日暮奏之銲決杖死於朝堂賜鉷自盡於三衞廚明日移於資聖寺廊下裴冕言於國忠令歸宅權斂之又請令妻女送墓所國忠義而許之令鉷判官齊奇營護之男準除名長流嶺南承化郡偁長流珠崖郡至故驛殺之妻薛氏及在室女並流初鉷與御史中丞戶部侍郎楊慎矜親且情厚頗為汲引及貴盛爭權鉷附於李林甫為所誘陷慎矜家經五年而鉷至赤族豈天道歟史臣曰夫奸佞之輩惟事悅人聚斂之臣無非害物賈禍招怨敗國喪身罕不由斯道也君人者中智已降亦心緣利動言為甘聞志雖慕於聖明情不勝於嗜欲徒有賢佐無如之何所以禮經戒其勿畜宇文融韋堅楊慎矜王鉷皆開元之倖人也或以括戶取媚或以漕運承恩或以聚貨得權或以剝下獲寵負勢自用人莫敢違張說李林甫手握大權承主恩顧尚遭凌擯以身下之他人即可知也然天道惡盈器滿則覆終雖不令其弊已多良可痛也宋璟裴耀卿許景先獲居重任因融薦之此亦有鳳之一毛也玄宗以聖哲之姿處高明之位未免此累或承之羞後之帝王得不深鑑贊曰財能域人聚則民散如何帝王志求餘羨融堅矜鉷因利乘便以徼寵榮宜招後患
