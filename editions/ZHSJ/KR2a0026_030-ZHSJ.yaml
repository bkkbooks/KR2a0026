body:
  text: 舊唐書卷二十六志第六禮儀六建中元年三月禮儀使上言東都太廟闕木主請造以祔初武后於東都立高祖太宗高宗三廟至中宗已後兩京太廟四時並饗至德亂後木主多亡缺未祔於是議者紛然而大旨有三其一曰必存其廟遍立羣主時饗之其二曰建廟立主存而不祭若皇輿時巡則就饗焉其三曰存其廟瘞其主駕或東幸則飾齋車奉京師羣廟之主以往議者皆不決而罷貞元十五年四月膳部郎中歸崇敬上疏東都太廟不合置木主謹按典禮虞主用桑練主用栗重作栗主則埋桑主所以神無二主猶天無二日土無二王也今東都太廟是則天皇后所建以置武氏木主中宗去其主而存其廟蓋將以備行幸遷都之所也且殷人屢遷前八後五前後遷都一十三度不可每都而別立神主也議者或云東都神主已曾虔奉而禮之豈可以一朝廢之乎且虞祭則立桑主而虔祀練祭則立栗主而埋桑主豈桑主不曾虔祀而乃埋之又所闕之主不可更作作之不時非禮也長慶元年二月分司官庫部員外郎李渤奏太微宮神主請歸祔太廟敕付東都留守鄭絪商量聞奏絪奏云臣謹詳三代典禮上稽高祖太宗之制度未嘗有並建兩廟並饗二主之禮天授之際祀典變革中宗初復舊物未暇詳考典章遂於洛陽創宗廟是行遷都之制實非建國之儀及西歸上都因循未廢德宗嗣統墜典克修東都九廟不復告饗謹按禮記仲尼答曾子問曰天無二日土無二王嘗禘郊社尊無二上所以明二主之非禮也陛下接千載之大統揚累聖之耿光憲章先王垂法後嗣況宗廟之禮至尊至重違經黷祀時謂不欽特望擇三代令典守高祖太宗之憲度鑒神龍權宜之制遵建中矯正之禮依經復古允屬聖明伏以太微宮光皇帝三代睿宗聖文孝武皇帝神主參考經義不合祔饗至於遷置神主之禮三代以降經無明文伏望委中書門下與公卿禮官質正詳定敕付所司太常博士王彥威等奏議曰謹按國初故事無兩都並建宗廟並行饗祭之禮伏尋周書召誥洛誥之說實有祭告豐廟洛廟之文是則周人兩都並建宗祧至則告饗然則兩都皆祭祖考禮祀並興自神龍復辟中宗嗣位廟既偕作饗亦並行天寶末兩都傾陷神主亡失肅宗既復舊物但建廟作主於上都其東都神主大曆中始於人間得之遂寓於太微宮不復祔饗臣等謹按經傳王者之制凡建居室宗廟為先廟必有主主必在廟是則立廟兩都蓋行古之道主必在廟實依禮經今謹參詳理合升祔謹按光皇帝是追王高宗中宗睿宗是祧廟之主其神主合藏於太廟從西第一夾室景皇帝是始封不遷之祖其神主合藏於太廟從西第一室高祖太宗玄宗肅宗代宗是創業有功親廟之祖伏準江都集禮正廟之主藏於太室之中禮記羣廟之主有故則聚而藏諸祖廟伏以德宗之下神主未作代宗之上后主先亡若歸本室有虛神主事雖可據理或未安今高祖已下神主並合藏於太祖之廟依舊準故事不饗如陛下肆覲東后移幸洛陽自非祧主合歸本室其餘闕主又當特作而祔饗時祭禘祫如儀臣又按國家追王故事太祖之上又有德明興聖懿祖別廟今光皇帝神主即懿祖也伏緣東都先無前件廟宇光皇帝神主今請權祔於太廟夾室居元皇帝之上如駕在東都即請準上都式營建別廟作德明興聖獻祖神主備禮升祔又於太廟夾室奉迎光皇帝神主歸別廟第四室禘祫如儀或問曰禮作栗主瘞桑主漢魏並有瘞桑之議大曆中亦瘞孝敬皇帝神主今祔而不瘞如之何答曰作主依神理無可埋漢魏瘞藏事非允愜孝敬尊非正統廟廢而主獨存從而瘞藏為叶情理又問古者巡狩必載遷主今東都主又祔于廟答曰古者師行以遷主無則主命自非遷祖之主別無出廟之文凡邑有宗廟先君之主曰都則兩都宗廟各宜有主又問曰古者作主必因虞練若主必歸祔則室不可虛則當補已亡之主創當祔之主禮經無說如之何答曰虞練作主禮之正也非時作主事之權也王者遭時為法因事制宜苟無其常則思其變如駕或東幸廟仍虛主即準肅宗廣德二年上都作主故事特作闕主而祔蓋主不可闕故禮貴從宜春秋之義變而正之者臣伏思祖宗之主神靈所憑寓於太微不入宗廟據經復本允屬聖明至是下尚書省集議而郎吏所議與彥威多同丞郎則各執所見或曰神主合藏於太微宮或云並合埋瘞或云闕主當作或云輿駕東幸即載上都神主而東咸以意言不本經據竟以紛議不定遂不舉行會昌五年八月中書門下奏東都太廟九室神主共二十六座自祿山叛後取太廟為軍營神主棄於街巷所司潛收聚見在太微宮內新造小屋之內其太廟屋室並在可以修崇大和中太常博士議以為東都不合置神主車駕東幸即載主而行至今因循尚未修建望令尚書省集公卿及禮官學官詳議如不要更置須有收藏去處如合置望以所拆大寺材木修建既是宗室官居守便望令充修東都太廟使勾當修繕奉敕宜依六年三月太常博士鄭路等奏東都太微宮神主二十座去年二月二十九日禮院分析聞奏訖伏奉今月七日敕此禮至重須遵典故宜令禮官學官同議聞奏者臣今與學官等詳議訖謹具分析如後獻祖宣皇帝宣莊皇后懿祖光皇帝光懿皇后文德皇后高宗天皇大帝則天皇后中宗大聖大昭孝皇帝和思皇后昭成皇后孝敬皇帝孝敬哀皇后已前十二座親盡迭毀宜遷諸太廟祔於興聖廟禘祫之歲乃一祭之東都無興聖廟可祔伏請且權藏於太廟夾室未題神主十四座前件神主既無題號之文難伸祝告之禮今與禮官等商量伏請告遷之日但瘞於舊太微宮內空閑之地恭酌事理庶協從宜制可太常博士段瓌等三十九人奏議曰禮之所立本於誠敬廟之所設實在尊嚴既曰薦誠則宜統一昔周之東西有廟亦可徵其所由但緣卜洛之初既須營建又以遷都未決因議兩留酌其事情匪務於廣祭法明矣伏以東都太廟廢已多時若議增修稍乖前訓何者東都始制寢廟於天后中宗之朝事出一時非貞觀開元之法前後因循不廢者亦踵鎬京之文也記曰祭不欲數數則煩天寶之中兩京悉為寇陷西都廟貌如故東都因此散亡是知九廟之靈不欲歆其煩祀也自建中不葺之後彌歷歲年今若廟貌惟新即須室別有主舊主雖在大半合祧必几筵而存之所謂宜祧不祧也孔子曰當七廟五廟無虛主也謂廟不得無主者也舊主如有留去新廟便合創添謹按左傳云祔練作主又戴聖云虞而立几筵如或過時成之便是以凶干吉創添既不典虛廟又非儀考諸禮文進退無守或曰漢於郡國置宗廟凡百餘所今止東西立廟有何不安者當漢氏承秦焚燒之餘不識典故至於廟制率意而行比及元成二帝之間貢禹韋玄成等繼出果有正論竟從毀除足知漢初不本於禮經又安可程法也或曰几筵不得復設廟寢何妨修營候車駕時巡便合於所載之主者究其終始又得以論之昨者降敕參詳本為欲收舊主主既不立廟何可施假令行幸九州一一皆立廟乎愚以為廟不可修主宜藏瘞或就瘞於埳室或瘞於兩階間此乃百代常行不易之道也其年九月敕段瓌等詳議東都不可立廟李福等別狀又有異同國家制度須合典禮證據未一則難建立宜並令赴都省對議須歸至當工部尚書薛元賞等議伏以建中時公卿奏請修建東都太廟當時之議大旨有三其一曰必存其廟備立其主時饗之日以他官攝行二曰建廟立主存而不祭皇輿時巡則就饗焉三曰存其廟瘞其主臣等立其三議參酌禮經理宜存廟不合置主謹按禮祭義曰建國之神位右社稷而左宗廟禮記云君子將營宮室宗廟為先是知王者建邦設都必先宗廟社稷況周武受命始都于豐成王相宅又卜于洛烝祭歲於新邑冊周公于太室故書曰戊辰王在新邑烝祭歲王入太室祼成王厥後復立于豐雖成洛邑未嘗久處逮于平王始定東遷則周之豐鎬皆有宗廟明矣又按曾子問廟有二主夫子對以天無二日土無二王嘗禘郊社尊無二上未知其為禮者昔齊桓公作二主夫子譏之以為偽主是知二主不可並設亦明矣夫聖王建社以厚本立廟以尊祖所以京邑必有宗社今國家定周秦之兩地為東西之兩宅闢九衢而立宮闕設百司而嚴拱衞取法玄象號為京師既嚴帝宅難虛神位若無宗廟何謂皇都然依人者神在誠者祀誠非外至必由中出理合親敬用交神明位宜存於兩都廟可偕立誠難專於二祭主不並設或以禮云七廟五廟無虛主是謂不可無主所以天子巡狩亦有所尊尚飾齋車載遷主以行今若修廟瘞主則東都太廟九室皆虛既違於經須徵其說臣復探賾禮意因得盡而論之所云七廟五廟無虛主是謂見饗之廟不可虛也今之兩都雖各有廟禘祫饗獻斯皆親奉於上京神主几筵不可虛陳於東廟且禮云唯聖人為能饗帝孝子為能饗親昔漢韋玄成議廢郡國祀亦曰立廟京師躬親承事四海之內各以其職來祭人情禮意如此較然二室既不並居二廟豈可偕祔但所都之國見饗之廟既無虛室則叶通經議者又欲置主不饗以俟巡幸昔魯作僖公之主不於虞練之時春秋書而譏之合祔之主作非其時尚為所譏今若置不合祔之主不因時而作違經越禮莫甚於此豈有九室合饗之主而有置而不饗之文兩廟始創於周公二主獲譏於夫子自古制作皆範周孔舊典猶在足可明徵臣所以言東都廟則合存主不合置今將修建廟宇誠不虧於典禮其見在太微宮中六主請待東都建修太廟畢具禮迎置於西夾室閟而不饗式彰陛下嚴祀之敬以明聖朝尊祖之義吏部郎中鄭亞等五人議據禮院奏以為東都太廟既廢不可復修見在太微宮神主請瘞於所寓之地有乖經訓不敢雷同臣所以別進議狀請修祔主並依典禮兼與建中元年禮儀使顏真卿所奏事同臣與公卿等重議皆以為廟固合修主不可瘞即與臣等別狀意同但衆議猶疑東西二廟各設神主恐涉廟有二主之義請修廟虛室以太微宮所寓神主藏於夾室之中伏以六主神位內有不祧之宗今用遷廟之儀猶未合禮臣等猶未敢署衆狀蓋為闕疑太學博士直弘文館鄭遂等七人議曰夫論國之大事必本乎正而根乎經以臻于中道聖朝以廣孝為先以得禮為貴而臣下敢不以經對三論六故已詳於前議矣再捧天問而陳乎諸家之說求于典訓考乎大中廟有必修之文主無可置之理何則正經正史兩都之廟可徵禮稱天子不卜處太廟擇日卜建國之地則宗廟可知則廢廟之說恐非所宜廢謹按詩書禮三經及漢朝兩史兩都並設廟而載主之制久已行之敢不明徵而去文飾援據經文不易前見東都太廟合務修崇而舊主當瘞請于太微宮所藏之所皇帝有事于洛則奉齋車載主以行太常博士顧德章議曰夫禮雖緣情將明厥要實在得中必過禮而求多則反虧於誠敬伏以神龍之際天命有歸移武氏廟於長安即其地而置太廟以至天寶初復不為建都而設議曰中宗立廟於東都無乖舊典徵其意不亦謬乎又曰東都太廟至於睿宗玄宗猶奉而不易者蓋緣嘗所尊奉不敢輒廢也今則廢已多時猶循莫舉之典也又曰雖貞觀之始草創未暇豈可謂此事非開元之法者謹按定開元六典敕曰聽政之暇錯綜古今法以周官作為唐典覽其本末千載一朝春秋謂考古之法也行之可久不曰然歟此時東都太廟見在六典序兩都宮闕西都具太廟之位東都則存而不論足明事出一時又安得曰開元之法也又三代禮樂莫盛於周昨者論議之時便宜細大取法于周遷而立廟今立廟不因遷何美之而不能師之也又曰建國神位右社稷而左宗廟君子將營宮室宗廟為先者謹按六典永昌中則天以東都為神都爾後漸加營構宮室百司於是備矣今之宮室百司乃武氏改命所備也上都已建國立宗廟不合引言又曰東都洛陽祭孝宣等五帝長安祭孝成等三帝以此為置廟之例則大非也當漢兩處有廟所祭之帝各別今東都建廟作主與上都盡同概而論之失之甚者又曰今或東洛復太廟有司同日侍祭以此為數實所未解者謹按天寶三載詔曰頃四時有事於太廟兩京同日自今已後兩京各宜別擇日載在祀典可得而詳且立廟造主所以祭神而曰存而勿祀出自何經當七廟五廟無虛主而欲立虛廟法於何典前稱廟貌如故者即指建中之中就有而言以為國之先也前以非時不造主者謂見有神主不得以非時而造也若江左至德之際主並散亡不可拘以例也或曰廢主之瘞請在太微宮者謹按天寶二年敕曰古之制禮祭用質明義兼取於尚幽情實緣於既沒我聖祖澹然常在為道之宗既殊有盡之期宜展事生之禮自今已後每至聖祖宮有昭告宜改用卯時者今欲以主瘞於宮所即與此敕全乖又曰主不合瘞請藏夾室者謹按前代藏主頗有異同至如夾室宜用以序昭穆也今廟主俱不中禮則無禘祫之文又曰君子將營宮室以宗廟為先則建國營宮室而宗廟必設東都既有宮室而太廟不合不營凡以論之其義斯勝而西周東漢並曰兩都其各有宗廟之證經史昭然又得以極思於揚搉詩曰其繩則直縮板以載作廟翼翼大雅瓜瓞言豐廟之作也又曰於穆清廟肅雍顯相洛邑既成以率文王之祀此詩言洛之廟也書曰成王既至洛烝祭歲文王騂牛一武王騂牛一又曰祼于太室康王又居豐命畢公保釐東郊豈有無廟而可烝祭非都而設保釐則書東西之廟也逮于後漢卜洛西京之廟亦存建武二年於洛陽立廟而成哀平三帝祭於西京一十八年親幸長安行禘禮當時五室列於洛都三帝留於京廟行幸之歲與合食之期相會不奉齋車又安可以成此禮則知兩廟周人成法載主以行漢家通制或以當虛一都之廟為不可而引七廟無虛主之文禮言一都之廟室不虛主非為兩都各廟而不可虛也既聯出征之辭更明載主之意因事而言理實相統非如詩人更可斷章以取義也古人求神之所非一奉神之意無二故廢桑主重作栗主既事埋之以明其一也或又引左氏傳築郿凡例謂有宗廟先君之主曰都而立建主之論按魯莊公二十八年冬築郿左傳為築發凡例穀梁譏因藪澤之利公羊稱避凶年造邑之嫌三傳異同左氏為短何則當春秋二百年間魯凡城二十四邑唯郿一邑稱築其二十三邑豈皆有宗廟先君之主乎執此為建主之端又非通論或又曰廢主之瘞何以在於太微宮所藏之所宜舍故依新前已列矣按瘞主之位有三或於北牖之下或在西階之間廟之事也其不當立之主但隨其所以瘞之夫主瘞乎當立之廟斯不然矣以在所而言則太微宮所藏之所與漢之寢園無異歷代以降建一都者多兩都者少今國家崇東西之宅極嚴奉之典而以各廟為疑合以建都故事以相質正即周漢是也今詳議所徵究其年代率皆一都之時豈可以擬議亦孰敢獻酬於其間詳考經旨古人謀寢必及於廟未有設寢而不立廟者國家承隋氏之弊草創未暇後雖建於垂拱而事有所合其後當干戈寧戢之歲文物大備之朝歷于十一聖不議廢之豈不以事雖出於一時廟有合立之理而不可一一革也今洛都之制上自宮殿樓觀下及百辟之司與西京無異鑾輿之至也雖廝役之賤必歸其所理也豈先帝之主獨無其所安乎時也虞主尚瘞廢主宜然或以馬融李舟二人稱寢無傷於偕立廟不妨於暫虛是則馬融李舟可法於宣尼矣以此擬議乖當則深或稱凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城者謹按春秋二百四十年間惟郿一邑稱築如城郎費之類各有所因或以他防或以自固謂之盡有宗廟理則極非或稱聖主有復古之功簡冊有考文之美五帝不同樂三王不同禮遭時為法因事制宜此則改作有為非有司之事也如有司之職但合一一據經變禮從時則須俟明詔也凡不修之證略有七條廟立因遷一也已廢不舉二也廟不可虛三也非時不造主四也合載遷主行五也尊無二上六也六典不書七也謹按文王遷豐立廟武王遷鎬立廟成王遷洛立廟今東都不因遷而欲立廟是違因遷立廟也謹按禮記曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也今東都太廟廢已八朝若果立之是違已廢不舉也謹按禮記曰當七廟五廟無虛主今欲立虛廟是違廟不可虛也謹按左傳丁丑作僖公主書不時也記又曰過時不祭禮也合禮之祭過時猶廢非禮之主可以作乎今欲非時作主是違非時不作主也謹按曾子問古者師行以遷廟主行乎孔子曰天子巡狩必以遷廟主行載於齋車言必有尊也今也取七廟之主以行則失之矣皇氏云遷廟主者載遷一室之主也今欲載羣廟之主以行是違載遷之主也謹按禮記曰天無二日土無二王嘗禘郊社尊無二上也今欲兩都建廟作主是違尊無二上也謹按六典序兩都宮闕及廟宇此時東都有廟不載是違六典不書也遍考書傳並不合修寖以武德貞觀之中作法垂範之日文物大備儒彥畢臻若可修營不應議不及矣記曰樂由天作禮以地制天之體動也地之體止也此明樂可作禮難變也伏惟陛下誠明載物莊敬御天孝方切於祖宗事乃求於根本再令集議俾定所長臣實職司敢不條白以對德章又有上中書門下及禮院詳議兩狀並同載於後其一曰伏見八月六日敕欲修東都太廟令會議事此時已有議狀準禮不合更修尚書丞郎已下三十八人皆同署狀德章官在禮寺實忝司存當聖上嚴禋敬事之時會相公尚古黜華之日脫國之祀典有乖禮文豈唯受責於曠官竊懼貽恥於明代所以懃懃懇懇將不言而又言也昨者異同之意盡可指陳一則以有都之名便合立廟次則欲崇修廟宇以候時巡殊不知廟不合虛主惟載一也謹按貞觀九年詔曰太原之地肇基王業事均豐沛義等宛譙約禮而言須議立廟時祕書監顏師古議曰臣傍觀祭典遍考禮經宗廟皆在京師不於下土別置昔周之豐鎬實為遷都乃是因事便營非云一時別立太宗許其奏即日而停由是而言太原豈無都號太原爾時猶廢東都不立可知且廟室惟新即須有主主既藏瘞非虛而何是有都立廟之言不攻而自破矣又按曾子問曰古者師行必以遷廟主行乎孔子曰天子巡狩必以遷廟主行載于齋車言必有尊也今也取七廟之主以行則失矣皇氏云遷廟主者惟載新遷一室之主也未祧之主無載行之文假使候時巡自可修營一室議構九室有何依憑夫宗廟尊事也重事也至尊至重安得以疑文定論言苟不經則為擅議近者敕旨凡以議事皆須一一據經若無經文任以史證如或經史皆不據者不得率意而言則立廟東都正經史無據果從臆說無乃前後相違也書曰三人占則從二人之言會議者四十八人所同者六七人耳比夫二三之喻又何其多也夫堯舜之為帝迄今稱詠之者非有他術異智者也以其有賢臣輔翼能順考古道也故堯之書曰若稽古帝堯孔氏傳曰能順考古道傅說佐殷之君亦曰事不師古匪說攸聞考之古道既如前驗以國章又如此將求典實無以易諸伏希必本正經稍抑浮議踵皋夔之古道法周孔之遺文則天下守貞之儒實所幸甚其餘已具前議其二曰夫宗廟之設主於誠敬旋觀典禮貳則非誠是以匪因遷都則不別立廟宇記曰天無二日土無二王嘗禘郊社尊無二上又曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也則東都太廟廢已多時若議增修稍違前志何者聖曆神龍之際武后始復明辟中宗取其廟易置太廟焉本欲權固人心非經久之制也伏以所存神主既請祧藏今廟室惟新即須有主神主非時不造廟寢又無虛議如修復以俟時巡惟載一主備在方冊可得而詳又引經中義有數等或是弟子之語或是他人之言今廟不可虛尊無二上非時不造主合載一主行皆大聖祖及宣尼親所發明者比之常據不可同塗又丘明修春秋悉以君子定褒貶至陳泄以忠獲罪晉文以臣召君於此數條不復稱君子將評得失特以宣尼斷之傳曰危疑之理須聖言以明也或以東都不同他都地有壇社宮闕欲議權葺似是無妨此則酌於意懷非曰經據也但以遍討今古無有壇社立廟之證用以為說實所未安謹按上自殷周傍稽故實除因遷都之外無別立廟之文制曰自古議禮皆酌人情必稷嗣知幾賈生達識方可發揮大政潤色皇猷其他管窺蓋不足數公卿之議實可施行德章所陳最為淺近豈得苟申獨見妄有異同事貴酌中理宜從衆宜令有司擇日修崇太廟以留守李石充使勾當六年三月擇日既定禮官既行旋以武宗登遐其事遂寢宣宗即位竟迎太微宮神主祔東都太廟禘祫之禮盡出神主合食於太祖之前貞觀禮祫享功臣配享於廟庭禘享則不配當時令文祫禘之日功臣並得配享貞觀十六年將行禘祭有司請集禮官學士等議太常卿韋挺等一十八人議曰古之王者富有四海而不朝夕上膳於宗廟者患其禮過也故曰春秋祭祀以時思之至於臣有大功享祿其後孝子率禮潔粢豐盛禴祀烝嘗四時不輟國家大祫又得配焉所以昭明其勳尊顯其德以勸嗣臣也其禘及時享功臣皆不應預故周禮六功之官皆配大烝而已先儒皆取大烝為祫祭高堂隆庾蔚之等多遵鄭學未有將為時享又漢魏祫祀皆在十月晉朝禮官欲用孟秋殷祭左僕射孔安國啟彈坐免者不一梁初誤禘功臣左丞何佟之駁議武帝允而依行降洎周齊俱遵此禮竊以五年再殷合諸天道一大一小通人雅論小則人臣不預大則兼及功臣今禮禘無功臣誠謂禮不可易乃詔改令從禮至開元中改修禮復令禘祫俱以功臣配饗焉高宗上元三年十月將祫享于太廟時議者以禮緯三年一祫五年一禘公羊傳云五年而再殷祭議交互莫能斷決太學博士史璨等議曰按禮記正義引鄭玄禘祫志云春秋僖公三十三年十二月薨文公二年八月丁卯大享于太廟公羊傳云大享者何祫也是三年喪畢新君二年當祫明年當禘于羣廟僖公宣公八年皆有禘則後禘去前禘五年以此定之則新君二年祫三年禘自爾已後五年而再殷祭則六年當祫八年當禘又昭公十年齊歸薨至十三年喪畢當祫為平丘之會冬公如晉至十四年祫十五年禘傳云有事於武宮是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事於襄宮是也如上所云則禘已後隔三年祫已後隔二年禘此則有合禮經不違傳義自此依璨等議為定開元六年秋睿宗喪畢祫享于太廟自後又相承三年一祫五年一禘各自計年不相通數至二十七年凡經五禘七祫其年夏禘訖冬又當祫太常議曰禘祫二禮俱為殷祭祫為合食祖廟禘謂諦序尊卑申先君逮下之慈成羣嗣奉親之孝事異常享有時行之然而祭不欲數數則黷亦不欲疏疏則怠故王者法諸天道制祀典焉烝嘗象時禘祫如閏五歲再閏天道大成宗廟法之再為殷祭者也謹按禮記王制周官宗伯鄭玄注解高堂所議並云國君嗣位三年喪畢祫于太祖明年禘于羣廟自爾已後五年再殷一祫一禘漢魏故事貞觀實錄並用此禮又按禮緯及魯禮禘祫注云三年一祫五年一禘所謂五年而再殷祭也又按白虎通及五經通義許慎異義何休春秋賀循祭議並云三年一禘何也以為三年一閏天道小備五年再閏天道大備故也此則五年再殷通計其數一祫一禘迭相乘矣今太廟禘祫各自數年兩岐俱下不相通計或比年頻合或同歲再序或一禘之後併為再祫或五年之內驟有三殷法天象閏之期既違其度五歲再殷之制數又不同求之禮文頗為乖失說者或云禘祫二禮大小不侔祭名有殊年數相舛祫以三紀抵小而合禘以五斷至十而周有茲參差難以通計竊以三祫五禘之說本出禮緯五歲再殷之數同在其篇會通二文非相詭也蓋以禘後置祫二周有半舉以全數謂之三年譬如三年一閏只用三十二月也其禘祫異稱各隨四時秋冬為祫春夏為禘祭名雖異為殷則同譬如礿祠烝嘗其體一也鄭玄謂祫大禘小傳或謂祫小禘大肆陳之間或有增減通計之義初無異同蓋象閏之法相傳久矣惟晉代陳舒有三年一殷之議自五年八年又十一十四尋其議文所引亦以象閏為言且六歲再殷何名象閏五年一禘又奚所施矛盾之說固難憑也夫以法天之度既有指歸稽古之理若茲昭著禘祫二祭通計明矣今請以開元二十七年己卯四月禘至辛巳年十月祫至甲申年四月又禘至丙戌年十月又祫至己丑年四月又禘至辛卯年十月又祫自此五年再殷周而復始又禘祫之說非唯一家五歲再殷之文既相師矣法天象閏之理大抵亦同而禘後置祫或近或遠盈縮之度有二法焉鄭玄宗高堂則先三而後二徐邈之議則先二而後三謹按鄭氏所注先三之法約三祫五禘之文存三歲五年之位以為甲年既禘丁年當祫己年又禘壬年又祫甲年又禘丁年又祫周而復始以此相承祫後去禘十有八月而近禘後去祫三十二月而遙分析不均粗於算矣假如攻乎異端置祫於秋則三十九月為前二十一月為後雖小有愈其間尚偏竊據本文皆云象閏二閏相去則平分矣兩殷之序何不等耶且又三年之言本舉全數二周有半實准三年於此置祫不違文矣何必拘滯隔三正乎蓋千慮一失通儒之蔽也徐氏之議有異於是研覈周審最為可憑以為二禘相去為月六十中分三十置一祫焉若甲年夏禘丙年冬祫有象閏法毫釐不偏三年一祫之文既無乖越五歲再殷之制疏數有均校之諸儒義實長久今請依據以定二殷預推祭月周而復始禮部員外郎崔宗之駁下太常令更詳議令集賢學士陸善經等更加詳覈善經亦以其議為允於是太常卿韋縚奏曰禮有禘祫俱稱殷祭二法更用鱗次相承或云五歲再殷一禘一祫或云三年一祫五年一禘法天象閏大趣皆同皆以太廟禘祫計年有差考於經傳微有所乖頃在四月已行禘享今指孟冬又申祫儀合食禮頻恐違先典伏以陛下能事畢舉舊物咸甄宗祏祗慎之時經訓申明之日臣等忝在持禮職司討論輒據舊文定其倫序請以今年夏禘便為殷祭之源自此之後禘祫相代五年再殷周而復始其今年冬祫準禮合停望令所司但行時享即嚴禋不黷庶合舊儀制從之舊儀天寶八年閏六月六日敕文禘祫之禮以存序位質文之變蓋取隨時國家系本仙宗業承聖祖重熙累盛既錫無疆之休合享登神思弘不易之典自今已後每禘祫並於太清宮聖祖前設位序正上以明陟配之禮欽若玄象下以盡虔祭之誠無違至道比來每緣禘祫時享則停事雖適於從宜禮或虧於必備已後每緣禘祫其常享以素饌三焚香以代三獻建中二年九月四日太常博士陳京上疏言今年十月祫享太廟幷合饗遷廟獻祖懿祖二神主春秋之義毀廟之主陳于太祖未毀廟之主皆升合食于太祖太祖之位在西而東向其下子孫昭穆相對南北為別初無毀廟遷主不享之文徵是禮也自於周室而國朝祀典當與周異且周以后稷配天為始封之祖而下乃立廟廟毀主遷皆在太祖之後禘祫之時無先於太廟太祖者正太祖東向之位全其尊而不疑然今年十月祫饗太廟伏請據魏晉舊制為比則構築別廟東晉以征西等四府君為別廟至禘祫之時則於太廟正太祖之位以申其尊別廟祭高皇太皇征西等四府君以其親伏以國家若用此義則宜別為獻祖懿祖立廟禘祫祭之以重其親則太祖於太廟遂居東向以全其尊伏以德明興聖二皇帝曩立廟至禘祫之時常用饗禮今則別廟之制便就興聖廟藏祔為宜敕下尚書省百僚集議禮儀使太子少師顏真卿議曰議者或云獻祖懿祖親遠廟遷不當祫享宜永閟於西夾室又議者云二祖宜同祫享於太祖並昭穆而空太祖東向之位又議者云二祖若同祫享即太祖之位永不得正宜奉遷二祖神主祔藏於德明皇帝廟臣伏以三議俱未為允且禮經殘缺既無明據儒者能方義類斟酌其中則可舉而行之蓋協於正也伏惟太祖景皇帝以受命始封之功處百代不遷之廟配天崇享是極尊嚴且至禘祫之時暫居昭穆之位屈己申孝敬奉祖宗緣齒族之禮廣尊先之道此實太祖明神烝烝之本意亦所以化被天下率循孝悌也請依晉蔡謨等議至十月祫享之日奉獻祖神主居東向之位自懿祖太祖洎諸祖宗遵左昭右穆之列此有彰國家重本尚順之明義足為萬代不易之令典也又議者請奉二祖神主於德明皇帝廟行祫祭之禮夫祫合也故公羊傳云大事者何祫也若祫祭不陳於太廟而享於德明廟是乃分食也豈謂合食乎名實相乖深失禮意固不可行也貞元七年十一月二十八日太常卿裴郁奏曰禘祫之禮殷周以遷廟皆出太祖之後故得合食有序尊卑不差及漢高受命無始封祖以高皇帝為太祖太上皇高帝之父立廟享祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其高皇太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西潁川等四府君亦為屬尊不在昭穆合食之列國家誕受天命累聖重光景皇帝始封唐公實為太祖中間世數既近於三昭三穆之內故皇家太廟惟有六室其弘農府君宣光二祖尊於太祖親盡則遷不在昭穆之數著在禮志可舉而行開元中加置九廟獻懿二祖皆在昭穆是以太祖景皇帝未得居東向之尊今二祖已祧九室惟序則太祖之位又安可不正伏以太祖上配天地百代不遷而居昭穆獻懿二祖親盡廟遷而居東向徵諸故實實所未安請下百僚僉議敕旨依八年正月二十三日太子左庶子李嶸等七人議曰王制天子七廟三昭三穆與太祖而七周制也七者太祖及文王武王之祧與親廟四也太祖后稷也殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已晉朝博士孫欽議云王者受命太祖及諸侯始封之君其已前神主據已上數過五代即毀其廟禘祫不復及也禘祫所及者謂受命太祖之後迭毀主升藏於二祧者也雖百代禘祫及之伏以獻懿二祖太祖以前親盡之主也擬三代以降之制則禘祫不及矣代祖神主則太祖已下毀廟之主則公羊傳所謂已毀廟之主陳于太祖者是也謹按漢永光四年詔議罷郡國廟及親盡之祖丞相韋玄成議太上孝惠廟皆親盡宜毀太上廟主宜瘞於園孝惠主遷於太祖廟奏可太上則太祖已前之主瘞于園禘祫不及故也則今獻懿二祖之比也孝惠遷於太祖廟明太祖已下子孫則禘祫所及則今代祖元皇帝神主之比也自魏晉及宋齊陳隋相承始受命之君皆立廟虛太祖之位自太祖之後至七代君則太祖東向位乃成七廟太祖以前之主魏明帝則遷處士主置於園邑歲時使令丞奉薦世數猶近故也至東晉明帝崩以征西等三祖遷入西除名之曰祧以準遠廟至康帝崩穆帝立於是京兆遷入西除同謂之祧如前之禮並禘祫所不及國朝始饗四廟宣光並太祖世祖神主祔于廟貞觀九年將祔高祖于太廟朱子奢請準禮立七廟其三昭三穆各置神主太祖依晉宋以來故事虛其位待遞遷方處之東嚮位於是始祔弘農府君及高祖為六室虛太祖之位而行禘祫至二十三年太宗祔廟弘農府君乃藏於西夾室文明元年高宗祔廟始遷宣皇帝于西夾室開元十年玄宗特立九廟於是追尊宣皇帝為獻祖復列於正室光皇帝為懿祖以備九室禘祫猶虛太祖之位祝文於三祖不稱臣明全廟數而已至德二載克復後新作九廟神主遂不造弘農府君神主明禘祫不及故也至寶應二年祔玄宗肅宗於廟遷獻懿二祖於西夾室始以太祖當東嚮位以獻懿二祖為是太祖以前親盡神主準禮禘祫不及凡十八年至建中二年十月將祫饗禮儀使顏真卿狀奏合出獻懿二祖神主行事其布位次第及東面尊位請準東晉蔡謨等議為定遂以獻祖當東嚮以懿祖於昭位南嚮以太祖於穆位北嚮以次左昭右穆陳列行事且蔡謨當時雖有其議事竟不行而我唐廟祧豈可為準嶸伏以嘗禘郊社尊無二上瘞毀遷藏禮有義斷以獻懿為親盡之主太祖已當東嚮之尊一朝改移實非典故謂宜復先朝故事獻懿神主藏于西夾室以類祭法所謂遠廟為祧去祧為壇去壇為墠壇墠有禱則祭無禱乃止太祖既昭配天地位當東嚮之尊庶上守貞觀之首制中奉開元之成規下遵寶應之嚴式符合經義不失舊章吏部郎中柳冕等十二人議曰天子受命之君諸侯始封之祖皆為太祖故雖天子必有尊也是以尊太祖焉故雖諸侯必有先也亦以尊太祖焉故太祖已下親盡而毀洎秦滅學漢不及禮不列昭穆不建迭毀晉失之宋因之於是有違五廟之制於是有虛太祖之位夫不列昭穆非所以示人有序也不建迭毀非所以示人有殺也違五廟之制非所以示人有別也虛太祖之位非所以示人有尊也此禮之所由廢按禮父為士子為天子祭以天子葬以士今獻祖祧也懿祖亦祧也唐未受命猶士禮也是故高祖太宗以天子之禮祭之不敢以太祖之位易之今而易之無乃亂先王之序乎昔周有天下追王太王王季以天子之禮及其祭也親盡而毀之漢有天下尊太上皇以天子之禮及其祭也親盡而毀之唐有天下追王獻懿二祖以天子之禮及其祭也親盡而毀之則不可代太祖之位明矣又按周禮有先公之祧有先王之祧先公之遷主藏乎后稷之廟其周未受命之祧乎先王之遷主藏乎文王之廟其周已受命之祧乎故有二祧所以異廟也今獻祖已下之祧猶先公也太祖已下之祧猶先王也請築別廟以居二祖則行周之禮復古之道故漢之禮因於周也魏之禮因於漢也隋之禮因於魏也皆立三廟有二祧又立私廟四於南陽亦後漢制也以為人之子事大宗降其私親故私廟所以奉本宗也太廟所以尊正統也雖古今異時文質異禮而知禮之情與問禮之本者莫不通其變酌而行之故上致其崇則太祖屬尊乎上矣下盡其殺則祧主親盡於下矣中處其中則王者主祧於中矣工部郎中張薦等議曰昔殷周以稷𪅂始封為不遷之祖其毀廟之主皆稷𪅂之後所以昭穆合祭尊卑不差如夏后氏以禹始封遂為不遷之祖故夏五廟禹與二昭二穆而已據此則鯀之親盡其主已遷左氏既稱禹不先鯀足明遷廟之主雖屬尊於始封祖者亦在合食之位矣又據晉宋齊梁北齊周隋史其太祖已下並同禘祫未嘗限斷遷毀之主伏以南北八代非無碩學巨儒宗廟大事議必精博驗於史冊其禮僉同又詳魏晉宋齊梁北齊周隋故事及貞觀顯慶開元禮所述禘祫並虛東嚮既行之已久實羣情所安且太祖處清廟第一之室其神主雖百代不遷永歆烝嘗上配天地於郊廟無不正矣若至禘祫之時暫居昭穆之列屈己申孝以奉祖禰豈非伯禹烝烝敬鯀之道歟亦是魏晉及周隋之太祖不敢以卑厭尊之義也議者或欲遷二祖於興聖廟及請別置築室至禘祫年饗之夫祫合也此乃分食殊乖禮意又欲藏於西夾室永不及祀無異漢代瘞園尤為不可輒敢徵據正經考論舊史請奉獻懿二祖與太祖並從昭穆之位而虛東嚮司勳員外郎裴樞議曰禮之必立宗子者蓋為收其族人東向之主亦猶是也若祔於遠廟無乃中有一間等上不倫西位常虛則太祖永厭於昭穆異廟別祭則祫饗何主乎合食永閟比於姜嫄則推祥禖而無事禮云親親故尊祖尊祖故敬宗敬宗故收族所以宗廟嚴社稷重由是言也太祖之上復有追尊之祖則親親尊祖之義無乃乖乎太廟之外輕置別祭之廟則宗廟無乃不嚴社稷無乃不重乎且漢丞相韋玄成請瘞於園晉徵士虞喜請瘞于廟兩階之間喜又引左氏說古者先王日祭於祖考月祀於曾高時享及二祧歲祫及壇墠終禘及郊宗石室是謂郊宗之上復有石室之祖斯最近矣但當時議所居石室未有準的喜請於夾室中愚以為石室可據所以處之之道未安何者夾室謂居太祖之下毀主非是安太祖之上藏主也未有卑處正位尊在傍居考理即心恐非允協今若建石室於園寢遷神主以永安採漢晉之舊章依禘祫之一祭修古禮之殘缺為國朝之典故庶乎春秋變禮之正動也中者焉考功員外郎陳京議曰京前為太常博士已於建中二年九月四日奏議祫饗獻懿二祖所安之位請下百僚博採所疑其時禮儀使顏真卿因是上狀與京議異京議未行伏見去年十一月二十八日詔下太常卿裴郁所奏大抵與京議相會伏以興聖皇帝則獻祖之曾祖懿祖之高祖夫以曾孫祔列於曾高之廟豈禮之不可哉實人情之大順也京兆少尹韋武議曰凡三年一祫五年一禘祫則羣廟大合禘則各序其祧謂主遷彌遠祧室既修當祫之歲當以獻祖居于東嚮而懿祖序其昭穆以極所親若行禘禮則太祖復筵于西以衆主列其左右是則於太祖不為降屈於獻祖無所厭卑考禮酌情謂當行此為勝同官縣尉仲子陵議曰今儒者乃援子雖齊聖不先父食之語欲令已祧獻祖權居東向配天太祖屈居昭穆此不通之甚也凡左氏不先食之言且以正文公之逆祀儒者安知非夏后廟數未足之時而言禹不先鯀乎且漢之禘祫蓋不足徵魏晉已還太祖皆近是太祖之上皆有遷主歷代所疑或引閟宮之詩而永閟或因虞主之義而瘞園或緣遠廟為祧以築宮或言太祖實卑而虛位惟東晉蔡謨憑左氏不先食以為說欲令征西東嚮均之數者此最不安且蔡謨此議非晉所行前有司不本謨改築之言取征西東嚮之一句為萬代法此其不可甚也臣又思之永閟瘞園則臣子之心有所不安權虛正位則太祖之尊無時而定則別築一室義差可安且興聖之於獻祖乃曾祖也昭穆有序饗祀以時伏請奉獻懿二祖遷於德明興聖廟此其大順也或以祫者合也今二祖別廟是分食也何合之為臣以為德明興聖二廟每禘祫之年亦皆饗薦是亦分食奚疑於二祖乎其月二十七日吏部郎中柳冕上禘祫義證凡一十四道以備顧問幷議奏聞至三月十二日祠部奏郁等議狀至十一年七月十二日敕于頎等議狀所請各殊理在討論用求精當宜令尚書省會百僚與國子監儒官切磋舊狀定可否仍委所司具事件聞奏其月二十六日左司郎中陸淳奏曰臣尋七年百僚所議雖有一十六狀總其歸趣三端而已于頎等一十四狀並云復太祖之位張薦狀則云並列昭穆而虛東饗之位韋武狀則云當祫之歲獻祖居于東嚮行禘之禮太祖復筵于西謹按禮經及先儒之說復太祖之位位既正也義在不疑太祖之位既正懿獻二主當有所歸詳考十四狀其意有四一曰藏諸夾室二曰置之別廟三曰遷于園寢四曰祔于興聖藏諸夾室是無饗獻之期異乎周人藏於二祧之義禮不可行也置之別廟始於魏明之說實非禮經之文晉義熙九年雖立此義已後亦無行者遷於園寢是亂宗廟之儀既無所憑殊乖經意不足徵也惟有祔于興聖之廟禘祫之歲乃一祭之庶乎亡於禮者之禮而得變之正也十九年三月給事中陳京奏禘是大合祖宗之祭必尊太祖之位以正昭穆今年遇禘伏恐須定向來所議之禮敕曰禘祫之禮祭之大者先有衆議猶未精詳宜令百僚會議以聞時左僕射姚南仲等獻議狀五十七封詔付都省再集百僚議定聞奏戶部尚書王紹等五十五人奏議請奉遷獻祖懿祖神主祔德明興聖廟請別增兩室奉安神主緣二十四日禘祭修廟未成請於德明興聖廟垣內權設幕屋為二室暫安神主候增修廟室成準禮遷祔神主入新廟每至禘祫年各於本室行饗禮從之是月十五日遷獻祖懿祖神主權祔德明興聖廟之幕殿二十四日饗太廟自此景皇帝始居東向之尊元皇帝已下依左昭右穆之列矣二祖新廟成敕曰奉遷獻祖懿祖神主正太祖景皇帝之位虔告之禮當任重臣宜令檢校司空平章事杜佑攝太尉告太清宮門下侍郎平章事崔損攝太尉告太廟又詔曰國之大事式在明禋王者孝饗莫重於禘祭所以尊祖而正昭穆也朕承列聖之休德荷上天之睠命虔奉牲幣二十五年永惟宗廟之位禘嘗之序夙夜祗慄不敢自專是用延訪公卿稽參古禮博考羣議至于再三敬以令辰奉遷獻祖宣皇帝神主懿祖光皇帝神主祔于德明興聖皇帝廟太祖景皇帝正東向之位宜令所司循禮務極精嚴祗肅祀典載深感惕咨爾中外宜悉朕懷會昌六年十月太常禮院奏禘祫祝文稱號穆宗皇帝宣懿皇后韋氏敬宗皇帝文宗皇帝武宗皇帝緣從前序親親以穆宗皇帝室稱為皇兄未合禮文得修撰官朱儔等狀稱禮尊尊不親親陛下於穆宗敬宗武宗三室祝文恐須但稱嗣皇帝臣某昭告于某宗臣等同考禮經於義為允從之貞元十二年祫祭太廟近例祫祭及親拜郊皆令中使一人引伐國寶至壇所所以昭示武功至是上以伐國大事中使引之非宜乃令禮官一人就內庫監領至太廟焉舊儀高祖之廟則開府儀同三司淮安王神通禮部尚書河間王孝恭陝東道大行臺右僕射鄖國公殷開山吏部尚書渝國公劉政會配饗太宗之廟則司空梁國公房玄齡尚書右僕射萊國公杜如晦尚書左僕射申國公高士廉配饗高宗之廟則司空英國公李勣尚書左僕射北平縣公張行成中書令高唐縣公馬周配饗中宗之廟則侍中平陽郡王敬暉侍中扶陽郡王桓彥範中書令南陽郡王袁恕己配享睿宗之廟則太子太傅許國公蘇瓌尚書左丞相徐國公劉幽求配饗天寶六載正月詔京城章懷節愍惠莊惠文惠宣太子與隱太子懿德太子同為一廟呼為七太子廟以便於祀享太廟配饗功臣高祖室加裴寂劉文靜太宗室加長孫無忌李靖杜如晦高宗室加褚遂良高季輔劉仁軌中宗室加狄仁傑魏元忠王同皎等十一人大祭祀騂犢減數十載太廟置內官十一載閏三月制自今已後每月朔望日宜令尚食造食薦太廟每室一牙盤內官享薦仍五日一開室門灑掃其後又有玄宗子靜德太子廟肅宗子恭懿太子廟孝敬廟在東京太廟院內貞順皇后讓皇帝廟在京中餘皆四時致祭
