body:
  text: 舊唐書卷二十一志第一禮儀一記曰人生而靜天之性也感物而動性之欲也欲無限極禍亂生焉聖人懼其邪放於是作樂以和其性制禮以檢其情俾俯仰有容周旋中矩故肆覲之禮立則朝廷尊郊廟之禮立則人情肅冠婚之禮立則長幼序喪祭之禮立則孝慈著蒐狩之禮立則軍旅振享宴之禮立則君臣篤是知禮者品彙之璿衡人倫之繩墨失之者辱得之者榮造物已還不可須臾離也五帝之時斯為治本類帝禋宗吉禮也遏音陶瓦凶禮也班瑞肆覲賓禮也誅苗殛鯀軍禮也釐降嬪虞嘉禮也故曰修五禮五玉堯舜之事也時代猶淳節文尚簡及周公相成王制五禮六樂各有典司其儀大備暨幽厲失道平王東遷周室寖微諸侯侮法男女失冠婚之節野麕之刺興焉君臣廢朝會之期踐土之譏著矣葬則奢儉無算軍則狙詐不仁數百年間禮儀大壞雖仲尼自衞返魯而有定禮之言蓋舉周公之舊章無救魯邦之亂政仲尼之世禮教已亡遭秦燔煬遺文殆盡漢興叔孫通草定止習朝儀至於郊天祀地之文配祖禋宗之制拊石鳴球之備物介丘璧水之盛猷語則有之未遑措思及世宗禮重儒術屢訪賢良河間博洽古文大搜經籍有周舊典始得周官五篇士禮十七篇王又鳩集諸子之說為禮書一百四十篇后倉二戴因而刪擇得四十九篇此曲臺集禮今之禮記是也然數百載不見舊儀諸子所書止論其意百家縱胸臆之說五禮無著定之文故西漢一朝曲臺無制郊上帝於甘泉祀后土於汾陰宗廟無定主樂懸缺金石巡狩非勛華之典封禪異陶匏之音光武受命始詔儒官草定儀注經邦大典至是粗備漢末喪亂又淪沒焉而衞宏應仲遠王仲宣等掇拾遺散裁志條目而已東京舊典世莫得聞自晉至梁繼令條纘鴻生鉅儒銳思綿蕝江左學者髣髴可觀隋氏平陳寰區一統文帝命太常卿牛弘集南北儀注定五禮一百三十篇煬帝在廣陵亦聚學徒修江都集禮由是周漢之制僅有遺風神堯受禪未遑制作郊廟宴享悉用隋代舊儀太宗皇帝踐祚之初悉興文教乃詔中書令房玄齡祕書監魏徵等禮官學士修改舊禮定著吉禮六十一篇賓禮四篇軍禮二十篇嘉禮四十二篇凶禮六篇國恤五篇總一百三十八篇分為一百卷玄齡等始與禮官述議以為月令祭唯祭天宗謂日月而下近代五天帝五人帝五地祇皆非古典今並除之又依禮有益於人則祀之神州者國之所託餘八州則義不相及近代通祭九州今除八州等八座唯祭皇地祇及神州以正祀典又漢建武中封禪用元封時故事封泰山於圜臺上四面皆立石闕並高五丈有方石再累藏玉牒書石檢十枚於四邊檢之東西各三南北各二外設石封高九尺上加石蓋周設石距十八如碑之狀去壇二步其下石跗入地數尺今案封禪者本以成功告於上帝天道貴質故藉用秸罇以瓦甒此法不在經誥又乖醇素之道定議除之近又案梁甫是梁陰代設壇於山上乃乖處陰之義今定禪禮改壇位於山北又皇太子入學及太常行山陵天子大射合朔陳五兵於太社農隙講武納皇后行六禮四孟月讀時令天子上陵朝廟養老於辟雍之禮皆周隋所闕凡增多二十九條餘並準依古禮旁求異代擇其善者而從之太宗稱善頒于內外行焉高宗初議者以貞觀禮節文未盡又詔太尉長孫無忌中書令杜正倫李義府中書侍郎李友益黃門侍郎劉祥道許圉師太子賓客許敬宗太常少卿韋琨太學博士史道玄符璽郎孔志約太常博士蕭楚才孫自覺賀紀等重加緝定勒成一百三十卷至顯慶三年奏上之增損舊禮幷與令式參會改定高宗自為之序時許敬宗李義府用事其所損益多涉希旨行用已後學者紛議以為不及貞觀上元三年三月下詔令依貞觀年禮為定儀鳳二年又詔顯慶新修禮多有事不師古其五禮並依周禮行事自是禮司益無憑準每有大事皆參會古今禮文臨時撰定然貞觀顯慶二禮皆行用不廢時有太常卿裴明禮太常少卿韋萬石相次參掌其事又前後博士賀賀紀韋叔夏裴守真等多所議定則天時以禮官不甚詳明特詔國子博士祝欽明及叔夏每有儀注皆令參定叔夏卒後博士唐紹專知禮儀博學詳練舊事議者以為稱職先天二年紹為給事中以講武失儀得罪被誅其後禮官張星王琇又以元日儀注乖失詔免官歸家學問開元十年詔國子司業韋縚為禮儀使專掌五禮十四年通事舍人王喦上疏請改撰禮記削去舊文而以今事編之詔付集賢院學士詳議右丞相張說奏曰禮記漢朝所編遂為歷代不刊之典今去聖久遠恐難改易今之五禮儀注貞觀顯慶兩度所修前後頗有不同其中或未折衷望與學士等更討論古今刪改行用制從之初令學士右散騎常侍徐堅及左拾遺李銳太常博士施敬本等檢撰歷年不就說卒後蕭嵩代為集賢院學士始奏起居舍人王仲丘撰成一百五十卷名曰大唐開元禮二十年九月頒所司行用焉昊天上帝五方帝皇地祇神州及宗廟為大祀社稷日月星辰先代帝王岳鎮海瀆帝社先蠶釋奠為中祀司中司命風伯雨師諸星山林川澤之屬為小祀大祀所司每年預定日奏下小祀但移牒所由若天子不親祭享則三公行事若官缺則職事三品已上攝三公行事大祀散齋四日致齋三日中祀散齋三日致齋二日小祀散齋二日致齋一日散齋之日晝理事如舊夜宿於家正寢不得弔喪問疾不判署刑殺文書不決罰罪人不作樂不預穢惡之事致齋惟為祀事得行其餘悉斷若大祀齋官皆於散齋之日集於尚書省受誓戒太尉讀誓文致齋之日三公於尚書省安置餘官各於本司若皇城內無本司於太常郊社太廟署安置皆日未出前至齋所至祀前一日各從齋所晝漏上水五刻向祠所接神之官皆沐浴給明衣若天子親祠則於正殿行致齋之禮文武官服袴褶陪位於殿庭車駕及齋官赴祠祭之所州縣及金吾清所行之路不得見諸凶穢及縗絰者哭泣之聲聞於祭所者權斷訖事依舊齋官至祠所太官惟設食祭訖依班序餕訖均胙貴者不重賤者不虛中祀已下惟不受誓戒自餘皆同大祀之禮武德初定令每歲冬至祀昊天上帝於圓丘以景帝配其壇在京城明德門外道東二里壇制四成各高八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈每祀則昊天上帝及配帝設位于平座藉用秸器用陶匏五方上帝日月內官中官外官及衆星並皆從祀其五方帝及日月七座在壇之第二等內五星已下官五十五座在壇之第三等二十八宿已下中官一百三十五座在壇之第四等外官百十二座在壇下外壝之內衆星三百六十座在外壝之外其牲上帝及配帝用蒼犢二五方帝及日月用方色犢各一內官已下加羊豕各九夏至祭皇地祇于方丘亦以景帝配其壇在宮城之北十四里壇制再成下成方十丈上成五丈每祀則地祇及配帝設位於壇上神州及五嶽四鎮四瀆四海五方山林川澤丘陵墳衍原隰並皆從祀神州在壇之第二等五嶽已下三十七座在壇下外壝之內丘陵等三十座在壝外其牲地祇及配帝用犢二神州用黝犢一岳鎮已下加羊豕各五孟春辛日祈穀祀感帝于南郊元帝配牲用蒼犢二孟夏之月雩祀昊天上帝於圓丘景帝配牲用蒼犢二五方上帝五人帝五官並從祀用方色犢十季秋祀五方上帝於明堂元帝配牲用蒼犢二五人帝五官並從祀用方色犢十孟冬祭神州於北郊景帝配牲用黝犢二貞觀初詔奉高祖配圓丘及明堂北郊之祀元帝專配感帝自餘悉依武德永徽二年又奉太宗配祀于明堂有司遂以高祖配五天帝太宗配五人帝顯慶元年太尉長孫無忌與禮官等奏議曰臣等謹尋方冊歷考前規宗祀明堂必配天帝而伏羲五代本配五郊預入明堂自緣從祀今以太宗作配理有未安伏見永徽二年七月詔建明堂伏惟陛下天縱聖德追奉太宗已遵嚴配時高祖先在明堂禮司致惑竟未遷祀率意定儀遂便著令乃以太宗皇帝降配五人帝雖復亦在明堂不得對越天帝深乖明詔之意又與先典不同謹案孝經云孝莫大於嚴父嚴父莫大於配天昔者周公宗祀文王於明堂以配上帝伏惟詔意義在於斯今所司行令殊為失旨又尋漢魏晉宋歷代禮儀並無父子同配明堂之義唯祭法云周人禘嚳而郊稷祖文王而宗武王鄭玄注云禘郊祖宗謂祭祀以配食也禘謂祭昊天於圓丘郊謂祭上帝於南郊祖宗謂祭五帝五神於明堂也尋鄭此注乃以祖宗合為一祭又以文武共在明堂連袵配祀良為謬矣故王肅駁曰古者祖有功而宗有德祖宗自是不毀之名非謂配食於明堂者也審如鄭義則孝經當言祖祀文王於明堂不得言宗祀也凡宗者尊也周人既祖其廟又尊其祀孰謂祖於明堂者乎鄭引孝經以解祭法而不曉周公本意殊非仲尼之義旨也又解宗武王云配勾芒之類是謂五神位在堂下武王降位失君矣又案六韜曰武王伐紂雪深丈餘五車二馬行無轍迹詣營求謁武王怪而問焉太公對曰此必五方之神來受事耳遂以其名召入各以其職命焉既而克殷風調雨順豈有生來受職歿則配之降尊敵卑理不然矣故春秋外傳曰禘郊祖宗報五者國之典祀也傳言五者故知各是一事非謂祖宗合祀於明堂也臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂南齊蕭氏以武明昆季並於明堂配食事乃不經未足援據又檢武德時令以元皇帝配於明堂兼配感帝至貞觀初緣情革禮奉祀高祖配於明堂奉遷世祖專配感帝此即聖朝故事已有遞遷之典取法宗廟古之制焉伏惟太祖景皇帝構室有周建絕代之丕業啟祚汾晉創歷聖之洪基德邁發生道符立極又世祖元皇帝潛鱗韞慶屈道事周導濬發之靈源肇光宅之垂裕稱祖清廟萬代不遷請停配祀以符古義伏惟高祖太武皇帝躬受天命奄有神州創制改物體元居正為國始祖抑有舊章昔者炎漢高帝當塗太祖皆以受命例並配天請遵故實奉祀高祖於圓丘以配昊天上帝伏惟太宗文皇帝道格上元功清下瀆拯率土之塗炭協大造於生靈請準詔書宗祀於明堂以配上帝又請依武德故事兼配感帝作主斯乃二祖德隆永不遷廟兩聖功大各得配天遠協孝經近申詔意二年七月禮部尚書許敬宗與禮官等又奏議據祠令及新禮並用鄭玄六天之議圓丘祀昊天上帝南郊祭太微感帝明堂祭太微五帝謹按鄭玄此義唯據緯書所說六天皆謂星象而昊天上帝不屬穹蒼故注月令及周官皆謂圓丘所祭昊天上帝為北辰星曜魄寶又說孝經郊祀后稷以配天及明堂嚴父配天皆為太微五帝考其所說舛謬特深按周易云日月麗於天百穀草木麗於地又云在天成象在地成形足明辰象非天草木非地毛詩傳云元氣昊大則稱昊天遠視蒼蒼則稱蒼天此則蒼昊為體不入星辰之例且天地各一是曰兩儀天尚無二焉得有六是以王肅羣儒咸駁此義又檢太史圓丘圖昊天上帝座外別有北辰座與鄭義不同得太史令李淳風等狀昊天上帝圖位自在壇上北辰自在第二等與北斗並列為星官內座之首不同鄭玄據緯書所說此乃羲和所掌觀象制圖推步有徵相沿不謬又按史記天官書等太微宮有五帝者自是五精之神五星所奉以其是人主之象故況之曰帝亦如房心為天王之象豈是天乎周禮云兆五帝於四郊又云祀五帝則掌百官之誓戒惟稱五帝皆不言天此自太微之神本非穹昊之祭又孝經惟云郊祀后稷無別祀圓丘之文王肅等以為郊即圓丘圓丘即郊猶王城京師異名同實符合經典其義甚明而今從鄭說分為兩祭圓丘之外別有南郊違棄正經理深未允且檢吏部式惟有南郊陪位更不別載圓丘式文既遵王肅祠令仍行鄭義令式相乖理宜改革又孝經云嚴父莫大於配天下文即云周公宗祀文王於明堂以配上帝則是明堂所祀正在配天而以為但祭星官反違明義又按月令孟春之月祈穀於上帝左傳亦云凡祀啟蟄而郊郊而後耕故郊祀后稷以祈農事然則啟蟄郊天自以祈穀謂為感帝之祭事甚不經今請憲章姬孔考取王鄭四郊迎氣存太微五帝之祀南郊明堂廢緯書六天之義其方丘祭地之外別有神州謂之北郊分地為二既無典據理又不通亦請合為一祀以符古義仍並條附式令永垂後則敬宗等又議籩豆之數曰按今光祿式祭天地日月岳鎮海瀆先蠶等籩豆各四祭宗廟籩豆各十二祭社稷先農等籩豆各九祭風師雨師籩豆各二尋此式文事深乖謬社稷多於天地似不貴多風雨少於日月又不貴少且先農先蠶俱為中祭或六或四理不可通又先農之神尊於釋奠籩豆之數先農乃少理既差舛難以因循謹按禮記郊特牲云籩豆之薦水土之品不敢用褻味而貴多品所以交於神明之義也此即祭祀籩豆以多為貴宗廟之數不可踰郊今請大祀同為十二中祀同為十小祀同為八釋奠準中祀自餘從座並請依舊式詔並可之遂附于禮令乾封初高宗東封迴又詔依舊祀感帝及神州司禮少常伯郝處俊等奏曰顯慶新禮廢感帝之祀改為祈穀昊天上帝以高祖太武皇帝配檢舊禮感帝以世祖元皇帝配今既奉敕依舊復祈穀為感帝以高祖太武皇帝配神州又高祖依新禮見配圓丘昊天上帝及方丘皇地祇若更配感帝神州便恐有乖古禮按禮記祭法云有虞氏禘黃帝而郊嚳夏后氏亦禘黃帝而郊鯀殷人禘嚳而郊冥周人禘嚳而郊稷鄭玄注云禘謂祭昊天於圜丘也祭上帝於南郊曰郊又按三禮義宗云夏正郊天者王者各祭所出帝於南郊即大傳所謂王者禘其祖之所自出以其祖配之是也此則禘須遠祖郊須始祖今若禘郊同用一祖恐於典禮無所據其神州十月祭者十月以陰用事故以此時祭之依檢更無故實按春秋啟蟄而郊鄭玄注禮云三王之郊一用夏正又三禮義宗云祭神州法正月祀於北郊請依典禮以正月祭者請集奉常博士及司成博士等總議定奏聞其靈臺明堂檢舊禮用鄭玄義仍祭五方帝新禮用王肅義又下詔依鄭玄義祭五天帝其雩及明堂並準敕祭祀於是奉常博士陸遵楷張統師權無二許子儒等議稱北郊之月古無明文漢光武正月辛未始建北郊咸和中議北郊同用正月然皆無指據武德來禮令即用十月為是陰用事故於時祭之請依舊十月致祭乾封二年十二月詔曰夫受命承天崇至敬於明祀膺圖纂籙昭大孝於嚴配是以薦鰷鱨於清廟集振鷺於西雍宣雅頌於太師明肅恭於考室用能紀配天之盛業嗣積德之鴻休永播英聲長為稱首周京道喪秦室政乖禮樂淪亡典經殘滅遂使漢朝博士空說六宗之文晉代鴻儒爭陳七祀之議或同昊天於五帝分感帝於五行自茲以降遞相祖述異論紛紜是非莫定朕以寡薄嗣膺丕緒肅承禋祀明發載懷虔奉宗祧寤寐興感每惟宗廟之重尊配之儀思革舊章以申誠敬高祖太武皇帝撫運膺期創業垂統拯庶類於塗炭寘懷生於仁壽太宗文皇帝德光齊聖道極幾神執銳被堅櫛風沐雨勞形以安百姓屈己而濟四方澤被區中恩覃海外乾坤所以交泰品物於是咸亨掩玄闕而開疆指青丘而作鎮巍巍蕩蕩無得名焉禮曰化人之道莫急於禮禮有五經莫重於祭祭者非物自外至也自內生於心也是以惟賢者乃能盡祭之義況祖功宗德道冠百王盡聖窮神業高千古自今以後祭圓丘五方明堂感帝神州等祠高祖太武皇帝太宗文皇帝崇配仍總祭昊天上帝及五帝於明堂庶因心致敬獲展虔誠宗祀配天永光鴻烈儀鳳二年七月太常少卿韋萬石奏曰明堂大享准古禮鄭玄義祀五天帝王肅義祀五行帝貞觀禮依鄭玄義祀五天帝顯慶已來新修禮祀昊天上帝奉乾封二年敕祀五帝又奉制兼祀昊天上帝伏奉上元三年三月敕五禮並依貞觀年禮為定又奉去年敕並依周禮行事今用樂須定所祀之神未審依古禮及貞觀禮為復依見行之禮時高宗及宰臣並不能斷依違久而不決尋又詔尚書省及學者詳議事仍不定自此明堂大享兼用貞觀顯慶二禮則天臨朝垂拱元年七月有司議圓丘方丘及南郊明堂嚴配之禮成均助教孔玄義奏議曰謹按孝經云孝莫大於嚴父嚴父莫大於配天明配尊大昊天是也物之大者莫若於天推父比天與之相配行孝之大莫過於此以明尊配之極也又易云先王以作樂崇德殷薦之上帝以配祖考鄭玄注上帝天帝也故知昊天之祭合祖考並配請奉太宗文武聖皇帝高宗天皇大帝配昊天上帝於圓丘義符孝經周易之文也神堯皇帝肇基王業應天順人請配感帝於南郊義符大傳之文又祭法云祖文王而宗武王祖始也宗尊也所以名祭為尊始者明一祭之中有此二義又孝經云宗祀文王於明堂文王言祖而云宗者亦是通武王之義故明堂之祭配以祖考請奉太宗文武聖皇帝高宗天皇大帝配祭於明堂義符周易及祭法之文也太子右諭德沈伯儀曰謹按禮有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭玄注云禘郊祖宗謂祭祀以配食也禘謂祭昊天於圓丘祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗伏尋嚴配之文於此最為詳備虞夏則退顓頊而郊嚳殷人則捨契而郊冥去取既多前後乖次得禮之序莫尚於周禘嚳郊稷不間於二王明堂宗祀始兼於兩配咸以文王武王父子殊別文王為父上主五帝武王對父下配五神孝經曰嚴父莫大於配天則周公其人也昔者周公宗祀文王於明堂以配上帝不言嚴武王以配天則武王雖在明堂理未齊於配祭既稱宗祀義獨主於尊嚴雖同兩祭終為一主故孝經緯曰后稷為天地主文王為五帝宗也必若一神兩祭便則五祭十祠薦獻頻繁禮虧於數此則神無二主之道禮崇一配之義竊尋貞觀永徽共尊專配顯慶之後始創兼尊必以順古而行實謂從周為美高祖神堯皇帝請配圓丘方澤太宗文武聖皇帝請配南郊北郊高宗天皇大帝德邁九皇功開萬宇制禮作樂告禪升中率土共休普天同賴竊惟莫大之孝理當總配五天鳳閣舍人元萬頃范履冰等議曰伏惟高祖神堯皇帝鑿乾構象闢土開基太宗文武聖皇帝紹統披元循機闡極高宗天皇大帝弘祖宗之大業廓文武之宏規三聖重光千年接旦神功叡德罄圖牒而難稱盛烈鴻猷超古今而莫擬豈徒錙銖堯舜糠粃殷周而已哉謹案見行禮昊天上帝等祠五所咸奉高祖神堯皇帝太宗文武聖皇帝兼配今議者引祭法周易孝經之文雖近稽古之辭殊失因心之旨但子之事父臣之事君孝以成志忠而順美竊以兼配之禮特稟先聖之懷爰取訓於前規遂申情於大孝詩云昊天有成命二后受之易曰殷薦之上帝以配祖考敬尋厥旨本合斯義今若遠摭遺文近乖成典拘常不變守滯莫通便是臣黜於君遽易郊丘之位下非於上靡遵弓劍之心豈所以申太后哀感之誠徇皇帝孝思之德慎終追遠良謂非宜嚴父配天寧當若是伏據見行禮高祖神堯皇帝太宗文武聖皇帝今既先配五祠理當依舊無改高宗天皇大帝齊尊曜魄等邃含樞闡三葉之宏基開萬代之鴻業重規疊矩在功烈而無差享帝郊天豈祀配之有別請奉高宗天皇大帝歷配五祠制從萬頃議自是郊丘諸祠皆以三祖配及則天革命天冊萬歲元年加號為天冊金輪大聖皇帝親享南郊合祭天地以武氏始祖周文王追尊為始祖文皇帝后考應國公追尊為無上孝明高皇帝亦以二祖同配如乾封之禮其後長安年又親享南郊合祭天地及諸郊丘並以配焉中宗即位神龍元年九月親享昊天上帝于東都之明堂以高宗天皇大帝崇配其儀亦依乾封故事至景龍三年十一月親祀南郊初將定儀注國子祭酒祝欽明希旨上言后亦合助祭遂奏議曰謹按周禮天神曰祀地祇曰祭宗廟曰享又內司服職掌王后之六服凡祭祀供后之衣服又祭統曰夫祭也者必夫婦親之據此諸文即知皇后合助皇帝祀天神祭地祇明矣望請別修助祭儀注同進上令宰相與禮官議詳其事太常博士唐紹蔣欽緒建議云皇后南郊助祭於禮不合但欽明所執是祭宗廟禮非祭天地禮按漢魏晉宋及後魏齊梁隋等歷代史籍興王令主郊天祀地代有其禮史不闕書並不見皇后助祭之事又高祖神堯皇帝太宗文武聖皇帝高宗天皇大帝南郊祀天並無皇后助祭之禮尚書右僕射韋巨源又協同欽明之議上遂以皇后為亞獻仍補大臣李嶠等女為齋娘執籩豆焉時十一月十三日乙丑冬至陰陽人盧雅侯藝等奏請促冬至就十二日甲子以為吉會時右臺侍御史唐紹奏曰禮所以冬至祀圓丘於南郊夏至祭方澤於北郊者以其日行躔次極於南北之際也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復其見天地之心乎即冬至卦象也一歲之內吉莫大焉甲子但為六旬之首一年之內隔月常遇既非大會晷運未周唯總六甲之辰助四時而成歲今欲避環周以取甲子是背大吉而就小吉也太史令傅孝忠奏曰準漏刻經南陸北陸並日校一分若用十二日即欠一分未南極即不得為至上曰俗諺云冬至長於歲亦不可改竟依紹議以十三日乙丑祀圓丘睿宗太極元年正月初將有事南郊有司立議惟祭昊天上帝而不設皇地祇位諫議大夫賈曾上表曰微臣詳據典禮謂宜天地合祭謹按禮祭法曰有虞氏褅黃帝而郊嚳夏后氏禘黃帝而郊鯀傳曰大祭曰禘然則郊之與廟俱有禘祭禘廟則祖宗之主俱合於太祖之廟禘郊則地祇羣望俱合於圓丘以始祖配享皆有事而大祭異於常祀之義禮大傳曰不王不禘故知王者受命必行禘禮虞書曰月正元日舜格于文祖肆類于上帝禋于六宗望于山川徧于羣神此則受命而行禘禮者也言格于文祖則餘廟之享可知矣言類于上帝則地祇之合可知矣且山川之祀皆屬于地羣望尚徧況地祇乎周官以六律六呂五聲八音六舞大合樂以致神祇以和邦國以諧萬人又凡六樂者六變而致象物及天神此則禘郊合天神地祇人鬼而祭之樂也三輔故事漢祭圓丘儀昊天上帝位正南面后土位兆亦南面而少東又東觀漢記云光武即位為壇於鄗之陽祭告天地採用元始故事二年正月於洛陽城南依鄗為圓壇天地位其上皆南向西上按兩漢時自有后土及北郊祀而此已於圓丘設地位明是禘祭之儀又春秋說云王者一歲七祭天地合食於四孟別於分至此復天地自常有同祭之義王肅云孔子言兆圓丘於南郊南郊即圓丘圓丘即南郊也又云祭天而地配此亦郊祀合祭之明說惟鄭康成不論禘當合祭而分昊天上帝為二神專憑緯文事匪經見又其注大傳不王不禘義則云正歲之首祭感帝之精以其祖配注周官大司樂圓丘則引大傳之禘以為冬至之祭遞相矛盾未足可依伏惟陛下膺籙居尊繼文在曆自臨宸極未親郊祭今之南郊正當禘禮固宜合祀天地咸秩百神答受命之符彰致敬之道豈可不崇盛禮同彼常郊使地祇無位未從禘享今請備設皇地祇幷從祀等座則禮得稽古義合緣情然郊丘之祀國之大事或失其情精禋將闕臣術不通經識慚博古徒以昔謬禮職今忝諫曹正議是司敢陳忠讜事有可採惟斷之聖慮制令宰臣召禮官詳議可否禮官國子祭酒褚𣰋量國子司業郭山惲等咸請依曾所奏時又將親享北郊竟寢曾之表玄宗即位開元十一年十一月親享圓丘時中書令張說為禮儀使衞尉少卿韋縚為副說建議請以高祖神堯皇帝配祭始罷三祖同配之禮至二十年蕭嵩為中書令改撰新禮祀天一歲有四祀地有二冬至祀昊天上帝於圓丘高祖神堯皇帝配中官加為一百五十九座外官減為一百四座其昊天上帝及配帝二座每座籩豆各用十二簋簠俎各一上帝則太樽著樽犧樽象樽壺樽各二山罍六配帝則不設太樽及壺樽減山罍之四餘同上帝五方帝座則籩豆各十簋簠俎各一太樽二大明夜明籩豆各八餘同五方帝內官每座籩豆二簋俎各一內官已上設樽於十二階之間內官每道間著樽二中官犧樽二外官著樽二衆星壺樽二正月上辛祈穀祀昊天上帝於圓丘以高祖配五方帝從祀其上帝配帝籩豆等同冬至之數五方帝太樽著樽犧樽山罍各一籩豆等亦同冬至之數孟夏雩祀昊天上帝於圓丘以太宗配五方帝及太昊等五帝勾芒等五官從祀其上帝配帝五方帝籩豆各八簋簠俎各一五官每座籩豆各二簋簠及俎各一季秋大享于明堂祀昊天上帝以睿宗配其五方帝五人帝五官從祀籩豆之數同于雩祀夏至禮皇地祇于方丘以高祖配其從祀神州已下六十八座同貞觀之禮地祇配帝籩豆如圓丘之數神州籩豆各四簋簠俎各一五岳四鎮四海四瀆五方山林川澤等三十七座每座籩豆各二簋簠各一五方五帝丘陵墳衍原隰等三十座籩豆簋簠俎各一立冬祭神州于北郊以太宗配二座籩豆各十二簋簠俎各一自冬至圓丘已下餘同貞觀之禮時起居舍人王仲丘既掌知修撰乃建議曰按貞觀禮正月上辛祀感帝於南郊顯慶禮祀昊天上帝於圓丘以祈穀左傳曰郊而後耕詩曰噫嘻春夏祈穀于上帝禮記亦曰上辛祈穀于上帝則祈穀之文傳於歷代上帝之號允屬昊天而鄭康成云天之五帝遞王王者之興必感其一因其所感別祭尊之故夏正之月祭其所生之帝於南郊以其祖配之故周祭靈威仰以后稷配之因以祈穀據所說祀感帝之意本非祈穀先儒所說事恐難憑今祈穀之禮請準禮修之且感帝之祀行之自久記曰有其舉之莫可廢世請於祈穀之壇遍祭五方帝夫五帝者五行之精五行者九穀之宗也今請二禮並行六神咸祀又按貞觀禮孟夏雩祀五方上帝五人帝五官於南郊顯慶禮則雩祀昊天上帝於圓丘且雩祀上帝蓋為百穀祈甘雨故月令云命有司大雩帝用盛樂以祈穀實鄭玄云雩上帝者天之別號允屬昊天祀於圓丘尊天位也然雩祀五帝既久亦請二禮並行以成大雩帝之義又貞觀禮季秋祀五方帝五官於明堂顯慶禮祀昊天上帝於明堂準孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝先儒以為天是感精之帝即太微五帝此即皆是星辰之例且上帝之號皆屬昊天鄭玄所引皆云五帝周禮曰王將旅上帝張氈案設皇邸祀五帝張大次小次由此言之上帝之與五帝自有差等豈可混而為一乎孝經云嚴父莫大於配天其下文即云宗祀文王於明堂以配上帝鄭玄注云上帝者天之別名神無二主故異其處孔安國云帝亦天也然則禋享上帝有合經義而五方皆祀行之已久有其舉之難於即廢亦請二禮並行以成月令大享帝之義天寶十載五月已前郊祭天地以高祖神堯皇帝配座故將祭郊廟告高祖神堯皇帝室寶應元年杜鴻漸為太常卿禮儀使員外郎薛頎歸崇敬等議以神堯為受命之主非始封之君不得為太祖以配天地太祖景皇帝始受封於唐即殷之契周之后稷也請以太祖景皇帝郊祀配天地告請宗廟亦太祖景皇帝酌獻諫議大夫黎幹議以太祖景皇帝非受命之君不合配享天地二年五月幹進議狀為十詰十難曰集賢校理潤州別駕歸崇敬議狀及禮儀使判官水部員外郎薛頎等稱禘謂冬至祭天於圓丘周人則以遠祖帝嚳配今欲以景皇帝為始祖配昊天於圓丘臣幹詰曰國語曰有虞氏夏后氏俱禘黃帝商人禘舜周人禘嚳俱不言祭昊天於圓丘一也詩商頌曰長發大禘也又不言祭昊天於圓丘二也詩周頌曰雍禘太祖也又不言祭昊天於圓丘三也禮記祭法曰有虞氏夏后氏俱禘黃帝殷人周人俱禘嚳又不言祭昊天於圓丘四也禮記大傳曰不王不禘王者禘其祖之所自出以其祖配之又不言祭昊天於圓丘五也爾雅釋天曰禘大祭也又不言祭昊天於圓丘六也家語云凡四代帝王之所郊皆以配天也其所謂禘者皆五年大祭也又不言祭昊天於圓丘七也盧植云禘祭名禘者諦也事尊明諦故曰禘又不言祭昊天於圓丘八也王肅云禘謂於五年大祭之時又不言祭昊天於圓丘九也郭璞云禘五年之大祭又不言祭昊天於圓丘十也臣幹謂禘是五年宗廟之大祭詩禮經傳文義昭然今略舉十詰以明之臣惟見禮記祭法及禮記大傳商頌長發等三處鄭玄注或稱祭昊天或云祭靈威仰臣精詳典籍更無以禘為祭昊天於圓丘及郊祭天者審如禘是祭之最大則孔子說孝經為萬代百王法稱周公大孝何不言禘祀帝嚳於圓丘以配天而反言郊祀后稷以配天是以五經俱無其說聖人所以不言輕議大典亦何容易猶恐不悟今更作十難其一難曰周頌雍禘祭太祖也鄭玄箋云禘大祭太祖文王也商頌云長發大禘也玄又箋云太禘祭天也夫商周之頌其文互說或云禘太祖或云大禘俱是五年宗廟之大祭詳覽典籍更無異同惟鄭玄箋長發乃稱是郊祭天詳玄之意因此商頌禘如大傳云大祭如春秋大事于太廟爾雅禘大祭雖云大祭亦是宗廟之祭可得便稱祭天乎若如所說大禘即云郊祭天稱禘即是祭宗廟又祭法說虞夏商周禘黃帝與嚳大傳不王不禘禘上俱無大字玄何因復稱祭天乎又長發文亦不歌嚳與感生帝故知長發之禘而非禘嚳及郊祭天明矣殷周五帝之大祭羣經衆史及鴻儒碩學自古立言著論序之詳矣俱無以禘為祭天何棄周孔之法言獨取康成之小注便欲違經非聖誣亂祀典謬哉其二難曰大傳稱禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖者此說王者則當禘其謂祭法虞夏殷周禘黃帝及嚳不王則不禘所當禘其祖之所自出謂虞夏出黃帝殷周出帝嚳以近祖配而祭之自出之祖既無宗廟即是自外至者故同之天地神祇以祖配而祀之自出之說非但於父在母亦然左傳子產云陳則我周之自出此可得稱出於太微五帝乎故曰不王不禘王者禘其祖之所自出以其祖配之此之謂也及諸侯之禘則降於王者不得祭自出之祖只及太祖而已故曰諸侯及其太祖此之謂也鄭玄錯亂分禘為三注祭法云禘謂祭昊天於圓丘一也注大傳稱郊祭天以后稷配靈威仰箋商頌又稱郊祭天二也注周頌云禘大祭大於四時之祭而小於祫太祖謂文王三也禘是一祭玄析之為三顛倒錯亂皆率胸臆曾無典據何足可憑其三難曰虞夏殷周已前禘祖之所自出其義昭然自漢魏晉已還千餘歲其禮遂闕又鄭玄所說其言不經先儒棄之未曾行用愚以為錯亂之義廢棄之注不足以正大典其四難曰所稱今三禮行於代者皆是鄭玄之學請據鄭學以明之曰雖云據鄭學今欲以景皇帝為始祖之廟以配天復與鄭義相乖何者王制云天子七廟玄云此周禮也七廟者太祖及文武之祧與親廟四也殷則六廟契及湯與二昭二穆也據鄭學夏不以鯀及顓頊昌意為始祖昭然可知也而欲引稷契為例其義又異是爰稽邃古洎今無以人臣為始祖者惟殷以契周以稷夫稷契者皆天子元妃之子感神而生昔帝嚳次妃簡狄有娀氏之女吞玄鳥之卵因生契契長而佐禹治水有大功舜乃命契作司徒百姓既和遂封於商故詩曰天命玄鳥降而生商宅殷土芒芒此之謂也后稷者其母有邰氏之女曰姜嫄為帝嚳妃出野履巨跡歆然有孕生稷稷長而勤於稼穡堯聞舉為農師天下得其利有大功舜封於邰號曰后稷唐虞夏之際皆有令德故詩曰履帝武敏歆居然生子即有邰家室此之謂也舜禹有天下稷契在其間量功比德抑其次也舜授職則播百穀敷五教禹讓功則平水土宅百揆故國語曰聖人之制祀也功施於人則祀之以死勤事則祀之契為司徒而人輯睦稷勤百穀而死皆居前代祀典子孫有天下得不尊而祖之乎其五難曰既遵鄭說小德配寡遂以后稷只配一帝尚不得全配五帝今以景皇帝特配昊天於鄭義可乎其六難曰衆難臣云上帝與五帝一也所引春官祀天旅上帝祀地旅四望旅訓衆則上帝是五帝臣曰不然旅雖訓衆出於爾雅及為祭名春官訓陳注有明文若如所言旅上帝便成五帝則季氏旅於泰山可得便是四鎮耶其七難曰所云據鄭學則景皇帝親盡廟主合祧卻欲配祭天地錯亂祖宗夫始祖者經綸草昧體大則天所以正元氣廣大萬物之宗尊以長至陽氣萌動之始日俱祀於南郊也夫萬物之始天也人之始祖也日之始至也掃地而祭質也器用陶匏性也牲用犢誠也兆於南郊就陽位也至尊至質不敢同於先祖禮也故白虎通曰祭天歲一何天至尊至質事之不敢褻黷故因歲之陽氣始達而祭之今國家一歲四祭之黷莫大焉上帝五帝其祀遂闕怠亦甚矣黷與怠皆禮之失不可不知夫親有限祖有常聖人制禮君子不以情變易國家重光累聖歷祀百數豈不知景皇帝始封于唐當時通儒議功度德尊神堯克配彼天宗太宗以配上帝神有定主為日已久今欲黜神堯配含樞紐以太宗配上帝則紫微五精上帝佐也以子先父豈禮意乎非止神祇錯位亦以祖宗乖序何以上稱皇天祖宗之意哉若夫神堯之功太宗之德格于皇天上帝臣以為郊祀宗祀無以加焉甚八難曰欲以景皇帝為始祖既非造我區宇經綸草昧之主故非夏始祖禹殷始祖契周始祖稷漢始祖高帝魏始祖武皇帝晉始祖宣帝國家始祖神堯皇帝同功比德而忽升于宗祀圜丘之上為昊天匹曾謂圜丘不如林放乎其九難曰昨所言魏文帝丕以武帝操為始祖晉武帝炎以宣帝懿為始祖者夫孟德仲達者皆人傑也擁天下之強兵挾漢魏之微主專制海內令行草偃服衮冕陳軒懸天子決事於私第公卿列拜於道左名雖為臣勢實凌君後主因之而業帝前王由之而禪代子尊而祖之不亦可乎其十難曰所引商周魏晉既不當矣則景皇帝不為始祖明矣我神堯拔出羣雄之中廓清隋室拯生人於塗炭則夏禹之勳不足多成帝業於數年之間則漢祖之功不足比夏以大禹為始祖漢以高帝為始祖則我唐以神堯為始祖法夏則漢於義何嫌今欲革皇天之祀易太祖之廟事之大者莫大於斯曾無按據一何寡陋不愧于心不畏于天乎以前奉詔令諸司各據禮經定議者臣幹忝竊朝列官以諫為名以直見知以學見達不敢不罄竭以裨萬一昨十四日具以議狀呈宰相宰相令朝臣與臣論難所難臣者以臣所見獨異莫不騰辭飛辯競欲碎臣理鉗臣口剖析毫釐分別異同序墳典之凝滯指子傳之乖謬事皆歸根觸物不礙但臣言有宗爾豈辯者之流也又歸崇敬薛頎等援引鄭學欲蕪祀典臣為明辯迷而不復臣輒作十詰十難援據墳籍昭然可知庶郊禘事得其真嚴配不失其序皇靈降祉天下蒙賴臣亦何顧不蹈鼎鑊謹敢聞達伏增悚越議奏不報至二年春夏旱言事者云太祖景皇帝追封於唐高祖實受命之祖百神受職合依高祖今不得配享天地所以神不降福以致愆陽代宗疑之詔百僚會議太常博士獨孤及獻議曰禮王者禘其祖之所自出以其祖配之凡受命始封之君皆為太祖繼太祖已下六廟則以親盡迭毀而太祖之廟雖百代不遷此五帝三王所以尊祖敬宗也故受命于神宗禹也而夏后氏祖顓頊而郊鯀纘禹黜夏湯也而殷人郊冥而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝唯漢氏崛起豐沛豐公太公皆無位無功不可以為祖宗故漢以高皇帝為太祖其先細微也非足為後代法伏惟太祖景皇帝以柱國之任翼周弼魏肇啟王業建封于唐高祖因之以為有天下之號天所命也亦如契之封商后稷之封邰禘郊祖宗之位宜在百代不遷之典郊祀太祖宗祀高祖猶周之祖文王而宗武王也今若以高祖創業當躋其祀是棄三代之令典尊漢氏之末制黜景皇帝之大業同豐公太公之不祀反古違道失孰大焉夫追尊景皇廟號太祖高祖太宗所以崇尊之禮也若配天之位既異則太祖之號宜廢祀之不修廟亦當毀尊祖報本之道其墜于地乎漢制擅議宗廟以大不敬論今武德貞觀憲章未改國家方將敬祀事和神人禘郊之間恐非所宜臣謹稽禮文參諸往制請仍舊典竟依歸崇敬等議以太祖配享天地廣德二年正月十六日禮儀使杜鴻漸奏郊太廟大禮其祝文自今已後請依唐禮板上墨書其玉簡金字者一切停廢如允臣所奏望編為常式敕曰宜行用竹簡貞元元年十一月十一日德宗親祀南郊有司進圖敕付禮官詳酌博士柳冕奏曰開元定禮垂之不刊天寶改作起自權制此皆方士謬妄之說非禮典之文請一準開元禮從之其年十月二十七日詔郊祀之義本於至誠制禮定名合從事實使名實相副則尊卑有倫五方配帝上古哲王道濟烝人禮著明祀論善計功則朕德不類統天御極朕位攸同而於祝文稱臣以祭既無益於誠敬徒有瀆於等威前京兆府司錄參軍高佩上疏陳請其理精詳朕重變舊儀訪于卿士申明大義是用釋然宜從改正以敦至禮自今已後祀五方配帝祝文並不須稱臣其餘禮數如舊六年十一月八日有事于南郊詔以皇太子為亞獻親王為終獻上問禮官亞獻終獻合受誓誡否吏部郎中柳冕曰準開元禮獻官前七日於內受誓誡辭云各揚其職不供其事國有常刑今以皇太子為亞獻請改舊辭云各揚其職肅奉常儀從之十五年四月術士匡彭祖上言大唐土德千年合符請每於四季月郊祀天地詔禮官儒者議歸崇敬曰準禮立春日迎春於東郊祭青帝立夏日迎夏於南郊祭赤帝立秋後十八日迎黃靈於中地祭黃帝秋冬各於其方黃帝於五行為土王在四季土生於火用事於木而祭於秋三季則否漢魏周隋共行此禮國家土德乘時亦以每歲六月土王之日祀黃帝於南郊以后土配合於典禮彭祖憑候緯之說據陰陽之書事涉不經恐難行用乃寢元和十五年十二月將有事於南郊穆宗問禮官南郊卜日否禮院奏伏準禮令祠祭皆卜自天寶已後凡欲郊祀必先朝太清宮次日饗太廟又次日祀南郊相循至今並不卜日從之及明年正月南郊禮畢有司不設御榻上立受羣臣慶賀及御樓仗退百僚復不於樓前賀乃受賀於興慶宮二者闕禮有司之過也
