body:
  text: 舊唐書卷一百八十六上列傳第一百三十六上酷吏上來俊臣周興傅遊藝丘神勣索元禮侯思止萬國俊來子珣王弘義郭霸吉頊古今御天下者其政有四五帝尚仁體文德也三王仗義立武功也五霸崇信取威令也七雄任力重刑名也蓋仁義既廢然後齊之以威刑威刑既衰而酷吏為用於是商鞅李斯譎詐設矣持法任術尊君卑臣奮其策而鞭撻宇宙持危救弊先王不得已而用之天下之人謂之苛法降及兩漢承其餘烈於是前有郅都張湯之徒持其刻後有董宣陽球之屬肆其猛雖然異代亦克公方天下之人謂之酷吏此又鞅斯之罪人也然而網既密而姦不勝矣夫子曰刑罰不中則人無所措手足誠哉是言也唐初革前古之敝務於勝殘垂衣而理且七十載而人不敢欺由是觀之在彼不在此逮則天以女主臨朝大臣未附委政獄吏剪除宗枝於是來俊臣索元禮萬國俊周興丘神勣侯思止郭霸王弘義之屬紛紛而出然後起告密之刑制羅織之獄生人屏息莫能自固至於懷忠蹈義連頸就戮者不可勝言武后因之坐移唐鼎天網一舉而卒籠八荒酷之為用斯害也已遂使酷吏之黨橫噬於朝制公卿之死命擅王者之威力貴從其欲毒侈其心天誅發於脣吻國柄秉於掌握兇慝之士榮而慕之身赴鼎鑊死而無悔若是者何哉要時希旨見利忘義也嘗試而論之今夫國家行斧鉞之誅設狴牢之禁以防盜者雖云固矣而猶踰垣掘塚揭篋探囊死者於前盜者於後何者以其間有欲也然所徇者不過數金之資耳彼酷吏與時上下取重人主無怵惕之憂坐致尊寵杖起卒伍富擬封君豈唯數金之利耶則盜官者為幸矣故有國者則必窒覬覦之路杜僥倖之門可不務乎況乎樂觀時變恣懷陰賊斯又郅都董宣之罪人也異哉又有效於斯者中興四十載而有吉溫羅希奭之𢀿政又數載而有敬羽毛若虛之危法朝經四葉獄訟再起比周惡黨勦絕善人屢撓將措之刑以傷太和之氣幸災樂禍苟售其身此又來索之罪人也嗚呼天道禍淫人道惡殺既為禍始必以凶終故自鞅斯至于毛敬蹈其跡者卒以誅夷非不幸也嗚呼執愚賈害任天下之怨反道辱名歸天下之惡或肆諸原野人得而誅之或投之魑魅鬼得而誅之天人報應豈虛也哉俾千載之後聞其名者曾蛇豕之不若悲夫昔春秋之義善惡不隱今為酷吏傳亦所以示懲勸也語曰前事不忘將來之師意在斯乎意在斯乎來俊臣雍州萬年人也父操博徒與鄉人蔡本結友遂通其妻因樗蒲贏本錢數十萬本無以酬操遂納本妻入操門時先已有娠而生俊臣凶險不事生產反覆殘害舉無與比曾於和州犯奸盜被鞫遂妄告密召見奏刺史東平王續杖之一百後續天授中被誅俊臣復告密召見奏言前所告密是豫博州事枉被續決杖遂不得申則天以為忠累遷侍御史加朝散大夫按制獄少不會意者必引之前後坐族千餘家二年擢拜左臺御史中丞朝廷累息無交言者道路以目與侍御史侯思止王弘義郭霸李仁敬司刑評事康暐衞遂忠等同惡相濟招集無賴數百人令其告事共為羅織千里響應欲誣陷一人即數處別告皆是事狀不異以惑上下仍皆云請付來俊臣推勘必獲實情則天於是於麗景門別置推事院俊臣推勘必獲專令俊臣等按鞫亦號為新開門但入新開門者百不全一弘義戲謂麗景門為例竟門言入此門者例皆竟也俊臣與其黨朱南山輩造告密羅織經一卷皆有條貫支節布置事狀由緒俊臣每鞫囚無問輕重多以醋灌鼻禁地牢中或盛之瓮中以火圜遶炙之並絕其糧餉至有抽衣絮以噉之者又令寢處糞穢備諸苦毒自非身死終不得出每有赦令俊臣必先遣獄卒盡殺重囚然後宣示又以索元禮等作大枷凡有十號一曰定百脉二曰喘不得三曰突地吼四曰著即承五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家復有鐵籠頭連其枷者輪轉于地斯須悶絕矣囚人無貴賤必先布枷棒于地召囚前曰此是作具見之魂膽飛越無不自誣矣則天重其賞以酬之故吏競勸為酷矣由是告密之徒紛然道路名流僶俛閱日而已朝士多因入朝默遭掩襲以至于族與其家無復音息故每入朝者必與其家訣曰不知重相見不如意元年地官尚書狄仁傑益州長史任令暉冬官尚書李遊道秋官尚書袁智宏司賓卿崔神基文昌左丞盧獻等六人並為其羅告俊臣既以族人家為功苟引之承反乃奏請降敕一問即承同首例得減死及脅仁傑等反仁傑歎曰大周革命萬物惟新唐朝舊臣甘從誅戮反是實俊臣乃少寬之其判官王德壽謂仁傑曰尚書事已爾得減死德壽今業已受驅策欲求少階級憑尚書牽楊執柔可乎仁傑曰若之何德壽曰尚書昔在春官時執柔任某司員外引之可也仁傑曰皇天后土遣狄仁傑行此事以頭觸柱血流被面德壽懼而止焉仁傑既承反有司但待報行刑不復嚴備仁傑得憑守者求筆硯拆被頭帛書之冤苦置于綿衣遣謂德壽曰時方熱請付家人去其綿德壽不復疑矣家人得衣中書仁傑子光遠持之稱變得召見則天覽之愕然召問俊臣曰卿言仁傑等承反今子弟訟冤何故也俊臣曰此等何能自伏其罪臣寢處甚安亦不去其巾帶則天令通事舍人周綝視之俊臣遽令獄卒令假仁傑等巾帶行立於西命綝視之綝懼俊臣莫敢西顧但視東唯諾而已俊臣令綝少留附進狀乃令判官妄為仁傑等作謝死表代署而進之鳳閣侍郎樂思晦男年八九歲其家已族宜隸于司農上變得召見言俊臣苛毒願陛下假條反狀以付之無大小皆如狀矣則天意少解乃召見仁傑曰卿承反何也仁傑等曰不承反臣已死於枷棒矣則天曰何謂作謝死表仁傑曰無因以表示之乃知其代署遂出此六家俊臣復按大將軍張虔勗大將軍內侍范雲仙於洛陽牧院虔勗等不堪其苦自訟於徐有功言辭頗厲俊臣命衞士以亂刀斬殺之雲仙亦言歷事先朝稱所司冤苦俊臣命截去其舌士庶破膽無敢言者俊臣累坐贓為衞吏紀履忠所告下獄長壽二年除殿中丞又坐贓出為同州參軍逼奪同列參軍妻仍辱其母萬歲通天元年召為合宮尉擢拜洛陽令司農少卿則天賜其奴婢十人當受於司農時西蕃酋長阿史那斛瑟羅家有細婢善歌舞俊臣因令其黨羅告斛瑟羅反將圖其婢諸蕃長詣闕割耳剺面訟冤者數十人乃得不族時綦連耀劉思禮等有異謀明堂尉吉頊知之不自安以白俊臣發之連坐族者數十輩俊臣將擅其功復羅告頊得召見僅而免俊臣先逼娶太原王慶詵女俊臣與河東衞遂忠有舊遂忠行雖不著然好學有詞辯嘗攜酒謁俊臣俊臣方與妻族宴集應門者紿云已出矣遂忠知妄入其宅慢罵毀辱之俊臣恥其妻族命毆擊反接既而免之自此構隙俊臣將羅告武氏諸王及太平公主張易之等遂相掎摭則天屢保持之而諸武及太平公主恐懼共發其罪乃棄市國人無少長皆怨之競剮其肉斯須盡矣中宗神龍元年三月八日詔曰國之大綱惟刑與政刑之不中其政乃虧劉光業王德壽王處貞屈貞筠鮑思恭劉景陽等庸流賤職姦吏險夫以粗暴為能官以兇殘為奉法往從按察害虐在心倏忽加刑呼吸就戮曝骨流血其數甚多冤濫之聲盈於海內朕唯布新澤恩被人祇撫事長懷尤深惻隱光業等五人積惡成釁並謝生涯雖其人已殂而其跡可貶所有官爵並宜追奪其枉被殺人各令州縣以禮埋葬還其官蔭劉景陽身今見在情不可矜特以會恩免其嚴罰宜從貶降以雪冤情可棣州樂單縣員外尉自今內外法官咸宜敬慎其文深刺骨跡徇凝脂高下任情輕重隨意如酷吏丘神勣來子珣萬國俊周興來俊臣魚承曄王景昭索元禮傅遊藝王弘義張知默裴籍焦仁亶侯思止郭霸李仁敬皇甫文備陳嘉言等其身已死並遣除名自垂拱已來枉濫殺人有官者並令削奪唐奉一依前配流李秦授曹仁哲並與嶺南惡處開元十三年三月十二日御史大夫程行諶奏周朝酷吏來子徇萬國俊王弘義侯思止郭霸焦仁亶張知默李敬仁唐奉一來俊臣周興兵神勣索元禮曹仁哲王景昭裴籍李秦授劉光業王德壽屈貞筠鮑思恭劉景陽王處貞二十三人殘害宗枝毒陷良善情狀尤重子孫不許與官陳嘉言魚承曄皇甫文備傅遊藝四人情狀稍輕子孫不許近任周興者雍州長安人也少以明習法律為尚書省都事累遷司刑少卿秋官侍郎自垂拱已來屢受制獄被其陷害者數千人天授元年九月革命除尚書左丞上疏除李家宗正屬籍二年十一月與兵神勣同下獄當誅則天特免之徙於嶺表在道為讎人所殺傅遊藝衞州汲人也載初元年為合宮主簿左肅政臺御史除左補闕上書稱武氏符瑞合革姓受命則天甚悅擢為給事中數月加同鳳閣鸞臺平章事同月又加朝散大夫守鸞臺侍郎依舊同平章事其年九月革命改天授元年賜姓武氏二年五月加銀青光祿大夫兄神童為冬官尚書兄弟並承榮寵逾月除司禮少卿停知政事夢登湛露殿旦而陳於所親為其所發伏誅時人號為四時仕宦言一年自青而綠及於朱紫也希則天旨誣族皇枝神龍初禁錮其子孫初遊藝請則天發六道使雖身死之後竟從其謀於是萬國俊輩恣斬戮矣丘神勣左衞大將軍行恭子也永淳元年為左金吾衞將軍弘道元年高宗崩則天使於巴州害章懷太子既而歸罪於神勣左遷疊州刺史尋復入為左金吾衞將軍深見親委受詔與周興來俊臣鞫制獄俱號為酷吏垂拱四年博州刺史琅邪王冲起兵以神勣為清平道大總管尋而冲為百姓孟青棒吳希智所殺神勣至州官吏素服來迎神勣揮刃盡殺之破千餘家因加左金吾衞大將軍天授二年十月下詔獄伏誅索元禮胡人也光宅初徐敬業起兵揚州以匡復為名則天震怒又恐人心動搖欲以威制天下元禮探其旨告事召見擢為游擊將軍令於洛州牧院推案制獄元禮性殘忍推一人廣令引數十百人衣冠震懼甚於狼虎則天數召見賞賜張其權勢凡為殺戮者數千人於是周興來俊臣之效之而起矣時有諸州告密人皆給公乘州縣護送至闕下於賓館以廩之稍稱旨必授以爵賞以誘之貴以威於遠近元禮尋以酷毒轉甚則天收人望而殺之天下之人謂之來索言酷毒之極又首按制獄也載初元年十月左臺御史周矩上疏諫曰頃者小人告訐習以為常內外諸司人懷苟免姑息臺吏承接強梁非故欲規避誣構耳又推劾之吏皆以深刻為功鑿空爭能相矜以虐泥耳籠頭枷研楔摺脅籤爪懸髮薰耳臥鄰穢溺曾不聊生號為獄持或累日節食連宵緩問晝夜搖撼使不得眠號曰宿囚此等既非木石且救目前苟求賒死臣竊聽輿議皆稱天下太平何苦須反豈被告者盡是英雄以求帝王耶只是不勝楚毒自誣耳何以覈之陛下試取所告狀酌其虛實者付令推微訊動以探其情所推者必上下其手希聖旨也願陛下察之今滿朝側息不安皆以為陛下朝與之密夕與之讎不可保也聞有追攝與妻子即為死訣故為國者以仁為宗以刑為助周用仁而昌秦用刑而亡此之謂也願陛下緩刑用仁天下幸甚則天從之由是制獄稍息侯思止雍州醴泉人也貧窮不能理生業乃樂事渤海高元禮家性無賴詭譎時恆州刺史裴貞杖一判司則天將不利王室羅反之徒已興矣判司教思止說游擊將軍高元禮因請狀乃告舒王元名及裴貞反周興按之並族滅授思止游擊將軍元禮懼而曲媚引與同坐呼為侯大曰國家用人以不次若言侯大不識字即奏云獬豸獸亦不識字而能觸邪則天果如其言思止以獬豸對之則天大悅天授三年乃拜朝散大夫左臺侍御史元禮復教曰在上知侯大無宅倘以諸役官宅見借可辭謝而不受在上必問所由即奏云諸反逆人臣惡其名不願坐其宅則天復大悅恩澤甚優思止既按制獄苛酷日甚嘗按中丞魏元忠曰急認白司馬不然即喫孟青白司馬者洛陽有坂號白司馬坂孟青者將軍姓孟名青棒即殺琅邪王冲者也思止閭巷庸奴常以此謂諸囚也元忠辭氣不屈思止怒而倒曳元忠元忠徐起曰我薄命如乘惡驢墜脚為鐙所挂被拖曳思止大怒又曳之曰汝拒捍制使奏斬之元忠曰侯思止汝今為國家御史須識禮數輕重如必須魏元忠頭何不以鋸截將無為抑我承反奈何爾佩服朱紫親銜天命不行正直之事乃言白司馬孟青是何言也非魏元忠無人抑教思止驚起悚怍曰思止死罪幸蒙中丞教引上牀坐而問之元忠徐就坐自若思止言竟不正時人効之以為談謔之資侍御史霍獻可笑之思止以聞則天怒謂獻可曰我已用之卿笑何也獻可具以其言奏則天亦大笑時來俊臣棄故妻逼娶太原王慶詵女思止亦奏請娶趙郡李自挹女敕政事商量鳳閣侍郎李昭德撫掌謂諸宰相曰大可笑諸宰相問故昭德曰往年來俊臣賊劫王慶詵女已大辱國今日此奴又請索李自挹女無乃復辱國乎竟為李昭德搒殺之萬國俊洛陽人少譎異險詐垂拱後與來俊臣同為羅織經屠覆宗枝朝貴以作威勢自司刑評事俊臣同引為判官天授二年攝右臺監察御史常與俊臣同按制獄長壽二年有上封事言嶺南流人有陰謀逆者乃遣國俊就按之若得反狀便斬決國俊至廣州遍召流人置于別所矯制賜自盡並號哭稱冤不服國俊乃引出擁之水曲以次加戮三百餘人一時倂命然後鍛鍊曲成反狀仍誣奏云諸流人咸有怨望若不推究為變不遙則天深然其奏乃命右衞翊二府兵曹參軍劉光業司刑評事王德壽苑南面監丞鮑思恭尚輦直長王大貞右武衞兵曹參軍屈貞筠等並攝監察御史分往劍南黔中安南等六道鞫流人尋擢授國俊朝散大夫肅政臺侍御史光業等見國俊盛行殘殺得加榮貴乃共肆其兇忍唯恐後之光業殺九百人德壽殺七百人其餘少者咸五百人亦有遠年流人非革命時犯罪亦同殺之則天後知其冤濫下制被六道使所殺之家口未歸者並遞還本管國俊等俄亦相次而死皆見鬼物為祟或有流竄而終來子珣雍州長安人永昌元年四月以上書陳事除左臺監察御史時朝士有不帶靴而朝者子珣彈之曰臣聞束帶立於朝舉朝大噱則天委之按制獄多希旨賜姓姓武氏字家臣天授中丁父憂起復朝散大夫侍御史時雅州刺史劉行實及弟渠州刺史行瑜尚衣奉御行威幷兄子鷹揚郎將軍虔通等為子珣誣告謀反誅又於盱眙毀其父左監門大將軍伯英棺柩俄又轉為游擊將軍右羽林中郎將常衣錦半臂言笑自若朝士誚之長壽元年配流愛州卒王弘義冀州衡水人也告變授游擊將軍天授中拜右臺殿中侍御史長壽中拜左臺侍御史與來俊臣羅告衣冠延載元年俊臣貶弘義亦流放瓊州妄稱敕追時胡元禮為侍御史使嶺南道次于襄鄧會而按之弘義詞窮乃謂曰與公氣類元禮曰足下任御史元禮任洛陽尉元禮今為御史公乃流囚復何氣類乃搒殺之弘義每暑月繫囚必於小房中積蒿而施氈褥遭之者斯須氣絕矣苟自誣引則易於他房與俊臣常行移牒州縣慴懼自矜曰我之文牒有如狼毒野葛也弘義常於鄉里傍舍求瓜主吝之弘義乃狀言瓜園中有白兔縣官命人捕逐斯須園苗盡矣內史李昭德曰昔聞蒼鷹獄吏今見白兔御史郭霸廬江人也天授二年自宋州寧陵丞應革命舉拜左臺監察御史如意元年除左臺殿中侍御史長壽二年右臺侍御史初舉集召見於則天前自陳忠鯁云往年征徐敬業臣願抽其筋食其肉飲其血絕其髓則天悅故拜焉時人號為四其御史時大夫魏元忠臥疾諸御史盡往省之霸獨居後比見元忠憂懼請示元忠便液以驗疾之輕重元忠驚悚霸悅曰大夫糞味甘或不瘳今味苦當即愈矣元忠剛直殊惡之以其事露朝士嘗推芳州刺史李思徵搒捶考禁不勝而死聖曆中屢見思徵甚惡之嘗因退朝遽歸命家人曰速請僧轉經設齋須臾見思徵從數十騎上其廷曰汝枉陷我我今取汝霸周章惶怖援刀自刳其腹斯須蛆爛矣是日閭里亦見兵馬數十騎駐于門少頃不復見矣時洛陽橋壞行李弊之至是功畢則天嘗問羣臣比在外有何好事舍人張元一素滑稽對曰百姓喜洛橋成幸郭霸死此即好事吉頊洛州河南人也身長七尺陰毒敢言事進士舉累轉明堂尉萬歲通天二年有箕州刺史劉思禮自云學於張憬藏善相云洛州錄事參軍綦連耀應圖讖有兩角騏驎兒之符命頊告之則天付武懿宗與頊對訊懿宗與頊誘思禮令廣引朝士必全其命思禮乃引鳳閣侍郎李元素夏官侍郎孫元通天官侍郎劉奇石抱忠鳳閣舍人王處來庭主簿柳璆給事中周潘涇州刺史王勔監察御史王助司議郎路敬淳司門員外郎劉慎之右司員外郎宇文全志等三十六家微有忤意者必構之楚毒百端以成其獄皆海內賢士名家天下冤之親故連累竄逐者千餘人頊由是擢拜右肅政臺中丞日見恩遇明年突厥寇陷趙定等州則天召頊檢校相州刺史以斷賊南侵之路頊以素不習武為辭則天曰賊勢將退藉卿威名鎮遏耳初太原有術士溫彬茂高宗時老臨死封一狀謂其妻曰吾死後年名垂拱即詣闕獻之慎勿開也垂拱初其妻獻之狀中預陳則天革命及突厥至趙定之事故則天知賊至趙州而退頊初至州募人略無應者俄而詔以皇太子為元帥應募者不可勝數及賊退頊入朝奏之則天甚悅聖曆二年臘月遷天官侍郎同鳳閣鸞臺平章事時易之昌宗諷則天置控鶴監官員則天以易之為控鶴監頊素與易之兄弟親善遂引頊以殿中少監田歸道鳳閣舍人薛稷正諫大夫員半千夏官侍郎李迥秀俱為控鶴內供奉時議甚不悅初則天以頊幹辯有口才偉儀質堪委以心腹故擢任之及與武懿宗爭趙州功於殿中懿宗短小俯僂頊聲氣凌厲下視懿宗嘗不相假則天以為卑我諸武於我前其可倚與其年十月以弟作偽官貶琰川尉後改安固尉尋卒初中宗未立為皇太子時易之昌宗嘗密問頊自安之策頊云公兄弟承恩既深非有大功於天下則不全矣今天下士庶咸思李家廬陵既在房州相王又在幽閉主上春秋既高須有付託武氏諸王殊非屬意明公若能從容請建立廬陵及相王以副生人之望豈止轉禍為福必長享茅土之重矣易之然其言遂承間奏請則天知頊首謀召而問之頊曰廬陵王及相王皆陛下之子先帝顧託於陛下當有主意唯陛下裁之則天意乃定頊既得罪時無知者睿宗即位左右發明其事乃下制曰故吏部侍郎同中書門下平章事吉頊體識宏遠風規久大嘗以經緯之才允膺匡佐之委時王命中否人謀未輯首陳返政之議克副祈天之基永懷遺烈寧忘厥効可贈左御史臺大夫
