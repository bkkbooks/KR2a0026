body:
  text: 舊唐書卷五十六列傳第六蕭銑杜伏威輔公祏闞稜王雄誕沈法興李子通朱粲林士弘張善安羅藝梁師都劉季真李子和蕭銑後梁宣帝曾孫也祖巖隋開皇初叛隋降於陳陳亡為文帝所誅銑少孤貧傭書自給事母以孝聞煬帝時以外戚擢授羅川令大業十三年岳州校尉董景珍雷世猛旅帥鄭文秀許玄徹萬瓚徐德基郭華沔州人張繡等同謀叛隋郡縣官屬眾欲推景珍為主景珍曰吾素寒賤雖假名號眾必不從今若推主當從眾望羅川令蕭銑梁氏之後寬仁大度有武皇之風吾又聞帝王膺籙必有符命而隋氏冠帶盡號起梁斯乃蕭家中興之兆今請以為主不亦應天順人乎眾乃遣人諭意銑大悅報景珍書曰我之本國昔在有隋以小事大朝貢無闕乃貪我土宇滅我宗祊我是以痛心疾首無忘雪恥今天啟公等協我心事若合符節豈非上玄之意也吾當糾率士庶敬從來請即日集得數千人揚言討賊而實欲相應遇潁川賊帥沈柳生來寇羅川縣銑擊之不利因謂其眾曰岳州豪傑首謀起義請我為主今隋政不行天下皆叛吾雖欲獨守力不自全且吾先人昔都此地若從其請必復梁祚遣召柳生亦當從我眾皆大悅即日自稱梁公改隋服色建梁旗幟柳生以眾歸之拜為車騎大將軍率眾往巴陵自起軍五日遠近投附者數萬人景珍遣徐德基郭華率州中首領數百人詣軍迎謁未及見銑而前造柳生柳生謂其下曰我先奉梁公勳居第一今岳州兵眾位多於我我若入城便出其下不如殺德基質其首領獨挾梁公進取州城遂與左右殺德基方詣中軍白銑銑大驚曰今欲撥亂忽自相殺我不能為汝主矣乃步出軍門柳生大懼伏地請罪銑責而赦之令復舊位銑陳兵入城景珍進言於銑曰徐德基丹誠奉主柳生凶悖擅殺之若不加誅何以為政且其為賊凶頑已久今雖從義不革此心同處一城必將為變若不預圖後悔無及銑又從之景珍遂斬柳生於城內其下將帥皆潰散銑於是築壇於城南燔燎告天自稱梁王以有異鳥之瑞建元為鳳鳴義寧二年僭稱皇帝署置百官一準梁故事偽諡其從父琮為孝靖帝祖巖為河間忠烈王父璿為文憲王封董景珍為晉王雷世猛為秦王鄭文秀為楚王許玄徹為燕王萬瓚為魯王張繡為齊王楊道生為宋王隋將張鎮州王仁壽擊之不能克及聞隋滅鎮州因與甯長真等率嶺表諸州盡降於銑九江鄱陽初有林士弘僭號俄自相誅滅士弘逃于安成之山洞其郡亦降於銑遣其將楊道生攻陷南郡張繡略定嶺表東至三硤南盡交阯北拒漢川皆附之勝兵四十餘萬武德元年遷都江陵修復園廟引岑文本為中書侍郎令掌機密銑又遣楊道生攻硤州刺史許紹出兵擊破之赴水死者大半高祖詔夔州總管趙郡王孝恭率兵討之拔其通開二州斬偽東平郡王蕭闍提時諸將橫恣多專殺戮銑因令罷兵陽言營農實奪將帥之權也其大司馬董景珍之弟為偽將軍怨銑放其兵遂謀為亂事洩為銑所誅時景珍出鎮長沙銑下書赦之召還江陵景珍懼遣間使詣孝恭送款銑遣其齊王張繡攻之景珍謂繡曰前年醢彭越往年殺韓信卿豈不見之乎奈何今日相攻繡不答進兵圍之景珍潰圍而走為其麾下所殺銑以繡為尚書令繡恃勳驕慢專恣弄權銑又惡而殺之既大臣相次誅戮故人邊將皆疑懼多有叛者銑不能復制以故兵勢益弱四年高祖命趙郡王孝恭及李靖率巴蜀兵發自夔州沿流而下廬江王瑗從襄州道黔州刺史田世康趣辰州道黃州總管周法明趣夏口道以圖銑及大軍將至銑江州總管蓋彥舉以五州降又遣其將文士弘等率兵拒戰孝恭與李靖皆擊破之進逼其都初銑之放兵散也自留宿衞兵士數千人忽聞孝恭至而倉卒追兵並江嶺之南道里遼遠未能相及孝恭縱兵入郭布長圍以守之數日克其水城獲其舟船數千艘其交州總管丘和長史高士廉司馬杜之松等先來謁銑聞兵敗便詣李靖來降銑自度救兵不至謂其羣下曰天不祚梁數歸於滅若待力屈必害黎元豈以我一人致傷百姓及城未拔宜先出降冀免亂兵幸全眾庶諸人失我何患無君乃巡城號令守陴者皆慟哭銑以太牢告于其廟率官屬緦縗布幘而詣軍門曰當死者唯銑百姓非有罪也請無殺掠孝恭囚之送于京師銑降後數日江南救兵十餘萬一時大至知銑降皆送款於孝恭銑至高祖數其罪銑對曰隋失其鹿英雄競逐銑無天命故至於此亦猶田橫南面非負漢朝若以為罪甘從鼎鑊竟斬于都市年三十九銑自初起五年而滅杜伏威齊州章丘人也少落拓不治產業家貧無以自給每穿窬為盜與輔公祏為刎頸之交公祏姑家以牧羊為業公祏數攘羊以餽之姑有憾焉因發其盜事郡縣捕之急伏威與公祏遂俱亡命聚眾為羣盜時年十六常營護諸盜出則居前入則殿後故其黨咸服之共推為主大業九年率眾入長白山投賊帥左君行不被禮因捨去轉掠淮南自稱將軍時下邳有苗海潮亦聚眾為盜伏威使公祏謂曰今同苦隋政各興大義力分勢弱常恐見擒何不合以為強則不患隋軍相制若公能為主吾當敬從自揆不堪可來聽命不則一戰以決雄雌海潮懼即以其眾歸于伏威江都留守遣校尉宋顥率兵討之伏威與戰陽為奔北引入葭蘆中而從上風縱火迫其步騎陷于大澤火至皆燒死有海陵賊帥趙破陣聞伏威兵少而輕之遣使召伏威請與并力伏威令公祏嚴兵居外以待變親將十人持牛酒入謁破陣大悅引伏威入幕盡集其酋帥縱酒高會伏威於坐斬破陣而并其眾由此兵威稍盛復屠安宜煬帝遣右禦衞將軍陳稜以精兵八千討之稜不敢戰伏威遺稜婦人之服以激怒之并致書號為陳姥稜大怒悉兵而至伏威逆拒自出陣前挑戰稜部將射中其額伏威怒指之曰不殺汝我終不拔箭遂馳之稜部將走奔其陣伏威因入稜陣大呼衝擊所向披靡獲所射者使其拔箭然後斬之攜其首復入稜軍奮擊殺數十人稜陣大潰僅以身免乘勝破高郵縣引兵據歷陽自稱總管分遣諸將略屬縣所至輒下江淮間小盜爭來附之伏威嘗選敢死之士五千人號為上募寵之甚厚與同甘苦有攻戰輒令上募擊之及戰罷閱視有中在背便殺之以其退而被擊也所獲貲財皆以賞軍士有戰死者以其妻妾殉葬故人自為戰所向無敵宇文化及之反也署為歷陽太守伏威不受又移居丹陽進用人士大修器械薄賦斂除殉葬法其犯姦盜及官人貪濁者無輕重皆殺之仍上表於越王侗侗拜伏威為東道大總管封楚王太宗之圍王世充遣使招之伏威請降高祖遣使就拜東南道行臺尚書令江淮以南安撫大使上柱國封吳王賜姓李氏預宗正屬籍封其子德俊為山陽公賜帛五千段馬三百匹伏威遣其將軍陳正通徐紹宗率兵來會武德四年遣其將軍王雄誕討李子通於杭州擒之以獻又破汪華於歙州盡有江東淮南之地南接於嶺東至于海尋聞太宗平劉黑闥進攻徐圓朗伏威懼而來朝拜為太子太保仍兼行臺尚書令留于京師禮之甚厚位在齊王元吉之上以寵異之初輔公祏之反也詐稱伏威之令以紿其眾高祖遣趙郡王孝恭討之時伏威在長安暴卒及公祏平孝恭收得公祏反辭不曉其詐遽以奏聞乃除伏威名籍沒其妻子貞觀元年太宗知其冤赦之復其官爵葬以公禮輔公祏齊州臨濟人隋末從杜伏威為羣盜初伏威自稱總管以公祏為長史李子通之敗沈法興也伏威使公祏以精卒數千渡江討之子通率眾數萬以拒公祏兵鋒甚銳公祏簡甲士千人皆使執長刀仍令千餘人隨後令之曰有卻者斬公祏自領餘眾復居其後俄而子通方陣而前公祏所遣千人皆殊死決戰公祏乃縱左右翼攻之子通大潰降其眾數千人公祏尋與伏威遣使歸國拜為淮南道行臺尚書左僕射封舒國公初伏威與公祏少相愛狎公祏年長伏威每兄事之軍中咸呼為伯畏敬與伏威等伏威潛忌之為署其養子闞稜為左將軍王雄誕為右將軍推公祏為僕射外示尊崇而陰奪其兵權公祏知其意怏怏不平乃與故人左遊仙偽學道辟穀以遠其事武德五年伏威將入朝留公祏居守復令雄誕典兵以副公祏陰謂曰吾入京若不失職無令公祏為變其後左遊仙乃說公祏令反會雄誕屬疾於家公祏奪其兵詐言伏威不得還江南貽書令其起兵因僭即偽位自稱宋國於陳故都築宮以居焉署置百官以左遊仙為兵部尚書東南道大使越州總管大修兵甲轉漕糧饋時吳興賊帥沈法興據毗陵公祏擊破之又遣其將馮惠亮屯於博望山陳正通徐紹宗屯於青林山以拒官軍高祖命趙郡王孝恭率諸將奮擊大破之紹宗正通以五騎奔於丹陽公祏懼而遁走欲就左遊仙於會稽至武康為野人所執送於丹陽孝恭斬之傳首京師公祏與伏威同起至滅凡十三載江東悉平初伏威養壯士三十餘人為假子分領兵馬唯闞稜王雄誕知名闞稜齊州臨濟人善用大刀長一丈施兩刃名為拍刃每一舉輒斃數人前無當者及伏威據有江淮之地稜數有戰功署為左將軍伏威步兵皆出自羣賊類多放縱有相侵奪者稜必殺之雖親故無所捨令行禁止路不拾遺後從伏威入朝拜左領軍將軍遷越州都督及公祏僭號稜從軍討之與陳正通相遇陣方接稜脫兜鍪謂賊眾曰汝不識我邪何敢來戰其眾多稜舊之所部由是各無鬬志或有還拜者公祏之破稜功居多頗有自矜之色及擒公祏誣稜與己通謀又杜伏威王雄誕及稜家產在賊中者合從原放孝恭乃皆籍沒稜訴理之有忤於孝恭孝恭怒遂以謀反誅之王雄誕者曹州濟陰人初伏威之起也用其計屢有克獲署為驃騎將軍伏威後率眾渡淮與海陵賊李子通合後子通惡伏威雄武使騎襲之伏威被重創墮馬雄誕負之逃於葭蘆中伏威復招集餘黨攻劫郡縣隋將來整又擊破之亡失餘眾其部將西門君儀妻王氏勇決多力負伏威而走雄誕率麾下壯士十餘人衞護隋軍追至雄誕輒還禦之身被數槍勇氣彌厲竟脫伏威時闞稜年長於雄誕故軍中號稜為大將軍雄誕為小將軍後伏威令輔公祏擊李子通於江都使雄誕與稜為副戰于溧水子通大敗公祏乘勝追之卻為子通所破軍士皆堅壁不敢出雄誕謂公祏曰子通軍無營壘且狃於初勝而不設備若擊之必克公祏不從雄誕以其私屬數百人銜枚夜擊之因順風縱火子通大敗走渡太湖復破沈法興居其地高祖聞伏威據有吳楚遣使諭之雄誕率眾討之子通以精兵守獨松嶺雄誕遣其部將陳當率千餘人出其不意乘高據險多張旗幟夜則縛炬火於樹上布滿山澤間子通大懼燒營而走保於杭州雄誕追擊敗之擒子通於陣送于京師歙州首領汪華隋末據本郡稱王十餘年雄誕迴軍擊之華出新安洞口以拒雄誕甲兵甚銳雄誕伏精兵於山谷間率羸弱數千人當之戰纔合偽退歸本營華攻之不能克會日暮欲還雄誕伏兵已據其洞口華不得入窘急面縛而降蘇州賊帥聞人遂安據崑山縣而無所屬伏威又命雄誕攻之雄誕以崑山險隘難以力勝遂單騎詣其城下陳國威靈示以禍福遂安感悅率諸將出降以前後功授歙州總管封宜春郡公伏威之入朝也留輔公祏鎮江南而兵馬屬於雄誕公祏將為逆奪其兵拘之別室遣西門君儀諭以反計雄誕曰當今方太平吳王又在京輦國家威靈無遠不被公何得為族滅事耶雄誕有死而已不敢聞命公祏知不可屈遂縊殺之雄誕善撫恤將士皆得其死力每破城鎮約勒部下絲毫無犯故死之日江南士庶莫不為之流涕高祖嘉其節命其子果襲封宜春郡公太宗即位追贈左衞大將軍越州都督謚曰忠果垂拱初官至廣州都督安西大都護沈法興湖州武康人也父恪陳特進廣州刺史法興隋大業末為吳興郡守東陽賊帥樓世幹舉兵圍郡城煬帝令法興與太僕丞元祐討之俄而宇文化及弒煬帝於江都法興自以代居南土宗族數千家為遠近所服乃與祐部將孫士漢陳果仁執祐於坐號令遠近以誅化及為名發自東陽行收兵將趨江都下餘杭郡比至烏程精卒六萬毗陵郡通守路道德率兵拒之法興請與連和因會盟襲殺道德進據其城時齊郡賊帥樂伯通據丹陽為化及城守法興使果仁攻陷之於是據有江表十餘郡自署江南道總管復聞越王侗立乃上表於侗自稱大司馬錄尚書事天門公承制置百官以陳果仁為司徒孫士漢為司空蔣元超為尚書左僕射殷芊為尚書左丞徐令言為尚書右丞劉子翼為選部侍郎李百藥為府掾法興自克毗陵後謂江淮已南可指撝而定專立威刑將士有小過便即誅戮而言笑自若由是將士解體稱梁王建元曰延康改易隋官頗依陳氏故事是時杜伏威據歷陽陳稜據江都李子通據海陵並握強兵俱有窺覦江表之志法興三面受敵軍數挫衂陳稜尋被李子通圍於江都稜窘急送質求救法興使其子綸領兵數萬救之子通率眾攻綸大敗乘勝渡江陷其京口法興使蔣元超拒之於庱亭元超戰死法興與左右數百人投吳郡賊帥聞人遂安遣其將葉孝辯迎之法興至中路而悔欲殺孝辯更向會稽孝辯覺之法興懼乃赴江死初法興以義寧二年起兵至武德三年而滅李子通東海丞人也少貧賤以魚獵為事居鄉里見班白提挈者必代之性好施惠家無蓄積睚眦之怨必報隋大業末有賊帥左才相自號博山公據齊郡之長白山子通歸之以武力為才相所重有鄉人陷於賊者必全護之時諸賊皆殘忍唯子通獨行仁恕由是人多歸之未半歲兵至萬人才相稍忌之子通自引去因渡淮與杜伏威合尋為隋將來整所敗子通擁其餘衆奔海陵得眾二萬自稱將軍初宇文化及以隋將軍陳稜為江都太守子通率師擊之稜南求救於沈法興西乞師於杜伏威二人各以兵至伏威屯清流法興保楊子相去數十里間子通納言毛文深進計募江南人詐為法興之兵夜襲伏威伏威不悟恨法興之侵己又遣兵襲法興二人相疑莫敢先動子通遂得盡銳攻陷江都陳稜奔于伏威子通入據江都盡虜其眾因僭即皇帝位國稱吳建元為明政丹陽賊帥樂伯通率眾萬餘來降子通拜尚書左僕射更進擊法興於庱亭斬其僕射蔣元超法興棄城宵遁遂有晉陵之地獲法興府掾李百藥引為內史侍郎使典文翰以法興尚書左丞殷芊為太常卿使掌禮樂由是隋郡縣及江南人士多歸之後伏威遣輔公祏攻陷丹陽進屯溧水子通擊之反為公祏所敗又屬糧盡子通棄江都保于京口江西之地盡歸伏威子通又東走太湖鳩集亡散得二萬人襲沈法興於吳郡破之率其官屬都于餘杭東至會稽南至于嶺西距宣城北至太湖盡有其地未幾杜伏威遣其將王雄誕攻之大戰於蘇州子通敗績退保餘杭雄誕進逼之戰於城下軍復敗子通窮蹙請降伏威執之并其左僕射樂伯通送于京師盡收其地高祖不之罪賜宅一區公田五頃禮賜甚厚及伏威來朝子通謂伯通曰伏威既來東方未靜我所部兵多在江外往彼收之可有大功於天下矣遂相與亡至藍田關為吏所獲與伯通俱伏誅時又有朱粲林士弘張善安皆僭號於江淮之間朱粲者亳州城父人也初為縣佐史大業末從軍討長白山賊遂聚結為羣盜號可達寒賊自稱迦樓羅王眾至十餘萬引軍渡淮屠竟陵沔陽後轉掠山南郡縣不能守所至殺戮噍類無遺義寧中招慰使馬元規擊破之俄而收輯餘眾兵又大盛僭稱楚帝於冠軍建元為昌達攻陷鄧州有眾二十萬粲所克州縣皆發其藏粟以充食遷徙無常去輒焚餘貲毀城郭又不務稼穡以劫掠為業於是百姓大餒死者如積人多相食軍中罄竭無所虜掠乃取嬰兒蒸而噉之因令軍士曰食之美者寧過於人肉乎但令他國有人我何所慮即勒所部有略得婦人小兒皆烹之分給軍士乃稅諸城堡取小弱男女以益兵糧隋著作佐郎陸從典通事舍人顏愍楚因譴左遷並在南陽粲悉引之為賓客後遭飢餒合家為賊所噉又諸城懼稅皆相攜逃散顯州首領楊士林田瓚率兵以背粲諸州響應相聚而攻之大戰于淮源粲敗以數千兵奔于菊潭縣遣使請降高祖令假散騎常侍段確迎勞之確因醉侮粲曰聞卿噉人作何滋味粲曰若噉嗜酒之人正似糟藏猪肉確怒慢罵曰狂賊入朝後一頭奴耳更得噉人乎粲懼於坐收確及從者數十人奔于王世充拜為龍驤大將軍東都平獲之斬于洛水之上士庶嫉其殘忍競投瓦礫以擊其屍須臾封之若冢林士弘者饒州鄱陽人也大業十二年與其鄉人操師乞起為羣盜師乞自號元興王攻陷豫章郡而據之以士弘為大將軍隋遣持書侍御史劉子翊率師討之師乞中矢而死士弘代董其眾復與子翊大戰于彭蠡湖隋師敗績子翊死之士弘大振兵至十餘萬大業十三年徙據虔州自稱皇帝國號楚建元太平以其黨王戎為司空攻陷臨川廬陵南康宜春等諸郡北至九江南洎番禺悉有其地其黨張善安保南康郡懷貳於士弘以舟師循江而下擊破豫章士弘尚有南昌虔循潮數州之地及蕭銑破後散兵稍往歸之士弘復振荊州總管趙王孝恭遣使招慰之其循潮二州並來降武德五年士弘遣其弟鄱陽王藥師率兵二萬攻圍循州刺史楊略與戰大破之士弘懼而遁走潛保于安城之山洞王戎亦以南昌來降拜為南昌州刺史戎於是召士弘藏之于宅招誘舊兵更謀作亂其年洪州總管張善安密知其事發兵討之會士弘死部兵潰散戎為善安所虜張善安者兗州方與人也年十七便為劫盜轉掠淮南有眾百餘人會孟讓為王世充所破其散卒稍歸之得八百人襲破廬江郡因渡江附林士弘於豫章士弘不信之營於南塘上善安憾之襲擊士弘焚其郛郭而士弘後去豫章善安復來據之仍以其地歸國授洪州總管輔公祏之反也善安亦舉兵相應公祏以為西南道大行臺安撫使李大亮以兵擊之兩軍隔水而陣大亮諭以禍福答曰善安無背逆之心但為將士所誤今欲歸降又恐不免於死大亮謂曰張總管既有降心吾亦不相疑阻因獨身踰澗就之入其陣與善安握手交言示無猜意善安大善因許降將數十騎至大亮營大亮引之而入因令武士執之從者遁走既而送善安於長安稱不與公祏交通高祖初善遇之及公祏敗搜得其書與相往復遂誅之羅藝字子延本襄陽人也寓居京兆之雲陽父榮隋監門將軍藝性桀黠剛愎不仁勇於攻戰善射能弄矟大業時屢以軍功官至虎賁郎將煬帝令受右武衞大將軍李景節度督軍於北平藝少習戎旅分部嚴肅然任氣縱暴每凌侮於景頻為景所辱藝深銜之後遇天下大亂涿郡物殷阜加有伐遼器仗倉粟盈積又臨朔宮中多珍產屯兵數萬而諸賊競來侵掠留守官虎賁郎將趙什住賀蘭誼晉文衍等皆不能拒唯藝獨出戰前後破賊不可勝計威勢日重什住等頗忌藝藝陰知之將圖為亂乃宣言於眾曰吾輩討賊甚有功効城中倉庫山積制在留守之官而無心濟貧此豈存恤之意也以此言激怒其眾眾人皆怨既而旋師郡丞出城候藝藝因執之陳兵而入什住等懼皆來聽命於是發庫物以賜戰士開倉以賑窮乏境內咸悅殺渤海太守唐禕等不同己者數人威振邊朔柳城懷遠並歸附之藝黜柳城太守楊林甫改郡為營州以襄平太守鄧暠為總管藝自稱幽州總管宇文化及至山東遣使召藝藝曰我隋室舊臣感恩累葉大行顛覆實所痛心乃斬化及使者而為煬帝發喪大臨三日竇建德高開道亦遣使於藝藝謂官屬曰建德開道皆劇賊耳化及弒逆並不可從今唐公起兵皆符人望入據關右事無不成吾率眾歸之意已決矣有沮眾異議者必戮之會我使人張道源綏輯山東遣人諭意藝大悅武德三年奉表歸國詔封燕王賜姓李氏預宗正屬籍太宗之擊劉黑闥也藝領本兵數萬破黑闥弟什善於徐河俘斬八千人明年黑闥引突厥俱入寇藝復將兵與隱太子建成會於洺州因請入朝高祖遇之甚厚俄拜左翊衞大將軍藝自以功高位重無所降下太宗左右嘗至其營藝無故毆擊之高祖怒以屬吏久而乃釋待之如初時突厥屢為寇患以藝素有威名為北夷所憚令以本官領天節軍將鎮涇州太宗即位拜開府儀同三司而藝懼不自安遂於涇州詐言閱武因追兵矯稱奉密詔勒兵入朝率眾軍至于豳州治中趙慈皓不知藝反馳出謁之藝遂入據豳州太宗命吏部尚書長孫無忌右武候大將軍尉遲敬德率眾討藝王師未至慈皓與統軍楊岌潛謀擊之事洩藝執慈皓繫獄岌時在城外覺變遽勒兵攻之藝大潰棄妻子與數百騎奔於突厥至寧州界過烏氏驛從者漸散其左右斬藝傳首京師梟之于市復其本姓羅氏藝弟壽時為利州都督緣坐伏誅先是曹州女子李氏為五戒自言通於鬼物有病癩者就療多愈流聞四方病人自遠而至門多車騎高祖聞之詔赴京師因往來藝家謂藝妻孟氏曰妃骨相貴不可言必當母儀天下孟篤信之命密觀藝又曰妃之貴者由於王王貴色發矣十日間當昇大位孟氏由是遽勸反孟及李皆坐斬梁師都夏州朔方人也代為本郡豪族仕隋鷹揚郎將大業末罷歸屬盜賊羣起師都陰結徒黨數十人殺郡丞唐宗據郡反自稱大丞相北連突厥隋將張世隆擊之反為所敗師都因遣兵掠定雕陰弘化延安等郡於是僭即皇帝位稱梁國建元為永隆突厥始畢可汗遺以狼頭纛號為大度毗伽可汗師都乃引突厥居河南之地攻破鹽川郡武德二年高祖遣延州總管段德操督兵討之師都與突厥之眾數千騎來寇延安營於野猪嶺德操以眾寡不敵按甲以挫其銳後伺師都稍怠遣副總管梁禮率眾擊之德操以輕騎出其不意師都與禮酣戰久之德操多張旗幟奄至其後師都大潰逐北二百餘里虜男女二百餘口經數月師都又以步騎五千來寇德操擊之俘斬略盡及劉武周之敗師都大將張舉劉旻相次來降師都大懼遣其尚書陸季覽說處羅可汗曰比者中原喪亂分為數國勢均力弱所以北附突厥今武周既滅唐國益大師都甘從亡破亦恐次及可汗願可汗行魏孝文之事遣兵南侵師都請為鄉導處羅從之謀令莫賀咄設入自原州泥步設與師都入自延州處羅入自并州突利可汗與奚霫契丹靺鞨入自幽州合于竇建德經滏口道來會于晉絳兵臨發遇處羅死乃止高祖又令德操悉發邊兵進擊師都拔其東城師都退據西城又求救於突厥頡利可汗頡利以勁兵萬騎救援之時稽胡大帥劉仚成率眾降師都師都信讒殺之於是羣情疑懼多叛師都來降師都勢蹙乃往朝頡利為陳入寇之計自此頻致突厥之寇邊州略無寧歲頡利可汗之寇渭橋亦師都計也頡利政亂太宗知師都勢危援孤以書諭之不從遣夏州長史劉旻司馬劉蘭經略之有得其生口者輒縱遣令為反間離其君臣之計頻選輕騎踐其禾稼城中漸虛歸命者相繼皆善遇之由是益相猜阻有李正寶辛獠兒者皆其名將謀執師都事洩不果正寶竟來降貞觀二年太宗遣右衞大將軍柴紹殿中少監薛萬均討之又使劉旻劉蘭率勁卒直據朔方東城以逼之頡利可汗遣兵來援師都紹逆擊破之進屯城下師都兵勢日蹙其從父弟洛仁斬師都詣紹降拜洛仁為右驍衞將軍封朔方郡公師都自起至滅凡十二歲以其地為夏州時又有劉季真李子和屯據北邊與劉武周梁師都遞為表𩹉劉季真者離石胡人也父龍兒隋末擁兵數萬自號劉王以季真為太子龍兒為虎賁郎將梁德所斬其眾漸散及義師起季真與弟六兒復舉兵為盜引劉武周之眾攻陷石州季真北連突厥自稱突利可汗以六兒為拓定王甚為邊患時西河公張綸真鄉公李仲文俱以兵臨之季真懼而來降授石州總管賜姓李氏封彭城郡王季真見宋金剛與官軍相持於澮州久而未決遂復親武周與之合勢及金剛敗季真亡奔高滿政尋為所殺李子和者同州蒲城人也本姓郭氏大業末為左翊衞犯罪徙榆林見郡內大饑遂潛引敢死士得十八人攻郡門執郡丞王才數以不恤百姓斬之開倉以賑窮乏自稱永樂王建元為正平尊其父為太公以弟子政為尚書令子端子升為左右僕射有眾二千餘騎南連梁師都北附突厥始畢可汗並送子為質以自固始畢先署劉武周為定楊天子梁師都為解事天子又以子和為平楊天子子和固辭不敢當始畢乃更署子和為屋利設武德元年遣使歸款授榆林郡守尋就拜雲州總管封金河郡公二年進封郕國公時師都強暴子和慮為所攻尋勒兵襲師都寧朔城克之子和既絕師都又伺突厥間釁遣使以聞為處羅可汗候騎所獲處羅大怒囚其弟子升子和自以孤危甚懼四年拔戶口南徙詔以延州故城居之五年從太宗平劉黑闥陷陣有功高祖嘉其誠節賜姓李氏拜右武衞將軍貞觀元年賜實封三百戶十一年除婺州刺史改封夷國公顯慶元年累轉黔州都督以年老乞骸骨許之加金紫光祿大夫麟德九年卒史臣曰蕭銑聚烏合之眾當鹿走之時放兵以奪將權殺舊以求位定洎大軍奄至束手出降宜哉杜伏威恃勇聚徒見機歸國或致疑於高祖竟見雪於太宗輔公祏竊兵為叛王雄誕守節不回訓子孫以忠貞感士庶之流涕子通修仁馭眾終懷貳以伏誅羅藝歸國立功信妖言而為叛善始令終者鮮矣沈法興狂賊梁師都凶人皆至覆亡殊無改悔自隋朝維絕宇縣瓜分小則鼠竊狗偷大則鯨吞虎據大唐舉義兆庶歸仁高祖運應瑤圖太宗天資神武羣凶席卷寰海鏡清祚享永年功宣後代諡曰神堯文武豈不韙哉贊曰失政資盜圖王僭號真主勃興風驅電掃
