置其日夜半入陰陽度數及分以一象之度九十除之若以小象除之則兼除差度一度分一百六大分十三小分十四訖然以次象除之所得以少陽老陽少陰老陰為次命起少陽算外即其日夜半所入象度數及分也先以三十乘陰陽度分十九而一為度分乘又除為小分然以象度及分除之求朔望夜半月行入六爻度數置其日夜半所入象度數及分以一爻之度一十五除之所得命起其象初爻算外即以其日夜半所入爻度數及分也其月行入少象初爻之內皆為沾近黃道度當朔望則有虧蝕求入蝕限其入交定日及餘秒如望差已下交限已上者為入蝕限望入蝕限則月蝕朔入蝕限月在陰曆則日蝕入限如望差已下為交後交限已上者以減中日及餘為交前置交前後定日及餘秒通之為去交前後定分置去交定分以十一乘之如二千六百四十三除之為去交度數不盡以大衍通法乘之復除為餘大抵去交十三度以上雖入蝕限為涉交數微光影相接或不見蝕求月蝕分其去交定分七百七十九已下者皆蝕既已上者以交定分減望差餘以一百八十三約之盡半已下為半弱已上為半強命以十五為限得月蝕之大分求月蝕所起月在陰曆初起東南甚於正南復於西南月在陽曆初起東北甚於正北復於西北其蝕十二分已上者皆起於正東復於正西此皆據南方正午而論之若蝕於餘方者各隨方面所在准此取正而定其蝕起復也求月蝕用刻置月蝕之大分五已下因增三十已下因增四十已上因增五其去交定分五百二十已下又增半二百六十已下又增半各為汎用刻率定氣增損差差積定氣增損差差積冬至增十積初小寒增十五積十大寒增二十積二十五立春增二十五積四十五雨水增三十積七十驚蟄增三十五積一百春分增四十積一百三十五清明增四十五積一百七十五穀雨增五十積二百二十立夏增五十五積二百七十小滿增六十積三百二十五芒種增六十五積三百八十五夏至損六十五積四百五十小暑損六十積三百八十五大暑損五十五積三百二十五立秋損五十積二百七十處暑損四十五積二百二十白露損四十積一百七十五秋分損三十五積一百三十五寒露損三十積一百霜降損二十五積七十立冬損二十積四十五小雪損十五積二十五大雪損十積十求每日差積定數以所入氣并後氣增損差倍六爻乘之綜兩氣辰數除之為氣末率又列二氣增損差皆倍六爻乘之各如辰數而一少減多餘為氣差加減末率冬至後以差減夏至後以差加為初率倍氣差亦倍六爻乘之復綜兩氣辰數以除之為日差半之以加減初末各為定率以日差累加減氣初定率冬至後以差加夏至後以差減為每日增損差乃循積之隨所入氣日加減氣下差積各其日定數其二至之前一氣皆後無同差不可相并各因前末為初率以氣差冬至前減夏至前加為末率餘依算術各得所求也陰曆蝕差一千二百七十五蝕限二千五百二十四或限三千六百五十九陽曆蝕限一百三十五或限九百七十四求蝕差及諸限定數各置其差限以蝕朔所入氣日下差積陰曆減之陽曆加之各為蝕定差及定限求陰曆陽曆的蝕或蝕其陰曆去交定分滿蝕定差已上為陰曆蝕不滿者雖在陰曆皆類同陽曆蝕也其去交定分滿蝕定限已下者其蝕的見或限以下者其蝕或見或不見求日蝕分陰曆蝕者置去交定分以蝕定差減之餘一百四已下者皆蝕既已上者以一百四減之其餘以一百四十三約之其入或限者以一百五十二約之半已下為半弱半已上為半強以減十五餘為日蝕之大分其同陽曆蝕者但去交定分少於蝕定差六十已下者皆蝕既六十已上者置去交定分以陽曆蝕定限加之以九十約之其陽曆蝕者直置去交定分亦以九十約之其入或限者以一百四十三約之半已下為半弱半已上為半強命以十五為限亦得日蝕之大分求日蝕所起月在陰曆初起西北甚於正北復於東北月在陽曆初起西南甚於正南復於東南其蝕十二分已上皆起正西復於正東此亦據南方正午而論之求日蝕用刻置所蝕之大分皆因增二其陰曆去交定分多於蝕定差七十已上者又增三十五已下者又增半其同陽曆去交定分少於蝕定差二十已下者又增半四十已下者又增半少各為汎月刻半率求日月蝕甚所在辰置去交定分以交率乘之二十乘交數除之所得為差其月道與黃道同名者以差加朔望定小餘異名以差減朔望定小餘置蝕定餘如求發斂加時術入之即蝕甚所在辰刻及分也其望甚辰月當衝蝕求虧初復末置日月蝕汎用刻率副之以乘其日入轉損益率如大衍通法而一所得應朒者依其損益應朓者損加益減其副為定用刻數半之以減蝕甚辰刻為虧初以加蝕甚辰刻為復末其月蝕求入更籌者置月蝕定用刻數以其日每更差刻除為更數不盡以每籌差刻除為籌數綜之為定用更籌乃累計日入至蝕甚辰刻置之以昏刻加日入辰刻減之餘以更籌差刻除之所得命以初更籌外即蝕甚籌半定用更籌減之為虧初以加之為復末按天竺僧俱摩羅所傳斷日蝕法其蝕朔日度躔於鬱車宮者的蝕諸斷不得其蝕據日所在之宮有火星在前三後一之宮并伏在日下並不蝕若五星總出并水見又水在陰曆及三星已上同聚一宿亦不蝕凡星與日別宮或別宿則易斷若同宿則難斷更有諸斷理多煩碎略陳梗概不復具詳者其天竺所云十二宮則中國之十二次也曰鬱車宮者即中國降婁之次也十二次宿度首尾具載曆儀分野卷中也求九服所在蝕差先測所在冬夏至及春分定日中晷長短陽城每日中晷常數校取同者各因其日蝕差即為所在冬夏至及春秋分定日蝕差求九服所在每氣蝕差以夏至差減春分差以春分差減冬至差各為率并二率半