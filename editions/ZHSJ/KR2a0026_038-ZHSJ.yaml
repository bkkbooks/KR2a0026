body:
  text: 舊唐書卷三十四志第十四曆三開元大衍曆經演紀上元閼逢困敦之歲距今開元十二年甲子歲歲積九千六百六十六萬一千七百四十算大衍步中朔第一大衍通法三千四十策實一百一十一萬三百四十三揲法八萬九千七百七十三滅法九萬一千三百策餘一萬五千九百四十三用差一萬七千一百二十四掛限八萬七千一十八三元之策一十五餘六百六十四秒七四象之策二十九餘一千六百一十三中盈分一千三百二十八秒十四爻數六十象統二十四推天正中氣以策實乘入元距所求積算命曰中積分盈大衍通法得一為積日不盈者為小餘爻數去積日不盡日為大餘數從甲子起算外即所求年天正中氣冬至日及小餘也求次氣因天正中氣大小餘以三元之策及餘秒加之其秒盈象統從小餘小餘滿大衍通法從大餘大餘滿爻數去之命如前即次氣恆日及餘秒凡率相因加者下有餘秒皆以類相從而滿其法則迭進之用加上位日盈爻數去之也推天正合朔以揲法去中積分其所不盡曰歸餘之卦以減中積分餘為朔積分迺如大衍通法而一為日不盡為小餘日盈爻數去之不盈者為大餘命以甲子算外即所求年天正合朔經日及小餘也求次朔及弦望因天正經朔大小餘以四象之策及餘加之數除如法即次朔經日及餘也又自經朔加一象之日七及餘一千一百六十三少得上弦倍之得望參之得下弦四之是謂一揲復得後月之朔凡四分一為少二為半三為太四為全加滿其前數去之從上位綜中朔盈虛分累益歸餘之卦每其月閏衰凡歸餘之卦五萬六千七百六十以上其歲有閏因考其閏衰滿卦限以上其月及合置閏或有進退皆以定朔無中氣裁焉推沒日置有沒之氣恆小餘以象統乘之內秒分參而伍之以減策實餘滿策餘為日不滿為沒餘命起也凡恆氣小餘不滿大衍通法如中盈分半法已下為有沒之氣推滅日以有滅之朔經小餘減大衍通法餘倍參伍乘之用減滅法餘滿朔虛分為日不滿為滅餘命起經朔初日算外即合朔後滅日也凡經朔小餘不滿朔虛分者為有滅之朔大衍步發斂術第二天中之策五餘二百二十二秒三十一秒法七十二地中之策十八餘一百六十五秒八十六秒法一百二十貞晦之策三餘一百三十二秒一百三秒法如前辰法七百六十刻法三百四推七十二候各因中節大小餘命之即初候日也以天中之策及餘秒加之數除如法即次候日又加得末候日凡發斂皆以恆氣推六十卦各因中氣大小餘命之公卦用事日也以地之策及餘秒累加之數除如法各次卦用事日若以貞晦之策加諸候卦得十二節之初外卦用事日推五行用事各因四立大小餘命之即春木夏火秋金冬水首用事日也以貞晦之策及餘秒減四季中氣大小餘即其月土始用事日凡抽加減而有秒者母若不齊當令母互乘子乃加減之母相乘為法恆氣月中節初候次候末候始卦中卦終卦四正卦冬至十一月中蚯蚓結麋角解水泉動公中孚辟復侯屯內坎初六卦小寒十二月節雁北鄉鵲始巢野雞始雊侯屯外大夫謙卿睽坎九二卦大寒十二月中雞始乳鷙鳥厲疾水澤腹堅公升辟臨侯小過內坎六三卦立春正月節東風解凍蟄蟲始振魚上冰侯小過外大夫蒙卿益次六四卦雨水正月中獺祭魚鴻鴈來草木萌動公漸辟泰侯需內坎九五卦驚蟄二月節桃始華倉庚鳴鷹化為鳩侯需外大夫隨卿晉坎上六卦春分二月中玄鳥至雷乃發聲始電公解辟大壯侯豫內震初九卦虹始見清明三月節桐始華田鼠化為鴽侯豫外大夫訟卿蠱震六二卦戴勝降桑穀雨三月中萍始生鳴鳩拂羽公革辟夬侯旅內震六三卦王瓜生立夏四月節螻蟈鳴蚯蚓出侯旅外大夫師卿比震九四卦小暑至小滿四月中苦菜秀靡草生公小畜辟乾侯大有內震六五卦反舌無聲芒種五月節螳螂生鵙始鳴侯大有外大夫家人卿井震上六卦半夏生夏至五月中鹿角解蜩始鳴公咸辟姤侯鼎內離初九卦小暑六月節溫風至蟋蟀居壁鷹乃學習侯鼎外大夫豐卿渙離六二卦大暑六月中腐草為螢土潤溽暑大雨時行公履辟遯侯恆內離九三卦立秋七月節涼風至白露降寒蟬鳴侯恆外大夫節卿同人離九四卦處暑七月中鷹祭鳥天地始肅禾乃秀公損辟否侯巽內離六五卦白露八月節鴻鴈來玄鳥歸羣鳥養羞侯巽外大夫萃卿大畜離上九卦秋分八月中雷乃收聲蟄蟲坯戶水始涸公賁辟觀侯歸妹內兌初九卦寒露九月節鴻鴈來賓雀入大水為蛤菊有黃花侯歸妹外大夫妄卿明夷兌九二卦霜降九月中豺乃祭獸草木黃落蟄蟲咸俯公困辟剝侯艮內兌六五卦立冬十月節水始冰地始凍野雞入大水為蜃侯艮外大夫既濟卿噬嗑兌九四卦小雪十月中虹藏不見天氣上騰地氣下降閉塞成冬公大過辟坤侯未濟內兌九五卦大雪十一月節鶡鳥不鳴虎始交荔挺出侯未濟外大夫蹇卿頤兌上六卦推發斂去朔各置其月閏衰以大衍通法約之為日不盡為餘即其月中氣去經朔日算及餘秒也求卦候者各以天地之策及餘秒累加減之中氣之前以減中氣之後以加得去經朔日算及餘秒推發斂加時各置其小餘以六爻乘之如辰法而一為半辰之數不盡者五之三刻法除之為刻又不盡者三約為分此分滿刻法為刻若今滿象積為刻者即置不盡之數十之十九而一為分命辰起子半算外各其加時所在辰刻及分也大衍步日躔術第三乾實一百一十一萬三百七十九太周天度三百六十五虛分七百七十九太歲差三十六太定氣辰數盈縮分前後數損益率朓朒積冬至一百七十三三盈二千三百五十三先端益一百七十八朒初分小寒一百七十五三盈一千八百四十五先二千三百五十三益一百三十八朒一百七十六分大寒一百七十七一盈一千三百九十先四千一百九十八益一百四朒三百一十四分立春一百七十八八盈九百七十六先五千五百八十八益七十三朒四百一十八分雨水一百八十三盈五百八十八先六千五百六十四益四十四朒四百九十一分驚蟄一百八十一八盈二百一十四先一千一百五十二益十六朒五百三十五分春分一百八十三五分縮二百一十四先七千三百六十六損十六朒五百五十一清明一百八十四九分縮五百八十八先七千一百五十二損四十四朒五百四十五穀雨一百八十六五分縮九百七十六先六千五百六十四損七十三朒四百九十一立夏一百八十八一分縮一千三百九十先五千五百八十八損一百四朒四百十八小滿一百八十九九分縮一千八百四十五先四千一百九十八損一百三十八朒三百十四芒種一百九十一九分縮一千三百五十二先二千三百五十三損一百七十六朒一百七十六夏至一百九十一九分縮二千三百五十三後端益一百七十六朓初小暑一百八十九九分縮一千八百四十五後二千三百五十三益一百三十八朓一百七十六大暑一百八十八一分縮一千三百九十後四千一百九十八益一百四朓三百一十四立秋一百八十六五分縮九百七十六後五千五百八十八益七十三朓四百一十八處暑一百八十四九分縮五百八十八後六千五百六十四益四十四朓四百九十一白露一百八十三五分縮二百一十四後七千一百五十二益十六朓五百三十五秋分一百八十一八分盈二百一十四後七千三百六十六損十六朓五百五十一寒露一百八十三分盈五百八十八後七千一百五十二損四十四朓五百四十五霜降一百七十八八分盈九百七十六後六千五百六十四損七十三朓四百九十一立冬一百七十七一分盈一千三百九十後五千五百八十八損一百四朓四百一十八小雪一百七十五三分盈一千八百四十五後四千一百九十八損一百三十八朓三百一十四大雪一百七十三三分盈一千八百五十三後二千三百五十三損一百七十六朓一百七十六求每日先後定數以所入氣并後氣盈縮分倍六爻乘之綜兩氣辰餘除入之為末率又列二氣盈縮分皆倍六爻乘之各加辰數而一以少減多餘為氣差加減末率至後以差加分後以差減為初率倍氣差亦六爻乘之復綜兩氣辰數以除之為日差半之以加減初末各為定率以日差累加減氣初定率至後以差減分後以差加為每日盈縮分迺馴積之隨所入氣日加減氣下先後數各其日定冬至後為陽復在盈加之在縮減之夏至後為陰復在縮加之在盈減之距四正前一氣在陰陽變革之際不可相并皆因前末為初率以氣差至前加之分前減之為末率餘依前率各得所求其朓朒亦放此求之各得每日定數其分不滿全數母又每氣不同當退法除之用百為母半已上從一已下棄之下求軌漏餘分不滿准此推二十四氣定日冬夏至皆在天地之中無有盈縮餘各以氣下先後數先減後加恆氣小餘滿若不足進退其日命從甲子算外各其定日及餘秒也凡推日月行度及軌漏交蝕竝依定氣若注曆即依恆氣也推平朔四象以定氣相距置朔弦望經日大小餘以所入定氣大小餘及秒分減之各其所入定氣日算及餘秒也若大餘少不足減者加爻數然後減之其弦望小餘有少半太當以爻乘之乃以氣秒分減退一加象統小餘不足減退日算一加大衍通法也求朔弦望經日入朓朒各置其所入定氣日算及餘秒減日算一各以日差乘而半之以加減其氣初定率前少加之前多減之以乘其所入定氣日算及餘秒凡除者先以母通全內子乃相乘母相乘除之也若忽微之數煩多而不甚相校者過半收為全不盈半法棄之所得以損益朓朒積各為其日所入朓朒定數若非朔望有交者以十二乘所入日算三其小餘辰法除而從之以乘損益率如定氣辰數而一所得以損益朓朒積各為定數也赤道宿度斗二十六牛八女十二虛十及分危十七室十六壁九右北方七宿九十八度虛分七百七十九太奎十六婁十二胃十四昴十一畢十七觜一參十右西北七宿八十一度井三十三鬼三柳十五星七張十八翼十八軫十七右南方七宿一百一十一度角十二亢九氐十五房五心五尾十八箕十一右東方七宿七十五度前皆赤道度其畢觜參及輿鬼四宿度數與古不同今從依天以儀測定用為常數紘帶天中儀極攸憑以格黃道也推黃道准冬至歲差所在每距冬至前後各五度為限初數十二每限減一盡九限數終於四殷二立之際一度少強依平乃距春分前秋分後初限起四每限增一盡九限終於十二而黃道交復計春分後秋分前亦五度為限初數十二盡九限數終於四殷二立之際一度少強依平乃距夏至前後初限起四盡九限終於十二皆累裁之以數乘限度百二十而一得度不滿者十二除為分若以十除則大分十二為母命以太半少及強弱命曰黃赤道差數二至前後各九限以差減赤道度為黃道度二分前後各九限以差加赤道度為黃道度若從黃道度反推赤道二至前後各加之二分前後須減之黃道宿度斗二十三半牛七半女十一少虛十反差危十七太室十七少壁九太右北方九十七度六虛之差十九太奎十七半婁十二太胃十四太昴十一畢十六少觜一參九少右西方八十二度半井三十鬼二太柳十四少星六太張十八太翼十九少軫十八太右南方一百一十度半角十三亢九半氐十五太房五心四太尾十七箕十少右東方七十五度少前皆黃道度其步日行月與五星出入循此求此宿度皆有餘分前後輩之成少半太准為全度若上考古下驗將來當據歲差每移一度各依術算使得當時宿度及分然可步日月五星知其犯守也推日度以乾實去中積分不盡者盈大衍通法為度不滿為度餘命起赤道虛九去分不滿宿算外即所求年天正冬至加時日所在度及餘也以三元之策累加之命宿次如前各得氣初日加時赤道宿度求黃道日度以度餘減大衍通法餘以冬至日躔之宿距度所入限乘之為距前分置距度下黃赤道差以大衍通法乘之減去距前分餘滿百二十除為定差不滿者以象統乘之復除為秒分乃以定差及秒減赤道宿度餘依前命之即天正冬至加時所在黃道宿度及餘也求次定氣置歲差以限數乘之滿百二十除為秒分不盡為小分以加於三元之策秒分因累而裁之命以黃道宿次去之各得定氣加時日躔所在宿及餘也求定氣初日夜半日所在度各置其氣定小餘副之以乘其日盈縮分滿大衍通法而一盈加縮減其副用減其日時度餘命如前各其日夜半日躔行在求次日各因定氣初日夜半度累加一策乃以其日盈縮分盈加縮減度餘命以宿次即半日所在度及餘也大衍步月離術第四轉終分六百七十萬一千二百七十九轉終日二十七餘一千六百八十五秒七十九轉法七十六轉秒法八十推天正經朔入轉以轉終分去朔積分不盡以秒法乘盈轉終分又去之餘如秒法一而入轉分不盡為秒入轉分滿大衍通法為日不滿為餘命日算外即所求年天正經朔加時入轉日及餘秒求次朔入轉因天正所入轉差日一轉餘二千九百六十七秒分一盈轉終日餘秒者去之數除如前即次日經朔加時所入考上下弦望如求經朔四象術循變相加若以經朔望小餘減之各其日夜半所入轉日及餘秒終日轉分列衰轉積度損益率朓朒積一日九百一十七進十三度初益二百九十七朓初二日九百三十進十三十二度五益二百五十九朓二百九十七三日九百四十三進十三二十四度二十益二百二十朓五百五十六五四日九百五十六進十四三十六度五十益一百八十朓七百七十六四五日九百七十進十四四十九度二十益一百三十九朒九百五十六二六日九百八十四進十六六十二度四益九十七朒一千九十五七日一千進十八七十五度生初益四十八朒一千一百九十二損末六八日一千一十八進十九八十八度十損六十四朒一千二百三十四二九日一千三十七進十四一百一度四十損一百六朒一千一百七十二十日一千五十一進十四一百十五度十損一百四十八肭一千六十四五十一日一千六十五進十四一百二十九度二損一百八十八朒九百十六十二日一千七十九進十三一百四十二度三損一百二十九朒七百二十七十三日一千九十二進十三一百五十七度十損一百六十七朒四百九十八八十四日一千一百五十進十一百七十一度四十初損二百四十一朒二百三十一退三六末益六十六十五日一千一百一十二退十三一百八十度十益二百八十九朓六十六一十六日一千九十九退十三二百度五十益二百五十朓二百五十五九十七日一千八十六退十三二百一十五度十益二百一十一朓六百五八十八日一千七十三退十四二百二十九度四益一百七十二朓八百一十六十十九日一千五十九退十四二百四十三度四十益一百三十朓九百八十七九二十日一千四十五退十七二百五十七度四十益八十七朓一千一百一十七四二十一日一千二十八退十八一百七十一度二十初益三十六朓一千二百四五末損一十八二十二日一千一十退十八二百八十四度六十損七十三朓一千二百二十三五二十三日九百九十二退十四二百九十八度十損一百一十六朓一千一百四十九一二十四日九百七十八退十四三百一十一度十損一百五十七朓一千三十三五二十五日九百六十四退十四三百二十四度十損一百九十八朓八百七十六五二十六日九百五十退十三三百三十六度五十損二百三十七朓六百七十八七二十七日九百三十七退十三三百三十九度十損二百七十六朓四百四十一九二十八日九百二十四退七三百六十一度四十初損一百六十五朒一百六十五進六四末益入後求朔弦望入朓朒定數各朔其所入日損益而半之為通率又二率相減為率差前多者以入餘減大衍通法餘乘率差盈大衍通法得一并率差而半之前少者半入餘乘率差亦以大衍通法除之為加時轉率乃半之以損益加時所入餘為轉餘其轉餘應益者減法應損者因餘皆以乘率差盈大衍通法得一加於通率轉率乘之大衍通法約之以朓減朒加轉率為定率乃以定率損益朓朒積為定數其後無同率者亦因前率益者以通率為初數半率差而減之應通率其損益入餘進退日者分為二日隨餘初末如法求之所得並以損益轉率此術本出皇極曆以究算術之微變若非朔望有交者直以入餘乘損益如大衍通法而一以損益朓朒為定數各得所求七日初二千七百一約為大分八末三百三十九約為大分一十四日初二千三百六十三約為大分七末六百七十七約為大分二二十一日初二千二十四約為大分六末一千一十六約為大分三二十八日初一千六百八十六約為大分五末一千三百五十四約為大分四右以四象約轉終日及餘均得六日二千七百一分就全數約為大分是為之八分以減法餘為末數乃四象馴變相加各其所當之日初末數也視入轉餘如初數以下者加減損益因循前率如初數以上則反其衰歸于後率云求朔弦望定日及餘以入氣入轉朓朒定數同名相從異名相消乃以朓減朒加四象經小餘滿若不足進大餘命以甲子算外各其定日及小餘干名與後朔叶同者月大不同者小無中氣者為閏月凡言夜半者皆起晨前子正之中若注曆觀弦望定小餘不盈晨初餘數者退一日其望小餘雖滿此數若有交蝕虧初起在晨初已前者亦如之又月行九道遲疾則三大二小以日行盈縮累增損之則容有四大三小理數然也若俯循常儀當察加時早晚隨其所近而進退之使不過三小其正月朔若有交加時正見者消息前後一兩月以定大小令虧在晦二推定朔弦望夜半日所在度各隨定氣次日以所直日度及餘分命焉若以五星相加減者以四約度餘乃列朔弦望小餘副之以乘其日盈縮分如大衍通法而一盈加縮減其副以加其日夜半度餘命如前各其日加時日躔所次推月九道度凡合朔所交冬在陰曆夏在陽曆月行青道冬夏至後青道半交在春分之宿殷黃道東立冬夏後青道半交在立春之宿殷黃道東南至所衝之宿亦如之也冬在陽曆夏在陰曆月行白道冬至夏至後白道半交在秋分之宿殷黃道西立北至所衝之宿亦如之也春在陽曆秋在陰曆月行朱道春秋分後朱道半交在夏至之宿殷黃道南立春立秋後朱道半交在立夏之宿殷黃道西南至所衝之宿亦如之也春在陰曆秋在陽曆月行黑道春秋分後黑道半交在冬至之宿殷黃道北立春立秋後黑道半交在立冬之宿殷黃道東北所衝之宿亦如之也四序離為八節至陰陽之始交皆以黃道相會故月有九行各視月交所入七十二候距交初黃道日每五度為限交初交中同亦初數十二每限減一數終於四乃一度強依平更從四起每限增一終於十二而至半交其去黃道六度又自十二每限減一數終於四亦一度強依平更從四起每限增一終於十二復與日軌相會各累計其數以乘限度二百四十而一得度不滿者二十四除為分若以二十除之則大分十二為母命以半太及強弱也為月行與黃道差數距半交前後各九限以差數為減距正交前後各九限以差數為加此加減是出入六度單與黃道相交之數也若交赤道則隨氣遷變不恆計去冬至夏至以來候數乘黃道所差十八而一為月行與赤道差數凡日以赤道內為陰赤道外為陽月以黃道內為陰黃道外為陽故月行宿度入春分交後行陰曆秋分交後行陽曆皆為同名若入春分交後行陽曆秋分交後行陰曆皆為異名其在同名以差數為加者加之減者減之若在異名以差數為加者減之減者加之皆以增損黃道度為九道定度推月九道平交入氣各以其月恆中氣去經朔日算及餘秒加其月經朔加時入交汎日及餘秒乃以減交終日及餘秒其餘即各平交入其月恆中氣日算及餘秒也滿三元之策及餘秒則去之其餘即平交入後月恆節氣日算及餘秒因求次交者以交終日及餘秒加之滿三元之策及餘秒去之不滿者為平交入其氣日算及餘秒各以其氣初先後數先加後減其入餘滿若不足進退日算即平交入定氣日算及餘秒也求平交入氣朓朒定數置所入定氣日算倍六爻乘之三其小餘辰法除而從之以乘其氣損益率如定氣辰數而一所得以損益其氣朓朒積為定數也求平交入轉朓朒定數置所入定氣餘加其日夜半入轉餘以乘其日損益率滿大衍通法而一所得以損益其日朓朒積乃以交率乘之交數而一為定數求正交入氣置平交入氣及入轉朓朒定數同名相從異外相消乃以朓減朒加平交入氣餘滿若不足進退日算即為正交入定氣日算及餘也求正交加時黃道宿度置正交入定氣餘副之乘其日盈縮分滿大衍通法而一所得以盈加縮減其副以加其日夜半日度即正交加時所在黃度及餘也求正交加時月離九道宿度以正交加時度餘減大衍通法餘以正交之宿距度所入限數乘之為距前分置距度下月道與黃道差以大衍通法乘之減去距前分餘滿二百四十除為定差不滿者一退為秒以定差及秒加黃道度餘仍計去冬至夏至以來候數乘定差十八而一所得依名同異而加減之滿若不足進退其度命如前即正交加時月離所在九道宿度及餘也推定朔弦望加時月所在度各置其日加時日躔所在變從九道循次相加凡合朔加時月行潛在日下與太陽同度是為離象凡置朔弦望加時黃道日度以正交加時所在黃道宿度減之餘以加其正交九道宿度命起正交宿度算外即朔弦望加時所當九道宿度也其合朔加時若非正交則日在黃道月在九道各入宿度雖多少不同考其去極若應準繩故云月行潛在日下與太陽同度以一象之度九十一餘九百五十四秒二十二半為上弦兌象倍之而與日衝得望坎象參之得下弦震象各以加其所當九道宿度秒盈象統從餘餘滿大衍通法從度命如前各其日加時月所在度及餘秒也綜五位成數四十以約度餘為分不盡者因為小分也推定朔夜半入轉恆視經朔夜半所入若定朔大餘有進退者亦加減轉日否則因經朔為定徑求次定朔夜半入轉因前定朔夜半所入大月加轉差日二小月加日一轉餘皆一千三百五十四秒分一數除如前即次月定朔夜半所入求次日累加一日去命如各其夜半所入轉日及餘秒求每日月轉定度各以夜半入轉餘乘列衰如大衍通法而一所得以進加退減其日轉分為月每所轉定分滿轉法為度也求朔弦望定日前夜半月所在度各半列衰減轉分退者定餘乘衰以大衍通法除并衰而半之進者半定餘乘衰定以大衍通法除皆加所減乃以定餘乘之盈大衍通法得一以減加時月度及分因夜半准此求轉分以加之亦得加時月度若非朔望有交直以定小餘乘所入日轉交分如大衍通法而一以減其日時月度亦得所求求次日夜半月度各以其日轉定分加之分滿轉法從度命如前即次日夜半月所在度及分推月晨昏度各以所入轉定分乘其日夜漏倍百刻除為晨分以減轉定分餘為昏分分滿轉法從度以加夜半度望前以昏加望後以晨加各得其日晨昏月所在度及分大衍步軌漏第五爻統一千五百二十象積四百八十辰刻八刻分一百六十昏明刻各二刻分二百四十定氣陟降率消息衰陽