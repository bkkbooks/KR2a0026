爻初定率少象以差減老象以差加為每損益率循累其率隨所入爻損益其下進退即各得其算定其四象初爻無初率上爻無末率皆置本爻損益四而九之二百七十四而一各以初末率減之皆互得其率餘依術算各得所求求平合入進退定數各置其星平合所入爻之算差半之以減其所入算損益率損者以所入餘乘限差辰法除并差而半之益者半入餘乘差亦辰法除加所減之率乃以入餘乘之辰法而一所得以損益其算下進退各為平合所入進退定數此法微密用算稍繁若從省求之亦可置其所入算餘以乘其下損益率如辰法而一所得以損益其算下進退各為定數求常合置平合所入進退定數金星則倍置之各以合下乘數乘之除數除之所得滿辰法為日不滿為餘以進加退減平合日算及餘秒先以四約平合餘然以進加退減也即為冬至夜半後常合日算及餘也求定合置常合日先後定數四而一所得滿辰法為日不滿為餘乃以先減後加常合算及餘即為冬至夜半後定合日算及餘也求定合度置其日盈縮分四而一以定合餘乘之滿辰法而一所得以盈加縮減其定餘以加其日夜半日度餘先四約夜半日度餘以加之滿辰法從度依前命之算外即為定合加時度及餘也求定合月日置冬至夜半後定合日算及餘秒以天正冬至大小餘加之天正經朔大小餘減之其至朔小餘皆以四約之然用加減若至大餘少於經朔大餘者又以爻數加之然以經朔大小餘減之其餘滿四象之策及餘除之為月數不盡者為入朔日算及餘命月數起天正日算起經朔算外即定所在日月也其定朔大餘有進退進減退加一日為在其日月定及餘也求定合入爻置常合及定合應加減定數同名相從異名相消乃以加減其平合入爻算餘滿若不足進退其算即為定合入爻算數及餘也求變行初日入爻置定合入爻算數及餘以合後伏下變行度常率加之滿爻率去之命爻次如前即次變初日入爻算數及餘也更求次變入爻變入但以其下行度常加之去命如上節求變行初日入進退定數各置其變行初日入爻算數及餘如平合求進退術入之即得變行初日所入進退定數也置進退定數各以其下乘數乘之除數除之所得各為進退變率星名變行目變行日中率變行度中率差行損益率變行度常率變行乘數變行除數歲星合後伏十七日三百三行三度三百三先遲二日行一度三百五乘數三百五十十二十三益疾九分十七除數二百八十前順一百一十日行一十八度六十先疾五日行九度三百五乘數三百一十五益遲六分十七除數二百八十一前留二十七日行二度二百乘數二百六十七二十除數一百二十二前退四十三日退五度三百六先疾六日行三度四百七乘數四百七十十九益疾十一分十五除數四百三後退四十三日退五度三百六先疾六日行三度四百七乘數五百一十十九益遲十一分十五除數四百六十七後留二十七日行三度二百乘數二百七十一十除數四百六十七後順一百一十二日行一十八度六十先遲五日行九度三百三乘數二百六十七五益疾六分十七除數二百二十七合前伏十七日行三度三百三先疾二日行一度三百五乘數三百五十十三益遲九分十八除數二百八十熒惑合後伏七十一日七百二行五十四度七百三先疾五日行三十八度二百乘數一百二十七十五十五益遲七分一除數三十前疾二百一十四日行一百三十六度先疾九日行一百一十三度五百九乘數一百三十益遲四分十六除數三十一前遲六十日行二十五度先疾日行三十一日六百八乘數三百三十益遲四分十五除數五十四前留一十三日行六度六百九乘數二百三十三除數五十四前退三十一日退八度四百七先遲六日行一十六度三百六乘數二百三十二益疾五日十七除數四十八後退三十一日退八度四百七先疾六日行一十六度二百六乘數二百三十三益遲五分十七除數四十八後留一十三日行六度六百九乘數二百三十三除數四十八後遲六十日行二十五度先遲日行三十一度六百八乘數二百三益疾四分十五除數五十四後疾二百一十四日行三十六度先遲九日行一百一十三度五百九十益疾四分六合前伏七十一日七百三行五十四度七百三先遲五日乘數一百二十七十六十六益疾七分二百二除數三十鎮星合後伏十八日四百一行一度四百一先遲一日行度空四百乘數十二十五十五益疾九分八十除數十一前順八十三日行七度二百四先遲二日行二度六百二乘數十三十二益遲五分十三除數十一前留三十七日三百行一度二百乘數十八十八除數九前退五十日退二度二百先遲七日行一度五百三乘數二十三十四益疾一分十一除數十七後退五十日退二度三百三先疾七日行一度五百三乘數五十四益遲一分十一除數四後留三十七日三百行一度二百乘數二十八十八除數一十七後順八十三日行七度二百三先遲六日行二度六百二乘數十十一益疾五分十三除數九合前伏十八日四百一行一度四百一先疾二日行度空四百乘數十二十五十五益遲九分八十除數十一太白晨合後四十一日七百一行五十二度七百一先遲三日行三十一度七百一乘數七百九十七伏十九十九益疾十六分十九除數二百九夕疾行一百七十一日行二百六十度先疾五日行一百七十一度乘數七百九十一益遲九分除數二百九夕平行十二日行一十二度乘數五百一十五除數一百三十七夕遲行四十二日行三十一度先疾日行四十三度乘數五百一十五益遲十分除數一百三十一夕留八日行八度乘數五百一十五除數九十二夕退十日退五度先遲日行十度乘數五百一十五益疾九分除數八十六夕合