每日差而一為積倍初日行分以每日差加減之益遲者加之益疾者減之如每日差而一為率今自乘以積加減之益遲者以積減之益疾者以積加之開方除之所得以率加減之益遲者以率加之益疾者以率減之乃半之即所求日數也其開方除者置所開之數為實借一算於實之下名曰下法步之超一位置商於上方副商於下法之上名曰方法命上商以除實畢倍方法一折下法再折乃置後商於下法之上名曰隅法副隅并方命後商以除實畢隅從方法折下就除如前開之訖除依上術求之即得也求星行黃道南北各視其星變行入陰陽爻而定之其前變入陽爻為黃道北入陰爻為黃道南後變入陽爻為黃道南入陰爻為黃道北其金水二星以爻變為前變各計其變行起初日入爻之算盡老象上爻末算之數不滿變行度常率者因置其數以變行日定率乘之如變行度常率而一為日其入變日數與此日數以下者星在黃道南北依本所入陰陽爻為定過此日數之外者黃道南北則返之
