body:
  text: 舊唐書卷一百九十下列傳第一百四十下文苑下李華蕭穎士李翰附陸據崔顥王昌齡孟浩然元德秀王維李白杜甫吳通玄兄通微王仲舒崔咸唐次子扶持持子彥謙劉蕡李商隱溫庭筠薛逢子廷珪李拯李巨川司空圖李華字遐叔趙郡人開元二十三年進士擢第天寶中登朝為監察御史累轉侍御史禮部吏部二員外郎華善屬文與蘭陵蕭穎士友善華進士時著含元殿賦萬餘言穎士見而賞之曰景福之上靈光之下華文體溫麗少宏傑之氣穎士詞鋒俊發華自以所業過之疑其誣詞乃為祭古戰場文熏汙之如故物置於佛書之閣華與穎士因閱佛書得之華謂之曰此文何如穎士曰可矣華曰當代秉筆者誰及於此穎士曰君稍精思便可及此華愕然華著論言龜卜可廢通人當其言祿山陷京師玄宗出幸華扈從不及陷賊偽署為鳳閣舍人收城後三司類例減等從輕貶官遂廢於家卒華嘗為魯山令元德秀墓碑顏真卿書李陽冰篆額後人爭模寫之號為四絕碑有文集十卷行於時蕭穎士者字茂挺與華同年登進士第當開元中天下承平人物駢集如賈曾席豫張韋述輩皆有盛名而穎士皆與之遊由是縉紳多譽之李林甫採其名欲拔用之乃召見時穎士寓居廣陵母喪即縗麻而詣京師徑謁林甫於政事省林甫素不識遽見縗麻大惡之即令斥去穎士大忿乃為伐櫻桃賦以刺林甫云擢無庸之瑣質因本枝而自庇洎枝幹而非據專廟廷之右地雖先寢而或薦豈和羹之正味其狂率不遜皆此類也然而聰警絕倫嘗與李華陸據同遊洛南龍門三人共讀路側古碑穎士一閱即能誦之華再閱據三閱方能記之議者以三人才格高下亦如此是時外夷亦知穎士之名新羅使入朝言國人願得蕭夫子為師其名動華夷若此終以誕傲褊忿困躓而卒華宗人翰亦以進士知名天寶中寓居陽翟為文精密用思苦澀常從陽翟令皇甫曾求音樂每思涸則奏樂神逸則著文祿山之亂從友人張巡客宋州巡率州人守城賊攻圍經年食盡矢窮方陷當時薄巡者言其降賊翰乃序巡守城事迹撰張巡姚誾等傳兩卷上之肅宗方明巡之忠義士友稱之上元中為衞縣尉入朝為侍御史陸據者周上庸公騰六代孫少孤文章俊逸言論縱橫年三十餘始遊京師舉進士公卿覽其文稱重之辟為從事累官至司勳員外郎天寶十三載卒開元天寶間文士知名者汴州崔顥京兆王昌齡高適襄陽孟浩然皆名位不振唯高適官達自有傳崔顥者登進士第有俊才無士行好蒱博飲酒及遊京師娶妻擇有貌者稍不愜意即去之前後數四累官司勳員外郎天寶十三年卒王昌齡者進士登第補祕書省校書郎又以博學宏詞登科再遷汜水縣尉不護細行屢見貶斥卒昌齡為文緒微而思清有集五卷孟浩然隱鹿門山以詩自適年四十來遊京師應進士不第還襄陽張九齡鎮荊州署為從事與之唱和不達而卒元德秀者河南人字紫芝開元二十一年登進士第性純朴無緣飾動師古道父為延州刺史德秀少孤貧事母以孝聞開元中從鄉賦歲遊京師不忍離親每行則自負板輿與母詣長安登第後母亡廬於墓所食無鹽酪藉無茵席刺血畫像寫佛經久之以孤幼牽於祿仕調授邢州南和尉佐治有惠政黜陟使上聞召補龍武錄事參軍德秀早失恃怙縗麻相繼不及親在而娶既孤之後遂不娶婚族人以絕嗣規之德秀曰吾兄有子繼先人之祀以兄子婚娶家貧無以為禮求為魯山令先是墮車傷足不任趨拜汝郡守以客禮待之部人為盜吏捕之繫獄會縣界有猛獸為暴盜自陳曰願格殺猛獸以自贖德秀許之胥吏曰盜詭計苟免擅放官囚無乃累乎德秀曰吾不欲負約累則吾坐必請不及諸君即破械出之翌日格猛獸而還誠信化人大率此類秩滿南遊陸渾見佳山水杳然有長往之志乃結廬山阿歲屬饑歉庖廚不爨而彈琴讀書怡然自得好事者載酒餚過之不擇賢不肖與之對酌陶陶然遺身物外琴觴之餘間以文詠率情而書語無雕刻所著季子聽樂論蹇士賦為高人所稱天寶十三年卒時年五十九門人相與諡為文行先生士大夫高其行不名謂之元魯山王維字摩詰太原祁人父處廉終汾州司馬徙家于蒲遂為河東人維開元九年進士擢第事母崔氏以孝聞與弟縉俱有俊才博學多藝亦齊名閨門友悌多士推之歷右拾遺監察御史左補闕庫部郎中居母喪柴毀骨立殆不勝喪服闋拜吏部郎中天寶末為給事中祿山陷兩都玄宗出幸維扈從不及為賊所得維服藥取痢偽稱瘖病祿山素憐之遣人迎置洛陽拘於普施寺迫以偽署祿山宴其徒於凝碧宮其樂工皆梨園弟子教坊工人維聞之悲惻潛為詩曰萬戶傷心生野煙百官何日再朝天秋槐花落空宮𩹉凝碧池頭奏管絃賊平陷賊官三等定罪維以凝碧詩聞于行在肅宗嘉之會縉請削己刑部侍郎以贖兄罪特宥之責授太子中允乾元中遷太子中庶子中書舍人復拜給事中轉尚書右丞維以詩名盛於開元天寶間昆仲宦遊兩都凡諸王駙馬豪右貴勢之門無不拂席迎之寧王薛王待之如師友維尤長五言詩書畫特臻其妙筆蹤措思參於造化而創意經圖即有所缺如山水平遠雲峯石色絕迹天機非繪者之所及也人有得奏樂圖不知其名維視之曰霓裳第三疊第一拍也好事者集樂工按之一無差咸服其精思維弟兄俱奉佛居常蔬食不茹葷血晚年長齋不衣文綵得宋之問藍田別墅在輞口輞水周於舍下別漲竹洲花塢與道友裴迪浮舟往來彈琴賦詩嘯詠終日嘗聚其田園所為詩號輞川集在京師日飯十數名僧以玄談為樂齋中無所有唯茶鐺藥臼經案繩床而已退朝之後焚香獨坐以禪誦為事妻亡不再娶三十年孤居一室屏絕塵累乾元二年七月卒臨終之際以縉在鳳翔忽索筆作別縉書又與平生親故作別書數幅多敦厲朋友奉佛脩心之旨捨筆而絕代宗時縉為宰相代宗好文常謂縉曰卿之伯氏天寶中詩名冠代朕嘗於諸王座聞其樂章今有多少文集卿可進來縉曰臣兄開元中詩百千餘篇天寶事後十不存一比於中外親故間相與編綴都得四百餘篇翌日上之帝優詔褒賞縉自有傳李白字太白山東人少有逸才志氣宏放飄然有超世之心父為任城尉因家焉少與魯中諸生孔巢父韓沔裴政張叔明陶沔等隱於徂徠山酣歌縱酒時號竹溪六逸天寶初客遊會稽與道士吳筠隱於剡中既而玄宗詔筠赴京師筠薦之於朝遣使召之與筠俱待詔翰林白既嗜酒日與飲徒醉於酒肆玄宗度曲欲造樂府新詞亟召白白已臥於酒肆矣召入以水灑面即令秉筆頃之成十餘章帝頗嘉之嘗沉醉殿上引足令高力士脫靴由是斥去乃浪迹江湖終日沉飲時侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自采石達金陵白衣宮錦袍於舟中顧瞻笑傲傍若無人初賀知章見白賞之曰此天上謫仙人也祿山之亂玄宗幸蜀在途以永王璘為江淮兵馬都督揚州節度大使白在宣州謁見遂辟為從事永王謀亂兵敗白坐長流夜郎後遇赦得還竟以飲酒過度醉死於宣城有文集二十卷行於時杜甫字子美本襄陽人後徙河南鞏縣曾祖依藝位終鞏令祖審言位終膳部員外郎自有傳父閑終奉天令甫天寶初應進士不第天寶末獻三大禮賦玄宗奇之召試文章授京兆府兵曹參軍十五載祿山陷京師肅宗徵兵靈武甫自京師宵遁赴河西謁肅宗於彭原郡拜右拾遺房琯布衣時與甫善時琯為宰相請自帥師討賊帝許之其年十月琯兵敗於陳濤斜明年春琯罷相甫上疏言琯有才不宜罷免肅宗怒貶琯為刺史出甫為華州司功參軍時關畿亂離穀食踊貴甫寓居成州同谷縣自負薪採梠兒女餓殍者數人久之召補京兆府功曹上元二年冬黃門侍郎鄭國公嚴武鎮成都奏為節度參謀檢校尚書工部員外郎賜緋魚袋武與甫世舊待遇甚隆甫性褊躁無器度恃恩放恣嘗憑醉登武之牀瞪視武曰嚴挺之乃有此兒武雖急暴不以為忤甫於成都浣花里種竹植樹結廬枕江縱酒嘯詠與田畯野老相狎蕩無拘檢嚴武過之有時不冠其傲誕如此永泰元年夏武卒甫無所依及郭英乂代武鎮成都英乂武人粗暴無能刺謁乃遊東蜀依高適既至而適卒是歲崔寧殺英乂楊子琳攻西川蜀中大亂甫以其家避亂荊楚扁舟下峽未維舟而江陵亂乃泝沿湘流遊衡山寓居耒陽甫嘗遊嶽廟為暴水所阻旬日不得食耒陽聶令知之自棹舟迎甫而還永泰二年啗牛肉白酒一夕而卒於耒陽時年五十九子宗武流落湖湘而卒元和中宗武子嗣業自耒陽遷甫之柩歸葬於偃師縣西北首陽山之前天寶末詩人甫與李白齊名而白自負文格放達譏甫齷齪而有飯顆山之嘲誚元和中詞人元稹論李杜之優劣曰予讀詩至杜子美而知小大之有所總萃焉始堯舜之時君臣以賡歌相和是後詩人繼作歷夏殷周千餘年仲尼緝拾選揀取其干預教化之尤者三百餘無所聞騷人作而怨憤之態繁然猶去風雅日近尚相比擬秦漢已還採詩之官既廢天下妖謠民謳歌頌諷賦曲度嬉戲之辭亦隨時間作至漢武賦柏梁而七言之體具蘇子卿李少卿之徒尤工為五言雖句讀文律各異雅鄭之音亦雜而辭意簡遠指事言情自非有為而為則文不妄作建安之後天下之士遭罹兵戰曹氏父子鞍馬間為文往往橫槊賦詩故其遒壯抑揚冤哀悲離之作尤極於古晉世風概稍存宋齊之間教失根本士以簡慢翕習舒徐相尚文章以風容色澤放曠精清為高蓋吟寫性靈留連光景之文也意義格力無取焉陵遲至於梁陳淫豔刻飾佻巧小碎之詞劇又宋齊之所不取也唐興官學大振歷世之文能者互出而又沈宋之流研練精切穩順聲勢謂之為律詩由是之後文體之變極焉然而莫不好古者遺近務華者去實效齊梁則不迨於魏晉工樂府則力屈於五言律切則骨格不存閑暇則纖穠莫備至於子美蓋所謂上薄風騷下該沈宋言奪蘇李氣吞曹劉掩顏謝之孤高雜徐庾之流麗盡得古今之體勢而兼人人之所獨專矣使仲尼考鍛其旨要尚不知貴其多乎哉苟以為能所不能無可無不可則詩人已來未有如子美者是時山東人李白亦以文奇取稱時人謂之李杜予觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠亦差肩於子美俟至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不能歷其藩翰況堂奧乎予嘗欲條析其文體別相附與來者為之準特病懶未就爾自後屬文者以稹論為是甫有文集六十卷吳通玄海州人父道瓘為道士善教誘童孺大曆中召入宮為太子諸王授經德宗在東宮師道瓘而通玄兄弟出入宮掖恆侍太子遊故遇之厚通玄與兄通微俱博學善屬文文彩綺麗通玄幼應神童舉釋褐祕書正字左驍衞兵曹大理評事建中初策賢良方正等科通玄應文詞清麗登乙第授同州司戶京兆戶曹貞元初召充翰林學士遷起居舍人知制誥與陸贄吉中孚韋執誼等同視草陸贄富詞藻特承德宗重顧經歷艱難通玄弟兄又以東宮侍上由是爭寵頗相嫌恨贄性褊急屢於上前短通玄又言承平時工藝書畫之徒待詔翰林比無學士只自至德後天子召集賢學士于禁中草書詔因在翰林院待進止遂以為名奔播之時道途或豫除改權令草制今四方無事百揆時序制書職分宜歸中書舍人學士之名理須停寢贄以通玄援引朋黨於禁中叶力排己故欲廢之德宗不許會贄權知兵部侍郎知貢舉乃正拜之罷內職皆通玄譖之也七年自起居郎拜諫議大夫知制誥通玄自以久次當拜中書舍人而反除諫議殊失望陸贄與宰相竇參相惡參從子給事中申參尤寵之每預中書擬議所至人呼申為喜鵲申嗣虢王則之從父甥也申與則之親善則之為金吾將軍好學有文申與則之潛結吳通玄兄弟為參共傾陸贄則之令人造謗書言贄考試舉人不實招納賄賂時通玄取宗室女為外婦德宗知之既聞申則之譖陸贄綱紀伺之果與通玄結構其謀帝大怒罷竇參知政事尋貶郴州司馬竇申錦州司戶李則之昭州司馬通玄泉州司馬帝召見之親自臨問責以污辱近屬行至華州長城驛賜死尋以陸贄為中書侍郎平章事代竇參通微建中四年自壽安縣令入為金部員外召充翰林學士尋改職方郎中知制誥與弟通玄同職禁署人士榮之七年改禮部郎中尋轉中書舍人通玄死素服待罪於國門帝特宥之通微竟不敢為喪服通玄詞藻婉麗帝尤憐之貞元初昭德王皇后崩詔李紓為諡冊文宰相張延賞柳渾為廟樂章及進皆不稱旨並召通玄重撰凡中旨撰述非通玄之筆無不慊然重之如此王仲舒字弘中太原人少孤貧事母以孝聞嗜學工文不就鄉舉凡與結交必知名之士與楊頊梁肅裴樞為忘形之契貞元十年策試賢良方正能直言極諫等科仲舒登乙第超拜右拾遺裴延齡領度支矯誕大言中傷良善仲舒上疏極論之累轉尚書郎元和五年自職方郎中知制誥仲舒文思溫雅制誥所出人皆傳寫京兆尹楊憑為中丞李夷簡所劾貶臨賀尉仲舒與憑善宣言於朝言夷簡掎摭憑罪仲舒坐貶硤州刺史遷蘇州穆宗即位復召為中書舍人其年出為洪州刺史御史中丞江南西道觀察使江西前例榷酒私釀法深仲舒至鎮奏罷之又出官錢二萬貫代貧戶輸稅長慶三年冬卒于鎮崔咸字重易博陵人祖安石父銳位終給事中咸元和二年進士擢第又登博學宏詞科鄭餘慶李夷簡辟為賓佐待如師友及登朝歷踐臺閣獨行守正時望甚重敬宗欲幸東都人心不安裴度以勳舊自興元隨表入覲既至李逢吉不欲度復入中書京兆尹劉栖楚逢吉黨也栖楚等十餘人駕肩排度而朝士持兩端者日擁度門一日度留客命酒栖楚矯求度之歡曲躬附裴耳而語咸嫉其矯舉爵罰度曰丞相不當許所由官呫囁耳語度笑而飲之栖楚不自安趨出坐客皆壯之累遷陝州大都督府長史陝虢觀察等使自旦至暮與賓僚痛飲恆醉不醒簿領堆積夜分省覽剖判決斷無毫釐之差胥吏以為神人入為右散騎常侍祕書監大和八年十月卒初銳佐李抱真為澤潞從事有道人自稱盧老曾事隋朝雲際寺李先生預知過往未來之事屬河朔禁遊客銳館之於家一旦辭去且曰我死當與君為子因指口下黑子願以為志咸之生也果有黑子其形神即盧老也父即以盧老字之既冠棲心高尚志於林壑往往獨遊南山經時方還尤長於歌詩或風景晴明花朝月夕朗吟意愜必悽愴霑襟旨趣高奇名流嗟挹有文集二十卷唐次幷州晉陽人也國初功臣禮部尚書儉之後建中初進士擢第累辟使府貞元初歷侍御史竇參深重之轉禮部員外郎八年參貶官次坐出為開州刺史在巴峽間十餘年不獲進用西川節度使韋臯抗表請為副使德宗密諭臯令罷之次久滯蠻荒孤心抑鬱怨謗所積孰與申明乃採自古忠臣賢士遭罹讒謗放逐遂至殺身而君猶不悟其書三篇謂之辨謗略上之德宗省之猶怒謂左右曰唐次乃方吾為古之昏主何自諭如此改夔州刺史憲宗即位與李吉甫同自峽內召還授次禮部郎中尋以本官知制誥正拜中書舍人卒章武皇帝明哲嫉惡尤惡人朋比傾陷嘗閱書禁中得次所上書三篇覽而善之謂學士沈傳師曰唐次所集辨謗之書實君人者時宜觀覽朕思古書中多有此事次編錄未盡卿家傳史學可與學士類例廣之傳師奉詔與令狐楚杜元穎等分功脩續廣為十卷號元和辨謗略其序曰臣聞乾坤定而上下分矣至於播四時之候遂萬物之宜在驗乎妖祥之二氣祥氣降則為豐為茂妖氣降則為沴為災君臣立而卑高隔矣至於處神明之奧詢獻納之辭在審乎邪正之二說正言勝則為忠為讜邪言勝則為讒為諛故詩云萋兮斐兮成是貝錦刺其組織之甚巧也語曰邪徑敗良田讒口亂善人惡其莠言之蠹政也蓋謂似信而詐似忠而非便便可以動心捷捷可以亂德豈止鶗鳺彫卉薏苡惑珠者哉況立國家自中徂外道偏則刑罰不中讒勝則忠孝靡彰逖覽前聞緬想近古招賢容鯁遠佞嫉邪慮之則深防之未至伏惟睿聖文武皇帝陛下垂衣御宇化洽文明謨猷博訪於縉紳旌賁屢臻於巖穴尚復廣四目周四聰制理皆在於未萌作範將垂於不朽乃詔掌文之臣令狐楚等上自周漢下洎隋朝求史籍之忠賢罹讒謗之事迹瑕釁之本末紀謠諑之淺深編次指明勒成十卷昔虞舜有堲讒之命我皇脩辨謗之書千古一心同垂至理將俟法宮退日昃之政別殿備乙夜之觀則聖慮先辨謗何由興上天不言而民自信矣憲宗優詔答之次子扶持扶字雲翔元和五年進士登第累佐使府入朝為監察御史出為刺史大和初入朝為屯田郎中五年充山南道宣撫使至鄧州奏內鄉縣行市黃澗兩場倉督鄧琬等先主掌湖南江西運到糙米至淅川縣於荒野中囤貯除支用外六千九百四十五石裛爛成灰塵度支牒徵元掌所由自貞元二十年鄧琬父子兄弟至玄孫相承禁繫二十八年前後禁死九人今琬孫及玄孫見在枷禁者敕曰如聞鹽鐵度支兩使此類極多其鄧琬等四人資產全已賣納禁繫三代瘐死獄中實傷和氣鄧琬等並疏放天下州府監院如有此類不得禁經三年已上速便疏理以聞物議嘉扶有宣撫之才俄轉司勳郎中八年充弘文館學士判院事九年轉職方郎中權知中書舍人事開成初正拜舍人踰月授福州刺史御史中丞福建團練觀察使四年十一月卒于鎮扶佐幕立事登朝有名及廉問甌閩政事不治身歿之後僕妾爭財詣闕論訴法司按劾其家財十萬貫歸於二妾又嘗枉殺部人為其家所訴行己前後不類時論非之持字德守元和十五年擢進士第累辟諸侯府入朝為侍御史尚書郎大中末自工部郎中出為容州刺史御史中丞容管經略招討使入為給事中大中末檢校左散騎常侍靈州大都督府長史朔方節度靈武六城轉運等使進位檢校戶部尚書潞州大都督府長史昭義節度澤潞邢洺磁觀察處置等使卒子彥謙字茂業咸通末應進士才高負氣無所屈降十餘年不第乾符末河南盜起兩都覆沒以其家避地漢南中和中王重榮鎮河中辟為從事累奏至河中節度副使歷晉絳二州刺史彥謙博學多藝文詞壯麗至於書畫音樂博飲之技無不出於輩流尤能七言詩少時師溫庭筠故文格類之光啟末王重榮為部下所害朝議責參佐彥謙與書記李巨川俱貶漢中掾曹時楊守亮鎮興元素聞其名彥謙以本府參承守亮見之喜握手曰聞尚書名久矣邂逅於茲翌日署為判官累官至副使閬壁二郡刺史卒於漢中有詩數百篇禮部侍郎薛廷珪為之序號鹿門先生集行於時子渙位亦至郡守次弟歡款欣款貞元六年登進士第累辟使府登朝為御史出為郡守卒子枝枝字己有會昌末累遷刑部員外轉郎中累歷刺史卒劉蕡字去華昌平人父勉蕡寶曆二年進士擢第博學善屬文尤精左氏春秋與朋友交好談王霸大略耿介嫉惡言及世務慨然有澄清之志自元和末閽寺權盛握兵宮闈橫制天下天子廢立由其可否干撓庶政當時目為南北司愛惡相攻有同水火蕡草澤中居常憤惋文宗即位恭儉求理大和二年策試賢良曰朕聞古先哲王之理也玄默無為端拱思道陶民心以居簡凝日用而不宰厚下以立本推誠而建中由是天人通陰陽和俗躋仁壽物無疵癘噫盛德之所臻敻乎莫可及也三代令王質文迭究百偽滋熾風流寖微自漢而降足徵蓋寡朕顧惟昧道祗荷丕構奉若謨訓不敢怠荒任賢惕厲宵衣旰食詎追三五之遐軌庶紹祖宗之鴻緒而心有所未達行有所未孚由中及外闕政斯廣是以人不率化氣或堙厄災旱竟歲播植愆時國廩罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀理而豪猾時踰檢太學明教之源也期於變風而生徒多墮業列郡在乎頒條而干禁或未絕百工在乎按度而淫巧或未衰俗墮風靡積訛成蠹其擇官濟理也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之衆煩於令而鮮於理思所以究此繆盭致之治平茲心浩然若涉泉水故前詔有司博延羣彥佇啟宿懵冀臻時雍子大夫識達古今明於康濟造廷待問副朕虛懷必當箴主之闕辨政之疵明綱條之致紊稽富庶之所急何施斯革於前弊何澤斯惠乎下土何脩而理古可近何道而和氣克充推之本源著於條對至於夷吾輕重之權孰輔於理嚴尤底定之策孰叶於時元凱之考課何先叔子之克平何務推此龜鏡擇乎中庸期在洽聞朕將親覽時對策者百餘人所對止循常務唯蕡切論黃門太橫將危宗社對曰臣誠不佞有匡國致君之術無位而不得行有犯顏敢諫之心無路而不得進但懷憤鬱抑思有時而一發耳常欲與庶人議於道商旅謗於市得通上聽一悟主心雖被妖言之罪無所悔焉況逢陛下以至德嗣興以大明垂照詢求過闕咨訪謨猷制詔中外舉直言極諫者臣既辱斯舉專承大問敢不悉意以言至於上之所忌時之所禁權倖之所諱惡有司之所與奪臣愚不識伏惟陛下少加優容不使聖朝有讜直而受戮者乃天下之幸也謹昧死以對伏惟聖策有思先古之理念玄默之化將欲通天人以齊俗和陰陽以煦物見陛下慕道之深也臣以為哲王之理其則不遠惟陛下致之之道何如爾伏惟聖策有祗荷丕構而不敢荒寧奉若謨訓而罔有怠忽見陛下憂勞之志也若夫任賢惕厲宵衣旰食宜黜左右之纖佞進股肱之大臣若夫追蹤三五紹復祖宗宜鑒前古之興亡明當時之成敗心有所未達以下情塞而不得上通行有所未孚以上澤壅而不得下浹欲人之化也在脩己以先之欲氣之和也在遂性以導之救災患在致乎精誠廣播植在視乎食力國廩罕蓄本乎冗食尚繁吏道多端本乎選用失當豪猾踰制由中外之法殊生徒墮業由學校之官廢列郡干禁由授任非人百工淫巧由制度不立伏以聖策有擇官濟理之心阜財發號之歎見陛下教化之本也且進人以行則枝葉安有難別乎防下以禮則恥格安有不形乎念生寡而食衆可罷斥惰游念令煩而理鮮要察其行否博延羣彥願陛下必納其言造廷待問則小臣安敢愛死伏以聖策有求賢箴闕之言審政辨疵之念見陛下咨訪之勤也遂小臣屏姦豪之志則弊革於前守陛下念康濟之心則惠敷於下邪正之道分則理古可近禮樂之方著而和氣克充至若夷吾之法非皇王之權嚴尤所陳無最上之策元凱之所先不若唐虞之考績叔子之所務不若重華之舞干且俱非大德之中庸未為上聖之龜鑑何足以為陛下道之哉或有以繫安危之機兆存亡之變者臣請披瀝肝膽為陛下別白而重言之臣前所謂哲王之理其則不遠者在陛下慎思之力行之終始不懈而已臣謹按春秋元者氣之始也春者歲之始也春秋以元加於歲以春加於王明王者當奉若天道以謹其始也又舉時以終歲舉月以終時春秋雖無事必書首月以存時明王者當奉若天道以謹其終也王者動作終始必法於天者以其運行不息也陛下既能謹其始又能謹其終懋而脩之勤而行之則可以執契而居簡無為而不宰廣立本之大業崇建中之盛德矣又安有三代循環之弊而為百偽滋熾之漸乎臣故曰惟陛下致之之道何如耳臣前所謂若夫任賢惕厲宵衣旰食宜罷黜左右之纖佞進股肱之大臣者實以陛下憂勞之至也臣聞不宜憂而憂者國必衰宜憂而不憂者國必危今陛下不以國家存亡之事社稷安危之策而降於清問臣未知陛下以布衣之臣不足以定大計耶或萬機之勤而聖慮有所未至耶不然何宜憂而不憂者乎臣以為陛下宜先憂者宮闈將變社稷將危天下將傾海內將亂此四者國家已然之兆故臣謂聖慮宜先及之夫帝業既艱難而成之故不可容易而守之昔太祖肇其基高祖勤其績太宗定其業玄宗繼其明至于陛下二百有餘載矣其間明聖相因憂亂繼作未有不委用賢士親近正人而能紹興其徽烈者也或一日不念則顛覆大器宗廟之恥萬古為恨臣謹按春秋人君之道在體元以居正昔董仲舒為漢武帝言之略矣其所未盡者臣得為陛下備而論之夫繼故必書即位所以正其始也終必書所終之地所以正其終也故為君者所發必正言所履必正道所居必正位所近必正人臣又按春秋閽弒吳子餘祭不書其君春秋譏其疏遠賢士昵近刑人有不君之道矣伏惟陛下思祖宗開國之勤念春秋繼故之誡將明法度之端則發正言而履正道將杜篡弒之漸則居正位而近正人遠刀鋸之賤親骨鯁之直輔相得以專其任庶職得以守其官奈何以褻近五六人總天下大政外專陛下之命內竊陛下之權威懾朝廷勢傾海內羣臣莫敢指其狀天子不得制其心禍稔蕭牆姦生帷幄臣恐曹節侯覽復生於今日此宮闈之所以將變也臣謹按春秋魯定公元年春王不言正月者春秋以其先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之奇閽寺持廢立之權陷先君不得正其終致陛下不得正其始況皇儲未建郊祀未脩將相之職不歸名分之宜不定此社稷之所以將危也臣謹按春秋王札子殺召伯毛伯春秋之義兩下相殺不書而此書者重其專王命也且天之所授者在君君之所授者在命操其命而失之者是不君也侵其命而專之者是不臣也君不君臣不臣此天下所以將傾也臣謹按春秋晉趙鞅以晉陽之兵叛入于晉書其歸者以其能逐君側惡人以安其君故春秋善之今威柄凌夷藩臣跋扈或有不達人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義則政刑不由乎天子攻伐必自於諸侯此海內之所以將亂也又樊噲排闥而雪涕爰盎當車以抗詞京房發憤以殞身竇武不顧而畢命此皆陛下明知之矣臣謹按春秋晉狐射姑殺陽處父書襄公殺之者以其上漏言也襄公不能固陰重之機處父所以及戕賊之禍故春秋非之夫上漏其情則下不敢盡意上泄其事則下不敢盡言傳有造膝詭辭之文易有殺身害成之戒今公卿大臣非不能為陛下言之慮陛下必不能用之陛下既忽之而不用必洩其言臣下既言之而不行必嬰其禍適足以鉗直臣之口重奸臣之威是以欲盡其言則起失身之懼欲盡其意則有害成之憂故徘徊塞以俟陛下感悟然後盡其啟沃耳陛下何不以聽朝之餘時御便殿召當時賢相與舊德老臣訪持變扶危之謀求定傾救亂之術塞陰邪之路屏褻狎之臣制侵凌迫脅之心復門戶掃除之役戒其所宜戒憂其所宜憂既不能治於前當治於後既不能正其始當正其終則可以虔奉典謨克承丕構終任賢之效無旰食之憂矣臣前所謂若夫追蹤三五紹復祖宗宜鑒前古之興亡明當時之成敗者臣聞堯舜之為君而天下之人理者以其能任九官四嶽十二牧不失其舉不貳其業不侵其職居官惟其能左右惟其賢元凱在下雖微必舉四凶在朝雖強必誅考其安危明其取捨至秦之二代漢之元成咸欲措國如唐虞致身如堯舜而終敗亡者以其不見安危之機不知取捨之道不任大臣不辨姦人不親忠良不遠讒佞伏惟陛下察唐虞之所以興而景行於前鑒秦漢之所以亡而戒懼於後陛下無謂廟堂無賢相庶官無賢士今紀綱未絕典刑猶在人誰不欲致身為王臣致時為太平陛下何忽而不用之耶又有居官非其能左右非其賢其惡如四凶其詐如趙高其姦如恭顯陛下又何憚而不去之耶神器固有歸天命固有分祖廟固有靈忠臣固有心陛下其念之哉昔秦之亡也失於強暴漢之亡也失於微弱強暴則賊臣畏死而害上微弱則姦臣竊權而震主伏見敬宗皇帝不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之鴻業可紹三五之遐軌可追矣臣前所謂陛下心有所未達以下情塞而不能上通行有所未孚以上澤壅而不得下浹者且百姓塗炭之苦陛下無由而知則陛下有子育之心百姓無由而信臣謹按春秋書梁亡不書取者梁自亡也以其思慮昏而耳目塞上出惡政人為寇盜皆不知其所以然以自取其滅亡也臣聞國君之所以尊者重其社稷也社稷之所以重者存其百姓也苟百姓之不存則社稷不得固其重苟社稷之不重則國君不得保其尊故治天下不可不知百姓之情夫百姓者陛下之赤子也陛下宜令仁慈者親育之如保傅焉如乳哺焉如師之教導焉故人信於上也敬之如神明愛之如父母今或不然陛下親近貴倖分曹補署建除卒吏召致賓客因其貨賄假其氣勢大者統藩方小者為牧守居上無清惠之政而有饕餮之害居下無忠誠之節而有姦欺之罪故人之於上也畏之如豺狼惡之如讎敵今海內困窮處處流散饑者不得食寒者不得衣魚眾寡孤獨者不得存老幼疾病者不得養加以國之權柄專在左右貪臣聚斂以固寵姦吏因緣而弄法冤痛之聲上達于九天下流於九泉鬼神怨怒陰陽為之愆錯君門萬里而不得告訴士人無所歸化百姓無所歸命官亂人貧盜賊並起土崩之勢憂在旦夕即不幸因之以疾癘繼之以凶荒臣恐陳勝吳廣不獨起於秦赤眉黃巾不獨起於漢故臣所以為陛下發憤扼腕痛心泣血爾如此則百姓有塗炭之苦陛下何由而知之陛下有子育之心百姓安得而信之乎致使陛下行有所未孚必有所未達者固其然也臣聞昔漢元帝即位之初更制七十餘事其心甚誠其稱甚美然而紀綱日紊國祚日衰姦宄日強黎元日困者以其不能擇賢明而任之失其操柄也即陛下御宇憂勤兆庶屢降德音四海之內莫不抗首而長思自喜復生於死亡之中也伏惟陛下慎終如始以塞萬方之望誠能揭國權以歸其相持兵柄以歸其將去貪臣聚斂之政除姦吏因緣之害惟忠賢是近惟正直是用內寵便僻無所聽焉選清慎之官擇仁惠之長敏之以利煦之以仁教之以孝慈導之以德義去耳目之塞通上下之情俾萬國歡康兆民蘇息則心無不達行無不孚矣臣前所謂欲兆人之化也在脩己以先之者臣聞德以脩己教以導人脩之也則人不勸而自至導之也則人敦行而率從是以君子欲政之必行也故以身先之欲人之從化也故以道御之今陛下先之以身而政未必行御之以道而人未從化豈不以立教之旨未盡其方也夫立教之方在乎君以明制之臣以忠行之君以知人為明臣以匡時為忠知人則任賢而去邪匡時則固本而守法賢不任則重賞不足以勸善邪不去則嚴刑不足以禁非本不固則民流法不守則政散而欲教之使必至化之使必行不可得也陛下能斥姦邪不私其左右舉賢正不遺其疏遠則化浹於朝廷矣愛人以敦本分職而奉法脩其身以及其人始於中而成於外則化行於天下矣臣前所謂欲氣之和也在於遂性以導之者當納人於仁壽也夫欲人之仁壽也在乎立制度脩教化夫制度立則財用省財用省則賦斂輕賦斂輕則人富矣教化脩則爭競息爭競息則刑罰清刑罰清則人安矣既富矣則仁義興焉既安矣則壽考至焉仁壽之心感於下和平之氣應於上故災害不作休祥荐臻四方底寧萬物咸遂矣臣前所謂救災旱在致乎精誠者臣謹按春秋魯僖公七月之中三書不雨者以其君有恤人之志也魯文公三年之中一書不雨者以其君無憫人之心也故僖公致精誠而旱不害物文公無卹憫而旱則成災陛下誠能有卹人之心則無成災之變矣臣前所謂廣播植在視乎食力者臣謹按春秋君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢今財食與人力皆勤矣願陛下廢百事之勞廣三時之務則播植不愆矣臣前所謂國廩罕蓄本乎冗食尚繁者臣謹按春秋臧孫辰告糴于齊春秋譏其國無九年之蓄一年不登而百姓饑臣願斥游惰之人以篤其耕植省不急之費以贍其黎元則廩蓄不乏矣臣前所謂吏道多端本乎選用失當者由國家取人不盡其才任人不明其要故也今陛下之用人也求其聲而不得其實故人之趨進也務其末而不務其本臣願覈考課之實定遷序之制則多端之吏息矣臣前所謂豪猾踰檢由中外之法殊者以其官禁不一也臣謹按春秋齊桓公盟諸侯不以日而葵丘之盟特以日者美其能宣明天子之禁率奉王官之法故春秋備而書之夫官者五帝三王之所建也法者高祖太宗之所制也法宜畫一官宜正名今又分外官中官之員立南司北司之局或犯禁於南則亡命于北或正刑于外則破律於中法出多門人無所措實由兵農勢異而中外法殊也臣聞古者因井田而制軍賦間農事以脩武備提封約卒乘之數命將在公卿之列故兵農一致而文武同方可以保乂邦家式遏禍亂暨太宗皇帝肇建邦典亦置府兵臺省軍衞文武參掌居閑歲則櫜弓力穡將有事則釋耒荷戈所以脩復古制不廢舊物今則不然夏官不知兵籍止於奉朝請六軍不主兵事止於養勳階軍容合中官之政戎律附內臣之職首一戴武弁嫉文吏如仇讎足一蹈軍門視農夫如草芥謀不足以翦除凶逆而詐足以抑揚威福勇不足以鎮衞社稷而暴足以侵軼里閭羈絏藩臣干凌宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以御英豪有藏姦觀釁之心無伏節死難之義豈先王經文緯武之旨耶臣願陛下貫文武之道均兵農之功正貴賤之名一中外之法選軍衞之職脩省署之官近崇貞觀之規遠復成周之制自邦畿以刑于下國始天子以達于諸侯則可以制豪猾之強無踰檢之患矣臣前所謂生徒墮業由學校之官廢者蓋以國家貴其祿而賤其能先其身而後其行故庶官乏通經之學諸生無脩業之心矣臣前所謂列郡干禁由授任非其人者臣以為刺史之任理亂之根本繫焉朝廷之法制在焉權可以抑豪猾恩可以惠孤寡強可以禦姦寇政可以移風俗其將校有曾經戰陣及功臣子弟各請隨宜酬賞如無治人之術者不當授任此官則絕干禁之患矣臣前所謂百工淫巧由制度不立者臣請以官位祿秩制其器用車服禁人金銀珠玉錦繡雕鏤不蓄於私室則無蕩心之巧矣臣前所謂辨枝葉者考其言以詢行也臣前所謂形于恥格者導德而齊禮也臣前所謂念生寡而食衆可罷斥惰遊者已備之於前矣臣前所謂令煩而理鮮要察其行否者臣聞號令者乃理國之具也君審而出之臣奉而行之或虧上旨罪在不赦今陛下令煩而理鮮得非持之者有所蔽欺乎臣前所謂博延羣彥願陛下必納其言造廷待問則小臣不敢愛死者臣聞晁錯為漢畫削諸侯之策非不知禍之將至也忠臣之心壯夫之節苟利社稷死無悔焉今臣非不知言發而禍應計行而身戮蓋所以痛社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉昔龍逢死而啟殷比干死而啟周韓非死而啟漢陳蕃死而啟魏今臣之來也有司或不敢薦臣之言陛下又無以察臣之心退必受戮於權臣之手臣幸得從四子於地下固臣之願也所不知殺臣者臣死之後將孰為啟之哉至於人主之闕政教之疵前日之弊臣既言之矣若乃流下土之惠修近古之理而致其和平者在陛下行之而已然上之所陳者實以臣親奉聖問敢不條對雖臣之愚以為未極教化之大端皇王之要道伏惟陛下事天地以教人敬奉宗廟以教人孝養高年以教人悌長字百姓以教人慈幼調元氣以煦育扇大和於仁壽可以逍遙無為垂拱成化至若念陶鈞之道在擇宰相而任之使權造物之柄念保定之功在擇將帥而任之使修分閫之寄念百度之未貞在擇庶官而任之使專職業之守念百姓之愁痛在擇長吏而任之使明惠育之術自然言足以為天下教行足以為天下法仁足以勸善義足以禁非又何必宵衣旰食勞神惕慮然後以致其理哉是歲左散騎常侍馮宿太常少卿賈餗庫部郎中龐嚴為考策官三人者時之文士也覩蕡條對歎服嗟悒以為漢之晁董無以過之言論激切士林感動時登科者二十二人而中官當途考官不敢留蕡在籍中物論喧然不平之守道正人傳讀其文至有相對垂泣者諫官御史扼腕憤發而執政之臣從而弭之以避黃門之怨唯登科人李郃謂人曰劉蕡不第我輩登科實厚顏矣請以所授官讓蕡事雖不行人士多之令狐楚在興元牛僧孺鎮襄陽辟為從事待如師友位終使府御史李商隱字義山懷州河內人曾祖叔恆年十九登進士第位終安陽令祖俌位終邢州錄事參軍父嗣商隱幼能為文令狐楚鎮河陽以所業文干之年纔及弱冠楚以其少俊深禮之令與諸子遊楚鎮天平汴州從為巡官歲給資裝令隨計上都開成二年方登進士第釋褐祕書省校書郎調補弘農尉會昌二年又以書判拔萃王茂元鎮河陽辟為掌書記得侍御史茂元愛其才以子妻之茂元雖讀書為儒然本將家子李德裕素遇之時德裕秉政用為河陽帥德裕與李宗閔楊嗣復令狐楚大相讎怨商隱既為茂元從事宗閔黨大薄之時令狐楚已卒子綯為員外郎以商隱背恩尤惡其無行俄而茂元卒來遊京師久之不調會給事中鄭亞廉察桂州請為觀察判官檢校水部員外郎大中初白敏中執政令狐綯在內署共排李德裕逐之亞坐德裕黨亦貶循州刺史商隱隨亞在嶺表累載三年入朝京兆尹盧弘正奏署掾曹令典牋奏明年令狐綯作相商隱屢啟陳情綯不之省弘正鎮徐州又從為掌書記府罷入朝復以文章干綯乃補太學博士會河南尹柳仲郢鎮東蜀辟為節度判官檢校工部郎中大中末仲郢坐專殺左遷商隱廢罷還鄭州未幾病卒商隱能為古文不喜偶對從事令狐楚幕楚能章奏遂以其道授商隱自是始為今體章奏博學強記下筆不能自休尤善為誄奠之辭與太原溫庭筠南郡段成式齊名時號三十六文思清麗庭筠過之而俱無持操恃才詭激為當塗者所薄名宦不進坎壈終身弟羲叟亦以進士擢第累為賓佐商隱有表狀集四十卷溫庭筠者太原人本名岐字飛卿大中初應進士苦心硯席尤長於詩賦初至京師人士翕然推重然士行塵雜不脩邊幅能逐絃吹之音為側豔之詞公卿家無賴子弟裴誠令狐縞之徒相與蒱飲酣醉終日由是累年不第徐商鎮襄陽往依之署為巡官咸通中失意歸江東路由廣陵心怨令狐綯在位時不為成名既至與新進少年狂遊狹邪久不刺謁又乞索於楊子院醉而犯夜為虞候所擊敗面折齒方還揚州訴之令狐綯捕虞候治之極言庭筠狹邪醜迹乃兩釋之自是汙行聞于京師庭筠自至長安致書公卿間雪冤屬徐商知政事頗為言之無何商罷相出鎮楊收怒之貶為方城尉再遷隋縣尉卒子憲以進士擢第弟庭皓咸通中為徐州從事節度使崔彥魯為龐勛所殺庭皓亦被害庭筠著述頗多而詩賦韻格清拔文士稱之薛逢字陶臣河東人父倚逢會昌初進士擢第釋褐祕書省校書郎崔鉉罷相鎮河中辟為從事鉉復輔政奏授萬年尉直弘文館累遷侍御史尚書郎逢文詞俊拔論議激切自負經畫之略久之不達應進士時與彭城劉瑑尤相善而瑑詞藝不迨逢逢每侮之至大中末瑑揚歷禁署逢愈不得意自是相怨俄而瑑知政事或薦逢知制誥瑑奏曰先朝立制兩省官給事中舍人除拜須先歷州縣逢未嘗治郡宜先試之乃出為巴州刺史既而沈詢楊收王鐸由學士相繼為將相皆逢同年進士而逢文藝最優楊收作相後逢有詩云須知金印朝天客同是沙隄避路人威鳳偶時皆瑞聖潛龍無水謾通神收聞大銜之又出為蓬州刺史收罷相入為太常少卿給事中王鐸作相逢又有詩云昨日鴻毛萬鈞重今朝山嶽一塵輕鐸又怨之以恃才褊忿人士鄙之遷祕書監卒子廷珪中和中登進士第大順初累遷司勳員外郎知制誥正拜中書舍人乾寧三年奉使太原復命昭宗幸華州改左散騎常侍移疾免客遊成都光化中復為中書舍人遷刑部吏部二侍郎權知禮部貢舉拜尚書左丞入梁至禮部尚書李拯字昌時隴西人咸通十二年登進士第乾符中累佐府幕黃巢之亂避地平陽僖宗還京召拜尚書郎轉考功郎中知制誥僖宗再幸寶鷄拯扈從不及在鳳翔襄王僭號逼為翰林學士拯既污偽署心不自安後朱玫秉政百揆無典章濁亂拯嘗朝退駐馬國門望南山而吟曰紫宸朝罷綴鴛鸞丹鳳樓前駐馬看唯有終南山色在晴明依舊滿長安吟已涕下及王行瑜殺朱玫襄王出奔京城亂拯為亂兵所殺妻盧氏知書能文有姿色拯既死伏其屍慟哭賊逼之堅哭不動又臨之以兵至於斷一臂終不顧為賊所害人皆傷之李巨川字下己隴右人國初十八學士道玄之後故相逢吉之姪曾孫父循大中八年登進士第巨川乾符中應進士屬天下大亂流離奔播切於祿位乃以刀筆從諸侯府王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮匡合諸藩叶力誅寇軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩鄰無不聳動重榮收復功巨川之助也及重榮為部下所害朝議罪參佐貶為漢中掾時楊守亮帥興元素知之聞巨川至喜謂客曰天以李書記遺我也即命管記室累遷幕職景福中守亮為李茂貞所攻城陷以部下數百人欲投太原入秦為華軍所擒巨川時從守亮亦被械繫在途巨川題詩於樹葉以遺華帥韓建詞情哀鳴建欣然解縛守亮誅即命為掌書記俄而李茂犯京師天子駐蹕於華韓建以一州之力供億萬乘慮其不濟遣巨川傳檄天下請助轉餉同匡王室完葺京城四方書檄酬報輻湊巨川灑翰陳文理俱愜昭宗深重之即時巨川之名聞于天下昭宗還京特授諫議大夫仍留佐建光化初朱全忠陷河中進兵入潼關建懼令巨川見全忠送款至河中從容言事巨川指陳利害全忠方圖問鼎聞巨川所陳心惡之判官敬翔亦以文筆見知於全忠慮得臣川減落名價謂全忠曰李諫議文章信美但不利主人是日為全忠所害司空圖字表聖本臨淮人曾祖遂密令祖彖水部郎中父輿精吏術大中初戶部侍郎盧弘正領鹽鐵奏輿為安邑兩池榷鹽使檢校司封郎中先是鹽法條例疏闊吏多犯禁輿乃特定新法十條奏之至今以為便入朝為司門員外郎遷戶部郎中卒圖咸通十年登進士第主司王凝於進士中尤奇之凝左授商州刺史圖請從之凝加器重洎廉問宣歙辟為上客召拜殿中侍御史以赴闕遲留責授光祿寺主簿分司東都乾符六年宰相盧攜罷免以賓客分司圖與之遊攜嘉其高節厚禮之嘗過圖舍手題于壁曰姓氏司空貴官班御史卑老夫如且在不用念屯奇明年攜復入朝路由陝虢謂陝帥盧渥曰司空御史高士也公其厚之渥即日奏為賓佐其年攜復知政事召圖為禮部員外郎賜緋魚袋遷本司郎中其年冬巢賊犯京師天子出幸圖從之不及乃退還河中時故相王徽亦在蒲待圖頗厚數年徽受詔鎮潞乃表圖為副使徽不赴鎮而止僖宗自蜀還次鳳翔召圖知制誥尋正拜中書舍人其年僖宗出幸寶雞復從之不及退還河中龍紀初復召拜舍人未幾又以疾辭河北亂乃寓居華陰景福中又以諫議大夫徵時朝廷微弱紀綱大壞圖自深惟出不如處移疾不起乾寧中又以戶部侍郎徵一至闕廷致謝數日乞還山許之昭宗在華徵拜兵部侍郎稱足疾不任趨拜致章謝之而已昭宗遷洛鼎欲歸梁柳璨希賊旨陷害舊族詔圖入朝圖懼見誅力疾至洛陽謁見之日墮笏失儀旨趣極野璨知不可屈詔曰司空圖俊造登科朱紫升籍既養高以傲代類移山以釣名心惟樂于漱流仕非專於祿食匪夷匪惠難居公正之朝載省載思當徇棲衡之志可放還山圖有先人別墅在中條山之王官谷泉石林亭頗稱幽棲之趣自考槃高臥日與名僧高士遊詠其中晚年為文尤事放達嘗擬白居易醉吟傳為休休亭記曰司空氏禎貽溪之休休亭本名濯纓亭為陝軍所焚天復癸亥歲復葺於壞垣之中乃更名曰休休休休也美也既休而具美存焉蓋量其才一宜休揣其分二宜休耄且聵三宜休又少而惰長而率老而迂是三者皆非濟時之用又宜休也尚慮多難不能自信既而晝寢遇二僧謂予曰吾嘗為汝師汝昔矯於道銳而不固為利慾之所拘幸悟而悔將復從我於是溪耳且汝雖退亦嘗為匪人之所嫉宜耐辱自警庶保其終始與靖節醉吟第其品級於千載之下復何求哉因為耐辱居士歌題於東北楹曰咄咄休休休莫莫莫伎倆雖多性靈惡賴是長教閑處着休休休莫莫莫一局棋一爐藥天意時情可料度白日偏催快活人黃金難買堪騎鶴若曰爾何能答云耐辱莫其詭激嘯傲多此類也圖既脫柳璨之禍還山乃預為壽藏終制故人來者引之壙中賦詩對酌人或難色圖規之曰達人大觀幽顯一致非止暫遊此中公何不廣哉圖布衣鳩杖出則以女家人鸞臺自隨歲時村社雩祭祠禱鼓舞會集圖必造之與野老同席曾無傲色王重榮父子兄弟尤重之伏臘饋遺不絕於途唐祚亡之明年聞輝王遇弒于濟陰不懌而疾數日卒時年七十二有文集三十卷圖無子以其甥荷為嗣荷官至永州刺史以甥為嗣嘗為御史所彈昭宗不之責贊曰國之華彩人文化成間代傑出奮藻摛英騏驥逸步咸韶正聲燦流緗素下視姬嬴
