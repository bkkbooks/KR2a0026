body:
  text: 舊唐書卷一百五十二列傳第一百二馬璘郝廷玉王栖曜子茂元劉昌子士涇李景略張萬福高固郝玼段佐史敬奉野詩良輔附馬璘扶風人也祖正會右威衞將軍父晟右司禦率府兵曹參軍璘少孤落拓不事生業年二十餘讀馬援傳至大丈夫當死於邊野以馬革裹尸而歸慨然歎曰豈使吾祖勳業墜于地乎開元末杖劍從戎自効於安西以前後奇功累遷至左金吾衛將軍同正至德初王室多難璘統甲士三千自二庭赴于鳳翔肅宗奇之委以東討殄寇陝郊破賊河陽皆立殊効嘗從李光弼攻賊洛陽史朝義自領精卒拒王師于北邙營壘如山旌甲耀日諸將愕眙不敢動璘獨率所部橫戈而出入賊陣者數四賊因披靡潰去副元帥李光弼壯之曰吾用兵三十年未見以少擊眾有雄捷如馬將軍者遷試太常卿明年蕃賊寇邊詔璘赴援河西廣德初僕固懷恩不順誘吐蕃入寇代宗避狄陝州璘即日自河右轉鬬戎虜間至于鳳翔時蕃軍雲合鳳翔節度使孫志直方閉城自守璘乃持滿外向突入懸門不解甲背城出戰吐蕃奔潰璘以勁騎追擊俘斬數千計血流于野由是雄名益振代宗還宮召見慰勞之授兼御史中丞永泰初拜四鎮行營節度兼南道和蕃使委之禁旅俾清殘寇俄遷四鎮北庭行營節度及邠寧節度使兼御史大夫旋加檢校工部尚書以犬戎浸驕歲犯郊境涇州最鄰戎虜乃詔璘移鎮涇州兼權知鳳翔隴右節度副使涇原節度涇州刺史四鎮北庭行營節度使如故復以鄭滑二州隸之璘詞氣慷慨以破虜為己任既至涇州分建營堡繕完戰守之具頻破吐蕃以其生口俘馘來獻前後破吐蕃約三萬餘眾在涇州令寬而肅人皆樂為之用鎮守凡八年雖無拓境之功而城堡獲全虜不敢犯加檢校右僕射上甚重之遷檢校左僕射知省事詔宰臣百僚於尚書省送上進封扶風郡王璘雖生於士族少無學術忠而能勇武幹絕倫艱難之中頗立忠節中興之猛將也年五十六大曆十二年卒德宗悼之廢朝贈司徒璘久將邊將屬西蕃寇擾國家倚為屏翰前後賜與無算積聚家財不知紀極在京師治第舍尤為宏侈天寶中貴戚勳家已務奢靡而垣屋猶存制度然衞公李靖家廟已為嬖臣楊氏馬矣及安史大亂之後法度隳弛內臣戎帥競務奢豪亭館第舍力窮乃止時謂木妖璘之第經始中堂費錢二十萬貫他室降等無幾及璘卒於軍子弟護喪歸京師士庶觀其中堂或假稱故吏爭往赴弔者數十百人德宗在東宮宿聞其事及踐祚條舉格令第舍不得踰制仍詔毀璘中堂及內官劉忠翼之第璘之家園進屬官司自後公卿賜宴多於璘之山池子弟無行家財尋盡郝廷玉者驍勇善格鬬事太尉李光弼為帳中愛將乾元中史思明再陷洛陽光弼拔東都之師保河陽時三城壁壘不完芻粮不支旬日賊將安太清等率兵數萬四面急攻光弼懼賊勢西犯河潼極力保孟津以掎其後晝夜嬰城血戰不解將士夷傷光弼召諸將訊之曰賊黨何面難抗或對曰西北隅最為勍敵乃亟召廷玉謂之曰兇渠攻西北者難奈爾為我決勝而還辭曰廷玉所領步卒也願得騎軍五百光弼以精騎三百授之光弼法令嚴峻是日戰不利而還者不解甲斬之廷玉奮命先登流矢雨集馬傷不能軍而退光弼登堞見之駭然曰廷玉奔還吾事敗矣促令左右取廷玉首來廷玉見使者曰馬中毒箭非敗也光弼命易馬而復徑騎衝賊陣馳突數四俄而賊黨大敗於河壖廷玉擒賊將徐璜而還由是賊解中潬之圍信宿退去前後以戰功累授開府儀同三司試太常卿封安邊郡王從光弼鎮徐州光弼薨代宗用為神策將軍永泰初僕固懷恩誘吐蕃迴紇入犯京畿分命諸將屯於要害廷玉與馬璘率五千人屯於渭橋西宀羔底觀軍容使魚朝恩以廷玉善陣欲觀其教閱廷玉乃於營內列部伍鳴鼓角而出分而為陣箕張翼舒乍離乍合坐作進退其眾如一朝恩歎曰吾在兵間十餘年始見郝將軍之訓練耳治戎若此豈有前敵耶廷玉悽然謝曰此非末校所長臨淮王之遺法也太尉善御軍賞罰當功過每校旗之日軍士小不如令必斬之以徇由是人皆自効而赴蹈馳突有心破膽裂者太尉薨變已來無復校旗之事此不足軍容見賞王縉為河南副元帥詔以廷玉為其都知兵馬使累授秦州刺史大曆八年卒追錄舊勳贈工部尚書王栖曜濮州濮陽人也初遊鄉學天寶末安祿山叛尚衡起義兵討之以栖曜為牙將下袞鄆諸縣軍威稍振進為衙前總管初逆將邢超然據曹州栖曜攻之超然乘城號令栖曜曰彼可取也一箭殞之城中氣懾遂拔曹州及衡居節制授右威衞將軍先鋒遊奕使隨衡入朝授試金吾衞將軍上元元年王璵為浙東節度使奏為馬軍兵馬使廣德中草賊袁晁起亂台州連結郡縣積眾二十萬盡有浙江之地御史中丞袁東討奏栖曜與李長為偏將聯日十餘戰生擒袁晁收復郡邑十六授常州別駕浙西都知兵馬使時江左兵荒詔內常侍馬日新領汴滑軍五千鎮之日新貪暴賊蕭庭蘭乘人怨訴逐之而劫其眾時栖曜遊奕近郊為賊所脅進圍蘇州栖曜因其懈怠挺身登城率城中兵復出擊賊其眾大潰遷試金吾大將軍李靈曜叛于汴州浙西觀察使李涵俾栖曜將兵四千為河南掎角以功加銀青光祿大夫累加至御史中丞李希烈既陷汴州乘勝東侵連陷陳留雍邱頓軍寧陵期襲宋州浙西節度使韓滉命栖曜將強弩數千夜入寧陵希烈不之知晨朝弩矢及希烈坐幄希烈驚曰此江淮弩士入矣遂不敢東去貞元初拜左龍武大將軍旋授鄜坊丹延節度觀察使檢校禮部尚書兼御史大夫貞元十九年卒於位子茂元茂元幼有勇略從父征伐知名元和中為右神策將軍大和中檢校工部尚書廣州刺史嶺南節度使在安南招懷蠻落頗立政能南中多異貨茂元積聚家財鉅萬計李訓之敗中官利其財掎摭其事言茂元因王涯鄭注見用茂元懼罄家財以賂兩軍以是授忠武軍節度陳許觀察使會昌中為河陽節度使是時河北諸軍討劉稹茂元亦以本軍屯天井賊未平而卒劉昌字公明汴州開封人也出自行間少學騎射及安祿山反昌始從河南節度張介然授易州遂城府左果毅及史朝義遣將圍宋州昌在圍中連月不解城中食盡賊垂將陷之刺史李岑計蹙昌為之謀曰今河陽有李光弼制勝且江淮足兵此廩中有數千斤麴可以屑食計援兵不二十日當至東南隅之敵眾以為危昌請守之昌遂被鎧持盾登城陳逆順以告諭賊賊眾畏服後十五日副元帥李光弼救軍至賊乃宵潰光弼聞其謀召置軍中超授試左金吾衞郎將光弼卒宰臣王縉令歸宋州為牙門將轉太僕卿兼許州別駕李靈曜據汴州叛刺史李僧惠將受靈曜牽制昌密遣曾神表潛說僧惠僧惠召昌問計昌泣陳其逆順僧惠感之乃使神表齎表詣闕請討靈曜遂翦靈曜左翼汴州平李忠臣嫉僧惠功遂欲殺昌昌潛遁及劉玄佐為刺史乃復其職又轉太常卿兼華州別駕玄佐尋為宋亳潁宣武軍節度使昌自下軍為左廂兵馬使李納反以師收考城充行營諸軍馬步都虞候加檢校太子詹事兼御史中丞明年玄佐圍濮州昌攝濮州刺史李希烈既陷汴州玄佐遣將高翼以精兵五千保援襄邑城陷翼赴水死自宋及江淮人心震恐時昌以三千人守寧陵希烈率五萬眾陣于城下昌深塹以遏地道凡四十五日不解甲冑躬勵士卒大破希烈希烈解圍攻陳州刺史李公廉計窮昌從劉玄佐以浙西兵合三萬人救之至陳州西五十里與賊遇昌晨壓其陣及未成列大破之生擒其將翟曜希烈退保蔡州自此不復侵軼詔加檢校左散騎常侍隨玄佐收汴州加檢校工部尚書增實封通前二百戶丁母憂起復加金吾衞大將軍贈其母梁國夫人貞元三年玄佐朝京師上因以宣武士眾八千委昌北出五原軍中有前却沮事昌繼斬三百人遂行尋以本官授京西北行營節度使歲餘授涇州刺史充四鎮北庭行營兼涇原節度支度營田等使昌躬率士眾力耕三年軍食豐羨名聞闕下復築連雲堡受詔城平涼以扼彈箏峽口昌命徒庀事旬餘而畢又於平涼西別築胡谷堡名曰彰信平涼當四會之衝居北地之要分兵援戍遏其要衝遂以保寧邊鄙加檢校右僕射昌初至平涼劫盟之所收聚亡歿將士骸骨坎瘞之因感夢於昌有愧謝之意昌上聞德宗下詔深自克責遣秘書少監孔述睿及中使以御饌內造衣服數百襲令昌收其骸骨分為大將三十人將士百人各具棺槥衣服葬於淺水原建二塚大將曰旌義塚將士曰懷忠塚詔翰林學士撰銘志祭文昌盛陳兵設幕次具牢饌祭之昌及大將皆素服臨之焚其衣服紙錢別立二石堆題以塚名諸道師徒莫不感泣昌在西邊僅十五年強本節用軍儲豐羨及嬰疾約以是日赴京求醫未發而卒年六十四廢朝一日贈司空子士涇士涇德宗朝尚主官至少列十餘年家富於財結託中貴交通權倖憲宗朝遷太府卿制下給事中韋弘景等封還制書言士涇不合居九卿辭語激切憲宗謂弘景曰士涇父有功於國又是戚屬制書宜下弘景奉昭士涇善胡琴多遊權倖之門以此為之助時論鄙之李景略幽州良鄉人也大父楷固父承悅檀州刺史密雲軍使景略以門蔭補幽州功曹大曆末寓居河中闔門讀書李懷光為朔方節度招在幕府五原有偏將張光者挾私殺妻前後不能斷光富於財貨獄吏不能劾景略訊其實光竟伏法既而亭午有女厲被髮血身膝行前謝而去左右有識光妻者曰光之妻也因授大理司直遷監察御史及懷光屯軍咸陽反狀始萌景略時說懷光請復宮闕迎大駕懷光不從景略出軍門慟哭曰誰知此軍一日陷於不義軍士相顧甚義之因退歸私家尋為靈武節度杜希全辟在幕府轉殿中侍御史兼豐州刺史西受降城使豐州北扼迴紇迴紇使來中國豐乃其通道前為刺史者多懦弱虜使至則敵禮抗坐時迴紇遣梅錄將軍隨中官薛盈珍入朝景略欲以氣制之郊迎傳言欲先見中使梅錄初未喻景略既見盈珍乃使謂梅錄曰知可汗初沒欲申弔禮乃登高壠位以待之梅錄俯僂前哭景略因撫之曰可汗棄代助爾號慕虜之驕容威氣索然盡矣遂以父行呼景略自此迴紇使至景略皆拜之于庭由是有威名杜希全忌之上表誣奏貶袁州司馬希全死徵為左羽林將軍對于延英殿奏對衎衎有大臣風彩時河東李說有疾詔以景略為太原少尹節度行軍司馬時方鎮節度使少徵入換代者皆死亡乃命焉行軍司馬盡簡自上意受命之日人心以屬景略居疑帥之地勢已難處迴紇使梅錄將軍入朝說置宴會梅錄爭上下坐說不能遏景略叱之梅錄前過豐州者也識景略語音疾趨前拜曰非豐州李端公耶不拜麾下久矣何其瘠也又拜遂命之居次坐將吏賓客顧景略悉加嚴憚說心不平厚賂中尉竇文場將去景略使為內應歲餘風言迴紇將南下陰山豐州宜得其人上素知景略在邊時事上方軫慮文場在旁言景略堪為邊任乃以景略為豐州刺史兼御史大夫天德軍西受降城都防禦使迫塞苦寒土地鹵瘠俗貧難處景略節用約己與士同甘苦將卒安之鑿咸應永清二渠溉田數百頃公私利焉廩儲備器械具政令肅智略明二歲後軍聲雄冠北邊迴紇畏之天下皆惜其理未盡景略之能貞元二十年卒於鎮年五十五贈工部尚書張萬福魏州元城人自曾祖至其父皆明經止縣令州佐萬福以父祖業儒皆不達不喜為書生學騎射年十七八從軍遼東有功為將而還累攝舒廬壽三州刺史舒廬壽三州都團練使州送租賦詣京師至潁州界為盜所奪萬福領輕兵馳入潁州界討之賊不意萬福至忙迫不得戰萬福悉聚而誅之盡得其所亡物并得前後所掠人妻子財物牛馬等萬計悉還其家不能自致者萬福給船乘以遣之尋真拜壽州刺史淮南節度副使為節度使崔圓所忌失刺史改鴻臚卿以節度副使將千人鎮壽州萬福不以為恨許杲以平盧行軍司馬將卒三千人駐濠州不去有窺淮南意圓令萬福攝濠州刺史杲聞即提卒去止當塗陳莊賊陷舒州圓又以萬福為舒州刺史督淮南岸盜賊連破其黨大曆三年召赴京師代宗謂曰聞卿名久欲一識卿面且將累卿以許杲萬福拜謝因前奏曰陛下以一許杲召臣如河北諸將叛欲以屬何人代宗笑謂曰且與吾了許杲事方當大用卿以為和州刺史行營防禦使督淮南岸盜賊至州杲懼移軍上元杲至楚州大掠節度使韋元甫命萬福追討之未至淮陰杲為其將康自勸所逐自勸擁兵繼掠循淮而東萬福倍道追而殺之免者十二三盡得其虜掠金帛婦人等皆送致其家元甫將厚賞將士萬福曰官健常虛費衣糧無所事今乃一小賴之不足過賞請用三之一代宗發詔以勞之賜衣一襲宮錦十雙久之詔以本鎮之兵千五百人防秋西京萬福詣揚州交所領兵會元甫死諸將皆願得萬福為帥監軍使米重耀亦請萬福知節度事萬福曰某非幸人勿以此相待遂去之帶利州刺史鎮咸陽因留宿衞李正己反將斷江淮路令兵守埇橋渦口江淮進奏舡千餘隻泊渦下不敢過德宗以萬福為濠州刺史召見謂曰先帝改卿名正者所以褒卿也朕以為江淮草木亦知卿威名若從先帝所改恐賊不知是卿也復賜名萬福馳至渦口立馬岸上發進奉舡淄青兵馬倚岸睥睨不敢動諸道舡繼進改泗州刺史魏州飢父子相賣餓死者接道萬福曰魏州吾鄉里安可不救令其兄子將米百車往饟之又使人於汴口魏人自賣者給車牛贖而遣之為杜亞所忌徵拜右金吾將軍召見德宗驚曰杜亞言卿昏耄卿乃如是健耶詔圖形於淩煙閣數賜酒饌衣服并敕度支籍口畜給其費及陽城等於延英門外請對論事伏閤不去德宗大怒不可測萬福揚言曰國有直臣天下太平矣萬福年已八十見此盛事閤前徧揖城等天下益重其名貞元二十一年以左散騎常侍致仕其年五月卒年九十萬福自始從軍至卒祿食七十餘年未嘗病一日典九郡皆有惠愛在泗州時遇德宗幸奉天李希烈反陳少遊悉令管內刺史送妻子在揚州以為質萬福獨不送謂使者曰為某白相公萬福妻老且醜不足煩相公寄意終不之遣由是為人所稱高固高祖侃永徽中為北庭安撫使有生擒車鼻可汗之功官至安東都護事具前錄固生微賤為叔父所賣展轉為渾瑊家奴號曰黃芩性敏惠有膂力善騎射好讀左氏春秋瑊大愛之養如己子以乳母之女妻之遂以固名取左氏傳高固之名也少隨瑊從戎於朔方德宗幸奉天固猶在瑊靡下是時賊兵已突入東壅門固引甲士亂揮長刀連斫數賊拽車塞闔一以當百賊乃退去眾咸壯之以功封渤海郡王李懷光既反德宗再幸梁漢懷光發跡邠寧至是使留後張昕取將士萬餘人以資援河中固時在軍中乃伺便突入張昕帳中斬首以徇拜檢校右散騎常侍前軍兵馬使貞元十七年節度使楊朝晟卒軍中請固為帥德宗念固功因授檢校工部尚書順宗即位就加檢校禮部尚書憲宗朝進檢校右僕射數年受代入為統軍轉檢校左僕射兼右羽林統軍元和四年七月卒贈陝州大都督郝玼者涇原之戍將也貞元中為臨涇鎮將勇敢無敵聲振虜庭玼以臨涇地居險要當虜要衝白其帥曰臨涇草木豐茂宜畜牧西蕃入寇每屯其地請完壘益軍以折虜之入寇前帥不從及段佐節制涇原深然其策元和三年佐請築臨涇城朝廷從之仍以為行涼州詔玼為刺史以戍之自此西蕃入寇不過臨涇玼出自行間前無堅敵在邊三十年每戰得蕃俘必刳剔而歸其屍蕃人畏之如神贊普下令國人曰有生得郝玼者賞之以等身金蕃中兒啼者呼玼名以怖之十三年檢校左散騎常侍渭州刺史御史大夫充涇原行營節度平涼鎮遏都知兵馬使封保定郡王吐蕃畏其威綱紀欲圖之朝廷慮失驍將移授慶州刺史竟終下段佐者亦以勇敢知名少事汾陽王子儀為牙將從征邊朔績効居多貞元末為涇原節度使練卒保邊亦為西蕃畏憚累至檢校工部尚書右神策大將軍元和五年卒史敬奉靈武人少事本軍為牙將元和十四年敬奉大破吐蕃於鹽州城下賜實封五十戶先是西戎頻歲犯邊敬奉白節度杜叔良請兵三千備一月粮深入蕃界叔良以二千五百人授之敬奉既行十餘日人莫知其所向皆謂吐蕃盡殺之矣乃由他道深入突出蕃眾之後戎人驚潰敬奉率眾大破之殺戮不可勝紀驅其餘眾於蘆河獲羊馬駝牛萬數敬奉形甚短小若不能勝衣至於野外馳逐能擒奔馬自執鞍勒隨鞍躍上然後羇帶矛矢在手前無強敵甥姪及僮使僅二百人每以自隨臨入敵輒分其隊為四五隨逐水草每數日各不相知及相遇已皆有獲虜矣與鳳翔將野詩良輔涇原將郝玼各以名雄邊上吐蕃嘗謂漢使曰唐國既與吐蕃和好何妄語也問曰何謂曰若不妄語何因遣野詩良輔作隴州刺史其畏憚如此史臣曰自盜起中原河隴陷虜犬戎作梗屢犯郊畿謀臣運策以竭精武士荷戈而不暇如璘昌之材力扼腕奮命欲吞虜于胸中郝史驍雄斬將搴旗將申威于塞外而竟不能北踰白道西出蕭關俾十九郡生民竟淪左袵僅能自保功何取焉雖運使時然亦將略有所未至栖曜萬福之節概景略之負氣壯哉贊曰馬劉史郝氣雄邊朔力扞獯虜終慙衞霍萬福義勇景略氣豪為人所忌慷慨徒勞
