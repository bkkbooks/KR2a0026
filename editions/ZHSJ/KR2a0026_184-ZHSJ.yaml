body:
  text: 舊唐書卷一百八十列傳第一百三十朱克融李載義楊志誠史元忠附張仲武子直方張允伸張公素李可舉李全忠子匡威匡籌朱克融賊泚之從孫也祖滔父洄克融少為幽州軍校事節度使劉總總將歸朝慮其有變籍軍中素有異志者薦之闕下時克融亦在籍中宰相崔植杜元穎不知兵且無遠略謂兩河無虞遂奏勒歸鎮長慶初幽州軍亂囚其帥張弘靖時洄廢疾於家軍中素伏其謀略至是衆欲立之洄自以老且病推克融統軍務焉朝廷尋加檢校左散騎常侍授以符節寶曆二年遣使送方鎮及三軍時服克融怒所賜疏弱執中使以聞上特優容別命中使宣諭仍改賜衣物流其使楊文端等先是克融執中使奏稱竊聞陛下欲幸東都請將兵馬并丁匠五千人修理宮闕迎候車駕又上言無衣擬於朝廷請三十萬端疋以備一歲所費不然則三軍不安天子怒其悖慢取宰臣裴度謀優容之語見別卷克融官至檢校司空吳興郡王其年五月本州軍亂殺之子延齡亦遇次子延嗣竊立尋為大將李載義所殺李載義字方穀常山愍王之後代以武力稱繼為幽州屬郡守載義少孤與鄉曲之不令者遊有勇力善挽強角觝劉濟為幽州節度使見而偉之致於親軍從征伐以功遷衙前都知兵馬使檢校光祿大夫兼監察御史寶曆中幽師殺朱克融其子延嗣竊襲父位不遵朝旨虐用其人載義遂殺之數其罪以聞敬宗嘉之拜檢校戶部尚書兼御史大夫封武威郡王充幽州盧龍等軍節度副大使知節度事未幾李同捷據滄景以邀襲父爵載義上表請討同捷以自効上嘉其誠懇特加檢校右僕射累破賊軍以功加司空進階金紫大和三年平滄景策勳加平章事仍賜實封三百戶四年奚寇邊以兵擊走之仍虜其名王就加太保五年春為其部下楊志誠所逐因入覲上以載義有平滄景之功又能恭順朝旨冊拜太保同平章事其年改山南西道節度觀察等使兼興元尹七年遷北都留守兼太原尹充河東節度觀察處置等使尋加開府儀同三司丁母憂起復驃騎大將軍餘如故迴鶻每遣使入朝所至強暴邊城長吏多務苟安不敢制之以法但嚴兵防守虜益驕悍或突入市肆暴橫無所憚至是有迴鶻將軍李暢者曉習中國事知不能以法制馭益驕恣鞭捶驛吏貪求無已載義因召李暢與語曰可汗使將軍朝貢以固舅甥之好不當使將軍暴踐中華今朝廷饔餼至厚所以禮蕃客也苟有不至吏當坐死若將軍之部伍不戢凌侮上國剽掠廬舍載義必殺為盜者將軍勿以法令可輕而不戒勵之遂罷防守之兵而使兩卒司其門虜知其不為下無敢犯令九年加侍中開成二年卒年五十贈太尉載義晚年驕恣慘暴一方以楊志誠復為部下所逐過太原載義躬自毆擊遂欲殺以賴從事救解以免然而擅殺志誠之妻孥及將卒朝廷錄其功屈法不問楊志誠大和五年為幽州後院副兵馬使事李載義時朝廷賜載義德政碑文載義延中使擊鞠志誠亦與焉遂於鞠場叫呼謀亂載義奔於易州志誠乃為本道馬步都知兵馬使文宗聞之驚急召宰臣時牛僧孺先至上謂曰幽州今日之事可奈何僧孺曰此不足煩聖慮臣被召疾趨氣促容臣稍緩息以對上良久曰卿以為不足憂何也僧孺對曰陛下以范陽得失繫國家休戚耶且自安史之後范陽非國家所有前時劉總向化以土地歸闕朝廷約用錢八十萬貫而未嘗得范陽尺布斗粟上供天府則今日志誠之得猶前日載義之得也陛下但因而撫之亦事之宜也且范陽國家所賴者以其北捍突厥不令南寇今若假志誠節鉞惜其土地必自為力則爪牙之用固不計於逆順臣固曰不足煩聖慮上大喜曰如卿之言吾洗然矣尋以嘉王運遙領節度以志誠為節度觀察留後檢校左散騎常侍兼幽州左司馬尋改檢校工部尚書節度副大使知節度事七年轉檢校吏部尚書詔下進奏官徐迪詣中書白宰相曰軍中不識朝廷體位只知自尚書改僕射為遷何知工部轉吏部為美且軍士盛飾以待新恩一旦復為尚書軍中必慚今中使往彼其勢恐不得出及使至其傔奔還奏曰楊志誠怒不得僕射三軍亦有怨言春衣使魏寶義兼他使焦奉鸞尹士恭並為志誠縶留矣志誠遣將王文穎謝恩并讓官復賜官告批答文穎不受而歸朝廷納裴度言務以含垢下詔諭之因再遣使加尚書右僕射八年為三軍所逐而立史元忠元忠進志誠所造衮龍衣二副及被服鞍韀皆繡飾鸞鳳日月之形或為王字因付御史臺按問流嶺南行至商州殺之初元忠既逐志誠詔以通王淳遙領節度授元忠左散騎常侍幽州大都督府左司馬知府事充節度留後明年轉檢校工部尚書節度副大使知節度事後為偏將陳行泰所殺張仲武范陽人也仲武少業左氏春秋擲筆為薊北雄武軍使會昌初陳行泰殺節度使史元忠權主留後俄而行泰又為次將張絳所殺令三軍上表請降符節時仲武遣軍吏吳仲舒表請以本軍伐叛上遣宰臣詢其事仲舒曰絳與行泰皆是游客主軍人心不附仲武是軍中舊將張光朝之子年五十餘兼曉儒書老於戎事性抱忠義願歸心闕廷李德裕因奏陳行泰張絳皆令大將上奏邀求節旄所以必不可與今仲武上表布誠先陳密款因而拔用即似有名許之乃授兵馬留後詔撫王紘遙領節度尋改仲武節度副大使知節度事檢校工部尚書幽州大都督府長史兼御史大夫蘭陵郡王俄而迴鶻擾邊時迴鶻有特勤那頡啜擁赤心宰相一族七千帳東逼漁陽仲武遣其弟仲至與裨將游奉寰王如清等率銳兵三萬人大破之前後收其侯王貴族千餘人降三萬人獲牛馬駝旗纛罽幕不可勝計遣從事李周瞳牙門將國從玘相次獻捷詔加檢校兵部尚書兼東面招撫迴鶻使先是奚契丹皆有迴鶻監護使督以歲貢且為漢諜至是遣裨將石公緒等諭意兩部凡戮八百餘人又迴鶻初遣宜門將軍等四十七人詭詞結歡潛伺邊隙仲武使密賂其下盡得陰謀且欲馳入五原驅掠雜虜遂逗遛其使緩彼師期人馬病死竟不遣之迴鶻烏介可汗既敗不敢近邊乃依康居求活盡徙餘種寄託黑車子仲武由是威加北狄表請於薊北立紀聖功銘敕李德裕為之文其銘曰大和之初赤氣宵興開成之末彤雲暮凝異鳥南來胡滅之徵北夷掃厥國土崩逼迫遷徙震我邊鄙長蛇去穴奔鯨失水上都薊門兵連千里曾不畏天猶為驕子丐我邊穀邀我王師假我一城建彼幡旗歸計強漢郅支嫚辭狼顧朔野伏莽見羸雁門之北羌戎雜處濈濈羣羊茫茫大鹵縱其梟騎驚我牧圉暴若豺狼疾如風雨皇赫斯怒羽檄徵兵謀而泉默斷乃霆聲沉機變化動合神明沙漠之外虜無隱情漁陽突騎燕歌壯氣赳赳元戎眈眈虎視金鼓誓衆干旄蔽地爰命其弟屬之大事翩翩飛將董我三軍稟兄之制代帥之勤威略火烈胡馬星分戈迴白日劍薄浮雲天街之北旄頭已落絕轡之野蚩尤未縛俾我元侯恢弘遠略終取單于係之徽索陰山寢鋒亭徼弢弓萬里昆夷九譯而通蠻夷既同天子之功儒臣篆美刊石垂鴻仲武歷官至司徒中書門下平章事大中年卒諡曰莊子直方以幽州節度副使襲父位動多不法慮為將卒所圖三年冬託以遊獵奔赴闕庭尋授金吾將軍直方性率暴行豪奪之事以罪累貶柳州司馬十一年遷右驍衞將軍分司東都咸通中位至羽林統軍中和歲賊巢犯闕公卿恃其豪多隱藏於第直方納招亡命謀欲劫巢或有告者由是以兵圍而害之張允伸字逢昌范陽人也曾祖秀檀州刺史祖巖納降軍使父朝掖贈太尉允伸世仕幽州軍門累職至押衙兼馬步都知兵馬使大中四年戎帥周綝寢疾表允伸為留後朝廷可其奏加右散騎常侍其年冬詔賜旌節遷檢校工部尚書咸通九年累加至光祿大夫檢校司徒兼太傅同中書門下平章事燕國公十年徐人作亂請以弟允臯領兵伐叛懿宗不允進助軍米五十萬石鹽二萬石詔嘉之賜以錦綵玉帶金銀器等冬又加特進兼侍中十二年以風恙拜章請就醫藥詔許之以子簡會檢校工部尚書充節度副大使十三年允伸再上表進納所賜旌節朝命未至其年正月二十五日卒年八十八冊贈太尉諡曰忠烈允伸領鎮凡二十三年克勤克儉比歲豐登邊鄙無虞軍民用至今談者美之有子十四人簡真幽府左司馬先允伸卒簡壽右領軍衞大將軍餘或升朝籍或為刺史郡佐張公素范陽人咸通中為幽州軍校事張允伸累遷至平州刺史允伸卒子簡會權主留後事公素領本郡兵赴焉三軍素畏公素威望簡會知力不能制即時出奔遂立為帥朝廷尋授旌節累加至中書門下平章事無幾李茂勳奪其位公素歸闕貶復州司戶參軍李可舉本迴鶻阿布思之族也張仲武破迴鶻可舉父茂勳與本部侯王降焉茂勳善騎射性沉毅仲武器之常遣拓邊以功封郡王賜姓名咸通末納降軍使陳貢言者幽之宿將人所信服茂勳密謀劫而殺之聲云貢言舉兵張公素以兵逆擊不利公素走茂勳入城軍民方知其非貢言也既有其衆遂推而立之朝廷即降符節無幾以疾告老授右僕射致仕表可舉自節度副使幽州左司馬加右散騎常侍為節度留後中和中累官至檢校太尉中和末以太原李克用兵勢方盛與定州王處存密相締結可舉慮其窺伺山東終為己患遂遣使搆雲中赫連鐸乘其背則與鎮州合謀舉兵兼言易定是燕趙之餘云得其地則正其疆理而分之時可舉遣將李全忠攻易州有次將劉仁恭者多權數攻之彌月不下乃穴地道以入其城既下易州士卒稍驕王處存引輕軍三千以羊皮蒙之夜伏於城外仍別於間道以騎士伺之燕軍望見謂之羣羊爭趨焉處存乘其無部伍一擊大敗之尋復其城全忠遁歸懼可舉罪之收其餘衆反攻幽州可舉危急收集其族登樓自燔而死李全忠范陽人廣明中為棣州司馬有蘆生于室一尺三節心惡之謂別駕張建曰吾室生蘆無乃怪歟建曰蘆茅類得澤而滋公家有茅土之慶殆天意乎其生三節必傳節鉞者三人公勉樹功名無忘斯言全忠秩滿還鄉里事節度使李可舉為牙將時可舉兵鋒方盛欲與鎮人分易定遣全忠將兵攻之為定州軍大敗於易水全忠懼率其餘衆掩攻幽州可舉死三軍推全忠為留後朝廷因以節鉞授之光啟元年春也全忠卒子匡威自襲父位稱留後匡威素稱豪爽屬遇亂離繕甲燕薊有吞四海之志赫連鐸據雲中屢引匡威與河東爭雲代交兵積年景福初鎮州王鎔誘河東將李存孝克用怒加兵討之時鎔童幼求援於燕匡威親率軍應之二年春河東復出師井陘鎔再乞師匡威來援匡威弟匡籌妻張氏有國色師將發家人會別匡威酒酣留張氏報之匡籌私懷忿怒匡威軍至博野匡籌乃據城自為節度匡威部下聞之亡歸者半匡威退無歸路將入覲京師時匡威留於深州遣判官李抱貞奉章以聞屬京師大亂之後聞匡威來朝市人震恐咸曰金頭王來謀社稷士庶有亡竄山谷者匡威其實不行欲圖鎮州示無留意鎔以匡威再來援己致其失師遣使迎歸府第父事之匡威為鎔城郛繕甲指陳方略視鎔如子每陰謀驟施以悅人心鎮之三軍素忠於王氏惡其所為會鎔過匡威第慰忌辰匡威縞衣裹甲伏兵劫鎔入牙城鎔兵逆戰燔東偏門軍士呼譟登屋矢下如雨鎔僕墨君和亂中扶鎔登屋免難而斬匡威以徇是歲匡籌出師攻鎮之樂壽武強以報恥匡威部曲劉仁恭歸於河東乾寧元年冬河東聽仁恭之謀出師進討二月敗燕軍於居庸匡籌挈其族遁去將赴京師至景城為滄州節度使盧彥威所殺掠其輜車妓妾匡籌妻張氏產於路不能進劉仁恭獲之獻於李克用後立為夫人嬖寵專房李氏父子三葉十年而亡史臣曰大都偶國亂之本也故古先哲王建國公侯之封不過千乘所以強幹弱枝防其悖慢彼幽州者列九圍之一地方千里而遙其民剛強厥田沃壤遠則慕田光荊卿之義近則染祿山思明之風二百餘年自相崇樹雖朝廷有時命帥而土人多務逐君習苦忘非尾大不掉非一朝一夕之故也若李載義張仲武張允伸因利乘便獲領旌旗以仁守之恭順朝旨亦足多也如朱克融楊志誠史元忠張公素李可舉李全忠以不仁得之靡更曩志或尋為篡奪或僅傳子孫咸非令終蓋其宜也贊曰碣石之野氣勁人豪二百餘載自相尊高載義仲武亦多忠勞餘因篡得不仁何逃
