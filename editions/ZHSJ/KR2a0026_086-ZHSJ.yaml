body:
  text: 舊唐書卷八十二列傳第三十二許敬宗李義府少子湛許敬宗杭州新城人隋禮部侍郎善心子也其先自高陽南渡世仕江左敬宗幼善屬文舉秀才授淮陽郡司法書佐俄直謁者臺奏通事舍人事江都之難善心為宇文化及所害敬宗流轉投於李密密以為元帥府記室與魏徵同為管記武德初赤牒擬漣州別駕太宗聞其名召補秦府學士貞觀八年累除著作郎兼修國史遷中書舍人十年文德皇后崩百官縗絰率更令歐陽詢狀貌醜異衆或指之敬宗見而大笑為御史所劾左授洪州都督府司馬累遷給事中兼修國史十七年以修武德貞觀實錄成封高陽縣男賜物八百段權檢校黃門侍郎高宗在春宮遷太子右庶子十九年太宗親伐高麗皇太子定州監國敬宗與高士廉等共知機要中書令岑文本卒於行所令敬宗以本官檢校中書侍郎太宗大破遼賊於駐蹕山敬宗立於馬前受旨草詔書詞彩甚麗深見嗟賞先是庶人承乾廢黜宮僚多被除削久未收敬宗上表曰臣聞先王慎罰務在於恤刑往哲寬仁義在於宥過聖人之道莫尚于茲竊見廢宮官僚五品以上除名棄斥頗歷歲時但庶人疇昔之年身處不疑之地苞藏悖逆陰結宰臣所預姦謀多連宗戚禍生慮表非可防萌宮內官僚迥無關預今乃投鼠及器孰謂無冤焚山毀玉稍同遷怒伏尋先典例有可原昔吳國陪臣則爰絲不坐於劉濞昌邑中尉則王吉免緣於海昏譬諸欒布乃策名於彭越比乎田叔亦委質於張敖主以凶逆陷其誅夷臣以賢良荷彼收擢歷觀往代此類尤多近者有隋又遵斯義楊勇之廢罪止加於佞人李綱之徒皆不預於刑網古今裁其折衷史籍稱為美談而今張玄素令狐德棻趙弘智裴宣機蕭鈞等並砥節勵操有雅望於當朝經明行修播令名於天下或以直言而遭箠扑或以忤意而見猜嫌一概雷同並罹天憲恐於王道傷在未弘由是玄素等稍得用二十一年加銀青光祿大夫高宗嗣位代于志寧為禮部尚書敬宗嫁女與蠻酋馮盎之子多納金寶為有司所劾左授鄭州刺史永徽三年入為衞尉卿加弘文館學士兼修國史六年復拜禮部尚書高宗將廢皇后王氏而立武昭儀敬宗特贊成其計長孫無忌褚遂良韓瑗等並直言忤旨敬宗與李義府潛加誣構並流死於嶺外顯慶元年加太子賓客尋冊拜侍中監修國史三年進封郡公尋贈其父善心為冀州刺史高宗因於古長安城遊覽問侍臣曰朕觀故城舊基宮室似與百姓雜居自秦漢已來幾代都此敬宗對曰秦都咸陽郭邑連跨渭水故云渭水貫都以象天河至漢惠帝始築此城其後苻堅姚萇後周並都之帝又問昆明池是漢武帝何年中開鑿敬宗對曰武帝遣使通西南夷而為昆明滇池所閉欲伐昆明國故因鎬之舊澤以穿此池用習水戰元狩三年事也帝因令敬宗與弘文館學士具檢秦漢已來歷代宮室處所以奏其年代李義府為中書令任遇之重當朝莫比龍朔二年從新令改為右相加光祿大夫三年冊拜太子少師同東西臺三品並依舊監修國史乾封初以敬宗年老不能行步特令與司空李勣每朝日各乘小馬入禁門至內省敬宗自掌知國史記事阿曲初虞世基與敬宗父善心同為宇文化及所害封德彝時為內史舍人備見其事因謂人曰世基被誅世南匍匐而請代善心之死敬宗舞蹈以求生人以為口實敬宗深銜之及為德彝立傳盛加其罪惡敬宗嫁女與左監門大將軍錢九隴本皇家隸人敬宗貪財與婚乃為九隴曲門閥妄加功績并升與劉文靜長孫順德同卷敬宗為子娶尉遲寶琳孫女為妻多得賂遺及作寶琳父敬德傳悉為隱諸過咎太宗作威鳳賦以賜長孫無忌敬宗改云賜敬德白州人龐孝泰蠻酋凡品率兵從征高麗賊知其懦襲破之敬宗又納其寶貨稱孝泰頻破賊徒斬獲數萬漢將驍健者唯蘇定方與龐孝泰耳曹繼叔劉伯英皆出其下虛美隱惡如此初高祖太宗兩朝實錄其敬播所修者頗多詳直敬宗又輒以己愛憎曲事刪改論者尤之然自貞觀已來朝廷所修五代史及晉書東殿新書西域圖志文思博要文館詞林累璧瑤山玉彩姓氏錄新禮皆總知其事前後賞賚不可勝紀敬宗好色無度其長子昂頗有才藻歷位太子舍人母裴氏早卒裴侍婢有姿色敬宗嬖之以為繼室假姓虞氏昂素與通烝之不絕敬宗怒黜虞氏加昂以不孝奏請流于嶺外顯慶中表乞昂還除虔化令尋卒咸亨元年抗表乞骸骨詔聽致仕仍加特進俸祿如舊三年薨年八十一高宗為之舉哀廢朝三日詔文武百官就第赴哭冊贈開府儀同三司揚州大都督陪葬昭陵文集八十卷太常將定諡博士袁思古議曰敬宗位以才昇歷居清級然棄長子於荒徼嫁少女於夷落聞詩學禮事絕於趨庭納采問名唯聞於黷貨白圭斯玷有累清塵易名之典須憑實行按諡法名與實爽曰繆請諡為繆敬宗孫太子舍人彥伯不勝其恥與思古大相忿競又稱思古與許氏先有嫌隙請改諡官太常博士王福畤議曰諡者飾終之稱也得失一朝榮辱千載若使嫌隙是實即合據法推繩如其不虧直道義不可奪官不可侵二三其德何以言禮福畤忝當官守匪躬之故若順風阿意背直從曲更是甲令虛設將謂禮院無人何以激揚雅道顧視同列請依思古諡議為定戶部尚書戴至德謂福畤曰高陽公任遇如此何以定諡為繆答曰昔晉司空何曾薨太常博士秦秀諡為繆醜公何曾既忠且孝徒以日食萬錢所以貶為繆醜況敬宗忠孝不逮於曾飲食男女之累有逾於何氏而諡之為繆無負於許氏矣時有詔令尚書省五品已上重議禮部尚書楊思敬議稱按諡法既過能改曰恭請諡曰恭詔從其議彥伯昂之子起家著作郎敬宗末年文筆多令彥伯代作又納婢妾讒言奏流於嶺表後遇赦得還除太子舍人早卒有集十卷李義府瀛州饒陽人也其祖為梓州射洪縣丞因家於永泰貞觀八年劍南道巡察大使李大亮以義府善屬文表薦之對策擢第補門下省典儀黃門侍郎劉洎持書御史馬周皆稱薦之尋除監察御史又敕義府以本官兼侍晉王及昇春宮除太子舍人加崇賢館直學士與太子司議郎來濟俱以文翰見知時稱來李義府嘗獻承華箴其辭曰邃初冥昧元氣氤氳二儀始闡三才既分司乾立宰出震為君化昭淳朴道映典墳功成揖讓事極華勛肇興夏啟降及姬文咸資繼德永樹高芬百代沿襲千齡奉聖粵若我后丕承寶命允穆三階爰齊七政時雍化洽風移俗盛載崇國本式延家慶震維標德離言體正寄切宗祧事隆監撫思皇茂則敬詢端輔業光啟誦藝優干羽九載崇儒三朝問豎歷選儲儀遺文在斯望試登俎高諭喬枝俯容思順非禮無施前修盛業來哲通規飭躬是蹈則叡問風馳立志或爽則玄猷日虧無恃尊極修途難測無恃親賢失德靡全勿輕小善積小而名自闢勿輕微行累微而身自正佞諛有類邪巧多方其萌不絕其害必彰監言斯屏儲業攸昌竊惟令嗣有殊前事雖以貴以賢而非長非次皇明睠德超倫作貳匪懋聲華莫酬恩異匪崇徽烈莫符天志勉之又勉光茲守器下臣司箴敢告近侍太子表上其文優詔賜帛四十匹又令預撰晉書高宗嗣位遷中書舍人永徽二年兼修國史加弘文館學士高宗將立武昭儀為皇后義府嘗密申協贊尋擢拜中書侍郎同中書門下三品監修國史賜爵廣平縣男義府貌狀溫恭與人語必嬉怡微笑而褊忌陰賊既處權要欲人附己微忤意者輒加傾陷故時人言義府笑中有刀又以其柔而害物亦謂之李貓顯慶元年以本官兼太子右庶子進爵為侯有洛州婦人淳于氏坐姦繫於大理義府聞其姿色囑大理丞畢正義求為別宅婦特為雪其罪卿段寶玄疑其故遽以狀聞詔令按其事正義惶懼自縊而死侍御史王義方廷奏義府犯狀因言其初容貌為劉洎馬周所幸由此得進言詞猥帝怒出義方為萊州司戶而不問義府姦濫之罪義府云王御史妄相彈奏得無愧乎義方對云仲尼為魯司寇七日誅少正卯於兩觀之下義方任御史旬有六日不能去姦邪於雙闕之前實以為愧尋兼太子左庶子二年代崔敦禮為中書令兼檢校御史大夫監修國史學士並如故尋加太子賓客進封河間郡公三年又追贈其父德晟為魏州刺史諸子孩抱者並列清官詔為造甲第榮寵莫之能比而義府貪冒無厭與母妻及諸子女婿賣官鬻獄其門如市多引腹心廣樹朋黨傾動朝野初杜正倫為中書侍郎義府時任典儀至是乃與正倫同為中書令正倫每以先進自處不下義府而中書侍郎李友益密與正倫共圖議義府更相伺察義府知而密令人封奏其事正倫與義府訟於上前各有曲直上以大臣不和兩責之左貶義府為普州刺史正倫為橫州刺史友益配流峯州四年復召義府兼吏部尚書同中書門下三品自餘官封如故龍朔元年丁母憂去職二年起復為司列太常伯同東西臺三品義府尋請改葬其祖父營墓於永康陵側三原令李孝節私課丁夫車牛為其載土築墳晝夜不息於是高陵櫟陽富平雲陽華原同官涇陽等七縣以孝節之故懼不得已悉課丁車赴役高陵令張敬業恭勤怯懦不堪其勞死於作所王公已下爭致贈遺其羽儀導從輶器服並窮極奢侈又會葬車馬祖奠供帳自灞橋屬於三原七十里間相繼不絕武德已來王公葬送之盛未始有也義府本無藻鑑才怙武后之勢專以賣官為事銓序失次人多怨讟時殷王初出閤又以義府兼王府長史三年遷右相殷王府長史仍知選事並如故義府入則諂言自媚出則肆其姦宄百僚畏之無敢言其過者帝頗知其罪失從容誡義府云聞卿兒子女婿皆不謹慎多作罪過我亦為卿掩覆未即公言卿可誡勗勿令如此義府勃然變色腮頸俱起徐曰誰向陛下道此上曰但我言如是何須問我所從得耶義府睆然殊不引咎緩步而去上亦優容之初五禮儀注自前代相沿吉凶畢舉太常博士蕭楚材孔志約以皇室凶禮為預備凶事非臣子所宜言之義府深然之於是悉刪而焚焉義府既貴之後又自言本出趙郡始與諸李昭穆而無賴之徒苟合藉其權勢拜伏為兄叔者甚衆給事中李崇德初亦與同譜昭穆及義府出為普州刺史遂即除削義府聞而銜之及重為宰相乃令人誣構其罪竟下獄自殺初貞觀中太宗命吏部尚書高士廉御史大夫韋挺中書侍郎岑文本禮部侍郎令狐德棻等及四方士大夫諳練門閥者修氏族志勒成百卷升降去取時稱允當頒下諸州藏為永式義府恥其家代無名乃奏改此書專委禮部郎中孔志約著作郎楊仁卿太子洗馬史玄道太常丞呂才重修志約等遂立格云皇朝得五品官者皆升士流於是兵卒以軍功致五品者盡入書限更名為姓氏錄由是搢紳士大夫多恥被甄皆號此書為勳格義府仍奏收天下氏族志本焚之關東魏齊舊姓雖皆淪替猶相矜尚自為婚姻義府為子求婚不得乃奏隴西李等七家不得相與為婚陰陽占候人杜元紀為義府望氣云所居宅有獄氣發積錢二千萬乃可厭勝義府信之聚斂更急切義府居母服有制朔望給哭假義府輒微服與元紀凌晨共出城東登古塚候望哀禮都廢由是人皆言其窺覘災眚陰懷異圖義府又遣其子右司議郎津召長孫無忌之孫延謂曰相為得一官數日詔書當出居五日果授延司津監乃取延錢七百貫於是右金吾倉曹參軍楊行穎表言義府罪狀制下司刑太常伯劉祥道與侍御詳刑對推其事仍令司空李勣監焉按皆有實乃下制曰右相行殷王府長史河間郡公李義府洩禁中之語鬻寵授之朝恩交占候之人輕朔望之哀禮蓄邪黷貨實玷衣冠稔惡嫉賢載虧政道特以任使多年未忍便重罰宜從遐棄以肅朝倫可除名長流巂州其子太子右司議郎津專恃權門罕懷忌憚姦淫是務賄賂無厭交遊非所潛報機密亦宜明罰屏跡荒裔可除名長流振州義府次子率府長史洽千牛備身洋子婿少府主簿柳元貞等皆憑恃受贓並除名長流廷州朝野莫不稱慶時人為之語曰今日巨唐年還誅四凶族四凶者謂洽及柳元貞等四人也或作河間道行軍元帥劉祥道破銅山大賊李義府露布牓之通衢義府先多取人奴婢及敗一時奔散各歸其家露布稱混奴婢而亂放各識家而競入者謂此也乾封元年大赦長流人不許還義府憂憤發疾卒年五十餘文集三十卷傳於代又著宦遊記二十卷尋亡失自義府流放後朝士常憂懼恐其復來及聞其死於是始安上元元年大赦義府妻子得還洛陽如意元年則天以義府與許敬宗御史大夫崔義玄中書舍人王德儉大理正侯善業大理丞袁公瑜等六人在永徽中有翊贊之功追贈義府揚州大都督義玄益州大都督德儉魏州刺史公瑜江州刺史長安元年又賜義府子左千牛衞將軍湛及敬宗諸子實封各三百戶義玄子司賓卿基德儉子殿中監璿實封各二百五十戶善業子太子右庶子知一公瑜子殿中丞忠臣實封各二百戶睿宗即位景雲元年並停義府等六家實封義府少子湛年六歲時以父貴授周王文學神龍初累遷右散騎常侍襲封河間郡公時鳳閣侍郎張柬之將誅張易之兄弟遂引湛為左羽林將軍令與敬暉等啟請皇太子備陳將誅易之兄弟意太子許之及兵發湛與右羽林大將軍李多祚等詣東宮迎皇太子拒而不時出湛進啟曰逆豎反道亂常將圖不軌宗杜危敗實在須臾湛等諸將與南衙執事克期誅翦伏願殿下暫至玄武門以副衆望太子曰凶豎悖亂誠合誅夷然聖躬不豫慮有驚動公等且止以俟後圖湛曰諸將棄家族共宰相同心戮力匡輔社稷殿下奈何不哀其懇誠而欲陷之鼎鑊湛等微命雖不足惜殿下速出自止遏太子乃馳馬就路湛從至玄武門斬關而入率所部兵直至則天所寢長生殿環繞侍衞因奏臣等奉令誅逆賊易之昌宗恐有漏洩遂不獲預奏輒陳兵禁掖是臣等死罪則天謂湛曰卿亦是誅易之軍將耶我於汝父子恩不少何至是也則天移就上陽宮因留湛宿衞中宗即位拜右羽林大將軍進封趙國公加實封通前滿五百戶頃之復授左散騎常侍累轉左領軍衞大將軍開元初卒崔義玄別有傳史臣曰許高陽武德之際已為文皇入館之賓垂三十年位不過列曹尹而馬周劉洎起羈旅徒步六七年間皆登宰執考其行實則高陽之文學宏奧周洎無以過之然而太宗任遇相殊者良以高陽才優而行薄故也及屬嗣君沖暗嬖妾姦邪阿附豺狼窺圖權軸人之兇險一至於斯仲尼所謂雖有周公之才不足觀也義府才思精密所謂猩猩能言鄙哉贊曰貞觀文士高陽河間圖形學館染翰書山進身以筆得位由姦為虎傅翼即又胡顏
