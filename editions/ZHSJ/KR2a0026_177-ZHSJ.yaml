body:
  text: 舊唐書卷一百七十三列傳第一百二十三鄭覃弟朗陳夷行李紳吳汝納李回李王玉李固言鄭覃故相珣瑜之子以父廕補弘文校理歷拾遺補闕考功員外郎刑部郎中元和十四年二月遷諫議大夫憲宗用內官五人為京西北和糴使覃上疏論罷穆宗不恤政事喜遊宴即位之始吐蕃寇邊覃與同職崔玄亮等廷奏曰陛下即位已來宴樂過多畋遊無度今蕃寇在境緩急奏報不知乘輿所在臣等忝備諫官不勝憂惕伏願稍減遊縱留心政道伏聞陛下晨夜昵狎倡優近習之徒賞賜太厚凡金銀貨幣皆出自生靈膏血不可使無功之人濫霑賜與縱內藏有餘亦乞用之有節如邊上警急即支用無闕免令有司重斂百姓實天下幸甚帝初不悅其言顧宰相蕭俛曰此輩何人俛對曰諫官也帝意稍解乃曰朕之過失臣下盡規忠也乃謂覃曰閤中奏事殊不從容今後有事面陳朕與卿延英相見時久無閤中奏事覃等抗論人皆相賀鎮冀節度使王承宗死其弟承元聽朝旨移授鄭滑節度鎮之三軍留承元以難不能赴鎮承元乞重臣宣諭乃以覃為宣諭使起居舍人王璠副之初鎮卒辭語不遜覃至宣詔諭以大義軍人釋然聽命長慶元年十一月轉給事中四年遷御史中丞十一月權知工部侍郎寶曆元年拜京兆尹文宗即位改左散騎常侍三年以本官充翰林侍講學士四年四月拜工部侍郎覃長於經學稽古守正帝尤重之覃從容奏曰經籍訛謬博士相沿難為改正請召宿儒奧學校定六籍準後漢故事勒石於太學永代作則以正其闕從之五年李宗閔牛僧孺輔政宗閔以覃與李德裕相善薄之時德裕自浙西入朝復為閔孺所排出鎮蜀川宗閔惡覃禁中言事奏為工部尚書罷侍講學士文宗好經義心頗思之六年二月復召為侍講學士七年春德裕作相五月以覃為御史大夫文宗嘗於延英謂宰相曰殷侑通經學為人頗似鄭覃宗閔曰覃侑誠有經學於議論不足聽覽李德裕對曰殷鄭之言他人不欲聞唯陛下切欲聞之覃嘗嫉人朋黨為宗閔所薄故也八年遷戶部尚書其年德裕罷相宗閔復知政與李訓鄭注同排斥李德裕李紳二人貶黜覃亦左授祕書監九年六月楊虞卿李宗閔得罪長流復以覃為刑部尚書十月遷尚書右僕射兼判國子祭酒訓注伏誅召覃入禁中草制敕明日以本官同平章封滎陽郡公食邑二千戶覃雖精經義不能為文嫉進士浮華開成初奏禮部貢院宜罷進士科初紫宸對上語及選士覃曰南北朝多用文華所以不治士以才堪即用何必文辭帝曰進士及第人已曾為州縣官者方鎮奏署即可之餘即否覃曰此科率多輕薄不必盡用帝曰輕薄敦厚色色有之未必獨在進士此科置已二百年亦不可遽改覃曰亦不可過有崇樹帝嘗謂宰臣曰百司弛慢要重條舉因指前香爐曰此爐始亦華好用之既久乃無光彩若不加飾何由復初覃對曰丕變風俗當考實效自三十年已來多不務實取於顏情如嵇阮之流不攝職事李石云此本因治平人人無事安逸所致今之人俗亦慕王夷甫恥不能及之上曰卿等輔朕在振舉法度而已時太學勒石經覃奏起居郎周墀水部員外郎崔球監察御史張次宗禮部員外郎溫業等校定九經文字旋令上石加門下侍郎弘文館大學士監修國史上嘗於延英論古今詩句工拙覃曰孔子所刪三百篇是也降此五言七言辭非雅正不足帝王賞詠夫詩之雅頌皆下刺上所為非上化下而作王者採詩以考風俗得失仲尼刪定以為世規近代陳後主隋煬帝皆能章句不知王者大端終有季年之失章句小道願陛下不取也覃以宰相兼判國子祭酒奏太學置五經博士各一人緣無職田請依王府官例賜祿粟從之又進石壁九經一百六十卷其年李固言復為宰相固言與李宗閔楊嗣復善覃憎之因起居郎闕固言奏曰周敬復崔球張次宗等三人皆堪此任覃曰崔球遊宗閔之門且赤墀下秉筆為千古法不可朋黨如裴中孺李讓夷臣不敢有纖芥異論乃止三年楊嗣復自西川入拜平章事與覃尤相矛盾加之以固言李王玉入對之際是非蜂起二月覃進位太子太師文宗以旱放繫囚出宮人劉好奴等五百餘人送兩街寺觀任歸親戚紫宸對李王玉曰陛下放宮女數多德邁千古漢制八月選人晉武平吳亦多採擇仲尼所謂未見好德如好色今陛下以為無益放之微臣敢賀覃曰晉武帝以採擇之失中原化為左衽陛下以為殷鑒放去攸宜其年十二月三上章求罷詔落太子太師餘如故仍三五日一入中書商量政事四年五月罷相守左僕射武宗即位李德裕用事欲援為宰相固以足疾不任朝謁會昌二年守司徒致仕卒子裔綽以蔭授渭南尉直弘文館覃少清苦貞退不造次與人款狎位至相國所居未嘗增飾纔庇風雨家無媵妾人皆仰其素風然嫉惡太過多所不容衆憚而惡之覃弟朗潛朗字有融長慶元年登進士甲科再遷右拾遺開成中為起居郎初大和末風俗稍奢文宗恭勤節儉冀革其風宰臣等言曰陛下節儉省用風俗已移長裾大袂漸以減損若更令戚屬絕其侈靡不慮下不從教帝曰此事亦難戶曉但去其泰甚自以儉德化之朕聞前時內庫唯二錦袍飾以金鳥一袍玄宗幸溫湯御之一即與貴妃當時貴重如此如今奢靡豈復貴之料今富家往往皆有左衞副使張元昌便用金唾壺昨因李訓已誅之矣時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記錄未吾試觀之朗對曰臣執筆所記便名為史伏準故事帝王不可取觀昔太宗欲覽國史諫議大夫朱子奢云史官所述不隱善惡或主非上智飾非護失見之則致怨所以義不可觀又褚遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不為非法不聞帝王躬自觀史帝曰適來所記無可否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注夫人君之言善惡必書朕恐平常閑話不關理體垂諸將來竊以為恥異日臨朝庶幾稍改何妨一見以誡醜言朗遂進之朗轉考功郎中四年遷諫議大夫會昌初為給事中出為華州刺史入為御史中丞戶部侍郎判本司事大中朝出為定州刺史義武軍節度易定觀察北平軍等使尋遷檢校戶部尚書汴州刺史宣武軍節度宋亳汴潁觀察等使入為工部尚書判度支遷御史大夫改禮部尚書以本官同平章事加中書侍郎集賢殿大學士修國史大中十年以疾辭位進加檢校右僕射守太子少師十一年十月卒詔曰故通議大夫檢校尚書右僕射兼太子少師上柱國賜紫金魚袋鄭朗植操端方稟氣莊重藹若瑞玉澹如澄川智略合乎蓍龜誠信服于僚友自膺寵寄頗負全才竭匪躬于諫垣彰盡瘁于瑣闥載踐方嶽亟登師壇觀風推惠愛之心訓士得撫循之術政溢聞聽念茲徵還位冠冬卿職重邦計經費有節財用不虧繄彼休功明我推擇爰嘉峭峻俾總紀綱公望益隆典彝具舉式諧注意且沃深衷俄參化源以提政柄三事仰清廉之節百度見損益之能近煦和風遠浹膏雨方俟坐鎮雅俗表率庶官頤養或乖腠理生疾屢陳章疏乞遂退閑既堅乃誠式允其請每圖懿績唯冀有瘳何竟至於彌留而遽聞於捐代閱奏興悼臨軒載懷將輟視朝之儀兼列上公之秩慰茲幽壤期爾有知可贈司空潛字無悶亦登進士第陳夷行字周道潁川人祖忠父邑夷行元和七年登進士第累辟使府寶曆末由侍御史改虞部員外郎皆分務東都大和三年入為起居郎史館修撰預修憲宗實錄四年獻上轉司封員外郎五年遷吏部郎中四月召充翰林學士八年兼充皇太子侍讀詔五日一度入長生院侍太子講經上召對面賜緋衣牙笏遷諫議大夫知制誥餘職如故九年八月改太常少卿知制誥學士侍講如故開成二年四月以本官同平章事三年楊嗣復李王玉繼入輔政夷行介特素惡其所為每上前議政語侵嗣復遂至往復性不能堪上表稱足疾辭位不許詔中使就第宣勞七月以王彥威為忠武節度使史孝章為邠寧節度使皆嗣復擬議因延英對上問夷行曰昨除二鎮當否夷行對曰但出自聖心即當楊嗣復曰若出自聖心當即人情皆愜如事或過當臣下安得無言帝曰誠如此朕固無私也夷行曰自三數年來姦臣竊權陛下不可倒持太阿授人鐏柄嗣復曰齊桓用管仲於讎虜豈有太阿之慮乎上不悅仙韶院樂官尉遲璋授王府率右拾遺竇洵直當衙論曰伶人自有本色官不合授之清秩鄭覃曰此小事何足當衙論列王府率是六品雜官謂之清秩與洵直得否此近名也嗣復曰嘗聞洵直幽今當衙論一樂官幽則有之亦不足怪夷行曰諫官當衙祇合論宰相得失不合論樂官然業已陳論須與處置今後樂人每七八年與轉一官不然則加手力課三數人帝曰別與一官乃授光州長史賜洵直絹百疋夷行尋轉門下侍郎上紫宸議政因曰天寶中政事實不甚佳當時姚宋在否李王玉曰姚亡而宋罷王玉因言人君明哲終始尤難玄宗嘗云自即位已來未嘗殺一不辜而任林甫陷害破人家族不亦惑乎夷行曰陛下不可移權與人嗣復曰夷行之言容易且太宗用房玄齡十六年魏徵十五年何嘗失道臣以為用房魏多時不為不理用邪佞一日便足夷行之言皆指嗣復專權文宗用郭薳為坊州刺史右拾遺宋邧論列以為不可既而薳坐贓帝謂宰相曰宋邧論事可嘉邧授官來幾時嗣復曰去年因曰諫官論事陛下但記其姓名稍加優奬如不當亦須令知夷行曰諫官論事是其本職若論一事即加一官則官何由得不免有情帝曰情固不免理平之時亦不可免上竟以夷行議論太過恩禮漸薄尋罷知政事守吏部尚書四年九月檢校禮部尚書出為華州刺史五年武宗即位李德裕秉政七月自華召入復為中書侍郎平章事會昌三年十一月檢校司空平章事河中尹河中晉絳節度使卒贈司徒弟玄錫夷實皆進士擢第玄錫又制策登科李紳字公垂潤州無錫人本山東著姓高祖敬玄則天朝中書令封趙國文憲公自有傳祖守一成都郫縣令父晤歷金壇烏程晉陵三縣令因家無錫紳六歲而孤母盧氏教以經義紳形狀眇小而精悍能為歌詩鄉賦之年諷誦多在人口元和初登進士第釋褐國子助教非其好也東歸金陵觀察使李錡愛其才辟為從事紳以錡所為專恣不受其書幣錡怒將殺紳遁而獲免錡誅朝廷嘉之召拜右拾遺歲餘穆宗召為翰林學士與李德裕元稹同在禁署時稱三俊情意相善尋轉右補闕長慶元年三月改司勳員外郎知制誥二年二月超拜中書舍人內職如故俄而稹作相尋為李逢吉教人告稹陰事稹罷相出為同州刺史時德裕與牛僧孺俱有相望德裕恩顧稍深逢吉欲用僧孺懼紳與德裕沮於禁中二年九月出德裕為浙西觀察使乃用僧孺為平章事以紳為御史中丞冀離內職易掎摭而逐之乃以吏部侍郎韓愈為京兆尹兼御史大夫放臺參知紳剛褊必與韓愈忿爭制出紳果移牒往來論臺府事體而愈復性訐言辭不遜大喧物論由是兩罷之愈改兵部侍郎紳為江西觀察使天子待紳素厚不悟逢吉之嫁禍為其心希外任乃令中使就第宣勞賜之玉帶紳對中使泣訴其事言為逢吉所排戀闕之情無已及中謝日面自陳訴帝方省悟乃改授戶部侍郎中尉王守澄用事逢吉令門生故吏結託守澄為援以傾紳晝夜計畫會紳族子虞文學知名隱居華陽自言不樂仕進時來京師省紳虞與從伯耆進士程昔範皆依紳及耆拜左拾遺虞在華陽寓書與耆求薦書誤達於紳紳以其進退二三以書誚之虞大怨望及來京師盡以紳嘗所密話言逢吉姦邪附會之語告逢吉逢吉大怒問計于門人張又新李續之咸曰搢紳皆自惜毛羽孰肯為相公搏擊須得非常奇士出死力者有前鄧州司倉劉栖楚者嘗為吏鎮州王承宗以事繩之栖楚以首觸地固爭而承宗竟不能奪其果銳如此若相公取之為諫官令伺紳之失一旦於上前暴揚其過恩寵必替事苟不行過在栖楚亦不足惜也逢吉乃用李虞程昔範劉栖楚皆擢為拾遺以伺紳隙俄而穆宗晏駕敬宗初即位逢吉快紳失勢慮嗣君復用之張又新等謀逐紳會荊州刺史蘇遇入朝遇能決陰事衆問計於遇遇曰上聽政後當開延英必有次對官欲拔本塞源先以次對為慮餘不足恃羣黨深然之逢吉乃以遇為左常侍王守澄每從容謂敬宗曰陛下登九五逢吉之助也先朝初定儲貳唯臣備知時翰林學士杜元穎李紳勸立深王而逢吉固請立陛下而李續之李虞繼獻章疏帝雖沖年亦疑其事會逢吉進擬言李紳在內署時嘗不利於陛下請行貶逐帝初即位方倚大臣不能自執乃貶紳端州司馬貶制既行百僚中書賀宰相唯右拾遺吳思不賀逢吉怒改為殿中侍御史充入吐蕃告哀使紳之貶也正人腹誹無敢有言唯翰林學士韋處厚上疏極言逢吉姦邪誣摭紳罪語在處厚傳天子亦稍開悟會禁中檢尋舊事得穆宗時封書一篋發之得裴度杜元穎與紳三人所獻疏請立敬宗為太子帝感悟興歎悉命焚逢吉黨所上謗書由是讒言稍息紳黨得保全及寶曆改元大赦逢吉定赦書節文不欲紳量移但云左降官已經量移者與量移不言左降官與量移韋處厚復上疏論之語在處厚傳帝特追赦書添節文云左降官與量移紳方移為江州長史再遷太子賓客分司東都大和七年李德裕作相七月檢校左常侍越州刺史浙東觀察使九年李訓用事李宗閔復相與李訓鄭注連衡排擯德裕罷相紳與德裕俱以太子賓客分司開成元年鄭覃輔政起德裕為浙西觀察使紳為河南尹六月檢校戶部尚書汴州刺史宣武節度宋亳汴潁觀察等使二年夏秋旱大蝗獨不入汴宋之境詔書褒美又於州置利潤樓店四年就加檢校兵部尚書武宗即位加檢校尚書右僕射揚州大都督府長史知淮南節度大使事會昌元年入為兵部侍郎同平章事改中書侍郎累遷守右僕射門下侍郎監修國史上柱國趙國公食邑二千戶四年暴中風恙足緩不任朝謁拜章求罷十一月守僕射平章事出為淮南節度使六年卒紳始以文藝節操進用受顧禁中後為朋黨所擠濱於禍患賴正人匡救得以功名始終歿後宣宗即位李德裕失勢罷相歸洛陽而宗閔嗣復之黨崔鉉白敏中令狐綯欲置德裕深罪大中初教人發紳鎮揚州時舊事以傾德裕初會昌五年揚州江都縣尉吳湘坐贓下獄準法當死具事上聞諫官疑其冤論之遣御史崔元藻覆推與揚州所奏多同湘竟伏法及德裕罷相羣怨方構湘兄進士汝納詣闕訴冤言紳在淮南恃德裕之勢枉殺臣弟德裕既貶紳亦追削三任官告吳汝納者澧州人故韶州刺史武陵兄之子武陵進士登第有史學與劉軻並以史才直史館武陵撰十三代史駁議二十卷自尚書員外郎出為忠州刺史改韶州坐贓貶潘州司戶卒汝納亦進士擢第以季父贓罪久之不調會昌中為河南府永寧縣尉初武陵坐贓時李德裕作相貶之故汝納以不調挾怨而附宗閔嗣復之黨同作謗言會汝納弟湘為江都尉為部人所訟贓罪兼娶百姓顏悅女為妻有踰格律李紳令觀察判官魏鉶鞫之贓狀明白伏法湘妻顏顏繼母焦皆笞而釋之仍令江都令張弘思以船監送湘妻顏及兒女送澧州及揚州上具獄物議以德裕素憎吳氏疑李紳織成其罪諫官論之乃差御史崔元藻為制使覆吳湘獄據款伏妄破程糧錢計贓準法其恃官娶百姓顏悅女為妻則稱悅是前青州衙推悅先娶王氏是衣冠女非繼室焦所生與揚州案小有不同德裕以元藻無定奪奏貶崖州司戶及汝納進狀追元藻覆問元藻既恨德裕陰為崔鉉白敏中令狐綯所利誘即言湘雖坐贓罪不至死又云顏悅實非百姓此獄是鄭亞首唱元壽協李恪鍛成李回便奏遂下三司詳鞫故德裕再貶李回鄭亞等皆竄逐吳汝納崔元藻為崔白令狐所奬數年並至顯官李回字昭度宗室郇王禕之後父如仙回本名躔以避武宗廟諱長慶初進士擢第又登賢良方正制科釋褐滑臺從事揚州掌書記得監察御史入為京兆府戶曹轉司錄參軍登朝為左補闕起居郎尤為宰相李德裕所知回強幹有吏才遇事通敏官曹無不理授職方員外郎判戶部案歷吏部員外郎判南曹以刑部員外郎知臺雜賜緋開成初以庫部郎中知制誥拜中書舍人賜金紫服武宗即位拜工部侍郎轉戶部侍郎判本司事三年兼御史中丞會昌三年劉稹據潞州邀求旄鉞朝議不允加兵問罪武宗懼稹陰附河朔三鎮以沮王師乃命回奉使河朔魏博何弘敬鎮冀王元逵皆具櫜鞬郊迎回喻以朝旨言澤潞密邇王畿不同河北自艱難已來唯魏鎮兩藩列聖皆許襲而稹無功欲効河朔故事理即太悖聖上但以山東三郡境連魏鎮用軍便近王師不欲輕出山東請魏鎮兩藩祇收山東三郡弘敬元逵俯僂從命幽州張仲武與太原劉沔攻迴鶻時兩人不協朝廷方用兵不欲藩帥不和回至幽州喻以和協之旨仲武欣然釋憾乃移劉沔鎮滑臺命仲武領太原軍攻潞賊平以本官同平章事累加中書侍郎轉門下歷戶吏二尚書武宗崩回充山陵使祔廟竟出為成都尹劍南西川節度大中元年冬坐與李德裕親善改潭州刺史湖南觀察使再貶撫州刺史白敏中令狐綯罷相入朝為兵部尚書復出為成都尹劍南西川節度使卒贈司徒諡曰文懿李王玉字待價趙郡人父仲朝王玉進士擢第又登書判拔萃科累官至右拾遺穆宗荒於酒色纔終易月之制即與勳臣飲宴王玉與同列上疏論之曰臣聞人臣之節本於忠藎苟有所見即宜上陳況為陛下諫官食陛下厚祿豈敢腹誹巷議辜負恩榮臣等聞諸道路不知信否皆云有詔追李光顏李愬欲於重陽節日合宴羣臣倘誠有之乃陛下念羣臣敷惠澤之慈旨也然元朔未改園陵尚新雖陛下執易月之期俯從人欲而禮經著三年之制猶服心喪今遵同軌之會適去於中邦告遠夷之使未復其來命遏密弛禁蓋為齊人合宴內廷事將未可夫明王之舉動為天下法王言既降其出如綸苟玷皇猷徒章直諫臣等是以昧死上聞且光顏李愬久立忠勞今方盛秋務拓邊境如或召見詔以謀猷褒其宿勳付以疆事則與歌鐘合宴酒食邀歡不得同年而語也陛下自纘嗣以來發號施令無非孝理因心形于詔敕固以感動於人倫更在敬慎威儀保持聖德而已上雖不用其言慰勞遣之長慶元年鹽鐵使王播增茶稅初稅一百增之五十王玉上疏論之曰榷率救弊起自干戈天下無事即宜蠲省況稅茶之事尤出近年在貞元元年中不得不爾今四海鏡清八方砥平厚斂於人殊傷國體其不可一也茶為食物無異米鹽於人所資遠近同俗既袪竭乏難捨斯須田閭之間嗜好尤切今增稅既重時估必增流弊於民先及貧弱其不可二也且山澤之饒出無定數量斤論稅所冀售多價高則市者稀價賤則市者廣歲終上計其利幾何未見阜財徒聞斂怨其不可三也臣不敢遠徵故事直以目前所見陳之伏望暫留聰明稍垂念慮特追成命更賜商量陛下即位之初已懲聚斂外官押貫旋有詔停洋洋德音千古不朽今若榷茶加稅頗失人情臣忝諫司不敢緘默時禁中造百尺樓國計不充王播希恩增稅奉帝嗜慾疏奉不省遷吏部員外郎轉司勳員外郎知制誥大和五年李宗閔牛僧孺在相與王玉親厚改度支郎中知制誥遂入翰林充學士七年三月正拜中書舍人九年五月轉戶部侍郎充職七月宗閔得罪王玉坐累出為江州刺史開成元年四月以太子賓客分司東都遷河南尹二年五月李固言入相召王玉復為戶部侍郎判本司事三年楊嗣復輔政薦王玉以本官同平章事王玉與固言嗣復相善自固言得位相繼援引居大政以傾鄭覃陳夷行李德裕三人凡有奏議必以朋黨為謀屢為覃所廷折之王玉自朝議郎進階正議大夫其年十二月上疏求罷不許四年三月文宗謂宰臣曰朕在位十四年屬天下無事雖未至理亦少有如今日之無事也王玉對曰邦國安危亦如人之身當四體和平之時長宜調適以順寒暄之節如恃安自忽則疾患旋生朝廷當無事之時思省闕失而補之則禍難不作矣文宗以杜悰領度支稱職欲加戶部尚書因紫宸言之陳夷行曰一切恩權合歸君上陛下自看可否王玉對曰太宗用宰臣天下事皆先平章謂之平章事代天理物上下無疑所以致太平者也若拜一官命一職事事皆決於君上即焉用彼相昔隋文帝一切自勞心力臣下發論則疑凡臣下用之則宰相不用則常僚豈可自保陛下常語臣云竇易直勸我宰相進擬但五人留三人兩人勾一人渠即合勸我擇宰相不合勸我疑宰相帝曰易直此言甚鄙又曰韋處厚作相三日薦六度師亦大可怪王玉曰處厚淫於奉佛不悟其是非也其年五月上謂宰臣曰貞元政事初年至好王玉曰德宗中年好貨方鎮進奉即加恩澤租賦出自百姓更令貪吏剝削聚貨以希恩理道故不可也上曰人君聚斂猶自不可但輕賦節用可也王玉又曰貞觀中房杜王魏啟告文皇意祇在此請不易初心自古好事克終實難上曰朕心終不改也尋封贊皇男食邑三百戶武宗即位之年九月與楊嗣復俱罷相出為桂州刺史桂管觀察使三年長流驩州大中二年崔鉉白敏中逐李德裕徵入朝為戶部尚書出為河陽節度使入為吏部尚書累遷金紫光祿大夫檢校尚書右僕射揚州大都督府長史淮南節度使上柱國贊皇郡開國公食邑一千五百戶大中七年卒贈司空李固言趙郡人祖幷父現固言元和七年登進士甲科大和初累官至駕部郎中知臺雜四年李宗閔作相用為給事中五年宋申錫為王守澄誣陷固言與同列伏閤論之將作監王堪修奉太廟弛慢罰俸仍改官為太子賓客制出固言封還曰東宮調護之地不可令弛慢被罰之人處之改為均王傅六年遷工部侍郎七年四月轉尚書左丞奉詔定左右僕射上事儀注八年李德裕輔政出為華州刺史其年十月宗閔復入召拜吏部侍郎九年五月遷御史大夫六月宗閔得罪固言代為門下侍郎平章事尋加崇文館大學士時李訓鄭注用事自欲竊輔相之權宗閔既逐外示公體爰立固言其實惡與宗閔朋黨九月以兵部尚書出為興元節度使李訓自代固言為平章事訓注誅文宗思其讜正開成元年四月復召為平章事判戶部事二年羣臣上徽號上紫宸言曰中外上章請加徽號朕思理道猶鬱實愧岳牧之請如聞州郡甚有無政處固言曰人言鄧州王堪衰老隋州鄭襄無政帝曰堪是貞元時御史祇有此一人鄭覃曰臣以王堪舊人舉為刺史鄭襄比來守官亦無敗事若言外郡不理何止二人帝曰濟濟多士文王以寧德宗時班行多閑員豈時乏才耶李石對曰十室之邑必有忠信安有大國無人蓋貞元中仕進路塞所以有才之人或託迹他所此乃不進人才之過也固言曰求才之道有人保任便宜奬用隨其稱職與否升黜之上曰宰相薦人莫計親疏竇易直作相未嘗論用親情若己非相才自宜引退若是公舉親亦何嫌人鮮全才但用其所長爾尋進階金紫判戶部事其年十月以門下侍郎平章事出為成都尹劍南西川節度使代楊嗣復上表讓門下侍郎乃檢校左僕射會昌初入朝歷兵戶二尚書宣宗即位累授檢校司徒東都留守東畿汝都防禦使大中末以太常卿孫簡代之拜太子太傅分司東都卒史臣曰陳鄭諸公章疏議論綽有端士之風天子待以賢能付之以鼎職延英獻納罕聞康濟之謨文陛敷敭莫副具瞻之望加以互生傾奪競起愛憎惟回奉使命而喻藩臣救危邦而除宿憾況昭獻文章可以為世範德行可以為人師有啟誦之上才非桓靈之失道詎可不思己過祇務面欺輔弼之宜安可垂訓若俾韓非之言進矣子輩安可逃乎土運之衰斯為魍魎悲夫贊曰愛而知惡憎不忘善平心救非可居鼎鉉吠聲濟惡結黨專朝謀身壞國何名燮調
