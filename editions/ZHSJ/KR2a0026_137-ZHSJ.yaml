body:
  text: 舊唐書卷一百三十三列傳第八十三李晟子愿愬聽憲憑恕惎王佖附李晟字良器隴右臨洮人祖思恭父欽代居隴右為裨將晟生數歲而孤事母孝謹性雄烈有才善騎射年十八從軍身長六尺勇敢絕倫時河西節度使王忠嗣擊吐蕃有驍將乘城拒鬬頗傷士卒忠嗣募軍中能射者射之晟引弓一發而斃三軍皆大呼忠嗣厚賞之因撫其背曰此萬人敵也鳳翔節度使高昇雅聞其名召補列將嘗擊疊州叛羌於高當川又擊宕州連狂羌於罕山皆破之累遷左羽林大將軍同正廣德初鳳翔節度使孫志直署晟總遊兵擊破党項羌高玉等以功授特進試光祿卿轉試太常卿大曆初李抱玉鎮鳳翔署晟為右軍都將四年吐蕃圍靈州抱玉遣晟將兵五千以擊吐蕃晟辭曰以衆則不足以謀則太多乃請將兵千人疾出大震關至臨洮屠定秦堡焚其積聚虜堡帥慕容谷鍾而還吐蕃因解靈州之圍而去拜開府儀同三司無幾兼左金吾衞大將軍涇原四鎮北庭都知兵馬使并總遊兵無何節度使馬璘與吐蕃戰於鹽倉兵敗晟率所部橫擊之拔璘出亂兵之中以功封合川郡王璘忌晟威名又遇之不以禮令朝京師代宗留居宿衞為右神策都將德宗即位吐蕃寇劍南時節度使崔寧朝京師三川震恐乃詔晟將神策兵救之授太子賓客晟乃踰漏天拔飛越廓清肅寧三城絕大渡河獲首虜千餘級虜乃引退因留成都數月而還建中二年魏博田悅反將兵圍臨洺邢州詔以晟為神策先鋒都知兵馬使與河東節度使馬燧昭義節度使李抱真合兵救臨洺尋加兼御史中丞河東昭義軍攻楊朝光於臨洺南晟與河東騎將李自良李奉國擊悅於雙岡悅兵却遂斬朝光戰於臨洺諸軍皆却晟引兵渡洺水乘冰而濟橫擊悅軍王師復振擊悅大破之三年正月復以諸道軍擊敗悅軍於洹水遂進攻魏州以功加檢校左散騎常侍實封百戶無幾兼魏府左司馬時朱滔王武俊聯兵在深趙怒朝廷賞功薄田悅知其可間遣使求援滔與武俊應之遂以兵圍康日知于趙州李抱真分兵二千人守邢州馬燧大怒欲班師晟謂燧曰初奉詔進討三帥齊進李尚書以邢州與趙州接壤分兵守之誠未為害其精卒銳將皆在於此令公遽自引去奈王事何燧釋然謝晟燧乃自造抱真壘與之交歡如初王武俊攻趙州晟乃獻狀請解趙州之圍欲引兵赴定州與張孝忠合勢欲圖范陽德宗壯之加晟御史大夫俾禁軍將軍莫仁擢趙光銑杜季泚皆隸焉晟自魏州引軍而北徑趨趙州武俊聞之解圍而去晟留趙州三日與孝忠兵合北略恆州圍朱滔將鄭景濟於清苑決水以灌之田悅王武俊皆遣兵來救戰於白樓賊犯義武軍稍却晟引步騎擊破之晟所乘馬連中流矢踰月城中益急滔武俊大懼乃悉收魏博之衆而來復圍晟軍晟內圍景濟外與滔等拒戰日數合自正月至於五月會晟病甚不知人者數焉軍吏合謀乃以馬輿還定州賊不敢逼晟疾間復將進師會京城變起德宗在奉天詔晟赴難晟承詔泣下即日欲赴關輔義武軍間於朱滔王武俊倚晟為輕重不欲晟去數謀沮止晟軍晟謂將吏曰天子播越於外人臣當百舍一息死而後已張義武欲沮吾行吾當以愛子為質選良馬以啗其意乃留子憑以為婚義武軍有大將為孝忠委信者謁晟晟乃解玉帶以遺之因曰吾欲西行願以為別陳赴難之意受帶者果德晟乃諫孝忠勿止晟晟得引軍踰飛狐師次代州詔加晟檢校工部尚書神策行營節度使實封二百戶晟軍令嚴肅所過樵採無犯自河中由蒲津而軍渭北壁東渭橋以逼泚時劉德信將子弟軍救襄城敗於扈澗聞難率餘軍先次渭南與晟合軍軍無統一晟不能制因德信入晟軍乃數其罪斬之晟以數騎馳入德信軍撫勞其衆無敢動者既併德信軍軍益振時朔方節度使李懷光亦自河北赴難軍於咸陽不欲晟獨當一面以分己功乃奏請與晟兵合乃詔晟移軍合懷光軍晟奉詔引軍至陳濤斜軍壘未成賊兵遽至晟乃出陣且言於懷光曰賊堅保宮苑攻之未必克今離其窟穴敢出索戰此殆天以賊賜明公也懷光恐晟立功乃曰吾軍適至馬未秣士未飯詎可戰耶不如蓄銳養威俟時而舉晟知其意遂收軍入壘時興元元年正月也每將合戰必自異衣錦裘繡帽前行親自指導懷光望見惡之乃謂晟曰將帥當持重豈宜自表飾以啗賊也晟曰晟久在涇原軍士頗相畏服故欲令其先識以奪其心耳懷光益不悅陰有異志遷延不進晟因人說懷光曰寇賊竊據京邑天子出居近甸兵柄廟略屬在明公公宜觀兵速進晟願以所部得奉嚴令為公前驅雖死不悔懷光益拒之晟兵軍於朔方軍北每晟與懷光同至城下懷光軍輒虜驅牛馬百姓苦之晟軍無所犯懷光軍惡其獨善乃分所獲與之晟軍不敢受久之懷光將謀沮晟軍計未有所出時神策軍以舊例給賜厚於諸軍懷光奏曰賊寇未平軍中給賜咸宜均一今神策獨厚諸軍皆以為言臣無以止之惟陛下裁處懷光計欲因是令晟自署侵削己軍以撓破之德宗憂之欲以諸軍同神策則財賦不給無可奈何乃遣翰林學士陸贄往懷光軍宣諭仍令懷光與晟參議所宜以聞贄晟俱會於懷光軍懷光言曰軍士稟賜不均何以令戰贄未有言數顧晟晟曰公為元帥弛張號令皆得專之晟當將一軍唯公所指以効死命至於增損衣食公當裁之懷光默然無以難晟又不欲侵刻神策軍發於自己乃止懷光屯咸陽堅壁八十餘日不肯出軍德宗憂之屢降中使促以收復之期懷光託以卒疲更請休息以伺其便然陰與朱泚交通其迹漸露晟懼為所併乃密疏請移軍東渭橋以分賊勢上初未之許晟以懷光反狀已明緩急宜有所備蜀漢之路不可壅也請以裨將趙光銑為洋州刺史唐良臣為利州刺史晟子壻張彧為劍州刺史各將兵五百以防未然上初納之未果行無何吐蕃請以兵佐誅泚上欲親總六師移幸咸陽以促諸軍進討懷光聞之大駭疑上奪其軍謀亂益急時鄜坊節度李建徽神策將楊惠元及晟並與懷光聯營晟以事迫會有中使過晟軍晟乃宣令云奉詔徙屯渭橋乃結陣而行至渭橋不數日懷光果劫建徽惠元而併其兵建徽遁免惠元為懷光所害是日車駕幸梁州時變生倉卒百官扈從者十二三駱谷道路險阻儲供無素從官乏食上歎曰早從李晟之言三蜀可坐致也晟大將張少弘自行在傳口詔授晟尚書左僕射同中書門下平章事以安衆心晟拜哭受命且曰長安宗廟所在為天下本若皆執羈靮誰復京師乃浚城隍繕兵甲以圖收復晟以孤軍獨當強寇恐為二賊之所併乃卑詞厚幣偽致誠於懷光外示推崇內為之備時芻粟未集乃令檢校戶部郎中張彧假京兆少尹擇官吏以賦渭北畿縣不旬日芻糧皆足晟乃大陳三軍令之曰國家多難亂逆繼興屬車駕西幸關中無主予代受國恩見危死節臣子之分況當此時不能誅滅兇渠以取富貴非人豪也渭橋橫跨大川斷賊首尾吾與公等戮力勤王擇利而進興復大業建不世之功能從我乎三軍無不泣下曰唯公所使晟亦歔欷流涕是時朱泚盜據京城懷光圖為反噬河朔僭偽者三李納虎視於河南希烈鴟張於汴鄭晟內無貨財外無轉輸以孤軍而抗劇賊而銳氣不衰徒以忠義感於人心故英豪歸向戴休顏率奉天之衆韓遊瓌治邠寧之師駱元光以華州之兵守潼關尚可孤以神策之旅屯七盤皆稟晟節度晟軍大振懷光以休顏遊瓌從晟益懼晟又致書於懷光諭以禍福令破賊迎鑾以掩前過懷光卒不悟軍衆漸多離散糗糧且竭虜剽無所得懼為晟所襲三月懷光自三原富平東抵奉天所至焚掠乃自馮翊入據河中懷光將孟涉段威勇者本神策將惡懷光之不臣既至富平結陣於軍中外向大呼而去懷光不能制涉威勇以數千人歸晟乃陳兵受涉等降卒乃奏授涉檢校工部尚書威勇兼御史大夫德宗之幸山南既入駱谷謂渾瑊曰渭橋在賊腹內兵勢懸隔李晟可辦事乎瑊對曰李晟秉義執志臨事不可奪以臣計之破賊必矣帝意始安是月渾瑊步將上官望自間道懷詔書加晟檢校右僕射兼河中尹河中晉絳慈隰節度使益實封三百戶又兼京畿渭北鄜坊丹延節度招討使晟承詔流涕時帝欲移幸西川晟上表請駐蹕梁漢繫億兆之心圖翦滅之勢若規小捨大作都岷峨即人心失望武士謀臣無所施矣四月有詔加晟京畿渭北鄜坊商華兵馬副元帥時京兆府司錄李敬仲自京城來諫議大夫鄭雲逵自奉天至晟以京兆少尹張彧為副使鄭雲逵為行軍司馬李敬仲為節度判官俾同主軍畫又請以懷光舊將唐良臣保潼關以河中節度授之戴休顏守奉天請以鄜坊節度授之上皆從之渭橋舊有粟十餘萬斛度支先饋懷光軍欲盡晟又奏曰近畿雖乘兵亂猶可賦斂儻寇賊未滅宿兵曠時人廢耕桑又無儲蓄非防微制勝之術也上納之晟乃於畿甸率聚征賦吏民樂輸守禦益固由是軍不乏食神策軍家族多陷於泚晟家亦百口在賊中左右或有言及家者晟因泣下曰乘輿何在而敢恤家乎泚又使晟小吏王無忌之壻詣晟軍且曰公家無恙城中有書聞晟曰爾敢與賊為間遽命斬之時轉輸不至盛夏軍士或衣裘褐晟亦同勞苦每以大義奮激士心卒無離叛者會將吏數輩自賊中逃來言泚衆攜離可滅之狀士心益奮先是賊將姚令言及偽中丞崔宣咸使諜覘我軍為邏騎所得拘送於晟晟解縛食而遣之誡之曰爾報崔宣善為賊守諸人勉力自固勿不忠於賊也五月三日晟引軍抵通化門耀武而還賊不敢出晨集將佐圖兵所向諸將曰先拔外城既有市里然後北清宮闕晟曰若先收坊市巷陌隘狹間以居人若賊設伏格鬬百姓囂潰非計也且賊重兵堅甲皆在苑中若自苑擊其心腹彼將圖走不暇如此則宮闕保安市不易肆計之上也諸將曰善乃移書渾瑊駱元光尚可孤剋期進軍於城下其月二十五日夜晟自東渭橋移軍於光泰門外米倉村以薄京城晟臨高指麾令設壕柵以候賊軍俄而賊衆大至賊驍將張庭芝李希倩逼柵求戰晟謂諸將曰吾恐賊不出今冒死而來天贊我也勒吳詵康英俊史萬頃孟涉等縱兵擊之時華州營在北兵少賊併力攻之晟遣李演孟華以精卒救之中軍鼓譟演力戰大破之乘勝入光泰門再戰又敗之僵屍蔽地餘衆走入白華夜聞慟哭之聲翌日將復出師諸將請待西軍至則左右夾攻晟曰賊既傷敗須乘勝撲滅若俟其有備豈王師之利耶如待西軍恐失機便二十八日晟大集諸將駱元光尚可孤兵馬使吳詵王佖都虞候邢君牙李演史萬頃神策將孟涉康英俊華州將郭審金權文成商州將彭元俊等號令誓師畢陳兵於光泰門外乃使王佖李演率騎軍史萬頃領步卒直抵苑牆神麚村晟先是夜使人開苑牆二百餘步至是賊已樹木柵之賊倚柵拒戰晟叱軍士曰安得縱賊如此當先斬公等萬頃懼先登拔柵而入王佖騎軍繼進賊即奔潰獲賊將段誠諫大軍分道並入鼓譟雷動姚令言張庭芝李希倩猶力捍官軍晟令決勝軍使唐良臣兵馬使趙光銑楊萬榮孟日華等步騎齊進賊軍陣成而屢北戰十餘合乘勝驅蹙至于白華忽有賊騎千餘出於官軍之背晟以麾下百餘騎馳之左右呼曰相公來賊聞之驚潰官軍追斬不可勝計朱泚姚令言張庭芝尚有衆萬人相率遁走晟遣田子奇追之其餘兇黨相率來降是日晟軍入京城勒兵屯於含元殿前晟舍於右金吾仗仍號令諸軍曰晟實不武上憑睿算下賴士心幸得殲厥兇渠肅清宮禁皆三軍之力也長安士庶久陷賊庭若小有震驚則非伐罪弔人之義也晟與公等各有家室離別數年今已成功相見非晚五日內不得輒通家信違命者斬乃遣京兆尹李齊運攝長安令陳元衆攝萬年令韋上伋告喻百姓居人安堵秋毫無所犯尚可孤軍人有擅取賊馬者晟大將高明曜虜賊女妓一人司馬伷取賊馬二匹晟皆立斬之莫敢忤視士庶無不感悅咸歔欷流涕遠坊居人亦有經宿方知者二十九日令孟涉屯於白華尚可孤屯望仙門駱元光屯章敬寺晟自屯於安國寺是日斬賊將李希倩等八人徇于市六月四日晟破賊露布至梁州上覽之感泣羣臣無不隕涕因上壽稱萬歲奏曰李晟虔奉聖謨盪滌兇醜然古之樹勳力復都邑者往往有之至於不驚宗廟不易市肆長安人不識旗鼓安堵如初自三代以來未之有也上曰天生李晟為社稷萬人不為朕也百官拜賀而退是日晟斬偽相李忠臣張光晟蔣鎮喬琳洪經綸崔宣等又表守臣節不屈于賊者程鎮之劉迺蔣沇趙曄薛岌等晟初屯渭橋時熒惑守歲久之方退賓介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象玄遠吾安知天道耶至是謂參佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之嘗聞五緯盈縮無準晟懼復來守歲則我軍不戰而自潰參佐歎服皆曰非所及也尋拜晟司徒兼中書令實封一千戶晟綜理以備百司令大將吳詵將兵三千至寶雞清道晟又請至鳳翔迎扈不許七月十三日德宗至自興元渾瑊韓遊瓌戴休顏以其兵扈從晟與駱元光尚可孤以其兵奉迎時元從禁軍及山南隴州鳳翔之衆步騎凡十餘萬旌旗連亙數十里傾城士庶夾道歡呼晟以戎服謁見於三橋上駐馬勞之晟再拜稽首初賀元惡殄滅宗廟再清宮闈咸肅抃舞感涕跪而言曰臣忝備爪牙之任不能早誅妖逆至鑾輿再遷及師於城隅累月方殄賊寇皆臣庸懦不任職之責敢請死罪伏於路左上為之掩涕命給事中齊映宣旨令左右起晟於馬前是月御殿大赦贈晟父欽太子太保母王氏贈代國夫人賜永崇里第及涇陽上田延平門之林園女樂八人入第之日京兆府供帳酒饌賜教坊樂具鼓吹迎導宰臣節將送之京師以為榮觀上思晟勳力製紀功碑俾皇太子書之刊石立於東渭橋與天地悠久又令太子書碑詞以賜晟晟以涇州倚邊屢害戎帥數為亂階乃上書請理不用命者兼備耕以積粟攘却西蕃上皆從之詔以晟兼鳳翔尹鳳翔隴右節度使仍充隴右涇原節度兼管內諸軍及四鎮北庭行營兵馬副元帥改封西平郡王初帝在奉天鳳翔軍亂殺其帥張鎰立小將李楚琳至是楚琳在朝晟請以楚琳俱往鳳翔將誅之上以初復京師方安反側不許八月晟至鳳翔理殺張鎰之罪斬王斌等十餘人初朱泚亂時涇州亦殺其帥馮河清立別將田希鑒方屬播遷不遑討伐以涇帥授之至是晟奏曰近者中原兵禍皆起涇州且其地逼西戎易為反覆希鑒兇徒將校驕逆若不懲革終為後患從之晟至鳳翔託以巡邊至涇州希鑒迎謁於坐執而誅之并誅害河清者石奇等三十餘人具事以聞上曰涇州亂逆泉藪非晟莫能理之還鎮表右龍武將軍李觀為涇原節度使吐蕃深畏之晟常曰河隴之陷也豈吐蕃力取之皆因將帥貪暴種落攜貳人不得耕稼展轉東徙自棄之耳且土無絲絮人苦征役思唐之心豈有已乎乃傾家財以賞降者以懷來之降虜浪息曩晟奏封王每蕃使至晟必置息曩於坐衣以錦袍金帶以寵異之蕃人皆相指目榮羨息曩蕃相尚結贊頗多詐謀尤惡晟乃相與議云唐之名將李晟與馬燧渾瑊耳不去三人必為我憂乃行反間遣使因馬燧以請和既和即請盟復因盟以虜瑊因以賣燧貞元二年九月吐蕃用尚結贊之計乃大興兵入隴州抵鳳翔無所虜掠且曰召我來何不以牛酒犒勞徐乃引去持是間晟也是役也晟先令衙將王佖選銳兵三千設伏於汧陽誡之曰蕃軍過城下勿擊首尾首尾縱敗中軍力全若合勢攻汝必受其弊但俟其前軍已過見五方旗武豹衣則其中軍也突其不意可建奇功佖如晟節度果遇結贊及出奮擊賊皆披靡佖軍不識結贊故結贊僅而獲免十月晟出師襲吐蕃摧沙堡拔之斬其堡使扈屈律悉蒙等自是結贊數遣使乞和十二月晟朝京師奏曰戎狄無信不可許宰相韓滉又扶晟議請調軍食以給晟命將擊之上方厭兵疑將帥生事邀功會滉卒張延賞秉政與晟有隙屢於上前間晟言不可久令典兵延賞欲用劉玄佐李抱真委以西北邊事俾立功以壓晟德宗竟納延賞之言罷晟兵柄三年三月冊拜晟為太尉中書令奉朝請而已其年閏五月渾瑊與尚結贊同盟於平涼果為蕃兵所劫瑊單馬僅免將吏皆陷六月罷河東節度使馬燧為司徒盡中尚結贊之謀晟既罷兵權朝謁之外罕所過從有通王府長史丁瓊者亦為張延賞所排心懷怨望乃求見晟言事且曰太尉功業至大猶罷兵權自古功高無有保全者國家倘有變故瓊願備左右狡兔三穴盍早圖之晟怒曰爾安得不祥之言遽執瓊以聞四年三月詔為晟立五廟以晟高祖芝贈隴州刺史曾祖嵩贈澤州刺史祖思恭贈幽州大都督廟成官給牲牢祭器牀帳禮官相儀以祔焉五年九月晟與侍中馬燧見於延英殿上嘉其勳力詔曰昔我列祖乘乾坤之盪滌掃隋季之荒屯體元御極作人父母則亦有熊羆之士不二心之臣左右經綸參翊締構昭文德恢武功威不若康不乂用端命于上帝付畀四方宇宙既清日月既貞王業既成太階既平乃圖厥容列于斯閣懋昭績効式表儀形一以不忘于朝夕一以永垂乎來裔君臣之義厚莫重焉貞元己巳歲秋九月我行西宮瞻宏閣崇構見老臣遺像顒然肅然和敬在色想雲龍之叶應感致業之艱難覩往思今取類非遠且功與時並才為代生苟蘊其才遇其時尊主庇人何代不有在中宗則桓彥範等著其輔戴之績在玄宗則劉幽求等申翼奉之勳在肅宗則郭子儀掃殄氛祲今則李晟等保寧朕躬咸宣力肆勤光復宗社訂之前烈夫豈多謝闕而未錄孰謂旌賢況念功紀德文祖所為也在予曷其敢怠有司宜年代先後各圖其像於舊臣之次仍令皇太子書朕是命紀于壁焉庶播嘉庸式昭于下俾後來者尚揖清顏知元勳之不朽復命皇太子書其文以賜晟晟刻石於門左初晟在鳳翔謂賓介曰魏徵能直言極諫致太宗於堯舜之上真忠臣也僕所慕之行軍司馬李叔度對曰此搢紳儒者之事非勳德所宜晟斂容曰行軍失言傳稱邦有道危言危行今休明之期晟幸得備位將相心有不可忍而不言豈可謂有犯無隱知無不為者耶是非在人主所擇耳叔度慙而退故晟為相每當上所顧問必極言匪躬盡大臣之節性沉默未嘗泄於所親臨下明察每理軍必曰某有勞某能其事雖廝養小善必記姓名尤惡下為朋黨相構好善嫉惡出於天性嘗有恩者厚報之初譚元澄為嵐州刺史嘗有恩於晟後坐貶於岳州比晟貴上疏理之詔贈元澄寧州刺史元澄三子晟撫待勤至皆為成就宦學人皆義之理家以嚴稱諸子姪非晨昏不得謁見言不及公事視王氏甥如己子嘗正歲崔氏女歸省未及階晟却之曰爾有家況姑在堂婦當奉酒醴供饋以待賓客遂不視而遣還家其達禮敦教如此貞元九年八月薨時年六十七上震悼出涕廢朝五日令百官就第臨弔命京兆尹李充監護喪事官給葬具賵賻加等比大斂上手書致意送柩前曰皇帝遣宮闈令第五守進致旨於故太尉中書令西平郡王贈太師之靈曰天祚我邦是生才傑稟陰陽之粹氣實山岳之降靈弘濟患難保佑王室握盪氛祲廓清上京忠誠感於人神功業施於社稷匡時定亂實賴元勳洎領上台克諧中外訏謨帝道叶贊皇猷常竭嘉言以匡不迨情所親重義無間然方期與國同休永為邦翰比嬰疾恙雖歷旬時日冀痊除重期相見弼予在位終致和平豈圖藥餌無徵奄至薨逝喪我賢哲虧我股肱天不憖遺痛惜何極嗚呼大廈方構旋失棟樑巨川未濟遂亡舟楫君臣之義追慟益深循省遺章倍增感切卿一門胤嗣朕必終始保持況愿等弟兄承卿教訓朕之志義豈忘平生縱卿不言朕亦存信比者卿在之日却未見朕深心今卿與朕長乖方冀知朕誠志無以為念發言涕零是用躬述數行貴寫所懷得盡臨紙遣使不能飾詞魂而有知當體朕意冊贈太師諡曰忠武晟薨後城鹽州復鹽池上賜宰臣新鹽惻然思晟乃令致鹽於靈座又時遣中使至晟第存撫諸子教戒備至聞愿等有一善上喜形於色眷遇終始無與晟比元和四年詔曰夫能定社稷濟生人存不朽之名垂可久之業者必報以殊常之寵待以親比之恩與國無窮時惟茂典故奉天定難功臣太尉兼中書令上柱國西平郡王食實封一千五百戶贈太師李晟間代英賢自天忠義邁濟時之宏算抱經武之長材貫以至誠協于一德嘗遭屯難之際實著戡定之功鯨鯢既殲宮廟斯復眷茲勳伐則既褒崇永言天步之夷載懷邦傑之力思加崇於往烈爰協比於後昆睦以宗親將予厚意其家宜令編附屬籍晟配饗德宗廟庭晟十五子侗伷偕無祿早世次愿聰總愻憑恕憲愬懿聽惎慇聰總官卑而卒而愿愬聽最知名愿幼謙謹寡過晟立大勳諸子猶無官宰相奏陳德宗即日召愿拜銀青光祿大夫太子賓客上柱國舊制勳至上柱國賜門戟即令賜愿乃與父並列棨戟於門九年丁父憂十二年服闋德宗召見愿等於延英憫然久之曰朕在宮中常念卿等追懷勳德何日忘之又聞卿等居喪得禮朕甚嘉之各賜衣一襲絹三千匹愿依前授太子賓客兄弟同日拜官者九人尋轉左衞大將軍元和元年八月檢校禮部尚書兼夏州刺史夏綏銀宥等州節度使威令簡肅甚得綏懷之術客有亡馬者以狀告愿愿以狀牓於路懸金以購之不三日所亡馬繫之牓下仍置書一緘曰馬逸及羣不時告罪當死敢以良馬一匹贖罪并亡馬謹納於路愿付客亡馬而縱其良馬境內嚴肅多如此類轉徐州刺史武寧軍節度使到鎮以青鄆不恭奉命討伐屠城下邑捷奏屢聞無何有疾以其弟愬代為徐帥入為刑部尚書疾愈檢校尚書左僕射兼鳳翔尹鳳翔隴右節度使然自是頗怠於為理無復素志聲色之外全不介懷長慶二年二月檢校司空兼汴州刺史宣武軍節度使先是張弘靖為汴帥以厚賞安士心及愿至帑藏已竭而愿恣其奢侈門內數百口仰給官司不恤軍政賞賚不及弘靖時而以威刑馭下又令妻弟竇緩將親兵緩亦驕傲黷貨以是羣情聚怨是歲七月四日夜牙將李臣則薛志忠秦鄰等三人宿直突入竇緩帳中斬緩首以徇愿聞有變與左右數人露髮而走登子城北樓懸縋而下由水竇而出比曉行十數里遇野人驅驢奪而乘之得至鄭州愿妻竇氏死於亂兵之手子三人匿而獲免僕妾為軍士所俘城中大掠三日乃立其牙將李為留後以邀旄鉞月餘方誅之愿坐貶隨州刺史朝廷念晟之勳終不加罪入為左金吾衞大將軍長慶四年六月復檢校司空兼河中尹充河中晉絳慈隰節度使河中之政亦如岐梁加以愿結託權幸厚行賂遺賦入隨盡軍府蕭然賴遽疾終不爾蒲人必有更變寶應元年六月卒贈司徒愬以父蔭起家授太常寺協律郎遷衞尉少卿愬早喪所出保養於晉國夫人王氏及卒晟以本非正室令服緦號哭不忍晟感之因許服縗既練丁父憂愬與仲弟憲廬于墓側德宗不許詔令歸第居一宿徒跣復往上知不可奪遂許終制服闋授右庶子轉少府監左庶子出為坊晉二州刺史以理行殊異加金紫光祿大夫復為庶子累遷至太子詹事宮苑閑使愬有籌略善騎射元和十一年用兵討蔡州吳元濟七月唐鄧節度使高霞寓戰敗又命袁滋為帥滋亦無功愬抗表自陳願於軍前自効宰相李逢吉亦以愬才可用遂檢校左散騎常侍兼鄧州刺史御史大夫充隨唐鄧節度使兵士摧敗之餘氣勢傷沮愬揣知其情乃不肅軍陣不齊部伍或以不肅為言愬曰賊方安袁尚書之寬易吾不欲使其改備乃紿告三軍曰天子知愬柔而忍恥故令撫養爾輩戰者非吾事也軍衆信而樂之愬又散其優樂未嘗宴樂士卒傷痍者親自撫之賊以嘗敗高袁二帥又以愬名位非所畏憚者不甚增其備愬沉勇長算推誠待士故能用其卑弱之勢出賊不意居半歲知人可用乃謀襲蔡表請濟師詔河中鄜坊騎兵二千人益之由是完緝器械陰計戎事嘗獲賊將丁士良召入與語辭氣不撓愬異之因釋其縛置為捉生將士良感之乃曰賊將吳秀琳總衆數千不可遽破者用陳光洽之謀也士良能擒光洽以降秀琳愬從之果擒光洽十二月吳秀琳以文成柵兵三千降愬乃徑徙之新興柵遂以秀琳之衆攻吳房縣收其外城初將攻吳房軍吏曰往亡日請避之愬曰賊以往亡謂吾不來正可擊也及戰勝捷而歸賊以驍騎五百追愬愬下馬據胡床令衆悉力赴戰射殺賊將孫忠憲乃退或勸愬遂拔吳房愬曰取之則合勢而固其穴不如留之以分其力初吳秀琳之降愬單騎至柵下與之語親釋其縛署為衙將秀琳感恩期於効報謂愬曰若欲破賊須得李祐某無能為也祐者賊之騎將有膽略守興橋柵常侮易官軍去來不可備愬召其將史用誠誡之曰今祐以衆穫麥於張柴爾可以三百騎伏旁林中又使搖旆於前示將焚麥者祐素易我軍必輕而來逐爾以輕騎搏之必獲祐用誠等如其料果擒祐而還官軍常苦祐皆請殺之愬不聽解縛而客禮之愬乘間常召祐及李忠義屏人而語或至夜分忠義亦降將也本名憲愬致之軍中多諫愬愬益寵祐始募敢死者三千人以為突將愬自教習之愬將襲元濟會雨水自五月至七月不止溝塍潰溢不可出師軍吏咸以不殺祐為言簡翰日至且言得賊諜者具言其事愬無以止之乃持祐泣曰豈天意不欲平此賊何爾一身見奪於衆口愬又慮諸軍先以謗聞則不能全祐乃械送京師先表請釋且言必殺祐則無以成功者比祐至京詔釋以還愬乃署為散兵馬使令佩刀巡警出入帳中略無猜閒又改為六院兵馬使舊軍令有舍賊諜者屠其家愬除其令因使厚之諜反以情告愬愬益知賊中虛實陳許節度使李光顏勇冠諸軍賊悉以精卒抗光顏由是愬乘其無備十月將襲蔡州其月七日使判官鄭澥告師期於裴度十日夜以李祐率突將三千為先鋒李忠義副之愬自帥中軍三千田進誠以後軍三千殿而行初出文成柵衆請所向愬曰東六十里止至賊境曰張柴砦盡殺其戍卒令軍士少息繕羈靮甲冑發刃彀弓復建旆而出是日陰晦雨雪大風裂旗旆馬慄而不能躍士卒苦寒抱戈僵仆者道路相望其川澤梁逕險夷張柴已東師人未嘗蹈其境皆謂投身不測初至張柴諸將請所止愬曰入蔡州取吳元濟也諸將失色監軍使哭而言曰果落李祐計中愬不聽促令進軍皆謂必不生還然已從愬之令無敢為身計者愬道分五百人斷洄曲路橋其夜凍死者十二三又分五百人斷朗山路自張柴行七十里比至懸瓠城夜半雪愈甚近城有鵝鴨池愬令驚擊之以雜其聲賊恃吳房朗山之固晏然無一人知者李祐李忠義坎墉而先登敢銳者從之盡殺守門卒而登其門留擊柝者黎明雪亦止愬入止元濟外宅蔡吏告元濟曰城已陷矣元濟曰是洄曲子弟歸求寒衣耳俄聞愬軍號令將士云常侍傳語乃曰何常侍得至於此遂驅率左右乘子城拒捍田進誠以兵環而攻之愬計元濟猶望董重質來救乃令訪重質家安卹之使其家人持書召重質重質單騎而歸愬白衣泥首愬以客禮待之田進誠焚子城南門元濟城上請罪進誠梯而下之乃檻送京師其申光二州及諸鎮兵尚二萬餘人相次來降自元濟就擒愬不戮一人其為元濟執事帳下廚廄之間者皆復其職使之不疑乃屯兵鞠場以待裴度翌日度至愬具櫜鞬候度馬首度將避之愬曰此方不識上下等威之分久矣請公因以示之度以宰相禮受愬迎謁衆皆聳觀明日愬軍還於文成柵十一月詔以愬檢校尚書左僕射兼襄州刺史山南東道節度襄鄧隨唐復郢均房等州觀察等使上柱國封涼國公食邑三千戶食實封五百戶一子五品正員憲宗有意復隴右故地元和十三年五月授愬鳳翔隴右節度使仍詔路由闕下愬未發屬李師道再叛詔田弘正義成宣武等軍討之乃移愬為徐州刺史武寧軍節度使代其兄愿兄弟交換岐徐二鎮旬日間再踐父兄之任愬至徐方理兵有方略時蔡將董重質貶春州司戶愬上表請恕重質賜之堪於軍前驅使即詔徵還送武寧軍愬乃署為牙將愬破賊金鄉凡十一戰擒賊將五十俘斬萬計淄青平將有事燕趙元和十五年九月以愬檢校左僕射同中書門下平章事潞州大都督府長史昭義節度使仍賜興寧里第十月王承宗卒魏博田弘正移任鎮州愬至潞州四月遷魏州大都督府長史魏博節度使長慶元年幽鎮復亂愬聞之素服以令三軍曰魏人所以富庶而能通知聖化者由田公故也天子以其仁而愛人使理鎮冀且田公出於魏撫師七年一旦鎮人不道敢茲殘害以魏為無人也若父兄子弟食田公恩者其何以報衆皆慟哭又以玉帶寶劍與牛元翼遣使謂之曰吾先人常以此劍立大勳吾又以此劍平蔡寇今鎮人叛逆公以此翦之元翼承命感激乃以劍及帶令於軍中報之曰願以衆從竭其死力方有制置會疾作不能治軍人違紀律功遂無成朝廷以田布代之除太子少保歸東都是年十月卒於洛陽時年四十九穆宗聞之震悼賵賻加等贈太尉始晟克復京城市不改肆及愬平淮蔡復踵其美父子仍建大勳雖昆仲皆領兵符而功業不侔於愬近代無以比倫加以行己有常儉不違禮弟兄席父勳寵率以僕馬第宅相矜唯愬六遷大鎮所處先人舊宅一院而已晚歲忽於取士辟請不得其人至使吏緣為奸軍政不肅物論稍減惜哉聽七歲以蔭授太常寺協律郎常入公署吏胥小之不為致敬聽令鞭之見血父晟奇之後隨吐突承璀討王承宗為神策行營兵馬使時昭義盧從史持兩端無心討賊承璀用聽計擒從史以獻轉左驍衞將軍兼御史中丞出為安州刺史隨鄂岳觀察使柳公綽討吳元濟軍中動靜悉用聽謀軍聲遂振元和中討李師道聽為楚州刺史統淮南之師鄆人素易淮軍聽潛訓練出其不意趨海州據險要破沭陽兵降朐山戍懷仁東海兩城望風乞降山東平元和十四年五月以功授檢校左散騎常侍夏州刺史夏綏銀宥節度使十五年六月改靈州大都督府長史靈鹽節度使境內有光祿渠廢塞歲久欲起屯田以代轉輸聽復開決舊渠溉田千餘頃至今賴之就加檢校工部尚書初聽為羽林將軍有名馬穆宗在東宮令近侍諷聽獻之聽以職總親軍不敢從及即位之始幽冀不廷太原與二鎮接境方議易帥宰臣進擬上皆不允謂宰臣曰李聽為羽林將軍不與朕馬是必可任長慶二年二月授檢校兵部尚書太原尹北京留守河東節度使代裴度四年七月轉滑州刺史義成軍節度使大和二年討李同捷時魏博行營將丌志沼潛結滄鎮擅迴戈攻其帥史憲誠詔聽帥師援之大破其叛卒志沼奔鎮州為王庭湊所殺聽遂凱旋以功封涼國公授一子五品官王庭湊再違朝旨詔聽以全師屯貝州路由魏州史憲誠懼聽見襲衷甲郊迎候吏密白聽乃令兵士匣刃櫜弓休於野外魏人遂安後憲誠欲入覲謁其府庫魏人怨之殺憲誠衙軍立其大將何進滔詔聽兼領魏博節度使將兵北渡魏人不納聽乘城拒守乃屯兵館陶魏兵遽襲聽不為備其軍大敗無復部伍晝夜奔走僅而獲免喪師過半輜車兵仗並皆委棄御史中丞溫造殿中侍御史崔蠡彈之曰臣聞賞罰不立無以示天下是非一貫莫能建大中竊見義成軍節度使李聽昨者資其承藉委以統戎俾代憲誠付之雄鎮總二萬虎貔之旅位極寵榮兼兩藩節制之權心無報効況陛下授以神算假以天威入魏之期剋日先定而聽擁旄觀望按甲遷延熒惑人心逗撓軍政遂使憲誠陷於屠戮亂衆肆其奸兇失六郡於垂成固危巢於已覆委貝州而不守燒劫無遺望淺口而疾驅狼狽就道自圖苟免不吝苞羞蔑棄朝章有同兒戲魏州之亂職聽之由論其負恩萬死猶幸伏以封常清河南失律斬於關門高霞寓唐鄧破傷投諸遐裔渾鎬節制易定將戰而兵力不支袁滋逗留西川欲進而兇渠尚在或親當矢石或躬歷艱危勢屈賊鋒竟申朝典未曾貸法必震皇威今李聽罪狀夙聞中外憤惋比之常清等輩萬萬過之若陛下猶示含弘不寘極法臣等恐憲章墜地天下寒心伏請付法上不之罪罷兵柄為太子少師聽頗賂遺權幸以為援居無何復檢校司徒起為邠寧節度使邠州衙廳相傳不利葺修以至隳壞聽曰帥臣鑿凶門而出豈有拘于巫祝而隳公署耶遂命葺之卒無變異大和六年轉武寧軍節度使時聽有蒼頭為徐州將不欲聽至聽先使親吏慰勞徐人為蒼頭所殺聽不敢進固以疾辭用為太子太保七年出守鳳翔時人榮之九年改陳許節度未至鎮復除太子太保分司開成元年出為河中尹河中晉慈隰節度使四年以疾求代除太子太保是歲十月卒時年六十一贈司徒聽十領節旌所不至者三鎮莅官苛細好將迎遺賂故急於聚斂窮極侈欲位至一品竟終牖下非西平之遺德焉能及此乎憲晟第五子晟十子憲愬最仁孝及長好儒術以禮法修整起家太原府參軍醴泉縣尉于鎮襄陽辟為從事時吳少誠據淮西獨憚之威當時咸以憲謀畫致之元和八年田弘正以魏博奉朝旨辟憲為從事授衞州刺史遷絳州所至以理行稱入為宗正少卿遷光祿卿穆宗即位以太和公主降迴鶻命金吾大將軍胡証充送公主使命憲副之使還獻入蕃道里記遷檢校左散騎常侍兼太府卿出為洪州刺史江西觀察使大和二年轉嶺南節度使憲雖勳伐之家然累歷事任皆以吏能擢用所履官秩政績流聞性本明恕尤精律學屢詳決冤獄活無罪者數百人以能入官官無敗事士君子多之大和三年八月卒時年五十六憑累歷諸衞大將軍恕太子洗馬並以蔭授官累遷至少卿監惎累官至右龍武大將軍沉湎酒色恣為豪侈積債至數千萬其子貸迴鶻錢一萬餘貫不償為迴鶻所訴文宗怒貶惎為定州司法參軍王佖晟之甥雄武善騎射自晟河西河北出師佖無役不從朱泚之亂晟攻賊於光泰門賊鋒尚勁佖與兵馬使李演踰苑牆血戰敗賊前鋒諸軍方振論功為神策將吐蕃之寇涇原佖伏卒擊尚結贊幾獲由是深為吐蕃所畏晟視佖恩寵與愿愬不殊給與過之晟既為張延賞媒孽罷兵權亦不用佖為將帥入為左衞上將軍元和中愿愬兄弟在方鎮佖檢校工部尚書靈州大都督府長史朔方靈鹽節度使先是吐蕃欲成烏蘭橋於河壖先貯材木朔方節度使每遣人潛載之委於河流終莫能成至是蕃人知佖貪而無謀先厚遺之然後併役成橋仍築月城圍守之自是朔方禦寇不暇邊上至今為恨長慶三年四月卒史臣曰西平器偉材雄人望而畏出身事主落落有將帥之風見義能勇聽受不疑忠於事君長於應變誠一代之賢將也觀恆山之役立談釋二帥之憾涇師之亂號哭赴奉天之危可不為忠義乎對白華之進軍知平涼之必詐沮星變之議移渭橋之軍可不為應變乎解帶結孝忠之心請婚釋延賞之怨嫉惡有楚琳之請懲亂行希鑒之誅可不為明於決斷乎而德宗皇帝聽斷不明無人君之量俾功臣困讒慝之口奸人秉衡石之權丁瓊之言誠堪太息雖齪齪刻渭橋之石區區賜煙閣之銘亦何心哉作善遺慶諸子俱才元和平賊之功聽愬居其半父子昆弟皆以功名始終道家所忌之談李氏以善勝矣贊曰桓桓太師義勇天資運鍾禍亂力拯顛危愬事章武誅蔡平齊凌煙畫圖父子為宜
