body:
  text: 舊唐書卷一百五十一列傳第一百一高崇文子承簡伊慎朱忠亮劉昌裔范希朝王鍔子稷閻巨源孟元陽趙昌高崇文其先渤海人崇文生幽州朴厚寡言少從平盧軍貞元中隨韓全義鎮長武城治軍有聲五年夏吐蕃三萬寇寧州崇文率甲士三千救之戰于佛堂原大破之死者過半韓全義入覲崇文掌行營節度留務遷兼御史中丞十四年為長武城使積粟練兵軍聲大振永貞元年冬劉闢阻兵朝議討伐宰臣杜黃裳以為獨任崇文可以成功元和元年春拜檢校工部尚書兼御史大夫充左神策行營節度使兼統左右神策奉天麟游諸鎮兵以討闢時宿將專征者甚眾人人自謂當選及詔出大驚崇文在長武城練卒五千常若寇至及是中使至長武卯時宣命而辰時出師五千器用無闕者軍至興元軍中有折逆旅之匕箸斬之以徇西從閬中入遂却劍門之師解梓潼之圍賊將邢泚遁歸屯軍梓州因拜崇文為東川節度使先是劉闢攻陷東川擒節度使李康及崇文克梓州乃歸康求雪己罪崇文以康敗軍失守遂斬之成都北一百五十里有鹿頭山扼兩川之要闢築城以守又連八柵張掎角之勢以拒王師是日破賊二萬于鹿頭城下大雨如注不克登乃止明日又破于萬勝堆堆在鹿頭之東使驍將高霞寓親鼓士攀緣而上矢石如雨又命敢死士連登奪其堆燒其柵柵中之賊殲焉遂據堆下瞰鹿頭城城中人物可數凡八大戰皆大捷賊搖心矣八月阿跌光顏與崇文約到行營愆一日懼誅乃深入以自贖故軍於鹿頭西大河之口以斷賊糧道賊大駭是日賊綿江柵將李文悅以三千人歸順尋而鹿頭將仇良輔舉城降者眾二萬闢之男方叔子壻蘇強先監良輔軍是日械繫送京師降卒投戈面縛者彌十數里遂長驅而直指成都德陽等縣城皆鎮以重兵莫不望旗率服師無留行闢大懼以親兵及逆黨盧文若齎重寶西走吐蕃吐蕃素受其賂且將啟之崇文遣高霞寓酈定進倍道追之至羊灌田及焉闢自投岷江擒於湧湍之中西蜀平乃檻闢送京師伏法文若赴水死王師入成都介士屯于大逵軍令嚴肅珍寶山積市井不移無秋毫之犯先是賊將邢泚以兵二萬為鹿頭之援既降又貳斬之以徇衣冠陷逆者皆匍匐衙門請命崇文條奏全活之制授崇文檢校司空兼成都尹充劍南西川節度管內度支營田觀察處置統押近界諸蠻西山八國雲南安撫等使改封南平郡王食實封三百戶詔刻石紀功于鹿頭山下崇文不通文字厭大府案牘諮禀之繁且以優富之地無所陳力乞居塞上以扞邊戍懇疏累上二年冬制加同中書門下平章事邠州刺史邠寧慶三州節度觀察等使仍充京西都統恃其功而侈心大作帑藏之富百工之巧舉而自隨蜀都一罄以不習朝儀憚於入覲優詔令便道之鎮居三年大修戎備元和四年卒年六十四廢朝三日贈司徒諡曰威武配享憲宗廟庭子承簡少為忠武軍部將後入神策軍以父征劉闢拜嘉王傅裴度征淮蔡奏承簡以本官兼御史中丞為其軍都押衙淮西平詔以郾城上蔡遂平三縣為州治郾城用承簡為刺史尋轉邢州刺史值觀察使責時賦急承簡代數百戶出其租遷宋州刺史屬汴州逐其帥以部將李行帥事遣其將責宋官私財物承簡執而囚之自是汴使來者輒繫之一日并出斬于軍門之外威震郡中及兵大至宋州凡三城巳陷南一城承簡保北兩城以拒凡十餘戰會徐州救兵至為汴將李質執之傳送京師兵圍宋者即遁去授承簡檢校左散騎常侍兗海沂密等州節度觀察處置等使俄遷檢校工部尚書義成軍節度鄭滑潁等州觀察處置等使就加檢校尚書右僕射入拜右金吾衛大將軍充右街使復出為邠寧慶等州節度觀察處置等使先是羌虜多以秋月犯西邊承簡請軍寧州以備之因疾上言乞入覲即隨表詣闕大和元年八月行至永壽縣傳舍卒贈司空崇文孫駢歷位崇顯終淮南節度使自有傳伊慎兗州人善騎射始為果毅喪母將營合祔不識其父之墓晝夜號哭未浹日夢寐有指導焉遂發壠果得舊記驗大曆八年江西節度使路嗣恭討嶺南哥舒晃之亂以慎為先鋒直逼賊壘疾戰破之斬首三千級由是復始興之地未幾與諸將追斬晃於泔溪函首獻于闕下嗣恭表慎功授連州長史知當州團練副使三遷江州別駕討梁崇義之歲慎以江西牙將從李希烈摧鋒陷敵功又居多江漢既平希烈愛慎之材數遺善馬意欲縻之慎以計遁歸命本道明年希烈果反嗣曹王臯始至鍾陵大集將吏得慎而壯之大集兵將繕理舟師希烈懼慎為曹王所任遺慎七屬之甲詐為慎書行間焉上遣中使即軍以詰之曹王乃抗疏論雪上章未報會賊兵泝江來寇曹王乃召慎勉之令戰大破三千餘眾朝廷始信其不貳累破蔡山柵取蘄州降其將李良又攻黃梅縣殺賊將韓霜露斬首千餘級優詔褒異授試太子詹事封南充郡王又兼御史中丞蘄州刺史充節度都知兵馬使建中末車駕在梁洋鹽鐵使包佶以金幣泝江將進獻次于蘄口時賊已屠汴州遣驍將杜少誠將步騎萬餘來寇黃梅以絕江道慎兵七千遇於永安戌慎列樹三柵相去數里偃旗臥鼓於中柵聲鼓三柵悉兵以擊賊軍大亂少誠脫身以免斬級不可勝數江路遂通又破苟莽柵進兵圍安州賊阻溳水攻之不能下希烈遣其甥劉戒虛將騎八千來援慎分兵迎擊戰于應山擒戒虛縛示城下遂開門請罪以功拜安州刺史兼御史大夫仍賜實封一百戶希烈又遣將援隋州慎擊之於厲鄉走康叔夜斬首五千級希烈死李惠登為賊守隋州慎飛書招諭惠登遂以城降因密奏惠登可用詔授隋州刺史貞元十五年以慎為安黃等州節度管內支度營田觀察等使十六年吳少誠阻命詔以本道步騎五千兼統荊南湖南江西三道兵當其一面於申州城南前後破賊數千以例加檢校刑部尚書二十一年於安黃置奉義軍額以為奉義軍節度使檢校右僕射憲宗即位入真拜右僕射元和二年轉檢校左僕射兼右金吾衞大將軍以賂第五從直求鎮河中為從直所奏貶右衞將軍數月復為檢校尚書右僕射兼右衞上將軍元和六年卒年六十八贈太子太保朱忠亮本名士明汴州浚儀人初事薛嵩為將大曆中詔鎮普潤縣掌屯田朱泚之亂以麾下四十騎奔奉天德宗嘉之封東陽郡王為奉天定難功臣及大駕南幸為虜騎所獲繫於長安賊平李晟釋之薦於渾瑊署定平鎮都虞候鎮使李朝寀卒遂代之憲宗即位加御史大夫築臨涇城有勞特加檢校工部尚書涇原四鎮節度使仍賜名涇土舊俗多賣子忠亮以俸錢贖而還其親者約二百人元和八年卒贈右僕射劉昌裔太原陽曲人少遊三蜀楊琳之亂昌裔說其歸順及琳授洺州刺史以昌裔為從事琳死乃去曲環將幽隴兵收濮州也辟為判官詔授監察御史累加至檢校兵部尚書賜紫兼中丞充營田副使貞元十五年環鎮許州卒詔上官涗知節度留後吳少誠攻許州涗領事欲棄城走昌裔追止之曰留後既受詔宜以死守城況城中士馬足以破賊但堅壁不戰不過五七日賊勢必衰我以全制之可也涗然之賊日夕攻急堞壞不得修昌裔令造戰棚木柵以待募壯士破營得突將千人鑿城分出大破之因立戰棚木柵於城上城以故不陷兵馬使安國寧與涗不善謀反以城降賊事洩昌裔密計斬之即召其麾下千餘人食之賞縑二匹伏兵諸要巷令持縑者悉斬之無一人得脫十六年以全陳許功以涗為節度使昌裔為陳州刺史韓全義之敗水也與諸道兵皆走保陳州求舍昌裔登城謂曰天子命公討蔡州今來陳州義不敢納請舍城外而從千騎入全義營持牛酒勞軍全義不自意驚喜歎服十八年改充陳許行軍司馬明年涗卒詔昌裔為許州刺史充陳許節度使再加檢校右僕射元和八年五月許州大水壞廬舍漂溺居人六月徵昌裔加檢校左僕射兼左龍武統軍初昌裔以老疾而軍府無政因其水敗軍府上乃促令韓臯代之昌裔赴召至長樂驛聞有是命乃上言風眩請歸私第許之其年卒贈潞州大都督范希朝字致君河中虞鄉人建中年為邠寧虞候戎政修舉事節度使韓遊瓌及德宗幸奉天希朝戰守有功累加兼中丞為寧州刺史遊瓌入覲自奉天歸邠州以希朝素整肅有聲畏其逼己求其過將殺之希朝懼奔鳳翔德宗聞之趣召至京師置於左神策軍中遊瓌歿邠州諸將列名上請希朝為節度德宗許之希朝讓於張獻甫曰臣始逼而來終代其任非所以防覬覦安反側也詔嘉之以獻甫統邠寧數日除希朝振武節度使就加檢校禮部尚書振武有党項室韋交居川阜凌犯為盜日入慝作謂之刮城門居人懼駭鮮有寧日希朝周知要害置堡柵斥候嚴密人遂獲安異蕃雖鼠竊狗盜必殺無赦戎虜甚憚之曰有張光晟苦我久矣今聞是乃更姓名而來其見畏如此蕃落之俗有長帥至必効奇駝名馬雖廉者猶曰當從俗以致其歡希朝一無所受積十四年皆保塞而不為橫單于城中舊少樹希朝於他處市柳子命軍人種之俄遂成林居人賴之貞元末累表請修朝覲時節將不以他故自述職者惟希朝一人德宗大悅既至拜檢校右僕射兼右金吾大將軍順宗時王叔文黨用事將授韓泰以兵柄利希朝老疾易制乃命為左神策京西諸城鎮行營節度使鎮奉天而以泰為副欲因代之叔文敗而罷憲宗即位復以檢校僕射為右金吾出拜檢校司空充朔方靈鹽節度使突厥別部有沙陀者北方推其勇勁希朝誘致之自甘州舉族來歸眾且萬人其後以之討賊所至有功遷河東節度使率師討鎮州無功既耄且疾事不理除左龍武統軍以太子太保致仕元和九年卒贈太子太師希朝近代號為名將人多比之趙充國及張茂昭擊王承宗幾覆希朝玩寇不前物議罪之王鍔字昆吾自言太原人本湖南團練營將初楊炎貶道州司馬鍔候炎於路炎與言異之後嗣曹王臯為團練使擢任鍔頗便之使招邵州武岡叛將王國良有功表為邵州刺史及臯改江西節度使李希烈南侵臯請鍔以勁兵三千鎮尋陽後臯自以全軍臨九江既襲得蘄州盡以眾渡乃表鍔為江州刺史兼中丞充都虞候因以鍔從小心習事善探得軍府情狀至於言語動靜巨細畢以白臯臯亦推心委之雖家宴妻女之會鍔或在焉鍔感臯之知事無所避後臯攻安州使伊慎盛兵圍之賊懼請臯使至城中以約降臯使鍔懸而入既成約殺不從者以出明日城開臯以其眾入伊慎以賊恟懼由其圍也不下鍔鍔稱疾避之及臯為荊南節度使表鍔為江陵少尹兼中丞欲列於賓倅馬彝裴泰鄙鍔請去乃復以為都虞候明年從臯至京師臯稱鍔於德宗曰鍔雖文用小不足他皆可以試驗遂拜鴻臚少卿尋除容管經略使凡八年谿洞安之遷廣州刺史御史大夫嶺南節度使廣人與夷人雜處地征薄而叢求於川市鍔能計居人之業而榷其利所得與兩稅相埒鍔以兩稅錢上供時進及供奉外餘皆自入西南大海中諸國舶至則盡沒其利由是鍔家財富於公藏日發十餘艇重以犀象珠貝稱商貨而出諸境周以歲時循環不絕凡八年京師權門多富鍔之財拜刑部尚書時淮南節度使杜佑屢請代乃以鍔檢校兵部尚書充淮南副節度使鍔始見佑以趨拜悅佑退坐司馬廳事數日詔杜佑以鍔代之鍔明習簿領善小數以持下吏或有姦鍔畢究之嘗聽理有遺匿名書於前者左右取以授鍔鍔內之鞾中鞾中先有他書以雜之及吏退鍔探取他書焚之人信其以所匿名者焚也既歸省所告者異日乃以他微事連其所告者固窮按驗之以譎眾下吏以為神明鍔長於部領程作有法軍州所用竹木其餘碎屑無所棄皆復為用掾曹簾壞吏以新簾易之鍔察知以故者付舡坊以替箬其他率如此每有饗宴輒錄其餘以備後用或云賣之收利皆自歸故鍔錢流衍天下在鎮四年累至司空元和二年來朝真拜左僕射未幾除檢校司徒河中節度居三年兼太子太傅移鎮太原時方討鎮州鍔緝綏訓練軍府稱理鍔受符節居方面凡二十餘年九年加同平章事十年卒年七十六贈太尉鍔將卒約束後事甚明如知其死日鍔附太原王翃為從子以婚閥自炫翃子弟多附鍔以致名宦又嘗讀春秋左氏傳自稱儒者人皆笑之子稷歷官鴻臚少卿鍔在藩鎮稷嘗留京師以家財奉權要視官高下以進賂不待白其父而行之廣治第宅嘗奏請藉坊以益之作複垣洞穴實金錢於其中貴官清品溺其賞宴而遊不憚清議及父卒為奴所告稷換鍔遺表隱沒所進錢物上令鞫其奴於內仗又發中使就東都驗責其家財宰臣裴度苦諫於是罷其使而殺奴稷長慶二年為德州刺史廣齎金寶僕妾以行節度使李全略利其貨而圖之故致本州軍亂殺稷其室女為全略所虜以妓媵處之稷子叔泰開成四年滄州節度使劉約上言王稷為李全略所殺家無遺類稷男叔泰時年五歲郡人宋忠獻匿之獲免乃收養之今已成長臣奬其義忠獻已補職叔泰津送以聞文宗詔曰王鍔累朝宣力王稷一旦捐驅須錄孤遺微申憫念王叔泰委吏部與九品官令奉祭閻巨源貞元十九年以勝州刺史攝振武行軍司馬屬希朝入覲遂代為節度以材力進無他智能初不知書而好文其言輒乖誤時人多摭其談說以為戲然以寬厚為將卒所懷後為邠寧節度使檢校左僕射元和九年卒盂元陽起於陳許軍中理戎整肅勤事善部署曲環之為節度元陽已為大將環使董作西華屯元陽盛夏芒屩立稻田中須役者退而後就舍故其田歲無不稔軍中足食環卒吳少誠寇許州元陽城守外無救兵攻圍甚急而終不能傅其城賊乃罷兵韓全義五樓之敗諸軍多私歸元陽及神策都將蘇元策宣州都將王幹各率部留軍水破賊二千餘人兵罷加御史大夫元和初拜河陽節度檢校尚書五年拜右僕射昭義節度入為右羽林統軍封趙國公俄拜左金吾大將軍復除統軍元和九年卒贈揚州大都督趙昌字洪祚天水人祖不器父居貞皆有名於時李承昭為昭義節度辟昌在幕府貞元七年為虔州刺史屬安南都護為夷獠所逐拜安南都護夷人率化十年因屋壞傷脛懇疏乞還以檢校兵部郎中裴泰代之入拜國子祭酒及泰為首領所逐德宗詔昌問狀昌時年七十二而精健如少年者德宗奇之復命為都護南人相賀憲宗即位加檢校工部尚書尋轉戶部尚書充嶺南節度元和三年遷鎮荊南徵為太子賓客及得見拜工部尚書兼大理卿歲餘讓卿守本官六年除華州刺史辭於麟德殿時年八十餘趨拜輕捷召對詳明上退而歎異宣宰臣密訪其頤養之道以奏焉在郡三年入為太子少保九年卒年八十五贈揚州大都督諡曰成史臣曰高崇文以律貞師勤於軍政戎麾指蜀遽立奇功可謂近朝之良將也伊慎朱忠亮劉昌裔范希朝閻巨源孟元陽趙昌等各立功立事亦一時之名臣王鍔明可照姦忠能奉主此乃垂名於後也至若竹頭木屑曾無棄遺作事有程儉而足用則又士君子之為也如賤收貴出務積珠金唯利是求多財為累則與夫清白遺子孫者遠矣凡百在位得不鑑之贊曰崇文之功顯於西蜀伊慎之忠見乎南服朱劉范閻各有其目元陽趙昌不無遺躅惟彼太原戰勳可錄累在多財子孫不祿
