徙封潞王賢為沛王是日以雍州牧幽州都督沛王賢為揚州都督左武候大將軍牧如故以洛州牧周王顯為幷州都督是日敕中書門下五品已上諸司長官尚書省侍郎幷諸親三等已上並詣沛王宅設宴禮奏九部樂禮畢賜帛雜綵等各有差冬十月丁卯狩于陸渾癸酉還宮是歲新羅王金春秋卒其子法敏嗣立二年春正月乙巳太府寺更置少卿一員分兩京檢校丙午東都初置國子監幷加學生等員均分於兩都教授二月甲子改京諸司及百官名尚書省為中臺門下省為東臺中書省為西臺左右僕射為左右匡政左右丞為肅機侍中為左相中書令為右相自餘各以義訓改之又改六宮內職名甲戌司戎太常伯浿江道總管樂安縣公任雅相卒於軍三月甲申自東都還京癸丑幸同州蘇定方破高麗于葦島又進攻平壤城不克而還夏四月庚申朔至自東都辛巳造蓬萊宮成徙居之五月丙申左侍極許圉師為左相乙巳復置律書算三學六月己未朔皇子旭輪生乙丑初令道士女冠僧尼等並盡禮致拜其父母乙亥制蓬萊宮諸門殿亭等名秋七月丁亥朔以東宮誕育滿月大赦天下賜酺三日八月甲午右相許敬宗乞骸骨壬寅許敬宗為太子少師同東西臺三品仍知西臺事九月司禮少常伯孫茂道奏稱八品九品舊令著青亂紫非卑品所服望令著碧詔從之戊寅前吏部尚書河間郡公李義府起復為司列太常伯同東西臺三品冬十月丁酉幸溫湯皇太子弘監國丁未至自溫湯庚戌西臺侍郎上官儀同東西臺三品十一月辛未左相許圉師下獄癸酉封皇第四子旭輪為殷王十二月辛丑改魏州為冀州大都督府改冀州為魏州又以幷揚荊益四都督府並為大都督府沛王賢為揚州大都督周王顯為幷州大都督殷王旭輪遙領冀州大都督左相許圉師解見任三年春正月左武衞大將軍鄭仁泰等帥師討鐵勒餘種盡平之乙丑司列太常伯李義府為右相二月丙戌隴雍同岐等一十五州戶口徵修蓬萊宮癸巳置太子左右諭德及桂坊大夫等官員改司經局為桂坊館崇賢館罷隸左春坊丁酉減京官一月俸助修蓬萊宮庚戌詔曰天德施生陽和在節言念幽圄載惻分宵雖復每有哀矜猶恐未免枉濫在京繫囚應流死者每日將二十人過於是親自臨問多所原宥不盡者令皇太子錄之詔以書學隸蘭臺算學隸秘閣律學隸詳刑寺改燕然都護府為瀚海都護府瀚海都護府為雲中都護府二月前左相許圉師左遷虔州刺史太子弘撰瑤山玉彩成書凡五百卷夏四月乙丑右相李義府下獄戊子李義府除名配流巂州丙午幸蓬萊宮新起含元殿秋八月癸卯彗星見於左攝提戊申詔百僚極言正諫命司元太常伯竇德玄司刑太常伯劉祥道等九人為持節大使分行天下仍令內外官五品已上各舉所知冬十月丙申絳州麟見于介山丙午含元殿前麟趾見十一月癸酉雨冰十二月庚子詔改來年正月一日為麟德元年麟德元年春正月甲子改雲中都護府為單于大都護府官品同大都督府二月丁亥加授殷王旭輪單于大都護戊子幸萬年宮三月辛亥展大射禮丁卯長女追封安定公主諡曰思其鹵簿鼓吹及供葬所須並如親王之制於德業寺遷于崇敬寺夏四月衞州刺史道王元慶薨五月許王孝薨乙卯於昆明之弄棟川置姚州都督府秋八月丙子朔至自萬年宮便幸舊宅己卯降萬年縣繫囚因幸大慈恩寺壬午還蓬萊宮戊子兼司列太常伯檢校沛王府長史城陽縣侯劉祥道兼右相大司憲竇德玄兼司元太常伯檢校左相九月己卯詔曰周京兆尹左右宮伯大將軍司衞上將軍少冢宰廣陵郡公宇文孝伯忠亮存心貞堅表志淫刑既逞方納諫而求仁忍忌將加甘捐軀而徇節年載雖久風烈猶生宜峻徽章式旌胤冑其孫左威衞長史思純可加授朝散大夫十二月丙戌殺西臺侍郎上官儀戊子庶人忠坐與儀交通賜死右相城陽縣侯劉祥道為司禮太常伯太子右中護檢校西臺侍郎樂彥瑋西臺侍郎孫處約同知政事是冬無雪二年春正月壬午幸東都丁酉幸合璧宮戊子慮雍洛二州及諸司囚甲子以發向泰山停選三月甲寅兼司戎太常伯永安郡公姜恪同東西臺三品辛未東都造乾元殿成閏月癸酉日有蝕之四月丙午曲赦桂廣黔三都督府管內大辟罪已上丙寅講武邙山之陽御城北樓觀之戊辰左侍極仍檢校大司成嘉興縣子陸敦信為檢校右相其大司成宜停西臺侍郎孫處約樂彥瑋並停知政事五月辛卯以秘閣郎中李淳風造曆成名麟德曆頒之以司空英國公李勣少師高陽郡公許敬宗右相嘉興縣子陸敦信左相鉅鹿男竇德玄為檢校封禪使六月鄜州大水壞城邑秋七月鄧王元裕薨冬十月戊午皇后請封禪司禮太常伯劉祥道上疏請封禪癸亥高麗王高藏遣其子福男來朝丁卯將封泰山發自東都是歲大稔米斗五錢麰麥不列市十一月丙子次于原武以少牢祭漢將紀信墓贈驃騎大將軍庚寅華州刺史燕國公于志寧卒十二月丙午御齊州大廳乙卯命有司祭泰山丙辰發靈巖頓
