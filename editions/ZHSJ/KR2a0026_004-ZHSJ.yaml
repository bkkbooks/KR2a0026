body:
  text: 舊唐書卷四本紀第四高宗上高宗天皇大聖大弘孝皇帝諱治太宗第九子也母曰文德順聖長孫皇后以貞觀二年六月生於東宮之麗正殿五年封晉王七年遙授幷州都督幼而岐嶷端審寬仁孝友初授孝經於著作郎蕭德言太宗問曰此書中何言為要對曰夫孝始於事親中於事君終於立身君子之事上進思盡忠退思補過將順其美匡救其惡太宗大悅曰行此足以事父兄為臣子矣及文德皇后崩晉王時年九歲哀慕感動左右太宗屢加慰撫由是特深寵異尋拜右武候大將軍十七年皇太子承乾廢魏王泰亦以罪黜太宗與長孫無忌房玄齡李勣等計議立晉王為皇太子太宗每視朝常令在側觀決庶政或令參議太宗數稱其善十八年太宗將伐高麗命太子留鎮定州及駕發有期悲啼累日因請飛驛遞表起居幷遞敕垂報並許之飛表奏事自此始也及軍旋太子從至幷州時太宗患癰太子親吮之扶輦步從數日二十三年五月己巳太宗崩庚午以禮部尚書兼太子少師黎陽縣公于志寧為侍中太子少詹事兼尚書左丞張行成為兼侍中檢校刑部尚書太子右庶子兼吏部侍郎攝戶部尚書高季輔為兼中書令檢校吏部尚書太子左庶子高陽縣男許敬宗兼禮部尚書辛未還京六月甲戌朔皇太子即皇帝位時年二十二詔曰大行皇帝奄棄普天痛貫心靈若置湯火思遵大孝不敢滅身永慕長號將何逮及粵以孤眇屬當元嗣思勵空薄康濟黎元敬順惟新仰昭先德宜布凱澤被乎億兆可大赦天下內外文武賜勳官一級諸年八十以上賚以粟帛雍州及諸州比年供軍勞役尤甚之處並給復一年辛巳改民部尚書為戶部尚書疊州都督英國公勣為特進檢校洛州刺史仍於洛陽宮留守癸未詔司徒揚州都督趙國公無忌為太尉兼檢校中書令知尚書門下二省事餘並如故賜物三千段癸巳特進英國公勣為開府儀同三司同中書門下三品秋七月丙午有司請改治書侍御史為御史中丞諸州治中為司馬別駕為長史治禮郎為奉禮郎以避上名以貞觀時不諱先帝二字不許有司奏曰先帝二名禮不偏諱上既單名臣子不合指斥上乃從之己酉于闐王伏闍信來朝八月癸酉朔河東地震晉州尤甚壞廬舍壓死者五千餘人三日又震詔遣使存問給復二年壓死者賜絹三匹以開府儀同三司英國公勣為尚書左僕射同中書門下三品僕射始帶同中書門下庚寅葬太宗於昭陵九月甲寅加授鄜州刺史荊王元景為司徒前安州都督吳王恪為司空兼梁州刺史丙寅贈太尉梁國公玄齡贈司徒申國公士廉贈左僕射蔣國公屈突通並可配食太宗廟庭冬十一月甲子以瑤池都督阿史那賀魯為左驍衞大將軍乙丑晉州地又震是冬無雪永徽元年春正月辛丑朔上不受朝詔改元壬寅御太極殿受朝而不會丙午立妃王氏為皇后丁未以陳王忠為雍州牧二月辛卯封皇子孝為許王上金為嵵王素節為雍王夏四月己巳朔晉州地又震五月丁未上謂羣臣曰朕謬膺大位政教不明遂使晉州之地屢有震動良由賞罰失中政道乖方卿等宜各進封事極言得失以匡不逮吐火羅遣使獻大鳥如駝食銅鐵上遣獻于昭陵吐蕃贊普死遣右武衞將軍鮮于匡濟齎璽書往弔祭六月庚辰晉州地震秋七月丙寅以旱親錄京城囚徒九月癸卯右驍衞郎將高侃執車鼻可汗詣闕獻于社廟及昭陵己未尚書左僕射英國公勣固請解職許之令以開府儀同三司同中書門下三品十一月己未中書令河南郡公褚遂良左授同州刺史十二月瑤池都督沙鉢羅葉護阿史那賀魯以府叛自稱可汗總有西域之地是歲雍絳同等九州旱蝗齊定等十六州水二年春正月戊戌詔曰去歲關輔之地頗弊蝗螟天下諸州或遭水旱百姓之間致有罄乏此由朕之不德兆庶何辜矜物罪己載深憂惕今獻歲肇春東作方始糧廩或空事資賑給其遭蟲水處有貧乏者得以正義倉賑貸雍同二州各遣郎中一人充使存問務盡哀矜之旨副朕乃眷之心乙巳黃門侍郎平昌縣公宇文節加銀青光祿大夫依舊同中書門下三品守中書侍郎柳奭為中書侍郎依舊同中書門下三品夏四月乙酉秩太廟令及獻昭二陵令從五品丞從七品五月壬辰開府儀同三司及京官文武職事四品五品並給隨身魚六月辛酉開府儀同三司襄邑王神符薨秋七月丁未賀魯寇陷金嶺城蒲類縣遣武候大將軍梁建方右驍衞大將軍契苾何力為弓月道總管以討之八月乙丑大食國始遣使朝獻己巳侍中燕國公于志寧為尚書左僕射侍中兼刑部尚書北平縣公張行成為尚書右僕射並同中書門下三品猶不入銜中書令兼檢校吏部尚書蓨縣公高季輔為侍郎九月癸巳改九成宮為萬年宮廢玉華宮以為佛寺閏月辛未頒新定律令格式於天下冬十月辛卯晉州地震十一月辛酉有事於南郊戊辰定襄地震丁丑以高昌故地置安西都護府白水蠻寇麻州命左領軍將軍趙孝祖討平之三年春正月癸亥以去秋至于是月不雨上避正殿降天下死罪及流罪遞減一等徒以下咸宥之弓月道總管梁建方契苾何力等大破處月朱耶孤注於牢山斬首九千級虜渠帥六千俘生口萬餘獲牛馬雜畜七萬丙寅太尉趙國公無忌以旱請遜位不許己巳同州刺史河南郡公褚遂良為吏部尚書同中書門下三品丙子親祠太廟丁亥籍于千畝賜羣官帛有差三月辛巳黃門侍郎平昌縣公宇文節為侍中中書侍郎柳奭為中書令庚申幸觀德殿賜文武羣官大射夏四月庚寅左領軍將軍趙孝祖大破白水蠻大勃律甲午澧州刺史彭王元則薨五月庚辰詔以周司沐大夫裴融齊侍中崔季舒給事黃門侍郎裴澤尚書左丞封孝琰隋儀同三司豆盧毓御史中丞游楚客等並門挺忠鯁其子孫各宜甄擢秋七月丁巳立陳王忠為皇太子大赦天下五品已上子為父後者賜勳一轉大酺三日乙丑左僕射于志寧兼太子少師右僕射張行成兼太子少傅侍中高季輔兼太子少保侍中宇文節兼太子詹事丁丑上問戶部尚書高履行去年進戶多少履行奏稱進戶總一十五萬又問曰隋日有幾戶今見有幾戶履行奏隋開皇中有戶八百七十萬即今見有戶三百八十萬九月丁巳改太子中允為內允中書舍人為內史舍人諸率府中郎將改為旅賁郎將以避太子名冬十月戊戌幸同安大長公主第又幸高陽長公主第即日還宮十一月乙亥駮馬國遣使朝貢庚寅弘化長公主自吐谷渾來朝十二月癸巳濮王泰薨四年春正月癸丑朔上臨軒不受朝以濮王泰在殯故也丙子新除房州刺史駙馬都尉房遺愛司徒秦州刺史荊王元景司空安州刺史吳王恪寧州刺史駙馬都尉薛萬徹嵐州刺史駙馬都尉柴令武謀反二月乙酉遺愛萬徹令武等並伏誅元景恪巴陵高陽公主並賜死左驍衞大將軍安國公執失思力配流巂州侍中兼太子詹事平昌縣公宇文節配流桂州戊子特進太常卿江夏王道宗配流桂州恪母弟蜀王愔廢為庶人己亥絳州刺史徐王元禮加授司徒開府儀同三司英國公勣為司空三月壬子朔頒孔穎達五經正義於天下每年明經令依此考試丙辰上御觀德殿陳逆人房遺愛等口馬資財為五𣛀引王公諸親蕃客及文武九品已上射夏四月戊子林邑國王遣使來朝貢馴象壬寅以旱避正殿減膳親錄繫囚遣使分省天下冤獄詔文武官極言得失八月己亥隕石十八于同州之馮翊有聲如雷九月壬寅尚書右僕射北平縣公張行成薨甲戌吏部尚書河南郡公褚遂良為尚書右僕射依舊知政事冬十月庚子幸新豐之溫湯甲辰曲赦新豐乙巳至自溫湯戊申睦州女子陳碩貞舉兵反自稱文佳皇帝攻陷睦州屬縣婺州刺史崔義玄揚州都督府長史房仁裕各率衆討平之十一月癸丑兵部尚書固安縣公崔敦禮為侍中頒新律疏於天下十二月庚子侍中兼太子少保蓨縣公高季輔卒五年春三月戊午幸萬年宮辛未曲赦所經州縣繫囚以工部尚書閻立德領丁夫四萬築長安羅郭夏四月守黃門侍郎潁川縣公韓瑗守尚書侍郎來濟並加銀青光祿大夫依舊同中書門下三品閏五月丁丑夜大雨水漲暴溢漂溺麟遊縣居人及當番衞士死者三千餘人六月恆州大雨滹沱河泛溢溺五千餘家癸丑蒲州汾陰縣暴雨漂溺居人浸壞廬舍癸亥中書令柳奭兼吏部尚書丙寅河北諸州大水七月辛巳有小鳥如雀生大鳥如鳩於萬年宮皇帝舊宅八月大理奏決死囚總管七十餘人辛亥詔自今已後五品已上有薨亡者隨身魚並不須追收辛未吐蕃使人獻馬百匹及大拂廬可高五丈廣袤各二十七步九月丁酉至自萬年宮冬十一月癸酉築京師羅郭和雇京兆百姓四萬一千人板築三十日而罷九門各施觀十二月癸丑倭國獻琥珀碼碯琥珀大如斗碼碯大如五斗器戊午發京師謁昭陵在路生皇子賢己未敕二年一定戶六年春正月壬申朔親謁昭陵曲赦醴泉縣民放今年租賦陵所宿衞將軍郎將進爵一等陵令丞加階賜物甲戌至自昭陵於陵側建佛寺庚寅封皇子弘為代王賢為潞王二月乙巳皇太子忠加元服內外文武職事五品已上為父後者賜勳一級大酺三日三月營州都督程名振破高麗於貴端水嘉州辛道讓妻一產四男壬戌昭儀武氏著內訓一篇夏五月癸未命左屯衞大將軍盧國公程知節等五將軍帥師出葱山道以討賀魯黃門侍郎潁川郡公韓瑗為侍中中書侍郎南陽男來濟為中書令兼吏部尚書河東縣男柳奭貶遂州刺史六月大食國遣使朝貢秋七月乙亥侍中固安縣公崔敦禮為中書令乙酉均天下州縣公廨八月尚藥奉御蔣孝璋員外特置仍同正員外同正自蔣孝璋始也己酉大理更置少卿一員先是大雨道路不通京師米價暴貴出倉粟糶之京師東西二市置常平倉九月庚午尚書右僕射河南郡公褚遂良以諫立武昭儀貶授潭州都督乙酉洛州大水毀天津橋冬十月己酉廢皇后王氏為庶人立昭儀武氏為皇后大赦天下十一月丁卯朔臨軒命司空勣左僕射志寧冊皇后文武羣官及番夷之長奉朝皇后於肅義門十一月己巳皇后見于廟癸酉追贈后父故工部尚書應國公贈幷州都督武士為司空丙子淄州高苑縣吳文威妻魏氏一產四男三見育癸巳應國夫人楊氏改封代國夫人十二月遣禮部尚書高陽縣男許敬宗每日待詔於武德殿西門七年春正月辛未廢皇太子忠為梁王立代王弘為皇太子壬申大赦改元為顯慶文武九品已上及五品已下子為父後者賜勳官一轉大酺三日甲子尚書左僕射兼太子少師燕國公于志寧兼太子太傅侍中韓瑗中書令來濟禮部尚書許敬宗並為太子賓客始有賓客也御玄武門餞葱山道大總管程知節二月庚寅名破陣樂為神功破陣樂辛亥贈司空武士為司徒周國公三月辛巳皇后祀先蠶于北郊丙戌戶部侍郎杜正倫為守黃門侍郎同中書門下三品夏四月戊申御安福門觀僧玄奘迎御製幷書慈恩寺碑文導從以天竺法儀其徒甚盛五月己卯太尉長孫無忌進史官所撰梁陳周齊隋五代史志三十卷弘文館學士許敬宗進所撰東殿新書二百卷上自製序六月岐州刺史潞王賢為雍州牧秋七月癸未中書令兼檢校太子詹事固安縣公崔敦禮為太子少師同中書門下三品改戶部尚書為度支尚書侍郎亦然八月丙申太子少師崔敦禮卒左衞大將軍程知節與賀魯所部歌邏祿獲剌頡發及處月預支俟斤等戰於榆幕谷大破之斬首千餘級獲駝馬牛羊萬計九月癸酉初詔戶滿三萬已上為上州二萬已上為中州先為上州中州者各依舊皇后製外戚誡庚辰括州海水泛溢壞安固永嘉二縣損四千餘家辛巳初制都督及上州各置執刀十五人中州下州十人癸未初置驃