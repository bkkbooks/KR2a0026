body:
  text: 舊唐書卷一百八十四列傳第一百三十四宦官楊思勗高力士李輔國程元振魚朝恩劉希暹賈明觀竇文場霍仙鳴俱文珍吐突承璀王守澄田令孜楊復光楊復恭唐制有內侍省其官員內侍四人內常侍六人內謁者監六人內給事八人謁者十二人典引十八人寺伯二人寺人六人別有五局掖廷局掌宮人簿籍宮闈局掌宮內門禁其屬有掌扇給使等員奚官局掌宮人疾病死喪內僕局掌宮中供帳燈燭內府局主中藏給納五局有令丞皆內官為之貞觀中太宗定制內侍省不置三品官內侍是長官階四品至永淳末向七十年權未假於內官但在閤門守禦黃衣廩食而已則天稱制二十年間差增員位中宗性慈務崇恩貨神龍中宦官三千餘人超授七品以上員外官者千餘人然衣朱紫者尚寡玄宗在位既久崇重宮禁中官稍稱旨者即授三品左右監門將軍得門施棨戟開元天寶中長安大內大明興慶三宮皇子十宅院皇孫百孫院東都大內上陽兩宮大率宮女四萬人品官黃衣已上三千人衣朱紫者千餘人後李輔國從幸靈武程元振翼衞代宗怙寵邀君乃至守三公封王爵干預國政亦未全握兵權代宗時子儀北伐親王東討遂特立觀軍容宣慰使命魚朝恩為之然自有統帥亦監領而已德宗避涇師之難幸山南內官竇文場霍仙鳴擁從賊平之後不欲武臣典重兵其左右神策天威等軍欲委宦者主之乃置護軍中尉兩員中護軍兩員分掌禁兵以文場仙鳴為兩中尉自是神策親軍之權全歸於宦者矣自貞元之後威權日熾蘭錡將臣率皆子蓄藩方戎帥必以賄成萬機之與奪任情九重之廢立由己元和之季毒被乘輿長慶纘隆徒鬱枕干之憤臨軒暇逸旋忘塗地之冤而易月未除滔天盡怒甲第名園之賜莫匪伶官朱袍紫綬之榮無非巷伯是時高品白身之數四千六百一十八人內則參秉戎權外則監臨藩嶽文宗包祖宗之恥痛肘腋之讎思翦厲階去其太甚宋申錫言未出口尋以破家李仲言謀之不臧幾乎敗國何竇之徒轉蹙讓珪之勢尤狂五十餘年禍胎踰煽昭宗之季所不忍聞臣遍覽前書考茲覆轍試言大較庶竭其源何者自書契已來不無閽寺況垂之天象備見職官即如秦皇漢武宮闈之內宦官以侍宴遊但英睿之君措置斯得及荒僻之主奢蕩是求委番棸蹶楀之徒飾姬姜狗馬之玩外言不入惟欲是從雖並列五侯猶為賞薄遍封萬戶尚嫌恩疏苟思捧日之勤遂據迴天之勢及三綱錯亂四海崩離袁本初之入北宮無鬚殆盡石冉閔之攻鄴下內豎咸誅旋至殄瘁邦家不獨感傷和氣淫刑斯逞可為傷心向使不假威權但趨帷扆何止四星終吉抑亦萬乘延洪昔賢為社鼠之喻不其然乎今錄楊思勗已下所行事以為鑒誡云楊思勗本姓蘇羅州石城人為內官楊氏所養以閹從事內侍省預討李多祚功超拜銀青光祿大夫行內侍思勗有膂力殘忍好殺從臨淄王誅韋氏遂從王為爪士累遷右監門衞將軍開元初安南首領梅玄成叛自稱黑帝與林邑真臘國通謀陷安南府詔思勗將兵討之思勗至嶺表鳩募首領子弟兵馬十餘萬取伏波故道以進出其不意玄成遽聞兵至惶惑計無所出竟為官軍所擒臨陣斬之盡誅其黨與積屍為京觀而還十二年五谿首領覃行璋作亂思勗復受詔率兵討之生擒行璋斬其黨三萬餘級以軍功累加輔國大將軍後從東封又加驃騎大將軍封虢國公十四年邕州賊帥梁大海擁賓橫等數州反叛思勗又統兵討之生擒梁大海等三千餘人斬餘黨二萬餘級復積屍為京觀十六年瀧州首領陳行範何遊魯馮璘等聚徒作亂陷四十餘城行範自稱帝遊魯稱定國大將軍璘稱南越王割據嶺表詔思勗率永連道等兵及淮南弩手十萬人進討兵至瀧州臨陣擒遊魯馮璘斬之行範潛竄深州投雲際盤遼二洞思勗悉衆攻之生擒行範斬之斬其黨六萬級獲口馬金玉巨萬計思勗性剛決所得俘囚多生剝其面或剺髮際掣去頭皮將士已下望風慴憚莫敢仰視故所至立功內給事牛仙童使幽州受張守珪厚賂玄宗怒命思勗殺之思勗縛架之數日乃探取其心截去手足割肉而啖之其殘酷如此二十八年卒時年八十餘高力士潘州人本姓馮少閹與同類金剛二人聖曆元年嶺南討擊使李千里進入宮則天嘉其黠惠總角修整令給事左右後因小過撻而逐之內官高延福收為假子延福出自武三思家力士遂往來三思第歲餘則天復召入禁中隸司宮臺廩食之長六尺五寸性謹密能傳詔敕授宮闈丞景龍中玄宗在藩力士傾心奉之接以恩顧及唐隆平內難升儲位奏力士屬內坊日侍左右擢授朝散大夫內給事先天中預誅蕭岑等功超拜銀青光祿大夫行內侍同正員開元初加右監門衞將軍知內侍省事玄宗尊重宮闈中官稍稱旨即授三品將軍門施棨戟故楊思勗黎敬仁林招隱尹鳳祥等貴寵與力士等楊則持節討伐黎林則奉使宣傳尹則主書院其餘孫六韓莊楊八牛仙童劉奉廷王承恩張道斌李大宜朱光輝郭全邊令誠等殿頭供奉監軍入蕃教坊功德主當皆為委任之務監軍則權過節度出使則列郡辟易其郡縣豐贍中官一至軍則所冀千萬計修功德市鳥獸詣一處則不啻千貫皆在力士可否故帝城中甲第畿甸上田菓園池沼中官參半於其間矣每四方進奏文表必先呈力士然後進御小事便決之玄宗常曰力士當上我寢則穩故常止於宮中稀出外宅若附會者想望風彩以冀吹噓竭肝膽者多矣宇文融李林甫李適之蓋嘉運韋堅楊慎矜王鉷楊國忠安祿山安思順高仙芝因之而取將相高位其餘職不可勝紀肅宗在春宮呼為二兄諸王公主皆呼阿翁駙馬輩呼為爺力士於寢殿側簾帷中休息殿側亦有一院中有修功德處雕瑩璀璨窮極精妙力士謹慎無大過然自宇文融已下用權相噬以紊朝綱皆力士之由又與時消息觀其勢候雖至親愛臨覆敗皆不之救力士義父高延福夫妻正授供奉嶺南節度使於潘州求其本母麥氏送長安令兩媼在堂備於甘脆金吾大將軍程伯獻與力士結為兄弟麥氏亡伯獻於靈筵散髮具縗絰受賓弔答十七年贈力士父廣州大都督麥氏越國夫人開元初瀛州呂玄晤作吏京師女有姿色力士娶之為婦擢玄晤為少卿刺史子弟皆為王傅呂夫人卒葬城東葬禮甚盛中外爭致祭贈充溢衢路自第至墓車馬不絕天寶初加力士冠軍大將軍右監門衞大將軍進封渤海郡公七載加驃騎大將軍力士資產殷厚非王侯能擬於來庭坊造寶壽佛寺興寧坊造華封道士觀寶殿珍臺侔於國力於京城西北截澧水作碾並轉五輪日碾麥三百斛初寶壽寺鐘成力士齋慶之舉朝畢至凡擊鐘者一擊百千有規其意者擊至二十杵少尚十杵其後又有華州袁思藝特承恩顧然力士巧密人悅之思藝驕倨人士疏懼之十四載置內侍省內侍監兩員秩正三品以力士思藝對任之玄宗幸蜀思藝走投祿山力士從幸成都進封齊國公從上皇還京加開府儀同三司賜實封五百戶上元元年八月上皇移居西內甘露殿力士與內官王承恩魏悅等因侍上皇登長慶樓為李輔國所構配流黔中道力士至巫州地多薺而不食因感傷而詠之曰兩京作斤賣五谿無人採夷夏雖不同氣味終不改寶應元年三月會赦歸至朗州遇流人言京國事始知上皇厭代力士北望號慟嘔血而卒代宗以其耆宿保護先朝贈揚州大都督陪葬泰陵李輔國本名靜忠閑馬家小兒少為閹貌陋粗知書計為僕事高力士年且四十餘令掌中簿籍天寶中閑使王鉷嘉其畜牧之能薦入東宮祿山之亂玄宗幸蜀輔國侍太子扈從至馬嵬誅楊國忠輔國獻計太子請分玄宗麾下兵北趨朔方以圖興復輔國從至靈武勸太子即帝位以系人心肅宗即位擢為太子家令判元帥府行軍司馬事以心腹委之仍賜名護國四方奏事御前符印軍號一以委之輔國不茹葷血常為僧行視事之隙手持念珠人皆信以為善從幸鳳翔授太子詹事改名輔國肅宗還京拜殿中監閑五坊宮苑營田栽接總監等使又兼隴右羣牧京畿鑄錢長春宮等使勾當少府殿中二監都使至德二年十二月加開府儀同三司進封郕國公食實封五百戶宰臣百司不時奏事皆因輔國上決常在銀臺門受事置察事廳子數十人官吏有小過無不伺知即加推訊府縣按鞫三司制獄必詣輔國取決隨意區分皆稱制敕無敢異議者每出則甲士數百人衞從中貴人不敢呼其官但呼五郎宰相李揆山東甲族位居台輔見輔國執子弟之禮謂之五父肅宗又為輔國娶故吏部侍郎元希聲侄擢女為妻擢弟挹時並引入臺省擢為梁州長史輔國判元帥行軍司馬專掌禁兵賜內宅居止上皇自蜀還京居興慶宮肅宗自夾城中起居上皇時召伶官奏樂持盈公主往來宮中輔國常陰候其隙而間之上元元年上皇嘗登長慶樓與公主語劍南奏事官過朝謁上皇令公主及如仙媛作主人輔國起微賤貴達日近不為上皇左右所禮慮恩顧或衰乃潛畫奇謀以自固因持盈待客乃奏云南內有異謀矯詔移上皇居西內送持盈於玉真觀高力士等皆坐流竄二年八月拜兵部尚書餘官如故詔羣臣於尚書省送上賜御府酒饌太常樂武士戎服夾道朝列畢會輔國驕恣日甚求為宰臣肅宗曰以公勳力何官不可但未允朝望如何輔國諷僕射裴冕聯章薦己肅宗密謂宰臣蕭華曰輔國欲帶平章事卿等欲有章薦信乎華不對問裴冕曰初無此事吾臂可截宰相不可得也華復入奏上喜曰冕固堪大用輔國銜之寶應元年四月肅宗寢疾宰臣等不可謁見輔國誣奏華專權請黜之上不許輔國固請不已乃罷華知政事守禮部尚書及帝崩華竟被斥逐代宗即位輔國與程元振有定策功愈恣橫私奏曰大家但內𩹉坐外事聽老奴處置代宗怒其不遜以方握禁軍不欲遽責乃尊為尚父政無臣細皆委參決五月加司空中書令食實封八百戶程元振欲奪其權請上漸加禁制乘其有間乃罷輔國判元帥行軍事其閑已下使名並分授諸貴仍移居外輔國始懼茫然失據詔進封博陸王罷中書令許朝朔望輔國欲入中書修謝表閽吏止之曰尚父罷相不合復入此門乃氣憤而言曰老奴死罪事郎君不了請於地下事先帝上猶優詔答之十月十八日夜盜入輔國第殺輔國攜首臂而去詔刻木首葬之仍贈太傅程元振以宦者直內侍省累遷至內射生使寶應末肅宗晏駕張皇后與太子有怨恐不附己引越王係入宮欲令監國元振知其謀密告李輔國乃挾太子誅越王並其黨與代宗即位以功拜飛龍副使右監門將軍上柱國知內侍省事尋代輔國判元帥行軍司馬專制禁兵加鎮軍大將軍右監門衞大將軍封保定縣侯充寶應軍使九月加驃騎大將軍封邠國公贈其父元貞司空母郄氏趙國夫人是時元振之權甚於輔國軍中呼為十郎元振常請託於襄陽節度使來瑱瑱不從及元振握權徵瑱入朝瑱遷延不至廣德元年破裴茙遂入朝拜兵部尚書元振欲報私憾誣瑱之罪竟坐誅宰臣裴冕為肅宗山陵使有事與元振相違乃發小吏贓私貶冕施州刺史來瑱名將裴冕元勳二人既被誣陷天下方鎮皆解體元振猶以驕豪自處不顧物議九月吐蕃党項入犯京畿下詔徵兵諸道卒無至者十月蕃軍至便橋代宗蒼黃出幸陝州賊陷京師府庫蕩盡及至行在太常博士柳伉上疏切諫誅元振以謝天下代宗顧人情歸咎乃罷元振官放歸田里家在三原十二月車駕還京元振服縗麻於車中入京城以規任用與御史大夫王昇飲酒為御史所彈詔曰族談錯立法尚不容同惡陰謀議當從重有一於此情實難原程元振性惟兇愎質本庸愚蕞爾之身合當萬死頃已寬其嚴典念其微勞屈法伸恩放歸田里仍乖克己尚未知非既忘含煦之仁別貯覬覦之望敢為嘯聚仍欲動搖不令之臣共為睥睨妄談休咎仍懷怨望束兵裹甲變服潛行無顧君親將圖不軌按驗皆是無所逃刑首足異門未云塞責朕猶不忘薄効再捨罪人特寬斧鉞之誅俾正投荒之典宜長流溱州百姓委京兆府差綱遞送路次州縣差人防援至彼捉搦勿許東西縱有非常之赦不在會恩之限凡百僚庶宜體朕懷魚朝恩天寶末以宦者入內侍省初為品官給事黃門性黠惠善宣答通書計至德中常令監軍事九節度討安慶緒於相州不立統帥以朝恩為觀軍容宣慰處置使觀軍容使名自朝恩始也以功累加左監門衞大將軍時郭子儀頻立大功當代無出其右朝恩妬其功高屢行間諜子儀悉心奉上殊不介意肅宗英悟特察其心故朝恩之間不行自相州之敗史思明再陷河洛朝恩常統禁軍鎮陝以殿東夏廣德元年西蕃入犯京畿代宗幸陝時禁軍不集徵召離散比至華陰朝恩大軍遽至迎奉六師方振由是深加寵異改為天下觀軍容宣慰處置使時四方未寧萬務事殷上方注意勳臣朝恩專典神策軍出入禁中賞賜無算朝恩性本凡劣恃勳自伐靡所忌憚時引腐儒及輕薄文士於門下講授經籍作為文章粗能把筆釋義乃大言於朝士之中自謂有文武才幹以邀恩寵上優遇之加判國子監事光祿鴻臚禮賓內飛龍閑等使赴國子監視事特詔宰臣百僚六軍將軍送上京兆府造食教坊賜樂大臣羣官二百餘人皆以本官備章服充附學生列於監之廊下待詔給錢萬貫充食本以為附學生廚料朝恩恣橫求取無厭凡有奏請以必允為度幸臣未有其比大曆二年朝恩獻通化門外賜莊為寺以資章敬太后冥福仍請以章敬為名復加興造窮極壯麗以城中材木不足充費乃奏壞曲江亭館華清宮觀樓及百司行廨將相沒官宅給其用土木之役僅逾萬億三年讓判國子監事加韓國公章敬太后忌日百僚於興唐寺行香朝恩置齋饌於寺外之車坊延宰臣百僚就食朝恩恣口談時政公卿惕息戶部郎中相里造殿中侍御史李衎以正言折之朝恩不悅乃罷會後嘗釋奠於國子監宰臣百僚皆會朝恩講易徵鼎卦覆餗之義以譏元載載心銜之陰圖除去之上以朝恩太橫亦惡之載欲伺其便巧中傷之乃用腹心崔昭為京兆尹伺朝恩出處昭不吝財賂潛與朝恩黨陝州觀察使皇甫溫相結溫與昭協自是朝恩動靜載皆知之巨細悉以聞上益怒朝恩未之察日以驕橫載奏加朝恩實封又加皇甫溫權位以肆其欲五年朝恩所昵武將劉希暹微有過忤上諷之詔罷朝恩觀軍容使加實封通前一千戶朝恩始疑然每朝謁恩顧如常亦不以載為意會寒食宴近臣朝恩入謁先是每宴罷必出還營是日有詔留之朝恩始懼言頗悖慢上亦以舊恩不之責是日朝恩還第雉經而卒劉希暹亦下獄賜死希暹出自戎伍有膂力形貌光偉以騎射聞朝恩用之為神策都虞候封交河郡王善候朝恩意旨深被委信累遷至太僕卿與兵馬使王駕鶴同掌禁兵所為不法諷朝恩於北軍置獄召坊市兇惡少年羅織城內富人誣以違法捕置獄中忍酷考訊錄其家產並沒於軍或有舉選之士財貨稍殷客於旅舍遇橫死者非一坊市苦之謂之入地牢捕賊吏有賈明觀者尤凶𢀿以屢置大獄家產巨萬希暹黨之地在禁密人無敢言者朝恩死上寬宥之以素志非順慮不見容常自疑懼與王駕鶴聯職希暹辭多不遜駕鶴純謹上信任之至是以希暹語上聞乃誅之賈明觀者本萬年縣捕賊吏事希暹恣為兇惡毒甚豺狼朝恩希暹既死元載復受明觀姦謀潛容之特奏令江西効力明觀將出城百姓數萬人懷磚石候之載令市吏止約明觀在洪州二年觀察使魏少遊容之及路嗣恭代少遊至郡之日召明觀笞殺之識者減魏之名多路之正朝恩素待禮部尚書裴士淹戶部侍郎判度支第五琦二人亦坐貶官竇文場霍仙鳴者始在東宮事德宗初魚朝恩誅後內官不復典兵德宗以親軍委白志貞志貞多納豪民賂補為軍士取其傭直身無在軍者但以名籍請給而已涇師之亂帝召禁軍禦賊志貞召集無素是時並無至者唯文場仙鳴率諸宦者及親王左右從行志貞貶官左右禁旅悉委文場主之從幸山南兩軍漸集德宗還京頗忌宿將凡握兵多者悉罷之禁旅文場仙鳴分統焉貞元十二年六月特立護軍中尉兩員中護軍兩員以帥禁軍乃以文場為左神策護軍中尉仙鳴為右神策護軍中尉右神威軍使張尚進為右神策中護軍內謁者監焦希望為左神策中護軍自文場等始也時竇霍之權振於天下藩鎮節將多出禁軍臺省清要時出其門文場累加驃騎大將軍是歲仙鳴病帝賜馬十匹令於諸寺為僧齋以祈福久病不愈十四年倉卒而卒上疑左右小使正將食中加毒配流者數十人仙鳴死後以開府內常侍第五守亮為右軍中尉文場連表請致仕許之十五年已後楊志廉孫榮義為左右軍中尉亦踵竇霍之事怙寵驕恣貪利冒寵之徒利其納賄多附麗之至於貞元末宦官復盛順宗即位王叔文用事與韋執誼謀奪神策軍權乃用宿將范希朝為京西北禁軍都將事未行為內官俱文珍等所排叔文貶而止俱文珍貞元末宦官後從義父姓曰劉貞亮性忠正剛而蹈義順宗即位風疾不能視朝政而宦官李忠言與牛美人侍病美人受旨於帝復宣之於忠言忠言授之王叔文叔文與朝士柳宗元劉禹錫韓曄等圖議然後下中書俾韋執誼施行故王之權振天下叔文欲奪宦者兵權每忠言宣命內臣無敢言者唯貞亮建議與之爭知其朋徒熾慮隳朝政乃與中官劉光琦薛文珍尚衍解玉等謀奏請立廣陵王為皇太子勾當軍國大事順宗可之貞亮遂召學士衞次公鄭絪李程王涯入金鑾殿草立儲君詔及太子受內禪盡逐叔文之黨政事悉委舊臣時議嘉貞亮之忠藎累遷至右衞大將軍知內侍省事元和八年卒憲宗思其翊戴之功贈開府儀同三司吐突承璀幼以小黃門直東宮性敏慧有才幹憲宗即位授內常侍知內省事左監門將軍俄授左軍中尉功德使四年王承宗叛詔以承璀為河中河南浙西宣歙等道赴鎮州行營兵馬招討等使內侍省常侍宋惟澄為河南陝州河陽已來館驛使內官曹進玉劉國珍馬江朝等分為河北行營糧料館驛等使諫官御史上疏相屬皆言自古無中貴人為兵馬統帥者補闕獨孤郁段平仲尤激切憲宗不獲已改為充鎮州已來招撫處置等使及承璀率禁軍上路帝御通化門樓慰諭遣之出師經年無功乃遣密人告王承宗令上疏待罪許以罷兵為解仍奏昭義節度使盧從史素與賊通許為承宗求節鉞乃誘潞州牙將烏重胤謀執從史送京師及承宗表至朝廷議罷兵承璀班師仍為禁軍中尉段平仲抗疏極論承璀輕謀弊賦請斬之以謝天下憲宗不獲已降為軍器使俄復為左衞上將軍知內侍省事時弓箭庫使劉希先取羽林大將軍孫璹錢二十萬以求方鎮事發賜死辭相告訐事連承璀乃出為淮南節度監軍使太子通事舍人李涉性狂險投匭上書論希先承璀無罪不宜貶戮諫議大夫知匭事孔戣見涉疏之副本不受其章涉持疏於光順門欲進之戣上疏論其纖邪貶涉硤州司倉上待承璀之意未已而宰相李絳在翰林時數論承璀之過故出之八年欲召承璀還乃罷絳相位承璀還復為神策中尉惠昭太子薨承璀建議請立澧王寬為太子憲宗不納立遂王宥穆宗即位銜承璀不佑己誅之敬宗時中尉馬存亮論承璀之冤詔雪之仍令假子士曄以禮收葬王守澄元和末宦者憲宗疾大漸內官陳弘慶等弒逆憲宗英武威德在人內官祕之不敢除討但云藥發暴崩時守澄與中尉馬進潭梁守謙劉承偕韋元素等定冊立穆宗皇帝長慶中守澄知樞密事初元和中守澄為徐州監軍遇翼城醫人鄭注出入節度使李愬家注敏悟過人博通典藝棋奕醫卜尤臻於妙人見之者無不歡然注嘗為李愬黃金服一刀圭可愈痿弱重膇之疾復能反老成童愬與守澄服之頗効守澄知樞密薦引入禁中穆宗待之亦厚注多奇詭每與守澄言必通夕文宗即位守澄為驃騎大將軍充右軍中尉注復得幸於文宗後依倚守澄大為姦弊文宗以元和逆黨尚在其黨大盛心常憤惋端居不怡翰林學士宋申錫嘗獨對探知上略言其意申錫請漸除其逼帝亦以申錫沉厚有方略為其事可成乃用為宰相申錫謀未果為注所察守澄乃令軍吏豆盧著誣告申錫與漳王謀逆申錫坐貶宰相李逢吉從子訓與注交通訓亦機詭萬端二人情義相得俱為守澄所重復引訓入禁中為上講周易既得幸又探知帝旨復以除宦官謀中帝意帝以訓才辯縱橫以為其事必捷待以殊寵自流人中用為學官充侍講學士時仇士良有翊上之功為守澄所抑位未通顯訓奏用士良分守澄之權乃以士良為左軍中尉守澄不悅兩相矛盾訓因其惡大和九年帝令內養李好古齎酖賜守澄祕而不發守澄死仍贈揚州大都督其弟守涓為徐州監軍召還至中牟誅之守澄豢養訓注反罹其禍人皆快其受佞而惡訓注之陰狡李訓既殺守澄復惡鄭注乃奏用注為鳳翔節度使訓欲盡誅宦官乃與金吾將軍韓約新除太原節度使王璠新除邠寧節度使郭行餘權御史中丞李孝本權京兆尹羅立言謀其年十一月二十一日上御宣政殿百僚班定韓約不奏平安乃奏曰臣當仗廨內石榴樹夜來降甘露請陛下幸仗舍觀之帝乘輦趨金吾仗中尉仇士良與諸官先往石榴樹觀之伺知其詐又聞幕下兵仗聲蒼黃而還奏曰南衙有變遂扶帝輦入閤門李訓從輦大呼曰邠寧太原之兵何不赴難衞乘輿者人賞百千於是誰何之卒及御史臺從人持兵入宣政殿院宦官死者甚衆輦既入閤門內官呼萬歲俄而士良等率禁兵五百餘人露刃出東上閤門逢人即殺王涯賈餗舒元輿李訓等四人宰相及王璠郭行餘等十一人屍橫闕下自是權歸士良與魚弘志至宣宗即位復誅其太甚者而閽寺之勢仍握軍權之重焉田令孜本姓陳咸通中從義父入內侍省為宦者頗知書有謀略自諸司小使監諸鎮用兵累遷神策中尉左監門衞大將軍乾符中盜起關東諸軍誅盜以令孜為觀軍容制置左右神策護駕十軍等使京師不守從僖宗幸蜀鑾輿返正令孜頗有匡佐之功時令孜威權振天下時關中寇亂初平國用虛竭諸軍不給令孜請以安邑解縣兩池榷鹽課利全隸神策軍詔下河中王重榮抗章論列言使名久例隸當道省賦自有常規令孜怒用王處存為河中節度使重榮不奉詔令孜率禁兵討之重榮引太原軍為援戰於沙苑禁軍大敗京師復亂僖宗出幸寶雞又移幸山南方鎮皆憾令孜生事令孜懼引前樞密楊復恭代己從幸梁州求為西川監軍四川節度使陳敬瑄即令孜之弟也昭宗即位三川大亂詔宰相韋昭度鎮西川陳敬瑄不受代令孜引閬州刺史王建為援建素以父事令孜時建方亂東川聞其召也以西蜀可圖欣然赴之建以所領千餘兵至漢州陳敬瑄以建雄豪難制辭而遣之建曰十軍阿父召予及門而拒鄰藩聞之孰肯相容為予報令公建至此無所歸也遂遣使上表請討陳敬瑄以自効朝廷嘉之即命昭度為招討入蜀加兵經年無功昭度還京建遂絕棧道不通詔使歲中急擊成都陳敬瑄計窘遣令孜出城與建通和建竟自為蜀帥令孜以義父之故依倚仍舊監軍事既而陳敬瑄遇酖令孜亦為建所殺楊復光內常侍楊玄价之養子也幼以宦者入內侍省慷慨負節義有籌略為小黃門監鎮兵征討乾符中賊渠黃巢之犯江西復光為排陣使遣判官吳彥弘入城喻朝旨巢即令其將尚君長奉表歸國招討使宋威害其功併兵擊賊巢怒復作剽朝廷誅尚君長怨怒愈深宋威戰敗復光總其兵權進攻洪州擒賊將徐唐莒詔以荊南節度使王鐸為招討代宋威復光監忠武軍屯于鄧州以遏賊衝京師陷賊節度使周岌受偽命賊使往來旁午岌嘗夜宴急召復光左右曰周公歸賊必謀害內侍不如勿往復光曰事勢如此義不圖全即赴之酒酣岌言本朝事復光因泣下良久曰丈夫所感者恩義而規利害非丈夫也公自匹夫享公侯之貴豈捨十八葉天子而北面臣賊何恩義利害之可言乎聲淚俱發岌亦為之流涕岌曰吾不能獨力拒賊貌奉而心圖之故召公瀝酒為盟是夜復光遣其養子守亮殺賊使於傳舍時秦宗權叛岌據蔡州復光得忠武之師三千入蔡州說宗權俾同義舉宗權遣將王淑率衆萬人從復光收荊襄次鄧州王淑逗留不進復光斬之併其軍分為八都鹿晏弘晉暉李師泰王建韓建等皆八都之大將也進攻南陽賊將朱溫何勤來送戰復光敗之進收鄧州獻捷行在中和元年五月也復光乘勝追賊至藍橋丁母憂還尋起復受詔充天下兵馬都監押諸軍入定關輔王重榮為東面招討使復光以兵會之二年七月至河中賊將朱溫守同州復光遣使諭之九月溫以所部來降時賊將李翔守華州巢寇益盛王重榮憂之謂復光曰臣賊則負國拒戰則兵微今日成敗未可知也公其圖之復光曰鴈門李僕射以雄武振北陲其家尊與吾先世同患難李鴈門奮不顧身自播遷已來徵兵未至者蓋太原阻路也如以朝旨諭鄭公詔到其軍必至重榮曰善王鐸遣使奉墨詔之太原太原以兵從之及收京城三敗巢賊復光與其子守亮守宗等身先犯難功烈居多其年六月卒於河中時年四十二復光雖黃門近幸然慷慨有大志善撫士卒及死之日軍中慟哭累日身後平賊立功者多是復光部下門人故將也諸假子守亮興元節度使守宗忠武節度使守信商州防禦使守忠洋州節度使其餘以守為名者數十人皆為牧守將帥楊復恭貞元末中尉楊志廉之後志廉子欽義大中朝為神策中尉欽義子三人玄翼玄价玄寔玄翼咸通中掌樞密玄寔乾符中為右軍中尉玄价河陽監軍復恭即玄翼子也以父幼為宦者入內侍省知書有學術每監諸鎮兵龐勛之亂監陣有功自河陽監軍入為宣徽使咸通十年玄翼卒起復為樞密使時黃巢犯闕左軍中尉田令孜為天下觀軍容制置使專制中外復恭每事力爭得失令孜怒左授復恭飛龍使乃稱疾退於藍田僖宗自蜀還京田令孜出師失律車駕再幸山南復用復恭為樞密使尋代令孜為右軍中尉時行在制置內外經略皆出於復恭車駕還京授觀軍容使封魏國公僖宗晏駕迎壽王踐祚文德元年加開府金吾上將軍專典禁兵既軍權在手頗擅朝政昭宗惡之政事多訪於宰臣故韋昭度張濬杜讓能每有陳奏即舉大中故事稍抑宦者之權上性明察由是偏聽之釁生焉國舅王瓌頗居中任事復恭惡之奏授黔南節度至吉柏江覆舟而沒物議歸咎於復恭上每切齒道復恭復恭假子天威軍使守立權勇冠於六軍人皆避之上欲罪復恭懼守立為亂乃謂復恭曰吾要卿家守立在左右可進來乃賜姓李名順節恩寵特異勢侔樞要乃與復恭爭權每中傷其陰事授順節鎮海軍節度使同平章事大順二年九月詔復恭致仕賜杖屨復恭既失勢欲退止商山別居第在昭化里近玉山營假子守信為玉山軍使守信時候復恭於其第或誣告云玉山軍使與復恭謀亂詔李順節率禁軍攻之昭宗御延喜樓守信以兵拒之順節屢敗際晚守信復恭挈其族出通化門趨興元守信令部將張綰殿其後綰戰敗被擒復恭至興元節度使楊守亮乃糾合諸守義兄弟舉兵以討順節為名天子詔李茂貞王行瑜討之明年守亮兵敗復恭與守亮挈其族將奔太原入商山至乾元縣為華州兵所獲執送京師皆梟首於市李茂貞收興元進復恭前後與守亮私書六十紙內訴致仕之由云承天是隋家舊業大姪但積粟訓兵不要進奉吾於荊榛中援立壽王有如此負心門生天子既得尊位乃廢定策國老其不遜如是後復恭假子彥博奔太原收復恭骸骨葬於介休縣之抱腹山復恭之後宦者西門重遂為右軍中尉李茂貞初併山南兵衆強盛干預朝政宰相杜讓能與重遂等謀誅之師興為茂貞所敗重遂被誅乃以內官駱全瓘劉景宣為左右軍中尉乾寧二年春李茂貞王行瑜以兵入朝殺宰相韋昭度李谿河東節度使李克用率師渡河討邠岐二帥軍於渭北駱全瓘與茂貞宿衞將閻圭脅天子幸岐州昭宗蒼黃幸莎城茂貞以太原問罪乃誅全瓘閻圭以自解昭宗幸華州宦官稍微及光化還宮內官景務修宋道弼復專國政宰相崔胤深惡之中外不睦宰相徐彥若王搏有度量見其陰險相傾懼危時事嘗奏曰人君當務大體平心御物無有偏私偏任偏聽古人所患今中官怙寵道路目之皆知此弊然未能卒改俟多難漸平以道消息之陛下勿泄聖謨啟其姦詐崔胤知搏所奏頗銜之他日見上曰王搏姦邪已為敕使外應不可在相位二年六月貶搏官賜死於藍田道弼務修亦賜死以樞密使劉季述王奉先為兩軍中尉出徐彥若鎮南海崔胤秉政而排擯宦官季述等外結藩侯以為黨援十一月六日季述矯詔以皇太子監國遂廢昭宗居東內奪傳國寶授太子昭宗以何皇后宮嬪數人隨行幽于東宮季述手持銀檛於上前以檛畫地數上罪狀云某時某事你不從我言其罪一也其悖逆如此乃令李師虔以兵圍之鎔錫錮其扃鐍時方凝冽嬪御無被哭聲聞于外穴牆通食者兩月十二月晦崔胤等謀反正誅季述奉先復迎昭宗即位改元天復元年其歲十一月朱全忠寇河中華州陷之京師震恐中尉韓全誨請上且幸鳳翔全忠追逼乘輿兵圍鳳翔者累年三年正月茂貞殺兩軍中尉韓全誨張弘彥樞密使袁易簡周敬容等二十二人皆斬首以布囊貯之令學士薛貽矩送於全忠求和是月全忠迎駕還長安詔以崔胤為宰相兼判六軍諸衞胤奏曰高祖太宗承平時無內官典軍旅自天寶以後宦官寖盛貞元元和分羽林衞為左右神策軍以使衞從令宦官主之唯以二千人為定制自是參掌樞密由是內務百司皆歸宦者上下彌縫共為不法大則傾覆朝政小則構扇藩方車駕頻致播遷朝廷漸加微弱原其禍作始自中人自先帝臨御已來陛下纂承之後朋儕日熾交亂朝綱此不翦其本根終為國之蟊賊內諸司使務宦官主者望一切罷之諸道監軍使並追赴闕廷即國家萬世之便也詔曰宦官之興肇于秦漢趙高閻樂竟滅嬴宗張讓段珪遂傾劉祚肆其志則國必受禍悟其事則運可延長朕所以斷在不疑祈天永命者也先皇帝嗣位之始年在幼沖羣豎相推奄專大政於是毒流宇內兵起山東遷幸三川幾淪神器迴鑾之始率土思安而田令孜妬能忌功遷搖近鎮陳倉播越患難相仍洎朕纂承益相侮慢復恭重遂逞其禍道弼季述繼其兇幽辱朕躬淩脅孺子天復返正罪己求安兩軍內樞一切假借韓全誨等每懷憤惋曾務報讎視將相若血仇輕君上如木偶未周星歲竟致播遷及在岐陽過於羈紲上憂宗社傾墜下痛民庶流離茫然孤居無所控告全忠位兼二柄深識朕心駐兵近及於三年獨斷方誅於元惡今謝罪郊廟即宅宮闈正刑當在於事初除惡宜絕其根本先朝及朕五致播遷王畿之甿減耗大半父不能庇子夫不能室妻言念于茲痛深骨髓其誰之罪爾輩之由帝王之為治也內有宰輔卿士外有藩翰大臣豈可令刑餘之人參預大政況此輩皆朕之家臣也比於人臣之家則奴隸之流恣橫如此罪惡貫盈天命誅之罪豈能捨橫屍伏法固不足矜含容久之亦所多愧其第五可範已下並宜賜死其在畿甸同華河中並盡底處置訖諸道監軍使已下及管內經過並居停內使敕到並仰隨處誅夷訖聞奏已令準國朝故事量留三十人各賜黃絹衫一領以備宮內指使仍不得輒有養男其左右神策軍並令停廢是日諸司宦官百餘人及隨駕鳳翔羣小又二百餘人一時斬首於內侍省血流塗地及宮人宋柔等十一人兩街僧道與內官相善者二十餘人並笞死於京兆府內諸司一切罷之皆歸省寺自是京城並無宦官天子每宣傳詔命即令宮人出入崔胤雖復仇快志國祚旋亦覆亡悲夫贊曰崇墉大廈壯其楹殿邦禦侮亦俟明德宵人意褊動不量力投鼠敗器良堪太息
