body:
  text: 舊唐書卷一百四十六列傳第九十六薛播鮑防李自良李說嚴綬蕭昕杜亞王緯李若初于頎盧徵楊憑鄭元杜兼裴玢薛伾薛播河中寶鼎人中書舍人文思曾孫也父元暉什邡令以播贈工部郎中播天寶中舉進士補校書郎累授萬年縣丞武功令殿中侍御史刑部員外郎萬年令播溫敏善與人交李栖筠常衮崔祐甫皆引擢之及祐甫輔政用為中書舍人出汝州刺史以公事貶泉州刺史尋除晉州刺史河南尹遷尚書左丞轉禮部侍郎遇疾貞元三年卒贈禮部尚書初播伯父元曖終於隰城丞其妻濟南林氏丹陽太守洋之妹有母儀令德博涉五經善屬文所為篇章時人多諷詠之元曖卒後其子彥輔彥國彥偉彥雲及播兄據摠並早孤幼悉為林氏所訓導以至成立咸致文學之名開元天寶中二十年間彥輔據等七人並舉進士連中科名衣冠榮之鮑防襄州人幼孤貧篤志好學善屬文天寶末舉進士為浙東觀察使薛兼訓從事累至殿中侍御史入為職方員外郎改太原少尹正拜節度使入為御史大夫歷福建江西觀察使徵拜左散騎常侍扈從奉天除禮部侍郎尋遷工部尚書致仕防歷洪福京兆皆有政聲唯總戎非所宜而謬執兵柄以太原革車胡騎雄雜而迴鶻深入寇防出拒戰為虜所敗為禮部侍郎時嘗遇知雜侍御史竇參於通衢導騎不時引避僕人為參所鞭及參秉政遽令致仕防謂親友曰吾與蕭昕之子齒而與昕同日懸車非朽邁之致以餘忿見廢防文學舊人歷職中外不因罪戾而為俗吏所擯竟以憤終衆頗憫防而咎參故參之敗不旋踵非不幸也李自良兗州泗水人初祿山之亂自良從兗鄆節度使能元皓以戰功累授右衞率後從袁討袁晁陳莊賊積功至試殿中監隸浙江東道節度使薛兼訓兼訓移鎮太原自良從行授河東軍節度押衙兼訓卒鮑防代又事防為牙將會迴鶻入寇防令大將焦伯瑜杜榮國將兵擊之自良謂防曰迴鶻遠來求戰未可與爭鋒但於歸路築二壘以兵守之堅壁不動虜求戰不得師老自旋俟其返旆即乘之縱不甚捷虜必狼狽矣二壘阨其歸路策之上也防不從促伯瑜等逆戰遇虜於百井伯瑜等大敗而還由是稍知名馬燧代防為帥署奏自良代州刺史兼御史大夫仍為軍候自良勤恪有謀燧深委信之建中年田悅叛燧與抱真東討自良常為河東大將摧鋒陷陣破田悅及討李懷光於河中自良專河東軍都將前後戰績居多燧之立功名由自良協輔之力也貞元三年從燧入朝罷燧兵權德宗欲以自良代燧自良懇辭事燧久不欲代為軍帥物議多之乃授右龍武大將軍德宗以河東密邇胡戎難於擇帥翌日自良謝上謂之曰卿於馬燧存軍中事分誠為得禮然北門之寄無易於卿即日拜檢校工部尚書兼御史大夫太原尹北都留守河東節度支度營田觀察使在鎮九年以簡儉守職軍民胥悅雖出身戎伍動必循法略不以暴戾加人十一年五月卒於軍年六十三上甚嗟惜之廢朝一日贈左僕射賻布帛米粟有差李說淮安王神通之裔也父遇天寶中為御史中丞說以門蔭歷仕累佐使幕馬燧為河陽三城太原節度皆辟為從事累轉御史郎官御史中丞太原少尹出為汾州刺史節度使李自良復奏為太原少尹檢校庶子兼中丞貞元十一年五月自良病凡六日而卒匿喪陽言病甚數日發喪先是都虞候張瑤久在軍素得士心嘗請假遷葬自良未許至是說與監軍王定遠謀乃給瑤假以大將毛朝陽代瑤然後遣使告自良病中使第五國珍自雲朔使還過太原聞自良病中使遲留信宿自良卒國珍急馳至京先說使至乃下制以通王領河東節度大使以說為行軍司馬充節度留後北都副留守仍令國珍齎說官告及軍府將吏部內刺史等敕書三十餘通往太原宣賜軍中始定定遠恃立說之功頗恣縱橫軍政皆自專決仍請賜印監軍有印自定遠始也定遠既得印益暴將吏輒自補授說寖不歡遂成嫌隙是歲七月定遠署虞候田宏為列將以代彭令茵令茵不伏揚言曰超補列將非功不可宏有何功敢代予任定遠聞而含怒召令茵斬之埋於馬糞之中家人請尸不與三軍皆怨說具以事聞德宗以定遠有奉天扈從之功恕死停任制未至定遠怒說奏聞趨府謀殺說昇堂未坐抽刀刺說說走而獲免定遠馳至府門召集將吏於箱中陳敕牒官告二十餘軸示諸將曰有敕令李景略知留後遣說赴京公等皆有恩命指箱中示之諸將方拜抃大將馬良輔呼而麾衆曰箱中皆監軍舊官告非恩命也不可受但備急變爾定遠知事敗走登乾陽樓召其部下將卒多不之應比夜定遠墜城下槎枿傷而不死尋有詔削奪長流崖州大將高迪等同其謀說皆斬之尋正拜河東節度使檢校禮部尚書說在鎮六年初勤心吏職後遇疾言語行步蹇澀不能錄軍府之政悉監軍主之又為孔目吏宋季等欺誑軍政事多隳紊如此累年十六年十月卒年六十一廢朝一日贈左僕射是月制以河東節度行軍司馬鄭儋檢校工部尚書兼太原尹御史大夫河東節度度支營田觀察等使北都留守在任不期年而卒嚴綬蜀人曾祖方約利州司功祖挹之符離尉父丹殿中侍御史綬大曆中登進士第累佐使府貞元中由侍御史充宣歙團練副使深為其使劉贊委遇政事多所咨訪十二年贊卒綬掌宣歙留務傾府藏以進獻由是有恩召為尚書刑部員外郎天下賓佐進獻自綬始也未幾河東節度使李說嬰疾事多曠弛行軍司馬鄭儋代綜軍政既而說卒因授儋河東節度使是時姑息四方諸侯未嘗特命帥守物故即用行軍司馬為帥冀軍情厭伏儋既為帥德宗選朝士可以代儋為行軍司馬者因綬前日進獻上頗記之故命檢校司封郎中充河東行軍司馬不周歲儋卒遷綬銀青光祿大夫檢校工部尚書兼太原尹御史大夫北都留守充河東節度支度營田觀察處置等使元和元年楊惠琳叛於夏州劉闢叛於成都綬表請出師討伐綬悉選精甲付牙將李光顏兄弟光顏累立戰功蜀夏平加綬檢校尚書左僕射尋拜司空進階金紫封扶風郡公綬在鎮九年以寬惠為政士馬蕃息境內稱治四年入拜尚書右僕射綬雖名家子為吏有方略然銳於勢利不存名節人士以此薄之嘗預百僚廊下食上令中使馬江朝賜櫻桃綬居兩班之首在方鎮時識江朝語次不覺屈膝而拜御史大夫高郢亦從而拜是日為御史所劾綬待罪于朝命釋之翌日責江朝降官一等尋出鎮荊南進封鄭國公有漵州蠻首張伯靖者殺長吏據辰錦等州連九洞以自固詔綬出兵討之綬遣部將李忠烈齎書曉諭盡招降之九年吳元濟叛朝議加兵以綬有弘恕之稱可委以戎柄乃授山南東道節度使尋加淮西招撫使綬自帥師壓賊境無威略以制寇到軍日遽發公藏以賞士卒累年蓄積一旦而盡又厚賂中貴人以招聲援師徒萬餘閉壁而已經年無尺寸功裴度見上屢言綬非將帥之才不可責以戎事乃拜太子少保代歸尋檢校司空久之進位太傅食封至三千戶長慶二年五月卒年七十七詔贈太保綬材器不踰常品事兄嫂過謹為時所稱常以寬柔自持位躋上公年至大耋前後統臨三鎮皆號雄藩所辟士親睹為將相者凡九人其貴壽如此蕭昕河南人少補崇文進士開元十九年首舉博學宏辭授陽武縣主簿天寶初復舉宏辭授壽安尉再遷左拾遺昕嘗與布衣張鎬友善館而禮之表薦之曰如鎬者用之則為王者師不用則幽谷一叟爾玄宗擢鎬拾遺不數年出入將相及安祿山反昕舉贊善大夫來瑱堪任將帥思明之亂瑱功居多累遷憲部員外郎為副元帥哥舒翰掌書記潼關敗間道入蜀遷司門郎中尋兼安陸長史為河南等道都統判官遷中書舍人兼揚府司馬佐軍仍舊入拜本官累遷秘書監代宗幸陝昕出武關詣行在轉國子祭酒大曆初持節弔迴鶻時迴鶻恃功廷詰昕曰祿山思明之亂非我無以平定唐國奈何市馬而失信不時歸價衆皆失色昕答曰國家自平寇難賞功無絲毫之遺況鄰國乎且僕固懷恩我之叛臣乃者爾助為亂聯西戎而犯郊畿及吐蕃敗走迴紇悔懼啟顙乞和非大唐存念舊功則當匹馬不得出塞矣是迴紇自絕非我失信迴紇慚退加禮以歸為常侍十二年朱泚之亂徒步出城泚急求之亡竄山谷間至奉天遷太子少傅貞元初兼禮部尚書尋復知貢舉五年致仕七年卒于家年九十廢朝諡曰懿杜亞字次公自云京兆人也少頗涉學善言物理及歷代成敗之事至德初於靈武獻封章言政事授校書郎其年杜鴻漸為河西節度辟為從事累授評事御史後入朝歷工戶兵吏四員外郎永泰末劍南叛亂鴻漸以宰相出領山劍副元帥以亞及楊炎並為判官使還授吏部郎中諫議大夫炎為禮部郎中知制誥中書舍人亞自以才用合當柄任雖為諫議大夫而心不悅李栖筠承恩衆望必為宰相亞厚結之元載得罪亞與劉晏李涵等七人同鞫訊之載死之翌日亞遷給事中河北宣慰使宰相常衮亦不悅亞歲餘出為洪州刺史兼御史中丞江西都團練觀察使德宗初嗣位勵精求賢令中使召亞亞自揣必以宰輔見徵乃促程而進累路與人言議語及行宰相事方面或以公事諮祈亞皆納之既至帝微知之不悅又奏對辭旨疎闊出為陝州觀察使兼轉運使尋遷河中晉絳等州防禦觀察使楊炎作相劉晏得罪亞坐貶睦州刺史興元初召拜刑部侍郎出為揚州長史兼御史大夫淮南節度觀察使時承陳少遊征稅煩重奢侈僭濫之後又新遭王紹亂兵剽掠淮南之人望亞之至革剗舊弊冀以康寧亞自以材當公輔之選而聯出外職志頗不適政事多委參佐招引賓客談論而已揚州官河填淤漕輓堙塞又僑寄衣冠及工商等多侵衢造宅行旅擁弊亞乃開拓疏啟公私悅賴而盛為奢侈江南風俗春中有競渡之戲方舟並進以急趨疾進者為勝亞乃令以漆塗船底貴其速進又為綺羅之服塗之以油令舟子衣之入水而不濡亞本書生奢縱如此朝廷亟聞之貞元五年以戶部侍郎竇覦為淮南節度代亞亞猶以舊望竇覦甚畏之改檢校吏部尚書判東都尚書省事充東都留守都防禦使既病風尚建利以固寵奏請開苑內地為營田以資軍糧減度支每年所給從之亞不躬親部署但委判官張薦楊晪初奏請取荒地營田其苑內地堪耕食者先為留司中官及軍人等開墾已盡亞計急乃取軍中雜錢舉息與畿內百姓每至田收之際多令軍人車牛散入村鄉收斂百姓所得菽粟將還軍民家略盡無可輸稅人多艱食由是大致流散乃厚賂中官令奏河南尹無政亞自此亦規求兼領河南尹事不果帝漸知虛誕乃以禮部尚書董晉代為東都留守召亞還京師既風疾漸深又患脚膝不任朝謁貞元十四年卒于家年七十四贈太子少傅王緯字文卿太原人也祖景司門員外萊州刺史父之咸長安尉與昆弟之賁之渙皆善屬文之咸以緯貴故累贈刺史緯舉明經又書判入等歷長安尉出佐使府授御史郎官入朝為金部員外郎劍南租庸使檢校司封郎中彭州刺史檢校庶子兼御史中丞西川節度營田副使初大曆中路嗣恭為江西觀察使陷害判官李泌將誅之緯亦為路嗣恭判官說諭救解獲免貞元三年泌為相擢授緯給事中未數日又擢為潤州刺史兼御史中丞浙江西道都團練觀察使十年加御史大夫兼諸道鹽鐵轉運使三歲加檢校工部尚書緯性勤儉歷官清潔而傷於苛碎多用削刻之吏督察巡屬人不聊生貞元十四年卒年七十一廢朝一日贈太子少保李若初趙郡人貞觀中幷州長史工部侍郎弘節之曾孫也祖道謙太府卿若初少孤貧初為轉運使劉晏下微冗散職晏判官包佶重其勤幹以女妻之歷陳州太康令刺史李芃初蒞官若初獻計請收斂羨餘錢物交結權貴芃厚遇之累歲芃遷河陽三城使奏若初為從事軍中之事多以委之累授檢校郎中兼中丞懷州刺史轉虢州刺史坐公事為觀察使劾奏免歸久之出為衢州刺史遷福州刺史兼御史中丞福建都團練使尋遷越州刺史浙江東道都團練觀察使十四年秋代王緯為潤州刺史兼御史大夫浙江西道都團練觀察諸道鹽鐵轉運使善於吏道性嚴強力束斂下吏人甚畏服方整理鹽法頗有次貞元十五年遇疾卒廢朝一日贈禮部尚書于頎字休明河南人也父庭謂濟王府倉曹累贈尚書左僕射頎少以吏事聞累授京兆府士曹為尹史翽所賞重翽出鎮襄漢奏為御史充判官翽為亂兵所殺頎挺出收葬遺骸時人義之度支使第五琦署為河東租庸使累授鳳翔少尹度支郎中兼御史中丞轉運租庸糧料鹽鐵等使頎因奏移轉運汴州院於河陰以汴州累遇兵亂散失錢帛故也元載為諸道營田使又署為郎官令於東都汝州開置屯田歷戶部侍郎秘書少監京兆尹太府卿代杜濟為京兆尹及為大官好任機數專候權要朝列中無勢利者視之蔑如也曲事元載親昵之而為政苛細無大體丁所生母憂罷及載得罪後出為鄭州刺史遷河南尹以無政績代還時徵汾州刺史劉暹暹剛腸嫉惡歷典數州皆為廉使畏懼宰相盧杞恐暹為御史大夫虧沮己之所見遽稱薦頎為御史大夫以其柔佞易制也從幸奉天改左散騎常侍歷左千牛上將軍徙大理卿太子少保工部尚書因入朝仆地為金吾仗衞掖起改太子少師致仕貞元十五年卒時年七十四盧徵范陽人也家於鄭之中牟少涉獵書記永泰中江淮轉運使劉晏辟為從事委以腹心之任累授殿中侍御史晏得罪貶珍州司戶元琇亦晏之門人興元中為戶部侍郎判度支薦徵為京兆司錄度支員外琇得罪坐貶為信州長史遷信州刺史入為右司郎中驟遷給事中戶部侍郎竇參深遇之方倚以自代貞元八年春同州刺史闕參請以尚書左丞趙憬補之詔用徵以間參腹心也數歲轉華州刺史徵冀復入用深結託中貴厚遺之故事同華以近地人貧每正至端午降誕所獻甚薄徵遂竭其財賦每有所進獻輒加常數人不堪命疾病臥理者數年貞元十六年卒時年六十四楊憑字虛受弘農人舉進士累佐使府徵為監察御史不樂檢束遂求免累遷起居舍人左司員外郎禮部兵部郎中太常少卿湖南江西觀察使入為左散騎常侍刑部侍郎京兆尹憑工文辭少負氣節與母弟凝凌相友愛皆有時名重交游尚然諾與穆質許孟容李鄘王仲舒為友故時人稱楊穆許李之友仲舒以後進慕而入焉性尚簡傲不能接下以此人多怨之及歷二鎮尤事奢侈元和四年拜京兆尹為御史中丞李夷簡劾奏憑前為江西觀察使贓罪及他不法事敕付御史臺覆按刑部尚書李鄘大理卿趙昌同鞫問臺中又捕得憑前江西判官監察御史楊瑗繫於臺復命大理少卿胡珦左司員外郎胡証侍御史韋顗同推鞫之詔曰楊憑頃在先朝委以藩鎮累更選用位列大官近者憲司奏劾暴揚前事計錢累萬曾不報聞蒙蔽之罪於何逃責又營建居室制度過差侈靡之風傷我儉德以其自尹京邑人頗懷之將議刑書是加愍惻宜從遐譴以誡百僚可守賀州臨賀縣尉同正仍馳驛發遣先是憑在江西夷簡自御史出官在巡屬憑頗疏縱不顧接之夷簡常切齒及憑歸朝修第於永寧里功作併興又廣蓄妓妾於永樂里之別宅時人大以為言夷簡乘衆議舉劾前事且言修營之僭將欲殺之及下獄置對數日未得其事夷簡持之益急上聞且貶焉追舊從事以驗自貞元以來居方鎮者為德宗所姑息故窮極僭奢無所畏忌及憲宗即位以法制臨下夷簡首舉憑罪故時議以為宜然繩之太過物論又譏其深切矣鄭元舉進士第累遷御史中丞貞元中為河中節度使杜確行軍司馬確卒遂繼為節度使入拜尚書左丞元和二年轉戶部侍郎兼御史大夫判度支三年春遷刑部尚書兼京兆尹九月復判度支依前刑部尚書兼御史大夫元性嚴毅有威斷更踐劇任時稱其能元和四年以疾辭職守本官逾月卒杜兼京兆人貞觀中宰相杜正倫五代孫舉進士累辟諸府從事拜濠州刺史兼性浮險豪侈矜氣屬貞元中德宗厭兵革姑息戎鎮至軍郡刺史亦難於更代兼探上情遂練卒修武占召勁勇三千人以上聞乃恣凶威錄事參軍韋賞團練判官陸楚皆以守職論事忤兼兼密誣奏二人通謀扇動軍中忽有制使至兼率官吏迎于驛中前呼韋賞陸楚出宣制杖殺之賞進士擢第楚兗公象先之孫皆名家有士林之譽一朝以無罪受戮郡中股慄天下冤歎之又誣奏李藩將殺之語在藩事中故兼所至人側目焉元和初入為刑部吏部郎中拜給事中除金商防禦使旋授河南少尹知府事尋正拜河南尹皆杜佑在相位所借護也元和四年卒于官裴玢京兆人五代祖疏勒國王綽武德中來朝授鷹揚大將軍封天山郡公因留闕下遂為京兆人玢初為金吾將軍論惟明傔德宗幸奉天以戰功封忠義郡王惟明鎮鄜坊累署玢為都虞候後節度王栖曜卒中軍將何朝宗謀作亂中夜縱火玢匿身不救火遲明而擒朝宗德宗發三司使按問竟斬朝宗及行軍司馬崔輅以同州刺史劉公濟為節度使以玢為坊州長史兼侍御史充行軍司馬明年公濟卒拜玢鄜州刺史兼御史大夫充節度觀察等使三年改授山南西道節度觀察等使玢歷二鎮頗以公清苦節為政不交權倖不務貢獻蔬食敝衣居處纔避風雨而廩庫饒實三軍百姓安業近代將帥無比焉及綿疾辭位請歸長安元和七年卒年六十五贈尚書左僕射諡曰節薛伾勝州刺史渙之子尚父汾陽王召置麾下著名於諸將間左僕射李揆使西蕃伾為將從役時賊泚之難昆夷赴義伾馳騎鄉導至于武功擢授左威衞將軍使絕域者前後數四累遷左金吾衞大將軍檢校工部尚書兼將作監出為鄜坊觀察使元和八年卒于官贈潞州大都督史臣曰薛播溫敏有文鮑防董戎無術李嚴太原之政可謂美矣蕭昕抱則哲之知杜亞懷非次之望王緯清潔而傷苛碎若初善理而性剛嚴于頎好任機權趨附勢利盧徵厚斂貨賄結託中人楊憑好奢鄭元有斷杜兼殺戮端士怙亂邀君裴玢發姦謀安民和衆而玢敝衣糲食不交權倖帑庾咸實郡邑以寧若夫君子無求備於人捨短從長彰善癉惡則裴玢之善抑之更揚杜兼之惡欲蓋而彰耳
