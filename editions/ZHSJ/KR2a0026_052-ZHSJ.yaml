body:
  text: 舊唐書卷四十八志第二十八食貨上先王之制度地以居人均其沃瘠差其貢賦蓋斂之必以道也量入而為出節用而愛人度財省費蓋用之必有度也是故既庶且富而教化行焉周有井田之制秦有阡陌之法二世發閭左而海內崩離漢武稅舟車而國用以竭自古有國有家興亡盛衰未嘗不由此也隋文帝因周氏平齊之後府庫充實庶事節儉未嘗虛費開皇之初議者以比漢代文景有粟陳貫朽之積煬帝即位大縱奢靡加以東西行幸輿駕不息征討四夷兵車屢動西失律於沙徼東喪師於遼碣數年之間公私罄竭財力既殫國遂亡矣高祖發跡太原因晉陽宮留守庫物以供軍用既平京城先封府庫賞賜給用皆有節制徵斂賦役務在寬簡未及踰年遂成帝業其後掌財賦者世有人焉開元已前事歸尚書省開元已後權移他官由是有轉運使租庸使鹽鐵使度支鹽鐵轉運使常平鑄錢鹽鐵使租庸青苗使水陸運鹽鐵租庸使兩稅使隨事立名沿革不一設官分職選賢任能得其人則有益於國家非其才則貽患於黎庶此又不可不知也如裴耀卿劉晏李巽數君子便時利物富國安民足為世法者也開元中有御史宇文融獻策括籍外剩田色役偽濫及逃戶許歸首免五年征賦每丁量稅一千五百錢置攝御史分路檢括隱審得戶八十餘萬田亦稱是得錢數百萬貫玄宗以為能數年間拔為御史中丞戶部侍郎融又畫策開河北王莽河溉田數千頃以營稻田事未果而融敗時又楊崇禮為太府卿清嚴善勾剝分寸錙銖躬親不厭轉輸納欠折估漬損必令徵送天下州縣徵財帛四時不止及老病致仕以其子慎矜為御史專知太府出納其弟慎名又專知京倉皆以苛刻害人承主恩而徵責又有韋堅規宇文融楊慎矜之跡乃請於江淮轉運租米取州縣義倉粟轉市輕貨差富戶押船若遲留損壞皆徵船戶關中漕渠鑿廣運潭以挽山東之粟歲四百萬石帝以為能又至貴盛又王鉷進計奮身自為戶口色役使徵剝財貨每歲進錢百億寶貨稱是云非正額租庸便入百寶大盈庫以供人主宴私賞賜之用玄宗日益眷之數年間亦為御史大夫京兆尹帶二十餘使又楊國忠藉椒房之勢承恩幸帶四十餘使云經其聽覽必數倍弘益又見寵貴太平既久天下至安人不願亂而此數人設詭計以侵擾之凡二十五人同為剝喪而人無敢言之者及安祿山反於范陽兩京倉庫盈溢而不可名楊國忠設計稱不可耗正庫之物乃使御史崔衆於河東納錢度僧尼道士旬日間得錢百萬玄宗幸巴蜀鄭昉使劍南請於江陵稅鹽麻以資國官置吏以督之肅宗建號於靈武後用雲間鄭叔清為御史於江淮間豪族富商率貸及賣官爵以裨國用德宗朝討河朔及李希烈物力耗竭趙贊司國計纖瑣刻剝以為國用不足宜賦取於下以資軍蓄與諫官陳京等更陳計策贊請稅京師居人屋宅據其間架差等計入陳京又請籍列肆商賈資產以分數借之宰相同為欺罔遂行其計中外沸騰人懷怨望時又配王公已下及嘗在方鎮之家出家僮及馬以助征行公私囂然矣後又張滂裴延齡王涯等剝下媚上此皆足為世戒者也先是興元克復京師後府藏盡虛諸道初有進奉以資經費復時有宣索其後諸賊既平朝廷無事常賦之外進奉不息韋皐劍南有日進李兼江西有月進杜亞揚州劉贊宣州王緯李錡浙西皆競為進奉以固恩澤貢入之奏皆曰臣於正稅外方圓亦曰羨餘節度使或託言密旨乘此盜貿官物諸道有謫罰官吏入其財者刻祿廩通津達道者稅之蒔蔬藝果者稅之死亡者稅之節度觀察交代或先期稅入以為進奉然十獻其二三耳其餘沒入不可勝紀此節度使進奉也其後裴肅為常州刺史乃鬻貨薪炭案牘百賈之上皆規利焉歲餘又進奉無幾遷浙東觀察使天下刺史進奉自肅始也劉贊死於宣州嚴綬為判官傾軍府資用進奉無幾拜刑部員外郎天下判官進奉自綬始也習以為常流宕忘返大抵有唐之御天下也有兩稅焉有鹽鐵焉有漕運焉有倉廩焉有雜稅焉今考其本末其否臧以為食貨志云武德七年始定律令以度田之制五尺為步步二百四十為畝畝百為頃丁男中男給一頃篤疾廢疾給四十畝寡妻妾三十畝若為戶者加二十畝所授之田十分之二為世業八為口分世業之田身死則承戶者便授之口分則收入官更以給人賦役之法每丁歲入租粟二石調則隨鄉土所產綾絹絁各二丈布加五分之一輸綾絹絁者兼調綿三兩輸布者麻三斤凡丁歲役二旬若不役則收其傭每日三尺有事而加役者旬有五日免其調三旬則租調俱免通正役並不過五十日若嶺南諸州則稅米上戶一石二斗次戶八斗下戶六斗若夷獠之戶皆從半輸蕃胡內附者上戶丁稅錢十文次戶五文下戶免之附經二年者上戶丁輸羊二口次戶一口下三戶共一口凡水旱蟲霜為災十分損四已上免租損六已上免調損七已上課役俱免凡天下人戶量其資產定為九等每三年縣司注定州司覆之百戶為里五里為鄉四家為鄰五家為保在邑居者為坊在田野者為村村坊鄰里遞相督察士農工商四人各業食祿之家不得與下人爭利工商雜類不得預於士伍男女始生者為黃四歲為小十六為中二十一為丁六十為老每歲一造計帳三年一造戶籍州縣留五比尚書省留三比神龍元年韋庶人為皇后務欲求媚於人上表請以二十二為丁五十八為老制從之及韋氏誅復舊至天寶三年又降優制以十八為中男二十二為丁天下籍始造四本京師及東京尚書省戶部各貯一本以備車駕行幸省於載運之費焉凡權衡度量之制度以北方秬黍中者一黍之廣為分十分為寸十寸為尺十尺為丈量以秬黍中者容一千二百為龠二龠為合十合為升十升為斗三升為大升三斗為大斗十大斗為斛權衡以秬黍中者百黍之重為銖二十四銖為兩三兩為大兩十六兩為斤調鐘律測晷景合湯藥及冠冕制用小升小兩自餘公私用大升大兩又山東諸州以一尺二寸為大尺人間行用之其量制公私又不用龠合內之分則有抄撮之細天寶九載二月敕車軸長七尺二寸麵三斤四兩鹽斗量除陌錢每貫二十文先是開元八年正月敕頃者以庸調無憑好惡須準故遣作樣之頒諸州令其好不得過精惡不得至濫任土作貢防源斯在而諸州送物作巧生端苟欲副於斤兩遂則加其丈尺至有五丈為疋者理甚不然闊一尺八寸長四丈同文共軌其事久行立樣之時亦載此數若求兩而加尺甚暮四而朝三宜令所司簡閱有踰於比年常例丈尺過多奏聞二十二年五月敕定戶口之時百姓非商戶郭外居宅及每丁一牛不得將入貨財數其雜匠及幕士幷諸色同類有蕃役合免征行者一戶之內四丁已上任此色役不得過兩人三丁已上不得過一人其年七月十八日敕自今已後京兆府關內諸州應徵庸調及資課並限十月三十日畢至天寶三載二月二十五日赦文每載庸調八月徵以農功未畢恐難濟辦自今已後延至九月三十日為限二十五年三月敕關輔庸調所稅非少既寡蠶桑皆資菽粟常賤糶貴買損費逾深又江淮等苦變造之勞河路增轉輸之弊每計其運脚數倍加錢今歲屬和平庶物穰賤南畝有十千之獲京師同水火之饒均其餘以減遠費順其便使農無傷自今已後關內諸州庸調資課並宜準時價變粟取米送至京逐要支用其路遠處不可運送者宜所在收貯便充隨近軍糧其河南河北有不通水利宜折租造絹以代關中調課所司仍明為條件稱朕意焉天寶元年正月一日赦文如聞百姓之內有戶高丁多苟為規避父母見在乃別籍異居宜令州縣勘會其一家之中有十丁已上者放兩丁征行賦役五丁已上放一丁即令同籍共居以敦風教其侍丁孝假免差科廣德元年七月詔一戶之中三丁放一丁庸調地稅依舊每畝稅二升天下男子宜二十三成丁五十八為老永泰元年五月京兆麥大稔京兆尹第五琦奏請每十畝官稅一畝效古什一之稅從之二年五月諸道稅地錢使殿中侍御史韋光裔等自諸道使還得錢四百九十萬貫乾元以來屬天下用兵京師百僚俸錢減耗上即位推恩庶僚下議公卿或以稅畝有苗者公私咸濟乃分遣憲官稅天下地青苗錢以充百司課料至是仍以御史大夫為稅地錢物使歲以為常均給百官大曆四年正月十八日敕有司定天下百姓及王公已下每年稅錢分為九等上上戶四千文上中戶三千五百文上下戶三千文中上戶二千五百文中中戶二千文中下戶一千五百文下上戶一千文下中戶七百文下下戶五百文其見官一品準上上戶九品準下下戶餘品並準依此戶等稅若一戶數處任官亦每處依品納稅其內外官仍據正員及占額內闕者稅其試及同正員文武官不在稅限其百姓有邸店行鋪及鑪冶應準式合加本戶二等稅者依此稅數勘責徵納其寄莊戶準舊例從八等戶稅寄住戶從九等戶稅比類百姓事恐不均宜各遞加一等稅其諸色浮客及權時寄住戶等無問有官無官各所在為兩等收稅稍殷有者準八等戶餘準九等戶如數處有莊田亦每處稅諸道將士莊田既緣防禦勤勞不可同百姓例並一切從九等輸稅其年十二月敕今關輔墾田漸廣江淮轉漕常加計一年之儲有太半之助其於稅地固可從輕其京兆來秋稅宜分作兩等上下各半上等每畝稅一斗下等每畝稅六升其荒田如能佃者宜準今年十月二十九日敕一切每畝稅二升仍委京兆尹及令長一一存撫令知朕意五年三月優詔定京兆府百姓稅夏稅上田畝稅六升下田畝稅四升秋稅上田畝稅五升下田畝稅三升荒田開佃者畝率二升八年正月二十五日敕青苗地頭錢天下每畝率十五文以京師煩劇先加至三十文自今已後宜準諸州每畝十五文建中元年二月遣黜陟使分行天下其詔略曰戶無主客以見居為簿人無丁中以貧富為差行商者在郡縣稅三十之一居人之稅秋夏兩徵之各有不便者三之餘征賦悉罷而丁額不廢其田畝之稅率以大曆十四年墾數為準徵夏稅無過六月秋稅無過十一月違者進退長吏令黜陟使各量風土所宜人戶多少均之定其賦尚書度支總統焉三年五月淮南節度使陳少遊請於本道兩稅錢每千增二百因詔他州悉如之八年四月劍南西川觀察使韋皐奏請加稅什二以增給官吏從之元和十五年八月中書門下奏伏準今年閏正月十七日敕令百僚議錢貨輕重者今據羣官楊於陵等議伏請天下兩稅榷鹽酒利等悉以布帛絲綿任土所產物充稅並不徵見錢則物漸重錢漸輕農人見免賤賣匹帛者伏以羣臣所議事皆至當深利公私請商量付度支據諸州府應徵兩稅供上都及留州留使舊額起元和十六年已後並改配端匹斤兩之物為稅額如大曆已前租庸課調不計錢令其折納使人知定制供辦有常仍約元和十五年徵納布帛等估價其舊納虛估物與依虛估物迴計如舊納實估物幷見錢即於端匹斤兩上量加估價迴計變法在長其物價價長則永利公私初雖微有加饒法行即當就實比舊給用固利而不害仍作條件處置編入旨符其鹽利酒利本以榷率計錢有殊兩稅之名不可除去錢額中有令納見錢者亦請令折納時估匹段上既不專以錢為稅人得以所產輸官錢貨必均其重輕隴畝自廣於蠶織便時惠下庶得其宜其土乏絲麻或地連邊塞風俗更異賦入不同亦請商量委所司裁酌隨便宜處置詔從之大和四年五月劍南西川宣撫使諫議大夫崔戎奏準詔旨制置西川事條今與郭釗商量兩稅錢數內三分二分納見錢一分折納匹段每二貫加饒百姓五百文計一十三萬四千二百四十三貫文依此曉諭百姓訖經賊州縣準詔三分減放一分計減錢六萬七千六百二十貫文不經賊處先徵見錢今三分一分折納雜物計優饒百姓一十三萬貫舊有稅薑芋之類每畝至七八百徵斂不時今併省稅名盡依諸處為四限等第先給戶帖餘一切名目勒停高祖即位仍用隋之五銖錢武德四年七月廢五銖錢行開元通寶錢徑八分重二銖四絫積十文重一兩一千文重六斤四兩仍置錢監於洛并幽益等州秦王齊王各賜三鑪鑄錢右僕射裴寂賜一鑪敢有盜鑄者身死家口配沒五年五月又於桂州置監議者以新錢輕重大小最為折衷遠近甚便之後盜鑄漸起而所在用錢濫惡顯慶五年九月敕以惡錢轉多令所在官私為市取以五惡錢酬一好錢百姓以惡錢價賤私自藏之以候官禁之弛高宗又令以好錢一文買惡錢兩文弊仍不息至乾封元年封嶽之後又改造新錢文曰乾封泉寶徑一寸重二銖六分仍與舊錢並行新錢一文當舊錢之十周年之後舊錢並廢初開元錢之文給事中歐陽詢制詞及書時稱其工其字含八分及隸體其詞先上後下次左後右讀之自上及左迴環讀之其義亦通流俗謂之開通元寶錢及鑄新錢乃同流俗乾字直上封字在左尋寤錢文之誤又緣改鑄商賈不通米帛增價乃議却用舊錢二年正月下詔曰泉布之興其來自久實古今之要重為公私之寶用年月既深偽濫斯起所以採乾封之號改鑄新錢靜而思之將為未可高祖撥亂反正爰創軌模太宗立極承天無所改作今廢舊造新恐乖先旨其開元通寶宜依舊施行為萬代之法乾封新鑄之錢令所司貯納更不須鑄仍令天下置鑪之處並鑄開元通寶錢既而私鑄更多錢復濫惡高宗嘗臨軒謂侍臣曰錢之為用行之已久公私要便莫甚於斯比為州縣不存檢校私鑄過多如聞荊潭宣衡犯法尤甚遂有將船宿於江中所部官人不能覺察自今嚴加禁斷所在追納惡錢一二年間使盡當時雖有約敕而姦濫不息儀鳳四年四月令東都出遠年糙米及粟就市給糶斗別納惡錢百文其惡錢令少府司農相知即令鑄破其厚重徑合斤兩者任將行用時米粟漸貴議者以為鑄錢漸多所以錢賤而物貴於是權停少府監鑄錢尋而復舊則天長安中又令懸樣於市令百姓依樣用錢俄又簡擇艱難交易留滯又降敕非鐵錫銅蕩穿穴者並許行用其有熟銅排斗沙澀厚大者皆不許簡自是盜鑄蜂起濫惡益衆江淮之南盜鑄者或就陂湖巨海深山之中波濤險峻人跡罕到州縣莫能禁約以至神龍先天之際兩京用錢尤濫其郴衡私鑄小錢纔有輪郭及鐵錫五銖之屬亦堪行用乃有買錫鎔銷以錢模夾之斯須則盈千百便賫用之開元五年車駕往東都宋璟知政事奏請一切禁斷惡錢六年正月又切斷天下惡錢行二銖四絫錢不堪行用者並銷破覆鑄至二月又敕曰古者聚萬方之貨設九府之法以通天下以便生人若輕重得中則利可知矣若真偽相雜則官失其守頃者用錢不論此道深恐貧窶日困姦豪歲滋所以申明舊章懸設諸樣欲其人安俗阜禁止令行時江淮錢尤濫惡有官鑪偏鑪稜錢時錢等數色璟乃遣監察御史蕭隱之充江淮使隱之乃令率戶出錢務加督責百姓乃以上青錢充惡錢納之其小惡者或沉之於江湖以免罪戾於是市井不通物價騰起流聞京師隱之貶官璟因之罷相乃以張嘉貞知政事嘉貞乃弛其禁人乃安之開元二十二年中書侍郎張九齡初知政事奏請不禁鑄錢玄宗令百官詳議黃門侍郎裴耀卿李林甫河南少尹蕭炅等皆曰錢者通貨有國之權是以歷代禁之以絕姦濫今若一啟此門但恐小人棄農逐利而濫惡更甚於事不便左監門錄事參軍劉秩上議曰伏奉今月二十一日敕欲不禁鑄錢令百僚詳議可否者夫錢之興其來尚矣將以平輕重而權本末齊桓得其術而國以霸周景失其道而人用弊考諸載籍國之興衰實繫於是陛下思變古以濟今欲反經以合道而不即改作詢之芻蕘臣雖惷愚敢不薦其聞見古者以珠玉為上幣黃金為中幣刀布為下幣管仲曰夫三幣握之則非有補於煖也舍之則非有損於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一高一下不得有常故與之在君奪之在君貧之在君富之在君是以人戴君如日月親君如父母用此術也是為人主之權今之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢輕則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法收之使少少則重重則作法布之使輕輕重之本必由乎是奈何而假於人其不可二也夫鑄錢不雜以鉛鐵則無利雜以鉛鐵則惡惡不重禁之不足以懲息且方今塞其私鑄之路人猶冒死以犯之況啟其源而欲人之從令乎是設陷穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畝者衆去南畝者衆則草不墾草不墾又鄰於寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁法令不行人之不理皆由貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役於富室富室乘之而益恣昔漢文之時吳濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢之所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以效愚計夫錢重者猶人日滋於前而鑪不加於舊又公錢重與銅之價頗等故盜鑄者破重錢以為輕錢錢輕禁寬則行禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴在採用者衆夫銅以為兵則不如鐵以為器則不如漆禁之無害陛下何不禁於人禁於人則銅無所用銅益賤則錢之用給矣夫銅不布下則盜鑄者無因而鑄則公錢不破人不犯死刑錢又日增末復利矣是一舉而四美兼也惟陛下熟察之時公卿羣官皆建議以為不便事既不行但敕郡縣嚴斷惡錢而已至天寶之初兩京用錢稍好米粟豐賤數載之後漸又濫惡府縣不許好者加價迴博好惡通用富商姦人漸收好錢潛將往江淮之南每錢貨得私鑄惡者五文假託官錢將入京私用京城錢日加碎惡鵝眼鐵錫古文綖環之類每貫重不過三四斤十一載二月下敕曰錢貨之用所以通有無輕重之權所以禁踰越故周立九府之法漢備三官之制永言適便必在從宜如聞京師行用之錢頗多濫惡所資懲革絕其訛謬然安人在於存養化俗期於變通法若從寬事堪持久宜令所司即出錢三數十萬貫分於兩市百姓間應交易所用錢不堪久行用者官為換取仍限一月日內使盡庶單貧無患商旅必通其過限輒違犯者一事已上並作條件處分是時京城百姓久用惡錢制下之後頗相驚擾時又令於龍興觀南街開場出左藏庫內排斗錢許市人博換貧弱者又爭次不得俄又宣敕除鐵錫銅沙穿穴古文餘並許依舊行用久之乃定乾元元年七月詔曰錢貨之興其來久矣代有沿革時為重輕周興九府實啟流泉之利漢造五銖亦弘改鑄之法必令小大兼適母子相權事有益於公私理宜循於通變但以干戈未息帑藏猶虛卜式獻助軍之誠弘羊興富國之算靜言立法諒在便人御史中丞第五琦奏請改錢以一當十別為新鑄不廢舊錢冀實三官之資用收十倍之利所謂於人不擾從古有經宜聽於諸監別鑄一當十錢文曰乾元重寶其開元通寶者依舊行用所請採鑄捉搦處置即條件聞奏二年三月琦入為相又請更鑄重輪乾元錢一當五十二十斤成貫詔可之於是新錢與乾元開元通寶錢三品並行尋而穀價騰貴米斗至七千餓死者相枕於道乃撎舊開元錢以一當十減乾元錢以一當三十緣人厭錢價不定人間撎加價錢為虛錢長安城中競為盜鑄寺觀鐘及銅象多壞為錢姦人豪族犯禁者不絕京兆尹鄭叔清擒捕之少不容縱數月間搒死者八百餘人人益無聊矣上元元年六月詔曰因時立制頃議新錢且是從權知非經久如聞官鑪之外私鑄頗多吞併小錢踰濫成弊抵罪雖衆禁姦未絕況物價益起人心不安事藉變通期於折衷其重稜五十價錢宜減作三十文行用其開元舊時錢宜一當十文行用其乾元十當錢宜依前行用仍令京中及畿縣內依此處分諸州待進止七月敕重稜五十價錢先令畿內減至三十價行其天下諸州並宜準此寶應元年四月改行乾元錢一以當二乾元重稜小錢亦以一當二重稜大錢一以當三尋又改行乾元大小錢並以一當一其私鑄重稜大錢不在行用之限大曆四年正月關內道鑄錢等使戶部侍郎第五琦上言請於絳州汾陽銅原兩監增置五鑪鑄錢許之建中元年九月戶部侍郎韓洄上言江淮錢監歲共鑄錢四萬五千貫輸于京師度工用轉送之費每貫計錢二千是本倍利也今商州有紅崖冶出銅益多又有洛源監久廢不理請增工鑿山以取銅興洛源錢監置十鑪鑄之歲計出錢七萬二千貫度工用轉送之費貫計錢九百則利浮本也其江淮七監請皆停罷從之貞元九年正月張滂奏諸州府公私諸色鑄造銅器雜物等伏以國家錢少損失多門興販之徒潛將銷鑄錢一千為銅六斤造寫器物則斤直六百餘有利既厚銷鑄遂多江淮之間錢實減耗伏請準從前敕文除鑄鏡外一切禁斷元和三年五月鹽鐵使李巽上言得湖南院申郴州平陽高亭兩縣界有平陽冶及馬跡曲木等古銅坑約二百八十餘井差官檢覆實有銅錫今請於郴州舊桂陽監置鑪兩所採銅鑄錢每日約二十貫計一年鑄成七千貫有益於人從之其年六月詔曰泉貨之法義在通流若錢有所壅貨當益賤故藏錢者得乘人之急居貨者必損己之資今欲著錢令以出滯藏加鼓鑄以資流布使商旅知禁農桑獲安義切救時情非欲利若革之無漸恐人或相驚應天下商賈先蓄見錢者委所在長吏令收市貨物官中不得輒有程限逼迫商人任其貨易以求便利計周歲之後此法遍行朕當別立新規設蓄錢之禁所以先有告示許有方圓意在他時行法不貸又天下有銀之山必有銅鑛銅者可資於鼓鑄銀者無益於生人權其重輕使務專一其天下自五嶺以北見採銀坑並宜禁斷恐所在坑戶不免失業各委本州府長吏勸課令其採銅助官中鑄作仍委鹽鐵使條流聞奏四年閏三月京城時用錢每貫頭除二十文陌內欠錢及有鉛錫錢等準貞元九年三月二十六日敕陌內欠錢法當禁斷慮因捉搦或亦生姦使人易從切於不擾自今已後有因交關用欠陌錢者宜但令本行頭及居停主人牙人等檢察送官如有容隱兼許賣物領錢人糾告其行頭主人牙人重加科罪府縣所由祗承人等並不須干擾若非因買賣自將錢於街衢行者一切勿問其年六月敕五嶺已北所有銀坑依前任百姓開採禁見錢出嶺六年二月制公私交易十貫錢已上即須兼用匹段委度支鹽鐵使及京兆尹即具作分數條流聞奏茶商等公私便換見錢並須禁斷其年三月河東節度使王鍔奏請於當管蔚州界加置鑪鑄銅錢廢管內錫錢許之仍令加至五鑪七年五月戶部王紹度支盧坦鹽鐵王播等奏伏以京都時用多重見錢官中支計近日殊少蓋緣比來不許商人便換因茲家有滯藏所以物價轉高錢多不出臣等今商量伏請許令商人於三司任便換見錢一切依舊禁約伏以比來諸司諸使等或有便商人錢多留城中逐時收貯積藏私室無復通流伏請自今已後嚴加禁約從之八年四月敕以錢重貨輕出內庫錢五十萬貫令兩市收市布帛每端匹估加十之一十二年正月敕泉貨之設故有常規將使重輕得宜是資斂散有節必通其變以利於人今繒帛轉賤公私俱弊宜出見錢五十萬貫令京兆府揀擇要便處開場依市價交易選清強官吏切加勾當仍各委本司先作處置條件聞奏必使事堪經久法可通行又敕近日布帛轉輕見錢漸少皆緣所在壅塞不得通流宜令京城內自文武官僚不問品秩高下幷公郡縣主中使等下至士庶商旅寺觀坊市所有私貯見錢並不得過五千貫如有過此許從敕出後限一月內任將市別物收貯如錢數較多處置未了任於限內於地界州縣陳狀更請限縱有此色亦不得過兩箇月若一家內別有宅舍店鋪等所貯錢並須計用在此數其兄弟本來異居曾經分析者不在此限如限滿後有違犯者白身人等宜付所司決痛杖一頓處死其文武官及公主等並委有司聞奏當重科貶戚屬中使亦具名銜聞奏其賸貯錢不限多少並勒納官數內五分取一分充賞錢止於五千貫此外察獲及有人論告亦重科處分幷量給告者時京師里閭區肆所積多方鎮錢王鍔韓弘李惟簡少者不下五十萬貫於是競買第屋以變其錢多者竟里巷傭僦以歸其直而高貲大賈者多依倚左右軍官錢為名府縣不得窮驗法竟不行十四年六月敕應屬諸軍諸使更有犯時用錢每貫除二十文足陌內欠錢及有鉛錫錢者宜令京兆府枷項收禁牒報本軍本使府司差人就軍及看決二十如情狀難容復有違拒者仍令府司聞奏十五年八月中書門下奏伏準羣官所議鑄錢或請收市人間銅物令州郡鑄錢當開元以前未置鹽鐵使亦令州郡勾當鑄造今若兩稅盡納匹段或慮兼要通用見錢欲令諸道公私銅器各納所在節度團練防禦經略使便據元敕給與價直幷折兩稅仍令本處軍人鎔鑄其鑄本請以留州留使年支未用物充所鑄錢便充軍府州縣公用當處軍人自有糧賜亦較省本所資衆力幷收衆銅天下併功速濟時用待一年後鑄器物盡則停其州府有出銅鉛可以開鑪處具申有司便令同諸監冶例每年與本充鑄其收市銅器期限幷禁鑄造買賣銅物等待議定便令有司條流聞奏其上都鑄錢及收銅器續處分將欲頒行尚資周慮請令中書門下兩省御史臺幷諸司長官商量重議聞奏從之長慶元年九月敕泉貨之義所貴通流如聞比來用錢所在除陌不一與其禁人之必犯未若從俗之所宜交易往來務令可守其內外公私給用錢從今以後宜每貫一例除墊八十以九百二十文成貫不得更有加除及陌內欠少大和三年六月中書門下奏準元和四年閏三月敕應有鉛錫錢並合納官如有人糾得一錢賞百錢者當時敕條貴在峻切今詳事實必不可行只如告一錢賞百錢則有人告一百貫錫錢須賞一萬貫銅錢執此而行事無畔際今請以鉛錫錢交易者一貫已下以州府常行決脊杖二十十貫已下決六十徒三年過十貫已上所在集衆決殺其受鉛錫錢交易者亦準此處分其用鉛錫錢仍納官其能糾告者每一貫賞五千文不滿貫者準此計賞累至三百千仍且取當處官錢給付其所犯人罪不死者徵納家資充填賞錢可之四年十一月敕應私貯見錢家除合貯數外一萬貫至十萬貫限一周年內處置畢十萬貫至二十萬貫以下者限二周年處置畢如有不守期限安然蓄積過本限即任人糾告及所由覺察其所犯家錢並準元和十二年敕納官據數五分取一分充賞糾告人賞錢數止於五千貫應犯錢法人色目決斷科貶並準元和十二年敕處分其所由覺察亦量賞一半事竟不行五年二月鹽鐵使奏湖南管內諸州百姓私鑄造到錢伏緣衡道數州連接嶺南山洞深邃百姓依模監司錢樣競鑄造到脆惡姦錢轉將賤價博易與好錢相和行用其江西鄂岳桂管鑄濫錢並請委本道觀察使條流禁絕敕旨宜依會昌六年二月敕緣諸道鼓鑄佛像鐘磬等新錢已有次第須令舊錢流布絹帛價稍增文武百僚俸料宜起三月一日並給見錢其一半先給虛估匹段對估價支給敕比緣錢重幣輕生人坐困今加鼓鑄必在流行通變救時莫切於此宜申先甲之令以誡居貨之徒京城及諸道起今年十月以後公私行用並取新錢其舊錢權停三數年如有違犯同用鉛錫惡錢例科斷其舊錢並納官事竟不行開元元年十一月河中尹姜師度以安邑鹽池漸涸師度開拓疏決水道置為鹽屯公私大收其利其年十一月五日左拾遺劉彤上表曰臣聞漢孝武為政馬三十萬後宮數萬人外討戎夷內興宮室殫費之甚實百當今而古費多而貨有餘今用少而財不足何也豈非古取山澤而今取貧民哉取山澤則公利厚而人歸於農取貧民則公利薄而人去其業故先王作法也山海有官虞衡有職輕重有術禁發有時一則專農二則饒國濟人盛事也臣實為今疑之夫煮海為鹽採山鑄錢伐木為室農餘之輩寒而無衣飢而無食傭賃自資者窮苦之流也若能以山海厚利資農之餘人厚斂重徭免窮苦之子所謂損有餘而益不足帝王之道可不謂然乎臣願陛下詔鹽鐵木等官收興利貿遷於人則不及數年府有餘儲矣然後下寬貸之令蠲窮獨之徭可以惠羣生可以柔荒服雖戎狄猾夏堯湯水旱無足虞也奉天適變惟在陛下行之上令宰臣議其可否咸以鹽鐵之利甚益國用遂令將作大匠姜師度戶部侍郎強循俱攝御史中丞與諸道按察使檢責海內鹽鐵之課比令使人勾當除此外更無別求在外不細委知如聞稱有侵刻宜令本州刺史上佐一人檢校依令式收稅如有落帳欺沒仍委按察使糾覺奏聞其姜師度除蒲州鹽池以外自餘處更不須巡檢貞元十六年十二月史牟奏澤潞鄭等州多是末鹽請禁斷從之元和五年正月度支奏鄜州邠州涇原諸將士請同當處百姓例食烏白兩池鹽六年閏十二月度支盧坦奏河中兩池顆鹽敕文只許於京畿鳳翔陝虢河中澤潞河南許汝等十五州界內糶貨比來因循兼越興鳳文成等六州臣移牒勘責得山南西道觀察使報其果閬兩州鹽本土戶人及巴南諸郡市糴又供當軍士馬尚有懸欠若兼數州自然闕絕又得興元府諸耆老狀申訴臣今商量河中鹽請放入六州界糶貨從之十年七月度支使皇甫鎛奏加峽內四監劍南東西川山南西道鹽估以利供軍從之十三年鹽鐵使程异奏應諸州府先請置茶鹽店收稅伏準今年正月一日赦文其諸州府因用兵已來或慮有權置職名及擅加科配事非常制一切禁斷者伏以榷稅茶鹽本資財賦贍濟軍鎮蓋是從權昨兵罷自合便停事久實為重斂其諸道先所置店及收諸色錢物等雖非擅加且異常制伏請準赦文勒停從之十四年三月鄆青兗三州各置榷鹽院長慶元年三月敕河朔初平人希德澤且務寬泰使之獲安其河北榷鹽法且權停仍令度支與鎮冀魏博等道節度審察商量如能約計課利錢數分付榷鹽院亦任穩便自天寶末兵興以來河北鹽法羈縻而已暨元和中皇甫鎛奏置稅鹽院同江淮兩池榷利人苦犯禁戎鎮亦頻上訴故有是命其月鹽鐵使王播奏揚州白沙兩處納榷場請依舊為院又奏諸道鹽院糶鹽付商人請每斗加五十通舊三百文價諸處煎鹽停場置小鋪糶鹽每斗加二十文通舊一百九十文價又奏應管煎鹽戶及鹽商幷諸鹽院停場官吏所由等前後制敕除兩稅外不許差役追擾今請更有違越者縣令刺史貶黜罰俸從之二年五月詔曰兵革初寧亦資榷筦閭閻重困則可蠲除如聞淄青兗鄆三道往來糶鹽價錢近取七十萬貫軍資給費優贍有餘自鹽鐵使收管已來軍府頓絕其利遂使經行陣者有停糧之怨服隴畝者有加稅之嗟犯鹽禁者困鞭撻之刑理生業者乏蠶醬之具雖縣官受利而郡府益空俾人獲安寧我因節用其鹽鐵先於淄青兗鄆等道管內置小鋪糶鹽巡院納榷起今年五月一日已後一切並停仍各委本道約校比來節度使自收管充軍府逐急用度及均減管內貧下百姓兩稅錢數至年終各具糶鹽所得錢幷均減兩稅奏聞安邑解縣兩池舊置榷鹽使仍各別置院官元和三年七月復以安邑解縣兩池留後為榷鹽使先是兩池鹽務隸度支其職視諸道巡院貞元十六年史牟以金部郎中主池務恥同諸院遂奏置使額二十一年鹽鐵度支合為一使以杜佑兼領佑以度支既稱使其所管不宜更有使名遂與東渭橋使同奏罷之至是裴均主池務職轉繁劇復有是請大和三年四月敕安邑解縣兩池榷課以實錢一百萬貫為定額至大中二年正月敕但取匹段精好不必計舊額錢數及大中年度支奏納榷利一百二十一萬五千餘貫女鹽池在解縣朝邑小池在同州鹵池在京兆府奉先縣並禁斷不榷烏池在鹽州舊置榷稅使長慶元年三月敕烏池每年糶鹽收博榷米以一十五萬石為定額溫池大中四年三月因收復河隴敕令度支收管溫池鹽仍差靈州分巡院官勾當至六年三月敕令割屬威州置榷稅使緣新制置未立榷課定額胡落池在豐州界河東供軍使收管每年採鹽約一萬四千餘石供振武天德兩軍及營田水運官健自大中四年党項叛擾饋運不通供軍使請權市河東白池鹽供食其白池屬河東節度使不係度支初玄宗已前亦有鹽池使景雲四年三月蒲州刺史充關內鹽池使先天二年九月強循除豳州刺史充鹽池使此即鹽州池也開元十五年五月兵部尚書蕭嵩除關內鹽池使此是朔方節度常帶鹽池使也
