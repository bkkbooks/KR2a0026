body:
  text: 舊唐書卷十八下本紀第十八下宣宗宣宗聖武獻文孝皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年六月二十二日生於大明宮長慶元年三月封光王名怡會昌六年三月一日武宗疾篤遺詔立為皇太叔權勾當軍國政事翌日柩前即帝位改今名時年三十七帝外晦而內朗嚴重寡言視瞻特異幼時宮中以為不慧十餘歲時遇重疾沈綴忽有光輝燭身蹶然而興正身拱揖如對臣僚乳媼以為心疾穆宗視之撫其背曰此吾家英物非心憊也賜以玉如意御馬金帶常夢乘龍昇天言之於鄭后乃曰此不宜人知者幸勿復言歷大和會昌朝愈事韜晦羣居游處未嘗有言文宗武宗幸十六宅宴集強誘其言以為戲刻謂之光叔武宗氣豪尤不為禮及監國之日哀毀滿容接待羣僚決斷庶務人方見其隱德焉四月辛未釋服尊母鄭氏曰皇太后以兵部侍郎翰林學士承旨白敏中守本官同中書門下平章事以特進守太尉門下侍郎同平章事上柱國衞國公食邑二千戶李德裕檢校太尉同平章事江陵尹荊南節度使以中散大夫大理卿馬植為金紫光祿大夫刑部侍郎充諸道鹽鐵等使以成德軍節度使王元逵檢校太保山南西道節度使王起檢校司空魏博節度使何弘敬淮南節度使李紳並檢校司空劍南西川節度使崔鄲檢校尚書右僕射同中書門下平章事並如故東都留守李石奏修奉太廟畢所司迎奉太微宮神主祔廟訖東都太廟者本武后家廟神龍中中宗反正廢武氏廟主立太祖已下神主祔之安祿山陷洛陽以廟為馬棄其神主而協律郎嚴郢收而藏之史思明再陷洛陽尋又散失賊平東京留守盧正己又募得之廟已焚毀乃寄主於太微宮大曆十四年留守路嗣恭奏重修太廟以迎神主詔百官參議紛然不定禮儀使顏真卿堅請歸祔不從會昌五年留守李石因太微宮正殿圮陊以廢弘敬寺為太廟迎神主祔之又下百僚議皆言准故事無兩都俱置之禮唯禮部侍郎陳商議云周之文武有鎬洛二廟令兩都異廟可也然不宜置主於廟主宜依禮瘞於廟之北墉下事未行而武宗崩宣宗即位因詔有司迎太微宮寓主祔廢寺之新廟而知禮者非之制皇長男溫可封鄆王二男涇可封雅王第三男滋可封蘄王第四男沂可封慶王五月左右街功德使奏准今月五日赦書節文上都兩街舊留四寺外更添置八所兩所依舊名興唐寺保壽寺六所請改舊名寶應寺改為資聖寺青龍寺改為護國寺菩提寺改為保唐寺清禪寺改為安國寺法雲尼寺改為唐安寺崇敬尼寺改為唐昌寺右街添置八所西明寺改為福壽寺莊嚴寺改為聖壽寺舊留寺二所舊名千福寺改為興元寺化度寺改為崇福寺永泰寺改為萬壽寺溫國寺改為崇聖寺經行寺改為龍興寺奉恩寺改為興福寺敕旨依奏誅道士劉玄靖等十二人以其說惑武宗排毀釋氏故也今月五日赦書節文吏部三銓選士祇憑資考多匪實才許觀察使刺史有奇才異政之士聞薦試用又觀察使刺史交代之時冊書所交戶口如能增添至千戶即與超遷如逃亡至七百戶罷後三年內不得任使又徒流人在天德振武者管中量借糧種俾令耕田以為業以劍南東川節度使檢校禮部尚書盧商為兵部侍郎同平章事六月以戶部侍郎充諸道鹽鐵轉運使馬植本官同平章事七月以兵部尚書李讓夷為劍南東川節度使十月敕太廟祫享合以功臣配其憲宗廟以裴度杜黃裳李愬高崇文等配享以荊南節度使李德裕為東都留守十一月有司享太廟其穆宗室文曰皇兄太常博士閔慶之奏夫禮有尊尊而不親親祝文稱弟未當請改為嗣皇帝從之京兆府奏京師百司職田斛斗請准會昌三年例許人戶自送納京師所冀州縣無得欺隱從之以江西觀察使周墀為義成軍節度使鄭滑觀察等使十二月刑部尚書判度支崔元式奏准七月二日敕綾紗絹等次弱疋段並同禁斷不得織造臣欲與鹽鐵戶部三司同條疏先勘左藏庫令分析出次弱疋段州府即牒本道官搜索狹小機杼令焚毀其已納到次弱疋段具數以聞上從之大中元年春正月戊戌朔宮苑使奏皇帝致齋行事內諸宮苑門共九十四所並令鎖閉鑰匙進內候車駕還宮則請領從之戊申皇帝有事於郊廟禮畢御丹鳳門大赦改元制條曰古者郎官出宰卿相治郡所以重親人之官急為政之本自澆風久扇此道稍消頡頏清途便臻顯貴治人之術未嘗經心欲使究百姓艱危通天下利病不可得也為政之始思厚儒風軒墀近臣蓋備顧問如其不知人疾苦何以膺朕眷求今後諫議大夫給事中中書舍人未曾任刺史縣令或在任有贓累者宰臣不得擬議守宰親人職當撫字三載考績著在格言貞元年中屢下明詔縣令五考方得改移近者因循都不遵守諸州或得三考畿府罕及二年以此字人若為成政道塗郡吏有迎送之勞鄉里庶民無蘇息之望自今須滿三十六箇月永為常式二月丁卯制憲宗第十七子惕封彭王第十八子惴為棣王皇第五子澤為濮王第六子潤為鄂王敕修百福殿以檢校太尉東都留守李德裕為太子少保分司東都以給事中鄭亞為桂州刺史御史中丞桂管防禦觀察等使二月丁酉禮部侍郎魏扶奏臣今年所放進士三十三人其封彥卿崔琢鄭延休等三人實有詞藝為時所稱皆以父兄見居重位不得令中選詔令翰林學士承旨戶部侍郎韋琮重考覆敕曰彥卿等所試文字並合度程可放及第有司考試祇在至公如涉請託自有朝典今後但依常例放牓不得別有奏聞帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴學士詩什屬和公卿出鎮亦賦詩餞行凡對臣僚肅然拱揖鮮有輕易之言大臣或獻章疏即燒香盥手而覽之當時以大中之政有貞觀之風焉又敕自今進士放牓後杏園任依舊宴集有司不得禁制武宗好巡遊故曲江亭禁人宴聚故也閏三月敕會昌季年併省寺宇雖云異方之教無損致理之源中國之人久行其道釐革過當事體未弘其靈山勝境天下州府應會昌五年四月所廢寺宇有宿舊名僧復能修創一任住持所司不得禁止四月積慶太后蕭氏崩諡曰貞獻文宗母也六月以義成軍節度使周墀為兵部侍郎判度支冊黠戞斯王子為英武誠明可汗命鴻臚卿李業入蕃冊拜以金紫光祿大夫守太子少保分司東都上柱國奇章郡開國公食邑二千戶牛僧孺守太子太師銀青光祿大夫行太子賓客上柱國隴西郡開國公食邑二千戶李彥佐為太子太保並依前分司以左諫議大夫庾簡休為虢州刺史以正議大夫行尚書考功郎中知制誥上柱國崔璵為中書舍人以中散大夫前湖州刺史彭陽縣開國男食邑三百戶令狐綯行尚書考功郎中知制誥秋七月制以正議大夫尚書戶部侍郎知制誥翰林學士承旨柱國賜紫金魚袋韋琮以本官同中書門下平章事以太子少保分司東都衞國公李德裕為人所訟貶潮州司馬員外置同正員八月工部尚書中書侍郎平章事盧商出為鄂岳觀察使神策軍奏修百福殿成名其殿曰雍和殿樓曰親親樓凡廊舍屋宇七百間以會諸王子孫九月前永寧縣尉吳汝納詣闕稱冤言弟湘會昌四年任揚州江都縣尉被節度使李紳誣奏湘贓罪宰相李德裕曲情附紳斷臣弟湘致死詔下御史臺鞫按二年春正月壬戌宰臣率文武百僚上徽號曰聖敬文思和武光孝皇帝御宣政殿受冊訖宣德音神策軍修左銀臺門樓屋宇及南面城牆至睿武樓二月制劍南西川節度光祿大夫檢校吏部尚書同平章事成都尹上柱國隴西郡開國公食邑二千戶李回責授湖南觀察使桂州刺史御史中丞桂管防禦觀察使鄭亞貶循州刺史前淮南觀察判官魏鉶貶吉州司戶陸渾縣令元壽貶韶州司戶殿中侍御史蔡京貶澧州司馬御史臺奏據三司推勘吳湘獄謹具逐人罪狀如後揚州都虞候盧行立劉羣於會昌二年五月十四日於阿顏家喫酒與阿顏母阿焦同坐羣自擬收阿顏為妻妄稱監軍使處分要阿顏進奉不得嫁人兼擅令人監守其阿焦遂與江都縣尉吳湘密約嫁阿顏與湘劉羣與押軍牙官李克勳即時遮欄不得乃令江都百姓論湘取受節度使李紳追湘下獄計贓處死具獄奏聞朝廷疑其冤差御史崔元藻往揚州按問據湘雖有取受罪不至死李德裕黨附李紳乃貶元藻嶺南取淮南元申文案斷湘處死今據三司使追崔元藻及淮南元推判官魏鉶幷關連人款狀淮南都虞候劉羣元推判官魏鉶典孫貞高利錢倚黃嵩江都縣典沈頒陳宰節度押牙白沙鎮遏使傅義左都虞候盧行立天長縣令張弘思典張洙清陳迴右廂子巡李行璠典臣金弘舉送吳湘妻女至澧州取受錢物人潘宰前揚府錄事參軍李公佐元推官元壽吳珙翁恭太子少保分司李德裕西川節度使李回桂管觀察使鄭亞等伏候敕旨其月敕李回鄭亞元壽魏鉶已從別敕處分李紳起此冤訴本由不真今既身歿無以加刑粗塞衆情量行削奪宜追奪三任官告送刑部注毀其子孫稽於經義罰不及嗣並釋放李德裕先朝委以重權不務絕其黨庇致使冤苦直到于今職爾之由能無恨歎昨以李威所訴已經遠貶俯全事體特為從寬宜準去年敕令處分張弘思李公佐卑吏守官制不由己不能守正曲附權臣各削兩任官崔元藻曾受無辜之貶合從洗雪之條策中書門下商量處分李恪詳驗款狀蠹害最深以其多時須議減等委京兆府決脊杖十五配流天德李克勳欲收阿顏決脊杖二十配流硤州劉羣據其款狀合議痛刑曾効職官不欲決脊決臀杖五十配流岳州其盧行立及諸典吏策三司使量罪科放訖聞奏三月己酉兵部侍郎判度支周墀本官平章事以禮部尚書鹽鐵轉運使馬植本官同平章事日本國王子入朝貢方物王子善帝令待詔顧師言與之對手五月己未日有蝕之六月己丑太皇太后郭氏崩諡曰懿安憲宗妃穆宗之母也戶部侍郎兼御史大夫判度支崔龜從奏應諸司場院官請却官本錢後或有欺隱欠負徵理須足不得苟從恩蕩以求放免今後凡隱盜欠負請如官典犯贓例處分縱逢恩赦不在免限從之七月戊午以前山南西道節度使高元裕為吏部尚書八月戊子朝散大夫中書舍人充翰林學士上柱國平陰縣開國男食實封三百戶賜紫金魚袋畢諴為刑部侍郎九月敕比有無良之人於街市投匿名文書及於箭上或旗幡上縱為奸言以亂國法此後所由切加捉搦如獲此色便仰焚瘞不得上聞十一月兵部侍郎判戶部事魏扶奏天下州府錢物斛斗文簿並委錄事參軍專判仍與長史通判至交代時具數申奏如無懸欠量與減選注擬敕路隨等所修憲宗實錄舊本却仰施行其會昌新修者仰並進納如有鈔錄得敕到並納史館不得輒留委州府嚴加搜補以戶部侍郎判度支崔龜從本官同平章事銀青光祿大夫門下侍郎兼禮部尚書同平章事韋琮為太子詹事分司東都三年春正月丙寅涇原節度使康季榮奏吐蕃宰相論恐熱以秦原安樂三州及石門等七關之兵民歸國詔太僕卿陸耽往喻旨仍令靈武節度使朱叔明邠寧節度使張君緒各出本道兵馬應接其來以太常卿封敖檢校兵部尚書為興元尹山南西道節度使三月乙卯敕待詔官宜令與刑法官諫官次對銀青光祿大夫中書侍郎同平章事監修國史上柱國汝南縣開國子食邑五百戶周墀檢校刑部尚書梓州刺史充劍南東川節度使四月以正議大夫守中書侍郎同平章事集賢殿大學士賜紫金魚袋馬植為太子賓客分司東都以正議大夫守御史大夫上柱國博陵縣開國子食邑五百戶賜紫金魚袋崔鉉可中書侍郎平章事正議大夫行兵部侍郎判戶部事上柱國鉅鹿縣開國男食邑五百戶賜紫金魚袋魏扶可本官平章事五月幽州節度使檢校司徒平章事張仲武卒三軍以其子直方知留後事六月癸未五色雲見于京師敕先經流貶罪人不幸歿於貶所有情非惡逆任經刑部陳牒許令歸葬絕遠之處仍量事官給棺櫝康季榮奏收復原州石門驛藏木峽制勝六盤石峽等六關訖邠寧張君緒奏今月十三日收復蕭關御史臺奏義成軍節度使韋讓於懷真坊侵街造屋九間已令毀拆訖敕於蕭關置武州改長樂為威州七月三州七關軍人百姓皆河隴遺黎數千人見於闕下上御延喜門撫慰令其解辮賜之冠帶共賜絹十五萬疋八月鳳翔節度使李玭奏收復秦州制曰自昔皇王之有國也曷嘗不文以守成武以集事參諸二柄歸乎大寧朕猥荷丕圖思弘景運憂勤庶政四載于茲每念河湟土疆緜亙遐闊自天寶末犬戎乘我多難無力禦姦遂縱腥羶不遠京邑事更十葉時近百年進士試能靡不竭其長策朝廷下議皆亦聽其直詞盡以不生邊事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂佑左衽輸款邊壘連降刷恥建功所謀必克實樞衡妙算將帥雄稜副玄元不爭之文絕漢武遠征之悔甌脫頓空於內地斥堠全據於新封莫大之休指期而就況將士等櫛沐風雨暴露郊原披荊棘而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞涇原宜賜絹六萬疋靈武五萬疋鳳翔邠寧各四萬疋並以戶部產業物色充仍待季榮叔明李玭君緒各迴戈到鎮度支差脚支送四道立功將士各具名銜聞奏當議甄酬其秦威原三州及七關側近訪聞田土肥沃水草豐美如百姓能耕墾種蒔五年內不加稅賦五年已後重定戶籍便任為永業溫池鹽利可贍邊陲委度支制置聞奏鳳翔邠寧靈武涇原守鎮將士如能於本戍處耕墾營田即度支給賜牛糧子種每年量得斛斗便充軍糧亦不限約定數三州七關鎮守官健每人給衣糧兩分一分依常年例支給一分度支加給仍二年一替換其家口委長吏切加安存官健有莊田戶籍者仰州縣放免差役秦州至隴州已來道路要置堡柵與秦州應接委李玭與劉臯即便計度聞奏如商旅往來官健父兄子弟通傳家信關司並不得邀詰阻滯三州七關刺史關使將來訓練捍防有効能者並與超序官爵劍南西川沿邊沒蕃州郡如力能收復本道亦宜接借三州七關創置戍卒且要務靜如蕃人求市切不得通有來投降者申取長吏處分嗚呼七關要害三郡膏腴候館之殘趾可尋唐人之遺風尚在追懷往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務修築不進干戈必使足食足兵有備無患載洽亭育之道永致生靈之安中外臣僚宜體朕意九月辛亥西川節度使杜悰奏收復維州制曰朕祗荷丕業思平泰階將分邪正之源冀使華夷胥悅其有常登元輔久奉武宗深苞禍心盜弄國柄雖已行譴斥之典而未塞億兆之言是議再舉朝章式遵彝憲守潮州司馬員外置同正員李德裕早藉門地叨踐清華累居將相之榮唯以姦傾為業當會昌之際極公台之榮騁諛佞而得君遂恣橫而持政專權生事妬賢害忠動多詭異之謀潛懷僭越之志秉直者必棄向善者盡排誣貞良造朋黨之名肆讒構生加諸之釁計有踰於指鹿罪實見其欺天屬者方處鈞衡曾無嫌避委國史於愛壻之手寵秘文於弱子之身洎參信書亦引親昵恭惟元和實錄乃不刊之書擅敢改張罔有畏忌奪他人之懿績為私門之令猷又附李紳之曲情斷成吳湘之冤獄凡彼簪纓之士遏其取拾之途驕居自夸狡蠹無對擢爾之髮數罪未窮載闚罔上之田益驗無君之意使天下之人重足一迹皆讋懼奉面而慢易在心為臣若斯於法何逭於戲朕務全大體久為含容雖黜降其官榮尚蓋藏其醜狀而睥睨未已兢惕無聞積惡既彰公議難抑是宜移投荒服以謝萬邦中外臣僚當知予意可崖州司戶參軍所在馳驛發遣縱逢恩赦不在量移之限以起居郎庾道蔚禮部員外郎李文儒並充翰林學士十月辛巳京師地震河西天德靈夏尤甚戍卒壓死者數千人十一月東川節度使鄭涯鳳翔節度使李玭奏修文川谷路自靈泉至白雲置十一驛下詔褒美經年為雨所壞又令封敖修斜谷舊路以刑部侍郎韋有翼為御史中丞以職方員外郎鄭處誨兼御史知雜幽州軍亂逐其留後張直方軍人推其衙將周綝為留後十二月追諡順宗曰至德大聖大安孝皇帝憲宗曰昭文章武大聖孝皇帝初以河湟收復百僚請加徽號帝曰河湟收復繼成先志朕欲追尊祖宗以昭功烈白敏中等對曰非臣愚昧所能及至是上御宣政殿行事及冊出俯僂目送流涕嗚咽崖州司戶參軍李德裕卒於貶所四年春正月以追尊二聖御正殿大赦天下徒流比在天德者以十年為限既遇鴻恩例減三載但使循環添換邊不闕人次第放歸人無怨苦其秦原威武諸州諸關先准格徒流人亦量與立限止於七年如要住者亦聽諸州府縣官如請工假一月已下權差諸廳判官一月已上即准勾當例其課料等據數每貫刻二百文與見判案官添給有故意殺人者雖已傷未死已死更生意欲殺傷偶然得免並同已殺人條處分二月皇女萬壽公主出降右拾遺鄭顥以顥為銀青光祿大夫行起居郎駙馬都尉三月己卯刑部奏監臨主守應將官物私自貸使幷貸借人及以己物中納官司者幷專知別當主掌所由有犯贓並同犯入己贓不在原赦之限從之以幽州節度副大使檢校工部尚書張直方為左金吾衞將軍四月敕法司用刑或特巧詐分律兩端遂成其罪既奸吏得計則黎庶何安自今後應書罪定刑宜直指其事不得舞文妄有援引又刑部奏准今年正月一日敕節文據會昌元年三月二十六日敕竊盜贓至一貫文處死宜委所司重詳定條目奏聞臣等檢校並請准建中三年三月二十四日敕竊盜贓滿三疋已上決殺如贓數不充量請科放從之七月丙子大理卿劉濛奏古者懸法示人欲使人從善遠罪至於不犯以致刑措准大和二年十月二十六日刑部侍郎高釴條疏准勘節目一十一件下諸州府粉壁書於錄事參軍食堂每申奏罪人須依前件節目歲月滋久文字湮淪州縣推案多違漏節目今後請下諸道令刻石置於會食之所使官吏起坐觀省記憶條目庶令案牘周詳從之八月刑部侍郎御史中丞魏奏諸道州府百姓詣臺訴事多差御史推劾臣恐煩勞州縣先請差度支戶部鹽鐵院官帶憲銜者推劾又各得三司使申稱院官人數不多例專掌院務課績不辦今諸道觀察使幕中判官少不下五六人請於其中帶憲銜者委令推劾如累推有勞能雪冤滯御史臺闕官便令奏用從之九月以朝請大夫檢校禮部尚書孟州刺史河陽三城節度使李拭為太原尹北都留守河東節度等使幽州節度使周綝卒軍人立其牙將張允伸為留後十月中書侍郎平章事魏扶罷知政事十一月己亥敕收復成維扶等三州建立已定條令制置一切合同其已配到流人宜准秦原威武等州流例七年放還以戶部侍郎判本司事令狐綯為兵部侍郎同平章事十二月以華州刺史周敬復為光祿大夫檢校左散騎常侍兼洪州刺史江南西道團練觀察使賜金紫五年春正月甲戌制皇第七子洽封懷王第八子汭為昭王第九子汶為康王敕兩京天下州府起大中五年正月一日已後三年內不得殺牛如郊廟享祀合用者即以諸畜代二月戶部侍郎裴休充諸道鹽鐵轉運等使四月癸卯刑部侍郎劉瑑奏據今年四月十三日已前凡二百二十四年雜制敕計六百四十六門二千一百六十五條議輕重名曰大中刑法統類欲行用之五月以太原尹河東節度使李拭為鳳翔節度使李業檢校戶部尚書太原尹北都留守充河東節度使守司空門下侍郎太原郡開國伯食邑一千戶白敏中檢校司徒同平章事邠州刺史充邠寧節度觀察東面招討党項等使以戶部侍郎判戶部事魏本官同平章事七月宰相監修國史崔龜從續柳芳唐曆二十二卷上之八月敕公主邑司擅行文牒恐多影庇有紊條章今後公主除緣徵封外不得令邑司行文書牒府縣如緣公事令邑司申宗正寺與酌事體施行沙州刺史張義潮遣兄義澤以瓜沙伊肅等十一州戶口來獻自河隴陷蕃百餘年至是悉復隴右故地以義潮為瓜沙伊等州節度使九月敕條疏刺史交代須一一交割公事與知州官方得離任准會昌元年敕刺史只禁科率官吏抑配人戶至於使州公廨及雜利潤天下州府皆有規制不敢違越緣未有明敕處分多被無良人吏致使恐嚇或致言訟起今後應刺史下擔什物及除替後資送錢物但不率斂官吏不科配百姓一任各守州縣舊例色目支給如無公廨不在資送之限若輒有率配以入己贓論以正議大夫兵部侍郎諸道鹽鐵轉運使上柱國河東縣開國子裴休守禮部尚書進階金紫以前宣歙觀察使太中大夫檢校左散騎常侍裴諗權知兵部侍郎十月己亥京兆尹韋博奏京畿富戶為諸軍影占苟免府縣色役或有追訴軍府紛然請准會昌三年十二月敕諸軍使不得強奪百姓入軍從之十一月中書侍郎兼吏部尚書平章崔龜從檢校尚書左僕射汴州刺史充宣武軍節度使沙州置歸義軍以張義潮為節度使太子詹事姚康獻帝王政纂十卷又撰統史三百卷上自開闢下盡隋朝帝王美政詔令制置銅鹽錢穀損益用兵利害下至僧道是非無不備載編年為之國子祭酒馮審奏文宣王廟始太宗立之睿宗書額武后竊政之日改篆題大周二字請削之從之十二月盜斫景陵神門戟京兆尹韋博罰兩月俸貶宗正卿李文舉睦州刺史陵令吳閱岳州司馬奉先令裴讓隋州司馬是歲湖南大饑六年春正月戊辰以隴州防禦使薛逵為秦州刺史天雄軍使兼秦成兩州經略使二月右衞大將軍鄭光以賜田請免租稅宰相魏奏曰鄭光以國舅之親賜田可也免稅無以勸蒸民敕曰一依人戶例供稅三月隴州刺史薛逵奏修築定成關工畢四月丁酉敕常平義倉斛斗每年檢勘實水旱災處錄事參軍先勘人戶多少支給先貧下戶富戶不在支給之限以禮部尚書諸道鹽鐵轉運等使裴休可本官同平章事五月敕天下軍府有兵馬處宜選會兵法能弓馬等人充教練使每年合教習時常令教習仍於其時申兵部御史臺奏諸色刑獄有關連朝官者尚書省四品已上諸司三品已上官宜先奏取進止如取諸色官狀即申中書取裁從之秋七月丙辰前淮南節度使金紫光祿大夫檢校尚書左僕射兼揚州大都督府長史御史大夫上柱國贊皇郡開國公食邑一千五百戶李王玉卒贈司空敕犯贓人平贓據律以當時物價上旬估請取所犯之處其月內上旬時估平之從之檢校司空太子少師上柱國范陽郡開國公食邑二千戶盧鈞可太原尹北都留守河東節度使九月敕起居郎轉官月限宜以二十箇月七年春正月壬辰金紫光祿大夫守太子少傅分司上柱國晉陵郡開國公食邑二千戶歸融卒贈右僕射宗正卿李文舉貶睦州刺史四月以御史大夫鄭朗為中書侍郎同平章事五月左衞率府倉曹張戣集律令格式條件相類一千二百五十條分一百二十一門號曰刑法統類上之七月以正議大夫尚書左丞上柱國賜紫金魚袋崔璪為刑部尚書以銀青光祿大夫行兵部侍郎知制誥充翰林學士蘇滌為尚書左丞權知戶部侍郎崔璵可權知兵部侍郎十月尚書左僕射門下侍郎平章事太清宮使弘文館大學士崔鉉進續會要四十卷修撰官楊紹復崔瑑薛逢鄭言等賜物有差八年春正月陝州黃河清二月南蠻進犀牛詔還之三月敕以旱詔使疏決繫囚宰相監修國史魏修成文宗實錄四十卷上之修史官給事中盧耽太常少卿蔣偕司勳員外郎王渢右補闕盧吉頒賜銀