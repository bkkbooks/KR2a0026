常侍鎮府左司馬知府事充成德軍節度副使兼充都知兵馬使以成德軍中軍兵馬使銀青光祿大夫檢校太子賓客兼監察御史上柱國王景胤可本官深州刺史本州團練守捉使檢校左散騎常侍右神武大將軍知軍事王紹孚可落起復依前右神武大將軍紹懿紹孚鎮州王紹鼎之弟也景胤紹鼎子也以朝請大夫檢校刑部尚書華州刺史上柱國酇縣開國男食邑三百戶賜紫金魚袋蕭俶為太子賓客分司東都四月以職方郎中知制誥裴坦為中書舍人以朝議大夫權知京兆尹崔郢為濮王傅分司東都以決殺府吏也以江西觀察使洪州刺史御史中丞上柱國賜紫金魚袋張毅夫為京兆尹以鳳翔節度使正議大夫檢校戶部尚書兼鳳翔尹上柱國襲晉國公食邑三千戶襲實封一百五十戶裴識可許州刺史充忠武軍節度陳許蔡觀察等使以吏部侍郎盧懿檢校工部尚書兼鳳翔尹御史大夫鳳翔隴右節度使以中書舍人鄭憲為洪州刺史御史中丞江南西道都團練觀察處置等使仍賜紫金魚袋以安南宣慰使右千牛衞大將軍宋涯為安南都護御史中丞本管經略招討處置等使以幽州節度使張允伸弟允中為荊州刺史允千檀州刺史允辛安塞軍使允舉納降軍使並兼御史中丞以前邠寧節度使朝議大夫檢校工部尚書邠州刺史上柱國賜紫金魚袋柳憙可檢校禮部尚書河南尹五月以職方郎中李玄為壽州刺史六月以朔方靈武定遠等城節度使朝散大夫檢校左散騎常侍靈州大都督府長史上柱國賜紫金魚袋劉潼為鄭州刺史馳驛赴任以給邊兵糧不及時也以安南都護宋涯為容州刺史容管經略招討處置等使制皇第三男灌封衞王第十一男澭封廣王以朝散大夫守尚書兵部侍郎判度支上柱國彭城縣開國男食邑三百戶賜紫金魚袋蕭鄴本官同平章事判度支以右監門將軍知內府省事清河公崔巨淙為淮南監軍以特進檢校司空兼太子太傅分司東都上柱國扶風郡開國公食邑二千戶杜悰本官判東都尚書省兼御史大夫充東都留守東畿汝都防禦使七月以飛龍使宮闈局令王歸長守內侍省內常侍知省事充內樞密使責授邠州員外司馬張直方為右驍衞大將軍八月成德軍節度使檢校尚書右僕射王紹鼎卒贈司空賻布帛三百段以皇子昭王汭為開府儀同三司守鎮州大都督府長史成德軍節度鎮冀深趙觀察等大使以成德軍節度副使都知兵馬使左司馬知府事御史中丞王紹懿為成德軍副使留後以義武軍節度易定觀察等使檢校禮部尚書定州刺史上柱國滎陽縣開國男食邑三百戶鄭涯檢校戶部尚書汴州刺史上柱國充宣武軍節度副大使知節度事宋亳觀察亳州太清宮等使以四鎮北庭行軍涇原渭武節度使銀青光祿大夫檢校右散騎常侍涇州刺史御史大夫上柱國范陽縣開國男食邑三百戶盧簡求可檢校工部尚書定州刺史義武節度使易定觀察北平軍等使以鹽州防禦押蕃落諸軍防秋都知兵馬使度支烏池榷稅等使檢校右散騎常侍鹽州刺史上柱國賜紫金魚袋陸耽代簡求為涇原節度使以翰林學士朝散大夫中書舍人賜紫金魚袋曹確權知河南尹汝州防禦使令狐緒有善政郡人詣闕請立德政碑頌緒以弟綯在中書上表乞寢從之以太常卿蘇滌為兵部尚書權知吏部銓事以銀青光祿大夫守散騎常侍上柱國渤海郡開國伯食邑七百戶封敖為太常卿是月熒惑犯東井九月以秦州刺史李承勛為朝散大夫檢校工部尚書涇州刺史充四鎮北庭涇原渭武節度等使以禮部郎中楊知溫充翰林學士以中散大夫尚書禮部侍郎上柱國賜紫金魚袋杜審權為陝州大都督府長史兼御史大夫陝虢都防禦觀察處置等使以銀青光祿大夫檢校司空兼太子太師上柱國范陽郡開國公食邑二千戶盧鈞為檢校司空同中書門下平章事興元尹充山南西道節度等使右補闕陳嘏左拾遺王譜右拾遺薛廷傑上疏諫遣中使往羅浮山迎軒轅先生詔曰朕以萬機事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生年齡亦壽乃遣使迎之或冀有少保理也朕每觀前史見秦皇漢武為方士所惑常以之為誡卿等位當論列職在諫司閱示來章深納誠意仍謂崔慎由曰為吾言於諫官雖少翁欒大復生不能相惑如聞軒轅生高士欲與之一言耳宰相鄭朗累月請告三章求免是月乙未彗出於房初度長三尺十月制通議大夫守中書侍郎禮部尚書同平章事監修國史上柱國賜紫金魚袋鄭朗可檢校尚書右僕射兼太子少師以山南西道節度使中散大夫檢校禮部尚書興元尹上柱國賜紫金魚袋蔣係權知刑部尚書宰相崔慎由兼修國史蕭鄴兼集賢殿大學士以華州刺史高少逸為左散騎常侍以蘇州刺史裴夷直為華州刺史潼關防禦鎮國軍等使以太常少卿崔鈞為蘇州刺史入迴鶻冊禮使衞尉少卿王端章貶賀州司馬副使國子禮記博士李潯為郴州司馬判官河南府士曹李寂永州司馬端章等出塞黑車子阻路而迴故也以成德軍觀察留後御史中丞賜紫金魚袋王紹懿檢校工部尚書兼鎮州大都督府長史御史大夫充成德軍節度鎮冀深趙觀察等使以中書舍人李藩權知禮部貢院十一月太子少師鄭朗卒贈司空銀青光祿大夫檢校尚書左僕射兼太子太保充右羽林統軍御史大夫上柱國滎陽縣開國男食邑三百戶鄭光卒輟朝三日贈司徒仍令百官奉慰上之元舅也宰相崔慎由為中書侍郎兼禮部尚書尚書蕭鄴兼工部尚書餘並如故十二月以昭義軍節度使朝議大夫檢校工部尚書上柱國平陰縣開國男食邑三百戶畢諴為太原尹北都留守河東節度使朝議大夫檢校禮部尚書兼太原尹北都留守上柱國賜紫金魚袋劉瑑為尚書戶部侍郎判度支以翰林學士承旨通議大夫守尚書戶部侍郎知制誥上護軍賜紫金魚袋蔣伸為兵部侍郎充職以金紫光祿大夫守太子少保分司東都上柱國河東縣開國男食邑五百戶裴休檢校戶部尚書兼潞州大都督府長史昭義軍節度副大使知節度事潞磁邢洺觀察等使以正議大夫行尚書兵部侍郎上柱國河東縣開國男食邑三百戶賜紫金魚袋柳仲郢本官兼御史大夫充諸道鹽鐵轉運使以正議大夫檢校戶部尚書兼太子賓客上柱國賜紫金魚袋孔溫業本官分司東都以病請告故也禮部郎中楊知溫本官知制誥充翰林學士以幽州中軍使檢校國子祭酒幽府左司馬知府事御史中丞張簡真檢校右散騎常侍允伸之子也以中散大夫權知刑部尚書上柱國賜紫金魚袋蔣係檢校戶部尚書鳳翔尹御史大夫鳳翔隴右節度觀察處置等使是歲舒州吳塘堰有衆禽成巢闊七尺高七丈而水禽山鳥鷹隼燕雀之類無不馴狎又有鳥人面綠毛爪喙皆紺色其聲曰甘人呼為甘蟲十二年春正月以晉陽令鄭液為通州刺史羅浮山人軒轅集至京師上召入禁中謂曰先生遐壽而長生可致乎曰徹聲色去滋味哀樂如一德施周給自然與天地合德日月齊明何必別求長生也留之月餘堅求還山以前鄉貢進士于琮為秘書省校書郎尋尚皇女廣德公主改銀青光祿大夫守右拾遺駙馬都尉以安南本管經略招討處置使朝散大夫檢校左散騎常侍安南都護御史大夫賜紫金魚袋李弘甫為宗正卿以中大夫守京兆尹上柱國賜紫金魚袋張毅夫為鄂州刺史御史大夫鄂岳蘄黃申等州都團練觀察使以太中大夫福州刺史御史中丞上柱國賜紫金魚袋楊發檢校右散騎常侍廣州刺史御史大夫充嶺南東道節度觀察處置等使以朝散大夫守康王傅分司東都上柱國襲魏郡開國公食邑二千戶賜紫金魚袋王式為安南都護兼御史中丞充安南本管經略招討處置等使以朝請大夫前守太子賓客分司東都上柱國酇縣開國男食邑三百戶賜紫金魚袋蕭俶守太子少保分司以朝請大夫檢校左散騎常侍右金吾大將軍充右街使上柱國襲太原郡開國公食邑二千戶賜紫金魚袋王鎮為檢校左散騎常侍使持節都督福州諸軍事兼福州刺史御史大夫充福建等州都團練觀察處置等使以翰林學士朝議郎守尚書司勳郎中知制誥賜緋魚袋孔溫裕為中書舍人充職以右驍衞上將軍李正源守大內皇城留守以朝議大夫守尚書戶部侍郎判度支上柱國賜紫金魚袋劉瑑本官同平章事依前判度支以太中大夫守中書侍郎兼禮部尚書同平章事監修國史上柱國賜紫金魚袋崔慎由檢校禮部尚書梓州刺史御史大夫劍南東川節度副大使知節度事代韋有翼以有翼為吏部侍郎二月以前邕管經略招討處置使朝議郎邕州刺史御史中丞賜紫金魚袋段文楚為昭武校尉右金吾衞將軍以朝議郎守中書舍人權知禮部貢舉上柱國賜緋魚袋李藩為尚書戶部侍郎以朝散大夫守工部尚書同平章事充集賢殿大學士上柱國彭城縣開國男食邑三百戶賜紫金魚袋蕭鄴為監修國史以朝議大夫守戶部侍郎同平章事判度支上柱國賜紫金魚袋劉瑑可充集賢院學士以渤海國王弟權知國務大虔晃為銀青光祿大夫檢校秘書監忽汗州都督冊為渤海國王以兵部侍郎柳仲郢為刑部尚書以朝議大夫守尚書戶部侍郎判戶部事上柱國賜紫金魚袋夏侯孜為兵部侍郎充諸道鹽鐵轉運使以朝請大夫權知刑部侍郎賜紫金魚袋杜勝為戶部侍郎判戶部事以光祿大夫守左領軍衞大將軍分司東都上柱國會稽縣開國公食邑一千五百戶康季榮可檢校尚書右僕射兼左衞上將軍分司貶前利州刺史杜倉為賀州司戶蔡州刺史李叢邵州司馬以工部郎中知制誥于德孫庫部郎中知制誥苗恪並可中書舍人依前翰林學士以前右金吾衞將軍鄭漢璋前鴻臚少卿鄭漢卿並起復授本官國舅光之子也以銀青光祿大夫行給事中駙馬都尉衞洙為工部侍郎前濮王傅分司皇甫權為康王傅分司以庫部員外郎史館修撰李渙為長安令閏二月以司農少卿盧籍為代州刺史前江陵少尹杜惲為司農少卿以河東馬步都虞候段威為朔州刺史充天寧軍使兼興唐軍沙陀三部落防遏都知兵馬使五月以兵部侍郎鹽鐵轉運使夏侯孜本官同平章事六月南蠻攻安南府八月洪州賊毛合宣州賊康全大攻掠郡縣詔兩浙兵討平之十二月太子少保魏卒贈司徒十三年春正月以虢陝觀察使杜審權為戶部侍郎判戶部事三月宰相蕭鄴罷知政事守吏部尚書四月以翰林學士承旨兵部侍郎知制誥蔣伸本官同平章事五月上不豫月餘不能視朝八月七日宣遺詔立鄆王為皇太子勾當軍國事是日崩于大明宮聖壽五十詔門下侍郎平章事令狐綯攝冢宰羣臣上諡曰聖武獻文孝皇帝廟號宣宗十四年二月葬於貞陵史臣曰臣嘗聞黎老言大中故事獻文皇帝器識深遠久歷艱難備知人間疾苦自寶曆已來中人擅權事多假借京師豪右大擾窮民洎大中臨馭一之日權豪斂迹二之日姦臣畏法三之日閽寺讋氣由是刑政不濫賢能效用百揆四嶽穆若清風十餘年間頌聲載路上宮中衣澣濯之衣常膳不過數器非母后侑膳輒不舉樂歲或小饑憂形於色雖左右近習未嘗見怠惰之容與羣臣言儼然煦接如待賓僚或有所陳聞虛襟聽納舊時人主所行黃門先以龍腦鬱金藉地上悉命去之宮人有疾醫視之既瘳即袖金賜之誡曰勿令敕使知謂予私於侍者其恭儉好善如此季年風毒召羅浮山人軒轅集訪以治國治身之要其伎術詭異之道未嘗措言集亦有道之士也十三年春堅求還山上曰先生少留一年候於羅浮山別創一道館集無留意上曰先生捨我亟去國有災乎朕有天下竟得幾年集取筆寫四十字而十字挑上乃十四年也興替有數其若是乎而帝道皇猷始終無缺雖漢文景不足過也惜乎簡籍遺落舊事十無三四吮墨揮翰有所慊然贊曰李之英主實惟獻文粃粺盡去淑慝斯分河隴歸地朔漠消氛到今遺老歌詠明君
