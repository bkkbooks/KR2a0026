body:
  text: 舊唐書卷一百列傳第五十尹思貞李傑解琬畢構蘇珦子晉鄭惟忠王志愔盧從愿李朝隱裴漼從祖弟寬王丘尹思貞京兆長安人也弱冠明經舉補隆州參軍時晉安縣有豪族蒲氏縱橫不法前後官吏莫能制州司令思貞推按發其姦贓萬計竟論殺之遠近稱慶刻石以紀其事由是知名累轉明堂令以善政聞三遷殿中少監檢校洺州刺史會契丹孫萬榮作亂河朔不安思貞善於綏撫境內獨無驚擾則天降璽書褒美之長安中七遷秋官侍郎以忤張昌宗被構出為定州刺史轉晉州刺史尋復入為司府少卿時卿侯知一亦厲威嚴吏人為之語曰不畏侯卿杖惟畏尹卿筆其為人所伏若此尋加銀青光祿大夫於宅中掘得古戟十二俄而門加棨戟時人異焉神龍初為大理卿時武三思擅權御史大夫李承嘉附會之雍州人韋月將上變告三思謀逆中宗大怒命斬之思貞以發生之月固執奏以為不可行刑竟有敕決杖配流嶺南三思令所司因此非法害之思貞又固爭之承嘉希三思旨託以他事不許思貞入朝廷謂承嘉曰公擅作威福不顧憲章附託姦臣以圖不軌將先除忠良以自恣耶承嘉大怒遂劾奏思貞出為青州刺史境內有蠶一年四熟者黜陟使衞州司馬路敬潛八月至州見繭歎曰非善政所致孰能至於此乎特表薦之思貞前後為十三州刺史皆以清簡為政奏課連最睿宗即位徵為將作大匠累封天水郡公時左僕射竇懷貞興造金仙玉真兩觀調發夫匠思貞常節減之懷貞怒頻詰責思貞思貞曰公職居端揆任重弼諧不能翼贊聖明光宣大化而乃盛興土木害及黎元豈不愧也又受小人之譖輕辱朝臣今日之事不能苟免請從此辭拂衣而去闔門累日上聞而特令視事其年懷貞伏誅乃下制曰國之副相位亞中台自匪邦直孰司天憲將作大匠尹思貞賢良方正碩儒耆德剛不護缺清而畏知簡言易從莊色難犯徵先王之體要敷袵必陳折佞臣之怙權拂衣而謝故以事聞海內名動京師鷹隼是擊豺狼自遠必能條理前弊發揮舊章宜承弄印之榮式允登車之志可御史大夫俄兼申王府長史遷戶部尚書轉工部尚書以老疾累表請致仕許之開元四年卒年七十七贈黃門監諡曰簡李傑本名務光相州滏陽人後魏并州刺史寶之後也其先自隴西徙焉傑少以孝友著稱舉明經累遷天官員外郎明敏有吏才甚得當時之譽神龍初累遷衞尉少卿為河東道巡察黜陟使奏課為諸使之最開元初為河南尹傑既勤於聽理每有訴列雖衢路當食無廢處斷由是官無留事人吏愛之先是河汴之間有梁公堰年久堰破江淮漕運不通傑奏調發汴鄭丁夫以濬之省功速就公私深以為利刊石水濱以紀其績尋代宋璟為御史大夫時皇后妹婿尚衣奉御長孫昕與其妹婿楊仙玉因於里巷遇傑遂毆擊之上大怒令斬昕等散騎常侍馬懷素以為陽和之月不可行刑累表陳請乃下敕曰夫為令者自近而及遠行罰者先親而後疏長孫昕楊仙玉等憑恃姻戚恣行凶險輕侮常憲損辱大臣情特難容故令斬決今羣官等累陳表疏固有誠請以陽和之節非肅殺之時援引古今詞義懇切朕志從深諫情亦惜法宜寬異門之罰聽從枯木之斃即宜決殺以謝百僚傑明年以護橋陵作賜爵武威子初傑護作時引侍御史王旭為判官旭貪冒受贓傑將繩之而不得其實反為旭所構出為衢州刺史俄轉揚州大都督府長史又為御史所劾免官歸第尋卒贈戶部尚書解琬魏州元城人也少應幽素舉拜新政尉累轉成都丞因奏事稱旨超遷監察御史丁憂離職則天以琬識練邊事起復舊官令往西域安撫夷虜抗疏固辭則天嘉之下敕曰解琬孝性淳至哀情懇切固辭權奪之榮乞就終憂之典足可以激揚風俗敦奬名教宜遂雅懷允其所請仍令服闋後赴上聖曆初遷侍御史充使安撫烏質勒及十姓部落咸得其便宜蕃人大悅以功擢拜御史中丞兼北庭都護持節西域安撫使琬素與郭元振同官相善遂為宗楚客所毀由是左遷滄州刺史為政務存大體甚得人和景龍中遷右臺御史大夫兼持節朔方行軍大總管琬前後在軍二十餘載務農習戰多所利益邊境安之景雲二年復為朔方軍大總管琬分遣隨軍要籍官河陽丞張冠宗肥鄉令韋景駿普安令于處忠等校料三城兵募於是減十萬人奏罷之尋授右武衞大將軍兼檢校晉州刺史賜爵濟南縣男以年老乞骸骨拜表訖不待報而去優詔加金紫光祿大夫聽致仕其祿準品全給尋降璽書勞之曰卿器局堅正才識高遠公忠彰其立身貞固足以幹事類張騫之出使同魏絳之和戎職綰文武功申方面勤于王家是為國老頃者顧斯側景願言勇退深惜馬援之能未遂祁奚之請然章疏頻上雅懷難奪今知脫屣歸閑拂衣高謝固可以激勵頹俗儀刑庶僚永言終始良可嘉尚宜善攝養以介期頤未幾吐蕃寇邊復召拜左散騎常侍令與吐蕃分定地界兼處置十姓降戶琬言吐蕃必潛懷叛計請預支兵十萬於秦渭等州嚴加防遏其年冬吐蕃果入寇竟為支兵所擊走之俄又表請致仕不許遷太子賓客開元五年出為同州刺史明年卒年八十餘畢構河南偃師人也父憬則天時為司衞少卿構少舉進士神龍初累遷中書舍人時敬暉等奏請降削武氏諸王構次當讀表既聲韻朗暢兼分析其文句左右聽者皆歷然可曉由是武三思惡之出為潤州刺史累除益州大都督府長史景雲初召拜左御史大夫轉陝州刺史加銀青光祿大夫封魏縣男頃之復授益州大都督府長史兼充劍南道按察使所歷州府咸著聲績在蜀中尤革舊弊政號清嚴睿宗聞而善之璽書勞曰我國家創開天地再造黎元四夷來王萬邦會至置州立郡分職設官貞觀永徽之前皇猷惟穆咸亨垂拱之後淳風漸替征賦將急調役頗繁選吏舉人涉於浮濫省閣臺寺罕有公直苟貪祿秩以度歲時中外因循紀綱弛紊且無懲革弊乃滋深為官既不擇人非親即賄為法又不按罪作孽寧逃貪殘放手者相仍清白潔己者斯絕蓋由賞罰不舉生殺莫行更以水旱時乖邊隅未謐日損一日徵斂不休大東小東杼軸為怨就更割剝何以克堪昔聞當官以留犢還珠為上今之從職以充車聯駟為能或交結富豪抑棄貧弱或矜假典正樹立腹心邑屋之間囊篋俱委或地有椿幹梓漆或家有畜產資財即被暗通並從取奪若有固吝即因事以繩粗杖大枷動傾性命懷冤抱痛無所告陳比差御史委令巡察或有貴要所囑未能不避權豪或有親故在官又罕絕於顏面載馳原隰徒煩出使之名安問狐狸未見埋車之節揚清激濁涇渭不分嫉惡好善蕭蘭莫別官守既其若此下人豈以聊生數年已來凋殘更甚卿孤潔獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破柱求姦諸使之中在卿為最並能盡節似卿如此百郡何憂乎不理萬人何慮乎不安卿當益堅勿為後顧朕嘉卿直道今賜袍帶並衣一副尋拜戶部尚書轉吏部尚書並遙領益州大都督府長史玄宗即位累拜河南尹遷戶部尚書開元四年遇疾上手疏醫方以賜之時議戶部尚書為凶官遽改授太子詹事冀其有瘳尋卒贈黃門監諡曰景構初喪繼母時有二妹在襁褓親加鞠養咸得成立及構卒二妹號絕久之以撫育恩遂制三年之服其弟栩亦甚哀毀並為當時所稱栩官至荊州司馬蘇珦雍州藍田人明經舉累授鄠縣尉雍州長史李義琰召而謂曰鄠縣本多訴訟近日遂絕訪問果由明公為其疏理因顧指廳事曰此座即明公座也但恨非遲暮所見耳垂拱初拜右臺監察御史時則天將誅韓魯等諸王使珦按其密狀珦訊問皆無徵驗或誣告珦與韓魯等同情則天召見詰問珦抗議不回則天不悅曰卿大雅之士朕當別有驅使此獄不假卿也遂令珦於河西監軍五遷右司郎中時御史王弘義託附來俊臣構陷無罪朝廷疾之嘗受詔於虢州採木役使不節丁夫多死珦按奏其事弘義竟以坐黜珦尋遷給事中累授左肅政臺御史大夫時有詔白司馬坂營大像糜費巨億珦以妨農上疏切諫則天納焉神龍初武三思擅權韋月將告三思將有逆謀返為三思所構中宗令斬之珦奏非時不可行刑由是忤三思旨轉為右御史大夫尋出為岐州刺史復為右臺大夫會節愍太子敗詔珦窮其黨與時睿宗在藩為得罪者所引珦因辯析事狀密奏以保持之中宗意解因是多所原免擢珦為戶部尚書賜爵河內郡公尋授太子賓客檢校詹事以年老致仕開元三年卒年八十一贈兗州都督諡曰文子晉亦知名晉數歲能屬文作八卦論吏部侍郎房穎叔祕書少監王紹宗見而賞歎曰此後來王粲也弱冠舉進士又應大禮舉皆居上第先天中累遷中書舍人兼崇文館學士玄宗監國每有制命皆令晉及賈曾為之晉亦數進讜言深見嘉納俄出為泗州刺史以父老乞辭職歸侍許之父卒後歷戶部侍郎襲爵河內郡公開元十四年遷吏部侍郎時開府宋璟兼尚書事晉及齊澣遞於京都知選事既糊名考判晉獨多賞拔甚得當時之譽俄而侍中裴光庭知尚書事每過官應批退者但對衆披簿以朱筆點頭而巳晉遂榜選院云門下點頭者更引注擬光庭以為侮己甚不悅遂出為汝州刺史三遷魏州刺史加銀青光祿大夫入為太子左庶子二十二年卒年五十九初晉與洛陽人張循之仲之兄弟友善循之等並以學業著名循之則天時上書忤旨被誅仲之神龍中謀殺武三思為友人宋之愻所發下獄死晉厚撫仲之子漸有如己子教之書記為營婚宦及晉卒漸制猶子之服時人甚以此稱之鄭惟忠宋州宋城人也儀鳳中進士舉授井陘尉轉湯陰尉天授中應舉召見則天臨軒問諸舉人何者為忠諸人對不稱旨惟忠對曰臣聞忠者外揚君之美內匡君之惡則天曰善授左司禦率府冑曹參軍累遷水部員外郎則天幸長安惟忠待制引見則天謂曰朕識卿前於東都言忠臣外揚君之美內匡君之惡至今不忘尋加朝散大夫再遷鳳閣舍人中宗即位甚敬重之擢拜黃門侍郎時議請禁嶺南首領家畜兵器惟忠曰夫為政不可革以習俗且吳都賦云家有鶴膝戶有犀渠如或禁之豈無驚擾耶遂寢無何守大理卿節愍太子與將軍李多祚等舉兵誅武三思事變伏誅其詿誤守門者並配流將行有韋氏黨與密奏請盡誅之中宗令推斷惟忠奏曰今大獄始決人心未寧若更改推必遞相驚恐則反側之子無由自安敕令百司議遂依舊斷所全者甚多俄拜御史大夫持節賑給河北道仍黜陟牧宰還敷奏稱旨加銀青光祿大夫封滎陽縣男開元初為禮部尚書轉太子賓客十年卒贈太子少保王志愔博州聊城人也少以進士擢第神龍年累除左臺御史加朝散大夫執法剛正百僚畏憚時人呼為皁鵰言其顧瞻人吏如鵰鶚之視燕雀也尋遷大理正嘗奏言法令者人之隄防隄防不立則人無所禁竊見大理官僚多不奉法以縱罪為寬恕以守文為苛刻臣濫執刑典實恐為衆所謗遂表上所著應正論以見志其詞曰嘗讀易至萃利見大人亨聚以正也六二引吉𣰋咎注曰居萃之時體柔當位處坤之中己獨處正異操而聚獨正者危未能變體以遠於害故必見引然後乃吉而𣰋咎王肅曰六二與九五相應俱履貞正引由迎也為吉所迎何咎之有未嘗不輟書而歎曰居中履正事之常體見引𣰋咎道亦宜然有客聞而惑之因謂僕曰今主上文明域中理定君累司典憲不務和同處正之志雖存見引之吉誰應行之不已余竊懼焉僕斂襟降階揖而謝曰補遺闕於衮職用忠讜為己任以蒙養正見引獲吉應此道也仁何遠哉昔咎繇謨虞登朝作士設教理物開訓成務是以五流有宅五宅三居怙終賊刑刑故無小於是舜美其事曰汝明於五刑以弼五教期于予理刑期于無刑人協于中時乃功懋哉故孔子歎其政曰舜舉咎繇不仁者遠此非明辟執法大人見引之應乎季孫行父之事君也舉竊寶之愆黜授邑之賞明善惡而糾慝議僭賞以塞違在虞舜之功居二十之一主司得行其道時君不以為嫌此非己獨處正應正而𣰋咎矢魚於棠臧伯正色賂鼎在廟哀伯抗詞言者得盡其忠聞之不加其罪故春秋稱臧氏之正曰積善之家必有餘慶此非異操而聚引吉之所致乎魏絳理直晉侯乃復其位邾人辭順趙盾不伐其國此非正體未變為吉所迎者乎夫在上垂拱臣下守制若正應乎上乃引吉於下而中士聞道若存若亡交戰於譎正之門懷疑乎語默之境懼獨正之莫引忘此正之必亨吁嗟乎行己立身居正踐義其動也直其正也方維正直而是與何往而非攸利何以明之坤六二直方大不習無不利文言曰直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大則不疑其所行也嵇康撰釋私論曹羲著至公篇皆以崇公激俗抑私事主一言可以蔽之歸於體正而已矣禮記曰刑者侀也侀者成也一成而不可變故君子盡心焉若以喜怒制刑輕重設比是則橋前驚馬用希旨論人苑中獵兔以從欲廢法理有違而合道物貴和而不同不同之和正在其中矣昔任延為武威太守漢帝誡之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠上下雷同非國家之福善事上官臣不敢奉詔任延雅奏漢主是其言此則歸正不回乖旨順義不以忤懷見忌斯亦違而合道晏子春秋景公見梁丘據曰據與我和晏子曰此同也和者君甘則臣酸君淡則臣醎今據也君甘亦甘所謂同也安得為和是以濟鹽梅以調羹乃適平心之味獻可否而論道方恢政體之節俟引正而遵度故曰物貴和而不同劉曼山辯和同之義有旨哉若以不同見譏未敢聞誨客曰和同乖訓則已聞之授法成而不變者豈恤獄之寬憲耶書曰御衆以寬傳曰寬則得衆若以嚴統物異乎寬政矣對曰刑賞二柄唯人主操之崇厚任寬是謂帝王之德慎子曰以力役法者百姓也以死守法者有司也以道變法者君上也然則匪人臣所操後魏游肇之為廷尉也魏帝嘗私敕肇有所降恕肇執而不從曰陛下自能恕之豈足令臣曲筆也是知寬恕是君道曲從非臣節人或未達斯旨不料其務以平刑為峻將曲法為寬謹守憲章號為深密內律釋種虧戒一誅五百人如來不救其罪豈謂佛法為殘刻耶老子道德經云天網恢恢疏而不漏豈謂道教為凝峻耶家語曰王者之誅有五而竊盜不預焉即心辯言偽之流禮記亦陳四殺破律亂名之謂豈是儒家執禁孔子之深文哉此三教之用法者所以明真諦重玄猷存天綱立人極也然則乾象震曜天道明威齊衆惟刑百王所以垂範折人以法三后於是成功所務掌憲決平斯廷尉之職耳易曰家人嗃嗃𣰋咎婦子嘻嘻終吝嚴於其家可移於國昔崔寔達於理而作政論仲長統曰凡為人主宜寫政論一通置諸坐側其大抵云為國者以嚴致平非以寬致平者也然則稱嚴者不必踰條越制凝網重罰在於施隱括以矯枉用平典以禁非刑故有常罰輕無捨人不易犯防之難越故也但人慢吏濁偽積贓深而曰以寬理之可以無過何異乎命王良御駻捨銜策於奔踶請俞跗攻疾停藥石於膚腠適見秋駕轉逸膏肓更深醫人僕夫何功之有又謂僕曰成法而變唯帝王之命歟對曰何為其然也昔漢武帝甥昭平君殺人以公主子廷尉上請論左右為言武帝垂涕歎曰法令者先帝之所造也用親故誣先帝之法吾何面目入高廟乎又下負萬人乃可其奏近代隋文帝子秦王俊為并州總管以奢縱免官僕射楊素奏言王陛下愛子請捨其過文帝曰法不可違若如公意我是五兒之父非兆人之父何不別制天子兒律乎我安能虧法卒不許此是帝王操法協於禮經不變之義況於秋官典職司寇肅事而可變動者乎我皇睿哲登宸高視巖廊之上宰衡明允就列輯穆廟堂之下乾坤交泰日月光華庶績其凝衆工咸理聚以正也僕幸利見大人引其吉焉期養正於下位中正是託子何懼乎夫君子百行之基出處二途而已出則策名委質行直道以事人進善納忠仰太階而緝政諤諤其節思為社稷之臣謇謇匪躬願參柱石之任處則高謝公卿孝友揚名是亦為政烟霞尚志其用永貞行藏事業心迹斯在至如水中泛泛天下悠悠執馭為榮掃門自媚拜塵邀勢括囊守祿從來長息以為深恥客乃逡巡不對遂無以間僕也中宗覽而嘉之稍遷駕部郎中景雲元年累轉左御史中丞尋遷大理少卿二年制依漢置刺史監郡於天下衝要大州置都督二十人妙選有威重者為之遂拜志愔齊州都督事竟不行又授齊州刺史充河南道按察使未幾遷汴州刺史仍舊充河南道按察使太極元年又令以本官兼御史中丞內供奉特賜實封一百戶尋加銀青光祿大夫拜戶部侍郎出為魏州刺史轉揚州大都督府長史俱充本道按察使所在令行禁止姦猾屏迹境內肅然久之召拜刑部尚書開元九年上幸東都令充京師留守十年有京兆人權梁山偽稱襄王男自號光帝與其黨及左右屯營押官謀反夜半時擁左屯營兵百餘人自景風長樂等門斬關入宮城將殺志愔志愔踰牆避賊俄而屯營兵潰散翻殺梁山等五人傳首東都志愔遂以駭卒盧從愿相州臨漳人後魏度支尚書昶六代孫也自范陽徙家焉世為山東著姓弱冠明經舉授絳州夏縣尉又應制舉拜右拾遺俄遷右肅政監察御史充山南道黜陟巡撫使奉使稱旨拜殿中侍御史累遷中書舍人睿宗踐祚拜吏部侍郎中宗之後選司頗失綱紀從愿精心條理大稱平允其有冒名偽選及虛增功狀之類皆能擿發其事典選六年前後無及之者上嘉之特與一子太子通事舍人從愿上疏乞迴恩贈父乃贈其父吉陽丞敬一為鄭州長史初高宗時裴行儉馬載為吏部最為稱職及是從愿與李朝隱同時典選亦有美譽時人稱曰吏部前有馬裴後有盧李開元四年上盡召新授縣令一時於殿庭策試考入下第者一切放歸學問從愿以注擬非才左遷豫州刺史為政嚴簡按察使奏課為天下第一降璽書勞問賜絹百匹無幾入為工部侍郎轉尚書左丞又與楊滔及吏部侍郎裴漼禮部侍郎王丘中書舍人劉令植刪定開元後格遷中書侍郎十一年拜工部尚書加銀青光祿大夫仍令東都留守十三年從升泰山又加金紫光祿大夫代韋抗為刑部尚書頻年充校京外官考使前後咸稱允當御史中丞宇文融承恩用事以括獲田戶之功本司校考為上下從愿抑不與之融頗以為恨密奏從愿廣占良田至有百餘頃其後上嘗擇堪為宰相者或薦從愿上曰從愿廣占田園是不廉也遂止不用從愿又因早朝途中為人所射中其從者捕賊竟不獲時議從愿久在選司為被抑者所讎十六年東都留守時坐子起居郎諭糶米入官有剩利為憲司所糾出為絳州刺史再遷太子賓客二十年河北穀貴敕從愿為宣撫處置使開倉以救饑餒使迴以年老抗表乞骸骨乃拜吏部尚書聽致仕給全祿二十五年卒年七十餘贈益州大都督諡曰文李朝隱京兆三原人也少以明法舉拜臨汾尉累授大理丞神龍年功臣敬暉桓彥範為武三思所構諷侍御史鄭愔奏請誅之敕大理結其罪朝隱以暉等所犯不經推窮未可即正刑名時裴談為大理卿異筆斷斬仍籍沒其家朝隱由是忤旨中宗令貶嶺南惡處侍中韋巨源中書令李嶠奏曰朝隱素稱清正斷獄亦甚當事一朝遠徙嶺表恐天下疑其罪中宗意解出為聞喜令尋遷侍御史三遷長安令有宦官閭興貴詣縣請託朝隱命拽出之睿宗聞而嘉歎廷召朝隱勞曰卿為京縣令能如此朕復何憂乃下制曰夫不吐剛而諂上不茹柔而黷下者君子之事也踐霤必繩登車無屈者正人之務也長安縣令李朝隱德義不回清強自遂亟聞嘉政累著能名近者品官入縣有乖儀式遂能責之以禮繩之以愆但閹豎之流多有憑恃柔寬之代必弄威權歷觀載籍常所歎息朕規誡前古勤求典憲能副朕意實賴斯人昔虞延持皇后之客梅陶鞭太子之傅古稱遺直復見於今思欲旌其美行遷以重職為時屬閱戶政在養人宜加一階用表剛烈可太中大夫特賜中上考兼絹百匹七遷絳州刺史兼知吏部選事開元二年遷吏部侍郎銓平允甚為當時所稱降璽書褒美授一子太子通事舍人四年春以授縣令非其人出為滑州刺史轉同州刺史駕幸東都路由同州朝隱蒙旨召見賞慰賜衣一副絹百匹尋遷河南尹政甚清嚴豪右屏跡時太子舅趙常奴恃勢侵害平人朝隱曰此而不繩何以為政執而杖之上聞又降敕書慰勉之十年遷大理卿時武強令裴景仙犯乞取贓積五千匹事發逃走上大怒令集衆殺之朝隱執奏曰裴景仙緣是乞贓犯不至死又景仙曾祖故司空寂往屬締構首預元勳載初年中家陷非罪凡有兄弟皆被誅夷唯景仙獨存今見承嫡據贓未當死坐準犯猶入請條十代宥賢功實宜錄一門絕祀情或可哀願寬暴市之刑俾就投荒之役則舊勳斯允手詔不許朝隱又奏曰有斷自天處之極法生殺之柄人主合專輕重有條臣下當守枉法者枉理而取十五匹便抵死刑乞取者因乞為贓數千匹止當流坐今若乞取得罪便處斬刑後有枉法當科欲加何辟所以為國惜法期守律文非敢以法隨人曲矜仙命射兔魏苑驚馬漢橋初震皇赫竟從廷議豈威不能制而法貴有常又景仙曾祖寂草昧忠節定為元勳位至台司恩倍常數載初之際枉被破家諸子各犯非辜唯仙今見承嫡若寂勳都棄仙罪特加則叔向之賢何足稱者若敖之鬼不其餧而捨罪念功乞垂天聽應敕決杖及有犯配流近發德音普摽殊澤杖者既聽減數流者仍許給程天下顒顒孰不幸甚瞻彼四海已被深恩豈於一人獨峻常典伏乞採臣之議致仙於法乃下制曰罪不在大本乎情罰在必行不在重朕垂範作訓庶動植咸若豈嚴刑逞戮使手足無措者哉裴景仙幸藉緒餘超升令宰輕我憲法𢀿我風猷不慎畏知之金詎識無貪之寶家盈黷貨身乃逃亡殊不知天孽可違自愆難逭所以不從本法加以殊刑冀懲貪暴之流以塞侵漁之路然以其祖父昔預經綸佐命有功締構斯重緬懷賞延之義俾協政寬之典宜捨其極法以竄遐荒仍決杖一百流嶺南惡處朝隱俄轉岐州刺史母憂去官起為揚州大都督府長史抗疏固辭制許之朝隱性孝友時年已衰暮在喪尤加毀瘠明年制又起為揚州長史不獲已而就職復入為大理卿累封金城伯代崔隱甫為御史大夫朝隱素有公直之譽每御史大夫缺時議咸許之及居其職竟無所糾劾唯煩於細務時望由是稍減俄轉太常卿二十一年兼判廣州事仍攝御史大夫充嶺南採訪處置使明年卒於嶺外年七十贈吏部尚書官給靈輿兼家口給遞還鄉諡曰貞裴漼絳州聞喜人也世為著姓父琰之永徽中為同州司戶參軍時年少美容儀刺史李崇義初甚輕之先是州中有積年舊案數百道崇義促琰之使斷之琰之命書吏數人連紙進筆斯須剖斷並畢文翰俱美且盡與奪之理崇義大驚謝曰公何忍藏鋒以成鄙夫之過由是大知名號為霹靂手後為永年令有惠政人吏刊石頌之歷任倉部郎中以老疾廢於家漼色養劬勞十數年不求仕進父卒後應大禮舉拜陳留主簿累遷監察御史時吏部侍郎崔湜鄭愔坐贓為御史李尚隱所劾漼同鞫其獄安樂公主及上官昭容阿黨湜等漼竟執正奏其罪甚為當時所稱三遷中書舍人太極元年睿宗為金仙玉真公主造觀及寺等時屬春旱興役不止漼上疏諫曰臣謹案禮記春夏令曰無聚大衆無起大役不可興土功恐妨農事若號令乖度役使不時則人加疾疫之危國有水旱之災此五行之必應也今自春至夏時雨愆期下人憂心莫知所出陛下雖降哀矜之旨兩都仍有寺觀之作時旱之應實此之由且春令告期東作方始正是丁壯就功之日而土木方興臣恐所妨尤多所益尤少耕夫蠶妾飢寒之源故春秋莊公三十一年冬不雨五行傳以為歲三築臺僖公二十一年夏大旱五行傳以時作南門勞人興役陛下每以萬方為念睿旨殷勤安國濟人防微慮遠伏願下明制發德音順天時副人望兩京公私營造及諸和市木石等並請且停則蒼生幸甚農桑失時戶口流散縱寺觀營構豈救黎元飢寒之弊哉疏奏不報尋轉兵部侍郎以銓平允特授一子為太子通事舍人開元五年遷吏部侍郎典選數年多所特拔再轉黃門侍郎代韋抗為御史大夫漼早與張說特相友善時說在相位數稱薦之漼又善於敷奏上亦嘉重焉由是擢拜吏部尚書尋轉太子賓客漼家世儉約既久居清要頗飾妓妾後庭有綺羅之賞由是為時論所譏二十四年卒年七十餘贈禮部尚書諡曰懿漼從祖弟寬寬父無晦袁州刺史寬通略以文詞進騎射彈棋投壺特妙景雲中為潤州參軍刺史韋銑為按察使引為判官清幹善於剖斷銑重其才以女妻之後應拔萃舉河南丞再轉為長安尉時宇文融為侍御史括天下田戶使奏差為江南東道勾當租庸地稅兼覆田判官轉太常博士禮部擬國忌之辰享廟用樂下太常寬深達禮節特建新意以為廟尊忌卑則登歌廟卑忌尊則去籥中書令張說謂寬明識舉而行之再遷為刑部員外郎有萬騎將軍馬崇正晝殺人時開府霍國公王毛仲恩幸用事將鬻其獄寬執之不回兵部尚書蕭嵩為河西節度使奏寬及郭虛己為判官累年專見委任嵩加中書令寬歷中書舍人御史中丞兵部侍郎開元二十一年冬裴耀卿以黃門侍郎知政事扈從出關知江淮轉運於河陰置倉奏寬為戶部侍郎為其副寬性友愛弟兄多宦達子姪亦有名稱於東京立第同居八院相對甥姪皆有休憩所撀鼓而食當世榮之選吏部侍郎及玄宗還京又改蒲州刺史州境久旱入境雨乃大浹遷河南尹不附權貴務於恤隱政乃大理改左金吾衞大將軍一年除太原尹賜紫金魚袋玄宗賦詩而餞之曰德比岱雲布心如晉水清天寶初除陳留太守兼採訪使尋而范陽節度李適之入為御史大夫除寬范陽節度兼河北採訪使替之其年又加御史大夫時北平軍使烏承恩恃以蕃酋與中貴通恣求貨賄寬以法按之檀州刺史何僧獻生口數十人寬悉命歸之故夷夏感悅三載以安祿山為范陽節度寬為戶部尚書兼御史大夫玄宗素重寬日加恩顧刑部尚書裴敦復討海賊迴頗張賊勢又廣功以開請託之路寬嘗幾微奏之居數日有河北將士入奏盛言寬在范陽能政塞上思之玄宗嗟賞久之李林甫懼其入相又惡寬與李適之善乃呼裴敦復且以寬之語告之敦復使氣性疏與寬素不相下以為林甫推誠於己因願結之且訴其冤先是寬以親故名囑敦復求請軍功至是敦復氣憤發其事林甫曰公宜速奏無後於人尋而敦復扈從幸溫泉宮寬在京城未發遇有敦復下軍將程藏曜郎將曹鑒鑒郴州富人藏曜嶺南首領之子皆有他事與人詣臺告訴寬受其狀捕鑒等鞫之敦復判官太常博士王悅聞之謂寬求其過連夜詣湯所以告敦復大懼促裝待罪因令子婿以五百金賂於貴妃姊楊三娘楊氏遽為言之明日貶寬為睢陽太守寬以清簡為政故所莅人皆愛之當時望為宰輔及韋堅構禍寬又以親累貶為安陸別駕員外置林甫使羅希奭南殺李適之紆路至安陸過擬怖死之寬叩頭祈請希奭不宿而過寬又懼死上表請為僧詔不許然崇信釋典常與僧徒往來焚香禮懺老而彌篤累遷東海太守襄州採訪使銀青光祿大夫轉馮翊太守入拜禮部尚書十四載卒年七十五詔贈太子少傅賻帛一百五十段粟一百五十石兄弟八人皆明經及第入臺省典郡者五人寬歿之後弟珣為河內郡太守安祿山反以執父喪將投闕庭恐累其母乃詣河東節度訴誠而退後在母憂又陷史思明授其偽官委任使弟朗密奉表疏至上京代宗時為左司郎中兼侍御史河東道租庸判官王丘光祿卿同皎從兄子也父同晊左庶子丘年十一童子舉擢第時類皆以誦經為課丘獨以屬文見擢由是知名弱冠又應制舉拜奉禮郎丘神氣清古而志行修潔尤善詞賦族人左庶子方慶及御史大夫魏元忠皆稱薦之長安中自偃師主簿擢第拜監察御史開元初累遷考功員外郎先是考功舉人請託大行取士頗濫每年至數百人丘一切覈其實材登科者僅滿百人議者以為自則天已後凡數十年無如丘者其後席豫嚴挺之為其次焉三遷紫微舍人以知制誥之勤加朝散大夫再轉吏部侍郎典選累年甚稱平允擢用山陰尉孫逖桃林尉張鏡微湖城尉張晉明進士王泠然皆稱一時之秀俄換尚書左丞十一年拜黃門侍郎其年山東旱儉朝議選朝臣為刺史以撫貧民制曰昔咎繇與禹言曰在知人在安人此皆念存邦本光于帝載乾乾夕惕無忘一日而長吏或不稱蒼生或未寧深思循良以矯過弊仍重諸侯之選故自朝廷始之於是以丘為懷州刺史又以中書侍郎崔沔等數人皆為山東諸州刺史至任皆無可稱唯丘在職清嚴人吏甚畏慕之俄又分知吏部選事入為尚事左丞丁父憂去職服闋拜右散騎常侍仍知制誥二十一年侍中裴光庭病卒中書令蕭嵩與丘有舊將薦丘知政事丘知而固辭且盛推尚書右丞韓休嵩因而奏之及休作相遂薦丘代崔琳為御史大夫丘既訥於言詞敷奏多不稱旨俄轉太子賓客襲父爵宿預男尋以疾拜禮部尚書仍聽致仕丘雖歷要職固守清儉未嘗受人饋遺第宅輿馬稱為敝陋致仕之後藥餌殆將不給上聞而嘉歎下制曰王丘夙負良材累升茂秩比緣疾疹假以優閒聞其家道屢空醫藥靡給久此從宦遂無餘資持操若斯古人何遠且優賢之義方冊所先周急之宜沮勸攸在其俸祿一事已上並宜全給式表殊常之澤用旌貞白之吏天寶二年卒贈荊州大都督史臣曰有唐之興綿歷年所骨鯁清廉之士懷忠抱義之臣臺省之間駕肩接武但時有夷險道有汙隆用與不用而已睿玄之世若李傑畢構蘇珦鄭惟忠王志愔盧從愿裴漼王丘並位歷亞台名德兼著如尹思貞李朝隱折李承嘉竇懷貞辱閭興貴趙常奴詩人所謂不畏強禦者也解琬總兵朔野料敵如神功遂身退深知止足茲亦有足多也贊曰尚書亞台京尹方伯我朝重官云誰稱職傑構珦忠能竭其力愔愿漼丘聿修厥德貞蔑大僚隱繩貴戚琬馳令名燕蜀之北
