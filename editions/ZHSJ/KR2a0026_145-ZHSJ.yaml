body:
  text: 舊唐書卷一百四十一列傳第九十一田承嗣姪悅子緒緒子季安田弘正子布牟布子在宥張孝忠子茂昭茂昭子克勤弟茂宗茂和陳楚附田承嗣平州人世事盧龍軍為裨校祖璟父守義以豪俠聞於遼碣承嗣開元末為軍使安祿山前鋒兵馬使累俘斬奚契丹功補左清道府率遷武衞將軍祿山構逆承嗣與張忠志等為前鋒陷河洛祿山敗史朝義再陷洛陽承嗣為前導偽授魏州刺史代宗遣朔方節度使僕固懷恩引迴紇軍討平河朔帝以二兇繼亂郡邑傷殘務在禁暴戢兵屢行赦宥凡為安史詿誤者一切不問時懷恩陰圖不軌慮賊平寵衰欲留賊將為援乃奏承嗣及李懷仙張忠志薛嵩等四人分帥河北諸郡乃以承嗣檢校戶部尚書鄭州刺史俄遷魏州刺史貝博滄瀛等州防禦使居無何授魏博節度使承嗣不習教義沉猜好勇雖外受朝旨而陰圖自固重加稅率修繕兵甲計戶口之衆寡而老弱事耕稼丁壯從征役故數年之間其衆十萬仍選其魁偉強力者萬人以自衞謂之衙兵郡邑官吏皆自署置戶版不籍於天府稅賦不入於朝廷雖曰藩臣實無臣節代宗以黎元久罹寇虐姑務優容累加檢校尚書僕射太尉同中書門下平章事封鴈門郡王賜實封千戶及升魏州為大都督府以承嗣為長史仍以其子華尚永樂公主冀以結固其心庶其悛革而生於朔野志性兇逆每王人慰安言詞不遜大曆八年相衞節度使薛嵩卒其弟瑖欲邀旄節及用李承昭代嵩衙將裴志清謀亂逐瑖瑖率衆歸於承嗣十年薛瑖歸朝承嗣使親黨扇惑相州將吏謀亂遂將兵襲擊謬稱救應代宗遣中使孫知古使魏州宣慰令各守封疆承嗣不奉詔遣大將盧子期攻洺州楊光朝攻衞州殺刺史薛雄仍逼知古令巡磁相二州諷其大將割耳剺面請承嗣為帥知古不能詰四月詔曰田承嗣出自行間策名邊戍早參戎秩効用無聞嘗輔兇渠驅馳有素洎再平河朔歸命轅門朝廷俯念遺黎久罹兵革自祿山召禍瀛博流離思明繼釁趙魏堙厄以至農桑井邑靡獲安居骨肉室家不能相保念其凋瘵思用撫寧以其先布發誠寄之為理所以委授旄鉞之任假以方面之榮期爾知恩庶能自効崇資茂賞首冠朝倫列異姓之苴茅登上公之禮命子弟童稚皆聯臺閣之華妻妾僕媵並受國邑之號人臣之寵舉集其門將相之權兼領其職夫宰相者所以盡忠而乃據國家之封壤仗國家之兵戈安國家之黎人調國家之征賦掩有資實憑竊寵靈內包兇邪外示歸順且相衞之略所管素殊而逼脅軍人使之翻潰因其驚擾便進軍師事跡暴彰姦邪可見不然豈志清之亂曾未崇朝子期光朝會于明日足知先有成約指期而來是為蔑棄典刑擅興戈甲既云相州騷擾鄰境救災旋又更取磁州重行威虐此實自矛盾不究始終三州既空遠邇驚陷更移兵馬又赴洺州實為暴惡不仁窮極殘忍薛雄乃衞州刺史固非本藩忿其不附橫加凌虐一門盡屠非復噍類酷烈無狀人神所冤又四州之地皆列屯營長史屬官任情補署精甲利刃良馬勁兵全實之資裝農藏之積實盡收魏府罔有孑遺其為蓋在無赦欲行討問正厥刑書猶示含容冀其遷善抑於典憲務在慰安乃遣知古遠奉詔書諭以深旨乃命承昭副茲麾下撫彼舊封而承昭又遣親將劉渾先傳詔命承嗣逡巡磁相仍劫知古偕行先令姪悅權扇軍吏至使引刀自割抑令騰口相稽當衆諠譁請歸承嗣論其姦狀足以為憑此而可容何者為罪承嗣宜貶永州刺史仍許一幼男女從行便路赴任委河東節度使薛兼訓成德軍節度使李寶臣幽州節度留後朱滔昭義節度李承昭淄青節度李正己淮西節度李忠臣永平軍節度使李勉汴宋節度田神玉等掎角進軍如承嗣不時就職所在加討按軍法處分詔下承嗣懼而麾下大將復多攜貳倉黃失圖乃遣牙將郝光朝奉表請罪乞束身歸朝代宗重勞師旅特恩詔允幷姪悅等悉復舊官仍詔不須入覲十一年汴將李靈曜據城叛詔近鎮加兵靈曜求援於魏承嗣令田悅率衆五千赴之為馬燧李忠臣逆擊敗之悅僅而獲免兵士死者十七八復詔誅之十二年承嗣復上章請罪又赦之復其官爵承嗣有貝博魏衞相磁洺等七州復為七州節度使於是承嗣弟廷琳及從子悅承嗣子綰緒等皆復本官仍令給事中杜亞宣諭賜鐵券十三年九月卒時年七十五有子十一人維朝華繹綸綰緒繪純紳縉等維為魏州刺史朝神武將軍華太常少卿駙馬都尉尚永樂公主再尚新都公主餘子皆幼而悅勇冠軍中承嗣愛其才及將卒命悅知軍事而諸子佐之悅初為魏博中軍兵馬使檢校右散騎常侍魏府左司馬大曆十三年承嗣卒朝廷用悅為節度留後驍勇有膂力性殘忍好亂而能外飾行義傾財散施人多附之故得兵柄尋拜檢校工部尚書御史大夫充魏博七州節度使大曆末悅尚恭順建中初黜陟使洪經綸至河北方聞悅軍七萬經綸素昧時機先以符停其兵四萬令歸農畝悅偽亦順命即依符罷之既而大集所罷將士激怒之曰爾等久在軍戎各有父母妻子既為黜陟使所罷如何得衣食自資衆遂大哭悅乃盡出其家財帛衣服以給之各令還其部伍自此魏博感悅而怨朝廷居無何或謬稱車駕將東封而李勉增廣汴州城李正己聞而猜懼以兵萬人屯曹州遣使說悅同為拒命悅乃與正己梁崇義等謀各阻兵以判官王侑扈萼許士則為腹心邢曹俊孟希祐李長春符璘康愔為爪牙建中二年鎮州李寶臣卒子惟岳求襲節鉞俄而淄青李正己卒子納亦求節鉞朝廷皆不允遂與惟岳李納同謀叛逆時朝廷遣張孝忠等討恆州悅將孟希祐率兵五千援之又遣將康愔率兵八千圍邢州楊朝光五千人營於邯鄲西北盧家砦絕昭義糧餉之路悅自將兵甲數萬繼進邢州刺史李洪臨洺將張伾為賊所攻禦備將竭詔河東節度使馬燧河陽李芃與昭義軍討悅七月三日師自壺關東下收賊盧家砦大破賊於雙岡邢州解圍悅衆遁走保洹水馬燧等三帥距悅軍三十里為壘李納遣兵八千人助悅魏將邢曹俊者承嗣之舊將老而多智頗知兵法悅昵於扈萼以曹俊為貝州刺史及悅拒官軍於臨洺大為王師所破悅乃召曹俊而問計焉曹俊曰兵法十倍則攻尚書以逆犯順勢且不侔宜於口置兵萬人以遏西師則河北二十四州悉為尚書有矣今於臨洺武安設攻城之計糧竭卒盡危凶立至未見其可也祐等以其異己咸譖毀悅復令守貝州悅與淄青兵三萬餘人陣於洹水馬燧等三帥與神策將李晟等來攻悅之衆復敗死傷二萬計悅收合殘卒奔魏州至南郭外大將李長春拒關不內以俟官軍三帥雖進頓兵於魏州南平邑浮圖咸遲留不進長春乃開門內之悅持佩刀立於軍門謂軍士百姓曰悅藉伯父餘業久與卿等同事今既敗喪相繼不敢圖全然悅所以堅拒天誅者特以淄青恆冀二大人在日為悅保薦於先朝方獲承襲今二帥云亡子弟求襲悅既不能報効以至興師今軍旅敗亡士民塗炭此皆悅之罪也以母親之故不能自剄公等當斬悅首以取功勳無為俱死也乃自馬投地衆皆憐之或前撫持悅曰久蒙公恩不忍聞此今士民之衆猶可一戰生死以之悅收涕言曰諸公不以悅喪敗猶願同心悅縱身死寧忘厚意於地下乎悅乃自割一髻以為要誓於是將士自斷其髻結為兄弟誓同生死其將符璘李再春李瑤悅從兄昂相次以郡邑歸國璘等家在魏州者無少長悉為悅所害悅觀城內兵仗罄乏士衆衰減甚為惶駭乃復召邢曹俊與之謀既至完整徒旅繕修營壁人心復堅經旬餘日馬燧等進至城下向使燧等乘勝長驅襲其未備則魏城屠之久矣識者痛惜之會王武俊殺李惟岳朱滔攻深州下之朝廷以武俊為恆州刺史又以寶臣故將康日知為深趙二州觀察使是以武俊怨賞功在日知下朱滔怨不得深州二將有憾於朝廷悅知其可間遣判官王侑許士則使於北軍說朱滔曰昨者司徒奉詔征伐徑趨賊境旬朔之內拔束鹿下深州惟岳勢蹙故王大夫獲殄兇渠皆因司徒勝勢又聞司徒離幽州日有詔得惟岳郡縣使隸本鎮今割深州與日知是國家無信於天下也且今上英武獨斷有秦皇漢武之才誅夷豪傑欲掃除河朔不令子孫嗣襲又朝臣立功立事如劉晏輩皆被屠滅昨破梁崇義殺三百餘口投之漢江此司徒之所明知也如馬燧抱真等破魏博後朝廷必以儒德大臣以鎮之則燕趙之危可翹足而待也若魏博全則燕趙無患田尚書必以死報恩義合從連衡救災卹患春秋之義也春秋時諸侯有危者桓公不能救則恥之今司徒聲振宇宙雄略命世救鄰之急非徒立義且有利也尚書以貝州奉司徒命某送孔目惟司徒熟計之滔既有貳於國欣然從之乃命判官王郢與許士則同往恆州說王武俊仍許還武俊深州武俊大喜即令判官王巨源報滔仍知深州事武俊又說張孝忠同援悅孝忠不從恐為後患乃遣小校鄭築壘於北境以拒孝忠仍令其子士真為恆冀深三州留後以兵圍趙州三年五月悅以救軍將至率其衆出戰於御河之上大敗而還四月朱滔武俊蒐軍於寧晉縣共步騎四萬五月十四日起軍南下次宗城滔判官鄭雲逵及弟方逵背滔歸馬燧六月二十八日滔武俊之師至魏州會神策將李懷光軍亦至懷光銳氣不可遏堅欲與賊戰遂徑薄朱滔陣殺千餘人王武俊與騎將趙琳趙萬敵等二千騎橫擊懷光陣滔軍繼踵而進禁軍大敗人相蹈藉投屍於河三十里河水為之不流馬燧等收軍保壘是夜王武俊決河水入王莽故河欲隔官軍水已深三尺糧餉路絕王師計無從出乃遣人告朱滔曰鄙夫輒不自量與諸人合戰王大夫善戰天下無敵司徒五郎與王君圖之放老夫歸鎮必得聞奏以河北之事委五郎時武俊戰勝滔心忌之即曰大夫二兄敗官軍馬司徒卑屈若此不宜迫人於險也武俊曰燧等連兵十萬皆是國之名臣一戰而北貽國之恥不知此等何面見天子耶然吾不惜放還但不行五十里必反相拒燧等至魏縣軍於河西武俊等三將壁於河東兩軍相持自七月至十月勝負未決悅感朱滔救助欲推為盟主滔判官李子牟武俊判官鄭儒等議曰古有戰國連衡誓約以抗秦請依周末七雄故事並建國號為諸侯用國家正朔今年號不可改也於是朱滔稱冀王悅稱魏王武俊稱趙王又請李納稱齊王十一月一日築壇於魏縣中告天受之滔為盟主稱孤武俊悅納稱寡人滔以幽州為范陽府恆州為真定府魏州為大名府鄆州為東平府皆以長子為元帥偽冊之日其軍上有雲物稍異馬燧等望而笑曰此雲無知乃為賊瑞又其營地前三年土長高三尺餘魏州戶曹韋稔為土長頌曰益土之兆也四年十月涇師犯闕諸帥各還本鎮悅滔武俊互相疑惑各去王號遣使歸國悅亦致書於抱真遣使聞奏興元元年正月加悅檢校尚書右僕射封濟陽王使並如故仍令給事中兼御史大夫孔巢父往魏州宣慰時悅阻兵四年身雖驍猛而性愎無謀以故頻致破敗士衆死者十七八魏人苦於兵革願息肩焉聞巢父至莫不舞忭悅方宴巢父為其從弟緒所殺緒承嗣第六子大曆末授京兆府參軍承嗣卒時緒年幼稚承嗣慮諸子不任軍政以從子悅便弓馬性狡黠故任遇之俾代為帥守及緒年長悅以承嗣委遇之厚待緒等無間令主衙軍緒兇險多過悅不忍嘗笞而拘之緒頗怨望常俟釁隙會興元元年朝廷宥悅仍令孔巢父往宣慰悅既順命門階徹警悅宴巢父夜歸緒率左右數十人先殺悅腹心蔡濟扈萼許士則等挺劍而入其兩弟止之緒斬止者遂徑升堂悅方沉醉緒手刃悅幷悅妻高氏又入別院殺悅母馬氏自河北諸盜殘害骨肉無酷於緒者緒懼衆不附奔出北門邢曹俊孟希祐等領徒數百追及之遙呼之曰節度使須郎君為之他人固不可也乃以緒歸衙推為留後明日歸罪於扈萼以其首徇然後稟於孔巢父遣使以聞時緒兄綸居長為亂兵所殺遂以緒為留後朝廷授緒銀青光祿大夫魏州大都督府長史兼御史大夫魏博節度使時朱滔率兵兼引迴紇之衆南侵緒遣兵助王武俊李抱真大破朱滔于經城以功授檢校工部尚書貞元元年以嘉誠公主出降緒加駙馬都尉尋遷檢校左僕射封常山郡王食邑三千戶改封雁門郡王食實封五百戶尋加同平章事初田悅性儉嗇衣服飲食皆有節度而緒等兄弟心常不足緒既得志頗縱豪侈酒色無度貞元十二年四月暴卒時年三十三贈司空賻賚加等子三人季和季直季安季和為澶州刺史季直為衙將季安最幼為嫡嗣季安字夔母微賤嘉誠公主蓄為己子故寵異諸兄年數歲授左衞冑曹參軍改著作佐郎兼侍御史充魏博節度副大使累加至試光祿少卿兼御史大夫緒卒時季安年纔十五軍人推為留後朝廷因授起復左金吾衞將軍兼魏州大都督府長史魏博節度營田觀察處置等使服闋拜銀青光祿大夫檢校尚書右僕射進位檢校司空襲封雁門郡王未幾加金紫光祿大夫以本官同中書門下平章事季安幼守父業懼嘉誠之嚴雖無他才能亦粗修禮法及公主薨遂頗自恣擊鞠從禽色之娛其軍中政務大抵任徇情意賓僚將校言皆不從免公主喪加檢校司徒元和中王承宗擅襲戎帥憲宗命吐突承璀為招撫使會諸軍進討季安亦遣大將率兵赴會仍自供糧餉師還加太子太保季安性忍酷無所畏懼有進士丘絳者嘗為田緒從事及季安為帥絳與同職侯臧不協相持爭權季安怒斥絳為下縣尉使人召還先掘坎於路左既至坎所活排而瘞之其兇暴如此元和七年卒時年三十二贈太尉子懷諫懷禮懷詢懷讓懷諫母元誼女及季安卒元氏召諸將欲立懷諫衆皆唯唯懷諫幼未能御事軍政無巨細皆取決於私白身蔣士則數以愛憎移易將校衙軍怒取前臨清鎮將田興為留後遣懷諫歸第殺蔣士則等十餘人田興葬季安畢送懷諫於京師乃起復授右監門衞將軍賜第一區芻米甚厚田氏自承嗣據魏州至懷諫四世相傳襲四十九年而田興代焉田弘正本名興祖延惲魏博節度使承嗣之季父也位終安東都護府司馬延惲生廷玠幼敦儒雅不樂軍職起家為平舒丞遷樂壽清池束城河間四縣令所至以良吏稱大曆中累官至太府卿滄州別駕遷滄州刺史兼御史中丞充橫海軍使承嗣與淄青李正己恆州李寶臣不協承嗣既令廷玠守滄州而寶臣朱滔聯兵攻擊欲兼其土宇廷玠嬰城固守連年受敵兵盡食竭人易子而食卒無叛者卒能保全城守朝廷嘉之遷洺州刺史又改相州屬薛瑖之亂承嗣蠶食薛嵩所部廷玠守正字民不以宗門回避而改節建中初族姪悅代承嗣領軍政志圖兇逆慮廷玠不從召為節度副使悅姦謀頗露廷玠謂悅曰爾藉伯父遺業可稟守朝廷法度坐享富貴何苦與恆鄆同為叛臣自兵亂已來謀叛國家者可以歷數鮮有保完宗族者爾若狂志不悛可先殺我無令我見田氏之赤族也乃謝病不出悅過其第而謝之廷玠杜門不納將吏請納建中三年鬱憤而卒弘正廷玠之第二子少習儒書頗通兵法善騎射勇而有禮伯父承嗣愛重之當季安之世為衙內兵馬使季安惟務侈靡不卹軍務屢行殺罰弘正每從容規諷軍中甚賴之季安以人情歸附乃出為臨清鎮將欲捃摭其過害之弘正假以風痺請告灸灼滿身季安謂其無能為及季安病篤其子懷諫幼騃乃召弘正署其舊職季安卒懷諫委家僮蔣士則改易軍政人情不悅咸曰都知兵馬使田興可為吾帥也衙兵數千詣興私第陳請興拒關不出衆呼噪不已興出衆環而拜請入府署興頓仆於地久之度終不免乃令於軍中曰三軍不以興不肖令主軍務欲與諸軍前約當聽命否咸曰惟命是從興曰吾欲守天子法以六州版籍請吏勿犯副大使可乎皆曰諾是日入府視事殺蔣士則十數人而已晚自府歸第其兄融責興曰爾卒不能自晦取禍之道也翌日具事上聞憲宗嘉之加興銀青光祿大夫檢校工部尚書魏州大都督府長史兼御史大夫上柱國沂國公充魏博等州節度觀察處置支度營田等使仍賜名弘正仍令中書舍人裴度使魏州宣慰賜魏博三軍賞錢一百五十萬貫弘正既受節鉞上表曰臣聞君臣父子是謂大倫爰立紀綱以正上下其或子不為子臣不為臣覆載莫可得容幽明所宜共殛臣家本邊塞累代唐人從乃祖乃父以來沐文子文孫之化臣幸因宗族早列偏裨驅馳戎馬之鄉不覩朝廷之禮惟忠與孝天與臣心常思奮不顧生以身殉國無由上達私自感傷豈意命偶昌時事緣難故白刃之下謬見推崇天慈遽臨免書罪累朝章荐及仍委旂旄錫封壤於全藩列班榮於八座君父之恩已極絲毫之效未伸但以靦冒知羞低徊自愧是知功榮所著必俟危亂之時徼幸之來却在清平之日循涯揣分以寵為憂伏自天寶已還幽陵肇亂山東奧壤悉化戎墟外撫車馬內懷梟獍官封代襲刑賞自專國家含垢匿瑕垂六十載臣每思此事當食忘餐若稍假天年得奉宸算兼弱攻昧批亢擣虛竭鷹犬之資展獲禽之用導揚和氣洗滌偽風然後退歸田園以避賢路臣懷此志陛下察之優詔褒美弘正樂聞前代忠孝立功之事於府舍起書樓聚書萬餘卷視事之隙與賓佐講論古今言行可否今河朔有沂公史例十卷弘正客為弘正所著也魏州自承嗣已來館宇服玩有踰常制者悉命徹毀之以正廳大侈不居乃視事于採訪使廳賓僚參佐請之於朝頗好儒書尤通史氏左傳國史知其大略自弘正歸國幽恆鄆蔡有齒寒之懼屢遣客間說多方誘阻而弘正終始不移其操裴度明理體詞說雄辯弘正聽其言終夕不倦遂深相結納由是奉上之意逾謹元和十年朝廷用兵討吳元濟弘正遣子布率兵三千進討屢戰有功李師道以弘正効忠又襲其後不敢顯助元濟故絕其掎角之援王師得致討焉俄而王承宗叛詔弘正以全師壓境承宗懼遣使求救於弘正遂表其事承宗遂納二子獻德棣二州以自解十三年王師加兵於鄆詔弘正與宣武義成武寧橫海等五鎮之師會軍齊進十一月弘正自帥全師自楊劉渡河築壘距鄆四十里師道遣大將劉悟率重兵以抗弘正結壘相望前後合戰魏軍大捷而李愬李光顏三面進攻賊皆挫敗其勢將危十四年三月劉悟以河上之衆倒戈入鄆斬師道首詣弘正請降淄青十二州平論功加檢校司徒同中書門下平章事是年八月弘正入覲憲宗待之隆異對於麟德殿參佐將校二百餘人皆有頒錫進加檢校司徒兼侍中實封三百戶仍以其兄檢校刑部尚書相州刺史融為太子賓客東都留司弘正三上章願留闕下憲宗勞之曰昨韓弘至朝稱疾懇辭戎務朕不得不從今卿復請留意誠可尚然魏土樂卿之政鄰境服卿之威為我長城不可辭也可亟歸藩弘正每懼有一旦之憂嗣襲之風不革兄弟子姪悉仕於朝憲宗皆擢居班列朱紫盈庭當時榮之十五年十月鎮州王承宗卒穆宗以弘正檢校司徒兼中書令鎮州大都督府長史充成德軍節度鎮冀深趙觀察等使弘正以新與鎮人戰伐有父兄之怨乃以魏兵二千為衞從十一月二十六日至鎮州時賜鎮州三軍賞錢一百萬貫不時至軍衆諠騰以為言弘正親自撫喻人情稍安仍表請留魏兵為紀綱之僕以持衆心其糧賜請給於有司時度支使崔倰不知大體固阻其請凡四上表不報明年七月歸卒於魏州是月二十八日夜軍亂弘正幷家屬參佐將吏等三百餘口並遇害穆宗聞之震悼冊贈太尉賵賻加等弘正孝友慈惠骨肉之恩甚厚兄弟子姪在兩都者數十人競為崇飾日費約二十萬魏鎮州之財皆輦屬於道河北將卒心不平之故不能盡變其俗竟以此致亂弘正子布羣牟布弘正第三子始弘正為田季安裨將鎮臨清布年尚幼知季安身世必危密白其父帥其所鎮之衆歸朝弘正甚奇之及弘正節制魏博布掌親兵國家討淮蔡布率偏師隸嚴綬軍於唐州授檢校秘書監兼殿中侍御史前後十八戰破凌雲柵下郾城布皆有功擢授御史中丞時裴度為宣撫使嘗觀兵於沱口賊將董重質領驍騎遽至布以二百騎突出溝中擊之俄而諸軍大集賊乃退去淮西平拜左金吾衞將軍兼御史大夫十三年丁母憂起復舊官十五年冬弘正移鎮成德軍仍以布為河陽三城懷節度使父子俱擁節旄同日拜命時韓弘亦與子公武俱為節度使然人以忠勤多田氏長慶元年春移鎮涇原其秋鎮州軍亂害弘正都知兵馬使王廷湊為留後時魏博節度使李愬病不能軍無以捍廷湊之亂且以魏軍田氏舊旅乃急詔布至起復為魏博節度使仍遷檢校工部尚書令布乘傳之鎮布喪服居堊室去旌節導從之飾及入魏州居喪御事動皆得禮其祿俸月入百萬一無所取又籍魏中舊產無巨細計錢十餘萬貫皆出之以頒軍士牙將史憲誠出己麾下謂必能輸誠報効用為先鋒兵馬使精銳悉委之時屢有急詔促令進軍十月布以魏軍三萬七千討之結壘於南宮縣之南十二月進軍下賊二柵時朱克融囚張弘靖據幽州與廷湊掎角拒命河朔三鎮素相連衡憲誠陰有異志而魏軍驕侈怯於格戰又屬雪寒糧餉不給以此愈無鬬志憲誠從而間之俄有詔分布軍與李光顏合勢東救深州其衆自潰多為憲誠所有布得其衆八千是月十日還魏州十一日會諸將復議興師而將卒益倨咸曰尚書能行河朔舊事則死生以之若使復戰皆不能也布以憲誠離間度衆終不為用嘆曰功無成矣即日密表陳軍情且稱遺表略曰臣觀衆意終負國恩臣既無功不敢忘死伏願陛下速救光顏元翼不然則義士忠臣皆為河朔屠害奉表號哭拜授其從事李石乃入啟父靈抽刀自刺曰上以謝君父下以示三軍言訖而絕時議以布才雖不足能以死謝家國心志決烈得燕趙之古風焉穆宗聞之駭嘆廢朝三日詔曰故魏博節度使起復寧遠將軍檢校工部尚書兼魏州大都督府長史御史大夫賜紫金魚袋田布朕以寡昧臨御萬邦威刑不能禁干紀之徒道化不能馴多僻之俗致使上公罹禍田氏銜冤爰整旅以徂征每終食而浩嘆自茲弔伐驟歷寒暄雖良將銳師率皆協力而俟時觀釁未即齊驅嗟我誠臣結其哀憤引遷延之咎以自刻責奮決烈之志以謝君親白刃置於肝心鴻毛論其生死忠臣孝子一舉兩全晉稱卞氏之門漢表尸鄉之節比方於布今古為鄰況其臨命須臾處之不撓載形章表益深衷悃問使發緘悼心疾首從先臣於厚載爾則無愧覩遺像於麟閣予何所堪端拱崇名職垂彝典據斯以報聊攄永懷可贈尚書右僕射布子在宥大中年為安南都護頗立邊功羣大和八年為少府少監充入吐蕃使歷棣州刺史安南都護牟會昌初為豐州刺史天德軍使歷武寧軍節度使大中朝為兗海節度使移鎮天平軍諸子皆以邊上立功累更藩鎮以忠義為談者所稱張孝忠本奚之種類曾祖靖祖遜代乙失活部落酋帥父謐開元中以衆歸國授鴻臚卿同正以孝忠貴贈戶部尚書孝忠以勇聞於燕趙時號張阿勞王沒諾干二人齊名阿勞孝忠本字沒諾干王武俊本字孝忠形體魁偉長六尺餘性寬裕事親恭孝天寶末以善射授內供奉安祿山奏為偏將破九姓突厥先登陷陣以功授果毅折衝祿山史思明繼陷河洛孝忠皆為其前鋒史朝義敗入李寶臣帳下上元中奏授左領軍郎將累加左金吾衞將軍同正試殿中監仍賜名孝忠歷飛狐高陽二軍使李寶臣以孝忠謹重驍勇甚委信之以妻妹昧谷氏妻焉仍悉以易州諸鎮兵馬令其統制前後居城鎮十餘年甚著威惠田承嗣之寇冀州也寶臣俾孝忠以精騎數千禦之承嗣見其整肅歎曰張阿勞在焉冀州未易圖也乃焚營宵遁及寶臣與朱滔戰於瓦橋常慮滔來攻故以孝忠為易州刺史選精騎七千配焉使扞幽州奏授太子賓客兼御史中丞封范陽郡王既而寶臣疑忌大將殺李獻誠等四五人使召孝忠孝忠懼不往寶臣使孝忠弟孝節召焉孝忠命孝節復命曰諸將無狀連頸受戮孝忠懼死不敢往亦不敢叛猶公之不覲於朝慮禍而已無他志也孝節泣曰兄不行吾歸死矣孝忠曰偕往則幷命吾留無患也乃歸果無患無幾寶臣死其子惟岳阻兵不受命朝廷詔幽州節度使討之滔以孝忠宿將善戰有精兵八千在易州慮軍興則撓其後乃使判官蔡雄說孝忠曰惟岳小子驕貴不達人事輒拒朝命滔奉命伐罪使君何用助逆不自求多福耶今昭義河東攻破田悅淮西李僕射收下襄陽梁崇義投井而卒臨漢江而誅者五千人即河南軍計日北首趙魏滅亡可見也使君誠能去逆効順必受重任有先歸國之功矣孝忠然之乃遣衙官隨雄報滔又遣易州錄事參軍董稹入朝德宗嘉之授孝忠檢校工部尚書恆州刺史兼御史大夫充成德軍節度使便令與滔合兵攻惟岳仍賜實封二百戶其弟孝義及孝忠三女已適人在恆州者悉為惟岳所害孝忠甚德滔之保薦以其子茂和聘滔之女契約甚密遂合兵破惟岳之師於束鹿惟岳遁歸恆州滔請乘勝襲之孝忠仍引軍西北還營義豐滔大駭孝忠將佐曰尚書布赤心於朱司徒相信至矣今逆寇已潰不終其功竊所未喻孝忠曰本求破賊賊已破矣然恆州宿將尚多迫之則困獸猶鬬緩之必翻然改圖又朱滔言大識淺可以慮始難與守成吾壁義豐坐待惟岳之殄滅耳既而朱滔屯束鹿不敢進軍月餘王武俊果斬惟岳首以獻如孝忠所料後定州刺史楊政義以州降孝忠遂有易定之地時既誅惟岳分四州各置觀察使武俊得恆州康日知得深趙二州孝忠得易州以成德軍額在恆州孝忠既降政義朝廷乃於定州置義武軍以孝忠檢校兵部尚書為義武軍節度易定滄等州觀察等使及朱滔王武俊謀叛將救田悅於魏州慮孝忠踵後滔軍將發復遣蔡雄往說之孝忠曰李惟岳背國作逆孝忠歸國今為忠臣孝忠性直業已効忠不復助逆矣往與武俊同行且孝忠與武俊俱出蕃部少長相狎深知其心僻能翻覆語司徒當記鄙言忽有蹉跌始相憶也滔又啗以金帛終拒而不從易定居二兇之間四面受敵孝忠修峻溝壘感勵將士竟不受二兇之熒惑議者多之又加檢校左僕射實封至三百戶後孝忠為朱滔侵逼詔神策兵馬使李晟中官竇文場率師援之孝忠以女妻晟子憑與晟戮力同心整訓士衆竟全易定賊不敢深入及上幸奉天令大將楊榮國提銳卒六百從晟入關赴難收京城榮國有功興元元年正月詔以本官同平章事滄州本隸成德軍既移隸義武其刺史李固烈者惟岳妻兄也請還恆州是歲孝忠遣牙將程華往滄州交檢府藏固烈輜車數十乘上路滄州軍士呼曰士皆菜色刺史不垂賑卹乃載而歸官物不可得也殺固烈而剽之程華聞亂由竇而遁將士追之謂曰固烈貪暴已誅之矣押牙且知州務孝忠即令攝刺史事及朱滔王武俊稱偽國華與孝忠阻絕不能相援華嬰城拒賊一州獲全朝廷嘉之乃拜華滄州刺史御史中丞充橫海軍使仍改名日華令每歲以滄州稅錢十二萬貫供義武軍貞元二年河北蝗旱米斗一千五百文復大兵之後民無蓄積餓殍相枕孝忠所食豆而已其下皆甘粗糲人皆服其勤儉孝忠為一時之賢將也三年加檢校司空仍以其子茂宗尚義章公主孝忠遣其妻鄧國夫人昧谷氏入朝執親迎之禮上嘉之賞賚隆厚五年七月為將佐所惑以兵入蔚州尋詔歸鎮仍以擅興削檢校司空七年三月卒時年六十二廢朝三日追封上谷郡王贈太傅再贈魏州大都督冊贈太師諡曰貞武子茂昭茂宗茂和茂昭本名昇雲幼有志氣好儒書以父蔭累官至檢校工部尚書貞元七年孝忠卒德宗以邕王謜為義武軍節度大使易定觀察使以昇雲為定州刺史起復左金吾衞大將軍充節度觀察留後仍賜名茂昭九年正月授節度使累遷檢校僕射司空二十年十月入朝累陳奏河北及西北邊事詞情忠切德宗聳聽嘆曰恨見卿之晚錫宴於麟德殿賜良馬甲第器用珍幣甚厚仍以其第三男克禮尚晉康郡主德宗方欲委之以邊任明年晏駕茂昭入臨於太極殿每朝晡預列聲哀氣咽人皆奬其忠懇順宗聽政加中書門下平章事且令還鎮賜女樂二人三表辭讓及中使押犢車至第茂昭立謂中使曰女樂出自禁中非臣下所宜目覩昔汾陽咸寧西平北平嘗受此賜不讓為宜茂昭無四賢之功述職入覲人臣常禮奈何當此寵賜後有立功之臣陛下何以加賞順宗聞之深加禮異允其所讓又錫安仁里第亦固讓不受元和二年又請入覲五上章懇切憲宗許之冬十月至京師留數月詔令歸鎮茂昭願奉朝請於闕下不許加太子太保復令還鎮四年王承宗叛詔河東河中振武三鎮之師合義武軍為恆州北道招討茂昭創廩廄開道路以待西軍屬正月望夜軍吏請曰舊例上元前後三夜不止行人不閉里門今外道軍戎方集請如軍令茂昭曰三鎮兵馬官軍也安得言外道放燈一如常歲使長男克讓與諸軍分道並進克讓渡木刀溝與賊接戰屢勝茂昭親擐甲冑為諸軍前鋒累獻戎捷幾覆承宗會朝廷洗雪承宗乃詔班師加檢校太尉兼太子太傅自安史之亂兩河藩帥多阻命自固父死子代唯茂昭表請舉族還朝鄰藩累遣遊客間說茂昭志意堅決拜表求代者數四上乃命左庶子任迪簡為其行軍司馬乘驛赴之以兩郡之簿書管鑰符印付迪簡遣其妻季氏男克讓克恭等先就路將行誡之曰吾使爾曹侍親出易者庶後之子孫不為風俗所染則吾無恨矣時五年冬也行及晉州拜檢校太尉兼中書令充河中晉絳慈隰等州節度觀察等使十二月十二日至京師故事雙日不坐是日特開延英殿對茂昭五刻乃罷又上表請遷祖考之骨墓于京兆在朝兩月未之鎮六年二月疽發於首卒時年五十廢朝五日冊贈太師賻絹三千匹布一千端米粟三千石喪事所須官給詔京兆尹監護諡曰獻武憲宗念其忠藎諸昆仲子姪皆居職秩仍詔每年給絹二千匹春秋分給克讓克恭官至諸衞大將軍小男克勤長慶中左武衞大將軍時有赦文許一子五品官克勤以子幼請準近例迴授外甥狀至中書下吏部員外郎判廢置裴夷直斷曰一子官恩在念功貴於延賞若無己子許及宗男今張克勤自有息男妄以外甥奏請移於他族知是何人倘涉賣官實為亂法雖援近日敕例難破著定格文國章既在必行宅相恐難虛授具狀上中書門下克勤所請望宜不允遂為定例茂宗以父蔭累官至光祿少卿同正貞元三年許尚公主拜銀青光祿大夫本官駙馬都尉以公主幼待年十三屬茂宗母亡遺表請終嘉禮德宗念茂昭之勳即日授雲麾將軍起復授左衞將軍同正駙馬都尉諫官蔣乂等論曰自古以來未聞有駙馬起復而尚公主者上曰卿所言古禮也如今人家往往有借吉為婚嫁者卿何苦固執又奏曰臣聞近日人家有不甚知禮教者或女居父母服家既貧乏且無強近至親即有借吉以就親者至於男子借吉婚娶從古未聞今忽令駙馬起復成禮實恐驚駭物聽況公主年幼更俟一年出降時既未失且合禮經太常博士韋彤裴堪曰伏見駙馬都尉張茂宗猶在母喪聖恩念其亡母遺表所請許公主出降仍令茂宗即吉就婚者伏以夫婦之義人倫大端所以關雎冠於詩首者王化所先也天屬之親孝行為本所以齊斬五服之重者人道之厚也聖人知此二端為訓人之本不可變也故制婚禮上以承宗廟下以繼後嗣至若墨衰奪情事緣金革若使茂宗釋衰服而衣冕裳去堊室而為親迎雖云輟哀借吉是亦以凶瀆嘉伏願抑茂宗亡母之請顧典章不易之義待其終制然後賜婚德宗不納竟以義章公主降茂宗自是以戚里之親頗承恩顧元和中為閑廄使國家自貞觀中至於麟德國馬四十萬匹在河隴間開元中尚有二十七萬雜以牛羊雜畜不啻百萬置八使四十八監占隴右金城平涼天水四郡幅員千里自長安至隴右置七馬坊為會計都領岐隴間善水草及腴田皆屬七馬坊至德以後西戎陷隴右國馬盡散監牧使與七馬坊名額盡廢其地利因歸於閑廄使寶應中鳳翔節度使請以監牧賦給貧民為業土著相承十數年矣又有別敕賜諸寺觀凡千餘頃及茂宗掌閑廄與中尉吐突承璀善遂恃恩舉舊事並以監牧地租歸閑廄司茂宗又奏麟遊縣有岐陽馬坊按舊圖地方三百四十頃制下閑廄司檢計百姓紛紜論訴節度使李惟簡具事上聞詔監察御史孫革往按問之革還奏曰天興縣東五百有隋故岐陽馬坊地在其側蓋因監為名與今岐陽所指百姓侵占處不相接皆有明驗茂宗怒恃有中助誣革所奏不實又令侍御史范傳式覆按乃附茂宗盡翻前奏遂奪居人田業皆屬閑廄乃罷革官長慶初岐人論訴不已詔御史按驗明白乃復以其地還百姓貶傳式官茂宗俄授左金吾衞大將軍長慶二年檢校工部尚書兼兗州刺史御史大夫充兗海沂節度等使加檢校兵部尚書大和五年入為左金吾衞大將軍充左衞使轉左龍武統軍卒茂和元和中為左武衞將軍裴度為淮西行營處置用兵討吳元濟建牙赴行營奏用茂和為都押衙茂和嘗以膽氣才略自贊於相府故度奏用之茂和慮度無功淮蔡不可平乃辭之以疾度怒甚奏請斬茂和以勵行者憲宗曰予以其家門忠順為卿遠貶後復用為諸衞將軍卒陳楚者定州人茂昭之甥少有武幹為義勇牙將事茂昭每出征伐必令典精卒隨茂昭入朝授諸衞大將軍元和十二年義武軍節度使渾鎬喪師定州兵亂乃除楚易定節度令馳傳赴任亂猶未彌楚夜馳入州城楚家世久在定州軍中部校皆楚之舊卒人情大悅軍卒帖然轉河陽三城懷節度使前後亟立戰功入為龍武統軍長慶三年卒史臣曰朝廷治亂在法制當否形勢得失而已秦人叛上法制失也漢道勃興形勢得也臣觀開元之政舉坐制百蠻天寶之法衰遂淪四海玄宗一失其勢橫流莫救地分於羣盜身播於九夷河朔二十餘州竟為盜穴諸田兇險不近物情而弘正孝忠頗達人臣之節沂國力善無報殆天意之好亂惡治歟茂昭忠梗有禮明禍福大端近代之賢侯也贊曰田宗不令禍淫無應謂天輔仁胡覆弘正茂昭知止終以善勝孰生厲階上失威柄
