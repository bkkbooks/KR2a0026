body:
  text: 舊唐書卷一百二十五列傳第七十五張鎰馮河清附劉從一蕭復柳渾張鎰蘇州人朔方節度使齊丘之子也以門蔭授左衞兵曹參軍郭子儀為關內副元帥以嘗伏事齊丘辟鎰為判官授大理評事遷殿中侍御史乾元初華原令盧樅以公事呵責邑人內侍齊令詵令詵銜之構誣外發鎰按驗樅當降官及下有司樅當杖死鎰具公服白其母曰上疏理樅樅必免死鎰必坐貶若以私則鎰負於當官貶則以太夫人為憂敢問所安母曰爾無累於道吾所安也遂執奏正罪樅獲配流鎰貶撫州司戶量移晉陵令未之官洪吉觀察張鎬辟為判官奏授殿中侍御史遷屯田員外郎轉祠部右司二員外母憂居喪有聞免喪除司勳員外交遊不雜與楊綰崔祐甫相善大曆五年除濠州刺史為政清淨州事大理乃招經術之士講訓生徒比去郡升明經者四十餘人撰三禮圖九卷五經微旨十四卷孟子音義三卷李靈曜反于汴州鎰訓練鄉兵嚴守禦之備詔書褒異加侍御史沿淮鎮守使尋遷壽州刺史使如故德宗即位除江南西道都團練觀察使洪州刺史兼御史中丞徵拜吏部侍郎尋除河中晉絳都防禦觀察使到官數日改汴滑節度觀察使汴州刺史兼御史大夫以疾辭逗留於中路徵入養疾私第未幾拜中書侍郎平章事集賢殿學士修國史建中三年正月太僕卿趙縱為奴當千發其陰事縱下御史臺貶循州司馬留當千於內侍省鎰上疏論之曰伏見趙縱為奴所告下獄人皆震懼未測聖情貞觀二年太宗謂侍臣曰比有奴告其主謀逆此極弊法特須禁斷假令有謀反者必不獨成自有他人論之豈藉其奴告也自今已後奴告主者皆不受盡令斬決由是賤不得干貴下不得陵上教化之本既正悖亂之漸不生為國之經百代難改欲全其事體實在防微頃者長安令李濟得罪因奴萬年令霍晏得罪因婢愚賤之輩悖慢成風主反畏之動遭誣告充溢府縣莫能斷決建中元年五月二十八日詔曰準鬬競律諸奴婢告主非謀叛已上者同自首法並準律處分自此奴婢復順獄訴稍息今趙縱非叛逆奴實姦兇奴在禁中縱獨下獄考之於法或恐未正將帥之功莫大於子儀人臣之位莫大於尚父歿身未幾墳土僅乾兩壻先已當辜趙縱今又下獄設令縱實抵法所告非奴纔經數月連罪三壻錄勳念舊猶或可容況在章程本宜宥免陛下方誅羣賊大用武臣雖見寵於當時恐息望於他日太宗之令典尚在陛下之明詔始行一朝偕違不與衆守於教化恐失於刑法恐煩所益悉無所傷至廣臣非私趙縱非惡此奴叨居股肱職在匡弼斯是大體敢不極言伏乞聖慈納臣愚懇上深納之縱於是左貶而已當千杖殺之鎰乃令召子儀家僮數百人以死奴示之盧嵵忌鎰名重道直無以陷之以方用兵西邊嵵乃偽請行上固以不可因薦鎰以中書侍郎為鳳翔隴右節度使代朱泚與吐蕃相尚結贊等盟於清水將盟鎰與結贊約各以二千人赴壇所執兵者半之列於壇外二百步散從者半之分立壇下鎰與賓佐齊映齊抗及盟官崔漢衡樊澤常魯于等七人皆朝服結贊與其本國將相論悉頰藏論臧熱論利斯官者論力徐等亦七人俱升壇為盟初約漢以牛蕃以馬為牲鎰恥與之盟將殺其禮乃請結贊曰漢非牛不田蕃非馬一行今請以羊豕犬三物代之結贊許諾時塞外無豕結贊請以羝羊鎰出犬白羊乃坎於壇北刑之雜血一器而歃盟文曰唐有天下恢奄禹跡舟車所至莫不率俾以累聖重光卜年惟永恢王者之丕業被四海以聲教與吐蕃贊普代為婚姻因結鄰好安危同體甥舅之國將二百年其間或因小忿棄惠為讎封疆騷然靡有寧歲皇帝踐阼愍茲黎元乃釋俘囚悉歸蕃落二國展禮同茲協和行人往復累布成命是必詐謀不起兵革不用矣彼猶以兩國之要求之永久古有結盟今請用之國家務息邊人外其故地棄利蹈義堅盟從約今國家所守界涇州西至彈箏峽西口隴州西至清水縣鳳州西至同谷縣暨劍南西山大渡河東為漢界蕃國守鎮在蘭渭原會西至臨洮又東至成州抵劍南西界磨些諸蠻大渡水西南為蕃界其兵馬鎮守之處州縣見有居人彼此兩邊見屬漢諸蠻以今所分見住處依前為定其黃河以北從故新泉軍直北至大磧南至賀蘭山駱駝嶺為界中間悉為閒田盟文所有不載者蕃有兵馬處蕃守漢有兵馬處漢守不得侵越其先未有兵馬處不得雜置幷築城堡耕種今二國將相受辭而會齋戒將事告天地山川之神惟神照臨無得愆墜其盟文藏於郊廟副在有司二國之誠其永保之結贊亦出盟文不加於坎但埋牲而已盟畢結贊請鎰就壇之西南隅佛幄中焚香為誓誓畢復升壇飲酒獻酬之禮各用其物以將厚意而歸德宗將幸奉天鎰竊知之將迎鑾駕具財貨服用獻行在李楚琳者嘗事朱泚得其心軍司馬齊映等密謀曰楚琳不去必為亂乃遣楚琳屯於隴州楚琳知其謀乃託故不時發鎰始以迎駕心憂惑以楚琳承命去矣殊不促其行鎰修飾邊幅不為軍士所悅是夜楚琳遂與其黨王汾李卓牛僧伽等作亂鎰夜縋而走判官齊映自水竇出齊抗為傭保負荷而逃皆獲免鎰出鳳翔三十里及二子皆為候騎所得楚琳俱殺之判官王沼張元度柳遇李漵被殺尋贈太子太傅葬事官給馮河清者京兆人也初以武藝從軍隸朔方節度郭子儀以戰功授左衞大將軍同正隸涇原節度馬璘頻以偏師禦吐蕃甚有殺獲之功歷試太子詹事兼御史中丞充兵馬使建中四年節度使姚令言奉詔率兵赴關東以河清知兵馬留後判官殿中侍御史姚況知州事及令言至京師所統兵叛上幸奉天河清與況聞之乃集三軍大哭因共激勵將吏誓敦誠節衆頗義之即時發甲仗器械車百餘輛連夜送行在所時駕初遷幸六軍雖集蒼廣之際都無戎器及涇州甲仗至軍士大振特詔褒其誠効拜四鎮北庭行軍涇原節度使兼御史大夫姚況兼御史中丞行軍司馬俄加河清檢校工部尚書賊泚及姚令言累遣間諜招誘河清輒拘而戮焉及駕幸梁州其將田希鑒潛通泚使結兇黨害河清尋贈尚書左僕射葬事官給興元元年贈太子少傅劉從一中書侍郎林甫之玄孫也祖令植禮部侍郎父孺之京兆府少尹從一少舉進士大曆中宏詞授祕書省校書郎以調中第補渭南尉雅為常衮所推重及衮為相遷監察御史居無何丁母憂服除宰相盧嵵薦之超遷侍御史居數月以親避除刑部員外郎建中末普王之為元帥也遷吏部郎中兼御史中丞為元帥判官德宗居奉天拜刑部侍郎平章事從幸梁州明年六月改中書侍郎平章事歲中加集賢殿大學士修史上遇之甚厚以容身遠罪而已不能有所匡輔無幾以疾請告至是病甚辭位章疏六上乃許除戶部尚書尋卒年四十四輟朝三日贈太子太傅初林甫生祥道麟德初為右相祥道即從一曾伯祖也令植從父兄齊賢弘道初為侍中自祥道至從一劉氏凡三相蕭復字履初太子太師嵩之孫新昌公主之子父衡太僕卿駙馬都尉少秉清操其羣從兄弟競飾輿馬以侈靡相尚復衣澣濯之衣獨居一室習學不倦非詞人儒士不與之遊伯華每歎異之以主蔭初為宮門郎累至太子僕廣德中連歲不稔穀價翔貴家貧將鬻昭應別業時宰相王縉聞其林泉之美心欲之乃使弟紘誘焉曰足下之才固宜居右職如以別業奉家兄當以要地處矣復對曰僕以家貧而鬻舊業將以拯濟孀幼耳倘以易美職於身令門內凍餒非鄙夫之心也縉憾之乃罷復官沉廢數年復處之自若後累至尚書郎大曆十四年自常州刺史為潭州刺史湖南觀察使及為同州刺史州人阻饑有京畿觀察使儲廩在境內復輒以賑貸為有司所劾削階朋友唁之復怡然曰苟利於人敢憚薄罰尋為兵部侍郎建中末普王為襄漢元帥以復為戶部尚書統軍長史以復父名衡特詔避之未行扈駕奉天拜吏部尚書平章事復嘗奏曰宦者自艱難已來初為監軍自爾恩倖過重此輩只合委宮掖之寄不可參兵機政事之權上不悅又請別對奏云陛下臨御之初聖德光被自用楊炎盧嵵秉政惛瀆皇猷以致今日今雖危急伏願陛下深革睿思微臣敢當此任若令臣依阿偷免臣不敢曠職盧嵵奏對於上前阿諛順旨復正色曰盧嵵之詞不正德宗愕然退謂左右曰蕭復頗輕朕遂令往江南宣撫先時淮南節度陳少遊首稱臣於李希烈鳳翔將李楚琳殺節度使張鎰以應朱泚鎰判官韋臯先知隴州留後首殺豳叛卒數百人不應楚琳復江南使迴與宰相同對訖復獨留奏曰陛下自返宮闕勳臣已蒙官爵唯旌善懲惡未有區分陳少遊將相之寄最崇首敗臣節韋臯名宦最卑特建忠義請令韋臯代少遊則天下明然知逆順之理上許之復出宰相李勉盧翰劉從一方同歸中書中使馬欽緒至揖從一附耳語而退諸相各歸閤從一詣復曰適欽緒宣旨令與公商量朝來所奏便進勿令李勉盧翰知復曰適來奏對亦聞斯旨然未諭聖心已面陳述上意尚爾復未敢言其事復又曰唐虞有僉曰之論朝廷有事尚合與公卿同議今勉翰不可在相位即去之既在相位合同商量何故獨避此之一節且與公行之無爽但恐寖以成俗此政之大弊也竟不言於從一從一奏之上寖不悅復累表辭疾請罷知政事從之守太子左庶子三年坐郜國公主親累檢校左庶子於饒州安置四年終于饒州時年五十七復門望高華志礪名節與流俗不甚通狎及登台輔臨事不苟頗為同列所嫉以故居位不久性孝友居家甚睦為族子所累晏然屏退口未嘗言郜國公主者肅宗之女也出降駙馬蕭升升於復為從兄弟升早卒貞元中蜀州別駕蕭鼎商州豐陽令韋恪前彭州司馬李萬太子詹事李昇等出入主第穢聲流聞德宗怒幽主於別第李萬決殺昇貶嶺南蕭鼎韋恪決四十長流嶺表又言公主行厭禱其子位為禱文位弟佩儒偲及異父兄駙馬都尉裴液並長流端州公主女為皇太子妃即順宗也太子懼亦請與妃離婚六年郜國薨位兄弟及液詔還京師液父徽初尚郜國徽卒降蕭升柳渾字夷曠襄州人其先自河東徙焉六代祖惔梁僕射渾少孤父慶休官至渤海丞而志學棲貧天寶初舉進士補單父尉至德中為江西採訪使皇甫侁判官累除衢州司馬未至召拜監察御史臺中執法之地動限儀矩渾性放曠不甚檢束僚長拘局忿其疏縱渾不樂乞外任執政惜其才奏為左補闕明年除殿中侍御史知江西租庸院事大曆初魏少遊鎮江西奏署判官累授檢校司封郎中州理有開元寺僧與徒夜飲醉而延火歸罪於守門瘖奴軍候亦受財同上其狀少遊信焉人知奴冤莫肯言渾與崔祐甫遽入白少遊驚問醉僧首伏既而謝曰微二君子幾成老夫暗劣矣自此以公正聞及路嗣恭領鎮復以為都團練副使十二年拜袁州刺史居二年崔祐甫入相薦為諫議大夫浙江東西黜陟使累遷尚書左丞及駕在奉天微服徒行遁終南山谷踰旬方達行在扈從至梁州改左散騎常侍初渾之歸行在賊泚籍其名甚願以致之猶疑匿在閭里乃加宰相及克復渾尚名載乃上言頃為狂賊點穢臣實恥稱舊名矧字或帶戈時當偃武請改名渾貞元二年拜兵部侍郎封宜城縣伯三年正月加同平章事仍判門下省時上命玉工為帶墜壞一銙乃私市以補及獻上指曰此何不相類工人伏罪上命決死詔至中書渾執曰陛下若便殺則已若下有司即須議讞且方春行刑容臣條奏定罪以誤傷乘輿器服杖六十餘工釋放詔從之復奏故尚書左丞田季羔公忠正直先朝名臣其祖父皆以孝行旌表門閭京城隋朝舊第季羔一家而已今被堂姪伯強進狀請貨宅召市人馬以討吐蕃一開此門恐滋不逞討賊自有國計豈資僥倖之徒且毀棄義門虧損風教望少責罰亦可懲勸上可其奏先時韓滉自浙西入覲朝廷委政待之至於調兵食籠鹽鐵勾官吏贓罰鋤豪強兼并上悉仗焉每奏事或日旰他相充位而已公卿救過不能暇無敢枝梧者渾雖滉所引心惡其專政正色讓之曰先相公以狷察為相不滿歲而罷今相公搒吏於省中至死且非刑人之地奈何蹈前非而又甚焉專立威福豈尊主卑臣之禮滉感悟愧悔為霽威焉及白志貞除浙西觀察使渾奏曰志貞一末吏憸人縱稱廉謹不當頓居重職適遇渾以疾稱告即日詔下疾間因乞骸骨優詔不許其判門下主吏白當過官渾愀然曰列官分職復更撓之非禮法也千里辭家以干微祿邑主辭辦豈慮無能矧旌善進賢事不在此故其年注擬無退量者及渾瑊與吐蕃會盟之日上御便殿謂宰相曰和戎息師國之大計今日將士與卿同歡馬燧前賀曰今之一盟百年內更無蕃寇渾曰五帝無誥誓之盟皆在季末今盛明之代豈又行於夷狄人面獸心難以信結今日盟約臣竊憂之李晟繼言曰臣生長邊城知蕃戎心今日之事誠如渾言上變色曰柳渾書生未達邊事大臣智略果亦有斯言乎皆頓首俯伏遽令歸中書其夜三更邠寧節度韓遊瓌飛驛叩苑門奏盟會不成將校覆沒兵臨近鎮上驚歎即遞其表以示渾詰旦臨軒慰勉渾曰卿文儒之士而萬里知軍戎之情自此驟加禮異時張延賞與渾同列延賞怙權矜己而嫉渾守正俾其所厚謂渾曰相公舊德但節言於廟堂則重位可久渾曰為吾謝張相公柳渾頭可斷而舌不可禁也自是為其所擠尋除常侍罷知政事貞元五年二月以疾終年七十五有文集十卷渾母兄識篤意文章有重名於開元天寶間與蕭穎士元德秀劉迅相亞其練理創端往往詣極當時作者咸伏其簡拔而趣尚辨博渾亦善為文然趨時向功非沉思之所及渾警辯好諧謔放達與人交豁然無隱性節儉不治產業官至丞相假宅而居罷相數日則命親族尋勝讌醉方歸陶陶然忘其黜免時李勉盧翰皆退罷居第相謂曰吾輩方柳宜城悉為拘俗之人也史臣曰張鎰蕭復柳渾節行才能訏謨亮直皆足相明主平泰階而盧嵵忌之於前延賞排之於後管仲有言任君子使小人間之害霸也德宗黜賢相位姦臣致朱泚懷光之亂是失其人也豈尤其時哉河清歿於王事乃顯忠貞從一舉自姦人固宜循默贊曰得人則興失人則亡鎰復渾去宗社其殃
