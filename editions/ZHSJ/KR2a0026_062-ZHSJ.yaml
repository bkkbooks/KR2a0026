body:
  text: 舊唐書卷五十八列傳第八唐儉子觀觀子從心從心子晙長孫順德劉弘基子仁實殷嶠劉政會柴紹平陽公主馬三寶附武士彠長兄士稜次兄士逸唐儉字茂約幷州晉陽人北齊尚書左僕射邕之孫也父鑒隋戎州刺史儉落拓不拘規檢然事親頗以孝聞初鑒與高祖有舊同領禁衞高祖在太原留守儉與太宗周密儉從容說太宗以隋室昏亂天下可圖太宗白高祖乃召入密訪時事儉曰明公日角龍庭李氏又在圖牒天下屬望非在今朝若開府庫南嘯豪傑北招戎狄東收燕趙長驅濟河據有秦雍海內之權指麾可取願弘達節以順羣望則湯武之業不遠高祖曰湯武之事非所庶幾今天下已亂言私則圖存語公則拯溺卿宜自愛吾將思之及開大將軍府授儉記室參軍太宗為渭北道行軍元帥以儉為司馬平京城加光祿大夫相國府記室封晉昌郡公武德元年除內史舍人尋遷中書侍郎特加授散騎常侍王行本守蒲州城不降敕工部尚書獨孤懷恩率兵屯於其東以經略之尋又夏縣人呂崇茂以城叛降於劉武周高祖遣永安王孝基工部尚書獨孤懷恩陝州總管于筠等率兵討之時儉使至軍所屬武周遣兵援崇茂儉與孝基筠等並為所獲初懷恩屯兵蒲州與其屬元君實謀反時君實亦陷於賊中與儉同被拘執乃謂儉曰古人有言當斷不斷反受其亂獨孤尚書近者欲舉兵圖事遲疑之間遂至今日豈不由不斷耶俄而懷恩脫身得還仍令依前屯守君實又謂儉曰獨孤尚書今遂拔難得還復在蒲州屯守可謂王者不死儉聞之懼懷恩為逆乃密令親信劉世讓以懷恩之謀奏聞適遇王行本以蒲州歸降高祖將入其城浮舟至中流世讓謁見高祖讀奏大驚曰豈非天命也迴舟而歸分捕反者按驗之懷恩自縊餘黨伏誅俄而太宗擊破武周部將宋金剛追至太原武周懼而北走儉乃封其府庫收兵甲以待太宗高祖嘉儉身沒虜庭心存朝闕復舊官仍為幷州道安撫大使以便宜從事幷賜獨孤懷恩田宅貲財等使還拜禮部尚書授天策府長史兼檢校黃門侍郎封莒國公與功臣等元勳恕一死仍除遂州都督食綿州實封六百戶圖形凌煙閣貞觀初使于突厥說誘之因以隋蕭后及楊正道以歸太宗謂儉曰卿觀頡利可圖否對曰銜國威恩亦可望獲遂令儉馳傳至虜庭示之威信頡利部落歡然定歸款之計因而兵衆弛懈李靖率輕騎掩襲破之頡利北走儉脫身而還歲餘授民部尚書後從幸洛陽苑射猛獸羣豕突出林中太宗引弓四發殪四豕有雄彘突及馬鐙儉投馬搏之太宗拔劍斷豕顧笑曰天策長史不見上將擊賊耶何懼之甚對曰漢祖以馬上得之不以馬上治之陛下以神武定四方豈復逞雄心於一獸太宗納之因為罷獵尋加光祿大夫又特令其子善識尚豫章公主儉在官每盛修肴饌與親賓縱酒為樂未嘗以職務留意又嘗託鹽州刺史張臣合收其私羊為御史所劾以舊恩免罪貶授光祿大夫永徽初致仕于家加特進顯慶元年卒年七十八高宗為之舉哀罷朝三日贈開府儀同三司幷州都督賻布帛一千段粟一千石賜東園祕器陪葬昭陵諡曰襄官為立碑儉少子觀最知名官至河西令有文集三卷儉孫從心神龍中以子晙娶太平公主女官至殿中監晙先天中為太常少卿坐與太平連謀伏誅長孫順德文德順聖皇后之族叔也祖澄周秦州刺史父愷隋開府順德仕隋右勳衞避遼東之役逃匿於太原深為高祖太宗所親委時羣盜並起郡縣各募兵為備太宗外以討賊為名因令順德與劉弘基等召募旬月之間衆至萬餘人結營於郭下遂誅王威高君雅等義兵起拜統軍從平霍邑破臨汾下絳郡俱有戰功尋與劉文靜擊屈突通於潼關每戰摧鋒及通將奔洛陽順德追及於桃林執通歸京師仍略定陝縣高祖即位拜左驍衞大將軍封薛國公武德九年與秦叔寶等討建成餘黨於玄武門太宗踐祚真食千二百戶特賜以宮女每宿內省後順德監奴受人餽絹事發太宗謂近臣曰順德地居外戚功即元勳位高爵厚足稱富貴若能勤覽古今以自鑒誡弘益我國家者朕當與之同有府庫耳何乃不遵名節而貪冒發聞乎然惜其功不忍加罪遂於殿庭賜絹數十匹以媿其心大理少卿胡演進曰順德枉法受財罪不可恕奈何又賜之絹太宗曰人生性靈得絹甚於刑戮如不知愧一禽獸耳殺之何益尋坐與李孝常交通除名歲餘太宗閱功臣圖見順德之像閔然憐之遣宇文士及視其所為見順德頹然而醉論者以為達命召拜澤州刺史復其爵邑順德素多放縱不遵法度及此折節為政號為明肅先是長吏多受百姓餽餉順德糾擿一無所容稱為良牧前刺史張長貴趙士達並占境內膏腴之田數十頃順德並劾而追奪分給貧戶尋又坐事免發疾太宗聞而鄙之謂房玄齡曰順德無慷慨之節多兒女之情今有此疾何足問也未幾而卒太宗為之罷朝遣使弔祭贈荊州都督諡曰襄貞觀十三年追改封為邳國公永徽五年重贈開府儀同三司劉弘基雍州池陽人也父昇隋河州刺史弘基少落拓交通輕俠不事家產以父蔭為右勳侍大業末嘗從煬帝征遼東家貧不能自致行至汾陰度已後期當斬計無所出遂與同旅屠牛潛諷吏捕之繫於縣獄歲餘竟以贖論事解亡命盜馬以供衣食因至太原會高祖鎮太原遂自結託又察太宗有非常之度尤委心焉由是大蒙親禮出則連騎入同臥起義兵將舉弘基召募得二千人王威高君雅欲為變高祖伏弘基及長孫順德於廳事之後弘基因麾左右執威等又從太宗攻下西河義軍次賈胡堡與隋將宋老生戰破之進攻霍邑老生率衆陣於城外弘基從太宗擊之老生敗走棄馬投塹弘基下斬其首拜右光祿大夫師至河東弘基以兵千人先濟河進下馮翊為渭北道大使得便宜從事以殷開山為副西略地扶風有衆六萬南渡渭水屯於長安故城威聲大振耀軍金光門衞文昇遣兵來戰弘基逆擊走之擒甲士千餘人馬數百匹時諸軍未至弘基先至一戰而捷高祖大悅賜馬二十匹及破京城功為第一從太宗擊薛舉於扶風破之追奔至隴山而返累拜右領都督封河間郡公又從太宗經略東都戰于瓔珞門外破之師旋弘基為殿隋將段達張志陣於三王陵弘基擊敗之武德元年拜右驍衞大將軍以元謀之勳恕其一死領行軍左一總管又從太宗討薛舉時太宗以疾頓於高咵城弘基劉文靜等與舉接戰於淺水原王師不利八總管咸敗唯弘基一軍盡力苦鬬矢盡為舉所獲高祖嘉其臨難不屈賜其家粟帛甚厚仁杲平得歸復其官爵會宋金剛陷太原遣弘基屯晉州裴寂為宋金剛所敗人情崩駭莫有固志金剛以兵造城下弘基不能守復陷於賊俄得逃歸高祖慰諭之授左一總管從太宗屯于柏壁率兵二千自隰州趨西河斷賊歸路時賊鋒甚勁弘基堅壁不能進及金剛遁弘基率騎邀之至于介休與太宗會追擊大破之累封任國公尋從擊劉黑闥於洺州師旋授井鉞將軍會突厥入寇弘基率步騎一萬自豳州北界東拒子午嶺西接臨涇修營障塞副淮安王神通備胡寇於北鄙九年以佐命功真食九百戶太宗即位顧待益隆李孝常長孫安業之謀逆也坐與交遊除名歲餘起為易州刺史復其封爵徵拜衞尉卿九年改封夔國公世襲朗州刺史例停不行後以年老乞骸骨授輔國大將軍朝朔望祿賜同於職事太宗征遼東以弘基為前軍大總管從擊高延壽於駐蹕山力戰有功太宗屢加勞勉永徽元年加實封通前一千一百戶其年卒年六十九高宗為之舉哀廢朝三日贈開府儀同三司幷州都督陪葬昭陵仍為立碑諡曰襄弘基遺令給諸子奴婢各十五人良田五頃謂所親曰若賢固不藉多財不賢守此可以免飢凍餘財悉以散施子仁實襲官至左典戎衞郎將從子仁景神龍初官至司農卿殷嶠字開山雍州鄠縣人陳司農卿不害孫也其先本居陳郡陳亡徙關中父僧首隋祕書丞有名於世嶠少以學行見稱尤工尺牘仕隋太谷長有治名義兵起召補大將軍府掾參預謀略授心腹之寄累以軍功拜光祿大夫從隱太子攻克西河太宗為渭北道元帥引為長史時關中羣盜往往聚結衆無適從令嶠招慰之所至皆下又與統軍劉弘基率兵六萬屯長安故城隋將衞孝節自金光門出戰嶠與弘基擊破之京城平賜爵陳郡公遷丞相府掾尋授吏部侍郎從擊薛舉為元帥府司馬時太宗有疾委軍於劉文靜誡之曰賊衆遠來利在急戰難與爭鋒且宜持久待糧盡然後可圖嶠退謂文靜曰王體不安慮公不濟故發此言宜因機破賊何乃以勍敵遺王也久之言於文靜曰王不豫恐賊輕我請耀武以威之遂陳兵於折咵為舉所乘軍乃大敗嶠坐減死除名後從平薛仁杲復其爵位武德二年兼陝東道大行臺兵部尚書遷吏部尚書從太宗討平王世充以功進爵鄖國公復從征劉黑闥道病卒太宗親臨喪哭之甚慟贈陝東道大行臺右僕射諡曰節貞觀十四年詔與贈司空淮安王神通贈司空河間王孝恭贈民部尚書劉政會俱以佐命功配饗高祖廟庭十七年又與長孫無忌唐儉長孫順德劉弘基劉政會柴紹等二十四人俱圖其形於凌煙閣永徽五年追贈司空嶠從祖弟聞禮有文學武德中為太子中舍人修梁史未就而卒聞禮子仲容亦知名則天深愛其才官至申州刺史劉政會滑州胙城人也祖環雋北齊中書侍郎政會隋大業中為太原鷹揚府司馬高祖為太原留守政會率兵隸於麾下太宗與劉文靜謀起義兵副留守王威高君雅獨懷猜貳後數日將大會於晉祠威與君雅謀危高祖有人以白太宗既知迫急欲先事誅之因遣政會為急變之書詣留守告威等二人謀反是日高祖與威君雅同坐視事文靜引政會入至庭中云有密狀知人欲反高祖指威等令視之政會不肯曰所告是副留守事唯唐公得省之耳君雅攘袂大呼曰此是反人欲殺我也時太宗已列兵馬布於街巷文靜因令左右引威等囚于別室既拘威等竟得舉兵政會之功也大將軍府建引為戶曹參軍從平長安除丞相府掾武德初授衞尉少卿留守太原政會內輯軍士外和戎狄遠近莫不悅服尋而劉武周進逼幷州晉陽豪右薛深等以城應賊政會為賊所擒於賊中密表論武周形勢賊平復其官爵歷刑部尚書光祿卿封邢國公貞觀初累轉洪州都督賜實封三百戶九年卒太宗手敕曰舉義之日實有殊功所葬並宜優厚贈民部尚書諡曰襄後與殷開山同配饗高祖廟庭子玄意襲爵改封渝國公尚南平公主授駙馬都尉高宗時為汝州刺史次子奇長壽中為天官侍郎為酷吏所陷也柴紹字嗣昌晉州臨汾人也祖烈周驃騎大將軍歷遂梁二州刺史封冠軍縣公父慎隋太子右內率封鉅鹿郡公紹幼趫捷有勇力任俠聞於關中少補隋元德太子千牛備身高祖微時妻之以女即平陽公主也義旗建紹自京間路趣太原時建成元吉自河東往會於道建成謀於紹曰追書甚急恐已起事隋郡縣連城千有餘里中間偷路勢必不全今欲且投小賊權以自濟紹曰不可追既急宜速去雖稍辛苦終當獲全若投小賊知君唐公之子執以為功徒然死耳建成從之遂共走太原入雀鼠谷知已起義於是相賀以紹之計為得授右領軍大都督府長史大軍發晉陽兼領馬軍總管將至霍邑紹先至城下察宋老生形勢白曰老生有匹夫之勇我師若到必來出戰戰則成擒矣及義師至老生果出紹力戰有功下臨汾平絳郡並先登陷陣授右光祿大夫隋將桑顯和來擊孫華率精銳渡河以援之紹引軍直掩其背與史大奈合勢擊之顯和大敗因與諸將進下京城武德元年累遷左翊衞大將軍尋從太宗平薛舉破宋金剛攻平王世充於洛陽擒竇建德於武牢封霍國公賜實封千二百戶轉右驍衞大將軍吐谷渾與党項俱來寇邊命紹討之虜據高臨下射紹軍中矢下如雨紹乃遣人彈胡琵琶二女子對舞虜異之駐弓矢而相與聚觀紹見虜陣不整密使精騎自後擊之虜大潰斬首五百餘級貞觀元年拜右衞大將軍二年擊梁師都於夏州平之轉左衞大將軍出為華州刺史七年加鎮軍大將軍行右驍衞大將軍改封譙國公十二年寢疾太宗親自臨問尋卒贈荊州都督諡曰襄平陽公主高祖第三女也太穆皇后所生義兵將起公主與紹並在長安遣使密召之紹謂公主曰尊公將掃清多難紹欲迎接義旗同去則不可獨行恐罹後患為計若何公主曰君宜速去我一婦人臨時易可藏隱當別自為計矣紹即間行赴太原公主乃歸鄠縣莊所遂散家資招引山中亡命得數百人起兵以應高祖時有胡賊何潘仁聚衆於司竹園自稱總管未有所屬公主遣家僮馬三寶說以利害潘仁攻鄠縣陷之三寶又說羣盜李仲文向善志丘師利等各率衆數千人來會時京師留守頻遣軍討公主三寶潘仁屢挫其鋒公主掠地至盩厔武功始平皆下之每申明法令禁兵士無得侵掠故遠近奔赴者甚衆得兵七萬人公主令間使以聞高祖大悅及義軍渡河遣紹將數百騎趨華陰傍南山以迎公主時公主引精兵萬餘與太宗軍會於渭北與紹各置幕府俱圍京城營中號曰娘子軍京城平封為平陽公主以獨有軍功每賞賜異於他主六年薨及將葬詔加前後部羽葆鼓吹大輅麾幢班劍四十人虎賁甲卒太常奏議以禮婦人無鼓吹高祖曰鼓吹軍樂也往者公主於司竹舉兵以應義旗親執金鼓有克定之勳周之文母列於十亂公主功參佐命非常婦人之所匹也何得無鼓吹遂特加之以旌殊績仍令所司按諡法明德有功曰昭諡公主為昭子哲威歷右屯營將軍襲爵譙國公坐弟令武謀反徙嶺南起為交州都督卒官令武尚巴陵公主累除太僕少卿衞州刺史封襄陽郡公永徽中坐與公主及房遺愛謀反遣使收之行至華陰自殺仍戮其屍公主賜死馬三寶初以平京城功拜太子監門率別擊叛胡劉拔真於北山破之又從平薛仁杲遷左驍衞將軍復從柴紹擊吐谷渾於岷州先鋒陷陣斬其名王前後虜男女數千口累封新興縣公嘗從幸司竹高祖顧謂三寶曰是汝建英雄之處衞青大不惡累除左驍衞大將軍貞觀三年卒太宗為之廢朝諡曰忠武士彠幷州文水人也家富於財頗好交結高祖初行軍於汾晉休止其家因蒙顧接及為太原留守引為行軍司鎧時盜賊蜂起士彠嘗陰勸高祖舉兵自進兵書及符瑞高祖謂曰幸勿多言兵書禁物尚能將來深識雅意當同富貴耳及義兵將起高祖募人遣劉弘基長孫順德等分統之王威高君雅陰謂士彠曰弘基等皆背征三衞所犯當死安得領兵吾欲禁身推覈士彠曰此並唐公之客也若爾便大紛紜威等由是疑而不發留守司兵田德平又欲勸威等鞫問募人之狀士彠謂德平曰討捕之兵總隸唐公王威高君雅等並寄坐耳彼何能為德平遂止義旗起以士彠為大將軍府鎧曹從平京城功拜光祿大夫封太原郡公初義師將起士彠不預知及平京師乃自說云嘗夢高祖入西京升為天子高祖哂之曰汝王威之黨也以汝能諫止弘基等微心可錄故加酬効今見事成乃說迂誕而取媚也武德中累遷工部尚書進封應國公又歷利州荊州都督貞觀九年卒官贈禮部尚書諡曰定顯慶元年以后父累贈司徒改封周國公咸亨中又贈太尉太原王特詔配饗高祖廟庭列在功臣之上孫承嗣事在外戚傳士彠長兄士稜性恭順勤於稼穡從起義官至司農少卿封宣城縣公常居苑中委以農囿之事貞觀中卒贈潭州都督次兄士逸亦有戰功武德初為齊王府戶曹賜爵安陸縣公從齊王鎮幷州為劉武周所獲於賊中密令人詣京師陳武周可圖之計及武周平甚見慰勉累授益州行臺左丞數陳時政得失高祖每嘉納之貞觀初為韶州刺史卒史臣曰唐儉委質義旗之下立功草昧之初被拘虜庭脫高祖蒲州之急侍獵苑囿諫太宗馬上之言可謂純臣矣順德佐命立功理郡著明肅之政弘基臨難不屈陷陣多克捷之勳殷嶠劉政會柴嗣昌並在太原首預舉義從微至著善始令終馬三寶出廝養之徒處將軍之位亦馬之善走者也武士彠首參起義例封功臣無戡難之勞有因人之跡載窺他傳過為褒詞慮當武后之朝佞出敬宗之筆凡涉虛美削而不書贊曰茂約忠純順德功勳弘基六士義合風雲
