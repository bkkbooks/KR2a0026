子東都留守特進守司徒侍中裴度進位中書令餘如故以前山南西道節度使王源中為刑部尚書十一月壬寅朔乙巳令內養馮叔良殺前徐州監軍王守涓於中牟縣以左神策將軍胡沐為容管經略使以大理卿郭行餘為邠寧節度使丁未鄜坊節度使趙儋卒乙酉左金吾衞大將軍崔鄯卒癸丑以左僕射令狐楚判太常卿事右僕射鄭覃判國子祭酒事丁巳以戶部尚書判度支王璠為太原尹北都留守河東節度使戊午以京兆尹李石為戶部侍郎判度支以京兆少尹羅立言權知府事己未以太府卿韓約為左金吾衞大將軍壬戌中尉仇士良率兵誅宰相王涯賈餗舒元輿李訓新除太原節度王璠郭行餘鄭注羅立言李孝本韓約等十餘家皆族誅時李訓鄭注謀誅內官詐言金吾仗舍石榴樹有甘露請上觀之內官先至金吾仗見幕下伏甲遽扶帝輦入內故訓等敗流血塗地京師大駭旬日稍安癸亥詔以銀青光祿大夫尚書左僕射上柱國滎陽郡開國公鄭覃以本官同中書門下平章事乙丑詔以朝議郎守尚書戶部侍郎判度支李石可朝議大夫本官同平章事丁卯以左神策大將軍陳君奕為鳳翔節度使戊辰以給事中李翊為御史中丞左右軍中尉仇士良魚志弘並兼上將軍十二月壬申朔諸道鹽鐵轉運榷茶使令狐楚奏榷茶不便於民請停從之癸丑太子太保張茂宗卒甲子敕左右省起居齎筆硯及紙於螭頭下記言記事丙子以刑部尚書王源中為天平軍節度使丁丑敕諸道府不得私置曆日板己卯鳳翔監軍奏鄭注判官錢可復等四人並處斬訖庚辰上御紫宸謂宰相曰坊市之間人漸安未李石奏曰人情雖安然刑殺過多致此陰沴又聞鄭注在鳳翔招致兵募不少今皆被刑戮臣恐乘此生事切宜原赦以安之上曰然鄭覃又陳理道上曰我每思貞觀開元之時觀今日之事往往憤氣填膺耳癸未儀仗使田全操巡邊迴馳馬入金光門街市訛言相驚縱橫散走賴金吾大將軍陳君賞以其徒立望仙門下至晚方定丁亥以權知京兆尹張仲方為華州防禦使以司農卿薛元賞權知京兆左僕射令狐楚奏方鎮節度使等具弩帶器仗就尚書省兵部參辭伏乞停罷如須參謝令具公服從之時楚引訓注奸謀用王璠郭行餘兵仗遂云不宜以兵仗入省參辭殊乖事體也物議尤之先是宰相武元衡被害憲宗出內庫弓箭陌刀賜左右街使俟宰相入朝以為翼從及建福門退至是亦停之辛卯置諫院印開成元年正月辛丑朔帝常服御宣政殿受賀遂宣詔大赦天下改元開成乙巳御紫宸殿宰臣李石奏曰陛下改元御殿人情大悅全放京兆一年租賦又停四節進奉恩澤所該實當要切帝曰朕務行其實不欲崇長空文石曰赦書須內留一本陛下時看之又十道黜陟使發日更付與公事根本令向外與長吏詳擇施行方盡利害之要丁未以秘書監韋縝為工部尚書敕楊承和韋元素王踐言崔潭峻頃遭誣陷每用追傷宜復官爵聽其歸葬以銀州刺史劉源為夏綏銀宥節度使丙辰望日有蝕之二月辛未朔以左散騎常侍羅讓為江西觀察使乙亥夜四更京師地震屋瓦皆墮丙申左武衞大將軍朱叔夜賜死於藍田關天德奏生退渾部落三千帳來投豐州三月庚子朔壬寅以袁州長史李德裕為滁州刺史庚申幸龍首池觀內人賽雨因賦暮春喜雨詩昭義節度使劉從諫三上疏問王涯罪名內官仇士良聞之惕懼是日從諫遣焦楚長入奏於客省進狀請面對上召楚長慰諭遣之夏四月庚午朔以河南尹鄭澣為左丞以太子賓客分司東都李紳為河南尹癸酉以亳州刺史裴弘泰為義成軍節度使以諫議大夫李讓夷兼權知起居舍人事己卯以潮州司戶李宗閔為衡州司馬以江州刺史李王玉為太子賓客分司癸未吏部侍郎李虞仲卒辛卯淄王協薨甲午詔以山南西道節度使檢校兵部尚書李固言為門下侍郎同中書門下平章事以左僕射諸道鹽鐵轉運使令狐楚檢校左僕射為山南西道節度使丙申李固言判戶部事李石判度支兼諸道鹽鐵轉運使五月乙亥朔癸卯以翰林學士歸融為御史中丞丁未以給事中郭承嘏為華州防禦使給事中盧載以承嘏公正守道屢有封駁不宜置之外郡乃封還詔書翊日復以承嘏為給事中乃以給事中盧鈞代嘏守華州乙卯御紫宸上謂宰臣曰為政之道自古所難李石對曰朝廷法令行則易丁巳以尚書右丞鄭肅為陝虢都防禦觀察使前罷觀察復置之以中書舍人唐扶為福建觀察使庚申判國子祭酒宰臣鄭覃奏太學新置五經博士各一人請依王府官例賜以祿粟從之丙寅昭義奏開夷儀山路通太原晉州從之閏五月己巳朔甲申以河中節度使李程為左僕射判太常卿事乙酉以太子太保分司李聽為河中節度使丙戌烏集唐安寺逾月方散己丑以神策大將軍魏仲卿為朔方靈鹽節度湖南觀察使盧周仁進羨餘錢二萬貫雜物八萬段不受還之使貸貧下戶征稅六月戊戌朔癸亥以河南尹李紳檢校禮部尚書汴州刺史充宣武軍節度使秋七月戊辰朔御史臺奏秘書省管新舊書五萬六千四百七十六卷長慶二年已前並無文案大和五年已後並不納新書今請創立簿籍據闕添寫卷數逐月申臺從之辛未以左金吾衞將軍傅毅為鄜坊節度使癸酉宣武軍節度使王智興卒辛卯刑部尚書殷侑檢校右僕射充山南東道節度使壬午以滁州刺史李德裕為太子賓客甲午以金吾衞大將軍陳君賞為平盧軍節度使代王彥威以彥威為戶部侍郎判度支丙申湖南觀察使盧周仁進羨餘錢一十萬貫御史中丞歸融彈其違制進奉詔以周仁所進錢於河陰院收貯八月戊戌朔甲辰詐稱國舅人前鄜坊節度使蕭洪宜長流驩州戊申以皇太后親弟蕭本為右贊善大夫九月丁卯朔庚辰詔復故左降開州司馬宋申錫正議大夫尚書右丞同平章事仍以其子慎徽為城