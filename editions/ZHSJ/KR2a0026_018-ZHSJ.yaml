body:
  text: 舊唐書卷十七下本紀第十七下文宗下大和四年春正月丙子朔辛卯武昌軍節度使牛僧孺來朝丙戌以左神策軍大將軍丘直方為鄜坊節度使戊子詔封長男永為魯王辛卯以武昌節度使鄂岳蘄黃安申等觀察處置等使金紫光祿大夫檢校吏部尚書同中書門下平章事上柱國奇章郡開國公牛僧孺為兵部尚書同中書門下平章事壬辰以兵部侍郎崔郾為陝虢觀察使封魯王母王氏為昭儀癸巳以前邠寧節度使劉遵古為劍南東川節度使甲午守左僕射同平章事諸道鹽鐵轉運使王播卒丙申以太常卿王涯為吏部尚書充諸道鹽鐵轉運使辛丑以尚書左丞元稹檢校戶部尚書充武昌軍節度鄂岳蘄黃安申等州觀察使癸卯以前陝虢觀察使王起為左丞二月丙午朔戊午興元軍亂節度使李絳舉家被害判官薛齊趙存約死之庚申以左丞溫造為興元節度使辛未夏州節度使李寰卒壬申以神策行營節度使董重質為夏綏銀宥節度使三月乙亥以河東節度使李程檢校左僕射同平章事兼河中尹晉絳慈隰等州節度使以刑部尚書柳公綽檢校左僕射太原尹北都留守河東節度使丁丑以前河中節度使薛平為太子太保丁亥以衞尉卿桂仲武為福建觀察使興元溫造奏害李絳賊首丘崟丘鑄及官健千人並處斬訖其親刃絳者斬一百段號令者三段餘並斬首內一百首祭李絳三十首祭死王事官僚其餘屍首並投於漢江己丑詔興元監軍使楊叔元宜配流康州百姓錮身遞於配所丁酉監修國史中書侍郎平章事路隨進所撰憲宗實錄四十卷優詔答之賜史官等五人錦繡銀器有差癸卯以淮南節度使段文昌檢校尚書左僕射同中書門下平章事兼江陵尹充荊南節度使以前太子賓客崔從檢校右僕射揚州大都督府長史淮南節度使甲辰以前荊南節度使崔羣檢校右僕射兼太常卿以中書舍人李虞仲為華州刺史代嚴休復以休復為右散騎常侍夏四月乙巳朔丙午以右散騎常侍翰林侍講學士鄭覃為工部尚書丁未兵部尚書致仕張賈卒丁巳貶前齊德滄景等州節度使李有裕為永州刺史馳驛赴任庚申以尚書左丞王起為戶部尚書判度支代崔元略以元略檢校吏部尚書為東都留守辛酉夜月掩南斗第二星壬戌詔曰儉以足用令出惟行著在前經斯為理本朕自臨四海愍元元之久困日昃忘食宵興疚懷雖絕文繡之飾尚愧茅茨之儉亦諭卿士形于詔條如聞積習流弊餘風未革車服第室相高以華靡之制資用貨寶固啟于貪冒之源有司不禁侈俗滋扇蓋朕教導之未敷使兆庶昧於恥尚也其何以足用行令臻于致理歟永念慚歎迨茲申敕自今內外班列職位之士各務素朴弘茲國風有僭差尤甚者御史糾上主者宣示中外知朕意焉文宗承長慶寶曆奢靡之風銳意懲革躬行儉素以率厲之辛未以前東都留守崔弘禮為刑部尚書鎮州王廷湊請修建初啟運二陵從之五月甲戌朔丁丑以旱命京城諸司疏理繫囚己卯通化南北二門鎖不可開鑰入如有持之者上令鐵工破鎖時日已及辰矣丁亥改鄆州東平縣為天平縣戊子敕度支每歲於西川織造綾羅錦八千一百六十七匹令數內減二千五百十匹六月癸卯朔丁未以守司徒門下侍郎平章事上柱國晉國公食邑三千戶食實封三百戶裴度為守司徒平章軍國重事待疾損日每三日五日一度入中書辛未夜自一更至五更大小星流旁午觀者不能數壬申詔如聞諸司刑獄例多停滯委尚書左右丞及監察御史糾舉以聞秋七月癸酉朔癸未詔以朝議郎尚書右丞上柱國賜紫金魚袋宋申錫為正議大夫行尚書右丞同中書門下平章事乙酉敕前行郎中知制誥者約滿一周年即與正授從諫議大夫知者亦宜準此餘依長慶二年七月二十七日敕處分振武置雲伽關加鎮兵千人以吏部侍郎王璠為京兆尹兼御史大夫代李諒為桂管觀察使太原饑賑粟三萬石賜十六宅諸王綾絹二萬匹丁酉守司徒裴度上表辭冊命言臣此官已三度受冊有靦面目從之八月壬寅朔丙辰鄜州水溺居民三百餘家太原柳公綽奏雲代蔚三州山谷間石化為麵人取食之己未宣歙觀察使于敖卒甲子內出綾絹三十萬匹付戶部充和糴戊辰幸梨園亭會昌殿奏新樂九月壬申朔丁丑以大理卿裴誼檢校右散騎常侍充江西觀察使代沈傳師以傳師為宣歙觀察使內出綾三千匹賜宥州築城兵士戊寅舒州太湖宿松望江三縣水溺民戶六百八十詔以義倉賑貸庚辰吏部尚書王涯為右僕射依前鹽鐵轉運使壬午以守司徒平章軍國重事晉國公裴度守司徒兼侍中充山南東道節度使以投來奚王茹羯為右驍衞將軍同正丙戌以前山南東道節度使竇易直為尚書左僕射戊子吏部尚書致仕裴向卒己丑淮南天長等七縣水害稼丁酉前豐州刺史天德軍使渾鐬坐贓七千貫貶袁州司馬冬十月壬寅朔戊申以東都留守崔元略檢校吏部尚書兼滑州刺史義成軍節度使代李德裕以德裕檢校兵部尚書兼成都尹充劍南西川節度使己酉京師有熊入莊嚴寺庚戌以前刑部尚書崔弘禮為東都留守甲寅以前劍南西川節度使檢校司空郭釗為太常卿代崔羣為吏部尚書丁卯御史中丞宇文鼎奏今月十三日宰臣宣旨今後羣臣延英奏事前一日進狀入來者臣以尋常公事不暇面論但見表章足以陳露儻臨時忽有公務文字不足盡言則咫尺天聽無路聞達更俟後坐動踰數辰處置之間便有不及伏乞重賜宣示限以狀入者並在卯前如在卯後聽不收覽自然人各遵守禮亦得中從之十一月辛未朔是夜熒惑近左執法癸巳以左丞康承宣為兗海沂密等州節度使淮南大水及蟲霜並傷稼十二月辛丑朔滄州殷侑請廢景州為景平縣己酉義成軍節度使崔元略卒壬子以左金吾衞大將軍段嶷為義成軍節度使癸丑湖南觀察使韋辭卒丙辰以工部侍郎崔琯為京兆尹代王璠為尚書左丞癸亥東都留守崔弘禮卒以同州刺史高重為潭州刺史兼御史中丞充湖南觀察使甲子左僕射致仕楊於陵卒贈司空丙寅以前河南尹馮宿為工部侍郎戊辰以太子賓客分司白居易為河南尹以代韋弘景以弘景守刑部尚書東都留守閏十二月辛未朔壬申太常卿郭釗卒贈司徒壬辰廢齊州歸化縣地入臨邑縣廢景州其縣隸滄州刺史是歲京畿河南江南荊襄鄂岳湖南等道大水害稼出官米賑給五年春正月庚子朔以積陰浹旬罷元會丁巳賜滄德節度使曰義昌軍太原旱賑粟十萬石己未詔方鎮節度觀察使請入覲者先上表奏聞候允則任進程庚申幽州軍亂逐其帥李載義立後院副兵馬使楊志誠為留後癸亥詔端午節辰方鎮例有進奉其雜綵匹段許進生白綾絹己丑以權知渤海國務大彝震檢校秘書監忽汗州都督渤海國王二月庚午朔壬辰以盧龍軍節度使守太保同平章事李載義守太保同中書門下平章事時載義失守入朝賜第於永寧里給賜優厚丙申以桂管觀察使李諒為嶺南節度使戊戌神策中尉王守澄奏得軍虞候豆盧著狀告宰相宋申錫與漳王謀反即令追捕庚子詔貶宋申錫為太子右庶子壬寅左常侍崔玄亮及諫官等十四人伏奏玉階北軍所告事請不於內中鞫問乞付法司帝曰吾已謀於公卿矣卿等且退崔玄亮泣涕陳諫久之帝改容勞之曰朕即與宰臣商議玄亮等方退癸卯詔漳王湊可降為巢縣公右庶子宋申錫開州司馬同正初京師忷忷以宰相實聯親王謀逆三四日後方知誣搆人士側目於守澄鄭注故諫官號泣論之申錫方免其禍己酉敕以李載義入朝於曲江亭賜宴仍命宰臣百僚赴會辛酉以黔中觀察使裴弘泰為桂管經略使以前安州刺史陳正儀為黔中觀察使丁卯紫宸奏事宰相路隨至龍墀仆于地令中人掖之翌日上疏陳退識者嘉之夏四月己巳朔甲戌以新羅王嗣子金景徽為開府儀同三司檢校太保使持節雞林州諸軍事雞林州大都督寧海軍使上柱國封新羅王仍封其母朴氏為新羅國太妃丁亥詔史官記事用戒時常先朝舊制並得隨仗其後宰臣撰時政記因循斯久廢墜實多自今後宰臣奏事有關獻替及臨時處分稍涉政刑者委中書門下丞一人隨時撰錄每季送史館庶警朕闕且復官常己丑以李載義為山南西道節度依前守太保同平章事代溫造以造為兵部侍郎以幽州盧龍節度留後楊志誠檢校工部尚書為幽州盧龍節度使五月戊戌朔太廟第四室第六室破漏有司不時修葺各罰俸上命中使領工徒及以禁中修營材葺之右補闕韋溫上疏論曰宗廟不葺罪在有司弛慢宜加重責今有司止於罰俸便委內臣葺修是許百司之官公然廢職以宗廟之重為陛下所私則羣官有司便同委棄此臣竊為聖朝惜也事關宗廟皆書史冊苟非舊典不可率然伏乞更下詔書復委所司營葺則制度不紊官業各修矣疏奏帝嘉之乃追止中使命有司修奉戊午西川李德裕奏南蠻放還先虜掠百姓工巧僧道約四千人還本道辛酉東都留守刑部尚書韋弘景卒丙寅以京兆尹崔琯為尚書左丞太常少卿龐嚴權知京兆尹六月丁卯朔戊寅以霖雨涉旬詔疏理諸司繫囚辛卯蘇杭湖南水害稼甲午東川奏玄武江水漲二丈梓州羅城漂人廬舍秋七月丁酉朔庚子贈太子賓客李渤禮部尚書辛丑以兵部侍郎溫造檢校戶部尚書為東都留守甲辰以太子少師分司上柱國襲徐國公蕭俛守左僕射致仕劍南東西兩川水遣使宣撫賑給己未以給事中羅讓為福建觀察使八月丙寅朔庚午武昌軍節度使檢校戶部尚書元稹卒辛未貶刑部員外郎舒元輿為著作郎元輿累上表請自效幷進文章朝議責其躁進也壬申以河陽三城懷州節度使楊元卿為宣武軍節度使代李逢吉以逢吉檢校司徒兼太子太師充東都留守代溫造以溫造為河陽三城懷州節度使戊寅以陝虢觀察使崔郾為鄂岳安黃觀察使甲申以中書舍人崔咸為陝州防禦使詔陝州舊有都防禦觀察使額宜停兵馬屬本州防禦使丙戌京兆尹龐嚴卒庚寅以司農卿駙馬都尉杜悰為京兆尹九月丙申朔甲辰貶太子左庶子郭求為婺王府司馬以其心疾與同僚忿競也翰林學士薛廷老李讓夷皆罷職守本官廷老在翰林終日酣醉無儀檢故罷讓夷常推薦廷老故坐累也己未以左僕射竇易直判太常卿西川李德裕奏收復吐蕃所陷維州差兵鎮守冬十月乙丑朔以前綿州刺史鄭綽為安南都戊寅蠻寇巂州陷二縣辛巳滄州移清池縣於南羅城內置十一月乙未朔庚戌鳳翔節度使王承元來朝己未以承元檢校司空青州刺史充平盧軍節度使癸亥以尚書左僕射判太常卿事竇易直檢校司空為鳳翔隴右節度使十二月乙丑朔戊寅以左丞王璠兼判太常卿事甲申貶新除桂管觀察使裴弘泰為饒州刺史以除鎮淹程不進為憲司所糾故也癸巳以鄭州刺史李翺為桂管觀察使是歲淮南浙江東西道荊襄鄂岳劍南東川並水害稼請蠲秋租是冬京師大雨雪六年春正月乙未朔以久雪廢元會戊戌振武李泳招收得黑山外契苾部落四百七十三帳壬子詔朕聞天聽自我人聽天視自我人視朕之菲德涉道未明不能調序四時導迎和氣自去冬已來踰月雨雪寒風尤甚頗傷于和念茲庶甿或罹凍餒無所假貸莫能自存中宵載懷旰食興歎怵惕若厲時予之辜思弘惠澤以順時令天下死罪囚除官典犯贓故意殺人外幷降從流流已下遞降一等應京畿諸縣宜令以常平義倉斛斗賑恤京城內魚眾寡癃殘無告不能自存者委京兆尹量事濟恤具數以聞言念赤子視之如傷天或警予示此陰沴撫躬夕惕予甚悼焉羣臣拜表上徽號甲寅司徒致仕薛平卒二月甲子朔以前義昌軍節度使殷侑檢校吏部尚書充天平軍節度鄆曹濮等州觀察使代令狐楚以楚檢校右僕射兼太原尹北都留守河東節度使戊寅蘇湖二州水賑米二十二萬石以本州常平義倉斛斗給庚辰戶部尚書判度支王起請於邠寧靈武置營田務從之己丑寒食節上宴羣臣於麟德殿是日雜戲人弄孔子帝曰孔子古今之師安得侮瀆亟命驅出三月甲午朔辛丑以武寧軍節度使守太傅同平章事王智興兼侍中充忠武軍節度陳許蔡觀察等使以邠寧節度使李聽為武寧軍節度徐泗濠觀察等使以金吾衞大將軍孟友亮為邠寧節度使以前河東節度使柳公綽為兵部尚書辛酉以前忠武軍節度使高瑀檢校右僕射充武寧軍節度徐泗濠觀察等使夏四月癸亥朔乙丑兵部尚書柳公綽卒戊寅以新除武寧軍節度使李聽為太子太保五月癸巳朔甲辰西川修邛崍關城又移巂州於臺登城壬子浙西丁公著奏杭州八縣災疫賑米七萬石丁巳以鹽州刺史王晏平檢校左散騎常侍御史大夫充靈鹽節度使己未興平縣人上官興因醉殺人而亡竄官捕其父囚之興歸待罪有司京兆尹杜悰中丞宇文鼎以興自首免父之囚其孝可奬請免死詔兩省參議皆言殺人者死古今共守興不可免上竟從悰等議免死決杖八十配流靈州庚申詔如聞諸道水旱害人疾疫相繼宵旰罪己興寢疚懷今長吏奏申札瘥猶甚蓋教化未感於蒸人精誠未格於天地法令或爽官吏為非有一於茲皆傷和氣並委中外臣僚一一具所見聞奏朕當親覽無憚直言其遭災疫之家一門盡歿者官給凶器其餘據其人口遭疫多少與減稅錢疫疾未定處官給醫藥諸道既有賑賜國費復慮不充其供御所須及諸公用量宜節減以救凶荒六月壬戌朔丙寅京兆尹杜悰兼御史大夫戊寅右僕射王涯奉敕准令式條疏士庶衣服車馬第舍之制度敕下後浮議沸騰杜悰於敕內條件易施行者寬其限事竟不行公議惜之秋七月辛卯朔甲午以諫議大夫王彥威戶部郎中楊漢公祠部員外郎蘇滌右補闕裴休並充史館修撰故事史官不過三員或止兩員今四人並命論者非之戊申原王逵薨癸丑以前靈武節度使李文悅為兗海沂密節度使己未以河中節度使李程為左僕射以戶部尚書判度支王起檢校吏部尚書充河中晉慈隰節度使以御史中丞兼刑部侍郎宇文鼎為戶部侍郎判度支八月辛酉朔吏部尚書崔羣卒以駕部郎中知制誥李漢為御史中丞乙丑以尚書右丞判太常卿王璠檢校禮部尚書潤州刺史浙西觀察使庚午山南東道節度使裴度來朝壬申以前浙西觀察使丁公著為太常卿甲戌御史中丞李漢奏論僕射上事儀不合受四品已下官拜時左僕射李程將赴省上故也詔曰僕射上儀近定所緣拜禮皆約令文已經施行不合更改宜準大和四年十一月十六日敕處分九月庚寅朔淄青初定兩稅額五州一十九萬三千九百八十九貫自此淄青始有上供庚子以太傅趙宗儒守司空致仕辛丑涿州置新城縣古督亢之地也丁未太常卿丁公著卒庚戌司空致仕趙宗儒卒壬子以右金吾衞將軍史孝章為鄜州刺史鄜坊丹延節度使冬十月庚子朔甲子詔魯王永宜冊為皇太子壬午以左金吾衞將軍李昌言檢校左散騎常侍充夏綏銀宥節度使甲申以諫議大夫王彥威為河中少尹以其論上官興獄太徼訐故也十一月己丑朔丁未淮南節度使檢校右僕射崔從卒乙卯以荊南節度使段文昌為劍南西川節度使依前檢校左僕射同平章事十二月己未朔乙丑以中書侍郎同平章事牛僧孺檢校右僕射同平章事揚州大都督府長史充淮南節度使戊辰內養王宗禹渤海使迴言渤海置左右神策軍左右三軍一百二十司畫圖以進以尚書右丞崔琯為江陵尹荊南都團練觀察使珍王諴薨乙亥昭義節度使劉從諫來朝丁未以前西川節度使李德裕為兵部尚書責授循州司馬杜元穎卒贈湖州刺史七年春正月乙丑朔御含元殿受朝賀比年以用兵雨雪不行元會之儀故書吳蜀貢新茶皆於冬中作法為之上務恭儉不欲逆其物性詔所供新茶宜於立春後造甲午加劉從諫同平章事襄州裴度奏請停臨漢監牧從之此監元和十四年置馬三千二百匹廢百姓田四百餘頃停之為便乙亥以太府卿崔珙為廣州刺史嶺南節度使壬子詔朕承上天之睠佑荷列聖之丕圖宵旰憂勞不敢暇逸思致康乂八年于茲而水旱流行疫疾作沴兆庶艱食札瘥相仍蓋德未動天誠未感物一類失所其過在予載懷罪己之心深軫納隍之歎如聞關輔河東去年亢旱秋稼不登今春作之時農務又切若不賑救懼至流亡京兆府賑粟十萬石河南府河中府絳州各賜七萬石同華陝虢晉等州各賜十萬石並以常平義倉物充以新除嶺南節度使崔珙檢校工部尚書充武寧軍節度使以右金吾衞將軍王茂元為嶺南節度使丙辰以前武寧軍節度使高瑀為刑部尚書嶺南五管及黔中等道選補使宜權停一二年二月己未朔己巳以吏部侍郎庾承宣為太常卿癸酉以宗正卿李詵為陝州防禦使代崔咸以咸為右散騎常侍己卯麟德殿對吐蕃渤海牂柯昆明等使辛巳御史臺奏均王傅王堪男禎國忌日於私第科決罰人詔曰準令國忌日禁飲酒舉樂決罰人吏都無明文起今後從有此類不須舉奏王禎宜釋放丙戌詔以銀青光祿大夫守兵部尚書上柱國贊皇縣開國伯食邑七百戶李德裕以本官同中書門下平章事三月戊子朔庚寅以前戶部侍郎楊嗣復為尚書左丞壬辰以左散騎常侍張仲方為太子賓客分司仲方為郎中時常駁故相李吉甫謚德裕秉政仲方請告因授之己亥嶺南節度使李諒卒辛丑和王綺薨復於埇橋置宿州割徐州符離縣蘄縣泗州虹縣隸之以東都鹽鐵院官吳季真為宿州刺史癸卯以京兆尹駙馬都尉杜悰檢校禮部尚書充鳳翔隴右節度己酉