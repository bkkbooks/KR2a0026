例於曲江會文武百僚延英奏觴宜權停戊子以尚書戶部侍郎判度支王彥威為衞尉卿分司東都冬十月辛卯朔詔改天后所撰三教珠英為海內珠英戊戌詔嘉王運循王遹通王諶並可光祿大夫檢校司空賜勳上柱國仍依百官例給料錢安王溶潁王並給料錢庚子慶成節賜羣臣宴于曲江上幸十六宅與諸王宴樂癸卯宰臣判國子祭酒鄭覃進石壁九經一百六十卷時上好文鄭覃以經義啟導稍折文章之士遂奏置五經博士依後漢蔡伯喈刊碑列于太學創立石壁九經諸儒校正訛謬上又令翰林勒字官唐玄度復校字體又乖師法故石經立後數十年名儒皆不窺之以為蕪累甚矣戊申以門下侍郎同平章事李固言為劍南西川節度使依前同門下侍郎平章事甲寅敕鹽鐵戶部度支三使下監院官皆郎官御史為之使雖更改院官不得移替如顯有曠敗即具事以聞己未以前西川節度使楊嗣復為戶部尚書充諸道鹽鐵轉運使十一月辛酉朔壬戌以太子賓客分司東都殷侑為忠武軍節度使癸亥狂病人劉德廣突入含元殿付京兆府杖殺乙丑京師地震丁丑興元節度使令狐楚卒丁亥以刑部尚書鄭澣為山南西道節度使己丑契丹朝貢十二月庚寅朔丙申閤內對左右史裴素等上自開成初復故事每入閤左右史執筆立於螭頭之下君臣論奏得以備書故開成政事最詳於近代壬寅以前忠武軍節度使杜悰為工部尚書判度支時悰既除官久未謝恩戶部侍郎李王玉奏杜悰為岐陽公主服假內王玉因言比來駙馬為公主行服三年所以士族之家不願為國戚者以此帝大駭其奏即日詔曰制服輕重必資典禮如聞往者駙馬為公主行服三年緣情之義殊非故實違經之制今乃聞知宜行期周永為定制三年春正月庚申朔甲子宰臣李石遇盜於親仁里中劍斷其馬尾又中流矢不甚傷是時京城大恐捕盜不獲既而知仇士良所為乙丑常參官入朝者九人而已餘皆潛竄累日方安丁卯詔故齊王湊贈懷懿太子戊申以諸道鹽鐵轉運使正議大夫守戶部尚書上柱國宏農郡開國伯食邑七百戶賜紫金魚袋楊嗣復可本官同中書門下平章事朝議郎戶部侍郎判戶部事上柱國賜紫金魚袋李王玉可本官同中書門下平章事依前判戶部事丙子以中書侍郎同中書門下平章事李石為荊南節度使依前中書侍郎平章事丁丑以前荊南節度使韋長為河南尹癸未詔去秋蝗蟲害稼處放逋賦仍以本處常平倉賑貸是日大雪二月己丑朔乙未上謂宰臣曰李宗閔在外數年可別與一官鄭覃陳夷行曰宗閔養成鄭注幾覆朝廷其奸邪甚於李林甫楊嗣復李王玉奏曰大和末宗閔德裕同時得罪二年之間德裕再量移為淮南節度使而宗閔尚在貶所凡事貴得中不可但徇私情上曰與一郡可也丁酉以衡州司馬李宗閔為杭州刺史庚子吏部奏去年所修長定選格或乖往例頗不便人不可久行請却用舊格從之乙巳詔僕射尚書侍郎左右丞大卿監每遇坐日宜令兩人循次進對丁未以同州刺史孫簡為陝虢觀察使代盧行術以術為福王傅分司東都乙酉禮部尚書許康佐卒辛亥左丞盧載為同州防禦使三月己未朔庚午封故陳王第十九男儼為宣城郡王故襄王第三男為樂平郡王夏四月戊子朔己丑禮部尚書致仕徐晦卒辛卯戶部侍郎崔龜從判本司事詔曰戶部侍郎兩員今後先授上者宜令判本司錢穀如帶平章事判鹽鐵度支兼中丞學士不在此限壬辰以給事中裴衮為華州防禦使己酉改法曲為仙韶曲仍以伶官所處為仙韶院兵部侍郎裴潾卒癸丑屯田郎中李衢沔王府長史林贊等進所修皇唐玉牒一百五十卷五月丁巳朔敕禮部貢院進士舉人歲限放三十人及第辛酉詔前江西觀察使吳士規坐贓長流端州庚午月犯天心大星癸未以吏部侍郎高鍇為鄂岳觀察使代高重以重為兵部侍郎六月丁未朔辛酉出宮人四百八十送兩街寺觀安置廢晉州平陽院礬官並歸州縣癸丑上御紫宸對宰臣曰幣輕錢重如何楊嗣復曰此事已久不可遽變其法法變則擾人但禁銅器斯得其要秋七月丙辰朔壬戌陳許節度使殷侑卒甲子以衞尉卿王彥威檢校禮部尚書充忠武軍節度使以右金吾衞大將軍史孝章為邠寧節度使戊辰西川節度使李固言再上表讓門下侍郎及檢校右僕射八月丙戌朔甲午山南東道諸州大水田稼漂盡丁酉詔大河而南幅員千里楚澤之北連亙數州以水潦暴至隄防潰溢既壞廬舍復損田苗言念黎元罹此災沴或生業蕩盡農功索然困餧彫殘豈能自濟宜令給事中盧弘宣往陳許鄭滑曹濮等道宣慰刑部郎中崔往山南東道鄂岳蘄黃道宣慰己亥嘉王運薨魏博六州蝗食秋苗並盡九月丙辰朔辛酉荊南李石讓中書侍郎乃改授檢校兵部尚書壬戌上以皇太子慢遊敗度欲廢之中丞狄兼謨垂涕切諫是夜移太子於少陽院殺太子宮人左右數十人戊辰詔梁王等五人先於北內可却歸十六宅辛未易定節度使張璠卒壬申以易州刺史李仲遷為定州刺史充義武軍節度使戊寅以東都留守牛僧孺為左僕射辛巳詔皇太子侍讀竇宗直隔日入少陽院冬十月乙酉朔以尚書左丞崔琯檢校戶部尚書充東都留守易定軍亂不納新使李仲遷立張璠子元益為留後己丑以少府監張沼為黔中觀察使壬辰以右金吾衞將軍高霞寓為夏綏銀宥節度使癸巳以中書舍人李景讓為華州防禦使甲午慶成節命中人以酒酺仙韶樂賜羣臣宴於曲江亭丁酉夏州節度使劉源卒庚子皇太子薨於少陽院謚曰莊恪乙巳以左金吾將軍郭旼為邠寧慶節度使是夜彗起於軫其長三丈東西指己酉前邠寧節度使史孝章卒十一月乙卯朔是夜彗孛東西竟天壬戌詔曰上天蓋高感應必由乎人事寰宇雖廣理亂盡繫於君心從古已來必然之義朕嗣膺寶位十有三年常克己以恭虔每推誠於衆庶將以導迎休應漸致輯熙期克荷於宗祧思保寧於華夏而德有所未至信有所未孚災氣上騰天文謫見再周期月重擾星躔當求衣之時覩垂象之變兢懼惕厲若蹈泉谷是用舉成湯之六事念宋景之一言詳求譴告之端採聽銷禳之術必有精理蘊於衆情冀屈法以安人爰恤刑而原下應京城諸道見繫囚自十二月八日已前死罪降流已下遞減一等十惡大逆殺人劫盜官典犯贓不在此限今年遭水蝗蟲處並宜存撫賑給以滄州節度使李彥佐為鄆曹濮節度使以德州刺史滄景節度副使劉約為義昌軍節度使癸亥以宋州刺史唐弘實為邕管經略使乙丑天平軍節度使王源中卒庚午以翰林學士丁居晦為御史中丞壬申以蔡州刺史韓威為定州刺史義武軍節度北平軍等使十二月乙酉朔辛丑詔以河東節度使開府儀同三司守司徒兼中書令太原尹北都留守上柱國晉國公食邑三千戶裴度可守司徒中書令以兵部侍郎狄兼謨為河東節度使丙午守太子太師尚書右僕射門下侍郎國子祭酒同平章事鄭覃罷太子太師仍三五日入中書日本國貢珍珠絹四年春正月甲寅朔丁巳熒惑太白辰聚於南斗丁卯夜於咸泰殿觀燈作樂三宮太后諸公主等畢會上性節儉延安公主衣裾寬大即時斥歸駙馬竇澣待罪詔曰公主入參衣服踰制從夫之義過有所歸澣宜奪兩月俸錢閏月甲申朔以吏部侍郎鄭肅檢校禮部尚書河中晉絳慈隰等州節度使以蘇州刺史李道樞為浙東觀察使以諫議大夫高元裕為御史中丞丙申以前河中節度使李聽為太子太保己亥裴度自太原至上令中人就第問疾辛丑以司農卿李玘為福建觀察使諫官論其不可乃罷之丙午以大理卿盧貞為福建觀察使丁未興元節度使鄭澣卒戊申闍婆國朝貢二月癸酉朔辛酉以吏部侍郎歸融檢校禮部尚書充山南西道節度使丙寅寒食節上御通化門以觀遊人戊辰幸勤政樓觀角抵蹴鞠三月癸未朔乙酉賜羣臣上巳宴於曲江是夜月掩東井第三星丙申司徒中書令裴度卒癸酉浙東觀察使李道樞卒以戶部侍郎崔龜從為宣歙觀察使代崔鄲以鄲為太常卿以楚州刺史蕭俶為浙東觀察使夏四月壬子朔以右羽林統軍李昌言為鄜坊節度使壬戌有麞出太廟五月辛丑朔丁亥閣內上謂宰臣曰新修開元政要如何楊嗣復曰臣等未見陛下欲以此書傳示子孫則宣付臣等參定可否緣開元政事與貞觀不同玄宗或好畋遊或好聲色選賢任能未得盡美撰述示後所貴作程豈容易哉丙申鄭覃陳夷行罷知政事覃守左僕射夷行為吏部侍郎丙午邠寧節度使郭旼卒天平魏博易定等管內蝗食秋稼六月辛亥朔以長武城使苻澈為邠寧節度使庚申上幸十六宅安王潁王院宴樂賜與頗厚戊辰以久旱分命祠禱每憂動於色宰相等奏曰水旱時數使然乞不過勞聖慮上改容言曰朕為人主無德及天下致茲災旱又謫見於天若三日不雨當退歸南內更選賢明以主天下宰臣嗚咽流涕各請策免是夜大雨霑霈丁丑襄陽山竹結實其米可食秋七月庚辰朔西蜀水害稼乙未夜月犯熒惑壬寅以河南尹韋長為平盧軍節度使以刑部侍郎高鍇為河南尹甲辰以大中大夫守太常卿上柱國賜紫金魚袋崔鄲可本官同中書門下平章事滄景淄青大水八月庚戌朔以給事中姚合為陝虢觀察使辛亥鄜王憬薨丙辰邢州廢青山縣磁州移昭義縣於固鎮驛癸亥以左僕射牛僧孺檢校司空同平章事兼襄州刺史充山南東道節度使辛未夜流星出羽林尾長八十餘尺滅後有聲如雷壬申鎮冀四州蝗食稼至於野草樹葉皆盡九月己卯朔辛卯以劍南東川節度楊汝士為吏部侍郎丁酉夜月掩東井第三星辛丑以吏部侍郎陳夷行為華州鎮國軍防禦使以蘇州刺史李穎為江西觀察使以諫議大夫馮定為桂管觀察使甲辰以京兆尹鄭復為劍南東川節度使丙午以前江西觀察使敬昕為京兆尹冬十月己酉朔戊午慶成節賜羣臣宴於曲江亭辛酉夜星入斗魁前桂管觀察使嚴謇卒丙寅制以敬宗第六男陳王成美為皇太子丁丑太子太保李聽卒十一月己卯朔壬申前福建觀察使唐扶卒己亥曲赦京城繫囚十二月己酉朔癸丑貶光祿卿駙馬都尉韋讓為澧州長史乙卯乾陵火以杭州刺史李宗閔為太子賓客分司東都辛酉上不康百僚赴延英起居乙亥宰臣入謁見上于太和殿是歲戶部計見管戶四百九十九萬六千七百五十二五年春正月戊寅朔上不康不受朝賀己卯詔立親第潁王為皇太弟權勾當軍國事皇太子成美復為陳王辛巳上崩於大明宮之太和殿壽享三十三羣臣諡曰元聖昭獻皇帝廟號文宗其年八月十七日葬于章陵史臣曰昭獻皇帝恭儉儒雅出於自然承父兄奢弊之餘當閽寺撓權之際而能以治易亂化危為安大和之初可謂明矣初帝在藩時喜讀貞觀政要每見太宗孜孜政道有意于茲洎即位之後每延英對宰臣率漏下十一刻故事天子隻日視事帝謂宰輔曰朕欲與卿等每日相見其輟朝放朝用雙日可也時憲宗郭后居興慶宮曰太皇太后敬宗母寶曆太后及上母蕭太后時呼三宮太后帝性仁孝三宮問安其情如一嘗內園進櫻桃所司啟曰別賜三宮太后帝曰太后宮送物焉得為賜遽取筆改賜為奉宗正寺以祭器朽敗請易之及有司呈進命陳於別殿具冠帶而閱之容色悽然尤勤於政理凡選內外羣官宰府進名帝必面訊其行能然後補除中書用鴻臚卿張賈為衢州刺史賈好博朝辭日帝謂之曰聞卿善長行對曰政事之餘聊與賓客為戲非有所妨帝曰豈有好之而無妨也內外聞之悚息而帝以累世變起禁闈尤側目於中官欲盡除之然訓注狂狡之流制御無術矢謀既誤幾致顛危所謂有帝王之道而無帝王之才雖旰食焦憂不能弭患惜哉贊曰昭獻統天洪惟令德心憤讎恥志除凶慝未殄夔魖又生鬼蜮天未好治亂何由息
