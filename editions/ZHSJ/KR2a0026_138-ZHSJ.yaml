body:
  text: 舊唐書卷一百三十四列傳第八十四馬燧子暢燧兄炫渾瑊子鎬鐬馬燧字洵美汝州郟城人其先自右扶風徙焉祖珉官至左玉鈐衞倉曹父季龍嘗舉明孫吳俶儻善兵法官至嵐州刺史幽州經略軍使燧少時嘗與諸兄讀書乃輟卷歎曰天下將有事矣丈夫當建功於代以濟四海安能矻矻為一儒哉燧姿度魁異長六尺二寸沉勇多智略該涉羣書尤善兵法安祿山反俾光祿卿賈循守范陽燧說循曰祿山負恩首亂雖陷洛城必當夷滅公盍建不代之功誅其逆將向潤客牛廷玠拔其根柢祿山西不能入關則坐而受擒天下可定也循雖善之計不時決事洩祿山果遣韓朝陽來召循朝陽至范陽與循語陰伏壯士以弓弦縊殺之燧脫身走西山隱者徐遇匿之踰月間行歸平原平原不守復走魏郡寶應中澤潞節度使李抱玉署奏趙城尉是時迴紇大軍還國恃復東都之功倔強恣睢所過或虜掠廩粟供餼小不如意恣行殺害抱玉具供辦賓介皆憚不敢行燧自贊請主郵驛比迴紇至則先賂其渠帥與明要約迴紇乃授燧旗幟為識犯令者命燧戮之燧取死囚給左右廝役小違令輒殺之迴紇相顧失色虜涉其境無敢暴掠抱玉益奇之燧因說抱玉曰屬者與迴紇言燧得其情今僕固懷恩恃功樹黨李懷仙張忠志薛嵩田承嗣分授疆土皆出於懷恩其子瑒佻勇不義以燧度之將必窺太原西山以為亂公宜深備之無何懷恩果與太原都將李竭誠通謀將取太原其帥辛雲京覺之斬竭誠固城自守懷恩遣其子瑒率兵圍之初迴紇北歸遣其將安恪石常庭將兵數百及誘募附麗者復數千人以守河陽東都所虜掠重貨悉積河陽是時懷恩遣薛嵩自相衞餽糧以絕河津抱玉令燧詣薛嵩說之嵩乃絕懷恩從順署奏左武衞兵曹歷太子通事舍人遷著作郎營田判官無幾遷秘書少監兼殿中侍御史為節度判官承務郎遷鄭州刺史燧乃勸課農畝總其戶籍歲一稅之州人以為便大曆四年改懷州刺史乘亂兵之後其夏大旱人失耕稼燧乃務修教化將吏有父母者燧輒造之施敬收葬暴骨去其煩苛至秋界中生穭穀人頗賴之抱玉移鎮鳳翔以汧陽被邊署奏隴州刺史兼御史中丞州西有通道廣二百餘步上連峻山山與吐蕃相直虜每入寇皆出於此燧乃按行險易立石種樹以塞之下置二門設籬櫓八日而功畢會抱玉入覲與燧俱行久之代宗知其能召見拜商州刺史兼御史中丞防禦水陸運使大曆十年河陽三城兵亂逐鎮將常休明以燧檢校左散騎常侍御史大夫河陽三城使十一年五月汴州大將李靈耀反因據州城絕運路以邀節制代宗務姑息人因授靈耀汴宋等八州節度留後靈耀不受命乃潛結魏博田承嗣乃遣兄子悅將兵援靈耀破永平軍將劉洽詔燧與淮西節度使李忠臣合軍討靈耀忠臣懼賊焚廬舍西走燧勸其還兵請為前鋒擊破田悅進逼汴州忠臣行汴南燧引軍行汴北又敗靈耀將張清於西梁固靈耀選銳兵八千號為餓狼軍燧獨引軍擊破之進至浚儀是時河陽兵冠諸軍承嗣又遣悅將兵二萬救靈耀破永平軍將杜如江略曹州又敗李正己遊軍擊走劉洽長孫全緒等軍乘勝去汴州一舍方陣而進忠臣會宋州淮南浙西兵與戰不利請救於燧燧引四千人為奇兵擊破之田悅匹馬遁去靈耀知悅敗明日以百騎夜走汴州悉降燧讓功於忠臣忠臣素暴戾燧不欲入汴城乃引軍退舍於板橋忠臣入城果專其功因會擊殺宋州刺史李僧惠燧還河陽大曆十四年六月檢校工部尚書太原尹北都留守河東節度留後尋為節度使太原承前政鮑防百井敗軍之後兵甲寡弱燧乃悉召將吏牧馬廝役得數千人悉補騎卒教之數月為精騎造甲者必令長短三等稱其所衣以便進趨又造戰車蒙以狻猊象列戟於後行則載兵甲止則為營陣或塞險以遏奔衝器械無不犀利居一年陳兵三萬開廣場以習戰陣教其進退坐作之勢建中二年六月朝於京師加檢校兵部尚書令還太原初田悅新代承嗣統兵恐人不附己詐効誠款燧上疏明其必反宜先備之其年悅果與淄青恆冀通謀自將兵三萬圍邢州次臨洺築重城絕其內外以拒救兵邢州將李洪臨洺將張伾皆堅守不拔昭義軍告急乃詔燧將步騎二萬與昭義節度使李抱真神策行營兵馬使李晟合軍救臨洺燧軍出口兵未過險乃遣持書喻悅且示之好悅謂燧畏之十一月師次邯鄲悅遣使至燧皆斬之以徇遣兵擊破其支軍射殺其將成炫之悅自攻臨洺遣大將楊朝光將兵萬人於臨洺南雙岡東西列二柵以禦燧燧乃率李抱真李晟進軍營於二柵之中其夜東柵走歸悅明日燧進軍營明山取其棄柵以置輜重悅謂將吏曰朝光堅柵不下萬人假令燧等盡銳攻之比數日計不能下殺傷必甚吾此必拔臨洺賞勞軍士而與之戰必勝之術也悅乃分恆州李惟岳救兵五千以助朝光燧率軍攻朝光田悅將萬餘人救之燧乃令大將李自良李奉國將騎兵合神策軍於雙岡禦之令曰令悅得過當斬爾自良等擊却悅燧乃令推火車以焚其柵斬朝光及大將盧子昌斬首五千餘級生虜八百餘人居五日進軍至臨洺田悅悉軍復戰燧自將銳兵扼其衝口凡百餘合士皆決死悅兵大敗斬首萬餘級生虜九百人得穀三十萬斛器甲稱是悅收敗兵夜遁邢州圍亦解以功加右僕射先戰燧誓軍中戰勝請以家財行賞既勝盡出其私財以頒將士德宗嘉之詔度支出錢五萬貫行賞還燧家財尋加魏博招討使三年正月田悅求救於淄青恆冀李納遣大將衞俊將兵萬人救悅李惟岳亦遣兵三千赴援悅收合散卒二萬餘人壁于洹水淄青軍其東恆冀軍其西首尾相應燧率諸軍進屯於鄴奏請益河陽兵詔河陽節度使李芃將兵會之軍次于漳悅遣將王光進以兵守長橋築月城以為固軍不得渡燧乃於下流以車數百乘維以鐵鎖鎖絕中流實以土囊以遏水水稍淺諸軍畢渡是時軍糧少悅深壁不戰欲老燧軍燧令諸軍持十日糧進次倉口與悅夾洹水而軍抱真與李芃問曰糧少而深入何也燧曰糧少利速戰兵法善於致人不致於人今田悅與淄青恆三軍為首尾計欲不戰以老我師若分軍擊其左右兵少未可必破悅且來救是前後受敵也兵法所謂攻其必救彼固當戰也燧為諸軍合而破之燧乃造三橋道逾洹水日挑戰悅不敢出恆州兵以軍少懼為燧所幷引軍合於悅悅謂燧明日復挑戰乃伏兵萬人欲邀燧燧乃令諸軍半夜皆食先雞鳴時擊鼓吹角潛師傍洹水徑趨魏州令曰聞賊至則止為陣又令百騎吹鼓角皆留於後仍抱薪持火待軍畢發止鼓角匿其旁伺悅軍畢渡焚其橋軍行十數里悅乃率淄青恆州步騎四萬餘人踰橋掩其後乘風縱火鼓譟而進燧乃坐申令無動命前除草斬榛棘廣百步以為陣燧出陣募勇力得五千餘人分為前列以俟賊至比悅軍至則火止氣乏力少衰乃縱兵擊之悅軍大敗時神策昭義河陽軍小却河東軍既勝諸軍還鬬合擊又大破之迫洹水悅軍走橋橋已焚矣悅軍亂赴水斬首二萬餘級殺大將孫晉卿安墨啜生獲三千餘人溺死者不可勝紀淄青軍殆盡死者相枕藉三十餘里悅收敗卒千餘人走魏州至門州將李長春閉門不納久之追兵不至比明乃納悅悅既入殺長春嬰城自守數日李再春以博州降悅兄昂以洺州降王光進以長橋降悅遣符璘李瑤將五百騎送淄青兵還鎮璘瑤因來降燧魏州先引御河入城南流燧令塞其領口河流絕城中益恐悅乃遣許士則侯臧徒步間行說朱滔王武俊借兵求救時王武俊已殺李惟岳傳首京師授武俊恆冀觀察都防禦使時武俊同列張孝忠已為易定節度使武俊獨為防禦使又割趙深二州為一鎮以康日知為觀察使甚為怨望且素輕孝忠恥名在下時朱滔討李惟岳拔深州求隸幽州不得亦怨望由是滔武俊同謀救悅悅恃燕趙之援又出兵二萬背城而陣燧復與諸軍擊破之五月加燧同中書門下平章事六月朱滔王武俊聯兵五萬來救悅至于城下諸帥議退兵燧固不可德宗遣朔方節度使李懷光將朔方軍步騎萬五千人赴燧是月晦懷光亦至懷光勇而無謀軍至之日未休息堅請與滔等戰王師不利悅等決水灌燧等軍燧兵屈糧少七月燧與諸軍退次魏縣是月詔加燧魏州大都督府長史兼魏博貝四州節度觀察招討等使田悅朱滔王武俊軍亦至魏縣與官軍隔河對壘十一月三盜於魏縣軍中遞相推奬王號朱滔稱冀王田悅稱魏王王武俊稱趙王又遣使於李納納稱齊王四道共推淮西李希烈為天下兵馬元帥太尉建興王皆偽署官號如國初行臺之制而名目頗有妖僻者然未敢偽稱年號而五盜合從圖傾社稷兩河鼎沸寇盜橫行燧等雖志在勤王竟莫能驅攘患難四年十月涇師犯闕帝幸奉天燧引軍還太原議者云燧若乘田悅洹水之敗併力攻之時城中敗卒無三二千人皆夷傷未起日夕俟降燧與抱真不和遷延於擊賊乃致三盜連結至今為梗職燧之由燧至太原遣行軍司馬王權將兵五千赴奉天又遣男彙及大將之子與俱來壁於中渭橋及帝幸梁州權彙領兵還鎮燧以晉陽王業所起度都城東面平易受敵時天下騷動北邊數有警急乃引晉水架汾而注城之東瀦以為池寇至計省守陴者萬人又決汾水環城多為池沼樹柳以固隄尋兼保寧軍節度使興元元年正月加檢校司徒封北平郡王七月德宗還京加燧奉誠軍及晉絳慈隰節度幷管內諸軍行營副元帥令與侍中渾瑊鎮國軍節度使駱元光同討河中初李懷光據河中燧遣使招諭之懷光妹壻要廷珍守晉州衙將毛朝敭守隰州鄭抗守慈州皆相次降燧初王武俊自魏縣還鎮雖去偽號而攻圍趙州不解康日知窘蹙欲棄趙州燧奏曰可詔武俊與抱真同擊朱滔以深趙隸武俊請改日知為晉慈隰節度使日知未至而三州降燧故又加燧晉慈隰節度使燧乃表讓三州於日知且言因降而授之恐後有功者踵以為常上嘉而許之燧乃遣使迎日知既至籍府庫而歸之日知喜且過望九月十五日燧帥步騎三萬次于絳分兵收夏縣略稷山攻龍門降其將馮萬興任象玉燧以兵攻絳州十月拔其外城其夜偽刺史王克同與大將達奚小進棄城走降其衆四千人又遣大將李自良谷秀分兵略定聞喜夏縣萬泉虞鄉永樂猗氏六縣降其將辛兟及兵五千人谷秀以犯令虜士女斬之以徇貞元元年軍次寶鼎敗賊騎兵於陶城前鋒將李黯追擊之射殺賊將徐伯文斬首萬餘級獲馬五百匹是歲天下蝗旱物價騰踊軍乏糧餉而京師言事多請捨懷光上意未決燧以懷光逆節尤甚河中密邇京邑反覆不可保信捨之無以示天下慮上為左右所惑且兵事尚密六月燧乃捨軍以數百騎朝于京師比召見燧曰臣雖不武得芻糧支一月足以平河中上許之七月燧因朝京師乃與渾瑊駱元光韓遊瓌合軍次于長春宮懷光將徐廷光以兵六千守宮城禦備甚嚴燧度長春不下則懷光自固攻之曠日持久所傷必甚乃挺身至城下呼廷光廷光素憚燧威名則拜於城上燧度廷光心已屈乃徐謂之曰我來自朝廷可西面受命廷光復拜燧乃喻之曰公等皆朔方將士祿山以來首建大勳四十餘年功伐最高奈何棄祖父之勳力背君上為族滅之計耶從吾非止免禍富貴可圖也賊徒皆不對燧又曰爾以吾言不誠今相去不遠數步爾當射我乃披襟示之廷光感泣俯伏軍士亦泣下先一日賊焦籬堡守將尉珪以兵二千因堡降燧廷光東道既絕乃率衆出降燧以數騎徑入城處之不疑莫不畏服衆大呼曰吾輩復得為王人矣渾瑊由是服燧私謂參佐曰予嘗謂馬公用兵與予不相遠但驚怪累敗田悅今觀其行兵料敵吾不迨遠矣八月燧移軍於焦籬堡其夜賊太原堡守將吳冏棄堡而遁其下皆降燧率諸軍濟河兵凡八萬陣於城下是日賊將牛名俊斬懷光首以城降其守兵猶一萬六千斬賊將閻晏孟寶張清吳冏等七人以徇為懷光脅虜者皆捨之燧自朝京師還行營凡二十七日而河中平詔書褒美遷光祿大夫兼侍中仍與一子五品正員官宴賜畢還太原是行也德宗賜燧宸扆台衡二銘序曰朕每覽上古之書及唐虞之際君臣相得聖賢同時日夕孜孜講論至道或陳其鑒誡或諷以詠歌煥乎典謨百代是式有以見啟沃之道理化之端意甚慕之而未能迨也頃靈鹽節度使杜希全著書上獻多所規諫聊為君臣箴用答其意河東等道副元帥司徒燧固請勒石貽厥後人朕以文既非工義又非備垂諸來裔良所恧焉起予者商因之有作庶乎朝夕自儆且俾後代知我文武殿邦之臣歟宸扆銘曰天生蒸人性命元淳嗜欲交馳利害糾紛無主乃亂樹之以君九域茫茫萬情云云目不備覩耳難徧聞覩之聞之矧又非真事失其源道遠莫親理得其要化行如神失源維何不自正身正身之方先誠其意罔從爾欲罔載爾偽體道崇德本仁率義必信若寒暑無私象天地感而遂通百慮一致任人之術各當其器捨短從長理無求備事多總集衆才咸遂知而必任任而勿貳以天下之目為鑒我鑒斯明以天下之心為謀我謀則智求賢惟廣辯理惟精逆耳咈心必嘉乃誠順旨苟容亦察其情斥去姦諛全度忠貞先人立言為代作程諤諤者昌唯唯者傾繫以興亡曷云其輕承天子人夫豈不貴伊昔哲王夙夜祗畏馭朽為戒納隍為志神將害盈天匪假易四海為家夫豈不富伊昔哲王勸儉固陋土階罔飾露臺罷構遠奇伎淫巧放珍禽怪獸敬之慎之天命可祐欲令必行順人之情欲誠必著清己之慮心無億詐事必忠恕凡將有為靡不三思喜怒以節動靜以時毫釐或差禍害亦隨慢易厥初悔其曷追刑不可長武不可恃作威逞力厲階斯起垂旒蔽聰黈纊塞耳含弘光大是亦為美覆之如天愛之如子仁心感人率土自理嗟予寡昧嗣守丕圖寇戎薦興德化未孚大業兢兢其敢以渝俯察物情仰稽典謨作誡斯言置于坐隅台衡銘曰天列台星垂象于人聖人則天亦建輔臣以翼以弼為衡為鈞如耳目應心如股肱運身是則同體孰云非親陰陽相推四序成歲君臣相得萬邦作乂感同風雲合若符契以道匡救盡規獻替木必從繩金其用礪帝者之盛時惟陶唐乃聞疇咨仄陋明敭洎乎有虞二八騰芳爰迨伊尹相于成湯載生姜牙諒彼武王道無不行謀無不臧君聖臣賢運泰時康漢高既興蕭曹亦彰烈烈我祖膺期而昌剗滅羣兇砥平四方惟衞及英啟闢封疆曰房與杜振理維綱亦有魏徵忠謇昂昂偉茲衆材為棟為梁蕩蕩巍巍邦家有光是知道之廢興擊于時主主之得失資于台輔經之以文緯之以武出為方召入作申甫絕維載張闕衮斯補惟德是倚惟才是求人不易知德亦難周傅說板築夷吾射鉤任之不疑千載垂休體於至公何鄙何讎追惟哲主必賴良弼矧予不德暗於理術師旅繁起政刑多失遘茲艱屯夙夜祗慄翊我戴我實惟勳賢內熙庶績外總十連威武載揚謀猷日宣長城壓境巨艦濟川同德同心扶危持顛予嘉爾誠爾相予理惟后失道亦臣之恥自昔格言慎終如始功藏鼎彝道冠圖史無俾伊傅克專厥美作鑒勒銘永世是紀燧至太原乃勒二銘於起義堂西偏帝為題額其崇寵如此二年冬吐蕃大將尚結贊陷鹽夏二州各留兵守之結贊大軍屯於鳴沙自冬及春羊馬多死糧餉不繼德宗以燧為綏銀麟勝招討使令與華帥駱元光邠帥韓遊瓌及鳳翔諸鎮之師會於河西進討燧出師次石州結贊聞之懼遣使請和仍約盟會上皆不許又遣其大將論頰熱厚禮卑辭申情於燧請和燧頻表論奏上堅不許三年正月燧軍還太原四月燧與論頰熱俱入朝燧盛言蕃情可保請許其盟上然之燧既入朝結贊遽自鳴沙還蕃是歲閏五月十五日侍中渾瑊與蕃相尚結贊盟于平涼為蕃軍所劫狼狽僅免陷將吏六十餘員由燧之謬謀也坐是奪兵權六月以燧守司徒兼侍中北平王如故仍賜妓樂奉朝請而已五年九月燧與太尉李晟召見于延英殿上嘉其有大勳力皆圖形凌煙閣列於元臣之次九年七月燧對於延英初上以燧足疾不令朝謁是日燧以冬首入朝敕許不拜而坐時太尉晟初薨帝謂燧曰常時卿與太尉晟同來今獨見卿不覺悲慟上歔欷久之燧既退足疾仆於地上親掖起之送及於陛燧頓首泣謝累上表乞骸陳讓侍中優詔不許貞元十一年八月薨時年七十先是司天頻奏熒惑太白犯太微上將間一月而燧薨廢朝四日詔京兆尹韓臯監護喪事嗣吳王獻為弔祭贈賵使冊贈太尉諡曰莊武子彙暢暢以父蔭累遷至鴻臚少卿留京師建中三年燧討田悅於山東時歲旱京師括率商戶人心甚搖鳳翔留鎮幽州兵多離散入南山為盜殿中丞李雲端與其黨袁封單超俊李誠信冀信等與暢善因飲食聚會言時事將危暢乃遣家人溫靖與父書具陳利害可班師還鎮燧怒執靖具奏其狀令兄炫執暢請罪德宗以燧方討賊不竟其事誅雲端等十一人敕炫就第杖暢三十上於是罷括率之令燧貲貨甲天下燧既卒暢承舊業屢為豪幸邀取貞元末中尉楊志廉諷暢令獻田園第宅順宗復賜暢初為彙妻所訴析其產中貴又逼取仍指使施於佛寺暢不敢吝晚年財產並盡身歿之後諸子無室可居以至凍餒今奉誠園亭館即暢舊第也暢終少府監贈工部尚書子繼祖以祖蔭四歲為太子舍人累遷至殿中少監年三十七卒炫字弱翁燧之仲兄少以儒學聞於時隱居蘇門山不應辟召至德中李光弼鎮太原辟為掌書記試大理評事監察御史歷侍御史常參謀議光弼甚重之奏授比部刑部郎中田神功鎮汴州奏授節度判官檢校兵部郎中轉連州刺史徵拜吏部郎中又出為閬州刺史入為大理少卿建中初為潤州刺史黜陟使柳載以清白聞徵拜太子右庶子遷左散騎常侍弟燧為司徒以親比拜刑部侍郎以疾辭改兵部尚書致仕貞元七年卒時年七十九史臣曰燧雄勇強力常先計後戰又善誓師將戰親自號令士無不慷慨感動戰皆決死未嘗折北謀得兵勝冠於一時然力能擒田悅而不取納蕃帥之偽款而保其必盟平涼之會大臣幾陷關畿搖動此謂才有餘而心不至議者惜而恨之渾瑊皋蘭州人也本鐵勒九姓部落之渾部也高祖大俟利發渾阿貪支貞觀中為皋蘭州刺史曾祖元慶祖大壽父釋之皆代為皋蘭都督大壽開元初歷左領衞中郎將太子僕同正釋之少有武藝從朔方軍積戰功於邊上累遷至開府儀同三司試太常卿寧朔郡王廣德中與吐蕃戰沒於靈武年四十九瑊本名曰進年十餘歲即善騎射隨父戰伐破賀魯部下石堡城收龍駒島勇冠諸軍累授折衝果毅後節度使安思順遣瑊提偏師深入葛祿部經狐媚磧略特羅斯山大破阿布思部又與諸軍城永清柵天安軍遷中郎將安祿山構逆瑊從李光弼出師河北定諸郡邑賊將有李立節者素稱驍勇與瑊格鬬臨陣斬之遷右驍衞將軍既而肅宗即位於靈武瑊統兵赴行在至天德遇蕃軍入寇瑊擊敗之從郭子儀收兩京討安慶緒破賊於新鄉改檢校太僕卿充武鋒軍使又從僕固懷恩討史朝義前後數十戰朝義平加開府儀同三司太常卿賜實封二百戶及懷恩謀亂令子瑒與瑊率軍圍榆次朔方將殺㻛瑊率所部歸郭子儀會瑊父釋之戰死又起復本官為朔方行營左廂兵馬使從子儀討吐蕃於邠州以功加御史中丞軍還盛秋於邠會吐蕃大入寇至奉天瑊拒戰於漠谷大破蕃軍以功加太子賓客復屯於奉天華州周智光反子儀奉詔討之令瑊領馬步萬人攻下同州智光平詔以邠寧慶三州隸朔方軍子儀領之子儀令瑊先率兵至邠州便於宜祿縣防秋歲餘加兼御史大夫大曆七年吐蕃大寇邊瑊與涇原節度使馬璘會兵大破蕃賊於黃菩原自是每年常戍於長武城臨盛秋十一年領邠州刺史其年吐蕃入寇慶州方渠懷安等鎮瑊擊却之十二年子儀入朝令瑊知邠寧慶三州兵馬留後十三年迴紇侵太原破鮑防軍北歸頗為邊患以瑊為石嶺關已南諸軍都知兵馬使率兵掎角逐之虜騎引退其年八月加檢校工部尚書單于副都護振武軍使十四年郭子儀拜太尉號尚父分所管內別置三節度以瑊兼單于大都護充振武軍東受降城鎮北大都護府綏銀麟勝等軍州節度副大使知節度使事管內支度營田等使其年復以崔寧為朔方節度使領子儀舊管徵瑊為左金吾衞大將軍兼左街使建中四年李希烈遣間諜詐為瑊書與希烈交通瑊奏其狀上特保證之仍賜瑊馬一匹幷鞍轡錦綵二百匹時以普王為荊襄等道兵馬元帥討李希烈大開府幕以瑊檢校戶部尚書御史大夫充中軍都虞候會涇師亂德宗幸奉天後三日瑊率家人子弟自京城至乃署為行在都虞候檢校兵部尚書京幾渭北節度觀察使居數日邠寧節度使韓遊瓌與慶州刺史論惟明統兵三千自乾陵北過赴醴泉以拒朱泚會諜報泚已出兵帝遽令追遊瓌兵纔至奉天賊軍果至遊瓌等戰于城東王師不利遂乘勝奔突將入官軍與賊隔門相持自卯至午殺傷頗甚門內有草車數乘瑊令推車塞門焚之以外禦乘火力戰賊方解去然重圍已合賊大修攻具以僧法堅為匠師毀佛寺房宇以為梯櫓是月賊自丁未至辛未四面攻城晝夜矢石不絕瑊隨機應敵僅能自固十一月靈武節度使杜希全鹽州刺史戴休顏夏州刺史時常春合兵六千人赴難將至上議其所向宰相盧嵵白志貞以漠谷路為便瑊曰漠谷險隘必為賊所邀不若取乾陵北過附柏城而行便取城東北雞子堆下營與城中掎角相應且分賊勢朱泚必不更於陵寢往來嵵曰漠谷路近若慮逆賊邀擊即出兵應接若取乾陵路恐驚陵寢瑊曰今朱泚圍城斬伐柏城以夜繼晝驚動已多今城中危急佇望救軍唯希全等率先赴難安危是賴所繫非輕制置不宜差跌但令希全等於雞子堆下營固守善地賊泚可以計破也盧嵵等曰陛下以順討逆不可自驚陵寢白志貞從而贊之上從嵵議希全等進至漠谷果為賊軍邀擊奪據水口乘高以大弩巨石左右夾擊殺傷頗甚城中出兵應援亦為賊挫銳而退希全等各歸還本鎮賊攻城逾急壕塹圜之旬日復偏攻東北角矢石亂入晝夜如雨城中死傷者甚衆重圍救絕芻粟俱盡城中伺賊休息輒遣人城外捃拾樵採以進御人心危蹙上與瑊對泣賊泚北據乾陵下瞰城內身衣黃衣蔽以翟扇前後左右皆朱紫閹官宴賜拜舞紛紜旁午城中動息賊俯窺之慢辭戲侮以為破在漏刻之頃時令騎將環城招公卿士庶責以不識天命十五日賊造雲橋成闊數十丈以巨輪為脚推之使前施濕氈生牛革多懸水囊以為障直指城東北隅兩旁構木為廬冒以牛革迴環相屬負土運薪於其下以填壕塹矢石不能傷城中恟懼相顧失色上召瑊勉諭之令齎空名告身自御史大夫實封五百戶已下者千餘軸募諸軍突將敢死之士以當之兼賜瑊御筆一管當戰勝量其功伐即署其名授之不足者筆書其身因命以位仍謂瑊曰朕便與卿別更不用對來縱有急切令馬承倩在卿處但令附奏瑊俯伏嗚咽上亦悲慟不自勝撫瑊背而遣之前一日瑊與防城使侯仲莊揣雲橋來路先鑿地道下可深丈餘上積馬糞深五六尺次二日即令爇火次一日復下柴薪夜燒之平明火焰高於城壘是時北風正急賊乃隨風推橋以薄城下賊三千餘人相繼而登城上士卒皆久寒餒又少甲冑瑊但感激誡厲之以飢弱之衆當劇賊之鋒雖力戰應敵人憂不濟公卿已下仰首祝天賊徒至地道所橋脚偏陷不能進須臾風迴焰轉雲橋焚為灰燼賊焚死者數千城中歡譟振地時瑊中流矢遽自拔之血流霑沫格鬬不已初不言瘡痛以激士心是日上先授瑊二子官餘授將校有差賊又別造雲橋周以重鐵方就而朔方節度使李懷光自魏縣行營赴難先遣兵馬使張韶入奏韶至奉天與賊填塹者相雜臨城忽大呼謂城上曰我李懷光使也懷光自河北領大軍至矣即繩引而登城中得懷光表歡聲振動賊衆不之測乃令舁韶巡於城上翌日懷光大軍次醴泉是夜賊解圍而去興元元年正月以瑊為行在都知兵馬使二月賜實封五百戶是月德宗移幸山南時懷光叛逆二賊連結寇盜縱橫瑊分布諸軍以為翼衞纔入谷口而懷光追騎遽至瑊令侯仲莊以後軍擊敗之三月檢校左僕射同中書門下平章事兼靈州都督靈鹽豐夏等州定遠西城天德軍節度等使仍充朔方邠寧振武等道兼永平軍奉天行營兵馬副元帥上臨軒授鉞用漢拜韓信故事是月瑊將諸軍赴京畿賊將韓旻張廷芝宋歸朝等拒我師於武功瑊與吐蕃將論莽羅之衆大破賊於武亭川斬首萬餘級瑊便赴奉天應接李晟抗京城西面五月李晟自東渭橋抵京城攻賊瑊亦與韓遊瓌戴休顏西面諸軍會合晟破賊之日瑊亦進收咸陽尋聞朱泚姚令言奔敗命諸軍分道邀擊其衆離潰相率來降選勁騎三千急追泚至涇州賊將誅泚傳首來獻六月加瑊侍中論收京城之功加實封李晟一千戶瑊八百戶韓遊瓌戴休顏四百戶駱元光尚可孤五百戶七月德宗還宮以瑊守本官兼河中尹河中絳慈隰節度使仍充河中同陝虢節度及管內諸軍行營兵馬副元帥改封咸寧郡王九月賜瑊大寧里甲第女樂五人入第之日宰臣節將送之一如李晟入第之儀以李懷光未平又加朔方行營兵馬副元帥與河東節度使馬燧會兵進討貞元元年八月河中平以功加檢校司空與一子五品正員官是冬望皇帝親郊昊天上帝瑊入朝陪祀畢還鎮河中三年吐蕃入寇至鳳翔為李晟邀擊之又襲破其摧沙堡吐蕃深恨之尚結贊入寇陷我鹽夏二州以兵守之欲長驅犯京師而畏瑊與李晟馬燧欲陰計圖之乃卑詞遜禮告馬燧請重立盟誓則蕃軍引去德宗不許馬燧自入朝言之上乃令崔翰入蕃報結贊言還我鹽夏則許同盟結贊謂翰曰清水之會同盟人少是以和好輕慢不成今蕃相及元帥已下凡二十一人赴盟靈州節度使杜希全涇原節度使李觀皆和善守信境外重之此時須請預盟翰約盟于清水且先歸我鹽夏二州結贊曰清水非吉地請會盟於原州土梨樹又請盟畢歸二州翰歸備奏其事神策將馬有麟奏曰土梨樹地多險恐蕃軍隱伏不利不如於平涼其地坦平且近涇州就之為便乃定盟於平涼川初結贊請李觀杜希全預盟欲執之徑犯京師詔報之曰杜希全職在靈州不可出境李觀又已改官今遣侍中渾瑊充盟會使五月瑊自咸陽入朝詔授平涼盟會使兵部尚書崔漢衡副之司勳郎中鄭叔矩為判官瑊統兵二萬又詔華州節度使駱元光以本鎮兵從瑊閏月十五日瑊與結贊會平涼初約以兵三千列於壇之東西散手四百人至壇下各遣遊軍相覘伺是時蕃軍精騎數萬列於壇西蕃之遊軍貫穿我軍之中瑊將梁奉貞率六十騎為遊軍纔至壇所為蕃軍所執結贊又謂瑊曰請侍中已下具衣冠劍珮瑊與監軍宋鳳朝崔漢衡等入幕次坦無他慮結贊命伐鼓三通其衆呼譟而至瑊遽出自幕後偶得他馬跨而奔馳追騎雲合流矢雨集而不傷會瑊將辛榮以數百人據北阜與賊血戰追騎方止瑊僅得免辛榮兵盡矢窮力屈而降宋鳳朝瑊判官鄭弇為追兵所殺崔漢衡中官俱文珍劉延李清朝漢衡判官鄭叔矩瑊判官路泌袁同直大將軍扶餘準馬寧神策將孟日華李至言樂演明范澄馬弇等六十餘人皆陷于賊尚結贊至原州列坐帳中召陷蕃將吏讓之因怒瑊曰武功之捷吐蕃之力許以涇州靈州相報竟食其言負我深矣舉國同怨本劫是盟志在擒瑊吾已為金枷待瑊將獻贊普既已失之虛致君等何為乃放俱文珍馬寧馬弇歸朝七月瑊自奉天入朝素服待罪詔釋之而後見俄而吐蕃入寇京畿瑊鎮奉天十月還河中四年七月加邠寧慶副元帥十二年二月加檢校司徒兼中書令諸使副元帥如故十五年十二月二日薨於鎮廢朝五日羣臣於延英奉慰詔贈太師諡曰忠武賻絹布四千匹米粟三千石及喪車將至又為廢朝應緣喪事所司準式支給命京兆尹監護葬日賜絹五百匹瑊忠勤謹慎功高不伐在藩方歲時貢奉必躬親閱視每有頒錫雖居遠地如在帝前位極將相無忘謙抑物論方之金日磾故深為德宗委信猜間不能入君子多之子鍊鎬鐬鎬瑊第二子性謙謹多與士大夫遊歷延唐二州刺史軍政吏職有可稱者及元和中諸道出師討王承宗屬義武軍節度使任迪簡病不能軍以鎬藉父威名足以鎮定乃以鎬檢校右散騎常侍充義武軍節度副使九月六日加檢校工部尚書代迪簡為節度使鎬治兵練卒頗有威望然不能觀釁養銳以期必勝鎮定相去九十里元和十一年冬鎬率全師壓賊境而軍距賊壘三十里鎬謀慮不周但耀兵鋒無所控制賊乃分兵潛入定州界焚燒驅掠鎬怒進攻賊壘交鋒而敗師徒殆喪其半餘衆還定州亂不可遏朝廷乃除陳楚代之楚聞亂馳入定州鎬為亂兵所劫以至裸露楚既整戢於亂兵處率斂衣服還鎬方得歸朝坐貶韶州刺史後代州刺史韓重華奏收得鎬供軍錢絹十餘萬貫匹再貶循州刺史歲餘卒鐬瑊第三子以父蔭起家為諸衞參軍歷諸衞將軍元和初出為豐州刺史天德軍使坐贓貶袁州司戶憲宗思咸寧之勳比例從輕五年徵為袁王傅復賜金紫遷殿中監開成初宰相擬壽州刺史文宗曰鐬勳臣子弟豈可委以牧民仲尼有言不如多與之邑今我念其先人之功與之致富可也宰臣曰鐬常歷名郡有政能乃從之三年入為右金吾衞大將軍知街事歷諸衞大將軍卒史臣曰馬司徒之方略渾咸寧之忠藎各奮節義為時名臣然元城之師失策於田悅平涼之會幾陷於吐蕃此亦術有所不至也緬思建中之亂四海波騰賊泚竊發之辰宗祀不絕如綫苟非忠臣致命化危為安則李氏之宗社傾矣贊曰北平之勳排難解紛咸寧蹈義感慨匡君再隆基構克殄昏氛迴天捧日實賴將軍
