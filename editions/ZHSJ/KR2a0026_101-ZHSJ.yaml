body:
  text: 舊唐書卷九十七列傳第四十七劉幽求鍾紹京郭元振張說子均陳希烈附劉幽求冀州武強人也聖曆年應制舉拜閬中尉刺史不禮焉乃棄官而歸久之授朝邑尉初桓彥範敬暉等雖誅張易之兄弟竟不殺武三思幽求謂桓敬曰三思尚存公輩終無葬地若不早圖恐噬臍無及桓敬等不從其言後果為三思誣構死於嶺外及韋庶人將行篡逆幽求與玄宗潛謀誅之乃與苑總監鍾紹京長上果毅麻嗣宗及太平公主之子薛崇暕等夜從入禁中討平之是夜所下制敕百餘道皆出於幽求以功擢拜中書舍人令參知機務賜爵中山縣男食實封二百戶翌日又授其二子五品官祖父俱追贈刺史睿宗即位加銀青光祿大夫行尚書右丞仍舊知政事進封徐國公加實封通前五百戶賜物千段奴婢二十人宅一區地十頃馬四匹加以金銀雜器景雲二年遷戶部尚書罷知政事月餘轉吏部尚書擢拜侍中降璽書曰頃者王室不造中宗厭代外戚專政姦臣擅國將傾社稷幾遷龜鼎朕躬與王公皆將及於禍難卿見危思奮在變能通翊贊儲君協和義士殄殲元惡放殛凶徒我國家之復存繄茲是賴厥庸甚茂朕用嘉焉故委卿以衡軸胙卿以茅土然征賦未廣寵錫猶輕昔西漢行封更擇多戶東京定賞復增大邑故加賜卿實封二百戶兼舊七百戶使夫高岸為谷長河如帶子子孫孫傳國無絕又以卿忘軀徇難宜有恩榮故特免卿十死罪並書諸金鐵俾傳于後卿其保茲功業永作國楨可不美歟先天元年拜尚書右僕射同中書門下三品監修國史幽求初自謂功在朝臣之右而志求左僕射兼領中書令俄而竇懷貞為左僕射崔湜為中書令幽求心甚不平形於言色湜又託附太平公主將謀逆亂幽求乃與右羽林將軍張暐請以羽林兵誅之乃令暐密奏玄宗曰宰相中有崔湜岑羲俱是太平公主進用見作方計其事不輕殿下若不早謀必成大患一朝事出意外太上皇何以得安古人云當斷不斷反受其亂唯請急殺此賊劉幽求已共臣作定謀計訖願以身正此事赴死如歸臣既職典禁兵若奉殿下命當即除翦上深以為然暐又洩其謀於侍御史鄧光賓玄宗大懼遽列上其狀睿宗下幽求等詔獄令法官推鞫之法官奏幽求等以疏間親罪當死玄宗屢救獲免乃流幽求于封州暐于峯州歲餘太平公主等伏誅其日下詔曰劉幽求風雲玄感川嶽粹靈學綜九流文窮三變義以臨事精能貫日忠以成謀用若投水茂勳立艱難之際嘉話盈啟沃之初存讜直以不顧為姦邪之所忌釁萌頗露譖端潛發元宰見逐讒人孔多既殄羣兇方宣大化期問政於經始載登賢於夢卜可依舊金紫光祿大夫守尚書左僕射知軍國事監修國史上柱國徐國公仍依舊還封七百戶幷賜錦衣一襲開元初改尚書左右僕射為左右丞相乃授幽求尚書左丞相兼黃門監未幾除太子少保罷知政事姚崇素嫉忌之乃奏言幽求鬱怏於散職兼有怨言貶授睦州刺史削其實封六百戶歲餘稍遷杭州刺史三年轉桂陽郡刺史在道憤恚而卒年六十一贈禮部尚書諡曰文獻配享睿宗廟庭建中三年重贈司徒鍾紹京虔州贛人也初為司農錄事以工書直鳳閣則天時明堂門額九鼎之銘及諸宮殿門榜皆紹京所題景龍中為苑總監玄宗之誅韋氏紹京夜中帥戶奴及丁夫以從及事成其夜拜紹京銀青光祿大夫中書侍郎參知機務翌日進拜中書令加光祿大夫封越國公賜實封五百戶賜物二千段馬十匹紹京既當朝用事恣情賞罰甚為時人所惡俄又抗疏讓官睿宗納薛稷之言乃轉為戶部尚書出為蜀州刺史玄宗即位復召拜戶部尚書遷太子詹事時姚崇素惡紹京之為人因奏紹京發言怨望左遷綿州刺史及坐事累貶琰川尉盡削其階爵及實封俄又歷遷溫州別駕開元十五年入朝因垂奏曰陛下豈不記疇昔之事耶何忍棄臣荒外永不見闕庭且當時立功之人今並亡歿唯臣衰老獨在陛下豈不垂愍耶玄宗為之惘然即日拜銀青光祿大夫右諭德久之轉少詹事年八十餘卒紹京雅好書畫古跡聚二王及褚遂良書至數十百卷建中元年重贈太子太傅郭元振魏州貴鄉人舉進士授通泉尉任俠使氣不以細務介意前後掠賣所部千餘人以遺賓客百姓苦之則天聞其名召見與語甚奇之時吐蕃請和乃授元振右武衞鎧曹充使聘於吐蕃吐蕃大將論欽陵請去四鎮兵分十姓之地朝廷使元振因察其事宜元振還上疏曰臣聞利或生害害亦生利國家難消息者唯吐蕃與默啜耳今吐蕃請和默啜受命是將大利於中國也若圖之不審則害必隨之今欽陵欲分裂十姓去四鎮兵此誠動靜之機不可輕舉措也今若直塞其善意恐邊患之起必甚於前若以鎮不可拔兵不可抽則宜為計以緩之藉事以誘之使彼和望未絕則其惡意亦不得頓生且四鎮之患遠甘涼之患近取捨之計實宜深圖今國之外患者十姓四鎮是也內患者甘涼瓜肅是也關隴之人久事屯戍向三十年力用竭矣脫甘涼有不虞豈堪廣調發耶夫善為國者當先料內以敵外不貪外以害內然後夷夏晏安昇平可保如欽陵云四鎮諸部接界懼漢侵竊故有是請此則吐蕃所要者然青海吐渾密邇蘭鄯比為漢患實在茲輩斯亦國家之要者今宜報欽陵云國家非吝四鎮本置此以扼蕃國之要分蕃國之力使不得併兵東侵今委之於蕃力強易為東擾必實無東侵意則還漢吐渾諸部及青海故地即俟斤部落亦還吐蕃如此則足塞欽陵之口而事未全絕也如欽陵小有乖則曲在彼矣又西邊諸國款附歲久論其情義豈可與吐蕃同日而言今未知其利害未審其情實遙有分裂亦恐傷彼諸國之意非制馭之長算也則天從之又上言曰臣揣吐蕃百姓倦徭戍久矣咸願早和其大將論欽陵欲分四鎮境統兵專制故不欲歸款若國家每歲發和親使而欽陵常不從命則彼蕃之人怨欽陵日深望國恩日甚設欲廣舉醜徒固亦難矣斯亦離間之漸必可使其上下俱懷猜阻則天甚然之自是數年間吐蕃君臣果相猜貳因誅大將論欽陵其弟贊婆及兄子莽布支並來降則天仍令元振與河源軍大使夫蒙令卿率騎以接之後吐蕃將麴莽布支率兵入寇涼州都督唐休璟勒兵破之元振參預其謀以功拜主客郎中大足元年遷涼州都督隴右諸軍州大使先是涼州封界南北不過四百餘里既逼突厥吐蕃二寇頻歲奄至城下百姓苦之元振始於南境硤口置和戎城北界磧中置白亭軍控其要路乃拓州境一千五百里自是寇虜不復更至城下元振又令甘州刺史李漢通開置屯田盡其水陸之利舊涼州粟麥斛至數千及漢通收率之後數年豐稔乃至一匹絹糴數十斛積軍糧支數十年元振風神偉壯而善於撫御在涼州五年夷夏畏慕令行禁止牛羊被野路不拾遺神龍中遷左驍衞將軍兼檢校安西大都護時西突厥首領烏質勒部落強盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老不勝寒苦會罷而死其子娑葛以元振故殺其父謀勒兵攻之副使御史中丞解琬知其謀勸元振夜遁元振曰吾以誠信待人何所疑懼且深在寇庭遁將安適乃安臥帳中明日親入虜帳哭之甚哀行弔贈之禮娑葛乃感其義復與元振通好因遣使進馬五千匹及方物制以元振為金山道行軍大總管先是娑葛與阿史那闕啜忠節不和屢相侵掠闕啜兵衆寡弱漸不能支元振奏請追闕啜入朝宿衞移其部落入於瓜沙等州安置制從之闕啜行至播仙城與經略使右威衞將軍周以悌相遇以悌謂之曰國家以高班厚秩待君者以君統攝部落下有兵衆故也今輕身入朝是一老胡耳在朝之人誰復喜見非唯官資難得亦恐性命在人今宰相有宗楚客紀處訥並專權用事何不厚貺二公請留不行仍發安西兵并引吐蕃以擊娑葛求阿史那獻為可汗以招十姓使郭虔瓘往拔汗那徵甲馬以助軍用既得報讎又得存其部落如此與入朝受制於人豈復同也闕啜然其言便勒兵攻陷于闐坎城獲金寶及生口遣人間道納賂於宗紀元振聞其謀遽上疏曰往者吐蕃所爭唯論十姓四鎮國家不能捨與所以不得通和今吐蕃不相侵擾者不是顧國家和信不來直是其國中諸豪及泥婆羅門等屬國自有攜貳故贊普躬往南征身殞寇庭國中大亂嫡庶競立將相爭權自相屠滅兼以人畜疲癘財力困窮人事天時俱未稱愜所以屈志且共漢和非是本心能忘情於十姓四鎮也如國力殷足之後則必爭小事方便絕和縱其醜徒來相吞擾此必然之計也今忠節乃不論國家大計直欲為吐蕃作鄉導主人四鎮危機恐從此啟頃緣默啜憑陵所應處兼四鎮兵士歲久貧羸其勢未能得為忠節經略非是憐突騎施也忠節不體國家中外之意而別求吐蕃吐蕃得志忠節則在其掌握若為復得事漢往年吐蕃於國非有恩有力猶欲爭十姓四鎮今若効力樹恩之後或請分于闐疏勒不知欲以何理抑之又其國中諸蠻及婆羅門等國見今攜背忽請漢兵助其除討亦不知欲以何詞拒之是以古之賢人皆不願夷狄妄惠非是不欲其力懼後求請無厭益生中國之事故臣愚以為用吐蕃之力實為非便又請阿史那獻者豈不以獻等並可汗子孫來即可以招脅十姓但獻父元慶叔僕羅兄俀子并斛瑟羅及懷道豈不俱是可汗子孫往四鎮以他匐十姓不安請冊元慶為可汗竟不能招脅得十姓却令元慶沒賊四鎮盡淪頃年忠節請斛瑟羅及懷道俱為可汗亦不能招脅得十姓却遣碎葉數年被圍兵士飢餒又吐蕃頃年亦冊俀子及僕羅并拔布相次為可汗亦不能招得十姓皆自磨滅何則此等子孫非有惠下之才恩義素絕故人心不歸來者既不能招攜唯與四鎮却生瘡痏則知冊可汗子孫亦未獲招脅十姓之算也今料獻之恩義又隔遠於其父兄向來既未樹立得威恩亦何由即遣人心懸附若自舉兵力勢能取則可招脅十姓不必要須得可汗子孫也又欲令郭虔瓘入拔汗那稅甲稅馬以充軍用者但往年虔瓘已曾與忠節擅入拔汗那稅甲稅馬臣在疏勒具訪不聞得一甲入軍拔汗那胡不勝侵擾南勾吐蕃即將俀子重擾四鎮又虔瓘往入之際拔汗那四面無賊可勾恣意侵吞如獨行無人之境猶引俀子為蔽今北有娑葛強寇知虔瓘等西行必請相救胡人則內堅城壘突厥則外伺邀遮必知虔瓘等不能更如往年得恣其吞噬內外受敵自陷危道徒與賊結隙令四鎮不安臣愚揣之亦非為計疏奏不省楚客等既受闕啜之賂乃建議遣攝御史中丞馮嘉賓持節安撫闕啜御史呂守素處置四鎮持璽書便報元振除牛師奬為安西副都護便領甘涼已西兵募兼徵吐蕃以討娑葛娑葛進馬使娑臘知楚客計馳還報娑葛娑葛是日發兵五千騎出安西五千騎出撥換五千騎出焉耆五千騎出疏勒時元振在疏勒於河口柵不敢動闕啜在計舒河口候見嘉賓娑葛兵掩至生擒闕啜殺嘉賓等呂守素至僻城亦見害又殺牛師奬於火燒城乃陷安西四鎮路絕楚客又奏請周以悌代元振統衆徵元振將陷之使阿史那獻為十姓可汗置軍焉耆以取娑葛娑葛遺元振書曰與漢本來無惡只讎於闕啜而宗尚書取闕啜金枉擬破奴部落馮中丞牛都護相次而來奴等豈坐受死又聞史獻欲來徒擾亂軍州恐未有寧日乞大使商量處置元振奏娑葛狀楚客怒奏言元振有異圖元振使其子鴻間道奏其狀以悌竟得罪流于白州復以元振代以悌赦娑葛罪冊為十四姓可汗元振奏稱西土未寧事資安撫逗遛不敢歸京師會楚客等被誅睿宗即位徵拜太僕卿加銀青光祿大夫景雲二年同中書門下三品代宋璟為吏部尚書無幾轉兵部尚書封館陶縣男時元振父愛年老在鄉就拜濟州刺史仍聽致仕其冬與韋安石張說等俱罷知政事先天元年為朔方軍大總管始築定遠城以為行軍計集之所至今賴之明年復同中書門下三品及蕭至忠竇懷貞等附太平公主潛謀不順玄宗發羽林兵誅之睿宗登承天門元振躬率兵侍衞之事定論功進封代國公食實封四百戶賜物一千段又令兼御史大夫持節為朔方道大總管以備突厥未行玄宗於驪山講武坐軍容不整坐于纛下將斬以徇劉幽求張說於馬前諫曰元振有翊贊大功雖有罪當從原宥乃赦之流於新州尋又思其舊功起為饒州司馬元振自恃功勳怏怏不得志道病卒開元十年追贈太子少保有文集二十卷張說字道濟其先范陽人代居河東近又徙家河南之洛陽弱冠應詔舉對策乙第授太子校書累轉右補闕預修三教珠英久視年則天幸三陽宮自夏涉秋不時還都說上疏諫曰陛下屯萬乘幸離宮暑退涼歸未降還旨愚臣固陋恐非良策請為陛下陳其不可三陽宮去洛城一百六十里有伊水之隔崿坂之峻過夏涉秋水潦方積道壞山險不通轉運河廣無梁咫尺千里扈從兵馬日費資給連雨彌旬即難周濟陛下太倉武庫並在都邑紅粟利器蘊若山丘奈何去宗廟之上都安山谷之僻處是猶倒持劍戟示人鐏柄臣竊為陛下不取夫禍變之生在人所忽故曰安樂必誡無行所悔此不可止之理一也告成褊小萬方輻湊填城溢郭併鍤無所排斥居人蓬宿草次風雨暴至不知庇託孤惸老病流轉衢巷陛下作人父母將若之何此不可止之理二也池亭奇巧誘掖上心削巒起觀堨流漲海俯貫地脈仰出雲路易山川之氣奪農桑之土延木石運斧斤山谷連聲春夏不輟勸陛下作此者豈正人耶詩云人亦勞止汔可小康此不可止之理三也御苑東西二十里所出入來往雜人甚多外無牆垣扃禁內有榛叢谿谷猛獸所伏暴慝是憑陛下往往輕行警蹕不肅歷蒙密乘嶮巇卒然有逸獸狂夫驚犯左右豈不殆哉雖萬全無疑然人主之動不宜易也易曰思患預防願陛下為萬姓持重此不可止之理四也今國家北有胡寇覷邊南有夷獠騷徼關西小旱耕稼是憂安東近平輸漕方始臣願陛下及時旋軫深居上京息人以展農修德以來遠罷不急之役省無用之費澄心澹懷惟億萬年蒼蒼羣生莫不幸甚臣自度芻議十不一從何者沮盤遊之娛間林沚之玩規遠圖而替近適要後利而棄前歡未沃明主之心已戾貴臣之意然臣血誠密奏而不愛死者不願負陛下言責之職耳輕觸天威伏地待罪疏奏不省長安初修三教珠英畢遷右史內供奉兼知考功貢舉事擢拜鳳閣舍人時麟臺監張易之與其弟昌宗構陷御史大夫魏元忠稱其謀反引說令證其事說至御前揚言元忠實不反此是易之誣構耳元忠由是免誅說坐忤旨配流欽州在嶺外歲餘中宗即位召拜兵部員外郎累轉工部侍郎景龍中丁母憂去職起復授黃門侍郎累表固辭言甚切至優詔方許之是時風教頹紊多以起復為榮而說固節懇辭竟終其喪制大為識者所稱服終復為工部侍郎俄拜兵部侍郎加弘文館學士睿宗即位遷中書侍郎兼雍州長史景雲元年秋譙王重福於東都構逆而死留守捕繫枝黨數百人考訊結構之狀經時不決睿宗令說往按其獄一宿捕獲重福謀主張靈均鄭愔等盡得其情狀自餘枉被繫禁者一切釋放睿宗勞之曰知卿按此獄不枉良善又不漏罪人非卿忠正豈能如此玄宗在東宮說與國子司業褚𣰋量俱為侍讀深見親敬明年同中書門下平章事監修國史是歲二月睿宗謂侍臣曰有術者上言五日內有急兵入宮卿等為朕備之左右相顧莫能對說進曰此是讒人設計擬搖動東宮耳陛下若使太子監國則君臣分定自然窺覦路絕災難不生睿宗大悅即日下制皇太子監國明年又制皇太子即帝位俄而太平公主引蕭至忠崔湜等為宰相以說為不附己轉為尚書左丞罷知政事仍令往東都留司說既知太平等陰懷異計乃因使獻佩刀於玄宗請先事討之玄宗嘉納焉及至忠等伏誅徵拜中書令封燕國公賜實封二百戶其冬改易官名拜紫微令自則天末年季冬為潑寒胡戲中宗嘗御樓以觀之至是因蕃夷入朝又作此戲說上疏諫曰臣聞韓宣適魯見周禮而歎孔子會齊數倡優之罪列國如此況天朝乎今外蕃請和選使朝謁所望接以禮樂示以兵威雖曰戎夷不可輕易焉知無駒支之辯由余之賢哉且潑寒胡未聞典故裸體跳足盛德何觀揮水投泥失容斯甚法殊魯禮褻比齊優恐非干羽柔遠之義樽俎折衝之禮自是此戲乃絕俄而為姚崇所構出為相州刺史仍充河北道按察使俄又坐事左轉岳州刺史仍停所食實封三百戶遷右羽林將軍兼檢校幽州都督開元七年檢校并州大都督府長史兼天兵軍大使攝御史大夫兼修國史仍賫史本隨軍修撰八年秋朔方大使王晙誅河曲降虜阿布思等千餘人時并州大同橫野等軍有九姓同羅拔曳固等部落皆懷震懼說率輕騎二十人持旌節直詣其部落宿于帳下召酋帥以慰撫之副使李憲以為夷虜難信不宜輕涉不測馳狀以諫說報書曰吾肉非黃羊必不畏喫血非野馬必不畏刺士見危致命是吾効死之秋也於是九姓感義其心乃安九年四月胡賊康待賓率衆反據長泉縣自稱葉護攻陷蘭池等六州詔王晙率兵討之仍令說相知經略時叛胡與党項連結攻銀城連谷以據倉糧說統馬步萬人出合河關掩擊大破之追至駱駝堰胡及党項自相殺阻夜胡乃西遁入鐵建山餘黨潰散說招集党項復其居業副使史獻請因此誅党項絕其翻動之計說曰先王之道推亡固存如盡誅之是逆天道也因奏置麟州以安置党項餘燼其年拜兵部尚書同中書門下三品仍依舊修國史明年又敕說為朔方軍節度大使往巡五城處置兵馬時有康待賓餘黨慶州方渠降胡康願子自立為可汗舉兵反謀掠監牧馬西涉河出塞說進兵討擒之并獲其家屬於木盤山送都斬之其黨悉平獲男女三千餘人於是移河曲六州殘胡五萬餘口配許汝唐鄧仙豫等州始空河南朔方千里之地說以討賊功復賜實封二百戶先是緣邊鎮兵常六十餘萬說以時無強寇不假師衆奏罷二十餘萬勒還營農玄宗頗以為疑說奏曰臣久在疆埸具悉邊事軍將但欲自衞及雜使營私若禦敵制勝不在多擁閑冗以妨農務陛下若以為疑臣請以闔門百口為保以陛下之明四夷畏伏必不慮減兵而招寇也上乃從之時當番衞士浸以貧弱逃亡略盡說又建策請一切罷之別召募強壯令其宿衞不簡色役優為條例逋逃者必爭來應募上從之旬日得精兵一十三萬人分繫諸衞更番上下以實京師其後彍騎是也是歲玄宗將還京而便幸并州說進言曰太原是國家王業所起陛下行幸振威耀武并建碑紀德以申永思之意若便入京路由河東有漢武脽上后土之祀此禮久闕歷代莫能行之願陛下紹斯墜典以為三農祈穀此誠萬姓之福也上從其言及祀后土禮畢說代張嘉貞為中書令夏四月玄宗親為詔曰動惟直道累聞獻替之誠言則不諛自得謀猷之體政令必俟其增損圖書又藉其刊削才望兼著理合褒升考中上說又首建封禪之議十三年受詔與右散騎常侍徐堅太常少卿韋縚等撰東封儀注舊儀不便者說多所裁正語在禮志玄宗尋召說及禮官學士等賜宴於集仙殿謂說曰今與卿等賢才同宴於此宜改名為集賢殿因下制改麗正書院為集賢殿書院授說集賢院學士知院事及將東封授說為右丞相兼中書令源乾曜為左丞相兼侍中蓋勒成岱宗以明宰相佐成王化也說又撰封禪壇頌以紀聖德初源乾曜本意不欲封禪而說固贊其事由是頗不相平及登山說引所親攝供奉官及主事等從升加階超入五品其餘官多不得上又行從兵士惟加勳不得賜物由是頗為內外所怨先是御史中丞宇文融獻策請括天下逃戶及籍外剩田置十道勸農使分往檢察說嫌其擾人不便數建議違之及東封還融又密奏分吏部置十銓融與禮部尚書蘇頲等分掌選事融等每有奏請皆為說所抑由是銓綜失融乃與御史大夫崔隱甫中丞李林甫奏彈說引術士夜解及受贓等狀敕宰臣源乾曜刑部尚書韋抗大理少卿胡珪御史大夫崔隱甫就尚書省鞫問說兄左庶子光詣朝堂割耳稱冤時中書主事張觀左衞長史范堯臣並依倚說勢詐假納賂又私度僧王慶則往來與說占卜吉凶為隱甫等所鞫伏罪說經兩宿玄宗使中官高力士視之迴奏說坐於草上於瓦器中食蓬首垢面自罰憂懼之甚玄宗憫之力士奏曰說曾為侍讀又於國有功玄宗然其奏由是停兼中書令觀及慶則決杖而死連坐遷貶者十餘人隱甫及融等恐說復用為己患又密奏毀之明年詔說致仕仍令在家修史初說為相時玄宗意欲討吐蕃說密奏許其通和以息邊境玄宗不從及瓜州失守王君馼死說因獲巂州鬬羊上表獻之以申諷諭其表臣聞勇士冠雞武夫戴鶡推情舉類獲此鬬羊遠生越巂蓄性剛決敵不避強戰不顧死雖為微物志不可挫伏惟陛下選良家於六郡求猛士於四方鳥不遁才獸不藏伎如蒙効奇靈圃角力天場却鼓怒以作氣前躑躅以奮擊趹若奔雲之交觸碎如轉石之相叩裂骨賭勝濺血爭雄敢毅見而衝冠鷙狠聞而擊節冀將少助明主市駿骨揖怒蛙之意也若使羊能言必將曰若鬬不解立有死者所賴至仁無殘量力取勸焉臣緣損足未堪履地謹遣男詣金明門奉進玄宗深悟其意賜絹及雜綵一千匹十七年復拜尚書左丞相集賢院學士尋代源乾曜為尚書左丞相視事之日上敕所司供帳設音樂內出酒食御製詩一篇以其事尋以修謁陵儀注功加開府儀同三司時長子均為中書舍人次子尚寧親公主拜駙馬都尉又特授說兄慶王傅光為銀青光祿大夫當時榮寵莫與為比十八年遇疾玄宗每日令中使問疾并手寫藥方賜之十二月薨時年六十四上憯惻久之遽於光順門舉哀因罷十九年元正朝會詔曰弘濟艱難參其功者時傑經緯禮樂贊其道者人師式瞻而百度允釐既往而千載貽範台衡軒鼎垂黼藻於當今徽策寵章播芳蕤於後葉故開府儀同三司尚書左丞相集賢院學士知院事上柱國燕國公張說辰象降靈雲龍合契元和體其冲粹妙有釋其至賾挹而莫測仰之彌高精義探繫表之微英辭鼓天下之動昔侍春誦綢繆歲華含舂容之聲叩而盡應蘊泉源之智啟而斯沃授命興國則天衢以通濟用和民則朝政惟允司鈞總六官之紀端揆為萬邦之式方弘風緯俗返本於上古之初而邁德振仁不臻於中壽之福于嗟不憖既喪斯文宣室餘談泠然在耳王殿遺草宛留其蹟言念忠賢良深震悼是使當宁撫几臨樂徹懸罷稱觴之儀遵往襚之禮可贈太師賜物五百段始玄宗在東宮說已蒙禮遇及太平用事儲位頗危說獨排其黨請太子監國深謀密畫竟清內難遂為開元宗臣前後三秉大政掌文學之任凡三十年為文俊麗用思精密朝廷大手筆皆特承中旨撰述天下詞人咸諷誦之尤長於碑文墓誌當代無能及者喜延納後進善用己長引文儒之士佐佑王化當承平歲久志在粉飾盛時其封泰山祠脽上謁五陵開集賢修太宗之政皆說為倡首而又敦氣義重然諾於君臣朋友之際大義甚篤時中書舍人徐堅自負文學常以集賢院學士多非其人所司供膳太厚嘗謂朝列曰此輩於國家何益如此虛費將建議罷之說曰自古帝王功成則有奢縱之失或興池臺或玩聲色今聖上崇儒重道親自講論刊正圖書詳延學者今麗正書院天子禮樂之司永代規模不易之道也所費者細所益者大徐子之言何其隘哉玄宗知之由是薄堅說既遭訕鑠罷知政事專集賢文史之任每軍國大事帝遣中使先訪其可否說嘗自製其父贈丹州刺史騭碑文玄宗聞之而御書其碑額賜之曰嗚呼積善之墓有文集三十卷太常諡議曰文貞左司郎中陽伯成駁議以為不稱工部侍郎張九齡立議請依太常為定紛綸未決玄宗為說自製神道碑文御筆賜諡曰文貞由是方定均俱能文說在中書兄弟已掌綸翰之任居父憂服闋均除戶部侍郎轉兵部二十六年坐累貶饒州刺史以太子左庶子徵復為戶部侍郎九載遷刑部尚書自以才名當為宰輔常為李林甫所抑及林甫卒依附權臣陳希烈期於必取既而楊國忠用事心頗惡之罷希烈知政事引文部侍郎韋見素代之仍以均為大理卿均大失望意常鬱鬱祿山之亂受偽命為中書令掌賊樞衡李峴呂諲條流陷賊官均當大辟肅宗於說有舊恩特免死長流合浦郡以主壻玄宗特深恩寵許於禁中置內宅侍為文章嘗賜珍玩不可勝數時兄均亦供奉翰林院常以所賜示均均戲謂曰此婦翁與女壻非天子賜學士也天寶中玄宗嘗幸內宅謂曰希烈累辭機務朕擇其代者孰可錯愕未對帝即曰無踰吾愛壻矣降階陳謝楊國忠聞而惡之及希烈罷相舉韋見素代深觖望天寶十三年正月范陽節度使安祿山入朝時祿山立破奚契丹功尤加寵異祿山求帶平章事下中書擬議國忠進言曰祿山誠立軍功然眼不識字制命若行臣恐四夷輕國玄宗乃止加左僕射而已及祿山還鎮命中官高力士餞於滻坡既還帝曰祿山慰意否力士曰觀其深心鬱鬱必伺知宰相之命不行故也帝告國忠國忠曰此議他人不知必張所告帝怒盡逐張兄弟出均為建安太守為盧溪郡司馬埱為宜春郡司馬歲中召還再遷為太常卿祿山之亂玄宗幸蜀宰相韋見素楊國忠御史大夫魏方進等從朝臣多不至次咸陽帝謂高力士曰昨日蒼黃離京朝官不知所詣今日誰當至者力士曰張兄弟世受國恩又連戚屬必當先至房琯素有宰相望深為祿山所器必不此來帝曰事未可料是日琯至帝大悅因問均琯曰臣離京時亦過其舍比約同行均報云已於城南取馬觀其趣向來意不切既而均弟兄果受祿山偽命與陳希烈為賊宰相死於賊中陳希烈者宋州人也精玄學書無不覽開元中玄宗留意經義自褚𣰋量元行冲卒後得希烈與鳳翔人馮朝隱常於禁中講老易累遷至祕書少監代張九齡專判集賢院事玄宗凡有撰述必經希烈之手李林甫知上睠待深異又以和裕易制乃引為宰相同知政事相得甚歡而林甫居位日久雖陰謀姦畫足以自固亦希烈佐佑唱和之力也累遷兼兵部尚書左相封潁川郡開國公寵遇侔於林甫及林甫死楊國忠用事素忌嫉之乃引韋見素同列罷希烈知政事守太子太師希烈失恩心頗怏怏祿山之亂與張達奚珣同掌賊之機衡六等定罪希烈當斬肅宗以上皇素遇賜死于家史臣曰劉徐公負不羈之材逢抵巇之運遂能奮命決策扶力中興朝為徒步之人夕據公侯之位苟非輕死重利不恥不義之富安及此哉郭代公張燕公解逢掖而登將壇驅貔虎之師斷獯戎之臂暨居衡軸克致隆平可謂武緯文經惟申與甫而已惜乎均務速失節賊廷自武德已來稱賢相者房杜姚宋四公皆遭無賴子弟汙圮先業非獨燕國之不幸也希烈柔而多智長於名理竟死於名所謂離婁不見其眉睫與夫平叔太初同膏肓耳贊曰箕微去紂閎散扶昌謀不近義旋踵而亡幽求不令道濟允臧偉哉郭侯勳德煌煌
