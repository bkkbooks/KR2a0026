body:
  text: 舊唐書卷九十八列傳第四十八魏知古盧懷慎子奐源乾曜從孫光裕光裕子洧李元紘杜暹韓休裴耀卿孫佶魏知古深州陸澤人也性方直早有才名弱冠舉進士累授著作郎兼修國史長安中歷遷鳳閣舍人衞尉少卿時睿宗居藩兼檢校相王府司馬神龍初擢拜吏部侍郎仍並依舊兼修國史尋進位銀青光祿大夫明年丁母憂去職服闋授晉州刺史睿宗即位以故吏召拜黃門侍郎兼修國史景雲二年遷右散騎常侍睿宗女金仙玉真二公主入道有制各造一觀雖屬季夏盛暑尚營作不止知古上疏諫曰臣聞穀梁傳曰古之君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢書曰不作無益害有益又曰罔咈百姓以從己之欲禮曰季夏之月樹木方盛無有斬伐不可興土功以妨農又曰季夏行冬令則風寒不時語曰修己以安百姓此皆興化立理之教為政養人之本今陛下為公主造觀將樹功德以祈福祐但兩觀之地皆百姓之宅卒然迫逼令其轉移扶老攜幼投竄無所發剔椽瓦呼嗟道路乖人事違天時起無用之作崇不急之務羣心搖搖衆口籍籍陛下為人父母欲何以安之且國有簡冊君舉必記動則左史書之言則右史書之是以非禮勿言非禮勿動夫如是則君之所舉可不慎歟微臣備位諫諍兼秉史筆書而不法後嗣何觀臣愚必以為不可伏願俯順人欲仰稽天意降德音下明敕速罷功役收之桑榆疏奏不納頃之又進諫曰臣聞人以君為天君以人為本人安則政理本固則邦寧自陛下翦除凶逆君臨寶位蒼生顒顒以為朝有新政今風教頹替日甚一日府庫空虛人力凋弊造作不息官員日增今諸司試及員外檢校等官僅至二千餘人太府之布帛以殫太倉之米粟難給又金仙玉真等觀造作咸非急務臣先奏請停竟仍未止今歲前水後旱五穀不熟若至來春必甚饑饉陛下為人父母欲何方以賑恤療饑拯溺須及其時又突厥為患其來自久本無禮儀焉有誠信今雖遣使來請結婚豺狼之心首鼠何定弱則卑順強則驕逆屬草衰月滿弓勁馬肥乘中國飢虛在和親際會倘或窺犯亭障國家何以防之臣所論者事甚急切伏願特垂詳察睿宗嘉其切直尋令同中書門下平章事玄宗在春宮又令兼左庶子未幾遷戶部尚書餘如故明年擢拜侍中先天元年冬從上畋獵于渭川因獻詩諷曰嘗聞夏太康五弟訓禽荒我后來冬狩三驅盛禮張順時鷹隼擊講事武功揚奔走未及去翾飛豈暇翔非熊從渭水瑞雀想陳倉此欲誠難縱茲遊不可常子雲陳羽獵僖伯諫漁棠得失鑒齊楚仁恩念禹湯邕熙諒在宥亭毒匪多傷辛甲今為史虞箴遂孔彰手制褒之曰夫詩者志之所以寫其心懷實可諷諭君主是故揚雄陳羽獵馬卿賦上林爰自風雅率由茲道予頃向溫泉觀省風俗時因暇景掩渭而畋方開一面之羅式展三驅之禮躬親校獵聊以從禽豈意卿有箴規輔予不逮自非款誠夙著其孰能繼於此耶今賜卿物五十段用申勸奬二年累封梁國公竇懷貞等將謀逆也知古獨密奏其事及懷貞誅賜實封二百戶物五百段仍以前賞猶薄又手敕曰魏知古去年七月已前屢申啟沃每竭忠誠姦臣有謀預奏其兆事君之節良有可嘉可更賜實封一百戶其年冬令往東都知吏部尚書事深以為稱職手制曰卿以宰臣往知大選官人之委情寄尤切遂能端本革弊忘私徇公正色而行厝心不撓鏡已澈則妍媸必鑒衡已舉則輕重罔違朕遠聞之益用嘉歎今賜卿衣裳一副以示所懷開元元年官名改易改為黃門監二年還京上屢有顧問恩意甚厚尋改紫微令姚崇深忌憚之陰加讒毀乃除工部尚書罷知政事三年卒時年六十九御史大夫宋璟聞而歎曰叔向古之遺直子產古之遺愛能兼之者其在魏公贈幽州都督諡曰忠知古初為黃門侍郎表薦洹水令呂太一蒲州司功參軍齊澣前右內率府騎曹參軍柳澤及知吏部尚書事又擢用密縣尉宋遙左補闕袁暉右補闕封希顏伊闕尉陳希烈後咸累居清要時論以為有知人之鑒文集七卷盧懷慎滑州靈昌人其先家于范陽為山東著姓祖悊為靈昌令因徙焉懷慎少清謹舉進士歷監察御史吏部員外郎景龍中遷右御史臺中丞上疏以陳時政得失今略載其三篇其一曰臣聞孔子曰為邦百年可以勝殘去殺又曰苟有用我者期月而已三年有成故書云三載考績校其功也昔子產相鄭更法令布刑書一年而人歌之曰取我田疇而伍之取我衣冠而褚之孰殺子產吾其與之三年而人又歌之曰我有子弟子產教之我有田疇子產殖之子產而死誰其嗣之終有遺愛流芳史策子產賢者也其為政尚累年而化成況其常材乎臣竊見比來州牧上佐及兩畿縣令下車布政罕終四考在任多者一二年少者三五月遽即遷除不論課最或有歷時未改便傾耳而聽企踵而望爭求冒進不顧廉恥亦何暇為陛下宣風布化求瘼恤人哉禮義未能興行風俗未能齊一戶口所以流散倉庫所以空虛百姓凋弊日更滋甚職為此也何則人知吏之不久則不從其教吏知遷之不遙又不盡其力偷安爵祿但養資望陛下雖勤勞之懷宵衣旰食然僥倖路啟上下相蒙共為苟且而已寧盡至公乎此國之病也昔賈誼所謂蹠盭之病乃小小者耳此弊久而不革臣恐為膏肓雖和緩不能療豈蹠盭而已哉漢宣帝綜覈名實興理致化黃霸良二千石也就增秩賜金以旌其能而不遷於潁川前代之美政也又古之為吏者長子孫倉氏庾氏即其後也書云事不師古以克永代匪說攸聞臣望請諸州都督刺史上佐及兩畿縣令等在任未經四考已上不許遷除察其課効尤異者或錫以車裘或就加祿秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能其政績無聞及犯貪暴者免歸田里以明聖朝賞罰之信則萬方之人一變于道矣致此之美革彼之弊易于反掌陛下何惜而不行哉其二曰臣聞尚書云唐虞稽古建官惟百夏商官倍亦克用乂此省官之義也又云官不必備惟其才又云無曠庶官天工人其代之此為官擇人之義也臣竊見京諸司員外官所在委積多者數餘十倍近古以來未之有也官不必備此則有餘人代天工多不釐務廣有除拜無所裨益俸祿之費歲巨億萬空竭府藏而已豈致理之基哉方今倉庫空虛百姓凋弊河渭漕輓西給京師公私損耗不可勝紀況邊隅未靜兵革猶興節用愛人正在今日增官廣費豈曰其時倘水旱成災租稅減入水衡無貫朽之蓄京庾闕流衍之儲或疆埸外守兵車遠出或收藏無歲賑救在辰此軍國之急務也陛下將何以濟之乎書云無輕人事惟艱無安厥位惟危又云不見是圖此皆慎微之深旨也臣竊見員外官中或簪裾雅望或臺閣舊人或明習憲章或諳閑政要皆一時之良幹也多不司案牘空尸祿俸滯其才而不申其用尊其位而不盡其力周稱多士漢曰得人豈其然歟必有異於此矣臣望請諸司員外官有才能器識衆共聞知堪為州牧縣宰及上佐者并請遷擢使宣力四方申其智効有老病及不堪理務者咸從廢省使賢不肖較然殊貫此濟時之切務也安可謂行之艱哉其三曰臣聞天吏逸德烈於猛火貪人敗類取興大風則知冒于寵賂侮於魚眾寡為政之𢀿莫先茲臣竊見內外官人有不率憲章公犯贓樜侵牟萬姓劓割蒸人鞫按非虛刑憲已及者或俄復舊資雖負殘削之名還膺牧宰之任或江淮嶺磧微示懲貶而徇財黷貨罕能悛革委以共理俟河之清臣聞明主之於萬姓也必暢以平分而無偏施若犯罪之吏作牧遐方便是屈法惠姦恤近遺遠矣凡左降之人鮮能省過必懷自棄長惡滋深則小州遠郡蠻陬夷落何負於聖化獨受其弊政乎昔孟嘗廉明方臨合浦隱之清絜乃莅番禺郅都之鎮靜朔方耿恭之輯寧疏勒誠則遐僻必擇賢良務以寧濟為懷豈以遐荒見隔況邊徼之地夷夏雜處負險恃遠易擾難安彌藉循良以寄綏撫若委失其任官非其才凌虐黎庶侵剝蕃部小則坐致流亡大則起為盜賊由此言之不可用凡材而況於猾吏乎其內外官人有犯贓賄推勘得實者臣望請削迹簪裾十數年間不許齒錄書云旌別淑慝黜陟幽明即其義也若不循此道去邪有疑善政能官甄奬或未之徧擔贓負賄僥倖或即蒙升則賞罰無章沮勸安寄浮競之風轉扇廉恥之行漸隤其源不塞為斯甚疏奏不納累遷黃門侍郎賜爵漁陽伯先天二年與侍中魏知古於東都分掌選事尋徵還同中書門下三品開元三年遷黃門監懷慎與紫微令姚崇對掌樞密懷慎自以為吏道不及崇每事皆推讓之時人謂之伴食宰相四年兼吏部尚書其秋以疾篤累表乞骸骨許之旬日而卒贈荊州大都督諡曰文成懷慎臨終遺表曰臣素無才識叨沐恩榮待罪樞密頗積年序報國之心空知自竭推賢之志終未克申孤負明恩夙夜惶懼臣染疾已久形神欲離鳧鴈之飛未為之少而犬馬之志終祈上聞其鳴也哀乞求聖察宋璟立性公直執心貞固文學足以經務識略期於佐時動惟直道行不苟合聞諸朝野之說實為社稷之臣李傑勤苦絕倫貞介獨立公家之事知無不為幹時之材衆議推許李朝隱操履堅貞才識通贍守文奉法頗懷鐵石之心事上竭誠實盡人臣之節盧從愿清貞謹慎理識周密始終若一朝野共知簡要之才不可多得並明時重器聖代良臣比經任使微有愆失所坐者小所棄者大所累者輕所貶者遠日月雖近譴責傷深望垂矜錄漸加進用臣竊聞黃帝所以垂衣裳而天下理者任風力也帝堯所以光宅天下者任稷契也且朝廷者天下之本賢良者風化之源得人則庶績其凝失士則彝倫攸斁臣每見陛下憂勞庶政勤求理道慎舉羣司必期稱職使鵷鷺成列草澤無遺故得歲稔時和政平訟理此陛下用賢之明効也臣非木石早識天心瞑目不遙厚恩未報黜殯之義敢不庶幾城郢之言思布愚懇上深嘉納之懷慎清儉不營產業器用服飾無金玉綺文之麗所得祿俸皆隨時分散而家無餘蓄妻子匱乏及車駕將幸東都四門博士張星上言懷慎忠清直道終始不虧不加寵贈無以勸善乃下制賜其家物壹伯段米粟貳伯石明年上還京師因校獵於城南經懷慎別業見家人方設祥齋憫其貧匱賜絹百匹仍遣中書侍郎蘇頲為其碑文上自書焉子奐早修整歷任皆以清白聞開元中為中書舍人御史中丞陝州刺史二十四年玄宗幸京師次陝城頓審其能政於廳事題贊而去曰專城之重分陝之雄人多惠愛性實謙冲亦既利物在乎匪躬斯為國寶不墜家風尋除兵部侍郎天寶初為晉陵太守時南海郡利兼水陸瓌寶山積劉巨鱗彭杲相替為太守五府節度皆坐贓鉅萬而死乃特授奐為南海太守遐方之地貪吏斂迹人用安之以為自開元已來四十年廣府節度清白者有四謂宋璟裴伷先李朝隱及奐中使市舶亦不干法加銀青光祿大夫經三年入為尚書右丞卒弟弈亦傳清白歷御史中丞而死王事見忠義傳弈子嵵德宗朝位至宰輔別有傳源乾曜相州臨漳人隋比部侍郎師之孫也父直心高宗時為司刑太常伯坐事配流嶺南而卒乾曜舉進士景雲中累遷諫議大夫時久廢公卿百官三九射禮乾曜上疏曰夫聖王之教天下也必制禮以正人情人情正則孝於家忠於國此道不替所以理也所以君子三年不為禮禮必壞三年不為樂樂必崩竊以古之擇士先觀射禮以明和容之義非取一時之樂夫射者別正邪觀德行中祭祀辟寇戎古先哲王莫不遞襲臣竊見數年已來射禮便廢或緣所司惜費遂令大射有虧臣愚以為所費者財所全者禮故孔子云爾愛其羊我愛其禮今乾坤再闢日月貞明臣望大射之儀春秋不廢聖人之教今古常行則天下幸甚乾曜尋出為梁州都督開元初邠王府僚吏有犯法者上令左右求堪為王府長史者太常卿姜皎薦乾曜公清有吏幹因召見與語乾曜神氣清爽對答皆有倫序上甚悅之乃拜少府少監兼邠王府長史尋遷戶部侍郎兼御史中丞無幾轉尚書左丞四年冬擢拜黃門侍郎同紫微黃門平章事旬日與姚元之俱罷知政事時行幸東都以乾曜為京兆尹仍京師留守乾曜政存寬簡不嚴而理嘗有仗內白鷹因縱遂失所在上令京兆切捕之俄於野外獲之其鷹掛於叢棘而死官吏懼得罪相顧失色乾曜徐曰事有邂逅死亦常理主上仁明當不以此置罪必其獲戾吾自當之不須懼也遂入自請失旨之罪上一切不問之衆咸伏乾曜臨事不懾而能引過在己也在京兆三年政令如一八年春復為黃門侍郎同中書門下三品尋加銀青光祿大夫遷侍中久之上疏曰臣竊見形要之家併求京職俊乂之士多任外官王道平分不合如此臣三男俱是京任望出二人與外官以叶均平之道上從之於是改其子河南府參軍弼為絳州司功太祝絜為鄭尉因下制曰源弼等父在樞近深惟謙挹恐代官之咸列慮時才之未序率先庶僚崇是讓德既請外其職復降資以授傳不云乎晉范宣子讓其下皆讓晉國之人於是大和道之或行仁豈云遠因令文武百僚父子兄弟三人併任京司者任自通容依資次處分由是公卿子弟京官出外者百餘人俄又有上書者以為國之執政同其休戚若不稍加崇寵何以責其盡心十年十一月敕中書門下共食實封三百戶自乾曜及張嘉貞始也乾曜後扈從東封拜尚書左丞相仍兼侍中乾曜在政事十年時張嘉貞張說相次為中書令乾曜不敢與之爭權每事皆推讓之及李元紘杜暹知政事乾曜遂無所參議但唯諾署名而已初乾曜因姜皎所薦遂擢用及皎得罪為張嘉貞所擠乾曜竟不救之議者以此譏焉十七年夏停兼侍中事其秋遷太子少師以祖名師固辭乃拜太子少傅封安陽郡公十九年駕幸東都乾曜以年老辭疾不堪扈從因留京養疾是年冬卒詔贈幽州大都督上於洛城南門舉哀輟朝二日乾曜從孫光裕亦有令譽歷職清謹撫諸弟以友義聞初為中書舍人與楊滔劉令植等同刪定開元新格歷刑部戶部二侍郎尚書左丞累遷鄭州刺史稱為良吏尋卒光裕子洧亦早有美稱閨門雍睦士友推之歷踐清要天寶中為給事中鄭州刺史襄州刺史本道採訪使及安祿山反既犯東京乃以洧為江陵郡大都督府長史本道採訪防禦使攝御史中丞以兵部郎中徐浩為襄州刺史本州防禦守捉使以禦之洧至鎮卒李元紘其先滑州人居京兆之萬年本姓丙氏曾祖粲隋大業中屯衞大將軍屬關中賊起煬帝令粲往京城以西二十四郡逐捕盜賊粲撫循士衆甚得其心及義旗入關粲率其衆歸附拜宗正卿封應國公賜姓李氏高祖與之有舊特蒙恩禮遷為左監門大將軍以年老特令乘馬於宮中檢校年八十餘卒諡曰明祖寬高宗時為太常卿別封隴西郡公父道廣則天時為汴州刺史時屬突厥及契丹寇陷河北兼發河南諸州兵募百姓騷擾道廣寬猛折衷稱為善政存心慰撫汴州獨不逃散尋入為殿中監同鳳閣鸞臺平章事累封金城縣侯卒贈秦州都督諡曰成元紘少謹厚初為涇州司兵累遷雍州司戶時太平公主與僧寺爭碾磑公主方承恩用事百司皆希其旨意元紘遂斷還僧寺竇懷貞為雍州長史大懼太平勢促令元紘改斷元紘大署判後曰南山或可改移此判終無搖動竟執正不撓懷貞不能奪之俄轉好畤令遷潤州司馬所歷咸有聲績開元初三遷萬年縣令賦役平允不嚴而理俄擢為京兆尹尋有詔令元紘疏決三輔諸王公權要之家皆緣渠立磑以害水田元紘令吏人一切毀之百姓大獲其利又歷工部兵部吏部三侍郎十三年戶部侍郎楊瑒白知慎坐支度失所皆出為刺史上令宰臣及公卿已下精擇堪為戶部者多有薦元紘者將授以戶部尚書時執政以其資淺未宜超授加中大夫拜戶部侍郎元紘因條奏人間利害及時政得失以奏之上大悅因賜衣一副絹二百匹明年擢拜中書侍郎同中書門下平章事頃之加銀青光祿大夫賜爵清水男元紘性清儉既知政事稍抑奔競之路務進者頗憚之時初廢京司職田議者請於關輔置屯以實倉廩元紘建議曰軍國不同中外異制若人閑無役地棄不墾發閑人以耕棄地省餽運以實軍糧於是乎有屯田其為益多矣今百官所退職田散在諸縣不可聚也百姓所有私田皆力自耕墾不可取也若置屯田即須公私相換徵發丁夫徵役則業廢於家免庸則賦闕於國內地置屯古所未有得不補失或恐未可其議遂止先是左庶子吳兢舊任史官撰唐書一百卷唐春秋三十卷其書未成以丁憂罷職至是上疏請終其功有詔特令就集賢院修成其書及張說致仕又令在家修史元紘奏曰國史者記人君善惡國政損益一字褒貶千載稱之前賢所難事匪容易今張說在家修史吳兢又在集賢撰錄遂令國之大典散在數處且太宗別置史館在於禁中所以重其職而祕其事也望勒說等就史館參詳撰錄則典冊有憑舊章不墜矣從之乃詔說及吳兢並就史館修撰元紘在政事累年不改第宅僕馬弊劣未曾改飾所得封物皆散之親族右丞相宋璟嘗嘉歎之每謂人曰李侍郎引宋遙之美才黜劉晃之貪冒貴為國相家無儲積雖季文子之德何以加也後與杜暹多所異同情遂不叶至有相執奏者上不悅由是罷知政事出為曹州刺史以疾去官久之拜戶部尚書仍聽致仕二十一年疾瘳起為太子詹事旬日而卒贈太子少傅諡曰文忠杜暹濮州濮陽人也父承志則天初為監察御史時懷州刺史李文暕以皇枝近屬為讎人所告承志推出之俄而文暕得罪承志坐貶授方義令累轉天官員外郎既羅織事起承志恐懼遂稱疾去官而歸卒于家自暹高祖至暹五代同居暹尤恭謹事繼母以孝聞初舉明經補婺州參軍秩滿將歸州吏以紙萬餘張以贈之暹惟受一百餘悉還之時州僚別者見而歎曰昔清吏受一大錢復何異也俄授鄭尉復以清節見知華州司馬楊孚公直士也深賞重之尋而孚遷大理正暹坐公事下法司結罪孚謂人曰若此尉得罪則公清之士何以勸矣特薦之於執政由是擢拜大理評事開元四年遷監察御史仍往磧西覆屯會安西副都護郭虔瓘與西突厥可汗史獻鎮守使劉遐慶等不叶更相執奏詔暹按其事實時暹已迴至涼州承詔復往磧西因入突騎施以究虔瓘等犯狀蕃人齎金以遺暹固辭不受左右曰公遠使絕域不可失蕃人情暹不得已受之埋幕下既去出境乃移牒令收取之蕃人大驚度磧追之不及而止暹累遷給事中丁繼母憂去職十二年安西都護張孝嵩遷為太原尹或薦暹往使安西蕃人伏其清慎深思慕之乃奪情擢拜黃門侍郎兼安西副大都護暹單騎赴職明年于闐王尉遲眺陰結突厥及諸蕃國圖為叛亂暹密知其謀發兵捕而斬之并誅其黨與五十餘人更立君長于闐遂安暹以功特加光祿大夫暹在安西四年綏撫將士不憚勤苦甚得夷夏之心十四年詔暹同中書門下平章事仍遣中使往迎之及謁見又賜絹二百匹馬一匹宅一區後與李元紘不叶罷知政事出為荊州大都督府長史又歷魏州刺史太原尹二十年上幸北都拜暹為戶部尚書便令扈從入京行幸東都詔暹為京留守暹因抽當番衞士繕修三宮增峻城隍躬自巡檢未嘗休懈上聞而嘉之賜敕書曰卿素以清直兼之勤幹自委居守每事多能政肅官僚惠及黎庶城隍宮室隨事修營且有成功不疲人力甚善甚善慰朕懷也俄代李林甫為禮部尚書累封魏縣侯二十八年病卒年六十餘詔贈尚書右丞相暹在家孝友愛撫異母弟昱甚厚然素無學術每當朝談議涉於淺近常以公清勤儉為己任時亦矯情為之弱冠便自誓不受親友贈遺以終其身及卒上甚悼惜之遣中使就家視其喪事內出絹三百匹以賜之尚書省及故吏賻贈者其子孝友遵其素約皆拒而不受太常諡曰貞肅右司員外郎劉同升都官員外郎韋廉以暹有忠孝之美所諡不盡其行建議駁之太常博士裴總執曰杜尚書往以墨縗受職事雖云奉國不得為孝請依舊為定孝友又詣闕陳訴上聞而更令所司詳定竟諡曰貞孝韓休京兆長安人伯父大敏則天初為鳳閣舍人時梁州都督李行褒為部人誣告云有逆謀則天令大敏就州推究或謂大敏曰行褒諸李近屬太后意欲除之忽若失旨禍將不細不可不為身謀也大敏曰豈有求身之安而陷人非罪竟奏雪之則天俄又命御史重覆遂構成其罪大敏坐推反失情與知反不告同罪賜死于家父大智官至洛州司功休早有詞學初應制舉累授桃林丞又舉賢良玄宗時在春宮親問國政休對策與校書郎趙冬曦並為乙第擢授左補闕尋判主爵員外郎歷遷中書舍人禮部侍郎兼知制誥出為虢州刺史時虢州以地在兩京之間駕在京及東都並為近州常被支稅草以納閑休奏請均配餘州中書令張說駁之曰若獨免虢州即當移向他郡牧守欲為私惠國體固不可依又下符不許之休復將執奏僚吏曰更奏必忤執政之意休曰為刺史不能救百姓之弊何以為政必以忤上得罪所甘心也竟執奏獲免歲餘以母艱去職固陳誠乞終禮制許之服闋除工部侍郎仍知制誥遷尚書右丞開元二十一年侍中裴光庭卒上令蕭嵩舉朝賢以代光庭者嵩盛稱休志行遂拜黃門侍郎同中書門下平章事休性方直不務進趨及拜甚允當時之望俄有萬年尉李美玉得罪上特令流之嶺外休進曰美玉卑位所犯又非巨害今朝廷有大姦尚不能去豈得捨大而取小也臣竊見金吾大將軍程伯獻依恃恩寵所在貪冒第宅輿馬僭擬過縱臣請先出伯獻而後罪美玉上初不許之休固爭曰美玉微細猶不容伯獻巨猾豈得不問陛下若不出伯獻臣即不敢奉詔流美玉上以其切直從之初蕭嵩以休柔和易制故薦引之休既知政事多折正嵩遂與休不叶宋璟聞之曰不謂韓休乃能如是仁者之勇也其年夏加銀青光祿大夫十二月轉工部尚書罷知政事二十四年遷太子少師封宜陽子二十七年病卒年六十八贈揚州大都督諡曰文忠寶應元年重贈太子太師子洽洪汯滉皆有學尚風韻高雅洽天寶初為殿中侍御史卒洪為司庫員外郎洽弟渾除大理司直御史大夫王鉷犯法籍沒其家洽兄浩為萬年主簿捕其資財有所容隱為京兆尹鮮于仲通所發配流循州洪汯並坐貶職後遇赦量移洪為華州長史屬安祿山反西京失守洪陷於賊賊授官將見委任洪與浩及汯滉渾同奔山谷以投行在至谷口洪浩渾及洪子四人並為賊所擒併命於通衢洪重交友籍甚於時見者掩涕肅宗聞其重臣子能以忠而死贈太常卿浩贈吏部郎中渾贈太常少卿汯上元中為諫議大夫滉洄別有傳裴耀卿贈戶部尚書守真子也少聰敏數歲解屬文童子舉弱冠拜祕書正字俄補相王府典籤時睿宗在藩甚重之令與掾丘悅文學韋利器更直府中以備顧問府中稱為學直及睿宗升極拜國子主簿開元初累遷長安令長安舊有配戶和市之法百姓苦之耀卿到官一切令出儲蓄之家預給其直遂無姦僦之弊公私甚以為便在職二年寬猛得中及去官縣人甚思詠之十三年為濟州刺史其年車駕東巡州當大路道里綿長而戶口寡弱耀卿躬自條理科配得所時大駕所歷凡十餘州耀卿稱為知頓之最又歷宣冀二州刺史皆有善政入為戶部侍郎二十年禮部尚書信安王禕受詔討契丹詔以耀卿為副俄又令耀卿賫絹二十萬匹分賜立功奚官就部落以給之耀卿謂人曰夷虜貪殘見利忘義今賫持財帛深入寇境不可不為備也乃令先期而往分道互進一朝而給付並畢時突厥及室韋果勒兵邀險謀劫襲之比至而耀卿已還其冬遷京兆尹明年秋霖雨害稼京城穀貴上將幸東都獨召耀卿問救人之術耀卿對曰臣聞前代聖王亦時有憂害更施惠澤活國濟人由是蒼生仰德史冊書美伏以陛下仁聖至深憂勤庶政小有飢乏降情哀矜躬親支計救其危急上玄降鑒當更延福祚是因有小災而增輝聖德也今既大駕東巡百司扈從太倉及三輔先所積貯且隨見在發重臣分道賑給計可支一二年從東都更廣漕運以實關輔待稍充實車駕西還即事無不濟臣以國家帝業本在京師萬國朝宗百代不易之所但為秦中地狹收粟不多倘遇水旱便即匱乏往者貞觀永徽之際祿廩數少每年轉運不過一二十萬石所用便足以此車駕久得安居今國用漸廣漕運數倍於前支猶不給陛下數幸東都以就貯積為國大計不憚劬勞祇為憂人而行豈是故欲來往若能更廣陝運支粟入京倉廩常有三二年糧即無憂水旱今天下輸丁約有四百萬人每丁支出錢百文五十文充營窖等用貯納司農及河南府陝州以充其費租米則各隨遠近任自出脚送納東都從都至陝河路艱險既用陸脚無由廣致若能開通河漕變陸為水則所支有餘動盈萬計且江南租船候水始進吳人不便河漕由是所在停留日月既淹遂生隱盜臣望沿流相次置倉上深然其言尋拜黃門侍郎同中書門下平章事充轉運使語在食貨志凡三年運七百萬石省脚錢三十萬貫或說耀卿請進所省脚錢以明功利耀卿曰此蓋公卿盈縮之利耳不可以之求寵也乃奏充所司和市和糴等錢明年遷侍中二十四年拜尚書左丞相罷知政事累封趙城侯時夷州刺史楊濬犯贓處死詔令杖六十配流古州耀卿上疏諫曰伏以聖恩天覆仁育庶類凡死罪之屬不欲尸諸市朝全其性命流竄而已所以政致刑措獄無冤人曠古以來未有斯美臣愚以為全生免死誠為至化有恥且格為訓將來苟有未安不敢緘默臣以為刺史縣令與諸吏稍別人之父母風化所瞻一為本部長官即合終身致敬決杖者五刑之末只施於抶扑徒隸之間官蔭稍高即免鞭撻令決杖贖死誠則已優解體受笞事頗為辱法至於死天下共之刑至於辱或有所恥況本州刺史百姓所崇一朝對其人吏背脊加杖屈挫拘執人或哀憐忘其免死之恩且有傷心之痛恐非敬官長勸風俗之意又雜犯死罪無杖刑奏報三覆然後行決今非時不覆決杖便發倘獄或未盡又暑熱不耐因杖或死即是促期處分不得順時將欲生之却夭其命又恐非聖明寬宥之意臣前後頻在州縣或緣雜犯決人每大暑盛夏之時決杖多死秋冬已後至有全者伏望凡刺史縣令於本部決杖及夏暑生長之時所定杖刑並乞停減即副陛下好生之德於死者皆有再生之恩俄而特進蓋嘉運破突騎施立功還詔加河西隴右兩節度使仍令經略吐蕃嘉運既承恩寵日夕酣宴不時赴軍耀卿密上疏曰伏見蓋嘉運立功破賊更委兩軍以勇果之才承戰勝之勢吐蕃小醜不足殲夷然臣近日與其同班觀其舉措精勁勇烈誠則有餘言氣矜誇恐難成事莫敖狃於蒲騷之役舉趾稍高春秋書之為懲誡恐其有驕敵之色臣竊憂之入秋防邊日月稍逼接對人吏須識其宜今將撫邊軍未言發日若臨事始去人吏未識雖決在一時恐將非制勝萬全之道況兵未訓練不知禮法人未懷惠士未同心求其忘性命於一時憚嚴刑於少選縱威逼而進因而立功恐非師出以律久長之義又萬人性命決在將軍不得已而行之鑿凶門而即路今酣宴朝夕優渥有餘亦恐非愛人憂國之意不可不察若不可迴換即望速遣進途仍乞聖恩勗以嚴命疏奏上乃促嘉運赴軍竟以無功而還天寶元年改為尚書右僕射尋轉左僕射一歲薨年六十三贈太子太傅諡曰文獻子綜吏部郎中綜子佶佶字弘正幼能屬文弱冠舉進士補校書郎判入高等授藍田尉時有詔命畿內諸縣城奉天時嚴郢為京兆政尚峻暴加以朝旨甚迫尹正之命急如風霆本曹尉韋重規其室方娠而疾畏郢之暴不敢以事故免佶因請代役無愆程當時義之德宗南狩佶詣行在拜拾遺轉補闕李懷光以河中叛朝廷欲以含垢為意佶抗議請討上深器之前席慰勉三遷吏部員外歷駕部兵部郎中遷諫議大夫會黔中觀察使韋士宗慘酷馭下為夷獠所逐俾佶代之酋渠自化其後為瘴毒所侵堅請入覲拜同州刺史徵入為中書舍人遷尚書右丞時兵部尚書李巽兼鹽鐵使將以使局置於本行經構已半會佶拜命堅執以為不可遂令徹之巽恃恩而強時重佶之有守就拜吏部侍郎以疾除國子祭酒尋遷工部尚書致仕元和八年卒年六十二贈吏部尚書佶清勁溫敏凡所定交時稱為第一流與鄭餘慶特相友善佶歿後餘慶行朋友之服搢紳美之史臣曰魏知古盧懷慎源乾曜李元紘杜暹韓休裴耀卿悉蘊器能咸居宰輔或心存啟沃或志在薦賢或出愛子為外官或止屯田於關輔或不受蕃人之賂或堅劾伯獻之姦或廣漕渠以充國用此皆立事立功有足嘉尚者也盧李杜三君子又以清白垂美簡書公孫弘之流也乾曜職當機密無所是非持祿保身焉用彼相贊曰盧魏乾曜弼違進賢裴韓李杜遠財劾姦汗簡書事清風肅然萬歲之後其名不刊
