body:
  text: 舊唐書卷十八上本紀第十八上武宗武宗至道昭肅孝皇帝諱炎穆宗第五子母曰宣懿皇后韋氏元和九年六月十二日生於東宮長慶元年三月封潁王本名開成中加開府儀同三司檢校吏部尚書依百官例逐月給俸料初文宗追悔莊恪太子殂不由道乃以敬宗子陳王成美為皇太子開成四年冬十月宣制未遑冊禮五年正月二日文宗暴疾宰相李王玉知樞密劉弘逸奉密旨以皇太子監國兩軍中尉仇士良魚弘志矯詔迎潁王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬總萬機日釐庶政稽於謨訓謀及大臣用建親賢以貳神器親弟潁王昔在藩邸與朕常同師訓動成儀矩性稟寬仁俾奉昌圖必諧人欲可立為皇太弟應軍國政事便令權勾當百辟卿士中外庶臣宜竭迺心輔成予志陳王成美先立為皇太子以其尚年冲幼未漸師資比日重難不遑冊命迴踐朱邸式協至公可復封陳王是夜士良統兵士於十六宅迎太弟赴少陽院百官謁見於東宮思賢殿三日仇士良收捕仙韶院副使尉遲璋殺之屠其家四日文宗崩宣遺詔皇太弟宜於柩前即皇帝位宰相楊嗣復攝冢宰十四日受冊於正殿時年二十七陳王成美安王溶殂於邸第初楊賢妃有寵於文宗而莊恪太子母王妃失寵怨望為楊妃所譖王妃死太子廢及開成末年帝多疾無嗣賢妃請以安王溶嗣帝謀於宰臣李王玉王玉非之乃立陳王至是仇士良立武宗欲歸功於己乃發安王舊事故二王與賢妃皆死二月制穆宗妃韋氏追謚宣懿皇太后帝之母也上御正殿降德音以開府右軍中尉仇士良封楚國公左軍中尉魚弘志為韓國公太常卿崔鄲戶部尚書判度支崔珙並本官同中書門下平章事敕二月十五日玄元皇帝降生日宜為降聖節休假一日三月詔宮人劉氏王氏並為妃敕朔望入閤對刑法官是日非便宜停五月中書奏六月十二日皇帝載誕之辰請以其日為慶陽節祔宣懿太后于太廟初武宗欲啟穆宗陵祔葬中書門下奏曰園陵已安神道貴靜光陵二十餘載福陵則近又修崇竊惟孝思足彰嚴奉今若再因合祔須啟二陵或慮聖靈不安未合先旨又以陰陽避忌亦有所疑不移福陵實協典禮乃止就舊墳增築名曰福陵又奏准今年二月八日赦文應京諸司勒留官令本處剋留手力雜給與攝官者臣等檢詳諸道正官料錢絕少雜給手力即多今正官勒留亦管公事料錢少於雜給刻下事未得中臣等商量其正官料錢雜給等錢望每貫割留二百文與攝官餘並如舊從之秋七月制檢校禮部尚書華州刺史陳夷行復為中書侍郎同平章事八月十七日葬文宗皇帝于章陵知樞密劉弘逸薛季稜率禁軍護靈駕至陵所二人素為文宗奬遇仇士良惡之心不自安因是掌兵欲倒戈誅士良弘志鹵簿使兵部尚書王起山陵使崔稜覺其謀先諭鹵簿諸軍是日弘逸季稜伏誅門下侍郎同平章事楊嗣復檢校吏部尚書潭州刺史充湖南都團練觀察使中書侍郎同平章事李王玉檢校兵部尚書桂州刺史充桂管防禦觀察等使御史中丞裴夷直為杭州刺史皆坐弘逸季稜黨也易定軍亂逐節度使陳君賞君賞鳩合豪傑數百人復入城盡誅謀亂兵士軍城復安九月以淮南節度使檢校尚書左僕射李德裕為吏部尚書同中書門下平章事尋兼門下侍郎以宣武軍節度使檢校吏部尚書汴州刺史李紳代德裕鎮淮南帝在藩時頗好道術修攝之事是秋召道士趙歸真等八十一人入禁中於三殿修金籙道場帝幸三殿於九天壇親受法籙右拾遺王哲上疏言王業之初不宜崇信過當疏奏不省十一月鹽鐵轉運使奏江淮已南請復稅茶從之魏博節度使何進滔卒三軍推其子重霸知留後事會昌元年正月壬寅朔庚戌有事於郊廟禮畢御丹鳳樓大赦改元二月壬寅以淮南節度使檢校吏部尚書李紳為中書侍郎同平章事中書奏南宮六曹皆有職分各責官業即事不因循近者戶部度支多是諸軍奏請本司郎吏束手閑居今後請祗令本行分判委中書門下簡擇公幹才器相當者轉授從之車駕幸昆明池賜仇士良紀功碑詔右僕射李程為其文三月貶湖南觀察使楊嗣復潮州司馬桂管觀察使李王玉端州司馬杭州刺史裴夷直驩州司戶宰臣李德裕進位司空三月壬申宰相李德裕陳夷行崔珙李紳等奏憲宗皇帝有恢復中興之功請為百代不遷之廟帝曰所論至當續議之事竟不行贈故中書令晉國公裴度太師山南東道蝗害稼造靈符應聖院於龍首池四月辛丑敕憲宗實錄舊本未備宜令史官重修進內其舊本不得注破候新撰成同進時李德裕先請不遷憲宗廟為議者沮之復恐或書其父不善之事故復請改撰實錄朝野非之五月辛未中書門下奏據六典隋置諫議大夫七人從四品上大曆二年升門下侍郎為正三品兩省遂闕四品建官之道有所未周詩云衮職有闕仲山甫補之周漢大臣願入禁闥補過拾遺張衡為侍郎常居帷幄從容諷諫此皆大臣之任故其秩峻其任重則敬其言而行其道況蹇諤之地宜老成之人秩未優崇則難用耆德其諫議大夫望依隋氏舊制升為從四品分為左右以備兩省四品之闕向後與丞郎出入迭用以重其選又御史中丞為大夫之貳緣大夫秩崇官不常置中丞為憲臺之長今寺監少卿少監司業少尹並為寺署之貳皆為四品中丞官名至重見秩未崇望升為從四品從之六月有禿鶖鳥集於禁苑庚子夜五更小流星五十餘旁午流散制以魏博兵馬留後何重霸檢校工部尚書魏州大都督府長史充天雄軍節度使仍賜名重順中書奏請依姚璹故事宰相每月修時政記送史館從之以衡山道士劉玄靖為銀青光祿大夫充崇玄館學士賜號廣成先生令與道士趙歸真於禁中修法籙左補闕劉彥謨上疏切諫貶彥謨為河南府戶曹敕自前中外上封論事有所糾舉則請留中今後並云請付御史臺不得云留中不下如事關軍國理須宥密不在此限如臺司勘當後若得事實必奬奉公苟涉誣必當反問告示中外明知此意七月己巳北方有流星經天良久關東大蝗傷稼襄郢江左大水彗復出室壁之間八月迴鶻烏介可汗遣使告難言本國為黠戞斯所攻故可汗死今部人推為可汗緣本國破散今奉太和公主南投大國時烏介至塞上大首領嗢沒斯與赤心宰相相攻殺赤心率其部下數千帳近西城天德防禦使田牟以聞烏介又令其相頡干迦斯上表借天德城以安公主仍乞糧儲牛羊供給詔金吾大將軍王會宗正少卿李師偃往其牙宣慰令放公主入朝賑粟二萬石九月幽州軍亂逐其帥史元忠推牙將陳行泰為留後三軍上章請符節朝旨未許十月幽州雄武軍使張絳遣軍吏吳仲舒入朝言行泰慘虐不可處將帥之任請以鎮軍加討許之十月誅行泰遂以絳知兵馬使車駕校獵咸陽十一月丁酉朔壬寅夜大星東北流其光燭地有聲如雷山崩石隕其彗起於室凡五十六日而滅太和公主遣使入朝言烏介自稱可汗乞行策命緣初至漠南乞降使宣慰從之十二月中書門下奏修實錄體例舊錄有載禁中之言伏以君上與宰臣公卿言事皆須衆所聞見方可書於史冊且禁中之語在外何知或得之傳聞多涉於浮妄便形史筆實累鴻猷今後實錄中如有此色並請刊削又宰臣與公卿論事行與不行須有明據或奏請允愜必見褒稱或所論乖僻因有懲責在藩鎮上表必有批答居要官啟事者自有著明並須昭然在人耳目或取捨存於堂案或與奪形於詔敕前代史書所載奏議罔不由此近見實錄多載密疏言不彰於朝聽事不顯於當時得自其家未足為信今後實錄所載章奏並須朝廷共知者方得紀述密疏並請不載如此則理必可法人皆向公愛憎之志不行褒貶之言必信從之李德裕奏改修憲宗實錄所載吉甫不善之迹鄭亞希旨削之德裕更此條奏以掩其迹搢紳謗議武宗頗知之二年春正月丙申朔以撫王紘為開府儀同三司幽州大都督府長史充幽州盧龍節度大使以雄武軍使張絳檢校左散騎常侍兼幽州左司馬知兩使留後仍賜名仲武中書奏百官議九宮壇本大祠請降為中祠宰相崔珙陳夷行奏定左右僕射上事儀注二月丙寅中書奏准元和七年敕河東鳳翔鄜坊邠寧等道州縣官令戶部加給課料錢歲六萬二千五百貫吏部出得平留官數百員時以為當自後戶部支給零碎不時觀察使乃別將破用徒有加給不及官人所以選人憚遠不樂注受伏望令部都與實物及時支遣諸道委觀察判官知給受專判此案隨月支給年終計帳申戶部又赴選官人多京債到任填還致其貪求罔不由此今年三銓於前件州府得官者許連狀相保戶部各借兩月加給料錢至支時折下所冀初官到任不帶息債衣食稍足可責清廉從之太子太師致仕蕭俛卒牂柯南詔蠻遣使入朝三月遣使冊迴紇烏介可汗以振武麟勝節度使銀青光祿大夫檢校尚書右僕射單于大都護兼御史大夫彭城郡開國公食邑二千戶劉沔可檢校右僕射兼太原尹北京留守充河東節度管內觀察處置等使代苻澈時迴紇在天德命沔以太原之師討之四月乙丑朔光祿大夫守司空兼門下侍郎平章事李德裕銀青光祿大夫守右僕射門下侍郎平章事崔珙銀青光祿大夫中書侍郎同平章事李紳金紫光祿大夫檢校司徒兼太子太保牛僧孺等上章請加尊號曰仁聖文武至神大孝皇帝戊寅御宣政殿受冊是月九日雨至十四日轉甚乃改用二十三日時有纖人告中尉仇士良言宰相作赦書欲減削禁軍衣糧馬草料士良怒曰必若有此軍人須至樓前作鬧宰相李德裕等知之請開延英訴其事帝曰奸人之詞也召兩軍中尉諭之曰赦書出自朕意不由宰相況未施行公等安得此言士良惶恐謝之是日晴霽中書奏元日御含元殿百官就列唯宰相及兩省官皆未開扇前立於欄檻之內及扇開便侍立於御前三朝大慶萬邦稱賀唯宰相侍臣同介冑武夫竟不拜至尊而退酌於禮意事未得中臣等請御殿日昧爽宰相兩省官鬬班於香案前俟扇開通事贊兩省官再拜拜訖升殿侍立從之天德奏迴紇族帳侵擾部內敕勸課種桑比有敕命如能增數每歲申聞比知並無遵行恣加翦伐列於市賣作薪蒸自今州縣所由切宜禁斷五月敕慶陽節百官率醵外別賜錢三百貫以備素食合宴仍令京兆府供帳不用追集坊市樂人天德軍使田牟奏迴紇大將嗢沒斯與多覽將軍將吏二千六百人請降遣中人齎詔慰勞之宰相李德裕兼守司徒太子太師致仕鄭覃卒六月甲子朔火星犯木丙寅太白犯東井迴紇降將嗢沒斯將吏二千六百餘人至京師制以嗢沒斯檢校工部尚書充歸義軍使封懷化郡王仍賜姓名曰李思忠以迴紇宰相受耶勿為歸義軍副使檢校右散騎常侍賜姓名曰李弘順七月嵐州人田滿川據郡叛劉沔誅之八月迴紇烏介可汗過天德至杷頭烽北俘掠雲朔北川詔劉沔出師守鴈門諸關迴紇首領屈武降幽州授左武衞將軍同正詔以迴紇犯邊漸侵內地或攻或守於理何安令少師牛僧孺陳夷行與公卿集議可否以聞僧孺曰今百僚議狀以固守關防伺其可擊則用兵宰相李德裕議以迴紇所恃者嗢沒赤心耳今已離叛其強弱之勢可見戎人獷悍不顧成敗以失二將乘忿入侵出師急擊破之必矣守險示弱虜無由退擊之為便天子以為然乃徵發許蔡汴滑等六鎮之師以太原節度使劉沔為迴紇南面招討使以張仲武為幽州盧龍節度使檢校工部尚書封蘭陵郡王充迴紇東面招討使以李思忠為河西党項都將迴紇西南面招討使皆會軍於太原制以皇子峴為益王岐為兗王皇長女為昌樂公主第二女為壽春公主第三女永寧公主上御麟德殿見室韋首領督熱論等十五人太原奏迴紇移帳近南四十里索叛將嗢沒斯昨至橫水俘虜兼公主上表言食盡乞賜牛羊事賜烏介詔曰朕自臨寰區為人父母唯以好生為德不願黷武為名故自彼國不幸為黠戞斯所破來投邊境已歷歲年撫納之間無所不至初則念其饑歉給以糧儲旋則知其破傷盡還馬價前後遣使勞問交馳道途小小侵擾亦盡不計今可汗尚此近塞未議還蕃朝廷大臣四方節鎮皆懷疑忿盡請興師雖朕切務含弘亦所未諭一昨數使迴來皆言可汗只待馬價及令付之次又聞所止屢遷或侵掠雲朔等州或劫奪羌渾諸部未知此意終欲如何若以未交馬價須近塞垣行止之間亦宜先告邊將豈有倏來忽往遷徙不常雖云隨逐水草動皆逼近城柵遙揣深意似恃姻好之情每覩蹤由實為馳突之計況到橫水柵下殺戮至多蕃渾牛羊豈吝馳掠黎庶何罪皆被傷夷所以中朝大臣皆云迴紇近塞已是違盟更戮邊人實背大義咸願因此翦逐以雪殂謝之冤然朕志在懷柔情深屈己寧可汗之負德終未忍於幸災石戒直久在京城備知人實憤惋發於誠懇固請自行嘉其深見事機不能違阻可汗審自問遂速擇良圖無至不悛以貽後悔詔太原起室韋沙陀三部落吐渾諸部委石雄為前鋒易定兵千人守大同軍契苾通河清朝領沙陀吐渾六千騎趨天德李思忠率迴紇党項之師屯保大柵十月吐蕃贊普卒遣使論普熱入朝告哀詔將作少監李璟入蕃弔祭帝幸涇陽校獵白鹿原諫議大夫高少逸鄭朗等於閤內論陛下校獵太頻出城稍遠萬機廢弛星出夜歸方今用兵且宜停止上優勞之諫官出謂宰相曰諫官甚要朕時聞其言庶幾減過三年春正月以宿師于野罷元會敕新授銀州刺史本州押蕃落銀川監牧使何清朝可檢校太子賓客左龍武大將軍令分領沙陀吐渾党項之衆赴振武取劉沔處分二月先詔百官之家不得於京城置私廟者其皇城南向六坊不得置其閒僻坊曲即許依舊置太原劉沔奏昨率諸道之師至大同軍遣石雄襲迴鶻牙帳雄大敗迴鶻於殺胡山烏介可汗被創而走已迎得太和公主至雲州是日御宣政殿百僚稱賀制曰夫天之所廢難施繼絕之恩人之所棄當用侮亡之道朕每思前訓豈忘格言迴鶻比者自恃兵強久為桀驁淩虐諸部結怨近鄰黠戞斯潛師彗掃穹居瓦解種族盡膏於原野區落遂至於荊榛今可汗逃走失國竊號自立遠踰沙漠寄命邊陲朕念其衰殘尋加賑卹每陳章表多詐諛之詞接我使臣如全盛之日無傷禽哀鳴之意有困獸猶鬬之心去歲潛入朔川大掠牛馬今春掩襲振武逼近城池可汗皆自率兵首為寇盜不恥破敗莫顧姻親河東節度使劉沔料敵伐謀乘機制勝發胡貉之騎以為前鋒搴翎侯之旗伐彼在穴短兵鏖於帳下元惡抶於彀中況乘匪六飛衆纔一旅儲備已竭計日可擒太和公主居處不同情義久絕懷土多思亟聞黃鵠之歌失位自傷寧免綠衣之歎念其羈苦常軫朕心今已脫於豺狼再見宮闕上以攄宗廟之宿憤次以慰太皇太后之深慈永言歸寧良用欣感其迴紇既以破滅義在翦除宜令諸道兵馬使同進討河東立功將士已下優厚賞給續條疏處分應在京外宅及東都修功德迴紇並勒冠帶各配諸道收管其迴紇及摩尼寺莊宅錢物等並委功德使與御史臺及京兆府各差官點檢收抽不得容諸色人影占如犯者並處極法錢物納官摩尼寺僧委中書門下條疏聞奏以麟州刺史天德行營副使石雄為銀青光祿大夫檢校左散騎常侍豐州刺史御史大夫充豐州西城中城都防禦本管押蕃落等使劉沔檢校尚書左僕射張仲武檢校尚書右僕射餘並如故黠戞斯使注吾合素入朝獻名馬二匹言可汗已破迴鶻迎得太和公主歸國差人送公主入朝愁迴鶻殘衆奪之於路帝遂遣中使送注吾合素往太原迎公主時烏介可汗中箭走投黑車子詔黠戞斯出兵攻之三月太和公主至京師百官班于章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諫卒三軍以從諫姪稹為兵馬留後上表請授節鉞尋遣使齎詔潞府令稹護從諫之喪歸洛陽稹拒朝旨詔中書門下兩省尚書御史臺四品已上武官三品已上會議劉稹可誅可宥之狀以聞五月敕諸道節度使置隨身不得過六十人觀察使不得過四十人經略都護不得過三十人築望仙觀於禁中宰臣百僚進議狀以昆戎未殄塞上用兵不宜中原生事潞府請以親王遙領令稹權知兵馬事以俟邊上罷兵獨李德裕以為澤潞內地前時從諫許襲已是失斷自後跋扈難制規脅朝廷以稹豎子不可復踐前車討之必殄武宗性雄俊曰吾與德裕同之保無後悔自是諫官上疏言不可用兵相繼六月西內神龍寺災左軍中尉楚國公仇士良卒秋七月戊子宰相奏秋色已至將議進軍幽州須早平迴鶻鎮魏須速誅劉稹各須遣使諭旨兼偵三鎮軍情今日延英面奉聖旨欲遣張賈充使臣等續更商量張賈幹濟有才甚諳軍中體勢然性剛負氣慮不安和不如且命李回若以臺綱闕人即兵部侍郎鄭涯久為征鎮判官情甚精敏雖無詞辯言事分明官重事閒最似相稱上曰不如令李回去即遣回奉使三鎮八月壬戌火星自七月蒼赤色動搖井中至是月十六日犯輿鬼萬年縣東市火黠戞斯使諦德伊斯難珠入朝以右僕射平章事陳夷行檢校司空兼河中尹御史大夫充河中節度晉絳慈隰觀察等使九月制定天下者致風俗於大同安生人者齊法度於畫一雖晉之欒趙家有舊勳漢之韓黥身為佐命至于干亂紀律罔不梟夷禁暴除殘古今大義故昭義節度劉悟頃居海岱嘗列爪牙屬師道阻兵王師問罪三面開網一境離心乘此危機遂能歸命憲宗嘉其誠款授以南燕穆宗待以腹心委之上黨招致死士固護一方迨于末年已虧臣節劉從諫生稟戾氣幼習亂風因跋扈之資以專封壤恃紀綱之力以襲兵符暫展執珪之儀終無上綬之請隙駒為喻魏豹姑務於絕河井蛙自居孫述頗聞于恃險誘受亡命妄作妖言中罔朝廷潛圖左道接壤戎帥屢奏陰謀顧髫齔之所矜豈淵魚之是察洎乎沈痼曾靡哀鳴猶駐將盡之魂恣行邪僻之志罔或奮拔自樹狡童中使授醫莫覩其朝服近臣銜命不入於壘門逆節甚明人神共棄其贈官及先所授官爵并劉稹在身官爵宜並削奪成德軍節度使王元逵魏博節度使何弘敬或姻連王室或任重藩維懇陳一至之誠願揚九伐之命吳漢任職受詔而初無辦嚴卜式朴忠未戰而義形於色況成德軍嘗以梟騎橫陣首破朱滔戰氣方酣再迴魯陽之日鼓音不息三周不注之山魏博軍頃以大旆涉河竟殲師道建十二郡之旗鼓以列降人削六十年之厲階盡歸皇化士傳餘勇軍有雄名必能稟酇侯之指縱成葛亮之心伐咨爾二帥朕所注懷元逵可本官充北面招討澤潞使弘敬充東面招討澤潞使曩者列祖在藩先天啟聖符瑞昭晰彩繪煥於泗亭鑾輅巡遊金石刻於代邸實謂可封之俗久為仁壽之鄉寇難以來頗著誠節必非同惡咸許自新其昭義舊將士及百姓等如保初心並赦而不問如能捨逆效順以州郡兵衆歸降者必厚加封賞如能擒送劉稹者別授土地以報勳庸頃隨劉悟鄆州舊將校子孫既有義心宜思改悔如能感喻劉稹束身歸朝必當待之如初特與洗雪爾等舊校亦並酬勞仍委夷行劉沔王茂元各進兵同力攻討其諸道進軍並不得焚燒廬舍發掘墳墓擒執百姓以為俘囚桑麻田苗各許本戶為主罪止元惡務拯生靈於戲蕃維大臣抗疏於外髦俊舊老昌言於朝戒朕以祖宗之法不可私一族刑賞之柄所以正萬邦宜用甲兵陳於原野雖朕以恩不聽而羣臣以義固爭詢自僉謀諒非獲已布告中外明體朕懷仍以徐泗節度使李彥佐為澤潞西南面招討使河陽節度使王茂元以本軍屯萬善彥佐制下後踰月未出師朝廷疑其持重乃以天德軍石雄為彥佐之副劉稹牙將李丕降用為忻州刺史以陳許節度使王宰充澤潞南面招討使河陽節度使王茂元卒贈司徒王宰代茂元總萬善之師十月宰相監修國史李紳兵部郎中史館修撰判館事鄭亞進重修憲宗實錄四十卷頒賜有差晉絳行營副招討石雄奏收賊砦五以河東節度使劉沔檢校司空兼滑州刺史御史大夫充義成軍節度鄭滑濮觀察等使以荊南節度使檢校右僕射同平章事李石可檢校司空平章事兼太原尹北都留守充河東節度管內觀察等使十一月敕中外官員過為繁冗量宜減省以便軍民宜令吏部條疏合減員數以聞十二月王宰奏收天井關榆社行營都將王逢奏兵少乞濟師詔太原軍二千人赴之初劉沔破迴鶻留三千人戍橫水至是李石以太原無兵抽橫水戍卒一千五百人以赴王逢是月二十八日橫水軍至太原請出軍優給舊例每一軍絹二疋時劉沔交代後軍庫無絹石以己絹益之方可人給一疋便催上路軍人以歲將除欲候過歲期既速軍情不悅都頭楊弁乘士卒流怨激之為亂四年春正月乙酉朔以澤潞用兵罷元會其日楊弁逐太原節度使李石敕齋月斷屠出於釋氏國家創業猶近梁隋卿相大臣或沿茲弊鼓刀者既獲厚利糾察者潛受請求正月以萬物生植之初宜斷三日列聖忌斷一日仍准開元二十二年敕三元日各斷三日餘月不禁壬子河東監軍使呂義忠收復太原生擒楊弁盡斬其亂卒百僚稱賀二月甲寅朔丁巳制河中晉絳慈隰等州節度觀察等使中散大夫檢校左散騎常侍河中尹御史大夫上柱國博陵縣開國男食邑三百戶崔元式可檢校禮部尚書兼太原尹北都留守充河東節度觀察等使戊午夜太白犯鎮星辛酉太原送楊弁與其同惡五十四人來獻斬於狗脊嶺三月以晉絳副招討石雄為澤潞西面招討以汾州刺史李丕為副以道士趙歸真為左右街道門教授先生時帝志學神仙師歸真歸真乘寵每對排毀釋氏言非中國之教蠹耗生靈盡宜除去帝頗信之四月王宰進軍攻澤州五月以司農卿薛元賞為京兆尹六月金紫光祿大夫尚書右僕射中書侍郎同平章事判度支崔珙貶澧州刺史癸丑敕諫官論事所見不同連狀署名事同糾率此後凡論公事各隨己見不得連署姓名如有大政奏論即可連署制追削故左軍中尉仇士良先授官及贈官其家財並籍沒士良死後中人於其家得兵仗數千件兼發士良宿罪故也敕責授官銀青光祿大夫澧州刺史上柱國安平郡開國公食邑二千戶崔珙再貶恩州司馬員外置以珙領鹽鐵時欠宋滑院鹽鐵九十萬貫帝令度支鹽鐵轉運合為一使七月以淮南節度使檢校司空杜悰守尚書右僕射兼門下侍郎同平章事仍判度支充鹽鐵轉運等使又制銀青光祿大夫守尚書右僕射兼門下侍郎同平章事監修國史上柱國趙郡開國公食邑二千戶李紳可檢校司空平章事揚州大都督府長史淮南節度副大使知節度事吏部條奏中外合減官員一千一百一十四員王元逵奏邢州刺史裴問別將高元武以城降洺州刺史王釗磁州刺史安玉以城降何弘敬山東三州平潞州大將郭誼張谷陳揚廷遣人至王宰軍請殺稹以自贖王宰以聞乃詔石雄率軍七千入潞州誼斬劉稹首以迎雄澤潞等五州平八月戊戌王宰傳稹首與大將郭誼等一百五十人露布獻於京師上御安福門受俘百僚樓前稱賀以魏博節度使檢校尚書右僕射同平章事何弘敬進封廬江郡開國公食邑二千戶以成德軍節度使王元逵檢校司空兼太子太師同平章事進封太原郡開國公食邑二千戶宰相李德裕守太尉進封衞國公加食邑一千戶以兵部侍郎翰林學士承旨崔鉉為中書侍郎同平章事河東節度使陳夷行卒九月以天德軍使晉絳行營招討使石雄檢校兵部尚書河中尹兼御史大夫河中晉絳慈隰等州節度使以前山南東道節度使盧鈞檢校尚書左僕射潞州大都督府長史充昭義軍節度使澤潞邢洺觀察等使以忠武軍節度陳許蔡等州觀察處置等使河陽行營諸軍招討使金紫光祿大夫檢校尚書右僕射兼御史大夫上柱國太原郡開國公食邑二千戶王宰檢校司空太原尹北都留守充河東節度管內觀察處置等使制曰逆賊郭誼等狐鼠之妖依丘穴而作固牛羊之力得水草而逾兇久從叛臣皆負逆氣劉從諫背德反義掩賊藏姦積其怙亂之謀無非親吏之計劉公直安全慶等各憑地險屢抗王師每肆悖言罔懷革面況郭誼王協聞邢洺歸款懼義旅覆巢賣孽童以圖全據堅城而請命昔伍被詣吏不免就誅延岑出降終亦夷族致之大辟無所愧懷郭誼劉公直王協安全慶李道德李佐堯劉稹稹母阿裴稹弟曹九滿郎君郎妹四娘五娘從兄洪卿漢卿周卿魯卿匡堯張谷男涯解愁陳揚廷弟宣男醜奴張溢男歡郎三寶門客甄戈伎術人郭諗蔣黨李訓兄仲京王涯姪孫羽韓約男茂章茂寶王璠男珪等並處斬于獨柳敕以河陽三城鎮遏使為孟州割澤州隸焉與懷孟澤為節度號河陽制以皇子愕為開府儀同三司夏州刺史朔方軍節度大使時党項叛命親王以制之十月車駕幸鄠縣十一月幸雲陽十二月敕郊禮日近獄囚數多案款已成多有翻覆其兩京天下州府見繫囚已結正及兩度翻案伏款者並令先事結斷訖申時左僕射王起頻年知貢舉每貢院考試訖上榜後更呈宰相取可否後人數不多宰相延英論言主司試藝不合取宰相與奪比來貢舉艱難放人絕少恐非弘訪之道帝曰貢院不會我意不放子弟即太過無論子弟寒門但取實藝耳李德裕對曰鄭肅封敖有好子弟不敢應舉帝曰我比聞楊虞卿兄弟朋比貴勢妨平人道路昨楊知至鄭朴之徒並令落下抑其太甚耳德裕曰臣無名第不合言進士之非然臣祖天寶末以仕進無他伎勉強隨計一舉登第自後不於私家置文選蓋惡其祖尚浮華不根藝實然朝廷顯官須是公卿子弟何者自小便習舉業自熟朝廷間事臺閣儀範班行准則不教而自成寒士縱有出人之才登第之後始得一班一級固不能熟習也則子弟成名不可輕矣五年春正月己酉朔敕造望僊臺於南郊壇時道士趙歸真特承恩禮諫官上疏論之延英帝謂宰臣曰諫官論趙歸真此意要卿等知朕宮中無事屏去聲技但要此人道話耳李德裕對曰臣不敢言前代得失只緣歸真於敬宗朝出入宮掖以此人情不願陛下復親近之帝曰我爾時已識此道人不知名歸真只呼趙鍊師在敬宗時亦無甚過我與之言滌煩爾至於軍國政事唯卿等與次對官論何須問道士非直一歸真百歸真亦不能相惑歸真自以涉物論遂舉羅浮道士鄧元起有長年之術帝遣中使迎之由是與衡山道士劉玄靖及歸真膠固排毀釋氏而拆寺之請行焉宰臣李德裕杜悰李讓夷崔鉉太常卿孫簡等率文武百僚上徽號曰仁聖文武章天成功神德明道皇帝辛亥有事於郊廟禮畢御承天門大赦天下庚申義安太后崩敬宗之母也遺令皇帝三日聽政十三日小祥二十五日大祥二十七日釋服兵部尚書歸融奏事貴得中禮從順變配祔之禮宜有等差請降服期以日易月十二日釋服內外臣僚亦請以其日釋服陵園制度請無降殺從之以前太原節度使檢校司空李石以本官充東都留守二月戊寅朔太白掩昴之北側諫議大夫權知禮部貢舉陳商選士三十七人中第物論以為請託令翰林學士白敏中覆試落張瀆李玗薛忱張覿崔王諶劉伯芻等七人三月崔鉉罷知政事出為陝虢觀察使以御史中丞兼兵部侍郎李回本官同平章事夏四月皇第四女封延慶公主第五女封靖樂公主敕祠部檢括天下寺及僧尼人數大凡寺四千六百蘭若四萬僧尼二十六萬五百宰相杜悰罷知政事以戶部侍郎判戶部崔元式同平章事六月丙子敕漢魏已來朝廷大政必下公卿詳議博求理道以盡羣情所以政必有經人皆向道此後事關禮法羣情有疑者令本司申尚書都省下禮官參議如是刑獄亦先令法官詳議然後申刑部參覆如郎官御史有能駁難或據經史故事議論精當即擢授遷改以奬之如言涉浮華都無經據不在申聞神策奏修望僊樓及廊舍五百三十九間功畢秋七月庚子敕併省天下佛寺中書門下條疏聞奏據令式諸上州國忌日官吏行香於寺其上州望各留寺一所有列聖尊容便令移於寺內其下州寺並廢其上都東都兩街請留十寺寺僧十人敕曰上州合留寺工作精妙者留之如破落亦宜廢毀其合行香日官吏宜於道觀其上都下都每街留寺兩所寺留僧三十人上都左街留慈恩薦福右街留西明莊嚴中書又奏天下廢寺銅像鐘磬委鹽鐵使鑄錢其鐵像委本州鑄為農器金銀鍮石等像銷付度支衣冠士庶之家所有金銀銅鐵之像敕出後限一月納官如違委鹽鐵使依禁銅法處分其土木石等像合留寺內依舊又奏僧尼不合隸祠部請隸鴻臚寺其大秦穆護等祠釋教既已釐革邪法不可獨存其人並勒還俗遞歸本貫充稅戶如外國人送還本處收管八月制朕聞三代已前未嘗言佛漢魏之後像教寖興是由季時傳此異俗因緣染習蔓衍滋多以至於蠹耗國風而漸不覺誘惑人意而衆益迷洎於九州山原兩京城闕僧徒日廣佛寺日崇勞人力於土木之功奪人利於金寶之飾遺君親於師資之際違配偶於戒律之間壞法害人無逾此道且一夫不田有受其飢者一婦不蠶有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣寺宇招提莫知紀極皆雲構藻飾僭擬宮居晉宋齊梁物力凋瘵風俗澆詐莫不由是而致也況我高祖太宗以武定禍亂以文理華夏執此二柄足以經邦豈可以區區西方之教與我抗衡哉貞觀開元亦嘗釐革剗除不盡流衍轉滋朕博覽前言旁求輿議弊之可革斷在不疑而中外誠臣協予至意條疏至當宜在必行懲千古之蠹源成百王之典法濟人利衆予何讓焉其天下所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戶拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩稅戶十五萬人隸僧尼屬主客顯明外國之教勒大秦穆護祅三千餘人還俗不雜中華之風於戲前古未行似將有待及今盡去豈謂無時驅游惰不業之徒已踰十萬廢丹雘無用之室何啻億千自此清淨訓人慕無為之理簡易齊政成一俗之功將使六合黔黎同歸皇化尚以革弊之始日用不知下制明廷宜體予意制第六女封樂溫公主第七女封長寧公主中書奏伏見公主上表稱妾某者伏以臣妾之義取其賤稱家人之禮即宜區別臣等商量公主上表請如長公主之例並云某邑公主幾女上表郡縣主亦望依此例稱謂從之九月火星犯上將十月乙亥中書奏氾水縣武牢關是太宗擒王世充竇建德之地關城東峯有二聖塑容在一堂之內伏以山河如舊城壘猶存威靈皆盛於軒臺風雲疑還於豐沛誠宜百代嚴奉萬邦式瞻西漢故事祖宗嘗行幸處皆令邦國立廟今緣定覺寺例合毀拆望取寺中大殿材木於東峯以造一殿四面置宮牆伏望名為昭武廟以昭聖祖武功之盛委懷孟節度使差判官一人勾當緣聖像年代已久望令李石於東都揀好畫手就增嚴飾初興功日望令東都差分司官一員薦告從之十一月甲辰敕悲田養病坊緣僧尼還俗無人主持恐殘疾無以取給兩京量給寺田賑濟諸州府七頃至十頃各於本管選耆壽一人勾當以充粥料十二月車駕幸咸陽給事中韋弘質上疏論中書權重三司錢穀不合相府兼領宰相奏論之曰臣等昨於延英對恭聞聖旨常欲朝廷尊臣下肅此是陛下深究理本也臣按管子云凡國之重器莫重於令令重則君尊君尊則國安故國安在於尊君尊君在於行令君人之理本莫要于出令故曰虧令者死益令者死不行令者死不從令者死又曰令行于上而下論可不可是上失其威下繫於人也自大和已來其風大弊令出于上非之於下此弊不除無以理國也昨韋弘質所論宰相不合兼領錢穀臣等輒以事體陳聞昔匡衡所以云大臣者國家之股肱萬姓所瞻仰明王所慎擇傳曰下輕其上賤人圖柄則國家搖動而人不靜弘質受人教導輒獻封章是則賤人圖柄矣蕭望之漢朝名儒重德為御史大夫奏云今首歲日月少光罪在臣等上以望之意輕丞相乃下侍中御史詰問貞觀中監察御史陳師合上書云人之思慮有限一人不可兼總數職太宗曰此人妄有毀謗欲離間我君臣流師合於嶺外賈誼云人主如堂羣臣如陛陛高則堂高亦由將相重則君尊其勢然也如宰相姦謀隱匿則人人皆得上論至於制置職業固是人主之柄非小人所得干議古者朝廷之上各守其官思不出位弘質賤人豈得以非所宜言上瀆明主此是輕宰相撓時政也昔東漢處士橫議遂有黨錮事起此事深要懲絕伏望陛下詳其姦詐去其朋徒則朝廷安靜制令肅然臣等不勝感憤之至弘質坐貶官又奏曰天寶已前中書除機密遷授之外其他政事皆與中書舍人同商量自艱難已來務從權便政頗去於臺閣事多繫於軍期決遣萬機不暇博議臣等商量今後除機密公事外諸侯表疏百僚奏事錢穀刑獄等事望令中書舍人六人依故事先參詳可否臣等議而奏聞從之李德裕在相位日久朝臣為其所抑者皆怨之自崔鉉杜悰罷相後中貴人上前言德裕太專上意不悅而白敏中之徒教弘質論之故有此奏而德裕結怨之深由此言也六年春正月癸卯朔丁巳左散騎常侍致仕馮定卒贈工部尚書己未南詔契丹室韋渤海牂柯昆明等國遣使入朝對于麟德殿兵部侍郎判度支盧商奏諸道兵討伐党項今差度支郎官一人往所在有糧料州郡先計度支給從之己丑渤海王子大之萼入朝東都太微宮修成玄元皇帝玄宗肅宗三聖容遣右散騎常侍裴章往東都薦獻監察元壽奏前彭州刺史李鈇買本州龍興寺婢為乳母違法貶隨州長史二月壬申朔癸酉以時雨愆候詔京城天下繫囚除官典犯贓持仗劫殺忤逆十惡外餘罪遞減一等犯輕罪者並釋放征党項行營兵士不得濫有殺傷丁丑左拾遺王龜以父興元節度使起年高乞休官侍養從之是夜月犯畢大星相去三寸庚辰以夏州節度使米暨充東北道招討党項使壬午右庶子呂讓進狀亡兄溫女大和七年嫁左衞兵曹蕭敏生二男開成三年敏心疾乖忤因而離婚今敏日愈却乞與臣姪女配合從之乙酉前太子少保劉沔可太子太保致仕前壽州刺史王鎮貶潞州長史丁亥夜月色少光至一更一點犯熒惑相去四寸後良久其光燭地在軫七度壬辰以翰林學士起居郎孫穀為兵部員外郎充職以旱停上巳曲江賜宴敕比緣錢重幣輕生人轉困今新加鼓鑄必在流行通變救時莫切於此宜申先甲之令以儆居貨之徒京城諸道宜起來年正月已後公私行用並取新錢其舊錢權停三數年如有違犯同用鉛錫錢例科斷其舊錢並沒納又敕諸道鑄錢已有次第須令舊錢流布絹價值稍增文武百僚俸料起三月一日並給見錢一半先給疋段對估時價皆給見錢貶舒州刺史蘇滌為連州刺史滌李宗閔黨前自給事中為德裕所斥累年郡守至是李紳言其無政故也以邠寧節度使高承恭充西南面招討党項使丙申夜月掩牛南星又犯歲星丁酉新羅使金國連入朝辛丑夜東北流星如桃色赤其光燭地尾迹入大角西流穿紫微垣三月壬寅上不豫制改御名炎帝重方士頗服食修攝親受法籙至是藥躁喜怒失常疾既篤旬日不能言宰相李德裕等請見不許中外莫知安否人情危懼是月二十三日宣遺詔以皇太叔光王柩前即位是日崩時年三十三諡曰至道昭肅孝皇帝廟號武宗其年八月葬于端陵德妃王氏祔焉史臣曰開成中王室寖卑政由閽寺及綴衣將變儲位遽移昭肅以孤立維城副茲當璧而能雄謀勇斷振已去之威權運策勵精拔非常之俊傑屬天驕失國潞孽阻兵不惑盈庭之言獨納大臣之計戎車既駕亂略底寧紀律再張聲名復振足以蹈章武出師之迹繼元和戡亂之功然後迂訪道之車築禮神之館棲心玄牝物色幽人將致俗於大庭欲希蹤於姑射於是削浮圖之法懲游惰之民志欲矯步丹梯求珠赤水徒見蕭衍姚興之謬學不悟秦王漢武之非求蓋惑於左道之言偏斥異方之說況身毒西來之教向欲千祀蚩蚩之民習以成俗畏其教甚於國法樂其徒不異登仙如文身祝髮之鄉久習而莫知其醜以吐火吞刀之戲乍觀而便以為神安可正之以咸韶律之以章甫加以笮融何充之佞代不乏人非荀卿孟子之賢誰興正論一朝隳殘金狄燔棄胡書結怨於膜拜之流犯怒於鄙夫之口哲王之舉不駭物情前代存而勿論實為中道欲革斯弊以俟河清昭肅明照聽斯弊矣
