元年改為臨淄郡五載為濟南郡乾元元年復為齊州舊領縣八戶一萬一千五百九十三口六萬一千七百七十一天寶戶六萬二千四百八十五口三十六萬五千九百七十二在京師東北二千六十九里至東都東北一千二百四十四里今管縣六併三縣也歷城漢縣屬濟南郡舊志有平陵縣貞觀十七年齊王祐起兵平陵人不從順遂改為全節元和十年正月以戶口凋殘併全節入歷城縣章丘漢陽丘縣隋為章丘武德二年於平陵縣置譚州領平陵亭山章丘營城四縣八年廢營城入平陵又以廢鄒州之臨濟來屬貞觀元年廢譚州為平陵縣屬齊州章丘亦來屬亭山隋縣元和十五年以戶口凋殘併入章丘縣因廢亭山臨邑漢縣武德元年屬譚州州廢來屬長清隋置屬濟州貞觀十七年屬齊州舊志有豐齊縣古山茌邑也天寶元年改為豐齊元和十五年以戶口凋殘併入長清縣禹城漢祝阿縣天寶元年以為禹城以縣西有禹息故城臨濟漢之菅縣隋為朝陽縣尋改為臨濟縣武德元年於縣置鄒州領臨濟蒲臺高苑長山鄒平五縣八年廢鄒州縣屬譚州州廢屬齊州青州上隋北海郡武德四年置青州總管府管青濰登牟莒密萊乘八州青州領益都臨朐臨淄般陽樂安時水安平等七縣八年省乘濰牟登四州以廢濰州之北海廢乘州之千乘壽光博昌來屬省般陽樂安時水安平四縣貞觀元年罷都督府天寶元年改青州為北海郡乾元元年復為青州舊領縣七戶一萬六百五十八口五萬六千三百一十七天寶戶七萬三千一百四十八口四十萬二千七百四在京師東北二千二百五十里至東都一千五百七里益都漢縣在今壽光縣南十里故益都城是也北齊移入青州城北門外為治所臨淄漢縣治古齊國城久廢隋復置博昌漢縣治故郡城樂安隋縣武德二年屬乘州州廢屬青州總章二年移治於今所壽光漢縣隋移治所於博昌縣初屬乘州州廢來屬千乘漢千乘國後漢改為樂安郡宋齊廢隋置千乘縣武德二年於縣置乘州領千乘博昌壽光新河五縣六年廢新河縣八年乘州廢千乘等縣隸青州臨朐漢縣隋為逢山縣尋復為臨朐屬北海郡北海漢平壽縣隋置北海郡開皇三年罷郡置下密縣於廢郡城大業二年改為北海縣武德二年於縣置濰州領北海連水平壽華池城都下密東陽寒水訾亭濰水汶陽膠東營丘華宛昌安都昌城平等十七縣六年唯留北海營丘下密三縣餘十四縣並廢八年廢濰州仍省營丘下密二縣以北海屬青州淄州上隋齊郡之淄川縣武德元年置淄州領淄川長白萊蕪三縣六年廢長白萊蕪二縣八年又以廢鄒州之長山高苑蒲臺三縣來屬天寶元年復為淄川郡乾元元年復為淄州景龍元年分高苑置濟陽縣又併高苑又割蒲臺隸之後割屬棣州舊領縣五戶六千三百二十三口三萬四千四百二十五天寶戶四萬二千七百三十七口二十萬三千八百二十一在京師東北二千一百三十三里東都東北一千四百二十五里今管縣四併濟陽入高苑淄川郭下漢般陽縣武德初屬淄州長山漢於陵縣武德初屬鄒州州廢屬淄州高苑隋置初屬鄒州州廢來屬景龍元年分置濟陽縣元和十五年併入高苑鄒平漢縣北齊為平原縣隋移治漢鄒平故城因改為鄒平初屬譚州州廢來屬棣州上後漢樂安郡隋渤海郡之厭次縣武德四年置棣州領陽信樂陵河厭次四縣治陽信六年併入滄州貞觀十七年復置棣州於樂陵縣領厭次河陽信三縣又割淄州之蒲臺隸焉而樂陵屬滄州天寶元年改為樂安郡上元元年復為棣州領縣五戶三萬九千一百五十口二十三萬八千一百五十九在京師東北二千二百一十里東都東北一千三百七十里厭次郭下漢富平縣隋屬滄州武德四年改屬棣州六年省棣州復隸滄州貞觀十七年復置棣州厭次還屬河隋縣陽信漢縣屬渤海郡貞觀十七年改屬棣州蒲臺漢漯沃縣隸淄州割屬棣州渤海垂拱四年析蒲臺厭次置萊州中漢東萊郡隋因之武德四年討平綦順置萊州領掖膠水即墨盧鄉昌陽曲城當利曲臺膠東九縣六年廢曲城當利曲臺膠東四縣貞觀元年廢盧鄉割登州之文登廢牟州之黃來屬麟德元年置牟平縣如意元年割黃縣文登牟平置登州天寶元年改萊州為東萊郡乾元元年復為萊州舊領縣六掖黃文登昌陽即墨膠水戶一萬一千五百六十八口六萬三千三百九十六天寶領縣四戶二萬六千九百九十八口七萬一千五百在京師東北二千五百九十九里去東都一千八百五十二里掖州治漢東萊郡也隋置掖縣屬萊州昌陽漢縣置於古昌陽城永徽元年移古縣西北二十三里膠水漢膠東國地隋置縣於古光州因改名膠水即墨漢不其邑也隋置即墨縣登州漢東萊郡之黃縣如意元年分置登州領文登牟平黃三縣以牟平為治所神龍三年改黃縣為蓬萊縣移州治於蓬萊天寶元年以登州為東牟郡乾元元年復為登州天寶領縣四戶二萬二百九十八口一十萬八千九百在京師東三千一百五十里至東都二千七十一里蓬萊漢黃縣屬萊州如意元年於縣置登州神龍三年改為蓬萊移於今所牟平麟德二年分文登置屬萊州如意元年置登州治牟平神龍三年移治所於蓬萊縣文登隋舊縣武德四年置登州領文登觀陽二縣六年以觀陽屬牟州又置清陽廓定二縣屬登州貞觀元年登州及清陽廓定二縣並廢地入文登縣黃漢舊縣神龍三年改為蓬萊縣屬登州以為州治先天元年又割蓬萊置黃縣
