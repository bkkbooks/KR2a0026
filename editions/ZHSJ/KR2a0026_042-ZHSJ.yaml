body:
  text: 舊唐書卷三十八志第十八地理一王者司牧黎元方制天下列井田而底職貢分縣道以控華夷雖皇墳帝典之殊塗禹貢周官之異制其於建侯胙土頒瑞剖符外湊百蠻內親九牧古之元首咸有意焉然子弟受封周室竟貽於衰削郡縣為理秦人不免於敗亡蓋德業有淺深制置無工拙殷周未為得秦漢未為非摭實而言在哲后守成而已謹詳前代隆平之時校今日耗登之數存諸戶籍以志休期昔秦幷天下裂地為四十九郡郡置守尉以御史監之其地西臨洮而北沙漠東縈南帶皆際海濱漢興以秦郡稍大析置郡國武帝斥越攘胡土宇彌廣哀平之季凡郡國百有三縣千三百一十四道三十二侯國二百四十一而諸郡置十三部刺史分統之謂司隸幷荊兗豫揚冀青徐益交涼幽等十三州漢地東西九千三百二里南北一萬二千三百六十八里後漢郡國百有五縣道侯國千一百八十六亦如西京之制置十三州刺史以充郡守其地廣袤亦如前制曹魏之時三分鼎峙淮漢之間鞠為鬬壤洎太康混一尋陷胡戎南北分爭何暇疆理三百年間廢置不一及隋氏平陳寰區一統大業三年改州為郡亦如漢制置司隸刺史以糾郡守大凡隋簿郡百九十縣一千二百五十五戶八百九十萬七千五百三十六口四千六百一萬九千九百五十六其地東西九千三百里南北一萬四千八百一十五里東南皆際大海西至且末北至五原隋氏之極盛也及大業季年羣盜蜂起郡縣淪陷戶口減耗高祖受命之初改郡為州太守並稱刺史其緣邊鎮守及襟帶之地置總管府以統軍戎至武德七年改總管府為都督府自隋季喪亂羣盜初附權置州郡倍於開皇大業之間貞觀元年悉令併省始於山河形便分為十道一曰關內道二曰河南道三曰河東道四曰河北道五曰山南道六曰隴右道七曰淮南道八曰江南道九曰劍南道十曰嶺南道至十三年定簿凡州府三百五十八縣一千五百五十一至十四年平高昌又增二州六縣自北殄突厥頡利西平高昌北踰陰山西抵大漠其地東極海西至焉耆南盡林州南境北接薛延陀界凡東西九千五百一十里南北萬六千九百一十八里高宗時平高麗百濟遼海已東皆為州俄而復叛不入提封景雲二年分天下郡縣置二十四都督府以統之議者以權重不便尋亦罷之開元二十一年分天下為十五道每道置採訪使檢察非法如漢刺史之職京畿採訪使理京師城內都畿理東都城內關內以京官遙領河南理汴州河東理蒲州河北理魏州隴右理鄯州山南東道理襄州山南西道理梁州劍南理益州淮南理揚州江南東道理蘇州江南西道理洪州黔中理黔州嶺南理廣州又於邊境置節度經略使式遏四夷凡節度使十經略守捉使三大凡鎮兵四十九萬人戎馬八萬餘疋每歲經費衣賜則千二十萬疋段軍食則百九十萬石大凡千二百一十萬開元已前每年邊用不過二百萬天寶中至於是數安西節度使撫寧西域統龜茲焉耆于闐疏勒四國安西都護府治所在龜茲國城內管戍兵二萬四千人馬二千七百疋衣賜六十二萬疋段焉耆治所在安西府東八百里于闐在安西府南二千里疏勒在安西府西二千餘里北庭節度使防制突騎施堅昆斬啜管瀚海天山伊吾三軍北庭節度使所治在北庭都護府管兵二萬人馬五千疋衣賜四十八萬疋段突騎施牙帳在北庭府西北三千餘里堅昆在北庭府北七千里東北去斬啜千七百里瀚海軍在北庭府城內管兵萬二千人馬四千二百疋天山軍在西州城內管兵五千人馬五百疋伊吾軍在伊州西北三百里甘露川管兵三千人馬三百疋河西節度使斷隔羌胡統赤水大斗建康寧寇玉門墨離豆盧新泉等八軍張掖交城白亭三守捉河西節度使治在涼州管兵七萬三千人馬萬九千四百疋衣賜歲百八十萬疋段赤水軍在涼州城內管兵三萬三千人馬萬三千疋大斗軍在涼州西二百餘里管兵七千五百人馬二千四百疋建康軍在甘州西二百里管兵五千三百人馬五百疋寧寇軍在涼州東北千餘里玉門軍在肅州西二百里管兵五千二百人馬六百疋墨離軍在瓜州西北千里管兵五千人馬四百疋豆盧軍在沙州城內管兵四千三百人馬四百疋新泉軍在會州西北二百餘里管兵千人張掖守捉在涼州南二里管兵五百人交城守捉在涼州西二百里管兵千人白亭守捉在涼州西北五百里管兵千七百人朔方節度使捍禦北狄統經略豐安定遠西受降城東受降城安北都護振武等七軍府朔方節度使治靈州管兵六萬四千七百人馬四千三百疋衣賜二百萬疋段經略軍理靈州城內管兵二萬七百人馬三千疋豐安軍在靈州西黃河外百八十里管兵八千人馬千三百疋定遠城在靈州東北二百里黃河外管兵七千人馬三千疋西受降城在豐州北黃河外八十里管兵七千人馬千七百疋安北都護府治在中受降城黃河北岸管兵六千人馬二千疋東受降城在勝州東北二百里管兵七千人馬千七百疋振武軍在單于東都護府城內管兵九千人馬千六百疋河東節度使掎角朔方以禦北狄統天兵大同橫野岢嵐等四軍忻代嵐三州雲中守捉河東節度使治太原府管兵五萬五千人馬萬四千疋衣賜歲百二十六萬疋段軍糧五十萬石天兵軍理太原府城內管兵三萬人馬五千五百疋雲中守捉在單于府西北二百七十里管兵七千七百人馬二千疋大同軍在代州北三百里管兵九千五百人馬五千五百疋橫野軍在蔚州東北一百四十里管兵三千人馬千八百疋忻州在太原府北百八十里管兵七千八百人代州至太原府五百里管兵四千人嵐州在太原府西北二百五十里管兵三千人岢嵐軍在嵐州北百里管兵一千人范陽節度使臨制奚契丹統經略威武清夷靜塞恆陽北平高陽唐興橫海等九軍范