body:
  text: 舊唐書卷四十九志第二十九食貨下武德八年十二月水部郎中姜行本請於隴州開五節堰引水通運許之永徽元年薛大鼎為滄州刺史界內有無棣河隋末填廢大鼎奏開之引魚鹽於海百姓歌之曰新河得通舟楫利直達滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被咸亨三年關中飢監察御史王師順奏請運晉絳州倉粟以贍之上委以運職河渭之間舟楫相繼會于渭南自師順始之也大足元年六月於東都立德坊南穿新潭安置諸州租船神龍三年滄州刺史姜師度於薊州之北漲水為溝以備奚契丹之寇又約舊渠傍海穿漕號為平虜渠以避海難運糧開元二年河南尹李傑奏汴州東有梁公堰年久堰破江淮漕運不通發汴鄭丁夫以濬之省功速就公私深以為利十五年正月令將作大匠范安及檢行鄭州河口斗門先是洛陽人劉宗器上言請塞汜水舊汴河口於下流滎澤界開梁公堰置斗門以通淮汴擢拜左衞率府冑曹至是新漕塞行舟不通貶宗器焉安及遂發河南府懷鄭汴滑三萬人疏決開舊河口旬日而畢十八年宣州刺史裴耀卿上便宜事條曰江南戶口稍廣倉庫所資惟出租庸更無征防緣水陸遙遠轉運艱辛功力雖勞倉儲不益竊見每州所送租及庸調等本州正二月上道至揚州入斗門即逢水淺已有阻礙須留一月已上至四月已後始渡淮入汴多屬汴河乾淺又般運停留至六七月始至河口即逢黃河水漲不得入河又須停一兩月待河水小始得上河入洛即漕路乾淺船艘隘鬧般載停滯備極艱辛計從江南至東都停滯日多得行日少糧食既皆不足欠折因此而生又江南百姓不習河水皆轉雇河師水手更為損費伏見國家舊法往代成規擇制便宜以垂長久河口元置武牢倉江南船不入黃河即於倉內便貯鞏縣置洛口倉從黃河不入漕洛即於倉內安置爰及河陽倉柏崖倉太原倉永豐倉渭南倉節級取便例皆如此水通則隨近運轉不通即且納在倉不滯遠船不憂久耗比於曠年長運利便一倍有餘今若且置武牢洛口等倉江南船至河口即却還本州更得其船充運幷取所減脚錢更運江淮變造義倉每年剩得一二百萬石即望數年之外倉廩轉加其江淮義倉下濕不堪久貯若無船可運三兩年色變即給貸費散公私無益疏奏不省至二十一年耀卿為京兆尹京師雨水害稼穀價踊貴玄宗以問耀卿奏稱昔貞觀永徽之際祿廩未廣每歲轉運不過二十萬石便足今國用漸廣漕運數倍猶不能支從都至陝河路艱險既用陸運無由廣致若能兼河漕變陸為水則所支有餘動盈萬計且江南租船候水始進吳人不便漕輓由是所在停留日月既淹遂生竊盜臣望於河口置一倉納江東租米便放船歸從河口即分入河洛官自雇船載運三門之東置一倉三門既水險即於河岸開山車運十數里三門之西又置一倉每運至倉即般下貯納水通即運水細便止自太原倉泝河更無停留所省鉅萬前漢都關中年月稍久及隋亦在京師緣河皆有舊倉所以國用常贍上深然其言至二十二年八月置河陰縣及河陰倉河西柏崖倉三門東集津倉三門西鹽倉開三門山十八里以避湍險自江淮而泝鴻溝悉納河陰倉自河陰送納含嘉倉又送納太原倉謂之北運自太原倉浮于渭以實關中上大悅尋以耀卿為黃門侍郎同中書門下平章事充江淮河南轉運都使以鄭州刺史崔希逸河南少尹蕭炅為副凡三年運七百萬石省陸運之傭四十萬貫舊制東都含嘉倉積江淮之米載以大輿而西至于陝三百里率兩斛計傭錢千此耀卿所省之數也明年耀卿拜侍中而蕭炅代焉二十五年運米一百萬石二十九年陝郡太守李齊物鑿三門山以通運闢三門巔踰巖險之地俾負索引艦升于安流自齊物始也天寶三載韋堅代蕭炅以滻水作廣運潭於望春樓之東而藏舟焉是年楊釗以殿中侍御史為水陸運使以代韋堅先是米至京師或砂礫糠粃雜乎其間開元初詔使揚擲而較其虛實揚擲之名自此始也十四載八月詔水陸運宜停一年天寶以來楊國忠王鉷皆兼重使以權天下肅宗初第五琦始以錢穀得見請於江淮分置租庸使市輕貨以救軍食遂拜監察御史為之使乾元元年加度支郎中尋兼中丞為鹽鐵使於是始大鹽法就山海井竈收榷其鹽立監院官吏其舊業戶洎浮人欲以鹽為業者免其雜役隸鹽鐵使常戶自租庸外無橫賦人不益稅而國用以饒明年琦以戶部侍郎同平章事詔兵部侍郎呂諲代之寶應元年五月元載以中書侍郎代呂諲是時淮河阻兵飛輓路絕鹽鐵租賦皆泝漢而上以侍御史穆寧為河南道轉運租庸鹽鐵使尋加戶部員外遷鄂州刺史以總東南貢賦是時朝議以寇盜未戢關東漕運宜有倚辦遂以通州刺史劉晏為戶部侍郎京兆尹度支鹽鐵轉運使鹽鐵兼漕運自晏始也二年拜吏部尚書同平章事依前充使晏始以鹽利為漕傭自江淮至渭橋率十萬斛傭七千緡補綱吏督之不發丁男不勞郡縣蓋自古未之有也自此歲運米數千萬石自淮北列置巡院搜擇能吏以主之廣牢盆以來商賈凡所制置皆自晏始廣德二年正月復以第五琦專判度支鑄錢鹽鐵事而晏以檢校戶部尚書為河南及江淮已來轉運使及與河南副元帥計會開決汴河永泰二年晏為東道轉運常平鑄錢鹽鐵使琦為關內河東劍南三川轉運常平鑄錢鹽鐵使大曆五年詔停關內河東三川轉運常平鹽鐵使自此晏與戶部侍郎韓滉分領關內河東山劍租庸青苗使至十四年天下財賦皆以晏掌之建中初宰相楊炎用事尤惡劉晏炎乃奪其權詔曰朕以征稅多門郡邑凋耗聽于羣議思有變更將致時雍宜遵古制其江淮米準旨轉運入京者及諸軍糧儲宜令庫部郎中崔河圖權領之今年夏稅以前諸道財賦多輸京者及鹽鐵財貨委江州刺史包佶權領之天下錢穀皆歸金部倉部委中書門下簡兩司郎官準格式條理尋貶晏為忠州刺史晏既罷黜天下錢穀歸尚書省既而出納無所統乃復置使領之其年三月以韓洄為戶部侍郎判度支金部郎中杜佑權勾當江淮水陸運使炎尋殺晏于忠州自兵興已來凶荒相屬京師米斛萬錢官廚無兼時之食百姓在畿甸者拔穀挼穗以供禁軍洎晏掌國計復江淮轉運之制歲入米數十萬斛以濟關中代第五琦領鹽務其法益密初年入錢六十萬季年則十倍其初大曆末通天下之財而計其所入總一千二百萬貫而鹽利過半李靈耀之亂河南皆為盜據不奉法制賦稅不上供州縣益減晏以羨餘相補人不加賦所入仍舊議者稱之其相與商榷財用之術者必一時之選故晏沒後二十年韓洄元琇裴腆包佶盧貞李衡相繼分掌財賦出晏門下屬吏在千里外奉教如目前四方水旱及軍府纖芥莫不先知焉其年詔曰天下山澤之利當歸王者宜總榷鹽鐵使三年以包佶為左庶子汴東水陸運鹽鐵租庸使崔縱為右庶子汴西水陸運鹽鐵租庸使四年度支侍郎趙贊議常平事竹木茶漆盡稅之茶之有稅肇於此矣貞元元年元琇以御史大夫為鹽鐵水陸運使其年七月以尚書右僕射韓滉統之滉歿宰相竇參代之五年十二月度支轉運鹽鐵奏比年自揚子運米皆分配緣路觀察使差長綱發遣運路既遠實謂勞人今請當使諸院自差綱節級般運以救邊食從之八年詔東南兩稅財賦自河南江淮嶺南山南東道至于渭橋以戶部侍郎張滂主之河東劍南山南西道以戶部尚書度支使班宏主之今戶部所領三川鹽鐵轉運自此始也其後宏滂互有短長宰相趙憬陸贄以其事上聞由是遵大曆故事如劉晏韓滉所分焉九年張滂奏立稅茶法自後裴延齡專判度支與鹽鐵益殊塗而理矣十年潤州刺史王緯代之理于朱方數年而李錡代之鹽院津堰改張侵剝不知紀極私路小堰厚斂行人多自錡始時鹽鐵轉運有上都留後以副使潘孟陽主之王叔文權傾朝野亦以鹽鐵副使兼學士為留後順宗即位有司重奏鹽法以杜佑判鹽鐵轉運使理於揚州元和二年三月以李巽代之先是李錡判使天下榷酤漕運由其操割專事貢獻牢其寵渥中朝柄事者悉以利積於私室而國用日耗巽既為鹽鐵使大正其事其堰埭先隸浙西觀察使者悉歸之因循權置者盡罷之增置河陰敖倉置桂陽監鑄平陽銅山為錢又奏江淮河南峽內兗鄆嶺南鹽法監院去年收鹽價緡錢七百二十七萬比舊法張其估一千七百八十餘萬非實數也今請以其數除之外付度支收其數鹽鐵使鹽利繫度支自此始也又以程异為揚子留後四月五日巽卒自榷筦之興惟劉晏得其術而巽次之然初年之利類晏之季年季年之利則三倍於晏矣舊制每歲運江淮米五十萬斛至河陰留十萬四十萬送渭倉晏歿久不登其數惟巽秉使三載無升斗之闕焉六月以河東節度使李鄘代之五年李鄘為淮南節度使以宣州觀察使盧坦代之六年坦奏每年江淮運米四十萬石到渭橋近日欠闕太半請旋收糴遞年貯備從之坦改戶部侍郎以京兆尹王播代之播遂奏元和五年江淮河南嶺南峽中兗鄆等鹽利錢六百九十八萬貫比量改法已前舊鹽利時價四倍虛估即此錢為一千七百四十餘萬貫矣請付度支收管從之其年詔曰兩稅之法悉委郡國初極便人但緣約法之時不定物估今度支鹽鐵泉貨是司各有分巡置於都會爰命帖職周視四方簡而易從庶叶權便政有所弊事有所宜皆得舉聞副我憂寄以揚子鹽鐵留後為江淮已南兩稅使江陵留後為荊衡漢沔東界彭蠡已南兩稅使度支山南西道分巡院官充三川兩稅使峽內煎鹽五監先屬鹽鐵使今宜割屬度支便委山南西道兩稅使兼知糶賣峽內鹽屬度支自此始也七年王播奏去年鹽利除割峽內鹽收錢六百八十五萬從實估也又奏商人於戶部度支鹽鐵三司飛錢謂之便換八年以崔倰為揚子留後淮嶺已來兩稅使崔祝為江陵留後為荊南已來兩稅使十三年正月播又奏以軍興之時財用是切頃者劉晏領使皆自按置租庸至於州縣否臧錢穀利病之物虛實皆得而知今臣守務在城不得自往請令臣副使程异出巡江淮其州府上供錢穀一切勘問從之閏五月异至江淮得錢一百八十五萬貫以進其年以播守禮部尚書以衞尉卿程异代之十四年异卒以刑部侍郎柳公綽代之長慶初王播復代公綽四年王涯以戶部侍郎代播敬宗初播復以鹽鐵使為揚州節度使文宗即位入覲以宰相判使其後王涯復判二使表請使茶山之人移植根本舊有貯積皆使焚棄天下怨之九年涯以事誅而令狐楚以戶部尚書右僕射主之以是年茶法大壞奏請付州縣而入其租于戶部人人悅焉開成元年李石以中書侍郎判收茶法復貞元之制也三年以戶部尚書同平章事楊嗣復主之多革前監院之陳事開成三年至大中壬申凡一十五年多任以元臣以集其務崔珙自刑部尚書拜杜悰以淮南節度領之既而皆踐公台薛元賞李執方盧弘正馬植敬晦五人於九年之中相踵理之植亦自是居相位大中五年二月以戶部侍郎裴休為鹽鐵轉運使明年八月以本官平章事依前判使始者漕米歲四十萬斛其能至渭倉者十不三四漕吏狡蠹敗溺百端官舟之沉多者歲至七十餘隻緣河姦犯大紊晏法休使僚屬按之委河次縣令董之自江津達渭以四十萬斛之傭計緡二十八萬悉使歸諸漕吏巡院胥吏無得侵牟舉之為法凡十事奏之六年五月又立稅茶之法凡十二條陳奏上大悅詔曰裴休興利除害深見奉公盡可其奏由是三歲漕米至渭濱積一百二十萬斛無升合沉棄焉武德元年九月四日置社倉其月二十二日詔曰特建農圃本督耕耘思俾齊民既康且富鍾庾之量冀同水火宜置常平監官以均天下之貨市肆騰踊則減價而出田穡豐羨則增糴而收庶使公私俱濟家給人足抑止兼幷宣通壅滯至五年十二月廢常平監官貞觀二年四月尚書左丞戴冑上言曰水旱凶災前聖之所不免國無九年儲畜禮經之所明誡今喪亂之後戶口凋殘每歲納租未實倉廩隨時出給纔供當年若有凶災將何賑卹故隋開皇立制天下之人節級輸粟多為社倉終於文皇得無饑饉及大業中年國用不足並貸社倉之物以充官費故至末塗無以支給今請自王公已下爰及衆庶計所墾田稼穡頃畝至秋熟準其見在苗以理勸課盡令出粟稻麥之鄉亦同此稅各納所在為立義倉若年穀不登百姓飢饉當所州縣隨便取給太宗曰既為百姓預作儲貯官為舉掌以備凶年非朕所須橫生賦斂利人之事深是可嘉宜下所司議立條制戶部尚書韓仲良奏王公已下墾田畝納二升其粟麥粳稻之屬各依土地貯之州縣以備凶年可之自是天下州縣始置義倉每有飢饉則開倉賑給以至高宗則天數十年間義倉不許雜用其後公私窘迫漸貸義倉支用自中宗神龍之後天下義倉費用向盡高宗永徽二年六月敕義倉據地收稅實是勞煩宜令率戶出粟上上戶五石餘各有差六年京東西二市置常平倉明慶二年十二月京常平倉置常平署官員開元二年九月敕天下諸州今年稍熟穀價全賤或慮傷農常平之法行之自古宜令諸州加時價三兩錢糴不得抑斂仍交相付領勿許懸欠蠶麥時熟穀米必貴即令減價出糶豆穀等堪貯者熟亦準此以時出入務在利人其常平所須錢物宜令所司支料奏聞四年五月二十一日詔諸州縣義倉本備飢年賑給近年已來每三年一度以百姓義倉糙米遠赴京納仍勒百姓私出脚錢自今已後更不得義倉變造七年六月敕關內隴右河南河北五道及荊揚襄夔綿益彭蜀漢劍茂等州並置常平倉其本上州三千貫中州二千貫下州一千貫十六年十月敕自今歲普熟穀價至賤必恐傷農加錢收糴以實倉廩縱逢水旱不慮阻飢公私之間或亦為便宜令所在以常平本錢及當處物各於時價上量加三錢百姓有糶易者為收糴事須兩和不得限數配糴訖具所用錢物及所糴物數申所司仍令上佐一人專勾當天寶六載三月太府少卿張瑄奏準四載五月幷五載三月敕節文至貴時賤價出糶賤時加價收糴若百姓未辦錢物者任準開元二十年七月敕量事賒糶至粟麥熟時徵納臣使司商量且糶舊糴新不同別用其賒糶者至納錢日若粟麥雜種等時價甚賤恐更迴易艱辛請加價便與折納廣德二年正月第五琦奏每州常平倉及庫使司商量置本錢隨當處米物時價賤則加價收糴貴則減價糶賣建中元年七月敕夫常平者常使穀價如一大豐不為之減大儉不為之加雖遇災荒人無菜色自今已後忽米價貴時宜量出官米十萬石麥十萬石每日量付兩市行人下價糶貨三年九月戶部侍郎趙贊上言曰伏以舊制置倉儲粟名曰常平軍興已來此事闕廢或因凶荒流散餓死相食者不可勝紀古者平準之法使萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏春以奉耕夏以奉耘雖有大賈富家不得豪奪吾人者蓋謂能行輕重之法也自陛下登極以來許京城兩市置常平官糴鹽米雖經頻年少雨米價未騰貴此乃即目明驗實要推而廣之當軍興之時與承平或異事須兼儲布帛以備時須臣今商量請於兩都幷江陵成都揚汴蘇洪等州府各置常平輕重本錢上至百萬貫下至數十萬貫隨其所宜量定多少唯貯斛斗疋段絲麻等候物貴則下價出賣物賤則加價收糴權其輕重以利疲人從之贊於是條奏諸道津要都會之所皆置吏閱商人財貨計錢每貫稅二十天下所出竹木茶漆皆十一稅之以充常平本時國用稍廣常賦不足所稅亦隨時而盡終不能為常平本貞元八年十月敕諸軍鎮和糴貯備共三十三萬石價之外更量與優饒其粟及麻據米數準折虛價直委度支以停江淮運脚錢充並支綾絹絁綿勿令折估所糴粟等委本道節度使監軍同勾當別貯非承特敕不得給用十四年六月詔以米價稍貴令度支出官米十萬石於兩街賤糶其年九月以歲飢出太倉粟三十萬石出糶是歲冬河南府穀貴人流令以含嘉倉粟七萬石出糶十五年二月以久旱歲飢出太倉粟十八萬石於諸縣賤糶元和元年正月制歲時有豐歉穀價有重輕將備水旱之虞在權聚斂之術應天下州府每年所稅地子數內宜十分取二分均充常平倉及義倉仍各逐穩便收貯以時出糶務在救人賑貸所宜速奏六年二月制如聞京畿之內舊穀已盡宿麥未登宜以常平義倉粟二十四萬石貸借百姓諸道州府有乏少糧種處亦委所在官長用常平義倉米借貸淮南浙西宣歙等道元和二年四月賑貸並且停徵容至豐年然後填納九年四月詔出太倉粟七十萬石開六場糶之幷賑貸外縣百姓至秋熟徵納便於外縣收貯以防水旱十二年四月詔出粟二十五萬石分兩街降估出糶其年九月詔諸道應遭水州府河中澤潞河東幽州江陵府等管內及鄭滑滄景易定陳許晉隰蘇襄復台越唐隨鄧等州人戶宜令本州厚加優恤仍各以當處義倉斛斗據所損多少量事賑給十三年正月戶部侍郎孟簡奏天下州府常平義倉等斛斗請準舊例減估出糶但以石數奏申有司更不收管州縣得專達以利百姓從之長慶四年二月敕出太倉陳粟三十萬石於兩街出糶其年三月制曰義倉之制其來日久近歲所在盜用沒入致使小有水旱生人坐委溝壑永言其弊職此之由宜令諸州錄事參軍專主勾當苟為長吏迫制即許驛表上聞考滿之日戶部差官交割如無欠負與減一選如欠少者量加一選欠數過多戶部奏聞節級科處大和四年八月敕今年秋稼似熟宜於關內七州府及鳳翔府和糴一百萬石大中六年四月戶部奏諸州府常平義倉斛斗本防水旱賑貸百姓其有災沴州府地遠申奏往復已至流亡自今已後諸道遭災旱請委所在長吏差清強官審勘如實有水旱處便任先從貧下不支濟戶給貸從之建中四年六月戶部侍郎趙贊請置大田天下田計其頃畝官收十分之一擇其上腴樹桑環之曰公桑自王公至于匹庶差借其力得穀絲以給國用詔從其說贊熟計之自以為非便皆寢不下復請行常平稅茶之法又以軍須迫蹙常平利不時集乃請稅屋間架算除陌錢間架法凡屋兩架為一間屋有貴賤約價三等上價間出錢二千中價一千下價五百所由吏秉算執籌入人之廬舍而計其數衣冠士族或貧無他財獨守故業坐多屋出算者動數十萬人不勝其苦凡沒一間者杖六十告者賞錢五十貫取於其家除陌法天下公私給與貨易率一貫舊算二十益加算為五十給與他物或兩換者約錢為率算之市牙各給印紙人有買賣隨自署記翌日合算之有自貿易不用市牙者驗其私簿無私簿者投狀自集其有隱錢百者沒入二千杖六十告者賞十千取其家資法既行而主人市牙得專其柄率多隱盜公家所入曾不得半而怨讟之聲囂然滿於天下至興元二年正月一日赦悉停罷貞元九年正月初稅茶先是諸道鹽鐵使張滂奏曰伏以去歲水災詔令減稅今之國用須有供儲伏請於出茶州縣及茶山外商人要路委所由定三等時估每十稅一充所放兩稅其明年以後所得稅外貯之若諸州遭水旱賦稅不辦以此代之詔可之仍委滂具處置條奏自此每歲得錢四十萬貫然稅無虛歲遭水旱處亦未嘗以錢拯贍大和七年御史臺奏伏準大和三年十一月十八日赦文天下除兩稅外不得妄有科配其擅加雜榷率一切宜停令御史臺嚴加察訪者臣昨因嶺南道擅置竹綀場稅法至重害人頗深伏請起今已後應諸道自大和三年準赦文所停兩稅外科配雜榷率等復却置者仰敕至後十日內具却置事由聞奏仍申臺司每有出使郎官御史便令嚴加察訪苟有此色本判官重加懲責長吏奏聽進止從之九年十二月左僕射令狐楚奏新置榷茶使額伏以江淮間數年以來水旱疾疫凋傷頗甚愁歎未平今夏及秋稍較豐稔方須惠恤各使安存昨者忽奏榷茶實為𢀿政蓋是王涯破滅將至怨怒合歸豈有令百姓移茶樹就官場中栽摘茶葉於官場中造有同兒戲不近人情方有恩權無敢沮議朝班相顧而失色道路以目而吞聲今宗社降靈姦兇盡戮聖明垂佑黎庶各安微臣伏蒙天恩兼授使務官銜之內猶帶此名俯仰若驚夙宵知愧伏乞特迴聖聽下鑒愚誠速委宰臣除此使額緣國家之用或闕山澤之利有遺許臣條流續具奏聞採造欲及妨廢為虞前月二十一日內殿奏對之次鄭覃與臣同陳論訖伏望聖慈早賜處分一依舊法不用新條惟納榷之時須節級加價商人轉撎必較稍貴即是錢出萬國利歸有司既無害茶商又不擾茶戶上以彰陛下愛人之德下以竭微臣憂國之心遠近傳聞必當咸悅詔可之先是鹽鐵使王涯表請使茶山之人移植根本舊有貯積皆使焚棄天下怨之及是楚主之故奏罷焉開成二年十二月武寧軍節度使薛元賞奏泗口稅場應是經過衣冠商客金銀羊馬斛斗見錢茶鹽綾絹等一物已上並稅今商量其雜稅並請停絕詔許之大中六年正月鹽鐵轉運使裴休奏諸道節度觀察使置店停上茶商每斤收搨地錢幷稅經過商人頗乖法理今請釐革橫稅以通舟船商旅既安課利自厚今又正稅茶商多被私販茶人侵奪其利今請強幹官吏先於出茶山口及廬壽淮南界內布置把捉曉諭招收量加半稅給陳首帖子令其所在公行從此通流更無苛奪所冀招恤窮困下絕姦欺使私販者免犯法之憂正稅者無失利之歎欲尋究根本須舉綱條敕旨依奏其年四月淮南及天平軍節度使幷浙西觀察使皆奏軍用困竭伏乞且賜依舊稅茶敕旨裴休條流茶法事極精詳制置之初理須畫一並宜準今年正月二十六日敕處分建中三年初榷酒天下悉令官釀斛收直三千米雖賤不得減二千委州縣綜領醨薄私釀罪有差以京師王者都特免其榷元和六年六月京兆府奏榷酒錢除出正酒戶外一切隨兩稅青苗據貫均率從之會昌六年九月敕揚州等八道州府置榷麴幷置官店沽酒代百姓納榷酒錢幷充資助軍用各有榷許限揚州陳許汴州襄州河東五處榷麴浙西浙東鄂岳三處置官沽酒如聞禁止私酤過於嚴酷一人違犯連累數家閭里之間不免咨怨宜從今以後如有人私沽酒及置私麴者但許罪止一身幷所由容縱任據罪處分鄉井之內如不知情並不得追擾其所犯之人任用重典兼不得沒入家產
