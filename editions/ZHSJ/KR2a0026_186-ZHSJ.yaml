body:
  text: 舊唐書卷一百八十二列傳第一百三十二王重榮子珂王處存弟處直諸葛爽高駢畢師鐸秦彥時溥朱瑄弟瑾王重榮河中人父縱鹽州刺史咸通中有邊功重榮以父蔭補軍校與兄重盈俱號驍雄名讋軍中廣明初重榮為河中馬步軍都虞候巢賊據長安蒲帥李都不能拒稱臣於賊賊偽授重榮節度副使河中密邇京師賊徵求無已軍府疲於供億賊使百輩填委傳舍重榮謂都曰吾以外援未至詭謀附賊以紓難今軍府積實苦被徵求復來收兵是賊危我也倘不改圖危亡必矣請絕橋道嬰城自固都曰吾兵微力寡絕之立見其患唯公圖之願以節鉞假公翌日都歸行在重榮知留後事乃斬賊使求援鄰藩既而賊將朱溫舟師自同州至黃鄴之兵自華陰至數萬攻之重榮戒勵士衆大敗之獲其兵仗軍聲益振朝廷遂授節鉞檢校司空時中和元年夏也俄而忠武監軍楊復光率陳蔡之師萬人與重榮合賊將李祥守華州重榮合勢攻之擒祥以徇俄而朱溫以同州降賊既失同華狂躁益熾黃巢自率精兵數萬至梁田坡時重榮軍華陰南楊復光在渭北掎角破賊出其不意大敗賊軍獲其將趙璋巢中流矢而退而重榮之師亡耗殆半懼賊復來深憂之謂復光曰軍雖小捷銳旅亡失萬一賊黨復來其將何軍以應吾之成敗未可知也復光曰鴈門李僕射與僕家世事舊其尊人與僕父兄同患難僕射奮不顧身死義知己倘得李鴈門為援吾事濟矣因遣使傳詔徵兵明年李克用領兵至大敗巢賊收復京城其倡義啟導之功實重榮居首京師平以功檢校太尉同平章事琅邪郡王光啟元年僖宗還京喪亂之後六軍初復國藏虛竭觀軍容使田令孜奏以安邑解縣兩池榷課直屬省司以充贍給舊事河中節度兼榷使每年額輸省課重榮累表論列既循往例兼恃大功令孜不許奏請移重榮為定州節度制下不奉詔令孜率禁軍攻之屯于沙苑為重榮擊敗之十二月令孜挾天子出幸寶雞太原聞之乃與重榮入援京師遣使迎駕還宮令孜尤懼却劫幸山南及朱玫立襄王稱制重榮不受命會太原之師於河西以圖興復明年王行瑜殺朱玫僖宗反正重榮之忠力居多重榮用法稍嚴季年尤甚部下常行儒者嘗有所譴罰深銜之光啟三年六月行儒以兵攻府第重榮夜出於城外別墅詰旦為行儒所害行儒乃推重盈為帥重盈既立誅行儒與其黨安集軍民乾寧初重盈卒軍府推行軍司馬王珂為留後重盈子珙時為陝帥瑤為絳州刺史珂即重榮兄重簡子出繼重榮由是爭為蒲帥瑤珙上章論列又與朱溫書云珂非吾兄弟予家之蒼頭也小字蟲兒安得繼嗣珂上章云亡父有興復之功遣使求援於太原太原保薦於朝珙厚結王行瑜李茂貞韓建為援三鎮互相表薦昭宗詔諭之曰吾以太原與重榮有再造之功已俞其奏矣故明年五月茂貞等三人率兵入覲賊害時政請以河中授珙珙瑤連兵攻河中李克用怒出師討三鎮瑤珙兵退克用拔絳州斬瑤乃師於渭北天子以珂為河中節度授以旄鉞仍充供軍糧料使既誅王行瑜克用以女妻之珂親至太原太原令李嗣昭將兵助珂攻珙珙每戰頻敗珙性慘刻人有踰犯必斬首置於座前言笑自若部下咸苦之因其削弱皆懷離叛光化二年六月部將李璠殺珙自稱留後光化末朱溫初伏鎮定將圖關輔屬劉季述廢立之際京師俶擾崔胤潛乞師於汴以圖反正溫謂其將張存敬侯言曰王珂恃太原之勢侮慢藩鄰骨肉相殘自大其事爾為我持一繩以縛之存敬等率兵數萬渡河由含山出其不意天復元年正月兵攻晉絳珂將絳州刺史陶建釗晉州刺史張漢瑜既無備即開門降溫令別將何絪守晉州扼其援路二月存敬大軍逼河中珂遣告急於太原晉絳既當兵衝援師不能進珂妻書告太原曰賊勢攻逼朝夕為俘囚乞食大梁大人安忍不救克用曰賊阻前途衆寡不敵救則與爾兩亡可與王郎歸朝廷珂計無從出即謀歸京師又使人告李茂貞曰聖上初返正詔藩鎮無相侵伐同匡王室朱公不顧國家約束卒遣賊臣急攻敝邑則朱公之心可見矣敝邑若亡則同華邠岐非諸君所能保也天子神器拱手而授人矣此自然之勢也公可與華州令公早出精銳固潼關以應敝邑僕自量不武請於公之西偏求為鎮守此地請公有之關西安危國祚延促繫公此舉也茂貞不答珂勢蹙將渡河歸京師人情離合時河橋毀圮凌澌梗塞舟楫難濟珂族檥舟有日珂夜自慰諭守陴者默然無應牙將劉訓夜半至珂寢門珂叱之曰兵欲反耶訓解衣袒臂曰公苟懷疑訓請斷臂珂曰事勢如何計將安出訓曰若夜出整棹待濟人必爭舟苟一夫鴟張其禍莫測不如俟明旦以情諭三軍願從者必半然後登舟赴闕可以前濟不然則召諸將校且為款狀以緩賊軍徐圖向背策之上也珂然之即登城謂存敬曰吾於汴王有家世事分公宜退舍俟汴王至吾自聽命存敬即日退舍三月朱溫自洛陽至先哭於重榮之墓悲不自勝陳辭致祭蒲人聞之感悅珂欲面縛牽羊以見溫報曰太師阿舅之恩何時可忘耶郎君若以亡國之禮相見黃泉其謂我何及珂出迎之於路握手歔欷聯轡而入居半月以存敬守河中珂舉家徙于汴後溫令珂入覲遣人殺之於華州傳舍自重榮初帥河中傳至珂二十年王處存京兆萬年縣勝業里人世隸神策軍為京師富族財產數百萬父宗自軍校累至檢校司空金吾大將軍左街使遙領興元節度宗善興利乘時貿易由是富擬王者仕宦因貲而貴侯服玉食僮奴萬指處存起家右軍鎮使累至驍衞將軍左軍巡使乾符六年十月檢校刑部尚書義武軍節度使明年黃巢犯闕僖宗出幸處存號哭累日不俟詔命即率本軍入援遣二千人間道往山南衞從車駕時李都守河中降賊會王重榮斬偽使通使於處存乃同盟誓師營於渭北時巢賊僭號天下藩鎮多受其偽命唯鄭畋守鳳翔鄭從讜守太原處存王重榮首倡義舉以招太原俄而鄭畋破賊前鋒王鐸自行在至故諸鎮翻然改圖以出勤王之師中和元年四月涇原行軍唐弘夫敗賊將林言尚讓軍乘勝進逼京師處存自渭北親選驍卒五千皆以白繻為號夜入京城賊已遁去京師故人見處存遮道慟哭歡呼塞路軍人皆釋兵爭據第宅坊市少年多帶白號雜軍翌日賊偵知自灞上復襲京師市人以為王師歡呼迎之處存為賊所迫收軍還營賊怒召集兩市丁壯七八萬併殺之血流成渠處存家在京師世受國恩以賊寇未平鑾輿出狩每言及時事未嘗不喑嗚流涕諸軍義之前後遣使十輩迎李克用既奕世姻好特相款昵洎收京師王鐸第其功勤王舉義處存為之最收城破賊克用為之最以功檢校司空後又遣大將張公慶率勁兵三千合諸軍滅賊巢於泰山以功檢校司徒田令孜討王重榮詔處存為河中節度處存上章申理言重榮無罪有大功於國不宜輕有除改以搖藩鎮之心初幽鎮兩藩兵甲彊盛易定於其間疲於侵寇及匡威得志驕盈恆欲兼幷之賴與太原姻好每為之援處存亦睦鄰以禮優撫軍民折節下士人多歸之以至抗衡列鎮累加侍中檢校太尉乾寧二年九月卒年六十五贈太子太師諡曰忠肅三軍以河朔舊事推其子副大使郜為留後朝廷從而命之授以旄鉞尋加檢校司空同平章事累至太保光化三年七月汴將張存敬進寇幽州旋入祁溝郜遣馬步都將王處直將兵拒之為存敬所敗退營沙河汴人進擊營於懷德驛處直之衆奔撓城中大恐十月郜委城攜族奔於太原太原累表授檢校太尉天復初卒於晉陽其弟鄴克用以女妻之歷嵐石沔三州刺史大同軍防禦使天祐中卒處直字允明處存母弟也初為定州後院軍都知兵馬使汴人入寇處直拒戰不利而退三軍大譟推處直為帥及郜出奔乃權留後事汴將張存敬攻城梯衝雲合處直登城呼曰敝邑於朝廷未嘗不忠於藩鄰未嘗失禮不虞君之涉吾地何也朱溫遣人報之曰何以附太原而弱鄰道處直報曰吾兄與太原同時立勳王室地又親鄰脩好往來常道也請從此改圖溫許之仍歸罪於孔目吏梁問出絹十萬匹牛酒以犒汴軍存敬脩盟而退溫因表授旄鉞檢校左僕射天祐元年加太保封太原王後仕偽梁授北平王檢校太尉不數歲復於莊宗後十餘年為其子都廢歸私第尋卒年六十一諸葛爽青州博昌人役屬縣為伍伯為令所笞乃棄役以里謳自給會龐勛之亂乃委身為徐卒累軍功至小校官軍討徐龐勛勢蹙率百餘人與泗州守將陽羣歸國累授汝州防禦使李琢為招討使討沙陀於雲州表爽為副廣明元年賊陷京師詔爽率代北行營兵馬赴難關中爽軍屯櫟陽潼關不守車駕出幸爽乃降賊巢以爽為河陽節度使巢賊敗復表歸國進位檢校司徒時魏博韓簡軍勢方盛中和元年四月魏人攻河陽大敗爽軍於修武爽棄城遁走簡令大將守河陽乃出師討曹全晸於鄆州十月孟州人復誘爽爽自金商率兵千人復入河陽乃犒勞魏人令趙文率之而去十一月爽攻新鄉簡自鄆來逆戰軍於獲嘉西北時簡將引魏人入趨關輔誅除巢孽自有圖王之志三軍屢諫不從偏將樂彥禎因衆心搖說激之牙軍奔歸魏州爽軍乘之簡鄉兵八萬大敗奔騰亂死清水為之不流明年正月簡為牙軍所殺爽軍由是大振及巢賊將敗爽復歸國爽雖起羣盜既貴之後善於為理所至法令澄清人無怨歎人士以此多之光啟二年爽卒帳中將劉經張言以爽子仲方為孟帥俄而蔡賊孫儒率衆攻之城陷於賊仲方歸於汴儒遂據孟州高駢字千里幽州人祖崇文元和初功臣封南平王自有傳父承明神策虞候駢家世仕禁軍幼而朗拔好為文多與儒者遊喜言理道兩軍中貴翕然稱重乃縻之勇爵累歷神策都虞候會党項羌叛令率禁兵萬人戍長武城時諸將禦羌無功唯駢伺隙用兵出無不捷懿宗深嘉之西蕃寇邊移鎮秦州尋授秦州刺史本州經略使先是李琢為安南都護貪於貨賄虐賦夷獠人多怨叛遂結蠻軍合勢攻安南陷之自是累年亟命將帥未能收復五年移駢為安南都護至則匡合五管之兵期年之內招懷溪洞誅其首惡一戰而蠻卒遁去收復交州郡邑又以廣州饋運艱澀駢視其水路自交至廣多有巨石梗途乃購募工徒作法去之由是舟楫無滯安南儲備不乏至今賴之天子嘉其才遷檢校工部尚書鄆州刺史天平軍節度觀察等使治鄆之政民吏歌之南詔蠻寇巂州渡瀘肆掠乃以駢為成都尹劍南西川節度觀察等使蜀土散惡成都比無垣墉駢乃計每歲完葺之費甃之以塼甓雉堞由是完堅傳檄雲南以兵壓境講信修好不敢入寇進位檢校尚書右僕射江陵尹荊南節度觀察等使乾符四年進位檢校司空潤州刺史鎮海軍節度浙江西道觀察等使進封燕國公時草賊王仙芝陷荊襄宋威率諸道師討逐其衆離散過江表天子以駢前鎮鄆軍民畏服仙芝徒黨鄆人也故授駢京口節鉞以招懷之尋授諸道兵馬都統江淮鹽鐵轉運等使駢令其將張璘梁纘分兵討賊前後累捷降其首領數十人賊南趨嶺表天子嘉之六年冬進位檢校司徒揚州大都督府長史淮南節度副大使知節度事兵馬都統鹽鐵轉運使如故駢至淮南繕完城壘招募軍旅土客之軍七萬乃傳檄徵天下兵威望大振朝廷深倚賴之進位檢校太尉同平章事既而黃巢賊合仙芝殘黨復陷湖南浙西州郡衆號百萬巢據廣州求天平節鉞朝廷議欲以南海節鉞授之宰相盧攜與駢素善以駢前在浙西已立討賊之効今方集諸道之師於淮甸不宜捨賊以弱士心鄭畋議且宜假賊方鎮以紓難二人爭論於朝以言詞不遜由是兩罷之駢方持兵柄聞朝議異同心頗不平之廣明元年夏黃巢之黨自嶺表北趨江淮由采石渡江張璘勒兵天長欲擊之駢怨朝議有不附己者欲賊縱橫河洛令朝廷聳振則從而誅之大將畢師鐸曰妖賊百萬所經鎮戍若蹈無人之境今朝廷所恃者都統破賊要害之地唯江淮為首彼衆我寡若不據津要以擊之俾北渡長淮何以扼束中原陷覆必矣駢駭然曰君言是也即令出軍有愛將呂用之者以左道媚駢駢頗用其言用之懼師鐸等立功即奪己權從容謂駢曰相公勳業高矣妖賊未殄朝廷已有間言賊若盪平則威望震主功居不賞公安稅駕耶為公良畫莫若觀釁自求多福駢深然之乃止諸將但握兵保境而已其年冬賊陷河洛中使促駢討賊冠蓋相望駢終逗撓不行既而兩京覆沒盧攜死駢大閱軍師欲兼幷兩浙為孫策三分之計天子在蜀亟命出師中和二年五月雉雊於揚州廨舍占者云野鳥入室軍府將空駢心惡之其月盡出兵於東塘結壘而處每日教閱如赴難之勢仍與浙西周寶書請同入援京師寶大喜即點閱將赴之遣人偵之知其非實駢在東塘凡百日復還廣陵蓋禳雊雉之異也僖宗知駢無赴難意乃以宰臣王鐸為京城四面諸道行營兵馬都統崔安潛副之韋昭度領江淮鹽鐵轉運使增駢階爵使務並停駢既失兵柄又落利權攘袂大詬累上章論列語詞不遜其末章曰臣伏奉詔命令臣自省更勿依違者臣仰天訴地血淚交流如劍戟攢心若湯火在己只如黃巢大寇圍逼天長小城四旬有餘竟至敗走臣散徵諸道兵甲盡出家財賞給而諸道多不發兵財物即為己有縱然遣使徵得敕旨不許過淮其時黃巢殘兇纔及二萬經過數千里軍鎮盡若無人只如潼關已東止有一徑其為險固甚於井陘豈有狂寇奔衝略無阻礙即百二之地固是虛言神策六軍此時安在陛下蒼黃西出內官奔命東來黎庶盡被殺傷衣冠悉遭屠戮今則園陵開毀宗廟荊榛遠近痛傷遐邇嗟怨雖然姦臣未悟陛下猶迷不思宗廟之焚燒不痛園陵之開毀臣之痛也實在於斯此事見之多年不獨知於今日況自萑蒲盜起朝廷徵用至多上至帥臣下及裨將以臣所料悉可坐擒用此為謀安能辦事陛下今用王鐸盡主兵權誠知狂寇必殲梟巢即覆臣讀禮至宣尼射於矍相之圃蓋觀者如堵牆使子路出延射曰潰軍之將亡國之大夫與為人後者不入於射也嚴誡如斯圖功也豈宜容易陛下安忍委敗軍之將陷一儒臣崔安潛到處貪殘只如西川可為驗矣委之副貳詎可平戎況天下兵驕在處僭越豈二儒士能戢彊兵萬一乖張將何救助願陛下下念黎庶上為宗祧無使百代有抱恨之臣千古留刮席之恥臣但慮寇生東土劉氏復興即軹道之災豈獨往日乞陛下稍留神慮以安宗社今賢才在野憸人滿朝致陛下為亡國之君此等計將安出伏乞戮賣官鬻爵之輩徵鯁直公正之臣委之重難置之左右克復宮闕莫尚於斯若此時謗誹忠臣沉埋烈士匡復宗社未見有期臣受國恩深不覺語切無任憂懼之至詔報駢曰省表具悉卿一門忠孝三代勳庸銘於景鐘煥在青史卿承祖父之訓襲弓冶之基起自禁軍從微至著始則囊錐露穎稍有知音尋則天驥呈才急於試効自秦州經略使授交趾節旄聯翩寵榮汗漫富貴未嘗斷絕僅二十年卿報國之功亦可悉數最顯赫者安南拒蠻至今海隅尚守次則汶陽之日政聲洽平洎臨成都脅歸驃信三載之內亦無侵凌創築羅城大新錦里其為雄壯實少比儔渚宮不暇於施為便當移鎮建鄴纔聞於安靜旋即渡江自到廣陵併鍾多壘即亦招降草寇救援臨淮大約昭灼功勳不大於此數者朝廷累加渥澤靡吝徽章位極三公兵環大鎮銅鹽重務綰握約及七年都統雄藩幅員幾於萬里朕瞻如太華倚若長城凡有奏論無不依允其為託賴豈愧神明自黃巢肆毒咸京卿並不離隋苑豈金陵苑水能遮鵝鸛之雄風伯雨師終阻帆檣之利自聞歸止寧免鬱陶卿既安住蕪城鄭畋以春初入覲遂命上相親領師徒因落卿都統之名固亦不乖事例仍加封實貴表優恩何乃疑忿太深指陳過當移時省讀深用震嗟聊舉諸條粗申報復卿表云自是陛下不用微臣固非微臣有負陛下者朕拔卿汶上超領劍南荊潤維揚聯居四鎮綰利則牢盆在手主兵則都統當權直至京北京南神策諸鎮悉在指揮之下可知董制之雄而乃貴作司徒榮為太尉以為不用何名為用乎卿又云若欲俯念舊勳佇觀後効何不以王鐸權位與臣主持必能糾率諸侯誅鋤羣盜者朕緣久付卿兵柄不能翦滅元兇自天長漏網過淮不出一兵襲逐奄殘京國首尾三年廣陵之師未離封部忠臣積望勇士興譏所以擢用元臣誅夷巨寇心期貔武便掃欃槍卿初委張璘請放却諸道兵士辛勤召置容易放還璘果敗亡巢益顛越卿前年初夏逞發神機與京中朝貴書題云得靈仙教導芒種之後賊必蕩平尋聞圍逼天長必謂死在卿手豈知魚跳鼎釜狐脫網羅遽過長淮竟為大憝都統既不能禦遏諸將更何以枝梧果致連犯關河繼傾都邑從來倚仗之意一旦控告無門凝睇東南惟增悽惻及朕蒙塵入蜀宗廟污於賊庭天下人心無不雪涕既知曆數猶在謳謠未移則懷忠拗怒之臣貯救難除姦之志便須果決安可因循況恩厚者其報深位重者其心急此際天下義舉皆望淮海率先豈知近輔儒臣先為首唱而窮邊勇將誓志平戎關東寂寥不見干羽洎乎初秋覽表方云仲夏發兵便詔軍前幷移汶上喜聞兵勢渴見旌幢尋稱宣潤阻艱難從天討謝玄破苻堅於淝水裴度平元濟於淮西未必儒臣不如武將卿又云若不斥逐邪佞親近忠良臣既不能保家陛下豈能安國忽當今日棄若寒灰者未委誰是忠良誰為邪佞終日寵榮富貴何嘗不保其家無人扞禦寇戎所以不安其國豈有位兼將相使帶銅鹽自謂寒灰真同浪語卿又云不痛園陵之開毀不念宗廟之焚燒臣實痛之實在茲也且龜玉毀於櫝中誰之過也鯨鯢漏於網外抑有其由卿手握強兵身居大鎮不能遮圍擒戮致令脫漏猖狂雖則上繫天時抑亦旁由人事朕自到西蜀不離一室之中屏棄笙歌杜絕遊獵蔬食適口布服被身焚香以望園陵雪涕以思宗廟省躬罪己不敢遑安姦臣未悟之言誰人肯認陛下猶迷之語朕不敢當卿又云自來所用將帥上至帥臣下及裨將以臣所料悉可坐擒用此為謀安能集事者且十室之邑猶有忠信天下至大豈無英雄況守固城池悉嚴兵甲縱非盡美安得平欺卿尚不能縛黃巢於天長安能坐擒諸將只如拓拔思恭諸葛爽輩安能坐擒耶勿務大言不堪垂訓卿又云王鐸是敗軍之將兼徵引矍相射義者昔曹沬三敗終復魯讎孟明再奔竟雪秦恥近代汾陽尚父咸寧太師亦曾不利鼓鼙尋則功成鐘鼎安知王鐸不立大勳卿又云無使百代有抱恨之臣千古留刮席之恥但慮寇生東土劉氏復興即軹道之災豈獨往日者我國家景祚方遠天命未窮海內人心尚樂唐德朕不荒酒色不虧刑名不結怨於生靈不貪財於宇縣自知運曆必保延洪況巡省已來禎祥薦降西蜀半年之內聲名又以備全塞北日南悉來朝貢黠戛善闡並至梯航但慮天寶建中未如今日清宮復國必有近期卿云劉氏復興不知誰為其首遽言刮席之恥比朕於劉盆子耶仍憂軹道之災方朕於秦子嬰也雖稱直行何太罔誣三復斯言尤深駭異卿又云賢才在野憸人滿朝致陛下為亡國之君此子等計將安出伏乞戮賣官鬻爵之輩徵鯁直公正之臣者且唐虞之世未必盡是忠良今巖野之間安得不遺賢彥朕每令銓擇亦遣訪求其於選將料兵安人救物但屬收復之業講求理化之基自有長才同匡大計賣官鬻爵之士中外必不有之勿聽狂辭以資游說且朕遠違宮闕寄寓巴邛所失恩者甚多尚不興怨卿落一都統何足介懷況天步未傾皇綱尚整三靈不昧百度猶存但守君臣之軌儀正上下之名分宜遵教約未可隳凌朕雖沖人安得輕侮但以知卿歲久許卿分深貴存終始之恩勿貯猜嫌之慮所宜深省無更過言駢始以兵權欲臨藩鎮吞併江南一朝失之威望頓減陰謀自阻故累表堅論欲其復故明年四月王鐸與諸道之師敗賊關中收復京城駢聞之悔恨萬狀而部下多叛計無所出乃託求神仙屏絕戎政軍中可否取決於呂用之光啟初僖宗再幸山南李熅僭號偽授駢中書令諸道兵馬都統江淮鹽鐵轉運等使駢方怨望而甘於偽署稱藩納賄不絕於途宴安自得日以神仙為事呂用之又薦暨工諸葛殷張守一有長年之術駢並署為牙將於府第別建道院院有迎仙樓延和閣高八十尺飾以珠璣金鈿侍女數百皆羽衣霓服和聲度曲擬之鈞天日與用之殷守一三人授道家法籙談論於其間賓佐罕見其面府第有隋煬帝所造門屋數間俗號中書門最為宏壯光啟元年無故自壞明年淮南饑蝗自西來行而不飛浮水緣城而入府第道院竹木一夕如翦經像幢節皆齧去其首撲之不能止旬日之內蝗自食噉而盡其年九月雨魚是月十日夜大星隕于延和閣前其聲如雷火光爍地自二年十一月雨雪陰晦至三年二月不解比歲不稔食物踊貴道殣相望饑骸蔽地是月浙西周寶為三軍所逐駢喜以為妖異當之三月蔡賊過淮口駢令畢師鐸出軍禦之師鐸與高郵鎮將張神劍鄭漢璋等率行營兵反攻揚州四月城陷師鐸囚駢於道院召宣州觀察使秦彥為廣陵帥既而蔡賊楊行密自壽州率兵三萬乘虛攻城城中米斗五十千餓死大半駢家屬並在道院秦彥供給甚薄薪蒸亦闕奴僕徹延和閣欄檻革帶食之互相篡啖駢召從事盧涗謂之曰予三朝為國粗立功名比擺脫塵埃自求清淨非與人世爭利一旦至此神道其何望耶掩涕不能已初師鐸之入城也愛將申及謂駢曰逆黨人數不多即目弛於防禁願奉令公潛出廣陵依投支郡以圖雪恥賊不足平也若持疑不決及旦夕不得在公左右駢怯懼不能行其謀九月師鐸出城戰敗慮駢為賊內應又有尼奉仙自言通神謂師鐸曰揚府災當有大人死應之自此善也秦彥曰大人非高令公耶即令師鐸以兵攻道院侍者白駢曰有賊攻門曰此秦彥來整衣候之俄而亂卒升階曳駢數之曰公上負天子恩下陷揚州民淮南塗炭公之罪也駢未暇言首已墮地矣駢既死左右奴客踰垣而遁入行密軍行密聞之舉軍縞素繞城大哭者竟日仍焚紙奠酒信宿不已駢與兒姪死於道院都一坎瘞之裹之以氈行密入城以駢孫俞為判官令主喪事葬送未行而俞卒後故吏鄺師虔收葬之初師鐸入城呂用之張守一出奔楊行密詐言所居有金行密入城掘其家地下得銅人長三尺餘身被桎梏釘其心刻高駢二字於胸蓋以魅道厭勝蠱惑其心以至族滅畢師鐸者曹州冤朐人乾符初與里人王仙芝嘯聚為盜相與陷曹鄆荊襄師鐸善騎射其徒目為鷂子仙芝死來降高駢初敗黃巢於浙西皆師鐸梁纘之効也頗寵待之駢末年惑於呂用之舊將俞公楚姚歸禮皆為用之讒構見殺師鐸意不自安有愛妾復為用之所奪光啟三年三月蔡賊楊行密逼淮口駢令師鐸率三百騎戍高郵戍將張神劍亦怒用之兩人謀自安之計用之伺知亟請召還師鐸母在廣陵遣信令師鐸遁去或謂師鐸曰請殺神劍併高郵之兵趨府令公必殺用之為解又曰不如投徐州則身存而家保師鐸曰非計也呂用之誑惑主帥塗炭生民七八年來鬼怨人怒今日之事安知天不假予誅妖亂而康淮甸耶又曰鄭漢璋是我歸順時副使常切齒於用之今率精兵在淮口聞吾此舉即樂從也乃趨淮口與漢璋合得兵千人又相與至高郵問計於張神劍神劍曰公見事晚耶用之一妖物耳前受襄王偽命作鎮廣州遲留不行志圖淮海節鎮令公已奪其魄彼一旦成事焉能北面事妖物耶即割臂血為盟推師鐸為盟主稱大丞相移檄郡縣以誅用之守一殷為名乃署其卒長唐宏王朗駱玄真倪詳逯本趙簡等分董其卒三千人四月趨廣陵營於大明寺揚州大駭呂用之分兵城守高駢登延和閣聞鼓譟聲怪之用之曰師鐸兵士迴戈止遏不得適已隨宜處置公幸勿憂苟不聽徒勞玄女一符耳師鐸陳兵數日用之屢出戰師鐸憂其不克求救于宣州秦彥曰苟得廣陵則迎公為帥彥令牙將秦稠率兵三千助之師鐸門客畢慕顏自城中出曰人心已離破之必矣秦稠軍至兵威漸振駢聞甚憂謂用之曰吾以心腹仗爾不能駕馭此輩誤我何多百姓遭罹飢饉不可虐用吾自枉手札喻師鐸可令大將一人自行用之即以其黨許戡送駢書師鐸怒曰梁纘韓問何在令爾來耶即斬之用之選勁兵自衞一日至道院駢叱去之乃令猶子傑握牙兵令師鐸母作書遣大將古鍔與師鐸子出城喻之師鐸令子還白曰不敢負令公恩德正為淮南除弊但斬用之守一即日退還高郵秦稠攻西南隅城中應之即日城陷呂用之由參佐門遁走駢聞師鐸至改服俟之與師鐸交拜如賓主之儀即日署為節度副使漢璋神劍皆署職事秦稠點閱府庫監守之仍密召彥於宣州或謂師鐸曰公昨舉兵誅二妖物故人情樂從今軍府已安以事理論之公宜還政高公自典兵馬戎權在手取捨自由藩鄰聞之不失大義議者皆言秦稠破城之日已召秦彥彥若為帥兵權非足下有也公感其援但以金玉報之阻其渡江最為上策若秦彥作帥則楊行密朝聞夕至如高令復帥外寇必自卷懷師鐸猶豫未決而秦彥軍至五月彥為節度使署師鐸為行軍司馬移居牙外心頗不悅是月楊行密引軍攻揚州彥兵拒戰繼敗八月師鐸與鄭漢璋出軍萬人擊行密皆大敗而還自是不復出九月師鐸殺高駢十月秦彥師鐸突圍而遁十一月秦彥師鐸引蔡賊孫儒之兵三萬圍揚州行密求救于汴朱全忠遣大將李璠率師淮口以為聲援孫儒以廣陵未下而汴卒來又慮秦彥師鐸異志四年正月孫儒斬秦彥師鐸于高郵之南鄭漢璋亦死焉秦彥者徐州人本名立為卒隸徐軍乾符中坐盜繫獄將死夢人謂之曰爾可隨我及寤械破乃得逸去因改名彥乃聚徒百人殺下邳令取其資裝入黃巢軍巢兵敗於淮南乃與許勍俱降高駢累奏授和州刺史中和二年宣歙觀察使竇潏病彥以兵襲取之遂代潏為觀察使朝廷因而命之光啟三年揚州牙將畢師鐸囚其帥高駢懼外寇來侵乃迎彥為帥彥召池州刺史趙鍠知宣州事自率衆入揚州師鐸推彥為帥五月壽州刺史楊行密率兵攻彥遣其將張神劍令統兵屯灣頭山光寺行密屯大雲寺北跨長崗前臨大道自揚子江北至槐家橋柵壘相聯秦彥登城望之懼形於色令秦稠師鐸率勁卒八千出鬬為行密所掩盡沒稠死之彥急求援於蘇州刺史張雄雄率兵赴之屯于東塘重圍半年城中芻糧並盡草根木實市肆藥物皮囊革帶食之亦盡外軍掠人而賣人五十千死者十六七縱存者鬼形鳥面氣息奄然張雄多軍糧相約交市城中以寶貝市米金一斤通犀帶一得米五升雄軍得貨不戰而去九月畢師鐸出戰又敗自是日與秦彥相對嗟惋問神尼奉仙何以獲濟尼曰走為上計也十月彥與師鐸突圍投孫儒並為所殺江淮之間廣陵大鎮富甲天下自師鐸秦彥之後孫儒行密繼踵相攻四五年間連兵不息廬舍焚蕩民戶喪亡廣陵之雄富掃地矣時溥彭城人徐之牙將黃巢據長安詔徵天下兵進討中和二年武寧軍節度使支詳遣溥與副將陳璠率師五千赴難行至河陰軍亂剽河陰縣迴溥招合撫諭其衆復集懼罪屯于境上詳遣人迎犒悉恕之溥乃移軍向徐州既入軍人大呼推溥為留後送詳於大彭館溥大出資裝遣陳璠援詳歸京詳宿七里亭其夜為璠所殺舉家屠害溥以璠為宿州刺史竟以違命殺詳溥誅璠又令別將帥軍三千赴難京師天子還宮授之節鉞及黃巢攻陳州秦宗權據蔡州與賊連結徐蔡相近溥出師討之軍鋒益盛每戰屢捷黃巢之敗也其將尚讓以數千人降溥後林言又斬黃巢首歸徐州時溥功居第一詔授檢校太尉中書令鉅鹿郡王宗權未平仍授溥徐州行營兵馬都統蔡賊平朱全忠與之爭功遂相嫌怨淮南亂朝廷以全忠遙領淮南節度以平孫儒行密之亂汴人應援路出徐方溥阻之全忠怒出師攻徐自光啟至大順六七年間汴軍四集徐泗三郡民無耕稼頻歲水災人喪十六七溥窘蹙求和于汴全忠曰移鎮則可然之朝廷以尚書劉崇望代溥以溥為太子太師溥懼出城見害不受代汴將龐師古陳兵于野溥求援于兗州朱瑾出兵救之值大雪糧盡而還城中守陴者飢甚加之病疫汴將王重師牛存節夜乘梯而入溥與妻子登樓自焚而卒景福二年四月也地入于汴朱瑄宋州人父慶盜鹽抵法瑄逃於青州為王敬武牙卒中和初黃巢據長安詔徵天下兵敬武遣牙將曹全晸率兵三千赴難關西以瑄為軍候會青州警急敬武召全晸還路由鄆州時鄆帥薛崇為草賊王仙芝所殺鄆將崔君裕權知州事全晸知其兵寡襲殺君裕據有鄆州自稱留後以瑄有功署為濮州刺史留將牙軍光啟初魏博韓簡欲兼幷曹鄆以兵濟河收鄆全晸出兵逆戰為魏軍所敗全晸死之瑄收合殘卒保州城韓簡攻圍半年不能拔會魏軍亂退去朝廷嘉之授以節鉞時瑄有衆三萬其弟瑾勇冠三軍有爭天下之心秦宗權之盛也屢侵鄭汴朱全忠為賊所攻甚窘求救於瑄瑄令朱瑾出師援之擊敗秦宗權全忠乃與瑄情極隆厚全忠狡譎翻覆虎視藩鄰會宗權誅乃急攻徐州時溥求援于瑄瑄與全忠書請釋溥修好偽許之瑄以恩及全忠遣使讓之又令朱瑾出軍援溥及徐泗平全忠乃移兵攻鄆三四年間每春秋入其境剽掠人不得耕織民為俘者十五六瑄禦備殫竭景福末與弟瑾合兩鎮之兵與汴人大戰于魚山下瑄瑾俱敗兵士陷沒汴將朱友裕以長塹圍之乾寧四年正月城中食竭瑄與妻榮氏出奔至中都為野人所害傳首汴州榮氏至汴州為尼朱瑾瑄之母弟驍果善戰初乾符末朝廷以將軍齊克讓為兗州節度瑾將襲取之乃求婚於克讓及親迎瑾選勇士衞從禮會之夜竊發逐克讓遂據城稱留後朝廷不獲已以節鉞授之及朱瑄平汴人移兵攻兗經年食盡瑾出城求食比還為別將所拒不得入乃渡淮依楊行密行密寵待之用為壽州刺史大敗汴軍于清口自此全忠不敢以兵渡淮瑾楊溥時謀亂為徐知訓所殺史臣曰疾風知勁草世亂見忠臣誠哉是言也土運中微賊巢僭越藩伯勤王赴難者率有聲而無實唯重榮斬賊使於近關處存舉義師於安喜橫身泣赴不顧禍患遂得義徒雲合逆黨勢窮宜乎服冕乘軒傳家胙土而重榮傷於峻法嚴而少恩禍發輿臺誠悲枉橫高駢起家禁旅頗立功名玩寇崇妖致茲狼籍後來勳德可誡前車瑄溥不以善取固宜凶終瑾持此狼心安逃虎口王綱之紊羣盜及茲復何言哉贊曰王者撫運居安慮危不以德處即為盜闚乾坤盪覆生聚流離讀駢章疏可為涕洟
