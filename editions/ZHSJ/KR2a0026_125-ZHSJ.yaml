body:
  text: 舊唐書卷一百二十一列傳第七十一僕固懷恩梁崇義李懷光僕固懷恩鐵勒部落僕骨歌濫拔延之曾孫語訛謂之僕固貞觀二十年鐵勒九姓大首領率其部落來降分置瀚海燕然金微幽陵等九都督府於夏州別為蕃州以禦邊授歌濫拔延為右武衞大將軍金微都督拔延生乙李啜拔乙李啜拔生懷恩世襲都督天寶中加左領軍大將軍同正員特進歷事節度王忠嗣安思順皆以善格鬬達諸蕃情有統禦材委之心腹及安祿山反從郭子儀討高秀巖于雲中破之又敗薛忠義于背度山下抗賊七千騎生擒忠義男襲下馬邑郡十五載進軍與李光弼合勢及史思明戰于常山趙郡沙河嘉山皆大破之懷恩功居多肅宗即位於靈武懷恩從郭子儀赴行在所時同羅部落自西京叛賊北寇朔方子儀與懷恩擊之懷恩子玢領徒擊賊兵敗而降尋又自拔而歸懷恩叱而斬之將士懾駭無不一當百遂破同羅千餘騎於河上盡收其器械駝馬肅宗雖仗朔方之衆將假蕃兵以張形勢乃遣懷恩與燉煌王承寀使于迴紇請兵結好迴紇可汗遂以女妻承寀兼請公主遣首領隨懷恩入朝二年正月又從子儀下馮翊河東二郡走偽將崔乾祐又襲破潼關賊將安守忠李歸仁自京率衆來援苦戰二日官軍敗績懷恩退至渭水無舟楫抱馬以渡存者僅半乃奔歸子儀於河東整其餘衆四月子儀赴鳳翔李歸仁以勁卒五千邀之於三原北子儀窘急使懷恩及王昇陳迴光渾釋之李國貞等五將伏兵於白渠留運橋以待之賊至伏發歸仁大敗而走又從子儀戰于清渠不利歸于鳳翔及迴紇使葉護帝得數千騎來赴國難南蠻大食之卒相繼而至肅宗乃遣廣平王為元帥以子儀為副而懷恩領迴紇兵從之灃水賊伏兵於營東懷恩引迴紇馳殺之匹馬不歸賊乃大潰日暮懷恩謂王曰賊必棄城走矣請以二百騎馬追之縛取李歸仁田乾真安守忠張通儒王曰將軍戰亦疲矣且休息迨明而後圖之懷恩曰歸仁守忠天下驍賊也驟勝而敗此天與我也奈何縱之不取若使得衆復為我患雖悔無及夫戰尚速何明日為王固止之令還營懷恩又固請往而復反一夕四五起遲明諜至守忠等果逃又從王大破賊於陝西之新店收兩京皆立殊功以前後功加開府儀同三司鴻臚卿同正員同節度副使十二月封豐國公食實封二百戶乾元元年九月遣九節度擊安慶緒於相州從郭子儀領朔方行營破安太清下懷衞二州圍相州戰愁思崗凡經五月常為先鋒堅敵大陣必經其戰勇冠三軍尋充都知兵馬使及李光弼代子儀懷恩又副之乾元二年進封大寧郡王遷御史大夫朔方行營節度又從李光弼守河陽破周乂擒徐璜玉安太清拔懷州皆摧鋒陷敵功冠諸將其男瑒又以開府儀同三司從將兵於其軍每深入虜陣以勇敢聞軍中號為鬬將懷恩為人雄毅寡言應對舒緩而剛決犯上始居偏裨之中意有不合雖主將必詬怒之郭子儀為帥以寬厚容衆素重懷恩其麾下皆朔方蕃漢勁卒恃功怙將多為不法子儀每事優容之行師用兵倚以輯事而光弼持法嚴肅法不貸下懷恩心憚而頗不叶上元二年從李光弼與史思明戰于邙山不利肅宗以懷恩功高恩顧特異諸將至冬加工部尚書敕李輔國及常參官送上太官造食以寵之代宗即位拜隴右節度未行改朔方行營節度以副郭子儀其秋上使中官劉清潭請兵於迴紇登里可汗登里已為史朝義誘之傾國入塞衆號十萬關中騷擾上使殿中監藥子昂馳於塞上勞之遇於忻州先是肅宗以寧國公主下嫁於毘伽闕可汗毘伽闕可汗又以少子請婚肅宗以懷恩女妻之毘伽可汗死少子代立即登里可汗登里立以懷恩女為可敦至是可汗請與懷恩及懷恩之母相見詔從之懷恩嫌疑不敢上因賜鐵券手詔以遣之即令其母便發懷恩與迴紇可汗相見於太原可汗大悅遂許助討朝義於是進兵歷太原汾晉營于陝州以俟期十月詔天下兵馬元帥雍王為中軍先鋒以懷恩為副加同中書門下平章事領河東朔方節度行營及鎮西迴紇兵馬赴陝州幷令諸道節度一時齊進懷恩與迴紇左殺為先鋒觀軍容使魚朝恩陝州節度郭英乂為後殿自澠池入陳鄭節度李抱玉自河陽入河南副元帥雍王留陝州懷恩等師至黃水賊徒數萬堅柵自固懷恩陣于西原上廣張旗幟以當之命驍騎及迴紇之衆傍南山出於東北兩軍舉旗內應表𩹉擊之一鼓而拔賊死者數萬朝義領鐵騎十萬來救陣於昭覺寺賊皆殊死決戰短兵既接相殺甚衆官軍驟擊之賊陣而不動魚朝恩令射生五百人下馬弓弩亂發多中賊而死陣亦如初鎮西節度使馬璘曰事急矣遂援旗而進單騎奔擊奪賊兩牌突入萬衆之中左右披靡大軍乘之而入朝義大敗斬首一萬六千級生擒四千六百人降者三萬二千人轉戰於石榴園老君廟賊黨又敗人馬蹂踐填於尚書谷朝義輕騎而走懷恩乃進收東京及河陽城封其府庫偽中書令許叔冀王伷等承制釋之悉皆安堵懷恩留迴紇可汗營於河陽乃使其子右廂兵馬使瑒北庭朔方兵馬使高輔成以步軍萬餘衆乘勝逐北懷恩常壓賊而行至于鄭州再戰皆捷進至汴州偽節度張獻誠開門出降又拔滑州追破朝義于衞州偽睢陽節度田承嗣李進超李達盧等兵馬四萬餘衆又與朝義合據河來拒瑒連盤濟師登岸薄之賊黨悉奔長驅至昌樂縣東朝義率魏州兵馬來戰又敗走達盧來降賊徒震駭於是相州偽節度薛嵩以相衞州洺邢趙降于李抱玉高輔成尚文悊偽恆陽節度李寶臣以深恆定易四州降于河東節度辛雲京朝義至貝州又與偽大將薛忠義兩節度合瑒至臨清縣懼賊氣盛駐軍以俟變朝義領衆三萬幷攻具來攻瑒令高彥崇渾日進李光逸等設三伏以待之賊半渡伏發合擊而走之其時迴紇又至官軍益振瑒卷甲馳之大戰于下博縣東南賊背水而陣大軍衝擊而崩之積屍擁流而下朝義又走莫州于是河南副元帥都知兵馬使薛兼訓兵馬使郝廷玉兗鄆節度使辛雲京會師於下博進軍莫州城下朝義與田承嗣頻出挑戰大敗而旋臨陣殺其偽尚書敬榮朝義懼自分萬餘衆投歸義縣留承嗣守城於是淄青節度侯希逸繼諸將同為攻守凡月餘日瑒與高彥崇侯希逸薛兼訓等以衆三萬追及朝義於歸義縣交鋒而賊潰屬幽州節度使李懷仙送降款瑒頓兵於其境遣懷仙分兵追躡二年三月朝義至平州石城縣溫泉柵窮蹙走入長林自縊懷仙使妻弟徐有濟傳其首以獻又降田承嗣之軍河北悉平懷恩乃與諸將班師先是去冬郭子儀以懷恩有平定河朔之功讓位於懷恩遂授河北副元帥尚書左僕射兼中書令靈州大都督府長史單于鎮北大都護朔方節度使仍加實封四百戶通前一千戶春又加太子少師充朔方都知兵馬使同節度副大使食實封五百戶莊宅各一所仍與一子五品官高輔成太子少傅兼御史中丞充河北副元帥都知兵馬使加實封三百戶仍與一子五品官高彥崇太子賓客依舊朔方右廂兵馬使實封二百戶莊宅各賜一所與一子五品官遂詔懷恩統可汗還蕃遂自相州西郭口趣潞州與迴紇可汗會出太原之北懷恩初至太原辛雲京以可汗是其子壻疑其召戎閉關不報且懼可汗相襲不敢犒軍及還亦如之懷恩父子宣力王室攻城野戰無役不從一舉滅史朝義復燕趙韓魏之地自以為功無以讓至是又為雲京所拒懷恩怒上表列其狀頓軍汾州會中官駱奉先使于雲京雲京言懷恩與可汗為約逆狀已露乃與奉先厚結歡奉先迴至懷恩所其母數讓奉先曰爾等與我兒約為兄弟今又親雲京何兩面乎雖然前事勿論自今母子兄弟如初酒酣懷恩起舞奉先贈纏頭綵懷恩將酬其貺奉先遽告發懷恩曰明日端午請宿為令節奉先固辭懷恩苦邀之命藏其馬中夕謂其從者曰向者責吾又收吾馬是將害我也奉先懼遂踰垣而走懷恩驚遽令追還其馬奉先使迴奏其反狀懷恩累奏請誅雲京奉先上以雲京有功手詔和解之懷恩遂有貳於我至七月改元廣德冊勳拜太保仍與一子三品一子四品官幷階仍加實封五百戶僕固瑒一子五品官加實封一百戶仍賜鐵券以名藏太廟畫像於凌煙閣尋以瑒為御史大夫朔方行營節度懷恩以寇難已來一門之內死王事者四十六人女嫁絕域再收兩京皆導引迴紇摧滅強敵而為人媒孽蕃性獷戾怏怏不已乃上書自功伐曰廣德元年八月二十三日開府儀同三司尚書左僕射兼中書令朔方節度副大使河北副元帥上柱國大寧郡王臣懷恩刺肝瀝血謹頓首頓首上書寶應聖文神武皇帝陛下臣家本蕃夷代居邊塞爰自祖父早沐國恩臣年未弱冠即蒙上皇驅策出入死生竭力疆場叨承先帝報功時年已授特進洎乎祿山作亂大振王師臣累任偏裨決死靖難上以安社稷下以拯生靈仗皇天之威神滅狂胡之醜類無何思明繼逆又據東周宸極不安海內騰沸臣謬承大行皇帝委任授以兵權誓雪國讎以匡時難闔門忠烈咸願殺身野戰攻城皆先士卒兄弟死於陣敵子姪沒於軍前九族之親十不存一縱有在者瘡痍徧身況陛下潛龍之時親統師旅臣忝事麾下陛下悉臣愚誠大行皇帝未捐宮館之時臣頻立微效累霑官賞遂被輔國等讒害幾至破家便奪兵權逾年宿衞臣雖內省無疚終懼讒佞傾危以日繼時命懸秋葉至將歸骨泉壤永謝明時幸遇陛下龍躍天衢繼纘鴻業知臣負謗察臣丹心遂開獨見之明杜絕衆多之口特拔臣於汧隴再任臣於朔方誠謂遊魂返骸枯骨再肉使臣得竭駑蹇之力効錐刀之功上答陛下再造之恩下展微臣犬馬之志去年秋末迴紇仗義而來士庶不知悉皆驚駭陛下以臣與其姻婭令至太原祗迎一切事宜許臣逐便處置遂與可汗計議分道用兵克復洛陽平蕩幽薊惟有神策兵馬頓軍獨住陳留可汗時在洛陽即被朝恩猜阻要為流議已失蕃情臣自平賊卻迴天恩又令餞送臣遂罄竭家產為國周旋發遣外蕃貴圖上道行至山北被奉先雲京共生異見妄作加諸閉城不出祗迎仍令潛行竊盜蕃夷怨怒早欲相讎臣遂彌縫方得出界及其祖餞事了迴至太原臣忝跡鼎司又承重寄奉先雲京曾無禮數閉關不出相看臣遂過汾州休息士馬凡經數日不遣一介知聞自以行事乖疏恐臣先有論奏遂乃構其謗黷妄起異端扇動軍城以為設備又臣從潞府過日見抱玉祗迎迴紇庶事用心懇稱家資罄於公用又與臣馬兼銀器四事臣於迴紇處得絹便與抱玉二千匹以充答贈今被抱玉共相組織將此往來之貺便為結託之私貴在厚誣務相傾奪陛下不垂明察採聽流言欲令忠直之臣枉陷讒邪之黨臣實不欺天地不負神明夙夜三思臣罪有六往年同羅背叛河曲騷然經略數軍兵圍不解臣不顧老母走投靈州先帝嘉臣忠誠遂遣徵兵討叛使得河曲清泰賊徒奔亡是臣不忠於國其罪一也臣男玢嘗被同羅虜將蓋亦制不由己旋即棄逆歸順卻來投臣臣斬之以令士衆且臣不愛骨肉之重而徇忠義之誠是臣不忠於國其罪二也臣有二女俱聘遠蕃為國和親合從討難致使賊徒殄滅寰宇清平是臣不忠於國其罪三也臣及男瑒不顧危亡身先行陣父子効命志寧邦家是臣不忠於國其罪四也陛下委臣副元帥之權令臣指麾河北其新附節度使皆握強兵臣之撫綏悉安反側州縣既定賊稅以時是臣不忠於國其罪五也臣叶和迴紇戡定兇徒天下削平蕃夷歸國使其永為鄰好義著急難萬姓安寧干戈止息二聖山陵事畢陛下忠孝兩全是臣不忠於國其罪六也臣既負六罪誠合萬誅延頸轅門以待斧鑕過此以往更無他違陛下若以此誅臣何異伍子胥存吳卒浮屍於江上大夫種霸越終賜劍於稽山唯當吞恨九泉銜冤千古復何訴哉復何訴哉且葵藿尚解仰陽犬馬猶能戀主臣忝恩至重委任非輕夙夜思奉天顏豈暫心離魏闕誠恐以忠獲罪龜鏡不遙頃者來瑱受誅朝廷不示其罪天下忠義從此生疑況來瑱功業素高人多所忌不審聖衷獨斷復為姦臣弄權臣欲入朝恐罹斯禍諸道節度使皆懼非臣獨敢如此近聞追詔數人並皆不至實畏中官讒口又懼陛下損傷豈唯是臣不忠只為回邪在側且臣前後所奏駱奉先詞情非不摭實陛下竟無處置寵用彌深皆由同類相從致蒙蔽聖聰人皆懼死誰復敢言臣義切君臣志憂社稷若無極諫有負聖朝敢肆愚忠以干鼎鑊況今西有犬戎背亂東有吳越不庭均房羣盜縱橫鄜坊稽胡草擾陛下不思外禦而乃內忌忠良何以混一車書而使梯航納賮天下至大豈可暫輕伏承四方敷奏之人引對之時陛下皆云與驃騎商量曾不委宰臣可否或有稽留數月不放歸還遠近之心轉加疑阻且臣朔方將士功効最高為先帝中興主人是陛下蒙塵故吏曾不別加優奬卻信嫉妬謗詞子儀先已被猜臣今又遭毀黷弓藏鳥盡兔死犬烹臣昔謂非今方知實且臣息軍汾上關鍵大開收馬放羊曾無守備分兵數郡貴免般糧勸課農桑務安黎庶有何狀跡而涉異端陛下必信矯詞何殊指鹿為馬陛下倘斥逐邪佞親附忠良蠲削狐疑敷陳政化使君臣無二天下歸心則窺邊之戎不足為患梗命之寇將復何憂偃武修文其則不遠陛下若不納愚懇且貴因循臣實不敢保家陛下豈能安國忠言利行良藥愈病伏惟陛下圖之臣今戎事已安糧儲且繼深願一至闕下披露心肝再覩聖顏萬死無恨臣欲公然進發慮恐將士留連臣今便託巡晉絳等州於彼遷延且住謹遣押衙開府儀同三司試太常卿張休臧先進書兼口奏事伏惟陛下覽臣此書知臣誠懇特垂聖斷勿議近臣待臣如初浮謗不入臣當死節王命誓酬國恩仍請遣一介專使至絳州問臣臣即便與同行冀獲蹈舞軒陛鄙臣愚慮不顧死亡輕觸天威戰汗無地九月上以迴紇近塞懷恩又與辛雲京有隙上欲其悔過推心以待之恐其不信詔黃門侍郎裴遵慶使汾州喻旨且察其去就遵慶既至懷恩抱其足號泣而訴遵慶因宣聖恩優厚諷令入朝懷恩許諾副將范志誠說之曰公以讒言交構有功高不賞之懼嫌隙已成奈何入不測之朝公不見來瑱李光弼之事乎功成而不見容二臣以走誅懷恩然之明日又以懼死為辭許令一子入朝志誠又不可遵慶復命御史大夫王翊自迴紇使還懷恩與可汗往來恐洩其事乃止之遂令子瑒率衆攻雲京雲京出戰瑒大敗而旋進圍榆次朝廷患之先是尚書右丞顏真卿請奉詔召懷恩上因以真卿為刑部尚書兼御史大夫往宣慰之真卿曰臣往請行者時也今方受命事無益矣上問其故對曰懷恩阻兵是其反側明矣頃陛下僻狄于陝郊臣方責以春秋之義云寡君蒙塵於郊敢不恭問官守當是時也懷恩來朝以助討賊則其辭順今陛下攘去犬戎即宮京邑懷恩進不勤王退不釋衆其辭曲必不來矣且明懷恩反者獨辛雲京李抱玉駱奉先魚朝恩四人耳自外朝臣咸言其枉然懷恩將士皆子儀部曲恩信結其心陛下何不以子儀代之喻以逆順禍福必相率而歸耳上從之子儀至河中僕固瑒已為朔方兵馬使張惟岳等四人斬其首獻於闕下懷恩聞之率麾下數百騎棄其母渡河北走靈武餘衆聞子儀到束甲來奔歸者數萬懷恩至靈武嘯聚亡命其衆復振上念其勳舊不欲罪功臣厚撫其家懷恩終不從其母月餘日竟以壽終又遙授太師兼中書令大寧王餘並停是秋為鄉導誘吐蕃十萬入寇涇邠州祭來瑱之墓自序云俱遭放逐寇奉天醴泉郭子儀拒之而退永泰元年上徵天下兵以防之懷恩又糾合諸蕃衆號二十萬南犯京師遣吐蕃之衆自北道先寇醴泉奉天任敷鄭庭郝德自東道寇奉先同州羌渾奴剌之衆自西道寇盩厔鳳翔朝廷大駭詔遣郭子儀屯涇陽渾日進白元光屯奉天李光進屯雲陽馬璘郝廷玉屯中渭橋董秦屯東渭橋駱奉先李日越屯盩厔李抱玉屯鳳翔周智光杜冕屯同州上親率六軍令魚朝恩屯苑中下詔親征懷恩領迴紇及朔方之衆繼進行至鳴沙縣遇疾舁歸九月九日死於靈武部曲以鄉法焚而葬之張韶代領其衆為徐璜玉所殺璜玉領其衆又為范志誠所殺志誠領其衆迴紇進寇涇陽諸軍堅壁不戰吐蕃相持二十餘日又聞懷恩死與迴紇爭長自相疑貳莫敢先進遂大掠居人焚燒舍宇驅男女數萬而去所過踐禾穀殆盡迴紇乃詣子儀降請擊吐蕃以自効子儀分兵隨之大破吐蕃於涇州界任敷又敗走羌渾又多降於李抱玉懷恩逆命三年再犯順連諸蕃之衆為國大患士不解甲糧盡餽軍適幸天亡而上為之隱惡前後下制未嘗言其反及懷恩死羣臣以聞上為之憫默曰懷恩不反為左右所誤其寬仁如此閏十月懷恩姪名臣領千餘騎來降梁崇義長安人以升斗給役於市有膂力能卷金舒鉤後為羽林射生從來瑱於襄陽沉默寡言衆悅之累遷為偏裨瑱朝京師分使諸將戍福昌南陽來瑱被誅戍者皆潰歸崇義時在南陽統歸師徑入襄州與同列李昭薛南陽相讓為長不決諸將請曰兵非梁卿主之不可遂推崇義為帥寶應二年三月崇義殺昭與南陽以脅衆心朝廷因授其節度焉以襄州薦履兵禍屈法含容姑務息人也歷御史中丞大夫尚書遂與田承嗣李正己薛嵩李寶臣為輔車之勢奄有襄漢七州之地帶甲二萬連結根固未嘗朝覲然於羣兇地最褊兵最少法令最理禮貌最恭其地跨東南之衝數有王命之所宣洽故其人知化所親嘗勸其來朝崇義曰吾本帥來公有大勳庸當上元中以閹豎讒讟逡巡稽召及代宗嗣位不俟駕行旋見誅族今吾釁盈而事久若之何見上建中元年淮西節度使李希烈數請興師討崇義崇義懼軍旅之事加嚴焉流人郭昔告其為變崇義聞之請罪昔坐決杖配流命金部員外郎李舟諭旨以安之初劉文喜作難舟嘗入其城說利害文喜拘之會帳下殺文喜而降四方反側者聞之謂舟必能覆軍殺將是以皆惡及舟至又勸其入覲言頗切直崇義益不悅二年春發五使宣諭諸道而舟復如荊襄崇義慮有變拒境不納上言軍中疑懼請換他使由是益不安兇謀日深賓僚或有忠言沮勸多遭傷害時羣兇方自疑阻朝廷將仗大信欲來而安之以示天下乃加崇義同平章事其妻子悉加封賞且賜鐵券誓之兼授其裨將藺杲為鄧州刺史遣御史張著齎手詔徵之崇義益恐怖使持滿而受命藺杲奉詔書又不敢發馳詣崇義請命崇義益疑懼對著號哭不受詔由是徵四方兵使希烈統擊之崇義乃發兵攻江陵以通黔嶺及四望大敗而歸遂屯襄鄧希烈先發千餘人守臨漢崇義屠之無遺噍既而希烈統大軍緣漢而上崇義使將翟暉杜少誠迎戰於蠻水希烈大破之復合於涑口又破之二將求降希烈受之使統本兵入襄陽號令以安百姓崇義領親兵老小閉壁將守者斬關爭出不可止其年八月崇義與其妻投井而死傳首闕下其親戚希烈皆戮之選其嘗從臨漢之役者三千人悉斬之李懷光渤海靺鞨人也本姓茹其先徙于幽州父常為朔方列將以戰功賜姓氏更名嘉慶懷光少從軍以武藝壯勇稱朔方節度使郭子儀禮之益厚上元中累遷試太僕太常卿主右衙兵將積功勞至開府儀同三司為朔方軍都虞候永泰初實封三百戶大曆六年兼御史中丞間一年兼御史大夫加為軍都虞候性清勤嚴猛而敢誅殺雖親戚犯法皆不撓避子儀性寬厚不親軍事紀綱任懷光軍中尤畏之亦稱為理十二年以母憂罷職明年起復本官仍兼邠寧慶三州都將德宗即位罷子儀節度副元帥以其所部分隸諸將遂以懷光起復檢校刑部尚書兼河中尹邠州刺史邠寧慶晉絳慈隰節度支度營田觀察押諸蕃部落等使先是懷光頻歲率師城長武以處軍士城據原首臨涇水俯瞰通道吐蕃自是不敢南侵為西邊要防矣建中初涇原四鎮節度使段秀實為宰相楊炎所惡徵為司農卿上將復城原州乃以懷光兼涇州刺史涇原四鎮北庭節度使時懷光挾私怨新誅殺朔方舊將溫儒雅等數人涇州軍士咸畏之劉文喜因衆不欲遂以城叛詔朱泚與懷光將兵討平之加檢校太子少師二年遷檢校左僕射兼靈州大都督單于鎮北大都護朔方節度支度營田觀察鹽池押諸蕃部落六城水運使實封四百戶邠寧節度等使如故時馬燧李抱真諸軍同討魏城未拔朱滔王武俊皆反連兵救悅三年詔遣懷光統朔方兵步騎一萬五千同討田悅懷光勇而無謀至魏城之日營壘未設因與滔等大戰于愜山為滔等所敗復為悅決水以灌之諸軍不利因與燧等退軍于魏縣尋加同平章事益實封二百戶自是與滔等相持不戰明年十月涇原之卒叛上居奉天朱泚既僭大號遣中使馳告河北諸帥懷光率軍奔命時屬泥淖懷光奮厲軍士道自蒲津渡河敗泚騎兵於醴泉直赴奉天前數日先遣裨將張韶持表封蠟丸隨賊攻城乘間逾塹呼城上人曰朔方軍使也乃以繩引上城而入比登堞身中數十矢時上在重圍中守拒益急既知懷光軍至令張韶號令於城上人心乃安懷光又敗泚兵於魯店泚乃解兵還走入城懷光性粗厲疏愎緣道數言盧杞趙贊白志貞等姦佞且曰天下之亂皆此輩也吾見上當請誅之杞等微知之懼甚因說上令懷光乘勝逐泚收復京師不可許至奉天德宗從之懷光屯軍咸陽數上表暴揚杞等罪惡上不得已為貶杞趙贊白志貞以慰安之又疏中使翟文秀上之信任也又殺之懷光既不敢進軍遷延自疑因謀為亂初詔遣崔漢衡使於吐蕃出兵佐收京城蕃相尚結贊曰蕃法進軍以統兵大臣為信今奉制書無懷光名署故不敢前上聞之遣翰林學士陸贄詣懷光議用蕃軍懷光堅執言不可者三不肯署制詞慢且謂贄曰爾何所能興元元年二月詔加太尉兼賜鐵券遣李昇及中使鄧鳴鶴齎券喻旨懷光怒甚投券於地曰凡人臣反則賜鐵券今授懷光是使反也詞氣益悖衆為之懼時懷光部將韓遊瓌掌兵在奉天懷光乃與遊瓌書約令為變遊瓌密奏之翌日懷光又使趣之遊瓌復奏聞數日懷光又使趣遊瓌為門者所捕懷光且宣言曰吾今與朱泚連和車駕當須引避由是上遽幸梁州時李晟已移軍東渭橋懷光復劫李建徽楊惠元等軍移於好畤其下頗多攜貳先是朱泚甚畏之至是因欲臣之懷光虜劫無所得益疑懼不自安居二旬乃驅兵分為部隊掠涇陽三原富平自同州往河中神策將孟涉段威勇自三原擁兵三千餘人奔歸李晟懷光不能遏韓遊瓌殺懷光留後張昕以邠州從順戴休顏自奉天令於軍曰懷光已反乃令城守馳表以聞上於是授遊瓌休顏節度使乃除懷光太子太保罷其餘官其所管委本軍擇一人功高望崇者統之皆不奉詔四月懷光至河中遂偷有同絳等州按兵觀望李晟既收復京師上遣給事中孔巢父中使啖守盈持詔徵之懷光素服受命巢父乃宣言於衆太尉軍中誰可領軍事者懷光左右皆胡虜因發怒亂持兵殺巢父及守盈自是繕兵益修守拒上還京師以侍中渾瑊為河中節度副元帥將兵討懷光瑊復破同州屯軍不進數為懷光所敗時仍歲旱蝗京師初復經費不給言事者多請赦懷光時河東節度使馬燧威名素著乃加燧副元帥與瑊及鎮國軍節度駱元光邠寧節度韓遊瓌鄜坊節度唐朝臣會兵同討懷光燧率軍拔絳州至寶鼎慮懷光西走唐突京邑乃捨軍朝京師既還與瑊先自河東而降其驍將尉珪徐庭光統諸軍以圍河中貞元元年秋朔方部將牛名俊斬懷光首以降燧其子刃其弟數人乃自殺懷光死時年五十七尋詔以男一人為嗣賜莊宅各一所仍還懷光屍首任其收葬妻子並徙澧州五年又詔曰懷舊念功仁之大也興滅繼絕義之弘也昔蔡叔圮族周公封其子於東土韓信干紀漢后爵其孥以弓高侯君集之不率景化我太宗存其胤以主祀詳考先王之道洎乎烈祖之訓皆以刑佐德俾人嚮方則斧鉞之誅甲兵之伐蓋不得已而用也曩歲盜臣竊發國步多虞朕狩于近郊指期薄伐將振昆陽之旅以興涿鹿之功徵師未達于諸侯衞士且疲于七萃而李懷光三軍夙駕千里勤王上假雷霆之威下逐虎狼之衆議功方始守節靡終潛構禍胎拒違朝命棄同即異捨順効逆為臣至此在法必誅猶示綏懷庶其牽復而梟音益厲狶突莫遷大戮所加曾無噍類雖自貽伊戚與衆棄之而言念爾勞何嗟及矣以其前効猶在孤魂無歸懷之怳然是用悽軫予欲布陳大惠冀以化成保合太和期於刑措宜以懷光外孫燕八八賜姓李氏名承緒授左衞率府冑曹參軍承懷光之後仍賜錢一千貫任於懷光墓側置立莊園侍養懷光妻王氏并備四時享奠之禮嗚呼朕實不德臨於兆人泣辜宥罪素誠所志爾其保姓受氏宣力承家勉紹乃考之建國庸無若爾父之違王命初懷光授首其子瑗等皆死唯妻王氏在故上特捨其死及是又思懷光舊勳哀其絕後乃命承緒繼之史臣曰僕固懷恩李懷光咸以勇力有勞王家為臣不終遂行反噬其罪大矣然辛雲京駱奉先盧杞白志貞輩致彼二逆貽憂時君亦可謂國之讒賊矣梁崇義既無令始又無善終與妻投泉何塞其咎贊曰臣之事君有死無二懷恩懷光凶終一致崇義多姦國家所棄迷而亡歸自速其斃
