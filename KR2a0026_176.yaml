body:
  text: 舊唐書卷一百七十二列傳第一百二十二令狐楚弟定子緒綯綯子滈渙牛僧孺子蔚藂蔚子徽蕭俛弟傑俶從弟倣倣子廩李石弟福令狐楚字殼士自言國初十八學士德棻之裔祖崇亮綿州昌明縣令父承簡太原府功曹家世儒素楚兒童時已學屬文弱冠應進士貞元七年登第桂管觀察使王拱愛其才欲以禮辟召懼楚不從乃先聞奏而後致聘楚以父掾太原有庭闈之戀又感拱厚意登第後徑往桂林謝拱不預宴遊乞歸奉養即還太原人皆義之李說嚴綬鄭儋相繼鎮太原高其行義皆辟為從事自掌書記至節度判官歷殿中侍御史楚才思俊麗德宗好文每太原奏至能辨楚之所為頗稱之鄭儋在鎮暴卒不及處分後事軍中喧譁將有急變中夜十數騎持刃迫楚至軍門諸將環之令草遺表楚在白刃之中搦管即成讀示三軍無不感泣軍情乃安自是聲名益重丁父憂以孝聞免喪徵拜右拾遺改太常博士禮部員外郎母憂去官服闋以刑部員外郎徵轉職方員外郎知制誥楚與皇甫鎛蕭俛同年登進士第元和九年鎛初以財賦得幸薦俛楚俱入翰林充學士遷職方郎中中書舍人皆居內職時用兵淮西言事者以師久無功宜宥賊罷兵唯裴度與憲宗志在殄寇十二年夏度自宰相兼彰義軍節度淮西招撫宣慰處置使宰相李逢吉與度不協與楚相善楚草度淮西招撫使制不合度旨度請改制內三數句語憲宗方責度用兵乃罷逢吉相任亦罷楚內職守中書舍人元和十三年四月出為華州刺史其年十月皇甫鎛作相其月以楚為河陽懷節度使十四年四月裴度出鎮太原七月皇甫鎛薦楚入朝自朝議郎授朝議大夫中書侍郎同平章事與鎛同處台衡深承顧待十五年正月憲宗崩詔楚為山陵使仍撰哀冊文時天下怒皇甫鎛之奸邪穆宗即位之四日羣臣素服班於月華門外宣詔貶鎛將殺之會蕭俛作相託中官救解方貶崖州物議以楚因鎛作相而逐裴度羣情共怒以蕭俛之故無敢措言其年六月山陵畢會有告楚親吏贓污事發出為宣歙觀察使楚充奉山陵時親吏韋正牧奉天令于翬翰林陰陽官等同隱官錢不給工徒價錢移為羨餘十五萬貫上獻怨訴盈路正牧等下獄伏罪皆誅楚再貶衡州刺史時元稹初得幸為學士素惡楚與鎛膠固希寵稹草楚衡州制略曰楚早以文藝得踐班資憲宗念才擢居禁近異端斯害獨見不明密隳討伐之謀潛附奸邪之黨因緣得地進取多門遂忝台階實妨賢路楚深恨稹長慶元年四月量移郢州刺史遷太子賓客分司東都二年十一月授陝州大都督府長史兼御史大夫陝虢觀察使制下旬日諫官論奏言楚所犯非輕未合居廉察之任上知之遽令追制時楚已至陝州視事一日矣復授賓客歸東都時李逢吉作相極力援楚以李紳在禁密沮之未能擅柄敬宗即位逢吉逐李紳尋用楚為河南尹兼御史大夫其年九月檢校禮部尚書汴州刺史宣武軍節度汴宋亳觀察等使汴軍素驕累逐主帥前後韓弘兄弟率以峻法繩之人皆偷生未能革志楚長於撫理前鎮河陽代烏重胤移鎮滄州以河陽軍三千人為牙卒卒咸不願從中路叛歸又不敢歸州聚於境上楚初赴任聞之乃疾驅赴懷州潰卒亦至楚單騎喻之咸令弓解甲用為前驅卒不敢亂及莅汴州解其酷法以仁惠為治去其太甚軍民咸悅翕然從化後竟為善地汴帥前例始至率以錢二百萬實其私藏楚獨不取以其羨財治廨舍數百間大和二年九月徵為戶部尚書三年三月檢校兵部尚書東都留守東畿汝都防禦使其年十一月進位檢校右僕射鄆州刺史天平軍節度鄆曹濮觀察等使奏故東平縣為天平縣屬歲旱儉人至相食楚均富贍貧而無流亡者六年二月改太原尹北都留守河東節度等使楚久在并州練其風俗因人所利而利之雖屬歲旱人無轉徙楚始自書生隨計成名皆在太原實如故里及是秉旄作鎮邑老歡迎楚綏撫有方軍民胥悅七年六月入為吏部尚書仍檢校右僕射故事檢校高官者便從其班楚以正官三品不宜從二品之列請從本班優詔嘉之九年六月轉太常卿十月守尚書左僕射進封彭陽郡開國公十一月李訓兆亂京師大擾訓亂之夜文宗召右僕射鄭覃與楚宿于禁中商量制敕上皆欲用為宰相楚以王涯賈餗冤死其罪狀浮泛仇士良等不悅故輔弼之命移於李石乃以本官領鹽鐵轉運等使先是鄭注上封置榷茶使額鹽鐵使兼領之楚奏罷之曰伏以江淮數年已來水旱疾疫凋傷頗甚愁歎未平今夏及秋稍校豐稔方須惠卹各使安存昨者忽奏榷茶實為𢀿政蓋是王涯破滅將至怨怒合歸豈有令百姓移茶樹於官場中栽植摘茶葉於官埸中造作有同兒戲不近人情方在恩權孰敢沮議朝班相顧而失色道路以目而吞聲今宗社降靈奸兇盡戮聖明垂祐黎庶合安微臣蒙恩兼領使務官銜之內猶帶此名俯仰若驚夙宵知懼伏乞特回聖聽下鑒愚誠速委宰臣除此使額緣軍國之用或闕山澤之利有遺許臣條疏續具聞奏採造將及妨廢為虞前月二十一日內殿奏對之次鄭覃與臣同陳論訖伏望聖慈早賜處分一依舊法不用新條唯納榷之時須節級加價商人轉賣必校稍貴即是錢出萬國利歸有司既不害茶商又不擾茶戶上以彰陛下愛人之德下以竭微臣憂國之心遠近傳聞必當感悅從之先是元和十年出內庫弓箭陌刀賜左右街使充宰相入朝以為翼衞及建福門而止至是因訓注之亂悉罷之楚又奏諸道新授方鎮節度使等具帑抹帶器仗就尚書省兵部參辭伏以軍國異容古今定制若不由舊斯為改常未聞省閤之門忽內弓刀之器鄭注外蒙恩寵內蓄兇狂首創奸謀將興亂兆致王璠郭行餘之輩敢驅將吏直詣闕庭震驚乘輿騷動京國血濺朝路尸僵禁街史冊所書人神共憤既往不咎其源尚開前件事宜伏乞速令停罷如須參謝即具公服從之又奏請罷修曲江亭絹一萬三千七百匹回修尚書省從之開成元年上巳賜百僚曲江亭宴楚以新誅大臣不宜賞宴獨稱疾不赴論者美之以權在內官累上疏乞解使務其年四月檢校左僕射興元尹充山南西道節度使二年十一月卒于鎮年七十二冊贈司空諡曰文楚風儀嚴重若不可犯然寬厚有禮門無雜賓嘗與從事宴語方酣有非類偶至立命徹席毅然色變累居重任貞操如初未終前三日猶吟詠自若疾甚諸子進藥未嘗入口曰修短之期分以定矣何須此物前一日召從事李商隱曰吾氣魄已殫情思俱盡然所懷未已強欲自寫聞天恐辭語乖舛子當助我成之即秉筆自書曰臣永惟際會受國深恩以祖以父皆蒙褒贈有弟有子并列班行全腰領以從先人委體魄而事先帝此不自達誠為甚愚但以永去泉扃長辭雲陛更陳尸諫猶進瞽言雖號叫而不能豈誠明之敢忘今陛下春秋鼎盛寰海鏡清是修教化之初當復理平之始然自前年夏秋已來貶譴者至多誅戮者不少望普加鴻造稍霽皇威歿者昭洗以雲雷存者霑濡以雨露使五穀嘉熟兆人安康納臣將盡之苦言慰臣永蟄之幽魄書訖謂其子緒綯曰吾生無益於人勿請諡號葬日勿請鼓吹唯以布車一乘餘勿加飾銘誌但志宗門秉筆者無擇高位當歿之夕有大星隕於寢室之上其光燭廷楚端坐與家人告訣言已而終嗣子奉行遺旨詔曰生為名臣歿有理命終始之分可謂兩全鹵簿哀榮之末節難違往意誄諡國家之大典須守彝章鹵簿宜停易名須準舊例後綯貴累贈至太尉有文集一百卷行於時所撰憲宗哀冊文辭情典鬱為文士所重楚弟定字履常元和十一年進士及第累辟使府大和九年累遷至職方員外郎弘文館直學士檢校右散騎常侍桂州刺史桂管都防禦觀察等使卒贈禮部尚書緒以蔭授官歷隨壽汝三郡刺史在汝州日有能政郡人請立碑頌德緒以弟綯在輔弼上言曰臣先父元和中特承恩顧弟綯官不因人出自宸衷臣伏覩詔書以臣刺汝州日粗立政勞吏民求立碑頌尋乞追罷臣任隨州日郡人乞留得上下考及轉河南少尹加金紫此名已聞於日下不必更立碑頌乞賜寢停宣宗嘉其意從之綯字子直大和四年登進士第釋褐弘文館校書郎開成初為左拾遺二年丁父喪服闋授本官尋改左補闕史館修撰累遷庫部戶部員外郎會昌五年出為湖州刺史大中二年召拜考功郎中尋知制誥其年召入充翰林學士三年拜中書舍人襲封彭陽男食邑三百戶尋拜御史中丞四年轉戶部侍郎判本司事其年改兵部侍郎同中書門下平章事綯以舊事帶尚書省官合先省上上日同列集於少府監時白敏中崔龜從曾為太常博士至相位欲榮其舊署乃改集於太常禮院龜從手筆志其事於壁綯輔政十年累官至吏部尚書右僕射涼國公食邑二千戶十三年罷相檢校司空同中書門下平章事河中尹河中晉絳等節度使咸通二年改汴州刺史宣武軍節度使三年冬遷揚州大都督府長史淮南節度副大使知節度事累加開府儀同三司檢校司徒進食邑至三千戶九年徐州戍兵龐勛自桂州擅還七月至浙西沿江自白沙入濁河剽奪舟船而進綯聞勛至遣使慰撫供給芻米都押衙李湘白綯曰徐兵擅還必無好意雖無詔命除討權變制在藩方昨其黨來投言其數不踰二千而虛張舟航旗幟恐人見其實涉境已來心頗憂惴計其水路須出高郵縣界河岸斗峻而水深狹若出奇兵邀之俾荻船縱火於前勁兵奮擊於後敗走必矣若不於此誅鋤俟濟淮泗合徐人負怨之徒不下十萬則禍亂非細也綯性懦緩又以不奉詔命謂湘曰長淮已南他不為暴從他過去餘非吾事也其年冬龐勛殺崔彥曾據徐州聚衆六七萬徐無兵食乃分遣賊帥攻剽淮南諸郡滁和楚壽繼陷穀食既盡淮南之民多為賊所噉時兩淮郡縣多陷唯杜慆守泗州賊攻之經年不能下初詔綯為徐州南面招討使賊攻泗州急綯令李湘將兵五千人援之賊聞湘來援遣人致書于綯辭情遜順言朝廷累有詔赦宥但抗拒者三兩人耳旦夕圖去之即束身請命願相公保任之綯即奏聞請賜勛節鉞仍誡李湘但戍淮口賊已招降不得立異由是湘軍解甲安寢去警徹備日與賊軍相對歡笑交言一日賊軍乘間步騎徑入湘壘淮卒五千人皆被生縶送徐州為賊蒸而食之湘與監軍郭厚本為龐勛斷手足以徇於康承訓軍時浙西杜審權發軍千人與李湘約會兵大將翟行約勇敢知名浙軍未至而湘軍敗賊乃分兵立淮南旗幟為交鬬之狀行約軍望見急趨之千之並為賊所縛送徐州綯既喪師朝廷以左衞大將軍徐州西南面招討使馬舉代綯為淮南節度使十二年八月授檢校司徒太子太保分司東都十三年以本官為鳳翔尹鳳翔隴節度使進封趙國公食邑三千戶卒子滈渙渢滈少舉進士以父在內職而止及綯輔政十年滈以鄭顥之親驕縱不法日事遊宴貨賄盈門中外為之側目以綯黨援方盛無敢措言及懿宗即位訟者不一故綯罷權軸既至河中上言曰臣男滈爰自孩提便從師訓至於詞藝頗及輩流會昌二年臣任戶部員外郎時已令應舉至大中二年猶未成名臣自湖州刺史蒙先帝擢授考功郎中知制誥尋充學士繼叨渥澤遂忝樞衡事體有妨因令罷舉自當廢絕一十九年每遣退藏更令勤勵臣以祿位逾分齒髮已衰男滈年過長成未霑一第犬馬私愛實切憫傷臣二三年來頻乞罷免每年取得文解意待纔離中書便令赴舉昨蒙恩制寵以近藩伏緣已逼禮部試期便令就試至於與奪出自主司臣固不敢撓其衡柄臣初離機務合具上聞昨延英奉辭本擬面奏伏以戀恩方切陳誠至難伏冀宸慈察臣丹懇詔令就試是歲中書舍人裴坦權知貢舉登第者三十人有鄭羲者故戶部尚書澣之孫裴弘餘故相休之子魏簹故相扶之子及滈皆名臣子弟言無實才諫議大夫崔瑄上疏論之曰令狐滈昨以父居相位權在一門求請者詭黨風趨妄動者羣邪雲集每歲貢闈登第在朝清列除官事望雖出於綯取捨全由於滈喧然如市旁若無人權動寰中勢傾天下及綯罷相作鎮之日便令滈納卷貢闈豈可以父在樞衡獨撓文柄請下御史臺按問文解日月者奏疏不下滈既及第釋褐長安尉集賢校理咸通二年遷右拾遺史館修撰制出左拾遺劉蛻起居郎張雲各上疏極論滈云恃父秉權恣受貨賂取李琢錢除琢安南都護遂致蠻陷交州張雲言大中十年綯以諫議大夫豆盧籍刑部郎中李鄴為夔王已下侍讀欲立夔王為東宮欲亂先朝子弟之序滈內倚鄭顥人誰敢言時綯在淮南累表自雪懿宗重傷大臣意貶雲為興元少尹蛻為華陰令改滈詹事府司直滈為衆所非宦名不達渙渢俱登進士第渙位至中書舍人定子緘緘子澄湘澄亦以進士登第累辟使府牛僧孺字思黯隋僕射奇章公弘之後祖紹父幼簡官卑僧孺進士擢第登賢良方正制科釋褐伊闕尉遷監察御史轉殿中歷禮部員外郎元和中改都官知臺雜尋換考功員外郎充集賢直學士穆宗即位以庫部郎中知制誥其年十一月改御史中丞以州府刑獄淹滯人多冤抑僧孺條疏奏請按劾相繼中外肅然長慶元年宿州刺史李直臣坐贓當死直臣賂中貴人為之申理僧孺堅執不回穆宗面喻之曰直臣事雖僭失然此人有經度才可委之邊任朕欲貸其法僧孺對曰凡人不才止於持祿取容耳帝王立法束縛奸雄正為才多者祿山朱泚以才過人濁亂天下況直臣小才又何屈法哉上嘉其守法面賜金紫二年正月拜戶部侍郎三年三月以本官同平章事初韓弘入朝以宣武舊事人多流言其子公武以家財厚賂權幸及多言者班列之中悉受其遺俄而父子俱卒孤孫幼小穆宗恐為廝養竊盜乃命中使至其家閱其宅簿以付家老而簿上具有納賂之所唯於僧孺官側朱書曰某月日送牛侍郎物若干不受却付訖穆宗按簿甚悅居無何議命相帝首可僧孺之名敬宗即位加中書侍郎銀青光祿大夫封奇章子邑五百戶十二月加金紫階進封郡公集賢殿大學士監修國史寶曆中朝廷政事出於邪倖大臣朋比僧孺不奈羣小拜章求罷者數四帝曰俟予郊禮畢放卿及穆宗祔廟郊報後又拜章陳退乃於鄂州置武昌軍額以僧孺檢校禮部尚書同中書門下平章事鄂州刺史武昌軍節度鄂岳蘄黃觀察等使江夏城風土散惡難立垣墉每年加板築賦菁茆以覆之吏緣為奸弊綿歲僧孺至計茆苫板築之費歲十餘萬即賦之以塼以當苫築之價凡五年墉皆甃葺弊永除屬郡沔州與鄂隔江相對虛張吏員乃奏廢之以其所管漢陽汊川兩縣隸鄂州文宗即位就加檢校吏部尚書凡鎮江夏五年大和三年李宗閔輔政屢薦僧孺有才不宜居外四年正月召還守兵部尚書同平章事五年正月幽州軍亂逐其帥李載義文宗以載義輸忠於國遽聞失帥駭然急召宰臣謂之曰范陽之變奈何僧孺對曰此不足煩聖慮且范陽得失不繫國家休戚自安史已來翻覆如此前時劉總以土地歸國朝廷耗費百萬終不得范陽尺帛斗粟入于天府尋復為梗至今志誠亦由前載義也但因而撫之俾扞奚契丹不令入寇朝廷所賴也假以節旄必自陳力不足以逆順治之帝曰吾初不詳思卿言是也即日命中使宣慰尋加門下侍郎弘文館大學士六年吐蕃遣使論董勃義入朝修好俄而西川節度李德裕奏吐蕃維州守將悉怛謀以城降德裕又上利害云若以生羌三千出戎不意燒十三橋擣戎之腹心可以得志矣上惑其事下尚書省議衆狀請如德裕之策僧孺奏曰此議非也吐蕃疆土四面萬里失一維州無損其勢況論董勃義纔還劉元鼎未到比來修好約罷戍兵中國禦戎守信為上應敵次之今一朝失信戎醜得以為詞聞贊普牧馬茹川俯於秦隴若東襲隴坂徑走回中不三日抵咸陽橋而發兵枝梧駭動京國事或及此雖得百維州亦何補也上曰然遂詔西川不內維州降將僧孺素與德裕仇怨雖議邊公體而怙德裕者以僧孺其功謗論沸然帝亦以為不直其年十二月檢校左僕射兼平章事揚州大都督府長史淮南節度副大使知節度事時中尉王守澄用事多納纖人竊議時政禁中書密莫知其說一日延英對宰相文宗曰天下何由太平卿等有意於此乎僧孺奏曰臣等待罪輔弼無能康濟然臣思太平亦無象今四夷不至交侵百姓不至流散上無淫虐下無怨讟私室無強家公議無壅滯雖未及至理亦謂小康陛下若別求太平非臣等所及既退至中書謂同列曰吾輩為宰相天子責成如是安可久處茲地耶旬日間三上章請退不許會德裕黨盛垂將入朝僧孺故得請上既受左右邪說急於太平奸人伺其銳意故訓注見用數年之間幾危宗社而僧孺進退以道議者稱之開成初搢紳道喪閽寺弄權僧孺嫌處重藩求歸散地累拜章不允凡在淮甸六年開成二年五月加檢校司空食邑二千戶判東都尚書省事東都留守東畿汝都防禦使僧孺識量弘遠心居事外不以細故介懷洛都築第於歸仁里任淮南時嘉木怪石置之階廷館宇清華竹木幽邃常與詩人白居易吟詠其間無復進取之懷三年九月徵拜左僕射仍令左軍副使王元直賫告身宣賜舊例留守入朝無中使賜詔例恐僧孺退讓促令赴闕僧孺不獲已入朝屬莊恪太子初薨延英中謝日語及太子乃懇陳父子君臣之義人倫大經不可輕移國本上為之流涕是時宰輔皆僧孺僚舊未嘗造其門上頻宣召託以足疾久之上謂楊嗣復曰僧孺稱疾不任趨朝未可即令自便四年八月復檢校司空兼平章事襄州刺史山南東道節度使加食邑至三千戶辭日賜觚散樽杓等金銀古器令中使喻之曰以卿正人賜此古器卿且少留僧孺奏曰漢南水旱之後流民待理不宜淹留再三請行方允武宗即位就加檢校司徒會昌二年李德裕用事罷僧孺兵權徵為太子少保累加太子少師大中初卒贈太子太師諡曰文貞僧孺少與李宗閔同門生尤為德裕所惡會昌中宗閔棄斥不為生還僧孺數為德裕掎摭欲加之罪但以僧孺貞方有素人望式瞻無以伺其隙德裕南遷所著窮愁志引里俗犢子之讖以斥僧孺又目為太牢公其相憎恨如此僧孺二子蔚藂蔚字大章十五應兩經舉大和九年復登進士第三府辟署為從事入朝為監察御史大中初為右補闕屢陳章疏指斥時病宣宗嘉之曰牛氏子有父風差慰人意尋改司門員外郎出為金州刺史入拜禮吏二郎中以祀事準禮天官司所掌班列有恃權越職者蔚奏正之為時權所忌左授國子博士分司東都踰月權臣罷免復徵為吏部郎中兼史館修撰遷左諫議大夫咸通中為給事中延英謝日面賜金紫蔚封駁無避帝嘉之踰歲遷戶部侍郎襲封奇章侯以公事免歲中復本官歷工禮刑三尚書咸通末檢校兵部尚書興元尹山南西道節度使在鎮三年時中官用事急於賄賂屬徐方用兵兩中尉諷諸藩貢奉助軍蔚盡索軍府之有三萬端匹隨表進納中官怒即以神策將吳行魯代還及黃巢犯闕乃自京師奔遁避地山南拜章請老以尚書左僕射致仕卒累贈太尉子循徽徽咸通八年登進士第三佐諸侯府得殿中侍御史賜緋魚入朝為右補闕再遷吏部員外郎乾符中選曹猥濫吏為姦弊每歲選人四千餘員徽性貞剛特為奏請由是銓稍正能否旌別物議稱之巢賊犯京師父蔚方病徽與其子自扶籃輿投竄山南閣路險狹盜賊縱橫谷中遇盜擊徽破首流血被體而捉輿不輟盜苦迫之徽拜之曰父年高疾甚不欲駭動人皆有父幸相垂恤盜感之而止及前谷又逢前盜相告語曰此孝子也即同舉輿延於其家以帛封創饘飲奉蔚留之信宿得達梁州故吏感恩爭來奔問時僖宗已幸成都徽至行朝拜章乞歸侍疾已除諫議大夫不拜謂宰相杜讓能曰願留兄循在朝以當門戶乞侍醫藥時循為給事中丞相許之其年鍾家艱執喪梁漢既除以中書舍人徵未赴疾作以舍人綸制之地不可曠官請授散秩改給事中從駕還京至陳倉疾甚經年方間宰相張濬為招討使奏徽為判官檢校左散騎常侍詔下鳳翔促令赴闕徽謂所親曰國步方艱皇居初復帑廩皆虛正賴羣臣協力同心王室而於破敗之餘圖雄霸之舉俾諸侯離心必貽後悔也以吾衰疾之年安能為之扞難辭疾不起明年濬敗召徽為給事中楊復恭叛歸山南李茂貞上表請自出兵糧問罪但授臣招討使奏不待報茂貞與王行瑜軍已出疆上怒其專不時可之茂貞恃強章疏不已昭宗延英召諫官宰相議可否以邠鳳皆有中人內應不敢極言相顧辭遜上情不悅徽奏曰兩朝多難茂貞實有翼衞之功惡諸楊阻兵意在嫉惡所造次者不俟命而出師也近聞兩鎮兵入界多有殺傷陛下若不處分梁漢之民盡矣須授以使名明行約束則軍中爭不畏法帝曰此言極是乃以招討之命授之及茂貞平賊自恃寖驕多撓國政命杜讓能料兵討之徽諫曰岐是國門茂貞倔強不顧禍患萬一蹉跌挫國威也不若漸以制之及師出復召徽謂之曰卿能斟酌時事岐軍烏合朕料必平卿以為捷在何日徽對曰臣忝侍從諫諍之列所言軍國據理陳聞如破賊之期在陛下考蓍龜責將帥非臣之職也而王師果衂大臣被害徽尋改中書舍人歲中遷刑部侍郎封奇章男崔胤連結汴州惡徽言事改散騎常侍不拜換太子賓客天復初賊臣用事朝政不綱拜章請罷詔以刑部尚書致仕乃歸樊川別墅病卒贈吏部尚書藂字表齡開成二年登進士第出佐使府歷踐臺省乾符中位至劍南西川節度使黃巢之亂從幸西川拜太常卿以病求為巴州刺史不許駕還拜吏部尚書襄王之亂避地太原卒子蟜位至尚書郎蕭俛字思謙曾祖太師徐國公嵩開元中宰相祖華襲徐國公肅宗朝宰相父恆贈吏部尚書皆自有傳俛貞元七年進士擢第元和初復登賢良方正制科拜右拾遺遷右補闕元和六年召充翰林學士七年轉司封員外郎九年改駕部郎中知制誥內職如故坐與張仲方善仲方駁李吉甫諡議言用兵徵發之弊由吉甫而生憲宗怒貶仲方俛亦罷學士左授太僕少卿十三年皇甫鎛用事言於憲宗拜俛御史中丞俛與鎛及令狐楚同年登進士第明年鎛援楚作相二人雙薦俛於上自是顧眄日隆進階朝議郎飛騎尉襲徐國公賜緋魚袋穆宗即位之月議命宰相令狐楚援之拜中書侍郎平章事仍賜金紫之服八月轉門下侍郎十月吐蕃寇涇原命中使以禁軍援之穆宗謂宰臣曰用兵有必勝之法乎俛對曰兵者凶器戰者危事聖主不得已而用之以仁討不仁以義討不義先務招懷不為掩襲古之用兵不斬祀不殺厲不擒二毛不犯田稼安人禁暴師之上也如救之甚於水火故王者之師有征無戰此必勝之道也如或縱肆小忿輕動干戈使敵人怨結師出無名非惟不勝乃自危之道也固宜深慎帝然之時令狐楚左遷西川節度使王播廣以貨幣賂中人權幸求為宰相而宰相段文昌復左右之俛性嫉惡延英面言播之纖邪納賄喧於中外不可以污台司事已垂成帝不之省俛三上章求罷相任長慶元年正月守左僕射進封徐國公罷知政事俛居相位孜孜正道重慎名器每除一官常慮乖當故鮮有簡拔而涉剋深然志嫉奸邪脫屣重位時論稱之穆宗乘章武恢復之餘即位之始兩河廓定四鄙無虞而俛與段文昌屢獻太平之策以為兵以靜亂時已治矣不宜黷武勸穆宗休兵偃武又以兵不可頓去請密詔天下軍鎮有兵處每年百人之中限八人逃死謂之消兵帝既荒縱不能深料遂詔天下如其策而行之而藩籍之卒合而為盜伏於山林明年朱克融王廷湊復亂河朔一呼而遺卒皆至朝廷方徵兵諸藩籍既不充尋行招募烏合之徒動為賊敗由是復失河朔蓋消兵之失也俛性介獨持法守正以己輔政日淺超擢太驟三上章懇辭僕射不拜詔曰蕭俛以勤事國以疾退身本末初終不失其道既罷樞務俾居端揆朕欲加恩超等復吾前言而繼有讓章至於三四敦諭頗切陳乞彌堅成爾謙光移之選部可吏部尚書俛又以選曹簿書煩雜非攝生之道乞換散秩其年十月改兵部尚書二年以疾表求分司不許三月改太子少保尋授同州刺史寶曆二年復以少保分司東都文宗即位授檢校左僕射守太子少師俛稱疾篤不任赴闕乞罷所授官詔曰新除太子少師蕭俛代炳台燿躬茂天爵文可以經緯邦俗行可以感動神祇夷澹粹和精深敏直進退由道周旋令名近以師傅之崇疇于舊德俾從優逸冀保養頤而抗疏懇辭勇退知止嘗亦敦諭確乎難拔遂茲牢讓以厚時風可銀青光祿大夫守尚書左僕射致仕俛趣尚簡潔不以聲利自污在相位時穆宗詔撰故成德軍節度使王士真神道碑對曰臣器褊狹此不能強王承宗先朝阻命事無可觀如臣秉筆不能溢美或撰進之後例行貺遺臣若公然阻絕則違陛下撫納之宜僶俛受之則非微臣平生之志臣不願為之秉筆帝嘉而免之俛家行尤孝母韋氏賢明有禮理家甚嚴俛雖為宰相侍母左右不異褐衣時丁母喪毀瘠踰制免喪文宗徵詔懇以疾辭既致仕于家以洛都官屬賓友避歲時請謁之煩乃歸濟源別墅逍遙山野嘯詠窮年八年以莊恪太子在東宮上欲以耆德輔導復以少師徵之俛令弟傑奉表京師復納制書堅辭痼疾詔曰不待年而求謝於理身之道則至矣其如朝廷之望何朕以肇建元良精求師傅遐想漢朝故事玄成石慶當時重德咸歷此官吾以元子幼沖切於師訓欲以賴汝發明古今冀忠孝之規日聞于耳特遣左右至於林園而卿高蹈翛然屏絕趨進復遣令弟還吾詔書天爵自優冥鴻方遠不轉之志其堅若山循省來章致煩為愧終以呂尚之秩遂其疏曠之心勵俗激貪所補多矣有益於政寄聲以聞亦有望於舊臣矣可太子太傅致仕開成二年俛弟俶授楚州刺史辭日文宗謂俶曰蕭俛先朝名相筋力未衰可一來京國朕賜俛詔書匹帛卿便賫至濟源道吾此意詔曰卿道冠時髦業高儒行著作礪濟川之効弘致君匡國之規留芳巖廊逸老林壑累降褒詔亟加崇秩而志不可奪情見乎辭鴻飛入冥吟想增歎今賜絹三百匹便令蕭俶宣示俛竟不起卒傑字豪士元和十二年登進士第累官侍御史遷主客員外郎大和九年十月鄭注為鳳翔節度使慎選參佐李訓以傑檢校工部郎中充鳳翔隴觀察判官其年十一月鄭注誅傑為鳳翔監軍使所害俶以蔭授官大和中累遷至河南少尹九年五月拜諫議大夫開成二年出為楚州刺史四年三月遷越州刺史御史中丞浙東都團練觀察使會昌中入為左散騎常侍遷檢校刑部尚書華州刺史潼關防禦等使大中初坐在華州時斷獄不法授太子賓客分司四年檢校戶部尚書兗州刺史兗沂海節度使復入為太子賓客大中十二年以太子少保分司東都卒俛從父弟倣倣父悟恆之弟也悟仕至大理司直倣大和元年登進士第大中朝歷諫議大夫給事中咸通初遷左散騎常侍懿宗怠臨朝政僻於奉佛內結道場聚僧念誦又數幸諸寺施與過當倣上疏論之曰臣聞玄祖之道由慈儉為先而素王之風以仁義為首相沿百代作則千年至聖至明不可易也如佛者生於天竺去彼王宮割愛中之至難取滅後之殊勝名歸象外理絕塵中非為帝王之所能慕也昔貞觀中高宗在東宮以長孫皇后疾亟嘗上言曰欲請度僧以資福事后曰為善有徵吾未為惡善或無報求福非宜且佛者異方之教所可存而勿論豈以一女子而紊王道乎故諡為文德且母后之論尚能如斯哲王之謨安可反是伏覩陛下留神天竺屬意桑門內設道場中開講會或手錄梵筴或口揚佛音雖時啟於延英從容四輔慮稍稀於聽政廢失萬機居安思危不可忽也夫從容者君也必疇咨於臣盡忠匡救外逆其耳內沃其心陳臯陶之謨述仲虺之誥發揮王道恢益帝圖非賜對之閒徒侍坐而已夫廢失者上拒其諫下希其旨言則狎玩意在順從漢重神仙東方朔著十洲之記梁崇佛法劉孝儀詠七覺之詩致祠禱無休講誦不已以至大空海內中輟江東以此言之是廢失也然佛者當可以悟取不可以相求漢晉已來互興寶刹姚石之際亦有高僧或問以苦空究其不滅止聞有性多曰忘言執著貪緣非其旨也必乞陛下力求民瘼虔奉宗祧思繆賞與濫刑其殃立至俟勝殘而去殺得福甚多幸罷講筵頻親政事昔年韓愈已得罪於憲宗今日微臣固甘心於遐徼疏奏帝甚嘉之四年本官權知貢舉遷禮部侍郎轉戶部以檢校工部尚書出為滑州刺史充義成軍節度鄭滑潁觀察處置等使在鎮四年滑臨黃河頻年水潦河流泛溢壞西北隄倣奏移河四里兩月畢功畫圖以進懿宗嘉之就加刑部尚書入為兵部尚書判度支轉吏部尚書選序平允咸通末復為兵部尚書判度支尋以本官同平章事累遷中書門下二侍郎兼戶部兵部尚書遷左右僕射改司空弘文館大學士蘭陵郡開國侯俄而盜起河南內官握兵王室濁亂倣氣勁論直同列忌之罷知政事出為廣州刺史嶺南節度使倣性公廉南海雖富珍奇月俸之外不入其門家人疾病醫工治藥須烏梅左右於公廚取之倣知而命還促買於市遇亂不至京師而卒子廩咸通三年進士擢第累遷尚書郎乾符中以父出鎮南海免官侍行中和中徵為中書舍人再遷京兆尹僖宗再幸山南廩以疾不能從襄王僭竊廩宗人遘受偽署廩懼自洛避地河朔鎮冀節度使王鎔館之於深州光化三年卒廩貞退寡合綽有家法初從父南海地多榖紙倣敕子弟繕寫缺落文史廩白曰家書缺者誠宜補葺然此去京師水陸萬里不可露齎當須篋笥人觀兼乘謂是貨財古人薏苡之嫌得為深誡倣曰吾不之思也故濁亂之際克保令名子頎亦登進士第後官位顯達李石字中玉隴西人祖堅父明石元和十三年進士擢第從涼國公李聽歷四鎮從事石機辯有方略尤精吏術藩府稱之自聽征伐常司留使務事無不辦大和三年為鄭滑行軍司馬時聽握兵河北令石入朝奏事占對明辯文宗目而嘉之府罷入為工部郎中判鹽鐵案五年改刑部郎中由兵部郎中令狐楚請為太原節度副使七年拜給事中九年七月權知京兆尹事十月遷戶部侍郎判度支事文宗自德裕宗閔朋黨相傾大和七年已後宿素大臣疑而不用意在擢用新進孤立庶幾無黨以革前弊故賈餗舒元輿驟階大用及訓注伏誅欲用令狐楚尋而中輟石自朝議郎加朝議大夫以本官同平章事判使如故石器度豁如當官不撓自京師變亂之後宦者氣盛凌轢南司延英議事中貴語必引訓以折文臣石與鄭覃嘗謂之曰京師之亂始自訓注而訓注之起始自何人仇士良等不能對其勢稍抑搢紳賴之是時踰月人情不安帝謂侍臣曰如聞人心尚未安帖比日何如石對曰比日苦寒蓋刑殺太過致此陰沴昨聞鄭注到鳳翔招募士卒不至捕索誅夷不已臣恐邊上聞之乘此生事宜降詔安喻其心從之江西湖南兩道觀察使以新經訓注之亂吏卒多死進官健衣糧一百二十分充宰相募召從人石奏曰宰相上弼聖政下理羣司若忠正無私宗社所祐縱逢盜賊兵不能傷若事涉隱欺心懷矯妄雖有防衞鬼得而誅臣等願推赤心以答聖奬孟軻知非臧氏孔子不畏匡人其兩道所進衣糧並望停寢依從前制置祇以金吾手力引從可之帝又曰宰相之任在選賢任能石曰臣與鄭覃常以此事為切但以人各有求苟遂所欲則美譽至稍不如意則謗議生只宜各委所司薦用臣等擇可授之則物議息矣其年十二月中使田全操劉行深巡邊回走馬入金光門從者訛言兵至百官朝退倉惶駭散有不及束帶韈而乘者市人叫譟塵坌四起二相在中書人吏稍散鄭覃曰耳目頗異且宜出去石曰事勢不可知但宜堅坐鎮之冀將寧息若宰相亦走則中外亂矣必若繼亂走亦何逃任重官崇人心所屬不可忽也石視簿書沛然自若京城無賴之徒皆戎服兵仗北望闕門以俟變內使連催閉皇城門金吾大將軍陳君賞率其徒立望仙門下謂中使曰假如有賊閉門不晚請徐觀其變無宜自弱晡晚方定是日苟非石之鎮靜君賞之禦侮幾將亂矣開成元年改元大赦石等商量節文放京畿一年租稅及正至端午進奉並停三年其錢代充百姓紐配錢諸道除藥物口味茶菓外不得進獻諸司宣索製造並停三年赦後紫宸宣對鄭覃曰陛下改元御殿全放京畿一年租稅又停天下節鎮進奉恩澤所該實當要切近年赦令皆不及此上曰朕務行其實不欲崇長空文石對曰赦書須內置一本陛下時省覽之十道黜陟使發日付與公事根本令與長吏詳擇施行方盡利害之要石以從前德音雖降人君不能守姦吏從而違之故有內置之奏以諷之尋加中書侍郎集賢殿大學士領鹽鐵轉運使上御紫宸論政曰為國之道致治甚難石對曰朝廷法令行則易臣聞文王陟降在上陛下推赤誠上達于天何憂不治上又曰治亂由人邪正由時運耶鄭覃對曰由聖帝由忠臣是由人也石曰亦由時運九廟聖靈鍾德於陛下時也陛下行己之道則是由人而前代帝王甚有德者當亂離無奈何之際又安得不推運耶帝曰卿言是也石又奏咸陽令韓遼請開興成渠舊漕在咸陽縣西十八里東達永豐倉自秦漢已來疏鑿其後堙廢昨遼計度用功不多此漕若成自咸陽抵潼關三百里內無車輓之勤則轅下牛盡得歸耕永利秦中矣李固言曰王涯已前已曾陳奏實秦中之利但恐徵役今非其時上曰莫有陰陽拘忌否苟利於人朕無所慮也石辭領使務八月罷鹽鐵轉運使石用金部員外郎韓益判度支案益坐贓繫臺石奏曰臣以韓益曉錢穀錄用之不謂貪猥如此帝曰宰相但知人則用有過則懲卿所用人且不掩其惡可謂至公從前宰相用人有過曲為蔽之不欲人彈劾此大謬也但知能則舉舉不失職則奬之自然易得其人何必容隱三年正月五日石自親仁里將曙入朝盜發於故郭尚父宅引弓追及矢纔破膚馬逸而回盜已伏坊門揮刀斫石斷馬尾竟以馬逸得還私第上聞之駭愕遣中使撫問賜金瘡藥因差六軍兵士三十人衞從宰相是日京師大恐常參官入朝者九人而已旬日方安石拜章辭位者三乃加金紫光祿大夫中書侍郎同平章事江陵尹荊南節度使李訓之亂人情危迫天子起石於常僚之中付以衡柄石以身徇國不顧患難振舉朝綱國威再復而中官仇士良切齒惡之而伏戎加害天子深知其故畏逼而不能理乃至罷免及石赴鎮賜宴之儀並闕人士傷之恥君子之道消也石至鎮表讓中書侍郎乃加檢校兵部尚書兼平章事武宗即位就加檢校尚書右僕射會昌三年十月加檢校司空平章事隴西郡開國伯食邑七百戶太原尹北都留守河東節度觀察等使時澤潞劉稹阻兵以石嘗為太原副使諳練北門軍政故代劉沔鎮之初沔以兵三千人戍橫水王師之討澤潞也王逢軍於榆社訴兵少請益之詔石以太原之卒赴榆社石乃割橫水戍卒一千五百人令別將楊弁率之以赴王逢舊例發軍人給二縑石以支計不足量減一匹軍人聚怨又將及歲除促令上路衆愈不悅楊弁乘其釁謀亂出言激動軍人四年正月軍亂逐石朝廷乃以晉絳觀察使崔元式代還五年檢校司徒東都留守判東都尚書省事畿汝都防禦使以太子少保分司卒石弟福字能之大和七年登進士第累辟使府石為宰相自薦弟於延英言福才堪理人授監察御史累遷尚書郎出為商鄭汝潁四州刺史大中時檢校工部尚書滑州刺史兼御史大夫充義成軍節度鄭滑潁觀察使入為刑部侍郎累遷刑部戶部尚書乾符初以檢校右僕射襄州刺史兼御史大夫充山南東道節度四年草賊王仙芝徒黨數萬寇掠山南福團練鄉兵屯集要路賊不敢犯其秋賊陷岳鄂饒信等州十二月逼江陵節度使楊知溫求援於福福即自率州兵及沙陀五百騎赴援時賊已陷江陵之郛聞福兵至乃退去僖宗嘉之就加檢校司空同平章事歸朝終於太子太傅史臣曰彭陽奇章起徒步而升台鼎觀其人文彪炳潤色邦典射策命中橫絕一時誠俊賢也而冠曳組論道於臯夔之伍孰曰不然如能蹈道匪躬中立無黨則其善盡矣蕭太師貞獨嫉惡不為利回不以夷惠儗之俾之經綸則其道至矣開成之始帝道方淪石於此時欲振頹緒幾嬰戕賊可為咄嗟多僻之時止堪太息贊曰喬松孤立蘿蔦夤緣柔附凌雲豈曰能賢嗚呼楚孺道喪曲全蕭李相才致之外篇
