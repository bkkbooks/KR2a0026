body:
  text: 舊唐書卷一百七列傳第五十七玄宗諸子靖德太子琮庶人瑛棣王琰庶人瑤靖恭太子琬庶人琚夏悼王一儀王璲潁王懷哀王敏永王璘壽王瑁延王玢盛王琦濟王環信王瑝義王玼陳王圭豐王珙恆王瑱涼王璿汴哀王璥玄宗三十子元獻楊皇后生肅宗劉華妃生奉天皇帝琮靖恭太子琬儀王璲趙麗妃生廢太子瑛錢妃生棣王琰皇甫德儀生鄂王瑤劉才人生光王琚貞順武皇后生夏悼王一懷哀王敏壽王瑁盛王琦高婕妤生潁王郭順儀生永王璘柳婕妤生延王玢鍾美人生濟王環盧美人生信王瑝閻才人生義王玼王美人生陳王圭陳美人生豐王珙鄭才人生恆王瑱武賢儀生涼王璿汴哀王璥餘七王早夭奉天皇帝琮玄宗長子也本名嗣直景雲元年九月封許昌郡王先天元年八月進封郯王開元四年正月遙領安西大都護仍充安撫河東關內隴右諸蕃大使十三年改封慶王仍改名潭十五年遙領涼州都督兼河西諸軍節度大使二十一年加太子太師改名琮二十四年拜司徒天寶元年兼太原牧十一載薨贈靖德太子葬於渭水之南細柳原仍於啓夏門內置廟祔享焉肅宗元年建寅月九日詔追冊為奉天皇帝妃竇氏為恭應皇后備禮改葬於華清宮北齊陵以尚書右僕射冀國公裴冕為其使初開元二十五年太子瑛得罪廢令琮養其子及天寶十一載琮薨以瑛子俅為嗣慶王除祕書監同正員廢太子瑛玄宗第二子也本名嗣謙景雲元年九月封真定郡王先天元年八月進封郢王開元三年正月立為皇太子七年正月加元服其年玄宗又令太子詣國子學行齒胄之禮仍敕右散騎常侍褚𣰋量升筵講論學官及文武百官節級加賜十三年改名鴻納妃薛氏禮畢曲赦京城之內侍講潘肅等並加級改職中書令蕭嵩親迎特封徐國公二十五年七月改名瑛瑛母趙麗妃本伎人有才貌善歌舞玄宗在潞州得幸及景雲升儲之後其父元禮兄常奴擢為京職開元初皆至大官及武惠妃寵幸麗妃恩乃漸弛時鄂王瑤母皇甫德儀光王琚母劉才人皆玄宗在臨淄邸以容色見顧出子朗秀而母加愛焉及惠妃承恩鄂光之母亦漸疏薄惠妃之子壽王瑁鍾愛非諸子所比瑛於內第與鄂光王等自謂母氏失職嘗有怨望惠妃女咸宜公主出降於楊洄洄希惠妃之旨規利於己日求其短譖於惠妃妃泣訴於玄宗以太子結黨將害於妾母子亦指斥於至尊玄宗惑其言震怒謀於宰相意將廢黜中書張九齡奏曰陛下纂嗣鴻業將三十年太子已下常不離深宮日受聖訓今天下之人皆慶陛下享國日久子孫蕃育不聞有過陛下奈何以一日之間廢棄三子伏惟陛下思之且太子國本難於動搖昔晉獻公惑寵嬖之言太子申生憂死國乃大亂漢武威加六合受江充巫蠱之事將禍及太子遂至城中流血晉惠帝有賢子為太子容賈后之譖以至喪亡隋文帝取寵婦之言廢太子勇而立晉王廣遂失天下由此而論之不可不慎今太子既長無過二王又賢臣待罪左右敢不詳悉玄宗默然事且寢其年駕幸西京以李林甫代張九齡為中書令希惠妃之旨託意於中貴人揚壽王瑁之美惠妃深德之二十五年四月楊洄又構於惠妃言瑛兄弟三人與太子妃兄駙馬薛鏽常構異謀玄宗遽召宰相籌之林甫曰此蓋陛下家事臣不合參知玄宗意乃決矣使中官宣詔於宮中並廢為庶人鏽配流俄賜死於城東驛天下之人不見其過咸惜之其年武惠妃數見三庶人為祟怖而成疾巫者祈請彌月不痊而殞瑛有六男儼伸倩俅備警慶王琮先無子瑛得罪後玄宗遣鞫之天寶中儼為新平郡王光祿卿同正員伸為平原郡王宗正卿同正員俅為嗣慶王寶應元年詔雪瑤瑛琚之罪贈瑛為皇太子瑤琚復贈為王棣王琰玄宗第四子也初名嗣真開元二年十二月封為鄫王十二年三月改封棣王仍改名洽十五年遙領太原牧太原已北諸軍節度大使二十二年加太子太傅餘如故二十四年改名琰天寶元年六月遙領兼武威郡都督河西隴右經略節度大使先是琰妃韋氏有過琰怒之不敢奏聞乃斥於別室寵二孺人孺人又不相協至十一載孺人乃密求巫者書符置於琰履中以求媚琰與監院中官有隙中官聞其事密奏於玄宗云琰厭魅聖躬玄宗使人掩其履而獲之玄宗大怒引琰詰責之琰頓首謝曰臣之罪合死矣請一言以就鼎鑊然臣與新婦情義絶者二年于茲臣有二孺人又皆爭長臣實不知有符恐此三人所為也惟三哥辨其罪人及推問之竟孺人也玄宗猶疑琰知情怒未解太子已下皆為請命囚於鷹狗坊中絶朝請憂懼而死琰妃即少師韋滔女無子琰死後妃得還其父琰男女繁衍至五十五人天寶中封為王者三人僎為汝南郡王祕書監同正員僑為宜都王衛尉卿同正員俊為濟南王光祿卿同正員寶應元年五月代宗即位捨琰罪贈其王位鄂王瑤玄宗第五子也初名嗣初開元二年五月封為鄂王十二年改名涓遙領幽州都督河北道節度大使二十一年四月加太子太保兼幽州都督餘如故二十三年改名瑤二十五年得罪廢寶應元年五月追復靖恭太子琬玄宗第六子也初名嗣玄開元二年三月封為甄王十二年三月改名滉封為榮王十五年授京兆牧又遙領隴右節度大使二十三年加開府儀同三司餘如故二十五年改名琬天寶元年六月授單于大都護十四年十一月安祿山反於范陽其月制以琬為征討元帥高仙芝為副令仙芝徵河隴兵募屯於陝郡以禦之數日琬薨琬素有雅稱風格秀整時士庶冀琬有所成功忽然殂謝遠近咸失望焉贈靖恭太子葬于見子西原琬諸子尤繁衍男女五十八人天寶中封為郡王者二俯為濟陰王太僕卿同正員偕為北平王國子祭酒同正員光王琚玄宗第八子也開元十二年封為光王十五年遙領廣州都督五府經略大使二十三年七月光王琚儀王濰潁王澐壽王清延王洇盛王沐信王沔義王漼等十王並授開府儀同三司皇子圭封為陳王澄封為翌王潓封為恆王滔封為汴王陳王已下第四王幼未授官並置府官僚屬其日光儀等十人同於東宮尚書省上詔宰臣及文武百僚送儀注甚盛俄除十五王府元僚並未有府幕同於禮院上亦無精選其時琚兼廣州都督餘如故琚與鄂王瑤皇子中有學尚才識同居內宅最相愛狎琚有才力善騎射初封甚善玄宗愛之以母見疏薄嘗有怨言為人所構得罪人用憐之寶應元年五月追復官爵無子夏悼王一玄宗第九子也母貞順皇后為惠妃見寵一生而美秀上鍾愛無比名之為一開元五年孩孺而薨玄宗追封諡時車駕在東都葬於城南龍門東岑欲宮中舉目見之儀王璲玄宗第十二子也初名濰開元十三年五月封為儀王十五年授河南牧二十三年加開府儀同三司兼河南牧其年改名璲永泰元年二月薨廢朝三日贈太傅天寶中有子封王者二人侁為鍾陵郡王光祿卿同正員僆為廣陵王國子祭酒同正員潁王玄宗第十三子也讀書有文詞初名澐開元十三年封潁王十五年遙領安東都護平盧軍節度大使二十三年加開府儀同三司改名安祿山反除蜀郡大都督劍南節度大使楊國忠為之副玄宗幸蜀令御史大夫魏方進充置頓使先移牒至蜀託以潁王之藩令設儲供玄宗至馬嵬方進被殺乃令先赴本郡以蜀郡長史崔圓為副性儉率將渡綿州江登舟見綵緣席為藉者顧曰此可以為寢處奈何踐之命撤去初奉命之藩卒遽不遑受節綿州司馬史賁進說曰王帝子也且為節度大使今之藩而不持節單騎徑進人何所瞻請建大槊蒙之油囊為旌節狀先驅道路足以威衆笑曰但為真王何用假旌節乎將至成都崔圓迓之拜於馬前不止之圓頗怒玄宗至視事兩月人甚安之為圓所奏罷居內宅後令宣慰肅宗於彭原遂從歸京師建中四年薨年六十六輟朝三日子伸天寶中封滎陽郡王授衛尉卿同正員懷哀王敏玄宗第十五子也幼而豐秀以母惠妃之寵玄宗特加顧念才晬開元八年二月薨追封諡權窆於景龍觀天寶十三載改葬京城南以祔其母敬陵也永王璘玄宗第十六子也母曰郭順儀劍南節度尚書虛己之妹璘數歲失母肅宗收養夜自抱眠之少聰敏好學貌陋視物不正開元十三年三月封為永王十五年五月遙領荊州大都督二十年七月加開府儀同三司改名璘天寶十四載十一月安祿山反范陽十五載六月玄宗幸蜀至漢中郡下詔以璘為山南東路及嶺南黔中江南西路四道節度採訪等使江陵郡大都督餘如故璘七月至襄陽九月至江陵召募士將數萬人恣情補署江淮租賦山積於江陵破用巨億以薛鏐李臺卿蔡為謀主因有異志肅宗聞之詔令歸覲于蜀璘不從命十二月擅領舟師東下甲仗五千人趨廣陵以季廣琛渾惟明高仙琦為將璘生於宮中不更人事其子襄城王又勇而有力馭兵權為左右眩惑遂謀狂悖璘雖有窺江左之心而未露其事吳郡採訪使李希言乃平牒璘大署其名璘遂激怒牒報曰寡人上皇天屬皇帝友于地尊侯王禮絶僚品簡書來往應有常儀今乃平牒抗威落筆署字漢儀隳紊一至於斯乃使渾惟明取希言季廣琛趣廣陵攻採訪李成式璘進至當塗希言在丹陽令元景曜閻敬之等以兵拒之身走吳郡李成式使將李承慶拒之先是肅宗以璘不受命先使中官啖廷瑤段喬福招討之中官至廣陵成式括得馬數百匹時河北招討判官司虞郎中李銑在廣陵瑤等結銑為兄弟求之將兵銑麾下有騎一百八十人遂率所領屯于楊子成式使判官評事裴茂以廣陵步卒三千同拒于瓜步洲伊婁埭希言將元景曜及成式將李神慶並以其衆迎降于璘璘又殺丹徒太守閻敬之以徇江左大駭裴茂至瓜步洲廣張旗幟耀于江津璘與登陴望之竟日始有懼色季廣琛召諸將割臂而盟以二於璘是日渾惟明走于江寧馮季康康謙投于廣陵之白沙廣琛以步卒六千趨廣陵璘使騎追之廣琛曰我感王恩是以不能決戰逃而歸國若逼我我則不擇地而回戰矣使者返報其夕銑等多燃火人執兩炬以疑之隔江望者兼水中之影一皆為二矣璘軍又以火應之璘懼以官軍悉濟矣遂以兒女及麾下宵遁遲明不見濟者遂入城具舟楫使襄城王驅其衆以奔晉陵宵諜曰王走矣於是江北之軍齊進募敢死士趙侃庫狄岫趙連城等共二十人先鋒遊奕于新豐皆因醉而寐璘聞官軍之至乃使襄城王高仙琦逆擊之驛騎奔告侃等介馬而出襄城王已隨而至銑等奔救張左右翼擊之射中襄城王首軍遂敗高仙琦等四騎與璘南奔至鄱陽郡司馬陶備閉城拒之璘怒命焚其城至餘干及大庾嶺將南投嶺外為江西採訪使皇甫侁下防禦兵所擒因中矢而薨子等為亂兵所害肅宗以璘愛弟隱而不言壽王瑁玄宗第十八子也初名清初瑁母武惠妃開元元年見幸寵傾後宮頻産夏悼王懷哀王上仙公主皆端麗襁褓不育及瑁之初生讓帝妃元氏請瑁在於邸中收養妃自乳之名為己子十餘年在寧邸故封建之事晚於諸王宮中常呼為十八郎十三年三月封為壽王始入宮中十五年遙領益州大都督劍南節度大使二十三年加開府儀同三司改名瑁二十五年惠妃薨葬以后禮二十九年讓帝薨瑁請制服以報乳養之恩玄宗從之瑁天寶中有子封為王者二人伓為濟陽郡王偡為廣陽郡王鴻臚卿同正員唐法親王食封八百戶有至一千戶公主三百戶長公主加三百戶有至六百戶高宗朝以沛英豫王太平公主武后所生食逾於制垂拱中太平至一千二百戶聖曆初皇嗣封為相王食封與太平同三千戶長安中壽春王兄弟五人並賜實封三百戶神龍初相府與太平同至五千戶衛王三千戶溫王二千戶成王七百戶壽春王加四百戶通前七百戶嗣雍衡陽臨淄巴陵中山各加二百戶通前五百戶安樂初封二千戶長寧一千五百戶宣城宜城宣安各一千戶相王女為縣主者各三百戶衛王尋升儲位相府增至七千戶太平至五千戶安樂三千戶長寧二千五百戶宣城已下各二千戶相府太平長寧安樂皆以七千為限雖水旱亦不破損免以正租庸充數唐隆元年遺制以嗣雍王守禮壽春王成器封為親王各賜實封一千戶開元之後朝恩睦親以寧府最長封至五千五百戶岐薛愛弟著勳五千戶申府以外家微至四千戶邠府以外枝至一千八百戶皇妹為公主者食封一千戶中宗女亦同其後皇子封王者賜封二千戶皇女為公主者賜封五百戶咸宜賜湯沐以母惠妃封至一千戶諸皇女為公主者例加至一千戶其封自開元已來皆約以三千為限延王玢玄宗第二十子也初名洄玢母即尚書右丞柳範孫也最為名家玄宗深重之玢亦仁愛有學問開元十三年封為延王十五年遙領安西大都護磧西節度大使二十三年七月加開府儀同三司餘如故改名玢天寶十五載玄宗幸蜀玢男女三十六人不忍棄於道路數日不及行在所玄宗怒之賴漢中王瑀抗疏救之聽歸於靈武興元元年薨天寶末封子倬彭城郡王祕書監同正員侹平陽郡王殿中監同正員盛王琦玄宗第二十一子也壽王母弟初名沐十三年三月封為盛王十五年領揚州大都督二十年加開府儀同三司餘如故改名琦天寶十五年六月玄宗幸蜀在路除琦為廣陵大都督仍領江南東路及淮南河南等路節度支度採訪等使以前江陵大都督府長史劉彙為之副以廣陵長史李成式為副大使兼御史中丞琦竟不行廣德二年四月薨贈太傅天寶末有子封王者二人償真定郡王太常卿同正員佩封武都郡王殿中監同正員濟王環玄宗第二十二子也初名溢開元十三年三月封濟王二十三年七月授開府儀同三司其月改名環天寶末有子封為王者二人傃為永嘉郡王衛尉卿同正員俯為平樂郡王光祿卿同正員信王瑝玄宗第二十三子也初名沔開元十三年三月封為信王二十三年七月授開府儀同三司仍改名瑝天寶末有子封為王者二人佟為新安郡王太常卿同正員倜為晉陵郡王光祿卿同正員義王玼玄宗第二十四子也初名漼開元十三年三月封為義王二十三年七月授開府儀同三司仍改名玼天寶末有子封為王者二人儀為舞陽郡王太僕卿同正員僇為高密郡王宗正卿同正員陳王圭玄宗第二十五子也初名渙開元二十三年七月封為陳王二十四年三月改名圭天寶末男女二十一人封為王者二人他為臨淮郡王太常卿同正員佼為安陽王殿中監同正員豐王珙玄宗第二十六子也初名澄開元二十三年七月封為豐王二十四年二月改名珙天寶十五年六月玄宗幸蜀至扶風郡授珙武威郡都督仍領河西隴右安西北庭等路節度支度採訪使以隴右太守鄧景山為之副兼武威長史御史中丞充都副大使珙竟不行廣德元年十月吐蕃凌逼上都上將幸陝州自苑中而出騎從半渡滻水將軍王懷忠遂閉苑門橫截五百餘騎擁十宅諸王西投吐蕃至城西適遇元帥郭子儀懷忠謂子儀曰主上東遷社稷無主萬國顒顒何所瞻仰今僕奉諸王等西奔以副天下之望令公身為元帥廢置在手何不行冊立之事乎子儀未及對珙遂越次而言曰令公作何語何不言也行軍司馬王延昌責之曰主上雖蒙塵于外聖德欽明王身為藩翰何乃發狂悖之詞也延昌當奏聞于上子儀又數讓之命軍士領之盡赴行在潼關謁見上不之責珙歸幕次詞又不順羣臣恐遂為亂請除之遂賜死天寶中有子二人為王佻齊安郡王宗正卿同正員胄宜春郡王鴻臚卿同正員恆王瑱玄宗第二十七子也初名潓開元二十三年七月封為恆王性好道常服道士衣授右衛大將軍加開府儀同三司二十四年二月改名瑱天寶十五載從幸巴蜀不復衣道士衣矣涼王璿玄宗第二十九子也初名漎母武賢儀則天時高平王重規女也開元中入宮中號為小武妃二十三年七月封為涼王二十四年二月改名璿初貞觀中高宗為晉王以文德皇后最少子后崩後纍年太宗憐之不令出閣至立為太子高宗朝睿宗為豫王雖成長亦以則天最小子不令出閣及至聖曆初封為相王始出閣中宗時以譙王重福失愛出遷外藩衛王重俊為太子入與成王千里等起兵將誅韋后故溫王重茂雖年十六七竟亦居中先天之後皇子幼則居內東封年以漸成長乃於安國寺東附苑城同為大宅分院居為十王宅令中官押之於夾城中起居每日家令進膳又引詞學工書之人入教謂之侍讀十王謂慶忠棣鄂榮光儀潁永延濟蓋舉全數其後盛儀壽陳豐恆涼六王又就封入內宅二十五年鄂光得罪忠繼大統天寶中慶棣又歿唯榮儀等十四王居院而府幕列於外坊時通名起居而已外諸孫成長又於十宅外置百孫院每歲幸華清宮宮側亦有十王院百孫院宮人每院四百百孫院三四十人又於宮中置維城庫諸王月俸物約之而給用諸孫納妃嫁女亦就十宅中太子不居於東宮但居於乘輿所幸之別院太子亦分院而居婚嫁則同親王公主在於崇仁之禮院天寶十五載六月玄宗幸蜀儀王已下十三王從至漢中郡遣永王璘出鎮荊州至德二年十月從還京廣德元年十二月五日上都失守有儀潁壽延盛濟信義陳恆涼十一王扈從幸陝州十二月從還上都璿之子天寶中封為王者一人仂瀘陽郡王殿中監同正員汴哀王璥玄宗第三十子也初名滔開元二十五年七月封為汴王二十四年二月改名璥以其月薨史臣曰前史有云母愛者子抱太子瑛之廢有由然矣琬為元帥不幸遽薨豈天啓亂階何失衆望之速也永王璘父在蜀城兄居靈武不能立忠孝之節為社稷之謀而乃聚兵江上規為己利不義不昵以災其身書所謂自作孽不可逭也豐王珙因緣厄運竊有覬覦不慎樞機自貽伊咎悲矣贊曰螽斯之詠樂有子孫用建藩屏以崇本根讒勝瑛廢恩移至尊盜熾琬卒情乖萬民口禍豐珙自災永璘惜乎二胤不如仁人
