body:
  text: 舊唐書卷一百六十八列傳第一百一十八韋溫蕭祐附獨孤郁弟朗錢徽子可復高釴弟銖鍇馮宿弟定審封敖韋溫字弘育京兆人祖肇吏部侍郎父綬德宗朝翰林學士以散騎常侍致仕綬弟貫之憲宗朝宰相自有傳溫七歲時日念毛詩一卷年十一歲應兩經舉登第釋褐太常寺奉禮郎以書判拔萃調補祕書省校書郎時綬致仕田園聞溫登第愕然曰判入高等在羣士之上得非交結權幸而致耶令設席於庭自出判目試兩節溫命筆即成綬喜曰此無愧也調授咸陽尉入為監察御史以父在田里憲府禮拘難於省謁不拜換著作郎一謝即還侍省父疾溫侍醫藥衣不解帶垂二十年父憂毀瘠踰制免喪久之為右補闕忠鯁救時宋申錫被誣溫倡言曰宋公履行有素身居台輔不當有此是姦人陷害也吾輩諫官豈避一時之雷電而致聖君賢相蒙蔽惑之咎耶因率同列伏閣切爭之由是知名大和五年太廟第四第六室缺漏上怒罰宗正卿李鋭將作王堪乃詔中使鳩工補葺之溫上疏曰臣聞吏舉其職國家所以治事歸於正朝廷所以尊夫設制度立官司事存典故國有經費而最重者奉宗廟也伏以太廟當修詔下踰月有司弛墮曾不加誡宜黜慢官以懲不恪之罪擇可任者責以繕完之功此則事歸于正吏舉其職也而聖思不勞百職無曠今慢官不恪止于罰俸宗廟所切便委內臣是許百司之官公然廢職以宗廟之重為陛下所私羣官有司便同委棄此臣竊為聖朝惜此事也事關宗廟皆書史策苟非舊典不可率然伏乞更下詔書得委所司營繕則制度不紊官業交修上乃止內使羣臣上尊號溫上疏曰德如三皇止稱皇功如五帝止稱帝徽號之來乃聖王之末事今歲三川水災江淮旱歉恐非崇飾徽稱之時帝深嘉之乃止改侍御史李德裕作相遷禮部員外郎或以溫厚於牛僧孺言於德裕德裕曰此人堅正中立君子也鄭注鎮鳳翔自知不為所齒求德門弟子為參佐請溫為副使或以為理不可拒拒則生患溫曰擇禍莫若輕拒之止於遠貶從之有不測之禍鄭注誅轉考功員外郎尋知制誥召入翰林為學士以父職禁廷憂畏成病遺誡不令居禁職懇辭不拜俄兼太子侍讀每晨至少陽院午見莊恪太子溫曰殿下盛年宜早起學周文王為太子雞鳴時問安西宮太子幼不能行其言稱疾上不悅改太常少卿未幾拜給事中王晏平為靈武刻削軍士贓罪發帝以智興之故減死貶官溫三封詔書文宗深奬之莊恪得罪召百僚諭之溫曰太子年幼陛下訓之不早到此非獨太子之過遷尚書右丞吏部員外郎張文規父弘靖長慶初在幽州為朱克融所囚文規不時省赴人士喧然罪之溫居綱轄首糾其事出文規為安州刺史鹽鐵判官姚勗知河陰院嘗雪冤獄鹽鐵使崔珙奏加酬奬乃令權知職方員外郎制出令勗上省溫執奏曰國朝已來郎官最為清選不可以賞能吏上令中使宣諭言勗能官且放入省溫堅執不奉詔乃改勗檢校禮部郎中翌日帝謂楊嗣復曰韋溫不放姚勗入省有故事否嗣復對曰韋溫志在銓擇清流然姚勗士行無玷梁公元崇之孫自殿中判鹽鐵案陛下奬之宜也若人有吏能不入清流孰為陛下當煩劇者此衰晉之風也上素重溫亦不奪其操出為陝虢觀察使武宗即位李德裕用事召拜吏部侍郎欲引以為相時李漢以家行不謹貶汾州司馬溫從容白德裕曰李漢不為相公所知昨以不孝之罪絀免乞加按問德裕曰親情耶溫曰雖非親昵久相知耳德裕不悅居無何出溫為宣歙觀察使辟鄭處誨為觀察判官德裕愈不悅池州人訟郡守溫按之無狀杖殺之明年瘍生於首謂愛壻張復魯曰豫任校書郎時夢二黃衣人齎符來追及滻將渡一人續至曰彼墳至大功須萬日遂不涉而寤計今萬日矣與公訣矣明日卒贈工部尚書諡曰孝溫在朝時與李王玉楊嗣復周旋及楊李禍作歎曰楊三李七若取我語豈至是耶初溫以楊李與德裕交怨及居位溫勸楊李徵用德裕釋憾解慍二人不能用故及禍溫無子女適薛蒙善著文續曹大家女訓十二章士族傳寫行于時溫剛腸寡合人多疏簡唯與常侍蕭祐善蕭祐者蘭陵人少孤貧耿介苦學事親以孝聞自處士徵拜左拾遺纍遷至考功郎中祐博雅好古尤喜圖畫前代鍾王遺法蕭張筆勢編序真僞為二十卷元和末進御優詔嘉之授兵部郎中出為虢州刺史入為太常少卿轉諫議大夫踰月為桂州刺史御史中丞桂管防禦觀察使大和二年八月卒于官贈右散騎常侍祐間淡貞退善鼓琴賦詩書畫盡妙遊心林壑嘯詠終日而名人高士多與之遊給事中韋溫尤重之結為林泉之友獨孤郁河南人父及天寶末與李華蕭穎士等齊名善為文所著仙掌銘大為時流所賞位終常州刺史郁貞元十四年登進士第文學有父風尤為舍人權德輿所稱以子妻之貞元末為監察御史元和初應制舉才識兼茂明於體用策入第四等拜左拾遺太子司議郎杜從郁拜左補闕郁與同列論之曰從郁是宰臣佑之子父居宰執從郁不宜居諫列乃改為左拾遺又論曰補闕之與拾遺資品雖殊同是諫官若時政或有得失不可令子論父從郁竟改他官四年轉右補闕又與同列拜章論中官吐突承璀不宜為河北招討使乃改招撫宣慰使五年兼史館修撰尋召充翰林學士遷起居郎權德輿作相郁以婦公辭內職憲宗曰德輿乃有此佳壻因詔宰相於士族之家選尚公主者遷郁考功員外郎充史館修撰判館事預修德宗實録七年以本官復知制誥八年轉駕部郎中其年十月復召為翰林學士九年以疾辭內職十一月改祕書少監卒郁弟朗嘗居諫官請罷淮西用兵不協旨貶興元戶曹入為監察御史轉殿中十五年兼充史館修撰遷都官員外郎長慶初諫議大夫李景儉於史館飲酒憑醉謁宰相語辭侵侮朗坐同飲出為漳州刺史入為左司員外郎遷諫議大夫揚州節度使王播罷兼鹽鐵使行賂於中人求復領銅鹽朗上章論之寶曆元年十一月拜御史中丞二年六月賜金紫之服侍御史李道樞乘醉謁朗朗劾之左授司議郎憲府故事三院御史由大夫中丞自辟請命于朝時崔冕鄭居中不由憲長而除皆丞相之僚舊也敕命雖行朗拒而不納冕竟改太常博士居中分司東臺其年十月高少逸入閣失儀朗不彈奏宰相銜阻崔冕事左授少逸贊善大夫朗亦罰俸朗稱執法不稱乞罷中丞敬宗令中使諭之不允其讓文宗即位改工部侍郎大和元年八月出為福州刺史御史中丞福建觀察使是月赴官暴卒於路贈右散騎常侍郁子庠亦登進士第大中後官達亦至侍郎錢徽字蔚章吳郡人父起天寶十年登進士第起能五言詩初從鄉薦寄家江湖嘗於客舍月夜獨吟遽聞人吟於庭曰曲終人不見江上數峯青起愕然攝衣視之無所見矣以為鬼怪而志其一十字起就試之年李暐所試湘靈鼓瑟詩題中有青字起即以鬼謠十字為落句暐深嘉之稱為絶唱是歲登第釋褐祕書省校書郎大曆中與韓翃李端輩十人俱以能詩出入貴遊之門時號十才子形於圖畫起位終尚書郎徽貞元初進士擢第從事戎幕元和初入朝三遷祠部員外郎召充翰林學士六年轉祠部郎中知制誥八年改司封郎中賜緋魚袋內職如故九年拜中書舍人十一年王師討淮西詔朝臣議兵徽上疏言用兵纍歲供饋力殫宜罷淮西之征憲宗不悅罷徽學士之職守本官長慶元年為禮部侍郎時宰相段文昌出鎮蜀川文昌好學尤喜圖書古畫故刑部侍郎楊憑兄弟以文學知名家多書畫鍾王張鄭之蹟在書斷畫品者兼而有之憑子渾之求進盡以家藏書畫獻文昌求致進士第文昌將發面託錢徽繼以私書保薦翰林學士李紳亦託舉子周漢賓於徽及榜出渾之漢賓皆不中選李宗閔與元稹素相厚善初稹以直道譴逐久之及得還朝大改前志由徑以徼進達宗閔亦急於進取二人遂有嫌隙楊汝士與徽有舊是歲宗閔子壻蘇巢及汝士季弟殷士俱及第故文昌李紳大怒文昌赴鎮辭日內殿面奏言徽所放進士鄭朗等十四人皆子弟藝薄不當在選中穆宗以其事訪於學士元稹李紳二人對與文昌同遂命中書舍人王起主客郎中知制誥白居易於子亭重試內出題目孤竹管賦鳥散餘花落詩而十人不中選詔曰國家設文學之科本求才實苟容僥幸則異至公訪聞近日浮薄之徒扇為朋黨謂之關節干撓主司每歲策名無不先定永言敗俗深用興懷鄭朗等昨令重試意在精核藝能不於異書之中固求深僻題目貴令所試成就以觀學藝淺深孤竹管是祭天之樂出於周禮正經閲其呈試之文都不知其本事辭律鄙淺蕪纍亦多比令宣示錢徽庶其深自懷愧誠宜盡棄以警將來但以四海無虞人心方泰用弘寧撫式示殊恩特掩爾瑕庶明豫志孔溫業趙存約竇洵直所試粗通與及第裴撰特賜及第鄭朗等十人並落下自今後禮部舉人宜準開元二十五年敕及第訖所試雜文並策送中書門下詳覆尋貶徽為江州刺史中書舍人李宗閔劍州刺史右補闕楊汝士開江令初議貶徽宗閔汝士令徽以文昌李紳私書進呈上必開悟徽曰不然苟無愧心得喪一致修身慎行安可以私書相證耶令子弟焚之人士稱徽長者既而穆宗知其朋比之端乃下詔曰昔者卿大夫相與讓於朝士庶人相與讓於列周成王刑措不用漢文帝恥言人過真理古也朕甚慕焉中代已還爭端斯起掩抑其言則專蔽誘掖其說則侵誣自非責實循名不能彰善疸惡故孝宣必有告訐及下光武不以單辭遽行語稱訕上之非律有匿名之禁皆以防三至之毀重兩造之明是以爵人於朝則皆勸刑人於市則皆懼罪有歸而賞當事也末代偷巧內荏外剛卿大夫無進思盡忠之誠多退有後言之謗士庶人無切磋琢磨之益多銷鑠浸潤之讒進則諛言諂笑以相求退則羣居州處以相議留中不出之請蓋發其陰私公論不容之誅是生於朋黨擢一官則曰恩皆自我黜一職則曰事出他門比周之迹已彰尚矜介特由徑之蹤盡露自謂貞方居省寺者不以勤恪蒞官而曰務從簡易提紀綱者不以準繩檢下而曰密奏風聞獻章疏者更相是非備顧問者互有憎愛苟非秦鏡照膽堯羊觸邪時君聽之安可不惑參斷一謬俗化益訛禍發齒牙言生枝葉率是道也朕甚憫焉我國家貞觀開元同符三代風俗歸厚禮讓皆行兵興已來人散久矣始欲導之以德不欲驅之以刑然而信有未孚理有未至曾無恥格益用雕刓小則綜核之權見侵於下輩大則樞機之重旁撓於薄徒尚念因而化之亦冀去其尤者而宰臣懼其寖染未克澄清備引祖宗之書願垂勸誡之詔遂伸告諭頗用殷勤各當自省厥躬與我同底于道元稹之辭也制出朋比之徒如撻於市咸睚眦於紳稹徽明年遷華州刺史潼關防禦鎮國軍等使文宗即位徵拜尚書左丞大和元年十二月復授華州刺史二年秋以疾辭位授吏部尚書致仕三年三月卒時年七十五子可復可及皆登進士第可復纍官至禮部郎中大和九年鄭注出鎮鳳翔李訓選名家子以為賓佐授可復檢校兵部郎中兼御史中丞充鳳翔節度副使其年十一月李訓敗鄭注誅可復為鳳翔監軍使所害高釴字翹之祖鄭賓宋州寧陵令父去疾攝監察御史釴元和初進士及第判入等補祕書省校書郎纍遷至右補闕充史館修撰十四年上疏請不以內官為京西北和糴使十五年轉起居郎依前充職釴孤貞無黨而能纍陳時政得失長慶元年穆宗憐之面賜緋於思政殿仍命以本官充翰林學士二年遷兵部員外郎依前充職四年四月禁中有張韶之變敬宗幸左軍是夜釴從帝宿於左軍翌日賊平賞從臣賜釴錦綵七十匹轉戶部郎中知制誥十二月正拜中書舍人充職如故謝恩於思政殿因諫敬宗以求理莫若躬親用示憂勤之旨也帝深納其言又賜錦綵五十匹寶曆二年三月罷學士守本官大和三年七月授刑部侍郎四年冬遷吏部侍郎銓綜之司官業振舉七年出為同州刺史兼御史中丞八年六月卒贈兵部尚書遺命薄葬釴少時孤貧潔己力行與弟銖鍇皆以檢靜自立致位崇顯居家友睦為搢紳所重銖元和六年登進士第穆宗即位入朝為監察御史纍遷員外郎吏部郎中大和五年拜給事中七年為外官監考使八年十月文宗用國子助教李仲言為侍講銖率諫官伏閣論曰仲言素行纖邪若聽用必亂國經上令中使宣諭曰朕要仲言講書非有聽用也是歲先旱後水京師穀價騰踊彗星為變舉選皆停人情雜然流議鄭注姦謀日聞于外銖等犯難論諍冀上省悟既奉宣傳相顧失色以其危亡可翹足而待也明年訓注竊權惡銖不附己五月出為越州刺史御史中丞浙東觀察使開成三年就加檢校左散騎常侍尋入為刑部侍郎四年七月出為河南尹會昌末為吏部侍郎鍇元和九年登進士第升宏辭科纍遷吏部員外大和三年準敕試別頭進士明經鄭齊之等十八人榜出之後語辭紛競監察御史姚中立以聞詔鍇審定乃升李景王淑等人以為公六年二月自司勳郎中轉諫議大夫七年遷中書舍人九年十月以本官權知禮部貢舉開成元年春試畢進呈及第人名文宗謂侍臣曰從前文格非佳昨出進士題目是朕出之所試似勝去年鄭覃曰陛下改詩賦格調以正頽俗然高鍇亦能勵精選士仰副聖旨帝又曰近日諸侯章奏語太浮華有乖典實宜罰掌書記以誡其流李石曰古人因事為文今人以文害事懲弊抑末實在盛時乃以鍇為禮部侍郎凡掌貢部三年每歲登第者四十人三年榜出後敕曰進士每歲四十人其數過多則乖精選官途填委要窒其源宜改每年限放三十人如不登其數亦聽然鍇選擢雖多頗得實才抑豪華擢孤進至今稱之尋轉吏部侍郎其年九月出為鄂州刺史御史大夫鄂嶽觀察使卒釴子湜鍇子湘偕登進士第湜咸通十二年為禮部侍郎湘自員外郎知制誥正拜中書舍人咸通年改諫議大夫坐宰相劉瞻親厚貶高州司馬乾符初復為中書舍人三年遷禮部侍郎選士得人出為潞州大都督府長史昭義節度澤潞觀察等使卒馮宿東陽人丱歲隨父子華廬祖墓有靈芝白兔之祥宿昆弟二人皆幼有文學宿登進士第徐州節度張建封辟為掌書記後建封卒其子愔為軍士所立李師古欲乘喪襲取時王武俊且觀其釁愔恐懼計無所出宿乃以檄書招師古而說武俊曰張公與君為兄弟欲同力驅兩河歸天子衆所知也今張公歿幼子為亂兵所脅內則誠款隔絶於朝廷外則境土侵逼於強寇孤危若此公安得坐視哉誠能奏天子念先僕射之忠勳捨其子之迫脅使得束身自歸則公於朝廷有靖亂之功於張氏有繼絶之德矣武俊大悅即以表聞由是朝廷賜愔節鉞仍贈建封司徒宿以嘗從建封不樂與其子處乃從浙東觀察使賈全府辟愔恨其去己奏貶泉州司戶徵為太常博士王士真死以其子承宗不順不加諡宿以為懷柔之義不可遺其忠勞乃加之美諡轉虞部都官二員外郎元和十二年從裴度東征為彰義軍節度判官淮西平拜比部郎中會韓愈論佛骨時宰疑宿草疏出為歙州刺史入為刑部郎中十五年權判考功宿以宰臣及三品已下官故事內校考別封以進翰林學士職居內署事莫能知請依前書上考諫官御史亦請仍舊並書中上考長慶元年以本官知制誥二年轉兵部郎中依前充職牛元翼以深州不從王庭湊詔授襄州節度使元翼未出深州為庭湊所圍二年以宿檢校右庶子兼御史中丞賜紫金魚袋往總留務監軍使周進榮不遵詔命宿以狀聞元翼既至宿歸朝拜中書舍人轉太常少卿敬宗即位宿常導引乘輿出為華州刺史以父名拜章乞罷改左散騎常侍兼集賢殿學士充考制策官大和二年拜河南尹時洛苑使姚文壽縱部下侵欺百姓吏不敢捕一日遇大會嘗所捕者傲睨於文壽之側宿知而掩之杖死大和四年入為工部侍郎六年遷刑部侍郎修格後敕三十卷遷兵部侍郎九年出為劍南東川節度使檢校禮部尚書開成元年十二月卒廢朝贈吏部尚書諡曰懿有文集四十卷子圖陶韜三人皆登進士揚歷清顯宿弟定字介夫儀貌壯偉與宿俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君于牧姑蘇也定寓焉友於布衣間後帥襄陽定乘驢詣軍門吏不時白定不留而去慚笞軍吏馳載錢五十萬及境謝之定飯逆旅復書責以貴傲而返其遺深以為恨權德輿掌貢士擢居上第後於潤州佐薛蘋幕得校書郎尋為鄠縣尉充集賢校理定先時居父憂因號毀得肺病趨府或不及時大學士疑其恃才簡怠乃奪其職俾為大理評事登朝為太常博士轉祠部員外郎寶曆二年出為郢州刺史長壽縣尉馬洪沼告定強奪人妻及將闕官職田祿粟入己費用詔監察御史李顧行鞫之獄具上聞制曰馮定經使臣推問無入己贓私所告罰錢又皆公用然長吏之體頗涉無儀刑賞或乖宴遊不節緣經恩赦難更科書猶持郡符公議不可宜停見任尋除國子司業河南少尹大和九年八月為太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定總樂工閲於庭定立於其間文宗以其端凝若植問其姓氏翰林學士李王玉對曰此馮定也文宗喜問曰豈非能為古章句者耶乃召升階文宗自吟定送客西江詩吟罷益喜因錫禁中瑞錦仍令大録所著古體詩以獻尋遷諫議大夫知匭事是歲李訓事敗伏誅衣冠橫罹其禍中外危疑及改元御殿中尉仇士良請用神策仗衛在殿門定抗疏論罷人情危之又請許左右史隨宰臣入延英記事宰臣不樂二年改太子詹事三年宰臣鄭覃拜太子太師欲於尚書省上事定奏曰據六典太師居詹事府不合於都省禮上乃詔於本司上事人推美之四年遷衛尉卿是歲上章請老詔以左散騎常侍致仕會昌六年改工部尚書而卒先長慶中源寂使新羅國見其國人傳寫諷念定所為黑水碑畫鶴記韋休符之使西番也見其國人寫定商山記於屏障其文名馳於戎夷如此子袞顓軒巖四人皆進士登第咸通中歷任臺省宿從弟審寬審父子郁審貞元十二年登進士第纍辟使府入為監察御史纍遷至兵部郎中開成三年遷諫議大夫四年九月出為桂州刺史桂管觀察使入為國子祭酒國子監有孔子碑睿宗篆額加大周兩字蓋武后時篆也審請琢去僞號復大唐字從之咸通中卒於祕書監審弟寬子緘皆進士擢第知名於時封敖字碩夫其先渤海蓨人祖希奭父諒官卑敖元和十年登進士第纍辟諸侯府大和中入朝為右拾遺會昌初以員外郎知制誥召入翰林為學士拜中書舍人敖構思敏速語近而理勝不務奇澀武宗深重之嘗草賜陳傷邊將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宮錦李德裕在相位定策破回鶻誅劉稹議兵之際同列或有不可之言唯德裕籌計指畫竟立奇功武宗賞之封衛國公守太尉其制語有遏橫議於風波定奇謀於掌握逆稹盜兵壺關晝鎖造膝嘉話開懷靜思意皆我同言不他惑制出敖往慶之德裕口誦此數句撫敖曰陸生有言所恨文不逮意如卿此語秉筆者不易措言座中解其所賜玉帶以遺敖深禮重之然敖不持士範人重其才而輕其所為德裕不能大用之德裕罷相敖亦罷內職宣宗即位遷禮部侍郎大中二年典貢部多擢文士轉吏部侍郎渤海男食邑七百戶四年出為興元尹御史大夫山南西道節度使歷左散騎常侍十一年拜太常卿出為淄青節度使入為戶部尚書卒子彥卿望卿從子特卿皆進士及第咸通後歷位清顯史臣曰韋公鯁亮守官犯而得禮蕭子恬於吏隱抑亦名賢蔚章操韻非高而從容長者郁朗襟概鬱有世風三高並秀於一時二馮爭驅於千里咸以摛英掞藻華國揚名潤色之能封無與讓壽考垂慶儒何負哉贊曰伏蒲進諫染翰為文獨孤韋氏志在匡君馮高諸子綺繡繽紛禁垣擅美渤海凌雲
