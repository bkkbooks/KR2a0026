body:
  text: 舊唐書卷五十七列傳第七裴寂子律師律師子承先劉文靜弟文起文靜子樹義樹藝李孟嘗劉世龍趙文恪張平高李思行李高遷許世緒劉師立錢九隴樊興公孫武達龐卿惲張長遜李安遠裴寂字玄真蒲州桑泉人也祖融司木大夫父瑜絳州刺史寂少孤為諸兄之所鞠養年十四補州主簿及長疏眉目偉姿容隋開皇中為左親衛家貧無以自業每徒步詣京師經華嶽廟祭而祝曰窮困至此敢修誠謁神之有靈鑒其運命若富貴可期當降吉夢再拜而去夜夢白頭翁謂寂曰卿年三十已後方可得志終當位極人臣耳後為齊州司戶大業中歷侍御史駕部承務郎晉陽宮副監高祖留守太原與寂有舊時加親禮每延之宴語間以博奕至於通宵連日情忘厭倦時太宗將舉義師而不敢發言見寂為高祖所厚乃出私錢數百萬陰結龍山令高斌廉與寂博戲漸以輸之寂得錢既多大喜每日從太宗遊見其歡甚遂以情告之寂即許諾寂又以晉陽宮人私侍高祖高祖從寂飲酒酣寂白狀曰二郎密纘兵馬欲舉義旗正為寂以宮人奉公恐事發及誅急為此耳今天下大亂城門之外皆是盜賊若守小節旦夕死亡若舉義兵必得天位衆情已協公意如何高祖曰我兒誠有此計既已定矣可從之及義兵起寂進宮女五百人并上米九萬斛雜綵五萬段甲四十萬領以供軍用大將軍府建以寂為長史賜爵聞喜縣公從至河東屈突通拒守攻之不下三輔豪傑歸義者日有千數高祖將先定京師議者恐通為後患猶豫未決寂進説曰今通據蒲關若不先平前有京城之守後有屈突之援此乃腹背受敵敗之道也未若攻蒲州下之而後入關京師絶援可不攻而定矣太宗曰不然兵法尚權權在於速宜乘機早渡以駭其心我若遲留彼則生計且關中羣盜所在屯結未有定主易以招懷賊附兵強何城不克屈突通自守賊耳不足為虞若失入關之機則事未可知矣高祖兩從之留兵圍河東而引軍入關及京師平賜良田千頃甲第一區物四萬段轉大丞相府長史進封魏國公食邑三千戶及隋恭帝遜位高祖固讓不受寂勸進又不答寂請見曰桀紂之亡亦各有子未聞湯武臣輔之可為龜鏡無所疑也寂之茅土大位皆受之於唐陛下不為唐帝臣當去官耳又陳符命十餘事高祖乃從之寂出命太常具禮儀擇吉日高祖既受禪謂寂曰使我至此公之力也拜尚書右僕射賜以服玩不可勝紀仍詔尚食奉御每日賜寂御膳高祖視朝必引與同坐入閣則延之臥內言無不從呼為裴監而不名當朝貴戚親禮莫與為比武德二年劉武周將黃子英宋金剛頻寇太原行軍總管薑寶誼李仲文相次陷沒高祖患之寂自請行因為晉州道行軍總管得以便宜從事師次介休而金剛據城以抗寂寂保于度索原營中乏水賊斷其澗路由是危迫欲移營就水賊因犯之師遂大潰死散略盡寂一日一夜馳至平陽晉州以東城鎮俱沒金剛進逼絳州寂抗表陳謝高祖慰諭之復令鎮撫河東之地寂性怯無捍禦之才唯發使絡繹催督虞秦二州居人勒入城堡焚其積聚百姓惶駭復思為亂夏縣人呂崇茂遂殺縣令舉兵反引金剛為援寂擊之復為崇茂所敗被徵入朝高祖數之曰義舉之始公有翼佐之勳官爵亦極矣前拒武周兵勢足以破敵致此喪敗不獨愧於朕乎以之屬吏尋釋之顧待彌重高祖有所巡幸必令居守麟州刺史韋雲起告寂謀反訊之無端高祖謂寂曰朕之有天下者本公所推今豈有二心皂白須分所以推究耳因令貴妃三人齎珍饌寶器就寂第宴樂極歡經宿而去又嘗從容謂寂曰我李氏昔在隴西富有龜玉降及祖禰姻婭帝室及舉義兵四海雲集才涉數月升為天子至如前代皇王多起微賤劬勞行陳下不聊生公復世胄名家歷職清顯豈若蕭何曹參起自刀筆吏也唯我與公千載之後無愧前修矣其年改鑄錢特賜寂令自鑄造又為趙王元景聘寂女為妃六年遷尚書左僕射賜宴於含章殿高祖極歡寂頓首而言曰臣初發太原以有慈旨清平之後許以退耕今四海乂安伏願賜臣骸骨高祖泣下霑襟曰今猶未也要相偕老耳公為台司我為太上逍遙一代豈不快哉俄册司空賜實封五百戶遣尚書員外郎一人每日更直寂第其見崇貴如此貞觀元年加實封并前一千五百戶二年太宗祠南郊命寂與長孫無忌同升金輅寂辭讓太宗曰以公有佐命之勳無忌亦宣力於朕同載參乘非公而誰遂同乘而歸三年有沙門法雅初以恩幸出入兩宮至是禁絶之法雅怨望出妖言伏法兵部尚書杜如晦鞫其獄法雅乃稱寂知其言寂對曰法雅惟云時候方行疾疫初不聞妖言法雅證之坐是免官削食邑之半放歸本邑寂請住京師太宗數之曰計公勳庸不至於此徒以恩澤特居第一武德之時政刑紕繆官方弛紊職公之由但以舊情不能極法歸掃墳墓何得復辭寂遂歸蒲州未幾有狂人自稱信行寓居汾陰言多妖妄常謂寂家僮曰裴公有天分于時信行已死寂監奴恭命以其言白寂寂惶懼不敢聞奏陰呼恭命殺所言者恭命縱令亡匿寂不知之寂遣恭命收納封邑得錢百餘萬因用而盡寂怒將遣人捕之恭命懼而上變太宗大怒謂侍臣曰寂有死罪者四位為三公而與妖人法雅親密罪一也事發之後乃負氣憤怒稱國家有天下是我所謀罪二也妖人言其有天分匿而不奏罪三也陰行殺戮以滅口罪四也我殺之非無辭矣議者多言流配朕其從衆乎於是徙交州竟流靜州俄逢山羌為亂或言反獠劫寂為主太宗聞之曰我國家於寂有性命之恩必不然矣未幾果稱寂率家僮破賊太宗思寂佐命之功徵入朝會卒時年六十贈相州刺史工部尚書河東郡公子律師嗣尚太宗妹臨海長公主官至汴州刺史律師子承先則天時為殿中監為酷吏所殺劉文靜字肇仁自云彭城人代居京兆之武功祖懿周石州刺史父韶隋時戰沒贈上儀同三司少以其父身死王事襲父儀同三司偉姿儀有器幹倜儻多權略隋末為晉陽令遇裴寂為晉陽宮監因而結友夜與同宿寂見城上烽火仰天歎曰卑賤之極家道屢空又屬亂離當何取濟文靜笑曰世途若此時事可知吾二人相得何患於卑賤及高祖鎮太原文靜察高祖有四方之志深自結託又竊觀太宗謂寂曰非常人也大度類於漢高神武同於魏祖其年雖少乃天縱矣寂初未然之後文靜坐與李密連婚煬帝令繫於郡獄太宗以文靜可與謀議入禁所視之文靜大喜曰天下大亂非有湯武高光之才不能定也太宗曰卿安知無但恐常人不能別耳今入禁所相看非兒女之情相憂而已時事如此故來與君圖舉大計請善籌其事文靜曰今李密長圍洛邑主上流播淮南大賊連州郡小盜阻山澤者萬數矣但須真主驅駕取之誠能應天順人舉旗大呼則四海不足定也今太原百姓避盜賊者皆入此城文靜為令數年知其豪傑一朝嘯集可得十萬人尊公所領之兵復且數萬君言出口誰敢不從乘虛入關號令天下不盈半歲帝業可成太宗笑曰君言正合人意於是部署賓客潛圖起義候機當發恐高祖不從沉吟者久之文靜見高祖厚於裴寂欲因寂開説於是引寂交於太宗得通謀議及高君雅為突厥所敗高祖被拘太宗又遣文靜共寂進説曰易稱知幾其神乎今大亂已作公處嫌疑之地當不賞之功何以圖全其裨將敗衄以罪見歸事誠迫矣當須為計晉陽之地士馬精強宮監之中府庫盈積以茲舉事可立大功關中天府代王沖幼權豪並起未有適從願公興兵西入以圖大事何乃受單使之囚乎高祖然之時太宗潛結死士與文靜等協議克日舉兵會高祖得釋而止乃命文靜詐為煬帝敕發太原西河鴈門馬邑人年二十已上五十已下悉為兵期以歲暮集涿郡將伐遼東由是人情大擾思亂者益衆文靜因謂裴寂曰公豈不聞先發制人後發制於人乎唐公名應圖讖聞於天下何乃推延自貽禍釁宜早勸唐公以時舉義又脅寂曰且公為宮監而以宮人侍客公死可爾何誤唐公也寂甚懼乃屢促高祖起兵會馬邑人劉武周殺太守王仁恭自稱天子引突厥之衆將侵太原太宗遣文靜及長孫順德等分部募兵以討武周為辭又令文靜與裴寂偽作符敕出宮監庫物以供留守資用因募兵集衆及義兵將起副留守王威高君雅獨懷猜二後數日將大會於晉祠威及君雅潛謀害高祖晉陽鄉長劉世龍以白太宗太宗既知迫急欲先事誅之遣文靜與鷹揚府司馬劉政會投急變之書詣留守告威等二人謀反是日高祖與威君雅同坐視事文靜引政會至庭中云有密狀知人欲反高祖指威等取狀看之政會不肯與曰所告是副留守事唯唐公得看之耳高祖陽驚曰豈有是乎覽狀訖謂威等曰此人告公事如何君雅大詬曰此是反人欲殺我也文靜叱左右執之囚于別室既拘威等竟得舉兵高祖開大將軍府以文靜為軍司馬文靜勸改旗幟以彰義舉又請連突厥以益兵威高祖並從之因遣文靜使于始畢可汗始畢曰唐公起事今欲何為文靜曰皇帝廢冢嫡傳位後主致斯禍亂唐公國之懿戚不忍坐觀成敗故起義軍欲黜不當立者願與可汗兵馬同入京師人衆土地入唐公財帛金寶入突厥始畢大喜即遣將康鞘利領騎二千隨文靜而至又獻馬千匹高祖大悅謂文靜曰非公善辭何以致此尋率兵禦隋將屈突通於潼關通遣武牙郎將桑顯和率徑兵來擊文靜苦戰者半日死者數千人文靜度顯和軍稍怠潛遣奇兵掩其後顯和大敗悉虜其衆通尚擁兵數萬將遁歸東都文靜遣諸將追而執之略定新安以西之地轉大丞相府司馬進授光祿大夫封魯國公高祖踐祚拜納言時高祖每引重臣共食文靜奏曰陛下君臨億兆率土莫非臣而當朝撝抑言尚稱名又宸極位尊帝座嚴重乃使太陽俯同萬物臣下震恐無以措身帝不納時制度草創命文靜與當朝通識之士更刊隋開皇律令而損益之以為通法高祖謂曰本設法令使人共解而往代相承多為隱語執法之官緣此舞弄宜更刊定務使易知會薛舉寇涇州命太宗討之以文靜為元帥府長史遇太宗不豫委於文靜及司馬殷開山誡之曰舉糧少兵疲懸軍深入意在決戰不利持久即欲挑戰慎無與決待吾差當為君等取之文靜用開山計出軍爭利王師敗績文靜奔還京師坐除名俄又從太宗討舉平之以功復其爵邑拜民部尚書領陝東道行臺左僕射武德二年從太宗鎮長春宮文靜自以才能幹用在裴寂之右又屢有軍功而位居其下意甚不平每廷議多相違戾寂有所是文靜必非之由是與寂有隙文靜嘗與其弟通直散騎常侍文起酣宴出言怨望拔刀擊柱曰必當斬裴寂耳家中妖怪數見文起憂之遂召巫者於星下被髮銜刀為厭勝之法時文靜有愛妾失寵以狀告其兄妾兄上變高祖以之屬吏遣裴寂蕭瑀問狀文靜曰起義之初忝為司馬計與長史位望略同今寂為僕射據甲第臣官賞不異衆人東西征討家口無託實有觖望之心因醉或有怨言不能自保高祖謂羣臣曰文靜此言反明白矣李綱蕭瑀皆明其非反太宗以文靜義旗初起先定非常之策始告寂知及平京城任遇懸隔止以文靜為觖望非敢謀反極佑助之而高祖素疏忌之裴寂又言曰文靜才略實冠時人性復粗險忿不思難醜言悖逆其狀已彰當今天下未定外有勍敵今若赦之必貽後患高祖竟聽其言遂殺文靜文起仍籍沒其家文靜臨刑撫膺歎曰高鳥逝良弓藏故不虛也時年五十二貞觀三年追復官爵以子樹義襲封魯國公許尚公主後與其兄樹藝怨其父被戮又謀反伏誅文靜初為納言時有詔以太原元謀立功尚書令秦王某尚書左僕射裴寂及文靜特恕二死左驍衛大將軍長孫順德右驍衛大將軍劉弘基右屯衛大將軍竇琮左翊衛大將軍柴紹內史侍郎唐儉吏部侍郎殷開山鴻臚卿劉世龍衛尉少卿劉政會都水監趙文恪庫部郎中武士彠驃騎將軍張平高李思行李高遷左屯衛府長史許世緒等十四人約免一死武德九年十月太宗始定功臣實封差第文靜已死於是裴寂加食九百戶通前為一千五百戶長孫無忌王君廓尉遲敬德房玄齡杜如晦等五人食邑一千三百戶長孫順德柴紹羅藝趙郡王孝恭等四人食邑一千二百戶侯君集張公謹劉師立等三人食邑一千戶李績劉弘基二人食邑九百戶高士廉宇文士及秦叔寶程知節四人食七百戶安興貴安修仁唐儉竇軌屈突通蕭瑀封德彝劉義節八人各食六百戶錢九隴樊興公孫武達李孟嘗段志玄龐卿惲張亮李藥師杜淹元仲文十人各食四百戶張長遜張平高李安遠李子和秦行師馬三寶六人各食三百戶其王君廓事在廬江王瑗傳安興貴安修仁事在李軌傳李子和事在梁師都傳馬三寶事在柴紹傳李孟嘗趙州平棘人官至右威衛大將軍漢東郡公元仲文洛州人至右監門將軍河南縣公秦行師並州太原人至左監門將軍清水郡公並事微不録自餘無傳者盡附於此劉世龍者并州晉陽人大業末為晉陽鄉長高祖鎮太原裴寂數薦之由是甚見接待亦出入王威高君雅家然獨歸心於高祖義兵將起威與君雅內懷疑二世龍輒探得其情以白高祖及誅威等授銀青光祿大夫從平京城纍轉鴻臚卿仍改名義節時草創之始傾竭府藏以賜勳人而國用不足義節進計曰今義師數萬並在京師樵薪貴而布帛賤若採街衢及苑中樹為樵以易布帛歲收數十萬匹立可致也又藏內繒絹匹匹軸之使申截取剩物以供雜費動盈十餘萬段矣高祖並從之大收其利再遷太府卿封葛國公貞觀初轉少府監以罪配流嶺南尋授欽州別駕卒義節從子思禮萬歲通天二年為箕州刺史思禮少嘗學相術於許州張憬藏相己必歷刺史位至太師及授箕州益自喜以為太師之職位極人臣非佐命無以致之與洛州録事參軍綦連耀結構謀反謂耀曰公體有龍氣耀亦謂思禮曰公是金刀合為我輔因相解釋圖讖即定君臣之契又令思禮自衒相術每所見人皆謂之合得三品使務進之士聞之滿望然始謂云綦連耀有天分公因之以得富貴事發繫獄乃多證引朝士冀以自免所誅陷者三十餘家耀思禮並伏誅鳳閣侍郎李元素夏官侍郎孫元亨知天官侍郎事石抱忠鳳閣舍人王兄前涇州刺史勔太子司議郎路敬淳等坐與耀及思禮交結皆死初則天命河內王武懿宗按思禮之獄懿宗寬思禮於外令廣引逆徒而思禮以為得計從容自若嘗與相忤者必引令枉誅臨刑猶在外尚不之覺及衆人就戮乃收誅之趙文恪者並州太原人也隋末為鷹揚府司馬義師之舉授右三統軍武德二年拜都水監封新興郡公時大亂之後中州少馬遇突厥和親令文恪至並州與齊王元吉誘至北蕃市牛馬以資國用俄而劉武周將宋金剛來寇太原屬城皆沒真鄉公李仲文退守浩州城孤兵弱元吉遣文恪率步騎千餘助為聲援及太原為賊所陷文恪遂棄城遁去坐是賜死獄中張平高綏州膚施人也隋末為鷹揚府校尉戍太原為高祖所識因參謀議義旗建以為軍頭從平京城纍授左領軍將軍封蕭國公貞觀初出為丹州刺史坐事免令以右光祿大夫還第卒後改封羅國公永徽中追贈潭州都督李思行趙州人也嘗避仇太原高祖將舉義兵令赴京城觀覘動靜及還具論機變深稱旨授左三統軍從破宋老生平京城纍授嘉州刺史封樂安郡公永徽初卒贈洪州都督諡曰襄李高遷岐州岐山人也隋末客遊太原高祖常引之左右及擒高君雅王威等高遷有功焉授右三統軍從平霍邑圍京城力戰功最纍遷左武衛大將軍封江夏郡公檢校西麟州刺史武德初突厥寇馬邑朔州總管高滿政請救高祖令高遷督兵助鎮俄而賊兵甚盛高遷乃斬關宵遁其將士皆沒竟坐除名徙邊後以佐命功拜陵州刺史永徽五年卒贈梁州都督許世緒者並州人也大業末為鷹揚府司馬見隋祚將亡言於高祖曰天道輔德人事與能蹈機不發必貽後悔今隋政不綱天下鼎沸公姓當圖籙名應歌謠握五郡之兵當四戰之地若遂無他計當敗不旋踵未若首建義旗為天下唱此帝王業也高祖甚奇之親顧日厚義兵起授右一府司馬武德中纍除蔡州刺史封真定郡公卒弟洛仁亦以元從功臣官至冠軍大將軍行左監門將軍永徽初卒贈代州都督諡曰勇陪葬昭陵劉師立者宋州虞城人也初為王世充將軍親遇甚密洛陽平當誅太宗惜其才特免之為左親衛太宗之謀建成元吉也嘗引師立密籌其事或自宵達曙其後師立與尉遲敬德龐卿惲李孟嘗等九人同誅建成有功超拜左衛率尋遷左驍衛將軍封襄武郡公賜絹五千匹後人告師立自云眼有赤光體有非常之相姓氏又應符讖太宗謂之曰人言卿欲反如何師立大懼俯而對曰臣任隋朝不過六品身材駑下不敢輒希富貴過蒙非常之遇常以性命許國而陛下功成事立臣復致位將軍顧己循躬實踰涯分臣是何人輒敢言反太宗笑曰知卿不然此妄言耳賜帛六十匹延入臥內慰諭之羅藝之反也長安人情騷動以師立檢校右武候大將軍以備非常及藝平憲司窮究黨與師立坐與交通遂除名又以藩邸之舊尋檢校岐州都督師立上書請討吐谷渾書奏未報便遣使間其部落諭以利害多有降附列其地為開橋二州又有黨項首領拓拔赤辭先附吐谷渾負險自固師立亦遣人為陳利害赤辭遂率其種落內屬太宗甚嘉之拜赤辭為西戎州都督後師立以母憂當去職父老上表請留詔不許赴哀復令居任時河西黨項破丑氏常為邊患又阻新附師立總兵擊之軍未至破丑氏大懼遁於山谷師立追之至恤于真山而還又戰吐谷渾於小莫門川擊破之多所虜獲尋轉始州刺史十四年卒諡曰肅錢九隴本晉陵人也父在陳為境上所獲沒為皇家隸人九隴善騎射高祖信愛之常置左右義兵起以軍功授金紫光祿大夫及克京城拜左監門郎將從平薛仁杲劉武周以前後戰功纍授右武衛將軍其後從太宗擒獲竇建德平王世充從隱太子討劉黑闥於魏州力戰破賊策勳為最纍封郇國公仍以本官為苑遊將軍貞觀初出為眉州刺史再遷右監門大將軍十二年改封巢國公加食廬州實封六百戶尋卒贈左武衛大將軍潭州都督諡曰勇陪葬獻陵樊興者本安陸人也父犯罪配沒為皇家隸人興從平京城纍除右監門將軍又從太宗破薛舉平王世充竇建德積戰功纍封榮國公賜物二千段黃金三十鋌尋坐事削爵貞觀六年陵州獠反興率兵討之拜左驍衛將軍又從特進李靖擊吐谷渾為赤水道行軍總管坐遲留不赴軍期又士卒多死失亡甲仗以勳減死久之纍拜左監門大將軍封襄城郡公太宗之征遼東以興忠謹令副司空房玄齡留守京師俄又檢校右武候將軍永徽初卒贈左武候大將軍洪州都督陪葬獻陵公孫武達者雍州櫟陽人也少有膂力稱為豪俠在隋為驍果武德初至長春宮請謁太宗從討劉武周力戰功居最又從平王世充竇建德纍遷秦王府右三軍驃騎封清水縣公貞觀初檢校右監門將軍尋除肅州刺史歲餘突厥數千騎輜重萬餘入侵肅州欲南入吐谷渾武達領二千人與其精鋭相遇力戰虜稍却急攻之遂大潰擠之於張掖河又命軍士於上流以渡兵擊其餘衆賊半濟兩岸夾攻之斬溺略盡璽書慰勉之拜左監門將軍後又受詔擊鹽州叛突厥武達引兵趨靈州追及之賊方渡河見武達至據河南岸武達引兵擊之斬其渠帥可邏拔扈餘黨幾盡進封東萊郡公永徽中纍授右武衛大將軍及卒高宗廢朝舉哀贈荊州都督給東園祕器陪葬昭陵諡曰壯龐卿惲者並州太原人從太宗討隱太子有功纍拜右驍衛將軍封邾國公尋卒追封濮國公子同善官至右金吾大將軍同善子承宗開元初為太子賓客張長遜雍州櫟陽人也隋代為里長平陳有功纍至五原郡通守及天下亂遂附于突厥號長遜為割利特勤及義旗建長遜以郡降授五原太守尋除豐州總管是時梁師都薛舉請兵於突厥欲令渡河長遜知之偽為詔書與莫賀咄設示知其謀突厥乃拒師都等使高祖嘉之武德元年敕右武候驃騎將軍高靜致幣於始畢可汗路經豐州會可汗死敕於所到處納庫突厥聞而大怒欲南渡長遜乃遣高靜出塞申國家賻贈之禮突厥乃引還及征薛舉長遜不待命而至以功授豐州總管進封巴國公賜以錦袍金甲是時言事者以長遜久居豐州與突厥連結長遜懼請入朝拜右武候將軍徙封息國公賜以宮人綵物千餘段會有疾車駕親幸其第及竇軌率巴蜀兵擊王世充以長遜檢校益州行臺左僕射歷遂夔二州總管所在皆有惠政貞觀十一年卒李安遠者夏州朔方人也隋雲州刺史徹子也家富於財少從博徒不逞晚始折節讀書敬慕士友襲父爵城陽公與王圭友善大業初圭坐叔頗當配流安遠為之營護免後為正平令及義兵攻絳郡安遠與通守陳叔達嬰城自守城陷高祖與安遠有舊馳至其宅撫慰之引與同食拜右翊衛統軍封正平縣公武德元年授右武衛大將軍從太宗征伐特蒙恩澤纍戰功改封廣德郡公又使於吐谷渾與敦和好於是吐谷渾主伏允請與中國互市安遠之功也後隱太子建成潛引以為黨援安遠固拒之由是太宗益加親信貞觀初歷潞州都督懷州刺史歷任頗有聲績然傷於嚴急時論少之七年卒追贈涼州都督諡曰密十三年追封為遂安郡公史臣曰裴寂歷任仕隋官至為宮監總子女玉帛之務據倉廩兵甲之饒喜博戲之利苟多啓舉義之謀為首謁嶽神以徼福始彰不逞之心留貴妃以經宿終昧為臣之道居第一之位乏在三之規恃高祖之舊恩致文靜之極法終歸四罪尚保再生幸也文靜奮縱橫之略立締構之功罔思寵辱之機過為輕躁之行未及封而禍也惜哉凡關佐命爰第實封小大不遺賢愚自勸太宗之行賞也明矣贊曰風雲初合共竭智力勢利既分遽變讎敵
