body:
  text: 舊唐書卷二十下本紀第二十下哀帝哀皇帝諱柷昭宗第九子母曰積善太后何氏景福元年九月三日生於大內乾寧四年二月封輝王名祚天復三年二月拜開府儀同三司充諸道兵馬元帥天祐元年八月十二日昭宗遇弒翌日蔣玄暉矯宣遺詔曰我國家化隋為唐奄有天下三百年之盛業十八葉之耿光朕自纘丕圖垂將二紀雖恭勤無怠屬運數多艱致寰宇之未寧覩兵戈之屢起賴勳賢協力宗社再安豈意宮闈之間禍亂忽作昭儀李漸榮河東夫人裴貞一潛懷逆節輒肆狂謀傷疻既深已及危革萬機不可以久曠四海不可以乏君神鼎所歸須有纘繼輝王祚幼彰岐嶷長實端良裒然不羣豫所鍾愛必能克奉丕訓以安兆人宜立為皇太子仍改名柷監軍國事於戲孝愛可以承九廟恭儉可以安萬邦無樂逸遊志康寰宇百辟卿士佑茲沖人載揚我高祖太宗之休烈是日遷神柩于西宮文武百僚班慰於延和門外其日午時又矯宣皇太后令曰豫遭家不造急變爰臻禍生女職之徒事起宮奚之輩皇帝自罹鋒刃已至彌留不及顧遺號慟徒切定大計者安社稷纂丕圖者擇賢明議屬未亡人須示建長策承高祖之寶運繄元勳之忠規伏示股肱以匡沖昧皇太子柷宜於柩前即皇帝位其哀制並依祖宗故事中書門下準前處分於戲送往事居古人令範行今報舊前哲格言抆淚敷宣言不能喻帝時年十三乞且監國柩前即位宜差太常卿王溥充禮儀使又令太子家令李能告哀於十六宅丙午大行皇帝大殮皇太子柩前即皇帝位己酉矯制曰昭儀李漸榮河東夫人裴貞一今月十一日夜持刃謀逆懼罪投井而死宜追削為悖逆庶人蔣玄暉夜既弒逆詰旦宣言於外曰夜來帝與昭儀博戲帝醉為昭儀所害歸罪宮人以掩弒逆之迹然龍武軍官健備傳二夫人之言於市人尋用史太為棣州刺史以酬弒逆之功庚戌羣臣上表請聽政甲寅中書奏皇帝九月三日降誕請以其日為乾和節從之乙丑百僚赴西宮殮訖釋服皇帝見羣臣於崇勳殿西廊下中書帖今月二十四日釋服後三日一度進名起居丙辰敕朕奉太后慈旨以兩司綱運未來百官事力多闕旦夕霜冷深軫所懷令於內庫方圓銀二千一百七十二兩充見任文武常參官救接委御史臺依品秩分俵是日皇帝聽政丁巳敕乾和節方在哀疚其內道場宜停戊午遣刑部尚書張禕告哀於河中全忠號哭盡哀庚申敕乾和節文武百僚諸軍諸使諸道進奏官準故事於寺觀設齋不得宰殺只許酒果脯醢辛酉敕三月二十三日嘉會節伏以大行皇帝仙駕上升靈山將卜神既遊於天際節宜輟於人間準故事嘉會節宜停九月壬戌朔百官素服赴西內臨進名奉慰戊辰大行皇帝大祥百官素服赴西內臨己巳敕右僕射門下侍郎禮部尚書平章事裴樞宜充大行皇帝山陵禮儀使門下侍郎平章事獨孤損宜充大行皇帝山陵使兵部侍郎李燕充鹵簿使權知河南尹韋震充橋道使宗正卿李克勤充按行使庚午皇帝釋服從吉中書門下奏伏以陛下光繼寶圖纂承丕緒教道克申於先訓保任實自於慈顏今則正位宸居未崇徽號伏以大行皇帝皇后母臨四海德冠六宮推尊宜正於鴻名敬上式光於睿孝望上尊號曰皇太后奉敕宜依又敕輝王府官屬宜停辛巳山陵橋道使改差權河南尹張廷範其頓遞陵下應接等使並令廷範兼之庚寅中書奏太常寺止鼓兩字上字犯御名請改曰肇從之十月辛卯朔日有蝕之在心初度壬辰全忠自河中來朝赴西內臨祭訖對於崇勳殿甲午敕檢校太保左龍武統軍朱友恭可復本姓名李彥威貶崖州司戶同正檢校司徒右龍武統軍氏叔琮可貶貝州司戶同正又敕彥威等主典禁兵妄為扇動既有彰於物論兼亦繫於軍情謫掾遐方安能塞責宜配充本州長流百姓仍令所在賜自盡河南尹張廷範收彥威等殺之臨刑大呼曰賣我性命欲塞天下之謗其如神理何操心若此欲望子孫長世可乎呼廷範謂曰公行當及此勉自圖之是日全忠歸大梁丙申制天平軍節度使檢校太師中書令兼鄆州刺史上柱國東平王食邑七千戶張全義本官兼河南尹許州刺史忠武軍節度觀察等使判六軍諸衛事皇帝即位行事官左丞楊涉進封開國伯加食邑四百戶吏部侍郎趙光逢進開國公加食邑三百戶右散騎常侍竇回給事中孫續戶部郎中知制誥封舜卿等加勳階禮儀使太常卿王溥與一子八品正員官書寶册官吏部尚書陸扆刑部尚書張禕扆與一子八品正員官禕加階太子太保盧紹卒魏博羅紹威進救接百官絹千匹綿三千兩十一月辛酉朔癸酉午時日有黃白暈旁有青赤紉楊行密攻光州又急攻鄂州杜洪遣使求援全忠率師五萬自潁州渡淮至霍丘大掠以紓之行密分兵來拒乙酉敕據太常禮院奏於十二月內擇日册太后者朕近奉慈旨以山陵未畢哀感方纏凡百有司且虔充奉吉凶之禮難以並施太后册禮宜俟山陵畢日庶得橋山攀慕彰盡節於羣臣蘭殿承榮展盛儀於朕志情既獲遂禮實宜之付所司己丑嶺南東道辨州宜改為勳州十二月辛卯朔癸卯權知河南府尹和王傅張廷範宜復本官光祿大夫檢校司徒河東縣開國子食邑五百戶充山陵副使權知河南尹天平軍節度副使韋震權知鄆州軍州事二年春正月庚申朔楊行密陷鄂州執節度使杜洪斬於揚州市鄂嶽蘄黃等州入行密全忠自霍丘還大梁甲子太常卿王溥上大行皇帝諡號廟號乃敕右僕射平章事裴樞撰諡册中書侍郎柳璨撰哀册辛未敕朕祗荷丕圖仰惟先訓方迫遺弓之痛俯臨同軌之期將展孝思親扶護衛皇太后義深鳴鳳痛切攀龍亦欲專奉靈輿躬及園寢兼盡追摧之道用終克敬之儀其大行皇帝山陵發引日朕隨太后親至陵所付中書門下宜體至懷羣臣三表論諫乃止二月庚寅朔壬辰制以前知鄜州軍州事檢校尚書左僕射劉鄩為右金吾衛大將軍充右街使檢校左僕射朱漢賓為右羽林統軍丙申羣臣告諡於西宮己亥敕今月十一日大行皇帝啓攢宮準故事坊市禁音樂至二十日掩玄宮畢如舊庚子啓攢宮文武百僚夕臨於西宮丁未靈駕發引濮王已下從皇帝太后長樂門外祭畢歸大內己酉葬昭宗皇帝於和陵庚戌制以太常卿王溥為工部尚書壬子制以汝州刺史裴迪為刑部尚書泰寧軍節度檢校司空兗州刺史御史大夫葛從周檢校司徒兼右金吾上將軍致仕從周病風不任朝謁故也以左金吾上將軍盧彥威為左威衛上將軍是月社日樞密使蔣玄暉宴德王裕已下九王於九曲池既醉皆絞殺之竟不知其瘞所丙辰左僕射裴贄等議遷廟合遷順宗一室從之己未昭宗皇帝神主祔太廟禮院奏昭宗廟樂曰咸寧之舞三月庚申朔壬戌制以前平盧軍節度使檢校太傅同平章事兼青州刺史上柱國琅邪郡公食邑二千五百戶王師範為孟州刺史河陽三城懷孟節度觀察等使從全忠奏也甲子制以特進尚書右僕射門下侍郎同平章事太清宮使弘文館大學士延資庫使諸道鹽鐵轉運使判度支上柱國河東郡開國公食邑二千戶裴樞可守尚書左僕射光祿大夫門下侍郎戶部尚書同平章事監修國史河南縣開國子食邑五百戶獨孤損可檢校尚書左僕射同平章事兼安南都護充靜海軍節度安南管內觀察處置等使以光祿大夫中書侍郎同平章事集賢殿大學士上柱國博陵郡開國公食邑一千五百戶崔遠可守尚書右僕射以正議大夫中書侍郎同平章事判戶部事上柱國河東縣男食邑三百戶柳璨為門下侍郎兼戶部尚書同平章事太清宮使弘文館大學士延資庫使諸道鹽鐵轉運等使以正議大夫尚書吏部侍郎上柱國賜紫金魚袋張文蔚為中書侍郎同平章事監修國史判度支以銀青光祿大夫行尚書左丞上柱國弘農縣伯食邑七百戶楊涉為中書侍郎同平章事集賢殿大學士判戶部事庚午敕朕以宰臣學士文武百僚常拘官局空逐遊從今膏澤不愆豐年有望當茲韶景宜示優恩自今月十二日後至十六日各令取便選勝追遊付所司壬申以檢校司徒和王傅張廷範為太常卿丁亥敕翰林學士戶部侍郎楊注是宰臣楊涉親弟兄既秉於樞衡弟故難居宥密可守本官罷內職四月己丑朔壬辰敕河南府緱氏縣令宜兼充和陵臺令仍升為赤縣癸巳敕曰文武二柄國家大綱東西兩班官職同體咸匡聖運共列明廷品秩相對於高卑祿俸皆均於厚薄不論前代祇考本朝太宗皇帝以中外臣僚文武參用或自軍衛而居臺省亦由衣冠而秉節旄足明於武列文班不令分清濁優劣近代浮薄相尚凌蔑舊章假偃武以修文競棄本而逐末雖藍衫魚簡當一見而便許升堂縱拖紫腰金若非類而無令接席以是顯揚榮辱分別重輕遽失人心盡隳朝體致其今日實此之由須議改更漸期通濟文武百官自一品以下逐月所給料錢並須均勻數目多少一般支給兼差使諸道亦依輪次既就公平必期開泰凡百臣庶宜體朕懷和王傅張廷範者全忠將吏也以善音律求為太常卿全忠薦用之宰相裴樞以廷範非樂卿之才全忠怒罷樞相位柳璨希旨又降此詔斥樞輩故有白馬之禍丙午前棣州刺史劉仁遇檢校司空兼兗州刺史御史大夫充泰寧軍節度使乙未制左僕射裴樞新除清海軍節度使獨孤損河南尹張全義工部尚書王溥司空致仕裴贄刑部尚書張禕並賜一子八品正員官以奉山陵之勞也敕曰朕以宿麥未登時陽久亢慮闕粢盛之備軫豫宵旰之懷所宜避正位於宸居減珍羞於常膳諒惟眇質深合罪躬自今月八日已後不御正殿減常膳付所司辛丑侍御史李光庭郗殷象殿中丞張升崔昭矩起居舍人盧仁炯盧鼎蘇楷吏部員外郎崔協左補闕崔咸休右補闕杜承昭羅兗右拾遺韋彖路德延並宜賜緋魚袋兵部郎中韋乾美比部郎中楊煥皆賜紫金魚袋並以奉山陵之勞也壬寅敕朕獲荷丕圖仰遵慈訓爰崇徽號已定禮儀冀申為子之心以展奉親之敬昨所司定今月二十五日行皇太后册禮再奉慈旨以宮殿未停工作蒸暑不欲勞人宜改吉辰固難違命册禮俟修大內畢功日所司以聞癸卯太清宮使柳璨奏修上清宮畢請改為太清宮從之甲辰夜彗起北河貫文昌其長三丈在西北方丁未敕設官分職各有司存銓衡既任於吏曹除授寧煩於宰職但所司注擬申到中書過驗酌量苟或差舛難可盡定近年除授其徒實繁占選部之闕員擇公當之優便遂致三銓注擬之時皆曠職務且以宰相之任提舉百司唯務公平無私方致漸臻有道應天下州府令録並委吏部三銓注擬自天祐二年四月十一日已後中書並不除授或諸薦奏量留即度可否施行庶各司其局免致紊隳宰相提綱永存事體付所司辛亥以彗孛謫見德音放京畿軍鎮諸司禁囚常赦不原外罪無輕重遞減一等限三日內疏理聞奏壬子敕朕以沖幼克嗣丕基業業兢兢勤恭夕惕彗星謫見罪在朕躬雖已降赦文特行恩宥起今月二十四日後避正殿減常膳以明思過付所司丙辰敕準向來事例每貫抽除外以八百五十文為貫每陌八十五文如聞坊市之中多以八十為陌更有除折頓爽舊規付河南府市肆交易並以八十五文為陌不得更有改移戊午敕東上閣門西上閣門比常出入以東上為先大忌進名即西上閣門為便比因閹官擅權乃以陰陽取位不思南面但啓西門邇來相承未議更改詳其稱謂似爽舊規自今年五月一日後常朝出入取東上閣門或遇奉慰即開西上閣門永為定制付所司又敕朕以上天謫見避殿責躬不宜朔會朝正殿其五月一日朝會宜權停五月己未朔以星變不視朝敕曰天文變見合事祈禳宜於太清宮置黃籙道場三司支給齋料壬戌敕法駕遷都之日洛京再建之初慮懷土有類於新豐權更名以變於舊制妖星既出於雍分高閎難效於秦餘宜改舊門之名以壯卜年之永延喜門改為宣仁門重明門改為興教門長樂門改為光政門光範門曰應天門乾化門曰乾元門宣政門曰敷政門宣政殿曰貞觀殿日華門曰左延福門月華門曰右延福門萬壽門曰萬春門積慶門曰興善門含章門曰膺福門含清門曰延義門金鑾門曰千秋門延和門曰章善門保寧殿曰文思殿其見在門名有與西京門同名者並宜復洛京舊門名付所司乙酉夜西北彗星長六七十丈自軒轅大角及天市西垣光輝猛怒其長竟天丙寅有司修皇太后宮畢中書奏皇太后慈惠臨人寬仁馭物早叶俔天之兆克彰誕聖之符今輪奐新宮規摹舊典崇訓既徵於信史積善宜顯於昌期太后宮請以積善為名從之又以將卜郊禋預調雅樂宜以太常卿張廷範充修樂懸使丁卯荊襄節度使趙匡凝奏為故使成汭立祠宇從之己巳太清宮使柳璨奏近敕改易宮殿門名竊以玄元皇帝廟西京曰太清宮東京曰太微宮其太清宮請復為太微宮臣便給入官階從之庚午敕所司定今年十月九日有事郊丘其修製禮衣祭服宜令宰臣柳璨判祭器宜令張文蔚楊涉分判儀仗車輅宜令太常卿張廷範判壬申制新除靜海軍節度使銀青光祿大夫檢校尚書左僕射同平章事兼安南都護河南郡開國侯食邑一千戶獨孤損可責授朝散大夫棣州刺史仍令御史臺發遣出京訖聞奏敕曰朕謬將眇質叨荷丕圖常懷馭朽之心每軫泣辜之念諒於黜責豈易施行左僕射裴樞右僕射崔遠雖罷機衡尚居揆路既處優崇之任未傷進退之規不能秉志安家但恣流言謗國頗興物論難抑朝章須離八座之榮尚付六條之政勉思咎己無至尤人樞可責授朝散大夫登州刺史遠可責授朝散大夫萊州刺史便發遣出京兵部郎中韋乾美貶沂州司戶甲戌敕中書舍人封渭貶齊州司戶右補闕鄭輦密州莒縣尉兵部員外盧協祁州司戶並員外置乙亥敕吏部尚書陸扆貶濮州司戶工部尚書王溥淄州司戶司天奏旬朔已前星文變見仰觀垂象特軫聖慈自今月八日夜已後連遇陰雨測候不得至十三日夜一更三點天色暫晴景緯分明妖星不見於碧虛災沴潛消於天漢者敕曰上天謫見下土震驚致夙夜之沈憂恐生靈之多難不居正殿盡輟常羞益務齋虔以申禳禱果致玄穹覆祐孛彗消除豈罪己之感通免貽人於災沴式觀陳奏深慰誠懷丙子敕戶部郎中李仁儉貶和王府咨議起居舍人盧仁炯安州司戶壽安尉直弘文館盧晏滄州東光尉丁丑陳許節度使張全義奏得許州留後狀申自多事以來許州權為列郡今特創鼓角樓訖請復為軍額敕旨依舊置忠武軍牌額戊寅宴羣臣於崇勳殿全忠與王鎔羅紹威買宴也庚辰敕特進檢校司徒守太保致仕趙崇可曹州司戶銀青光祿大夫兵部侍郎王贊可濮州司戶辛巳敕責授登州刺史裴樞可隴州司戶責授棣州刺史獨孤損可瓊州司戶責授萊州刺史崔遠可白州司戶壬午敕司勳員外韋甄責授和王友洛陽縣令李光序責授左春坊典設郎甲申祕書監崔仁魯可密州司戶國子祭酒崔澄陳州司戶太府少卿裴針徐州司戶衛尉少卿裴紓曹州南華尉左補闕崔咸休寧陵尉司封員外薛滈輝州司戶前鹽鐵推官獨孤憲臨沂尉祕書少監裴鉥鄆州司戶長安尉直史館裴格符離尉兵部郎中李象鄭州司戶刑部員外盧薦范縣尉丙戌潁州汝陰縣人彭文妻産三男丁亥敕以翰林學士尚書職方郎中張策兼充史館修撰修國史六月戊子朔敕責授隴州司戶裴樞瓊州司戶獨孤損白州司戶崔遠濮州司戶陸扆淄州司戶王溥曹州司戶趙崇濮州司戶王贊等皆受國恩咸當重任罔思罄竭唯貯姦邪雖已謫於遐方尚難寬於國典委御史臺差人所在州縣各賜自盡時樞等七人已至滑州皆併命於白馬驛全忠令投尸於河己丑敕君臣之間進退以禮矧於求舊欲保初終苟自掇於悔尤亦須行於黜責特進守司空致仕上柱國河東縣開國公食邑二千戶裴贄早以公望常踐台司靡聞竭力以匡時每務養恬而避事洎從請老不謂無恩合慎樞機動循規矩雖云勇退乃有後言自為簿從之酋頗失人臣之禮謫居郡掾用正朝綱可責授青州司戶刑部郎中李煦可萊州司戶辛卯太微宮使柳璨奏前使裴樞充宮使日權奏請玄元觀為太清宮又別奏在京弘道觀為太清宮至今未有制置伏以今年十月九日陛下親事南禋先謁聖祖廟弘道觀既未修葺玄元觀又在北山若車駕出城禮非便穩今欲只留北邙山上老君廟一所其玄元觀請拆入都城於清化坊內建置太微宮以備車駕行事從之壬辰敕諸道節度觀察防禦刺史等部內有新除朝官前資朝官敕到後三日內發遣赴闕仍差人監送所在州縣不得停住苟或稽違必議貶黜付所司癸巳敕衛尉少卿敬沼是裴贄之甥常纍於舅或以明經撓文柄或以私事竊化權贄已左遷爾又何逭可貶徐州蕭縣尉丙申敕福建每年進橄欖子比因閹豎出自閩中牽於嗜好之間遂成貢奉之典雖嘉忠藎伏恐煩勞今後只供進蠟面茶其進橄欖子宜停戊戌敕密縣令裴練貶登州牟平尉長水令崔仁略淄州高苑尉福昌主簿陸珣沂州新泰尉泥水令獨孤韜范縣尉並員外置皆裴樞崔遠陸扆宗黨也壬寅湖南馬殷奏嶽州洞庭青草之側有古祠四所先以荒圮臣復修廟了畢乞賜名額者敕旨黃陵二妃祠曰懿節洞庭君祠曰利涉侯青草祠曰安流侯三閭大夫祠先以澧朗觀察使雷滿奏已封昭靈侯宜依天祐元年九月二十九日敕處分丙午全忠奏得宰相柳璨記事欲拆北邙山下玄元觀移入都內於清化坊取舊昭明寺基建置太微宮準備十月九日南郊行事緣延資庫鹽鐵並無物力令臣商量者臣已牒判六軍諸衛張全義指揮工作訖優詔嘉之丁未敕太子賓客柳遜嘗為張濬租庸判官又王溥監修日奏充判官授工部侍郎又與趙崇裴贄為刎頸之交昨裴樞等得罪之時合當連坐尚矜暮齒且俾懸車可本官致仕戊申敕前司勳員外郎賜緋魚袋李延古責授衛尉寺主簿七月戊午朔辛酉賜全忠迎鑾記功碑文立於都內全忠進助郊禮錢三萬貫癸亥再貶柳遜曹州司馬辛巳敕全忠請鑄河中晉絳諸縣印縣名內有城字並落下如密鄭絳蒲例單名為文壬午宰臣柳璨禮部尚書蘇循充皇太后册禮使是日於積善宮行禮畢帝乘輦赴太后宮稱賀丙戌太常禮院奏每月朔望皇帝赴積善宮起居文武百官於宮門進名起居從之八月丁亥朔戊子制中書舍人姚洎可尚書戶部侍郎充元帥府判官從全忠奏也洛苑使奏穀水屯地內嘉禾合穎乙未敕偽稱官階人泉州晉江縣應鄉貢明經陳文巨招伏罪款付河南府決殺庚子敕漢代元勳鄧禹冠諸侯之上晉朝重位王導居百辟之先皆道著匡扶功宣寰宇其於崇寵迥異等倫朕獲以眇躬重興丕運凡關制度必法舊章實仗勳賢永安宗社副元帥梁王正守太尉中書令忠武軍節度使河南尹張全義亦正守中書令俱深倚注咸正台衡其朝廷册禮告祀天地宗廟其司空則差官攝行太尉侍中中書令即宰臣攝行今太尉副元帥任冠藩垣每遇行禮之時或不在京國即事須差攝太尉行事全義見居闕下任正中樞不可更差別官又攝中書令事其太尉官如梁王朝覲在京便委行事如卻赴鎮即依前攝行所合差中書令便委全義以本官行禮其侍中司空司徒即臨時差官付所司壬寅敕前太中大夫尚書兵部侍郎賜紫金魚袋司空圖俊造登科朱紫升籍既養高以傲代類移山而釣名志樂漱流心輕食祿匪夷匪惠難居公正之朝載省載思當徇幽棲之志宜放還中條山癸卯敕太常卿張廷範宜充南郊禮儀使丁未制削奪荊襄節度使趙匡凝在身官爵是月乙未全忠遣大將楊師厚討匡凝收唐鄧復郢隨等州全忠自率親軍赴之荊襄之軍陳於漢水之陰九月丁巳朔辛酉楊師厚於襄州西六十里陰谷江口伐竹木為浮梁癸亥梁成引軍渡江甲子趙匡凝率徑兵二萬陳於江之湄師厚一戰敗之遂乘勝躡之陳於城下是夜匡凝挈其孥潰圍遁去乙丑師厚入襄陽丙寅全忠繼至壬申匡凝牙將王建武遣押牙常質以荊南降言權知荊南軍府事趙匡明今月十一日棄城上峽奔蜀川敕曰梁王躬臨貔武收復荊襄拔峴首若轉丸平荊門如沃雪連收兩鎮併走二凶乃眷勳庸載深嘉注宜賜詔奬飾內出宣旨嬭婆楊氏可賜號昭儀嬭婆王氏可封郡夫人第二嬭婆王氏先帝已封郡夫人準楊氏例改封中書奏議言乳母古無封夫人賜內職之例近代因循殊乖典故昔漢順帝以乳母宋氏為山陽君安帝乳母王氏曰野王君當時朝議非之今國祚中興禮宜求舊臣等商量楊氏望賜號安聖君王氏曰福聖君第二王氏曰康聖君從之己巳敕武成王廟宜改為武明王乙酉敕先擇十月九日有事郊丘備物之間有所未辦宜改用十一月十九日十月丙戌朔制梁王全忠可充諸道兵馬元帥別開府幕加食邑通前一萬五千戶實封一千五百戶金州馮行襲奏當道昭信軍額內一字與元帥全忠諱字同乃賜號戎昭軍制削奪荊南留後趙匡凝官爵丁亥敕洛城坊曲內舊有朝臣諸司宅舍經亂荒榛張全義葺理已來皆已耕墾既供軍賦即係公田或恐每有披論認為世業須煩按驗遂啓幸門其都內坊曲及畿內已耕植田土諸色人並不得論認如要業田一任買置凡論認者不在給還之限如有本主元自差人勾當不在此限如荒田無主即許識認付河南府甲午起居郎蘇楷駁昭宗諡號曰帝王御宇由理亂以審汙隆宗祀配天資諡號以定升降故臣下君上皆不得而私也伏以陛下順考古道昭彰至公既當不諱之朝寧阻上言之路伏以昭宗皇帝睿哲居尊恭儉垂化其於善美孰敢蔽虧然而否運莫興至理猶鬱遂致四方多事萬乘頻遷始則閹豎猖狂受幽辱於東內終則嬪嬙悖亂罹夭閼於中闈其於易名宜循考行有司先定尊諡曰聖穆景文孝皇帝廟號昭宗敢言溢美似異直書按後漢和安順帝緣非功德遂改宗稱以允臣下之請今郊禋有日祫祭惟時將期允愜列聖之心更下詳議新廟之稱庶使叶先朝罪己之德表聖主無私之明楷禮部尚書循之子凡劣無藝乾寧二年應進士登第後物論以為濫昭宗命翰林學士陸扆祕書監馮渥覆試黜落永不許入舉場楷負愧銜怨至是全忠弒逆君上柳璨陷害朝臣乃與起居郎羅衮起居舍人盧鼎連署駁議楷目不知書手僅能執筆其文羅衮作也時政出賊臣哀帝不能制太常卿張廷範改諡曰恭靈莊閔孝皇帝廟號曰襄宗全忠雄猜物鑒自楷駁諡後深鄙之既傳代之後循楷父子皆斥逐不令在朝丁未所司改題昭宗神主輟朝一日癸丑敕成德軍宜改為武順管內城縣曰平信都曰堯都欒城曰欒氏阜城曰漢阜臨城為房子避全忠祖父名也十一月乙卯朔敕潞州潞城縣改為潞子黎城曰黎亭全忠平荊襄後遂引軍將攻淮南行次棗陽阻雨比至光州道險塗潦人馬飢乏休止十餘日乃趨固始進軍距壽州三十里壽人閉壁不出左右言師老不可用是月丙辰全忠自正陽渡淮而北至汝陰全忠深悔此行無益丁卯至大梁時哀帝以此月十九日親祠圜丘中外百司禮儀法物已備戊辰宰相已下於南郊壇習儀而裴迪自大梁回言全忠怒蔣玄暉張廷範柳璨等謀延唐祚而欲郊天改元玄暉柳璨大懼庚午敕曰先定此月十九日親禮南郊雖定吉辰改卜亦有故事宜改取來年正月上辛付所司辛巳制回天再造竭忠守正功臣諸道兵馬元帥宣武宣義天平護國等軍節度觀察處置修宮闕制置度支解縣池場亳州太清宮等使開府儀同三司守太尉中書令河中尹汴