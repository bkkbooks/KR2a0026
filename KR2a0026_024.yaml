安撫兩浙鹽鐵制置發運等使開府儀同三司守侍中兼中書令杭越兩州刺史上柱國吳王食邑九千戶實封五百戶錢鏐總臨兩鎮制撫三吳道途阻艱未行册命宜令所司擇日備禮己巳夜魏博節度使羅紹威殺其衙內親軍八千人戊午全忠自內黃入魏州是月魏博衙外兵五萬自歷亭還分據紹威貝博等州汴軍攻圍之壬申敕相國總百揆魏王頃辭册命宜令所司再行册禮辛巳國子監奏奉去年十一月五日敕文應國學每年與諸道等一例解送兩人今監生郭應圖等六十人連狀論訴敕旨取士之科明經極重每年人數已有舊規去夏條疏蓋防渝濫今國子監河南府俱有論奏所試明經宜令準常年例解送禮部放人多少酌量施行但不徇囑求無致僥幸付所司二月甲申朔魏博節度使羅紹威宜許於本鎮置三代私廟癸卯敕今年禮部所放進士據依去年人數外更放兩人三月甲寅朔甲戌敕河中昭義管內俱有慈州地里相去不遠稱謂時聞錯誤其昭義管內慈州宜改為惠州壬戌全忠奏河中判官劉崇子匡圖今年進士登第遽列高科恐涉羣議請禮部落下戊寅制元帥梁王可兼領諸道鹽鐵轉運等使判度支戶部事充三司都制置使辛巳敕貶西都留守判官左諫議大夫鄭賨崖州司戶尋賜死四月甲申朔日有蝕之在胃十二度戊申魏博羅紹威奏臣當管博州聊城縣武陽莘縣武水博平高堂等五縣皆於黃河東岸其鄉村百姓渡河輸稅不便與天平軍管界接連請割屬鄆從之五月癸酉朔追贈故荊南節度使成汭鄂嶽節度使杜洪官爵仍於本州立祠廟從全忠奏也丙申敕天祐二年九月二十日於金州置戎昭軍割均房二州為屬郡比因馮行襲叶贊元勳克宣丕績用奬濟師之效遂行割地之權今命帥得人疇庸有秩其戎昭軍額宜停其均房二州却還山南東道收管六月癸未朔甲申敕襄州近因趙匡凝作帥請別立忠義軍額既非往制固是從權忠義軍額宜停廢依舊為山南東道節度使己亥權知唐州事衛審符奏州郭凋殘又不居要路請移理所於泌陽縣從之制以京兆尹佑國軍節度使韓建為青州節度使代王重師以重師代建為京兆尹壬寅敕文武百僚每月一度入閣於貞觀殿貞觀大殿朝廷正衙遇正至之辰受羣臣朝賀比來視朔未正規儀今後於崇勳殿入閣付所司左拾遺充史館修撰裴瑑以堂叔母危疾在濟源無兄弟侍疾乞假寧省從之七月壬子朔己未全忠始自魏州歸大梁魏博六州平定檢校工部尚書守宗正卿嗣邠王震停見任落下襲封以請告於外也辛未皇妹永明公主薨罷朝三日八月甲辰全忠復自汴州北渡河攻滄州乙未魏博奏割貝州永濟廣宗相州臨河內黃洹水斥丘等六縣隸魏州從之九月辛亥朔丁卯全忠大軍至滄州軍於長蘆是月積陰霖雨不止差官禜都門十月乙未兩浙錢鏐請於本鎮立三代私廟從之十一月庚戌朔丙子廢牛羊司御廚肉河南府供進所有進到牛羊便付河南府收管十二月己卯朔淮南偽署宣歙觀察使檢校司徙王茂章可金紫光祿大夫檢校太保從錢鏐奏也茂章背楊渥以宣州降錢鏐故也己丑全忠奏文武兩班一五九朝日元帥府排比廊飧敕曰百官入朝兩廊賜食遷都之後有司官闕供元帥梁王欲整大綱復行故事俾其班列益認優隆宜賜詔奬飾甲辰河陽節度副使孫乘貶崖州司戶尋賜自盡閏十二月己酉朔福建百姓僧道詣闕請為節度使王審知立德政碑從之乙丑華州鎮國節度觀察處置等使額及興德府名並宜停廢復為華州刺史充本州防禦使仍隸同州為支郡所管華商兩州諸縣先升次赤次畿並罷宜依舊名西都佑國軍作鎮已來未有屬郡其金州商州宜隸為屬郡京兆府奉先縣本屬馮翊櫟陽連接下邽奉先縣宜卻隸同州櫟陽宜隸華州丙寅奪西川節度使王建在身官爵戊辰李克用與幽州之衆同攻潞州全忠守將丁會以澤潞降太原克用以其子嗣昭為留後甲戌全忠燒長蘆營旋軍聞潞州陷故也乙亥貶興唐府少尹孫祕長流愛州尋賜死孫乘弟也四年春正月戊寅朔壬寅全忠自長蘆至大梁天子遣御史大夫薛貽矩齎詔慰勞全忠自弒昭宗之後岐蜀太原連兵牽制關西日削幸羅紹威殺牙軍全獲魏博六州將行篡代欲威臨河朔乃再興師臨幽滄冀仁恭父子乞盟則與之相結以固王鎔紹威之心而自秋迄冬攻滄州無功及聞丁會失守燒營遽還路由魏州羅紹威知失勢恐兵襲己深贊篡奪之謀他日如王受禪必罄六州軍賦以助大禮全忠深感之至大梁會薛貽矩來乃以臣禮見全忠貽矩承間密陳禪代之謀全忠心德之貽矩還奏曰元帥有受代意陛下深體時事去茲重負帝曰此吾素懷也乃降詔元帥以二月行傳禪之禮全忠偽辭二月壬子詔文武百官以今月七日齊赴元帥府癸丑宰相百官辭全忠以未斷表為詞三月戊寅朔全忠令大將李思安率兵三萬合魏博之衆攻掠幽州思安頓兵臨其郛會仁恭子守光率兵赴援思安乃還庚寅詔薛貽矩再使大梁達傳位之旨甲辰詔曰敕宰臣文武百辟藩嶽庶尹明聽朕言夫大寶之尊神器之重儻非德充宇宙功濟黔黎著重華納麓之功彰文命導川之績允熙帝載克代天工則何以統御萬邦照臨八極元帥梁王龍顏瑞質玉理奇文以英謀睿武定寰瀛以厚澤深仁撫華夏神功至德絶後光前緹油罕紀其鴻勳謳誦顯歸於至化二十年之功業億兆衆之推崇邇無異言遠無異望朕惟王聖德光被八紘宜順玄穹膺茲寶命況天文符瑞雜沓宣明虞夏昌期顯于圖籙萬機不可以久曠天命不可以久違神祇叶心歸于有德朕敬以天下傳禪聖君退居舊藩以備三恪今敕宰臣張文蔚楊涉等率文武百僚備法駕奉迎梁朝勉厲肅恭尊戴明主沖人釋茲重負永為虞賓獲奉新朝慶泰兼極中外列辟宜體朕懷乙酉乃以中書侍郎平章事張文蔚充册使禮部尚書蘇循為副中書侍郎平章事楊涉押傳國寶使翰林學士中書舍人張策為副御史大夫薛貽矩為押金寶使左丞趙光逢為副甲午文蔚押文武百僚赴大梁甲子行事册曰皇帝若曰咨爾天下兵馬元帥相國總百揆梁王朕每觀上古之書以堯舜為始者蓋以禪讓之典垂於無窮故封泰山禪梁父略可道者七十二君則知天下至公非一姓獨有自古明王聖帝集思勞神惴若納隍坐以待旦莫不居之則兢畏去之則逸安且軒轅非不明放勳非不聖尚欲遊於姑射休彼大庭矧乎曆數尋終期運久謝屬於孤藐統御萬方者哉況自懿祖之後嬖幸亂朝禍起有階政漸無象天網幅裂海水橫流四紀于茲羣生無庇洎乎喪亂誰其底綏洎于小子粵以幼年繼茲衰緒豈茲沖昧能守洪基惟王明聖在躬體于上哲奮揚神武戡定區夏大功二十光著册書北越陰山南踰瘴海東至碣石西暨流沙懷生之倫罔不悅附矧豫寡昧危而獲存今則上察天文下觀人願是土德終極之際乃金行兆應之辰況十載之間彗星三見布新除舊厥有明徵謳歌所歸屬在睿德今遣持節銀青光祿大夫守中書侍郎同中書門下平章事張文蔚等奉皇帝寶綬敬遜于位於戲天之曆數在爾躬允執其中天祿永終王其祗顯大禮享茲萬國以肅膺天命全忠建國奉帝為濟陰王遷於曹州處前刺史氏叔琮之第時太原幽州鳳翔西川猶稱天祐正朔天祐五年二月二十一日帝為全忠所害時年十七仍諡曰哀皇帝以王禮葬於濟陰縣之定陶鄉中興之初方備禮改卜遇國喪而止明宗時就故陵置園邑有司請諡曰昭宣光烈孝皇帝廟號景宗中書覆奏少帝行事不合稱宗存諡而已知禮者亦以宣景之諡非宜今只取本諡載之于紀史臣曰悲哉土運之將亡也五常殆盡百怪斯呈宇縣瓜分皇圖瓦解昭宗皇帝英猷奮發志憤陵夷帝求奇傑之才欲拯淪胥之運而世途多僻忠義俱亡極爵位以待賢豪罄珍奇而託心腹殷勤國士之遇罕有託孤之賢豢豐而犬豕轉獰肉飽而虎狼逾暴五侯九伯無非問鼎之徒四嶽十連皆畜無君之迹雖蕭屏之臣扼腕巖廊之輔痛心空銜毀室之悲寧救喪邦之禍及扶風西幸洛邑東遷如寄珠於盜跖之門蓄水於尾閭之上往而不返夫何言哉至若川竭山崩古今同歎虎爭龍戰興替無常縱胠篋之不仁亦攫金之有道曹操請刑於椒壼蓋迫陰謀馬昭拒命於凌雲窘於見討誠知醜迹得以為詞而全忠所行止於殘忍況自岐遷洛天子塊然六軍盡斥於秦人四面皆環於汴卒冕旒如寄纖芥為疑迎鑾未及於崇朝倳刃已聞於塗地立嗣君於南面斃母后於中闈黃門與禁旅皆殲宗室共衣冠並殪復又盜鐘掩耳嫁禍於人何九六之數窮偶天人之道盡目擊斯亂言之傷心哀帝之時政由凶族雖揖讓之令有類於山陽而凌逼之權過踰於侯景人道寖薄陰隲難徵然以此受終如何延永贊曰勛華受命揖讓告終逆取順守仁道已窮暴則短祚義則延洪虞賓之禍非止一宗
