body:
  text: 舊唐書卷七十二列傳第二十二虞世南李百藥子安期褚亮劉孝孫李玄道李守素附虞世南字伯施越州餘姚人隋內史侍郎世基弟也祖檢梁始興王諮議父荔陳太子中庶子俱有重名叔父寄陳中書侍郎無子以世南繼後故字曰伯施世南性沈靜寡欲篤志勤學少與兄世基受學於吳郡顧野王經十餘年精思不倦或累旬不盥櫛善屬文常祖述徐陵陵亦言世南得己之意又同郡沙門智永善王羲之書世南師焉妙得其體由是聲名籍甚天嘉中荔卒世南尚幼哀毀殆不勝喪陳文帝知其二子博學每遣中使至其家將護之及服闋召為建安王法曹參軍寄陷於陳寶應在閩越中世南雖除喪猶布衣蔬食至太建末寶應破寄還方令世南釋布食肉至德初除西陽王友陳滅與世基同入長安俱有重名時人方之二陸時煬帝在藩聞其名與秦王俊辟書交至以母老固辭晉王令使者追之大業初累授秘書郎遷起居舍人時世基當朝貴盛妻子被服擬於王者世南雖同居而躬履勤儉不失素業及至隋滅宇文化及弒逆之際世基為內史侍郎將被誅世南抱持號泣請以身代化及不納因哀毀骨立時人稱焉從化及至聊城又陷于竇建德偽授黃門侍郎太宗滅建德引為秦府參軍尋轉記室仍授弘文館學士與房玄齡對掌文翰太宗嘗命寫列女傳以裝屏風于時無本世南暗疏之不失一字太宗昇春宮遷太子中舍人及即位轉著作郎兼弘文館學士時世南年已衰老抗表乞骸骨詔不許遷太子右庶子固辭不拜除秘書少監上聖德論辭多不載七年轉秘書監賜爵永興縣子太宗重其博識每機務之隙引之談論共觀經史世南雖容貌儒磱若不勝衣而志性抗烈每論及古先帝王為政得失必存規諷多所補益太宗嘗謂侍臣曰朕因暇日與虞世南商略古今有一言之失未嘗不悵恨其懇誠若此朕用嘉焉羣臣皆若世南天下何憂不理八年隴右山崩大蛇屢見山東及江淮多大水太宗以問世南對曰春秋時梁山崩晉侯召伯宗而問焉對曰國主山川故山川崩竭君為之不舉降服乘縵徹樂出次祝幣以禮焉梁山晉所主也晉侯從之故得無害漢文帝元年齊楚地二十九山同日崩水大出令郡國無來貢獻施惠於天下遠近歡洽亦不為災後漢靈帝時青蛇見御座晉惠帝時大蛇長三百步見齊地經市入朝案蛇宜在草野而入巿朝所以可為怪耳今蛇見山澤蓋深山大澤必有龍蛇亦不足怪也又山東足雨雖則其常然陰淫過久恐有冤獄宜省繫囚庶幾或當天意且妖不勝德唯修德可以銷變太宗以為然因遣使者賑恤饑餒申理獄訟多所原宥後有星孛于虛危歷于氐百餘日乃滅太宗謂羣臣曰天見彗星是何妖也世南曰昔齊景公時有彗星見公問晏嬰對曰穿池沼畏不深起臺榭畏不高行刑罰畏不重是以天見彗為公誡耳景公懼而修德後十六日而星沒臣聞天時不如地利地利不如人和若德義不修雖獲麟鳳終是無補但政事無闕雖有災星何損於時然願陛下勿以功高古人而自矜伐勿以太平漸久而自驕怠慎終如始彗星雖見未足為憂太宗斂容謂曰吾之撫國良無景公之過但吾纔弱冠舉義兵年二十四平天下未三十而居大位自謂三代以降撥亂之主莫臻於此重以薛舉之驍雄宋金剛之鷙猛竇建德跨河北王世充據洛陽當此之時足為勍敵皆為我所擒及逢家難復決意安社稷遂登九五降服北夷吾頗有自矜之意以輕天下之士此吾之罪也上天見變良為是乎秦始皇平六國隋煬帝富四海既驕且逸一朝而敗吾亦何得自驕也言念於此不覺惕焉震懼四月康國獻獅子詔世南為之賦命編之東觀辭多不載後高祖崩有詔山陵制度準漢長陵故事務從隆厚程限既促功役勞弊世南上封事諫曰臣聞古之聖帝明王所以薄葬者非不欲崇高光顯珍寶具物以厚其親然審而言之高墳厚壠珍物畢備此適所以為親之累非曰孝也是以深思遠慮安於菲薄以為長久萬代之計割其常情以定耳昔漢成帝造延昌二陵制度甚厚功費甚多諫議大夫劉向上書其言深切皆合事理其略曰孝文居霸陵悽愴悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何戚焉夫死者無終極而國家有廢興釋之所言為無窮計也孝文寤焉遂以薄葬又漢氏之法人君在位三分天下貢賦以一分入山陵武帝歷年長久比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡無故聚斂百姓為盜之用甚無謂也魏文帝於首陽東為壽陵作終制其略曰昔堯葬壽陵因山為體無封樹無立寢殿園邑為棺椁足以藏骨為衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無藏金銀銅鐵一以瓦器自古及今未有不亡之國無有不發之墓至乃燒取玉匣金縷骸骨並盡乃不重痛哉若違詔妄有變改吾為戮屍於地下死而重死不忠不孝使魂而有知將不福汝以為永制藏之宗廟魏文帝此制可謂達於事矣向使陛下德止如秦漢之君臣則緘口而已不敢有言伏見聖德高遠堯舜猶所不逮而俯與秦漢之君同為奢泰捨堯舜殷周之節儉此臣所以尤戚也今為丘壠如此其內雖不藏珍寶亦無益也萬代之後但見高墳大墓豈謂無金玉耶臣之愚計以為漢文霸陵既因山勢雖不起墳自然高顯今之所卜地勢即平不可不起宜依白虎通所陳周制為三仞之墳其方中制度事事減少事竟之日刻石於陵側明丘封大小高下之式明器所須皆以瓦木合於禮文一不得用金銀銅鐵使萬代子孫並皆遵奉一通藏之宗廟豈不美乎且臣下除服用三十六日已依霸陵今為墳壠又以長陵為法恐非所宜伏願深覽古今為長久之慮臣之赤心唯願萬歲之後神道常安陛下孝名揚於無窮耳書奏不報世南又上疏曰漢家即位之初便營陵墓近者十餘歲遠者五十年方始成就今以數月之間而造數十年之事其於人力亦已勞矣又漢家大郡五十萬戶即目人衆未及往時而功役與之一等此臣所以致疑也時公卿又上奏請遵遺詔務從節儉因下其事付所司詳議於是制度頗有減省焉太宗後頗好獵世南上疏諫曰臣聞秋獮冬狩蓋惟恆典射隼從禽備乎前誥伏惟陛下因聽覽之餘辰順天道以殺伐將欲躬摧班掌親御皮軒窮猛獸之窟穴盡逸材于林藪夷兇剪暴以衞黎元收革擢羽用充軍器舉旗效獲式遵前古然黃屋之尊金輿之貴八方之所仰德萬國之所係心清道而行猶戒銜橛斯蓋重慎防微為社稷也是以馬卿直諫於前張昭變色於後臣誠微淺敢忘斯義且天弧星所殪已多頒禽賜獲皇恩亦溥伏願時息獵車且韜長戟不拒芻蕘之請降納涓澮之流袒裼徒搏任之羣下則貽範百王永光萬代其有犯無隱多此類也太宗以是益親禮之嘗稱世南有五絕一曰德行二曰忠直三曰博學四曰文辭五曰書翰十二年又表請致仕優制許之仍授銀青光祿大夫弘文館學士祿賜防閤並同京官職事尋卒年八十一太宗舉哀於別次哭之甚慟賜東園秘器陪葬昭陵贈禮部尚書諡曰文懿手敕魏王泰曰虞世南於我猶一體也拾遺補闕無日暫忘實當代名臣人倫準的吾有小失必犯顏而諫之今其云亡石渠東觀之中無復人矣痛惜豈可言耶未幾太宗為詩一篇追述往古興亡之道既而歎曰鍾子期死伯牙不復鼓琴朕之此詩將何以示令起居郎褚遂良詣其靈帳讀訖焚之冀世南神識感悟後數歲太宗夜夢見之有若平生翌日下制曰禮部尚書永興文懿公虞世南德行淳備文為辭宗夙夜盡心志在忠益奄從物化倏移歲序昨因夜夢忽覩其人兼進讜言有如平生之日追懷遺美良增悲歎宜資冥助申朕思舊之情可於其家為設五百僧齋并為造天尊像一區又敕圖其形於凌煙閣有集三十卷令褚亮為之序世南子昶官至工部侍郎李百藥字重規定州安平人隋內史令安平公德林子也為童兒時多疾病祖母趙氏故以百藥為名七歲解屬文父友齊中書舍人陸乂馬元熙嘗造德林讌集有讀徐陵文者云既取成周之禾將刈琅邪之稻並不知其事百藥時侍立進曰傳稱鄅人藉稻杜預注云鄅國在琅邪開陽乂等大驚異之開皇初授東宮通事舍人遷太子舍人兼東宮學士或嫉其才而毀之者乃謝病免去十九年追赴仁壽宮令襲父爵左僕射楊素吏部尚書牛弘雅愛其才奏授禮部員外郎皇太子勇又召為東宮學士詔令修五禮定律令撰陰陽書臺內奏議文表多百藥所撰時煬帝出鎮揚州嘗召之百藥辭疾不赴煬帝大怒及即位出為桂州司馬其後罷州置郡因解職還鄉里大業五年授魯郡臨泗府步兵校尉九年充戍會稽尋授建安郡丞行達烏程屬江都難作復為沈法興所得署為掾會沈法興為李子通所破子通又命為中書侍郎國子祭酒及杜伏威攻滅子通又以百藥為行臺考功郎中或有譖之者伏威囚之百藥著省躬賦以致其情伏威亦知其無罪乃令復職伏威既據有江南高祖遣使招撫百藥勸伏威入朝伏威從之遣其行臺僕射輔公祏與百藥留守遂詣京師及渡江至歷陽狐疑中悔將害百藥乃飲以石灰酒因大洩痢而宿病皆除伏威知百藥不死乃作書與公祏令殺百藥賴伏威養子王雄誕保護獲免公祏反又授百藥吏部侍郎有譖百藥於高祖云百藥初說杜伏威入朝又與輔公祏同反高祖大怒及公祏平得伏威與公祏令殺百藥書高祖意稍解遂配流涇州太宗重其才名貞觀元年召拜中書舍人賜爵安平縣男受詔修定五禮及律令撰齊書二年除禮部侍郎朝廷議將封建諸侯百藥上封建論曰臣聞經國庇民王者之常制尊主安上人情之本方思闡治定之規以弘長世之業者萬古不易百慮同歸然命曆有賒促之殊邦家有理亂之異遐觀載籍論之詳矣咸云周過其數秦不及期存亡之理在於郡國周氏以監夏殷之長久遵黃唐之並建維城盤石深根固本雖王綱弛廢枝幹相持故使逆節不生宗祀不絕秦氏背師古之訓棄先王之道踐華恃險罷侯置守子弟無尺土之邑兆庶罕共治之憂故一夫號澤七廟隳祀臣以為自古皇王君臨宇內莫不受命上玄飛名帝籙締構遇興王之運殷憂屬啟聖之期雖魏武攜養之資漢高徒役之賤非止意有覬覦推之亦不能去也若其獄訟不歸菁華已竭雖帝堯之光被四表大舜之上齊七政非止情存揖讓守之亦不可固焉以放勛重華之德尚不能克昌厥後是知祚之長短必在天時政或盛衰有關人事隆周卜代三十卜年七百雖淪胥之道斯極而文武之器猶存斯則龜鼎之祚已懸定於杳冥也至使南征不返東遷避逼禋祀如綫郊畿不守此乃淩夷之漸有累於封建焉暴秦運短閏餘數鍾百六受命之主德異禹湯繼世之君才非啟誦借使李斯王綰之輩盛開四履將閭子嬰之徒俱啟千乘豈能逆帝子之勃興抗龍顏之基命者也然則得失成敗各有由焉而著述之家多守常轍莫不情亡今古理蔽澆淳欲以百王之季行三代之法天下五服之內盡封諸侯王畿千乘之間俱為采地是以結繩之化行虞夏之朝用象刑之典治劉曹之末紀綱既紊斷可知焉鍥船求劍未見其可膠柱成文彌所多惑徒知問鼎請隧有懼霸王之師白馬素車無復藩籬之援不悟望夷之釁未甚羿浞之災高貴之殃寧異申繒之酷乃欽明昏亂自革安危固非守宰公侯以成興廢且數世之後王室浸微始自藩屏化為仇敵家殊俗國異政強淩弱衆暴寡疆埸彼此干戈日尋狐駘之役女子盡髽崤陵之師隻輪不返斯蓋略舉一隅其餘不可勝數陸士衡方規規然云嗣王委其九鼎凶族據其大邑天下晏然以治待亂何斯言之謬也而設官分職任賢使能以循吏之才膺共治之寄刺郡分竹何代無人至使地或呈祥天不愛寶民稱父母政比神明曹元首方區區然稱與人共其樂者人必憂其憂與人同其安者人必拯其危豈容委以侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國藉慶門資忘其先業之艱難輕其自然之崇貴莫不世增淫虐代益驕侈自離宮別館切漢淩雲或刑人力而將盡或召諸侯而共樂陳靈則君臣悖禮共侮徵舒衞宣則父子聚麀終誅壽朔乃云為己思治豈若是乎內外羣官選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟進取事切砥礪情深或俸祿不入私門妻子不之官舍頒條之貴食不舉火剖符之重衣唯補葛南陽太守敝布裹身萊蕪縣長凝塵生甑專云為利圖物何其爽歟總而言之爵非世及用賢之路斯廣民無定主附下之情不固此乃愚智所辨安可惑哉至如滅國弒君亂常干紀春秋二百年間略無寧歲次睢咸秩遂用玉帛之君魯道有蕩每等衣裳之會縱使西漢哀平之際東洛桓靈之時下吏淫暴必不至此為政之理可一言以蔽之伏惟陛下握紀御天膺期啟聖救億兆之焚溺掃氛祲於寰區創業垂統配二儀以立德發號施令妙萬物而為言獨照宸衷永懷前古將復五等而修舊制建萬國以親諸侯竊以漢魏以還餘風之弊未盡勛華既往至公之道斯革況晉氏失馭宇縣崩離後魏乘時華夷雜處重以關河分阻吳楚懸隔習文者學長短縱橫之術習武者盡干戈戰爭之心畢為狙詐之階彌長澆浮之俗開皇在運因藉外家驅御羣英任雄猜之數坐移時運非克定之功年踰二紀民不見德及大業嗣文世道交喪一時人物掃地將盡雖天縱神武削平寇虐兵威不息勞止未康自陛下仰順聖慈嗣膺寶曆情深致治綜覈前王雖至道無名言象所紀略陳梗概實所庶幾愛敬蒸蒸勞而不倦大舜之孝也訪安內豎親嘗御膳文王之德也每憲司讞罪尚書奏獄大小必察枉直咸申舉斷趾之法易大辟之刑仁心隱惻貫徹幽顯大禹之泣辜也正色直言虛心受納不簡鄙訥無棄芻蕘帝堯之求諫也弘奬名教勸勵學徒既擢明經於青紫將升碩儒於卿相聖人之善誘也羣臣以宮中暑濕寢膳或乖請徙御高明營一小閣遂惜家人之產竟抑子來之願不吝陰陽所感以安卑陋之居去歲荒儉普天饑饉喪亂甫爾倉廩空虛聖情矜愍勤加惠卹竟無一人流離道路猶且食啗藜藿樂撤簨簴言必悽動貌成癯瘠公旦喜於重譯文命矜其即序陛下每四夷款附萬里歸仁必退思進省凝神動慮恐妄勞中國以事遠方不藉萬古之英聲以存一時之茂實心切憂勞跡絕遊幸每旦視朝聽受無倦智周於萬物道濟於天下罷朝之後引進名臣討論是非備盡肝膈唯及政事更無異辭纔及日昃命才學之士賜以清閒高談典籍雜以文詠間以玄言乙夜忘疲中宵不寐此之四道獨邁往初斯實生民以來一人而已弘茲風化昭示四方信可以期月之間彌綸天壤而淳粹尚阻浮詭未移此由習之永久難以卒變請待雕成朴以質代文刑措之教一行登封之禮云畢然後定疆理之制議山河之賞未為晚焉易稱天地盈虛與時消息況於人乎美哉斯言也太宗竟從其議四年授太子右庶子五年與左庶子于志寧中允孔穎達舍人陸敦信侍講于弘教殿時太子頗留意典墳然閒燕之後嬉戲過度百藥作贊道賦以諷焉辭多不載太宗見而遣使謂百藥曰朕於皇太子處見卿所獻賦悉述古來儲貳事以誡太子甚是典要朕選卿以輔弼太子正為此事大稱所委但須善始令終耳因賜綵物五百段然太子卒不悟而廢十年以撰齊史成加散騎常侍行太子左庶子賜物四百段俄除宗正卿十一年以撰五禮及律令成進爵為子後數歲以年老固請致仕許之太宗嘗制帝京篇命百藥並作上歎其工手詔曰卿何身之老而才之壯何齒之宿而意之新乎二十二年卒年八十四諡曰康百藥以名臣之子才行相繼四海名流莫不宗仰藻思沈鬱尤長於五言詩雖樵童牧豎並皆吟諷性好引進後生提奬不倦所得俸祿多散之親黨又至性過人初侍父母喪還鄉徒跣單衣行數千里服闋數年容貌毀悴為當時所稱及懸車告老怡然自得穿池築山文酒談賞以舒平生之志有集三十卷子安期安期幼聰辯七歲解屬文初百藥大業末出為桂州司馬行至太湖遇逆賊將加白刃安期跪泣請代父命賊哀而釋之貞觀初累轉符璽郎預修晉書成除主客員外郎永徽中遷中書舍人又與李義府等於武德殿內修書再轉黃門侍郎龍朔中為司列少常伯參知軍國有事太山詔安期為朝覲壇碑文安期前後三為選部頗為當時所稱時高宗屢引侍臣責以不進賢良衆皆莫對獨安期進曰臣聞聖帝明王莫不勞於求賢逸於任使設使堯舜苦己癯瘠不能用賢終亦王化不行自夏殷已來歷國數十皆委賢良以共致理且十室之邑必有忠信況今天下至廣非無英彥但比來公卿有所薦引即遭囂謗以為朋黨沉屈者未申而在位者已損所以人思苟免競為緘默若陛下虛己招納務於搜訪不忌親讎唯能是用讒毀亦既不入誰敢不竭忠誠此皆事由陛下非臣等所能致也高宗深然其言俄檢校東臺侍郎同東西臺三品出為荊州大都督府長史咸亨初卒自德林至安期三世皆掌制誥安期孫羲仲又為中書舍人褚亮字希明杭州錢塘人曾祖湮梁御史中丞祖蒙太子中舍人父玠陳祕書監並著名前史其先自陽翟徙居焉亮幼聰敏好學善屬文博覽無所不至經目必記於心喜遊名賢尤善談論年十八詣陳僕射徐陵陵與商搉文章深異之陳後主聞而召見使賦詩江總及諸辭人在坐莫不推善禎明初為尚書殿中侍郎陳亡入隋為東宮學士大業中授太常博士時煬帝將改置宗廟亮奏議曰謹按禮記天子七廟三昭三穆與太祖之廟而七鄭玄注曰此周制也七者太祖及文王武王之祧與親廟四也殷則六廟契及湯與二昭二穆也夏則五廟無太祖禹與二昭二穆而已玄又據禮王者禘其祖之所自出而立四廟案鄭玄義天子唯立四親廟并始祖而為五周以文武為受命之祖特立二祧是為七廟王肅註禮記曰尊者尊統上卑者尊統下故天子七廟諸侯五廟其有殊功異德非太祖而不毀不在七廟之數案肅以為天子七廟是百代之言又據王制天子七廟諸侯五廟大夫三廟降二為差是則天子立四親廟又立高祖之父高祖之祖父太祖而為七周有文武姜嫄合為十廟漢世諸帝之廟各立無迭毀之義至元帝時貢禹匡衡之徒始議其禮以高帝為太祖而立四親是為五廟唯劉歆以為天子七廟諸侯五廟降殺以兩之義七者其正法可常數也宗不在此數內有功德則宗之不可豫設為數也是以班固稱考論諸儒之議劉歆博而篤矣光武即位建高廟於洛陽乃立南頓君以上四廟就祖宗而為七至魏初高堂隆為鄭學議立親廟四太祖武帝猶在四親之內乃虛置太祖及二祧以待後世至景初間乃依王肅更立六廟二世祖就四親而為六廟晉武受禪博議宗祀自文帝以上至六世祖征西府君而宣帝亦序於昭穆未升太祖故祭止六世江左中興賀循知禮至於寢廟之議皆依魏晉舊事宋武初受命為王依諸侯立親廟四即位之後增祠五世祖相國掾府君六世祖右北平府君止於六廟逮身沒主升亦從昭穆猶虛太祖之位也降及齊梁守而勿革加宗迭毀禮無違舊臣又按姬周自太祖已下皆別立廟至於禘祫俱合食於太祖是以炎漢之初諸廟各立歲時常享亦隨處而祭所用廟樂皆像功德而歌舞焉至光武乃總立一堂而羣主異室斯則新承寇亂欲從約省自此已來因循不變皇隋太祖武元皇帝仁風潛暢至澤傍通以昆彭之勳開稷契之緒高祖文皇帝睿哲玄覽神武應期撥亂返正遠肅邇安受命開基垂統聖嗣鴻名冠於三代寶祚傳於七百當文明之運定祖宗之禮且損益不同沿襲異趣時王所制可以垂法自歷代已來雜用王鄭二義若尋其旨歸校以優劣康成止論周代非謂經通子雍總貫皇王事兼長遠今請依據古典崇建七廟受命之祖宜別立廟祧百世之後為不毀之法至於鑾駕親奉申孝享於高廟有司行事竭誠敬於羣主俾夫規模可則嚴祀易遵表有功而彰明德大復古而貴能變臣又按周人立廟亦無處置之文據冢人職而言之先王居中以昭穆為左右阮忱所撰禮圖亦從此義漢京諸廟既遠又不序禘祫今若依周制理有未安雜用漢儀事難全採謹詳立別圖附之議未行尋坐與楊玄感有舊左遷西海郡司戶時京兆郡博士潘徽亦以筆札為玄感所禮降威定縣主簿當時寇盜縱橫六親不能相保亮與同行至隴山徽遇病終亮親加棺斂瘞之路側慨然傷懷遂題詩於隴樹好事者皆傳寫諷誦信宿遍於京邑焉薛舉僭號隴西以亮為黃門侍郎委之機務及舉滅太宗聞亮名深加禮接因從容自陳太宗大悅賜物二百段馬四匹從還京師授秦王文學時高祖以寇亂漸平每冬畋狩亮上疏諫曰臣聞堯鼓納諫舜木求箴茂克昌之風致昇平之道伏惟陛下應千祀之期拯百王之弊平壹天下劬勞帝業旰食思政廢寢憂人用農隙之餘遵冬狩之禮獲車之所遊踐虞旗之所涉歷網唯一面禽止三驅縱廣成之獵士觀上林之手搏斯固畋弋之常規而皇王之壯觀至於親逼猛獸臣竊惑之何者筋力驍悍爪牙輕捷連弩一發未必挫其凶心長戟纔揮不能當其憤氣雖孟賁抗左夏育居前卒然驚軼事生慮表如或近起林叢未填坑谷駭屬車之後乘犯官騎之清塵小臣怯懦私懷戰慄陛下以至聖之資垂將來之教降情納下無隔直言臣叨逢明時遊宦藩邸身漸榮渥日用不知敢緣天造冒陳丹懇高祖甚納之太宗每有征伐亮常侍從軍中宴筵必預歡賞從容諷議多所裨益又與杜如晦等十八人為文學館學士太宗入居春宮除太子舍人遷太子中允貞觀元年為弘文館學士九年進授員外散騎常侍封陽翟縣男拜通直散騎常侍學士如故十六年進爵為侯食邑七百戶後致仕歸于家太宗幸遼東亮子遂良為黃門侍郎詔遂良謂亮曰昔年師旅卿常入幕今茲遐伐君已懸車倏忽之間移三十載眷言疇昔我勞如何今將遂良東行想公於朕不惜一兒於膝下耳故遣陳離意善居加食亮奉表陳謝及寢疾詔遣醫藥救療中使候問不絕卒時年八十八太宗甚悼惜之不視朝一日贈太常卿陪葬昭陵諡曰康長子遂賢守雍王友次子遂良自有傳始太宗既平寇亂留意儒學乃於宮城西起文學館以待四方文士於是以屬大行臺司勳郎中杜如晦記室考功郎中房玄齡及于志寧軍諮祭酒蘇世長天策府記室薛收文學褚亮姚思廉太學博士陸德明孔穎達主簿李玄道天策倉曹李守素記室參軍虞世南參軍事蔡允恭顏相時著作佐郎攝記室許敬宗薛元敬太學助教蓋文達軍諮典籤蘇勗並以本官兼文學館學士及薛收卒復徵東虞州錄事參軍劉孝孫入館尋遣圖其狀貌題其名字爵里乃命亮為之像贊號十八學士寫真圖藏之書府以彰禮賢之重也諸學士並給珍膳分為三番更直宿于閤下每軍國務靜參謁歸休即便引見討論墳籍商略前載預入館者時所傾慕謂之登瀛洲顏相時兄師古蘇勗兄子幹劉孝孫者荊州人也祖貞周石臺太守孝孫弱冠知名與當時辭人虞世南蔡君和孔德紹庾抱庾自直劉斌等登臨山水結為文會大業末沒于王世充世充弟偽杞王辯引為行臺郎中洛陽平辯面縛歸國衆皆離散孝孫猶攀援號慟追送遠郊時人義之武德初歷虞州錄事參軍太宗召為秦府學士貞觀六年遷著作佐郎吳王友嘗採歷代文集為王撰古今類序詩苑四十卷十五年遷本府諮議參軍尋遷太子洗馬未拜卒李玄道者本隴西人也世居鄭州為山東冠族祖瑾魏著作佐郎父行之隋都水使者玄道仕隋為齊王府屬李密據洛口引為記室及密破為王世充所執是時同遇囚俘者並懼死達曙不寐唯玄道顏色自若曰死生有命非憂能了同拘者雅推其識量及見世充舉措不改其常世充素知其名益重之釋縛以為著作佐郎東都平太宗召為秦王府主簿文學館學士貞觀元年累遷給事中封姑臧縣男時王君廓為幽州都督朝廷以其武將不習時事拜玄道為幽州長史以維持府事君廓在州屢為非法玄道數正議裁之嘗又遺玄道一婢玄道問婢所由云本良家子為君廓所掠玄道因放遣之君廓甚不悅後遇君廓入朝房玄齡即玄道之從甥也玄道附書君廓私發不識草字疑其謀己懼而奔叛玄道坐流巂州未幾徵還為常州刺史在職清簡百姓安之太宗下詔褒美賜以綾綵三年表請致仕加銀青光祿大夫以祿歸第尋卒子雲將知名官至尚書左丞李守素者趙州人代為山東名族太宗平王世充徵為文學館學士署天策府倉曹參軍守素尤工譜學自晉宋已降四海士流及諸勳貴華戎閥閱莫不詳究當時號為行譜嘗與虞世南共談人物言江左山東世南猶相酬對及言北地諸侯次第如流顯其世業皆有援證世南但撫掌而笑不復能答歎曰行譜定可畏許敬宗因謂世南曰李倉曹以善談人物乃得此名雖為美事然非雅目公既言成準的宜當有以改之世南曰昔任彥昇美談經籍梁代稱為五經笥今目倉曹為人物志可矣貞觀初卒史臣曰劉并州有言和氏之璧不獨耀於郢握夜光之珠何專玩於隋掌天下之寶固當與天下共之虞永興之從建德李安平之佐公祏褚陽翟之依薛舉蓋大渴不能擇泉而飲大暑不能擇蔭而息耳非不識其飲憩之所及文皇帝揭三辰而燭天下羣賢霧集人知所奉方得躍鱗天池擅價春山為一代之至寶則所託之勢異也隋掌郢握曷有常哉二虞昆仲文章炳蔚於隋唐之際褚河南父子箴規獻替洋溢於貞觀永徽之間所謂代有人焉而三家尤盛贊曰文皇盪滌刷清蒼昊十八文星連輝炳耀虞褚之筆動若有神安平之什老而彌新
