body:
  text: 舊唐書卷五十一列傳第一后妃上高祖太穆皇后竇氏太宗文德皇后長孫氏賢妃徐氏高宗廢后王氏良娣蕭氏中宗和思皇后趙氏中宗韋庶人上官昭容睿宗肅明皇后劉氏睿宗昭成皇后竇氏玄宗廢后王氏玄宗貞順皇后武氏玄宗楊貴妃三代宮禁之職周官最詳自周已降彤史沿革各載本書此不備述唐因隋制皇后之下有貴妃淑妃德妃賢妃各一人為夫人正一品昭儀昭容昭媛修儀修容修媛充儀充容充媛各一人為九嬪正二品婕妤九人正三品美人九人正四品才人九人正五品寶林二十七人正六品御女二十七人正七品采女二十七人正八品其餘六尚諸司分典乘輿服御龍朔二年官名改易內職皆更舊號咸亨二年復舊開元中玄宗以皇后之下立四妃法帝嚳也而后妃四星一為正后今既立正后復有四妃非典法也乃於皇后之下立惠妃麗妃華妃等三位以代三夫人為正一品又置芳儀六人為正二品美人四人為正三品才人七人為正四品尚宮尚儀尚服各二人為正五品自六品至九品即諸司諸典職員品第而序之後亦參用前號然而三代之政莫不以賢妃開國嬖寵傾邦秦漢已還其流寖盛大至移國小則臨朝煥車服以王宗枝裂土壤而侯肺腑洎末塗淪敗赤族夷宗高祖龍飛宮無正寢而婦言是用釁起維城大帝孝和仁而不武但恣池臺之賞寧顧衽席之嫌武室韋宗幾危運祚東京帝后歿從夫諡光烈和熹之類是也高宗自號天皇武氏自稱天后而韋庶人生有翊聖之名肅宗欲后張氏此不經之甚皆以凶終玄宗以惠妃之愛擯斥椒宮繼以太真幾喪天下歷觀前古邦家喪敗之由多基於子弟召禍子弟之亂必始於宮闈不正故息隱牆秦王謀歸東洛馬嵬塗地太子不敢西行若中有聖善之慈胡能若是易曰家道正而天下定不其然歟自後纍朝長秋虛位或以旁宗入繼母屬皆微徒有冊拜之文諒乏關雎之德今録其存於史冊者為后妃傳云高祖太穆皇后竇氏京兆始平人隋定州總管神武公毅之女也后母周武帝姊襄陽長公主后生而髮垂過頸三歲與身齊周武帝特愛重之養於宮中時武帝納突厥女為后無寵后尚幼竊言於帝曰四邊未靜突厥尚強願舅抑情撫慰以蒼生為念但須突厥之助則江南關東不能為患矣武帝深納之毅聞之謂長公主曰此女才貌如此不可妄以許人當為求賢夫乃於門屏畫二孔雀諸公子有求婚者輒與兩箭射之潛約中目者許之前後數十輩莫能中高祖後至兩發各中一目毅大悅遂歸於我帝及周武帝崩后追思如喪所生隋文帝受禪后聞而流涕自投於牀曰恨我不為男以救舅氏之難毅與長公主遽掩口曰汝勿妄言滅吾族矣后事元貞太后以孝聞太后素有羸疾時或危篤諸姒以太后性嚴懼譴皆稱疾而退惟后晝夜扶侍不脫衣履者動淹旬月焉善書學類高祖之書人不能辨工篇章而好存規戒大業中高祖為扶風太守有駿馬數匹常言於高祖曰上好鷹愛馬公之所知此堪進御不可久留人或言者必為身纍願熟思之高祖未決竟以此獲譴未幾后崩於涿郡時年四十五高祖追思后言方為自安之計數求鷹犬以進之俄而擢拜將軍因流涕謂諸子曰我早從汝母之言居此官久矣初葬壽安陵後祔葬獻陵上元元年八月改上尊號曰太穆順聖皇后太宗文德順聖皇后長孫氏長安人隋右驍衛將軍晟之女也晟妻隋揚州刺史高敬德女生后少好讀書造次必循禮則年十三嬪于太宗隋大業中常歸寧於永興里后舅高士廉媵張氏於后所宿舍外見大馬高二丈鞍勒皆具以告士廉命筮之遇坤之泰筮者曰至哉坤元萬物資生乃順承天坤厚載物德合無疆牝馬地類行地無疆變而之泰內陽而外陰內健而外順是天地交而萬物通也象曰后以輔相天地之宜而左右人也龍乾之象也馬坤之象也變而為泰天地交也繇協於歸妹婦人之兆也女處尊位履中居順也此女貴不可言武德元年冊為秦王妃時太宗功業既高隱太子猜忌滋甚后孝事高祖恭順妃嬪盡力彌縫以存內助及難作太宗在玄武門方引將士入宮授甲后親慰勉之左右莫不感激九年冊拜皇太子妃太宗即位立為皇后贈后父晟司空齊獻公后性尤儉約凡所服御取給而已太宗彌加禮待常與后論及賞罰之事對曰牝雞之晨惟家之索妾以婦人豈敢豫聞政事太宗固與之言竟不之答時后兄無忌夙與太宗為布衣之交又以佐命元勳委以腹心出入臥內將任之朝政后固言不可每乘間奏曰妾既託身紫宮尊貴已極實不願兄弟子姪布列朝廷漢之呂霍可為切骨之戒特願聖朝勿以妾兄為宰執太宗不聽竟用無忌為左武候大將軍吏部尚書右僕射后又密遣無忌苦求遜職太宗不獲已而許焉改授開府儀同三司后意乃懌有異母兄安業好酒無賴獻公之薨也后及無忌並幼安業斥還舅氏后殊不以介意每請太宗厚加恩禮位至監門將軍及預劉德裕逆謀太宗將殺之后叩頭流涕為請命曰安業之罪萬死無赦然不慈於妾天下知之今置以極刑人必謂妾恃寵以復其兄無乃為聖朝纍乎遂得減死后所生長樂公主太宗特所鍾愛及將出降敕所司資送倍於長公主魏徵諫曰昔漢明帝時將封皇子帝曰朕子安得同於先帝子乎然謂長主者良以尊於公主也情雖有差義無等別若令公主之禮有過長主理恐不可願陛下思之太宗以其言退而告后后歎曰嘗聞陛下重魏徵殊未知其故今聞其諫實乃能以義制主之情可謂正直社稷之臣矣妾與陛下結髮為夫婦曲蒙禮待情義深重每言必候顏色尚不敢輕犯威嚴況在臣下情疏禮隔故韓非為之說難東方稱其不易良有以也忠言逆於耳而利於行有國有家者急務納之則俗寧杜之則政亂誠願陛下詳之則天下幸甚后因請遣中使齎帛五百匹詣徵宅以賜之太子承乾乳母遂安夫人常白后曰東宮器用闕少欲有奏請后不聽曰為太子所患德不立而名不揚何憂少於器物也八年從幸九成宮染疾危惙太子承乾入侍密啓后曰醫藥備盡尊體不瘳請奏赦囚徒並度人入道冀蒙福助后曰死生有命非人力所加若修福可延吾素非為惡若行善無效何福可求赦者國之大事佛道者示存異方之教耳非惟政體靡弊又是上所不為豈以吾一婦人而亂天下法承乾不敢奏以告左僕射房玄齡玄齡以聞太宗及侍臣莫不歔欷朝臣咸請肆赦太宗從之后聞之固爭乃止將大漸與太宗辭訣時玄齡以譴歸第后固言玄齡事陛下最久小心謹慎奇謀祕計皆所預聞竟無一言漏泄非有大故願勿棄之又妾之本宗幸緣姻戚既非德舉易履危機其保全永久慎勿處之權要但以外戚奉朝請則為幸矣妾生既無益於時今死不可厚費且葬者藏也欲人之不見自古聖賢皆崇儉薄惟無道之世大起山陵勞費天下為有識者笑但請因山而葬不須起墳無用棺椁所須器服皆以木瓦儉薄送終則是不忘妾也十年六月己卯崩于立政殿時年三十六其年十一月庚寅葬於昭陵后嘗撰古婦人善事勒成十卷名曰女則自為之序又著論駁漢明德馬皇后以為不能抑退外戚令其當朝貴盛乃戒其龍馬水車此乃開其禍源而防其末事耳且戒主守者曰此吾以自防間耳婦人著述無條貫不欲至尊見之慎勿言崩後宮司以聞太宗覽而增慟以示近臣曰皇后此書足可垂於後代我豈不達天命而不能割情乎以其每能規諫補朕之闕今不復聞善言是內失一良佐以此令人哀耳上元元年八月改上尊號曰文德順聖皇后太宗賢妃徐氏名惠右散騎常侍堅之姑也生五月而能言四歲誦論語毛詩八歲好屬文其父孝德試擬楚辭云山中不可以久留詞甚典美自此遍涉經史手不釋卷太宗聞之納為才人其所屬文揮翰立成詞華綺贍俄拜婕妤再遷充容時軍旅亟動宮室互興百姓頗倦勞役上疏諫曰自貞觀已來二十有二載風調雨順年登歲稔人無水旱之弊國無饑饉之災昔漢武守文之常主猶登刻玉之符齊桓小國之庸君尚圖泥金之事望陛下推功損己讓德不居億兆傾心猶闕告成之禮云亭佇謁未展升中之儀此之功德足以咀嚼百王網羅千代者矣古人有云雖休勿休良有以也守初保末聖哲罕兼是知業大者易驕願陛下難之善始者難終願陛下易之竊見頃年已來力役兼總東有遼海之軍西有崑丘之役士馬疲於甲胄舟車倦於轉輸且召募役戍去留懷死生之痛因風阻浪人米有漂溺之危一夫力耕卒無數十之獲一船致損則傾數百之糧是猶運有盡之農功填無窮之巨浪圖未獲之他衆喪已成之我軍雖除凶伐暴有國常規然黷武玩兵先哲所戒昔秦皇並吞六國反速危亡之基晉武奄有三方翻成覆敗之業豈非矜功恃大棄德而輕邦圖利忘害肆情而縱欲遂使悠悠六合雖廣不救其亡嗷嗷黎庶因弊以成其禍是知地廣非常安之術人勞乃易亂之源願陛下布澤流人矜弊恤乏減行役之煩增湛露之惠妾又聞為政之本貴在無為竊見土木之功不可兼遂北闕初建南營翠微曾未逾時玉華創制雖復因山藉水非無架築之勞損之又損頗有工力之費終以茅茨示約猶興木石之疲假使和雇取人不無煩擾之弊是以卑宮菲食聖主之所安金屋瑤臺驕主之為麗故有道之君以逸逸人無道之君以樂樂身願陛下使之以時則力無竭矣用而息之則人斯悅矣夫珍玩伎巧乃喪國之斧斤珠玉錦繡實迷心之鴆毒竊見服玩纖靡如變化於自然織貢珍奇若神仙之所製雖馳華於季俗實敗素於淳風是知漆器非延叛之方桀造之而人叛玉杯豈招亡之術紂用之而國亡方驗侈麗之源不可不遏作法於儉猶恐其奢作法於奢何以制後伏惟陛下明鑑未形智周無際窮奧祕於麟閣盡探賾於儒林千王治亂之蹤百代安危之跡興衰禍福之數得失成敗之機故亦苞吞心府之中循環目圍之內乃宸衷之久察無假一二言焉惟恐知之非難行之不易志驕於業泰體逸於時安伏願抑志裁心慎終如始削輕過以添重德循今是以替前非則令名與日月無窮盛業與乾坤永大太宗善其言優賜甚厚及太宗崩追思顧遇之恩哀慕愈甚發疾不自醫病甚謂所親曰吾荷顧實深志在早歿魂其有靈得侍園寢吾之志也因為七言詩及連珠以見其志永徽元年卒時年二十四詔贈賢妃陪葬於昭陵之石室高宗廢后王氏並州祁人也父仁祐貞觀中羅山令同安長公主即后之從祖母也公主以后有美色言於太宗遂納為晉王妃高宗登儲冊為皇太子妃以父仁祐為陳州刺史永徽初立為皇后以仁祐為特進魏國公母柳氏為魏國夫人仁祐尋卒贈司空初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數為之言高宗由是復召入宮立為昭儀俄而漸承恩寵遂與后及良娣蕭氏遞相譖毀帝終不納后言而昭儀寵遇日厚后懼不自安密與母柳氏求巫祝厭勝事發帝大怒斷柳氏不許入宮中后舅中書令柳奭罷知政事並將廢后長孫無忌褚遂良等固諫乃止俄又納李義府之策永徽六年十月廢后及蕭良娣皆為庶人囚之別院武昭儀令人皆縊殺之后母柳氏兄尚衣奉御全信及蕭氏兄弟並配流嶺外遂立昭儀為皇后尋又追改后姓為蟒氏蕭良娣為梟氏庶人良娣初囚大罵曰願阿武為老鼠吾作貓兒生生扼其喉武后怒自是宮中不畜貓初囚高宗念之閒行至其所見其室封閉極密惟開一竅通食器出入高宗惻然呼曰皇后淑妃安在庶人泣而對曰妾等得罪廢棄為宮婢何得更有尊稱名為皇后言訖悲咽又曰今至尊思及疇昔使妾等再見日月出入院中望改此院名為回心院妾等再生之幸高宗曰朕即有處置武后知之令人杖庶人及蕭氏各一百截去手足投於酒甕中曰令此二嫗骨醉數日而卒後則天頻見王蕭二庶人披髮瀝血如死時狀武后惡之禱以巫祝又移居蓬萊宮復見故多在東都中宗即位復后姓為王氏梟氏還為蕭氏中宗和思皇后趙氏京兆長安人祖綽武德中以戰功至右領軍衛將軍父瓌尚高祖女常樂公主歷遷左千牛將軍中宗為英王時納后為妃既而妃母公主得罪妃亦坐廢幽死於內侍省則天臨朝瓌為壽州刺史坐與越王貞連謀被誅公主亦坐死神龍元年贈后諡為恭皇后贈瓌左衛大將軍及中宗崩將葬于定陵議者以韋后得罪不宜祔葬於是追諡后為和思莫知瘞所行招魂祔葬之禮太常博士彭景直上言古無招魂葬之禮不可備棺椁置轀輬宜據漢書郊祀志葬黃帝衣冠於橋山故事以皇后褘衣於陵所寢宮招魂置衣於魂輿以太牢告祭遷衣於寢宮舒於御榻之右覆以夷衾而祔葬焉從之中宗韋庶人京兆萬年人也祖弘表貞觀中為曹王府典軍中宗為太子時納后為妃仍擢后父普州參軍玄貞為豫州刺史嗣聖元年立為皇后其年中宗見廢后隨從房州時中宗懼不自安每聞制使至惶恐欲自殺后勸王曰禍福倚伏何常之有豈失一死何遽如是也纍年同艱危情義甚篤所生懿德太子永泰永壽長寧安樂四公主安樂最幼生於房州帝自脫衣裹之遂名曰裹兒特寵異焉及中宗復立為太子又立后為妃時昭容上官氏常勸后行則天故事乃上表請天下士庶為出母服喪三年又請百姓以年二十三為丁五十九免役改易制度以收時望制皆許之帝在房州時常謂后曰一朝見天日誓不相禁忌及得志受上官昭容邪說引武三思入宮中升御牀與后雙陸帝為點籌以為歡笑醜聲日聞于外乃大出宮女雖左右內職亦許時出禁中上官氏及宮人貴幸者皆立外宅出入不節朝官邪佞者候之恣為狎遊祈其賞秩以至要官時侍中敬暉謀去諸武武三思患之乃結上官氏以為援因得幸於后潛入宮中謀議乃諷百官上帝尊號為應天皇帝后為順天皇后帝與后親謁太廟告謝受尊號之意於是三思驕橫用事敬暉王同皎相次夷滅天下咸歸咎於后后方優寵親屬內外封拜遍列清要又欲寵樹安樂公主乃制公主開府置官屬太平公主儀比親王長寧安樂二府不置長史而已宜城公主等以非后所生各減太平之半安樂恃寵驕恣賣官鬻獄勢傾朝廷常自草制敕掩其文而請帝書焉帝笑而從之竟不省視又請自立為皇太女帝雖不從亦不加譴所署府僚皆猥濫非才又廣營第宅侈靡過甚長寧及諸公主迭相倣效天下咸嗟怨之神龍三年節愍太子死後宗楚客率百僚上表加后號為順天翊聖皇后景龍二年春宮中希旨妄稱后衣箱中有五色雲出帝使畫工圖之出示於朝乃大赦天下百僚母妻各加邑號右驍衛將軍知太史事迦葉志忠上表曰昔高祖未受命時天下歌桃李子太宗未受命時天下歌秦王破陳樂高宗未受命時天下歌側堂堂天后未受命時天下歌武媚娘伏惟應天皇帝未受命時天下歌英王石州順天皇后未受命時天下歌桑條韋也女時韋也六合之內齊首蹀足應四時八節之會歌舞同歡豈與夫簫韶九成百獸率舞同年而語哉伏惟皇后降帝女之精合為國母主蠶桑以安天下后妃之德於斯為盛謹進桑條歌十二篇伏請宣布中外進入樂府皇后先蠶之時以享宗廟帝悅而許之特賜志忠莊一區雜綵七百段太常少卿鄭愔又引而申之播於舞詠亦受厚賞兵部尚書宗楚客又諷補闕趙延禧表陳符命解桑條以為十八代之符請頒示天下編諸史冊帝大悅擢延禧為諫議大夫時上官昭容與其母鄭氏及尚宮柴氏賀婁氏樹用親黨廣納貨賂別降墨敕斜封授官或出臧獲屠販之類纍居榮秩又引女巫趙氏出入禁中封為隴西夫人勢與上官氏為比三年冬帝將親祠南郊國子祭酒祝欽明司業郭山惲建議云皇后亦合助祭太常博士唐紹蔣欽緒上疏爭之尚書右僕射韋巨源詳定儀注遂希旨協同欽明之議帝納其言以后為亞獻仍以宰相女為齊娘以執籩豆欽明又欲請安樂公主為終獻迫於時議而止四年正月望夜帝與后微行市里以觀燒燈又放宮女數千夜遊縱觀因與外人陰通逃逸不還時國子祭酒葉靜能善符禁小術散騎常侍馬秦客頗間醫藥光祿少卿楊均以調膳侍奉皆出入宮掖均與秦客皆得幸於后相次丁母憂旬日悉起復舊職時安樂公主與駙馬武延秀侍中紀處訥中書令宗楚客司農卿趙履溫互相猜二迭為朋黨六月帝遇毒暴崩時馬秦客侍疾議者歸罪於秦客及安樂公主后懼祕不發喪引所親入禁中謀自安之策以刑部尚書裴談工部尚書張錫知政事留守東都又命左金吾大將軍趙承恩及宦者左監門衛大將軍薛崇簡帥兵五百人往均州以備譙王重福后與兄太子少保溫定策立溫王重茂為皇太子召諸府兵五萬人屯京城分為左右營然後發喪少帝即位尊后為皇太后臨朝攝政韋溫總知內外兵馬守援宮掖駙馬韋捷韋濯分掌左右屯營武延秀及溫從子播族弟璿外甥高崇共典左右羽林軍及飛騎萬騎播璿欲先樹威嚴拜官日先鞭萬騎數人衆皆怨不為之用時京城恐懼相傳將有革命之事往往偶語人情不安臨淄王率薛崇簡鍾紹京劉幽求領萬騎及總監丁夫入自玄武門至左羽林軍斬將軍韋璿韋播及中郎將高崇於寢帳遂斬關而入至太極殿后惶駭遁入殿前飛騎營及武延秀安樂公主皆為亂兵所殺分遣萬騎誅其黨與韋溫溫從子捷及族弟嬰宗楚客弟晉卿紀處訥馬秦客葉靜能楊均趙履溫衛尉卿王哲太常卿李將作少匠李守質及韋氏武氏宗族無少長皆斬之梟后及安樂公主首於東市翌日敕收后尸葬以一品之禮追貶為庶人安樂公主葬以三品之禮追貶為悖逆庶人中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同被誅婉兒時在襁褓隨母配入掖庭及長有文詞明習吏事則天時婉兒忤旨當誅則天惜其才不殺但黥其面而已自聖曆已後百司表奏多令參決中宗即位又令專掌制命深被信任尋拜為昭容封其母鄭氏為沛國夫人婉兒既與武三思淫亂每下制敕多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閣索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后遂激怒並將婉兒登玄武門樓以避兵鋒俄而事定婉兒常勸廣置昭文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒又通於吏部侍郎崔湜引知政事湜嘗充使開商山新路功未半而中宗崩婉兒草遺制曲其功而加褒賞及韋庶人敗婉兒亦斬於旗下玄宗令收其詩筆撰成文集二十卷令張說為之序初婉兒在孕時其母夢人遺己大稱占者曰當生貴子而秉國權衡既生女聞者嗤其無效及婉兒專秉內政果如占者之言睿宗肅明順聖皇后劉氏刑部尚書德威之孫也父延景陝州刺史景雲元年追贈尚書右僕射沛國公儀鳳中睿宗居藩納后為孺人尋立為妃生寧王憲壽昌代國二公主文明元年睿宗即位冊為皇后及降為皇嗣后從降為妃長壽中與昭成皇后同被譴為則天所殺景雲元年追諡肅明皇后招魂葬於東都城南陵曰惠陵睿宗崩遷祔橋陵以昭成太后故不得入太廟配饗常別祀於儀坤廟開元二十年始祔太廟睿宗昭成順聖皇后竇氏將作大匠抗曾孫也祖誕大理卿莘國公父孝諶潤州刺史景雲元年追贈太尉邠國公后姿容婉順動循禮則睿宗為相王時為孺人甚見禮異光宅元年立為德妃生玄宗及金仙玉真二公主長壽二人為戶婢團兒誣譖與肅明皇后厭蠱咒詛正月二日朝則天皇后於嘉豫殿既退而同時遇害梓宮祕密莫知所在睿宗即位諡曰昭成皇后招魂葬於都城之南陵曰靖陵又立廟於京師號為儀坤廟睿宗崩后以帝母之重追尊為皇太后諡仍舊祔葬橋陵遷神主于太廟玄宗廢后王氏同州下邽人梁冀州刺史神念之後上為臨淄王時納后為妃上將起事頗預密謀贊成大業先天元年為皇后以父仁皎為太僕卿纍加開府儀同三司邠國公后兄守一以后無子常懼有廢立導以符厭之事有左道僧明悟為祭南北斗刻霹靂木書天地字及上諱合而佩之且祝曰佩此有子當與則天皇后為比事發上親究之皆驗開元十二年秋七月己卯下制曰皇后王氏天命不祐華而不實造起獄訟朋扇朝廷見無將之心有可諱之惡焉得敬承宗廟母儀天下可廢為庶人別院安置刑于家室有愧昔王為國大計蓋非獲已守一賜死其年十月庶人卒以一品禮葬於無相寺寶應元年雪免復尊為皇后玄宗貞順皇后武氏則天從父兄子恆安王攸止女也攸止卒後后尚幼隨例入宮上即位漸承恩寵及王庶人廢後特賜號為惠妃宮中禮秩一同皇后所生母楊氏封為鄭國夫人同母弟忠纍遷國子祭酒信祕書監惠妃開元初産夏悼王及懷哀王上仙公主並襁褓不育上特垂傷悼及生壽王瑁不敢養於宮中命寧王憲於外養之又生盛王琦咸宜太華二公主惠妃以開元二十五年十二月薨年四十餘下制曰存有懿範沒有寵章豈獨被於朝班故乃施於亞政可以垂裕斯為通典故惠妃武氏少而婉順長而賢明行合禮經言應圖史承戚里之華胄升後庭之峻秩貴而不恃謙而益光以道飭躬以和逮下四德粲其兼備六宮咨而是則法度在己靡資珩珮躬儉化人率先絺夙有奇表將加正位前後固讓辭而不受奄至淪歿載深感悼遂使玉衣之慶不及於生前象服之榮徒增於身後可贈貞順皇后宜令所司擇日冊命葬於敬陵時慶王琮等請制齊衰之服有司請以忌日廢務上皆不許之立廟於京中昊天觀南乾元之後祠享亦絶玄宗楊貴妃高祖令本金州刺史父玄琰蜀州司戶妃早孤養於叔父河南府士曹玄開元初武惠妃特承寵遇故王皇后廢黜二十四年惠妃薨帝悼惜久之後庭數千無可意者或奏玄琰女姿色冠代宜蒙召見時妃衣道士服號曰太真既進見玄宗大悅不期歲禮遇如惠妃太真姿質豐豔善歌舞通音律智算過人每倩盼承迎動移上意宮中呼為娘子禮數實同皇后有姊三人皆有才貌玄宗並封國夫人之號長曰大姨封韓國三姨封虢國八姨封秦國並承恩澤出入宮掖勢傾天下天寶初進冊貴妃妃父玄琰纍贈太尉齊國公母封涼國夫人叔玄圭光祿卿再從兄銛鴻臚卿錡侍御史尚武惠妃女太華公主以母愛禮遇過於諸公主賜甲第連於宮禁韓虢秦三夫人與銛錡等五家每有請託府縣承迎峻如詔敕四方賂遺其門如市五載七月貴妃以微譴送歸楊銛宅比至亭午上思之不食高力士探知上旨請送貴妃院供帳器玩廩餼等辦具百餘車上又分御饌以送之帝動不稱旨暴怒笞撻左右力士伏奏請迎貴妃歸院是夜開安興里門入內妃伏地謝罪上歡然慰撫翌日韓虢進食上作樂終日左右暴有賜與自是寵遇愈隆韓虢秦三夫人歲給錢千貫為脂粉之資銛授三品上柱國私第立戟姊妹昆仲五家甲第洞開僭擬宮掖車馬僕御照耀京邑遞相夸尚每搆一堂費踰千萬計見制度宏壯於己者即徹而復造土木之工不捨晝夜玄宗頒賜及四方獻遺五家如一中使不絶開元已來豪貴雄盛無如楊氏之比也玄宗凡有遊幸貴妃無不隨侍乘馬則高力士執轡授鞭宮中供貴妃院織錦刺繡之工凡七百人其雕刻鎔造又數百人揚益嶺表刺史必求良工造作奇器異服以奉貴妃獻賀因致擢居顯位玄宗每年十月幸華清宮國忠姊妹五家扈從每家為一隊著一色衣五家合隊照映如百花之煥發而遺鈿墜舄瑟瑟珠翠璨瓓芳馥於路而國忠私於虢國而不避雄狐之刺每入朝或聯鑣方駕不施帷幔每三朝慶賀五鼓待漏靘妝盈巷蠟炬如晝而十宅諸王百孫院婚嫁皆因韓虢為紹介仍先納賂千貫而奏請罔不稱旨天寶九載貴妃復忤旨送歸外第時吉溫與中貴人善溫入奏曰婦人智識不遠有忤聖情然貴妃久承恩顧何惜宮中一席之地使其就戮安忍取辱於外哉上即令中使張韜光賜御饌妃附韜光泣奏曰妾忤聖顏罪當萬死衣服之外皆聖恩所賜無可遺留然髮膚是父母所有乃引刀翦髮一繚附獻玄宗見之驚惋即使力士召還國忠既居宰執兼領劍南節度勢漸恣橫十載正月望夜楊家五宅夜遊與廣平公主騎從爭西市門楊氏奴揮鞭及公主衣公主墮馬駙馬程昌裔扶公主因及數撾公主泣奏之上令殺楊氏奴昌裔亦停官國忠二男昢暄妃弟鑑皆尚公主楊氏一門尚二公主二郡主貴妃父祖立私廟玄宗御製家廟碑文並書玄圭纍遷至兵部尚書天寶中范陽節度使安祿山大立邊功上深寵之祿山來朝帝令貴妃姊妹與祿山結為兄弟祿山母事貴妃每宴賜錫賚稠沓及祿山叛露檄數國忠之罪河北盜起玄宗以皇太子為天下兵馬元帥監撫軍國事國忠大懼諸楊聚哭貴妃銜土陳請帝遂不行內禪及潼關失守從幸至馬嵬禁軍大將陳玄禮密啓太子誅國忠父子既而四軍不散玄宗遣力士宣問對曰賊本尚在蓋指貴妃也力士復奏帝不獲已與妃訣遂縊死於佛室時年三十八瘞於驛西道側上皇自蜀還令中使祭奠詔令改葬禮部侍郎李揆曰龍武將士誅國忠以其負國兆亂今改葬故妃恐將士疑懼葬禮未可行乃止上皇密令中使改葬於他所初瘞時以紫褥裹之肌膚已壞而香囊仍在內官以獻上皇視之悽惋乃令圖其形於別殿朝夕視之馬嵬之誅國忠也虢國夫人聞難作奔馬至陳倉縣令薛景仙率人吏追之走入竹林先殺其男裴徽及一女國忠妻裴柔曰娘子為我盡命即刺殺之已而自刎不死縣吏載之閉於獄中猶謂吏曰國家乎賊乎吏曰互有之血凝至喉而卒遂瘞于郭外韓國夫人壻祕書少監崔峋女為代宗妃虢國男裴徽尚肅宗女延光公主女嫁讓帝男秦國夫人壻柳澄先死男鈞尚長清縣主澄弟潭尚肅宗女和政公主
