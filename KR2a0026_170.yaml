body:
  text: 舊唐書卷一百六十六列傳第一百一十六元稹龐嚴附白居易弟行簡敏中附元稹字微之河南人後魏昭成皇帝稹十代祖也兵部尚書昌平公巖六代祖也曾祖延景岐州參軍祖悱南頓丞父寬比部郎中舒王府長史以稹貴贈左僕射稹八歲喪父其母鄭夫人賢明婦人也家貧為稹自授書教之書學稹九歲能屬文十五兩經擢第二十四調判入第四等授祕書省校書郎二十八應制舉才識兼茂明於體用科登第者十八人稹為第一元和元年四月也制下除右拾遺稹性鋒鋭見事風生既居諫垣不欲碌碌自滯事無不言即日上疏論諫職又以前時王叔文王伾以猥褻待詔蒙幸太子永貞之際大撓朝政是以訓導太子宮官宜選正人乃獻教本書曰臣伏見陛下降明詔修廢學增胄子選司成大哉堯之為君伯夷典禮夔教胄子之深旨也然而事有萬萬於此者臣敢冒昧殊死而言之臣聞諸賈生曰三代之君仁且久者教之然也誠哉是言且夫周成王人之中才也近管蔡則讒入有周召則義聞豈可謂天聰明哉然而克終于道者得不謂教之然耶俾伯禽唐叔與之遊禮樂詩書為之習目不得閲淫豔妖誘之色耳不得聞優笑凌亂之音口不得習操斷擊搏之書居不得近容順陰邪之黨遊不得縱追禽逐獸之樂玩不得有遐異僻絶之珍凡此數者非謂備之於前而不為也亦將不得見之矣及其長而為君也血氣既定遊習既成雖有放心快己之事日陳于前固不能奪已成之習已定之心矣則彼忠直道德之言固吾之所習聞也陳之者有以諭焉彼庸佞違道之説固吾之所積懼也諂之者有以辨焉人之情莫不欲耀其所能而黨其所近苟將得志則必快其所蘊矣物之性亦然是以魚得水而遊馬逸駕而走鳥得風而翔火得薪而熾此皆物之快其所蘊也今夫成王所蘊道德也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其蘊則興禮樂而朝諸侯措刑罰而美教化教之至也可不謂信然哉及夫秦則不然滅先王之學曰將以愚天下黜師保之位曰將以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙高者詐宦之戮人也而傅之以殘忍戕賊之術且曰恣睢天下以為貴莫見其面以為尊是以天下之人人未盡愚而胡亥固已不能分獸畜矣趙高之威懾天下而胡亥固已自幽於深宮矣彼李斯秦之寵丞相也因讒冤死無所自明而况于疏遠之臣庶乎若然則秦之亡有以致之也漢高承之以兵革漢文守之以廉謹卒不能蘇復大訓是以景武昭宣天資甚美才可以免禍亂哀平之間則不能虞篡弒矣然而惠帝廢易之際猶賴羽翼以勝邪心是後有國之君議教化者莫不以興廉舉孝設學崇儒為意曾不知教化之不行自貴始略其貴者教其賤者無乃鄰於倒置乎洎我太宗文皇帝之在藩邸以至於為太子也選知道德者十八人與之遊習即位之後雖遊宴飲食之間若十八人者實在其中上失無不言下情無不達不四三年而名高盛古豈一日二日而致是乎遊習之漸也貞觀已還師傅皆宰相兼領其餘宮僚亦甚重焉馬周以位高恨不得為司議郎此其驗也文皇之後漸疏賤之用至母后臨朝翦棄王室當中睿二聖勤勞之際雖有骨鯁敢言之士既不得在調護保安之職終不能吐扶衛之一辭而令醫匠安金藏剖腹以明之豈不大哀也耶兵興已來茲弊尤甚師資保傅之官非疾廢眊聵不任事者為之即休戎罷帥不知書者處之至于友諭贊議之徒疏冗散賤之甚者縉紳恥由之夫以匹士之愛其子者猶求明哲慈惠之師以教之直諒多聞之友以成之豈天下之元良而可以疾廢眊聵不知書者為之師乎疏冗散賤不適用者為之友乎此何不及上古之甚也近制宮僚之外往往以沉滯僻老之儒充侍直侍讀之選而又疏棄斥逐之越月踰時不得召見彼又安能傅成道德而保養其身躬哉臣以為積此弊者豈不以皇天眷佑祚我唐德以舜繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是為屑屑習儀者故不之省耳臣獨以為於列聖之謀則可也計傳後嗣則不可脫或萬代之後若有周成之中才而又生於深宮優笑之間無周召保助之教則將不能知喜怒哀樂之所自矣况稼穡艱難乎今陛下以上聖之資肇臨海內是天下之人傾耳注心之日特願陛下思成王訓導之功念文皇遊習之漸選重師保慎擇宮僚皆用博厚弘深之儒而又明達機務者為之更相進見日就月將因令皇太子聚諸生定齒胄講業之儀行嚴師問道之禮至德要道以成之徹膳記過以警之血氣未定則去禽色之娛以就學聖質已備則資遊習之善以弘德此所謂一人元良萬方以貞之化也豈直修廢學選司成而足倫匹其盛哉而又俾則百王莫不幼同師長同術識君道之素定知天倫之自然然後選用賢良樹為藩屏出則有晉鄭魯衛之盛入則有東牟朱虛之強蓋所謂宗子維城犬牙盤石之勢也又豈與夫魏晉以降囚賤其兄弟而自翦其本枝者同年而語哉憲宗覽之甚悅又論西北邊事皆朝政之大者憲宗召對問方略為執政所忌出為河南縣尉丁母憂服除拜監察御史四年奉使東蜀劾奏故劍南東川節度使嚴礪違制擅賦又籍沒塗山甫等吏民八十八戶田宅一百一十一奴婢二十七人草千五百束錢七千貫時礪已死七州刺史皆責罰稹雖舉職而執政有與礪厚者惡之使還令分務東臺浙西觀察使韓臯封杖決湖州安吉令孫澥四日內死徐州監軍使孟升卒節度使王紹傳送升喪柩還京給券乘驛仍於郵舍安喪柩稹並劾奏以法河南尹房式為不法事稹欲追攝擅令停務既飛表聞奏罰式一月俸仍召稹還京宿敷水驛內官劉士元後至爭廳士元怒排其戶稹襪而走廳後士元追之後以箠擊稹傷面執政以稹少年後輩務作威福貶為江陵府士曹參軍稹聰警絶人年少有才名與太原白居易友善工為詩善狀詠風態物色當時言詩者稱元白焉自衣冠士子至閭閻下俚悉傳諷之號為元和體既以俊爽不容於朝流放荊蠻者僅十年俄而白居易亦貶江州司馬稹量移通州司馬雖通江懸邈而二人來往贈答凡所為詩有自三十五十韻乃至百韻者江南人士傳道諷誦流聞闕下里巷相傳為之紙貴觀其流離放逐之意靡不悽惋十四年自虢州長史徵還為膳部員外郎宰相令狐楚一代文宗雅知稹之辭學謂稹曰嘗覽足下製作所恨不多遲之久矣請出其所有以豁豫懷稹因獻其文自曰稹初不好文徒以仕無他歧強由科試及有罪譴棄之後自以為廢滯潦倒不復為文字有聞於人矣曾不知好事者抉擲芻蕪塵瀆尊重竊承相公特於廊廟間道稹詩句昨又面奉教約令獻舊文戰汗悚踊慚忝無地稹自御史府謫官於今十餘年矣間誕無事遂專力於詩章日益月滋有詩句千餘首其間感物寓意可備矇瞽之風者有之辭直氣粗罪尤是懼固不敢陳露於人唯杯酒光景間屢為小碎篇章以自吟暢然以為律體卑庳格力不揚苟無姿態則陷流俗常欲得思深語近韻律調新屬對無差而風情宛然而病未能也江湖間多新進小生不知天下文有宗主妄相放效而又從而失之遂至於支離褊淺之辭皆目為元和詩體稹與同門生白居易友善居易雅能詩就中愛驅駕文字窮極聲韻或為千言或五百言律詩以相投寄小生自審不能過之往往戲排舊韻別創新辭名為次韻相酬蓋欲以難相挑自爾江湖間為詩者復相放效力或不足則至於顛倒語言重復首尾韻同意等不異前篇亦目為元和詩體而司文者考變雅之由往往歸咎於稹嘗以為雕蟲小事不足以自明始聞相公記憶纍旬已來實慮糞土之牆庇之以大廈使不復破壞永為板築者之誤輒寫古體歌詩一百首百韻至兩韻律詩一百首為五卷奉啓跪陳或希構廈之餘一賜觀覽知小生於章句中欒櫨榱桷之材盡曾量度則十餘年之邅回不為無用矣楚深稱賞以為今代之鮑謝也穆宗皇帝在東宮有妃嬪左右嘗誦稹歌詩以為樂曲者知稹所為嘗稱其善宮中呼為元才子荊南監軍崔潭峻甚禮接稹不以掾吏遇之常徵其詩什諷誦之長慶初潭峻歸朝出稹連昌宮辭等百餘篇奏御穆宗大悅問稹安在對曰今為南宮散郎即日轉祠部郎中知制誥朝廷以書命不由相府甚鄙之然辭誥所出敻然與古為侔遂盛傳於代由是極承恩顧嘗為長慶宮辭數十百篇京師競相傳唱居無何召入翰林為中書舍人承旨學士中人以潭峻之故爭與稹交而知樞密魏弘簡尤與稹相善穆宗愈深知重河東節度使裴度三上疏言稹與弘簡為刎頸之交謀亂朝政言甚激訐穆宗顧中外人情乃罷稹內職授工部侍郎上恩顧未衰長慶二年拜平章事詔下之日朝野無不輕笑之時王廷湊朱克融連兵圍牛元翼於深州朝廷俱赦其罪賜節鉞令罷兵俱不奉詔稹以天子非次拔擢欲有所立以報上有和王傅于方者故司空之子干進於稹言有奇士王昭王友明二人嘗客於燕趙間頗與賊黨通熟可以反間而出元翼仍自以家財資其行仍賂兵吏部令史為出告身二十通以便宜給賜稹皆然之有李賞者知于方之謀以稹與裴度有隙乃告度云于方為稹所使欲結客王昭等刺度度隱而不發及神策軍中尉奏于方之事乃詔三司使韓臯等訊而害裴事無驗而前事盡露遂俱罷稹度平章事乃出稹為同州刺史度守僕射諫官上疏言責度太重稹太輕上心憐稹止削長春宮使稹初罷相三司獄未奏京兆尹劉遵古遣坊所由潛邏稹居第稹奏訴之上怒罰遵古遣中人撫諭稹稹至同州因表謝上自曰臣稹辜負聖明辱纍恩奬便合自求死所豈謂尚忝官榮臣稹死罪臣八歲喪父家貧無業母兄乞丐以供資養衣不布體食不充腸幼學之年不蒙師訓因感鄰里兒稚有父兄為開學校涕咽發憤願知詩書慈母哀臣親為教授年十有五得明經出身由是苦心為文夙夜強學年二十四登吏部乙科授校書郎年二十八蒙制舉首選授左拾遺始自為學至於升朝無朋友為臣吹噓無親戚為臣援庇莫非苦己實不因人獨立性成遂無交結任拾遺日屢陳時政蒙先皇帝召問於延英旋為宰相所憎出臣河南縣尉及為監察御史又不規避專心糾繩復為宰相怒臣不庇親黨因以他事貶臣江陵判司廢棄十年分死溝瀆元和十四年憲宗皇帝開釋有罪始授臣膳部員外郎與臣同省署者多是臣登朝時舉人任卿相者半是臣同諫院時拾遺補闕愚臣既不料陛下天聽過卑知臣薄藝朱書授臣制誥延英召臣賜緋宰相惡臣不出其門由是百萬侵毀陛下察臣無罪寵奬踰深召臣面授舍人遣充承旨翰林學士金章紫服光飾陋軀人生之榮臣亦至矣然臣益遭誹謗日夜憂危唯陛下聖鑒昭臨彌加保任竟排羣議擢授台司臣忝有肺肝豈並尋常宰相况當行營退散之後牛元翼未出之間每聞陛下軫念之言愚臣恨不身先士卒所問于方計策遣王友明等救解深州蓋欲上副聖情豈是別懷他意不料姦人疑臣殺害裴度妄有告論塵瀆聖聰愧羞天地臣本待辨明一了便擬殺身謝責豈料聖慈尚加薄貶同州雖違咫尺之間不遠郊圻之境伏料必是宸衷獨斷乞臣此官若遣他人商量乍可與臣遠處方鎮豈肯遣臣俯近闕廷所恨今月三日尚蒙召對延英此時不解泣血仰辭天顏乃至今日竄逐臣自離京國目斷魂銷每至五更朝謁之時實制淚不已臣若餘生未死他時萬一歸還不敢更望得見天顏但得再聞京城鐘鼓之音臣雖黃土覆面無恨九泉臣無任自恨自慚攀戀聖慈之至在郡二年改授越州刺史兼御史大夫浙東觀察使會稽山水奇秀稹所辟幕職皆當時文士而鏡湖秦望之遊月三四焉而諷詠詩什動盈卷帙副使竇鞏海內詩名與稹酬唱最多至今稱蘭亭絶唱稹既放意娛遊稍不修邊幅以瀆貨聞於時凡在越八年大和初就加檢校禮部尚書三年九月入為尚書左丞振舉紀綱出郎官頗乖公議者七人然以稹素無檢操人情不厭服會宰相王播倉卒而卒稹大為路歧經營相位四年正月檢校戶部尚書兼鄂州刺史御史大夫武昌軍節度使五年七月二十二日暴疾一日而卒于鎮時年五十三贈尚書右僕射有子曰道護時年三歲稹仲兄司農少卿積營護喪事所著詩賦詔册銘誄論議等雜文一百卷號曰元氏長慶集又著古今刑政書三百卷號類集並行於代稹長慶末因編刪其文稿自曰劉秩云制不可削豫以為有可得而削之者貢謀猷持嗜欲君有之則譽歸于上臣專之則譽歸於下苟而存之其攘也非道也經制度明利害區邪正辨嫌惑存之則事分著去之則是非泯苟而削之其過也非道也元和初章武皇帝新即位臣下未有以言刮視聽者豫時始以對詔在拾遺中供奉由是獻教本書諫職論事等表十數通仍為裴度李正辭韋熏訟所言當行而宰相曲道上語上頗悟召見問狀宰相大惡之不一月出為河南尉後纍歲補御史使東川謹以元和赦書劾節度使嚴礪籍塗山甫等八十八家過賦梓遂之民數百萬朝廷異之奪七刺史料悉以所籍歸於人會潘孟陽代礪為節度使貪過礪且有所承迎雖不敢盡廢詔因命當得所籍者皆入資資過其稱榷薪盜賦無不為仍為礪密狀不當得醜諡豫自東川還朋礪者潛切齒矣無何分蒞東都臺天子久不在都都下多不法者百司皆牢獄有栽接吏械人逾歲而臺府不得而知之者豫因飛奏絶百司專禁錮河南尉叛官豫劾之忤宰相旨監徐使死於軍徐帥郵傳其柩柩至洛其下歐詬主郵吏豫命吏徙柩於外不得復乘傳浙西觀察使封杖決安吉令至死河南尹誣奏書生尹太階請死之飛龍使誘趙實家逃奴為養子田季安盜娶洛陽衣冠女汴州沒入死商錢且千萬滑州賦於民以千授於人以八百朝廷饋東師主計者誤命牛車四千三百乘飛芻越太行類是數十事或移或奏皆止之貞元已來不慣用文法內外寵臣皆喑嗚會河南尹房式詐諼事發奏攝之前所喑嗚者叫噪宰相素以劾叛官事相銜乘是黜豫江陵掾後十年始為膳部員外郎穆宗初宰相更相用事丞相段公一日獨得對因請亟用兵部郎中薛存慶考功員外郎牛僧孺豫亦在請中上然之不十數日次用為給舍他忿恨者日夜構飛語豫懼罪比上書自明上憐之三召與語語及兵賦洎西北邊事因命經紀之是後書奏及進見皆言天下事外間不知多臆度陛下益憐其不漏禁中語召入禁林且欲亟用為宰相是時裴度在太原亦有宰相望巧者謀欲俱廢之乃以豫所無構於裴裴奏至驗之皆失實上以裴方握兵不欲校曲直出豫為工部侍郎而相裴之期亦衰矣不纍月上盡得所構者雖不能暴揚之遂果初意卒用豫與裴俱為宰相復有購狂民告豫借客刺裴者鞫之復無狀然而裴與豫以故俱罷免始元和十五年八月得見上至是未二歲僭忝恩寵無是之速者遭罹謗咎亦無是之甚者是以心腹腎腸糜費於扶衛危亡之不暇又惡暇經紀陛下之所付哉然而造次顛沛之中前後列上兵賦邊防之狀可得而存者一百一十五苟而削之是傷先帝之器使也至于陳暢辨謗之章去之則無以自明於朋友矣其餘郡縣之奏請賀慶之禮因亦附於件目始教本書至於為人雜奏二十有七軸凡二百二十有七奏終歿吾世貽之子孫式所以明經制之難行而銷毀之易至也其自如此欲知其作者之意備於此篇稹文友與白居易最善後進之士最重龐嚴言其文體類己保薦之龐嚴者壽春人父景昭嚴元和中登進士第長慶元年應制舉賢良方正能直言極諫科策入三等冠制科之首是月拜左拾遺聰敏絶人文章峭麗翰林學士元稹李紳頗知之明年二月召入翰林為學士轉左補闕再遷駕部郎中知制誥嚴與右拾遺蔣防俱為稹紳保薦至諫官內職四年昭愍即位李紳為宰相李逢吉所排貶端州司馬嚴坐纍出為江州刺史給事中于敖素與嚴善制既下敖封還時人凜然相顧曰于給事犯宰相怒而為知己不亦危乎及覆制出乃知敖駁制書貶嚴太輕中外無不嗤誚以為口實初李紳謫官朝官皆賀逢吉唯右拾遺吳思不賀逢吉怒改為殿中侍御史充入蕃告哀使嚴復入為庫部郎中大和二年二月上試制舉人命嚴與左散騎常侍馮宿太常少卿賈餗為試官以裴休為甲等制科之首有應直言極諫舉人劉蕡條對激切凡數千言不中選人咸以為屈其所對策大行於時登科者有請以身名授蕡者嚴再遷太常少卿五年權知京兆尹以強幹不避權豪稱然無士君子之檢操貪勢嗜利因醉而卒白居易字樂天太原人北齊五兵尚書建之仍孫建生士通皇朝利州都督士通生志善尚衣奉御志善生溫檢校都官郎中溫生鍠歷酸棗鞏二縣令鍠生季庚建中初為彭城令時李正己據河南十餘州叛正己宗人洧為徐州刺史季庚説洧以彭門歸國因授朝散大夫大理少卿徐州別駕賜緋魚袋兼徐泗觀察判官歷衢州襄州別駕自鍠至季庚世敦儒業皆以明經出身季庚生居易初建立功於高齊賜田於韓城子孫家焉遂移籍同州至溫徙於下邽今為下邽人焉居易幼聰慧絶人襟懷宏放年十五六時袖文一編投著作郎吳人顧況況能文而性浮薄後進文章無可意者覽居易文不覺迎門禮遇曰吾謂斯文遂絶復得吾子矣貞元十四年始以進士就試禮部侍郎高郢擢升甲科吏部判入等授祕書省校書郎元和元年四月憲宗策試制舉人應才識兼茂明於體用科策入第四等授盩厔縣尉集賢校理居易文辭富豔尤精於詩筆自讎校至結綬畿甸所著歌詩數十百篇皆意存諷賦針時之病補政之缺而士君子多之而往往流聞禁中章武皇帝納諫思理渴聞讜言二年十一月召入翰林為學士三年五月拜左拾遺居易自以逢好文之主非次拔擢欲以生平所貯仰酬恩造拜命之日獻疏言事曰蒙恩授臣左拾遺依前翰林學士已與崔羣同狀陳謝但言忝冒未吐衷誠今再瀆宸嚴伏惟重賜詳覽臣謹按六典左右拾遺掌供奉諷諫凡發令舉事有不便於時不合於道者小則上封大則廷諍其選甚重其秩甚卑所以然者抑有由也大凡人之情位高則惜其位身貴則愛其身惜位則偷合而不言愛身則苟容而不諫此必然之理也故拾遺之置所以卑其秩者使位未足惜身未足愛也所以重其選者使下不忍負心上不忍負恩也夫位不足惜恩不忍負然後能有闕必規有違必諫朝廷得失無不察天下利病無不言此國朝置拾遺之本意也由是而言豈小臣愚劣暗懦所宜居之哉況臣本鄉校豎儒府縣走吏委心泥滓絶望煙霄豈意聖慈擢居近職每宴飲無不先預每慶賜無不先霑中廄之馬代其勞內廚之膳給其食朝慚夕惕已逾半年塵曠漸深憂愧彌劇未申微效又擢清班臣所以授官已來僅經十日食不知味寢不遑安唯思粉身以答殊竉但未獲粉身之所耳今陛下肇臨皇極初受鴻名夙夜憂勤以求致理每施一政舉一事無不合於道便於時者萬一事有不便於時者陛下豈不欲聞之乎萬一政有不合於道者陛下豈不欲知之乎倘陛下言動之際詔令之間小有闕遺稍關損益臣必密陳所見潛獻所聞但在聖心裁斷而已臣又職在禁中不同外司欲竭愚誠合先陳露伏希天鑒深察赤誠居易與河南元稹相善同年登制舉交情隆厚稹自監察御史謫為江陵府士曹掾翰林學士李絳崔羣上前面論稹無罪居易纍疏切諫曰臣昨緣元稹左降頻已奏聞臣內察事情外聽衆議元稹左降有不可者三何者元稹守官正直人所共知自授御史已來舉奏不避權勢祇如奏李佐公等事多是朝廷親情人誰無私因以挾恨或假公議將報私嫌遂使誣謗之聲上聞天聽臣恐元稹左降已後凡在位者每欲舉職必先以稹為誡無人肯為陛下當官守法無人肯為陛下嫉惡繩愆內外權貴親黨縱有大過大罪者必相容隱而已陛下從此無由得知此其不可者一也昨元稹所追勘房式之事心雖徇公事稍過當既從重罰足以懲違況經謝恩旋又左降雖引前事以為責辭然外議喧喧皆以為稹與中使劉士元爭廳因此獲罪至於爭廳事理已具前狀奏陳況聞士元踏破驛門奪將鞍馬仍索弓箭嚇辱朝官承前已來未有此事今中官有罪未聞處置御史無過却先貶官遠近聞知實損聖德臣恐從今已後中官出使縱暴益甚朝官受辱必不敢言縱有被凌辱毆打者亦以元稹為戒但吞聲而已陛下從此無由得聞此其不可二也臣又訪聞元稹自去年已來舉奏嚴礪在東川日枉法沒入平人資産八十餘家又奏王紹違法給券令監軍押柩及家口入驛又奏裴玢違敕徵百姓草又奏韓皋使軍將封杖打殺縣令如此之事前後甚多屬朝廷法行悉有懲罰計天下方鎮皆怒元稹守官今貶為江陵判司即是送與方鎮從此方便報怨朝廷何由得知臣伏聞德宗時有崔善貞者告李錡必反德宗不信送與李錡錡掘坑熾火燒殺善貞曾未數年李錡果反至今天下為之痛心臣恐元稹貶官方鎮有過無人敢言陛下無由得知不法之事此其不可者三也若無此三不可假如朝廷誤左降一御史蓋是小事臣安敢煩瀆聖聽至于再三誠以所損者深所關者大以此思慮敢不極言疏入不報又淄青節度使李師道進絹為魏徵子孫贖宅居易諫曰徵是陛下先朝宰相太宗嘗賜殿材成其正室尤與諸家第宅不同子孫典貼其錢不多自可官中為之收贖而令師道掠美事實非宜憲宗深然之上又欲加河東王鍔平章事居易諫曰宰相是陛下輔臣非賢良不可當此位鍔誅剝民財以市恩澤不可使四方之人謂陛下得王鍔進奉而與之宰相深無益於聖朝乃止王承宗拒命上令神策中尉吐突承璀為招討使諫官上章者十七八居易面論辭情切至既而又請罷河北用兵凡數千百言皆人之難言者上多聽納唯諫承璀事切上頗不悅謂李絳曰白居易小子是朕拔擢致名位而無禮於朕朕實難奈絳對曰居易所以不避死亡之誅事無巨細必言者蓋酬陛下特力拔擢耳非輕言也陛下欲開諫諍之路不宜阻居易言上曰卿言是也由是多見聽納五年當改官上謂崔羣曰居易官卑俸薄拘於資地不能超等其官可聽自便奏來居易奏曰臣聞薑公輔為內職求為京府判司為奉親也臣有老母家貧養薄乞如公輔例於是除京兆府戶曹參軍六年四月丁母陳夫人之喪退居下邽九年冬入朝授太子左贊善大夫十年七月盜殺宰相武元衡居易首上疏論其冤急請捕賊以雪國恥宰相以宮官非諫職不當先諫官言事會有素惡居易者掎托居易言浮華無行其母因看花墮井而死而居易作賞花及新井詩甚傷名教不宜置彼周行執政方惡其言事奏貶為江表刺史詔出中書舍人王涯上疏論之言居易所犯狀迹不宜治郡追詔授江州司馬居易儒學之外尤通釋典常以忘懷處順為事都不以遷謫介意在湓城立隱舍於廬山遺愛寺嘗與人書言之曰豫去年秋始遊廬山到東西二林間香爐峯下見雲木泉石勝絶第一愛不能捨因立草堂前有喬松十數株修竹千餘竿青蘿為牆援白石為橋道流水周於舍下飛泉落於簷間紅榴白蓮羅生池砌居易與湊滿朗晦四禪師追永遠宗雷之迹為人外之交每相攜遊詠躋危登險極林泉之幽邃至於翛然順適之際幾欲忘其形骸或經時不歸或踰月而返郡守以朝貴遇之不之責時元稹在通州篇詠贈答往來不以數千里為遠嘗與稹書因論作文之大旨曰夫文尚矣三才各有文天之文三光首之地之文五材首之人之文六經首之就六經言詩又首之何者聖人感人心而天下和平感人心者莫先乎情莫始乎言莫切乎聲莫深乎義詩者根情苗言華聲實義上自賢聖下至愚騃微及豚魚幽及鬼神羣分而氣同形異而情一未有聲入而不應情交而不感者聖人知其然因其言經之以六義緣其聲緯之以五音音有韻義有類韻協則言順言順則聲易入類舉則情見情見則感易交於是乎孕大含深貫微洞密上下通而二氣泰憂樂合而百志熙二帝三王所以直道而行垂拱而理者揭此以為大柄決此以為大竇也故聞元首明股肱良之歌則知虞道昌矣聞五子洛汭之歌則知夏政荒矣言者無罪聞者作誡言者聞者莫不兩盡其心焉洎周衰秦興採詩官廢上不以詩補察時政下不以歌泄導人情用至於諂成之風動救失之道缺于時六義始刓矣國風變為騷辭五言始於蘇李詩騷皆不遇者各繫其志發而為文故河梁之句止於傷別澤畔之吟歸于怨思倣徨抑鬱不暇及他耳然去詩未遠梗概尚存故興離別則引雙鳧一鴈為喻諷君子小人則引香草惡鳥為比雖義類不具猶得風人之什二三焉于時六義始缺矣晉宋已還得者蓋寡以康樂之奧博多溺於山水以淵明之高古偏放於田園江鮑之流又狹於此如梁鴻五噫之例者百無一二于時六義寖微矣陵夷至于梁陳間率不過嘲風雪弄花草而已噫風雪花草之物三百篇中豈捨之乎顧所用何如耳設如北風其涼假風以刺威虐雨雪霏霏因雪以愍征役棠棣之華感華以諷兄弟采采芣苡美草以樂有子也皆興發於此而義歸於彼反是者可乎哉然則餘霞散成綺澄江淨如練歸花先委露別葉乍辭風之什麗則麗矣吾不知其所諷焉故僕所謂嘲風雪弄花草而已于時六義盡去矣唐興二百年其間詩人不可勝數所可舉者陳子昂有感遇詩二十首鮑防感興詩十五篇又詩之豪者世稱李杜李之作才矣奇矣人不逮矣索其風雅比興十無一焉杜詩最多可傳者千餘首至於貫穿古今覼縷格律盡工盡善又過於李焉然撮其新安石壕潼關吏蘆子關花門之章朱門酒肉臭路有凍死骨之句亦不過十三四杜尚如此況不逮杜者乎僕常痛詩道崩壞忽忽憤發或廢食輟寢不量才力欲扶起之嗟乎事有大謬者又不可一二而言然亦不能不粗陳於左右僕始生六七月時乳母抱弄於書屏下有指之字無字示僕者僕口未能言心已默識後有問此二字者雖百十其試而指之不差則知僕宿習之緣已在文字中矣及五六歲便學為詩九歲諳識聲韻十五六始知有進士苦節讀書二十已來晝課賦夜課書間又課詩不遑寢息矣以至于口舌成瘡手肘成胝既壯而膚革不豐盈未老而齒髮早衰白瞀然如飛蠅垂珠在眸子中者動以萬數蓋以苦學力文之所致又自悲家貧多故年二十七方從鄉賦既第之後雖專於科試亦不廢詩及授校書郎時已盈三四百首或出示交友如足下輩見皆謂之工其實未窺作者之域耳自登朝來年齒漸長閲事漸多每與人言多詢時務每讀書史多求理道始知文章合為時而著歌詩合為事而作是時皇帝初即位宰府有正人屢降璽書訪人急病僕當此日擢在翰林身是諫官月請諫紙啓奏之間有可以救濟人病裨補時闕而難於指言者輒詠歌之欲稍稍進聞於上上以廣宸聽副憂勤次以酬恩奬塞言責下以復吾平生之志豈圖志未就而悔已生言未聞而謗已成矣又請為左右終言之凡聞僕賀雨詩衆口籍籍以為非宜矣聞僕哭孔戡詩衆面脈脈盡不悅矣聞秦中吟則權豪貴近者相目而變色矣聞登樂遊園寄足下詩則執政柄者扼腕矣聞宿紫閣村詩則握軍要者切齒矣大率如此不可遍舉不相與者號為沽譽號為詆訐號為訕謗苟相與者則如牛僧孺之誡焉乃至骨肉妻孥皆以我為非也其不我非者舉世不過三兩人有鄧魴者見僕詩而喜無何魴死有唐衢者見僕詩而泣未幾而衢死其餘即足下足下又十年來困躓若此嗚呼豈六義四始之風天將破壞不可支持耶抑又不知天意不欲使下人病苦聞于上耶不然何有志於詩者不利若此之甚也然僕又自思關東一男子耳除讀書屬文外其他懵然無知乃至書畫棋博可以接羣居之歡者一無通曉即其愚拙可知矣初應進士時中朝無緦麻之親達官無半面之舊策蹇步於利足之途張空拳於戰文之場十年之間三登科第名落衆耳迹升清貫出交賢俊入侍冕旒始得名於文章終得罪於文章亦其宜也日者聞親友間説禮吏部舉選人多以僕私試賦判為準的其餘詩句亦往往在人口中僕恧然自愧不之信也及再來長安又聞有軍使高霞寓者欲聘倡妓妓大誇曰我誦得白學士長恨歌豈同他哉由是增價又足下書云到通州日見江館柱間有題僕詩者何人哉又昨過漢南日適遇主人集衆娛樂他賓諸妓見僕來指而相顧曰此是秦中吟長恨歌主耳自長安抵江西三四千里凡鄉校佛寺逆旅行舟之中往往有題僕詩者士庶僧徒孀婦處女之口每有詠僕詩者此誠雕篆之戲不足為多然今時俗所重正在此耳雖前賢如淵雲者前輩如李杜者亦未能忘情於其間古人云名者公器不可多取僕是何者竊時之名已多既竊時名又欲竊時之富貴使己為造物者肯兼與之乎今之屯窮理固然也況詩人多蹇如陳子昂杜甫各授一拾遺而屯剝至死孟浩然輩不及一命窮悴終身近日孟郊六十終試協律張籍五十未離一太祝彼何人哉況僕之才又不逮彼今雖謫佐遠郡而官品至第五月俸四五萬寒有衣飢有食給身之外施及家人亦可謂不負白氏子矣微之微之勿念我哉僕數月來檢討囊帙中得新舊詩各以類分分為卷目自拾遺來凡所遇所感關於美刺興比者又自武德至元和因事立題題為新樂府者共一百五十首謂之諷諭詩又或退公或臥病間居知足保和吟玩性情者一百首謂之間適詩又有事物牽於外情理動於內隨感遇而形於歎詠者一百首謂之感傷詩又有五言七言長句絶句自百韻至兩韻者四百餘首謂之雜律詩凡為十五卷約八百首異時相見當盡致於執事微之古人云窮則獨善其身達則兼濟天下僕雖不肖常師此語大丈夫所守者道所待者時時之來也為雲龍為風鵬勃然突然陳力以出時之不來也為霧豹為冥鴻寂兮寥兮奉身而退進退出處何往而不自得哉故僕志在兼濟行在獨善奉而始終之則為道言而發明之則為詩謂之諷諭詩兼濟之志也謂之間適詩獨善之義也故覽僕詩者知僕之道焉其餘雜律詩或誘於一時一物發於一笑一吟率然成章非平生所尚者但以親朋合散之際取其釋恨佐歡今銓次之間未能刪去他時有為我編集斯文者略之可也微之夫貴耳賤目榮古陋今人之大情也僕不能遠徵古舊如近歲韋蘇州歌行才麗之外頗近興諷其五言詩又高雅間淡自成一家之體今之秉筆者誰能及之然當蘇州在時人亦未甚愛重必待身後人始貴之今僕之詩人所愛者悉不過雜律詩與長恨歌已下耳時之所重僕之所輕至於諷諭者意激而言質間適者思淡而辭迂以質合迂宜人之不愛也今所愛者並世而生獨足下耳然百千年後安知復無如足下者出而知愛我詩哉故自八九年來與足下小通則以詩相戒小窮則以詩相勉索居則以詩相慰同處則以詩相娛知吾罪吾率以詩也如今年春遊城南時與足下馬上相戲因各誦新豔小律不雜他篇自皇子陂歸昭國里迭吟遞唱不絶聲者二十里餘樊李在傍無所措口知我者以為詩仙不知我者以為詩魔何則勞心靈役聲氣連朝接夕不自知其苦非魔而何偶同人當美景或花時宴罷或月夜酒酣一詠一吟不覺老之將至雖驂鸞鶴遊蓬瀛者之適無以加於此焉又非仙而何微之微之此吾所以與足下外形骸脫蹤迹傲軒鼎輕人寰者又以此也當此之時足下興有餘力且欲與僕悉索還往中詩取其尤長者如張十八古樂府李二十新歌行盧楊二祕書律詩竇七元八絶句博搜精掇編而次之號為元白往還集衆君子得擬議於此者莫不踊躍欣喜以為盛事嗟乎言未終而足下左轉不數月而僕又繼行心期索然何日成就又可為之太息矣僕常語足下凡人為文私於自是不忍於割截或失於繁多其間妍媸益又自惑必待交友有公鑒無姑息者討論而削奪之然後繁簡當否得其中矣況僕與足下為文尤患其多己尚病況他人乎今且各纂詩筆粗為卷第待與足下相見日各出所有終前志焉又不知相遇是何年相見是何地溘然而至則如之何微之知我心哉潯陽臘月江風苦寒歲暮鮮歡夜長少睡引筆鋪紙悄然燈前有念則書言無銓次勿以繁雜為倦且以代一夕之話言也居易自如此文士以為信然十三年冬量移忠州刺史自潯陽浮江上峽十四年三月元稹會居易於峽口停舟夷陵三日時季弟行簡從行三人於峽州西二十里黃牛峽口石洞中置酒賦詩戀戀不能訣南賓郡當峽路之深險處也花木多奇居易在郡為木蓮荔枝圖寄朝中親友各記其狀曰荔枝生巴峽間形圓如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朵如蒲萄核如枇杷殼如紅繒膜如紫綃瓤肉瑩白如雪漿液甘酸如醴酪大略如此其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣木蓮大者高四五丈巴民呼為黃心樹經冬不凋身如青楊有白文葉如桂厚大無脊花如蓮香色豔膩皆同獨房蘂有異四月初始開自開逮謝僅二十日元和十四年夏命道士毋丘元志寫之惜其遐僻因以三絶賦之有天教拋擲在深山之句咸傳於都下好事者喧然模寫其年冬召還京師拜司門員外郎明年轉主客郎中知制誥加朝散大夫始著緋時元稹亦徵還為尚書郎知制誥同在綸閣長慶元年三月受詔與中書舍人王起覆試禮部侍郎錢徽下及第人鄭朗等一十四人十月轉中書舍人十一月穆宗親試制舉人又與賈餗陳岵為考策官凡朝廷文字之職無不首居其選然多為排擯不得用其才時天子荒縱不法執政非其人制御乖方河朔復亂居易纍上疏論其事天子不能用乃求外任七月除杭州刺史俄而元稹罷相自馮翊轉浙東觀察使交契素深杭越鄰境篇詠往來不間旬浹嘗會于境上數日而別秩滿除太子左庶子分司東都寶曆中復出為蘇州刺史文宗即位徵拜祕書監賜金紫九月上誕節召居易與僧惟澄道士趙常盈對御講論於麟德殿居易論難鋒起辭辨泉注上疑宿構深嗟挹之大和二年正月轉刑部侍郎封晉陽縣男食邑三百戶三年稱病東歸求為分司官尋除太子賓客居易初對策高第擢入翰林蒙英主特達顧遇頗欲奮厲效報苟致身於訏謨之地則兼濟生靈蓄意未果望風為當路者所擠流徙江湖四五年間幾淪蠻瘴自是宦情衰落無意於出處唯以逍遙自得吟詠情性為事大和已後李宗閔李德裕朋黨事起是非排陷朝升暮黜天子亦無如之何楊穎士楊虞卿與宗閔善居易妻穎士從父妹也居易愈不自安懼以黨人見斥乃求致身散地冀於遠害凡所居官未嘗終秩率以病免固求分務識者多之五年除河南尹七年復授太子賓客分司初居易罷杭州歸洛陽於履道里得故散騎常侍楊憑宅竹木池館有林泉之致家妓樊素蠻子者能歌善舞居易既以尹正罷歸每獨酌賦詠於舟中因為池上篇曰東都風土水木之勝在東南偏東南之勝在履道里里之勝在西北隅西閈北垣第一第即白氏叟樂天退老之地地方十七畝屋室三之一水五之一竹九之一而島樹橋道間之初樂天既為主喜且曰雖有池臺無粟不能守也乃作池東粟廩又曰雖有子弟無書不能訓也乃作池北書庫又曰雖有賓朋無琴酒不能娛也乃作池西琴亭加石樽焉樂天罷杭州刺史得天竺石一華亭鶴二以歸始作西平橋開環池路罷蘇州刺史時得太湖石五白蓮折腰菱青板舫以歸又作中高橋通三島徑罷刑部侍郎時有粟千斛書一車洎臧獲之習管磬絃歌者指百以歸先是潁川陳孝仙與釀酒法味甚佳博陵崔晦叔與琴韻甚清蜀客薑發授秋思聲甚淡弘農楊貞一與青石三方長平滑可以坐臥大和三年夏樂天始得請為太子賓客分秩於洛下息躬於池上凡三任所得四人所與洎吾不才身今率為池中物每至池風春池月秋水香蓮開之旦露清鶴唳之夕拂楊石舉陳酒援崔琴彈秋思頽然自適不知其他酒酣琴罷又命樂童登中島亭合奏霓裳散序聲隨風飄或凝或散悠揚於竹煙波月之際者久之曲未竟而樂天陶然石上矣睡起偶詠非詩非賦阿龜握筆因題石間視其粗成韻章命為池上篇云十畝之宅五畝之園有水一池有竹千竿勿謂土狹勿謂地偏足以容膝足以息肩有堂有亭有橋有船有書有酒有歌有絃有叟在中白鬚颯然識分知足外無求焉如鳥擇木姑務巢安如蛙作坎不知海寬靈鵲怪石紫菱白蓮皆吾所好盡在我前時引一杯或吟一篇妻孥熙熙雞犬間間優哉遊哉吾將老乎其間又效陶潛五柳先生傳作醉吟先生傳以自況文章曠達皆此類也大和末李訓構禍衣冠塗地士林傷感居易愈無宦情開成元年除同州刺史辭疾不拜尋授太子少傅進封馮翊縣開國侯四年冬得風病伏枕者纍月乃放諸妓女樊蠻等仍自為墓志病中吟詠不輟自言曰豫年六十有八始患風痺之疾體癏首胘左足不支蓋老病相乘有時而至耳豫栖心釋梵浪迹老莊因疾觀身果有所得何則外形骸而內忘憂患先禪觀而後順醫治旬月以還厥疾少間杜門高枕淡然安間吟詠興來亦不能遏遂為病中詩十五篇以自諭會昌中請罷太子少傅以刑部尚書致仕與香山僧如滿結香火社每肩輿往來白衣鳩杖自稱香山居士大中元年卒時年七十六贈尚書右僕射有文集七十五卷經史事類三十卷並行於世長慶末浙東觀察使元稹為居易集序曰樂天始未言試指之無字能不誤始既言讀書勤敏與他兒異五六歲識聲韻十五志辭賦二十七舉進士貞元末進士尚馳競不尚支就中六籍尤擯落禮部侍郎高郢始用經藝為進退樂天一舉擢上第明年中拔萃甲科由是性習相近遠玄珠斬白蛇等賦洎百節判新進士競相傳於京師會憲宗皇帝策召天下士對詔稱旨又登甲科未幾選入翰林掌制誥比比上書言得失因為賀雨詩秦中吟等數十章指言天下事時人比之風騷焉豫始與樂天同祕書前後多以詩章相贈答豫譴掾江陵樂天猶在翰林寄豫百韻律體及雜體前後數十詩是後各佐江通復相酬寄巴蜀江楚間洎長安中少年遞相仿效競作新辭自謂為元和詩而樂天秦中吟賀雨諷諭間適等篇時人罕能知者然而二十年間禁省觀寺郵候牆壁之上無不書王公妾婦牛童馬走之口無不道其繕寫模勒衒賣於市井或因之以交酒茗者處處皆是其甚有至盜竊名姓苟求自售雜亂間廁無可奈何豫嘗於平水市中見村校諸童競習歌詠召而問之皆對曰先生教我樂天微之詩固亦不知豫為微之也又雞林賈人求市頗切自云本國宰相每以一金換一篇甚偽者宰相輒能辨別之自篇章已來未有如是流傳之廣者長慶四年樂天自杭州刺史以右庶子召還豫時刺會稽因得盡徵其文手自排纘成五十卷凡二千二百五十一首前輩多以前集中集為名豫以為陛下明年當改元長慶訖於是矣因號白氏長慶集大凡人之文各有所長樂天長可以為多矣夫諷諭之詩長於激間適之詩長於遣感傷之詩長於切五字律詩百言而上長於贍五字七字百言而下長於情賦贊針誡之類長於當碑記事制誥長於實啓奏表狀長於直書檄辭册剖判長於盡總而言之不亦多乎哉人以為稹序盡其能事居易嘗寫其文集送江州東西二林寺洛城香山聖善等寺如佛書雜傳例流行之無子以其姪孫嗣遺命不歸下邽可葬於香山如滿師塔之側家人從命而葬焉行簡字知退貞元末登進士第授祕書省校書郎元和中盧坦鎮東蜀辟為掌書記府罷歸潯陽居易授江州司馬從兄之郡十五年居易入朝為尚書郎行簡亦授左拾遺纍遷司門員外郎主客郎中長慶末振武奏水運營田使賀拔志言營田數過實詔令行簡按覆之不實志懼自刺死行簡寶曆二年冬病卒有文集二十卷行簡文筆有兄風辭賦尤稱精密文士皆師法之居易友愛過人兄弟相待如賓客行簡子龜兒多自教習以至成名當時友悌無以比焉敏中字用晦居易從父弟也祖鏻位終揚府録事參軍父季康溧陽令敏中少孤為諸兄之所訓厲長慶初登進士第佐李聽歷河東鄭滑邠寧三府節度掌書記試大理評事大和七年丁母憂退居下邽會昌初為殿中侍御史分司東都尋除戶部員外郎還京武宗皇帝素聞居易之名及即位欲徵用之宰相李德裕言居易衰病不任朝謁因言從弟敏中辭藝類居易即日知制誥召入翰林充學士遷中書舍人纍至兵部侍郎學士承旨會昌末同平章事兼刑部尚書集賢史館大學士宣宗即位加右僕射金紫光祿大夫太清宮使太原郡開國公食邑二千戶及李德裕再貶嶺南敏中居四輔之首雷同毀譽無一言伸理物論罪之五年罷相檢校司空出為邠州刺史邠寧節度招撫黨項都制置等使七年進位特進成都尹劍南西川節度副大使知節度等事十一年二月檢校司徒平章事江陵尹荊南節度使懿宗即位徵拜司徒門下侍郎平章事復輔政尋加侍中三年罷相為河中尹河中晉絳節度使纍遷中書令太子太師致仕卒史臣曰舉才選士之法尚矣自漢策賢良隋加詩賦罷中正之法委銓舉之司由是爭務雕蟲罕趨函丈矯首皆希於屈宋駕肩並擬於風騷或侔針闕之篇或效補亡之句咸欲錙銖採葛粳粃懷沙較麗藻於碧雞鬬新奇於白鳳暨編之簡牘播在管絃未逃季緒之詆訶孰望子虛之稱賞逮今千載不乏辭人統論六義之源較其三變之體如二班者蓋寡類七子者幾何至潘陸情致之文鮑謝清便之作逮於徐庾踵麗增華纂組成而耀以珠璣瑤臺構而間之金碧國初開文館高宗禮茂才虞許擅價於前蘇李馳聲於後或位升台鼎學際天人潤色之文咸布編集然而向古者傷於太僻徇華者或至不經齷齪者局於宮商放縱者流於鄭衛若品調律度揚榷古今賢不肖皆賞其文未如元白之盛也昔建安才子始定霸於曹劉永明辭宗先讓功於沈謝元和主盟微之樂天而已臣觀元之制策白之奏議極文章之壼奧盡治亂之根荄非徒謠頌之片言盤盂之小説就文觀行居易為優放心於自得之場置器於必安之地優遊卒歲不亦賢乎贊曰文章新體建安永明沈謝既往元白挺生但留金石長有莖英不習孫吳焉知用兵
