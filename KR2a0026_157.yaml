body:
  text: 舊唐書卷一百五十三列傳第一百三姚南仲劉乃子伯芻孫寬夫端夫曾孫允章附袁高段平仲薛存誠子廷老廷老子保遜保遜子昭緯盧坦姚南仲華州下邽人乾元初制科登第授太子校書歷高陵昭應萬年三縣尉遷右拾遺轉右補闕大曆十三年貞懿皇后獨孤氏崩代宗悼惜不已令於近城為陵墓冀朝夕臨望於目前南仲上疏諫曰伏聞貞懿皇后今於城東章敬寺北以起陵廟臣不知有司之請乎陛下之意乎陰陽家流希旨乎臣愚以為非所宜也謹具疏陳論伏願暫留天眷而省察焉臣聞人臣宅於家君上宅於國長安城是陛下皇居也其可穿鑿興動建陵墓於其側乎此非宜一也夫葬者藏也欲人之不得見也是以古帝前王葬后妃莫不憑丘原遠郊郭今則西臨宮闕南迫康莊若使近而可見死而復生雖在西宮待之可也如骨肉歸土魂無不之章敬之北竟何所益視之兆庶則彰溺愛垂之萬代則纍明德此非所宜二也夫帝王者居高明燭幽滯先皇所以因龍首建望春蓋為此也今若起陵目前動傷宸慮天心一傷數日不平且匹夫向隅滿堂為之不樂萬乘不樂人其可歡心乎又暇日起歌動鐘于內此地皆聞此非宜三也伏以貞懿皇后坤德合天母慈逮下陛下以切軫旒扆久俟蓍龜始諡之以貞懿終待之以褻近臣竊惑焉非所以稱述后德光被下泉也今國人皆曰貞懿皇后之陵邇於城下者主上將日省而時望焉斯有損於聖德無益於貞懿將欲寵之而反辱之此非宜四也凡此數事實玷大猷天下咸知伏惟陛下熟計而取其長也陛下方將偃武靖人一誤於此其傷實多臣恐君子是非史官褒貶大明忽虧於掩蝕至德翻後於堯舜不其惜哉今指日尚遙改卜何害抑皇情之殊眷成貞懿之美號疏奏帝甚嘉之賜緋魚袋特加五品階宣付史館與宰相常衮善衮貶官南仲坐出為海鹽縣令浙江東西道觀察使韓滉辟為推官奏授殿中侍御史內供奉充支使尋徵還歷左司兵部員外轉郎中遷御史中丞給事中同州刺史陝虢觀察使貞元十五年代李復為鄭滑節度使監軍薛盈珍恃勢奪軍政南仲數為盈珍讒毀德宗頗疑之十六年盈珍遣小使程務盈馳驛奉表誣奏南仲陰事南仲裨將曹文洽亦入奏事京師伺知盈珍表中語文洽私懷憤怒遂晨夜兼道追務盈至長樂驛及之與同舍宿中夜殺務盈沉盈珍表於廁中乃自殺日旰驛吏闢門見血流塗地旁得文洽二緘一告于南仲一表理南仲之冤且陳首殺務盈上聞其事頗駭異之南仲慮釁深遂乞入朝德宗曰盈珍擾軍政耶南仲對曰盈珍不擾軍政臣自隳陛下法耳如盈珍輩所在有之雖羊杜復生撫百姓御三軍必不能成愷悌父母之政師律善陳之制矣上默然久之授尚書右僕射貞元十九年七月終于位年七十四贈太子太保諡曰貞劉乃字永夷洺州廣平人高祖武幹武德初拜侍中即中書侍郎林甫從祖兄子也父如璠昫山丞以乃貴贈民部郎中乃少聰穎志學暗記六經日數千言及長文章清雅為當時推重天寶中舉進士尋丁父艱居喪以孝聞既終制從調選曹乃常以文部選才未為盡善遂致書於知銓舍人宋昱曰虞書稱知人則哲能官人則惠巍巍唐虞舉以為難今夫文部既始之以掄材終之以授位是則知人官人斯為重任昔在禹稷臯陶之衆聖猶曰載采有九德考績以九載近代主司獨委一二小冢宰察言於一幅之判觀行於一揖之內古今遲速何不侔之甚哉夫判者以狹詞短韻語有定規為體亦猶以一小冶而鼓衆金雖欲為鼎為鏞不可得也故曰判之在文至局促者夫銓者必以崇衣冠自媒耀為賢斯又士之醜行君子所病若引文公尼父登之於銓廷則雖圖書易象之大訓以判體挫之曾不及徐庾雖有至德以喋喋取之曾不若嗇夫嗚呼彼干霄蔽日誠巨樹也當求尺寸之材必後於椓杙龍吟武嘯誠希聲也若尚頰舌之感必下於蛙黽觀察之際猶不悲夫執事慮過龜策文合雅誥豈拘以瑣瑣故事曲折因循哉誠能先資以政事次徵以文學退觀其理家進察其臨節則厖鴻深沉之事亦可以窺其門戶矣其載補剡縣尉改會稽尉宣州觀察使殷日用奏為判官宣慰使李季卿又以表薦連授大理評事兼監察御史轉運使劉晏奏令巡覆江西多所蠲免改殿中侍御史檢校倉部員外民部郎中並充浙西留後佐晏徵賦頗有裨益晏甚任之大曆十二年元載既誅以乃久在職召拜司門員外郎十四年崔祐甫秉政素與乃友善會加郭子儀尚父以册禮久廢至是復行之祐甫令兩省官撰册文未稱旨召乃至閣草之立就詞義典裁祐甫歎賞久之數日擢為給事中尋遷權知兵部侍郎及楊炎盧杞為相意多醜正以故五歲不遷建中四年夏但真拜而已其冬涇師作亂駕幸奉天乃臥疾在私第賊泚遣使以甘言誘之乃稱疾篤又令其偽宰相蔣鎮自來招誘乃託瘖疾灸灼遍身鎮再至知不可劫脅乃歎息曰鎮亦嘗忝列曹郎苟不能死以至於斯寧以自辱羶腥復欲汙穢賢哲乎歔欷而退及聞輿駕再幸梁州乃自投於牀搏膺呼天因是危惙絶食數日而卒時年六十德宗還京聞乃之忠烈追贈禮部尚書子伯芻伯芻字素芝登進士第志行修謹淮南杜佑辟為從事府罷屏居吳中久之徵拜右補闕遷主客員外郎以過從友人飲噱為韋執誼密奏貶虔州掾曹復為考功員外郎裴善其應對機捷遷考功郎中集賢院學士轉給事中裴𡊟罷相為太子賓客未幾而卒李吉甫復入相與宿嫌不加贈官伯芻上疏論之贈太子少傅伯芻妻從姨也或讒於吉甫以此論奏伯芻懼亟請散地因出為虢州刺史吉甫卒裴度擢為刑部侍郎俄知吏部選事元和十年以左常侍致仕卒年六十一贈工部尚書伯芻風姿古雅涉學善談笑而動與時適論者稍薄之子寬夫登進士第歷諸府從事寶曆中入為監察御史嘗上言曰近日攝祭多差王府官僚位望既輕有乖嚴敬伏請今後攝太尉差尚書省三品已上及保傅賓詹等官如人少即令丞郎通攝之俄轉左補闕少列陳岵進注維摩經得濠州刺史寬夫與同列因對論之言岵因供奉僧進經以圖郡牧敬宗怒謂宰相曰陳岵不因僧得郡諫官安得此言須推排頭首來寬夫奏曰昨論陳岵之時不記發言前後唯握筆草狀即是微臣今論事不當臣合當罪若尋究推排恐傷事體帝嘉其引過欣然釋之寬夫弟端夫為太常博士駁韋綬諡議知名寬夫子允章煥章允章登進士第纍官至翰林學士承旨禮部侍郎咸通九年知貢舉出為鄂州觀察使檢校工部尚書後遷東都留守黃巢犯洛陽允章不能拒賊不之害坐是廢于家以疾卒袁高字公頤恕己之孫少慷慨慕名節登進士第纍辟使府有贊佐裨益之譽代宗登極徵入朝纍官至給事中御史中丞建中二年擢為京畿觀察使以論事失旨貶韶州長史復拜為給事中貞元元年德宗復用吉州長史盧杞為饒州刺史令高草詔書高執詞頭以謁宰相盧翰劉從一曰盧杞作相三年矯詐陰賊退斥忠良朋附者咳唾立至青雲睚眥者顧盼已擠溝壑傲很明德反易天常播越鑾輿瘡痍天下皆杞之為也爰免族戮雖示貶黜尋已稍遷近地若更授大郡恐失天下之望惟相公執奏之事尚可救翰從一不悅改命舍人草之詔出執之不下仍上奏曰盧杞為政窮極凶惡三軍將校願食其肉百辟卿士嫉之若讎遺補陳京趙需裴佶宇文炫盧景亮張薦等上疏論奏次日又上疏高又於正殿奏云陛下用盧杞獨秉鈞軸前後三年棄斥忠良附下罔上使陛下越在草莽皆杞之過且漢時三光失序雨旱不時皆宰相請罪小者免官大者刑戮杞罪合至死陛下好生惡殺赦杞萬死唯貶新州司馬旋復遷移今除刺史是失天下之望伏惟聖意裁擇上謂曰盧杞有不逮是朕之過復奏曰盧杞姦臣常懷詭詐非是不逮上曰朕已有赦高曰赦乃赦其罪不宜授刺史且赦文至優黎民今饒州大郡若命姦臣作牧是一州蒼生獨受其弊望引常參官顧問并擇謹厚中官令採聽於衆若億兆之人異臣之言臣當萬死於是諫官爭論於上前上良久謂曰若與盧杞刺史太優與上佐可乎曰可矣遂追饒州制翌日遣使宣慰高云朕思卿言深理切當依卿所奏太子少保韋倫太府卿張獻恭等奏袁高所奏至當高是陛下一良臣望加優異貞元二年上以關輔祿山之後百姓貧乏田疇荒穢詔諸道進耕牛待諸道觀察使各選揀牛進貢委京兆府勸課民戶勘責有地無牛百姓量其地著以牛均給之其田五十畝已下人不在給限高上疏論之聖慈所憂切在貧下有田不滿五十畝者尤是貧人請量三兩家共給牛一頭以濟農事疏奏從之尋卒於官年六十中外歎惜憲宗朝宰臣李吉甫嘗言高之忠鯁詔贈禮部尚書段平仲字秉庸武威人隋人部尚書段達六代孫也登進士第杜佑李復相繼鎮淮南皆表平仲為掌書記復移鎮華州滑州仍為從事入朝為監察御史平仲磊落尚氣節嗜酒傲言時德宗春秋高多自聽斷由是庶務壅隔事或不理中外畏上嚴察無敢言者平仲嘗謂人曰主上聰明神武臣下畏懼不言自循默耳如平仲一得召見必當大有開悟貞元十四年京師旱詔擇御史郎官各一人發廩賑恤平仲與考功員外陳歸當奉使因辭得對乃入近御座粗陳本事上察平仲意有所蓄以歸在側不言及奏事畢退平仲獨不退欲有奏啓上因兼留歸問之聲色甚厲雜以他語平仲錯愕都不得言因誤稱其名上怒叱出之平仲蒼黃又誤趨御障後歸下階連呼乃得出由是坐廢七年然亦因此名顯後除屯田膳部二員外郎東都留守判官纍拜右司郎中元和初遷諫議大夫內官吐突承璀為招討使征鎮州無功而還平仲與呂元膺抗疏論列請加黜責轉給事中自在要近朝廷有得失未嘗不論奏時人推其狷直轉尚書左丞以疾改太子左庶子卒薛存誠字資明河東人父勝能文嘗作拔河賦詞致瀏亮為時所稱存誠進士擢第纍辟使府入朝為監察御史知館驛元和初王師討劉闢郵傳多事上特令中官為館驛使存誠密表論奏以為有傷公體會諫官亦論奏上乃罷之轉殿中侍御史遷度支員外郎裴作相用為起居郎轉司動員外邢部郎中兼侍御史知雜事改兵部郎中給事中瓊林庫使奏占工徒太廣存誠以為此皆姦人竄名以避征役不可許咸陽縣尉袁儋與軍鎮相競軍人無理遂肆侵誣儋反受罰二敕繼至存誠皆執之上聞甚悅命中使嘉慰之由是擢拜御史中丞僧鑒虛者自貞元中交結權幸招懷賂遺倚中人為城社吏不敢繩會于杜黃裳家私事發連逮鑒虛下獄存誠案鞫得姦贓數十萬獄成當大辟中外權要更於上前保救上宣令釋放存誠不奉詔明日又令中使詣臺宣旨曰朕要此僧面詰之非赦之也存誠附中使奏曰鑒虛罪款已具陛下若召而赦之請先殺臣然後可取不然臣期不奉詔上嘉其有守從之鑒虛竟笞死洪州監軍高重昌誣奏信州刺史李位謀大逆追赴京師上令付仗內鞫問存誠一日三表請付位於御史臺及推案無狀位竟得雪未幾再授給事中數月中丞闕上思存誠前效謂宰相持憲無以易存誠遂復為御史中丞未視事暴卒憲宗深惜之贈刑部侍郎存誠性和易於人無所不容及當官御事即確乎不拔士友以是稱重之子廷老廷老謹正有父風而性通鋭寶曆中為右拾遺敬宗荒恣宮中造清思院新殿用銅鏡三千片黃白金薄十萬番廷老與同僚入閣奏事曰臣伏見近日除拜往往不由中書進擬或是宣出伏恐綱紀漸壞姦邪恣行敬宗厲聲曰更諫何事舒元褒對曰近日宮中修造太多上色變曰何處修造元褒不能對廷老進曰臣等職是諫官凡有所聞即合論奏莫知修造之所但見運瓦木絶多即知有用乞陛下勿罪臣言帝曰所奏已知尋加史館修撰時李逢吉秉權惡廷老言太切直鄭權因鄭注得廣州節度權至鎮盡以公家珍寶赴京師以酬恩地廷老上疏請按權罪中人由是切齒又論逢吉黨人張權輿程昔範不宜居諫列逢吉大怒廷老告滿十旬逢吉乃出廷老為臨晉縣令文宗即位入為殿中侍御史大和四年以本官充翰林學士與同職李讓夷相善廷老之入內署讓夷薦挈之廷老性放逸嗜酒不持檢操終日酣醉文宗知之不悅五年罷職守本官讓夷亦坐廷老罷職守職方員外郎廷老尋拜刑部員外郎轉郎中遷給事中開成三年卒廷老當官舉職不求虛譽侃侃於公卿之間甚有正人風望贈刑部侍郎子保遜登進士第位亦至給事中保遜子昭緯乾寧中為禮部侍郎貢舉得人文章秀麗為崔胤所惡出為磎州刺史卒盧坦字保衡河南洛陽人其先自范陽徙焉父巒贈鄭州刺史坦嘗為義成軍判官節度使李復疾篤監軍使薛盈珍慮變遽封府庫入其麾下五百人於使牙軍中恟恟坦密言於盈珍促收之及復卒坦護喪歸東都後為壽安令時河南尹徵賦限窮而縣人訴以機織未就坦請延十日府不許坦令戶人但織而輸勿顧限也違之不過罰令俸耳既成而輸坦亦坐罰由是知名纍遷至庫部員外郎兼侍御史知雜事會李錡反有司請毀錡祖父廟墓坦常為錡從事乃上言曰淮安王神通有功於草昧且古之父子兄弟罪不相及況以錡故纍五代祖乎乃不毀因賜神通墓五戶以備灑掃及武元衡為宰相以坦為中丞李元素為大夫命坦分司東都未幾歸臺裴均為僕射在班踰位坦請退之均不受坦曰姚南仲為僕射例如此均曰南仲何人坦曰南仲是守正而不交權幸者也尋罷為右庶子時人歸咎於均旬月出為宣歙池觀察使三年入為刑部侍郎鹽鐵轉運使改戶部侍郎判度支元和八年西受降城為河徙浸毀宰相李吉甫請移兵於天德故城坦與李絳叶議以為西城張仁願所築制胸奴上策城當磧口居虜要衝美水豐草邊防所利今河流之決不過退就二三里奈何捨萬代永安之策徇一時省費之謀況天德故城僻處確瘠其北枕山與河絶遠烽候警備不相統接虜之唐突勢無由知是無故而蹙國二百里非所利也及城使周懷義奏利害與坦議同事竟不行末幾出為劍南東川節度使在鎮纍年後請收閏月軍吏糧料以助軍行營人多非之元和十二年九月卒年六十九贈禮部尚書史臣曰古之諍臣有死於言者其次引裾折檻不改其操亦難矣哉袁高之執盧杞存誠之戮鑒虛有古人之遺風焉平仲觸鱗之氣糾其謬歟文洽奪章以攄府憤永夷絶食不飲盜泉節義之士也南仲非葬之言盧坦西城之議量之深也如數子道為時無君子乃是厚誣贊曰靈草指佞諫臣匡失惟袁與薛人中屈軼寬夫雀躍廷老鴻軒姚盧啓奏君子之言
