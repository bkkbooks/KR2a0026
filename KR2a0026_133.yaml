body:
  text: 舊唐書卷一百二十九列傳第七十九韓滉子臯弟洄張延賞子弘靖弘靖子文規次宗韓滉字太沖太子少師休之子也少貞介好學以蔭解褐左威衛騎曹參軍出為同官主簿至德初青齊節度鄧景山辟為判官授監察御史兼北海郡司馬以道路阻絶因避地山南採訪使李承昭奏充判官授通州長史彭王府咨議參軍鄧景山移鎮淮南又表為賓佐未行除殿中侍御中追赴京師先是滉兄法知制誥草王璵拜官之詞不加虛美璵頗銜之及其秉政諸使奏滉兄弟者必以冗官授之璵免相羣議稱其屈纍遷至祠部考功吏部三員外郎滉公潔強直明於吏道判南曹凡五年詳究簿書無遺纖隱大曆中改吏部郎中給事中時盜殺富平令韋當縣吏捕獲賊黨而名隸北軍監軍魚朝恩以有武材請詔原其罪滉密疏駁奏賊遂伏辜遷尚書右丞五年知兵部選六年改戶部侍郎判度支自至德乾元已後所在軍興賦稅無度帑藏給納多務因循滉既掌司計清勤檢轄不容姦妄下吏及四方行綱過犯者必痛繩之又屬大曆五年已後蕃戎罕侵連歲豐稔故滉能儲積穀帛帑藏稍實然苛剋頗甚覆治案牘勾剝深文人多咨怨大曆十二年秋霖雨害稼京兆尹黎幹奏畿縣損田滉執云幹奏不實乃命御史巡覆回奏諸縣凡損三萬一千一百九十五頃時渭南令劉藻曲附滉言所部無損白于府及戶部分巡御史趙計復檢行奏與藻合代宗覽奏以為水旱咸均不宜渭南獨免申命御史朱敖再檢渭南損田三千餘頃上謂敖曰縣令職在字人不損猶宜稱損損而不問豈有恤隱之意耶卿之此行可謂稱職下有司訊鞫藻計皆伏罪藻貶萬州南浦員外尉計貶豐州員外司戶滉弄權樹黨皆此類也俄改太常卿議未息又出為晉州刺史數月拜蘇州刺史浙江東西都團練觀察使尋加檢校禮部尚書兼御史大夫潤州刺史鎮海軍節度使滉既移鎮安輯百姓均其租稅未及踰年境內稱理及建中年冬涇師之亂德宗出幸河汴騷然滉訓練士卒鍛礪戈甲稱為精徑李希烈既陷汴州滉乃擇其鋭卒令裨將李長榮王栖曜與宣武節度劉玄佐掎角討襲解寧陵之圍復宋汴之路滉功居多然自關中多難滉即於所部閉關梁築石頭五城自京口至玉山禁馬牛出境造樓船戰艦三十餘艘以舟師五千人由海門揚威武至申浦而還毀撤上元縣佛寺道觀四十餘所修塢壁建業抵京峴樓雉相屬以佛殿材於石頭城繕置館第數十時滉以國家多難恐有永嘉渡江之事以為備預以迎鑾駕亦申警自守也城中穿深井十丈近百所下與江平俾偏將丘涔督其役涔酷虐士卒日役千人朝令夕辦去城數十里內先賢丘墓多令毀廢明年正月追李長榮等戍軍還以其所親吏盧復為宣州刺史采石軍使增營壘教習長兵以佛寺銅鐘鑄弩牙兵器陳少遊時鎮揚州以甲士三千人臨江大閲滉亦以兵三千人臨金山與少遊相應樓船於江中以金銀繒綵互相聘賚而自德宗出居及歸京師軍用既繁道路又阻關中飢饉加之以災蝗江南兩浙轉輸粟帛府無虛月朝廷賴焉興元元年就加檢校吏部尚書數月又加檢校右僕射貞元元年七月拜檢校左僕射同平章事使並如故二年春特封晉國公其年十一月來朝京師時右丞元琇判度支以關輔旱儉請運江淮租米以給京師上以滉浙江東西節度素著威名加江淮轉運使欲令專督運務琇以滉性剛愎難與集事乃條奏滉督運江南米至揚子凡一十八里揚子以北皆元琇主之滉深怒於琇琇以京師錢重貨輕切疾之乃於江東監院收獲見錢四十餘萬貫令轉送入關滉不許乃誣奏云運千錢至京師費錢至萬於國有害請罷之上以問琇琇奏曰一千之重約與一斗米均自江南水路至京一千之所運費三百耳豈至萬乎上然之遣中使齎手詔令運錢滉堅執以為不可其年十二月加滉度支諸道轉運鹽鐵等使遂逞宿怒纍誣奏琇貶雷州司戶其責既重舉朝以為非罪多竊議者尚書左丞董晉謂宰臣劉滋齊映曰元左丞忽有貶責未知罪名用刑一濫誰不危懼假有權臣騁志相公何不奏請三司詳斷之去年關輔用兵時方蝗旱琇總國計夙夜憂勤以贍給師旅不增一賦軍國皆濟斯可謂之勞臣也今見播逐恐失人心人心一搖則有聞雞起舞者矣竊為相公痛惜之滋映但引過而已給事袁高又抗疏申理之滉誣以朋黨寢而不行時兩河罷兵中土寧乂滉上言吐蕃盜有河湟為日已久大曆已前中國多難所以肆其侵軼臣聞其近歲已來兵衆寖弱西迫大食之強北病回紇之衆東有南詔之防計其分鎮之外戰兵在河隴五六萬而已國家第令三數良將長驅十萬衆於涼鄯洮渭並修堅城各置二萬人足當守禦之要臣請以當道所貯蓄財賦為饋運之資以充三年之費然後營田積粟且耕且戰收復河隴二十餘州可翹足而待也上甚納其言滉之入朝也路由汴州厚結劉玄佐將薦其可任邊事玄佐納其賂因許之及來覲上訪問焉初頗稟命及滉以疾歸第玄佐意怠遂辭邊任盛陳犬戎未衰不可輕進滉貞元三年二月以疾薨遂寢其事年六十五上震悼久之廢朝三日贈太傅賻布帛米粟有差滉宰相子幼有美名其所結交皆時之俊彥非公直者不與之親密性持節儉志在奉公衣裘茵袵十年一易居處陋薄才蔽風雨弟洄常於里宅增修廊宇滉自江南至即命撤去之曰先公容焉吾輩奉之常恐失墜所有摧圮葺之則已豈敢改作以傷儉德自居重位愈清儉嫉惡彌縫闕漏知無不為家人資産未嘗在意入仕之初以至卿相凡四十年相繼乘馬五匹皆及敝帷尤工書兼善丹青以繪事非急務自晦其能未嘗傳之好易象及春秋著春秋通例及天文事序議各一卷然以前輩早達稍薄後進晚歲至京師丞郎卿佐接之頗倨衆不能平其在浙右也政令明察末年傷於嚴急巡內婺州傍縣有犯其令者誅及鄰伍死者數十百人又俾推覆官分察境內情涉疑似必置極法誅殺殘忍一判即剿數十人且無虛日雖令行禁止而冤濫相尋議者以滉統制一方頗著勤績自幼立名貞廉晚途政甚苛慘身未達則飾情以進得其志則本質遂彰子羣臯羣官至考功員外郎臯字仲聞夙負令名而器質重厚有大臣之度由雲陽尉擢賢良科拜右拾遺轉左補闕纍遷起居郎考功員外郎俄丁父艱德宗遣中人就第慰問仍宣令論撰滉之事業臯號泣承命立草數千言德宗嘉之及免喪執政者擬考功郎中御筆加知制誥遷中書舍人御史中丞尚書右丞兵部侍郎皆稱職改京兆尹奏鄭鋒為倉曹轉掌錢穀鋒苛刻剝下為事人皆咨怨又勸臯搜索府中雜錢折糴百姓粟麥等三十萬石進奉以圖恩寵臯納其計尋奏鋒為興平縣令及貞元十四年春夏大旱粟麥枯稿畿內百姓纍經臯陳訴以府中倉庫虛竭憂迫惶惑不敢實奏會唐安公主女出適右庶子李訴內官中使於訴家往來百姓遮道投狀內官繼以事上聞德宗下詔曰京邑為四方之則長吏受親人之寄實繫邦本以分朕憂苟非其才是紊於理正議大夫守京兆尹賜紫金魚袋韓臯比踐清貫頗聞謹恪委之尹正冀效公忠乃者邦畿之間粟麥不稔朕念茲黎庶方議蠲除自宜悉心以副勤恤臯奏報失實處理無方致令閭井不安囂然上訴及令覆視皆涉虛詞壅蔽頗深罔惑斯甚宜加懲誡以勗守官可撫州司馬員外置同正員馳驛發遣鋒亦尋出為汀州司馬臯無幾移杭州刺史復拜尚書右丞臯恃前輩頗以簡倨自處順宗時王叔文黨盛臯嫉之謂人曰吾不能事新貴臯從弟曄幸於叔文以告之因出為鄂州刺史嶽鄂蘄沔等州觀察使入為東都留守元和八年六月加檢校吏部尚書兼許州刺史充忠武軍節度等使以陳許二州水潦之後賜臯綾絹布葛十萬端匹以助軍資宴賞所理以簡儉稱入為吏部尚書兼太子少傅判太常卿事元和十一年三月皇太后王氏崩以臯充大明宮使十五年閏正月充憲宗山陵禮儀使三月穆宗以師保之書加儉校右僕射十二月以銓司考科目人失實與刑部侍郎知選事李建罰一月俸料長慶元年正月正拜尚書右僕射二年四月轉左僕射赴尚書省上事命中使宣賜酒饌及宰臣百僚送上皆如近式其年以本官東都留守行及戲源驛暴卒年七十九贈太子太保大和元年諡曰貞臯生知音律嘗觀彈琴至止息歎曰妙哉嵇生之為是曲也其當晉魏之際乎其音主商商為秋聲秋也者天將搖落肅殺其歲之晏乎又晉乘金運商金聲此所以知魏之季而晉將代也慢其商絃與宮同音是臣奪君之義也所以知司馬氏之將篡也司馬懿受魏明帝顧託後嗣反有篡奪之心自誅曹爽逆節彌露王陵都督揚州謀立荊王彪毋丘儉文欽諸葛誕前後相繼為揚州都督咸有匡復魏室之謀皆為懿父子所殺叔夜以揚州故廣陵之地彼四人者皆魏室文武大臣咸敗散於廣陵散言魏氏散亡自廣陵始也止息者晉雖暴興終止息於此也其哀憤躁蹙憯痛迫脅之旨盡在於是矣永嘉之亂其應乎叔夜撰此將貽後代之知音者且避晉魏之禍所以託之神鬼也洄以蔭緒受任劉晏判鹽鐵度支辟為屬吏纍官至諫議大夫知制誥與元載善載誅以纍貶邵州司戶同正員建中元年二月復諫議大夫先以劉晏兼領度支晏既罷黜令天下錢穀各歸尚書省本司廢職罷事久無綱記徒收其名而莫綜其任國用出入未有所統故轉洄戶部侍郎判度支洄上言江淮七監歲鑄錢四萬五千貫輸于京師度工用轉送之費每貫計錢二千是本倍利也今商州有紅崖冶出銅益多又有洛源監久廢不理請增工鑿山以取銅興洛源故監置十爐鑄之歲計出錢七萬二千貫度工用轉送之費貫計錢九百則利浮本矣其江淮七監請皆罷之復以天下銅鐵之冶是曰山澤之利當歸於王者非諸侯方嶽所有今諸道節度都團練使皆占之非宜也請總隸鹽鐵使皆從之洄與楊炎善炎得罪常不自安無何兄子臯抗疏理炎罪德宗意洄令為之尋貶蜀州刺史興元元年三月入為兵部侍郎六月為京兆尹七月加御史大夫貞元二年正月刑部侍郎劉太真黨於宰相盧嵵得罪以洄代太真為刑部侍郎尋復兵部侍郎貞元七年十一月為國子祭酒張延賞中書令嘉貞之子幼孤本名寶符開元末玄宗召見賜名延賞取賞延於世之義特授左司禦率府兵曹參軍博涉經史達於政事侍中韓國公苗晉卿見而奇之以女妻焉肅宗在鳳翔擢拜監察御史賜緋魚袋轉殿中侍御史關內節度使王思禮請為從事思禮領河東又為太原少尹兼行軍司馬北都副留守代宗幸陝除給事中轉御史中丞中書舍人大曆二年拜河南尹充諸道營田副使河洛久當兵衝閭井兵墟延賞勤身率下政尚簡約疏導河渠修築宮廟數年間流庸歸附邦畿復完詔書褒美焉時罷河南淮西山南副元帥以其兵鎮東都延賞權知東都留守以領之理行第一入朝拜御史大夫初上封人李少良潛以元載陰事聞載黨知之奏少良狂妄下御史臺訊鞫欲有所屬延賞不承其意尋出為揚州刺史淮南節度觀察等使屬歲旱歉人有亡去他境者吏或拘之延賞曰夫食人之所恃而生也此居而坐斃適彼而可生得存吾人又何限於彼也乃具舟楫而遣之俾吏修其廬室已其逋債而歸者增於其舊邊江之瓜洲舟航湊會而懸屬江南延賞奏請以江為界人甚為便尋以母憂去職終制授檢校禮部尚書江陵尹兼御史大夫荊南節度觀察使數年改檢校兵部尚書成都尹劍南西川節度觀察使依前兼御史大夫尋就加吏部尚書建中四年十一月部將西山兵馬使張朏以兵入成都為亂延賞奔漢州鹿頭戍將叱干遂等討之其月斬朏及同惡者復歸成都先是兵革屢擾自天寶末楊國忠用事南蠻三蜀疲弊屬車駕遷幸其後郭英乂淫崔寧之室遂縱崔寧楊琳交亂及崔寧得志復極侈靡故蜀土殘弊蕩然無制度延賞薄賦約事動遵法度僅至庶富焉建中末駕在山南延賞貢奉供億頗竭忠力焉駕在梁州倚劍南蜀川為根本貞元元年以宰相劉從一有疾詔徵延賞為中書侍郎同中書門下平章事與鳳翔節度使李晟不協晟表論延賞過惡德宗重違晟意延賞至興元改授左僕射初大曆末吐蕃寇劍南李晟領神策軍戍之及旋師以成都官妓高氏歸延賞聞而大怒即使將吏令追還焉晟頗銜之形於詞色三年正月晟入朝詔晟與延賞釋憾德宗注意於延賞將用之會浙西觀察使韓滉來朝嘗有德於晟因會宴説晟使釋憾遂同飲極歡且請晟表薦為相晟然之於是復加同中書門下平章事及延賞當國用事晟請一子聘其女固情好焉延賞拒而不許晟謂人曰武人性快若釋舊惡於杯酒之間終歡可解文士難犯雖修睦於外而蓄怒于內今不許婚釁未忘也得無懼焉無幾延賞果謀罷晟兵權初吐蕃尚結贊興兵入隴州抵鳳翔無所虜掠且曰召我來何不持牛酒勞軍徐乃引去持是以間晟晟令牙將王佖選鋭兵三千設伏汧陽大敗吐蕃結贊僅免自是數遣使乞和晟朝於京師奏曰戎狄無信不可許宰相韓滉又扶晟議請調軍食以繼之上意將帥生事邀功會滉卒延賞揣上意遂行其志奏令給事中鄭雲逵代之上不許且曰晟有社稷之功令自舉代己者於是始用邢君牙焉拜晟太尉兼中書令奉朝請而已是年五月吐蕃果背約以劫渾瑊及册晟太尉故事臨軒册拜三公中書令讀册侍中奉禮如闕即以宰相攝之延賞欲輕其禮始令兵部尚書崔漢衡攝中書令讀册時議非之延賞奏議請省官員曰為政之本必先命官舊制官員繁而且費州縣殘破職此之由臣在荊南劍南所管州縣闕官員者少不下十數年吏部未嘗補授但令一官假攝公事亦理以此言之員可減無疑也請減官員收其祿俸資幕職戰士俾劉玄佐復河湟軍用不乏矣上然之初韓滉入朝至汴州厚結劉玄佐將薦其可委邊任玄佐亦欲自效初稟命及滉卒玄佐以疾辭上遣中官勞問臥以受命延賞知不可用奏用李抱真抱真亦辭不行時抱真判官陳曇奏事京師延賞俾曇勸抱真竟拒絶之蓋以延賞挾怨罷李晟兵柄由是武臣不附自建議減員之後物議不平延賞懼量留其官下詔曰諸州府停減及所留官並合釐務其中有先考滿及充職掌遇停減或恐公務有闕宜委長吏於合停官中取考淺人清白幹舉者留填闕官差攝訖聞奏但取才堪不限資序如當州官少任以鄰州官充其州縣諸色部送準舊例以當州官及本土寄客有資産幹了者差遣及減員人衆道路怨歎日聞於上侍中馬燧奏減員太甚恐不可行太子少保韋倫及常參官等各抗疏以減員招怨並請復之浙西觀察使白志貞亦以疏論時延賞疾甚在私第李泌初為相採於羣情由是官員悉復貞元三年七月薨年六十一廢朝三日贈太保賻禮加等諡曰成肅子弘靖字元理雅厚信直少以門蔭授河南府參軍調補藍田尉東都留守杜亞辟為從事奏改監察御史𩹉行轉殿中侍御史內供奉留守將令狐運逐賊出郊其日有劫轉運絹於道者亞以運豪家子意其為之乃令判官穆員及弘靖同鞫其事員與弘靖皆以運職在牙門必不為盜堅請不按亞不聽遂以獄聞仍斥員及弘靖出幕府有詔令三司使雜治之後果於河南界得賊無何德陽公主下嫁治第將侵弘靖家廟弘靖拜表陳情具述祖考之德德宗慰撫之不令毀廟又獻賦美二京之制德宗嘉其文擢授監察御史轉殿中侍御史禮部員外郎遷兵部郎中知制誥中書舍人知東都選事拜工部侍郎轉戶部侍郎陝州觀察河中節度使拜刑部尚書同中書門下平章事吳少陽死其子元濟擅主留務憲宗怒欲下詔誅之弘靖請先命弔贈使待其不恭然後加兵憲宗從其議尋加中書侍郎平章事盜殺宰相武元衡京師索賊未得時王承宗邸中有鎮卒張晏輩數人行止無狀人多意之詔録付御史陳中師按之皆附致其罪如京中所説弘靖疑其不直驟於上前言之憲宗不聽竟殺張晏輩及田弘正入鄆按簿書亦有殺元衡者但事曖昧互有所説卒未得其實又殺張晏後憲宗欲遂伐承宗弘靖以為戎事並興鮮有濟者不若併攻元濟待淮西平然後悉師河朔憲宗業已北討不為之止然亦重違其言弘靖知終不聽用遂自陳乞罷政事俄檢校吏部尚書同中書門下平章事充太原節度使行未及鎮果下詔誅承宗弘靖以驟諫不行宜用自效大閲軍實請躬討承宗詔許出軍不許自往俄而魏博澤潞悉為承宗所敗有詔賞其前言弘靖即間道發使懇喻承宗承宗因亦款附旋徵拜吏部尚書遷檢校右僕射宣武軍節度使時韓弘入覲之後也弘靖用政寬緩代弘之理俄以劉總纍求歸闕且請弘靖代己制加檢校司空平章事充幽州盧龍等軍節度使弘靖之入幽州也薊人無老幼男女皆夾道而觀焉河朔軍帥冒寒暑多與士卒同無張蓋安輿之別弘靖久富貴又不知風土入燕之時肩輿於三軍之中薊人頗駭之弘靖以祿山思明之亂始自幽州欲於事初盡革其俗乃發祿山墓毀其棺柩人尤失望從事有韋雍張宗厚數輩復輕肆嗜酒常夜飲醉歸燭火滿街前後呵叱薊人所不習之事又雍等詬責吏卒多以反虜名之謂軍士曰今天下無事汝輩挽得兩石力弓不如識一丁字軍中以意氣自負深恨之劉總歸朝以錢一百萬貫賜軍士弘靖留二十萬貫充軍府雜用薊人不勝其憤遂相率以叛囚弘靖於薊門館執韋雍張宗厚輩數人皆殺之續有張徹者自遠使回軍人以其無過不欲加害將引置館中徹不知其心遂索弘靖所在大罵軍人亦為亂兵所殺明日吏卒稍稍自悔悉詣館請弘靖為帥願改心事之凡三請弘靖卒不對軍人乃相謂曰相公無言是不赦吾曹必矣軍中豈可一日無帥遂取朱洄為兵馬留後朝廷既除洄子克融為幽州節度使乃貶弘靖為撫州刺史未幾遷太子賓客少保少師長慶四年六月卒年六十五元和初王承宗阻兵劉總父濟備陳征討之術請身先之及出軍纍拔城邑總既繼父願述先志且欲盡更河朔舊風長慶初纍表求入朝兼請分割所理之地然後歸朝其意欲以幽涿營州一道請弘靖理之瀛州為一道盧士玫理之平薊媯檀為一道請薛平理之仍籍軍中宿將盡薦於闕下因望朝廷升奬使幽薊之人皆有希美爵祿之意及疏上穆宗且欲速得范陽宰臣崔植杜元穎又不為遠大經略但欲重弘靖所授而省其事局唯瀛莫兩州許置觀察使其他郡縣悉命弘靖統之時總所薦將校俱在京師旅舍中久而不問朱克融輩僅至假衣丐食日詣中書求官不勝其困及除弘靖命悉還本軍克融輩雖得復歸皆深懷觖望其後因為叛亂初總以平薊媯檀請薛平於分裂之中尤為上策而朝廷不能行之竟致後患人到于今惜之子文規景初嗣慶次宗文規歷拾遺補闕吏部員外郎開成三年十一月右丞韋溫彈劾文規長慶中父弘靖陷在幽州文規徘徊京師不尋赴難不宜塵汙南宮乃出為安州刺史纍遷右散騎常侍兼御史中丞桂管都防禦觀察使景初歷職使府官止殿中侍御史嗣慶位終河南少尹次宗最有文學稽古履行開成中為起居舍人文宗復故事每入閣左右史執筆立于螭頭之下宰相奏事得以備録宰臣既退上召左右史更質證所奏是非故開成政事詳於史氏次宗尤稱奉職改禮部員外郎以兄文規為韋溫不放入省出官次宗堅辭省秩改國子博士兼史館修撰出為舒州刺史卒文規子彥遠大中初由左補闕為尚書祠部員外郎景初子天保嗣慶子彥修次宗子曼容延賞東都舊第在思順里亭館之麗甲於都城子孫五代無所加工時號三相張氏云史臣曰君民足則國富將相和則國安反是道焉非得人者滉殺元琇奏瑞鹽逞斡運之能非貞純之士刻下罔上以為己功幸逢多事之朝例在姑息之地幸而獲免餘無可稱延賞以私害公罷李晟兵柄使武臣不陳其力矣惡直醜正擠柳渾相位致賢者不進其才矣象恭僝功皆四凶之迹也雖以蔭繼世以才進身蹈非道者實小人哉延賞歷典名藩皆稱善政及登大位乃彰飾情臯迭處大僚徒稱舊德弘靖輕傲邊事欺減軍資洄附元載楊炎繼及纍貶俱非守正中立者也書云世祿之家鮮克由禮不其是歟贊曰韓滉刻下延賞害公臯洄繼世弘靖興戎
