body:
  text: 舊唐書卷六十一列傳第十一溫大雅子無隱大雅弟彥博子振挺大雅弟大有陳叔達竇威子惲兄子軌軌子奉節軌弟琮威從兄子抗抗子衍靜靜子逵抗第三子誕誕子孝慈孝慈子希玠誕少子孝諶抗季弟璡溫大雅字彥弘太原祁人也父君悠北齊文林館學士隋泗州司馬大業末為司隸從事見隋政日亂謝病而歸大雅性至孝少好學以才辯知名仕隋東宮學士長安縣尉以父憂去職後以天下方亂不求仕進高祖鎮太原甚禮之義兵起引為大將軍府記室參軍專掌文翰禪代之際與司錄竇威主簿陳叔達參定禮儀武德元年歷遷黃門侍郎弟彥博為中書侍郎對居近密議者榮之高祖從容謂曰我起義晉陽為卿一門耳尋轉工部進拜陝東道大行臺工部尚書太宗以隱太子巢剌王之故令大雅鎮洛陽以俟變大雅數陳祕策甚蒙嘉賞太宗即位累轉禮部尚書封黎國公大雅將改葬其祖父筮者曰葬於此地害兄而福弟大雅曰若得家弟永康我將含笑入地葬訖歲餘而卒諡曰孝撰創業起居注三卷永徽五年贈尚書右僕射子無隱官至工部侍郎大雅弟彥博彥博幼聰悟有口辯涉獵書記初其父友薛道衡李綱常見彥博兄弟三人咸歎異曰皆卿相才也開皇末為州牧秦孝王俊所薦授文林郎直內史省轉通直謁者及隋亂幽州總管羅藝引為司馬藝以幽州歸國彥博贊成其事授幽州總管府長史未幾徵為中書舍人俄遷中書侍郎封西河郡公時高麗遣使貢方物高祖謂羣臣曰名實之間理須相副高麗稱臣於隋終拒煬帝此亦何臣之有朕敬於萬物不欲驕貴但據土宇務共安人何必令其稱臣以自尊大可即為詔述朕此懷也彥博進曰遼東之地周為箕子之國漢家之玄菟郡耳魏晉已前近在提封之內不可許以不臣若與高麗抗禮則四夷何以瞻仰且中國之於夷狄猶太陽之比列星理無降尊俯同夷貊高祖乃止其年突厥入寇命右衞大將軍張瑾為并州道行軍總管出拒之以彥博為行軍長史與虜戰於太谷軍敗彥博沒於虜庭突厥以其近臣苦問以國家虛實及兵馬多少彥博固不肯言頡利怒遷於陰山苦寒之地太宗即位突厥送款始徵彥博還朝授雍州治中尋檢校吏部侍郎彥博意有沙汰多所損抑而退者不伏囂訟盈庭彥博惟騁辭辯與之相詰終日諠擾頗為識者所嗤復拜中書侍郎兼太子右庶子貞觀二年遷御史大夫仍檢校中書侍郎事彥博善於宣吐每奉使入朝詔問四方風俗承受綸言有若成誦聲韻高朗響溢殿庭進止雍容觀者拭目四年遷中書令進爵虞國公高祖常宴朝臣詔太宗諭旨既而顧謂近臣曰何如溫彥博其見重如此初突厥之降也詔議安邊之術朝士多言突厥恃強擾亂中國為日久矣今天實喪之窮來歸我本非慕義之心也因其歸命分其種落俘之河南散屬州縣各使耕田變其風俗百萬胡虜可得化而為漢則中國有加戶之利塞北常空矣惟彥博議曰漢建武時置降匈奴於五原塞下全其部落得為捍蔽又不離其土俗因而撫之一則實空虛之地二則示無猜之心若遣向西南則乖物性故非含育之道也太宗從之遂處降人于朔方之地其入居長安者近且萬家議者尤為不便欲建突厥國於河外彥博又執奏曰既已納之無故遣去深為可惜與魏徵等爭論數年不決十年遷尚書右僕射明年薨年六十四彥博自掌知機務即杜絕賓客國之利害知無不言太宗以是嘉之及薨謂侍臣曰彥博以憂國之故勞精竭神我見其不逮已二年矣恨不縱其閒逸致夭性靈彥博家無正寢及卒之日殯於別室太宗命有司為造堂焉贈特進諡曰恭陪葬昭陵子振少有雅望官至太子舍人居喪以毀卒振弟挺尚高祖女千金公主官至延州刺史大雅弟大有字彥將性端謹少以學行稱隋仁壽中尚書右丞李綱表薦之授羽騎尉尋丁憂去職歸鄉里義旗初舉高祖引為太原令從太宗擊西河高祖謂曰士馬尚少要資經略以卿參謀軍事其善建功名也事之成敗當以此行卜之若克西河帝業成矣及破西河而還復以本官攝大將軍府記室與兄大雅共掌機密大有以昆季同在機務意不自安固請他職高祖曰我虛心相待不以為疑卿何自疑也大有雖應命然每退讓遠避機權僚列以此多之武德元年累轉中書侍郎會卒高祖甚傷惜之贈鴻臚卿初大雅在隋與顏思魯俱在東宮彥博與思魯弟愍楚同直內史省彥將與愍楚弟遊秦典校祕閣二家兄弟各為一時人物之選少時學業顏氏為優其後職位溫氏為盛陳叔達字子聰陳宣帝第十六子也善容止頗有才學在陳封義陽王年十餘歲嘗侍宴賦詩十韻援筆便就僕射徐陵甚奇之歷侍中丹陽尹都官尚書入隋久不得調大業中拜內史舍人出為絳郡通守義師至絳郡叔達以郡歸款授丞相府主簿封漢東郡公與記室溫大雅同掌機密軍書赦令及禪代文誥多叔達所為武德元年授黃門侍郎二年兼納言四年拜侍中叔達明辯善容止每有敷奏搢紳莫不屬目江南名士薄遊長安者多為薦拔五年進封江國公嘗賜食於御前得蒲萄執而不食高祖問其故對曰臣母患口求之不能致欲歸以遺母高祖喟然流涕曰卿有母可遺乎因賜物百段貞觀初加授光祿大夫尋坐與蕭瑀對御忿爭免官未幾丁母憂叔達先有疾太宗慮其危殆遣使禁絕弔賓服闋授遂州都督以疾不行久之拜禮部尚書建成元吉嫉害太宗陰行譖毀高祖惑其言將有貶責叔達固諫乃止至是太宗勞之曰武德時危難潛構知公有讜言今之此拜有以相答叔達謝曰此不獨為陛下社稷計耳後坐閨庭不理為憲司所劾朝廷惜其名臣不欲彰其罪聽以散秩歸第九年卒諡曰繆後贈戶部尚書改諡曰忠有集十五卷竇威字文蔚扶風平陵人太穆皇后從父兄也父熾隋太傅威家世勳貴諸昆弟並尚武藝而威躭玩文史介然自守諸兄哂之謂為書癡隋內史令李德林舉秀異射策甲科拜祕書郎秩滿當遷而固守不調在祕書十餘歲其學業益廣時諸兄並以軍功致仕通顯交結豪貴賓客盈門而威職掌閒散諸兄更謂威曰昔孔丘積學成聖猶狼狽當時栖遲若此汝效此道復欲何求名位不達固其宜矣威笑而不答久之蜀王秀辟為記室以秀行事多不法稱疾還田里及秀廢黜府僚多獲罪唯威以先見保全大業四年累遷內史舍人以數陳得失忤旨轉考功郎中後坐事免歸京師高祖入關召補大丞相府司錄參軍時軍旅草創五禮曠墜威既博物多識舊儀朝章國典皆其所定禪代文翰多參預焉高祖常謂裴寂曰叔孫通不能加也武德元年拜內史令威奏議雍容多引古為諭高祖甚親重之或引入臥內常為膝席又嘗謂曰昔周朝有八柱國之貴吾與公家咸登此職今我已為天子公為內史令本同末異乃不平矣威謝曰臣家昔在漢朝再為外戚至於後魏三處外家陛下龍興復出皇后臣又階緣戚里位忝鳳池自惟叨濫曉夕兢懼高祖笑曰比見關東人與崔盧為婚猶自矜伐公代為帝戚不亦貴乎及寢疾高祖自往臨問尋卒家無餘財遺令薄葬諡曰靖贈同州刺史追封延安郡公葬日詔太子及百官並出臨送有文集十卷子惲嗣官至岐州刺史威兄子軌從兄子抗並知名軌字士則周雍州牧酇國公恭之子也隋大業中為資陽郡東曹掾後去官歸于家義兵起軌聚衆千餘人迎謁於長春宮高祖見之大悅降席握手語及平生賜良馬十匹使掠地渭南軌先下永豐倉收兵得五千人從平京城封贊皇縣公拜大丞相諮議參軍時稽胡賊五萬餘人掠宜君軌討之行次黃欽山與賊相遇賊乘高縱火王師稍却軌斬其部將十四人拔隊中小帥以代之軌自率數百騎殿於軍後令之曰聞鼓聲有不進者自後斬之既聞鼓士卒爭先赴敵賊射之不能止因大破之斬首千餘級虜男女二萬口武德元年授太子詹事會赤排羌作亂與薛舉叛將鍾俱仇同寇漢中拜軌秦州總管與賊連戰皆捷餘黨悉降進封酇國公三年遷益州道行臺左僕射許以便宜從事屬党項寇松州詔軌援之又令扶州刺史蔣善合與軌連勢時党項引吐谷渾之衆其鋒甚銳軌師未至善合先期至鉗川遇賊力戰走之軌復軍於臨洮進擊左封破其部衆尋令率所部兵從太宗討王世充于洛陽四年還益州時蜀土寇往往聚結悉討平之軌每臨戎對寇或經旬月身不解甲其部衆無貴賤少長不恭命即立斬之每日吏士多被鞭撻流血滿庭見者莫不重足股慄軌初入蜀將其甥以為心腹嘗夜出呼之不以時至怒而斬之每誡家僮不得出外嘗遣奴就官廚取漿而悔之謂奴曰我誠使汝要當斬汝頭以明法耳遣其部將收奴斬之其奴稱冤監刑者猶豫未決軌怒俱斬之行臺郎中趙弘安知名士也軌動輒榜箠歲至數百後徵入朝賜坐御榻軌容儀不肅又坐而對詔高祖大怒因謂曰公之入蜀車騎驃騎從者二十人為公所斬略盡我隴種車騎未足給公詔下獄俄而釋之還鎮益州軌與行臺尚書韋雲起郭行方素不協及隱太子誅有詔下益州軌藏諸懷中雲起問曰詔書安在軌不之示但曰卿欲反矣執而殺之行方大懼奔于京師軌追斬不及是歲行臺廢即授益州大都督加食邑六百戶貞觀元年徵授右衞大將軍二年出為洛州都督洛陽因隋末喪亂人多浮偽軌並遣務農各令屬縣有遊手怠惰者皆按之由是人吏懾憚風化整肅四年卒官贈并州都督子奉節嗣尚高祖永嘉公主歷左衞將軍秦州都督軌弟琮亦有武幹隋左親衞大業末犯法亡命奔太原依於高祖琮與太宗有宿憾每自疑太宗方搜羅英傑降禮納之出入臥內其意乃解及將義舉琮協贊大謀大將軍府建為統軍從平西河破霍邑拜金紫光祿大夫扶風郡公尋從劉文靜擊屈突通於潼關通遣裨將桑顯和來逼文靜義軍不利琮與段志玄等力戰久之隋軍大潰通遁走琮率輕騎追至稠桑獲通而返進兵東略下陝縣拔太原倉拜右領軍大將軍賜物五百段時隋河陽都尉獨孤武潛謀歸國乃令琮以步騎一萬自柏崖道應接之遲留不進武見殺坐是除名武德初以元謀勳特恕一死拜右屯衞大將軍復轉右領軍大將軍時將圖洛陽遣琮留守陝城以督糧運王世充遣其驍將羅士信來斷糧道琮潛使人說以利害士信遂帥衆降及從平東都賞物一千四百段後以本官檢校晉州總管尋從隱太子討平劉黑闥以功封譙國公賞黃金五十斤未幾而卒高祖以佐命之舊甚悼之贈左衞大將軍諡曰敬永徽五年重贈特進抗字道生太穆皇后之從兄也隋洛州總管陳國公榮之子也母隋文帝萬安公主抗在隋以帝甥甚見崇寵少入太學略涉書史釋褐千牛備身儀同三司屬其父寢疾抗躬親扶侍衣不解帶者五十餘日及居喪哀毀過禮後襲爵陳國公累轉梁州刺史將之官隋文帝幸其第命抗及公主酣宴如家人之禮賞賜極厚母卒號慟絕而復蘇者數焉文帝令宮人至第節其哭泣歲餘起為岐州刺史轉幽州總管所在並以寬惠聞及漢王諒作亂煬帝恐其為變遣李子雄馳往代之子雄因言抗得諒書而不奏按之無驗以疑貳除名抗與高祖少相親狎及楊玄感作亂高祖統兵隴右抗言於高祖曰玄感抑為發蹤耳李氏有名圖籙可乘其便天之所啟也高祖曰無為禍始何言之妄也大業末抗於靈武巡長城以伺盜賊及聞高祖定京城抗對衆而忭曰此吾家妹壻也豁達有大度真撥亂之主矣因歸長安高祖見之大悅握手引坐曰李氏竟能成事何如因縱酒為樂尋拜將作大匠武德元年以本官兼納言高祖聽朝或升御坐退朝之後延入臥內命之捨敬縱酒談謔敦平生之款常侍宴移時或留宿禁內高祖每呼為兄而不名也宮內咸稱為舅常陪侍遊宴不知朝務轉左武候大將軍領左右千牛備身大將軍尋從太宗平薛舉勳居第一四年又從征王世充及東都平冊勳太廟者九人抗與從弟軌俱預焉朝廷榮之賜女樂一部金寶萬計武德四年因侍宴暴卒贈司空諡曰密子衍衍嗣官至左武衞將軍時抗羣從內三品七人四品五品十餘人尚主三人妃數人冠冕之盛當朝無比靜字元休抗第二子也武德初累轉并州大總管府長史時突厥數為邊患師旅歲興軍糧不屬靜表請太原置屯田以省餽運時議者以民物凋零不宜動衆書奏不省靜頻上書辭甚切至於是徵靜入朝與裴寂蕭瑀封德彝等爭論於殿庭寂等不能屈竟從靜議歲收數千斛高祖善之令檢校并州大總管靜又以突厥頻來入寇請斷石嶺以為障塞復從之太宗即位徵拜司農卿封信都男尋轉夏州都督值突厥攜貳諸將出征多詣其所靜知虜中虛實潛令人間其部落郁射設所部鬱孤尼等九俟斤並率衆歸款太宗稱善賜馬百匹羊千口及擒頡利處其部衆於河南以為不便上封曰臣聞夷狄者同夫禽獸窮則搏噬羣則聚麀不可以刑法威不可以仁義教衣食仰給不務耕桑徒損有為之民以資無知之虜得之則無益於治失之則無損於化然彼首丘之情未易忘也誠恐一旦變生犯我王略愚臣之所深慮如臣計者莫如因其破亡之後加其無妄之福假以賢王之號妻以宗室之女分其土地析其部落使其權弱勢分易為羈制自可永保邊塞俾為藩臣此實長轡遠馭之道于時務在懷輯雖未從之太宗深嘉其志制曰北方之務悉以相委以卿為寧朔大使撫鎮華戎朕無北顧之憂矣再遷民部尚書貞觀九年卒諡曰肅子逵逵尚太宗女遂安公主襲爵信都男誕抗第三子也隋仁壽中起家為朝請郎義寧初辟丞相府祭酒轉殿中監封安豐郡公尚高祖女襄陽公主從太宗征薛舉為元帥府司馬遷刑部尚書轉太常卿高祖諸少子荊王元景等未出宮者十餘王所有國司家產之事皆令誕主之出為梁州都督貞觀初召拜右領軍大將軍轉大理卿莘國公修營太廟賜物五百段復為殿中監以疾解官復拜宗正卿太宗常與之言昏忘不能對乃手詔曰朕聞為官擇人者治為人擇官者亂竇誕比來精神衰耗殊異常時知不肖而任之覩尸祿而不退非唯傷風亂政亦恐為君不明考績黜陟古今常典誕可光祿大夫還第尋卒贈工部尚書荊州刺史諡曰安子孝慈孝慈嗣官至左衞將軍孝慈子希玠希玠少襲爵中宗時為禮部尚書以恩澤賜實封二百五十戶開元初為太子少傅開府儀同三司誕少子孝諶在外戚傳竇氏自武德至今再為外戚一品三人三品已上三十餘人尚主者八人女為王妃六人唐世貴盛莫與為比璡字之推抗季弟也大業末為扶風太守高祖定京師以郡歸國歷禮部民部二尚書從太宗平薛仁杲尋鎮益州時蜀中尚多寇賊璡屢討平之時皇甫無逸在蜀與之不協璡屢請入朝高祖徵之中路詔令還鎮璡不得志遂於路左題山以申鬱積有使者至其所璡宴之臥內遺以綾綺無逸奏其事坐免官未幾拜祕書監封鄧國公貞觀初授太子詹事後為將作大匠修葺洛陽宮璡於宮中鑿池起山崇飾雕麗虛費功力太宗怒遽令毀之坐事免會納其女為酆王妃俄而復位加右光祿大夫七年卒贈禮部尚書諡曰安璡頗曉音律武德中與太常少卿祖孝孫受詔定正聲雅樂璡討論故實撰正聲調一卷行於代史臣曰得人者昌如諸溫儒雅清顯為一時之稱叔達才學明辯中二國之選皆抱廊廟之器俱為社稷之臣威守道軌臨戎抗居喪靜經略璡音律仍以懿親俱至顯位才能門第輝映數朝豈非得人歟唐之昌也不亦宜乎然彥博之褊竇軌之酷亦非全器焉贊曰溫陳才位文蔚典禮諸竇戚里榮盛無比
