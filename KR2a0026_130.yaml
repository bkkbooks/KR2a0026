body:
  text: 舊唐書卷一百二十六列傳第七十六李揆李涵陳少遊盧裴諝李揆字端卿隴西成紀人而家于鄭州代為冠族秦府學士給事中玄道玄孫祕書監贈吏部尚書成裕之子少聰敏好學善屬文開元末舉進士補陳留尉獻書闕下詔中書試文章擢拜右拾遺改右補闕起居郎知宗子表疏遷司勳員外郎考功郎中並知制誥扈從劍南拜中書舍人乾元初兼禮部侍郎揆嘗以主司取士多不考實徒峻其隄防索其書策殊未知藝不至者文史之囿亦不能摛詞深昧求賢之意也其試進士文章請於庭中設五經諸史及切韻本於床而引貢士謂之曰大國選士但務得才經籍在此請恣尋檢由是數月之間美聲上聞未及畢事遷中書侍郎平章事集賢殿崇文館大學士修國史揆美風儀善奏對每有敷陳皆符獻替肅宗賞歎之嘗謂揆曰卿門地人物文章皆當代所推故時人稱為三絶其為舍人也宗室請加張皇后翊聖之號肅宗召揆問之對曰臣觀往古后妃終則有諡生加尊號未之前聞景龍失政韋氏專恣加號翊聖今若加皇后之號與韋氏同陛下明聖動遵典禮豈可蹤景龍故事哉肅宗驚曰凡才幾誤我家事遂止時代宗自廣平王改封成王張皇后有子數歲陰有奪宗之議揆因對見肅宗從容曰成王嫡長有功今當命嗣卿意何如揆拜賀曰陛下言及於此社稷之福天下幸甚臣不勝大慶肅宗喜曰朕計決矣自此頗承恩遇遂蒙大用時京師多盜賊有通衢殺人置溝中者李輔國方恣橫上請選羽林騎士五百人以備巡檢揆上疏曰昔西漢以南北軍相統攝故周勃因南軍入北軍遂安劉氏皇朝置南北衙文武區分以相伺察今以羽林代金吾警夜忽有非常之變將何以制之遂制罷羽林之請揆在相位決事獻替雖甚博辨性鋭於名利深為物議所非又其兄皆自有時名滯於冗官竟不引進同列呂諲地望雖懸政事在揆之右罷相自賓客為荊南節度聲問甚美懼其重入遂密令直省至諲管內搆求諲過失諲密疏自陳乃貶揆萊州長史同正員其制旨曰扇湖南之八州沮江陵之節制揆既黜官數日其兄皆改授為司門員外郎後纍年揆量移歙州刺史初揆秉政侍中苗晉卿纍薦元載為重官揆自恃門望以載地寒意甚輕易不納而謂晉卿曰龍章鳳姿之士不見用麞頭鼠目之子乃求官載銜恨頗深及載登相位因揆當徙職遂奏為試祕書監江淮養疾既無祿俸家復貧乏孀孤百口丐食取給萍寄諸州凡十五六年其牧守稍薄則又移居故其遷徙者蓋十餘州焉元載以罪誅除揆睦州刺史入拜國子祭酒禮部尚書為盧嵵所惡德宗在山南令充入蕃會盟使加左僕射行至鳳州以疾卒興元元年四月也年七十四贈司空喪事官給李涵高平王道立曾孫父少康宋州刺史涵簡素恭慎有名宗室纍授贊善大夫兼侍御史朔方節度郭子儀奏為關內鹽池判官肅宗北幸平涼未有所適涵與朔方留後杜鴻漸草箋具朔方兵馬招集之勢軍資倉儲庫物之數咸推涵宗枝之英純厚忠信乃令涵奉箋至平涼謁見涵敷奏明辨動合事機肅宗大悅除右司員外郎纍至司封郎中宗正少卿寶應元年初平河朔代宗以涵忠謹洽聞遷左庶子兼御史中丞河北宣慰使會丁母憂起復本官而行每州縣郵驛公事之外未嘗啓口疏飯飲水席地而息使還請罷官終喪制代宗以其毀瘠許之服闋除給事中遷尚書左丞以幽州之亂充河朔宣慰使大曆六年正月為蘇州刺史兼御史大夫充浙江西道都團練觀察等使十一年來朝拜御史大夫京畿觀察使李栖筠歿代之德宗即位以涵和易無剸割之才除太子少傅充山陵副使涵判官殿中侍御史呂渭上言涵父名少康今官名犯諱恐乖禮典宰相崔祐甫奏曰若朝廷事有乖舛羣臣悉能如此實太平之道除渭司門員外郎尋有人言涵昔為宗正少卿此時無言今為少傅妄有奏議詔曰呂渭僭陳章奏為其本使薄訴官名朕以宋有司城之嫌晉有詞曹之諱歎其忠於所事亦謂確以上聞乃加殊恩俾膺厚賞近聞所陳少字往歲已任少卿昔是今非罔我何甚豈得謬當朝典更廁周行宜佐遐藩用誡薄俗可歙州司馬同正由是改涵為檢校工部尚書兼光祿卿仍充山陵副使無幾以右僕射致仕興元元年九月卒追贈太子太保陳少遊博州人也祖儼安西副都護父慶右武衛兵曹參軍以少遊纍贈工部尚書少遊幼聰辨初習莊列老子為崇玄館學生衆推引講經時同列有私習經義者期升坐日相問難及會少遊攝齊升坐音韻清辨觀者屬目所引文句悉兼他義諸生不能對甚為大學士陳希烈所歎賞又以同宗遇之甚厚既擢第補渝州南平令理甚有聲至德中河東節度王思禮奏為參謀纍授大理司直監察殿中侍御史節度判官寶應元年入為金部員外郎尋授侍御史回紇糧料使改檢校職方員外郎充使檢校郎官自少遊始也明年僕固懷恩奏為河北副元帥判官兵部郎中兼侍御史遷晉州刺史改同州刺史未視事又歷晉鄭二州刺史少遊為理長於權變時推幹濟然厚斂財貨交結權幸以是頻獲遷擢無幾澤潞節度使李抱玉表為副使御史中丞陳鄭二州留後永泰二年抱玉又奏為隴右行軍司馬拜檢校左庶子依前兼中丞其年除桂州刺史桂管觀察使少遊以嶺徼遐遠欲規求近郡時中官董秀掌樞密用事少遊乃宿於其里候其下直際晚謁之從容曰七郎家中人數幾何每月所費復幾何秀曰久忝近職家纍甚重又屬時物騰貴一月過千餘貫少遊曰據此之費俸錢不足支數日其餘常須數求外人方可取濟倘有輸誠供億者但留心庇覆之固易為力耳少遊雖不才請以一身獨供七郎之費每歲請獻錢五萬貫今見有大半請即受納餘到官續送免貴人勞慮不亦可乎秀既踰於始望欣愜頗甚因與之厚相結少遊言訖泣曰南方炎瘴深愴違辭但恐不生還再覩顏色矣秀遽曰中丞美才不當遠官請從容旬日冀竭蹇分時少遊又已納賄於元載子仲武矣秀載內外引薦數日拜宣州刺史宣歙池都團練觀察使大曆五年改越州刺史兼御史大夫浙東觀察使八年遷揚州大都督府長史淮南節度觀察使仍加銀青光祿大夫封潁川縣開國子所在悉心綏輯而多以任數為政好行小惠胥吏得職人亦獲安及朝廷多事奏請本道兩稅錢千增二百因詔諸道悉如淮南鹽每一斗更加一百文少遊十餘年間三總大藩皆天下殷厚處也以故徵求貿易且無虛日斂積財寶纍巨億萬多賂遺權貴視文雅清流之士蔑如也初結元載每年饋金帛約十萬貫又多納賂於用事中官駱奉先劉清潭吳承倩等由是美聲達於中禁後見元載在相位年深以過犯漸見疑忌少遊亦稍疏之無何載子伯和貶官揚州少遊外與之交結而陰使人伺其過失密以上聞代宗以為忠待之益厚上即位纍加檢校禮部兵部尚書建中三年李納反叛少遊以師收徐海等州尋棄之退軍盱眙又加檢校左僕射賜實封三百戶其年就加同平章事關播嘗為少遊賓僚盧嵵早年與之同在僕固懷恩使府故驟加其官秩四年十月駕幸奉天度支汴東兩稅使包佶在揚州尚未知也佶判官崔沅遽報少遊佶時所總賦稅錢帛約八百萬貫錢在焉少遊意以為賊據京師未即收復遂脅取其財物先使判官崔就佶強索其納給文曆並請供二百萬貫錢物以助軍費佶答曰所用財帛須承敕命未與之勃然曰中丞若得為劉長卿不爾為崔衆矣長卿嘗任租庸使為吳仲孺所困崔衆供軍吝財為光弼所殺故言及之佶大懼不敢固護財帛將轉輸入京師者悉為少遊奪之佶自謁少遊止焉長揖而遣既懼禍奔往白沙少遊又遣判官房孺復召之佶愈懼託以巡檢因急棹過江妻子伏案牘中至上元復為韓滉所拘留佶先有兵三千守禦財貨令高越元甫將焉少遊盡奪之隨佶渡江者又為韓滉所留佶但領胥吏往江鄂等州佶於彈丸中置表以少遊脅取財帛事會少遊使繼至上問曰少遊取包佶財帛有之乎對曰臣發揚州後非所知也上曰少遊國之守臣或防他盜供費軍旅收亦何傷時方隅阻絶國命未振遠近聞之大驚咸以聖情達於變通明見萬里少遊後聞之乃安及李希烈陷汴州聲言欲襲江淮少遊懼乃使參謀溫述由壽州送款於希烈曰濠壽舒廬尋令罷壘韜戈卷甲佇候指揮少遊又遣巡官趙詵於鄆州結李納其年希烈僭號遣其將楊豐齎僞赦書赴揚州至壽州為刺史張建封候騎所得建封對中使二人及少遊判官許子瑞廷責豐而斬之希烈聞之大怒即署其大將杜少誠為僞僕射淮南節度令先平壽州後取廣陵建封於霍丘堅柵嚴加守禁少誠竟不能進後包佶入朝具奏少遊奪財賦事狀少遊大懼乃上表以所取包佶財貨皆是供軍急用今請據數卻納既而州府殘破無以上填乃與腹心孔目官等設法重稅管內百姓以供之無何劉洽收汴州得希烈僞起居注某月日陳少遊上表歸順少遊聞之慚惶發疾數日而卒年六十一贈太尉賻布帛葬祭如常儀盧幽州范陽人也貞觀中工部侍郎義恭玄孫也父子騫潁王府咨議參軍以贈祕書少監少以門蔭入仕在職以幹局稱纍授閬州録事參軍監察殿中御史侍御史金州刺史宰相楊炎遇之頗厚召入左司郎中京兆少尹遷大尹無術學善事權要為政苛躁盧嵵甚惡之諷有司彈奏坐貶撫州司馬同正改饒州刺史遷福州刺史福建觀察使貞元二年七月以疾終裴諝字士明河南洛陽人父寬禮部尚書有重名於開元天寶間諝少舉明經補河南府參軍通達簡率不好苛細積官至京兆倉曹丁父喪居東都是時安祿山盜陷二京東都收復遷太子司議郎無幾虢王巨奏署侍御史襄鄧營田判官丁母憂東都復為史思明所陷諝藏匿山谷思明嘗為諝父將校懷舊恩又素慕諝名欲必得之因令捕騎數十跡逐得諝思明見之甚喜呼為郎君不名僞授御史中丞主擊斷時思明殘殺宗室諝陰緩之全活者數百人又嘗疏賊短長以聞事泄思明大怒詬罵僅而免死賊平除太子中允遷考功郎中數召見言事代宗居陝諝步懷考功及南曹二印赴行在上見而謂之曰疾風知徑草果信矣將以為御史中丞為元載所排為河東道租庸鹽鐵等使時關輔大旱諝入計代宗召見便殿問諝榷酤之利一歲出入幾何諝久之不對上問之對曰臣有所思上曰何思對曰臣自河東來其間所歷三百里見農人愁歎穀菽未種誠謂陛下軫念先問人之疾苦而乃責臣以利孟子曰理國者仁義而已何以利為由是未敢即對也上前坐曰微公言吾不聞此拜左司郎中上時訪以事執政者忌之出為虔州刺史歷饒廬亳三州刺史入為右金吾將軍建中初上以刑名理天下百吏震悚時十月禁屠殺以甫近山陵禁益嚴尚父汾陽王郭子儀隸人殺羊以入門者覺之諝列奏狀上以為不畏強禦纍遣宣諭或謂諝曰郭公有社稷功豈不為蓋之諝笑曰非爾所解且郭公威權太盛上新即位必謂黨附者衆今發其細過以明不弄權耳吾上以盡事君之道下以安大臣不亦可乎時於朝堂別置三司以決庶獄辨爭者輒擊登聞鼓諝上疏曰夫諫鼓謗木之設所以達幽枉延直言今輕猾之人援桴鳴鼓始動天聽竟因纖微若然者安用吏理乎上然之悉歸有司諝以法吏舞文多挾宿怨因獻獄官針以諷無何坐所善僧抵法貶閬州司馬徵為右庶子改千牛上將軍會吐蕃入寇尋拜吏部侍郎兼御史大夫為吐蕃使不行無幾轉太子賓客兵部侍郎河南尹東都副留守諝自河南凡五代為官入視事未嘗當正處不鞫人於贓罪以寬厚和易為理貞元九年十一月以疾終年七十五贈禮部尚書史臣曰李揆發言沃心幸遇明主蔽賢固位終非令人少遊逐勢利隨時盧事權要巧宦察言觀行皆無可稱涵節行著聞諝和易為理庶幾近仁也贊曰李陳盧言行非真涵諝和易庶乎近仁
