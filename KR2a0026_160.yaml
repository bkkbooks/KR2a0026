body:
  text: 舊唐書卷一百五十六列傳第一百六于韓弘子公武弘弟充李質附王智興子晏平晏宰于字允元河南人也周太師燕文公謹之後也始以蔭補千牛調授華陰尉黜陟使劉灣辟為判官又以櫟陽主簿攝監察御史充入蕃使判官再遷司門員外郎兼侍御史賜紫充入西蕃計會使將命稱旨時論以為有出疆專對之能歷長安縣令駕部郎中出為湖州刺史因行縣至長城方山其下有水曰西湖南朝疏鑿溉田三千頃久堙廢命設堤塘以復之歲獲秔稻蒲魚之利人賴以濟州境陸地褊狹其送終者往往不掩其棺槥葬朽骨凡十餘所改蘇州刺史濬溝瀆整街衢至今賴之吳俗事鬼疾其淫祀廢生業神宇皆撤去唯吳太伯伍員等三數廟存焉雖為政有績然橫暴已甚追憾湖州舊尉封杖以計強決之觀察使王緯奏其事德宗不省及後累遷乃與緯書曰一蒙惡奏三度改官由大理卿遷陝虢觀察使自以為得志益恣威虐官吏日加科罰其惴恐重足一跡掾姚峴不勝其虐與其弟汎舟于河遂自投而死貞元十四年為襄州刺史充山南東道節度觀察地與蔡州鄰吳少誠之叛率兵赴唐州收吳房朗山縣又破賊於濯神溝於是廣軍籍募戰士器甲犀利僴然專有漢南之地小失意者皆以軍法從事因請升襄州為大都督府府比鄆魏時德宗方姑息方鎮聞事狀亦無可奈何但允順而已奏請無不從於是公然聚斂恣意虐殺專以凌上威下為務鄧州刺史元洪誣以贓罪奏聞朝旨不得已為流端州命中使監焉至隋州棗陽縣命部將領士卒數百人劫洪至襄州拘留之中使奔歸京師德宗怒笞之數十又表洪其責太重復降中使景忠信宣旨慰諭遂除洪吉州長史然後洪獲赴謫所又怒判官薛正倫奏貶峽州長史及敕下怒已解復奏請為判官德宗皆從之正倫卒未殯以兵圍其宅令孽男逼娶其嫡女累遷至左僕射平章事燕國公俄而不奉詔旨擅總兵據南陽朝廷幾為之旰食及憲宗即位威肅四方稍戒懼以第四子季友求尚主憲宗以長女永昌公主降焉其第二子方屢諷其父歸朝入覲冊拜司空平章事元和中內官梁守謙掌樞密頗招權利有梁正言者勇於射利自言與守謙宗盟情厚子敏與之遊處正言取財賄言賂守謙以求出鎮久之無効敏責其貨於正言乃誘正言之僮支解棄于溷中八年春敏奴王再榮詣銀臺門告其事即日捕孔目官沈璧家僮十餘人於內侍獄鞫問尋出付臺獄詔御史中丞薛存誠刑部侍郎王播大理卿武少儀為三司使按問乃搜死奴於其第獲之率其男贊善大夫正駙馬都尉季友素服單騎將赴闕下待罪於建福門門司不納退於街南負牆而立遣人進表閤門使以無引不受日沒方歸明日復待罪於建福門宰相喻令還第貶為恩王傅敏長流雷州錮身發遣殿中少監駙馬都尉季友追奪兩任官階令其家循省左贊善大夫正祕書丞方並停見任孔目官沈璧決四十配流封州奴犀牛與劉幹同手殺人宜付京兆府決殺敏行至商山賜死梁正言僧鑒虛並付京兆府決殺其年十月改授太子賓客十年王師討淮蔡諸侯貢財助軍進銀七千兩金五百兩玉帶二詔不納復還之十三年表求致仕宰臣擬授太子少保御筆改為太子賓客其年八月卒贈太保諡曰厲其子季友從獵苑中訴於穆宗賜諡曰思右丞張正甫封敕請還本諡右補闕高鉞上疏論之曰夫諡者所以懲惡勸善激濁揚清使忠臣義士知勸亂臣賊子知懼雖竊位於當時死加惡諡者所以懲暴戾垂沮勸孔子修春秋亂臣賊子懼蓋為此也垂範如此而不能救況又隳其典法乎臣風聞此事是徐泗節度使李愬奏請李愬勳臣節將陛下寵其勳勞賜其爵祿車服第宅則可若亂朝廷典法將何以沮勸仲尼曰唯名與器不可以假人名器君之所司若以假人與之政也政亡則國家從之頃鎮襄漢殺戮不辜恣行兇暴移軍襄鄧迫脅朝廷擅留逐臣徼遮天使當先朝嗣位之始貴安反側以靖四方幸免鈇鉞之誅得全腰領而斃誠宜諡之繆厲以沮兇邪豈可曲加美名以惠奸宄如此則是于生為奸臣死獲美諡竊恐天下有識之士謂聖朝無人有此倒置伏請速追前詔却依太常諡為厲使朝典無虧國章不濫太常博士王彥威又疏曰古之聖王立諡法者所以彰善惡垂勸誡使一字之褒賞踰紱冕一言之貶辱過朝市此有國之典禮陛下勸懲之大柄也頃擁節旄肆行暴虐人神共憤法令不容擅興全師僭為正樂侵辱中使擅止制囚殺戮不辜誅求無度臣故定諡為厲今陛下不忍改賜為思誠出聖慈實害聖政伏以陛下自臨宸扆懋建大中聞善若驚從諫不倦況當統天立極之始所謂執法慎名之時一垂恩光大啟徼倖且如之不法然而陛下不忍加懲臣恐今後不逞之徒如者衆矣死援例陛下何以處之是恩曲於前而弊生於後若以李吉甫有賜諡之例則甫之為相也有犯上殺人之罪乎以況之恐非倫類如以常入財助國改過來覲兩使絕域可以贖論夫傷物害人剝下奉上納賄求幸尤不可長其漸焉自兩河宿兵垂七十年王師憓征瘡痏未息及張茂昭以易定入覲程權以滄景歸朝故恩禮殊尤以勸來者而于以文吏之職居腹心之地而倔強犯命不獲已而入朝豈茂昭之比乎縱有入財使遠之勤何以掩其惡迹伏望陛下恩由義斷澤以禮成褒貶道存僥倖路絕則天下幸甚疏奏不報竟諡為思長慶中以戚里勳家諸貴引用于方復至和王傅家富於財方交結遊俠務於速進元稹作相欲以其策平河朔羣盜方以策畫干稹而李逢吉之黨欲傾裴度乃令人告稹欲結客刺度事下法司按鞫無狀而方竟坐誅韓弘潁川人其祖父無聞世居滑之匡城少孤依母族劉玄佐即其舅也事玄佐為州掾累奏試大理評事玄佐卒子士寧被逐弘出汴州為宋州南城將劉全諒時為都知兵馬使貞元十五年全諒卒汴軍懷玄佐之惠又以弘長厚共請為留後環監軍使請表其事朝廷亦以玄佐故許之自試大理評事檢校工部尚書汴州刺史兼御史大夫宣武軍節度副大使知節度事宋亳汴潁觀察等使時吳少誠遣人至汴密與劉全諒謀因曲環卒襲陳許會全諒卒其人在傳舍弘喜獲節鉞即斬其人以聞立出軍三千助禁軍共討少誠汴州自劉士寧之後軍益驕恣及陸長源遇害頗輕主帥其為亂魁黨數十百人弘視事數月皆知其人有部將劉鍔者兇卒之魁也弘欲大振威望一日引短兵於衙門召鍔與其黨三百數其罪盡斬之以徇血流道中弘對賓僚言笑自若自是訖弘入朝二十餘年軍衆十萬無敢怙亂者累授檢校左右僕射司空憲宗即位加同平章事時王鍔檢校司空平章事致書于宰臣武元衡恥在王鍔之下憲宗方欲用形勢以臨淮西乃授以司徒平章事班在鍔上及用嚴綬為招討為賊所敗弘方鎮汴州當兩河賊之衝要朝廷慮其異志欲以兵柄授之而令李光顏烏重胤實當旗鼓乃授弘淮西諸軍行營都統令兵部郎中知制誥李程宣賜官告弘實不離理所唯令其子公武率師三千隸李光顏軍弘雖居統帥常不欲諸軍立功陰為逗撓之計每聞獻捷輒數日不怡其危國邀功如是吳元濟誅以統帥功加檢校司徒兼侍中封許國公罷行營都統十四年誅李師道收復河南二州弘大懼其年七月盡攜汴之牙校千餘人入覲對於便殿拜舞之際以其足疾命中使掖之宴賜加等預冊徽號大禮進絹三十五萬匹絁三萬匹銀器二百七十件三上章堅辭戎務願留京師奉朝請詔曰納大忠樹嘉績為臣所以明極節錫殊寵進高秩有國所以待元臣況乎邦教誕敷王言總會百辟攸憲四方式瞻永念于懷久虛其位載揚成命僉曰休哉宣武軍節度副大使知節度事汴宋亳潁等州觀察處置等使開府儀同三司守司徒兼侍中使持節汴州諸軍事汴州刺史上柱國許國公食邑三千戶韓弘降神挺材積厚成器中蘊深閎之量外標嚴重之姿有匡國濟時之心推誠不耀有夷兇禁暴之略仗義益彰自鎮浚郊二十餘載師徒稟訓而咸肅吏士奉法而愈明俗臻和平人用庶富威聲之重隱若山崇屬者淮濆濯征命統羣帥克殄殘孽惟乃有指蹤之功及齊境興妖分師進討遂梟元惡惟乃有略地之效既聞旋旆俄請執珪深陳魏闕之誠遠繼韓侯之志朝天有慶就日方伸又抗表章固辭戎旅三加敦諭所守彌堅于蕃于宣諒切於注意我弼我輔難違其衷懇式遂良願載兼上司論道之榮因之以齊八政中樞之長昇之以贊萬務玄衮赤舄備于寵光不有其人孰膺斯任可守司徒兼中書令乃以吏部尚書張弘靖兼平章事代弘鎮宣武憲宗崩以弘攝冢宰十五年六月以本官兼河中尹河中晉絳節度觀察等使時弘弟充為鄭滑節度使子公武為鄜坊節度使父子兄弟皆秉節鉞人臣之寵冠絕一時二年請老乞罷戎鎮三表從之依前守司徒中書令其年十二月病卒時年五十八贈太尉賻絹二千匹布七百端米粟千石初弘鎮大梁二十餘載四州征賦皆為己有未嘗上供有私錢百萬貫粟三百萬斛馬七千匹兵械稱是專務聚財積粟峻法樹威而莊重寡言沉謀勇斷鄰封如吳少誠李師道輩皆憚之詔使宣諭弘多倨待及齊蔡賊平勢屈入覲兩朝寵待加等弘竟以名位始終人臣之幸也時公武已卒弘孫紹宗嗣公武自宣武馬步都虞候將兵誅蔡賊平檢校右散騎常侍鄜州刺史鄜坊等州節度使丁所生憂起復金吾將軍仍舊職十四年父弘入朝公武乞罷節度入為右金吾將軍既而弘出鎮河中季父充移鎮宣武公武歎曰二父聯居重鎮吾以孺子當執金吾職家門之盛懼不克勝堅辭宿衞改右驍衞將軍性頗恭遜不以富貴自處弘罷河中居永崇里第公武居宣陽里之北門因省父無疾暴卒贈戶部尚書充依舅劉玄佐歷河陽昭義牙將及兄弘節制宣武召歸主親兵奏授御史大夫弘頗酷法人人不自保充獨謙恭執禮未嘗懈怠由是徧得士心然以親逼權重常不自安元和六年因獵近郊單騎歸于洛陽時朝廷方姑息弘亦憐充之無異志擢拜右金吾衞將軍十二月轉大將軍歷少府監十五年代姪公武為鄜坊節度使檢校工部尚書長慶二年幽鎮魏復亂朝廷以王承元有冀卒數千在滑州恐封疆相接復相勸誘命充與承元更換所守檢校左僕射是歲汴州節度使李愿被三軍所逐立都將李為留後朝廷以充久在汴州衆心悅附命充為宣武節度使兼統義成之師往討會疽發腦屬兵於紀綱李質質以計誅首亂送歸京師充遂不戰而入大梁時陳許李光顏亦奉詔討軍於尉氏意欲必先收汴因大肆俘掠汴州監軍使姚文壽亦欲招許下之師充在中牟聞其謀率衆徑至城下汴人素懷充來皆踊躍相賀無復疑貳詔加檢校司空詔割潁州隸滑州充既安堵密籍部伍間得嘗構惡者千餘人一日下令幷父母妻子立出之敢逡巡境內者斬自是軍政大理汴人無不愛戴四年八月例加司徒詔未至暴疾卒時年五十五贈司徒諡曰肅充雖內外皆將家素不事豪侈常以簡約自持臨機決策動無遺悔善將者多之李質者汴之牙將李既為留後倚質為心腹及朝廷以為郡守志邀節鉞質勸喻不從會疽發首乃與監軍姚文壽謀斬傳首京師有詔以韓充鎮汴充未至質權知軍州事使衙牙兵二千人皆日給酒食物力為之損屈充將至質曰若韓公始至頓去二千人日膳人情必大去若不除之後當無繼不可留此弊以遺吾帥遂處分停日膳而後迎充召為金吾將軍長慶三年四月卒王智興字匡諫懷州溫縣人也曾祖靖左武衞將軍祖瓌右金吾衞將軍父縉太子詹事智興少驍銳為徐州衙卒事刺史李洧及李納謀叛欲害洧洧遂以除州歸國納怒以兵攻徐甚急智興健行不四五日齎表京師求援德宗發朔方軍五千人隨智興赴之淄青圍解自是智興常以徐軍抗納累歷滕豐沛狄四鎮將自是二十餘年為徐將元和中王師誅吳元濟李師道與蔡賊謀撓沮王師頻出軍侵徐徐帥李愿以所部步騎悉委智興以抗之鄆將王朝晏以兵攻沛智興擊敗之賊又令姚海率勁兵二萬圍豐攻城甚急智興復擊敗之於賊壁獲美妾智興懼軍士爭之乃曰軍中有女子安得不敗此雖無罪違軍法也即斬之以徇累官至侍御史本軍都押衙十三年王師誅李師道智興率徐軍八千會諸道之師進擊與陳許之軍大破賊於金鄉拔魚臺俘斬萬計以功遷御史中丞賊平授沂州刺史長慶初河朔復亂徵兵進討穆宗素知智興善將遷檢校左散騎常侍兼御史大夫充武寧軍節度副使河北行營都知兵馬使初召智興以徐軍三千渡河徐之勁卒皆在部下節度使崔羣慮其旋軍難制密表請追赴闕授以他官事未行會赦王廷湊諸道班師智興先期入境羣頗憂疑令府僚迎勞且誡之曰兵士悉輸甲仗於外副使以十騎入城智興既首處賓僚聞之心動率歸師斬關而入殺軍中異己者十餘人然後詣衙謝羣曰此軍情也羣治裝赴闕智興遣兵士援送羣家屬至埇橋遂掠鹽鐵院緡幣及汴路進奉物商旅貲貨率十取七八逐濠州刺史侯弘度弘度棄城走朝廷以罷兵力不能加討遂授智興檢校工部尚書徐州刺史御史大夫充武寧軍節度徐泗濠觀察使自是智興務積財賄以賂權勢賈其聲譽用度不足稅泗口以裒益之累加至檢校僕射司空大和初李同捷據滄德叛智興上章請躬督士卒討賊從之乃出全軍三萬自備五月糧餉朝廷嘉之加檢校司徒同平章事兼滄德行營招撫使初同捷狂桀犯命濟之以王廷湊王師經年無功及智興拔棣州賊大懼諸軍稍務進取以智興首功加守太傅封鴈門郡王賊平入朝上賜宴麟德殿賞賜珍玩名馬進位侍中改許州刺史忠武軍節度陳許蔡等州觀察使大和七年改授河中尹河中節度晉磁隰觀察等使智興因入朝九年五月改汴州刺史宣武軍節度宋亳汴潁觀察等使開成元年七月卒年七十九贈太尉不視朝三日葬于洛陽榆林之北原四鎮將校會葬者千人智興九子晏平晏宰晏臯晏實晏恭晏逸晏深晏斌晏韜而晏平晏宰最知名晏平幼從父征伐以討李同捷功授檢校右散騎常侍靈州大都督府長史朔方靈鹽節度丁父憂奔歸洛陽晏平居官貪黷去鎮日擅將征馬四百餘匹及兵仗七千事自衞為憲司所糾減死長流康州以父喪未赴流所告於河北三鎮三帥上表救解請從昭雪改授撫州司馬給事中韋溫薛廷老盧弘宣封還制書改永州司戶韋溫又執不下文宗令中使宣諭方行晏宰於昆仲間最稱偉器大中後歷上黨太原節度使扞迴鶻党項屢立邊功晏臯仕至左威衞將軍史臣曰于燕公以儒家子逢時擾攘不持士範非義非俠健者不為末塗淪躓固其宜矣韓王二帥乘險蹈利犯上無君豺狼噬人鵂鶹幸夜爵祿過當其可已乎謂之功臣恐多慚色贊曰于子清狂輕犯彝章韓虐王剽專恣一方元和赫斯揮劍披攘擇肉之倫爪距摧藏
