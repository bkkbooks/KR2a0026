body:
  text: 舊唐書卷八十一列傳第三十一崔敦禮盧承慶劉祥道李敬玄李義琰孫處約樂彥瑋趙仁本崔敦禮雍州咸陽人隋禮部尚書仲方孫也其先本居博陵世為山東著姓魏末徙關中敦禮本名元禮高祖改名焉頗涉文史重節義嘗慕蘇子卿之為人武德中拜通事舍人九年太宗使敦禮往幽州召廬江王瑗瑗舉兵反執敦禮問京師之事敦禮竟無異詞太宗聞而壯之遷左衛郎將賜以良馬及黃金雜物貞觀元年擢拜中書舍人遷兵部侍郎頻使突厥纍轉靈州都督二十年徵為兵部尚書又奉詔安撫回紇鐵勒部落時延陀寇邊敦禮與英國公李績擊破之又有瀚海都督回紇吐迷度為其下所殺詔敦禮往就部落綏輯之因立其嗣子而還敦禮深識蕃情凡所奏請事多允會永徽四年代高季輔為侍中纍封固安縣公仍修國史六年加光祿大夫代柳奭為中書令尋又兼檢校太子詹事敦禮以老疾屢陳乞請退顯慶元年拜太子少師仍同中書門下三品敕召其子定襄都督府司馬餘慶使侍其疾尋卒年六十餘高宗舉哀於東雲龍門賜東園祕器贈開府儀同三司并州大都督陪葬昭陵賻絹布八百段米粟八百石諡曰昭子餘慶官至兵部尚書敦禮孫貞慎神龍初為兵部侍郎盧承慶幽州范陽人隋武陽太守思道孫也父赤松大業末為河東令與高祖有舊聞義師至霍邑棄縣迎接拜行臺兵部郎中武德中纍轉率更令封范陽郡公尋卒承慶美風儀博學有才幹少襲父爵貞觀初為秦州都督府戶曹參軍因奏河西軍事太宗奇其明辨擢拜考功員外郎纍遷民部侍郎太宗嘗問歷代戶口多少之數承慶夏殷以後迄于周隋皆有依據太宗嗟賞久之尋令兼檢校兵部侍郎仍知五品選事承慶辭曰選事職在尚書臣今掌之便是越局太宗不許曰朕今信卿卿何不自信也俄歷雍州別駕尚書左丞永徽初為褚遂良所構出為益州大都督府長史遂良俄又求索承慶在雍州舊事奏之由是左遷簡州司馬歲餘轉洪州長史會高宗將幸汝州之溫湯擢承慶為汝州刺史入為光祿卿顯慶四年代杜正倫為度支尚書仍同中書門下三品尋坐度支失所出為潤州刺史再遷雍州長史加銀青光祿大夫總章二年代李乾祐為刑部尚書以年老請致仕許之仍加金紫光祿大夫三年病卒年七十六臨終誡其子曰死生至理亦猶朝之有暮吾終斂以常服晦朔常饌不用牲牢墳高可認不須廣大事辦即葬不須卜擇墓中器物瓷漆而已有棺無槨務在簡要碑志但記官號年代不須廣事文飾贈幽州都督諡曰定弟承業亦有學識貞觀末官至雍州長史檢校尚書左丞兄弟相次居此任時人榮之俄坐承慶事左遷忠州刺史顯慶初復為雍州長史前後皆有能名三遷左肅機兼掌司列選事賜爵魏縣子總章中卒於揚州大都督府長史贈洺州刺史諡曰簡承業弟承泰齊州長史承泰子齊卿長安初為雍州録事參軍時則天令雍州長史薛季昶擇僚吏堪為御史者季昶以聞齊卿薦長安尉盧懷慎李休光萬年尉李乂崔湜咸陽丞倪若水盩厔尉田崇辟新豐尉崔日用後皆至大官齊卿開元初為豳州刺史時張守圭為果毅齊卿禮接之謂曰十年內當知節度果如其言時人謂齊卿有人倫之鑒齊卿好酒飲至斗餘不亂寬厚可親士友以此善之纍遷太子詹事封廣陽縣公尋卒承慶弟孫藏用別有傳劉祥道魏州觀城人也父林甫武德初為內史舍人時兵機繁速庶事草創高祖委林甫專典其事以才幹見稱尋詔與中書令蕭瑀等撰定律令林甫因著律議萬餘言久之擢拜中書侍郎賜爵樂平男貞觀初再遷吏部侍郎初隋代赴選者以十一月為始至春即停選限既促選司多不究悉時選人漸衆林甫奏請四時聽選隨到注擬當時甚以為便時天下初定州府及詔使多有赤牒授官至是停省盡來赴集將萬餘人林甫隨才銓擢咸得其宜時人以林甫典選比隋之高孝基三年病卒臨終上表薦賢太宗甚嘉悼之賜絹二百五十匹祥道少襲父爵永徽初歷中書舍人御史中丞吏部侍郎顯慶二年遷黃門侍郎仍知吏部選事祥道以銓綜之術猶有所闕乃上疏陳其得失其一曰今之選司取士傷多且濫每年入流數過一千四百傷多也雜色入流不加銓簡是傷濫也經明行修之士猶或罕有正人多取胥徒之流豈能皆有德行即知共釐務者善人少而惡人多有國以來已四十載尚未刑措豈不由此乎但服膺先王之道者奏第然始付選趨走几案之間者不簡便加祿秩稽古之業雖則難知斗筲之材何其易進其雜色應入流人望令曹司試判訖簡為四等奏聞第一等付吏部第二等付兵部次付主爵次付司勳其行署等私犯公坐情狀可責者雖經赦降亦量配三司不經赦降者放還本貫冀入流不濫官無冗雜且令胥徒之輩漸知勸勉其二曰古之選者為官擇人不聞取人多而官員少今官員有數入流無限以有數供無限遂令九流繁總人隨歲積謹約準所須人量支年別入流者今內外文武官一品以下九品已上一萬三千四百六十五員略舉大數當一萬四千人壯室而仕耳順而退取其中數不過支三十年此則一萬四千人三十年而略盡若年別入流者五百人經三十年便得一萬五千人定須者一萬三千四百六十五人足充所須之數況三十年之外在官者猶多此便有餘不慮其少今年常入流者遂逾一千四百計應須數外其餘兩倍又常選放還者仍停六七千人更復年別新加實非處置之法其三曰儒為教化之本學者之宗儒教不興風俗將替今庠序遍於四海儒生溢於三學誘掖之方理實為備而奬進之道事或未周但永徽已來于今八載在官者以善政粗聞論事者以一言可採莫不光被綸音超升不次而儒生未聞恩及臣故以為奬進之道未周其四曰國家富有四海已四十年百姓官僚未有秀才之舉豈今人之不如昔人將薦賢之道未至寧可方稱多士遂間斯人望六品已下爰及山谷特降綸言更審搜訪仍量為條例稍加優奬不然赫赫之辰斯舉遂絶一代盛事實為朝廷惜之其五曰唐虞三載考績黜陟幽明兩漢用人亦久居其職所以因官命氏有倉庾之姓魏晉以來事無可紀今之在任四考即遷官人知將秩滿必懷去就百姓見有遷代能無苟且以去就之人臨苟且之輩責以移風易俗其可得乎望經四考就任加階至八考滿然後聽選還淳反朴雖未敢必期送故迎新實稍減勞弊其六曰尚書省二十四司及門下中書都事主書主事等比來選補皆取舊任流外有刀筆之人縱欲參用士流皆以儔類為恥前後相承遂成故事但掖省崇峻王言祕密尚書政本人物攸歸而多用胥徒恐未盡銓衡之理望有釐革稍清其選明年中書令杜正倫亦言入流人多為政之弊高宗遣祥道與正倫詳議其事時公卿已下憚於改作事竟不行祥道尋以修禮功進封陽城縣侯四年遷刑部尚書每覆大獄必歔欷纍歎奏決之日為之再不食龍朔元年權檢校蒲州刺史三年兼檢校雍州長史俄遷右相祥道性謹慎既居宰相深懷憂懼數自陳老疾請退就間職俄轉司禮太伯罷知政事麟德二年將有事於泰山有司議依舊禮皆以太常卿為亞獻光祿卿為終獻祥道駁曰昔在三代六卿位重故得佐祠漢魏以來權歸臺省九卿皆為常伯屬官今登封大禮不以八座行事而用九卿無乃徇虛名而忘實事乎高宗從其議竟以司徒徐王元禮為亞獻祥道為終獻事畢進爵廣平郡公乾封元年又上表乞骸骨優制加金紫光祿大夫聽致仕其年卒年七十一贈幽州都督諡曰宣子齊賢襲爵齊賢初自侍御史出為晉州司馬高宗聞其方正甚禮之時將軍史興宗嘗從帝於苑中弋獵因言晉州出好鷂劉齊賢見為司馬請使捕之帝曰劉齊賢豈是覓鷂人耶卿何以此待之遂止齊賢後避章懷太子名改名景先永淳中纍遷黃門侍郎同中書門下平章事則天臨朝代裴炎為侍中及裴炎下獄景先與鳳閣侍郎胡元範抗詞明其不反則天甚怒之炎既誅死景先左遷普州刺史未到又貶授吉州長史永昌年為酷吏所陷繫於獄自縊死仍籍沒其家景先自祖父三代皆為兩省侍郎及典選又叔父吏部郎中應道從父弟禮部侍郎令植等八人前後為吏部郎中員外有唐已來無有其比云李敬玄亳州譙人也父孝節穀州長史敬玄博覽羣書特善五禮貞觀末高宗在東宮馬周啓薦之召入崇賢館兼預侍讀仍借御書讀之敬玄雖風格高峻有不可犯之色然勤於造請不避寒暑馬周及許敬宗等皆推薦延譽之乾封初歷遷西臺舍人弘文館學士總章二年纍轉西臺侍郎兼太子右中護同東西臺三品兼檢校司列少常伯時員外郎張仁禕有時務才敬玄以曹事委之仁禕始造姓曆改修狀樣銓曆等程式處事勤勞遂以心疾而卒敬玄因仁禕之法典選纍年銓綜有序自永徽以後選人轉多當其任者罕聞稱職及敬玄掌選天下稱其能預選者歲有萬餘人每於街衢見之莫不知其姓名其被放有訴者即口陳其書判失錯及身負殿纍略無差殊時人咸服其強記莫之敢欺選人有杭州參軍徐太玄者初在任時同僚有張惠犯贓至死太玄哀其母老乃詣獄自陳與惠同受惠贓數既少遂得減死太玄亦坐免官不調十餘年敬玄知而大嗟賞之擢授鄭州司功參軍太玄由是知名後官至祕書少監申王師以德行為時所重敬玄賞鑒多此類也咸亨二年授中書侍部餘並如故三年加銀青光祿大夫行吏部侍郎依舊兼太子右庶子同中書門下三品四年監修國史上元二年拜吏部尚書仍依舊兼太子左庶子監修國史同中書門下三品敬玄久居選部人多附之前後三娶皆山東士族又與趙郡李氏合譜故臺省要職多是其同族婚媾之家高宗知而不悅然猶不彰其過儀鳳元年代劉仁軌為中書令調露二年吐蕃入寇仁軌先與敬玄不協遂奏請敬玄鎮守西邊敬玄自以素非邊將之才固辭高宗謂曰仁軌若須朕朕即自往卿不得辭也竟以敬玄為洮河道大總管兼安撫大使仍檢校鄯州都督率兵以禦吐蕃及將戰副將工部尚書劉審禮先鋒擊之敬玄聞賊至狼狽却走審禮既無繼援遂沒于陳俄有詔留敬玄於鄯州防禦敬玄纍表稱疾乞還醫療許之既入見驗疾不重高宗責其詐妄又積其前後愆失貶授衡州刺史稍遷揚州大都督府長史永淳元年卒年六十八贈兗州都督撰禮論六十卷正論三卷文集三十卷子思沖神龍初歷工部侍郎左羽林軍將軍從節愍太子誅武三思事敗見殺籍沒其家敬玄弟元素亦有吏才初為武德令時懷州刺史李文暕將調率金銀造常滿樽以獻百姓甚弊之官吏無敢異議者元素抗詞固執文暕乃損其制度以家財營之延載元年自文昌左丞遷鳳閣侍郎鳳閣鸞臺平章事加銀青光祿大夫萬歲通天二年坐與洛州録事參軍綦連耀交結為武懿宗所陷被殺神龍初雪免李義琰魏州昌樂人常州刺史玄道族孫也其先自隴西徙山東世為著姓父玄德癭陶令義琰少舉進士纍補太原尉時李績為并州都督僚吏皆望風懾懼義琰獨廷折曲直績甚禮之義琰麟德中為白水令有能名拜司刑員外郎上元中纍遷中書侍郎又授太子右庶子同中書門下三品時天后預知國政高宗嘗欲下詔令后攝知國事義琰與中書令郝處俊固爭以為不可事竟寢義琰身長八尺博學多識高宗每有顧問言皆切直章懷太子之廢也高宗慰勉官僚盡捨罪令復其位庶子薛元超等皆舞蹈謝恩義琰獨引罪涕泣時論美之義琰宅無正寢弟義璡為岐州司功參軍乃市堂材送焉及義璡來覲義琰謂曰以吾為國相豈不懷愧更營美室是速吾禍此豈愛我意哉義璡曰凡人仕為丞尉即營第宅兄官高祿重豈宜卑陋以逼下也義琰曰事難全遂物不兩興既有貴仕又廣其宇若無令德必受其殃吾非不欲之懼獲戾也竟不營構其木為霖雨所腐而棄之義琰後改葬父母使舅氏移其舊塋高宗知而怒曰豈以身在樞要凌蔑外家此人不可更知政事義琰聞而不自安以足疾上疏乞骸骨乃授銀青光祿大夫聽致仕乃將歸東都田里公卿已下祖餞於通化門外時人以比漢之二疏垂拱初起為懷州刺史義琰自以失則天意恐禍及固辭不拜四年卒於家義琰從祖弟義琛永淳初為雍州長史時關輔大飢高宗令貧人散於商鄧逐食義琛恐黎人流轉因此不還固爭之由是忤旨出為梁州都督轉岐州刺史稱為良吏卒官高宗時宰相又有孫處約樂彥瑋趙仁本並有名跡孫處約者汝州郟城人也貞觀中為齊王祐記室祐既失德處約數上書諫之祐既誅太宗親檢其家文疏得處約諫書甚嗟賞之纍轉中書舍人其年中書令杜正倫奏請更授一舍人與處約同知制誥高宗曰處約一人足辦我事何須多也處約以預修太宗實録成賜物七百段三遷中書侍郎與李績許敬宗同知國政尋避中宮諱改名茂道坐事左轉司禮少常伯顯慶中拜少司成以老疾請致仕許之尋卒子佺睿宗時為左羽林大將軍征契丹戰歿樂彥瑋者雍州長安人顯慶中為給事中時故侍中劉洎之子詣闕上言洎貞觀末為褚遂良所譖枉死稱寃請雪中書侍郎李義府又左右之高宗以問近臣衆希義府之旨皆言其枉彥瑋獨進曰劉洎大臣舉措須合軌度人主暫有不豫豈得即擬負國先朝所責未是不愜且國君無過舉若雪洎之罪豈可謂先帝用刑不當乎然其言遂寢其事彥瑋尋丁憂起為唐州刺史及入辭高宗記其言直復拜東臺舍人纍遷西臺侍郎同東西臺三品乾封元年代劉仁軌為大司憲官名復舊改為御史大夫上元三年卒贈秦州都督永昌年以子思晦貴重贈揚州大都督思晦則天時官至鸞臺侍郎兼檢校天官尚書同鳳閣鸞臺三品為酷吏所殺趙仁本者陝州河北人也貞觀中纍轉殿中侍御史自義寧已來詔敕皆手自纂録臨事皆暗記之甚為當時所伏會有敕差一御史遠使同列遞相辭託仁本越次請行言於治書侍御史馬周曰食君之祿死君之事雖復跋涉艱險所不敢辭也及回事又稱旨擢吏部員外郎乾封中歷遷東臺侍郎同東西臺三品尋轉司列少常伯知政事如故時許敬宗為右相頗任權勢仁本拒其請託遂為敬宗所搆俄授尚書左丞罷知政事咸亨初卒官史臣曰崔盧數公皆以忠清文行致位樞要恪恭匪懈以保名位誠所謂持盈守成太平之君子然敬玄之擢太玄可謂能舉善者矣義琰腐材而不營第舍可謂有儉德矣彥瑋獨遏姦臣仁本請當遠使終升輔相不亦宜乎贊曰盧劉兩族奕世名卿二李二樂俱號公清權臣獨抗美第不營以茲輔弼無愧德聲
