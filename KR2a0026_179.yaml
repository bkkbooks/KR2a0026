body:
  text: 舊唐書卷一百七十五列傳第一百二十五憲宗二十子穆宗五子敬宗五子文宗二子武宗五子宣宗十一子懿宗八子僖宗二子昭宗十子嗣襄王熅朱玫王行瑜附憲宗二十子穆宗皇帝宣宗皇帝惠昭太子寧澧王惲深王悰洋王欣絳王悟建王恪鄜王憬瓊王悅沔王恂婺王懌茂王愔淄王崙頁衡王憺澶王棣王惴彭王愓信王榮王惠昭太子寧憲宗長子也母曰紀美人貞元二十一年四月封平原郡王元和元年八月進封鄧王四年閏三月立為皇太子改名宙尋復今名其年有司將行册禮以孟夏孟秋再卜日臨事皆以雨罷至十月方行册禮元和六年十二月薨年十九廢朝十三日時敕國子司業裴茝攝太常博士西內勾當茝通習古今禮儀嘗為太常博士及官至郎中每兼其職至改司業方罷兼領國典無皇太子薨禮故又命茝領之廢朝十三日蓋用期服以日易月之制也諡曰惠昭澧王惲憲宗第二子也本名寬貞元二十一年封同安郡王元和元年進封澧王七年改今名時吐突承璀恩寵特異惠昭太子薨議立儲副承璀獨排羣議屬澧王欲以威權自樹賴憲宗明斷不惑上將册拜太子詔翰林學士崔羣代澧王作讓表一章羣奏曰凡事己合當之而不為則有退讓焉上深納之及憲宗晏駕承璀死王亦薨於其夕以元和十五年四月丁丑發喪廢朝三日長子漢東陽郡王次子源安陸郡王第三子演臨安郡王深王悰本名察憲宗第四子也貞元二十一年封彭城郡王元和元年進封深王改今名長子潭河內郡王次子淑吳興郡王洋王欣本名寰憲宗第五子也貞元二十一年封為高密郡王元和元年進封洋王七年改今名大和二年薨長子沛大和八年封潁川郡王絳王悟本名寮憲宗第六子也貞元二十一年封文安郡王元和元年進封絳王七年改今名寶曆二年冬遇害長子洙大和八年封新安郡王第二子滂封高平郡王建王恪本名審憲宗第十子也元和元年八月淄青節度李師古卒其弟師道擅領軍務以邀符節朝廷方興討罰之師不欲分兵兩地乃封審為建王間一日授開府儀同三司鄆州大都督充平盧軍淄青等州節度營田觀察處置陸運海運押新羅渤海兩蕃等使而以師道為節度留後不出閣七年改今名長慶元年薨鄜王憬長慶元年封開成四年七月薨長子溥平陽郡王瓊王悅長慶元年封第二子津河間郡王沔王恂長慶元年封長子瀛晉陵郡王婺王懌長慶元年封長子清新平郡王茂王愔長慶元年封長子潓武功郡王淄王崙頁憲宗第十四子也長慶元年封開成元年薨長子浣大和八年八月封許昌郡王第三子渙馮翊郡王衡王憺長慶元年封長子涉晉平郡王澶王長慶元年封長子濘雁門郡王棣王惴大中六年封咸通三年薨彭王愓大中三年封信王大中十四年封咸通八年薨榮王咸通三年封廣明元年八月十九日授開府儀同三司守司空其年十月九日薨其子令平嗣王穆宗五子敬宗皇帝文宗皇帝武宗皇帝懷懿太子湊安王溶懷懿太子湊穆宗第六子少寬和溫雅齊莊有度長慶初封漳王文宗以王守澄恃權深怒閹官欲盡誅之密令宰相宋申錫與外臣謀畫其計守澄門人鄭注伺知其事欲先事誅申錫以漳王賢而有望乃令神策虞候豆盧著告變言十六宅宮市典晏敬則朱訓與申錫親事王師文同謀不軌朱訓與王師文言聖上多病太子年小若立兄弟次是漳王要先結託乃於師文處得銀五鋌絹八百匹又晏敬則於十六宅將出漳王吳綾汗衫一領熟線綾一匹以答申錫其事皆鄭注憑虛結構而擒朱訓等於黃門獄鍛鍊偽成其款居三四日朝臣方悟其誣構諫官崔玄亮等閣中極諫叩頭出血請出申錫獄付外勘鞫鄭注輩恐其偽迹敗露乃請行貶黜制曰王者教先入愛義不遺親豈於同氣之中可致異詞之間如或慎修不至詿誤有聞構為厲階犯我邦紀未加殛竄尚屈彝章漳王湊手足之親盤石是固居崇寵秩列在戚藩頃多克順之心亦有尚賢之志而滿盈生患敗覆是圖姦凶會同謀議聯及污我皇化彰于外朝初駭豫衷再驚羣聽尚以未具獄詞猶資審慎建侯之命姑務從寬可降封巢縣公制下上令中使齎巢縣官告就十宅賜湊言國法須此爾宜寬勉八年薨贈封齊王鄭注伏誅帝思湊被陷而心傷之開成三年正月制曰褒善飾終王者常典況我友于之愛手足之親永言痛悼之懷用錫元良之命故齊王湊孕靈天宇擢秀本枝孝敬知於孩提惠和洽於親愛將固磐石遂分茅社學探蟻術之精智有象舟之妙好書樂善造次不失其清規置醴尊師風雨不忘其至敬方期台耇以保怡怡天胡不仁殲我同氣念周宣好愛之分長慟莫追覽魏文榮樂之言軫懷無已由是稽諸前典式展追榮特峻彝章表恩泉壤雖禮命之儀則爾而天倫之恨何攄遐想幽魂宜膺寵數可贈懷懿太子有司擇日册命安王溶穆宗第八子母楊賢妃長慶元年封大和八年授開府儀同三司檢校吏部尚書開成初敕安王潁王並以百官例逐月給料錢武宗即位李德裕秉政或告文宗崩時楊嗣復以與賢妃宗家欲立安王為嗣故王受禍嗣復貶官敬宗五子悼懷太子普梁王休復襄王執中紀王言揚陳王成美悼懷太子普敬宗長子也母曰郭妃寶曆元年封晉王大和二年薨年五歲上撫念之甚厚册贈悼懷太子梁王休復開成二年八月詔曰王者胙土畫疆封建子弟所以承衛帝室蕃茂本枝祖宗成式朕曷敢廢況天付正性夙奉至訓尊賢好善體仁由禮是可舉建侯之命膺分社之榮親親賢賢於是乎在敬宗皇帝第二子休復第三子執中第四子言揚第六子成美皆氣蘊沖和行推敬慎遊泳墳索佩服師言宜開土宇之封用申睦族之典休復可封梁王執中可封襄王言揚可封紀王成美可封陳王宜令有司擇日備禮册命襄王執中與梁王同時受封第三男樂平郡王紀王與襄王同時受封陳王成美與紀王言揚同時受封開成四年十月詔曰古先哲王之有天下也何嘗不正國本而承天序建儲二而主重離朕以寡昧祗荷丕圖虔恭寅畏思固鴻業慎擇全懿曠于旬時而卿士獻謀龜筮告吉以為少陽虛位願舉盛儀列聖垂休俾合豫志選賢而立式表無私敬宗皇帝第六男陳王成美天假忠孝日新道德溫文合雅謙敬保和裕端明之體度尚詩書之辭訓言皆中禮行不違仁是可以訓考舊章欽若成命授之匕鬯以奉粢盛宜回朱邸之榮俾踐青宮之重可立為皇太子宜令所司擇日備禮册命自莊恪太子薨將相大臣洎職言者拜章面陳凡纍月上遂命立陳王未行册禮復降仍舊其年殂於藩邸第十九男儼宣城郡王文宗二子莊恪太子永蔣王宗儉莊恪太子永文宗長子也母曰王德妃大和四年正月封魯王六年上以王年幼思得賢傅輔導之時王傅和元亮因待制召問元亮出於卒吏不知書一不能對後宰相延英奏事上從容曰魯王質性可教宜擇賢士大夫為官屬不可復用和元亮之輩因以戶部侍郎庾敬休守本官兼魯王傅太常卿鄭肅守本官兼王府長史戶部郎中李踐方守本官兼王府司馬其年十月降詔册為皇太子上自即位承敬宗盤遊荒怠之後恭儉惕慎以安天下以晉王謹願且欲建為儲二未幾晉王薨上哀悼甚不復言東宮事久之今有是命中外慶悅後以王起陳夷行為侍讀開成三年上以皇太子宴遊敗度不可教導將議廢黜特開延英召宰臣及兩省御史臺五品已上南班四品已上官對宰臣及衆官以為儲后年小可俟改過國本至重願寬宥御史中丞狄兼上前雪涕以諫詞理懇切翌日翰林學士六人洎神策六軍軍使十六人又進表陳論上意稍解其日一更太子歸少陽院以中人張克己柏常心充少陽院使如京使王少華判官袁載和及品官白身內園小兒官人等數十人連坐至死及剝色流竄尋詔侍讀竇宗直周敬慎依前隔日入少陽院其年薨敕兵部尚書王起撰哀册文曰維大唐開成三年歲次戊午十月乙酉朔十六日庚子皇太子薨于少陽院十七日辛丑遷座于大吉殿十一月乙卯朔二十四日戊寅命册使太子太師兼右僕射門下侍郎國子祭酒平章事鄭覃副使中書侍郎平章事楊嗣復持節册諡曰莊恪十二月乙酉朔十二月丙申葬于驪山之北原莊恪陵禮也玉琯歲窮金壺漏盡祖奠告徹哀笳將引庭滅燎而月寒路搖旍而風緊皇帝念主鬯之缺位悼佩觿之夭年銅樓已閉銀牒徒懸方追思於對日遽冥寞而賓天典册具舉文物咸備爰詔侍臣顯揚上嗣其詞曰皇矣帝緒肇基綿古種德尊道宗文祖武上聖開成天下和平儲祉發祥是生元良覃訏之初岐嶷用彰蘊才遊藝玉裕金相既免孩提是加封殖俾維城於東魯錫介圭於上國辭榮朱邸正位青宮尊師重傅養德含聰畏馳道而不絶問寢門而益恭招賢警戒齒胄謙沖冀日躋於三善奉天慈於九重漢莊好學既顯於外魏丕能文方循於內美不二於顏過嘉得三於鯉退焜耀甲觀鏗鏘瑜珮方積善於為山何反真而遊岱嗚呼哀哉憂兢損壽沉痾始遘羣望並走百靈宜祐吳客之問徒為越人之方靡救占前星之掩曜知東朝之降咎天垂象而則然人由己而何有嗚呼哀哉稅駕乘華兮即宮夜臺鳳笙長絶兮蜃輅徐來啓青宮而右出歷玄灞而左回度凋林兮魂斷入曠野兮心摧水助挽而幽咽雲帶翣而徘徊悲佳城之已掩見新廟之方開嗚呼哀哉授經兮曷期執紼兮增欷九原作兮何嗟及七日還兮安可希有少海之波逝無西園之蓋飛商山之羽翼已散望苑之賓客咸歸瑟彼玉簡閟于泉扉用傳信於文字願不昧於音徽嗚呼哀哉初上以太子稍長不循法度昵近小人欲加廢黜迫於公卿之請乃止太子終不悛改至是暴薨時傳云太子德妃之出也晚年寵衰賢妃楊氏恩渥方深懼太子他日不利於己故日加誣譖太子終不能自辨明也太子既薨上意追悔四年因會寧殿宴小兒緣橦有一夫在下憂其墮地有若狂者上問之乃其父也上因感泣謂左右曰朕富有天下不能全一子遂召樂官劉楚材宮人張十十等責之曰陷吾太子皆爾曹也今已有太子更欲踵前耶立命殺之蔣王宗儉文宗第二子開成二年封武宗五子杞王峻開成五年封益王峴兗王岐德王嶧昌王嵯皆會昌二年封宣宗十一子懿宗皇帝餘並封王靖懷太子漢會昌六年封雍王大中六年薨册贈靖懷太子雅王涇宣宗第二子大中元年封衛王灌大中十一年封十四年薨夔王滋宣宗第三子也會昌六年封咸通四年薨慶王沂第四子也會昌六年封大中十四年薨濮王澤第五子也大中二年封鄂王潤第六子也大中五年封乾符三年薨懷王洽第七子也大中八年封昭王汭第八子也大中八年封乾符三年薨康王汶大中八年封廣王澭大中十一年封懿宗八子僖宗皇帝昭宗皇帝餘並封王魏王佾咸通三年封涼王健咸通三年封乾符六年薨蜀王佶咸通三年封威王侃咸通六年封郢王十年改封今王吉王保咸通十三年封文德元年八月九日授開府儀同三司檢校太傅仍加食邑三百戶睦王倚咸通十三年封僖宗二子建王震中和元年九月十六日封益王升光啓三年十一月十四日封昭宗十子哀帝餘並封王德王裕昭宗長子也大順二年六月二十八日封乾寧四年二月十四日册為皇太子時駕在華州韓建畏諸王主兵誘防城卒張行思花重武相次告通王以下欲殺建建他日又造訛言云諸王欲劫遷車駕別幸藩鎮諸王懼詣建自陳建乃延入臥內密遣人奏云今日睦王濟王韶王通王彭王韓王儀王陳王等八人到臣理所不測事由臣竊量事體不合與諸王相見兼恐久在臣所於事非宜忽然及門意不可測又上疏抗請歸十六宅如是者數四帝不允建懼為諸王所圖乃以精甲數千圍行宮請誅定州護駕軍都將李筠帝懼甚詔斬筠於大雲橋其三都軍士尋放還本道殿後都亦與三都元繞行宮扈蹕至是並急詔散之罷諸王兵柄建慮上不悅乃上表請立德王為皇太子其年八月嗣延王戒丕自太原還詔與通王已下八王並賜死于石堤谷光化末樞密使劉季述王仲先等幽昭宗於東內册裕為帝及天復初誅季述仲先與寺人藏於右軍羣臣請殺之昭宗曰太子沖幼為賊輩所立依舊令歸少陽院及朱全忠自鳳翔迎駕還京以德王眉目疏秀春秋漸盛惡之謂崔胤曰德王曾竊居寶位天下知之大義滅親何得久留是教後代以不孝也請公密啓胤然之昭宗不納他日言於全忠全忠曰此國家大事臣安敢竊議乃崔胤賣臣也尋以哀帝為天下兵馬元帥後昭宗至洛下一日幸福先寺謂樞密使蔣玄暉曰德王朕之愛子全忠何故須令廢之又欲殺之言訖淚下因齧其中指血流玄暉具報全忠由是轉恚昭宗遇弒之日蔣玄暉於西內置社筵酒酣德王已下六王皆為玄暉所殺投尸九曲池棣王祤乾寧元年十月八日封虔王禊沂王禋遂王禕並與棣王同時封册景王祕乾寧四年十月二十二日封祁王祺與景王同時封册雅王禛瓊王祥並光化元年十一月九日封嗣襄王熅性柔善無他能光啓二年春車駕在寶雞西軍逼請幸岐隴帝以數十騎自大散關幸興元時熅有疾不能從因為朱玫所挾至鳳翔有臺省官從行未及者僅百人四月玫乃與宰相蕭遘裴徹率羣僚册熅為監國熅以鄭昌圖判度支而鹽鐵戶部各置副使三司之事一以委焉目曰廢置相公五月熅遣偽戶部侍郎柳陟等十餘人分諭關東河北諸道納偽命者甚衆十月朱玫率蕭遘等册熅為帝改元曰永貞遙尊僖宗為太上元皇聖帝初河中王重榮表率東諸侯進貢唯蔡賊與太原不順秦宗權自僭號太原不協于朱玫故也及王行瑜殺朱玫熅奔至渭上王重榮使人迎之熅與偽百官泣別謂曰朕見重榮當令與卿等各備所服以接卿殺朱玫之翊日熅為鄜州亂軍所殺行瑜遂函首送行在熅四月監國至十二月死凡在偽位九月矣朱玫者邠州人也少從邊以功歷郡守乾符末領邠寧節制中和中收復京師與太原李克用東方達同制加使相光啓元年冬受詔招討河中軍敗以軍容使田令孜失策時諸軍皆怒乃徇人情表請誅令孜令孜與楊復恭挾帝西幸玫又失策乃虜嗣襄王熅與蕭遘等同立為帝大行封拜以啖諸侯而天下之人歸者十五六焉與李昌符始謀册立及後玫自稱大丞相吐握在己昌符怒之乃以表送款行在復密結樞密使楊復恭人心乃離時行在出令有能斬朱玫首者則授以邠帥賊將王行瑜以大唐峯不利退保鳳州終慮得罪與腹心密謀徑入京師時玫有第在和善里行瑜率兵仗入見玫猶責以擅還行瑜曰我要代爾領邠州節制何復多言遂斬之王行瑜者邠州人也少隸本軍事朱玫為偏將平巢寇有功光啓二年玫册嗣襄王熅為偽帝授天平軍節度使領兵守大散關攻大唐峯為李鋌所敗乃送款行在以部下反攻朱玫于闕下斬之因授邠州節度使後平楊守亮于山南以功纍加至中書令景福中逼朝廷加尚書令宰臣韋昭度密奏不可會韓建李茂貞稱兵入覲欲行廢立不果乃請殺昭度與李磎是歲又遣弟行約攻河中河中引太原軍至由是大敗行約行實劫駕不獲遂歸邠州行瑜率兵屯梨園王師圍急行實行約先敗次保龍泉行瑜又遁至邠州不能守乾寧二年十一月挈族至慶州為部下所殺史臣曰自天寶已降內官握禁旅中闈纂繼皆出其心故手才攬於萬機目已睨於六宅防間禁錮不近人情文宗好古睦親至敦友悌悔前非於齊湊褒以儲闈付後事於陳王歸其胄席或降輿朱邸對食瓊筵怡怡申肺腑之情穆穆盡棣華之義近朝盛美可洽風謠昭肅惑讒毒流安邸雖覽大臣之議欲使磐維竟無出閣之儀終身幽枉谷風之怨可為傷心大中咸通已來寶圖世及犬牙麟趾雖不逮於姬周豆什布謠未甚悲於宗籍於姬不足比魏有餘贊曰周封子弟運祚綿長管蔡勦絶魯魏克昌誅叛賞順王者大綱法不私親棣萼其芳
