body:
  text: 舊唐書卷一百一十四列傳第六十四魯炅裴茙來瑱周智光魯炅范陽人也身長七尺餘涉獵書史天寶六年隴右節度使哥舒翰引為別奏顏真卿為監察御史使至隴右翰嘗設宴真卿謂翰曰中丞自郎將授將軍便登節制後生可畏得無人乎炅時立在階下翰指炅曰此人後當為節度使矣後以隴右破吐蕃跳蕩功纍授右領軍大將軍同正員賜紫金魚袋祿山之亂選任將帥十五載正月拜炅上洛太守未行遷南陽太守本郡守捉仍充防禦使尋兼御史大夫充南陽節度使以嶺南黔中山南東道子弟五萬人屯葉縣北滍水之南築柵四面掘壕以自固至五月賊將武令珣畢思琛等來擊之衆欲出戰炅不許賊於營西順風燒煙營內坐立不得橫門扇及木爭出賊矢集如雨炅與中使薛道等挺身遁走餘衆盡沒嶺南節度使何履光黔中節度使趙國珍襄陽太守徐浩未至裨將嶺南黔中荊襄子弟半在軍多懷金銀為資糧軍資器械盡棄於路如山積至是賊徒不勝其富炅收合殘卒保南陽郡為賊所圍尋而潼關失守賊使哥舒翰招之不從又使僞將豫州刺史武令珣等攻之纍月不能克武令珣死又令田承嗣攻之潁川太守來瑱襄陽太守魏仲犀合勢救之犀使弟孟馴為將領兵至明府橋望賊而走衆遂大敗炅城中食盡牛皮筋角而食之米斗至四五十千有價無米鼠一頭至四百文餓死者相枕藉肅宗使中官將軍曹日升來宣慰路絶不得入日升請單騎入致命仲犀曰不可賊若擒吾敕使我亦何安顏真卿適自河北次于襄陽謂仲犀曰曹使既果決不顧萬死之地何得沮之縱為賊所獲是亡一使者苟得入城則萬人之心固矣公何愛焉中官馮廷瓌曰將軍必能入我請以兩騎助之日升又自有傔騎數人仲犀又以數騎共十人同行賊徒望見知其驍鋭不敢逼日升既入城炅衆初以為望絶忽有使來宣命皆踴躍一心日升以其十人至襄陽取糧賊雖追之不敢擊遂以一千人取音聲路運糧而入賊亦不能遏又得相持數月炅在圍中一年救兵不至晝夜苦戰人相食至德二年五月十五日率衆持滿傅矢突圍而出南陽投襄陽田承嗣來追苦戰二日殺賊甚衆賊又知其決死遂不敢逼朝廷因除御史大夫襄陽節度使時賊志欲南侵江漢賴炅奮命扼其衝要南夏所以保全十月王師收兩京承嗣令珣等奔於河北南陽遭大亂之後距鄧州二百里人煙斷絶遺骸委積於牆塹間十二月策勳行賞詔曰特進太僕卿南陽郡守兼御史大夫權知襄陽節度事上柱國金鄉縣公魯炅蘊是韜略副茲節制竭節保邦悉心陷敵表之旗幟分以土田可開府儀同三司兼御史大夫封岐國公食實封二百戶兼京兆尹乾元元年兼鄭州刺史充鄭陳潁亳等州節度使上元二年為淮西襄陽節度使鄧州刺史十月與朔方節度使司徒郭子儀河東節度使太尉李光弼等九節度同圍安慶緒於相州炅領淮西襄陽節度行營步卒萬人馬軍三百以李抱玉為兵馬使炅分界知東面之北二年六月六日賊將史思明自范陽來救戰於安陽河北王師不利炅中流矢奔退時諸節度以回紇戰敗因而退散盡棄軍糧器械所過虜掠炅兵士剽奪尤甚人因驚怨五日至新鄭縣聞郭子儀已整衆屯穀水李光弼還太原炅憂懼仰藥而卒裴茙以門蔭入仕纍遷京兆府司録參軍來瑱鎮陝州引為判官瑱移襄州又為瑱行軍司馬瑱遇之甚厚及瑱淮西之敗逗留不行茙密表聞奏朝廷以瑱掌重兵惡之密詔以茙代瑱為襄州刺史充防禦使茙本鎮穀城及受密命乃率麾下二千人赴襄陽時瑱亦奉詔依舊任瑱遂設具於江津以俟之茙初聲言假道入朝及見瑱即云奉代且欲視事瑱報曰瑱已奉恩命復任此茙惶惑喻其麾下曰此言必妄遂引射瑱軍因與瑱兵交戰茙大敗士卒死傷殆盡茙走還穀城舊營瑱追擒之朝旨務安漢南乃歸咎於茙寶應元年七月敕曰前襄州刺史裴茙性本頑疏行惟狂悖頃因試用爰委軍戎守在要衝無聞方略所以申命來瑱重撫漢南即宜奔赴闕廷謝其曠職而乃顧惜名位輕圖異端誣構忠良妄興兵甲遽令追召敢欲逗留是有無君之心不唯罔上之罪又轉輸之物軍國所資擅為費用其數甚廣據其抵犯合置嚴誅但自朕登極已來屢施恩宥肆諸朝市所未忍為宜寬殊死之刑俾就投荒之謫宜除名長流費州茙器局輕褊初興師徒給用無節及敗撓遲回赴召將至京師會有是命既行至藍田驛賜自盡來瑱邠州永壽人也父曜起於卒伍開元十八年為鴻臚卿同正員安西副都護持節磧西副大使四鎮節度使後為右領軍大將軍仗內五坊等使名著西陲寶應元年以子貴贈太子太保瑱少尚名節慷慨有大志頗涉書傳天寶初四鎮從職十一載為左贊善大夫殿中侍御史充伊西北庭行軍司馬玄宗詔朝臣舉智謀果決才堪統衆者各一人拾遺張鎬薦瑱有縱橫之略臨事能斷堪當禦侮之任丁母憂以孝聞安祿山反張復薦之起復兼汝南郡太守未行改潁川太守賊攻之城中積粟素多瑱繕修有備賊繼至城下瑱親射之無不應弦而斃賊使降將畢思琛招瑱琛即瑱父曜故將城下拜泣弔瑱瑱不應前後殺賊頗衆咸呼瑱為來嚼鐵以功加銀青光祿大夫攝御史中丞本郡防禦使及河南淮南遊奕逐要招討等使魯炅敗於葉縣退守南陽乃以瑱為南陽太守兼御史中丞充山南東道節度防禦處置等使以代炅尋以嗣虢王巨為御史大夫河南節度使因奏炅能守南陽詔各復本位賊攻圍南陽纍月瑱分兵與襄陽節度使魏仲犀救之犀遣弟孟馴將兵至明府橋望風敗走賊追蹙大敗而還兵素少遇敗人情恟懼瑱綏撫訓練賊不能侵詔為淮南西道節度使收復兩京與魯炅同制加開府儀同三司兼御史大夫封潁國公食實封二百戶餘如故乾元元年召為殿中監二年初除涼州刺史河南節度經略副大使未行屬相州官軍為史思明所敗東京震駭元帥司徒郭子儀鎮穀水乃以瑱為陝州刺史充陝虢等州節度并潼關防禦團練鎮守使乾元三年四月十三日襄州軍將張維瑾曹玠率衆謀亂殺刺史史翽以瑱為襄州刺史兼御史大夫充山南東道襄鄧均房金商隨郢復十州節度觀察處置使上元三年肅宗召瑱入京瑱樂襄州將士亦慕瑱之政因諷將吏州牧縣宰上表請留之身赴詔命行及鄧州復詔歸鎮肅宗聞其計而惡之後呂諲王仲升及中官皆言瑱布恩惠懼其得士心以瑱為鄧州刺史充山南東道襄鄧唐復郢隨等六州節度餘並如故俄而淮西節度王仲升與賊將謝欽讓戰於申州城下為賊所虜初仲升被圍纍月呂諲病於江陵瑱在襄州又恐仲升構己遂顧望不救及師出仲升已沒裴茙頻表陳瑱之狀謀奪其位稱瑱善謀而勇崛強難制宜早除之可一戰而擒也肅宗然之遂以瑱檢校戶部尚書兼御史大夫安州刺史充淮西申安蘄黃光沔節度觀察兼河南陳豫許鄭汴曹宋潁泗十五州節度觀察使外示尊崇實奪其權也加裴茙兼御史中丞襄鄧等七州防禦使以代之瑱懼不自安上表稱淮西無糧饋軍臣去秋種得麥請待收麥畢赴上復諷屬吏請留之裴茙於商州召募以窺去就寶應元年五月代宗即位因復授瑱襄州節度奉義軍渭北兵馬等使官如故潛令裴茙圖之其月十九日裴茙率衆浮漢江而下日暮候者白瑱謀於帳下副使薛南陽曰尚書奉詔留鎮裴茙以兵代是無名也且茙之智勇非尚書敵也衆心歸尚書不歸於茙彼若乘我之不虞今夕而至直燒城市我衆必懼而亂彼乘亂而擊則可憂也若及明而至尚書破之必矣翌日平明茙督軍士五千列于穀水北瑱以兵逆之登高而陳呼茙將士告之曰爾何事來曰尚書不受命謹奉中丞伐罪人若尚書受替謹當釋兵瑱曰恩制復除瑱此州乃取告身敕書以示茙軍皆曰僞也承命討君豈千里空歸富貴在於今日遂爭射之瑱奔歸旗下薛南陽曰事急矣請以三百騎為奇兵尚書勿與之戰兩軍相見遂以麾下旁萬山而出其背表𩹉夾擊茙軍大敗投水而死殺獲殆盡茙及弟薦脫身北走妻子並為瑱所擒瑱甚厚撫之因抗表謝罪擒茙於申口送至京師長流費州賜死於藍田故驛八月瑱入朝謝罪代宗特寵異之遷兵部尚書同中書門下平章事依前山南東道節度觀察等使代左僕射裴冕充山陵使時中官驃騎大將軍程元振居中用事發瑱言涉不順王仲升賊平來歸證瑱與賊合故令仲升陷賊三年代宗含怒久之因是下詔曰春秋之義貴在於必書君臣之間法存於無赦沮勸式遵於前典進退莫匪於至公惡稔既彰明罰難貸開府儀同三司行兵部尚書中書門下平章事充山南東道節度觀察處置等使上柱國潁國公來瑱謬當任用素乏器能亟歷班榮纍經節制蒞職蔑聞於成績登朝虛美於崇名頃者分閫頒條久淹江漢或頻徵不至或移鎮遲留實乖堂陛之儀爰及干戈之忿朕以舊臣宿將道在含弘會其來庭用甄後效超登宰輔光拜夏卿列在三台掩其一眚山陵先遠事委近臣謀謨素闕於大猷卜祝頗聞於私議實虧周慎且間樞言何以輔弼鼎司儀刑簪紱據其所犯合置殊科以嘗侍軒闥用存寬免之辜緬範舊章兼膺黜削之譴其身官爵一切削除寶應二年正月貶播州縣尉員外置翌日賜死於鄠縣籍沒其家瑱之被刑也門客四散掩于坎中校書郎殷亮後至獨哭於尸側貨所乘驢以備棺衾夜詣縣令長孫演以情告之演義而從之亮夜葬而祭走歸京師代宗既悟元振之誣構積其過而配流溱州先是瑱行軍司馬龐充統兵二千人赴河南至汝州聞瑱死將士魚目等回兵襲襄州左兵馬使李昭禦之奔房州昭及薛南陽與右兵馬使梁崇義不叶相圖為崇義所殺朝廷授崇義節度使兼御史中丞以代瑱崇義為瑱立祠四時拜饗不居瑱廳及正堂視事於東廂下搆一小室而寢止抗疏哀請收葬優詔許之廣德元年追復官爵周智光本以騎射從軍常有戎捷自行間登偏裨宦官魚朝恩為觀軍容使鎮陝州與之昵狎朝恩以扈從功恩渥崇厚奏請多允屢於上前賞拔智光纍遷華州刺史同華二州節度使及潼關防禦使加檢校工部尚書兼御史大夫永泰元年吐蕃回紇党項羌渾奴剌十餘萬衆寇奉天醴泉等縣智光邀戰破於澄城收駝馬軍資萬計因逐賊至鄜州智光與杜冕不協遂殺鄜州刺史張麟坑杜冕家屬八十一人焚坊州廬舍三千餘家懼罪召不赴命朝廷外示優容俾杜冕使梁州實避讎也永泰二年十二月智光專殺前虢州刺史兼御史中丞龐充充方居縗絰潛行智光追而斬之又劫諸節度使進奉貨物及轉運米二萬石據州反智光自鄜坊專殺朝廷患之遂聚亡命不逞之徒衆至數萬縱其剽掠以結其心初與陝州節度使皇甫溫不協監軍張志斌自陝入奏智光館給禮慢志斌責其不肅智光大怒曰僕固懷恩豈有反狀皆由爾鼠輩作福作威懼死不敢入朝我本不反今為爾作之因叱下斬之臠其肉以飼從者時淮南節度使檢校右僕射崔圓入覲方物百萬智光強留其半舉選之士竦駭或竊同州路以過智光使部將邀斬於乾坑店橫死者衆優詔以智光為尚書左僕射遣中使余元仙持告身以授之智光受詔慢罵曰智光有數子皆彎弓二百斤有萬人敵堪出將入相只如挾天子令諸侯天下只有周智光合作因歷數大臣之過元仙股栗智光贈絹百匹遣之於州郭置生祠俾將吏百姓祈禱大曆二年正月密詔關內河東副元帥中書令郭子儀率兵討智光許以便宜從事時同華路絶上召子儀女壻工部侍郎趙縱受口詔付子儀縱裂帛寫詔置蠟丸中遣家童間道達焉子儀奉詔將出師華州將士相顧攜二智光大將李漢惠自同州以其所管降子儀貶智光為澧州刺史散官勳封如故乃聽將一百人隨身便路赴任其所部將士官吏一無所問乃以兵部侍郎張仲光為華州刺史兼御史大夫潼關防禦使又以大理卿敬括為同州刺史兼御史大夫長春宮等使是日智光為帳下將斬首并子元耀元幹等二人來獻丁卯梟智光首于皇城之南街二子腰斬以示衆判官監察御史邵賁都虞候蔣羅漢並伏誅餘黨各以親疏准法定罪命有司具儀奏告太清宮太廟七陵時淮西節度使李忠臣入覲次潼關聞智光阻兵駐所部將往禦之及智光死忠臣進兵入華州大掠自赤水至潼關二百里間畜産財物殆盡官吏至有著紙衣或數日不食者史臣曰嘗讀李陵傳戰敗不能死屈節降虜庭君不得為忠臣母不得為孝子每長歎久之炅收滍水敗衆守南陽孤城每蹈危機竟效死節料敵雖非其良將事君不失為忠臣茙浮躁無行狂悖用兵宜其死矣瑱善軍政得士心庶幾干城禦侮者哉始固名位為裴茙巧言終歸朝廷遭元振誣構賜死之辜匪辨用刑之道不明致舊將立祠門吏偷葬出將入相一至於斯惜哉智光狂悖不足與論贊曰魯炅竭節來瑱枉死裴茙凶人智光逆子
