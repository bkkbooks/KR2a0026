body:
  text: 舊唐書卷一百七十一列傳第一百二十一李渤張仲方裴潾張臯附李中敏李甘高元裕兄少逸李漢李景儉李渤字濬之後魏橫野將軍申國公發之後祖玄圭衛尉寺主簿父鈞殿中侍御史以母喪不時舉流于施州渤恥其家污堅苦不仕勵志於文學不從科舉隱於嵩山以讀書業文為事元和初戶部侍郎鹽鐵轉運使李巽諫議大夫韋況更薦之以山人徵為左拾遺渤託疾不赴遂家東都朝廷政有得失附章疏陳論又撰禦戎新録二十卷表獻之九年以著作郎徵之詔曰特降新恩用清舊議渤於是赴官歲餘遷右補闕連上章疏忤旨改丹王府咨議參軍分司東都十二年遷贊善大夫依前分司十三年遣人上疏論時政凡五事一禮樂二食貨三刑政四議都五辨讎渤以散秩在東都以上章疏為己任前後四十五封再遷為庫部員外郎時皇甫鎛作相剝下希旨會澤潞節度使郗士美卒渤充弔祭使路次陝西渤上疏曰臣出使經行歷求利病竊知渭南縣長源鄉本有四百戶今才一百餘戶闅鄉縣本有三千戶今才有一千戶其他州縣大約相似訪尋積弊始自均攤逃戶凡十家之內大半逃亡亦須五家攤稅似投石井中非到底不止攤逃之弊苛虐如斯此皆聚斂之臣剝下媚上唯思竭澤不慮無魚乞降詔書絶攤逃之弊其逃亡戶以其家産錢數為定徵有所欠乞降特恩免之計不數年人必歸於農矣夫農者國之本本立然後可以議太平若不由茲而云太平者謬矣又言道途不修驛馬多死憲宗覽疏驚異即以飛龍馬數百匹付畿內諸驛渤既以草疏切直大忤宰相乃謝病東歸穆宗即位召為考功員外郎十一月定京官考不避權幸皆行升黜奏曰宰臣蕭俯段文昌崔植是陛下君臨之初用為輔弼安危理亂決在此時況陛下思天下和平敬大臣禮切固未有昵比左右侈滿自賢之心而宰相之權宰相之事陛下一以付之實君義臣行千載一遇之時也此時若失他更無時而俯等上不能推至公申炯誡陳先王道德以沃君心又不能正色匪躬振舉舊法復百司之本俾教化大立臣聞政之興廢在於賞罰俯等作相已來未聞奬一人德義舉守官奉公者使天下在官之徒有所激勸又不聞黜一人職事不理持祿養驕者使尸祿之徒有所懼如此則刑法不立矣邪正莫辨混然無章教化不行賞罰不設天下之事復何望哉一昨陛下遊幸驪山宰相翰林學士是陛下股肱心腹宜皆知之蕭俯等不能先事未形忘軀懇諫而使陛下有忽諫之名流於史册是陷君於過也孔子曰所謂大臣者以道事君不可則止若俯等言行計從不當如是若言不行計不從須奉身速退不宜尸素於化源進退戾也何所避辭其蕭俯段文昌崔植三人并翰林學士杜元穎等並請考中下御史大夫李絳左散騎常侍張惟素右散騎常侍李益等諫幸驪山鄭覃等諫畋遊是皆恐陛下行幸不息恣情無度又恐馬有銜蹶不測之變風寒生疾之憂急奏無所詣國璽委於婦人中幸之手絳等能率御史諫官論列於朝有懇激事君之體其李絳張惟素李益三人伏請賜上下考外特與遷官以彰陛下優忠賞諫之美其崔元略冠供奉之首合考上下緣與于翬上下考于翬以犯贓處死準令須降請賜考中中大理卿許季同任使于翬韋道沖韋正牧皆以犯贓或左降或處死合考中下然頃者陷劉闢之亂棄家歸朝忠節明著今宜以功補過請賜考中中少府監裴通職事修舉合考中上以其請追封所生母而捨嫡母是明罔於君幽欺其先請考中下伏以昔在宰夫入寢擅飲師曠李調今愚臣守官請書宰相學士中下考上愛聖運下振頽綱故臣懼不言之為罪不懼言之為罪也其三品官考伏緣限在今月內進輒先具如前其四品以下官續具條疏聞奏狀入留中不下議者以宰輔曠官自宜上疏論列而渤越職釣名非盡事君之道未幾渤以墜馬傷足請告會魏博節度使田弘正表渤為副使杜元穎奏曰渤賣直沽名動多狂躁聖恩矜貸且使居官而干進多端外交方鎮遠求奏請不能自安久留在朝轉恐生事乃出為虔州刺史渤至州奏還鄰境信州所移兩稅錢二百萬免稅米二萬斛減所由一千六百人觀察使以其事上聞未滿歲遷江州刺史張平叔判度支奏徵久遠逋懸渤在州上疏曰伏奉詔敕云度支使所奏令臣設計徵填當州貞元二年逃戶所欠錢四千四百一十貫臣當州管田二千一百九十七頃今已旱死一千九百頃有餘若更勒徇度支使所為必懼史官書陛下於大旱中徵三十六年前逋懸臣任刺史罪無所逃臣既上不副聖情下不忍鞭笞黎庶不敢輕持符印特乞放臣歸田乃下詔曰江州所奏實為懇誠若不蠲容必難存濟所訴逋欠並放長慶二年入為職方郎中三年遷諫議大夫敬宗沖年即位坐朝常晚一日入閣久不坐羣臣候立紫宸門外有耆年衰病者幾將頓仆渤出次白宰相曰昨日拜疏陳論今坐益晚是諫官不能回人主之意渤之罪也請先出閣待罪於金吾仗語次喚仗乃止渤又以左右常侍職參規諷而循默無言論之曰若設官不責其事不如罷之以省經費苟未能罷則請責職業渤充理匭使奏曰事之大者聞奏次申中書門下次移諸司諸司處理不當再來投匭即具事奏聞如妄訴無理本罪外加一等準敕告密人付金吾留身待進止今欲留身後牒臺府冀止絶凶人從之長慶寶曆中政出多門事歸邪幸渤不顧患難章疏論列曾無虛日帝雖昏縱亦為之感悟轉給事中面賜金紫寶曆元年改元大赦先是鄠縣令崔發聞門外喧鬬縣吏言五坊使下毆擊百姓發怒命吏捕之曳抨既至時已曛黑不問色目良久與語乃知是一內官天子聞之怒收發繫御史臺御樓之日放繫囚發亦在雞竿下時有品官五十餘人持仗毆發縱橫亂擊發破面折齒臺吏以席蔽之方免是日繫囚皆釋發獨不免渤疏論之曰縣令不合曳中人中人不合毆御囚其罪一也然縣令所犯在恩前中人所犯在恩後中人橫暴一至於此是朝廷馴致使然若不早正刑書臣恐四夷之人及藩鎮奏事傳道此語則慢易之心萌矣渤又宣言于朝云郊禮前一日兩神策軍於青城內奪京兆府進食牙盤不時處置致有毆擊崔發之事上聞之按問左右皆言無奪食事以渤黨發出為桂州刺史兼御史中丞充桂管都防禦觀察使渤雖被斥正論不已而諫官繼論其屈後宰相李逢吉竇易直李程因延英上語及崔發逢吉等奏曰崔發凌轢中人誠大不敬然發母是故相韋貫之姊年僅八十自發下獄積憂成疾伏以陛下孝治天下稍垂恩宥帝愍然良久曰比諫官論奏但言發屈未嘗言不敬之罪亦不言有老母如卿等言寧無愍惻即遣中使送發至其家兼撫問發母韋夫人號哭對中使杖發四十拜章謝恩帝又遣中使慰安之渤在桂管二年風恙求代罷歸洛陽大和五年以太子賓客徵至京師月餘卒時年五十九贈禮部尚書渤孤貞力行操尚不苟合而闒茸之流非其沽激至於以言擯退終不息言以救時病服名節者重之子祝會昌中登進士第辟諸侯府張仲方韶州始興人祖九臯廣州刺史殿中監嶺南節度使父抗贈右僕射仲方伯祖始興文獻公九齡開元朝名相仲方貞元中進士擢第宏辭登科釋褐集賢校理丁母憂免服闋補祕書省正字調授咸陽尉出為邠州從事入朝歷侍御史倉部員外郎會呂溫羊士諤誣告宰相李吉甫陰事二人俱貶仲方坐呂溫貢舉門生出為金州刺史吉甫卒入為度支郎中時太常定吉甫諡為恭懿博士尉遲汾請為敬憲仲方駁議曰古者易名請諡禮之典也處大位者取其巨節蔑諸細行垂範當代昭示後人然後書之垂于不朽善善惡惡不可以誣故稱一字則至明矣定褒貶是非之宜泯同異紛綸之論贈司徒吉甫稟氣生材乘時佐治博涉多藝含章炳文燮贊陰陽經緯邦國惜乎通敏資性便媚取容故載踐樞衡疊致台衮大權在己沈謀罕成好惡徇情輕諾寡信諂淚在臉遇便則流巧言如簧應機必發夫人臣之翼戴元后者端恪致治孜孜夙夜緝熙庶績平章百揆兵者凶器不可從我始及乎伐罪則料敵以成功至使內有害輔臣之盜外有懷毒蠆之孽師徒暴野戎馬生郊皇上旰食宵衣公卿大夫且慚且恥農人不得在畝緝婦不得在桑耗斂賦之常資散帑廩之中積徵邊徼之備竭運挽之勞僵尸血流胔骼成嶽酷毒之痛號訴無辜剿絶羣生逮今四載禍胎之兆實始其謀遺君父之憂而豈謂之先覺者乎夫論大功者不可以妄取不可以枉致為資畫者體理不顯不競而豈妨令美當削平西蜀乃言語侍從之臣擒翦東吳則訏謨廊廟之輔較其功則有異言其力則不倫何捨其所重而録其所輕收其所小而略其所大且奢靡是嗜而曰愛人以儉受授無守而曰慎才以補斥諫諍之士于外豈不近之蔽聰乎舉忠烈之廟于內豈不近之昵愛也焉有蔽聰昵愛家範無制而能垂法作程憲章百度乎謹按諡法敬以直內內而不肅何以刑于外憲者法也戴記曰憲章文武又曰發慮憲義以為敬恪終始載考歷位未嘗劾一法官議一小獄及居重位以安和平易寬柔自處考其名與其行不類研其事與其道不侔一定之辭惟精惟審異日詳制貽諸史官請俟蔡寇將平天下無事然後都堂聚議諡亦未遲憲宗方用兵惡仲方深言其事怒甚貶為遂州司馬量移復州司馬遷河東少尹未幾拜鄭州刺史滎陽大海佛寺有高祖為隋鄭州刺史日為太宗疾祈福於此寺造石像一軀凡刊勒十六字以志之歲久刓缺滎陽令李光慶重加修飾仲方再刊石記之以聞及敬宗即位李程作相與仲方同年登進士第召仲方為右諫議大夫敬宗童年戲慢詔淮南王播造上巳競渡船三十隻播將船材于京師造作計用半年轉運之費方得成仲方詣延英面論言甚懇激帝只令造十隻以進帝又欲幸華清宮仲方諫曰萬乘所幸出須備儀無宜輕行以失威重帝雖不從慰勞之大和初出為福州刺史兼御史中丞福建觀察使三年入為太子賓客五年四月轉右散騎常侍七年李德裕輔政出為太子賓客分司八年德裕罷相李宗閔復召仲方為常侍九年十一月李訓之亂四宰相中丞京兆尹皆死翌日兩省官入朝宣政衙門未開百官錯立於朝堂無人吏引接逡巡閣門使馬元贄斜開宣政衙門傳宣曰有敕召左散騎常侍張仲方仲方出班元贄宣曰仲方可京兆尹然後衙門大開喚仗月餘鄭覃作相用薛元賞為京兆尹出仲方為華州刺史開成元年五月入為祕書監外議以鄭覃黨李德裕排擯仲方覃恐涉朋黨因紫宸奏事覃啓曰丞郎闕人臣欲用張仲方文宗曰中臺侍郎朝廷華選仲方作牧守無政安可以丞郎處之纍加銀青光祿大夫上柱國曲江縣開國伯食邑七百戶二年四月卒仲方貞確自立綽有祖風自駁諡之後為德裕之黨擯斥坎坷而歿人士悲之有文集三十卷兄仲端位終都昌令弟仲孚登進士第為監察御史裴潾河東人也少篤學善隸書以門蔭入仕元和初纍遷右拾遺轉左補闕元和中兩河用兵初憲宗寵任內官有至專兵柄者又以內官充館驛使有曹進玉者恃恩暴戾遇四方使多倨有至捽辱者宰相李吉甫奏罷之十二年淮西用兵復以內官為使潾上疏曰館驛之務每驛皆有專知官畿內有京兆尹外道有觀察使刺史迭相監臨臺中又有御史充館驛使專察過闕伏知近有敗事上聞聖聰但明示科條督責官吏據其所犯重加貶黜敢不惕懼日夜厲精若令宮闈之臣出參館驛之務則內臣外事職分各殊切在塞侵官之源絶出位之漸事有不便必誡以初令或有妨不必在大當掃靜妖氛之日開太平至理之風澄本正名實在今日言雖不用帝意嘉之遷起居舍人憲宗季年鋭於服餌詔天下搜訪奇士宰相皇甫鎛與金吾將軍李道古挾邪固寵薦山人柳泌及僧大通鳳翔人田佐元皆待詔翰林憲宗服泌藥日增躁渴流聞于外潾上疏諫曰臣聞除天下之害者受天下之利共天下之樂者饗天下之福故上自黃帝顓頊堯舜禹湯下及周文王武王咸以功濟生靈德配天地故天皆報之以上壽垂祚於無疆伏見陛下以大孝安宗廟以至仁牧黎元自踐祚已來剗積代之妖凶開削平之洪業而禮敬宰輔待以終始內能大斷外寬小故夫此神功聖化皆自古聖主明君所不及陛下躬親行之實光映千古矣是則天地神祇必報陛下以山嶽之壽宗廟聖靈必福陛下以億萬之齡四海蒼生咸祈陛下以覆載之永自然萬靈保祐聖壽無疆伏見自去年已來諸處頻薦藥術之士有韋山甫柳泌等或更相稱引迄今狂謬薦送漸多臣伏以真仙有道之士皆匿其名姓無求於代潛遁山林滅影雲壑唯恐人見唯懼人聞豈肯干謁公卿自鬻其術今者所有誇衒藥術者必非知道之士咸為求利而來自言飛鍊為神以誘權貴賄賂大言怪論驚聽惑時及其假偽敗露曾不恥於逃遁如此情狀豈可保信其術親餌其藥哉禮曰夫人食味別聲被色而生者也春秋左氏傳曰味以行氣氣以實志又曰火水醯醢鹽梅以烹魚肉宰夫和之齊之以味君子食之以平其心夫三牲五穀稟自五行發為五味蓋天地生之所以奉人也是以聖人節而食之以致康強逢吉之福若夫藥石者前聖以之療疾蓋非常食之物況金石皆含酷烈熱毒之性加以燒治動經歲月既兼烈火之氣必恐難為防制若乃遠徵前史則秦漢之君皆信方士如盧生徐福欒大李少君其後皆姦偽事發其藥竟無所成事著史記漢書皆可驗視禮曰君之藥臣先嘗之親之藥子先嘗之臣子一也臣願所有金石鍊藥人及所薦之人皆先服一年以考其真偽則自然明驗矣伏惟元和聖文神武法天應道皇帝陛下合日月照臨之明稟乾元利貞之德崇正若指南受諫如轉規是必發精金之刃斷可疑之網所有藥術虛誕之徒伏乞特賜罷遣禁其幻惑使浮雲盡徹朗日增輝道化侔羲農悠久配天地實在此矣伏以貞觀已來左右起居有褚遂良杜正倫呂向韋述等咸能竭其忠誠悉心規諫小臣謬參侍從職奉起居侍從之中最近左右傳曰近臣盡規則近侍之臣上達忠款實其本職也疏奏忤旨貶為江陵令穆宗即位柳泌等誅徵潾為兵部員外郎遷刑部郎中有前率府倉曹曲元衡者杖殺百姓柏公成母法官以公成母死在辜外元衡父任軍使使以父蔭徵銅柏公成私受元衡資貨母死不聞公府法寺以經恩免罪潾議曰典刑者公柄也在官者得施於部屬之內若非在官又非部屬雖有私罪必告於官官為之理以明不得擅行鞭捶於齊人也且元衡身非在官公成母非部屬而擅憑威力橫此殘虐豈合拘於常典柏公成取貨於讎利母之死悖逆天性犯則必誅奏下元衡杖六十配流公成以法論至死公議稱之轉考功吏部二郎中寶曆初拜給事中大和四年出為汝州刺史兼御史中丞賜紫坐違法杖殺人貶左庶子分司東都七年遷左散騎常侍充集賢殿學士集歷代文章續梁昭明太子文選成三十卷目曰大和通選并音義目録一卷上之當時文士非素與潾遊者其文章少在其選時論咸薄之八年轉刑部侍郎尋改華州刺史九年復拜刑部侍郎開成元年轉兵部侍郎二年加集賢院學士判院事尋出為河南尹入為兵部侍郎三年四月卒贈戶部尚書諡曰敬潾以道義自處事上盡心尤嫉朋黨故不為權幸所知憲宗竟以藥誤不壽君子以潾為知言穆宗雖誅柳泌既而自惑左右近習稍稍復進方士時有處士張臯上疏曰神慮淡則血氣和嗜欲勝則疾疹作和則必臻於壽考作則必致於傷殘是以古之聖賢務自頤養不以外物撓耳目不徇聲色敗性情由是和平自臻福慶斯集故易曰無妄之疾勿藥有喜詩曰自天降康降福穰穰此皆理合天人著在經訓然則藥以攻疾無疾固不可餌之也高宗朝處士孫思邈者精識高道深達攝生所著千金方三十卷行之於代其序論云凡人無故不宜服藥藥氣偏有所助令人臟氣不平思邈此言可謂洞於事理也或寒暑為寇節宣有乖事資醫方尚須重慎故禮云醫不三代不服其藥施於凡庶猶且如此況在天子豈得自輕先朝暮年頗好方士徵集非一嘗試亦多果致危疾聞於中外足為殷鑒皆陛下素所詳知必不可更踵前車自貽後悔今朝野之人紛紜竊議直畏忤旨莫敢獻言臣蓬艾微生麋鹿同處既非邀寵亦又何求但泛覽古今粗知忠義有聞而默於理不安願陛下無怒芻蕘庶裨萬一穆宗歎奬其言尋令訪臯不獲李中敏隴西人父嬰中敏元和末登進士第性剛褊敢言與進士杜牧李甘相善文章趣向大率相類中敏纍從府辟入為監察歷侍御史大和中為司門員外郎六年夏旱時王守澄方寵鄭注及誣構宋申錫後人側目畏之上以久旱詔求致雨之方中敏上言曰仍歲大旱非聖德不至直以宋申錫之冤濫鄭注之姦弊今致雨之方莫若斬鄭注而雪申錫士大夫皆危之疏留中不下明年中敏謝病歸洛陽及訓注誅竟雪申錫召中敏為司勳員外郎尋遷刑部郎中知臺雜其年拜諫議大夫充理匭使上言曰據舊例投匭進狀人先以副本呈匭使或詭異難行者不令進入臣檢尋文案不見本敕所由但云貞元奉宣恐是一時之事臣以為本置匭函每日從內將出日暮進入意在使冤濫無告有司不為申理者或論時政或陳利害宜開其必達之路所以廣聰明而慮幽枉也若令有司先見裁其可否即非重密其事俾壅塞自伸於九重之意臣伏請今後所有進狀及封事臣但為引進取捨可否斷自中旨庶使名實在茲以明置匭之本從之尋拜給事中李甘字和鼎長慶末進士擢第又制策登科大和中纍官至侍御史鄭注入翰林侍講舒元輿既作相注亦求入中書甘唱於朝曰宰相者代天理物先德望而後文藝注乃何人敢茲叨竊白麻若出吾必壞之會李訓亦惡注之所求相注之事竟寢訓不獲已貶甘封州司馬又有李款者與中敏同時為侍御史鄭注邠寧入朝款伏閣彈注云內通敕使外結朝官兩地往來卜射財貨文宗不之省及注用事款亦被逐開成中纍官至諫議大夫出為蘇州刺史遷洪州刺史江西觀察使杜牧自有傳高元裕字景圭渤海人祖甝父集官卑元裕登進士第本名允中大和初為侍御史奏改元裕纍遷左司郎中李宗閔作相用為諫議大夫尋改中書舍人九年宗閔得罪南遷元裕出城餞送為李訓所怒出為閬州刺史時鄭注入翰林元裕草注制辭言注以醫藥奉君親注怒會送宗閔乃貶之訓注既誅復徵為諫議大夫開成三年充翰林侍講學士文宗寵莊恪太子欲正人為師友乃兼太子賓客四年改御史中丞風望峻整上言曰御史府紀綱之地官屬選用宜得實才其不稱者臣請出之監察御史杜宣猷柳瓌崔郢侍御史魏中庸高弘簡並以不稱出為府縣之職尋而藍田縣人賀蘭進與里內五十餘人相聚念佛神策鎮將皆捕之以為謀逆當大辟元裕疑其冤上疏請出賀蘭進等付臺覆問然後行刑從之會昌中為京兆尹大中初為刑部尚書二年檢校吏部尚書襄州刺史加銀青光祿大夫渤海郡公山南東道節度使入為吏部尚書卒元裕兄少逸元恭少逸長慶末為侍御史坐弟元裕貶官左授贊善大夫纍遷左司郎中元裕為中丞少逸遷諫議大夫代元裕為侍講學士兄弟迭處禁密時人榮之會昌中為給事中多所封奏大中初檢校禮部尚書華州刺史潼關防禦鎮國軍使入為左散騎常侍工部尚書卒元裕子璩登進士第大中朝由內外制歷丞郎判度支咸通中守中書侍郎平章事李漢字南紀宗室淮陽王道明之後道明生景融景融生務該務該生思思生岌岌已上無名位至岌為蜀州晉原尉岌生荊荊為陝州司馬荊生漢漢元和七年登進士第纍辟使府長慶末為左拾遺敬宗好治宮室波斯賈人李蘇沙獻沈香亭子材漢上疏論之曰若以沈香為亭子即與瑤臺瓊室事同寶曆中王政日僻漢與同列薛廷老因入閣廷奏曰近日除授不由中書擬議多是宣出施行臣恐自此紀綱大壞姦邪恣行願陛下各敕有司稍存典故坐言忤旨出為興元從事文宗即位召為屯田員外郎史館修撰漢韓愈子壻少師愈為文長於古學剛訐亦類愈預修憲宗實録尤為李德裕所憎大和四年轉兵部員外郎李宗閔作相用為知制誥尋遷駕部郎中八年代宇文鼎為御史中丞時李程為左僕射以儀注不定奏請定制先是大和三年兩省官同定左右僕射儀注御史中丞已下與僕射相遇依令致敬斂馬側立待僕射謝官日大夫中丞三院御史就幕次參見其觀象門外立班既以後至為重大夫中丞到班後朝堂所由引僕射就位傳呼贊導如大夫就列之儀班退贊導亦如之御史大夫與僕射道途相遇則分道而行舊事左右僕射初上御史中丞吏部侍郎已下羅拜四年中書奏曰僕射受中丞侍郎拜則似太重答郎官已下拜則太輕起今後諸司四品已下官及御史臺六品已下并郎官並望準故事餘依元和七年敕處分可之至是因李程奏漢議曰左右僕射初上受左右丞諸曹侍郎諸司四品及御史中丞已下拜謹按開元禮及六典並無此儀注不知所起之由或以為僕射師長百僚此語亦無證據唯有曹魏時賈詡讓官表中一句語耳且尚書令是正長尚無受拜之文故事與御史中丞司隸校尉號三獨坐伏以朝廷比肩同事聖主南面受拜臣下何安縱有明文尚須釐革故禮記曰君於士不答拜非其臣則答之況御史中丞殿中御史是供奉官尤為不可儀制令雖有隔品之文不知便是受拜否及御史大夫亦曾受御史已下拜今並不行蓋以禮數僭逼非人臣所安元和六年七月詔崔邠段平仲與當時禮官王涇韋公肅等同議其事理甚精詳今請舉而行之庶為折衷時程入省竟依舊儀議者以漢奏為是七年轉禮部侍郎八年改戶部侍郎九年四月轉吏部侍郎六月李宗閔得罪罷相漢坐其黨出為汾州刺史宗閔再貶漢亦改汾州司馬仍三二十年不得録用會昌中李德裕用事漢竟淪躓而卒漢弟滻洗潘皆登進士第潘大中初為禮部侍郎漢子貺亦登進士第李景儉字寬中漢中王瑀之孫父褚太子中舍景儉貞元十五年登進士第性俊朗博聞強記頗閲前史詳其成敗自負王霸之略於士大夫間無所屈降貞元末韋執誼王叔文東宮用事尤重之待以管葛之才叔文竊政屬景儉居母喪故不及從坐韋夏卿留守東都辟為從事竇羣為御史中丞引為監察御史羣以罪左遷景儉坐貶江陵戶曹纍轉忠州刺史元和末入朝執政惡之出為澧州刺史與元稹李紳相善時紳稹在翰林屢言於上前及延英辭日景儉自陳己屈穆宗憐之追詔拜倉部員外郎月餘驟遷諫議大夫性既矜誕寵擢之後凌蔑公卿大臣使酒尤甚中丞蕭俯學士段文昌相次輔政景儉輕之形於談謔二人俱訴之穆宗不獲已貶之制曰諫議大夫李景儉擢自宗枝嘗探儒術荐歷臺閣亦分郡符動或違仁行不由義附權幸以虧節通姦黨之陰謀衆情皆疑羣議難息據因緣之狀當置嚴科順長養之時特從寬典勉宜省過無或徇非可建州刺史未幾元稹用事自郡召還復為諫議大夫其年十二月景儉朝退與兵部郎中知制誥馮宿庫部郎中知制誥楊嗣復起居舍人溫造司勳員外郎李肇刑部員外郎王鎰等同謁史官獨孤朗乃於史館飲酒景儉乘醉詣中書謁宰相呼王播崔植杜元穎名面疏其失辭頗悖慢宰相遜言止之旋奏貶漳州刺史是日同飲於史館者皆貶逐景儉未至漳州而元稹作相改授楚州刺史議者以景儉使酒凌忽宰臣詔令才行遽遷大郡稹懼其物議追還授少府少監從坐者皆召還而景儉竟以忤物不得志而卒景儉疏財尚義雖不厲名節死之日知名之士咸惜之景儉弟景儒景信景仁皆有藝學知名於時景信景仁皆登進士第史臣曰仲尼有言不得中行而與之必也狂狷乎若渤論考第仲方駁諡誠知後悔不能息言可謂狷歟當賊注挾邪之辰羣公結舌而寢默而中敏李甘元裕或肆其言或奮其筆暴揚醜迹不憚撩鬚謂之為狂即有遺恨比夫請劍斷佞亦可同年而語也南紀有良史才足以自立而協比權幸顛沛終身君子慎獨庸可忽諸景儉自負太過蕩而無檢良驥跅弛之患也贊曰張李切言利刃決雲裴諫方士深誠愛君言排賊注高李不羣漢儉朋比夫何足云
