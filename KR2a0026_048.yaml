body:
  text: 舊唐書卷四十四志第二十四職官三御史臺秦漢曰御史府後漢改為憲臺魏晉宋改為蘭臺梁陳北朝咸曰御史臺武德因之龍朔二年改名憲臺咸亨復光宅元年分臺為左右號曰左右肅政臺左臺專知京百司右臺按察諸州神龍復為左右御史臺延和年廢右臺先天二年復置十月又廢也大夫一員正三品秦漢之制御史大夫副丞相為三公之官魏晉之後多不置大夫以中丞為臺主隋諱中復大夫降為正四品武德令改為從三品龍朔改為大司憲咸亨復為大夫光宅分臺為左右置左右臺大夫及廢右臺去左右字本從三品會昌二年十二月敕大夫秦為正卿漢為副相漢末改為大司空與丞相俱為三公掌邦國刑憲肅正朝廷其任既重品秩宜峻準六尚書例升為正三品著之於令中丞二員正四品下漢御史臺有二丞掌殿內祕書謂之中丞漢末改為御史長史後漢復為中丞後魏改為中尉正北齊復曰中丞後周曰司憲中大夫隋諱中改為持書御史為從五品武德因之貞觀末避高宗名改持書御史為中丞置二員龍朔改為司憲大夫咸亨復為中丞本正五品上會昌二年十二月敕中丞為大夫之二緣大夫秩崇官不常置中丞為憲臺長今九寺少卿及諸少監國子司業京兆少尹並府寺省監之二皆為四品唯中丞官重品秩未崇可升為正四品下與丞郎出入迭用著之於令大夫中丞之職掌持邦國刑憲典章以肅正朝廷中丞為之二凡天下之人有稱冤而無告者與三司訊之凡中外百僚之事應彈劾者御史言於大夫大事則方幅奏彈之小事則署名而已若有制使覆囚徒則與刑部尚書參擇之凡國有大禮則乘輅車以為之導侍御史四員從六品下御史之名周官有之亦名柱下史秦改為侍御史後周曰司憲中士隋為侍御史品第七武德品第六也掌糾舉百僚推鞫獄訟侍御史年深者一人判臺事知公廨雜事次一人知西推一人知東推也凡有別付推者則按其實狀以奏若尋常之獄推訖斷于大理凡事非大夫中丞所劾而合彈奏者則具其事為狀大夫中丞押奏大事則冠法冠衣朱衣纁裳白紗中單以彈之小事常服而已凡三司理事則與給事中中書舍人更直直於朝堂受表若三司所按而非其長官則與刑部郎中員外大理司直評事往訊之主簿一人從七品下録事二人從九品下主簿掌印及受事發辰勾檢稽失兼知官廚及黃卷主事二人令史十七人書令史二十三人殿中侍御史六人從七品下令史八人書令史十八人殿中侍御史掌殿廷供奉之儀式凡冬至元正大朝會則具服升殿若郊祀巡幸則於鹵簿中糾察非違具服從於旌門視文物有所虧闕則糾之凡兩京城內則分知左右巡各察其所巡之內有不法之事監察御史十員正八品上貞觀初馬周以布衣進用太宗令於監察御史𩹉行自此因置𩹉行之名龍朔元年以王本立為監察𩹉行也監察掌分察巡按郡縣屯田鑄錢嶺南選補知太府司農出納監決囚徒監祭祀則閲牲牢省器服不敬則劾祭官尚書省有會議亦監其過謬凡百官宴會習射亦如之殿中省魏初置殿中監隋初改為殿中局煬帝改為殿內省武德改為殿中省龍朔改為中御府咸亨復為殿中省監一員從三品魏初置品第二梁品第三隋品第四武德品第三也少監二員從四品上丞二人從五品上主事二人從九品上令史四人書令史十二人亭長掌固各八人殿中監掌天子服御總領尚食尚藥尚衣尚舍尚乘尚輦六局之官屬備其禮物供其職事少監為之二凡聽朝則率其屬執繖扇以列於左右凡大祭祀則進大圭鎮圭於壝門之外既事受而藏之凡行幸則侍奉於仗內驂乘以從若元正冬至大朝會則有進爵之禮丞掌副監事兼勾檢稽失省署抄目主事掌印及知受事發辰尚食局奉御二人正五品下隋初為典御又改為奉御直長五人正七品上食醫八人正九品下奉御掌謹其儲供辨名數直長為之二若進御必辨其時禁春肝夏心秋肺冬腎四季之月脾王皆不可食當進必先嘗正至大朝會饗宴與光祿大夫視其品秩之差其賜王公賓客亦如之諸陵月享則視膳而獻之食醫掌率主食王膳以供其職尚藥局奉御二人正五品下直長四人正七品上書吏四人侍御醫四人從六品上主藥十二人藥童三十人司醫四人正八品下醫佐八人正八品下按摩師四人咒禁師四人合口脂匠四人掌固四人奉御掌合和御藥及診候方脈之事直長為之二凡藥有上中下三品上藥為君中藥為臣下藥為佐合造之法一君三臣九佐別人五藏分其五味有湯丸膏散之用診脈有寸關尺之三部醫之大經凡合和與監視其分劑藥成嘗而進焉侍御醫掌診候調和主藥藥童主刮削搗篩尚衣局奉御二人從五品上直長四人正七品下書令史三人書吏四人主衣十六人掌固四人奉御掌衣服詳其制度辨其名數直長為之二凡天子之服冕十有三一大裘冕二衮冕三鷩冕四毳冕五黻冕六玄冕七通天冠八武辨九辨服十介幘十一白紗帽十二平巾幘十三翼善冠事具輿服志凡天子之大圭曰珽長三尺鎮圭長尺有二寸若有事於郊丘社稷則出之於內將享至于中壝門則奉鎮圭于監而進之既事受而藏之凡大朝會則設案服畢而徹之尚舍局奉御二人從五品上直長六人正七品下書令史三人書吏七人掌固十人幕士八十人奉御掌殿廷張設湯沐燈燭灑掃之事直長為之二凡行幸預設三部帳幕有古帳大帳次帳小次帳小帳凡五等之帳為三部其外置排城以為蔽扞排城連板為之板上畫辟邪獸表𩹉皆漆之凡大祭祀有事於郊壇則先設行宮於壇之東南向隨地之宜將祀三日則設大次於外壝東門之外道北南向而設坐若有事於明堂太廟則設大次於東門如郊壇之制凡致齋則設幄於正殿西序及室內俱東向張於楹下凡元正冬至大朝會則設斧扆於正殿施踏席薰爐朔望受朝則施幄於正殿帳裙頂帶方闊一丈四尺也尚乘局奉御二人從五品上直長一人正七品下奉乘十八人正九品下習馭五十人掌間五十人獸醫七十人進馬六人七品下司庫一人正九品下司廩二人正九品下書令史一人書吏十四人奉御掌內外間廄之馬辨其粗良而率其習馭直長為之二一曰左右飛黃間二曰左右吉良間三曰左右龍媒間四曰左右騊駼間五曰左右駃騠間六曰左右天苑間開元時仗內六間曰飛龍祥麟鳳苑鵷雛吉良六羣等號六廄馬凡秣馬給料以時為差凡外牧進良馬印以三花飛風之字而為志奉乘掌率習馭掌間駕士及秣飼之法司庫掌鞍轡乘具司廩掌秸出納獸醫掌療馬病初尚乘局掌六間馬後置內外間廄使專掌御馬開元初以尚乘局隸間廄使乃省尚乘其左右六間及局官並隸間廄使領之也進馬舊儀每日尚乘以廄馬八匹分為左右廂立於正殿側宮門外候仗下即散若大陳設即馬在樂懸之北與大象相次進馬二人戎服執鞭侍立於馬之左隨馬進退雖名管殿中其實武職用資蔭簡擇一如千牛備身天寶八載李林甫用事罷立仗馬亦省進馬官十二載楊國忠當政復立仗馬及進馬官乾元復省上元復置也尚輦局奉御二人從五品上直長四人正七品下尚輦二人正九品下書令史二人書吏四人掌扇六人掌翰二十四人主輦三十二人奉輿十二人掌固四人奉御掌輿輦分其次序而辨其名數直長為之二凡大朝會則陳于廷大祭祀則陳于廟凡大朝會則繖二翰一陳之于廷孔雀扇一百五十有六分居左右舊翟尾扇開元年初改為繡孔雀若常聽朝皆去扇左右各留其三以備常儀內官妃三人正一品周官三夫人之位也隋依周制立三夫人武德立四妃一貴妃二淑妃三德妃四賢妃位次后之下玄宗以為后妃四星其一正后不宜更有四妃乃改定三妃之立惠妃一麗妃二華妃三下有六儀美人才人四等共二十人以備內官之位也三妃佐后坐而論婦禮者也其於內則無所不統故不以一務名焉六儀六人正二品周官九嬪之位也掌教九御四德率其屬以贊導后之禮儀美人四人正三品周官二十七世婦之位也掌率女官修祭祀賓客之事才人七人正四品周官八十一御女之位掌宴寢理絲枲以獻歲功宮官六尚如六尚書之職掌尚宮二人正五品司記二人正六品典記二人正七品掌記二人正八品女史六人司言二人正七品典言二人正八品掌言二人正八品女史四人司簿二人正六品典簿二人正七品掌簿二人正八品女史六人司闈六人正六品典闈六人正七品掌闈六人正八品女史四人尚宮職掌導引中宮總司記司言司簿司闈四司之官屬凡六尚書物出納文簿皆印署之司記掌印凡宮內諸司簿書出入目録審而付行焉典記佐之女史掌執文書司言掌宣傳啓奏司簿掌宮人名簿廩賜司闈掌宮闈管籥尚儀二人正五品司籍二人正六品典籍二人正七品掌籍二人正八品女史十人司樂四人正六品典樂四人正七品掌樂二人正八品女史二人司賓二人正六品典賓二人正七品掌賓二人正八品司贊二人正六品典贊二人正六品掌贊二人正六品女史二人尚儀之職掌禮儀起居總司籍司樂司賓司贊四司之官屬司籍掌四部經籍筆札几案司樂掌率樂人習樂陳懸拊擊進退司賓掌賓客朝見宴會賞賜司贊掌朝見宴會贊相尚服二人正五品司寶二人正六品典寶二人正七品掌寶二人正八品女史四人司衣二人正六品典衣二人正七品掌衣二人正八品女史四人司飾二人正六品典飾二人正七品掌飾二人正八品女史四人司仗二人正六品典仗二人正七品掌仗二人正八品女史二人尚服之職掌供內服用采章之數總司寶司衣司飾司仗四司之官屬司寶掌瑞寶符契圖籍司衣掌衣服首飾司飾掌膏沐巾櫛司仗掌羽儀仗衛尚食二人正五品司膳四人正六品典膳四人正七品掌膳四人正八品掌醞二人正八品女史四人司醞二人正七品典醞二人正七品女史二人司藥二人正六品典藥二人正七品掌藥二人正八品女史四人司饎二人正六品典饎二人正七品掌饎二人正八品女史四人尚食之職掌供膳羞品齊之數總司膳司醞司藥司饎四司之官屬凡進食先嘗之司膳掌制烹煎和司醞掌酒醴飲司藥掌方藥司饎掌給宮人廩餼飯食薪炭尚寢二人正五品司設二人正六品典設二人正七品掌設二人正八品女史四人司輿二人正六品典輿二人正七品掌輿二人正八品女史一人司苑二人正六品典苑二人正七品掌苑二人正八品女史二人司燈二人正六品典燈二人正七品掌燈二人正八品女史二人尚寢之職掌燕寢進御之次序總司設司輿司苑司燈四司之官屬司設掌幃帳茵席掃灑張設司輿掌輿輦繖扇羽儀司苑掌園苑種植蔬果司燈掌燈燭尚功二人正五品司製二人正六品典製二人正七品掌製二人正八品女史二人司珍二人正六品典珍二人正七品掌珍二人正八品女史六人司綵二人正六品典綵二人正七品掌綵二人正八品女史二人司計二人正六品典計二人正七品掌計二人正八品女史二人尚功之職掌女功之程課總司製司珍司綵司計四司之官屬司製掌衣服裁縫司珍掌寶貨司綵掌繒錦絲枲之事司計掌支度衣服飲食薪炭宮正一人正五品司正二人正六品典正二人正七品女史四人宮正之職掌戒令糾禁謫罰之事司正典正佐之右唐制定宮官六尚書二十四司職事官以備內職之數內侍省星經有宦者四星在天市垣帝坐之西周官有巷伯寺人之職皆內官也前漢宮官多用士人後漢始用宦者為宮官晉置大長秋卿為後宮官以宦者為之隋為內侍省煬帝改為長秋監武德復為內侍龍朔改為內侍監光宅改