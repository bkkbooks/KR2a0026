旗隊及胡祿隊坐於東西廊下若御坐正殿則以其隊仗次立左右衛下長史録事參軍倉兵騎胄四曹參軍員數品秩如左右衛司階中候司戈執戟等四色人數品秩如左右衛也校尉旅帥隊正副隊人數如左右衛翊府中郎中郎將左右中郎將左右郎將職掌如左右衛左右武衛魏武為丞相有武衛營隋採其名置左右武衛府有大將軍光宅改為左右鷹揚衛龍朔復也大將軍各一員正三品將軍各二員從三品其職掌如左右衛大朝會被白鎧甲執器楯及旗等蹕稱長唱警持鈒隊應蹕為左右廂儀仗在正殿前則以諸隊次立於驍衛之下長史録事參軍倉兵騎胄四曹參軍司階中候司戈執戟人數品秩皆如左右衛也翊府中郎將左右郎將録事兵曹人數品秩如左右衛左右威衛隋為左右屯衛龍朔改為威衛光宅改為左右豹韜衛神龍復為威衛也大將軍各一員正三品將軍各二員從三品其職掌大朝會則被黑甲鎧弓箭刀楯旗等分為左右廂隊次武衛之下長史録事參軍倉兵騎胄四曹參軍職掌人數品秩皆如左右衛也司階中候司戈執戟人數品秩如左右衛翊府中郎將左右郎將録事兵曹校尉旅帥隊正副隊正人數品秩皆如左右衛之親府左右領軍衛漢建安中魏武為丞相始置中領軍後因之北齊置領軍府後因之煬帝改為屯衛國家改為領軍衛龍朔改為戎衛光宅改為玉鈐衛神龍後為領軍衛大將軍各一員正三品將軍各二員從三品其職掌大朝會則被青甲鎧弓箭刀楯旗等分為左右廂儀仗次立威衛之下長史録事參軍倉兵騎胄四曹參軍司階中候司戈執戟人數品秩如左右衛翊府中郎將左右郎將録事兵曹校尉旅帥隊正副隊正人數品秩職掌如左右衛也左右金吾衛秦曰中尉掌徼巡武帝改名執金吾魏復為中尉南朝不置隋曰候衛龍朔二年改為左右金吾衛采古名也大將軍各一員正三品將軍各二員從三品左右金吾衛之職掌宮中及京城晝夜巡警之法以執禦非違凡翊府及同軌等五十府皆屬之凡車駕出入則率其屬以清遊隊建白澤朱雀等旗隊先驅如鹵簿之法從巡狩畋獵則執其左右營衛之禁凡翊衛翊府同軌寶圖等五十府彍騎衛士應番上者各領所職焉長史録事參軍倉兵騎胄四曹參軍司階中候司戈執戟人數品秩職掌如左右衛也翊府中郎將左右郎將兵曹校尉旅帥隊正副隊正品秩人數職掌如左右衛也左右監門衛漢魏曰城門校尉始置左右監門府省將軍郎將等官國家因之龍朔二年去府字為衛大將軍各一員正三品將軍各二員從三品中郎將四人正四品下監門將軍之職掌宮禁門籍之法凡京司應入宮殿門者皆有籍左將軍判入右將軍判出若大駕行幸即依鹵簿法率其屬於牙門之下以為監守中郎將掌監諸門檢校出入長史録事參軍兵曹胄曹二曹參軍品秩如諸衛監門校尉各三百二十人立長各六百八十人長人長上二十人立長長上各二十人左右千牛衛宋謝綽拾遺有千牛刀即人主防身刀也後魏有千牛備身取莊子庖刀解牛之義後代因之隋置左右千牛備身二十人掌供御弓箭備身六十人掌宿衛侍從煬帝置備身府皇家改為千牛府龍朔為左右奉宸衛神龍復為千牛衛大將軍各一員正三品將軍各二員從三品中郎將各二人正四品下千牛將軍之職掌宮殿侍衛及供御之儀仗而統其曹務凡千牛備身左右執弓箭以宿衛主仗守戎服器物凡受朝之日則領備身左右升殿而侍列於御坐之左右凡親射于射宮則將軍率其屬以從凡千牛備身之考課賜會及祿秩之升降同京職事官之制中郎將升殿侍奉凡侍奉禁橫過座前者禁對語及傾身與階下人語者禁搖頭舉手以相招召者若有口敕通事舍人承受傳聲階下而不聞者中郎將宣之長史録事參軍兵胄二曹參軍人數品秩同諸衛司階各二人正六品上中候各三人司戈各五人執戟各五人品秩同諸衛千牛備身十二人備身左右各二人左右羽林軍漢置南北軍掌衛京師南軍若今諸衛也北軍若今羽林軍也漢武置羽林名曰建章營騎屬光祿勳後更名羽林騎取六郡良家子及死事之孤為之後漢置左右羽林監南朝因之後魏周曰羽林率隨左右屯衛所領兵名曰羽林龍朔二年置左右羽林軍大將軍各一員正三品下將軍各二員從三品下羽林將軍統領北衙禁兵之法令而督攝左右廂飛騎之儀仗以統諸曹之職若大朝會率其儀仗以周衛階陛大駕行幸則夾道馳而為內仗凡飛騎每月番上者皆據其名歷而配于所職其飛騎仗或有敕上南衙者則大將軍承墨敕白移於金吾引駕仗引駕仗官與監門覆奏又降墨敕然後得入長史録事參軍倉兵胄三曹參軍品秩如諸衛司階中候司戈執戟如千牛衛品秩人數翊府中郎將左右郎將録事兵曹校尉旅帥隊正副隊正人數品秩如諸衛左右龍武軍初太宗選飛騎之尤驍健者別署百騎以為翊衛之備天后初加置千騎中宗加置萬騎分為左右營置使以領之自開元以來與左右羽林軍名曰北門四軍開元二十七年改為左右龍武軍官員同羽林軍也大將軍一員正三品將軍二員從三品長史一人録事參軍事一人録事一人史二人倉兵胄三曹參軍事各一人隨曹有府史掌固人數司階二人中候三人司戈執戟各五人長上各十人右件官員階品人數職掌如羽林軍也左右神武軍至德二年肅宗在鳳翔置初貞觀中置北衙七營後改為左右羽林軍皆選才力驍勇者充每月一營十人為番當上又置左右龍武軍皆唐元功臣子弟并外州人如宿衛兵分日上下肅宗在鳳翔方收京城以羽林軍減耗寇難未息乃別置神武軍同羽林制度官吏謂之北衙六軍又置衙前射生手千餘人謂之左右英武軍非六軍之例也乾元二年十月敕左右羽林左右龍武左右神武官員並升同金吾四衛置大將軍二人將軍二人也左右神策軍上元中以北衙軍使衛伯玉為神策軍節度使鎮陝州以拒東寇以中使魚朝恩為觀軍容使監伯玉軍及伯玉入為羽林帥出為荊南節度使朝恩專統神策軍鎮陝廣德元年吐蕃犯京師代宗避狄幸陝朝恩以神策軍迎扈及永泰元年吐蕃犯京畿朝恩以神策兵屯于苑中自是神策軍恆以中官為帥建中末盜發京師竇文場以神策軍扈蹕山南及還京師賞勞無比貞元中特置神策軍護軍中尉以中官為之時號兩軍中尉貞元已後中尉之權傾於天下人主廢立皆出其可否事見宦者傳也大將軍各二員正三品貞元二年九月敕改神策左右廂為左右軍置大將軍各二人正三品將軍各二員從三品至貞元三年五月敕左右神策將軍各加二員左右神武將軍各加一員也神威軍本號殿前射生左右廂貞元二年九月改殿前左右射生軍三年四月改為左右神威軍非六軍之例也大將軍二員正三品將軍二員從三品職田俸錢手力糧料等同六軍諸衛六軍統軍興元元年正月二十九日敕左右羽林左右龍武左右神武各置統軍一人秩從二品十六衛上將軍舊無此官貞元二年九月一日敕六軍先有敕各置統軍一人十六衛宜各置上將軍一員秩從二品其左右衛及左右金吾衛上將軍俸料隨軍人馬等並同六軍統軍其諸衛上將軍次統軍例支給至德二年九月十三日六軍十二衛上將軍並放入宿已後為例也諸府隋置驃騎鷹揚等府凡天下守戍兵不成軍曰牙府有上中下也折衝都尉各一人上府都尉正四品上中府從四品下下府正五品下武德中採隋折衝果毅郎將之名改統軍為折衝都尉別將為果毅都尉左右果毅都尉各一人上府果毅從五品下中府正六品上下府從六品下隋煬帝置果毅郎將國家置折衝都尉別將各一人上府別將正七品下中府從七品上下府從七品下長史一人上府正七品下中府從七品上下府從七品下兵曹參軍一人上府從八品下中府正九品上下府從九品下也録事一人校尉五人每校尉旅帥二人每旅帥隊正副隊正各二人諸府折衝都尉掌領五校之屬以備宿衛以從師役總其戎具資糧差點教習之法令凡衛士三百人為一團以校尉領之以便習騎射者為越騎餘為步兵其團十人為火火備六馱之馬每歲十一月以衛士帳上尚書省天下兵馬之數以聞凡兵馬在府每歲季冬折衝都尉率五校之屬以教其軍陳戰鬬之法也具有教習簿籍東宮官屬太子太師太傅太保各一員並從一品師傅宮官南朝不置後魏北齊師傅品第二號東宮三太隋品亦第二武德定令加從一品也太子少師少傅少保各一員並正二品三少亦古官歷代或置或省南朝並不置後魏北齊置之品第三號東宮三少皇家定令正二品三師三少之職掌教諭太子無其人則闕之太子賓客四員正三品古無此官皇家顯慶元年春始置四員也掌侍從規諫贊相禮儀太子詹事一員正三品少詹事一員正四品上詹事秦官掌皇太子宮龍朔二年改為端尹天授為宮尹神龍復也詹事統東宮三寺十率府之政令少詹為之二凡天子六官之典制皆視其事而承受之丞二人正六品上主簿一人從七品上録事二人正九品下令史九人書令史十八人丞掌判府事主簿掌印檢勾稽録事掌受事發辰司直一人正九品上令史一人書令史二人亭長四人掌固六人司直掌彈劾宮僚糾舉職事太子朝宮臣則分知東西班凡諸司文武應參官每月皆具在否以刺之太子左春坊左庶子二人正四品上中允二人正五品下左庶子掌侍從贊相駁正啓奏中允為之二司議郎四人正六品上録事二人從八品下主事二人從九品下令史七人書令史十四人司議郎掌啓奏記注宮內祥瑞宮長除拜薨卒每年終送史館左諭德一人正四品下左贊善大夫五人正五品上傳令四人掌儀二人贊者四人左諭德掌諷諭規諫崇文館貞觀中置太子學館也學士直學士員數不定學生二十人校書二人從九品下令史二人典書二人拓書手二人書手十人熟紙匠三人裝潢匠五人筆匠三人學士掌東宮經籍圖書以教授諸生凡課試舉送如弘文館校書掌校理四庫書籍司經局洗馬二人從五品下洗馬漢官為太子前馬太子文學三人正六品校書四人正九品正字二人從九品上書令史二人楷書手二十五人典書四人洗馬掌四庫圖籍繕寫刊緝之事文學掌侍奉文章校書正字掌典校四庫書籍典膳局典膳郎二人正六品上丞二人正八品上書令史二人主食六人典食二百人掌固四人典膳郎掌進膳嘗食每夕局官於廚更直藥藏局藥藏郎二人正六品上丞二人正八品上侍醫典藥九人藥童十八人掌固六人藥藏郎掌和劑醫藥內直局內直郎二人從六品下丞二人正八品下典服三十人典扇十五人典翰十五人掌固六人內直郎掌符璽繖扇几案衣服之事典設局典設郎四人從六品下丞二人正八品下幕士六百人典設郎掌湯沐灑掃鋪陳之事凡大祭祀太子助祭則於正殿東設幄坐宮門局宮門郎二人從六品下丞二人正八品下門僕一百三十人宮門郎掌內外宮門管鑰之事其鐘鼓刻漏一如皇居之制也太子右春坊右庶子二人正四品下中舍人二人正五品上舍人四人正六品上録事一人從八品下主事二人從九品下舍人掌行令書令旨及表啓之事太子通表如諸臣之禮諸臣及宮臣上皇太子大事以箋小事以啓其封題皆曰上右春坊通事舍人開封以進其事可施行者皆下於坊舍人開庶子參詳之然後進不可者則否右諭德一人正四品下右贊善大夫五人正五品上傳令四人諭德贊善掌事如左通事舍人八人正七品下典謁二十人舍人掌導引宮臣辭見及承令勞問之事太子內坊皆宦者為司局典內二人從五品下録事一人典直四人正九品下