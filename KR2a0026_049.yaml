body:
  text: 舊唐書卷四十五志第二十五輿服昔黃帝造車服為之屏蔽上古簡儉未立等威而三五之君不相沿習乃改正朔易服色車有輿輅之別服有裘冕之差文之以染繢飾之以絺繡華蟲象物龍火分形於是典章興矣周自夷王削弱諸侯自恣窮孔翬之羽毛無以供其侈極隨和之掌握不足慊其華則皮辨革舄之容非珠履鷸冠之玩也逮秦誅戰國斟酌舊儀則有鹵簿金根大駕法駕備千乘萬騎異舜典周官漢氏因之號乘輿三駕儀衛之盛無與比隆東京帝王博雅好古明帝始令儒者考曲臺之説依周官五輅六冕之文山龍藻火之數創為法服雖有制作竟寢不行輿駕乘金根而已服則衮冕冠則通天其後所御多從袍服事具前志而裘冕之服歷代不行後魏北齊輿服奇詭至隋氏一統始復舊儀隋制車有四等有亘幰通幰軺車輅車初制五品以上乘偏幰車其後嫌其不美停不行用以亘車代之三品以上通幰車則青壁一品軺車油幰朱網唯輅車一等聽敕始得乘之馬珂一品以下九子四品七子五品五子衣裳有常服公服朝服祭服四等之制平巾幘牛角箄簪紫衫白袍靴起梁帶五品已上金玉鈿飾用犀為簪是為常服武官盡服之六品已下衫以緋至於大仗陪立五品已上及親侍加兩襠縢蛇其勳侍去兩襠辨冠朱衣裳素革帶烏皮履是為公服其辨通用烏漆紗為之象牙為簪導五品已上亦以鹿胎為辨犀為簪導者加玉琪之飾一品九琪二品八琪三品七琪四品六琪三品兼有紛鞶囊佩於革帶之後上加玉珮一鞶囊二品以上金縷三品以上銀縷五品以上綵縷文官尋常入內及在本司常服之親王遠遊三梁冠金附蟬犀簪導白筆三師三公太子三師三少尚書祕書二省九寺四監太子三寺諸郡縣關市親王文學藩王嗣王公侯進賢冠三品以上三梁五品以上兩梁犀簪導九品以上一梁牛角簪導門下內書殿內三省諸衛府長秋監太子左右庶子內坊諸率宮門內坊親王府都尉府鎮防戍九品以上散官一品已下武辨幘侍中中書令加貂蟬珮紫綬散官者白筆御史司隸二臺法冠一名獬豸冠謁者臺大夫以下高山冠並絳紗單衣白紗內單皂領褾襈裾白練裙襦絳蔽膝革帶金飾鈎方心曲領紳帶玉鏢金飾劍亦通用金鏢山玄玉佩綬襪烏皮舄是為朝服玉佩纁朱綬施二玉環三品以上緑綬四品五品青綬二品以下去玉環六品以下去劍珮綬八品以下冠去白筆衣省內單及曲領蔽膝著烏皮履五品加紛鞶囊其綬纁朱者用四綵赤紅縹紺紅朱質纁文織長一丈八尺二百四十首闊九寸緑綬用四綵緑紫黃朱紅緑質長一丈八尺二百四十首闊九寸紫綬用四綵紫黃赤紅紫質長一丈六尺一百八十首闊八寸青綬三綵白青紅青質長一丈四尺一百四十首闊七寸玄衣纁裳冕而旒者是為祭服綬珮劍各依朝服之數其章自七品以下降二為差六品以下無章文武之官皆執笏五品以上用象牙為之六品以下用竹木是時內外羣官文物有序僕御清道車服以庸於是貴賤士庶較然殊異越王侗於東都嗣位下詔停廢自茲以後浸以不章以至於亡唐制天子車輿有玉輅金輅象輅革輅木輅是為五輅耕根車安車四望車已上八等並供服乘之用其外有指南車記里鼓車白鷺車鸞旗車辟惡車軒車豹尾車羊車黃鉞車豹尾黃鉞二車武德中無自貞觀已後加焉其黃鉞天寶元年制改為金鉞屬車十二乘並為儀仗之用大駕行幸則分前後施於鹵簿之內若大陳設則分左右施於儀衛之內玉輅青質以玉飾諸末重輿左青龍右白虎金鳳翅畫簴文鳥獸黃屋左纛金鳳一在軾前十二鑾在衡正縣鑾數皆其副輅及耕根則八二鈴在軾龍輈前設鄣塵青蓋黃𩹉繡飾博山鏡子樹羽輪皆朱班重牙左建旗十有二旒皆畫升龍其長曳地右載闟戟長四尺廣三尺黻文旗首金龍頭銜結綬及鈴綏駕蒼龍金鍐方釳插翟尾五焦鏤鍚鞶纓十有二就鍚馬當顱鏤金為之鞶纓鞍皆以五綵飾之就成也一匝為一就也祭祀納后則供之金輅赤質以金飾諸末餘與玉輅同駕赤鄉射祀還飲至則供之象輅黃質以象飾諸末餘與玉輅同駕黃行道則供之革輅白質鞔之以革餘與玉輅同駕白駱巡狩臨兵事則供之木輅黑質漆之餘與玉輅同駕黑畋獵則供之五輅之蓋旌旗之質及鞶纓皆從輅色蓋之𩹉皆用黃其鏤鍚五輅同耕根車青質蓋三重餘與玉輅同耕籍則供之安車金飾重輿曲壁八鑾在衡紫油纁朱𩹉通幰朱絲絡網朱鞶纓朱覆髮貝絡駕赤臨幸則供之四望車制同犢車金飾八鑾在衡青油纁朱𩹉通幰朱絲絡網拜陵臨弔則供之自高宗不喜乘輅每有大禮則御輦以來往爰洎則天以後遂以為常玄宗又以輦不中禮又廢而不用開元十一年冬將有事於南郊乘輅而往禮畢騎而還自此行幸及郊祀等事無遠近皆騎於儀衛之內其五輅及腰輿之屬但陳於鹵簿而已皇后車則有重翟厭翟翟車安車四望車金根車六等重翟車青質金飾諸末輪畫朱金根車牙其箱飾以重翟羽青油纁朱𩹉通幰繡紫帷朱絲絡網繡紫絡帶八鑾在衡鏤鍚鞶纓十二就金鍐方釳插翟尾朱總總以朱為之如馬纓而小著馬勒在兩耳與兩鑣也駕蒼龍受册從祀享廟則供之厭翟赤質金飾諸末輪畫朱牙其箱飾以次翟羽紫油纁朱𩹉通幰紅錦帷朱絲絡網紅錦絡帶餘如重翟車駕赤採桑則供之翟車黃質金飾諸末輪畫朱牙其車側飾以翟羽黃油纁黃𩹉通幰白紅錦帷朱絲絡網白紅錦絡帶餘如重翟駕黃歸寧則供之諸鞶纓之色皆從車質安車赤質金飾紫通幰朱𩹉駕四馬臨幸及弔則供之四望車朱質紫油通幰油畫絡帶拜陵臨弔則供之金根車朱質紫油通幰油畫絡帶朱絲網常行則供之皇太子車輅有金輅軺車四望車金輅赤質金飾諸末重較箱畫簴文鳥獸黃屋伏鹿軾龍輈金鳳一在軾前設鄣塵朱蓋黃𩹉輪畫朱牙左建旗九旒右載闟戟旗首金龍頭銜結綬及鈴綏駕赤四八鑾在衡二鈴在軾金鍐方釳插翟尾五焦鏤鍚鞶纓九就從祀享正冬大朝納妃則供之軺車金飾諸末紫通幰朱𩹉駕一馬五日常服及朝享宮臣出入行道則供之四望車金飾諸末紫油纁通幰朱𩹉朱絲絡網駕一馬弔臨則供之王公已下車輅親王及武職一品象飾輅自餘及二品三品革輅四品木輅五品軺車象輅以象飾諸末朱班輪八鑾在衡左建旗旗畫龍一升一降右載闟戟革輅以革飾諸末左建旜通帛為旜餘同象輅木輅以漆飾之餘同革輅軺車曲壁青通幰諸輅皆朱質朱蓋朱旗旜一品九旒二品八旒三品七旒四品六旒其鞶纓就數皆準此內命婦夫人乘厭翟車嬪乘翟車婕妤已下乘安車各駕二馬外命婦公主王妃乘厭翟車駕二馬自餘一品乘白銅飾犢車青通幰朱𩹉油纁朱絲絡網駕以牛二品已下去油纁絡網四品青偏幰有唐已來三公已下車輅皆太僕官造貯掌若受制行册命及二時巡陵婚葬則給之自此之後皆騎馬而已唐制天子衣服有大裘之冕衮冕鷩冕毳冕繡冕玄冕通天冠武辨黑介幘白紗帽平巾幘白帢凡十二等大裘冕無旒廣八寸長一尺六寸玄裘纁𩹉已下廣狹準此金飾玉簪導以組為纓色如其綬裘以黑羔皮為之玄領褾襟緣朱裳白紗中單皂領青褾襈裾革帶玉鈎大帶素帶朱𩹉紺其外上以朱下以緑紐用組也蔽膝隨裳鹿盧玉具劍火珠鏢首白玉雙珮玄組雙大綬六綵玄黃赤白縹緑純玄質長二丈四尺五百首廣一尺小雙綬長二尺一寸色同大綬而首半之間施三玉環朱襪赤舄祀天神地祇則服之衮冕金飾垂白珠十二旒以組為纓色如其綬黈纊充耳玉簪導玄衣纁裳十二章八章在衣日月星龍山華蟲火宗彝四章在裳藻粉米黼黻衣褾領為升龍織成為之也各為六等龍山以下每章一行十二白紗中單黼領青褾襈裾黻繡龍山火三章餘同上革帶大帶劍珮綬與上同舄加金飾諸祭祀及廟遣上將征還飲至踐阼加元服納后若元日受朝則服之鷩冕服七章三章在衣華蟲火宗彝四章在裳藻粉米黼黻餘同衮冕有事遠主則服之毳冕服五章三章在衣宗彝藻粉米二章在裳黼黻也餘同鷩冕祭海嶽則服之繡冕服三章一章在衣粉米二章在裳黼黻餘同毳冕祭社稷帝社則服之玄冕服衣無章裳刺黼一章餘同繡冕蠟祭百神朝日夕月則服之通天冠加金博山附蟬十二首施珠翠黑介幘髮纓翠綏玉若犀簪導絳紗𩹉白紗中單領褾飾以織成朱襈裾白裙白裙襦亦裙衫也絳紗蔽膝白假帶方心曲領其革帶珮劍綬襪舄與上同若未加元服則雙童髻空頂黑介幘雙玉導加寶飾諸祭還及冬至朔日受朝臨軒拜王公元會冬會則服之武辨金附蟬平巾幘餘同前服講武出征四時搜狩大射禡類宜社賞祖罰社纂嚴則服之辨服辨以鹿皮為也十有二琪琪以白玉珠為之玉簪導絳紗衣素裳革帶白玉雙珮鞶囊小綬白襪烏皮履朔日受朝則服之黑介幘白紗單衣白裙襦革帶素襪烏皮履拜陵則服之白紗帽亦烏紗也白裙襦亦裙衫也白襪烏皮履視朝聽訟及宴見賓客則服之平巾幘金寶飾導簪冠文皆以玉紫褶亦白褶白袴玉具裝真珠寶鈿帶乘馬則服之白帢臨大臣喪則服之太宗又制翼善冠朔望視朝以常服及帛練裙襦通著之若服袴褶又與平巾幘通用著於令其常服赤黃袍衫折上頭巾九環帶六合靴皆起自魏周便於戎事自貞觀已後非元日冬至受朝及大祭祀皆常服而已顯慶元年九月太尉長孫無忌與修禮官等奏曰準武德初撰衣服令天子祀天地服大裘冕無旒臣無忌志寧敬宗等謹按郊特牲云周之始郊日以至被衮以象天戴冕藻十有二旒則天數也而此二禮俱説周郊衮與大裘事乃有異按月令孟冬天子始裘明以禦寒理非當暑若啓蟄祈穀冬至報天行事服裘義歸通允至於季夏迎氣龍見而雩炎熾方隆如何可服謹尋歷代唯服衮章與郊特牲義旨相協按周遷輿服志云漢明帝永平二年制採周官禮記始制祀天地服天子備十二章沈約宋書志云魏晉郊天亦皆服衮又王智深宋紀曰明帝制云以大冕純玉藻玄衣黃裳郊祀天地後魏周齊迄于隋氏勘其禮令祭服悉同斯則百王通典炎涼無妨復與禮經事無乖舛今請憲章故實郊祀天地皆服衮冕其大裘請停仍改禮令又檢新禮皇帝祭社稷服繡冕四旒三章祭日月服玄冕三旒衣無章謹按令文是四品五品之服此則三公亞獻皆服衮衣孤卿助祭服毳及鷩斯乃乘輿章數同於大夫君少臣多殊為不可據周禮云祀昊天上帝則服大裘而冕五帝亦如之享先王則衮冕享先公則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕諸小祀則玄冕又云公侯伯子男孤卿大夫之服衮冕以下皆如王之服所以三禮義宗遂有二釋一云公卿大夫助祭之日所著之服降王一等又云悉與王同求其折衷俱未通允但名位不同禮亦異數天子以十二為節義在法天豈有四旒三章翻為御服若諸臣助祭冕與王同便是貴賤無分君臣不別如其降王一等則王著玄冕之時羣臣次服爵辨既屈天子又貶公卿周禮此文久不施用亦猶祭祀之立尸侑君親之拜臣子覆巢設硩蔟之官去蛙置蟈氏之職唯施周代事不通行是故漢魏以來下迄隋代相承舊事唯用衮冕今新禮親祭日月仍服五品之服臨事施行極不穩便請遵歷代故實諸祭並用衮冕制可之無忌等又奏曰皇帝為諸臣及五服親舉哀依禮著素服今令乃云白帢禮令乖舛須歸一塗且白帢出自近代事非稽古雖著令文不可行用請改從素服以會禮文制從之自是鷩冕已下乘輿更不服之白帢遂廢而令文因循竟不改削開元十一年冬玄宗將有事於南郊中書令張説又奏稱準令皇帝祭昊天上帝服大裘之冕事出周禮取其質也永徽二年高宗親享南郊用之明慶年修禮改用衮冕事出郊特牲取其文也自則天已來用之若遵古制則應用大裘若便於時則衮冕為美令所司造二冕呈進上以大裘朴略冕又無旒既不可通用於寒暑乃廢不用之自是元正朝會依禮令用衮冕及通天冠大祭祀依郊特牲亦用衮冕自餘諸服雖在於令文不復施用十七年朝拜五陵但素服而已朔望常朝亦用常服其翼善冠亦廢武德令皇太子衣服有衮冕具服遠遊三梁冠公服遠遊冠烏紗帽平巾幘五等貞觀已後又加辨服進德冠之制衮冕白珠九旒以組為纓色如其綬青纊充耳犀簪導玄衣纁裳九章五章在衣龍山華蟲火宗彝四章在裳藻粉米黼黻織成為之白紗中單黼領青褾襈裾革帶金鈎大帶素帶朱𩹉亦紕以朱緑皆用組黻隨裳色火山二章也玉具劍金寶飾也玉鏢首瑜玉雙珮朱組雙大綬四綵赤白縹紺純朱質長一丈八尺三百二十首廣九寸小雙綬長二尺六寸色同大綬而首半之施二玉環也朱襪赤舄舄加金飾侍從皇帝祭祀及謁廟加元服納妃則服之具服遠遊三梁冠加金附蟬九首施珠翠黑介幘髮纓翠綏犀簪導絳紗袍白紗中單皂領褾襈裙白裙襦白假帶方心曲領絳紗蔽膝其革帶劍珮綬襪舄與上同後改用白襪黑舄未冠則雙童髻空頂黑介幘雙玉導加寶飾謁廟還宮元日冬至朔日入朝釋奠則服之公服遠遊冠簪導以下並同前也絳紗單衣白裙襦革帶金鈎假帶方心紛鞶囊長六尺四寸廣二寸四分色同大綬白襪烏皮履五日常服元日冬至受朝則服之烏紗帽白裙襦白襪烏皮履視事及宴見賓客則服之平巾幘紫褶白袴寶鈿起梁帶乘馬則服之辨服辨以鹿皮為之犀簪導組纓玉琪九絳紗衣素裳革帶鞶囊小綬雙珮白襪烏皮履朔望及視事則兼服之進德冠九琪加金飾其常服及白練裙襦通著之若服袴褶則與平巾幘通著自永徽已後唯服衮冕具服公服而已若乘馬袴褶則著進德冠自餘並廢若宴服常服紫衫袍與諸王同開元二十六年肅宗升為皇太子受册太常所撰儀注有服絳紗袍之文太子以為與皇帝所稱同上表辭不敢當請有以易之玄宗令百官詳議尚書左丞相裴耀卿太子太師蕭嵩等奏曰謹按衣服令皇太子具服有遠遊冠三梁加金附蟬九首施珠翠黑介幘髮纓綏犀簪導絳紗袍白紗中單皂領褾襈白裙襦方心曲領絳紗蔽膝革帶劍珮綬等謁廟還宮元日冬至朔日入朝釋奠則服之其絳紗袍則是冠衣之內一物之數與裙襦劍珮等無別至於貴賤之差尊卑之異則冠為首飾名制有殊并珠旒及裳綵章之數多少有別自外不可事事差異亦有上下通服名制是同禮重則具服禮輕則從省今以至敬之情有所未敢衣服不可減省稱謂須更變名望所撰儀注不以絳紗袍為稱但稱為具服則尊卑有差謙光成德議奏上手敕改為朱明服下所司行用焉武德令侍臣服有衮鷩毳繡玄冕及爵辨遠遊進賢冠武辨獬豸冠凡十等衮冕垂青珠九旒以組為纓色如其綬以下旒纓皆如之也青纊充耳簪導青衣纁裳服九章五章在衣龍山華蟲火宗彝為五等四章在裳藻粉米黼黻皆絳為繡遍衣而已下皆如之白紗中單黼領繡冕以下中單青領青褾襈裙革帶鈎大帶三品已上素帶朱𩹉皆紕其外上以緑五品帶紕其垂外以玄黃紐皆用青組之黻凡黻皆隨裳色毳冕以上山火二章繡冕山一章玄冕無章劍珮綬朱襪赤舄第一品服之鷩冕七旒服七章三章在衣華蟲火宗彝四章在裳藻粉米黼黻也餘同衮冕第二品服之毳冕五旒服五章三章在衣宗彝藻粉米二章在裳黼黻也餘同鷩冕第三品服之繡冕四旒服三章一章在衣粉米二章在裳黼黻餘並同毳冕第四品服之玄冕衣無章裳刻黻一章餘同繡冕第五品服之爵辨色同爵無旒無章玄纓簪導青衣纁裳白紗中單青領褾裙革帶鈎大帶練帶紕其垂內外以繡紐約用青組爵襪赤履九品已上服之凡冕服助祭及親迎若私家祭祀皆服之爵辨亦同凡冕制皆以羅為之其服以紬爵辨用紬為之其服用繒遠遊三梁冠黑介幘青綏凡文官皆青綏以下準此也皆諸王服之親王則加金附蟬進賢冠三品以上三梁五品以上兩梁九品以上一梁皆三公太子三師三少五等爵尚書省祕書省諸寺監學太子詹事府三寺及散官親王師友文學國官若諸州縣關津嶽瀆等流內九品以上服之武辨平巾幘侍中中書令則加貂蟬侍左者左珥侍右者右珥皆武官及門下中書殿中內侍省天策上將府諸衛領軍武候監門領左右太子諸坊諸率及鎮戍流內九品已上服之其親王府佐九品以上亦準此法冠一名獬豸冠以鐵為柱其上施珠兩枚為獬豸之形左右御史臺流內九品以上服之高山冠者內侍省內謁者及親王下司閣等服之却非冠者亭長門僕服之諸應冠而未冠者並雙童髻空頂幘五品已上雙玉導金飾三品以上加寶飾六品以下無飾朝服亦名具服冠幘纓簪導絳紗單衣白紗中單皂領襈裙白裙襦亦裙衫也革帶鈎舄假帶曲領方心絳紗蔽膝襪舄劍珮綬一品已下五品以上陪祭朝饗拜表大事則服之七品已上去劍珮綬餘並同公服亦名從省服冠幘纓簪導絳紗單衣白裙襦亦裙衫也革帶鈎假帶方心襪履紛鞶囊一品以下五品以上謁見東宮及餘公事則服之其六品以下去紛鞶囊餘並同諸珮綬者皆雙綬親王纁朱綬四綵赤黃縹紺純朱質纁文織長一丈八尺二百四十首廣九寸一品緑綟綬四綵紫黃赤純緑質長一丈八尺二百四十首廣九寸二品三品紫綬三綵紫黃赤純紫質長一丈六尺一百八十首廣八寸四品青綬三綵青白紅純青質長一丈四尺一百四十首廣七寸五品黑綬二綵青紺純紺質長一丈二尺一百首廣六寸自王公以下皆有小雙綬長二尺六寸色同大綬而首半之正第一品佩二玉環自外不同也有綬者則有紛皆長六尺四寸廣二尺四分各隨綬色諸鞶囊二品以上金鏤三品金銀鏤四品銀鏤五品綵鏤諸珮一品珮山玄玉二品以下五品以上佩水蒼玉諸文官七品以上朝服者簪白筆武官及爵則不簪諸舄履並烏色舄重皮底履單皮底別注色者不用此色諸勳官及爵任職事官者散官散號將軍同職事正衣本服自外各從職事服諸致仕及以理去官被召謁見皆服前官從省服平巾幘簪箄導冠支五品以上紫褶六品以下緋褶加兩襠縢蛇並白袴起梁帶五品以上金玉雜鈿六品以下金飾隱起靴武官及衛官陪立大仗則服之若文官乘馬亦通服之去兩襠縢蛇諸視品府佐武辨平巾幘國官進賢一梁冠黑介幘簪導其服各準正品其流外官亦依正品流外之例參朝則服之若謁見府公府佐平巾黑幘國官黑介幘皆白紗單衣烏皮履諸流外官行署三品以上黑介幘絳公服用緋為之制同絳紗單衣方心革帶鈎假帶襪烏皮履九品以上絳衣制同絳公服袖狹形直如溝不垂去方心假帶餘同絳公服其非行署者太常寺謁者卜博士醫助教祝史贊引鴻臚寺掌儀諸典書典學內侍省內典引太子門下坊典儀內坊導客舍人諸贊者王公以下舍人公主謁者等各準行署依品服自外及民任雜掌無官品者皆平巾幘緋衫大口袴朝集從事則服之諸典謁武辨絳公服其齋郎介幘絳衣自外品子任雜掌者皆平巾幘緋衫大口袴朝集從事則服之黑介幘簪導深衣青褾領革帶烏皮履未冠則雙童髻空頂黑介幘去革帶國子太學四門學生參見則服之書算學生州縣學生則烏紗帽白裙襦青領諸外官拜表受詔皆服本品無朝服者則服之其餘公事及初上並公服諸州大中正進賢一梁冠絳紗公服若有本品者依本品參朝服之諸州縣佐史鄉正里正嶽瀆祝史齋郎並介幘絳衣平巾幘緋褶大口袴紫附尚食局主食典膳局主食太官署食官署掌膳服之平巾緑幘青布袴褶尚食局主膳典膳局典食太官署食官署供膳服之平巾五辮髻青袴褶青耳屩羊車小史服之總角髻青袴褶漏刻生漏童服之龍朔二年九月戊寅司禮少常伯孫茂道奏稱諸臣九章服君臣冕服章數雖殊飾龍名衮尊卑相亂望諸臣九章衣以雲及麟代龍升山為上仍改冕當時紛議不定儀鳳年太常博士蘇知機又上表以公卿以下冕服請別立節文敕下有司詳議崇文館學士校書郎楊炯奏議曰古者太昊庖犧氏仰以觀象俯以察法造書契而文籍生次有黃帝軒轅氏長而敦敏成而聰明垂衣裳而天下理其後數遷五德君非一姓體國經野建邦設都文質所以再而復正朔所以三而改夫改正朔者謂夏后氏建寅殷人建丑周人建子至於以日繫月以月繫時以時繫年此則三王相襲之道也夫易服色者謂夏后氏尚黑殷人尚白周人尚赤至於山龍華蟲宗彝藻火粉米黼黻此又百代可知之道也謹按虞書曰豫欲觀古人之象日月星辰山龍華蟲作繪宗彝藻火粉米黼黻絺繡由此言之則其所從來者尚矣夫日月星辰者明光照下土也山者布散雲雨象聖王澤沾下人也龍者變化無方象聖王應機布教也華蟲者雉也身被五采象聖王體兼文明也宗彝者武蜼也以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹象聖王至德日新也米者人恃以生象聖王物之所賴也黼能斷割象聖王臨事能決也黻者兩己相背象君臣可否相濟也逮有周氏乃以日月星辰為旌旗之飾又登龍於山登火於宗彝於是乎制衮冕以祀先王也九章者法於陽數也以龍為首章者衮者卷也龍德神異應變潛見表聖王深沈遠智卷舒神化也又制鷩冕以祭先公也鷩者雉也有耿介之志表公有賢才能守耿介之節也又制毳冕以祭四望也四望者嶽瀆之神也武蜼者山林所生也明其象也制絺冕以祭社稷也社稷土穀之神也粉米由之成也象其功也又制玄冕以祭羣小祀也百神異形難可遍擬但取黻之相背異名也夫以周公之多才也故化定制禮功成作樂夫以孔宣之將聖也故行夏之時服周之冕先王之法服乃此之自出矣天下之能事又於是乎畢矣今表狀請制大明冕十二章乘輿服之者謹按日月星辰者已施旌旗矣龍武山火者又不踰於古矣而云麟鳳有四靈之名玄龜有負圖之應雲有紀官之號水有感德之祥此蓋別表休徵終是無踰比象然則皇王受命天地興符仰觀則璧合珠連俯察則銀黃玉紫盡南宮之粉壁不足寫其形狀罄東觀之鉛黃無以紀其名實固不可畢陳於法服也雲也者從龍之氣也水也者藻之自生也又不假別為章目也此蓋不經之甚也又鷩冕八章三公服之者鷩者太平之瑞也非三公之德也鷹鸇者鷙鳥也適可以辨祥刑之職也熊羆者猛獸也適可以旌武臣之力也又稱藻為水草無所法象引張衡賦云蒂倒茄於藻井披江葩之狎獵謂為蓮花取其文采者夫茄者蓮也若以蓮花代藻變古從今既不知草木之名亦未達文章之意此又不經之甚也又毳冕六章三品服之者按此王者祀四望服之名也今三品乃得同王之毳冕而三公不得同王之衮名豈惟顛倒衣裳抑亦自相矛盾此又不經之甚也又黼冕四章五品服之考之於古則無其名驗之於今則非章首此又不經之甚也若夫禮惟從俗則命為制令為詔乃秦皇之故事猶可以適於今矣若乃義取隨時則出稱警入稱蹕乃漢國之舊儀猶可以行於代矣亦何取於變周公之軌物改宣尼之法度者哉由是竟寢知機所請景龍二年七月皇太子將親釋奠於國學有司草儀注令從臣皆乘馬者著衣冠太子左庶子劉子玄進議曰古者自大夫已上皆乘車而以馬為騑服魏晉已降迄于隋代朝士又駕牛車歷代經史具有其事不可一二言也至如李廣北征解鞍息馬援南伐據鞍顧盼斯則鞍馬之設行於軍旅戎服所乘貴於便習者也案江左官至尚書郎而輒輕乘馬則為御史所彈又顏延之罷官後好騎馬出入閭里當代稱其放誕此則專車憑軾可擐朝衣單馬御鞍宜從服求之近古灼然之明驗矣自皇家撫運沿革隨時至如陵廟巡幸王公册命則盛服冠履乘彼輅車其士庶有衣冠親迎者亦時以服箱充馭在於他事無復乘車貴賤所行通鞍馬而已臣伏見比者鑾輿出幸法駕首途左右侍臣皆以朝服乘馬夫冠履而出止可配車而行今乘車既停而冠履不易可謂唯知其一而未知其二何者褒衣博帶革履高冠本非馬上所施自是車中之服必也襪而升鐙跣以乘鞍非惟不師古道亦自取驚今俗求諸折中進退無可且長裙廣袖襜如翼如鳴珮紆組鏘鏘奕奕馳驟於風塵之內出入於旌棨之間儻馬有驚逸人從顛墜遂使屬車之右遺履不收清道之傍絓驂相續固以受嗤行路有損威儀今議者皆云祕閣有梁武帝南郊圖多有衣冠乘馬者此則近代故事不得謂無其文臣案此圖是後人所為非當時所撰且觀當今有古今圖畫者多矣如張僧繇畫羣公祖二疏而兵士有著芒屩者閻立本畫昭君入胸奴而婦人有著帷帽者夫芒屩出於水鄉非京華所有帷帽創於隋代非漢宮所作議者豈可徵此二畫以為故實者乎由斯而言則梁武南郊之圖義同於此又傳稱義惟因俗禮貴緣情殷輅周冕規模不一秦冠漢珮用舍無恆況我國家道軼百王功高萬古事有不便資於變通其乘馬衣冠竊謂宜從省廢臣此異議其來自久日不暇給未及榷揚今屬殿下親從齒胄將臨國學凡有衣冠乘馬皆憚此行所以輒進狂言用申鄙見皇太子手令付外宣行仍編入令以為恆式宴服蓋古之服也今亦謂之常服江南則以巾褐裙襦北朝則雜以戎夷之制爰至北齊有長帽短靴合袴襖子朱紫玄黃各任所好雖謁見君上出入省寺若非元正大會一切通用高氏諸帝常服緋袍隋代帝王貴臣多服黃文綾袍烏紗帽九環帶烏皮六合靴百官常服同於匹庶皆著黃袍出入殿省天子朝服亦如之惟帶加十三環以為差異蓋取於便事其烏紗帽漸廢貴賤通服折上巾其製周武帝建德年所造也晉公宇文護始命袍加下襴及大業元年煬帝始制詔吏部尚書牛弘工部尚書宇文愷兼內史侍郎虞世基給事郎許善心儀曹郎袁朗等憲章古則創造衣冠自天子逮于胥吏章服皆有等差始令五品以上通服朱紫是後師旅務殷車駕多行幸百官行從雖服袴褶而軍間不便六年復詔從駕涉遠者文武官等皆戎衣貴賤異等雜用五色五品已上通著紫袍六品已下兼用緋緑胥吏以青庶人以白屠商以皂士卒以黃武德初因隋舊制天子宴服亦名常服唯以黃袍及衫後漸用赤黃遂禁士庶不得以赤黃為衣服雜飾四年八月敕三品已上大科紬綾及羅其色紫飾用玉五品已上小科紬綾及羅其色朱飾用金六品已上服絲布雜小綾交梭雙紃其色黃六品七品飾銀八品九品鍮石流外及庶人服紬絁布其色通用黃飾用銅鐵五品已上執象笏三品已下前挫後直五品已上前挫後屈自有唐已來一例上圓下方曾不分別六品已下執竹木為笏上挫下方其折上巾烏皮六合靴貴賤通用貞觀四年又制三品已上服紫五品已下服緋六品七品服緑八品九品服以青帶以鍮石婦人從夫色雖有令仍許通著黃五年八月敕七品已上服龜甲雙巨十花綾其色緑九品已上服絲布及雜小綾其色青十一月賜諸衛將軍紫袍錦為褾袖八年五月太宗初服翼善冠貴臣服進德冠龍朔二年司禮少常伯孫茂道奏稱舊令六品七品著緑八品九品著青深青亂紫非卑品所服望請改八品九品著碧朝參之處聽兼服黃從之總章元年始一切不許著黃上元元年八月又制一品已下帶手巾算袋仍佩刀子礪石武官欲帶者聽之文武三品已上服紫金玉帶四品服深緋五品服淺緋並金帶六品服深緑七品服淺緑並銀帶八品服深青九品服淺青並鍮石帶庶人並銅鐵帶文明元年七月甲寅詔旗幟皆從金色飾之以紫畫以雜文八品已下舊服者並改以碧京文官五品已上六品已下七品清官每日入朝常服袴褶諸州縣長官在公衙亦準此景雲中又制令依上元故事一品已下帶手巾算袋其刀子礪石等許不佩武官五品已上佩韘七事七謂佩刀刀子礪石契苾真噦厥針筒火石袋等也至開元初復罷之則天天授二年二月朝集使刺史賜繡袍各於背上繡成八字銘長壽三年四月敕賜嶽牧金字銀字銘袍延載元年五月則天內出緋紫單羅銘襟背衫賜文武三品已上左右監門衛將軍等飾以對師子左右衛飾以麒麟左右武威衛飾以對虎左右豹韜衛飾以豹左右鷹揚衛飾以鷹左右玉鈐衛飾以對鶻左右金吾衛飾以對豸諸王飾以盤龍及鹿宰相飾以鳳池尚書飾以對鴈武德已來始有巾子文官名流上平頭小樣者則天朝貴臣內賜高頭巾子呼為武家諸王樣中宗景龍四年三月因內宴賜宰臣已下內樣巾子開元已來文官士伍多以紫皂官絁為頭巾平頭巾子相效為雅製玄宗開元十九年十月賜供奉官及諸司長官羅頭巾及官樣巾子迄今服之也天寶十載五月改諸衛旗幡隊仗先用緋色並用赤黃色以符土德高祖武德元年九月改銀菟符為銀魚符高宗永徽二年五月開府儀同三司及京官文武職事四品五品並給隨身魚咸亨三年五月五品已上賜新魚袋並飾以銀三品已上各賜金裝刀子礪石一具垂拱二年正月諸州都督刺史並準京官帶魚袋天授元年九月改內外所佩魚並作龜久視元年十月職事三品已上龜袋宜用金飾四品用銀飾五品用銅飾上守下行皆從官給神龍元年二月內外官五品已上依舊佩魚袋六月郡王嗣王特許佩金魚袋景龍三年八月令特進佩魚散職佩魚自此始也自武德已來皆正員帶闕官始佩魚袋員外判試檢校自則天中宗後始有之皆不佩魚雖正員官得佩亦去任及致仕即解去魚袋至開元九年張嘉貞為中書令奏諸致仕許終身佩魚以為榮寵以理去任亦聽佩魚袋自後恩制賜賞緋紫例兼魚袋謂之章服因之佩魚袋服朱紫者衆矣梁制云袴褶近代服以從戎今纘嚴則文武百官咸服之車駕親戎則縛袴不舒散也中官紫褶外官絳褶舄用皮服冠衣朱者紫衣用赤舄烏衣用烏舄唯褶服以靴靴胡履也取便於事施於戎服舊制乘輿案褥牀褥牀帷皆以紫為飾天寶六載禮儀使太常卿韋縚奏請依御袍色以赤黃為飾從之武德令皇后服有褘衣鞠衣鈿叉禮衣三等褘衣首飾花十二樹并兩博鬢其衣以深青織成為之文為翬翟之形素質五色十二等素紗中單黼領羅縠褾襈褾襈皆用朱色也蔽膝隨裳色以緅為領用翟為章三等大帶隨衣色朱𩹉紕其外上以朱錦下以緑錦紐約用青組以青衣革帶青襪舄舄加金飾白玉雙珮玄組雙大綬章綵尺寸與乘輿同受册助祭朝會諸大事則服之鞠衣黃羅為之其蔽膝大帶及衣革帶舄隨衣色餘與褘衣同唯無雉也親蠶則服之鈿叉禮衣十二鈿服通用雜色制與上同唯無雉及珮綬去舄加履宴見客則服之皇太子妃服首飾花九樹小花如大花之數并兩博鬢也褕翟青織成為之文為搖翟之形青質五色九等也素紗中單黼領羅縠褾襈褾襈皆用朱也蔽膝隨裳色用緅為領緣以搖翟為章二等也大帶隨衣色朱𩹉紕其外上以朱錦下以緑錦紐用青組以青衣革帶青襪舄舄加金飾瑜玉珮紅朱雙大綬章綵尺寸與皇太子同受册助祭朝會諸大事則服之鞠衣黃羅為之其蔽膝大帶及衣革帶隨衣色餘褕翟同唯無雉也從蠶則服之鈿叉禮衣九鈿服通用雜色制與上同唯無雉及珮綬去舄加履宴見賓客則服之內外命婦服花叉施兩博鬢寶鈿飾也翟衣青質羅為之繡為雉編次於衣及裳重為九等而下第一品花鈿九樹寶鈿準花數以下準此也翟九等第二品花鈿八樹翟八等第三品花鈿七樹翟七等第四品花鈿六樹翟六等第五品花鈿五樹翟五等並素紗中單黼領朱褾襈亦通用羅縠也蔽膝隨裳色以緅為領緣加以文繡重雉為章二事一品已下皆同也大帶隨衣色緋其外上以朱錦下以緑錦紐同青組青衣革帶青襪舄珮綬內命婦受册從蠶朝會則服之其外命婦嫁及受册從蠶大朝會亦準此鈿叉禮衣通用雜色制與上同唯無雉及珮綬去舄加履第一品九鈿第二品八鈿第三品七鈿第四品六鈿第五品五鈿內命婦尋常參見外命婦朝參辭見及禮會則服之六尚寶林御女采女女官等服禮衣通用雜色制與上同惟無首飾七品已上有大事服之尋常供奉則公服公服去中單蔽膝大帶九品已上大事及尋常供奉並公服東宮準此女史則半袖裙襦諸公主王妃珮綬同諸王縣主內命婦準品外命婦五品已上皆準夫子即非因夫子別加邑號者亦準品婦人宴服準令各依夫色上得兼下下不得僭上既不在公庭而風俗奢靡不依格令綺羅錦繡隨所好尚上自宮掖下至匹庶遞相倣效貴賤無別武德貞觀之時宮人騎馬者依齊隋舊制多著羃雖發自戎夷而全身障蔽不欲途路窺之王公之家亦同此制永徽之後皆用帷帽拖裙到頸漸為淺露尋下敕禁斷初雖暫息旋又仍舊咸亨二年又下敕曰百官家口咸預士流至於衢路之間豈可全無障蔽比來多著帷帽遂𠫓廾羃曾不乘車別坐簷子遞相倣效浸成風俗過為輕率深失禮容前者已令漸改如聞猶未止息又命婦朝謁或將馳駕車既入禁門有虧肅敬此並乖於儀式理須禁斷自今已後勿使更然則天之後帷帽大行羃漸息中宗即位宮禁寬弛公私婦人無復羃之制開元初從駕宮人騎馬者皆著胡帽靚葬露面無復障蔽士庶之家又相倣效帷帽之制絶不行用俄又露髻馳騁或有著丈夫衣服靴衫而尊卑內外斯一貫矣奚車契丹塞外用之開元天寶中漸至京城兜籠巴蜀婦人所用今乾元已來蕃將多著勳於朝兜籠易於擔負京城奚車兜籠代於車輿矣武德來婦人著履規制亦重又有線靴開元來婦人例著線鞋取輕妙便於事侍兒乃著履臧獲賤伍者皆服襴衫太常樂尚胡曲貴人御饌盡供胡食士女皆竟衣胡服故有范陽羯胡之亂兆於好尚遠矣太極元年左司郎中唐紹上疏曰臣聞王公已下送終明器等物具標甲令品秩高下各有節文孔子曰明器者備物而不可用以芻靈者善為俑者不仁傳曰俑者謂有面目機發似於生人也以此而葬殆將於殉故曰不仁近者王公百官競為厚葬偶人像馬雕飾如生徒以眩耀路人本不因心致禮更相扇慕破産傾資風俗流行遂下兼士庶若無禁制奢侈日增望諸王公已下送葬明器皆依令式並陳於墓所不得衢路行又士庶親迎之儀備諸六禮所以承宗廟事舅姑當須昏以為期詰朝謁見往者下俚庸鄙時有障車邀其酒食以為戲樂近日此風轉盛上及王公乃廣奏音樂多集徒侶遮擁道路留滯淹時邀致財物動踰萬計遂使障車禮貺過於聘財歌舞喧譁殊非助感既虧名教實𢀿風猷違紊禮經須加節制望請婚姻家障車者並須禁斷其有犯者有蔭家請準犯名教例附簿無蔭人決杖六十仍各科本罪制從之
