body:
  text: 舊唐書卷十二本紀第十二德宗上德宗神武孝文皇帝諱適代宗長子母曰睿真皇后沈氏天寶元年四月癸巳生於長安大內之東宮其年十二月拜特進封奉節郡王代宗即位之年五月以上為天下兵馬元帥改封魯王八月改封雍王時史朝義據東都十月遣上會諸軍於陝州大舉討賊十一月破賊於洛陽進收東都河南平定朝義走河北分命諸將追之俄而賊將李懷仙斬朝義首以獻河北平以元帥功拜尚書令食實封二千戶與郭子儀等八人圖形凌煙閣廣德二年二月立為皇太子大曆十四年五月辛酉代宗崩癸亥即位於太極殿閏月壬申貶中書舍人崔祐甫為河南少尹甲戌貶門下侍郎平章事常衮為潮州刺史召崔祐甫為門下侍郎同中書門下平章事丙子詔諸州府新羅渤海歲貢鷹鷂皆停戊寅詔山南枇杷江南柑橘歲一貢以供宗廟餘貢皆停庚寅以兵部尚書路嗣恭為東都留守以常州刺史蕭復為潭州刺史湖南團練觀察使辛巳罷雍府歲貢奴婢癸未改括州為處州括蒼縣為麗水縣停梨園使及伶官之冗食者三百人留者皆隸太常劍南歲貢春酒十斛罷之甲申以司徒兼中書令河中尹靈州大都督單于鎮北大都護充關內河東副元帥朔方節度關內支度鹽池六城水運大使押諸蕃部落管內及河陽等道觀察使上柱國汾陽郡王山陵使食實封一千九百戶郭子儀可加號尚父守太尉餘官如故加實封通前二千戶月給一千五百人糧馬二百匹草料以朔方都虞候李懷光為河中尹邠寧慶晉絳慈隰等州節度觀察使以朔方右留後常謙光兼靈州大都督西受降城定遠軍天德鹽夏豐節度等使以朔方左留後單于副都護渾瑊為單于大都護振武軍東中二受降城鎮北及綏銀麟勝等軍州節度營田使丙戌詔禁天下不得貢珍禽異獸銀器勿以金飾丁亥詔文單國所獻舞象三十二令放荊山之陽五坊鷹犬皆放之出宮女百餘人己丑以右羽林大將軍吳希光檢校散騎常侍兼御史中丞充渭北鄜坊丹延都團練觀察使辛卯以河陽三城鎮遏使馬燧檢校工部尚書兼太原尹御史大夫北都留守河東節度使壬辰以河東節度留後鮑防為京畿觀察使陳州刺史李芃檢校太常少卿為河陽三城鎮遏使癸巳以壽州刺史杜亞為江西觀察使甲午冊太尉子儀自開元以來冊禮多廢天寶中楊國忠冊司空至是行子儀之冊以江西觀察使杜亞為陝州長史充轉運使丙申詔兵部侍郎黎幹害若豺狼特進劉忠翼掩義隱賊並除名長流既行俱賜死丁酉以京畿觀察使鮑防為福州刺史福建都團練觀察使以戶部侍郎判度支韓滉太常卿吏部尚書劉晏判度支鹽鐵轉運等使初晏與滉分掌天下財賦至是晏都領之六月己亥朔御丹鳳樓大赦天下罪無輕重咸赦除之內外文武三品已上賜爵一級四品已下加一階致仕官同見任百姓為戶者賜古爵一級加李正己司徒太子太傅崔寧李勉本官同平章事天下進獻事緣郊祀陵廟所須依前勿闕餘並停諸州刺史上佐今後准式入計諸州刺史常參官父在未有官量與五品致仕官父亡歿與追贈自至德已來別敕或因人奏或臨事頒行差互不同使人疑惑中書門下與詳定官決取堪久長行用者編入格條自今更不得奏置寺觀及度人庚子封元子誦為宣王次子謨為舒王諶為通王諒為虔王詳為肅王並加開府儀同三司乙巳封皇弟乃為益王迅為隨王丙午舉先天故事非供奉侍衛之官自文武六品已上清望官每日二人更直待制以備顧問仍以延英南藥院故地為廨癸丑詔皇族五服等已上居四方者家一人赴山陵縣次給食己未揚州每年貢端午日江心所鑄鏡幽州貢麝香皆罷之辛酉罷宣歙池鄂嶽沔二都團練觀察使陝虢都防禦使以其地分隸諸道復置東都京畿觀察使以御史中丞為之壬戌處州刺史王縉湖州刺史第五琦皆為太子賓客睦州刺史李揆為國子祭酒並留司東都中官邵光超送淮西旌節李希烈遺縑七百匹事發杖六十配流由是中官不敢受賂癸亥詔中書門下御史臺五品已上諸司三品已上長官各舉可任刺史縣令者一人中書門下量才進擬有犯坐舉主秋七月戊辰朔日有蝕之禮儀使吏部尚書顏真卿奏列聖諡號文字繁多請以初諡為定兵部侍郎袁議云陵廟玉冊已刻不可輕改罷妄奏不知玉冊皆刻初諡而已庚午詔雍州所奏金坑誠為潤國語人以利非朕素懷其坑任人開採官不得禁辛未以吏部侍郎房宗偃為御史中丞東都畿觀察使罷右銀臺門客省歲給廩料萬二千斛自永泰已來或四方奏計未遣者或上書言事忤旨者及蕃客未報者常數百人於客省給食橫費已甚故罷之壬申毀元載馬璘劉忠翼之第以其雄侈踰制也癸酉減宮中服御常貢者千數丁丑復置馬隨仗於月華門外己卯詔王公卿士不得與民爭利諸節度觀察使於揚州置回易邸並罷之庚辰詔鴻臚寺蕃客入京各服本國之服罷商州歲貢膠辛卯罷天下榷酒丁酉詔國用未給其宣王已下開府俸料皆罷給八月甲辰以門下侍郎平章事崔祐甫為中書侍郎平章事以道州司馬同正楊炎為門下侍郎平章事以懷州刺史喬琳為御史大夫同平章事京畿觀察使乙巳遣太常少卿韋倫使吐蕃以蕃俘五百人還之修好也癸亥詔人死亡於外以棺柩還城者勿禁九月甲戌以淮西節度為淮寧軍辛巳以檢校刑部尚書白孝德為太子少傅丙戌祕書少監邵說為吏部侍郎給事中劉乃為兵部侍郎中書舍人令狐峘為禮部侍郎冬十月丁酉朔吐蕃合南蠻之衆號二十萬三道寇茂州扶文黎雅等州連陷郡邑發兵四千助蜀大破之己酉葬代宗於元陵戊午九成宮貢立獸炭爐襄州貢種蔗蒻之工皆罷之散官豢豬三千頭給貧民十一月辛未以鴻臚卿賈耽為梁州刺史山南西道節度觀察使丁丑以陝州長史杜亞為河中尹河中晉絳慈隰都防禦觀察使壬午御史大夫平章事喬琳為工部尚書罷知政事加劍南西川節度觀察度支營田等使檢校司空平章事成都尹崔寧兼御史大夫京畿觀察使癸巳加崔寧兼靈州大都督單于鎮北大都護朔方節度等使出鎮坊州以荊南節度使檢校禮部尚書兼江陵尹御史大夫張延賞檢校兵部尚書兼成都尹御史大夫劍南西川節度度支營田觀察等使以朔方節度虞候杜希全為靈州留後以鄜州刺史張光晟單于振武軍使東中二受降城綏銀鄜勝等軍州留後延州刺史李建為鄜坊丹延留後楊炎素惡崔寧雖授以三鎮仍署此三人為留後奪寧之權也人皆憤之十二月己亥南選使可以專達勿復以御史臨之乙卯制宣王某可立為皇太子丙寅晦日有蝕之詔元日朝會不得奏祥瑞事建中元年春正月丁卯朔御含元殿改元建中羣臣上尊號曰聖神文武皇帝己巳上朝太清宮庚午謁太廟辛未有事於郊丘是日還宮御丹鳳門大赦天下自艱難以來徵賦名目頗多今後除兩稅外輒率一錢以枉法論常參官諸道節度觀察防禦等使都知兵馬使刺史少尹畿赤令大理司直評事等授訖三日內於四方館上表讓一人以自代其外官委長吏附送其表付中書門下每官闕以舉多者授之王府六品以上官及諸州縣有司可併省及諸官減者量事廢省天下子為父後者賜勳兩轉己巳福建觀察使鮑防湖南觀察使蕭復讓憲官從之自兵興已來方鎮重任必兼臺省長官以至外府僚佐亦帶臺省銜至是除韓滉蘇州刺史杜亞河中少尹而領都團練觀察使不帶臺省兼官自是諸道非節度而兼憲官者皆讓甲午詔東都河南江淮山南東道等轉運租庸青苗鹽鐵等使尚書左僕射劉晏頃以兵車未息權立使名久勤元老集我庶務悉心瘁力垂二十年朕以征稅多門鄉邑凋耗聽于羣議思有變更將置時和之理宜復有司之制晏所領使宜停天下錢穀委金部倉部中書門下揀兩司郎官准格式調掌是月浚豐州陵陽渠二月丙申遣黜陟使一十一人分行天下癸卯以戶部郎中韓洄為諫議大夫以涇原節度使段秀實為司農卿己酉貶尚書左僕射劉晏為忠州刺史癸丑昭義軍節度留後李抱真為本道節度使甲寅貶史館修撰禮部侍郎令狐峘郴州司馬右補闕柳冕巴州司戶日本國朝貢癸亥朱泚兼四鎮北庭行軍涇原節度使三月丙寅禮儀使奏東都太廟闕木主請造詔下議之不決庚午監察御史張著以法冠彈中丞嚴郢浚陵陽渠匿詔不行削郢官著賜緋魚辛未左散騎常侍翰林學士張涉放歸田里甲戌以前司農卿庾準為江陵尹兼御史中丞荊南節度使癸巳以諫議大夫韓洄為戶部侍郎判度支時將貶劉晏罷使名歸尚書省本司今又命洄判度支令金部郎中杜佑權勾當江淮水陸運使一如劉晏韓滉之則蓋楊炎之排晏也夏四月乙未朔涇原裨將劉文喜據城叛己亥地震辛未命江西觀察使崔昭冊命回紇可汗戊申以福建觀察使鮑防為洪州刺史江西團練觀察使癸丑上誕日不納中外之貢唯李正己田悅各獻縑三萬匹詔付度支妃父王景先駙馬高怡獻金銅像上曰有何功德非吾所為退還之壬戌以衡州刺史嗣曹王皋為潭州刺史湖南團練觀察使御史中丞元全柔為杭州刺史五月甲子朔戊辰以太常少卿韋倫為太常卿復使吐蕃己卯右金吾衛大將軍李通為黔州刺史黔中經略招討觀察鹽鐵等使潮州刺史常衮為福建觀察使涇州將劉光國殺劉文喜降涇州平六月甲午朔中書侍郎同中書門下平章事崔祐甫卒辛丑築奉天城加試殿中監劉海賓兼御史中丞封樂平郡王海賓涇州將賞殺劉文喜也乙卯京兆尹源休使回紇冊武義成功可汗秋七月丁丑罷內出盂蘭盆不命僧為內道場壬申以鴻臚寺左右威遠營隸金吾己丑忠州刺史劉晏賜自盡八月甲午振武軍使張光晟殺領蕃回紇首頗突董統等千人收駝馬千餘繒錦十萬匹乃徵光晟歸朝以彭令芳代之乙未河中晉絳觀察使杜亞為睦州刺史丁未加朱泚中書令餘官使並如故以舒王謨為涇原節度大使尚書右丞孟為涇州刺史知留後東僰烏蠻守來朝貢丁巳遙尊上母沈氏曰皇太后戊午以吏部尚書顏真卿為太子少師依前禮儀使改封嗣舒王藻為嗣郢王九月戊辰判度支韓洄奏請於商州紅崖冶洛源監置十爐鑄錢江淮七監每鑄一千費二千文請皆罷從之己卯雷冬十月甲午貶尚書左丞薛雍為連山尉坐贓也乙巳太子少傅昌化郡王白孝德卒庚寅以睦王述為奉迎皇太后使工部尚書喬琳為副十一月辛酉朔朝集使及貢使見於宣政殿兵興已來四方州府不上計內外不朝會者二十有五年至此始復舊制州府朝集者一百七十三人詔每令分番二人待詔乙丑贈敬暉等五王官又贈張九齡司徒鍾紹京太子太傅戊寅諸王有官者初令出閣就班又出嫁嶽陽等一十縣主皆在諸王院久而未適人者上悉命以禮出降十二月辛卯韋倫使回與吐蕃宰相論欽明思等五十五人同至獻方物修好也丁酉令詳定國初以來將相功臣房玄齡等一百八十七人據功績分為三等是歲戶部計帳戶總三百八萬五千七十有六賦入一千三百五萬六千七十貫鹽利不在此限二年春正月庚申朔戊辰成德軍節度恆定等州觀察使司空兼太子太傅同中書門下平章事恆州刺史隴西郡王李寶臣卒丙子以汴宋滑亳陳潁泗節度觀察使檢校吏部尚書同平章事李勉為永平軍節度汴滑陳等州觀察等使以兵部尚書東都留守路嗣恭為鄭汝陝河陽三城節度東畿觀察等使以宋州刺史劉洽為宋亳潁節度使以鄭州隸永平軍自去年十月無雪至甲申方雨雪丁亥檢校戶部尚書張獻恭為東都留守以河南尹趙惠伯為河中尹河中晉絳慈隰都防禦觀察使以前鄭州刺史于頎為河南尹二月乙未以御史中丞盧嵵為御史大夫京畿觀察使以桂管觀察使李昌為江陵尹兼御史大夫荊南節度等使以前荊南節度使庾準為左丞甲辰以容州刺史盧嶽為桂州防禦觀察使乙巳以門下侍郎楊炎為中書侍郎同中書門下平章事以御史大夫盧嵵為門下侍郎同中書門下平章事丙午以宋亳節度為宣武軍丁未以御史中丞袁高為京畿觀察使乙卯振武軍亂殺其帥彭令芳監軍劉惠光三月庚申朔築汴州城初大曆中李正己有淄青齊海登萊沂密德棣曹濮徐兗鄆十五州之地李寶臣有恆定易趙深冀滄七州之地田承嗣有魏博相衛洺貝澶七州之地梁崇義有襄鄧均房復郢六州之地各聚兵數萬始因叛亂得位雖朝廷寵待加恩心猶疑二皆連衡盤結以自固朝廷增一城浚一池便飛語有辭而諸盜完城繕甲略無寧日至是田悅初稟命劉文喜殄除羣凶震懼又奏計者還都無賜與既歸皆構怨言先是汴州以城隘不容衆請廣之至是築城正己田悅移兵於境為備故詔分汴宋滑為三節度移京西防秋兵九萬二千人以鎮關東又於郾城置州辛巳以汾州刺史王翃為振武軍使東中二受降城鎮北綏銀麟勝等州留後以萬年令崔漢衡為殿中少監使吐蕃夏四月己酉朔省沔州庚寅襄州梁崇義兼同中書門下平章事己亥省燕州順化州乙卯併平琴州為黨州丁巳貶禮部侍郎于召桂州刺史御史中丞袁高韶州長史五月丙寅以軍興十一而稅己巳以淮寧軍節度使李希烈充漢南北諸道都知兵馬招撫處置等使封南平王庚寅以浙江西道為鎮海軍加蘇州刺史韓滉檢校禮部尚書潤州刺史充鎮海軍節度使浙江東西道觀察等使以御史中丞一員為理匭使諫議大夫一員知匭使給事中中書舍人為監考使辛丑尚父中書令汾陽郡王郭子儀薨丙午以檢校祕書少監鄭叔則為御史中丞東都畿觀察使壬子以懷鄭河陽節度副使李芃為河陽三城懷州節度使仍割東畿五縣隸焉秋七月戊子朔詔曰二庭四鎮統任西夏五十七蕃十姓部落國朝以來相奉率職自關隴失守東西阻絶忠義之徒泣血相守慎固封略奉遵禮教皆侯伯守將交修共理之所致也伊西北庭節度觀察使李元忠可北庭大都護四鎮節度留後郭昕可安西大都護四鎮節度觀察使自河隴陷虜伊西北庭為蕃戎所隔間者李嗣業荔非元禮孫志直馬璘輩皆遙領其節度使名初李元忠郭昕為伊西北庭留後隔絶之後不知存亡至是遣使歷回紇諸蕃入奏方知音信上嘉之其伊西北庭將士官仍超七資庚申以中書侍郎平章事楊炎為左僕射以前永平軍節度使張鎰為中書侍郎同中書門下平章事司空淮陽郡王侯希逸卒丁丑以河中尹關播為給事中同州刺史李承為河中尹晉絳都防禦觀察使辛巳以邠寧節度使李懷光兼靈州大都督單于鎮北大都護朔方節度使以鄜坊丹延觀察留後李建徽為坊州刺史鄜坊丹延都團練觀察使壬午以幽州隴右節度使中書令朱泚為太尉田悅攻寇臨洺守將張伾城守八月辛卯平盧淄青節度觀察使司徒太子太保同中書門下平章事李正己卒庚戌以中書舍人衛晏為御史中丞京畿觀察使壬子淮寧軍節度使李希烈攻襄陽誅梁崇義斬其同惡三十餘人九月辛酉以易州刺史張孝忠為恆州刺史充成德軍節度觀察使壬戌加李希烈同中書門下平章事癸亥兵部尚書翼國公路嗣恭卒甲子以晉絳觀察使李承為襄州刺史山南東道節度觀察等使戊辰以杭州刺史元全柔為黔中經略招討觀察等使冬十月乙酉尚書左僕射楊炎貶崖州司馬尋賜死戊申加宣武軍節度使劉洽御史大夫徐州刺史李洧棄其帥李納以州來降十一月辛未宣武節度劉洽與神策將曲環大破李納之衆於徐州己巳詔成德軍節度都知兵馬使恆州刺史襲隴西郡王李惟嶽以其父寶臣有忠勞於王室惟嶽隳墜父業蔑棄國恩縗絰之中擅掌戎務外結凶黨益固姦謀不孝不忠宜肆原野削爾在身官爵乙亥貶戶部侍郎判度支韓洄蜀州刺史以江淮轉運使度支郎中杜佑代判度支戶部事丁丑以陝州長史李齊為河中尹充河中晉絳防禦觀察使以商州刺史姚明揚為陝州長史本州防禦陸運使以權鹽鐵使戶部郎中包佶充江淮水陸運使李納將海州刺史王涉以州降十二月庚寅河中節度使馬燧檢校左僕射澤潞節度使李抱真檢校兵部尚書賞破田悅之功也丙申太子賓客王縉卒三年春正月乙卯朔丙寅幽州節度使朱滔張孝忠破李惟嶽之兵於束鹿辛未詔供御及太子諸王常膳有司宜減省之於是宰臣上言減堂廚百官月俸請三分省一以助軍從之庚辰追封皇叔僖為宋王贈皇弟選荊王閏月丙申以文宣王三十七代孫齊賢為兗州司功襲文宣公辛丑復置具員簿甲辰成德軍兵馬使王武俊殺李惟嶽傳首京師庚戌馬燧李抱真李芃破田悅兵於洹水進攻魏州二月戊午惟嶽將定州刺史楊政義以州降加朱滔檢校司徒以張孝忠檢校兵部尚書易定滄三州節度使以檢校太子賓客王武俊檢校祕書監恆州刺史恆冀都團練觀察使康日知為趙州刺史深趙都團練觀察使三月丁亥贈故衛尉卿顏杲卿司徒故常山太守袁履謙左散騎常侍故許州長史龐堅右散騎常侍故鞏縣主簿蔣清禮部侍郎贈故驍衛將軍代國公安金藏兵部尚書授其子承恩廬州長史乙未以徐州刺史李洧為徐沂海團練觀察使戊戌田悅洺州刺史田昂以城降以嶺南節度使張伯儀檢校兵部尚書兼江陵尹御史大夫荊南節度等使以容管經略使元琇為廣州刺史嶺南節度使丙午貶京兆尹盧為撫州長史夏四月李納守德州將李士真守棣州將李長卿皆以城降庚申先陷蕃僧尼將士八百人自吐蕃而還壬戌封朱滔為通義郡王朱滔王武俊與田悅合從而叛太常博士韋都賓陳京以軍興庸調不給請借京城富商錢大率每商留萬貫餘並入官不一二十大商則國用濟矣判度支杜佑曰今諸道用兵月費度支錢一百餘萬貫若獲五百萬貫才可支給數月甲子詔京兆尹長安萬年令大索京畿富商刑法嚴峻長安令薛蘋荷校乘車於坊市搜索人不勝鞭笞乃至自縊京師囂然如被盜賊搜括既畢計其所得才八十萬貫少尹韋禛又取僦匱質庫法拷索之才及二百萬丁丑彭王傅徐浩卒贈太子少師戊寅以中書侍郎平章事張鎰兼鳳翔尹隴右節度使以代朱泚加泚實封五百戶賜竇氏名園涇水上腴田及錦綵金銀器以安其意時滔叛故也壬午貶御史大夫嚴郢為費州長史杖殺左巡使殿中侍御史鄭詹郢歲餘卒五月丙戌增兩稅鹽榷錢兩稅每貫增二百鹽每斗增一百丁亥貶太子詹事邵說歸州刺史卒於貶所辛卯詔朔方節度使李懷光率神策及朔方軍東討丙申詔故伊西北庭節度使楊休明故河西節度使周鼎故西州刺史李琇璋故瓜州刺史張銑等寄崇方鎮時屬殷憂固守西陲以抗戎虜殆身異域多歷歲年以逮于茲旅櫬方旋誠深追悼宜加寵贈以賁幽泉休明可贈司徒鼎贈太保琇璋贈戶部尚書銑贈兵部侍郎皆隴右牧守至德已來陷吐蕃而歿故至是西蕃通和方得歸葬也丁酉加河東節度使檢校左僕射馬燧同平章事澤潞李抱真檢校右僕射河陽李芃檢校兵部尚書神策營招討使李晟右散騎常侍賞破田悅功也乙巳貶戶部侍郎判度支杜佑為蘇州刺史以中書舍人趙贊為戶部侍郎判度支辛亥易定節度賜名義武軍六月丁巳尚書左丞庾準卒甲子京師地震以左散騎常侍李涵為入回紇弔祭使京兆少尹源休為光祿卿戊寅以前衢州刺史趙涓為尚書左丞右庶子柳載為右丞辛未朱滔王武俊兵救田悅至魏州北是日李懷光兵亦至馬燧抱真李芃等盛軍容迓懷光朱滔等慮其掩襲遽出兵懷光與之接戰於連篋山之西王師不利各還營壘賊乃壅河決水絶我糧道秋七月甲申以前振武軍使王翃為京兆尹以兵部郎中楊真為御史中丞京畿觀察使以括率商戶人情不安癸巳詔除已收納入庫外一切停已貯納者仍明置簿曆各給文牒後准元數卻還甲午以前同州刺史蕭復為兵部侍郎庚子馬燧李懷光李抱真李芃等四節度兵退保魏橋朱滔王武俊田悅之衆亦屯於魏橋東南與官軍隔河對壘自五月不雨甲辰始雨宣武節度李勉為檢校司徒懷寧李希烈檢校司空邠寧李懷光同平章事李芃封開陽郡王八月丁未初分置汴東西水陸運兩稅鹽鐵事從戶部侍郎判度支趙贊奏也戊午太子賓客第五琦卒于位辛酉以涇原節度留後姚令言為涇原節度使戊辰以江淮鹽鐵使太常少卿包佶為汴東水陸運兩稅鹽鐵使己巳加劍南西川節度使張延賞檢校吏部尚書甲戌以大理少卿崔縱為汴西水陸運兩稅鹽鐵使丁丑以禮儀使太子少師顏真卿為太子太師庚辰徐海沂都團練使李洧卒江淮訛言有毛人捕人食其心人情大恐九月丁亥以李洧部將高承宗為徐州刺史徐海沂都團練使判度支趙贊上言請為兩都江陵成都揚汴蘇洪等州署常平輕重本錢上至百萬貫下至十萬貫收貯斛斗匹段絲麻候貴則下價出賣賤則加估收糴權輕重以利民從之贊乃於諸道津要置吏稅商貨每貫稅二十文竹木茶漆皆什一稅一以充常平之本己亥夜有猛獸入宣陽里傷二人詰朝獲之冬十月辛亥以湖南觀察使嗣曹王臯為洪州刺史江西節度使丙辰以吏部侍郎關播為中書侍郎同平章事都官員外郎樊澤使吐蕃回與蕃相尚結贊約來年正月望日會盟清水丙子肅王詳薨十一月己卯以山南西道節度使賈耽檢校工部尚書兼襄州刺史御史大夫山南東道節度使以興鳳團練使嚴震為梁州刺史山南西道節度使甲午以前山南東道節度使李承為潭州刺史湖南觀察使是月朱滔田悅王武俊於魏縣軍壘各相推奬僭稱王號滔稱大冀王武俊稱趙王悅稱魏王又勸李納稱齊王僭署官名如國初親王行臺之制丁丑李希烈自稱天下都元帥太尉建興王與朱滔等四盜膠固為逆四年春正月戊寅朔丁亥鳳翔節度使張鎰與吐蕃宰相尚結贊同盟于清水庚寅李希烈陷汝州執州將李元平而去東都震駭甲午遣顏真卿宣慰李希烈軍戊戌以龍武大將軍哥舒曜為東都畿汝節度使率鳳翔邠寧涇原等軍東討希烈丙午福建觀察使常衮卒二月戊申於河陽三城置河陽軍節度乙卯哥舒曜收汝州丁丑以工部侍郎蔣鎮充禮儀使三月己卯復置沔州癸未以左散騎常侍孟為福建都團練觀察使辛卯嗣曹王臯擊李希烈將陳質之衆敗之收復黃州丁酉荊南張伯儀與賊戰敗績嗣曹王收復蘄州夏四月庚申以永平宣武河陽等軍節度都統檢校司徒平章事李勉為淮西招討使襄陽帥賈耽江西嗣曹王等為之副甲子京師地震生黃白毛長尺餘丙子哥舒曜進軍至潁橋大震雷人死者十之三四乃退保襄城五月辛巳夜京師地震乙酉潁王薨乙巳滑濮二州黃河清滑州馬生角六月庚戌初稅屋間架除陌錢時馬燧李懷光李抱真李芃屯魏縣李晟屯易定李勉陳少遊哥舒曜屯懷汝間神策諸軍皆臨賊境凡諸道之軍出境仰給於度支謂之食出界糧月費錢一百三十萬貫判度支趙贊巧法聚斂終不能給至是又稅屋所由吏秉筆持算入人廬舍而抄計峻法繩之愁嘆之聲遍於天下秋七月甲申以國子祭酒李揆為禮部侍郎復其爵甲午以李揆為左僕射兼御史大夫為入吐蕃會盟使八月丁未李希烈率衆三萬攻哥舒曜於襄城湖南觀察使李承卒九月戊寅龍見於汝州之城濠丙戌李勉將唐漢臣劉德信喪師於扈澗汴軍自此不振東都危急冬十月丙午詔涇原節度使姚令言率涇原之師救哥舒曜丁未涇原軍出京城至滻水倒戈謀叛姚令言不能禁上令載繒綵二車遣晉王往慰諭之亂兵已陳于丹鳳闕下促神策軍拒之無一人至者與太子諸王妃主百餘人出苑北門右龍武軍使令狐建方教射於軍中聞難聚射士得四百人扈從其夕至咸陽飯數匕而過戊申至奉天己酉元帥都虞候渾瑊以子弟家屬至乃以瑊為行在都虞候神策軍使白志貞為行在都知兵馬使以令狐建為中軍鼓角使金吾將軍侯仲莊為奉天防城使亂兵既剽京城屯於白華乃於晉昌里迎朱泚為帥稱太尉居含元殿上以奉天隘欲幸鳳翔壬子鳳翔軍亂殺節度使張鎰乃止癸丑李希烈陷襄城哥舒曜走洛陽乙卯賜檢校司空崔寧死丁巳以吏部尚書蕭復刑部侍郎劉從一諫議大夫姜公輔並以本官同中書門下平章事邠寧節度韓遊瓌與論惟明率兵三千至才入奉天賊軍亦至乃出拒之王師不利賊乘勝攻門自卯至午殺傷殆半會有草車在門外渾瑊令焚之賊衆遂退癸巳泚賊三面攻城渾瑊力戰禦之方退大將呂希倩死之賊自丁未攻城至己巳二十餘日矢石不絶十一月乙亥以隴右節度判官隴州留後殿中侍御史韋臯為隴州刺史兼御史大夫奉義軍節度使靈武留後杜希全鹽州刺史戴休顏夏州刺史時常春合兵六千來援至漠谷為賊所敗而退賊由是攻城愈急矢石雨下死傷者衆人心危蹙上與渾瑊對泣朱泚據乾陵作樂下瞰城中詞多侮慢戊子賊造雲橋攻東北隅兵仗不能及城中憂恐相顧失色渾瑊預為地道及雲橋傅城腳陷不得進瑊命焚之風回焰轉橋焚而賊退朔方節度李懷光遣兵馬使張韶奉表言大軍將至乃令舁韶巡城叫呼歡聲動地賊不之測疑懼緩攻癸巳懷光軍次醴泉是夜賊解圍而去神策將李晟自定州率師赴難軍於渭橋甲午以商州都虞候王仙鶴權商州防禦使十二月壬戌貶門下侍郎平章事盧嵵為新州司馬貶行在都知兵馬使白志貞為恩州司馬戶部侍郎判度支趙贊為播州司馬癸亥以京兆少尹裴腆判度支甲子以湖南觀察留後趙憬為湖南觀察使乙丑以祠部員外郎陸贄為考功郎中金部員外郎吳通微為職方郎中翰林學士並如故以侍御史吳通玄為起居舍人充翰林學士己巳以河中尹李齊運為宗正卿庚午李希烈陷汴州以右庶子崔縱為京兆尹癸酉以中書侍郎平章事關播為刑部尚書司封郎中杜黃裳為給事中命給事中孔巢父淄青宣慰華州刺史董晉河北宣慰興元元年春正月癸酉朔上在奉天行宮受朝賀詔曰立政興化必在推誠忘己濟人不吝改過朕嗣服丕構君臨萬邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明徵其義以示天下小子懼德不嗣罔敢怠荒然以長於深宮之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦致澤靡下究情不上通事既壅隔人懷疑阻猶昧省己遂用興戎徵師四方轉餉千里賦車籍馬遠近騷然行賫居送衆庶勞止力役不息田萊多荒暴令峻於誅求疲民空於杼軸轉死溝壑離去鄉里邑里丘墟人煙斷絶天譴于上而朕不寤人怨于下而朕不知馴致亂階變起都邑賊臣乘釁肆逆滔天曾莫愧畏敢行凌逼萬品失序九廟震驚上纍於祖宗下負于蒸庶痛心靦面罪實在豫永言愧悼若墜泉谷賴天地降祐人只協謀將相竭誠爪牙宣力羣盜斯屏皇維載張將弘遠圖必布新令朕晨興夕惕惟省前非乃者公卿百僚用加虛美以聖神文武之號被蒙暗寡昧之躬固辭不獲俯遂羣議昨因內省良所瞿然自今已後中外書奏不得言聖神文武之號今上元統曆獻歲發祥宜革紀年之號式敷在宥之澤可大赦天下改建中五年為興元元年李希烈田悅王武俊李納咸以勳舊繼守藩維朕撫馭乖方致其疑懼皆由上失其道而下罹其災一切並與洗滌復其爵位待之如初仍即遣使宣諭朱滔以泚連坐路遠必不同謀永念舊勳務存弘貸如能效順亦與惟新朱泚反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦除泚外並從原宥應赴奉天并進收京城將士並賜名奉天定難功臣身有過犯減罪三等子孫過犯減罪二等先稅除陌間架等錢竹木茶漆等稅並停奉天升為赤縣分命朝臣諸道宣諭以奉天行營都團練使楊惠元檢校工部尚書丙戌以吏部侍郎蕭復為門下侍郎同平章事以吏部侍郎盧翰為兵部侍郎同平章事戊子命宰臣蕭復往山南荊南湖南江西鄂嶽浙江東西福建等道宣慰己丑以京兆尹裴腆為戶部侍郎判度支丙申以山南東道行軍司馬樊澤為襄州刺史山南東道節度使以渾瑊為行在都知兵馬使以前趙州觀察使康日知兼同州刺史充奉誠軍節度使辛丑詔六軍各置統軍一員秩從二品左右常侍各加一員太子賓客加四員二月戊寅詔故司農卿張掖王段秀實贈太尉諡曰忠烈賜實封五百戶贈滑州兵馬使賈隱林左僕射以滑州刺史李澄兼汴州刺史汴滑節度使是日李晟自咸陽移兵東渭橋避懷光也晟以懷光反狀已明請上幸蜀王武俊效順加中書門下平章事兼幽州節度使令討朱滔吐蕃遣使來朝請以兵助國討逆乃令御史大夫于頎入蕃宣諭之甲子加李懷光太尉仍賜鐵券赦三死罪懷光怒曰凡人臣反逆乃賜鐵券今賜懷光是反必矣乃投之於地上命翰林學士陸贄曉諭之是日人心恐駭懷光奪楊惠元李建徽所將兵惠元被害丁卯車駕幸梁州留戴休顏守奉天以御史中丞齊映為沿路置頓使李晟大集兵賦以收復為己任李懷光患之移軍涇陽連朱泚欲同滅晟晟卑詞厚意致書諭之冀其感悟懷光頗增愧懼三月甲申以祕書監崔漢衡為上都留守右散騎常侍于頎為京兆尹是日懷光燒營走歸河中其將孟涉段威勇等千人奔歸李晟丙戌以前饒州刺史杜佑為廣州刺史嶺南節度使加神策節度使李晟兼京畿渭北鄜坊丹延節