罷以救凶荒俟歲豐登即令復舊甲子李懷光大將尉圭以焦籬堡降丁卯懷光將徐庭光以長春宮兵六千人降甲戌朔方大將牛名俊斬李懷光傳首闕下馬燧收復河中丁丑始雨己卯詔朕誠信未著撫御失宜致使功臣陷於誅戮謂之克敵能不愧心然以懷光一家在法無捨念其昔居將相嘗寄腹心罪雖挂於刑書功巳藏於王府以干紀之迹固合滅身以赴難之勳所宜有後宜以懷光男一人為嗣賜莊宅各一區仍還懷光尸首任其收葬懷光妻諸兒女遞送澧州委李臯逐便安置使得存立其出嫁女諸親並釋放陷賊將士一切並與洗雪河中絳百姓給復一年北平王馬燧咸寧王渾瑊並與一子五品正員官燧可侍中瑊可檢校司空駱元光韓遊瓌唐朝臣各賜實封二百戶與一子六品正員官昨河中行營將士共賜二十萬端匹以充宴賞放歸本道新除中書侍郎平章事張延賞為尚書左僕射時宰相劉從一病詔徵延賞李晟與延賞有隙自鳳翔上表論之延賞罷鎮西川還行至興元改授左僕射戊子前河陽節度使檢校尚書左僕射開陽郡王李芃卒九月己亥幽州節度劉怦病請以子濟權知軍州事從之癸卯以牛名俊為丹州刺史御史大夫崔縱奏准制勘會內外官員商量併省停減詳議聞奏者伏以兵戎未息仕進頗多在官者既合序遷有功者又頒褒賞比來每至選集不免據闕留人嘗歎遺才仍招怨望況有恩詔甄録功勞諸道優人數甚廣見須處置不可稽留今若停減吏員實恐未便於事非但承優者無官可授抑又進者無路可容本冀便人翻成斂怨事仍舊貫以適時宜更待事平然後經度制從之乙巳上御正殿策賢良方正能直言極諫等三科舉人辛亥宰相劉從一以疾辭任授戶部尚書庚申劉從一卒幽州節度使劉怦卒辛巳以權知幽州盧龍軍府事劉濟為幽州長史兼御史大夫幽州盧龍節度觀察押奚契丹兩蕃等使丙戌渾瑊自河中來朝十一月癸巳朔山南嚴震來朝癸卯上親祀昊天上帝於圓丘時河中渾瑊澤潞李抱真山南嚴震同華駱元光邠寧韓遊瓌鄜坊唐朝臣奉誠康日知等大將侍祠郊壇畢還宮御丹鳳樓大赦天下丁丑詔文武常參官共賜錢七百萬貫以歲凶穀貴衣冠窘乏故也十二月戊辰詔延英視事日令常參官七人引對陳時政得失自是羣官互進有不達理道者因多詆訐不適事宜上亦優容遣之二年春正月壬辰朔以歲饑罷元會禮也丙申詔以民饑御膳之費減半宮人月共糧米都一千五百石飛龍馬減半料臺郎御史與兼官出為畿赤令庚子大雪平地尺餘壬寅以散騎常侍劉滋給事中崔造中書舍人齊映並守本官同中書門下平章事門下侍郎平章事盧翰為太子賓客丁未以禮部侍郎鮑防為京兆尹京兆尹韓洄為刑部侍郎國子祭酒包佶知禮部貢舉以江陵少尹李復為容州刺史本管經略使癸丑以御史大夫崔縱為吏部侍郎諫議大夫知制誥翰林學士吉中孚為戶部侍郎判度支兩稅元琇判諸道鹽鐵榷酒詔宰相齊映判兵部李勉判刑部劉滋判吏部禮部崔造判戶部工部甲寅詔天下兩稅錢物委本道觀察使刺史差人送上都其先置諸道水陸轉運使及度支巡院江淮轉運等使並停時崔造專政改易錢穀職事多隳敗造尋以憂病歸第二月癸亥山南樊澤奏破希烈將杜文朝之衆五千擒文朝以獻乙丑鹿入含元殿衛士執之甲戌戶部侍郎元琇為尚書左丞京兆少尹李竦為戶部侍郎判鹽鐵榷酒三月壬寅滑州李澄奏破希烈之衆於鄭州乙巳以司農卿李模為黔中觀察使四月丙寅淮西李希烈為其牙將陳仙奇所鴆並誅其妻子仙奇以淮西歸順戊辰以前黔中觀察使元全柔為湖南觀察使辛巳陝州觀察使李泌奏盧氏山冶出瑟瑟請禁以充貢奉上曰瑟瑟不産中土有則與民共之任人採取甲申詔以淮西牙將陳仙奇為蔡州刺史淮西節度使都統劉玄佐李澄曲環李皋賈耽張建封各與一子正員官賞平淮蔡功也丁未以劍南東川節度使李叔明為太子太傅以東川兵馬使王叔雍為梓州刺史劍南東川節度使五月丙申自癸巳大雨至於茲日饑民俟夏麥將登又此霖澍人心甚恐米斗復千錢丁酉以伊西北庭節度留後楊襲古為北庭大都護伊西北庭節度度支營田瀚海等使己亥百僚請上復常膳是時民久饑困食新麥過多死者甚衆伊西北庭節度使李元忠卒贈司空辛酉大風雨街陌水深數尺人有溺死者癸未橫海軍使滄州刺史程日華卒以其子懷直權知軍州事秋七月戊子黔中觀察使理所復在黔州辛卯以開州別駕白志貞為果州刺史乙未福建觀察盧卒己酉以虔王諒為申光隨蔡節度大使以淮西兵馬使吳少誠為蔡州刺史知節度留後加東都留守賈耽東都畿唐汝鄧都防禦觀察使以隴右行營節度使曲環為陳許節度使戊午以鄜坊節度唐朝臣為單于大都護振武綏銀節度使右金吾大將軍論惟明為鄜州刺史鄜坊都防禦觀察使己巳以金吾大將軍董晉為尚書右丞庚辰右散騎常侍蔣沇卒丙戌吐蕃寇涇隴邠寧諸鎮守閉壁自固京師戒嚴遣河中節度駱元光鎮咸陽九月詔左右金吾及十六衛將軍故事皆擇勳臣出鎮方隅入居侍從自天寶艱難之後衛兵雖然廢闕將軍品秩尤高此誠文武勳臣出入轉遷之地宜增祿秩以示優崇並宜加給料錢及隨身糧課仍舉故事置武班朝參其廊下食亦宜加給其十六衛各置上將軍一人秩從二品左右金吾上將軍俸料次於六統軍支給欲求致理必藉兼才文武遞遷不全限隔自今內外文武缺官於文武班中量才望相參用仍依故事於本衛量置衛兵所司條件以聞丁酉義成軍節度鄭滑觀察等使檢校尚書左僕射滑州刺史武威郡王李澄卒以東都畿唐鄧汝等防禦觀察使賈耽檢校尚書右僕射兼滑州刺史義成軍節度鄭滑等州觀察使戊戌以吏部侍郎崔縱檢校禮部尚書東都留守東都畿唐鄧汝防禦觀察使己亥敕左右衛上將軍大將軍並於衙內宿乙巳吐蕃寇好畤京師戒嚴李晟部將王佖擊吐蕃於汧陽城敗其中軍辛亥寇鳳翔李晟出師禦之一夕而退冬十月壬午奏關內河中河南等道秋夏兩稅青苗等錢悉折納粟麥兼加估收糴以便民從之是月李晟破吐蕃摧沙堡十一月甲午冊淑妃王氏為皇后乙未兩浙節度使韓滉來朝丁酉冊皇后王氏是日后崩諡曰昭德辛丑吐蕃陷鹽州壬寅劉玄佐曲環鄂嶽盧玄卿並來朝十二月丁巳以韓滉兼度支諸道鹽鐵轉運使吐蕃陷夏州又陷銀州庚申以給事中同平章事崔造為右庶子貶尚書右丞度支元琇為雷州司戶為韓滉誣奏人以為非罪諫官屢論之辛未鳳翔李晟來朝壬申京城畿內榷酒每斗榷錢一百五十文蠲酒戶差役從度支奏也三年春正月丙戌朔壬寅以左僕射張延賞同中書門下平章事乙巳禮部侍郎薛播卒辛亥以戶部侍郎李竦為鄂嶽觀察使壬子以兵部侍郎柳渾同中書門下平章事劉滋守本官罷知政事中書舍人平章事齊映貶夔州刺史戊寅度支鹽鐵轉運使鎮海軍節度浙江東西道觀察等使檢校左僕射同中書門下平章事晉國公韓滉卒贈太傅以果州刺史白志貞為潤州刺史兼御史大夫浙西觀察使宣州刺史皇甫政為越州刺史浙東觀察使三月庚寅詔今年朝集使宜停丙午鳳翔隴右元帥副兵馬使吳詵為福建觀察使鳳翔都虞候邢君牙為鳳翔尹本府團練使丁未制鳳翔隴右涇原四鎮北庭管內兵馬副元帥鳳翔隴右道節度使奉天靖難功臣司徒兼中書令鳳翔尹上柱國西平郡王食實封一千五百戶李晟可太尉兼中書令庚戌以晟甥元帥兵馬使王佖為右威衛上將軍辛亥河東馬燧來朝時蕃相尚結贊使大將論頰熱卑辭厚意告馬燧請兩國同盟和好上疑其不誠不允故燧自將論頰熱入朝盛言蕃相請盟可以保信上乃從之許盟于平涼夏四月庚申詔蕃寇雖退疆理猶虞安邊之策必有良算宜令常參官各陳邊事隨所見封進以聞入蕃使崔翰奏於蕃中誘問給役者求蕃國人馬真數云凡五萬九千餘人馬八萬六千匹可戰者僅三萬人餘悉老幼庚午御麟德殿試定難樂曲馬燧所獻五月丁亥以侍中渾瑊為吐蕃清水會盟使兵部尚書崔漢衡副之瑊與駱元光率師二萬往會盟所丁酉以左丞暢悅為湖南觀察使戊戌左右神策左右龍武各加將軍一員丙午以嶺南節度使杜祐為尚書右丞以容管經略使李復為廣州刺史嶺南節度使蕃相尚結贊請改會盟之所於原州之土梨樹神策將馬有麟奏土梨地多險厄恐蕃軍隱伏不如平涼川其地坦平又近涇州乃改盟於平涼川十月東都河南江陵汴州揚州大水漂民廬舍閏月乙卯以國子司業裴胄為潭州刺史湖南觀察使戊午陝虢李泌獻瑞麥一莖五穗庚申詔省州縣官員上州留上佐録事參軍司戶司士各一員中州上佐録事參軍司戶司兵各一員下州上佐録事司戶各一員京兆河南兩府司録判司及四赤丞簿尉量留一半諸赤畿縣留令丞尉各一員時宰相張延賞請減官收俸料以助軍討吐蕃故也壬戌日有黑暈自辰及申方散癸亥以荊南節度使檢校戶部尚書嗣曹王臯為襄州刺史山南東道節度襄鄧郢安隨唐等州觀察使以山南東道節度使樊澤為江陵尹荊南節度使辛未侍中渾瑊與吐蕃宰相尚結贊同盟于平涼為蕃兵所劫瑊狼狽遁而獲免崔漢衡已下將吏陷沒者六十餘人癸酉遣使齎書以讓結贊蕃界不受戊寅枉矢墜于虛危辛巳以少府監盧嶽為陝虢觀察使是月太白晝見凡四十餘日六月丙戌以檢校司徒侍中馬燧為司徒兼侍中以贊吐蕃之盟失策而罷兵柄也以陝虢觀察使李泌為中書侍郎平章事以左龍武將軍李自良為檢校工部尚書太原尹河東節度使乙巳浙西觀察使白志貞卒是月吐蕃驅鹽夏二州居民焚其州城而去七月甲寅渾瑊自盟所來素服待罪釋之乙卯詔朕頃緣興師備邊資用不給遂權議減官以務集事近聞授官者皆已隨牒之任扶老攜幼盡室而行俸祿未請歸還無所衣冠之弊流寓何依其先敕所減官員並宜仍舊初既減員內外咨怨張延賞李泌初入相乃諷諫官論之乃下此詔丙辰平涼陷蕃官員崔漢衡已下各與一子正員官以左羽林大將軍韓潭為夏州刺史夏綏銀等州節度使壬申賜駱元光姓曰李元諒尚書左僕射同中書門下平章事張延賞薨贈太保癸酉復置吏部小選八月辛巳朔日有蝕之丁亥陷蕃兵部尚書崔漢衡得還己丑以兵部侍郎平章事柳渾為散騎常侍罷知政事壬申以給事中王緯為潤州刺史浙西觀察使常州刺史劉贊為宣州刺史宣歙池觀察使戊戌貶前門下侍郎同平章事蕭復為太子左庶子饒州安置坐宗人位佩儒偲鼎等連郜國長公主姦蠱事也戊辰吐蕃犯塞諸軍戒嚴九月丁巳吐蕃大掠汧陽吳山華亭界民庶徙於安化峽西庚申左庶子崔造卒癸亥回紇可汗遣使合闕將軍請昏於我許以咸安公主降之丙寅吐蕃陷華亭又陷涇州之連雲堡甲戌吐蕃退俘掠邠涇隴等州民戶殆盡自是蕃寇常至涇隴冬十月吐蕃修原州城屯據之丁亥太子太傅李叔明卒丙戌神策將魏循上言射生將韓欽緒等十餘人與資敬寺妖僧李廣弘同謀不軌廣弘自言當為人主約十月十日大舉已署置將相名目詔捕劾之連坐死者百餘人欽緒遊瓌之子特赦之是月復降魚書停刺史務十一月丁丑以湖南觀察使趙憬為給事中是夜京師地震者三鳥巢散落壬申禁商人不得以口馬兵械市於党項辛丑鄜坊節度使論惟明卒是歲作玄英觀於大明宮北垣
