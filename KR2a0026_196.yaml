body:
  text: 舊唐書卷一百八十九上列傳第一百三十九上儒學上徐文遠陸德明曹憲許淹李善公孫羅附歐陽詢子通朱子奢張士衡賈公彥李玄植附張後胤蓋文達宗人文懿谷那律蕭德言許叔牙子子儒敬播劉伯莊子之宏秦景通羅道琮古稱儒學家者流本出於司徒之官可以正君臣明貴賤美教化移風俗莫若於此焉故前古哲王咸用儒術之士漢家宰相無不精通一經朝廷若有疑事皆引經決定由是人識禮教理致升平近代重文輕儒或參以法律儒道既喪淳風大衰故近理國多劣於前古自隋氏道消海內版蕩彝倫攸斁戎馬生郊先代之舊章往聖之遺訓掃地盡矣及高祖建義太原初定京邑雖得之馬上而頗好儒臣以義寧三年五月初令國子學置生七十二員取三品已上子孫太學置生一百四十員取五品已上子孫四門學生一百三十員取七品已上子孫上郡學置生六十員中郡五十員下郡四十員上縣學並四十員中縣三十員下縣二十員武德元年詔皇族子孫及功臣子弟於祕書外省別立小學二年詔曰盛德必祀義存方策達人命世流慶後昆建國君人弘風闡教崇賢彰善莫尚於茲自八卦初陳九疇攸徽章互垂節文不備爰始姬旦匡翊周邦創設禮經尤明典憲啓生人之耳目窮法度之本源化起二南業隆八百豐功茂德冠于終古暨乎王道既衰頌聲不作諸侯力爭禮樂陵遲粵若宣父天資睿哲經綸齊魯之內揖讓洙泗之間綜理遺文弘宣舊制四科之教歷代不刊三千之文風流無歇惟茲二聖道著羣生守祀不修明褒尚闕朕君臨區宇興化崇儒永言先達情深紹嗣宜令有司於國子學立周公孔子廟各一所四時致祭仍博求其後具以名聞詳考所宜當加爵土是以學者慕嚮儒教聿興至三年太宗討平東夏海內無事乃鋭意經籍於秦府開文學館廣引文學之士下詔以府屬杜如晦等十八人為學士給五品珍膳分為三番更直宿于閣下及即位又於正殿之左置弘文學館精選天下文儒之士虞世南褚亮姚思廉等各以本官兼署學士令更日宿直聽朝之暇引入內殿講論經義商略政事或至夜分乃罷又召勳賢三品已上子孫為弘文館學生貞觀二年停以周公為先聖始立孔子廟堂於國學以宣父為先聖顏子為先師大徵天下儒士以為學官數幸國學令祭酒博士講論畢賜以束帛學生能通一大經已上咸得署吏又於國學增築學舍一千二百間太學四門博士亦增置生員其書算各置博士學生以備藝文凡三千二百六十員其玄武門屯營飛騎亦給博士授以經業有能通經者聽之貢舉是時四方儒士多抱負典籍雲會京師俄而高麗及百濟新羅高昌吐蕃等諸國酋長亦遣子弟請入於國學之內鼓篋而升講筵者八千餘人濟濟洋洋焉儒學之盛古昔未之有也太宗又以經籍去聖久遠文字多訛謬詔前中書侍郎顏師古考定五經頒於天下命學者習焉又以儒學多門章句繁雜詔國子祭酒孔穎達與諸儒撰定五經義疏凡一百七十卷名曰五經正義令天下傳習十四年詔曰梁皇侃褚仲都周熊安生沈重陳沈文阿周弘正張譏隋何妥劉炫等並前代名儒經術可紀加以所在學徒多行其疏宜加優異以勸後生可訪其子孫見在者録名奏聞當加引擢二十一年又詔曰左丘明卜子夏公羊高穀梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭玄服虔何休王肅王弼杜元凱范寧等二十一人並用其書垂於國胄既行其道理合褒崇自今有事太學可與顏子俱配享孔子廟堂其尊重儒道如此高宗嗣位政教漸衰薄於儒術尤重文吏於是醇醲日去華競日彰猶火銷膏而莫之覺也及則天稱制以權道臨下不吝官爵取悅當時其國子祭酒多授諸王及駙馬都尉準貞觀舊事祭酒孔穎達等赴上日皆講五經題至是諸王與駙馬赴上唯判祥瑞按三道而已至於博士助教唯有學官之名多非儒雅之實是時復將親祠明堂及南郊又拜洛封嵩嶽將取弘文國子生充齋郎行事皆令出身放選前後不可勝數因是生徒不復以經學為意唯苟希僥幸二十年間學校頓時隳廢矣玄宗在東宮親幸太學大開講論學官生徒各賜束帛及即位數詔州縣及百官薦舉經通之士又置集賢院招集學者校選募儒士及博涉著實之流以為儒學篇徐文遠洛州偃師人陳司空孝嗣玄孫其先自東海徙家焉父徹梁祕書郎尚元帝女安昌公主而生文遠屬江陵陷被虜於長安家貧無以自給其兄休鬻書為事文遠日閲書于肆博覽五經尤精春秋左氏傳時有大儒沈重講于太學聽者常千餘人文遠就質問數日便去或問曰何辭去之速答曰觀其所説悉是紙上語耳僕皆先已誦得之至於奧賾之境翻似未見有以其言告重者重呼與議論十餘反重甚歎服之文遠方正純厚有儒者風竇威楊玄感李密皆從其受學開皇中纍遷太學博士詔令往并州為漢王諒講孝經禮記及諒反除名大業初禮部侍郎許善心舉文遠與包愷禇徽陸德明魯達為學官遂擢授文遠國子博士愷等並為太學博士時人稱文遠之左氏禇徽之禮魯達之詩陸德明之易皆為一時之最文遠所講釋多立新義先儒異論皆定其是非然後詰駁諸家又出己意博而且辨聽者忘倦後越王侗署為國子祭酒時洛陽飢饉文遠出城樵採為李密軍所執密令文遠南面坐備弟子禮北面拜之文遠曰老夫疇昔之日幸以先王之道仰授將軍時經興替倏焉已久今將軍屬風雲之際為義衆所歸權鎮萬物威加四海猶能屈體弘尊師之義此將軍之德也老夫之幸也既荷茲厚禮安不盡言乎但未審將軍意耳欲為伊霍繼絶扶傾雖遲暮猶願盡力若為莽卓乘危迫險則老夫耄矣無能為也密頓首曰昨奉朝命垂拜上公冀竭庸虛匡奉國難所以未朝見者不測城內人情且欲先征化及報復冤恥立功贖罪然後凱旋入拜天闕此密之本意惟先生教之文遠曰將軍名臣之子纍顯忠節前受誤於玄感遂乃暫墜家聲行迷未遠而回車復路終於忠孝用康家國天下之人是所望於將軍也密又頓首曰敬聞命矣請奉以周旋及征化及還而王世充已殺元文都等權兵專制密又問計於文遠答曰王世充亦門人也頗得識之是人殘忍意又褊促既乘此勢必有異圖將軍前計為不諧矣非破王世充不可朝覲密曰嘗謂先生儒者不學軍旅之事今籌大計殊有明略及密敗復入東都王世充給其廩食而文遠盡敬見之先拜或問曰聞君踞見李密而敬王公何也答曰李密君子也能受酈生之揖王公小人也有殺故人之義相時而動豈不然歟後王世充僭號復以為國子博士因出樵採為羅士信獲之送於京師復授國子博士武德六年高祖幸國學觀釋奠遣文遠發春秋題諸儒設難蜂起隨方占對皆莫能屈封東莞縣男年七十四卒官撰左傳音三卷義疏六十卷孫有功自有傳陸德明蘇州吳人也初受學於周弘正善言玄理陳太建中太子徵四方名儒講于承光殿德明年始弱冠往參焉國子祭酒徐克開講恃貴縱辨衆莫敢當德明獨與抗對合朝賞歎解褐始興王國左常侍遷國子助教陳亡歸鄉里隋煬帝嗣位以為祕書學士大業中廣召經明之士四方至者甚衆遣德明與魯達孔褒俱會門下省共相交難無出其右者授國子助教王世充僭號封其子為漢王署德明為師就其家將行束修之禮德明恥之因服巴豆散臥東壁下王世充子入跪牀前對之遺痢竟不與語遂移病於成臯杜絶人事王世充平太宗徵為秦府文學館學士命中山王承乾從其受業尋補太學博士後高祖親臨釋奠時徐文遠講孝經沙門惠乘講波若經道士劉進喜講老子德明難此三人各因宗指隨端立義衆皆為之屈高祖善之賜帛五十匹貞觀初拜國子博士封吳縣男尋卒撰經典釋文三十卷老子疏十五卷易疏二十卷並行於世太宗後嘗閲德明經典釋文甚嘉之賜其家束帛二百段子敦信龍朔中官至左侍極同東西臺三品曹憲揚州江都人也仕隋為祕書學士每聚徒教授諸生數百人當時公卿已下亦多從之受業憲又精諸家文字之書自漢代杜林衛宏之後古文泯絶由憲此學復興大業中煬帝令與諸學者撰桂苑珠叢一百卷時人稱其該博憲又訓注張揖所撰博雅分為十卷煬帝令藏于祕閣貞觀中揚州長史李襲譽表薦之太宗徵為弘文館學士以年老不仕乃遣使就家拜朝散大夫學者榮之太宗又嘗讀書有難字字書所闕者録以問憲憲皆為之音訓及引證明白太宗甚奇之年一百五歲卒所撰文選音義甚為當時所重初江淮間為文選學者本之於憲又有許淹李善公孫羅復相繼以文選教授由是其學大興於代許淹者潤州句容人也少出家為僧後又還俗博物洽聞尤精詁訓撰文選音十卷李善者揚州江都人方雅清徑有士君子之風明慶中纍補太子內率府録事參軍崇賢館直學士兼沛王侍讀嘗注解文選分為六十卷表上之賜絹一百二十匹詔藏于祕閣除潞王府記室參軍轉祕書郎乾封中出為經城令坐與賀蘭敏之周密配流姚州後遇赦得還以教授為業諸生多自遠方而至又撰漢書辨惑三十卷載初元年卒子雍亦知名公孫羅江都人也歷沛王府參軍無錫縣丞撰文選音義十卷行於代歐陽詢潭州臨湘人陳大司空頠之孫也父紇陳廣州刺史以謀反誅詢當從坐僅而獲免陳尚書令江總與紇有舊收養之教以書計雖貌甚寢陋而聰悟絶倫讀書即數行俱下博覽經史尤精三史仕隋為太常博士高祖微時引為賓客及即位纍遷給事中詢初學王羲之書後更漸變其體筆力險徑為一時之絶人得其尺牘文字咸以為楷範焉高麗甚重其書嘗遣使求之高祖嘆曰不意詢之書名遠播夷狄彼觀其迹固謂其形魁梧耶武德七年詔與裴矩陳叔達撰藝文類聚一百卷奏之賜帛二百段貞觀初官至太子率更令弘文館學士封渤海縣男年八十餘卒子通少孤母徐氏教其父書每遺通錢紿云質汝父書迹之直通慕名甚鋭晝夜精力無倦遂亞於詢儀鳳中纍遷中書舍人丁母憂居喪過禮起復本官每入朝必徒跣至皇城門外直宿在省則席地藉藁非公事不言亦未嘗啓齒歸家必衣縗絰號慟無恆自武德已來起復後而能哀戚合禮者無與通比年凶未葬四年居廬不釋服家人冬月密以氈絮置所眠席下通覺大怒遽令徹之五遷垂拱中至殿中監賜爵渤海子天授元年封夏官尚書二年轉司禮卿判納言事為相月餘會鳳閣舍人張嘉福等請立武承嗣為皇太子通與岑長倩固執以為不可遂忤諸武意為酷吏所陷被誅神龍初追復官爵朱子奢蘇州吳人也少從鄉人顧彪習春秋左氏傳後博觀子史善屬文隋大業中直祕書學士及天下大亂辭職歸鄉里尋附于杜伏威武德四年隨伏威入朝授國子助教貞觀初高麗百濟同伐新羅連兵數年不解新羅遣使告急乃假子奢員外散騎侍郎充使喻可以釋三國之憾雅有儀觀東夷大欽敬之三國王皆上表謝罪賜遣甚厚初子奢之出使也太宗謂曰海夷頗重學問卿為大國使必勿藉其束修為之講説使還稱旨當以中書舍人待卿子奢至其國欲悅夷虜之情遂為發春秋左傳題又納其美女之贈使還太宗責其違旨猶惜其才不至深譴令散官直國子學轉諫議大夫弘文館學士遷國子司業仍為學士子奢風流蘊藉頗滑稽又輔之以文義由是數蒙宴遇或使論難於前十五年卒張士衡瀛州樂壽人也父之慶齊國子助教士衡九歲喪母哀慕過禮父友齊國子博士劉軌思見之每為掩泣謂其父曰昔伯饒號張曾子亦豈能遠過吾聞君子不親教當為成就之及長軌思授以毛詩周禮又從熊安生及劉焯受禮記皆精究大義此後遍講五經尤攻三禮仕隋為餘杭令後以年老歸鄉里貞觀中幽州都督燕王靈夔備玄纁束帛之禮就家迎聘北面師之庶人承乾在東宮又加旌命及至洛陽宮謁見太宗延之升殿賜食擢授朝散大夫崇賢館學士承乾見之問以齊氏滅亡之由緒對曰齊後主悖虐無度昵近小人至如高阿那瓌駱提婆韓長鸞等皆奴僕下才凶險無賴是信是使以為心腹誅害忠良疏忌骨肉窮極奢靡剝喪黎元所以周師臨郊人莫為用以至覆滅實此之由承乾又問曰布施營功德有果報不對曰事佛在於清淨無欲仁恕為心如其貪婪無厭驕虐是務雖復傾財事佛無救目前之禍且善惡之報若影隨形此是儒書之言豈徒佛經所説是為人君父當須仁慈為人臣子宜盡忠孝仁慈忠孝則福祚攸永如或反此則殃禍斯及此理昭然願殿下勿為憂慮及承乾廢黜敕給乘傳令歸本鄉十九年卒士衡既禮學為優當時受其業擅名於時者唯賈公彥為最焉賈公彥洺州永年人永徽中官至太學博士撰周禮義疏五十卷儀禮義疏四十卷子大隱官至禮部侍郎時有趙州李玄植又受三禮於公彥撰三禮音義行於代玄植兼習春秋左氏傳於王德韶受毛詩於齊威博涉漢史及老莊諸子之説貞觀中纍遷太子文學弘文館直學士高宗時屢被召見與道士沙門在御前講説經義玄植辨論甚美申規諷帝深禮之後坐事左遷汜水令卒官張後胤蘇州崑山人也父中有儒學隋漢王諒出牧並州引為博士後胤從父在并州以學行見稱時高祖鎮太原引居賓館太宗就受春秋左氏傳武德中纍除燕王咨議參軍貞觀中後胤上言陛下昔在太原問臣隋氏運終何族當得天下臣奉對李姓必得公家德業天下繫心若於此首謀長驅關右以圖帝業孰不幸賴此實微臣早識天命太宗曰此事並記之耳因詔入賜宴言及平昔從容謂曰今弟子何如後胤對曰昔孔子領徒三千達者無子男之位臣翼贊一人為萬乘主計臣功逾於先聖太宗甚悅賜良馬五匹拜燕王府司馬遷國子祭酒轉散騎常侍永徽初請致仕加金紫光祿大夫給賜並同職事卒贈禮部侍郎陪葬昭陵蓋文達冀州信都人也博涉經史尤明三傳性方雅美鬚貌有士君子之風刺史竇抗嘗廣集儒生令相問難其大儒劉焯劉軌思孔穎達咸在坐文達亦參焉既論難皆出諸儒意表抗大奇之問曰蓋生就誰受學劉焯對曰此生岐嶷出自天然以多問寡焯為師首抗曰可謂冰生於水而寒於水也武德中纍授國子助教太宗在藩召為文學館直學士貞觀十年遷諫議大夫兼弘文館學士十三年除國子司業俄拜蜀王師以王有罪坐免十八年授崇賢館學士尋卒其宗人文懿亦以儒業知名當時稱為二蓋焉文懿者貝州宗城人也武德初歷國子助教時高祖別於祕書省置學教授王公之子時以文懿為博士文懿嘗開講毛詩發題公卿咸萃更相問難文懿發揚風雅甚得詩人之致貞觀中卒於國子博士谷那律魏州昌樂人也貞觀中纍補國子博士黃門侍郎褚遂良稱為九經庫尋遷諫議大夫兼弘文館學士嘗從太宗出獵在途遇雨因問油衣若為得不漏那律曰能以瓦為之必不漏矣意欲太宗不為畋獵太宗悅賜帛二百段永徽初卒官蕭德言雍州長安人齊尚書左僕射思話玄孫也本蘭陵人陳亡徙關中祖介梁侍中都官尚書父引陳吏部侍郎並有名於時德言博涉經史尤精春秋左氏傳好屬文貞觀中除著作郎兼弘文館學士德言晚年尤篤志於學自晝達夜略無休倦每欲開五經必束帶盥濯危坐對之妻子候間請曰終日如是無乃勞乎德言曰敬先聖之言豈憚如此時高宗為晉王詔德言授經講業及升春宮仍兼侍讀尋以年老請致仕太宗不許又遺之書曰朕歷觀前代詳覽儒林至於顏閔之才不終其壽遊夏之德不逮其學惟卿幼挺圭璋早標美譽下帷閉戶包括六經映雪聚螢牢籠百氏自隋季版蕩庠序無聞儒道墜泥塗詩書填坑穽眷言墳典每用傷懷頃年已來天下無事方欲建禮作樂偃武修文卿年齒已衰教將何恃所冀才德猶茂臥振高風使濟南伏生重在於茲日關西孔子故顯於當今令問令望何其美也念卿疲朽何以可言尋賜爵封陽縣侯十七年拜祕書少監兩宮禮賜甚厚二十三年纍表請致仕許之高宗嗣位以師傅恩加銀青光祿大夫永徽五年卒于家年九十七高宗為之輟朝贈太常卿文集三十卷曾孫至忠自有傳許叔牙潤州句容人少精於毛詩禮記尤善諷詠貞觀初纍授晉王文學兼侍讀尋遷太常博士升春宮加朝散大夫遷太子洗馬兼崇賢館學士仍兼侍讀嘗撰毛詩纂義十卷以進皇太子太子賜帛百段兼令寫本付司經局御史大夫高智周嘗謂人曰凡欲言詩者必須先讀此書貞觀二十三年卒子子儒子儒亦以學藝稱長壽中官至天官侍郎弘文館學士子儒居選部不以藻鑑為意委令史句直以為腹心注官之次子儒但高枕而臥時云句直平配由是補授失序無復綱紀道路以為口實其所注史記竟未就而終敬播蒲州河東人也貞觀初舉進士俄有詔詣祕書內省佐顏師古孔穎達修隋史尋授太子校書史成遷著作郎兼修國史與給事中許敬宗撰高祖太宗實録自創業至于貞觀十四年凡四十卷奏之賜物五百段太宗之破高麗名所戰六山為駐蹕播謂人曰聖人者與天地合德山名駐蹕此蓋以鑾輿不復更東矣卒如所言時梁國公房玄齡深稱播有良史之才曰陳壽之流也玄齡以顏師古所注漢書文繁難省令播撮其機要撰成四十卷傳於代尋以撰實録功遷太子司議郎時初置此官極為清望中書令馬周歎曰所恨資品妄高不獲歷居此職參撰晉書播與令狐德棻陽仁卿李嚴等四人總其類會刑部奏言準律謀反大逆父子皆坐死兄弟處流此則輕而不懲望請改從重法制遣百僚詳議播議曰昆季孔懷天倫雖重比於父子性理已殊生有異室之文死有別宗之義今有高官重爵本蔭唯逮子孫祚土錫圭餘光不及昆季豈有不沾其蔭輒受其辜背禮違情殊為太甚必期反茲春令踵彼秋荼創次骨於道德之辰建深文於措刑之日臣將以為不可詔從之永徽初拜著作郎與許敬宗等撰西域圖後歷諫議大夫給事中並依舊兼修國史又撰太宗實録從貞觀十五年至二十三年為二十卷奏之賜帛三百段後坐事出為越州都督府長史龍朔三年卒官播又著隋略二十卷劉伯莊徐州彭城人也貞觀中纍除國子助教與其舅太學博士侯孝遵齊為弘文館學士當代榮之尋遷國子博士其後又與許敬宗等參修文思博要及文館詞林龍朔中兼授崇賢館學士撰史記音義史記地名漢書音義各二十卷行於代子之宏亦傳父業則天時纍遷著作郎兼修國史卒於相王府司馬睿宗即位以故吏贈祕書少監秦景通常州晉陵人也與弟暐尤精漢書當時習漢書者皆宗師之常稱景通為大秦君暐為小秦君若不經其兄弟指授則謂之不經師匠無足採也景通貞觀中纍遷太子洗馬兼崇賢館學士為漢書學者又有劉納言亦為當時宗匠納言乾封中歷都水監主簿以漢書授沛王賢及賢為皇太子纍遷太子洗馬兼充侍讀常撰俳諧集十五卷以進太子及東宮廢高宗見而怒之詔曰劉納言收其餘藝參侍經史自府入宮久淹歲月朝遊夕處竟無匡贊闕忠孝之良規進詼諧之鄙説儲宮敗德抑有所由情在好生不忍加戮宜從屏棄以勵將來可除名後又坐事配流振州而死羅道琮蒲州虞鄉人也祖順武德初為興州刺史勤於學業而慷慨有節義貞觀末上書忤旨配流嶺表時有同被流者至荊襄間病死臨終泣謂道琮曰人生有死所恨委骨異壤道琮曰我若生還終不獨歸棄卿於此瘞之路左而去歲餘遇赦得還至殯所屬霖潦瀰漫尸柩不復可得道琮設祭慟哭告以欲與俱歸之意若有靈者幸相警示言訖路側水中忽然湧沸道琮又呪云若所沸處是願更令一沸呪訖又沸道琮便取得其尸銘志可驗遂負之還鄉當時識者稱道琮誠感所致道琮尋以明經登第高宗末官至太學博士每與太學助教康國安道士李榮等講論為時所稱尋卒
