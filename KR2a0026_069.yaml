body:
  text: 舊唐書卷六十五列傳第十五高士廉長孫無忌高儉字士廉渤海蓨人曾祖飛雀後魏贈太尉祖嶽北齊侍中左僕射太尉清河王父勵字敬德北齊樂安王尚書左僕射隋洮州刺史士廉少有器局頗涉文史隋司隸大夫薛道衡起居舍人崔祖濬並稱先達與士廉結忘年之好由是公卿藉甚大業中為治禮郎士廉妹先適隋右驍衛將軍長孫晟生子無忌及女晟卒士廉迎妹及甥於家恩情甚重見太宗潛龍時非常人因以晟女妻焉即文德皇后也隋軍伐僚時兵部尚書斛斯政亡奔高麗士廉坐與交遊謫為朱鳶主簿事父母以孝聞嶺南瘴癘不可同行留妻鮮于氏侍養供給不足又念妹無所庇乃賣大宅買小宅以處之分其餘資輕裝而去尋屬天下大亂王命阻絶交趾太守丘和署為司法書佐士廉久在南方不知母問北顧彌切嘗晝寢夢其母與之言宛如膝下既覺而涕泗橫集明日果得母訊議者以為孝感之應時欽州寧長真率衆攻和和欲出門迎之士廉進説曰長真兵勢雖多懸軍遠至內離外蹙不能持久且城中勝兵足以當之奈何而欲受人所制和從之因命士廉為行軍司馬水陸俱進逆擊破之長真僅以身免餘衆盡降及蕭銑敗高祖使徇嶺南武德五年士廉與和上表歸國纍遷雍州治中時太宗為雍州牧以士廉是文德皇后之舅素有才望甚親敬之及將誅隱太子士廉與其甥長孫無忌並預密謀六月四日士廉率吏卒釋繫囚授以兵甲馳至芳林門備與太宗合勢太宗升春宮拜太子右庶子貞觀元年擢拜侍中封義興郡公賜實封九百戶士廉明辨善容止凡有獻納搢紳之士莫不屬目時黃門侍郎王圭有密表附士廉以聞士廉寢而不言坐是出為安州都督轉益州大都督府長史蜀土俗薄畏鬼而惡疾父母病有危殆者多不親扶侍杖頭挂食遙以哺之士廉隨方訓誘風俗頓改秦時李冰守蜀導引汶江創浸灌之利至今地居水側者頃直千金富強之家多相侵奪士廉乃於故渠外別更疏決蜀中大獲其利又因暇日汲引辭人以為文會兼命儒生講論經史勉勵後進蜀中學校粲然復興蜀人朱桃椎者淡泊為事隱居不仕披裘帶索沉浮人間竇軌之鎮益州也聞而召見遺以衣服逼為鄉正桃椎口竟無言棄衣於地逃入山中結菴澗曲夏則裸形冬則樹皮自覆人有贈遺一無所受每為芒履置之於路人見之者曰朱居士之履也為鬻米置於本處桃椎至夕而取之終不與人相見議者以為焦先之流士廉下車以禮致之及至降階與語桃椎不答直視而去士廉每令存問桃椎見使者輒入林自匿近代以來多輕隱逸士廉獨加褒禮蜀中以為美談五年入為吏部尚書進封許國公仍封一子為縣公獎鑒人倫雅諳姓氏凡所署用莫不人地俱允高祖崩士廉攝司空營山陵制度事畢加特進上柱國是時朝議以山東人士好自矜夸雖復纍葉陵遲猶恃其舊地女適他族必多求聘財太宗惡之以為甚傷教義乃詔士廉與御史大夫韋挺中書侍郎岑文本禮部侍郎令狐德棻等刊正姓氏於是普責天下譜諜仍憑據史傳考其真偽忠賢者褒進悖逆者貶黜撰為氏族志士廉乃類其等第以進太宗曰我與山東崔盧李鄭舊既無嫌為其世代衰微全無冠蓋猶自云士大夫婚姻之間則多邀錢幣才識凡下而偃仰自高販鬻松檟依託富貴我不解人間何為重之祇緣齊家惟據河北梁陳僻在江南當時雖有人物偏僻小國不足可貴至今猶以崔盧王謝為重我平定四海天下一家凡在朝士皆功效顯著或忠孝可稱或學藝通博所以擢用見居三品以上欲共衰代舊門為親縱多輸錢帛猶被偃仰我今特定族姓者欲崇重今朝冠冕何因崔幹猶為第一等昔漢高祖止是山東一匹夫以其平定天下主尊臣貴卿等讀書見其行迹至今以為美談心懷敬重卿等不貴我官爵耶不須論數世以前止取今日官爵高下作等級遂以崔幹為第三等及書成凡一百卷詔頒於天下賜士廉物千段尋同中書門下三品十二年與長孫無忌等以佐命功並代襲刺史授申國公其年拜尚書右僕射士廉既任遇益隆多所表奏成輒焚稿人莫知之攝太子少師特令掌選十六年加授開府儀同三司尋表請致仕聽解尚書右僕射令以開府儀同三司依舊平章事又正受詔與魏徵等集文學之士撰文思博要一千二百卷奏之賜物千段十七年二月詔圖形凌煙閣十九年太宗伐高麗皇太子定州監國士廉攝太子太傅仍典朝政皇太子下令曰攝太傅申國公士廉朝望國華儀刑攸屬寡人忝膺監守實資訓導比日聽政常屈同榻庶因咨白少袪蒙滯但據案奉對情所未安已約束不許更進太傅誨諭深至使遵常式辭不獲免輒復敬從所司亦宜別以一案供太傅士廉固讓不敢當二十年遇疾太宗幸其第問之因説生平流涕歔欷而訣二十一年正月壬辰薨于京師崇仁里私第時年七十二太宗又命駕將臨之司空玄齡以上餌藥石不宜臨喪抗表切諫上曰朕之此行豈獨為君臣之禮兼以故舊情深姻戚義重卿勿復言也太宗從數百騎出興安門至延喜門長孫無忌馳至馬前諫曰餌石臨喪經方明忌陛下含育黎元須為宗社珍愛臣亡舅士廉知將不救顧謂臣曰至尊覆載恩隆不遺簪履亡歿之後或致親臨內省凡才無益聖日安可以死亡之餘輒回宸駕魂而有靈負譴斯及陛下恩深故舊亦請察其丹誠其言甚切太宗猶不許無忌乃伏於馬前流涕帝乃還宮贈司徒并州都督陪葬昭陵諡曰文獻士廉祖父洎身並為僕射子為尚書甥為太尉當代榮之六子履行至行純行真行審行慎行及喪柩出自橫橋太宗登故城西北樓望而慟高宗即位追贈太尉與房玄齡屈突通並配享太宗廟庭子履行貞觀初歷祠部郎中丁母憂哀悴踰禮太宗遣使諭之曰孝子之道毀不滅性汝宜強食不得過禮服闋纍遷滑州刺史尚太宗女東陽公主拜駙馬都尉十九年除戶部侍郎加銀青光祿大夫無幾遭父艱居喪復以孝聞太宗手詔敦喻曰古人立孝毀不滅身聞卿絶粒殊乖大體幸抑摧裂之情割傷生之纍俄起為衛尉卿進加金紫光祿大夫襲爵申國公永徽元年拜戶部尚書檢校太子詹事太常卿顯慶元年出為益州大都督府長史先是士廉居此職頗著能名至是履行繼之亦有善政大為人吏所稱三年坐與長孫無忌親纍左授洪州都督轉永州刺史卒於官履行弟真行官至右衛將軍其子典膳丞岐坐與章懷太子陰謀事泄詔付真行令自懲誡真行遂手刃之仍棄其尸於衢路高宗聞而鄙之貶真行為睦州刺史卒長孫無忌字輔機河南洛陽人其先出自後魏獻文帝第三兄初為拓拔氏宣力魏室功最居多世襲大人之號後更跋氏為宗室之長改姓長孫氏七世祖道生後魏司空上黨靖王六世祖旃後魏特進上黨齊王五世祖觀後魏司徒上黨定王高祖稚西魏太保馮翊文宣王曾祖子裕西魏衛尉卿平原郡公祖兕周開府儀同三司襲平原公父晟隋右驍衛將軍無忌貴戚好學該博文史性通悟有籌略文德皇后即其妹也少與太宗友善義軍渡河無忌至長春宮謁見授渭北道行軍典籤常從太宗征討纍除比部郎中封上黨縣公武德九年隱太子建成齊王元吉謀將害太宗無忌請太宗先發誅之於是奉旨密召房玄齡杜如晦等共為籌略六月四日無忌與尉遲敬德侯君集張公謹劉師立公孫武達獨孤彥雲杜君綽鄭仁泰李孟嘗等九人入玄武門討建成元吉平之太宗升春宮授太子左庶子及即位遷左武候大將軍貞觀元年轉吏部尚書以功第一進封齊國公實封千三百戶太宗以無忌佐命元勳地兼外戚禮遇尤重常令出入臥內其年拜尚書右僕射時突厥頡利可汗新與中國和盟政教紊亂言事者多陳攻取之策太宗召蕭瑀及無忌問曰北番君臣昏亂殺戮無辜國家不違舊好便失攻昧之機今欲取亂侮亡復爽同盟之義二途不決孰為勝耶蕭瑀曰兼弱攻昧擊之為善無忌曰今國家務在戢兵待其寇邊方可討擊彼既已弱必不能來若深入虜廷臣未見其可且按甲存信臣以為宜太宗從無忌之議突厥尋政衰而滅或有密表稱無忌權寵過盛太宗以表示無忌曰朕與卿君臣之間凡事無疑若各懷所聞而不言則君臣之意無以獲通因召百僚謂之曰朕今有子皆幼無忌於朕實有大功今者委之猶如子也疏間親新間舊謂之不順朕所不取也無忌深以盈滿為誡懇辭機密文德皇后又為之陳請太宗不獲已乃拜開府儀同三司解尚書右僕射是歲太宗親祠南郊及將還命無忌與司空裴寂同升金輅五年與房玄齡杜如晦尉遲敬德四人以元勳各封一子為郡公七年十月册拜司空無忌固辭不許又因高士廉奏曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰朕之授官必擇才行若才行不至縱朕至親亦不虛授襄邑王神符是也若才有所適雖怨讎而不棄魏徵等是也朕若以無忌居后兄之愛當多遺子女金帛何須委以重官蓋是取其才行耳無忌聰明鑒悟雅有武略公等所知朕故委之台鼎無忌又上表切讓詔報之曰昔黃帝得力牧而為五帝先夏禹得咎繇而為三王祖齊桓得管仲而為五伯長朕自居藩邸公為腹心遂得廓清宇內君臨天下以公功績才望允稱具瞻故授此官無宜多讓也太宗追思王業艱難佐命之力又作威鳳賦以賜無忌其辭曰有一威鳳憩翮朝陽晨遊紫霧夕飲玄霜資長風以舉翰戾天衢而遠翔西翥則煙氛閉色東飛則日月騰光化垂鵬於北裔馴羣鳥於南荒殄亂世而方降應明時而自彰俯翼雲路歸功本樹仰喬枝而見猜俯修條而抱𢀿同林之侶俱嫉共幹之儔並忤無桓山之義情有炎洲之凶度若巢葦而居安獨懷危而履懼鴟梟嘯乎側葉燕雀喧乎下枝慚己陋之至鄙害他賢之獨奇或聚咮而交擊乍分羅而見羈戢凌雲之逸羽韜偉世之清儀遂乃蓄情宵影結志晨暉霜殘綺翼露點紅衣嗟憂患之易結歎矰繳之難違期畢命於一死本無情於再飛幸賴君子以依以恃引此風雲濯斯塵滓披蒙翳於葉下發光華於枝𩹉仙翰屈而還舒靈音摧而復起眄八極以遐翥臨九天而高峙庶廣德於衆禽非崇利於一己是以徘徊感德顧慕懷賢憑明哲而禍散託英才而福全答惠之情彌結報功之志方宣非知難而行易思令後而終前俾賢德之流慶畢萬葉而芳傳十一年令與諸功臣世襲刺史詔曰周武定業胙茅土於子弟漢高受命誓帶礪於功臣豈止重親賢之地崇其典禮抑亦固磐石之基寄以藩翰魏晉已降事不師古建侯之制有乖名實非所謂作屏王室永固無窮者也隋氏之季四海沸騰朕運屬殷憂戡翦多難上憑明靈之祐下賴英賢之輔廓清宇縣嗣膺寶曆豈豫一人獨能致此時迍共資其力世安專享其利乃眷於斯甚所不取但今刺史即古之諸侯雖立名不同監統一也故申命有司斟酌前代宣條委共理之寄象賢存世及之典司空齊國公無忌等並策名運始功參締構義貫休戚效彰夷險嘉庸懿績簡於朕心宜委以藩鎮改錫土宇無忌可趙州刺史改封趙國公尚書左僕射魏國公玄齡可宋州刺史改封梁國公故司空蔡國公杜如晦可贈密州刺史改封萊國公特進代國公靖可濮州刺史改封衛國公特進吏部尚書許國公士廉可申州刺史改封申國公兵部尚書潞國公侯君集可陳州刺史改封陳國公刑部尚書任城郡王道宗可鄂州刺史改封江夏郡王晉州刺史趙郡王孝恭可觀州刺史改封河間郡王同州刺史吳國公尉遲敬德可宣州刺史改封鄂國公并州都督府長史曹國公李績可蘄州刺史改封英國公左驍衛大將軍楚國公段志玄可金州刺史改封褒國公左領軍大將軍宿國公程知節可普州刺史改封盧國公太僕卿任國公劉弘基可朗州刺史改封夔國公相州都督府長史鄅國公張亮可澧州刺史改封鄖國公餘官食邑並如故即令子孫奕葉承襲無忌等上言曰臣等披荊棘以事陛下今海內寧一不願違離而乃世牧外州與遷徙何異乃與房玄齡上表曰臣等聞質文迭變皇王之迹有殊今古相沿致理之方乃革緬惟三代習俗靡常爰制五等隨時作教蓋由力不能制因而利之禮樂節文多非己出逮於兩漢用矯前違置守頒條蠲除曩弊為無益之文覃及萬方建不易之理有逾千載今曲為臣等復此奄荒欲其優隆錫之茅社施于子孫永貽長世斯乃大鈞播物毫髮並施其生小人踰分後世必嬰其禍何者違時易務曲樹私恩謀及庶僚義非僉允方招史册之誚有紊聖代之綱此其不可一也又臣等智效罕施器識庸陋或情緣右戚遂陟台階或顧想披荊便蒙夜拜直當今日猶愧非才重裂山河愈彰濫賞此其不可二也又且孩童嗣職義乖師儉之方任以褰帷寧無傷錦之弊上干天憲彝典既有常科下擾生民必致餘殃於後一挂刑網自取誅夷陛下深仁務延其世翻令剿絶誠有可哀此其不可三也當今聖曆欽明求賢分政古稱良守寄在共理此道之行為日滋久因緣臣等或有改張封植兒曹失於求瘼百姓不幸將焉用之此其不可四也在茲一舉為損實多曉夕深思憂貫心髓所以披丹上訴指事明心不敢浮辭同於矯飾伏願天澤諒其愚款特停渙汗之旨賜其性命之恩太宗覽表謂曰割地以封功臣古今通義意欲公之後嗣翼朕子孫長為藩翰傳之永久而公等薄山河之誓發言怨望朕亦安可強公以土宇耶於是遂止十二年太宗幸其第凡是親族班賜有差十六年册拜司徒十七年令圖畫無忌等二十四人於凌煙閣詔曰自古皇王褒崇勳德既勒銘於鍾鼎又圖形於丹青是以甘露良佐麟閣著其美建武功臣雲臺紀其迹司徒趙國公無忌故司空揚州都督河間元王孝恭故司空萊國成公如晦故司空相州都督太子太師鄭國文貞公徵司空梁國公玄齡開府儀同三司尚書右僕射申國公士廉開府儀同三司鄂國公敬德特進衛國公靖特進宋國公瑀故輔國大將軍揚州都督褒忠壯公志玄輔國大將軍夔國公弘基故尚書左僕射蔣忠公通故陝東道行臺右僕射鄖節公開山故荊州都督譙襄公柴紹故荊州都督邳襄公順德洛州都督鄖國公張亮光祿大夫吏部尚書陳國公侯君集故左驍衛大將軍郯襄公張公謹左領軍大將軍盧國公程知節故禮部尚書永興文懿公虞世南故戶部尚書渝襄公劉政會光祿大夫戶部尚書莒國公唐儉光祿大夫兵部尚書英國公績故徐州都督胡壯公秦叔寶等或材推棟梁謀猷經遠綢繆帷帳經綸霸圖或學綜經籍德範光茂隱犯同致忠讜日聞或竭力義旗委質藩邸一心表節百戰標奇或受脤廟堂闢土方面重氛載廓王略遐宣並契闊屯夷劬勞師旅贊景業於草昧翼淳化於隆平茂績殊勳冠冕列辟昌言直道牢籠搢紳宜酌故實弘茲令典可並圖畫於凌煙閣庶念功之懷無謝於前載旌賢之義永貽於後昆其年太子承乾得罪太宗欲立晉王而限以非次回惑不決御兩儀殿羣官盡出獨留無忌及司空房玄齡兵部尚書李績謂曰我三子一弟所為如此我心無憀因自投於牀抽佩刀欲自刺無忌等驚懼爭前扶抱取佩刀以授晉王無忌等請太宗所欲報曰我欲立晉王無忌曰謹奉詔有異議者臣請斬之太宗謂晉王曰汝舅許汝宜拜謝晉王因下拜太宗謂無忌等曰公等既符我意未知物論何如無忌曰晉王仁孝天下屬心久矣伏乞召問百僚必無異辭若不蹈舞同音臣負陛下萬死於是建立遂定因加授無忌太子太師尋而太宗又欲立吳王恪無忌密爭之其事遂輟太宗嘗謂無忌等曰朕聞主賢則臣直人苦不自知公宜面論攻朕得失無忌奏言陛下武功文德跨絶古今發號施令事皆利物孝經云將順其美臣順之不暇實不見陛下有所愆失太宗曰朕冀聞己過公乃妄相諛悅朕今面談公等得失以為鑒誡言之者可以無過聞之者可以自改因目無忌曰善避嫌疑應對敏速求之古人亦當無比而總兵攻戰非所長也高士廉涉獵古今心術聰悟臨難既不改節為官亦無朋黨所少者骨鯁規諫耳唐儉言辭俊利善和解人酒杯流行發言啓齒事朕三十載遂無一言論國家得失楊師道性行純善自無愆過而情實怯磱未甚任事緩急不可得力岑文本性道敦厚文章是其所長而持論常據經遠自當不負於物劉洎性最堅貞言多利益然其意上然諾於朋友能自補闕亦何以尚馬周見事敏速性甚貞正至於論量人物直道而行朕比任使多所稱意褚遂良學問稍長性亦堅正既寫忠誠甚親附於朕譬如飛鳥依人自加憐愛十九年太宗征高麗令無忌攝侍中還無忌固辭師傅之位優詔聽罷太子太師二十一年遙領揚州都督二十三年太宗疾篤引無忌及中書令褚遂良二人受遺令輔政太宗謂遂良曰無忌盡忠於我我有天下多是此人力爾輔政後勿令讒毀之徒損害無忌若如此者爾則非復人臣高宗即位進拜太尉兼揚州都督知尚書及門下二省事並如故無忌固辭知尚書省事許之仍令以太尉同中書門下三品永徽二年監修國史高宗嘗謂公卿朕開獻書之路冀有意見可録將擢用之比者上疏雖多而遂無可採者無忌對曰陛下即位政化流行條式律令固無遺闕言事者率其鄙見妄希僥幸至於裨俗益教理當無足可取然須開此路猶冀時有讜言如或杜絶便恐下情不達帝曰又聞所在官司猶自多有顏面無忌曰顏面阿私自古不免然聖化所漸人皆向公至於肆情曲法實謂必無此事小小收取人情恐陛下尚亦不免況臣下私其親戚豈敢頓言絶無時無忌位當元舅數進謀議高宗無不優納之明年以旱上疏辭職高宗頻降手詔敦喻不許五年親幸無忌第見其三子並擢授朝散大夫又命圖無忌形像親為畫贊以賜之六年帝將立昭儀武氏為皇后無忌屢言不可帝乃密遣使賜無忌金銀寶器各一車綾錦十車以悅其意昭儀母楊氏復自詣無忌宅屢加祈請時禮部尚書許敬宗又屢申勸請無忌嘗厲色折之帝後又召無忌左僕射于志寧右僕射褚遂良謂曰武昭儀有令德朕欲立為皇后卿等以為如何無忌曰自貞觀二十三年後先朝付託遂良望陛下問其可否帝竟不從無忌等言而立昭儀為皇后皇后以無忌先受重賞而不助己心甚銜之顯慶元年無忌與史官國子祭酒令狐德棻綴集武德貞觀二朝史為八十卷表上之無忌以監領功賜物二千段封其子潤為金城縣子四年中書令許敬宗遣人上封事稱監察御史李巢與無忌交通謀反帝令敬宗與侍中辛茂將鞠之敬宗奏言無忌謀反有端帝曰我家不幸親戚中頻有惡事高陽公主與朕同氣往年遂與房遺愛謀反今阿舅復作惡心近親如此使我慚見萬姓敬宗曰房遺愛乳臭兒與女子謀反豈得成事且無忌與先朝謀取天下衆人服其智作宰相三十年百姓畏其威可謂威能服物智能動衆臣恐無忌知事露即為急計攘袂一呼嘯命同惡必為宗廟深憂誠願陛下斷之不日即收捕準法破家帝泣曰我決不忍處分與罪後代良史道我不能和其親戚使至於此敬宗曰漢文帝漢室明主薄昭即是帝舅從代來日亦有大勳與無忌不別於後惟坐殺人文帝惜國之法令朝臣喪服就宅哭而殺之良史不以為失今無忌忘先朝之大德捨陛下之至親聽受邪謀遂懷悖逆意在塗炭生靈若比薄昭罪惡未可同年而語案諸刑典合誅五族臣聞當斷不斷反受其亂大機之事間不容髮若少遲延恐即生變惟請早決帝竟不親問無忌謀反所由惟聽敬宗誣構之説遂去其官爵流黔州仍遣使發次州府兵援送至流所其子祕書監駙馬都尉沖等並除名流於嶺外敬宗尋與吏部尚書李義府遣大理正袁公瑜就黔州重鞫無忌反狀公瑜逼令自縊而死籍沒其家無忌既有大功而死非其罪天下至今哀之上元元年優詔追復無忌官爵特令無忌孫延主齊獻公之祀無忌從父兄安世仕王世充署為內史令東都平死於獄中安世子祥以文德皇后近屬纍除刑部尚書坐與無忌通書見殺史臣曰士廉才望素高操秉無玷保君臣終始之義為子孫襲繼之謀社稷之臣功亦隆矣奬遇之恩賞亦厚矣及子真行手刃其子何凶忍也若是積慶之道不其惑哉無忌戚里右族英冠人傑定立儲闈力安社稷勳庸茂著終始不渝及黜廢中宮竟不阿旨報先帝之顧託為敬宗之誣構嗟乎忠信獲罪今古不免無名受戮族滅何辜主暗臣姦足貽後代贊曰嚴嚴申公功名始終文皇題品信謂酌中趙公右戚兩朝宣力功成不去竟逢鬼蜮
