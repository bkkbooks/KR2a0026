戍兵皆徵集收復兩京上元元年河西軍鎮多為吐蕃所陷有舊將李元忠守北庭郭昕守安西府二鎮與沙陀回鶻相依吐蕃久攻之不下建中元年元忠昕遣使間道奏事德宗嘉之以元忠為北庭都護昕為安西都護其後吐蕃急攻沙陀回鶻部落北庭安西無援貞元三年竟陷吐蕃北庭護府本龜茲國顯慶中自西州移府治於此東至焉耆鎮守八百里西至疏勒鎮守二千里南至于闐二千里東北至北庭府二千里南至吐蕃界八百里北至突騎施界雁沙川一千里安西都護府鎮兵二萬四千人馬二千七百匹都護兼鎮西節度使安西都護所統四鎮龜茲都督府本龜茲國其王姓白理白山之南去瓜州三千里勝兵數千貞觀二十二年阿史那社爾破之虜龜茲王而還乃於其地置都督府領蕃州之九至顯慶三年破賀魯仍自西州移安西府置于龜茲國城毗沙都督府本于闐國在嶺北二百里勝兵數千俗多機巧其王伏闍信貞觀二十二年入朝上元二年正月置毗沙都督府初管蕃州五上元元年分為十在安西都護府西南二千里疏勒都督府本疏勒國在白山之南勝兵二千去瓜州四千六百里貞觀九年遣使朝貢自是不絶上元中置疏勒都督府在安西都護府西南二千里焉耆都督府本焉耆國其王姓龍名突騎支常役於西突厥俗有魚鱉之利貞觀十八年郭孝恪平之由是臣屬上元中置都督府處其部落無蕃州在安西都護府東八百里西域十六都督州府龍朔元年西域諸國遣使來內屬乃分置十六都督府州八十縣一百一十軍府一百二十六皆隸安西都護府仍於吐火羅國立碑以紀之月氏都督府於吐火羅國所治遏換城置以其王葉護領之於其部內分置二十四州都督統之太汗都督府於肽噠部落所治活路城置以其王太汗領之仍分其部置十五州太汗領之條枝都督府於訶達羅支國所治伏寶瑟顛城置以其王領之仍於其部分置八州大馬都督府於解蘇國所治數瞞城置以其王領之仍分其部置三州高附都督府於骨咄施國所治妖沙城置以其王領之仍分其部置三州修鮮都督府於罽賓國所治遏紇城置以其王領之仍分其部置十一州寫鳳都督府於失苑延國所治伏戾城置以其王領之仍分其部置四州悅般都督府於石汗那國所治豔城置以其王領之仍分其部置雙縻州奇沙州於護特健國所治遏密城置仍分其部置沛薄大秦二州和默州於怛沒國所治怛城置仍分置栗弋州挔州於烏拉喝國所治摩竭城置崑墟州於護密多國所治抵寶那城置至州於俱密國所治措瑟城置鳥飛州於護密多國所治摸廷城置王庭州於久越得犍國所治步師城置波斯都督府於波斯國所治陵城置右西域諸國分置羈縻州軍府皆屬安西都護統攝自天寶十四載已前朝貢不絶今於安西府事末紀之以表太平之盛業也
