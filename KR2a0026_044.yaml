body:
  text: 舊唐書卷四十志第二十地理三淮南道六江南道七隴右道八淮南道揚州大都督府隋江都郡武德三年杜伏威歸國於潤州江寧縣置揚州以隋江都郡為兗州置東南道行臺七年改兗州為州九年省江寧縣之揚州改州為揚州置大都督督揚和滁楚舒廬壽七州貞觀十年改大都督為都督督揚滁常潤和宣歙七州龍朔二年升為大都督府天寶元年改為廣陵郡依舊大都督府乾元元年復為揚州自後置淮南節度使親王為都督領使長史為節度副大使知節度事恆以此為治所舊領縣四江都六合海陵高郵戶二萬三千一百九十九口九萬四千三百四十七天寶領縣七戶七萬七千一百五口四十六萬七千八百五十七在京師東南二千七百五十三里至東都一千七百四十九里江都漢縣屬廣陵國隋為江都郡武德三年改為兗州七年改為州九年改為揚州都督府皆以江都為治所江陽貞觀十八年分江都縣置在郭下與江都分理六合漢堂邑縣屬臨淮郡晉置秦郡北齊為秦州後周為方州隋改為兗州武德七年復為方州置六合縣又分六合置石梁縣貞觀元年省方州併石梁入六合屬揚州海陵漢縣屬臨淮郡至隋屬南兗州武德二年屬揚州景龍二年分置海安縣開元十年省併入海陵高郵漢縣屬廣陵國至隋不改武德二年屬兗州州改仍舊揚子永淳元年分江都縣置天長天寶元年割江都六合高郵三縣地置千秋縣天寶七載改為天長楚州中隋江都郡之山陽縣武德四年臧君相歸附立為東楚州領山陽安宜鹽城三縣八年廢西楚州以盱眙來屬仍去東字天寶元年改為淮陰郡乾元元年復為楚州舊領縣四戶三千三百五十七口一萬六千二百六十二天寶領縣五戶二萬六千六十二口十五萬三千在京師西南二千五百一里至東都一千六百六十里山陽漢射陽縣地屬臨淮郡晉置山陽郡改為山陽縣武德四年置東楚州八年去東字治於此縣縣東南有射陽湖鹽城漢鹽瀆縣地屬臨淮郡久無城邑隋末韋徹於此置射州立射陽安樂新安三縣武德四年歸國因而不改七年廢射州及三縣置鹽城縣於廢射州仍屬楚州盱眙漢縣屬臨淮郡武德四年置西楚州置總管管東楚西楚領盱眙一縣八年廢西楚州以盱眙屬楚州應漢平安縣屬廣陵國武德四年置倉州領安宜一縣七年州廢縣屬楚州肅宗上元三年建巳月於此縣得定國寶十三枚因改元寶應仍改安宜為寶應淮陰乾封二年分山陽縣置於隋舊廢縣滁州下隋江都之清流縣武德三年杜伏威歸國置滁州又以揚州之全椒來屬天寶元年改為永陽郡乾元元年復為滁州舊領縣二戶四千六百八十九口二萬一千五百三十五天寶領縣三戶二萬六千四百八十六口十五萬二千三百七十四在京師東南二千五百六十四里至東都一千七百四十六里清流漢全椒縣地屬九江郡梁置南譙州居桑根山之朝陽在今縣西南八十里南譙州故城是也北齊自南譙故城經治於此新昌郡城今州治是也隋改南譙為滁州後廢武德三年復置皆治於清流縣全椒漢舊縣名梁北譙郡又改為臨滁郡隋改為滁縣煬帝復為全椒永陽景龍二年分清流縣置和州隋歷陽郡武德三年杜伏威歸國改為和州天寶元年改為歷陽郡乾元元年復為和州舊領縣二戶五千七百三十口三萬三千四百一天寶領縣三戶二萬四千七百九十四口十二萬一千一十三在京師東南二千六百八十三里至東都一千八百一十一里歷陽漢縣屬九江郡東晉置歷陽郡宋為南豫州北齊置和州隋為歷陽郡國初復為和州皆治此縣烏江漢東城縣之烏江亭屬九江郡北齊為密江郡陳為臨江郡後周為問江郡隋為烏江郡縣皆治此含山武德六年置八年廢長安四年復為武壽縣神龍元年復為含山濠州下隋為鍾離郡武德三年改為濠州又改臨濠為定遠縣化明為招義縣領鍾離塗山定遠招義四縣武德四年省塗山入鍾離天寶元年改為鍾離郡乾元元年復為濠州舊領縣三戶二千六百六十口一萬三千八百五十五天寶戶二萬一千八百六十四口十萬八千三百六十一在京師東南二千一百五十里至東都一千三百一十三里鍾離漢縣屬九江郡晉宋齊梁置徐州隋初為濠州煬帝復為鍾離郡武德三年置濠州皆治於此武德七年省塗山縣併入定遠漢曲陽縣地屬九江郡隋置定遠縣招義漢淮陵縣地屬臨淮宋置濟陰郡武德七年改為招義廬州上隋廬江郡武德三年改為廬州領合肥廬江慎三縣七年廢巢州為巢縣來屬天寶元年改為廬江郡乾元元年復為廬州自中升為上舊領縣四戶五千三百五十八口二萬七千五百一十三天寶領縣五戶四萬三千三百二十三口二十萬五千三百九十六在京師東南二千三百八十七里至東都一千五百六十九里合肥漢縣屬九江郡舊縣在北夏水出城父東南至此與肥水合故曰合肥梁置合州隋初為廬江郡皆治此縣慎漢逡遒縣屬九江郡古城在今縣南隋為慎縣巢漢居巢縣屬廬江郡隋為襄安縣武德三年置巢州分襄安立開城扶陽二縣七年廢巢州及開城扶陽二縣改襄安為巢縣屬廬州廬江漢郡名漢龍舒縣地屬廬江郡梁置湖州隋復舊也舒城開元二十三年分合肥廬江二縣置取古龍舒縣為名壽州中隋為淮南郡武德三年杜伏威歸國改為壽州七年置都督府督壽蓼二州領壽春安豐霍丘三縣貞觀元年廢都督府又以廢霍州之霍山縣來屬天寶元年改為壽春郡又置霍山縣乾元元年復為壽州舊領縣四戶二千九百九十六口一萬四千七百一十八天寶領縣五戶三萬五千五百八十二口十八萬七千五百八十七在京師東南二千二百一十七里至東都一千三百九里壽春漢縣屬九江郡晉改為壽陽晉於此置揚州齊置豫州後魏置揚州梁復為豫州後周置揚州隋改壽州煬帝為淮南郡武德為壽州皆以壽春為治所安豐漢六國故城在縣南梁置安豐郡縣界有芍陂灌田萬頃號安豐塘隋因置縣霍山漢灊縣屬廬江郡隋置霍山應城三縣貞觀元年廢霍州省應城灊城二縣以霍山屬壽州盛唐舊霍山縣神功元年改為武昌神龍元年復為霍山開元二十七年改為盛唐仍移治於騶虞城霍丘漢松滋縣地屬廬江郡武德四年置蓼州領霍丘一縣七年蓼州廢霍丘屬壽州縣北有安豐津斬毋丘儉處光州緊中隋弋陽郡武德三年改為光州置總管府以定城縣為弦州殷城縣為義州以廢宋安郡為谷州凡管光弦義谷廬五州光州領光山樂安固始三縣武德七年改總管為都督府貞觀元年罷都督府省弦州及義州以定城殷城二縣來屬又省谷州以宋安併入樂安天寶元年改為弋陽郡乾元元年復為光州舊領縣五戶五千六百四十九口二萬八千二百九十一天寶戶三萬一千四百七十三口十九萬八千五百八十至京師一千八百五十五里至東都九百二十五里定城漢弋陽地屬汝南郡南齊為南弋陽縣尋改為定城武德三年於縣置弦州領定城一縣貞觀元年廢弦州以定城屬光州州所理也光山晉分弋陽置西陽縣梁於縣置光州隋為弋陽郡武德三年復為光州治於光山縣太極元年移州理於定城仙居漢軑縣屬江夏郡古城在縣北十里宋分軑縣置樂安縣天寶元載改為仙居殷城漢期思縣地屬汝南郡宋置苞信縣隋改為殷城取縣東古殷城為名固始漢寖縣屬汝南郡後漢改為固始蘄州中隋蘄春郡武德四年平朱粲改為蘄州領蘄春蘄水羅田黃梅浠水五縣其年省蘄水入蘄春又分蘄春立永寧省羅田入浠水又改浠水為蘭溪又於黃梅縣置南晉州八年州廢以黃梅來屬天寶元年改為蘄春郡乾元元年復為蘄州舊領縣四戶一萬六百一十二口三萬九千六百七十八天寶戶二萬六千八百九口十八萬六千八百四十九至京師二千五百六十里至東都一千八百二十四里蘄春漢縣屬江夏郡吳為蘄春郡晉改為西陽又改為蘄陽周平淮南改為蘄州黃梅漢蘄春縣地宋分置新蔡郡隋改為黃梅武德四年置南晉州領黃梅義豐長吉塘陽新蔡五縣八年廢州仍省義豐等四縣以黃梅來屬廣濟漢蘄春縣地武德四年置永寧縣天寶元年改為廣濟縣蘄水漢蘄春縣地宋置浠水縣武德四年改為蘭溪天寶元年改為蘄水申州中隋義陽郡武德四年置申州領義陽鍾山二縣八年省南羅州又以羅山來屬天寶元年改為義陽郡乾元元年復為申州舊領縣三戶四千七百二十九口二萬三千六十一天寶戶二萬五千八百六十四口十四萬七千七百五十六至京師一千七百九十六里至東都九百四十三里義陽漢平氏縣之義陽鄉屬南陽郡魏分南陽立義陽郡晉自石城徙居於仁順今州理也宋置司州後魏改為郢州隋改為申州鍾山漢鄳縣地屬江夏郡隋改鍾山縣羅山漢鄳縣地隋為羅山縣武德四年置南羅州領羅山一縣八年廢屬申州黃州下隋永安郡武德三年改為黃州置總管管黃蘄亭南司四州黃州領黃岡木蘭麻城黃陂四縣其年省木蘭縣分黃岡置堡城縣分麻城置陽城縣仍於麻城縣置亭州於黃陂縣置南司州七年廢南司州及亭州縣並屬黃州仍省堡城入黃岡貞觀元年罷都督府天寶元年改為齊安郡乾元元年復為黃州舊領縣三戶四千八百九十六口二萬二千六十天寶戶一萬五千五百一十二口九萬六千三百六十八在京師東南二千一百四十八里至東都一千四百七十里黃岡漢西陵縣地江夏郡北齊於舊城西南築小城置衡州領齊安一郡隋改齊安為黃州治黃岡黃陂漢西陵縣地後周於古黃城西四十里獨家村置黃陂縣武德三年置南司州七年州廢縣屬黃州麻城漢西陵縣地隋置麻城縣武德三年於縣置亭州領麻城陽城二縣八年州廢仍省陽城入麻城縣屬黃州安州中都督府隋安陸郡武德四年平王世充改為安州領安陸雲夢應陽孝昌吉陽應山京山富水八縣其年於應山縣置應州領應山一縣於孝昌縣置澴州領孝昌一縣以富水京山二縣屬溫州改應陽為應城縣安州置總管管澴應二州七年州廢澴應二州縣屬安州改為大都督府督安申陽溫復沔光黃蘄九州六年罷都督府七年又置督安隋溫沔復五州十二年罷都督府天寶元年改為安陸郡依舊為都督府督安隋郢沔四州乾元元年復為安州舊領縣六戶六千三百三十八口二萬六千五百一十九天寶戶二萬二千二百二十一口十七萬一千二百二在京師東南二千五十一里至東都一千一百九十里安陸漢縣屬江夏郡宋分江夏立安陸郡武德四年改為安州治於安陸孝昌宋分安陸縣置武德四年置澴州領孝昌澴陽二縣八年州廢以澴陽孝昌屬安州雲夢漢安陸縣地後魏分安陸於雲夢古城置雲夢縣應城宋分安陸縣置應城縣隋改為應陽武德四年復為應城吉陽梁分安陸置平陽縣後魏改為京池隋改為吉陽取山名應山漢隋縣地屬南陽郡梁分隋縣置永陽縣隋改為應山以縣北山為名舒州下隋同安郡武德四年改為舒州領懷寧宿松太湖望江同安五縣其年割宿松置嚴州五年又割望江置高州又改高州為智州六年舒州置總管府管舒嚴智三州七年廢智州望江屬嚴州八年又廢嚴州以望江宿松二縣來屬貞觀元年罷都督府天寶元年改為同安郡至德二年二月改盛唐郡乾元元年復為舒州舊領縣五戶九千三百六十一口三萬七千五百三十八天寶戶三萬五千三百五十三口十八萬六千三百九十八在京師東南二千六百二十六里至東京一千八百九十三里懷寧漢皖縣地晉於皖縣置懷寧縣晉置晉熙郡隋改為熙州又為同安郡武德四年改為舒州以懷寧為州治宿松漢皖縣地梁置高塘