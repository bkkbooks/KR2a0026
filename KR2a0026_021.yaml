body:
  text: 舊唐書卷十九上本紀第十九上懿宗懿宗昭聖恭惠孝皇帝諱漼宣宗長子母曰元昭皇太后朝氏大和七年十一月十四日生於藩邸會昌六年十月封鄆王本名溫大中十三年八月七日宣遺詔立為皇太子監國改今名十三日柩前即帝位年二十七帝姿貌雄傑有異稠人藩邸時常經重疾郭淑妃侍醫藥見黃龍出入於臥內既間妃以異告帝曰慎勿復言又嘗大雪數尺而帝寢室之上獨無人皆異之宣宗制泰邊陲樂曲詞有海嶽晏咸通之句又大中末京城小兒疊布漬水紐之向日謂之拔暈帝果以鄆王即大位以咸通為年號九月釋服追尊母后朝氏為太后諡曰元昭十月癸未制以門下侍郎守左僕射同平章事令狐綯守司空門下侍郎兵部尚書同平章事蕭鄴兼尚書右僕射中書侍郎禮部尚書平章事夏侯孜兼兵部尚書中書侍郎平章事蔣伸兼工部尚書並依前知政事又以兵部侍郎鄭皓為河南尹以昭義軍節度潞邢磁洺觀察等使光祿大夫檢校吏部尚書兼潞州大都督府長史上柱國河東縣開國子食邑五百戶裴休為太原尹北都留守河東節度管內觀察處置等使以河中節度使檢校尚書左僕射畢諴為汴州刺史充宣武軍節度宋亳觀察等使以中書舍人裴坦權知禮部貢舉十二月以戶部侍郎翰林學士杜審權為檢校禮部尚書河中晉絳節度等使咸通元年春正月上御紫宸殿受朝對室韋使二月葬宣宗皇帝於貞陵以右拾遺劉鄴充翰林學士以河中節度使杜審權為兵部侍郎判度支尋以本官同平章事以門下侍郎守司徒同平章事令狐綯檢校司徒同平章事出鎮河中尚書左僕射諸道鹽鐵轉運使杜悰同平章事浙東觀察使王式斬草賊仇甫浙東郡邑皆平八月以河東節度使裴休為鳳翔尹鳳翔隴右節度使以鳳翔隴右節度使銀青光祿大夫檢校刑部尚書盧簡求為太原尹北都留守河東節度使十一月丙午朔丁未上有事於郊廟禮畢御丹鳳門大赦改元以中書舍人薛耽權知貢舉二年春二月吏部尚書蕭鄴檢校尚書右僕射太原尹北都留守河東節度觀察等使鄭滑節度使檢校工部尚書李福奏屬郡潁州去年夏大雨沈丘汝陰潁上等縣平地水深一丈田稼屋宇淹沒皆盡乞蠲租賦從之以中書侍郎兼工部尚書蔣伸兼刑部尚書右僕射門下侍郎杜悰為左僕射依前知政事四月以前婺州刺史裴閔為潁州刺史充本州團練鎮遏等使以駕部郎中王鐸本官知制誥八月以中書舍人衛洙為工部侍郎尋改銀青光祿大夫檢校禮部尚書兼滑州刺史御史大夫駙馬都尉充義成軍節度鄭滑潁觀察處置等使洙奏狀稱蒙恩除授滑州刺史官號內一字與臣家諱音同雖文字有殊而聲韻難別請改授間官者敕曰嫌名不諱著在禮文成命已行固難依允以兵部侍郎曹確判度支以兵部員外郎楊知遠司勳員外郎穆仁裕試吏部宏詞選人九月以前兵部侍郎判度支畢諴為工部尚書同平章事蔣伸罷知政事林邑蠻寇安南府遣神策將軍康承訓率禁軍及江西湖南之兵赴援三年春正月左僕射門下侍郎平章事杜悰率百僚上徽號曰睿文明聖孝德皇帝五月敕嶺南分為五管誠已多年居常之時同資禦捍有事之際要別改張雍州西接南蠻深據黃洞控兩江之獷俗居數道之遊民比以委人太輕軍威不振境連內地不並海南宜分嶺南為東西道節度觀察處置等使以廣州為嶺南東道雍州為嶺南西道別擇良吏付以節旄其所管八州俗無耕桑地極邊遠近罹盜擾尤甚凋殘將盛藩垣宜添州縣宜割桂州管內龔州象州容州管內藤州巖州並隸嶺南西道收管宰臣杜悰兼司空畢諴兼兵部尚書駕部郎中知制誥王鐸為中書舍人以雍管經略使鄭愚為廣州刺史充嶺南東道節度觀察處置等使將軍宋戎為嶺南西道節度使夏淮南河南蝗旱民飢南蠻陷交址徵諸道兵赴嶺南詔湖南水運自湘江入澪渠江西造切粥以饋行營湘灕泝運功役艱難軍屯廣州乏食潤州人陳磻石詣闕上書言江西湖南泝流運糧不濟軍師士卒食盡則散此宜深慮臣有奇計以饋南軍天子召見磻石因奏臣弟聽思曾任雷州刺史家人隨海船至福建往來大船一隻可致千石自福建裝船不一月至廣州得船數十艘便可致三萬石至廣府矣又引劉裕海路進軍破盧循故事執政是之以磻石為鹽鐵巡官往楊子院專督海運於是康承訓之軍皆不闕供七月徐州軍亂以浙東觀察使王式檢校工部尚書徐州刺史御史大夫武寧軍節度徐泗濠觀察等使初王智興得徐州召募凶豪之卒二千人號曰銀刀雕旗門槍挾馬等軍番宿衙城自後寖驕節度使姑息不暇田牟鎮徐日每與驕卒雜坐酒酣撫背時把板為之唱歌其徒日費萬計每有賓宴必先厭食飫酒祁寒暑雨巵酒盈前然猶喧譟邀求動謀逐帥前年壽州刺史溫璋為節度使驕卒素知璋嚴酷深負憂疑璋開懷撫諭終為猜二給與酒食未嘗瀝口不期月而逐璋上是以式代璋時式以忠武義成之師三千平定仇甫便詔式率二鎮之師渡淮徐卒聞之懼其勢無如之何至大彭館方來迎謁居三日犒勞兩鎮兵令還既擐甲執兵即命環驕卒殺之徐卒三千餘人是日盡誅由是凶徒悉殄九月以戶部侍郎李晦檢校工部尚書兼興元尹山南西道節度使十一月遣將軍蔡襲率禁軍三千會諸道之師赴援安南以吏部侍郎鄭處誨蕭倣吏部員外郎楊儼戶部員外郎崔彥昭等試宏詞選人十二月以吏部侍郎蕭倣權知禮部貢舉四年春正月甲子朔庚午上有事于圓丘禮畢御丹鳳樓大赦中外官宜準建中元年敕授官後三日舉一人自代州牧令録上佐官在任須終三考河東節度使檢校刑部尚書盧簡求以病求罷詔以太子少師致仕歸東都以昭義節度使檢校禮部尚書上柱國賜紫金魚袋劉潼為太原尹北都留守御史大夫充河東節度觀察處置等使二月以左散騎常侍李荀檢校工部尚書滑州刺史義成軍節度鄭滑觀察等使三月以兵部侍郎判度支楊收本官同平章事以刑部侍郎曹汾為河南尹以戶部侍郎李蠙檢校禮部尚書潞州大都督府長史充昭義節度觀察處置等使四月敕徐州罷防禦使為支郡隸兗州七月朔制安南寇陷之初流人多寄溪洞其安南將吏官健走至海門者人數不少宜令宋戎李良瑍察訪人數量事救恤安南管內被蠻賊驅劫處本戶兩稅丁錢等量放二年候收復後別有指揮其安南溪洞首領素推誠節雖蠻寇竊據城壁而酋豪各守土疆如聞溪洞之間悉藉嶺北茶藥宜令諸道一任商人興販不得禁止往來廉州珠池與人共利近聞本道禁斷遂絶通商宜令本州任百姓採取不得止約其徐州銀刀官健其中先有逃竄者纍降敕旨不令捕逐其今年四月十八日草賊頭首已抵極法其餘徒黨各自奔逃所在更勿捕逐是月東都許汝徐泗等州大水傷稼初大中末安南都護李琢貪暴侵刻獠民羣獠引林邑蠻攻安南府三年大徵兵赴援天下騷動其年冬蠻竟陷交州赴安南諸軍並令抽退分保嶺南東西道十一月長安縣尉集賢校理令狐滈為左拾遺制出左拾遺劉蛻起居郎張雲上疏論滈父綯秉權之日廣納賂遺受李琢賄除安南致生蠻寇滈不宜居諫諍之列時綯在淮南上表論訴乃貶雲興元少尹蛻華陰令滈改詹事司直以中書舍人王鐸權知禮部貢舉以兵部侍郎判度支曹確同平章事以中書侍郎平章事畢諴檢校吏部尚書河中尹晉絳慈隰節度使就加幽州張允伸檢校司徒以兵部侍郎高璩本官同平章事以戶部侍郎裴寅判本司事五年春正月戊午朔以用兵罷元會諫議大夫裴坦上疏論天下徵兵財賦方匱不宜過興佛寺以困國力優詔答之二月以兵部尚書牛叢檢校兵部尚書兼成都尹劍南西川節度副大使知節度事徐州處置觀察防禦使以門下侍郎兵部尚書平章事杜審權為潤州刺史浙江西道節度使三月以兵部郎中高湜員外于懷試吏部平判選人四月右僕射平章事夏侯孜增爵五百戶以中書舍人王鐸為禮部侍郎以晉州刺史孟球檢校工部尚書兼徐州刺史南蠻寇雍管以秦州經略使高駢率禁軍五千赴雍管會諸道之師禦之五月丁酉制朕以寡昧獲承高祖太宗之丕構六載於茲矣罔畋遊是娛罔聲色是縱罔刑戮是濫罔邪佞是惑夙夜悚惕以憂以勤庶幾乎八表用康兆人以泰而西戎款附北狄懷柔獨惟南蠻姦宄不率侵陷交址突犯朗寧爰及巂州亦用攘寇勞我士卒興吾甲兵騷動黎元役力飛挽每一軫念閔然疚懷顧惟生人罹此愁苦宜布自天之澤俾垂及物之仁如聞湖南桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配凋傷轉甚宜有特恩潭桂兩道各賜錢三萬貫文以助軍錢亦以充館驛息利本錢其江陵江西鄂州三道比於潭桂徭配稍簡宜令本道觀察使詳其間劇準此例與置本錢雍州已西黎巂界內昨因蠻寇互有殺傷宜令本道收拾埋瘞量設祭酹徐州土風雄徑甲士精強比以制馭乖方頻致騷擾近者再置使額卻領四州勞逸既均人心甚泰但聞比因罷節之日或有被罪奔逃雖朝廷頻下詔書並令一切不問猶恐尚懷疑懼未委招攜結聚山林終成詿誤況邊方未靜深藉人才宜令徐泗團練使選揀召募官健三千人赴雍管防戍待嶺外事寧之後即與替代歸還仍令每召滿五百人即差軍將押送其糧料賞給所司準例處分淮南兩浙海運虜隔舟船訪聞商徒失業頗甚所由縱捨為弊實深亦有搬貨財委於水次無人看守多至散亡嗟怨之聲盈於道路宜令三道據所搬米石數牒報所在鹽鐵巡院令和雇入海船分付所司通計載米數足外輒不更有隔奪妄稱貯備其小舸短船到江口使司自有船不在更取商人舟船之限如官吏妄行威福必議痛刑於戲萬方靡安寧忘於罪己百姓不足敢怠於責躬用伸欽恤之懷式表憂勤之旨壬寅制以中書侍郎平章事楊收為門下侍郎兼刑部尚書以中書侍郎平章事曹確兼工部尚書兵部侍郎平章事高璩為中書侍郎知政事餘並如故秋七月壬子延資庫使夏侯孜奏鹽鐵戶部先積欠當使咸通四年已前延資庫錢絹三百六十九萬餘貫匹內戶部每年合送錢二十六萬四千一百八十貫匹從大中十二年至咸通四年九月已前除納外欠一百五十萬五千七百一十四萬貫匹當使緣戶部積欠數多先具申奏請於諸道州府場監院合納戶部所收八十文除陌錢內割一十五文屬當使自收管敕命雖行送納稽緩今得戶部牒稱所收管除陌錢絹外更有諸雜物貨延資庫徵收不便請起今年合納延資庫錢絹一時便足其已前積欠候物力稍充積漸填納其所割一十五文錢即當司仍舊收管又緣纍歲以來嶺南用兵多支戶部錢物當使不欲堅論舊欠請依戶部商量合納今年一年額色錢絹須足明年即依舊制三月九月兩限送納畢其以前積欠仍令戶部自立填納期限者敕旨依之十月丙辰以中書舍人李蔚權知禮部貢舉十一月乙酉以大同軍防禦使盧簡方檢校工部尚書滄州刺史御史大夫充義昌軍節度滄濟德觀察等使乙未以兵部侍郎蕭置本官同中書門下平章事六年正月癸未朔丁亥制以河東節度使檢校刑部尚書孔溫裕為鄆州刺史天平軍節度鄆曹棣觀察處置等使二月制以御史中丞徐商為兵部侍郎同平章事高璩罷知政事以吏部尚書崔慎由吏部侍郎鄭從讜吏部侍郎王鐸兵部員外郎崔謹張彥遠等考宏詞選人金部員外郎張乂思大理少卿董賡試拔萃選人以給事中楊嚴為工部侍郎尋召為翰林學士四月西川節度使牛叢奏於蠻界築新城安城遏戎州功畢時南詔蠻入寇姚巂陳許大將顏復戍巂州新築二城其年秋六姓蠻攻遏戎州為復所敗退去兵部侍郎平章事徐商蕭置轉中書侍郎知政事五月以左丞楊知溫為河南尹以神策大將軍馬舉為秦州經略招討使以右金吾大將軍李宴元為夏州刺史朔方節度等使安南都護高駢奏於雍管大敗林邑蠻七月以右衛大將軍薛綰檢校工部尚書徐州刺史充徐泗團練觀察防禦等使九月以中書舍人趙隲權知禮部貢舉以吏部侍郎蕭倣檢校禮部尚書滑州刺史御史大夫充義成軍節度鄭滑潁觀察等使十二月太皇太后鄭氏崩諡曰孝明是歲秋高駢自海門進軍破蠻軍收復安南府自李琢失政交址湮沒十年蠻軍北寇雍容界人不聊生至是方復故地七年春正月戊寅朔以太皇太后喪罷元會三月成德軍節度鎮冀深趙等州觀察處置等使金紫光祿大夫檢校司空鎮州大都督府長史御史大夫太原縣開國伯食邑七百戶襲食實封一百戶王紹懿卒贈司徒紹鼎之弟俱壽安公主之子也三軍推紹鼎子景崇知兵馬留後事就加幽州張允伸兼太保平章事進封燕國公以吏部侍郎鄭從讜檢校禮部尚書兼太原尹北都留守御史大夫上柱國滎陽縣開國男食邑三百戶充河東節度管內觀察處置等使四月壽安公主上表請入朝詔曰志興奏汝以景崇未降恩命欲來朝覲事具悉景崇素聞孝悌頗有義方洽三軍愛戴之情荷千里折衝之寄纘乃舊服綽有令猷朝廷奬能續有處分緣孝明太后園寢有日庶事且停候祔廟禮成當允誠請七月沙州節度使張義潮進甘峻山青骹鷹四聯延慶節馬二匹吐蕃女子二人僧曇延進大乘百法門明論等八月鎮州王景崇起復忠武將軍左金吾衛將軍同正檢校右散騎常侍兼鎮州大都督府左司馬知府事御史中丞充成德軍節度觀察留後上柱國賜紫金魚袋中書侍郎平章事徐商兼工部尚書十月沙州張義潮奏差回鶻首領僕固俊與吐蕃大將尚恐熱交戰大敗蕃寇斬尚恐熱傳首京師右僕射門下侍郎平章事夏侯孜檢校司空平章事兼成都尹劍南西川節度等副大使知節度事安南高駢奏蠻寇悉平十一月十日御宣政殿大赦以復安南故也以翰林學士承旨戶部侍郎路巖為兵部侍郎同平章事義成軍節度蕭倣就加檢校兵部尚書褒能政也以禮部郎中李景溫吏部員外郎高湘試拔萃選人八年春正月壬寅朔丁未河中晉絳地大震廬舍壓仆傷人有死者三月安南高駢奏南至雍管水路湍險巨石梗塗令工人開鑿訖漕船無滯者降詔褒之制以門下侍郎兼戶部尚書平章事上柱國晉陽縣開國男食邑三百戶賜紫金魚袋楊收檢校兵部尚書充浙江西道觀察使以浙西觀察使杜審權守尚書左僕射以兵部侍郎于悰本官同平章事九月丁酉延資庫使曹確奏戶部每年合送當使三月九月兩限絹二十一萬四千一百匹錢萬貫自大中八年已後至咸通四年積欠一百五十萬五千七百餘貫匹前使杜悰申奏請起咸通五年正月以後於諸道州府場監院合送戶部八十文除陌錢內割十五文當使收管以填積欠續據戶部牒稱州府除陌錢有折色零碎請起咸通五年所合送延資庫錢絹逐年兩限須足其除陌十五文當司仍舊收管前使夏侯孜具事由申奏且請依戶部論請期限其咸通五年錢絹戶部已送納自六年至八年其錢絹依前不旋送納又積欠三十六萬五千五百七貫匹者伏以所置延資庫初以備邊為名至大中三年始改今號若財貨不充則名額虛設當制置之時所令三司逐年分減送當使收管元敕只有錢數但令本司減割送庫不定色目以此因循漸隳舊制年月既久積欠漸多既無計以徵收乃指色以取濟稍稱備邊名號得遵元敕指揮乃割戶部除陌八十文內十五文收管及戶部請逐年送庫須且稟從今既積欠又多終慮不及期限臣今酌量諸道州府場監院合送戶部錢絹內分配令勒留下合送延資庫數目令本處別為綱運與戶部綱同送上都直納延資庫則戶部免有逋懸不至纍年積欠從之十月丙寅戶部侍郎判度支崔彥昭奏當司應收管江淮諸道州府咸通八年已前兩稅榷酒及支米價並二十文除陌諸色屬省錢準舊例逐年商人投狀便換自南蠻用兵已來置供軍使當司在諸州府場監錢猶有商人便換齎省司便換文牒至本州府請領皆被諸州府稱準供軍使指揮占留以此商人疑惑乃致當司支用不充乞下諸道州府場監院依限送納及給還商人不得託稱占留者敕旨從之宰相門下侍郎戶部尚書曹確兼吏部尚書門下侍郎禮部尚書路巖兼戶部尚書中書侍郎工部尚書徐商兼刑部尚書兵部侍郎平章事干悰為中書侍郎以中書舍人劉允章權知禮部貢舉以吏部侍郎盧匡吏部侍郎李蔚兵部員外郎薛崇司勳員外郎崔殷夢考吏部宏詞選人九年春正月丙申以吏部侍郎李蔚檢校刑部尚書汴州刺史御史大夫充宣武節度汴宋亳觀察處置等使幽州節度使張允伸就加檢校太傅以兵部員外郎焦瀆司勳員外郎李嶽考宏詞選人七月戊戌白虹橫亙西方其月徐州赴桂林戍卒五百人官健許佶趙可立殺其將王仲甫以糧料判官龐勛為都頭剽掠湘潭衡山兩縣有衆千人擅還本鎮九月辛卯朔甲午龐勛陷宿州知州判官焦潞奔歸于徐乙未龐勛陷徐州殺節度使崔彥曾判官焦潞李稅溫延皓崔蘊韋廷乂惟免監軍張道謹遂出徐宿官庫錢帛召募凶徒不旬日其徒五萬勛抗表請罪仍命羣凶邀求節鉞上遣中使因而撫之賊令別將梁伾守宿州以姚周為柳子寨主又遣劉行及丁景琮吳迥攻圍泗州十月詔徵河南河東山南諸道之師貶浙西觀察使楊收為端州司馬同正收弟前浙東觀察使越州刺史御史中丞嚴為韶州刺史檢校工部尚書洪州刺史鎮南節度江南西道觀察處置等使嚴撰長流嶺南賊攻泗州勢急淮南節度使令狐綯慮失泗口為賊奔衝乃令大將李湘赴援為賊所誘示弱乞降乘其無備為賊所襲舉軍皆沒湘與都監郭厚本俱為賊所執送徐州十一月庚寅朔丁酉戌時妖星初出如匹練亙空化為雲沒在楚分吳迥既執李湘乃令小將張行簡吳約攻滁州城內無兵有淮南遊奕兵三百人在州界見賊至徑來奔郡賊乘之遂陷滁州張行簡執刺史高錫望手刃之屠其城而去行簡又進攻和州刺史崔雍登城樓謂吳迥曰城中玉帛女子不敢惜只勿取天子城池賊許之遂剽城中居民殺判官張琢以琢浚城壕故也龐勛又令將劉贄攻濠州陷之囚刺史盧望回於回車館望回鬱憤而死僕妾數人皆為賊蒸而食之十二月庚辰朔將軍戴可師率沙陀吐渾部落二萬人於淮南與賊轉戰賊黨屢敗盡棄淮南之守是歲江淮蝗食稼大旱龐勛奏當道先發戍嶺南兵士三千人春冬衣今欲差人送赴雍管鄂嶽觀察使劉允章上書言龐勛聚徒十萬今若遣人達嶺表如戍卒與勛合勢則禍難非細尋詔龐勛止絶兼令江淮諸道紀綱捕之十年春正月己未朔以徐州用兵罷元會癸亥以右拾遺韋保衡為銀青光祿大夫守起居郎駙馬都尉尚皇女同昌公主出降之日禮儀甚盛以神武大將軍王晏權檢校工部尚書徐州刺史御史大夫充武寧軍節度徐泗濠觀察兼徐州北路行營招討等使智興之從子也以將軍朱克誠充北路招討都虞候王宥北路招討前軍使以翰林學士戶部侍郎劉瞻守本官同平章事中書侍郎兼戶部尚書平章事蔣伸為太子太保罷知政事病免也以門下侍郎兼刑部尚書同平章事徐商檢校兵部書江陵尹荊南節度使以右神策大將軍知軍使兼御史大夫上柱國龍陽縣開國伯食邑一千戶康承訓可金紫光祿大夫檢校刑部尚書兼右神策大將軍御史大夫上柱國扶風郡開國公食邑一千五百戶充徐泗行營都招討使又以將軍李邵為徐州南路行營招討都虞候以將軍史忠用為潁州行營都知兵馬使將軍馬淡為徐州行營都知兵馬使將軍董濤充廬州行營都知兵馬使將軍戴可師充曹州行營招討使將軍朱邪赤心充太原行營招討使沙陀三部落等軍使將軍王建充淮泗行營招討使將軍曹翔充兗海節度行營招討使將軍馬舉為揚州都督府司馬充淮南行營招討使將軍高羅鋭為楚州刺史本州行營招討使將軍秦匡謨為濠州刺史本州行營招討使將軍李播為宿州刺史赴廬州行營招討使以將軍孟彪為太僕卿充都糧料使凡十八將分董諸道之兵七萬三千一十五人正月一日進軍攻徐州魏博何弘敬奏當道點檢兵馬一萬三千赴行營時賊將劉行及丁景琮吳迥攻圍泗州可師乘勝救之屯於石梁驛賊自退去可師追擊生擒劉行及賊保都梁城乃斷行及之指懸於城下以示賊賊登城拜曰見與都頭謀歸朝可師既知其窘乃退軍五里其城西面有水三面大軍賊乃夜中涉水而遁明早開城門惟病嫗數人而已王師入壘未整翌日詰旦重霧賊軍大至可師方大醉單馬奔出為虹縣人郭真所殺一軍盡沒惟忠武太原沙陀之騎軍保全而退副將王健為賊所擒劉行及却為賊將吳迥所得吳迥乃進軍復圍泗州自是梯衝雲合內外不通龐勛恃其驟勝遣人上表詞語不恭又與康承訓書指斥朝政王晏權者智興之猶子也故授以武寧節制以招之以冀招懷徐人怨王式之誅相扇構亂數月招攜啖之以利民囗卒無革心者康承訓大軍攻宿州賊將梁伾出戰屢敗乃授承訓檢校尚書右僕射兼滑州刺史義成軍節度使責授端州司馬楊收長流歡州與嚴撰並賜死於路其黨楊公慶嚴季實楊全益史明廉遂何師玄李孟勳馬全祐李羽王彥復等長流儋崖播等州判官朱侃常潾閻均等配流嶺南以河中節度使開府儀同三司檢校司徒平章事上柱國譙郡開國公食邑二千戶夏侯孜為太子少保分司東都時南平蠻寇西川責孜在蜀日失政也二月己丑龐勛急攻泗州遣牙將李員入城見刺史杜慆曰留後知中丞名族不敢令軍士失禮但開城門令百姓存活無相疑也慆執而殺之詔司農卿薛瓊使淮南廬壽楚等州點集鄉兵以自固四月康承訓奏大敗柳子寨賊詔監軍楊玄價與康承訓商量拔汴河水以灌宿州六月丁亥朔戊戌制曰動天地者莫若精誠致和平者莫若修政朕顧惟庸昧託于王公之上于茲十一年矣祗荷丕構寅畏小心慕唐堯之欽若昊天遵周王之昭事上帝念茲夙夜靡替虔恭同馭朽之憂勤思納隍之軫慮內戒奢靡外罷畋遊匪敢期於雍熙所自得於清淨止望寰區無事稼穡有年然而燭理不明涉道唯淺氣多堙鬱誠未感通旱暵是虞蟲螟為害蠻蛋未賓於遐裔寇盜復蠹於中原尚駕戎車益調兵食俾黎元之重困每宵旰而忘安今盛夏驕陽時雨久曠憂勤兆庶旦夕焦勞內修香火以虔祈外罄牲玉以精禱仰俟玄貺必致甘滋而油雲未興秋稼闕望因茲愆亢軫于誠懷矧復暴政煩刑強官酷吏侵漁蠹耗陷害孤致有冤抑之人構成災沴之氣主守長吏無忘奉公伐叛興師蓋非獲已除姦討逆必使當辜苟或陷及平人自然風雨愆候凡行營將帥切在審詳昭示惻憫之心敬聽勤恤之旨應京城天下諸州府見禁囚徒除十惡忤逆官典犯贓故意殺人合造毒藥放火持仗開劫墳墓及關連徐州逆黨外並宜量罪輕重速令決遣無久繫留雷雨不同田疇方瘁誠宜愍物以示好生其京城未降雨間宜令坊市權斷屠宰昨陝虢中使回方知蝗旱有損處諸道長史分憂共理宜各推公共思濟物內有飢歉切在慰安哀此蒸人毋俾艱食徐方寇孽未殄師旅有征凡合誅鋤審分淑慝無令脅從橫死元惡偷生宜申告伐之文使知逆順之理於戲每思禹湯之罪己其庶成康之措刑孰謂德信未孚教化猶梗咨爾多士俾豫一人既引過在躬亦漸幾于理布告中外稱朕意焉賊將鄭鎰急攻壽州詔南面招討使馬舉救之賊解圍而去康承訓悉兵攻賊小睢寨不利而退七月康承訓攻賊柳子寨垂克而賊將王弘立救至王師大敗承訓退保宋州龐勛乘勝自率徐州徑卒並攻泗州留其都將許佶守徐州詔南面招討使馬舉為行營都招討使代承訓率諸軍以援泗州八月和州防虞行官石侔等一百三十人狀訴刺史崔雍稱賊初劫烏江縣雍令步奏官二人探知雍猶不信二人並被枷杻續差人探見賊已去州十里賊尋逼州城崔雍與賊頭吳約於鼓角樓上飲酒許與賊州又認軍事判官李譙為親弟表狀驅使官張立為男只乞二人並身其餘將士一任處置便令押衙李詞等各脫下衣甲防虞官健束手被斬者八百餘人行官石瓊脫衣甲稍遲便被崔雍遣賊處斬其崔雍所有料錢並家口纍差人押送往采石今在潤州豈有將一千人兵士之命贖拔己之一身不惟辜其神明實亦生負聖主兼科配軍州官吏修葺城池妄稱出料錢修城者敕曰臣子之節無如盡忠士人之風宜當遠恥崔雍任居牧守賊犯州城禦扞曾不發言從容乃與命酒況石瓊未脫衣甲志在當鋒不能奬其赤誠翻令擒送賊所原其深意與賊通和臣節全虧情狀可見欲行朝典宜更推窮其崔雍家口並在宣州宜令宣歙觀察使追崔雍收禁速勘逐具事由申奏是月馬舉率師解泗州之圍賊黨遁去敕曰當崔雍守郡之日是龐勛肆逆之初屬狂寇奔衝望風和好置酒以邀賊將啓關而納凶徒城內不許持兵皆令解甲致使三軍百姓抆血相視連頭受誅初聞奏陳深駭觀聽錫望守城而死已有追榮杜慆孤壘獲全尋加殊奬既褒忠節難赦罪人玉石固分懲勸斯在將垂誡於四海當何愛於一夫其崔雍宜差內養孟公度專往宣州賜自盡公度至雍死於陵陽館其男黨兒歸僧配流康州錮身遞送司勳郎中崔原貶柳州司戶比部員外郎崔福昭州司戶長安縣令崔朗澧州司戶左拾遺崔庚連州司戶荊南觀察支使崔序衡州司戶皆雍之親黨也九月賊宿州守將張玄稔以城降有兵萬人馬舉率師赴之龐勛聞之以其衆將攻玄稔玄稔賊之徑將也遂與舉合勢急圍徐州許佶登城拒守者三日佶敗走出玄稔收復徐州龐勛方來赴援聞城已拔欲南趨濠州馬舉追及渙河擊敗之勛溺水而死蕭縣主將又斬許佶首來降徐寇悉平初龐勛據徐州倉庫素無貯蓄乃令羣凶四出於揚楚廬壽滁和兗海沂密曹濮等州界剽牛馬挽運糧糗以夜繼晝招致亡命有衆二十萬男女十五已上皆令執兵其人皆舒鋤鈎為兵號曰霍錐首尾周歲十餘郡生靈受其酷毒至是盡平與玄稔詔曰去歲災興分野毒起徐方蕞爾庸夫稱兵犯命招諭不復猖狂罔悛脅從三州之人樜染萬姓之俗逆順之理邪正坐分果有忠臣悉殲逆黨再清郡邑不舉干戈此皆衆人協心闔州受福但以首尾周歲取制凶威里閭不安農桑失業言念於此倍積憂懷已有詔指揮今授玄稔銀青光祿大夫檢校右散騎常侍兼右驍衛大將軍御史大夫賜分帛五千匹金榼一枚蓋碗一具金腰帶一條軍將張臯已下二十人等第優給今差高品李志承押領宣賜制曰朕以眇身獲承丕業虔恭惕厲十一載于茲況荷十七聖之鴻休紹三百年之慶祚將求理本敢忘宵衣雖誠信未孚而寅畏不怠既絶意於苑囿固無心於畋遊業業兢兢日慎一日休徵罔應沴氣潛生南蠻將罷於戰爭徐寇忽孤於惠養招諭不至虐暴滋深竊弄干戈擅攻州鎮將邀符印輒恣凶殘不畏神祇自貽覆滅股肱之臣以罪惡之難捨腹心之衆謂悖逆之可誅爰徵甲兵用救塗炭上將宣力內臣協心選用皆得於良材掃蕩才及於周歲誅干紀反常之噍類懲亂臣賊子之姦謀今則已及偃戈重康黎庶疇庸之典在絲髮以無私懋賞之時貴纖毫之必當其四面行營節度使既成茂勳宜加酬奬並取別敕處分應諸道行營都將已下節級軍將各委本道具功勞名銜分析聞奏當續有處分被堅執鋭冒涉寒暄解甲櫜弓還鄉復業頒繒帛之賜免差役之征應四面行營將士今既平寧宜令次第放歸本道其賞賜匹段已從別敕處分到本道後仍令節度使各犒宴放歸私第便令歇息未用差使如行營人並免差科色役如本廂本將今後有節級員闕且以行營軍健量材差置用酬征伐之勤臨敵用命力屈殞身須慰傷魂以彰忠節超與職事仍加任使如無父兄子弟即有妻女者即委州使厚加贈恤常令安撫如是都將至都虞候陳亡者與贈官應陳亡將士有父兄子弟願入軍者便令本道填替如無父兄子弟仍且與給衣糧三年因戰陳傷損手足永廢者終身不得停給如將士被賊殺害者委所在州縣量事救接重與改瘞勿令暴露兼與設祭王者以仁恕為本拯濟是謀元惡既已誅鋤脅從宜從寬宥除龐勛親屬及桂州回戈逆黨為賊脅從及因戰陳拒敵官軍招諭不悛懼法逃走皆非本惡蓋鋒刃所驅今並釋放一切不問應舊軍將軍吏節級所由既已歸還征賦先宜蠲免其徐宿濠泗等州應合徵秋夏兩稅及諸色差科色役一事已上宜放十年已後蠲放三年待三年後續議條疏處分編氓失業丘井無人桑柘枌榆鞠為茂草應行營處百姓田宅産業為賊殘毀燒焚者今既平寧並許識認各還本主諸色人不得妄有侵占九原可作千載不忘尚禁樵蘇寧傷丘壠應有先賢墳墓碑記為人所知被賊毀廢者即與掩藏仍量致祭自用兵已來郡邑皆罹攻劫遠念驚撓尤在慰安今遣右散騎常侍劉異兵部郎中薛崇等往彼宣撫於戲朕以四海為家兆人為子一物失所每軫納隍之憂一方未寧常負阽危之戒今元凶就戮逆黨誅夷載戢干戈永銷氛祲庶平妖氣允洽嘉祥遐邇臣僚當體豫意制以徐州南面招討使檢校尚書左僕射右神武大將軍權知淮南節度事扶風縣開國伯食邑一千戶馬舉可檢校司空兼揚州大都督府長史淮南節度副大使知節度事以右武衛大將軍徐州東南面招討使曹翔檢校兵部尚書兼徐州刺史御史大夫徐泗濠團練防禦等使以前淮南節度使檢校司空平章事上柱國涼國公食邑三千戶令狐綯為太子太保分司東都魏博節度使檢校太傅同平章事何弘敬卒三軍立其子全為兵馬留後十一月南詔蠻驃信坦綽酋龍率衆二萬寇巂州定邊軍節度都頭安再榮守清溪關為賊所攻再榮退保大渡河北去清溪關二百里隔水相射凡九日八夜定邊軍節度使竇滂勒兵拒之十二月驃信遣清平官十餘人來偽和與竇滂語次蠻軍船競渡忠武武寧軍兵士結陳抗之接戰自午及申蠻軍稍却竇滂自縊于帳中徐州將苗全緒解之謂滂曰都統何至於是但安心全緒與再榮弘節等血戰取勝全緒三人率兵而出滂乃單騎宵遁其夜蠻軍營於山下全緒等謀曰彼衆我寡若明日對陳吾屬敗矣可夜擊之令其軍亂自解去忠武武寧之師乃夜入蠻軍弓弩亂發蠻衆大駭全緒等三將保軍而去蠻軍乘勝進攻西川城朝廷以顏慶復為大渡河制置劍南應接等使宋威為行營都知兵馬使將兵數萬與忠武武寧之師合與蠻軍戰于漢州之毗橋大捷解西川之圍明日蠻軍遁走西川平以蜀王佶為開府儀同三司成都尹劍南西川節度副大使知節度事不出閣以盧耽知節度事詔河東節度使鄭從讜赴闕以義成軍節度使光祿大夫檢校尚書左僕射同平章事滑州刺史上柱國會稽縣開國伯食邑二千戶康承訓以本官兼太原尹北都留守充河東軍節度使以吏部侍郎楊知溫吏部侍郎于德孫李玄考官司封員外郎盧蕘刑部侍郎楊戴考試宏詞選人以虞部郎中宋震前昭應主簿胡德融考科目舉人詔以兵戈才罷且務撫寧其禮部貢舉宜權停一年付中書行敕指揮其兩省官等不用論奏敕荊南節度使杜悰據司天奏有小孛星氣經歷分野恐有外夷兵水之患緣邊藩鎮最要隄防宜訓習師徒增築城堡凡關制置具事以聞制以魏博節度使何全起復檢校司空同平章事十一年春正月甲寅朔制尚書右僕射杜審權為檢校司徒河中尹絳慈隰節度觀察處置等使丙午制宰相門下侍郎吏部尚書曹確可兼尚書左僕射門下侍郎戶部尚書路巖可兼右僕射中書侍郎于悰可兼戶部尚書平章事劉瞻可中書侍郎知政事餘並如故己酉制河東節度使康承訓將門瑣質戎壘微才曾不知兵謬膺重祿憂韜鈐以效任畜姦惡以事君幾授鉞於戎藩嘗執金以徼道謂其盡節委以專征屬者徐部匪寧敢干紀律俾護諸將坐覆危巢罄國幣以佐軍頒王爵而賞士而玩寇莫戰按甲不前立法未學於穰苴申令頓虧於孫子況部伍不戰逼撓無謀人數空多軍威何振使農夫釋耒工女下機始凝望於天誅翻有思於賊至洎元凶自潰玄稔效忠彭門洞開爾功何有而負恩已甚瀆貨是求叨榮苟幸於一時遺患遂逾於積歲爰行國典俾傅戎藩可蜀王傅分司東都再貶恩州司馬同正馳驛發遣以檢校左散騎常侍泗州刺史杜慆檢校工部尚書滑州刺史義成軍節度鄭滑觀察等使以河東行營沙陀三部落羌渾諸部招討使檢校太子賓客監察御史朱邪赤心為檢校工部尚書單于大都護御史大夫振武節度麟勝等州觀察等使仍賜姓名曰李國昌以吏部尚書蕭鄴吏部侍郎于德孫吏部侍郎楊知溫考官司勳員外郎李耀禮部員外郎崔淡等考試應宏詞選人以河陽三城節度孟懷澤觀察使中散大夫檢校禮部尚書孟州刺史御史大夫崔彥昭為金紫光祿大夫檢校刑部尚書太原尹北都留守河東節度觀察等使以兵部侍郎翰林學士承旨扶風縣開國子食邑五百戶駙馬都尉韋保衡本官同平章事以兵部侍郎劉鄴判度支左僕射門下侍郎同平章事曹確以病求免授檢校司空同平章事兼潤州刺史充浙江西道觀察等使魏博節度使何全酷政為衙軍所殺推其大將韓君雄為留後四月癸未朔戊子敕去年屬以用軍之際權停貢舉一年今既去戈却宜仍舊來年宜別許三十人及第進士十人明經二十人已後不得援例八月辛巳朔己酉同昌公主薨追贈衛國公主諡曰文懿主郭淑妃所生主以大中三年七月三日生咸通九年二月二日下降上尤鍾念悲惜異常以待詔韓宗紹等醫藥不效殺之收捕其親族三百餘人繫京兆府宰相劉瞻京兆尹溫璋上疏論諫行法太過上怒叱出之九月丙辰制以正議大夫守中書侍郎兼刑部尚書同平章事充集賢殿大學士上柱國彭城縣開國侯食邑一千戶賜紫金魚袋劉瞻檢校刑部尚書同平章事兼江陵尹充荊南節度等使翰林學士戶部侍郎知制誥上柱國賜紫金魚袋鄭畋為梧州刺史正議大夫御史中丞上柱國賜紫金魚袋孫瑝為汀州刺史將仕郎右諫議大夫柱國賜紫金魚袋高湘為高州刺史中散大夫比部郎中知制誥柱國賜紫金魚袋楊知至為瓊州司馬將仕郎守禮部郎中魏簹為春州司馬朝議大夫行兵部員外郎判度支案柱國張顏為播州司戶朝議大夫行刑部員外郎柱國崔顏融為雷州司戶並坐劉瞻親善為韋保衡所逐也京兆尹溫璋貶振州司馬制出之夜璋仰藥而死劉瞻再貶康州刺史十月以給事中薛能為京兆尹以中書舍人高湜權知禮部貢舉十一月己酉朔辛亥制以禮部尚書王鐸本官同平章事丁卯敕徐州地當沛野軍本驍雄實為壯國之都固協建侯之制況山河素異土俗甚殷豈欲削卑挫其繁盛蓋緣比因稔禍或至亂常罪由己招孽非天作桂林叛卒繼有逆謀塗炭生靈首尾周歲殺傷黎庶污染忠良所不忍言尋加翦滅是以卑其鎮額隸彼藩方近屬大兵已來飢年荐至且聞軍人百姓深恥前非願行舊規却希建節朕每深軫念思致小康特示渥恩復其軍額宜賜宣徽庫綾絹十萬匹助其宴犒必獲周豐其徐州都團練使改為感化軍節度徐宿濠泗等州觀察處置等使以吏部侍郎鄭從讜檢校戶部尚書兼汴州刺史御史大夫充宣武軍節度使代李蔚以蔚檢校吏部尚書揚州大都督府長史兼淮南節度副大使知節度事十二年春正月戊申宰相路巖率文武百僚上徽號曰睿文英武明德至仁大聖廣孝皇帝御含元殿册禮畢大赦辛酉葬衛國公主於少陵原先是詔百僚為挽歌詞仍令韋保衡自撰神道碑京兆尹薛能為外監護供奉楊復璟為內監護威儀甚盛上與郭淑妃御延興門哭送幽州節度使張允伸病請以子簡會為節度副大使權知兵馬事詔從之三月以吏部尚書蕭鄴吏部侍郎歸仁晦李當考官司封郎中鄭紹業兵部員外郎陸勳等考試宏詞選人四月以左僕射門下侍郎同平章事路巖檢校司徒兼成都尹劍南西川節度等使五月庚申敕慎恤刑獄大易格言語曰如得其情即哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞視事以此械繫之輩溢於狴牢追捕之徒繁於簡牘實傷和氣因致沴氛況時屬熇蒸化先茂育並赦罪戾式順生成應天下所禁繫罪人除十惡忤逆故意殺人合造毒藥持仗行劫開發墳墓外餘並宜疏理釋放或信任人吏多有生情繫留續察訪得知本道觀察使判官州府本曹官必加懲譴以誡慢易到後十日內速疏理分析聞奏上幸安國寺賜講經僧沉香高座七月辛丑中書門下奏準今年六月十二日敕釐革諸道及在京諸司奏官並請章服事者其諸道奏州縣官司録縣令録事參軍或見任公事敗闕不理切要替換及前任實有勞效並見有闕員即任各舉所知每道奏請仍不得過兩人其河東潞府邠寧涇原靈武鹽夏振武天德鄜坊滄德易定三川等道觀察防禦等使及嶺南五管每道每年除令録外許量奏簿尉及中下州判司及縣丞共三人福州不在奏州縣官限其黔中所奏州縣官及大將管內官即任準舊例處分在京諸司及諸道帶職奏官或非時僉替考限未滿並卻與本資官諸道節度及都團練防禦使下將校奏轉試官及憲御等令諸節度事每年量許五人都團練防禦量許三人為定不得更於其外奏請其御史中丞已下即準敕文條疏須有軍功方可授任自今後如顯立戰伐功勞者任具事績申奏如檢勘不虛當別與商量處分以外輒不得更有奏請其幽鎮魏三道望且準承前舊例處分敕旨從之十二月以檢校戶部尚書汴州刺史御史大夫宣武軍節度使鄭從讜為廣州刺史嶺南東道節度觀察處置等使十三年春正月壬寅朔甲戌制以兵部侍郎判度支劉鄴本官同平章事幽州盧龍等軍節度使檢校司徒同平章事幽州大都督府長史上柱國燕國公食邑三千戶張允伸卒贈太尉諡曰忠烈允伸鎮幽州二十三年二月幽州牙將張公素奪留後張簡會軍政自稱留後丁巳制以尚書右僕射門下侍郎同平章事于琮檢校司空襄州刺史充山南東道節度觀察處置等使以御史中丞趙隱為戶部侍郎本官同平章事三月以吏部尚書蕭鄴吏部侍郎獨孤雲考官職方郎中趙蒙駕部員外郎李超考試宏詞選人試日蕭鄴替差右丞孔溫裕權判五月庚午朔辛未敕檢校尚書左僕射守左羽林軍統軍御史大夫張直方貶康州司馬同正以其部下為盜故也乙亥國子司業韋殷裕於閣門進狀論淑妃弟郭敬述陰事上怒甚即日下京兆府決殺殷裕籍沒其家殷裕妻崔氏音聲人鄭羽客王燕客婢微娘紅子等九人配入掖庭閣門使田獻銛奪紫配於橋陵閣門司閻敬直決十五配南衙為受殷裕文狀故也給事中杜裔休貶端州司馬中書舍人崔沆循州司戶殷裕妻兄也太僕少卿崔元應州司戶殷裕妻父也前河陰院官韋君卿為愛州崇平尉殷裕季父也以前大理正万俟鎔為國子司業前興元少尹馮彭為普州刺史前大理正陽琯為昌州刺史丙子制開府儀同三司檢校尚書左僕射兼襄州刺史御史大夫充山南西道節度觀察等使于琮可正議大夫守普王傅分司東都辛巳敕尚書左丞李當貶道州刺史吏部侍郎王𤧑貶漳州刺史左散騎常侍李郁貶賀州刺史前中書舍人封彥卿貶潮州司戶翰林學士承旨兵部侍郎知制誥張裼貶封州司馬右諫議大夫楊孰貶和州司戶工部尚書嚴祁貶郴州刺史給事中李貺蘄州刺史給事中張鐸藤州刺史左金吾衛大將軍充左街使李敬伸儋州司戶前青州刺史平盧軍節度使于涓為涼王府長史分司東都前湖南觀察使于瓌為袁州刺史涓瓌琮之兄也于藹于蔇亦配流自李當已下皆于琮之親黨也為韋保衡所逐以天德防禦使檢校左散騎常侍段文楚為雲州刺史大同軍防禦使六月義成軍節度使檢校工部尚書杜慆奏當管潁州僧道百姓舉留刺史宗回敕曰回清幹臨人自有月限方藉綏輯未議替移六月中書門下奏今月十七日延英面奉聖旨令誡約天下州府應有逃亡戶口其賦稅差科不得攤配見在人戶上者伏以諸道州府或兵戈之後災沴之餘戶口逃亡田疇荒廢天不敷佑人多艱危鄉閭屢困於征徭帑藏因茲而耗竭遂使從來經費色額太半空系簿書緩徵斂則闕於供須促期限則迫於貧苦言念凋弊勞乃憂勤不降明文孰知聖念其逃亡戶口賦稅及雜差科等須有承佃戶人方可依前應役如將闕稅課額攤於見在人戶則轉成逋債重困黎元或富者有連阡之田貧者無立錐之地欲令均一固在公平若令狡猾之徒得以升降由己望其完葺不亦難乎全由長吏竭誠方使疲氓漸泰臣等商量令諸道州府準此條疏應有逃亡戶口稅賦並雜色差科等並不得輒更攤配於見存人戶之上務設法招攜多方撫御乘茲豐稔重獲昭蘇苟致安寧自當遷陟不遵詔令必舉典刑從之七月以前義昌軍節度使盧簡方為太僕卿十二月以振武節度李國昌為檢校右僕射雲州刺史大同軍防禦等使國昌恃功頗橫專殺長吏朝廷不能平乃移鎮雲中國昌稱病辭軍務乃以太僕卿盧簡方檢校刑部尚書雲州刺史充大同軍防禦等使上召簡方於思政殿謂之曰卿以滄州節鎮屈轉大同然朕以沙陀羌渾撓亂邊鄙以卿曾在雲中惠及部落且忍屈為朕此行具達朕旨安慰國昌勿令有所猜嫌也是月李國昌小男克用殺雲中防禦使段文楚據雲州自稱防禦留後制追諡宣宗為元聖至明成武獻文睿智章仁神聰懿道大孝皇帝十四年春正月丙寅朔御史中丞韋蟾奏應諸州刺史除授正衙辭謝後託故陳牒請假實為容易自今後如實有故為衆所知者三日外不在陳牒之限應內外除官入京合便朝謝如遇假日且合在都亭驛近日多因請假便歸私家既犯條章頗乖禮敬自今已後望準故事如未朝謝須於都亭驛如違越臺司勘當申奏從之辛未以雲朔暴亂代北騷動賜盧簡方詔曰李國昌久懷忠赤顯著功勞朝廷亦三授土疆兩移旄節其為寵遇實寡比倫昨者徵發兵師又令克讓將領惟嘉節義同絶嫌疑近知大同軍不安殺害段文楚推國昌小男克用主領兵權事雖出於一時心豈忘於長久段文楚若實刻剝自結怨嫌但可申論必行朝典遽至傷殘性命刳剔肌膚慘毒憑凌殊可驚駭況忠烈之後節義之門致茲橫亡尤悚觀聽若克用暫勿主兵務束手待朝廷除人則事出權宜不足猜慮若便圖軍柄欲奄有大同則患繫久長故難依允料國昌輸忠效節必當已有指揮知卿兩任雲中恩及國昌父子敬憚懷感不同常人宜悚與書題深陳禍福殷勤曉喻劈析指宜切令大節無虧勿使前功並棄簡方準詔諭之國昌不奉詔乃詔太原節度使崔彥昭幽州節度使張公素帥師討之三月以新除大同軍使盧簡方為單于大都護振武節度麟勝等州觀察等使時李國昌據振武簡方至嵐州而卒自是沙陀侵掠代北諸軍鎮庚午詔兩街僧於鳳翔法門寺迎佛骨是日天雨黃土遍地四月八日佛骨至京自開遠門達安福門綵棚夾道念佛之音震地上登安福門迎禮之迎入內道場三日出於京城諸寺士女雲合威儀盛飾古無其比制曰朕以寡德纘承鴻業十有四年頃屬寇猖狂王師未息朕憂勤在位愛育生靈遂乃尊崇釋教至重玄門迎請真身為萬姓祈福今觀覩之衆隘塞路歧載念狴牢寢興在慮嗟我黎人陷於刑辟況漸當暑毒繫於縲紲或積幽凝滯有傷和氣或關連追擾有妨農務京畿及天下州府見禁囚徒除十惡忤逆故意殺人官典犯贓合造毒藥放火持仗開發墳墓外餘罪輕重節級遞減一等其京城軍鎮限兩日內疏理訖聞奏天下州府敕到三日內疏理聞奏以吏部侍郎蕭倣為兵部侍郎同平章事六月帝不豫七月癸亥朔戊寅疾大漸庚午制立普王儼為皇太子權勾當軍國政事辛巳遺詔曰朕祗事九廟君臨四海夕惕如厲宵分靡寧必求政化之源思建大中之道至於懷柔夷貊偃戢干戈皆以德綏亦自馴致冀清淨之為理庶治平之可臻自秋已來忽爾嬰疹坐朝既闕踰旬未瘳六疾斯侵萬機多曠醫和無驗以至彌留嗚呼數哉有窮聖賢之所必同明於斯言是為達節載申顧命式叶典謨皇太子權勾當軍國事儼性稟寬和生知忠孝德苞睿哲聖表徇齊必能揚祖宗之重光荷邦家之丕構宜令所司具禮於柩前即皇帝位以司空門下侍郎平章事韋保衡攝冢宰軍國務殷豈可久曠況易月之制行之自古皇帝宜三日而聽政二十七日釋服諸道節度觀察團練防禦等使及監軍諸州刺史受寄至重並不得離任赴哀文武常參官朝晡之臨十五舉音宮中當臨者非時無得擅哭天下人吏百姓告哀後出臨三日皆釋服勿禁食肉飲酒婚姻祭祀釋服之後無禁當舉薄葬之禮宜遵漢魏之文其山陵制度切在儉約並不得以金銀錦繡文飾喪具五坊鷹犬等除搜狩外餘並解放其醫官段璲趙苻虔休馬及等並釋放咨爾將相卿士中外臣僚竭力盡忠匡豫令嗣送往事居無違朕志是日崩于咸寧殿聖壽四十一百僚上諡曰睿文昭聖恭惠孝皇帝廟號懿宗十五年二月葬于簡陵史臣曰臣常接咸通耆老言恭惠皇帝故事當大中時四海承平百職修舉中外無粃政府庫有餘資年穀屢登封疆無擾恭惠始承丕構頗亦勵精延納讜言尊崇耆德數稔之內洋洋頌聲然器本中庸流於近習所親者巷伯所昵者桑門以蠱惑之侈言亂驕淫之方寸欲無怠忽其可得乎及釁結蠻陬姦生戍卒發五嶺之轉輸寰海動搖徵二蜀之捍防蒸人蕩覆徐寇雖殄河南幾空然猶削軍賦而飾伽藍困民財而修淨業以諛佞為愛己謂忠諫為妖言爭趨險詖之途罕勵貞方之節見豕負塗之愛豎非次寵升燋頭爛額之輔臣無辜竄逐是以干戈布野蟲旱彌年佛骨才入於應門龍輴已泣於蒼野報應無必斯其驗歟土德凌夷禍階於此雖有文景之英繼難以興焉自茲龜玉之不昌固其宜矣黃髮遺叟言之涕零贊曰邦家治亂在君聽斷恭惠驕奢賢良貶竄凶豎當國憸人滿朝姦雄乘釁貽謀道消
