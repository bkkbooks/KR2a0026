body:
  text: 舊唐書卷七本紀第七中宗睿宗中宗大和聖昭孝皇帝諱顯高宗第七子母曰則天順聖皇后顯慶元年十一月乙丑生於長安明年封周王授洛州牧儀鳳二年徙封英王改名哲授雍州牧永隆元年章懷太子廢其年立為皇太子弘道元年十二月高宗崩遺詔皇太子柩前即帝位皇太后臨朝稱制改元嗣聖元年二月皇太后廢帝為廬陵王幽於別所其年五月遷於均州尋徙居房陵聖曆元年召還東都立為皇太子依舊名顯時張易之與弟昌宗潛圖逆亂神龍元年正月鳳閣侍郎張柬之鸞臺侍郎崔玄暐左羽林將軍敬暉右羽林將軍桓彥範司刑少卿袁恕己等定策率羽林兵誅易之昌宗迎皇太子監國總司庶政大赦天下鳳閣侍郎韋承慶正諫大夫房融司禮卿崔神慶等下獄甲辰命地官侍郎樊忱往京師告廟陵司刑少卿兼相王府司馬袁恕己為鳳閣鸞臺平章事乙巳則天傳位於皇太子丙午即皇帝位於通天宮大赦天下唯易之黨與不在原限為周興來俊臣所枉陷者咸令雪免內外文武官加兩階三品已上加爵二等入五品等特減四考大酺五日以並州牧相王旦及太平公主有誅易之兄弟功相王加號安國相王進拜太尉同鳳閣鸞臺三品公主加號鎮國太平公主仍賜實封通前滿五千戶皇親先被配沒者子孫令復屬籍仍量官爵出宮女三千丁未天后徙居上陽宮庚戌鳳閣侍郎同鳳閣鸞臺平章事張柬之為夏官尚書同鳳閣鸞臺三品封漢陽郡公鸞臺侍郎兼檢校太子右庶子同鳳閣鸞臺平章事崔玄暐為守內史封博陵郡公袁恕己同鳳閣鸞臺三品封南陽郡公敬暉為納言平陽郡公桓彥範為納言譙郡公並加銀青光祿大夫賜實封五百戶右羽林大將軍遼國公李多祚進封遼陽郡王賜實封六百戶內直郎駙馬都尉王同皎為雲麾將軍右千牛將軍琅邪郡公食實封五百戶並賞誅張易之兄弟功其餘封各有差上天后尊號為則天大聖皇帝二月甲寅復國號依舊為唐社稷宗廟陵寢郊祀行軍旗幟服色天地日月寺宇臺閣官名並依永淳已前故事神都依舊為東都北都為並州大都督府老君依舊為玄元皇帝諸州百姓免今年租稅房州百姓給復三年改左右肅政臺為左右御史臺韋承慶貶高要尉房融配流欽州中書令楊再思為戶部尚書同中書門下三品京留守太僕卿同中書門下三品姚元之出為亳州刺史己未封堂兄左金吾將軍鬱林郡公千里為成紀郡王左金吾衛大將軍實封五百戶令貢舉人停習臣軌依舊習老子甲子立妃韋氏為皇后大赦天下內外官陪位者賜勳一轉大酺三日后父故豫州刺史玄貞為上洛郡王后母崔氏贈上洛郡王妃初韓王元嘉霍王元軌等自垂拱以來皆遭非命是日追復官爵令備禮改葬有胤嗣者即令承襲無胤嗣者聽取親為後詔九品已上及朝集使極言朝政得失兼舉賢良方正直言極諫之士丙寅左散騎常侍譙王重福貶濮州員外刺史不知州事特進太子賓客梁王武三思為司空同中書門下三品加實封五百戶通前一千五百戶丁卯右散騎常侍定安郡王駙馬都尉武攸暨封定王為司徒更加實封四百戶通前一千戶辛未上往觀風殿朝天后太尉安國相王旦固讓太尉及知政事遂從其請甲戌國子祭酒祝欽明同中書門下三品黃門侍郎知侍中書韋安石為刑部尚書罷知政事丙子諸州置寺觀一所以中興為名丁丑武三思固讓司空同中書門下三品武攸暨固讓司徒封王許之改封義興郡王重俊為衛王北海郡王重茂為溫王三月辛巳追復故司空英國公李績官爵令所司為起墳改葬甲申制文明已來破家臣僚所有子孫並還資廕其揚州構逆徒黨唯徐敬業一房不在免限餘並原宥丁亥廢左右司員外郎其酷吏劉光業王德壽王處貞屈貞筠劉景陽等五人雖已身死官爵並宜追奪景陽見在貶祿州樂單尉丘神績來子珣萬國俊周興來俊臣魚承曄王景昭索元禮傅遊藝王弘義張知默裴籍焦仁亶侯思立郭霸李敬仁皇甫文備陳嘉言等雖已身死並宜除名唐奉一配流李秦授曹仁哲並改與嶺南遠惡處己丑中書侍郎兼檢校相王府長史南陽郡公袁恕己為中書令兼檢校安國相王府長史詔曰君臣朝序貴賤之禮斯殊兄弟大倫先後之儀亦異聖人之制率由斯道朕臨茲寶極位在崇高負扆當陽雖受宗枝之敬退朝私謁仍用家人之禮近代以來罕遵軌度王及公主曲致私情姑叔之尊拜於子姪違法背禮情用惻然自今已後宜從革弊安國相王某及鎮國太平公主更不得輒拜衛王重俊兄弟及長寧公主姊妹等宜告宗屬知朕意焉先是諸王及公主皆以親為貴天子之子諸姑叔見之必先致拜若致書則稱為啓事上志欲敦睦親族故下制革之庚寅衛王重俊上洛州牧王乘駟馬車鹵簿從諸王公已下中書門下五品已上及諸親並祖送禮儀甚盛事畢賜物有差辛卯以故司僕少卿徐有功執法平恕追贈越州都督並授一子官戊戌左右千牛衛各置大將軍一員罷奉宸府官員以安北大都護安國相王旦為左右千牛大將軍每大朝會內供奉丙午改秋社依舊用仲秋戊申相王旦於太常廳上王公諸親祖送衛尉張設光祿造食禮畢賜物如衛王上洛州牧之儀夏四月乙丑端州尉魏元忠為衛尉卿同中書門下三品甲戌左庶子韋安石為吏部尚書太子賓客李懷遠為右散騎常侍右庶子唐休璟為輔國大將軍右庶子崔玄暐為特進檢校益州大都督府長史判都督事右庶子西留守戶部尚書弘農郡公楊再思為檢校揚州大都督府長史判都督事少詹事兼侍讀國子祭酒祝欽明為刑部尚書並依前知政事以上在春宮故僚也乙亥張柬之為中書令戊寅追贈邵王重潤為懿德太子同官縣大雨雹燕雀多死漂溺居人四百家遣使賑給五月壬午遷武氏七廟神主于西京崇尊廟東都創置太廟社稷戊子制依舊以周隋為二王後壬辰封成紀郡王千里為成王癸巳侍中敬暉封為平陽郡王侍中桓彥範扶陽郡王賜姓韋氏中書令張柬之漢陽郡王中書令袁恕己南陽郡王特進崔玄暐海陵郡王並加授特進罷知政事吏部尚書韋安石為兼中書令兵部尚書魏元忠為兼侍中丙申皇后表請天下士庶為出母為三年服年二十二成丁五十九免役癸卯降梁王武三思為德靜郡王定王武攸暨為樂壽郡王河內王武懿宗等十餘人並降為國公甲辰特進芮國公豆盧欽望為尚書左僕射輔國大將軍酒泉郡公唐休璟為尚書右僕射依舊同中書門下三品丙午制以鄒魯之邑百戶為太師隆道公宣尼采邑用供薦享又授裔孫褒聖侯崇基朝散大夫仍許子孫傳襲六月丁巳河北十七州大水漂沒人居癸亥尚書左僕射豆盧欽望軍國重事中書門下可共平章檢校中書令韋安石中書令兼檢校吏部尚書檢校侍中魏元忠兼檢校兵部尚書楊再思兼戶部尚書兼檢校中書令丁卯祔孝敬皇帝神主於太廟廟號義宗非禮也戊辰洛水暴漲壞廬舍二千餘家溺死者甚衆秋七月辛巳太子賓客韋巨源同中書門下三品乙未以特進漢陽郡王張柬之為襄州刺史仍不知州事八月戊申以水災令文武官九品以上直言極諫河南洛陽百姓被水兼損者給復一年甲子追册故妃趙氏為恭皇后尊孝敬妃裴氏為哀皇后乙亥上親祔太祖景皇帝獻祖光皇帝世祖元皇帝高祖神堯皇帝皇祖太宗文武皇帝皇考高宗天皇大帝皇兄義宗孝敬皇帝神主于太廟皇后廟見丁丑御洛城南門觀鬬象九月壬午親祀明堂大赦天下禁化胡經及婚娶之家父母親亡停喪成禮天下大酺三日戊戌太子賓客韋巨源為禮部尚書依舊知政事冬十月癸亥幸龍門香山寺乙丑幸新安改弘文館為修文館辛未魏元忠為中書令楊再思為侍中十一月戊寅加皇帝尊號曰應天皇后尊號曰順天壬午皇帝皇后親謁太廟告受徽號之意大赦天下賜酺三日己丑御洛城南門樓觀潑寒胡戲辛丑衛王重俊為左衛大將軍遙領揚州大都督溫王重茂為右衛大將軍遙領並州大都督十二月壬寅則天皇太后崩二年春正月丙申護則天靈駕還京戊戌吏部尚書李嶠同中書門下三品中書侍郎于惟謙同中書門下平章事閏月丙午朔置公主府官員乙卯以特進敬暉桓彥範袁恕己等三人為滑洺豫刺史二月乙未刑部尚書韋巨源同中書門下三品遣十使巡察風俗丙申僧會範道士史崇玄等十餘人授官封公以賞造聖善寺功也三月甲辰中書令韋安石為戶部尚書罷知政事戶部尚書蘇瓌為侍中京留守乙巳黃霧四塞唐休璟請致仕許之庚戌殺光祿卿駙馬都尉王同皎壬子洛陽城東七里許地色如水側近樹木往來車馬歷歷影見水中經月餘乃滅是月大置員外官自京諸司及諸州佐凡二千餘人超授閹官七品已上及員外者千餘人壬戌贈后父韋玄貞太師益州都督夏四月甲戌又贈玄貞為酆王玄貞弟四人並贈郡王己卯左散騎常侍同中書門下三品李懷遠請致仕許之辛巳洛水暴漲壞天津橋六月戊寅特進朗州刺史平陽郡王敬暉貶崖州司馬特進亳州刺史扶陽郡王桓彥範瀧州司馬特進郢州刺史袁恕己竇州司馬特進均州刺史博陵郡王崔玄暐白州司馬特進襄州刺史漢陽郡王張柬之新州司馬並員外置長任舊官封爵並追奪秋七月丙午立衛王重俊為皇太子丙寅中書令兼檢校兵部尚書齊國公魏元忠為尚書右僕射兼中書令仍知兵部事吏部尚書李嶠為中書令刑部尚書韋巨源為吏部尚書依舊同中書門下三品庚午禮部尚書祝欽明為中丞蕭至忠所劾前左散騎常侍李懷遠為左散騎常侍同中書門下三品東都留守九月祝欽明貶青州刺史壬寅幸白馬寺戊午左散騎常侍李懷遠卒壬寅置戶部侍郎一員冬十月己卯車駕還京師戊戌至自東都十一月乙巳大赦天下行從文武官賜勳一轉改河南為合宮洛陽為永昌嵩陽為登封陽城為告成戊午兼祕書鄭普思坐妖逆配流儋州其黨與皆伏誅十二月己卯突厥默啜寇靈州鳴沙縣靈武軍大總管沙吒忠義逆擊之官軍敗績死者三萬丁巳突厥進寇原會等州掠隴右牧馬萬餘而去甲申募能斬默啜者封授諸大衛大將軍丙戌以突厥犯邊京師亢旱令減膳徹樂河北水大飢命侍中蘇瓌存撫賑給丙申特進尚書左僕射兼安國相王府長史芮國公豆盧欽望為開府儀同三司依舊平章軍國重事尚書右僕射兼中書令知兵部事齊國公魏元忠為尚書左僕射兼中書令仍兼知兵部事是冬牛大疫三年春正月庚子朔不受朝會喪未再期也庚戌以默啜寇邊制募猛士武藝超絶者各令自舉內外羣官各進破滅突厥之策丙辰以旱親録囚徒己巳遣武攸暨武三思往乾陵祈雨于則天皇后既而雨降上大感悅二月辛未制武氏崇恩廟依舊享祭仍置五品令七品丞其昊陵順陵置令丞如廟壬午贈太師酆王廟號褒德陵號榮先置六品令八品丞庚寅改中興寺觀為龍興內外不得言中興辛卯幸安樂公主宅三月丙子吐蕃贊普遣大臣悉董熱獻方物是春自京師至山東疾疫民死者衆河北河南大旱夏四月辛巳以嗣雍王守禮女為金城公主出降吐蕃贊普庚寅幸薦福寺曲赦雍州五月戊戌左屯衛大將軍兼檢校洛州長史張仁亶為朔方道大總管以備突厥丙午突厥默啜殺我行人臧思言六月丁卯朔日有蝕之戊子姚嶲道討擊使侍御史唐九徵擊姚州叛蠻破之俘虜三千計遂於其處勒石紀功焉是夏山東河北二十餘州旱飢饉疾疫死者數千計遣使賑恤之秋七月庚子皇太子重俊與羽林將軍李多祚等率羽林千騎兵三百餘人誅武三思武崇訓遂引兵自肅章門斬關而入帝惶遽登玄武樓重俊引兵至下上自臨軒諭之衆遂散去殺李