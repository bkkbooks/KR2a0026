二州並益荊揚四大都督府各增置司馬一員仍分為左右司馬丁亥皇太子釋奠於國學追贈顏回為太子太師曾參為太子太保每年春秋釋奠以四科弟子曾參從祀列于二十二賢之上辛酉廢右御史臺官員己巳頒新格式於天下夏四月辛丑制曰朕聞措刑由於用刑去殺存乎必殺明罰峻典自古而然立制齊人於是乎在自我朝建國僅將百年天下和平其來已久往承隋季守法頗專比襲時安持綱日緩況朕薄德甚莫逮先惟人難理遠不如昔粵從守位三載于茲庶務煩勞不損晷景嘗謂自我作則感而成化痛乎迷俗忘返不威罔懲將至純風先歸重典比者贓賄不息渝濫公行放心未寧禁犯無懼此焉暫革期於承平遂割小慈以崇大體自今已後造偽頭首者斬仍沒一房資財同用廕者並停奪非頭首者絞其承前造偽人限十日內首使盡官典主司枉法受贓一匹已上先決杖一百其緣贓及惡狀被解及與替者非選時不得輒入京城縱家貫在京不得輒至朝堂妄有披訴如有此色並決杖仍加貶斥其先在京城者限三日內勒還上下官僚輒緣私情相囑者其受囑人宜封狀奏聞成器已下朕自決罰其餘王公已下並解見任官三五年間不須齒録其進狀人別加褒賞御史宜令分察諸司五月戊寅親祀北郊辛未大赦天下改元為延和桓彥範敬暉崔玄暐張柬之袁恕己等特還其子孫實封二百戶天下大酺五日六月癸丑戶部尚書岑羲為侍中乙卯追尊則天皇后曰天后聖帝庚申幽州都督孫儉率左驍衛將軍李楷洛左威衛將軍周以悌等將兵三萬與奚首領李大輔戰于硎山為賊所敗儉沒於陳壬戌魏知古為戶部尚書仍依舊同中書門下三品秋七月庚午竇懷貞為尚書右僕射平章軍國重事己卯上觀樂於安福門以燭繼晝經日乃止八月庚子帝傳位于皇太子自稱太上皇帝五日一度受朝於太極殿自稱曰朕三品已上除授及大刑獄並自決之其處分事稱誥令皇帝每日受朝於武德殿自稱曰豫三品已下除授及徒罪並令決之其處分事稱制敕甲辰大赦天下改元為先天八月戊申皇帝子許昌王嗣直改封郯王真定王嗣謙為郢王己酉以宋王成器為司空依舊遙領揚州大都督庚戌竇懷貞為尚書左僕射同中書門下三品仍兼御史大夫劉幽求為尚書右僕射依舊同中書門下三品魏知古為侍中崔湜為中書令並監修國史丁巳立皇帝妃王氏為皇后癸亥劉幽求配流封州九月丁卯朔日有蝕之甲申封皇帝子嗣升為陝王冬十月庚子皇帝親謁太廟禮畢御延喜門大赦天下壬寅祔昭成皇后肅明皇后神主於儀坤廟癸卯皇帝幸新豐之溫湯校獵於渭川十二月丁未誥禁人屠殺犬雞戊午改箕州為儀州二年春正月敕江北諸州團結兵馬皆令本州刺史押掌乙亥吏部尚書兼太子右諭德酇國公蕭至忠為中書令上元日夜上皇御安福門觀燈出內人連袂踏歌縱百僚觀之一夜方罷二月丙申改隆州為閬州始州為劍州分冀州置深州初有僧婆請夜開門然燈百千炬三日三夜皇帝御延喜門觀燈縱樂凡三日夜左拾遺嚴挺之上疏諫之乃止三月辛卯皇后祀先蠶癸巳制敕表狀書奏箋牒年月等數作一十三十四十字夏六月丙辰兵部尚書朔方道行軍大總管郭元振加同中書門下三品秋七月甲子太平公主與僕射竇懷貞侍中岑羲中書令蕭至忠左羽林大將軍常元楷等謀逆事覺皇帝率兵誅之窮其黨與太子少保薛稷左散騎常侍賈膺福右羽林將軍李慈李欽中書舍人李猷中書令崔湜尚書左丞盧藏用太史令傅孝忠僧惠範等皆誅之兵部尚書郭元振從上御承天門樓大赦天下自大辟罪已下無輕重咸赦除之翌日太上皇誥曰朕將高居無為自今後軍國刑政一事以上並取皇帝處分開元四年夏六月甲子太上皇帝崩于百福殿時年五十五秋七月己亥上尊諡曰大聖貞皇帝廟曰睿宗冬十月庚午葬于橋陵天寶十三載二月改諡曰玄真大聖大興孝皇帝史臣曰法不一則姦偽起政不一則朋黨生上既啓其泉源下胡息於奔競觀夫天后之時雲委於二張之第孝和之世波注於三王之門獻奇則除設盈庭納賄則斜封滿路咸以進趨相軌姦利是圖如火投泉安得無敗洎景龍繼統污俗廓清然猶投杼於乘輿之間抵掌於太平之日以至書頻告變上不自安宮臣致禦魅之科天子慊巡邊之詔彼既彎弓而射我我則號泣以行刑此雖鎮國之尤亦是臨軒之失夫君人孝愛錫之以典刑納之於軌物俾無僭逼下絶覬覦自然治道惟新亂階不孝和既已失之玄真亦未為得贊曰孝和玄真皆肖先人率情背禮取樂於身夷塗不履覆轍攸遵扶持聖嗣賴有賢臣
