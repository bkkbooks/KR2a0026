以刑部郎中侍御史知雜李夷簡為御史中丞五月丙午朔辛酉刑部尚書鄭元卒丁卯鹽鐵使吏部尚書李巽卒六月乙亥朔丁丑以河東節度使李鄘為刑部尚書充諸道鹽鐵轉運使以靈鹽節度使范希朝為太原尹北都留守河東節度使以右衛上將軍王佖為靈州大都督府長史靈鹽節度使辛丑五嶺已北銀坑任人開採禁錢不過嶺南秋七月乙巳朔御制前代君臣事迹十四篇書於六扇屏風是月出書屏以示宰臣李藩等表謝之丁未渭南暴水壞廬舍二百餘戶溺死六百人命府司賑給乙卯右羽林統軍高固卒壬戌御史中丞李夷簡彈京兆尹楊憑前為江西觀察使時贓罪貶憑臨賀尉戊辰以尚書右丞許孟容為京兆尹賜金紫八月甲戌朔癸未兗州魚臺縣移置於黃臺市丙申安南都護張舟奏破環王國三萬餘人獲戰象兵械並王子五十九人癸卯贈太師裴冕宜配享代宗廟庭贈太師李晟贈太尉段秀實宜配享德宗廟庭九月甲辰朔庚戌以成德軍都知兵馬使鎮府右司馬王承宗起復檢校工部尚書充成德軍節度使以德州刺史薛昌朝檢校左常侍充保信軍節度德棣等州觀察等使昌朝薛嵩之子婚於王氏時為德州刺史朝廷以承宗難制乃割二州為節度以授昌朝制才下承宗以兵虜昌朝歸鎮州丁卯邠寧節度使檢校司空同平章事高崇文卒冬十月癸酉朔以右羽林統軍閻巨源為邠州刺史邠寧慶節度使以少府監崔頲為同州刺史本州防禦長春宮等使癸未詔成德軍節度使王承宗頃在苫廬潛窺戎鎮而內外以事君之禮叛而必誅分土之儀專則有辟朕念其先祖嘗有茂勳貸以私恩抑於公議使臣旁午以告諭孽童俯伏以陳誠願獻兩州期無二事朕亦收其後效用以曲全授節制於舊疆齒勳賢於列位況德棣本非成德所管昌朝又是承宗懿親俾撫近鄰斯誠厚澤外雖兩鎮內是一家而承宗象恭懷姦肖貌稔惡欺裴武於得位之後囚昌朝於授命之中加以表疏之間悖慢斯甚義士之所興嘆天地之所不容恭行天誅蓋示朝典承宗在身官爵並宜削奪以神策左軍中尉吐突承璀為鎮州行營招討處置等使以龍武將軍趙萬敵為神策先鋒將內官宋惟澄曹進玉馬朝江等為行營館驛糧料等使京兆尹許孟容與諫官面論征伐大事不可以內官為將帥補闕獨孤郁其言激切詔旨祇改處置為宣慰猶存招討之名己丑詔軍進討其王武俊士真墳墓軍士不得樵採其士平士則各守本官仍令士則各襲武俊之封庚寅冊鄧王寧為皇太子癸巳以冊儲肆赦繫囚死罪降從流流以下遞降一等文武常參官外州府長官子為父後者賜勳兩轉工部侍郎歸登給事中呂元膺為皇太子諸王侍讀己亥吐突承璀軍發京師上御通化門勞遣之十一月癸卯朔浙西蘇潤常州旱儉賑米二萬石甲子河南尹杜兼卒己巳彰義軍節度使檢校司空同平章事吳少誠卒十二月壬申朔以戶部侍郎張弘靖為陝府長史陝虢觀察陸運等使賜金紫以陝虢觀察使房式為河南尹中丞李夷簡奏諸州府於兩稅外違格科率請諸道鹽鐵轉運度支巡院察訪報臺司以憑舉奏從之五年春正月壬寅朔己巳浙西觀察使韓臯以杖決安吉令孫澥致死有乖典法罰一月俸料二月辛未朔戊子禮院奏東宮殿閣名及宮臣姓名與太子名同者改之其上臺官列王官爵土無例輒改從之東臺監察御史元稹攝河南尹房式於臺擅令停務貶江陵府士曹參軍三月辛丑朔宰相杜佑與同列宴於樊川別墅上遣中使賜酒饌乙巳以御史中丞李夷簡為戶部侍郎判度支以兵部侍郎王播為御史中丞癸巳以太子賓客鄭絪檢校禮部尚書廣州刺史嶺南節度使己未制以遂王宥為彰義軍節度使以申州刺史吳少陽為申光蔡節度留後甲子大風折木丁卯宰相于請依杜佑例一月三朝從之夏四月庚午朔癸酉戶部尚書李元素卒甲申鎮州行營招討使吐突承璀執昭義節度使盧從史載從史送京師丁亥河東范希朝奏破賊於木刀溝福州復置侯官長樂二縣建州置將樂縣壬申以昭義都知兵馬使潞州左司馬烏重胤為懷州刺史河陽三城懷州節度使以河陽節度使孟元陽為潞州長史昭義軍節度澤潞磁邢洺觀察使戊戌貶前昭義節度使盧從史為歡州司馬五月庚子朔乙巳昭義軍三千人夜潰奔魏州右神策軍使段祐卒庚申吐蕃使論思即熱朝貢並歸鄭叔矩路泌之柩六月庚午朔戊寅以太府卿李少和為洪州刺史江西觀察使奚回紇室韋寇振武癸巳應給食實封例節度使兼宰相每食實封百戶歲給八百端匹若是絹加給綿六百兩節度使不兼宰相每百戶給四百端匹軍使諸衛大將軍每百戶給三百五十端匹秋七月己亥朔庚子王承宗遣判官崔遂上表自首請輸常賦朝廷除授官吏丁未詔昭洗王承宗復其官爵待之如初諸道行營將士共賜物二十八萬四百三十端匹時招討非其人諸軍解體而藩鄰觀望養寇空為逗撓以弊國賦而李師道劉濟亟請昭雪乃歸罪盧從史而宥承宗不得已而行之也幽州劉濟加中書令魏博田季安加司徒淄青李師道加僕射並以罷兵加賞也乙卯幽州節度使劉濟為其子總鴆死庚申以虔州刺史馬總為安南都護本管經略使八月乙巳朔乙亥上顧謂宰臣曰神仙之事信乎李藩對曰神仙之說出於道家所宗老子五千文為本老子指歸與經無異後代好怪之流假託老子神仙之說故秦始皇遣方士載男女入海求仙漢武帝嫁女與方士求不死藥二主受惑卒無所得文皇帝服胡僧長生藥遂致暴疾不救古詩云服食求神仙多為藥所誤誠哉是言也君人者但務求理四海樂推社稷延永自然長年也上深然之以浙東觀察使薛蘋為潤州刺史浙西觀察使以常州刺史李遜為越州刺史浙東觀察使以都官郎中韋貫之為中書舍人起居舍人裴度為司封員外郎知制誥癸巳以鄧州刺史崔詠為雍州刺史本管經略使九月戊戌朔辛亥以吐突承璀復為左軍中尉諫官以承璀建謀討伐無功請行朝典上宥之降承璀為軍器使乃以內官程文幹為左軍中尉壬戌以瀛州刺史劉總起復受幽州長史充幽州盧龍軍節度使癸亥以兵部尚書高郢為右僕射致仕丙寅制以正議大夫守太常卿上柱國襄武縣開國侯賜紫金魚袋權德輿可守禮部尚書同中書門下平章事丁卯翰林學士獨孤郁守本官起居以妻父權德輿在中書避嫌也冬十月戊辰朔以京兆尹許孟容為兵部侍郎以中丞王播代孟容又以呂元膺代播升平大長公主薨庚辰宰相裴進所撰德宗實録五十卷賜錦綵三百匹銀器等史官蔣武韋處厚等頒賜有差辛巳定州將楊伯玉誘三軍為亂拘行軍司馬任迪簡別將張佐元殺伯玉迪簡謀歸朝三軍懼乃殺佐元壬辰制以迪簡檢校工部尚書定州長史充義武軍節度觀察北平軍等使甲午以前義武軍節度檢校太尉兼太子太傅同平章事張茂昭檢校太尉兼中書令河中尹充河中晉絳慈隰節度使十一月戊戌朔浙西奏當鎮舊有丹陽軍今請併為鎮海軍從之庚子右金吾衛大將軍伊慎降為右衛將軍以行賂三十萬與中尉第五從直求為河東節度故也甲辰會王纁薨庚戌以前河中節度使王鍔檢校司空兼太子太傅太原尹北都留守河東節度使以代州刺史阿跌光進為單于大都護振武麟勝節度度支營田觀察押蕃落等使庚申以中書侍郎平章事裴為兵部尚書以前保信軍節度使德州刺史薛昌朝為右武衛將軍前為王承宗虜之囚於鎮州至是歸朝故也丙寅吏部郎中柳公綽獻太醫針上深喜納遣中使撫勞之十二月丁卯朔癸酉諸道鹽鐵轉運使刑部尚書李鄘檢校吏部尚書兼揚府長史充淮南節度使以河南尹房式為宣州刺史宣歙池觀察采石軍等使以前宣歙觀察使盧坦為刑部侍郎充諸道鹽鐵轉運使壬午以吏部郎中柳公綽為御史中丞以前御史中丞呂元膺為鄂州刺史鄂黃嶽沔蘄安黃等州觀察使以鄂嶽觀察使郗士美為河南尹新授諫議大夫蔣武請改名乂以吏部侍郎崔邠為太常卿六年春正月丙寅朔丙申以彰義軍留後吳少陽檢校工部尚書充彰義軍節度申光蔡等州觀察使敕諫議大夫孟簡給事中劉伯芻工部侍郎歸登右補闕蕭俯等於豐泉寺翻譯大乘本生心地觀音經庚申以淮南節度使中書侍郎同平章事趙國公李吉甫復知政事集賢殿大學士監修國史二月丙寅朔壬申門下侍郎同平章事李藩為太子詹事藩與吉甫不叶吉甫既用事故罷藩相位丙子河中節度使檢校太尉中書令張茂昭卒以太府卿裴次元為福建觀察使己丑欣王造薨癸巳以陝虢觀察使張弘靖檢校禮部尚書河中尹晉絳慈等州節度使以右丞衛次公為陝府長史陝虢觀察使以中書舍人翰林學士李絳為戶部侍郎以京畿民貧貸常平義倉粟二十四萬石諸道州府依此賑貸三月乙未朔以河南尹郗士美檢校工部尚書兼潞府長史昭義軍節度使丁未以檢校右僕射嚴綬為江陵尹荊南節度使河東舊使錫錢民頗為弊宜於蔚州置五爐鑄錢乙卯畿內軍鎮牧放駙馬貴族略獲並不得帶兵仗恐雜盜也夏四月乙丑朔戊辰兵部尚書裴為太子賓客以諫議大夫裴堪為同州防禦使庚午以戶部侍郎判度支李夷簡檢校禮部尚書襄州大都督府長史山南東道節度使以刑部侍郎鹽鐵轉運使盧坦為戶部侍郎判度支京兆尹王播為刑部侍郎充諸道鹽鐵轉運使以福建觀察使元義方為京兆尹癸酉以張茂昭家妓四十七人歸定州己卯月近房以前荊南節度使趙宗儒為刑部尚書東都留守鄭餘慶為兵部尚書依前留守王播奏江淮河嶺已南兗鄆等鹽院元和五年都收賣鹽價錢六百九十八萬五千五百貫校量未改法已前四倍撎估虛錢一千七百四十六萬三千七百貫除鹽本外付度支收管從之辛卯戶部奏置巡官五月甲午朔取受王承宗錢物人品官王伯恭杖死庚子以左金吾衛將軍李惟簡檢校戶部尚書鳳翔尹隴右節度使丙午前山南東道節度使檢校左僕射平章事裴均卒壬子以振武節度阿跌光進夙彰誠節久立茂勳宜賜姓李氏弟洺州刺史光顏已從別敕處分六月甲子朔減教坊樂人衣糧丁卯中書門下奏官省則事省事省則人清官煩則事煩事煩則人濁清濁之由在官之煩省國家自天寶已後中原宿兵見在軍士可使者八十餘萬其餘浮為商販度為僧道雜入色役不歸農桑者又十有五六則是天下常以三分勞筋苦骨之人奉七分坐衣待食之輩今內外官給俸料者不下一萬餘員其間有職出異名奉離本局府寺曠廢簪組因循者甚衆況斂財日寡而授祿至多設官有限而入色無數九流安得不雜萬物安得不煩漢初置郡不過六十文景醲化百王莫先則官少不必政紊郡多不必事理今天下三百郡一千四百縣故有一邑之地虛設羣司一鄉之氓徒分縣職所費至廣所制全輕伏請敕吏兵部侍郎郎中給事中中書舍人各一人錯綜利病詳定廢置吏員可併省者併省之州縣可併合者併合之每年入仕者可停減者停減之此則利廣而易求官少而易理稍減冗食足寬疲氓又國家舊章依品制俸官一品月俸三十千其餘職田祿米大約不過千石自一品以下多少可知艱難已來禁網漸弛於是增置使額厚請俸錢故大曆中權臣月俸有至九千貫者列郡刺史無大小給皆千貫常衮為相始立限約至李泌又量其間劇隨事增加時謂通濟理難減削然猶有名存職廢額去俸存間劇之間厚薄頓異將為永式須立常規從之乃命給事中段平仲中書舍人韋貫之兵部侍郎許孟容戶部侍郎李絳等詳定減省甲申以御史中丞柳公綽為湖南觀察使丁亥太白近右執法戊子賜御史中丞竇易直緋魚袋秋七月癸巳朔尚書右僕射致仕高郢卒庚申贈銀青光祿大夫太子賓客裴太子少傅八月癸亥朔戶部侍郎李絳奏諸州闕官職田祿米及見任官抽一分職田請所在收貯以備水旱賑貸從之乙丑以天德軍防禦使張煦為夏州刺史夏綏銀等州節度使丁卯荊南先制永安軍宜停辛巳以常州刺史崔芃為洪州刺史江西觀察使九月癸巳朔以蜀州刺史崔能為黔中觀察使戊戌富平縣人梁悅為父復仇殺秦杲投獄請罪特敕免死決杖一百配流循州職方員外郎韓愈獻議執奏之減諸司流外總一千七百六十九人貶黔中觀察使竇羣為開州刺史以為政煩苛辰錦二州蠻叛故也冬十月以前夏州節度使李願檢校兵部尚書徐州刺史充武寧軍節度使戊辰以戶部尚書韓臯為東都留守判東都尚書省事以太子詹事李藩為華州刺史潼關防禦鎮國軍使以東都留守鄭餘慶為吏部尚書己巳詔朕於百執事羣有司方澄源流以責實效轉運重務專委使臣每道有院分督其任今陝路漕引悉歸中都而尹守職名尚仍舊貫又諸道都團練使足修武備以靖一方而別置軍額因加吏祿亦既虛設頗為浮費思去煩以循本期省事以便人其河南水陸運陝府陸運潤州鎮海軍宣州采石軍越州義勝軍洪州南昌軍福州靖海軍等使額並宜停所收使已下俸料一事已來委本道充代百姓闕額兩稅仍具數奏聞戊寅詔王者之牧黎元也愛之如子視之如傷苟或風雨不時稼穡不稔則必除煩就簡惜力重勞以圖便安以阜生業況邦畿之內百役所叢雖勤恤之令亟行而供億之制猶廣重以經夏炎暵自秋霖澍南畝虧播植之功西成失豐登之望內乏口食外牽王徭豈惟轉輸之虞慮有餒殍之患斯蓋理道猶鬱和氣未通永言於茲良所咎歎京兆府每年所配折糶粟二十五萬石宜放於百姓有粟情願折納者時估外特加優饒今春所貸義倉粟方屬歲饑容至豐熟歲送納元和五年已前諸色逋租並放百官職田其數甚廣今緣水潦諸處道路不通宜令所在貯納度支支用令百官據數于太倉請受遭水旱處通計所損便與除破不得檢覆為理之本在乎安人咨爾尹京宰邑之臣實為親人阜俗之寄必當詢其疾苦奉我詔條恤隱為心無怠於事罔或徇利以剝下吐剛而茹柔使閭井咸安惸嫠獲濟各勉忠孝宜悉朕懷丙戌以諫議大夫孔戣為皇太子諸王侍讀十一月壬辰朔癸巳新授華州刺史李藩卒乙巳以工部尚書趙昌檢校兵部尚書兼華州刺史充潼關防禦鎮國軍等使十二月癸亥朔壬申詔委宗正卿選人門嫁十六宅諸王女仍封為縣主甲申京兆尹元義方戶部侍郎判度支盧坦以違令立戟罰一月俸收奪所請門戟己丑制以朝義郎守尚書戶部侍郎驍騎尉賜紫金魚袋李絳為朝議大夫守中書侍郎同中書門下平章事閏十二月辛卯朔右衛上將軍伊慎卒辛亥皇太子寧薨諡曰惠昭廢朝三日國典無太子薨禮國子司業裴茝精禮學特賜於西內定儀
