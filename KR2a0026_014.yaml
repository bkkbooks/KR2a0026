body:
  text: 舊唐書卷十四本紀第十四順宗憲宗上順宗至德大聖大安孝皇帝諱誦德宗長子母昭德皇后王氏上元二年正月生於長安之東內大曆十四年六月封宣王建中元年正月丁卯立為皇太子貞元二十一年正月癸巳德宗崩丙申即位於太極殿上自二十年九月風病不能言暨德宗不豫諸王親戚皆侍醫藥獨上臥病不能侍德宗彌留思見太子涕咽久之大行發喪人情震懼上力疾衰服見百僚於九仙門既即位知社稷有奉中外始安庚子羣臣上書請聽政二月辛丑朔甲申以河陽三城行軍司馬元韶為懷州刺史河陽懷州節度使丙午罷翰林醫工相工占星射覆冗食者四十二人己酉以易定張茂昭兼同平章事以來朝故寵之是夜太白犯昴辛卯以吏部郎中韋執誼為尚書左丞同中書門下平章事辛酉貶京兆尹李實通州長史尋卒壬子淄青李師古以兵寇滑之東鄙聞國喪也甲寅釋仗內囚嚴懷志呂溫等一十六人平涼之盟陷蕃久之得還以習蕃中事不欲令出外故囚之仗內至是方釋之日本國王並妻還蕃賜物遣之壬寅以太子侍書翰林待詔王伾為左散騎常侍充翰林學士以前司功參軍翰林待詔王叔文為起居舍人充翰林學士以鴻臚卿王權為京兆尹甲子御丹鳳樓大赦天下諸道除正敕率稅外諸色榷稅並宜禁斷除上供外不得別有進奉百姓九十已上賜米二石絹兩匹版授上佐縣君仍令本部長吏就家存問百歲已上賜米五石絹二匹綿一屯羊酒版授下州刺史郡君戊辰以開府儀同三司檢校太尉使持節大都督雞林州諸軍事雞林州刺史上柱國新羅王金重熙兼寧海軍使以重熙母和氏為太妃妻朴氏為妃三月庚午出宮女三百人于安國寺又出掖庭教坊女樂六百人于九仙門召其親族歸之戊寅以韋臯兼檢校太尉李師古劉濟兼檢校司空張茂昭司徒丙戌檢校司空同平章事杜佑為度支鹽鐵使戊子徐州節度賜名武寧軍蔡州吳少誠兼同平章事以翰林學士王叔文為度支鹽鐵轉運使副杜佑雖領使名其實叔文專總宰相賈耽兼檢校司空鄭瑜吏部尚書高郢刑部尚書韋執誼中書侍郎鎮冀王士真淮南王鍔魏博田季安皆檢校司空癸巳詔冊廣陵郡王淳為皇太子改名純夏四月壬寅制第十弟諤封欽王第十一弟諴封珍王男建康郡王渙封郯王改名經洋川郡王沔封均王改名緯臨淮郡王洵封漵王改名縱弘農王浼封莒王改名紓漢東郡王泳封密王改名綢晉陵郡王湜封郇王改名總高平郡王漵封邵王改名約雲安郡王滋封宋王改名結宣城郡王淮封集王改名緗德陽郡王湑封冀王改名絿河東郡王浥封和王改名綺十七男絢封衡王十九男纁封會王二十男綰封福王二十一男紘封撫王二十三男緄封嶽王二十四男紳封袁王二十五男綸封桂王二十七男繟封翼王彌臣國嗣王道勿禮封彌臣國王西平郡王晟男左羽林大將軍願襲封岐公食邑三千戶戊申詔以冊太子禮畢赦京城繫囚大辟降從流流以下減一等以給事中陸質中書舍人崔樞並為太子侍讀庚戌封太子男寧寬宥察寰寮等六人為郡王並食邑三千戶癸丑贈入吐蕃使工部侍郎兼御史大夫張薦禮部尚書丙寅罷萬安監牧戊辰以杭州刺史韓臯為尚書右丞五月己巳以右金吾衛大將軍范希朝為右神策統軍充左右神策京西諸城鎮行營兵馬節度使丁丑以雍管經略使韋丹為河南少尹以萬年縣令房啓為容管經略招討使癸未以郴州司馬鄭餘慶為尚書左丞甲辰以檢校司空忽汗州都督渤海國王大嵩璘檢校司徒承徽王氏趙氏可昭儀崔氏楊氏可充儀王氏可昭媛王氏可昭容牛氏可修儀張氏可美人以右丞韓臯為鄂嶽沔蘄都團練觀察使丁亥升襄州為大都督府臨漢縣仍徙于鄧城辛卯以鹽鐵轉運使副王叔文為戶部侍郎六月丙申詔二十一年十月已前百姓所缺諸色課利租賦錢帛共五十二萬六千八百四十一貫石匹束並宜除免七月戊辰朔吐蕃使論悉諾來朝貢丙子鄆州李師古加檢校侍中贈故忠州別駕陸贄兵部尚書諡曰宣贈故道州刺史陽城為左散騎常侍戊寅以戶部侍郎潘孟陽為度支鹽鐵轉運使副丙戌關東蝗食田稼癸巳橫海軍節度使滄州刺史程懷信卒以其子副使執恭起復滄州刺史橫海軍節度使甲午度支使杜佑奏太倉見米八十萬石貯來十五年東渭橋米四十五萬石支諸軍皆不悅今歲豐阜請權停北河轉運於濱河州府和糴二百萬石以救農傷之弊乃下百僚議議者同異不決而止乙未詔朕承九聖之烈荷萬邦之重顧以寡德涉道未明虔恭寅畏懼不克荷恐上墜祖宗之訓下貽卿士之憂夙夜祗勤如臨淵谷而積疾未復至于經時怡神保和常所不暇永惟四方之大萬務之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用警于朕心以答天戒其軍國政事宜令皇太子勾當時上久疾不復延納宰臣共論大政事無巨細皆決于李忠言王伾王叔文物論喧雜以為不可藩鎮屢上箋於皇太子指三豎之撓政故有是詔以太常卿杜黃裳為門下侍郎左金吾衛大將軍袁滋為中書侍郎並同中書門下平章事鄭珣瑜為吏部尚書高郢刑部尚書並罷知政事皇太子見百僚於朝堂丙申皇太子於麟德殿西亭見奏事官八月丁酉朔庚子詔惟皇天佑命烈祖誕受方國九聖儲祉萬邦咸休肆豫一人獲纘丕業嚴恭守位不遑暇逸而天佑不降疾恙無瘳將何以奉宗廟之靈展郊禋之禮疇咨庶尹對越上玄內愧于朕心上畏于天命夙夜祗栗深惟永圖一日萬機不可以久曠天工人代不可以久違皇太子純睿哲溫文寬和仁惠孝友之德愛敬之誠通乎神明格于上下是用法皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宮制稱誥辛丑誥有天下傳歸於子前王之制也欽若大典斯為至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代豫守邦爰以令辰光膺冊禮宜以今月九日冊皇帝於宣政殿國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年自貞元二十一年八月五日已前天下死罪降從流流以下遞減一等誥立良娣王氏為太上皇后良媛董氏為太上皇德妃壬寅貶右散騎常侍王伾為開州司馬前戶部侍郎度支鹽鐵轉運使王叔文為渝州司戶元和元年正月丙寅朔皇帝率百僚上太上皇尊號曰應乾聖壽甲申太上皇崩於興慶宮之咸寧殿享年四十六歲六月乙卯皇帝率羣臣上大行太上皇諡曰至德大聖大安孝皇帝廟號順宗秋七月壬申葬于豐陵史臣韓愈曰順宗之為太子也留心藝術善隸書德宗工為詩每賜大臣方鎮詩制必命書之性寬仁有斷禮重師傅必先致拜從幸奉天賊泚逼迫常身先禁旅乘城拒戰督勵將士無不奮激德宗在位歲久稍不假權宰相左右幸臣如裴延齡李齊運韋渠牟等因間用事刻下取功而排陷陸贄張滂輩人不敢言太子從容論爭故卒不任延齡渠牟為相嘗侍宴魚藻宮張水嬉綵艦雕靡宮人引舟為櫂歌絲竹間發德宗歡甚太子引詩人好樂無荒為對每於敷奏未嘗以顏色假借宦官居儲位二十年天下陰受其賜惜乎寢疾踐祚近習弄權而能傳政元良克昌運祚賢哉憲宗上憲宗聖神章武孝皇帝諱純順宗長子也母曰莊憲王太后大曆十三年二月生于長安之東內六七歲時德宗抱置膝上問曰汝誰子在吾懷對曰是第三天子德宗異而憐之貞元四年六月封廣陵王順宗即位之年四月冊為皇太子七月乙未權勾當軍國政事八月丁酉朔受內禪乙巳即皇帝位於宣政殿先是連月霖雨上即位之日晴霽人情欣悅丙午升平公主進女口十五人上曰太上皇不受獻朕何敢違其還郭氏丁未始御紫宸對百僚己酉以道州刺史路恕為雍管經略使庚戌荊南獻龜二詔曰朕以寡昧纂承丕業永思理本所寶惟賢至如嘉禾神芝奇禽異獸蓋王化之虛美也所以光武形於詔令春秋不書祥瑞朕誠薄德思及前人自今已後所有祥瑞但令准式申報有司不得上聞其奇禽異獸亦宜停進癸丑劍南西川節度使檢校太尉中書令南康郡王韋臯薨甲寅以常州刺史穆贊為宣歙池觀察使以前宣歙觀察使崔衍為工部尚書己未以中書侍郎平章事袁滋為劍南東西兩川山南西道安撫大使時韋臯卒劉闢據蜀邀節鉞故也辛酉太上皇誥冊良娣王氏為太上皇后癸亥以朝請大夫守尚書左丞輕車都尉賜紫金魚袋鄭餘慶同中書門下平章事丙寅以饒州刺史李吉甫為考功郎中䕫州刺史唐次為吏部郎中並知制誥九月丁卯朔己巳罷教坊樂人授正員官之制辛未河陽三城節度使元韶卒癸酉以陳州刺史孟元陽為懷州刺史河陽三城孟懷節度使丙子敕申光蔡陳許兩道比遭亢旱宜加賑恤申光蔡賑米十萬石陳許五萬石丁丑前戶部侍郎蔡辨卒襄州于進鷹詔還之己卯京西神策行營節度行軍司馬韓泰貶撫州刺史司封郎中韓曄貶池州刺史禮部員外郎柳宗元貶邵州刺史屯田員外郎劉禹錫貶連州刺史坐交王叔文也辛巳給事中陸質卒冬十月丙申朔丁酉集百僚發曾太皇太后沈氏哀於肅章門外檢校司空兼右僕射同中書門下平章事魏國公賈耽卒戊戌以宰臣劍南安撫使袁滋檢校吏部尚書同中書門下平章事成都尹劍南西川節度觀察等使以西川行軍司馬劉闢為給事中舒王誼薨庚子南詔使趙迦寬來赴山陵浙東觀察使賈全卒辛丑吐蕃使論乞縷貢助山陵金銀衣服太常上大行曾太皇太后沈氏諡曰睿真皇后丙午以華州刺史楊於陵為越州刺史浙東觀察使丁未改桂州純化縣為慕化縣蒙州純義縣為正義縣己酉葬德宗皇帝于崇陵甲寅以刑部尚書高郢為華州刺史潼關防禦鎮國軍使御史中丞李鄘為京兆尹貶京兆尹王權為雅王傅久雨京師鹽貴出庫鹽二萬石糶以惠民乙巳祔睿真皇后神主德宗皇帝神主于太廟壬申貶正議大夫中書侍郎平章事韋執誼為崖州司馬以交王叔文也潤池揚楚湖杭睦江等州旱貶劍南西川節度使袁滋為吉州刺史以其慰撫三川逗留不進故也以左驍衛將軍李演為夏州刺史夏綏銀等州節度使以右庶子武元衡為御史中丞己卯再貶撫州刺史韓泰為虔州司馬河中少尹陳諫台州司馬邵州刺史柳宗元為永州司馬連州刺史劉禹錫朗州司馬池州刺史韓曄饒州司馬和州刺史凌準連州司馬嶽州刺史程异郴州司馬皆坐交王叔文初貶刺史物議罪之故再加貶竄辛巳宣撫和郴郢袁衢七州旱壬午吏部尚書鄭珣瑜卒甲申以湖南觀察使楊憑為洪州刺史江西觀察使以虢州刺史薛蘋為潭州刺史湖南觀察使鄂嶽婺衡等州旱癸巳宣歙觀察使穆贊卒十二月丙申朔庚子以東都留守韋夏卿為太子少保以兵部尚書王紹為東都留守壬寅改淳州為巒州還淳縣為清溪縣淳風縣為從化縣姓淳于者改姓于甲辰襄陽于加平章事丙申月犯畢己酉以新除給事中西川行軍司馬劉闢為成都尹劍南西川節度使歲星犯太微西垣庚戌金州復析漢陰縣置石泉縣壬子以右諫議大夫韋丹為梓州刺史充劍南東川節度使以常州刺史路應為宣州刺史宣歙池觀察使壬戌以朝請大夫守中書舍人翰林學士上柱國鄭絪為中書侍郎同平章事集賢殿學士以考功郎中知制誥李吉甫為中書舍人以考功員外郎裴為考功郎中知制誥並充翰林學士元和元年春正月丙寅朔皇帝率羣臣於興慶宮奉上太上皇尊號曰應乾聖壽太上皇丁卯御含元殿受朝賀禮畢御丹鳳樓大赦天下改元曰元和自正月二日昧爽已前大