body:
  text: 舊唐書卷一百三十六列傳第八十六竇參從子申附齊映劉滋從兄贊附盧邁崔損齊抗竇參字時中工部尚書誕之玄孫父審言聞喜尉以參貴贈吏部尚書參習法令通政術性矜嚴強直而果斷少以門蔭纍官至萬年尉時同僚有直官曹者將夕聞親疾請參代之會獄囚亡走京兆尹按直簿將奏參遽請曰彼以不及狀謁參實代之宜當罪坐貶江夏尉人多義之纍遷奉先尉縣人曹芬名隸北軍芬素凶暴因醉毆其女弟其父救之不得遂投井死參捕理芬兄弟當死衆官皆請俟免喪參曰子因父生父由子死若以喪延罪是殺父不坐也皆正其罪而杖殺之一縣畏伏轉大理司直按獄江淮次揚州節度使陳少游驕蹇不郊迎令軍吏傳問參正辭讓之少游悔懼促詣參參不俟濟江還奏合旨時婺州刺史鄧珽坐贓八千貫珽與執政有舊以會赦欲免贓詔百僚於尚書省雜議多希執政意參獨堅執正之於法竟徵贓明年除監察御史奉使按湖南判官馬彝獄時彝舉屬令贓罪至千貫為得罪者之子因權幸誣奏彝參竟白彝無罪彝實能吏後纍佐曹王臯以正直強幹聞參轉殿中侍御史改金部員外郎刑部郎中侍御史知雜事無幾遷御史中丞不避權貴理獄以嚴稱數蒙召見論天下事又與執政多異同上深器之或參決大政時宰頗忌之多所排抑亦無以傷參然多率情壞法初定百官俸料以嘗為司直黨其官故給俸多於本寺丞又定百官班秩初令太常少卿在左右庶子之上又惡詹事李遂移詹事班退居諸府尹之下甚為有識所嗤尋兼戶部侍郎時京師人家豕生兩首四足有司欲奏參曰此為豕禍安可上聞命棄之是時郊牛生犢有六足者太僕卿周皓白宰相請奏李泌亦戲答以遣之故淮南節度使陳少游子正儀請襲封參大署尚書省門曰陳少游位兼將相之崇節變艱危之際君上含垢未能發明愚子何心輒求傳襲正儀懼不敢求封而去時神策將軍孟華有戰功為大將軍所誣奏稱華謀反有右龍武將軍李建玉前陷吐蕃久之自拔為部曲誣告潛通吐蕃皆當死無以自白參悉理出之由是人皆屬望明年拜中書侍郎同平章事領度支鹽鐵轉運使每宰相間日於延英召對諸相皆出參必居後久之以度支為辭實專大政參無學術但多引用親黨使居要職以為耳目四方藩帥皆畏懼之李納既憚參饋遺畢至外示敬參實陰間之上所親信多非毀參竇申又與吳通玄通犯事覺參任情好惡恃權貪利不知紀極終以此敗貶參郴州別駕貞元八年四月也參至郴州汴州節度使劉士寧遺參絹五千匹湖南觀察使李巽與參有隙遂具以聞又中使逢士寧使於路亦奏其事德宗大怒欲殺參宰相陸贄曰竇參與臣無分因事報怨人之常情然臣參宰衡合存公體以參罪犯置之於死恐用刑太過於是且止尋又遣中使謂贄等曰卿等所奏於大體雖好然此人交結中外其意難測朕尋情狀其事灼然又竇參在彼與諸戎帥交通社稷事重卿等速進文書處分贄奏曰臣面承德音幸奉密旨皆以社稷為言又知根尋已審敢不上同憂憤內絶狐疑豈願遲回更貽念慮但以參常經重任斯謂大臣進退之間猶宜有禮誅戮之際不可無名劉晏久掌貨財當時亦招怨讟及加罪責事不分明叛者既得以為辭衆人亦為之懷愍用刑曖昧損纍不輕事例未遙所宜重慎竇參頃司鈞軸頗怙恩私貪受貨財引縱親黨此則朝廷同議天下共傳至於潛懷異圖將起大惡迹既未露人皆莫知臣等親奉天顏議加刑辟但聞凶險之意尚昧結構之由況在衆流何由備悉忽行峻罰必謂冤誣羣情震驚事亦非細若不付外推鞫則恐難定罪名乞留睿聰更少詳度竇參於臣素亦無分陛下固已明知有何顧懷輒欲營救良以事關國體義絶私嫌所冀典刑不濫於清時君道免虧於聖德乃再貶為歡州司馬男景伯配泉州女尼真如隸郴州其財物婢妾傳送京師參時為左右中官深怒謗沮不已未至歡州賜死於雍州武經鎮時年六十竇申者參之族子纍遷至京兆少尹轉給事中參特愛之每議除授多訪於申申或泄之以招權受賂申所至人目之為喜鵲德宗頗聞其事數誡參曰卿他日必為申所纍不如出之以掩物議參曰臣無強子姪申雖疏屬臣素親之不忍遠出請保無他犯帝曰卿雖自保如衆人何參固如前對申亦不悛兵部侍郎陸贄與參有隙吳通微弟兄與贄同在翰林俱承德宗顧遇亦爭寵不協金吾大將軍嗣虢王則之與申及通微通玄善遂相與傾贄考貢舉言贄考貢不實吳通玄取宗室女為外婦德宗知其毀贄且令察視具得其奸狀乃貶則之為昭州司馬吳通玄為泉州司馬竇申為道州司馬不旬日貶參郴州別駕即日以陸贄為宰相明年竇參再貶歡州德宗謂陸贄曰竇申竇榮李則之首末同惡無所不至又並細微不比竇參便宜商量處置所有親密並發遣於遠惡處贄奏曰竇參罪犯誠合誅夷聖德含弘務全事體特寬嚴憲俯貸餘生始終之恩實足感於庶品仁煦之惠不獨幸於斯人所議貶官謹具別狀其竇申竇榮李則之等既皆同惡固亦難容然以得罪相因法有首從首當居重從合從輕參既蒙恩矜全申等亦宜減降又於黨與之內亦有淑慝之殊稍示區分足彰沮勸竇榮與參雖非近屬亦甚相親然於款密之中都無邪僻之事仍聞激憤屢有直言因此漸搆猜嫌晚年頗見疏忌若論今者陰事則尚未究端由如據比來所行應不至凶險恐須差異以表詳明臣等商量竇榮更貶遠官竇申則之並除名配流庶允從輕之典以洽好生之恩夫趨勢附權時俗常態苟無高節出衆何能特立不羣竇參久塵鈞衡特承寵渥君之所任孰敢不從或游於門庭或序以中表或偏被接引或驟與薦延如此之徒十常八九若聽流議皆謂黨私自非甚與交親安可悉從貶纍況竇參罷黜殆欲周星應是私黨近親當時並已連坐人心久定不可復搖臣等商量除與竇參陰謀邪事外一切不問詔從之由是申等得配流嶺南既賜參死乃杖殺申諸竇皆貶榮得免死齊映瀛州高陽人父圮試太常少卿兼檢校工部郎中映登進士第應博學宏辭授河南府參軍滑亳節度使令狐彰辟為掌書記纍授監察御史彰疾甚映草遺表因與謀後事映說彰令上表請代令子建歸京師彰皆從之因妻以女彰卒後兵亂映脫身歸東都河陽三城使馬燧辟為判官奏殿中侍御史建中初盧嵵為宰相薦之遷刑部員外郎會張鎰出鎮鳳翔奏為判官映口辨頗更軍事數以論奏合旨尋轉行軍司馬兼御史中丞德宗在奉天鳳翔逼於賊泚鎰懦緩不曉兵家事部將有李楚琳者慓悍凶暴軍中畏之乘間將謀亂先數日映與同列齊抗覺其謀乃言於鎰請早圖之鎰不從映言乃示其寬大召楚琳語之曰欲令公使於外楚琳恐是夜作亂乃殺鎰以應泚軍中多為映指道故得免因赴奉天行在除御史中丞興元初從幸梁州每過險映常執轡會御馬遽駭奔跳頗甚帝懼傷映令捨轡映堅執久之乃止帝問其故曰馬奔蹶不過傷臣如捨之或犯清塵雖臣萬死何以塞責上嘉奬無已在梁州拜給事中映白長大言音高朗上自山南還京常令映侍左右或令前馬至城邑州鎮俾映宣詔令帝益親信之其年冬轉中書舍人貞元二年以本官與左散騎常侍劉滋給事中崔造同拜平章事滋以端默雅重寡言映謙和美言悅下無所是非政事多決於造無幾造疾病映當國政乘間亦敢言事時吐蕃數入寇人情搖動且言帝欲行幸避狄映奏曰戎狄亂華臣之罪也今人情恟懼謂陛下理裝具糗糧臣聞大福不再奈何不與臣等熟計之因俯伏流涕上亦為之感動時給事中袁高忤旨映連請為左丞御史大夫映於東都舉進士及宏詞時張延賞為河南尹東都留守厚映及映為相延賞罷相為左僕射數畫時事令映行之及為所親求官映多不應延賞怒言映非宰相器三年正月貶映夔州刺史又轉衡州七年授御史中丞桂管觀察使又改洪州刺史江西觀察使映常以頃為相輔無大過而罷冀其復入用乃掊斂貢奉及大為金銀器以希旨先是銀瓶高者五尺餘李兼為江西觀察使乃進六尺者至是因帝誕日端午映為瓶高八尺者以獻貞元十一年七月卒時年四十八贈禮部尚書劉滋字公茂左散騎常侍子玄之孫父貺開元初為左拾遺父子仍代為史官貺依劉向說苑撰續說苑一十卷以獻玄宗嘉之滋少以門蔭調授太子正字歷漣水令吏部侍郎楊綰薦滋堪為諫官拜左補闕改太常卿復為左補闕辭官侍親還東都河南尹李廙署奏功曹參軍無幾丁母喪服除遷屯田員外郎轉司勳員外郎判南曹勤於吏職孜孜奉法遷司勳郎中纍拜給事中從幸奉天轉太常少卿掌禮儀興元元年改吏部侍郎往洪州知選事時京師寇盜之後天下蝗旱穀價翔貴選人不能赴調乃命滋江南典選以便江嶺之人時稱舉職貞元二年遷左散騎常侍同中書門下平章事在相位無所啓奏但多謙退廉謹畏慎而已三年正月守本官罷知政事四年復為吏部侍郎六年遷吏部尚書竇參以宰相為吏部尚書換刑部尚書無何御史臺劾奏滋前在吏部選人渝濫詔奪金紫階滋有經學善持論性廉潔刻苦嫉惡掌選多所發擲更代詐僞者尤畏之十年十月卒時年六十六贈陝州大都督滋從兄贊大曆中左散騎常侍彙之子少以資蔭補吏纍授鄠縣丞宰相杜鴻漸自劍南還朝途出於鄠贊儲供精辦鴻漸判官楊炎以贊名儒之子薦之纍授侍御史浙江觀察判官楊炎作相擢為歙州刺史以勤幹聞有老婦人捃拾榛藂間猛獸將噬之幼女號呼搏獸而救之母子俱免宣歙觀察使韓滉表其異行加金紫之服再遷常州刺史韓滉入相分舊所統為三道以贊為宣州刺史兼御史中丞宣歙池都團練觀察使贊在宣州十餘年贊祖子玄開元朝一代名儒父彙博涉經史唯贊不知書但以強猛立威官吏畏之重足一迹宣為天下沃饒贊久為廉察厚斂殖貨務貢奉以希恩子弟皆虧庭訓雖童年稚齒便能侮易驕人人士鄙之貞元十二年卒時年七十贈吏部尚書盧邁字子玄范陽人少以孝友謹厚稱深為叔舅崔祐甫所親重兩經及第歷太子正字藍田尉以書判拔萃授河南主簿充集賢校理朝臣薦其文行遷右補闕侍御史刑部吏部員外郎邁以叔父兄弟姊妹悉在江介屬蝗蟲歲饑懇求江南上佐由是授滁州刺史入為司門郎中遷右諫議大夫纍上表言時政得失轉給事中屬校定考課邁固讓以授官日近未有政績不敢當上考時人重之遷尚書右丞將作監元亘當攝太尉享昭德皇后廟以私忌日不受誓誡為御史劾奏詔尚書省與禮官法官集議邁奏狀曰臣按禮記大夫士將祭於公既視濯而父母死猶奉祭又按唐禮散齊有大功之喪致齊有周親喪齊中疾病即還家不奉祭事皆無忌日不受誓誡之文雖假寧令忌日給假一日春秋之義不以家事辭王事今亘以假寧常式而違攝祭新命酌其輕重誓誡則祀事之嚴校其禮式忌日乃尋常之制詳求典據事緣薦獻不宜以忌日為辭由是亘坐罰俸邁九年以本官同中書門下平章事歲餘遷中書侍郎時大政決在陸贄趙憬邁謹身中立守文奉法而已而友愛恭儉邁從父弟㪺為劍南西川判官卒於成都歸葬於洛陽路由京師邁奏請至城東哭於其柩許之近代宰臣多自以為崇重三服之親或不過從而弔臨而邁獨振薄俗請臨弟喪士君子是之十二年九月邁於政事堂中風肩輿而歸上表請罷官不許詔宰臣就第問疾自是凡五上表堅乞骸骨詔曰卿操履貞方器識淹茂自居台輔益見忠清方藉謀猷遽嬰疾疹歲月滋久章表屢聞陳請再三撝謙難奪且備養賢之禮宜遂優間之秩告免之誠雖為懇至俯從來奏良用憮然乃除太子賓客貞元十四年卒時年六十贈太子太傅賻以布帛邁再娶無子以從父弟子紀為嗣崔損字至無博陵人高祖行功已後名位卑替損大曆末進士擢第登博學宏詞科授祕書省校書郎再授咸陽尉外舅王翃為京兆尹改大理評事纍遷兵部郎中貞元十一年遷右諫議大夫會門下侍郎平章事趙憬卒中書侍郎平章事盧邁風病請告戶部尚書裴延齡素與損善乃薦之於德宗十二年以本官同中書門下平章事與給事中趙宗儒同日知政事並賜金紫初二相有故旬日中外顒望名德損比無聲實及制下之日中外失望性齷齪謹慎每延英論事未嘗有言十四年秋轉門下侍郎平章事是歲以昭陵舊宮為野火所焚所司請修奉昭陵舊宮在山上置來歲久曾經野火燒摧毀略盡其宮尋移在瑤臺寺左側今屬通年欲議修置緣供水稍遠百姓勞弊今欲於見住行宮處修創冀久遠便人又為移改舊制恐禮意未周宜令宰臣百僚集議議者多云舊宮既焚宜移就山下上意不欲遷移只於山上重造命損為八陵修奉使於是獻昭乾定泰五陵造屋五百七十間橋陵一百四十間元陵三十間唯建陵仍舊但修葺而已所緣陵寢中牀蓐帷幄一事以上帝親自閲視然後授損送於陵所損以久疾在家賜絹二百匹以為醫藥南北兩省清要損皆歷踐之在位無稱於人者身居宰相母野殯不言展墓不議遷祔姊為尼歿於近寺終喪不臨士君子罪之加以過為恭遜接見便僻不止於容身而已自建中以後宰相罕有久在位者數歲罪黜損用此中上意竊大任者八年上亦知物議鄙其持祿取容然憐而厚之貞元十九年卒贈太子太傅賻布帛五百端米粟四百石齊抗字遐舉天寶中平陽太守浣之孫父翺一命卑官卒以抗貴纍贈國子祭酒抗少隱會稽剡中讀書為文長於箋奏大曆中壽州刺史張鎰辟為判官明間吏事敏於文學鎰甚重之建中初鎰為江西觀察使抗亦隨在幕府三年鎰自中書侍郎平章事出鎮鳳翔奏抗為監察御史仍為賓佐幕中籌畫多出於抗德宗在奉天鎰為李楚琳所害抗奔赴行在拜侍御史旬日改戶部員外郎宰相蕭復為江淮宣慰使以抗為判官德宗還京大盜之後天下旱蝗國用盡竭鹽鐵轉運使元琇以抗有才用奏授倉部郎中條理江淮鹽務貞元初為水陸運副使督江淮漕運以給京師遷諫議大夫歷處州刺史轉潭州刺史湖南都團練觀察使入為給事中又為河南尹歷祕書監太常卿代鄭餘慶為中書侍郎同中書門下平章事先時每年吏部選人試判別奏官考覆第其上下既考中書門下復奏擇官覆定寖以為例抗乃奏曰吏部尚書侍郎已是朝廷精選不宜別差考官重覆其年他官考判訖俾吏部侍郎自覆一歲遂除考判官蓋抗所論奏也故事禮部侍郎掌貢舉其親故即試於考功謂之別頭舉人抗亦奏罷之尋奏省諸州府別駕田曹司田官及判司之雙曹者復省中書省驅使官及諸胥吏尋加修國史抗雖讀書無遠智大略凡為官必求至精末乃滋彰物論薄其隘刻遇疾上表請罷改太子賓客竟不任朝謝貞元二十年卒時年六十五贈戶部尚書又賜其家絹二百匹史臣曰竇參朋黨不顧君上之誡斯為悖矣齊映曲貢希用甚謬而愛君蒞事往往有長者之言滋邁家行修謹臨事可稱器雖齷齪無廢為君子矣而損抗之比夫何足云遽汙台槐蓋時主之容易耳贊曰物之同器貴於弘通竇阿齊佞偏詖斯同滋邁之行可以飾躬康濟蒸民胡為厥中
