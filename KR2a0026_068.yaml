body:
  text: 舊唐書卷六十四列傳第十四高祖二十二子隱太子建成衛王玄霸巢王元吉楚王智雲荊王元景漢王元昌酆王元亨周王元方徐王元禮韓王元嘉彭王元則鄭王元懿霍王元軌虢王鳳道王元慶鄧王元裕舒王元名魯王靈夔江王元祥密王元曉滕王元嬰高祖二十二男太穆皇后生隱太子建成及太宗衛王玄霸巢王元吉萬貴妃生楚王智雲尹德妃生酆王元亨莫嬪生荊王元景孫嬪生漢王元昌宇文昭儀生韓王元嘉魯王靈夔崔嬪生鄧王元裕楊嬪生江王元祥小楊嬪生舒王元名郭婕妤生徐王元禮劉婕妤生道王元慶楊美人生虢王鳳張美人生霍王元軌張寶林生鄭王元懿柳寶林生滕王元嬰王才人生彭王元則魯才人生密王元曉張氏生周王元方隱太子建成高祖長子也大業末高祖捕賊汾晉建成攜家屬寄於河東義旗初建遣使密召之建成與巢王元吉間行赴太原建成至高祖大喜拜左領軍大都督封隴西郡公引兵略西河郡從平長安義寧元年冬隋恭帝拜唐國世子開府置僚屬二年授撫軍大將軍東討元帥將兵十萬徇洛陽及還恭帝授尚書令武德元年立為皇太子二年司竹羣盜祝山海有衆一千自稱護鄉公詔建成率將軍桑顯和進擊山海平之時涼州人安興貴殺賊帥李軌以衆來降令建成往原州應接之時甚暑而馳獵無度士卒不堪其勞逃者過半高祖憂其不間政術每令習時事自非軍國大務悉委決之又遣禮部尚書李綱民部尚書鄭善果俱為宮官與參謀議四年稽胡酋帥劉仚成擁部落數萬人為邊害又詔建成率師討之軍次鄜州與仚成軍遇擊大破之斬首數百級虜獲千餘人建成設詐放其渠帥數十人並授官爵令還本所招慰羣胡仚成與胡中大帥亦請降建成以胡兵尚衆恐有變將盡殺之乃揚言增置州縣須有城邑悉課羣胡執板築之具會築城所陰勒兵士皆執之仚成聞有變奔於梁師都竟誅降胡六千餘人時太宗功業日盛高祖私許立為太子建成密知之乃與齊王元吉潛謀作亂及劉黑闥重反王圭魏徵謂建成曰殿下但以地居嫡長爰踐元良功績既無可稱仁聲又未遐布而秦王勳業克隆威震四海人心所向殿下何以自安今黑闥率破亡之餘衆不盈萬加以糧運限絶瘡痍未瘳若大軍一臨可不戰而擒也願請討之且以立功深自封植因結山東英俊建成從其計遂請討劉黑闥擒之而旋時高祖晚生諸王諸母擅寵椒房親戚並分事宮府競求恩惠太宗每總戎律惟以撫接才賢為務至於參請妃媛素所不行初平洛陽高祖遣貴妃等馳往東都選閲宮人及府庫珍物因私有求索兼為親族請官太宗以財簿先已封奏官爵皆酬有功並不允許因此銜恨彌切時太宗為陝東道行臺詔於管內得專處分淮安王神通有功太宗乃給田數十頃後婕妤張氏之父令婕妤私奏以乞其地高祖手詔賜焉神通以教給在前遂不肯與婕妤矯奏曰敕賜妾父地秦王奪之以與神通高祖大怒攘袂責太宗曰我詔敕不行爾之教命州縣即受他日高祖呼太宗小名謂裴寂等此兒典兵既久在外專制為讀書漢所教非復我昔日子也又德妃之父尹阿鼠所為橫恣秦王府屬杜如晦行經其門阿鼠家僮數人牽如晦墜馬毆擊之罵云汝是何人敢經我門而不下馬阿鼠或慮上聞乃令德妃奏言秦王左右凶暴凌轢妾父高祖又怒謂太宗曰爾之左右欺我妃嬪之家一至於此況凡人百姓乎太宗深自辨明卒不被納妃嬪等因奏言至尊萬歲後秦王得志母子定無孑遺因悲泣哽咽又云東宮慈厚必能養育妾母子高祖惻愴久之自是於太宗恩禮漸薄廢立之心亦以此定建成元吉轉蒙恩寵自武德初高祖令太宗居西宮之承乾殿元吉居武德殿後院與上臺東宮晝夜並通更無限隔皇太子及二王出入上臺皆乘馬攜弓刀雜用之物相遇則如家人之禮由是皇太子令及秦齊二王教與詔敕並行百姓惶惑莫知準的建成元吉又外結小人內連嬖幸高祖所寵張婕妤尹德妃皆與之淫亂復與諸公主及六宮親戚驕恣縱橫并兼田宅侵奪犬馬同惡相濟掩蔽聰明苟行己志惟以甘言諛辭承候顏色建成乃私召四方驍勇并募長安惡少年二千餘人畜為宮甲分屯左右長林門號為長林兵及高祖幸仁智宮留建成居守建成先令慶州總管楊文幹募健兒送京師欲以為變又遣郎將爾朱煥校尉橋公山齎甲以賜文幹令起兵共相應接公山煥等行至豳鄉懼罪馳告其事高祖託以他事手詔追建成詣行在所既至高祖大怒建成叩頭謝罪奮身自投於地幾至於絶其夜置之幕中令殿中監陳萬福防禦而文幹遂舉兵反高祖馳使召太宗以謀之太宗曰文幹小豎狂悖起兵州府官司已應擒剿縱其假息時刻但須遣一將耳高祖曰文幹事連建成恐應之者衆汝宜自行還立汝為太子吾不能效隋文帝誅殺骨肉廢建成封作蜀王地既僻小易制若不能事汝亦易取耳太宗既行元吉及四妃更為建成內請封倫又外為遊說高祖意便頓改遂寢不行復令建成還京居守惟責以兄弟不能相容歸罪於中允王圭左衛率韋挺及天策兵曹杜淹等並流之巂州後又與元吉謀行鴆毒引太宗入宮夜宴既而太宗心中暴痛吐血數升淮安王神通狼狽扶還西宮高祖幸第問疾因敕建成秦王素不能飲更勿夜聚乃謂太宗曰發跡晉陽本是汝計克平宇內是汝大功欲升儲位汝固讓不受以成汝美志建成自居東宮多歷年所今復不忍奪之觀汝兄弟終是不和同在京邑必有忿競汝還行臺居於洛陽自陝已東悉宜主之仍令汝建天子旌旗如梁孝王故事太宗泣而奏曰今日之授實非所願不能遠離膝下言訖嗚咽悲不自勝高祖曰昔陸賈漢臣尚有遞過之事況吾四方之主天下為家東西兩宮塗路咫尺憶汝即往無勞悲也及將行建成元吉相與謀曰秦王今往洛陽既得土地甲兵必為後患留在京師制之一匹夫耳密令數人上封事曰秦王左右多是東人聞往洛陽非常欣躍觀其情狀自今一去不作來意高祖於是遂停是後日夜陰與元吉連結後宮譖訴愈切高祖惑之太宗懼不知所為李靖李績等數言大王以功高被疑靖等請申犬馬之力封倫亦潛勸太宗圖之並不許倫反言於高祖曰秦王恃有大勳不服居太子之下若不立之願早為之所又說建成作亂曰夫為四海者不顧其親漢高乞羹此之謂矣九年突厥犯邊詔元吉率師拒之元吉因兵集將與建成克寸期舉事長孫無忌房玄齡杜如晦尉遲敬德侯君集等日夜固爭曰事急矣若不行權道社稷必危周公聖人豈無情於骨肉為存社稷大義滅親今大王臨機不斷坐受屠戮於義何成若不見聽無忌等將竄身草澤不得居王左右太宗然其計六月三日密奏建成元吉淫亂後宮因自陳曰臣於兄弟無絲毫所負今欲殺臣似為世充建德報讎臣今枉死永違君親魂歸地下實亦恥見諸賊高祖省之愕然報曰明日當勘問汝宜早參四日太宗將左右九人至玄武門自衛高祖已召裴寂蕭瑀陳叔達封倫宇文士及竇誕顏師古等欲令窮核其事建成元吉行至臨湖殿覺變即回馬將東歸宮府太宗隨而呼之元吉馬上張弓再三不彀太宗乃射之建成應弦而斃元吉中流矢而走尉遲敬德殺之俄而東宮及齊府精兵二千人結陳馳攻玄武門守門兵仗拒之不得入良久接戰流矢及于內殿太宗左右數百騎來赴難建成等兵遂敗散高祖大驚謂裴寂等曰今日之事如何蕭瑀陳叔達進曰臣聞內外無限父子不親當斷不斷反受其亂建成元吉義旗草創之際並不預謀建立已來又無功德常自懷憂相濟為惡釁起蕭牆遂有今日之事秦王功蓋天下率土歸心若處以元良委之國務陛下如釋重負蒼生自然乂安高祖曰善此亦吾之夙志也乃命召太宗而撫之曰近日已來幾有投杼之惑太宗哀號久之建成死時年三十八長子太原王承宗早卒次子安陸王承道河東王承德武安王承訓汝南王承明巨鹿王承義並坐誅太宗即位追封建成為息王諡曰隱以禮改葬葬日太宗於宜秋門哭之甚哀仍以皇子趙王福為建成嗣十六年五月又追贈皇太子諡仍依舊衛王玄霸高祖第三子也早薨無子武德元年追贈衛王諡曰懷四年封太宗子泰為宜都王以奉其祀以禮改葬太子以下送于郭外泰後徙封於越又以宗室贈西平王瓊之子保定為嗣貞觀五年薨無子國除巢王元吉高祖第四子也義師起授太原郡守封姑臧郡公尋進封齊國公授十五郡諸軍事鎮北大將軍留鎮太原許以便宜行事武德元年進爵為王授并州總管二年劉武周南侵汾晉詔遣右衛將軍宇文歆助元吉守并州元吉性好畋獵載網罟三十餘兩嘗言我寧三日不食不能一日不獵又縱其左右攘奪百姓歆頻諫不納乃上表曰王在州之日多出微行常共竇誕遊獵蹂踐穀稼放縱親昵公行攘奪境內六畜因之殆盡當衢而射觀人避箭以為笑樂分遣左右戲為攻戰至相擊刺毀傷至死夜開府門宣淫他室百姓怨毒各懷憤歎以此守城安能自保元吉竟坐免又諷父老詣闕請之尋令復職時劉武周率五千騎至黃蛇嶺元吉遣車騎將軍張達以步卒百人先嘗之達以步卒少固請不行元吉強遣之至則盡沒於賊達憤怒因引武周攻陷榆次進逼并州元吉大懼紿其司馬劉德威曰卿以老弱守城吾以強兵出戰因夜出兵攜其妻妾棄軍奔還京師并州遂陷高祖怒甚謂禮部尚書李綱曰元吉幼小未習時事故遣竇誕宇文歆輔之強兵數萬食支十年起義興運之基一朝而棄宇文歆首畫此計我當斬之綱曰賴歆令陛下不失愛子臣以為有功高祖問其故綱對曰罪由竇誕不能規諷致令軍人怨憤又齊王年少肆行驕逸放縱左右侵漁百姓誕曾無諫止乃隨順掩藏以成其釁此誕之罪宇文歆論情則疏向彼又淺王之過失悉以聞奏且父子之際人所難言而歆言之豈非忠懇今欲誅罪不録其心臣愚竊以為過翌日高祖召綱入升御坐謂曰今我有公遂使刑罰不濫元吉自惡結怨於人歆既曾以表聞誕亦焉能禁制皆非其罪也尋加授元吉侍中襄州道行臺尚書令稷州刺史四年太宗征竇建德留元吉與屈突通圍王世充於東都世充出兵拒戰元吉設伏擊破之斬首八百級生擒其大將樂仁昉甲士千餘人世充平拜司空餘官如故加賜衮冕之服前後部鼓吹樂二部班劍二十人黃金二千斤與太宗各聽三爐鑄錢以自給六年加授隰州總管及與建成連謀各募壯士多匿罪人復內結宮掖遞加稱譽又厚賂中書令封倫以為黨助由是高祖頗疏太宗而加愛元吉太宗嘗從高祖幸其第元吉伏其護軍宇文寶於寢內將以刺太宗建成恐事不果而止之元吉慍曰為兄計耳於我何害九年轉左衛大將軍尋進位司徒兼侍中并州大都督隰州都督稷州刺史並如故高祖將避暑太和宮二王當從元吉謂建成曰待至宮所當興精兵襲取之置土窟中唯開一孔以通飲食耳會突厥郁射設屯軍河南入圍烏城建成乃薦元吉代太宗督軍北討仍令秦府驍將秦叔寶尉遲敬德程知節段志玄等並與同行又追秦府兵帳簡閲驍勇將奪太宗兵以益其府又譖杜如晦房玄齡逐令歸第高祖知其謀而不制元吉因密請加害太宗高祖曰是有定四海之功罪迹未見一旦欲殺何以為辭元吉曰秦王常違詔敕初平東都之日偃蹇顧望不急還京分散錢帛以樹私惠違戾如此豈非反逆但須速殺何患無辭高祖不對元吉遂退建成謂元吉曰既得秦王精兵統數萬之衆吾與秦王至昆明池於彼宴別令壯士拉之於幕下因云暴卒主上諒無不信吾當使人進說令付吾國務正位已後以汝為太弟敬德等既入汝手一時坑之孰敢不服率更丞王晊聞其謀密告太宗太宗召府僚以告之皆曰大王若不正斷社稷非唐所有若使建成元吉肆其毒心羣小得志元吉狠戾終亦不事其兄往者護軍薛寶上齊王符籙云元吉合成唐字齊王得之喜曰但除秦王取東宮如反掌耳為亂未成預懷相奪以大王之威襲二人如拾地芥太宗遲疑未決衆又曰大王以舜為何如人也曰濬哲文明溫恭允塞為子孝為君聖焉可議之乎府僚曰向使舜浚井不出自同魚鱉之斃焉得為孝子乎塗廩不下便成煨燼之餘焉得為聖君乎小杖受大杖避良有以也太宗於是定計誅建成及元吉元吉死時年二十四有五子梁郡王承業漁陽王承鸞普安王承獎江夏王承裕義陽王承度並坐誅尋詔絶建成元吉屬籍太宗踐祚追封元吉為海陵郡王諡曰剌以禮改葬貞觀十六年又追封巢王諡如故復以曹王明為元吉後楚王智雲高祖第五子也母曰萬貴妃性恭順特蒙高祖親禮宮中之事皆咨稟之諸王妃主莫不推敬後授楚國太妃薨陪葬獻陵智雲本名稚詮大業末從高祖於河東及義師將起隱太子建成潛歸太原以智雲年小委之而去因為吏所捕送于長安為陰世師所害年十四義寧元年贈尚書左僕射楚國公武德元年追封楚王諡曰哀無子三年以太宗子寬為嗣寬薨貞觀二年復以濟南公世都子靈龜嗣焉靈龜永徽中歷魏州刺史政尚清嚴姦盜屏跡又開永濟渠入于新市以控引商旅百姓利之卒官子福嗣嗣降爵為公儀鳳中卒於右威衛將軍子承況神龍中為右羽林將軍與節愍太子同舉兵入玄武門為亂兵所殺荊王元景高祖第六子也武德三年封為趙王八年授安州都督貞觀初歷遷雍州牧右驍衛大將軍十年徙封荊王授荊州都督十一年定制元景等為代襲刺史詔曰皇王受命步驟之迹以殊經籍所紀質文之道匪一雖治亂不同損益或異至於設官司以制海內建藩屏以輔王室莫不明其典章義存於致治崇其賢戚志在於無疆朕以寡昧不承鴻緒寅畏三靈憂勤百姓考明哲之餘論求經邦之長策帝業之重獨任難以成務天下之曠因人易以獲安然則侯伯肇於自昔州郡始於中代聖賢異術沿革隨時復古則義難頓從尋今則事不盡理遂規模周漢斟酌曹馬採按部之嘉名參建侯之舊制共治之職重矣分土之實存焉已有制書陳其至理繼世垂範貽厥後昆維城作固同符前烈荊州都督荊王元景梁州都督漢王元昌徐州都督徐王元禮潞州都督韓王元嘉遂州都督彭王元則鄭州刺史鄭王元懿絳州刺史霍王元軌虢州刺史虢王鳳豫州刺史道王元慶鄧州刺史鄧王元裕壽州刺史舒王元名幽州都督燕王靈夔蘇州刺史許王元祥安州都督吳王恪相州都督魏王泰齊州都督齊王祐益州都督蜀王愔襄州刺史蔣王惲揚州都督越王貞并州都督晉王某秦州都督紀王慎等或地居旦奭夙聞詩禮或望及間平早稱才藝並爵隆土宇寵兼車服誠孝之心無忘於造次風政之舉克著於期月宜冠恆冊祚以休命其所任刺史咸令子孫代代承襲尋又罷代襲之制元景久之轉鄜州刺史高祖即位進位司徒加實封通前滿一千五百戶永徽四年坐與房遺愛謀反賜死國除後追封沈黎王備禮改葬以渤海王奉慈子長沙為嗣降爵為侯神龍初追復爵土並封其孫逖為嗣荊王尋薨國除漢王元昌高祖第七子也少好學善隸書武德三年封為魯王貞觀五年授華州刺史轉梁州都督十年改封漢王元昌在州頗違憲法太宗手敕責之初不自咎更懷怨望知太子承乾嫉魏王泰之寵乃相附託圖為不軌十六年元昌來朝京師承乾頻召入東宮夜宿因謂承乾曰願殿下早為天子近見御側有一宮人善彈琵琶事平之後當望垂賜承乾許諾又刻臂出血以帛拭之燒作灰和酒同飲共為信誓潛伺間隙十七年事發太宗弗忍加誅特敕免死大臣高士廉李世績等奏言王者以四海為家以萬姓為子公行天下情無獨親元昌苞藏凶惡圖謀逆亂觀其指趣察其心府罪深燕旦釁甚楚英天地之所不容人臣之所切齒五刑不足申其罰九死無以當其愆而陛下情屈至公恩加梟獍欲開疏網漏此鯨鯢臣等有司期不奉制伏願敦師憲典誅此凶慝順羣臣之願奪鷹鸇之心則吳楚七君不幽歎於往漢管蔡二叔不沉恨於有周太宗事不獲已乃賜元昌自盡於家妻子籍沒國除酆王元亨高祖第八子也武德三年受封貞觀二年授散騎常侍拜金州刺史及之藩太宗以其幼小甚思之中路賜以金盞遣使為之設宴六年薨無子國除周王元方高祖第九子也武德四年受封貞觀二年授散騎常侍三年薨贈左光祿大夫無子國除徐王元禮高祖第十子也少恭謹善騎射武德四年封鄭王貞觀六年賜實封七百戶授鄭州刺史徙封徐王遷徐州都督十七年轉絳州刺史以善政聞太宗降璽書勞勉賜以錦綵二十三年加實封千戶永徽四年加授司徒兼潞州刺史咸亨三年薨贈太尉冀州大都督陪葬獻陵子淮南王茂嗣茂險薄無行元禮姬趙氏有美色及元禮遇疾茂遂逼之元禮知而切加責讓茂乃屏斥元禮侍衛斷其藥膳仍云既得五十年為王更何煩服藥竟以餒終上元中事泄配流振州而死神龍初又封茂子璀為嗣徐王景龍四年加銀青光祿大夫開元中除宗正員外卿卒子延年嗣開元二十六年封嗣徐王除員外洗馬天寶初拔汗那王入朝延年將嫁女與之為右相李林甫所奏貶文安郡別駕彭城長史坐贓貶永嘉司士至德初餘杭郡司馬卒永泰元年女壻黔中觀察使趙國珍入朝請以延年子前施州刺史諷為嗣因封嗣徐王韓王元嘉高祖第十一子也母宇文昭儀隋左武衛大將軍述之女也早有寵於高祖高祖初即位便欲立為皇后固辭不受元嘉少以母寵特為高祖所愛自登極晚生皇子無及之者武德四年封宋王徙封徐王貞觀六年賜實封七百戶授潞州刺史時年十五在州聞太妃有疾便涕泣不食及京師發喪哀毀過禮太宗嗟其至性屢慰勉之九年授右領軍大將軍十年改封韓王授潞州都督二十三年加實封滿千戶元嘉少好學聚書至萬卷又採碑文古跡多得異本閨門修整有類寒素士大夫與其弟靈夔甚相友愛兄弟集見如布衣之禮其修身潔己內外如一當代諸王莫能及者唯霍王元軌抑其次焉高宗末元嘉轉澤州刺史及天后臨朝攝政欲順物情乃進授元嘉為太尉定州刺史霍王元軌為司徒青州刺史舒王元名為司空隆州刺史魯王靈夔為太子太師蘇州刺史越王貞為太子太傅安州都督紀王慎為太子太保並外示尊崇實無所綜理其後漸將誅戮宗室諸王不附己者元嘉大懼與其子通州刺史黃公撰及越王貞父子謀起兵於是皇宗國戚內外相連者甚廣遣使報貞及貞子琅邪王沖曰四面同來事無不濟沖與諸道計料未審而先發兵倉卒唯貞應之諸道莫有赴者故其事不成元嘉坐誅撰少以文才見知諸王子中與琅邪王沖為一時之秀凡所交結皆當代名士時天下犯罪籍沒者甚衆唯沖與撰父子書籍最多皆文句詳定祕閣所不及神龍初追復元嘉爵土并封其第五子訥為嗣韓王官至員外祭酒開元十七年卒元嘉長子訓高祖時封潁川王早卒次子誼封武陵王官至濮州刺史開元中封訥子叔璩為嗣韓王國子員外司業彭王元則高祖第十二子也武德四年封荊王貞觀七年授豫州刺史十年改封彭王除遂州都督尋坐章服奢僭免官十七年拜澧州刺史更折節勵行頗著聲譽永徽二年薨高宗為之廢朝三日贈司徒荊州都督陪葬獻陵諡曰思發引之日高宗登望春宮望其靈車哭之甚慟無子以霍王元軌子絢嗣龍朔中封南昌王子志暕神龍初封嗣彭王景龍初加銀青光祿大夫開元中宗正卿同正員卒鄭王元懿高祖第十三子也頗好學武德四年封滕王貞觀七年授兗州刺史賜實封六百戶十年改封鄭王歷鄭潞二州刺史二十三年加實封滿千戶總章中纍授絳州刺史數斷大獄甚有平允之譽高宗嘉之降璽書褒美賜物三百段咸亨四年薨贈司徒荊州大都督諡曰惠陪葬獻陵子璥上元初封為嗣鄭王官至鄂州刺史神龍初又封璥嫡子希言為嗣鄭王景龍四年嗣鄭王希言等共一十四人並加銀青光祿大夫開元中右金吾大將軍天寶初再為太子詹事同正員卒霍王元軌高祖第十四子也少多才藝高祖甚奇之武德六年封蜀王八年徙封吳王貞觀初太宗嘗問羣臣曰朕子弟孰賢侍中魏徵對曰臣愚暗不盡知其能唯吳王數與臣言未嘗不自失上曰朕亦器之卿以為前代誰比徵曰經學文雅亦漢之間平也由是寵遇彌厚因令娶徵女焉從太宗遊獵遇羣獸命元軌射之矢不虛發太宗撫其背曰汝武藝過人恨今無所施耳當天下未定我得汝豈不美乎七年拜壽州刺史賜實封六百戶高祖崩去職毀瘠過禮自後常衣布示有終身之戚焉每至忌辰輒數日不食十年改封霍王授絳州刺史尋轉徐州刺史元軌前後為刺史至州唯閉閣讀書吏事責成於長史司馬謹慎自守與物無忤為人不妄在徐州唯與處士劉玄平為布衣之交人或問玄平王之長玄平答曰無長問者怪而復問之玄平曰夫人有短所以見其長至於霍王無所不備吾何以稱之哉二十三年加實封滿千戶為定州刺史突厥來寇元軌令開門偃旗虜疑有伏懼而宵遁州人李嘉運與賊連謀事泄高宗令收按其黨元軌以強寇在境人心不安惟殺嘉運餘無所及因自劾違制上覽表大悅謂使曰朕亦悔之向無王則失定州矣有王文操遇賊而二子鳳賢遂以身蔽捍文操獲全二子皆死縣司抑而不申元軌察知遣使弔祭表上其事詔並贈朝散大夫令加旌表其禮賢愛善如此後因入朝屢上疏陳時政得失多所匡益高宗甚尊重之及在外藩朝廷每有大事或密制問焉高宗崩與侍中劉齊賢等知山陵葬事齊賢服其識練故事每謂人曰非我輩所及也元軌嘗使國令徵封令白請依諸國賦物貿易取利元軌曰汝為國令當正吾失反說吾以利耶拒而不納垂拱元年加位司徒尋出為襄州刺史轉青州四年坐與越王貞連謀起兵事覺徙居黔州仍令載以檻車行至陳倉而死有子七人長子緒最有才藝上元中封江都王纍除金州刺史垂拱中坐與裴承光交通被殺神龍初與元軌並追復爵位仍封緒孫暉為嗣霍王景龍四年加銀青光祿大夫開元中左千牛員外將軍虢王鳳高祖第十五子也武德六年封豳王貞觀七年授鄧州刺史賜實封六百戶十年徙封虢王歷虢豫二州刺史二十三年加實封滿千戶麟德初纍授青州刺史上元元年薨年五十二贈司徒揚州大都督陪葬獻陵諡曰莊子平陽郡王翼嗣官至光州刺史永隆二年卒子𧜛嗣則天時失爵鳳第三子定襄郡公宏則天初為曹州刺史第五子東莞郡公融少以武勇見知垂拱中為申州刺史初黃公撰將與越王貞通謀深倚仗融以為外助時詔追諸親赴都融私使問其所親成均助教高子貢曰可入朝以否子貢報曰來必取死融乃稱疾不朝以俟諸藩期及得越王貞起兵書倉卒不能相應為僚吏所逼不獲已而奏之於是擢授銀青光祿大夫行太子右贊善大夫未幾為支黨所引被誅子徹神龍元年襲封東莞郡公開元五年繼密王元曉改為嗣密王十二年改封濮陽郡王歷宗正卿金紫光祿大夫卒神龍初封鳳嫡孫雍為嗣虢王雍娶韋庶人妹為妻由是中宗時特承寵異轉祕書監俄又改封汴王開府置僚屬月餘而韋氏敗雍揮刃截其妻首以至於朝深為物議所鄙貶沁州刺史不知州事削封邑景雲二年復嗣虢王還封二百戶纍遷衛尉卿開元十五年卒子巨嗣別有傳道王元慶高祖第十六子也武德六年封漢王八年改封陳王貞觀九年拜趙州刺史賜實封八百戶十年改封道王授豫州刺史二十三年加實封滿千戶永徽四年歷滑州刺史以政績聞賜物二百段後歷徐沁衛三州刺史元慶事母甚謹及母薨又請躬修墳墓優詔不許麟德元年薨贈司徒益州都督陪葬獻陵諡曰孝子臨淮王誘嗣官至澧州刺史永淳中坐贓削爵次子詢壽州刺史詢子微神龍初封為嗣道王景龍四年加銀青光祿大夫景雲元年宗正卿卒子鍊開元二十五年襲封嗣道王廣德中官至宗正卿鄧王元裕高祖第十七子也貞觀五年封鄶王十一年改封鄧王賜實封八百戶歷鄧梁黃三州刺史元裕好學善談名理與典籤盧照鄰為布衣之交二十三年加實封通前一千五百戶高宗時又歷壽襄二州刺史兗州都督麟德二年薨贈司徒益州大都督陪葬獻陵諡曰康無子以弟江王元祥子廣平公炅嗣神龍初封炅子孝先為嗣鄧王開元十三年右監門衛大將軍冠軍大將軍卒舒王元名高祖第十八子也年十歲時高祖在大安宮太宗晨夕使尚宮起居送珍饌元名保傅等謂元名曰尚宮品秩高者見宜拜之元名曰此我二哥家婢也何用拜為太宗聞而壯之曰此真我弟也貞觀五年封譙王十一年徙封舒王賜實封八百戶拜壽州刺史後歷滑許鄭三州刺史二十三年加實封滿千戶轉石州刺史元名性高潔罕問家人産業朝夕矜莊門庭清肅常誡其子豫章王亶等曰藩王所乏者不慮無錢財官職但勉行善事忠孝持身此吾志也及亶為江州刺史以善政聞高宗手敕褒美元名以賞其義方之訓高宗每欲授元名大州刺史固辭曰忝預藩戚豈以州郡戶口為仕進之資辭情懇到故在石州二十年賞玩林泉有塵外之意垂拱年除青州刺史又除鄭州刺史州境鄰接都畿諸王及帝戚蒞官者或有不檢攝家人為百姓所苦及元名到大革其弊轉滑州刺史政理如在鄭州尋加授司空永昌年與子亶俱為丘神績所陷被殺神龍初贈司徒復其官爵仍令以禮改葬亶子津為嗣舒王景龍四年加銀青光祿大夫開元中左威衛將軍卒子萬嗣天寶二年卒子藻嗣天寶九載封嗣舒王魯王靈夔高祖第十九子也少有美譽善音律好學工草隸與同母兄韓王元嘉特相友愛貞觀五年封魏王十年改封燕王賜實封八百戶授幽州都督十四年改封魯王授兗州都督二十三年加實封滿千戶永徽六年轉隆州刺史後歷絳滑定等州刺史太子太師垂拱元年授邢州刺史四年與兄元嘉子黃公撰結謀欲起兵應接越王貞父子事泄配流振州自縊而死有二子長子銑封清河王次子藹封范陽王歷右散騎常侍為酷吏所陷神龍初追復靈夔官爵仍令以禮改葬封藹子道堅為嗣魯王性嚴整雖在閨門造次必於莊敬少年佐郡聲實已彰景龍四年加銀青光祿大夫歷果隴吉冀洺汾滄等七州刺史國子祭酒開元二十二年兼檢校魏州刺史未行改汴州刺史河南道採訪使此州都會水陸輻湊實曰膏腴道堅特以清毅聞入為宗正卿卒子宇嗣二十九年封嗣魯王至德元年從幸巴蜀為右金吾將軍寶應元年皇太子封為魯王改宇嗣鄒王道堅弟道邃中興初封戴國公以恭默自守修山東婚姻故事頻任清列天寶中為右丞大理宗正二卿卒江王元祥高祖第二十子也貞觀五年封許王十一年徙封江王授蘇州刺史賜實封八百戶二十三年加實封滿千戶高宗時又歷金鄜鄭三州刺史性貪鄙多聚金寶營求無厭為人吏所患時滕王元嬰蔣王惲虢王鳳亦稱貪暴有授得其府官者以比嶺南惡處為之語曰寧向儋崖振白不事江滕蔣虢元祥體質洪大腰帶十圍飲啖亦兼數人其時韓王元嘉虢王鳳魏王泰狀貌亦偉不逮於元祥又眇一目永隆元年薨贈司徒並州大都督陪葬獻陵諡曰安子永嘉王永隆中為復州刺史以禽獸其行賜死于家中興初元祥子巨鹿郡公晃子欽嗣江王景龍四年加銀青光祿大夫聚王仁皎女至千牛將軍卒密王元曉高祖第二十一子也貞觀五年受封九年授虢州刺史十四年賜實封八百戶二十三年加滿千戶轉澤州刺史永徽四年除宣州刺史後歷徐州刺史上元三年薨贈司徒揚州都督陪葬獻陵諡曰貞子南安王穎嗣神龍初封穎弟亮子曇為嗣密王滕王元嬰高祖第二十二子也貞觀十三年受封十五年賜實封八百戶授金州刺史二十三年加實封滿千戶永徽中元嬰頗驕縱逸遊動作失度高宗與書誡之曰王地在宗枝寄深磐石幼聞詩禮夙承義訓實冀孜孜無怠漸以成德豈謂不遵軌轍踰越典章且城池作固以備不虞關鑰閉開須有常準鳩合散樂並集府僚嚴關夜開非復一度遏密之悲尚纏比屋王以此情事何遽紛紜又巡省百姓本觀風問俗遂乃驅率老幼借狗求罝志從禽之娛忽黎元之重時方農要屢出畋遊以彈彈人將為笑樂取適之方亦應多緒何必此事方得為娛晉靈虐主未可取則趙孝文趨走小人張四又倡優賤隸王親與博戲極為輕脫一府官僚何所瞻望凝寒方甚以雪埋人虐物既深何以為樂家人奴僕侮弄官人至於此事彌不可長朕以王骨肉至親不能致王於法今與王下上考以愧王心人之有過貴在能改國有憲章私恩難再興言及此慚歎盈懷三年遷蘇州刺史尋轉洪州都督又數犯憲章削邑戶及親事帳內之半於滁州安置後起授壽州刺史轉隆州刺史弘道元年加開府儀同三司兼梁州都督文明元年薨贈司徒冀州都督陪葬獻陵子長樂王循琦嗣兄弟六人垂拱中並陷詔獄神龍初以循琦弟循琣子涉嗣滕王本名茂宗狀貌類胡而豐碩開元十二年加銀青光祿大夫左驍衛將軍天寶初淮安郡別駕卒子湛然嗣十一載封滕王十五載從幸蜀除左金吾將軍史臣曰一人元良萬國以貞若明異重離道非出震雖居嫡長寧固鎡錤況當開創之初未見太平之兆建成殘忍豈主鬯之才元吉凶狂有覆巢之迹若非太宗逆取順守積德纍功何以致三百年之延洪二十帝之纂嗣或堅持小節必虧大猷欲比秦二世隋煬帝亦不及矣元嘉修身元軌無短元裕名理元名高潔靈夔嚴整皆有封冊之名而無磐石之固武氏之亂或連頸被刑姦臣擅權則束手為制其望本枝百世也不亦難乎贊曰有功曰祖有德曰宗建成元吉實為二凶中外交構人神不容用晦而明殷憂啓聖運屬文皇功成守正善惡既分社稷乃定盤維封建本枝茂盛元嘉元軌修身慎行元裕元名行簡居正犬牙不固武氏易姓既無兵民若拘陷穽敢告後人無或失政
