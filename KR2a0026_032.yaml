body:
  text: 舊唐書卷二十八志第八音樂一樂者太古聖人治情之具也人有血氣生知之性喜怒哀樂之情情感物而動於中聲成文而應於外聖王乃調之以律度文之以歌頌蕩之以鐘石播之以絃管然後可以滌精靈可以祛怨思施之於邦國則朝廷序施之於天下則神祇格施之於賓宴則君臣和施之於戰陳則士民勇三五之代世有厥官故虞廷振干羽之容周人立絃誦之教洎蒼精道喪戰國塵飛禮樂出於諸侯雅頌淪於衰俗齊竽燕築俱非皎繹之音東缶西琴各寫哇淫之狀乃至播鼗入漢師摯寢絃延陵有自鄶之譏孔子起聞韶之歎及始皇一統傲視百王鐘鼓滿於秦宮無非鄭衛歌舞陳於漢廟並匪咸韶而九成六變之容八佾四懸之制但存其數罕達其情而制氏所傳形容而已武宣之世天子弘儒采夜誦之詩考從臣之賦朝吟蘭殿暮奏竹宮乃命協律之官始制禮神之曲屬河間好古遺籍充庭乃約詩頌而制樂章體周官而為舞節自茲相襲代易其辭雖流管磬之音恐異莖英之旨其後臥聽桑濮雜以兜離孤竹空桑無復旋宮之義崇牙樹羽惟陳備物之儀煩手即多知音蓋寡自永嘉之後咸洛為墟禮壞樂崩典章殆盡江左掇其遺散尚有治世之音而元魏宇文代雄朔漠地不傳於清樂人各習其舊風雖得兩京工胥亦置四廂金奏殊非入耳之玩空有作樂之名隋文帝家世士人鋭興禮樂踐祚之始詔太常卿牛弘祭酒辛彥之增修雅樂弘集伶官措思歷載無成而郊廟侑神黃鐘一調而已開皇九年平陳始獲江左舊工及四懸樂器帝令廷奏之歎曰此華夏正聲也非吾此舉世何得聞乃調五音為五夏二舞登歌房中等十四調賓祭用之隋氏始有雅樂因置清商署以掌之既而協律郎祖孝孫依京房舊法推五音十二律為六十音又六之有三百六十音旋相為宮因定廟樂諸儒論難竟不施用隋世雅音惟清樂十四調而已隋末大亂其樂猶全高祖受禪擢祖孝孫為吏部郎中轉太常少卿漸見親委孝孫由是奏請作樂時軍國多務未遑改創樂府尚用隋氏舊文武德九年始命孝孫修定雅樂至貞觀二年六月奏之太宗曰禮樂之作蓋聖人緣物設教以為撙節治之隆替豈此之由御史大夫杜淹對曰前代興亡實由於樂陳將亡也為玉樹後庭花齊將亡也而為伴侶曲行路聞之莫不悲泣所謂亡國之音也以是觀之蓋樂之由也太宗曰不然夫音聲能感人自然之道也故歡者聞之則悅憂者聽之則悲悲歡之情在於人心非由樂也將亡之政其民必苦然苦心所感故聞之則悲耳何有樂聲哀怨能使悅者悲乎今玉樹伴侶之曲其聲具存朕當為公奏之知公必不悲矣尚書右丞魏徵進曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉樂在人和不由音調太宗然之孝孫又奏陳梁舊樂雜用吳楚之音周齊舊樂多涉胡戎之伎於是斟酌南北考以古音作為大唐雅樂以十二律各順其月旋相為宮按禮記云大樂與天地同和故制十二和之樂合三十一曲八十四調祭圜丘以黃鐘為宮方澤以林鐘為宮宗廟以太簇為宮五郊朝賀饗宴則隨月用律為宮初隋但用黃鐘一宮惟扣七鐘餘五鐘虛懸而不扣及孝孫建旋宮之法皆遍扣鐘無復虛懸者矣祭天神奏豫和之樂地祇奏順和宗廟奏永和天地宗廟登歌俱奏肅和皇帝臨軒奏太和王公出入奏舒和皇帝食舉及飲酒奏休和皇帝受朝奏政和皇太子軒懸出入奏承和元日冬至皇帝禮會登歌奏昭和郊廟俎入奏雍和皇帝祭享酌酒讀祝文及飲福受胙奏壽和五郊迎氣各以月律而奏其音又郊廟祭享奏化康凱安之舞周禮旋宮之義亡絶已久時莫能知一朝復古自此始也及孝孫卒後協律郎張文收復採三禮言孝孫雖創其端至於郊禋用樂事未周備詔文收與太常掌禮樂官等更加釐改於是依周禮祭昊天上帝以圜鐘為宮黃鐘為角太簇為徵姑洗為羽奏豫和之舞若封太山同用此樂若地祇方丘以函鐘為宮太簇為角姑洗為徵南呂為羽奏順和之舞禪梁甫同用此樂祫禘宗廟以黃鐘為宮大呂為角太簇為徵應鐘為羽奏永和之舞五郊日月星辰及類于上帝黃鐘為宮奏豫和之曲大蠟大報以黃鐘太簇姑洗蕤賓夷則無射等調奏豫和順和永和之曲明堂雩以黃鐘為宮奏豫和之曲神州社稷藉田宜以太簇為宮雨師以姑洗為宮山川以蕤賓為宮並奏順和之曲饗先妣以夷則為宮奏永和之舞大饗宴奏姑洗蕤賓二調皇帝郊廟食舉以月律為宮並奏休和之曲皇帝郊廟出入奏太和之樂臨軒出入奏舒和之樂並以姑洗為宮皇帝大射姑洗為宮奏騶虞之曲皇太子奏貍首之曲皇太子軒懸姑洗為宮奏永和之曲凡奏黃鐘歌大呂奏太簇歌應鐘奏姑洗歌南呂奏蕤賓歌林鐘奏夷則歌中呂奏無射歌夾鐘黃鐘蕤賓為宮其樂九變大呂林鐘為宮其樂八變太簇夷則為宮其樂七變夾鐘南呂為宮其樂六變姑洗無射為宮其樂五變中呂應鐘為宮其樂四變天子十二鐘上公九侯伯七子男五卿六大夫四士三及成奏之太宗稱善於是加級頒賜各有差十四年敕曰殷薦祖考以崇功德比雖加以誠潔而廟樂未稱宜令所司詳諸故實制定奏聞八座議曰七廟觀德義冠於宗祀三祖在天式章於嚴配致敬之情允洽大孝之道宜宣是以八佾具陳肅儀形於綴兆四懸備展被鴻徽於雅音考作樂之明義擇皇王之令典前聖所履莫大于茲伏惟皇帝陛下天縱感通率由冥極孝理昭懿光被於八埏愛敬純深追崇於百葉永言錫祚斯弘頌聲鐘律革音播鏗鏘於饗薦羽籥成列申蹈厲於蒸嘗爰詔典司乃加隆稱循聲核實敬闡尊名竊以皇靈滋慶濬源長委邁吞燕之生商軼擾龍之肇漢盛韜光於九二漸發迹於三分高祖縮地補天重張區宇反魂肉骨再造生靈恢恢帝圖與二儀而合大赫赫皇道共七曜以齊明雖復聖迹神功不可得而窺測經文緯武敢有寄於名言敬備樂章式昭彝範皇祖弘農府君宣簡公懿王三廟樂請同奏長發之舞太祖景皇帝廟樂請奏大基之舞世祖元皇帝廟樂請奏大成之舞高祖大武皇帝廟樂請奏大明之舞文德皇后廟樂請奏光大之舞七廟登歌請每室別奏制可之二十三年太尉長孫無忌侍中于志寧議太宗廟樂曰易曰先王作樂崇德殷薦之上帝以配祖考請樂名崇德之舞制可之後文德皇后廟有司據禮停光大之舞惟進崇德之舞光宅元年九月高宗廟樂以鈞天為名中宗廟樂奏太和之舞開元六年十月敕睿宗廟奏景雲之舞二十九年六月太常奏準十二年東封太山日所定雅樂其樂曰元和六變以降天神順和八變以降地祇皇帝行用太和之樂其封太山也登歌奠玉幣用肅和之樂迎俎用雍和之樂酌獻飲福用壽和之樂送文迎武用舒和之樂亞獻終獻用凱安之樂送神用夾鐘宮元和之樂禪社首也送神用林鐘宮順和之樂享太廟也迎神用永和永樂獻祖宣皇帝酌獻用光大之舞懿祖光皇帝酌獻用長發之舞太祖景皇帝酌獻用大政之舞世祖元皇帝酌獻用大成之舞高祖神堯皇帝酌獻用大明之舞太宗文皇帝酌獻用崇德之舞高宗天皇大帝酌獻用鈞天之舞中宗孝和皇帝酌獻用太和之舞睿宗大聖貞皇帝酌獻用景雲之舞徹豆用雍和之舞送神用黃鐘宮永和之樂臣以樂章殘缺積有歲時自有事東巡親謁九廟聖情慎禮精祈感通皆祠前纍日考定音律請編入史册萬代施行下制曰王公卿士爰及有司頻詣闕上言請以唐樂為名者斯至公之事朕安得而辭焉然則大咸大韶大濩大夏皆以大字表其樂章今之所定宜曰大唐樂皇祖弘農府君至高祖大武皇帝六廟貞觀中已詔顏師古等定樂章舞號洎今太常寺又奏有司所定獻祖宣皇帝至睿宗聖貞皇帝九廟酌獻用舞之號天寶元年四月命有司定玄元皇帝廟告享所奏樂降神用混成之樂送神用太一之樂寶應二年六月有司奏玄宗廟樂請奏廣運之舞肅宗廟樂請奏惟新之舞大曆十四年代宗廟樂請奏保大之舞永貞元年十月德宗廟樂請奏文明之舞元和元年順宗廟樂請奏大順之舞元和十五年憲宗廟樂請奏象德之舞穆宗廟樂請奏和寧之舞敬宗廟樂請奏大鈞之舞文宗廟樂請奏文成之舞武宗廟樂請奏大定之舞貞觀元年宴羣臣始奏秦王破陳之曲太宗謂侍臣曰朕昔在藩屢有征討世間遂有此樂豈意今日登於雅樂然其發揚蹈厲雖異文容功業由之致有今日所以被於樂章示不忘於本也尚書右僕射封德彝進曰陛下以聖武戡難立極安人功成化定陳樂象德實弘濟之盛烈為將來之壯觀文容習儀豈得為比太宗曰朕雖以武功定天下終當以文德綏海內文武之道各隨其時公謂文容不如蹈厲斯為過矣德彝頓首曰臣不敏不足以知之其後令魏徵虞世南褚亮李百藥改制歌辭更名七德之舞增舞者至百二十人被甲執戟以象戰陳之法焉六年太宗行幸慶善宮宴從臣於渭水之濱賦詩十韻其宮即太宗降誕之所車駕臨幸每特感慶賞賜閭里有同漢之宛沛焉於是起居郎呂才以御製詩等於樂府被之管絃名為功成慶善樂之曲令童兒八佾皆進德冠紫袴褶為九功之舞冬至享宴及國有大慶與七德之舞偕奏于庭七年太宗制破陳舞圖左圓右方先偏後伍魚麗鵝貫箕張翼舒交錯屈伸首尾回互以象戰陳之形令呂才依圖教樂工百二十人被甲執戟而習之凡為三變每變為四陳有來往疾徐擊刺之象以應歌節數日而就更名七德之舞癸巳奏七德九功之舞觀者見其抑揚蹈厲莫不扼腕踴躍然震竦武臣列將咸上壽云此舞皆是陛下百戰百勝之形容羣臣咸稱萬歲蠻夷十餘種自請率舞詔許之久而乃罷十四年有景雲見河水清張文收採古朱鴈天馬之義制景雲河清歌名曰宴樂奏之管弦為諸樂之首元會第一奏者是也永徽二年十一月高宗親祀南郊黃門侍郎宇文節奏言依儀明日朝羣臣除樂懸請奏九部樂上因曰破陳樂舞者情不忍觀所司更不宜設言畢慘愴久之顯慶元年正月改破陳樂舞為神功破陳樂二年太常奏白雪琴曲先是上以琴中雅曲古人歌之近代已來此聲頓絶雖有傳習又失宮商令所司簡樂工解琴笙者修習舊曲至是太常上言曰臣謹按禮記家語云舜彈五絃之琴歌南風之詩是知琴操曲弄皆合於歌又張華博物志云白雪是大帝使素女鼓五十絃瑟曲名又楚大夫宋玉對襄王云有客於郢中歌陽春白雪國中和者數十人是知白雪琴曲本宜合歌以其調高人和遂寡自宋玉以後迄今千祀未有能歌白雪曲者臣今準敕依於琴中舊曲定其宮商然後教習並合於歌輒以御製雪詩為白雪歌辭又按古今樂府奏正曲之後皆別有送聲君唱臣和事彰前史輒取侍臣等奉和雪詩以為送聲各十六節今悉教訖並皆諧韻上善之乃付太常編於樂府六年二月太常丞呂才造琴歌白雪等曲上製歌辭十六首編入樂府六年三月上欲伐遼於屯營教舞召李義府任雅相許敬宗許圉師張延師蘇定方阿史那忠于闐王伏闍上官儀等赴洛城門觀樂樂名一戎大定樂賜觀樂者雜綵有差麟德二年十月制曰國家平定天下革命創制紀功旌德久被樂章今郊祀四懸猶用干戚之舞先朝作樂韜而未伸其郊廟享宴等所奏宮懸文舞宜用功成慶善之樂皆著履執拂依舊服袴褶童子冠其武舞宜用神功破陳之樂皆被甲持戟其執纛之人亦著金甲人數並依八佾仍量加簫笛歌鼓等並於懸南列坐若舞即與宮懸合奏其宴樂內二色舞者仍依舊別設上元三年十一月敕供祠祭上元舞前令大祠享皆將陳設自今已後圓丘方澤太廟祠享然後用此舞餘祭並停儀鳳二年十一月六日太常少卿韋萬石奏曰據貞觀禮郊享日文舞奏豫和順和永和等樂其舞人著委貌冠服並手執籥翟其武舞奏凱安其舞人並著平冕手執干戚奉麟德二年十月敕文舞改用功成慶善樂武舞改用神功破陳樂并改器服等自奉敕以來為慶善樂不可降神神功破陳樂未入雅樂雖改用器服其舞猶依舊迄今不改事既不安恐須別有處分者以今月六日録奏奏敕舊文舞武舞既不可廢并器服總宜依舊若懸作上元舞日仍奏神功破陳樂及功成慶善樂并殿庭用舞並須引出懸外作其安置舞曲宜更商量作安穩法并録凱安六變法象奏聞萬石又與刊正官等奏曰謹按凱安舞是貞觀中所造武舞準貞觀禮及今禮但郊廟祭享奏武舞之樂即用之凡有六變一變象龍興參野二變象克靖關中三變象東夏賓服四變象江淮寧謐五變象獫狁讋伏六變復位以崇象兵還振旅謹按貞觀禮祭享日武舞惟作六變亦如周之大武六成樂止按樂有因人而作者則因人而止如著成數者數終即止不得取行事賒促為樂終早晚即禮云三闋六成八變九變是也今禮奏武舞六成而數終未止既非師古不可依行其武舞凱安望請依古禮及貞觀禮六成樂止立部伎內破陳樂五十二遍修入雅樂祇有兩遍名曰七德立部伎內慶善樂七遍修入雅樂祇有一遍名曰九功上元舞二十九遍今入雅樂一無所減每見祭享日三獻已終上元舞猶自未畢今更加破陳樂慶善樂兼恐酌獻已後歌舞更長其雅樂內破陳樂慶善樂及上元舞三曲並望修改通融令長短與禮相稱冀望久長安穩破陳樂有象武事慶善樂有象文事按古六代舞有雲門大咸大夏大韶是古之文舞殷之大濩周之大武是古之武舞依古義先儒相傳國家以揖讓得天下則先奏文舞若以征伐得天下則先奏武舞望請應用二舞日先奏神功破陳樂次奏功成慶善樂先奉敕於圓丘方澤太廟祠享日則用上元之舞臣據見行禮欲於天皇酌獻降復位已後即作凱安六變樂止其神功破陳樂功成慶善樂上元之舞三曲待修改訖以次通融作之即得與舊樂前後不相妨破若有司攝行事日亦請據行事通融從之三年七月上在九成宮咸亨殿宴集有韓王元嘉霍王元軌及南北軍將軍等樂作太常少卿韋萬石奏稱破陳樂舞者是皇祚發迹所由宣揚宗祖盛烈傳之於後永永無窮自天皇臨馭四海寢而不作既緣聖情感愴羣下無敢關言臣忝職樂司廢缺是懼依禮祭之日天子親總干戚以舞先祖之樂與天下同樂之也今破陳樂久廢羣下無所稱述將何以發孝思之情上矍然改容俯遂所請有制令奏樂舞既畢上欷歔感咽涕泗交流臣下悲淚莫能仰視久之顧謂兩王曰不見此樂垂三十年乍此觀聽實深哀感追思往日王業艱難勤苦若此朕今嗣守洪業可忘武功古人云富貴不與驕奢期驕奢自至朕謂時見此舞以自誡勗冀無盈滿之過非為歡樂奏陳之耳侍宴羣臣咸呼萬歲調露二年正月二十一日則天御洛城南樓賜宴太常奏六合還淳之舞長壽二年正月則天親享萬象神宮先是上自製神宮大樂舞用九百人至是舞於神宮之庭景龍二年皇后上言自妃主及五品以上母妻并不因夫子封者請自今遷葬之日特給鼓吹宮官亦準此侍御史唐紹上諫曰竊聞鼓吹之作本為軍容昔黃帝涿鹿有功以為警衛故掆鼓曲有靈夔吼雕鶚爭石墜崖壯士怒之類自昔功臣備禮適得用之丈夫有四方之功所以恩加寵錫假如郊祀天地誠是重儀惟有宮懸本無案架故知軍樂所備尚不洽於神祇鉦鼓之音豈得接於閨閫準式公主王妃已下葬禮惟有團扇方扇綵帷錦障之色加至鼓吹歷代未聞又準令五品官婚葬先無鼓吹惟京官五品得借四品鼓吹為儀令特給五品已上母妻五品官則不當給限便是班秩本因夫子儀飾乃復過之事非倫次難為定制參詳義理不可常行請停前敕各依常典上不納延載元年正月二十三日製越古長年樂一曲玄宗在位多年善音樂若宴設酺會即御勤政樓先一日金吾引駕仗北衙四軍甲士未明陳仗衛尉張設光祿造食候明百僚朝侍中進中嚴外辦中官素扇天子開簾受朝禮畢又素扇垂簾百僚常參供奉官貴戚二王後諸蕃酋長謝食就坐太常大鼓藻繪如錦樂工齊擊聲震城闕太常卿引雅樂每色數十人自南魚貫而進列於樓下鼓笛雞婁充庭考擊太常樂立部伎坐部伎依點鼓舞間以胡夷之伎日旰即內間引蹀馬三十匹為傾杯樂曲奮首鼓尾縱橫應節又施三層板牀乘馬而上抃轉如飛又令宮女數百人自帷出擊雷鼓為破陳樂太平樂上元樂雖太常積習皆不如其妙也若聖壽樂則回身換衣作字如畫又五坊使引大象入場或拜或舞動容鼓振中於音律竟日而退玄宗又於聽政之暇教太常樂工子弟三百人為絲竹之戲音響齊發有一聲誤玄宗必覺而正之號為皇帝弟子又云梨園弟子以置院近於禁苑之梨園太常又有別教院教供奉新曲太常每凌晨鼓笛亂發於太樂署別教院廩食常千人宮中居宜春院玄宗又製新曲四十餘又新製樂譜每初年望夜又御勤政樓觀燈作樂貴臣戚里借看樓觀望夜闌太常樂府縣散樂畢即遣宮女於樓前縛架出眺歌舞以娛之若繩戲竿木詭異巧妙固無其比天寶十五載玄宗西幸祿山遣其逆黨載京師樂器樂伎衣盡入洛城尋而肅宗克復兩京將行大禮禮物盡闕命禮儀使太常少卿于休烈使屬吏與東京留臺領赴于朝廷詔給錢使休烈造伎衣及大舞等服於是樂工二舞始備矣乾元元年三月十九日上以太常舊鐘磬自隋已來所傳五聲或有差錯謂于休烈曰古者聖人作樂以應天地之和以合陰陽之序和則人不夭札物不疵癘且金石絲竹樂之器也比親享郊廟每聽樂聲或宮商不倫或鐘磬失度可盡供鐘磬朕當於內自定太常進入上集樂工考試數日審知差錯然後令再造及磨刻二十五日一部先畢召太常樂工上臨三殿親觀考擊皆合五音送太常二十八日又於內造樂章三十一章送太常郊廟歌之貞元三年四月河東節度使馬燧獻定難曲御麟德殿命閲試之十二年十二月昭義軍節度使王虔休獻繼天誕聖樂十四年二月德宗自製中和舞又奏九部樂及禁中歌舞伎者十數人布列在庭上御麟德殿會百僚觀新樂詩仍令太子書示百官貞元十六年正月南詔異牟尋作奉聖樂舞因韋臯以進十八年正月驃國王來獻本國樂大和八年十月宣太常寺準雲韶樂舊用人數令於本寺閲習進來者至開成元年十月教成三年武德司奉宣索雲韶樂縣圖二軸進之大和三年八月太常禮院奏謹按凱樂鼓吹之歌曲也周官大司樂王師大獻則奏凱樂注云獻功之樂也又大司馬之職師有功則凱樂獻于社注云兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱入魏晉已來鼓吹曲章多述當時戰功是則歷代獻捷必有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李績平高麗皆備軍容凱歌入京師謹檢貞觀顯慶開元禮書並無儀注今參酌今古備其陳設及奏歌曲之儀如後凡命將征討有大功獻俘馘者其日備神策兵衛於東門外如獻俘常儀其凱樂用鐃吹二部笛篳篥簫笳鐃鼓每色二人歌工二十四人樂工等乘馬執樂器次第陳列如鹵簿之式鼓吹令丞前導分行於兵馬俘馘之前將入都門鼓吹振作迭奏破陳樂等四曲破陳樂應聖期兩曲太常舊有辭賀朝歡君臣同慶樂今撰補之破陳樂受律辭元首相將討叛臣咸歌破陳樂共賞太平人應聖期聖德期昌運雍熙萬宇清乾坤資化育海嶽共休明闢土欣耕稼銷戈遂偃兵殊方歌帝澤執贄賀升平賀朝歡四海皇風被千年德水清戎衣更不著今日告功成君臣同慶樂主聖開昌曆臣忠奏大猷君看偃革後便是太平秋候行至太社及太廟門工人下馬陳列於門外按周禮大司樂注云獻于祖大司馬云先凱樂獻于社謹詳禮儀則社廟之中似合奏樂伏以尊嚴之地鐃吹譁歡既無明文或乖肅敬今請並於門外陳設不奏歌曲候告獻禮畢復導引奏曲如儀至皇帝所御樓前兵仗旌門外二十步樂工皆下馬徐行前進兵部尚書介胄執鉞於旌門內中路前導周禮師有功則大司馬左執律右秉鉞以先凱樂注云律所以聽軍聲鉞所以為將威今吹律聽聲其術久廢惟請秉鉞以存禮文次協律郎二人公服執麾亦於門下分導鼓吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事請奏凱樂協律郎舉麾鼓吹大振作遍奏破陳樂等四曲樂闋協律郎偃麾太常卿又跪奏凱樂畢兵部尚書太常卿退樂工等並出旌門外訖然後引俘馘入獻及稱賀如別儀別有獻俘馘儀注俟俘囚引出方退請宣付當司編入新禮仍令樂工教習依奏
