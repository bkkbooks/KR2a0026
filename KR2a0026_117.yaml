body:
  text: 舊唐書卷一百一十三列傳第六十三苗晉卿裴冕裴遵慶子向向子寅寅子樞苗晉卿上黨壺關人世以儒素稱祖夔高道不仕追贈禮部尚書父殆庶官至絳州龍門縣丞早卒以晉卿贈太子少保晉卿幼好學善屬文進士擢第初授懷州修武縣尉歷奉先縣尉坐累貶徐州司戶參軍秩滿隨調判入高等授萬年縣尉遷侍御史歷度支兵吏部三員外郎開元二十三年遷吏部郎中二十四年與吏部郎中孫逖並拜中書舍人二十七年以本官權知吏部選事晉卿性謙柔選人有訴訟索好官者雖至數千言或聲色甚厲者晉卿必含容之略無慍色二十九年拜吏部侍郎前後典選五年政既寬弛胥吏多因緣為姦賄賂大行時天下承平每年赴選常萬餘人李林甫為尚書專任廟堂銓事唯委晉卿及同列侍郎宋遙主之選人既多每年兼命他官有識者同考定書判務求其實天寶二年春御史中丞張倚男奭參選晉卿與遙以倚初承恩欲悅附之考選人判等凡六十四人分甲乙丙科奭在其首衆知奭不讀書論議紛然有蘇孝慍者嘗為范陽薊令事安祿山具其事告之祿山恩寵特異謁見不常因而奏之玄宗大集登科人御花萼樓親試登第者十無一二而奭手持試紙竟日不下一字時謂之曳白上怒晉卿貶為安康郡太守遙為武當郡太守張倚為淮陽太守敕曰門庭之間不能訓子選調之際仍以託人時士子皆以為戲笑天寶三載閏二月轉魏郡太守充河北採訪處置使居職三年政化洽聞會入計因上表請歸鄉里既至壺關望縣門而步小吏進曰太守位高德重不宜自輕晉卿曰禮下公門式路馬況父母之邦所宜尊敬汝何言哉大會鄉黨歡飲累日而去又出俸錢三萬為鄉學本以教授子弟尋改河東太守河東採訪使入為尚書東京留守徵為憲部尚書屬祿山叛逆楊國忠以晉卿有時望將抑之乃奏云宜以大臣鎮遏東道遂出為陝州刺史陝虢兩州防禦使及入對固辭老病由是忤旨改憲部尚書致仕及朝廷失守衣冠流離道路多為逆黨所脅自陳希烈張均已下數十人盡赴洛陽晉卿潛遁山谷南投金州會肅宗至鳳翔手詔追晉卿赴行在即日拜為左相軍國大務悉以咨之既收兩京以功封韓國公食實封五百戶改為侍中後以賊寇漸除屢乞骸骨優詔許之罷知政事為太子太傅明年帝思舊臣復拜為侍中晉卿寬厚廉謹為政舉大綱不問小過所到有惠化魏人思之為立碑頌德及秉鈞衡小心畏慎未嘗忤人意性聰敏達練事體百司文簿經目必曉而修身守位以智自全議者比漢之胡廣玄宗崩肅宗詔晉卿攝冢宰上表固辭曰臣聞古者殷高宗在諒闇之中百官聽於冢宰更無事跡但存文字且一時之事禮不相沿今殘寇猶虞日殷萬務皆緣兵馬屯守討襲善算良謀立勝擒敵陛下若行古之道居喪不言蒼生何依百事皆廢伏讀國家起居注亦於禮部檢見舊敕恭惟太宗高宗大行皇帝在位之日皆有國哀視事不輟以為君臨天下難徇常情今遺詔有處分皇帝宜三日而聽政陛下遵太宗故事則無冢宰遵大行皇帝遺詔便合聽朝萬姓顒顒不勝大願伏惟陛下知理國之重順人心之切以義斷恩從宜無改今朝臣一命已上皆言臣心昏貌朽加以疾病事有急速斷在須臾凡聖不同豈合受詔陛下發哀已五日矣願准遺詔聽政則四夷萬國無任悲幸肅宗時疾彌留覽表殞絕乃許數日肅宗晏駕代宗踐祚又詔晉卿攝冢宰晉卿上表懇辭曰臣以昔者天子居喪之時百官聽於冢宰者蓋君幼小御極事殷情理當然沿革不一今古異同而周武漢文合於通變垂範作則可舉而行又士或墨縗時遇金革豈非銜恤謂義在斷恩且百善之至無加於孝也其有容瘁心絕指景悼生此匹夫守節之常情殊王者嗣續之大計昨二十日陛下於大行皇帝柩前即位是承先帝遺顧之言亦前代不易之典則知所略不為害所存是適權防威滅端所利者大陛下因心純至天地明察伏以報劬勞之恩申罔極之思終身之痛豈計朝夕但以一日之內萬務在中須達宸聰始成國政百僚萬姓及僧道耆壽等相顧聚言以臣老且無能愚豈測聖況久無居攝臣不敢奉詔特乞陛下遵遺命三日而聽政臣博聽衆情不勝懇願伏望割痛抑哀則天下悲幸上號泣從之時晉卿年已衰暮又患兩足上特許肩輿至中書入閤不趨累日一視事歷三朝皆以謹密見稱廣德初吐蕃寇長安晉卿時病臥於私第蕃聞之輿入逼脅晉卿閉口不言賊不敢害及上自陝至冊為太保罷知政事又詔以太保致仕永泰元年四月薨輟朝三日令京兆少尹一員護喪事緣葬諸物並官給賻絹布五百段米粟五百石太常議諡曰懿獻初晉卿東都留守引用大理評事元載為推官至是載為中書侍郎平章事懷舊恩諷有司改諡曰文貞大曆七年令配享肅宗廟庭裴冕河東人也為河東冠族天寶初以門蔭再遷渭南縣尉以吏道聞御史中丞王鉷充京畿採訪使表為判官遷監察御史歷殿中侍御史冕雖無學術守職通明果於臨事鉷甚委之及鉷得罪伏法時宰臣李林甫方竊權柄人咸懼之鉷賓佐數百不敢窺鉷門冕獨收鉷屍親自護喪瘞于近郊冕自是知名河西節度使哥舒翰表為行軍司馬累遷員外郎中玄宗幸蜀至益昌郡遙詔太子充天下兵馬元帥以冕為御史中丞兼左庶子為之副是時冕為河西行軍司馬授御史中丞詔赴朝廷遇太子於平涼具陳事勢勸之朔方亟入靈武冕與杜鴻漸崔漪等勸進曰主上厭勤大位南幸蜀川宗社神器須有所歸天意人事不可固違若逡巡退讓失億兆心則大事去矣臣等猶知之況賢智乎太子曰南平寇逆奉迎鑾輿退居儲貳侍膳左右豈不樂哉公等何言之過也冕與杜鴻漸又進曰殿下藉累聖之資有天下之表元貞萬國二十餘年殷憂啟聖正在今日所從殿下六軍將士皆關輔百姓日夜思歸大軍一散不可復集不如因而撫之以從衆臣等敢以死請凡勸進五上乃依肅宗即位以定策功遷中書侍郎同中書門下平章事倚以為政冕性忠勤悉心奉公稍得人心然不識大體以聚人曰財乃下令賣官鬻爵度尼僧道士以儲積為務人不願者科令就之其價益賤事轉為弊肅宗移幸鳳翔罷冕知政事遷右僕射兩京平以功封冀國公食實封五百戶尋加御史大夫成都尹充劍南西川節度使又入為右僕射永泰元年與裴遵慶等並集賢待制代宗求舊拜冕兼御史大夫充護山陵使冕以倖臣李輔國權盛將附之乃表輔國親昵術士中書舍人劉烜充山陵使判官烜坐法冕坐貶施州刺史數月移澧州刺史復徵為左僕射元載秉政載為新平縣尉王鉷辟在巡內冕常引之載頗德冕會宰臣杜鴻漸卒載遂舉冕代之冕時已衰瘵載以其順己引為同列受命之際蹈舞絕倒載趨而扶起代為謝詞冕兼掌兵權留守之任俸錢每月二千餘貫性本侈靡好尚車服及營珍饌名馬在櫪直數百金者常十數每會賓友滋味品數坐客有昧於名者自創巾子其狀新奇市肆因而効之呼為僕射樣初代鴻漸小吏以俸錢文簿白之冕顧子弟喜見於色其嗜利若此拜職未盈月卒大曆四年十二月也上悼之輟朝三日贈太尉賻帛五百匹粟五百石裴遵慶絳州聞喜人也代襲冠冕為河東著族遵慶志氣深厚機鑑敏達自幼強學博涉載籍謹身晦跡不干當世之務以門蔭累授潞府司法參軍時年已老未為人所知隨調吏部授大理寺丞剖斷刑獄舉正綱條理行始著遷司門員外吏部員外郎專判南曹天寶中海內無事九流輻輳會府每歲吏部選人動盈萬數遵慶敏識強記精覈文簿詳而不滯時稱吏事第一由是大知名天寶末楊國忠當國出不附己者例為外官遵慶亦出為郡守肅宗即位徵拜給事中尚書右丞吏部侍郎恭儉克己遲重謹密頗有時望上元中蕭華輔政素知遵慶每奏見累稱之遷黃門侍郎同中書門下平章事廣德初僕固懷恩阻兵汾上指中官為詞上以遵慶忠純特遣往汾州宣慰懷恩遵慶既見懷恩具陳朝旨懷恩引過聽命將隨遵慶朝謁為副將范志誠以邪說惑之懷恩遂以懼死為詞會蕃寇陷京師乘輿幸陝遵慶自汾州奔赴行在及乘輿還京以遵慶為太子少傅永泰元年與裴冕等並於集賢院待制罷知政事尋改吏部尚書右僕射復知選事時有選人天興縣尉陳琯於銓庭言詞不遜凌突無禮代宗詔付遵慶於省門鞭三十貶為吉州員外司戶參軍遵慶敦守儒行老而彌謹嘗為風狂族姪撾登聞鼓告以不順上知其謬不省其見信如此大曆十年十月薨於位年九十餘遵慶初登省郎嘗著王政記述今古禮體識者覽之知有公輔之量子向字傃仁少以門蔭歷官至太子司議郎建中初李紓為同州刺史奏向為從事朱泚反李懷光又叛河中使其將趙貴先築壘于同州紓來奔奉天向領州務貴先因脅縣尉林寶役徒板築不及期將斬之吏人百姓奔竄向即詣貴先軍壘以逆順之理責之貴先感悟遂來降故同州不陷向由是知名累為京兆府戶曹轉櫟陽渭南縣令奏課皆第一朝廷亟聞其理行擢為戶部員外郎德宗季年天下方鎮副倅多自選于朝防一日有變遂就而授之節制向已選為太原少尹德宗召見喻旨尋用為行軍司馬兼御史中丞改汾州刺史轉鄭州又復為太原少尹兼河東節度副使改晉州刺史充本州防禦使遷虢州刺史入為京兆少尹拜同州刺史充本州防禦使入為大理寺卿出遷陝虢都防禦觀察使三歲拜左散騎常侍自常侍復為大理向本以名相子以學行自飭謹守其門風歷官仁智推愛利及於人至是以年過致政朝廷優異乃以吏部尚書致仕于新昌里第內外支屬百餘人向所得俸祿必同其費及領外任亦挈而隨之有孤惸疾苦不能自恤向尤周給至今稱其孝睦焉大和四年九月卒年八十贈太子少保子寅登進士第累官至御史大夫卒子樞字紀聖咸通十二年登進士第宰相杜審權出鎮河中辟為從事得祕書省校書郎再遷藍田尉直弘文館大學士王鐸深知之鐸罷相失職樞亦久之不調從僖宗幸蜀中丞李煥奏為殿中侍御史遷起居郎中和初王鐸復見用以舊恩徙為鄭滑掌書記檢校司封郎中賜金紫入朝歷兵吏二員外郎龍紀初擢拜給事中改京兆尹宰相孔緯尤深奬遇大順中緯以用兵無功貶官樞坐累為右庶子尋出為歙州刺史乾寧初入為右散騎常侍從昭宗幸華州為汴州宣諭使初樞自歙州罷郡歸朝路經大梁時朱全忠兵威已振樞以兄事之全忠由是重之及樞傳詔全忠皆稟朝旨獻奉相繼昭宗甚悅乃遷兵部侍郎時崔胤專政亦倚全忠二人因是相結改樞吏部侍郎未幾換戶部侍郎同平章事其年冬昭宗幸華州崔胤貶官樞亦為工部尚書天子自岐下還宮以樞檢校右僕射同平章事出為廣南節度使制出朱全忠保薦之言樞有經世才不可棄之嶺表尋復拜門下侍郎監修國史累兼吏部尚書判度支崔胤誅以全忠素厚相位如故從昭宗遷洛陽駐驆陝州進右僕射弘文館大學士太清宮使充諸道鹽鐵轉運使哀帝初嗣位柳璨用事全忠嘗奏用牙將張廷範為太常卿諸相議樞曰廷範勳臣幸有方鎮節鉞之命何藉樂卿恐非元帥梁王之旨乃持之不下俄而全忠聞樞言謂賓佐曰吾常以裴十四器識真純不入浮薄之伍觀此議論本態露矣切齒含怒柳璨聞全忠言尋希旨罷樞相位和陵祔享拜尚書左僕射五月責授朝散大夫登州刺史尋再貶瀧州司戶六月十一日行及滑州全忠遣人殺之於白馬驛投屍於河時年六十五史臣曰晉卿謹身莅事足為純臣避寇全忠固彰大節然博達精審豈不知寬猛之道哉奉林甫之旨順胥吏之意悅附張倚欺罔時君生為重臣諂林甫之勢也歿改美諡引元載之恩焉或言晉卿不為巧宦者誠不信也冕力贊中興名居大位奉公抱義可以致身賣官度僧是何為政及其老也貪冒尤深遵慶學術貞明為國忠所出恭儉謹密遇蕭華素知位重行純老而彌篤彼二公固有慚德向克荷堂構不墜門風樞因盜而振盜憎而亡宜哉君子守道遠刑蓋慮此也贊曰奧矣晉卿貪哉裴冕遵慶父子及之者鮮
