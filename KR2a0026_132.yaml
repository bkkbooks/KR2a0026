body:
  text: 舊唐書卷一百二十八列傳第七十八段秀實子伯倫顏真卿子頵碩曾孫弘式段秀實字成公隴州陽人也祖達左衛中郎父行琛洮州司馬以秀實贈揚州大都督秀實性至孝六歲母疾水漿不入口七日疾有間然後飲食及長沉厚有斷天寶四載安西節度馬靈察署為別將從討護蜜有功授安西府別將七載高仙芝代靈察舉兵圍怛邏斯黑衣救至仙芝大衄軍士相失夜中聞都將李嗣業之聲因大呼責之曰軍敗而求免非丈夫也嗣業甚慚遂與秀實收合散卒復得成軍師還嗣業請于仙芝以秀實為判官授斥候府果毅十二載封常清代仙芝討大勃律師次賀薩勞城一戰而勝常清逐之秀實進曰賊兵羸餌我也請備左右搜其山林遂殲其伏改綏德府折衝肅宗即位於靈武徵安西兵節度使梁宰宰潛懷異圖秀實謂嗣業曰豈有天子告急臣下晏然信浮妄之説豈明公之意耶嗣業遂見宰請發兵從之乃出步騎五千令嗣業統赴朔方以秀實為援纍有戰功而秀實父歿哀毀過禮嗣業既授節制思秀實如失左右手表請起復為義王友充節度判官安慶緒奔鄴嗣業與諸軍圍之安西輜重委於河內乃奏秀實為懷州長史知軍州加節度留後諸軍進戰于愁思岡嗣業為流矢所中卒于軍衆推安西兵馬使荔非元禮代之秀實聞嗣業之戰乃遺先鋒將白孝德書令發卒護嗣業喪送河內秀實率將吏哭待于境傾私財以奉葬事元禮多其義奏試光祿少卿依前節度判官邙山之敗軍徙翼城元禮為麾下所殺將佐亦多遇害而秀實獨以智全衆推白孝德為節度使人心稍定又遷試光祿卿為孝德判官孝德改鎮邠寧奏秀實試太常卿支度營田二副使大軍西遷所過掠奪又以邠寧乏食難於饋運乃請軍於奉天是時公廩亦竭縣吏憂恐多逃匿羣行剽盜孝德不能禁秀實私曰使我為軍候當不如此軍司馬言之遂以秀實為都虞候權知奉天行營事號令嚴一軍府安泰代宗聞而蹉賞久之兵還于邠寧復為都虞候尋拜涇州刺史大曆元年馬璘奏加開府儀同三司軍中有能引二十四弓而犯盜者璘欲免之秀實曰將有私愛則法令不一雖韓白復生亦不能為理璘善其議竟使殺之璘決事有不合理者必固爭之得璘引過乃已璘城涇州秀實掌留後歸還加御史中丞璘既奉詔徙鎮涇州其士衆嘗自四鎮北庭赴難中原僑居驟移頗積勞怨刀斧將王童之因人心動搖導以為亂或告其事且曰候嚴警鼓為約矣秀實乃召鼓人陽怒失節且戒之曰每更籌盡必來報每白之輒延數刻四更畢而曙既差互童之亂不能作明日告者復曰今夜將焚草場期救火者同作亂秀實使嚴加警備夜半火發乃使令於軍中曰救火者斬童之居外營請入救火不許明日斬之捕殺其黨凡十餘人以徇曰敢後徙者族於是遷涇州既至其理所人煙敻絶兵無廩食朝廷憂之遂詔璘遙管鄭潁二州以贍涇原軍俾秀實為留後二州甚理璘思其績用又奏行軍司馬兼都知兵馬使八年吐蕃來寇戰于鹽倉我軍不利璘為寇戎所隔逮暮未還敗將潰兵爭道而入時都將焦令諶與諸將四五輩狼狽而至秀實召讓之曰兵法失將麾下當斬公等忘其死而欲安其家耶令諶等恐懼下拜數十秀實乃悉驅城中士卒未出戰者使驍將統之東依古原列奇兵示賊將戰且以收合敗亡蕃衆望之不敢逼及夜璘方獲歸十一年璘疾甚不能視事請秀實攝節度副使兼左廂兵馬使秀實乃以十將張羽飛為招召將分兵按甲以備非常璘卒而軍中行哭赴喪事於內李漢惠接賓客於外非其親不得居喪側族談離立者捕而囚之都虞候史廷幹裨將崔珍張景華謀作亂秀實乃送廷幹於京師徙珍及景華外鎮軍中遂定不戮一人尋拜秀實涇州刺史兼御史大夫四鎮北庭行軍涇原鄭潁節度使三四年間吐蕃不敢犯塞清約率易遠近稱之非公會不聽樂飲酒私室無妓媵無贏財退公之後端居靜慮而已德宗嗣位就加檢校禮部尚書張掖郡王建中元年宰相楊炎欲行元載舊志築原州城開陵陽渠詔中使上聞仍問秀實可否之狀秀實以為方春不可興土功請俟農隙炎以其沮己之謀遂除司農卿以邠寧節度李懷光兼涇原節度使以事西拓無何劉文喜叛亦不果城四年朱泚盜據宮闕源休教泚偽迎鑾駕陰濟逆志泚乃遣其將韓旻領馬步三千疾趨奉天時蒼黃之中未有武備泚以秀實嘗為涇原節度頗得士心後罷兵權以為蓄憤且久必肯同惡乃召與謀議秀實初詐從之陰説大將劉海賓何明禮姚令言判官岐靈嶽同謀殺泚以兵迎乘輿三人者皆秀實夙所奬遇遂皆許諾及韓旻追駕秀實以為宗社之危期於頃刻乃使人走諭靈嶽竊令言印不遂乃倒用司農印印符以追兵旻至駱驛得符軍人亦莫辨其印文惶遽而回秀實謂海賓等曰旻之來吾黨無遺類矣我當直搏殺泚不得則死終不能向此賊稱臣乃與海賓約事急為繼而令明禮應於外明日泚召秀實議事源休姚令言李忠臣李子平皆在坐秀實戎服與泚並膝語至僭位秀實勃然而起執休腕奪其象笏奮躍而前唾泚面大罵曰狂賊吾恨不斬汝萬段我豈逐汝反耶遂擊之泚舉臂自捍才中其顙流血匍匐而走凶徒愕然初不敢動而海賓等不至秀實乃曰我不同汝反何不殺我凶黨羣至遂遇害焉海賓明禮靈嶽相次被殺德宗在奉天聞其事惜其委用不至垂涕久之初秀實見禁兵寡少不足以備非常乃上疏曰臣聞天子曰萬乘諸侯曰千乘大夫曰百乘此蓋以大制小以十制一也尊君卑臣強幹弱枝之義在於此矣今外有不庭之虜內有梗命之臣竊觀禁兵不精其數全少卒有患難將何待之且猛虎所以百獸畏者為爪牙也若去其爪牙則犬彘馬牛悉能為敵伏願少留聖慮冀裨萬一及涇原兵作亂召神策六軍遂無一人至者秀實守節不二竟歿於賊其明略義烈如此興元元年二月詔曰見危致命之謂忠臨義有勇之謂烈惟爾克勵臣節不憚殺身惟豫式嘉乃勳懋昭大典曰台不德罔克若天遘茲殷憂變起都邑惟爾卿士嗷然靡依逼畏所加淄澠共混故開府儀同三司檢校禮部尚書兼司農卿上柱國張掖郡王段秀實操行嶽立忠厚精至義形於色勇必有仁頃者嘗鎮涇原克著威惠叛卒知訓咨爾以誠賊泚藏姦欺爾以詐守人臣之大節見元惡之深情端委國門挺身白刃誓碎凶渠之首以敵君父之讎視死如歸履虎致嘻噫天未悔禍事乖垂成雄風壯圖振駭羣盜昔王蠋守死以全節周顗正色而抗詞惟我信臣無愧前哲聲震寰宇義冠古今足以激勵人倫光昭史册不有殊等之賞孰表非常之功爰議疇庸特超檢限著之甲令樹此風聲可贈太尉諡曰忠烈宣付史官仍賜實封五百戶莊宅各一區長子與三品正員官諸子並與五品正員官仍廢朝三日收京城之後以禮葬祭旌表門閭朕承天子人臨馭億兆一夫不獲時豫之辜況誠信不達屢致寇戎使抱義之臣陷于凶逆有臨危致命歿而逾彰有因事成功權以合道苟利社稷存亡一致酬報之典豈限常倫並委所司訪其事迹續具條奏當加褒異錫其井賦圖形雲閣書功鼎彝以彰我有服節死義之臣傳于不朽德宗還京又詔曰贈太尉秀實授乎貞烈激其頽風蒼黃之中密蘊雄斷將紓國難詭收寇兵撓其凶謀果集吾事挺身徑進奮擊渠魁英名凜然振邁千古宜差官致祭並旌表門閭緣葬所須一切官給仍於墓所官為立碑以揚徽烈自貞元後纍朝凡赦書節文褒奬忠烈必以秀實為首其子伯倫纍官至太子詹事大和二年正月奏亡父贈太尉秀實準前後制敕令所司置廟立碑今營造已畢取今月二十五日行升祔禮詔曰秀實忠衛宗社功配廟食義風所激千載凜然間代勳力須異等夷宜賜綾絹五百匹以度支物充仍令所司供少牢並給鹵簿人夫兼太常博士一人檢校尋加伯倫檢校左散騎常侍兼殿中監大和四年十一月遷右金吾衛大將軍兼御史大夫充街使八年七月檢校工部尚書充福建等州都團練觀察使入為太僕卿卒宰臣李石奏曰伯倫秀實之子自古歿身以衛社稷者無如秀實之賢文宗憫然曰伯倫宜加賻贈仍輟朝一日以禮忠臣之嗣顏真卿字清臣琅邪臨沂人也五代祖之推北齊黃門侍郎真卿少勤學業有詞藻尤工書開元中舉進士登甲科事親以孝聞四命為監察御史充河西隴右軍試覆屯交兵使五原有冤獄久不決真卿至立辨之天方旱獄決乃雨郡人呼之為御史雨又充河東朔方試覆屯交兵使有鄭延祚者母卒二十九年殯僧舍垣地真卿劾奏之兄弟三十年不齒天下聳動遷殿中侍御史東都畿採訪判官轉侍御史武部員外郎楊國忠怒其不附己出為平原太守安祿山逆節頗著真卿以霖雨為託修城浚池陰料丁壯儲廩實乃陽會文士泛舟外池飲酒賦詩或讒於祿山祿山亦密偵之以為書生不足虞也無幾祿山果反朔盡陷獨平原城守具備乃使司兵參軍李平馳奏之玄宗初聞祿山之變歎曰河北二十四郡豈無一忠臣乎得平來大喜顧左右曰朕不識顏真卿形狀何如所為得如此祿山初尚移牒真卿令以平原博平軍屯七千人防河津以博平太守張獻直為副真卿乃募勇士旬日得萬人遣録事參軍李擇交統之簡閲以刁萬歲和琳徐浩馬相如高抗朗等為將祿山既陷洛陽殺留守李憕御史中丞盧奕判官蔣清以三首遣段子光來徇河北真卿恐搖人心乃詐謂諸將曰我識此三人首皆非也遂腰斬子光密藏三首異日乃取三首冠飾草續支體棺斂祭殯為位慟哭人心益附祿山遣其將李欽湊高邈何千年等守土門真卿從父兄常山太守杲卿與長史袁履謙謀殺湊邈擒千年送京師土門既開十七郡同日歸順共推真卿為帥得兵二十餘萬橫絶燕趙詔加真卿戶部侍郎依前平原太守清河客李萼年二十餘與郡人來乞師謂真卿曰聞公義烈首唱大順河朔諸郡恃公為長城今清河實公之西鄰也僕幸寓家得其虛實知可為長者用今計其蓄積足以三平原之富士卒可以二平原之強公因而撫之腹心輔車之郡其他小城運之如臂使指耳唯公所意誰敢不從真卿借兵千人萼將去真卿謂之日兵出也吾子何以教我萼曰今聞朝廷使程千里統衆十萬自太行東下將出口為賊所扼兵不得前今若先伐魏郡斬袁知泰太守司馬垂使為西南主分兵開口之路出千里之兵使討鄴幽陵平原清河合同志十萬之衆徇洛陽分兵而制其衝計王師亦不下十萬公當堅壁無與挑戰不數十日賊必潰而相圖矣真卿然之乃移牒清河等郡遣其大將李擇交副將平原縣令范東馥裨將和琳徐浩等進兵與清河四千人合勢而博平以千人來三郡之師屯於博平去堂邑縣西南十里袁知泰遣其將白嗣深乙舒蒙等以二萬人來拒戰賊大敗斬首萬餘級肅宗幸靈武授工部尚書兼御史大夫河北採訪招討使祿山乘虛遣史思明尹子奇急攻河北諸郡饒陽河間景城樂安相次陷沒獨平原博平清河三郡城守然人心危蕩不可復振至德元年十月棄郡渡河歷江淮荊襄二年四月朝於鳳翔授憲部尚書尋加御史大夫中書舍人兼吏部侍郎崔漪帶酒容入朝諫議大夫李何忌在班不肅真卿劾之貶漪為右庶子何忌西平郡司馬元帥廣平王領朔方蕃漢兵號二十萬來收長安出辭之日百僚致謁於朝堂百僚拜答拜辭亦如之王當闕不乘馬步出木馬門而後乘管崇嗣為王都虞候先王上馬真卿進狀彈之肅宗曰朕兒子每出諄諄教誡之故不敢失禮崇嗣老將有足疾姑欲優容之卿勿復言乃以奏狀還真卿雖天子蒙塵典法不廢洎鑾輿將復宮闕遣左司郎中李巽先行陳告宗廟之禮有司署祝文稱嗣皇帝真卿謂禮儀使崔器曰上皇在蜀可乎器遽奏改之中旨宣勞以為名儒深達禮體時太廟為賊所毀真卿奏曰春秋時新宮災魯成公三日哭今太廟既為盜毀請築壇於野皇帝東向哭然後遣使竟不能從軍國之事知無不言為宰相所忌出為同州刺史轉蒲州刺史為御史唐旻所構貶饒州刺史旋拜升州刺史浙江西道節度使徵為刑部尚書李輔國矯詔遷玄宗居西宮真卿乃首率百僚上表請問起居輔國惡之奏貶蓬州長史代宗嗣位拜利州刺史遷戶部侍郎除荊南節度使未行而罷除尚書左丞車駕自陝將還真卿請皇帝先謁五陵九廟而後還宮宰相元載謂真卿曰公所見雖美其如不合事宜何真卿怒前曰用捨在相公耳言者何罪然朝廷之事豈堪相公再破除耶載深銜之旋改檢校刑部尚書知省事纍進封魯郡公時元載引用私黨懼朝臣論奏其短乃請百官凡欲論事皆先白長官長官白宰相然後上聞真卿上疏曰御史中丞李進等傳宰相語稱奉進止緣諸司官奏事頗多朕不憚省覽但所奏多挾讒毀自今論事者諸司官皆須先白長官長官白宰相宰相定可否然後奏聞者臣自聞此語已來朝野囂然人心亦多衰退何則諸司長官皆達官也言皆專達於天子也郎官御史者陛下腹心耳目之臣也故其出使天下事無巨細得失皆令訪察回日奏聞所以明四目達四聰也今陛下欲自屏耳目使不聰明則天下何述焉詩云營營青繩止于棘讒言罔極交亂四國以其能變白為黑變黑為白也詩人深惡之故曰取彼讒人投畀豺虎豺虎不食投畀有北則夏之伯明楚之無極漢之江充皆讒人也孰不惡之陛下惡之深得君人之體矣陛下何不深回聽察其言虛誣者則讒人也因誅殛之其言不虛者則正人也因奬勵之陛下捨此不為使衆人皆謂陛下不能明察倦於聽覽以此為辭拒其諫諍臣竊為陛下痛惜之臣聞太宗勤於聽覽庶政以理故著司門式云其有無門籍人有急奏者皆令監門司與仗家引奏不許關礙所以防壅蔽也並置立仗馬二匹須有乘騎便往所以平治天下正用此道也天寶已後李林甫威權日盛羣臣不先咨宰相輒奏事者仍託以他故中傷猶不敢明約百司令先白宰相又閹官袁思藝日宣詔至中書玄宗動靜必告林甫先意奏請玄宗驚喜若神以此權柄恩寵日甚道路以目上意不下宣下情不上達所以漸致潼關之禍皆權臣誤主不遵太宗之法故也陵夷至于今日天下之蔽盡萃于聖躬豈陛下招致之乎蓋其所從來者漸矣自艱難之初百姓尚未凋斃太平之理立可便致屬李輔國用權宰相專政遞相姑息莫肯直言大開三司不安反側逆賊散落將士北走黨項合集土賊至今為患偽將更相驚恐因思明危懼扇動却反又今相州敗散東都陷沒先帝由此憂勤至於損壽臣每思之痛切心骨今天下兵戈未戢瘡痏未平陛下豈得不日聞讜言以廣視聽而欲頓隔忠讜之路乎臣竊聞陛下在陝州時奏事者不限貴賤務廣聞見乃堯舜之事也凡百臣庶以為太宗之理可翹足而待也臣又聞君子難進易退由此言之朝廷開不諱之路猶恐不言況懷厭怠令宰相宣進止使御史臺作條目不令直進從此人人不敢奏事則陛下聞見只在三數人耳天下之士方鉗口結舌陛下後見無人奏事必謂朝廷無事可論豈知懼不敢進即林甫國忠復起矣凡百臣庶以為危殆之期又翹足而至也如今日之事曠古未有雖李林甫楊國忠猶不敢公然如此今陛下不早覺悟漸成孤立後縱悔之無及矣臣實知忤大臣者罪在不測不忍孤負陛下無任懇迫之至其激切如此於是中人爭寫內本布於外後攝祭太廟以祭器不修言於朝載坐以誹謗貶硤州別駕撫州湖州刺史元載伏誅拜刑部尚書代宗崩為禮儀使又以高祖已下七聖諡號繁多乃上議請取初諡為定袁以諂言排之遂罷楊炎為相惡之改太子少傅禮儀使如舊外示崇寵實去其權也盧嵵專權忌之改太子太師罷禮儀使諭於真卿曰方面之任何處為便真卿候嵵於中書曰真卿以褊性為小人所憎竄逐非一今已羸老幸相公庇之相公先中丞傳首至平原面上血真卿不敢衣拭以舌舐之相公忍不相容乎嵵矍然下拜而含怒心會李希烈陷汝州嵵乃奏曰顏真卿四方所信使諭之可不勞師旅上從之朝廷失色李勉聞之以為失一元老貽朝廷羞乃密表請留又遣逆於路不及初見希烈欲宣詔旨希烈養子千餘人露刃爭前迫真卿將食其肉諸將叢繞慢罵舉刃以擬之真卿不動希烈遽以身蔽之而麾其衆衆退乃揖真卿就館舍因逼為章表令雪己願罷兵馬纍遣真卿兄子峴與從吏凡數輩繼來京師上皆不報每於諸子書令嚴奉家廟恤諸孤而已希烈大宴逆黨召真卿坐使觀倡優斥黷朝政為戲真卿怒曰相公人臣也奈何使此曹如是乎拂衣而起希烈慚亦呵止時朱滔王武俊田悅李納使在坐目真卿謂希烈曰聞太師名德久矣相公欲建大號而太師至非天命正位欲求宰相孰先太師乎真卿正色叱之曰是何宰相耶君等聞顏杲卿無是吾兄也祿山反首舉義兵及被害詬罵不絶於口吾今年向八十官至太師守吾兄之節死而後已豈受汝輩誘脅耶諸賊不敢復出口希烈乃拘真卿令甲士十人守掘方丈坎於庭曰坑顏真卿怡然不介意後張伯儀敗績於安州希烈令齎伯儀旌節首級誇示真卿真卿慟哭投地後其大將周曾等謀襲汝州因回兵殺希烈奉真卿為節度事泄希烈殺曾等遂送真卿於龍興寺真卿度必死乃作遺表自為墓志祭文常指寢室西壁下云吾殯所也希烈既陷汴州僭偽號使人問儀於真卿真卿曰老夫耄矣曾掌國禮所記者諸侯朝覲禮耳興元元年王師復振逆賊慮變起蔡州乃遣其將辛景臻安華至真卿所積柴庭中沃之以油且傳逆詞曰不能屈節當自燒真卿乃投身赴火景臻等遽止之復告希烈德宗復宮闕希烈弟希倩在朱泚黨中例伏誅希烈聞之怒興元元年八月三日乃使閹奴與景臻等殺真卿先曰有敕真卿拜奴曰宜賜卿死真卿曰老臣無狀罪當死然不知使人何日從長安來奴曰從大梁來真卿罵曰乃逆賊耳何敕耶遂縊殺之年七十七及淮泗平貞元元年陳仙奇使護送真卿喪歸京師德宗痛悼異常廢朝五日諡曰文忠復下詔曰君臣之義生録其功歿厚其禮況才優匡國忠至滅身朕自興歎勞於寤寐故光祿大夫守太子太師上柱國魯郡公顏真卿器質天資公忠傑出出入四朝堅貞一志屬賊臣擾亂委以存諭拘脅纍歲死而不撓稽其盛節實謂猶生朕致貽斯禍慚悼靡及式崇嘉命兼延爾嗣可贈司徒仍賜布帛五百端男頵碩等喪制終所司奏超授官秩貞元六年十一月南郊赦書節文授真卿一子五品正員官故頵得録用文宗詔曰朕每覽國史見忠烈之臣未嘗不嗟歎久之思有以報如聞從覽弘式實杲卿真卿之孫永惟九原既不可作旌其嗣續諒協典彝考績已深於宦途者命列於中臺官次未齒於搢紳者俾佐於左輔庶使天下再新義風以真卿曾孫弘式為同州參軍史臣曰每思先軫免胄子路結纓雖云其忠未聞於道如成公孝於家能於軍忠於國是武之英也苟無楊炎弄權若任之為將遂展其才豈有朱泚之禍焉如清臣富於學守其正全其節是文之傑也苟無盧嵵惡直若任之為相遂行其道豈有希烈之叛焉夫國得賢則安失賢則危德宗內信姦邪外斥良善幾致危亡宜哉噫仁以為己任不亦重乎死而後已不亦遠乎二君守道歿身為時垂訓希代之士也光文武之道焉贊曰自古皆死得正為順二公云亡萬代垂訓
