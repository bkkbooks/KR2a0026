body:
  text: 舊唐書卷七十四列傳第二十四劉洎馬周崔仁師孫湜湜弟液液子論液弟滌劉洎字思道荊州江陵人也隋末仕蕭銑為黃門侍郎銑令略地嶺表得五十餘城未還而銑敗遂以所得城歸國授南康州都督府長史貞觀七年纍拜給事中封清苑縣男十五年轉治書侍御史上疏曰尚書萬機實為政本伏尋此選受授誠難是以八座比於文昌二丞方於管轄爰至曹郎上應列宿苟非稱職竊位興譏伏見比來尚書省詔敕稽停文案壅滯臣誠雖庸劣請述其源貞觀之初未有令僕于時省務繁雜倍多於今左丞戴胄右丞魏徵並曉達吏方質性平直事應彈舉無所回避陛下又假以恩慈自然肅物百司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勳親在位品非其任功勢相傾凡在官僚未循公道雖欲自強先懼囂謗所以郎中抑奪唯事咨稟尚書依違不得斷決或憚聞奏故事稽延案雖理窮仍更盤下去無程限來不責遲一經出手便涉年載或希旨失情或避嫌抑理勾司以案成為事了不究是非尚書用便僻為奉公莫論當否遞相姑息唯務彌縫且選賢授能非材莫舉天工人代焉可妄加至於懿戚元勳但優其禮秩或年高耄及或積病智昏既無益於時宜當致之以閒逸久妨賢路殊為不可將救茲弊且宜精簡四員左右丞左右司郎中如並得人自然綱維略舉亦當矯正趨競豈唯息其稽滯哉書奏未幾拜尚書右丞十三年遷黃門侍郎十七年加授銀青光祿大夫尋除散騎常侍洎性疏峻敢言太宗工王羲之書尤善飛白嘗宴三品已上於玄武門帝操筆作飛白字賜羣臣或乘酒爭取於帝手洎登御座引手得之皆奏曰洎登御牀罪當死請付法帝笑而言曰昔聞婕妤辭輦今見常侍登牀尋攝黃門侍郎加上護軍太宗善持論每與公卿言及古道必詰難往復洎上書諫曰帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對至尊徒思自強不可得也陛下降恩旨假慈顏凝旒以聽其言虛襟以納其說猶恐羣下未敢對揚況動神機縱天辨飾辭以折其理援古以排其議欲令凡庶何階應答臣聞皇天以無言為貴聖人以不言為德老君稱大辨若訥莊生稱至道無文此皆不欲煩也齊侯讀書輪扁竊笑漢皇慕古長孺陳譏此亦不欲勞也且多記則損心多語則損氣心氣內損形神外勞初雖不覺後必為纍須為社稷自愛豈為性好自傷乎竊以今日升平皆陛下力行所至欲其長久匪由辨博但當忘彼愛憎慎茲取捨每事敦朴無非至公若貞觀之初則可矣至如秦政強辨失人心於自矜魏文宏才虧衆望於虛說此才辨之纍較然可知矣伏願略茲雄辨浩然養氣簡彼緗圖淡焉自怡固萬壽於南嶽齊百姓於東戶則天下幸甚皇恩斯畢手詔答曰非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由茲道形神心氣非此為勞今聞讜言虛懷以改時皇太子初立洎以為宜尊賢重道上書曰臣聞郊迎四方孟侯所以成德齒學三讓元良由是作貞斯皆屈主祀之尊申下交之義故得芻言咸薦睿問旁通不出軒庭坐知天壤率由茲道永固鴻基者焉原夫太子宗祧是繫善惡之際興亡斯在不勤於始將悔於終是以朝錯上書令先通政術賈誼獻策務前知禮教竊惟皇太子孝友仁義明允篤誠皆挺自天姿非勞審諭固以華夷仰德翔泳希風矣然則寢門視膳已表於三朝藝宮論道宜弘於四術雖春秋鼎盛飭躬有漸實恐歲月易往墯業興譏取適宴安方從此始臣以愚短幸參侍從思廣離明願聞徑術不敢曲陳故事請以聖德言之伏惟陛下誕睿膺圖登庸歷試多才多藝道著於匡時允武允文功成於纂祀萬方即序九圍清宴尚且雖休勿休日慎一日求異聞於振古勞睿思於當年乙夜觀書事高漢帝馬上披卷勤過魏后陛下自勵如此而令太子優游棄日不習圖書臣所未諭一也加以暫屏機務即寓雕蟲綜寶思於天文則長河韜映摛玉字於仙札則流霞成彩固以錙銖萬代冠冕百王屈宋不足以升堂鍾張何階於入室陛下自好如此而太子悠然靜處不尋篇翰臣所未諭二也陛下歷該衆妙獨秀寰中猶晦天聽俯詢凡識聽朝之隙引見羣官降以溫顏訪以今古故得朝廷是非里閭好惡凡有巨細必關聽覽陛下自好如此而令太子久入趨侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥蔑而不急未見其可伏願俯推睿範訓及儲君授以良書娛之嘉客晨披經史觀成敗於前蹤晚接賓遊訪得失於當代間以書札繼以篇章則日聞所未聞日見所未見副德逾光羣生之福也古之太子問安而退所以廣敬於君父異宮而處所以分別於嫌疑今太子一侍天闈動移旬朔師傅以下無由接見假令供奉有隙暫還東宮拜謁既疏且事欣仰規諫之道固所未暇陛下不可以親教宮寀無由以進言雖有具僚竟將何補伏願俯循前躅稍抑下流弘遠大之規展師友之義則儲徽克茂帝圖斯廣凡在黎元孰不慶賴自此敕洎令與岑文本同馬周遞日往東宮與皇太子談論太宗嘗怒苑西守監穆裕命於朝堂斬之皇太子遽進諫太宗謂司徒長孫無忌曰夫人久相與處自然染習自朕臨御天下虛心正直即有魏徵朝夕進諫自徵云亡劉洎岑文本馬周褚遂良等繼之皇太子幼在朕膝前每見朕心悅諫昔者染以成性固有今日之諫耳十八年遷侍中太宗嘗謂侍臣曰夫人臣之對帝王多順旨而不逆甘言以取容朕今發問欲聞己過卿等須言朕愆失長孫無忌李績楊師道等咸云陛下聖化致太平臣等不見其失洎對曰陛下化高萬古誠如無忌等言然頃上書人不稱旨者或面加窮詰無不慚退恐非奬進言者之路太宗曰卿言是也當為卿改之太宗征遼令洎與高士廉馬周留輔皇太子定州監國仍兼左庶子檢校民部尚書太宗謂洎曰我今遠征使卿輔翼太子社稷安危之機所寄尤重卿宜深識我意洎進曰願陛下無憂大臣有愆失者臣謹即行誅太宗以其妄發頗怪之謂曰君不密則失臣臣不密則失身卿性疏而太健恐以此取敗深宜誡慎以保終吉十九年太宗遼東還發定州在道不康洎與中書令馬周入謁洎周出遂良傳問起居洎泣曰聖體患癰極可憂懼遂良誣奏之曰洎云國家之事不足慮正當傅少主行伊霍故事大臣有異志者誅之自然定矣太宗疾愈詔問其故洎以實對又引馬周以自明太宗問周周對與洎所陳不異遂良又執證不已乃賜洎自盡洎臨引決請紙筆欲有所奏憲司不與洎死太宗知憲司不與紙筆怒之並令屬吏洎文集十卷行於時則天臨朝其子弘業上言洎被遂良譖而死詔令復其官爵馬周字賓王清河茌平人也少孤貧好學尤精詩傳落拓不為州里所敬武德中補博州助教日飲醇酎不以講授為事刺史達奚恕屢加咎責周乃拂衣遊於曹汴又為浚儀令崔賢首所辱遂感激西遊長安宿於新豐逆旅主人唯供諸商販而不顧待周遂命酒一斗八升悠然獨酌主人深異之至京師舍於中郎將常何之家貞觀三年太宗令百僚上書言得失何以武吏不涉經學周乃為何陳便宜二十餘事令奏之事皆合旨太宗怪其能問何何答曰此非臣所能家客馬周具草也每與臣言未嘗不以忠孝為意太宗即日召之未至間遣使催促者數四及謁見與語甚悅令直門下省六年授監察御史奉使稱旨帝以常何舉得其人賜帛三百匹是歲周上疏曰微臣每讀經史見前賢忠孝之事臣雖小人竊希大道未嘗不廢卷長想思履其迹臣以不幸早失父母犬馬之養已無所施顧來事可為者唯忠義而已是以徒步二千里而自歸於陛下陛下不以臣愚瞽過垂齒録竊自顧瞻無陛答謝輒以微軀丹款惟陛下所擇臣伏見大安宮在宮城之西其牆宇宮闕之制方之紫極尚為卑小臣伏以東宮皇太子之宅猶處城中大安乃至尊所居更在城外雖太上皇游心道素志存清儉陛下重違慈旨愛惜人力而蕃夷朝見及四方觀聽有不足焉臣願營築雉堞修起門樓務從高顯以稱萬方之望則大孝昭乎天下矣臣又伏見明敕以二月二日幸九成宮臣竊惟太上皇春秋已高陛下宜朝夕視膳而晨昏起居今所幸宮去京三百餘里鑾輿動軔嚴蹕經旬非可以旦暮至也太上皇情或思感而欲即見陛下者將何以赴之且車駕今行本為避暑然則太上皇尚留熱所而陛下自逐涼處溫凊之道臣竊未安然敕書既出業已成就願示速返之期以開衆惑臣又見詔書令宗室勳賢作鎮藩部貽厥子孫嗣守其政非有大故無或黜免臣竊惟陛下封植之者誠愛之重之欲其胤裔承守而與國無疆也臣以為如詔旨者陛下宜思所以安存之富貴之然則何用代官也何則以堯舜之父猶有朱均之子倘有孩童嗣職萬一驕愚兆庶被其殃而國家受其敗正欲絶之也則子文之治猶在正欲留之也而欒黶之惡已彰與其毒害於見存之百姓則寧使割恩於已亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其戶邑必有材行隨器方授則雖其翰翮非強亦可以獲免尤纍昔漢光武不任功臣以吏事所以終全其代者良得其術也願陛下深思其事使夫得奉大恩而子孫終其福祿也臣又聞聖人之化天下莫不以孝為基故曰孝莫大於嚴父嚴父莫大於配天又曰國之大事在祀與戎孔子亦云吾不預祭如不祭是聖人之重祭祀也如此伏惟陛下踐祚以來宗廟之享未曾親事伏緣聖情獨以鑾輿一出勞費稍多所以忍其孝思以便百姓遂使一代之史不書皇帝入廟之事將何以貽厥孫謀垂則來葉臣知大孝誠不在俎豆之間然聖人之訓人固有屈己以從時願聖慈顧省愚款臣又聞致化之道在於求賢審官為政之基在於揚清激濁孔子曰唯名與器不以假人是言慎舉之為重也臣伏見王長通白明達本自樂工輿皂雜類韋槃提斛斯正則更無他材獨解調馬縱使術踰儕輩伎能有取乍可厚賜錢帛以富其家豈得列預士流超授高爵遂使朝會之位萬國來庭騶子倡人鳴玉曳履與夫朝賢君子比肩而立同坐而食臣竊恥之然朝命既往縱不可追謂宜不使在朝班預於士伍太宗深納之尋除侍御史加朝散大夫十一年周又上疏曰臣歷觀前代自夏殷及漢氏之有天下傳祚相繼多者八百餘年少者猶四五百年皆為積德纍業恩結於人心豈無僻王賴前哲以免自魏晉以還降及周隋多者不過六十年少者才二三十年而亡良由創業之君不務廣恩化當時僅能自守後無遺德可思故傳嗣之主政教少衰一夫大呼而天下土崩矣今陛下雖以大功定天下而積德日淺固當思隆禹湯文武之道廣施德化使恩有餘地為子孫立萬代之基豈欲但令政教無失以持當年而已然自古明王聖主雖因人設教寬猛隨時而大要唯以節儉於身恩加於人二者是務故其下愛之如日月畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓承喪亂之後比於隋時才十分之一而供官徭役道路相繼兄去弟還首尾不絶遠者往來五六千里春秋冬夏略無休時陛下雖每有恩詔令其減省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有嗟怨之言以為陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不可復行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸慎夫人衣不曳地至景帝以錦繡纂組妨害女功特詔除之所以百姓安樂至孝武帝雖窮奢極侈而承文景遺德故人心不動向使高祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處營造供奉器物并諸王妃主服飾議者皆不以為儉臣聞昧旦丕顯後世猶怠作法於理其弊猶亂陛下少處人間知百姓辛苦前代成敗目所親見尚猶如此而皇太子生長深宮不更外事即萬歲之後固聖慮所當憂也臣尋往代以來之事但有黎庶怨叛聚為盜賊其國無不即滅人主雖改悔未有重能安全者凡修政教當修於可修之時若事變一起而後悔之則無益者也故人主每見前代之亡則知其政教之所由喪而皆不知其身之失是以殷紂笑夏桀之亡而幽厲亦笑殷紂之滅隋煬帝大業之初又笑齊魏之失國今之視煬帝亦猶煬帝之視齊魏也故京房謂漢元帝云臣恐後之視今亦猶今之視古此言不可不誡也往者貞觀之初率土霜儉一匹絹才得一斗米而天下帖然百姓知陛下甚愛憐之故人人自安曾無謗讟自五六年來頻歲豐稔一匹絹得粟十餘石而百姓皆以為陛下不憂憐之咸有怨言又今所營為者頗多不急之務故也自古以來國之興亡不由積畜多少唯在百姓苦樂且以近事驗之隋家貯洛口倉而李密因之東都積布帛而世充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛則世充李密未能必聚大衆但貯積者固是有國之常事要當人有餘力而後收之豈人勞而強斂之更以資寇積之無益也然儉以息人貞觀之初陛下已躬為之故今行之不難也為之一日則天下知之式歌且舞矣若人既勞矣而用之不息倘中國被水旱之災邊方有風塵之患狂狡因之以竊發則有不可測之事非徒聖躬旰食晏寢而已古語云動人以行不以言應天以實不以文以陛下之明誠欲勵精為政不煩遠采上古之術但及貞觀之初則天下幸甚昔賈誼為漢文帝云可慟哭及長歎息者言當韓信王楚彭越王梁英布王淮南之時使文帝即天子位必不能安又言賴諸王年少傅相制之長大之後必生禍亂歷代以來皆以誼言為是臣竊觀今諸將功臣陛下所與定天下者皆仰稟成規備鷹犬之用無威略振主如韓彭之難駕馭者而諸王年並幼少縱其長大當陛下之日必無他心然即萬代之後不可不慮自漢晉以來亂天下者何嘗不是諸王皆為樹置失宜不預為節制以至於滅亡人主熟知其然但溺於私愛故使前車既覆而後車不改轍也今天下百姓極少諸王甚多寵遇之恩有過厚者臣之愚慮不唯慮其恃恩驕矜也昔魏武帝寵陳思及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣王疑而畏之也此則武帝寵陳思適所以苦之也且帝子何患不富貴身食大國封戶不少好衣美食之外更何所須而每年加別優賜曾無紀極俚語曰貧不學儉富不學奢言自然也今大聖創業豈唯處置見在子弟而已當制長久之法使萬代遵行又言臨天下者以人為本欲令百姓安樂唯在刺史縣令縣令既衆不能皆賢若每州得良刺史則合境蘇息天下刺史悉稱聖意則陛下端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢德欲有擢升宰相必先試以臨人或從二千石入為丞相今朝廷獨重內官縣令刺史頗輕其選刺史多是武夫勳人或京官不稱職方始外出而折衝果毅之內身材強者先入為中郎將其次始補州任邊遠之處用人更輕其材堪宰蒞以德行見稱擢者十不能一所以百姓未安殆由於此疏奏太宗稱善久之先是京城諸街每至晨暮遣人傳呼以警衆周遂奏諸街置鼓每擊以警衆令罷傳呼時人便之太宗益加賞勞俄拜給事中十二年轉中書舍人周有機辨能敷奏深識事端動無不中太宗嘗曰我於馬周暫不見則便思之中書侍郎岑文本謂所親曰吾見馬君論事多矣援引事類揚榷古今舉要刪蕪會文切理一字不可加一言不可減聽之靡靡令人亡倦昔蘇張終賈正應此耳然鳶肩火色騰上必速恐不能久耳十五年遷治書侍御史兼知諫議大夫又兼檢校晉王府長史王為皇太子拜中書侍郎兼太子右庶子十八年遷中書令依舊兼太子右庶子周既職兼兩宮處事精密甚獲當時之譽太宗伐遼東皇太子定州監守令周與高士廉劉洎留輔皇太子太宗還以本官攝吏部尚書二十一年加銀青光祿大夫太宗嘗以神筆賜周飛白書曰鸞鳳凌雲必資羽翼股肱之寄誠在忠良周病消渴彌年不瘳時駕幸翠微宮敕求勝地為周起宅名醫中使相望不絶每令尚食以膳供之太宗躬為調藥皇太子親臨問疾周臨終索所陳事表草一帙手自焚之慨然曰管晏彰君之過求身後名吾弗為也二十二年卒年四十八太宗為之舉哀贈幽州都督陪葬昭陵高宗即位追贈尚書右僕射高唐縣公垂拱中配享高宗廟庭子載咸亨年纍遷吏部侍郎善選補於今稱之卒於雍州長史崔仁師定州安喜人武德初應制舉授管州録事參軍五年侍中陳叔達薦仁師才堪史職進拜右武衛録事參軍預修梁魏等史貞觀初再遷殿中侍御史時青州有逆謀事發州縣追捕支黨俘囚滿獄詔仁師按覆其事仁師至州悉去杻械仍與飲食湯沐以寬慰之唯坐其魁首十餘人餘皆原免及奏報詔使將往決之大理少卿孫伏伽謂仁師曰此獄徒侶極衆而足下雪免者多人皆好生誰肯讓死今既臨命恐未甘心深為足下憂也仁師曰嘗聞理獄之體必務仁恕故稱殺人刖足亦皆有禮豈有求身之安知枉不為申理若以一介暗短但易得十囚之命亦所願也伏伽慚而退及敕使至青州更訊諸囚咸曰崔公仁恕事無枉濫請伏罪皆無異辭仁師後為度支郎中嘗奏支度財物數千言手不執本太宗怪之令黃門侍郎杜正倫齎本仁師對唱一無差殊太宗大奇之時校書郎王玄度注尚書毛詩毀孔鄭舊義上表請廢舊注行己所注者詔禮部集諸儒詳議玄度口辨諸博士皆不能詰之郎中許敬宗請付祕閣藏其書河間王孝恭特請與孔鄭並行仁師以玄度穿鑿不經乃條其不合大義駁奏請罷之詔竟依仁師議玄度遂廢十六年遷給事中時刑部以賊盜律反逆緣坐兄弟沒官為輕請改從死奏請八座詳議右僕射高士廉吏部尚書侯君集兵部尚書李績等議請從重民部尚書唐儉禮部尚書江夏王道宗工部尚書杜楚客等議請依舊不改時議者以漢及魏晉謀反皆夷三族咸欲依士廉等議仁師獨駁曰自羲農以降爰及唐虞或設言而人不犯或畫象而下知禁三代之盛泣辜解網父子兄弟罪不相及咸臻至理俱為稱首及其世亂獄訟滋煩周之季年不勝其弊烈火原於子産峭澗起於安于韓李申商爭持急刻參夷相坐始於此也秦用其法遂至土崩漢高之務寬大未為盡善文帝之存仁厚仍多涼德遂使新垣族滅信越葅醢見譏良史謂之過刑魏晉至隋有損有益凝脂猶密秋荼尚煩皇上爰發至仁念茲刑憲酌前王之令典探往代之嘉猷革弊蠲苛可大可久仍降綸綍頒之九區故得斷獄數簡手足有措刑清化洽未有不安忽以暴秦酷法為隆周中典乖惻隱之情反惟行之令進退參詳未見其可且父子天屬昆季同氣誅其父子足纍其心此而不顧何愛兄弟既欲改法請更審量竟從仁師駁議後仁師密奏請立魏王為太子忤旨轉為鴻臚少卿遷民部侍郎征遼之役詔太常卿韋挺知海運仁師為副仁師又別知河南水運仁師以水路險遠恐遠州所輸不時至海遂便宜從事遞發近海租賦以充轉輸及韋挺以壅滯失期除名為民仁師以運夫逃走不奏坐免官既不得志遂作體命賦以暢其情辭多不載太宗還至中山起為中書舍人尋兼檢校刑部侍郎太宗幸翠微宮仁師上清暑賦以諷太宗稱善賜帛五十段二十二年遷中書侍郎參知機務時仁師甚承恩遇中書令褚遂良頗忌嫉之會有伏閣上訴者仁師不奏太宗以仁師罔上遂配龔州會赦還永徽初起授簡州刺史尋卒年六十餘神龍初以子挹為國子祭酒恩例贈同州刺史挹子湜湜少以文辭知名舉進士纍轉左補闕預修三教珠英遷殿中侍御史神龍初轉考功員外郎時桓彥範敬暉等既知國政懼武三思讒間引湜為耳目使伺其動靜俄而中宗疏忌功臣於三思恩寵漸厚湜乃反以桓敬等計議潛告三思尋遷中書舍人及桓敬等徙于嶺外湜又說三思盡宜殺之以絶其歸望三思問誰可使者湜表兄周利貞先為桓敬等所惡自侍御史出嘉州司馬湜乃舉充此行桓敬等聞利貞至多自殺三思引利貞為御史中丞湜景龍二年遷兵部侍郎挹為禮部父子同為南省副二有唐已來未有也時昭容上官氏屢出外宅湜託附之由是中宗遇湜甚厚俄拜吏部侍郎尋轉中書侍郎同中書門下平章事與鄭愔同知選事銓綜失序為御史李尚隱所劾愔坐配流嶺表湜左轉為江州司馬上官昭容密與安樂公主曲為申理中宗乃以愔為江州司馬授湜襄州刺史未幾入為尚書左丞韋庶人臨朝復為中書侍郎同中書門下三品睿宗即位出為華州刺史俄又拜太子詹事初湜景龍中獻策開南山新路以通商州水陸之運役徒數萬死者十三四仍嚴錮舊道禁行旅所開新路以通竟為夏潦衝突崩壓不通至是追論湜開山路功加銀青光祿大夫俄為太平公主所引復遷中書門下三品先天元年拜中書令與劉幽求爭權不協陷幽求徙于嶺表仍促廣州都督周利貞以逗留殺之不果而止時挹以年老纍除戶部尚書致仕挹性貪冒受人請託數以公事干湜湜多違拒不從大為時論所嗤玄宗在東宮數幸其第恩意甚密湜既私附太平公主時人咸為之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不悅及帝將誅蕭至忠等召將託為腹心湜弟滌謂湜曰主上若有所問不得有所隱也湜不從及見帝對問失旨至忠等既誅湜坐徙嶺外時新興王晉亦連坐伏誅臨刑歎曰本謀此事出自崔湜今我就死而湜得生何冤濫也俄而所司奏宮人元氏款稱與湜曾密謀進鴆乃追湜賜死初湜與張說有隙說時為中書令議者以為說構陷之時湜與尚書右丞盧藏用同配流俱行湜謂藏用曰家弟承恩或冀寬宥因遲留不速進行至荊州夢於講堂照鏡曰鏡者明象吾當為人主所明也以告占夢人張由對曰講堂者受法之所鏡者於文為立見金此非吉徵其日追使至縊於驛中時年四十三湜美姿儀早有才名弟液滌及從兄涖並有文翰居清要每宴私之際自比東晉王導謝安之家謂人曰吾之一門及出身歷官未嘗不為第一丈夫當先據要路以制人豈能默默受制於人也是故進趣不已而不以令終液尤工五言之作湜常歎伏之曰海子我家之龜也海子即液小名官至殿中侍御史坐兄配流逃匿於郢州人胡履虛之家作幽征賦以見意辭甚典麗遇赦還道病卒友人裴耀卿纂其遺文為集十卷液子論以吏幹稱天寶中自櫟陽令遷司勳員外郎濛陽太守乾元後歷典名郡皆以理行稱大曆末元載以罪誅朝廷方振起淹滯遷同州刺史未幾為黜陟使庾何所按廢免議者以何舉奏涉於深刻復用論為衢州刺史秩滿寓於揚楚間德宗以舊族耆年授大理卿致仕卒液弟滌多辨智善諧謔素與玄宗款密兄湜坐太平黨誅玄宗常思之故待滌踰厚用為祕書監出入禁中與諸王侍宴不讓席而坐或在寧王之上後賜名澄從東封還加金紫光祿大夫封安喜縣子開元十四年卒贈兗州刺史史臣曰劉洎始以章疏切直以至位望隆顯至于提綱整帶咨聖嘉猷籍國士之談體廊廟之器噫樞機之發榮辱之主一言不慎竟陷誣奏雖君親甚悔而駟不及舌良足悲矣馬周道承際會天性深沉悟主談微置忠本孝沖識廣度宛涉穹崇詩曰嘉樂君子顯顯令德惜其中壽不憖遺乎崔仁師以史材獲進其刊正褒貶雅得詳明至于本仁恕申枉濫其事可觀沮穿鑿之注止從重之刑其言甚直書曰疑謀勿成而以魏王為請不亦惑乎及參機務竟致忌嫉罔上之名抑有由也崔湜之德去祖逾遠謂勢可恃謂進無傷及位極人臣而心無止足覽海鷗賦知而不誡及荊州之夢人知不免易曰不節之嗟又誰咎也贊曰驥逢造父一日千里英主取賢不拘階陛賓王徒步洎為賊吏一見文皇皆登相位
