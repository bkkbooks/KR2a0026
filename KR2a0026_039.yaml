body:
  text: 舊唐書卷三十五志第十五天文上易曰觀乎天文以察時變是故古之哲王法垂象以施化考庶徵以致理以授人時以考物紀修其德以順其度改其過以慎其災去危而就安轉禍而為福者也夫其五緯七紀之名數中官外官之位次凌歷犯守之所主飛流彗孛之所應前史載之備矣武德年中薛頤庾儉等相次為太史令雖各善於占候而無所發明貞觀初將仕郎直太史李淳風始上言靈臺候儀是後魏遺範法制疏略難為占步太宗因令淳風改造渾儀鑄銅為之至七年造成淳風因撰法象志七卷以論前代渾儀得失之差語在淳風傳其所造渾儀太宗令置於凝暉閣以用測候既在宮中尋而失其所在玄宗開元九年太史頻奏日蝕不效詔沙門一行改造新曆一行奏云今欲創曆立元須知黃道進退請太史令測候星度有司云承前唯依赤道推步官無黃道游儀無由測候時率府兵曹梁令瓚待制於麗正書院因造游儀木樣甚為精密一行乃上言曰黃道游儀古有其術而無其器以黃道隨天運動難用常儀格之故昔人潛思皆不能得今梁令瓚創造此圖日道月交莫不自然契合既於推步尤要望就書院更以銅鐵為之庶得考驗星度無有差舛從之至十三年造成又上疏曰按舜典云在璿樞玉衡以齊七政說者以為取其轉運者為樞持正者為衡皆以玉為之用齊七政之變知其盈縮進退得失政之所在即古太史渾天儀也自周室衰微疇人喪職其制度遺象莫有傳者漢興丞相張蒼首創律曆之學至武帝詔司馬遷等更造漢曆乃定東西立晷儀下漏刻以追二十八宿相距星度與古不同故唐都分天部洛下閎運算轉曆今赤道曆星度則其遺法也後漢永元中左中郎將賈逵奏言臣前上傅安等用黃道度日月弦望多近史官一以赤道度之不與天合至差一日以上願請太史官日月宿簿及星度課與待詔星官考校奏可問典星待詔姚崇等十二人皆曰星圖有規法日月實從黃道官無其器不知施行甘露二年大司農丞耿壽昌奏以圓儀度日月行考驗天運日月行赤道至牽牛東井日行一度月行十五度至婁角日行一度月行十三度此前代所共知也是歲永元四載也明年始詔太史造黃道銅儀冬至日在斗十九度四分度之一與赤道定差二度史官以校日月弦望雖密近而不為望日儀黃道與度運轉難候是以少終其事其後劉洪因黃道渾儀以考月行出入遲速而後代理曆者不遵其法更從赤道命文以驗賈逵所言差謬益甚此理曆者之大惑也今靈臺鐵儀後魏明元時都匠解蘭所造規制朴略度刻不均赤道不動乃如膠柱不置黃道進退無準此據赤道月行以驗入曆遲速多者或至十七度少者僅出十度不足以上稽天象敬授人時近祕閣郎中李淳風著法象志備載黃道渾儀法以玉衡旋規別帶日道傍列二百四十九交以攜月游用法頗雜其術竟寢臣伏承恩旨更造游儀使黃道運行以追列舍之變因二分之中以立黃道交於軫奎之間二至陟降各二十四度黃道之內又施白道月環用究陰陽朓朒之數動合天運簡而易從足以制器垂象永傳不朽於是玄宗親為製銘置之於靈臺以考星度其二十八宿及中外官與古經不同者凡數十條又詔一行與梁令瓚及諸術士更造渾天儀鑄銅為圓天之象上具列宿赤道及周天度數注水激輪令其自轉一日一夜天轉一周又別置二輪絡在天外綴以日月令得運行每天西轉一匝日東行一度月行十三度十九分度之七凡二十九轉有餘而日月會三百六十五轉而日行匝仍置木匱以為地平令儀半在地下晦明朔望遲速有準又立二木人於地平之上前置鐘鼓以候辰刻每一刻自然擊鼓每辰則自然撞鐘皆於匱中各施輪軸鈎鍵交錯關鎖相持既與天道合同當時共稱其妙鑄成命之曰水運渾天俯視圖置於武成殿前以示百僚無幾而銅鐵漸澀不能自轉遂收置於集賢院不復行用今録游儀制度及所測星度異同開元十二年分遣使諸州所測日晷長短李淳風僧一行所定十二次分野武德已來交蝕及五星祥變著于篇黃道游儀規尺寸旋樞雙環外一丈四尺六寸一分豎八分厚三分直徑四尺五寸九分即古所謂旋儀也南北斜兩極上下循規各三十四度兩面各畫周天度數一面加釘並用銀飾使東西運轉如渾天游儀中旋樞軸至兩極首內孔徑大兩度半長與旋環徑齊並用古尺四分為度玉衡望筒長四尺五寸八分廣一寸二分厚一寸孔徑六分古用玉飾之玉衡衡施於軸中旋運持正用窺七曜及列星之闊狹外方內圓孔徑一度半周日輪也陽經雙環外一丈七尺三寸內一丈四尺六寸四分廣四寸厚四分直徑五尺四寸四分置於子午左右用八柱相固兩面畫周天度數一面加釘並銀飾之半出地上半入地下雙間挾樞軸及玉衡望筒旋環於中也陰緯單環外內廣厚周徑皆準陽經與陽經相銜各半內外俱齊面平上為天以下為地橫周陽環謂之陰渾也面上為兩界內外為周天百刻平上御製銘序及書並金為字天頂單環外一丈七尺三寸豎廣八分厚三分直徑五尺四寸四分當中國人頂之上東西當卯酉之中稍南使見日出入令與陽經陰緯相固如殼之裹黃南去赤道三十六度去黃道十二度去北極五十五度去南北平各九十一度強赤道單環外一丈四尺五寸九分橫八分厚三分直徑四尺九寸赤道者當天之中二十八宿之列位也其本後魏解蘭所造也因著雙規不能運動臣今所造者上列周天星度使轉運隨天仍度穿一穴隨穴退交不有差謬即知古者秋分日在角五度今在軫十三度冬至日在牽牛初今在斗十度擬隨差却退故置穴也傍在卯酉之南上去天頂三十六度而橫置之黃道單環外一丈五尺四寸一分橫八分厚四分直徑四尺八寸四分日之所行故名黃道古人知有其事竟無其器遂使太陽陟降積歲有差月及五星亦隨日度出入規制不知準的斟量為率疏闊尤多臣今創置此環置於赤道環內仍開合使隨轉運出入四十八度而極畫兩方東西列周天度數南北列百刻使見日知時不有差謬上列三百六十策與用卦相準度穿一穴與赤道相交白道月環外一丈五尺一寸五分橫度八分厚三分直徑四尺七寸六分月行有迂曲遲疾與日行緩急相反古無其器今創置於黃道環內使就黃道為交合出入六十度以測每夜行度上畫周天度數穿一穴擬移交會並用銅鐵為之李淳風法象志說有此日月兩環在旋儀環上既用玉衡不得遂於玉衡內別安一尺望筒運用既難其器已澀游儀四柱龍各高四尺七寸水槽山各高一尺七寸五分槽長六尺九寸高廣各四寸水池深一寸廣一寸五分龍者能興雲雨故以飾柱柱在四維龍下有山雲俱在水平槽上並銅為之游儀初成太史所測二十八宿等與經同異狀角二星十二度赤道黃道度與古同舊經去極九十一度今則九十三度半星經云角去極九十一度距星正當赤道其黃道在赤道南不經角中今測角在赤道南二度半黃道復經角中即與天象符合亢四星九度舊去極八十九度今九十一度半氐四星十六度舊去極九十四度今九十八度房四星五度舊去極一百八度今一百一十度半心三星五度舊去極一百八度今一百一十一度尾九星十八度舊去極一百二十度一云一百四十一度今一百二十四度箕四星十一度舊去極一百一十八度今一百二十度南斗六星二十六度舊去極一百一十六度今一百一十九度牽牛六星八度舊去極一百六度今一百四度須女四星十二度舊去極一百度今一百一度虛二星十度舊去極一百四度今一百一度北星舊圖入虛宿今測在須女九度危三星十七度舊去極九十七度今九十七度北星舊圖入危宿今測在虛六度半室二星十六度舊去極八十五度今八十三度東壁二星九度舊去極八十六度今八十四度奎十六星十六度舊去極七十六度一云七十度今七十三度東壁九度奎十六度此錯以奎西大星為距即損壁二度加奎二度今取西南大星為距即奎壁各不失本度婁三星十三度舊去極八十度今七十七度胃三星十四度昴七星十一度舊去極七十四度今七十二度畢八星十七度舊去極七十八度今七十六度觜觿三度舊去極八十四度今八十二度畢赤道與黃道度同觜赤道二度黃道三度其二宿俱當黃道斜虛畢有十六度尚與赤道度同觜總二度黃道損加一度此即承前有誤今測畢有十七度半觜觿半度並依天正參十星舊去極九十四度今九十二度東井八星三十三度舊去極七十度今六十八度輿鬼五星舊去極六十八度今古同也柳八星十五度舊去極七十七度一云七十九度今八十度半柳合用西頭第三星為距比來錯取第四星今依第三星為正七星十度舊去極九十一度一云九十三度今九十三度半張六星十八度舊去極九十七度今一百度張六星中央四星為朱鳥嗉外二星為翼比來不取膺前為距錯取翼星即張加二度半七星缺二度半今依本經為定翼二十二星十八度舊去極九十七度今一百三度軫四星十七度舊去極九十八度今一百度文昌舊二星在鬼四星在井今四星在柳一星在鬼一星在井北斗魁第一星舊在七星一度今在張十三度第二星舊在張二度今在張十二度半第三星舊在翼二度今在翼十三度第四星舊在翼八度今在翼十七度太第五星舊在軫八度今在軫十度半第六星舊在角七度今在角四度少第七星舊在亢四度今在角十二度少天關舊在黃道南四度今當黃道天江舊在黃道外今當黃道天囷舊在赤道外今當赤道三台上台舊在井今測在柳中台舊在七星今在張建星舊去黃道北半度今四度半天苑舊在昴畢今在胃昴王良舊五星在壁今四星在奎一星在壁外屏舊在觜今在畢宿雲雨舊在黃道外今在黃道內七度雷電舊在赤道外五度今在赤道內二度霹靂舊五星並在赤道外四度今四星在赤道內一星在外土公吏舊在赤道外今在赤道內六度虛梁舊在黃道內四度外屏舊在黃道外三度今當黃道八魁舊九星並在室今五星在壁四星在室長垣舊當黃道今在黃道北五度軍井準經在玉井東南二度半天椁舊在黃道北今當黃道天高舊在黃道外今當黃道狗國舊在黃道外今當黃道羅堰舊當黃道今在黃道北黃道春分之日與赤道交於奎五度太秋分之日交於軫十四度少冬至之日於斗十度去赤道南二十四度夏至之日於井十三度少去赤道北二十四度其赤道帶天之中用分列宿之度黃道斜運以明日月之行其冬至洛下閎起於牛初張衡等遷於斗度由每歲差分不及舊次也日晷周禮大司徒常以土圭之法測土深正日景以求地中日東則景夕多風日西則景朝多陰日至之景尺五寸謂之地中天地之所合也四時之所交也風雨之所會也陰陽之所合也然則百物阜安乃建王國焉鄭氏以為凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里地與星辰四游升降於三萬里之中是以半之得地之中焉鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城為然謹按南越志宋元嘉中南征林邑以五月立表望之日在表北影居表南交州日影覺北三寸林邑覺九寸一分所謂開北戶以向日也交州大略去洛九千餘里蓋水陸曲折非論圭表所度惟直考實其五千乎開元十二年詔太史交州測景夏至影表南長三寸三分與元嘉中所測大同然則距陽城而南使直路應弦至於日下蓋不盈五千里也測影使者大相元太云交州望極才出地二十餘度以八月自海中南望老人星殊高老人星下環星燦然其明大者甚衆圖所不載莫辨其名大率去南極二十度以上其星皆見乃古渾天家以為常沒地中伏而不見之所也又按貞觀中史官所載鐵勒回紇部在薛延之北去京師六千九百里又有骨利幹居回紇北方瀚海之北草多百藥地出名馬駿者行數百里北又距大海晝長而夕短既日沒後天色正曛一羊胛才熟而東方已曙蓋近日出入之所云凡此二事皆書契所未載也開元十二年太史監南宮說擇河南平地以水準繩樹八尺之表而以引度之始自滑州白馬縣北至之晷尺有五寸七分自滑州臺表南行一百九十八里百七十九步得汴州浚儀古臺表夏至影長一尺五寸微強又自浚儀而南百六十七里二百八十一步得許州扶溝縣表夏至影長一尺四寸四分又自扶溝而南一百六十里百一十步至豫州上蔡武津表夏至影長一尺三寸六分半大率五百二十六里二百七十步影差二寸有餘而先儒以為王畿千里影移一寸又乖舛而不同矣今以句股圖校之陽城北至之晷一尺四寸八分弱冬至之晷一丈二尺七寸一分半春秋分其長五尺四寸三分以覆矩斜視北極出地三十四度四分凡度分皆以十分為法自滑臺表視之高三十五度三分差陽城九分自浚儀表視之高三十四度八分差陽城四分自武津表視之高三十三度八分差陽城九分雖秒分稍有盈縮難以目校然大率五百二十六里二百七十步而北極差一度半三百五十一里八十步而差一度樞極之遠近不同則黃道之軌景固隨而遷變矣自此為率推之比歲朗州測影夏至長七寸七分冬至長一丈五寸三分春秋分四尺三寸七分半以圖測之定氣長四尺四寸七分按圖斜視北極出地二十九度半差陽城五度二分蔚州橫野軍測影夏至長二尺二寸九分冬至長一丈五尺八寸九分春秋分長六尺四寸四分半以圖測之定氣六尺六寸三分半按圖斜視北極出地四十度差陽城五度二分凡南北之差十度半其徑三千六百八十里九十步自陽城至朗州一千八百二十六里百九十六步自陽城至蔚州橫野軍一千八百六十一里二百一十四步北至之晷差一尺五寸三分自陽城至朗州差七寸二分自陽城至橫野軍差八寸南至之晷差五尺三寸六分自陽城至朗州差二尺一寸八分自陽城至橫野軍差三尺一寸八分率夏至與南方差少冬至與北方差多又以圖校安南日在天頂北二度四分北極高二十度四分冬至影長七尺九寸四分定春秋分影長二尺九寸三分差陽城十四度三分其徑五千二十三里至林邑國日在天頂北六度六分強北極之高十七度四分周圜三十五度常見不隱冬至影長六尺九寸其徑六千一百一十二里假令距陽城而北至鐵勒之地亦十七度四分合與林邑正等則五月日在天頂南二十七度四分北極之高五十二度周圜一百四度常見不隱北至之晷四尺一寸三分南至之晷二丈九尺二寸六分定春秋分影長九尺八寸七分北方其沒地才十五度餘昏伏於亥之正西晨見於丑之正東以里數推之已在回紇之北又南距洛陽九千八百一十里則五月極長之日其夕常明然則骨利幹猶在其南矣又先儒以南戴日下萬五千里為句股邪射陽城為弦考周徑之率以揆天度當一千四百六里二十四步有餘今測日影距陽城五千餘里已居戴日之南則一度之廣皆宜三分去二計南北極相去才八萬餘里其徑五萬餘里宇宙之廣豈若是乎然則王蕃所傳蓋以管窺天以蠡測海之義也古人所以恃句股之術謂其有徵於近事顧未知目視不能遠浸成微分之差其差不已遂與術錯如人游於大湖廣不盈百里而覩日月朝夕出入湖中及其浮于巨海不知幾千萬里猶覩日月朝出其中夕入其中若於朝夕之際俱設重差而望之必將小大同術而不可分矣夫橫既有之縱亦宜然假令設兩表南北相距十里其崇皆數十里若置火炬於南表之端而植八尺之木於其下則當無影試從南表之下仰望北表之端必將積微分之差漸與南表參合表首參合則置炬於其上亦當無影矣又置火炬於北表之端而植八尺之木於其下則當無影試從北表之下仰望南表之端又將積微分之差漸與北表參合表首參合則置炬於其上亦當無影矣復於二表之間相距各五里更植八尺之木仰而望之則表首環屈而相會若置火炬於兩表之端皆當無影夫數十里之高與十里之廣然則邪射之影與仰望不殊今欲求其影差以推遠近高下猶尚不可知也而況稽周天積里之數於不測之中又可必乎假令學者因二十里之高以立句股之術尚不知其所以然況八尺之木乎原人所以步圭景之意將欲節宣和氣輔相物宜而不在於辰次之周徑其所以重曆數之意將欲敬授人時欽若乾象而不在於渾蓋之是非若乃述無稽之談於視聽之所不及則君子闕疑而不質仲尼慎言而不論也而或者各守所傳之器以述天體謂渾元可任數而測大象可運算而窺終以六家之說迭為矛盾今誠以為蓋天則南方之度漸狹以為渾天則北方之極浸高此二者又渾蓋之家未能有以通其說也由是而觀則王仲任葛稚川之徒區區於異同之辨何益人倫之化哉又凡日晷差冬夏至不同南北亦異而先儒一以里數齊之喪其事實沙門一行因修大衍圖更為覆矩圖自丹穴以暨幽都之地凡為圖二十四以考日蝕之分數知夜漏之短長今載諸州測景尺寸如左林邑國北極高十七度四分冬至影在表北六尺九寸定春秋分影在表北二尺八寸五分夏至影在表南五寸七分安南都護府北極高二十六度六分冬至影在表北七尺九寸四分定春秋分影在表北二尺九寸三分夏至影在表南三寸三分朗州武陵縣北極高二十九度五分冬至影在表北一丈五寸三分定春秋分影在表北四尺三寸七分半夏至影在表北七寸七分襄州恆春分影在表北四尺八寸