body:
  text: 舊唐書卷一百八十五下列傳第一百三十五下良吏下裴懷古張知謇兄知玄知晦弟知泰知默楊元琰倪若水李濬陽嶠宋慶禮姜師度強循和逢堯潘好禮楊茂謙楊瑒崔隱甫李尚隱呂諲蕭定蔣沇薛王玉李惠登任迪簡范傳正袁滋薛蘋閻濟美裴懷古壽州壽春人也儀鳳中詣闕上書授下邽主簿長壽中纍轉監察御史時姚巂蠻首反叛詔懷古往招輯之懷古申明賞罰賊徒歸附者日以千數乃俘其魁首處其居人而還蠻夷荷恩立碑頌德時恆州鹿泉寺僧淨滿為弟子所謀密畫女人居高樓仍作淨滿引弓而射之藏於經笥已而詣闕上言僧咒詛大逆不道則天命懷古按問誅之懷古究其辭狀釋淨滿以聞則天大怒懷古奏曰陛下法無親疏當與天下畫一豈使臣誅無辜之人以希聖旨向使淨滿有不臣之狀臣復何顏能寬之乎臣今慎守平典雖死無恨也則天意乃解聖曆中閻知微充使往突厥懷古監其軍至虜庭默啜立知微為南面可汗將授懷古僞職懷古不從將殺之懷古抗辭曰寧守忠以就死不毀節以求生請就斬所不避也乃禁錮隨軍因挺身奔竄以歸拜祠部員外郎時姚巂蠻首相率詣闕頌懷古綏撫之狀請為牧守以撫之遂授姚州都督以疾不行轉司封郎中時始安賊歐陽倩擁徒數萬剽陷州縣授懷古桂州都督仍充招慰討擊使才及嶺飛書招誘示以禍福賊徒迎降自陳為吏人侵逼乃舉兵耳懷古知其誠懇乃輕騎以赴之左右曰夷獠難親未可信也懷古曰吾仗忠信可通於神明況於人乎因造其營以慰諭之羣賊喜悅歸其所掠財貨納於公府諸洞酋長素持兩端者盡來款附嶺外悉定復歷相州刺史並州大都督府長史所在為人吏所慕神龍中遷左羽林大將軍行未達都復授並州長史吏人聞懷古還老幼相攜郊野歡迎時崔宣道代懷古為並州下車而罷出郊以候懷古懷古恐傷宣道之意命官吏驅逐出迎之人而百姓奔赴愈衆其為人所思如此俄轉幽州都督徵為左威衛大將軍尋卒張知謇蒲州河東人也徙家于岐少與兄知玄知晦弟知泰知默五人勵志讀書皆以明經擢第儀質瓌偉眉目疏朗曉於玄理清介自守故當時名公爭引薦之遞歷畿赤知謇知泰知默調露後又歷臺省知謇天授後歷房和舒延德定稷晉洺宣貝十一州刺史所涖有威嚴人不敢犯通天中知泰為洛州司馬知默為秋官郎中知謇自德州入計則天重其才幹又目其狀貌過人命畫工寫之以賜其本曰人或有才未必有貌卿家昆弟可謂兩絶時人稱之尋以知泰為夏官地官侍郎益州長史中臺右丞初知謇為房州時中宗以廬陵王安置房州制約甚急知謇與董玄質崔敬嗣相次為刺史皆保護供擬豐贍中宗德之及神龍元年中宗踐極自貝州追知謇為左衛將軍加雲麾將軍封范陽郡公知泰自兵部侍郎授右御史大夫加銀青光祿大夫進封漁陽郡公鬚髮華皓同貴於朝時望甚美之知泰以忤武三思出為并州刺史天平軍使仍帶本官尋又為魏州刺史景龍二年卒優詔褒贈諡曰定時知謇為洛州長史東都副留守又歷左右羽林大將軍同華州刺史大理卿致仕開元中卒年八十知謇敏於從政性亮直不喜有請託求進無才而冒位者故子姪經義不精不許論舉知默嘗與來俊臣周興等同掌詔獄陷於酷吏子孫禁錮知泰開元中纍贈刑部尚書特進知玄子景升知泰子景佚開元中皆至大官門列棨戟楊元琰虢州閿鄉人隋禮部尚書希曾孫也初生時數歲不能言相者曰語遲者神定此必成大器也及長偉姿儀以器局見稱初為平棘令號為善政載初中纍遷安南副都護又歷蘄蒲晉魏宣許六州刺史涼梁二都督荊府長史前後九度清白升進纍降璽書褒美長安中張柬之代元琰為荊州長史與元琰泛江中流言及則天革命議諸武擅權之狀元琰發言慷慨有匡復之意及柬之知政事奏引元琰為右羽林將軍至都柬之謂曰記昔江中之言乎今日之授意不細也乃結元琰與李多祚等定計誅張易之兄弟及事成加雲麾將軍封弘農郡公食實封五百戶仍賜鐵券恕十死俄而張柬之敬暉等為武三思所構元琰覺變奏請削髮出家仍辭官爵實封中宗不許敬暉聞而笑曰向不知奏請出家合贊成其事剃却胡頭豈不妙也元琰多鬚類胡暉以此言戲之元琰曰功成名遂不退將危此由衷之請不徒然也暉知其意瞿然不悅及暉等得罪元琰竟以先覺獲全尋加金紫光祿大夫轉衛尉卿明年李多祚等被誅元琰以曾與多祚同立功亦被繫獄問狀賴中書侍郎蕭至忠保明之竟得免罪又轉光祿卿景雲中抗疏請削在身宮爵回贈父官中宗許之乃追贈其父越州長史睿宗即位三遷刑部尚書改封魏國公開元初拜太子賓客致仕六年卒于家年七十九子仲嗣密州刺史仲昌吏部郎中倪若水恆州城人也開元初歷遷中書舍人尚書右丞出為汴州刺史政尚清靜人吏安之又增修孔子廟堂及州縣學舍勸勵生徒儒教甚盛河汴間稱詠不已四年玄宗令宦官往江南採鵁鶄等諸鳥路由汴州若水知之上表諫曰方今九夏時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕奇禽異鳥供園池之玩遠自江嶺達於京師水備舟船陸倦擔負飯之以魚肉間之以稻梁道路觀者豈不以陛下賤人貴鳥也陛下方當以鳳皇為凡鳥麒麟為凡獸即鵁鶄鸂曷足貴也陛下昔潛龍藩邸備歷艱虞今氛祲廓清高居九五玉帛子女充於後庭職貢珍奇盈於內府過此之外復何求哉臣承國厚恩超居重任草芥賤命常欲殺身以效忠葵藿微心常願隳肝以報主瞻望庭闕敢布腹心直言忤旨甘從鼎鑊手詔答曰朕先使人取少雜鳥其使不識朕意採鳥稍多卿具奏其事辭誠忠懇深稱朕意卿達識周材義方敬直故輟綱轄之重委以方面之權果能間邪存誠守節彌固骨鯁忠烈遇事無隱言念忠讜深用嘉慰使人朕已量事決罰禽鳥並令放訖今賜卿物四十段用答至言尋入拜戶部侍郎七年復授尚書右丞卒李濬隴西人祖世武睿宗即位加銀青光祿大夫上在東宮選為太子中允又出為麟州刺史政有能名開元初置諸道按察使盛選能吏授濬潤州刺史江東按察使纍封真源縣子州人孫處玄以學行著名濬特加禮異纍表薦之仍令子麟與之結交處玄竟稱疾不起濬尋拜虢潞二州刺史又拜益州長史劍南節度使攝御史大夫所歷皆以誠信待物稱為良吏及去職咸有遺愛八年卒官贈戶部尚書諡曰成子麟自有傳陽嶠河南洛陽人其先自北平徙焉北齊右僕射休之玄孫也儀鳳中應八科舉授將陵尉纍遷詹事司直長安中桓彥範為左御史中丞袁恕己為右御史中丞爭薦嶠請引為御史內史楊再思素與嶠善知嶠不樂搏擊之任謂彥範等曰聞其不情願如何彥範曰為官擇人豈待情願唯不情願者尤須與之所以長難進之風抑躁求之路再思然其言擢為右臺侍御史景龍末纍轉國子司業嶠恭謹好學有儒者之風又勤於政理循循善誘及在學司時人以為稱職奏修先聖廟及講堂因建碑前庭以紀崇儒之事睿宗即位拜尚書右丞時分建都督府以統外臺精擇良吏以嶠為涇州都督府尋停不行又歷魏州刺史充兗州都督荊州長史為本道按察使所在以清白聞魏州人詣闕割耳請嶠重臨其郡又除魏州刺史入為國子祭酒纍封北平伯薦尹知章范行恭趙玄默等為學官皆稱名儒時學徒漸弛嶠課率經業稍行鞭箠學生怨之頗有喧謗乃相率乘夜於街中毆之上聞而令所由杖殺無理者由是始息嶠素友悌撫孤姪如己子常謂人曰吾雖位登方伯而心不異於曩時一尉耳識者甚稱歎之尋以年老致仕卒於家諡曰敬宋慶禮洺州永年人舉明經授衛縣尉則天時侍御史桓彥範受詔於河北斷塞居庸嶽嶺五回等路以備突厥特召慶禮以謀其事慶禮雅有方略彥範甚禮之尋遷大理評事仍充嶺南採訪使時崖振等五州首領更相侵掠荒俗不安承前使人懼其炎瘴莫有到者慶禮躬至其境詢問風俗示以禍福於是安堵遂罷鎮兵五千人開元中纍遷貝州刺史仍為河北支度營田使初營州都督府置在柳城控帶奚契丹則天時都督趙文翽政理乖方兩蕃反叛攻陷州城其後移於幽州東二百里漁陽城安置開元五年奚契丹各款塞歸附玄宗欲復營州於舊城侍中宋璟固爭以為不可獨慶禮甚陳其利乃詔慶禮及太子詹事姜師度左驍衛將軍邵宏等充使更於柳城築營州城興役三旬而畢俄拜慶禮御史中丞兼檢校營州都督開屯田八十餘所追拔幽州及漁陽淄青等戶并招輯商胡為立店肆數年間營州倉廩頗實居人漸殷慶禮為政清嚴而勤於聽理所歷之處人吏不敢犯然好興功役多所改更嘗於邊險置穽立槍以邀賊路議者頗嗤其不切事也七年卒贈工部尚書太常博士張星議曰宋慶禮大剛則折至察無徒有事東北所亡萬計所謂害於而家凶於而國案諡法好巧自是曰專請諡曰專禮部員外郎張九齡駁曰慶禮在人苦節為國勞臣一行邊陲三十年所戶庭可樂彼獨安於傳遞稼穡為艱又能實於軍廩莫不服勞辱之事而匪懈其心守貞堅之規而自盡其力有一於此人之所難況營州者鎮彼戎夷扼喉斷臂逆則制其死命順則為其主人是稱樂都其來尚矣往緣趙翽作牧馭之非才自經隳廢便長寇孽故二十年間有事東鄙僵尸暴骨敗將覆軍蓋不可勝紀大明臨下聖謀獨斷恢祖宗之舊復大禹之跡以數千之役徒無甲兵之強衛指期遂往稟命而行於是量畚築執鼛鼓親總其役不愆所慮俾柳城為金湯之險林胡生腹心之疾蓋為此也尋而罷海運收歲儲邊亭晏然河朔無擾與夫興師之費轉輸之勞較其優劣孰為利害而云所亡萬計一何謬哉及契丹背誕之日懼我掎角之勢雖鼠穴自固而駒牧無侵蓋張皇彼都繄賴之力也安有踐其跡以制其實貶其諡以徇其虛採慮始之謗聲忘經遠之權利義非得所孰謂其可請以所議更下太常庶素行之迹可尋易名之典不墜者也星復執前議慶禮兄子辭玉又詣闕稱冤乃諡曰敬姜師度魏人也明經舉神龍初纍遷易州刺史兼御史中丞為河北道監察兼支度營田使師度勤於為政又有巧思頗知溝洫之利始於薊門之北漲水為溝以備奚契丹之寇又約魏武舊渠傍海穿漕號為平虜渠以避海艱糧運者至今利焉尋加銀青光祿大夫纍遷大理卿景雲二年轉司農卿開元初遷陝州刺史州西太原倉控兩京水陸二運常自倉車載米至河際然後登舟師度遂鑿地道自上注之便至水次所省萬計六年以蒲州為河中府拜師度為河中尹令其繕緝府寺先是安邑鹽池漸涸師度發卒開拓疏決水道置為鹽屯公私大收其利再遷同州刺史又於朝邑河西二縣界就古通靈陂擇地引雒水及堰黃河灌之以種稻田凡二千餘頃內置屯十餘所收獲萬計特加金紫光祿大夫尋遷將作大匠明年左拾遺劉彤上言請置鹽鐵之官收利以供國用則免重賦貧人使窮困者獲濟疏奏令宰相議其可否咸以為鹽鐵之利甚裨國用遂令師度與戶部侍郎強循並攝御史中丞與諸道按察使計會以收海內鹽鐵其後頗多沮議者事竟不行師度以十一年病卒年七十餘師度既好溝洫所在必發衆穿鑿雖時有不利而成功亦多先是太史令傅孝忠善占星緯時人為之語曰傅孝忠兩眼看天姜師度一心穿地傳之以為口實強循者鳳州人亦以吏幹知名官至大理卿又有和逢堯者岐州岐山人性詭譎有辭辨睿宗時突厥默啜請尚公主許之逢堯以御史中丞攝鴻臚卿充使報命既至虜庭默啜遣其大臣謂逢堯曰敕書送金鏤鞍檢乃銀胎金塗豈是天子意為是使人換却如此虛假公主必應非實請還信物罷和親之事遂策馬而去逢堯大呼命左右引馬回謂曰漢法重女壻令送鞍者祇取平安長久之義何必以金銀為升降耶若爾乃是可汗貪金而輕銀豈是重人而貴信默啜聞之曰承前漢使不敢如此不可輕也遂設宴備禮逢堯又說默啜令裹頭著紫衫南面再拜遣子隨逢堯入朝逢堯以奉使功驟遷戶部侍郎尋以附會太平公主左遷朗州司馬開元中纍轉柘州刺史卒于官潘好禮貝州宗城人少與鄉人孟溫禮楊茂謙為莫逆之友好禮舉明經纍授上蔡令理有異績擢為監察御史開元三年纍轉邠王府長史俄而邠王出為滑州刺史以好禮兼邠王府司馬知滑州事王欲有所遊觀好禮輒諫止之後王將鷹犬與家人出獵好禮聞而遮道請還王初不從好禮遂臥於馬前呼曰今正是農月王何得非時將此惡少狗馬踐暴禾稼縱樂以損於人請先踏殺司馬然後聽王所為也王漸懼謝之而還好禮尋遷豫州刺史為政孜孜而繁於細事人吏雖憚其清嚴亦厭其苛察其子請歸鄉預明經舉好禮謂曰國法須平汝若經業未精則不可妄求也乃自試其子經義未通好禮大怒集州僚笞而枷之立於州門以徇於衆俄坐事左遷溫州別駕卒好禮常自以直道不附於人又未嘗纍階勳服用粗陋形骸土木議者亦嫌其邀名楊茂謙者清河人竇懷貞初為清河令甚重之起家應制舉拜左拾遺出為臨洺令時洺州稱茂謙與清漳令馮元淑肥鄉令韋景駿皆有政理之聲茂謙以清白聞擢為祕書郎時竇懷貞為相數稱薦之由是歷遷大理正御史中丞開元初出為魏州刺史河北道按察使與司馬張懷玉本同鄉曲初善而末隙遂相糾訐坐貶桂州都督尋轉廣州都督以疾卒楊瑒華陰人高祖縉陳中書舍人以辭學知名陳亡始自江左徙關中祖琮絳州刺史瑒初為麟遊令時御史大夫竇懷貞檢校造金仙玉真二觀移牒近縣徵百姓所隱逆人資財以充觀用瑒拒而不受懷貞怒曰焉有縣令卑微敢拒大夫之命乎瑒曰所論為人冤抑不知計位高卑懷貞壯其對又中宗時韋庶人上表請以年二十二為丁限及韋氏敗省司舉徵租調瑒執曰韋庶人臨朝當國制書非一或進階卿士或赦宥罪人何獨於已役中男重徵丁課恐非保人之術省司遂依瑒所執一切免之瑒由是知名擢拜殿中侍御史開元初遷侍御史時崔日知為京兆尹貪暴犯法瑒與御史大夫李傑將糾劾之傑反為日知所構瑒廷奏曰糾彈之司若遭恐脅以成姦人之謀御史臺固可廢矣上以其言切直遽令傑依舊視事貶日知為歙縣丞瑒歷遷御史中丞戶部侍郎上曾於延英殿召中書門下與諸司尚書及瑒議戶口之事瑒因奏人間損益甚見嗟賞時御史中丞宇文融奏括戶口議者或以為不便敕百僚省中集議時融方在權要公卿已下多雷同融議瑒獨與盡理爭之尋出為華州刺史十六年遷國子祭酒表薦滄州人王迥質瀛州人尹子路汴州人白履忠皆經學優長德行純茂堪為後生師範請追授學官令其教授以奬儒學之路及追至迥質起家拜諫議大夫仍為皇太子侍讀履忠以年老不任職事拜朝散大夫放歸家子路直弘文館教授瑒又奏曰竊見今之舉明經者主司不詳其述作之意曲求其文句之難每至帖試必取年頭月日孤經絶句且今之明經習左傳者十無二三若此久行臣恐左氏之學廢無日矣臣望請自今已後考試者盡帖平文以存大典又周禮儀禮及公羊穀梁殆將廢絶若無甄異恐後代便棄望請能通周儀禮公羊穀梁者亦量加優奬於是下制明經習左氏及通周禮等四經者出身免任散官遂著於式由是生徒為瑒立頌於學門之外再遷大理卿以老疾辭職二十三年拜左散騎常侍尋卒贈戶部尚書諡曰貞瑒常嘆儀禮廢絶雖士大夫不能行之其家子女婚冠及有吉凶之會皆按據舊文更為儀注使長幼遵行焉崔隱甫貝州武城人散騎侍郎儦之曾孫也祖濟太子洗馬父元彥太平令隱甫開元初再遷洛陽令理有威名九年自華州刺史轉太原尹人吏刊石頌其美政十二年入為河南尹十四年代程行諶為御史大夫時中書令張說當朝用事隱甫與御史中丞宇文融李林甫劾其犯狀說遂罷知政事隱甫在職強正無所回避自貞觀年李乾祐為御史大夫別置臺獄有所鞫訊便輒繫之由是自中丞侍御史已下各自禁人牢扉常滿隱甫引故事奏以為不便遂掘去之又憲司故事大夫已下至監察御史競為官政略無承稟隱甫一切督責事無大小悉令咨決稍有忤意者便列上其罪前後貶黜者殆半羣僚側目是冬敕隱甫校外官考舊例皆委細參問經春未定隱甫召天下朝集使一時集省中一日校考便畢時人伏其敏斷帝嘗謂曰卿為御史大夫海內咸云稱職甚副朕之所委也隱甫既與張說有隙俄又遞為朋黨帝聞而惡之特免官令歸侍母歲餘復授御史大夫遷刑部尚書母憂去官二十一年起復太原尹仍為河東採訪處置使復為刑部尚書兼河南尹二十四年車駕還京以隱甫為東都留守為政嚴肅甚為人吏之所嘆服尋卒李尚隱其先趙郡人世居潞州之銅鞮近又徙家京兆之萬年弱冠明經纍舉補下邽主簿時姚珽為同州刺史甚禮之景龍中為左臺監察御史時中書侍郎知吏部選事崔湜及吏部侍郎鄭愔同時典選傾附勢要逆用三年員闕士庶嗟怨尋而相次知政事尚隱與同列御史李懷讓於殿廷劾之湜等遂下獄推究竟貶黜之時又有睦州刺史馮昭泰誣奏桐廬令李師等二百餘家稱其妖逆詔御史按覆之諸御史憚昭泰剛愎皆稱病不敢往尚隱嘆曰豈可使良善陷枉刑而不為申明哉遂越次請往竟推雪李師等奏免之俄而崔湜鄭愔等復用尚隱自殿中侍御史出為伊闕令懷讓為魏縣令湜等既死尚隱又自定州司馬擢拜吏部員外郎懷讓自河陽令擢拜兵部員外郎尚隱纍遷御史中丞時御史王旭頗用威權為士庶所患會為讎者所訟尚隱按之無所容貸獲其姦贓巨萬旭遂得罪尚隱尋轉兵部侍郎再遷河南尹尚隱性率剛直言無所隱處事明斷其御下豁如也又詳練故事近年制敕皆暗記之所在稱為良吏十三年夏妖賊劉定高夜犯通洛門尚隱坐不能覺察所部左遷桂州都督臨行帝使謂之曰知卿公忠然國法須爾因賜雜綵百匹以慰之俄又遷廣州都督仍充五府經略使及去任有懷金以贈尚隱者尚隱固辭之曰吾自性分不可改易非為慎四知也竟不受之纍轉京兆尹歷蒲華二州刺史加銀青光祿大夫賜爵高邑伯入為大理卿代王鉷為御史大夫時司農卿陳思問多引小人為其屬吏隱盜錢穀積至纍萬尚隱又舉按之思問遂流嶺南而死尚隱三為憲官輒去朝廷之所惡者時議甚以此稱之二十四年拜戶部尚書東都留守二十八年轉太子賓客尋卒年七十五諡曰貞呂諲蒲州河東人志行修整勤於學業少孤貧不能自振里人程楚賓家富於財諲娶其女楚賓及子震皆重其才厚與資給遂遊京師天寶初進士及第調授寧陵尉本道採訪使韋陟嘉其才辟為支使隴右河西節度使哥舒翰奏充度支判官纍兼衛佐太子通事舍人諲性謹守勤於吏職雖同僚追賞而塊然視事不離案簿翰益親之纍兼虞部員外郎侍御史祿山之亂哥舒翰敗肅宗即位于靈武諲馳赴行在內官朱光輝李遵驟薦有才帝深遇之超拜御史中丞進奏無不允從幸鳳翔遷武部侍郎賜金紫之服十月克復兩京詔諲與三司官詳定陷賊官陳希烈已下數百人罪戾輕重諲用法太深君子薄之乾元二年三月以本官同中書門下平章事知門下省事七月丁母憂免十月起復授本官兼充度支使遷黃門侍郎上元元年正月加同中書門下三品賜門戟既立於第門或謂諲曰吉慶之事不宜凶服受之諲遂權釋縗麻當中而拜人皆笑其失禮纍加銀青光祿大夫東平男諲既為相用妻父程楚賓為衛尉少卿子震為員外郎中官馬上言出納詔命諲昵之有納賂於上言求官者諲補之藍田尉五月上言事泄笞死以其肉令從官食之諲坐貶太子賓客七月授諲荊州大都督府長史兼御史大夫充澧朗荊忠硤五州節度觀察處置等使諲至治所上言請於江陵置南都九月敕改荊州為江陵府永平軍團練三千人以遏吳蜀之衝又析江陵置長寧縣又請割潭衡連道邵郴涪等七州隸江陵府先是張惟一為荊州長史已為防禦使陳希昂為司馬希昂衡州酋帥家兵千人在部下自為藩衛有牟遂金仕至將軍為惟一親將與希昂積憾率兵入惟一衙索遂金之首惟一懼即令斬首與之自是軍政歸於希昂及諲至奏追希昂赴上都除侍御史出為常州刺史本州防禦使希昂路由江陵諲伏甲擊殺之部下皆斬積尸於府門府中懾服始奏其罪又妖人申泰芝以左道事李輔國擢為諫議大夫輔國奏於道州界置軍令泰芝為軍校誘引羣蠻納其金帛賞以緋紫用囊中敕書賜衣以示之人用聽信軍人例衣朱紫作剽磎洞吏不敢制已積年矣潭州刺史龐承鼎忿之因泰芝入奏至長沙縶之首贓巨萬及左道文記一時搜獲遣使奏聞輔國黨芝奏召泰芝赴闕既得召見具言承鼎曲加誣陷詔鞫承鼎誣罔之罪令荊南府按問諲令判官監察御史嚴郢鞫之諲上疏論其事肅宗怒流郢於建州承鼎竟得雪後泰芝竟以贓敗流死人重諲之守正其剛斷不撓皆此類也初諲作相與同列李揆不協及諲被斥二年以善政聞揆惡之因言置軍湖南不便又使人往荊湖密伺諲過諲知之乃上疏論揆揆坐貶袁州長史諲素羸疾元年建卯月卒贈吏部尚書有司諡曰肅故吏度支員外郎嚴郢請以二字曰忠肅博士獨孤及堅議以肅為當從之諲在台司無異稱及理江陵三年號為良守初郡人立祠諲歿後歲餘江陵將吏合錢十萬於府西爽塏地大立祠宇四時祠禱之蕭定字梅臣江南蘭陵人左僕射宋國公瑀曾孫也父恕虢州刺史以定贈工部尚書定以蔭授陝州參軍金城丞以吏事清幹聞給事中裴遵慶奏為選補黜陟使判官回改萬年主簿纍遷侍御史考功員外郎左右司二郎中為元載所擠出為祕書少監兼袁州刺史歷信湖宋睦潤五州刺史所涖有政聲大曆中有司條天下牧守課績唯定與常州刺史蕭復豪州刺史張鎰為理行第一其勤農桑均賦稅逋亡歸復戶口增加定又冠焉尋遷戶部侍郎太常卿朱泚之逆變姓名藏匿里閭間京師平首蒙旌擢除太子少師興元元年卒年七十七加贈太子太師蔣沇萊州膠水人吏部侍郎欽緒之子也性介獨好學早有名稱以孝廉纍授洛陽尉監察御史與兄演溶弟清俱以幹局吏事擅能名於天寶中長史韓朝宗裴迥咸以推覆檢勾之任委之處事平允剖斷精當動為羣僚楷式乾元後授陸渾盩厔咸陽高陵四縣令當軍旅之後瘡痍未平沇竭心綏撫所至安輯副元帥郭子儀每統兵由其縣必誡軍吏曰蔣沇令清而嚴幹供億故當有素士衆得蔬飯見饋則足無撓清政其為名人所知如此稍遷長安令刑部郎中兼侍御史領渭橋河運出納使時元載秉政廉潔守道者多不更職沇以故滯於郎位久不徙官大歷十二年常衮以羣議稱沇屈擢拜御史中丞東都副留守尋遷刑部侍郎刪定副使改大理卿持法明審號為稱職建中元年冬鑾駕幸奉天沇奔行在為賊候騎所拘執欲以僞職誘之因絶食稱病潛竄里閭間京師平首蒙旌擢拜右散騎常侍尋以疾終年七十四追贈工部尚書薛王玉字溫如河中寶鼎人祖寶胤邠州刺史父紘蒲州刺史王玉少以門蔭授懿德太子廟令纍授乾陵臺令無幾拜試太子中允兼渭南尉奏課第一間歲復以清名尤異聞遷昭德令縣人請立碑紀政王玉固讓不受遷楚州刺史本州營田使先是州營田宰相遙領使刺史得專達俸錢及他給百餘萬田官數百員奉廝役者三千戶歲以優授官者復十餘人王玉皆條去之十留一二而租入有贏為觀察使誣奏左授硤州刺史遷陳州刺史建中初上分命使臣黜陟官吏使淮南李承以王玉楚州之去煩政簡使山南趙贊以王玉硤州之廉清使河南盧翰以王玉之肅物皆以陟狀聞加中散大夫賜紫宣武軍節度使劉玄佐署奏兼御史大夫汴宋都統行軍司馬無幾李希烈自汴州走除王玉汴州刺史遷河南尹入為司農卿當是時詔天下舉可任刺史縣令者殆有百人有詔令與羣官詢考及延問人間疾苦及胥吏得失取其有惻隱通達事理者條舉什才一二宰相將以辭策校之王玉曰求良吏不可兼責以文學宜以聖君愛人之本為心執政卒無難之皆進官頗多稱職貞元五年拜京兆尹王玉剛嚴明察練達法理以勤身率下失於纖巧無文學大體八年坐竇參改太子賓客無幾除嶺南節度觀察使以疾卒年七十四廢朝一日贈工部尚書有子存慶自有傳李惠登平盧人也少為平盧裨將安祿山反遂從兵馬使董秦海轉收滄棣等州輕師遠鬬賊不能支史思明反復陷于賊脫身投山南節度使來瑱奏授試金吾衛將軍李希烈反授惠登兵二千鎮隨州貞元初舉州歸順授隨州刺史兼御史中丞遭李忠臣希烈殲殘之後野曠無人惠登朴素不知學居官無枯葉率心為政皆與理順利人者因行之病人者因去之二十年間田疇闢戶口加諸州奏吏入其境無不歌謠其能及于為山南東道節度以其績上聞加御史大夫升其州為上尋加檢校國子祭酒及卒加贈洪州都督任迪簡京兆萬年人舉進士初為天德軍使李景略判官性重厚嘗有軍宴行酒者誤以醯進迪簡知誤以景略性嚴慮坐主酒者乃勉飲盡之而僞容其過以酒薄白景略請換之於是軍中皆感悅及景略卒衆以迪簡長者議請為帥監軍使聞之拘迪簡於別室軍衆連呼而至發戶扃取之表聞德宗使察焉具以軍情奏除豐州刺史天德軍使自殿中授兼御史大夫再加常侍追入拜太常少卿汝州刺史左庶子及張茂昭去易定以迪簡為行軍司馬既至屬虞候楊伯玉以府城叛俄而衆殺之將納迪簡兵馬使張佐元又叛迪簡攻殺之乃得入尋加檢校工部尚書充節度使初茂昭奢蕩不節公私殫罄迪簡至欲饗士無所取給乃以糲食與士同之身居戟門下凡周月軍吏感之請歸堂寢迪簡乃安其位三年以疾代除工部侍郎至京竟不能朝謝改太子賓客卒贈刑部尚書范傳正字西老南陽順陽人也父倫戶部員外郎與郡人李華敦交友之契傳正舉進士又以博學宏辭及書判皆登甲科授集賢殿校書郎渭南尉拜監察殿中侍御史自比部員外郎出為歙州刺史轉湖州刺史歷三郡以政事修理聞擢為宣歙觀察使受代至京師憲宗聞其里第過侈薄之因拜光祿卿以風恙卒贈左散騎常侍傳正精悍有立好古自飭及為廉察頗事奢侈厚以財貨問遺權貴視公蓄如私藏幸而不至甚敗褐衣時遊西邊著西陲要略三卷袁滋字德深陳郡汝南人也弱歲強學以外兄道州刺史元結有重名往來依焉每讀書玄解旨奧結甚重之無何黜陟使趙贊以處士薦授試校書郎何士幹鎮武昌辟為從事纍官詹事府司直部有邑長下吏誣以盜金滋察其冤竟出之御史中丞韋縚聞之薦為侍御史轉工部員外郎貞元十九年韋臯始通西南蠻夷酋長異牟尋貢琛請使朝廷方命撫諭選郎吏可行者皆以西南遐遠憚之滋獨不辭德宗甚嘉之以本官兼御史中丞持節充入南詔使未行遷祠部郎中使如故來年夏使還擢為諫議大夫俄拜尚書右丞知吏部選事出為華州刺史兼御史中丞潼關防禦使鎮國軍使以寬易清簡為政百姓有至自他境者皆給地以居名其居曰義合里專以慈惠為本人甚愛之然百姓有過犯者皆縱而不理擒盜輒捨或以物償之徵拜金吾衛大將軍耆耋魚衆寡遮道不得進楊於陵代其任宣言謂百姓曰於陵不敢易袁公之政然後羅拜而訣上始監國與杜黃裳俱為相拜中書侍郎平章事會韋臯歿劉闢擁兵擅命滋持節安撫行及中路拜檢校吏部尚書平章事劍南西川節度使賊兵方熾滋懼而不進貶吉州刺史俄拜義成軍節度使百姓立生祠禱之徵拜戶部尚書連為荊襄二帥改彰義軍節度隨唐鄧申光等州觀察使逆賊吳元濟與官軍對壘者數年滋竟以淹留無功貶撫州刺史未幾遷湖南觀察使卒年七十贈太子少保滋工篆籀書雅有古法因使行著雲南記五卷嘗讀劉暉悲甘陵賦嘆其褒善懲惡雖失春秋之旨然其文不可廢因著甘陵賦後序子都仕至翰林學士薛蘋河東寶鼎人也少以吏事進纍官至長安令拜虢州刺史朝廷以尤課擢為湖南觀察使又遷浙江東道觀察使以理行遷浙江西道觀察使廉風俗守法度人甚安之理身儉薄嘗衣一緑袍十餘年不易因加賜朱紱然後解去蘋歷三鎮凡十餘年家無聲樂俸祿悉以散諸親族故人子弟除左散騎常侍致仕時有年過懸車而不知止者雖蘋年至而無疾請告角巾東洛時甚高之卒年七十四贈工部尚書閻濟美登進士第纍歷臺省有長者之譽自婺州刺史為福建觀察使復為潤州刺史浙西觀察使所至以簡淡為理兩地之人常賦之外不知其他入拜右散騎常侍華州刺史潼關防禦鎮國軍使入為祕書監以年及懸車上表乞骸骨以工部尚書致仕後以恩例纍有進改及歿于家年九十餘贊曰聖人造世才傑濟時在理致治無為而為坑隉非議簡易從規樂只君子邦家之基
