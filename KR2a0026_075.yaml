body:
  text: 舊唐書卷七十一列傳第二十一魏徵魏徵字玄成巨鹿曲城人也父長賢北齊屯留令徵少孤貧落拓有大志不事生業出家為道士好讀書多所通涉見天下漸亂尤屬意縱橫之説大業末武陽郡丞元寶藏舉兵以應李密召徵使典書記密每見寶藏之疏未嘗不稱善既聞徵所為遽使召之徵進十策以干密雖奇之而不能用及王世充攻密於洛口徵説密長史鄭頲曰魏公雖驟勝而驍將鋭卒死傷多矣又軍無府庫有功不賞戰士心惰此二者難以應敵未若深溝高壘曠日持久不過旬月敵人糧盡可不戰而退追而擊之取勝之道且東都食盡世充計窮意欲死戰可謂窮寇難與爭鋒請慎無與戰頲曰此老生之常談耳徵曰此乃奇謀深策何謂常談因拂衣而去及密敗徵隨密來降至京師久不見知自請安輯山東乃授祕書丞驅傳至黎陽時徐世績尚為李密擁衆徵與世績書曰自隋末亂離羣雄競逐跨州連郡不可勝數魏公起自叛徒奮臂大呼四方響應萬里風馳雲合霧聚衆數十萬威之所被將半天下破世充于洛口摧化及於黎山方欲西蹈咸陽北淩玄闕揚旌瀚海飲馬渭川翻以百勝之威敗於奔亡之虜固知神器之重自有所歸不可以力爭是以魏公思皇天之乃眷入函谷而不疑公生于擾攘之時感知己之遇根本已拔確乎不動鳩合遺散據守一隅世充以乘勝餘勇息其東略建德因侮亡之勢不敢南謀公之英聲足以振于今古然誰無善始終之慮難去就之機安危大節若策名得地則九族蔭其餘輝委質非人則一身不能自保殷鑒不遠公所聞見孟賁猶豫童子先之知幾其神不俟終日今公處必爭之地秉宜速之機更事遲疑坐觀成敗恐凶狡之輩先人生心則公之事去矣世績得書遂定計遣使歸國開倉運糧以餽淮安王神通之軍俄而建德悉衆南下攻陷黎陽獲徵署為起居舍人及建德就擒與裴矩西入關隱太子聞其名引直洗馬甚禮之徵見太宗勳業日隆每勸建成早為之所及敗太宗使召之謂曰汝離間我兄弟何也徵曰皇太子若從徵言必無今日之禍太宗素器之引為詹事主簿及踐祚擢拜諫議大夫封巨鹿縣男使安輯河北許以便宜從事徵至磁州遇前宮千牛李志安齊王護軍李思行錮送詣京師徵謂副使李桐客曰吾等受命之日前宮齊府左右皆令赦原不問今復送思行此外誰不自疑徒遣使往彼必不信此乃差之毫釐失之千里且公家之利知無不為寧可慮身不可廢國家大計今若釋遣思行不問其罪則信義所感無遠不臻古者大夫出疆苟利社稷專之可也況今日之行許以便宜從事主上既以國士見待安可不以國士報之乎既釋遣思行等仍以啓聞太宗甚悅太宗新即位勵精政道數引徵入臥內訪以得失徵雅有經國之才性又抗直無所屈撓太宗與之言未嘗不欣然納受徵亦喜逢知己之主思竭其用知無不言太宗嘗勞之曰卿所陳諫前後二百餘事非卿至誠奉國何能若是其年遷尚書左丞或有言徵阿黨親戚者帝使御史大夫溫彥博案驗無狀彥博奏曰徵為人臣須存形迹不能遠避嫌疑遂招此謗雖情在無私亦有可責帝令彥博讓徵且曰自今後不得不存形迹他日徵入奏曰臣聞君臣協契義同一體不存公道唯事形迹若君臣上下同遵此路則邦之興喪或未可知帝瞿然改容曰吾已悔之徵再拜曰願陛下使臣為良臣勿使臣為忠臣帝曰忠良有異乎徵曰良臣稷契咎陶是也忠臣龍逢比干是也良臣使身獲美名君受顯號子孫傳世福祿無疆忠臣身受誅夷君陷大惡家國並喪空有其名以此而言相去遠矣帝深納其言賜絹五百匹貞觀二年遷祕書監參預朝政徵以喪亂之後典章紛雜奏引學者校定四部書數年之間祕府圖籍粲然畢備時高昌王麴文泰將入朝西域諸國咸欲因文泰遣使貢獻太宗令文泰使人厭怛紇干往迎接之徵諫曰中國始平瘡痍未復若微有勞役則不自安往年文泰入朝所經州縣猶不能供況加於此輩若任其商賈來往邊人則獲其利若為賓客中國即受其弊矣漢建武二十二年天下已寧西域請置都護送侍子光武不許蓋不以蠻夷勞弊中國也今若許十國入貢其使不下千人欲使緣邊諸州何以取濟人心萬端後雖悔之恐無所及上善其議時厭怛紇干已發遽追止之後太宗幸九成宮因有宮人還京憩於湋川縣之官舍俄又右僕射李靖侍中王圭繼至官屬移宮人於別所而舍靖等太宗聞之怒曰威福之柄豈由靖等何為禮靖而輕我宮人即令案驗湋川官屬及靖等徵諫曰靖等陛下心膂大臣宮人皇后掃除之隸論其委付事理不同又靖等出外官吏訪朝廷法式歸來陛下問人間疾苦靖等自當與官吏相見官吏亦不可不謁也至於宮人供食之外不合參承若以此罪責縣吏恐不益德音徒駭天下耳目帝曰公言是也乃釋官吏之罪李靖等亦寢而不問尋宴於丹霄樓酒酣太宗謂長孫無忌曰魏徵王圭昔在東宮盡心所事當時誠亦可惡我能拔擢用之以至今日足為無愧古人然徵每諫我不從發言輒即不應何也對曰臣以事有不可所以陳論若不從輒應便恐此事即行帝曰但當時且應更別陳論豈不得耶徵曰昔舜誡羣臣爾無面從退有後言若臣面從陛下方始諫此即退有後言豈是稷契事堯舜之意耶帝大笑曰人言魏徵舉動疏慢我但覺嫵媚適為此耳徵拜謝曰陛下導之使言臣所以敢諫若陛下不受臣諫豈敢數犯龍鱗是月長樂公主將出降帝以皇后所生敕有司資送倍於永嘉長公主徵曰不可昔漢明欲封其子云我子豈與先帝子等可半楚淮陽前史以為美談天子姊妹為長公主子為公主既加長字即是有所尊崇或可情有淺深無容禮相踰越上然其言入告長孫皇后后遣使齎錢四十萬絹四百匹詣徵宅以賜之尋進爵郡公七年代王圭為侍中尚書省滯訟有不決者詔徵評理之徵性非習法但存大體以情處斷無不悅服初有詔遣令狐德棻岑文本撰周史孔穎達許敬宗撰隋史姚思廉撰梁陳史李百藥撰齊史徵受詔總加撰定多所損益務存簡正隋史序論皆徵所作梁陳齊各為總論時稱良史史成加左光祿大夫進封鄭國公賜物二千段徵自以無功於國徒以辨説遂參帷幄深懼滿盈後以目疾頻表遜位太宗曰朕拔卿於讎虜之中任公以樞要之職見朕之非未嘗不諫公獨不見金之在礦也何足貴哉良冶鍛而為器便為人所寶朕方自比於金以卿為良匠卿雖有疾未為衰老豈得便爾其年徵又面請遜位太宗難違之乃拜徵特進仍知門下事其後又頻上四疏以陳得失其一曰臣觀自古受圖膺運繼體守文控御英傑南面臨下皆欲配厚德於天地齊高明於日月本枝百代傳祚無窮然而克終者鮮敗亡相繼其故何哉所以求之失其道也殷鑒不遠可得而言昔在有隋統一寰宇甲兵強盛三十餘年風行萬里威動殊俗一旦舉而棄之盡為他人之有彼煬帝豈惡天下之治安不欲社稷之長久故行桀虐以就滅亡哉恃其富強不虞後患驅天下以從欲罄萬物以自奉採域中之子女求遠方之奇異宮宇是飾臺榭是崇徭役無時干戈不戢外示威重內多險忌讒邪者必受其福忠正者莫保其生上下相蒙君臣道隔人不堪命率土分崩遂以四海之尊殞於匹夫之手子孫殄滅為天下笑深可痛哉聖哲乘機拯其危溺八柱傾而復正四維絶而更張遠肅邇安不踰於期月勝殘去殺無待於百年今宮觀臺榭盡居之矣奇珍異物盡收之矣姬薑淑媛盡侍於側矣四海九州盡為臣妾矣若能鑒彼之所以亡念我之所以得日慎一日雖休勿休焚鹿臺之寶衣毀阿房之廣殿懼危亡於峻宇思安處於卑宮則神化潛通無為而理德之上也若成功不毀即仍其舊除其不急損之又損雜茅茨於桂棟參玉砌以土階悅以使人不竭其力常念居之者逸作之者勞億兆悅以子來羣生仰而遂性德之次也若惟聖罔念不慎厥終忘締構之艱難謂天命之可恃忽采椽之恭儉追雕牆之侈靡因其基以廣之增其舊而飾之觸類而長不思止足人不見德而勞役是聞斯為下矣譬之負薪救火揚湯止沸以亂易亂與亂同道莫可則也後嗣何觀則人怨神怒人怨神怒則災害必下而禍亂必作禍亂既作而能以身名令終者鮮矣順天革命之后隆七百之祚貽厥孫謀傳之萬世難得易失可不念哉其二曰臣聞求木之長者必固其根本欲流之遠者必浚其泉源思國之安者必積其德義源不深而豈望流之遠根不固而何求木之長德不厚而思國之治雖在下愚知其不可而況於明哲乎人君當神器之重居域中之大將崇極天之峻永保無疆之休不念於居安思危戒貪以儉德不處其厚情不勝其欲斯亦伐根以求木茂塞源而欲流長者也凡百元首承天景命莫不殷憂而道著功成而德衰有善始者實繁能克終者蓋寡豈其取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體傲物則骨肉為行路雖董之以嚴刑振之以威怒終苟免而不懷仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎奔車朽索其可忽乎君人者誠能見可欲則思知足以自戒將有所作則思知止以安人念高危則思謙沖而自牧懼滿溢則思江海而下百川樂盤遊則思三驅以為度恐懈怠則思慎始而敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罰所及則思無因怒而濫刑總此十思弘茲九德簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其惠信者效其忠文武爭馳君臣無事可以盡豫遊之樂可以養松喬之壽鳴琴垂拱不言而化何必勞神若思代下司職役聰明之耳目虧無為之大道哉其三曰臣聞書曰明德慎罰惟刑恤哉禮云為上易事為下易知則刑不煩矣上多疑則百姓惑下難知則君長勞矣夫上易事下易知君長不勞百姓不惑故君有一德臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康哉之詠斯起當今道被華夷功高宇宙無思不服無遠不臻然言尚於簡大志在於明察刑賞之本在乎勸善而懲惡帝王之所以與天下為畫一不以親疏貴賤而輕重者也今之刑賞未必盡然或申屈在乎好惡輕重由乎喜怒遇喜則矜其刑於法中逢怒則求其罪於事外所好則鑽皮出其毛羽所惡則洗垢求其瘢痕瘢痕可求則刑斯濫矣毛羽可出則賞典謬矣刑濫則小人道長賞謬則君子道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且夫暇豫清談皆敦尚於孔老威怒所至則取法於申韓直道而行非無三黜危人自安蓋亦多矣故道德之旨未弘刻薄之風已扇夫上風既扇則下生百端人競趨時則憲章不一稽之王度實虧君道昔州黎上下其手楚國之法遂差張湯輕重其心漢朝之刑以弊人臣之頗僻猶莫能申其欺罔況人君之高下將何以措其手足乎以睿聖之聰明無幽微而不燭豈神有所不達智有所不通哉安其所安不以恤刑為念樂其所樂遂忘先笑之變禍福相倚吉凶同域唯人所召安可不思頃者責罰稍多威怒微厲或以供給不贍或以人不從欲皆非致治之所急實乃驕奢之攸漸是知貴不與驕期而驕自來富不與奢期而奢自至非徒語也且我之所代實在有隋隋氏亂亡之源聖明之所臨照以隋氏之甲兵況當今之士馬以隋氏之府藏譬今日之資儲以隋氏之戶口校今時之百姓度長計大曾何等級然隋氏以富強而喪敗動之也我以貧寡而安寧靜之也靜之則安動之則亂人皆知之非隱而難見也微而難察也鮮蹈平易之塗多遵覆車之轍何哉在於安不思危治不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢動徭役不息至于身將戮辱竟未悟其滅亡之所由也可不哀哉夫鑒形之美惡必就於止水鑒國之安危必取於亡國詩曰殷鑒不遠在夏后之世又曰伐柯伐柯其則不遠臣願當今之動靜思隋氏以為鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣存亡之所在節嗜欲以從人省畋遊之娛息靡麗之作罷不急之務慎偏聽之怒近忠厚遠便佞杜悅耳之邪説聽苦口之忠言去易進之人賤難得之貨採堯舜之誹謗追禹湯之罪己惜十家之産順百姓之心近取諸身恕以待物思勞謙以受益不自滿以招損有動則庶類以和出言而千里斯應超上德於前載樹風聲於後昆此聖哲之宏規帝王之盛業能事斯畢在乎慎守而已夫守之則易取之實難既得其所以難豈不能保其所以易其或保之不固則驕奢淫泆動之也慎終如始可不勉歟易云君子安不忘危存不忘亡治不忘亂是以身安而國家可保誠哉斯言不可以不深察也伏惟陛下欲善之志不減於昔時聞過必改少虧於曩日若能以當今之無事行疇昔之恭儉則盡善盡美固無得而稱焉其四曰臣聞為國之基必資於德禮君子所保惟在於誠信誠信立則下無二心德禮形則遠人斯格然則德禮誠信國之大綱在於父子君臣不可斯須而廢也故孔子曰君使臣以禮臣事君以忠又曰自古皆有死人無信不立文子曰同言而信信在言前同令而行誠在令外然則言而不行言不信也令而不從令無誠也不信之言無誠之令為上則敗國為下則危身雖在顛沛之中君子所不為也自王道休明十有餘載威加海外萬國來庭倉廩日積土地日廣然而道德未益厚仁義未益博者何哉由乎待下之情未盡於誠信雖有善始之勤未覩克終之美故也其所由來者漸非一朝一夕之故昔貞觀之始聞善若驚暨五六年間猶悅以從諫自茲厥後漸惡直言雖或勉強時有所容非復曩時之豁如也謇諤之士稍避龍鱗便佞之徒肆其巧辨謂同心者為朋黨謂告訐者為至公謂強直者為擅權謂忠讜者為誹謗謂之朋黨雖忠信而可疑謂之至公雖矯偽而無咎強直者畏擅權之議忠讜者慮誹謗之尤至於竊斧生疑投杼致惑正人不得盡其言大臣莫能與之諍熒惑視聽鬱於大道妨化損德其在茲乎故孔子惡利口之覆邦家蓋為此也且君子小人貌同心異君子掩人之惡揚人之善臨難無苟免殺身以成仁小人不恥不仁不畏不義唯利之所在危人以自安夫苟在危人則何所不至今將求致治必委之於君子事有得失或訪之於小人其待君子也則敬而疏遇小人也必輕而狎狎則言無不盡疏則情或不通是譽毀在於小人刑罰加於君子實興喪所在亦安危所繫可不慎哉夫中智之人豈無小慧然才非經國慮不及遠雖竭力盡誠猶未免於傾敗況內懷姦利承顏順旨其為患禍不亦深乎故孔子曰君子或有不仁者焉未見小人而仁者然則君子不能無小惡惡不積無妨於正道小人或時有小善善不積不足以立忠今謂之善人矣復慮其有不信何異夫立直木而疑其影之不直乎雖竭精神勞思慮其不可亦已明矣夫君能盡禮臣得竭忠必在於內外無私上下相信上不信則無以使下下不信則無以事上信之為義大矣哉故自天祐之吉無不利昔齊桓公問於管仲曰吾欲酒腐於爵肉腐於俎得無害於霸乎管仲曰此極非其善者然亦無害霸也公曰何如而害霸乎曰不能知人害霸也知而不能用害霸也用而不能信害霸也既信而又使小人參之害霸也晉中行穆伯攻鼓經年而不能下餽間倫曰鼓之嗇夫間倫知之請無疲士大夫而鼓可得穆伯不應左右曰不折一戟不傷一卒而鼓可得君奚為不取穆伯曰間倫之為人也佞而不仁若間倫下之吾不可以不賞賞之是賞佞人也佞人得志是使晉國之士捨仁而為佞雖得鼓將何用之夫穆伯列國大夫管仲霸者之佐猶慎於信任遠避佞人也如此況乎為四海之大君應千齡之上聖而可使巍巍之盛德復將有所間然乎若欲令君子小人是非不雜必懷之以德待之以信厲之以義節之以禮然後善善而惡惡審罰而明賞則小人絶其佞邪君子自強不息無為之化何遠之有善善而不能進惡惡而不能去罰不及於有罪賞不加於有功則危亡之期或未可保永錫祚胤將何望哉太宗手詔嘉美優納之嘗謂長孫無忌曰朕即位之初上書者或言人主必須威權獨運不得委任羣下或欲耀兵振武懾服四夷唯有魏徵勸朕偃革興文布德施惠中國既安遠人自服朕從其語天下大寧絶域君長皆來朝貢九夷重譯相望於道此皆魏徵之力也太宗嘗嫌上封者衆不近事實欲加黜責徵奏曰古者立誹謗之木欲聞己過今之封事謗木之流也陛下思聞得失祇可恣其陳道若所言衷則有益於陛下若不衷無損於國家太宗曰此言是也並勞而遣之後太宗在洛陽宮幸積翠池宴羣臣酒酣各賦一事太宗賦尚書曰日昃玩百篇臨燈披五典夏康既逸豫商辛亦流湎恣情昏主多克己明君鮮滅身資纍惡成名由積善徵賦西漢曰受降臨軹道爭長趣鴻門驅傳渭橋上觀兵細柳屯夜宴經柏谷朝遊出杜原終藉叔孫禮方知皇帝尊太宗曰魏徵每言必約我以禮也尋以修定五禮當封一子為縣男請讓孤兄子叔慈太宗愴然曰卿之此心可以勵俗遂許之十二年禮部尚書王圭奏言三品以上遇親王於塗皆降乘違法申敬有乖儀準太宗曰卿輩皆自崇貴卑我兒子乎徵進曰自古迄茲親王班次三公之下今三品皆曰天子列卿及八座之長為王降乘非王所宜當也求諸故事則無可憑行之於今又乖國憲太宗曰國家所以立太子者擬以為君也然則人之修短不在老少設無太子則母弟次立以此而言安得輕我子耶徵曰殷家尚質有兄終弟及之義自周以降立嫡必長所以絶庶孽之窺覦塞禍亂之源本有國者之所深慎於是遂可圭奏會皇孫誕育召公卿賜宴太宗謂侍臣曰貞觀以前從我平定天下周旋艱險玄齡之功無所與讓貞觀之後盡心於我獻納忠讜安國利民犯顏正諫匡朕之違者唯魏徵而已古之名臣何以加也於是親解佩刀以賜二人徵以戴聖禮記編次不倫遂為類禮二十卷以類相從削其重復採先儒訓注擇善從之研精覃思數年而畢太宗覽而善之賜物一千段録數本以賜太子及諸王仍藏之祕府先是遣使詣西域立葉護可汗未還又遣使多齎金銀帛歷諸國巿馬徵諫曰今以立可汗為名可汗未定即詣諸國巿馬彼必以為意在巿馬不為專意立可汗可汗得立則不甚懷恩諸蕃聞之以為中國薄義重利未必得馬而失義矣昔漢文有獻千里馬者曰吾凶行日三十里吉行五十里鑾輿在前屬車在後吾獨乘千里馬將安之乃賞其道里所費而返之漢光武有獻千里馬及寶劍者馬以駕鼓車劍以賜騎士陛下凡所施為皆邈踰三王之上奈何至於此事欲為孝文光武之下乎又魏文帝欲求巿西域大珠蘇則曰若陛下惠及四海則不求自至求而得之不足為貴也陛下縱不能慕漢文之高行可不畏蘇則之言乎太宗納其言而止時公卿大臣並請封禪唯徵以為不可太宗曰朕欲卿極言之豈功不高耶德不厚耶諸夏未治安耶遠夷不慕義耶嘉瑞不至耶年穀不登耶何為而不可對曰陛下功則高矣而民未懷惠德雖厚矣而澤未滂流諸夏雖安未足以供事遠夷慕義無以供其求符瑞雖臻罻羅猶密積歲豐稔倉廩尚虛此臣所以竊謂未可臣未能遠譬且借喻於人今有人十年長患瘵治且愈此人應皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下為之良醫疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封萬國咸萃要荒之外莫不奔走今自伊洛以東暨乎海岱灌莽巨澤蒼茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻豈可引彼夷狄示以虛弱竭財以賞未厭遠人之望重加給復不償百姓之勞或遇水旱之災風雨之變庸夫橫議悔不可追豈獨臣之懇誠亦有輿人之誦太宗不能奪是後右僕射缺欲拜之徵固讓乃止及皇太子承乾不修德業魏王泰寵愛日隆內外庶僚並有疑議太宗聞而惡之謂侍臣曰當今朝臣忠謇無踰魏徵我遣傅皇太子用絶天下之望十六年拜太子太師知門下省事如故徵自陳有疾詔答曰漢之太子四皓為助我之賴公即其義也知公疾病可臥護之其年稱綿惙中使相望徵宅先無正寢太宗欲為小殿輟其材為徵營構五日而成遣中使齎素褥布被而賜之遂其所尚也及病篤輿駕再幸其第撫之流涕問所欲言徵曰嫠不恤緯而憂宗周之亡後數日太宗夜夢徵若平生及旦而奏徵薨時年六十四太宗親臨慟哭廢朝五日贈司空相州都督諡曰文貞給羽葆鼓吹班劍四十人賻絹布千段米粟千石陪葬昭陵及將祖載徵妻裴氏曰徵平生儉素今以一品禮葬羽儀甚盛非亡者之志悉辭不受竟以布車載柩無文彩之飾太宗登苑西樓望喪而哭詔百官送出郊外帝親製碑文並為書石其後追思不已賜其實封九百戶嘗臨朝謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防己過今魏徵殂逝遂亡一鏡矣徵亡後朕遣人至宅就其書函得表一紙始立表草字皆難識唯前有數行稍可分辨云天下之事有善有惡任善人則國安用惡人則國亂公卿之內情有愛憎憎者唯見其惡愛者唯見其善愛憎之間所宜詳慎若愛而知其惡憎而知其善去邪勿疑任賢勿二可以興矣其遺表如此然在朕思之恐不免斯事公卿侍臣可書之於笏知而必諫也徵狀貌不逾中人而素有膽智每犯顏進諫雖逢王赫斯怒神色不移嘗密薦中書侍郎杜正倫及吏部尚書侯君集有宰相之材徵卒後正倫以罪黜君集犯逆伏誅太宗始疑徵阿黨徵又自録前後諫諍言辭往復以示史官起居郎褚遂良太宗知之愈不悅先許以衡山公主降其長子叔玉於是手詔停婚顧其家漸衰矣徵四子叔琬叔璘叔瑜叔玉襲爵國公官至光祿少卿叔瑜至潞州刺史叔璘禮部侍郎則天時為酷吏所殺神龍初繼封叔玉子膺為鄭國公叔瑜子華開元初太子右庶子史臣曰臣嘗讀漢史劉更生傳見其上書論王氏擅權恐移運祚漢成不悟更生徘徊伊鬱極言而不顧禍患何匡益忠藎也如此當更生時諫者甚多如谷永楊興之上言圖為姦利與賊臣為鄉導梅福王吉之言雖近古道未切事情則納諫任賢詎宜容易臣嘗閲魏公故事與文皇討論政術往復應對凡數十萬言其匡過弼違能近取譬博約連類皆前代諍臣之不至者其實根於道義發為律度身正而心徑上不負時主下不阿權幸中不侈親族外不為朋黨不以逢時改節不以圖位賣忠所載章疏四篇可為萬代王者法雖漢之劉向魏之徐邈晉之山濤宋之謝朏才則才矣比文貞之雅道不有遺行乎前代諍臣一人而已贊曰智者不諫諫或不智智者盡言國家之利鄭公達節才周經濟太宗用之子孫長世
