body:
  text: 舊唐書卷一百四列傳第五十四高仙芝封常清哥舒翰高仙芝本高麗人也父舍雞初從河西軍纍勞至四鎮十將諸衛將軍仙芝美姿容善騎射勇決驍果少隨父至安西以父有功授遊擊將軍年二十餘即拜將軍與父同班秩事節度使田仁琬蓋嘉運未甚任用後夫蒙靈察纍拔擢之開元末為安西副都護四鎮都知兵馬使小勃律國王為吐蕃所招妻以公主西北二十餘國皆為吐蕃所制貢獻不通後節度使田仁琬蓋嘉運并靈察纍討之不捷玄宗特敕仙芝以馬步萬人為行營節度使往討之時步軍皆有私馬自安西行十五日至撥換城又十餘日至握瑟德又十餘日至疏勒又二十餘日至蔥嶺守捉又行二十餘日至播密川又二十餘日至特勒滿川即五識匿國也仙芝乃分為三軍使疏勒守捉使趙崇玭統三千騎趣吐蕃連雲堡自北谷入使撥換守捉使賈崇瓘自赤佛堂路入仙芝與中使邊令誠自護密國入約七月十三日辰時會于吐蕃連雲堡堡中有兵千人又城南十五里因山為柵有兵八九千人城下有婆勒川水漲不可渡仙芝以三牲祭河命諸將選兵馬人齎三日乾糧早集河次水既難渡將士皆以為狂既至人不濕旗馬不濕韉已濟而成列矣仙芝喜謂令誠曰向吾半渡賊來吾屬敗矣今既濟成列是天以此賊賜我也遂登山挑擊從辰至巳大破之至夜奔逐殺五千人生擒千人餘並走散得馬千餘匹軍資器械不可勝數玄宗使術士韓履冰往視日懼不欲行邊令誠亦懼仙芝留令誠等以羸病尪弱三千餘人守其城仙芝遂進三日至坦駒嶺直下峭峻四十餘里仙芝料之曰阿弩越胡若速迎即是好心又恐兵士不下乃先令二十餘騎詐作阿弩越城胡服上嶺來迎既至坦駒嶺兵士果不肯下云大使將我欲何處去言未畢其先使二十人來迎云阿弩越城胡並好心奉迎娑夷河藤橋已斫訖仙芝陽喜以號令兵士盡下娑夷河即古之弱水也不勝草芥毛髮下嶺三日越胡果來迎明日至阿弩越城當日令將軍席元慶賀婁餘潤先修橋路仙芝明日進軍又令元慶以一千騎先謂小勃律王曰不取汝城亦不斫汝橋但借汝路過向大勃律去城中有首領五六人皆赤心為吐蕃仙芝先約元慶云軍到首領百姓必走入山谷招呼取以敕命賜綵物等首領至齊縛之以待我元慶既至一如仙芝之所教縛諸首領王及公主走入石窟取不可得仙芝至斬其為吐蕃者五六人急令元慶斫藤橋去勃律猶六十里及暮才斫了吐蕃兵馬大至已無及矣藤橋闊一箭道修之一年方成勃律先為吐蕃所詐借路遂成此橋至是仙芝徐自招諭勃律及公主出降並平其國天寶六載八月仙芝虜勃律王及公主趣赤佛堂路班師九月復至婆勒川連雲堡與邊令誠等相見其月末還播密川令劉單草告捷書遣中使判官王廷芳告捷仙芝軍還至河西夫蒙靈察都不使人迎勞罵仙芝曰噉狗腸高麗奴噉狗屎高麗奴于闐使誰與汝奏得仙芝曰中丞焉耆鎮守使誰邊得曰中丞安西副都護使誰邊得曰中丞安西都知兵馬使誰邊得曰中丞靈察曰此既皆我所奏安得不待我處分懸奏捷書據高麗奴此罪合當斬但緣新立大功不欲處置又謂劉單曰聞爾能作捷書單恐懼請罪令誠具奏其狀曰仙芝立奇功今將憂死其年六月制授仙芝鴻臚卿攝御史中丞代夫蒙靈察為四鎮節度使徵靈察入朝靈察大懼仙芝每日見之趨走如故靈察益不自安將軍程千里時為副都護大將軍畢思琛為靈察押衙并行官王滔康懷順陳奉忠等嘗構譖仙芝於靈察仙芝既領節度事謂程千里曰公面似男兒心如婦人何也又謂思琛曰此胡敢來我城東一千石種子莊被汝將去憶之乎對曰此是中丞知思琛辛苦見乞仙芝曰吾此時懼汝作威福豈是憐汝與之我欲不言恐汝懷憂言了無事矣又呼王滔等至捽下將笞良久皆釋之由是軍情不懼八載入朝加特進兼左金吾衛大將軍同正員仍與一子五品官九載將兵討石國平之獲其國王以歸仙芝性貪獲石國大塊瑟瑟十餘石真金五六馲駝名馬寶玉稱是初舍雞以仙芝為懦緩恐其不能自存至是立功家財巨萬頗能散施人有所求言無不應其載入朝拜開府儀同三司尋除武威太守河西節度使代安思順思順諷羣胡割耳剺面請留監察御史裴周南奏之制復留思順以仙芝為右羽林大將軍十四載進封密雲郡公十一月安祿山據范陽叛是日以京兆牧榮王琬為討賊元帥仙芝為副命仙芝領飛騎彍騎及朔方河西隴右應赴京兵馬并召募關輔五萬人繼封常清出潼關進討仍以仙芝兼御史大夫十二月師發玄宗御望春亭慰勞遣之仍令監門將軍邊令誠監其軍屯於陝州是月十一日封常清兵敗於汜水十三日祿山陷東京常清以餘衆奔陝州謂仙芝曰纍日血戰賊鋒不可當且潼關無兵若狂寇奔突則京師危矣宜棄此守急保潼關常清仙芝乃率見兵取太原倉錢絹分給將士餘皆焚之俄而賊騎繼至諸軍惶駭棄甲而走無復隊伍仙芝至關繕修守具又令索承光守善和戍賊騎至關已有備矣不能攻而去仙芝之力也封常清蒲州猗氏人也祖犯罪流安西效力守胡城南門頗讀書每坐常清於城門樓上教其讀書多所歷覽外祖死常清孤貧年三十餘屬夫蒙靈察為四鎮節度使將軍高仙芝為都知兵馬使頗有材能每出軍奏傔從三十餘人衣服鮮明常清慨然發憤投牒請預一傔常清細瘦目纇腳短而跛仙芝見其貌寢不納明日又投牒仙芝謂曰吾奏傔已足何煩復來常清怒倨謂仙芝曰常清慕公高義願事鞭轡所以無媒而前何見拒之深乎公若方圓取人則士大夫所望若以貌取人恐失之子羽矣仙芝猶未納常清自爾候仙芝出入晨夕不離其門凡數十日仙芝不得已補為傔開元末會達奚部落背叛自黑山北向西趣碎葉玄宗敕靈察邀擊之靈察使仙芝以二千騎自副城向北至綾嶺下遇賊擊之達奚行遠人馬皆疲斬殺略盡常清於幕中潛作捷書具言次舍井泉遇賊形勢克獲謀略事頗精審仙芝所欲言無不周悉仙芝大駭異之仙芝軍回靈察賞勞仙芝去奴襪帶刀見判官劉眺獨孤峻等逆問之曰前者捷書誰之所作副大使幕下何得有如此人仙芝曰即仙芝傔人封常清也眺等揖仙芝命常清進坐與語如舊相識衆人方異之以破達奚功授疊州地下戍主便以為判官纍以軍功授鎮將果毅折衝天寶六年從仙芝破小勃律十二月仙芝代夫蒙靈察為安西節度使便奏常清為慶王府録事參軍充節度判官賜紫金魚袋尋加朝散大夫專知四鎮倉庫屯田甲仗支度營田事仙芝每出征討常令常清知留後事常清有才學果決知留後時仙芝乳母子鄭德詮已為郎將德詮母在宅內仙芝視之如兄弟家事皆令知之威望動三軍常清出回諸將皆引前德詮見常清出其門素易之自後走馬突常清而去常清至使院命左右密引至廳連節度使宅院凡經數重門德詮既過命隨後閉之德詮至常清離席謂之曰常清起自細微預中丞兵馬使傔中丞再不納郎將豈不知乎今中丞過聽以常清為留後使郎將何得無禮對中使相凌因叱之曰郎將須暫死以肅軍容因令勒回杖六十面仆地曳出仙芝妻及乳母於門外號哭救之不得因以其狀上仙芝仙芝覽之驚曰已死矣及見常清遂無一言常清亦不之謝諸大將有罪者擊殺二人於是軍中股栗十載仙芝改河西節度使奏常清為判官王正見為安西節度奏常清為四鎮支度營田副使行軍司馬十一載正見死乃以常清為安西副大都護攝御史中丞持節充安西四鎮節度經略支度營田副大使知節度事十三載入朝攝御史大夫仍與一子五品官賜第一區亡父母皆贈封爵俄而北庭都護程千里入為右金吾大將軍仍令常清權知北庭都護持節充伊西節度等使常清性勤儉每出征或乘驛私馬不過一兩匹賞罰嚴明十四載入朝十一月謁玄宗於華清宮時祿山已叛玄宗言凶胡負恩之狀何方誅討常清奏曰祿山領凶徒十萬徑犯中原太平斯久人不知戰然事有逆順勢有奇變臣請走馬赴東京開府庫募驍勇挑馬箠渡河計日取逆胡之首懸於闕下玄宗方憂壯其言翌日以常清為范陽節度俾募兵東討其日常清乘驛赴東京召募旬日得兵六萬皆傭保市井之流乃斫斷河陽橋於東京為固守之備十二月祿山渡河陷陳留入罌子谷凶威轉熾先鋒至葵園常清使驍騎與柘羯逆戰殺賊數十百人賊大軍繼至常清退入上東門又戰不利賊鼓譟於四城門入殺掠人吏常清又戰於都亭驛不勝退守宣仁門又敗乃從提象門入倒樹以礙之至穀水西奔至陝郡遇高仙芝具以賊勢告之恐賊難與爭鋒仙芝遂退守潼關玄宗聞常清敗削其官爵令白衣於仙芝軍效力仙芝令常清監巡左右廂諸軍常清衣皂衣以從事監軍邊令誠每事干之仙芝多不從令誠入奏事具言仙芝常清逗撓奔敗之狀玄宗怒遣令誠齎敕至軍並誅之令誠至潼關引常清於驛南西街宣敕示之常清曰常清所以不死者不忍污國家旌麾受戮賊手討逆無效死乃甘心初常清兵敗入關欲馳赴闕庭至渭南有敕令却赴潼關自草表待罪是日臨刑託令誠上之其表曰中使駱奉仙至奉宣口敕恕臣萬死之罪收臣一朝之效令臣却赴陝州隨高仙芝行營負斧縲囚忽焉解縛敗軍之將更許增修臣常清誠歡誠喜頓首頓首臣自城陷已來前後三度遣使奉表具述赤心竟不蒙引對臣之此來非求苟活實欲陳社稷之計破虎狼之謀冀拜首闕庭吐心陛下論逆胡之兵勢陳討捍之別謀將酬萬死之恩以報一生之寵豈料長安日遠謁見無由函谷關遙陳情不暇臣讀春秋見狼瞫稱未獲死所臣今獲矣昨者與羯胡接戰自今月七日交兵至于十三日不已臣所將之兵皆是烏合之徒素未訓習率周南市人之衆當漁陽突騎之師尚猶殺敵塞路血流滿野臣欲挺身刃下死節軍前恐長逆胡之威以挫王師之勢是以馳御就日將命歸天一期陛下斬臣於都市之下以誡諸將二期陛下問臣以逆賊之勢將誡諸軍三期陛下知臣非惜死之徒許臣竭露臣今將死抗表陛下或以臣失律之後誑妄為辭陛下或以臣欲盡所忠肝膽見察臣死之後望陛下不輕此賊無忘臣言則冀社稷復安逆胡敗覆臣之所願畢矣仰天飲鴆向日封章即為尸諫之臣死作聖朝之鬼若使歿而有知必結草軍前回風陳上引王師之旗鼓平寇賊之戈鋋生死酬恩不任感激臣常清無任永辭聖代悲戀之至常清既刑陳其尸於蘧蒢上仙芝歸至廳令誠索陌刀手百餘人隨而從之曰大夫亦有恩命仙芝遽下遂至常清所刑處仙芝曰我退罪也死不辭然以我為減截兵糧及賜物等則誣我也謂令誠曰上是天下是地兵士皆在足下豈不知乎其召募兵排列在外素愛仙芝仙芝呼謂之曰我於京中召兒郎輩雖得少許物裝束亦未能足方與君輩破賊然後取高官重賞不謂賊勢憑陵引軍至此亦欲固守潼關故也我若實有此君輩即言實我若實無之君輩當言枉兵齊呼曰枉其聲殷地仙芝又目常清之尸謂之曰封二子從微至著我則引拔子為我判官俄又代我為節度使今日又與子同死於此豈命也夫遂斬之哥舒翰突騎施首領哥舒部落之裔也蕃人多以部落稱姓因以為氏祖沮左清道率父道元安西副都護世居安西翰家富於財倜儻任俠好然諾縱蒱酒年四十遭父喪三年客居京師為長安尉不禮慨然發憤折節仗劍之河西初事節度使王倕倕攻新城使翰經略三軍無不震懾後節度使王忠嗣補為衙將翰好讀左氏春秋傳及漢書疏財重氣士多歸之忠嗣以為大斗軍副使嘗使翰討吐蕃于新城有同列為副者見翰禮倨不為用翰怒撾殺之軍中股栗遷左衛郎將後吐蕃寇邊翰拒之于苦拔海其衆三行從山差池而下翰持半段槍當其鋒擊之三行皆敗無不摧靡由是知名天寶六載擢授右武衛員外將軍充隴右節度副使都知關西兵馬使河源軍使先是吐蕃每至麥熟時即率部衆至積石軍穫取之共呼為吐蕃麥莊前後無敢拒之者至是翰使王難得楊景暉等潛引兵至積石軍設伏以待之吐蕃以五千騎至翰於城中率驍勇馳擊殺之略盡餘或挺走伏兵邀擊匹馬不還翰有家奴曰左車年十五六亦有膂力翰善使槍追賊及之以槍搭其肩而喝之賊驚顧翰從而刺其喉皆剔高三五尺而墮無不死者左車輒下馬斬首率以為常其冬玄宗在華清宮王忠嗣被劾敕召翰至與語悅之遂以為鴻臚卿兼西平郡太守攝御史中丞代忠嗣為隴右節度支度營田副大使知節度事仍極言救忠嗣上起入禁中翰叩頭隨之而前言詞慷慨聲淚俱下帝感而寬之貶忠嗣為漢陽太守朝廷義而壯之明年築神威軍於青海上吐蕃至攻破之又築城於青海中龍駒島有白龍見遂名為應龍城吐蕃屏迹不敢近青海吐蕃保石堡城路遠而險久不拔八載以朔方河東羣牧十萬衆委翰總統攻石堡城翰使麾下將高秀巖張守瑜進攻不旬日而拔之上録其功拜特進鴻臚員外卿與一子五品官賜物千匹莊宅各一所加攝御史大夫十一載加開府儀同三司翰素與祿山思順不協上每和解之為兄弟其冬祿山思順翰並來朝上使內侍高力士及中貴人於京城東駙馬崔惠童池亭宴會翰母尉遲氏于闐之族也祿山以思順惡翰嘗銜之至是忽謂翰曰我父是胡母是突厥公父是突厥母是胡與公族類同何不相親乎翰應之曰古人云野狐向窟嘷不祥以其忘本也敢不盡心焉祿山以為譏其胡也大怒罵翰曰突厥敢如此耶翰欲應之高力士目翰翰遂止十二載進封涼國公食實封三百戶加河西節度使尋封西平郡王時楊國忠有隙於祿山頻奏其反狀故厚賞翰以親結之十三載拜太子太保更加實封三百戶又兼御史大夫翰好飲酒頗恣聲色至土門軍入浴室遘風疾絶倒良久乃蘇因入京廢疾于家及安祿山反上以封常清高仙芝喪敗召翰入拜為皇太子先鋒兵馬元帥以田良丘為御史中丞充行軍司馬以王思禮鉗耳大福李承光蘇法鼎管崇嗣及蕃將火拔歸仁李武定渾萼契苾寧等為裨將河隴朔方兵及蕃兵與高仙芝舊卒共二十萬拒賊於潼關上御勤政樓勞遣之百僚出餞于郊十五載加翰尚書左僕射同中書門下平章事翰至潼關或勸翰曰祿山阻兵以誅楊國忠為名公若留兵三萬守關悉以精鋭回誅國忠此漢挫七國之計也公以為何如翰心許之未發有客泄其謀於國忠國忠大懼乃奏曰兵法安不忘危今潼關兵衆雖盛而無後殿萬一不利京師得無恐乎請選監牧小兒三千人訓練於苑中詔從之遂遣劍南軍將李福劉光庭分統焉又奏召募一萬人屯於灞上令其腹心杜乾運將之翰慮為所圖乃上表請乾運兵隸於潼關遂召乾運赴潼關計事因斬之自是翰心不自安又素有風疾至是頗甚軍中之務不復躬親委政於行軍司馬田良丘良丘復不敢專斷教令不一頗無部伍其將王思禮李承光又爭長不叶人無鬬志先是翰數奏祿山雖竊河朔而不得人心請持重以弊之彼自離心因而翦滅之可不傷兵擒茲寇矣賊將崔乾祐於陝郡潛鋒蓄鋭而覘者奏云賊殊無備上然之命悉衆速討之翰奏曰賊既始為凶逆祿山久習用兵必不肯無備是陰計也且賊兵遠來利在速戰今王師自戰其地利在堅守不利輕出若輕出關是入其算乞更觀事勢楊國忠恐其謀己屢奏使出兵上久處太平不練軍事既為國忠眩惑中使相繼督責翰不得已引師出關六月四日次于靈寶縣之西原八日與賊交戰官軍南迫險峭北臨黃河崔乾祐以數千人先據險要翰及良丘等浮船中流以觀進退謂乾祐兵少輕之遂促將士令進爭路擁塞無復隊伍午後東風急乾祐以草車數十乘縱火焚之煙焰亙天將士掩面開目不得因為凶徒所乘王師自相排擠墜于河其後者見前軍陷敗悉潰填委于河死者數萬人號叫之聲振天地縛器械以槍為楫投北岸十不存一二軍既敗翰與數百騎馳而西歸為火拔歸仁執降於賊祿山謂之曰汝常輕我今日如何翰懼俯伏稱肉眼不識陛下遂至於此陛下為撥亂主今天下未平李光弼在土門來瑱在河南魯炅在南陽但留臣臣以尺書招之不日平矣祿山大喜遂偽署翰司空作書招光弼等諸將報書皆讓翰不死節祿山知事不諧遂閉翰於苑中潛殺之翰之守潼關也主天下兵權肆志報怨誣奏戶部尚書安思順與祿山潛通偽令人為祿山遺思順書於關門擒之以獻其年三月思順及弟太僕卿元貞並坐誅徙其家屬于嶺外天下冤之史臣曰大盜作梗祿山亂常詞雖欲誅國忠志則謀危社稷于時承平日久金革道消封常清高仙芝相次率不教之兵募市人之衆以抗凶寇失律喪師哥舒翰廢疾于家起專兵柄二十萬衆拒賊關門軍中之務不親委任又非其所及遇羯賊旋致敗亡天子以之播遷自身以之拘執此皆命帥而不得其人也禮曰大夫死衆又曰謀人之軍師敗則死之翰受署賊庭苟延視息忠義之道即可知也豈不愧於顏杲卿乎抑又聞之古之命將者推轂而謂之曰閫外之事將軍裁之觀楊國忠之奏事邊令誠之護戎又掣肘於軍政者也未可偏責三帥不尤伊人後之君子得不深鑑贊曰羯賊犯順戎車啓行委任失所封高敗亡虔劉圻甸僭竊衣裳醜哉舒翰不能死王
