body:
  text: 舊唐書卷一百三十八列傳第八十八趙憬韋倫賈耽姜公輔趙憬字退翁天水隴西人也總章中吏部侍郎同東西臺三品仁本之曾孫祖喧歷左司郎中父道先洪州録事參軍憬少好學志行修潔不求聞達寶應中玄宗肅宗梓宮未祔有司議山陵制度時西蕃入寇天下饑饉憬以褐衣上疏宜遵儉制時人稱之後連為州從事試江夏尉纍遷監察御史隨牒藩府歷殿中侍御史太子舍人居母憂哀毀幾絶服除建中初擢授水部員外郎未拜會湖南觀察使李承請為副使檢校工部郎中充職歲餘承卒遂知留後事尋授潭州刺史兼御史中丞湖南觀察使仍賜金紫居二歲受代歸京師闔門靜居不與人交久之特召對於別殿憬多學問有辭辨敷奏稱旨上悅拜給事中貞元四年回紇請結和親詔以咸安公主降回紇命檢校右僕射關播充使憬以本官兼御史中丞為副前後使回紇者多私齎繒絮蕃中市馬回以規利憬一無所市人歎美之使還遷尚書左丞綱轄省務清勤奉職竇參為宰相惡其能請出為同州刺史上不從八年四月竇參罷黜憬與陸贄並拜中書侍郎同中書門下平章事憬深於理道常言為政之本在於選賢能務節儉薄賦斂寬刑罰對揚之際必以此為言乃獻審官六議曰臣謬登宰府四年于茲恭承德音未嘗不以求賢為切至於延薦職在愚臣雖當代天之工且乏知人之鑒漸積歲月負於聖明無補王猷有妨賢路況多疾恙兼慮闕遺頃奉表章備陳肝膈陛下以臣性拙直身病可矜不棄孱微尚加委任自此思省報效尤難莫副堯舜之心空懷尸素之懼伏惟陛下法象應期聖神廣運雲行雨施皆發自然訓誥典謨悉經睿覽臣所以不敢援引古昔上煩天聰且以用人之要願伸鄙見復念稽顙丹陛仰對宸嚴謇訥易窮遽數難辨理詳則塵瀆頗甚言略則利害未宣若默以求容苟而竊位縱天地之仁幸免而中外之責何逃非陛下用臣之意也其所欲言者皆陛下聖慮之內臣以頂戴恩造不知所為身被風毒漸覺沉痼是以勤勤懇懇切於愚誠也臣聞貞觀開元之際宰輔論事或多上書所冀獲盡情理今臣酌前代之損益體當時之通變謹獻審官六議伏惟閒宴時賜省覽其大指議相則曰宜博採衆賢用為輔弼今中外知其賢者伏願陛下用之識其能者任之求其全材恐不可得議進用庶官則曰異同之論是非難辨由考課難於實效好惡雜於衆聲所以訪之彌多得之彌少選士古今為難拔十得五賢愚猶半陛下謂臣曰何必五也十得二三斯可矣聖主思賢至是而宰臣不能進之臣之罪也進賢在於廣任用明殿最舉大節棄其小瑕隨其所能試之以事用人之大綱也議京諸司闕官則曰當今要官多闕閒官十無一二文武任用資序遞遷要官本以材行閒官多由恩澤朝廷或將任多擬要官則人少闕多閒官則人多闕少明當選拔者轉少在優容者轉多宜補闕員務育材用大廈永固是棟梁榱桷之全也聖朝致理亦庶官羣吏之能也議中外考課官則曰漢以數易長吏謂之弊政其有能理者輒增秩賜金或八九年十餘年乃入為九卿或遷三輔功績茂異遂至丞相其間不隔數官今陛下內選庶僚外委州府課績高者不次超升致理之法無踰於此臣愚以為黜陟且立年限若所居要重未當遷移就加爵秩其餘進退令知褒貶之必應遲速之有常如課績在中年考及限與之平轉中外迭處歷試其能使無苟且之心又無滯淹之慮議舉遺滯則曰官司既廣必委宰輔以舉之宰輔不能遍知又詢于庶官庶官不能遍知又訪於衆人衆聲囂然互有臧否十人舉之未信一人毀之可疑逮至于今茲弊未改其所以然者非盡為愛憎也苦於不審實而承聲言之大凡常人之心以稱人之善為清以攻人之過為直苟有除授多生橫議由是宰臣每將薦用亦自重難日往月來未副聖意宜須採聽時論以所舉多者先用必非大故皆不棄之議擢用諸使府僚屬則曰諸使辟吏各自精求務於得人將重府望既經試效能否可知擢其賢能置之朝列或曰外使須才固不可奪臣知必不然也屬者使府賓介每有登朝本使殊以為榮自喜知人且明公選大凡才能之士名位未達多在方鎮日月在上誰不知之思登闕庭如望霄漢宜須博採無宜久滯上優詔答之時吏部侍郎杜黃裳為中貴讒譖及他過犯御史中丞穆贊京兆少尹韋武萬年縣令李宣長安令盧雲皆為裴延齡搆陷將加斥逐憬保護救解之故多從輕貶初憬廉察湖南令狐峘崔警並為巡屬刺史峘嘗歷中書舍人禮部侍郎警久在朝列所為或虧法令憬每以正道制之峘警密遣人數憬罪狀毀之於朝及憬為相拔警自大理卿為尚書右丞峘先貶官為別駕又擢為吉州刺史時人多之憬與陸贄同知政事贄恃久在禁庭特承恩顧以國政為己任才周歲轉憬為門下侍郎憬由是深銜之數以目疾請告不甚當政事因是不相協裴延齡姦詐恣睢滿朝側目憬初與贄約於上前論之及延英奏對贄極言延齡姦邪誑誕之狀不可任用德宗不悅形於顏色憬默然無言由是罷贄平章事而憬當國矣時宰相賈耽盧邁與憬三人十二年春正月耽邁皆有假故憬獨對於延英上問曰近日起居注記何事憬對曰古者左史記言人君動止有實言隨即記録起居注是也國朝永徽中起居唯得對仗承旨仗下後謀議皆不得聞其記注唯編制敕更無他事所以長壽中姚璹知政事以為親承德音謨訓若不宣旨宰相史官無以得書璹請宰相一人記録所論軍國政事謂之時政記每月送史館既而時政記又廢上曰君舉必書義存勸誡既嘗有時政記宰臣宜依故事為之無何憬卒時政記亦不行憬特承恩顧性清儉雖為宰輔居第僕使類貧士大夫之家所得俸入先置私廟而竟不立第舍田産其年八月遇暴疾信宿而卒時年六十一子元亮進憬遺表草曰臣叨荷聖慈竊塵台鼎年序頗久績用無聞負乘之敗已彰覆餗之咎俄及而天與之疾福過生災自今日卯時以來稍加困重針灸不及藥餌奚施奄然遊魂終當就木冥冥殘喘豈忍辭天號呼涕零側息心斷反風結草誓報深恩雖死猶生豈孤素願無任感恩嗚咽痛恨之至德宗尤悼惜之廢朝三日冊贈太子太傅賻帛五百端米粟四百石令鴻臚卿王權充冊弔使元亮官至左司郎中侍御史知雜事卒次子全亮官至侍御史桂管防禦判官元亮兄宣亮弟承亮皆以門蔭授官韋倫開元天寶中朔方節度使光乘之子少以蔭纍授藍田縣尉以吏事勤恪楊國忠署為鑄錢內作使判官國忠恃權寵又邀名稱多徵諸州縣農人令鑄錢農夫既非本色工匠被所由抑令就役多遭箠罰人不聊生倫白國忠曰鑄錢須得本色人今抑百姓農人為之尤費力無功人且興謗請厚懸市估價募工曉者為之由是役使減少而益鑄錢之數天寶末宮內土木之功無虛日內作人吏因緣為姦倫乃躬親閲視省費減倍改大理評事會安祿山反車駕幸蜀拜倫監察御史劍南節度行軍司馬兼充置頓使判官尋改屯田員外兼侍御史時內官禁軍相次到蜀所在侵暴號為難理倫清儉率身以化之蜀川咸賴其理竟遭中官毀譖貶衡州司戶屬東都河南並陷賊漕運路絶度支使第五琦薦倫有理能拜商州刺史充荊襄等道租庸使會襄州裨將康楚元張嘉延聚衆為叛凶黨萬餘人自稱東楚義王襄州刺史王政棄城遁走嘉延又南襲破江陵漢沔饋運阻絶朝廷旰食倫乃調發兵甲駐鄧州界凶黨有來降者必厚加接待數日後楚元衆頗怠倫進軍擊之生擒楚元以獻餘衆悉走散收租庸錢物僅二百萬貫並不失墜荊襄二州平詔除崔光遠為襄州節度使徵倫為衛尉卿旬日又以本官兼寧州刺史招討處置等使尋又兼隴州刺史乾元三年襄州大將張瑾殺節度使史翽作亂乃以倫為襄州刺史兼御史大夫山南東道襄鄧等十州節度使時李輔國秉權用事節將除拜皆出其門倫既為朝廷公用又不私謁輔國倫受命未行改秦州刺史兼御史中丞本州防禦使時吐蕃党項歲歲入寇邊將奔命不暇倫至秦州屢與虜戰兵寡無援頻致敗衄連貶巴州長史思州務川縣尉代宗即位起為忠州刺史歷台饒二州以中官呂太一於嶺南矯詔募兵為亂乃以倫為韶州刺史兼御史中丞韶連郴三州都團練使竟遭太一用賂反間貶信州司馬虔州司戶隨州司戶隨州司馬遇赦旅寓於洪州十數年德宗即位選堪使絶域者徵倫拜太常少卿兼御史中丞持節充通和吐蕃使倫至蕃中初宣諭皇恩次述國威德遠振蕃人大悅贊普入獻方物使還遷太常卿兼御史大夫加銀青光祿大夫再入吐蕃奉使稱旨西蕃敬服朝廷得失數上疏言之又為宰相盧嵵所惡改太子少保纍加開府儀同三司涇師之亂駕幸奉天及盧嵵白志貞趙贊等貶官關播罷相為刑部尚書倫於朝堂嗚咽而言曰宰相不能弼諧啓沃使天下一至於此仍為尚書天下何由致理聞者敬憚之從駕梁州還京又欲擢用盧嵵為饒州刺史倫又上表切言不可深為忠正之士所稱歎以年踰七十表請休官改太子少師致仕封郢國公時李楚琳以僕射兼衛尉卿李忠誠以尚書兼少府監倫上言曰楚琳凶逆忠誠蕃戎醜類不合廁列清班又表請置義倉以防水旱擇賢良任之左右又言吐蕃必無信約專須防備不可輕易上每善遇之倫居家孝友撫弟姪以慈愛稱貞元十四年十二月卒時年八十三贈揚州都督賈耽字敦詩滄州南皮人以兩經登第調授貝州臨清縣尉上疏論時政授絳州正平尉從事河東檢校膳部員外郎太原少尹北都副留守又檢校禮部郎中節度副使改汾州刺史在郡七年政績茂異入為鴻臚卿時左右威遠營隸鴻臚耽仍領其使大曆十四年十一月檢校左散騎常侍兼梁州刺史御史大夫山南西道節度使建中三年十一月檢校工部尚書兼御史大夫山南東道節度使德宗移幸梁州興元元年二月耽使行軍司馬樊澤奏事於行在澤既復命方大宴諸將有急牒至言澤代耽為節度使而召耽為工部尚書耽得牒內懷中宴飲不改容及散召樊澤以詔授之曰詔以行軍為節度使耽今即上路因告將吏使謁澤牙將張獻甫曰天子巡幸山南尚書使行軍奉表起居而行軍敢自圖節鉞潛奪尚書土地此可謂事人不忠軍中皆不伏請殺樊澤耽曰公是何言歟天子有命即為節度使矣耽今赴行在便與公偕行即日離鎮以獻甫自隨軍中乃安尋以本官為東都留守東畿汝南防禦使貞元二年改檢校右僕射兼滑州刺史義成軍節度使是時淄青節度使李納雖去僞王號外奉朝旨而心常蓄併吞之謀納兵士數千人自行營歸路由滑州大將請城外館之耽曰與人鄰道奈何野處其兵命館之城內淄青將士皆心服之耽善射好獵每出畋不過百騎往往獵於李納之境納聞之大喜心畏其度量不敢異圖九年徵為右僕射同中書門下平章事耽好地理學凡四夷之使及使四夷還者必與之從容訊其山川土地之終始是以九州之夷險百蠻之土俗區分指畫備究源流自吐蕃陷隴右積年國家守於內地舊時鎮戍不可復知耽乃畫隴右山南圖兼黃河經界遠近聚其說為書十卷表獻曰臣聞楚左史倚相能讀九丘晉司空裴秀創為六體九丘乃成賦之古經六體則為圖之新意臣雖愚昧夙嘗師範纍蒙拔擢遂忝台司雖歷踐職任誠多曠闕而率土山川不忘寤寐其大圖外薄四海內別九州必藉精詳乃可摹寫見更纘集續冀畢功然而隴右一隅久淪蕃寇職方失其圖記境土難以區分輒扣課虛微採掇輿議畫關中隴右及山南九州等圖一軸伏以洮湟舊墟連接監牧甘涼右地控帶朔陲岐路之偵候交通軍鎮之備禦衝要莫不匠意就實依稀像真如聖恩遣將護邊新書授律則靈慶之設險在目原會之封略可知諸州諸軍須論里數人額諸山諸水須言首尾源流圖上不可備書憑據必資記注謹撰別録六卷又黃河為四瀆之宗西戎乃羣羌之帥臣並研尋史牒翦棄浮詞罄所聞知編為四卷通録都成十卷文義鄙朴伏增慙悚德宗覽之稱善賜馬一匹銀綵百匹銀瓶盤各一至十七年又撰成海內華夷圖及古今郡國縣道四夷述四十卷表獻之曰臣聞地以博厚載物萬國棋布海以委輸環外百蠻繡錯中夏則五服九州殊俗則七戎六狄普天之下莫非王臣昔毋丘出師東銘不耐甘英奉使西抵條支奄蔡乃大澤無涯罽賓則懸度作險或道理回遠或名號改移古來通儒罕遍詳究臣弱冠之歲好聞方言筮仕之辰注意地理究觀研考垂三十年絶域之比鄰異蕃之習俗梯山獻琛之路乘舶來朝之人咸究竟其源流訪求其居處闤闠之行賈戎貊之遺老莫不聽其言而掇其要閭閻之瑣語風謠之小說亦收其是而芟其僞然殷周以降封略益明承曆數者八家渾區宇者五姓聲教所及惟唐為大秦皇罷侯置守長城起於臨洮孝武却地開邊障塞限於雞鹿東漢則哀牢請吏西晉則裨離結轍隋室列四郡於卑和海西創三州於扶南江北遼陽失律因而棄之高祖神堯皇帝誕膺天命奄有四方太宗繼明重熙柔遠能邇踰大磧通道北至仙娥於骨利幹置玄闕州高宗嗣守丕績克廣前烈遣單車齎詔西越葱山於波剌斯立疾陵府中宗復配天之業不失舊物睿宗含先天之量惟新永圖玄宗以大孝清內以無為理外大宛驥騄歲充內與二師之窮兵黷武豈同年哉肅宗掃平氛祲潤澤生人代宗剗除殘孽彝倫攸伏惟皇帝陛下以上聖之姿當太平之運敦信明義履信包元惠養黎蒸懷柔遐裔故瀘南貢麗水之金漠北獻余吾之馬玄化洋溢率土霑濡臣幼切磋於師友長趨侍於軒墀自揣孱愚叨榮非據鴻私莫答夙夜兢惶去興元元年伏奉進止令臣修撰國圖旋即充使魏州汴州出鎮東洛東郡間以衆務不遂專門績用尚虧憂愧彌切近乃力竭衰病思殫所聞見叢於丹青謹令工人畫海內華夷圖一軸廣三丈從三丈三尺率以一寸折成百里別章甫左袵奠高山大川縮四極於纖縞分百郡於作繪宇宙雖廣舒之不盈庭舟車所通覽之咸在目並撰古今郡國縣道四夷述四十卷中國以禹貢為首外夷以班史發源郡縣紀其增減蕃落其衰盛前地理書以黔州屬酉陽今則改入巴郡前西戎志以安國為安息今則改入康居凡諸疏舛悉從釐正隴西北地播棄於永初之中遼東樂浪陷屈於建安之際曹公棄陘北晉氏遷江南緣邊纍經侵盜故墟日致堙毀舊史撰録十得二三今書搜補所獲太半周禮職方以淄時為幽州之浸以華山為荊河之鎮既有乖於禹貢又不出於淹中多聞闕疑詎敢編次其古郡國題以墨今州縣題以朱今古殊文執習簡易臣學謝小成才非博物伏波之聚米開示衆軍酇侯之圖書方知厄塞企慕前哲嘗所寄心輒罄庸陋多慙紕繆優詔答之賜錦綵二百匹袍段六錦帳二銀瓶盤各一銀榼二馬一匹進封魏國公順宗即位檢校司空守左僕射知政事如故時王叔文用事政出羣小耽惡其亂政屢移病乞骸不許耽性長者不喜臧否人物自居相位凡十三年雖不能以安危大計啓沃於人主而常以檢身厲行以律人每自朝歸第接對賓客終日無倦至於家人近習未嘗見其喜慍之色古之淳德君子何以加焉永貞元年十月卒時年七十六廢朝四日冊贈太傅諡曰元靖姜公輔不知何許人登進士第為校書郎應制策科高等授左拾遺召入翰林為學士歲滿當改官公輔上書自陳以母老家貧以府掾俸給稍優乃求兼京兆尹戶曹參軍特承恩顧才高有器識每對見言事德宗多從之建中四年十月涇師犯闕德宗蒼黃自苑北便門出幸公輔馬前諫曰朱泚嘗為涇原帥得士心昨以朱滔叛坐奪兵權泚常憂憤不得志不如使人捕之使陪鑾駕忽羣凶立之必貽國患臣頃曾陳奏陛下苟不能坦懷待之則殺之養獸自貽其患悔且無益德宗曰已無及矣從幸至奉天拜諫議大夫俄以本官同中書門下平章事從幸山南車駕至城固縣唐安公主薨上之長女昭德皇后所生性聰敏仁孝上所鍾愛初詔尚韋宥未克禮會而遇播遷及薨上悲悼尤甚詔所司厚其葬禮公輔諫曰非久克復京城公主必須歸葬今於行路且宜儉薄以濟軍士德宗怒謂翰林學士陸贄曰唐安夭亡不欲於此為塋壠宜令造一磚塔安置功費甚微不合關宰相論列姜公輔忽進表章都無道理但欲指朕過失擬自取名朕比擢拔為腹心乃負朕如此贄對曰公輔官是諫議職居宰衡獻替固其職分本立輔臣置之左右朝夕納誨意在防微微而弼之乃其所也陛下以造塔役費微小非宰相所論之事但問理之是非豈論事之大小若造塔為是役雖大而作之何傷若造塔為非費雖小而言者何罪帝又曰卿未會朕意朕以公輔才行共宰相都不相當在奉天時已欲罷免後因公輔辭退朕已面許尋屬懷光背叛遂且因循容至山南公輔知朕擬改官所以固論造塔賣直取名據此用心豈是良善朕所惆悵者只緣如此贄再三救護帝怒不已乃罷為左庶子尋丁母憂服闋授右庶子久之不遷洎陸贄知政事以有翰林之舊數告贄求官贄密謂公輔曰豫嘗見郴州竇相言為公奏擬數矣上旨不允有怒公之言公輔恐懼上疏乞罷官為道士久之未報後又廷奏德宗問其故公輔不敢泄贄便以參言為對帝怒貶公輔為泉州別駕又遣中使齎詔責竇參順宗即位起為吉州刺史尋卒憲宗朝贈禮部尚書史臣曰賈魏公以溫克長者致位丞相拒獻甫之請畋李納之郊則器略可知矣韋郢公慷慨節義困於讒邪命矣夫趙丞相區分檢裁求為雅士以爭權而陷陸贄則前時以德報怨其可信乎公輔一言悟主驟及台司一言不合禮遽疏薄則加膝墜泉之間君道可知矣贊曰元靖訏謨真謂純儒手調鼎飪心運地圖姜躁趙險並躍天衢哀哉韋公終困讒夫
