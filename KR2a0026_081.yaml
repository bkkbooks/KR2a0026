body:
  text: 舊唐書卷七十七列傳第二十七韋挺子待價弟萬石楊纂族子弘禮弘武武子元亨元禧元禕劉德威子審禮孫易從審禮從弟延嗣閻立德弟立本柳亨族子範兄子奭亨孫渙澤崔義玄子神慶韋挺雍州萬年人隋民部尚書沖子也少與隱太子相善及高祖平京城引為隴西公府祭酒武德中纍遷太子左衛驃騎檢校左率太子遇之甚厚宮臣罕與為比七年高祖避暑仁智宮會有上書言事者稱太子與宮臣潛搆異端時慶州刺史楊文幹搆逆伏誅辭涉東宮挺與杜淹王圭等並坐流於越巂及太宗在東宮徵拜主爵郎中貞觀初王圭數舉之由是遷尚書右丞俄授吏部侍郎轉黃門侍郎進拜御史大夫封扶陽縣男太宗以挺女為齊王祐妃常與房玄齡王圭魏徵戴胄等俱承顧問議以政事又與高士廉令狐德棻等同修氏族志纍承賞賚太宗嘗謂挺曰卿之任御史大夫獨朕意耳左右大臣無為卿地者卿勉之哉挺陳謝曰臣駑下不足以辱陛下高位且臣非勳非舊而超處藩邸故僚之上臣願後之以勸立功者太宗不許尋改授銀青光祿大夫行黃門侍郎兼魏王泰府事時泰有寵太子承乾多過失太宗微有廢立之意中書侍郎杜正倫以漏泄禁中語左遷時挺亦預泰事太宗謂曰朕已罪正倫不忍更置卿於法特原之尋遷太常卿初挺為大夫時馬周為監察御史挺以周寒士殊不禮之至是周為中書令太宗嘗復欲用挺在門下周密陳挺傲狠非宰相器遂寢十九年將有事於遼東擇人運糧周又奏挺才堪粗使太宗從之挺以父在隋為營州總管有經略高麗遺文因此奏之太宗甚悅謂挺曰幽州以北遼水二千餘里無州縣軍行資糧無所取給卿宜為此使但得軍用不乏功不細矣以人部侍郎崔仁師為副使任自擇文武官四品十人為子使以幽易平三州驍勇二百人官馬二百匹為從詔河北諸州皆取挺節度許以便宜行事太宗親解貂裘及中馬二匹賜之挺至幽州令燕州司馬王安德巡渠通塞先出幽州庫物市木造船運米而進自桑乾河下至盧思臺去幽州八百里逢安德還曰自此之外漕渠壅塞挺以北方寒雪不可更進遂下米於臺側權貯之待開歲發春方事轉運度大兵至軍糧必足仍馳以聞太宗不悅詔挺曰兵尚拙速不貴工遲朕欲十九年春大舉今言二十年運漕甚無謂也乃遣繁畤令韋懷質往挺所支度軍糧檢覆渠水懷質還奏曰挺不先視漕渠輒集工匠造船運米即下至盧思臺方知渠閉欲進不得還復水涸乃便貯之無達平夷之日又挺在幽州日致飲會實乖至公陛下明年出師以臣度之恐未符聖策太宗大怒令將作少監李道裕代之仍令治書侍御史唐臨馳傳械挺赴洛陽依議除名仍令白衣散從及前軍破蓋牟城詔挺統兵士鎮蓋牟示漸用之也挺城守去大軍懸遠與高麗新城鄰接日夜戰鬬鼓譟之聲不絶挺不堪其憂且不平於失職素與術士公孫常善乃與常書以所懷會常以他事被拘自縊而死索其囊中得挺書論城中危蹙兼有歎悵之辭太宗以挺怨望謫為象州刺史歲餘卒年五十八子待價初為左千牛備身永徽中江夏王道宗得罪待價即道宗之壻也緣坐左遷盧龍府果毅時將軍辛文陵率兵招慰高麗行至吐護真水高麗掩其不備襲擊敗之待價與中郎將薛仁貴受詔經略東蕃因率所部救之文陵苦戰賊漸退軍始獲全待價被重瘡流矢中其左足竟不言其功以足疾免官而歸後纍授蘭州刺史時吐蕃屢為邊患高宗以沛王賢為涼州大都督以待價為司馬俄又遷肅州刺史頻有守禦之功徵拜右武衛將軍兼檢校右羽林軍事儀鳳三年吐蕃又犯塞待價復以本官檢校涼州都督兼知鎮守兵馬事俄又徵還舊職復封扶陽侯則天臨朝拜吏部尚書攝司空營高宗山陵功畢加金紫光祿大夫改為天官尚書同鳳閣鸞臺三品賜物一千段仍與一子五品待價素無藻鑑之才自武職而起居選部既銓綜無甚為尚時所嗤垂拱元年十月復為燕然道行軍大總管以禦突厥明年春還六月拜文昌右相依舊同鳳閣鸞臺三品既纍登非據頗不自安頻上表辭職則天每降優制不許之又表請削官秩回恩贈父於是贈挺潤州刺史明年上疏請自效戎旅之用於是拜安息道行軍大總管督三十六總管以討吐蕃進封扶陽郡公軍至寅識迦河與吐蕃合戰初勝後敗又屬天寒凍雪師人多死糧餽又不支給乃旋師弓月頓於高昌則天大怒副將閻溫古以逼留伏法待價坐除名配流繡州尋卒弟萬石頗有學業而特善音律上元中自吏部郎中遷太常少卿當時郊廟樂調及宴會雜樂皆萬石與太史令姚玄辨增損之時人以為稱職尋又兼知吏部選事卒官挺從祖兄子安石別有傳楊纂華州華陰人也祖儉周東雍州刺史父文偉隋溫州刺史纂略涉經史尤明時務少與琅邪顏師古燉煌令狐德棻友善大業中進士舉授朔方郡司法書佐坐楊玄感近屬除名乃家于蒲城義軍渡河于長春宮謁見纍授侍御史數上書言事因被召問擢為考功郎中貞觀初長安令賜爵長安縣男有婦人袁氏妖逆為人所告纂究問之不得其狀袁氏後又事發伏誅太宗以纂為不忠將殺之中書令溫彥博以纂過誤罪不至死固諫乃赦之三遷吏部侍郎八年副特進蕭瑀為河南道巡察大使與瑀情有不協屢相表奏瑀因以獲罪纂尋拜尚書左丞纂既長於吏道所在皆有聲績俄又除吏部侍郎前後典選十餘載銓人倫稱為允當然而抑文雅進酷吏觀時任數頗為時論所譏後歷太常少卿雍州別駕加銀青光祿大夫復為尚書左丞遷太僕卿檢校雍州別駕遷戶部尚書永徽初卒贈幽州都督諡曰敬子守愚則天時官至雍州長史守挹岐州刺史族子弘禮弘禮隋尚書令素弟之子也父嶽大業中為萬年令與素子玄感不協嘗密上表稱玄感必為亂及玄感被誅嶽在長安繫獄帝遽使赦之比使至嶽已為留守所殺弘禮等遂免從坐高祖受禪以楊素隋代有勳業詔弘禮襲封清河郡公拜太子通事舍人貞觀中歷兵部員外郎仍為西河道行軍大總管府長史三遷中書舍人太宗有事遼東以弘禮有文武材擢拜兵部侍郎專典兵機之務弘禮每入參謀議出則統衆攻戰駐蹕之陳領馬步二十四軍出其不意以擊之所向摧破太宗自山下見弘禮所統之衆人皆盡力殺獲居多甚壯之謂許敬宗等曰越公兒郎故有家風矣時諸宰相並在定州留輔皇太子唯有褚遂良許敬宗及弘禮在行在所掌知機務二十年拜中書侍郎明年加銀青光祿大夫尋遷司農卿兼充崑丘道副大總管諸道軍將咸受節度於是破處月降處密殺焉耆王降馺支部獲龜茲于闐王凱旋未及行賞太宗晏駕弘禮頗忤大臣之旨由是出為涇州刺史永徽初論崑丘之功改授勝州都督尋遷太府卿四年卒贈蘭州都督諡曰質弟弘武弘武少修謹武德初拜左千牛備身永徽中為吏部郎中孝敬初為皇太子精擇僚寀以弘武為中舍人麟德中將有事於東嶽弘武自荊州司馬擢拜司戎少常伯從駕還高宗特令弘武補授吏部選人五品已上官由是漸見親委后母榮國夫人楊氏以與弘武同宗又稱薦之俄遷西臺侍郎乾封二年與戴至德李安期等同東西臺三品及在政事頗以清簡見稱總章元年卒于官贈汴州刺史諡曰恭子元亨則天時為司府少卿元禧尚食奉御元禧頗有醫術為則天所任嘗忤張易之之意易之密奏元禧是楊素兄弟之後素父子在隋有逆節子孫不合供奉則天乃下制曰隋尚書令楊素昔在本朝早荷殊遇稟凶邪之德懷諂佞之才惑亂君上離間骨肉搖動冢嫡寧唯掘蠱之禍誘扇後主卒成請蹯之釁隋室喪亡蓋惟多僻究其萌兆實此之由生為不忠之人死為不義之鬼身雖幸免子竟族誅斯則姦逆之謀是其庭訓險薄之行遂成門風刑戮雖加枝胤仍在豈可復肩隨近侍齒迹朝行朕接統百王恭臨四海上嘉賢佐下捍賊臣常欲從容於萬機之餘褒貶於千載之外況年代未遠耳目所存者乎其楊素及兄弟子孫並不得令任京官及侍衛於是左貶元亨為睦州刺史元禧為資州長史元禧弟緱氏令元禕為梓州司馬張易之誅後元亨等皆復任京職元亨至齊州刺史元禧台州刺史元禕宣州刺史劉德威徐州彭城人也父子將隋毗陵郡通守德威姿貌魁偉頗以幹略見稱大業末從左光祿大夫裴仁基討賊淮左手斬賊帥李青蛙傳首於行在所後與仁基同歸李密密素聞其名與麾下兵令於懷州鎮守武德元年密與王世充戰敗入朝德威亦率所部隨密歸款高祖嘉之授左武候將軍封滕縣公及劉武周南侵詔德威統兵擊之又判并州總管府司馬俄而裴寂失律於介州齊王元吉棄并州還朝德威總知留府事元吉才出武周已至城下百姓相率投賊武周獲德威令率其本兵往浩州招慰德威自拔歸朝高祖親勞問之兼陳賊中虛實及晉絳諸部利害高祖皆嘉納之改封彭城縣公未幾檢校大理少卿從擒建德平世充皆有功轉刑部侍郎加散騎常侍妻以平壽縣主貞觀初歷大理太僕二卿加金紫光祿大夫俄出為綿州刺史以廉平著稱百姓為之立碑尋檢校益州大都督府長史十一年復授大理卿太宗嘗問之曰近來刑網稍密其過安在德威奏言誠在主上不由臣下人主好寬則寬好急則急律文失入減三等失出減五等今則反是失入則無辜失出便獲大罪所以吏各自愛競執深文非有教使之然畏罪之所致耳陛下但捨所急則寧失不經復行於今日矣太宗深然之數歲遷刑部尚書兼檢校雍州別駕十七年馳驛往齊州推齊王祐還至濮州聞祐殺長史權萬紀德威入據濟州遣使以聞詔德威便發河南兵馬以申經略會遭母憂而罷十八年起為遂州刺史三遷同州刺史永徽三年卒年七十一贈禮部尚書幽州都督諡曰襄陪葬獻陵德威閨門友穆接物寬平所得財貨多以分贍宗親子審禮襲爵審禮少喪母為祖母元氏所養隋末德威從裴仁基討擊道路不通審禮年未弱冠自鄉里負載元氏渡江避亂及天下定始西入長安元氏若有疾審禮必親嘗湯藥元氏顧謂孫曰我兒孝順貫徹幽微吾一顧念宿疾頓輕貞觀中歷左驍衛郎將丁父憂去職及葬跣足隨車流血灑地行路稱之服闋當襲爵纍表讓弟朝議不許永徽中纍遷將作大匠兼檢校燕然都護襲封彭城郡公審禮父歿雖久猶悲慕不已每見父時僚舊必嗚咽流涕母鄭氏早亡事繼母平壽縣主稍疾輒憂懼形于容色終夕不寐撫繼母男延景友愛甚篤所得祿俸皆送母處以資延景之費而審禮妻子處飢寒晏然未嘗介意再從同居家無異爨合門二百餘口人無間言稍遷工部尚書兼檢校左衛大將軍儀鳳二年吐蕃寇涼州命審禮為行軍總管與中書令李敬玄合勢討擊遇賊於青海敬玄後期不至審禮軍敗為賊所執永隆二年卒于蕃中贈工部尚書諡曰僖延景官至陝州刺史睿宗初以后父追贈尚書右僕射審禮子易從歷位岐州司兵參軍審禮之沒吐蕃詔許易從入蕃省之及審禮卒易從號哭晝夜不止毀瘠過禮吐蕃哀其志行還其父尸柩易從徒跣萬里扶護歸彭城為朝野之所嗟賞後歷彭州長史任城男永昌中坐為徐敬貞所誣搆遇害易從在官仁恕及將刑人吏無遠近奔走競解衣相率造功德以為長史祈福州人從之者十餘萬其為人所愛如此易從子升開元中為中書舍人太子右庶子審禮從父弟延嗣文明年為潤州司馬屬徐敬業作亂率衆攻潤州延嗣與刺史李思文固守不降俄而城陷敬業執延嗣邀之令降辭曰延嗣世蒙國恩當思效命州城不守多負朝廷終不能苟免偷生以纍宗族豈以一身之故為千載之辱今日之事得死為幸敬業大怒將斬之其黨魏思溫救之獲免乃囚之于江都獄俄而賊敗竟以裴炎近親不得功遷為梓州長史再轉汾州刺史卒宗族至刺史者二十餘人閻立德雍州萬年人隋殿內少監毗之子也其先自馬邑徙關中毗初以工藝知名立德與弟立本早傳家業武德中纍除尚衣奉御立德所造衮冕大裘等六服并腰輿傘扇咸依典式時人稱之貞觀初歷遷將作少匠封太安縣男高祖崩立德以營山陵功擢為將作大匠貞觀十年文德皇后崩又令攝司空營昭陵坐怠慢解職俄起為博州刺史十三年復為將作大匠十八年從征高麗及師旅至遼澤東西二百餘里泥淖人馬不通立德填道造橋兵無留礙太宗甚悅尋受詔造翠微宮及玉華宮咸稱旨賞賜甚厚俄遷工部尚書二十三年攝司空營護太宗山陵事畢進封為公顯慶元年卒贈吏部尚書并州都督子玄邃官至司農少卿玄邃子知微聖曆初歷位右豹韜衛將軍時突厥默啜有女請和親則天令淮陽王武延秀往納其女命知微攝春官尚書送赴虜廷默啜以延秀非皇室諸王大怒遂拘之別所與知微率衆自恆嶽道攻陷趙定二州知微經歲餘自突厥所還則天以其隨賊入寇令百官臠割然後斬之并夷其三族立本顯慶中纍遷將作大匠後代立德為工部尚書兄弟相代為八座時論榮之總章元年遷右相賜爵博陵縣男立本雖有應務之才而尤善圖畫工於寫真秦府十八學士圖及貞觀中凌煙閣功臣圖並立本之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗擊賞數四詔座者為詠召立本令寫焉時閣外傳呼云畫師閻立本時已為主爵郎中奔走流汗俯伏池側手揮丹粉瞻望座賓不勝愧赧退誡其子曰吾少好讀書幸免牆面緣情染翰頗及儕流唯以丹青見知躬廝役之務辱莫大焉汝宜深誡勿習此末伎立本為性為所好欲罷不能也及為右相與左相姜恪對掌樞密恪既歷任將軍立功塞外立本唯善於圖畫非宰輔之器故時人以千字文為語曰左相宣威沙漠右相馳譽丹青咸亨元年百司復舊名改為中書令四年卒柳亨蒲州解人魏尚書左僕射慶之孫也父旦隋太常少卿新城縣公亨隋末歷熊耳王屋二縣長陷於李密密敗歸國纍授駕部郎中亨容貌魁偉高祖甚愛重之特以殿中監竇誕之女妻焉即帝之外孫也三遷左衛中郎將封壽陵縣男未幾以譴出為邛州刺史加散騎常侍被代還數年不調因兄葬遇太宗遊於南山召見與語頗哀矜之數日北門引見深加誨奬拜銀青光祿大夫行光祿少卿太宗每誡之曰與卿舊親情素兼宿卿為人交遊過多今授此職宜存簡靜亨性好射獵有叨湎之名此後頗自勗勵杜絶賓客約身節儉勤於職事太宗亦以此稱之二十三年以修太廟功加金紫光祿大夫久之拜太常卿從幸萬年宮檢校岐州刺史永徽六年卒贈禮部尚書幽州都督諡曰敬亨族子範貞觀中為侍御史時吳王恪好畋獵損居人範奏彈之太宗因謂侍臣權萬紀事我兒不能匡正其罪合死範進曰房玄齡事陛下猶不能諫止畋獵豈可獨罪萬紀太宗大怒拂衣而入久之獨引範謂曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃解範高宗時歷位尚書右丞揚州大都督府長史亨兄子奭奭父則隋左衛騎曹因使卒於高麗奭入蕃迎喪柩哀號逾禮深為夷人所慕貞觀中纍遷中書舍人後以外生女為皇太子妃擢拜兵部侍郎妃為皇后奭又遷中書侍郎永徽三年代褚遂良為中書令仍監修國史俄而后漸見疏忌奭憂懼頻上疏請辭樞密之任轉為吏部尚書及后廢纍貶愛州刺史尋為許敬宗李義府所構云奭潛通宮掖謀行鴆毒又與褚遂良等朋黨構扇罪當大逆高宗遣使就愛州殺之籍沒其家奭既死非其罪甚為當時之所傷痛神龍初則天遺制與褚遂良韓瑗等並還官爵子孫親屬當時緣坐者咸從曠蕩開元初亨孫渙為中書舍人表曰臣堂伯祖奭去明慶三年與褚遂良等五家同被譴戮雖蒙遺制蕩雪而子孫亡沒並盡唯有曾孫無忝見貫龔州蒙雪多年猶同遠竄陛下自臨宇縣優政必被鴻恩及於泉壤大造加於亡絶先天已後頻降絲綸曾任宰相之家並許收其淪滯況臣伯祖往叨執政無犯受誅藁窆尚隔故鄉後嗣遂編蠻服臣不申號訴義所難安伏乞許臣伯祖還葬鄉里其曾孫無忝放歸本貫疏奏敕令奭歸葬官造靈輿遞還無忝後歷位潭州都督渙弟澤景雲中為右率府鎧曹參軍先是姚元之宋璟知政事奏請停中宗朝斜封官數千員及元之等出為刺史太平公主又特為之言有敕總令復舊職澤上疏諫曰臣聞藥不毒不可以蠲疾詞不切不可以補過是以習甘旨者非攝養之方邇諛佞者積危殆之本臣實愚朴志懷剛厲或聞政之不當事之不直常慷慨關心夢寐懷憤每願殉身以諫伏死而爭但利於社稷有便於君上雖蒙禍被難殺身不悔也竊見神龍以來羣邪作孽法網不振綱維大紊實由內寵專命外嬖擅權因貴憑寵賣官鬻爵朱紫之榮出於僕妾之口賞罰之命乖於章程之典妃主之門有同商賈舉選之署實均闤闠屠販之子悉由邪而忝官黜斥之人咸因姦而冒進天下為亂社稷幾危賴陛下聰明神武拯其將墜此陛下耳目之所親擊固可永為炯誡者也臣聞作法於理猶恐其亂作法於亂誰能救之祇如斜封授官皆是僕妾汲引迷謬先帝昧自前朝豈是孝和情之所憐心之所愛陛下初即位時納姚元之宋璟之計所以咸令黜之頃日已來又令之將謂為斜封之人不忍棄也以為先帝之意不可違也若斜封之人不忍棄也是韋月將燕欽融之流亦不可褒贈也李多祚鄭克乂之徒亦不可清雪也陛下何不能忍於此而獨能忍於彼使善惡不定反覆相攻使君子道消小人道長為邪者獲利為正者銜寃何導人以為非勸人以為僻將何以懲風俗將何以止姦邪今海內咸稱太平公主令胡僧慧範曲引此輩將有誤於陛下矣謗議盈耳咨嗟滿衢故語曰姚宋為相邪不如正太平用事正不如邪書曰無偏無陂遵王之義無反無側王道正直臣恐因循流近致遠積小為大纍微起高勿謂何傷其禍將長勿謂何害其禍將大又賞罰之典紀綱不謬天秩有禮君爵有功不可因怒以妄罰不可因喜以妄賞伏見尚醫奉御彭君慶以邪巫小道超授三品奈何輕用名器加非其才昔公主為子求郎明帝不許今聖朝私愛賞及憸人董狐不亡豈有所隱臣聞賞一人而千萬人悅者賞之罰一人而千萬人勸者罰之臣雖未覩聖朝之妄罰已覩聖朝之妄賞矣書曰官不及私昵惟其能爵罔及惡德惟其賢臣恐近習之人為其先容有謬於陛下也惟陛下熟思而察之雖往者不可諫而來者猶可追願杜請謁之路塞恩幸之門鑒誡前非無纍後悔申畫一之法明不二之刑不詢之謀勿庸無稽之言勿聽則天下之化人無間焉日新之德天鑒不遠澤後參選會有敕令選人上書陳事將加收擢澤又上書曰頃者韋氏險詖姦臣同惡賞罰紊弛綱紀紛綸政以賄成官因寵進言正者獲戾行殊者見疑海內寒心實將莫救賴神明佑德宗廟降靈天討有罪人用丕保陛下睿謀神聖勇智聰明安宗廟於已危拯黎庶於將溺今尨眉鮐背歡欣踴躍望聖朝之撫輯聽聖朝之德音今陛下蠲煩省徭法明德舉萬邦愷樂室家胥慶臣又聞危者保其存也亂者有其理也伏惟陛下安不忘危理不忘亂存不忘亡則克享天心國家長保矣詩曰罔不有初鮮克有終伏惟陛下慎厥終修其初非禮勿視非禮勿動書曰惟德罔小萬邦惟慶惟不德罔大墜厥宗甚可畏也甚可懼也伏惟陛下慎之哉夫驕奢起於親貴綱紀亂於寵幸願陛下禁之於親貴則天下隨風矣制之於寵幸則天下法明矣詩曰刑于寡妻至于兄弟以御于家邦若親貴為之而不禁寵幸撓之而見從是政之不常令之不一則姦詐斯起暴亂生焉雖嚴刑峻制朝施暮戮而法不行矣縱陛下親之愛之莫若安之福之寵祿之過罪之漸也非安之也驕奢之淫危之本也非福之也前事不忘後之師也伏願陛下精求俊哲朝夕納誨縱有逆于耳謬于心者無速之罰姑籌之以道省于厥躬雖木朴忌忤願恕之以直開諫諍之路也或有順於耳便於身者無急之賞當求諸非道稽之典訓其不協於德必置之以法用杜側媚之行也有羞淫巧於陛下者遽黜之則淫巧息矣有進忠讜於陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者傲石碏曰臣聞愛子教之以義方不納於邪驕奢淫逸所自邪也書曰罔淫於逸罔遊於樂穆王有命實賴前後左右有位之士繩愆糾謬格其非心今儲宮肇建王府初啓至於僚友必惟妙擇今驕奢之後流波未變慢遊之樂餘風或存夫小人幸臣易合於意奇伎淫巧多適於心臣恐狎於非德茲為愈怠書曰慎簡乃僚無以巧言令色其惟吉士僕臣正厥后克正僕臣諛厥后自聖伏願採溫良博聞之士恭儉忠鯁之人任以東宮及諸王府官仍請東宮量署拾遺補闕之職令朝夕講論出入侍從授以訓誥交修不逮臣又聞馳騁畋獵令人發狂名教之中自有樂地承前貴戚鮮克由禮或打毬擊鼓比周伎術或飛鷹奔犬盤遊藪澤此甚為不道非進德修業之本也書曰內作色荒外作禽荒又曰無若丹朱傲惟慢遊是好朋淫于家用殄厥世伏惟陛下誕降謀訓敦勸學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福祿長享與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信矣斯語明哉至誡頃韋庶人安樂公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅德神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉為凶變福為禍諺曰千人所指無病自死不其然歟書曰殷鑒不遠在彼夏王今陛下何勸豈非皇祖謀訓之則也今陛下何懲豈非孝和寵任之甚也禮曰愛而知其惡憎而知其善可不慎哉夫寵愛之心則不免去其太甚間之禮節適則可矣今諸王公主駙馬亦陛下之所親愛也矯枉之道在於厥初鑒誡之義其取不遠使觀過務善居寵思危庶夙夜惟寅聿修厥德經曰在上不驕高而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制于官刑警于有位敢有常舞于宮酣歌于室時謂巫風敢有徇于貨色常于遊畋時謂淫風敢有侮聖言逆忠直遠耆德比頑童時謂亂風惟茲三風十愆卿士有一于身家必喪邦君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢僭驕怠者削其祿封朴素修業者錫以紳服以勗其非心使其奉命無使久而忽之無使遠而墜之臣聞非知之艱行之惟艱又曰常厥德保厥位厥德匪常九有以亡伏惟陛下慎之哉前車之覆實惟明證先王之誡可以終吉若陛下奉伊尹之訓崇傅說之命不作無益不啓私門刑不差賞不濫則惟德是輔惟人之懷天祿永終景福是集儻陛下忘精一之德開恩幸之門爵賞有差刑罰不當則忠臣正士亦不復談矣睿宗覽而善之令中書省重詳議擢拜監察御史開元中纍遷太子右庶子出為鄭州刺史未行病卒贈兵部侍郎崔義玄貝州武城人也大業末往依李密初不見用義玄見羣鼠渡洛又矟刃有花文謂所親曰此王敦敗亡之兆也時黃君漢守據柏崖義玄往說之曰見機而作不俟終日今羣盜蜂起九州幅裂神器所歸必在有德唐公據有秦京名應符籙此真主也足下孤城獨立宜遵寇恂竇融之策及時歸誠以取封侯也君漢然之即與義玄歸國拜懷州總管府司馬世充遣將高毗侵掠河內義玄擊敗之多下城堡君漢將分子女金帛與之義玄皆拒而不受以功封清丘縣公後從太宗討世充屢獻籌策太宗頗納用之東都平轉隰州都督府長史貞觀初歷左司郎中兼韓王府長史行州府事與友人孟神慶雖志好不同各以介直匡正府幕王並委任之永徽初纍遷婺州刺史屬睦州女子陳碩真舉兵反遣其黨童文寶領徒四千人掩襲婺州義玄將督軍拒戰時百姓訛言碩真嘗升天犯其兵馬者無不滅門衆皆凶懼司功參軍崔玄籍言於義玄曰起兵仗順猶且不成此乃妖誑豈能得久義玄以為然因命玄籍為先鋒義玄率兵繼進至下淮戍擒其間諜二十餘人夜有流星墜賊營義玄曰此賊滅之徵也詰朝進擊身先士卒左右以楯蔽箭義玄曰刺史尚欲避箭誰肯致死由是士卒勠力斬首數百級餘悉許其歸首進兵至睦州界歸降萬計及碩真平義玄以功拜御史大夫義玄少愛章句之學五經大義先儒所疑及音韻不明者兼採衆家皆為解釋傍引證據各有條疏至是高宗令義玄討論五經正義與諸博士等詳定是非事竟不就高宗之立皇后武氏義玄協贊其謀及長孫無忌等得罪皆義玄承中旨繩之顯慶元年出為蒲州刺史尋卒年七十一贈幽州都督諡曰貞則天時思其功重贈揚州大都督賜其家實封二百戶子神基襲爵長壽中為司賓卿同鳳閣鸞臺平章事為相月餘為酷吏所陷減死配流後漸録用中宗初為大理卿神基弟神慶神慶明經舉則天時纍遷萊州刺史因入朝待制於億歲殿奏事稱旨則天以神慶歷職皆有美政又其父嘗有翊贊之勳甚賞慰之擢拜并州長史因謂曰并州朕之枌榆又有軍馬比日簡擇無如卿者前後長史皆從尚書為之以其委重所以授卿也因自為按行圖擇日而遣之神慶到州有豪富僞作改錢文敕文書下州穀麥踊貴百姓驚擾神慶執奏以為不便則天下制褒賞之先是并州有東西二城隔汾水神慶始築城相接每歲省防禦兵數千人邊州甚以為便尋而兄神基下獄當死神慶馳赴都告事得召見則天出神基推狀以示之神慶據狀申理神基竟得減死神慶亦緣坐貶授歙州司馬長安中纍轉禮部侍郎數上疏陳時政利害則天每嘉納之轉太子右庶子賜爵魏縣子時有突厥使入朝準儀注太子合預朝參先降敕書神慶上疏曰伏以五品已上所以佩龜者比為別敕徵召恐有詐妄內出龜合然後應命況太子元良國本萬方所瞻古來徵召皆用玉契此誠重慎之極防萌之慮昨緣突厥使見太子合預朝參直有文符下宮曾不降敕處分今人稟淳化內外同心然古人慮事於未萌之前所以長無悔吝之咎況太子至重不可不深為誡慎以臣愚見太子既與陛下異宮伏望每召太子預報來日非朔望朝參應須別喚望降墨敕及玉契則天甚然之尋令神慶與詹事祝欽明更日於東宮侍讀俄歷司刑司禮二卿神慶嘗受詔推張昌宗而竟寬其罪神龍初昌宗等伏誅神慶坐流於欽州尋卒年七十餘明年敬暉等得罪緣昌宗被流貶者例皆雪免贈神慶幽州都督開元中神慶子琳等皆至大官羣從數十人趨奏省闥每歲時家宴組珮輝映以一榻置笏重疊於其上開元天寶間中外族屬無緦麻之喪其福履昌盛如此東都私第門琳與弟太子詹事圭光祿卿瑤俱列棨戟時號三戟崔家琳位終太子少保史臣曰周隋已來韋氏世有令人鬱為冠族而安石嗣立竟大其門挺恃才傲物固虧長者之風賓王報之以不仁難與議乎君子矣議者以堯舜有溢美桀紂有溢惡蓋以一為凶德則羣惡所歸楊素父子傾覆隋祚醜聲流聞雖弘禮弘武之正士而元亨兄弟竟以凶族竄逐古人守死善道不無為也德威奏議練刑名之要俾長秋卿美哉審禮仁孝治行可為世範卒與禍會悲夫二閻曲學甚工措思精巧藝成而下垂誡宜然柳氏世稱謇諤奭澤有正人風彩忠規獻納抑有人焉義玄附麗武后神慶寬縱穢臣奕世纖邪以至傾敗宜哉贊曰韋子驕矜終損功名楊家積惡宗門擯落閻以藝辱劉以孝愆二崔能吏行無取焉
