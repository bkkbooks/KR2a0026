body:
  text: 舊唐書卷一百九十上列傳第一百四十上文苑上孔紹安子禎孫若思袁朗弟承序利貞孫誼賀德仁庾抱蔡允恭鄭世翼謝偃崔信明張蘊古劉胤之弟子延祐兄子藏器張昌齡崔行功孟利貞董思恭元思敬徐齊聃杜易簡從祖弟審言盧照鄰楊烱王勃兄勔駱賓王鄧玄挺臣觀前代秉筆論文者多矣莫不憲章謨誥祖述詩騷遠宗毛鄭之訓論近鄙班揚之述作謂釆釆芣苢獨高比興之源湛湛江楓長擅詠歌之體殊不知世代有文質風俗有淳醨學識有淺深才性有工拙昔仲尼演三代之易刪諸國之詩非求勝於昔賢要取名於今代實以淳朴之時傷質民俗之語不經故飾以文言考之絃誦然後致遠不泥永代作程即知是古非今未為通論夫執鑒寫形持衡品物非伯樂不能分駑驥之狀非延陵不能別雅鄭之音若空混吹竽之人即異聞韶之歎近代唯沈隱侯斟酌二南剖陳三變攄雲淵之抑鬱振潘陸之風徽俾律呂和諧宮商輯洽不獨子建總建安之霸客兒擅江左之雄爰及我朝挺生賢俊文皇帝解戎衣而開學校飾賁帛而禮儒生門羅吐鳳之才人擅握蛇之價靡不發言為論下筆成文足以緯俗經邦豈止雕章縟句韻諧金奏詞炳丹青故貞觀之風同乎三代高宗天后尤重詳延天子賦橫汾之詩臣下繼柏梁之奏巍巍濟濟煇爍古今如燕許之潤色王言吳陸之鋪揚鴻業元稹劉蕡之對策王維杜甫之雕蟲並非肄業使然自是天機秀絕若隋珠色澤無假淬磨孔璣翠羽自成華彩置之文苑實煥緗圖其間爵位崇高別為之傳今採孔紹安已下為文苑三篇覬懷才憔悴之徒千古見知於作者孔紹安越州山陰人陳吏部尚書奐之子少與兄紹新俱以文詞知名十三陳亡入隋徙居京兆鄠縣閉門讀書誦古文集數十萬言外兄虞世南歎異之紹新嘗謂世南曰本朝淪陷分從湮滅但見此弟竊謂家族不亡矣時有詞人孫萬壽與紹安篤忘年之好時人稱為孫孔紹安大業末為監察御史時高祖為隋討賊於河東詔紹安監高祖之軍深見接遇及高祖受禪紹安自洛陽間行來奔高祖見之甚悅拜內史舍人賜宅一區良馬兩匹錢米絹布等時夏侯端亦嘗為御史監高祖軍先紹安歸朝授秘書監紹安因侍宴應詔詠石榴詩曰祗為時來晚開花不及春時人稱之尋詔撰梁史未成而卒有文集五卷子禎高宗時為蘇州長史曹王明為刺史不循法度禎每進諫明曰寡人天子之弟豈失於為王哉禎曰恩寵不可恃大王不奉行國命恐今之榮位非大王所保獨不見淮南之事乎明不悅明左右有侵暴下人者禎捕而杖殺之明後果坐法遷於黔中謂人曰吾愧不用孔長史言以及於此禎累遷絳州刺史封武昌縣子卒諡曰溫子季詡早知名官至左補闕紹安孫若思若思孤母褚氏親自教訓遂以學行知名年少時有人賫褚遂良書跡數卷以遺若思唯受其一卷其人曰此書當今所重價比黃金何不總取若思曰若價比金寶此為多矣更截去半以還之明經舉累遷庫部郎中若思常謂人曰仕至郎中足矣至是持一石止水置於座右以示有止足之意尋遷給事中中宗即位敬暉桓彥範等知國政以若思多識故事所有改革大事及疑議多訪於若思再轉禮部侍郎出衞州刺史先是諸州別駕皆以宗室為之不為刺史致敬由是多行不法若思至州舉奏別駕李道欽犯狀請加鞫訊乃詔別駕於刺史致禮自若思始也俄以清白稱加銀青光祿大夫賜絹百匹歷汝州刺史太子右諭德封梁郡公開元十七年卒諡曰惠袁朗雍州長安人陳尚書左僕射樞之子其先自陳郡仕江左世為冠族陳亡徙關中朗勤學好屬文在陳釋褐秘書郎甚為尚書令江總所重嘗製千字詩當時以為盛作陳後主聞而召入禁中使為月賦朗染翰立成後主曰觀此賦謝希逸不能獨美於前矣又使為芝草嘉蓮二頌深見優賞歷太子洗馬德教殿學士遷秘書丞陳亡仕隋為尚書儀曹郎武德初授齊王文學祠部郎中封汝南縣男再轉給事中貞觀初卒官太宗為之廢朝一日謂高士廉曰袁朗在任雖近然其性謹厚特使人傷惜因敕給其喪事並存問妻子有文集十四卷從父弟承序陳尚書僕射憲之子武德中齊王元吉聞其名召為學士府廢累轉建昌令在任清靜士吏懷之高宗在藩太宗選學行之士為其僚屬謂中書侍郎岑文本曰梁陳名臣有誰可稱復有子弟堪招引否文本因言隋師入陳百司奔散莫有留者唯袁憲獨在其主之傍王世充將受隋禪羣僚表請勸進憲子給事中承家托疾獨不署名此父子足稱忠烈承家弟承序清貞雅操實繼先風由是召守晉王友乃令侍讀加授弘文館學士未幾卒朗從祖弟利貞陳中書令敬之孫也高宗時為太常博士周王侍讀永隆二年王立為皇太子百官上禮高宗將會百官及命婦於宣政殿并設九部伎及散樂利貞上疏諫曰臣以前殿正寢非命婦宴會之地象闕路門非倡優進御之所望詔命婦會於別殿九部伎從東西門入散樂一色伏望停省若於三殿別所自可備極恩私微臣庸蔽不閑典則忝預禮司輕陳狂瞽帝納其言即令移於麟德殿至會日酒酣帝使中書侍郎薛元超謂利貞曰卿門承忠鯁能抗疏直言不加厚賜何以奬勸賜物百段俄遷祠部員外郎卒中宗即位以侍讀恩追贈秘書少監朗十三代祖漢司徒滂滂生魏國郎中御史大夫渙渙生晉尚書準準生東晉右將軍豫章太守冲冲生司徒從事中郎耽耽生琅邪內史質質生丹陽尹宋公長史豹豹生宋吳郡太守洵累代有高名重位前史有傳五代叔祖宋太尉淑高祖父左僕射雍州刺史顗高祖司空察皆死國難曾祖梁中書監司空穆公昂仕齊為吳興太守及梁高祖禪齊久辭朝命父樞叔父憲仕陳皆為陳僕射叔祖敬中書令及陳亡憲冒難扶護後主朗自以中外人物為海內冠族雖琅邪王氏繼有台鼎而歷朝首為佐命鄙之不以為伍朗孫誼又虞世南外孫神功中為蘇州刺史嘗因視事司馬清河張沛通謁沛即侍中文瓘之子誼揖之曰司馬何事沛曰此州得一長史是隴西李亶天下甲門誼曰司馬何言之失門戶須歷代人賢名節風教為衣冠顧矚始可稱舉老夫是也夫山東人尚於婚媾求於祿利作時柱石見危授命則曠代無人何可說之以為門戶沛懷慚而退時人以為口實賀德仁越州山陰人也父朗陳散騎常侍德仁少與從兄德基俱事國子祭酒周弘正咸以詞學見稱時人語曰學行可師賀德基文質彬彬賀德仁德仁兄弟八人時人方之荀氏陳鄱陽王伯山為會稽太守改其所居甘滂里為高陽里德仁事陳至吳興王友入隋僕射楊素薦之授豫章王府記室參軍王以師資禮之恩遇甚厚及煬帝即位豫章王改封齊王又授齊王府屬及齊王獲譴府僚皆被誅責唯德仁以忠謹免罪出補河東郡司法素與隱太子善及高祖平京師隱太子封隴西公用德仁為隴西公友尋遷太子中舍人以衰老不習吏事轉太子洗馬時蕭德言亦為洗馬陳子良為右衞率府長史皆為東宮學士貞觀初德仁轉趙王友無幾卒年七十餘有文集二十卷德仁弟子紀敳亦以博學知名高宗時紀官至太子洗馬修五禮敳至率更令兼太子侍讀兄弟並為崇賢館學士學者榮之庾抱潤州江寧人也其先自潁川徙家焉祖衆陳御史中丞父超南平王記室抱開皇中為延州參軍事後累歲調吏部尚書牛弘知其有學術給筆札令自序援翰便就弘甚奇之後補元德太子學士禮賜甚優會皇孫載誕太子宴賓客抱於坐中獻嫡皇孫頌深被嗟賞後為越巂主簿稱病不行義寧中隱太子弘引為隴西公府記室時軍國多務公府文檄皆出於抱尋轉太子舍人未幾卒有集十卷蔡允恭荊州江陵人也祖點梁尚書儀曹郎父大業後梁左民尚書允恭有風彩善綴文仕隋歷著作佐郎起居舍人雅善吟詠煬帝屬詞賦多令諷誦之嘗遣教宮女允恭深以為恥因稱氣疾不時應召煬帝又許授以內史舍人更令入內教宮人允恭固辭不就以是稍被疏絕江都之難允恭從宇文化及西上沒於竇建德及平東夏太宗引為秦府參軍兼文學館學士貞觀初除太子洗馬尋致仕卒于家有集十卷又撰後梁春秋十卷鄭世翼鄭州滎陽人也世為著姓祖敬德周儀同大將軍父機司武中士世翼弱冠有盛名武德中歷萬年丞揚州錄事參軍數以言辭忤物稱為輕薄時崔信明自謂文章獨步多所凌轢世翼遇諸江中謂之曰嘗聞楓落吳江冷信明欣然示百餘篇世翼覽之未終曰所見不如所聞投之於江信明不能對擁楫而去世翼貞觀中坐怨謗配流巂州卒文集多遺失撰交遊傳頗行於時謝偃衞縣人也本姓直勒氏祖孝政北齊散騎常侍改姓謝氏偃仕隋為散從正員郎貞觀初應詔對策及第歷高陵主簿十一年駕幸東都穀洛泛溢洛陽宮詔求直諫之士偃上封事極言得失太宗稱善引為弘文館直學士拜魏王府功曹偃嘗為塵影二賦甚工太宗聞而召見自制賦序言區宇乂安功德茂盛令其為賦偃奉詔撰成名曰述聖賦賜綵數十匹偃又獻惟皇誡德賦以申諷曰臣聞理忘亂安忘危逸忘勞得忘失此四者人君莫不皆然是以夏桀以瑤臺璇室為麗而不悟鳴條南巢之禍殷辛以象箸玉杯為華而不知牧野白旗之敗故當其盛也謂四海為己力及其衰焉乃匹夫之不制當其信也謂天下為無危及其疑也則顧盼皆讎敵是知必有其德則誠結戎夷化行荒裔苟失其度則變生骨肉釁起腹心矣是以為人主者不可忘初處殿堂則思前主之所以亡朝萬國則思今己之所以貴巡府庫則思今己之所以得視功臣則思其為己之始見名將則思其用力之初苟非忘舊則人無易心何患乎天下之不化故旦行之則為堯舜暮失之則為桀紂豈異人哉其詞曰周墳籍以遐觀總宇宙而一窺結繩往而莫紀書契崇而可知惟皇王之迭代信步驟之恆規莫不慮失者常得懷安者必危是以戰戰慄慄日慎一日守約守儉去奢去逸外無荒禽內無荒色唯賢是授唯人斯恤則三皇不足六五帝不足十若夫恃聖驕力狠戾倔強忠良是棄諂佞斯奬搆崇臺以造天穿深池以絕壤厚賦重斂積寶藏鏹無罪加刑有功不賞則夏桀可二殷辛易兩在危所恃居安勿忘功臣無逐故人無放放故者亡逐功者喪四海岌岌九土漫漫覆之甚易存之實難是以一人有悅萬國同歡一人失所兆庶俱殘喜則隆冬可熱怒則盛夏成寒一動而八表亂一言而天下安舉君過者曰忠述主美者為佞苟承顏以順旨必蔽視而稱聖故使曲者亂直邪者疑正改華服以就胡變雅音而入鄭雖往古之軌躅亦當今之龜鏡崔嵬龍殿赫奕鳳門苞四海以稱主冠天下而獨尊既兄日而姊月亦父乾而母坤視則金翠溢目聽則絲竹盈耳信賞罰之在躬實榮辱之由己語羲皇而易匹言堯舜之可擬驕志自此而生侈心因茲而起常懼覆而懼亡必思足而思止勿忘潛龍之初當懷布衣之始在位稱寶居器曰神鐘鼓庭設玉帛階陳得必有兆失必有因一替一立或周或秦既承前代當思後人唯德可以久天道無常親時李百藥工為五言詩而偃善作賦時人稱為李詩謝賦焉十七年府廢出為湘潭令卒文集十卷崔信明青州益都人也後魏七兵尚書光伯曾孫也祖縚北海郡守信明以五月五日日正中時生有異雀數頭身形甚小五色異備集于庭樹鼓翼齊鳴聲清宛亮隋太史令史良使至青州遇而占之曰五月為火火為離離為文彩日正中文之盛也又有雀五色奮翼而鳴此兒必文藻煥爛聲名播於天下雀形既小祿位殆不高及長博聞強記下筆成章鄉人高孝基有知人之鑒每謂人曰崔信明才學富贍雖名冠一時但恨其位不達耳大業中為堯城令竇建德僭號欲引用之信明族弟敬素為建德鴻臚卿說信明曰隋主無道天下鼎沸衣冠禮樂掃地無餘兄遁跡下僚不被收用豫讓所以不報范中行祇以衆人遇我者也夏王英武有併吞天下之心士女襁負而至者不可稱數此時不立功立事豈是見幾而作者乎信明曰昔申胥海畔漁者尚能固其節吾終不能屈身偽主求斗筲之職遂踰城而遁隱於太行山貞觀六年應詔舉授興世丞遷秦川令卒信明頗蹇傲自伐常賦詩吟嘯自謂過於李百藥時人多不許之又矜其門族輕侮四海士望由是為世所譏子冬日則天時為黃門侍郎被酷吏所殺張蘊古相州洹水人也性聰敏博涉書傳善綴文能背碑覆局尤曉時務為州閭所稱自幽州總管府記室直中書省太宗初即位上大寶箴以諷其詞曰今來古往俯察仰觀惟辟作福為君實難主普天之下處王公之上任土貢其所求具僚和其所唱是故兢懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯歸過於己推恩於民大明無偏照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事出警而入蹕四時同其慘舒三光同其得失故身為之度而聲為之律勿謂無知居高聽卑勿謂何害積小成大樂不可極極樂生哀欲不可縱縱欲成災壯九重於內所居不過容膝彼昏不知瑤其臺而瓊其室羅八品於前所食不過適口唯狂罔念丘其糟而池其酒勿內荒於色勿外荒於禽勿貴難得之貨勿聽亡國之音內荒伐人性外荒蕩人心難得之貨侈亡國之聲淫勿謂我尊而傲賢侮士勿謂我智而拒諫矜己聞之夏王據饋頻起亦有魏帝牽裾不止安彼反側如春陽秋露巍巍蕩蕩恢漢高大度撫茲庶事如履薄臨深戰戰慄慄用周文小心詩云不識不知書曰無偏無黨一彼此於胸臆捐好惡於心想衆棄而後加刑衆悅而後命賞弱其強而治其亂申其屈而直其枉故曰如衡如石不定物以數物之懸者輕重自具如水如鏡不示物以情物之鑒者妍媸自生勿渾渾而濁勿皎皎而清勿沒沒而闇勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲縱心乎湛然之域遊神於至道之精扣之者應洪纖而効響酌之者隨深淺而皆盈故曰天之清地之寧王之貞四時不言而代序萬物無為而受成豈知帝有其力而天下和平吾王撥亂戡以智力民懼其威未懷其德我皇撫運扇以淳風民懷其始未保其終爰述金鏡窮神盡聖使人之心應言以行包括治體抑揚詞令天下為公一人有慶開羅起祝援琴命詩一日二日念茲在茲唯人所召自天祐之爭臣司直敢告前疑太宗嘉之賜以束帛除大理丞初河內人李好德素有風疾而語涉妄妖蘊古究其獄稱好德癲病有徵法不當坐治書侍御史權萬紀劾蘊古家住相州好德之兄厚德為其刺史情在阿縱奏事不實太宗大怒曰小子乃敢亂吾法耶令斬於東市太宗尋悔因發制凡決死者命所司五覆奏自蘊古始也劉胤之徐州彭城人也祖褘之後魏臨淮鎮將胤之少有學業與隋信都丞孫萬壽宗正卿李百藥為忘年之友武德中御史大夫杜淹表薦之再遷信都令甚存惠政永徽初累轉著作郎弘文館學士與國子祭酒令狐德棻著作郎楊仁卿等撰成國史及實錄奏上之封陽城縣男尋以老不堪著述出為楚州刺史卒弟子延祐弱冠本州舉進士累補渭南尉刀筆吏能為畿邑當時之冠司空李勣嘗謂曰足下春秋甫爾便擅大名宜稍自貶抑無為獨出人右也後歷右司郎中檢校司賓少卿封薛縣男徐敬業之亂揚州初平所有刑名莫能決定延祐奉使至軍所決之時議者斷受賊五品官者斬六品者流延祐以為諸非元謀迫脅從盜則置極刑事涉枉濫乃斷受賊五品者流六品已下俱除名而已其得全濟者甚衆出為箕州刺史轉安南都護嶺南俚戶舊輸半課及延祐到遂勒全輸由是其下皆怨謀欲將叛延祐乃誅其首惡李嗣仙垂拱三年嗣仙黨與丁建李思慎等遂率衆圍安南府時城中勝兵不過數百乃禁門堅守以候鄰境之援廣州大族馮子猷幸災樂禍欲因危立功遂按兵縱敵使其為害滋甚延祐遂為思慎所害其後桂州司馬曹玄靜率兵討思慎等擒之盡斬於安南城下胤之從父兄子藏器亦有詞學官至宋州司馬藏器子知柔開元初為工部尚書知柔弟知幾避玄宗名改子玄自有傳張昌齡冀州南宮人弱冠以文詞知名本州欲以秀才舉之昌齡以時廢此科已久固辭乃充進士貢舉及第貞觀二十一年翠微宮成詣闕獻頌太宗召見試作息兵詔草俄頃而就太宗甚悅因謂之曰昔禰衡潘岳皆恃才傲物以至非命汝才不減二賢宜追鑒前軌以副吾所取也乃敕於通事舍人𩹉供奉尋為崑山道行軍記室破盧明月平龜茲軍書露布皆昌齡之文也再轉長安尉出為襄州司戶丁憂去官後賀蘭敏之奏引於北門修撰尋又罷去乾封元年卒文集二十卷兄昌宗亦有學業官至太子舍人修文館學士撰古文紀年新傳三十卷崔行功恆州井陘人北齊鉅鹿太守伯讓曾孫也自博陵徙家焉行功少好學中書侍郎唐儉愛其才以女妻之儉前後征討所有文表皆行功之文高宗時累轉吏部郎中以善敷奏嘗兼通事舍人內供奉坐事貶為游安令尋徵為司文郎中當時朝廷大手筆多是行功及蘭臺侍郎李懷儼之詞先是太宗命秘書監魏徵寫四部羣書將進內貯庫別置讎校二十人書手一百人徵改職之後令虞世南顏師古等續其事至高宗初其功未畢顯慶中罷讎校及御書手令工書人繕寫計直酬傭擇散官隨番讎校其後又詔東臺侍郎趙仁本東臺舍人張文瓘及行功懷儼等相次充使檢校又置詳正學士以校理之行功仍專知御集遷蘭臺侍郎咸亨中官名復舊改為秘書少監上元元年卒官有集六十卷兄子玄暐別有傳行功前後預撰晉書及文思博要等同時又有孟利貞董思恭元思敬等並以文藻知名孟利貞者華州華陰人也父神慶高宗初為沁州刺史以清介著名利貞初為太子司議郎中宗在東宮深懼之受詔與少師許敬宗崇賢館學士郭瑜顧胤董思恭等撰瑤山玉彩五百卷龍朔二年奏上之高宗稱善加級賜物有差利貞累轉著作郎加弘文館學士垂拱初卒又撰續文選十三卷兄允忠垂拱中為天官侍郎董思恭者蘇州吳人所著篇詠甚為時人所重初為右史知考功舉事坐預泄問目配流嶺表而死元思敬者總章中為協律郎預修芳林要覽又撰詩人秀句兩卷傳於世徐齊聃湖州長城人也父孝德以女為才人官至果州刺史齊聃少善屬文高宗時累遷蘭臺舍人時敕令有突厥酋長子弟事東宮齊聃上疏曰昔姬誦與伯禽同業晉儲以師曠為友匪唯專賴師資固亦詳觀近習皇太子自可招集園綺寤寐應劉階闥小臣必採於端士驅馳所任並歸於正人方流好善之風永播崇賢之美今乃使裘之子解辮而侍春闈冒頓之苗削袵而陪望苑在於道義臣竊有疑詩云敬慎威儀以近有德書曰任官惟賢才左右惟其人蓋殷勤於此防微之至也齊聃又嘗上奏曰齊獻公即陛下外氏雖子孫有犯不合上延于祖今周忠孝公廟甚修崇而齊獻公廟遽毀壞不審陛下將何以重示海內以彰孝理之風帝皆納其言齊聃善於文誥甚為當時所稱高宗愛其文令侍周王等屬文以職在樞劇仍敕間日來往焉以漏泄機密左授蘄州司馬俄又坐事配流欽州咸亨中卒年四十餘睿宗即位追錄舊恩累贈禮部尚書子堅別有傳杜易簡襄州襄陽人周硤州刺史叔毘曾孫也九歲能屬文及長博學有高名姨兄中書令岑文本甚推重之登進士第累轉殿中侍御史咸亨中為考功員外郎時吏部侍郎裴行儉李敬玄相與不叶易簡與吏部員外郎賈言忠希行儉之旨上封陳敬玄罪狀高宗惡其朋黨左轉易簡為開州司馬尋卒易簡頗善著述撰御史臺雜注五卷文集二十卷行於代易簡從祖弟審言審言進士舉初為隰城尉雅善五言詩工書翰有能名然恃才謇傲甚為時輩所嫉乾封中蘇味道為天官侍郎審言預選試判訖謂人曰蘇味道必死人問其故審言曰見吾判即自當羞死矣又嘗謂人曰吾之文章合得屈宋作衙官吾之書跡合得王羲之北面其矜誕如此累轉洛陽丞坐事貶授吉州司戶參軍又與州僚不叶司馬周季重與員外司戶郭若訥共搆審言罪狀繫獄將因事殺之既而季重等府中酣讌審言子并年十三懷刃以擊之季重中傷死而并亦為左右所殺季重臨死曰吾不知審言有孝子郭若訥誤我至此審言因此免官還東都自為文祭并士友咸哀并孝烈蘇頲為墓誌劉允濟為祭文後則天召見審言將加擢用問曰卿歡喜否審言蹈舞謝恩因令作歡喜詩甚見嘉賞拜著作佐郎俄遷膳部員外郎神龍初坐與張易之兄弟交往配流嶺外尋召授國子監主簿加修文館直學士年六十餘卒有文集十卷次子閑閑子甫別有傳盧照鄰字昇之幽州范陽人也年十餘歲就曹憲王義方授蒼雅及經史博學善屬文初授鄧王府典籤王甚愛重之曾謂羣官曰此即寡人相如也後拜新都尉因染風疾去官處太白山中以服餌為事後疾轉篤徙居陽翟之具茨山著釋疾文五悲等誦頗有騷人之風甚為文士所重照鄰既沉痼攣廢不堪其苦嘗與親屬執別遂自投潁水而死時年四十文集二十卷兄光乘亦知名長壽中為隴州刺史楊烱華陰人伯祖虔威武德中官至右衞將軍烱幼聰敏博學善屬文神童舉拜校書郎為崇文館學士儀鳳中太常博士蘇知幾上表以公卿已下冕服請別立節文敕下有司詳議烱獻議曰古者太昊庖羲氏仰以觀象俯以察法造書契而文籍生次有黃帝軒轅氏長而敦敏成而聰明垂衣裳而天下理其後數遷五德君非一姓體國經野建邦設都文質所以再而復正朔所以三而改夫改正朔者謂夏后氏之建寅殷人建丑周人建子至於以日繫月以月繫時以時繫年此三王相襲之道也夫易服色者謂夏后氏尚黑殷人尚白周人尚赤至於山龍華蟲宗彝藻火粉米黼黻此又百代可知之道謹按虞書曰予欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡由此言之則其所從來者尚矣日月星辰者明光照下土也山者布散雲雨象聖王大澤霑下也龍者變化無方象聖王應時布教也華蟲者雉也身被五彩象聖王體兼文明也宗彝者武蜼也以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹飪象聖王至德日新也粉米者人恃以生象聖王為物之所賴也黼能斷割象聖王臨事能決也黻者兩己相背象君臣可否相濟也迨有周氏乃以日月星辰為旌旗之飾又登龍於山登火於宗彝於是乎制衮冕以祀先王也九章者法陽數也以龍為首章袞者卷也龍德神異應變潛見表聖王深識遠智卷舒神化也又制鷩冕以祭先公也鷩者雉也有耿介之志表公有賢才能守耿介之節也又制毳冕以祭四望也四望者岳瀆之神也武蜼者山林所生明其象也制絺冕以祭社稷也社稷者土穀之神也粉米由之而成象其功也又制玄冕以祭羣小祀也百神異形難可遍擬但取黻之相背昭異名也夫以周公之多才也故治定制禮功成作樂夫以孔宣之將聖也故行夏之時服周之冕先王之法服乃此之自出矣天下之能事又於是乎畢矣今知幾表狀請制大明冕十三章乘輿服之者謹按日月星辰者已施於旌旗矣龍武山火者又不踰於古矣而云麟鳳有四靈之名玄龜有負圖之應雲有紀官之號水有盛德之祥此蓋別表休徵終是無踰比象然則皇王受命天地興符仰觀則璧合珠連俯察則銀黃玉紫殫南宮之粉壁不足寫其形狀罄東觀之鉛黃未可紀其名實固不可畢陳於法服也雲者龍之氣也水者藻之自生也又不假別為章目此蓋不經之甚也又鸞冕八章三公服之者鸞者太平之瑞也非三公之德也鷹鸇者鷙鳥也適可以辨祥刑之職也熊羆者猛獸也適可以旌武臣之力也又稱藻為水草無所法象引張衡賦蔕倒茄於藻井披紅葩之狎獵請為蓮華取其文彩者夫茄者蓮也若以蓮代藻變古從今既不知草木之名亦未達文章之意此又不經之甚也又毳冕六章三品服之者按此王者祀四望服之名也今三品乃得同王之毳冕而三公不得同王之衮名豈唯顛倒衣裳抑亦自相矛盾此又不經之甚也又黻冕四章五品服之者考之於古則無其名驗之於今則非章首此又不經之甚也若夫禮唯從俗則命為制令為詔乃秦皇之故事猶可以適於今矣若夫義取隨時則出稱警入稱蹕乃漢國之舊儀猶可以行於代矣亦何取變周公之軌物改宣尼之法度者哉由是竟寢知幾所請烱俄遷詹事司直則天初坐從祖弟神讓犯逆左轉梓州司法參軍秩滿選授盈川令如意元年七月望日宮中出盂蘭盆分送佛寺則天御洛南門與百僚觀之烱獻盂蘭盆賦詞甚雅麗烱至官為政殘酷人吏動不如意輒搒殺之又所居府舍多進士亭臺皆書榜額為之美名大為遠近所笑無何卒官中宗即位以舊僚追贈著作郎文集三十卷烱與王勃盧照鄰駱賓王以文詞齊名海內稱為王楊盧駱亦號為四傑烱聞之謂人曰吾愧在盧前恥居王後當時議者亦以為然其後崔融李嶠張說俱重四傑之文崔融曰王勃文章宏逸有絕塵之跡固非常流所及烱與照鄰可以企之盈川之言信矣說曰楊盈川文思如懸河注水酌之不竭既優於盧亦不減王恥居王後信然愧在盧前謙也開元中說為集賢大學士十餘年常與學士徐堅論近代文士悲其凋喪堅曰李趙公崔文公之筆術擅價一時其間孰優說曰李嶠崔融薛稷宋之問之文如良金美玉無施不可富嘉謨之文如孤峯絕岸壁立萬仞濃雲鬱興震雷俱發誠可畏也若施於廊廟則駭矣閻朝隱之文如麗服靚塟燕歌趙舞觀者忘疲若類之風雅則罪人矣問後進詞人之優劣說曰韓休之文如太羹旨酒雅有典則而薄於滋味許景先之文如豐肌膩理雖穠華可愛而微少風骨張九齡之文如輕縑素練實濟時用而微窘邊幅王翰之文如瓊杯玉斝雖爛然可珍而多有玷缺堅以為然虔威子德幹高宗末歷澤齊汴相四州刺史治有威名郡人為之語曰寧食三斗蒜不逢楊德幹子神讓天授初與徐敬業於揚州謀叛父子伏誅王勃字子安絳州龍門人祖通隋蜀郡司戶書佐大業末棄官歸以著書講學為業依春秋體例自獲麟後歷秦漢至於後魏著紀年之書謂之元經又依孔子家語揚雄法言例為客主對答之說號曰中說皆為儒士所稱義寧元年卒門人薛收等相與議諡曰文中子二子福畤福郊勃六歲解屬文構思無滯詞情英邁與兄勔才藻相類父友杜易簡常稱之曰此王氏三珠樹也勃年未及冠應幽素舉及第乾封初詣闕上宸遊東嶽頌時東都造乾元殿又上乾元殿頌沛王賢聞其名召為沛府修撰甚愛重之諸王鬬雞互有勝負勃戲為檄英王雞文高宗覽之怒曰據此是交搆之漸即日斥勃不令入府久之補虢州參軍勃恃才傲物為同僚所嫉有官奴曹達犯罪勃匿之又懼事洩乃殺達以塞口事發當誅會赦除名時勃父福畤為雍州司戶參軍坐勃左遷交阯令上元二年勃往交趾省父道出江中為採蓮賦以見意其辭甚美渡南海墮水而卒時年二十八弱冠進士登第累除太子典膳丞長壽中擢為鳳閣舍人時壽春王成器衡陽王成義等五王初出閣同日授冊有司撰儀注忘載冊文及百僚在列方知闕禮宰相相顧失色立召書吏五人各令執筆口占分寫一時俱畢詞理典贍人皆歎服尋加弘文館學士兼知天官侍郎頗任權勢交結非類萬歲通天二年綦連耀謀逆事泄坐與耀善并弟勔並伏誅勔累官至涇州刺史神龍初有詔追復勔官位福畤天后朝以子貴累轉澤州長史卒初吏部侍郎裴行儉典選有知人之鑒見與蘇味道謂人曰二子亦當掌銓衡之任李敬玄尤重楊烱盧照鄰駱賓王與勃等四人必當顯貴行儉曰士之致遠先器識而後文藝勃等雖有文才而浮躁淺露豈享爵祿之器耶楊子沉靜應至令長餘得令終為幸果如其言勃文章邁捷下筆則成尤好著書撰周易發揮五卷及次論等書數部勃亡後並多遺失有文集三十卷勃聰警絕衆於推步曆算尤精嘗作大唐千歲曆言唐德靈長千年不合承周隋短祚其論大旨云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者三十代而八百年火王者二十代而七百年此天地之常期符曆之數也自黃帝至漢並是五運真主五行已遍土運復歸唐德承之宜矣魏晉至于周隋咸非正統五行之沴氣也故不可承之大率如此駱賓王婺州義烏人少善屬文尤妙於五言詩嘗作帝京篇當時以為絕唱然落魄無行好與博徒遊高宗末為長安主簿坐贓左遷臨海丞怏怏失志棄官而去文明中與徐敬業於揚州作亂敬業軍中書檄皆賓王之詞也敬業敗伏誅文多散失則天素重其文遣使求之有兗州人郄雲卿集成十卷盛傳於世鄧玄挺雍州藍田人少善屬文累遷左史坐與上官儀善出為頓丘令有善政璽書勞問累授中書舍人性俊辨機捷過人每有嘲謔朝廷稱為口實則天臨朝遷吏部侍郎既不稱職甚為時談所鄙又患消渴之疾選人目為鄧渴為榜於衢路自有唐已來掌選之失未有如玄挺者坐此左遷澧州刺史在州復以善政聞遷晉州刺史召拜麟臺少監重為天官侍郎其失又甚於前玄挺女為道王子諲妻又與蔣王子煒相善諲謀迎中宗於房陵以問玄挺煒又嘗謂玄挺曰欲作急計如何玄挺雖皆不答而不以告永昌元年得罪下獄死
