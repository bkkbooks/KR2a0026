body:
  text: 舊唐書卷三十七志第十七五行昔禹得河圖洛書六十五字治水有功因而寶之殷太師箕子入周武王訪其事乃陳洪範九疇之法其一曰五行漢興董仲舒劉向治春秋論災異乃引九疇之說附于二百四十二年行事一推咎徵天人之變班固漢史採其說五行志綿代史官因而纘之今略舉大端以明變怪之本經曰水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡又曰建用皇極傳曰畋獵不時飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上好治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成好戰功輕百姓飾城郭侵邊境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下經曰敬用五事謂貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖又曰建用皇極皇建其有極傳曰貌之不恭是謂不肅厥咎狂厥罰恆雨厥極凶時則有服妖時則有龜孽時則有雞禍時則有下體生上之痾時則有青眚青祥凡草木之類謂之妖蟲豸之類謂之孽六畜謂之禍及人謂之痾甚則異物生謂之眚身外而來謂之祥也言之不從是謂不乂厥咎僭厥罰恆暘厥極憂時則有詩妖時則有介蟲之孽時則有犬禍時則有口舌之痾時則有白眚白祥視之不明是謂不哲厥咎豫厥罰恆燠厥極疾時則有草妖時則有裸蟲之孽時則有羊禍時則有目痾時則有赤眚赤祥聽之不聰是謂不謀厥咎急厥罰恆寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥思之不睿是謂不聖厥咎蒙厥罰恆風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黃眚黃祥皇之不極是謂不建厥咎眊厥罰恆陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下體代上之痾時則有日月亂行星辰逆行九疇名數十五其要五行皇極之說前賢所以窮治亂之變談天人之際蓋本于斯故先録其言以傳於事京房易傳曰臣事雖正專必地震其震於水則波於木則搖於屋則瓦落大經在辟而易臣茲謂陰動又曰小人剝廬厥妖山崩茲謂陰乘陽弱勝強劉向曰金木水沴土地所以震春秋災異先書地震日蝕惡陰盈也貞觀十二年正月二十二日松叢二州地震壞人廬舍二十年九月十五日靈州地震有聲如雷二十三年八月一日晉州地震壞人廬舍壓死者五十餘人三日又震十一月五日又震永徽元年四月一日又震六月十二日又震高宗顧謂侍臣曰朕政教不明使晉州之地屢有震動侍中張行成曰天陽也地陰也陽君象陰臣象君宜轉動臣宜安靜今晉州地震彌旬不休臣將恐女謁用事大臣陰謀且晉州陛下本封今地屢震尤彰其應伏願深思遠慮以杜其萌帝深然之開元二十二年二月十八日秦州地震先是秦州百姓聞州西北地下殷殷有聲俄而地震壞廨宇及居人廬舍數千間地拆而復合震經時不定壓死百餘人玄宗令右丞相蕭嵩致祭山川又遣倉部員外郎韋伯陽往宣慰存恤所損之家至德元年十一月辛亥朔河西地震有聲地裂陷壞廬舍張掖酒泉尤甚至二載六月始止大曆二年十一月壬申京師地震有聲自東北來如雷者三四年二月丙辰夜京師地震有聲如雷者三貞元三年十一月己卯夜京師地震是夕者三巢鳥皆驚人多去室東都蒲陝亦然四年正月朔日德宗御含元殿受朝賀是日質明殿階及欄檻三十餘間無故自壞甲士死者十餘人其夜京師地震二日又震三日又震十八日又震十九日又震二十日又震帝謂宰臣曰蓋朕寡德屢致后土震驚但當修政以答天譴耳二十三日又震二十四日又震二十五日又震時金房州尤甚江溢山裂屋宇多壞人皆露處至二月三日壬午又震甲申又震乙酉又震丙申又震三月甲寅又震己未又震庚午又震辛未又震京師地生毛或白或黃有長尺餘者五月丁卯又震八月甲辰又震其聲如雷九年四月辛酉京師又震有聲如雷河中尤甚壞城壘廬舍地裂水涌十年四月戊申又震十三年十月乙未日午時震從東來須臾而止元和七年八月京師地震憲宗謂侍臣曰昨地震草樹皆搖何祥異也宰臣李絳曰昔周時地震三川竭太史伯陽甫謂周君曰天地之氣不過其序若過其序人亂也人政乖錯則上感陰陽之氣陽伏而不能出陰迫而不能升于是有地震又孔子修春秋所紀災異先地震日蝕蓋地載萬物日君象政有感傷天地見眚書之示戒用警後王伏願陛下體勵虔恭之誠動以利萬物綏萬方為念則變異自消休徵可致九年三月丙辰巂州地震晝夜八十震方止壓死者百餘人大和九年三月乙卯京師地震開成元年二月乙亥夜四更京師地震屋瓦皆墜戶牖之間有聲二年十一月乙丑夜地南北微震大中三年十月京師地震振武天德靈武鹽夏等州皆震壞軍鎮廬舍武德六年七月二十日巂州山崩川水咽流貞觀八年七月七日隴右山崩大蛇屢見太宗問祕書監虞世南曰是何災異對曰春秋時梁山崩晉侯召伯宗而問焉對曰國主山川故山崩川竭君為之不舉降服出次祝幣以禮焉晉侯從之卒亦無害漢文帝九年齊楚地二十九山同日崩文帝出令郡國無來獻施惠于天下遠近歡洽亦不為災後漢靈帝時青蛇見御座晉惠帝時大蛇長三百步經市入廟今蛇見山澤蓋深山大澤實生龍蛇亦不足怪也唯修德可以消變上然之十七年八月四日涼州昌松縣鴻池谷有石五青質白文成字曰高皇海出多子李元王八十年太平天子李世民千年太子李治書燕山人士樂太國主尚汪談奬文仁邁千古大王五王六王七王十毛才子七佛八菩薩及上果佛田天子文武貞觀昌大聖延四方上下治示孝仙戈入為善涼州奏其年十一月三日遣使祭之曰嗣天子某祚繼鴻業君臨宇縣夙興旰食無忘于政導德齊禮愧於前修天有成命表瑞貞石文字昭然曆數唯永既旌高廟之業又錫眇身之祚逮于皇太子治亦降貞符具紀姓氏列于石言仰瞻睿漢空銘大造甫惟寡薄彌增寅懼敢因大禮重薦玉帛上謝明靈之貺以申祗栗之誠永徽四年八月二十日隕石十八于同州馮翊縣光曜有聲如雷上問于志寧曰此何祥也當由朕政之有闕對曰按春秋隕石于宋五內史過曰是陰陽之事非吉凶所生自古災變杳不可測但恐物之自爾未必關于人事陛下發書誡懼責躬自省未必不為福矣永昌中華州敷水店西南坡白晝飛四五里直抵赤水其坡上樹木禾黍宛然無損則天時新豐縣東南露臺鄉因大風雨雹震有山踊出高二百尺有池周三頃池中有龍鳳之形禾麥之異則天以為休徵名為慶山荊州人俞文俊詣闕上書曰臣聞天氣不和而寒暑隔人氣不和而疣贅生地氣不和而堆阜出今陛下以女主居陽位反易剛柔故地氣隔塞山變為災陛下以為慶山臣以為非慶也誠宜側身修德以答天譴不然恐災禍至則天怒流于嶺南開元十七年四月五日大風震電藍田山開百餘步乾元二年六月虢州閺鄉縣界黃河內女媧墓天寶十三載因大雨晦冥失其所在至今年六月一日夜河濱人家忽聞風雨聲曉見其墓踊出上有雙柳樹下有巨石二柳各長丈餘郡守圖畫以聞今號風陵堆大曆十三年郴州黃芩山崩震壓殺數百人建中初魏州魏縣西四十里忽然土長四五尺數畝里人駭異之明年魏博田悅反德宗命河東馬燧潞州李抱真討之營于陘山幽州朱滔恆州王武俊帥兵救田悅王師退保魏縣西朱滔武俊田悅引軍與王師對壘三年十一月朱滔僭稱冀王武俊稱趙王田悅稱魏王悅時壘正當土長之所及僭署告天乃因其長土為壇以祭魏州功曹韋稔為益土頌以媚悅馬燧聞之笑曰田悅異常賊也貞觀十一年七月一日黃氣竟天大雨穀水溢入洛陽宮深四尺壞左掖門毀宮寺一十九洛水暴漲漂六百餘家帝引咎令羣臣直言政之得失中書侍郎岑文本曰伏唯陛下覽古今之事察安危之機上以社稷為重下以億兆為念明選舉慎賞罰進賢才退不肖聞過即改從諫如流為善在於不疑出令期於必信頤神養性省畋游之娛去奢從儉減工役之費務靜方內不求闢土載槖弓矢而無忘武備凡此數者願陛下行之不怠必當轉禍為福化咎為祥況水之為患陰陽常理豈可謂之天譴而繫聖心哉十三日詔曰暴雨為災大水泛溢靜思厥咎朕甚懼焉文武百僚各上封事極言朕過無有所諱諸司供進悉令減省凡所力役量事停廢遭水之家賜帛有差二十日詔廢明德宮及飛山宮之玄圃院分給河南洛陽遭水戶九月黃河泛溢壞陝州河北縣及太原倉毀河陽中灘太宗幸白馬坂以觀之永徽五年六月恆州大雨自二日至七日滹沱河水泛溢損五千三百家總章二年七月冀州奏六月十三日夜降雨至二十日水深五尺其夜暴水深一丈已上壞屋一萬四千三百九十區害田四千四百九十六頃九月十八日括州暴風雨海水翻上壞永嘉安固二縣城百姓廬舍六千八百四十三區殺人九千七十牛五百頭損田苗四千一百五十頃咸亨元年五月十四日連日澍雨山水溢溺死五千餘人永淳元年六月十二日連日大雨至二十三日洛水大漲漂損河南立德弘敬洛陽景行等坊二百餘家壞天津橋及中橋斷人行纍日先是頓降大雨沃若懸流至是而泛溢衝突焉西京平地水深四尺已上麥一束止得一二升米一斗二百二十文布一端止得一百文國中大饑蒲同等州沒徙家口并逐糧飢餒相仍加以疾疫自陝至洛死者不可勝數西京米斗三百已下二年三月洛州黃河水溺河陽縣城水面高於城內五六尺自鹽坎已下至縣十里石灰並平流津橋南北道無不碎破文明元年七月溫州大水漂流四千餘家長安三年寧州大霖雨山水暴漲漂流二千餘家溺死者千餘人流尸東下十七日京師大雨雹人有凍死者四年自九月至十月晝夜陰晦大雨雪都中人畜有餓凍死者令開倉賑恤神龍元年七月二十七日洛水漲壞百姓廬舍二千餘家詔九品已上直言極諫右衛騎曹宋務光上疏曰臣聞自昔后王樂聞過罔不興拒忠諫罔不亂何者樂聞過則下情通下情通則政無缺此其所以興也拒忠諫則羣議壅羣議壅則主孤立此其所以亂也伏見明敕令文武九品已上直言極諫大哉德音其堯舜之用心禹湯之責己也臣嘗讀書觀天人相與之際考休咎冥符之兆有感必通其間甚密是以政失於此變生於彼亦猶影之像形響之赴聲動而輒隨各以類應故易曰天垂象見吉凶聖人象之竊見自夏己來水氣悖戾天下郡國多罹其災去月二十七日洛水暴漲漂損百姓謹按五行傳曰簡宗廟廢祭祀則水不潤下夫王者即位必郊祀天地嚴配祖宗是故鬼神歆饗多獲福助自陛下光寶極綿歷炎涼郊廟遲留不得殷薦山川寂寞未議懷柔暴水之災殆因此發臣又按水者陰類臣妾之道陰氣盛滿則水泉迸溢加之虹霓紛錯暑雨滯淫雖丁厥時而汨恆度亦陰勝之沴也臣恐後庭近習或有離中饋之職干外朝之政伏願深思天變杜絶其萌又自春及夏牛多病死疫氣浸淫于今未息謹按五行傳曰思之不睿時則有牛禍意者萬機之事陛下或未躬親乎昔太戊有異木生于朝伊陟戒之修德厥妖用殄高宗有飛雉雊于鼎祖己陳以政事殷道再興此皆視履考祥轉禍為福之明鑑也朝錯曰五帝其臣不及則自親之今朝廷怪異雖則多矣然皆仰知陛下天光伏願勤思德容少凝大化以萬方為念不以聲色為娛以百姓為憂不以犬馬為樂暫勞宵旰用緝明良豈不休哉天下幸甚臣聞三王之朝不能免淫亢太平之時不能無小孽備禦之道存乎其人若細微之災恬而不怪及禍變成象駭而圖之猶水決而繕防疾困而求藥雖復僶俯亦何救哉夫災變應天實繫人事故日蝕修德月蝕修刑若乃雨暘或愆則貌言為咎雩禜之法在于禮典今暫逢霖雨即閉坊門𠫓廾先聖之明訓遵後來之淺術時偶中之安足神耶蓋當屏翳收津豐隆戢響之日也豈有一坊一市遂能感召皇靈暫閉暫開便欲發揮神道必不然矣何其謬哉至今巷議街言共呼坊門為宰相謂能節宣風雨燮理陰陽夫如是則赫赫師尹便為虛設悠悠蒼生復何所望自數年已來公私俱竭戶口減耗家無接新之儲國無候荒之蓄陛下不出都邑近觀朝市則以為率土之人既康且富及至踐閭陌視鄉亭百姓衣牛馬之衣食犬彘之食十室而九空丁壯盡於邊塞孤孀轉於溝壑猛吏淫威奮其毒暴徵急政破其資馬困斯跌人窮乃詐或起為姦盜或競為流亡從而刑之良可悲也臣觀今之氓俗率多輕佻人貧而奢不息法設而僞不止長吏貪冒選舉私謁樂多繁淫器尚浮巧稼穡之人少商旅之人多誠願坦然更化以身先之端本澄源滌瑕蕩穢接凋殘之後宜緩其力役當久弊之極宜法訓敦龐良牧樹風賢宰垂化十年之外生聚方足三代之美庶幾可及臣聞太子者君之二國之本易有其卦天有其星今古相循率由茲道陛下自登皇極未建元良非所以守器承祧養德贊業離明不可輟曜震位不可久虛伏願早擇賢能以光儲副上安社稷下慰黎元且姻戚之間謗議所集假令漢帝無私於廣國元規切讓於中書天下之人安可戶說稽疑成患馮寵生災所謂愛之適足以害之至如武三思等誠能輟其機務授以清間厚祿以富其身蕃錫以奬其意家國俱泰豈不優乎夫爵賞者君之重柄傳曰惟名與器不可假人自頃官賞頗亦乖謬大勳未滿于人聽高秩已越于朝倫貪天之功以為己力祕書監鄭普思國子祭酒葉靜能或挾小道以登朱紫或因淺術以取銀黃既虧國經實悖天道書曰制理於未亂保邦於未危此誠理亂安危之時也伏願欽祖宗之丕烈傷王業之艱難遠佞人親有德乳保之愛妃主之家以時接見無令媟瀆凡此數者當今急務唯陛下留神採納永保康寧疏奏不省右僕射唐休璟以霖雨為害咎在主司上表曰臣聞天運其工人代之而為理神行其化為政資之以和得其理則陰陽以調失其和則災沴斯作故舉才而授帝唯其難論道於邦官不必備頃自中夏及乎首秋郡國水災屢為人害夫水陰氣也臣實主之臣忝職右樞致此陰沴不能調理其氣而乃曠居其官雖運屬堯年則無治水之用位侔殷相且闕濟川之功猶負明刑坐逃皇譴皇恩不𠫓廾其若天何昔漢家故事丞相以天災免職臣竊遇聖時豈敢靦顏居位乞解所任待罪私門冀移陰咎之徵復免夜行之眚神龍二年三月壬子洛陽東十里有水影月餘乃滅四月洛水泛溢壞天津橋漂流居人廬舍溺死者數千人三年夏山東河北二十餘州大旱饑饉死者二千餘人景龍二年正月滄州雨雹大如雞卵開元五年六月十四日鞏縣暴雨連日山水泛漲壞郭邑廬舍七百餘家人死者七十二汜水同日漂壞近河百姓二百餘戶八年夏契丹寇營州發關中卒援之軍次澠池縣之闕門野營穀水上夜半山水暴至二萬餘人皆溺死唯行網役夫樗蒲覺水至獲免逆旅之家溺死死人漂入苑中如積其年六月二十一日夜暴雨東都穀洛溢入西上陽宮宮人死者十七八畿內諸縣田稼廬舍蕩盡掌關兵士凡溺死者一千一百四十八人京城興道坊一夜陷為池一坊五百餘家俱失其年鄧州三鴉口大水塞谷初見二小兒以水相潑須臾有大蛇十圍已上張口向天人或斫射之俄而暴雷雨漂溺數百家十年二月四日伊水泛漲毀都城南龍門天竺奉先寺壞羅郭東南角平地水深六尺已上入漕河水次屋舍樹木蕩盡河南汝許仙豫唐鄧等州各言大水害秋稼漂沒居人廬舍十四年六月戊午大風拔木發屋端門鴟吻盡落都城內及寺觀落者約半七月十四日瀍水暴漲流入洛漕漂沒諸州租船數百艘溺死者甚衆漂失楊壽光和廬杭瀛棣租米一十七萬二千八百九十六石并錢絹雜物等因開斗門決堰引水南入洛漕水燥竭以搜漉官物十收四五焉七月甲子懷衛鄭滑汴濮許等州澍雨河及支川皆溢人皆巢舟以居死者千計資産苗稼無孑遺滄州大風海運船沒者十一二失平盧軍糧五千餘石舟人皆死潤州大風從東北海濤奔上沒瓜步洲損居人是秋天下八十五州言旱及霜五十州水河南河北尤甚十五年七月甲寅雷震興教門樓兩鴟吻燒樓柱良久乃滅二十日鄜州雨洛水溢入州城平地丈餘損居人廬舍溺死者不知其數二十一日同州損郭邑及市毀馮翊縣八月八日澠池縣夜有暴雨澗水穀水漲合毀郭邑百餘家及普門佛寺是歲天下六十三州大水損禾稼居人廬舍河北尤甚十八年六月乙丑東都瀍水暴漲漂損揚楚淄德等州租船壬午東都洛水泛漲壞天津永濟二橋及漕渠斗門漂損提象門外助鋪及仗舍又損居人廬舍千餘家二十七年八月東京改作明堂訛言官取小兒埋于明堂下以為厭勝村邑童兒藏于山谷都城騷然或言兵至玄宗惡之遣主客郎中王佶往東都及諸州宣慰百姓久之乃定二十九年暴水伊洛及支川皆溢損居人廬舍秋稼無遺壞東都天津橋及東西漕河南北諸州皆多漂溺天寶十載廣陵郡大風架海潮淪江口大小船數千艘十三載秋京城連月澍雨損秋稼九月遣閉坊市北門蓋井禁婦人入街市祭玄冥大社禜門京城坊市牆宇崩壞向盡東方瀍洛水溢隄穴衝壞一十九坊上元二年京師自七月霖雨八月盡方止京城宮寺廬舍多壞街市溝渠中漉得小魚永泰元年先旱後水九月大雨平地水數尺溝河漲溢時吐蕃寇京畿以水自潰而去二年夏洛陽大雨水壞二十餘坊及寺觀廨舍河南數十州大水大曆四年秋大雨是歲自四月霖澍至九月京師米斗八百文官出太倉米賤糶以救饑人京城閉坊市北門門置土臺臺上置壇及黃幡以祈晴秋末方止五年夏復大雨京城饑出太倉米減價以救人十二年秋大雨是歲春夏旱至秋八月雨河南尤甚平地深五尺河決漂溺田稼貞元二年夏京師通衢水深數尺吏部侍郎崔縱自崇義里西門為水漂浮行數十步街鋪卒救之獲免其日溺死者甚衆東都河南荊南淮南江河泛溢壞人廬舍四年八月連雨灞水暴溢溺殺渡者百餘人八年秋大雨河南河北山南江淮凡四十餘州大水漂溺死者二萬餘人時幽州七月大雨平地水深二丈鄚涿薊檀平五州平地水深一丈五尺又徐州奏自五月二十五日雨至七月八日方止平地水深一丈二尺郭邑廬里屋宇田稼皆盡百姓皆登丘冢山原以避之元和七年正月振武界黃河溢毀東受降城五月饒撫虔吉信五州山水暴漲壞廬舍虔州尤甚水深處四丈餘八年五月許州奏大雨摧大隗山水流出溺死者千餘人六月庚寅京師大風雨毀屋揚瓦人多壓死水積城南深處丈餘入明德門猶漸車輻辛卯渭水暴漲毀三渭橋南北絶濟者一月時所在霖雨百源皆發川瀆不由故道丙申富平大風折樹一千二百株辛丑出宮人二百車人得娶納以水害誡陰盈也九年秋淮南宣州大水十一年五月京畿大雨害田四萬頃昭應尤甚漂溺居人衢州山水涌深三丈壞州城民多溺死浮梁樂平溺死者一百七十人為水漂流不知所在者四千七百戶潤常湖陳許等州各損田萬頃十二年秋大雨河南北水害稼其年六月京師大雨街市水深三尺壞廬舍二千家含元殿一柱陷十五年九月十一日至十四日大雨兼雪街衢禁苑樹無風而摧折連根而拔者不知其數仍令閉坊市北門以禳之滄州大水長慶二年十月好畤山水泛漲漂損居人三百餘家河南陳許二州尤甚詔賑貸粟五萬石量人戶家口多少等第分給大和三年四月同官暴水漂沒三百餘家六年徐州自六月九日大雨至十一日壞民舍九百家四年夏鄆曹濮雨壞城郭田廬向盡蘇湖二州水壞六堤水入郡郭溺廬井許州自五月大雨水深八尺壞郡郭居民大半會昌元年七月襄州漢水暴溢壞州郭均州亦然則天時宗秦客以佞幸為內史受命之日無雲而雷聲震烈未周歲而誅延和元年六月河南偃師縣之李材村有霹靂閃入人家地震裂闊丈餘長十五里測之無底所裂之處井廁相通所衝之冢棺柩出植平地無損竟不知其故儀鳳三年十一月十四日雨木冰開元十五年七月四日雷震興教門兩鴟吻欄檻及柱災二十九年十一月二十二日雨木冰凝寒凍冽數日不解寧王見而歎曰諺云樹稼達官怕必有大臣當之其月王薨乾元三年閏四月大霧大雨月餘是月史思明再陷東都京師米斗八百文人相食殍骸蔽地永泰元年二月甲子夜雷電震烈三月降霜為木冰辛亥大風拔木大曆二年三月辛亥夜京師大風發屋十一月紛霧如雪草木冰十年四月甲申夜大雨雹暴風拔樹飄屋瓦宮寺鴟吻飄失者十五六人震死者十二損京畿田稼七縣七月己未夜杭州大風海水翻潮飄蕩州郭五千餘家船千餘隻全家陷溺者百餘戶死者四百餘人蘇湖越等州亦然貞元二年正月大雨雪平地深尺餘雪上有黃色狀如浮埃四年正月陳留十里許雨木皆大如指長寸餘木有孔通中所下立者如植其年宣州暴雨震電有物墮地猪首手腳各有兩指執一赤斑蛇食之逡巡黑雲合不見八年二月京師雨土五月己未暴風破屋拔樹太廟屋及諸門寺署壞者不可勝計十年六月辛丑晦有水鳥集於左藏庫其夜暴雨大風拔樹十七年二月五日大雨雹七日大霜十六夜大雨震雷且電十九日大雨雪而電元和三年四月壬申大風毀含元殿西闕欄檻二十七間八年三月丙子大風拔崇陵上宮衙殿西鴟尾并上宮西神門六戟竿折行牆四十間簷壞長慶元年九月壬寅京師震電大風雨四年五月庚辰大風吹壞延喜景風二門大和八年六月癸未暴風雷雨壞長安縣廨及經行寺塔同華大旱七月辛酉定陵臺大風雨震東廊之下地裂一百三十尺其深五尺詔宗正卿李仍叔啓告修之九年四月二十六日夜大風含元殿四鴟吻皆落拔殿前樹三壞金吾仗舍廢樓觀內外城門數處光化門西城牆壞七十七步是日廢長生院起內道場取李訓言沙汰僧尼故也開成元年夏六月鳳翔麟遊縣暴風雨飄害九成宮正殿及滋善寺佛舍壞百姓屋三百間死者百餘人牛馬不知其數長安四年九月後霖雨并雪凡陰一百五十餘日至神龍元年正月五日誅二張孝和反正方晴霽先天二年四月陰至六月一百餘日至七月三日誅竇懷貞等一十七家方晴景龍中東都霖雨百餘日閉坊市北門駕車者苦甚污街中言曰宰相不能調陰陽致茲恆雨令我污行會中書令楊再思過謂之曰於理則然亦卿牛劣耳貞元二十一年順宗風疾叔文用事連月霖雨不霽乃以憲宗為皇太子制出日即晴傳所謂皇之不極厥罰恆陰皆此數也貞觀二年六月京畿旱蝗食稼太宗在苑中掇蝗咒之曰人以穀為命而汝害之是害吾民也百姓有過在豫一人汝若通靈但當食我無害吾民將吞之侍臣恐上致疾遽諫止之上曰所冀移災朕躬何疾之避遂吞之是歲蝗不為患開元四年五月山東螟蝗害稼分遣御史捕而埋之汴州刺史倪若水拒御史執奏曰蝗是天災自宜修德劉聰時除既不得為害滋深宰相姚崇牒報之曰劉聰僞主德不勝妖今日聖朝妖不勝德古之良守蝗蟲避境若言修德可免彼豈無德致然今坐看食苗忍而不救因此饑饉將何以安卒行埋瘞之法獲蝗一十四萬乃投之汴河流者不可勝數朝議喧然上復以問崇崇對曰凡事有違經而合道反道而適權者彼庸儒不足以知之縱除之不盡猶勝養之以成災帝曰殺蟲太多有傷和氣公其思之崇曰若救人殺蟲致禍臣所甘心八月四日敕河南河北檢校捕蝗使狄光嗣康瓘敬昭道高昌賈彥璿等宜令待蟲盡而刈禾將畢即入京奏事諫議大夫韓思復上言曰伏聞河北蝗蟲頃日益熾經歷之處苗稼都盡臣望陛下省咎責躬發使宣慰損不急之務去至冗之人上下同心君臣一德持此至誠以答休咎前後捕蝗使望並停之上出符疏付中書姚崇乃令思復往山東檢視蟲災之所及還具以聞二十五年貝州蝗食苗有白鳥數萬羣飛食蝗一夕而盡明年榆林關有刟繕食苗羣雀來食數日而盡天寶三載貴州紫蟲食苗時有赤鳥羣飛自東北來食之廣德元年秋刟繕食苗關西尤甚米斗千錢興元元年秋關輔大蝗田稼食盡百姓饑捕蝗為食蒸曝揚去足翅而食之明年夏蝗尤甚自東海西盡河隴羣飛蔽天旬日不息經行之處草木牛畜毛靡有孑遺關輔已東穀大貴餓饉枕道京師大亂之後李懷光據河中諸軍進討國用罄竭衣冠之家多有殍殕者旱甚灞水將竭井皆無水有司奏國用裁可支七旬德宗減膳不御正殿百司不急之費皆減之元和元年夏鎮冀蝗害稼長慶三年秋洪州旱螟蝗害稼八萬頃大和元年秋旱罷選舉開成二年河南河北旱蝗害稼京師旱尤甚徙市閉坊南門四年六月天下旱蝗食田禱祈無效上憂形于色宰臣曰星官奏天時當爾乞不過勞聖慮文宗懍然改容曰朕為天下主無德及人致此災旱今又彗星謫見于上若三日內不雨當退歸南內卿等自選賢明之君以安天下宰臣嗚咽流涕不能已是歲河南府界黑蟲食苗河南河北蝗害稼都盡鎮定等州田稼既盡至于野草樹葉細枝亦盡會昌元年山南鄧唐等州蝗害稼貞觀十三年四月二十九日雲陽石燃方丈晝如炭夜則光見投草木於其上則焚歷年方止證聖元年正月十六日夜明堂火延及天堂京城光照如晝至曙並為灰燼則天欲避殿徹樂宰相姚璹以為火因麻主人護不謹非天災也不宜貶損乃勸則天御端門觀酺引建章故事令薛懷義重造明堂以厭勝之則天時建昌王武攸寧置內庫長五百步二百餘間別貯財物以求媚一夕為天災所燔玩好並盡景龍中東都淩空觀災火自東北來其金銅諸像銷鑠並盡開元五年洪潭二州災火延燒郡舍郡人先見火精赤暾暾飛來旋即火發十五年衡州災火延燒三四百家郡人見物大如瓮赤如燭籠此物所至即火發十八年二月十八日大雨雪俄又雷震飛龍災天寶二年六月七日東都應天門觀災延燒左右延福門經日不滅九載三月華嶽廟災十載正月大風陝州運船失火燒二百一十五隻損米一百萬石舟人死者六百人又燒商人船一百隻其年八月六日武庫災燒二十八間十九架兵器四十七萬件寶應元年十一月回紇焚東都宜春院延及明堂甲子日而盡廣德元年十二月二十五夜鄂州失火燒船三千艘延及岸上居人二千餘家死者四五千人大曆十年二月莊嚴寺佛圖災初有疾風震雷薄擊俄而火從佛圖中出寺僧數百人急救之乃止棟宇無損貞元七年蘇州火十九年四月家令寺火二十年四月開業寺火元和四年御史臺舍火七年鎮州甲仗庫一十三間災節度使王承宗殺主守坐死者百餘人承宗方拒天軍而兵仗為災所焚天意嫉惡也十年四月河陰轉運院火十一月獻陵寢宮永巷火十一年十二月未央宮及飛龍草場火皆王承宗李師道謀撓用兵陰遣盜縱火也時李師道於鄆州起宮殿欲謀僭亂既成是歲為災並盡俄而族滅大和元年十月甲辰昭德宮火延燒至宣政東垣及門下省至晡方息八年十二月昭成宮火九年六月乙亥朔西市火會昌三年六月萬年縣東市火燒屋宇貨財不知其數又西內神龍宮火大順二年七月汴州相國寺佛閣災是日晚微雨震電寺僧見赤塊在三門樓藤網中周繞一匝而火作良久赤塊北飛越前殿飛入佛閣網中如三門周繞轉而火作如是三日不息訖為灰燼貞觀初白鵲巢于殿庭之槐樹其巢合歡如腰鼓左右稱賀太宗曰吾常笑隋文帝好言祥瑞瑞在得賢白鵲子何益於事命掇之送于野高宗文明後天下頻奏雌雉化為雄或半化未化兼以獻之則天臨朝之兆調露元年突厥溫傅等未叛時有鳴鵽羣飛入塞相繼蔽野邊人相驚曰突厥雀南飛突厥犯塞之兆也至二年正月還復北飛至靈夏已北悉墜地而死視之皆無頭裴行儉問右史苗神客曰鳥獸之祥乃應人事何也對曰人雖最靈而稟性含氣同於萬類故吉凶兆於彼而禍福應於此聖王受命龍鳳為嘉瑞者和氣同也故漢祖斬蛇而驗秦之必亡仲尼感麟而知己之將死夷羊在牧殷紂已滅鸜鵒來巢魯昭出奔鼠舞端門燕剌誅死大鳥飛集昌邑以敗是故君子虔恭寅畏動必思義雖在幽獨如承大事知神明之照臨懼患難之及己雉升鼎耳殷宗側身以修德鵩止坐隅賈生作賦以命卒以無患者德勝妖也大曆八年四月戊申乾陵上仙觀天尊殿有雙鵲銜泥及柴補殿之隙壞凡十五處其年九月大鳥見于武功縣羣鳥隨而噪之神策將軍張日芬射得之肉翅狐首四足足有爪其廣四尺三寸其毛色赤形類蝙蝠十一年渭州獲赤烏十三年五月左羽林軍鸜鵒乳雀貞元三年三月中書省梧桐樹有鵲以泥為巢四年夏汴鄭二州羣鳥皆飛入田緒李納境內銜木為城高二三尺方十里緒納惡之命焚之信宿而復鳥口皆流血十年四月有大鳥飛集宮中食雜骨數日獲之不食而死六月辛未晦水鳥集左藏庫十四年秋有鳥色青類鳩鵲息於宋郊所止之處羣鳥翼衛朝夕嗛稻粱以哺之睢陽之人適野聚觀者旬日人不知其名郡人李翺見之曰此鸞也鳳之次長慶元年六月濮州雷澤縣人張憲家榆樹鳥巢因風墮二雛別樹鵲引二鳥雛於巢哺之開成二年六月真興門外野鵲巢於古冢永徽中黑齒常之戍河源軍有狼三頭白晝入軍門射之斃常之懼求代將軍李謹代常之軍月餘卒先天初洛陽市人牽一羊左肋下有人手長尺許以之乞丐開元二年韶州鼠害稼千萬為羣三年有熊白晝入廣陵城月餘都督李處鑒卒永泰二年十一月乾陵赤兔見大曆二年三月河中獻玄狐四年九月己卯虎入京城長壽坊元載私廟將軍周皓格殺之六年八月丁丑太極殿內廊下獲白兔八年七月白鼠出內侍十二年六月苑內獲白鼠十三年六月戊戌隴右汧源縣軍士趙貴家貓鼠同乳不相害節度使朱泚籠之以獻宰相常衮率百僚拜表賀中書舍人崔祐甫曰此物之失性也天生萬物剛柔有性聖人因之垂訓作則禮迎貓為食田鼠也然貓之食鼠載在祀典以其能除害利人雖微必録今此貓對鼠何異法吏不勤觸邪疆吏不勤扞敵據禮部式録三瑞無貓不食鼠之目以此稱慶理所未詳以劉向五行傳言之恐須申命憲司察聽貪吏誡諸邊境無失警巡則貓能致功鼠不為害帝深然之建中四年五月滑洲馬生角貞元四年二月太僕寺郊牛生犢六足太僕卿周皓白宰相李泌請上聞泌笑而不答又京師人家豕生子兩首四足有司以白御史中丞竇參請上聞參寢而不奏三月癸丑鹿入京師西市門衆殺之元和七年十一月龍州武安川畬田中嘉禾生有麟食之復生麟之來一鹿引之羣鹿隨之光華不可正視使畫工圖麟及嘉禾來獻八年四月長安西市門家豕生子三耳八足自尾分為二大和九年八月易定監軍小將家馬因飲水吐出寶珠一獻之貞觀中汾州言青龍見吐物在空中有光明如火墮地地陷掘之得玄金廣尺長七寸大足元年虔州別駕得六眼龜一夕而失神龍中渭河有蝦蟆大如一石鼎里人聚觀數日而失是歲大水漂溺京城數百家商州水入城門襄陽水至樹杪先天二年六月西京朝堂磚階無故自壞磚下有大蛇長丈餘蝦蟆大如盤面目赤如火相向鬬俄而蛇入大樹蝦蟆入于草其年七月三日玄宗誅竇懷貞岑羲等十七家開元四年六月郴州馬嶺山下有白蛇長六七尺黑蛇長丈餘兩蛇鬬白蛇吞黑蛇至粗處口眼流血黑蛇頭穿白蛇腹出俄而俱死旬日內桂陽大雨山水暴溢漂五百家殺三百餘人天寶中洛陽有巨蛇高丈餘長百尺出於芒山下胡僧無畏見之歎曰此欲決水注洛城即以天竺法咒之數日蛇死祿山陷洛之兆也李揆作相前一月有大蝦蟆如牀見室之中俄失所在占者以為蟆天使也有福慶之事乾元二年九月通州三岡縣放生池中日氣下照水騰波涌上有黃龍躍出高丈餘又於龍旁數處浮出明珠大曆八年京師金天門外水渠獲毛龜貞元三年李納獻毛龜元和七年四月舒州桐城縣有黃青白三龍各一翼風雷自梅天陂起約高二百尺凡六里降于浮塘坡九年四月道州二青龍見于江中大和二年六月七日密州卑産山北面有龍見初赤龍從西來續有青龍黃龍從南來後有白龍黑龍從山北來並形狀分明自申至戌方散去天寶初臨川郡人李嘉胤所居柱上生芝草狀如天尊像太守張景夫拔柱以獻上元二年七月甲辰延英殿御座生白芝一莖三花肅宗製玉靈芝詩三篇羣臣皆賀占曰白芝主喪明年上皇肅宗俱崩二年九月含輝院生金芝永泰二年二月京城槐樹有蟲食葉其形類蠶其年六月太廟第二室芝草生大曆四年三月潤州上元縣芝草生一莖四葉高七寸八年廬州廬江縣紫芝生高一丈五尺九年九月晉州神山縣慶唐觀檜樹已枯重榮十二年五月甲子成都府人郭遠因樵獲瑞木一莖有文曰天下太平四字其年十一月蔡州汝陽縣芝草生紫莖黃蓋興元元年八月亳州真源縣大空寺僧院李樹種來十四年才長一丈八尺今春枝忽上聳高六尺周圍似蓋九尺餘又先天太后墓槐樹上有靈泉漏出今年六月其上有雲氣五色又黃龍再見于泉上元和十一年十二月雷桃李俱花長慶三年十二月水不冰草萌芽如正二月之候神龍二年三月洛陽東七里有水影側近樹木車馬之影歷歷見水影中月餘方滅乾元二年七月嵐州合河關黃河水四十里間清如井水經四日而後復寶應元年九月甲午華州至陝州二百餘里黃河清澄徹見底大曆二年醴泉出櫟陽愈疾貞元四年七月自陝州至河陰河水色如墨流入汴河止于汴州城下一宿而復寶曆二年亳州言出聖水愈病江淮已南遠來奔湊求水浙西觀察使李德裕奏論其妖宰相裴度判汴州所申狀曰妖由人興水不自作牒汴州觀察使填塞訖申玄宗初即位東都白馬寺鐵像頭無故自落於殿門外後姚崇秉政以僧惠範附太平亂政謀汰僧尼令拜父母午後不出院其法頗峻大曆十三年二月太僕寺廨有佛堂堂內小脫空金剛左臂上忽有黑汗滴下以紙承之色即血也明年五月代宗崩上元三年楚州刺史崔侁獻定國寶十三一曰玄黃天符形如笏長八寸有孔辟人間兵疫二曰玉雞毛白玉也以孝理天下則見三曰穀璧白玉也粟粒無雕鐫之跡王者得之五穀豐熟四曰西王母白環二所在處外國歸伏五曰碧色寶圓而有光六曰如意寶珠大如雞卵七曰紅靺鞨大如巨栗八曰琅玕珠二九曰玉玦形如玉環四分缺一十曰玉印大如半手理如鹿形陷入印中十一曰皇后採桑鈎如箸屈其末十二曰雷公石斧無孔十三缺凡十三寶置之日中白氣連天初楚州有尼曰真如忽有人接之升天天帝謂之曰下方有災令第二寶鎮之即以十三寶付真如時肅宗方不豫以為瑞乃改元寶應仍傳位皇太子此近白祥也寶曆二年五月神策軍修苑內古漢宮掘得白玉牀其長六尺以獻大曆十年二月京兆神策昭應婦人張氏産一男二女貞元八年二月許州人李狗兒持杖上含元殿擊欄檻又擊殺所擒卒誅之十年四月巨人跡見常州元和二年開紅崖冶役夫將化為虎衆以水沃之化而不果長慶四年四月十七日染坊作人張韶與卜者蘇玄明於柴草車內藏兵仗入宮作亂二人對食於清思殿是日禁軍誅張韶等三十七人寶曆二年十二月延州人賀文妻産三男大和九年京師訛言鄭注為主上合金丹須小兒心肝密旨捕小兒或相告云某處失幾兒人家扃鎖小兒甚密上恐遣中使喻之乃止開成二年十二月二十八日狂人劉德廣入含元殿詔付京兆府杖殺之隋末有謠云桃李子洪水繞楊山煬帝疑李氏有受命之符故誅李金才後李密據洛口倉以應其讖隋文時自長安故城東南移於唐興村置新都今西內承天門正當唐興村門今有大槐樹柯枝森鬱即村門樹也有司以行列不正將去之文帝曰高祖嘗坐此樹下不可去也調露中高宗欲封嵩山纍草儀注有事不行有謠曰不畏登不得但恐不得登三度徵兵馬旁道打騰騰高宗至山下遘疾還宮而崩永徽末里歌有桑條韋也女時韋也樂及神龍中韋后用事鄭愔作桑條歌十篇上之龍朔中俗中飲酒令曰子母去離連臺拗倒俗謂杯盤為子母又名盤為臺即中宗廢於房州之應也時里歌有突厥鹽及則天遣尚書閻知微送武延秀立知微為可汗挾之入寇如意初里歌云黃麞黃麞草𩹉藏彎弓射爾傷後契丹李萬榮叛陷營州則天令總管曹仁師王孝傑等將兵百萬討之大敗於黃麞谷契丹乘勝至趙郡垂拱已後東都有契苾兒歌皆淫艷之詞後張易之兄弟有內嬖易之小字契苾元和小兒謠云打麥打麥三三三乃轉身曰舞了也及武元衡為盜所害是元和十年六月三日五行傳所謂詩妖皆此類也上元中為服令九品已上佩刀礪等袋紛帨為魚形結帛作之為魚像鯉強之意也則天時此制遂絶景雲後又佩之張易之為母阿臧為七寶帳有魚龍鸞鳳之形仍為象牀犀簟則天令鳳閣侍郎李迥秀妻之迥秀不獲已然心惡其老薄之阿臧怒出迥秀為定州刺史中宗女安樂公主有尚方織成毛裙合百鳥毛正看為一色旁看為一色日中為一色影中為一色百鳥之狀並見裙中凡造兩腰一獻韋氏計價百萬又令尚方取百獸毛為韉面視之各見本獸形韋后又集鳥毛為韉面安樂初出降武延秀蜀川獻單絲碧羅籠裙縷金為花鳥細如絲髮鳥子大如黍米眼鼻嘴甲俱成明目者方見之自安樂公主作毛裙百官之家多效之江嶺奇禽異獸毛羽採之殆盡開元初姚宋執政屢以奢靡為諫玄宗悉命宮中出奇服焚之於殿廷不許士庶服錦繡珠翠之服自是採捕漸息風教日淳韋庶人妹七姨嫁將軍馮太和權傾人主嘗為豹頭枕以辟邪白澤枕以辟魅伏熊枕以宜男太和死再嫁嗣虢王及玄宗誅韋后虢王斬七姨首以獻此總言服妖也
