body:
  text: 舊唐書卷一百八十九下列傳第一百三十九下儒學下邢文偉高子貢郎餘令路敬淳王元感王紹宗韋叔夏祝欽明郭山惲柳沖盧粲尹知章孫季良附徐岱蘇辨兄衮冕陸質馮伉韋表微許康佐邢文偉滁州全椒人也少與和州高子貢壽州裴懷貴俱以博學知名於江淮間咸亨中纍遷太子典膳丞時孝敬在東宮罕與宮臣接見文偉輒減膳上書曰臣竊見禮戴記曰太子既冠成人免於保傅之嚴則有司過之史徹膳之宰史之義不得不司過宰之義不得不徹膳不徹膳則死今皇帝式稽前典妙簡英俊自庶子已下至司議舍人及學士侍讀等使翼佐殿下以成聖德近日已來未甚延納談議不狎謁見尚稀三朝之後但與內人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職忝備所司未敢逃死謹守禮經輒申減膳太子答書曰顧以庸虛早尚墳典每欲研精政術極意書林但往在幼年未間將衛竭誠耽誦因即損心比日以來風虛更積中奉恩旨不許重勞加以趨侍含元溫凊朝夕承親以無專之道遵禮以色養為先所以屢闕坐朝時乖學緒公潛申勗戒聿薦忠規敬尋來請良符宿志自非情思審諭義均弼諧豈能進此藥言形於簡墨撫躬三省感愧兼深文偉自是益知名其後右史缺官高宗謂侍臣曰邢文偉事我兒能減膳切諫此正直人也遂擢拜右史則天臨朝纍遷鳳閣侍郎兼弘文館學士載初元年遷內史天授初內史宗秦客以姦贓獲罪文偉坐附會秦客貶授珍州刺史後有制使至其州境文偉以為殺己遽自縊而死高子貢者和州歷陽人也弱冠遊太學遍涉六經尤精史記與文偉及亳州朱敬則為莫逆之交明經舉歷祕書正字弘文館直學士鬱鬱不得志棄官而歸屬徐敬業作亂於揚州遣弟敬猷統兵五千人緣江西上將逼和州子貢率鄉曲數百人拒之自是賊不敢犯以功擢授朝散大夫拜成均助教虢王鳳之子東莞公融曾為和州刺史從子貢受業情義特深及融為申州陰懷異志令黃公撰結交於子貢推為謀主潛謀密議書信往復諸王內外相應皆出自其策尋而事發被誅郎餘令定州新樂人也祖楚之少與兄蔚之俱有重名隋大業中蔚之為左丞楚之為尚書民曹郎煬帝重其兄弟稱為二郎楚之武德初為大理卿與太子少保李綱侍中陳叔達撰定律令後受詔招諭山東為竇建德所獲脅以兵刃又誘以厚利楚之竟不為屈及還以年老致仕貞觀初卒時年八十餘令父知運貝州刺史兄餘慶高宗時萬年令理有威名京城路不拾遺後卒於交州都督餘令少以博學知名舉進士初授霍王元軌府參軍數上詞賦元軌深禮之先是餘令從父知年為霍王友亦見推仰元軌謂人曰郎氏兩賢人之望也相次入府不意培塿而松柏成林轉幽州録事參軍時有客僧聚衆欲自焚長史裴照率官屬欲往觀之餘令曰好生惡死人之性也違越教義不近人情明公佐守重藩須察其姦詐豈得輕舉觀此妖妄照從其言因收僧按問果得詐狀孝敬在東宮餘令續梁元帝孝德傳撰孝子後傳三十卷以獻甚見嗟重纍轉著作佐郎撰隋書未成會病卒時人甚痛惜之路敬淳貝州臨清人也父文逸隋大業末闔門遇盜文逸潛匿草澤晝伏於死人中夜行避難自傷窮梗閉口不食同侶閔其謹願勸以不當滅性捃拾以食之遞負之而行遂免於難貞觀末官至申州司馬敬淳與季弟敬潛俱早知名敬淳尤勤學不窺門庭遍覽墳籍而孝友篤敬遭喪三年不出廬寢服免方號慟入見其妻形容羸毀妻不之識也後舉進士天授中歷司禮博士太子司議郎兼修國史仍授崇賢館學士數受詔修緝吉凶雜儀則天深重之萬歲通天二年坐與綦連耀結交下獄死敬淳尤明譜學盡能究其根源枝派近代已來無及之者撰著姓略記十卷行於時又撰衣冠本系未成而死神龍初追贈祕書少監敬潛仕至中書舍人王元感濮州鄄城人也少舉明經纍補博城縣丞兗州都督紀王慎深禮之命其子東平王續從元感受學天授中稍遷左衛率府録事兼直弘文館是後則天親祠南郊及享明堂封嵩嶽元感皆受詔共諸儒撰定儀注凡所立議衆咸推服之轉四門博士仍直弘文館元感時雖年老猶能燭下看書通宵不寐長安三年表上其所撰尚書糾謬十卷春秋振滯二十卷禮記繩愆三十卷並所注孝經史記稿草請官給紙筆寫上祕書閣詔令弘文崇賢兩館學士及成均博士詳其可否學士祝欽明郭山惲李憲等皆專守先儒章句深譏元感掎托舊義元感隨方應答竟不之屈鳳閣舍人魏知古司封郎中徐堅左史劉知幾右史張思敬雅好異聞每為元感申理其義連表薦之尋下詔曰王元感質性溫敏博聞強記手不釋卷老而彌篤掎前達之失究先聖之旨是謂儒宗不可多得可太子司議郎兼崇賢館學士魏知古嘗稱其所撰書曰信可謂五經之指南也中宗即位以春宮舊僚進加朝散大夫拜崇賢館學士尋卒王紹宗揚州江都人也梁左民尚書銓曾孫也其先自琅邪徙焉紹宗少勤學遍覽經史尤工草隸家貧常傭力寫佛經以自給每月自支錢足即止雖高價盈倍亦即拒之寓居寺中以清淨自守垂三十年文明中徐敬業於揚州作亂聞其高行遣使徵之紹宗稱疾固辭又令唐之奇親詣所居逼之竟不起敬業大怒將殺之之奇曰紹宗人望殺之恐傷士衆之心由是獲免及賊平行軍大總管李孝逸以其狀聞則天驛召赴東都引入禁中親加慰撫擢拜太子文學纍轉祕書少監仍侍皇太子讀書紹宗性淡雅以儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦加厚禮易之伏誅紹宗坐以交往見廢卒于鄉里韋叔夏尚書左僕射安石兄也少而精通三禮其叔父太子詹事琨嘗謂曰汝能如是可以繼丞相業矣舉明經調露年纍除太常博士後屬高宗崩山陵舊儀多廢缺叔夏與中書舍人賈太隱太常博士裴守貞等草創撰定由是授春官員外郎則天將拜洛及享明堂皆別受制共當時大儒祝欽明郭山惲撰定儀注凡所立議衆咸推服之纍遷成均司業久視元年特下制曰吉凶禮儀國家所重司禮博士未甚詳明成均司業韋叔夏太子率更令祝欽明等博涉禮經多所該練委以參掌冀弘典式自今司禮所修儀注並委叔夏等刊定訖然後進奏長安四年擢春官侍郎神龍初轉太常少卿充建立廟社使以功進銀青光祿大夫三年拜國子祭酒纍封沛國郡公卒時年七十餘撰五禮要記三十卷行於代贈兗州都督修文館學士諡曰文子縚太常卿祝欽明雍州始平人也少通五經兼涉衆史百家之説舉明經長安元年纍遷太子率更令兼崇文館學士中宗在春宮欽明兼充侍讀二年遷太子少保中宗即位以侍讀之故擢拜國子祭酒同中書門下三品加位銀青光祿大夫歷刑部禮部二尚書兼修國史仍舊知政事纍封魯國公食實封三百戶尋以匿忌日為御史中丞蕭至忠所劾貶授申州刺史久之入為國子祭酒景龍三年中宗將親祀南郊欽明與國子司業郭山惲二人奏言皇后亦合助祭遂建議曰謹按周禮天神曰祀地祇曰祭宗廟曰享大宗伯職曰祀大神祭大祇享大鬼理其大禮若王有故不預則攝位凡大祭祀王后不預則攝而薦豆籩徹又追師職掌王后之首服以待祭祀又內司服職掌王后之六服凡祭祀供后之衣服又九嬪職大祭祀后祼獻則贊瑤爵亦如之據此諸文即皇后合助皇帝祀天神祭地祇明矣故鄭玄注內司服云闕狄皇后助王祭羣小祀之服然則小祀尚助王祭中大推理可知闕狄之上猶有兩服第一褘衣第二搖狄第三闕狄此三狄皆助祭之服闕狄即助祭小祀即知搖狄助祭中祀褘衣助祭大祀鄭舉一隅故不委説唯祭宗廟周禮王有兩服先王衮冕先公鷩冕鄭玄因此以后助祭宗廟亦分兩服云褘衣助祭先王搖狄助祭先公不言助祭天地社稷自宜三隅而反且周禮正文凡祭王后不預既不專言宗廟即知兼祀天地故云凡也又春秋外傳云禘郊之事天子親射其牲王后親舂其粢故代婦職但云詔王后之禮事不主言宗廟也若專主宗廟者則內宗外宗職皆言掌宗廟之祭祀此皆禮文分明不合疑惑舊説以天子父天母地兄日姊月所以祀天於南郊祭地於北郊朝日於東門之外以昭事神訓人事君必躬親以禮之有故然後使攝此其義也禮記祭統曰夫祭也者必夫婦親之所以備內外之官也官備則具備又哀公問於孔子曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重焉又漢書郊祀志云天地合祭先祖配天先妣配地天地合精夫婦判合祭天南郊則以地配一體之義也據此諸文即知皇后合助祭望請別修助祭儀注同進帝頗以為疑召禮官親問之太常博士唐紹蔣欽緒對曰皇后南郊助祭於禮不合但欽明所執是祭宗廟禮非祭天地禮謹按魏晉宋及齊梁周隋等歷代史籍至於郊天祀地並無皇后助祭之事帝令宰相取兩家狀對定欽緒與唐紹及太常博士彭景直又奏議曰周禮凡言祭祀享三者皆祭之互名本無定義何以明之按周禮典瑞職云兩圭有邸以祀地則祭地亦稱祀也又司筵云設祀先王之胙席則祭宗廟亦稱祀也又內宗職云掌宗廟之祭祀此又非獨天稱祀地稱祭也又按禮記云惟聖為能享帝此即祀天帝亦言享也又按孝經云春秋祭祀以時思之此即宗廟亦言祭祀也經典此文不可備數據此則欽明所執天曰祀地曰祭廟曰享未得為定明矣又周禮凡言大祭祀者祭天地宗廟之總名不獨天地為大祭也何以明之按鬱人職云大祭祀與量人授舉斝之卒爵尸與斝皆宗廟之事則宗廟亦稱大祭祀又欽明狀引九嬪職大祭祀后祼獻則贊瑤爵據祭天無祼亦無瑤爵此乃宗廟稱大祭祀之明文欽明所執大祭祀即為祭天地未得為定明矣又周禮大宗伯職云凡大祭祀王后有故不預則攝而薦豆籩徹欽明唯執此文以為王后有祭天地之禮欽緒等據此乃是王后薦宗廟之禮非祭天地之事何以明之按此文凡祀大神祭大祇享大鬼帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍制大號理其大禮制相王之大禮若王不與祭祀則攝位此已上一凡直是王兼祭天地宗廟之事故通言大神大祇大鬼之祭也已下文云凡大祭祀王后不與則攝而薦豆籩徹此一凡直是王后祭廟之事故唯言大祭祀也若云王后助祭天地不應重起凡大祭祀之文也為嫌王后有祭天地之疑故重起後凡以別之耳王后祭廟自是大祭祀何故取上凡相王之禮以混下凡王后祭宗廟之文此是本經科段明白又按周禮外宗掌宗廟之祭祀佐王后薦玉豆凡后之獻亦如之王后有故不預則宗伯攝而薦豆籩外宗無佐祭天地之禮但天地尚質宗廟尚文玉豆宗廟之器初非祭天所設請問欽明若王后助祭天地在周禮使何人贊佐若宗伯攝后薦豆祭天又合何人贊佐並請明徵禮文即知攝薦是宗廟之禮明矣按周禮司服云王祀昊天上帝則服大裘而冕享先王則衮冕內司服掌王后祭服無王后祭天之服按三禮義宗明王后六服謂褘衣搖翟闕翟鞠衣展衣褖衣褘衣從王祭先王則服之搖翟祭先公及饗諸侯則服之鞠衣以采桑則服之展衣以禮見王及見賓客則服之褖衣燕居服之王后無助祭於天地之服但自先王已下又三禮義宗明后夫人之服云后不助祭天地五嶽故無助天地四望之服按此則王后無祭天之服明矣三禮義宗明王后五輅謂重翟厭翟安車翟車輦車也重翟者后從王祭先王先公所乘也厭翟者后從王饗諸侯所乘也安車者后宮中朝夕見於王所乘也翟車者后求桑所乘也輦車者后遊宴所乘也按此則王后無祭天之車明矣又禮記郊特牲義贊云祭天無祼鄭玄注云唯人道宗廟有祼天地大神至尊不祼圓丘之祭與宗廟祫同朝踐王酌泛齊以獻是一獻后無祭天之事大宗伯次酌醴齊以獻是為二獻按此則祭圓丘大宗伯次王為獻非攝王后之事欽明等所執王后有故不預則宗伯攝薦豆籩更明攝王后宗廟之薦非攝天地之祀明矣欽明建議引禮記祭統曰夫祭也者必夫婦親之按此是王與后祭宗廟之禮非關祀天地之義按漢魏晉宋後魏齊梁周陳隋等歷代史籍興王令主郊天祀地代有其禮史不闕書並不見往代皇后助祭之事又高祖神堯皇帝太宗文武聖皇帝南郊祀天無皇后助祭處高宗天皇大帝永徽二年十一月辛酉親有事于南郊又總章元年十二月丁卯親拜南郊亦並無皇后助祭處又按大唐禮亦無皇后南郊助祭之禮欽緒等幸忝禮官親承聖問竭盡聞見不敢依隨伏以主上稽古志遵舊典所議助祭實無明文時尚書左僕射韋巨源又希旨協同欽明之議上納其言竟以后為亞獻仍補大臣李嶠等女為齋娘以執籩豆及禮畢特詔齋娘有夫壻者咸為改官景雲初侍御史倪若水劾奏欽明及郭山惲曰欽明等本自腐儒素無操行崇班列爵實為叨忝而涓塵莫效諂佞為能遂使曲臺之禮圜丘之制百王故事一朝墜失所謂亂常改作希旨病君人之不才遂至於此今聖明馭曆賢良入用惟茲小人猶在朝列臣請並從黜放以肅周行於是左授欽明饒州刺史後入為崇文館學士尋卒郭山惲蒲州河東人少通三禮景龍中纍遷國子司業時中宗數引近臣及修文學士與之宴集嘗令各效伎藝以為笑樂工部尚書張錫為談容娘舞將作大匠宗晉卿舞渾脫左衛將軍張洽舞黃麞左金吾衛將軍杜元琰誦婆羅門呪給事中李行言唱駕車西河中書舍人盧藏用效道士上章山惲獨奏曰臣無所解請誦古詩兩篇帝從之於是誦鹿鳴蟋蟀之詩奏未畢中書令李嶠以其詞有好樂無荒之語頗涉規諷怒為忤旨遽止之翌日帝嘉山惲之意詔曰郭山惲業優經史識貯古今八索九丘由來遍覽前言往行實所該詳昨者因其豫遊式宴朝彥既乘歡洽咸使詠歌遂能志在匡時潛申規諷謇謇之誠彌切諤諤之操逾明宜示褒揚美茲鯁直賜時服一副尋與祝欽明同獻皇后助祭郊祀之議景雲中左授括州長史開元初復入為國子司業卒于官柳沖蒲州虞鄉人也隋饒州刺史莊曾孫也其先仕江左世居襄陽陳亡還鄉里父楚賢大業末為河北縣長時堯君素固守郡城以拒義師楚賢進説曰隋之將亡天下皆知唐公名應圖籙動以信義豪傑響應天所贊也君子見機而作不俟終日轉禍為福今其時也君素不從楚賢潛行歸國高祖甚悅拜侍御史貞觀中纍轉光祿少卿使突厥存撫李思摩突厥贈馬百匹及方物悉拒而不受纍轉交桂二州都督皆有能名卒於杭州刺史沖博學尤明世族名亞路敬淳天授初為司府主簿受詔往淮南安撫使還賜爵河東縣男景龍中纍遷為左散騎常侍修國史初貞觀中太宗命學者撰氏族志百卷以甄別士庶至是向百年而諸姓至有興替沖乃上表請改修氏族中宗命沖與左僕射魏元忠及史官張錫徐堅劉憲等八人依據氏族志重加修撰元忠等施功未半相繼而卒乃遷為外職至先天初沖始與侍中魏知古中書侍郎陸象先及徐堅劉子玄吳兢等撰成姓族系録二百卷奏上沖後歷太子詹事太子賓客宋王傅昭文館學士以老疾致仕開元二年又敕沖及著作郎薛南金刊定系録奏上賜絹百匹五年卒盧粲幽州范陽人後魏侍中陽烏五代孫祖彥卿撰後魏紀二十卷行於時官至合肥令叔父行嘉亦有學涉高宗時為雍王記室粲博覽經史弱冠舉進士景龍二年纍遷給事中時節愍太子初立韋庶人以非己所生深加忌嫉勸中宗下敕令太子却取衛府封物每年以供服用粲駁奏曰皇太子處繼明之重當主鬯之尊歲時服用自可百司供擬又據周官諸應用財器歲終則會唯王及太子應用物並不會此則儲君之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法將來者也必謂青宮初啓服用所資自當廣支庫物不可長存藩封詔從之後安樂公主壻武崇訓為節愍太子所殺特追封為魯王令司農少卿趙履溫監護葬事履溫諷公主奏請依永泰公主故事為崇訓造陵詔從其請粲駁奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家已來諸王及公主墓無稱陵者唯永泰公主承恩特葬事越常塗不合引以為名春秋左氏傳云衛孫桓子與齊戰衛新築大夫仲叔于奚救孫桓子桓子以免衛人賞之以邑于奚辭請曲懸繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯名與器不可以假人若以假人與之政也政亡則國家從之聖人知微知章不可不慎魯王哀榮之典誠別承恩然國之名器豈可妄假又塋兆之稱不應假永泰公主為名請比貞觀已來諸王舊例足得豐厚手敕答曰安樂公主與永泰公主無異同穴之義古今不殊魯王緣自特為陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公已下且魯王若欲論親等第則不親於雍王雍王之墓尚不稱陵魯王自不可因尚公主而加號且君之舉事則載於方册或稽之往典或考自前朝臣歷檢貞觀已來駙馬墓無得稱陵者且君人之禮服絶於傍期蓋為不獨親其親不獨子其子陛下以膝下之恩愛施及其夫贈賵之儀哀榮足備豈得使上下無辨君臣一貫者哉又安樂公主承兩儀之澤履福祿之基指南山以錫年仰辰而永庇魯王之葬車服有章加等之儀備有常數塋兆之稱不應假永泰公主為名非所謂垂法將來作則羣辟者也帝竟依粲所奏公主大怒粲以忤旨出為陳州刺史纍轉祕書少監開元初卒尹知章絳州翼城人少勤學嘗夢神人以大鑿開其心以藥內之自是日益開朗盡通諸經精義未幾而諸師友北面受業焉長安中駙馬都尉武攸暨重其經學奏授其府定王文學神龍初轉太常博士中宗初即位建立宗廟議者欲以涼武昭王為始祖以備七代之數知章以為武昭遠世非王業所因特奏議以為不可當時竟從知章之議俄拜陸渾令以公玷棄官時散騎常侍解琬亦罷職歸田園與知章共居汝洛間以修學為事睿宗初即位中書令張説薦知章有古人之風足以坐鎮雅俗拜禮部員外郎俄轉國子博士後祕書監馬懷素奏引知章就祕書省與學者刊定經史知章雖居吏職歸家則講授不輟尤明易及莊老玄言之學遠近咸來受業其有貧匱者知章盡其家財以衣食之性和厚喜慍不形於色未嘗言及家人産業其子嘗請併巿樵米以備歲時之費知章曰如汝所言則下人何以取資吾幸食祿不宜奪其利也竟不從開元六年卒時年五十有餘所注孝經老子莊子韓子管子鬼谷子頗行於時門人孫季良等立碑於東都國子監之門外以頌其德孫季良者河南偃師人也一名翌開元中為左拾遺集賢院直學士撰正聲詩集三卷行於代徐岱字處仁蘇州嘉興人也家世以農為業岱好學六籍諸子悉所探究問無不通難莫能屈大曆中轉運使劉晏表薦之授校書郎浙西觀察使李栖筠厚遇之敕故所居為復禮鄉尋為朝廷推援改河南府偃師縣尉建中年禮儀使蔣鎮特薦為太常博士掌禮儀從幸奉天興元改膳部員外郎兼博士貞元初遷水部郎中充皇太子及舒王已下侍讀尋改司封郎中擢拜給事中加兼史館修撰並依舊侍讀承兩宮恩顧時無與比而謹慎過甚未嘗泄禁中語亦不談人之短婚嫁甥姪之孤遺者時人以此稱之然吝嗇頗甚倉庫管鑰皆自執掌獲譏於時卒時年五十上歎惜之賻以帛絹皇太子又遺絹一百匹贈禮部尚書蘇辨字元容京兆武功人曾叔祖良嗣天后朝宰相國史有傳辨少有文學舉進士授祕書省正字轉奉天主簿朱泚之亂德宗倉卒出幸縣令杜正元上府計事聞大駕至官吏惶恐皆欲奔竄山谷辨諭之曰君上避狄臣下當伏難死節昔肅宗幸靈武至新平安定二太守皆潛遁帝命斬之以徇諸君知其事乎衆心乃安及車駕至迎扈儲備無闕德宗嘉之就加試大理司直賊平拜監察御史歷三院纍轉倉部郎中仍判度支案裴延齡卒德宗聞其才特開延英面賜金紫授度支郎中副知度支事仍命立於正郎之首副知之號自辨始也承延齡之後以寬簡代煩虐人甚稱之遷戶部侍郎依前判度支改太子詹事辨初入朝班位失序殿中侍御史鄒儒立對仗彈之辨於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿已下貞元三年御史中丞竇參定班移詹事在河南太原尹之下辨乃引舊班制立臺官詰之仍紿云自已白宰相請依舊故為儒立彈之旋坐給長武城軍糧朽敗貶汀州司戶參軍當德宗時朝臣受譴少蒙再録至晚年尤甚唯辨與韓皋得起為刺史授滁州轉杭州辨與兄冕衮皆以友弟儒學稱冕纘國朝政事撰會要四十卷行於時辨聚書至二萬卷皆手自刊校至今言蘇氏書次於集賢祕閣焉貞元二十一年卒于家衮自贊善大夫貶永州司戶參軍敕蘇衮貶官本緣弟連坐矜其年暮加以疾患宜令所在勒回任歸私第衮年且七十兩目無見已逾年以辨之故竟未停官及貶上聞之哀憫故許還家尋卒初冕既坐辨貶官或有人言冕才學上悔不早知業已貶出又復還衮難於再追冕乃止陸質吳郡人本名淳避憲宗名改之質有經學尤深於春秋少師事趙匡匡師啖助助匡皆為異儒頗傳其學由是知名陳少遊鎮揚州愛其才辟為從事後薦於朝拜左拾遺轉太常博士纍遷左司郎中坐細故改國子博士歷信台二州刺史順宗即位質素與韋執誼善由是徵為給事中皇太子侍讀仍改賜名質時執誼得幸順帝寢疾與王叔文等竊弄權柄上在春宮執誼懼質已用事故令質入侍而潛伺上意因用解及質發言上果怒曰陛下令先生與寡人講義何得言他質惶懼而出未幾病卒質著集注春秋二十卷類禮二十卷君臣圖翼二十五卷並行於代貞元二十一年卒馮伉本魏州元城人父玠後家于京兆少有經學大曆初登五經秀才科授祕書郎建中四年又登博學三史科三遷尚書膳部員外郎充睦王已下侍讀澤潞節度使李抱真卒為弔贈使抱真男遺伉帛數百匹不納又專送至京伉因表奏固請不受屬醴泉缺縣令宰臣進人名帝意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉令縣中百姓多猾為著諭蒙十四篇大略指明忠孝仁義勸學務農每鄉給一卷俾其傳習在縣七年韋渠牟薦為給事中充皇太子及諸王侍讀召見於別殿賜金紫著三傳異同三卷順宗即位拜尚書兵部侍郎改國子祭酒為同州刺史入拜左散騎常侍復領太學元和四年卒年六十六贈禮部尚書子藥進士擢第又登制科仕至尚書郎韋表微始舉進士登第纍佐藩府元和十五年拜監察御史逾年以本官充翰林學士遷左補闕庫部員外郎知制誥滿歲擢遷中書舍人俄拜戶部侍郎職並如故時自長慶寶曆國家比有變故凡在翰林遷擢例無滿歲由是表微自監察六七年間秩正二卿命服金紫承遇恩渥盛於一時卒年六十表微少時剋苦自立著九經師授譜一卷春秋三傳總例二十卷子蟾進士登第咸通末為尚書左丞許康佐父審康佐登進士第又登宏詞科以家貧母老求為知院官人或怪之笑而不答及母亡服除不就侯府之辟君子始知其不擇祿養親之志也故名益重遷侍御史轉職方員外郎纍遷至駕部郎中充翰林侍講學士仍賜金紫歷諫議大夫中書舍人皆在內庭為戶部侍郎以疾解職除兵部侍郎轉禮部尚書卒年七十二贈吏部尚書撰九鼎記四卷弟堯佐元佐堯佐子道敏並登進士第歷官清顯贊曰積學成功開談辨治儒道玄機聖人雅旨出必由戶行迹其軌邈有其人光乎信史
