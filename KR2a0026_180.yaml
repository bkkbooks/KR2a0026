body:
  text: 舊唐書卷一百七十六列傳第一百二十六李宗閔楊嗣復子授損技拭撝楊虞卿弟漢公從兄汝士汝士弟魯士汝士子知溫知遠知權附馬植李讓夷魏周墀崔龜從鄭肅盧商李宗閔字損之宗室鄭王元懿之後祖自仙楚州別駕父宗正卿出為華州刺史鎮國軍潼關防禦等使兄夷簡元和中宰相宗閔貞元二十一年進士擢第元和四年復登制舉賢良方正科初宗閔與牛僧孺同年登進士第又與僧孺同年登制科應制之歲李吉甫為宰相當國宗閔僧孺對策指切時政之失言甚鯁直無所回避考策官楊於陵韋貫之李益等又第其策為中等又為不中第者注解牛李策語同為唱誹又言翰林學士王涯甥皇甫湜中選考核之際不先上言裴時為學士居中覆視無所異同吉甫泣訴於上前憲宗不獲已罷王涯裴學士守戶部侍郎涯守都官員外郎吏部尚書楊於陵出為嶺南節度使吏部員外郎韋貫之出為果州刺史王涯再貶虢州司馬貫之再貶巴州刺史僧孺宗閔亦久之不調隨牒諸侯府七年吉甫卒方入朝為監察御史纍遷禮部員外郎元和十二年宰相裴度出征吳元濟奏宗閔為彰義軍觀察判官賊平遷駕部郎中又以本官知制誥穆宗即位拜中書舍人時自宗正卿出刺華州父子同時承恩制人士榮之長慶元年子壻蘇巢於錢徽下進士及第其年巢覆落宗閔涉請託貶劍州刺史時李吉甫子德裕為翰林學士錢徽榜出德裕與同職李紳元稹連衡言於上前云徽受請託所試不公故致重覆比相嫌惡因是列為朋黨皆挾邪取權兩相傾軋自是紛紜排陷垂四十年復入為中書舍人三年冬權知禮部侍郎四年貢舉事畢權知兵部侍郎寶曆元年正拜兵部侍郎父憂免大和二年起為吏部侍郎賜金紫之服三年八月以本官同平章事時裴度薦李德裕將大用德裕自浙西入朝為中人助宗閔者所沮復出鎮尋引牛僧孺同知政事二人唱和凡德裕之黨皆逐之纍轉中書侍郎集賢大學士七年德裕作相六月罷宗閔知政事檢校禮部尚書同平章事興元尹山南西道節度使宗閔為吏部侍郎時因駙馬都尉沈結託女學士宋若憲及知樞密楊承和二人數稱之於上前故獲徵用及德裕秉政羣邪不悅而鄭注李訓深惡之文宗乃復召宗閔於興元為中書侍郎平章事命德裕代宗閔為興元尹既再得權位輔之以訓注尤恣所欲進封襄武侯食邑千戶九年六月京兆尹楊虞卿得罪宗閔極言救解文宗怒叱之曰爾嘗謂鄭覃是妖氣今作妖覃耶爾耶翌日貶明州刺史尋再貶處州長史七月鄭注發沈宋若憲事內官楊承和韋元素沈及若憲姻黨坐貶者十餘人又貶宗閔潮州司戶時訓注竊弄威權凡不附己者目為宗閔德裕之黨貶逐無虛日中外震駭連月陰晦人情不安九月詔曰朕承天纘曆燭理不明勞虛襟以求賢勵寬德以容衆頃者或台輔乖弼違之道而具僚扇朋附之風翕然相從實斁彝憲致使薰蕕共器賢不肖並馳退迹者成後時之夫登門者有迎吠之客繆戾之氣堙鬱和平而望陰陽順時疵癘不作朝廷清肅班列和安自古及今未嘗有也今既再申朝典一變澆風掃清朋比之徒匡飭貞廉之俗凡百卿士惟新令猷如聞周行之中尚蓄疑懼或有妄相指目令不自安今斯曠然明喻朕意應與宗閔德裕或親或故及門生舊吏等除今日已前黜遠之外一切不問各安職業勿復為嫌文宗以二李朋黨繩之不能去嘗謂侍臣曰去河北賊非難去此朋黨實難宗閔雖驟放黜竟免李訓之禍開成元年量移衢州司馬三年楊嗣復輔政與宗閔厚善欲拔用之而畏鄭覃沮議乃託中人密諷於上上以嗣復故因紫宸對謂宰相曰宗閔在外四五年宜別授一官鄭覃曰陛下憐其地遠宜移近內地三五百里不可再用姦邪陛下若欲用宗閔臣請先退陳夷行曰比者宗閔得罪以朋黨之故恕死為幸寶曆初李續之張又新蘇景胤等朋比姦險幾傾朝廷時號八關十六子李王玉曰主此事者罪在逢吉李續之居喪服闋不可不與一官臣恐中外衣冠交興議論非為續之輩也夷行曰昔舜逐四凶天下治朝廷求理何惜此十數纖人嗣復曰事貴得中不可但徇憎愛上曰與一郡可也鄭覃曰與郡太優止可洪州司馬耳夷行曰宗閔養成鄭注之惡幾覆邦家國之巨𢀿也嗣復曰比者陛下欲加鄭注官宗閔不肯陛下亦當記憶覃曰嗣復黨庇宗閔臣觀宗閔之惡甚於李林甫嗣復曰覃語大過昔玄宗季年委用林甫妬賢害能破人家族宗閔在位固無此事況大和末宗閔德裕同時得罪二年之間德裕再領重鎮而宗閔未離貶所陛下懲惡勸善進退之理宜均非臣獨敢黨庇昨殷侑與韓益奏官及章服臣以益前年犯贓未可其奏鄭覃託臣云幸且勿論孰為黨庇翌日以宗閔為杭州刺史四年冬遷太子賓客分司東都時鄭覃陳夷行罷相嗣復方再拔用宗閔知政事俄而文宗崩會昌初李德裕秉政嗣復李王玉皆竄嶺表三年劉稹據澤潞叛德裕以宗閔素與劉從諫厚上黨近東都宗閔分司非便出為封州刺史又發其舊事貶郴州司馬卒於貶所子琨瓚大中朝皆進士擢第令狐綯作相特加奬拔瓚自員外郎知制誥歷中書舍人翰林學士綯罷相出為桂管觀察使御軍無政為卒所逐貶死自天寶難之後宗室子弟賢而立功者唯鄭王曹王子孫耳夷簡再從季父汧國公勉德宗朝宰相夷簡諸弟夷亮夷則夷範皆登進士第宗閔弟宗冉宗冉子深湯湯纍官至給事中咸通中踐更臺閣知名於時楊嗣復字繼之僕射於陵子也初於陵十九登進士第二十再登博學宏詞科調補潤州句容尉浙西觀察使韓滉有知人之鑒見之甚悅滉有愛女方擇佳壻謂其妻柳氏曰吾閲人多矣無如楊生貴而有壽生子必為宰相於陵秩滿寓居揚州而生嗣復後滉見之撫其首曰名位果踰於父楊門之慶也因字曰慶門嗣復七八歲時已能秉筆為文年二十進士擢第二十一又登博學宏詞科釋褐祕書省校書郎遷右拾遺直史館以嗣復深於禮學改太常博士元和十年纍遷至刑部員外郎鄭餘慶為詳定禮儀使奏為判官改禮部員外郎時父於陵為戶部侍郎嗣復上言與父同省非便請換他官詔曰應同司官有大功以下親者但非連判及勾檢之官并官長則不在回避之限如官署同職司異雖父子兄弟無所避嫌再遷兵部郎中長慶元年十月以庫部郎中知制誥正拜中書舍人嗣復與牛僧孺李宗閔皆權德輿貢舉門生情義相得進退取捨多與之同四年僧孺作相欲薦拔大用又以於陵為東都留守未歷相位乃令嗣復權知禮部侍郎寶曆元年二月選貢士六十八人後多至達官文宗即位拜戶部侍郎以父於陵太子少傅致仕年高多疾懇辭侍養不之許大和四年丁父憂免七年三月起為尚書左丞其年宗閔罷相德裕輔政七月以嗣復檢校禮部尚書梓州刺史劍南東川節度觀察等使九年宗閔復知政事三月以嗣復檢校戶部尚書成都尹劍南西川節度副大使知節度事觀察處置等使開成二年十月入為戶部侍郎領諸道鹽鐵轉運使三年正月與同列李王玉並以本官同平章事領使如故進階金紫弘農伯食邑七百戶上以幣輕錢重問鹽鐵使何以去其太甚嗣復曰此事纍朝制置未得但且禁銅未可變法法變擾人終亦未能去弊李王玉曰禁銅之令朝廷常典但行之不嚴不如無令今江淮已南銅器成肆市井逐利者銷錢一緡可為數器售利三四倍遠民不知法令率以為常縱國家加爐鑄錢何以供銷鑄之弊所以禁銅之令不得不嚴八月紫宸奏事曰聖人在上野無遺賢陸汙上疏論兵雖不中時事意亦可奬間居蘇州纍年宜與一官李王玉曰士子趨競者多若奬陸汙貪夫知勸矣昨竇洵直論事陛下賞之以幣帛況與陸汙官耶帝曰洵直奬其直心不言事之當否鄭覃曰若苞藏則不可知嗣復曰臣深知洵直無邪惡所奏陸汙官尚未奉聖旨鄭覃曰陛下須防朋黨嗣復曰鄭覃疑臣朋黨乞陛下放臣歸去因拜乞罷免李王玉曰比來朋黨近亦稍弭覃曰近有小朋黨生帝曰此輩凋喪向盡覃曰楊漢公張又新李續之即今尚在王玉曰今有邊事論奏覃曰論邊事安危臣不如王玉嫉惡則王玉不如臣嗣復曰臣聞左右佩劍彼此相笑臣今不知鄭覃指誰為朋黨因當香案前奏曰臣待罪宰相不能申夔龍之道唯以朋黨見譏必乞陛下罷臣鼎職上慰勉之文宗方以政事委嗣復惡覃言切帝延英謂宰臣曰人傳符讖之語自何而來嗣復對曰漢光武好以讖書決事近代隋文帝亦信此言自是此説日滋只如班彪王命論所引蓋矯意以止賊亂非所重也李王玉曰喪亂之時佐命者務神符命理平之代只合推諸人事上曰卿言是也帝又曰天后用人有自布衣至宰相者當時還得力否嗣復曰天后重行刑辟輕用官爵皆自圖之計耳凡用人之道歷試方見其能否當艱難之時或須拔擢無事之日不如且循資級古人拔卒為將非治平之時蓋不獲已而用之也上又問新修開元政要致何如嗣復曰臣等未見陛下若欲遺之子孫則請宣付臣等參詳可否玄宗或好遊畋或好聲色與貞觀之政不同故取捨須當方堪流傳四年五月上問延英政事逐日何人記録監修李王玉曰是臣職司陳夷行曰宰相所録必當自伐聖德即將掩之臣所以頻言不欲威權在下王玉曰夷行此言是疑宰相中有賣威權貨刑賞者不然何自為宰相而出此言臣纍奏求退若得王傅臣之幸也鄭覃曰陛下開成元年二年政事至好三年四年漸不如前嗣復曰元年二年是鄭覃夷行用事三年四年臣與李王玉同之臣蒙聖慈擢處相位不能悉心奉職鄭覃云三年之後一年不如一年臣之罪也陛下縱不誅夷臣合自求泯滅因叩頭曰臣今日便辭玉階不敢更入中書即趨去上令中使召還勞之曰鄭覃失言卿何及此覃起謝曰臣性愚拙言無顧慮近日事亦漸好未免些些不公亦無甚處臣亦不獨斥嗣復遽何至此所為若是乃嗣復不容臣耳嗣復曰陛下不以臣微才用為中書侍郎時政善否其責在臣陛下月費俸錢數十萬時新珍異必先賜與蓋欲輔佐聖明臻于至理既一年不如一年非惟臣合得罪亦上纍聖德伏請別命賢能許臣休退上曰鄭覃之言偶然耳奚執咎耶嗣復數日不入上表請罷帝方委用乃罷鄭覃夷行知政事自是政歸嗣復進加門下侍郎明年正月文宗崩先是以敬宗子陳王為皇太子中尉仇士良違遺令立武宗武宗之立既非宰相本意甚薄執政之臣其年秋李德裕自淮南入輔政九月出嗣復為湖南觀察使明年誅樞密薛季稜劉弘逸中人言二人頃附嗣復李王玉不利於陛下武宗性急立命中使往湖南桂管殺嗣復與王玉宰相崔鄲崔珙等亟請開延英因極言國朝故事大臣非惡逆顯著未有誅戮者願陛下復思其宜帝良久改容曰朕纘嗣之際宰相何嘗比數李王玉季稜志在扶册陳王嗣復弘逸志在樹立安王立陳王猶是文宗遺旨嗣復欲立安王全是希楊妃意旨嗣復嘗與妃書云姑姑何不則天臨朝珙等曰此事曖昧真虛難辨帝曰楊妃曾臥疾妃弟玄思文宗令入內侍疾月餘此時通導意旨朕細問內人情狀皎然我不欲宣出於外向使安王得志我豈有今日然為卿等恕之乃追潭桂二中使再貶嗣復潮州刺史宣宗即位徵拜吏部尚書大中二年自潮陽還至嶽州病一日而卒時年六十六贈左僕射諡曰孝穆子損授技拭撝而授最賢授字得符大中九年進士擢第釋褐從事諸侯府入為鄠縣尉集賢校理歷監察御史殿中分務東臺再遷司勳員外郎洛陽令兵部員外郎李福為東都留守奏充判官改兵部郎中由吏部拜左諫議大夫給事中出為河南尹盧攜作相召拜工部侍郎黃巢犯京師僖宗幸蜀徵拜戶部侍郎以母病求散秩改祕書監分司車駕還拜兵部侍郎宰相有報怨者改左散騎常侍國子祭酒又轉太子賓客從昭宗在華下改刑部尚書太子少保卒贈左僕射子煚字公隱進士及第再遷左拾遺昭宗初即位喜遊宴不恤時事煚上疏極諫帝面賜緋袍象笏崔安潛出鎮青州辟為支使不至鎮改太常博士歷主客戶部二員外郎關中亂崔胤引朱全忠入京師乃挈家避地湖南官終諫議大夫損字子默以蔭受官為藍田尉三遷京兆府司録參軍入為殿中侍御史家在新昌里與宰相路巖第相接巖以地狹欲易損馬廣之遣人致意時損伯叔昆仲在朝者十餘人相與議曰家門損益恃時相何可拒之損曰非也凡尺寸地非吾等所有先人舊業安可以奉權臣窮達命也巖不悅會差制使鞫獄黔中乃遣損使焉踰年而還改戶部員外郎洛陽縣令入為吏部員外出為絳州刺史路巖罷相徵拜給事中遷京兆尹盧攜作相有宿憾復拜給事中出為陝虢觀察使時軍亂逐前使崔蕘損至盡誅其亂首踰年改青州刺史御史大夫淄青節度使又檢校刑部尚書鄆州刺史天平軍節度使未赴鄆復留青州卒於鎮技進士及第位至中書舍人拭官終考功員外郎撝終兵部郎中拭撝並進士擢第楊虞卿字師臯虢州弘農人祖燕客父寧貞元中為長安尉少有棲遁之志以處士徵入朝有口辨優遊公卿間竇參尤重之會參貶仕進不達而卒虞卿元和五年進士擢第又應博學宏辭科元和末纍官至監察御史穆宗初即位不修政道盤遊無節虞卿上疏諫曰臣聞鳶烏遭害則仁鳥逝誹謗不誅則良言進況詔旨勉諭許陳愚誠故臣不敢避誅以獻狂瞽竊聞堯舜受命以天下為憂不聞以位為樂況北虜猶梗西戎未賓兩河之瘡痏未平五嶺之妖氛未解生人之疾苦盡在朝廷之制度莫修邊儲屢空國用猶屈固未可以高枕無虞也陛下初臨萬宇有憂天下之志宜日延輔臣公卿百執事凝旒而問造膝以求使四方內外有所觀焉自聽政已來六十日矣八開延英獨三數大臣仰龍顏承聖問其餘侍從詔誥之臣偕入而齊出何足以聞政事哉諫臣盈廷忠言未聞於聖聽臣實羞之蓋由主恩尚疏而衆正之路未啓也夫公卿大臣宜朝夕接見論道賜與從容則君臣之情相接而理道備聞矣今自宰相已下四五人時得頃刻侍坐天威不遠鞠躬隕越隨旨上下無能往來此由君太尊臣太卑故也自公卿已下雖歷踐清地曾未祗奉天眷以承下問鬱塞正路偷安幸門況陛下神聖如五帝臣下莫能望清光所宜周遍顧問惠其氣色使支體相輔君臣喻明陛下求理於公卿公卿求理於臣輩自然上下孜孜相問使進忠若趨利論政若訴寃如此而不聞過失不致升平者未之有也自古帝王居危思安之心不相殊而居安慮危之心不相及故不得皆為聖帝明王小臣疏賤豈宜及此獨不忍冒榮偷祿以負聖朝惟陛下圖之帝深奬其言尋令奉使西北邊犒賞戍卒遷侍御史再轉禮部員外郎史館修撰長慶四年八月改吏部員外郎大和二年南曹令史李賨等六人偽出告身籤符賣鑿空偽官令赴任者六十五人取受錢一萬六千七百三十貫虞卿按得偽狀捕賨等移御史臺鞫劾賨稱六人共率錢二千貫與虞卿廳典溫亮求不發舉偽濫事迹乃詔給事中嚴休復中書舍人高鉞左丞韋景休充三司推案而溫亮逃竄賨等既伏誅虞卿以檢下無術停見任及李宗閔牛僧孺輔政起為左司郎中五年六月拜諫議大夫充弘文館學士判院事六年轉給事中七年宗閔罷相李德裕知政事出為常州刺史虞卿性柔佞能阿附權幸以為姦利每歲銓曹貢部為舉選人馳走取科第占員闕無不得其所欲升沉取捨出其脣吻而李宗閔待之如骨肉以能朋比唱和故時號黨魁八年宗閔復入相尋召為工部侍郎九年四月拜京兆尹其年六月京師訛言鄭注為上合金丹須小兒心肝密旨捕小兒無算民間相告語扃鎖小兒甚密街肆忷忷上聞之不悅鄭注頗不自安御史大夫李固言素嫉虞卿朋黨乃奏曰臣昨窮問其由此語出於京兆尹從人因此扇於都下上怒即令收虞卿下獄虞卿弟漢公并男知進等八人自繫撾鼓訴寃詔虞卿歸私第翌日貶虔州司馬再貶虔州司戶卒於貶所子知進知退堪弟漢公皆登進士第知退歷都官戶部二郎中堪庫部吏部二員外郎漢公大和八年擢進士第又書判拔萃釋褐為李絳興元從事絳遇害漢公遁而獲免纍遷戶部郎中史館修撰大和七年遷司封郎中漢公子範籌皆登進士第纍辟使府虞卿從兄汝士汝士字慕巢元和四年進士擢第又登博學宏詞科纍辟使府長慶元年為右補闕坐弟殷士貢舉覆落貶開江令入為戶部員外再遷職方郎中大和三年七月以本官知制誥時李宗閔牛僧孺輔政待汝士厚尋正拜中書舍人改工部侍郎八年出為同州刺史九年九月入為戶部侍郎開成元年七月轉兵部侍郎其年十二月檢校禮部尚書梓州刺史劍南東川節度使時宗人嗣復鎮西川兄弟對居節制時人榮之四年九月入為吏部侍郎位至尚書卒子知溫知遠知權皆登進士第知溫纍官至禮部郎中知制誥入為翰林學士戶部侍郎轉左丞出為河南尹陝虢觀察使遷檢校兵部尚書襄州刺史山南東道節度使知溫弟知至纍官至比部郎中知制誥坐故府劉瞻罷相貶官知至亦貶瓊州司馬入為諫議大夫纍遷京兆尹工部侍郎知溫知至皆位至列曹尚書汝士弟魯士魯士字宗尹本名殷士長慶元年進士擢第其年詔翰林覆試殷士與鄭朗等覆落因改名魯士復登制科位不達而卒初汝士中第有時名遂歷清貫其後諸子皆至正卿鬱為昌族所居靜恭里知溫兄弟並列門戟咸通中昆仲子孫在朝行方鎮者十餘人馬植扶風人父曛植元和十四年進士擢第又登制策科釋褐壽州團練副使得祕書省校書郎三遷饒州刺史開成初遷安南都護御史中丞安南招討使植文雅之餘長於吏術三年奏當管羈縻州首領或居巢穴自固或為南蠻所誘不可招諭事有可虞臣自到鎮約之以信誠曉之以逆順今諸首領總發忠言願納賦稅其武陸縣請升為州以首領為刺史從之又奏陸州界廢珠池復生珠以能政就加檢校左散騎常侍加中散大夫轉黔中觀察使會昌中入為大理卿植以文學政事為時所知久在邊遠及還朝不獲顯官心微有望李德裕素不重之宣宗即位宰相白敏中與德裕有隙凡德裕所薄者必不次拔擢之乃加植金紫光祿大夫行刑部侍郎充諸道鹽鐵轉運使轉戶部侍郎領使如故俄以本官同平章事遷中書侍郎兼禮部尚書敏中罷相植亦罷為太子賓客分司東都數年出為許州刺史檢校刑部尚書忠武軍節度觀察等使大中末遷汴州刺史宣武軍節度觀察等使卒于鎮李讓夷字達心隴西人祖悅父應規讓夷元和十四年擢進士第釋褐諸侯府大和初入朝為右拾遺召充翰林學士轉左補闕三年遷職方員外郎左司郎中充職九年拜諫議大夫開成元年以本官兼知起居舍人事時起居舍人李褒有痼疾請罷官宰臣李石奏闕官上曰褚遂良為諫議大夫嘗兼此官卿可盡言今諫議大夫姓名石遂奏李讓夷馮定孫簡蕭俶帝曰讓夷可也李固言欲用崔球張次宗鄭覃曰崔球遊宗閔之門赤墀下秉筆記注為千古法不可用朋黨如裴中孺李讓夷臣不敢有纖芥異論其為人主大臣知重如此二年拜中書舍人以鄭覃此言深為李王玉楊嗣復所惡終文宗世官不達及德裕秉政驟加拔擢歷工戶二侍郎轉左丞纍遷檢校尚書右僕射俄拜中書侍郎同平章事宣宗即位罷相以太子賓客分司卒魏字申之巨鹿人五代祖文貞公徵貞觀朝名相曾祖殷汝陽令祖明亦為縣令父馮獻陵臺令大和七年登進士第楊汝士牧同州辟為防禦判官得祕書省校書郎汝士入朝薦為右拾遺文宗以魏徵之裔頗奇待之前雍管經略使董昌齡枉殺録事參軍衡方厚坐貶漵州司戶至是量移硤州刺史上疏論之曰王者施渙汗之恩以赦有罪唯故意殺人無赦昌齡比者録以微效授之方隅不能祗慎寵光恣其狂暴無辜專殺事迹顯彰妻孥銜寃萬里披訴及按鞫伏罪貸以微生中外議論以為屈法今若授之牧守以理疲人則殺人者拔擢而冤苦者何伸交紊憲章有乖至理疏奏乃改為洪州別駕御史中丞李孝本皇族也坐李訓誅有女沒入掖廷諫曰臣聞治國家者先資於德義德義不修家邦必壞故王者以德服人以義使人服使之術要在修身修身之道在於孜孜夫一失百虧之戒存乎久要之源前志曰勿以小惡而為之勿以小善而不為斯則懼於漸也臣又聞君如日焉顯晦之微人皆瞻仰照臨之大何以掩藏前代設敢諫之鼓立誹謗之木貴聞其過也陛下即位已來誕敷文德不悅聲色出後宮之怨婦配在外之魚衆夫洎今十年未嘗採擇自數月已來天眷稍回留神妓樂教坊百人二百人選試未已莊宅司收市亹亹有聞昨又宣取李孝本之女入內宗姓不異寵幸何名此事深纍慎修有虧一簣陛下九重之內不得聞知凡此之流大生物議實傷理道之本未免塵穢之嫌夫欲人不知莫若勿為諺曰止寒莫若重裘止謗莫若自修伏希陛下照鑒不惑崇千載之盛德去一旦之玩好教坊停息宗女遣還則大正人倫之風深弘王者之體疏奏帝即日出孝本女遷右補闕詔曰昔乃先祖貞觀中諫書十上指事直言無所避諱每覽國史未嘗不沉吟伸卷嘉尚久之爾為拾遺其風不墜屢獻章疏必道其所以至於備灑掃於諸王非自廣其聲妓也恤髫齔之宗女固無嫌於徵取也雖然疑似之間不可家至而戶曉爾能詞旨深切是博我之意多也噫人能匪躬謇諤似其先祖吾豈不能虛懷延納仰希貞觀之理歟而居官日淺未當進吾豈限以常典以待直臣可右補闕帝謂宰臣曰昔太宗皇帝得魏徵裨補闕失弼成聖政我得魏於疑似之間必能極諫不敢希貞觀之政庶幾處無過之地矣教坊副使雲朝霞善吹笛新聲變律深愜上旨自左驍衛將軍宣授兼揚府司馬宰臣奏曰揚府司馬品高郎官刺史迭處不可授伶官上意欲授之因宰臣對亟稱朝霞之善聞之纍疏陳論乃改授潤州司馬荊南監軍使呂令琮從人擅入江陵縣毀罵縣令韓忠觀察使韋長申狀與樞密使訴之上疏曰伏以州縣侵屈只合上聞中外關連須存舊制韋長任膺廉使體合精詳公事都不奏聞私情擅為踰越況事無巨細不可將迎縣令官業有乖便宜理罪監軍職司侵越即合聞天或以慮煩聖聽何不但申門下今則首紊常典理合糾繩伏望聖慈速加懲誡疏奏不出時論惜之三年轉起居舍人紫宸中謝帝謂之曰以卿論事忠切有文貞之風故不循月限授卿此官又謂之曰卿家有何舊書詔對曰比多失墜惟簪笏見存上令進來鄭覃曰在人不在笏上曰鄭覃不會我意此即甘棠之義非在笏而已將退又召誡之曰事有不當即須奏論曰臣頃為諫官合伸規諷今居史職職在記言臣不敢輒踰職分帝曰凡兩省官並合論事勿拘此言尋以本官直弘文館四年拜諫議大夫仍兼起居舍人判弘文館事紫宸入閣遣中使取起居注欲視之執奏曰自古置史官書事以明鑒誡陛下但為善事勿畏臣不書如陛下所行錯忤臣縱不書天下之人書之臣以陛下為文皇帝陛下比臣如褚遂良帝又曰我嘗取觀之曰由史官不守職分臣豈敢陷陛下為非法陛下一覽之後自此書事須有回避如此善惡不直非史也遺後代何以取信乃止初立朝為李固言李王玉楊嗣復所引數年之內至諫議大夫武宗即位李德裕用事坐楊李之黨出為汾州刺史楊李貶官亦貶信州長史宣宗即位白敏中當國量移郢州刺史尋換商州二年內徵為給事中遷御史中丞謝日面賜金紫之服彈駙馬都尉杜中立贓罪貴戚憚之兼戶部侍郎判本司事奏曰御史臺紀綱之地不宜與泉貨吏雜處乞罷中司專綜戶部公事從之尋以本官同平章事判使如故謝日奏曰臣無夔契之才驟叨夔契之任將何以仰報鴻私今邊戍粗安海內寧息臣愚所切者陛下未立東宮俾正人傅導以存副二之重因泣下上感而聽之先是纍朝人君不欲人言立儲二若非人主己欲臣下不敢獻言宣宗春秋高嫡嗣未辨作相之日率先啓奏人士重之尋兼集賢大學士詹毗國獻象以其性不安中土請還其使從之太原節度使李業殺降虜北邊大擾業有所恃人不敢非即奏其事乃移業滑州加中書侍郎大理卿馬曙從人王慶告曙家藏兵甲曙坐貶官而慶無罪引法律論之竟杖殺慶進階銀青光祿大夫兼禮部尚書監修國史修成文宗實録四十卷上之其修史官給事中盧耽太常少卿蔣偕司勳員外郎王渢右補闕盧告膳部員外郎牛叢皆頒賜錦綵銀器序遷職秩轉門下侍郎兼戶部尚書大中十年以本官平章事成都尹劍南西川節度副大使知節度事十一年以疾求代徵拜吏部尚書以疾未痊乞授散秩改檢校右僕射守太子少保十二年十二月卒時年六十六贈司徒儀容魁偉言論切直與同列上前言事他宰相必委曲規諷唯讜言無所畏避宣宗每曰魏綽有祖風名公子孫我心重之然竟以語辭太剛為令狐綯所忌罷之嘗鈔撮子書要言以類相從二十卷號曰魏氏手略有文集十卷子潛滂潛登進士第潛于敖甥後琮為相潛歷顯官周墀字德升汝南人祖頲父霈墀長慶二年擢進士第大和末纍遷至起居郎墀能為古文有史才文宗重之補集賢學士轉考功員外郎仍兼起居舍人事開成二年冬以本官知制誥尋召充翰林學士三年遷職方郎中四年十月正拜中書舍人內職如故武宗即位出為華州刺史鎮國軍潼關防禦等使改鄂州刺史御史中丞鄂嶽觀察使會昌六年十一月遷洪州刺史江南西道觀察使大中初檢校禮部尚書滑州刺史義成軍節度鄭滑觀察等使上柱國汝南男食邑三百戶入朝為兵部侍郎判度支尋以本官同平章事纍遷銀青光祿大夫中書侍郎監修國史兼刑部尚書罷相檢校刑部尚書梓州刺史御史大夫劍南東川節度使未行追制改檢校右僕射加食邑五百戶歷方鎮卒崔龜從字玄告清河人祖璜父誠官微龜從元和十二年擢進士第又登賢良方正制科及書判拔萃二科釋褐拜右拾遺大和二年改太常博士龜從長於禮學精歷代沿革問無不通時饗宗廟於敬宗室祝板稱皇帝孝弟龜從議曰臣審詳孝字載考禮文義本主於子孫理難施於兄弟按禮記卜虞之文子孫曰哀兄弟曰某然則虞之稱哀與祭之稱孝其義一也於祖禰則理宜稱孝於伯仲則止可稱名又東晉溫嶠議宗廟祝辭於孝字非子者則不稱傍親直言敢告當時朝議咸以為宜今臣上考禮經無兄弟稱孝之義下徵晉史有不稱傍親之文臣謂饗敬宗廟宜去孝弟兩字又以祀九宮壇舊是大祠龜從議曰九宮貴神經典不載天寶中術士奏請遂立祠壇事出一時禮同郊祀臣詳其圖法皆主星名縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祠豈容九宮獨越常禮備列王事誡誓百官尊卑乖儀莫甚於此若以嘗在祀典不可廢除臣請降為中祠制從之龜從又以大臣薨謝不於聞哀日輟朝奏議曰伏以廢朝軫悼義重君臣所貴及哀尤宜示信自頃已來輟朝非奏報之時備禮於數日之外雖遵常制似不本情臣不敢遠徵古書請引國朝故事貞觀中任瓌卒有司對仗奏聞太宗責其乖禮岑文本既歿其夕為罷警嚴張公謹之亡哭之不避辰日是知閔悼之意不宜過時臣謂大臣薨禮合輟朝縱有機務急速便殿須召宰臣不臨正朝無爽事體如此則由衷之信載感於幽明稱情之文無虧於典禮又奏文武三品官薨卒輟朝有未經親重之官今任又是散列者為之變禮誠恐非宜自今後文武三品以上官非曾任將相及曾在密近宜加恩禮者餘請不在輟朝之限從之纍轉考功郎中史館修撰九年轉司勳郎中知制誥十二月正拜中書舍人開成初出為華州刺史三年三月入為戶部侍郎判本司事四年權判吏部尚書銓事大中四年為中書侍郎同平章事兼吏部尚書五年七月撰成續唐曆三十卷上之六年罷相檢校吏部尚書汴州刺史宣武軍節度觀察等使纍歷方鎮卒鄭肅滎陽人祖烈父閲世儒家肅苦心力學元和三年擢進士第又以書判拔萃歷佐使府大和初入朝為尚書郎六年轉太常少卿肅能為古文長於經學左丘明三禮儀注疑議博士以下必就肅決之時魯王永有寵文宗擇名儒為其府屬用戶部侍郎庾敬休兼王傅戶部郎中李踐方兼司馬以肅本官兼長史由是知名明年魯王為太子肅加給事中九年改刑部侍郎尋改尚書右丞權判吏部西銓事開成初出為陝虢都防禦觀察使兼御史大夫二年九月召拜吏部侍郎帝以肅嘗侍太子言論典正復令兼太子賓客為東宮授經既而太子失寵上不悅有廢斥意肅因召見深陳邦國大本君臣父子之義上改容嘉之而太子竟以楊妃故得罪乃以肅檢校禮部尚書兼河中尹河中節度晉絳觀察等使會昌初武宗思太子永之無罪盡誅陷永之黨朝議稱肅忠正有大臣之節召拜太常卿纍遷戶部兵部尚書五年以本官同平章事加中書門下二侍郎監修國史兼尚書右僕射素與李德裕親厚宣宗即位德裕罷知政事肅亦罷相復為河中節度使以疾辭拜太子太保卒子洎咸通中纍官尚書郎出為刺史洎子仁規仁表俱有俊才文翰高逸仁規纍遷拾遺補闕尚書郎湖州刺史尚書郎知制誥正拜中書舍人卒仁表擢第後從杜審權趙騭為華州河中掌書記入為起居郎仁表文章尤稱俊拔然恃才傲物人士薄之自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投文於洎仁表兄弟嗤鄙之咸通末鄴為宰相仁表竟貶死南荒盧商字為臣范陽人祖昂澧州刺史父廣河南縣尉商元和四年擢進士第又書判拔萃登科少孤貧力學釋褐祕書省校書郎范傳式廉察宣歙辟為從事王播段文昌相繼鎮西蜀商皆佐職為記室纍改禮部員外郎入朝為工部員外郎河南縣令歷工部度支司封三郎中大和九年改京兆少尹權大理卿事開成初出為蘇州刺史中謝日賜金紫之服初郡人苦鹽法太煩姦吏侵漁商至籍見戶量所要自售無定額蘇人便之歲課增倍宰相領鹽鐵以其績上遷潤州刺史浙西團練觀察使入為刑部侍郎轉京兆尹三年朝廷用兵上黨飛挽越太行者環地六七鎮以商為戶部侍郎判度支兼供軍使軍用無闕逆稹蕩平加檢校禮部尚書梓州刺史劍南東川節度使宣宗即位入為兵部侍郎尋以本官同平章事范陽郡開國公食邑二千戶加兼工部尚書數年檢校工部尚書出為鄂嶽觀察使就加檢校兵部尚書大中十三年以疾求代徵拜戶部尚書其年八月卒于漢陰驛時年七十一子知遠知微知宗僧朗蕘史臣曰宗閔嗣復承宗室世家之地胄有文學政事之美名徊翔清華出入隆顯苟能義以為上羣而不黨議太平於稷契之列致人主於勛華之盛遭時得位誰曰不然而捨彼鴻猷狎茲鼠輩養虞卿而射利抗德裕以報仇矛盾相攻幾傾王室沒身蠻瘴其利伊何古者廉藺解仇冀全國體而邀歡釋憾實亂大倫世道銷刓一至於此崔魏二丞相嘉言啓奏無忝正人墀讓史才肅之禮學商之長者或登三事或踐六卿以道始終夫何不韙贊曰漢誅鈎黨魏破疽囊何鄧之後二李三楊偷權報怨任國存亡書茲覆轍敢告巖廊
