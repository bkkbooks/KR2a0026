其可否宰相鄭畋盧攜爭論於中書詞語不遜俱罷為太子賓客分司東都以吏部侍郎崔沆為戶部侍郎戶部侍郎翰林學士豆盧瑑為兵部侍郎並本官同平章事黃巢陷廣州大掠嶺南郡邑八月制以特進檢校司空東都留守李蔚為檢校司徒同平章事兼太原尹北都留守河東節度觀察兼代北行營招討供軍等使十月制以鎮海軍節度浙江西道觀察處置等使高駢檢校司徒同平章事揚州大都督府長史充淮南節度副大使知節度事江淮鹽鐵轉運江南行營招討等使進封燕國公食邑三千戶初駢在浙西遣大將張璘梁績等大破黃巢於浙東賊進寇福建踰嶺表故移鎮揚州時賊北踰大庾嶺朝廷授駢諸道行營兵馬都統太原節度使李蔚卒以禮部侍郎張讀權知左丞事十一月制以銀青光祿大夫檢校右散騎常侍河東行軍司馬鴈門代北制置等使石嶺鎮北兵馬代北軍等使上柱國康傳圭檢校工部尚書兼太原尹北都留守河東節度使時傳圭已率兵在代州是月自行營赴任兩都虞候張鍇郭朏迎於烏城驛並殺之軍中震悚又制以神策大將軍周寶檢校尚書左僕射兼潤州刺史鎮海軍節度浙江西道觀察等使以定州已來制置內間宮苑等使金紫光祿大夫檢校刑部尚書上柱國太原縣開國伯食邑七百戶王處存檢校戶部尚書兼定州剌史充義武軍節度易定觀察處置北平軍等使十二月制以河東馬步軍都虞候朱玫為代州刺史以太子賓客分司盧攜為兵部尚書同平章事太子賓客鄭畋檢校左僕射鳳翔尹充鳳翔節度使廣明元年春正月乙卯朔上御宣政殿制曰朕祗膺寶祚嗣守宗祧夙夜一心勤勞八載實欲驅黎元於仁壽致華夏之升平而國步猶艱羣生寡遂災迍荐起寇孽仍臻竊弄干戈連攻郡邑雖輸降款未息狂謀江右海南瘡痍既甚湖湘荊漢耕織屢空言念疲羸良深軫惻我心未濟天道如何賴近者嚴敕師徒稍聞勝捷皆明聖之潛祐寧菲德以言功屬節變三陽日當首歲乃御正殿爰命改元況及發生是宜在宥自古繼業守文之主握圖御宇之君必自正月吉辰發號施令所以垂千年之懿範固萬代之洪基莫不由斯道也可改乾符七年為廣明元年近日東南州府頻奏草賊結連本是平人迫於饑饉驅之為盜情不願為委所在長吏子細曉諭如自首歸降保非詐僞便須撫納不要勘問如未倒戈即登時剪撲東南州府遭賊之處農桑失業耕種不時就中廣州荊南湖南盜賊留駐人戶逃亡傷夷最甚自廣明已前諸色稅賦宜令十分減四其河中府太原府遭賊寇掠處亦宜準此吏部選人粟錯及除駁放者除身名渝濫缺考外並以比遠殘闕收注入仕之門兵部最濫全無根本頗壞紀綱近者武官多轉入文官依資除授宜懲僭幸以辨品流自今後武官不得轉入文官選改所冀輪轅各適秩序區分其內司不在此限沙陀部落踰鴈門關進逼欣州二月沙陀逼太原陷大谷康傳圭遣大將伊釗張彥球蘇弘軫分兵拒之於秦城驛為沙陀所敗傳圭怒斬蘇弘軫張彥球部下兵士為亂倒戈攻太原殺傳圭監軍使周從寓安慰方定是月制以開府儀同三司門下侍郎兼兵部尚書同平章事充太清宮使弘文館大學士延資庫使上柱國滎陽郡開國公食邑三千戶鄭從讜檢校司空同平章事兼太原尹北都留守充河東節度管內觀察處置兼行營招討供軍等使黃巢賊軍自衡永州下頻陷湖南江西屬郡時都統王鐸前鋒都將李係守潭州有衆五萬並諸團結軍號十萬賊自桂陽編木為數千其衆乘暴水沿湘而下徑至潭州急攻其城一日而陷李係僅以身免兵士五萬皆為賊所殺流尸塞江賊將尚讓乘勝沿流而下進逼江陵王鐸聞係軍敗乃棄城奔襄陽別將劉漢宏大掠江陵之民剽剝不勝其酷士民亡竄山谷江陵焚剽殆盡半月餘賊衆方至江陵三月賊悉衆欲寇襄陽江西招討使曹全晸與襄陽節度使劉巨容謀拒之時營於荊門賊軍一萬屯於團林驛全晸命巨容悉以精甲陳於林薄之中自以騎軍挑戰僞不勝而遁賊大乘之比至荊門其徒不成列巨容發伏擊之賊大潰而走全晸鐵騎急追之比至江陵十俘七八黃巢尚讓以餘衆徒濟江全晸方渡江襲賊遽詔至以段彥謨為江西節度使全晸乃還賊遂率舟軍東下攻鄂州陷其郛全晸救至賊遂轉戰江西陷江西饒信杭衢宣歙池等十五州全晸在江西朝廷以王鐸統衆無功乃授淮南節度使高駢為諸道兵馬行營都統駢令大將張璘渡江討賊屢捷賊衆疫癘其將李罕之以一軍投淮南其衆稍沮是月沙陀寇欣代詔以汝州防禦使諸葛爽為北面行營副招討率東都防禦兵士赴代州四月甲申朔大雨雹大風拔兩京街樹十二三東都長夏門內古槐十拔七八宮殿鴟尾皆落丁酉制以檢校吏都尚書前太常卿上柱國隴西郡開國公食邑三千戶李琢為光祿大夫檢校尚書右僕射御史大夫充蔚朔等州諸道行營都招討使應東北面行營李孝昌李元禮諸葛爽王重盈朱玫等兵馬及欣代州土團並取琢處分以內常侍張存禮充都糧料使判官崔鋋充制置副使六月代北行營招討使李琢幽州節度使李可舉吐渾首領赫連鐸等軍討李克用於雲州時克用令其大將軍傅文達守蔚州高文集守朔州吐渾赫連鐸遣人說高文集令歸國文集與沙陀首領李友金薩葛都督米海萬安慶都督史敬存以前蔚州歸款於李琢時克用率衆禦燕軍於雄武軍七月沙陀三部落李友金等開門迎大軍克用聞之亟來赴援為李可舉之兵追擊大敗於藥兒嶺李琢赫連鐸又擊敗于蔚州降文達李克用部下皆潰獨與國昌及諸兄弟北入達靼部乃以吐渾都督赫連鐸為雲州刺史大同軍防禦使吐渾白義誠為蔚州刺史薩葛米海萬為朔州刺史加李可舉檢校司徒同平章事八月黃巢之衆渡江寇淮南是歲春末賊在信州疫癘其徒多喪淮南將張璘急擊之賊懼以金啖璘仍致書高駢乞保命歸國駢信之厚待其使許求節鉞時昭義武寧義武等軍兵馬數萬赴淮南駢欲收功於己乃奏賊已將殄不假諸道之師並遣還北賊知諸軍已退以求節鉞不獲暴怒與駢絶請戰駢怒令張璘整軍擊之為賊所敗臨陳殺璘賊遂乘勝渡江攻天長六合等縣駢不能拒但決陳登水自固而已朝廷聞賊復振恐詔河南諸道之師屯于水官軍大集賊未北渡時兗州節度使齊克讓屯汝州九月徐州兵三千人赴水途經許許州節度使薛能前為徐帥得軍民情徐軍吏至請館能以徐軍懷惠令館於州內許軍懼徐人見襲許州大將周岌自水以其戍卒還逐薛能自據其城徐軍已至河陰聞許軍亂徐將時溥亦以戍兵還徐逐節度使支詳齊克讓兵見襲亦還兗州水諸軍皆散賊聞之十月乃悉衆渡淮黃巢自號率土大將軍其衆富足自淮已北整衆而行不剽財貨惟驅丁壯為兵耳十一月辛亥朔己巳賊陷東都留守劉允章率分司官屬迎謁之賊供頓而去坊市晏然壬申陷虢州丙子攻潼關守關諸將望風自潰十二月庚辰朔辛巳賊據潼關時左軍中尉田令孜專政相盧攜曲事之相與誤謀以至傾敗令孜恐衆罪加己請貶攜官命學士王徽裴徹為相甲申宣制以戶部侍郎翰林學士王徽裴徹本官同平章事貶右僕射門下侍郎平章事盧攜為太子賓客攜聞賊至仰藥而死是日上與諸王妃后數百騎自子城由含光殿金光門出幸南文武百官僚不之知並無從行者京城晏然是日晡晚賊入京城時右驍衛大將張直方率武官十餘迎黃巢於坡頭壬辰黃巢據大內僭號大齊稱年號金統悉陳文物據丹鳳門僞赦以太常博士皮日休進士沈雲翔為學士為僞赦書云揖讓之儀廢已久矣竄遁之迹良用憮然朝臣三品已上並停見任四品已下宜復舊位以趙章為中書令尚讓為太尉崔璆為中書侍郎平章事時宰相豆盧瑑崔沆故相左僕射劉鄴太子少師裴諗御史中丞趙蒙刑部侍郎李溥故相于琮皆從駕不及匿於閭里為賊所捕皆遇害將作監鄭綦庫部郎中鄭係義不臣賊舉家雉經而死中和元年春正月庚戌朔車駕在興元以翰林學士承旨尚書戶部侍郎知制誥蕭遘為兵部侍郎充諸道鹽鐵轉運等使尋以本官同平章事領使如故以宿州刺史劉漢宏為越州刺史鎮東軍節度浙江東道觀察處置等使詔太原節度使鄭從讜發本道之師與北面行營招討副使諸葛爽代州刺史北面行營馬步都虞候朱玫夏州將李思恭等行營諸軍並赴京師討賊河中馬步都虞候王重榮逐其帥李都自稱留後二月代州北面行營都監押陳景思率沙陀薩葛安慶等三部落與吐渾之衆三萬赴援關中次絳州沙陀首領翟稽俘掠絳州叛還景思知不可用遣使詣行在請赦李國昌父子令討賊以贖罪從之三月陳景思齎詔入達靼召李克用軍屯蔚州克用因大掠鴈門已北軍鎮以鳳翔節度使鄭畋守司空門下侍郎同平章事充京西諸道行營都統與涇原節度使程宗楚秦州經略使仇公遇鄜延節度使李孝昌夏州節度使拓拔思恭等同盟起兵傳檄天下黃巢遣大將林言尚讓率衆數萬寇鳳翔鄭畋率師逆擊大敗賊衆於龍尾陂四月以前大同軍防禦使李克用檢校工部尚書兼代州刺史鴈門已北行營兵馬節度等使五月李克用赴代州遂率蕃漢兵萬人南出石嶺關稱準詔赴難長安丁巳沙陀軍至太原鄭從讜供給糧料辛酉沙陀求發軍賞錢從讜與錢千貫米千石克用怒縱兵大掠從讜求援於振武契苾通自率兵來赴與沙陀戰於晉王嶺沙陀敗走陷榆次陽曲而退是日大風天雨土特進尚書右僕射趙隱卒贈司空六月沙陀退還代州車駕幸成都府西川節度使陳敬瑄自來迎奉七月丁未朔乙卯車駕至西蜀丁巳御成都府廨改廣明二年為中和元年大赦天下以兵部侍郎判度支韋昭度本官同平章事以侍中王鐸檢校太尉中書令兼滑州刺史義成軍節度鄭滑觀察處置兼充京城四面行營都統以太子太保崔安潛為副觀軍容使西門思恭為天下行營兵馬都監押中書侍郎平章事諸道鹽鐵轉運等使韋昭度為供軍使時淮南節度使高駢為諸道行營都統自車駕出幸中使相繼促駢起軍駢託以周寶劉漢宏不利於己遷延半歲竟不出軍乃以鐸為都統以河中節度使王重榮為京城北面都統義武軍節度使王處存為京城東面都統鄜延節度使李孝昌為京城西面都統朔方軍節度使拓拔思恭為京城南面都統以忠武監軍使楊復光為天下行營兵馬都監代西門思恭許王鐸以便宜從事遣郎官御史分行天下徵兵赴關內八月代北行營兵馬使諸葛爽朱玫拓拔思恭等軍屯渭橋朱玫屯興平為賊將王璠所擊退保奉天諸葛爽降賊僞署爽河陽節度使許州牙將秦宗權奏破賊於汝州乃授宗權蔡州防禦使昭義節度使高潯與賊將李詳戰于石橋為賊所敗退歸河中賊乘勝陷同州九月澤潞高潯牙將劉廣擅還據潞州是月潯天井關戍將孟方立率戍卒攻劉廣殺之方立遂自稱留後仍移軍鎮於邢州制以京城四面催陳使守兵部尚書王徽檢校左僕射兼潞州大都督府長史昭義節度潞邢洺磁觀察等使貶高潯端州刺史楊復光王重榮以河西昭義忠武義成之師屯武功鳳翔節度使鄭畋以病徵還行在以鳳翔大將李昌言代畋為節度使兼京城西面行營都統十月青州軍亂逐節度使安師儒立其行營將王敬武為留後十二月行營都統王鐸率禁軍山南東川之師三萬至京畿屯於盩厔二年春正月甲辰朔天下勤王之師雲會京畿京師食盡賊食樹皮以金玉買人於行營之師人獲數百萬山谷避亂百姓多為諸軍之所執賣二月涇原大將唐弘夫大敗賊將林言於興平俘斬萬計王處存率軍二萬徑入京城賊僞遁去京師百姓迎處存歡呼叫譟是日軍士無部伍分占第宅俘掠妓妾賊自灞上分門復入處存之衆蒼黃潰亂為賊所敗黃巢怒百姓歡迎處存凡丁壯皆殺之坊市為之流血自是諸軍退舍賊鋒愈熾三月前蔚州刺史蘇祐為沙陀所敗棄郡投鎮州至靈壽部人為盜祐為王景崇所殺七月辛丑朔丙午夜西北方赤氣如絳虹竟天賊將尚讓攻宜君寨雨雪盈尺甚寒賊兵凍死者十二三八月庚子賊同州防禦使朱溫殺其監軍嚴實與大將胡真謝瞳等來降王鐸承制拜華州刺史潼關防禦鎮國軍等使魏博節度韓簡自率軍三萬攻河陽僞署節度使諸葛爽棄城而去簡遣大將守河橋而還九月賊以黃鄴為華州刺史初賊以李詳守華州詳與朱溫素善及溫歸河中黃巢遣閹官後冗率功臣馬千匹至華殺詳以鄴代歸太原諸山桃杏有花實十月西北方無雲而雷名天狗墜以嵐州刺史湯羣為懷州刺史時羣倚沙陀為援朝廷疑而易之鄭從讜遣人傳官告授羣羣怒殺使者據城內沙陀魏博節度使韓簡以兵攻鄆州節度使曹全晸拒之為簡所敗執而殺之全晸大將朱瑄以餘衆保鄆州乞和於簡簡捨之而去十一月沙陀李克用監軍陳景思以部落之衆一萬七千騎自嵐石州路赴河中賊將李詳下牙隊斬華州守將歸明王鐸用其部將王遇為華州刺史十二月己亥朔庚戌成德軍節度鎮冀深趙觀察處置等使開府儀同三司檢校太尉中書令上柱國常山郡王食邑六千戶王景崇卒贈太傅諡曰忠穆遺表請以子鎔纘繼戎事遂以鎔為兵馬留後三年春正月戊辰朔車駕在成都府鴈門節度使檢校工部尚書李克用率師至河中己巳沙陀軍進屯沙苑之乾坑二月沙陀攻華州刺史黃鄴出奔至石堤谷追擒之魏博節度使韓簡再興兵討河陽諸葛爽遣大將李罕之拒之於武陟逆擊之魏軍大敗而還大將樂彥禎先據魏州韓簡為部下所殺推彥禎為留後就加李克用檢校尚書左僕射欣代雲蔚等州觀察處置等使三月丁卯朔壬申沙陀軍與賊將趙章尚讓戰于成店賊軍大敗追奔至良天坡橫尸三十里王重榮築尸為京觀四月丁酉朔庚子沙陀忠武義成義武等軍趨長安賊悉衆拒之於渭橋大敗而還李克用乘勝追之己卯黃巢收其殘衆由藍田關而遁庚辰收復京城天下行營兵馬都監楊復光上章告捷行在曰頃者妖興霧市嘯聚叢祠而嶽牧藩侯備盜不謹謂大同之運常可容姦謂無事之秋縱其長惡賊首黃巢因得充盈窟穴蔓延萑蒲驅我蒸黎徇其凶逆展鉏鶴以成鋒刃殺耕牛以恣燔炮魑魅晝行虺蜴夜噬自南海失守湖外喪師養虎災深馴梟逆大物無不害惡靡不為豺狼貽朝市之憂瘡痏及腹心之痛遂至毒流萬姓盜污兩京衣冠銜塗炭之悲郡邑起丘墟之歎萬方共怒十道齊攻仗九廟之威靈殄積年之凶醜河中節度使王重榮神資壯烈天賦機謀誓立功名志安家國至於屯田待敵率士當衝收百姓十萬餘家降賊黨三萬餘衆法能持重功遂晚成久稽原野之刑未決雷霆之怒自收同華進逼京師夕烽高照於國門遊騎頻臨於灞岸既知四隅斷絶百計奔衝如窮鳥觸籠似飛蛾赴焰鴈門節度使李克用神傳將略天付忠貞機謀與武藝皆優臣節共本心相稱殺賊無非手刃入陳率以身先可謂雄才得名飛將統領本軍南下與臣同力前驅雖在寢興不忘寇孽今月八日遣衙隊將前鋒楊守宗河中騎將白志遷橫野軍使滿存躡雲都將丁行存朝邑鎮將康師貞忠武黃頭軍使龐從等三十二都隨李克用自光泰門先入京師力摧凶逆又遣河中將劉讓王瓌冀君武孫珙忠武大將喬從遇鄭滑將韓從威荊南大將申屠悰滄州大將賈滔易定大將張仲慶壽州大將張行方天德大將顧彥朗左神策弩手甄君楚公孫佐橫衝軍使楊守亮躡雲都將高周彝忠順都將胡貞絳州監軍毛宣伯聶弘裕等七十都繼進賊尚為堅陳來抗官軍李克用率勵驍雄整齊金革叫譟而聲將動瓦喑嗚而氣欲吞沙寬列戈矛麾軍夾擊自卯至申凶徒大敗自望春宮蹙殺至升陽殿合圍戈不濫揮矢無虛發其賊即時奔遁散入商山徒延漏刃之生佇作飲頭之器伏自收平京國三面皆立大功若破敵摧鋒鴈門實居其首其餘將佐同效驅馳兼臣所部二萬餘人數歲櫛風沐雨既茲蕩定並録以聞報至從官稱賀五月制以河中節度使檢校尚書右僕射王重榮檢校司空同平章事餘如故鴈門已北行營節度欣代蔚朔等州觀察處置等使檢校尚書左僕射代州刺史上柱國食邑七百戶李克用檢校司空同平章事兼太原尹北京留守充河東節度管內觀察處置等使義武軍節度使檢校司空王處存檢校司徒同平章事餘如故以檢校尚書右僕射華州刺史潼關防禦等使朱溫檢校司空兼汴州刺史御史大夫充宣武節度觀察等使仍賜名全忠京城西北面行營都統金紫光祿大夫檢校司空邠州刺史邠寧節度使朱玫就加同平章事進封吳興縣侯食邑一千戶鄜坊節度使金紫光祿大夫檢校尚書右僕射東方逵就加同平章事王鐸罷行營都統依前檢校太師中書令進封晉國公加食邑二千戶節度觀察使如故時中尉田令孜用事自負帷幄之功以鐸用兵無功而由楊復光建策召沙陀成破賊之效欲權歸北司乃黜王鐸而悅復光也就加諸道行營兵馬都監楊復光開府儀同三司弘農郡開國公食邑三千戶充同華等州管內制置使仍賜號資忠耀武匡國平難功臣六月乙未朔甲子楊復光卒於河中其部下忠武八都都頭鹿晏弘晉暉王建韓建等各以其衆散去時復光足復恭知內樞密田令孜以復光立破賊功憚而惡之故賊平賞薄及聞復光死甚悅復擯復恭罷樞密為飛龍使是月黃巢圍陳州營於州北五里初賊出藍田關遣前鋒將孟楷攻蔡州刺史秦宗權以兵逆戰為楷所敗宗權勢窘與賊通和孟楷移兵攻陳州刺史趙犨示弱伏兵擊之臨陳斬楷楷賊之愛將深惜之黃巢怒悉衆攻陳州時黃巢與宗權合從縱兵四掠遠近皆罹其酷時仍歲大饑民無積聚賊俘人為食其炮炙處謂之舂磨寨白骨山積喪亂之極無甚於斯賊攻城急徐州節度使時溥許州周岌汴州朱全忠皆出師護援之七月制以西川節度使開府儀同三司守太尉同平章事成都尹上柱國潁川郡王食邑三千戶實封四百戶陳敬瑄賜鐵券詔鄭從讜赴行在八月李克用赴鎮太原制以前振武節度檢校司空兼單于都護御史大夫李國昌為檢校司徒代州刺史鴈門已北行營節度蔚朔等州觀察等使十月李國昌卒十一月蔡賊秦宗權圍許州十二月詔河東李克用赴援陳許忠武大將鹿晏弘陷興元逐節度使牛勗自為留後四年春正月癸亥朔車駕在成都府二月河東節度使李克用將出師援陳許河陽節度使諸葛爽以兵屯澤州拒之三月壬戌朔甲戌克用移軍自河中南渡東下洛陽四月辛卯朔甲寅沙陀軍次許州節度使周岌監軍田從異以兵會戰賊將尚讓屯太康黃鄴屯西華稍有芻粟己未沙陀分兵攻太康西華賊寨庚申尚讓黃鄴遁去官軍得其芻粟黃巢亦退保郾城以兵部侍郎判度支鄭昌圖以本官同平章事五月辛酉朔癸亥沙陀追黃巢而北丁卯次尉氏戊辰大雨平地水深三尺溝河漲溢賊至中牟臨汴河欲渡沙陀遽至賊大駭其黨分潰殺傷溺死殆半尚讓一軍降時溥別將楊能李讜霍存葛從周張歸霸等降朱全忠李周楊景彪以殘衆走封丘己巳沙陀渡汴河趨封丘黃巢兄弟悉力拒戰李克用擊敗之獲所俘男女五萬口牛馬萬餘并僞乘輿法物符印寶貨戎仗等三萬計得巢幼子年六歲黃巢既敗以其殘衆東走庚午李克用急躡黃巢一日夜行二百里馬疲乏死者殆半宿冤朐糧運不及騎軍至寡乃與忠武監軍田從異班師甲戌次汴州節度使朱全忠館克用于上源驛全忠以克用兵力寡弱大軍在遠乃圖之是夜置酒郵舍克用既醉全忠以兵圍驛縱火燒之雷雨驟平地水深尺餘克用踰垣僅免其部下三百餘人及監軍使史敬思書記任圭皆被害丙子克用至許州率本軍還太原庚辰徐州將李師悅陳景思率兵萬人追黃巢於兗州六月鄆州節度使朱瑄奏大敗賊於合鄉秋七月己未朔癸酉賊將林言斬黃巢黃揆黃秉三人首級降時溥初徐將李師悅與賊戰于瑕丘賊殊死戰其衆殆盡林言與巢走至太山狼虎谷之襄王村懼追至併命乃斬賊降師悅壬午捷書至行在從官稱賀河東節度使李克用纍表訴屈請討汴州天子優詔和解之就加克用階特進封隴西郡王以悅之自是全忠克用有尋戈之怨九月山南西道節度使鹿晏弘為禁軍所討棄城擁衆東出襄鄧大掠許州晏弘大將王建韓建張造晉暉李師泰各率本軍歸朝田令孜以建等楊復光故將薄之皆授諸衛將軍惟以王建為壁州刺史十月關東諸鎮上章請車駕還京十一月鹿晏弘陷許州殺周岌自稱留後尋為秦宗權所攻制以義成軍節度檢校太師中書令上柱國晉國公王鐸為滄州刺史義昌軍節度滄德觀察處置等使十二月丁亥朔大明宮留守權知京兆尹御史大夫京畿制置等使王徽與留司百官上表請車駕還宮詔以來年正月還京新除滄德節度使王鐸為魏博節度使樂彥禎害之於漳南縣之高雞泊行從三百餘人皆遇害光啓元年春正月丁巳朔車駕在成都府己卯僖宗自蜀還京二月丁亥朔丙申車駕次鳳翔三月丙辰朔丁卯車駕至京師己巳御宣政殿大赦改元光啓時李昌府據鳳翔王重榮據蒲陝諸葛爽據河陽洛陽孟方立據邢洺李克用據太原上黨朱全忠據汴滑秦宗權據許蔡時溥據徐泗朱瑄據鄆齊曹濮王敬武據淄青高駢據淮南八州秦彥據宣歙劉漢宏據浙東皆自擅兵賦迭相吞噬朝廷不能制江淮轉運路絶兩河江淮賦不上供但歲時獻奉而已國命所能制者河西山南劍南嶺南西道數十州大約郡將自擅常賦殆絶藩侯廢置不自朝廷王業於是蕩然蔡賊秦宗權侵寇藩鄰制以徐州節度使時溥為巨鹿王充蔡州四面行營兵馬都統宗權將秦賢攻汴鄭不已以汴州刺史朱全忠為沛郡王充蔡州西北面行營都統杭州刺史董昌大敗劉漢宏之衆進攻越婺台明等州下之遂以昌為越州刺史鎮東軍節度浙江東道觀察等使以杭州大將錢鏐為杭州刺史閏三月鎮冀節度使王鎔獻耕牛千頭農具九千兵仗十萬四月乙卯朔以開府儀同三司右金吾衛上將軍左街功德使齊國公田令孜為左右神策十軍使時自蜀中護駕令孜招募新軍五十四都都千人左右神策各二十七都分為五軍令孜總領其權時軍旅既衆南衙北司官屬萬餘三司轉運無調發之所度支惟以關畿稅賦支給不充賞勞不時軍情咨怨舊日安邑解縣兩池榷鹽稅課鹽鐵使特置鹽官以總其事自黃巢亂離河中節度使王重榮兼領榷務歲出課鹽三千車以獻朝廷至是令孜以親軍闕供計無從出乃舉廣明前舊事請以兩池榷務歸鹽鐵使收利以贍禁軍詔下重榮上章論訴言河中地窘悉籍鹽課供軍五月制以河中節度使檢校司徒同平章事河中尹上柱國琅邪郡王王重榮為檢校太傅同平章事兼兗州刺史兗沂海節度觀察處置等使代齊克讓以克讓檢校司徒兼定州刺史御史大夫充義武節度觀察北平軍等使代王處存以處存依前檢校太傅同平章事河中尹河中晉慈隰節度觀察等使是月宰臣蕭遘率文武百僚上徽號曰至德光烈孝皇帝御宣政殿受冊大赦六月甲寅朔丙辰定州王處存奏幽州節度使李可舉鎮州節度使王鎔各令大將率領兵士侵攻當道臣並已殺退時李可舉乘天子播越中原大亂以河朔三鎮休戚事同惟易定二郡為朝廷所有乃同議攻處存以分其地會燕將李全忠有奪帥之志軍情相疑全忠方圍易州處存出奇騎以擊之燕軍大敗是月全忠收合殘衆攻幽州李可舉舉室登樓自焚而死全忠自稱留後滄州軍亂逐其帥楊全玫立衙將盧彥威為留後制以保鑾都將檢校司徒兼黔州刺史黔中節度觀察等使曹誠檢校太保兼滄州刺史充義昌軍節度滄德觀察等使河中王重榮纍表論列數令孜離間方鎮令孜遣邠寧節度使朱玫會合鄜延靈夏之師討河中九月朱玫屯沙苑王重榮求援於太原十月李克用率太原軍南出陰地關十一月河中太原之師與禁軍對壘於沙苑十二月辛亥朔癸酉官軍合戰為沙陀所敗朱玫走還邠州神策軍潰散遂入京師肆掠乙亥沙陀逼京師田令孜奉僖宗出幸鳳翔初黃巢據京師九衢三內宮室宛然及諸道兵破賊爭貨相攻縱火焚剽宮室居市閭里十焚六七賊平之後令京兆尹王徽經年補葺僅復安堵至是亂兵復焚宮闕蕭條鞠為茂草矣二年春正月辛巳朔車駕在鳳翔李克用旋師河中與朱玫王重榮同上表請駕駐蹕鳳翔仍數田令孜之罪乃以飛龍使楊復恭復知內樞密事戊子田令孜迫乘輿請幸興元庚寅車駕次寶雞授刑部尚書孔緯兼御史大夫令率從官赴行在時車駕夜出宰相蕭遘裴徹鄭昌圖及文武百僚不之知扈從不及故令孔緯促之蕭遘惡令孜弄權再亂京國因邠州奏事判官李松年至鳳翔乃令亟召朱玫迎奉癸巳朱玫引步騎五千至鳳翔令孜聞邠州軍至奉帝入散關令禁軍守靈璧玫至禁軍潰散遂長驅追駕至尊途驛嗣襄王熅疾為玫所得時興元節度使石君涉聞車駕入關乃毀徹棧道柵絶險要車駕由他道僅達為邠州軍踵後崎嶇危殆者數四二月辛亥朔以十軍觀軍容使開府田令孜為劍南西川節度監軍以內樞密使楊復恭為神策左軍中尉三月庚辰朔壬午興元節度使石君涉棄城入朱玫軍內丙申車駕至興元戊辰以翰林學士承旨兵部尚書知制誥杜讓能為兵部侍郎刑部尚書御史大夫孔緯為兵部侍郎充諸道鹽鐵轉運等使並以本官同平章事保鑾都將李鋋楊守亮楊守宗等敗邠州軍於鳳州四月庚戌朔是夜熒惑犯月角壬子朱玫李昌符迫宰相蕭遘等於鳳翔驛舍請嗣襄王熅權監軍國事玫自為大丞相兼左右神策十軍使遂驅率文武百僚奉襄王還京師五月己卯朔庚辰襄王僭即皇帝位年號建貞以蕭遘初沮襄王監國之命罷知政事為太子少師以朱玫為侍中諸道鹽鐵轉運使以裴徹為門下侍郎右僕射同平章事判度支中書侍郎刑部尚書平章事鄭昌圖判戶部事蕭遘移疾歸河中之永樂僞制加諸侯官爵以淮南節度使檢校太尉兼侍中高駢為太師中書令江淮鹽鐵轉運諸道行營兵馬都統又以淮南右都押衙和州刺史呂用之檢校兵部尚書兼廣州刺史嶺南東道節度使令戶部侍郎柳涉往江淮宣諭戶部侍郎夏侯潭河北宣諭諸藩節將多授其僞署惟定州太原宣武河中拒而不受是月星孛於箕尾歷北斗攝提荊南襄陽仍歲蝗旱米斗三十千人多相食楊復恭兄弟於河中太原有破賊連衡之舊乃奏遣諫議大夫劉崇望齎詔宣諭達復恭之旨王重榮李克用欣然聽命尋遣使貢奉獻縑十萬匹願殺朱玫自贖崇望使還君臣相賀六月己酉朔以扈蹕都將楊守亮為金州刺史金商節度京畿制置使守亮率師二萬趨金州與王重榮李克用掎角進軍時朱玫遣將王行瑜率邠寧河西之師五萬屯鳳州保鑾都將李鋋李茂貞陳珮等抗之於大唐峯七月戊寅朔蔡賊秦宗權陷許州殺鹿晏弘以金商節度使楊守亮檢校司徒兼興元尹充山南西道節度等使王行瑜急攻興州守亮出師擊敗之八月幽州節度使李全忠卒三軍立其子匡威為留後九月楊守亮復敗邠州軍於鳳州軍容楊復恭密遣人說王行瑜令謀歸國十月壬子朔滑州軍亂逐其帥安師儒推衙將張驍主留後軍務師儒奔汴州朱全忠殺之遂以兵攻滑斬張驍以告行在朝廷以汴帥全忠兼領義成軍節度使壬辰夜白虹見西方十一月蔡賊孫儒陷鄭州剌史李璠遁免儒引軍攻河陽十二月乙巳朔是月朱玫愛將王行瑜受密詔自鳳州率衆還長安辛酉行瑜斬朱玫及其黨與數百人縱兵大掠是冬苦寒九衢積雪兵入之夜寒冽尤劇民吏剽剝之後僵凍而死蔽地裴徹鄭昌圖及百官奉襄王奔河中王重榮紿稱迎奉執李熅斬之械裴徹鄭昌圖於獄文武官僚遭戮者殆半重榮函襄王首赴行在刑部奏請御興元城南門閲俘馘受賀下禮院定儀注博士殷盈孫奏曰伏以僞熅違背宗社僭竊乘輿欺天之禍既盈盜國之罪斯重果至覆敗以就誅夷九重之妖祲既除萬國之生靈共慶宜陳賀禮以顯皇猷然物議之間有所未允臣按禮經公族有罪獄既具有司聞於公曰某之罪在大辟君曰赦之如是者三有司走出致刑君復使謂之曰雖然固當赦之有司曰不及矣君為之素服不樂三月左傳衛君在晉衛臣元咺立衛君之弟叔武衛君入國叔武為前驅所殺衛君哭之左氏書焉今僞熅皇族也雖犯殊死之罪宜就屠戮其可以朝羣臣而受賀乎臣以為熅胤係金枝名標玉牒迫脅之際不能守節效死而乃甘心逆謀罪實滔天刑不可赦已為軍前處置宜即黜為庶人絶其屬籍其首級仍委所在以庶人禮收葬大捷之慶當以朱玫首級到日稱賀為得其宜上不軫于宸衷下無傷於物體協禮經之旨祛中外之疑遂罷賀禮及朱玫傳首至乃御樓受俘馘是月蔡賊孫儒陷河陽諸葛仲方奔歸汴州別將李罕之出據澤州張全義據懷州三年春正月乙亥朔車駕在興元府制以邠州都將王行瑜檢校刑部尚書兼邠州刺史邠寧慶節度使保鑾都將李鋋檢校司空黔州刺史黔中節度觀察使扈蹕都頭李茂貞為檢校尚書左僕射洋州刺史武定軍節度使扈蹕都頭楊守宗為金州刺史金商節度等使保鑾都將陳珮檢校尚書右僕射為宣州刺史宣歙觀察使兵部侍郎諸道租庸使張濬本官同平章事二月乙巳朔潤州牙將劉浩度支使薛朗同謀逐其帥周寶劉浩自稱留後三月乙亥朔甲申車駕還京次鳳翔以宮室未完節度使李昌符請駐蹕以俟畢工河中械送僞宰相裴徹鄭昌圖命斬之於岐山縣太子少師致仕蕭遘賜死於永樂縣以特進監修國史門下侍郎吏部尚書平章事孔緯領諸道鹽鐵轉運使以集賢殿大學士中書侍郎兵部尚書平章事杜讓能進封襄陽郡公增食邑三千戶四月甲辰朔揚州牙將畢師鐸自高郵率戍兵攻揚州下之囚高駢於別室自總軍政蔡賊秦賢攻汴州周列三十六寨朱全忠乞師於兗鄆朱瑾率師來赴屯封禪寺朱瑄屯靜戎鎮五月甲戌朔乙亥秦宗權自率衆來應秦賢壬午鄆兗汴三鎮之師大破蔡賊於邊孝村宗權退走孫儒聞秦賢敗盡驅河陽之人殺之投尸於河焚燒閭井而去王師收孟洛許汝懷鄭陝虢等州詔以扈駕都頭楊守宗權知許州事汴將孟從益權知鄭州事諸葛爽舊將李罕之自澤州收河陽懷州刺史張全義收洛陽揚州牙將畢師鐸召宣州觀察使秦彥入揚州推為節度使六月癸卯朔戊申天威軍都頭楊守立與李昌符爭道麾下相歐上命中使諭之不止是夜嚴兵為備己酉守立以兵攻昌符戰于通衢昌符兵敗出保隴州命扈駕都將李茂貞攻之甲寅河中牙將常行儒殺其帥王重榮推重榮兄重盈為兵馬留後丙辰太常禮院奏太廟十一室并祧廟八室孝明太后等別廟三室自車駕再幸山南並經焚毀神主失墜今大駕還京宜先葺宗廟神主然後還宮遂詔修奉太廟使宰相鄭延昌修奉是時宮室未完國力方困未暇舉行舊制延昌請權以少府監大廳為太廟太廟凡十一室二十三間間十一架今監五間請添造成十一間以備十一室之數敕曰敬依典禮七月壬申朔隴州刺史薛知籌以城降李茂貞遂拔隴州斬李昌符昌仁等傳首獻于行在丙子制以武定軍節度使檢校尚書左僕射兼洋州刺史御史大夫上柱國隴西郡公食邑一千五百戶李茂貞檢校司空同平章事兼鳳翔尹鳳翔隴右節度等使九月辛未朔淮南節度使高駢為其牙將畢師鐸所殺楊行密急攻廣陵蔡賊秦宗權遣其將孫儒將兵三萬渡淮爭揚州城中食盡十一月秦彥畢師鐸潰圍奔于孫儒軍行密入據揚州秦彥引孫儒之兵攻廣陵行密遣使求援于朱全忠制授全忠檢校太尉侍中兼揚州大都督府長史充淮南節度觀察等使行營兵馬都統汴將李璠率師至淮口以援之十二月己巳朔東川節度使顧彥朗壁州刺史王建連兵五萬攻成都陳敬瑄告難于朝詔中使諭之文德元年春正月己亥朔車駕在鳳翔制故鳳翔隴右節度觀察處置等使檢校司徒同平章事兼鳳翔尹上柱國滎陽郡開國公食邑三千戶鄭畋贈司徒諡曰文昭蔡賊孫儒斬秦彥畢師鐸于高郵二月己巳朔壬午車駕在鳳翔至京師魏博軍亂逐其帥樂彥禎彥禎子相州刺史從訓率衆攻魏州牙軍立其小校羅宗辨為留後出兵拒之從訓求援於汴朱全忠遣將朱珍渡河赴之戊子上御承天門大赦改元文德宰相韋昭度兼司空孔緯杜讓能加左右僕射進階開府儀同三司並賜號持危啓運保乂功臣張濬兼兵部尚書進階開府儀同三司左右神策十軍觀軍容使左金吾衛上將軍左右街功德使上柱國弘農郡開國公楊復恭進封魏國公加食邑七千戶賜號忠貞啓聖定國功臣以保鑾都將黔中節度使李鋋檢校司徒平章事保鑾都將陳珮檢校司空廣州刺史嶺南東道節度使藩鎮諸侯進秩有差宰臣韋昭度率文武百僚上徽號曰聖文睿德光武弘孝皇帝三月戊戌朔正殿受冊庚子上暴疾壬寅大漸癸卯宣制立弟壽王傑為皇太弟勾當軍國事是夕崩於武德殿聖壽二十七羣臣上諡曰惠聖恭定孝皇帝廟號僖宗其年十二月葬于靖陵史臣曰恭帝冲年纘曆政在宦臣惕勵虔恭殷憂重慎屬世道交喪海縣橫流赤眉搖蕩於中原黃屋流離於遐徼黔黎塗炭宗社丘墟而猶藩垣多仗義之臣心腹有盡忠之輔驅駕豪傑號令軍戎終誅伏莽之徒大雪失邦之恥而令孜一為謬計幾喪丕圖雖如線之僅存固棼絲之莫救茫茫禹迹空悲文命之艱難赫赫宗周竟墜文王之基業非僖皇失道之過其土運之窮歟悲夫贊曰運曆將窮人君幼冲塵飛巨盜波駭羣雄天既降喪人罕輸忠回鑾返正禁旅之功
