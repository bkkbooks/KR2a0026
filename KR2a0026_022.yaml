body:
  text: 舊唐書卷十九下本紀第十九下僖宗僖宗惠聖恭定孝皇帝諱儇懿宗第五子母曰惠安皇后王氏咸通三年五月八日生於東內初封普王名儼十四年七月懿宗大漸其月十八日制曰朕守大器之重居兆人之上日慎一日如履如臨旰昃勞懷寢興思理涉道猶淺導化未孚而攝養乖方寒暑成癘實有慮於闕政且無暇於怡神恙未少瘳日加寖劇萬務凡總須有主張考思舊章謀于卿士思闡鴻業式建皇儲第五男普王儼改名儇孝敬溫恭寬和博厚日新令德天假英姿言皆中規動必由禮俾崇邦本允協人心宜立為皇太子權勾當軍國政事咨爾中外卿士洎于腹心之臣敬保豫胤輔成豫志各竭乃心以安黎庶布告中外知朕意焉是日懿宗崩二十日即皇帝位于柩前時年十二左軍中尉劉行深右軍中尉韓文約居中執政並封國公八月皇帝釋服冊聖母王氏為皇太后河南大水自七月雨不止至釋服後方霽九月守司空門下侍郎平章事韋保衡貶賀州刺史以嶽州刺史于琮為太子少傅緣琮貶逐者並放還循州司戶崔沆復為中書舍人前戶部侍郎知制誥翰林學士承旨鄭畋為左散騎常侍前兵部侍郎知制誥翰林學士張裼為太子賓客前諫議大夫高湘復為諫議大夫前宣歙觀察使楊嚴復為給事中十月左僕射門下侍郎平章事劉鄴檢校左僕射同平章事兼揚州大都督府長史充淮南節度觀察副大使知節度事十一月以光祿大夫守太子少傅駙馬都尉于琮檢校尚書左僕射兼襄州刺史御史大夫充山南東道節度觀察等使十二月雷震義成軍節度使檢校刑部尚書杜慆就加兵部尚書乾符元年春正月辛酉朔乙丑左僕射門下侍郎平章事蕭倣兼右僕射門下侍郎吏部尚書平章事王鐸檢校吏部尚書同平章事兼汴州刺史充宣武軍節度宋亳觀察等使二月葬懿宗于簡陵三月以河東節度使檢校尚書右僕射崔彥昭為尚書兵部侍郎充諸道鹽鐵轉運等使以銀青光祿大夫京兆尹上柱國岐山郡開國公食邑三千戶竇浣檢校戶部尚書太原尹北都留守御史大夫充河東節度管內觀察處置等使以中書侍郎刑部尚書同平章事趙隱檢校吏部尚書潤州刺史浙江西道都團練觀察等使四月崔彥昭本官同平章事領使如故以前淮南節度使李蔚為吏部尚書以天平軍節度使檢校尚書右僕射兼鄆州刺史高駢檢校司空兼成都尹充劍南西川節度副大使知節度事以右散騎常侍韋荷為吏部侍郎前同州刺史崔璞為右散騎常侍右領軍衛上將軍渾僖檢校吏部尚書左千牛衛上將軍以侍御史盧胤征為司封員外郎判戶部案五月以吏部侍郎鄭畋為兵部侍郎同平章事戶部侍郎知制誥翰林學士賜紫金魚袋盧攜本官同平章事太子右庶子李嶧為太僕卿侍御史裴渥為起居郎以嶺南東道節度使檢校刑部書鄭從讜為刑部尚書以吏部侍郎韋荷檢校禮部尚書廣州刺史嶺南東道節度使七月以禮部侍郎裴瓚為檢校左散騎常侍潭州刺史御史大夫湖南觀察使故湖南觀察使李庾贈禮部尚書十月以中書舍人崔沆為中書侍郎右諫議大夫崔胤為給事中十一月丙戌朔庚寅上有事於宗廟禮畢御丹鳳門大赦改元為乾符宰相蕭倣兼司空弘文館大學士太清宮使兵部侍郎崔彥昭為中書侍郎兵部侍郎鄭畋為集賢殿大學士以宣慰沙陀六州部落檢校兵部尚書李鈞為靈武節度制曰朕以沙陀驍勇重纍戰功六州蕃渾沐浴王化念其出於猜二互有傷殘而克璋報仇其意未已被我君臨之德軫吾子育之心爰擇良能俾之宣撫惟爾先正嘗鎮北門待國昌以雄傑之才置國昌於濟活之地既藉奕葉之舊又懷任土之觀是用付以封疆委之軍旅必集王事無墜家聲初鈞父業鎮太原能安集代北部落時李國昌父子據大同振武吐渾契苾幽州諸道之軍攻之不利故假鈞靈武節鉞率師招諭之以長安令李壁為諫議大夫以吏部員外郎徐彥若為長安令兵部郎中盧鄯為楚州刺史十二月党項回鶻寇邊以左司郎中崔原為兵部郎中江州刺史李可仁為右司郎中權知工部尚書牛蔚為禮部尚書太子賓客于浱為工部尚書是冬南詔蠻寇蜀詔河西河東山南西道東川徵兵赴援西川節度使高駢奏奉敕抽發長武鄜州河東等道兵士赴劍南行營者伏以西川新軍舊軍差到已衆況蠻蛋小醜必可枝梧今以道路崎嶇館驛窮困更有軍頓立見流移所謂望一處完全而百處俱破且兵不在衆而在於和其左右神策長武鎮鄜州河東所抽甲馬兵士人數不少況備辦軍食費損尤多又緣三道藩鎮盡扼羌戎邊鄙未寧望不差發如已在道路並請降敕勒回詔答曰蠻蛋如尚憑凌固須倍兵禦敵若已奔退即要並力追擒方藉北軍助平南寇其三處兵士宜委高駢候到蜀日分布驅使具務多多之辦寧亂整整之師其河東一千二百人令竇浣不要差發時駢扞蠻已退長武兵士竟至蜀而還議者惜其勞費而虛邀出入之賞也右軍中尉韓文約以疾乞休致從之二年春正月乙酉朔己丑宰相崔彥昭率文武百僚上尊號上御正殿受冊以知內樞密田令孜為右軍中尉南蠻驃信遣使乞盟許之以鳳州刺史郭弘業為左金吾衛將軍庫部郎中韋岫為泗州刺史都官員外郎李頻為建州刺史二月以兵部侍郎充諸道鹽鐵轉運使王凝為祕書監以所補吏職罪也以吏部侍郎裴坦為兵部侍郎充諸道鹽鐵轉運使以翰林學士崔淡為中書舍人翰林學士徐仁嗣為司封郎中學士如故以容管經略招討使高秦檢校戶部尚書太府卿李嶧為宗正卿湖州刺史張搏為廬州刺史庫部員外郎楊堪為吏部員外郎三月以右補闕鄭勤為起居郎度支推官牛徽為右補闕以戶部郎中崔彥融為長安令都官郎中楊知退為戶部郎中左司員外郎唐嶠為刑部郎中刑部員外郎畢紹顏為左司員外郎侍御史鄭頊為刑部員外郎四月海賊王郢攻剽浙西郡邑以殿中侍御史李燭為禮部員外郎以太子賓客張裼為吏部侍郎前淮南節度使李蔚為太常卿成德軍節度使王景崇加開府儀同三司祕書監蕭峴為國子祭酒汝州刺史崔彥沖為太子賓客分司新除吏部侍郎張裼為京兆尹東川點檢兵馬使吳行魯可金紫光祿大夫檢校兵部尚書兼梓州刺史御史大夫充劍南東川節度等使以東川節度使檢校戶部尚書崔充為河南尹河南尹李晦檢校左散騎常侍兼福州刺史福建都團練觀察使以鳳翔隴西節度使檢校司徒同平章事上柱國涼國公食邑三千戶令狐綯進封趙國公五月濮州賊首王仙芝聚於長垣縣其衆三千剽掠閭井進陷濮州俘丁壯萬人鄆州節度使李種出兵擊之為賊所敗以殿中少監薛璫為衛州刺史國子司業裴拙為洋州刺史中書舍人崔沆為禮部侍郎兵部郎中裴虔餘為太常少卿六月以司勳員外郎薛邁為兵部郎中戶部員外郎鄭就為司勳員外郎倉部員外郎鄭綮為戶部員外郎主客員外郎王鐐為倉部員外郎秋七月以大理卿蔡行為豐州刺史天德軍都防禦使大理卿張彥遠為大理卿以京兆尹張裼檢校戶部尚書兼鄆州刺史御史大夫充天平軍節度鄆曹濮觀察等使以左司勳員外郎杜貞符為都官郎中吏部員外郎牛循為金州刺史司封員外郎盧胤征為吏部員外郎十月以祕書少監李貺為諫議大夫以前大同軍及雲朔都防禦營田供軍等使李璫檢校左散騎常侍豐州刺史充天德軍豐州西城中城都防禦使本管押蕃落等使以考功員外郎趙蘊為吏部員外郎戶部員外郎盧莊為起居員外郎禮部員外郎蕭遘為考功員外郎十一月以起居郎劉崇龜為禮部員外郎殿中侍御史孔綸為戶部員外郎是月雷震電左僕射王鐸兼門下侍郎同平章事復輔政三年春正月己卯朔司空門下侍郎同平章事蕭倣以病求免罷為太子太傅浙西奏誅王郢徒黨以左金吾衛大將軍右街使齊克讓檢校兵部尚書兼兗沂海等州節度使三月以吏部尚書歸仁晦吏部侍郎孔晦吏部侍郎崔蕘試宏詞選人考功郎中崔庾考功員外郎周仁舉為考官以太常卿李蔚本官同平章事奉天鎮上言金龍晝見自河升天門下侍郎崔彥昭太清宮使弘文館大學士中書侍郎刑部尚書平章事鄭畋監修國史以右武衛大將軍墨冲謙為左金吾衛大將軍以黎州刺史杜岡為雅州刺史五月以江西觀察使獨孤雲為太子少傅金州刺史束鄉勵為嘉州刺史六月敕福建觀察使李播荊州刺史楊權古蔚州刺史王龜範璧州刺史張贄濮州刺史韋浦施州刺史婁傅會邢州刺史王回撫州刺史崔理黃州刺史計信卿等刺史親人之官苟不諳詳豈宜除授比為朕養百姓非獨榮爾一身每念疲羸實所傷歎李播等九人授官之時衆詞不同王回等三人到郡無政惟務貪求實樜方州並宜停任以檢校右散騎常侍衛尉卿李鐸為太府卿以涼王傅分司裴思謙為衛尉卿撫王府長史劉允章涼王傅主客郎中崔福為汾州刺史荊南節度副使王慥為主客郎中六月以門下侍郎刑部尚書平章事太清宮使弘文館大學士判度支崔彥昭兼左僕射中書侍郎鄭畋兼門下侍郎太常卿平章事李蔚為中書侍郎以歙州刺史蕭騫為右司員外郎右司員外郎崔潼為歙州刺史七月草賊王仙芝寇掠河南十五州其衆數萬是月賊逼潁許攻汝州下之虜刺史王鐐刑部侍郎劉承雍在郡為賊所害賊遂南攻唐鄧安黃等州時關東諸州府兵不能討賊但守城而已以戶部郎中李節為駕部郎中金部郎中王慥為戶部郎中主客郎中鄭諴為金部郎中金部員外郎張譙為主客郎中屯田員外郎竇珝為金部員外郎京兆司録趙曄為屯田員外郎工部侍郎崔朗為同州刺史左軍劈仗使左監門衛上將軍西門思恭為右威衛上將軍以右諫議大夫知制誥魏簹為中書舍人九月以右丞崔蕘權知吏部侍郎禮部侍郎崔沆為尚書右丞中書舍人高湘權知禮部侍郎京兆尹楊知至為工部侍郎兵部尚書兼太常卿李璫檢校尚書右僕射太常衛尉卿蕭寬為鴻臚卿充間使以宰相崔彥昭男保謙為祕書省校書郎右僕射門下侍郎平章事崔彥昭加特進門下侍郎禮部尚書平章事鄭畋可特進太中大夫平章事盧攜可銀青光祿大夫銀青光祿大夫平章事李蔚可金紫光祿大夫以太府卿李嶧檢校工部尚書滑州刺史御史大夫充義成軍節度鄭滑潁觀察處置等使雅州自六月地震至七月未止壓傷人頗衆詔河南藩鎮舉兵討賊以刑部郎中李磎為戶部郎中分司東都戶部郎中鄭諴為刑部郎中戶部郎中知制誥翰林學士王徽為中書舍人戶部員外郎翰林學士蕭遘為戶部郎中學士並如故諫議大夫趙蒙為給事中商州刺史張同為諫議大夫十一月以司門員外郎鄭蕘為池州刺史水部員外郎樊充為工部員外郎汴宋度支使杜孺休為水部員外郎太常少卿崔渾貶康州刺史揚州左司馬鄭祥為澧州刺史度支分巡院使李仲章為建州刺史十二月以右金吾衛將軍張簡會為左金吾大將軍充右街使右龍武將軍李韜為右金吾將軍前陝西虢觀察使陸墉為太子賓客四年春正月癸酉朔丁丑降制赦天下繫囚及徒流人放還以諫議大夫李湯為給事中以兵部郎中崔厚為諫議大夫大理少卿王承顏為鹽州剌史明州刺史殷僧辨為大理卿以吏部尚書鄭從讜吏部侍郎孔晦吏部侍郎崔蕘考宏詞選人三月以開府行內侍監致仕劉行深為內侍省觀軍容守內侍監致仕以判鹽鐵案檢校考功郎中鄭為司封員外郎充轉運判官兵部員外郎裴渥為蘄州刺史職方員外郎盧澄為兵部員外郎以草賊大寇河南山南詔曰亂常干紀天地所不容伐罪弔人帝王之大典歷觀往代遍數前朝其有怙衆稱兵憑凶構