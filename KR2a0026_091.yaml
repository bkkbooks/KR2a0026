body:
  text: 舊唐書卷八十七列傳第三十七裴炎劉禕之魏玄同李昭德裴炎絳州聞喜人也少補弘文生每遇休假諸生多出遊炎獨不廢業歲餘有司將薦舉辭以學未篤而止在館垂十載尤曉春秋左氏傳及漢書擢明經第尋為濮州司倉參軍纍歷兵部侍郎中書門下平章事侍中中書令永淳元年高宗幸東都留太子哲守京師命炎與劉仁軌薛元超為輔明年高宗不豫炎從太子赴東都侍疾十一月高宗疾篤命太子監國炎奉詔與黃門侍郎劉齊賢中書侍郎郭正一並於東宮平章事十二月丁巳高宗崩太子即位未聽政宰臣奏議天后降令於門下施行中宗既立欲以后父韋玄貞為侍中又欲與乳母子五品炎固爭以為不可中宗不悅謂左右曰我讓國與玄貞豈不得何為惜侍中耶炎懼乃與則天定策廢立炎與中書侍郎劉禕之羽林將軍程務挺張虔勗等勒兵入內宣太后令扶帝下殿帝曰我有何罪太后報曰汝欲將天下與韋玄貞何得無罪乃廢中宗為廬陵王立豫王旦為帝炎以定策功封河東縣侯太后臨朝天授初又降豫王為皇嗣時太后姪武承嗣請立武氏七廟及追王父祖太后將許之炎進諫曰皇太后天下之母聖德臨朝當存至公不宜追王祖禰以示自私且獨不見呂氏之敗乎臣恐後之視今亦猶今之視昔太后曰呂氏之王權在生人今者追尊事歸前代存歿殊迹豈可同日而言炎曰蔓草難圖漸不可長殷鑒未遠當絶其源太后不悅而止時韓王元嘉魯王靈夔等皆皇屬之近承嗣與從父弟三思屢勸太后因事誅之以絶宗室之望劉禕之韋仁約並懷畏憚唯唯無言炎獨固爭以為不可承嗣深憾之文明元年官名改易炎為內史秋徐敬業構逆太后召炎議事炎奏曰皇帝年長未俾親政乃致猾豎有詞若太后返政則此賊不討而解矣御史崔察聞而上言曰裴炎伏事先朝二十餘載受遺顧託大權在己若無異圖何故請太后歸政乃命御史大夫騫味道御史魚承曄鞫之鳳閣侍郎胡元範奏曰炎社稷忠臣有功於國悉心奉上天下所知臣明其不反右衛大將軍程務挺密表申理之文武之間證炎不反者甚衆太后皆不納光宅元年十月斬炎于都亭驛之前街炎初被擒左右勸炎遜詞於使者炎歎曰宰相下獄焉有更全之理竟無折節及籍沒其家乃無儋石之蓄胡元範申州義陽人坐救炎流死瓊州程務挺伏法納言劉齊賢貶吉州長史吏部侍郎郭待舉貶嶽州刺史皆坐救炎之罪也先是開耀元年十月定襄道行軍大總管裴行儉獻定襄所獲俘囚除曲赦外斬阿史那伏念溫傅等五十四人於都市初行儉討伐之時許伏念以不死伏念乃降時炎害行儉之功奏云伏念是程務挺張虔勗逼逐于營又磧北回紇南向逼之窘急而降乃殺之行儉歎曰渾濬之事古今恥之但恐殺降之後無復來者行儉因此稱疾不出炎致國家負義而殺降妬能害功構成陰禍其敗也宜哉睿宗踐祚下制曰飾終追遠斯乃舊章表德旌賢有光恆策故中書令裴炎含弘稟粹履信居貞望重國華才稱人秀唯幾成務績宣于代工偶居無猜義深於奉上文明之際王室多虞保乂朕躬實著誠節而危疑起釁倉卒罹災歲月屢遷兵封莫樹永言先正感悼良多宜追賁於九原俾增榮於萬古可贈益州大都督炎長子彥先後為太子舍人從子胄先後為工部尚書劉禕之常州晉陵人也祖興宗陳鄱陽王咨議參軍父子翼善吟諷有學行隋大業初歷祕書監河東柳顧言甚重之性不容非朋僚有短常面折之友人李伯藥常稱曰劉四雖復罵人人都不恨貞觀元年詔追入京以母老固辭太宗許其終養江南大使李襲譽嘉其至孝恆以米帛賚之因上表旌其門閭改所居為孝慈里母卒服竟徵拜吳王府功曹再遷著作郎弘文館直學士預修晉書加朝散大夫永徽初卒高宗遣使弔贈給靈輿還鄉有集二十卷禕之少與孟利貞高智周郭正一俱以文藻知名時人號為劉孟高郭尋與利貞等同直昭文館上元中遷左史弘文館直學士與著作郎元萬頃左史范履冰苗楚客右史周思茂韓楚賓等皆召入禁中共撰列女傳臣軌百僚新誡樂書凡千餘卷時又密令參決以分宰相之權時人謂之北門學士禕之兄懿之時為給事中兄弟並居兩省論者美之儀鳳二年轉朝議大夫中書侍郎兼豫王府司馬尋加中大夫禕之有姊在宮中為內職天后令省榮國夫人之疾禕之潛伺見之坐是配流巂州歷數載天后表請高宗召還拜中書舍人轉相王府司馬復遷檢校中書侍郎高宗謂曰相王朕之愛子以卿忠孝之門藉卿師範所冀蓬生麻中不扶自直耳禕之居家孝友甚為士族所稱每得俸祿散於親屬高宗以此重之則天臨朝甚見親委及豫王立禕之參預其謀擢拜中書侍郎同中書門下三品賜爵臨淮男時軍國多事所有詔敕獨出禕之構思敏速皆可立待及官名改易禕之為鳳閣侍郎同鳳閣鸞臺三品時有司門員外郎房先敏得罪左授衛州司馬詣宰相陳訴內史騫味道謂曰此乃皇太后處分也禕之謂先敏曰緣坐改官例從臣下奏請則天聞之以味道善則歸己過則推君貶青州刺史以禕之推善於君引過在己加授太中大夫賜物百段細馬一匹因謂侍臣曰夫為臣之體在揚君之德君德發揚豈非臣下之美事且君為元首臣作股肱情同休戚義均一體未聞以手足之疾移於腹背而得一體安者味道不存忠赤已從屏退禕之竭忠奉上情甚可嘉納言王德真對曰昔戴至德每有善事必推於君太后曰先朝每稱至德能有此事逮其終歿有制褒崇為臣之道豈過斯行傳名萬代可不善歟儀鳳中吐蕃為邊患高宗謂侍臣曰吐蕃小醜屢犯邊境我比務在安輯未即誅夷而戎狄豺狼不識恩造置之則疆埸日駭圖之則未聞上策宜論得失各盡所懷時劉景先郭正一皇甫文亮楊思徵薛元超各有所奏禕之時為中書舍人對曰臣觀自古明王聖主皆患夷狄吐蕃時擾邊隅有同禽獸得其土地不可攸居被其憑凌未足為恥願戢萬乘之威且寬百姓之役高宗嘉其言後禕之嘗竊謂鳳閣舍人賈大隱曰太后既能廢昏立明何用臨朝稱制不如返政以安天下之心大隱密奏其言則天不悅謂左右曰禕之我所引用乃有背我之心豈復顧我恩也垂拱三年或誣告禕之受歸誠州都督孫萬榮金兼與許敬宗妾有私則天特令肅州刺史王本立推鞫其事本立宣敕示禕之禕之曰不經鳳閣鸞臺何名為敕則天大怒以為拒捍制使乃賜死於家時年五十七初禕之既下獄睿宗為之抗疏申理禕之親友咸以為必見原宥竊賀之禕之曰吾必死矣太后臨朝獨斷威福任己皇帝上表徒使速吾禍也禕之在獄時嘗上疏自陳及臨終既洗沐而神色自若命其子執筆草謝表其子將絶殆不能書監刑者促之禕之乃自操數紙援筆立成詞理懇至見者無不傷痛時麟臺郎郭翰太子文學周思鈞共稱歎其文則天聞而惡之左遷翰為巫州司法思鈞為播州司倉睿宗即位以禕之宮府舊僚追贈中書令有集七十卷傳於時魏玄同定州鼓城人也舉進士纍轉司列大夫坐與上官儀文章屬和配流嶺外上元初赦還工部尚書劉審禮薦玄同有時務之才拜岐州長史纍遷至吏部侍郎玄同以既委選舉恐未盡得人之術乃上疏曰臣聞製器者必擇匠以簡材為國者必求賢以蒞官匠之不良無以成其工官之非賢無以致於理君者所以牧人也臣者所以佐君也君不養人失君道矣臣不輔君失臣任矣任人者誠國家之基本百姓之安危也方今人不加富盜賊不衰獄訟未清禮義猶闕者何也下吏不稱職庶官非其才也官之不得其才者取人之道有所未盡也臣又聞傅說曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以理人昔之邦國今之州縣土有常君人有定主自求臣佐各選英賢其大臣乃命於王朝耳秦並天下罷侯置守漢氏因之有沿有革諸侯得自置吏四百石以下其傅相大官則漢為置之州郡掾吏督郵從事悉任之於牧守爰自魏晉始歸吏部遞相祖襲以迄于今用刀筆以量才案簿書而察行法令之弊其來自久蓋君子重因循而憚改作有不得已者亦當運獨見之明定卓然之議如今選司所行者非上皇之令典乃近代之權道所宜遷革實為至要何以言之夫尺丈之量所及者蓋短鍾庾之器所積者寧多非其所及焉能度之非其所受何以容之況天下之大士人之衆而可委之數人之手乎假使平如權衡明如水鏡力有所極照有所窮銓綜既多紊失斯廣又以比居此任時有非人豈直愧彼清通昧於甄察亦將竭其庸妄糅彼棼絲情故既行何所不至贓私一啓以及萬端至乃為人擇官為身擇利顧親疏而下筆看勢要而措情悠悠風塵此焉奔競擾擾遊宦同乎市井加以厚貌深衷險如溪壑擇言觀行猶懼不周今使百行九能折之於一面具僚庶品專斷於一司不亦難矣且魏人應運所據者乃三分晉氏播遷所臨者非一統逮乎齊宋以及周隋戰爭之日多安泰之時少瓜分瓦裂各在一方隋氏平陳十餘年耳接以兵禍繼以饑饉既德業之不逮或時事所未遑非謂是今而非古也武德貞觀與今亦異皇運之初庶事草創豈唯日不暇給亦乃人物常稀天祚大聖享國永年比屋可封異人間出咸以為有道恥賤得時無怠諸色入流歲以千計羣司列位無復新加官有常員人無定限選集之始霧積雲屯擢於終十不收一淄澠雜混玉石難分用捨去留得失相半撫即事之為弊知及後之滋失夏殷已前制度多闕周監二代煥乎可覩蓋諸侯之臣不皆命於天子王朝庶官亦不專於一職故周穆王以伯冏為太僕正命之曰慎簡乃僚無以巧言令色便僻側媚唯吉士此則令其自擇下吏之文也太僕正中大夫耳尚以僚屬委之則三公九卿亦必然矣周禮太宰內史並掌爵祿廢置司徒司馬別掌興賢詔事當是分任於羣司而統之以數職各自求其小者而王命其大者焉夫委任責成君之體也所委者當所用者精故能得濟濟之多士盛芃芃之棫朴裴子野有言曰官人之難先王言之尚矣居家視其孝友鄉黨服其誠信出入觀其志義憂難取其智謀煩之以事以觀其能臨之以利以察其廉周禮始於學校論之州里告諸六事而後貢之王庭其在漢家尚猶然矣州郡積其功能然後為五府所辟五府舉其掾屬而升于朝三公參得除署尚書奏之天子一人之身所關者衆一士之進其謀也詳故官得其人鮮有敗事魏晉反是所失弘多子野所論蓋區區之宋朝耳猶謂不勝其弊而況于當今乎又夫從政蒞官不可以無學故書曰學古入官議事以制傳曰我聞學以從政不聞以政入學今貴戚子弟例早求官髫齔之年已腰銀艾或童丱之歲已襲朱紫弘文崇賢之生千牛輦腳之類課試既淺藝能亦薄而門閥有素資望自高夫象賢繼父古之道也所謂胄子必裁諸學修六禮以節其性明七教以興其德齊八政以防其淫舉上賢以崇德簡不肖以黜惡少則受業長而出仕並由德進必以才升然後可以利用賓王移家事國少仕則廢學輕試則無才於此一流良足惜也又勳官三衛流外之徒不待州縣之舉直取之於書判恐非先德而後言才之義也臣又以為國之用人有似人之用財貧者厭糟糠思短褐富者餘糧肉衣輕裘然則當衰弊乏賢之時則可磨策朽鈍而乘馭之在太平多士之日亦宜妙選髦俊而任使之詩云翹翹錯薪言刈其楚楚荊也在薪之翹翹者方之用才理亦當爾選人幸多尤宜簡練臣竊見制書每令三品五品薦士下至九品亦令舉人此聖朝側席旁求之意也但以褒貶不甚明得失無大隔故人上不憂黜責下不盡搜揚苟以應命莫慎所舉且惟賢知賢聖人篤論伊皋既舉不仁咸遠復患階秩雖同人才異等身且濫進鑒豈知人今欲務得實才兼宜擇其舉主流清以源潔影端由表正不詳舉主之行能而責舉人之庸濫不可得已漢書云張耳陳餘之賓客廝役皆天下俊傑彼之蕞爾猶能若斯況以神皇之聖明國家之德業而不建久長之策為無窮之基盡得賢取士之術而但顧望魏晉之遺風留意周隋之末事臣竊惑之伏願稍回聖慮時採芻言略依周漢之規以分吏部之選即望所用精詳鮮於差失疏奏不納弘道初轉文昌左丞兼地官尚書同中書門下三品則天臨朝遷太中大夫鸞臺侍郎依前知政事垂拱三年加銀青光祿大夫檢校納言封巨鹿男玄同素與裴炎結交能保終始時人呼為耐久朋而與酷吏周興不協永昌初為周興所構云玄同言太后老矣須復皇嗣太后聞之怒乃賜死於家監刑御史房濟謂玄同曰何不告事冀得召見當自陳訴玄同歎曰人殺鬼殺有何殊也豈能為告人事乎乃就刑年七十三子恬開元中為潁王傅李昭德京兆長安人也父乾祐貞觀初為殿中侍御史時有鄃令裴仁軌私役門夫太宗欲斬之乾祐奏曰法令者陛下制之於上率土尊之於下與天下共之非陛下獨有也仁軌犯輕罪而致極刑是乖畫一之理刑罰不中則人無所措手足臣忝憲司不敢奉制太宗意解仁軌竟免乾祐尋遷侍御史母卒廬於墓側負土成墳太宗遣使就墓弔之仍旌表其門後歷長安令治書御史皆有能名擢拜御史大夫乾祐與中書令褚遂良不協竟為遂良所構永徽初繼為邢魏等州刺史乾祐雖強直有器幹而昵於小人既典外郡與令史結友書疏往返令伺朝廷之事俄為友人所發坐流愛州乾封中起為桂州都督歷拜司刑太常伯舉京兆功曹參軍崔擢為尚書郎事既不果私以告擢後擢有犯乃告乾祐泄禁中語以贖罪乾祐復坐免官尋卒昭德即乾祐之孽子也強幹有父風少舉明經纍遷至鳳閣侍郎長壽二年增置夏官侍郎三員時選昭德與婁師德侯知一為之是歲又遷鳳閣鸞臺平章事尋加檢校內史長壽中神都改作文昌臺及定鼎上東諸門又城外郭皆昭德創其制度時人以為能初都城洛水天津之東立德坊西南隅有中橋及利涉橋以通行李上元中司農卿韋機始移中橋置于安衆坊之左街當長夏門都人甚以為便因廢利涉橋所省萬計然歲為洛水衝注常勞治葺昭德創意積石為腳鋭其前以分水勢自是竟無漂損時則天以武承嗣為文昌左相昭德密奏曰承嗣陛下之姪又是親王不宜更在機權以惑衆庶且自古帝王父子之間猶相篡奪況在姑姪豈得委權與之脫若乘便寶位寧可安乎則天瞿然曰我未之思也承嗣亦嘗返譖昭德則天曰自我任昭德每獲高臥是代我勞苦非汝所及也承嗣俄轉太子少保罷知政事延載初鳳閣舍人張嘉福令洛陽人王慶之率輕薄惡少數百人詣闕上表請立武承嗣為皇太子則天不許慶之固請不已則天令昭德詰責之令散昭德便杖殺慶之餘衆乃息昭德因奏曰臣聞文武之道布在方策豈有姪為天子而為姑立廟乎以親親言之則天皇是陛下夫也皇嗣是陛下子也陛下正合傳之子孫為萬代計況陛下承天皇顧託而有天下若立承嗣臣恐天皇不血食矣則天寤之乃止時朝廷諛佞者多獲進用故幸恩者事無大小但近諂諛皆獲進見有人於洛水中獲白石數點赤詣闕輒進諸宰相詰之對云此石赤心所以來進昭德叱之曰此石赤心洛水中餘石豈能盡反耶左右皆笑是時來俊臣侯思止等枉撓刑法誣陷忠良人皆懾懼昭德每廷奏其狀由是俊臣黨與少自摧屈來俊臣又嘗棄故妻而娶太原王慶詵女侯思止亦奏娶趙郡李自挹女敕政事堂共商量昭德撫掌謂諸宰相曰大可笑往年俊臣賊劫王慶詵女已大辱國今日此奴又請索李自挹女無乃復辱國耶尋奏寢之侯思止後竟為昭德所繩榜殺之既而昭德專權用事頗為朝野所惡前魯王府功曹參軍丘愔上疏言其罪狀曰臣聞百王之失皆由權歸於下宰臣持政常以勢盛為殃魏冉誅庶族以安秦非不忠也弱諸侯以強國亦有功也然以出入自專擊斷無忌威震人主不聞有王張祿一進深言卒用憂死向使昭王不即覺悟魏冉果以專權則秦之霸業或不傳其子孫陛下創業興王撥亂英主總權收柄司契握圖天授已前萬機獨斷發命皆中舉事無遺公卿百僚具職而已自長壽已來厭怠細政委任昭德使掌機權然其雖幹濟小才不堪軍國大用直以性好凌轢氣負剛強盲聾下人芻狗同列刻薄慶賞矯枉憲章國家所賴者微所妨者大天下杜口莫敢一言聲威翕赫日已熾盛臣近於南臺見敕目諸處奏事陛下已依昭德請不依陛下便不依如此改張不可勝數昭德參奉機密獻可替否事有便利不預咨謀要待畫旨將行方始別生駁異揚露專擅顯示於人歸美引愆義不如此州縣列位臺寺庶官入謁出辭望塵懾氣一切奏讞與奪事宜皆承旨意附會上言今有秩之吏多為昭德之人陛下勿謂昭德小心是我手臂臣觀其膽乃大於身鼻息所衝上拂雲漢近者新陷來張兩族兼挫侯王二仇鋒鋭更不可當方寸良難窺測書曰知人亦未易人亦未易知漢光武將寵龐萌可以託孤卒為戎首魏明帝期司馬懿以安國竟肆姦回夫小家治生有千百之資將以託人尚憂失授況兼天下之重而可輕忽委任者乎今昭德作福專威橫絶朝野愛憎與奪旁若無人陛下恩遇至深蔽過甚厚臣聞蟻穴壞堤針芒寫氣涓涓不絶必成江河履霜堅冰須防其漸權重一去收之極難臣又聞輕議近臣犯顏深諫明君聖主亦有不容臣熟知今日言之於前明日伏誅於後但使國安身死臣實不悔陛下深覽臣言為萬姓自愛時長上果毅鄧注又著碩論數千言備述昭德專權之狀鳳閣舍人逢弘敏遽奏其論則天乃惡昭德謂納言姚璹曰昭德身為內史備荷殊榮誠如所言實負於國延載初左遷欽州南賓尉數日又命免死配流尋又召拜監察御史時太僕少卿來俊臣與昭德素不協乃誣構昭德有逆謀因被下獄與來俊臣同日而誅是日大雨士庶莫不痛昭德而慶俊臣也相謂曰今日天雨可謂一悲一喜矣神龍中降制曰故李昭德勤恪在公強直自達立朝正色不吐剛以茹柔當軸勵詞必抗情以歷詆墉隍府寺樹績良多變更規模歿而不朽道淪福善業虧嫉惡名級不追風流將沫式旌壤樹光被幽明可贈左御史大夫德宗建中三年加贈司空史臣曰裴炎位居相輔時屬艱難歷覽前蹤非無忠節但見遲而慮淺又遭命以會時何者當是時高宗晏駕尚新武氏革命未見炎也唯慮中宗之過失是其淺也不見太后之苞藏是其遲也及乎承嗣請封祖禰三思勸殺宗親然後徒有諫章何嘗濟事是辜遺託豈痛伏誅時論則然遲淺須信況聞覩構逆則示其閒暇俾殺降則彰彼猜嫌小數有餘大度何足又其驗也禕之名父之子諒知其才著述頗精履歷無愧師範王府秉執相權咸有能名固愜羣議何乃失言於大隱取金於萬榮潛見內人私通嬖妾使濁跡玷其清譽淫行汙於貞名若言俗困濫刑公行誣告即又自昧周防之道人非盡戮之冤賜死於家猶為多幸臨終不撓抑又徒勞玄同富於詞學公任權衡當為典選之時備疏擇才之理但以高宗棄代之後則天居位之間革命是懷附己為愛苟一言之不順則赤族以難逃是以唐之名臣難忘中興之計周之酷吏常謀並進之讒玄同欲復皇儲固宜難免死而無過人殺何妨昭德強幹為臣機巧蒞事凡所制置動有規模武承嗣方持左相權將立為皇太子尋更所任復寢其謀咸由昭德之言能拒則天之旨又觀其誅侯思止法王慶之挫來俊臣致朋黨漸衰諛佞稍退又則天謂承嗣曰我任昭德每獲高臥代我勞苦非汝所及也此則強幹機巧之驗焉公忠之道亦在其中矣不然則何以致是哉若使昭德用謙御下以柔守剛不恃專權常能寡過則復皇嗣而非晚保臣節而必終蓋由道乏弘持器難苞貯純剛是失卷智不全所以丘愔抗陳鄧注深論瓦解而固難收拾風摧而豈易扶持自取誅夷人誰怨懟贊曰政無刑法時屬艱危裴炎之智慮淺見遲禕之履行貨色自欺昭德強猛何由不虧死無令譽孰謂非宜玄同不幸顛殞亦隨
