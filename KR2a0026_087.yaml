body:
  text: 舊唐書卷八十三列傳第三十三郭孝恪張儉蘇定方薛仁貴程務挺張士貴趙道興郭孝恪許州陽翟人也少有志節隋末率鄉曲數百人附於李密密大悅之謂曰昔稱汝潁多奇士故非謬也令與徐績守黎陽後密敗績令孝恪入朝送款封陽翟郡公拜宋州刺史令與徐績經營武牢已東所得州縣委以選補其後竇建德率衆來援王世充孝恪於青城宮進策於太宗曰世充日踧月迫力盡計窮懸首面縛翹足可待建德遠來助虐糧運阻絶此是天喪之時請固武牢屯軍泛水隨機應變則易為克殄太宗然其計及破建德平世充太宗於洛陽置酒高會諸將曰郭孝恪謀擒建德之策王長先龍門下米之功皆出諸人之右也歷遷貝趙江涇四州刺史所在有能名入為太府少卿轉左驍衛將軍貞觀十六年纍授金紫光祿大夫行安西都護西州刺史其地高昌舊都士流與流配及鎮兵雜處又限以沙磧與中國隔絶孝恪推誠撫御大獲其歡心初王師之滅高昌也制以高昌所虜焉耆生口七百盡還之焉耆王尋叛歸欲谷可汗朝貢稀至令孝恪伺其機便因表請擊之以孝恪為安西道行軍總管率步騎三千出銀山道以伐焉耆孝恪夜襲其城虜其王龍突騎支太宗大悅璽書勞之曰卿破焉耆虜其偽王功立威行深副所委但焉耆絶域地阻天山恃遠憑深敢懷叛逆卿望崇位重報效情深遠涉沙場龔行罰罪取其堅壁曾不崇朝再廓遊魂遂無遺寇緬思竭力必大艱辛超險成功深足嘉尚俄又以孝恪為崑丘道副大總管以討龜茲破其都城孝恪自留守之餘軍分道別進龜茲國相那利率衆遁逃孝恪以城外未賓乃出營於外有龜茲人來謂孝恪曰那利為相人心素歸今亡在野必思為變城中之人頗有異志公宜備之孝恪不以為虞那利等果率衆萬餘陰與城內降胡表𩹉為應孝恪失於警候賊將入城鼓譟孝恪始覺之乃率部下千餘人入城與賊合戰城中人復應那利攻孝恪孝恪力戰而入至其王所居旋復出戰於城門中流矢而死孝恪子待詔亦同死於陳賊竟退走將軍曹繼叔復拔其城太宗聞之初責孝恪不加警備以致顛覆後又憐之為其家舉哀高宗即位追贈安西都護陽翟郡公待詔贈遊擊將軍仍賻物三百段孝恪性奢侈僕妾器玩務極鮮華雖在軍中牀帳完具嘗以遺行軍大總管阿史那社爾社爾一無所受太宗聞之曰二將優劣之不同也郭孝恪今為寇虜所屠可謂自貽伊咎耳次子待封高宗時官至左豹韜衛將軍咸亨中與薛仁貴率兵討吐蕃於大非川戰敗減死除名少子待聘長安中官至宋州刺史張儉雍州新豐人隋相州刺史皖城公威之孫也父植車騎將軍連城縣公儉即高祖之從甥也貞觀初以軍功纍遷朔州刺史時頡利可汗自恃強盛每有所求輒遣書稱敕緣邊諸州遞相承稟及儉至遂拒不受太宗聞而嘉之儉又廣營屯田歲致穀十萬斛邊糧益饒及遭霜旱勸百姓相贍遂免飢餒州境獨安後檢校勝州都督以母憂去職儉前在朔州屬李靖平突厥之後有思結部落貧窮離散儉招慰安集之其不來者或居磧北既親屬分住私相往還儉並不拘責但存綱紀羈縻而已及儉移任州司謂其將叛遽以奏聞朝廷議發兵進討仍起儉為使就觀動靜儉單馬推誠入其部落召諸首領布以腹心咸匍匐啓顙而至便移就代州即令檢校代州都督儉遂勸其營田每年豐熟慮其私畜富實易生驕侈表請和糴擬充貯備蕃人嘉悅邊軍大收其利遷營州都督兼護東夷校尉太宗將征遼東遣儉率蕃兵先行抄掠儉軍至遼西為遼水泛漲久而未渡太宗以為畏懦召還儉詣洛陽謁見面陳利害因説水草好惡山川險易太宗甚悅仍拜行軍總管兼領諸蕃騎卒為六軍前鋒時有獲高麗候者稱莫離支將至遼東詔儉率兵自新城路邀擊之莫離支竟不敢出儉因進兵渡遼趨建安城賊徒大潰斬首數千級以功纍封皖城郡公賞賜甚厚其後改東夷校尉為東夷都護仍以儉為之永徽初加金紫光祿大夫四年卒於官年六十諡曰密儉兄大師纍以軍功仕至太僕卿華州刺史武功縣男儉弟延師永徽初纍授左衛大將軍封范陽郡公延師廉謹周慎典羽林屯兵前後三十餘年未嘗有過朝廷以此稱之龍朔三年卒官贈荊州都督諡曰敬陪葬昭陵唐制三品已上門列棨戟儉兄弟三院門皆立戟時人榮之號為三戟張家蘇定方冀州武邑人也父雍大業末率鄉閭數千人為本郡討賊定方驍悍多力膽氣絶倫年十餘歲隨父討捕先登陷陳父卒郡守又令定方領兵破賊首張金稱于郡南手斬金稱又破楊公卿于郡西追奔二十餘里殺獲甚衆鄉黨賴之後仕竇建德建德將高雅賢甚愛之養以為子雅賢俄又為劉黑闥攻陷城邑定方每有戰功及黑闥雅賢死定方歸鄉里貞觀初為匡道府折衝隨李靖襲突厥頡利于磧口靖使定方率二百騎為前鋒乘霧而行去賊一里許忽然霧歇望見其牙帳馳掩殺數十百人頡利及隋公主狼狽散走餘衆俯伏靖軍既至遂悉降之軍還授左武候中郎將永徽中轉左衛勳一府中郎將從左衛大將軍程知節征賀魯為前軍總管至鷹娑川突厥有二萬騎來拒總管蘇海政與戰互有前卻既而突厥別部鼠尼施等又領二萬餘騎續至定方正歇馬隔一小嶺去知節十許里望見塵起率五百騎馳往擊之賊衆大潰追奔二十里殺千五百餘人獲馬二千匹死馬及所棄甲仗綿亙山野不可勝計副大總管王文度害其功謂知節曰雖云破賊官軍亦有死傷蓋決成敗法耳何為此事自今正可結為方陳輜重並納腹中四面布隊人馬被甲賊來即戰自保萬全無為輕脫致有傷損又矯稱別奉聖旨以知節恃勇輕敵使文度為其節制遂收軍不許深入終日跨馬被甲結陳由是馬多瘦死士卒疲勞無有戰志定方謂知節曰本來討賊今乃自守馬餓兵疲逢賊即敗怯懦如此何功可立又公為大將閫外之事不許自專別遣軍副專其號令理必不然須囚縶文度飛表奏之知節不從至恆篤城有胡降附文度又曰比我兵回彼還作賊不如盡殺取其資財定方曰如此自作賊耳何成伐叛文度不從及分財唯定方一無所取師還文度坐處死後得除名明年擢定方為行軍大總管又征賀魯以任雅相回紇婆潤為副自金山之北指處木昆部落大破之其俟斤懶獨祿以衆萬餘帳來降定方撫之發其千騎進至突騎施部賀魯率胡祿屋闕啜懾舍提𥋆啜鼠尼施處半啜處木昆屈律啜五弩失畢兵馬衆且十萬來拒官軍定方率回紇及漢兵萬餘人擊之賊輕定方兵少四面圍之定方令步卒據原攢矟外向親領漢騎陳於北原賊先擊步軍三衝不入定方乘勢擊之賊遂大潰追奔三十里殺人馬數萬明日整兵復進於是胡祿屋等五弩失畢悉衆來降賀魯獨與處木昆屈律啜數百騎西走餘五咄六聞賀魯敗各向南道降于步真於是西蕃悉定唯賀魯及嘻運率其牙內餘衆而奔定方追之復大戰於伊麗水上殺獲略盡賀魯及嘻運十餘騎逼夜亡走定方遣副將蕭嗣業追捕之至於石國擒之而還高宗臨軒定方戎服操賀魯以獻列其地為州縣極於西海定方以功遷左驍衛大將軍封邢國公又封子慶節為武邑縣公俄有思結闕俟斤都曼先鎮諸胡擁其所部及疏勒朱俱般蔥嶺三國復叛詔定方為安撫大使率兵討之至葉葉水而賊保馬頭川於是選精卒一萬人馬三千匹馳掩襲之一日一夜行三百里詰朝至城西十里都曼大驚率兵拒戰於城門之外賊師敗績退保馬保城王師進屯其門入夜諸軍漸至四面圍之伐木為攻具布列城下都曼自知不免面縛開門出降俘還至東都高宗御乾陽殿定方操都曼特勤獻之蔥嶺以西悉定以功加食邢州巨鹿真邑五百戶顯慶五年從幸太原制授熊津道大總管率師討百濟定方自城山濟海至熊津江口賊屯兵據江定方升東岸乘山而陳與之大戰揚帆蓋海相續而至賊師敗績死者數千人自餘奔散遇潮且上連舳入江定方於岸上擁陳水陸齊進飛楫鼓譟直趣真都去城二十許里賊傾國來拒大戰破之殺虜萬餘人追奔入郭其王義慈及太子隆奔于北境定方進圍其城義慈次子泰自立為王嫡孫文思曰王與太子雖並出城而身見在叔總兵馬即擅為王假令漢兵退我父子當不全矣遂率其左右投城而下百姓從之泰不能止定方命卒登城建幟於是泰開門頓顙其大將禰植又將義慈來降太子隆并與諸城主皆同送款百濟悉平分其地為六州俘義慈及隆泰等獻于東都定方前後滅三國皆生擒其主賞賜珍寶不可勝計仍拜其子慶節為尚輦奉御定方俄遷左武衛大將軍乾封二年卒年七十六高宗聞而傷惜謂侍臣曰蘇定方於國有功例合褒贈卿等不言遂使哀榮未及興言及此不覺嗟悼遽下詔贈幽州都督諡曰莊薛仁貴絳州龍門人貞觀末太宗親征遼東仁貴謁將軍張士貴應募請從行至安地有郎將劉君昂為賊所圍甚急仁貴往救之躍馬徑前手斬賊將懸其頭於馬鞍賊皆懾伏仁貴遂知名及大軍攻安地城高麗莫離支遣將高延壽高惠真率兵二十五萬來拒戰依山結營太宗分命諸將四面擊之仁貴自恃驍勇欲立奇功乃異其服色著白衣握戟腰鞬張弓大呼先入所向無前賊盡披靡卻走大軍乘之賊乃大潰太宗遙望見之遣馳問先鋒白衣者為誰特引見賜馬兩匹絹四十匹擢授遊擊將軍雲泉府果毅仍令北門長上并賜生口十人及軍還太宗謂曰朕舊將並老不堪受閫外之寄每欲抽擢驍雄莫如卿者朕不喜得遼東喜得卿也尋遷右領軍郎將依舊北門長上永徽五年高宗幸萬年宮甲夜山水猥至衝突玄武門宿衛者散走仁貴曰安有天子有急輒敢懼死遂登門桄叫呼以驚宮內高宗遽出乘高俄而水入寢殿上使謂仁貴曰賴得卿呼方免淪溺始知有忠臣也於是賜御馬一匹蘇定方之討賀魯也於是仁貴上疏曰臣聞兵出無名事故不成明其為賊敵乃可伏今泥熟仗素幹不伏賀魯為賊所破虜其妻子漢兵有於賀魯諸部落得泥熟等家口將充賤者宜括取送還仍加賜賚即是矜其枉破使百姓知賀魯是賊知陛下德澤廣及也高宗然其言使括泥熟家口送還之於是泥熟等請隨軍效其死節顯慶二年詔仁貴副程名振於遼東經略破高麗於貴端城斬首三千級明年又與梁建方契苾何力於遼東共高麗大將溫沙門戰於橫山仁貴匹馬先入莫不應弦而倒高麗有善射者於石城下射殺十餘人仁貴單騎直往衝之其賊弓矢俱失手不能舉便生擒之俄又與辛文陵破契丹於黑山擒契丹王阿卜固及諸首領赴東都以功封河東縣男尋又領兵擊九姓突厥於天山將行高宗內出甲令仁貴試之上曰古之善射有穿七札者卿且射五重仁貴射而洞之高宗大驚更取堅甲以賜之時九姓有衆十餘萬令驍健數十人逆來挑戰仁貴發三矢射殺三人自餘一時下馬請降仁貴恐為後患並坑殺之更就磧北安撫餘衆擒其偽葉護兄弟三人而還軍中歌曰將軍三箭定天山戰士長歌入漢關九姓自此衰弱不復更為邊患乾封初高麗大將泉男生率衆內附高宗遣將軍龐同善高侃等迎接之男生弟男建率國人逆擊同善等詔仁貴統兵為後援同善等至新城夜為賊所襲仁貴領驍勇赴救斬首數百級同善等又進至金山為賊所敗高麗乘勝而進仁貴橫擊之賊衆大敗斬首五萬餘級遂拔其南蘇木底蒼巖等三城始與男生相會高宗手敕勞之曰金山大陳凶黨實繁卿身先士卒奮不顧命左衝右擊所向無前諸軍賈勇致斯克捷宜善建功業全此令名也仁貴乘勝領二千人進攻扶餘城諸將咸言兵少仁貴曰在主將善用耳不在多也遂先鋒而行賊衆來拒逆擊大破之殺獲萬餘人遂拔扶餘城扶餘川四十餘城乘風震懾一時送款仁貴便並海略地與李績大會軍于平壤城高麗既降詔仁貴率兵二萬人與劉仁軌於平壤留守仍授右威衛大將軍封平陽郡公兼檢校安東都護移理新城撫恤孤老有幹能者隨才任使忠孝節義咸加旌表高麗士衆莫不欣然慕化咸亨元年吐蕃入寇又以仁貴為邏娑道行軍大總管率將軍阿史那道真郭待封等以擊之待封嘗為鄯城鎮守恥在仁貴之下多違節度軍至大非川將發赴烏海仁貴謂待封曰烏海險遠車行艱澀若引輜重將失事機破賊即回又煩轉運彼多瘴氣無宜久留大非嶺上足堪置柵可留二萬人作兩柵輜重等並留柵內吾等輕鋭倍道掩其未整即撲滅之矣仁貴遂率先行至河口遇賊擊破之斬獲略盡收其牛羊萬餘頭回至烏海城以待後援待封遂不從仁貴之命領輜重繼進比至烏海吐蕃二十餘萬悉衆來救邀擊待封敗走趨山軍糧及輜重並為賊所掠仁貴遂退軍屯於大非川吐蕃又益衆四十餘萬來拒戰官軍大敗仁貴遂與吐蕃大將論欽陵約和仁貴歎曰今年歲在庚午軍行逆歲鄧艾所以死於蜀吾知所以敗也仁貴坐除名尋而高麗衆相率復叛詔起仁貴為雞林道總管以經略之上元中坐事徙象州會赦歸高宗思其功開耀元年復召見謂曰往九成宮遭水無卿已為魚矣卿又北伐九姓東擊高麗漠北遼東咸遵聲教者並卿之力也卿雖有過豈可相忘有人云卿烏海城下自不擊賊致使失利朕所恨者唯此事耳今西邊不靜瓜沙路絶卿豈可高枕鄉邑不為朕指揮耶於是起授瓜州長史尋拜右領軍衛將軍檢校代州都督又率兵擊突厥元珍等於雲州斬首萬餘級獲生口二萬餘人駝馬牛羊三萬餘頭賊聞仁貴復起為將素憚其名皆奔散不敢當之其年仁貴病卒年七十贈左驍衛將軍官造靈輿并家口給傳還鄉子訥別有傳程務挺洺州平恩人也父名振大業末仕竇建德為普樂令甚有能名諸賊不敢犯其境尋棄建德歸國高祖遙授永年令仍令率兵經略河北名振夜襲鄴縣俘其男女千餘人以歸去鄴八十里閲婦人有乳汁者九十餘人悉放遣之鄴人感其仁恕為之設齋以報其恩及建德敗始之任俄而劉黑闥陷洺州名振復與刺史陳君賓自拔歸朝母潘妻李在路為賊所掠沒於黑闥名振又從太宗討黑闥時黑闥於冀貝滄瀛等州水陸運糧以拒官軍名振率千餘人邀擊之盡毀其舟車黑闥聞之大怒遂殺名振母妻及黑闥平名振請手斬黑闥以其首祭母名振以功拜營州都督府長史封東平郡公賜物二千段黃金三百兩纍轉洺州刺史太宗將征遼東召名振問以經略之事名振初對失旨太宗動色詰之名振酬對逾辨太宗意解謂左右曰房玄齡常在我前每見別嗔餘人猶顏色無主名振生平不見我向來責讓而詞理縱橫亦奇士也即日拜右驍衛將軍授平壤道行軍總管前後攻沙卑城破獨山陳皆以少擊衆稱為名將永徽六年纍除營州都督兼東夷都護又率兵破高麗於貴端水焚其新城殺獲甚衆後歷晉蒲二州刺史龍朔二年卒贈右衛大將軍諡曰烈務挺少隨父征討以勇力聞遷右領軍衛中郎將永隆中突厥史伏念反叛定襄道行軍總管李文暕曹懷舜竇義昭等相次戰敗又詔禮部尚書裴行儉率兵討之務挺為副將仍檢校豐州都督時伏念屯於金牙山務挺與副總管唐玄表引兵先逼之伏念懼不能支遂間道降於行儉許伏念以不死中書令裴炎以伏念懼務挺等兵勢而降非行儉之功伏念遂伏誅務挺以功遷右衛將軍封平原郡公永淳二年綏州城平縣人白鐵余率部落稽之黨據縣城反偽稱尊號署百官又進寇綏德殺掠人吏焚燒村落詔務挺與夏州都督王方翼討之務挺進攻其城拔之生擒白鐵余盡平其餘黨又以功拜左驍衛大將軍檢校左羽林軍嗣聖初與右領軍大將軍檢校右羽林軍張虔勗同受則天密旨帥兵入殿庭廢中宗為廬陸王立豫王為皇帝則天臨朝纍受賞賜特拜其子齊之為尚乘奉御務挺泣請回授其弟則天嘉之下制褒美乃拜其弟原州司馬務忠為太子洗馬文明年以務挺為左武衛大將軍單于道安撫大使督軍以禦突厥務挺善於綏禦威信大行偏裨已下無不盡力突厥甚憚之相率遁走不敢近邊及裴炎下獄務挺密表申理之由是忤旨務挺素與唐之奇杜求仁友善或構言務挺與裴炎徐敬業皆潛相應接則天遣左鷹揚將軍裴紹業就軍斬之籍沒其家突厥聞務挺死所在宴樂相慶仍為務挺立祠每出師攻戰即祈禱焉貞觀永徽間軍將又有張士貴趙道興狀迹可録張士貴者虢州盧氏人也本名忽善騎射膂力過人大業末聚衆為盜攻剽城邑遠近患之號為忽賊高祖降書招懷之士貴以所統送款拜右光祿大夫纍有戰功賜爵新野縣公從平東都授虢州刺史高祖謂之曰欲卿衣錦晝遊耳尋入為右武候將軍貞觀七年破反獠而還太宗勞之曰聞公親當矢石為士卒先雖古名將何以加也朕嘗聞以身報國者不顧性命但聞其語未聞其實於公見之矣後纍遷左領軍大將軍改封虢國公顯慶初卒贈荊州都督陪葬昭陵趙道興者甘州酒泉人隋右武候大將軍才之子也道興貞觀初歷遷左武候中郎將明間宿衛號為稱職太宗嘗謂之曰卿父為隋武候將軍甚有當官之譽卿今克傳弓冶可謂不墜家聲因授右武候將軍賜爵天水縣子其父時廨宇仍舊不改時人以為榮道興嘗自指其廳事曰此是趙才將軍廳還使趙才將軍兒坐為朝野所笑傳為口實儀鳳中纍遷左金吾衛大將軍文明年以老病致仕於家子畑亦為金吾將軍凡三代執金吾為時所稱史臣曰孝恪機鈐果毅協草昧之際樹勳建策有傑世之風然而務奢為恆既未盡善舉衆失律不其惑與張公經略有天然才度務穡勸分董和成績惜哉中壽其才未盡邢國公神略翕張雄謀戡定輔平屯難始終成業疏封陟位未暢茂典蓋闕如也仁貴驍悍壯勇為一時之傑至忠大略勃然有立噫待封不協以敗全略孔子曰可與立未可與權上加明命竟致立功知臣者君信哉務挺勇力驍果固有父風英概輔時克繼洪烈然而苟預廢立竟陷讒構古之言曰惡之來也如火之燎于原不可嚮邇其是之謂乎士貴道興逢時立效得盡義勇以觀厥成而繼父風概三代執金不亦美乎贊曰五將雄雄俱立邊功張蘇二族功名始終郭薛務挺徼功奮命垂則窮邊兵無常勝
