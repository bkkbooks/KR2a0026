body:
  text: 舊唐書卷二十三志第三禮儀三封禪之禮自漢光武之後曠世不修隋開皇十四年晉王廣率百官抗表固請封禪文帝令牛弘辛彥之許善心等創定儀注至十五年行幸兗州遂於太山之下為壇設祭如南郊之禮竟不升山而還貞觀六年平突厥年穀屢登羣臣上言請封泰山太宗曰議者以封禪為大典如朕本心但使天下太平家給人足雖闕封禪之禮亦可比德堯舜若百姓不足夷狄內侵縱修封禪之儀亦何異於桀紂昔秦始皇自謂德洽天心自稱皇帝登封岱宗奢侈自矜漢文帝竟不登封而躬行儉約刑措不用今皆稱始皇為暴虐之主漢文為有德之君以此而言無假封禪禮云至敬不壇掃地而祭足表至誠何必遠登高山封數尺之土也侍中王圭對曰陛下發德音明封禪本末非愚臣之所及祕書監魏徵曰隋末大亂黎民遇陛下始有生望養之則至仁勞之則未可升中之禮須備千乘萬騎供帳之費動役數州戶口蕭條何以能給太宗深嘉徵言而中外章表不已上問禮官兩漢封山儀注因遣中書侍郎杜正倫行太山上七十二帝壇迹是年兩河水潦其事乃寢至十一年羣臣復勸封山始議其禮於是國子博士劉伯莊睦州刺史徐令言等各上封祀之事互設疑議所見不同多言新禮中封禪儀注簡略未周太宗敕祕書少監顏思古諫議大夫朱子奢等與四方名儒博物之士參議得失議者數十家遞相駁難紛紜久不決於是左僕射房玄齡特進魏徵中書令楊師道博採衆議堪行用而與舊禮不同者奏之其議昊天上帝壇曰將封先祭義在告神且備謁敬之儀方展慶成之禮固當於壇下址預申齊潔贊饗已畢然後登封既表重慎之深兼示行事有漸今請祭於泰山下設壇以祀上帝以景皇帝配享壇長一十二丈高一丈二尺又議制玉牒曰金玉重寶質性貞堅宗祀郊禋皆充器幣豈嫌華美實貴精確況乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉檢式韞靈奇傳之無窮永存不朽今請玉牒長一尺三寸廣厚各五寸玉檢厚二寸長短闊狹一如玉牒其印齒請隨璽大小仍纏以金繩五周又議玉策曰封禪之祭嚴配作主皆奠玉策肅奉虔誠今玉策四枚各長一尺三寸廣一寸五分厚五分每策五簡俱以金編其一奠上帝一奠太祖座一奠皇地祇一奠高祖座又議金匱曰登配之策盛以金匱歸格藝祖之廟室今請長短令容玉策高廣各六寸形制如今之表函纏以金繩封以金泥印以受命璽又議方石再纍曰舊藏玉牒止用石函亦猶盛書篋笥所以或呼石篋今請方石三枚以為再纍其十枚石檢刻方石四邊而立之纏以金繩封以石泥印以受命璽又議泰山上圜壇曰四出開道壇場通義南面入升於事為允今請介丘上圓壇廣五丈高九尺用五色土加之四面各設一階御位在壇南升自南階而就上封玉牒又議圓壇上土封曰凡言封者皆是積土之名利建分封亦以班社立號謂之封禪厥義可知今請於圜壇之上安置方石璽緘既畢加土築以為封高一丈二尺而廣二丈以五色土益封玉牒藏於其內祀禪之土其封制亦同此又議玉璽曰謹詳前載方石緘封玉檢金泥必資印璽以為祕固今請依令用受命璽以封石檢其玉檢既與石檢大小不同請更造璽一枚方一寸二分文同受命璽以封玉牒石檢形制依漢建武故事又議立碑曰勒石紀號顯揚功業登封降禪肆覲之壇立碑紀之又議設告至壇曰既至山下禮行告至柴于東方上帝望秩遍禮羣神今請其壇方八十一尺高三尺陛仍四出其禪方壇及餘儀式請從今禮仍請柴祭望秩同時行事又議廢石闕及大小距石曰距石之設意取牢固本資實用豈云雕飾今既積土厚封足與天長地久其小距環壇石闕回建事非經誥無益禮義煩而非要請從減省太宗從其議仍令附之於禮十五年下詔將有事於泰山復令公卿諸儒詳定儀注太常卿韋挺禮部侍郎令狐德棻為封禪使參考其議時論者又執異見顏師古上書申明前議太宗覽其奏多依師古所陳為定車駕至洛陽宮會有彗星之變乃下詔罷其事高宗即位公卿數請封禪則天既立為皇后又密贊之麟德二年二月車駕發京東巡狩詔禮官博士撰定封禪儀注有司於乾封元年正月戊辰朔先是有司齊戒於前祀七日平旦太尉誓百官於行從中臺云來月一日封祀二日登封泰山三日禪社首各揚其職不供其事國有常刑上齊於行宮四日致齊三日近侍之官應從升者及從事羣官諸方客使各本司公館清齊一宿前祀一日諸衛令其屬未後一刻設黃麾半仗於外壝之外與樂工人俱清齊一宿有司於太嶽南四里為圓壇三成十二階如圓丘之制壇上飾以青四面各依方色并造燎壇及壝三重又造玉策三枚皆以金繩連編玉簡為之每簡長一尺二寸廣一寸二分厚三分刻玉填金為字又為玉匱一以藏正座玉策長一尺三寸并玉檢方五寸當繩處刻為五道當封璽處刻深二分方一寸二分又為金匱二以藏配座玉策制度如玉匱又為黃金繩以纏金玉匱各五周為金泥玉匱金匱為玉璽一枚方一寸二分文同受命璽封玉匱金匱又為石叟以藏玉匱用方石再纍各方五尺厚一尺刻方石中令容玉匱叟旁施檢處皆刻深三寸三分闊一尺當繩處皆刻深三分闊一寸五分為石檢十枚以檢石叟皆長三尺闊一尺厚七寸皆刻為印齒三道深四寸當封璽處方五寸當通繩處闊一寸五分皆有小石蓋制與檢刻處相應以檢擫封泥其檢立於叟旁南方北方各三東方西方各二去叟隅皆七寸又為金繩以纏石叟各五周徑三分為石泥以泥石叟其泥末石和方色土為之為距石十二枚分距叟隅皆再纍各闊二尺長一丈斜刻其首令與叟隅相應泰山之上設登封之壇上徑五丈高九尺四出陛壇上飾以青四面依方色一壝隨地之宜其玉牒玉匱石叟石檢距石皆如封祀之制又為降禪壇於社首山上方壇八隅一成八陛如方丘之制壇上飾以黃四面依方色三壝隨地之宜其玉策玉匱石叟石檢距石等亦同封祀之制至其年十二月車駕至山下及有司進奏儀注封祀以高祖太宗同配禪社首以太穆皇后文德皇后同配皆以公卿充亞獻終獻之禮於是皇后抗表曰伏尋登封之禮遠邁古先而降禪之儀竊為未允其祭地祇之日以太后昭配至於行事皆以公卿以妾愚誠恐未周備何者乾坤定位剛柔之義已殊經義載陳中外之儀斯別瑤壇作配既合於方祇玉豆薦芳實歸於內職況推尊先后親饗瓊筵豈有外命宰臣內參禋祭詳於至理有紊徽章但禮節之源雖興於昔典而升降之制尚缺於遙圖且往代封嶽雖云顯號或因時省俗意在尋仙或以情覬名事深為己豈如化被乎四表推美於神宗道冠乎二儀歸功於先德寧可仍遵舊軌靡創彝章妾謬處椒闈叨居蘭掖但以職惟中饋道屬於蒸嘗義切奉先理光於蘋藻罔極之思載結於因心祗肅之懷實深於明祀但妾早乖定省已闕侍於晨昏今屬崇禋豈敢安於帷帟是故馳情夕寢眷嬴里而翹魂疊慮宵興仰梁郊而聳念伏望展禮之日總率六宮內外命婦以親奉奠冀申如在之敬式展虔拜之儀積此微誠已淹氣序既屬鑾輿將警奠璧非輒效丹心庶裨大禮冀聖朝垂則永播於芳規螢燭末光增輝於日月於是祭地祇梁甫皆以皇后為亞獻諸王大妃為終獻丙辰前羅文府果毅李敬貞論封禪須明水實樽淮南子云方諸見月則津而為水高誘注云方諸陰燧大蛤也熟摩拭令熱以向月則水生以銅盤受之下數石王充論衡云陽燧取火於日方諸取水於月相去甚遠而火至水來者氣感之驗也漢舊儀云八月飲酎車駕夕牲以鑑諸取水於月以陽燧取火於日周禮考工記云金有六齊金錫半謂之鑑燧之齊鄭玄注云鑑燧取水火於日月之器也準鄭此注則水火之器皆以金錫為之今司宰有陽燧形如圓鏡以取明火陰鑑形如方鏡以取明水但比年祠祭皆用陽燧取火應時得以陰鑑取水未有得者常用井水替明水之處奉敕令禮司研究敬貞因說先儒是非言及明水乃云周禮金錫相半自是造陽燧法鄭玄錯解以為陰鑑之制依古取明水法合用方諸引淮南子等書用大蛤也又稱敬貞曾八九月中取蛤一尺二寸者依法試之自人定至夜半得水四五斗奉常奏曰封禪祭祀即須明水實樽敬貞所陳檢有故實又稱先經試驗確執望請差敬貞自取蚌蛤便赴太山與所司對試是日制曰古今典制文質不同至於制度隨世代沿革唯祀天地獨不改張斯乃自處於厚奉天以薄又今封禪即用玉牒金繩器物之間復有瓦樽秸席一時行禮文質頓乖駁而不倫深為未愜其封祀降禪所設上帝后土位先設秸瓦甒瓢杯等物並宜改用裀褥罍爵每事從文其諸郊祀亦宜準此於是昊天上帝之座褥以蒼皇地祇褥以黃配帝及后褥以紫五方上帝及大明夜明席皆以方色內官已下席皆以莞三年正月帝親享昊天上帝于山下封祀之壇如圓丘之儀祭訖親封玉策置石叟聚五色土封之圓徑一丈二尺高九尺其日帝率侍臣已下升泰山翌日就山上登封之壇封玉策訖復還山下之齊宮其明日親祀皇地祇於社首山上降禪之壇如方丘之儀皇后為亞獻越國太妃燕氏為終獻翌日上御朝覲壇以朝羣臣如元日之儀禮畢宴文武百僚大赦改元初上親享于降禪之壇行初獻之禮畢執事者皆趨而下宦者執帷皇后率六宮以升行禮帷帟皆以錦繡為之百僚在位瞻望或竊議焉於是詔立登封降禪朝覲之碑各於壇所又詔名封祀壇為舞鶴臺介丘壇為萬歲臺降禪壇為景雲臺以紀當時所見之瑞焉高宗既封泰山之後又欲遍封五嶽至永淳元年於洛州嵩山之南置崇陽縣其年七月敕其所造奉天宮二年正月駕幸奉天宮至七月下詔將以其年十一月封禪於嵩嶽詔國子司業李行偉考工員外郎賈大隱太常博士韋叔夏裴守貞輔抱素等詳定儀注於是議立封祀壇如圓丘之制上飾以玄四面依方色為圓壇三成高二丈四尺每等高六尺壇上徑一十六步三等各闊四步設十二陛陛皆上闊八尺下闊一丈四尺為三重壝距外壝三十步內壝距五十步燎壇在壇東南外壝之內高三尺方一丈五尺南出陛登封壇圓徑五丈高九尺四出陛為一壝飾以五色準封祀禪祭壇上飾以金四面依方色為八角方壇再成高一丈二尺每等高四尺壇上方十六步每等廣四步設八陛其上壇陛皆廣八尺中等陛皆廣一丈下等陛皆廣一丈二尺為三重壝之大小準封祀為埋坎在壇之未地外壝之內方深取足容物南出陛朝覲壇於行宮之前為壇宮方三分壝二在南壇方二十四丈高九尺南面兩陛餘三面各一陛封祀登封五色土封石叟為圓封上徑一丈二尺下徑三丈高九尺禪祭五色土封為八角方封大小準封祀制度所用尺寸準歷東封並用古尺諸壇並築土為之禮無用石之文並度影以定方位登封降禪四出陛各當四方之中陛各上廣七尺下廣一丈二尺封祀玉帛料有蒼璧四圭有邸圭璧禪祭有黃琮兩圭有邸無圭璧又定登封降禪朝覲等日準禮冬至祭天於圜丘其封祀請用十二日準東封祀故事十二日登封十三日禪祭十四日朝覲若有故須改登封已下期日在禮無妨又輦輿料云封祀登封皇帝出乘玉輅還乘金輅皇太子往還金輅禪祭皇帝太子如封祀又衣服料云東封祠祭日天皇服衮冕近奉制依貞觀禮服大裘又云衮冕服一具齊服之通天冠服一具回服之翼善冠服一具馬上服之皇太子衮冕服又齊則服遠遊冠受朝則公服遠遊冠服馬上則進德冠服當時又令詳求射牛之禮行偉守貞等議曰據周禮及國語郊祀天地天子自射其牲漢武唯封太山令侍中儒者射牛行事至於餘祀亦無射牲之文但親舂射牲雖是古禮久從廢省據封禪禮祀日未明十五刻宰人以鑾刀割牲質明而行事比鑾駕至時牢牲總畢天皇唯奠玉酌獻而已今若祀前一日射牲事即傷早祀日方始射牲事又傷晚若依漢武故事即非親射之儀事不可行詔從之尋屬高宗不豫遂罷封禪之禮則天證聖元年將有事於嵩山先遣使致祭以祈福助下制號嵩山為神嶽尊嵩山神為天中王夫人為靈妃嵩山舊有夏啓及啓母少室阿姨神廟咸令預祈祭至天冊萬歲二年臘月甲申親行登封之禮禮畢便大赦改元萬歲登封改嵩陽縣為登封縣陽成縣為告成縣粵三日丁亥禪于少室山又二日己丑御朝覲壇朝羣臣咸如乾封之儀則天以封禪日為嵩嶽神祇所祐遂尊神嶽天中王為神嶽天中皇帝靈妃為天中皇后夏后啓為齊聖皇帝封啓母神為玉京太后少室阿姨神為金闕夫人王子晉為升仙太子別為立廟登封壇南有槲樹大赦日於其杪置金雞樹則天自制升中述志碑樹於壇之丙地玄宗開元十二年文武百僚朝集使皇親及四方文學之士皆以理化升平時穀屢稔上書請修封禪之禮并獻賦頌者前後千有餘篇玄宗謙沖不許中書令張說又纍日固請乃下制曰自古受命而王者曷嘗不封泰山禪梁父答厚德告成功三代之前罔不由此越自魏晉以迄周隋帝典闕而大道隱王綱弛而舊章缺千載寂寥封崇莫嗣物極而復天祚我唐武文二后應圖受籙洎于高宗重光纍盛承至理登介丘懷百神震六合紹殷周之統接虞夏之風中宗弘懿鑠之休睿宗沐粹精之道巍巍蕩蕩無得而稱者也朕昔戡多難稟略先朝虔奉慈旨嗣膺丕業是用創九廟以申孝敬禮二郊以展嚴禋寶菽粟於水火捐珠玉於山谷兢兢業業非敢追美前王日慎一日實以奉遵遺訓至於巡狩大典封禪鴻名顧惟寡薄未遑時邁十四載于茲矣今百穀有年五材無眚刑罰不用禮義興行和氣氤氳淳風淡泊蠻夷戎狄殊方異類重譯而至者日月於闕廷奇獸神禽甘露嘉醴窮祥極瑞朝夕於林王公卿士罄乃誠於中鴻生碩儒獻其書於外莫不以神祇合契億兆同心斯皆烈祖聖考垂裕餘慶故朕賴宗廟之介福敢以眇身顓其克讓是以敬奉羣議弘此大猷以光我高祖之丕圖以紹我高祖之鴻烈永言陟配追感載深可以開元十三年十一月十日式遵故實有事太山所司與公卿諸儒詳擇典禮預為備具勿廣勞人務存節約以稱朕意於是詔中書令張說右散騎常侍徐堅太常少卿韋縚祕書少監康子元國子博士侯行果等與禮官於集賢書院刊撰儀注玄宗初以靈山好靜不欲喧繁與宰臣及侍講學士對議用山下封祀之儀於是張說謂徐堅韋縚等曰乾封舊儀禪社首享皇地祇以先后配饗王者父天而母地當今皇母位亦當往帝之母也子配母饗亦有何嫌而以皇后配地祇非古之制也天監孔明福善如響乾封之禮文德皇后配皇地祇天后為亞獻越國太妃為終獻宮闈接神有乖舊典上玄不祐遂有天授易姓之事宗社中圮公族誅滅皆由此也景龍之季有事圓丘韋氏為亞獻皆以婦人升壇執籩豆泄黷穹蒼享祀不潔未及踰年國有內難終獻皆受其咎掌座齊郎及女人執祭者多亦夭卒今主上尊天敬神事資革正斯禮以睿宗大聖貞皇帝配皇地祇侑神作主乃定議奏聞上從之舊禮郊祀既畢收取玉帛牲體置於柴上然後燔於燎壇之上其壇於神壇之左顯慶中禮部尚書許敬宗等因修改舊禮乃奏曰謹按祭祀之禮周人尚臭祭天則燔柴祭地則瘞血宗廟則焫蕭灌鬯皆貴氣臭同以降神禮經明白義釋甚詳委柴在祭神之初理無所惑是以三禮義宗等並云祭天以燔柴為始然後行正祭祭地以瘞血為先然後行正祭又禮論說太常賀循上言積柴舊在壇南燎祭天之牲用犢左胖漢儀用頭今郊用脅之九個太宰令奉牲脅太祝令奉圭璧俱奠燎薪之上此即晉氏故事亦無祭末之文既云漢儀用牲頭頭非神俎之物且祭末俎皆升右胖之脅唯有三禮賀循既云用祭天之牲左胖復云今儀用脅九個足明燔柴所用與升俎不同是知自在祭初別燔牲體非於祭末燒神餘饌此則晉氏以前仍遵古禮唯周魏以降妄為損益緣告廟之幣事畢瘞埋因改燔柴將為祭末事無典實禮闕降神又燔柴正祭牲玉皆別蒼璧蒼犢之流柴之所用四圭騂犢之屬祀之所須故郊天之有四圭猶祀廟之有圭瓚是以周官典瑞文勢相因並事畢收藏不在燔例而今新禮引用蒼璧不顧圭瓚遂亦俱燔義既有乖理難因襲又燔柴作樂俱以降神則處置之宜須相依準柴燔在左作樂在南求之禮情實為不類且禮論說積柴之處在神壇之南新禮以為壇左文無典故請改燔為祭始位樂懸之南外壝之內其陰祀瘞埋亦請準此制可之自是郊丘諸祀並先焚而後祭及玄宗將作封禪之禮張說等參定儀注徐堅康子元等建議曰臣等謹按顯慶年修禮官長孫無忌等奏改燔柴在祭前狀稱祭祀之禮必先降神周人尚臭祭天則燔柴者臣等按禮迎神之義樂六變則天神降八變則地祇出九變則鬼神可得而禮矣則降神以樂周禮正文非謂燔柴以降神也案尚臭之義不為燔之先後假如周人尚臭祭天則燔柴容或燔臭先以迎神然則殷人尚聲祭天亦燔柴何聲可燔先迎神乎又按顯慶中無忌等奏稱晉氏之前猶遵古禮周魏以降妄為損益者今按郭璞晉南郊賦及注爾雅祭後方燔又按宋志所論亦祭後方燔又檢南齊北齊及梁郊祀亦飲福酒後方燔又檢後周及隋郊祀亦先祭後燔據此即周遵後燔晉不先燎無忌之事義乃相乖又按周禮大宗伯職以玉作六器以禮天地四方注云禮為始告神時薦於神座也下文云以蒼璧禮天以黃琮禮地皆有牲幣各如其器之色又禮器云有以少為貴者祭天特牲是知蒼璧之與蒼牲俱各奠之神座理節不惑又云四圭有邸以祀天旅上帝即明祀昊天上帝之時以旅五方天帝明矣其青圭赤璋白琥玄璜自是立春立夏立秋立冬之日各於其方迎氣所用自分別矣今按顯慶所改新禮以蒼璧與蒼牲蒼幣俱用先燔蒼璧既已燔矣所以遂加四圭有邸奠之神座蒼牲既已燔矣所以更加騂牲充其實俎混昊天於五帝同用四圭失特牲之明文加為二犢深乖禮意事乃無憑考功員外郎趙冬曦太學博士侯行果曰先焚者本以降神行之已久若從祭義後焚為定中書令張說執奏曰徐堅等所議燔柴前後議有不同據祭義及貞觀顯慶已後既先燔若欲正失禮求祭義請從貞觀禮如且因循不改更請從顯慶禮凡祭者本以心為主心至則通於天地達於神祇既有先燔後燎自可於聖意聖意所至則通於神明燔之先後臣等不敢裁定玄宗令依後燔及先奠之儀是後太常卿寧王憲奏請郊壇時祭並依此先奠璧而後燔柴瘞埋制從之時又有四門助教施敬本駁奏舊封禪禮八條其略曰舊禮侍中跪取匜沃盥非禮也夫盥手洗爵人君將致潔而尊神故能使小臣為之今侍中大臣也而沃盥於人君太祝小臣也乃詔祝於天神是接天神以小臣奉人君以大臣故非禮按周禮大宗伯曰鬱人下士二人贊祼事則沃盥此職也漢承秦制無鬱人之職故使近臣為之魏晉至今因而不改然則漢禮侍中行之則可矣今以侍中為之則非也漢侍中其始也微高帝時籍孺為之惠帝時閎孺為之留侯子辟強年十五為之至後漢樓堅以議郎拜侍中邵闔自侍中遷步兵校尉秩千石少府卿之屬也少府卿秩中二千石丞秩千石侍中與少府丞班同魏代蘇則為之舊侍中親省起居故謂之執獸子吉茂見謂之曰仕進不止執獸子是言其為褻臣也今侍中名則古官人非昔任掌同燮理寄實鹽梅非復漢魏執獸子之班異乎同禮鬱人之職行舟不息墜劍方遙驗刻而求可謂謬矣夫祝以傳命通主人之意以薦於神明非賤職也故兩君相見則卿為上儐況天人之際其肅恭之禮以兩君為喻不亦大乎今太祝下士也非所以重命而尊神之義也然則周漢太祝是禮矣何者按周禮大宗伯曰太祝下大夫二人上士四人掌六祝之辭大宗伯為上卿今禮部尚書太常卿比也小宗伯中大夫今侍郎少卿比也太祝下大夫今郎中太常丞比也上士四人今員外郎太常博士之比也故可以處天人之際致尊極之辭矣又漢太祝令秩六百石與太常博士同班梁太祝令與南臺御史同班今太祝下士之卑而居下大夫之職斯又刻舟之論不異於前矣又曰舊禮謁者引太尉升壇亞獻非禮也謁者已賤升壇已重是微者用之於古而大體實變之於今也按漢官儀尚書御史臺官屬有謁者僕射一人秩六百石銅印青綬謁者三十五人以郎中滿歲稱給事未滿歲稱灌謁者又按漢書百官公卿表光祿勳官屬有郎中員外秩比二千石有謁者掌賓讚受事員七十人秩比六百石古之謁者秩異等今謁者班微以之從事可謂疏矣又曰舊禮尚書令奉玉牒今無令遊宴後宮以宦者一人出入帝命改為中書謁者令至成帝罷宦者用士人魏黃初改祕書置中書監令舊尚書並掌制誥既置中書官而制誥樞密皆掌焉則自魏以來中書是漢朝尚書之職今尚書令奉玉牒是用漢禮其官既闕故可以中書令主之議奏玄宗令張說徐堅召敬本與之對議詳定說等奏曰敬本所議其中四條先已改定有不同者望臨時量事改攝制從之十三年十一月丙戌至泰山去山趾五里西去社首山三里丁亥玄宗服衮冕於行宮致齊於供帳前殿己丑日南至大備法駕至山下玄宗御馬而登侍臣從先是玄宗以靈山清潔不欲多人上欲初獻於山上壇行事亞獻終獻於山下壇行事因召禮官學士賀知章等入講儀注因問之知章等奏曰昊天上帝君位五方時帝臣位帝號雖同而君臣異位陛下享君位於山上羣臣祀臣位於山下誠足以垂範來葉為變禮之大者也禮成於三初獻亞終合於一處玄宗曰朕正欲如是故問卿耳於是敕三獻於山上行事其五方帝及諸神座於山下壇行事玄宗因問玉牒之文前代帝王何故祕之知章對曰玉牒本是通於神明之意前代帝王所求各異或禱年算或思神仙其事微密是故莫知之玄宗曰朕今此行皆為蒼生祈福更無祕請宜將玉牒出示百僚使知朕意其辭曰有唐嗣天子臣某敢昭告于昊天上帝天啓李氏運興土德高祖太宗受命立極高宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武底綏內難推戴聖父恭承大寶十有三年敬若天意四海晏然封祀岱嶽謝成于天子孫百祿蒼生受福庚寅祀昊天上帝于山上封臺之前壇高祖神堯皇帝配享焉邠王守禮亞獻寧王憲終獻皇帝飲福酒癸巳中書令張說進稱天賜皇帝太一神策周而復始永綏兆人帝拜稽首山上作圓臺四階謂之封壇臺上有方石再纍謂之石叟玉牒玉策刻玉填金為字各盛以玉匱束以金繩封以金泥皇帝以受命寶印之納二玉匱於叟中金泥叟際以天下同文之印封之壇東南為燎壇積柴其上皇帝就望燎位火發羣臣稱萬歲傳呼下山下聲動天地山下壇祀羣臣行事已畢皇帝未離位命中書門下曰朕以薄德恭膺大寶今封祀初建雲物休祐皆是卿等輔弼之力君臣相保勉副天心長如今日不敢矜怠中書令張說跪言聖心誠懇宿齊山上昨夜則息風收雨今朝則天清日暖復有祥風助樂卿雲引燎靈迹盛事千古未聞陛下又思慎終如初長福萬姓天下幸甚先是車駕至嶽西來蘇頓有大風從東北來自午至夕裂幕折柱衆恐張說倡言曰此必是海神來迎也及至嶽下天地清晏玄宗登山日氣和煦至齊次日入後徑風偃人寒氣切骨玄宗因不食次前露立至夜半仰天稱某身有過請即降罰若萬人無福亦請某為當罪兵馬辛苦乞停風寒應時風止山氣溫暖時從山上布兵至于山壇傳呼辰刻及詔命來往斯須而達夜中燃火相屬山下望之有如連星自地屬天其日平明山上清迥下望山下休氣四塞登歌奏樂有祥風自南而至絲竹之聲飄若天外及行事日揚火光慶雲紛郁遍滿天際羣臣並集于社首山帷宮之次以候鑾駕遙望紫煙憧憧上達內外歡譟玄宗自山上便赴社首齊次辰巳間至日色明朗慶雲不散百辟及蕃夷爭前迎賀辛卯享皇地祇于社首之泰折壇睿宗大聖貞皇帝配祀五色雲見日重輪藏玉策於石叟如封壇之儀壬辰玄宗御朝覲之帳殿大備陳布文武百僚二王後孔子後諸方朝集使嶽牧舉賢良及儒生文士上賦頌者戎狄夷蠻羌胡朝獻之國突厥頡利發契丹奚等王大食謝五天十姓崑崙日本新羅靺鞨之侍子及使內臣之番高麗朝鮮王百濟帶方王十姓摩阿史那興昔可汗三十姓左右賢王日南西竺鑿齒雕題牂柯烏滸之酋長咸在位制曰朕聞天監唯后后克奉天既合德以受命亦推功而復始厥初作者七十二君道洽跡著時至符出皆用事于介丘升中於上帝人神之望蓋有以塞之皇王之序可得而言朕接統千歲承光五葉惟祖宗之德在人惟天地之靈作主往者內難幽贊而集大勳間無外虞守成而纘舊服未嘗不乾乾終日思與公卿大夫上下協心聿求至理以弘我烈聖其庶乎馨香今九有大寧羣氓樂業時必敬授而不奪物亦順成而無夭懋建皇極幸致太和洎乃幽遐率由感被戎狄不至唯文告而來庭麟鳳已臻將覺情而在藪以故凡百執事亟言大封顧惟不德切欲勿議伏以先聖儲祉與天同功荷傳符以在今敢侑神而無報大篇斯在朕何讓焉遂奉遵高宗之舊章憲乾封之令典時邁東土柴告岱嶽精意上達肸蠁來應信宿行事雲物呈祥登降之禮斯畢嚴配之誠獲展百神羣望莫不懷柔四方諸侯莫不來慶斯是天下之介福邦家之耿光也無窮之休祉豈獨在豫非常之惠澤亦宜逮下可大赦天下封泰山神為天齊王禮秩加三公一等仍令所管崇飾祠廟環山十里禁其樵採給近山二十戶復以奉祠神玄宗製紀太山銘御書勒于山頂石壁之上其辭曰朕宅帝位十有四載顧惟不德懵于至道任夫難任安夫難安茲朕未知獲戾于上下心之浩蕩若涉大川賴上帝垂休先后儲慶宰相庶尹交修皇極四海會同五典敷暢歲云嘉熟人用大和百辟僉謀唱余封禪謂孝莫大於嚴父禮莫盛于告天天符既至人望既積固請不已固辭不獲肆余與夫二三臣稽虞典繹漢制張皇六師震讋九宇旌旗有列士馬無譁肅肅雍雍翼翼溶溶以至岱宗順也爾雅曰泰山為東嶽周官曰兗州之鎮山實萬物之始故稱岱焉其位居五嶽之伯故稱宗焉自昔王者受命易姓於是乎啓天地薦成功序圖録紀氏號朕統承先王茲率厥典實欲報玄天之眷命為蒼生而祈福豈敢高視千古自比九皇哉故設壇場於山下受羣方之助祭躬封燎於山上冀一獻之通神斯亦因高崇天就廣增地之義也乃仲冬庚寅有事東嶽類于上帝配我高祖在天之神罔不畢降粵翌日禪於社首佑我聖考祀於皇祇在地之神罔不咸舉暨壬辰覲羣后上公進曰天子膺天符納介福羣臣拜稽首呼萬歲慶合歡同乃陳誡以德大渾協度彝倫攸三事百揆時乃之功萬物由庚兆人允植列牧衆宰時乃之功一二兄弟篤行孝友錫類萬國時唯休哉我儒制禮我史作樂天地擾順時唯休哉蠻夷戎狄重譯來貢纍聖之化朕何慕焉五靈百寶日來月集會昌之運朕何惑焉凡今而後警乃在位一王度齊象法權舊章補缺政存易簡去煩苛思立人極乃見天則於戲天生蒸人惟后時乂能以美利利天下事天明矣地德載物惟后時相能以厚生生萬人事地察矣天地明察鬼神著矣惟我藝祖父考精爽在天其曰懿爾幼孫克享上帝惟帝時若馨香其下丕乃曰有唐氏文武之曾孫隆基誕錫新命纘我舊業永保天祿子孫其承之余小子敢對揚上帝之休命則亦與百執事尚綏兆人將多于前功而毖彼後患一夫不獲萬方其罪豫一心有終上天其知我朕惟寶行三德曰慈儉謙慈者覆無疆之言儉者崇將來之訓自滿者人損自謙者天益苟如是則軌迹易循基構易守磨石璧刻金石冀後人之聽辭而見心觀末而知本銘曰維天生人立君以理維君受命奉天為子代去不留人來無已德涼者滅道高斯起赫赫高祖明明太宗爰革隋政奄有萬邦罄天張宇盡地開封武稱有截文表時雍高宗稽古德施周溥茫茫九夷削平一鼓禮備封禪功齊舜禹巖巍岱宗衛我神主中宗紹運舊邦惟新睿宗繼明天下歸仁恭己南面氤氳化淳告成之禮留諸後人緬余小子重基五聖匪功伐高匪德矜盛欽若祀典丕承永命至誠動天福我萬姓古封太山七十二君或禪亭亭或禪云云其迹不見其名可聞祗遹文祖光昭舊勳方士虛誕儒書不足佚后求仙誣神檢玉秦災風雨漢汙編録德未合天或承之辱道在觀政名非從欲銘心絶巖播告羣嶽於是中書令張說撰封祀壇頌侍中源乾曜撰社首壇頌禮部尚書蘇頲撰朝覲壇頌以紀德玄宗乙酉歲生以華嶽當本命先天二年七月正位八月癸丑封華嶽神為金天王開元十年因幸東都又於華嶽祠前立碑高五十餘尺又於嶽上置道士觀修功德至天寶九載又將封禪於華嶽命御史大夫王鉷開鑿險路以設壇場會祠堂災而止
