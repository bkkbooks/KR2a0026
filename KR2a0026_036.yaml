body:
  text: 舊唐書卷三十二志第十二曆一太古聖人體二氣之權輿賾三才之物象乃創紀以窮其數畫卦以通其變而紀有大衍之法卦有推策之文由是曆法生焉殷人用九疇五紀之書周禮載馮相保章之職所以辨三辰之躔次察九野之吉凶歷代疇人迭相傳授蓋推步之成法協用之舊章暨秦氏焚書遺文殘缺漢興作者師法多門雖同徵鍾律之文共演蓍龜之説而建元或異積蔀相懸旁取證於春秋強乩疑於繫象靡不揚眉抵掌謂甘石未稱日官運策播精言裨梓不知天道及至清臺視祲黃道考祥言縮則盈少中多否否則矯云差算中則自負知時章亥不生憑何質證高齊天保中六月日當蝕朔文宣先期問候官蝕何時張孟賓言蝕申鄭元偉董峻言蝕辰宋景業言蝕巳是日蝕於申酉之間言皆不中時景業造天保曆則疏密可知矣昔鄧平洛下閎造漢太初曆非之者十七家後劉洪蔡伯喈何承天祖沖之皆數術之精粹者至於宣考曆書之際猶為橫議所排斯道寂寥知音蓋寡所以張胄玄佩印而沸騰劉孝孫輿棺而慟哭俾諸後學益用為疑以臣折衷無如舊法高祖受隋禪傅仁均首陳七事言戊寅歲時正得上元之首宜定新曆以符禪代由是造戊寅曆祖孝孫李淳風立理駁之仁均條答甚詳故法行於貞觀之世高宗時太史奏舊曆加時寖差宜有改定乃詔李淳風造麟德曆初隋末劉焯造皇極曆其道不行淳風約之為法時稱精密天后時瞿曇羅造光宅曆中宗時南宮説造景龍曆皆舊法之所棄者復取用之徒云革易寧造深微尋亦不行開元中僧一行精諸家曆法言麟德曆行用既久晷緯漸差宰相張説言之玄宗召見令造新曆遂與星官梁令瓚先造黃道遊儀圖考校七曜行度準周易大衍之數別成一法行用垂五十年肅宗時韓穎造至德曆代宗時郭獻之造五紀曆德宗時徐承嗣造正元曆憲宗時徐昂造觀象曆其法今存而元紀蔀章之數或異前經而察斂啓閉之期何殊舊法至論徵驗罕及研精綿代流行示存經法耳前史取傅仁均李淳風南宮説一行四家曆經為曆志四卷近代精數者皆以淳風一行之法歷千古而無差後人更之要立異耳無踰其精密也景龍曆不經行用世以為非今略而不載但取戊寅麟德大衍三曆法以備此志示於疇官爾戊寅曆經已上闕文日自入立秋初日加四千八十分後日減七十六分置初日所加之分計後日減之數以減之訖餘以行分法約之為日數及加平見日及分滿行分法又去之從日一為定見日及分後皆放此畢於秋分自入寒露日減一百二十七分減若不足即一日加行分法反減之為定見日及分後皆放此畢於立冬自入小雪畢於大雪均減八日初見去日十四度熒惑平見入冬至初日減一萬六千三百五十四分後日減五百四十五分畢於小寒自入大寒日加四百二十六分畢於啓蟄自入雨水畢於穀雨均加二十九日入立夏初日加一萬九千三百九十二分後日減二百一十三分畢於大暑自入立秋依平自入處暑日減一百八十四分畢於立冬自入小雪畢於大雪均減二十五日初見去日十七度鎮星平見入冬至初日減四千八百一十四分後日加七十九分畢於氣盡自入小寒畢於大寒均減九日入立春均減八日入啓蟄均減七日入雨水均減六日入春分均減五日入清明均減四日入穀雨畢芒種均減三日入夏至畢十日內均減二日十日外入小暑畢五日內均減一日五日外畢於氣盡依平自入大暑日加一百八十一分畢於立秋自入處暑均加九日自入白露初日加六千二分後日減一百三十三分畢於寒露自入霜降日減七十九分畢於大雪初見去日十七度太白晨平見入冬至依平自入小寒日加六十六分畢於大寒自入立春畢於立夏均加三日自入小滿初日加一千九百六十四分後日減六十六分畢於芒種自入夏至依平自入小暑減六十分畢於大暑自入立秋畢於立冬均減三日自入小雪初日減一千九百六十四分後日減六十六分畢大寒夕平見入冬至日減一百分畢於立春自入啓蟄畢於春分均減九日自入清明初日減五千九百八十六分後日減一百分畢於小滿自入芒種依平自入夏至日加一百分畢於立秋自入處暑畢於秋分均加九日自入寒露初日加五千九百八十六分後日減一百分畢於小雪自入大雪依平初見去日十一度辰星晨平見入冬至均減四日自入小寒畢於大寒依平自入立春畢啓蟄減三日其在啓蟄氣內去日一十八度外四十度內晨無木土金一星已上者不見也自入雨水畢於立夏應見不見其在立夏氣內去日度如前晨有木火土金一星已上者亦見之自入小滿畢於寒露依平自入霜降畢於立冬加一日自入小雪畢於大雪十二日依平若在大雪十三日即減一日在十四日減二日在十五日減三日在十六日減四日夕平見入冬至畢於清明依平自入穀雨畢於芒種減二日自入夏至畢於大暑依平自入立秋畢於霜降應見不見其在立秋及霜降二氣之內夕有星去日如前晨者亦見自入立冬畢於大雪依平初見去日十七度行五星法各置星定見之前夜半日所在宿度算及分各以定見去朔日算及一分加之小分滿法十四分從行分一行分滿法六百七十六分從度一又以星初見去日度數晨減夕加之命度以次即星初見所在度及分自此已後皆棄此小分也求次日術各加一日所行度及分其火金之行而有小分者各以日率為母小分滿其母去從行分一行分滿法去從度一其行有益疾遲者副置一日行分各以其分疾益遲損乃加之留者因前退則減之伏不注度順行出斗去其分行入斗先加分訖皆以二十六副行分為度分歲星初見順日行一百七十六分五十秒日益遲一分一百一十四日行十九度二百九分而留二十八日乃退日九十七分八十四日退十二度五十分又留二十六日五百九十六小分七四分即以初定見日分而加之若滿行分法即去之從月去之從一日乃順初日行六十分日益疾一分一百十四日行十九度四百三十七分而伏熒惑初見入冬至初率二百四十一日行一百六十三度已後二日損日及度各一盡一百二十八日率一百七十七日行九十九度畢一百六十一日皆同已後三日損日及度各一盡一百八十二日率一百七十日行九十二度畢一百八十八日皆同已後三日益日及度各一盡二百二十七日率一百八十三日行一百五度已後二日益日及度各一盡二百四十九日率一百九十四日行一百一十六度已後一日益日及度各一盡三百一十日率二百五十五日行一百七十七度畢三百三十七日皆同已後二日損盡三百六十五日復二百四十一日行一百六十三度初見入小寒已後三日去日率一畢於啓蟄自入雨水畢於立夏均去日率二十自入小滿初去日率二十以次三日去十九日日去十八以次三日去一日畢於小暑即依平為定日之率若入處暑畢於秋分皆去度率六各依冬至後日數而損益之又依所入之氣以減之名為前疾日數及度數之率若初行入大寒畢於大暑皆差行日益遲一分其餘皆平行若入白露畢於秋分初日行半度四十日行二十度即去日率四十度率二十別為半度之行訖然後求平行之分以續之平行分者置定行度率以分法乘之以定日率除之所得即平行一日之分不盡為小分求差行者置日率之數減一訖又半之加平行一日之分為初日行分各盡其日度而遲初日行三百二十六分日益遲一分半六十日行二十五度五分其前疾去度六者此遲初日加六十七分小分三十六小分滿六十去之從行分一即六十日行三十一度分同而留十二日前去日分日於二留奇後從後留乃退日一百九十二分六十日退十七度二十八分又留十二日六百二十六分小分三十分亦如初定見之分滿去如前又順後遲初日行二百三十八分日益疾一分半六十日行二十五度三十五分此遲在立秋至秋分者加一日行六十七小分三十六滿去如前即六十日行三十一度分同也而後疾入冬至初率二百一十四日行一百三十六度已後一日損日及度各一盡三十七日率一百七十七日行九十九度已後二日損日及度各一盡五十七日率一百六十七日行八十九度畢七十九日皆同已後三日益日及度各一盡一百三十日率一百八十四日行一百六十度已後二日益日及度各一盡一百四十四日率一百九十一日行一百一十三度已後一日益日及度各一盡一百九十日率二百三十七日行一百五十九度已後一日益日及度各一盡二百一十日率二百六十七日行一百八十九度畢二百五十九日皆同已後二日損日及度各一盡三百六十五日復率二百一十四行一百三十六度後遲加六度者此後疾去度率六為定度各依冬至後日數而損益之為後疾日及度之率若入立夏於夏至日行半度盡六十日行三十度若入小暑於大暑盡四十日行二十度皆去日及度之率別為半度之行訖然後求平行之分以續之各盡其日度而伏鎮星初見順日行六十分八十三日行七度二百四十八分而留三十八日乃退日四十一分一百日退六度四十四分又留三十七日六十一分小分四亦以初定見日分加之滿去如前乃順日行六十分八十三日行七度二百四十八分而伏太白晨初見乃退日一度半十日退十五度而留九日乃順遲差行先遲日益疾八分四十日行三十度若此遲入大雪已後畢於小滿即依此為定而求行分自入芒種十日減一度為定度畢於夏至自入小暑畢於霜降均減三度自入立冬初日減三度後十日減一度畢於霜降小雪皆為定度求一日行分者以行分法乘定度以四十餘之為平分不盡為小分又以四乘三十九以減平分為初日行分平行日一度十五日行十五度若此平行入小寒後十日益日及度各一畢於啓蟄自入雨水之氣皆二十一日行二十一度自入春分後十日減一畢於立夏即十五日自入處暑畢於寒露即無此平行自入霜降即四日益一畢於大雪後十五日行十五度疾百七十日行二百四度前順遲減度者計所減之數以益此度為定度求一日行度及分者以百七十日減度數餘行以分法乘以百七十餘之所得為之日平行度分晨伏東方夕初見順疾百七十日行二百畢於立夏依此順疾入冬至已後畢於立夏依此率為定自入小滿六日加一度自入大暑初畢於芒種自入夏至畢於小暑均五度自入大暑初加五度後三日減一度畢於氣盡自入立秋畢於大雪還依本率從白露畢春分皆差行先疾日益遲一分半自入清明畢於處暑並平行同晨疾求差行者半一百六十九乃以一分半乘之以加平行分為初日行度分也平行日一度十五日行十五度此平行入冬至後十日減日及度各一畢於立春自入啓蟄畢於芒種皆均九日行九度自入夏至後五日益一畢於小暑自入大暑畢於氣盡皆十五日行十五度自入立秋後六日一畢於小雪自入大雪畢於氣盡皆十五日行十五度者也順遲差行先疾日益遲八分四十日行三十度前加度者此依數減之求一日行分如晨遲準減者為加之又留九日乃退日半度十日退五度而夕伏西方辰星晨初見留六日順遲日行一百六十九分四日行一度若初見入大寒畢於啓蟄之內即不須此遲行平行日一度十日行十度此平行若入大寒已後二日去日及度各一畢於二十日日及度俱盡即無此平行疾日行一度六百九十分十日行十九度六分前無遲行者此疾日減二百三分十日行十七度四分晨伏東方夕初見順疾日行一度六百九分十日行十九度六分此疾者入小暑畢於處暑之內日減二百三分十日行十六度四分平行日一度十日行十度此平行若入大暑已後於二日去日及度各一畢於二十日日及度俱盡即無此平行遲日行一百六十九分四日行一度若疾減二百三分者即不須此遲行又留六日九分夕伏西方推交會交會法一千二百七十四萬一千二百五分交分法六百三十七萬六百二十九分朔差一百八萬五千四百九十二分望分六百九十一萬三千三百五十分交限五百八十二萬七千八百五十八分望差五十四萬二千七百四十七一分外限六百七十六萬七百八十二九分中限一千二百三十五萬一千二十五八分內限一千二百一十九萬八千四百五十八七分交時法二萬九千一十八推交分術置入上元已來積月以交會法去之餘以朔差乘之滿交會法又去之仁均本術武德年加交差七百七十五萬五千一百六十四分餘為所求年天正朔入平交分求望平交分術以望分加之滿去如前為平分次月平分術其朔望入冬至氣內依平為定若入小寒已後日加氣差一千六百五十分畢於立春自入啓蟄畢於清明均加七萬六千一百分後日減一千六百五十分畢於小滿置初日所加之分計後日減之數以減之餘以加平交分自入芒種畢於夏至依平為定加之滿交會法即去餘為定交分其朔入災交若入小寒畢於雨水及立夏畢於小滿值盈二時已下皆半氣差而加之二時已上皆不加其朔入時交分如望差分已下外限已上有星伏木土去見十日外火去見四十日外金星伏去見二十二日外有一星者不加氣差其朔望入小暑已後日減氣差一千二百分畢於處暑自入白露畢於霜降均減九萬五千八百二十分自入立冬初日減六萬三千三百分後日減二千一百一十分畢於小雪置初日所減之分計後日減之數以減之餘以減平交分也自入大雪亦依平為定減若不足者加交會法乃減之餘為定交分其朔入交分如交限內限已上交分中限已下有星伏如前者不減氣差推道在內外及先後去交術其定交分不滿交分法者為在外道滿去之餘為在內道其餘如望差已下即是去先交分以時法約之得一為去先交時數交限已上即以減交分法餘為去後交分亦以時法約之為時數望則月蝕也其朔在內道者朔則日蝕或雖在內道去交而遠在外道去交而近亦為蝕也推月蝕加時術置有蝕之望定小餘若入曆一日即減二百八十入十五日即加之若入十四日即加五百五十入二十八日即減之自入諸日值盈皆加二百八十值縮皆減之為定餘乃以十二乘之以時法六千五百三除之所得為半辰之數命以子半起算外即所在辰初命子半以一算自後皆以二算為一辰不盡為時餘若時餘在辰半之前者乃倍之如法無所得為辰初又以三因之如法得一名為強若得強若得二強即名少弱若倍之如法得一為少凡四分一為少二為半三為太不盡者又三之如法得一名為強若得二強者即名為半弱若時餘在辰半之後者亦倍之如法無所得為正在辰半以三因之如法得二名為強即名半強若得二強即名太弱若倍之如法得一為太不盡者又三之如法得一為強即名太強若得者又二強者為辰末亦可前辰名之月在衝上蝕日出後入前各一時半外不注蝕推日蝕加時術置有蝕之朔定小餘若入曆一日即減三百入十五日即加之若入十四日即加五百五十入二十八日即減之以為定自後不入四時加減之限春三月內道去交四時已上入曆值盈加二百八十值縮反減之夏三月內道值盈加二百八十值縮反減之秋三月內道去交十一時已下值盈加二百八十值縮不加十一時已上值盈加五百五十值縮不加一百八十冬三月內道去交五時已下值盈加二百八十縮不加皆為定餘乃以十二乘之以時法除之所得半辰之數命以子半起算外即所在辰命辰如前法不盡為時餘別置為副若入仲辰半前即以副減法餘為差率若在半後即退其半辰還以法加餘即以副為差率若入季辰半前即以法加副而為差率若在半後即其半辰還以法加餘乃倍法以加副而為差率若入孟辰半前即三因其法而以副減之餘為差率若半後即退其半辰還以法加餘又以法加副乃三因其法而以副減之為差率又置去交時數三已下加三六已下加二九已下加一九已上依數十二以上從十二以乘差率若在季辰半後孟辰半前去交六時以上者皆從其六以乘差率六時已下自依數不須加如十四得一為時差子至卯半午至酉半以時餘加之卯至午半酉至子半以減時餘加之若滿時法者乃去之加於辰即進之於前也減之若不足者減半辰加時法乃減之即退之於後也餘為定時餘乃如月蝕法子午卯酉為仲辰戌丑未為季寅申巳亥為孟日出前後各一時半外不注日蝕推內道日不蝕術夏五月朔加時在南方三辰先交十三時外六月朔後交十三時外者不蝕啓蟄畢清明先交十三時外值縮加時在未巳西者亦不蝕入處暑畢寒露後交十三時值盈加時在己巳東者亦不蝕推外道日蝕術不問交之先後但去交一時內者皆蝕也若先交二時內者值盈二時外者亦蝕若後交二時內值縮二時外者亦蝕其夏去交二時在南方三辰者亦蝕若去分至十二時內去交六時內者亦蝕若去交春分三日內後交二時內者亦蝕秋分三日內先交二時內者亦蝕諸去交三時內星伏如前者亦蝕推月蝕分術置去交分其在冬先後交皆去不蝕分二時之數若在於春先交去半時後交去二時夏即依定若在於秋先交去二時後交去半時若不足去者蝕既乃以三萬六千一百八十三為法除之所得為不蝕分不盡者半法已下為半強已下為半弱而以減十五餘為蝕之大分推月蝕所起術若在外道初起東北蝕甚西北若在內道初起東南蝕甚西南十三分已上正東起推皆據正南而言推日蝕分術置去交分若入冬至已後畢於立春皆均減十二萬八百餘為不蝕分不足減者反以交分減之餘為不蝕分亦減望差為定法其後交值縮者直以望差為定法不須減之自入啓蟄初日減二十二萬八百分後日減一千八百一十分置初日所減之分計後日減之數以減之餘以減交分畢於芒種自入夏至日減二千四百分畢於白露自入秋分畢於大雪皆均減二十二萬八百分但不足減者皆如前反以交分減之訖皆為不蝕若入冬至畢於小寒不蝕分依定若入大寒畢於立夏後去交五時外皆去不蝕分一時時差值減者先交減之後交加之不足減者蝕既時差值加者先交加之後交減之不足減者蝕既乃為定分以十五乘之以定法除之所得為不蝕分不盡者半法已上為半強已下為半弱而以減十五餘為蝕之大分也推日蝕所起術若在外道初起西南蝕甚東南若在內道初起西北蝕甚東北十三度已上正西起亦據正南而言之日出日入冬至辰二十四分之二十申七刻十二分小寒辰十三分申七刻十九分大寒卯八刻七分酉一分立春卯七刻十一分酉二十一分啓蟄卯六刻十分酉一刻二十二分雨水卯五刻五分酉三刻三分春分卯三刻二十二分酉四刻十分清明卯二刻十五分酉五刻十七分穀雨卯一刻十一分酉六刻二十一分立夏卯十二分酉七刻二十分小滿寅八刻一分戍七分芒種寅七刻十四分戍十八分夏至寅七刻十二分戍二十分小暑寅七刻戍十八分大暑寅八刻酉闕立秋卯十一分酉七刻二十一分處暑卯一刻十一分酉六刻二十一分白露卯七刻十分酉一刻二十二分立冬卯七刻十一分酉二十分小雪卯七刻七分酉一分大雪辰十三分申七刻十九分求日出入所在術以所入氣辰刻及分與後氣辰刻及分相減餘乘入氣日算以十五除之所得以加減所入氣為定日出入從冬至至夏至日出減之日入加之從夏至至冬至日出加之日入減之入餘為定刻及分武德九年五月二日校曆人前曆博士臣南宮子明校曆人前曆博士臣薛弘疑校曆人算曆博士臣王孝通監校曆大理卿清河縣公崔善為夜漏半右依武德元年經加於漏刻日出沒二十四氣下推月蝕加時術右加有蝕之望以百刻乘定小餘日法而一以課所近氣不滿夜半者命日以甲子算上注曆推月蝕虧初復滿先造每箭更籌用刻倍月蝕日所入氣夜漏半二十五而一為籌刻分亦注於曆下月蝕分用刻率置月蝕分蝕一分用三刻二分用四刻三分用五刻四分用八刻五分用八刻六分用九刻七分用十刻八分用十一刻九分用十三刻十分用十四刻十一分用十五刻十二分用十六刻十三分用十八刻十四分用十九刻既用二十二刻推日月蝕加時定刻術置日月蝕加時定餘在辰半後者加時法於時餘以二十五乘之三萬九千一十八而一刻命刻算外即所入辰刻求虧初復滿術置蝕分用刻率副之以乘所入曆損益率四千五十七而一值盈反其損益值縮依其損益副為蝕定用刻數乃六乘之十而一以減蝕加時辰刻為虧初丈四乘餘之用刻數十而一以加蝕加時辰刻為復滿求所蝕夜初甚末更籌刻術因其日日所入辰殘刻及分依次加辰刻及分至蝕初辰刻及分減二刻十二分從其更用刻及分除之不滿更即初蝕更籌依所求得至甚刻加之命即甚依求得甚後刻數加之命即末更籌刻及分日出前復滿日入後初虧皆不注蝕二十四氣日出日入夜漏半一更一籌冬至辰二十四分之二十申七刻十二分二十七刻十二分十一刻二刻四分小寒同大雪辰十三分申七刻十九分二十七刻五分十刻二十一分二刻四分大寒同小雪卯八刻七分酉入一分二十六刻十五分十刻十五分二刻二分立春同立冬卯七刻十一分酉二十一分二十五刻十九分十刻七分二刻一分啓蟄同霜降卯六刻十分酉二十二分二十四刻十八分雨水同寒露卯五刻五分酉三分二十三刻十三分九刻十分一刻二十三分春分同秋分卯三刻二十二分酉四刻十分二十二刻十分八刻二十一分一刻十八分清明同白露卯二刻十五分酉五刻十七分二十刻二十二分八刻八分一刻十六分穀雨同處暑卯一刻十分酉六刻二十一分十九刻十九分七刻二十一分一刻十四分立夏同立秋卯十分酉七刻二十一分十八刻闕刻十六分一刻十二分小滿同大暑寅八刻一分戌七分十八刻一分七刻五分一刻芒種同小暑寅七刻十四分戌十八分十七刻十四分七刻一刻九分夏至寅七刻十二分戌二十分十七刻十二分七刻一刻九分
