body:
  text: 舊唐書卷一百一十九列傳第六十九楊綰崔祐甫子植植再從兄倰常衮楊綰字公權華州華陰人也祖溫玉則天朝為戶部侍郎國子祭酒父侃開元中醴泉令皆以儒行稱綰生聰惠年四歲處羣從之中敏識過人嘗夜宴親賓各舉坐中物以四聲呼之諸賓未言綰應聲指鐵燈樹曰燈盞柄曲衆咸異之及長好學不倦博通經史九流七略無不該覽尤工文辭藻思清贍而宗尚玄理沉靜寡欲常獨處一室左右經書凝塵滿席淡如也含光晦用不欲名彰每屬文恥於自白非知己不可得而見早孤家貧養母以孝聞甘旨或闕憂見于色親友諷令干祿舉進士調補太子正字天寶十三年玄宗御勤政樓試博通墳典洞曉玄經辭藻宏麗軍謀出衆等舉人命有司供食既暮而罷取辭藻宏麗外別試詩賦各一首制舉試詩賦自此始也時登科者三人綰為之首超授右拾遺天寶末安祿山反肅宗即位於靈武綰自賊中冒難披榛求食以赴行在時朝廷方急賢及綰至衆心咸悅拜起居舍人知制誥歷司勳員外郎職方郎中掌誥如故遷中書舍人兼修國史故事舍人年深者謂之閣老公廨雜料歸閣老者五之四綰以為品秩同列給受宜均悉平分之甚為時論歸美再遷禮部侍郎上疏條奏貢舉之弊曰國之選士必藉賢良蓋取孝友純備言行敦實居常育德動不違仁體忠信之資履謙恭之操藏器則未嘗自伐虛心而所應必誠夫如是故能率己從政化人鎮俗者也自叔葉澆詐茲道浸微爭尚文辭互相矜衒馬卿浮薄竟不周於任用趙一虛誕終取擯於鄉閭自時厥後其道彌盛不思實行皆徇空名敗俗傷教備載前史古人比文章於鄭衛蓋有由也近煬帝始置進士之科當時猶試策而已至高宗朝劉思立為考功員外郎又奏進士加雜文明經填帖從此積弊浸轉成俗幼能就學皆誦當代之詩長而博文不越諸家之集遞相黨與用致虛聲六經則未嘗開卷三史則皆同挂壁況復徵以孔門之道責其君子之儒者哉祖習既深奔競為務矜能者曾無愧色勇進者但欲凌人以毀讟為常談以向背為己任投刺干謁驅馳於要津露才揚己喧騰於當代古之賢良方正豈有如此者乎朝之公卿以此待士家之長老以此垂訓欲其返淳朴懷禮讓守忠信識廉隅何可得也譬之於水其流已濁若不澄本何當復清方今聖德御天再寧寰宇四海之內顒顒向化皆延頸舉踵思聖朝之理也不以此時而理之則太平之政又乖矣凡國之大柄莫先擇士自古哲后皆側席待賢今之取人令投牒自舉非經國之體也望請依古制縣令察孝廉審知其鄉閭有孝友信義廉恥之行加以經業才堪策試者以孝廉為名薦之於州刺史當以禮待之試其所通之學其通者送名於省自縣至省不得令舉人輒自陳牒比來有到狀保辨識牒等一切並停其所習經取左傳公羊穀梁禮記周禮儀禮尚書毛詩周易任通一經務取深義奧旨通諸家之義試日差諸司有儒學者對問每經問義十條問畢對策三道其策皆問古今理體及當時要務取堪行用者其經義并策全通為上第望付吏部便與官其經義通八策通二為中第與出身下第罷歸其明經比試帖經殊非古義皆誦帖括冀圖僥幸并近有道舉亦非理國之體望請與明經進士並停其國子監舉人亦請準此如有行業不著所由妄相推薦請量加貶黜所冀數年之間人倫一變既歸實學當識大猷居家者必修德業從政者皆知廉恥浮競自止敦龐自勸教人之本實在茲焉事若施行即別立條例詔左右丞諸司侍郎御史大夫中丞給舍同議奏聞給事中李廙給事中李栖筠尚書左丞賈至京兆尹兼御史大夫嚴武所奏議狀與綰同尚書左丞至議曰謹按夏之政尚忠殷之政尚敬周之政尚文然則文與忠敬皆統人之行也且夫諡號述行美極人文人文興則忠敬存焉是故前代以文取士本文行也由辭以觀行則及辭也宣父稱顏子不遷怒不二過謂之好學至乎修春秋則遊夏之徒不能措一辭不亦明乎間者禮部取人有乖斯義易曰觀乎人文以化成天下關雎之義曰先王以是經夫婦成孝敬厚人倫美教化移風俗蓋王政之所由廢興也故延陵聽詩知諸侯之存亡今試學者以帖字為精通不窮旨義豈能知遷怒二過之道乎考文者以聲病為是非唯擇浮艷豈能知移風易俗化天下之事乎是以上失其源而下襲其流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子生焉臣弒其君子弒其父非一朝一夕之故其所由來者漸矣漸者何謂忠信之凌頽恥尚之失所末學之馳騁儒道之不舉四者皆取士之失也夫一國之事繫一人之本謂之風贊揚其風繫卿大夫也卿大夫何嘗不出於士乎今取士試之小道而不以遠者大者使干祿之徒趨馳末術是誘導之差也夫以蝸蚓之餌雜垂滄海而望吞舟之魚不亦難乎所以食垂餌者皆小魚就科目者皆小藝四人之業士最關於風化近代趨仕靡然向風致使祿山一呼而四海震蕩思明再亂而十年不復向使禮讓之道弘仁義之道著則忠臣孝子比屋可封逆節不得而萌也人心不得而搖也且夏有天下四百載禹之道喪而殷始興焉殷有天下六百祀湯之法棄而周始興焉周有天下八百年文武之政廢而秦始并焉觀三代之選士任賢皆考實行故能風化淳一運祚長遠秦坑儒士二代而亡漢興雜三代之政弘四科之舉西京始振經術之學東都終持名節之行至有近戚竊位強臣擅權弱主孤立母后專政而社稷不隕終彼四百豈非興學行道扇化於鄉里哉厥後文章道弊尚於浮侈取士術異苟濟一時自魏至隋僅四百載三光分景九州阻域竊號僭位德義不修是以子孫速顛享國咸促國家革魏晉梁隋之弊承夏殷周漢之業四隩既宅九州攸同覆燾亭育合德天地安有捨皇王舉士之道蹤亂代取人之術此公卿大夫之辱也楊綰所奏實為正論然自典午覆敗中原版蕩戎狄亂華衣冠遷徙南北分裂人多僑處聖朝一平區宇尚復因循版圖則張閭井未設士居鄉土百無一二因緣官族所在耕築地望繫之數百年之外而身皆東西南北之人焉今欲依古制鄉舉里選猶恐取士之未盡也請兼廣學校以弘訓誘今京有太學州縣有小學兵革一動生徒流離儒臣師氏祿廩無向貢士不稱行實胄子何嘗講習獨禮部每歲擢甲乙之第謂弘奬擢不其謬歟祇足長浮薄之風啓僥幸之路矣其國子博士等望加員數厚其祿秩選通儒碩生間居其職十道大郡量置太學館令博士出外兼領郡官召置生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉朝而行之夕見其利如此則青青不復興刺擾擾由其歸本矣人倫之始王化之先不是過也李廙等議與綰協文多不載宰臣等奏以舉人舊業已成難於速改其今歲舉人望且許應舊舉來歲奉詔仍敕禮部即具條例奏聞代宗以廢進士科問翰林學士對曰進士行來已久遽廢之恐失人業乃詔孝廉與舊舉兼行綰又奏歲貢孝悌力田及童子科等其孝悌力田宜有實狀童子越衆不在常科同之歲貢恐長僥幸之路詔停之再遷吏部侍郎歷典舉選精核人物以公平稱時元載秉政公卿多附之綰孤立中道清貞自守未嘗私謁載以綰雅望素高外示尊重心實疏忌會魚朝恩死載以朝恩嘗判國子監事塵污太學宜得名儒以清其秩乃奏為國子祭酒實欲以散地處之載貪冒日甚天下清議亦歸於綰上深知之以載久在樞衡未即罷遣仍遷綰為太常卿充禮儀使以郊廟禮久廢藉綰振起之也亦以觀其效用是年三月載伏誅上乃拜綰中書侍郎同中書門下平章事集賢殿崇文館大學士兼修國史綰久積公輔之望及詔出朝野相賀綰纍表懇讓上屬意稍重綰不敢辭綰素以德行著聞質性貞廉車服儉朴居廟堂未數月人心自化御史中丞崔寬劍南西川節度使寧之弟家富於財有別墅在皇城之南池館臺榭當時第一寬即日潛遣毀拆中書令郭子儀在邠州行營聞綰拜相座內音樂減散五分之四京兆尹黎幹以承恩每出入騶馭百餘亦即日減損車騎唯留十騎而已其餘望風變奢從儉者不可勝數其鎮俗移風若此綰有宿痼疾居職旬日中風優詔令就中書省攝養每引見延英殿特許扶入時釐革舊弊唯綰是瞻恩遇莫二綰纍抗疏辭位頻詔敦勉不許及綰疾亟上日發中使就第存問尚藥御醫旦夕在側上聞其有間喜見容色數日而薨中使在門馳奏於上代宗震悼久之輟朝三日詔曰王者之於大臣也存則寄其腹心均於肢體參於軍國之重以陰陽之和歿則誄其事功加之命數告於宗廟之祭襚以紱冕之章則九原可歸百辟知勸故朝議大夫守中書侍郎同中書門下平章事集賢殿崇文館大學士監修國史上柱國賜紫金魚袋楊綰性合元和身齊律度道匡雅俗器重宗彝寬柔敬恭協於九德文行忠信弘於四教內無耳目之役以孝悌傳於家外無車服之容以貞實形於代西掖專宥密之地南宮領選舉之源以儒術首於國庠以禮度掌於高廟簡廉其質條職同休頃以任非其才毒流于政爰登清淨之輔庶諧至理之期道風既穆於朝班儉德已行於海內雖賢人之業冀於可久而夫子之命末如之何方有憑依遽此淪謝屏豫之歎震悼良深所懷莫從長想何及況歷官有素絲之節居家無匹帛之餘故飾以華衮增其法賻備膺典策載賁朝經可贈司徒又詔文武百僚臨於其第遣內常侍吳承倩會弔贈絹千匹布三百端上深惜之顧謂朝臣曰天不使朕致太平何奪我楊綰之速也俯及大斂與卿等悲悼同之宰輔賻贈恩遇哀榮之盛近年未有其比太常初諡曰文貞詔曰褒德勸善春秋之舊章考行易名禮經之通典垂範作則存乎格言朝議大夫中書侍郎同中書門下平章事集賢殿崇文館大學士修國史上柱國賜紫金魚袋贈司徒楊綰履道居貞含和育德行為人紀文合典謨清而晦名無自伐之善約以師儉有不矜之謙方册直書秩宗相禮辭稱良史學茂醇儒委在樞衡掌茲密命彌契沃心之道纍陳造膝之誠將以布天下五行之和同君臣一德之運遽軫藏舟之歎未展濟川之才素業久而彌彰清風歿而可尚自古飾終之義皆錫以美名諡法曰忠信愛人曰文平易不懈曰簡宜諡曰文簡比部郎中蘇端性疏狂嫉其賢乃肆毀黷異同其議上怒貶端為廣州員外司馬綰儉薄自樂未嘗留意家産口不問生計纍任清要無宅一區所得俸祿隨月分給親故清識過人至如往哲微言五經奧義先儒未悟者綰一覽究其精理雅尚玄言宗釋道二教嘗著王開先生傳以見意文多不載凡所知友皆一時名流或造之者清談終日未嘗及名利或有客欲以世務干者見綰言必玄遠不敢發辭內愧而退大曆中德望日崇天下雅正之士爭趨其門至有數千里來者以清德坐鎮雅俗時比之楊震邴吉山濤謝安之儔也崔祐甫字貽孫祖晊懷州長史父沔黃門侍郎諡曰孝公家以清儉禮法為士流之則祐甫舉進士歷壽安尉安祿山陷洛陽士庶奔迸祐甫獨崎危於矢石之間潛入私廟負木主以竄歷起居舍人司勳吏部員外郎纍拜兼御史中丞永平軍行軍司馬尋知本軍京師留後性剛直無所容受遇事不回纍遷中書舍人時中書侍郎闕祐甫省事數為宰相常衮所侵祐甫不從衮怒之奏令分知吏部選每有擬官衮多駁下言數相侵時朱泚上言隴州將趙貴家貓鼠同乳不相為害以為禎祥詔遣中使以示於朝衮率百僚慶賀祐甫獨否中官詰其故答曰此物之失常也可弔不可賀中使徵其狀祐甫上奏言臣聞天生萬物剛柔有性聖人因之垂訓作則禮記郊特牲曰迎貓為其食田鼠也然則貓之食鼠載在禮典以其除害利人雖微必録今此貓對鼠不食仁則仁矣無乃失於性乎鼠之為物晝伏夜動詩人賦之曰相鼠有體人而無禮又曰碩鼠碩鼠無食我黍其序曰貪而畏人若大鼠也臣旋觀之雖云動物異於麋鹿兔彼皆以時殺獲為國之用貓受人養育職既不修亦何異於法吏不勤觸邪疆吏不勤扞敵又按禮部式具列三瑞無貓不食鼠之目以茲稱慶臣所未詳伏以國家化洽理平天符洊至紛綸雜沓史不絶書今茲貓鼠不可濫廁若以劉向五行傳論之恐須申命憲司察聽貪吏誡諸邊候無失徼巡貓能致功鼠不為害代宗深嘉之衮益惡祐甫代宗初崩發哀於西宮衮以獨受任遇哀逾等禮例晨夕臨者皆十五舉音而衮輒哀慟涕泗或中墀返哭顧慕若不能去同列者皆不悅及衮與禮司議羣臣喪服曰案禮為君斬衰三年漢文權制猶三十六日國家太宗崩遺詔亦三十六日而羣臣延之既葬而除約四月也高宗崩服絶輕重如漢故事武太后崩亦然及玄宗肅宗崩始變天子喪為二十七日且當時遺詔雖曰天下吏人三日釋服在朝羣臣實服二十七日而除則朝臣宜如皇帝之制祐甫執曰伏準遺詔無朝臣庶人之別但言天下人吏敕到後出臨三日皆釋服則朝野中外何非天下凡百執事誰非吏職則皇帝宜二十七日而羣臣當三日也衮曰案賀循注義吏者謂官長所署則今胥吏耳非公卿百僚之例祐甫曰左傳云委之三吏則三公也史稱循吏良吏者豈胥徒歟衮曰禮非天降地出人情而已且公卿大臣榮受殊寵故宜異數今與黔首同制信宿而除之於爾安乎祐甫曰若遺詔何詔旨可改孰不可衮堅諍不服而聲色甚厲不為禮節又衮方哭於鉤陳之前而衮從吏或扶之祐甫指示於衆曰臣哭於君前有扶禮乎衮聞之不堪其怒乃上言祐甫率情變禮輕議國典請謫為潮州刺史內議太重改為河南少尹初肅宗時天下事殷而宰相不減三四員更直掌事若休沐各在第有詔旨出入非大事不欲歷抵諸第許令直事者一人假署同列之名以進遂為故事是時中書令郭子儀檢校司空平章事朱泚名是宰臣當署制敕至於密勿之議則莫得聞時德宗踐祚未旬日居不言之際衮循舊事代署二人之名進貶祐甫敕出子儀及泚皆表明祐甫不當貶謫上曰向言可謫今言非罪何也二人皆奏實未嘗有可謫之言德宗大駭謂衮誣罔是日百僚苴絰序立於月華門立貶衮為河南少尹以祐甫為門下侍郎平章事兩換其職祐甫出至昭應縣徵還尋轉中書侍郎修國史仍平章事上初即位庶務皆委宰司自至德乾元中天下多戰伐啓奏填委故官賞紊雜及永泰之後四方既定而元載秉政公道隘塞官由賄成中書主書卓英倩李待榮輩用事勢傾朝列天下官爵大者出元載小者自倩榮四方齎貨賄求官者道路相屬靡不稱遂而去於是綱紀大壞及元載敗楊綰尋卒常衮當國杜絶其門四方奏請莫有過者雖權勢與匹夫等非以辭賦登科者莫得進用雖賄賂稍絶然無所甄異故賢愚同滯及祐甫代衮薦延推舉無復疑滯日除十數人作相未逾年凡除吏幾八百員多稱允當上嘗謂曰有人謗卿所除擬官多涉親故何也祐甫奏曰臣頻奉聖旨令臣進擬庶官進擬必須諳其才行臣若與其相識方可粗諳若素不知聞何由知其言行獲謗之由實在於此上以為然神策軍使王駕鶴掌禁兵十餘年權傾中外德宗初登極將令白琇圭代之懼其生變祐甫召駕鶴與語留連之琇圭已赴軍視事矣時李正己畏懼德宗威德乃表獻錢三十萬貫上欲納其奏慮正己未可誠信以計逗留止之未有其辭延問宰相祐甫對曰正己姦詐誠如聖慮臣請因使往淄青便令宣慰將士因以正己所獻錢錫賚諸軍人且使深荷聖德又令外藩知朝廷不重財貨上悅從之正己大慚而心畏服焉祐甫謀猷啓沃多所弘益天下以為可復貞觀開元之太平也至冬被疾肩輿入中書臥而承旨或休假在第大事必令中使咨決薨時年六十上甚悼惜之廢朝三日册贈太傅賻布帛米粟有差諡曰文貞無子遺命猶子植為嗣有文集三十卷故事門下侍郎未嘗有贈三師者德宗以祐甫謇謇有大臣節故特寵異之朱泚之亂祐甫妻王氏陷於賊中泚以嘗與祐甫同列雅重其為人乃遺王氏繒帛菽粟王氏受而緘封之及德宗還京具陳其狀以獻士君子益重祐甫家法宜其享令名也植字公修祐甫弟廬江令嬰甫子植既為相上言出繼伯父胤推恩不及於父詔贈嬰甫吏部侍郎植潛心經史尤精易象纍歷清要為給事中時稱舉職時皇甫鎛以宰相判度支請減內外官俸祿植封還敕書極諫而止鎛復奏諸州府鹽院兩稅榷酒鹽利匹段等加估定數及近年天下所納鹽酒利撎估者一切徵收詔皆可之植抗疏論奏令宰臣召植宣旨嘉諭之物議罪鎛而美植尋除御史中丞入閣彈事頗振綱紀長慶初拜中書侍郎同中書門下平章事穆宗嘗謂侍臣曰國家貞觀中文皇帝躬行帝道治致升平及神龍景龍之間繼有內難玄宗平定興復不易而聲明最盛歷年長久何道而然植對曰前代創業之君多起自人間知百姓疾苦初承丕業皆能厲精思理太宗文皇帝特上聖之資同符堯舜之道是以貞觀一朝四海寧晏有房玄齡杜如晦魏徵王圭之屬為輔佐股肱君明臣忠事無不理聖賢相遇固宜如此玄宗守文繼體嘗經天后朝艱危開元初得姚崇宋璟委之為政此二人者天生俊傑動必推公夙夜孜孜致君於道璟嘗手寫尚書無逸一篇為圖以獻玄宗置之內殿出入觀省咸記在心每歎古人至言後代莫及故任賢戒欲心歸沖漠開元之末因無逸圖朽壞始以山水圖代之自後既無座右針規又信姦臣用事天寶之世稍倦于勤王道于斯缺矣建中初德宗皇帝嘗問先臣祐甫開元天寶治亂之殊先臣具陳本末臣在童丱即聞其説信知古人以韋弦作戒其益弘多陛下既虛心理道亦望以無逸為元龜則天下幸甚穆宗善其對他日復謂宰臣曰前史稱漢文帝惜十家之産而罷露臺又云身衣弋綈履革舄集上書囊以為殿帷何太儉也信有此乎植對曰良史所記必非妄言漢興承亡秦殘酷之後項氏戰爭之餘海內凋弊生人力竭漢文仁明之主起自代邸知稼穡之艱難是以即位之後躬行儉約繼以景帝猶遵此風由是海內黔首咸樂其生家給戶足逮至武帝公私殷富用能出師征伐威行四方錢至貫朽穀至紅腐上務侈靡資用復竭末年稅及舟車六畜人不聊生戶口減半乃下哀痛之詔封丞相為富人侯皆漢史明徵用為事實且耕蠶之勸出自人力用既無度何由以至富強據武帝嗣位之初物力阜殷前代無比固當因文帝儉約之致也上曰卿言甚善患行之為難耳憲宗皇帝削平羣盜河朔三鎮復入提封長慶初幽州節度使劉總表以幽薊七州上獻請朝廷命帥總仍懼部將構亂乃籍其豪鋭者先送京師時朱克融在籍中植與同列杜元穎素不知兵且無遠慮克融等在京羈旅窮餓日詣中書乞官殊不介意及張弘靖赴鎮令克融等從還不數月克融囚弘靖害賓佐結王廷湊國家復失河朔職植兄弟之由乃罷知政事守刑部尚書出為華州刺史大和三年正月卒年五十八植雖器量謹厚而無開物成務之才及喪師異方天下尤其失策倰字德長祖濤大理卿孝公沔之弟也濤生儀甫終大理丞即倰之父以門蔭由太廟齋郎調授太平東陽二主簿李衡廉察湖南江西辟為賓佐坐事沈廢久之復以選授宣州録事參軍觀察使崔衍奇其才奏加章服倰辭而不受李巽鎮江西奏為副使得監察𩹉行又從巽領使為河陰院鹽鐵留後入為侍御史尋改膳部員外充轉運判官入為膳部郎中充荊襄十道兩稅使賜金紫遷蘇州刺史理行為第一轉潭州刺史湖南都團練觀察使湖南舊法豐年貿易不出境鄰部災荒不相恤倰至謂屬吏曰此非人情也無宜閉糶重困於民也自是商賈通流入為戶部侍郎判度支時倰再從弟植為宰相倰性剛褊恃其權寵與奪任情時朝廷以王承元歸國命田弘正移帥鎮州弘正之行以魏卒二千為帳下又以常山之人久隔朝化人情易為變擾纍表請留魏卒為綱紀其糧賜請度支歲給穆宗下宰臣議倰固言魏鎮各有鎮兵朝廷無例支給恐為事例不可聽從弘正不獲已遣魏卒還藩不數日而鎮州亂弘正遇害穆宗失德倰黨方盛人不敢糾其罪罷領度支檢校禮部尚書出為鳳翔節度等使不期歲召為河南尹時年七十抗疏致仕詔以戶部尚書歸第明年暴卒輟朝一日贈太子少保諡曰肅倰居官清嚴所至必理然性介急待僚屬不以禮節恃己之廉見贓汙者如讎焉子巖登進士第辟襄陽掌書記監察御史方雅有父風常衮京兆人也父無為三原縣丞以衮纍贈僕射衮天寶末舉進士歷太子正字纍授補闕起居郎寶應二年選為翰林學士考功員外郎中知制誥依前翰林學士永泰元年遷中書舍人袞文章俊拔當時推重與楊炎同為舍人時稱為常楊性清直孤潔不妄交遊內侍魚朝恩恃權寵兼領國子監事衮上疏以為不可時朝廷多事西北邊虜連為寇盜衮纍上章陳其利害代宗甚顧遇之加集賢院學士大曆元年遷禮部侍郎仍為學士時中官劉忠翼權傾內外涇原節度馬璘又纍著功勳恩寵莫二各有親戚干貢部及求為兩館生衮皆執理人皆畏之元載之得罪令衮與劉晏李涵等鞫之獄竟拜衮門下侍郎同平章事太清太微宮使崇文弘文館大學士與楊綰同掌樞務代宗尤信重綰綰弘通多可衮頗務苛細求清儉之稱與綰之道不同先是百官俸料寡薄綰與衮奏請加之時韓滉判度支衮與滉各騁私懷所加俸料厚薄由己時少列各定月俸為三十五千滉怒司業張參唯止給三十千衮惡少詹事趙惎遂給二十五千太子洗馬實司經局長官文學為之二衮有親戚任文學者給十二千而給洗馬十千其輕重任情不通時政多如此類無幾楊綰卒衮獨當政故事每日出內廚食以賜宰相饌可食十數人衮特請罷之迄今便為故事又將故讓堂廚同列以為不可而止議者以為厚祿重賜所以優賢崇國政也不能當辭位不宜辭祿食政事堂有後門蓋宰相時到中書舍人院咨訪政事以自廣也衮又塞絶其門以示尊大不相往來既懲元載為政時公道梗止𣥖賄賂朋黨大行不以財勢者無因入仕衮一切杜絶之中外百司奏請皆執不與權與匹夫等尤排擯非文辭登科第者雖窒賣官之路政事大致壅滯代宗既素重楊綰欲以政事委之綰尋卒衮與綰志尚素異嫉而怒之有司議諡綰為文貞衮微諷比部郎中蘇端令駁之毀綰過甚端坐黜官時既無中書侍郎舍人崔祐甫領省事衮以為同中書門下平章事兼得總中書省遂管綜中書胥吏省事去就及其案牘祐甫不能平之纍至忿競遂令祐甫分知吏部選事所擬官又多駁下時衮散官尚朝議又無封爵郭子儀因入朝奏之遂特加銀青光祿大夫封河內郡公及代宗崩與祐甫爭論喪服輕重代相署奏初換祐甫河南少尹再貶為潮州刺史楊炎入相素與衮善建中元年遷福建觀察使四年正月卒時年五十五久之贈左僕射有文集六十卷史臣曰善人為邦百年即可勝殘去殺楊綰入相數日遽致移風易俗周召伊傅蕭張房杜歷代為相之顯者蔑聞斯道也嘗讀諸集賞善多溢美書罪多溢惡如楊綰拜相之麻贈官之制改諡之詔則當時秉筆者無愧色矣昔趙文子薦士七十古為美談崔祐甫除吏八百人無間言開物成務之才滅私徇公之道可知也噫公權餘旬日而薨貽孫未期年而逝邃古已來理世少而亂世多其義在茲矣常衮之輩不足云爾贊曰公權儒道貽孫相才命乎不永時哉可哀
