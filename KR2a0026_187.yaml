body:
  text: 舊唐書卷一百八十三列傳第一百三十三外戚獨孤懷恩竇德明姪懷貞族弟孝諶孝諶子希瑊希球希瓘希瓘從父弟維鍌長孫敞從父弟操趙持滿附武承嗣子延秀從父弟三思三思子崇訓從祖弟懿宗攸暨攸暨妻太平公主從父弟攸緒薛懷義附韋溫王仁皎子守一吳漵弟湊竇覦柳晟王子顏自古后族能以德禮進退全宗保名者鮮矣蓋恃宮掖之寵接宴私之歡高爵厚祿驕其內聲色服玩惑於外莫知師友之訓不達危亡之道故以中才處之罕不覆敗亦由重植之木自然顛披也明哲之君知驕侈之易滿榮寵之難保授任各當其才祿位不過其量告之以天命不易誡之以大義滅親使居無過之地永享不資之福與國終始不失其所以親也易曰震來虩虩恐致福也又曰婦子嘻嘻失家節也與其愛而失節曷若懼而致福魏氏懲漢人之敗著矯枉之法幼主嗣位母后不得臨朝外氏無功時主不得封爵雖曰刻薄而卞甄之族竟無大過皇唐受命長孫竇氏以勳賢任職而武氏韋氏以盈滿致覆夫廢興者豈天命哉蓋人事也竇威長孫無忌各自有傳其餘載其得失為外戚傳以存鑒誡焉獨孤懷恩元貞皇后弟之子也父整隋涿郡太守懷恩幼時以獻皇后之姪養於宮中後仕為鄠縣令高祖平京城授長安令在職嚴明甚得時譽及高祖受禪擢拜工部尚書時虞州刺史韋義節擊堯君素於蒲州而義節文吏怯懦頻戰不利高祖遣懷恩代總其衆懷恩督兵城下為賊所拒頻戰不利高祖切讓之因是怨望高祖嘗戲之曰弟姑子悉為天子次當舅子乎懷恩遂自以為符命每扼腕曰我家豈女獨富貴耶由是陰圖異計時虞鄉南山多羣盜劉武周將宋金剛寇陷澮州高祖悉發關中卒以隸太宗屯於柏壁懷恩遂與解縣令榮靜前五原縣主簿元君寶謀引王行本兵及武周連和與山賊劫永豐倉而斷柏壁糧道割河東地以啖武周事臨發會夏縣人呂崇茂殺縣令據縣起兵應武周高祖遣懷恩與永安王孝基陝州總管于筠內史侍郎唐儉攻崇茂宋金剛潛兵來襲諸將盡沒君寶與開府劉讓亦同陷于賊中遂泄懷恩之謀既而懷恩逃歸高祖復令率師攻蒲州唐儉在賊中説賊將尉遲敬德請使讓還連和罷兵遂使發其事會堯君素為其下所殺小帥王行本以蒲州降懷恩勒兵入據其城高祖將濟河已御舟矣會讓至乃使召懷恩懷恩不知事已泄輕舟來赴及中流而執之收其黨按驗遂誅之時年三十六籍沒其家竇德明太穆順聖皇后兄之孫也祖照尚後魏文帝女義陽公主封巨鹿公父彥襲父封仕隋為西平郡守德明少師事陳留王孝逸頗涉文史會漢王諒作亂遣其將綦良攻黎州德明時年十八募得五千人倍道而進號令嚴整一戰破之以功纍拜齊王府屬坐事免及義師圍長安永安王孝基襄邑王神符江夏王道宗及高祖之壻竇誕趙慈景並繫獄隋將衛文升陰世師欲殺之德明謂文升曰罪不在此輩殺之無傷於彼適足招怨文升乃止及謁見高祖竟不自言時人稱其長者武德初拜考功郎中從太宗擊王世充頻有戰功封顯武男貞觀初歷常愛二州刺史尋卒弟德玄高宗時為左相德玄子懷貞懷貞少有名譽時兄弟宗族並以輿馬為事懷貞獨折節自修衣服儉素聖曆中為清河令治有能名俄歷越州都督揚州大都督府長史所在皆以清幹著稱神龍二年纍遷御史大夫兼檢校雍州長史時韋庶人及安樂公主等干預朝政懷貞每諂順委曲取容改名從一以避后父之諱自是名稱日損庶人微時乳母王氏本蠻婢也特封莒國夫人嫁為懷貞妻俗謂乳母之壻為阿懷貞每因謁見之次及進表疏列在官位必曰皇后阿時人或以國呼之初無慚色宦官用權懷貞尤所畏敬每視事聽訟見無鬚者誤以接之監察御史魏傳弓嘗以內常侍輔信義尤縱暴將奏劾之懷貞曰輔常侍深為安樂公主所信任權勢甚高言成禍福何得輒有彈糾傳弓曰今王綱漸壞君子道消正由此輩擅權耳若得今日殺之明日受誅無所恨懷貞無以答但固止之韋庶人敗左遷濠州司馬尋擢授益州大都督府長史以附會太平公主纍拜侍中兼御史大夫代韋安石為尚書左僕射監修國史賜爵魏國公睿宗為金仙玉真二公主創立兩觀料功甚多時議皆以為不可唯懷貞贊成其事躬自監役懷貞族弟詹事司直維鍌謂懷貞曰兄位極台衮當思獻可替否以輔明主奈何校量瓦木廁迹工匠之間欲令海內何所瞻仰也懷貞不能對而監作如故時人為之語曰竇僕射前為韋氏國後作公主邑丞言懷貞伏事公主同於邑官也先天二年太平公主逆謀事泄懷貞懼罪投水而死追戮其尸改姓毒氏德明族弟孝諶孝諶刑部尚書誕之子昭成順聖皇后父也則天時歷太常少卿潤州刺史長壽二年后母龐氏被酷吏所陷誣與后呪詛不道孝諶左遷羅州司馬而卒子希瑊希球希瓘並流嶺南神龍初隨例雪免景雲年追贈孝諶太尉邠國公希瑊襲爵玄宗即位加贈孝諶太保希瑊等以舅氏甚見優寵希瑊纍遷太子少傅豳國公尋卒希球官至太子賓客封冀國公開元二十七年卒及卒諡曰靖希瓘初賜爵畢國公後改名初為左散騎常侍及希球卒因授開府儀同三司玄宗以早失太后尤重外家兄弟三人皆國公食實封子鍔又尚玄宗女永昌長公主恩寵賜賚實為厚矣而兄弟皆貪鄙過自封植又甚之天寶七年有竇勉潛交巫祝勉犯法坐信其詭説被停官放歸田園尋以尊老又授開府儀同三司依舊朝會十三載十二月卒玄宗哭於行在贈司徒財貨巨萬從父弟維鍌好學以撰著為業時宗族咸以外戚崇飾輿馬維鍌獨清儉自守中書令張説黃門侍郎盧藏用給事中裴子餘皆與之親善官至水部郎中卒撰吉凶禮要二十卷行於代長孫敞文德順聖皇后之叔父也仕隋為左衛郎將煬帝幸江都留敞守京城禁苑及義旗入關率子弟迎謁於新豐從平京城以功除將作少監出為嵵州刺史貞觀初坐贓免太宗以后親常令內給絹以供私費尋拜宗正少卿致仕加金紫光祿大夫纍封平原郡公卒贈幽州都督諡曰良陪葬昭陵敞從父弟操周大司徒薛國公覽之子也武德中為陝東道行臺金部郎中出為陝州刺史自州東引水入城以代井汲百姓于今利之貞觀中歷洺州刺史益揚二州都督府長史並有善政二十三年以子詮尚太宗女新城公主拜岐州刺史永徽初加金紫光祿大夫賜爵樂壽男尋卒贈吏部尚書並州都督諡曰安詮官至尚衣奉御詮即侍中韓瑗妻弟也及瑗得罪事連於詮減死配流巂州詮至流所縣令希旨杖殺之詮之甥有趙持滿者工書善射力搏猛獸捷及奔馬而親仁愛衆多所交結京師無貴賤皆愛慕之初為涼州長史嘗逐野馬自後射之無不洞于胸腋邊人深伏之許敬宗懼其作難誣與詮及無忌同反及拷訊終無異詞且曰身可殺辭不可奪吏竟代為款以殺之武承嗣荊州都督士彠之孫則天順聖皇后兄子也初士彠娶相里氏生元慶元爽又娶楊氏生三女長適越王府功曹賀蘭越石次則天次適郭氏士彠卒後兄子惟良懷運及元爽等遇楊氏失禮及則天立為皇后追贈士彠為司徒周忠孝王封楊氏代國夫人賀蘭越石早卒封其妻為韓國夫人尋又加贈士彠為太尉楊氏改封為榮國夫人時元慶仕為宗正少卿元爽為少府少監惟良為衛尉少卿榮國夫人恨其疇日薄己諷皇后抗疏請出元慶等為外職佯為退讓其實惡之也於是元慶為龍州刺史元爽為濠州刺史惟良為始州刺史元慶至州病卒元爽自濠州又配流振州而死乾封年惟良與弟淄州刺史懷運以嶽牧例集於泰山之下時韓國夫人女賀蘭氏在宮中頗承恩寵則天意欲除之諷高宗幸其母宅因惟良等獻食則天密令人以毒藥貯賀蘭氏食中賀蘭氏食之暴卒歸罪於惟良懷運乃誅之仍諷百僚抗表請改其姓為蝮氏絶其屬籍元爽等緣坐配流嶺外而死乃以韓國夫人之子敏之為士彠嗣改姓武氏纍拜左侍極蘭臺太史襲爵周國公仍令鳩集學士李嗣真吳兢之徒於蘭臺刊正經史並著撰傳記敏之既年少色美蒸於榮國夫人恃寵多愆犯則天頗不悅之咸亨二年榮國夫人卒則天出內大瑞錦令敏之造佛像追福敏之自隱用之又司衛少卿楊思儉女有殊色高宗及則天自選以為太子妃成有定日矣敏之又逼而淫焉及在榮國服內私釋衰絰著吉服奏妓樂時太平公主尚幼往來榮國之家宮人侍行又嘗為敏之所逼俄而姦汙事發配流雷州行至韶州以馬韁自縊而死承嗣元爽子也敏之死後自嶺南召還拜尚衣奉御襲祖爵周國公俄遷祕書監則天臨朝追尊士彠為忠孝太皇置崇先府官屬五代祖已下皆為王嗣聖元年以承嗣為禮部尚書尋除太常卿同中書門下三品垂拱中轉春官尚書依舊知政事載初元年代蘇良嗣為文昌左相同鳳閣鸞臺三品兼知內史事天授元年於東都創置武氏七廟追尊周文王為始祖文皇帝王子武為睿祖康皇帝云武氏之先也后五代祖贈太原靖王居常為嚴祖成皇帝高祖贈趙肅恭王克己為肅祖章敬皇帝曾祖贈魏康王儉為烈祖昭安皇帝祖贈周安成王華為顯祖文穆皇帝考忠孝太皇為太祖孝明高皇帝妣皆隨帝號曰皇后元慶為梁憲王元爽為魏德王又追封伯父及兄弟俱為王諸姑姊為長公主於是封承嗣為魏王元慶子夏官尚書三思為梁王后從父兄子納言攸寧為建昌王太子通事舍人攸歸為九江王司禮卿重規為高平王左衛親府中郎將載德為潁川王右衛將軍攸暨為千乘王司農卿懿宗為河內王左千牛中郎將嗣宗為臨川王右衛勳二府中郎將攸宜為建安王尚乘直長攸望為會稽王太子通事舍人攸緒為安平王攸止為恆安王又封承嗣男延基為南陽王延秀為淮陽王三思男崇訓為高陽王崇烈為新安王后兄子贈陳王承業男延暉為嗣陳王延祚為咸安王承嗣嘗諷則天革命盡誅皇室諸王及公卿中不附己者承嗣從父弟三思又盛贊其計天下于今冤之俄又賜承嗣實封千戶仍監修國史承嗣自為次當為皇儲令鳳閣舍人張嘉福諷諭百姓抗表陳請則天竟不許如意元年授特進尋拜太子太保罷知政事承嗣以不得立為皇太子怏怏而卒贈太尉並州牧諡曰宣子延基襲爵則天避其父名封為繼魏王尋與其妻永泰郡主及懿德太子等話及張易之兄弟出入宮中恐有不利後忿爭不協泄之則天聞而大怒咸令自殺復以承嗣次子延義為繼魏王中宗即位侍中敬暉等以唐室中興武氏諸王宜削其王爵乃率羣官上表曰臣聞神器者天下之至公必歸乎有德皇極者域中之大寶必順乎天命歷考前古詳觀帝業皆不並興莫有二主故三皇氏沒而五帝氏興夏商氏衰而周漢氏作何則帝王之曆數必應乎五行水盛則火衰木衰則金盛天地之運也合乎四時春往則夏來暑退則寒集則知五行之數也帝王不可違違之則宗社不安生人不理四時之序天地不能變變之則霜露不均水旱交錯自有隋失御海內崩離天曆之重歸于唐室萬方樂業荷撥亂之功三聖重光布生成之德可謂有功於四海有德於蒸人自弘道遏密生靈降禍百辟哀號如喪考妣則天皇后臨御帝圖明目達聰躬親庶績則有讒邪凶孽誣惑睿德構害宗枝誅夷殆盡英藩賢戚百不一存餘類在者投竄荒裔冤酷人神感傷天地忠臣義士實所痛心自天授之際時稱改革武家子姪咸樹封建十餘年間實亦榮極于時唐室藩屏豈得並封故知事有升降時使然也今則天皇帝厭倦萬機神器大寶重歸陛下百姓謳歌欣復唐業上至卿士下及蒼生黃髮之倫童兒之輩莫不歡欣舞忭如見父母豈不以唐家恩德感幽祇之心陛下仁明順天下之望今皇業重構聖祚中興神祇之道有助於先德矣黎人之誠無負於陛下矣臣又聞之業不兩盛事不兩大故天無二日土無二王前聖之格言先哲之明誡自皇明反正天命惟新武家諸王封建依舊生者既加茅土死者仍追賦邑萬姓失望卿士寒心何則開闢已來罕有斯理帝王之道實無此法陛下縱欲開恩以行私惠豈可違五行之曆數乎乖四時之寒暑乎又海內衆情朝廷竊議為武氏諸王身計亦適將有損何則處之未得其所居之實恐不安陛下雖欲寵之翻乃陷之不遵古典故也且唐曆有歸周命已去爵重則難保祿薄則易全又則天皇帝親政之時武氏諸王亦分外職今居京輦不降舊封天下之心竊將不可陛下縱欲敦崇外戚曲流恩貸奈宗廟社稷之計何奈卿士黎庶之議何伏願陛下為社稷之遠圖割私情之小愛內崇經邦之要外順遐邇之心豈不固宗社之基允人靈之願則陛下巍巍之業貫三光而洞九泉親親之義上有倫而下有序臣特承榮寵思竭丹赤既為唐臣實為唐計伏乞聖慈俯垂矜納中書舍人岑羲之詞也上答曰朕嘗因暇景博覽前修帝籍皇圖略稽其迹至若二靈肇判三才聿興驪連栗陸之辰尊盧大庭之日時猶朴略未著圖書洎乎出震應期畫八卦而成象炎皇御曆播百穀之興農車服創於軒轅之朝曆象建於唐堯之代封建之事闕爾無聞自周漢已來方崇藩屏至於三微更王五運迭興以古揆今事迹有爽比者別宗撫曆異姓興邦伏以則天大聖皇帝內輔外臨將五十載在朕躬則為慈母於士庶即是明君往者垂拱之中嗣皇臨政當此之際魯衛並存及乎全節興妖琅邪構逆災連七國釁結三監既行大義之懷遂有泣誅之事周唐革命蓋為從權子姪封王國之常典卿等表云天授之際武家封建唐家藩屏豈得並封者至如千里一房不預逆謀還依姓李無改舊惠豈非善惡區分申明逆順矣今以聖上乖豫高枕怡神委政朕躬纂承丕緒昨者二月之首攸暨等屢請削封朕獨斷襟懷不依來請昔漢祖以布衣取天下猶封異姓為王況朕以纍聖開基豈可削封外族羣公等以天無二日土無二王抗表紫庭用申丹懇者然以賞罰之典經國大綱攸暨三思皆悉預告凶豎雖不親冒白刃而亦早獻丹誠今若却除舊封便慮有功難勸於是降封梁王三思為德靜郡王量減實封二百戶定王駙馬都尉攸暨為樂壽郡王河內郡王懿宗為耿國公建昌郡王攸寧為江國公會稽郡王攸望為鄴國公臨川郡王嗣宗為管國公建安郡王攸宜為息國公高平郡王重規為鄶國公繼魏王延義為魏國公安平郡王攸緒為巢國公高陽郡王駙馬都尉崇訓為酆國公淮陽郡王延秀為桓國公咸安郡王延祚為咸安郡公中宗時嗣宗至曹州刺史攸宜工部尚書重規岐州刺史相次病卒攸望至太常卿左遷春州司馬而死延秀伏誅後武氏宗屬緣坐誅死及配流殆將盡矣先天二年制削士彠帝號依舊追贈太原王妻楊氏亦削后號依舊為太原王妃延秀承嗣第二子也則天時突厥默啜上言有女請和親制延秀與閻知微俱往突厥將親迎默啜女為妻既而默啜執知微入寇趙定等州故延秀久不得還神龍初默啜更請通和先令延秀送款始得歸封桓國公又授左衛中郎將時武崇訓為安樂公主壻即延秀從父兄數引至主第延秀久在蕃中解突厥語常於主第延秀唱突厥歌作胡旋舞有姿媚主甚喜之及崇訓死延秀得幸遂尚公主主韋后所生男女中最小初中宗遷於房州欲達州境生於路次性惠敏容質秀絶中宗韋后愛寵日深恣其所欲奏請無不允許恃寵橫縱權傾天下自王侯宰相已下除拜多出其門所營第宅並造安樂佛寺擬於宮掖巧妙過之令楊務廉於城西造定昆池於其莊延袤數里出降之時以皇后仗發於宮中中宗與韋后御安福門觀之燈燭供擬徹明如晝延秀拜席日授太常卿兼右衛將軍駙馬都尉改封恆國公實封五百戶廢休祥宅於金城坊造宅窮極壯麗帑藏為之空竭崇訓子數歲因加金紫光祿大夫太常卿同正員左衛將軍封鎬國公賜實封五百戶以嗣其父公主産男滿月中宗韋后幸其第就第放赦遣宰臣李嶠文士宋之問沈佺期張説閻朝隱等數百人賦詩美之延秀既恃恩放縱無所忌憚又公主府倉曹符鳳知延秀有不臣之心遂説曰今天下蒼生猶以武氏為念大周必可再興按讖書云黑衣神孫披天裳駙馬即神皇之孫也每勸令著皂襖子以應之及韋庶人敗延秀與公主在內宅格戰良久皆斬之後追貶為悖逆庶人三思元慶子也少以后族纍轉右衛將軍則天臨朝擢拜夏官尚書及革命封梁王賜實封一千戶尋拜天官尚書證聖元年轉春官尚書監修國史聖曆元年檢校內史二年進拜特進太子賓客仍並依舊監修國史三思略涉文史性傾巧便僻善事人由是特蒙信任則天數幸其第賞賜甚厚時薛懷義張易之昌宗皆承恩顧三思與承嗣每折節事之懷義欲乘馬承嗣三思必為之執轡又贈昌宗詩盛稱昌宗才貌是王子晉後身仍令朝士遞相屬和三思又以則天厭居深宮又欲與張易之昌宗等扈從馳騁以弄其權乃請創造三陽宮于嵩高山興泰宮于萬壽山請則天每歲臨幸前後工役甚衆百姓怨之神龍初進拜司空同中書門下三品加實封五百戶固辭不受未幾隨例降封為德靜郡王量減實封二百戶尋拜左散騎常侍則天遺制令復其所減實封初敬暉等立功後掌知國政三思慮其更為己患而令其子崇訓因安樂公主構誣敬暉等並流于嶺表而死自是三思威權日盛軍國政事多所參綜敬暉等所斥黜者皆能引復舊職令百官復修則天之法時人皆言其陰懷篡逆以比曹孟德司馬仲達雍州人韋月將高軫等並上疏言三思父子必為逆亂三思知而求索其罪有司希旨奏月將坐當棄市軫配流嶺外黃門侍郎宋璟執奏云月將所犯不合至死三思怒竟斥宋璟為外職三思既猜嫉正士嘗言不知何等名作好人唯有向我好者是好人耳又與其所親兵部尚書宗楚客將作大匠宗晉卿太府卿紀處訥鴻臚卿甘元柬遞相引致干黷時政侍御史周利用冉祖雍太僕丞李悛光祿丞宋之遜監察御史姚紹之等五人常為其耳目時人呼為三思五狗中宗尋又制武氏崇恩廟一依天授時舊禮享祭其昊陵順陵並置官員皆三思意也三思既與韋庶人及上官昭容私通嘗忌節愍太子又因安樂公主密謀廢黜之三年七月太子率羽林大將軍李多祚等發左右羽林兵殺三思及其子崇訓于其第並殺其親黨十餘人俄而事變太子既死中宗為三思舉哀廢朝五日贈太尉追封梁王諡曰宣安樂公主又以節愍太子首致祭于三思及崇訓靈柩前睿宗踐祚以三思父子俱有逆節制令斫棺暴尸平其墳墓崇訓三思第二子也則天時封為高陽郡王長安中尚安樂郡主時三思用事於朝欲寵其禮中宗為太子在東宮三思宅在天津橋南自重光門內行親迎禮歸於其宅三思又令宰臣李嶠蘇味道詞人沈佺期宋之問徐彥伯張説閻朝隱崔融崔湜鄭愔等賦花燭行以美之其時張易之昌宗宗楚客兄弟貴盛時假詞於人皆有新句崇訓授左衛中郎將神龍元年拜駙馬都尉遷太常卿兼左衛將軍降封酆國公仍賜實封五百戶尋徙封鎬國公二年兼太子賓客攝左衛將軍及為節愍太子所殺優制贈開府儀同三司追贈魯王諡曰忠懿宗則天伯父士逸之孫也父元忠高宗時仕至倉部郎中天授年封士逸為蜀王懿宗封為河內郡王歷遷洛州長史左金吾衛大將軍萬歲通天年中契丹賊帥孫萬榮寇河北命懿宗為大總管討之軍次趙州及聞賊將至冀州懿宗懼便欲棄軍而遁人或謂曰賊衆極多然其軍無輜重以抄掠為資若按兵以守勢必離散因而擊之可有大功也懿宗不聽遂退據相州時人嗤其怯懦由是賊衆進屠趙州而去尋又令懿宗安撫河北諸州先是百姓有脅從賊衆後得歸來者懿宗以為同反總殺之仍生刳取其膽後行刑流血盈前言笑自若初孫萬榮別帥何阿小攻陷冀州亦多屠害士女至是時人號懿宗與阿小為兩何為之語曰唯此兩何殺人最多懿宗又自天授已來嘗受中旨推鞫制獄王公大臣多被陷成其罪時人以為周興來俊臣之亞焉神龍初隨例降爵封耿國公纍轉懷州刺史尋卒攸暨則天伯父士讓孫也天授中封士讓為楚王攸暨封千乘郡王賜爵實封三百戶兄攸寧為建昌郡王實封四百戶攸寧歷遷鳳閣侍郎納言冬官尚書病卒攸暨初為右衛中郎將尚太平公主授駙馬都尉纍遷右衛將軍進封定王又加實封三百戶俄又改安定郡王歷遷司禮卿左散騎常侍加特進神龍中拜司徒復封定王實封滿一千戶固辭不拜尋而隨例降封樂壽郡王拜右散騎常侍加開府儀同三司延秀等誅後又降封楚國公延和元年卒贈太尉並州大都督追封定王尋以公主謀逆令平毀其墓太平公主者高宗少女也以則天所生特承恩寵初永隆年降駙馬薛紹紹垂拱中被誣告與諸王連謀伏誅則天私殺攸暨之妻以配主焉公主豐碩方額廣頤多權略則天以為類己每預謀議宮禁嚴峻事不令泄公主亦畏懼自檢但崇飾邸第二十餘年天下獨有太平一公主父為帝母為后夫為親王子為郡王貴盛無比永淳已前朝制親王食實封八百戶有至一千戶公主出降三百戶公主加五十戶太平食湯沐之邑一千二百戶聖曆初加至三千戶神龍元年預誅張易之謀有功進號鎮國太平公主相王加號安國相王並食實封通前五千戶賞賜不可勝紀公主薛氏二男二女武氏二男一女並食實封又相王衛王重俊成王千里宅遣衛士宿衛環其所居十步置一仗舍持兵巡徼同於宮禁太平長寧安樂三公主置鋪一如親王二年正月置公主府景龍二年公主男崇簡崇敏崇行同授三品與漁陽王兄弟四人同制時中宗仁善韋后上官昭容用事禁中皆以為智謀不及公主甚憚之公主日益豪橫進達朝士多至大官詞人後進造其門者或有貧窘則遺之金帛士亦翕然稱之及唐隆元年六月韋后作逆稱制偽尊溫王玄宗居臨淄邸憤之將清內難公主又預其謀令男崇簡從之及立溫王數日天下之心歸於相府難為其議公主入啓幼主以王室多故資於長君乃提下幼主因與玄宗大臣尊立睿宗公主頻著大勳益尊重乃加實封五千戶通前滿一萬戶公主子崇行崇敏崇簡三人封異姓王崇行國子祭酒四人九卿三品每入奏事坐語移時所言皆聽薦人或驟歷清職或至南北衙將相權移人主軍國大政事必參決如不朝謁則宰臣就第議其可否公主由是滋驕田園遍於近甸膏腴而市易造作器物吳蜀嶺南供送相屬於路綺疏寶帳音樂輿乘同於宮掖侍兒披羅綺常數百人蒼頭監嫗必盈千數外州供狗馬玩好滋味不可紀極有胡僧惠範家富於財寶善事權貴公主與之私奏為聖善寺主加三品封公殖貨流於江劍公主懼玄宗英武乃連結將相專謀異計其時宰相七人五出公主門常元楷李慈掌禁兵常私謁公主先天二年七月玄宗在武德殿事漸危逼乃勒兵誅其黨竇懷貞蕭至忠岑羲等公主遽入山寺數日方出賜死于家公主諸子及黨與死者數十人籍其家財貨山積珍奇寶物侔於御府馬牧羊牧田園質庫數年徵斂不盡惠範家産亦數十萬貫攸緒惟良子也少有志行天授中封安平郡王歷遷殿中監出為揚州大都督府長史聖曆中棄官隱于嵩山以琴書藥餌為務中宗即位以安車備禮徵之降書曰朕聞大隱忘情不去朝市至人無迹何所凝滯王高標峻尚雅操孤貞有咸一之用弘體二之德學究深遠理實精微草芥貂蟬錙銖纓紱蔭松山而辭竹苑去朱邸而臥清溪逍遙林壑傲睨箕潁有年歲矣朕虔膺聖曆重闡皇基保乂邦家寧輯區宇求賢採彥俯谷窺山王之所居接近嵩嶽長望高烈思滿風煙駐驆喬巖追尋大隗鳴鑾洞岫詢訪廣成機務殷繁有懷莫遂今遣國子司業杜慎盈以禮命徵辟掃夔龍之第虛稷契之筵神化丹青朕之志也豈以黃屋之貴傾彼白雲之心通變之宜希從降志延貯閶闔若在汾陽攸緒應召至都授太子賓客尋請歸嵩山制從之令京官五品已上餞送于定鼎門外及三思延秀等構逆諸武多坐誅戮唯攸緒以隱居不預其禍時論美之睿宗即位又降敕曰頃以賊臣結黨后族擅權扇動宮闈肆行鴆毒靈祇所感姦惡伏誅今得宗社乂安天地交泰卿久厭簪紱早慕林泉守道不回見幾而作興言高尚有足嘉稱但怒用不遷罪無相及為善有驗卿之謂與或慮驚疑故令慰謝其見重如此尋徵為太子賓客不就開元二年攸緒又請就廬山居止制不許仍令州縣數加存問不令外人侵擾十一年卒年六十九薛懷義者京兆鄠縣人本姓馮名小寶以鬻臺貨為業偉形神有膂力為市於洛陽得幸於千金公主侍兒公主知之入宮言曰小寶有非常材用可以近侍因得召見恩遇日深則天欲隱其迹便於出入禁中乃度為僧又以懷義非士族乃改姓薛令與太平公主壻薛紹合族令紹以季父事之自是與洛陽大德僧法明處一惠儼稜行感德感知靜軌宣政等在內道場念誦懷義出入乘馬中官侍從諸武朝貴匍匐禮謁人間呼為薛師垂拱初説則天於故洛陽城西修故白馬寺懷義自護作寺成自為寺主頗恃恩狂蹶其下犯法人不敢言右臺御史馮思勗屢以法劾之懷義遇勗於途令從者毆之幾死又於建春門內敬愛寺別造殿宇改名佛授記寺垂拱四年拆乾元殿於其地造明堂懷義充使督作凡役數萬人曳一大木千人置號頭頭一千人齊和明堂大屋凡三層計高三百尺又於明堂北起天堂廣袤亞於明堂懷義以功拜左威衛大將軍封梁國公永昌中突厥默啜犯邊以懷義為清平道大總管率軍擊之至單于臺刻石紀功而還加輔國大將軍進右衛大將軍改封鄂國公柱國賜帛二千段懷義與法明等造大雲經陳符命言則天是彌勒下生作閻浮提主唐氏合微故則天革命稱周懷義與法明等九人並封縣公賜物有差皆賜紫袈娑銀龜袋其偽大雲經頒於天下寺各藏一本令升高座講説則天將革命誅殺宗屬諸王唯千金公主以巧媚善進奉獨存抗疏請以則天為母因得曲加恩寵改邑號為延安大長公主加實封賜姓武氏以子克乂娶魏王武承嗣女內門參問不限早晚見則盡歡長壽二年默啜復犯塞又以懷義為代北道行軍大總管以李多祚蘇宏暉為將未行改朔方道行軍大總管以內史李昭德為行軍長史鳳閣侍郎平章事蘇味道為行軍司馬契苾明曹仁師沙吒忠義等十八將軍以討之未行虜退乃止懷義後厭入宮中多居白馬寺刺血畫大像選有膂力白丁度為僧數滿千人侍御史周矩疑其姦奏請劾之不許固請之則天曰卿且退朕即令去矩至臺薛師亦至乘馬踏階而下便坦腹於牀矩召臺吏將按之遽乘馬而去矩具以聞則天曰此道人風病不可苦問所度僧任卿勘當矩按之窮其狀以聞諸僧悉配遠州遷矩天官員外郎竟為薛師所構下獄免官後有御醫沈南璆得幸薛師恩漸衰恨怒頗甚證聖中乃焚明堂天堂並為灰燼則天愧而隱之又令懷義充使督作乃於明堂下置九州鼎鑄銅為十二屬形象置於本辰位皆高一丈懷義率人作號頭安置之其後益驕倨則天惡之令太平公主擇膂力婦人數十密防慮之人有發其陰謀者太平公主乳母張夫人令壯士縛而縊殺之以輦車載尸送白馬寺其侍者僧徒皆流竄遠惡處韋溫中宗韋庶人從父兄也父玄儼高宗末官至許州刺史玄儼弟玄貞初為普州參軍以女為皇太子妃擢拜豫州刺史中宗嗣位妃為后及帝降為廬陵王玄貞配流欽州而死后母崔氏為欽州首領寧承兄弟所殺玄貞有四子洵浩洞泚亦死於容州后二妹逃竄獲免間行歸長安及中宗復位韋氏復為皇后其日追贈玄貞為上洛郡王左拾遺賈虛己上疏諫曰孔子曰惟名與器不可以假人且非李氏而王自古盟書所棄今陛下創制謀始垂範將來為皇王令圖子孫明鏡匡復未幾后族有私臣雖庸愚尚知未可史官執簡必是直書今萬姓顒然聞一善令莫不途歌里頌延頸向風欣然慕化日恐不及陛下奈何行私惠使樵夫議之即先朝贈太原王殷鑒不遠同雲生於膚寸尋木起於蘖栽誠可惜也渙汗既行難改成命臣望請皇后抗表固辭使天下知弘讓之風彤管著沖謙之德是則巍巍聖鑒無得而稱疏奏不省尋又追贈玄貞為太師雍州牧益州大都督玄儼為特進並州大都督魯國公遣使迎玄貞及崔氏喪柩歸京師又遣廣州都督周仁軌率兵討斬寧承兄弟以其首祭于崔氏擢拜仁軌左羽林大將軍賜爵汝南郡公食實封五百戶及玄貞等柩將至上與后登長樂宮望喪而泣加贈玄貞為酆王諡曰文獻仍號其廟曰褒德陵曰榮先各置官員並給戶一百人守衛灑掃又贈玄貞子洵為吏部尚書汝南郡王浩太常卿武陵郡王洞衛尉卿淮南郡王泚太僕卿上蔡郡王亦遣使迎其喪柩於京師溫神龍中纍遷禮部尚書封魯國公弟湑左羽林將軍封曹國公后妹夫陸頌為國子祭酒馮太和為太常少卿太和尋卒又適嗣虢王雍湑子捷尚成安公主溫從祖弟濯尚定安公主皆拜駙馬都尉景龍三年溫遷太子少保同中書門下三品仍遙授揚州大都督溫等既居榮要燻灼朝野時人比之武氏湑及陸頌相次病卒賻贈甚厚及中宗崩后令溫總知內外兵馬守援宮掖又引從子播族弟璿弟捷濯等分掌屯營及左右羽林軍臨淄王討韋氏溫等皆坐斬宗族無少長皆死語在韋庶人傳睿宗即位仍令削平玄貞及洵等墳墓王仁皎玄宗王庶人父也景龍中官至長上果毅玄宗即位以后父歷將作大匠太僕卿遷開府儀同三司封祁國公仁皎不預朝政但厚自奉養積子女財貨而已開元七年卒贈太尉官供葬事柩車既發上於望春亭遙望之令張説為其碑文玄宗親書石焉子守一守一與后雙生守一與玄宗有舊及上登極以清陽公主妻之從討蕭至忠岑羲等有功自尚乘奉御遷殿中少監特封晉國公纍轉太子少保父卒襲爵祁國公十一年坐與庶人潛通左道左遷柳州司馬行至藍田驛賜死守一性貪鄙積財巨萬及籍沒其家財帛不可勝計吳漵章敬皇后之弟也濮州濮陽人祖神泉位終縣令父令圭益州郫縣丞寶曆二年代宗始封拜外族贈神泉司徒令圭太尉令圭母弟前宣城令令瑤為開府儀同三司太子家令封濮陽郡公中郎將令瑜為開府儀同三司太子諭德濟陽郡公漵時為盛王府録事參軍拜開府儀同三司太子詹事濮陽郡公以元舅遷鴻臚少卿金吾將軍建中初遷大將軍漵雖居戚屬恭遜謙和人皆重之涇師之亂從幸奉天盧嵵白志貞謂德宗曰臣細觀朱泚心迹必不至為戎首佇當效順宜擇大臣一人入京師慰諭以觀其心上召從幸羣臣言之皆憚其行漵起奏曰不以臣才望無堪臣願此行德宗甚悅漵退而謂人曰人臣食君之祿死君之難臨危自計非忠也吾忝戚屬今日委身於賊誠知必死不欲聖情慊於無人犯難也即日齎詔見泚深陳上待屬之意時泚逆謀已定貌雖從命而心已異乃留漵於客省竟被害上聞之悲悼不已贈太子太傅賜其家實封二百戶一子五品正員官敕收城日葬事官給弟湊湊寶曆中與兄漵同日開府授太子詹事俱封濮陽郡公湊以兄弟三品固辭太過乞授卑官乃以湊檢校太子賓客兼太子家令充十王宅使纍轉左金吾衛大將軍湊小心謹慎智識周敏特承顧問偏見委信大曆中滑帥令狐彰汴帥田神功相次歿於理所時藩方兵驕乘戎帥喪亡人情多梗代宗命湊銜命撫慰至必委曲説諭隨所欲為之奏請皆得軍民和協帝深重之宰臣元載弄權招致賄賂醜迹日彰帝惡之將加之法恐左右泄漏無與言者唯與湊密計圖之及收載於內侍省同列王縉其黨楊炎王昂韓洄包佶韓會等皆當從坐籍沒湊諫救百端言法宜從寬縉等從坐理不至死若不降以等差一例極刑恐虧損聖德由是縉等得減死流貶之大曆末丁繼母喪免建中初起為右衛將軍兼通州刺史貞元初入為太子賓客出為福州刺史御史中丞福建觀察使為政勤儉清苦美譽日聞宰相竇參以私怨惡之數加譖毀又言湊風病不任趨馳德宗召湊至京師對于別殿上令殿上行走以驗其病否由是悟參之誣因是惡參尋以湊為陝州大都督府長史陝虢觀察使以代參之黨李翼會劉玄佐卒以湊檢校兵部尚書汴州刺史御史大夫宣武軍節度使時汴州軍亂殺牙將曹金岸縣令李邁謀立玄佐子士寧上將遣兵送湊赴鎮召宰臣議竇參深沮其行恐軍中拒命乃召湊回授右金吾衛大將軍而以梁宋節鉞授士寧貞元十四年春夏旱穀貴人多流亡京兆尹韓臯以政事不理黜官上召湊面授京兆尹即日令視事經宿方下制湊孜孜為理以勤儉為務人樂其政時宮中選內官買物於市倚勢強賈物不充價人畏而避之呼為宮市掌賦者多與中貴人交結假借不言其弊湊為京尹便殿從容論之曰物議以中人買物於市稍不便於人此事甚細虛掇流議凡宮中所須責臣可辦不必更差中使若以臣府縣外吏不合預聞宮中所須則乞選內官年高謹重者充宮市令庶息人間論議又奏掌間彍騎飛龍內園芙蓉及禁軍諸司等使雜供手力資課太多量宜減省上多從之初府掾吏以湊起自戚藩不諳簿領凡有疑獄難決之事多候湊將出時方呈冀免指擲瑕病湊雖倉卒閲視必指其姦幸之處下筆決斷無毫釐之差掾吏非大過不行笞責而召面按問詰責而釋之吏尤惕厲庶務咸舉文敬太子義章公主相繼薨歿上追念葬送之儀頗厚召集工役載土築墳妨民農務湊候上顧問極言之宗屬門吏以湊論諫太繁恐上厭苦每以簡約規之湊曰聖上明哲憂勞四海必不以公主太子之鍾念而忽疲民但人多順旨不言若再三啓諫必動宸情則生民受賜長吏不言是為阿旨如窮民上訴罪在何人議者重之以能政兼兵部尚書官街樹缺所司植榆以補之湊曰榆非九衢之玩亟命易之以槐及槐陰成而湊卒人指樹而懷之湊於德宗為老舅漢魏故事多退居散地才免罪戾而已湊自貞元已來特承恩顧歷中外顯貴雖聖奬隆深亦由湊小心辦事奉職有方故也湊既疾不召巫醫藥不入口家人泣而勉之對曰吾以凡才濫因外戚進用起家便授三品歷顯位四十年壽登七十為人足矣更欲何求古之以親戚進用者罕有善終吾得歸全以侍先人幸也德宗知之令御醫進藥不獲已服之貞元十六年四月卒時年七十一贈尚書左僕射罷朝一日竇覦昭成皇后族姪父光華原尉覦以親蔭釋褐右衛率府兵曹參軍鄜坊節度臧希讓奏為判官纍授監察殿中侍御史檢校工部員外郎坊州刺史興元元年討李懷光於河中詔覦以坊州兵七百人屯郃陽賊平以功兼御史中丞遷同州刺史入朝為戶部侍郎覦無他才伎為吏有計數又以韓滉子壻故藩府辟召遂歷牧守宰相竇參覦再從姪參少依覦及參秉政力薦於朝故有二卿之拜數月為揚州大都督府長史御史大夫充淮南節度副大使知節度事既非德舉人咸薄之赴鎮旬日暴卒詔贈禮部尚書柳晟者肅宗皇后之甥母和政公主父潭官至太僕卿駙馬都尉晟少無檢操代宗於諸甥之中特加撫鞠俾與太子諸王同學授詩書恩寵罕比纍試太常卿德宗即位以與晟幼同硯席尤親之涇師之亂從幸奉天晟密啓曰願受詔入京城遊説羣賊冀其攜二德宗壯而許之晟與賊帥多有舊出入其門説誘之事泄為朱泚所擒械之於獄晟有力乃於獄中穿垣破械而遁落髮為僧間道歸行在遷將作少監元和初檢校工部尚書興元尹山南西道節度使罷鎮入朝以違詔進奉為御史元稹所劾詔宥之俄充入回鶻册立使復命遷左金吾衛大將軍元和十三年卒贈太子少保王子顏琅邪臨沂人莊憲皇后之父也祖思敬少從軍纍試太子賓客父難得有勇決善騎射天寶初為河源軍使吐蕃贊普王子郎支都有勇乘諳真馬寶鈿裝鞍出陳求鬬無敢與校者難得挾槍奮馬突前刺殺郎支都斬其首傳於京師軍還玄宗召見之令於殿前乘馬挾槍作刺郎支都之狀賜以錦袍金帶纍拜金吾將軍同正員天寶七載從哥舒翰擊吐蕃於積石軍虜吐谷渾王子悉弄參及子壻悉頰藏而還纍拜左武衛將軍關西遊奕使九載擊吐蕃收五橋拔樹敦城補白水軍使十三載從收九曲加特進祿山之叛從哥舒翰戰於潼關關門不守從肅宗幸靈武時行在闕軍賞難得進絹三千匹及金銀器等至德初試衛尉卿興平軍使兼鳳翔都知兵馬使進收京城與賊軍戰其下靳元曜戰酣墮馬難得馳救之賊射之中眉皮穿披下鄣目難得自拔去箭並皮掣落馳馬復戰血流被面而抗賊不已肅宗深嘉之從郭子儀攻安慶緒於相州纍封琅邪郡公英武軍使寶應二年卒贈潞州大都督子顏少從父征役纍官金紫光祿大夫檢校衛尉卿生后而卒順宗內禪以后生憲宗皇帝褒贈先代思敬司徒難得太傅子顏太師顏子重榮官至福王傅用官至太子賓客金吾將軍贊曰戚里之賢避寵畏權不恤禍患鮮能保全福盈者敗勢壓者顛武之惟良明於自然
