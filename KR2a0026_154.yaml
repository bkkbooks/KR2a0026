body:
  text: 舊唐書卷一百五十列傳第一百德宗順宗諸子舒王誼通王諶虔王諒肅王詳文敬太子謜資王謙代王諲照王誡欽王諤珍王諴郯王經均王緯漵王縱莒王紓密王綢郇王綜邵王約宋王結集王緗冀王絿和王綺衡王絢欽王績會王纁福王綰珍王繕撫王紘嶽王緄袁王紳桂王綸翼王綽蘄王緝德宗皇帝十一子昭德皇后王氏生順宗皇帝舒王誼昭靖太子之子文敬太子順宗之子諸妃生通王已下八王本録不載母氏舒王誼本名謨代宗第三子昭靖太子邈之子也以其最幼德宗憐之命之為子大曆十四年六月封舒王拜開府儀同三司與通王虔王同日封仍詔所司其開府俸料逐月進內尋以軍興罷支建中元年領四鎮北庭行軍涇原節度大使以涇州刺史孟皞為節度留後以誼愛弟之子諸王之長軍國大事欲其更踐必委試之明年尚父郭子儀病篤上御紫宸命誼持制書省之誼冠遠遊冠絳紗袍乘象輅駕駟馬飛龍騎士三百人隨之國府之官皆袴褶騎而導前鹵簿備引而不樂在遏密故也及門郭氏子弟迎拜於外王不答拜子儀臥不能興以手叩頭謝恩而已王解冠珮以常服傳詔勞問之三年蔡帥李希烈叛詔哥舒曜討之八月希烈自帥衆三萬圍哥舒曜于襄城又詔河南都統李勉援之勉捨襄城令大將唐漢臣等選徑兵徑襲許州以解圍漢臣未至許上遣中使追之責以違詔亟旋師為賊所乘漢臣之衆大敗勉恐東都危急乃分兵數千赴洛又為賊所隔賊衆急攻汴滑勉走宋州朝廷大聳乃詔誼為揚州大都督持節荊襄江西沔鄂等道節度兼諸軍行營兵馬元帥改名誼又以哥舒翰聲近士卒竊議改封普王令統攝諸軍進攻希烈仍以兵部侍郎蕭復為戶部尚書兼御史大夫元帥府統軍長史舊例有行軍長史以復父名衡特更之又以新除潭州觀察使孔巢父為右庶子兼御史大夫充行軍左司馬以山南東道節度行軍司馬檢校兵部郎中兼御史中丞樊澤為諫議大夫兼御史中丞行軍右司馬刑部員外郎劉從一為吏部郎中兼中丞侍御史韋儹為工部郎中兼中丞並充元帥府判官兵部員外郎高參為本司郎中充元帥府掌書記以右金吾大將軍渾瑊檢校工部尚書兼御史大夫為中軍虞候江西節度使嗣曹王臯為前軍兵馬使鄂嶽團練使李兼為之副山南東道節度使賈耽為中軍兵馬使荊南節度使張伯儀充後軍兵馬使以左神武軍使王價檢校太子賓客左衛將軍高承謙檢校太子詹事前司農少卿郭曙檢校左庶子前祕書省著作郎常願為祕書少監並充元帥府押衙制下未行涇原兵亂而止德宗初聞兵士出怨言不得賞設乃令誼與翰林學士姜公輔傳詔安撫許以厚賞行及內門兵已陳於闕前誼狼狽而還遂奉德宗出幸奉天賊之攻城誼晝夜傳詔慰勞諸軍僅不解帶者月餘從車駕還宮復封舒王開府儀同三司揚州大都督如故永貞元年十月薨廢朝三日通王諶德宗第三子也大曆十四年封制授開府儀同三司貞元九年十月領宣武軍節度大使汴宋等州觀察支度營田等使以宣武都知兵馬使李萬榮為留後王不出閣十一年河東帥李自良卒以謀為河東節度大使以行軍司馬李說知府事充留後亦不出閣虔王諒德宗第四子大曆十四年封授開府儀同三司貞元二年領蔡州節度大使申光蔡觀察等使以大將吳少誠為留後十年領朔方靈鹽節度大使靈州大都督以朔方行軍司馬李欒為靈府左司馬知府事朔方留後十一年九月橫海大將程懷信逐其帥懷直十月以諒領橫海節度大使滄景觀察等使以都知兵馬使程懷信為留後王不出閣十六年徐帥張建封卒徐軍亂又以諒領徐州節度大使徐泗濠觀察處置等使以建封子愔為留後肅王詳德宗第五子大曆十四年六月封建中三年十月薨時年四歲廢朝三日贈揚州大都督性聰惠上尤憐之追念無已不令起墳墓詔如西域法議層甎造塔禮儀使判官司門郎中李岩上言曰墳墓之義經典有常自古至今無聞異制層甎起塔始於天竺名曰浮圖行之中華竊恐非禮況肅王天屬名位尊崇喪葬之儀存乎簡冊舉而不法垂訓非輕伏請準令造墳庶遵典禮詔從之文敬太子謜順宗之子德宗愛之命為子貞元四年封雍王授開府儀同三司七年定州張孝忠卒以謜領義武軍節度大使易定觀察等使以定州刺史張茂昭為留後十年六月潞帥李抱真卒又以謜領昭義節度大使澤潞邢洺磁觀察等使以潞將王虔休為潞府司馬知留後十五年十月薨時年十八廢朝三日贈文敬太子所司備禮冊命其年十二月葬於昭應有陵無號發引之日百官送於通化門外列位哭送是日風雪寒甚近歲未有詔置陵署令丞資王謙德宗第七子大曆十四年封代王諲德宗第八子本封縉雲郡王早薨建中二年追封代王昭王誡德宗第九子貞元二十一年封欽王諤德宗第十子順宗即位詔曰王者之制子弟畢封所以固藩輔而重社稷古今之通義也第十弟諤等寬簡忠厚生知孝敬行皆由禮志不違仁樂善本於性情好賢宗於師傅纘修六藝達人倫風化之源博習羣言知惠和睦友之道溫恭朝夕允茂厥猷克有嘉聞宜封土宇諤可封欽王第十一弟可封珍王珍王諴德宗第十一子與欽王同制封德宗仁孝動循法度雖子弟姑妹之親無所假借建中初詔親王子弟帶開府朝秩者出就本班又以公主郡縣主出降與舅姑抗禮詔曰冠婚之義人倫大經昔唐堯降嬪帝乙歸妹逮於漢氏同姓主之爰自近古禮教陵夷公郡法度僭差殊制姻族闕齒序之義舅姑有拜下之禮自家刑國多愧古人今縣主有行將俟嘉命俾親執棗栗以見舅姑敬遵宗婦之儀降就家人之禮事資變革以抑浮華其令禮儀使與禮官博士約古今舊儀及開元禮詳定公主郡縣主出降覿見之文儀以聞初開元中置禮會院于崇仁里自兵興已來廢而不修故公郡縣主不時降嫁殆三十年至有華髮而猶丱者雖居內館而不獲覲見十六年矣凡皇族子弟皆散棄無位或流落他縣湮沉不齒録無異匹庶及德宗即位用枝屬以時婚嫁公族老幼莫不悲感初即位將謁太廟始與公郡縣主相見於大次中尊者展其敬幼者申其愛歔欷哭泣之聲聞於朝公卿陪列者為之悽然每將有大禮必與諸父昆弟同其齊次及嶽陽信寧宜芳永順朗陵陽安襄城德清南華元城新鄉等十一縣主同月出降敕所司大小之物必周其用至於櫛纚笄總皆經於心各給錢三百萬使中官主之以買田業不得侈用其衣服之飾使內司計造不在此數是時所司度人用一籠花計錢七十萬帝曰籠花首飾婦禮不可闕然用費太廣即無謂也宜損之又損之及三萬而止帝謂主等曰吾非有所愛但不欲無益之費耳各以餘錢六十萬賜之以備他用舊例皇姬下嫁舅姑返拜而婦不答及是制下禮官定制曰既成婚於禮會院明晨舅坐於堂東階西向姑南向婦執笲盛以棗栗升自西階再拜跪奠於舅席前退降受笲盛以腶修升北面再拜跪奠於姑席前降東面拜壻之伯叔兄弟姊妹已而謝恩於光順門壻之親族亦隨之然後會宴於十六宅是日縣主皆如其制初贈司徒沈易良之妻崔氏即太后之季父母也帝每見之方屣而鞾召王韋二美人出拜敕崔氏坐受勿答故戚屬之間罔不憚其敬不肅而遵禮法焉順宗二十三子莊憲皇后王氏生憲宗皇帝王昭儀生郯王經趙昭儀生宋王結王昭儀生郇王綜王昭訓生衡王絢餘十八王本録不載母氏郯王經本名渙順宗次子始封建康郡王貞元二十一年進封大和八年薨均王緯本名沔順宗第三子始封洋川郡王貞元二十一年進封漵王縱本名洵順宗第四子初授殿中監封臨淮郡王貞元二十一年進封莒王紓本名浼順宗第五子初授祕書監封弘農郡王貞元二十一年進封大和八年薨密王綢本名泳順宗第六子始封漢東郡王貞元二十一年進封元和二年九月薨郇王綜本名湜順宗第七子初授少府監封晉陵郡王貞元二十一年進封元和三年四月薨邵王約本名漵順宗第八子初授國子祭酒封高平郡王貞元二十一年進封宋王結本名滋順宗第九子始封雲安郡王貞元二十一年進封長慶二年薨集王緗貞元二十一年封長慶二年薨冀王絿本名淮順宗第十子初授太常卿封宣城郡王貞元二十一年進封大和九年薨和王綺本名湑順宗第十一子始封德陽郡王貞元二十一年進封大和七年薨衡王絢順宗第十二子貞元二十一年封寶曆二年薨欽王績順宗第十三子貞元二十一年封會王纁順宗第十四子貞元二十一年封元和五年十一月薨福王綰本名浥順宗第十五子母莊憲王皇后憲宗同出初授光祿卿封河東郡王貞元二十一年進封咸通元年特冊拜司空明年薨珍王繕本名況順宗第十六子初授衛尉卿封洛交郡王貞元二十一年進封撫王紘順宗第十七子貞元二十一年封咸通四年特冊拜司空五年冊司徒乾符三年冊太尉其年薨嶽王緄順宗第十八子貞元二十一年封大和二年薨袁王紳順宗第十九子貞元二十一年封大和十四年薨桂王綸順宗第二十子貞元二十一年封大和九年薨翼王綽順宗第二十一子貞元二十一年封咸通二年薨蘄王緝順宗第二十二子咸通八年薨史臣曰夫聖人君臨宇縣肇啓邦基莫不受命上玄膺名帝籙自太昊已降五運相推迄于殷湯曆數綿永但設均平之化未聞封建之名洎乎周漢始以子弟建侯樹屏以作維城及王室浸微遂有莽卓之亂唐室自艱難已後兩河兵革屢興諸王雖封竟不出閣夫帝王居寰宇之尊撫億兆之衆但能平一理道夙夜嚴恭任賢使能設官分職自然四海樂推天命所祐縱無封建亦鴻基永固安俟嬰孺鎮重哉贊曰孝文秉禮道弘藩邸睦族展親儀刑戚里自閣臨藩所謂周爰無如惡鳥終懷籠樊
