body:
  text: 舊唐書卷五十志第三十刑法古之聖人為人父母莫不制禮以崇敬立刑以明威防閑於未然懼爭心之將作也故有輕重三典之異宮墨五刑之差度時而施宜因事以議制大則陳之原野小則肆諸市朝以禦姦宄用懲禍亂興邦致理罔有弗由於此者也暨淳朴既消澆偽斯起刑增為九章積三千雖有凝脂次骨之峻而錐刀之末盡爭之矣自漢迄隋世有增損而罕能折衷隋文帝參用周齊舊政以定律令除苛慘之法務在寬平比及晚年漸亦滋虐煬帝忌刻法令尤峻人不堪命遂至於亡高祖初起義師於太原即布寬大之令百姓苦隋苛政競來歸附旬月之間遂成帝業既平京城約法為十二條惟制殺人劫盜背軍叛逆者死餘並蠲除之及受禪詔納言劉文靜與當朝通識之士因開皇律令而損益之盡削大業所用煩峻之法又制五十三條格務在寬簡取便於時尋又敕尚書左僕射裴寂尚書右僕射蕭瑀及大理卿崔善為給事中王敬業中書舍人劉林甫顏師古王孝遠涇州別駕靖延太常丞丁孝烏隋大理丞房軸上將府參軍李桐客太常博士徐上機等撰定律令大略以開皇為準于時諸事始定邊方尚梗救時之弊有所未暇惟正五十三條格入於新律餘無所改至武德七年五月奏上乃下詔曰古不云乎萬邦之君有典有則故九疇之興於夏世兩觀之法大備隆周所以禁暴懲姦弘風闡化安民立政莫此為先自戰國紛擾恃詐任力苛制煩刑於茲競起秦幷天下隳滅禮教恣行酷烈害虐蒸民宇內騷然遂以顛覆漢氏撥亂思易前軌雖復務從約法蠲削嚴刑尚行葅醢之誅猶設錙銖之禁字民之道實有未弘刑措之風以茲莫致爰及魏晉流弊相沿寬猛乖方綱維失序下凌上替政散民凋皆由法令湮訛條章混謬自斯以後宇縣瓜分戎馬交馳未遑典制有隋之世雖云釐革然而損益不定疏舛尚多品式章程罕能甄備加以微文曲致覽者惑其淺深異例同科用者殊其輕重遂使姦吏巧詆任情與奪愚民妄觸動陷羅網屢聞釐革卒以無成朕膺期受籙寧濟區宇永言至治興寐為勞補千年之墜典拯百王之餘弊思所以正本澄源式清流末永垂憲則貽範後昆爰命羣才修定科律但今古異務文質不同喪亂之後事殊曩代應機適變救弊斯在是以斟酌繁省取合時宜矯正差遺務從體要迄茲歷稔撰次始畢宜下四方即令頒用庶使吏曹簡肅無取懸石之多奏讞平允靡競錐刀之末勝殘去殺此焉非遠於是頒行天下及太宗即位又命長孫無忌房玄齡與學士法官更加釐改戴冑魏徵又言舊律令重於是議絞刑之屬五十條免死罪斷其右趾應死者多蒙全活太宗尋又愍其受刑之苦謂侍臣曰前代不行肉刑久矣今忽斷人右趾意甚不忍諫議大夫王珪對曰古行肉刑以為輕罪今陛下矜死刑之多設斷趾之法格本合死今而獲生刑者幸得全命豈憚去其一足且人之見者甚足懲誡上曰本以為寬故行之然每聞惻愴不能忘懷又謂蕭瑀陳叔達等曰朕以死者不可再生思有矜愍故簡死罪五十條從斷右趾朕復念其受痛極所不忍叔達等咸曰古之肉刑乃在死刑之外陛下於死刑之內改從斷趾便是以生易死足為寬法上曰朕意以為如此故欲行之又有上書言此非便公可更思之其後蜀王法曹參軍裴弘獻又駁律令不便於時者四十餘事太宗令參掌刪改之弘獻於是與玄齡等建議以為古者五刑刖居其一及肉刑廢制為死流徒杖笞凡五等以備五刑今復設刖足是為六刑減死在於寬弘加刑又加煩峻乃與八座定議奏聞於是又除斷趾法改為加役流三千里居作二年又舊條疏兄弟分後蔭不相及連坐俱死祖孫配沒會有同州人房強弟任統軍於岷州以謀反伏誅強當從坐太宗嘗錄囚徒憫其將死為之動容顧謂侍臣曰刑典仍用蓋風化未洽之咎愚人何罪而肆重刑乎更彰朕之不德也用刑之道當審事理之輕重然後加之以刑罰何有不察其本而一概加誅非所以恤刑重人命也然則反逆有二一為興師動衆一為惡言犯法輕重有差而連坐皆死豈朕情之所安哉更令百僚詳議於是玄齡等復定議曰案禮孫為王父尸案令祖有蔭孫之義然則祖孫親重而兄弟屬輕應重反流合輕翻死據禮論情深為未愜今定律祖孫與兄弟緣坐俱配沒其以惡言犯法不能為害者情狀稍輕兄弟免死配流為允從之自是比古死刑殆除其半玄齡等遂與法司定律五百條分為十二卷一曰名例二曰衞禁三曰職制四曰戶婚五曰庫六曰擅興七曰賊盜八曰鬬訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄有笞杖徒流死為五刑笞刑五條自笞十至五十杖刑五條自杖六十至杖一百徒刑五條自徒一年遞加半年至三年流刑三條自流二千里遞加五百里至三千里死刑二條絞斬大凡二十等又有議請減贖當免之法八一曰議親二曰議故三曰議賢四曰議能五曰議功六曰議貴七曰議賓八曰議勤八議者犯死罪者皆條所坐及應議之狀奏請議定奏裁流罪已下減一等若官爵五品已上及皇太子妃大功已上親應議者周以上親犯死罪者上請流罪已下亦減一等若七品已上官及官爵得請者之祖父母父母兄弟姊妹妻子孫犯流罪已下各減一等若應議請減及九品已上官若官品得減者之祖父母父母妻子孫犯流罪已下聽贖其贖法笞十贖銅一斤遞加一斤至杖一百則贖銅十斤自此已上遞加十斤至徒三年則贖銅六十斤流二千里者贖銅八十斤流二千五百里者贖銅九十斤流三千里者贖銅一百斤絞斬者贖銅一百二十斤又許以官當罪以官當徒者五品已上犯私罪者一官當徒二年九品已上一官當徒一年若犯公罪者各加一年以官當流者三流同比徒四年仍各解見任除名者比徒三年免官者比徒二年免所居官者比徒一年又有十惡之條一曰謀反二曰謀大逆三曰謀叛四曰謀惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰內亂其犯十惡者不得依議請之例年七十以上十五以下及廢疾犯流罪以下亦聽贖八十已上十歲以下及篤疾犯反逆殺人應死者上請盜及傷人亦收贖餘皆勿論九十以上七歲以下雖有死罪不加刑比隋代舊律減大辟者九十二條減流入徒者七十一條其當徒之法唯奪一官除名之人仍同士伍凡削煩去𢀿變重為輕者不可勝紀又定令一千五百九十條為三十卷貞觀十一年正月頒下之又刪武德貞觀已來敕格三千餘件定留七百條以為格十八卷留本司施行斟酌今古除煩去弊甚為寬簡便於人者以尚書省諸曹為之目初為七卷其曹之常務但留本司者別為留司格一卷蓋編錄當時制敕永為法則以為故事貞觀格十八卷房玄齡等刪定永徽留司格十八卷散頒格七卷長孫無忌等刪定永徽中又令源直心等刪定惟改易官號曹局之名不易篇目永徽留司格後本劉仁軌等刪定垂拱留司格六卷散頒格三卷裴居道刪定太極格十卷岑羲等刪定開元前格十卷姚崇等刪定開元後格十卷宋璟等刪定皆以尚書省二十四司為篇目凡式三十有三篇亦以尚書省列曹及祕書太常司農光祿太僕太府少府及監門宿衞計帳名其篇目為二十卷永徽式十四卷垂拱神龍開元式並二十卷其刪定格令同太宗又制在京見禁囚刑部每月一奏從立春至秋分不得奏決死刑其大祭祀及致齋朔望上下弦二十四氣雨未晴夜未明斷屠日月及假日並不得奏決死刑其有赦之日武庫令設金雞及鼓於宮城門外之右勒集囚徒於闕前撾鼓千聲訖宣詔而釋之其赦書頒諸州用絹寫行下又繫囚之具有枷杻鉗鎖皆有長短廣狹之制量罪輕重節級用之其杖皆削去節目長三尺五寸訊囚杖大頭徑三分二釐小頭二分二釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分半其決笞者腿分受決杖者背腿臀分受及須數等拷訊者亦同其拷囚不過三度總數不得過二百杖罪已下不得過所犯之數諸斷罪而無正條其應出罪者則舉重以明輕其應入罪者則舉輕以明重稱加者就重次稱減者就輕次惟二死三流同為一減不得加至於死斷獄而失於出入者以其罪罪之失入者各減三等失出者各減五等初太宗以古者斷獄必訊於三槐九棘之官乃詔大辟罪中書門下五品已上及尚書等議之其後河內人李好德風疾瞀亂有妖妄之言詔按其事大理丞張蘊古奏好德癲病有徵法不當坐治書侍御史權萬紀劾蘊古貫相州好德之兄厚德為其刺史情在阿縱奏事不實太宗曰吾常禁囚於獄內蘊古與之弈棋今復阿縱好德是亂吾法也遂斬於東市既而悔之又交州都督盧祖尚以忤旨斬於朝堂帝亦追悔下制凡決死刑雖令即殺仍三覆奏尋謂侍臣曰人命至重一死不可再生昔世充殺鄭頲既而悔之追止不及今春府史取財不多朕怒殺之後亦尋悔皆由思不審也比來決囚雖三覆奏須臾之間三奏便訖都未得思三奏何益自今已後宜二日中五覆奏下諸州三覆奏又古者行刑君為徹樂減膳朕今庭無常設之樂莫知何徹然對食即不啖酒肉自今已後令與尚食相知刑人日勿進酒肉內教坊及太常並宜停教且曹司斷獄多據律文雖情在可矜而不敢違法守文定罪或恐有冤自今門下覆理有據法合死而情可宥者宜錄狀奏自是全活者甚衆其五覆奏以決前一日二日覆奏決日又三覆奏惟犯惡逆者一覆奏而已著之於令太宗既誅張蘊古之後法官以出罪為誡時有失入者又不加罪焉由是刑網頗密帝嘗問大理卿劉德威曰近來刑網稍密何也德威對曰律文失入減三等失出減五等今失入則無辜失出則便獲大罪所由吏皆深文太宗然其言由是失於出入者令依律文斷獄者漸為平允十四年又制流罪三等不限以里數量配邊惡之州其後雖存寬典而犯者漸少高宗即位遵貞觀故事務在恤刑嘗問大理卿唐臨在獄繫囚之數臨對曰見囚五十餘人惟二人合死帝以囚數全少怡然形於顏色永徽初敕太尉長孫無忌司空李勣左僕射于志寧右僕射張行成侍中高季輔黃門侍郎宇文節柳奭右丞段寶玄太常少卿令狐德棻吏部侍郎高敬言刑部侍郎劉燕客給事中趙文恪中書舍人李友益少府丞張行實大理丞元紹太府丞王文端刑部郎中賈敏行等共撰定律令格式舊制不便者皆隨刪改遂分格為兩部曹司常務為留司格天下所共者為散頒格其散頒格下州縣留司格但留本司行用焉三年詔曰律學未有定疏每年所舉明法遂無憑準宜廣召解律人條義疏奏聞仍使中書門下監定於是太尉趙國公無忌司空英國公勣尚書左僕射兼太子少師監修國史燕國公志寧銀青光祿大夫刑部尚書唐臨太中大夫守大理卿段寶玄朝議大夫守尚書右丞劉燕客朝議大夫守御史中丞賈敏行等參撰律疏成三十卷四年十月奏之頒于天下自是斷獄者皆引疏分析之永徽五年五月上謂侍臣曰獄訟繁多皆由刑罰枉濫故曰刑者成也一成而不可變末代斷獄之人皆以苛刻為明是以秦氏網密秋荼而獲罪者衆今天下無事四海乂安欲與公等共行寬政今日刑罰得無枉濫乎無忌對曰陛下欲得刑法寬平臣下猶不識聖意此法弊來已久非止今日若情在體國即共號癡人意在深文便稱好吏所以罪雖合杖必欲遣徒理有可生務入於死非憎前人陷於死刑陛下矜而令放法司亦宜固請但陛下喜怒不妄加於人刑罰自然適中上以為然永徽六年七月上謂侍臣曰律通比附條例太多左僕射志寧等對舊律多比附斷事乃稍難解科條極衆數至三千隋日再定惟留五百以事類相似者比附科斷今日所停即是參取隋律修易條章既少極成省便龍朔二年改易官號因敕司刑太常伯源直心少常伯李敬玄司刑大夫李文禮等重定格式惟改曹局之名而不易篇第麟德二年奏上至儀鳳中官號復舊又敕左僕射劉仁軌右僕射戴至德侍中張文瓘中書令李敬玄右庶子郝處俊黃門侍郎來恆左庶子高智周右庶子李義琰吏部侍郎裴行儉馬載兵部侍郎蕭德昭裴炎工部侍郎李義琛刑部侍郎張楚金部郎中盧律師等刪緝格式儀鳳二年二月九日撰定奏上先是詳刑少卿趙仁本撰法例三卷引以斷獄時議亦為折衷後高宗覽之以為煩文不便因謂侍臣曰律令格式天下通規非朕庸虛所能創制並是武德之際貞觀已來或取定宸衷參詳衆議條章備舉軌躅昭然臨事遵行自不能盡何為更須作例致使觸緒多疑計此因循非適今日速宜改轍不得更然自是法例遂廢不用則天臨朝初欲大收人望垂拱初年令鎔銅為匭四面置門各依方色共為一室東面名曰延恩匭上賦頌及許求官爵者封表投之南面曰招諫匭有言時政得失及直言諫諍者投之西面曰申冤匭有得罪冤濫者投之北面曰通玄匭有玄象災變及軍謀秘策者投之每日置之於朝堂以收天下表疏既出之後不逞之徒或至攻訐陰私謗訕朝政者後乃令中書門下官一人專監其所投之狀仍責識官然後許進封行之至今焉則天又敕內史裴居道夏官尚書岑長倩鳳閣侍郎韋方質與刪定官袁智弘等十餘人刪改格式加計帳及勾帳式通舊式成二十卷又以武德已來垂拱已前詔敕便於時者編為新格二卷則天自製序其二卷之外別編六卷堪為當司行用為垂拱留司格時韋方質詳練法理又委其事於咸陽尉王守慎又有經理之才故垂拱格式議者稱為詳密其律令惟改二十四條又有不便者大抵依舊然則天嚴於用刑屬徐敬業作亂及豫博兵起之後恐人心動搖欲以威制天下漸引酷吏務令深文以案刑獄長壽年有上封事言嶺表流人有陰謀逆者乃遣司刑評事萬國俊攝監察御史就案之若得反狀斬決國俊至廣州遍召流人擁之水曲以次加戮三百餘人一時併命然後鍛鍊曲成反狀乃更誣奏云諸道流人多有怨望若不推究為變不遙則天深然其言又命攝監察御史劉光業王德壽鮑思恭王處貞屈貞筠等分往劍南黔中安南嶺南等六道按鞫流人光業所在殺戮光業誅九百人德壽誅七百人其餘少者不減數百人亦有雜犯及遠年流人亦枉及禍焉時周興來俊臣等相次受制推究大獄乃於都城麗景門內別置推事使院時人謂之新開獄俊臣又與侍御史侯思止王弘義郭霸李敬仁評事康暐衞遂忠等招集告事數百人共為羅織以陷良善前後枉遭殺害者不可勝數又造告密羅織經一卷其意旨皆網羅前人織成反狀俊臣每鞫囚無問輕重多以醋灌鼻禁地牢中或盛之于瓮以火圜遶炙之兼絕其糧餉至有抽衣絮以噉之者其所作大枷凡有十號一曰定百脉二曰喘不得三曰突地吼四曰著即承五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家又令寢處糞穢備諸苦毒每有制書寬宥囚徒俊臣必先遣獄卒盡殺重罪然後宣示是時海內慴懼道路以目麟臺正字陳子昂上書曰臣聞古之御天下者其政有三王者化之用仁義也霸者威之任權智也強國脅之務刑罰也是以化之不足然後威之威之不足然後刑之故至於刑則非王者之所貴矣況欲光宅天下追功上皇專任刑殺以為威斷可謂策之失者也臣伏覩陛下聖德聰明遊心太古將制靜宇宙保乂黎民發號施令出於誠慊天下蒼生莫不懸望聖風冀見神化道德為政將待於陛下矣臣聞之聖人出必有驅除蓋天人之符應休命也日者東南微孽敢謀亂常陛下順天行誅罪惡咸伏豈非天意欲彰陛下威武之功哉而執事者不察天心以為人意惡其首亂唱禍法合誅屠將息姦源窮其黨與遂使陛下大開詔獄重設嚴刑冀以懲姦觀于天下逆黨親屬及其交遊有涉嫌疑辭相連及莫不窮捕考校枝葉蟠拏大或流血小禦魑魅至有姦人熒惑乘險相誣糾告疑似冀圖爵賞叫于闕下者日有數矣于時朝廷徨徨莫能自固海內傾聽以相驚恐賴陛下仁慈憫其危懼賜以恩詔許其大功已上一切勿論人時獲泰謂生再造愚臣竊以忻然賀陛下聖明得天之機也不謂議者異見又執前圖比者刑獄紛紛復起陛下不深思天意以順休期尚以督察為理威刑為務使前者之詔不信於人愚臣昧焉竊恐非五帝三王伐罪弔人之意也臣竊觀當今天下百姓思安久矣曩屬北胡侵塞西戎寇邊兵革相屠向歷十載關河自北轉輸幽燕秦蜀之西馳騖湟海當時天下疲極矣重以大兵之後屬遭凶年流離飢餓死喪略半幸賴陛下以至聖之德撫寧兆人邊境獲安中國無事陰陽大順年穀累登天下父子始得相養矣揚州構禍殆有五旬而海中晏然纖塵不動豈非天下蒸庶厭凶亂哉臣以此卜之百姓思安久矣今陛下不務玄默以救疲民而又任威刑以失其望欲以察察為政肅理寰區愚臣暗昧竊有大惑且臣聞刑者政之末節也先王以禁暴釐亂不得已而用之今天下幸安萬物思泰陛下乃以末節之法察理平人愚臣以為非適變隨時之義也頃年以來伏見諸方告密囚累百千輩大抵所告皆以揚州為名及其窮竟百無一實陛下仁恕又屈法容之傍訐他事亦為推劾遂使姦臣之黨快意相讎睚眦之嫌即稱有密一人被告百人滿獄使者推捕冠蓋如市或謂陛下愛一人而害百人天下喁喁莫知寧所臣聞自非聖人不有外患必有內憂物理自然也臣不敢以古遠言之請指隋而說臣聞長老云隋之末世天下猶平煬帝不恭窮毒威武厭居皇極自總元戎以百萬之師觀兵遼海天下始騷然矣遂使楊玄感挾不臣之勢有大盜之心欲因人謀以竊皇業乃稱兵中夏將據洛陽哮虓之勢傾宇宙矣然亂未逾月而頭足異處何者天下之弊未有土崩蒸人之心猶望樂業煬帝不悟暗忽人機自以為元惡既誅天下無巨猾也皇極之任可以刑罰理之遂使兵部尚書樊子蓋專行屠戮大窮黨與海內豪士無不罹殃遂至殺人如麻流血成澤天下靡然思為亂矣於是蕭銑朱粲起於荊南李密竇建德亂於河北四海雲搖遂並起而亡隋族矣豈不哀哉長老至今談之委曲如是觀三代夏殷興亡已下至秦漢魏晉理亂莫不皆以毒刑而致敗壞也夫大獄一起不能無濫何者刀筆之吏寡識大方斷獄能者名在急刻文深網密則共稱至公爰及人主亦謂其奉法於是利在殺人害在平恕故獄吏相誡以殺為詞非憎於人也而利在己故上以希人主之旨以圖榮身之利徇利既多則不能無濫濫及良善則淫刑逞矣夫人情莫不自愛其身陛下以此察之豈非無濫矣冤人吁嗟感傷和氣和氣悖亂羣生癘疫水旱隨之則有凶年人既失業則禍亂之心怵然而生矣頃來亢陽愆候雲而不雨農夫釋耒瞻望嗷嗷豈不由陛下之有聖德而不降澤於人也儻旱遂過春廢於時種今年稼穡必有損矣陛下可不敬承天意以澤恤人臣聞古者明王重慎刑罰蓋懼此也書不云乎與其殺不辜寧失不經陛下奈何以堂堂之聖猶務強國之威愚臣竊為陛下不取且愚人安則樂生危則思變故事有招禍法有起姦倘大獄未休支黨日廣天下疑惑相恐無辜人情之變不可不察昔漢武帝時巫蠱獄起江充行詐作亂京師至使太子奔走兵交宮闕無辜被害者以萬千數當時劉宗幾覆滅矣賴武帝得壺關三老上書幡然感悟夷江充三族餘獄不論天下少以安耳臣讀書至此未嘗不為戾太子流涕也古人云前事不忘後事之師伏願陛下念之今臣不避湯鑊之罪以螻蟻之命輕觸宸嚴臣非不惡死而貪生也誠以負陛下恩遇以微命蔽塞聰明亦非敢欲陛下頓息嚴刑望在恤刑耳乞與三事大夫圖其可否夫往者不可諫來者猶可追無以臣微而忽其奏天下幸甚疏奏不省時司刑少卿徐有功常駁酷吏所奏每日與之廷爭得失以雪冤濫因此全濟者亦不可勝數語在有功傳及俊臣弘義等伏誅刑獄稍息前後宰相王及善姚元崇朱敬則等皆言垂拱已來身死破家者皆是枉濫則天頗亦覺悟於是監察御史魏靖上言曰臣聞國之綱紀在乎生殺其周興來俊臣丘神勣萬國俊王弘義侯思止郭弘霸李敬仁彭先覺王德壽張知默者即堯年四凶矣恣騁愚暴縱虐含毒讎嫉在位安忍朝臣罪逐情加刑隨意改當其時也囚囹如市朝廷以目既而素虛不昧冤魂有託行惡其報禍淫可懲具嚴天刑以懲亂首竊見來俊臣身處極法者以其羅織良善屠陷忠賢籍沒以勸將來顯戮以謝天下臣又聞之道路上至聖主傍洎貴臣明明知有羅織之事矣俊臣既死推者獲功胡元禮超遷裴談顯授中外稱慶朝廷載安破其黨者既能賞不逾時被其陷者豈可淹之累歲且稱反徒須得反狀惟據片辭即請行刑拷楚妄加款答何限故徐有功以寬平而見忌斛瑟羅以妓女而受拘中外具知枉直斯在借以為喻其餘可詳臣又聞之郭弘霸自刺而唱快萬國俊被遮而遽亡霍獻可臨終膝拳於項李敬仁將死舌至於臍皆衆鬼滿庭羣妖橫道惟徵集應若響隨聲備在人謠不為虛說伯有晝見殆無以過此亦羅織之一據也臣以至愚不識大體儻使平反者數人衆共詳覆來俊臣等所推大獄庶鄧艾獲申於今日孝婦不濫於昔時恩渙一流天下幸甚疏奏制令錄來俊臣丘神勣等所推鞫人身死籍沒者令三司重推勘有冤濫者並皆雪免中宗神龍元年制以故司僕少卿徐有功執法平恕追贈越州都督特授一子官又以兵神勣來子珣萬國俊周興來俊臣魚承曄王景昭索元禮傅遊藝王弘義張知默裴籍焦仁亶侯思止郭霸李敬仁皇甫文備陳嘉言劉光業王德壽王處貞屈貞筠鮑思恭二十三人自垂拱已來並枉濫殺人所有官爵並令追奪天下稱慶時既改易制盡依貞觀永徽故事敕中書令韋安石禮部侍郎祝欽明尚書右丞蘇瓌兵部郎中狄光嗣等刪定垂拱格後至神龍元年已來制敕為散頒格七卷又刪補舊式為二十卷頒於天下景雲初睿宗又敕戶部尚書岑羲中書侍郎陸象先右散騎常侍徐堅右司郎中唐紹刑部員外郎邵知與刪定官大理寺丞陳義海右衞長史張處斌大理評事張名播左衞率府倉曹參軍羅思貞刑部主事閻義顓凡十人刪定格式律令太極元年二月奏上名為太極格開元初玄宗敕黃門監盧懷慎紫微侍郎兼刑部尚書李乂紫微侍郎蘇頲紫微舍人呂延祚給事中魏奉古大理評事高智靜同州韓城縣丞侯郢璡瀛州司法參軍閻義顓等刪定格式令至三年三月奏上名為開元格六年玄宗又敕吏部侍郎兼侍中宋璟中書侍郎蘇頲尚書左丞盧從愿吏部侍郎裴漼慕容珣戶部侍郎楊滔中書舍人劉令植大理司直高智靜幽州司功參軍侯郢璡等九人刪定律令格式至七年三月奏上律令式仍舊名格曰開元後格十九年侍中裴光庭中書令蕭嵩又以格後制敕行用之後頗與格文相違於事非便奏令所司刪撰格後長行敕六卷頒于天下二十二年戶部尚書李林甫又受詔改修格令林甫遷中書令乃與侍中牛仙客御史中丞王敬從與明法之官前左武衞冑曹參軍崔見衞州司戶參軍直中書陳承信酸棗尉直刑部俞元杞等共加刪緝舊格式律令及敕總七千二十六條其一千三百二十四條於事非要並刪之二千一百八十條隨文損益三千五百九十四條仍舊不改總成律十二卷律疏三十卷令三十卷式二十卷開元新格十卷又撰格式律令事類四十卷以類相從便於省覽二十五年九月奏上敕於尚書都省寫五十本發使散於天下其年刑部斷獄天下死罪惟有五十八人大理少卿徐嶠上言大理獄院由來相傳殺氣太盛鳥雀不棲至是有鵲巢其樹於是百僚以幾至刑措上表陳賀玄宗以宰相燮理法官平允之功封仙客為邠國公林甫為晉國公刑部大理官共賜帛二千匹自明慶至先天六十年間高宗寬仁政歸宮閫則天女主猜忌果於殺戮宗枝大臣鍛於酷吏至於移易宗社幾亡李氏神龍之後后族干政景雲繼立歸妹怙權開元之際刑政賞罰斷於宸極四十餘年可謂太平矣及冢臣懷邪邊將內侮乘輿幸于巴蜀儲副立於朔方曾未逾年載收京邑書契以來未有克復宗社若斯之速也而兩京衣冠多被脅從至是相率待罪闕下而執事者務欲峻刑以取威盡誅其族以令天下議久不定竟置三司使以御史大夫兼京兆尹李峴兵部侍郎呂諲戶部侍郎兼御史中丞崔器刑部侍郎兼御史中丞韓擇木大理卿嚴向等五人為之初西京文武官陸大鈞等陷賊來歸崔器草儀盡令免冠徒跣撫膺號泣以金吾府縣人吏圍之於朝謝罪收付大理京兆府獄繫之及陳希烈等大臣至者數百人又令朝堂徒跣如初令宰相苗晉卿崔圓李麟等百僚同視以為棄辱宣詔以責之朝廷又以負罪者衆獄中不容乃賜楊國忠宅鞫之器諲多希旨深刻而擇木無所是非獨李峴力爭之乃定所推之罪為六等集百僚尚書省議之肅宗方用刑名公卿但唯唯署名而已於是河南尹達奚珣等三十九人以為罪重與衆共棄珣等十一人於子城西伏誅陳希烈張郭納獨孤朗等七人於大理寺獄賜自盡達奚摯張岯李有孚劉子英冉大華二十一人於京兆府門決重杖死大理卿張均引至獨柳樹下刑人處免死配流合浦郡而達奚珣韋恆乃至腰斬先是慶緒至相州史思明高秀巖等皆送款請命肅宗各令復位便領所管至是懼不自安各率其黨叛其後三司用刑連年不定流貶相繼及王璵為相素聞物議請下詔自今已後三司推勘未畢者一切放免大收人望後蕭華拔魏州歸國嘗話於朝云初河北官聞國家宣詔放陳希烈等脅從官一切不問各令復位聞者悔歸國之晚舉措自失及後聞希烈等死皆相賀得計無敢歸者於是河北將吏人人益堅大兵不解後有毛若虛敬羽之流皆深酷割剝驟求權柄殺人以逞刑厚斂以資國六七年間大獄相繼州縣之內多是貶降人肅宗復聞三司多濫嘗悔云朕為三司所誤深恨之及彌留之際以元載為相乃詔天下流降人等一切放歸代宗寶應元年迴紇與史朝義戰勝擒其將士妻子老幼四百八十人上以婦人雖為賊家口皆是良家子女被賊逼略惻然愍之令萬年縣於勝業佛寺安置給糧料若有親屬認者任還之如無親族者任其所適仍給糧遞過於是人情莫不感戴忻悅大曆十四年六月一日德宗御丹鳳樓大赦赦書節文律令格式條目有未折衷者委中書門下簡擇理識通明官共刪定自至德已來制敕或因人奏請或臨事頒行差互不同使人疑惑中書門下與刪定官詳決取堪久長行用者編入格條三司使準式以御史中丞中書舍人給事中各一人為之每日於朝堂受詞推勘處分建中二年罷刪定格令使幷三司使先是以中書門下充刪定格令使又以給事中中書舍人御史中丞為三司使至是中書門下奏請復舊以刑部御史臺大理寺為之其格令委刑部刪定元和四年九月敕刑部大理決斷繫囚過為淹遲是長姦倖自今已後大理寺檢斷不得過二十日刑部覆下不得過十日如刑部覆有異同寺司重加不得過十五日省司量覆不得過七日如有牒外州府節目及於京城內勘本推即日以報牒到後計日數被勘司却報不得過五日仍令刑部具遣牒及報牒月日牒報都省及分察使各準敕文勾舉糾訪六年九月富平縣人梁悅為父殺仇人秦果投縣請罪敕復讎殺人固有彝典以其申冤請罪視死如歸自詣公門發於天性志在徇節本無求生之心寧失不經特從減死之法宜決一百配流循州職方員外郎韓愈獻議曰伏奉今月五日敕復讎據禮經則義不同天徵法令則殺人者死禮法二事皆王教之端有此異同必資論辯宜令都省集議聞奏者伏以子復父讎見於春秋見於禮記又見於周官又見於諸子史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也蓋以為不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司也丁寧其義於經而深沒其文於律者其意將使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅也又周官曰凡報仇讎者書於士殺之無罪言將復讎必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議羣下臣愚以為復讎之名雖同而其事各異或百姓相讎如周官所稱可議於今者或為官吏所誅如公羊所稱不可行於今者又周官所稱將復讎先告於士則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡有復父讎者事發具其事由下尚書省集議奏聞酌其宜而處之則經律無失其指矣元和十三年八月鳳翔節度使鄭餘慶等詳定格後敕三十卷右司郎中崔郾等六人修上其年刑部侍郎許孟容蔣乂等奉詔刪定復勒成三十卷刑部侍郎劉伯芻等考定如其舊卷長慶元年五月御史中丞牛僧孺奏天下刑獄苦於淹滯請立程限大事大理寺限三十五日詳斷畢申刑部限三十日聞奏中事大理寺三十日刑部二十五日小事大理寺二十五日刑部二十日一狀所犯十人以上所斷罪二十件以上為大所犯六人以上所斷罪十件以上為中所犯五人以下所斷罪十件以下為小其或所抵罪狀幷所結刑名並同者則雖人數甚多亦同一人之例違者罪有差二年四月刑部員外郎孫革奏京兆府雲陽縣人張莅欠羽林官騎康憲錢米憲徵之莅承醉拉憲氣息將絕憲男買得年十四將救其父以莅角觝力人不敢撝解遂持木鍤擊莅之首見血後三日致死者準律父為人所毆子往救擊其人折傷減凡鬬三等至死者依常律即買得救父難是性孝非暴擊張莅是心切非兇以髫之歲正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之慎測淺深之量以別之春秋之義原心定罪周書所訓諸罰有權今買得生被皇風幼符至孝哀矜之宥伏在聖慈臣職當讞刑合分善惡敕康買得尚在童年能知子道雖殺人當死而為父可哀若從沉命之科恐失原情之義宜付法司減死罪一等大和七年十二月刑部奏先奉敕詳定前大理丞謝登新編格後敕六十卷者臣等據謝登所進詳諸理例參以格式或事非久要恩出一時或前後差殊或書寫錯誤並已落下及改正訖去繁舉要列司分門都為五十卷伏請宣下施行可之八年四月詔應犯輕罪人除情狀巨𢀿法所難原者其他過誤罪愆及尋常公事違犯不得鞭背遵太宗之故事也俄而京兆尹韋長奏京師浩穰姦豪所聚終日懲罰抵犯猶多小有寬容即難禁戢若恭守敕旨則無以肅清若臨事用刑則有違詔命伏望許依前據輕重處置從之開成四年兩省詳定刑法格一十卷敕令施行會昌元年九月庫部郎中知制誥紇干泉等奏準刑部奏犯贓官五品已上合抵死刑請準獄官令賜死於家者伏請永為定格從之大中五年四月刑部侍郎劉瑑等奉敕修大中刑法總要格後敕六十卷起貞觀二年六月二十日至大中五年四月十三日凡二百二十四年雜敕都計六百四十六門二千一百六十五條七年五月左衞率倉曹參軍張戣進大中刑法統類一十二卷敕刑部詳定奏行之
