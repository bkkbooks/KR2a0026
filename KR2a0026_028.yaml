body:
  text: 舊唐書卷二十四志第四禮儀四武德貞觀之制神祇大享之外每歲立春之日祀青帝於東郊帝宓羲配勾芒歲星三辰七宿從祀立夏祀赤帝於南郊帝神農氏配祝融熒惑三辰七宿從祀季夏土王日祀黃帝於南郊帝軒轅配后土鎮星從祀立秋祀白帝於西郊帝少昊配蓐收太白三辰七宿從祀立冬祀黑帝於北郊帝顓頊配玄冥辰星三辰七宿從祀每郊帝及配座用方色犢各一籩豆各四簠簋各二俎各一勾芒已下五星及三辰七宿每宿牲用少牢每座籩豆簠簋俎各一孟夏之月龍星見雩五方上帝於雩壇五帝配於上五官從祀於下牲用方色犢十籩豆已下如郊祭之數帝嚳祭於頓丘唐堯契配祭於平陽虞舜咎繇配祭於河東夏禹伯益配祭於安邑殷湯伊尹配祭於偃師周文王太公配祭於酆周武王周公召公配祭於鎬漢高祖蕭何配祭於長陵三年一祭以仲春之月牲皆用太牢祀官以當界州長官有故遣上佐行事五嶽四鎮四海四瀆年別一祭各以五郊迎氣日祭之東嶽岱山祭於兗州東鎮沂山祭於沂州東海於萊州東瀆大淮於唐州南嶽衡山於衡州南鎮會稽於越州南海於廣州南瀆大江於益州中嶽嵩山於洛州西嶽華山於華州西鎮吳山於隴州西海西瀆大河於同州北嶽恆山於定州北鎮醫無閭山於營州北海北瀆大濟於洛州其牲皆用太牢籩豆各四祀官以當界都督刺史充仲春仲秋二時戊日祭太社太稷社以勾龍配稷以后稷配社稷各用太牢一牲色並黑籩豆簠簋各二鉶俎各三春分朝日於國城之東秋分夕月於國城之西各用方色犢一籩豆各四簠簋俎各一孟春吉亥祭帝社於藉田天子親耕季春吉巳祭先蠶於公桑皇后親桑並用太牢籩豆各九將蠶日內侍省預奉移所司所事諸祭祀卜日皆先卜上旬不吉次卜中旬下旬筮日亦如之其先蠶一祭節氣若晚即於節氣後取日立春後丑祀風師於國城東北立夏後申祀雨師於國城西南立秋後辰祀靈星於國城東南立冬後亥祀司中司命司人司祿於國城西北各用羊一籩豆各二簠簋各一季冬晦堂贈儺磔牲於宮門及城四門各用雄雞一仲春祭馬祖仲夏祭先牧仲秋祭馬社仲冬祭馬步並於大澤用剛日牲各用羊一籩豆各二簠簋各一季冬藏冰仲春開冰並用黑牡秬黍祭司寒之神於冰室籩豆各二簠簋俎各一其開冰加以桃弧棘矢設於神座季冬寅日蠟祭百神於南郊大明夜明用犢二籩豆各四簠簋俎各一神農氏及伊耆氏各用少牢一籩豆各四簠簋俎各一后稷及五方十二次五官五方田畯五嶽四鎮四海四瀆以下方別各用少牢一當方不熟者則闕之其日祭井泉於川澤之下用羊一卯日祭社稷於社宮辰日臘享於太廟用牲皆準時祭井泉用羊二二十八宿五方之山林川澤五方之丘陵墳衍原隰五方之鱗羽裸毛介五方之水墉坊郵表畷五方之貓於菟及龍麟朱鳥白虎玄武方別各用少牢一各座籩豆簠簋俎各一蠟祭凡一百八十七座當方年穀不登則闕其祀蠟祭之日祭五方井泉於山澤之下用羊一籩豆各二簠簋及俎各一蠟之明日又祭社稷于社宮如春秋二仲之禮顯慶中更定籩豆之數始一例大祀籩豆各十二中祀各十小祀各八京師孟夏以後旱則祈雨審理寃獄賑恤窮乏掩骼埋胔先祈嶽鎮海瀆及諸山川能出雲雨皆於北郊望而告之又祈社稷又祈宗廟每七日皆一祈不雨還從嶽瀆旱甚則大雩秋分後不雩初祈後一旬不雨即徙市禁屠殺斷繖扇造土龍雨足則報祀祈用酒醢報準常祀皆有司行事已齊未祈而雨及所經祈者皆報祀若霖雨不已禜京城諸門門別三日每日一禜不止乃祈山川嶽鎮海瀆三日不止祈社稷宗廟其州縣禜城門不止祈界內山川及社稷三禜一祈皆準京式並用酒脯醢國城門報用少牢州縣城門用一特牲太宗貞觀三年正月親祭先農躬御耒耜藉於千畝之甸初晉時南遷後魏來自雲朔中原分裂又雜以獯戎代歷周隋此禮久廢而今始行之觀者莫不駭躍於是祕書郎岑文本獻藉田頌以美之初議藉田方面所在給事中孔穎達曰禮天子藉田於南郊諸侯於東郊晉武帝猶於東南今於城東置壇不合古禮太宗曰禮緣人情亦何常之有且虞書云平秩東作則是堯舜敬授人時已在東矣又乘青輅推黛耜者所以順於春氣故知合在東方且朕見居少陽之地田於東郊蓋其宜矣於是遂定自後每歲常令有司行事則天時改藉田壇為先農神龍元年禮部尚書祝欽明與禮官等奏曰謹按經典無先農之文禮記祭法云王自為立社曰王社先儒以為社在藉田詩之載芟篇序云春藉田而祈社稷是也永徽年中猶名藉田垂拱已後刪定改為先農先農與社本是一神頻有改張以惑人聽其先農壇請改為帝社壇以應禮經王社之義其祭先農既改為帝社壇仍準令用孟春吉亥祠后土以勾龍氏配制從之於是改先農為帝社壇於壇西立帝稷壇禮同太社太稷其壇不備方色所以異於太社也睿宗太極元年親祀先農躬耕帝藉禮畢大赦改元玄宗開元二十二年冬禮部員外郎王仲丘又上疏請行藉田之禮二十三年正月親祀神農於東郊以勾芒配禮畢躬御耒耜于千畝之甸時有司進儀注天子三推公卿九推庶人終畝玄宗欲重勸耕藉遂進耕五十餘步盡壠乃止禮畢輦還齋宮大赦侍耕執牛官皆等級賜帛玄宗開元二十六年又親往東郊迎氣祀青帝以勾芒配歲星及三辰七宿從祀其壇本在春明門外玄宗以祀所隘狹始移於滻水之東面而值望春宮其壇一成壇上及四面皆青色勾芒壇在東南歲星已下各為一小壇在青帝壇之北親祀之時有瑞雪壇下侍臣及百僚拜賀稱慶肅宗乾元二年春正月丁丑將有事於九宮之神兼行藉田禮自明鳳門出至通化門釋軷而入壇行宿齋於宮戊寅禮畢將耕藉先至於先農之壇因閲耒耜有雕刻文飾謂左右曰田器農人執之在於朴素豈文飾乎乃命徹之下詔曰古之帝王臨御天下莫不務農敦本保儉為先蓋用勤身率下也屬東耕啓候爰事藉田將欲勸彼蒸人所以執茲耒耜如聞有司所造農器妄加雕飾殊匪典章況紺轅縹軏固前王有制崇奢尚靡諒為政所疵靖言思之良用歎息豈朕法堯舜重茅茨之意耶其所造雕飾者宜停仍令有司依農用常式即別改造庶萬方黎庶知朕意焉翌日己卯致祭神農氏以后稷配享肅宗冕而朱紘躬秉耒耜而九推焉禮官奏陛下合三推今過禮肅宗曰朕以身率下自當過之恨不能終於千畝耳既而佇立久之觀公卿諸侯王公已下耕畢太宗貞觀十四年春正月庚子命有司讀春令詔百官之長升太極殿列坐而聽之開元二十六年玄宗命太常卿韋縚每月進月令一篇是後每孟月視日玄宗御宣政殿側置一榻東面置案命韋縚坐而讀之諸司官長亦升殿列座而聽焉歲餘罷之乾元元年十二月丙寅立春肅宗御宣政殿命太常卿于休烈讀春令常參官五品已上正員並升殿預坐而聽之舊儀嶽瀆已下祝版御署訖北面再拜證聖元年有司上言曰伏以天子父天而母地兄日而姊月於禮應敬故有再拜之儀謹按五嶽視三公四瀆視諸侯天子無拜公侯之禮臣愚以為失尊卑之序其日月已下請依舊儀五嶽已下署而不拜制可從之貞觀之禮無祭先代帝王之文顯慶二年六月禮部尚書許敬宗等奏曰謹案禮記祭法云聖王之制祀也法施於人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之又堯舜禹湯文武有功烈於人及日月星辰人所瞻仰非此族也不在祀典準此帝王合與日月同例常加祭享義在報功爰及隋代並遵斯典漢高祖祭法無文但以前代迄今多行秦漢故事始皇無道所以棄之漢祖典章法垂於後自隋已下亦在祠例伏惟大唐稽古垂化網羅前典唯此一禮咸秩未申今請聿遵故事三年一祭以仲春之月祭唐堯于平陽以契配祭虞舜于河東以咎繇配祭夏禹于安邑以伯益配祭殷湯于偃師以伊尹配祭周文王于酆以太公配祭武王於鎬以周公召公配祭漢高祖于長陵以蕭何配玄宗開元二十二年正月詔曰古聖帝明王嶽瀆海鎮用牲牢餘並以酒脯充奠祀二十三年正月詔自今已後明衣絹布並祀前五日預給丁酉詔自今已後有大祭宜差丞相特進開府少保少傅尚書御史大夫攝行事天寶六載正月詔三皇五帝於京城置令丞七載五月詔三皇已前帝王宜於京城共置廟官歷代帝王肇迹之處德業可稱者忠臣義士孝婦烈女所在亦置一祠宇晉陽真人等並追贈得道升仙處度道士永修香火九載九月處士崔昌上大唐五行應運曆以王者五十代而一千年請國家承周漢以周隋為閏十一月敕唐承漢後其周武王漢高祖同置一廟並官吏十二載九月以魏周隋依舊為二王後封韓公介酅公等依舊五廟天寶六載正月詔大祭祀騂犢量減其數肅宗上元元年閏四月改元制以歲儉停中小祠享祭至其年仲秋復祠文宣於太學永泰二年春夏纍月亢旱詔大臣裴冕等十餘人分祭川瀆以祈雨禮儀使右常侍于休烈請依舊祠風伯雨師於國門舊壇復為中祠從之高祖武德二年國子立周公孔子廟七年二月己酉詔諸州有明一經已上未被升擢者本屬舉送具以名聞有司試策皆加用其吏民子弟有識性明敏志希學藝亦具名申送量其差品並即配學州縣及鄉並令置學丁酉幸國子學親臨釋奠引道士沙門有學業者與博士雜相駁難久之乃罷貞觀十四年三月丁丑太宗幸國子學親觀釋奠祭酒孔穎達講孝經太宗問穎達曰夫子門人曾閔俱稱大孝而今獨為曾説不為閔説何耶對曰曾孝而全獨為曾能達也制旨駁之曰朕聞家語云曾使曾參鋤瓜而誤斷其本怒援大杖以擊其背手仆地絶而復蘇孔子聞之告門人曰參來勿內既而曾子請焉孔子曰舜之事父母也使之常在側欲殺之乃不得小箠則受大仗則走今參於父委身以待暴怒陷父於不義不孝莫大焉由斯而言孰愈於閔子騫也穎達不能對太宗又謂侍臣諸儒各生異意皆非聖人論孝之本旨也孝者善事父母自家刑國忠於其君戰陳勇朋友信揚名顯親此之謂孝具在經典而論者多離其文迥出事外以此為教勞而非法何謂孝之道耶二十一年詔曰左丘明卜子夏公羊高穀梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭玄服虔何休王肅王弼杜預范寧賈逵總二十二座春秋二仲行釋奠之禮初以儒官自為祭主直云博士姓名昭告于先聖又州縣釋奠亦以博士為主敬宗等又奏曰按禮記文王世子凡學春官釋奠於其先師鄭注云官謂詩書禮樂之官也彼謂四時之學將習其道故儒官釋奠各於其師既非國學行禮所以不及先聖至於春秋二時合樂之日則天子視學命有司典秩即總祭先聖先師焉秦漢釋奠無文可檢至於魏武則使太常行事自晉宋已降時有親行而學官主祭全無典實且名稱國學樂用軒懸樽俎威儀蓋皆官備在於臣下理不合專況凡在小神猶皆遣使行禮釋奠既準中祀據理必須稟命今請國學釋奠令國子祭酒為初獻祝辭稱皇帝謹遣仍令司業為亞獻國子博士為終獻其州學刺史為初獻上佐為亞獻博士為終獻縣學令為初獻丞為亞獻博士既無品秩請主簿及尉通為終獻若有闕並以次差攝州縣釋奠既請各刺史縣令親獻主祭望準祭社同給明衣修附禮令以為永則高宗顯慶二年七月禮部尚書許敬宗等議依令周公為先聖孔子為先師又禮記云始立學釋奠於先聖鄭玄注云若周公孔子也且周公踐極功比帝王請配武王以孔子為先聖二年廢書算律學龍朔二年正月東都置國子監丞主簿録事各一員四門助教博士四門生三百員四門俊士二百員二月復置律及書算學三年以書隸蘭臺算隸祕閣局律隸詳刑寺乾封元年正月高宗東封還次鄒縣頓祭宣父贈太師總章元年二月皇太子弘幸國學釋奠贈顏回太子少師曾參太子少保儀鳳三年五月詔自今已後道德經並為上經貢舉人皆須兼通其餘經及論語任依常式則天天授三年追封周公為褒德王孔子為隆道公則天長壽二年自製臣軌兩卷令貢舉人為業停老子神龍元年停臣軌復習老子以鄒魯百戶封隆道公諡曰文宣睿宗景雲二年八月丁巳皇太子釋奠于太學太極元年正月詔孔宣父祠廟令本州修飾取側近三十戶以供灑掃開元七年十月戊寅皇太子詣國學行齒胄之禮開元十一年春秋二時釋奠諸州宜依舊用牲牢其屬縣用酒脯而已十九年正月春秋二時社及釋奠天下州縣等停牲牢唯用酒脯永為常式二十四年三月始移貢舉遣禮部侍郎姚奕請進士帖左傳禮記通五及第二十五年三月敕明經自今已後帖十通五已上口問大義十條取通六已上仍答時務策三道取粗有文理者及第進士停帖小經宜準明經例試大經帖十通四然後試雜文及策訖封所試雜文及策送中書門下詳覆二十六年正月敕諸州鄉貢見訖令引就國子監謁先師學官為之開講質問疑義有司設食弘文崇文兩館學生及監內得舉人亦聽預焉其日祀先聖已下如釋奠之禮青宮五品已下及朝集使就監觀禮遂為常式每年行之至今初開元八年國子司業李元瓘奏稱先聖孔宣父廟先師顏子配座今其像立侍配享合坐十哲弟子雖復列像廟堂不預享祀謹檢祠令何休范寧等二十二賢猶霑從祀望請春秋釋奠列享在二十二賢之上七十子請準舊都監堂圖形于壁兼為立贊庶敦勸儒風光崇聖烈曾參等道業可崇獨受經於夫子望準二十二賢預饗敕改顏生等十哲為坐像悉預從祀曾參大孝德冠同列特為塑像坐於十哲之次圖畫七十子及二十二賢於廟壁上以顏子亞聖上親為之贊以書于石閔損已下令當朝文士分為之贊二十七年八月又下制曰弘我王化在乎儒術孰能發揮此道啓迪含靈則生人已來未有如夫子者也所謂自天攸縱將聖多能德配乾坤身揭日月故能立天下之大本成天下之大經美政教移風俗君君臣臣父父子子人到于今受其賜不其猗歟於戲楚王莫封魯公不用俾夫大聖才列陪臣棲遲旅人固可知矣年祀寖遠光靈益彰雖代有褒稱而未為崇峻不副於實人其謂何朕以薄德祗膺寶命思闡文明廣被華夏時則異於今古情每重於師資既行其教合旌厥德爰申盛禮載表徽猷夫子既稱先聖可追諡為文宣王宜令三公持節册命應緣册及祭所司速擇日並撰儀注進其文宣陵並舊宅立廟量加人灑掃用展誠敬其後嗣可封文宣公至如辨方正位著自禮經苟非得所何以示則昔緣周公南面夫子西坐今位既有殊坐豈如舊宜補其墜典永作成式自今已後兩京國子監夫子皆南面而坐十哲等東西列侍天下諸州亦準此且門人三千見稱十哲包夫衆美實越等夷暢玄聖之風規發人倫之耳目並宜褒贈以寵賢明顏子淵既云亞聖須優其秩可贈兗公閔子騫可贈費侯冉伯牛可贈鄆侯冉仲弓可贈薛侯冉子有可贈徐侯仲子路可贈衛侯宰子我可贈齊侯端木子貢可贈黎侯言子遊可贈吳侯卜子夏可贈魏侯又夫子格言參也稱魯雖居七十之數不載四科之目頃雖異於十哲終或殊於等倫允稽先旨俾循舊位庶乎禮得其序人焉式瞻宗洙泗之丕烈重膠庠之雅範又贈曾參顓孫師等六十七人皆為伯於是正宣父坐於南面內出王者衮冕之服以衣之遣尚書左丞相裴耀卿就國子廟册贈文宣王册畢所司奠祭亦如釋奠之儀公卿已下預觀禮又遣太子少保崔琳就東都廟以行册禮自是始用宮懸之樂春秋二仲上丁令三公攝行事天寶元年明經進士習爾雅九載七月國子監置廣文館知進士業博士助教各一人秩同太學博士十二載七月詔天下舉人不得充鄉貢皆補學生四門俊士停寶應二年六月敕令州縣每歲察秀才孝廉取鄉閭有孝悌廉恥之行薦焉委有司以禮待之試其所通之學五經之內精通一經兼能對策達於理體者並量行業授官其明經進士並停國子學道舉亦宜準此因楊綰之請也詔下朝臣集議中書舍人賈至議請依綰奏有司奏曰竊以今年舉人等或舊業既成理難速改或遠州所送身已在途事須收奬其今秋舉人中有情願舊業舉試者亦聽明年已後一依新敕後綰議竟不行自至德後兵革未息國學生不能廩食生徒盡散堂墉頽壞常借兵健居止至永泰二年正月國子祭酒蕭昕上言崇儒尚學以正風教乃王化之本也其月二十九日敕曰理道同歸師氏為上化人成俗必務於學俊造之士皆從此途國之貴遊罔不受業修文行忠信之教崇祗庸孝友之德盡其師道乃謂成人兼復揚于王廷考以政事徵之以禮任之以官置于周行莫匪邦彥樂得賢也其在茲乎朕志求理體尤重儒術先王大教敢不底行頃以戎狄多難急於經略太學空設諸生蓋寡絃誦之地寂寥無聲函丈之間殆將不掃上庠及此甚用憫焉今宇縣攸寧文武兼備方投戈而講藝俾釋菜而行禮四科咸進六藝復興神人以和風化寖美日用此道將無間然其諸道節度觀察都防禦使等朕之腹心久鎮方面眷其子弟各奉義方修德立身事資括羽恐干戈之後學校尚微僻居遠方無所咨稟山東寡學質疑必就於馬融關西盛名尊儒乃稱於楊震負經來學當集京師並宰相朝官及神策六軍軍將子弟欲習業者自今已後並令補國子生欲其業重籝金器成琢玉日新厥德代不乏賢其中身雖有官欲附學讀書者亦聽其學官委中書門下即簡擇行業堪為師範者充學生員數多少所習經業考試等第並所供糧料及學館破壞要量事修理各委本司作條件聞奏務須詳悉稱朕意焉及二月朔上丁釋奠蕭昕又奏諸宰相元載杜鴻漸李抱玉及常參官六軍軍將就國子學聽講論賜錢五百貫令京兆尹黎幹造食集諸儒道僧質問竟日此禮久廢一朝能舉八月國子學成祠堂論堂六館院及官吏所居廳宇用錢四萬貫拆曲江亭子瓦木助之四日釋奠宰相常參官軍將盡會於講堂京兆府置食講論軍容使魚朝恩説易又於論堂畫周易鏡圖自至德二載收兩京唯元正含元殿受朝賀設宮懸之樂雖郊廟大祭祇有登歌樂亦無文武二舞其時軍容使魚朝恩知監事廟庭乃具宮懸之樂於講堂前又有教坊樂府雜伎竟日而罷二十五日詔曰古者設官分土所以崇德報功總內署之綱事密於清禁弘上庠之教德潤於鴻業賦開千乘禮序九賓必資兼濟之能用協至公之選開府儀同三司兼右監門衛大將軍仍知觀軍容宣慰處置使知內侍省事內飛龍間使內弓箭庫使知神策軍兵馬使上柱國馮翊郡開國公魚朝恩溫良恭儉寬柔簡廉長才博達敏識高妙學究儒玄之祕謀窮遁甲之精百行資身一心奉上自王室多故雲雷經始五原之北以先啓行三河之表爰整其旅成師必勝每合於韜鈐料敵無遺可徵於蓍蔡關洛既定幽燕復開海外有截厥功惟茂歷事三聖始終竭力頃東都扈蹕釋位勤王時當綴旒節見披棘下江助我甲令先書社稷之衛邦家是賴及邊陲罷警戎務解嚴方奬勵於易象才兼文武所謂勳賢亦既任能斯焉命賞宜膺朝典式副公議可行內侍監判國子監事充鴻臚禮賓等使封鄭國公食邑三千戶二十四日於國子監上詔宰相及中書門下官諸司常參官六軍軍將送上京兆府造食內教坊音樂竿木渾脫羅列於論堂前朝恩辭以中官不合知南衙曹務宰相僕射大夫皆勸之朝恩固辭乃奏之宰相引就食奏樂中使送酒及茶果賜充宴樂竟日而罷元載奏狀又使中使宣敕云朝恩既辭不止但任知學生糧料是日宰相軍將已下子弟三百餘人皆衣紫衣充學生房設食於廊下貸錢一萬貫五分收錢以供監官學生之費俄又請青苗地頭取百文資課以供費同舊例兩京國子監生二千餘人弘文館崇文館崇玄館學生皆廩飼之十五載上都失守此事廢絶乾元元年以兵革未息又詔罷州縣學生以俟豐歲則天垂拱四年四月雍州永安人唐同泰偽造瑞石於洛水獻之其文曰聖母臨人永昌帝業於是號其石為寶圖賜百官宴樂賜物有差授同泰為遊擊將軍其年五月下制欲親拜洛受寶圖先有事於南郊告謝昊天上帝令諸州都督刺史並諸親並以拜洛前十日集神都於是則天加尊號為聖母神皇大赦天下改寶圖為天授聖圖洛水為永昌封其神為顯聖侯加特進禁漁釣祭享齊於四瀆所出處號曰聖圖泉於泉側置永昌縣又以嵩山與洛水接近因改嵩山為神嶽授太師使持節神嶽大都督天中王禁斷芻牧其天中王及顯聖侯並為置廟又先於汜水得瑞石因改汜水縣為廣武縣至其年十二月則天親拜洛受圖為壇於洛水之北中橋之左皇太子皆從內外文武百僚蠻夷酋長各依方位而立珍禽奇獸並列於壇前文物鹵簿自有唐已來未有如此之盛者也禮畢即日還宮神都父老勒碑於拜洛壇前號曰天授聖圖之表開元五年左補闕盧履冰上言曰則天皇后拜洛受圖壇及碑文云垂拱四年唐同泰得石文云聖母臨人永昌帝業之所建因改元為永昌仍置永昌縣縣既尋廢同泰亦已貶官唯碑壇獨立準天樞頌臺之例不可更留始令所司毀之其顯聖侯廟亦尋毀拆開元二十九年正月己丑詔兩京及諸州各置玄元皇帝廟一所並置崇玄學其生徒令習道德經及莊子列子文子等每年準明經例舉送至閏四月玄宗夢京師城南山趾有天尊之像求得之於盩厔樓觀之側至天寶元年正月癸丑陳王府參軍田同秀稱於京永昌街空中見玄元皇帝以天下太平聖壽無疆之言傳於玄宗仍云桃林縣故關令尹喜宅傍有靈寶符發使求之十七日獻於含元殿於是置玄元廟於太寧坊東都於積善坊舊邸二月丁亥御含元殿加尊號為開元天寶聖文神武皇帝辛卯親祔玄元廟丙申詔古今人表玄元皇帝升入上聖莊子號南華真人文子號通玄真人列子號沖虛真人庚桑子號洞虛真人改莊子為南華真經文子為通玄真經列子為沖虛真經庚桑子為洞虛真經亳州真源縣先天太后及玄元廟各置令一人兩京崇玄學各置博士助教又置學生一百員桃林縣改為靈寶縣田同秀與五品官四月詔崇文習道德經七月隴西李氏燉煌姑臧絳郡武陽四房隸於宗正寺九月兩京玄元廟改為太上玄元廟天下準此十月改新豐驪山為會昌山仍於秦坑儒之所立祠宇新作長生殿改為集靈臺二年正月丙辰加玄元皇帝尊號大聖祖三字崇玄學改為崇玄館博士為學士助教為直學士更置大學士員三月壬子親謁玄元宮聖祖母益壽氏號先天太后仍於譙郡置廟尊皋繇為德明皇帝涼武昭王為興聖皇帝西京玄元廟為太清宮東京為太微宮天下諸州為紫極宮九月譙郡紫極宮宜準西京為太清宮先天太皇及太后廟亦並改為宮三載三月兩京及天下諸郡於開元觀開元寺以金銅鑄玄元等身天尊及佛各一軀七載二月於大同殿修功德處玉芝兩莖生於柱礎上五月玄宗御興慶殿授册尊號曰開元天寶聖文神武應道皇帝十二月以玄元皇帝見於朝元閣改為降聖閣改會昌縣為昭應縣改會昌山為昭應山封昭應山神為玄德公立祠宇初太清宮成命工人於太白山採白石為玄元聖容又採白石為玄宗聖容侍立於玄元之右皆依王者衮冕之服繒綵珠玉為之又於像設東刻白石為李林甫陳希烈之形及林甫犯事又刻石為楊國忠之形而瘞林甫之石及希烈國忠貶盡毀瘞之八載六月玉芝産於大同殿先是太白山人李渾稱於金星洞仙人見語老人云有玉版石記符聖上長生久視令御史中丞王鉷入山洞求而得之閏六月四日玄宗朝太清宮加聖祖玄元皇帝尊號曰聖祖大道玄元皇帝高祖太宗高宗中宗睿宗尊號並加大聖字皇后並加順聖字五日玄宗御含元殿加尊號曰開元天寶聖文神武應道皇帝大赦自今已後每至禘祫並於太清宮聖祖前設位序昭穆太白山封神應公金星洞改嘉祥洞所管華陽縣改為真符縣兩京及十道一大郡置真符玉芝觀九載十月先是御史大夫王鉷奏稱太白山人王玄翼見玄元皇帝於寶山洞中乃遣王鉷張均王倕韋濟王翼王嶽靈於洞中得玉石函上清護國經寶券紀籙等獻之十一月制承前宗廟皆稱告享自今已後每親告獻太清太微宮改為朝獻有司行事為薦獻親告享宗廟改為朝享有司行事為薦享親巡陵改為朝陵有司行事為拜陵應諸事告宗廟者並改為表其郊天后土及享祠祝文云敢昭告者並改為敢昭薦十載正月有事于南郊於壇所大赦制自今已後攝祭南郊薦獻太清宮薦享太廟其太尉行事前一日於致齋所具羽儀鹵薄公服引入親授祝版乃赴清齋所汾陰后土之祀自漢武帝後廢而不行玄宗開元十年將自東都北巡幸太原便還京乃下制曰王者承事天地以為主郊享泰尊以通神蓋燔柴泰壇定天位也瘞埋泰折就陰位也將以昭報靈祇克崇嚴配爰逮秦漢稽諸祀典立甘泉於雍畤定后土於汾陰遺廟嶷然靈光可燭朕觀風唐晉望秩山川肅恭明神因致禋敬將欲為人求福以輔升平今此神符應於嘉德行幸至汾陰宜以來年二月十六日祠后土所司準式先是脽上有后土祠嘗為婦人塑像則天時移河西梁山神塑像就祠中配焉至是有司送梁山神像於祠外之別室內出錦繡衣服以上后土之神乃更加裝飾焉又於祠堂院外設壇如皇地祇之制及所司起作獲寶鼎三枚以獻十一年二月上親祠于壇上亦如方丘儀禮畢詔改汾陰為寶鼎亞獻邠王守禮終獻寧王憲已下頒賜各有差二十年車駕又從東都幸太原還京中書令蕭嵩上言去十一年親祠后土為祈穀自是神明昭格纍年豐登有祈必報禮之大者且漢武親祠脽上前後數四伏請準舊祀后土行賽之禮上從之其年十一月至寶鼎又親祠以申賽謝禮畢大赦仍令所司刊石祠所上自為其文開元二十四年七月乙巳初置壽星壇祭老人星及角亢等七宿天寶三年有術士蘇嘉慶上言請於京東朝日壇東置九宮貴神壇其壇三成成三尺四階其上依位置九壇壇尺五寸東南曰招搖正東曰軒轅東北曰太陰正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍五為中戴九履一左三右七二四為上六八為下符於遁甲四孟月祭尊為九宮貴神禮次昊天上帝而在太清宮太廟上用牲牢璧幣類于天地神祇玄宗親祀之如有司行事即宰相為之肅宗乾元三年正月又親祀之初九宮神位四時改位呼為飛位乾元之後不易位大和二年八月監察御史舒元輿奏七月十八日祀九宮貴神臣次合監祭職當檢察禮物伏見祝版九片臣伏讀既竟竊見陛下親署御名及稱臣於九宮之神臣伏以天子之尊除祭天地宗廟之外無合稱臣者王者父天母地兄日姊月此以九宮為目是宜分方而守其位臣又觀其名號乃太一天一招搖軒轅咸池青龍太陰天符攝提也此九神於天地猶子男也於日月猶侯伯也陛下尊為天子豈可反臣於天之子男耶臣竊以為過縱陰陽者流言其合祀則陛下當合稱皇帝遣某官致祭于九宮之神不宜稱臣與名臣實愚瞽不知其可伏緣行事在明日雞初鳴時成命已行臣不敢滯伏乞聖慈異日降明詔禮官詳議冀明萬乘之尊無所虧降悠久誤典因此可正詔都省議皆如元輿之議乃降為中祠祝版稱皇帝不署會昌元年十二月中書門下奏準天寶三載十月六日敕九宮貴神實司水旱功佐上帝德庇下人冀嘉穀歲登災害不作每至四時初節令中書門下往攝祭者準禮九宮次昊天上帝壇在太清宮太廟上用牲牢璧幣類於天地天寶三載十二月玄宗親祠乾元二年正月肅宗親祀伏自纍年已來水旱愆候恐是有司禱請誠敬稍虧今屬孟春合修祀典望至明年正月祭日差宰臣一人禱請向後四時祭並請差僕射少師少保尚書太常卿等官所冀稍重其事以申嚴敬臣等十一月二十五日已於延英面奏伏奉聖旨令檢儀注進來者今欲祭時伏望令有司崇飾舊壇務於嚴潔敕旨依奏二年正月四日太常禮院奏準監察御史關牒今月十三日祀九宮貴神已敕宰相崔珙攝太尉行事合受誓誡及有司徒司空否伏以前件祭本稱大祠準大和三年七月二十四日敕降為中祠昨據敕文祇稱崇飾舊壇務於嚴潔不令別進儀注更有改移伏恐不合却用大祠禮料伏候裁旨中書門下奏曰臣準天寶三載十月六日敕九宮貴神實司水旱臣等伏覩既經兩朝親祠必是祈請有徵況自大和已來水旱愆候陛下常憂稼穡每念蒸黎臣等合副聖心以修墜典伏見大和三年禮官狀云縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祀竊詳其意以星辰不合比於天官曾不知統而言之則為天地在於辰象自有尊卑謹按後魏王鈞志北辰等二星盛而常明者乃為元星露寢天帝常居始由道奧而為變通之迹又天皇大帝其精曜魄寶蓋萬神之祕圖河海之命紀皆稟焉據茲説即昊天上帝也天一掌八氣九精之政令以佐天極徵明而有常則陰陽序大運興太一掌十有六神之法度以輔人極徵明而得中則神人和而王道升平又北斗有權衡二星天一太一參居其間所以財成天地輔相神道也若一概以列宿論之實為淺近按漢書曰天神貴者太一佐曰五帝古者天子以春秋祭太一列於祀典其來久矣今五帝猶為大祀則太一無宜降祀稍重其祀固為得所劉向有言曰祖宗所立神祇舊典誠未易動又曰古今異制經無明文至尊至重難以疑説正也其意不欲非祖宗舊典以劉向之博通尚難於改作況臣等學不究於天人識尤懵於祀典欲為參酌恐未得中伏望更令太常卿與學官同詳定庶獲明據從之檢校左僕射太常卿王起廣文博士盧就等獻議曰伏以九宮貴神位列星座往因致福詔立祠壇降至尊以稱臣就東郊以親拜在祀典雖云過禮庇羣生豈患無文思福黔黎特申嚴奉誠聖人屈己以安天下之心也厥後祝史不明精誠亦怠禮官建議降處中祠今聖德憂勤期臻壽域兵荒水旱寤寐軫懷爰命台臣緝興墜典伏惟九宮所稱之神即太一攝提軒轅招搖天符青龍咸池太陰天一者也謹按黃帝九宮經及蕭吉五行大義一宮其神太一其星天蓬其卦坎其行水其方白二宮其神攝提其星天芮其卦坤其行土其方黑三宮其神軒轅其星天衝其卦震其行木其方碧四宮其神招搖其星天輔其卦巽其行木其方緑五宮其神天符其星天禽其卦離其行土其方黃六宮其神青龍其星天心其卦乾其行金其方白七宮其神咸池其星天柱其卦兌其行金其方赤八宮其神太陰其星天任其卦艮其行土其方白九宮其神天一其星天英其卦離其行火其方紫觀其統八卦運五行土飛於中數轉於極雖敬事迎釐不聞經見而範圍亭育有助昌時以此兩朝親祀而臻百祥也然以萬物之精上為列星星之運行必繫於物貴而居者則必統八氣總萬神斡權化於混茫賦品彙於陰隲與天地日月誠相參也豈得繄賴於敷祐而屈降於等夷又據太尉攝祀九宮貴神舊儀前七日受誓誡於尚書省散齋四日致齋三日牲用犢祝版御署稱嗣天子臣圭幣樂成比類中祠則無等級今據江都集禮及開元禮蠟祭之日大明夜明二座及朝日夕月皇帝致祝皆率稱臣若以為非泰壇配祀之時得主日報天之義卑緣厭屈尊用德伸不以著在中祠取類常祀此則中祠用大祠之義也又據太社太稷開元之制列在中祠天寶三載二月十四日敕改為大祠自後因循復用前禮長慶三年正月禮官獻議始準前敕稱為大祠唯御署祝文稱天子謹遣某官某昭告文義以為殖物粒人則宜增秩致祝稱禱有異方丘不以伸為大祠遂屈尊稱此又大祠用中祠之禮也參之日月既如彼考之社稷又如此所謂功巨者因之以殊禮位稱者不敢易其文是前聖後儒陟降之明徵也今九宮貴神既司水旱升福禳災人將賴之追舉舊章誠為得禮然以立祠非古宅位有方分職既異其司存致祝必參乎等列求之折中宜有變通稍重之儀有以為比伏請自今已後却用大祠之禮誓官備物無有降差唯御署祝文以社稷為本伏緣已稱臣於天帝無二尊故也敕旨依之付所司天寶十載四月二十九日移黃帝壇於子城內坤地將親祠祭壇成而止玄宗先天二年封華嶽神為金天王開元十三年封泰山神為天齊王天寶五載封中嶽神為中天王南嶽神為司天王北嶽神為安天王六載河瀆封靈源公濟瀆封清源公江瀆封廣源公淮瀆封長源公十載正月四海並封為王遣國子祭酒嗣吳王祗祭東嶽天齊王太子家令嗣魯王宇祭南嶽司天王祕書監崔秀祭中嶽中天王國子祭酒班景倩祭西嶽金天王宗正少卿李成裕祭北嶽安天王衛尉少卿李浣祭江瀆廣源公京兆少尹章恆祭河瀆靈源公太子左諭德柳偡祭淮瀆長源公河南少尹豆盧回祭濟瀆清源公太子率更令嗣道王鍊祭沂山東安公吳郡太守趙居貞祭會稽山永興公大理少卿李稹祭吳嶽山成德公潁王府長史甘守默祭霍山應聖公范陽司馬畢炕祭醫無閭山廣寧公太子中允李隨祭東海廣德王義王府長史張九章祭南海廣利王太子中允柳奕祭西海廣潤王太子洗馬李齊榮祭北海廣澤王取三月十七日一時禮册玄宗御極多年尚長生輕舉之術於大同殿立真仙之象每中夜夙興焚香頂禮天下名山令道士中官合鍊醮祭相繼於路投龍奠玉造精舍採藥餌真訣仙蹤滋於歲月肅宗至德二載春在鳳翔改汧陽郡吳山為西嶽增秩以祈靈助及上元二年聖躬不康術士請改吳山為華山華山為泰山華州為泰州華陽縣為太陰縣寶應元年復舊則天長安三年令天下諸州宜教人武藝每年準明經進士例申奏開元十九年於兩京置太公尚父廟一所以漢留侯張良配饗天寶六載詔諸州武舉人上省先謁太公廟拜將帥亦告太公廟至肅宗上元元年閏四月又尊為武成王選歷代良將為十哲高宗顯慶元年三月辛巳皇后武氏有事於先蠶玄宗先天二年三月辛卯皇后王氏祀先蠶肅宗乾元二年三月己巳皇后張氏祠先蠶於苑內內外命婦同採焉舊儀大祭祀宮懸軒懸奏於庭登歌於堂上自至德二載克復兩京後樂工不備時又艱食諸壇廟祭享空有登歌無壇下庭中樂及二舞舊儀凡祭享有司行事則太尉奠瓚幣司徒捧俎司空掃除太尉初獻太常卿亞獻光祿卿終獻自上元後南郊九宮神壇太廟備此五官餘即太常卿攝司空光祿卿攝司徒貴省於事舊儀有協律郎立於阼階上麾竿以節樂今無協律之位舊儀光祿欲為祭饌將陽燧望日取火謂之明火太牢皆棧飼於廩犧署以至充腯臨祭視其充瘦謂之省牲肅宗上元二年九月改元為元年詔圓丘方澤依恆存一太牢皇廟諸祠臨時獻熟今昊天上帝太廟一牢羊豕各三餘祭盡隨事辦供以備禮明火棧飼之禮亦不暇矣
