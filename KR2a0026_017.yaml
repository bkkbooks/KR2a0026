body:
  text: 舊唐書卷十七上本紀第十七上敬宗文宗上敬宗睿武昭愍孝皇帝諱湛穆宗長子母曰恭僖太后王氏元和四年六月七日生於東內之別殿長慶元年三月封景王二年十二月立為皇太子四年正月壬申穆宗崩癸酉皇太子即位柩前時年十六甲戌左僕射韓臯卒丙子羣臣準遺詔奏皇帝寶册禮畢詔賞神策諸軍士人絹十匹錢十千畿內諸軍鎮絹十匹錢五千其餘軍鎮頒給有差內出綾絹三百萬段以助賞給穆宗初即位在京軍士人獲五十千在外軍鎮差降無幾至是宰臣奏議請量國力頒賞故差減於先朝物議是之羣臣五上章請聽政從之二月辛巳朔上縗服見羣臣於紫宸門外壬午渤海送備宿衛大聰睿等五十人入朝癸未貶戶部侍郎李紳為端州司馬丙戌貶翰林學士駕部郎中知制誥龐嚴為信州刺史翰林學士司封員外郎知制誥蔣防為汀州刺史皆紳之引用者以右拾遺吳思為殿中侍御史充入蕃告哀使李紳之貶李逢吉受賀羣官至中書而思獨不往逢吉怒而斥為遠使戊子河北告哀使諫議大夫高允恭卒於東都辛卯敕沒掖庭宮人先配內園宮人並宜放出任其所適己亥册大行皇帝皇太后為太皇太后庚子西川節度使杜元穎進罨畫打毬衣五百事非禮也辛丑上始御紫宸殿受朝既退幸飛龍院厚賜內官等物有差以米貴出太倉粟四十萬石於兩市賤糶以惠貧民癸未夜太白犯東井北轅乙巳上率羣臣詣光順門册皇太后丁未御中和殿擊毬賜教坊樂官綾絹三千五百匹戊申擊毬於飛龍院己酉大合樂於中和殿極歡而罷內官頒賜有差三月庚戌朔貶司農少卿李彤吉州司馬以前為鄧州刺史坐贓百萬仍自刻德政碑故也壬子上御丹鳳樓大赦天下京畿夏青苗錢並放秋青苗錢每貫放二百文天下常貢之外不得進獻六宅十宅諸王女宜令每年於選人中選擇降嫁今後戶帳田畝五年一定稅是日風且雨甲寅始於延英對宰臣丙辰以尚書右丞韋顗為戶部侍郎戊午禮儀使奏外命婦正旦及四始日舊行起居之禮伏以禮煩則瀆請停從之庚申工部尚書胡證檢校戶部尚書京兆尹甲子故山南東道節度使牛元翼家為王廷湊所害上惜其冤橫傷悼久之仍歎宰執非才縱姦臣跋扈翰林學士韋處厚奏曰理亂之本非有他術順人則理違人則亂陛下當食歎息恨無蕭曹今有一裴度尚不能用此馮唐所以感悟漢文雖有頗牧不能用也以太子少保張弘靖為太子少師分司東都太子賓客令狐楚為河南尹丁卯以刑部尚書段文昌判左丞事戊辰羣臣入閣日高猶未坐有不任立而踣者諫議大夫李渤出次白宰相俄而始坐班退左拾遺劉栖楚極諫頭叩龍墀血流上為之動容仍賜緋魚袋編氓徐忠信闌入浴堂門杖四十配流天德庚午賜內教坊錢一萬貫以備遊幸是夜太白犯東井北轅甲戌夏州節度使李祐奏於塞外築烏延宥州臨塞陰河陶子等五城以備蕃寇又以黨項為盜於蘆子關北木瓜嶺築壘以扼其衝乙亥幸教坊賜伶官綾絹三千五百匹夏四月庚辰朔甲申以御史大夫王涯為戶部尚書兼御史大夫充鹽鐵轉運等使壬辰兵部侍郎武儒衡卒丙申賊張韶等百餘人至右銀臺門殺閽者揮兵大呼進至清思殿登御榻而食攻弓箭庫左神策軍兵馬使康藝全率兵入宮討平之是日上聞其變急幸左軍丁酉上還宮羣臣稱慶諫議大夫李渤以上輕易致盜言甚激切己亥九仙門等監共三十五人並笞之辛丑染坊使田晟段政直流天德以張韶染坊役夫故也詔雪吐突承璀之罪令男士曄改葬之丙午宰臣李逢吉封涼國公牛僧孺封奇章縣子五月己酉朔乙卯制以正議大夫尚書吏部侍郎上柱國渭源縣開國男食邑三百戶賜紫金魚袋李程守本官同中書門下平章事以朝議郎守尚書戶部侍郎兼御史大夫判度支上柱國賜紫金魚袋竇易直為朝散大夫本官同中書門下平章事判度支戶部侍郎韋顗賜金紫己未割富平縣之豐水鄉下邽縣之翟公鄉澄城縣之撫道鄉白水縣之會賓鄉以奉景陵癸亥以鹽州刺史傅良弼為夏州節度使東都江陵監大轉運留後並改為知院官從其使王涯請也六月己卯朔以左神策大將康藝全為鄜坊節度使辛巳敕以霖雨命疏決京城繫囚庚辰大風吹壞延喜景風等門工部侍郎張惟素卒壬辰以左金吾衛大將軍李願檢校司空兼河中尹御史大夫充河中絳隰等州節度使丙申山南西道節度使守司空裴度加同中書門下平章事度之拜興元也為宰相李逢吉所排不帶平章事李程韋處厚日為度論於上前故有是命加陳許節度使李光顏守司徒癸卯太保張弘靖卒己巳浙西水壞太湖堤水入州郭漂民廬舍丁未以吏部尚書趙宗儒為太常卿兵部尚書鄭絪為吏部尚書秋七月戊申朔己酉睦州清溪等六縣大雨山谷發洪水泛溢漂城郭廬舍庚辰以前河中節度使郭釗為兵部尚書戊午太子賓客許季同卒辛酉疏靈州特進渠置營田六百頃乙丑鄆曹濮暴雨水溢壞城郭廬舍丁卯敕以穀貴凡給百官俸內一半合給匹段今宜給粟每斗折錢五十文辛未以大理卿崔元略為京兆尹兼御史大夫甲戌左金吾衛大將軍李祐進馬二百五十匹御史溫造於閣內奏彈祐罷使違敕進奉祐趨出待罪詔宥之襄均復等州漢江溢漂民廬舍丙子浙西觀察使李德裕奏詔令當道造盝子二十具計用銀一萬三千兩金一百三十兩昨已進兩具用銀一千三百兩當道在庫貯備銀無二三百兩皆百計收市方成此兩具臣當道唯有留使錢五萬貫每事節儉支費猶欠十三萬貫不足臣若因循不奏則負陛下任使之恩若分外誅求又纍陛下慈儉之德伏乞宣令宰臣商議何以遣臣得上不違宣索下不闕軍須不困疲人不斂物怨時有詔罷進奉故德裕有是奏八月丁酉朔是夜火犯土星妖賊馬文忠與品官季文德等凡一千四百人將圖不軌皆杖一百處死癸未火犯東井甲寅詔於關內關東折糴和糴粟一百五十萬石陳許蔡鄆曹濮等州水害秋稼丁亥火入東井己丑以李憕孫宏為河南府兵曹參軍蔣清孫為伊陽令録忠臣後也是夜金犯軒轅右角壬辰江王府長史段釗上言稱前任龍州刺史近郭有牛心山山上有仙人李龍遷祠頗靈應玄宗幸蜀時特立祠廟上遣高品張士謙往龍州檢行回奏牛心山有掘斷處羣臣言宜須修築時方沍寒役民數萬計東川節度使李絳表訴之甲子以太常卿趙宗儒為太子少師乙巳宣武軍節度韓充卒九月丙午朔丁未波斯大商李蘇沙進沉香亭子材拾遺李漢諫云沉香為亭子不異瑤臺瓊室上怒優容之庚戌以河南尹令狐楚檢校禮部尚書汴州刺史宣武軍節度宋汴亳觀察等使乙卯罷理匭使以諫議大夫李渤知匭奏請置胥吏添課料故也戊午加朱克融檢校司空詔浙西織造可幅盤絛繚綾一千匹觀察使李德裕上表論諫不奉詔乃罷之己巳以兵部侍郎王起為河南尹甲子吐蕃遣使求五臺山圖己巳浙西淮南各進宣索銀葬奩三具冬十月丙子朔宗正寺選尚縣主壻和元亮等二十五人各賜錢三十萬令備吉禮辛巳以吏部侍郎崔從為太常卿庚子嶺南節度使鄭權卒辛丑吐蕃貢犛牛鑄成銀犀牛羊鹿各一壬寅以鄂嶽觀察使檢校兵部尚書崔植檢校吏部尚書兼廣州刺史御史大夫充嶺南節度觀察經略使以戶部侍郎韋顗為御史中丞兼戶部侍郎以御史中丞鄭覃權知工部侍郎以刑部侍郎韋弘景為吏部侍郎以權知禮部侍郎李宗閔權知兵部侍郎以工部侍郎于敖為刑部侍郎十一月丙午朔戊申安南都護李元喜奏黃家賊與環王國合勢陷陸州殺刺史葛維蘇常湖嶽吉潭郴等七州水傷稼庚申葬穆宗于光陵十二月乙亥朔癸未回紇吐蕃奚契丹遣使朝貢襄州柳公綽滄州李全略晉州李寰滑州高承簡並自尚書加檢校右僕射以前起居舍人劉栖楚為諫議大夫淮南節度使王播厚賂貴要求領鹽鐵使諫議大夫獨孤朗張仲方起居郎孔敏行柳公權宋申錫補闕韋仁實劉敦儒拾遺李景讓薛廷老等伏延英抗疏論之戊子夜月掩東井庚寅加天平軍節度使烏重胤同平章事乙未徐泗王智興請置僧尼戒壇浙西觀察使李德裕奏狀論其姦幸時自憲宗朝有敕禁私度戒壇智興冒禁陳請蓋緣久不興置由是天下沙門奔走如不及智興邀其厚利由是致富時議醜之丁酉宰相牛僧孺進封奇章郡公李程彭原郡公竇易直晉陽郡公並食邑三千戶吏部侍郎韓愈卒寶曆元年春正月乙巳朔辛亥親祀昊天上帝于南郊禮畢御丹鳳樓大赦改元寶曆元年先是鄠縣令崔發坐誤辱中官下獄是日與諸囚陳於金雞竿下俟釋放忽有內官五十餘人環發而毆之發破面折齒臺吏以席蔽之方免有詔復繫於臺中宰相救之方釋宰相牛僧孺纍表乞解機務帝許以郊禮後乙卯以僧孺檢校禮部尚書同平章事鄂州刺史充武昌軍節度鄂嶽觀察使淮南節度使王播兼諸道鹽鐵轉運使於鄂州特置武昌軍額寵僧孺也壬申以給事中李渤為桂州刺史兼御史中丞桂管防禦觀察使李德裕獻丹扆針六首上深嘉之命學士韋處厚優其答詔辛卯以前禮部郎中李翺為廬州刺史以求知制誥面數宰相李逢吉過故也辛丑江西觀察使薛放卒癸卯以職方郎中知制誥王璠為御史中丞三月乙巳朔以兵部尚書郭釗為梓州刺史劍南東川節度使壬子宴羣臣於三殿戊辰夜有流星長三丈出紫微入濁滅辛未以前桂管觀察使殷侑為江西觀察使上御宣政殿試制舉人二百九十一人以中書舍人鄭涵吏部郎中崔琯兵部郎中李虞仲並充考制策官夏四月甲戌朔宰相涼國公李逢吉進封鄭國公以右神策大將軍康志睦檢校工部尚書兼青州刺史平盧軍節度使宣中書以諫議大夫劉栖楚為刑部侍郎丞郎宣授自栖楚始也鄭涵等考定制舉人敕下後數日上謂宰相曰韋端符楊魯士皆涉物議宜與外官乃授端符白水尉魯士城固尉宰臣請其罪名不報癸巳羣臣上徽號曰文武大聖廣孝皇帝御宣政殿受册禮畢御丹鳳樓大赦天下大辟罪已下無輕重咸赦除之時李紳貶官李逢吉惡紳不欲紳量移乃於赦書節文內但言左降官已經量移宜與量移近處不言未量移者宜與量移翰林學士韋處厚上疏論列云不可為李紳一人與逢吉相惡遂令近年流貶官皆不得量移則乖曠蕩之道也帝遽命追赦書添改之乙亥以劍南東川節度檢校司空李絳為左僕射御史蕭徹彈京兆尹兼御史大夫崔元略違詔徵畿內所放錢萬七千貫付三司勘鞫不虛辛丑敕削元略兼御史大夫五月甲辰朔以前平盧軍節度使薛平檢校左僕射兼戶部尚書賜振武軍錢一十四萬貫修築東受降城庚戌幸魚藻宮觀競渡庚申正衙命使册九姓回紇登里囉汨沒密施毗伽昭禮可汗丙寅太子少傅致仕閻濟美卒丁卯湖南觀察使沈傳師奏當道先配吐蕃羅沒等一十七人準赦放還本國今各得狀不願還從之庚午以右金吾將軍李文悅為豐州刺史天德軍防禦使安南李元喜奏移都護府於江北岸六月壬申朔乙酉詔公主郡主並不得進女口丙戌將作監張武均出為洋州刺史坐贓犯也諸司白身馮志謀等三百九人並賜祿丁亥命品官田務豐領國信十二車賜回紇可汗及太和公主己丑河中節度使檢校司空李願卒乙未以檢校左僕射兼戶部尚書薛平檢校司空河中尹河中節度使秋七月癸卯朔以忠武軍節度使守司徒兼侍中李光顏為太原尹北京留守河東節度使以兗海節度使王沛為許州刺史忠武軍節度使熒惑犯右執法甲辰鹽鐵使王播進羡餘絹一百萬匹仍請日進二萬計五十日方畢播自掌鹽鐵以正入錢進奉以希寵固位託稱羡餘物議欲鳴鼓而攻之乙酉鄜坊水壞廬舍癸丑以右金吾衛大將軍張茂宗為兗海沂密節度使乙卯正衙命使册司徒李光顏丙辰淄王傅分司元錫卒己未詔王播造競渡船二十隻供進仍以船材京內造時計其功當半年轉運之費諫議大夫張仲方切諫乃改進十隻辛酉萬年縣典賈鎮誣告故統軍王佖男正謨等七人謀亂詔杖殺之甲子夜月犯畢乙丑侍講學士崔郾高重進纂要十卷賜錦綵二百匹丁卯以戶部侍郎韋顗為吏部侍郎京兆尹崔元略為戶部侍郎奉天縣水壞廬舍辛未以左散騎常侍胡證為戶部尚書判度支太子賓客分司盧士玫卒閏七月壬午朔以權知工部侍郎鄭覃為京兆尹甲申拾遺李漢舒元褒薛廷老於閣內論曰伏見近日除授往往不由中書進擬多是內中宣出臣恐紀綱寖壞姦邪恣行伏希詳察上然之詔度支進銅三千斤金薄十萬翻修清思院新殿及升陽殿圖障丙戌戶部尚書致仕裴堪卒戊子以給事中盧元輔為工部侍郎壬辰以前河東節度使李聽為義成軍節度使戊戌以刑部尚書段文昌為兵部尚書依前判左丞事八月辛丑朔戊申以酅國公楊造男元湊襲酅國公食邑三千戶兩京河西大稔敕度支和糴折糴粟二百萬石乙卯夜太白近房戊午遣中使往湖南江南等道及天台山採藥時有道士劉從政者説以長生久視之道請於天下求訪異人冀獲靈藥仍以從政為光祿少卿號升玄先生秋九月辛未朔丁丑衛尉卿劉遵古役人安再榮告前袁王府長史武昭謀害宰相李逢吉詔三司鞫之壬午昭義節度使劉悟卒癸未夜太白犯南斗丙戌夜月犯右執法丁酉華州暴水傷稼徐州王智興奏大將武華等四百人謀亂並伏誅十月庚子朔河南尹王起奏盜銷錢為佛像者請以盜鑄錢論丁巳振武節度使張惟清以東受降城濱河歲久雉堞摧壞乃移置於綏遠烽南及是功成己未以崖州安置人嗣郢王佐為潁王府長史分司東都仍賜金紫壬戌夜太白近哭星甲子三司鞫武昭獄得實武昭及弟彙役人張少騰宜付京兆府決河陽節度掌書記李仲言配流象州彙流崖州太學博士李涉流康州皆坐武昭事也十一月庚午朔辛未以御史中丞王璠為工部侍郎以諫議大夫獨孤朗為御史中丞癸酉鎮星近東井癸未以殿中少監嚴公素為容管經略使是夜月犯東井庚寅車駕幸溫湯即日還宮壬辰以刑部侍郎劉栖楚為京兆尹丙申詔封皇子普為晉王丁酉吏部侍郎韋顗卒十二月己亥朔辛丑以晉王普為昭義軍節度副大使以劉悟子將作監主簿從諫起復雲麾將軍守金吾衛大將軍同正檢校左散騎常侍兼御史大夫充昭義節度留後戊申夜月犯畢其夜北方有霧起須臾遍天霧上有赤氣久而方散甲子以左僕射李絳為太子少師分司東都戊辰敕農功所切實在耕牛疲氓多乏須議給賜委度支往河東振武靈夏等州市耕牛一萬頭分給畿內貧下百姓是歲淮南浙西宣襄鄂潭湖南等州旱災傷稼二年春正月己巳朔庚午貶殿中侍御史王源植為昭州司馬時源植街行為教坊樂伎所侮導從呵之遂成紛競京兆尹劉栖楚決責樂伎御史中丞獨孤朗論之太切上怒遂貶源植辛未湖南觀察使沈傳師奏奉詔校尋葉靖能羅光遠文案檢尋不獲癸酉右贊善大夫李光現與品官李重實爭忿以笏擊重實流血上以宗屬罰兩月俸料甲戌以諸軍丁夫二萬入內穿池修殿辛巳興元節度使裴度奏修斜谷路及館驛皆畢功壬辰裴度來朝甲午以衛尉卿劉遵古為湖南觀察使以國子祭酒衛中行為福建觀察使丙申鹽鐵使王播奏揚州城內舊漕河水淺舟船澀滯輸不及期程今從閶門外古七里港開河向東屈曲取禪智寺橋東通舊官河計長一十九里其功役所費當使自方圓支遣從之二月己亥朔辛丑容管經略使嚴公素奏當州普寧等七縣請同廣昭桂賀四州例北選從之丙午夜月犯畢丁未以山南西道節度觀察處置等使光祿大夫守司空同中書門下平章事興元尹上柱國晉國公裴度守司空同平章事復知政事丁巳寒食節三殿宴羣臣自戊午至庚申方止丙寅正册司空裴度丁卯以禮部尚書王涯檢校左僕射為山南西道節度使三月戊辰朔命興唐觀道士孫準入翰林待詔辛未江西觀察使殷侑請於洪州寶曆寺置僧尼戒壇敕殷侑故違制令擅置戒壇罰一季俸料甲戌賜宰臣百僚上巳宴于曲江亭乙亥右散騎常侍李翺卒戊寅幸魚藻宮觀競渡辛巳以同州刺史蕭俯為太子少保分司壬午以工部尚書裴武為同州刺史癸未嶺南節度使崔植奏廣湖封雷潘辨等七州戍軍除折衝別將外並請停從之丙戌昆明夷遣使朝貢丁亥敕册才人郭氏為貴妃丙申以吏部侍郎韋弘景為陝虢觀察使四月戊戌朔橫海軍節度使李全略卒壬寅以右金吾衛大將軍高承簡為邠寧慶節度使丙午王廷湊檢校司空戊申昭義節度使留後劉從諫檢校工部尚書充昭義節度副大使知節度事庚戌鄂嶽觀察使牛僧孺奏當道沔州與鄂州隔江相對才一里餘其州請併省其漢陽汊川兩縣隸鄂州從之丙辰右金吾衛大將軍高霞寓卒丙寅先是王廷湊請於當道立聖德碑是日內出碑文賜廷湊五月戊辰朔上御宣和殿對內人親屬一千二百人並於教坊賜食各頒錦綵辛未祕書省著作郎韋公肅注太宗所撰帝範十二篇進特賜錦綵百匹甲戌以涇原節度楊元卿為河陽三城懷州節度使以金吾衛大將軍李祐為涇原節度使是夜月近太微星浙西送到絶粒女道士施子微戊寅幸魚藻宮觀競渡庚辰中使自新羅取鷹鷂回幽州軍亂殺其帥朱克融及男延齡軍人立其第二子延嗣為留後辛巳神策軍苑內古長安城中修漢未央宮掘獲白玉牀一張長六尺癸未山人杜景先於光順門進狀稱有道術令中使押杜景先往淮南及江南湖南嶺南諸州求訪異人甲申以右丞丁公著為兵部侍郎以前湖南觀察使沈傳師為尚書左丞辛卯贈朱克融司徒甲午夜熒惑犯昴賜興唐觀道士劉從政修院錢二萬貫六月丁酉朔賜御史中丞獨孤朗金紫丁巳減放苑內役人二千五百帝性好土木自春至冬興作相繼庚申鄆州進驢打毬人石定寬等四人是夜太白犯昴辛酉幸凝碧池令兵士千餘人於池中取大魚長大者送入新池癸亥以旱命京城諸司疏理繫囚以延康坊官宅一區為諸王府司局甲子上御三殿觀兩軍教坊內園分朋驢鞠角抵戲酣有碎首折臂者至一更二更方罷秋七月丙寅朔乙亥河中進力士八人癸未衡王絢薨癸巳敕鄠縣渼陂尚食管係太倉廣運潭復賜司農寺八月丙申朔以司空平章事裴度判度支以工部侍郎王播為河南尹代王起以起為吏部侍郎以前福州觀察使徐晦為工部侍郎是夜太白近太微令供奉道士二十人隨浙西處士周息元入內宮之山亭院上問以道術言識張果葉靜能浙西觀察使李德裕上疏言息元誕妄無異於人庚戌以太府卿李憲為江西觀察使丁丑夜月犯輿鬼加京兆尹劉栖楚兼御史大夫癸丑以太常卿崔從檢校吏部尚書判東都尚書省事兼御史大夫東都留守東畿汝都防禦使九月丁丑朔大合宴於宣和殿陳百戲自甲戌至丙子方已戊寅河東節度使守司徒兼侍中李光顏卒出內庫錢萬貫令內園召募力士幽州監軍奏都知兵馬使李再義與弟再寧同殺朱延嗣並其家屬三百餘人推再義為留後壬申宰相李程為北都留守河東節度使敕戶部所管同州長春宮莊宅宜令內莊宅使管係冬十月乙未朔乙亥以幽州衙前都知兵馬使李再義檢校戶部尚書充盧龍軍節度副大使知節度事仍賜名載義壬戌以中書舍人崔郾為禮部侍郎十一月甲子朔以太清宮道士趙歸真充兩街道門都教授博士帝好深夜自捕狐貍宮中謂之打夜狐中官許遂振李少端魚弘志以侍從不及削職壬申以戶部尚書胡證檢校兵部尚書兼廣州刺史充嶺南節度使甲申以右僕射同平章事李逢吉檢校司空同平章事兼襄州刺史充山南東道節度使臨漢監牧使乙酉同州刺史裴武卒己丑詔朝官及方鎮人家不得置私白身癸巳以前東都留守楊於陵為太子少傅中官李奉義王惟直成守貞各杖三十分配諸陵宣徽使閻弘約副使劉弘逸各杖二十十二月甲午朔辛丑帝夜獵還宮與中官劉克明田務成許文端打毬軍將蘇佐明王嘉憲石定寬等二十八人飲酒帝方酣入室更衣殿上燭忽滅劉克明等同謀害帝即時殂於室內時年十八羣臣上諡曰睿武昭愍孝皇帝廟號敬宗大和元年七月十三日葬于莊陵史臣曰古人謂堯無子舜無父言其賢不肖之相遠也以文惠驕誕之性繼之以昭愍固其宜也而昭獻昭肅英特不羣文足以緯邦家武足以平禍亂三子之操行頓異其何道哉寶曆不君國統幾絶天未降喪幸賴裴度復任弼諧彼狡童兮夫何足議文宗元聖昭獻孝皇帝諱昂穆宗第二子母曰貞獻皇后蕭氏元和四年十月十日生長慶元年封江王初名涵寶曆二年十二月八日敬宗遇害賊蘇佐明等矯制立絳王勾當軍國事樞密使王守澄中尉梁守謙率禁軍討賊誅絳王迎上于江邸癸卯見宰臣于閣內下教處分軍國事甲辰僧惟真齊賢正簡道士趙歸真並配流嶺南擊毬軍將于登等六人令本軍處置宰臣百僚三上表勸進乙巳即位於宣政殿丙午上赴西宮成服丁未宰臣百僚上表請聽政三表許之道士紀處玄楊沖虛伎術人李元戢王信等並配流嶺南戊申尊聖母為皇太后己酉敕鳳翔淮南先進女樂二十四人並放歸本道庚戌以正議大夫尚書兵部侍郎知制誥充翰林學士柱國賜紫金魚袋韋處厚為中書侍郎同中書門下平章事以翰林學士路隨承旨侍講學士宋申錫充書詔學士丙辰以山南東道節度使柳公綽為刑部尚書丁巳為絳王舉哀廢朝三日庚申詔君天下者莫尚乎崇淡泊子困窮遵道以端本推誠而達下故聖祖之誡以慈儉為寶大易明訓垂簡易之文未有上約而下不豐欲寡而求不給朕以眇薄遭逢內難刷君父之讎恥攄億兆之哀冤而股肱大臣羣卿庶士引義抗請至于再三以圖宗社之安以答華夷之望俯從衆欲夙夜震兢思所以克己復禮修政安人宵興匪寧旰食勞慮夫儉過則酌之以禮文勝則矯之以質庶乎俗登太古道洽生靈儀刑家邦以化天下內庭宮人非職掌者放三千人任從所適長春宮斛斗諸物依前戶部收管鄠縣渼陂鳳翔府駱谷地還府縣教坊樂官翰林待詔伎術官並總監諸色職掌內冗員者共一千二百七十人並宜停廢總監中一百二十四人先屬諸軍並各歸本司餘七百三人勒納牒身放歸本管先供教坊衣糧一百分廂家及諸司新加衣糧三千分並宜停給五方鷹鷂並解放今年新宣附食度支衣糧小兒一百人並停給別詔宣索纂組雕鏤不在常貢內者並停度支鹽鐵戶部及州府百司應供宮禁年支一物已上並準貞元元額為定先造供禁中牀榻以金筐瑟瑟寶鈿者悉宜停造東頭御馬坊毬場宜卻還龍武軍其殿及亭子所司毀拆餘舍賜本軍應行從處張陳不得用花蠟結綵華飾今年已來諸道所進音聲女人各賜束帛放還城外墳墓先有開斸以備行幸處宜曉示百姓任其修塞其大逆魁首蘇佐明等二十八人並已處斬宗族籍沒妖妄僧惟貞道士趙歸真等或假於卜筮或託以醫方疑衆挾邪已從流竄其情非姦惡迹涉詿誤者一切不問凶徒既殄寰宇佇康載舉令猷用弘庶績布告中外知朕意焉帝在藩邸知兩朝之積弊此時釐革並出宸衷士民相慶喜理道之復興矣壬戌以前江西觀察使殷侑為大理卿大和元年春正月癸亥朔庚午以御史中丞獨孤朗為戶部侍郎以兵部尚書權判左丞事段文昌為御史大夫是夜月掩畢大星戊寅以左散騎常侍李益為禮部尚書致仕以京兆尹劉栖楚為桂管觀察使以前戶部侍郎于敖為宣歙觀察使代崔羣以羣為兵部尚書癸未以吏部侍郎庾承宣為京兆尹兼御史大夫丙申復置兩輔六雄十望十緊三十四州別駕其諸色在京及內外諸軍使等職事並不在挾名限己亥以右散騎常侍集賢殿學士判院事張正甫為工部尚書辛丑以前廣州節度使崔植為戶部尚書以太子少師分司東都李絳檢校司空兼太常卿乙巳御丹鳳樓大赦改元大和甲寅敕諸道節度觀察使去任日宜具交割狀仍限新使到任一月分析聞奏以憑殿最丙辰以華州刺史錢徽為尚書右丞以前河陽節度使崔弘禮為華州鎮國軍使己未以太子少保分司蕭俯為檢校右僕射兼禮部尚書庚申以虔州刺史韓約為安南都護三月庚戌朔右軍中尉梁守謙請致仕以樞密使王守澄代之戊寅以前蘇州刺史白居易為祕書監仍賜金紫壬午幽州李載義奏故張弘靖判官家屬凡一百九十人並送赴闕四月壬辰朔癸巳以太子少傅楊於陵守右僕射致仕俸料全給甲午鳳翔築臨汧城於汧陽縣西北八十里壬寅毀升陽殿東放鴨亭戊申毀望仙門側看樓十間並敬宗所造也以前亳州刺史張遵為雍管經略使乙卯以禮部尚書蕭俯為太子少師分司己未忠武軍節度使王沛卒庚申以太僕卿高瑀檢校左散騎常侍充忠武軍節度己巳貶山南東道節度副使李續為涪州刺史山南東道行軍司馬張又新為汀州刺史李逢吉黨也五月壬戌朔戊辰詔元首股肱君臣象類義深同體理在坦懷夫任則不疑疑則不任然自魏晉已降參用霸制虛議搜索因習尚存朕方推表大信置人心腹庶使諸侯方嶽鼓洽道化夷貊飛走暢泳治功況吾台宰又何間焉自今已後紫宸坐朝衆僚既退宰臣復進奏事其監搜宜停丙子以天平軍節度使守司徒同中書門下平章事烏重胤為橫海軍節度使以前攝橫海軍節度副使檢校國子祭酒侍御史李同捷檢校左散騎常侍兼兗州刺史充兗海沂密等州節度使就加魏博史憲誠同平章事甲申淮南節度鹽鐵轉運等使王播來朝丙戌夜熒惑犯右執法六月辛卯朔敕文武常參官朝參不到據料錢多少每貫罰二十五文癸巳以淮南節度副大使知節度事管內營田觀察處置臨海監牧等使兼諸道鹽鐵轉運等使銀青光祿大夫檢校司空同中書門下平章事揚州大都督府長史上柱國太原縣開國伯食邑七百戶王播可尚書左僕射同中書門下平章事依前充諸道鹽鐵轉運使以御史大夫段文昌代播為淮南節度使丙申左司郎中兼侍御史知雜溫造權知御史中丞癸卯詔元和長慶中皆因用兵權以濟事所下制敕難以通行宜令尚書省取元和已來制敕參詳刪定訖送中書門下議定聞奏甲寅以旱放繫囚七月辛酉朔癸亥太常卿李絳進封魏國公李同捷除兗海不受詔結幽鎮謀叛癸酉葬敬宗于莊陵辛巳敕今年權于東都置舉徐州王智興請全軍討李同捷八月庚寅朔以工部侍郎獨孤朗為福建觀察使以太府卿裴弘泰為黔中經略使觀察使左僕射致仕楊於陵讓全給俸料許之庚子詔削奪李同捷在身官爵復以張茂宗為兗海沂密節度使辛丑邠寧節度使高承簡卒壬寅以刑部尚書柳公綽檢校左僕射充邠寧節度使戊申以諫議大夫張仲方為福建觀察使癸丑前福建觀察使獨孤朗卒九月庚申朔癸亥以左神策軍將軍知軍事何文哲為鄜坊丹延節度使甲戌以左神策大將軍知軍事李泳為單于都護充振武麟勝節度使丁丑浙西觀察使李德裕浙東觀察使元稹就加檢校禮部尚書壬午桂管觀察使劉栖楚卒丙戌以諫議大夫蕭裕為桂管觀察使癸丑兗州復置萊蕪縣十一月己未朔丙申河中薛平奏虞鄉縣有白虎入靈峯觀天平橫海等軍節度使守司徒同中書門下平章事烏重胤卒庚辰以保義軍節度晉慈等州觀察處置等使李寰為橫海軍節度使癸巳以晉州慈州復隸河中癸巳以左丞錢徽為華州刺史丁酉右金吾衛大將軍王公亮為潭州刺史湖南觀察使二年春正月戊午朔壬申以右散騎常侍孔戢為京兆尹二月丁亥朔以兵部侍郎王起為陝虢觀察使代韋弘景以弘景為尚書左丞乙巳以刑部侍郎盧元輔為兵部侍郎祕書監白居易為刑部侍郎庚戌敕李絳所進則天太后刪定兆人本業三卷宜令所在州縣寫本散配鄉村三月丁巳朔度支奏京兆府奉先縣界鹵池側近百姓取水柏柴燒灰煎鹽每一石灰得鹽一十二斤一兩亂法甚於鹹土請行禁絶今後犯者據灰計鹽一如兩池鹽法條例科斷從之辛巳上御宣政殿親試制策舉人以左散騎常侍馮宿太常少卿賈餗庫部郎中龐嚴為考制策官閏三月丙戌朔內出水車樣令京兆府造水車散給緣鄭白渠百姓以溉水田夏四月丙辰朔壬午以雍管經略使王茂元為容管經略使五月乙酉朔丁巳命中使於漢陽公主及諸公主第宣旨今後每遇對日不得廣插叉梳不須著短窄衣服乙未以吏部侍郎丁公著為禮部尚書庚子敕應諸道進奉內庫四節及降誕進奉金花銀器並纂組文纈雜物並折充鋌銀及綾絹其中有賜與所須待五年後續有進止帝性恭儉惡侈靡庶人務敦本故有是詔帝與侍講學士許康佐語及取蚺蛇膽生剖其腹為之惻然乃詔度支曰每年供進蚺蛇膽四兩桂州一兩賀州二兩泉州一兩宜於數內減三兩桂賀泉三州輪次歲貢一兩帝自撰集尚書中君臣事迹命畫工圖於太液亭朝夕觀覽焉王廷湊出兵侵鄰藩欲撓王師以援李同捷昭義劉從諫請出軍討之六月乙卯朔晉王普薨贈為悼懷太子陳州水害秋稼癸亥四方館請賜印其文以中書省四方館為名辛酉以吏部尚書鄭絪為太子少保辛巳以靈武節度使李進誠為邠寧節度使以天德軍使李文悅為靈武節度使乙酉以前邠寧節度使柳公綽檢校左僕射兼刑部尚書甲辰詔宰臣集三署四品已上常參官議討王廷湊可否是夜彗西出攝提南長二尺八月甲寅朔丁巳以兵部侍郎盧元輔為華州鎮國軍使以代錢徽以徽為吏部尚書致仕壬戌京畿奉先等十七縣水九月甲申朔丁亥王智興拔棣州以新除橫海軍節度使李寰為夏州節度使甲午詔削奪王廷湊在身官爵鄰道接界隨便進討以前夏州節度使傅良弼為橫海軍節度使庚戌安南軍亂逐都護韓約冬十月癸丑朔丁巳罷揚州海陵監牧以戶部尚書崔植為華州刺史鎮國軍使丙寅嶺南節度使胡證卒辛未以江西觀察使李憲為嶺南節度使癸酉以尚書右僕射同平章事竇易直檢校左僕射同平章事充山南東道節度使臨漢監牧等使代李逢吉以逢吉為宣武軍節度使代令狐楚以楚為戶部尚書以右丞沈傳師為江西觀察使己卯以河南尹王璠為右丞以左散騎常侍馮宿為河南尹十一月癸未朔乙酉以右金吾衛大將軍李祐為橫海軍節度使新除傅良弼赴鎮卒於陝州故也甲辰禁中巳時昭德寺火直宣政殿之東至午未間北風起火勢益甚至暮稍息十二月壬子朔乙丑魏博行營都知兵馬使亓志紹率所部兵馬二萬人謀叛欲殺史憲誠父子壬申中書侍郎同平章事韋處厚暴卒戊寅詔以兵部侍郎知制誥充翰林學士路隨為中書侍郎同平章事三年春正月壬午朔丙戌亓志紹率兵回據永濟縣其衆分散入諸縣邑史憲誠告難詔滄州行營兵士赴之丁亥京兆尹孔戢卒庚寅吏部尚書致仕錢徽卒庚子李聽殺敗亓志紹兵志紹北走鎮州甲辰以太常卿李絳檢校司空兼興元尹山南西道節度使華州刺史鎮國軍潼關防禦使崔植卒己酉以前山南西道節度使王涯為太常卿二月辛亥朔以兵部尚書崔羣為荊南節度使甲寅荊南節度使王潛卒三月辛巳朔以戶部尚書令狐楚為東都留守乙酉敕兵戈未息教坊每日祗候樂人宜權停壬辰易定節度使柳公濟卒以前東都留守崔從為戶部尚書夏四月庚午王智興奏部下將石雄搖扇軍情請行朝典乃長流白州五月己卯朔甲申柏耆斬李同捷於將陵滄景平李祐入滄州丁亥御興安樓受滄州所獻李祐送李同捷母妻及男元達等赴闕詔並宥之令於湖南安置貶滄德宣慰使諫議大夫柏耆循州司戶宣慰判官殿中侍御史沈亞之虔州南康尉以擅入滄州取李同捷諸鎮所怒奏論之也丙申橫海軍節度使李祐卒以涇原節度使李岵為齊德等州節度使改名有裕丁酉以前義武軍節度使傅毅為滄州刺史橫海軍節度使辛丑以右金吾衛大將軍張惟清檢校司空充涇原節度使以左金吾衛大將軍劉遵古為邠寧節度使六月己酉朔辛亥以魏博節度使史憲誠檢校司徒兼侍中河中尹充河中晉絳節度使以義成軍節度使李聽兼充魏博節度使以魏博節度副使檢校工部尚書史孝章為相衛節度使壬申敕元和四年敕禁鉛錫錢皆納官許人糾告一錢賞百錢此為太過此後以鉛錫錢交易者一貫以下州府常行杖決脊杖二十十貫以下決六十徒三年過十貫已上集衆決殺能糾告者一貫賞錢五十文秋七月己卯朔癸未中使劉弘逸送史憲誠旌節自魏州還稱六月二十六日夜魏博軍亂殺史憲誠立大將何進滔為留後其新節度使李聽入城不得乙丑河中節度使薛平依前河中節度使乙未嶺南節度使李憲卒兵部侍郎盧元輔卒丁酉以京兆尹崔護為御史大夫廣南節度使戊戌以大理卿李諒為京兆尹乙巳以禮部尚書翰林侍講學士丁公著檢校戶部尚書兼潤州刺史充浙江西道觀察使以前浙西觀察使檢校禮部尚書李德裕為兵部侍郎辛亥魏博何進滔奏準詔割相衛三州三軍不受壬子詔以魏博衙內都知兵馬使何進滔檢校左散騎常侍充魏博節度使癸丑以衛尉卿殷侑檢校工部尚書為齊德滄節度使辛酉京畿奉先等九縣旱損田播州流人衛中行卒宋亳水害稼壬申詔雪王廷湊復官爵甲戌以吏部侍郎李宗閔同中書門下平章事九月戊寅朔辛巳敕兩軍諸司內官不得著紗縠綾羅等衣服帝性儉素不喜華侈駙馬韋處仁戴夾羅巾帝謂之曰比慕卿門地清素以之選尚如此巾服從他諸戚為之唯卿非所宜也壬辰以兵部侍郎李德裕檢校戶部尚書兼滑州刺史義成軍節度使戊戌以前睦州刺史陸亘為越州刺史浙東觀察使代元稹以稹為尚書左丞代韋弘景以弘景為禮部尚書冬十月戊申朔己酉江西沈傳師奏皇帝誕月請為僧尼起方等戒壇詔曰不度僧尼纍有敕命傳師悉為藩守合奉詔條誘致愚妄庸非理道宜罰一月俸料丙辰以前義成軍節度使李聽為太子少師癸亥以戶部侍郎崔元略為戶部尚書判度支以中書舍人韋辭為湖南觀察使十一月丁丑朔庚辰太子太傅鄭絪卒丙戌敕前亳州刺史李繁於京兆府賜死甲申帝親祀昊天上帝於南郊禮畢御丹鳳門大赦節文禁止奇貢云四方不得以新樣織成非常之物為獻機杼纖麗若花絲布繚綾之類並宜禁斷敕到一月機杼一切焚棄刺史分憂得以專達事有違法觀察使然後奏聞丙申西川奏南詔蠻入寇甲辰王智興來朝乙巳以智興守太傅依前平章事武寧軍節度使進封鴈門郡王十二月丁未朔南蠻逼戎州遣使起荊南鄂嶽襄鄧陳許等道兵赴援蜀川以劍南東川節度使郭釗為西川節度使仍權東川事壬子貶劍南西川節度使杜元穎為韶州刺史遣中使楊文端齎詔賜南蠻王蒙豐佑蠻軍陷邛雅等州戊午以右領軍衛大將軍董重質充神策西川行營都知兵馬使西川奏蠻軍陷成都府東川奏蠻軍入梓州西郭門下營又詔促諸鎮兵救援西川己丑以東都留守令狐楚檢校右僕射天平軍節度使代崔弘禮為東都留守丁卯貶杜元穎循州司馬乙巳郭釗奏蠻軍抽退遣使賜蠻帥蒙巔國信辛未以太子少師李聽為邠寧節度使癸酉以中丞溫造為右丞吏部郎中宇文鼎為中丞
