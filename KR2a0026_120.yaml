body:
  text: 舊唐書卷一百一十六列傳第六十六肅宗代宗諸子肅宗十三子代宗二十子越王係承天皇帝倓衞王佖彭王僅兗王僴涇王侹鄆王榮襄王僙嵵王倕召王偲恭懿太子佋定王侗淮陽王僖昭靖太子邈均王遐睦王述丹王逾恩王連韓王迥簡王遘益王迺隋王迅荊王選蜀王遡忻王造韶王暹嘉王運端王遇遁王遹恭王通原王逵雅王逸肅宗皇帝十四子章敬皇后生代宗皇帝宮人孫氏生越王係張氏生承天皇帝王氏生衞王佖陳婕妤生彭王僅韋妃生兗王僴張美人生涇王侹裴昭儀生襄王僙段婕妤生嵵王倕崔妃生召王偲張皇后生恭懿太子佋定王侗宮人生鄆王榮宋王僖越王係本名儋肅宗第二子也天寶中封南陽郡王授特進至德二年十二月進封趙王乾元二年三月九節度之兵潰於河北史思明僭號於相州王師未集朝廷震駭詔以李光弼握兵關東以代子儀光弼請以親賢統師七月詔曰握兵之要古先為重命帥之道心膂攸憑是知靖難夷兇必資於金革總戎授律實仗於親賢蓋將底寧邦家保息黎獻者矣朕以薄德纘承鴻緒往屬元兇暴亂中夏不寧上憑宗社之靈下藉熊羆之力由是廓清咸洛拯此生人頃以河朔殘妖尚稽天討蛇豕竊依於城堡塗炭久被於齊甿朕為人父母寧忘閔念雖好生息戰每冀其歸降而餘昧恩靡聞于悔禍所以軒后親征於獯鬻周文致役於昆夷古之用兵蓋非獲已趙王係幼稟異操夙懷韜略負東平之文學蘊任城之智勇性惟忠孝持愛敬以立身志尚權謀有經通之遠智知子者父方有屬於維城擇能而授俾克申於戎律且兇徒嘯聚頗歷歲時惡既貫盈理當撲滅君親有命可不敬乎俾展龍豹之韜永清梟獍之類可充天下兵馬元帥仍令司空兼侍中薊國公光弼副知節度行營事應緣軍司署置所司準式九月史思明陷洛陽光弼以副元帥董兵守河陽王不出京師十月下詔車駕親征諫官論奏乃止王請行不許三年四月改封越王寶應元年四月肅宗寢疾彌留皇后張氏與中官李輔國有隙因皇太子監國謀誅輔國使人以肅宗命召太子入宮皇后謂太子曰賊臣輔國久典禁軍四方詔令皆出其口頃矯制命逼徙聖皇今聖體彌留心懷怏怏常忌吾與汝又聞射生內侍程元振結託黃門將圖不軌若不誅之禍在頃刻太子泣而對曰此二人是陛下勳舊內臣今聖躬不康重以此事驚撓聖慮情所難任若決行此命當出外徐圖之后知太子難與共事乃召係謂之曰皇太子仁惠不足以圖平禍難復以除輔國謀告之曰汝能行此事乎係曰能后令內謁者監段恆俊與越王謀召中官有武勇者二百餘人授甲於長生殿是月乙丑皇后矯詔召太子程元振伺知之告輔國元振握兵於凌霄門候之太子既至以難告太子曰必無此事聖恙危篤吾豈懼死不赴召乎元振曰為社稷計行則禍及矣遂以兵護太子匿於飛龍丙寅夜元振輔國勒兵於三殿前收捕越王及同謀內侍朱光輝段恆俊等百餘人禁繫幽皇后於別殿侍者十數人隨之是日皇后越王俱為輔國所害係子建逌逾建建中元年十一月封武威郡王授殿中監同正員逌封興道郡王授殿中監同正員逾封齊國公光祿卿同正員承天皇帝倓肅宗第三子也天寶中封建寧郡王授太常卿同正員英毅有才略善射祿山之亂玄宗幸蜀倓兄弟典親兵扈從車駕渡渭百姓遮道乞留太子太子諭之曰至尊奔播吾不忍違離左右俟吾見上奏聞倓於行宮謂太子曰逆胡犯順四海分崩不因人情何以興復夫有國家者大孝莫若存社稷今從至尊入蜀則散關已東非皇家所有何以維屬人情殿下宜購募豪傑暫往河西收拾戎馬點集防邊將卒不下十萬人光弼子儀全軍河朔謀為興復計之上也廣平王亦贊成之於是令李輔國奏聞玄宗欣然聽納乃分從官士卒以遣之時敗卒膽破兵仗不完太子既北上渡渭一日百戰倓自選驍騎數百衞從每蒼黃顛沛之際血戰在前太子或過時不得食倓涕泗不自勝上尤憐之軍士屬目歸於倓至靈武太子即帝位廣平既為元子欲以倓為天下兵馬元帥侍臣曰廣平王冢嗣有君人之量上曰廣平地當儲貳何假更為元帥左右曰廣平今未冊立艱難時人尤屬望於元帥況太子從曰撫軍守曰監國今之元帥撫軍也廣平為宜遂以廣平為元帥倓典親軍李輔國為元帥府司馬時張良娣有寵倓性忠謇因侍上屢言良娣頗自恣輔國連結內外欲傾動皇嗣自是日為良娣輔國所構云建寧恨不得兵權頗畜異志肅宗怒賜倓死既而省悟悔之明年冬廣平王收復兩京遣判官李泌入朝獻捷泌與上有東宮之舊從容語及建寧事肅宗改容謂泌曰倓於艱難時實得氣力無故為下人之所間欲圖害其兄朕以社稷大計割愛而為之所也泌對曰爾時臣在河西豈不知其故廣平兄弟天倫篤睦至今廣平言及建寧則嗚咽不已陛下之言出於讒口也帝因泣下曰事已及此無如之何泌因奏曰臣幼稚時念黃臺瓜辭陛下嘗聞其說乎高宗大帝有八子睿宗最幼天后所生四子自為行第故睿宗第四長曰孝敬皇帝為太子監國而仁明孝悌天后方圖臨朝乃鴆殺孝敬立雍王賢為太子賢每日憂惕知必不保全與二弟同侍於父母之側無由敢言乃作黃臺瓜辭令樂工歌之冀天后聞之省悟即生哀愍辭云種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘猶尚可四摘抱蔓歸而太子賢終為天后所逐死于黔中陛下有今日運祚已一摘矣慎無再摘上愕然曰公安得有是言時廣平王立大功亦為張皇后所忌潛構流言泌因事諷動之及代宗即位深思建寧之冤追贈齊王大曆三年五月詔曰故齊王倓承天祚之慶保鴻名之光降志尊賢高才好學藝文博洽智略宏通斷必知來謀皆先事識無不達理至逾精乃者寇盜橫流鑾輿南幸先聖以宸扆之戀將侍君親惟王以宗廟之重誓寧家國克協朕志載符天時立辨羣議之非同獻五原之計中興之盛實藉奇功景命不融早從厚穸天倫之愛震惕良深流涕追封胙于東海頃加表飾未極哀榮夫以參舊邦再造之勤成天下一家之業而存未峻其等歿未尊其稱非所以旌徽烈明至公也朕以眇身纘膺大寶不及讓王之禮莫申太弟之嗣所懷靡殫邈想逾切非常之命寵錫攸宜敬用追諡曰承天皇帝與興信公主第十四女張氏冥婚諡曰恭順皇后有司準式擇日冊命改葬于順陵仍祔于奉天皇帝廟同殿異室焉衞王佖肅宗第四子天寶中封西平郡王授殿中監同正員早薨寶應元年五月追贈衞王彭王僅肅宗第五子天寶中封新城郡王授鴻臚卿同正員至德二年十二月進封彭王乾元二年冬史思明再陷河洛關東用兵人情震懼羣臣請以親王遙統兵柄三年四月詔曰古之哲王宅中御宇莫不內封子弟外建藩維故周稱百代抑聞麟趾之美漢命六官亦樹犬牙之制歷考前載率由舊章朕以薄德纘承鴻緒屬豺狼未殄金革猶虞賴文武藎臣協心同德庶克清於玄祲期永保於皇圖且授鉞分符義已先於用武又維城作翰道方弘於建親咨爾分閫之崇成予磐石之固彭王僅等銀潢毓慶璿萼分輝忠孝稟於天成文武稱其備用今三秦之地萬國來庭誠宜列皇子以建封崇懿藩而制勝是資固本委以臨戎彭王僅可充河西節度大使兗王僴可充北庭節度大使涇王侹可充隴右節度大使嵵王倕可充陝西節度大使興王佋可充鳳翔節度大使僅是歲薨子鎮授太僕卿同正員封常山郡王兗王僴肅宗第六子母韋妃刑部尚書堅之妹肅宗在東宮選為太子妃生僴及永和公主堅後為李林甫誣構被誅太子懼奏請與妃離異於別宮安置僴天寶中封潁川郡王授太子詹事同正員至德二年十二月進封兗王乾元三年領北庭節度大使寶應元年薨涇王侹肅宗第七子天寶中封東陽郡王授光祿卿同正員至德二載十二月進封涇王乾元三年領隴右節度大使興元元年薨鄆王榮肅宗第八子天寶中封靈昌郡王早世寶應元年五月追贈鄆王襄王僙肅宗第九子至德二載十二月封襄王貞元七年正月薨嵵王倕肅宗第十子母段婕妤貞元六年六月贈為昭儀倕至德二載封貞元十四年薨召王偲肅宗第十一子至德二載十二月封元和元年薨恭懿太子佋肅宗第十二子至德二載封興王上元元年六月薨佋皇后張氏所生上尤鍾愛后屢危太子欲以興王為儲貳會薨而止七月丁亥曰厚禮所以飾終易名所以表行況情鍾天屬寵及褒封載疇加等之美式備元儲之贈永懷軫念有惻彝章第十二子故興王佋毓慶璿源分華若木天資純孝神假聰明河間聚書幼聞樂善之旨延陵聽樂早得知音之妙頃以暫嬰沉瘵殆積旬時而資敬益彰穎晤逾爽愛親之戀言不間於斯須告訣之辭事先符於夢寐顧惟至性實切深哀將胙土析珪載崇藩翰聞詩對易爰就琢磨方冀成立豈期夭喪瑤英始茂遽摧於當春隙駟俄遷忽沉於厚夜興言痛悼閔惜良深宜賁寵於青宮俾哀榮於玄穸可贈太子諡曰恭懿應緣喪葬所司準式仍令京兆尹劉晏充監護使詔宰臣李揆持節冊命十一月葬于高陽原其哀冊曰維上元元年太歲庚子六月己未朔二十六日甲申皇第十二子持節鳳翔等四州節度觀察大使興王佋薨于中京內邸殯于寢之西階粵八月丁亥冊贈皇太子廟號恭懿冬十一月庚寅詔葬于長安之高陽原禮也燕隧開封龍轀進轍陳祖載而就位儼塗芻以成列皇帝哀玉林之閟景憫璿萼之罹霜瞻龍綍而增思懷雁池而永傷考諡惟古褒崇有式爰詔史司恭宣懿德其辭曰惟天祚唐累葉重光中興宸景再紐乾綱本枝建國磐石疏疆克開龍胤實曰賢王驪源孕彩日幹騰芳深仁廣孝蘊藝含章秀發童年惠彰齔齒蹈禮知方承尊叶旨對日流辯占鳳擅美魯衞後塵間平絕軌胡孽初構王師未班爰從襁褓載歷險艱愛備中掖名崇懿藩居常稟訓動不違顏禮及佩觿朝加分器胙土延渥登壇受帥玉質金聲文經武緯樂善為寶崇儒是貴濬哲外朗溫文內深閱書成誦觀樂表音五經在口六律諧心才優藝洽絕古超今蛇豕猶梗寰區未乂滌慮祈真焚香演偈食去葷血心依定惠庶福邦家俾清兇穢霧露嬰疾聰明害神沉痾始遘彌曠盈旬止慮無擾發言有倫在膏方亟問膳逾勤雲物告徵星辰變象楚藥無救秦醫莫仗靈儀窅而上賓徽音邈其長往違舊邸於青社即幽陵於黃壤嗚呼哀哉魂氣奪兮去何之精靈存兮孝有思念君親之永隔託夢寐而來辭延桂宮而震悼貫椒壼而纏悲旌遺芳於碣館賁新命於儲闈嗚呼哀哉先遠戒候占龜獻吉指鶉野而西臨背鳳城而右出天慘慘而苦霧山蒼蒼而曀日望馳道而長辭赴幽塗而永畢嗚呼哀哉生為寵王兮宸愛所鍾歿追上嗣兮朝典斯崇升玉笙於洞府閟銀棨於泉宮金石誰固人生有終簡冊攸記兮德音無窮敢直詞於篆美庶永代而成風嗚呼哀哉佋薨時年八歲既薨之夕肅宗張后俱夢佋有如平昔拜辭流涕而去帝方寢疾追念過深故特以儲闈之贈寵之上疾累月方平定王侗肅宗第十三子亦張后所生佋之母弟至德二載封定王寶應初薨時年甚幼宋王僖肅宗第十四子初封淮陽王早夭追封宋王代宗皇帝二十子睿真皇后沈氏生德宗皇帝崔妃生昭靖太子獨孤皇后生韓王迥餘十七王舊史不載母氏所出昭靖太子邈代宗第二子寶應元年封鄭王大曆初代皇太子為天下兵馬元帥王好讀書以儒行聞大曆九年薨廢朝三日由是罷元帥之職上惜其才早夭冊贈昭靖太子葬於萬年縣界均王遐代宗第三子早夭貞元八年追封睦王述代宗第四子大曆九年冬田承嗣謀亂河朔時鄭王居長典兵師不幸薨落諸王皆幼多未封建大臣奏議請封親王分領戎師以威天下十年二月詔曰虞夏之制諸子疏封漢魏以還十連授律是用錫珪班瑞盤石開疆信通邑之紀綱為中都之屏翰然則旌鉞之寄推擇攸難因親之任各膺其命第四子述第五子逾第六子連第七子迥第八子遘第十三子造第十四子暹第十五子運第十六子遇第十七子遹第十八子通第十九子逵第二十子逸等並敏茂純懿稟於衷誠溫良孝恭形於進對動皆合義居必有常可以理衆靖人撫封宣化而總列城之賦繕分閫之謀克勤公家允輔王室今則均茅社之寵盛槐庭之儀授鉞登車嗣茲朝典維城之固爾其懋哉述可封睦王充嶺南節度支度營田五府經略觀察處置等大使逾可封郴王充渭北鄜坊等州節度大使連可封恩王韓王迥可汴宋等節度觀察處置等大使遘可封鄜王造可封忻王充昭義軍節度觀察處置等大使暹可封韶王運可封嘉王遇可封端王遹可封循王通可封恭王逵可封原王逸可封雅王仍並可封開府儀同三司是時皇子勝衣者盡加王爵不出閤德宗朝述為諸王之長時分命中使周行天下求訪沈太后詔以睦王為奉迎太后使以工部尚書喬琳副之貞元七年薨丹王逾代宗第五子大曆十年封郴王領渭北鄜坊節度大使建中四年改丹王元和十五年薨恩王連代宗第六子大曆十年封元和十二年薨韓王迥代宗第七子以母寵既生而受封雖沖幼恩在鄭王之亞寶應元年封韓王貞元十二年薨時年四十七簡王遘代宗第八子大曆十年封鄜王建中四年改封簡王元和四年薨益王迺代宗第九子大曆四年封隋王迅代宗第十子大曆十年封興元元年薨荊王選代宗第十一子早世建中二年正月追封荊王贈開府儀同三司蜀王遡代宗第十二子大曆十四年封本名遂建中二年改今名忻王造代宗第十三子大曆十年封仍領昭義軍節度觀察大使元和六年薨韶王暹代宗十四子大曆十年封貞元十二年薨嘉王運代宗十五子大曆十年封貞元十七年薨端王遇代宗十六子大曆十年封貞元七年薨循王遹代宗第十七子大曆十年封恭王通代宗第十八子大曆十年封原王逵代宗第十九子大曆十年封大和六年薨雅王逸代宗第二十子大曆十年封貞元十五年薨史臣曰豔妻破國孽子敗宗前代英傑之君率不免於斯累者何也良以愛惡不由於義斷毀譽遽逐於情移雖申生孝己之仁卒不能迴君父之愛悲哉孝宣皇帝當屯剝之運收忠義之心忍行愛子之刑終宥姦閹之罪大雅君子為之痛心張后卒以凶終固其宜矣贊曰牀簀之愛人情易惑以義制情哲王令德李侯悟主韻諧金石褒諡建寧良堪太息
