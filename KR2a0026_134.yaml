body:
  text: 舊唐書卷一百三十列傳第八十王璵道士李國禎附李泌子繁顧況附崔造關播李元平附王璵少習禮學博求祠祭儀注以干時開元末玄宗方尊道術靡神不宗璵抗疏引古今祀典請置春壇祀青帝於國東郊玄宗甚然之因遷太常博士侍御史充祠祭使璵專以祀事希幸每行祠禱或焚紙錢禱祈福祐近於巫覡由是過承恩遇肅宗即位纍遷太常卿以祠禱每多賜賚乾元三年七月兼蒲州刺史充蒲同絳等州節度使中書令崔圓罷相乃以璵為中書侍郎同中書門下平章事人物時望素不為衆所稱及當樞務聲問頓減璵又奏置太一神壇於南郊之東請上躬行祀事肅宗嘗不豫太卜云祟在山川璵乃遣女巫分行天下祈祭名山大川巫皆盛服乘傳而行上令中使監之因緣為姦所至干託長吏以邀賂遺一巫盛年而美以惡少年數十自隨尤為𢀿弊與其徒宿於黃州傳舍刺史左震晨至驛門扃鐍不可啓震破鎖而入曳女巫階下斬之所從惡少年皆斃閲其贓賂數十萬震籍以上聞仍請贓錢代貧民租稅其中使發遣歸京肅宗不能詰肅宗親謁九宮神殷勤於祠禱皆璵所啓也歲餘罷知政事為刑部尚書上元二年兼揚州長史御史大夫充淮南節度使肅宗南郊禮畢以璵使持節都督越州諸軍事越州刺史充浙江東道節度觀察處置使本官兼御史大夫祠祭使如故入為太子少保轉少師大曆三年六月卒璵以祭祀妖妄致位將相時以左道進者往往有之廣德二年八月道士李國禎以道術見因奏皇室仙系宜修崇靈迹請於昭應縣南三十里山頂置天華上宮露臺大地婆父三皇道君太古天皇中古伏羲媧皇等祠堂並置掃灑宮戶一百戶又於縣之東義扶谷故湫置龍堂並許之時歲飢荒人甚不安昭應縣令梁鎮上表曰臣聞國以人為本害其本則非國神以人為主虐其主則非神故昔之聖王所以極陳理道明著祀典將愛其人而慎用其財力敬其神而虔恭於祠祭故神享其明德而降之福人受其大賚而盡其力然後神人以和而國家可保也一昨蟊賊作孽水旱為災雖王畿皆遍而臣縣最苦此則神之不能禦大災明矣又何力於陛下而得列祀典哉且以殘弊之餘當凶荒之歲丁壯素出家入仕羸老方飛芻挽粟令但供億王事已不堪命更奔走鬼道何以聊生臣又聞天地之神尊之極者掃地可祭精意可饗陛下亦何必廢先王之典崇俗巫之説走南畝之客殺東鄰之牛而後冀非妄之福陛下雖欲為人祈福福未至而人已困矣其不可一也陛下不視昔者有道之君至德之后曷不卑宮室惡飲食恭己以遂萬物之性哉陛下今違神亭育之心竭人疲困之力如是又何從而致其福哉此又不可二也又陛下宗廟之敬極矣尚無一月三祭之禮今此獨為則宗廟之靈將等以親疏校以厚薄陛下又何以言哉此又不可三也又大地婆父祀典無文言甚不經義無可取若陛下特與大地建祖宗之廟必上天貽向背之責陛下又何以為詞哉此又不可四也夫湫者龍之所居也龍得水則神無水則螻蟻之匹也故知水存則龍在水竭則龍亡此愚智之所同知矣今湫竭已久龍安所存陛下又崇飾祠宇豐潔薦奠為去龍之穴破生人之産人且怨矣神何歆哉此又不可五也其道君三皇五帝則兩京及所都之處皆建宮觀祠廟時設齋醮饗祀國有彝典官有常禮蓋無闕失何勞神役靈此又不可六也臣稽先王之典禮觀前聖之軌躅休咎豐凶災祥禍福必主帝王五事不在山川百神此又不可七也臣伏察此弊頗知其由蓋以道士李國禎等動衆則得人興工則獲利祭祀則受胙主執則弄權是以鼓動禁中熒惑天聽踰越險阻負荷粢盛以日繫年無時而息曾不謂神功力空止竭人膏血以使人神胥怨災孽並生罔上害人左道亂政原情定罪非殺而何臣昨受命之時親承聖旨務存安緝許逐權宜誠願沉鄴縣之巫安流弊之俗其所興兩祠土木之功丹青之役三六之祭灑掃之戶謹明宣旨並以權宜停訖人吏百姓等知陛下以從善為心嫉惡為務蠲除不急剗革煩苛皆喧呼於庭抃躍於路所徵糧糗無不樂輸臣伏以國禎等並交結中貴狡成性臣雖忘身許國不懼讒構終恐賄及豪右復為姦惡其國禎等見據狀推勘如獲贓狀伏望許臣徵收便充當縣郵館本用其湫既竭不可更置祠堂又不當為大地建立祖廟臣並請停其三皇道君天皇伏羲女媧等既先各有宮廟望請並於本所依禮齋祭上從之李泌字長源其先遼東襄平人西魏太保八柱國司徒徒何弼之六代孫今居京兆吳房令承休之子少聰敏博涉經史精究易象善屬文尤工於詩以王佐自負張九齡韋虛心張廷圭皆器重之泌操尚不羈恥隨常格仕進天寶中自嵩山上書論當世務玄宗召見令待詔翰林仍東宮供奉楊國忠忌其才辨奏泌嘗為感遇詩諷刺時政詔於蘄春郡安置乃潛遁名山以習隱自適天寶末祿山構難肅宗北巡至靈武即位遣使訪召會泌自嵩潁間冒難奔赴行在至彭原郡謁見陳古今成敗之機甚稱旨延致臥內動皆顧問泌稱山人固辭官秩特以散官寵之解褐拜銀青光祿大夫俾掌樞務至於四方文狀將相遷除皆與泌參議權逾宰相仍判元帥廣平王軍司馬事肅宗每謂曰卿當上皇天寶中為朕師友下判廣平王行軍朕父子三人資卿道義其見重如此尋為中書令崔圓幸臣李輔國害其能將有不利於泌泌懼乞遊衡山優詔許之給以三品祿俸遂隱衡嶽絶粒栖神數年代宗即位召為翰林學士頗承恩遇及元載輔政惡其異己因江南道觀察都團練使魏少遊奏求參佐稱泌有才拜檢校祕書少監充江南西道判官幸其出也尋改為檢校郎中依前判官元載誅乃馳傳入謁上見悅之又為宰相常衮所忌出為楚州刺史及謝恩具陳戀闕上素重之留京數月會澧州刺史闕衮盛陳泌理行以荊南凋瘵遂輟泌理之詔曰荊南都會粵在澧陽俾人歸厚惟賢是牧以泌文可以化成風俗政可以全活惸嫠爰命頒條期乎共理無薄淮陽之守勉思渤海之功可檢校御史中丞充澧朗硤團練使重其禮而遣之無幾改杭州刺史以理稱興元初徵赴行在遷左散騎常侍貞元元年除陝州長史充陝虢都防禦觀察使二年六月泌奏虢州盧氏山冶近出瑟瑟請充獻禁人開採詔曰瑟瑟之寶中土所無今産於近甸實為靈貺朕不飾器玩不尚珍奇常思返朴之風用明躬儉之節其出瑟瑟之處任百姓求採不宜禁止就加泌檢校禮部尚書時陳許戍邊卒三千自京西逃歸至州境泌潛師險隘左右攻擊盡誅之尋拜中書侍郎平章事集賢崇文館學士修國史初張延賞大減官員人情咨怨泌請復之以從人欲因是奏罷兼試額內占闕等官加百官俸料隨間劇加置手力課上從之人人以為便而竇參旁奏遂改易使同品之內月俸多少纍等泌又奏請罷拾遺補闕上雖不從亦不授人故諫司惟韓臯歸登而已泌仍命收其署錢令登等寓食於中書舍人故時戲云韓諫議雖分左右歸拾遺莫辨存亡如是者三年至貞元五年以前東都防禦判官殿中侍御史內供奉韋綬為左補闕監察御史梁肅右補闕既復置人心欣然順宗在春宮妃蕭氏母郜國公主交通外人上疑其有他連坐貶黜者數人皇儲亦危泌百端奏説上意方解泌頗有讜直之風而談神仙詭道或云嘗與赤松子王喬安期羡門遊處故為代所輕雖詭道求容不為時君所重德宗初即位尤惡巫祝怪誕之士初肅宗重陰陽祠祝之説用妖人王璵為宰相或命巫媼乘驛行郡縣以為厭勝凡有所興造功役動牽禁忌而黎幹用左道位至尹京嘗內集衆工編刺珠繡為御衣既成而焚之以為禳禬且無虛月德宗在東宮頗知其事即位之後罷集僧於內道場除巫祝之祀有司言宣政內廊壞請修繕而太卜云孟冬為魁不利穿築請卜他月帝曰春秋之義啓塞從時何魁岡之有卒命修之又代宗山陵靈駕發引上號送于承天門見轀輬不當道稍指午未間問其故有司對曰陛下本命在午故不敢當道上號泣曰安有枉靈駕而謀身利卒命直午而行及建中末寇戎內梗桑道茂有城奉天之説上稍以時日禁忌為意而雅聞泌長於鬼道故自外徵還以至大用時論不以為愜及在相位隨時俯仰無足可稱復引顧況輩輕薄之流動為朝士戲侮頗貽譏誚年六十八薨贈太子太傅賻禮有加泌放曠敏辨好大言自出入中禁纍為權幸忌嫉恆由智免終以言論縱橫上悟聖主以躋相位有文集二十卷子繁少聰警有才名無行義泌為相嘗引薦夏縣處士北平陽城為諫議大夫城道直既遇知己深德之及泌歿戶部尚書裴延齡巧佞奉上德宗信任竊弄威權舉朝側目城中正之士尤忿嫉之一日盡疏其過惡欲密論奏以繁故人子為可親信遂示其疏草兼請繁繕寫繁既寫悉能記之其夕乃徑詣延齡具述其事延齡聞之即時請對盡以城章中欲論事件一一先自解及城疏入德宗以為妄不之省泌與右補闕翰林學士梁肅友善嘗命繁持所著文請肅潤色繁亦自有學術肅待之甚厚因許師事日熟其門及肅卒繁亂其配士君子無不歎駭積年委棄後起為太常博士太常卿權德輿奏斥之除河南府士曹掾以其警悟異常泌之故人為宰相左右援拯後得纍居郡守而力學不倦罷隨州刺史歸京師久不承恩韋處厚入相厚待之寶曆二年六月敬宗降誕日御三殿特詔兵部侍郎丁公著太常少卿陸亘與繁等三人抗浮圖道士講論九月除大理少卿復加弘文館學士時諫官御史章疏相繼宰臣不得已出為亳州刺史州境嘗有羣賊剽人廬舍劫取貨財纍政擒捕不獲繁潛設機謀悉知賊之巢穴出兵盡加誅斬時議責繁以不先啓聞廉使涉於擅興之罪朝廷遣監察御史舒元輿按問元輿素與繁有隙復以初官鋭於生事乃盡反其獄辭以為繁濫殺無辜狀奏敕於京兆府賜死時人冤之其後元輿被禍人以為有報應焉初泌流放江南與柳渾顧況為人外之交吟詠自適而渾先達故泌復得入官於朝顧況者蘇州人能為歌詩性詼諧雖王公之貴與之交者必戲侮之然以嘲誚能文人多狎之柳渾輔政以校書郎徵復遇李泌繼入自謂己知秉樞要當得達官久之方遷著作郎況心不樂求歸於吳而班列羣官咸有侮玩之目皆惡嫉之及泌卒不哭而有調笑之言為憲司所劾貶饒州司戶有文集二十卷其贈柳宜城辭句率多戲劇文體皆此類也子非熊登進士第纍佐使府亦有詩名于時崔造字玄宰博陵安平人少涉學永泰中與韓會盧東美張正則為友皆僑居上元好談經濟之略嘗以王佐自許時人號為四夔浙西觀察使李栖筠引為賓僚纍至左司員外郎與劉晏善及晏遭楊炎庾準誣奏伏誅造纍貶信州長史朱泚之逆造為建州刺史聞難作馳檄鄰州請齊舉義兵遂調發所部得二千人德宗聞而嘉之及收京師詔徵造至藍田以舅源休明逆伏誅上疏請罪不敢即赴闕上以為知禮優詔慰勉拜吏部郎中給事中貞元二年正月與中書舍人齊映各守本官同平章事時京畿兵亂之後仍歲蝗旱府無儲積德宗以造敢言為能立事故不次登用造久從事江外嫉錢穀諸使罔上之弊乃奏天下兩稅錢物委本道觀察使本州刺史選官典部送上都諸道水陸運使及度支巡院江淮轉運使等並停其度支鹽鐵委尚書省本司判其尚書省六職令宰臣分判乃以戶部侍郎元琇判諸道鹽鐵榷酒等事戶部侍郎吉中孚判度支及諸道兩稅事宰臣齊映判兵部承旨及雜事宰臣李勉判刑部宰臣劉滋判吏部禮部造判戶部工部又以歲飢浙江東西道入運米每年七十五萬石今更令兩稅折納米一百萬石委兩浙節度使韓滉運送一百萬石至東渭橋其淮南濠壽旨米洪潭屯米委淮南節度使杜亞運送二十萬石至東渭橋諸道有鹽鐵處依舊置巡院勾當河陰見在米及諸道先付度支巡院般運在路錢物委度支依前勾當其未離本道者分付觀察使發遣仍委中書門下年終類例諸道課最聞奏造與元琇素厚罷使之後以鹽鐵之任委之而韓滉方司轉運朝廷仰給其漕發滉以司務久行不可遽改德宗復以滉為江淮轉運使餘如造所條奏元琇以滉性剛難制乃復奏江淮轉運其江南米自江至揚子凡十八里請滉主之揚子已北琇主之滉聞之怒掎托琇鹽鐵司事論奏德宗不獲已罷琇判使轉尚書右丞其年秋初江淮漕米大至京師德宗嘉其功以滉專領度支諸道鹽鐵轉運等使造所條奏皆改物議亦以造所奏雖舉舊典然凶荒之歲難為集事乃罷造知政事守太子右庶子貶琇雷州司戶造初奏太鋭及琇改官憂懼成疾數月不能視事明年九月卒年五十一關播字務元衛州汲人也天寶末舉進士鄧景山為淮南節度使辟為從事纍授衛佐評事遷右補闕善言物理尤精釋氏之學大曆中神策軍使王駕鶴妻關氏以播與同宗深遇之元載惡其交往出為河南府兵曹攝職數縣皆有政能陳少遊領浙東淮南又辟為判官歷檢校金部員外攝滁州刺史李靈曜阻兵跋扈於梁汴少遊自總兵鎮淮上所在盜賊蜂起播調閲州兵令其守備又為政清淨簡惠既無盜賊人甚安之楊綰常衮知政事薦播為都官員外郎德宗登極湖南山洞中有王國良者聚衆為盜令播往宣撫之臨行召對於別殿上問政理之要播奏云為政之本須求有道賢人乃可得理上謂播云朕下詔求賢良當躬親閲試亦遣使臣黜陟廣加搜訪聞薦擢其能者用之冀以傅理播奏曰下詔求賢黜陟舉薦唯得求名文詞之士安有有道賢人肯隨牒舉選乎上悅其言謂播曰卿且使去回日當與卿論政事播又奏曰臣今奉詔招撫國良不受命臣請便宣恩命語鄰境速出兵翦除上曰卿言深合朕意使回改兵部員外遷河中少尹建中初張鎰為河中少尹鎰尋入相二年七月遷播給事中舊例諸司甲庫皆是胥吏掌知為弊頗久播始建議並以士人知之至今稱當轉刑部侍郎奉迎皇太后副使盧嵵以播柔緩冀其易制驟稱薦之尋遷吏部侍郎轉刑部尚書知刪定奏上元中詔擇古今名將十人於武成王廟配享如文宣王廟之儀播以太公古稱大賢今其下稱亞聖於義不安又孔子十哲皆是當時弟子今所擇名將年代不同於義既乖於事又失臣請刪去名將配享之儀及十哲之稱從之建中三年十月拜銀青光祿大夫中書侍郎同中書門下平章事集賢殿崇文館大學士修國史時政事決在盧嵵播但斂袵取容而已乏於知人之鑒好大言虛誕者播必悅而親信之有李元平陶公達張遜劉承誡皆言談詭妄誇大可立功名亦有微材薄藝播纍奏云元平等皆可將相也請閲試用之上以為然以元平為補闕會淮西節度李希烈叛亂上以汝州要鎮令選擇刺史播薦元平為汝州刺史尋加檢校吏部郎中汝州別駕知州事元平至州旬日為希烈所擒汝州陷賊中外哂之由是公達等未克任用播與盧嵵等從駕幸奉天既而盧嵵白志貞等並貶黜播尚知政事中外囂然以為不可遂罷相改刑部尚書大臣韋倫等泣於朝曰宰相不能謀猷翊贊以至今日而尚為尚書可痛心也貞元四年回紇請和親以咸安公主出降可汗令播以本官加檢校右僕射兼御史大夫持節充送咸安公主及册可汗使奉使往來皆清儉謹慎蕃人悅之使回遷兵部尚書固辭疾請罷官改太子少師致仕播致仕之後減去僮僕車騎閉關守靜不縈外事士君子重之貞元十三年正月卒時年七十九廢朝一日贈太子太保李元平者宗室子始為湖南觀察使蕭復判官試大理評事性疏傲敢大言好論兵天下賢士大夫無可其意者以是人多銜怒關播奇重之許以將帥時希烈反叛朝廷以汝州與賊接壤刺史韋光裔懦弱不任職播乃盛稱元平特召見超左補闕不數日擢為檢校吏部郎中兼汝州別駕知州事既至部募工徒繕理郛郭希烈乃使勇士應募執役板築凡入數百人元平不之覺希烈遣偽將李克誠以數百騎突至其城先應募執役者應於內縛元平馳去既見希烈遺下污地希烈見其無鬚眇小戲謂克誠曰使汝取李元平何得將元平兒來因嫚罵曰盲宰相使汝當我何待我淺耶偽署為御史中丞播聞元平得用仍欺於人曰李生功業濟矣言必能覆希烈而建功也居無何希烈用為宰相或告其有二者乃斷一指以自誓希烈既死或有人言在賊中微有謀慮貸死流於珍州會赦得歸剡中浙東觀察使皇甫政表聞其到以發上怒復流賀州而死史臣曰蒸嘗礿祀前王制以奉先怪力亂神宣聖鄙而不語凡云左道固有舊章璵假於鬼神乃至將相既處代天之位爰滋亂政之源國禎妖人疑衆妄恢其祀典梁鎮正士抗疏方悟其上心泌見可進而知難退足為高率智辨之士居相位而談鬼神乃見狂妄浮薄之蹤王制云執左道以亂政殺寧無畏乎繁之醜行棄於當時竟陷非辜諒由素履造為臣得禮蒞事非能播居位取容舉人敗事皆非國器咸歷台司失人者亡國其危矣贊曰璵泌造播俱非相材國禎左道梁生直哉
