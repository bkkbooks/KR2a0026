body:
  text: 舊唐書卷一百一列傳第五十一李乂薛登韋湊從子虛心虛舟韓思復曾孫佽張廷圭王求禮辛替否李乂本名尚真趙州房子人也少與兄尚一尚貞俱以文章見稱舉進士景龍中纍遷中書舍人時中宗遣使江南分道贖生以所在官物充直乂上疏曰江南水鄉採捕為業魚鱉之利黎元所資土地使然有自來矣伏以聖慈含育恩周動植布天地之大德及鱗介之微品雖雲雨之私有霑於末類而生成之惠未洽於平人何則江湖之饒生育無限府庫之用支供易殫費之若少則所濟何成用之倘多則常支有闕在於拯物豈若憂人且鬻生之徒唯利斯視錢刀日至網罟年滋施之一朝營之百倍未若回救贖之錢物減困貧之徭賦活國愛人其福勝彼乂知制誥凡數載景雲元年遷吏部侍郎與宋璟盧從願同時典選銓平允甚為當時所稱尋轉黃門侍郎時睿宗令造金仙玉真二觀乂頻上疏諫帝每優容之開元初特令乂與中書侍郎蘇頲纂集起居注録其嘉謨昌言可體國經遠者別編奏之乂在門下多所駁正開元初姚崇為紫微令薦乂為紫微侍郎外託薦賢其實引在己下去其糾駁之權也俄拜刑部尚書乂方雅有學識朝廷稱其有宰相之望會病卒兄尚一清源尉早卒尚貞官至博州刺史兄弟同為一集號曰李氏花萼集總二十卷薛登本名謙光常州義興人也父士通大業中為鷹揚郎將江都之亂士通與鄉人聞人嗣安等同據本郡以禦寇賊武德二年遣使歸國高祖嘉之降璽書勞勉拜東武州刺史俄而輔公祏於江都構逆遣其將西門君儀等寇常州士通率兵拒戰大破之君儀等僅以身免及公祏平纍功封臨汾侯貞觀初歷遷泉州刺史卒謙光博涉文史每與人談論前代故事必廣引證驗有如目擊少與徐堅劉子玄齊名友善文明中解褐閬中主簿天授中為左補闕時選舉頗濫謙光上疏曰臣聞國以得賢為寶臣以舉士為忠是以子皮之讓國僑鮑叔之推管仲燕昭委兵於樂毅苻堅託政於王猛子産受國人之謗夷吾貪共賈之財昭王錫輅馬以止讒永固戮樊世以除譖處猜嫌而益信行間毀而無疑此由默而識之委而察之深也至若宰我見愚於宣尼逢萌被知於文叔韓信無聞於項氏毛遂不齒於平原此失士之故也是以人主受不肖之士則政乖得賢良之佐則時泰故堯資八元而庶績其理周任十亂而天下和平由是言之則士不可不察而官不可妄授也何者比來舉薦多不以才假譽馳聲互相推奬希潤身之小計忘臣子之大猷非所以報國求賢副陛下翹翹之望者也臣竊窺古之取士實異於今先觀名行之源考其鄉邑之譽崇禮讓以勵己明節義以標信以敦朴為先最以雕蟲為後科故人崇勸讓之風士去輕浮之行希仕者必修貞確不拔之操行難進易退之規衆議以定其高下郡將難誣於曲直故計貢之賢愚即州將之榮辱穢行之彰露亦鄉人之厚顏是以李陵降而隴西慚干木隱而西河美故名勝於利則小人之道消利勝於名則貪暴之風扇是以化俗之本須擯輕浮昔冀缺以禮讓升朝則晉人知禮文翁以儒林奬俗則蜀士多儒燕昭好馬則駿馬來庭葉公好龍則真龍入室由是言之未有上之所好而下不從其化者也自七國之季雖雜縱橫而漢代求才猶徵百行是以禮節之士敏德自修閭里推高然後為府寺所辟魏氏取人尤愛放達晉宋之後祇重門資奬為人求官之風乖授職惟賢之義有梁薦士雅愛屬詞陳氏簡賢特珍賦詠故其俗以詩酒為重不以修身為務逮至隋室餘風尚在開皇中李諤論之於文帝曰魏之三祖更好文詞忽君人之大道好雕蟲之小藝連篇纍牘不出月露之形積案盈箱唯是風雲之狀代俗以此相高朝廷以茲擢士故文筆日煩其政日亂帝納李諤之策由是下制禁斷文筆浮詞其年泗州刺史司馬幼之以表不典實得罪於是風俗改勵政化大行煬帝嗣興又變前法置進士等科於是後生之徒復相放效因陋就寡赴速邀時緝綴小文名之策學不以指實為本而以浮虛為貴有唐纂曆雖漸革於故非陛下君臨思察才於共理樹本崇化惟在旌賢今之舉人有乖事實鄉議決小人之筆行修無長者之論策第喧競於州府祈恩不勝於拜伏或明制才出試遣搜揚驅馳府寺之門出入王公之第上啓陳詩唯希咳唾之澤摩頂至足冀荷提攜之恩故俗號舉人皆稱覓舉覓為自求之稱未是人知之辭察其行而度其材則人品於茲見矣徇己之心切則至公之理乖貪仕之性彰則廉潔之風薄是知府命雖高異叔度勤勤之讓黃門已貴無秦嘉耿耿之辭縱不能抑己推賢亦不肯待於三命豈與夫白駒皎皎不雜風塵束帛戔戔榮高物表校量其廣狹也是以耿介之士羞自拔而致其辭循常之人捨其疏而取其附故選司補署喧然於禮闈州貢賓王爭訟於階闥謗議紛合浸以成風夫競榮者必有競利之心謙遜者亦無貪賄之纍自非上智焉能不移在於中人理由習俗若重謹厚之士則懷祿者必崇德以修名若開趨競之門邀仕者皆戚施而附會附會則百姓罹其弊潔己則兆庶蒙其福故風化之漸靡不由茲今訪鄉閭之談唯祇歸於里正縱使名虧禮則罪挂刑章或冒籍以偷資或邀勳而竊級假其不義之賂則是無犯鄉閭豈得比郭有道之銓量茅容望重裴逸人之賞拔夏少名高語其優劣也祇如才應經邦之流唯令試策武能制敵之例只驗彎弧若其文擅清奇便充甲第藻思微減便即告歸以此收人恐乖事實何者樂廣假筆於潘嶽靈運詞高於穆之平津文劣於長卿子建筆麗於荀彧若以射策為最則潘謝曹馬必居孫樂之右若使協贊機猷則安仁靈運亦無裨附之益由此言之不可一概而取也至如武藝則趙雲雖勇資諸葛之指撝周勃雖雄乏陳平之計略若使樊噲居蕭何之任必失指縱之機使蕭何入戲下之軍亦無免主之效鬬將長於摧鋒謀將審於料事是以文泉聚米知隗囂之可圖陳湯屈指識烏孫之自解八難之謀設高祖追慚於酈生九拒之計窮公輸息心於伐宋謀將不長於弓馬良相寧資於射策豈與夫元長自表妄飾詞鋒曹植題章虛飛麗藻校量其可否也伏願陛下降明制頒峻科千里一賢尚不為少僥幸冒進須立隄防斷浮虛之飾詞收實用之良策不取無稽之說必求忠告之言文則試以效官武則令其守禦始既察言觀行終亦循名責實自然僥幸濫吹之伍無所藏其妄庸故晏嬰云舉之以語考之以事寡其言而多其行拙於文而工於事此取人得賢之道也其有武藝超絶文鋒挺秀有效伎之偏用無經國之大才為軍鋒之爪牙作詞賦之標準自可試凌雲之策練穿札之工承上命而賦甘泉稟中軍而令赴敵既有隨才之任必無負乘之憂臣謹案吳起臨戰左右進劍吳子曰夫提鼓揮桴臨難決疑此將事也一劍之任非將事也謹案諸葛亮臨戎不親戎服頓蜀兵於渭南宣王持劍卒不敢當此豈弓矢之用也謹案楊得意誦長卿之文武帝曰恨不得與此人同時及相如至終於文園令不以公卿之位處之者蓋非其所任故也謹案漢法所舉之主終身保任楊雄之坐田儀責其冒薦成子之魏相酬於得賢賞罰之令行則請謁之心絶退讓之義著則貪競之路消自然朝廷無爭祿之人選司有謙撝之士仍請寬立年限容其採訪簡汰堪用者令其試守以觀能否參驗行事以別是非不實免王丹之官得人加翟璜之賞自然見賢不隱食祿自專荀彧進鍾繇郭嘉劉陶薦李膺朱穆勢不云遠有稱職者受薦賢之賞濫舉者抵欺罔之罪自然舉得賢行則君子之道長矣尋轉水部員外郎纍遷給事中檢校常州刺史屬宣州狂寇朱大目作亂百姓奔走謙光嚴備安輯闔境肅然轉刑部侍郎加銀青光祿大夫再遷尚書左丞景雲中擢拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光將加彈奏或請寢之謙光曰憲臺理冤滯何所回避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之反為太平公主所構出為岐州刺史惠範既誅遷太子賓客轉刑部尚書加金紫光祿大夫昭文館學士開元初為東都留守又轉太子賓客以與太子同名表請行字特敕賜名登尋以孽子悅千牛為憲司所劾放歸田里朝廷以其家貧又特給致仕祿七年卒年七十三贈晉州刺史撰四時記二十卷韋湊京兆萬年人曾祖瓚隋尚書右丞祖叔諧蒲州刺史父玄桂州都督府長史湊永淳二年解褐授婺州參軍纍轉揚府法曹參軍州人前仁壽令孟神爽豪縱數犯法交通貴戚前後官吏莫敢繩按湊白長史張潛請因事除之會神爽坐事推問湊無所假借神爽妄稱有密旨究問引虛遂杖殺之遠近稱伏湊景龍中歷遷將作少匠司農少卿嘗以公事忤宗楚客出為貝州刺史睿宗即位拜鴻臚少卿加銀青光祿大夫景龍二年轉太府少卿又兼通事舍人時改葬節愍太子優詔加諡又雪李多祚等罪還其官爵仍議更加贈官湊上書曰臣聞王者發號施令必法乎天道使三綱攸十等咸若者善善明惡惡著也善善者懸爵賞以勸之也惡惡者設刑罰以懲之也其賞罰所不加者則考行立諡以褒貶之所以勸誡將來也斯並至公之大猷非私情之可徇故箕微獲用管蔡為戮諡者臣議其君子議其父而曰靈曰厲者不敢以私而亂大猷也則其餘安可失衷哉臣竊見節愍太子與李多祚等擁北軍禁旅上犯宸居破扉斬關突禁而入兵指黃屋騎騰紫微孝和皇帝移御玄武門親降德音諭以逆順而太子據鞍自若督衆不停俄而其黨悔非轉逆為順或回兵討賊或投狀自拘多祚等伏誅太子方事逃竄向使同惡相濟天道無徵賊徒闕倒戈之人侍臣虧陛戟之衛其為禍也胡可忍言于時臣任將作少匠賜通事舍人內供奉其明日孝和皇帝引見供奉官等雨淚謂曰幾不與卿等相見其為危懼不亦甚乎而今聖朝雪罪禮葬諡為節愍以臣愚識竊所惑焉夫臣子之禮嚴敬斯極故過位必趨蹙路馬芻有誅昔漢成之為太子也行不敢絶馳道當周室之衰微也秦師過周北門左右免胄而下王孫滿猶以其不卷甲束兵譏其無禮知其必敗由是言之則太子稱兵宮內跨馬御前悖禮已甚矣況將更甚乎而可褒諡此臣所未諭也以其斬武三思父子而嘉之乎然弄兵討逆以安君父則可嘉也而乃因欲自取之是競為逆可褒諡乎此又臣所未諭也將廢韋氏而嘉之乎然韋氏逆彰義絶雖誅之亦可也當此時也韋氏未有逆彰未有義絶於太子為母豈有廢母之理乎且既非中宗之命而廢之是劫父廢母亦悖逆也可褒諡乎此又臣所未諭也夫君或不君臣安可不臣父或不父子安可不子借如君父有桀紂之行臣子無廢殺之理況先帝功格宇宙德被生靈廟號中宗諡曰孝和皇帝而逆命之子可褒諡乎此又臣所未諭也昔獻公惑驪姬之譖將殺其太子申生公子重耳謂之曰子盍言子之志於公乎太子曰不可君安驪姬是我傷君之心也曰然則盍行乎曰不可君謂我欲弒君也天下豈有無父之國哉吾何行之使人辭於狐突曰申生不敢愛其死雖然吾君老矣子少國家多難伯氏苟出而圖吾君申生受賜而死再拜稽首乃自縊其行如是甚諡僅可為恭今太子之行反是可諡為節愍乎此又臣所未諭也昔漢武帝末年江充與太子有隙恐帝晏駕後為太子所誅會巫蠱事起充典理其事因此為姦遂至太子宮掘蠱得桐木以誣太子時武帝避暑甘泉宮獨皇后太子在太子不能自明納其少傅石德謀遂矯節斬充因敗逃匿非稱兵詣闕無逆謀於父然身死於湖不葬無諡至昭帝時有男子詣北闕自稱衛太子制使公卿識視至者莫敢發言京兆尹雋不疑後至叱從吏收縛之或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵出奔輒拒而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送制獄天子聞而嘉之曰公卿大臣當用經術明於大義者及後太子孫立為天子是曰孝宣皇帝太子方獲禮葬而諡曰戾今節愍太子之行比之豈可同年而語其於陛下又猶子也而諡為節愍乎此又臣所未諭也昔項羽之臣丁公常將危漢高祖高祖謂之曰二賢豈相厄哉丁公乃止及高祖滅項氏遂戮丁公以徇曰使項王失天下者丁公也夫戮之大義至公也不私德之所以誡其後之事君者今節愍太子之為逆復非欲保護陛下其可褒諡乎此又臣之所未諭也陛下天縱聖哲所任賢明以臣至愚寧可干議然臣又惟堯舜聖君也八凱五臣良佐也猶廣聽芻蕘之言者蓋為智者千慮或有一失愚者千慮或有一得也故曰狂夫之言聖人擇焉臣輒緣斯義敢以陳聞願得與議諡者對議於御前若臣言非也甘受謗聖政之罪赴鼎鑊之誅仍請申明義以示天下使臣輩愚惑者咸蒙冰釋則無復異議矣若所諡未當奈何施之聖朝垂之史冊使後代逆臣賊子因而引譬資以為辭是開悖亂之門豈示將來之法伏望改定其諡務合禮經其李多祚等罪請從宥免不謂為雪以順天下之心則盡善盡美矣書奏睿宗引湊謂曰誠如卿言事已如此如何改動湊曰太子實行悖逆不可褒美請稱其行改諡以一字多祚等以兵犯君非曰無罪只可云放不可稱雪帝然其言當時執政以制令已行難於改易唯多祚等停贈官而已明年春起金仙玉真兩觀用工巨億湊進諫曰陛下去夏以妨農停兩觀作今正農月翻欲興功雖知用公主錢不出庫物但土木作起高價雇人三輔農人趨目前之利捨農受雇棄本逐末臣聞一夫不耕天下有受其飢者臣竊恐不可帝不應湊又奏曰且陽和布氣萬物生育土木之間昆蟲無數此時興造傷殺甚多臣亦恐非仁聖本旨睿宗方納其言令在外詳議中書令崔湜侍中岑羲謂湊曰公敢言此大是難事湊曰叨食厚祿死且不辭況在明時必知不死尋出為陝州刺史無幾轉汝州刺史開元二年夏敕靖陵建碑徵料夫匠湊以自古園陵無建碑之禮又時正旱儉不可興功飛表極諫工役乃止尋遷岐州刺史四年入為將作大匠時有敕復孝敬廟為義宗湊上書曰臣聞王者制禮是曰規模規模之興實由師古師古之道必也正名名之與實故當相副其在宗廟禮之大者豈可失哉禮祖有功而宗有德祖宗之廟百代不毀故殷太甲為太宗太戊曰中宗武丁曰高宗周宗文王武王漢則文帝為太宗武帝為世宗其後代有稱宗者皆以方制海內德澤可宗列於昭穆期於不毀稱宗之義不亦大乎伏惟孝敬皇帝位止東宮未嘗南面聖道誠冠於儲副德教不被於寰瀛立廟稱宗恐非合禮況別起寢廟不入昭穆稽諸祀典何義稱宗而廟號義宗稱之萬代以臣庸識竊謂不可陛下率循典禮以闢大猷有司所議以致此失或虧盡善豈不惜哉望更詳議務合於禮於是敕太常議遂停義宗之號湊前後上書論時政得失多見採納再遷河南尹纍封彭城郡公以公事左授杭州刺史轉汾州刺史十年拜太原尹兼節度支度營田大使其年卒官年六十五贈幽州都督諡曰文子見素自有傳湊從子虛心虛心父維少習儒業博涉文史舉進士自大理丞纍至戶部郎中善於剖判時員外郎宋之問工於詩時人以為戶部有二妙終於左庶子虛心舉孝廉為官嚴整纍至大理丞侍御史神龍年推按大獄時僕射竇懷貞侍中劉幽求意欲寬假虛心堅執法令有不可奪之志景龍中西域羌胡背叛時並擒獲有敕盡欲誅之虛心論奏但罪元首其所全者千餘人虛心有孝行及丁父憂哀毀過禮鬚鬢盡白朝廷深所嗟尚後遷御史中丞左右丞兵部侍郎荊揚潞長史兼採訪使所在官吏振肅威令甚舉中外以為標準歷戶部尚書東京留守卒年六十七季弟虛舟亦以舉孝廉自御史纍至戶部司勳左司郎中歷荊州長史洪魏州刺史兼採訪使多著能政入為刑部侍郎終大理卿家有禮則父子兄弟更踐郎署時稱郎官家韓思復京兆長安人也祖倫貞觀中為左衛率賜爵長山縣男思復少襲祖爵初為汴州司戶參軍為政寬恕不行杖罰在任丁憂家貧鬻薪終喪制時姚崇為夏官侍郎知政事深嘉歎之擢授司禮博士景龍中纍遷給事中時左散騎常侍嚴善思坐譙王重福事下制獄有司言善思昔嘗任汝州刺史素與重福交遊召至京師竟不言其謀逆唯奏云東都有兵氣據狀正當匿反請從絞刑思復駁奏曰議獄緩死列聖明規刑疑從輕有國常典嚴善思往在先朝屬韋氏擅內恃寵宮掖謀危宗社善思此時遂能先覺因詣相府有所發明進論聖躬必登宸極雖交遊重福蓋謀陷韋氏及其謁見猶不奏聞將此行藏即從極法且敕追善思書至便發向懷逆節寧即奔命一面疏網誠合順生三驅取禽來而可宥惟刑是恤事合昭詳請付刑部集羣官議定奏裁以符慎獄是時議者多云善思合從原宥有司仍執前議請誅之思復又駁曰臣聞刑人於市爵人於朝必僉謀攸同始行之無惑謹按諸司所議嚴善思十才一入抵罪惟輕夫帝閽九重塗遠千里故借天下之耳以聽聽無不聰借天下之目以視視無不接今羣言上聞採擇宜審若棄多就少臣實懼焉輿誦一乖下情不達雖欲從衆其可及乎凡百京司逢時之泰列官分職有賢有親親則列藩諸王陛下愛子賢則胙茅開國陛下名臣見無禮於君寧肯雷同不異今措詞多出法合從輕上納其奏竟免善思死配流靜州思復尋轉中書舍人數上疏陳得失多見納用開元初為諫議大夫時山東蝗蟲大起姚崇為中書令奏遣使分往河南河北諸道殺蝗蟲而埋之思復以為蝗蟲是天災當修德以禳之恐非人力所能翦滅上疏曰臣聞河南河北蝗蟲頃日更益繁熾經歷之處苗稼都損今漸翾飛向西游食至洛使命來往不敢昌言山東數州甚為惶懼且天災流行埋瘞難盡望陛下悔過責躬發使宣慰損不急之務召至公之人上下同心君臣一德持此誠實以答休咎前後驅蝗使等伏望總停書云皇天無親惟德是輔人心無親惟惠是懷不可不收攬人心也上深然之出思復疏以付崇崇乃請遣思復往山東檢蝗蟲所損之處及還具以實奏崇又請令監察御史劉沼重加詳覆沼希崇旨意遂箠撻百姓回改舊狀以奏之由是河南數州竟不得免思復遂為崇所擠出為德州刺史轉絳州刺史入為黃門侍郎加銀青光祿大夫代裴漼為御史大夫思復性恬淡好玄言安仁體道非紀綱之任無幾轉太子賓客十三年卒年七十餘子朝宗天寶初為京兆尹曾孫佽字相之少有文學性尚簡淡舉進士纍辟藩方自襄州從事徵拜殿中侍御史遷刑部員外求為澧州刺史歲滿受代宰相牛僧孺鎮鄂渚辟為從事徵拜刑部郎中轉京兆少尹遷給事中出為桂州觀察使桂管二十餘郡州掾而下至邑長三百員由吏部而補者什一他皆廉吏量其才而補之佽既至桂吏以常所為官者數百人引謁一吏執籍而前曰具員請補其闕佽戒曰在任有政者不奪所理有過者必繩以法缺者當俟稽諸故籍取其可者然後補之會春衣使內官至求賄於郵吏二豪家因厚其資以求邑宰佽悉諾之使去坐以撓法各笞其背自是豪猾斂跡皆得清廉吏以蘇活其人未幾詔置五管都監計所費盡一境地征不足飽其意佽特用儉約處之遂為定制君子以為難開成二年卒於官贈工部侍郎張廷圭河南濟源人其先自常州徙焉廷圭少以文學知名性慷慨有志尚弱冠應制舉長安中纍遷監察御史則天稅天下僧尼出錢欲於白司馬坂營建大像廷圭上疏諫曰夫佛者以覺知為義因心而成不可以諸相見也經云若以色見我以音聲求我是人行邪道不能見如來此真如之果不外求也陛下信心歸依發宏誓願壯其塔廟廣其尊容已遍於天下久矣蓋有住於相而行布施非最上第一希有之法何以言之經云若人滿三千大千世界七寶以用布施及恆河沙等身命布施其福甚多若人於此經中受持及四句偈等為人演說其福勝彼如佛所言則陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像雖勞則甚矣費則多矣而所獲福不愈於一禪房之匹夫菩薩作福德不應貪著蓋有為之法不足高也況此營建事殷木土或開發盤峻築基階或塞穴洞通轉採斫輾壓蟲蟻動盈巨億豈佛標坐夏之義愍蠢動而不忍害其生哉又役鬼不可唯人是營通計工匠率多貧窶朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯飢渴所致疾疹交集豈佛標徒行之義愍畜獸而不忍殘其力哉又營築之資僧尼是稅雖乞丐所致而貧闕猶多州縣徵輸星火逼迫或謀計靡所或鬻賣以充怨聲載路和氣未洽豈佛標隨喜之義愍愚蒙而不忍奪其産哉且邊朔未寧軍裝日給天下虛竭海內勞弊伏惟陛下慎之重之思菩薩之行為利益一切衆生應如是布施則其福德若南西北方四維上下虛空不可思量矣何必勤於住相凋蒼生之業崇不急之務乎臣以時政論之則宜先邊境蓄府庫養人力臣以釋教論之則宜救苦厄滅諸相崇無為伏願陛下察臣之愚行佛之意務以理為上不以人廢言幸甚幸甚則天從其言即停所作仍於長生殿召見深賞慰之景龍末為中書舍人再轉洪州都督仍為江南西道按察使開元初入為禮部侍郎時久旱關中饑儉下制求直諫昌言弘益政理者廷圭上疏曰臣聞古有多難興王殷憂啓聖者皆以事危則志鋭情迫則思深故能自下登高轉禍為福者也伏見景龍之末中宗遇禍先天之際凶黨構謀社稷有危於綴旒國朝將均於絶綖陛下神武超代精誠動天再掃氛沴六合清朗而後上順皇旨俯念黔黎高運璿衡光膺寶籙日月所燭之地書軌未通之鄉無不霑濡渥恩被服淳化十堯九舜未足稱也明明上帝照臨下土宜錫介祉以答鴻休然屬頃歲已來陰陽愆候九穀失稔萬姓阻飢關輔之間更為尤劇至有樵蘇莫爨糧籺靡資不復聊生方憂轉死偶會昌運遘茲難否者臣竊思之皇天之意將恐陛下春秋鼎盛神聖在躬不崇朝而建大功自藩邸而陟元后或簡下濟之道獨滿雄圖之志輕虞舜而不法思漢武以自高是故昭見咎徵載加善誘將欲大君日慎一日雖休勿休永保太和以固邦本也斯皇天於陛下眷顧深矣陛下焉可不奉若休旨而寅畏哉臣愚誠願陛下約心削志澄思勵精考羲農之書敦素朴之道登庸端士放黜佞人屏退後宮減徹外場無蹴踘之玩野絶從禽之賞休石田之遠境罷金甲之懸軍矜恤惸嫠蠲薄徭賦去奇伎淫巧捐和璧隋珠不見可欲使心不亂自然波清四海塵銷九域農夫樂其業餘糧棲於畝則和氣上通於天雖五星連珠兩曜合璧未足多也珍祥下降於地雖鳳皇巢閣麒麟在郊未足奇也或謂天之炯戒不足畏者則將上帝憑怒風雨迷錯荒饉日甚無以濟下矣或謂人之窮乏不足恤者則將齊氓沮志億兆攜離愁苦勢極無以奉上矣斯蓋安危所繫禍福之源奈何朝廷曾不是察況今陛下受命伊始敷政惟新卿士百僚華夷萬族莫不清耳以聽刮目而視延頸企踵冀有所聞見顒顒如也何可怠棄典則坐辜其望哉再遷黃門侍郎時監察御史蔣挺以監決杖刑稍輕敕朝堂杖之廷圭奏曰御史憲司清望耳目之官有犯當殺即殺當流即流不可決杖士可殺不可辱也時制命已行然議者以廷圭之言為是俄坐泄禁中語出為沔州刺史又歷蘇宋魏三州刺史入為少府監加金紫光祿大夫封范陽男四遷太子詹事以老疾致仕二十二年卒年七十餘贈工部尚書諡曰貞穆廷圭素與陳州刺史李雍親善屢上表薦之雍所撰碑碣之文必請廷圭八分書之廷圭既善楷隸甚為時人所重王求禮許州長社人則天朝為左拾遺遷監察御史性忠謇敢言每上封彈事無所畏避時契丹李盡忠反叛其將孫萬榮寇陷河北數州河內王武懿宗擁兵討之畏懦不敢進既而賊大掠而去懿宗條奏滄瀛百姓為賊詿誤者數百家請誅之求禮執而劾之曰此詿誤之人比無良吏教習城池又不完固為賊驅逼苟徇圖全豈素有背叛之心哉懿宗擁強兵數十萬聞賊將至走保城邑罪當誅戮今乃移禍於詿誤之人豈是為臣之道請斬懿宗以謝河北百姓懿宗大懼則天竟降制赦之契丹陷幽州饋挽不給左相豆盧欽望請輟京官兩月俸料以助軍求禮謂欽望曰公祿厚俸優輟之可也國家富有四海足以儲軍國之用何藉貧官薄俸公此舉豈宰相法邪欽望作色拒之乃奏曰秦漢皆有稅算以贍軍求禮不識大體妄有訟辭求禮對曰秦皇漢武稅天下虛中以事邊奈何使聖朝則效不知欽望此言是大體耶事遂不行時三月雪鳳閣侍郎蘇味道等以為瑞草表將賀求禮止之曰宰相調燮陰陽而致雪降暮春災也安得為瑞如三月雪為瑞雪則臘月雷亦瑞雷也舉朝嗤笑以為口實求禮竟以剛正名位不達而卒辛替否京兆人也景龍年為左拾遺時中宗置公主府官屬安樂公主府所補尤多猥濫又駙馬武崇訓死後棄舊宅別造一宅侈麗過甚時又盛興佛寺百姓勞弊帑藏為之空竭替否上疏諫曰臣聞古之建官員不必備九卿以下皆有其位而闕其選賞一人謀乎三事職一人訪乎羣司負寵者畏權勢之在躬知榮者避權門而不入故稱賞不僭官不濫士皆完行家有廉節朝廷有餘俸百姓有餘食下忠於上上禮於下委裘而無倉卒之危垂拱而無顛沛之患夫事有惕耳目動心慮作不師古以行於今者蓋有之矣伏惟陛下百倍行賞十倍增官金銀不供其印束帛無充於錫何愧於無用之臣何慚於無力之士至於公府補授罕存推擇遂使富商豪賈盡居纓冕之流鬻伎行巫咸涉膏腴之地臣聞古人曰福生有基禍生有胎伏惟公主陛下之愛女選賢良以嫁之設官職以輔之傾府庫以賜之壯第觀以居之廣池以嬉之可謂之至重也可謂之至憐也然而用不合於古義行不根於人心將恐變愛成憎轉福為禍何者竭人之力人怨也費人之財人怨也奪人之家人怨也愛數子而取三怨於天下使邊疆之士不盡力朝廷之士不盡忠人之散矣獨持所愛何所恃乎向者魯王賞同諸壻禮等朝臣則亦有今日之福無曩時之禍人徒見其禍不知禍之所來所以禍者寵愛過於臣子也去年七月五日已見其徵矣而今事無改更尚因循棄一宅而造一宅忘前禍而忽後禍臣竊謂陛下憎之矣非愛之也臣聞君以人為本本固則邦寧邦寧則陛下夫婦母子長相保也伏惟外謀宰臣為久安之計以存之不使姦臣賊子以伺之臣聞微不可不防遠不可不慮當今疆埸危駭倉廩空虛揭竿守禦之士賞不及肝腦塗地之卒輸不充而方大起寺舍廣造第宅伐木空山不足充梁棟運土塞路不足充牆壁誇古耀今踰章越制百僚鉗口四海傷心夫釋教者以清淨為基慈悲為主故當體道以濟物不欲利己以損人故常去己以全真不為榮身以害教三時之月掘山穿池損命也殫府虛帑損人也廣殿長廊榮身也損命則不慈悲損人則不濟物榮身則不清淨豈大聖大神之心乎臣以為非真教非佛意違時行違人欲自像王西下佛教東傳青螺不入於周前白馬方行於漢後風流雨散千帝百王飾彌盛而國彌空役彌重而禍彌大覆車繼軌曾不改途晉臣以佞佛取譏梁主以捨身構隙若以造寺必為其理體養人不足以經邦則殷周已往皆暗亂漢魏已降皆聖明殷周已往為不長漢魏已降為不短臣聞夏為天子二十餘代而殷受之殷為天子二十餘代而周受之周為天子三十餘代而秦受之自漢已後歷代可知也何者有道之長無道之短豈因其窮金玉修塔廟方得久長之祚乎臣聞於經曰菩薩心住於法而行布施如人入暗即無所見又曰一切有為法如夢幻泡影如露亦如電臣以減雕琢之費以賑貧下是有如來之德息穿掘之苦以全昆蟲是有如來之仁罷營構之直以給邊陲是有湯武之功回不急之祿以購廉清是有唐虞之理陛下緩其所急急其所緩親未來而疏見在失真實而冀虛無重俗人之所為而輕天子之功業臣竊痛之矣當今出財依勢者盡度為沙門避役姦訛者盡度為沙門其所未度唯貧窮與善人將何以作範乎將何以役力乎臣以為出家者捨塵俗離朋黨無私愛今殖貨營生非捨塵俗拔親樹知非離朋黨畜妻養孥非無私愛是致人以毀道非廣道以求人伏見今之宮觀臺榭京師之與洛陽不增修飾猶恐奢麗陛下尚欲填池捐苑囿以賑貧人無産業者今天下之寺蓋無其數一寺當陛下一宮壯麗之甚矣用度過之矣是十分天下之財而佛有七八陛下何有之矣百姓何食之矣雖以陰陽為炭萬物為銅役不食之人使不衣之士猶尚不給況資於天生地養風動雨潤而後得之乎臣聞國無九年之儲國非其國伏計倉廩度府庫百僚供給百事用度臣恐卒歲不充況九年之積乎一旦風塵再擾霜雹薦臻沙門不可擐干戈寺塔不足攘饑饉臣竊痛之矣疏奏不納歲餘安樂公主被誅睿宗即位又為金仙玉真公主廣營二觀先是中宗時斜封受官人一切停任凡數百千人又有敕放令却上替否時為左補闕又上疏陳時政曰臣嘗以為古之用度不時爵賞不當破家亡國者口說不如身逢耳聞不如眼見臣請以有唐已來理國之得失陛下之所眼見者以言之惟陛下審之聽之擇善而從之則萬歲之業自可致矣何憂乎黎庶之不康福祚之不永伏以太宗文武聖皇帝陛下之祖撥亂反正開階立極得至理之體設簡要之方省其官清其吏舉天下職司無一虛授用天下財帛無一枉費賞必俟功官必得俊所為無不成所征無不伏不多造寺觀而福德自至不多度僧尼而殃咎自滅道合乎天地德通乎神明故天地憐之神明祐之使陰陽不愆風雨合度四人樂其業五穀遂其成腐粟爛帛填街委巷千里萬里貢賦於郊九夷百蠻歸款於闕自有帝皇已來未有若斯之神聖者也故得享國久長多歷年所陛下何不取而則之中宗孝和皇帝陛下之兄居先人之業忽先人之化不取賢良之言而恣子女之意官爵非擇虛食祿者數千人封建無功妄食土者百餘戶造寺不止枉費財者數百億度人不休免租庸者數十萬是使國家所出加數倍所入減數倍倉不停卒歲之儲庫不貯一時之帛所惡者逐逐多忠良所愛者賞賞多讒慝朋佞喋喋交相傾動容身不為於朝廷保位皆由於黨附奪百姓之食以養殘凶剝萬人之衣以塗土木於是人怨神怒親忿衆離水旱不調疾疫屢起遠近殊論公私罄然五六年間再三禍變享國不永受終於凶婦人寺舍不能保其身僧尼不能護妻子取譏萬代見笑四夷此陛下之所眼見也何不除而改之依太宗之理國則百官以理百姓無憂故太山之安立可致矣依中宗之理國則萬人以怨百事不寧故纍卵之危立可致矣頃自夏已來霪雨不解穀荒於壟麥爛於場入秋已來亢旱成災苗而不實霜損蟲暴草葉枯黃下人咨嗟未知賙賑而營寺造觀日繼於時檢校試官充臺溢署伏惟陛下愛兩女為造兩觀燒瓦運木載土填坑道路流言皆云計用錢百餘萬貫惟陛下聖人也無所不知陛下明君也無所不見既知且見知倉有幾年之儲庫有幾年之帛知百姓之間可存活乎三邊之上可轉輸乎當今發一卒以禦邊陲遣一兵以衛社稷多無衣食皆帶飢寒賞賜之間迥無所出軍旅驟敗莫不由斯而乃以百萬貫錢造無用之觀以受六合之怨乎以違萬人之心乎伏惟陛下續阿韋之醜跡而不改阿韋之亂政忍棄太宗之理本不忍棄中宗之亂階忍棄太宗久長之謀不忍棄中宗短促之計陛下又何以繼祖宗觀萬國昔陛下為皇太子在阿韋之時危亡是懼常切齒於羣凶今貴為天子富有海內而不改羣凶之事臣恐復有切齒於陛下者也陛下又何以非羣凶而誅之臣往見明敕自今已後一依貞觀故事且貞觀之時豈有今日之造寺營觀加僧尼道士益無用之官行不急之務而亂政者也臣以為棄其言而不行其信慕其善而不遷其惡陛下又何以刑於四海往者和帝之憐悖逆也為姦人之所誤宗晉卿勸為第宅趙履溫勸為園亭損數百家之居侵數百家之地工徒而未息義兵紛以交馳卒使亭不得遊宅不得坐信邪佞之說成骨肉之刑此陛下之所眼見也今茲造觀臣必知非陛下公主之本意得無趙履溫之徒將勸為之冀誤其骨肉不可不明察也臣聞出家修道者不預人事專清其身心以虛泊為高以無為為妙依兩卷老子視一軀天尊無欲無營不損不害何必璇臺玉榭寶像珍龕使人困窮然後為道哉且舊觀足可歸依無造無營以取窮竭若此行之三年國不富人不安朝廷不清陛下不樂則臣請殺身於朝以令天下言事者伏惟陛下行非常之惠權停兩觀以俟豐年以兩觀之財為公主施貧窮填府庫則公主福德無窮矣不然臣恐下人怨望不減於前朝之時前朝之時賢愚知敗人雖有口而不敢言言未發聲禍將及矣韋月將受誅於丹徼燕欽融見殺於紫庭此人皆不惜其身而納忠於主身既死矣朝亦危矣故先朝誅之陛下賞之是陛下知直言之士有裨於國臣今直言亦先代之直惟陛下察之疏奏睿宗嘉其公直稍遷為右臺殿中侍御史開元中纍轉潁王府長史天寶初卒年八十餘史臣曰夫好聞其善惡聞其過君人者之常情也寧諂媚以取容不逆耳以招禍臣人者之常情也能反此者不亦善乎李薛等六君吐忠讜之言補朝廷之失有犯無隱不愧古人有唐之良臣也贊曰臣之事君有邪有正君之使臣從諫則聖李薛輸忠救人之命韋韓讜言醫國之病辛王章疏犯顏竦聽張子法言實裨時政
