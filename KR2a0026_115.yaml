body:
  text: 舊唐書卷一百一十一列傳第六十一崔光遠房琯子孺復從子式張鎬高適暢璀崔光遠滑州靈昌人也本博陵舊族祖敬嗣好樗蒱飲酒則天初為房州刺史中宗為廬陵王安置在州官吏多無禮度敬嗣獨以親賢待之供給豐贍中宗深德之及登位有益州長史崔敬嗣既同姓名每進擬官皆御筆超拜之者數四後引與語始知誤寵訪敬嗣已卒乃遣中書令韋安石授其子汪官汪嗜酒不堪職任且授洛州司功又改五品光遠即汪之子雖無學術頗有祖風勇決任氣身長六尺餘目睛白黑分明少歷仕州縣開元末為蜀州唐安令與楊國忠以博徒相得累遷至左贊善大夫天寶十一載京兆尹鮮于仲通舉光遠為長安令十四載遷京兆少尹其載使吐蕃弔祭十五載五月使迴十餘日潼關失守玄宗幸蜀詔留光遠為京兆尹兼御史中丞充西京留守採訪使駕發百姓亂入宮禁取左藏大盈庫物既而焚之自旦及午火勢漸盛亦有乘驢上紫宸興慶殿者光遠與中官將軍邊令誠號令百姓救火又募人攝府縣官分守之殺十數人方定使其息東見祿山祿山大悅偽敕復本官先是祿山已令張休攝京兆尹十餘日既得光遠歸款召休歸洛八月同羅背祿山以馬二千出至滻水孫孝哲安神威從而召之不得神威懼而憂死府縣官吏驚走獄囚皆空光遠以為賊且逃矣命所由守神威孝哲宅孝哲以光遠之狀報祿山光遠閉府門斬為盜曳落河二人遂與長安令蘇震等同出至開遠門使人前謂門官曰尹巡諸門門官具器仗以迎至則皆斬之領府縣官十餘人於京西號令百姓赴召者百餘人夜過咸陽遂達靈武上喜之擢拜御史大夫兼京兆尹仍使光遠於渭北召集人吏之歸順者嘗有賊剽掠涇陽縣界於僧寺中椎牛釃酒連夜酣飲去光遠營四十里光遠偵知之率馬步二千乙夜趨其所賊徒多醉光遠領百餘騎持滿扼其要分命驍勇持陌刀呼而斬之殺賊徒二千餘人虜馬千疋俘其渠酋一人賊中以光遠勇勁常避其鋒及扈從還京論功行賞制曰持節京畿採訪計會招召宣慰處置等使崔光遠毀家成國致命前茅可特進行禮部尚書封鄴國公食實封三百戶乾元元年兼御史大夫五月為河南節度使八月代張鎬為汴州刺史兼本州防禦使十二月代蕭華為魏州刺史充魏州節度使初司徒郭子儀與賊戰於汲郡光遠率汴師千人渡河援之及代蕭華入魏州使將軍李處崟拒賊賊大至連戰不利子儀怒不救處崟遂敗奔還賊逐處崟至城下反間之曰處崟召我來何為不出光遠乃腰斬處崟處崟善戰有勇衆皆倚之及死人用危懼魏州城自祿山反袁知泰能元皓等皆繕完之甚為堅峻光遠不能守遂夜潰圍而出度河而還肅宗不之罪除太子少保襄州將士康楚元張嘉延率衆為亂陷荊襄澧朗等州以光遠兼御史大夫持節荊襄招討仍充山南東道處置兵馬都使三年除鳳翔尹充本府及秦隴觀察使先是岐隴吏人郭愔等為土賊掠州縣為五堡光遠使判官監察御史嚴侁召而降之光遠在官好蒱酒晚年不親戎事上元元年冬愔等潛連党項及奴剌突厥敗韋倫於秦隴殺監軍使擊黃戍肅宗追還以李鼎代之二年兼成都尹充劍南節度營田觀察處置使仍兼御史大夫及段子璋反東川節度使李奐敗走投光遠率將花驚定等討平之將士肆其剽劫婦女有金銀臂釧兵士皆斷其腕以取之亂殺數千人光遠不能禁肅宗遣監軍官使按其罪光遠憂恚成疾上元二年十月卒房琯河南人天后朝正議大夫平章事融之子也琯少好學風儀沉整以門蔭補弘文生性好隱遁與東平呂向於陸渾伊陽山中讀書為事凡十餘歲開元十二年玄宗將封岱岳琯撰封禪書一篇及牋啟以獻中書令張說奇其才奏授秘書省校書郎調補同州馮翊尉無幾去官應堪任縣令舉授虢州盧氏令政多惠愛人稱美之二十二年拜監察御史其年坐鞫獄不當貶睦州司戶歷慈溪宋城濟源縣令所在為政多興利除害繕理廨宇頗著能名天寶元年拜主客員外郎三年遷試主客郎中五年正月擢試給事中賜爵漳南縣男時玄宗企慕古道數遊幸近甸乃分新豐縣置會昌縣於驪山下尋改會昌為昭應縣又改溫泉宮為華清宮於宮所立百司廨舍以琯雅有巧思令充使繕理事未畢坐與李適之韋堅等善貶宜春太守歷琅邪鄴郡扶風三太守所至多有遺愛十四年徵拜左庶子遷憲部侍郎十五年六月玄宗蒼黃幸蜀大臣陳希烈張倚等銜於失恩不時赴難琯結張均張兄弟與韋述等行至城南十數里山寺均同行皆以家在城中逗留不進琯獨馳蜀路七月至普安郡謁見玄宗大悅即日拜文部尚書同中書門下平章事賜紫金魚袋從幸成都加銀青光祿大夫仍與一子官其年八月與左相韋見素門下侍郎崔渙等奉使靈武冊立肅宗至順化郡謁見陳上皇傳付之旨因言時事詞情慷慨肅宗為之改容時潼關敗將王思禮呂崇賁李承光等引於纛下將斬之琯從容救諫獨斬承光而已肅宗以琯素有重名傾意待之琯亦自負其才以天下為己任時行在機務多決之於琯凡有大事諸將無敢預言尋抗疏自請將兵以誅寇孽收復京都肅宗望其成功許之詔加持節招討西京兼防禦蒲潼兩關兵馬節度等使乃與子儀光弼等計會進兵琯請自選參佐乃以御史中丞鄧景山為副戶部侍郎李揖為行軍司馬中丞宋若思起居郎知制誥賈至右司郎中魏少遊為判官給事中劉秩為參謀既行又令兵部尚書王思禮副之琯分為三軍遣楊希文將南軍自宜壽入劉悊將中軍自武功入李光進將北軍自奉天入琯自將中軍為前鋒十月庚子師次便橋辛丑二軍先遇賊於咸陽縣之陳濤斜接戰官軍敗績時琯用春秋車戰之法以車二千乘馬步夾之既戰賊順風揚塵鼓譟牛皆震駭因縛芻縱火焚之人畜撓敗為所傷殺者四萬餘人存者數千而已癸卯琯又率南軍即戰復敗希文劉悊並降於賊琯等奔赴行在肉袒請罪上並宥之琯好賓客喜談論用兵素非所長而天子採其虛聲冀成實効琯既自無廟勝又以虛名擇將吏以至於敗琯之出師戎務一委於李揖劉秩秩等亦儒家子未嘗習軍旅之事琯臨戎謂人曰逆黨曳落河雖多豈能當我劉秩等及與賊對壘琯欲持重以伺之為中使邢延恩等督戰蒼黃失據遂及於敗上猶待之如初仍令收合散卒更圖進取會北海太守賀蘭進明自河南至詔授南海太守攝御史大夫充嶺南節度使中謝肅宗謂之曰朕處分房琯與卿正大夫何為攝也進明對曰琯與臣有隙上以為然進明因奏曰陛下知晉朝何以至亂上曰卿有說乎進明曰晉朝以好尚虛名任王夷甫為宰相祖習浮華故至於敗今陛下方興復社稷當委用實才而琯性疏闊徒大言耳非宰相器也陛下待琯至厚以臣觀之琯終不為陛下用上問其故進明曰琯昨於南朝為聖皇制置天下乃以永王為江南節度潁王為劍南節度盛王為淮南節度制云命元子北略朔方命諸王分守重鎮且太子出為撫軍入曰監國琯乃以枝庶悉領大藩皇儲反居邊鄙此雖於聖皇似忠於陛下非忠也琯立此意以為聖皇諸子但一人得天下即不失恩寵又各樹其私黨劉秩李揖劉彙鄧景山竇紹之徒以副戎權推此而言琯豈肯盡誠於陛下乎臣欲正衙彈劾不敢不先聞奏上由是惡琯詔以進明為河南節度兼御史大夫崔圓本蜀中拜相肅宗幸扶風始來朝謁琯意以為圓纔到當即免相故待圓禮薄圓厚結李輔國到後數日頗承恩渥亦憾於琯琯又多稱病不時朝謁於政事簡惰時議以兩京陷賊車駕出次外郊天下人心惴恐當主憂臣辱之際此時琯為宰相略無匪懈之意但與庶子劉秩諫議李揖何忌等高談虛論說釋氏因果老子虛無而已此外則聽董庭蘭彈琴大招集琴客筵宴朝官往往因庭蘭以見琯自是亦大招納貨賄姦贓頗甚顏真卿時為大夫彈何忌不孝既黨何忌遽託以酒醉入朝貶為西平郡司馬憲司又奏彈董庭蘭招納貨賄琯入朝自訴上叱出之因歸私第不敢關預人事諫議大夫張鎬上疏言琯大臣門客受贓不宜見累二年五月貶為太子少師仍以鎬代琯為宰相其年十一月從肅宗還京師十二月大赦策勳行賞加琯金紫光祿大夫進封清河郡公琯既在散位朝臣多以為言琯亦常自言有文武之用合當國家驅策冀蒙任遇又招納賓客朝夕盈門遊其門者又將琯言議暴揚於朝琯又多稱疾上頗不悅乾元元年六月詔曰崇黨近名實為害政之本黜華去薄方啟至公之路房琯素表文學夙推名器由是累階清貴致位台衡而率情自任怙氣恃權虛浮簡傲者進為同人溫讓謹令者捐於異路所以輔佐之際謀猷匪弘頃者時屬艱難擢居將相朕永懷仄席冀有成功而喪我師徒既虧制勝之任升其親友悉彰浮誕之迹曾未踰時遽從敗績自合首明軍令以謝師旅猶尚矜其萬死擢以三孤或云緣其切直遂見斥退朕示以堂案令觀所以咸知乖舛曠於政事誠宜効茲忠懇以奉國家而乃多稱疾疹莫申朝謁郤犨為政曾不疾其迂迴亞夫事君翻有懷於鬱怏又與前國子祭酒劉秩前京兆少尹嚴武等潛為交結輕肆言談有朋黨不公之名違臣子奉上之體何以儀刑王國訓導儲闈但以嘗踐台司未忍致之于理況秩武遽更相尚同務虛求不議典章何成沮勸宜從貶秩俾守外藩琯可邠州刺史秩可閬州刺史武可巴州刺史散官封如故並即馳驛赴任庶各增修朕自臨御寰區薦延多士常思聿求賢哲共致雍熙深嫉比周之徒虛偽成俗今茲所譴實屬其辜猶以琯等妄自標持假延浮稱雖周行具悉恐流俗多疑所以事必縷言蓋欲人知不濫凡百卿士宜悉朕懷時邠州久屯軍旅多以武將兼領刺史法度隳廢州縣廨宇並為軍營官吏侵奪百姓室屋以居人甚弊之琯到任舉陳令式令州縣恭守又緝理公館僚吏各歸官曹頗著政聲二年六月詔褒美之徵拜太子賓客上元元年四月改禮部尚書尋出為晉州刺史八月改漢州刺史琯長子乘自少兩目盲琯到漢州乃厚結司馬李銳以財貨乘聘銳外甥女盧氏時議薄其無士行寶應二年四月拜特進刑部尚書在路遇疾廣德元年八月四日卒於閬州僧舍時年六十七贈太尉孺復琯之孽子也少黠慧年七八歲即粗解綴文親黨奇之稍長狂疏慢任情縱欲年二十淮南節度陳少遊辟為從事多招陰陽巫覡令揚言己過三十必為宰相德宗幸奉天包佶掌賦於揚州少遊將抑奪之佶聞而奔出少遊方遣人劫佶令迴孺復請行會佶已過江南乃還及少遊卒浙西節度韓滉又辟入幕其長兄宗偃先貶官嶺下而卒及喪柩到揚州孺復未嘗弔初娶鄭氏惡賤其妻多畜婢僕妻之保母累言之孺復乃先具棺櫬而集家人生斂保母遠近驚異及妻在產蓐三四日遽令上船即路數日妻遇風而卒孺復以宰相子年少有浮名而奸惡未甚露累拜杭州刺史又娶台州刺史崔昭女崔妬悍甚一夕杖殺孺復侍兒二人埋之雪中觀察使聞之詔發使鞫案有實孺復坐貶連州司馬仍令與崔氏離異孺復久之遷辰州刺史改容州刺史本管經略使乃潛與妻往來久而上疏請合詔從之二歲餘又奏與崔氏離異其為取捨恣逸不顧禮法也如此貞元十三年九月卒時年四十二式琯之姪舉進士李泌觀察陝州辟為從事泌入為相累遷起居郎出入泌門為其耳目及泌卒再除忠州刺史韋臯表為雲南安撫使兼御史中丞臯卒詔除兵部郎中屬劉闢反式留不得行性便佞又懼闢每於座中數贊闢之德美比之劉備同陷於賊者皆惡之高崇文既至成都式與王良士崔從盧士玖等白衣麻蹻銜土請罪崇文寬禮之乃表其狀尋除吏部郎中時河朔節度劉濟王士真張茂昭皆以兵壯氣豪相持短長屢以表聞迭請加罪上欲止其兵李吉甫薦式為給事中將命于河朔式歷使諸鎮諷諭之還奏愜旨除陝虢觀察使兼御史中丞轉河南尹時討王承宗於鎮州配河南府饋運車四千兩式表以凶旱人貧力微難以徵發憲宗可其奏既免力役人懷而安之明年移授宣歙池觀察使元和七年七月卒贈左散騎常侍張鎬博州人也風儀魁岸廓落有大志涉獵經史好談王霸大略少時師事吳兢兢甚重之後遊京師端居一室不交世務性嗜酒好琴常置座右公卿或有邀之者鎬杖策徑往求醉而已天寶末楊國忠以聲名自高搜天下奇傑聞鎬名召見薦之自褐衣拜左拾遺及祿山阻兵國忠屢以軍國事咨於鎬鎬舉贊善大夫來瑱可當方面之寄數月玄宗幸蜀鎬自山谷徒步扈從肅宗即位玄宗遣鎬赴行在所鎬至鳳翔奏議多有弘益拜諫議大夫尋遷中書侍郎同中書門下平章事時供奉僧在內道場晨夜念佛動數百人聲聞禁外鎬奏曰臣聞天子修福要在安養含生靖一風化未聞區區僧教以致太平伏願陛下以無為為心不以小乘而撓聖慮肅宗甚然之時方興軍戎帝注意將帥以鎬有文武才尋命兼河南節度使持節都統淮南等道諸軍事鎬既發會張巡宋州圍急倍道兼進傳檄濠州刺史閭丘曉引兵出救曉素愎戾馭下少恩好獨任己及鎬信至略無稟命又慮兵敗禍及於己遂逗留不進鎬至淮口宋州已陷鎬怒曉即杖殺之及收復兩京加鎬銀青光祿大夫封南陽郡公詔以本軍鎮汴州招討殘孽時賊帥史思明表請以范陽歸順鎬揣知其偽恐朝廷許之手書密表奏曰思明兇豎因逆竊位兵強則衆附勢奪則人離包藏不測禽獸無異可以計取難以義招伏望不以威權假之又曰滑州防禦使許叔冀性狡多謀臨難必變望追入宿衞肅宗計意已定表入不省鎬為人簡澹不事中要會有宦官自范陽及滑州使還者皆言思明叔冀之誠売心肅宗以鎬不切事機遂罷相位授荊州大都督府長史後思明叔冀之偽皆符鎬言尋徵為太子賓客改左散騎常侍屬嗣岐王珍被誣告構逆伏法鎬買珍宅坐累貶辰州司戶代宗即位推恩海內拜撫州刺史遷洪州刺史饒吉等七州都團練觀察等使尋正授江南西道都團練觀察等使廣德二年九月卒鎬自入仕凡三年致位宰相居身清廉不營資產謙恭下士善談論多識大體故天下具瞻雖考秩至淺推為舊德云高適者渤海蓨人也父從文位終韶州長史適少濩落不事生業家貧客於梁宋以求丐取給天寶中海內事干進者注意文詞適年過五十始留意詩什數年之間體格漸變以氣質自高每吟一篇已為好事者稱誦宋州刺史張九臯深奇之薦舉有道科時右相李林甫擅權薄於文雅唯以舉子待之解褐汴州封丘尉非其好也乃去位客遊河右河西節度哥舒翰見而異之表為左驍衞兵曹充翰府掌書記從翰入朝盛稱之於上前祿山之亂徵翰討賊拜適左拾遺轉監察御史仍佐翰守潼關及翰兵敗適自駱谷西馳奔赴行在及河池郡謁見玄宗因陳潼關敗亡之勢曰僕射哥舒翰忠義感激臣頗知之然疾病沉頓智力將竭監軍李大宜與將士約為香火使倡婦彈箜篌琵琶以相娛樂樗蒱飲酒不恤軍務蕃渾及秦隴武士盛夏五六月於赤日之中食倉米飯且猶不足欲其勇戰安可得乎故有望敵散亡臨陣翻動萬全之地一朝而失南陽之軍魯炅何履光趙國珍各皆持節監軍等數人更相用事寧有是戰而能必勝哉臣與楊國忠爭終不見納陛下因此履巴山劍閣之險西幸蜀中避其蠆毒未足為恥也玄宗嘉之尋遷侍御史至成都八月制曰侍御史高適立節貞峻植躬高朗感激懷經濟之略紛綸贍文雅之才長策遠圖可云大體讜言義色實謂忠臣宜迴糾逖之任俾超諷諭之職可諫議大夫賜緋魚袋適負氣敢言權幸憚之二年永王璘起兵於江東欲據揚州初上皇以諸王分鎮適切諫不可及是永王叛肅宗聞其論諫有素召而謀之適因陳江東利害永王必敗上奇其對以適兼御史大夫揚州大都督府長史淮南節度使詔與江東節度來瑱率本部兵平江淮之亂會于安州師將渡而永王敗乃招季廣琛于歷陽兵罷李輔國惡適敢言短於上前乃左授太子少詹事未幾蜀中亂出為蜀州刺史遷彭州劍南自玄宗還京後於梓益二州各置一節度百姓勞敝適因出西山三城置戍論之曰劍南雖名東西兩川其實一道自邛關黎雅界於南蠻也茂州而西經羌中至平戎數城界於吐蕃也臨邊小郡各舉軍戎並取給於劍南其運糧戍以全蜀之力兼山南佐之而猶不舉今梓遂果閬等八州分為東川節度歲月之計西川不可得而參也而嘉陵比為夷獠所陷今雖小定瘡痍未平又一年已來耕織都廢而衣食之業皆貿易於成都則其人不可得而役明矣今可稅賦者成都彭蜀漢州又以四州殘敝當他十州之重役其於終久不亦至艱又言利者穿鑿萬端皆取之百姓應差科者自朝至暮案牘千重官吏相承懼於罪譴或責之於鄰保或威之以杖罰督促不已逋逃益滋欲無流亡理不可得比日關中米貴而衣冠士庶頗亦出城山南劍南道路相望村坊市肆與蜀人雜居其升合斗儲皆求於蜀人矣且田土疆界蓋亦有涯賦稅差科乃無涯矣為蜀人之計不亦難哉今所界吐蕃城堡而疲於蜀人不過平戎以西數城矣邈在窮山之巔垂於險絕之末運糧於束馬之路坐甲於無人之鄉以戎狄言之不足以利戎狄以國家言之不足以廣土宇奈何以險阻彈丸之地而困於全蜀太平之人哉恐非今日之急務也國家若將已戍之地不可廢已鎮之兵不可收當宜却停東川併力從事猶恐狼狽安可仰於成都彭漢蜀四州哉慮乖聖朝洗盪關東掃清逆亂之意也倘蜀人復擾豈不貽陛下之憂昔公孫弘願罷西南夷臨海專事朔方賈捐之請棄珠崖以寧中土讜言政本匪一朝一夕臣愚望罷東川節度以一劍南西山不急之城稍以減削則事無窮頓庶免倒懸陛下若以微臣所陳有裨萬一下宰相廷議降公忠大臣定其損益與劍南節度終始處置疏奏不納後梓州副使段子璋反以兵攻東川節度使李奐適率州兵從西川節度使崔光遠攻子璋斬之西川牙將花驚定者恃勇既誅子璋大掠東蜀天子怒光遠不能戢軍乃罷之以適代光遠為成都尹劍南西川節度使代宗即位吐蕃陷隴右漸逼京畿適練兵於蜀臨吐蕃南境以牽制之師出無功而松維等州尋為蕃兵所陷代宗以黃門侍郎嚴武代還用為刑部侍郎轉散騎常侍加銀青光祿大夫進封渤海縣侯食邑七百戶永泰元年正月卒贈禮部尚書諡曰忠適喜言王霸大略務功名尚節義逢時多難以安危為己任然言過其術為大臣所輕累為藩牧政存寬簡吏民便之有文集二十卷其與賀蘭進明書令疾救梁宋以親諸軍與許叔冀書綢繆繼好使釋他憾同援梁宋未過淮先與將校書使絕永王各求自白君子以為義而知變而有唐已來詩人之達者唯適而已暢璀河東人也鄉舉進士天寶末安祿山奏為河北海運判官三遷大理評事副元帥郭子儀辟為從事至德初肅宗即位大收俊傑或薦璀召見悅之拜諫議大夫累轉吏部侍郎廣德二年十二月為散騎常侍河中尹兼御史大夫永泰元年復為左常侍與裴冕並集賢院待制大曆五年兼判太常卿遷戶部尚書十年七月卒贈太子太師璀廓落有口才好談王霸之略居職責成屬吏齪齪無過而已史臣曰祿山寇陷兩京儒生士子被脅從懷苟且者多矣去逆効順毀家為國者少焉如光遠勇決任氣會權變以立功房琯文學致身全節義以避寇阽危之時顛沛之際有足稱者然光遠居重藩掌軍政琯登相位奪將權聚浮薄之徒敗軍旅之事不知機而固位竟無德以自危孺復兇狂式之便佞獲令終者幸焉鎬直躬居位重德鎮時其為人也鮮矣適以詩人為戎帥險難之際名節不虧君子哉璀擢第居官守分無過又何咎焉贊曰光遠房琯有始有終張鎬國器適璀儒風
