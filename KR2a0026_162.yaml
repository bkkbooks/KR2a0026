body:
  text: 舊唐書卷一百五十八列傳第一百八武元衡從父弟儒衡鄭餘慶子浣浣子允謨茂休處誨從讜韋貫之兄綬弟纁子澳武元衡字伯蒼河南緱氏人曾祖載德天后從父弟官至湖州刺史祖平一善屬文終考功員外郎修文館學士事在逸人傳父就殿中侍御史以元衡貴追贈吏部侍郎元衡進士登第纍辟使府至監察御史後為華原縣令時畿輔有鎮軍督將恃恩矜功者多撓吏民元衡苦之乃稱病去官放情事外沉浮宴詠者久之德宗知其才召授比部員外郎一歲遷左司郎中時以詳整稱重貞元二十年遷御史中丞嘗因延英對罷德宗目送之指示左右曰元衡真宰相器也順宗即位以病不親政事王叔文等使其黨以權利誘元衡元衡拒之時奉德宗山陵元衡為儀仗使監察御史劉禹錫叔文之黨也求充儀仗判官元衡不與其黨滋不悅數日罷元衡為右庶子憲宗即位始冊為皇太子元衡贊引因識之及登極復拜御史中丞持平無私綱條悉舉人甚稱重尋遷戶部侍郎元和二年正月拜門下侍郎平章事賜金紫兼判戶部事上為太子時知其進退守正及是用為宰相甚禮信之初浙西節度李錡請入覲乃拜為右僕射令入朝既而又稱疾請至歲暮上問宰臣鄭絪請如錡奏元衡曰不可且錡自請入朝詔既許之即又稱疾是可否在錡今陛下新臨大寶天下屬耳目若使奸臣得遂其私則威令從茲去矣上以為然遽追之錡果計窮而反先是高崇文平蜀因授以節度使崇文理軍有法而不知州縣之政上難其代者乃以元衡代崇文拜檢校吏部尚書兼門下侍郎平章事充劍南西川節度使將行上御安福門以臨慰之高崇文既發成都盡載其軍資金帛帟幕伎樂工巧以行元衡至則庶事節約務以便人比三年公私稍濟撫蠻夷約束明具不輒生事重慎端謹雖淡於接物而開府極一時之選八年徵還至駱谷重拜門下侍郎平章事時李吉甫李絳情不相叶各以事理曲直於上前元衡居中無所違附上稱為長者及吉甫卒上方討淮蔡悉以機務委之時王承宗遣使奏事請赦吳元濟請事於宰相辭禮悖慢元衡叱之承宗因飛章詆元衡咎怨頗結元衡宅在靜安里九年六月三日將朝出里東門有暗中叱使滅燭者導騎訶之賊射之中肩又有匿樹陰突出者以棓擊元衡左股其徒馭已為賊所格奔逸賊乃持元衡馬東南行十餘步害之批其顱骨懷去及衆呼偕至持火照之見元衡已踣於血中即元衡宅東北隅出方攴之外時夜漏未盡陌上多朝騎及行人鋪卒連呼十餘里皆云賊殺宰相聲達朝堂百官恟恟未知死者誰也須臾元衡馬走至遇人始辨之既明仗至紫宸門有司以元衡遇害聞上震驚却朝而坐延英召見宰相惋慟者久之為之再不食冊贈司徒贈賻布帛五百匹粟四百石輟朝五日諡曰忠愍元衡工五言詩好事者傳之往往被於管絃初八年元衡自蜀再輔政時太白犯上相歷執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十月李吉甫以暴疾卒至是元衡為盜所害年五十八始元衡與吉甫齊年又同日為宰相及出鎮分領揚益及吉甫再入元衡亦還吉甫先一年以元衡生月卒元衡後一年以吉甫生月卒吉凶之數若符會焉先是長安謠曰打麥麥打三三三既而旋其袖曰舞了也解者謂打麥者打麥時也麥打者蓋謂暗中突擊也三三三謂六月三日也舞了也謂元衡之卒也自是京師大恐城門加衛兵察其出入物色伺之其偉狀異製燕趙之音者多執訊之元衡從父弟儒衡儒衡字庭碩才度俊偉氣直貌莊言不妄發與人交友終始不渝相國鄭餘慶不事華潔後進趨其門者多垢衣敗服以望其知而儒衡謁見未嘗輒易所好但與之正言直論餘慶因亦重之憲宗以元衡橫死王事嘗嗟惜之故待儒衡甚厚纍遷戶部郎中十二年權知諫議大夫事尋兼知制誥皇甫鎛以宰相領度支剝下以媚上無敢言其罪者儒衡上疏論列鎛密訴其事帝曰勿以儒衡上疏卿將報怨耶鎛不復敢言儒衡氣岸高雅論事有風彩羣邪惡之尤為宰相令狐楚所忌元和末年垂將大用楚畏其明俊欲以計沮之以離其寵有狄兼謨者梁公仁傑之後時為襄陽從事楚乃自草制詞召狄兼謨為拾遺曰朕聽政餘暇躬覽國書知奸臣擅權之由見母后竊位之事我國家神器大寶將遂傳於他人洪惟昊穹降鑒儲祉誕生仁傑保佑中宗使絶維更張明辟乃復宜福胄胤與國無窮及兼謨制出儒衡泣訴於御前言其祖平一在天后朝辭榮終老當時不以為纍憲宗再三撫慰之自是薄楚之為人然儒衡守道不回嫉惡太甚終不至大任尋正拜中書舍人時元稹依倚內官得知制誥儒衡深鄙之會食瓜閣下蠅集於上儒衡以扇揮之曰適從何處來而遽集於此同僚失色儒衡意氣自若遷禮部侍郎長慶四年卒年五十六鄭餘慶字居業滎陽人祖長裕官至國子司業終潁川太守長裕弟少微為中書舍人刑部侍郎兄弟有名於當時父慈與元德秀友善官至太子舍人餘慶少勤學善屬文大曆中舉進士建中末山南節度使嚴震辟為從事纍官殿中侍御史丁父憂罷貞元初入朝歷左司兵部員外郎庫部郎中八年選為翰林學士十三年六月遷工部侍郎知吏部選事時有玄法寺僧法湊為寺衆所訴萬年縣尉盧伯達斷還俗後又復為僧伯達上表論之詔中丞宇文邈刑部侍郎張彧大理卿鄭雲逵等三司與功德使判官諸葛述同按鞫時議述胥吏不合與憲臣等同入省按事餘慶上疏論列當時翕然稱重十四年拜中書侍郎平章事餘慶通究六經深旨奏對之際多以古義傅之與度支使于素善每奏事餘慶皆議可之未幾以罪貶時又歲旱人飢德宗與宰臣議將賑給禁衛六軍事未行為中書吏所泄餘慶貶郴州司馬凡六載順宗登極徵拜尚書左丞憲宗嗣位之月又擢守本官平章事未幾屬夏州將楊惠琳阻命宰臣等論奏多議兵事餘慶復以古義上言夏州軍士皆仰給縣官又有介馬萬蹄之語時議以餘慶雖好古博雅而未適時有主書滑渙久司中書簿籍與內官典樞密劉光琦情通宰相議事與光琦異同者令渙達意未嘗不遂所欲宰相杜佑鄭絪皆姑息之議者云佑私呼為滑八四方書幣資貨充集其門弟泳官至刺史及餘慶再入中書與同僚集議渙指陳是非餘慶怒其僭叱之尋而餘慶罷相為太子賓客其年八月渙贓污發賜死上寖聞餘慶叱渙事甚重之乃改為國子祭酒尋拜河南尹三年檢校兵部尚書兼東都留守六年四月正拜兵部尚書餘慶再為相罷免皆非大過尤以清儉為時所稱洎中外踐更鬱為耆德朝廷得失言成準的時京兆尹元義方戶部侍郎判度支盧坦皆以勳官前任至三品據令合立門戟各請戟立於其第時義方以加上柱國坦以前任宣州觀察使請戟近代立戟者率有銀青階而義方只據勳官有司不詳覆而給之議者非之臺司將劾而未果會餘慶自東都來發論大以為不可由是臺司移牒詰禮部左司郎中陸則禮部員外崔備皆罰俸奪元盧之門戟餘慶受詔撰惠昭太子哀冊其辭甚工有醫工崔環自淮南小將為黃州司馬敕至南省餘慶執之封還以為諸道散將無故授正員五品官是開徼幸之路且無闕可供言或過理由是稍忤時權改太子少傅兼判太常卿事初德宗自山南還宮關輔有懷光吐蕃之虞都下驚憂遂詔太常集樂去大鼓至是餘慶始奏復用大鼓九年拜檢校右僕射兼興元尹充山南西道節度觀察使三歲受代十二年除太子少師尋以年及懸車請致仕詔不許時纍有恩赦階及天子親謁郊廟行事官等皆得以恩授三品五品不復計考其使府賓吏又以軍功借賜命服而後入拜者十八九由是在朝衣緑者甚少郎官諫官有被紫垂金者又丞郎中謝洎郎官出使多賜章服以示加恩於是寵章尤濫當時不以服章為貴遂詔餘慶詳格令立制條奏以聞十三年拜尚書左僕射自兵興以來處左右端揆之位者多非其人及餘慶以名臣居之人情美洽憲宗以餘慶諳練典章朝廷禮樂制度有乖故事專委餘慶參酌施行遂用為詳定使餘慶復奏刑部侍郎韓愈禮部侍郎李程為副使左司郎中崔郾吏部郎中陳珮刑部員外郎楊嗣復禮部員外郎庾敬休並充詳定判官朝廷儀制吉凶五禮咸有損益焉改鳳翔尹鳳翔隴節度使十四年兼太子少師檢校司空封滎陽郡公兼判國子祭酒事以太學荒毀日久生徒不振奏率文官俸給修兩京國子監及穆宗登極以師傅之舊進位檢校司徒優禮甚至元和十五年十一月卒詔曰故金紫光祿大夫檢校司徒兼太子少師上柱國滎陽郡開國公食邑二千戶鄭餘慶始以衣冠禮樂行於山東餘力文章遂成志學出入清近盈五十年再秉台衡屢分戎律凡所要職無不踐更貴而能貧卑以自牧謇諤聞於臺閣柔睦化於閨門受命有考父之恭待士比公孫之廣焚書逸禮盡可口傳古史舊章如因心匠朕方咨稟庶罔昏踰神將祝豫痛悼何及乞言既阻賵禮宜優可贈太保時年七十五諡曰貞餘慶砥名礪行不失儒者之道清儉率素終始不渝四朝居將相之任出入垂五十年祿賜所得分給親黨其家頗類寒素自至德已來方鎮除授必遣中使領旌節就第宣賜皆厚以金帛遺之求媚者唯恐其數不廣故王人一來有獲錢數百萬者餘慶每受方任天子必誡其使曰餘慶家貧不得妄有求取專欲振起儒教後生謁見者率以經學諷之而周其所急理家理身極其儉薄及修官政則喜開廣鎮岐下一歲戎事可觀又創立儒宮以來學者雖行己可學而往往近於沽激故當時議者不全德許之上以家素清貧不辦喪事宜令所司特給一月俸料以充賻贈用示褒榮有文集表疏碑志詩賦共五十卷行於世兄承慶官不顯弟膺甫官至主客員外郎中楚懷鄭三州刺史次弟具瞻羽客時然皆官至縣令賓佐餘慶子浣浣本名涵以文宗藩邸時名同改名浣貞元十年舉進士以父謫官纍年不任自祕書省校書郎遷洛陽尉充集賢院修撰改長安尉集賢校理轉太常寺主簿職仍故遷太常博士改右補闕獻疏切直人為危之及餘慶入朝憲宗謂餘慶曰卿之令子朕之直臣可更相賀遂遷起居舍人改考功員外郎刺史有驅迫人吏上言政績請刊石紀政者浣探得其情條責廉使巧跡遂露人服其敏識時餘慶為僕射請改省郎乃換國子博士史館修撰丁母憂除喪拜考功郎中復丁內艱終制退居汜上長慶中徵為司封郎中史館修撰纍遷中書舍人文宗登極擢為翰林侍講學士上命撰經史要録二十卷書成上喜其精博因摘所上書語類上親自發問浣應對無滯錫以金紫大和二年遷禮部侍郎典貢舉二年選拔造秀時號得人轉兵部侍郎改吏部出為河南尹皆著能名入為左丞旋拜刑部尚書兼判左丞事出為山南西道節度觀察使檢校戶部尚書興元尹兼御史大夫餘慶之鎮興元創立儒宮開設學館至浣之來復繼前美開成四年閏正月以戶部尚書徵詔下之日卒于興元年六十四贈右僕射諡曰宣有文集制誥共三十卷行於世浣四子允謨茂諶處誨從讜允謨以蔭纍官臺省歷蜀彭濠晉四州刺史位終太子右庶子茂諶避國諱改茂休開成二年登進士第四遷太常博士兵部員外郎吏部郎中絳州刺史位終祕書監處誨字延美於昆仲間文章拔秀早為士友所推大和八年登進士第釋褐祕府轉監察拾遺尚書郎給事中纍遷工部刑部侍郎出為越州刺史浙東觀察使檢校刑部尚書汴州刺史宣武軍節度觀察等使卒于汴處誨族父朗初朗為定州節度使時處誨為工部侍郎因早朝假寐於待漏院忽夢己為浙東觀察使經過汴州而朗為汴帥留連飲餞仰視屋棟飾以黃土賓從皆所識明年朗果自定州鎮宣武辟韋重掌書記重將行處誨告以所夢明年處誨轉刑部侍郎其年秋授浙東觀察使行及潼關朗遣從事迎勞仍致手書令先疏所夢比至汴宴于清暑亭賓佐悉符夢中朗仰視屋棟曰此亦黃土也四坐感歎移時後五年朗卒處誨繼為汴州節度使乃賦詩一章刻于廳事以盡思朗之悲處誨方雅好古且勤於著述撰集至多為校書郎時撰次明皇雜録三篇行於世從讜字正求會昌二年登進士第釋褐祕書省校書郎歷拾遺補闕尚書郎知制誥故相令狐綯魏扶皆父貢舉門生為之延譽尋遷中書舍人咸通三年知貢舉拜禮部侍郎轉刑部改吏部侍郎典選平允時無屈人垂將作輔以權臣請託不行改檢校刑部尚書太原尹北都留守河東節度觀察等使踰年乞還不允改檢校兵部尚書汴州刺史宣武軍節度觀察等使期年報政美聲流聞當途者懼其大用改廣州刺史嶺南節度使五管為南詔蠻所擾天下徵兵時有龐勛之亂不暇邊事從讜在鎮北兵寡弱夷獠棼然乃擇其土豪授之右職禦侮扞城皆得其效雖郡邑屢陷而交廣晏然俄而懿宗厭代從讜以久在番禺不樂風土思歸戀闕形於賦詠纍上章求為分司散秩僖宗徵還用為刑部尚書尋以本官同平章事乾符中盜起河南天下騷動陰山府沙都督李國昌部族方強虎視北邊屬靈州防禦使段文楚軍儲不繼郡兵乏食乃密引沙部攻城殺文楚遂據振武軍雲朔等州又令其子克章克用大合諸部南侵欣代前帥竇瀚李侃李蔚相繼以重臣鎮並部皆不能遏俄而康傳圭為三軍所殺軍士益驕矜功責賞動為譟聚加以河南河北七道兵帥雲合都下人不聊生沙連陷城邑朝廷難於擇帥僖宗欲以宰臣臨制之詔曰開府儀同三司門下侍郎兼兵部尚書充太清宮使弘文館大學士延資庫使上柱國滎陽郡開國公食邑二千戶鄭從讜自處鈞衡屢來麟鳳才高應變動必研機朕以北門興王故地以爾嘗施惠化尚有去思方當用武之時暫輟調元之職佇殲凶醜副我憂勤可檢校司空同平章事太原尹北都留守河東節度兼行營招討等使制下許自擇參佐乃奏長安令王調為副使兵部員外郎史館修撰劉崇龜為節度判官前司勳員外郎史館修撰趙崇為觀察判官前進士劉崇魯充推官前左拾遺李渥充掌書記前長安尉崔澤充支使開幕之盛冠於一時時中朝瞻望者目太原為小朝廷言名人之多也時新承軍亂之後殺掠攻剽無日無之從讜貌溫而氣徑沉機善斷奸無遁情凡凶謀盜發無不落其彀中以是羣豪惕息舊府城都虞候張彥球者前帥令率兵三千逐沙於百井中路而還縱兵破鑰殺故帥康傳圭及從讜至搜索其魁誅之知彥球意善有方略召之開喻坦然無疑悉以兵柄委之廣明初李鈞李涿繼率本道之師出雁門為沙所敗十二月黃巢犯長安僖宗出幸傳詔謂從讜曰卿志安封域權總戎麾夷夏具瞻社稷全賴今月五日草賊黃巢奔衝十六日駐蹕梁漢上慚九廟下愧萬方藩閫乍聞痛憤應切專差供奉官劉全及往彼慰喻卿宜差點本道兵士酌量多少付北面副招討使諸葛爽俾令入援從讜承詔雪涕團結戎伍遣牙將論安後院軍使朱玫率步騎五千從諸葛爽入關赴難時中和元年五月也論安軍次離石是月沙李克用軍奄至營于汾東稱奉詔赴難入關從讜具廩餼犒勞信宿不發克用傅城而呼曰本軍將南下欲與相公面言從讜登城謂之曰僕射父子咸通以來奮激忠義血戰為國天下之人受賜老夫歷事纍朝位忝將相今日羣盜擾攘輿駕奔播蕩覆神州不能荷戈討賊以酬聖奬老夫之罪也然多難圖勳是僕射立功立事之時也所恨受命守藩不敢辱命無以仰陪戎棨若僕射終以君親為念破賊之後車駕還宮却得待罪闕庭是所願也唯僕射自愛克用拜謝而去然雜虜不戢肆掠近甸從讜遣大將王蟾薛威出師追擊之翌日契苾部救兵至沙大敗而還初論安率師入關至陰地以數百卒擅歸從讜集諸部校斬之於鞠場並以兵衆付朱玫赴難時鄭畋亦以宰相鎮鳳翔與從讜宗人同年登進士畋亦舉兵岐下以遏賊巢廣明首唱仗義斷賊首尾逆徒名為二鄭國威復振二儒帥之功也二年十一月代北監軍使陳景思奉詔赦沙部許討賊自贖由是沙五部數萬人南下不敢蹈境乃自嵐石沿河而南唯李克用以數百騎臨城別從讜遺之名馬器幣而訣三年克用破賊立功授河東節度代從讜還至榆次遣使致禮謂從讜曰豫家尊在雁門且還覲省相公徐治行裝勿遽首途從讜承詔即日牒監軍使周從寓請知兵馬留後事書記劉崇魯知觀察留後事戒之曰俟面李公按籍而還五月十五日從讜離太原時京城雖復車駕未還道途多寇行次絳州唐彥謙為刺史留駐數月冬詔使追赴行在復輔政歷司空司徒正拜侍中光啓末固辭機務以疾還第卒有司諡曰文忠從讜知人善任性不驕矜故所至有聲績在太原時大將張彥球強桀難制前後帥守以疑間貽釁故軍旅不寧及從讜撫封四年知其才用可委開懷任遇得其死力故抗虜全城多彥球之效也纍奏為行軍司馬及再秉政用為金吾將軍纍郡刺史在絳州時彥謙判官陸扆嗜學有才思寓於郡齊日與之談宴無間先後乃稱之於朝位至清顯在汴時以兄處誨嘗為鎮帥歿於是郡訖一政受代不於公署舉樂其友悌知禮操履如此國之名臣文忠有焉韋貫之本名純以憲宗廟諱遂以字稱八代祖敻仕周號逍遙公父肇官至吏部侍郎有重名於時貫之即其第二子少舉進士貞元初登賢良科授校書郎秩滿從調判入等再轉長安縣丞德宗末年京兆尹李實權移宰相言其可否必數日而詔行人有以貫之名薦於實者答曰是其人居與吾同里亟聞其賢但吾得識其面而進於上舉笏示說者曰實已記其名氏矣說者喜驟以其語告於貫之且曰子今日詣實而明日受賀矣貫之唯唯數歲終不往然是後竟不遷永貞中始除監察御史上書舉季弟纁自代時議不以為私轉右補闕而纁代為監察元和元年杜從郁為左補闕貫之與崔羣奏論尋降為左拾遺又論遺補雖品不同皆是諫官父為宰相子為諫官若政有得失不可使子論父改為祕書丞後與中書舍人張弘靖考制策第其名者十八人其後多以文稱轉禮部員外郎新羅人金忠義以機巧進至少府監蔭其子為兩館生貫之持其籍不與曰工商之子不當仕忠義以藝通權幸為請者非一貫之持之愈堅既而疏陳忠義不宜污朝籍詞理懇切竟罷去之改吏部員外郎三年復策賢良之士又命貫之與戶部侍郎楊於陵左司郎中鄭敬都官郎中李益同為考策官貫之奏居上第者三人言實指切時病不顧忌諱雖同考策者皆難其詞直貫之獨署其奏遂出為果州刺史道中黜巴州刺史俄徵為都官郎中知制誥踰年拜中書舍人改禮部侍郎凡二年所選士大抵抑浮華先行實由是趨競者稍息轉尚書右丞中謝日面賜金紫明年以本官同中書門下平章事淮西之役鎮州盜竊發輦下殺宰相武元衡傷御史中丞裴度及度為相二寇並征議者以物力不可貫之請釋鎮以養威攻蔡以專力上方急於太平未可其奏貫之進言陛下豈不知建中之事乎天下之兵始於蔡急魏應齊趙同惡德宗率天下兵命李抱真馬燧急攻之物力用屈於是朱泚乘之為亂朱滔隨而向闕致使梁漢為府奉天有行皆陛下所聞見非他不能忍待次第速於撲滅故也陛下獨不能寬歲月俟拔蔡而圖鎮邪上深然之而業已下伐鎮詔後滅蔡而鎮自服如其策焉初王師征蔡以汴帥韓弘為都統又命汝帥烏重胤許帥李光顏合兵而進貫之以為諸將四面討賊各鋭進取今若置統督復令二帥連營則持重養威未可以歲月下也貫之議不從四年而始克蔡尋遷中書侍郎同列以張仲素段文昌進名為學士貫之阻之以行止未正不宜在內庭貫之為相嚴身律下以清流品為先故門無雜賓有張宿者有口辨得幸於憲宗擢為左補闕將使淄青宰臣裴度欲為請章服貫之曰此人得幸何要假其恩寵耶其事遂寢宿深銜之卒為所搆誣以朋黨罷為吏部侍郎不涉旬出為湖南觀察使弟虢州刺史纁亦貶遠郡時兩河留兵國用不足命鹽鐵副使程虉使諸道督課財賦虉所至方鎮皆諷令捃拾進獻貫之謂兩稅外不忍橫賦加人所獻未滿虉意遂率屬內六州留錢以繼獻由是罷為太子詹事分司東都上即位擢為河南尹徵拜工部尚書未行長慶元年卒於東都年六十二詔贈尚書右僕射貫之自布衣至貴位居室無改易歷重位二十年苞苴寶玉不敢到門性沉厚寡言與人交終歲無款曲未曾僞詞以悅人身歿之後家無羡財有文集三十卷伯兄綬德宗朝為翰林學士貞元之政多參決於內署綬所議論常合中道然畏慎致傷晚得心疾故不極其用纁有精識奧學為士林所器閨門之內名教相樂故韋氏兄弟令稱推於一時纁纍官至太常少卿貫之子澳潾澳字子斐大和六年擢進士第又以弘詞登科性貞退寡欲登第後十年不仕伯兄溫與御史中丞高元裕友善溫請用澳為御史謂澳曰高二十九持憲綱欲與汝相面汝必得御史澳不答溫曰高君端士汝不可輕澳曰然恐無呈身御史竟不詣元裕之門周墀鎮鄭滑辟為從事墀輔政以澳為考功員外郎史館修撰墀初作相私謂澳曰才小任重何以相救澳曰荷公重知願公無權足矣墀愕然不喻其旨澳曰爵賞刑罰非公共欲行者願不以喜怒憎愛行之但令百司羣官各舉其職則公斂衽於廟堂之上天下自理何要權耶墀深然之不周歲以本官知制誥尋召充翰林學士纍遷戶部兵部侍郎學士承旨與同僚蕭置深為宣宗所遇每二人同直無不召見詢訪時事每有邦國刑政大事中使傳宣草詞澳心欲論諫即曰此一事須降御札方敢施行遲留至旦必論其可否上旨多從之出為京兆尹不避權豪京師讋憚會判戶部宰相蕭鄴改判度支澳於延英對上曰戶部闕判使澳對以府事上言戶部闕判使者三又曰卿意何如澳對曰臣近年心力減耗不奈繁劇纍曾陳乞一小鎮聖慈未垂矜允上默然不樂其奏澳甥柳玭知其對謂澳曰舅之奬遇特承聖知延英奏對恐未得中澳曰吾不為時相所信忽自宸旨委以使務必以吾他岐得之何以自明我意不錯爾須知時事漸不堪是吾徒貪爵位所致爾宜志之大中十二年檢校工部尚書兼孟州刺史充河陽三城懷孟澤節度等使辭於內殿上曰卿自求便我不去卿在河陽纍年中使王居方使魏州令傳詔旨謂澳曰久別無恙知卿奉道得何藥術可具居方口奏澳因中使上章陳謝又曰方士殊不可聽金石有毒切不宜服食帝嘉其忠將召之而帝厭代懿宗即位遷檢校戶部尚書兼青州刺史平盧節度觀察處置等使入為戶部侍郎轉吏部絟綜平允不受請託為執政所惡出為邠州刺史邠寧節度使宰相杜審權素不悅於澳會吏部發澳時簿籍吏緣為奸坐罷鎮以祕書監分司東都嘗戲吟云莫將韋鑒同殷鑒錯認容身作保身此句聞於京師權幸尤怒之上表求致仕宰相疑其怨望拜河南尹制出纍上章辭疾以松檟在秦州求歸樊川別業許之踰年復授戶部侍郎以疾不拜而卒贈戶部尚書諡曰貞潾亦登進士第無位而卒潾子庾庠序雍郊庾登進士第纍佐使府入朝為御史纍遷兵部郎中諫議大夫從僖宗幸蜀改中書舍人纍拜刑部侍郎判戶部事車駕還京充頓遞使至鳳翔病卒序雍郊皆登進士第序雍官至尚書郎郊文學尤高纍歷清顯自禮部員外郎知制誥正拜中書舍人昭宗末召充翰林學士纍官戶部侍郎學士承旨卒史臣曰二武朗拔精裁為時羽儀嫉惡太甚遭罹不幸倳刃喋血誠可哀哉令狐中傷為惡滋甚君子之行其若是乎鄭貞公博雅好古一代儒宗文忠致君無忝乃祖衣冠之盛近代罕儔韋氏三宗世多才俊純纁忠懿為時元龜作輔論兵言皆體國澳之貞亮不替祖風三代諡貞考行無愧贊曰后族崢嶸平一辭榮高風襲慶鍾在二衡猗與貞公繼以文忠純纁文雅綽有父風
