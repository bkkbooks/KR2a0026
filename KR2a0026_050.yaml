body:
  text: 舊唐書卷四十六志第二十六經籍上夫龜文成象肇八卦於庖犧鳥迹分形創六書於蒼頡聖作明述同源異流墳典起之於前詩書繼之於後先王陳迹後王準繩易曰觀乎人文以化成天下禮曰君子如欲化民成俗其必由學乎學者非他方策之謂也琢玉成器觀古知今歷代哲王莫不崇尚自仲尼沒而微言絶七十子喪而大義乖嬴氏坑焚以愚黔首漢興學校復創石渠雄向校讐於前馬鄭討論於後兩京載籍由是粲然及漢末還都焚溺過半爰自魏晉迄于周隋而好事之君慕古之士亦未嘗不以圖籍為意也然河北江南未能混一偏方購輯卷帙未弘而荀勗李充王儉任昉祖耳幾皆達學多聞歷世整比羣分類聚遞相祖述或為七録或為四部言其部類多有所遺及隋氏建邦寰區一統煬皇好學喜聚逸書而隋世簡編最為博洽及大業之季喪失者多貞觀中令狐德棻魏徵相次為祕書監上言經籍亡逸請行購募并奏引學士校定羣書大備開元三年左散騎常侍褚氍量馬懷素侍宴言及經籍玄宗曰內庫皆是太宗高宗先代舊書常令宮人主掌所有殘缺未遑補緝篇卷錯亂難於檢閲卿試為朕整比之至七年詔公卿士庶之家所有異書官借繕寫及四部書成上令百官入乾元殿東廊觀之無不駭其廣九年十一月殷踐猷王愜韋述余欽毋煚劉彥真王灣劉仲等重修成羣書四部録二百卷右散騎常侍元行沖奏上之自後毋煚又略為四十卷名為古今書録大凡五萬一千八百五十二卷祿山之亂兩都覆沒乾元舊籍亡散殆盡肅宗代宗崇重儒術屢詔購募文宗時鄭覃侍講禁中以經籍道喪屢以為言詔令祕閣搜訪遺文日令添寫開成初四部書至五萬六千四百七十六卷及廣明初黃巢干紀再陷兩京宮廟寺署焚蕩殆盡曩時遺籍尺簡無存及行在朝諸儒購輯所傳無幾昭宗即位志弘文雅祕書省奏曰當省元掌四部御書十二庫共七萬餘卷廣明之亂一時散失後來省司購募尚及二萬餘卷及先朝再幸山南尚存一萬八千卷竊知京城制置使孫惟晟收在本軍其御書祕閣見充教坊及諸軍人占住伏以典籍國之大經祕府校讐之地其書籍並望付當省校其殘缺漸令補輯樂人乞移他所並從之及遷都洛陽又喪其半平時載籍世莫得聞今録開元盛時四部諸書以表藝文之盛四部者甲乙丙丁之次也甲部為經其類十二一曰易以紀陰陽變化二曰書以紀帝王遺範三曰詩以紀興衰誦嘆四曰禮以紀文物體制五曰樂以紀聲容律度六曰春秋以紀行事褒貶七曰孝經以紀天經地義八曰論語以紀先聖微言九曰圖緯以紀六經讖候十曰經解以紀六經讖候十一曰詁訓以紀六經讖候十二曰小學以紀字體聲韻乙部為史其類十有三一曰正史以紀紀傳表志二曰古史以紀編年繫事三曰雜史以紀異體雜紀四曰霸史以紀偽朝國史五曰起居注以紀人君言動六曰舊事以紀朝廷政令七曰職官以紀班序品秩八曰儀注以紀吉凶行事九曰刑法以紀律令格式十曰雜傳以紀先聖人物十一曰地理以紀山川郡國十二曰譜系以紀世族繼序十三曰略録以紀史策條目丙部為子其類一十有四一曰儒家以紀仁義教化二曰道家以紀清淨無為三曰法家以紀刑法典制四曰名家以紀循名責實五曰墨家以紀強本節用六曰縱橫家以紀辨説詭詐七曰雜家以紀兼衆説八曰農家以紀播植種藝九曰小説家以紀芻辭輿誦十曰兵法以紀權謀制度十一曰天文以紀星辰象緯十二曰曆數以紀推步氣朔十三曰五行以紀卜筮占候十四曰醫方以紀藥餌針灸丁部為集其類有三一曰楚詞以紀騷人怨刺二曰別集以紀詞賦雜論三曰總集以紀文章事類煚等撰集依班固藝文志體例諸書隨部皆有小序發明其指近史官撰隋書經籍志其例亦然竊以紀録簡編異題卷部相沿序述無出前修今之殺青亦所不取但紀部帙而已而煚等所序四部都録以明新修之旨今略載之竊以經墳浩廣史圖紛博尋覽者莫之能遍司總者常苦其多何暇重屋復牀更繁其説若先王有闕典上聖有遺事邦政所急儒訓是先宜垂教以作程當闡規而開典則不遑啓處何獲宴寧曩之所修誠惟此義然禮有未愜追怨良深于時祕書省經書實多亡闕諸司墳籍不暇討論此則事有未周一也其後周覽人間頗覩闕文新集記貞觀之前永徽已來不取近書採長安之上神龍已來未録此則理有未弘二也書閲不遍事復未周或不詳名氏或未知部伍此則體有未通三也書多闕目空張第數既無篇題實乖標榜此則例有所虧四也所用書序咸取魏文貞所分書類皆據隋經籍志理有未允體有不通此則事實未安五也昔馬談作史記班彪作漢書皆兩葉而僅成劉歆作七略王儉作七志踰二紀而方就孰有四萬卷目二千部書名目首尾三年便令終竟欲求精悉不其難乎所以常有遺恨竊思追雪乃與類同契積思潛心審正舊疑詳開新制永徽新集神龍近書則釋而附也未詳名氏不知部伍則論而補也空張之目則檢獲便增未允之序則詳宜別作紕繆咸正混雜必刊改舊傳之失者三百餘條加新書之目者六千餘卷凡經録十二家五百七十五部六千二百四十一卷史録十三家八百四十部一萬七千九百四十六卷子録十七家七百五十三部一萬五千六百三十七卷集録三家八百九十二部一萬二千二十八卷凡四部之録四十五家都管三千六十部五萬一千八百五十二卷成書録四十卷其外有釋氏經律論疏道家經戒符籙凡二千五百餘部九千五百餘卷亦具翻譯名氏序述指歸又勒成目録十卷名曰開元內外經録若夫先王祕傳列代奧文自古之粹籍靈符絶域之神經怪牒盡載於此二書矣夫經籍者開物成務垂教作程聖哲之能事帝王之達典而去聖已久開鑿遂多苟不剖判條源甄明科部則先賢遺事有卒代而不聞大國經書遂終年而空泯使學者孤舟泳海弱羽憑天銜石填溟倚杖追日莫聞名目豈詳家代不亦勞乎不亦弊乎將使書千帙於掌眸披萬函於年祀覽録而知旨觀目而悉詞經墳之精術盡探賢哲之睿思咸識不見古人之面而見古人之心以傳後來不其愈已其序如此煚等四部目及釋道目並有小序及注撰人姓氏卷軸繁多今並略之但紀篇部以表我朝文物之大其釋道録目附本書今亦不取據開元經籍為之志天寶已後名公各著文章儒者多有撰述或記禮法之沿革或裁國史之繁略皆張部類其徒實繁臣以後出之書在開元四部之外不欲雜其本部今據所聞附撰人等傳其諸公文集亦見本傳此並不録四部區分詳之于下甲部經録十二家五百七十五部六千二百四十一卷易類一書類二詩類三禮類四樂類五春秋類六孝經類七論語類八讖緯類九經解類十詁訓類十一小學類十二歸藏十三卷殷易司馬膺注周易二卷卜商傳又十卷孟喜章句又十卷京房章句又四卷費直章句又十卷馬融章句又九卷鄭玄注又十卷荀爽章句又五卷劉表注又十卷王肅注又十卷董遇注又十卷宋衷注又七卷王弼注又九卷虞翻注又十三卷陸績注又十卷荀氏九家集解又十卷馬鄭二王集解又十卷姚信注又十卷王弼韓康伯注又十卷二王集注又十卷荀暉注又十卷蜀才注又十卷張璠集解又十卷王廙注又十卷干寶注又十卷黃穎注又十卷崔浩注又十三卷崔覲注又十卷何胤注又十卷盧氏注又十四卷傅氏注又十卷王玄度注又十卷王又玄注又十卷任希古注又十卷王凱沖注周易發揮五卷王勃撰周易繫辭二卷謝萬注又二卷桓玄注又二卷荀諺注又二卷宋褰注周易義疏二十卷宋明帝注宋羣臣講易疏二十卷張該等注周易大義二十卷梁武帝撰周易講疏三十五卷梁武帝撰周易發題義一卷周易幾義一卷蕭偉撰周易大義疑問二十卷梁武帝撰周易義疏十四卷蕭子政撰周易講疏三十卷張譏注又十三卷何妥撰又十六卷褚仲都撰周易正義十四卷孔穎達撰周易新論十卷陰弘道撰周易文句義疏二十四卷陸德明撰周易文外大義二卷陸德明撰周易新注本義十四卷薛仁貴撰周易開題論序疏十卷周易文句義疏二十卷已上並梁蕃撰周易大衍論三卷玄宗撰周易論四卷鍾會撰周易大衍論一卷王弼撰周易論一卷應吉甫撰周易統略論三卷鄒湛撰周易略論一卷張璠撰周易論二卷暨長成難暨仲容答易論一卷宋處宗撰通易象論一卷宣聘撰又一卷欒永初撰周易繫辭義疏二卷劉瓛撰周易乾坤義疏一卷劉瓛撰周易略譜一卷沈熊撰周易爻義一卷干寶撰周易卦序論一卷楊乂撰周易譜一卷袁宏撰周易論四卷范氏撰周易雜音三卷周易釋序義三卷梁蕃撰右易七十八部凡六百七十三卷古文尚書十三卷孔安國傳又十卷孔安國傳范寧注又十卷李顒集注又十卷薑道盛集注又十卷馬融注又九卷鄭玄注又十卷王肅注又十三卷謝沈注尚書暢訓三卷伏勝注尚書洪範五行傳十一卷劉向撰尚書答問三卷王肅注尚書釋駮五卷王肅撰尚書釋問四卷鄭玄注王粲問田瓊韓益正尚書義注三卷呂文優撰尚書釋義四卷伊説撰尚書要略二卷李顒撰尚書新釋二卷李顒撰尚書百問一卷顧歡撰尚書義疏十卷巢猗撰尚書百釋三卷巢猗撰尚書義疏十卷費甝撰古文尚書大義二十卷任孝恭撰尚書義疏三十卷蔡大寶撰尚書文外義三十卷顧彪撰尚書義疏二十卷劉焯撰尚書述義二十卷劉炫撰尚書正義二十卷孔穎達撰古文尚書音義五卷顧彪撰尚書音義四卷王儉撰右尚書二十九部凡二百七十二卷韓詩二十卷卜商序韓嬰撰韓詩外傳十卷韓嬰撰毛詩十卷毛萇撰毛詩詁訓二十卷鄭玄箋毛詩二十卷王肅注葉詩二十卷葉遵注集注毛詩二十四卷崔靈恩集注韓詩翼要十卷卜商撰毛詩譜二卷鄭玄撰毛詩集序二卷卜商撰毛詩義注五卷毛詩雜義駮八卷王肅撰毛詩問難二卷王肅撰毛詩駮五卷王伯輿撰毛詩義問十卷劉楨撰毛詩雜答問五卷毛詩雜義難十卷毛詩異同評十卷孫育撰毛詩釋義十卷謝沈撰毛詩辨三卷楊乂撰毛詩序義一卷劉氏撰毛詩表隱二卷毛詩義疏五卷張氏撰毛詩誼府三卷元延明撰毛詩草木鳥獸魚蟲疏二卷陸璣撰毛詩述義三十卷劉炫撰毛詩正義四十卷孔穎達撰毛詩音義二卷魯世達撰毛詩諸家音十五卷鄭玄等注難孫氏詩評四卷陳統撰右詩三十部凡三百十三卷周官十二卷馬融傳周官禮十三卷鄭玄注又十卷伊説撰又十二卷王肅注又十二卷干寶注周官論評十二卷陳邵駮傅玄評周官寧朔新書八卷司馬胄序王懋約注周官駮難五卷孫略問干寶答周禮義疏四十卷沈重撰周禮疏五十卷賈公彥撰周禮義決三卷王玄度撰周官音三卷鄭玄撰儀禮十七卷鄭玄注又十七卷王肅注儀禮音二卷喪服紀一卷馬融注又一卷鄭玄注又一卷袁準注又一卷又一卷陳銓注又二卷蔡超宗注又二卷田僧紹注喪服變除一卷戴德撰喪服要紀一卷王肅注喪服要集議三卷杜預撰喪服要紀五卷賀循撰謝微注儀禮疏五十卷賈公彥撰喪服變除一卷鄭玄撰喪服要紀十卷賀循撰庾蔚之注喪服古今集記三卷王儉撰喪服五代行要記十卷王逡之志喪服經傳義疏四卷沈文阿撰喪服發題二卷沈文阿撰喪服文句義十卷皇侃撰喪服天子諸侯圖二卷謝慈撰喪服圖一卷崔遊撰喪服譜一卷蔡謨撰喪服譜一卷賀循撰喪服要難一卷趙成問仇祈答大戴禮記十三卷戴德撰小戴禮記二十卷戴聖撰鄭玄注禮記二十卷盧植注又三十卷王肅注又三十卷孫炎注又十二卷葉遵注禮記寧朔新書二十卷司馬胄序王懋約注次禮記二