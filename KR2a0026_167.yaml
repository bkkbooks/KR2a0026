body:
  text: 舊唐書卷一百六十三列傳第一百一十三孟簡胡證證子湘崔元略子鉉鉉子沆元略弟元受元式元儒杜元穎崔弘禮李虞仲王質盧簡辭兄簡能弟弘正簡求簡能子知猷簡求子嗣業汝弼孟簡字幾道平昌人天后時同州刺史詵之孫工詩有名擢進士第登宏辭科纍官至倉部員外郎戶部侍郎王叔文竊政簡為子司多不附之叔文惡之雖甚亦不至擯斥尋遷司封郎中元和四年超拜諫議大夫知匭事簡明於內典六年詔與給事中劉伯芻工部侍郎歸登右補闕蕭俯等同就醴泉佛寺翻譯大乘本生心地觀經簡最擅其理王承宗叛詔以吐突承璀為招討使簡抗疏論之坐語訐出為常州刺史八年就加金紫光祿大夫簡始到郡開古孟瀆長四十一里灌溉沃壤四千餘頃為廉使舉其課績是有就加之命是歲徵拜為給事中九年出為越州刺史兼御史中丞浙東觀察使承李遜抑遏士族恣縱編戶之後及簡為政一皆反之而農估多受其弊當時以為兩未可也十二年入為戶部侍郎十三年代崔元略為御史中丞仍兼戶部侍郎是歲出為襄州刺史山南東道節度使十四年敕於穀城縣置羣牧命曰臨漢監令簡充使簡奏請均州鄖鄉縣鎮遏使趙潔充本縣令臺司奏有虧刑典罰一月俸是歲改授太子賓客分司東都十五年穆宗即位貶吉州司馬員外置同正員初簡在襄陽以腹心吏陸翰知上都進奏委以關通中貴翰持簡陰事漸不可制簡怒追至州以土囊殺之且欲滅口翰子弟詣闕進狀訴冤且告簡贓狀御史臺按驗獲簡賂吐突承璀錢帛等共計七千餘貫匹事狀明白故再貶之長慶元年大赦量移睦州刺史二年移常州刺史三年入為太子賓客分司東都其年十二月卒簡性俊拔尚義早歲交友先歿者視其孤每厚於周恤議者以為有前輩風然溺於浮圖之教為儒曹所誚胡證字啓中河東人父瑱伯父玫登進士第證貞元中繼登科咸寧王渾瑊辟為河中從事自殿中侍御史拜韶州刺史以母年高不可適遠改授太子舍人襄陽節度使于請為掌書記檢校祠部員外郎元和四年由侍御史歷左司員外郎長安縣令戶部郎中田弘正以魏博內屬請除副二乃兼御史中丞充魏博節度副使仍兼左庶子入遷左諫議大夫九年以党項寇邊以證有安邊才略乃授單于都護御史大夫振武軍節度使前任將帥非統馭之才邊事曠廢朝廷故特用證以鎮十三年徵為金吾大將軍依前兼御史大夫十四年充京西京北巡邊使訪其利害以聞長慶元年太和公主出降回紇詔以本官檢校工部尚書充和親使舊制以使車出境有行人私覿之禮官不能給召富家子納資於使者而命之官及證將行首請釐革儉受省費以絶鬻官之門行及漠南虜騎繼至狼心犬態一日千狀欲以戎服變革華服又欲以王姬疾驅徑路證抗志不拔守漢儀黜夷法竟不辱君命使還拜工部侍郎敬宗即位之初檢校戶部尚書守京兆尹數月遷左散騎常侍寶曆初拜戶部尚書判度支上表乞免願效藩服二年檢校兵部尚書廣州刺史充嶺南節度使大和二年以疾上表求還京師是歲十月卒于嶺南時年七十一廢朝一日贈左僕射廣州有海舶之利貨貝狎至證善蓄積務華侈厚自奉養童奴數百於京城修行里起第連亙閭巷嶺表奇貨道途不絶京邑推為富家證素與賈餗善及李訓事敗禁軍利其財稱證子匿餗乃破其家一日之內家財並盡軍人執入左軍仇士良命斬之以徇時弟湘為太原從事忽白晝見緑衣人無首血流被地入于室湘惡之翌日凶問至而湘獲免崔元略博陵人祖渾之父警貞元中官至尚書左丞元略舉進士歷佐使府元和八年拜殿中侍御史十二年遷刑部郎中知臺雜事擢拜御史中丞元和十三年以李夷簡自西川徵拜御史大夫乃命元略留司東臺尋除京兆少尹知府事仍加金紫數月真拜京兆尹明年改左散騎常侍穆宗即位命元略使党項宣撫辭疾不行出為黔南觀察使兼御史中丞初元略受命使党項意宰臣以私憾排斥頗出怨言宰相崔植奏曰比以聖意切在安撫党項乃差元略往使受命之後苦不樂行言辭之間頗乖去就豈有身忝重恩不思報效苟非便己即不肯行須有薄懲以肅在位請出為黔中觀察使初崔植任吏部郎中元略任刑部郎中知雜時中丞改京兆尹物議以植有風憲之望元略因入閣妄稱植失儀命御史彈之時二人皆進擬為中丞中旨果授元略植深銜之及植為相元略以左散騎常侍使於党項元略意植之見排辭疾不行被譴出踰年轉鄂州刺史鄂嶽都團練觀察使長慶四年入為大理卿敬宗即位復為京兆尹尋兼御史大夫以誤徵畿甸經赦免放緡錢萬七千貫為侍御史蕭徹彈劾有詔刑部郎中趙元亮大理正元從質侍御史溫造充三司覆理元略有中助止於削兼大夫初元略有宰相望及是事望益減寶曆元年遷戶部侍郎議者以元略版圖之拜出於宣授時諫官有疏指言內常侍崔潭峻方有權寵元略以諸父事之故雖被彈劾而遽遷顯要元略亦上章自辨且曰一昨府縣條疏臺司舉劾孤立無黨謗言益彰不謂詔出宸衷恩延望外處南宮之重位列左戶之清班豈臣庸虛敢自干冒天心所擇雖驚特進之恩衆口相非乃致因緣之說詔答之曰朕所命官豈非公選卿能稱職奚恤人言然元略終不能逃父事潭峻之名寶曆二年四月京兆府以元略前任尹日為橋道使造東渭橋時被本典鄭位判官鄭復虛長物價撎估給用不還人工價直率斂工匠破用計贓二萬一千七百九貫敕云元略不能檢下有涉慢官罰一月俸料時劉栖楚自為京兆尹有覬覦相位之意元略方在次對又多遊裴度門栖楚恐礙己以計摧之乃按舉山陵時錢物以污之大和三年轉戶部尚書四年判度支五年檢校吏部尚書出為東都留守畿汝等防禦使是歲又遷滑州刺史義成軍節度使十二月卒廢朝三日贈尚書左僕射子鉉鉉字台碩登進士第三辟諸侯府荊南西蜀掌書記會昌初入為左拾遺再遷員外郎知制誥召入翰林充學士纍遷戶部侍郎承旨會昌末以本官同平章事為同列李德裕所嫉罷相為陝虢觀察使檢校刑部尚書宣宗即位遷檢校兵部尚書河中尹博陵縣開國子食邑五百戶大中三年召拜御史大夫尋加正議大夫中書侍郎同平章事纍遷金紫光祿大夫守左僕射門下侍郎太清宮使弘文館大學士博陵縣開國公食邑至二千戶七年以館中學士崔瑑薛逢等撰續會要四十卷獻之九年檢校司徒揚州大都督長史進封魏國公淮南節度使宣宗於太液亭賦詩宴餞有七載秉鈞調四序之句儒者榮之咸通初移鎮襄州咸通八年徐州戍將龐勛自桂管擅還道途剽掠鉉時為荊南節度聞徐州軍至湖南盡率州兵點募丁壯分扼江湘要害欲盡擒之徐寇聞之踰嶺自江西淮右北渡朝議壯之卒於江陵子沆汀潭沂沆登進士第官至員外郎知制誥拜中書舍人坐事貶循州司戶乾符初復拜舍人尋遷禮部侍郎典貢舉選名士十數人多至卿相乾符末本官同平章事遇京國盜據從駕不及而卒沂後官亦隆顯元略弟元受元式元儒元受登進士第高陵尉直史館元和初于臯謨為河北行營糧料使元受與韋岵薛巽王湘等皆為臯謨判官分督供饋既罷兵或以臯謨隱沒贓罪除名賜死元受從坐皆逐嶺表竟坎壈不達而卒子鈞鉶銖相繼登進士第辟諸侯府元式會昌三年檢校左散騎常侍河中尹河中晉絳觀察使四年檢校禮部尚書太原尹北都留守河東節度使六年入為刑部尚書宣宗朝領度支以本官同平章事元儒元和五年登進士第元式子鍇仕至京兆尹杜元穎萊公如晦裔孫也父佐官卑元穎貞元末進士登第再辟使府元和中為左拾遺右補闕召入翰林充學士手筆敏速憲宗稱之吳元濟平以書詔之勤賜緋魚袋轉司勳員外郎知制誥穆宗即位召對思政殿賜金紫超拜中書舍人其年冬拜戶部侍郎承旨長慶元年三月以本官同平章事加上柱國建安男元穎自穆宗登極自補闕至侍郎不周歲居輔相之地辭臣速達未有如元穎之比也三年冬帶平章事出鎮蜀川穆宗御安福門臨餞昭愍即位童心多僻務為奢侈而元穎求蜀中珍異玩好之具貢奉相繼以固恩寵以故箕斂刻削工作無虛日軍民嗟怨流聞于朝大和三年南詔蠻攻陷戎巂等州徑犯成都兵及城下一無備擬方率左右固牙城而已蠻兵大掠蜀城玉帛子女工巧之具而去是時蠻三道而來東道攻梓州郭釗禦之而退時元穎幾陷賴郭釗擊敗其衆方還蠻驅蜀人至大渡河謂之曰此南吾境放爾哭別鄉國數萬士女一時慟哭風日為之慘悽哭已赴水而死者千餘怨毒之聲纍年不息蠻首領顛遣人上表曰蠻軍比修職貢遽敢侵邊但杜元穎不恤三軍令入蠻疆作賊移文報彼都不見信故蜀部軍人繼為鄉導蓋蜀人怨苦之深祈我此行誅虐帥也誅之不遂無以慰蜀士之心願陛下誅之監軍小使張士謙至備言元穎之咎坐貶循州司馬判官崔璜連州司馬紇干臮郢州長史盧並唐州司馬皆以佐元穎無狀也六年卒於貶所臨終上表乞贈官贈湖州刺史元穎弟元絳位終太子賓客絳子審權位至宰相自有傳崔弘禮字從周博陵人北齊懷遠之七代孫祖育常州江陰令父孚湖州長城令弘禮風貌魁偉磊落有大志舉進士纍佐藩府官至侍御史元和中呂元膺為東都留守以弘禮為從事時淮西吳少陽初死吳元濟阻兵拒命山東反側之徒為之影援東結李師道謀襲東洛以脅朝廷弘禮為元膺籌畫部分兵衆以固東都卒亦無患纍除汾州棣州刺史會田弘正請入覲請副使乃授弘禮衛州刺史充魏博節度副使歷鄭州刺史長慶元年劉總入覲張弘靖移鎮范陽復加弘禮檢校左散騎常侍充幽州盧龍軍節度副使未及境幽鎮兵亂改為絳州刺史明年汴州李反急詔追弘禮為河南尹兼御史大夫東都畿汝都防禦副使平遷河陽節度使整練戈矛頗壯戎備又上言請於秦渠下闢荒田三百頃歲收粟二萬斛詔皆從之以疾連表請代數歲拜檢校戶部尚書華州刺史會天平軍節度使烏重胤卒朝廷難其人復以弘禮為天平軍節度使仍詔即日乘遞赴鎮文宗即位就加檢校左僕射理鄆三載改授東都留守仍遷刑部尚書詔赴闕以疾未至大和四年十月復除留守是歲十二月卒年六十四贈司空弘禮少時專以倜儻意氣自任通涉兵書留心軍旅之要用此纍更選用歷踐藩鎮所居無可尚之績雖繕完有素然善治生蓄積物議少之李虞仲字見之趙郡人祖震大理丞父端登進士第工詩大曆中與韓翃錢起盧綸等文詠唱和馳名都下號大曆十才子時郭尚父少子曖尚代宗女升平公主賢明有才思尤喜詩人而端等十人多在曖之門下每宴集賦詩公主坐視簾中詩之美者賞百縑曖因拜官會十子曰詩先成者賞時端先獻警句云薰香荀令偏憐小傅粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿構也願賦一韻正之請以起姓為韻端即襞箋而獻曰方塘似鏡草芊芊初月如鉤未上弦新開金埒教調馬舊賜銅山許鑄錢曖曰此愈工也起等始服端自校書郎移疾江南授杭州司馬而卒虞仲亦工詩元和初登進士第又以制策登科授弘文校書從事荊南入為太常博士遷兵部員外司勳郎中寶曆中考制策甚精轉兵部郎中知制誥拜中書舍人大和四年出為華州刺史兼御史大夫入拜左散騎常侍兼祕書監八年轉尚書右丞九年為兵部侍郎尋改吏部開成元年四月卒時年六十五虞仲簡淡寡欲立性方雅奕代文學達而不矜士友重之王質字華卿太原祁人五代祖通字仲淹隋末大儒號文中子通生福祚終上蔡主簿福祚生勉登進士第制策登科位終寶鼎令勉生怡終渝州司戶怡生潛揚州天長丞質則潛之第五子少負志操以家世官卑思立名於世以大其門寓居壽春躬耕以養母專以講學為事門人受業者大集其門年甫強仕不求聞達親友規之曰以華卿之才取名位如俯拾地芥耳安自苦於闒茸者乎揚名顯親非耕稼可致也質乃白於母請赴鄉舉元和六年登進士甲科釋褐嶺南管記歷佐淮蔡許昌梓潼興元四府纍奏兼監察御史入朝為殿中遷侍御史戶部員外郎為舊府延薦檢校司封郎中賜金紫充興元節度副使入為戶部郎中遷諫議大夫大和中王守澄構陷宰相宋申錫文宗怒欲加極法質與常侍崔玄亮雨泣切諫請付外推申錫方從輕典質為中人側目執政出為虢州刺史質射策時深為李吉甫所器及德裕為相甚禮之事必咨決尋召為給事中河南尹八年為宣州刺史兼御史中丞宣歙團練觀察使在政三年開成元年十二月無疾暴卒時年六十八贈左散騎常侍諡曰定質清廉方雅為政有聲雖權臣待之厚而行己有素不涉朋比之議在宣城辟崔珦劉蕡裴夷直趙為從事皆一代名流視其所與人士重之子曰慶存盧簡辭字子策范陽人後徙家于蒲祖翰父綸天寶末舉進士遇亂不第奉親避地於鄱陽與郡人吉中孚為林泉之友大曆初還京師宰相王縉奏為集賢學士祕書省校書郎王縉兄弟有詩名於世縉既官重凡所延辟皆辭人名士以綸能詩禮待逾厚會縉得罪坐纍久之調陝府戶曹河南密縣令建中初為昭應令朱泚之亂咸寧王渾瑊充京城西面副元帥乃拔綸為元帥判官檢校金部郎中貞元中吉中孚為翰林學士戶部侍郎典邦賦薦綸于朝會丁家艱而中孚卒太府卿韋渠牟得幸於德宗綸即渠牟之甥也數稱綸之才德宗召之內殿令和御製詩超拜戶部郎中方欲委之掌誥居無何卒初大曆中詩人李端錢起韓翃輩能為五言詩而辭情捷麗綸作尤工至貞元末錢李諸公凋落綸嘗為懷舊詩五十韻敘其事曰吾與吉侍郎中孚司空郎中曙苗員外發崔補闕峒耿拾遺湋李校書端風塵追遊向三十載數公皆負當時盛稱榮耀未幾俱沉下泉傷悼之際暢當博士追感前事賦詩五十韻見寄輒有所酬以申悲舊兼寄夏侯審侍御其歷言諸子云侍郎文章宗傑出淮楚靈掌賦若吹籟司言如建瓴郎中善慶餘雅韻與琴清鬱鬱松帶雪蕭蕭鴻入冥員外真貴儒弱冠被華纓月香飄桂實乳溜瀝瓊英補闕思沖融巾拂藝亦精彩蝶戲芳圃瑞雲滋翠屏拾遺興難侔逸調曠無程九醞貯彌潔三花寒轉馨校書才智雄舉世一娉婷賭墅鬼神變屬辭鸞鳳驚差肩曳長裾總轡奉和鈴共賦瑤臺雪同觀金谷笙倚天方比劍沉水忽如瓶君持玉盤珠寫我懷袖盈讀罷涕交頤願言躋百齡綸之才思皆此類也文宗好文尤重綸詩嘗問侍臣曰盧綸集幾卷有子弟否李德裕對曰綸有四男皆登進士第今員外郎簡能侍御史簡辭是也即遣中使詣其家令進文集簡能盡以所集五百篇上獻優詔嘉之簡辭元和六年登第三辟諸侯府長慶末入朝為監察轉侍御史文雅之餘尤精法律歷朝簿籍靡不經懷寶曆中故京兆尹黎幹男煟詣臺治父葉縣舊業臺司莫知本末簡辭曰幹坐魚朝恩黨誅田産籍沒大曆已來多少赦令豈有雪朝恩黎幹節文況其田産分給百姓將及百年而煟恃中助而冒論耶乃移汝州刺史裴通準大曆元年敕給百姓又福建鹽鐵院官盧昂坐贓三十萬簡辭按之於其家得金牀瑟瑟枕大如斗昭愍見之曰此宮中所無而盧昂為吏可知也尋轉考功員外郎轉郎中大和中坐事自太僕卿出為衢州刺史會昌中入為刑部侍郎轉戶部大中初轉兵部侍郎檢校工部尚書許州刺史御史大夫忠武軍節度使遷檢校刑部尚書襄州刺史山南東道節度使卒簡辭兄簡能簡能字子拙登第後再辟藩府入為監察御史大和九年由駕部員外檢校司封郎中充鳳翔節度判官時鄭注得幸李訓與之謀誅宦官俾注鎮鳳翔仍妙選當時才俊以為賓佐簡能與蕭俯弟傑錢起子可復皆為訓所選從注及訓敗注誅簡能蕭傑等四人皆為監軍使所害簡辭弟弘正簡求弘正字子強元和末登進士第纍辟使府掌書記入朝為監察御史侍御史大和中華州刺史宇文鼎戶部員外盧允中坐贓弘正按之文宗怒將殺鼎弘正奏曰鼎歷持綱憲繩糾之官今為近輔刺史以贓污聞死固常典但取受之首罪在允中監司之責鼎當連坐文宗釋之鼎方減等三遷兵部郎中給事中會昌末王師討劉稹時詔河北三帥收山東州郡俄而何弘敬王元逵得邢洺磁三郡宰臣奏議曰山東三郡以賊稹未誅宜且立留後如弘敬元逵有所陳請則朝廷難以依違上曰然誰可任者李德裕曰給事中盧弘正嘗為昭義判官性又通敏推擇攸宜即命為邢洺磁團練觀察留後未行而稹誅乃令弘正銜命宣諭河北三鎮使還拜工部侍郎大中初轉戶部侍郎充鹽鐵轉運使前是安邑解縣兩池鹽法積弊課入不充弘正令判官司空輿至池務檢察特立新法仍奏輿為兩池使三年課入加倍其法至今賴之檢校戶部尚書出為徐州刺史武寧軍節度使徐泗濠觀察等使徐方自智興之後軍士驕怠有銀刀都尤勞姑息前後屢逐主帥弘正在鎮期年皆去其首惡喻之忠義訖於受代軍旅無譁鎮徐四年遷檢校兵部尚書汴州刺史宣武軍節度宋亳潁觀察等使卒于鎮簡求字子臧長慶元年登進士第釋褐江西王仲舒從事又從元稹為浙東江夏二府掌書記裴度鎮襄陽保釐洛都皆辟為賓佐奏殿中侍御史入朝拜監察裴度鎮太原復奏為記室入為殿中賜緋牛僧孺鎮襄漢辟為觀察判官入為水部戶部二員外郎會昌末討劉稹詔以許帥李彥佐為招討使朝廷以簡求纍佐使府達於機略乃以簡求為忠武節度副使知節度事本道供軍使入為吏部員外轉本司郎中求為蘇州刺史時簡辭鎮漢南弘正為侍郎領使務昆仲皆居顯列時人榮之既而宰執不協弘正出鎮罷簡求為左庶子分司數年出為壽州刺史九年党項叛以簡求為四鎮北庭行軍涇州刺史涇原渭武節度押蕃落等使檢校左散騎常侍上柱國范陽縣男食邑三百戶十一年遷檢校工部尚書定州刺史御史大夫義武軍節度北平軍等使十三年檢校刑部尚書鳳翔尹鳳翔隴西節度觀察等使十四年八月代裴休為太原尹北都留守充河東節度觀察等使簡求辭翰縱橫長於應變所歷四鎮皆控邊陲屬雜虜寇邊因之移授所至撫御邊鄙晏然太原軍素管退渾契苾沙陀三部落或撫納不至多為邊患前政或要之詛盟質之子弟然為盜不息簡求開懷撫待接以恩信所質子弟一切遣之故五部之人欣然聽命咸通初以疾辭表章瀝懇制以太子太師致仕還於東都都城有園林別墅歲時行樂子弟侍側公卿在席詩酒賞詠竟日忘歸如是者纍年五年十月卒時年七十六贈尚書左僕射簡能子知猷知猷登進士第釋褐祕書省正字宰臣蕭鄴鎮江陵成都辟為兩府記室入拜左拾遺改右補闕史館修撰轉員外郎出為饒州刺史入拜兵部郎中賜緋魚改吏部郎中太常少卿出為商州刺史徵拜給事中轉中書舍人僖宗幸山南襄王僞署乃避地金州駕還徵拜工部侍郎轉戶部判史館遷尚書右丞兵部侍郎歷太常卿工部戶部尚書復領太常卿昭宗在華下加檢校右僕射守太子少師進位太子太師檢校司空卒於華下知猷器度長厚文辭美麗尤工書落簡措翰人爭模倣子文度位亦至丞郎簡辭無子以簡求子貽殷玄禧入繼貽殷終光祿少卿玄禧登進士第終國子博士弘正子虔灌有俊才進士登第所著文筆為時所稱位終祕書監簡求十子而嗣業汝弼最知名嗣業進士登第纍辟使府廣明初以長安尉直昭文館左拾遺右補闕王鐸徵兵收兩京辟為都統判官檢校禮部郎中卒汝弼登進士第纍遷至祠部員外郎知制誥從昭宗遷洛屬柳璨黨附賊臣誣陷士族汝弼懼移疾退居客遊上黨遇潞府為太原所攻節度使丁會歸降從會至太原李克用奏為節度副使纍奏戶部侍郎太原使府有龍泉亭簡求節制時手書詩一章在亭之西壁汝弼復為亞帥每亭中宴集未嘗居賓位西向俯首而已人士嘉之盧氏兩世貴盛六卿方鎮相繼而未有居輔相者至中興嗣業子文紀仕至尚書中書侍郎平章事史臣曰孟襄陽之清節胡廣州之堅正卒以結權幸而敗積貨賄而亡人如面焉固難知也二崔以綱憲相傾元穎以獻奇取媚雖遭時多僻位至鼎司言之正人亦孔之醜而父事宦者何所逃譏以端綸之才任不踰元士而盧簡辭之昆仲雲摶水擊鬱為鼎門非德積慶鍾安能及此辭人之後不亦休哉贊曰君子喻義小人近利孟譴胡亡家財掃地聲勢相傾崔杜醜名端綸諸子奕葉光榮
