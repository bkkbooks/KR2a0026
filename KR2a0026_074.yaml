body:
  text: 舊唐書卷七十列傳第二十王圭戴胄兄子至德岑文本兄子長倩長倩子羲格輔元附杜正倫王圭字叔玠太原祁人也在魏為烏丸氏曾祖神念自魏奔梁復姓王氏祖僧辨梁太尉尚書令父顗北齊樂陵太守圭幼孤性雅淡少嗜欲志量沈深能安於貧賤體道履正交不苟合季叔頗當時通儒有人倫之鑒嘗謂所親曰門戶所寄唯在此兒耳開皇末為奉禮郎及頗坐漢王諒反事被誅圭當從坐遂亡命於南山積十餘歲高祖入關丞相府司録李綱薦圭貞諒有器識引為世子府咨議參軍及東宮建除太子中舍人尋轉中允甚為太子所禮後以連其陰謀事流于巂州建成誅後太宗素知其才召拜諫議大夫貞觀元年太宗嘗謂侍臣曰正主御邪臣不能致理正臣事邪主亦不能致理唯君臣相遇有同魚水則海內可安也昔漢高祖田舍翁耳提三尺劍定天下既而規模弘遠慶流子孫者此蓋任得賢臣所致也朕雖不明幸諸公數相匡救冀憑嘉謀致天下於太平耳圭對曰臣聞木從繩則正后從諫則聖故古者聖主必有諍臣七人言而不用則相繼以死陛下開聖慮納芻蕘臣處不諱之朝實願罄其狂瞽太宗稱善敕自今後中書門下及三品以上入閣必遣諫官隨之圭每推誠納忠多所獻替太宗顧待益厚賜爵永寧縣男遷黃門侍郎兼太子右庶子二年代高士廉為侍中太宗嘗閒居與圭宴語時有美人侍側本廬江王瑗之姬瑗敗籍沒入宮太宗指示之曰廬江不道賊殺其夫而納其室暴虐之甚何有不亡者乎圭避席曰陛下以廬江取此婦人為是耶為非耶太宗曰殺人而取其妻卿乃問朕是非何也對曰臣聞於管子曰齊桓公之郭問其父老曰郭何故亡父老曰以其善善而惡惡也桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也今此婦人尚在左右竊以聖心為是之陛下若以為非此謂知惡而不去也太宗雖不出此美人而甚重其言時太常少卿祖孝孫以教宮人聲樂不稱旨為太宗所讓圭及溫彥博諫曰孝孫妙解音律非不用心但恐陛下顧問不得其人以惑陛下視聽且孝孫雅士陛下忽為教女樂而怪之臣恐天下怪愕太宗怒曰卿皆我之腹心當進忠獻直何乃附下罔上反為孝孫言也彥博拜謝圭獨不拜曰臣本事前宮罪已當死陛下矜恕性命不以不肖置之樞近責以忠直今臣所言豈是為私不意陛下忽以疑事誚臣是陛下負臣臣不負陛下帝默然而罷翌日帝謂房玄齡曰自古帝王能納諫者固難矣昔周武王尚不用伯夷叔齊宣王賢主杜伯猶以無罪見殺吾夙夜庶幾前聖恨不能仰及古人昨責彥博王圭朕甚悔之公等勿以此而不進直言也時房玄齡李靖溫彥博戴胄魏徵與圭同知國政後嘗侍宴太宗謂圭曰卿識鑒清通尤善談論自房玄齡等咸宜品藻又可自量孰與諸子賢對曰孜孜奉國知無不為臣不如玄齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如溫彥博處繁理劇衆務必舉臣不如戴胄以諫諍為心恥君不及於堯舜臣不如魏徵至如激濁揚清嫉惡好善臣於數子亦有一日之長太宗深然其言羣公亦各以為盡己所懷謂之確論後進爵為郡公七年坐漏泄禁中語左遷同州刺史明年召拜禮部尚書十一年與諸儒正定五禮書成賜帛三百段封一子為縣男是歲兼魏王師既而上問黃門侍郎韋挺曰王圭為魏王泰師與其相見若為禮節挺對曰見師之禮拜答如禮王問圭以忠孝圭答曰陛下王之君也事君思盡忠陛下王之父也事父思盡孝忠孝之道可以立身可以成名當年可以享天祐餘芳可以垂後葉王曰忠孝之道已聞教矣願聞所習圭答曰漢東平王蒼云為善最樂上謂侍臣曰古來帝子生於宮闥及其成人無不驕逸是以傾覆相踵少能自濟我今嚴教子弟欲令皆得安全王圭我久驅使是所諳悉以其意存忠孝選為子師爾宜語泰汝之待圭如事我也可以無過泰每為之先拜圭亦以師道自居物議善之時圭子敬直尚南平公主禮有婦見舅姑之儀自近代公主出降此禮皆廢圭曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就席而坐令公主親執笲行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自圭始也圭少時貧寒人或遺之初不辭謝及貴皆厚報之雖其人已亡必賑贍其妻子事寡嫂盡禮撫孤姪恩義極隆宗姻困匱者亦多所周恤圭通貴漸久而不營私廟四時蒸嘗猶祭於寢坐為法司所劾太宗優容弗之譴也因為立廟以愧其心圭既儉不中禮時論以是少之十三年遇疾敕公主就第省視又遣民部尚書唐儉增損藥膳尋卒年六十九太宗素服舉哀於別次悼惜久之詔魏王泰率百官親往臨哭贈吏部尚書諡曰懿長子崇基襲爵官至主爵郎中少子敬直以尚主拜駙馬都尉坐與太子承乾交結徙于嶺外崇基孫旭開元初為左司郎中兼侍御史時光祿少卿盧崇道犯罪配流嶺南逃歸匿於東都為讎家所發玄宗令旭究其獄旭欲擅其威權因捕繫崇道親黨數十人皆極其楚毒然後結成其罪崇道及其三子並坐死親友皆決杖流貶時得罪多是知名之士四海冤之旭又與御史大夫李傑不協遞相糾訐傑竟坐左遷衢州刺史旭既得志擅行威福由是朝廷畏而鄙之俄以贓罪黜為龍川尉憤恚而死甚為時之所快戴胄字玄胤相州安陽人也性貞正有幹局明習律令尤曉文簿隋大業末為門下録事納言蘇威黃門侍郎裴矩甚禮之越王侗以為給事郎王世充將篡侗位胄言於世充曰君臣之分情均父子理須同其休戚勗以終始明公以文武之才當社稷之寄與存與亡在於今日所願推誠王室擬跡伊周使國有泰山之安家傳代祿之盛則率土之濱莫不幸甚世充詭辭稱善勞而遣之世充後逼越王加其九錫胄又抗言切諫世充不納由是出為鄭州長史令與兄子行本鎮武牢太宗克武牢而得之引為秦府士曹參軍及即位除兵部郎中封武昌縣男貞觀元年遷大理少卿時吏部尚書長孫無忌嘗被召不解佩刀入東上閣尚書右僕射封德彝議以監門校尉不覺罪當死無忌誤帶入罰銅二十斤上從之胄駁曰校尉不覺與無忌帶入同為誤耳臣子之於尊極不得稱誤準律云供御湯藥飲食舟船誤不如法者皆死陛下若録其功非憲司所決若當據法罰銅未為得衷太宗曰法者非朕一人之法乃天下之法也何得以無忌國之親戚便欲阿之更令定議德彝執議如初太宗將從其議胄又曰校尉緣無忌以致罪於法當輕若論其誤則為情一也而生死頓殊敢以固請上嘉之竟免校尉之死于時朝廷盛開選舉或有詐僞資蔭者帝令其自首不首者罪至于死俄有詐僞者事泄胄據法斷流以奏之帝曰朕下敕不首者死今斷從流是示天下以不信卿欲賣獄乎胄曰陛下當即殺之非臣所及既付所司臣不敢虧法帝曰卿自守法而令我失信邪胄曰法者國家所以布大信於天下言者當時喜怒之所發耳陛下發一朝之忿而許殺之既知不可而置之於法此乃忍小忿而存大信也若順忿違信臣竊為陛下惜之帝曰法有所失公能正之朕何憂也胄前後犯顏執法多此類所論刑獄皆事無冤濫隨方指擲言如泉涌其年轉尚書右丞尋遷左丞先是每歲水旱皆以正倉出給無倉之處就食他州百姓多致饑乏二年胄上言水旱凶災前聖之所不免國無九年儲蓄禮經之所明誡今喪亂已後戶口凋殘每歲納租未實倉廩隨即出給才供當年若有凶災將何賑恤故隋開皇立制天下之人節級輸粟名為社倉終文皇代得無饑饉及大業中年國用不足並取社倉之物以充官費故至末塗無以支給今請自王公已下爰及衆庶計所墾田稼穡頃畝每至秋熟準其見苗以理勸課盡令出粟稻麥之鄉亦同此稅各納所在立為義倉太宗從其議以其家貧賚錢十萬時尚書左僕射蕭瑀免官僕射封德彝又卒太宗謂胄曰尚書省天下綱維百司所稟若一事有失天下必有受其弊者今以令僕繫之於卿當稱朕所望也胄性明敏達於從政處斷明速議者以為左右丞稱職武德已來一人而已又領諫議大夫令與魏徵更日供奉三年進拜民部尚書兼檢校太子左庶子先是右僕射杜如晦專掌選舉臨終請以選事委胄由是詔令兼攝吏部尚書其民部庶子諫議並如故胄雖有幹局而無學術居吏部抑文雅而奬法吏甚為時論所譏四年罷吏部尚書以本官參預朝政尋進爵為郡公五年太宗將修復洛陽宮胄上表諫曰陛下當百王之弊屬暴隋之後拯餘燼於塗炭救遺黎於倒懸遠至邇安率土清謐大大德豈臣之所稱贊臣誠小人才識非遠唯知耳目之近不達長久之策敢竭區區之誠論臣職司之事比見關中河外盡置軍團富室強丁並從戎旅重以九成作役餘丁向盡去京二千里內先配司農將作假有遺餘勢何足紀亂離甫爾戶口單弱一人就役舉家便廢入軍者督其戎仗從役者責其糇糧盡室經營多不能濟以臣愚慮恐致怨嗟七月已來霖潦過度河南河北厥田汙下時豐歲稔猶未可量加以軍國所須皆資府庫絹布所出歲過百萬丁既役盡賦調不減費用不止帑藏其虛且洛陽宮殿足蔽風雨數年功畢亦謂非晚若頓修營恐傷勞擾太宗甚嘉之因謂侍臣曰戴胄於我無骨肉之親但以忠直勵行情深體國事有機要無不以聞所進官爵以酬厥誠耳七年卒太宗為之舉哀廢朝三日贈尚書右僕射追封道國公諡曰忠詔虞世南為撰碑文又以胄宅宇弊陋祭享無所令有司特為造廟房玄齡魏徵並美胄才用俱與之親善及胄卒後嘗見其遊處之地數為之流涕胄無子以兄子至德為後至德乾封中纍遷西臺侍郎同東西臺三品尋轉戶部尚書依舊知政事父子十數年間相繼為尚書預知國政時以為榮咸亨中高宗為飛白書以賜侍臣賜至德曰泛洪源俟舟楫賜郝處俊曰飛九霄假六翮賜李敬玄曰資啓沃罄丹誠又賜中書侍郎崔知悌曰竭忠節贊皇猷其辭皆有興比俄遷尚書右僕射時劉仁軌為左僕射每遇申訴冤滯者輒美言許之而至德先據理難詰未嘗與奪若有理者密為奏之終不顯己之斷決由是時譽歸於仁軌或以問至德答曰夫慶賞刑罪人主之權柄凡為人臣豈得與人主爭權柄哉其慎密如此後高宗知而深歎美之儀鳳四年薨輟朝三日使百官以次赴宅哭之贈開府儀同三司並州大都督諡曰恭岑文本字景仁南陽棘陽人祖善方仕蕭察吏部尚書父之象隋末為邯鄲令嘗被人所訟理不得申文本性沈敏有姿儀博考經史多所貫綜美談論善屬文時年十四詣司隸稱冤辭情慨切召對明辨衆頗異之試令作蓮花賦下筆便成屬意甚佳合臺莫不歎賞其父冤雪由是知名其後郡舉秀才以時亂不應蕭銑僭號於荊州召署中書侍郎專典文翰及河間王孝恭定荊州軍中將士咸欲大掠文本進說孝恭曰自隋室無道羣雄鼎沸四海延頸以望真主今蕭氏君臣江陵父老決計歸降者實望去危就安耳王必欲縱兵虜掠誠非鄙州來蘇之意亦恐江嶺以南向化之心沮矣孝恭稱善遂止之署文本荊州別駕孝恭進擊輔公祏召典軍書復署行臺考功郎中貞觀元年除祕書郎兼直中書省遇太宗行藉田之禮文本上藉田頌及元日臨軒宴百僚文本復上三元頌其辭甚美文本才名既著李靖復稱薦之擢拜中書舍人漸蒙親顧初武德中詔誥及軍國大事文皆出於顏師古至是文本所草詔誥或衆務繁湊即命書僮六七人隨口並寫須臾悉成亦殆盡其妙時中書侍郎顏師古以譴免職頃之溫彥博奏曰師古諳練時事長於文法時無及者冀蒙復用太宗曰我自舉一人公勿憂也於是以文本為中書侍郎專典機密又先與令狐德棻撰周史其史論多出於文本至十年史成封江陵縣子十一年從至洛陽宮會穀洛泛溢文本上封事曰臣聞創撥亂之業其功既難守已成之基其道不易故居安思危所以定其業也有始有卒所以隆其基也今雖億兆乂安方隅寧謐既承喪亂之後又接凋弊之餘戶口減損尚多田疇墾闢猶少覆燾之恩著矣而瘡痍未復德教之風被矣而資産屢空是以古人譬之種樹年祀綿遠則枝葉扶疏若種之日淺根本未固雖壅之以黑墳暖之以春日一人搖之必致枯槁今之百姓頗類於此常加含養則日就滋息暫有征役則隨而凋耗凋耗既甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非人孔安國曰人以君為命故可愛君失道人叛之故可畏仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日慎一日者良為此也伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆為念明選舉慎賞罰進賢才退不肖聞過即改從諫如流為善在於不疑出令期於必信頤神養性省畋遊之娛去奢從儉減工役之費務靜方內而不求闢土載櫜弓矢而無忘武備凡此數者雖為國之常道陛下之所常行臣之愚心唯願陛下思之而不倦行之而不怠則至道之美與三五比隆億載之祚隨天地長久雖使桑穀為妖龍蛇作孽雉雊於鼎耳石言於晉地猶當轉禍為福變咎為祥況水雨之患陰陽常理豈可謂之天譴而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而智者擇焉輒陳狂瞽伏待斧鉞是時魏王泰寵冠諸王盛修第宅文本以為侈不可長上疏盛陳節儉之義言泰宜有抑損太宗並嘉之賜帛三百段十七年加銀青光祿大夫文本自以出自書生每懷撝挹平生故人雖微賤必與之抗禮居處卑陋室無茵褥帷帳之飾事母以孝聞撫弟姪恩義甚篤太宗每言其弘厚忠謹吾親之信之是時新立晉王為皇太子名士多兼領宮官太宗欲令文本兼攝文本再拜曰臣以庸才久踰涯分守此一職猶懼滿盈豈宜更忝春坊以速時謗臣請一心以事陛下不願更希東宮恩澤太宗乃止仍令五日一參東宮皇太子執賓友之禮與之答拜其見待如此俄拜中書令歸家有憂色其母怪而問之文本曰非勳非舊濫荷寵榮責重位高所以憂懼親賓有來慶賀輒曰今受弔不受賀也又有勸其營産業者文本歎曰南方一布衣徒步入關疇昔之望不過祕書郎一縣令耳而無汗馬之勞徒以文墨致位中書令斯亦極矣荷俸祿之重為懼已多何得更言産業乎言者歎息而退文本既久在樞揆當塗任事賞錫稠疊凡有財物出入皆委季弟文昭一無所問文昭時任校書郎多與時人遊款太宗聞而不悅嘗從容謂文本曰卿弟過多交結恐纍卿朕將出之為外官如何文本泣曰臣弟少孤老母特所鍾念不欲信宿離于左右若今外出母必憂悴儻無此弟亦無老母也歔欷嗚咽太宗愍其意而止唯召見文昭嚴加誡約亦卒無愆過及將伐遼凡所籌度一皆委之文本受委既深神情頓竭言辭舉措頗異平常太宗見而憂之謂左右曰文本今與我同行恐不與我同返及至幽州遇暴疾太宗親自臨視撫之流涕尋卒年五十一其夕太宗聞嚴鼓之聲曰文本殞逝情深惻怛今宵夜警所不忍聞命停之贈侍中廣州都督諡曰憲賜東園祕器陪葬昭陵有集六十卷行於代文本兄文叔文叔子長倩少為文本所鞠同於己子永淳中纍轉兵部侍郎同中書門下平章事垂拱初自夏官尚書遷內史知夏官事俄拜文昌右相封鄧國公則天初革命尤好符瑞長倩懼罪頗有陳奏又上疏請改皇嗣姓為武氏以為周室儲二則天許之實封五百戶天授二年加特進輔國大將軍其年鳳閣舍人張嘉福與洛州人王慶之等列名上表請立武承嗣為皇太子長倩以皇嗣在東宮不可更立承嗣與地官尚書格輔元竟不署名仍奏請切責上書者由是大忤諸武意乃斥令西征吐蕃充武威道行軍大總管中路召還下制獄被誅仍發掘其父祖墳墓來俊臣又脅迫長倩子靈源令誣納言歐陽通及格輔元等數十人皆陷以同反之罪並誅死長倩子羲長安中為廣武令有能名則天嘗令宰相各舉堪為員外郎者鳳閣侍郎韋嗣立薦羲且奏曰恨其從父長倩犯逆為纍則天曰苟有材幹何恨微纍遂拜天官員外郎由是緣坐近親相次入省登封令劉守悌為司門員外郎渭南令裴惓為地官員外郎先是羲為金壇令守悌及惓稱為清德羲以文吏著名俱為巡察使所薦皆授畿縣令又同為尚書郎悉有美譽守悌後至陝州刺史惓至杭州刺史羲神龍初為中書舍人時武三思用事侍中敬暉欲上表請削諸武之為王者募為疏者衆畏三思皆辭託不敢為之羲便操筆辭甚切直由是忤三思意轉祕書少監再遷吏部侍郎時吏部侍郎崔湜太常少卿鄭愔大理少卿李允恭分掌選事皆以贓貨聞羲最守正時議美之尋加銀青光祿大夫右散騎常侍同中書門下三品睿宗即位出為陝州刺史復歷刑部戶部二尚書門下三品監修國史刪定格令仍修氏族録初中宗時侍御史冉祖雍誣奏睿宗及太平公主與節愍太子連謀請加推究羲與中書侍郎蕭至忠密申保護及羲監修中宗實録自書其事睿宗覽而大加賞歎賜物三百段細馬一匹仍下制書褒美之時羲兄獻為國子司業弟翔為陝州刺史休為商州刺史從族兄弟子姪因羲引用登清要者數十人羲歎曰物極則返可以懼矣然竟不能有所抑退尋遷侍中先天元年坐預太平公主謀逆伏誅籍沒其家格輔元者汴州浚儀人也伯父德仁隋剡縣丞與同郡人齊王文學王孝逸文林郎繁師玄羅川郡戶曹靖君亮司隸從事鄭祖咸宣城縣長鄭師善王世充中書舍人李行簡處士盧協等八人以辭學擅名當時號為陳留八俊輔元弱冠舉明經歷遷御史大夫地官尚書同鳳閣鸞臺平章事初張嘉福等請立武承嗣也則天以問輔元固稱不可遂為承嗣所譖而死海內冤之輔元兄希元高宗時洛州司法參軍章懷太子召令與洗馬劉訥言等注解范曄後漢書行於代先輔元卒杜正倫相州洹水人也隋仁壽中與兄正玄正藏俱以秀才擢第隋代舉秀才止十餘人正倫一家有三秀才甚為當時稱美正倫善屬文深明釋典仕隋為羽騎尉武德中歷遷齊州總管府録事參軍太宗聞其名令直秦府文學館貞觀元年尚書右丞魏徵表薦正倫以為古今難匹遂擢授兵部員外郎太宗謂曰朕今令舉行能之人非朕獨私於行能者以其能益於百姓也朕於宗親以及勳舊無行能者終不任之以卿忠直朕今舉卿卿宜勉稱所舉二年拜給事中兼知起居注太宗嘗謂侍臣曰朕每日坐朝欲出一言即思此言於百姓有利益否所以不能多言正倫進曰君舉必書言存左史臣職當修起居注不敢不盡愚直陛下若一言乖於道理則千載纍於聖德非直當今損於百姓願陛下慎之太宗大悅賜絹二百段四年纍遷中書侍郎六年正倫與御史大夫韋挺祕書少監虞世南著作郎姚思廉等咸上封事稱旨太宗為之設宴因謂曰朕歷觀自古人臣立忠之事若值明王便得盡誠規諫至如龍逢比干竟不免孥戮為君不易為臣極難我又聞龍可擾而馴然喉下有逆鱗觸之則殺人人主亦有逆麟卿等遂不避犯觸各進封事常能如此朕豈慮有危亡哉我思卿等此意豈能暫忘故聊設宴樂也仍並賜帛有差尋加散騎常侍行太子右庶子兼崇賢館學士太宗謂曰國之儲副自古所重必擇善人為之輔佐今太子年在幼沖志意未定朕若朝夕見之可得隨事誡約今既委以監國不在目前知卿志懷貞賣心能敦直道故輒輟卿於朕以匡太子宜知委任輕重也十年復授中書侍郎賜爵南陽縣侯仍兼太子左庶子正倫出入兩宮參典機密甚以幹理稱時太子承乾有足疾不能朝謁好昵近羣小太宗謂正倫曰我兒疾病乃可事也但全無令譽不聞愛賢好善私所引接多是小人卿可察之若教示不得須來告我正倫數諫不納乃以太宗語告之承乾抗表聞奏太宗謂正倫曰何故漏泄我語對曰開導不入故以陛下語嚇之冀其有懼或當反善帝怒出為穀州刺史又左授交州都督後承乾搆逆事與侯君集相連稱遣君集將金帶遺正倫由是配流歡州顯慶元年纍授黃門侍郎兼崇賢館學士尋同中書門下三品二年兼度支尚書仍依舊知政事俄拜中書令兼太子賓客弘文館學士進封襄陽縣公三年坐與中書令李義府不協出為橫州刺史仍削其封邑尋卒有集十卷行於代史臣曰王圭履正不回忠讜無比君臣時命胥會于茲易曰自天祐之吉無不利叔玠有焉戴胄兩朝仕官一乃心力刑無僭濫事有針規雖學術不能求備而匡益自可濟時亦所謂巧於任大矣文本文傾江海忠貫雪霜申慈父之冤匡明主之業及委繁劇俄致暴終書曰小心翼翼昭事上帝所謂憂能傷人不復永年矣洎羲而下登清要者數十人積善之道焉可忽諸正倫以能文被舉以直道見委參典機密出入兩宮斯謂得時然被承乾金帶之譏孰與夫薏苡之謗士大夫慎之贊曰五靈嘉瑞出繫汙隆人中麟鳳王戴諸公動必由禮言皆匡躬獻規納諫貞觀之風
