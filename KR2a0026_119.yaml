body:
  text: 舊唐書卷一百一十五列傳第六十五崔器趙國珍崔瓘敬括韋元甫魏少遊衛伯玉李承崔器深州安平人也曾祖恭禮狀貌豐碩飲酒過斗貞觀中拜駙馬都尉尚神堯館陶公主父肅然平陰丞器有吏才性介而少通舉明經歷官清謹天寶六載為萬年尉踰月拜監察御史中丞宋渾為東畿採訪使引器為判官渾坐贓流貶嶺南器亦隨貶十三年量移京兆府司録轉都官員外郎出為奉先令逆胡陷西京器沒於賊仍守奉先居無何屬賊黨同羅叛賊長安守將安守忠張通儒並亡匿又渭上義兵起一朝聚徒數萬器懼所受賊文牒符敕一時焚之榜召義師欲應渭上軍及渭上軍破賊將崔乾祐先鎮蒲同使麾下騎三十人捉器器遂北走靈武器素與呂諲善諲引為御史中丞兼戶部侍郎從肅宗至鳳翔加禮儀使克復二京為三司使器草儀注駕入城令陷賊官立於含元殿前露頭跣足撫膺頓首請罪以刀杖環衛令扈從羣官宰臣已下視之及收東京令陳希烈已下數百人如西京之儀器性陰刻樂禍殘忍寡恩希旨奏陷賊官準律並合處死肅宗將從其議三司使梁國公李峴執奏固言不可乃六等定罪多所原宥唯陳希烈達奚珣斬於獨柳樹下後蕭華自相州賊中仕賊官歸闕奏云賊中仕官等重為安慶緒所驅脅至相州初聞廣平王奉宣恩命釋放陳希烈已下皆相顧曰我等國家見待如此悔恨何及及聞崔器議刑太重衆心復搖肅宗曰朕幾為崔器所誤呂諲驟薦器為吏部侍郎御史大夫上元元年七月器病腳腫月餘疾亟瞑目則見達奚珣叩頭曰大尹不自由左右問之器答曰達奚大尹嘗訴冤於我我不之許如是三日而器卒趙國珍柯之苗裔也天寶中以軍功纍遷黔府都督兼本管經略等使時南蠻閣羅鳳叛宰臣楊國忠兼劍南節度遙制其務屢喪師徒中書舍人張漸薦國珍有武略習知南方地形國忠遂奏用之在五溪凡十餘年中原興師唯黔中封境無虞代宗踐祚特嘉之召拜工部尚書大曆三年九月以疾終贈太子太傅崔瓘博陵人也以士行聞蒞職清謹纍遷至澧州刺史下車削去煩苛以安人為務居二年風化大行流亡襁負而至增戶數萬有司以聞優詔特加五階至銀青光祿大夫以甄能政遷潭州刺史兼御史中丞充湖南都團練觀察處置使瓘到官政在簡肅恭守禮法將吏自經時艱久不奉法多不便之大曆五年四月會月給糧儲兵馬使臧玠與判官達奚覯忿爭覯曰今幸無事玠曰有事何逃厲色而去是夜玠遂搆亂犯州城以殺達奚覯為名瓘惶遽走逢玠兵至遂遇害代宗聞其事悼惜久之敬括河東人也少以文詞稱鄉舉進士又應制登科再遷右拾遺內供奉殿中侍御史天寶末宰臣楊國忠出不附己者括以例為果州刺史纍遷給事中兵部侍郎大理卿性深厚志尚簡淡在職不務求名因循而已大曆初叛臣周智光伏誅詔選循良為近輔以括為同州刺史歲餘入為御史大夫遲重推誠於下未嘗以私害公士頗稱焉而從容養望不舉綱紀士亦以此少之大曆六年三月卒韋元甫少修謹敏於學行初任滑州白馬尉以吏術知名本道採訪使韋涉深器之奏充支使與同幕判官員錫齊名元甫精於簡牘錫詳於訊覆涉推誠待之時謂員推韋狀元甫有器局所蒞有聲纍遷蘇州刺史浙江西道都團練觀察等使大曆初宰臣杜鴻漸首薦之徵為尚書右丞會淮南節度使缺鴻漸又薦堪當重寄遂授揚州長史兼御史大夫淮南節度觀察等使在揚州三年政尚不擾事亦粗理大曆六年八月以疾卒於位魏少遊巨鹿人也早以吏幹知名歷職至朔方水陸轉運副使肅宗幸靈武杜鴻漸等奉迎留少遊知留後備宮室掃除之事少遊以肅宗遠離宮闕初至邊藩故豐供具以悅之將至靈武少遊整騎卒千餘干戈耀日於靈武南界鳴沙縣奉迎備威儀振旅而入肅宗至靈武殿宇御幄皆象宮闈諸王公主各設本院飲食進御窮其水陸肅宗曰我至此本欲成大事安用此為命有司稍去之纍遷衛尉卿乾元二年十月議率朝臣馬以助軍少遊與漢中郡王瑀沮其議上知之貶渠州長史後為京兆尹請中書門下及兩省五品已上尚書省四品已上諸司正員三品已上諸王駙馬中期周已上親及女壻外甥不得任京兆府判官畿令赤縣丞簿尉敕從之遷刑部侍郎大曆二年四月出為洪州刺史兼御史大夫充江南西道都團練觀察等使四年六月封趙國公賈明觀者本萬年縣捕賊小胥事劉希暹恃魚朝恩之勢恣行凶忍毒甚豺虺朝恩希暹既誅元載當權納明觀姦謀容之特令江西效力明觀未出城百姓萬衆聚於城外皆懷磚石候之期投擊以快意載聞之特令所由吏擁百姓入城內由是獲免在洪州二年少遊為觀察使承元載意苟容之及路嗣恭代少遊到州即日杖殺識者以是減魏之名多路之政大曆六年三月己未卒於官贈太師少遊居職緣飾成務有規檢善任人果於集事前後四領京尹雖無赫赫之名而齪齪廉謹有足稱者衛伯玉有膂力幼習藝天寶中杖劍之安西以邊功纍遷至員外諸衛將軍肅宗即位興師靖難伯玉激憤思立功名自安西歸長安初為神策軍兵馬使出鎮乾元二年十月逆賊史思明遣偽將李歸仁鐵騎三千來犯伯玉以數百騎於疆子坂擊破之積尸滿野虜馬六百匹歸仁與其黨東走以功遷右羽林軍大將軍知軍事轉四鎮北庭行營節度使獻俘百餘人至闕下詔解縛而赦之遷伯玉神策軍節度上元二年二月史思明領衆西下圖長安史朝義率其黨夜襲陝州伯玉以兵逆擊大破賊於永寧賊退進位特進封河東郡公廣德元年冬吐蕃寇京師乘輿幸陝以伯玉有幹略可當重寄乃拜江陵尹兼御史大夫充荊南節度觀察等使尋加檢校工部尚書封城陽郡王大曆初丁母憂朝廷以王昂代其任伯玉潛諷將吏不受詔遂起復以本官為荊南節度等使時議醜之大曆十一年二月入覲以疾卒於京師李承趙郡高邑人吏部侍郎至遠之孫國子司業畬之第二子也承幼孤兄曄鞠養之既長事兄以孝聞舉明經高第纍至大理評事充河南採訪使郭納判官尹子奇圍汴州陷賊拘承送洛陽承在賊庭密疏姦謀多獲聞達兩京克復例貶撫州臨川尉數月除德清令旬日拜監察御史淮南節度使崔圓請留充判官纍遷檢校刑部員外郎兼侍御史圓卒歷撫州江州二刺史課績連最遷檢校考功郎中兼江州刺史徵拜吏部郎中尋為淮南西道黜陟使奏於楚州置常豐堰以禦海潮屯田瘠鹵歲收十倍至今受其利時梁崇義縱恣倨慢朝廷將加討伐李希烈揣知之上表數崇義過惡請率先誅討上悅之每對朝臣多稱希烈忠誠承自黜陟回因奏之曰希烈將兵討伐必有微勳但恐立功之後縱恣跋扈不稟朝憲必勞王師問罪上初未之信無幾希烈既平崇義果有不順之迹上思承言故驟加擢用建中二年七月拜同州刺史河中尹晉絳都防禦觀察使九月轉襄州刺史山南東道節度觀察鹽鐵等使希烈既破崇義擁兵襄州遂有其地朝廷慮不受命欲以禁兵送承承請單騎徑行既至希烈處承於外館迫脅萬態承恬然自安誓死王事希烈不能屈遂剽虜闔境所有而去襄漢為之空承治之一年頗得完復初希烈雖歸蔡州留將校等於襄州守當時所掠得財帛什物等後使襄漢往來不絶承亦使腹心臧叔雅往來許蔡厚結希烈腹心周曾王玢姚憺等及曾等謀殺希烈以衆歸朝多承首建謀也纍賜密詔褒美之承尋改檢校工部尚書兼潭州刺史湖南都團練觀察使建中四年七月卒於位年六十二贈吏部尚書承少有雅望至其從官頗以貞廉才術見稱於時史臣曰自古酷吏濫刑幸免者多矣苟無強魂為祟沮議者惑焉器深文樂禍居官令終非達奚訴冤無以顯其陰責矣國珍守黔溪瓘修禮法括推誠馭下元甫為政寬簡少遊規檢集事皆可稱者伯玉破敵立功足為猛士丁憂冒寵終是武夫承忠賣心謀議勤勞盡瘁方之者鮮矣贊曰崔器深文達奚作祟七子伊何李承為最
