body:
  text: 舊唐書卷一百一十八列傳第六十八元載王昂李少良郇謨附王縉楊炎黎幹劉忠翼附庾準元載鳳翔岐山人也家本寒微父景升任員外官不理産業常居岐州載母攜載適景升冒姓元氏載自幼嗜學好屬文性敏惠博覽子史尤學道書家貧徒步隨鄉賦纍上不升第天寶初玄宗崇奉道教下詔求明莊老文列四子之學者載策入高科授邠州新平尉監察御史韋鎰充使監選黔中引載為判官載名稍著遷大理評事東都留守苗晉卿又引為判官遷大理司直肅宗即位急於軍務諸道廉使隨才擢用時載避地江左蘇州刺史江東採訪使李希言表載為副拜祠部員外郎遷洪州刺史兩京平入為度支郎中載智性敏悟善奏對肅宗嘉之委以國計俾充使江淮都領漕挽之任尋加御史中丞數月徵入遷戶部侍郎度支使并諸道轉運使既至朝廷會肅宗寢疾載與幸臣李輔國善輔國妻元氏載之諸宗因是相昵狎時輔國權傾海內舉無違者會選京尹輔國乃以載兼京兆尹載意屬國柄詣輔國懇辭京尹輔國識其意然之翌日拜載同中書門下平章事度支轉運使如故旬日肅宗晏駕代宗即位輔國勢愈重稱載於上前載能伺上意頗承恩遇遷中書侍郎同中書門下平章事加集賢殿大學士修國史又加銀青光祿大夫封許昌縣子載以度支轉運使職務繁碎負荷且重慮傷名阻大位素與劉晏相友善乃悉以錢穀之務委之薦晏自代載自加營田使李輔國罷職又加判天下元帥行軍司馬廣德元年與宰臣劉晏裴遵慶同扈從至陝及輿駕還宮遵慶皆罷所任載恩寵彌盛輔國死載復結內侍董秀多與之金帛委主書卓英倩潛通密旨以是上有所屬載必先知之承意探微言必玄合上益信任之妻王氏狠戾自專載出朝謁縱子伯和等遊于外上封人顧繇奏之上方任載以政反罪繇而已內侍魚朝恩負恃權寵不與載協載常憚之大曆四年冬乘間密奏朝恩專權不軌請除之朝恩驕橫天下咸怒上亦知之及聞載奏適會於心載遂結北軍大將同謀以防萬慮五年三月朝恩伏法度支使第五琦以朝恩黨坐纍載兼判度支志氣自若謂己有除惡之功是非前賢以為文武才略莫己之若外委胥吏內聽婦言城中開南北二甲第室宇宏麗冠絶當時又於近郊起亭榭所至之處帷帳什器皆於宿設儲不改供城南膏腴別墅連疆接畛凡數十所婢僕曳羅綺一百餘人恣為不法侈僭無度江淮方面京輦要司皆排去忠良引用貪猥士有求進者不結子弟則謁主書貨賄公行近年以來未有其比與王縉同列縉方務聚財遂睦於載二人相得甚歡日益縱橫代宗盡察其迹以載任寄多年欲全君臣之分載嘗獨見上誡之不悛初扈駕自陝還與縉上表請以河中府為中都秋杪行幸春首還京以避蕃戎侵軼之患帝初納之遣條奏以聞自魚朝恩就誅志頗盈滿遂抗表請建中都文多不載大略以關輔河東等十州戶稅入奉京師創置精兵五萬管在中都以威四方辭多開闔自以為表入事行潛遣所由吏於河中經營節度寄理於涇州大曆八年蕃戎入邠寧之後朝議以為三輔已西無襟帶之固而涇州散地不足為守載嘗為西州刺史知河西隴右之要害指畫於上前曰今國家西境極于潘源吐蕃防戍在摧沙堡而原州界其間原州當西塞之口接隴山之固草肥水甘舊壘存焉吐蕃比毀其垣墉棄之不居其西則監牧故地皆有長濠巨塹重復深固原州雖早霜黍稷不藝而有平涼附其東獨耕一縣可以足食請移京西軍戍原州乘間築之貯粟一年戎人夏牧多在青海羽書覆至已逾月矣今運築並作不二旬可畢移子儀大軍居涇以為根本分兵守石門木峽隴山之關北抵于河皆連山峻嶺寇不可越稍置鳴沙縣豐安軍為之羽翼北帶靈武五城為之形勢然後舉隴右之地以至安西是謂斷西戎之脛朝廷可高枕矣兼圖其地形以獻載密使人踰隴山入原州量井泉計徒庸車乘畚鍤之器皆具檢校左僕射田神功沮之曰夫興師料敵老將所難陛下信一書生言舉國從之聽誤矣上遲疑不決會載得罪乃止初六年載條奏應緣別敕授文武六品以下敕出後望令吏部兵部便附甲團奏不得檢勘從之時功狀奏擬結銜多謬載欲權歸於己慮有司駁正會有上封人李少良密以載醜迹聞載知之奏於上前少良等數人悉斃於公府由是道路以目不敢議載之短門庭之內非其黨與不接平素交友涉於道義者悉疏棄之代宗寬仁明恕審其所由凡纍年載長惡不悛衆怒上聞大曆十二年三月庚辰仗下後上御延英殿命左金吾大將軍吳湊收載縉于政事堂各留繫本所并中書主事卓英倩李待榮及載男仲武季能並收禁命吏部尚書劉晏訊鞫晏以載受任樹黨布于天下不敢專斷請他官共事敕御史大夫李涵右散騎常侍蕭昕兵部侍郎袁禮部侍郎常衮諫議大夫杜亞同推究其狀辨罪問端皆出自禁中仍遣中使詰以陰事載縉皆伏罪是日宦官左衛將軍知內侍省事董秀與載同惡先載於禁中杖殺中敕曰任直去邪懸於帝典奬善懲惡急於時政和鼎之寄匪易其人中書侍郎同中書門下平章事元載性頗姦回迹非正直寵待踰分早踐鈞衡亮弼之功未能經邦成務挾邪之志常以罔上面欺陰託妖巫夜行解禱用圖非望庶逭典章納受贓私貿鬻官秩凶妻忍害暴子侵牟曾不隄防恣其凌虐行僻辭矯心狠貌恭使沈抑之流無因自達賞罰差謬罔不由茲頃以君臣之間重於去就冀其遷善掩而不言曾無悔非彌益凶戾年序滋遠釁惡貫盈將肅政於朝班俾申明於憲網宜賜自盡朕涉道猶淺知人不明理績未彰遺闕斯衆致茲刑辟憫愧良深僶俯行之務申沮勸凡在中外悉朕懷焉又制曰門下侍郎同中書門下平章事王縉附會姦邪阿諛讒佞據茲犯狀罪至難容矜以耋及未忍加刑俾申屈法之恩貸以嶽牧之秩可使持節括州諸軍事守括州刺史宜即赴任於戲朕恭己南面推誠股肱敷求哲人將弼豫理昧於任使過在朕躬無曠厥官各慎厥職初晏等承旨縉亦處極法晏謂涵曰重刑再覆國之常典況誅大臣豈得不覆奏又法有首從二人同刑亦宜重取進止涵等咸聽命及晏等覆奏上乃減縉罪從輕載長子伯和先是貶在揚州兵曹參軍載得罪命中使馳傳於揚州賜死次子仲武祠部員外郎次子季能祕書省校書郎并載妻王氏並賜死女資敬寺尼真一收入掖庭王氏開元中河西節度使忠嗣之女也素以凶戾聞恣其子伯和等為虐伯和恃父威勢唯以聚斂財貨徵求音樂為事載在相位多年權傾四海外方珍異皆集其門資貨不可勝計故伯和仲武等得肆其志輕浮之士奔其門者如恐不及名姝異樂禁中無者有之兄弟各貯妓妾于室倡優偎褻之戲天倫同觀略無愧恥及得罪行路無嗟惜者中使董秀主書卓英倩李待榮及陰陽人李季連以載之故皆處極法遣中官於萬年縣界黃臺鄉毀載祖及父母墳墓棺棄柩及私廟木主并載大寧里安仁里二宅充修百司廨宇以載籍沒鍾乳五百兩分賜中書門下御史臺五品已上尚書省四品已上王昂者出自戎旅以軍功纍遷河中尹充河中節度使貪縱不法務於聚斂以貨藩身永泰元年正月檢校刑部尚書知省事改殿中少監元載秉政與載深相結託大曆五年六月為江陵尹兼御史大夫充荊南節度觀察使代衛伯玉昂既行伯玉諷大將楊等拒昂乞留伯玉詔許之昂復檢校刑部尚書知省事專事奢靡廣修第宅多畜妓妾以逞其志在刑部雖公務有程昂耽徇私宴連日不視曹事性貪吝無愧苟得乃鬻公廨園菜收其錢以潤屋甚為時論所醜元載誅貶連州刺史遣中使監至萬州過硤江墜江而卒李少良者以吏用早從使幕因職遷殿中侍御史罷遊京師干謁權貴時元載專政所居第宅崇侈子弟縱橫貨賄公行士庶咸嫉之少良怨不見用乘衆怒以抗疏上聞留少良於禁內客省少良友人韋頌因至禁門訪少良少良漏其言頌不慎密遂為載備知之乃奏少良狂妄詔下御史臺訊鞫是時御史大夫缺載以張延賞為之屬意焉少良以泄禁中奏議制使陸珽同伏罪初韋頌及珽俱與少良友善與載子弟親黨款狎頌得少良微旨漏於載所親遂達於載載密召珽問之珽具白其狀及禁中語載得之奏于上前上大怒並付京兆府決殺珽國子司業善經之子也少傳父業頗通經史性浮躁而疏故及于纍大曆中元載弄權自恣人皆惡之八年七月晉州男子郇謨以麻辮髮持竹筐及葦席哭於東市人問其故對曰有三十字請獻於上若無堪便以竹筐貯尸棄之于野京兆府以聞上即召見賜衣館於禁內客省其獻三十字各論一事其要者團字監字團者請罷諸州團練使監者請罷諸道監軍使殿中御史楊護職居左巡郇謨哭市護不聞奏上以為蔽匿貶連州桂陽縣丞員外置元載當承寵得志每改張朝政出於載手中外共怒當時歸咎於載故少良封事於前郇謨哭市於後凡百有位宜為明誡王縉字夏卿河中人也少好學與兄維早以文翰著名縉連應草澤及文辭清麗舉纍授侍御史武部員外祿山之亂選為太原少尹與李光弼同守太原功效謀略衆所推先加憲部侍郎兼本官時兄維陷賊受偽署賊平維付吏議縉請以己官贖維之罪特為減等縉尋入拜國子祭酒改鳳翔尹秦隴州防禦使歷工部侍郎左散騎常侍撰玄宗哀册文時稱為工改兵部侍郎屬平殄史朝義河朔未安詔縉以本官河北宣慰奉使稱旨廣德二年拜黃門侍郎同平章事太微宮使弘文崇賢館大學士其年河南副元帥李光弼薨於徐州以縉為侍中持節都統河南淮西山南東道諸節度行營事縉懇讓侍中從之加上柱國兼東都留守歲餘遷河南副元帥請減軍資錢四十萬貫修東都殿宇大曆三年幽州節度使李懷仙死以縉領幽州盧龍節度縉赴鎮而還委政於燕將朱希彩又屬河東節度辛雲京卒遂兼太原尹北都留守河東節度營田觀察等使縉又讓河南副元帥東都留守從之太原舊將王無縱張奉璋等恃功且以縉儒者易之每事多違約束縉一朝悉召斬之將校股栗二歲罷河東歸朝授門下侍郎中書門下平章事時元載用事縉卑附之不敢與忤然恃才與老多所傲忽載所不悅心雖希載旨然以言辭凌詬無所忌憚時京兆尹黎幹者戎州人也數論事載甚病之而力不能去也幹嘗白事於縉縉曰尹南方君子也安知朝禮其慢而侮人率如此類縉弟兄奉佛不茹葷血縉晚年尤甚與杜鴻漸捨財造寺無限極妻李氏卒捨道政里第為寺為之追福奏其額曰寶應度僧三十人住持每節度觀察使入朝必延至寶應寺諷令施財助己修繕初代宗喜祠祀未甚重佛而元載杜鴻漸與縉喜飯僧徒代宗嘗問以福業報應事載等因而啓奏代宗由是奉之過當嘗令僧百餘人於宮中陳設佛像經行念誦謂之內道場其飲膳之厚窮極珍異出入乘廄馬度支具廩給每西蕃入寇必令羣僧講誦仁王經以攘虜寇苟幸其退則橫加錫賜胡僧不空官至卿監封國公通籍禁中勢移公卿爭權擅威日相凌奪凡京畿之豐田美利多歸於寺觀吏不能制僧之徒侶雖有贓姦畜亂敗戮相繼而代宗信心不易乃詔天下官吏不得箠曳僧尼又見縉等施財立寺窮極瓌麗每對揚啓沃必以業果為證以為國家慶祚靈長皆福報所資業力已定雖小有患難不足道也故祿山思明毒亂方熾而皆有子禍僕固懷恩將亂而死西戎犯闕未擊而退此皆非人事之明徵也帝信之愈甚公卿大臣既挂以業報則人事棄而不修故大曆刑政日以陵遲有由然也五臺山有金閣寺鑄銅為瓦塗金於上照耀山谷計錢巨億萬縉為宰相給中書符牒令臺山僧數十人分行郡縣聚徒講説以求貨利代宗七月望日於內道場造盂蘭盆飾以金翠所費百萬又設高祖已下七聖神座備幡節龍傘衣裳之制各書尊號于幡上以識之舁出內陳於寺觀是日排儀仗百僚序立於光順門以俟之幡花鼓舞迎呼道路歲以為常而識者嗤其不典其傷教之源始於縉也李氏初為左丞韋濟妻濟卒奔縉縉嬖之冒稱為妻實妾也又縱弟妹女尼等廣納財賄貪猥之迹如市賈焉元載得罪縉連坐貶括州刺史移處州刺史大曆十四年除太子賓客留司東都建中二年十二月卒年八十二楊炎字公南鳳翔人曾祖大寶武德初為龍門令劉武周陷晉絳攻之不降城破被害褒贈全節侯祖哲以孝行有異旌其門閭父播登進士第隱居不仕玄宗徵為諫議大夫棄官就養亦以孝行禎祥表其門閭肅宗就加散騎常侍賜號玄靖先生名在逸人傳炎美鬚眉風骨峻峙文藻雄麗汧隴之間號為小楊山人釋褐辟河西節度掌書記神烏令李大簡嘗因醉辱炎至是與炎同幕率左右反接之鐵棒撾之二百流血被地幾死節度使呂崇賁愛其才不之責後副元帥李光弼奏為判官不應徵拜起居舍人辭祿就養岐下丁憂廬於墓前號泣不絶聲有紫芝白雀之祥又表其門閭孝著三代門樹六闕古未有也服闋久之起為司勳員外郎改兵部轉禮部郎中知制誥遷中書舍人與常衮並掌綸誥衮長於除書炎善為德音自開元已來言詔制之美者時稱常楊焉炎樂賢下士以汲引為己任人士歸之嘗為李楷洛碑辭甚工文士莫不成誦之遷吏部侍郎修國史元載自作相常選擢朝士有文學才望者一人厚遇之將以代己初引禮部郎中劉單單卒引吏部侍郎薛雍雍貶又引炎載親重炎無與為比載敗坐貶道州司馬德宗即位議用宰相崔祐甫薦炎有文學器用上亦自聞其名拜銀青光祿大夫門下侍郎同平章事炎有風儀博以文學早負時稱天下翕然望為賢相初國家舊制天下財賦皆納於左藏庫而太府四時以數聞尚書比部覆其出入上下相轄無失遺及第五琦為度支鹽鐵使京師多豪將求取無節琦不能禁乃悉以租賦進入大盈內庫以中人主之意天子以取給為便故不復出是以天下公賦為人君私藏有司不得窺其多少國用不能計其贏縮殆二十年矣中官以冗名持簿書領其事者三百人皆奉給其間連結根固不可動及炎作相頓首於上前論之曰夫財賦邦國之大本生人之喉命天下理亂輕重皆由焉是以前代歷選重臣主之猶懼不集往往覆敗大計一失則天下動搖先朝權制中人領其職以五尺宦豎操邦之本豐儉盈虛雖大臣不得知則無以計天下利害臣愚待罪宰輔陛下至德惟人是恤參校𢀿弊無斯之甚請出之以歸有司度宮中經費一歲幾何量數奉入不敢虧用如此然後可以議政惟陛下察焉詔曰凡財賦皆歸左藏庫一用舊式每歲於數中量進三五十萬入大盈而度支先以其全數聞炎以片言移人主意議者以為難中外稱之初定令式國家有租賦庸調之法開元中玄宗修道德以寬仁為理本故不為版籍之書人戶寖溢隄防不禁丁口轉死非舊名矣田畝移換非舊額矣貧富升降非舊第矣戶部徒以空文總其故書蓋得非當時之實舊制人丁戍邊者蠲其租庸六歲免歸玄宗方事夷狄戍者多死不返邊將怙寵而諱不以死申故其貫籍之名不除至天寶中王鉷為戶口使方務聚斂以丁籍且存則丁身焉往是隱課而不出耳遂案舊籍計除六年之外積徵其家三十年租庸天下之人苦而無告則租庸之法弊久矣逮至德之後天下兵起始以兵役因之飢癘徵求運輸百役並作人戶凋耗版圖空虛軍國之用仰給於度支轉運二使四方征鎮又自給於節度都團練使賦斂之司數四而莫相統攝於是綱目大壞朝廷不能覆諸使諸使不能覆諸州四方貢獻悉入內庫權臣猾吏因緣為姦或公託進獻私為贓盜者動萬萬計河南山東荊襄劍南有重兵處皆厚自奉養王賦所入無幾吏職之名隨人署置俸給厚薄由其增損故科斂之名凡數百廢者不削重者不去新舊仍積不知其涯百姓受命而供之瀝膏血鬻親愛旬輸月送無休息吏因其苛蠶食于人凡富人多丁者率為官為僧以色役免貧人無所入則丁存故課免於上而賦增於下是以天下殘瘁蕩為浮人鄉居地著者百不四五如是者殆三十年炎因奏對懇言其弊乃請作兩稅法以一其名曰凡百役之費一錢之斂先度其數而賦於人量出以制入戶無主客以見居為簿人無丁中以貧富為差不居處而行商者在所郡縣稅三十之一度所與居者均使無僥利居人之稅秋夏兩徵之俗有不便者正之其租庸雜徭悉省而丁額不廢申報出入如舊式其田畝之稅率以大曆十四年墾田之數為準而均徵之夏稅無過六月秋稅無過十一月逾歲之後有戶增而稅減輕及人散而失均者進退長吏而以尚書度支總統焉德宗善而行之詔諭中外而掌賦者沮其非利言租庸之令四百餘年舊制不可輕改上行之不疑天下便之人不土斷而地著賦不加斂而增入版籍不造而得其虛實貪吏不誡而姦無所取自是輕重之權始歸於朝廷炎救時之弊頗有嘉聲蒞事數月屬崔祐甫疾病多不視事喬琳罷免炎遂獨當國政祐甫之所制作炎隳之初減薄護作元陵功優人心始不悅又專意報恩復讎道州録事參軍王沼有微恩於炎舉沼為監察御史感元載恩專務行載舊事以報之初載得罪左僕射劉晏訊劾之元載誅炎亦坐貶故深怨晏晏領東都河南江淮山南東道轉運租庸青苗鹽鐵使炎作相數月欲貶晏先罷其使天下錢穀皆歸金部倉部又獻議開豐州陵陽渠發京畿人夫於西城就役閭里騷擾事竟無成初大曆末元載議請城原州以遏西番入寇之衝要事未行而載誅及炎得政建中二年二月奏請城原州先牒涇原節度使段秀實令為之具秀實報曰凡安邊卻敵之長策宜緩以計圖之無宜草草興功也又春事方作請待農隙而緝其事炎怒徵秀實為司農卿以邠寧別駕李懷光居前督作以檢校司空平章事朱泚御史大夫平章事崔寧各統兵萬人以翼後三月詔下涇州為具涇軍怒而言曰吾曹為國西門之屏十餘年矣始治于邠才置農桑地著之安而徙于此置榛莽之中手披足踐才立城壘又投之塞外吾何罪而置此乎李懷光監朔方軍法令嚴峻頻殺大將涇州裨將劉文喜因人怨怒拒不受詔上疏復求段秀實為帥否則朱泚於是以朱泚代懷光文喜又不奉詔涇有徑兵二萬閉城拒守令其子入質吐蕃以求援時方炎旱人情騷動羣臣皆請赦文喜上皆不省德宗減服御以給軍人城中軍士當受春服賜與如故命朱泚李懷光等軍攻之乃築壘環之涇州別將劉海賓斬文喜首傳之闕下苟非海賓效順必生邊患皆因炎以喜怒易帥涇帥結怨故也原州竟不能城炎既構劉晏之罪貶官司農卿庾準與晏有隙乃用準為荊南節度使諷令誣晏以忠州叛殺之妻子徙嶺表朝野為之側目李正己上表請殺晏之罪指斥朝廷炎懼乃遣腹心分往諸道裴冀東都河陽魏博孫成澤潞磁邢幽州盧東美河南淄青李舟山南湖南王定淮西聲言宣慰而意實説謗且言晏之得罪以昔年附會姦邪謀立獨孤妃為皇后上自惡之非他過也或有密奏炎遣五使往諸鎮者恐天下以殺劉晏之罪歸己推過於上耳乃使中人復炎辭於正己還報信然自此德宗有意誅炎矣待事而發乃擢用盧嵵為門下侍郎平章事炎轉中書侍郎仍平章事二人同事秉政嵵無文學儀貌寢陋炎惡而忽之每託疾息於他閣多不會食嵵亦銜恨之舊制中書舍人分押尚書六曹以平奏報開元初廢其職嵵請復之炎固以為不可嵵益怒又密啓中書主書過逐之炎怒曰主書吾局吏也有過吾自治之奈何而相侵屬梁崇義叛換德宗欲以淮西節度使李希烈統諸軍討之炎諫曰希烈始與李忠臣為子親任無雙竟逐忠臣而取其位背本若此豈可信也居常無尺寸功猶強不奉法異日平賊後恃功邀上陛下何以馭之初炎之南來途經襄漢固勸崇義入朝崇義不能從已懷反側尋又使其黨李舟使馳説崇義固而拒命遂圖叛逆皆炎迫而成之至是德宗欲假希烈兵勢以討崇義然後別圖希烈炎又固言不可上不能平乃曰朕業許之矣不能食言遂以希烈統諸軍會德宗嘗訪宰相羣臣中可以大任者盧嵵薦張鎰嚴郢而炎舉崔昭趙惠伯上以炎論議疏闊遂罷炎相為左僕射後數日中謝對於延英及出馳歸不至中書盧嵵自是益怒焉嵵尋引嚴郢為御史大夫初郢為京兆尹不附炎炎怒之諷御史張著彈郢郢罷兼御史中丞炎又夙聞源休與郢有隙乃拔休自流人為京兆尹令伺郢過休蒞官後與郢友善炎大怒張光晟方謀議殺回紇酋帥炎乃以休為入回紇使休幾為虜所殺郢尋坐以度田不實改為大理卿時人惜之至是嵵因羣情所欲又知郢與炎有隙故引薦之炎子弘業不肖多犯禁受賂請託郢按之兼得其他過初炎將立家廟先有私第在東都令河南尹趙惠伯貨之惠伯為炎市為官廨時惠伯自河中尹都團練觀察等使初受代郢奏追捕惠伯詰案御史以炎為宰相抑吏貨市私第貴估其宅賤入其幣計以為贓嵵召大理正田晉評罪晉曰宰臣於庶官比之監臨官市賈有羡利計其利以乞取論罪當奪官嵵怒謫晉衡州司馬更召他吏繩之曰監主自盜罪絞開元中蕭嵩將於曲江南立私廟尋以玄宗臨幸之所恐置廟非便乃罷之至是炎以其地為廟有飛語者云此地有王氣炎故取之必有異圖語聞上愈怒及臺司上具獄詔三司使同覆之建中二年十月詔曰尚書左僕射楊炎託以文藝纍登清貫雖謫居荒服而虛稱猶存朕初臨萬邦思弘大化務擢非次招納時髦拔自郡佐登于鼎司獨委心膂信任無疑而乃不思竭誠敢為姦進邪醜正既偽且堅黨援因依動涉情故隳法敗度罔上行私苟利其身不顧於國加以內無訓誡外有交通縱恣詐欺以成贓賄詢其事迹本末乖謬蔑恩棄德負我何深考狀議刑罪在難宥但以朕於將相義切始終顧全大體特有弘貸俾從遠謫以肅具僚可崖州司馬同正仍馳驛發遣去崖州百里賜死年五十五炎早有文章亦勵志節及為中書舍人附會元載時議已薄之後坐載貶官憤恚益甚歸而得政睚眥必讎險害之性附於心唯其愛憎不顧公道以至於敗惠伯亦坐炎貶費州多田尉尋亦殺之黎幹者戎州人始以善星緯數術進待詔翰林纍官至諫議大夫尋遷京兆尹以嚴肅為理人頗便之而因緣附會與時上下大曆二年改刑部侍郎魚朝恩伏誅坐交通出為桂州刺史本管觀察使至江陵丁母憂久之會京兆尹缺人頗思幹八年復拜京兆尹兼御史大夫幹自以得志無心為理貪暴益甚徇於財色十三年除兵部侍郎性險挾左道結中貴以希主恩代宗甚惑之時中官劉忠翼寵任方盛幹結之素厚嘗通其姦謀及德宗初即位幹猶以詭道求進密居輿中詣忠翼第事發詔曰兵部侍郎黎幹害若豺狼特進劉忠翼掩義隱賊並除名長流既行市里兒童數千人譟聚懷瓦礫投擊之捕賊尉不能止遂皆賜死於藍田驛忠翼宦官也本名清潭與董秀皆有寵於代宗天憲在口勢回日月貪叨納賄貨産巨萬大曆中德宗居東宮幹及清潭嘗有姦謀動搖及是積前罪以誅之庾準常州人父光先天寶中文部侍郎準以門蔭入仕昵於宰相王縉縉驟引至職方郎中知制誥遷中書舍人準素寡文學以柔媚自進既非儒流甚為時論所薄尋改御史中丞遷尚書左丞縉得罪出為汝州刺史復入為司農卿與楊炎厚善炎欲殺劉晏知準與晏有隙乃用為荊南節度準乃上言得晏與朱泚書且有怨望又召補州兵以拒命於是先殺晏然後下詔賜自盡海內寃之炎以殺晏徵準為尚書左丞建中三年六月丁巳卒時年五十一贈工部尚書史臣曰仲尼云富與貴是人之欲不以道得之不處反乎是道者小人載諂輔國以進身弄時權而固位衆怒難犯長惡不悛家亡而誅及妻兒身死而殃及祖禰縉附會姦邪以至顛覆炎隳崔祐甫之規怒段秀實之直酬恩報怨以私害公三子者咸著文章殊乖德行不常其德或承之羞大易之義也富貴不以其道小人之事哉觀庾準之憸遭王縉之復徇楊炎之意曲致劉晏之寃積惡而獲令終者其在餘殃乎贊曰載縉炎準交相附會左傳有言貪人敗類
