body:
  text: 舊唐書卷一百二十七列傳第七十七姚令言張光晟源休喬琳張涉蔣鎮洪經綸彭偃姚令言河中人也少應募起於卒伍隸涇原節度馬璘以戰功纍授金吾大將軍同正為衙前兵馬使改試太常卿兼御史中丞建中元年孟為涇原節度留後自以文吏進身不樂軍旅頻表薦令言謹肅堪任將帥尋歸朝廷遂拜令言為四鎮北庭行營涇原節度使涇州刺史兼御史大夫建中四年李希烈叛寇陷汝州詔哥舒曜率師攻之營于襄城希烈兵數萬圍襄城勢甚危急十月詔令言率本鎮兵五萬赴援涇師離鎮多攜子弟而來望至京師以獲厚賞及師上路一無所賜時詔京兆尹王翃犒軍士唯糲食菜啖而已軍士覆而不顧皆憤怒揚言曰吾輩棄父母妻子將死於難而食不得飽安能以草命捍白刃耶國家瓊林大盈寶貨堆積不取此以自活何往耶行次滻水乃返戈大呼鼓譟而還令言曰比約東都有厚賞兒郎勿草草此非求活之良圖也衆不聽以戈環令言請退令言急奏之上恐令內庫出繒綵二十車馳賜之軍聲浩浩令言不能戢街市居人狼狽走竄亂兵呼曰勿走不稅汝間架矣德宗令普王與學士薑公輔往撫勞之才出內門賊已斬關陳于丹鳳樓下是日德宗倉卒出幸賊縱入府庫輦運極力而止時太尉朱泚罷鎮居晉昌里第是夜叛卒謀曰朱太尉久囚於宅若迎為主大事濟矣泚嘗節制涇州衆知其失權廢居怏怏又幸泚寬和乃請令言率騎迎泚於晉昌里泚初遲疑以食飼之徐觀衆意既而諸校齊至乃自第張炬火入居含元殿既僭號乃以令言為侍中與源休同知賊政事既以身先逆亂頗盡心於賊害宗室圍奉天皆令言為首帥也羣凶宴樂既醉令言與源休論功令言自比蕭何源休曰帷幄之謀成秦之業無出豫之右者吾比蕭何無讓子當曹參可矣時朝士在賊廷者聞之皆笑謂源休為火迫酇侯朱泚敗令言與張廷芝尚有衆萬人從泚將入吐蕃至涇州欲投田希鑒希鑒偽致禮誘之與泚俱斬首來獻張光晟京兆盩厔人起於行間天寶末哥舒翰兵敗潼關大將王思禮所乘馬中流矢而斃光晟時在騎卒之中因下以馬授思禮思禮問其姓名不告而退思禮陰記其形貌常使人密求之無何思禮為河東節度使其偏將辛雲京為代州刺史屢為將校譖毀思禮怒焉雲京惶懼不知所出光晟時隸雲京麾下因間進曰光晟素有德於王司空比下言者恥以舊恩受賞今使君憂迫光晟請奉命一見司空則使君之難可解雲京然其計即令之太原乃謁思禮未及言舊思禮識之遽曰爾豈非吾故人乎何相見之晚也光晟遂陳潼關之事思禮大喜因執其手感泣曰吾有今日子之力也求子頗久竟此相遇何慰如之命同榻而坐結為兄弟光晟遂述雲京之屈思禮曰雲京比涉謗言過亦不細今為故人特捨之矣即日擢光晟為兵馬使賚田宅縑帛甚厚纍奏特進試太常少卿委以心腹及雲京為河東節度使又奏光晟為代州刺史大曆末遷單于都護兼御史中丞振武軍使代宗密謂之曰北蕃縱橫日久當思所禦之計光晟既受命至鎮威令甚行建中元年回紇突董梅録領衆並雜種胡等自京師還國輿載金帛相屬於道光晟訝其裝槖頗多潛令驛吏以長錐刺之則皆輦歸所誘致京師婦人也遂紿突董及所領徒悉令赴宴酒酣光晟伏甲盡拘而殺之死者千餘人唯留二胡歸國復命遂部其婦人給糧還京收其金帛賞賚軍士後回紇遣使來訴上不欲甚阻蕃情徵拜右金吾將軍回紇猶怨懟不已又降為睦王傅尋改太僕卿負才怏怏不得志賊泚僭逆署光晟偽節度使兼宰相及泚衆頻敗遂擇精兵五千配光晟營於九曲去東渭橋凡十餘里光晟潛使於李晟有歸順之意晟進兵入苑光晟勸賊泚宜速西奔光晟以數千人送泚出城因率衆回降於晟晟以其誠款又愛其材欲奏用之俾令歸私第表請特減其罪每大宴會皆令就坐華州節度使駱元光詬之曰吾不能與反虜同席拂衣還營晟不得已拘之私第後有詔言其狀迹不可原乃斬之源休相州臨漳人京兆尹光輿之子也休以幹局纍授監察御史殿中侍御史青苗使判官遷虞部員外郎出潭州刺史入為主客郎中遷給事中御史中丞左庶子其妻即吏部侍郎王翊女也因小忿而離妻族上訴下御史臺驗理休遲留不答款狀除名配流溱州久之移嶽州建中初楊炎執政以京兆尹嚴郢威名稍著心欲傾之郢即王翊甥壻也休與王氏離絶之時炎風聞休郢有隙遂擢休自流人為京兆少尹俾令伺郢過失休既職久與郢親善炎怒之奏令以本官兼御史中丞奉使回紇休至振武軍使張光晟已殺回紇突董等上初欲遂絶其使令休還待命于太原久之方遣仍令休歸其突董翳密施大小梅録等四尸突董者即武義可汗之叔父也尸既至可汗令宰臣已下具綵服車馬來迎其宰相頡于思迦坐大帳立休等於帳外雪中詰殺突董等故休曰突董等自與張光晟忿鬬而死非天子命也又問使者背唐國負罪當死不能自戮耶不然何假手於我殺之也凡將殺者數矣言頗悖慢乃引去供餼甚薄留之五十餘日乃得還可汗使謂休曰我國人皆欲殺汝唯我不然汝國已殺突董等吾又殺汝猶以血洗血汙益甚爾吾今以水洗血不亦善乎所欠吾馬直絹一百八十萬匹當速歸之遣散支將軍康赤心等隨休來朝休竟不得見其可汗尋遣赤心等歸與之帛十萬匹金銀十萬兩償其馬直休履危而還宰相盧嵵又恐復命之日以口辨結恩將至太原遽奏為光祿卿休以其遠使賞薄居常怨望會涇原兵叛立朱泚為主初但稱太尉朝官謁泚者悉勸奉迎鑾駕既不合泚意而退及休至遂屏人移時言多悖逆盛陳成敗稱述符命勸令僭號泚悅其言以休為宰相判度支休遂為謀主至於兵食軍資遷除補擬內外咨謀一稟休畫故時人云源休之逆甚於朱泚朝廷大臣之奔竄不獲者多為休所誘致以至戮辱職休而為蓋非一焉又勸泚鋤翦宗室以絶人望命萬年縣賊曹尉楊偡專其斷決諸王子孫遇害不可勝數泚敗走休隨至寧州泚死休走鳳翔為其部曲所殺傳首來獻休三子並斬于東市籍沒其家喬琳太原人少孤貧志學以文詞稱天寶初舉進士補成武尉纍授興平尉朔方節度郭子儀辟為掌書記尋拜監察御史琳倜儻疏誕好談諧侮謔僚列頗無禮檢同院御史畢耀初與琳嘲誚往復因成釁隙遂以公事互相告訴坐貶巴州員外司戶遂起為南郭令改殿中侍御史充山南節度張獻誠行軍司馬使罷為劍南東川節度鮮于叔明判官改檢校駕部郎中果綿遂三州刺史兼御史中丞入為大理少卿國子祭酒出為懷州刺史琳素與張涉友善上在春宮涉嘗為侍讀及嗣位多以政事詢訪於涉盛稱琳識度材略堪備大用因拜御史大夫平章事琳本粗材又年高有耳疾上每顧問對答失次論奏不合時幸居相位凡八十餘日除工部尚書罷知政事尋加迎皇太后副使朱泚之亂扈從至奉天轉吏部尚書遷太子少師再幸梁洋琳從至盩厔託以馬乏遲留上以琳舊老心敬重之慰諭頗至以御馬一匹給焉又懇辭以老疾不堪山阻登頓上悵然賜之所執策曰勉為良圖與卿決矣後數日乃削髮為僧止仙遊寺賊泚聞之遂令數十騎追至京城俾為偽吏部尚書令源休被公服饋肉食琳雖辭讓而僧言求施琳掌賊中吏部選人前請曰所注某官不穩便琳謂之曰足下謂此選竟穩便乎及官軍收京師當處極刑時琳已七十餘李晟憫其衰老表請減死上以其纍經重任頓虧臣節自受逆命頗聞譏諧悖慢之言背義負恩固不可捨命斬之臨刑歎曰喬琳以七月七日生亦以此日死豈非命歟張涉者蒲州人家世儒者涉依國學為諸生講説稍遷國子博士亦能為文嘗請有司日試萬言時呼張萬言德宗在春宮受經于涉及即位之夕召涉入宮訪以庶政大小之事皆咨之翌日詔居翰林恩禮甚厚親重莫比自博士遷散騎常侍上方屬意宰輔唯賢是擇故求人於不次之地涉舉懷州刺史喬琳為相上授之不疑天下聞之者皆愕然數月琳以不稱職罷上由是疏涉俄受前湖南都團練使辛京杲贓事發詔曰尊師之道禮有所加議故之法恩有所掩張涉賄賂交通頗駭時聽常所親重良深歎惜宜放歸田里蔣鎮常州義興人尚書左丞洌之子也與兄鍊並以文學進天寶末舉賢良纍授左拾遺司封員外郎轉諫議大夫時戶部侍郎判度支韓滉上言河中鹽池生瑞鹽實土德之上瑞上以秋霖稍多水潦為患不宜生瑞命鎮馳驛檢行之鎮奏與滉同仍上表賀請宣付史館并請置神祠錫其嘉號寶應靈慶池時霖潦彌月壞居人廬舍非一鹽池為潦水所入其味多苦韓滉慮鹽戶減稅詐奏雨不壞池池生瑞鹽鎮庇之飾詐識者醜之轉給事中工部侍郎以簡儉稱於時其妹壻源溥即休之弟也以姻媾之故與休交好涇師之叛鎮潛竄夜至鄠縣西馬躓墮溝澗中傷足不能進時兄鍊已與源休相率受賊偽官鎮僕人有逃歸投鍊云鎮病足在鄠鍊與源休聞之大喜遂言於賊泚泚素慕鎮清名即令騎二百求之鄠縣西明日擁鎮而至署為偽宰相既知不免每憂沮常懷刃將自裁多為兄鍊所救而罷數日後復謀竄匿竟以性懦畏怯計終不果然源休與泚頻議欲逼脅潛藏衣冠大加殺戮鎮輒力爭救獲全者甚衆至是與兄鍊等並授偽職斬於東市西北街初鎮父洌叔渙當祿山思明之亂並授偽職然以家風修整為士大夫所稱鎮兄弟亦以教義禮法為己任而貪祿愛死節隳身戮為天下笑洪經綸建中初為黜陟使至東都訪聞魏州田悅食糧兵凡七萬人經綸素昧時機先以符停其兵四萬人令歸農畝田悅偽順命即依符罷之而大集所罷兵士激怒之曰爾等在軍旅各有父母妻子既為黜陟使所罷如何得衣食遂大哭悅乃盡出家財衣服厚給之各令還其部伍自此人堅叛心由是罷職及朱泚反偽授太常少卿彭偃少負俊才鋭於進取為當塗者所抑形於言色大曆末為都官員外郎時劍南東川觀察使李叔明上言以佛道二教無益于時請粗加澄汰其東川寺觀請定為二等上寺留僧二十一人上觀留道士十四人降殺以七皆精選有道行者餘悉令返初蘭若道場無名者皆廢德宗曰叔明此奏可為天下通制不唯劍南一道下尚書集議偃獻議曰王者之政變人心為上因人心次之不變不因循常守固者為下故非有獨見之明不能行非常之事今陛下以惟新之政為萬代法若不革舊風令歸正道者非也當今道士有名無實時俗鮮重亂政猶輕唯有僧尼頗為穢雜自西方之教被于中國去聖日遠空門不行五濁比丘但行粗法爰自後漢至于陳隋僧之廢滅其亦數乎或至坑殺殆無遺餘前代帝王豈惡僧道之善如此之深耶蓋其亂人亦已甚矣且佛之立教清淨無為若以色見即是邪法開示悟入唯有一門所以三乘之人比之外道況今出家者皆是無識下劣之流縱其戒行高潔在于王者已無用矣況是苟避征徭於殺盜淫穢無所不犯者乎今叔明之心甚善然臣恐其姦吏詆欺而去者未必非留者不必是無益於國不能息姦既不變人心亦不因人心強制力持難致遠耳臣聞天生蒸人必將有職遊行浮食王制所禁故有才者受爵祿不肖者出租征此古之常道也今天下僧道不耕而食不織而衣廣作危言險語以惑愚者一僧衣食歲計約三萬有餘五丁所出不能致此舉一僧以計天下其費可知陛下日旰憂勤將去人害此而不救奚其為政臣伏請僧道未滿五十者每年輸絹四匹尼及女道士未滿五十者每年輸絹二匹其雜色役與百姓同有才智者令入仕請還俗為平人者聽但令就役輸課為僧何傷臣竊料其所出不下今之租賦三分之一然則陛下之國富矣蒼生之害除矣其年過五十者請皆免之夫子曰五十而知天命列子曰不班白不知道人年五十嗜欲已衰縱不出家心已近道況戒律檢其情性哉臣以為此令既行僧道規避還俗者固已太半其年老精修者必盡為人師則道釋二教益重明矣議者是之上頗善其言大臣以二教行之已久列聖奉之不宜頓擾宜去其太甚其議不行偃以才地當掌文誥以躁求為時論所抑鬱鬱不得志涇師之亂從駕不及匿於田家為賊所得朱泚素知之得偃甚喜偽署中書舍人僭號辭令皆偃為之賊敗與偽中丞崔宣賊將杜如江吳希光等十三人李晟收之俱斬於安國寺前史臣曰肇分陰陽爰有生死修短二事賢愚一途故君子遇夷險之機不易其節小人昧逆順之道而陷於刑鴻毛泰山斯為至論令言遠總師徒首為叛逆光晟初當委任危輸款誠源休雖曰士流甚於元惡喬琳巧辭真主俯就偽官蔣鎮貪祿隳節皆曰小人經綸之徒不足言爾贊曰時爭逆順命繫死生君子守節小人正刑
