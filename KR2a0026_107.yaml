body:
  text: 舊唐書卷一百三列傳第五十三郭虔瓘張嵩郭知運子英傑王君馼賈師順附張守圭牛仙客王忠嗣郭虔瓘齊州歷城人也開元初纍遷右驍衛將軍兼北庭都護二年春突厥默啜遣其子移可汗及同俄特勤率精騎圍逼北庭虔瓘率衆固守同俄特勤單騎親逼城下虔瓘使勇士伏於路左突起斬之賊衆既至失同俄相率於城下乞降請盡軍中衣資器仗以贖同俄及聞其死三軍慟哭便引退默啜女壻火拔頡利發石阿失畢時與同俄特勤同領兵以同俄之死懼不敢歸遂將其妻歸降虔瓘以破賊之功拜冠軍大將軍行右驍衛大將軍又下制曰朕聞賞有功報有德者政之急也若功不賞德不報則人何謂哉雲麾將軍檢校右驍衛將軍兼北庭都護瀚海軍經略使金山道副大總管招慰營田等使上柱國太原縣開國子郭虔瓘宣威將軍守右驍衛翊府中郎將檢校伊州刺史兼伊吾軍使借紫金魚袋上柱國郭知運等早負名節見稱義勇頃者柳中金滿偏師禦敵蕭條窮漠之外奔迫孤城之下強寇益侵援兵不至既守而戰自秋涉冬櫪馬長嘶戍人遠望謀以十勝成其九拒遂能摧日逐之遺種斬天驕之愛息豈耿恭班超獨高前史將廉頗李牧與朕同時眷言茂勳是所嘉歎信可以疇其井邑昭示遐邇俾勞臣勸而懦夫立焉虔瓘可進封太原郡開國公知運可封介休縣開國公虔瓘俄轉安西副大都護攝御史大夫四鎮經略安撫使進封潞國公賜實封一百戶虔瓘乃奏請募關中兵一萬人往安西討擊皆給公乘兼供熟食敕許之將作大匠韋湊上疏曰臣聞兵者凶器不獲已而用之今西域諸蕃莫不順軌縱鼠竊狗盜有戍卒鎮兵足宣式遏之威非降赫斯之怒此師之出未見其名臣又聞安不忘危理必資備自近及遠強幹弱枝是以漢實關中徙諸豪族今關輔戶口積久逋逃承前先虛見猶未實屬北虜犯塞西戎駭邊凡在丁壯征行略盡豈宜更募驍勇遠資荒服又一萬行人詣六千餘里咸給遞馱並供熟食道次州縣將何以供秦隴之西人戶漸少涼州已去沙磧悠然遣彼居人如何得濟又萬人賞賜費用極多萬里資糧破損尤廣縱令必克其獲幾何儻稽天誅無乃甚損請令計議所用所得校其多少即知利害況用者必賞獲者未量何要此行頓空畿甸且上古之時大同之化不獨子子不獨親親何隔華戎務均安靖洎皇道謝古帝德慚皇猶尚綏懷不崇征伐有占風覘雨之客無越海踰山之師其後漢武膺圖志恢土宇西通絶域北擊胸奴雖廣獲珍奇多斬首級而中國疲耗殆至危亡是以俗號升平君稱盛德者咸指唐堯之代不歸漢武之年其要功不成者復焉足比議惟陛下圖之虔瓘竟無克獲之功尋遷右威衛大將軍以疾卒其後又以張嵩為安西都護以代虔瓘嵩身長七尺偉姿儀初進士舉常以邊任自許及在安西務農重戰安西府庫遂為充實十年轉太原尹卒官俄又以黃門侍郎杜暹代嵩為安西都護郭知運字逢時瓜州常樂人壯勇善射頗有膽略初為秦州三度府果毅以戰功纍除左驍衛中郎將瀚海軍經略使又轉檢校伊州刺史兼伊吾軍使開元二年春副郭虔瓘破突厥於北庭以功封介休縣公加雲麾將軍擢拜右武衛將軍其秋吐蕃入寇隴右掠監牧馬而去詔知運率衆擊之知運與薛訥王晙等掎角擊敗之拜知運鄯州都督隴右諸軍節度大使四年冬突厥降戶阿悉爛跌思太等率衆反叛單于副都護張知運為賊所執詔薛訥領兵討之叛賊至綏州界詔知運領朔方兵募橫擊之大破賊衆於黑山呼延谷賊捨甲仗並棄張知運走六年知運又率兵入討吐蕃賊徒無備遂掩至九曲獲鎖甲及馬犛牛等數萬計知運獻捷遂分賜京文武五品已上清官及朝集使拜知運為兼鴻臚卿攝御史中丞加封太原郡公八年六州胡康待賓等反詔知運與王晙討平之拜左武衛大將軍授一子官賜金銀器百事雜綵千段九年卒於軍贈涼州都督錫米粟五百斛絹帛五百段仍令中書令張說為其碑文知運自居西陲甚為蕃夷所憚其後王君馼亦號勇將時人稱王郭焉子英傑英乂英傑官至左衛將軍開元二十一年幽州長史薛楚玉遣英傑及裨將吳克勤烏知義羅守忠等率精騎萬人及降奚之衆以討契丹屯兵於榆關之外契丹首領可突干引突厥之衆拒戰於都山之下官軍不利知義守忠率麾下便道遁歸英傑與克勤逢賊力戰皆沒于陳其下精鋭六千餘人仍與賊苦戰賊以英傑之首示之竟不降盡為賊所殺英乂劍南西川節度使自有傳王君馼瓜州常樂人也初為郭知運別奏驍勇善騎射以戰功纍除右衛副率及知運卒遂代知運為河西隴右節度使遷右羽林軍將軍判涼州都督事開元十六年冬吐蕃大將悉諾邏率衆入寇大斗谷又移攻甘州焚燒市里而去君馼以其兵疲整士馬以掩其後會大雪賊徒凍死者甚衆賊遂取積石軍西路而還君馼令副使馬元慶裨將車蒙追之不及君馼先令人潛入賊境於歸路燒草悉諾邏還至大非川將息甲牧馬而野草皆盡馬死過半君馼襲其後入至青海之西時海水冰合君馼與秦州都督張景順等率將士並乘冰而渡會悉諾邏已度大非山輜重及疲兵尚在青海之側君馼縱兵盡俘獲之及羊馬萬數君馼以功遷右羽林軍大將軍攝御史中丞依舊判涼州都督封晉昌伯拜其父壽為少府監仍聽致仕上又嘗於廣達樓引君馼及妻夏氏設宴賜以金帛夏氏亦有戰功故特賞之封為武威郡夫人其冬吐蕃寇陷瓜州執刺史田仁獻及君馼父壽殺掠人戶并取軍資及倉糧又進攻玉門軍及常樂縣仍縱僧徒使歸涼州謂君馼曰將軍常欲以忠勇報國今日何不一戰君馼聞父被執登陴西向而哭竟不敢出兵初涼州界有回紇契苾思結渾四部落代為酋長君馼微時往來涼府為回紇等所輕及君馼為河西節度使回紇等怏怏恥在其麾下君馼以法繩之回紇等積怨密使人詣東都自陳枉狀君馼遽發驛奏回紇部落難制潛有叛謀上使中使往按問之回紇等竟不得理由是瀚海大都督回紇承宗長流瀼州渾大德長流吉州賀蘭都督契苾承明長流藤州盧山都督思結歸國長流瓊州右散騎常侍李令問特進契苾嵩以與回紇等結婚貶令問為撫州別駕嵩為連州別駕於是承宗之黨瀚海州司馬護輸糾合黨與謀殺君馼以復其怨會吐蕃使間道往突厥君馼率精騎往肅州掩之還至甘州南鞏驛護輸伏兵突起奪君馼旌節先殺其左右宋貞剖其心云是其始謀也君馼從數十人與賊力戰自朝至晡左右盡死遂殺君馼馱其尸以奔吐蕃追及之護輸遂棄君馼尸而走上甚痛惜之制贈特進荊州大都督給靈輿遞歸京師葬於京城之東官供喪事仍令張說為其碑文上自書石以寵異之吐蕃之寇瓜州也分遣副將莽布支攻常樂縣縣令賈師順嬰城固寸及瓜州城陷大將悉諾邏又盡引其衆乘勢以攻之數日不陷賊中有分得漢口為妻者其妻弟在常樂城中悉諾邏使夜就城下詐為私見謂師順曰瓜州已破吐蕃盡衆來此豈有拒守之理小人妻弟在城情有所念明府何不早降以全城中之衆師順答曰漢法降賊者九族為戮吾受國官爵祗可以死拒寇豈得背恩降賊悉諾邏知師順不降又攻城八日復令前使謂師順曰明府既不肯降吾衆欲還城中豈無財物以相贈耶師順請脫士卒衣裳以為賂悉諾邏知城中無財帛夜燒死人收營而去引衆毀瓜州城師順遽開門收器械更修守備吐蕃果使精騎回襲而巡城知有備始去賈師順者岐州人也以守城之功纍遷鄯州都督隴右節度使入為左領軍將軍病卒張守圭陝州河北人也初以戰功授平樂府別將從郭虔瓘於北庭鎮遣守圭率衆救援在路逢賊甚衆守圭身先士卒與之苦戰斬首千餘級生擒賊率頡斤一人開元初突厥又寇北庭虔瓘令守圭間道入京奏事守圭因上書陳利害請引兵自蒲昌輪臺翼而擊之及賊敗守圭以功特加游擊將軍再轉幽州良社府果毅守圭儀形瓌壯善騎射性慷慨有節義時盧齊卿為幽州刺史深禮遇之常共榻而坐謂曰足下數年外必節度幽涼為國之良將方以子孫相託豈得以僚屬常禮相期耶守圭後纍轉左金吾員外將軍為建康軍使十五年吐蕃寇陷瓜州王君馼死河西恟懼以守圭為瓜州刺史墨離軍使領餘衆修築州城板堞才立賊又暴至城下城中人相顧失色雖相率登陴略無守禦之意守圭曰彼衆我寡又創痍之後不可以矢石相持須以權道制之也乃於城上置酒作樂以會將士賊疑城中有備竟不敢攻城而退守圭縱兵擊敗之於是修復廨宇收合流亡皆復舊業守圭以戰功加銀青光祿大夫仍以瓜州為都督府以守圭為都督瓜州地多沙磧不宜稼穡每年少雨以雪水溉田至是渠堰盡為賊所毀既地少林木難為修葺守圭設祭祈禱經宿而山水暴至大漂材木塞澗而流直至城下守圭使取充堰於是水道復舊州人刻石以紀其事明年遷鄯州都督仍充隴右節度二十一年轉幽州長史兼御史中丞營州都督河北節度副大使俄又加河北採訪處置使先是契丹及奚連年為邊患契丹衙官可突干驍勇有謀略頗為夷人所伏趙含章薛楚玉等前後為幽州長史竟不能拒及守圭到官頻出擊之每戰皆捷契丹首領屈剌與可突干恐懼遣使詐降守圭察知其僞遣管記右衛騎曹王悔詣其部落就謀之悔至屈剌帳賊徒初無降意乃移其營帳漸向西北密遣使引突厥將殺悔以叛會契丹別帥李過折與可突干爭權不叶悔潛誘之夜斬屈剌及可突干盡誅其黨率餘燼以降守圭因出師次于紫蒙川大閲軍實宴賞將士傳屈剌可突干等首于東都梟於天津橋之南詔封李過折為北平王使統其衆尋為可突干餘黨所殺二十三年春守圭詣東都獻捷會籍田禮畢酺宴便為守圭飲至之禮上賦詩以褒美之廷拜守圭為輔國大將軍右羽林大將軍兼御史大夫餘官並如故仍賜雜綵一千匹及金銀器物等與二子官仍詔於幽州立碑以紀功賞二十六年守圭裨將趙堪白真陀羅等假以守圭之命逼平盧軍使烏知義令率騎邀叛奚餘燼於潢水之北將踐其禾稼知義初猶固辭真陀羅又詐稱詔命以迫之知義不得已而行及逢賊初勝後敗守圭隱其敗狀而妄奏克獲之功事頗泄上令謁者牛仙童往按之守圭厚賂仙童遂附會其事但歸罪於白真陀羅逼令自縊而死二十七年仙童事露伏法守圭以舊功減罪左遷括州刺史到官無幾疽發背而卒弟守琦左驍衛將軍守瑜金吾將軍守圭子獻誠守瑜子獻恭守琦子獻甫三人皆為興元節度使各自有傳牛仙客涇州鶉觚人也初為縣小吏縣令傅文靜甚重之文靜後為隴右營田使引仙客參預其事遂以軍功纍轉洮州司馬開元初王君馼為河西節度使以仙客為判官甚委信之時又有判官宋貞與仙客俱為腹心之任及君馼死宋貞亦為回紇所殺仙客以不從獲免俄而蕭嵩代君馼為河西節度又以軍政委於仙客仙客清勤不倦接待上下必以誠信及嵩入知政事數稱薦之稍遷太僕少卿判涼州別駕事仍知節度留後事竟代嵩為河西節度使判涼州事歷太僕卿殿中監軍使如故開元二十四年秋代信安王褘為朔方行軍大總管右散騎常侍崔希逸代仙客知河西節度事初仙客在河西節度時省用所積巨萬希逸以其事奏聞上令刑部員外郎張利貞馳傳往覆視之仙客所積倉庫盈滿器械精徑皆如希逸之狀上大悅以仙客為尚書中書令張九齡執奏以為不可乃加實封二百戶其年十一月九齡等罷知政事遂以仙客為工部尚書同中書門下三品仍知門下事時有監察御史周子諒竊言于御史大夫李適之曰牛仙客不才濫登相位大夫國之懿親豈得坐觀其事適之遽奏子諒之言上大怒廷詰之子諒辭窮於朝堂決配流瀼州行至藍田而死仙客既居相位獨善其身唯諾而已所有錫賚皆緘封不啓百司有所咨決仙客曰但依令式可也不敢措手裁決明年特封豳國公贈其父意為禮部尚書祖會為涇州刺史俄又進拜侍中兼兵部尚書天寶年改易官名拜左相尚書如故其年七月卒年六十八內出絹一千匹布五百端遣中使送至宅以賻之贈尚書左丞諡曰貞簡初仙客為朔方軍使以姚崇孫閎為判官及知政事閎纍遷侍御史自云能通鬼道預知休咎仙客頗信惑之及疾甚閎請為仙客祈禱在其門下遂逼仙客令作遺表薦閎叔尚書右丞奕及兵部侍郎盧奐堪代己閎為起草仙客時既危殆署字不成其妻因中使來弔以其表上玄宗覺而怒之左遷奕為永陽太守盧奐為臨淄太守賜閎死王忠嗣太原祁人也家于華州之鄭縣父海賓太子右衛率豐安軍使太谷男以驍勇聞隴上開元二年七月吐蕃入寇朝廷起薛訥攝左羽林將軍為隴右防禦使率杜賓客郭知運王晙安思順以禦之以海賓為先鋒及賊于渭州西界武階驛苦戰勝之殺獲甚衆諸將嫉其功按兵不救海賓以衆寡不敵歿于陳大軍乘其勢擊之斬首一萬七千級獲馬七萬五千匹羊牛十四萬頭玄宗聞而憐之詔贈左金吾大將軍忠嗣初名訓年九歲以父死王事起復拜朝散大夫尚輦奉御賜名忠嗣養於禁中纍年肅宗在忠邸與之游處及長雄毅寡言嚴重有武略玄宗以其兵家子與之論兵應對縱橫皆出意表玄宗謂之曰爾後必為良將十八年又贈其父安西大都護其後遂從河西節度兵部尚書蕭嵩河東副元帥信安王褘並引為兵馬使二十一年再轉左領軍衛郎將河西討擊副使左威衛將軍賜紫金魚袋清源男兼檢校代州都督嘗短皇甫惟明義弟王昱憾焉遂為所陷貶東陽府左果毅屬河西節度使杜希望謀拔新城或言忠嗣之材足以輯事必欲取勝非其人不可希望即奏聞詔追忠嗣赴河西既下新城忠嗣之功居多因授左威衛郎將專知行軍兵馬是秋吐蕃大下報新城之役晨壓官軍衆寡不敵師人皆懼焉忠嗣乃以所部策馬而前左右馳突當者無不辟易出而復合殺數百人賊衆遂亂三軍翼而擊之吐蕃大敗以功最詔拜左金吾衛將軍同正員尋又兼左羽林軍上將軍河東節度副使兼大同軍使二十八年以本官兼代州都督攝御史大夫兼充河東節度又加雲麾將軍二十九年代韋光乘為朔方節度使仍加權知河東節度事其月以田仁琬充河東節度使忠嗣依舊朔方節度天寶元年兼靈州都督是歲北伐與奚怒皆戰于桑乾河三敗之大虜其衆耀武漠北高會而旋時突厥葉護新有內難忠嗣盛兵磧口以威振之烏蘇米施可汗懼而請降竟遷延不至忠嗣乃縱反間於拔悉密與葛邏祿回紇三部落攻米施可汗走之忠嗣因出兵伐之取其右廂而歸其西葉護及毗伽可敦男西殺葛臘哆率其部落千餘帳入朝因加左武衛大將軍明年又再破怒皆及突厥之衆自是塞外晏然虜不敢入天寶三載突厥九姓拔悉密葉護等竟攻殺烏蘇米施可汗傳首京師四載加攝御史大夫充河東節度採訪使五月進封清源縣公忠嗣少以勇敢自負及居節將以持重安邊為務嘗謂人云國家升平之時為將者在撫其衆而已吾不欲疲中國之力以徼功名耳但訓練士馬缺則補之有漆弓百五十斤嘗貯之袋中示無所用軍中皆日夜思戰因多縱間諜以伺虜之隙時以奇兵襲之故士樂為用師出必勝每軍出即各召本將付其兵器令給士卒雖一弓一箭必書其名姓於上以記之軍罷却納若遺失即驗其名罪之故人人自勸甲仗充牣矣四載又兼河東節度採訪使自朔方至雲中緣邊數千里當要害地開拓舊城或自創制斥地各數百里自張仁亶之後四十餘年忠嗣繼之北塞之人復罷戰矣五年正月河隴以皇甫惟明敗衄之後因忠嗣以持節充西平郡太守判武威郡事充河西隴右節度使其月又權知朔方河東節度使事忠嗣佩四將印控制萬里徑兵重鎮皆歸掌握自國初已來未之有也尋遷鴻臚卿餘如故又加金紫光祿大夫仍授一子五品官後頻戰青海積石皆大克捷尋又伐吐谷渾於墨離虜其全國而歸初忠嗣在河東朔方日久備諳邊事得士卒心及至河隴頗不習其物情又以功名富貴自處望減於往日矣其載四月固讓朔方河東節度許之玄宗方事石堡城詔問以攻取之略忠嗣奏云石堡險固吐蕃舉國而守之若頓兵堅城之下必死者數萬然後事可圖也臣恐所得不如所失請休兵秣馬觀釁而取之計之上者玄宗因不快李林甫尤忌忠嗣日求其過六載會董延光獻策請下石堡城詔忠嗣分兵應接之忠嗣僶俯而從延光不悅河西兵馬使李光弼危之遽而入告將及於庭忠嗣曰李將軍有何事乎光弼進而言曰請議軍忠嗣曰何也對曰向者大夫以士卒為心有拒董延光之色雖曰受詔實奪其謀何者大夫以數萬衆付之而不懸重賞則何以賈三軍之勇乎大夫財帛盈庫何惜數萬段之賞以杜其讒口乎彼如不捷歸罪於大夫矣忠嗣曰李將軍忠嗣計已決矣平生始望豈及貴乎今爭一城得之未制於敵不得之未害於國忠嗣豈以數萬人之命易一官哉假如明主見責豈失一金吾羽林將軍歸朝宿衛乎其次豈失一黔中上佐乎此所甘心也雖然公實愛我光弼謝曰向者恐纍大夫敢以衷告大夫能行古人之事非光弼所及也遂趨而出及延光過期不克訴忠嗣緩師故師出無功李林甫又令濟陽別駕魏林告忠嗣稱往任朔州刺史忠嗣為河東節度云早與忠王同養宮中我欲尊奉太子玄宗大怒因徵入朝令三司推訊之幾陷極刑會哥舒翰代忠嗣為隴右節度特承恩顧因奏忠嗣之枉詞甚懇切請以己官爵贖罪玄宗怒稍解十一月貶漢陽太守七載量移漢東郡太守明年暴卒年四十五子震天寶中祕書丞其後哥舒翰大舉兵伐石堡城拔之死者大半竟如忠嗣之言當代稱為名將先是忠嗣之在朔方也每至互市時時高估馬價以誘之諸蕃聞之競來求市來輒買之故蕃馬益少而漢軍益壯及至河隴又奏請徙朔方河東戎馬九千匹以實之其軍又壯迄于天寶末戰馬蕃息寶應元年追贈兵部尚書史臣曰郭虔瓘郭知運王君馼張守圭牛仙客王忠嗣立功邊域為世虎臣班超傅介子之流也然虔瓘以萬人征西請給公乘熟食可謂謀之不臧矣君馼以父執登陴兵竟不出此則不知門外之事義斷恩也守圭以至誠感神取材成堰與夫耿恭拜井有何異焉仙客爰自方隅驟登廊廟顯招物議獨善其身蓋才有不周昧於陳力就列忠嗣因青蠅之點幾危其身讒人之言誠可畏也贊曰隴山之西幽陵之北爰有戎夷世為殘賊二郭二王守圭仙客禦寇之功存乎方策
