body:
  text: 舊唐書卷一百一十七列傳第六十七嚴武郭英乂崔寧弟寬從孫蠡蠡子蕘從孫黯嚴震嚴礪嚴武中書侍郎挺之子也神氣雋爽敏於聞見幼有成人之風讀書不究精義涉獵而已弱冠以門蔭策名隴右節度使哥舒翰奏充判官遷侍御史至德初肅宗興師靖難大收才傑武杖節赴行在宰相房琯以武名臣之子素重之及是首薦才略可稱纍遷給事中既收長安以武為京兆少尹兼御史中丞時年三十二以史思明阻兵不之官優游京師頗自矜大出為綿州刺史遷劍南東川節度使入為太子賓客兼御史中丞上皇誥以劍兩川合為一道拜武成都尹兼御史大夫充劍南節度使入為太子賓客遷京兆尹兼御史大夫二聖山陵以武為橋道使無何罷兼御史大夫改吏部侍郎尋遷黃門侍郎與宰臣元載深相結託冀其引在同列事未行求為方面復拜成都尹充劍南節度等使廣德二年破吐蕃七萬餘衆拔當狗城十月取鹽川城加檢校吏部尚書封鄭國公前後在蜀纍年肆志逞欲恣行猛政梓州刺史章彝初為武判官及是小不副意赴成都杖殺之由是威震一方蜀土頗饒珍産武窮極奢靡賞賜無度或由一言賞至百萬蜀方閭里以徵斂殆至匱竭然蕃虜亦不敢犯境而性本狂蕩視事多率胸臆雖慈母言不之顧初為劍南節度使舊相房琯出為管內刺史琯於武有薦導之恩武驕倨見琯略無朝禮甚為時議所貶永泰元年四月以疾終時年四十郭英乂先朝隴右節度使左羽林軍將軍知運之季子也少以父業習知武藝策名河隴間以軍功纍遷諸衛員外將軍至德初肅宗興師朔野英乂以將門子特見任用遷隴右節度使兼御史中丞既收二京徵還闕下掌禁兵遷羽林軍大將軍加特進以家艱去職朝廷方討史思明選任將帥乃起英乂為陝州刺史充陝西節度潼關防禦等使尋加御史大夫兼神策軍節度代宗即位加檢校戶部尚書兼御史大夫元帥雍王自陝統諸軍討賊洛陽留英乂在陝為後殿東都平以英乂權為東都留守既至東都不能禁暴縱麾下兵與朔方回紇之衆大掠都城延及鄭汝等州比屋蕩盡廣德元年策勳加實封二百戶徵拜尚書右僕射封定襄郡王恃富而驕於京城創起甲第窮極奢靡與宰臣元載交結以久其權會劍南節度使嚴武卒載以英乂代之兼成都尹充劍南節度使既至成都肆行不軌無所忌憚玄宗幸蜀時舊宮置為道士觀內有玄宗鑄金真容及乘輿侍衛圖畫先是節度使每至皆先拜而後視事英乂以觀地形勝乃入居之其真容圖畫悉遭毀壞見者無不憤怒以軍政苛酷無敢發言又頗恣狂蕩聚女人騎驢擊毬製鈿驢鞍及諸服用皆侈靡裝飾日費數萬以為笑樂未嘗問百姓間事人頗怨之又以西山兵馬使崔旰得衆心屢抑之旰因蜀人之怨自西山率麾下五千餘衆襲成都英乂出軍拒之其衆皆叛反攻英乂英乂奔於簡州普州刺史韓澄斬英乂首以送旰并屠其妻子焉崔寧衛州人本名旰雖儒家子喜縱橫之術衛州刺史茹璋授旰符離令既罷久不調遂客遊劍南從軍為步卒事鮮于仲通又隨李宓討雲南宓戰敗旰歸成都行軍司馬崔論見旰悅其狀貌又以其宗姓厚遇薦為衙將歷事崔圓裴冕冕遭流謗朝廷將遣使推按旰部下截耳稱寃中使奏之旰亦赴京師授司戈歷司階折衝郎將軍等官寶應初蜀中亂山賊擁絶縣道代宗憂之嚴武薦旰為利州刺史既至山賊遁散由是知名嚴武為劍南節度赴鎮過利州心欲辟旰為部將以利非屬部旰難輒去俾旰籌之旰曰節度使張獻誠見忌且又好利誠能重賂之旰可以從大夫矣武至劍南遺獻誠奇錦珍貝價兼百金獻誠大悅武乃遺獻誠書求旰獻誠然之令旰移疾去郡旰乃之劍南武奏為漢州刺史久之吐蕃與諸雜羌戎寇陷西山柘靜等州詔嚴武收復武遣旰統兵西山旰善撫士卒皆願致死命始次賊城周圍皆石礫攻具無所設唯東南隅環丈之地壤土可穴諜知之以告旰晝夜穿地道攻之再宿而拔其城因拓地數百里下城寨數四番衆相語曰崔旰神兵也將更前進以糧盡還師武大悅裝七寶輿迎旰入成都以誇士衆賞賚過厚永泰元年五月嚴武卒杜濟為西川行軍司馬權知軍府事時郭英幹為都知兵馬使郭嘉琳為都虞候皆請英幹兄英乂為節度使旰時為西山都知兵馬使與軍衆共請大將王崇俊為節度使二奏俱至京師會朝廷已除英乂旰使因見英乂陳其事英乂至成都數日誣殺王崇俊又召旰還成都英乂減將健糧賜人心怨怒旰在西山聞之大恐乃託備吐蕃未赴成都英乂怒出兵聲言助旰討吐蕃其實襲之也旰家在漢州英乂遷之成都通其妾媵旰知之轉入深山英乂自率師攻旰值天大寒雪深數尺英乂士馬凍死者數百人衆心離叛旰遂出兵拒敵英乂與之接戰英乂軍大敗而還收餘兵才千人歸成都將卒因多逃散初天寶中劍南節度使鮮于仲通嘗建一使院院宇甚華麗及玄宗幸蜀嘗居之因為道觀兼寫玄宗真容置之正室英乂因入觀行香悅其竹樹遂奏請以仲通舊院為軍營乃移去真容自居之旰聞之謂將士曰英乂反矣不然何得除毀玄宗真容而自居之乃率兵攻成都英乂出兵於城西門令柏茂琳為前軍郭英幹為左軍郭嘉琳為後軍與旰戰茂琳等軍纍敗軍人多投旰旰令降將統兵與英乂轉戰大敗之兵至子城英乂單騎奔簡州為普州刺史韓澄所殺時邛劍所在起兵相攻劍南大亂永泰二年二月乃以黃門侍郎平章事杜鴻漸兼成都尹山南西道劍南東川西川邛南等道副元帥劍南西川節度使鴻漸出駱谷有謀者曰相公駐車閬州遙制劍南數移牒述英乂過失言旰有方略旰腹心攝諸州刺史者皆奏正之令旰及將校不疑怨然後與東川節度使張獻誠及諸賊帥合議數出兵攻旰既數道連兵未經一年兵勢減耗旰窮必束身歸朝此上策也鴻漸畏懦計疑未決會旰使至卑辭厚禮送繒錦數千匹鴻漸貪其利遂至成都日與判官杜亞楊炎將吏等高會縱觀軍州政事悉委旰仍連表聞薦先時張獻誠數與旰戰獻誠屢敗旌節皆為旰所奪朝廷因鴻漸之請加成都尹兼西山防禦使西川節度行軍司馬仍賜名曰寧大曆二年鴻漸歸朝遂授寧西川節度使恃地險人富乃厚斂財貨結權貴令弟寬留京師元載及諸子有所欲寬恣與之故寬驟歷御史知雜事御史中丞寬兄審亦任郎中諫議大夫給事中寧在蜀十餘年地險兵強肆侈窮欲將吏妻妾多為所淫污朝廷患之而不能詰纍加尚書左僕射大曆十四年入朝遷司空平章事兼山陵使尋代喬琳為御史大夫平章事寧以為選擇御史當出大夫不謀及宰相乃奏請以李衡于結等數人為御史楊炎大怒其狀遂寢炎又數讒毀劉晏寧又救解之寧既厚結元載已久楊炎又出自載門寧初附炎炎因此大怒其年十月南蠻大下與吐蕃三道合進一出茂州過文川及灌口一出扶文過方維白壩一出黎壩雅過邛郲戎酋誡其衆曰吾要蜀川為東府凡伎巧之工皆送邏娑平歲賦一縑而已是蠻之入連陷郡邑士庶奔亡山谷屬寧在朝軍中無帥德宗促寧還鎮炎懼寧怨己入蜀難制謂德宗曰蜀川天下奧壤自寧擅置其中朝廷失其外府十四年矣今寧來朝尚有全師守蜀貨利之厚適中奉給貢賦所入與無地同始寧與諸將等夷獨因叛亂得位不敢自有以恩柔煦育威令不行今雖歸之必無功是徒遣也若有功義不可奪則西川之奧敗固失之勝亦非國家所有陛下熟察帝曰卿策何從炎曰請無歸寧今朱泚所部范陽徑兵戍在近甸促令與禁兵雜往舉無不捷因是役得置親兵內其腹中蜀將必不敢動然後換授他帥以收其權得千里肥饒之地是因小禍受大福也帝曰善即止寧不行乃發禁兵四千范陽兵五千赴援東川出軍自江油趣白壩與山南兵合擊蠻兵敗走范陽軍又擊破於七盤遂拔新城戎蠻大敗凡斬馘六千生擒六百傷者殆半饑寒隕於崖谷者八九萬寧遂罷西川節度使制授檢校司空同中書門下平章事御史大夫京畿觀察使兼靈州大都督單于鎮北大都護朔方節度等使兼鄜坊丹延都團練觀察使託以重臣綏靖北邊但令居鄜州雖以寧為節度每道皆置留後自得奏事炎悉諷令伺寧過犯杜希全為靈州王翃為振武李建徽為鄜州及戴休顏杜從政呂希倩等皆炎署置也寧巡邊至夏州刺史呂希倩與寧同力招撫党項歸降者甚多炎惡之因奏希倩撫綏之功才堪委任召歸朝除右僕射知省事以神武將軍時常春代之朱泚之亂上卒迫行幸百僚諸王鮮有知者寧後數日自賊中來上初喜甚寧私謂所親曰聖上聰明英邁從善如轉規但為盧嵵所惑至此爾嵵聞之潛與王翃圖議陷之初涇原兵作亂之夕寧與翃及御史大夫于頎俱出延平門而西數下馬便液每下輒良久翊等促之不敢前又懼賊兵追及翃乃大聲而言曰已至此不必顧望至奉天翃具以事聞會朱泚行反間僞除柳渾宰相署寧中書令寧朔方掌書記康湛時為盩厔尉翃逼湛作寧遺朱泚書使寧無以自辨翃遂獻之嵵因誣奏曰崔寧初無葵藿向日之心聞於城中與朱泚堅為盟約所以後於百辟今事果驗使凶渠外逼姦臣內謀則大事去矣因俯伏歔欷曰臣備位宰相危不能持顛不能扶宜當萬死伏待斧鉞上命左右扶起之既還俄有中人引寧於幕後二力士自後縊殺之時年六十一初將誅寧召至朝堂云令江淮宣慰尋命翰林學士陸贄草誅寧制贄求寧與泚書將以狀生之復亂言云其書已失寧既得罪籍沒其家中外稱其寃乃赦其家歸其資産貞元十二年六月寧故將夏綏銀節度使韓潭奏請以新加禮部尚書恩制以雪寧之罪詔從之任其家收葬初寧入朝留弟寬守成都瀘州楊子琳乘間以精騎數千突入成都據城守之寬屢戰力屈子琳威聲頗盛寧妾任氏魁偉果幹乃出其家財十萬募勇士信宿間得千人設隊伍將校手自麾兵以逼子琳子琳懼城內糧盡乃拔城自潰子琳素有妖術其夕致大雨引舟至庭除登之而遁寧季弟密密子繪父子皆以文雅稱歷使府從事繪生四子蠡黯確顏皆以進士擢第蠡字越卿元和五年擢第纍辟使府寶曆中入朝監察御史大和初為侍御史三遷戶部郎中出為汝州刺史開成初以司勳郎中徵尋以本官知制誥明年正拜舍人三年權知禮部貢舉四年拜禮部侍郎轉戶部上疏論國忌日設僧齊百官行香事無經據詔曰朕以郊廟之禮嚴奉祖宗備物盡誠庶幾昭格恭惟忌日之感所謂終身之憂而近代以來歸依釋老徵二教以設食會百辟以行香將以有助聖靈冥資福祚有異皇王之術頗乖教義之宗昨得崔蠡奏論遂遣討尋本末禮文令式曾不該明習俗因循雅當整革其兩京天下州府以國忌日為寺觀設齊焚香從今已後並宜停罷蠡尋為華州刺史鎮國軍等使再歷方鎮子蕘蕘字野夫大中二年擢進士第纍官至尚書郎知制誥正拜中書舍人戶部侍郎乾符中自尚書右丞遷吏部侍郎蕘美文詞善談論而馭事簡率銓管非所長出為陝州觀察使以器韻自高不屑細故權移僕下時河南寇盜蜂起王仙芝亂漢南朝綱不振而蕘自恃清貴不恤人之疾苦百姓訴旱蕘指庭樹曰此尚有葉何旱之有乃笞之吏民結怨既而為軍人所逐飢渴甚投民舍求水民以溺飲之初為軍人所俘翦其髭髮拜而獲免以失守貶端州司馬復入為左散騎常侍卒子居敬居儉居敬終尚書郎居儉中興終戶部尚書黯字直卿大和二年進士擢第開成初為青州從事入為監察御史奏郊廟祭器不虔請敕有司文宗謂宰臣曰宗廟之事朕合親奉其禮但以千乘萬騎動費國用每有司行事之日被衣冠坐以俟旦比聞主者不虔祭器勞敝非事神蠲潔之義卿宜嚴敕有司道吾此意黯具條奏以聞尋遷員外郎會昌中為諫議大夫確字嶽卿顏字希卿位皆至尚書郎嚴震字遐聞梓州鹽亭人世為田家以財雄於鄉里至德乾元已後震屢出家財以助邊軍授州長史王府咨議參軍東川節度判官韋收薦震才用於節度使嚴武遂授合州長史及嚴武移西川署為押衙改恆王府司馬嚴武以宗姓之故軍府之事多以委之又歷試衛尉太常少卿嚴武卒乃罷歸東川節度使又奏為渝州刺史以疾免山南西道節度使又奏為鳳州刺史加侍御史丁母憂罷起復本官仍充興鳳兩州團練使纍加開府儀同三司兼御史中丞為政清嚴興利除害遠近稱美建中初司勳郎中韋楨為山劍黜陟使薦震理行為山南第一特賜上下考封鄖國公在鳳州十四年能政不渝建中三年代賈耽為梁州刺史兼御史大夫山南西道節度觀察等使及朱泚竊據京城李懷光頓軍咸陽又與之連結泚令腹心穆庭光宋瑗等齎白書誘震同叛震集衆斬庭光等時李懷光連賊德宗欲移幸山南震既聞順動遣吏馳表往奉天迎駕仍令大將張用誠領兵五千至盩厔已東迎護上聞之喜既而用誠為賊所誘欲謀背逆朝廷憂之會震又遣牙將馬勛奉表迎候上臨軒召勛與之語勛對曰臣請計日至山南取節度使符召用誠即不受召臣當斬其首以復上喜曰卿何日當至勛剋日時而奏帝勉勞之勛既得震符乃請壯丁五人偕行既出駱谷用誠以勛未知其謀乃以數百騎迎勛勛與俱之傳舍用誠左右森然勛先聚草發火於驛外軍士爭附火勛乃從容出懷中符示之曰大夫召君用誠惶懼起走壯士自背束手而擒之不虞用誠子居後引刀斫勛勛左右遽承其臂刀下不甚微傷勛首遂格殺其子而仆用誠於地壯士跨其腹以刃擬其喉曰出聲即死勛即其營軍士已被甲執兵矣勛大言曰汝等父母妻子皆在梁州一朝棄之欲從用誠反逆有何利也但滅汝族耳大夫使我取張用誠不問汝輩欲何為乎衆皆讋服於是縛用誠送州震杖殺之拔其副將使率其衆迎駕勛以藥封首馳赴行在愆約半日上頗憂之及勛至上喜動顏色翌日車駕發奉天及入駱谷李懷光遣數百騎來襲賴山南兵擊之而退輿駕無警急之患尋加震檢校戶部尚書賜實封二百戶三月德宗至梁州山南地貧糧食難給宰臣議請幸成都府震奏曰山南地接京畿李晟方圖收復藉六軍聲援如幸西川則晟未見收復之期也幸陛下徐思其宜議未決李晟表至請車駕駐驆梁洋以圖收復羣議乃止梁漢之間刀耕火耨民以採為事雖節察十五郡而賦額不敵中原三數縣自安史之後多為山賊剽掠戶口流散大半洎六師駐驆震設法勸課鳩聚財賦以給行在民不至煩供億無闕其年六月收復京城車駕將還京師進位檢校尚書左僕射詔曰朕遭罹寇難播越梁岷蒸庶煩於供億武旅勤於扞衛凡百執事各奉厥司眷于是邦復我興運宜加崇大以示將來宜改梁州為興元府官名品制同京兆河南府鄭縣升為赤諸縣升為畿見任州縣官考滿日放選百姓給復一年洋州宜升為望見任州縣官考滿減兩選山南西道將士並與甄以震為興元尹賜實封二百戶貞元元年十一月德宗親祀昊天上帝于南郊震入朝陪祭十一年二月加同平章事貞元十五年六月卒時年七十六廢朝三日冊贈太保賻布帛米粟有差及喪將至令百官以次赴宅弔哭嚴礪震之宗人也性輕躁多姦謀以便佞在軍歷職至山南東道節度都虞候興州刺史兼監察御史貞元十五年嚴震卒以礪權留府事兼遺表薦礪才堪委任七月超授興元尹兼御史大夫山南西道節度支度營田觀察使詔下諫官御史以為除拜不當是日諫議給事補闕拾遺並歸門下省共議礪資歷甚淺人望素輕遽領節旄恐非允當既兼雜話發論喧然拾遺李繁獨奏云昨除拜嚴礪衆以為不當諫議大夫苗拯云已三度表論未見聽允給事中許孟容曰誠如此不曠職矣又云李元素陳京王舒並見拯及孟容言議上遣三司使詰之拯狀云實於衆中言曾論奏不言三度繁證之不已孟容等又云拯實言兩度拯請依衆狀翌日貶拯萬州刺史李繁播州參軍並同正礪在位貪殘士民不堪其苦素惡鳳州刺史馬勛誣奏貶賀州司戶縱情肆志皆此類也元和四年三月卒卒後御史元稹奉使兩川按察糾劾礪在任日贓罪數十萬詔徵其贓以死恕其罪史臣曰爵人於朝與衆共之刑人於市與衆棄之縊崔寧除嚴礪時君之政可知矣輔相之才可見矣武不稟父風有違母誨凡為人子者得不戒哉雖有周孔之才不足稱也況狂夫乎英乂失政其死也宜哉嚴震立功其道也顯矣贊曰英乂失政崔寧發身武為士子震作純臣
