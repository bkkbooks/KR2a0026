body:
  text: 舊唐書卷一百九十中列傳第一百四十中文苑中郭正一元萬頃范履冰苗神客周思茂胡楚賓附喬知之弟侃備劉希夷附劉允濟富嘉謨吳少微谷倚附員半千丘悅附劉憲王適司馬鍠梁載言附沈佺期陳子昂閭丘均附宋之問閻朝隱王無競李適君元凱附賈曾子至許景先賀知章賀朝萬齊融張若虛邢巨包融李登之附席豫徐安貞附齊浣王浣李雍孫逖子成郭正一定州鼓城人貞觀中舉進士纍轉中書舍人弘文館學士永隆二年遷祕書少監檢校中書侍郎與魏玄同郭待舉並同中書門下平章事宰相以平章事為名自正一等始也永淳二年正除中書侍郎正一在中書纍年明習舊事兼有詞學制敕多出其手當時號為稱職則天臨朝轉國子祭酒罷知政事尋出為晉州刺史入為麟臺監又檢校陝州刺史永昌元年為酷吏所陷流配嶺南而死家口籍沒文集多遺失先是儀鳳中吐蕃入寇工部尚書劉審禮率兵十八萬與蕃將倫欽陵戰于青海王師大敗審禮沒于陳高宗駭然乃召侍臣問以禦戎之策正一對曰吐蕃作梗年歲已深命將興師相繼不絶空勞士馬虛費糧儲近討則徒損兵威深入則未窮巢穴臣望少發兵募且遣備邊明立烽候勿令侵擾伺國用豐足人心叶同寬之數年可一舉而滅給事中劉齊賢皇甫文亮等亦以為嚴守為便正一才略率多此類元萬頃洛陽人後魏景穆皇帝之胤祖白澤武德中總管萬頃善屬文起家拜通事舍人乾封中從英國公李績征高麗為遼東道總管記室別帥馮本以水軍援裨將郭待封船破失期待封欲作書與績恐高麗知其救兵不至乘危迫之乃作離合詩贈績績不達其意大怒曰軍機急切何用詩為必斬之萬頃為解釋之乃止績嘗令萬頃作文檄高麗其語有譏高麗不知守鴨緑之險莫離支報云謹聞命矣遂移兵固守鴨緑官軍不得入萬頃坐是流于嶺外後會赦得還拜著作郎時天后諷高宗廣召文詞之士入禁中修撰萬頃與左史范履冰苗神客右史周思茂胡楚賓咸預其選前後撰列女傳臣軌百僚新誡樂書等凡千餘卷朝廷疑議及百司表疏皆密令萬頃等參決以分宰相之權時人謂之北門學士萬頃屬文敏速然性疏曠不拘細節無儒者之風則天臨朝遷鳳閣舍人無幾擢拜鳳閣侍郎萬頃素與徐敬業兄弟友善永昌元年為酷吏所陷配流嶺南而死時神客楚賓已卒履冰思茂相次為酷吏所殺范履冰者懷州河內人自周王府戶曹召入禁中凡二十餘年垂拱中歷鸞臺天官二侍郎尋遷春官尚書同鳳閣鸞臺平章事兼修國史載初元年坐嘗舉犯逆者被殺苗神客者滄州東光人官至著作郎周思茂者貝州漳南人少與弟思鈞俱早知名自右史轉太子舍人與范履冰在禁中最蒙親遇至於政事損益多參預焉纍遷麟臺少監崇文館學士垂拱四年下獄死胡楚賓者宣州秋浦人屬文敏速每飲半酣而後操筆高宗每令作文必以金銀杯盛酒令飲便以杯賜之楚賓終日酣宴家無所藏費盡復入待詔得賜又出然性慎密未嘗言禁中事醉後人或問之答以他事而已自殷王文學拜右史崇賢直學士而卒喬知之同州馮翊人也父師望尚高祖女廬陵公主拜駙馬都尉官至同州刺史知之與弟侃備並以文詞知名知之尤稱俊才所作篇詠時人多諷誦之則天時纍除右補闕遷左司郎中知之有侍婢曰窈娘美麗善歌舞為武承嗣所奪知之怨惜因作緑珠篇以寄情密送與婢婢感憤自殺承嗣大怒因諷酷吏羅織誅之侃開元初為兗州都督備預修三教珠英長安中卒於襄陽令時又有汝州人劉希夷善為從軍閨情之詩詞調哀苦為時所重志行不修為姦人所殺劉允濟洛州鞏人其先自沛國徙焉南齊彭城郡丞巘六代孫也少孤事母甚謹博學善屬文與絳州王勃早齊名特相友善弱冠本州舉進士纍除著作佐郎允濟嘗採托魯哀公後十二代至于戰國遺事撰魯後春秋二十卷表上之遷左史兼直弘文館垂拱四年明堂初成允濟奏上明堂賦以諷則天甚嘉歎之手制褒美拜著作郎天授中為來俊臣所搆當坐死以其母老特許終其餘年仍留繫獄久之會赦免貶授大庾尉長安中纍遷著作佐郎兼修國史未幾擢拜鳳閣舍人中興初坐與張易之款狎左授青州長史為吏清白河南道巡察使路敬潛甚稱薦之尋丁母憂服闋而卒富嘉謨雍州武功人也舉進士長安中纍轉晉陽尉與新安吳少微友善同官先是文士撰碑頌皆以徐庾為宗氣調漸劣嘉謨與少微屬詞皆以經典為本時人欽慕之文體一變稱為富吳體嘉謨作雙龍泉頌千蠋谷頌少微撰崇福寺鐘銘詞最高雅作者推重並州長史張仁亶待以殊禮坐必同榻嘉謨後為壽安尉預修三教珠英中興初為左臺監察御史卒有文集五卷少微亦舉進士纍至晉陽尉中興初調於吏部侍郎韋嗣立稱薦拜右臺監察御史臥病聞嘉謨死哭而賦詩尋亦卒有文集五卷嘉謨與少微在晉陽魏郡谷倚為太原主簿皆以文詞著名時人謂之北京三傑倚後流寓客死文章遺失微子鞏開元中為中書舍人員半千本名餘慶晉州臨汾人少與齊州人何彥先同師事學士王義方義方嘉重之嘗謂之曰五百年一賢足下當之矣因改名半千及義方卒半千與彥先皆制服喪畢而去上元初應八科舉授武陟尉屬頻歲旱飢勸縣令殷子良開倉以賑貧餒子良不從會子良赴州半千便發倉粟以給飢人懷州刺史郭齊宗大驚因而按之時黃門侍郎薛元超為河北道存撫使謂齊宗曰公百姓不能救之而使惠歸一尉豈不愧也遽令釋之尋又應嶽牧舉高宗御武成殿召諸州舉人親問曰兵書所云天陳地陳人陳各何謂也半千越次而進曰臣觀載籍此事多矣或謂天陳星宿孤虛地陳山川向背人陳偏伍彌縫以臣愚見謂不然矣夫師出以義有若時雨得天之時此天陳也兵在足食且耕且戰得地之利此地陳也善用兵者使三軍之士如父子兄弟得人之和此人陳也三者去矣其何以戰高宗甚嗟賞之及對策擢為上第垂拱中纍補左衛胄曹仍充宣慰吐蕃使及引辭則天曰久聞卿名謂是古人不意乃在朝列境外小事不足煩卿宜留待制也即日使入閣供奉證聖元年半千為左衛長史與鳳閣舍人王處知天官侍郎石抱忠並為弘文館直學士仍與著作佐郎路敬淳分日於顯福門待制半千因撰明堂新禮三卷上之則天封中嶽半千又撰封禪四壇碑十二首以進則天稱善前後賜絹千餘匹長安中五遷正諫大夫兼右控鶴內供奉半千以控鶴之職古無其事又授斯任者率多輕薄非朝廷進德之選上疏請罷之由是忤旨左遷水部郎中預修三教珠英中宗時為濠州刺史睿宗即位徵拜太子右諭德兼崇文館學士加銀青光祿大夫纍封平原郡公開元二年卒文集多遺失半千同時學士丘悅丘悅者河南陸渾人也亦有學業景龍中為相王府掾與文學韋利器典籤裴耀卿俱為王府直學士睿宗在藩甚重之官至岐王傅開元初卒撰三國典略三十卷行於時劉憲宋州寧陵人也父思立高宗時為侍御史屬河南河北旱儉遣御史中丞崔謐等分道存問賑給思立上疏諫曰今麥序方秋蠶功未畢三時之務萬姓所先敕使撫巡人皆竦抃忘其家業冀此天恩踊躍參迎必難抑止集衆既廣妨廢亦多加以途程往還兼之晨夕停滯既緣賑給須立簿書本欲安存却成煩擾又無驛之處其馬稍難簡擇公私須預追集雨後農務特切常情暫廢須臾即虧歲計每為一馬遂勞數家從此相乘恐更滋甚望且委州縣賑給待秋間時出使褒貶疏奏謐等遂不行後遷考功員外郎始奏請明經加帖進士試雜文自思立始也尋卒官憲弱冠舉進士纍除冬官員外郎天授中受詔推按來俊臣憲嫉其酷暴欲因事繩之反為俊臣所搆貶鄰水令再遷司僕丞及俊臣伏誅擢憲為給事中尋轉鳳閣舍人神龍初坐嘗為張易之所引自吏部侍郎出為渝州刺史俄復入為太僕少卿兼修國史加修文館學士景雲初三遷太子詹事玄宗在東宮留意經籍憲因上啓曰自古及今皆重于學至于光耀盛德發揚令問安靜身心保寧家國無以加焉殿下居副君之位有絶人之才豈假尋章摘句蓋資略知大意用功甚少為利極多伏願克成美志無棄暇日上以慰至尊之心下以答庶僚之望侍讀褚無量經明行修耆年宿望時賜召問以察其言幸甚玄宗甚嘉納之明年憲卒贈兗州都督有集三十卷初則天時敕吏部糊名考選人判以求才彥憲與王適司馬鍠梁載言相次判入第二等王適幽州人官至雍州司功司馬鍠洛州溫人也神龍中卒于黃門侍郎梁載言博州聊城人歷鳳閣舍人專知制誥撰具員故事十卷十道志十六卷並傳於時中宗時為懷州刺史沈佺期相州內黃人也進士舉長安中纍遷通事舍人預修三教珠英佺期善屬文尤長七言之作與宋之問齊名時人稱為沈宋再轉考功員外郎坐贓配流嶺表神龍中授起居郎加修文館直學士後歷中書舍人太子詹事開元初卒有文集十卷弟全交及子亦以文詞知名陳子昂梓州射洪人家世富豪子昂獨苦節讀書尤善屬文初為感遇詩三十首京兆司功王適見而驚曰此子必為天下文宗矣由是知名舉進士會高宗崩靈駕將還長安子昂詣闕上書盛陳東都形勝可以安置山陵關中旱儉靈駕西行不便曰梓州射洪縣草莽愚臣子昂謹頓首冒死獻書闕下臣聞明王不惡切直之言以納忠烈士不憚死亡之誅以極諫故有非常之策者必待非常之時得非常之時者必待非常之主然後危言正色抗義直辭赴湯鑊而不回至誅夷而無悔豈徒欲詭世誇俗厭生樂死者哉實以為殺身之害小存國之利大故審計定議而甘心焉況乎得非常之時遇非常之主言必獲用死亦何驚千載之迹將不朽於今日矣伏惟大行皇帝遺天下棄羣臣萬國震驚百姓屠裂陛下以徇齊之聖承宗廟之重天下之望喁喁如也莫不冀蒙聖化以保餘年太平之主將復在於茲矣況皇太后又以文母之賢協軒宮之耀軍國大事遺詔決之唐虞之際於斯盛矣臣伏見詔書梓宮將遷西京鑾輿亦欲陪幸計非上策智者失圖廟堂未聞有骨鯁之謨朝廷多見有順從之議臣竊惑以為過矣伏自思之生聖日沐皇風摩頂至踵莫非亭育不能歷丹鳳抵濯龍北面玉階東望金屋抗音而正諫者聖王之罪人也所以不顧萬死乞獻一言願蒙聽覽甘就鼎鑊伏惟陛下察之臣聞秦都咸陽之時漢都長安之日山河為固天下服矣然猶北取胡宛之利南資巴蜀之饒自渭入河轉關東之粟踰沙絶漠致山西之儲然後能削平天下彈壓諸侯長轡利策橫制宇宙今則不然燕代迫胸奴之侵巴隴嬰吐蕃之患西蜀疲老千里贏糧北國丁男十五乘塞歲月奔命其弊不堪秦之首尾今為闕矣即所餘者獨三輔之間耳頃遭荒饉人被荐飢自河已西莫非赤地循隴已北罕逢青草莫不父兄轉徙妻子流離委家喪業膏原潤莽此朝廷之所備知也賴以宗廟神靈皇天悔禍去歲薄稔前秋稍登使羸餓之餘得保性命天下幸甚可謂厚矣然而流人未返田野尚蕪白骨縱橫阡陌無主至於蓄積尤可哀傷陛下不料其難貴從先意遂欲長驅大駕按節秦京千乘萬騎何方取給況山陵初制穿復未央土木工匠必資徒役今欲率疲弊之衆興數萬之軍徵發近畿鞭撲羸老鑿山採石驅以就功春作無時秋成絶望凋瘵遺噍再罹艱苦倘不堪弊必有逋逃子來之頌將何以述之此亦宗廟之大機不可不審圖也況國無兼歲之儲家鮮匝時之蓄一旬不雨猶可深憂忽加水旱人何以濟陛下不深察始終獨違羣議臣恐三輔之弊不止如前日矣且天子以四海為家聖人包六合為宇歷觀邃古以至於今何嘗不以三王為仁五帝為聖雖周公制作夫子著明莫不祖述堯舜憲章文武為百王之鴻烈作千載之雄圖然而舜死陟方葬蒼梧而不返禹會羣后歿稽山而永終豈其愛蠻夷之鄉而鄙中國哉實將欲示聖人無外也故能使墳籍以為美談帝王以為高範況我巍巍大聖轢帝登皇日月所照莫不率俾何獨秦豐之地可置山陵河洛之都不堪園寢陛下豈不察之愚臣竊為陛下惜也且景山崇麗秀冠羣峯北對嵩邙西望汝海居祝融之故地連太昊之遺墟帝王圖迹縱橫左右園陵之美復何加焉陛下曾未察之謂其不可愚臣鄙見良足尚矣況瀍澗之中天地交會北有太行之險南有宛葉之饒東壓江淮食湖海之利西馳崤澠據關河之寶以聰明之主養純粹之人天下和平恭己正南面而已陛下不思瀍洛之壯觀關隴之荒蕪乃欲棄太山之安履焦原之險忘神器之大寶徇曾閔之小節愚臣暗昧以為甚也陛下何不覽爭臣之策采行路之謠咨謨太后平章宰輔使蒼生之望知有所安天下豈不幸甚昔者平王遷都光武都洛山陵寢廟不在東京宗社墳塋並居西土然而春秋美為始王漢書載為代祖豈其不願孝哉何聖賢褒貶於斯濫矣實以時有不可事有必然蓋欲遺小存大去禍歸福聖人所以貴也夫小不忍亂大謀仲尼之至誡願陛下察之若以臣愚不用朝議遂行臣恐關隴之憂無時休也臣又聞太原蓄巨萬之倉洛口積天下之粟國家之資斯為大矣今欲捨而不顧背以長驅使有識驚嗟天下失望倘鼠竊狗盜萬一不圖西入陝州之郊東犯武牢之鎮盜敖倉一抔之粟陛下何以遏之此天下之至機不可不深懼也雖則盜未旋踵誅刑已及滅其九族焚其妻子泣辜雖恨將何及焉故曰先謀後事者逸先事後謀者失國之利器不可以示人斯言豈徒設也固願陛下念之則天召見奇其對拜麟臺正字則天將事雅州討生羌子昂上書曰麟臺正字臣子昂昧死上言臣聞道路云國家欲開蜀山自雅州道入討生羌因以襲擊吐蕃執事者不審圖其利害遂發梁鳳巴蜒兵以徇之臣愚以為西蜀之禍自此結矣臣聞亂生必由於怨雅州邊羌自國初已來未嘗一日為盜今一旦無罪受戮其怨必甚怨甚懼誅必蜂駭西山西山盜起則蜀之邊邑不得不連兵備守兵久不解則蜀之禍搆矣昔後漢末西京喪敗蓋由此諸羌此一事也且臣聞吐蕃桀黠之虜君長相信而多姦謀自敢抗天誅邇來向二十餘載大戰則大勝小戰則小勝未嘗敗一隊亡一夫國家往以薛仁貴郭待封為虓武之將屠十一萬衆於大非之川一甲不返又以李敬玄劉審禮為廊廟之器辱十八萬衆於青海之澤身囚虜庭是時精甲勇士勢如雲雷然竟不能擒一戎馘一醜至今而關隴為空今乃欲以李處一為將驅憔悴之兵將襲吐蕃臣竊憂之而為此虜所笑此二事也且夫事有求利而得害者則蜀昔時不通中國秦惠王欲帝天下而并諸侯以為不兼賨不取蜀勢未可舉乃用張儀計飾美女譎金牛因間以啖蜀侯蜀侯果貪其利使五丁力士鑿通谷棧褒斜置道於秦自是險阻不關山谷不閉張儀躡踵乘便縱兵大破之蜀侯誅賨邑滅至今蜀為中州是貪利而亡此三事也且臣聞吐蕃羯虜愛蜀之珍富欲盜之久有日矣然其勢不能舉者徒以山川阻絶障隘不通此其所以頓餓狼之喙而不得侵食也今國家乃撤邊羌開隘道使其收奔亡之種為嚮導以攻邊是乃借寇兵而為賊除道舉全蜀以遺之此四事也臣竊觀蜀為西南一都會國家之寶庫天下珍貨聚出其中又人富粟多順江而下可以兼濟中國今執事者乃圖僥幸之利悉以委事西羌地不足以富國徒殺無辜之衆以傷陛下之仁糜費隨之無益聖德又況僥幸之利未可圖哉此五事也夫蜀之所恃有險也人之所安無役也今國家乃開其險役其人險開則便寇人役則傷財臣恐未見羌戎已有姦盜在其中矣往年益州長史李崇真圖此姦利傳檄稱吐蕃欲寇松州遂使國家盛軍師大轉餉以備之未二三年巴蜀二十餘州騷然大弊竟不見吐蕃之面而崇真贓錢已計巨萬矣蜀人殘破幾不堪命此之近事猶在人口陛下所親知臣愚意者不有姦臣欲圖此利復以生羌為計者哉此六事也且蜀人劣不習兵戰一虜持矛百人莫敢當又山川阻曠去中夏精兵處遠今國家若擊西羌掩吐蕃遂能破滅其國奴虜其人使其君長係首北闕計亦可矣若不到如此臣方見蜀之邊陲不守而為羌夷所橫暴昔辛有見被髮而祭伊川者以為不出百年此其為戎臣恐不及百年而蜀為戎此七事也且國家近者廢安北拔單于棄龜茲放疏勒天下翕然謂之盛德所以者何蓋以陛下務在仁不在廣務在養不在殺將以此息邊鄙休甲兵行三皇五帝之事者也今又徇貪夫之議謀動兵戈將誅無罪之戎而遺全蜀之患將何以令天下乎此愚臣所以不甚悟者也況當今山東飢關隴弊歷歲枯旱人有流亡誠是聖人寧靜思和天人之時不可動甲兵興大役以自生亂臣又流聞西軍失守北軍不利邊人忙動情有不安今者復驅此兵投之不測臣聞自古亡國破家未嘗不由黷兵今小人議夷狄之利非帝王之至德也又況弊中夏哉臣聞古之善為天下者計大而不計小務德而不務刑圖其安則思其危謀其利則慮其害然後能長享福祿伏願陛下熟計之再轉右拾遺數上疏陳事詞皆典美時有同州下邽人徐元慶父為縣尉趙師韞所殺後師韞為御史元慶變姓名於驛家傭力候師韞手刃殺之議者以元慶孝烈欲捨其罪子昂建議以為國法專殺者死元慶宜正國法然後旌其閭墓以褒其孝義可也當時議者咸以子昂為是俄授麟臺正字武攸宜統軍北討契丹以子昂為管記軍中文翰皆委之子昂父在鄉為縣令段簡所辱子昂聞之遽還鄉里簡乃因事收繫獄中憂憤而卒時年四十餘子昂褊躁無威儀然文詞宏麗甚為當時所重有集十卷友人黃門侍郎盧藏用為之序盛行於代子昂卒後益州成都人閭丘均亦以文章著稱景龍中為安樂公主所薦起家拜太常博士而公主被誅均坐貶為循州司倉卒有集十卷宋之問虢州弘農人父令文有勇力而工書善屬文高宗時為左驍衛郎將東臺詳正學士之問弱冠知名尤善五言詩當時無能出其右者初徵令與楊炯分直內教俄授洛州參軍纍轉尚方監丞左奉宸內供奉易之兄弟雅愛其才之問亦傾附焉預修三教珠英常扈從遊宴則天幸洛陽龍門令從官賦詩左史東方虬詩先成則天以錦袍賜之及之問詩成則天稱其詞愈高奪虬錦袍以賞之及易之等敗左遷瀧州參軍未幾逃還匿於洛陽人張仲之家仲之與駙馬都尉王同皎等謀殺武三思之問令兄子發其事以自贖及同皎等獲罪起之問為鴻臚主簿由是深為義士所譏景龍中再轉考功員外郎時中宗增置修文館學士擇朝中文學之士之問與薛稷杜審言等首膺其選當時榮之及典舉引拔後進多知名者尋轉越州長史睿宗即位以之問嘗附張易之武三思配徙欽州先天中賜死於徙所之問再被竄謫經途江嶺所有篇詠傳布遠近友人武平一為之纂集成十卷傳於代世人以之問父為三絶之問以文詞知名弟之悌有勇力之遜善書議者云各得父之一絶之悌開元中自右羽林將軍出為益州長史劍南節度兼採訪使尋遷太原尹閻朝隱趙州欒城人也少與兄鏡幾弟仙舟俱知名朝隱文章雖無風雅之體善構奇甚為時人所賞纍遷給事中預修三教珠英張易之等所作篇什多是朝隱及宋之問潛代為之聖曆二年則天不豫令朝隱往少室山祈禱朝隱乃曲申悅媚以身為犧牲請代上所苦及將康復賜絹綵百匹金銀器十事俄轉麟臺少監易之伏誅坐徙嶺外尋召還先天中復為祕書少監又坐事貶為通州別駕卒官朝隱修三教珠英時成均祭酒李嶠與張昌宗為修書使盡收天下文詞之士為學士預其列者有王無競李適尹元凱並知名於時自餘有事迹者各見其本傳王無競者字仲烈其先琅邪人因官徙居東萊宋太尉弘之十一代孫父侃棣州司馬無競有文學初應下筆成章舉及第解褐授趙州欒城縣尉歷祕書省正字轉右武衛倉曹洛陽縣尉遷監察御史轉殿中舊例每日更直於殿前正班時宰相宗楚客楊再思常離班偶語無競前曰朝禮至敬公等大臣不宜輕易以慢恆典楚客等大怒轉無競為太子舍人神龍初坐訶詆權幸出為蘇州司馬及張易之等敗以嘗交往再貶嶺外卒於廣州年五十四李適者雍州萬年人景龍中為中書舍人俄轉工部侍郎睿宗時天台道士司馬承禎被徵至京師及還適贈詩序其高尚之致其詞甚美當時朝廷之士無不屬和凡三百餘人徐彥伯編而之謂之白雲記頗傳於代尋卒尹元凱者瀛州樂壽人初為磁州司倉坐事免乃棲遲山林不求仕進垂三十年與張説盧藏用特相友善徵拜右補闕卒於并州司馬賈曾河南洛陽人也父言忠乾封中為侍御史時朝廷有事遼東言忠奉使往支軍糧及還高宗問以軍事言忠畫其山川地勢及陳遼東可平之狀高宗大悅又問諸將優劣言忠曰李績先朝舊臣聖鑒所悉龐同善雖非鬬將而持軍嚴整薛仁貴勇冠三軍名可振敵高侃儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫過於李績者高宗深然之纍轉吏部員外郎坐事左遷邵州司馬卒曾少知名景雲中為吏部員外郎玄宗在東宮盛擇宮僚拜曾為太子舍人時太子頻遣使訪召女樂命宮臣就率更署閲樂多奏女妓曾啓諫曰臣聞作樂崇德以感人神韶夏有容咸英有節婦人媟黷無豫其間昔魯用孔子幾至於霸齊人懼之饋以女樂魯君既受孔子所以行戎有由餘兵強國富秦人反間遺之女妓戎王耽悅由餘乃奔斯則大聖名賢嫉之已久良以婦人為樂必務冶容哇姣動心蠱惑喪志上行下效淫俗將成敗國亂人實由茲起伏惟殿下神武命代文思登庸宇內顒顒瞻仰德化而渴賢之美未被於民心好妓之聲或聞於人聽豈所以追啓誦之徽烈襲堯舜之英風者哉至若監撫餘間宴私多豫後庭妓樂古或有之非以風人為弊猶隱至於所司教習章示羣僚慢伎淫聲實虧睿化伏願下教令發德音屏倡優敦雅頌率更女樂並令禁斷諸使採召一切皆停則朝野內外皆知殿下放鄭遠佞輝光日新凡在含生孰不欣戴太子手令答曰比嘗聞公正直信亦不虛寡人近日頗尋典籍至於政化偏所留心女樂之徒亦擬禁斷公之所言雅符本意俄特授曾中書舍人曾以父名忠固辭乃拜諫議大夫知制誥明年有事於南郊有司立議唯祭昊天上帝而不設皇地祗之位曾奏議請於南郊方丘設皇地祗及從祀等坐則禮惟稽古義得緣情睿宗令宰相及禮官詳議竟依曾所奏開元初復拜中書舍人曾又固辭議者以為中書是曹司名又與曾父音同字別於禮無嫌曾乃就職與蘇晉同掌制誥皆以詞學見知時人稱為蘇賈曾後坐事貶洋州刺史開元六年玄宗念舊特恩甄繼歷慶鄭等州刺史入拜光祿少卿遷禮部侍郎十五年卒子至至天寶末為中書舍人祿山之亂從上皇幸蜀時肅宗即位於靈武上皇遣至為傳位册文上皇覽之歎曰昔先帝遜位於朕册文則卿之先父所為今朕以神器大寶付儲君卿又當演誥纍朝盛典出卿父子之手可謂難矣至伏於御前嗚咽感涕寶應二年為尚書左丞時禮部侍郎楊綰上疏請依古制縣令舉孝廉於刺史試其所通之學送名於省省試每經問義十條對策三道取其通否詔令左右丞諸司侍郎大夫中丞給舍等參議議者多與綰同至議曰夏之政尚忠殷之政尚敬周之政尚文然則文與忠敬皆統人之行也是故前代以文取士本行也由詞以觀行則及詞也宣父稱顏子不遷怒不二過謂之好學至乎修春秋則遊夏不能措一辭不亦明乎間者禮部取人有乖斯義試學者以帖字為精通而不窮旨義豈能知遷怒二過之道乎考文者以聲病為是非唯擇浮豔豈能知移風易俗化天下之事乎是以上失其源下襲其流乘流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子由是出焉臣弒其君子弒其父非一朝一夕之故其所由來者漸矣漸者何儒道不舉取士之失也夫一國之事繫一人之本謂之風贊揚其風繫卿大夫也卿大夫何嘗不出於士乎今取士試之小道不以遠者大者使干祿之徒趨馳末術是誘導之差也所以祿山一呼四海震蕩思明再亂十年不復向使禮讓之道弘仁義之風著則忠臣孝子比屋可封逆節不得而萌也人心不得而搖也且夏有天下四百載禹之道喪而殷始興焉殷有天下六百祀湯之法棄而周始興焉周有天下八百年文武之政弊而秦始并焉觀三代之選士任賢皆考實行故能風俗淳一運祚長遠秦坑儒士二代而亡漢興雜用三代之政弘四科之舉終彼四百豈非學行道扇化行於鄉里哉自魏至隋僅四百載竊號僭位德義不修是以子孫速顛享國咸促國家革魏晉梁隋之弊承夏殷周漢之業四隩既宅九州攸同覆幬生育德合天地安有捨皇王舉士之道從亂代取人之術此公卿大夫之辱也今西京有太學州縣有小學兵革一動生徒流離儒臣師氏祿廩無由貢士不稱行實胄子何嘗講習禮部每歲擢甲乙之第謂弘奬勸不其謬歟祇足以長浮薄之風啓僥幸之路矣其國子博士等望加員數厚其祿秩通儒碩生間居其職十道大郡量置太學館令博士出外兼領郡官召置生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉朝而行之夕見其利議者然之宰臣等奏以舉人舊業已成難於速改其今歲舉人望且依舊賈至所議來年允之廣德二年轉禮部侍郎是歲至以時艱歲歉舉人赴省者奏請兩都試舉人自至始也永泰元年加集賢院待制大曆初改兵部侍郎五年轉京兆尹兼御史大夫卒許景先常州義興人後徙家洛陽少舉進士授夏陽尉神龍初東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺纍遷給事中開元初每年賜射節級賜物屬年儉甚費府庫景先奏曰近以三九之辰頻賜宴射已著格令猶降綸言但古制不存禮章多闕官員纍倍帑藏未充水旱相仍繼之師旅既不足以觀德又未足以威邊耗國損人且為不急夫古之天子以射選諸侯以射飾禮樂以射觀容志故有騶虞貍首之奏采蘩采蘋之樂天子則以備官為節諸侯則以時會為節卿大夫以循法為節士以不失職為節皆審志固行德美事成陰陽克和暴亂不作故諸侯貢士亦試於射宮容體有虧則絀其地是諸侯君臣皆盡志於射射之禮也大矣哉今則不然衆官既多鳴鏑亂下以苟獲為利以偶中為能素無五善之容頗失三侯之禮冗官厚秩禁衛崇班動盈纍千其算無數近河南河北水潦處多林胡小蕃見寇郊壘軍書日至河朔騷然命將除凶未圖克捷興師十萬日費千金去歲豫亳兩州微遭旱損庸賦不辦以致流亡聖人憂勤降使招恤流離歲月猶未能安人之困窮以至於此今一箭偶中是一丁庸調用之既無惻隱獲之固無恥慚考古循今則為未可且禁衛武官隨番許射能中的者必有賞焉此則訓武習戎時習不闕待寇寧歲稔率由舊章則愛禮養人幸甚幸甚自是乃停賜射之禮俄轉中書舍人自開元初景先與中書舍人齊浣王丘韓休張九齡掌知制誥以文翰見稱中書令張説嘗稱曰許舍人之文雖無峻峯激流嶄絶之勢然屬詞豐美得中和之氣亦一時之秀也十年夏伊汝泛溢漂損居人廬舍溺死者甚衆景先言於侍中源乾曜曰災眚所降必資修德以禳之左傳所載降服出次即其事也誠宜發德音遣大臣存問憂人罪己以答天譴明公位存輔弼當發明大體以啓沃明主不可緘默也乾曜然其言遽以聞奏乃下詔遣戶部尚書陸象先往賑給窮乏十三年玄宗令宰臣擇刺史之任必在得人景先首中其選自吏部侍郎出為虢州刺史後轉岐州入拜吏部侍郎卒賀知章會稽永興人太子洗馬德仁之族孫也少以文詞知名舉進士初授國子四門博士又遷太常博士皆陸象先在中書引薦也開元十年兵部尚書張説為麗正殿修書使奏請知章及祕書員外監徐堅監察御史趙冬曦皆入書院同撰六典及文纂等纍年書竟不就後轉太常少卿十三年遷禮部侍郎加集賢院學士又充皇太子侍讀是歲玄宗封東嶽有詔應行從羣臣並留於谷口上獨與宰臣及外壇行事官登於嶽上齋宮之所初上以靈山清潔不欲喧繁召知章講定儀注因奏曰昊天上帝君位五方諸帝臣位帝號雖同而君臣異位陛下享君位於山上羣臣祀臣位於山下誠足垂範來葉為變禮之大者也然禮成於三獻亞終合於一處上曰朕正欲如是故問卿耳於是敕三獻於山上行事五方帝及諸神座於下壇行事俄屬惠文太子薨有詔禮部選挽郎知章取捨非允為門蔭子弟喧訴盈庭知章於是以梯登牆首出決事時人咸嗤之由是改授工部侍郎兼祕書監同正員依舊充集賢院學士俄遷太子賓客銀青光祿大夫兼正授祕書監知章性放曠善談笑當時賢達皆傾慕之工部尚書陸象先即知章之族姑子也與知章甚相親善象先常謂人曰賀兄言論倜儻真可謂風流之士吾與子弟離闊都不思之一日不見賀兄則鄙吝生矣知章晚年尤加縱誕無復規檢自號四明狂客又稱祕書外監遨遊里巷醉後屬詞動成卷軸文不加點咸有可觀又善草隸書好事者供其箋翰每紙不過數十字共傳寶之時有吳郡張旭亦與知章相善旭善草書而好酒每醉後號呼狂走索筆揮灑變化無窮若有神助時人號為張顛天寶三載知章因病恍惚乃上疏請度為道士求還鄉里仍捨本鄉宅為觀上許之仍拜其子典設郎曾為會稽郡司馬仍令侍養御制詩以贈行皇太子已下咸就執別至鄉無幾壽終年八十六肅宗以侍讀之舊乾元元年十一月詔曰故越州千秋觀道士賀知章器識夷淡襟懷和雅神清志逸學富才雄挺會稽之美箭蘊崑岡之良玉故飛名仙省侍講龍樓常靜默以養間因談諧而諷諫以暮齒辭祿再見款誠願追二老之蹤克遂四明之客允叶初志脫落朝衣駕青牛而不還狎白衣而長往丹壑非昔人琴兩亡惟舊之懷有深追悼宜加縟禮式展哀榮可贈禮部尚書先是神龍中知章與越州賀朝萬齊融揚州張若虛邢巨湖州包融俱以吳越之士文詞俊秀名揚於上京朝萬止山陰尉齊融崑山令若虛兗州兵曹巨監察御史融遇張九齡引為懷州司戶集賢直學士數子人間往往傳其文獨知章最貴神龍中有尉氏李登之善五言詩蹉跌不偶六十餘為宋州參軍卒席豫襄陽人湖州刺史固七世孫徙家河南豫進士及第開元中纍官至考功員外郎典舉得士為時所稱三遷中書舍人與韓休許景先徐安貞孫逖相次掌制誥皆有能名轉戶部侍郎充江南東道巡撫使兼鄭州刺史入為吏部侍郎玄宗謂之曰卿以前為考功職事修舉故有此授豫典選六年復有令譽天寶初改尚書左丞尋檢校禮部尚書封襄陽縣子玄宗幸溫泉宮登朝元閣賦詩羣臣屬和帝以豫詩為工手制褒美曰覽卿所進實詩人之首出作者之冠冕也豫與弟晉俱以詞藻見稱而豫性尤謹雖與子弟書疏及吏曹簿領未嘗草書謂人曰不敬他人是自不敬也或曰此事甚細卿何介意豫曰細猶不謹而況巨耶七載卒于位時年六十九疾篤謂其子曰吾亡三日斂斂日即葬勿更久留貽公私之煩家無餘財可賣所居聊備葬禮人嘉其達贈江陵大都督諡曰文徐安貞者信安龍丘人尤善五言詩嘗應制舉一歲三擢甲科人士稱之開元中為中書舍人集賢院學士上每屬文及作手詔多命安貞視草甚承恩顧纍遷中書侍郎天寶初卒齊浣定州義豐人少以詞學稱弱冠以制科登第釋褐蒲州司法參軍景雲二年中書令姚崇用為監察御史彈劾違犯先於風教當時以為稱職開元中崇復用為給事中遷中書舍人論駁書詔潤色王言皆以古義謨誥為準的侍中宋璟中書侍郎蘇頲並重之祕書監馬懷素右常侍元行沖受詔編次四庫羣書乃奏浣為編修使改祕書少監尋丁憂免十二年出為汴州刺史河南汴為雄郡自江淮達于河洛舟車輻輳人庶浩繁前後牧守多不稱職唯倪若水與浣皆以清嚴為治民吏歌之中書令張説擇左右丞之才舉懷州刺史王丘為左丞以浣為右丞李元紘杜暹為相以開府廣平公宋璟為吏部尚書又用戶部侍郎蘇晉與浣為吏部侍郎當時以為高選時開府王毛仲寵幸用事與龍武將軍葛福順為姻親故北門官見毛仲奏請無不之允皆受毛仲之惠進退隨其指使浣惡之乘間論之曰福順典兵馬與毛仲婚姻小人寵極則姦生若不預圖恐後為患惟陛下思之況腹心之委何必毛仲而高力士小心謹慎又是閹官便於禁中驅使臣雖過言庶裨萬一臣聞君不密則失臣臣不密則失身惟聖慮密之玄宗嘉其誠諭之曰卿且出朕知卿忠義徐俟其宜會大理丞麻察坐事出為興州別駕浣與察善出城餞之因語禁中諫語察性噂誻遽以浣語奏之玄宗怒令中書門下鞫問又召浣於內殿謂之曰卿向朕道君不密則失臣臣不密則失身而疑朕不密而翻告麻察是何密耶麻察輕險無行常遊太平之門此日之事卿豈不知耶浣免冠頓首謝罪乃貶高州良德丞又貶察為潯州皇化尉浣數年量移常州刺史二十五年遷潤州刺史充江南東道採訪處置使潤州北界隔吳江至瓜步沙尾紆匯六十里船繞瓜步多為風濤之所漂損浣乃移其漕路於京口塘下直渡江二十里又開伊婁河二十五里即達揚子縣自是免漂損之災歲減腳錢數十萬又立伊婁埭官收其課迄今利濟焉數年復為汴州刺史淮汴水運路自虹縣至臨淮一百五十里水流迅急舊用牛曳竹索上下流急難制浣乃奏自虹縣下開河三十餘里入于清河百餘里出清水又開河至淮陰縣北岸入淮免淮流湍險之害久之新河水復迅急又多僵石漕運難澀行旅弊之浣因高力士中助連為兩道採訪使遂興開漕之利以中人主意復勾剝貨財賂遺中貴物議薄之又納劉戒之女為妾凌其正室專制家政李林甫惡之遣人掎托其失會浣判官犯贓浣連坐遂廢歸田里天寶初起為員外少詹事留司東都時絳州刺史嚴挺之為林甫所搆除員外少詹事留司東都與浣皆朝廷舊德既廢居家巷每園林行樂則杖屨相過談宴終日林甫聞而患之欲離其勢五年用浣為平陽太守卒於郡肅宗即位為林甫所陷者皆得雪浣受褒贈王浣並州晉陽人少豪蕩不羈登進士第日以蒱酒為事並州長史張嘉貞奇其才禮接甚厚浣感之撰樂詞以情於席上自唱自舞神氣豪邁張説鎮並州禮浣益至會説復知政事以浣為祕書正字擢拜通事舍人遷駕部員外櫪多名馬家有妓樂浣發言立意自比王侯頤指儕類人多嫉之説既罷相出浣為汝州長史改仙州別駕至郡日聚英豪從禽擊鼓恣為歡賞文士祖詠杜華常在座於是貶道州司馬卒有文集十卷李雍廣陵江都人父善嘗受文選於同郡人曹憲後為左侍極賀蘭敏之所薦引為崇賢館學士轉蘭臺郎敏之敗善坐配流嶺外會赦還因寓居汴鄭之間以講文選為業年老疾卒所注文選六十卷大行於時雍少知名長安初內史李嶠及監察御史張廷圭並薦雍詞高行直堪為諫諍之官由是召拜左拾遺俄而御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付法推斷則天初不應雍在階下進曰臣觀宋璟之言事關社稷望陛下可其奏則天色稍解始允宋璟所請既出或謂雍曰吾子名位尚卑若不稱旨禍將不測何為造次如是雍曰不願不狂其名不彰若不如此後代何以稱也及中宗即位以妖人鄭普思為祕書監雍上書諫曰蓋人有感一餐之惠殞七尺之身況臣為陛下官受陛下祿而目有所見口不言之是負恩矣自陛下親政日近復在九重所以未聞在外羣下竊議道路籍籍皆云普思多行詭惑妄説妖祥唯陛下不知尚見驅使此道若行必撓亂朝政臣至愚至賤不敢以胸臆對揚天威請以古事為明證孔丘云詩三百一言以蔽之曰思無邪陛下今若以普思有奇術可致長生久視之道則爽鳩氏久應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武久應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武久應得之永有天下亦非陛下今日可得而求若以普思可致鬼道則墨翟干寶各獻於至尊矣而二主得之永有天下亦非陛下今日可得而求此皆事涉虛妄歷代無效臣愚不願陛下復行之於明時唯堯舜二帝自古稱聖臣觀所得故在人事敦睦九族平章百姓不聞以鬼神之道理天下伏願陛下察之則天下幸甚疏奏不納以與張柬之善出為南和令又貶富州司戶唐隆元年玄宗清內難召拜左臺殿中侍御史改戶部員外郎又貶崖州舍城丞開元三年擢為戶部郎中雍素與黃門侍郎張廷圭友善時薑皎用事與廷圭謀引雍為憲官事泄中書令姚崇嫉雍險躁因而搆成其罪左遷括州司馬後徵為陳州刺史十三年玄宗車駕東封回雍於汴州謁見纍獻詞賦甚稱上旨由是頗自矜衒自云當居相位張説為中書令甚惡之俄而陳州贓汙事發下獄鞫訊罪當死許州人孔璋上書救雍曰臣聞明主御宇捨過舉能取材棄行烈士抗節勇不避死見危授命晉用林父豈念過乎漢用陳平豈念行乎禽息殞身北郭碎首豈愛死乎向若林父誅陳平死百里不用晏嬰見逐是晉無赤狄之土漢無皇極之尊秦不並西戎齊不霸東海矣臣伏見陳州刺史李雍學成師範文堪經國剛毅忠烈難不苟免往者張易之用權人畏其口而雍折其角韋氏恃勢言出禍應而雍挫其鋒雖身受謫屈而姦謀中損即雍有大造於我邦家也且斯人所能者拯孤恤窮救乏賑惠積而便散家無私聚今聞坐贓下吏鞫訊待報將至極刑死在朝夕臣聞生無益於國不若殺身以明賢臣朽賤庸夫輪轅無取獸息禽視雖生何為況賢為國寶社稷之衛是臣痛惜深矣臣願六尺之軀甘受膏斧以代雍死臣之死所謂落一毛雍之生有足照千里然臣與雍生平不款臣知有雍雍不知有臣臣不逮雍明矣夫知賢而舉仁也代人任患義也臣獲二善而死且不朽則又何求陛下若以臣之賤不足以贖雍鴈門縫掖有效矣伏惟陛下寬雍之生速臣之死令雍率德改行想林父之功使臣得瞑目黃泉附北郭之迹臣之大願畢矣陛下即以陽和之始難於用鉞俟天成命敢忘伏劍豈煩大刑然後歸死皇天后土實照臣之心昔吳楚七國叛因亞夫得劇孟則寇不足憂夫以一賢之能敵七國之衆伏惟敷含垢之道存棄瑕之義遠思劇孟近取李雍豈惟成愷悌之澤實亦歸天下之望況大禮之後天地更新赦而復論人誰無罪惟明主圖之臣聞士為知己者死且臣不為死者所知甘於死者豈獨為惜雍之賢亦成陛下矜能之德惟明主圖之疏奏雍已會減死貶為欽州遵化縣尉璋亦配流嶺南而死雍後於嶺南從中官楊思勗討賊有功又纍轉括淄滑三州刺史上計京師雍素負美名頻被貶斥皆以雍能文養士賈生信陵之流執事忌勝剝落在外人間素有聲稱後進不識京洛阡陌聚觀以為古人或將眉目有異衣冠望風尋訪門巷又中使臨問索其新文復為人陰中竟不得進天寶初為汲郡北海二太守雍性豪侈不拘細行所在縱求財貨馳獵自恣五載姦贓事發又嘗與左驍衛兵曹柳績馬一匹及績下獄吉溫令績引雍議及休咎厚相賂遺詞狀連引敕刑部員外郎祁順之監察御史羅希奭馳往就郡決殺之時年七十餘初雍早擅才名尤長碑頌雖貶職在外中朝衣冠及天下寺觀多齎持金帛往求其文前後所製凡數百首受納饋遺亦至巨萬時議以為自古鬻文獲財未有如雍者有文集七十卷其張韓公行狀洪州放生池碑批韋巨源諡議文士推重之後因恩例得贈祕書監孫逖潞州涉縣人曾祖仲將壽張丞祖希莊韓王府典籤父嘉之天册年進士擢第又以書判拔萃授蜀州新津主簿歷曲周襄邑二縣令以宋州司馬致仕卒年八十三逖幼而英俊文思敏速始年十五謁雍州長史崔日用日用小之令為土火爐賦逖握翰即成詞理典贍日用覽之駭然遂為忘年之交以是價譽益重開元初應哲人奇士舉授山陰尉遷祕書正字十年應制登文藻宏麗科拜左拾遺張説尤重其才逖日遊其門轉左補闕黃門侍郎李皓出鎮太原辟為從事皓在鎮與蒲州刺史李尚隱遊于伯樂川逖為之記文士盛稱之二十一年入為考功員外郎集賢修撰逖選貢士二年多得俊才初年則杜鴻漸至宰輔顏真卿為尚書後年拔李華蕭穎士趙驊登上第逖謂人曰此三人便堪掌綸誥二十四年拜逖中書舍人逖自以通籍禁闈其父官才邑宰乃上表陳情曰臣父嘉之雖當暮齒幸遇明時綿歷驅馳才及令長臣夙荷嚴訓纍登清秩頻遷省闥又拜掖垣地近班榮臣則過量途遙日暮父乃後時在公府有偷榮之責於私庭無報德之效反慚烏鳥徒廁鴛鴻伏望降臣一外官特乞微恩稍霑臣父玄宗優詔奬之授嘉之宋州司馬致仕尋卒丁父喪免二十九年服闋復為中書舍人其年充河東黜陟使天寶三載權判刑部侍郎五載以風病求散秩改太子左庶子逖掌誥八年制敕所出為時流歎服議者以為自開元已來蘇頲齊浣蘇晉賈曾韓休許景先及逖為王言之最逖尤善思文理精練加之謙退不伐人多稱之以疾沉廢纍年轉太子詹事上元中卒廣德二年詔贈尚書右僕射諡曰文有集三十卷子宿絳成逖弟遹遘造遹終左武衛兵曹宿歷河東掌記代宗朝歷刑部郎中中書舍人出為華州刺史卒成字退思以父蔭纍授雲陽長安尉歷監察御史轉殿中隴右副元帥李抱玉奏充掌書記入為屯田司勳二員外郎丁母喪免終制出為洛陽令轉長安令時兄宿為華州刺史因失火驚懼成瘖病成素孝悌蒼黃請急不俟報而趨華代宗嘉之歎曰急難之切觀過知仁歷倉部郎中京兆少尹出為信州刺史有惠政郡人請立碑頌德優詔褒美轉蘇州刺史貞元四年改桂州刺史桂管觀察使五年卒宿子公器官至信州刺史雍管經略使公器子簡範並舉進士會昌後兄弟繼居顯秩歷諸道觀察使簡兵部尚書子紓徽並登進士第
