body:
  text: 舊唐書卷三十六志第十六天文下天文之為十二次所以辨析天體紀綱辰象上以考七曜之宿度下以配萬方之分野仰觀變謫而驗之於郡國也傳曰歲在星紀而淫于玄枵姜氏任氏實守其地及七國交爭善星者有甘德石申更配十二分野故有周秦齊楚韓趙燕魏宋衞魯鄭吳越等國張衡蔡邕又以漢郡配焉自此因循但守其舊文無所變革且懸象在上終天不易而郡國沿革名稱屢遷遂令後學難為憑準貞觀中李淳風撰法象志始以唐之州縣配焉至開元初沙門一行又增損其書更為詳密既事包今古與舊有異同頗裨後學故錄其文著于篇幷配武德以來交蝕淺深及注蝕不虧以紀日月之變云爾須女虛危玄枵之次子初起女五度二千三百七十四分秒四少中虛九度終危十二度其分野自濟北郡東踰濟水涉平陰至于山茌漢太山郡山茌縣屬齊州西南之界東南及高密漢高密國今在密州北界自此以上玄枵之分東盡東萊之地漢之東萊郡及膠東國今為萊州登州也又得漢之北海千乘淄川濟南齊郡今為淄青齊等州及濟州東界及平原渤海盡九河故道之南濱于碣石今為德州棣州滄州其北界自九河故道之北屬析木分也營室東壁陬訾之次亥初起危十三度二千九百二十六分太中室十二度五百五十分秒二十一半終奎一度其分野自王屋太行而東盡漢河內之地今為懷州洺衞州之西境北負漳鄴東及館陶聊城漢地自黎陽內黃及鄴魏武安東至館陶元城皆屬魏郡自頓邱三城武陽東至聊城皆屬東郡今為相魏衞州東盡漢東郡之地漢東郡清河西南至白馬濮陽東至東河須昌濱濟至于鄆城今為滑州濮州鄆州其須昌濟東之地屬降婁非豕韋也奎婁及胃降婁之次戌初起奎二度一千二百一十七分秒十七少中婁一度一千八百八十三終胃三度其分野南屆鉅野東達梁父以負東海又東至于呂梁乃東南抵淮水而東盡于徐夷之地東為降婁之次得漢東平魯國漢東平國在任城平陸今在兗州奎為大澤在陬訾之下流濱于淮泗東北負山為婁胃之墟蓋中國膏腴之地百穀之所阜也胃星得馬牧之氣與冀之北土同占昴畢大梁之次畢酉初起胃四度二千五百四十九分秒八太中昴六度一百七十四分半終畢九度其分野自魏郡濁漳之北得漢之趙國廣平鉅鹿常山東及清河信都北據中山真定今為洺趙邢恆定冀貝深八州又分相魏博之北界與瀛州之西全趙之分又北盡漢代郡鴈門雲中定襄之地與北方羣狄之國皆大梁分也觜觿參伐實沈之次也申初起畢十度八百四十一分十五太中參七度一千五百二十六終井十一度其分野得漢河東郡今為蒲絳晉州又得澤州及慈州界也及上黨今為澤潞儀沁也太原今為幷汾州盡西河之地今為隰州石州嵐州西涉河得銀州以北也又西河戎狄之國皆實沈分也今河東郡永樂芮城河北縣及河曲豐勝夏州皆為實沈之次東井之分也參伐為戎索為武政故殷河東盡大夏之墟上黨次居下流與趙魏相接為觜觿之分東井輿鬼鶉首之次也未初起井十二度二千一百七十二秒十五太中井二十七度二千八百二十八分秒一半終柳六度其分野自漢之三輔及北地上郡安定西自隴坻至河西西南盡巴蜀漢中之地及西南夷犍為越嶲益州郡極南河之表東至柯皆鶉首分也鶉首之分得禹貢雍梁二州其郡縣易知故不詳載狼星分野在江河上源之西弧矢犬雞皆徼外之象今之西羌吐蕃蕃渾及西南徼外夷皆狼星之象柳星張鶉火之次午初起柳七度四百六十四秒七少中七星七度一千一百三終張十四度其分野北自滎澤滎陽並京索暨山南得新鄭密縣至於方陽方陽之南得漢之潁川郡陽翟崇高郟城襄城南盡鄴縣今為鄧汝唐仙四州界又漢南陽郡北自宛葉南盡漢東申隨之地大抵以淮源桐柏東陽為限今之唐州隨州屬鶉火申州屬壽星又自洛邑負河之南西及函谷南紀達武當漢水之陰盡弘農郡漢弘農盧氏陝縣今為虢陝二州上洛商洛為商州丹水為均州宜陽沔池新安陸渾今屬洛州古成周虢鄭管鄶東虢密滑焦唐申鄧皆鶉火分也及祝融氏之都新鄭為祝融氏之墟屬鶉火其東鄙則入壽星舊說皆在函谷非也柳星輿鬼之東又接漢源故殷商洛之陽接南河之上流七星上係軒轅得土行之正位中岳象也故為河南之分張星直河南漢東與鶉尾同占翼軫鶉尾之次巳初起張十五度一千七百九十五秒二十二少中翼十二度二千四百六十一秒八半終軫九度其分野自房陵白帝而東盡漢之南郡南郡巫縣今在夔州秭歸在西夷陵在峽州襄夔郢申在襄郢界餘為荊州江夏江夏竟陵今為復州安鄂蘄沔黃五州皆漢江夏界東達廬江南郡漢廬江之尋陽今在江州於山河之像宜屬鶉尾也濱彭蠡之西得漢長沙武陵桂陽零陵郡零陵今為道州永州桂陽今為郴州大抵自沅湘上流西通黔安之左皆楚之分也又逾南紀盡鬱林合浦之地鬱林縣今在貴州定林縣今在廉州合浦縣今為桂州今自富昭蒙龔繡容白罕八州以西皆屬鶉尾之墟也荊楚鄖鄀羅權巴夔與南方蠻貊殷河南之南其中一星主長沙國逾嶺徼而南皆甌東青丘之分今安南諸州在雲漢上源之東宜屬鶉火角亢壽星之次辰初起軫十度八十七秒十四半中角八度七百五十秒三十終氐一度其分野自原武管城濱河濟之南東至封邱陳留盡陳蔡汝南之地逾淮源至于弋陽漢陳留郡自封邱陳留已東皆入大火之分漢汝南今為豫州西華南頓項城縣今為陳州汝陰縣今在潁州弋陽縣在光州西涉南陽郡至于桐柏又東北抵嵩之東陽漢南陽郡舂陵湖陽蔡陽後分為舂陵郡後魏以為南荊州今有舊義陽郡在申國之東界今為申州按中國地絡在南北河之間故申隨光三州皆屬禹貢豫州之分宜屬鶉火壽星非南方負海之地古陳蔡隨許皆屬壽星分也氐星涉壽星之次故其分野殷雒邑衆山之東與亳土相接氐房心大火之次也卯初起氐二度一千四百一十九分秒五太中房二度二千八百五分秒一半終尾六度其分野得漢之陳留縣自雍丘襄邑小黃而東循濟陰界于齊魯右泗水達於呂梁乃東南抵淮西南接太昊之墟盡濟陰山陽楚國豐沛之地濟陰郡之定陶冤句乘氏今在東郡大抵曹宋徐亳及鄆州西界皆屬大火分自商亳以負北河陽氣之所升也為心分自豐沛以負南河陽氣之所布也為房分故其下流皆與尾星同占西接陳鄭為氐星之分尾箕析木之次也寅初起尾七度二千七百五十分秒二十一少中箕星五度三百七十分秒六十七終斗八度其分野自渤海九河之北盡河間涿郡廣陽國漢渤海郡浮陽今為清池縣屬滄州涿郡之饒陽今屬瀛州涿縣良鄉與廣陽國薊縣今在幽州及上谷漁陽右北平遼東樂浪玄菟漁陽在幽州右北平在白狼無終縣隋代為漁陽郡古孤竹國後置北平郡今為平州遼東在無慮縣即周禮醫無閭山樂浪在朝鮮縣玄菟在高句驪縣今皆在東夷也古之北燕孤竹無終及東方九夷之國皆析木之分也尾得雲漢之末流北紀之所窮也箕與南斗相近故其分野在吳越之東南斗牽牛星紀之次也丑初起斗九度一千四十二十分秒二太中斗二十四度一千一百分秒八半終女四度其分野自廬江九江負淮水之南盡臨淮廣陵至于東海廬壽和濠揚皆屬星紀也又逾南河得漢丹陽會稽豫章郡西濱彭蠡南涉越州盡蒼梧南海又逾嶺表自韶廣封梧藤羅雷州南及珠崖自北以東為星紀其西皆屬鶉尾之次古吳越及東南百越之國皆星紀分也南斗在雲漢之下流當淮海之間為吳分牽牛去南河寖遠故其分野自豫章東達會稽南逾嶺徼為越分島夷蠻貊之人聲教之所不洎皆係于狗國李淳風刊定隋志郡國頗為詳悉所注郡邑多依用其後州縣又隸管屬不同但據山河以分耳災異武德元年十月壬申朔四年八月丙戌朔六年十二月壬寅朔九年十月丙辰朔貞觀元年閏三月癸丑朔九月庚戌朔二年三月戊申朔三年八月己巳朔四年閏正月丁卯朔六年正月乙卯朔九年四月丙寅朔十一年三月丙戌朔十二年閏二月庚辰朔十三年八月辛未朔十七年六月己卯朔十八年十月辛丑朔二十年閏三月癸巳朔二十二年八月己酉朔高宗顯慶五年六月庚午朔乾封二年八月己酉朔總章二年六月戊申朔咸亨元年六月壬寅朔二年十一月甲午朔三年十一月戊子朔上元元年三月辛亥朔二年九月壬寅朔調露二年四月乙巳朔十一月壬寅朔開耀元年十月丙寅朔永淳元年四月甲子朔十一月庚申朔則天垂拱二年二月辛未朔四年六月丁亥朔天授二年四月壬寅朔如意元年四月丙申朔長壽二年九月丁亥朔三年九月壬午朔延載元年九月壬午朔證聖元年二月己酉朔聖曆三年五月乙酉朔久視元年五月己酉朔長安二年九月乙丑朔三年三月壬戌朔九月庚寅朔中宗神龍三年六月丁卯朔景龍元年十二月乙丑朔睿宗太極元年二月丁卯朔玄宗先天元年九月丁卯朔開元三年七月庚辰朔六年五月乙丑朔九年五月乙巳朔十二年閏十二月壬辰朔十七年十月丙午朔二十年二月癸酉朔八月辛未朔二十一年七月乙丑朔二十二年十二月戊子朔二十三年閏十一月壬午朔二十六年九月丙申朔二十八年三月丁亥朔天寶元年七月癸卯朔五載五月壬子朔十三載六月乙丑朔肅宗至德元載十月辛巳朔上元二年七月癸未朔蝕既大星皆見代宗大曆三年三月乙巳朔四年正月十五日甲午蝕十三年甲戌有司奏合蝕不蝕十四年二月丙寅朔德宗貞元三年八月辛巳朔日蝕有司奏准禮請伐鼓于社不許太常卿董晉諫曰伐鼓所以責羣陰助陽德宜從經義竟不報六年正月戊戌朔有司奏合蝕不蝕百僚稱賀七年六月庚寅朔有司奏蝕是夜陰雲不見百官表賀八年十一月壬子朔先是司天監徐承嗣奏據曆合蝕八分今退蝕三分准占君盛明則陰匿而潛退請書于史從之十年四月癸卯朔有司奏太陽合虧巳正後刻蝕之既未正後五刻復滿太常奏准禮上不視朝其日陰雲不見百官表賀十七年五月壬戌蝕元和三年七月癸巳蝕憲宗謂宰臣曰昨司天奏太陽虧蝕皆如其言何也又素服救日其儀安在李吉甫對曰日月運行遲速不齊日凡周天三百六十五度有餘日行一度月行十三度有餘率二十九日半而與日會又月行有南北九道之異或進或退若晦朔之交又南北同道即日為月之所掩故名薄蝕雖自然常數可以推步然日為陽精人君之象若君行有緩有急即日為之遲速稍踰常度為月所掩即陰浸於陽亦猶人君行或失中應感所致故禮云男教不修陽事不得謫見于天日為之蝕古者日蝕則天子素服而修六官之職月蝕則后素服而修六宮之職皆所以懼天戒而自省惕也人君在民物之上易為驕盈故聖人制禮務乾恭兢惕以奉若天道苟德大備天人合應百福斯臻陛下恭己向明日慎一日又顧憂天譴則聖德益固升平何遠伏望長保睿志以永無疆之休上曰天人交感妖祥應德蓋如卿言素服救日自貶之旨也朕雖不德敢忘兢惕卿等當匡吾不迨也十年八月己亥朔十三年六月癸丑朔長慶二年四月辛酉朔三年九月壬子朔大和八年二月壬午朔開成二年十二月庚寅朔當蝕陰雲不見會昌三年二月庚申朔四年二月甲寅朔五年七月丙午朔六年十二月戊辰朔皆蝕武德九年二月二十三日夜星孛于胃昴間凡二十八日又孛于卷舌貞觀八年八月二十三日星孛于虛危歷于玄枵凡十一日而滅太宗謂侍臣曰是何妖也虞世南對曰齊景公時有彗星晏子對曰公穿池畏不深築臺恐不高行刑恐不重是以彗為誡耳景公懼而修德十六日而星滅臣聞若德政不修麟鳳數見無所補也苟政教無闕雖有災愆何損於時伏願陛下勿以功高古人而矜大勿以太平日久而驕逸慎終如始彗何足憂帝深嘉之十三年三月二十二日夜星孛于畢昴十五年六月十九日星孛於太微犯郎位七月甲戌滅總章元年四月彗見五車上避正殿減膳令內外五品已上上封事極言得失許敬宗曰星雖孛而光芒小此非國眚不足上勞聖慮請御正殿復常膳不從敬宗又進曰星孛于東北王師問罪高麗將滅之徵帝曰我為萬國主豈移過於小蕃哉二十二日星滅上元二年十月彗見于角亢南長五尺三年七月二十一日彗見東井指南河積薪長三尺餘漸向東北光芒益長三丈掃中台指文昌經五十八日而滅永隆二年九月一日萬年縣女子劉凝靜乘白馬著白衣男子從者八九十人入太史局升令廳牀坐勘問比有何災異太史令姚玄辯執之以聞是夜彗見西方天市中長五尺漸小向東行出天市至河鼓右旗十七日滅永淳二年三月十八日彗見五車之北凡二十五日而滅文明元年七月二十二日西方有彗長丈餘凡四十九日滅光宅元年九月二十九日有星如半月見西方景龍元年十月十八日彗見西方凡四十三日而滅二年二月天狗墜于西南有聲如雷野雉皆雊七月七日星孛胃昴之間三年八月八日星孛于紫宮太極元年七月四日彗入太微開元十八年六月十一日彗見五車三十日星孛于畢昴二十六年三月八日星孛于紫微垣歷斗魁十餘日陰雲不見武德元年六月三日熒惑犯左執法八年九月二十二日熒惑入太微九年五月傅奕奏太白晝見于秦秦國當有天下高祖以狀授太宗及太宗即位召奕謂曰汝前奏事幾累我然而今後但須悉心盡言無以前事為慮貞觀十三年五月熒惑犯右執法十五年二月十五日熒惑逆犯太微東藩上相十七年三月七日熒惑守心前星十九日退其月二十二日熒惑犯句陳九月二十九日熒惑犯太微西藩上將十九年九月二十四日太白在太微犯左執法光芒相及永徽三年六月二日熒惑犯右執法三日太白入太微犯右執法顯慶五年二月三日熒惑入南斗龍朔元年九月十四日太白犯太微左執法乾封二年五月熒惑入軒轅咸亨元年十二月熒惑入太微上元二年正月九日熒惑犯房星儀鳳四年四月九日熒惑犯羽林調露二年五月二十四日太白經天長安四年熒惑入月及鎮星犯天關太史令嚴善思奏法有亂臣伏罪臣下謀上之變歲餘誅二張五王立中宗景龍三年六月八日太白晝見于東井景雲二年三月二十七日太白入羽林太極元年三月三日熒惑入東井四月十二日熒惑與太白守東井先天元年八月十四日夜月蝕盡有星入月魄中十六日太白襲月開元十年七月二十九日熒惑入南斗天寶十三載五月熒惑守心五十餘日至德元載十一月二十六日熒惑太白同犯昴武德二年三月二十七日太白辰鎮聚于東井九年六月十八日辰歲會于東井二十三日辰歲太白又會于東井貞觀十八年五月太白辰合于東井景雲二年七月太白鎮同在張宿武德三年十月三十日有流星墜於東都城內殷殷有聲高祖謂侍臣曰此何祥也起居舍人令狐德棻曰昔司馬懿伐遼有流星墜于遼東梁水上尋而公孫淵敗走晉軍追之至其星墜處斬之此王世充滅亡之兆也貞觀十八年五月有流星大如斗五日出東壁光照地聲如雷咸亨三年二月三日有流星如雷景龍二年二月十九日大星墜于西南聲如雷野雉皆雊景雲二年八月十七日東方有流星出五車至于上台天寶三載閏二月十七日星墜于東南有聲京師訛言官遣棖棖捕人肝以祭天狗人相恐畿內尤甚景龍元年九月十八日有赤氣竟天其光燭地經三日乃止九月四日黃霧昏唐隆元年六月八日虹蜺竟天災異編年至德後至德元年三月乙酉歲太白熒惑合于東井十月辛丑朔日有食之十一月壬戌五更有流星大如斗流于東北長數丈蛇行屈曲有碎光迸空乾元元年四月熒惑鎮太白合於營室太史南宮沛奏所合之處戰不勝大人惡之恐有喪禍明年冬郭子儀等九節度之師自潰於相州五月癸未夜一更三籌月掩心前星二更四籌方出六月癸丑月入南斗魁二年二月丙辰月犯心前大星相去三寸三年四月丁巳夜五更彗出東方色白長四尺在婁胃間疾行向東北角歷昴畢觜參井鬼柳軒轅至太微右執法七寸所凡五十餘日方滅閏四月辛酉朔妖星見于南方長數丈是時自四月初大霧大雨至閏四月末方止是月逆賊史思明再陷東都米價踊貴斗至八百文人相食殍尸蔽地上元元年十二月癸未夜歲掩房星二年七月癸未朔日有蝕之大星皆見司天秋官正瞿曇譔奏曰癸未太陽虧辰正後六刻起虧巳正後一刻既午前一刻復滿虧於張四度周之分野甘德云日從巳至午蝕為周周為河南今逆賊史思明據乙巳占曰日蝕之下有破國其年九月制去上元之號單稱元年月首去正二三之次以建冠之其年建子月癸巳亥時一鼓二籌後月掩昴出其北兼白暈畢星有白氣從北來貫昴司天監韓穎奏曰按石申占月掩昴胡王死又月行昴北天下福臣伏以三光垂象月為刑殺之徵二石殲夷史官常占畢昴為天綱白氣兵喪掩其星則大破胡王行其北則天下有福巳為周分癸主幽燕當羯胡竊據之郊是殘寇滅亡之地明年史思明為其子朝義所殺十月雍王收復東都上元三年正月時去上元之號今存之以正年建辰月肅宗病是月丙戌月上有黃白冠連成暈東井五諸侯南北河輿鬼皆在中建巳月以楚州獻定國寶乃改元寶應月復以正二三為次其月肅宗崩代宗即位其月壬子夜西北方有赤光見炎赫亙天貫紫微漸流于東瀰漫北