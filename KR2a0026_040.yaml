四日夜月去太微東垣之南首星南一尺所癸酉夜月去五諸侯之西第四星南七寸所十月己丑熒惑順行去太微西垣之南首星西北四寸所九年二月丁酉月去心大星東北七寸所四月辛巳北方有大流星跡尾長五丈光芒照地至右攝提南三尺所九月己丑月掩軒轅十二年正月戊子彗出畢南長二尺餘指西南凡三日近參旗沒十三年正月乙未歲星退行近太微西垣之南第一星八月己未月近南斗魁壬戌太白順行近太微十四年正月己丑月近東井北轅星癸卯夜月近南斗魁星五月庚寅月犯心前大星西南一尺所十五年正月二十七日憲宗崩穆宗即位七月庚申熒惑退行入羽林癸亥夜大星出勾陳南流至婁北滅八月己卯月掩牽牛長慶元年正月丙午月掩鉞星二更後月去東井南轅第一星南七寸丙辰南方大流星色赤尾有跡長三丈光明燭地出狼星北二尺所東北流至七星三尺所滅己未夜星孛于翼丁卯夜星孛在辰上去太微西垣南第一星七寸所二月八日夜太白犯昴東南五寸所丁亥夜月犯歲星南六寸所在尾十三度三月庚戌太白犯五車東南七寸所七月壬寅月掩房次相星乙丑夜東方大流星色黃有尾跡長六七丈光明燭地出參西北向西流至羽林東北滅其月幽州軍亂囚其帥張弘靖立朱克融其月二十八日鎮州軍亂殺其帥田弘正王廷湊元和末河北三鎮皆以疆土歸朝廷至是幽鎮俱失俄而史憲誠以魏州叛三鎮復為盜據連兵不息八月辛巳夜東北有大星自雲中出流白光照地前後長丈二尺五寸西北入蜀滅太白在軒轅左角西北一尺所是月壬辰夜太白去太微垣南第一星一尺所九月戊戌夜太白順行入太微去左執法星西北一尺所乙巳夜去左執法二寸所辛亥月去天關西北八寸二年正月戊申魏帥田布伏劍死史憲誠據郡叛二月甲戌夜熒惑在歲星南七寸所四月辛酉朔日有蝕之在胃十二度不盡者四之一燕趙見之既七月丙子夜東方大星西流至昴滅其聲如雷十月甲子夜月掩牽牛中星乙丑夜太白去南斗魁第四星西一寸所十一月丁丑月掩左角庚辰月去房一尺所十二月丁亥月掩左角庚戌夜月近房星壬子五更後月近太白相去一尺所四年正月二十二日穆宗崩敬宗即位二月癸卯太白犯東井近北轅三月甲子熒惑犯鎮星壬申太白犯東井近北轅四月十七日染院作人張韶於柴草車中載兵器犯銀臺門共三十七人入大內對食於清思殿其日禁兵誅之七月乙卯夜有大星出于天船流犯斗魁第一星西南滅八月丁亥熒惑犯鎮星癸未熒惑入東井己丑太白犯軒轅右角十二月戊子夜月掩東井甲午夜西北有流星出閣道至北極滅寶曆元年七月乙酉月犯西咸去八寸所甲子夜月掩畢閏七月癸巳夜月去心距九寸庚子流星去北極至南斗柄滅八月乙卯太白犯房相去九寸九月癸未太白犯南斗丙戌月犯畢甲午月犯太微左執法十月辛卯月犯天囷相去七寸癸亥太白臨哭星相去九寸十一月庚辰鎮星犯東井相去七寸癸未夜月去東井六寸戊戌西南大流星出羽林入濁十二月戊申夜月犯畢乙酉夜西北方有霧起須臾徧天霧上有赤氣其色或深或淺久而方散二年正月甲戌夜北方大流星長五丈餘出紫微過軫滅甲申月犯右執法相去五寸二月丙午夜月犯畢三月己巳流星出河鼓東過天市入濁滅四月甲子夜西方大流星長三丈穿天市垣至房星滅其月十七日白虹貫日連環至午方滅五月甲戌月去太微八寸所癸巳西北方大流星長三丈光明照地入天市垣中滅甲午五更熒惑犯昴六月庚申太白犯昴七月壬申流星長二丈出斗北入濁滅其夜月初入巳上有流星向南滅其夜辰犯畢八月丙申夜北方大流星長四丈餘出王良流至北斗柄滅甲辰夜太白去太微八寸所丁未夜熒惑近鎮星西北丁丑熒惑去輿鬼七寸十二月八日夜敬宗為內官劉克明所弒立絳王樞密使王守澄等殺絳王立文宗大和元年九月戊寅月掩東井南轅星四年四月辛酉夜四更五籌後月掩南斗第二星十一月辛未朔熒惑犯右執法西北五寸五年二月宰相宋申錫漳王被誣得罪八年二月朔日有蝕之六月辛巳五更有六流星赤色有尾跡光明照地珠子散落出河鼓北流近天棓滅有聲如雷七月己巳夜流星出紫微西北長二丈至北斗第一星滅是夜五更月犯昴九月辛亥夜五更太微宮近郎位有彗星長丈餘西指西北行凡九夜越郎位星西北五尺滅癸丑月入南斗庚申右軍中尉王守澄宣召鄭注對於浴殿門是夜彗星出東方長三尺芒耀甚猛十二月丙戌夜月掩昴九年三月乙卯京師地震四月辛丑大風震雷拔殿前古樹六月庚寅夜月掩歲星丁酉夜一更至四更流星縱橫旁午約二十餘處多近天漢其年十一月李訓謀殺內官事敗中尉仇士良殺王涯鄭注李訓等十七家朝臣多有貶逐開成元年正月甲辰太白掩西建第一星其月十五日日有蝕之二月乙亥夜四更京師地震二年二月丙午夜彗出東方長七尺餘在危初度西指戊申夜危之西南彗長七尺芒耀愈猛亦西指癸丑夜彗在危八度庚申夜在虛三度半辛酉夜彗長丈餘直西行稍南指在虛一度半壬戌夜彗長二丈其廣三尺在女九度癸亥夜彗愈長廣在女四度三月甲子朔其夜彗長五丈岐分兩尾其一指氐其一掩房在斗十度丙寅夜彗長六丈尾無岐北指在亢七度文宗召司天監朱子容問星變之由子容曰彗主兵旱或破四夷古之占書也然天道懸遠唯陛下修政以抗之乃敕尚食今後每日御食料分為十日其夜彗長五丈闊五尺却西北行東指戊辰夜彗長八丈有餘西北行東指在張十四度詔天下放繫囚撤樂減膳避正殿先是羣臣拜章上徽號宜並停癸未夜彗長三尺出軒轅之右東指在張七度六月河陽軍亂逐李詠是歲夏蝗大旱八月丁酉彗出虛危之間十月地南北震三年十月十九日彗見長二丈餘二十日夜長二丈五尺二十一日夜長三丈二十二日夜長三丈五尺並在辰上西指軫魁十一月乙卯朔是夜彗出東方東西竟天五月五日太白犯輿鬼六月一日太白犯熒惑二十八日太白犯右執法十月七日太白犯南斗四年正月丁巳熒惑太白辰聚于南斗癸酉彗出于西方在室十四度閏月二十三日又見于卷舌北凡三十三日至二十六日夜滅二月二十六日自夜四更至五更四方中央流星大小二百餘並西流有尾跡長二丈三月乙酉夜月掩東井第三星是歲夏大旱禱祈無應文宗憂形于色宰臣進曰星官言天時當爾乞不過勞聖慮帝改容言曰朕為人主無德庇人比年災旱星文謫見若三日內不雨朕當退歸南內卿等自選賢明之君以安天下宰相楊嗣復等嗚咽流涕不已七月辛丑月犯熒惑河南大水八月辛未流星出羽林有尾跡長十丈有聲如雷十月辛酉辰入南斗魁五年正月文宗崩武宗即位會昌元年六月二十九日從一鼓至五鼓小流星五十餘交橫流散七月二日北方流星光明照地東北流星有聲如雷九月癸巳熒惑犯輿鬼閏九月丁酉熒惑貫鬼宿戊戌在鬼中十一月六日彗見西南在室初度凡五十六日而滅其夜上方大流星光明燭地東北流星有聲二年六月乙丑熒惑犯歲星丙寅太白犯東井其夜熒惑蒼赤色動搖於井中至八月十六日犯輿鬼五年二月五日太白掩昴北側在昴宿一度五月辛酉太白入畢口距星東南一尺八月七日太白犯軒轅大星舊儀太史局隸祕書省掌視天文曆象則天朝術士尚獻輔精於曆算召拜太史令獻輔辭曰臣山野之人性靈散率不能屈事官長天后惜其才久視元年五月十九日敕太史局不隸秘書省自為職局仍改為渾天監至七月六日又改為渾儀監長安二年八月獻輔卒復為太史局隸秘書省緣進所置官員並廢景龍二年六月改為太史監不隸祕書省景雲元年七月復為太史局隸秘書省八月又改為太史監十一月又改為太史局二年閏九月改為渾儀監開元二年二月改為太史監十五年正月改為太史局隸秘書省天寶元年又改為太史監乾元元年三月改太史監為司天臺於永寧坊張守珪故宅置敕曰建邦設都必稽玄象分列曹局皆應物宜靈臺三星主觀察雲物天文正位在太微西南今興慶宮上帝廷也考符之所合置靈臺宜令所司量事修理舊臺在秘書省之南仍置五官正五人司天臺內別置一院曰通玄院應有術藝之士徵辟至京于崇玄院安置其官員大監一員正三品少監二人正四品丞三人正六品主簿三人主事二人五官正五人五官副正五人靈臺郎一人五官保章正五人五官挈壺正五人五官司曆五人五官司辰十五人觀生曆生七百二十六人凡官員六十六人寶應元年司天少監瞿曇譔奏曰司天丞請減兩員主簿減兩員主事減一員保章正減三員挈壺正減三員監候減兩員司辰減七員五陵司辰減五員從之天寶十三載三月十四日敕太史監官除朔望朝外非別有公事一切不須入朝及充保識仍不在點檢之限開成五年十二月敕司天臺占候災祥理宜秘密如聞近日監司官吏及所由等多與朝官幷雜色人交游既乖慎守須明制約自今已後監司官吏不得更與朝官及諸色人等交通往來委御史臺察訪
