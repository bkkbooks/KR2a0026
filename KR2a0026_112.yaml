body:
  text: 舊唐書卷一百八列傳第五十八韋見素子諤益益子顗崔圓崔渙子縱杜鴻漸韋見素字會微京兆萬年人父湊開元中太原尹見素學科登第景龍中解褐相王府參軍歷衛佐河南府倉曹丁父憂服闋起為大理寺丞襲爵彭城郡公坐事出為坊州司馬入為庫部員外郎加朝散大夫歷右司兵部二員外左司兵部二郎中遷諫議大夫天寶五年充江西山南黔中嶺南等黜陟使觀省風俗彈糾長吏所至肅然使還拜給事中駁正繩違頗振臺閣舊典尋檢校尚書工部侍郎改右丞九載遷吏部侍郎加銀青光祿大夫見素仁恕長者意不忤物及典選纍年銓平允人士稱之時右相楊國忠用事左相陳希烈畏其權寵凡事唯諾無敢發明玄宗頗知之聖情不悅天寶十三年秋霖雨六十餘日京師廬舍垣墉頽毀殆盡凡一十九坊汙潦天子以宰輔或未稱職見此咎徵命楊國忠精求端士時兵部侍郎吉溫方承寵遇上意用之國忠以溫祿山賓佐懼其威權奏寢其事國忠訪於中書舍人竇華宋昱等華昱言見素方雅柔而易制上亦以經事相王府有舊恩可之其年八月拜武部尚書同中書門下平章事充集賢院學士知門下省事代陳希烈見素既為國忠引用心德之時祿山與國忠爭寵兩相猜嫌見素亦無所是非署字而已遂至凶胡犯順不措一言十五年六月哥舒翰兵敗桃林潼關不守是月玄宗蒼黃出幸莫知所詣楊國忠以身領劍南旄鉞請幸成都見素與國忠御史大夫魏方進遇上於延秋門便扈從之咸陽翌日次馬嵬驛軍士不得食流言不遜龍武將軍陳玄禮懼其亂乃與飛龍馬家李護國謀於皇太子請誅國忠以慰士心是日玄禮等禁軍圍行宮盡誅楊氏見素遁走為亂兵所傷衆呼曰勿傷韋相識者救之獲免上聞之令壽王瑁宣慰賜藥傅瘡魏方進為亂兵所殺是日朝士獨見素一人是夜宿馬嵬上命見素子京兆府司録參軍諤為御史中丞充置頓使凌晨將發六軍將士曰國忠反叛不可更往蜀川請之河隴或言靈武太原或云還京議者不一上意在劍南慮違士心無所言諤曰還京須有捍賊之備今兵馬數少恐非萬全不如且至扶風徐圖去就上詢于衆衆以為然乃令皇太子後殿上至扶風郡從駕諸軍各圖去就頗出醜言陳玄禮不能制上聞之憂懼會益州貢春綵十萬匹乃以其綱使濛陽尉劉景溫為監察御史其綵悉陳於廷召六軍將士等入上謂之曰卿等皆國之功臣勳勞素著朕之優賞常亦不輕逆胡負恩事須回避甚知卿等不得別父母妻子朕亦不及辭九廟言發涕流又曰朕今須幸蜀蜀路險狹人若多往恐難祗供今有此綵卿等即宜分取各自圖去就朕自有子弟中官等相隨便與卿等訣別衆咸俯伏號泣曰死生從陛下上良久曰去住聽卿自便自是醜言方息七月至巴西郡以見素兼左相武部尚書數日至蜀郡加金紫光祿大夫進封豳國公與一子五品官是月皇太子即位於靈武道路艱澀音驛未通八月肅宗使至始知靈武即位尋命見素與宰臣房琯賫傳國寶玉冊奉使靈武宣傳詔命便行冊禮將行上皇謂見素等曰皇帝自幼仁孝與諸子有異朕豈不知往十三年已有傳位之意屬其歲水旱左右勸朕且俟豐年爾來便屬祿山構逆方隅震擾未遂此心昨發馬嵬亦有處分今皇帝受命朕心頓如釋負勞卿等遠去勉輔佐之多難興王自古皆有卿等乃心王室以宗社為念早定中原吾之望也見素等悲泣不自勝仍以見素子諤及中書舍人賈至充冊禮使判官時肅宗已回幸順化郡九月見素等至冊禮畢從幸彭原郡肅宗在東宮素聞房琯名重故虛懷以待以見素常附國忠禮遇稍薄明年至鳳翔三月除左僕射罷知政事以憲部尚書致仕苗晉卿代為左相初肅宗在鳳翔喪亂之後綱紀未立兵吏三銓簿籍煨燼南曹選人文符悉多僞濫上以凶醜未滅且示招懷據到注擬一無檢括見素曰臣典選歲久周知此弊今寰區未復員闕不多若總無條綱恐難持久上然之未暇釐革及還京選人數千補授無所喧訴于朝由是行見素之言乃房琯以敗軍左降崔圓崔渙等皆罷知政事上皇所命宰臣無知政事者五月遷見素太子太師十一月肅宗自右輔還京詔見素入蜀奉迎太上皇十二月上皇至京師肅宗御樓大赦見素以奉上皇幸蜀功加開府儀同三司食實封三百戶上元中以足疾上表請致仕許之寶應元年十二月卒年七十六贈司空諡曰忠貞喪事官給子倜諤益晢倜諤皆位至給事中益終刑部員外郎晢終祕書丞倜子頌益子顗字周仁生一歲而孤事姊稱為恭孝性嗜學尤精陰陽象緯經略風俗之書善持論有清譽少以門蔭補千牛備身自鄠縣尉判入等授萬年尉歷御史補闕尚書郎纍遷給事中尚書左丞戶部侍郎中丞吏部侍郎其在諫垣與李約李正辭迭申裨諷頗回大政宰相裴李絳崔羣輩多與友善而後進之有浮名者亦遊其門以是稱有時望及李逢吉駕朋黨以專政柄而顗附麗之跡尤密頗為時人所譏然處身儉約有足多者著易蘊解推演潛亢終始之義甚有奧旨寶曆元年七月卒贈禮部尚書崔圓清河東武城人也後魏左僕射亮之後父景晊官至大理評事圓少孤貧志尚閎博好讀兵書有經濟宇宙之心開元中詔搜訪遺逸圓以鈐謀射策甲科授執戟自負文藝獲武職頗不得意蕭炅為京兆尹薦為會昌丞纍遷司勳員外郎宰臣楊國忠遙制劍南節度使引圓佐理乃奏授尚書郎兼蜀郡大都督府左司馬知節度留後天寶末玄宗幸蜀郡特遷蜀郡大都督府長史劍南節度圓素懷功名初聞國難潛使人探國忠深旨知有行幸之計乃增修城池建置館宇儲備什器及乘輿至殿宇牙帳咸如宿設玄宗甚嗟賞之即日拜中書侍郎同中書門下平章事劍南節度餘如故肅宗即位玄宗命圓同房琯韋見素並赴肅宗行在所玄宗親製遺愛碑于蜀以寵之從肅宗還京以功拜中書令封趙國公賜實封五百戶明年罷知政事遷太子少師留守東都會官軍不利於相州軍回過洛陽所在剽掠圓棄城南奔襄陽詔削除階封尋起為濟王傅李光弼用為懷州刺史除太子詹事改汾州刺史皆以理行稱拜揚州大都督府長史淮南節度觀察使加檢校右僕射兼御史大夫轉檢校左僕射知省事大曆三年六月薨年六十四輟朝三日贈太子太師諡曰昭襄崔渙祖玄暐神龍功臣封博陵郡王父璩文學知名位至禮部侍郎渙少以士行聞博綜經籍尤善談論纍遷尚書司門員外郎天寶末楊國忠出不附己者渙出為劍州刺史天寶十五載七月玄宗幸蜀渙迎謁於路抗詞忠懇皆究理體玄宗嘉之以為得渙晚宰臣房琯又薦之即日拜黃門侍郎同中書門下平章事扈從成都府肅宗靈武即位八月與左相韋見素同平章事房琯崔圓同齎冊赴行在時未復京師舉選路絶詔渙充江淮宣諭選補使以收遺逸惑於聽受為下吏所鬻濫進者非一以不稱職聞乃罷知政事除左散騎常侍兼餘杭太守江東採訪防禦使旋授正議大夫太子賓客乾元三年正月轉大理卿再遷吏部侍郎檢校工部尚書集賢院待詔性尚簡淡不交世務頗為時望所歸遷御史大夫加稅地青苗錢物使時以此錢充給京百官料渙為屬吏希中以下估為使料上估為百官料其時為皇城副留守張清發之詔下有司訊鞫渙無詞以對坐是貶道州刺史大曆三年十二月壬寅以疾終子縱初以蔭補協律郎三遷為監察御史詔擇令長於臺省除藍田令寬明勤幹德化大行縣人為之立碑頌德轉京兆府司録纍遷金部員外郎以父貶道州刺史棄官就養丁父憂終制六遷大理卿兼御史中丞汴西水陸運兩稅鹽鐵等使田悅連敗走魏州嬰城自守諸道兵圍之屢乏食詔縱兼魏州四節度糧料使軍儲稍給德宗幸奉天四方握兵未有至者縱先知之潛告李懷光勸令奔命懷光從之縱乃悉斂軍財與懷光俱來調給具備懷光兵士久戰河外及次河中將遷延縱之貨幣先已渡河縱謂衆曰若濟悉以分賜衆利之乃西至奉天加右庶子充使無幾拜京兆尹兼御史大夫數奏懷光剛愎反覆宜陰備之及行幸梁州左右或短之曰縱素善懷光今不來矣上曰他人不知縱吾可保其心不數日縱至拜御史大夫嘗議其大體不親細事獄訴儀制皆付之僚吏貞元元年親祠南郊為大禮使屬兵旱之後賦入尚少縱裁定文物儉而中禮無何萬年丞源邃為京兆尹李齊運所抑捽至死縱劾奏不行數月除吏部侍郎尋檢校禮部尚書東畿唐汝鄧都觀察使河南尹是時兵革甫定民耗六七縱悉心求瘼為理簡易先是戍邊之師由洛陽者儲餼取辦於編戶縱始官備不徵於人令五家相保俾自占告發斂以絶胥吏之私又引伊洛水以通里閈都中灌溉濟不逮為十一二人甚安之徵拜太常卿貞元七年六月卒官年六十二諡曰忠贈吏部尚書縱孝悌修飭自立以父為元載排抑居退十餘年左宦外府訖載得罪不求聞達初渙有寵妾鄭氏縱以母事之鄭氏性剛戾待縱不以理雖為大僚每加笞詬縱率妻子候顏敬順不懈時以為難杜鴻漸故相暹之族子祖慎行益州長史父鵬舉官至王友鴻漸敏悟好學舉進士解褐王府參軍天寶末纍遷大理司直朔方留後支度副使肅宗北幸至平涼未知所適鴻漸與六城水運使魏少遊節度判官崔漪支度判官盧簡金關內鹽池判官李涵謀曰今胡羯亂常二京陷沒主上南幸於巴蜀皇太子理兵於平涼然平涼散地非聚兵之處必欲制勝非朔方不可若奉殿下旬日之間西收河隴回紇方強與國通好北徵徑騎南集諸城大兵一舉可復二京雪社稷之恥上報明主下安蒼生亦臣子之用心國家之大計也鴻漸即日草箋具陳兵馬招集之勢録軍資器械倉儲庫物之數令李涵齎赴平涼肅宗大悅鴻漸知肅宗發平涼於北界白草頓迎謁因勞諸使及兵士進言曰朔方天下徑兵靈州用武之處今回紇請和吐蕃內附天下郡邑人皆堅守以待制命其中雖為賊所據亦望不日收復殿下整理軍戎長驅一舉則逆胡不足滅也肅宗然之及至靈武鴻漸與裴冕等勸即皇帝位以歸中外之望五上表乃從鴻漸素習帝王陳布之儀君臣朝見之禮遂採托舊儀綿蕝其事城南設壇壝先一日具儀注草奏肅宗曰聖君在遠寇逆未平宜罷壇場餘可其奏肅宗即位授兵部郎中知中書舍人事尋轉武部侍郎至德二年兼御史大夫為河西節度使涼州都督兩京平遷荊州大都督府長史荊南節度使襄州大將康楚元張嘉延盜所管兵據襄州城叛刺史王政遁走嘉延南襲荊州鴻漸聞之棄城而遁澧朗硤歸等州聞鴻漸出奔皆惶駭潛竄山谷歲餘徵拜尚書右丞吏部侍郎太常卿充禮儀使二聖晏駕鴻漸監護儀制山陵畢加光祿大夫封衛國公廣德二年代宗將享郊廟拜鴻漸兵部侍郎同中書門下平章事尋轉中書侍郎永泰元年十月劍南西川兵馬使崔旰殺節度使郭英乂據成都自稱留後邛州衙將柏貞節瀘州衙將楊子琳劍州衙將李昌等興兵討旰西蜀大亂明年二月命鴻漸以宰相兼充山劍副元帥劍南西川節度使以平蜀亂鴻漸心無遠圖志氣怯懦又酷好浮圖道不喜軍戎既至成都懼旰雄武不復問罪乃以劍南節制表讓於旰時西戎寇邊關中多事鴻漸孤軍陷險兵威不振代宗不獲已從之仍以旰為劍南西川行軍司馬柏貞節為邛州刺史楊子琳為瀘州刺史各罷兵尋請入覲仍表崔旰為西川兵馬留後大曆二年詔以旰為成都尹劍南西川節度使召鴻漸還京鴻漸仍率旰同入覲代宗嘉之後知政事轉門下侍郎讓山南副元帥三年八月代王縉為東都留守充河南淮西山南東道副元帥平章事如故以疾上表乞骸骨從之竟不之任四年十一月卒贈太尉諡曰文憲輟朝三日賜物五百匹粟五百石鴻漸晚年樂於退靜私第在長興里館宇華靡賓僚宴集鴻漸悠然賦詩曰常願追禪理安能挹化源朝士多屬和之及休致後病令僧剃頂髮及卒遺命其子依胡法塔葬不為封樹冀類緇流物議哂之史臣曰祿山狂悖已顯玄宗寵任無疑見素知國危陳廟算直言極諫而君不從獨正犯難而人不咎出生入死善始令終者鮮矣時論以見素取容於國忠無言匡大政且國忠恃內戚弄重權沮林甫姦豪取其大位若見素之孤直豈許取容蓋禍胎已成政柄久紊見素入相餘年言不從而難作雖有周孔之才其能匡救者乎諤才辨顗儉約雅符積善之慶矣圓守文之士非禦侮之才渙才兼行聞命與時會發言上沃主意遽致顯榮當官屢為吏欺終及竄逐所謂可與適道未可與權縱忠於國能於官孝於家三者備矣孰能繼之鴻漸有衛社之功非干城之責時以任崔旰為非則不然矣且旰南拒貞節北敗獻誠宜以懷來未可力制終致歸國豈非臧謀向討之即為劇賊矣然事佛徼福朋勢取容非君子之道焉贊曰玄宗失德祿山肆逆見素竭節諸公協力
