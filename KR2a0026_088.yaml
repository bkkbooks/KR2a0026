body:
  text: 舊唐書卷八十四列傳第三十四劉仁軌郝處俊裴行儉子光庭劉仁軌汴州尉氏人也少恭謹好學遇隋末喪亂不遑專習每行坐所在輒書空畫地由是博涉文史武德初河南道大使管國公任瓌將上表論事仁軌見其起草因為改定數字瓌甚異之遂赤牒補息州參軍稍除陳倉尉部人有折衝都尉魯寧者恃其高班豪縱無禮歷政莫能禁止仁軌特加誡喻期不可再犯寧又暴橫尤甚竟杖殺之州司以聞太宗怒曰是何縣尉輒殺吾折衝遽追入與語奇其剛正擢授櫟陽丞貞觀十四年太宗將幸同州校獵屬收穫未畢仁軌上表諫曰臣聞屋漏在上知之者在下愚夫之計擇之者聖人是以周王詢于芻蕘殷后謀于板築故得享國彌久傳祚無疆功宣清廟慶流後葉伏惟陛下天性仁愛躬親節儉朝夕克念百姓為心一物失所納隍軫慮臣伏聞大駕欲幸同州教習臣伏知四時搜狩前王恆典事有沿革未必因循今年甘雨應時秋稼極盛玄黃亙野十分才收一二盡力刈穫月半猶未訖功貧家無力禾下始擬種麥直據尋常科喚田家已有所妨今既供承獵事兼之修理橋道縱大簡略動費一二萬工百姓收斂實為狼狽臣願陛下少留萬乘之尊垂聽一介之言退近旬日收刈總了則人盡暇豫家得康寧輿輪徐動公私交泰太宗特降璽書勞曰卿職任雖卑竭誠奉國所陳之事朕甚嘉之尋拜新安令纍遷給事中顯慶四年出為青州刺史五年高宗征遼令仁軌監統水軍以後期坐免特令以白衣隨軍自效時蘇定方既平百濟留郎將劉仁願於百濟府城鎮守又以左衛中郎將王文度為熊津都督安撫其餘衆文度濟海病卒百濟為僧道琛舊將福信率衆復叛立故王子扶餘豐為王引兵圍仁願於府城詔仁軌檢校帶方州刺史代文度統衆便道發新羅兵合勢以救仁願轉鬬而前仁軌軍容整肅所向皆下道琛等乃釋仁願之圍退保任存城尋而福信殺道琛併其兵馬招誘亡叛其勢益張仁軌乃與仁願合軍休息時蘇定方奉詔伐高麗進圍平壤不克而還高宗敕書與仁軌曰平壤軍回一城不可獨固宜拔就新羅共其屯守若金法敏藉卿等留鎮宜且停彼若其不須即宜泛海還也將士咸欲西歸仁軌曰春秋之義大夫出疆有可以安社稷便國家專之可也況在滄海之外密邇豺狼者哉且人臣進思盡忠有死無二公家之利知無不為主上欲吞滅高麗先誅百濟留兵鎮守制其心腹雖妖孽充斥而備預甚嚴宜礪戈秣馬擊其不意彼既無備何攻不克戰而有勝士卒自安然後分兵據險開張形勢飛表聞上更請兵船朝廷知其有成必當出師命將聲援才接凶逆自殲非直不𠫓廾成功實亦永清海外今平壤之軍既回熊津又拔則百濟餘燼不日更興高麗逋藪何時可滅且今以一城之地居賊中心如其失腳即為亡虜拔入新羅又是坐客脫不如意悔不可追況福信凶暴殘虐過甚餘豐猜惑外合內離鴟張共處勢必相害唯宜堅守觀變乘便取之不可動也衆從之時扶餘豐及福信等以真峴城臨江高險又當衝要加兵守之仁軌引新羅之兵乘夜薄城四面攀草而上比明而入據其城遂通新羅運糧之路俄而餘豐襲殺福信又遣使往高麗及倭國請兵以拒官軍詔右威衛將軍孫仁師率兵浮海以為之援仁師既與仁軌等相合兵士大振於是諸將會議或曰加林城水陸之衝請先擊之仁軌曰加林險固急攻則傷損戰士固守則用日持久不如先攻周留城周留賊之巢穴羣凶所聚除惡務本須拔其源若克周留則諸城自下於是仁師仁願及新羅王金法敏帥陸軍以進仁軌乃別率杜爽扶餘隆率水軍及糧船自熊津江往白江會陸軍同趣周留城仁軌遇倭兵於白江之口四戰捷焚其舟四百艘煙焰漲天海水皆赤賊衆大潰餘豐脫身而走獲其寶劍偽王子扶餘忠勝忠志等率士女及倭衆并耽羅國使一時並降百濟諸城皆復歸順賊帥遲受信據任存城不降先是百濟首領沙吒相如黑齒常之自蘇定方軍回後鳩集亡散各據險以應福信至是率其衆降仁軌諭以恩信令自領子弟以取任存城又欲分兵助之孫仁師曰相如等獸心難信若授以甲仗是資寇兵也仁軌曰吾觀相如常之皆忠勇有謀感恩之士從我則成背我必滅因機立效在於茲日不須疑也於是給其糧仗分兵隨之遂拔任存城遲受信棄其妻子走投高麗於是百濟之餘燼悉平孫仁師與劉仁願振旅而還詔留仁軌勒兵鎮守初百濟經福信之亂合境凋殘殭尸相屬仁軌始令收斂骸骨瘞埋弔祭之修録戶口署置官長開通塗路整理村落建立橋梁補葺堤堰修復陂塘勸課耕種賑貸貧乏存問孤老頒宗廟忌諱立皇家社稷百濟餘衆各安其業於是漸營屯田積糧撫士以經略高麗仁願既至京師上謂曰卿在海東前後奏請皆合事宜而雅有文理卿本武將何得然也對曰劉仁軌之詞非臣所及也上深歎賞之因超加仁軌六階正授帶方州刺史并賜京城宅一區厚賚其妻子遣使降璽書勞勉之仁軌又上表曰臣蒙陛下曲垂天奬棄瑕録用授之刺舉又加連率材輕職重憂責更深常思報效冀酬萬一智力淺短淹滯無成久在海外每從征役軍旅之事實有所聞具狀封奏伏願詳察臣看見在兵募手腳沉重者多勇健奮發者少兼有老弱衣服單寒唯望西歸無心展效臣問往在海西見百姓人人投募爭欲征行乃有不用官物請自辦衣糧投名義征何因今日募兵如此儜弱皆報臣云今日官府與往日不同人心又別貞觀永徽年中東西征役身死王事者並蒙敕使弔祭追贈官職亦有回亡者官爵與其子弟從顯慶五年以後征役身死更不借問往前渡遼海者即得一轉勳官從顯慶五年以後頻經渡海不被記録州縣發遣兵募人身少壯家有錢財參逐官府者東西藏避並即得脫無錢參逐者雖是老弱推背即來顯慶五年破百濟勳及向平壤苦戰勳當時軍將號令並言與高官重賞百方購募無種不道洎到西岸唯聞枷鎖推禁奪賜破勳州縣追呼求住不得公私困弊不可言盡發海西之日已有自害逃走非獨海外始逃又為征役蒙授勳級將為榮寵頻年征役唯取勳官牽挽辛苦與白丁無別百姓不願征行特由於此陛下再興兵馬平定百濟留兵鎮守經略高麗百姓有如此議論若為成就功業臣聞琴瑟不調改而更張布政施化隨時取適自非重賞明罰何以成功臣又問見在兵募舊留鎮五年尚得支濟爾等始經一年何因如此單露並報臣道發家來日唯遣作一年裝束自從離家巳經二年在朝陽甕津又遣來去運糧涉海遭風多有漂失臣勘責見在兵募衣裳單露不堪度冬者給大軍還日所留衣裳且得一冬充事來年秋後更無準擬陛下若欲殄滅高麗不可棄百濟土地餘豐在北餘勇在南百濟高麗舊相黨援倭人雖遠亦相影響若無兵馬還成一國既須鎮壓又置屯田事藉兵士同心同德兵士既有此議不可膠柱因循須還其渡海官勳及平百濟向平壤功效除此之外更相褒賞明敕慰勞以起兵募之心若依今日以前布置臣恐師老且疲無所成就臣又見晉代平吳史籍具載內有武帝張華外有羊祜杜預籌謀策畫經緯咨詢王濬之徒折衝萬里樓船戰艦已到石頭賈充王渾之輩猶欲斬張華以謝天下武帝報云平吳之計出自朕意張華同朕見耳非其本心是非不同乖亂如此平吳之後猶欲苦繩王濬賴武帝擁護始得保全不逢武帝聖明王濬不存首領臣每讀其書未嘗不撫心長歎伏惟陛下既得百濟欲取高麗須外內同心上下齊奮舉無遺策始可成功百姓既有此議更宜改調臣恐是逆耳之事無人為陛下盡言自顧老病日侵殘生詎幾奄忽長逝銜恨九泉所以披露肝膽昧死聞奏上深納其言又遣劉仁願率兵渡海與舊鎮兵交代仍授扶餘隆熊津都督遺以招輯其餘衆扶餘勇者扶餘隆之弟也是時走在倭國以為扶餘豐之應故仁軌表言之於是仁軌浮海西還初仁軌將發帶方州謂人曰天將富貴此翁耳於州司請曆日一卷并七廟諱人怪其故答曰擬削平遼海頒示國家正朔使夷俗遵奉焉至是皆如其言麟德二年封泰山仁軌領新羅及百濟耽羅倭四國酋長赴會高宗甚悅擢拜大司憲乾封元年遷右相兼檢校太子左中護纍前後戰功封樂城縣男三年為熊津道安撫大使兼浿江道總管副司空李績討平高麗總章二年軍回以疾辭職加金紫光祿大夫聽致仕咸亨元年復授隴州刺史三年徵拜太子左庶子同中書門下三品監修國史五年為雞林道大總管東伐新羅仁軌率兵徑度瓠盧河破其北方大鎮七重城以功進爵為公并子姪三人並授上柱國州黨榮之號其所居為樂城鄉三柱里上元二年拜尚書左僕射同中書門下三品兼太子賓客依舊監修國史儀鳳二年以吐蕃入寇命仁軌為洮河道行軍鎮守大使仁軌每有奏請多被中書令李敬玄抑之由是與敬玄不協仁軌知敬玄素非邊將才冀欲中傷之上言西蕃鎮守事非敬玄莫可高宗遽命敬玄代之敬玄至洮河軍尋為吐蕃所敗永隆二年兼太子太傅未幾以老乞骸骨聽解尚書左僕射以太子太傅依舊知政事永淳元年高宗幸東都皇太子京師監國遣仁軌與侍中裴炎中書令薛元超留輔太子二年太子赴東都又令太孫重照京師留守仍令仁軌為副則天臨朝加授特進復拜尚書左僕射同中書門下三品專知留守事仁軌復上疏辭以衰老請罷居守之任因陳呂后禍敗之事以申規諫則天使武承嗣齎璽書往京慰喻之曰今日以皇帝諒暗不言眇身且代親政遠勞勸誡復表辭衰疾怪望既多徊徨失據又云呂后見嗤於後代祿産貽禍於漢朝引喻良深愧慰交集公忠貞之操終始不渝徑直之風古今罕比初聞此語能不罔然靜而思之是為龜鏡且端揆之任儀刑百辟况公先朝舊德遐邇具瞻願以匡救為懷無以暮年致請尋進封郡公垂拱元年從新令改為文昌左相同鳳閣鸞臺三品尋薨年八十四則天廢朝三日令在京百官以次赴弔册贈開府儀同三司並州大都督陪葬乾陵賜其家實封三百戶仁軌雖位居端揆不自矜倨每見貧賤時故人不改布衣之舊初為陳倉尉相工袁天綱謂曰君終當位鄰台輔年將九十後果如其言仁軌身經隋末之亂輯其見聞著行年紀行於代子濬官至太子中舍人垂拱二年為酷吏所陷被殺妻子籍沒中宗即位以仁軌春宮舊僚追贈太尉濬子冕開元中為祕書省少監表請為仁軌立碑諡曰文獻史臣韋述曰世稱劉樂城與戴至德同為端揆劉則甘言接人以收物譽戴則正色拒下推美於君故樂城之善於今未弭而戴氏之績無所聞焉嗚呼高名美稱或因邀飾而致遠深仁至行或以韜晦而莫傳豈唯劉戴而然蓋自古有之矣故孔子曰衆好之必察焉衆惡之必察焉非夫聖智鮮不惑也且劉公逞其私忿陷人之所不能覆徒貽國之恥忠恕之道豈其然乎郝處俊安州安陸人也父相貴隋末與妻父許紹據硤州歸國以功授滁州刺史封甑山縣公處俊年十歲餘其父卒於滁州父之故吏賻送甚厚僅滿千餘匹悉辭不受及長好讀漢書略能暗誦貞觀中本州進士舉吏部尚書高士廉甚奇之解褐授著作佐郎襲爵甑山縣公兄弟篤睦事諸舅甚謹再轉滕王友恥為王官遂棄官歸耕久之召拜太子司議郎五遷吏部侍郎乾封二年改為司列少常伯屬高麗反叛詔司空李績為浿江道大總管以處俊為副嘗次賊城未遑置陳賊徒奄至軍中大駭處俊獨據胡床方餐乾糒乃潛簡精鋭擊敗之將士多服其膽略總章二年拜東臺侍郎尋同東西臺三品咸亨初高宗幸東都皇太子於京師監國盡留侍臣戴至德張文瓘等以輔太子獨以處俊從時東州道總管高侃破高麗餘衆於安市城奏稱有高麗僧言中國災異請誅之上謂處俊曰朕聞為君上者以天下之目而視以天下之耳而聽蓋欲廣聞見也且天降災異所以警悟人君其變苟實言之者何罪其事必虛聞之者足以自戒舜立謗木良有以也欲箝天下之口其可得乎此不足以加罪特令赦之因謂處俊曰王者無外何藉於守禦雖然重門擊柝蓋備不虞方知禁衛在於謹肅朕嘗以秦法猶為太寬荊軻匹夫耳而匕首竊發始皇駭懼莫有拒者豈不由積習寬慢使其然乎處俊對曰此由法急所致非寬慢也上曰何以知之對曰秦法輒升殿者夷三族人皆懼族安有敢拒者逮乎魏武法尚峻臣見魏令云京城有變九卿各居其府其後嚴才作亂與其徒屬數十人攻左掖門魏武登銅雀臺遠望無敢救者時王修為奉常聞變召車馬未至便將官屬步至宮門魏武望見之曰彼來者必王修乎此由王修察變知機違法赴難向各守法遂成其禍故王者設法敷化不可以太急夫政寬則人慢政急則人無所措手足聖王之道寬猛相濟詩曰不懈于位人之攸塈謂仁政也又曰式遏寇虐無俾作慝謂威刑也洪範曰高明柔克沉潛剛克謂中道也上曰善又有胡僧盧伽阿逸多受詔合長年藥高宗將餌之處俊諫曰修短有命未聞萬乘之主輕服蕃夷之藥昔貞觀末年先帝令婆羅門僧那羅邇娑寐依其本國舊方合長生藥胡人有異術徵求靈草祕石歷年而成先帝服之竟無異效大漸之際名醫莫知所為時議者歸罪於胡人將申顯戮又恐取笑夷狄法遂不行龜鏡若是惟陛下深察高宗納之但加盧伽為懷化大將軍不服其藥尋而官名復舊處俊授黃門侍郎三年加銀青光祿大夫轉中書侍郎四年監修國史上元元年高宗御含元殿東翔鸞閣觀大酺時京城四縣及太常音樂分為東西兩朋帝令雍王賢為東朋周王諱為西朋務以角勝為樂處俊諫曰臣聞禮所以示童子無誑者恐其欺詐之心生也伏以二王春秋尚少意趣未定當須推多讓美相敬如一今忽分為二朋遞相誇競且俳優小人言辭無度酣樂之後難為禁止恐其交爭勝負譏誚失禮非所以導仁義示和睦也高宗矍然曰卿之遠識非衆人所及也遽令止之尋代閻立本為中書令歲餘兼太子賓客檢校兵部尚書三年高宗以風疹欲遜位令天后攝知國事與宰相議之處俊對曰嘗聞禮經云天子理陽道后理陰德則帝之與后猶日之與月陽之與陰各有所主守也陛下今欲違反此道臣恐上則謫見于天下則取怪于人昔魏文帝著令身崩後尚不許皇后臨朝今陛下奈何遂欲躬自傳位於天后況天下者高祖太宗二聖之天下非陛下之天下也陛下正合謹守宗廟傳之子孫誠不可持國與人有私於后族伏乞特垂詳納中書侍郎李義琰進曰處俊所引經旨足可依憑惟聖慮無疑則蒼生幸甚帝曰是遂止儀鳳二年加金紫光祿大夫行太子左庶子並依舊知政事監修國史四年代張文瓘為侍中處俊性儉素土木形骸自參綜朝政每與上言議必引經籍以應對多有匡益甚得大臣之體侍中平恩公許圉師即處俊之舅早同州里俱宦達於時又其鄉人田氏彭氏以殖貨見稱有彭志筠顯慶中上表請以家絹布二萬段助軍詔受其絹萬匹特授奉議郎仍布告天下故江淮間語曰貴如許郝富若田彭處俊遷太子少保開耀元年薨年七十五贈開府儀同三司荊州大都督高宗甚傷悼之顧謂侍臣曰處俊志存忠正兼有學識至於雕飾服玩雖極知無益然常人不能抑情棄捨皆好尚奢侈處俊嘗保其質素終始不渝雖非元勳佐命固亦多時驅使又見遺表憂國忘家今既云亡深可傷惜即於光順門舉哀一日不視事終祭以少牢贈絹布八百段米粟八百石令百官赴哭給靈輿并家口遞還鄉官供葬事其子祕書郎北叟上表辭所贈賜及葬遞之事高宗不許侍中裴炎曰處俊臨亡臣往見之屬臣曰生既無益明時死後何宜煩費瞑目之後儻有恩賜贈物及歸鄉遞送葬日營造不欲勞官司供給高宗深嘉歎之從其遺意唯加贈物而巳處俊孫象賢垂拱中為太子通事舍人坐事伏誅臨刑言多不順則天大怒令斬訖仍支解其體發其父母墳墓焚爇尸體處俊亦坐棺毀柩自此法司每將殺人必先以木丸塞其口然後加刑訖於則天之代裴行儉絳州聞喜人曾祖伯鳳周驃騎大將軍汾州刺史琅邪郡公祖定憑翊郡守襲封琅邪公父仁基隋左光祿大夫陷於王世充後謀歸國事泄遇害武德中贈原州都督諡曰忠行儉幼以門蔭補弘文生貞觀中舉明經拜左屯衛倉曹參軍時蘇定方為大將軍甚奇之盡以用兵奇術授行儉顯慶二年六遷長安令時高宗將廢皇后王氏而立武昭儀行儉以為國家憂患必從此始與太尉長孫無忌尚書左僕射褚遂良私議其事大理袁公瑜於昭儀母榮國夫人譖之由是左授西州都督府長史麟德二年纍拜安西大都護西域諸國多慕義歸降徵拜司文少卿總章中遷司列少常伯咸亨初官名復舊改為吏部侍郎與李敬玄為二同時典選十餘年甚有能名時人稱為裴李行儉始設長名姓歷榜引銓注等法又定州縣升降官資高下以為故事上元二年加銀青光祿大夫高宗以行儉工於草書嘗以絹素百卷令行儉草書文選一部帝覽之稱善賜帛五百段行儉嘗謂人曰褚遂良非精筆佳墨未嘗輒書不擇筆墨而妍捷者唯余及虞世南耳三年吐蕃背叛詔行儉為洮州道左二軍總管尋又為秦州鎮撫右軍總管並受元帥周王節度儀鳳四年十姓可汗阿史那匐延都支及李遮匐扇動蕃落侵逼安西連和吐番議者欲發兵討之行儉建議曰吐蕃叛換干戈未息敬玄審禮失律喪元安可更為西方生事今波斯王身沒其子泥涅師師充質在京望差使往波斯册立即路由二蕃部落便宜從事必可有功高宗從之因命行儉册送波斯王仍為安撫大食使途經莫賀延磧屬風沙晦暝導者益迷行儉命下營虔誠致祭令告將吏泉井非遙俄而雲收風靜行數百步水草甚豐後來之人莫知其處衆皆悅服比之二師將軍至西州人吏郊迎行儉召其豪傑子弟千餘人隨己而西乃揚言紿其下曰今正炎蒸熱坂難冒涼秋之後方可漸行都支覘知之遂不設備行儉仍召四鎮諸蕃酋長豪傑謂曰憶昔此遊未嘗厭倦雖還京輦無時暫忘今因是行欲尋舊賞誰能從吾獵也是時蕃酋子弟投募者僅萬人行儉假為畋遊教試部伍數日遂倍道而進去都支部落十餘里先遣都支所親問其安否外示間暇似非討襲續又使人趣召相見都支先與遮匐通謀秋中擬拒漢使卒聞軍到計無所出自率兒姪首領等五百餘騎就營來謁遂擒之是日傳其契箭諸部酋長悉來請命並執送碎葉城簡其精騎輕齎曉夜前進將虜遮匐途中果獲都支還使與遮匐使同來行儉釋遮匐行人令先往曉喻其主兼述都支已擒遮匐尋復來降於是將吏已下立碑於碎葉城以紀其功擒都支遮匐而還高宗廷勞之曰比以西服未寧遣卿總兵討逐孤軍深入經途萬里卿權略有聞誠節夙著兵不血刃而凶黨殄滅伐叛柔服深副朕委尋又賜宴謂行儉曰卿文武兼資今故授卿二職即日拜禮部尚書兼檢校右衛大將軍調露元年突厥阿史德溫傅反單于管內二十四州並叛應之衆數十萬單于都護蕭嗣業率兵討之反為所敗於是以行檢為定襄道行軍大總管率太僕少卿李思文營州都督周道務等部兵十八萬并西軍程務挺東軍李文暕等總三十餘萬連亙數千里並受行儉節度唐世出師之盛未之有也行儉行至朔州知蕭嗣業以運糧被掠兵多餒死遂詐為糧車三百乘每車伏壯士五人各齎陌刀徑弩以羸兵數百人援車兼伏精兵令居險以待之賊果大下羸兵棄車散走賊驅車就泉水解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡餘衆奔潰自是續遣糧車無敢近之者及軍至單于之北際晚下營壕塹方周遽令移就崇岡將士皆以士衆方就安堵不可勞擾行儉不從更令促之比夜風雨暴至前設營所水深丈餘將士莫不歎伏賊衆於黑山拒戰行儉頻戰皆捷前後殺虜不可勝數偽可汗泥熟匐為其下所殺以其首來降又擒其大首領奉職而還餘黨走依狼山行儉既回阿史那伏念又偽稱可汗與溫傅合勢鳩集餘衆明年行儉復總諸軍討之頓軍於代州之陘口縱反間説伏念與溫傅令相猜二伏念恐懼密送降款仍請自效行儉不泄其事而密表以聞數日有煙塵漲天而至斥候惶惑來白行儉召三軍謂曰此是伏念執溫傅來降非他然受降如受敵但須嚴備更遣單使迎前勞之少間伏念果率其屬縛溫傅詣軍門請罪盡平突厥餘黨高宗大悅遣戶部尚書崔知悌赴軍勞之侍中裴炎害行儉之功上言伏念為總管程務挺張虔勗子營逼逐又磧北回紇等同向南逼之窘急而降由是行儉之功不録斬伏念及溫傅於都市行儉歎曰渾濬前事古今恥之但恐殺降之後無復來者因稱疾不出以勳封聞喜縣公永淳元年十姓偽可汗車薄反叛詔復以行儉為金牙道大總管率十將軍以討之師未行其年四月行儉病卒年六十四贈幽州都督諡曰獻特詔令皇太子差六品京官一人檢校家事五六年間待兒孫稍成長日停中宗即位追贈揚州大都督有集二十卷撰草字雜體數萬言並傳於代又撰選譜十卷安置軍營行陳部統克料勝負甄別器能等四十六訣則天令祕書監武承嗣詣宅並密收入內行儉尤曉陰陽算術兼有人倫之鑒自掌選及為大總管凡遇賢俊無不甄採每制敵摧凶必先期捷日時有後進楊炯王勃盧照鄰駱賓王並以文章見稱吏部侍郎李敬玄盛為延譽引以示行儉行儉曰才名有之爵祿蓋寡楊應至令長餘並鮮能令終是時蘇味道王未知名因調選行儉一見深禮異之仍謂曰有晚年子息恨不見其成長二公十數年當居衡石願記識此輩其後相繼為吏部皆如其言行儉嘗所引偏裨有程務挺張虔勗崔智辨王方翼黨金毗劉敬同郭待封李多祚黑齒常之盡為名將至刺史將軍者數十人其所知賞多此類也行儉嘗令醫人合藥請犀角麝香送者誤遺失已而惶懼潛竄又有敕賜馬及新鞍令史輒馳驟馬倒鞍破令史亦逃行儉並委所親招到謂曰爾曹豈相輕耶皆錯誤耳待之如故初平都支遮匐大獲瓌寶蕃酋將士願觀之行儉因宴設遍出歷示有馬腦盤廣二尺餘文彩殊絶軍吏王休烈捧盤歷階趨進誤躡衣足跌便倒盤亦隨碎休烈驚惶叩頭流血行儉笑而謂曰爾非故也何至於是更不形顏色詔賜都支等資産金器皿三千餘事駝馬稱是並分給親故并副使已下數日便盡少子光庭開元中為侍中以恩例贈行儉為太尉光庭早孤母庫狄氏則天時召入宮甚見親待光庭由是纍遷太常丞後以武三思之壻緣坐左遷郢州司馬開元初六遷右率府中郎將擢授司門郎中歲餘轉兵部郎中光庭沉靜少言寡於交遊既歷清要時人初未許之及在職公務修整衆方歎伏焉十三年將有事于岱嶽中書令張説以大駕東巡京師空虛恐夷狄乘間竊發議欲加嶽守邊以備不虞召光庭謀兵事光庭曰封禪者所以告成功也夫成功者恩德無不及百姓無不安萬國無不懷今將告成而懼夷狄何以昭德也大興力役用備不虞且非安人也方謀會同而阻戎心又非懷遠也有此三者則名實乖矣且諸蕃之國突厥為大贄幣往來願修恩好有年矣今茲遣一使徵其大臣赴會必欣然應命突厥受詔則諸蕃君長必相率而來雖偃旗息鼓高枕有餘矣説曰善吾所不及矣因奏而行之尋轉鴻臚少卿東封還遷兵部侍郎十七年拜中書侍郎同中書門下平章事尋兼御史大夫無幾遷黃門侍郎依舊知政事從巡五陵回拜侍中兼吏部尚書又加弘文館學士光庭乃撰瑤山往則及維城前軌各一卷上表獻之手制褒美賜絹五百匹上令皇太子已下於光順門與光庭相見以重其諷誡之意光庭又引壽安丞李融拾遺張琪著作佐郎司馬利賓等令直弘文館撰續春秋傳上表請以經為御撰而光庭等依左氏之體為之作傳上又手制褒賞之光庭委筆削於李融書竟不就時有上書請以皇室為金德者中書令蕭嵩奏請集百僚詳議光庭以國家符命久著史策若有改易恐貽後學之誚密奏請依舊為定乃下詔停百僚集議之事二十年扈從祠后土加光祿大夫封正平男尋卒年五十八優制贈太師輟朝三日初光庭與蕭嵩爭權不協及為吏部奏用循資格并促選限至正月三十日令畢其流外行署亦令門下省之光庭卒後嵩又奏請一切罷之光庭所引進者盡出為外職時有門下主事閻麟之為光庭腹心專知吏部選官每麟之裁定光庭隨而下筆時人語曰麟之口光庭手太常博士孫琬將議光庭諡以其用循資格非奬勸之道建議諡為克時人以為希嵩意旨上聞而特下詔賜諡曰忠獻仍令中書令張九齡為其碑文史官韋述以改諡為非論之曰春秋之義諸侯死王事者葬之加一等嘉其有功而不及其賞也爰至漢魏則襚之印綬寵被窀穸唯德是褒豈虛授也近代已來寵贈無紀或以職位崇顯一切優錫或以子孫榮貴恩例所加賢愚虛實為一貫矣裴光庭以守法之吏驟登相位踐歷機衡豈不多愧贈以師範何其濫歟張燕公有扶翊之勳居講諷之舊秩躋九命官歷二端議者猶謂贈之過當況光庭去斯猶遠何妄竊之甚哉蓋名器假人昔賢之所惋也史臣曰昔晉侯選任將帥取其説禮樂而敦詩書良有以也夫權謀方略兵家之大經邦國繫之以存亡政令因之而強弱則馮衆怙力豨勇虎暴者安可輕言推轂授任哉故王猛諸葛亮振起窮巷驅駕豪傑左指右顧廓定霸圖非他道也蓋智力權變適當其用耳劉樂城裴聞喜文雅方略無謝昔賢治戎安邊綽有心術儒將之雄者也天后預政之時刑峻如壑多以諛佞希恩而樂城甑山昌言規正若時無君子安及此言正平銓藻吏能文學政事頗有深識而前史譏其謬諡有涉陳壽短武侯應變之論乎非通論也贊曰殷禮阿衡周師呂尚王者之兵儒者之將樂城聞喜當仁不讓管葛之談是吾心匠
