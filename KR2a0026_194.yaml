body:
  text: 舊唐書卷一百八十七下列傳第一百三十七下忠義下李憕子源彭彭孫景讓張介然崔無詖盧奕蔣清顏杲卿子泉明薛願龐堅附張巡姚誾附許遠程千里袁光庭邵真符璘趙曄石演芬張名振附張伾甄濟劉敦儒高沐賈直言庾敬休辛讜李憕太原文水人父希倩中宗神龍初右臺監察御史憕早聰敏以明經舉開元初為咸陽尉時張説自紫微令燕國公出為相州刺史河北按察使有洺州劉行善相人説問寮寀後誰貴達行乃稱憕及臨河尉鄭巖説乃以女妻巖妹壻陰行真女妻於憕及説為並州長史天兵軍大使引憕常在幕下九年入為相憕又為長安尉屬宇文融為御史括田戶奏知名之士崔希逸咸廙業宇文順于孺卿李宙及憕為判官攝監察御史分路檢察以課並遷監察御史憕驟歷兵吏部郎中給事中憕有吏幹明於几案甚有當官之稱二十八年為河南少尹時蕭炅為尹依倚權貴涖事多不法憕以公直正之人用繫賴又道士孫甑生以左道求進託以修功德往來嵩山求請無度憕必挫之炅及甑生患之而構於朝廷天寶初出為清河太守十一載纍轉河東太守本道採訪謁於行在所改尚書右丞京兆尹十四載轉光祿卿東京留守判尚書省事其載十一月安祿山反於范陽人心震懼玄宗遣安西節度封常清兼御史大夫為將召募於東京以禦之憕與留臺御史中丞盧奕河南尹達奚珣綏輯將士完繕城郭遏其侵逼遷憕禮部尚書依前留守自逆徒發范陽至渡河令嚴覘候計絶及渡河陷陳留滎陽二郡殺張介然崔無詖數日間已至都城下祿山所統皆蕃漢精兵訓練已久常清之衆多市井之人初不知戰及兵交之後被鐵騎唐突飛矢如雨皆魂懾色沮望賊奔散憕謂奕曰吾曹荷國重寄誓無避死雖力不敵其若官守何奕亦便許願守本司於是憕居留守宅奕獨居臺中及常清西奔祿山領其衆椎鼓大呼以入都城殺掠數千人箭及宮闕然後往居於間廏中令擒憕及奕判官蔣清等三人害之以威於衆祿山傳憕奕清三人之首以徇河北信宿至平原太守顏真卿斬其使浴其首殮以木函祭而瘞之以聞玄宗贈憕司徒仍與一子五品官奕武部尚書崔無詖工部尚書各與一子官蔣清文部郎中憕豐於産業伊川膏腴水陸上田修竹茂樹自城及闕口別業相望與吏部侍郎李彭年皆有地癖鄭巖天寶中仕至絳郡太守入為少府監田産亞於憕憕有子十餘人二子為僧與憕同遇害二子彭源存焉源時年八歲為賊所俘轉徙流離凡七八年及史朝義走河北洛陽故吏有義源者贖之於民家代宗聞之授河南府參軍轉司農寺主簿以父死禍難無心祿仕誓不婚妻不食酒肉洛陽之北惠林寺憕之舊墅也源乃依寺僧寓居一室依僧齋戒人未嘗見其所習先穴地為墓預為終制時時偃仰於穴中長慶三年御史中丞李德裕表薦之曰處士李源即故禮部尚書東都留守贈司徒忠烈公李憕之少子天與忠孝嗣茲貞烈以父死國難哀纏終身自司農寺主簿絶心祿仕垂五十年暨于衰暮多依惠林佛寺本憕之墅也寺之正殿即憕之寢室源過殿必趨未嘗登踐隨僧一食已五十年其端心執孝無有不至抱此貞節棄於清朝臣竊為陛下惜之詔曰禮著死綏傳稱握節捐生守位取重人倫為義甚明其風或替言念於此慨然興懷而朝之公卿有上言者云天寶之季盜起幽陵振蕩生靈噬吞河洛贈司徒忠烈公憕處難居首正色受屠兩河聞風再固危壁首立殊節到今稱之其子源有曾閔之行可貫于神明有巢由之風可希于太古山林以寄其迹爵祿不入于心泊然無營五十餘載夫褒忠可以勸臣節旌孝可以激人倫尚義可以警澆浮敬老可以厚風俗舉茲四者大警于時是用擢自衡門立於文陛處以諫職冀聞讜言仍加印紱式示光寵可守左諫議大夫賜緋魚袋仍敕河南尹差官就所居敦諭遣發穆宗尋令中使齎手詔緋袍牙笏絹二百匹往洛陽惠林寺宣賜源受詔對中使苦陳疾甚年高不能趨拜附表謝恩其官告服色絹皆辭不受竟卒於寺彭以一子官纍歷州縣令長子宏仕官愈卑生三子景讓景莊景溫自元和後相繼以進士登第景讓大和中為尚書郎出為商州刺史開成二年入朝為中書舍人二年十月出為華州刺史潼關防禦鎮國軍使四年入為禮部侍郎五年選貢士李蔚後至宰相楊知退為尚書大中朝為襄州刺史山南道節度使入為吏部尚書十一年轉御史大夫景讓有大志事親以孝聞正色立朝言無避忌為大夫時宣宗舅鄭光卒詔贈司徒罷朝三日景讓曰國舅雖親朝典有素無容過越乃上言曰鄭光是陛下親舅外族之愛誠軫聖心況皇太后哀切之時理合加等而賜之粟帛隆其第宅自家刑國允謂合宜今以輟朝之數比於親王公主則前例所無縱有亦不可施用何者先王制禮所以防微大凡人情於外族則深於宗屬則薄所以先王制禮割愛厚親士庶猶然況當萬乘親王公主宗屬也舅氏外族也今朝廷公卿以至庶人據開元禮外祖父母及親舅喪服小功五月若親伯叔親兄弟即服齊縗周年所以疏其外而密於內也有天下者尤不可使外戚強盛故西漢有呂氏之侈幾滅劉氏國朝有則天之篡殆革唐命皆非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其升降有差恩禮無僭使四方見陛下欽明之德青史傳陛下制度之文垂之百王播之芳烈臣愚不肖謬竊恩私實願陛下處於堯舜之上羲軒之列所以甘心鼎鑊伏進危言優詔報之乃罷兩日景讓復為吏部尚書卒諡曰孝景溫登第後踐歷臺閣咸通中自工部侍郎出為華州刺史潼關防禦鎮國軍使景莊亦至達官張介然者蒲州猗氏人也本名六朗謹慎善籌算為郡守在河隴及天寶中王忠嗣皇甫惟明哥舒翰相次為節將並委以營田支度等使進位衛尉卿仍兼行軍司馬使如故及加銀青光祿大夫帶上柱國因入奏稱旨特加賜賚介然乘間奏曰臣今三品合列棨戟若列於帝城鄉里不知臣貴臣河東人也請列戟於故鄉玄宗曰所給可列故鄉京城佇當別賜介然拜謝而出仍賜絹五百匹令宴集閭里以寵異之本鄉列戟自介然始也哥舒翰追在西京薦為少府監安祿山將犯河洛以介然為河南防禦使令守陳留陳留水陸所湊邑居萬家而素不習戰介然至任數日賊已渡河雖率兵登城兼守要害虜騎十萬所過殺戮煙塵亙天彌漫數十里介然之衆聞吹角鼓譟之聲授甲不得氣已奪矣故至覆敗初玄宗以祿山起逆於河南要路懸榜以購其首又諭已殺其子慶宗等祿山入陳留北郭安慶緒見榜白於祿山祿山於輿中兩手撫胸大哭數聲曰我有何罪已殺我兒便縱凶毒前有陳留兵將降者向萬人行列於路祿山命其牙將殺戮皆盡流血如川乃斬介然於軍門祿山氣乃稍解頓軍於陳留郭下以其將李庭望為節度鎮之十五載玄宗贈介然工部尚書與一子五品官崔無詖者京兆長安人也本博陵舊族父從禮中宗韋庶人之舅景龍中衛尉卿時中書令酇國公蕭至忠才位素高甚承恩顧敕亡先女冥婚韋庶人亡弟無詖婚至忠女后為女家中宗為兒家供擬甚厚時人為之語曰皇后嫁女天子娶婦及韋庶人敗至忠女亦死無詖坐纍久貶在外開元中為益州司馬會楊國忠為新都尉與之歡甚國忠因事引用之纍轉陝郡太守少府監滎陽郡太守安祿山率衆南向無詖召募拒之及賊陷陳留郡後凶威轉盛戈矛鼓角驚駭城邑兩宿及滎陽乘城自墜如雨故無詖及官吏盡為賊所虜賊以其將武令珣鎮之盧奕黃門監懷慎之少子也與其兄奐齊名大腹豐下眉目疏朗謹願寡欲不尚輿馬克己自勵開元中任京兆司録參軍天寶初為鄠縣令兵部郎中所歷有聲皆如奐之所治也天寶八載轉給事中十一載為御史中丞始懷慎及奐並為中丞父子三繼清節不易時人美之奕留臺東都又分知東都武部選事十四載安祿山犯東都人吏奔散奕在臺獨居為賊所執與李憕同見害玄宗聞而愍之贈兵部尚書太常議諡博士獨狐及議曰盧奕剛毅朴忠直方而清勵精吏事所居可紀天寶十四載洛陽陷沒于時東京人士狼狽鹿駭猛虎磨牙而爭其肉居位者皆欲保命而全妻子或先策高足爭脫羿彀或不恥苟活甘飲盜泉奕獨正身守位義不去以死全節誓不辱勢窘力屈以朝服就執猶慷慨感憤數賊梟獍之罪觀者股栗奕不變其色而北面辭君然後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師敗將奔去之可也委身寇讎以死誰懟及以為不然勇者禦而忠者守必社稷是衛則死生以之危而去之是智免也於忠何有昔荀息殺身於晉不食其言也仲由結纓於衛食焉不避其難也玄冥勤其官而水死守位而忘軀也伯姬待保姆而火死先禮而後身也彼四人者死之日皆於事無補夫豈愛死而賈禍也以為死輕於義故蹈義而捐生古史書之使事君者勸然則祿山之亂大於里克孔悝奕廉察之任切於玄冥之官分命所繫不啻於保姆逆黨兵威甚于水火于斯時也能與執干戈者同其戮力挽之不來推之不去豈不以師可虧免不可苟身可殺節不可奪故全其特操於白刃之下孰與夫懷安偷生者同其風哉謹按諡法圖國忘身曰貞秉德遵業曰烈奕執憲戎馬之間志藩王室可謂圖國國危不能拯而繼之以死可謂忘身歷官一十任言必正事必果而清節不撓去之若始至可謂秉德先黃門以直道佐時奕嗣之以忠純可謂遵業請諡曰貞烈從之蔣清者故吏部侍郎欽緒之子舉明經調補太子校書郎鞏縣丞盧奕留之憲府清與諸兄溢演沇知名于時奕之被害清亦死焉顏杲卿琅邪臨沂人世仕江左五代祖之推北齊黃門侍郎修文館學士齊亡入周始家關內遂為長安人焉曾伯祖師古貞觀中祕書監自有傳曾祖勤禮崇文館學士祖甫曹王侍讀父元孫垂拱初登進士第考功員外郎劉奇榜其詞策文瑰俊拔多士聳觀歷官長安尉太子舍人毫州刺史卒杲卿以蔭受官性剛直有吏幹開元中為魏州録事參軍振舉綱目政稱第一天寶十四載攝常山太守時安祿山為河北河東採訪使常山在其部內其年十一月祿山舉范陽之兵詣闕十二月十二日陷東都杲卿忠誠感發懼賊遂寇潼關即危宗社時從弟真卿為平原太守初聞祿山逆謀陰養死士招懷豪右為拒賊之計至是遣使告杲卿相與起義兵掎角斷賊歸路以紓西寇之勢杲卿乃與長史袁履謙前真定令賈深前內丘丞張通幽等謀開土門以背之時祿山遣蔣欽湊高邈率衆五千守土門杲卿欲誅欽湊開土門之路時欽湊軍隸常山郡屬欽湊遣高邈往幽州未還杲卿遣吏召欽湊至郡計事是月二十二日夜欽湊至舍之於傳舍會飲既醉令袁履謙與參軍馮虔縣尉李栖默手力翟萬德等殺欽湊中夜履謙以欽湊首見杲卿相與垂泣喜事交濟也是夜城尉崔安石報高邈還至蒲城即令馮虔翟萬德與安石往圖之詰朝高邈之騎從數人至城驛安石皆殺之俄而邈至安石紿之曰太守備酒樂於傳舍邈方據廳下馬馮虔等擒而縶之是日賊將何千年自東都來趙郡馮虔萬德伏兵於醴泉驛千年至又擒之即日縛二賊將還郡杲卿遣子安平尉泉明及賈深張通幽翟萬德函欽湊之首械二賊送於京師至太原節度使王承業留泉明賈深等寢杲卿之表承業自上表獻之以為己功玄宗不之知擢拜承業大將軍牙官獲賞者百數玄宗尋知杲卿之功乃加衛尉卿兼御史大夫以袁履謙為常山太守賈深為司馬杲卿既斬賊將收兵練卒乃檄告河北郡縣言朝廷以榮王為河北兵馬大元帥哥舒翰為副統衆三十萬即出土門郡縣聞之皆殺賊守將遠近響應時十五郡皆為國家所守時安祿山遣使傳李憕盧奕之首徇河北至平原真卿殺賊使收藏憕等首清池尉賈載亦斬偽署景城守劉玄道傳首於平原饒陽郡守盧全誠亦據郡舉兵會于真卿時常山平原二郡兵威大振祿山方自率衆而西已至陝虢聞河北有變而還乃命史思明蔡希德率衆渡河十五年正月思明攻常山郡城中兵少衆寡不敵禦備皆竭其月八日城陷杲卿履謙為賊所執送於東都思明既陷常山遂攻諸郡鄴廣平巨鹿趙郡上谷博陵文安魏郡信都復為賊守祿山見杲卿面責之曰汝昨自范陽戶曹我奏為判官遽得光祿太常二丞便用汝攝常山太守負汝何事而背我耶杲卿瞋目而報曰我世為唐臣常守忠義縱受汝奏署復合從汝反乎且汝本營州一牧羊羯奴耳叨竊恩寵致身及此天子負汝何事而汝反耶祿山怒甚令縛於中橋南頭從西第二柱節解之比至氣絶大罵不息是日杲卿幼子誕姪詡及袁履謙皆被先截手足何千年弟在傍含血噴其面因加割臠路人見之流涕其年二月李光弼郭子儀之師自土門東下復收常山郡杲卿履謙等妻女數百人繫之獄中光弼破械出之令行喪服給遣周厚至德二年冬廣平王收復兩京史思明以河朔歸國時真卿為蒲州刺史乃令泉明於河北求訪血屬杲卿妹先適故榆次令張景儋妹女流落賊中泉明一女亦落賊中俱索購錢三萬泉明悉索所費購姑女而還比復納購己女遂失而袁履謙已下父之將吏妻子奴隸三百餘人轉徙賊中窮窘無告泉明悉以歸蒲州真卿贍給久之隨其所詣而資送之泉明求其父尸於東都得其行刑者言杲卿被害時先斷一足與履謙同坎瘞之及發瘞得尸果無一足即日與履謙之尸各為一柩扶護還長安初履謙妻疑夫柩殮衣儉薄發棺視之一與杲卿等履謙妻號踊感歎待之如父泉明之志行仁義如此乾元元年五月詔曰故衛尉卿兼御史中丞恆州刺史顏杲卿任彼專城志梟狂虜艱難之際忠義在心憤羣凶而慷慨臨大節而奮發遂擒元惡成此茂勳屬胡虜憑陵流毒方熾孤城力屈見陷寇讎身歿名存實彰忠烈夫仁者有勇驗之於臨難臣之報國義存於捐驅嘉其死節之誠未備飾終之禮可贈太子太保薛願河東汾陰人父縚禮部郎中兄崇一尚惠宣太子女宜君縣主女弟為廢太子瑛妃願坐宮廢貶官祿山之亂南陽節度使魯炅奏用願為潁川太守本郡防禦使時賊已陷陳留滎陽汝南等郡方圍南陽潁川當其來往之路願與防禦副使龐堅同力固守城中儲蓄無素兵卒單寡自至德元年正月至十一月賊晝夜攻之不息距城百里廬舍墳墓林樹開發斬徹殆盡而外救無至賊將阿史那承慶悉以鋭卒併攻為木驢木鵝雲梯衝棚四面雲合鼓譟如雷矢石如雨力攻十餘日城中守備皆竭賊夜半乘梯而入願堅俱被執送於東都將支解之或説祿山曰薛願龐堅義士也人各為其主屠之不祥乃繫於洛水之濱屬苦寒一夕凍死堅武德功臣玉之玄孫初娶邠王守禮女建寧縣主魯炅奏為潁川郡長史兼防禦副使張巡蒲州河東人兄曉開元中監察御史兄弟皆以文行知名巡聰悟有才幹舉進士三以書判拔萃入等天寶中調授清河令有能名重義尚氣節人以危窘告者必傾財以恤之祿山之亂巡為真源令説譙郡太守令完城募市人為拒賊之勢時吳王祗為靈昌太守奉詔糾率河南諸郡練兵以拒逆黨濟南太守李隨副之巡與單父尉賈賁各召募豪傑同為義舉時雍丘令令狐潮欲以其城降賊民吏百餘人不從命潮皆反接仆之于地將斬之會賊來攻城潮遽出鬬而反接者自解其縛閉城門拒潮召賁賁與巡引衆入雍丘殺潮妻子嬰城守備吳王祗承制授賁監察御史數日賊來攻城賁出鬬而死巡乃合賁之衆城守令狐潮引賊將李廷望攻圍纍月賊傷夷大半祿山乃於雍丘北置杞州築城壘以絶餉路自是內外隔絶又相持纍月賊鋒轉熾城中益困時許遠為睢陽守與城父令姚誾同守睢陽城賊攻之不下初祿山陷河洛許叔冀守靈昌薛願守潁川許遠守睢陽皆城孤無援願守一年而城陷叔冀一年而自拔獨睢陽堅守賊將尹子奇攻圍經年巡以雍丘小邑儲備不足大寇臨之必難保守乃列卒結陳詐降至德二年正月也玄宗聞而壯之授巡主客郎中兼御史中丞尹子奇攻圍既久城中糧盡易子而食析骸而爨人心危恐慮將有變巡乃出其妾對三軍殺之以饗軍士曰諸公為國家戮力守城一心無二經年乏食忠義不衰巡不能自割肌膚以啖將士豈可惜此婦人坐視危迫將士皆泣下不忍食巡強令食之乃括城中婦人既盡以男夫老小繼之所食人口二三萬人心終不離變時賀蘭進明以重兵守臨淮巡遣帳下之士南霽雲夜縋出城求援於進明進明日與諸將張樂高會無出師意霽雲泣告之曰本州強寇凌逼重圍半年食盡兵窮計無從出初圍城之日城中數萬口今婦人老幼相食殆盡張中丞殺愛妾以啖軍人今見存之數不過數千城中之人分當餌賊但睢陽既拔即及臨淮皮毛相依理須援助霽雲所以冒賊鋒刃匍匐乞師謂大夫深念危亡言發響應何得宴安自處殊無救恤之心夫忠臣義士之所為豈宜如此霽雲既不能達主將之意請嚙一指留於大夫示之以信歸報本州霽雲自臨淮還睢陽繩城而入城中將吏知救不至慟哭纍日十月城陷巡與姚誾南霽雲許遠皆為賊所執巡神氣慷慨每與賊戰大呼誓師眥裂血流齒牙皆碎城將陷西向再拜曰臣智勇俱竭不能式遏強寇保守孤城臣雖為鬼誓與賊為厲以答明恩及城陷尹子奇謂巡曰聞君每戰眥裂嚼齒皆碎何至此耶巡曰吾欲氣吞逆賊但力不遂耳子奇以大刀剔巡口視其齒存者不過三數巡大罵曰我為君父義死爾附逆賊犬彘也安能久哉子奇義其言將禮之左右曰此人守義必不為我用素得士心不可久留是日與姚暗霽雲同被害唯許遠執送洛陽姚誾者浹州平陸人故相梁國公崇之姪孫父弇開元初歷處州刺史誾性豪蕩好飲謔善絲竹歷壽安尉城父令與張巡素相親善以守睢陽之功至德二年春加檢校尚書侍郎賈賁者故閬州刺史璿之子也許遠者杭州鹽官人也世仕江右會祖高陽公敬宗龍朔中宰相自有傳遠清幹初從軍河西為磧西支度判官章仇兼瓊鎮劍南又辟為從事慕其門欲以子妻之遠辭兼瓊怒積他事中傷貶為高要尉後遇赦得還祿山之亂不次拔將帥或薦遠素練戎事玄宗召見拜睢陽太守纍加侍御史本州防禦使及賊將伊子奇攻圍遠與張巡姚誾嬰城拒守經年外救不至兵糧俱盡而城陷尹子奇執送洛陽與哥舒翰程千里俱之客省及安慶緒敗渡河北走使嚴莊皆害之初賀蘭進明與房琯素不相叶及琯為宰相進明時為御史大夫琯奏用進明為彭城太守河南節度使兼御史大夫代嗣虢王巨復用靈昌太守許叔冀為進明都知兵馬兼御史大夫重其官以挫進明虢王巨受代之時盡將部曲而行所留者揀退羸兵數千人劣馬數百匹不堪扞賊叔冀恃部下精鋭又名位等於進明自謂匹敵不受進明節制故南霽雲之乞師進明不敢分兵懼叔冀見襲兩相觀望坐視危亡致河南郡邑為墟由執政之乖經制也程千里京兆人身長七尺骨相魁岸有勇力本磧西募人纍以戎勳官至安西副都護天寶十一載授御史中丞十二載兼北庭都護充安西北庭節度使突厥首領阿布思先率衆內附隸朔方軍玄宗賜姓名曰李獻忠李林甫遙領朔方節度用獻忠為副將後有詔移獻忠部落隸幽州獻忠素與祿山有隙懼不奉詔乃叛歸磧北數為邊患玄宗憤之命千里將兵討之十二載十一月千里兵至磧西以書喻葛祿令其相應獻忠勢窮歸葛祿部葛祿縛獻忠并其妻子及帳下數千人送之千里飛表獻捷天子壯之十三載三月千里獻俘於勤政樓斬之於朱雀街以功授右金吾衛大將軍同正仍留佐羽林軍祿山之亂詔千里於河東召募充河東節度副使雲中太守十五載正月遷上黨郡長史特進攝御史中丞以兵守上黨賊來攻城屢為千里所敗以功纍加開府儀同三司禮部尚書兼御史大夫至德二年九月賊將蔡希德圍城數以輕騎挑戰千里恃其驍果開懸門率百騎欲生擒希德徑騎搏之垂將擒而希德救兵至千里斂騎而退橋壞墜坑反為希德所執仰首告諸騎曰非吾戰之過此天也為我報諸將士乍可失帥不可失城軍人聞之泣下晝夜嚴兵城守賊竟不能拔千里至東都安慶緒捨之偽署特進囚之客省及慶緒敗走為嚴莊所害其年十二月上御丹鳳樓大赦節文曰忠臣事君有死無二烈士徇義雖歿如存其李憕盧奕袁履謙張巡許遠張介然蔣清龐堅等即與追贈訪其子孫厚其官爵家口深加優恤自是赦恩無不該於節義而程千里終以生執賊庭不沾褒贈袁光庭者河西戍將天寶末為伊州刺史祿山之亂西北邊戍兵入赴難河隴郡邑皆為吐蕃所拔唯光庭守伊州纍年外救不至虜百端誘説終不之屈部下如一及矢石既盡糧儲並竭城將陷沒光庭手殺其妻子自焚而死朝廷聞之贈工部尚書邵真者恆州節度使李寶臣之判官也纍加檢校司封郎中兼御史中丞專掌文翰寶臣深所信任寶臣死其子惟嶽擅領父衆李正己田悅遣人説惟嶽同叛真泣諫曰先公位兼將相受國厚恩大夫縗絰之中遽欲違命同鄰道之惡違先公之志必不可也田悅與我密邇絶之又恐速禍正己稍遠絶之易耳但令悅使還報請徐思其宜執正己使送京師因請致討朝廷必嘉大夫之忠而旌節可得惟嶽然之令真草奏將發孔目吏胡震謂惟嶽曰此事非細請與將吏會議長史畢華曰先公與二道親好二十餘年一朝背之伏恐生事今執其來使送於京師大善脫未為朝廷所信正己兵強忽來襲城孤軍無援何以敵之不若仍舊勿絶徐觀其變惟嶽又從之真又勸惟嶽遣其弟惟簡入朝仍遣軍吏薛廣嗣詣河東節度馬燧軍求保薦田悅屯兵束鹿聞其謀遣人謂惟嶽曰邵真惑亂軍政必速殺之不然吾且討其罪矣惟嶽懼遂殺真朝廷聞而嘉之贈戶部尚書符璘者田悅之將初馬燧李抱真李芃等破田悅於洹水燧等進屯魏州時悅與李納會於濮陽因請助兵納分麾下數千人隨之至是納為河南諸軍所逼自濮陽奔歸濮州徵兵於悅悅遣璘將三百騎護送之納兵既歸送悉其衆降於燧遷璘試太子詹事兼御史中丞封義陽郡王實封一百戶璘父令奇初為悅部將至是因璘之出遂令三子同降於燧悅怒執令奇令奇大呼慢罵之悅族其家贈令奇戶部尚書趙曄字雲卿鄧州穰人其先自天水徙焉貞觀中主客員外郎德言曾孫也父敬先殿中侍御史曄志學善屬文開元中舉進士連擢科第補太子正字纍授大理評事貶北陽尉移雷澤河東二丞河東採訪使韋陟以曄履操清直頗推敬之表為賓僚陟罷陳留採訪使郭納復奏曄為支使及安祿山陷陳留因沒于賊時有京兆韋氏夫任畿官以不供賊軍遇害韋被逆賊沒入為婢江西觀察使韋儇族兄弟也曄哀其冤抑以錢贖之俾其妻置之別院厚供衣食而曄竟不面其人明年收復東都曄以家財資給而訪其親屬歸之識者咸重焉乾元初三司議罪貶晉江尉數年改録事參軍徵拜左補闕未至福建觀察使李承昭奏為判官授試大理司直兼監察御史試司議郎兼殿中侍御史入為膳部比部二員外膳部倉部二郎中祕書少監曄性孝悌敦重交友雖經艱危不改其操少時與殷寅顏真卿柳芳陸據蕭穎士李華邵軫同志友善故天寶中語曰殷顏柳陸蕭李邵趙以其重行義敦交道也而曄早擅高名在宦途五十年纍經貶謫蹇躓備至入仕三十年方霑省官身在郎署子常徒步官既散曹俸祿單寡衣食不充以至亡歿服名檢者為之歎息建中四年冬涇原兵叛曄竄于山谷尋以疾終追贈華州刺史子宗儒別有傳石演芬本西域胡人也以武勇為朔方邠寧節度兵馬使兼御史大夫李懷光養為子纍至右武鋒都將時懷光軍屯三橋將與朱泚通謀演芬乃使門客郜成義密疏具言懷光無狀請罷其總統成義至奉天乃反以其言告懷光子密告其父懷光乃召演芬責之曰以爾為子奈何欲破我家今死可乎演芬對曰天子以公為腹心公上負天子安可責演芬且演芬胡人不解異心欲守事一人幸免呼為賊死常分也懷光使左右臠食之皆曰此忠烈士也可令速死乃以刀斷其頸德宗追思義烈贈兵部尚書仍賜錢三百千又捕得郜成義于朔方戮之先是詔賜懷光鐵券懷光奉詔倨慢左都將張名振大呼軍門曰太尉見賊不擊天使到不迎固將反耶且安史兩賊僕固懷恩今皆族滅公欲何為是資忠義之士立功勳耳懷光聞之召謂曰我不反為賊強盛須蓄鋭俟時耳無幾懷光引軍入咸陽名振曰公乃言不反今此來何也何不急攻朱泚收復京城以圖富貴懷光曰名振病狂使左右殺之張伾建中初以澤潞將鎮臨洺田悅攻之伾度兵力不能出戰嚴設守備嬰城拒守賊不能拔纍月攻之益急士多死傷糧儲漸乏救兵未至伾知事不濟無以激士心乃悉召將卒於軍門命其女出拜之謂曰將士辛苦守戰伾之家無尺寸物與公等獨有此女幸未嫁人願出賣之為將士一日之費衆皆大哭曰誓為將軍死戰幸無慮也會馬燧與太原之師至與衆合擊悅於城下大敗之伾乘勢出戰士卒無不一當百圍解以功遷泗州刺史在州十餘年拜右金吾衛大將軍詔未至病卒貞元二十一年贈尚書右僕射有子重政軍吏欲立為郡將重政母徐氏固拒不從詔曰前昭義軍泗州行營衙前兵馬使大中大夫試太子賓客兼監察御史張重政門有勳力惟推義勇夙聞克家之美常稱撫衆之才近者其父初亡羣小扇惑誘以奇計俾執軍麾而重政與其母兄號泣固拒遂全懇願奔告元戎不為利回成其先志於家為孝子在國為忠臣軍政乂安行義昭著念茲名節感歎良深宜洽恩榮俾弘激勸禮無避於金革理當由於權奪戎章憲府式示兼崇可起復雲麾將軍守金吾衛大將軍員外置同正員檢校太子詹事兼御史中丞仍委淮南節度使與要職事任使又詔曰張重政母高平郡夫人徐氏族茂姻閥行表柔明懷正家之美有擇鄰之識頃當變故曾不詭隨保其門宗訓成忠孝雖圖史所載何以加之念其令子已申奬用特彰母儀之德俾崇封國之榮可封魯國太夫人甄濟字孟成中山無極人家於衛州少孤天寶中隱居衛州青岩山人伏其操行約不畋漁採訪使安祿山表薦之授試大理評事充范陽郡節度掌書記天寶末安祿山有異志謀以智免衛縣令齊誠信可托乃求使至衛具以誠告弟憕密求羊血以為備至夜偽嘔血疾不能支遂舁歸及祿山反使偽節度使蔡希德領行戮者李掞等二人封刀來召察濟詐不起即就戮之濟以左手書云去不得李掞持刀而前濟引首以待希德歔欷嗟歎之曰李掞退以實病報祿山後安慶緒亦使人至縣強舁至東都安國觀經月餘代宗收東京濟起詣軍門上謁乃送上都肅宗館之於三司使令受偽命官瞻望以愧其心授祕書郎轉太子舍人寶應初拜刑部員外郎魏少遊奏授著作郎兼侍御史終於襄州元和中襄州節度使袁滋奏其節行詔曰符風樹節謂之立名歿加褒贈所以誘善故朝散大夫祕書省著作郎兼侍御史甄濟早以文雅見稱於時嘗因辟召亦佐戎府而能保堅貞之正性不履危機覩逆亂之潛萌不從脅污義聲可傳於竹帛顯贈未賁於松楸藩方所陳允叶彝典追加命秩以奬忠魂可贈祕書少監劉敦儒開元朝史官左散騎常侍子玄之孫敦儒母有心疾非日鞭人不安子弟僕使不勝其苦皆逃遁他處唯敦儒侍養不息體常流血及母亡居喪毀瘠骨立洛中謂之劉孝子元和中東都留守權德輿具奏其至行詔曰孝子劉敦儒生於儒門稟此至性王祥篤行起孝敬而不移曾參養志積歲年而罔怠用弘勸奬而服官常分曹洛師俾遂私志可左龍武軍兵曹參軍分司東都高沐渤海人父憑從事于宣武軍知曹州事李靈曜作亂憑密遣使奏賊中事狀詔除曹州刺史無何李正己盜有曹濮憑遂陷于賊數年卒沐貞元中進士及第以家族在鄆李師古置為判官居數年師道擅襲每謀不順沐與同列郭昈李公度等必廣引古今成敗諭之前後説師道為善者凡千言其判官李文會孔目官林英皆為師道信用乘間相與涕泣於師道前曰文會等血誠憂尚書家事反為高沐輩所嫉尚書奈何不惜十二州之城成高沐等百代之名乎復日夜讒構由是漸見疑忌令沐知萊州事林英因奏事至京逼邸吏密報師道云高沐潛有誠款至朝廷矣師道大怒李文會從而構成之沐遂遇害於遷所而囚郭昈於萊州其血屬皆徙遠地及淮西平師道漸懼李公度與其將李英曇乘其懼也説師道獻三州及入質長子初甚然之中悔將殺公度賈直言聞之謂師道用事奴曰今大禍將至豈非高沐冤氣所為又殺公度是益其疾也乃止逐英曇於萊州未至縊殺之又有崔承寵楊偕陳佑崔清皆以仗順為賊所惡李文會呼為高沐之黨沐遇害承寵等同被囚放郭昈名亞於沐雖不死備嘗困辱矣及劉悟平賊遽召李公度執手歔欷既除滑州節度首辟昈及公度為從事元和十四年四月詔曰圖難忘死為臣之峻節顯忠旌善有國之令猷日者妖豎反覆侮我朝章而濮州刺史高沐劫在凶威潛輸忠款諷其不庭之咎將冀革心數其煮海之饒聿求利國伏奏必陳於逆節漏師常破其陰謀竟以盜憎遂死王事歿而不朽風聲然式表漏泉之澤且彰徑草之節可贈吏部尚書仍委馬總訪其遺骸以禮收葬優恤其家若有子孫具名聞奏賈直言者父道沖以伎術得罪貶之賜鴆於路直言偽令其父拜四方辭上下神祇伺使者視稍怠即取其鴆以飲遂迷仆而死明日鴆泄于足而復蘇代宗聞之減父死直言亦自此病躄後從事於李師道師道不恭朝命直言冒刃説者二輿櫬説者一師道訖不從及劉悟斬師道節制鄭滑得直言於禁錮之間又嘉其所為因奏置幕中後遷於潞亦與之俱行悟纖微乖失直言必盡理針規以是美譽日聞於朝穆宗以諫議大夫徵之悟拜章乞留復授檢校右庶子兼御史大夫依前充昭義軍行軍司馬悟用其言終身不虧臣節後歷太子賓客大和九年三月卒廢朝一日贈工部尚書庾敬休字順之其先南陽新野人祖光烈與仲弟光先祿山迫以偽官皆潛伏奔竄光烈為大理少卿光先為吏部侍郎父河當賊泚盜據宮闕與季弟倬逃竄山谷河終兵部郎中敬休舉進士以宏詞登科授祕書省校書郎從事宣州旋授渭南尉集賢校理遷右拾遺集賢學士歷右補闕稱職轉起居舍人俄遷禮部員外郎入為翰林學士遷禮部郎中罷職歸官又遷兵部郎中知制誥丁憂服闋改工部侍郎權知吏部選事遷吏部侍郎上將立魯王為太子慎選師傅改工部侍郎兼魯王傅奏劍南西川山南西道每年稅茶及除陌錢舊例委度支巡院勾當榷稅當司於上都召商人便換大和元年戶部侍郎崔元略與西川節度使商量取其穩便遂奏請茶稅事使司自勾當每年出錢四萬貫送省近年已來不依元奏三道諸色錢物州府逗留多不送省請取江西例於歸州置巡院一所自勾當收管諸色錢物送省所冀免有逋懸欲令巡官李濆專往與德裕遵古商量制置續具奏聞從之又奏兩川米價騰踊百姓流亡請糶兩川闕官職田祿米以救貧人從之再為尚書左丞大和九年三月卒于家敬休姿容溫雅襟抱夷曠不飲酒茹葷不邇聲色著諭善録七卷贈吏部尚書辛讜故太原尹雲京之孫壽州刺史晦之猶子也性慷慨重然諾專務賑人之急年五十不求苟進有濟時匡難之志咸通十年龐勛亂徐泗時杜慆守泗州賊以郡當江淮要害極力攻之時兩淮郡縣皆陷慆守臨淮久之援軍雖集賊未解圍時讜寓居廣陵乃仗劍拏小艇趨泗口貫城柵入城見慆慆素聞有義而不相面喜讜至握手謝曰判官李延樞方話子為人何遽至耶吾無憂矣時賊三面攻城王師結壘于洪源驛相顧不前讜夜以小舟穿賊壘至洪源驛見監軍郭厚本論泗州危急且宜速救厚本然之淮南都將王公辨謂厚本曰賊衆我寡無宜輕舉當俟可行讜坐中拔劍瞋目謂公辨曰賊百道攻城陷在旦夕公等奉詔赴援而逗留不進更欲何為不唯有負國恩丈夫氣義亦宜感發假如臨淮陷賊淮南即是寇場公何獨存耶即欲揮刃向公辨厚本持之讜望泗州大哭經日帳下為之流涕厚本義其心選勇士三百隨讜入泗州夜半斬賊柵大呼由水門而入賊軍大駭既知援兵入賊乃退舍人心遂固浙西觀察使杜審權遣大將翟行約率軍三千赴援屯蓮塘驛慆欲遣人勞之將吏皆憚其行讜曰杜相公以大夫宗盟急難相赴安得令使者無言而還即賫慆書幣犒其使淮南大將李湘率師五千來援賊詐降敗于淮口湘與郭厚本皆為賊所執自是無援賊併兵急攻以鐵鎖斷淮流梯衝雲合凡周七月晝夜不息乘城之士不遑寢寐面目生瘡軍儲漸少分食稀粥賴讜犯難仗義求救於淮北諸軍既而馬舉以大軍至賊解圍而去讜無子猶子山僧元老等寄在廣陵每出城則書二姓名謂慆曰志之得嗣為幸慆益感之賊平授讜泗州團練判官侍御史慆遷鄭滑節度讜亦從之為賓佐慆卒乃退歸江東以隱居為事贊曰獸解觸邪草能指佞烈士徇義見危致命國有忠臣亡而復存何以喪邦姦邪受恩
