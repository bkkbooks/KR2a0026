body:
  text: 舊唐書卷四十二志第二十二職官一高祖發迹太原官名稱位皆依隋舊及登極之初未遑改作隨時署置務從省便武德七年定令以太尉司徒司空為三公尚書門下中書祕書殿中內侍為六省次御史臺次太常光祿衛尉宗正太僕大理鴻臚司農太府為九寺次將作監次國子學次天策上將府次左右衛左右驍衛左右領軍左右武候左右監門左右屯左右領為十四衛府東宮置三師三少詹事府門下典書兩坊次內坊次家令率更僕三寺次左右衛率府左右宗衛率府左右虞候率府左右監門率府左右內率府為十率府王公以下置府佐國官公主置邑司已下並為京職事官州縣鎮戍嶽瀆關津為外職事官又以開府儀同三司從一品特進正二品左光祿大夫從一品右光祿大夫正二品散騎常侍從三品太中大夫正四品通直散騎常侍正四品中大夫從四品上員外散騎常侍從四品下中散大夫正五品上散騎侍郎正五品下通直散騎侍郎從五品上員外散騎侍郎從五品下朝議郎承議郎正六品通議郎通直郎從六品朝請郎宣德郎正七品朝散郎宣義郎從七品給事郎徵事郎正八品承奉郎承務郎從八品儒林郎登仕郎正九品文林郎將仕郎從九品並為文散官輔國正二品鎮軍從二品二大將軍冠軍正三品雲麾從三品忠武壯武宣威明威信遠遊騎遊擊自正四品上至從五品下十將軍為散號將軍以加武士之無職事者改上開府儀同三司為上輕車都尉開府儀同三司為輕車都尉儀同三司為騎都尉秦王齊王下統軍為護軍副統軍為副護軍上大都督為驍騎尉大都督為飛騎尉帥都督為雲騎尉都督為武騎尉車騎將軍為遊騎將軍親衛驃騎將軍為親衛中郎將其勳衛驃騎準此親衛車騎將軍為親衛中郎將其勳衛翊衛車騎並準此監門府郎將為監門中郎將領左右郎將準此諸軍驃騎將軍為統軍其秦王齊王下領三衛及庫直驅嘻直車騎並準此諸軍車騎將軍為別將其散官文騎尉為承議郎屯騎尉為通直郎雲騎尉為登仕郎羽騎尉為將仕郎武德九年罷天策上將府貞觀元年改國子學為國子監分將作為少府監通將作為三監八年七月始以雲麾將軍為從三品階九月以統軍正四品下別將正五品上十一年改令置太師太傅太保為三師其三公已下六省一臺九寺三監十二衛東宮諸司並從舊定又改以光祿大夫為從二品金紫光祿大夫為正三品銀青光祿大夫為從三品正議大夫為正四品上通議大夫為正四品下太中大夫為從四品上中大夫為從四品下中散大夫為正五品上朝議大夫為正五品下朝請大夫為從五品上朝散大夫為從五品下其六品下唯改通議郎為奉議郎自餘依舊更置驃騎大將軍為從一品武散官輔國鎮軍二大將軍為從二品武散官冠軍將軍加大字及雲麾已上遊擊已上改為五品已上武散官又置昭武振威致果翊麾宣節禦武仁勇陪戎八校尉副尉自正六品至從九品上階為校尉下階為副尉為六品已下武散官凡九品已上職事皆帶散位謂之本品職事則隨才録用或從間入劇或去高就卑遷徙出入參差不定散位則一切以門蔭結品然後勞考進武德令職事高者解散官欠一階不至為兼職事卑者不解散官貞觀令以職事高者為守職事卑者為行仍各帶散位其欠一階依舊為兼與當階者皆解散官永徽已來欠一階者或為兼或帶散官或為守參而用之其兩職事者亦為兼頗相錯亂其欠一階之兼古念反其兩職事之兼古恬反字同音異耳咸亨二年始一切為守自高宗之後官名品秩屢有改易今録永泰二年官品其改易品秩者注於官品之下若改官名及職員有加減者則各附之於本職云唐初因隋號武德三年三月改納言為侍中內史令為中書令給事郎為給事中內書省為中書省貞觀二十三年六月改民部尚書為戶部尚書七月改治書侍御史為御史中丞改諸州治中為司馬別駕為長史治禮郎為奉禮郎顯慶元年改戶部尚書為度支尚書侍郎為度支侍郎又置驃騎大將軍員從一品龍朔二年二月甲子改百司及官名改尚書省為中臺僕射為匡政左右丞為肅機左右司郎中為丞務吏部為司列主爵為司封考功為司績禮部為司禮祠部為司禋膳部為司膳主客為司蕃戶部為司元度支為司度倉部為司倉金部為司珍兵部為司戎職方為司域駕部為司輿庫部為司庫刑部為司刑都官為司僕比部為司計工部為司平屯田為司田虞部為司虞水部為司川餘司依舊尚書為太常伯侍郎為少常伯郎中為大夫中書門下為東西臺侍中為左相黃門侍郎為東臺侍郎給事中為東臺舍人散騎常侍為左右侍極諫議大夫為正諫大夫中書令為右相侍郎為西臺侍郎舍人為西臺舍人祕書省為蘭臺監為太史少監為侍郎丞為大夫著作郎為司文郎太史令為祕閣郎中御史臺為憲臺御史大夫為大司憲御史中丞為司憲大夫殿中省為中御府丞為大夫尚食為奉膳尚藥為奉醫尚衣為奉冕尚舍為奉扆尚乘為奉駕尚輦為奉御並為大夫內侍省為內侍監太常為奉常光祿為司宰衛尉為司衛宗正為司宗太僕為司馭大理為詳刑正為大夫鴻臚為司文司農為司稼太府為外府卿並為正卿少府監為內府監將作監為繕工監大匠為大監少匠為少監國子監為司成館國子祭酒為大司成司業為少司成博士為宣業都水為司津監左右衛府左右驍衛府左右武衛府並除府字左右屯衛府為左右威衛左右領軍衛為左右戎衛武候為金吾衛千牛為奉宸衛屯營為羽林軍詹事為端尹府門下典書為左右春坊左右庶子為左右中護中允為左贊善大夫洗馬為司經大夫中舍人為右贊善大夫家令寺為宮府寺率更寺為司更寺僕寺為馭僕寺長官並為大夫左右衛率府為典戎衛左右宗衛率府為司禦衛左右虞候率府為清道衛監門率府為崇掖衛內率府為奉裕衛七日又制廢尚書令改起居郎為左史起居舍人為右史著作佐郎為司文郎太史丞為祕閣郎左右千牛為奉宸司議郎為左司議郎太子舍人為右司議郎典膳藥藏內直監宮門大夫並改為郎太子千牛為奉裕總章二年置司列司戎少常伯各兩員咸亨元年十二月詔龍朔二年新改尚書省百司及僕射已下官名並依舊其東宮十率府有異上臺諸衛各宜依舊為率府其左司議郎除左字其左右金吾左右威衛依新改永淳元年七月置州別駕光宅元年九月改尚書省為文昌臺左右僕射為文昌左右相吏部為天官戶部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官門下省為鸞臺中書省為鳳閣侍中為納言中書令為內史太常為司禮鴻臚為司賓宗正為司屬光祿為司膳太府為司府太僕為司僕衛尉為司衛大理為司刑司農依舊左右驍衛為左右威衛左右武衛為左右鷹揚衛左右威衛為左右豹衛左右領軍衛為左右玉鈐衛左右金吾衛依舊御史臺改為左肅政臺專知京百官及監諸軍旅並承詔出使更置右肅政臺專知諸州案察垂拱元年二月改黃門侍郎為鸞臺侍郎文昌都省為都臺主爵為司封祕書省為麟臺內侍省為司宮臺少府監為尚方監其左右尚方兩署除方字將作監為營繕監國子監為成均監都水監為水衡監其詹事府為宮尹府詹事為太尹少詹事為少尹左右內率府為左右奉裕率府千牛為左右奉裕左右監門率府為左右控鶴禁率府諸衛鎧曹改為胄曹司膳寺肴藏署改為珍羞署十月增置天官侍郎二員又置左右補闕拾遺各二員三年加秋官侍郎一員永昌元年置左右司員外郎各一員天授二年增置左右補闕拾遺各三員通滿五員長壽二年增夏官侍郎三員大足元年加營繕少匠一員左右羽林衛各增置將軍一員洛雍並荊揚益六州置左右司馬各一員長安三年增置司勳員外郎一員地官依舊置侍郎一員洛並及三大都督府司馬宜依舊置一員神龍元年二月臺閣官名並依永淳已前故事廢左右司員外郎左右千牛衛各置大將軍一員東都置太廟官吏增置太常大理少卿各一員二年又置員外官凡二千餘人超授閹官七品已上員外者又千餘人十二月復置左右司員外郎各一員景雲二年復置太子左右諭德太子左右贊善大夫各兩員雍洛及大都督府長史加為三品階別駕致敬依前太極元年光祿大理鴻臚太府衛尉宗正各增置少卿一員祕書少監國子司業少府少監將作少匠左右臺中丞各增置一員雍洛二州及益並荊揚四大都督府各增置司馬一員分為左右司馬開元元年十二月改尚書左右僕射為左右丞相中書省為紫微省門下省為黃門省侍中為監雍州為京兆府洛州為河南府長史為尹司馬為少尹録事參軍為司録參軍餘司改司為曹五年九月紫微省依舊為中書省黃門省為門下省黃門監為侍中二十四年九月改主爵為司封天寶元年二月侍中改為左相中書令改為右相左右丞相依舊為僕射黃門侍郎為門下侍郎改州為郡刺史為太守十一載正月改吏部為文部兵部為武部刑部為憲部其行內諸司有部者並改改駕部為司駕改庫部為司庫金部為司金倉部為司儲比部為司計祠部為司禋膳部為司膳虞部為司虞水部為司水將作大匠為監少匠為少監至德二載十二月敕近日所改百司額及郡名並官名一切依故事於是侍中中書令兵吏部等並仍舊罷郡為州復以太守為刺史正第一品太師太傅太保太尉司徒司空已上職事官王爵武德令有天策上將九年省從第一品開府儀同三司文散官開府儀同三司及特進不帶職事官者朝參祿俸並同職事仍隸吏部也太子太師太子太傅太子太保已上職事官驃騎大將軍武散官嗣王郡王國公爵正第二品特進文散官輔國大將軍武散官開國郡公爵武德令唯有公侯伯子男貞觀十一年加開國之稱也上柱國勳官武德令有尚書令龍朔二年省自是正第二品無職事官從第二品尚書左右僕射太子少師太子少傅太子少保京兆河南太原等七府牧大都督揚幽潞陝靈大都護單于安西已上職事官光祿大夫文散官鎮軍大將軍武散官開國縣公爵柱國勳官正第三品侍中中書令吏部尚書舊班在左相上開元令移在下門下侍郎中書侍郎舊班正四品上大曆二年升左右衛左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛左右羽林軍左右龍武左右英武六軍大將軍左右千牛衛大將軍自左右衛已下並為武職事官戶部禮部兵部刑部工部尚書武德令禮部次吏部兵部次之民部次之貞觀年改以民部次禮部兵部次之則天初又改以戶部次吏部禮部次之兵部次之太子賓客舊兼職無品開元前令定入官品也太常卿宗正卿天寶初升入正三品也太子詹事左右散騎常侍舊班從三品廣德年升內侍監唐初舊制內侍省無三品官內侍四員秩四品天寶十三年十二月玄宗以中官高力士袁思藝承恩遇特置內侍監兩員秩三品以授之中都督上都護已上除八大將軍並為文職事官金紫光祿大夫文散官冠軍大將軍武散官懷化大將軍顯慶三年置以授初附首領仍隸諸衛也上護軍勳官從第三品御史大夫舊班在祕書監九卿下開元令移在上祕書監光祿衛尉太僕大理鴻臚司農太府卿國子祭酒殿中監少府監將作監諸衛羽林入正三品千牛龍武將軍下都督上州刺史京兆河南太原等七尹舊雍洛長史從四品上景雲二年加秩為從三品也五大都督府長史舊從四品上景雲二年加秩為從三品大都護府副都護舊正四品上開元令加入從三品親王傅已上並職事官諸衛羽林千牛龍武將軍為武餘並為文銀青光祿大夫文散官開國