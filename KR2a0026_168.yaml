body:
  text: 舊唐書卷一百六十四列傳第一百一十四王播子式弟炎起起子龜龜子蕘炎子鐸李絳絳子璋頊楊於陵子景復嗣復紹復師復王播字明揚曾祖璡嘉州司馬祖升咸陽令父恕揚府參軍播擢進士第登賢良方正制科授集賢校理再遷監察御史轉殿中歷侍御史貞元末幸臣李實為京兆尹恃恩頗橫嘗遇播於途不避故事尹避臺官播移文詆之實怒後奏播為三原令欲挫之播受命趨府謁謝盡府縣之儀及臨所部政理修明恃勢豪門未嘗貸法歲終考課為畿邑之最實以其人有政術甚禮重之頻薦之于上德宗奇之將不次拔用會母喪順宗即位除駕部郎中改長安令歲中遷工部郎中知臺雜刺舉綱憲為人所稱轉考功郎中出為虢州刺史李巽領鹽鐵奏為副使兵部郎中元和五年代李夷簡為御史中丞振舉朝章百職修舉十月代許孟容為京兆尹時禁軍諸鎮布列畿內軍人出入屬鞬佩劍往往盜發難以擒姦而播奏請畿內軍鎮將卒出入不得持戎具諸王駙馬權豪之家不得於畿內按試鷹犬畋獵之具詔從之自是姦盜弭息六年三月轉刑部侍郎充諸道鹽鐵轉運使播長於吏術雖案牘鞅掌剖析如流黠吏詆欺無不彰敗時天下多故法寺議讞科條繁雜播備舉前後格條置之座右凡有詳決疾速如神當時屬僚歎服不暇十年四月改禮部尚書領使如故先是李巽以程虉為江淮院官虉又通泉貨及播領使奏之為副當王師討吳元濟令虉乘傳往江淮賦輿大集以至賊平深有力焉及皇甫鎛用事恐播大用乃請以使務命程虉領之播守本官而已十三年檢校戶部尚書成都尹劍南西川節度使穆宗即位皇甫鎛貶播纍表求還京師長慶元年七月徵還拜刑部尚書復領鹽鐵轉運等使十月兼中書侍郎平章事領使如故長慶中內外權臣率多假借播銅鹽擢居輔弼專以承迎為事而安危啓沃不措一言時河北復叛朝廷用兵會裴度自太原入覲朝野物論言度不宜居外明年三月留度復知政事以播代度為淮南節度使檢校右僕射領使如故仍請攜鹽鐵印赴鎮上都院印請別給賜從之播至淮南屬歲旱儉人相啖食課最不充設法掊斂比屋嗟怨敬宗即位就加銀青光祿大夫檢校司空罷鹽鐵轉運使時中尉王守澄用事播自落利權廣求珍異令腹心吏內結守澄以為之助守澄乘閒啓奏言播有才上於延英言之諫議大夫獨孤朗張仲方起居郎孔敏行柳公權宋申錫補闕韋仁實劉敦儒拾遺李景讓薛廷老等請開延英面奏播之姦邪交結寵幸復求大用天子沖幼不能用其言自是物議紛然不息明年正月播復領鹽鐵轉運使播既得舊職乃於銅鹽之內巧為賦斂以事月進名為羡餘其實正額務希獎擢不恤人言時揚州城內官河水淺遇旱即滯漕船乃奏自城南閶門西七里港開河向東屈曲取禪智寺橋通舊官河開鑿稍深舟航易濟所開長一十九里其工役料度不破省錢當使方圓自備而漕運不阻後政賴之文宗即位就加檢校司徒大和元年五月自淮南入覲進大小銀碗三千四百枚綾絹二十萬匹六月拜尚書左僕射同平章事領使如故二年進封太原公太清宮使四年正月患喉腫暴卒時年七十二廢朝三日贈太尉播出自單門以文辭自立踐升華顯鬱有能名而隨勢沉浮不存士行姦邪進取君子恥之然天性勤於吏事使務填委胥吏盈廷取決簿書堆案盈几他人若不堪勝而播用此為適播子式弟炎起炎貞元十五年登進士第纍官至太常博士早世子鐸鐐起字舉之貞元十四年擢進士第釋褐集賢校理登制策直言極諫科授藍田尉宰相李吉甫鎮淮南以監察充掌書記入朝為殿中遷起居郎司勳員外郎直史館元和十四年以比部郎中知制誥穆宗即位拜中書舍人長慶元年遷禮部侍郎其年錢徽掌貢士為朝臣請託人以為濫詔起與同職白居易覆試覆落者多徽貶官起遂代徽為禮部侍郎掌貢二年得士尤精先是貢舉猥濫勢門子弟交相酬酢寒門俊造十棄六七及元稹李紳在翰林深怒其事故有覆試之科及起考貢士奏當司所選進士據所考雜文先送中書令宰臣閲視可否然後下當司放榜從之議者以為起雖避是非失貢職也故出為河南尹入為吏部侍郎文宗即位加集賢學士判院事以兄播為僕射輔政不欲典選部改兵部侍郎大和二年出為陝虢觀察使兼御史大夫四年入拜尚書左丞居播之喪號毀過禮友悌尤至遷戶部尚書判度支以西北邊備歲有和市以給軍勞人饋挽奏於靈武邠寧起營田六年檢校吏部尚書河中尹河中晉絳節度使時屬蝗旱粟價暴踊豪門閉糴以邀善價起嚴誡儲蓄之家出粟於市隱者致之於法由是民獲濟焉七年入為兵部尚書八年檢校右僕射襄州刺史充山南東道節度江漢水田前政撓法塘堰缺壞起下車命從事李業行屬郡檢視而補繕特為水法民無凶年九年就加銀青光祿大夫時李訓用事訓即起貢舉門生也欲援起為相八月詔拜兵部侍郎判戶部事其冬訓敗起以儒素長者人不以為纍但罷判戶部事文宗好文尤尚古學鄭覃長於經義起長於博洽俱引翰林講論經史起僻於嗜學雖官位崇重耽玩無斁夙夜孜孜殆忘寢食書無不覽經目靡遺轉兵部尚書以莊恪太子登儲欲令儒者授經乃兼太子侍讀判太常卿充禮儀詳定使創造禮神九玉奏議曰邦國之禮祀為大事圭壁之議經有前規謹按周禮天地四方以蒼璧禮天黃琮禮地青圭禮東方赤璋禮南方白琥禮西方黑璜禮北方又云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月星辰凡此九器皆祀神之玉也又云以禋祀祀昊天上帝鄭玄云禋煙也為玉幣祭訖燔之而升煙以報陽也今與開元禮義同此則焚玉之驗也又周禮掌國之玉鎮大寶器若大祭既事而藏之此則收玉之證也梁代崔靈恩撰三禮義宗云凡祭天神各有二玉一以禮神一則燔之禮神者訖事却收祀神者與牲俱燎則靈恩之義合于禮經今國家郊天祀地祀神之玉常用守經據古禮神之玉則無臣等請下有司精求良玉創造蒼璧黃琮等九器祭訖則藏之其燎玉即依常制從之為太子廣五運圖及文場秀句等獻之三年以本官充翰林侍講學士莊恪太子薨詔起為哀冊文辭情婉麗四年遷太子少師判兵部事侍講如故以其家貧特詔每月割仙韶院月料錢三百千添給起富於文學而理家無法俸料入門即為僕妾所有帝以師友之恩特加周給議者以與伶官分給可為恥之武宗即位八月充山陵鹵簿使樞密使劉弘逸薛季稜懼誅欲因山陵兵士謀廢立起與山陵使知其謀密奏皆伏誅尋檢校左僕射東都留守判東都尚書省事會昌元年徵拜吏部尚書判太常卿事三年權知禮部貢舉明年正拜左僕射復知貢舉起前後四典貢部所選皆當代辭藝之士有名於時人皆賞其精鑒徇公也其年秋出為興元尹兼同平章事充山南西道節度使赴鎮日延英辭帝謂之曰卿國之耆老宰相無內外朕有闕政飛表以聞宴賜頗厚在鎮二年以老疾求代不許大中元年卒于鎮時年八十八廢朝三日贈太尉諡曰文懿文集一百二十卷五緯圖十卷寫宣十卷起侍講時或僻字疑事令中使口宣即以榜子對故名曰寫宣子龜嗣龜字大年性簡淡蕭灑不樂仕進少以詩酒琴書自適不從科試京城光福里第起兄弟同居斯為宏敞龜意在人外倦接朋游乃於永達里園林深僻處創書齊吟嘯其閒目為半隱亭及從父起在河中於中條山谷中起草堂與山人道士遊朔望一還府第後人目為郎君谷及起保釐東周龜於龍門西谷構松齊棲息往來放懷事外起鎮興元又於漢陽之龍山立隱舍每浮舟而往其間逸如此武宗知之以左拾遺徵久之方至殿廷一謝陳情曰臣才疏散無用於時加以疾病所嬰不任祿仕臣父年將九十作鎮遠藩喜懼之年闕於供侍乞罷今職以奉晨昏上優詔許之明年丁父憂服闋以右補闕徵遷侍御史尚書郎大中末出為宣歙團練觀察副使賜緋入為祠部郎中史館修撰前從崔璵二宣歙及璵鎮河中又奏為副使入為兵部郎中賜金紫尋知制誥咸通末以弟鐸在中書不欲在禁掖改太常少卿尋檢校右散騎常侍同州刺史牙將白約者甚狡蠹前後防禦使不能制龜因事發笞死以徇人皆畏威自效十四年轉越州刺史御史大夫浙東團練觀察使先是龜兄式撫臨此郡有惠政聞龜復至舞抃迎之屬徐泗之亂江淮盜起山越亂攻郡為賊所害贈工部尚書子蕘蕘苦學善屬文以季父作相避嫌不就科試乾符初崔瑾廉察湖南崔涓鎮江陵皆辟為從事蕭遘作相奏授藍田尉直史館遷左拾遺右補闕中丞盧涯奏為侍御史從僖宗幸山南拜右司員外郎卒子權中興仕至兵部尚書式以門蔭纍遷監察御史轉殿中亦巧宦大和中依倚鄭注謁王守澄為中丞歸融所劾出為江陵少尹大中後踐更省署咸通初為浙東觀察使草賊仇甫據明州叛來攻會稽式討平之式有威略三年徐州銀刀軍叛以式為徐州節度使式至鎮盡誅銀刀等七軍徐方平定天子嘉之後纍歷方任卒鐸字昭範會昌初進士第兩辟使府大中初入為監察御史咸通初由駕部郎中知制誥拜中書舍人五年轉禮部侍郎典貢士兩歲時稱得人七年以戶部侍郎判度支遷禮部尚書十二年以本官同平章事時宰相韋保衡以拔擢之恩事鐸尤謹纍兼刑部吏部尚書僖宗即位加右僕射保衡得罪以鐸檢校右僕射出為汴州刺史宣武軍節度使鐸有經世大志以安邦為己任士友推之乾符二年河南江左相繼寇盜結集內官田令孜素聞鐸名乃復召鐸拜右僕射門下侍郎同平章事四年賊陷江陵楊知溫失守宋威破賊失策朝議統率宰相盧攜稱高駢纍立戰功宜付軍柄物議未允鐸廷奏曰臣忝宰執之長在朝不足分陛下之憂臣願自率諸軍蕩滌羣盜朝議然之五年以鐸守司徒門下侍郎同平章事兼江陵尹荊南節度使充諸道行營兵馬都統鐸至鎮綏懷流散完葺軍戎期年之間武備嚴整時兗州節度使李係者西平王晟之孫以其家世將才奏用為都統都押衙兼湘南團練使時黃巢在嶺南鐸悉以精甲付係令分兵扼嶺路係無將略微有口才軍政不理廣明初賊自嶺南寇湖南諸郡係守城自固不敢出戰賊編木為沿湘而下急攻潭州陷之係甲兵五萬皆為賊所殺投尸於江鐸聞係敗令部將董漢宏守江陵自率兵萬餘會襄陽之師江陵竟陷於賊天子不之責罷相守太子太師宰相盧攜用事竟以淮南高駢代鐸為都統其年秋賊焚剽淮南高駢挫敗及賊陷兩京盧攜得罪天子用鄭畋為兵馬都統明年畋病歸行在朝議復以鐸為侍中滑州刺史義成軍節度使充諸道行營都統率禁軍山南東蜀之師三萬營於盩厔東進屯靈感寺明年春兗鄆徐許鄭滑邠寧鳳翔十鎮之師大集關內時賊已僭名號以前浙東觀察使崔璆尚讓為宰相傳僞命天下藩帥多持兩端既聞鐸傳檄四方諸侯翻然景附賊之號令東西不過岐華南北止及山河而徑卒驍將日馳突於國門羣賊由是離心其年秋賊將朱溫降收同州十一月賊華州戍卒七千來奔三年二月沙陀軍至收華州四月敗賊於良田坡遂收京城封鐸晉國公鐸加中書令以收城諸將量其功伐高下承制爵賞以聞是時國命危若綴旒天子播越蠻陬大事去矣若非鄭畋之奮發鐸之忠義則土運之隆替未可知也自巢讓之亂關東方鎮牙將皆逐主帥自號藩臣時溥據徐州朱瑄據鄆州朱瑾據兗州王敬武據青州周岌據許州王重榮據河中諸葛爽據河陽皆自擅一藩職貢不入賞罰由已既逐賊出關尤恃功伐朝廷姑息不暇巢賊出關東與蔡帥秦宗權合縱時溥舉兵徐方請身先討賊乃授溥都統之命十軍軍容使田令孜以內官楊復光有監護用師之功尤忌儒臣立事故有時溥之授初鐸出軍兼鄭滑節度使以便供饋至是罷鐸都統之權令仗節歸藩鐸以朱全忠於己有恩倚為藩蔽初全忠辭禮恭順既而全忠軍旅稍集其意漸倨鐸知不可依表求還朝其年冬僖宗自蜀將還乃以鐸為滄景節度使時楊全玫在滄州聞鐸之來訴於魏州樂彥貞鐸受命赴鎮至魏州旬日彥貞迎謁宴勞甚至鐸以上台元老功蓋羣后行則肩輿妓女夾侍賓僚服御盡美一時彥貞子從訓凶戾無行竊所慕之令甘陵州卒數百人伏於漳南之高雞泊及鐸行李至皆為所掠鐸與賓客十餘人皆遇害時光啓四年十二月也鐸弟鐐纍官至汝州刺史王仙芝陷郡城被害李絳字深之趙郡贊皇人也曾祖貞簡祖剛官終宰邑父元善襄州録事參軍絳舉進士登宏辭科授祕書省校書郎秩滿補渭南尉貞元末拜監察御史元和二年以本官充翰林學士未幾改尚書主客員外郎踰年轉司勳員外郎五年遷本司郎中知制誥皆不離內職孜孜以匡諫為己任憲宗即位叛臣李錡阻兵於浙右錡既誅朝廷將輦其所沒家財絳上言曰李錡凶狡叛戾僭侈誅求刻剝六州之人積成一道之苦聖恩本以叛亂致討蘇息一方今輦運錢帛播聞四海非所謂式遏亂略惠綏困窮伏望天慈並賜本道代貧下戶今年租稅則萬姓欣戴四海歌詠矣憲宗嘉之時中官吐突承璀自藩邸承恩寵為神策護軍中尉乃於安國佛寺建立聖政碑大興功作仍請翰林為其文絳上言曰陛下布惟新之政剗積習之弊四海延頸日望德音今忽立聖政碑示天下以不廣易稱大人者與天地合德與日月合明執契垂拱勵精求理豈可以文字而盡聖德碑表而贊皇猷若可述是有分限虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政然後有罘嶧之碑揚誅伐之功紀巡幸之跡適足為百王所笑萬代所譏至今稱為失道亡國之主豈可擬議於此陛下嗣高祖太宗之業舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行又安得追秦皇暴虐不經之事而自損聖政近者閻巨源請立紀聖功碑陛下詳盡事宜皆不允許今忽令立此與前事頗乖況此碑既在安國寺不得不載遊觀崇飾之事述遊觀且乖理要崇飾又匪政經固非哲王所宜行也其碑伏乞聖恩特令寢罷憲宗深然之其碑遂止絳後因浴堂北廊奏對極論中官縱恣方鎮進獻之事憲宗怒厲聲曰卿所論奏何太過耶絳前論不已曰臣所諫論於臣無利是國家之利陛下不以臣愚使處腹心之地豈可見事虧聖德致損清時而惜身不言仰屋竊歎是臣負陛下也若不顧患禍盡誠奏論旁忤幸臣上犯聖旨以此獲罪是陛下負臣也且臣與中官素不相識又無嫌隙祇是威福太盛上損聖朝臣所以不敢不論耳使臣緘默非社稷之福也憲宗見其誠切改容慰喻之曰卿盡節於朕人所難言者卿悉言之使朕聞所不聞真忠正誠節之臣也他日南面亦須如此絳拜恩而退遽宣宰臣令與改官乃授中書舍人依前翰林學士翌日面賜金紫帝親為絳擇良笏賜之前後朝臣裴武柳公綽白居易等或為姦人所排陷特加貶黜絳每以密疏申論皆獲寬宥及鎮州節度使王士真死朝廷將用兵討除絳深陳以為未可絳既盡心匡益帝每有詢訪多協事機六年猶以中人之故罷學士守戶部侍郎判本司事嘗因次對憲宗曰戶部比有進獻至卿獨無何也絳曰將戶部錢獻入內藏是用物以結私恩上聳然益嘉其直吐突承璀恩寵莫二是歲將用絳為宰相前一日出承璀為淮南監軍翌日降制以絳為中書侍郎同中書門下平章事同列李吉甫便僻善逢迎上意絳梗直多所規諫故與吉甫不協時議者以吉甫通於承璀故絳尤惡之絳性剛訐每與吉甫爭論人多直絳憲宗察絳忠正自立故絳論奏多所允從上嘗謂絳曰卜筮之事習者罕精或中或否近日風俗尤更崇尚何也對曰臣聞古先哲王畏天命示不敢專邦有大事可疑者故先謀於卿士庶人次決於卜筮俱協則行之末俗浮僞幸以徼福正行慮危邪謀覬安遲疑昏惑謂小數能決之而愚夫愚婦假時日鬼神者欲利欺詐參之見聞用以刺射小近之事神而異之近者風俗近巫此誠弊俗聖旨所及實辨邪源但存而不論弊斯息矣他日延英上曰朕讀玄宗實録見開元致理天寶兆亂事出一朝治亂相反何也絳對曰臣聞理生於危心亂生於肆志玄宗自天后朝出居藩邸嘗蒞官守接時賢於外知人事之艱難臨御之初任姚崇宋璟二人皆忠鯁上才動以致主為心明皇乘思理之初亦勵精聽納故當時名賢在位左右前後皆尚忠正是以君臣交泰內外寧謐開元二十年以後李林甫楊國忠相繼用事專引柔佞之人分居要劇苟媚于上不聞直言嗜欲轉熾國用不足姦臣說以興利武夫說以開邊天下騷動姦盜乘隙遂至兩都覆敗四海沸騰乘輿播遷幾至難復蓋小人啓導縱逸生驕之致也至今兵宿兩河西疆削盡氓戶凋耗府藏空虛皆因天寶喪亂以至於此安危理亂實繫時主所行陛下思廣天聰親覽國史垂意精賾鑒于化源實天下幸甚上又曰凡人行事常患不通於理已然之失追悔誠難古人處此復有道否絳對曰行事過差聖哲皆所不免故天子致諍臣以匡其失故主心理於中臣論正於外制理於未亂銷患於未萌主或過舉則諫以正之故上下同體猶手足之於心膂交相為用以致康寧此亦常理非難遵之事但矜得護失常情所蔽古人貴改過不吝從善如流良為此也臣等備位無所發明但陛下不廢芻言則端士賢臣必當自效帝曰朕擢用卿等所冀直言各宜盡心無隱以匡不逮無以護失為慮也其秋魏博節度使田季安死其子懷諫幼弱軍中立其大將田興使主軍事興卒以六州之地歸命其經始營創皆絳之謀也時教坊忽稱密旨取良家士女及衣冠別第妓人京師囂然絳謂同列曰此事大虧損聖德須有論諫或曰此嗜欲間事自有諫官論列絳曰相公居常病諫官論事此難事即推與諫官可乎乃極言論奏翌日延英憲宗舉手謂絳曰昨見卿狀所論採擇事非卿盡忠於朕何以及此朕都不知向外事此是教坊罪過不諭朕意以至於此朕緣丹王已下四人院中都無侍者朕令於樂工中及閭里有情願者厚其錢帛祇取四人四王各與一人伊不會朕意便如此生事朕已令科罰其所取人並已放歸若非卿言朕寧知此過八年封高邑縣男絳以足疾拜章求免九年罷知政事授禮部尚書十年檢校戶部尚書出為華州刺史未幾入為兵部尚書丁母憂十四年檢校吏部尚書出為河中觀察使河中舊為節制皇甫鎛惡絳祇以觀察命之十五年鎛得罪絳復為兵部尚書穆宗即位改御史大夫穆宗亟於畋遊行幸絳於延英切諫帝不能用絳以疾辭復為兵部尚書長慶元年轉吏部尚書是歲加檢校尚書右僕射判東都尚書省事充東都留守二年正月檢校本官兗州刺史兗海節度觀察等使三年復為東都留守四年就加檢校司空寶曆初入為尚書左僕射二年九月昭義節度使劉悟卒遺表請以子從諫嗣襲將吏詣闕論請絳密奏請速除近澤潞四面將帥一人以充節度令倍程赴鎮使從諫未及拒命新使已到所謂疾雷不及掩耳潞州軍心自有所繫從諫無位何名主張時宰相李逢吉王守澄已受從諫賂俱請以從諫留後不能用絳言絳以直道進退聞望傾於一時然剛腸嫉惡賢不肖太分以此為非正之徒所忌又嘗與御史中丞王璠相遇於道璠不為之避絳奏論事體敕命兩省詳議咸以絳論奏是李逢吉佑璠惡絳乃罷絳僕射改授太子少師分司東都文宗即位徵為太常卿二年檢校司空出為興元尹山南西道節度使三年冬南蠻寇西蜀詔徵赴援絳於本道募兵千人赴蜀及中路蠻軍已退所募皆還興元兵額素定募卒悉令罷歸四年二月十日絳晨興視事召募卒以詔旨喻而遣之仍給以廩麥皆怏怏而退監軍使楊叔元貪財怙寵怨絳不奉己乃因募卒賞薄衆辭之際以言激之欲其為亂以逞私憾募卒因監軍之言怒氣益甚乃譟聚趨府劫庫兵以入使衙絳方與賓僚會宴不及設備聞亂北走登陴衙將王景延力戰以禦之兵折矢窮景延死絳乃為亂兵所害時年六十七絳初登陴左右請絳縋城可以避免絳不從乃并從事趙存約薛齊俱死焉文宗聞奏震悼下制曰朝有正人時稱令德入參廟算出總師干方當寵任之臣橫罹不幸之酷殄瘁興歎搢紳所同故山南西道節度管內觀察處置等使銀青光祿大夫檢校司空兼興元尹御史大夫上柱國趙郡開國公食邑二千戶李絳神授聰明天賦清直抱仁義以希前哲立標準以程後來抑揚時情坐致台輔佐我烈祖格于皇天仗鉞宣風聯居樂土乘軒鳴玉嘗極清班先聲而物議皆歸不約而羣情自許漢中名部俾遂便安而變起不圖禍生無兆殲良之慟聞訃增傷是極哀榮用優典禮三公正秩品數甚崇式表異恩以攄沉痛可贈司徒仍令所司擇日備禮冊命賻布帛三千段米粟二百石子璋頊璋登進士第盧鈞鎮太原辟為從事大中末入朝為監察轉侍御史出刺兩郡終宣歙觀察使子德林楊於陵字達夫弘農人漢太尉震之第五子奉之後曾祖圭為辰州掾曹祖冠俗奉先尉父太清宋州單父尉於陵天寶末家寄河朔祿山亂其父歿於賊於陵始六歲及長客於江南好學有奇志弱冠舉進士釋褐為潤州句容主簿時韓滉節制金陵滉性剛嚴少所接與及於陵以屬吏謁謝滉甚奇之謂其妻柳氏曰夫人常擇佳壻吾閲人多矣無如楊主簿者後竟以女妻之秩滿為鄂嶽江西二府從事纍官至侍御史韓滉自江南入朝總將相財賦之任頗承顧遇權傾中外於陵自江西府罷以婦翁權幸方熾不欲進取乃卜築於建昌以讀書山水為樂滉歿貞元八年始入朝為膳部員外郎歷考功吏部三員外判南曹時宰相有密親調集文書不如式於陵駁之大協物論遷右司郎中復轉吏部郎中改京兆少尹出為絳州刺史德宗雅聞其名將辭赴郡詔留之拜中書舍人時李實為京兆尹恃承恩寵於陵與給事中許孟容俱不附協為實媒孽孟容改太常少卿於陵為祕書少監貞元末實輩敗遷於陵為華州刺史充潼關防禦鎮國軍等使未幾遷浙江東道都團練觀察等使政聲流聞入拜戶部侍郎復改京兆尹先是禁軍影占編戶無以區別自於陵請致挾名每五丁者得兩丁入軍四丁三丁者各以條限由是京師豪強復知所畏再遷戶部侍郎元和初以考策升直言極諫牛僧孺等為執政所怒出為嶺南節度使會監軍使許遂振悍戾貪恣干撓軍政於陵奉公潔己遂振無能奈何乃以飛語上聞憲宗驚惑賴宰相裴為於陵申理憲宗感悟五年入為吏部侍郎遂振終自得罪於陵為吏部凡四周歲監察姦吏調補平允當時稱之初吏部試判別差考判官三人校能否元和初罷之七年吏部尚書鄭餘慶以疾請告乃復置考判官以兵部員外郎韋顗屯田員外張仲素太學博士陸亘等為之於陵自東都來言曰本司考判自當公心非次置官不知曹內公事考官祇論判之能否不計闕員本司祇計員闕幾何定其留放置官不便宰執以已置顗等祇令考科目選人其餘常調委本司自考於陵又以甲曆年深朽斷吏緣為姦奏換大曆七年至貞元二十年甲庫曆令本司郎官監換九年妖人楊叔高自廣州來干於陵請為己輔於陵執奏殺之改兵部侍郎判度支時淮西用兵於陵用所親為唐鄧供軍使節度使高霞寓以供軍有闕移牒度支於陵不為之易其闕如舊霞寓軍屢有摧敗詔書督責之乃奏以度支饋運不繼憲宗怒十一年貶於陵為桂陽郡守量移原王傅復遷戶部侍郎知吏部選事會誅李師道分其地為三鎮朝廷思有所制置以於陵兼御史大夫充淄青十二州宣慰使還奏合旨穆宗即位遷戶部尚書長慶初拜太常卿充東都留守年高拜章辭位寶曆二年授檢校右僕射兼太子太傅旋以左僕射致仕詔給全俸懇讓不受於陵器度弘雅進止有常居朝三十餘年踐更中外始終不失其正居官奉職亦善操守時人皆仰其風德大和四年十月卒年七十八冊贈司空諡貞孝子四人景復嗣復紹復師復嗣復自有傳景復位終同州刺史紹復進士擢第弘辭登科位終中書舍人師復位終大理卿大中後楊氏諸子登進士第者十人嗣復子授技拭撝紹復子擢拯據揆師復子拙振等擢終給事中拯司封員外郎據右補闕揆左諫議大夫拙左庶子振左拾遺史臣曰王氏二英播起位崇將相善始令終而炎薄祐短齡美鍾於鐸而能驤首矯翼淩厲亨衢仗鉞秉衡扶持衰運天胡罰善遇盜而殂悲哉李趙公頡頏禁林訏謨相府嘉言啓沃不以身為糜軀將壇沒有餘裕楊僕射避婦翁之當軸疏驕尹之怙權守道居貞壽考終吉行己始卒人以為難美哉贊曰王氏儒宗一門三相趙公排擯言猶鯁亮干將雖折不改其剛楊君之德韶夏洋洋
