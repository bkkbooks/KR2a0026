南而漸西起於月上邪北而上凡蝕十二分已上皆隨黃道所在起復於正傍逆順上下每過其分又道有升降每各不同各隨時取正求日蝕分術月在內道者朔入冬至畢朒雨水及盈秋分畢大雪皆以五百五十八為蝕差自入朒春分已後日損六分畢於白露置蝕去交前後定分皆以蝕差減之但去交分不足減者皆反以減蝕差為不蝕餘自入朒小滿畢盈小暑加時在午正前後七刻外者皆去不蝕餘一時三刻內加不蝕餘一時朒大寒畢朒立春交前五時外大暑畢盈立冬交後五時外皆去不蝕餘一時五時內加一時諸加時蝕差應減者交後減之交前加之應加者交後加之交前減之但不足減去者蝕既加減入不蝕限者或不蝕其月在外道者冬至初日無蝕差自後日益六分纍計以為蝕差畢於朒雨水自入朒春分畢於盈白露皆以五百二十二為蝕差自入盈秋分已後日損六分畢於大雪所損之餘為蝕差以蝕差加去交定分為蝕分以減後準餘為不蝕分各置其朔蝕差十五約之以減一百四餘為定法不蝕分餘各如定法得一分餘半法已上為半強已下為半弱減十五餘為蝕之大分求日蝕所起術日在內道日蝕東方三辰虧自日上近北而邪下月漸西北日漸東南日蝕南方三辰虧起右下甚正北復左下月在南而漸東日在北而漸西日蝕西方三辰月漸東北日漸西南虧自日下近西而邪上日在外道日蝕東方三辰虧自日上近南而邪下月漸東南日漸西北日蝕南方三辰虧起右下甚正北復左下月在南而漸東日在北而漸西日蝕西方三辰月漸西南日漸東北虧自日下近南而邪上凡蝕十二分已上起於正傍各據黃道升降以準其體隨其所處每各不同蝕有初末動涉其時隨便益損以定虧復所在之方也求日月蝕虧初及復末時刻術置朔望所蝕大分數為率四分已上因增二五分已上因增三九分已上因增四十三分已上因增五各為泛用刻率副之以乘所入率副之以乘所入變增減率總法而一應速增損減加應遲依其增減副訖為蝕定用刻數乃四乘之十而一以減蝕甚辰刻為虧初又六乘之十而一加蝕甚辰刻為復末依其定加時所在辰刻減命之各其辰其月蝕甚初末更籌因其日月所入辰刻及分依前定氣所遇夜刻更籌術求其初末其甚時更籌迦葉孝威等天竺法先依日月行遲疾度以推入交遠近日月蝕分加時日月蝕亦為十五分去交十五度十四度十三度影虧不蝕法自此已下乃依驗蝕十二度十五分蝕二分少強以漸差降自五度半已上蝕既十四分強若五度無餘分已下皆蝕盡又用前蝕多少以定後蝕分餘若既其後蝕度及分即加七度以為蝕度若望月蝕既來月朔日雖入而不注蝕若蝕半已下五分取一分若半已上三分取一分以加來月朔蝕度及分若今歲日餘度及分然後可驗蝕度分數多少又云六月依節一蝕是月十五日是月蝕節黑月盡是月蝕節亦以吉凶之象警告王者奉順正法蒼生福盛雖時應蝕由福故也其蝕即退更經六月欲蝕之前皆有先兆月欲有蝕先月形搖振狀若驚懼月兔及側月色黃如有憂狀自常暈月初生時光不顯盛或極細微日欲有蝕先日形搖振極如驚懼狀或光色微昧不赫盛或黎慘日月蝕先同候光隕墜或旦暮際有赤色起如火燒金銀珠玉諸寶失光或有闕盡如雲入日或有黑盡入月鳥聲細隱烏不顯亮雲交擾擾光景渾亂忽極令諸乳卒竭月溼如汗狀日形段裂無光犬嘷猫叫虹見有聲三辰失闕月時有缺水赤色有膩十四日十五日辟鳥圓集者亦是蝕之先候此等與中國法數稍殊自外梗概相似也步五星術五星奇率總率奇伏分奇皆百歲星木精五十三萬四百八十三奇三十五伏分三萬四千三十一奇二十二半熒惑火精一百四萬五千八十奇六十伏分九萬七千九十奇三十鎮星土精五十萬六千六百二十三奇二十九伏分二萬四千八百三十一奇六十四半太白金精七十八萬四百四十九奇九伏分五萬六千二百二十四奇五十四半辰星水精一十五萬五千二百七十八奇六十六伏分一萬一千六百九十九奇三十三五星終日餘奇木終日三百九十八餘一千一百六十三奇四十五火終日七百七十七餘一千二百二十奇六十土終日三百七十八餘一百三奇二十九金終日五百八十三餘一千二百二十九奇九夕見伏二百五十六日晨見伏三百二十七日餘奇同終分奇水終日一百一十五餘一千一百七十六奇六十六夕見伏五十二日晨見伏六十三日餘奇同終分奇求五星平見術各以伏分減總實餘以其星總率去之不足去者反減其餘總率餘以總法約之為日不盡為餘奇即所求年天正恆朔夜半後星晨夕平見日算及餘奇天正定朔進退日者進減退加一日為定朔夜半後星平見日及餘奇其金水二星先得夕平見其滿見伏日及餘者去之餘為晨平見日及餘奇命見日天正曆月大小以次去之不滿月者為入其月命日算外即晨夕平見所在月日及餘奇求後平見月日術各以其星終日算及餘奇如前平見所在日月算及餘奇奇滿奇率從餘餘滿總法為日去命如前即後平見所在月日及餘奇其金水二星加夕得晨加晨得夕各半見餘以同半總求五星常見術各依其星平見所入恆氣計日損益分滿半總為日不滿為分以損益所加減訖餘以加減訖平見日及分即其常見日及分星日初見去日度平見入氣曆加減日損益率歲星初見去日十四度見入冬至畢小寒均減六日自入大寒已後日損六十七分見入春分初日依平自後日加八十九分入立夏畢小滿均加六日自入芒種已後日損八十九分入夏至畢立秋均加四日自入處暑已後日損一百七十八分入白露初日依平均自後日減五十二分入小雪畢大雪均減六日熒惑初見去日十七度見入冬至初日減二十七日自後日