body:
  text: 舊唐書卷三十三志第十三曆二麟德甲子元曆上元甲子距今大唐麟德元年甲子歲積二十六萬九千八百八十算推法一千三百四十期實四十八萬九千四百二十八旬周六十推氣序術置入甲子元積算距今所求年以期乘之為期總滿法得一為積日不滿為小餘旬去積日不盡為大餘命大餘起甲子算外即所求年天正中氣冬至恆日及大小餘天正建子律氣所由故陰陽發斂皆從其時為自求恆次氣術因冬至大小餘加大餘十五小餘二百九十二小分六之五小分滿從小餘小餘滿總法之從大餘一大餘滿旬周之以次轉加而命各得其所求他皆放此凡氣餘朔大餘為日小餘為辰也求土王置清明小暑寒露小寒大寒小餘各加大餘十二小餘二百四十四小分八互乘氣小分通之加八若滿三十去從小餘一凡分餘相並不同者互乘而並之母相乘為法其並滿法一為全此即齊同之術小餘滿法從命如前即各其氣從土王日沒日法一千七百五十七沒分十二萬二千三百五十七求沒日術以九十乘有沒氣小餘十五乘小分從之以減沒分餘法得一為日不盡餘以日數加其氣大餘去命如前即其氣內沒日也小氣餘一千四十已上其氣有沒者勿推也沒餘皆盡者為減求次沒因前沒加日六十九餘一千一百四餘滿從沒日一因而命之以氣別日盈朔實三萬九千九百三十三朒朔實三萬九千二百二十恆朔實三萬九千五百七十一推朔端列期總以恆朔實除之為積月不滿為閏餘滿總法為閏日不滿為閏辰以閏日減冬至大餘辰減小餘即所求年天正月恆朔大小餘命大餘以甲子算外即其日也天正者日南至之月也恆朔者不朒不盈之常數也凡減者小餘不足減退大餘一如總法而減之大餘不足減者加旬周乃減之其須減分奇者退分餘一如其法而減以其在宿度遊實不足減者加在宿過周連餘及奇乃減之以天正恆朔小餘加閏餘以減期總餘為總實求恆弦望術因天正恆朔大小餘加大餘十小餘五百一十二太凡四分一為少二為半三為太滿法者去命如前即天正上弦恆日及大小餘以次轉加得望下弦及來月朔以次轉加去命如前合得所求他皆放此因朔徑求望加大餘十四小餘一百二十五分半因朔徑求下弦加大餘二十二小餘一百九十八少因朔徑次朔加大餘二十九小餘七百十一半總六百七十辰率三百三十五檢律候氣日術中氣律名日中影陟降率初候次候末候冬至黃鍾一丈二尺七寸五分陟四寸一分虎始交芒始生荔挺出小寒一丈二尺二寸八分陟三尺一寸三分蚯蚓結麋角解水泉動大寒大呂一丈一尺一寸五分陟一尺五寸二分雁北鄉鵲始巢雉始雊立春九尺六寸二分陟一尺五寸五分雞始乳東風解凍蟄蟲始振啓蟄太簇八尺七寸陟一尺五寸三分魚上冰獺祭魚鴻雁來雨水六尺五寸四分陟二尺二寸一分始雨水桃始花倉庚鳴春分夾鍾五尺三寸三分陟一尺九分鷹化為鳩玄鳥至雷始發聲穀明四尺三寸四分陟九寸四分始雷蟄蟲咸動穀雨姑洗三尺三寸陟八寸一分桐始華田鼠化為鴽虹始見立夏三尺四寸九分陟五寸一分萍始生戴勝降于桑螻蟈鳴小滿中呂一尺九寸八分陟三寸四分蚯蚓出王瓜生苦菜秀芒種一尺六寸四分陟一寸五分靡草死小暑至螳螂生夏至蕤賓一尺四寸九分降一寸五分鵙始鳴反舌無聲鹿角解小暑一尺六寸四分降三寸四分蟬始鳴半夏生木槿榮大暑林鍾一尺九寸八分降五寸一分溫風至蟋蟀居壁鷹乃學習立秋二尺四寸九分降八寸一分腐草為螢土潤溽暑涼風至處暑夷則三尺三分降九寸四分白露降寒蟬鳴鷹祭鳥白露四尺三寸四分降一尺九分天地始肅暴風至鴻雁來秋分南呂五尺三寸三分降一尺二寸一分玄鳥歸羣鳥養羞雷始收聲寒露六尺五寸四分降一尺五寸三分蟄蟲壞戶陰氣方盛陽氣始衰霜降無射八尺七分降一尺五寸五分水始涸鴻雁來賓雀入水為蛤立冬九尺六寸二分降一尺五寸三分菊有黃花豺祭獸水始冰小雪應鍾一丈一尺一寸五分降一尺一寸三分地始凍野雞入水為蜃虹藏不見大雪一丈二寸八分降四寸七分冰益壯地始坼鶡鳥不鳴求恆氣初日影泛差術見所求氣陟降率並後氣率半之十五而一為泛末率又二率相減餘十五而一為總差前少以總差減泛末率前多以總差加泛末率加減泛末率訖即為泛初率其後氣無同率因前末率即為泛初率以總差減初率餘為泛末率求恆氣初日影定差術十五除總差為別差為限前少者以限差加泛初末率前多者以限差減泛初末率加減泛初末率訖即為定初末率即恆氣初日影定差求次日影差術以別定差前少者加初日影定差前多者減初日影定差加減初日影定差訖即為次日影定差以次積纍歲即各得所求每氣皆十五日為限其有皆以十六除取泛末率及總差別差求恆氣日中影定數術置其恆氣小餘以半總減之餘為中後分不足減者反減半總餘為中前分置前後分影定差乘之總法而一為變差冬至後午前以變差減氣影午後以變差加氣影夏至後午前以變差加氣影午後以變差減氣影冬至一日有減無加夏至一日有加無減加減訖各其恆氣日中定影求次日中影術迭以定差陟減降加恆氣日中定影各得次日中影後漢及魏宋曆冬至日中影一丈二尺夏至一尺五寸於今並短各須隨時影校其陟降及氣日中影應二至率他皆倣此前求每日中影術古曆並無臣等創立斯法也求律呂應日及加時術十二律各以其月恆中氣日加時應列其氣小餘六乘之辰率而一為半總之數不盡為辰餘命時起子算半為加時所在辰六乘辰餘如法得一為初二為少弱三為少四為少強五為半弱若在辰半後者得一為半強二為太弱三為太四為太強五為辰末求七十二候術恆氣日即初候日也加其大餘五小餘九十七小分十一三乘氣小分加十一滿十八從小餘一滿法去命如前即次候日以次轉加得末候日求次氣日檢盈虛術進綱一十六退紀一十七泛差一十一總辰一十二六十並平闕秋分後春分前日行速春分後秋分前日行遲速為進綱遲為退紀若取其數綱為名用其時春分為至進日分前退日分後凡用綱紀皆準此例氣月中節躔差率消息總先後率盈朒積冬至子月中益七百二十二息初先五十四盈初小寒丑月節益六百七十六息七百二十二先四十六盈五十四大寒丑月中益五百一十四息一千三百四十先三十八盈一百立春寅月節益五百一十四度七十分一十四息一千八百五十四先三十八盈一百三十八啓蟄寅月中益六百一十八息二千二百六十八先四十六盈一百七十六雨水卯月節益七百二十二息二千九百八十六先五十四盈二百二十二春分卯月中損七百二十二息三千七百八先五十四盈二百七十六清明辰月節損六百一十八息二千九百八十六後四十八盈二百三十二穀雨辰月中損五百七十四息二千三百六十八後三十八盈一百七十六立夏巳月節損五百一十四息一千八百五十四後三十八盈一百三十六小滿巳月中損六百一十八息一千三百三十後四十六盈一百芒種午月節損七百七十分二十二秒息七百二十二後五十四盈五十四夏至午月中益七百二十二消初先五十四朒本小暑未月節益六百一十八消七百二十二先四十六朒五十四立秋申月節益五百一十四消一千八百五十四先三十八朒一百三十八處暑申月中益六百一十八消一千三百六十八先四十六朒一百七十六白露酉月節益七百二十二消二千九百八十六先五十四朒二百二十三秋分酉月中損七百二十二消三千七百八後五十四朒二百一十六寒露戌月節損六百一十八消二千九百八十六後四十六朒二百二十二霜降戌月中損五百一十四消二千三百六十八後三十八朒一百七十六立冬亥月節損五百一十四消一千八百五十四後三十八朒一百三十八小雪亥月中損六百一十八消一千三百四十後四十六朒一百大雪子月節損七百二十二消七百二十二後五十四朒五十四見所在氣躔差率並後氣率半之總辰乘之綱紀而一得氣末率各以泛差通其綱紀以同差辰也又二率相減餘以總辰乘而紀除之為總差辰之綱紀除之為別差率前少者以總差減末率前多者以總差加末率加減訖皆為其氣初日損益率前多者以別差率減前少者以別差率加加減氣初日損益率訖即次日損益率亦名每日躔差率以次加減得每日所求各纍所損益隨曆定氣損益消息總各為其日消息數其後氣無同率及有數同者皆因前少以前末率為初率加總差為末率別差漸加初率為每日率前多者總差減初率為末率別差漸減為日率其有氣初末計會及綱紀所校多少不叶者隨其增損調而御之使際會相準求氣盈朒所入日辰術冬夏二至即以恆氣為定自外各以氣下消息數息減消加其恆氣小餘滿若不足進退其日即其氣朒日辰亦因別其日命以甲子得所求加之為盈氣減之為朒氣定其盈朒所在故日定凡推日月度及推發斂皆依定氣推之若注曆依恆氣日求定氣恆朔弦望夜半後辰數術各置其小餘三乘如辰率而一為夜半後辰數求每日盈朒積術各置其氣先後率與盈朒積乃以先率後率加躔差率盈朒積加消息總亦如求消息法即得每日所入盈朒及先後之數求朔弦望恆日恆所入盈縮數術各以總辰乘其所入定氣日算朒朔弦望夜半後辰數乃以所入定氣夜半後辰數減之餘為辰總其恆朔弦望與定氣同日而辰多者其朔弦望即在前氣氣末而辰總時有多於進綱紀通數者疑入後氣之初也以乘其氣前多之末率前少之初率總辰而一為總率凡須相乘有分餘者母必通全子乘訖報母異者齊同也其前多者辰總減紀乘總差綱紀而一為差並於總率差辰總乘之倍總辰除之以加總率前少者辰總再乘別差總辰自辰乘倍而除之以加總率皆為總數乃以先加後減其氣盈朒為定積凡分餘不成全而更不復須者過半更不後夜無氣也以盈朒定積盈加朒減其日小餘滿若不足進退之各其入盈朒日及小餘若非朔望有交從者速粗舉者以所入定氣日算乘先後率加十五而一先加減盈朒為定積入氣日十五算者加十六而一曆變周四十四萬三千七十七變奇率十二曆變日二十七變餘七百四十三變奇一月程法六十三推曆變術以曆變周去總實餘以變奇率乘之滿變周又去之不滿者變奇率約之為變分不盡為變奇分滿總法為日不滿為餘命日算外即所求年天正恆朔夜半入變日及餘以天正恆朔小餘加之即經辰所入求朔弦望經辰所入因天正經辰所入日餘奇加日七餘五百一十二奇九奇滿率成餘餘如總法為日得上弦經辰所入以次轉加得望下弦及來月朔所入滿變日及餘奇則去之凡相連去者皆倣於此徑求望者加朔所入日十四餘一千二十五奇六徑求次朔加一日餘一千三百七奇十一求朔望弦盈朒減辰所入術各以其日所入盈朒定積盈加朒減其恆經辰所入餘即各所求變日離程離差增減率遲速積一日九百八十五退十一增一百三十四速初二日九百七十四退十二增一百一十七速一百三十四三日九百六十二退十四增九十九速二百五十一四日九百四十八退十五增七十八速三百五十五日九百三十三退十五增五十六速四百二十八六日九百一十八退十六增三十三速四百八十四七日九百二退十六增九初增九末減隱速五百一十七八日八百八十六退十六減十四速五百二十七九日八百七十退十六減三十