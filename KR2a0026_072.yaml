body:
  text: 舊唐書卷六十八列傳第十八尉遲敬德秦叔寶程知節段志玄張公謹子大素大安尉遲敬德朔州善陽人大業末從軍於高陽討捕羣賊以武勇稱累授朝散大夫劉武周起以為偏將與宋金剛南侵陷晉澮二州敬德深入至夏縣應接呂崇茂襲破永安王孝基執獨孤懷恩唐儉等武德三年太宗討武周於柏壁武周令敬德與宋金剛來拒王師於介休金剛戰敗奔於突厥敬德收其餘衆城守介休太宗遣任城王道宗宇文士及往諭之敬德與尋相舉城來降太宗大悅賜以曲宴引為右一府統軍從擊王世充於東都既而尋相與武周下降將皆叛諸將疑敬德必叛囚於車中行臺左僕射屈突通尚書殷開山咸言敬德初歸國家情志未附此人勇健非常縶之又久既被猜貳怨望必生留之恐貽後悔請即殺之太宗曰寡人所見有異於此敬德若懷翻背之計豈在尋相之後耶遽命釋之引入臥內賜以金寶謂曰丈夫以意氣相期勿以小疑介意寡人終不聽讒言以害忠良公宜體之必應欲去今以此物相資表一時共事之情也是日因從獵於榆窠遇王世充領步騎數萬來戰世充驍將單雄信領騎直趨太宗敬德躍馬大呼橫刺雄信墜馬賊徒稍卻敬德翼太宗以出賊圍更率騎兵與世充交戰數合其衆大潰擒偽將陳智略獲排矟兵六千人太宗謂敬德曰比衆人證公必叛天誘我意獨保明之福善有徵何相報之速也特賜金銀一篋此後恩眄日隆敬德善解避矟每單騎入賊陣賊矟攢刺終不能傷又能奪取賊矟還以刺之是日出入重圍往返無礙齊王元吉亦善馬矟聞而輕之欲親自試命去矟刃以竿相刺敬德曰縱使加刃終不能傷請勿除之敬德矟謹當卻刃元吉竟不能中太宗問曰奪矟避矟何者難易對曰奪矟難乃命敬德奪元吉矟元吉執矟躍馬志在刺之敬德俄頃三奪其矟元吉素驍勇雖相歎異甚以為恥及竇建德營於板渚太宗將挑戰先伏李勣程知節秦叔寶等兵太宗持弓矢敬德執矟造建德壘下大呼致師賊衆大驚擾出兵數千騎太宗逡巡漸卻前後射殺數人敬德所殺亦十數人遂引賊以入伏內於是與勣等奮擊大破之王世充兄子偽代王琬使於建德軍中乘隋煬帝所御驄馬鎧甲甚鮮迥出軍前以誇衆太宗曰彼之所乘真良馬也敬德請往取之乃與高甑生梁建方三騎直入賊軍擒琬引其馬以歸賊衆無敢當者又從討劉黑闥於臨洺黑闥軍來襲李世勣太宗勒兵掩賊後以救之既而黑闥衆至其軍四合敬德率壯士犯圍而入大破賊陣太宗與江夏王道宗乘之以出又從破徐圓朗累有戰功授秦王府左二副護軍隱太子巢剌王元吉將謀害太宗密致書以招敬德曰願迂長者之眷敦布衣之交幸副所望也仍贈以金銀器物一車敬德辭曰敬德起自幽賤逢遇隋亡天下土崩竄身無所久淪逆地罪不容誅實荷秦王惠以生命今又隸名藩邸唯當以身報恩於殿下無功不敢謬當重賜若私許殿下便是二心徇利忘忠殿下亦何所用建成怒是後遂絕敬德尋以啟聞太宗曰公之素心鬱如山嶽積金至斗知公情不可移送來但取寧須慮也若不然恐公身不安且知彼陰計足為良策元吉等深忌敬德令壯士往刺之敬德知其計乃重門洞開安臥不動賊頻至其庭終不敢入元吉乃譖敬德於高祖下詔獄訊驗將殺之太宗固諫得釋會突厥侵擾烏城建成舉元吉為將密謀請太宗同送於昆明池將加屠害敬德聞其謀與長孫無忌遽啟太宗曰大王若不速正之則恐被其所害社稷危矣太宗歎曰今二宮離阻骨肉滅棄君親危亡之機共所知委寡人雖深被猜忌禍在須臾然同氣之情終所未忍欲待其先起然後以義討之公意以為何如敬德曰人情畏死衆人以死奉王此天授也若天與不取反受其咎雖存仁愛之小情忘社稷之大計禍至而不恐將亡而自安失人臣臨難不避之節乏先賢大義滅親之事非所聞也以臣愚誠請先誅之王若不從敬德言請奔逃亡命不能交手受戮且因敗成功明賢之高見轉禍為福智士之先機敬德今若逃亡無忌亦欲同去太宗猶豫未決無忌曰王今不從敬德之言必知敬德等非王所有事今敗矣其若之何太宗曰寡人所言未可全棄公更圖之敬德曰王今處事有疑非智臨難不決非勇王縱不從敬德言請自決計其如家國何其如身命何且在外勇士八百餘人今悉入宮控弦被甲事勢已就王何得辭敬德又與侯君集日夜進勸然後計定時房玄齡杜如晦皆被高祖斥出秦府不得復入太宗令長孫無忌密召之玄齡等報曰有敕不許更事王今若私謁必至誅滅不敢奉命太宗大怒謂敬德曰玄齡如晦豈背我耶取所佩刀授敬德曰公且往觀其無來心可並斬其首持來也敬德又與無忌喻曰王已決計剋日平賊公宜即入籌之我等四人不宜羣行在道於是玄齡如晦著道士服隨無忌入敬德別道亦至六月四日建成既死敬德領七十騎躡踵繼至元吉走馬東奔左右射之墜馬太宗所乘馬又逸於林下橫被所繣墜不能興元吉遽來奪弓垂欲相扼敬德躍馬叱之於是步走欲歸武德殿敬德奔逐射殺之其宮府諸將薛萬徹謝叔方馮立等率兵大至屯於玄武門殺屯營將軍敬德持建成元吉首以示之宮府兵遂散是時高祖泛舟於海池太宗命敬德侍衞高祖敬德擐甲持矛直至高祖所高祖大驚問曰今日作亂是誰卿來此何也對曰秦王以太子齊王作亂舉兵誅之恐陛下驚動遣臣來宿衞高祖意乃安南衙北門兵馬及二宮左右猶相拒戰敬德奏請降手敕令諸軍兵並受秦王處分於是內外遂定高祖勞敬德曰卿於國有安社稷之功賜珍物甚衆太宗升春宮授太子左衞率時議者以建成等左右百餘人並合從坐籍沒唯敬德執不聽曰為罪者二凶今已誅訖若更及支黨非取安之策由是獲免及論功敬德與長孫無忌為第一各賜絹萬匹齊王府財幣器物封其全邸盡賜敬德貞觀元年拜右武候大將軍賜爵吳國公與長孫無忌房玄齡杜如晦四人並食實封千三百戶會突厥來入寇授涇州道行軍總管以擊之賊至涇陽敬德輕騎與之挑戰殺其名將賊遂敗敬德好訐直負其功每見無忌玄齡如晦等短長必面折廷辯由是與執政不平三年出為襄州都督八年累遷同州刺史嘗侍宴慶善宮時有班在其上者敬德怒曰汝有何功合坐我上任城王道宗次其下因解喻之敬德勃然拳毆道宗目幾至眇太宗不懌而罷謂敬德曰朕覽漢史見高祖功臣獲全者少意常尤之及居大位以來常欲保全功臣令子孫無絕然卿居官輒犯憲法方知韓彭夷戮非漢祖之愆國家大事唯賞與罰非分之恩不可數行勉自修飭無貽後悔也十一年封建功臣為代襲刺史冊拜敬德宣州刺史改封鄂國公後歷鄜夏二州都督十七年抗表乞骸骨授開府儀同三司令朝朔望尋與長孫無忌等二十四人圖形於凌煙閣及太宗將征高麗敬德奏言車駕若自往遼左皇太子又在定州東西二京府庫所在雖有鎮守終是空虛遼東路遙恐有玄感之變且邊隅小國不足親勞萬乘伏請委之良將自可應時摧滅太宗不納令以本官行太常卿為左一馬軍總管從破高麗於駐蹕山軍還依舊致仕敬德末年篤信仙方飛鍊金石服食雲母粉穿築池臺崇飾羅綺嘗奏清商樂以自奉養不與外人交通凡十六年顯慶三年高宗以敬德功追贈其父為幽州都督其年薨年七十四高宗為之舉哀廢朝三日令京官五品以上及朝集使赴宅哭冊贈司徒并州都督諡曰忠武賜東園祕器陪葬於昭陵子寶琳嗣官至衞尉卿秦叔寶名瓊齊州歷城人大業中為隋將來護兒帳內叔寶喪母護兒遣使弔之軍吏怪曰士卒死亡及遭喪者多矣將軍未嘗降問獨弔叔寶何也答曰此人勇悍加有志節必當自取富貴豈得以卑賤處之隋末羣盜起從通守張須擊賊帥盧明月於下邳賊衆十餘萬須所統纔萬人力勢不敵去賊六七里立柵相持十餘日糧盡將退謂諸將士曰賊見兵卻必輕來追我其衆既出營內即虛若以千人襲營可有大利此誠危險誰能去者人皆莫對唯叔寶與羅士信請行於是須委柵遁使二人分領千兵伏於蘆葦間既而明月果悉兵追之叔寶與士信馳至其柵柵門閉不得入二人超升其樓拔賊旗幟各殺數人營中大亂叔寶士信又斬關以納外兵因縱火焚其三十餘柵煙焰漲天明月奔還須又迴軍奮擊大破賊衆明月以數百騎遁去餘皆虜之由是勇氣聞於遠近又擊孫宣雅於海曲先登破之以前後累勳授建節尉從須進擊李密於滎陽軍敗須死之叔寶以餘衆附裴仁基會仁基以武牢降於李密密得叔寶大喜以為帳內驃騎待之甚厚密與化及大戰於黎陽童山為流矢所中墮馬悶絕左右奔散追兵且至唯叔寶獨捍衞之密遂獲免叔寶又收兵與之力戰化及乃退後密敗又為王世充所得署龍驤大將軍叔寶薄世充之多詐因其出抗官軍至於九曲與程金吳黑闥牛進達等數十騎西馳百許步下馬拜世充曰雖蒙殊禮不能仰事請從此辭世充不敢逼於是來降高祖令事秦府太宗素聞其勇厚加禮遇從鎮長春宮拜馬軍總管又從征於美良川破尉遲敬德功最居多高祖遣使賜以金瓶勞之曰卿不顧妻子遠來投我又立功効朕肉可為卿用者當割以賜卿況子女玉帛乎卿當勉之尋授秦王右三統軍又從破宋金剛於介休錄前後勳賜黃金百斤雜綵六千段授上柱國從討王世充每為前鋒太宗將拒竇建德於武牢叔寶以精騎數十先陷其陣世充平進封翼國公賜黃金百斤帛七千段從平劉黑闥賞物千段叔寶每從太宗征伐敵中有驍將銳卒炫燿人馬出入來去者太宗頗怒之輒命叔寶往取叔寶應命躍馬負槍而進必刺之萬衆之中人馬辟易太宗以是益重之叔寶亦以此頗自矜尚六月四日從誅建成元吉事寧拜左武衞大將軍食實封七百戶其後每多疾病因謂人曰吾少長戎馬所經二百餘陣屢中重瘡計吾前後出血亦數斛矣安得不病乎十二年卒贈徐州都督陪葬昭陵太宗特令所司就其塋內立石人馬以旌戰陣之功焉十三年改封胡國公十七年與長孫無忌等圖形於凌煙閣程知節本名金濟州東阿人也少驍勇善用馬矟大業末聚徒數百共保鄉里以備他盜後依李密署為內軍驃騎時密於軍中簡勇士尤異者八千人隸四驃騎分為左右以自衞號為內軍自云此八千人可當百萬知節既領其一甚被恩遇及王世充出城決戰知節領內馬軍與密同營在北邙山上單雄信領外馬軍營在偃師城北世充來襲雄信營密遣知節及裴行儼助之行儼先馳赴敵為流矢所中墜於地知節救之殺數人世充軍披靡乃抱行儼重騎而還為世充騎所逐刺槊洞過知節迴身捩折其槊兼斬獲追者於是與行儼俱免及密敗世充得之接遇甚厚知節謂秦叔寶曰世充器度淺狹而多妄語好為呪誓乃巫師老嫗耳豈是撥亂主乎及世充拒王師於九曲知節領兵在其陣與秦叔寶等馬上揖世充曰荷公接待極欲報恩公性猜貳傍多扇惑非僕託身之所今謹奉辭於是躍馬與左右數十人歸國世充懼不敢追之授秦王府左三統軍破宋金剛擒竇建德降王世充並領左一馬軍總管每陣先登以功封宿國公武德七年建成忌之搆之於高祖除康州刺史知節白太宗曰大王手臂今並翦除身必不久知節以死不去願速自全六月四日從太宗討建成元吉事定拜太子右衞率遷右武衞大將軍賜實封七百戶貞觀中歷瀘州都督左領軍大將軍與長孫無忌等代襲刺史改封盧國公授普州刺史十七年累轉左屯衞大將軍檢校北門屯兵加鎮軍大將軍永徽六年遷左衞大將軍顯慶二年授葱山道行軍大總管以討賀魯師次怛篤城有胡人數千家開門出降知節屠城而去賀魯遂即遠遁軍還坐免官未幾授岐州刺史表請乞骸骨許之麟德二年卒贈驃騎大將軍益州大都督陪葬昭陵子處默襲爵盧國公處亮以功臣子尚太宗女清河長公主授駙馬都尉左衞中郎將少子處弼官至右金吾將軍處弼子伯獻開元中左金吾大將軍段志玄齊州臨淄人也父偃師隋末為太原郡司法書佐從高祖起義官至郢州刺史志玄從父在太原甚為太宗所接待義兵起志玄募得千餘人授右領大都督府軍頭從平霍邑下絳郡攻永豐倉皆為先鋒歷遷左光祿大夫從劉文靜拒屈突通於潼關文靜為通將桑顯和所襲軍營已潰志玄率二十騎赴擊殺數十人而還為流矢中足慮衆心動忍而不言更入賊陣者再三顯和軍亂大軍因此復振擊大破之及屈突通之遁志玄與諸將追而擒之以功授樂遊府驃騎將軍後從討王世充深入陷陣馬倒為賊所擒兩騎夾持其髻將渡洛水志玄踊身而奮二人俱墮馬馳歸追者數百騎不敢逼及破竇建德平東都功又居多遷秦王府右二護軍賞物二千段隱太子建成巢剌王元吉競以金帛誘之志玄拒而不納密以白太宗竟與尉遲敬德等同誅建成元吉太宗即位累遷左驍衞大將軍封樊國公食實封九百戶文德皇后之葬也志玄與宇文士及分統士馬出肅章門太宗夜使宮官至二將軍所士及開營內使者志玄閉門不納曰軍門不可夜開使者曰此有手敕志玄曰夜中不辯真偽竟停使者至曉太宗聞而歎曰此真將軍也周亞夫無以加焉十一年定世封之制授金州刺史改封褒國公十二年拜右衞大將軍十四年加鎮軍大將軍十六年寢疾太宗親自臨視涕泣而別顧謂曰當與卿子五品志玄頓首固請迴授母弟志感太宗遂授志感左衞郎將及卒上為發哀哭之甚慟贈輔國將軍揚州都督陪葬昭陵諡曰忠壯十七年正月詔圖形於凌煙閣子瓚襲爵褒國公武太后時官至左屯衞大將軍子懷簡襲爵開元中官至太子詹事張公謹字弘慎魏州繁水人也初為王世充洧州長史武德元年與王世充所署洧州刺史崔樞以州城歸國授鄒州別駕累除右武候長史初未知名李勣驟薦於太宗尉遲敬德亦言之乃引入幕府時太宗為隱太子建成巢王元吉所忌因召公謹問以自安之策對甚合旨漸見親遇及太宗將討建成元吉遣卜者灼龜占之公謹自外來見遽投於地而進曰凡卜筮者將以決嫌疑定猶豫今既事在不疑何卜之有縱卜之不吉勢不可已願大王思之太宗深然其言六月四日公謹與長孫無忌等九人伏於玄武門以俟變及斬建成元吉其黨來攻玄武門兵鋒甚盛公謹有勇力獨閉關以拒之以功累授左武候將軍封定遠郡公賜實封一千戶貞觀元年拜代州都督上表請置屯田以省轉運又前後言時政得失十餘事並見納用後遣李靖經略突厥以公謹為副公謹因言突厥可取之狀曰頡利縱欲肆情窮凶極暴誅害良善昵近小人此主昏於上其可取一也又其別部同羅僕骨迴紇延之類並自立君長將圖反噬此則衆叛於下其可取二也突利被疑輕騎自免拓設出討匹馬不歸欲谷喪師立足無地此則兵挫將敗其可取三也塞北霜早糧餱乏絕其可取四也頡利疏其突厥親委諸胡胡人翻覆是其常性大軍一臨內必生變其可取五也華人入北其類實多比聞自相嘯聚保據山險師出塞垣自然有應其可取六也太宗深納之破定襄敗頡利璽書慰勞進封鄒國公轉襄州都督甚有惠政卒官年三十九太宗聞而嗟悼出次發哀有司奏言準陰陽書日子在辰不可哭泣又為流俗所忌太宗曰君臣之義同於父子情發於衷安避辰日遂哭之贈左驍衞大將軍諡曰襄十三年追思舊功改封郯國公十七年圖形於凌煙閣永徽中又贈荊州都督長子大象嗣官至戶部侍郎次子大素大安並知名大素龍朔中歷位東臺舍人兼修國史卒於懷州長史撰後魏書一百卷隋書三十卷大安上元中歷太子庶子同中書門下三品時章懷太子在春宮令大安與太子洗馬劉訥言等注范曄後漢書宮廢左授普州刺史光宅中卒於橫州司馬大安子涗開元中為國子祭酒史臣曰敬德奪矟陷陣鼓勇王師卻賂報恩竭忠霸主然而奮拳負氣非自全之道文皇告誡之言可為功臣藥石叔寶善用馬矟拔賊壘則以寡敵衆可謂勇矣知節志平國難拜隼旟則致命輔君可謂忠矣而並曉世充之猜貳識唐代之霸圖可謂見幾君子矣志玄中鏑不言竟安師旅公謹投龜定議志助儲君皆所謂猛將謀臣知機識變有唐之盛斯實賴焉贊曰太宗經綸實賴虎臣胡鄂諸將奮不顧身圖形凌煙配食嚴禋光諸簡冊為報君親
