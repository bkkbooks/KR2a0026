body:
  text: 舊唐書卷五十五列傳第五薛舉子仁杲李軌劉武周苑君璋附高開道劉黑闥徐圓朗薛舉河東汾陰人也其父汪徙居金城舉容貌瓖偉凶悍善射驍武絕倫家產鉅萬交結豪猾雄於邊朔初為金城府校尉大業末隴西羣盜蜂起百姓飢餒金城令郝瑗募得數千人使舉討捕授甲於郡中吏人咸集置酒以饗士舉與其子仁杲及同謀者十三人於座中劫瑗矯稱收捕反者因發兵囚郡縣官開倉以賑貧乏自稱西秦霸王建元為秦興封仁杲為齊公少子仁越為晉公有宗羅者先聚黨為羣盜至是帥眾會之封為義興公餘皆以次封拜掠官收馬招集羣盜兵鋒甚銳所至皆下隋將皇甫綰屯兵一萬在枹罕舉選精銳二千人襲之與綰軍遇於赤岸陳兵未戰俄而風雨暴至初風逆舉陣而綰不擊之忽返風正逆綰陣氣色昏昧軍中擾亂舉策馬先登眾軍從之隋軍大潰遂陷枹罕時羌首鍾利俗擁兵二萬在岷山界盡以眾降舉兵遂大振進仁杲為齊王授東道行軍元帥仁越為晉王兼河州刺史羅為義興王以副仁杲總兵略地又克鄯廓二州數日間盡有隴西之地眾至十三萬十三年秋七月舉僭號於蘭州以妻鞠氏為皇后母為皇太后起墳塋置陵邑立廟於城南其月舉陳兵數萬出拜墓禮畢大會仁杲進兵圍秦州仁越兵趨劍口至河池郡太守蕭瑀拒退之舉命其將常仲興渡河擊李軌與軌將李贇大戰于昌松仲興敗績全軍陷於軌及仁杲克秦州舉自蘭州遷都之遣仁杲引軍寇扶風郡汧源賊帥唐弼率眾拒之兵不得進初弼起扶風立隴西李弘芝為天子有徒十萬舉遣使招弼弼殺弘芝引軍從舉仁杲因弼弛備襲破之並有其眾弼以數百騎遁免舉勢益張軍號三十萬將圖京師會義兵定關中遂留攻扶風太宗帥師討敗之斬首數千級追奔至隴坻而還舉又懼太宗踰隴追之乃問其眾曰古來天子有降事否偽黃門侍郎褚亮曰昔越帝趙佗卒歸漢祖蜀主劉禪亦仕晉朝近代蕭琮至今猶貴轉禍為福自古有之其衞尉卿郝瑗趨而進曰皇帝失問褚亮之言又何悖也昔漢祖屢經敗績蜀先主亟亡妻子戰之利害何代無之安得一戰不捷而為亡國之計也舉亦悔之答曰聊發此問試君等耳乃厚賞瑗引為謀主瑗又勸舉連結梁師都共為聲勢厚賂突厥餌其戎馬合從并力進逼京師舉從其言與突厥莫賀咄設謀取京師莫賀咄設許以兵隨之期有日矣會都水監宇文歆使于突厥歆說莫賀咄設止其出兵故舉謀不行武德元年豐州總管張長遜進擊宗羅舉悉眾來援軍屯高咵縱兵虜掠至于豳岐之地太宗又率衆擊之軍次高咵城度其糧少意在速戰乃命深溝堅壁以老其師未及與戰會太宗不豫行軍長史劉文靜殷開山請觀兵於高咵西南恃眾不設備為舉兵掩乘其後太宗聞之知其必敗遽與書責之未至兩軍合戰竟為舉所敗死者十五六大將慕容羅李安遠劉弘基皆陷于陣太宗歸于京師舉軍取高咵又遣仁杲進圍寧州郝瑗言於舉曰今唐兵新破將帥並擒京師騷動可乘勝直取長安舉然之臨發而舉疾召巫視之巫言唐兵為祟舉惡之未幾而死舉每破陣所獲士卒皆殺之殺人多斷舌割鼻或碓擣之其妻性又酷暴好鞭撻其下見人不勝痛而宛轉於地則埋其足纔露腹背而捶之由是人心不附仁杲代董其眾偽諡舉為武皇帝未葬而仁杲滅仁杲舉長子也多力善騎射軍中號為萬人敵然所至多殺人納其妻妾獲庾信子立怒其不降磔於猛火之上漸割以啗軍士初拔秦州悉召富人倒懸之以醋灌鼻或杙其下竅以求金寶舉每誡之曰汝智略縱橫足辦我家事而傷於苛虐與物無恩終當覆我宗社舉死仁杲立於折咵城與諸將帥素多有隙及嗣位眾咸猜懼郝瑗哭舉悲思因病不起自此兵勢日衰自劉文靜為舉所敗後高祖命太宗率諸軍以擊仁杲師次高咵而堅壁不動諸將咸請戰太宗曰我士卒新敗銳氣猶少賊以勝自驕必輕敵好鬬故且閉壁以折之待其氣衰而後奮擊可一戰而破此萬全計也乃令軍中曰敢言戰者斬相持者久之仁杲勇而無謀兼糧餽不屬將士稍離其內史令翟長孫以其眾來降仁杲妹夫偽左僕射鍾俱仇以河州歸國太宗知其可擊遣將軍龐玉擊賊將宗羅於淺水原兩軍酣戰太宗以勁兵出賊不意奮擊大破之乘勝進薄其折咵城仁杲窮蹙率偽百官開門降太宗納之王師振旅以仁杲歸於京師及其首帥數十人皆斬之舉父子相繼偽位至滅凡五年隴西平李軌字處則武威姑臧人也有機辯頗窺書籍家富於財賑窮濟乏人亦稱之大業末為鷹揚府司馬時薛舉作亂於金城軌與同郡曹珍關謹梁碩李贇安修仁等謀曰薛舉殘暴必來侵擾郡官庸怯無以禦之今宜同心戮力保據河右以觀天下之事豈可束手於人妻子分散乃謀共舉兵皆相讓莫肯為主曹珍曰常聞圖讖云李氏當王今軌在謀中豈非天命也遂拜賀之推以為主軌令修仁夜率諸胡入內苑城建旗大呼軌於郭下聚眾應之執縛隋虎賁郎將謝統師郡丞韋士政軌自稱河西大涼王建元安樂署置官屬並擬開皇故事初突厥曷娑那可汗率眾內屬遣弟闕達度闕設領部落在會寧川中有二千餘騎至是自稱可汗來降于軌武德元年冬軌僭稱尊號以其子伯玉為皇太子長史曹珍為左僕射謹等議欲盡殺隋官分其家產軌曰諸人見逼為主便須稟吾處分義兵之起意在救焚今殺人取物是為狂賊立計如此何以求濟乎乃署統師太僕卿士政太府卿薛舉遣兵侵軌軌遣其將李贇擊敗于昌松斬首二千級盡虜其眾復議放還之贇言於軌曰今竭力戰勝俘虜賊兵又縱放之還使資敵不如盡坑之軌曰不然若有天命自擒其主此輩士卒終為我有若事不成留此何益遂遣之未幾攻陷張掖燉煌西平枹罕盡有河西五郡之地其年軌殺其吏部尚書梁碩初軌之起也碩為謀主甚有智略眾咸憚之碩見諸胡種落繁盛乃陰勸軌宜加防察與其戶部尚書安修仁由是有隙又軌子仲琰懷恨形於辭色修仁因之構成碩罪更譖毀之云其欲反軌令齎鴆就宅殺焉是後故人多疑懼之心膂從此稍離時高祖方圖薛舉遣使潛往涼州與之相結下璽書謂之為從弟軌大悅遣其弟懋入朝獻方物高祖授懋大將軍遣還涼州又令鴻臚少卿張侯德持節冊拜為涼州總管封涼王給羽葆鼓吹一部軌召羣僚廷議曰今吾從兄膺受圖籙據有京邑天命可知一姓不宜競立今去帝號受冊可乎曹珍進曰隋失天下英雄競逐稱王號帝鼎峙瓜分唐國自據關中大涼自處河右已為天子奈何受人官爵若欲以小事大宜依蕭詧故事自稱梁帝而稱臣於周軌從之二年遣其尚書左丞鄧曉隨使者入朝表稱皇從弟大涼皇帝臣軌而不受官時有胡巫惑之曰上帝當遣玉女從天而降遂徵兵築臺以候玉女多所糜費百姓患之又屬年饑人相食軌傾家賑之私家罄盡不能周遍又欲開倉給粟召眾議之珍等對曰國以人為本本既不立國將傾危安可惜此倉粟而坐觀百姓之死乎其故人皆云給粟為便謝統師等隋舊官人為軌所獲雖被任使情猶不附每與羣胡相結引進朋黨排軌舊人因其大餒欲離其眾乃詬珍曰百姓餓者自是弱人勇壯之士終不肯困國家倉粟須備不虞豈可散之以供小弱僕射苟悅人情殊非國計軌以為然由是士庶怨憤多欲叛之初安修仁之兄興貴先在長安表請詣涼州招慰軌高祖謂曰李軌據河西之地連好吐谷渾結援於突厥興兵討擊尚以為難豈單使所能致也興貴對曰李軌凶強誠如聖旨今若諭之以逆順曉之以禍福彼則憑固負遠必不見從何則臣於涼州奕代豪望凡厥士庶靡不依附臣之弟為軌所信任職典樞密者數十人以此候隙圖之易於反掌無不濟矣高祖從之興貴至涼州軌授以左右衞大將軍又問以自安之術興貴諭之曰涼州僻遠人物凋殘勝兵雖餘十萬開地不過千里既無險固又接蕃戎戎狄豺狼非我族類此而可久實用為疑今大唐據有京邑略定中原攻必取戰必勝是天所啟非人力焉今若舉河西之地委質事之即漢家竇融未足為比軌默然不答久之謂興貴曰昔吳濞以江左之兵猶稱己為東帝我今以河右之眾豈得不為西帝彼雖強大其如予何君與唐為計誘引於我酬彼恩遇耳興貴懼乃偽謝曰竊聞富貴不在故鄉有如衣錦夜行今合家子弟並蒙信任榮慶實在一門豈敢興心更懷他志興貴知軌不可動乃與修仁等潛謀引諸胡眾起兵圖軌將圍其城軌率步騎千餘出城拒戰先時有薛舉柱國奚道宜率羌兵三百人亡奔于軌既許其刺史而不授之禮遇又薄深懷憤怨道宜率所部共修仁擊軌軌敗入城引兵登陴冀有外救興貴宣言曰大唐使我來殺李軌不從者誅及三族於是諸城老幼皆出詣修仁軌歎曰人心去矣天亡我乎攜妻子上玉女臺置酒為別修仁執之以聞時鄧曉尚在長安聞軌敗舞蹈稱慶高祖數之曰汝委質於人為使來此聞軌淪陷曾無蹙容苟悅朕情妄為慶躍既不能留心於李軌何能盡節於朕乎竟廢而不齒軌尋伏誅自起至滅三載河西悉平詔授興貴右武候大將軍上柱國封涼國公食實封六百戶賜帛萬段修仁左武候大將軍封申國公并給田宅食實封六百戶劉武周河間景城人父匡徙家馬邑匡嘗與妻趙氏夜坐庭中忽見一物狀如雄雞流光燭地飛入趙氏懷振衣無所見因而有娠遂生武周驍勇善射交通豪俠其兄山伯每誡之曰汝不擇交遊終當滅吾族也數詈辱之武周因去家入洛為太僕楊義臣帳內募征遼東以軍功授建節校尉還家為鷹揚府校尉太守王仁恭以其州里之雄甚見親遇每令率虞候屯於閤下因與仁恭侍兒私通恐事泄又見天下已亂陰懷異計乃宣言於郡中曰今百姓飢餓死人相枕於野王府尹閉倉不恤豈憂百姓之意乎以此激怒眾人皆發憤怨武周知眾心搖動因稱疾不起鄉閭豪傑多來候問遂椎牛縱酒大言曰盜賊若此壯士守志並死溝壑今倉內積粟皆爛誰能與我取之諸豪傑皆許諾與同郡張萬歲等十餘人候仁恭視事武周上謁萬歲自後而入斬仁恭於郡廳持其首出徇郡中無敢動者於是開廩以賑窮乏馳檄境內其屬城皆歸之得兵萬餘人武周自稱太守遣使附于突厥隋鴈門郡丞陳孝意虎賁將王智辯合兵討之圍其桑乾鎮會突厥大至與武周共擊智辯隋師敗績孝意奔還鴈門部人殺之以城降于武周於是襲破樓煩郡進取汾陽宮獲隋宮人以賂突厥始畢可汗以馬報之兵威益振乃攻陷定襄復歸于馬邑突厥立武周為定楊可汗遺以狼頭纛因僭稱皇帝以妻沮氏為皇后建元為天興以衞士楊伏念為左僕射妹壻同縣人苑君璋為內史令先是上谷人宋金剛有眾萬餘人在易州界為羣盜定州賊帥魏刀兒與相表𩹉後刀兒為竇建德所滅金剛救之戰敗率餘眾四千人奔于武周武周素聞金剛善用兵得之甚喜號為宋王委以軍事中分家產遺之金剛亦深自結納遂出其妻請聘武周之妹又說武周入圖晉陽南向以爭天下武周授金剛西南道大行臺令率兵二萬人侵并州軍黃鎮又引突厥之眾兵鋒甚盛襲破榆次縣進陷介州高祖遣太常少卿李仲文率眾討之為賊所執一軍全沒仲文後得逃還復遣右僕射裴寂拒之戰又敗績武周進逼總管齊王元吉委城遁走武周遂據太原遣金剛進攻晉州六百城陷右驍衞大將軍劉弘基沒于賊進取澮州屬縣悉下夏縣人呂崇茂殺縣令自號魏王以應賊河東賊帥王行本又密與金剛連和關中大駭高祖命太宗益兵進討屯于柏壁相持者久之又命永安王孝基陝州總管于筠工部尚書獨孤懷恩內史侍郎唐儉進取夏縣不能克軍于城南崇茂與賊將尉遲敬德襲破孝基營諸軍並陷四將俱沒敬德還澮州太宗邀擊於美良川大破之敬德與賊將尋相又援王行本於蒲州太宗復破之於蒲州高祖親幸蒲津關太宗自柏壁輕騎謁高祖於行在所宋金剛遂圍絳州及太宗還金剛懼而引退武周復攻李仲文于浩州頻戰皆敗又餽運不屬賊眾大餒於是金剛遂遁太宗復追及金剛于雀鼠谷一日八戰皆破之俘斬數萬人獲輜重千餘兩金剛走入介州王師逼之金剛尚有眾二萬出其西門背城而陣太宗與諸將力戰破之金剛輕騎遁走其驍將尉遲敬德尋相張萬歲收其精兵舉介州及永安來降武周大懼率五百騎棄并州北走自乾燭谷亡奔突厥金剛復收其亡散以拒官軍人莫之從與百餘騎復奔突厥太宗進平并州悉復故地未幾金剛背突厥而亡將還上谷為追騎所獲腰斬之武周又欲謀歸馬邑事洩為突厥所殺武周自初起至死凡六載初武周引兵南侵苑君璋說曰唐主舉一州之兵定三輔之地郡縣影附所向風靡此固天命豈曰人謀且并州已南地形險阻若懸軍深入恐後無所繼不如連和突厥結援唐朝南面稱孤足為上策武周不聽遣君璋守朔州遂侵汾晉及敗泣謂君璋曰恨不用君言乃至於此武周既死突厥又以君璋為大行臺統其餘眾仍令郁射設督兵助鎮高祖遣諭之君璋部將高滿政謂君璋曰夷狄無禮本非人類豈可北面事之不如盡殺突厥以歸唐朝君璋不從滿政因人心夜逼君璋君璋亡奔突厥滿政遂以城來降拜朔州總管封榮國公明年君璋復引突厥來攻馬邑滿政死之君璋盡殺其黨而去退保恆安君璋所部稍稍離散勢蹙請降高祖許之遣使賜以金券會突厥頡利可汗復遣召之君璋猶豫未決其子孝政曰劉武周足為殷鑒今既降唐又歸頡利取滅之道也糧儲已盡人情悉離如更遲留變生肘腋恆安人郭子威說君璋曰恆安之地王者舊都山川形勝足為險固突厥方強為我脣齒據此堅城足觀天下之變何乃欲降於人也君璋然其計乃執我行人送於突厥與突厥合軍寇太原之北境君璋復見頡利政亂竟率所部來降拜安州都督封芮國公賜實封五百戶高開道滄州陽信人也少以鹽自給有勇力走及奔馬隋大業末河間人格謙擁兵於豆子開道往從之署為將軍後謙為隋師所滅開道與其黨百餘人亡匿海曲復出掠滄州招集得數百人北掠城鎮臨渝至于懷遠皆破之悉有其眾武德元年隋將李景守北平郡開道引兵圍之連年不能克景自度不能支拔城而去開道又取其地進陷漁陽郡有馬數千匹眾且萬人自立為燕王都于漁陽先是有懷戎沙門高曇晟者因縣令設齋士女大集曇晟與其僧徒五十人擁齋眾而反殺縣令及鎮將自稱大乘皇帝立尼靜宣為耶輸皇后建元為法輪至夜遣人招誘開道結為兄弟改封齊王開道以眾五千人歸之居數月襲殺曇晟悉并其眾三年復稱燕王建元署置百官羅藝在幽州為竇建德所圍告急於開道乃率二千騎援之建德懼其驍銳於是引去開道因藝遣使來降詔封北平郡王賜姓李氏授蔚州總管時幽州大饑開道許給之粟藝遣老弱就食開道皆厚遇之藝甚悅不以為虞乃發兵三千人車數百乘驢馬千餘匹請粟于開道悉留之北連突厥告絕於藝復稱燕國是歲劉黑闥入寇山東開道與之連和引兵攻易州不克而退又遣其將謝稜詐降於藝請兵援接藝出兵應之將至懷戎稜襲破藝兵開道又引突厥頻來為寇恆定幽易等州皆罹其患突厥頡利可汗攻馬邑以開道兵善為攻具引之陷馬邑而去時天下大定開道欲降自以數翻復終恐致罪又北恃突厥之眾其將士多山東人思還本土人心頗離先是劉黑闥亡將張君立奔於開道因與其將張金樹潛相結連時開道親兵數百人皆勇敢士也號為義兒常在閤內金樹每督兵於閤下金樹將圍開道潛令數人入其閤內與諸義兒陽為遊戲至日將夕陰斷其弓弦又藏其刀仗聚其矟於床下迨暝金樹以其徒大呼來攻閤下向所遣人抱義兒矟一時而出諸義兒遽將出戰而弓弦皆絕刀仗已失君立於外城舉火相應表𩹉驚擾義兒窮蹙爭歸金樹開道知不免於是擐甲持兵坐堂上與其妻妾樂酣宴金樹之黨憚其勇不敢逼天將曉開道先縊其妻妾及諸子而後自殺金樹陳兵執其義兒皆斬之又殺張君立死者五百餘人遂歸國開道自初起至滅凡八歲以其地為媯州劉黑闥貝州漳南人無賴嗜酒好博弈不治產業父兄患之與竇建德少相友善家貧無以自給建德每資之隋末亡命從郝孝德為羣盜後歸李密為裨將密敗為王世充所虜世充素聞其勇以為騎將見世充所為而竊笑之乃亡歸建德建德署為將軍封漢東郡公令將奇兵東西掩襲黑闥既遍遊諸賊善觀時變素驍勇多姦詐建德有所經略必令專知斥候常間入敵中覘視虛實或出其不意乘機奮擊多所克獲軍中號為神勇及建德敗黑闥自匿於漳南杜門不出會高祖徵建德故將范願董康買曹湛高雅賢等將赴長安願等相與謀曰王世充以洛陽降其下驍將楊公卿單雄信之徒皆被夷滅我輩若至長安必無保全之理且夏王往日擒獲淮安王全其性命遣送還之唐家今得夏王即加殺害我輩殘命若不起兵報讎實亦恥見天下人物於是相率復謀反叛卜以劉氏為主吉共往漳南見建德故將劉雅告之且請雅曰天下已平樂在丘園為農夫耳起兵之事非所願也眾怒殺雅而去范願曰漢東公劉黑闥果敢多奇略寬仁容眾恩結於士卒吾久常聞劉氏當有王者今舉大事欲收夏王之眾非其人莫可遂往詣黑闥以告其意黑闥大悅殺牛會眾舉兵得百餘人襲破漳南縣貝州刺史戴元詳魏州刺史權威合兵擊之並為黑闥所敗元詳及威皆沒于陣黑闥盡收其器械及餘眾千餘人於是范願高雅賢等宿舊左右漸來歸附眾至二千人武德四年七月設壇於漳南祭建德告以舉兵之意自稱大將軍淮安王神通將軍秦武通王行敏前後討之皆為所敗於是移書趙魏其建德將士往往殺官吏以應黑闥北連懷戎賊帥高開道兵鋒甚銳進至宗城有眾數萬黎州總管李世勣不能拒棄城走保洺州黑闥追擊破之步卒五千人皆歿于陣世勣與武通僅以身免黑闥又徵王琮為中書令劉斌為中書侍郎以掌文翰遣使北連突厥頡利可汗遣俟斤宋耶那率胡騎從之黑闥軍大振進陷相州半歲悉復建德故地兗州賊帥徐圓朗舉齊兗之地以附于黑闥其勢益張五年正月黑闥至相州僭稱漢東王建元為天造以范願為左僕射董康買為兵部尚書高雅賢為右領軍又引建德時文武悉復本位都於洺州其設法行政皆師建德而攻戰勇決過之於是太宗又自請統兵討之師次衞州黑闥數以兵挑戰輒為官軍所挫黑闥懼委相州而退保于列人營時洺水縣人請為內應太宗遣總管羅士信入城據守黑闥又攻陷其城士信死之遂據洺州三月太宗阻洺水列營以逼之分遣奇兵斷其糧道黑闥又數挑戰太宗堅壁不應以挫其鋒黑闥城中糧盡太宗度其必來決戰預擁洺水上流謂守隄吏曰我擊賊之日候賊半度而決堰黑闥果率步騎二萬渡洺水而陣與官軍大戰賊眾大潰水又大至黑闥眾不得渡斬首萬餘級溺死者數千人黑闥與范願等以千餘人奔于突厥山東悉定太宗遂引軍於河南以討徐圓朗六月黑闥復借兵於突厥來寇山東七月至定州其舊將曹湛董康買先亡在鮮虞復聚兵以應黑闥高祖遣淮陽王道玄原國公史萬寶討之戰于下博王師敗績道玄死于陣萬寶輕騎逃還由是河北諸州盡叛又降于黑闥旬日間悉復故城復都洺州十一月高祖遣齊王元吉擊之遲留不進又令隱太子建成督兵進討頻戰大捷六年二月又大破之于館陶黑闥引軍北走建成與元吉合千餘騎屯於永濟渠縱騎擊之黑闥敗走命騎將劉弘基追之黑闥為王師所蹙不得休息道遠兵疲比至饒陽從者纔百餘人眾皆餒入城求食黑闥所署饒州刺史諸葛德威出門迎拜延之入城黑闥初不許德威謬為誠敬涕泣固請黑闥乃進至城傍德威勒兵執之送于建成斬於洺州山東復定徐圓朗者兗州人也隋末亡命為羣盜據本郡縱兵略地自琅邪已西北至東平盡有之勝兵二萬餘人仍附於李密密敗歸王世充及洛陽平歸國拜兗州總管封魯郡公高祖令葛國公盛彥師安輯河南行至任城會劉黑闥作亂潛結於圓朗因執彥師舉兵應黑闥自稱魯王黑闥以圓朗為大行臺元帥兗鄆陳嵵伊洛曹戴等八州豪猾皆殺其長吏以應之太宗平黑闥進師曹州遣淮安王神通及李世勣攻之圓朗數出戰不利城內百姓爭踰城降圓朗窮蹙與數騎棄城夜遁為野人所殺其地悉平史臣曰薛舉父子勇悍絕倫性皆好殺仁杲尤甚無恩眾叛雖猛何為李軌竊據鷹揚僭號河西安隋朝官屬不奪其財破李贇甲兵放還其眾是其興也及殺害謀主崇信妖巫眾叛親離其亡也宜哉武周始為鼠竊偶恣鴟張不用君璋之謀竟為突厥所殺苑君璋及總餘眾別生異圖見頡利歸朝亦是見機者也黑闥開道勇而無謀顧其行師祇是狂賊皆為麾下所殺馭眾之道謬哉贊曰國無紀綱盜興草澤不有隋亂焉知唐德
