body:
  text: 舊唐書卷三本紀第三太宗下四年春正月乙亥定襄道行軍總管李靖大破突厥獲隋皇后蕭氏及煬帝之孫正道送至京師癸巳武德殿北院火二月己亥幸溫湯甲辰李靖又破突厥于陰山頡利可汗輕騎遠遁丙午至自溫湯甲寅大赦賜酺五日民部尚書戴胄以本官檢校吏部尚書參預朝政太常卿蕭瑀為御史大夫與宰臣參議朝政御史大夫西河郡公溫彥博為中書令三月庚辰大同道行軍副總管張寶相生擒頡利可汗獻於京師甲申尚書右僕射蔡國公杜如晦薨甲午以俘頡利告於太廟夏四月丁酉御順天門軍吏執頡利以獻捷自是西北諸蕃咸請上尊號為天可汗於是降璽書冊命其君長則兼稱之秋七月甲子朔日有蝕之上謂房玄齡蕭瑀曰隋文何等主對曰克己復禮勤勞思政每一坐朝或至日昃五品已上引之論事宿衛之人傳餐而食雖非性體仁明亦勵精之主也上曰公得其一未知其二此人性至察而心不明夫心暗則照有不通至察則多疑於物自以欺孤寡得之謂羣下不可信任事皆自決雖勞神苦形未能盡合於理朝臣既知上意亦復不敢直言宰相已下承受而已朕意不然以天下之廣豈可獨斷一人之慮朕方選天下之才為天下之務委任責成各盡其用庶幾於理也因令有司詔敕不便於時即宜執奏不得順旨施行八月丙午詔三品已上服紫五品已上服緋六品七品以緑八品九品以青婦人從夫色甲寅兵部尚書代國公李靖為尚書右僕射九月庚午令收瘞長城之南骸骨仍令致祭壬午令自古明王聖帝賢臣烈士墳墓無得芻牧春秋致祭冬十月壬辰幸隴州曲赦隴岐二州給復一年辛丑校獵於貴泉谷甲辰校獵於魚龍川自射鹿獻於大安宮十一月甲子至自隴州戊寅制決罪人不得鞭背以明堂孔穴針灸之所兵部尚書侯君集參議朝政十二月辛亥開府儀同三司淮安王神通薨甲寅高昌王麴文泰來朝是歲斷死刑二十九人幾致刑措東至于海南至于嶺皆外戶不閉行旅不齎糧焉五年春正月癸酉大搜於昆明池蕃夷君長咸從丙子親獻禽於大安宮己卯幸左藏庫賜三品已上帛任其輕重癸未朝集使請封禪二月己酉封皇弟元裕為鄶王元名為譙王靈夔為魏王元祥為許王元曉為密王庚戌封皇子愔為梁王貞為漢王惲為郯王治為晉王慎為申王囂為江王簡為代王夏四月壬辰代王簡薨以金帛購中國人因隋亂沒突厥者男女八萬人盡還其家屬六月甲寅太子少師新昌縣公李綱薨秋八月甲辰遣使毀高麗所立京觀收隋人骸骨祭而葬之戊申初令天下決死刑必三覆奏在京諸司五覆奏其日尚食進蔬食內教坊及太常不舉樂九月乙丑賜羣官大射於武德殿冬十月右衛大將軍順州都督北平郡王阿史那什鉢苾卒十二月壬寅幸溫湯癸卯獵於驪山丙午賜新豐高年帛有差戊申至自溫湯六年春正月乙卯朔日有蝕之二月丙戌置三師官員戊子初置律學三月戊辰幸九成宮六月己亥酆王元亨薨辛亥江王囂薨冬十月乙卯至自九成宮十二月辛未親録囚徒歸死罪者二百九十人于家令明年秋末就刑其後應期畢至詔悉原之是歲党項羌前後內屬者三十萬口七年春正月戊子詔曰宇文化及弟智及司馬德戡裴虔通孟景元禮楊覽唐奉義牛方裕元敏薛良馬舉元武達李孝本李孝質張愷許弘仁令孤行達席德方李覆等大業季年咸居列職或恩結一代任重一時乃包藏凶慝罔思忠義爰在江都遂行弒逆罪百閻趙釁深梟獍雖事是前代歲月已久而天下之惡古今同棄宜置重典以勵臣節其子孫並宜禁錮勿令齒是日上製破陳樂舞圖辛丑賜京城酺三日丁卯雨土乙酉薛延遣使來朝庚寅祕書監檢校侍中魏徵為侍中癸巳直太史將仕郎李淳風鑄渾天黃道儀奏之置於凝暉閣夏五月癸未幸九成宮八月山東河南三十州大水遣使賑恤冬十月庚申至自九成宮十一月丁丑頒新定五經壬辰開府儀同三司齊國公長孫無忌為司空十二月丙辰狩于少陵原詔以少牢祭杜如晦杜淹李綱之墓八年春正月癸未右衛大將軍阿史那吐苾卒辛丑右屯衛大將軍張士貴討東西五洞反獠平之壬寅命尚書右僕射李靖特進蕭瑀楊恭仁禮部尚書王圭御史大夫韋挺鄜州大都督府長史皇甫無逸揚州大都督府長史李襲譽幽州大都督府長史張亮涼州大都督李大亮右領軍大將軍竇誕太子左庶子杜正倫綿州刺史劉德威黃門侍郎趙弘智使于四方觀省風俗二月乙巳皇太子加元服丙午賜天下酺三日三月庚辰幸九成宮五月辛未朔日有蝕之丁丑上初服翼善冠貴臣服進德冠七月始以雲麾將軍階為從三品隴右山崩大蛇屢見山東河南淮南大水遣使賑恤八月甲子有星孛于虛危歷于氐十一月上旬乃滅九月丁丑皇太子來朝冬十月右驍衛大將軍褒國公段志玄擊吐谷渾破之追奔八百餘里甲子至自九成宮十一月辛未右僕射代國公李靖以疾辭官授特進丁亥吐谷渾寇涼州己丑吐谷渾拘我行人趙德楷十二月辛丑命特進李靖兵部尚書侯君集刑部尚書任城王道宗涼州都督李大亮等為大總管各帥師分道以討吐谷渾壬子越王泰為雍州牧乙卯帝從太上皇閲武於城西是歲龜茲吐蕃高昌女國石國遣使朝貢九年春三月洮州羌叛殺刺史孔長秀壬午大赦每鄉置長一人佐二人乙酉鹽澤道總管高甑生大破叛羌之衆庚寅敕天下戶立三等未盡升降置為九等夏四月壬寅康國獻獅子閏月丁卯日有蝕之癸巳大總管李靖侯君集李大亮任城王道宗破吐谷渾於牛心堆五月乙未又破之於烏海追奔至柏海副總管薛萬均薛萬徹又破之於赤水源獲其名王二十人庚子太上皇崩於大安宮壬子李靖平吐谷渾於西海之上獲其王慕容伏允以其子慕容順光降封為西平郡王復其本國秋七月甲寅增修太廟為六室冬十月庚寅葬高祖太武皇帝於獻陵戊申祔于太廟辛丑左僕射魏國公房玄齡加開府儀同三司餘如故十二月甲戌吐谷渾西平郡王慕容順光為其下所弒遣兵部尚書侯君集率師安撫之仍封順光子諾曷鉢為河源郡王使統其衆右光祿大夫宋國公蕭瑀依舊特進復令參預朝政十年春正月壬子尚書左僕射房玄齡侍中魏徵上梁陳齊周隋五代史詔藏于祕閣癸丑徙封趙王元景為荊王魯王元昌為漢王鄭王元禮為徐王徐王元嘉為韓王荊王元則為彭王滕王元懿為鄭王吳王元軌為霍王豳王元鳳為虢王陳王元慶為道王魏王靈夔為燕王蜀王恪為吳王越王泰為魏王燕王祐為齊王梁王愔為蜀王郯王惲為蔣王漢王貞為越王申王慎為紀王夏六月以侍中魏徵為特進仍知門下省事壬申中書令溫彥博為尚書右僕射甲戌太常卿安德郡公楊師道為侍中己卯皇后長孫氏崩于立政殿冬十一月庚寅葬文德皇后於昭陵十二月壬申吐谷渾河源郡王慕容諾曷鉢來朝乙亥親録京師囚徒是歲關內河東疾病命醫齎藥療之十一年春正月丁亥朔徙鄶王元裕為鄧王譙王元名為舒王癸巳加魏王泰為雍州牧左武候大將軍庚子頒新律令於天下作飛山宮甲寅房玄齡等進所修五禮詔所司行用之二月丁巳詔曰夫生者天地之大德壽者修短之一期生有七尺之形壽以百齡為限含靈稟氣莫不同焉皆得之於自然不可以分外企也是以禮記云君即位而為椑莊周云勞我以形息我以死豈非聖人遠鑒通賢深識末代已來明辟蓋寡靡不矜黃屋之尊慮白駒之過並多拘忌有慕遐年謂雲車易乘羲輪可駐異軌同趣其蔽甚矣有隋之季海內橫流豺狼肆暴吞噬黔首朕投袂發憤情深拯溺扶翼義師濟斯塗炭賴蒼昊降鑒股肱宣力提劍指麾天下大定此朕之宿志於斯已畢猶恐身後之日子子孫孫習於流俗猶循常禮加四重之櫬伐百祀之木勞擾百姓崇厚園陵今預為此制務從儉約於九之山足容棺而已積以歲月漸而備之木馬塗車土桴葦籥事合古典不為時用又佐命功臣或義深舟楫或謀定帷幄或身摧行陳同濟艱危克成鴻業追念在昔何日忘之使逝者無知咸歸寂寞若營魂有識還如疇曩居止相望不亦善乎漢氏使將相陪陵又給以東園祕器篤終之義恩意深厚古人豈異我哉自今已後功臣密戚及德業佐時者如有薨亡宜賜塋地一所及以祕器使窀穸之時喪事無闕所司依此營備稱朕意焉甲子幸洛陽宮命祭漢文帝三月丙戌朔日有蝕之丁亥車駕至洛陽丙申改洛州為洛陽宮辛亥大搜於廣城澤癸丑還宮夏四月甲子震乾元殿前槐樹丙寅詔河北淮南舉孝悌淳篤兼間時務儒術該通可為師範文辭秀美才堪著述明識政體可委字人並志行修立為鄉閭所推者給傳詣洛陽宮六月甲寅尚書右僕射虞國公溫彥博薨丁巳幸明德宮己未定制諸王為世封刺史戊辰定制勳臣為世封刺史改封任城王道宗為江夏郡王趙郡王孝恭為河間郡王己巳改封許王元祥為江王秋七月癸未大霪雨穀水溢入洛陽宮深四尺壞左掖門毀宮寺十九所洛水溢漂六百家庚寅詔以災命百官上封事極言得失丁酉車駕還宮壬寅廢明德宮及飛山宮之玄圃院分給遭水之家仍賜帛有差丙午修老君廟於亳州宣尼廟於兗州各給二十戶享祀焉涼武昭王復近墓二十戶充守衛仍禁芻牧樵採九月丁亥河溢壞陝州河北縣毀河陽中灘幸白司馬坂以觀之賜遭水之家粟帛有差冬十一月辛卯幸懷州乙未狩於濟源丙午車駕還宮十二月辛酉百濟王遣其太子隆來朝十二年春正月乙未吏部尚書高士廉等上氏族志一百三十卷壬寅松叢二州地震壞人廬舍有壓死者二月乙卯車駕還京癸亥觀砥柱勒銘以紀功德甲子夜郎獠反夔州都督齊善行討平之乙丑次陝州自新橋幸河北縣祀夏禹廟丁卯次柳谷頓觀鹽池戊寅以隋鷹揚郎將堯君素忠於本朝贈蒲州刺史仍録其子孫閏二月庚辰朔日有蝕之丙戌至自洛陽宮夏五月壬申銀青光祿大夫永興縣公虞世南卒六月庚子初置玄武門左右飛騎秋七月癸酉吏部尚書申國公高士廉為尚書右僕射冬十月己卯狩于始平賜高年粟帛有差乙未至自始平己亥百濟遣使貢金甲雕斧十二月辛巳右武候將軍上官懷仁大破山獠於壁州十三年春正月乙巳朔謁獻陵曲赦三原縣及行從大辟罪丁未至自獻陵戊午加房玄齡為太子少師二月丙子停世襲刺史三月乙丑有星孛于畢昴夏四月戊寅幸九成宮甲申阿史那結社爾犯御營伏誅壬寅雲陽石燃者方丈晝如灰夜則有光投草木於上則焚歷年而止自去冬不雨至于五月甲寅避正殿令五品以上上封事減膳罷役分使賑恤申理冤屈乃雨六月丙申封皇弟元嬰為滕王秋八月辛未朔日有蝕之庚辰立右武候大將軍化州都督懷化郡王李思摩為突厥可汗率所部建牙于河北冬十月甲申至自九成宮十一月辛亥侍中安德郡公楊師道為中書令十二月丁丑吏部尚書陳國公侯君集為交河道行軍大總管帥師伐高昌乙亥封皇子福為趙王壬午巂州都督王志遠有罪伏誅詔於洛相幽徐齊並秦蒲等州並置常平倉己丑吐谷渾河源郡王慕容諾曷鉢來逆女壬辰狩于咸陽是歲滁州言野蠶食槲葉成繭大如奈其色緑凡六千五百七十石高麗新羅西突厥吐火羅康國安國波斯疏勒于闐焉耆高昌林邑昆明及荒服蠻酋相次遣使朝貢十四年春正月庚子初命有司讀時令甲寅幸魏王泰宅赦雍州及長安獄大辟罪已下二月丁丑幸國子學親釋奠赦大理萬年繫囚國子祭酒以下及學生高第精勤者加一級賜帛有差庚辰左驍衛將軍淮陽王道明送弘化公主歸于吐谷渾壬午幸溫湯辛卯至自溫湯乙未詔以梁皇侃褚仲都周熊安生沈重陳沈文阿周弘正張譏隋何妥劉焯劉炫等前代名儒學徒多行其義命求其後三月戊午置寧朔大使以護突厥夏五月壬戌徙封燕王靈夔為魯王六月乙酉大風拔木己丑薛延遣使求婚乙未滁州野蠶成繭凡收八千三百石八月庚午新作襄城宮癸巳交河道行軍大總管侯君集平高昌以其地置西州九月癸卯曲赦西州大辟罪乙卯於西州置安西都護府冬十月己卯詔以贈司空河間元王孝恭贈陝東道大行臺尚書右僕射鄖節公殷開山贈民部尚書渝襄公劉政會等配饗高祖廟庭閏月乙未幸同州甲辰狩于堯山庚戌至自同州丙辰吐蕃遣使獻黃金器千斤以求婚十一月甲子朔日南至有事于圓丘十二月丁酉交河道旋師吏部尚書陳國公侯君集執高昌王麴智盛獻捷于觀德殿行飲至之禮賜酺三日乙卯高麗世子相權來朝十五年春正月丁卯吐蕃遣其國相祿東贊來逆女丁丑禮部尚書江夏王道宗送文成公主歸吐蕃辛巳幸洛陽宮三月戊申幸襄城宮庚午廢襄城宮夏四月辛卯詔以來年二月有事泰山所司詳定儀制五月壬申並州僧道及老人等抗表以太原王業所因明年登封已後願時臨幸上於武成殿賜宴因從容謂侍臣曰朕少在太原喜羣聚博戲暑往寒逝將三十年矣時會中有舊識上者相與道舊以為笑樂因謂之曰他人之言或有面諛公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶皆奏即日四海太平百姓歡樂陛下力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請過並州上謂曰飛鳥過故鄉猶躑躅徘徊況朕於太原起義遂定天下復少小遊觀誠所不忘岱禮若畢或冀與公等相見於是賜物各有差丙子百濟王扶餘璋卒詔立其世子扶餘義慈嗣其父位仍封為帶方郡王六月戊申詔天下諸州舉學綜古今及孝悌淳篤文章秀異者並以來年二月總集泰山己酉有星孛于太微犯郎位丙辰停封泰山避正殿以思咎命尚食減膳秋七月甲戌孛星滅冬十月辛卯大閲於伊闕壬辰幸嵩陽辛丑還宮十一月壬戌廢鄉長壬申還京師癸酉薛延以同羅僕骨回紇靺鞨霫之衆度漠屯于白道川命營州都督張儉統所部兵壓其東境兵部尚書李績為朔方行軍總管右衛大將軍李大亮為靈州道行軍總管涼州都督李襲譽為涼州道行軍總管分道以禦之十二月戊子朔至自洛陽宮甲辰李績及薛延戰于諾真水大破之斬首三千餘級獲馬萬五千匹薛延跳身而遁績旋破突厥思結於五臺縣虜其男女千餘口獲羊馬稱是十六年春正月辛未詔在京及諸州死罪囚徒配西州為戶流人未達前所者徙防西州兼中書侍郎江陵子岑文本為中書侍郎專知機密夏六月辛卯詔復隱王建成曰隱太子改封海陵剌王元吉曰巢剌王秋七月戊午司空趙國公無忌為司徒尚書左僕射梁國公玄齡為司空九月丁巳特進鄭國公魏徵為太子太師知門下省事如故冬十一月丙辰狩于岐山辛酉使祭隋文帝陵丁卯宴武功士女於慶善宮南門酒酣上與父老等涕泣論舊事老人等遞起為舞爭上萬歲壽上各盡一杯庚午至自岐州十二月癸卯幸溫湯甲辰狩于驪山時陰寒晦冥圍兵斷絶上乘高望見之欲捨其罰恐虧軍令乃回轡入谷以避之是歲高麗大臣蓋蘇文弒其君高武而立武兄子藏為王十七年春正月戊辰右衛將軍代州都督劉蘭謀反腰斬太子太師鄭國公魏徵薨戊申詔圖畫司徒趙國公無忌等勳臣二十四人於凌煙閣三月丙辰齊州都督齊王祐殺長史權萬紀典軍韋文振據齊州自守詔兵部尚書李績刑部尚書劉德威發兵討之兵未至兵曹杜行敏執之而降遂賜死于內侍省丁巳熒惑守心前星十九日而退夏四月庚辰朔皇太子有罪廢為庶人漢王元昌吏部尚書侯君集並坐與連謀伏誅丙戌立晉王治為皇太子大赦賜酺三日丁亥中書令楊師道為吏部尚書己丑加司徒趙國公長孫無忌太子太師司空梁國公房玄齡太子太傅特進宋國公蕭瑀太子太保兵部尚書英國公李績為太子詹事仍同中書門下三品庚寅上親謁太廟以謝承乾之過癸巳魏王泰以罪降爵為東萊郡王五月乙丑手詔舉孝廉茂才異能之士六月己卯朔日有蝕之壬午改葬隋恭帝丁酉尚書右僕射高士廉請致仕詔以為開府儀同三司同中書門下三品閏月戊午薛延遣其兄子突利設獻馬五萬匹牛駝一萬羊十萬以請婚許之丙子徙封東萊郡王泰為順陽王秋七月庚辰京城訛言云上遣棖棖取人心肝以祠天狗遞相驚悚上遣使遍加宣諭月餘乃止丁酉司空太子太傅梁國公房玄齡以母憂罷職八月工部尚書鄖國公張亮為刑部尚書參預朝政九月癸未徙庶人承乾于黔州冬十月丁巳房玄齡起復本職十一月己卯有事于南郊壬午賜天下酺三日以涼州獲瑞石曲赦涼州並録京城及諸州繫囚多所原宥十八年春正月壬寅幸溫湯夏四月辛亥幸九成宮秋八月甲子至自九成宮丁卯散騎常侍清苑男劉洎為侍中中書侍郎江陵子岑文本中書侍郎馬周並為中書令九月黃門侍郎褚遂良參預朝政冬十月辛丑朔日有蝕之甲辰初置太子司議郎官員甲寅幸洛陽宮安西都護郭孝恪帥師滅焉耆執其王突騎支送行在所十一月壬寅車駕至洛陽宮庚子命太子詹事英國公李績為遼東道行軍總管出柳城禮部尚書江夏郡王道宗副之刑部尚書鄖國公張亮為平壤道行軍總管以舟師出萊州左領軍常何瀘州都督左難當副之發天下甲士召募十萬並趣平壤以伐高麗十二月辛丑庶人承乾死十九年春二月庚戌上親統六軍發洛陽乙卯詔皇太子留定州監國開府儀同三司申國公高士廉攝太子太傅與侍中劉洎中書令馬周太子少詹事張行成太子右庶子高季輔五人同掌機務以吏部尚書安德郡公楊師道為中書令贈殷比干為太師諡曰忠烈命所司封墓葺祠堂春秋祠以少牢上自為文以祭之三月壬辰上發定州以司徒太子太師兼檢校侍中趙國公長孫無忌中書令岑文本楊師道從夏四月癸卯誓師於幽州城南因大饗六軍以遣之丁未中書令岑文本卒于師癸亥遼東道行軍大總管英國公李績攻蓋牟城破之五月丁丑車駕渡遼甲申上親率鐵騎與李績會圍遼東城因烈風發火弩斯須城上屋及樓皆盡麾戰士令登乃拔之六月丙辰師至安市城丁巳高麗別將高延壽高惠真帥兵十五萬來援安市以拒王師李績率兵奮擊上自高峯引軍臨之高麗大潰殺獲不可勝紀延壽等以其衆降因名所幸山為駐蹕山刻石紀功焉賜天下大酺二日秋七月李績進軍攻安市城至九月不克乃班師冬十月丙辰入臨渝關皇太子自定州迎謁戊午次漢武臺刻石以紀功德十一月辛未幸幽州癸酉大饗還師十二月戊申幸並州侍中清苑男劉洎以罪賜死是歲薛延真珠毗伽可汗死二十年春正月上在並州丁丑遣大理卿孫伏伽黃門侍郎褚遂良等二十二人以六條巡察四方黜陟官吏庚辰曲赦並州宴從官及起義元從賜粟帛給復有差三月己巳車駕至京師己丑刑部尚書鄖國公張亮謀反誅閏月癸巳朔日有蝕之夏四月甲子太子太師趙國公長孫無忌太子太傅梁國公房玄齡太子太保宋國公蕭瑀各辭調護之職詔許之六月遣兵部尚書固安公崔敦禮特進英國公李績擊破薛延於鬱督軍山北前後斬首五千餘級虜男女三萬餘人秋八月甲子封皇孫忠為陳王己巳幸靈州庚午次涇陽頓鐵勒回紇拔野古同羅僕骨多濫葛思結阿跌契苾跌結渾斛薛等十一姓各遣使朝貢奏稱延可汗不事大國部落烏散不知所之奴等各有分地不能逐延去歸命天子乞置漢官遣會靈州九月甲辰鐵勒諸部落俟斤頡利發等遣使相繼而至靈州者數千人來貢方物因請置吏咸請至尊為可汗於是北荒悉平為五言詩勒石以序其事辛亥靈州地震有聲冬十月前太子太保宋國公蕭瑀貶商州刺史丙戌至自靈州二十一年春正月壬辰開府儀同三司申國公高士廉薨丁酉詔以來年二月有事泰山甲寅賜京師酺三日二月壬申詔以左丘明卜子夏公羊高穀梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服子慎何休王肅王輔嗣杜元凱范寧等二十一人代用其書垂於國胄自今有事於太學並命配享宣尼廟堂丁丑皇太子於國學釋菜夏四月乙丑營太和宮於終南之上改為翠微宮五月戊子幸翠微宮六月癸亥司徒趙國公無忌加授揚州都督秋七月庚子建玉華宮於宜君縣之鳳凰谷庚戌至自翠微宮八月壬戌詔以河北大水停封禪辛未骨利幹國遣使貢名馬丁酉封皇子明為曹王冬十一月癸卯徙封順陽王泰為濮王十二月戊寅左驍衛大將軍阿史那社爾右驍衛大將軍契苾何力安西都護郭孝恪司農卿楊弘禮為崑山道行軍大總管以伐龜茲是歲墮婆登乙利鼻林送都播羊同石波斯康國吐火羅阿悉吉等遠夷十九國並遣使朝貢又於突厥之北至于回紇部落置驛六十六所以通北荒焉二十二年春正月庚寅中書令馬周卒司徒趙國公無忌兼檢校中書令知尚書門下二省事己亥刑部侍郎崔仁師為中書侍郎參知機務戊戌幸溫湯戊申還宮二月前黃門侍郎褚遂良起復黃門侍郎中書侍郎崔仁師除名配流連州癸丑西番沙鉢羅葉護率衆歸附以其俟斤屈裴祿為忠武將軍兼大俟斤戊午以結骨部置堅昆都督乙亥幸玉華宮乙卯賜所經高年篤疾粟帛有差己卯搜于華原四月甲寅磧外蕃人爭牧馬出界上親臨斷決然後咸服丁巳右武候將軍梁建方擊松外蠻下其部落七十二所五月庚子右衛率長史王玄策擊帝那伏帝國大破之獲其王阿羅那順及王妃子等虜男女萬二千人牛馬二萬餘以詣闕使方士那羅邇娑婆於金飈門造延年之藥吐蕃贊普擊破中天竺國遣使獻捷六月癸酉特進宋國公蕭瑀薨秋七月癸卯司空梁國公房玄齡薨八月己酉朔日有蝕之九月己亥黃門侍郎褚遂良為中書令十月癸亥至自玉華宮十一月戊戌眉邛雅三州獠反右衛將軍梁建方討平之庚子契丹帥窟哥奚帥可度者並率其部內屬以契丹部為松漠都督以奚部置饒樂都督十二月乙卯增置殿中侍御史監察御史各二員大理寺置平事十員閏月丁丑朔崑山道總管阿史那社爾降處密處月破龜茲大撥等五十城虜數萬口執龜茲王訶黎布失畢以歸龜茲平西域震駭副將薛萬徹脅于闐王伏闍信入朝癸未新羅王遣其相伊贊千金春秋及其子文王來朝是歲新羅女王金善德死遣冊立其妹真德為新羅王二十三年春正月辛亥俘龜茲王訶黎布失畢及其相那利等獻于社廟二月丙戌置瑤池都督府隸安西都護府丁亥西突厥肆葉護可汗遣使來朝三月丙辰置豐州都督府自去冬不雨至于此月己未乃雨辛酉大赦丁卯敕皇太子於金液門聽政是月日赤無光四月己亥幸翠微宮五月戊午太子詹事英國公李績為疊州都督辛酉開府儀同三司衛國公李靖薨己巳上崩於含風殿年五十二遺詔皇太子即位於柩前喪紀宜用漢制祕不發喪庚午遣舊將統飛騎徑兵從皇太子先還京發六府甲士四千人分列於道及安化門翼從乃入大行御馬輿從官侍御如常壬申發喪六月甲戌朔殯于太極殿八月丙子百僚上諡曰文皇帝廟號太宗庚寅葬昭陵上元元年八月改上尊號曰文武聖皇帝天寶十三載二月改上尊號為文武大聖大廣孝皇帝史臣曰臣觀文皇帝發迹多奇聰明神武拔人物則不私於黨負志業則咸盡其才所以屈突尉遲由仇敵而願傾心膂馬周劉洎自疏遠而卒委鈞衡終平泰階諒由斯道嘗試論之礎潤雲興蟲鳴螽躍雖堯舜之聖不能用檮杌窮奇而治平伊呂之賢不能為夏桀殷辛而昌盛君臣之際遭遇斯難以至抉目剖心蟲流筋擢良由遭值之異也以房魏之智不踰于丘軻遂能尊主庇民者遭時也或曰以太宗之賢失愛於昆弟失教於諸子何也曰然舜不能仁四罪堯不能訓丹朱斯前志也當神堯任讒之年建成忌功之日苟除畏逼孰顧分崩變故之興間不容髮方懼毀巢之禍寧虞尺布之謠承乾之愚聖父不能移也若文皇自定儲於哲嗣不騁志於高麗用人如貞觀之初納諫比魏徵之日況周發周成之世襲我有遺妍較漢文漢武之恢弘彼多慚德迹其聽斷不惑從善如流千載可稱一人而已贊曰昌發啓國一門三聖文定高位友于不令管蔡既誅成康道正貞觀之風到今歌詠
