body:
  text: 舊唐書卷一百四十五列傳第九十五劉玄佐子士寧士幹李萬榮附董晉陸長源劉全諒李忠臣李希烈吳少誠弟少陽少陽子元濟附劉玄佐本名洽滑州匡城人也少倜儻不理生業為縣捕盜吏違法為令所笞僅死乃亡命從軍大曆中為永平軍衙將李靈曜據汴州洽將兵乘其無備徑入宋州遂詔以州隸永平軍節度使李勉奏署宋州刺史建中二年加兼御史中丞亳潁節度等使李正己死子納匿喪謀叛而李洧以徐州歸順納遣兵圍之詔洽與諸軍援洧與賊接戰大破之斬首萬餘級由是轉輸路通加御史大夫又收濮州降其將楊令暉分兵挾之徇濮陽降其將高彥昭以通濮陽津遷尚書纍封四百戶兼曹濮觀察使尋加淄青兗鄆招討使又加汴滑都統副使李希烈攻汴州德宗在奉天連戰賊稍卻興元初進加檢校左僕射加平章事希烈圍寧陵洽大將劉昌堅守不下希烈攻陳州洽遣劉昌與諸軍救之大敗賊黨獲其將翟崇暉希烈棄汴州洽率軍收汴詔加汴宋節度無幾授本管及陳州諸軍行營都統賜名玄佐是歲來朝又拜涇原四鎮北庭等道兵馬副元帥檢校司空益封八百戶玄佐性豪侈輕財重義厚賞軍士故百姓益困是以汴之卒始於李忠臣訖於玄佐而日益驕恣多逐殺將帥以利剽劫又寵任小吏張士南及養子樂士朝財物巨萬士朝通玄佐嬖妾玄佐在鎮李納每使來必重贈遺飾美女名樂從其遊娛故多得其陰事常先為備故納憚其心計貞元三年三月薨于位年五十八廢朝三日贈太傅將佐初匿喪稱疾俟代帝亦為隱數日乃發喪子士寧士幹初將佐匿喪既發帝遣問所欲立吳湊可乎監軍孟介行軍盧瑗皆曰便及湊次泛水柩將遷請備儀瑗不許又令留什物俟新使將士大怒玄佐子壻及親兵乃以三月晦夜激怒三軍明晨衙兵皆甲胄擁士寧登重榻衣以墨縗呼為留後軍士執城將曹金岸浚儀令李邁曰爾等皆請吳湊者遂臠之唯盧瑗獲免士寧乃以財物分賜將士請之為帥孟介以聞帝召宰臣問計竇參曰今汴人挾李納以邀命若不許懼合於納遂從之授士寧起復金吾衛將軍同正汴州刺史宣武軍節度等使士寧位未定時遣使通王武俊劉濟田緒以士寧未受詔於國皆留之士寧初授節制諸將多不悅服性忍暴淫亂或彎弓挺刃手殺人於杯案間悉蒸父之妓妾又強取人之婦女好倮觀婦人每出畋獵數日方還軍府苦之其大將李萬榮與其父玄佐同里閈少相善寬厚得衆心士寧疑之去其兵權令攝汴州事萬榮深怨之將伺其隙逐之十年正月士寧以衆二萬畋於城南兵既出萬榮晨入士寧廨舍召其所留心腹兵千餘人矯謂之曰有詔徵大夫入朝俾吾掌留務汝輩人賜錢三千貫無他憂也兵士皆拜萬榮既約親兵於內又召各營兵於外以是言令之軍士皆聽命萬榮乃分兵閉城門馳使白士寧曰詔徵大夫宜速即路若遷延不行當傳首以獻士寧知衆不為用計無所出乃將五百騎走歸京師比至中牟亡走大半至東都所餘僮隸婢妾數十人而已既至京師詔令歸第服喪禁絶出入萬榮乃斬士寧所親之將辛液白英賢以令於軍凡賞軍士錢二十萬貫詔令籍沒士寧家財以分賞焉遂授萬榮宣武軍兵馬留後初萬榮遣兵三千備秋於京西有親兵三百前為劉士寧所驕者日益橫萬榮惡之悉置行籍中由是深怨萬榮大將韓惟清張彥琳請將往不許萬榮令其子乃將之未發惟清彥琳不得志因親兵銜怨乃作亂共攻萬榮萬榮分兵擊之叛卒兵械少戰不勝乃劫轉運財貨及居人而潰殺傷千餘人叛兵四出多投宋州刺史劉逸準厚撫之韓惟清走鄭州張彥琳走東都以束身歸罪宥以不死並流竄焉萬榮悉捕逃叛將卒妻孥數千人皆誅之萬榮誅叛卒之後人心恟恟不安軍卒數人呼於市曰今夜大兵四面至城當破衆驚駭萬榮悉捕得或云士寧所教萬榮斬之以聞遂以士寧廢處郴州十一年五月授萬榮宣武軍節度使其年八月萬榮病遂署其子乃為司馬乃勒大將李湛伊婁涗張伾往外鎮尋皆令殺之涗伾皆已死惟李湛至尉氏尉氏鎮將郝忠節不肯殺湛是夜軍士逐出李乃遂執送京師萬榮以其日病卒乃至京師付京兆府杖殺劉士幹玄佐養子前為太府少卿有樂士朝者亦為玄佐養子因冒劉姓與士幹有隙及玄佐卒或云為士朝所鴆士幹知之及至京師遣奴持刀於喪位語士朝曰有弔客至因誘殺之賜士幹死董晉字混成河中虞鄉人明經及第至德初肅宗自靈武幸彭原晉上書謁見授校書郎翰林待制再轉衛尉丞出為汾州司馬未幾刺史崔圓改淮南節度奏晉以本官攝殿中侍御史充判官尋歸臺授本官遷侍御史主客員外郎祠部郎中大曆中兵部侍郎李涵送崇徽公主使回紇奏晉為判官使還拜司勳郎中歷祕書太府太常少卿監左金吾將軍旬日德宗嗣位改太常卿遷右散騎常侍兼御史中丞知臺事以清勤謹慎故驟遷右職尋為華州刺史兼御史中丞潼關防禦使久之加兼御史大夫朱泚僭逆於京師使凶黨仇敬何望之侵逼華州晉奔遁赴行在授國子祭酒尋令往恆州宣慰從車駕還京師遷左金吾衛大將軍改尚書左丞時右丞元琇領度支使為韓滉所擠貶黜晉嫉之見宰相極言非罪舉朝稱之復拜太常卿五年遷門下侍郎同平章事時政事決在竇參晉但奉詔書領然諾而已金吾衛將軍沈房有弟喪公除衣慘服入閣上問宰相對曰準式朝官有周年已下喪者諸絁縵不合衣淺色帝曰南班安得有之對曰因循而然又問晉冠冕之制對曰古人服冠冕者動有佩玉之響所以節步也禮云堂上接武堂下布武至恭也步武有常君前之禮進趨而已今或奔走以致顛仆非恭慎也在式朝官皆是綾袍袱五品已上金玉帶取其文彩畫飾以奉上也是以禹惡衣食而致美乎黻冕君親一致昔尚書郎含香老萊彩服皆此義也服絁縵非制也上深然之遂詔曰常參官入閣不得趨走周期已下喪者禁慘服朝會又令服本品綾袍金玉帶晉明於禮學如此竇參驕滿既甚帝漸惡之八年參諷晉奏其姪給事中竇申為吏部侍郎帝正色曰豈不是竇參遣卿奏也晉不敢隱因問參過失晉具奏之旬日參貶官晉憂懼纍上表辭位九年夏改禮部尚書兵部尚書東都留守東都畿汝州都防禦使會汴州節度李萬榮疾甚其子乃為亂以晉為檢校左僕射同平章事兼汴州刺史宣武軍節度營田汴宋觀察使晉既受命唯將幕官傔從等十數人都不召集兵馬既至鄭州宣武軍迎候將吏無至者晉左右及鄭州官吏皆懼共勸晉云鄧惟恭承萬榮疾病之甚遂總領軍州事今相公到此尚不使人迎候其情狀豈可料即恐須且遲回以候事勢晉曰奉詔為汴州節度使即合準敕赴官何可妄為逗留人皆憂其不測晉獨恬然未至汴州十數里鄧惟恭方來迎候晉俾其不下馬既入乃委惟恭以軍政衆服晉明於事體機變而未測其深淺初萬榮逐劉士寧代為節度使委兵於惟恭以其同鄉里及疾甚李乃將為亂惟恭乃與監軍同謀縛乃送歸朝廷惟恭自以當便代居其位故不遣候吏以疑懼晉心冀其不敢進不意晉之速至晉已近方遽出迎之然心常怏怏竟以驕盈慢法潛圖不軌配流嶺南朝廷恐晉柔懦尋以汝州刺史陸長源為晉行軍司馬晉謙恭簡儉每事因循多可故亂兵粗安長源好更張云為數請改易舊事務從削刻晉初皆然之及案牘已成晉乃命且罷又委錢穀支計于判官孟叔度叔度輕佻好慢易軍人皆惡之晉十五年二月卒年七十六廢朝三日贈太傅賜布帛有差卒後未十日汴州大亂殺長源叔度等陸長源字泳之開元天寶中尚書左丞太子詹事餘慶之孫西河太守璪之子長源淑書史乾元中陷河北諸賊因為昭義軍節度薛嵩從事久之歷建信二州刺史浙西節度韓滉兼領江淮轉運奏長源檢校郎中兼中丞充轉運副使罷為都官郎中改萬年縣令出為汝州刺史貞元十二年授檢校禮部尚書宣武軍行軍司馬汴州政事皆決斷之性輕佻言論容易恃才傲物所在人畏而惡之及至汴州欲以峻法繩驕兵而董晉判官楊凝孟叔度亦縱恣淫湎衆情共怒晉性寬緩事務因循以收士心長源每事守法晉或苟且長源輒執而正之及晉卒令長源知留後事長源揚言曰將士多弛慢不守憲章當以法繩之由是人人恐懼加以叔度苛刻多縱聲色數至樂營與諸婦人嬉戲自稱孟郎衆皆薄之舊例使長薨放散布帛於三軍制服至是人請服長源初固不允軍人求之不已長源等議給其布直叔度高其鹽價而賤為布直每人不過得鹽三二斤軍情大變或勸長源故事有大變皆賞三軍三軍乃安長源曰不可使我同河北賊以錢買健兒取旌節兵士怨怒滋甚乃執長源及叔度等臠而食之斯須骨肉糜散長源死之日詔下以為節度使及聞其死中外惜之贈尚書右僕射劉全諒懷州武陟人也父客奴由征行家於幽州之昌平少有武藝從平盧軍開元中有室韋首領段普恪恃驍勇數苦邊節度使薛楚玉以客奴有膽氣令抗普恪客奴單騎襲之斬首以獻自白身授左驍衛將軍充遊奕使自是數有戰功性忠謹為軍人所信天寶末安祿山反詔以安西節度封常清為范陽節度以平盧節度副使呂知誨為平盧節度以太原尹王承業為河東節度祿山既僭位於東都遣腹心韓朝陽等招誘知誨知誨遂受逆命誘殺安東副都護保定軍使馬靈察祿山遂署知誨為平盧節度使客奴與平盧諸將同議取知誨殺之仍遣與安東將王玄志遙相應援馳以奏聞十五載四月授客奴柳城郡太守攝御史大夫平盧節度支度營田陸運押兩蕃渤海黑水四府經略及平盧軍使仍賜名正臣又以王玄志為安東副大都護攝御史中丞保定軍及營田使正臣仍領兵平盧來襲范陽未至為逆賊將史思明等大敗之正臣奔歸為王玄志所鴆而卒逆賊署徐歸道平盧節度王玄志與平盧將侯希逸等又襲殺歸道大曆九年追贈正臣工部尚書全諒本名逸準以父勳授別駕長史建中初劉玄佐為宋亳節度使召署為牙將以勇果騎射聞玄佐以宗姓厚遇之纍署都知兵馬使試太僕卿兼御史中丞玄佐卒子士寧代為節度使疑宋州刺史翟良佐不附己陽言出巡至宋州遽以逸準代良佐為刺史及董晉卒兵亂殺陸長源監軍俱文珍與大將密召逸準赴汴州令知留後朝廷因授以檢校工部尚書汴州刺史兼宣武軍節度觀察等使仍賜名全諒貞元十五年二月卒年四十九廢朝一日贈右僕射李忠臣本姓董名秦平盧人也世家于幽州薊縣自云曾祖文昱棣州刺史祖玄奬安東都護府録事參軍父神嶠河內府折衝忠臣少從軍在卒伍之中材力冠異事幽州節度薛楚玉張守圭安祿山等頻委征討積勞至折衝郎將將軍同正平盧軍先鋒使及祿山反與其倫輩密議殺偽節度呂知誨立劉正臣為節度以忠臣為兵馬使攻長楊戰獨山襲榆關北平殺賊將申子貢榮先欽擒周釗送京師忠臣功多又從正臣破漁陽逆將李歸仁李咸白秀芝等來拒戰約數十合並摧破之無何潼關失守郭子儀李光弼退師忠臣乃引軍北歸奚王阿篤孤初以衆與正臣合後詐言請以萬餘騎同收范陽至后城南中夜反攻忠臣與戰遂至溫泉山破之擒大首領阿布離斬以祭纛釁鼓正臣卒又與衆議以安東都護王玄志為節度使至德二載正月玄志令忠臣以步卒三千自雍奴為瞬筏過海賊將石帝庭烏承洽來拒忠臣與董竭忠退之轉戰纍日遂收魯城河間景城等大獲資糧以赴本軍復與大將田神功率兵討平原樂安郡下之擒偽刺史臧瑜等防河招討使李銑承制以忠臣為德州刺史屬史思明歸順河南節度張鎬令忠臣以兵赴鄆州與諸軍使收河南州縣又與裨將陽惠元大破賊將王福德于舒舍口肅宗纍下詔慰諭仍令鎮濮州尋移韋城乾元元年九月改光祿卿同正其年與郭子儀等九節度圍安慶緒於相州明年二月諸軍潰歸忠臣亦退至滎陽賊將敬釭來襲官船忠臣大破之獲米二百餘艘以資汴州軍士尋拜濮州刺史緣河守捉使移鎮杏園渡及史思明陷汴州節度使許叔冀與忠臣並力屈降賊思明撫忠臣背曰吾比祇有左手今得公兼有右手矣與俱寇河陽數日忠臣夜以五百人斫其營突圍歸李光弼以聞詔加開府儀同三司殿中監同正賜實封二百戶召至京師賜姓李氏名忠臣封隴西郡公賜良馬莊宅銀器綵物等時陝西神策兩節度郭英乂衛伯玉鎮陝州以忠臣為兩軍節度兵馬使魚朝恩亦在陝俾忠臣與賊將李歸仁李感義等戰於永寧莎柵前後數十陳皆摧破之會淮西節度王仲升為賊所擒寶應元年七月拜忠臣太常卿同正兼御史中丞淮西十一州節度尋加安州刺史仍鎮蔡州其年令忠臣會元帥諸軍收復東都二年六月就加御史大夫時回紇可汗既歸其國留判官安恪石帝庭於河陽守禦財物因此招聚亡命為寇道路壅隔詔忠臣討平之永泰元年吐蕃犯西陲京師戒嚴代宗命中使追兵諸道多不時赴難使至淮西忠臣方會鞠即令整師飾駕監軍大將固請曰軍行須擇吉日忠臣奮臂於衆曰焉有父母遇寇難待揀好日方救患乎即日進發自此方隅有警忠臣必先期而至由是代宗嘉其忠節加本道觀察使寵賜頗厚及同華節度周智光舉兵反詔忠臣與神策將李太清等討平之大曆三年加檢校工部尚書實封通前三百戶五年加蔡州刺史七年檢校右僕射知省事李靈曜之叛田承嗣使姪悅援之忠臣與諸軍大破悅等汴州平十一年十二月加檢校司空平章事汴州刺史忠臣性貪殘好色將吏妻女多被誘脅以通之又軍無紀綱所至縱暴人不堪命而以妹壻張惠光為衙將恃勢凶虐軍中苦之數有言於忠臣不之信也俄以惠光為節度副使令惠光子為衙將陵橫甚於其父忠臣所信任大將李希烈素善騎射羣情所伏因衆心之怒以十四年三月與少將丁皓賈子華監軍判官蔣知璋等舉兵斬惠光父子以脅逐忠臣單騎赴京師朝廷方寵武臣不之責也依前檢校司空平章事留京師奉朝請建中初嘗因奏對德宗謂之曰卿耳甚大真貴人也忠臣對曰臣聞驢耳甚大龍耳甚小臣耳雖大乃驢耳也上説之時常侍張涉承恩用事坐受財賄事露帝將以法繩之涉即帝在春宮時侍講也忠臣奏曰陛下貴為天子而先生以乏財抵法以愚臣觀之非先生之過也帝意解但令歸田里前湖南觀察辛京杲嘗以忿怒杖殺部曲有司劾奏京杲殺人當死從之忠臣奏曰京杲合死久矣上問之對曰渠伯叔某於某處戰死兄弟某於某處戰死渠嘗從行獨不死是以知渠合死久矣上亦憫然不令加罪改授王傅而已忠臣木強率直不識書不喜儒生及罷兵權官位崇重常鬱鬱不得志及朱泚反以為偽司空兼侍中泚率兵逼奉天命忠臣京城留守泚敗忠臣走樊川別業李晟下將士擒忠臣至繫之有司興元元年並其子並誅斬之時年六十九籍沒其家李希烈遼西人父大定希烈少從平盧軍後隨李忠臣過海至河南寶應初忠臣為淮西節度署希烈為偏裨纍授將軍試光祿卿殿中監忠臣兼領汴州希烈為左廂都虞候加開府儀同三司大曆末忠臣軍政不修事多委妹壻張惠光為押衙弄權縱恣人怨與少將丁皓等斬惠光父子忠臣奔赴朝廷詔以欣王為淮西節度副大使授希烈蔡州刺史兼御史中丞淮西節度留後令滑亳節度李勉兼領汴州德宗即位後月餘加御史大夫充淮西節度支度營田觀察使又改淮西節度淮寧軍以寵之建中元年又加檢校禮部尚書會山南東道節度梁崇義拒捍朝命迫脅使臣二年六月詔諸軍節度率兵討之加希烈南平郡王兼漢北都知諸兵馬招撫處置使希烈破崇義衆遂討平之録希烈功加檢校右僕射同平章事賜實封五百戶淄青節度李正己又謀不軌三年秋加希烈檢校司空兼淄青兗鄆登萊齊等州節度支度營田新羅渤海兩蕃使令討襲正己希烈遂率所部三萬人移居許州聲言遣使往青州招諭李納其實潛與交通又移牒汴州令備供擬將與納同為亂李勉以其道路合自陳留乃除道具饌以待之希烈不從乃大慢罵自是志意縱肆言多悖慢日遣使交通河北諸賊帥等是歲長至日朱滔田悅王武俊李納各僭稱王滔使至希烈希烈亦僭稱建興王天下都元帥四年希烈遣其將襲陷汝州執李元平而去東都大擾亂朝廷猶為含容遣太子太師顏真卿往宣慰真卿發後數日以龍武將軍哥舒曜為東都兼汝州行營兵馬節度希烈既見真卿但肆凶言令左右慢罵指斥朝廷又遣逆黨董待名韓霜露劉敬宗陳質翟暉等四人伺外侵抄州縣官軍皆為其所敗荊南節度張伯儀全軍覆沒又令周曾王玢姚憺呂從賁康琳等來襲曜曾玢憺等謀回軍據蔡州襲討希烈事泄並遇害神策軍使白志貞又獻策謀令嘗為節度都團練使者各出家僮部曲一人及馬令劉德信總之討希烈尋詔李勉為淮西招討使哥舒曜為副至四月曜率衆屯襄城頻與賊戰皆不勝八月希烈率衆二萬圍襄城李勉又令將唐漢臣率兵與劉德信同為曜之影援皆望風敗衄希烈凶逆既甚帝乃命舒王為荊襄江西沔鄂等道節度諸軍行營兵馬都元帥大開幕府文武僚屬之盛前後出師未有其比又令涇原諸道出兵皆赴襄城軍未發會涇州兵亂車駕幸奉天其日希烈大破曜軍於襄城曜遁歸東都賊因乘勝攻陷汴州李勉奔歸宋州希烈性慘毒酷每對戰陳殺人流血盈前而言笑飲饌自若以此人畏而服從其教令盡其死力其攻汴州驅百姓令運木土築壘道又怒其未就乃驅以填之謂之溼梢既入汴州於是僭號曰武成以孫廣鄭賁李綬李元平為宰相以汴州為大梁府李清虛為尹署百官遣兵東討至寧陵竟為劉洽所拒不得前又遣將翟暉率精卒襲陳州為劉洽李納大破之生擒暉以獻諸軍乘勝進攻汴州希烈遁歸蔡州擒其偽署將相鄭賁劉敬宗等李臯樊澤曲環張建封又四面討襲之纍拔其郡縣希烈敗衄貞元二年三月因食牛肉遇疾其將陳仙奇令醫人陳仙甫置藥以毒之而死妻男骨肉兄弟共一十七人並誅之初希烈於唐州得象一頭以為瑞應又上蔡襄城獲其珍寶乃是爛車釭及滑石偽印也陳仙奇者起於行間性忠果自希烈死朝廷授淮西節度頗竭誠節未幾為別將吳少誠所殺贈太子太保賻布帛米粟有差喪事官給吳少誠幽州潞縣人父為魏博節度都虞候少誠以父勳授一子官釋褐王府戶曹後至荊南節度使庾準奇之留為衙門將準入覲從至襄漢見梁崇義不遵憲度知有異志少誠密計有成擒之略將自陳於闕下屬李希烈初授節制鋭意立功見少誠計慮乃以少誠所見録奏有詔慰飭不次封通義郡王未幾崇義違命希烈受制專征以少誠為前鋒崇義平賜實封五千戶後希烈叛少誠頗為其用希烈死少誠等初推陳仙奇統戎事朝廷已命仙奇尋為少誠所殺衆推少誠知留務朝廷遂授以申光蔡等州節度觀察兵馬留後尋正授節度少誠善為治勤儉無私日事完聚不奉朝廷貞元三年判官鄭常及大將楊冀謀逐少誠以聽命於朝試校書郎劉涉假為手詔數十潛致於大將欲因少誠之出閉城門以拒之屬少誠將出餞中使常冀等遂謀舉事臨發為人所告常冀先遇害其將李嘉節等各持假詔請罪少誠悉宥之其大將宋炅曹齊奔歸京師十五年陳許節度曲環卒少誠擅出兵攻掠臨潁縣節度留後上官涗遣兵赴救臨潁鎮使韋清與少誠通救兵三千餘人悉擒縛而去九月遂圍許州尋下詔削奪少誠官爵分遣十六道兵馬進討十二月官軍敗衄於小河明年正月夏州節度使韓全義為淮蔡招討處置使北路行營諸軍將士並取全義指揮陳許節度留後上官涗充副使五月全義與少誠將吳秀吳少陽等戰於水南官軍復敗七月全義頓軍於五樓行營為賊所乘大潰全義與都監軍使賈秀英賈國良等夜遁遂城守水汴宋徐泗淄青兵馬直趣陳州列營四面少誠兵逼水五六里下營韓全義諸軍又退保陳州其汴州河陽等兵各私歸本道陳許將孟元陽與神策兵各率所部留軍水全義斬昭義滑州河陽河中都將凡四人然竟未嘗整陳交鋒而王師纍挫潰少誠尋引兵退歸蔡州遂下詔洗雪復其官爵纍加檢校僕射順宗即位加同中書門下平章事元和初遷檢校司空依前平章事元和四年十一月卒年六十廢朝三日贈司徒吳少陽本滄州清池人初吳少誠父翔在魏博軍中與少陽相愛及少誠知淮西留守乃厚以金帛取少陽至則名以堂弟署為軍職纍奏官爵出入少誠家情旨甚昵少陽度少誠猜忍懼為所害乃請出外以任防捍之任少誠乃表為申州刺史兼御史大夫凡五年少陽頗寬易而少誠之衆悅附焉及少誠病亟家僮單于熊兒者偽以少誠意取少陽至時少誠已不知人乃偽署少陽攝副使知軍州事少誠子元慶年二十餘先為軍職兼御史中丞少陽密害之及少誠死少陽自為留後時王承宗求繼士真不受詔憲宗怒以討承宗不欲兵連兩河乃詔遂王宥遙領彰義軍節度大使以少陽為留後遂授彰義軍節度使檢校工部尚書少陽據蔡州凡五年不朝覲汝南多廣野大澤得豢馬畜時奪掠壽州茶山之利內則數匿亡命以富實其軍又屢以牧馬來獻詔因善之元和九年九月卒贈右僕射吳元濟少陽長子也初為試協律郎兼監察御史攝蔡州刺史及父死不發喪以病聞因假為少陽表請元濟主兵務帝遣醫工候之即稱少陽疾愈不見而還先是少陽判官蘇兆楊元卿及其將侯惟清嘗同為少陽畫朝覲計及元濟自領軍凶狠無義唯昵軍中凶悍之徒素不便兆縊殺之歸其尸於家械侯惟清而囚之時朝廷誤聞惟清已死贈兵部尚書贈蘇兆以右僕射楊元卿先奏事在京師得盡言經略淮西事於宰相李吉甫始少陽以病聞元卿請凡淮西使在道路者所在留止之及少陽卒凡四十日不為輟朝但易將加兵於外以待其邸吏無何妄傳董重質已殺元濟並屠其家李吉甫遽請對拜賀乃輟朝數日知元濟尚在時賊陰計已成羣衆四出狂悍而不可遏屠舞陽焚葉縣攻掠魯山襄城汝州許州及陽翟人多逃伏山谷荊棘間為其殺傷驅剽者千里關東大恐十月以陳州刺史李光顏為忠武軍節度使又以山南東道節度使嚴綬充申光蔡等州招撫使仍令內常侍崔潭峻監綬軍十年正月綬軍臨賊西境詔曰吳元濟逆絶人理反易天常不居父喪擅領軍政諭以詔旨曾無謙恭熒惑一方之人迫脅三軍之衆以少陽嘗經任使為之軫悼命申弔祭臨遣使臣陵虐封疆遂致稽阻絶朝廷之理忘父子之恩旋又掩寇舞陽傷殘吏卒焚燒葉縣騷擾閭閻恣行奪攘無所畏忌朕念賞延之義重傷藩帥之門尚欲納於忠順之途處在顯榮之地未能飭怒猶為包荒再降詔書俾申招撫而毒螫滋甚姦心靡悛壽春西南又陷鎮柵窮凶稔惡縱暴延災覆載之所不容人神之所共棄良非獲已致此興戎吳元濟在身官爵並宜令削奪令宣武大寧淮南宣歙等道兵馬合勢山南東道及魏博荊南江西劍南東川兵馬與鄂嶽計會東都防禦使與懷鄭汝節度及義成兵馬掎角相應同期進討二月綬兵為賊所襲敗于磁丘退保唐州四月光顏破賊黨元濟遣人求援于鎮州王承宗淄鄆李師道二帥上表于朝廷請赦元濟之罪朝旨不從自是兩河賊帥所在竊發冀以沮撓王師五月承宗師道遣盜燒河陰倉詔御史中丞裴度於軍前宣喻觀用兵形勢度還奏曰臣觀諸將唯光顏勇義盡心必有成功上意甚悅翌日光顏奏大破賊於時曲上曰度知光顏可謂至矣乃以度兼刑部侍郎自是中外相賀決不赦賊徵天下兵環申蔡之郊大小十餘鎮六月承宗師道遣盜伏於京城殺宰相武元衡中丞裴度衡先死度重傷而免憲宗特怒即命度為宰相淮右用兵之事一以委之七月李師道遣嵩山僧圓淨結山賊與留邸兵欲焚燒東都先事敗而禍弭嚴綬退罷乃以汴州節度使韓弘為淮右行營兵馬都統以高霞寓有名用為唐鄧節度十一年春諸軍雲合惟李光顏懷汝節度烏重胤心無顧望旦夕血戰繼獻戎捷六月高霞寓為賊所擊敗于鐵城退保新興柵時諸軍勝負皆不實聞多虛稱克捷及霞寓敗中外恟恟宰相諫官屢以罷兵為請唯裴度堅於破賊尋以袁滋代霞寓為唐鄧帥滋柔懦不能軍十二年正月袁滋復貶間廏使李訴表請軍前自效乃用訴為唐鄧帥以代滋訴軍壓境拔賊文城柵擒柵將吳秀琳又獲賊將李祐李光顏亦拔賊郾城元濟始懼盡發左右及守城卒屬董重質以抗光顏重胤六月元濟乞降為羣賊所制不能自拔上以元凶已蹙兵未臨於賊城挽饋日殫因延英問計於宰相裴度曰賊力已困但羣帥不一故未能決降上曰卿決能行乎曰臣誓不與賊偕全七月詔以度為彰義軍節度使兼申光蔡四面行營招撫使以郾城為行在蔡州為節度所八月度至郾城激勵士衆軍士喜度至以賞罰必行皆願輸罄每出勞軍士有流涕者時李訴營文城柵既得吳秀琳李祐知其可用委信無疑日夜與計事於帳中祐曰元濟徑軍多在洄曲西境防捍而守蔡者皆市人疲耄之卒可以乘虛掩襲直抵懸瓠比賊將聞之元濟成擒矣訴然之咨於裴度度曰兵非出奇不勝常侍良圖也十一月訴夜出軍令李祐率徑騎三千為前鋒田進誠三千為後軍訴自率三千為中軍其月十日夜至蔡州城下坎牆而畢登賊不之覺十一日攻衙城擒元濟並其家屬以聞初元濟之叛恃其凶狠然治軍無紀綱其將趙昌洪凌朝江董重質等各權兵外寇李師道鄆州之鹽城往來寧陵雍丘之間韓弘知而不禁淮右自少誠阻兵已來三十餘年王師加討未嘗及其城下嘗走韓全義敗于故驕悍無所顧忌且恃城池重固有陂浸阻回故以天下兵環攻三年所克者一縣而已及黜高霞寓李遜袁滋諸軍始進又得陰山府沙陀驍騎邯鄲勇卒光顏重胤之奮命及丞相臨統破諸將首尾之計方擒元惡申蔡之始人劫於希烈少誠之虐法而忘其所歸數十年之後長者衰喪而壯者安於毒暴而恬於搏噬地既少馬而廣畜騾乘之教戰謂之騾子軍尤稱勇悍而甲仗皆畫為雷公星文以為厭勝而少誠能以姦謀固衆心初韓全義敗於水蔡兵于全義帳中得公卿間問訊書少誠束而諭衆曰朝廷公卿以此書託全義收蔡州日乞一將士妻女以為婢妾以此激怒其衆絶其歸向之心是以蔡人有老死不聞天子恩宥者故堅為賊用地雖中州人心過于夷貊乃至搜閲天下豪鋭三年而後屈者彼非將才而力備蓋勢驅性習不知教義之所致也元濟至京憲宗御興安門受俘百僚樓前稱賀乃獻廟社徇于兩市斬之於獨柳時年三十五其夜失其首妻沈氏沒入掖庭弟二人子三人流於江陵誅之判官劉協庶七人皆斬光蔡等州平始復為王土矣史臣曰治亂勢也勢亂不能卒治長源以法繩驕軍禍不旋踵則董公之寬柔不無謂古之名將以陰謀怨望鮮全其族者董秦始奮忠義多長者言宜其顯赫及失意挾邪俄被淮陰之戮惜哉吳少誠為希烈之亂胎雖謀奪其軍及嗣而滅而元濟效希烈之狂悖謂無天地人之凶險一至於斯是知王者御治之道其可忽諸贊曰聖哲之君慎名與器不軌之臣得寵則戾董怨而族吳悖而葅好亂樂禍可監前車
