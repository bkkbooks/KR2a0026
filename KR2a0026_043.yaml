於合城郡置樂鄉縣武德四年置鄀州領樂鄉長壽率道上洪四縣貞觀元年省上洪縣八年廢鄀州以長壽屬溫州以樂鄉率道屬襄州荊州江陵府隋為南郡武德初蕭銑所據四年平銑改為荊州領江陵枝江長林安興石首松滋公安七縣五年荊州置大總管管荊辰朗澧東松沈基復巴睦崇硤平等十三州統潭桂交循夔高康欽尹九州六年改平州為玉州改巴州為岳州七年廢基州入郢州其年改大總管為大都督督荊辰澧朗東松岳硤玉八州仍統潭桂交夔高欽尹等七州其沈復睦崇四州循康二州都督並不統八年廢玉州以當陽縣來屬貞觀元年廢郢州以章山來屬二年降為都督府惟督前七州而已其桂潭等七州不統也八年廢東松州入硤州又省章山入長林十年辰州改隸黔州都督硤澧朗岳四州都督從三品荊州領江陵枝江當陽長林安興石首松滋公安等八縣龍朔二年昇為大都督督硤岳復郢四州天寶元年改為江陵郡乾元元年三月復為荊州大都督府自至德後中原多故襄鄧百姓兩京衣冠盡投江湘故荊南井邑十倍其初乃置荊南節度使上元元年九月置南都以荊州為江陵府長史為尹觀察制置一準兩京以舊相呂諲為尹充荊南節度使領澧朗硤夔忠歸萬等八州又割黔中之涪湖南之岳潭衡郴邵永道連八州增置萬人軍以永平為名二年置長寧縣於郭內與江陵並治其年省枝江縣入長寧至德二年江陵尹衞伯玉以湖南闊遠請於衡州置防禦使自此八州置使改屬江南西道舊領縣八戶一萬二百六十口四萬九百五十八天寶領縣七戶三萬一百九十二口十四萬八千一百四十九在京師東南一千七百三十里至東都一千三百一十五里江陵漢縣南郡治所也故楚都之郢城今縣北十里紀南城是也後治於郢在縣東南今治所晉桓溫所築城也長寧上元元年分江陵縣置治郭下二年又廢枝江併入當陽漢縣屬南郡武德四年於縣置平州領當陽臨沮二縣六年改屬玉州又省臨沮入當陽屬荊州長林晉分編縣置長林縣以其有櫟林長阪故也武德四年於縣東北百二十里置基州及章山縣七年廢基州以章山屬郢州州廢屬荊州八年省入長林石首漢華容縣屬南郡武德四年分華容縣置取縣北石首山為名舊治石首山顯慶元年移治陽支山下松滋漢高城縣地屬南郡松滋亦漢縣名屬廬江郡晉時松滋縣人避亂至此乃僑立松滋縣因而不改公安吳孱縣地漢末左將軍劉備自襄陽來鎮此時號左公乃改名公安硤州下隋夷陵郡武德四年平蕭銑置硤州領夷陵夷道遠安三縣貞觀八年廢東松州以宜都長陽巴山三縣來屬其年省夷道入宜都九年自下牢鎮移治陸抗故壘天寶元年改為夷陵郡乾元元年復為硤州舊領縣五戶四千三百口一萬七千一百二十七天寶戶八千九十八口四萬五千六十六在京師東南一千八百八十八里至東都一千六百四十六里夷陵漢縣屬南郡有夷山在西北因為名蜀置宜都郡梁改為宜州後魏改為拓州又改為硤州隋縣治石皋城武德四年移治夷陵府貞觀九年移治陸抗故壘宜都漢夷道縣屬南郡陳改為宜都隋改為宜昌屬荊州武德二年置江州領宜昌一縣尋改為宜都六年改江州為東松州八年廢睦州以長陽巴山來屬貞觀八年廢東松州盡以三縣屬硤州長陽漢佷山縣屬武陵郡隋改為長陽以溪水為名隋屬荊州武德四年置睦州領長陽巴山二縣八年廢睦州以二縣屬東松州貞觀八年屬硤州遠安漢臨沮縣地屬南郡晉改高安縣後周改為遠安屬硤州巴山隋分佷山縣置巴山縣武德二年置江州領巴山鹽水二縣四年廢江州及鹽水縣以巴山屬睦州八年屬東松州貞觀八年屬硤州歸州隋巴東郡之秭歸縣武德二年割夔州之秭歸巴東二縣分置歸州三年分秭歸置興山縣治白帝城天寶元年改為巴東郡乾元元年復為歸州舊領縣三戶三千五百三十一口二萬一十一天寶戶四千六百四十五口二萬三千四百二十七在京師南二千二百六十八里至東都一千八百四十三里秭歸漢縣屬南郡魏改為臨江郡吳晉為建平郡隋屬巴東郡武德二年置歸州巴東漢巫縣地屬南郡周置樂鄉縣隋改為巴東縣興山武德三年分秭歸縣置舊治高陽城貞觀十七年移治太清鎮天授二年移治古夔子城夔州下隋巴東郡武德元年改為信州領人復巫山雲安南浦梁山大昌武寧七縣二年以武寧南浦梁山屬浦州又改信州為夔州仍置總管管夔硤施業浦涪渝谷南智務黔克思巫平十九州八年以浦州之南浦梁山來屬九年又以南浦梁山屬浦州貞觀十四年為都督府督歸夔忠萬涪渝南七州後罷都督府天寶元年改為雲安郡至德元年於雲安置七州防禦使乾元元年復為夔州二年刺史唐論請升為都督府尋罷之舊領縣四戶七千八百三十口三萬九千五百五十天寶戶一萬五千六百二十九口六萬五十在京師南二千四百四十三里至東都二千一百七十五里奉節漢魚復縣屬巴郡今縣北三里赤甲城是也梁置信州周為永安郡隋為巴東郡仍改為人復縣貞觀二十三年改為奉節雲安漢朐縣屬巴郡故城曰萬戶城縣西三十里有鹽官巫山漢巫縣屬南郡隋加山字以巫山硤為名舊治巫子城大昌晉分巫秭歸縣置建昌縣又改為大昌隋不改萬州隋巴東郡之南浦縣武德二年割信州之南浦置南浦州領南浦梁山武寧三縣八年廢南浦州以南浦梁山屬夔州武寧屬臨州其年復立浦州依舊領三縣貞觀八年改為萬州天寶元年改為南浦郡乾元元年復為萬州舊領縣三戶五千三百九十六口三萬八千八百六十七天寶戶五千一百七十九口二萬五千七百四十六在京師西南二千六百二十四里至東都二千四百六十五里南浦後魏分朐縣置魚泉縣周改為萬川隋改為南浦武德二年置浦州貞觀八年改為萬州以此縣為治所武寧漢臨江縣地周分置源陽縣隋改為武寧治巴子故城梁山後周分朐縣置治後魏萬川郡故城忠州隋巴東郡之臨江縣義寧二年置臨州又分置豐都縣武德二年分浦州之武寧置南賓縣又分臨江置清水縣並屬臨州八年又以浦州之武寧來屬其年又隸浦州九年以廢潾州之墊江來屬貞觀八年改臨州為忠州天寶元年改為南賓郡乾元元年復為忠州舊領縣五戶八千三百一十九口四萬九千四百七十八天寶戶六千七百二十二口四萬三千二十六在京師南二千二百二十二里至東都二千七百四十七里臨江漢縣屬巴郡後魏置萬川郡貞觀八年改臨州為忠州治於此縣豐都漢枳縣地屬巴郡後漢置平都縣義寧二年分臨江置豐都縣南賓武德二年分武寧縣置墊江漢縣屬巴郡後廢後魏分臨江復置周改為魏安隋復為墊江武德初屬潾州州廢屬臨州桂溪武德二年分臨江置清水縣天寶元年改為桂溪
