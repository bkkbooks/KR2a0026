body:
  text: 舊唐書卷三十九志第十九地理二河東道三河北道四山南道五河東道河中府隋河東郡武德元年置蒲州治桑泉縣領河東桑泉猗氏虞鄉四縣二年置蒲州總管府管蒲虞泰絳邵澮六州三年移蒲治河東縣依舊總管府其年置溫泉縣九年又置都督府管蒲虞芮邵泰五州仍省溫泉縣其年罷都督府貞觀八年割虢州之永樂來屬十七年以廢虞州之安邑解縣廢泰州之汾陰來屬開元八年置中都改蒲州為河中府其年罷中都依舊為蒲州又與陝鄭汴懷魏為六雄十二年昇為四輔天寶元年改為河東郡乾元元年復為蒲州割安邑屬陝州三年四月置河中府析同州之朝邑於河西鹽坊置河西縣來屬元年建卯月又為中都元和三年復為河中府舊領縣五戶三萬六千四百九十九口十七萬三千七百八十四天寶領縣八戶七萬八百口四十六萬九千二百一十三元和領縣十一在京師東北三百二十四里去東都五百五十里河東隋縣州理所開元八年分置河西縣其年罷中都乃省乾元三年復置河西舊朝邑縣屬同州管長春宮乾元元年置河中府割朝邑來屬改為河西縣以鹽坊為理所臨晉隋分猗氏置桑泉縣武德三年分置溫泉縣九年省溫泉併入桑泉天寶十三年改為臨晉縣解隋虞鄉縣武德元年改為解縣屬虞州蒲州別置虞鄉縣貞觀十七年省解縣併入虞鄉二十二年復析置解縣屬蒲州猗氏漢縣古郇國也虞鄉漢解縣地後魏分置虞鄉縣貞觀十七年省解縣併入虞鄉縣二十年復置解縣省虞鄉天授二年復分解縣置虞鄉縣永樂武德元年分芮城縣置屬芮州九年廢芮州改屬鼎州貞觀八年改屬蒲州又割屬虢州神龍元年復來屬寶鼎漢汾陰縣隋屬泰州貞觀十七年廢泰州縣來屬開元十一年玄宗祀后土獲寶鼎因改為寶鼎龍門漢皮氏縣後魏改為龍門武德元年於縣置泰州領龍門萬泉汾陰四縣貞觀十七年廢泰州及芮縣以龍門萬泉屬絳州汾陰屬蒲州聞喜漢縣隋為桐鄉縣武德元年分置聞喜縣萬泉武德三年分稷山界於薛通城置萬泉縣屬泰州州廢入絳州後又隸河中府絳州隋絳郡武德元年置絳州總管府管絳潞蓋建澤沁韓晉呂澮泰蒲虞芮邵十五州絳州領正平太平曲沃聞喜稷山五縣三年廢總管府其年以廢北澮州之翼城置翼城縣領翼城絳小鄉三縣武德元年改為澮州二年改為北澮州四年州廢三縣併入絳州置南絳州又置絳縣曲沃漢絳縣地後魏置曲沃縣絳漢聞喜縣後魏置南絳州又置絳縣稷山後魏高涼縣隋改名稷山垣隋縣義寧元年置邵原領垣王屋又置清廉亳城四縣武德元年改為邵州二年又置長泉縣五年廢亳城九年省邵州省清廉入垣縣王屋屬懷州垣屬絳州襄陵後魏擒盛縣改為襄陵取漢舊名屬晉州元和十四年屬絳州晉州隋臨汾郡義旗初改為平陽郡領臨汾襄陵岳陽冀氏楊五縣其年改楊縣為洪洞武德元年改為晉州分襄陵置浮山縣分洪洞置西河縣三年置總管府管晉絳沁呂四州移治白馬城改浮山為神山縣貞觀六年廢都督十二年移治所於平陽古城十七年省西河縣以廢呂州之霍邑趙城汾西三縣來屬天寶元年改州為平陽郡乾元元年復為晉州元和十四年割襄陵屬絳州大和元年改屬河中府舊領縣七戶二萬一千六百一十七口九萬七千五百五天寶領縣九戶六萬四千八百三十六口四十二萬九千二百二十一元和領縣八在京師東北七百二十五里至東都七百三十九里臨汾漢平陽縣隋改為臨汾貞觀十七年省西河縣併入臨汾洪洞漢楊縣至隋不改義寧元年改為洪洞取縣北嶺名神山武德二年分襄陵置浮山縣四年改為神山以縣東南羊角山神見為名岳陽後魏安澤縣隋改為岳陽霍邑漢彘縣後漢改為永安隋於此置汾州尋改為呂州領霍邑趙城汾西靈石四縣貞觀十七年廢呂州以霍邑等三縣來屬以靈石屬汾州趙城國初分霍邑縣置汾西後漢汾西郡隋廢為縣屬呂州隋末陷賊武德初權於今城南五十里申村堡置貞觀六年移於今所冀氏漢猗氏縣地後於古猗氏縣地南置冀氏隰州下隋龍泉郡武德元年改為隰州領隰川溫泉大寧石樓四縣二年置總管府領隰中昌南汾東和西德六州三年又置北溫州屬焉貞觀元年省中昌西德北溫四州又以廢昌州蒲縣來屬仍督隰南汾東和三州三年廢都督府又以廢東和州永和縣來屬天寶元年改為大寧郡乾元元年復為隰州舊領縣六戶八千二百二十二口三萬八千三百九十五天寶戶一萬九千四百五十五口十二萬四千四百二十在京師東北九百六里至東都八百八十里隰川州所理漢蒲子縣地隋為隰川縣蒲漢縣武德二年置昌州領蒲仵城常武昌原四縣貞觀元年省昌州及昌原仵城常武三縣以蒲屬隰州大寧漢北屈縣地隋為仵城武德二年置中州於隋大寧故城因改名大寧貞觀元年廢中州及大義白龍二縣以大寧隸隰州永和漢狐讘縣隋為永和武德二年移治於仙芝谷西屬東和州又分置樓山縣貞觀元年廢東和州及樓山縣以永和隸隰州石樓漢土軍縣隋改為石樓武德二年於縣置西德州領長壽臨河石樓三縣貞觀元年廢西德州省長壽臨河二縣以石樓屬東和州二年又省東和州以石樓來屬溫泉隋新城縣武德二年分置溫泉縣仍置北溫州領溫泉新城高堂三縣屬隰州總管府貞觀元年省北溫州及新城高堂二縣以溫泉來屬汾州上隋西河郡義旗初依舊領隰城介休孝義平遙四縣其年割介休平遙二縣屬介休郡武德元年以介休郡為介州西河郡為浩州三年改浩州為汾州仍割幷州之文水來屬貞觀元年省介州以介休平遙二縣來屬文水還幷州十七年以廢呂州之靈石來屬天寶元年改為西河郡乾元元年復為汾州舊領縣四戶三萬四千九口十萬六千三百八十四天寶領縣五戶五萬九千四百五十口三十二萬二百三十三去京師一千二百六里東都九百三十七里西河漢美稷縣隋為隰城縣上元元年九月改為西河縣孝義漢中陽縣後魏曰永安貞觀元年改為孝義介休漢縣武德元年於縣置介州貞觀元年州廢以介休平遙屬汾州平遙漢平陶縣後魏廟諱改陶為遙武德屬介州州廢來屬靈石隋分介休縣置屬呂州州廢來屬慈州下元魏曰南汾州隋改為耿州又為文成郡武德元年改為汾州五年改為南汾州八年改為慈州以郡近慈烏戍故也舊領縣五戶五千二百四十五口二萬二千六百五十一天寶戶一萬一千六百一十六口六萬二千四百八十六在京師東北六百八十三里去東都七百二十七里吉昌隋縣文城元魏曰斤城縣隋改為文城顯慶三年移斤城縣東北文城村置昌寧漢汾縣地後魏分置太平縣又分太平置昌寧縣呂香義寧元年分仵城縣置平昌縣貞觀元年改為呂香因舊鎮為名上元三年移治所於故平昌府南置今縣是也仵城後魏置縣取鎮戍名也潞州大都督府隋上黨郡武德元年改為潞州領上黨長子屯留潞城四縣二年置總管府管潞澤沁韓蓋五州四年分上黨置壺關縣貞觀元年廢都督府八年置大都督府十年又改為都督府貞觀十七年廢韓州以所管襄垣等五縣屬潞州開元十七年以玄宗歷職此州置大都督府管慈儀石沁四州天寶元年改為上黨郡乾元元年依舊為潞州大都督府舊領縣五戶一萬八千六百九十口八萬三千四百五十五舊於襄垣置韓州領縣五戶七千一十七口三萬二千九百三十六天寶領縣十戶六萬八千三百九十一口三十八萬八千六百六十在京師東北一千一百里至東都四百八十七里上黨漢壺關縣隋分置上黨州所治壺關武德四年分上黨置治於高望堡貞觀十七年移治進流川長子漢縣屯留隋舊武德五年自霍壁移於今所潞城古邑隋特置潞城縣襄垣隋縣武德元年於縣置韓州領襄垣黎城涉銅鞮武鄉五縣又割幷州之榆社來屬三年置甲水縣仍以榆社屬榆州六年割沁州之銅鞮來屬九年省甲水縣貞觀十七年廢韓州以襄垣等五縣隸潞州黎城舊刈陵縣隋改曰黎城州涉漢縣隋屬韓州州廢來屬銅鞮漢縣隋屬韓州武德元年屬沁州三年分置甲水縣五年移治水堡六年移於今所屬韓州省甲水縣韓州廢屬潞州武鄉漢垣縣後魏曰沮城移治於南亭川改為鄉縣屬韓州州廢屬潞州則天加武字神龍年去武字復為鄉縣後又加武字澤州上隋長平郡武德元年改為蓋州領高平丹川陵川又置蓋城四縣又於濩澤縣置澤州領濩澤沁水端氏三縣三年於今理置晉城縣六年廢建州自高平移蓋州治之八年移澤州治端氏九年省丹川蓋城貞觀元年廢蓋州自端氏縣移澤州於今治天寶元年改澤州為高平郡乾元元年復為澤州舊領縣六戶一萬六百六十口四萬六千七百三十二天寶戶二萬七千八百二十二口二十五萬七千九十在京師東北一千三十里至東都六百六十七里晉城漢高都縣隋改為丹川武德元年移丹川於源澤水北屬蓋州二年於古高都城置晉城縣屬建州六年廢建州縣屬蓋州九年省丹川縣貞觀元年廢蓋州縣屬澤州端氏漢縣武德八年移澤州於此縣貞觀元年又移於晉城陵川漢泫氏縣隋改陵川武德初屬蓋州貞觀元年隸澤州陽城隋濩澤縣武德元年於縣置澤州八年移州治於端氏天寶元年改為陽城沁水元魏置東永安縣隋改為沁水屬蓋州州廢來屬高平漢泫氏縣地武德元年於縣置蓋州領高平丹川陵川蓋城四縣貞觀元年廢蓋州來屬沁州下隋上黨郡之沁源縣義寧元年置義寧郡領沁源銅鞮綿上仍分沁源置和川凡四縣武德元年改為沁州二年分沁源置招遠縣三年省招遠縣六年以銅鞮屬韓州天寶元年改沁州為陽城郡乾元元年復為沁州舊領縣三戶三千九百五十六口一萬六千一百七天寶戶六千三百八口三萬四千九百六十三在京師東北一千二十五里去東都六百三十五里沁源漢穀遠縣州所治後魏改為沁源和川義寧元年分沁源置綿上隋分介休之南界置綿上縣遼州隋太原郡之遼山縣武德三年分幷州之樂平和順平城石艾四縣置遼州治樂平其年置義興縣六年自樂平移於遼山仍以石艾樂平二縣屬受州省義興縣以廢榆州之榆社平城二縣來屬八年改遼州為箕州先天元年又改為儀州天寶元年改為樂平郡乾元元年復為儀州中和三年八月復為遼州舊領縣四戶四千三百六十五口八萬八千六百四十天寶戶九千八百八十二口五萬四千五百八十在京師東北一千四百五十九里至東都七百九十七里遼山漢垣縣地魏改轑陽縣隋改遼山縣屬幷州武德三年屬遼州榆社晉武鄉縣義寧元年分置榆社縣武德三年於此置榆州割幷州平城來屬仍置偃武縣六年廢榆州及偃武縣以平城榆社屬遼州和順漢沾縣地隋為和順縣武德初屬幷州三年改為遼州平城隋縣武德初屬幷州三年改屬榆州六年改為遼州北京太原府隋為太原郡武德元年改為幷州總管領晉陽太原榆次太谷祁陽直壽陽盂樂平交城石艾文水遼山平城烏河榆社十六縣其年置清源縣仍以榆社屬韓州三年廢總管其年置汾陽仍以盂壽陽二縣置受州治盂縣樂平遼山平城石艾四縣置遼州治樂平太谷祁二縣置太州治太谷仍以文水屬汾州四年又置總管管幷介受遼太榆汾七州其年改為上總管五年又改代石二總管其年改上總管為大總管六年又改朔州總管仍割汾州之文水來屬其年廢太州以太谷祁二縣來屬七年改為大都督府其年置羅陰縣仍省陽直縣改汾陽為陽曲縣又以文水屬汾州貞觀元年省烏河羅陰二縣又以文水來屬八年以廢受州之壽陽盂樂平石艾