body:
  text: 舊唐書卷一百三十七列傳第八十七徐浩趙涓子博宣盧南史附劉太真李紓邵説于邵崔元翰于公異呂渭子溫恭儉讓鄭雲逵李益李賀徐浩字季海越州人父嶠官至洛州刺史浩少舉明經工草隸以文學為張説所器重調授魯山主簿説薦為麗正殿校理三遷右拾遺仍為校理幽州節度使張守圭奏在幕府改監察御史丁父憂服除授京兆司録以母憂去職數年調授河南司録歷河陽令以善政稱拜太子司議郎遷金部員外郎歷憲部郎中安祿山反出為襄陽太守本郡防禦使賜以金紫之服肅宗即位召拜中書舍人時天下事殷詔令多出於浩浩屬詞贍給又工楷隸肅宗悅其能加兼尚書右丞玄宗傳位誥册皆浩為之參兩宮文翰寵遇罕與為比除國子祭酒坐事貶廬州長史代宗徵拜中書舍人集賢殿學士尋遷工部侍郎嶺南節度觀察使兼御史大夫又為吏部侍郎集賢殿學士坐以妾弟冒選託侍郎薛雍注授京尉為御史大夫李栖筠所彈坐貶明州別駕德宗即位徵拜彭王傅建中三年以疾卒年八十贈太子少師初浩以文雅稱及授廣州典選部多積貨財又嬖其妾侯莫陳氏頗干政事為時論所貶趙涓冀州人也幼有文學天寶初舉進士補郾城尉纍授監察御史右司員外郎河南副元帥王縉奏充判官授檢校兵部郎中兼侍御史遷給事中太常少卿出為衢州刺史永泰初涓為監察御史時禁中失火燒屋室數十間火發處與東宮稍近代宗深疑之涓為巡使俾令即訊涓周歷壖囿按據迹狀乃上直中官遺火所致也推鞫明審頗盡事情既奏代宗稱賞焉德宗時在東宮常感涓之究理詳細及刺衢州年考既深又與觀察使韓滉不相得滉奏免涓官德宗見其名謂宰臣曰豈非永泰初御史趙涓乎對曰然即拜尚書左丞無何知吏部選扈從梁州興元元年卒贈戶部尚書子博宣登進士第文章俊拔性率多酒陳許節度使曲環辟為從事賓筳之間多所忽略環不能容朝廷方討淮蔡環誣奏博宣受吳少誠賂為反間又妄説國家休咎扇惑軍情時博宣權知舞陽縣事詔令環決杖四十流於康州人皆以為枉先是侍御史盧南史坐事貶信州員外司馬至郡準例得廳吏一人每月請紙筆錢前後五年計錢一千貫南史以官間冗放吏歸納其紙筆錢六十餘千刺史姚驥劾奏南史以為贓又劾南史買鉛燒黃丹德宗遣監察御史鄭楚相刑部員外郎裴澥大理評事陳正儀充三司使同往按鞫將行並召於延英謂之曰卿等必須詳審無令漏罪銜冤三人將退裴澥獨留奏曰臣按姚驥奏狀稱南史取廳吏紙筆錢計贓六十餘貫雖於公法有違量事且非巨𢀿上曰此事亦未為甚未知燒鉛何如澥曰燒鉛為丹格令不禁準天寶十三載敕鉛銅錫不許私家買賣貨易蓋防私鑄錢本亦不言燒鉛為丹南史違敕買鉛不得無罪伏以陛下自登寶位及天寶大曆以來未曾降三司使至江南今忽録此小事令三司使往非唯損耗州縣亦恐遠處聞之各懷憂懼臣聞開元中張九齡為五嶺按察使有録事參軍告齡非法朝廷止令大理評事往按大曆中鄂嶽觀察使吳仲孺與轉運使判官劉長卿紛競仲孺奏長卿犯贓二十萬貫時止差監察御史苗伾就推今姚驥所奏事狀無多臣堪任此行即請獨往恐不須三司並行為使德宗欣然曰卿言是矣乃復召楚相正儀與澥俱坐謂之曰朕懵於理道處事未精適見裴澥所奏深協事宜亦不用三人總去但行首一人行可也卿等便宣付宰臣改敕德宗不務大體以察為明皆此類也而博宣南史坐誣枉擯逐賴裴澥悟主南史不至深罪後得召還劉太真宣州人涉學善屬文少師事詞人蕭穎士天寶末舉進士大曆中為淮南節度使陳少遊掌書記徵拜起居郎纍歷臺閣自中書舍人轉工部刑部二侍郎性怯懦詭隨及轉禮部侍郎掌貢舉宰執姻族方鎮子弟先收擢之又常少遊勳績擬之桓文大招物論貞元五年貶信州刺史到州尋卒太真尤長於詩句每出一篇人皆諷誦德宗文思俊拔每有御製即命朝臣畢和貞元四年九月賜宴曲江亭帝為詩序曰朕在位僅將十載實賴忠賢左右克致小康是以擇三令節錫茲宴賞俾大夫卿士得同歡洽也夫共其戚者同其休有其初者貴其終咨爾羣僚頒朕不暇樂而能節職思其憂咸若時則庶乎理矣因重陽之會聊示所懷早衣對庭燎躬化勤意誠時此萬樞暇適與佳節並曲池潔寒流芳菊舒金英乾坤爽氣澄臺殿秋光清朝野慶年豐高會多歡聲永懷無荒誡良士同斯情因詔曰卿等重陽會宴朕想歡洽欣慰良多情發于中因製詩序今賜卿等一本可中書門下簡定文詞士三五十人應制同用清字明日內於延英門進來宰臣李泌等雖奉詔簡擇難於取捨由是百僚皆和上自考其詩以太真及李紓等四人為上等鮑防于邵等四人為次等張濛殷亮等二十三人為下等而李晟馬燧李泌三宰相之詩不加考第初朱泚懷光之亂關輔薦飢貞元三年以後仍歲豐稔人始復生人之樂德宗詔曰比者卿士內外朝夕公務今方隅無事蒸民小康其正月晦日三月三日九月九日三節日宜任文武百僚擇勝地追賞每節宰相常參官共賜錢五百貫文翰林學士一百貫文左右神戊滅神策等十軍各賜五百貫金吾英武威遠及諸衛將軍共賜二百貫客省奏事共賜一百貫委度支每節前五日支付永為常制李紓字仲舒禮部侍郎希言之子少有文學天寶末拜祕書省校書郎大曆初吏部侍郎李季卿薦為左補闕纍遷司封員外郎知制誥改中書舍人尋自虢州刺史徵拜禮部侍郎德宗居奉天擇為同州刺史尋棄州詣梁州行在拜兵部侍郎反正兼知選事李懷光誅河東節度及諸軍會河中詔往宣勞節度使還敷奏合旨拜禮部侍郎紓通達善詼諧好接後進厚自奉養鮮華輿馬以放達蘊藉稱雖為大官而佚遊佐宴不嘗自忘嘗議享武成王不當視文宣廟奏云準開元十九年敕置齊太公廟以張良配太常卿及少卿丞充三獻官又按開元禮祝文云皇帝遣某官昭告于齊太公漢留侯至上元年敕追贈太公為武成王享祭之典一同文宣王有司因差太尉充獻官兼御署祝板伏以太公即周之太師張良即漢之少傅聖朝列於祀典已極褒崇今屈禮於至尊施敬於臣佐理或過當神何敢歆伏以文宣垂教百代宗師五常三綱非其訓不明有國有家非其制不立故孟軻稱生人已來一人而已由是正素王之位加先聖之名樂用宮懸獻差太尉尊師崇道雅合政經且太公述作止於六韜勳業形於一代豈宜擬諸盛德均其殊禮其祝文請不進署敢昭告請改為敬祭于其昭告請改為致祭于留侯其獻官請準舊式差太常卿已下充詔百僚進議文武官上言互有異同詔曰帝德廣運乃武乃文文化武功皇王之二柄祀禮教敬國章孔明自今宜上將軍以下充獻官餘依紓所奏紓又奉詔為興元紀功述及郊廟樂章諸所論著甚衆卒於官年六十二貞元八年贈禮部尚書邵説相州安陽人舉進士為史思明判官歷事思明朝義常掌兵事朝義之敗説降於軍前郭子儀愛其才留於幕下纍授長安令祕書少監遷吏部侍郎太子詹事以才幹稱談者或以宰相許之金吾將軍裴警謂諫議大夫柳載曰以鄙夫所度説得禍不久矣且説與史思明父子定君臣之分居劇官掌兵柄亡軀犯順前後百戰於賊庭掠名家子女以為婢僕者數十人剽盜寶貨不知紀極力屈然後降朝廷宥以不死獲齒班序無厚顏而又遑遑求財崇飾第宅附託貴幸以求大用不知愧懼而有得色其能久乎建中三年嚴郢得罪説與郢厚善勸朱泚抗疏申其冤説為草其奏上知之貶説歸州刺史竟卒于貶所于邵字相門其先家于代今為京兆萬年人曾祖筠戶部尚書邵天寶末進士登科書判超絶授崇文館校書郎纍歷使府入為起居郎再遷比部郎中尚二十考第於吏部以當稱無何出為道州刺史未就道轉巴州時歲儉夷獠數千相聚山澤圍州掠衆邵勵州兵以拒之旬有二日遣使説喻盜邀邵面降邵儒服出城盜羅拜而降圍解節度使李抱玉以聞超遷梓州以疾不至遷兵部郎中西川節度使崔寧請留為支度副使尋拜諫議大夫知制誥再遷禮部侍郎史館修撰為三司使以撰上尊號册賜階三品當時大詔令皆出於邵頃之與御史中丞袁高給事中蔣鎮雜理左丞薛雍詔獄邵以為雍犯在赦前奏出之失旨貶桂州長史貞元初除原王傅後為太子賓客與宰相陸贄不睦八年出為杭州刺史以疾請告坐貶衢州別駕移江州別駕卒年八十一邵性孝悌內行修潔老而彌篤初樊澤常舉賢良方正邵一見之於京師曰將相之材也不十五年澤為節將崔元翰年近五十始舉進士邵異其文擢第甲科且曰不十五年當掌詔令竟如其言獨孤授舉博學宏詞吏部考為乙第在中書覆升甲科人稱其當有集四十卷崔元翰者博陵人進士擢第登博學宏詞制科又應賢良方正直言極諫科三舉皆升甲第年已五十餘李汧公鎮滑臺辟為從事後北平王馬燧在太原聞其名致禮命之又為燧府掌書記入朝為太常博士禮部員外郎竇參輔政用為知制誥詔令溫雅合於典謨然性太剛褊簡傲不能取容於時每發言論略無阿徇忤執政旨故掌誥二年而官不遷竟罷知制誥守比部郎中元翰苦心文章時年七十餘好學不倦既介獨耿直故少交遊唯秉一操伏膺翰墨其對策及奏記碑志師法班固蔡伯喈而致思精密為時所擯終于散位于公異者吳人登進士第文章精拔為時所稱建中末為李晟招討府掌書記興元元年收京城公異為露布上行在云臣已肅清宮禁祗奉寢園鍾簴不移廟貌如故德宗覽之泣下不自勝左右為之嗚咽既而曰不知誰為之或對曰于公異之詞也上稱善久之公異初應進士時與舉人陸贄不協至是贄為翰林學士聞上稱與尤不悅時議者言之公異少時不為後母所容自遊宦成名不歸鄉里及貞元中陸贄為宰相奏公異無素行黜之詔曰祠部員外郎于公異頃以才名升於省闥其少也為父母之所不容宜其引慝在躬孝行不匱匿名迹於畎畝候安否於門閭俾其親之過不彰庶其誠之至必感安於棄斥遊學遠方忘其溫凊之戀竟至存亡之隔為人子者忍至是乎宜放歸田里俾自循省其舉公異官尚書左丞盧邁宜奪俸兩月時中書舍人高郢薦監察御史元敦義及覩公異譴逐懼為所纍乃上疏首陳敦義虧於禮教詔嘉郢之知過俾敦義罷歸公異竟名位不振轗軻而卒人士惜其才惡贄之褊急焉呂渭字君載河中人父延之越州刺史浙江東道節度使渭舉進士纍授婺州永康令大理評事浙西觀察使李涵辟為支使再遷殿中侍御史涵自御史大夫改太子少傅渭上言涵父名少康今涵為少傅恐乖朝典由是特授渭司門員外郎尋為御史臺劾奏涵再任少卿此時都不言今為少傅疑以散慢乃為不可由是貶渭歙州司馬改涵檢校工部尚書兼光祿卿渭纍授舒州刺史吏部員外駕部郎中知制詔中書舍人母憂罷服闋授太子右庶子禮部侍郎中書省有柳樹建中末枯死興元元年車駕還京後其樹再榮人謂之瑞柳渭試進士取瑞柳為賦題上聞而嘉之渭又結附裴延齡之子操舉進士文詞非工渭擢之登第為正人嗤鄙因入閣遺失請託文記遂出為潭州刺史兼御史中丞湖南都團練觀察使在任三歲政甚煩碎貞元十六年卒年六十六贈陝州大都督子溫恭儉讓溫字化光貞元末登進士第與翰林學士韋執誼善順宗在東宮侍書王叔文勸太子招納時之英俊以自輔溫與執誼尤為叔文所眷起家再命拜左拾遺二十年冬副工部侍郎張薦為入吐蕃使行至鳳翔轉侍御史賜緋袍牙笏明年德宗晏駕順宗即位張薦卒於青海吐蕃以中國喪禍留溫經年時王叔文用事故與溫同遊東宮者皆不次任用溫在蕃中悲歎久之元和元年使還轉戶部員外郎時柳宗元等九人坐叔文貶逐唯溫以奉使免溫天才俊拔文彩贍逸為時流柳宗元劉禹錫所稱然性多險詐好奇近利與竇羣羊士諤趣尚相狎羣為韋夏卿所薦自處士不數年至御史中丞李吉甫尤奇待之三年吉甫為中官所惡將出鎮揚州溫欲乘其有間傾之溫自司封員外郎轉刑部郎中竇羣請為知雜吉甫以疾在第召醫人陳登診視夜宿于安邑里第溫伺知之詰旦令吏捕登鞫問之又奏劾吉甫交通術士憲宗異之召登面訊其事皆虛乃貶羣為湖南觀察使羊士諤資州刺史溫均州刺史朝議以所責太輕羣再貶黔南溫貶道州刺史五年轉衡州秩滿歸京不得意發疾卒溫文體富豔有丘明班固之風所著凌煙閣功臣銘張始興畫贊移博士書頗為文士所賞有文集十卷恭儉皆至侍御史讓至太子右庶子皆有美才自後吉甫再入中書長慶以後李德裕黨盛呂氏諸子無至達官者鄭雲逵滎陽人大曆初舉進士性果誕敢言客遊兩河以畫干于朱泚泚悅乃表為節度掌書記檢校祠部員外郎仍以弟滔女妻之泚將入覲先令雲逵入奏及泚至京以事怒雲逵奏貶莫州參軍滔代泚後請為判官滔助田悅為逆雲逵諭之不從遂棄妻子馳歸長安帝嘉其來留於客省超拜諫議大夫奉天之難雲逵奔赴行在李晟以為行軍司馬戎略多以咨之歷祕書少監給事中尋拜大理卿遷刑部兵部二侍郎遷御史中丞充順宗山陵橋道置頓使雲逵初為朱泚判官常忤同幕蔡庭玉庭玉白泚黜為莫州録事參軍滔復奏為判官因深搆庭玉於滔滔為泚留後事有請於泚庭玉又輒隳之又有判官朱體微亦蒙泚親信與庭玉常從容言於泚曰滔非長者不可付以兵權滔竊知之後滔南討有功雲逵數激怒之滔乃抗表論庭玉等離間骨肉及滔叛帝乃召泚以表示之故歸罪於庭玉等以悅滔滔亦終叛三年雲逵奏其弟前太僕丞方逵受性凶悖不知君親衆惡備身訓教莫及結聚凶黨江中劫人臣亡父先臣昈杖至一百終不能斃張延賞任揚州日亦曾犯延賞法決殺復蘇至於常言皆呼臣亡父先臣名親戚所知無可教語昨聞於邠寧慶等州干謁節度及州縣乞丐今見在武功縣南西戎俯近恐有異謀若不冒死奏聞必恐覆臣家族詔令京兆府錮身遞送黔州付李模於僻遠州驅使勿許東西雲逵元和元年拜右金吾衛大將軍歲中改京兆尹五年五月卒李益肅宗朝宰相揆之族子登進士第長為歌詩貞元末與宗人李賀齊名每作一篇為教坊樂人以賂求取唱為供奉歌詞其征人歌早行篇好事者畫為屏障回樂峯前沙似雪受降城外月如霜之句天下以為歌詞然少有癡病而多猜忌防間妻妾過為苛酷而有散灰扃戶之談聞於時故時謂妬癡為李益疾以是久之不調而流輩皆居顯位益不得意北遊河朔幽州劉濟辟為從事常與濟詩而有不上望京樓之句憲宗雅聞其名自河北召還用為祕書少監集賢殿學士自負才地多所凌忽為衆不容諫官舉其幽州詩句降居散秩俄復用為祕書監遷太子賓客集賢學士判院事轉右散騎常侍大和初以禮部尚書致仕卒李賀字長吉宗室鄭王之後父名晉肅以是不應進士韓愈為之作諱辨賀竟不就試手筆敏捷尤長於歌篇其文思體勢如崇巖峭壁萬仞崛起當時文士從而效之無能髣佛者其樂府詞數十篇至於雲韶樂工無不諷誦補太常寺協律郎卒時年二十四史臣曰文學之士代不乏才永泰貞元之間如徐浩趙涓諸公可謂一時之秀也然太真以畏懦聞邵説以僭侈失于公異呂渭李益皆有微纍故知全其德者罕矣贊曰名以才顯才兼德尊徐趙劉李厥聲遠聞邵于呂鄭其名久存半乏全德愧于後人
