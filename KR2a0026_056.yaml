body:
  text: 舊唐書卷五十二列傳第二后妃下玄宗元獻皇后楊氏肅宗張皇后肅宗韋妃肅宗章敬皇后吳氏代宗睿真皇后沈氏代宗崔妃代宗貞懿皇后獨孤氏德宗昭德皇后王氏德宗韋妃順宗莊憲皇后王氏憲宗懿安皇后郭氏憲宗孝明皇后鄭氏女學士尚宮宋氏穆宗恭僖皇后王氏敬宗郭貴妃穆宗貞獻皇后蕭氏穆宗宣懿皇后韋氏武宗王賢妃宣宗元昭皇后晁氏懿宗惠安皇后王氏昭宗積善皇后何氏玄宗元獻皇后楊氏弘農華陰人曾祖士達隋納言天授中以則天母族追封士達為鄭王贈太尉父知慶左千牛將軍贈太尉鄭國公后景雲元年八月選入太子宮時太平公主用事尤忌東宮宮中左右持兩端而潛附太平者必陰伺察事雖纖芥皆聞於上太子心不自安后時方娠太子密謂張說曰用事者不欲吾多息胤恐禍及此婦人其如之何密令說懷去胎藥而入太子於曲室躬自煮藥醺然似寐夢神人覆鼎既寤如夢如是者三太子異之告說說曰天命也無宜他慮既而太平誅后果生肅宗太子妃王氏無子后班在下后不敢母肅宗王妃撫鞠慈甚所生開元中肅宗為忠王后為妃又生寧親公主張說以舊恩特承寵異說亦奇忠王儀表心知運曆所鍾故寧親公主降說子開元十七年后薨葬細柳原玄宗命說為志文其銘云石獸澀兮綠苔黏宿草殘兮白露霑園寢閉兮脂粉膩不知何年開鏡奩二十四年忠王立為皇太子至德元年肅宗即位於靈武二載五月玄宗在蜀誥曰聖人垂範是推顧復之恩王者建極抑有追尊之禮蓋母以子貴德以諡尊故妃弘農楊氏特稟坤靈夕釐陰教往以續塗山之慶降華渚之祥誕發異圖載光帝業而冊命猶闕幽靈尚閟夏王繼統方軫陽城之恩漢后褒榮庶協昭靈之稱宜於彼追冊為元獻太后寶應二年正月祔葬泰陵肅宗張皇后本南陽西鄂人後徙家昭應祖母竇氏玄宗母昭成皇太后之妹也昭成為天后所殺玄宗幼失所恃為竇姨鞠養景雲中封鄧國夫人恩渥甚隆其子去惑去疑去奢去逸皇姨弟也皆至大官去盈尚玄宗女常芬公主去逸生后天寶中選入太子宮為良娣后弟清又尚大寧郡主后辯惠豐碩巧中上旨祿山之亂玄宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗性仁孝以上皇播越不欲違離左右宦者李靖忠啟太子請留良娣贊成之白於玄宗太子如靈武時賊已陷京師從官單寡道路多虞每太子次舍宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰今大家跋履險難兵衞非多恐有倉卒妾自當之大家可由後而出庶幾無患及至靈武產子三日起縫戰士衣太子勞之曰產忌作勞安可容易后曰此非妾自養之時須辦大家事肅宗即位冊為淑妃贈父太僕卿去逸左僕射母竇氏封義章縣主姊李曇妻封清河郡夫人妹師師封郕國夫人乾元元年四月冊為皇后弟駙馬都尉清加特進太常卿同正封范陽郡公皇后寵遇專房與中官李輔國持權禁中干預政事請謁過當帝頗不悅無如之何后於光順門受外命婦朝親蠶苑中內外命婦相見儀注甚盛先在靈武時太子弟建寧王倓為后誣譖而死自是太子憂懼常恐后之構禍乃以恭遜取容后以建寧之隙常欲危之張后生二子興王佋定王侗興王早薨侗又孩幼故儲位獲安寶應元年四月肅宗大漸后與內官朱輝光馬英俊啖廷瑤陳仙甫等謀立越王係矯詔召太子入侍疾中官程元振李輔國知其謀及太子入二人以難告請太子在飛龍元振率禁軍收越王捕朱輝光等俄而肅宗崩太子監國遂移后於別殿幽崩誅馬英俊女道士許靈素配流山人申大芝賜死駙馬都尉清貶硤州司馬弟延和郡主婿鴻臚卿潛貶郴州司馬舅鴻臚卿竇履信貶道州刺史肅宗韋妃父元珪兗州都督肅宗為忠王時納為孺人及昇儲位為太子妃生兗王僴絳王佺永和公主永穆公主天寶中宰相李林甫不利於太子妃兄堅為刑部尚書林甫羅織起柳勣之獄堅連坐得罪兄弟並賜死太子懼上表自理言與妃情義不睦請離婚玄宗慰撫之聽離妃遂削髮被尼服居禁中佛舍西京失守妃亦陷賊至德二年薨於京城肅宗章敬皇后吳氏坐父事沒入掖庭開元十三年玄宗幸忠王邸見王服御蕭然傍無媵侍命將軍高力士選掖庭宮人以賜之而吳后在籍中容止端麗性多謙抑寵遇益隆明年生代宗皇帝二十八年薨葬於春明門外代宗即位之年十二月羣臣以肅宗山陵有期準禮以先太后祔陵廟宰臣郭子儀等上表曰儷宸極者允歸於淑德諡徽號者必副於鴻名當履運而承天則因心而追往此先王之明訓聖人之茂典也伏惟先太后圓精挺質方祇稟秀禎符協於四星典禮敦於萬國得元和之正氣韞霄漢之清英顧史求箴道先於壼則撝謙率禮教備於中闈太陰無昃朓之徵丙殿有祝延之慶尊敬師傅佩服禮經勤於蘋藻之薦罔貴珩璜之飾徽音允穆嘉慶聿彰憲度輔佐之勞緝熙玄默之化足以光昭宗祀作配紫微豈騶虞之風行於江漢之域葛覃之詠起自岐陽之下爰膺曆數作啟聖明大拯艱難永清夷夏雖復文母成周王之業慶都誕帝堯之聖異代同符彼多慚德昊蒼不弔聖善長違當圓魄之成玉英早落有坤儀之美象服未加悲懷於先遠之辰感慟於易名之日伏以山陵貞兆良吉有期虞祔之儀式資配享率由故實敬奉嘉名謹按諡法敬慎高明曰章法度明大曰章夙興夜寐曰敬齊莊中正曰敬敢遵先典仰圖懿德謹上尊諡曰章敬皇后二年三月祔葬建陵啟春明門外舊壟后容狀如生粉黛如故而衣皆赭黃色見者駭異以為聖子符兆之先后父令珪寶應初贈太尉母李氏贈秦國夫人叔令瑤拜太子家令封馮翊郡公令瑜太子右諭德封濟陰郡公后兄漵鴻臚少卿封鄄城縣公澄太子賓客濮陽縣公湊太子詹事臨濮縣公並加開府儀同三司漵位終金吾大將軍湊位終京兆尹見外戚傳代宗睿真皇后沈氏吳興人世為冠族父易直祕書監開元末以良家子選入東宮賜太子男廣平王天寶元年生德宗皇帝祿山之亂玄宗幸蜀諸王妃主從幸不及者多陷於賊后被拘於東都掖庭及代宗破賊收東都見之留於宮中方經略北征未暇迎歸長安俄而史思明再陷河洛及朝義敗復收東都失后所在莫測存亡代宗遣使求訪十餘年寂無所聞德宗即位下詔曰王者事父孝故事天明事母孝故事地察則事天莫先於嚴父事地莫盛於尊親朕恭承天命以主社稷執珪璧以事上帝祖宗克配園寢永終而內朝虛位闕問安之禮銜悲內惻憂戀終歲思欲歷舟車之路以聽求音問而主茲重器莫匪深哀是用仰稽舊儀敬崇大號舉茲禮命式遵前典宜令公卿大夫稽度前訓上皇太后尊號建中元年十一月遙尊聖母沈氏為皇太后陳禮于含元殿庭如正至之儀上衮冕出自東序門立於東方朝臣班於位冊曰嗣皇帝臣名言恩莫重於顧復禮莫貴於徽號上以展愛敬之道下以正春秋之義則祖宗之所稟命臣子之所盡心尊尊親親此焉而在兩漢而下帝王嗣位崇奉尊稱厥有舊章永惟丕烈敢墜前典臣名謹上尊號曰皇太后帝再拜歔欷不自勝左右皆泣下仍以睦王述為奉迎皇太后使工部尚書喬琳副之候太后問至昇平公主宜備起居於是分命使臣周行天下明年二月吉問至羣臣稱賀既而詐妄自是詐稱太后者數四皆不之罪終貞元之世無聞焉德宗敦崇外族贈太后父易直太師易直父庫部員外郎介福贈太傅介福父德州刺史士衡贈太保易直第二子祕書少監震贈太尉時沈氏封贈拜爵者百餘人貞元七年詔外曾祖隋陝令沈琳贈司徒追封徐國公與外祖贈太師易直等立五廟以琳為始緣祠廟所須官給后無近屬惟族子房為近德宗用為金吾將軍主沈氏之祀憲宗即位之年九月禮儀使奏太后沈氏厭代登真於今二十七載大行皇帝至孝惟深哀思罔極建中之初已發明詔舟車所至靡不周遍歲月滋深迎訪理絕按晉庾蔚之議尋求三年之後又俟中壽而服之今參詳禮例伏請以大行皇帝啟攢宮日百官舉哀於肅章門內之正殿先令有司造褘衣一副發哀日令內官以褘衣置於幄自後宮人朝夕上食先啟告元陵次告天地宗廟昭德皇后廟上太皇太后諡冊造神主擇日祔於代宗廟其褘衣備法駕奉迎於元陵祠復置於代宗皇帝衮衣之右便以發哀日為國忌詔如奏其年十一月冊諡曰睿真皇后奉神主祔於代宗之室代宗崔妃博陵安平人父峋祕書少監母楊氏韓國夫人天寶中楊貴妃寵幸即妃之姨母也時韓國虢國之寵冠於戚里時代宗為廣平王故玄宗選韓國之女嬪于廣平邸禮儀甚盛生召王偲初妃挾母氏之勢性頗妬悍及西京陷賊母黨皆誅妃從王至靈武恩顧漸薄達京而薨代宗貞懿皇后獨孤氏父穎左威衞錄事參軍以后貴贈工部尚書后以美麗入宮嬖幸專房故長秋虛位諸姬罕所進御后始冊為貴妃生韓王迥華陽公主華陽聰悟過人能候上顏色發言必隨喜慍上之所賞則因而美之上之所惡則曲以全之由是鍾愛特異大曆九年公主薨上嗟悼過深數日不視朝宰臣等因中使吳承倩附奏言修短常理以社稷之重宜節哀視事初公主疾上令宗師道教名曰瓊華真人及疾亟上親自臨視屬纊之際嚙傷上指其愛念如此上既未聽朝宰臣等諫曰公主夙成神悟仁眷特鍾嘗禱必親已承減膳幽明遽間倍軫慈衷臣等微誠無由感達伏惟陛下守累聖之公器御羣生之重畜夷百戰之艱患撫四海之傷殘虜候為虞戎師近警一言萬務裁成聖心得失謬於毫釐安危存于晷刻伏慮顧懷猶切神志未和衆情以之不寧臣子以之兢悸伏願抑周喪之私痛均品物於至公下慰黔黎上安宗社上始聽朝大曆十年五月貴妃薨追諡曰貞懿皇后殯於內殿累年不忍出宮十三年十月方葬命宰臣常衮為哀冊曰維大曆十年歲在辛卯十月辛酉朔六日丙寅貴妃獨孤氏薨粵明日追諡曰貞懿皇后殯于內殿之西階十三年十月癸酉乃命門下侍郎同平章事常衮持節冊命以其月二十五日丁酉遷座于莊陵禮也素紗列位黼帟周庭輅升玉綴軒珠欞皇帝悼鸞掖以追懷感麟迹而增慟備百禮以殷遣命六宮而哀送宗祝薦告司儀降收爰詔侍臣紀垂鴻休其辭曰祚祉悠久寵靈誕受元魏戚藩周隋帝后五侯迭興七貴居右肇啟皇運光膺文母纘女是因以綱大倫生知陰教育我蒸人瑞雲呈彩瑤星降神聰明睿智婉麗貞仁惟昔天監搜求才淑龍德在田葛覃于谷周姜胥宇漢后推轂王業惟艱嬪風已穆繼文傳聖嗣徽克令不曜其光乃終有慶祗奉園寢肅恭靈命越在哀聿追孝敬文織絲組朱綠玄黃上供祭服以祀明堂法度有節不待珩璜篇訓之制自盈縑緗我邦族風于天下始於憂勤協成王化慈厚諸女寵臨下嫁登進賢才勞謙日夜服繒示儉脫簪申誡訪問後言讌遊夙退內和羣娣動有矜誨外睦諸親泣辭封拜闕翟有日親蠶俟時忽歸清漢言復方祇萬乘悼懷羣臣慕思玉衣追慶金鈿同儀嗚呼哀哉去昭陽兮窅然乘雲駕兮何在人代宛兮如舊炎涼兮已改翠葆森以成列素旗儼而相待言從玉兆之貞永閟瑤華之彩別長秋之西苑過望春兮南登招帝子于北渚從母后於東陵下土清兮動金翠外無像兮中有馮合簫挽以攢咽結雲雨之凄凝吾君感於幽期俯層亭而望思慘嬪媛以延竚極容衞以盡時搖巾袂兮遠訣隔軒檻兮羣悲不復見兮迴御輦傷如何兮軫睿慈下蘭臯兮背芷陽旌悠悠兮野蒼蒼帶白花兮掩淚衣玄兮斷腸當盛明兮共樂忽幽處兮獨傷去故廷兮日遠即新宮兮夜長襚無文繡之飾器無珠貝之藏蓋自我之立制刑有國之大方嗚呼哀哉見送往之空歸歎終焉之如此方士神兮是與非甘泉畫兮疑復似遺音在於玉瑱陳迹留於金戺獻萬壽兮無期存二南之餘美帝追思不已每事欲極哀情常衮當代才臣詔為哀詞文旨悽悼覽之者惻然華陽公主先葬于城東地卑濕至是徙葬祔於莊陵之園故哀詞云招帝子於北渚從母后于東陵乃詔常參官為挽歌上自選其傷切者令挽士歌之大曆初后寵遇無雙以恩澤官其宗屬叔太常少卿卓為少府監后兄良佐太子中允德宗昭德皇后王氏父遇官至祕書監德宗為魯王時納后為嬪上元二年生順宗皇帝特承寵異德宗即位冊為淑妃貞元二年妃病十一月甲午冊為皇后是日崩於兩儀殿臨畢素服視事既大殮成服百僚服三日而釋用晉文明后崩天下發哀三日止之義上服凡七日而釋諡曰昭德初令兵部侍郎李紓撰諡冊文既進帝以紓文謂皇后曰大行皇后非禮留中不出詔翰林學士吳通玄為之通玄又云咨后王氏議者亦以為非知禮者以貞觀中岑文本撰文德皇后諡冊曰皇后長孫氏斯得之矣五月葬于靖陵后母郕國夫人鄭氏請設祭詔曰祭筵不可用假花果欲祭者從之自是宗室諸親及李晟渾瑊神策六軍大將皆設祭自啟攢後日數祭至發引方止宰臣韓滉為哀冊又命宰相張延賞柳渾撰昭德皇后廟樂章既進上以詞句非工留中不下令學士吳通玄別撰進初后為淑妃德宗贈后父遇揚州大都督遇子果眉州司馬甥姪拜官者二十餘人永貞元年十一月徙靖陵祔葬于崇陵德宗韋賢妃不知氏族所出初為良娣貞元二年冊為賢妃性敏惠言無苟容動必由禮德宗深重之六宮師其德行及德宗崩請於崇陵終喪紀因侍於寢園元和四年薨順宗莊憲皇后王氏琅邪人曾祖思敬試太子賓客祖難得贈潞州都督封琅邪郡公父顏金紫光祿大夫衞尉卿后幼以良家子選入宮為才人順宗在藩時代宗以才人賜之時年十三大曆十三年生憲宗皇帝立為宣王孺人順宗升儲冊為良娣后言容恭謹宮中稱其德行順宗即位疾恙未平后供侍醫藥不離左右屬帝不能言冊禮將行復止及永貞內禪冊為太上皇后元和元年正月順宗晏駕五月尊太上皇后為皇太后冊禮畢憲宗御紫宸殿宣赦太后居興慶宮后性仁和恭遜深抑外戚無絲毫假貸訓厲內職有母儀之風焉元和十一年三月崩於南內之咸寧殿諡曰莊憲皇后初太常少卿韋纁進諡議公卿署定欲告天地宗廟禮院奏議曰謹按曾子問賤不誄貴幼不誄長禮也古者天子稱天以誄之皇后之諡則讀於廟江都集禮引白虎通曰皇后何所諡之以為於廟又曰皇后無外事無為于郊傳曰故雖天子必有尊也準禮賤不得誄貴子不得爵母所以必諡于廟者諡宜受成於祖宗故天子諡成于郊后妃諡成于廟今請準禮集百官連署諡狀訖讀于太廟然後上諡於兩儀殿既符故事允合禮經從之初稱諡並云莊憲皇太后禮儀使鄭絪奏議秦漢已來天子之后稱皇后母稱皇太后祖母稱太皇太后崩亦如之加太字者所以別尊稱也國朝典禮皆依舊制開元六年正月太常奏昭成皇太后諡號以牒禮部禮部非之太常報曰入廟稱后義繫於夫在朝稱太后義繫於子此載於史冊垂之不刊今百司移牒及奏狀參詳典故恐不合除太字如諡冊入陵神主入廟即當去之其年八月祔葬于豐陵后生福王綰漢陽雲安遂安三公主后之祖父母弟見外戚傳憲宗懿安皇后郭氏尚父子儀之孫贈左僕射駙馬都尉曖之女母代宗長女昇平公主憲宗為廣陵王時納后為妃以母貴父祖有大勳於王室順宗深寵異之貞元十一年生穆宗皇帝元和元年八月冊為貴妃八年十二月百僚拜表請立貴妃為皇后凡三上章上以歲暮來年有子午之忌且止帝後庭多私愛以后門族華盛慮正位之後不容嬖幸以是冊拜後時元和十五年正月穆宗嗣位閏正月冊為皇太后陳儀宣政殿庭冊曰嗣皇帝臣名再拜言伏以正坤元母天下符至德以昇大號因景運而飾鴻徽煥乎前聞焯彼古訓以極尊尊親親之義明因天事地之經有自來矣伏惟大行皇帝貴妃大虹毓慶霽月披祥導靈派於昭回揖殊仁於氣母範圍百行表飭六宮粵在中闈流宣陰教輔佐先聖勤勞庶工顧以沖眇遭罹閔凶荷成命於守器之時奉寶圖於鑄鼎之日哀纏易月痛鉅終天而四海無虞萬邦有截仰惟顧復之德敢揚聖善之風謹上尊號曰皇太后是日百僚稱慶外命婦奉賀光順門詔皇太后曾祖贈太保追封岐國公敬之贈太傅太后父駙馬都尉曖贈太尉母虢國大長公主贈齊國大長公主后兄司農卿釗為刑部尚書鏦為金吾大將軍太后居興慶宮帝每月朔望參拜三朝慶賀帝自率百官詣門上壽或遇良辰美景六宮命婦戚里親屬車騎駢噎於南內鑾珮之音鏘如九奏穆宗意頗奢縱朝夕供御尤為華侈太后嘗幸驪山登石瓮寺上命景王率禁軍侍從帝自於昭應奉迎遊豫行樂數日方還敬宗即位尊為太皇太后及寶曆季年凶徒竊發昭愍暴殞內外震駭宦官迎絳王監國尋又加害太皇太后下令曰大行皇帝睿哲多能對越天命宜荷九廟之重永享億年之祚豈謂姦妖竊發矯專神器蠱惑中外扇誘羣情駭動神人釁深梟獍咨爾江王聰哲精粹清明在躬智算機閑玄謀雷發躬率義勇大清醜類允膺當璧之符爰攄枕戈之憤既殲巨逆當享豐福是命爾陟于元后宜令司空平章事晉國公度奉冊即皇帝位文宗孝而謙謹奉祖母有禮膳羞珍果蠻夷奇貢獻郊廟之後及三宮而後進御武宗即位以后祖母之尊門地素貴奉之益隆既而宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩於興慶宮諡曰懿安皇太后祔葬於景陵后歷位七朝五居太母之尊人君行子孫之禮福壽隆貴四十餘年雖漢之馬鄧無以加焉識者以為汾陽社稷之功未泯復鍾慶於懿安焉憲宗孝明皇后鄭氏宣宗之母也蓋內職御女之列舊史殘缺未見族姓所出入宮之由宣宗為光王時后為王太妃既即位尊為皇太后會昌六年后弟光夢車中載日月光芒燭六合占者曰必暴貴月餘武宗崩宣宗即位光以元舅之尊檢校戶部尚書諸衞將軍出為平盧節度使后大中末崩諡曰孝明女學士尚宮宋氏者名若昭貝州清陽人父庭芬世為儒學至庭芬有詞藻生五女皆聰惠庭芬始教以經藝既而課為詩賦年未及笄皆能屬文長曰若莘次曰若昭若倫若憲若荀若莘若昭文尤淡麗性復貞素閑雅不尚紛華之飾嘗白父母誓不從人願以藝學揚名顯親若莘教誨四妹有如嚴師著女論語十篇其言模倣論語以韋逞母宣文君宋氏代仲尼以曹大家等代顏閔其間問答悉以婦道所尚若昭注解皆有理致貞元四年昭義節度使李抱真表薦以聞德宗俱召人宮試以詩賦兼問經史中大義深加賞歎德宗能詩與侍臣唱和相屬亦令若莘姊妹應制每進御無不稱善嘉其節概不羣不以宮妾遇之呼為學士先生庭芬起家受饒州司馬習藝館內敕賜第一區給俸料元和末若莘卒贈河內郡君自貞元七年已後宮中記注簿籍若莘掌其事穆宗復令若昭代司其職拜尚宮姊妹中若昭尤通曉人事自憲穆敬三帝皆呼為先生六宮嬪媛諸王公主駙馬皆師之為之致敬進封梁國夫人寶曆初卒將葬詔所司供鹵簿敬宗復令若憲代司宮籍文宗好文以若憲善屬文能論議奏對尤重之大和中神策中尉王守澄用事委信翼城醫人鄭注賊臣李訓干竊時權訓注惡宰相李宗閔李德裕構宗閔憸邪為吏部侍郎時令駙馬都尉沈通賂於若憲求為宰相文宗怒貶宗閔為潮州司戶柳州司馬幽若憲於外第賜死若憲弟姪女婿等連坐者十三人皆流嶺表李訓敗文宗悟其誣構深惜其才若倫若荀早卒穆宗恭僖皇后王氏越人父紹卿婺州金華令后少入太子宮元和四年生敬宗穆宗皇帝立為妃長慶四年二月尊為皇太后昭愍崇重母族贈紹卿司空后母張氏贈趙國夫人文宗即位之初號寶曆太后大和八年詔伏以皇太后與寶曆太后每有司行遣稱號未分禮式非便稽諸前代詔令所施不斥言太后以宮名為稱今寶曆太后居義安殿宜準故事稱義安太后敬宗郭貴妃父義右威衞將軍長慶末以姿貌選入太子宮敬宗即位為才人生晉王普帝以少年有子復以才人容德冠絕特寵異之贈其父禮部尚書又以兄環為少府少監賜第一區俄冊為貴妃及昭愍遇盜宮闈變起文宗即位尤憐晉王有若己子故貴妃禮遇不衰大和二年晉王薨帝深嗟惜贈曰悼懷太子穆宗貞獻皇后蕭氏福建人初入十六宅為建安王侍者元和四年十月生文宗皇帝寶曆三年正月敬宗遇弒中尉王守澄率兵討賊迎江王即位文宗踐祚之日奉冊曰嗣皇帝臣名言古先哲王之有天下也必以孝敬奉於上慈惠浹於下極誠意以厚人倫思由近以及遠故自家而刑國以臣奉嚴慈之訓承教撫之仁而長樂尚鬱其鴻名內朝未崇於正位則率土臣子懃懃懇懇延頸企踵曷以塞其心乎是用特舉彝章式遵舊典稽首再拜謹上穆宗睿文惠孝皇帝妃尊號曰皇太后伏惟與天合德義申錫慶允釐陰教祗修內則廣六宮之教參十亂之功頤神保和弘覆萬有后因亂去鄉里自入王邸不通家問別時父母已喪有母弟一人文宗以母族鮮親惟舅獨存詔閩越連率於故里求訪有戶部茶綱役人蕭洪自言有姊流落估人趙縝引洪見后姊徐國夫人女壻呂璋夫人亦不能省認俱見太后嗚咽不自勝上以為復得元舅遂拜金吾將軍檢校戶部尚書河陽懷節度使遷檢校左僕射鄜坊節度使先是有自神策兩軍出為方鎮者軍中多資其行裝至鎮三倍償之時有自左軍出為鄜坊者資錢未償而卒于鎮乃徵錢於洪宰相李訓雅知洪詐稱國舅洪懼請訓兄仲京為鄜從事以彌縫之洪恃與訓交不與所償又徵於卒者之子洪俾其子接訴於宰相李訓判絕之左軍中尉仇士良深銜之時有閩人蕭本者復稱太后弟士良以本上聞發洪詐假自鄜坊追洪下獄御史臺按鞠具服其偽詔長流驩州賜死于路趙縝呂璋亦從坐洪以偽敗謂本為真乃拜贊善大夫賜緋龜仍追封其曾祖倰為太保祖聰為太傅父俊為太師賜與鉅萬計本福建人太后有真母弟孱弱不能自達本就之得其家代及內外族屬名諱復士良保任之上亦不疑詐妄本歷衞尉少卿左金吾將軍開成二年福建觀察使唐扶奏得泉州晉江縣人蕭弘狀自稱是皇太后親弟送赴闕庭詔送御史臺按問事皆偽妄詔逐還本貫開成四年昭義節度使劉從諫上章論蕭本偽稱太后弟云今自上及下異口同音皆言蕭弘是真蕭本是偽請追蕭弘赴闕與本證明若含垢於一時終取笑於千古遂詔御史中丞高元裕刑部侍郎孫簡大理卿崔郇三司按弘本之獄具並偽詔曰恭以皇太后族望承齊梁之後僑寓流滯久在閩中慶靈鍾集早歸椒掖終鮮兄弟常所咨嗟朕自臨御已來便遣尋訪冀得諸舅以慰慈顏而姦濫之徒探我情抱因緣州里之近附會祖先之名覬幸我國恩假託我外族蕭洪之惡迹未遠蕭本之覆轍相尋弘之本末尤更乖戾三司推鞫曾無似是之蹤宰臣參驗見其難容之狀文款繼入留中久之朕於視膳之時頻有咨稟恭聞處分惟在真實丐沐墮桑既無可驗鑿空作偽豈得更容據其罪狀合當極法尚為含忍投之荒裔蕭本除名長流愛州蕭弘配流儋州初蕭洪詐稱國舅十數年兩授旄鉞寵貴崇於天下蕭本因士良鄉導發洪之詐聯歷顯榮及從諫奏論偽迹難掩而太后終不獲真弟文宗孝義天然大和中太皇太后居興慶宮寶曆太后居義安殿皇太后居大內時號三宮太后上五日參拜四節獻賀皆由複道幸南內朝臣命婦詣宮門起居上尤執禮造次不失有司嘗獻新苽櫻桃命獻陵寢宗廟之後中使分送三宮十宅初有司送三宮物一例稱賜帝曰物上三宮安得名賜遽取筆塗籍改賜為奉開成中正月望夜帝於咸泰殿陳燈燭奏仙韶樂三宮太后俱集奉觴獻壽如家人禮諸親王公主駙馬戚屬皆侍宴上性恭儉延安公主衣裾寬大即時遣還罰駙馬竇澣兩月賜錢武宗即位供養彌謹蕭太后徙居積慶殿號積慶太后會昌中崩諡曰貞獻穆宗宣懿皇后韋氏武宗昭肅皇帝之母也事闕武宗王賢妃事闕宣宗元昭皇后晁氏懿宗皇帝之母也事闕懿宗惠安皇后王氏僖宗皇帝之母也事闕昭宗積善皇后何氏東蜀人入侍壽王邸婉麗多智特承恩顧生德王輝王昭宗即位立為淑妃乾寧中車駕在華州冊為皇后國家自乾符已後盜滿天下妖生九重宮廟榛蕪奔播不暇景福之際姦臣內侮后於蒙塵薄狩之中嘗膳禦侮不離左右左關右輔之幸時事危迫后消息撫御終獲保全自岐下還京崔胤盡誅黃門宦官每宣諭宰臣但令宮嬪來往是時國命奪於朱氏左右前後皆是汴人宮中動息雖纖芥必聞于朱全忠宮人常懷惴慄帝后垂泣相視天祐初全忠逼遷輿駕東幸洛陽其年八月昭宗遇弒翌日宰相柳璨獨孤損等詐宣皇后令云帝為宮人害輝王祚宜昇帝位仍尊后為皇太后遭罹變故迫以凶威宮中哭泣不敢聲聞于外明年十二月全忠將僭位先行九錫然後受禪全忠牙將蔣玄暉在洛陽宮知樞密與太常卿張廷範私議云山西河北未平禪代無利請俟盪定欲有咨諫宣徽副使趙殷衡素與張蔣不協且欲代知樞密事因使于梁誣告云玄暉私於何太后相與盟詛誓復唐室不欲王受九錫全忠大怒即日遣使至洛陽誅玄暉廷範柳璨等太后亦被害於積善宮又殺宮人阿秋阿虔仍廢太后為庶人贊曰坤德既軌彤管有煒韋武喪邦毒侔蛇虺陰教斯僻嬪風寖毀賢哉長孫母儀何偉
