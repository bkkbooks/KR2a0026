body:
  text: 舊唐書卷一百二列傳第五十二馬懷素褚氍量劉子玄兄知柔子貺餗彙秩迅迥徐堅元行沖吳兢韋述弟逌迪蕭直蕭穎士毋煚殷踐猷附馬懷素潤州丹徒人也寓居江都少師事李善家貧無燈燭晝採薪蘇夜燃讀書遂博覽經史善屬文舉進士又應制舉登文學優贍科拜郿尉四遷左臺監察御史長安中御史大夫魏元忠為張易之所構配徙嶺表太子僕崔貞慎東宮率獨孤褘之餞于郊外易之怒使人誣告貞慎等與元忠同謀則天令懷素按鞫遣中使促迫諷令構成其事懷素執正不受命則天怒召懷素親加詰問懷素奏曰元忠犯罪配流貞慎等以親故相送誠為可責若以為謀反臣豈誣罔神明昔彭越以反伏誅欒布奏事於其尸下漢朝不坐況元忠罪非彭越陛下豈加追送之罪陛下當生殺之柄欲加之罪取決聖衷可矣若付臣推鞫臣敢不守陛下之法則天意解貞慎等由是獲免時夏官侍郎李迥秀恃張易之之勢受納貨賄懷素奏劾之迥秀遂罷知政事懷素纍轉禮部員外郎與源乾曜盧懷慎李傑等充十道黜陟使懷素處事平恕當時稱之使還遷考功員外郎時貴戚縱恣請託公行懷素無所阿順典舉平允擢拜中書舍人開元初為戶部侍郎加銀青光祿大夫纍封常山縣公三遷祕書監兼昭文館學士懷素雖居吏職而篤學手不釋卷謙恭謹慎深為玄宗所禮令與左散騎常侍褚氍量同為侍讀每次閣門則令乘肩輿以進上居別館以路遠則命宮中乘馬或親自送迎以申師資之禮是時祕書省典籍散落條流無懷素上疏曰南齊已前墳籍舊編王儉七志已後著述其數盈多隋志所書亦未詳悉或古書近出前志闕而未編或近人相傳浮詞鄙而猶記若無編録難辨淄澠望括檢近書篇目并前志所遺者續王儉七志藏之祕府上於是召學涉之士國子博士尹知章等分部撰録并刊正經史粗創首尾會懷素病卒年六十上特為之舉哀廢朝一日贈潤州刺史諡曰文褚氍量字弘度杭州鹽官人也幼孤貧勵志好學家近臨平湖時湖中有龍鬬傾里閈就觀之氍量時年十二讀書晏然不動及長尤精三禮及史記舉明經纍除國子博士景龍三年遷國子司業兼修文館學士是歲中宗將親祀南郊詔禮官學士修定儀注國子祭酒祝欽明司業郭山惲皆希旨請以皇后為亞獻氍量獨與太常博士唐紹蔣欽緒固爭以為不可氍量建議曰夫郊祀者明王之盛事國家之大禮行其禮者不可以臆斷不可以情求皆上順天心下符人事欽若稽古率由舊章然後可以交神明可以膺福祐然禮文雖衆莫如周禮周禮者周公致太平之書先聖極由衷之典法天地而行教化辨方位而人倫其義可以幽贊神明其文可以經緯邦國備物致用其可忽乎至如冬至圓丘祭中最大皇后內主禮位甚尊若合郊天助祭則當具著禮典今遍檢周官無此儀制蓋由祭天南郊不以地配唯將始祖為主不以祖妣配天故唯皇帝親行其禮皇后不合預也謹按大宗伯職云若王不與祭祀則攝位注云王有故代行其祭事下文云凡大祭祀王后不與則攝而薦豆籩徹若皇后合助祭承此下文即當云若不祭祀則攝而薦豆籩今於文上更起凡則是別生餘事夫事與上異則別起凡凡者生上起下之名不專繫於本職周禮一部之內此例極多備在文中不可具録又王后助祭親薦豆籩而不徹案九嬪職云凡祭贊后薦徹豆籩注云后進之而不徹則知中徹者為宗伯生文若宗伯攝祭則宗伯親徹不別使人又案外宗掌宗廟之祀王后不與則贊宗伯此之一文與上相證何以明之案外宗唯掌宗廟祭祀不掌郊天足明此文是宗廟祭也案王后行事總在內宰職中檢其職文唯云大祭祀后祼獻則贊瑤爵亦如之鄭注云謂祭宗廟也注所以知者以文云祼獻祭天無祼以此得知又祭天之器則用陶匏亦無瑤爵注以此得知是宗廟也又內司服掌王后六服無祭天之服而巾車職掌王后之五輅亦無后祭天之輅祭天七獻無后亞獻以此諸文參之故知后不合助祭天也唯漢書郊祀志則有天地合祭皇后預享之事此則西漢末代強臣擅朝悖亂彝倫黷神諂祭不經之典事涉誣神故易傳曰誣神者殃及三代太誓曰正稽古立功立事可以永年承天之大律斯史策之良誡豈可不知今南郊禮儀事不稽古忝守經術不敢默然請旁詢碩儒俯托舊典採曲臺之故事行圓丘之正儀使聖朝叶昭曠之塗天下知文物之盛豈不幸甚時左僕射韋巨源等阿旨叶同欽明之議竟不從氍量所奏尋以母老請停官歸侍景雲初玄宗在春宮召拜國子司業兼皇太子侍讀嘗撰翼善記以進之皇太子降書嘉勞賚絹四十匹太極元年皇太子國學親釋奠令氍量講孝經禮記各隨端立義博而且辨觀者歎服焉既畢進授銀青光祿大夫兼賜以章服并綵絹百段玄宗即位遷郯王傅兼國子祭酒尋以師傅恩遷左散騎常侍仍兼國子祭酒封舒國公實封二百戶未幾丁憂解職廬於墓側其所植松柏時有鹿犯之氍量泣而言曰山中衆草不少何忍犯吾先塋樹哉因通夕守護俄有羣鹿馴狎不復侵害氍量因此終身不食鹿肉服闋召拜左散騎常侍復為侍讀以其年老每隨仗出入特許緩行又為造腰輿令內給使輿於內殿氍量頻上書陳時政得失多見納用又嘗手敕褒美賜物二百段氍量以內庫舊書自高宗代即藏在宮中漸致遺逸奏請繕寫刊校以弘經籍之道玄宗令於東都乾元殿前施架排次大加搜寫廣采天下異本數年間四部充備仍引公卿已下入殿前令縱觀焉開元六年駕還又敕氍量於麗正殿以續前功皇太子及郯王嗣直等五人年近十歲尚未就學氍量繕寫論語孝經各五本以獻上覽之曰吾知氍量意氍量遽令選經明篤行之士國子博士郤恆通郭謙光左拾遺潘元祚等為太子及郯王已下侍讀七年詔太子就國子監行齒胄之禮氍量登座説經百僚集觀禮畢賞賜甚厚明年氍量病卒年七十五臨終遺言以麗正寫書未畢為恨上為舉哀廢朝兩日贈禮部尚書諡曰文初氍量與馬懷素俱為侍讀顧待甚厚及量等卒後祕書少監康子元國子博士侯行果等又入侍講雖屢加賞賜而禮遇不逮褚焉劉子玄本名知幾楚州刺史胤之族孫也少與兄知柔俱以詞學知名弱冠舉進士授獲嘉主簿證聖年有制文武九品已上各言時政得失知幾上表陳四事詞甚切直是時官爵僭濫而法網嚴密士類競為趨進而多陷刑戮知幾乃著思慎賦以刺時且以見意鳳閣侍郎蘇味道李嶠見而歎曰陸機豪士所不及也知幾長安中纍遷左史兼修國史擢拜鳳閣舍人修史如故景龍初再轉太子中允依舊修國史時侍中韋巨源紀處訥中書令楊再思兵部尚書宗楚客中書侍郎蕭至忠並監修國史知幾以監修者多甚為國史之弊蕭至忠又嘗責知幾著述無課知幾於是求罷史任奏記於至忠曰僕自策名士伍待罪朝列三為史臣再入東觀竟不能勒成國典貽彼後來者何哉靜言思之其不可者五也何者古之國史皆出自一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉以衆功方云絶筆唯後漢東觀大集羣儒而著述無主條章靡立由是伯度譏其不實公理以為可焚張蔡二子糾之於當代傅范兩家嗤之於後葉今史司取士有倍東京人自以為荀袁家自稱為政駿每欲記一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博原自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討沿革於臺閣簿籍難見雖使尼父再出猶且成其管窺況限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弒也執簡以往而近代史局皆通籍禁門幽居九重欲人不見尋其義者由杜彼顏面防諸請謁故也然今館中作者多士如林皆願長喙無聞舌倘有五始初成一字加貶言未絶口而朝野具知筆未棲毫而搢紳咸誦夫孫盛實録取嫉權門王韶直書見讎貴族人之情也能無畏乎其不可三也古者刊定一史纂成一家體統各殊指歸咸別夫尚書之教也以疏通知遠為主春秋之義也以懲惡勸善為先史記則退處士而進姦雄漢書則抑忠臣而飾主闕斯並曩賢得失之例良史是非之準作者言之詳矣頃史官注記多取稟監修楊令公則云必須直詞宗尚書則云宜多隱惡十羊九牧其事難行一國三公適從焉在其不可四也竊以史置監修雖無古式尋其名號可得而言夫言監者蓋總領之義耳如創紀編年則年有斷限草傳事則事有豐約或可略而不略或應書而不書此失刊削之例也屬詞比事勞逸宜均揮鉛奮墨勤惰須等某帙某篇付之此職某紀某傳歸之此官此銓配之理也斯並宜明立科條審定區域倘人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學苟且務相推避坐變炎涼徒延歲月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議焉得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤勤於課責或云墳籍事重努力用心或云歲序已淹何時輟手竊以綱維不舉而督課徒勤雖威以次骨之刑勗以懸金之賞終不可得也語曰陳力就列不能則止僕所以比者布懷知己歷抵羣公屢辭載筆之官願罷記言之職者正為此耳當今朝號得人國稱多士蓬山之下良直差肩藝閣之中英奇接武僕既功虧刻鵠筆未獲麟徒殫太官之膳虛索長安之米乞以本職還其舊居多謝簡書請避賢路惟明公足下哀而許之至忠惜其才不許解史任宗楚客嫉其正直謂諸史官曰此人作書如是欲置我何地時知幾又著史通子二十卷備論史策之體太子右庶子徐堅深重其書嘗云居史職者宜置此書於座右知幾自負史才常慨時無知己乃委國史於著作郎吳兢別撰劉氏家史十五卷譜考三卷推漢氏為陸終苗裔非堯之後彭城叢亭里諸劉出自宣帝子楚孝王囂曾孫司徒居巢侯劉愷之後不承楚元王交皆按據明白正前代所誤雖為流俗所譏學者服其該博初知幾每云若得受封必以居巢為名以紹司徒舊邑後以修則天實録功果封居巢縣子又鄉人以知幾兄弟六人進士及第文學知名改其鄉里為高陽鄉居巢里景雲中纍遷太子左庶子兼崇文館學士仍依舊修國史加銀青光祿大夫時玄宗在東宮知幾以名音類上名乃改子玄二年皇太子將親釋奠於國學有司草儀注令從臣皆乘馬著衣冠子玄進議曰古者自大夫已上皆乘車而以馬為騑服魏晉已降迄乎隋代朝士又駕牛車歷代經史具有其事不可一二言也至如李廣北征解鞍憩息馬援南伐據鞍顧盼斯則鞍馬之設行於軍旅戎服所乘貴於便習者也按江左官至尚書郎而輒輕乘馬則為御史所彈又顏延之罷官後好騎馬出入閭里當代稱其放誕此則專車憑軾可擐朝衣單馬御鞍宜從褻服求之近古灼然之明驗也自皇家撫運沿革隨時至如陵廟巡謁王公册命則盛服冠履乘彼輅車其士庶有衣冠親迎者亦時以服箱充馭在於他事無復乘車貴賤所行通用鞍馬而已臣伏見比者鑾輿出幸法駕首途左右侍臣皆以朝服乘馬夫冠履而出只可配車而行今乘車既停而冠履不易可謂唯知其一而未知其二也何者褒衣博帶革履高冠本非馬上所施自是車中之服必也襪而升鐙跣以乘鞍非唯不師古道亦自取驚今俗求諸折中進退無可且長裾廣袖襜如翼如鳴珮行組鏘鏘奕奕馳驟於風塵之內出入於旌棨之間倘馬有驚逸人從顛墜遂使屬車之右遺履不收清道之傍絓驂相續固以受嗤行路有損威儀今議者皆云祕閣有梁武帝南郊圖多有危冠乘馬者此則近代故事不得謂無其文臣案此圖是後人所為非當時所撰且觀代間有古今圖畫者多矣如張僧繇畫羣公祖二疏而兵士有著芒屩者閻立本畫明君入胸奴而婦人有著帷帽者夫芒屩出於水鄉非京華所有帷帽創於隋代非漢宮所作議者豈可徵此二畫以為故實者乎由斯而言則梁氏南郊之圖義同於此又傳稱因俗禮貴緣情殷輅周冕規模不一秦冠漢佩用捨無常況我國家道軼百王功高萬古事有不便理資變通其乘馬衣冠竊謂宜從省廢臣懷此異議其來自久日不暇給未及榷揚今屬殿下親從齒胄將臨國學凡有衣冠乘馬皆憚此行所以輒進狂言用申鄙見皇太子手令付外宣行仍編入令以為常式開元初遷左散騎常侍修史如故九年長子貺為太樂令犯事配流子玄詣執政訴理上聞而怒之由是貶授安州都督府別駕子玄掌知國史首尾二十餘年多所撰述甚為當時所稱禮部尚書鄭惟忠嘗問子玄曰自古已來文士多而史才少何也對曰史才須有三長世無其人故史才少也三長謂才也學也識也夫有學而無才亦猶有良田百頃黃金滿籯而使愚者營生終不能致於貨殖者矣如有才而無學亦猶思兼匠石巧若公輸而家無楩柟斧斤終不果成其宮室者矣猶須好是正直善惡必書使驕主賊臣所以知懼此則為虎傅翼善無可加所向無敵者矣脫苟非其才不可叨居史任自敻古已來能應斯目者罕見其人時人以為知言子玄至安州無幾而卒年六十一自幼及長述作不倦朝有論著必居其職預修三教珠英文館詞林姓族系録論孝經非鄭玄注老子無河上公注修唐書實録皆行於代有集三十卷後數年玄宗敕河南府就家寫史通以進讀而善之追贈汲郡太守尋又贈工部尚書諡曰文兄知柔少以文學政事歷荊揚曹益宋海唐等州長史刺史戶部侍郎國子司業鴻臚卿尚書右丞工部尚書東都留守卒贈太子少保諡曰文代傳儒學之業時人以述作名其家子玄子貺餗彙秩迅迥皆知名於時貺博通經史明天文律曆音樂醫算之術終於起居郎修國史撰六經外傳三十七卷續説苑十卷太樂令壁記三卷真人肘後方三卷天官舊事一卷餗右補闕集賢殿學士修國史著史例三卷傳記三卷樂府古題解一卷彙給事中尚書右丞左散騎常侍荊南長沙節度有集三卷秩給事中尚書右丞國子祭酒撰政典三十五卷止戈記七卷至德新議十二卷指要三卷論喪紀制度加籩豆許私鑄錢改制國學事各在本志迅右補闕撰六説五卷迥諫議大夫給事中有集五卷貺子浹滋彙子贊滋貞元中位至宰輔贊觀察使自有傳徐堅西臺舍人齊子也少好學遍覽經史性寬厚長者進士舉纍授太子文學聖曆中車駕在三陽宮御史大夫楊再思太子左庶子王方慶為東都留守引堅為判官表奏專以委之方慶善三禮之學每有疑滯常就堅質問堅必能徵舊説訓釋詳明方慶深善之又賞其文章典實常稱曰掌綸誥之選也再思亦曰此鳳閣舍人樣如此才識走避不得堅又與給事中徐彥伯定王府倉曹劉知幾右補闕張説同修三教珠英時麟臺監張昌宗及成均祭酒李嶠總領其事廣引文詞之士日夕談論賦詩聚會歷年未能下筆堅獨與説構意撰録以文思博要為本更加姓氏親族二部漸有條流諸人依堅等規制俄而書成遷司封員外郎則天又令堅刪改唐史會則天遜位而止神龍初再遷給事中時雍州人韋月將上書告武三思不臣之迹反為三思所陷中宗即令殺之時方盛夏堅上表曰月將誣構良善故違制命準其情狀誠合嚴誅但今朱夏在辰天道生長即從明戮有乖時令謹按月令夏行秋令則丘隰水潦禾稼不熟陛下誕膺靈命中興聖圖將弘羲軒之風以光史策之美豈可非時行戮致傷和氣哉君舉必書將何以訓伏願詳依國典許至秋分則知恤刑之規冠於千載哀矜之惠洽乎四海中宗納堅所奏遂令決杖配流嶺表睿宗即位堅自刑部侍郎加銀青光祿大夫拜左散騎常侍俄轉黃門侍郎時監察御史李知古請兵以擊姚州西二河蠻既降附又請築城重征稅之堅以蠻夷生梗可以羈縻屬之未得同華夏之制勞師涉遠所損不補所獲獨建議以為不便睿宗不從令知古發劍南兵往築城將以列置州縣知古因是欲誅其豪傑沒子女以為奴婢蠻衆恐懼乃殺知古相率反叛役徒奔潰姚巂路由是歷年不通堅妻即侍中岑羲之妹堅以與羲近親固辭機密乃轉太子詹事謂人曰非敢求高蓋避難也及羲誅堅竟免深纍出為絳州刺史五轉復入為祕書監開元十三年再遷左散騎常侍其年玄宗改麗正書院為集賢院以堅為學士副張説知院事纍封東海郡公以修東封儀注及從升太山之功特加光祿大夫堅多識典故前後修撰格式氏族及國史等凡七入書府時論美之十七年卒年七十餘上深悼惜之遣中使就家弔內出絹布以賵之贈太子少保諡曰文堅長姑為太宗充容次姑為高宗婕妤並有文藻堅父子以詞學著聞議者方之漢世班氏元行沖河南人後魏常山王素連之後也少孤為外祖司農卿韋機所養博學多通尤善音律及詁訓之書舉進士纍轉通事舍人納言狄仁傑甚重之行沖性不阿順多進規誡嘗謂仁傑曰下之事上亦猶蓄聚以自資也譬貴家儲積則脯臘胰以供滋膳參朮芝桂之防疴疾伏想門下賓客堪充旨味者多願以小人備一藥物仁傑笑而謂人曰此吾藥籠中物何可一日無也九遷至陝州刺史兼隴右關內兩道按察使未行拜太常少卿行沖以本族出於後魏而未有編年之史乃撰魏典三十卷事詳文簡為學者所稱初魏明帝時河西柳谷瑞石有牛繼馬後之象魏收舊史以為晉元帝是牛氏之子冒姓司馬以應石文行沖推尋事迹以後魏昭成帝名犍繼晉受命考校謠讖特著論以明之開元初自太子詹事出為岐州刺史又充關內道按察使行沖自以書生不堪搏擊之任固辭按察乃以寧州刺史崔琬代焉俄復入為右散騎常侍東都副留守時嗣彭王志庶兄志謙被人誣告謀反考訊自誣繫獄待報連坐十數人行沖察其冤濫並奏原之四遷大理卿時揚州長史李傑為侍御史王旭所陷詔下大理結罪行沖以傑歷政清貞不宜枉為讒邪所構又奏請從輕條出之當時雖不見從深為時論所美俄又固辭刑獄之官求為散職七年復轉左散騎常侍九遷國子祭酒月餘拜太子賓客弘文館學士纍封常山郡公先是祕書監馬懷素集學者續王儉今書七志左散騎常侍褚量於麗正殿校寫四部書事未就而懷素量卒詔行沖總代其職於是行沖表請通撰古今書目名為羣書四録命學士鄠縣尉毋煚櫟陽尉韋述曹州司法參軍殷踐猷太學助教余欽等分部修檢歲餘書成奏上之上又特令行沖撰御所注孝經疏義列於學官尋以衰老罷知麗正殿校寫書事初有左衛率府長史魏光乘奏請行用魏徵所注類禮上遽令行沖集學者撰義疏將立學官行沖於是引國子博士范行恭四門助教施敬本檢討刊削勒成五十卷十四年八月奏上之尚書左丞相張説駁奏曰今之禮記是前漢戴德戴聖所編録歷代傳習已向千年著為經教不可刊削至魏孫炎始改舊本以類相比有同抄書先儒所非竟不行用貞觀中魏徵因孫炎所修更加整比兼為之注先朝雖厚加賞錫其書竟亦不行今行沖等解徵所注勒成一家然與先儒第乖章句隔絶若欲行用竊恐未可上然其奏於是賜行沖等絹二百匹留其書貯於內府竟不得立於學官行沖恚諸儒排己退而著論以自釋名曰釋疑其詞曰客問主人曰小戴之學行之已久康成銓注見列學官傳聞魏公乃有刊易又承制旨造疏將頒未悉二經孰為優劣主人答曰小戴之禮行於漢末馬融注之時所未覩盧植分合二十九篇而為説解代不傳習鄭因子幹師於季長屬黨錮獄起師門道喪康成於竄伏之中理紛拏之典志存探究靡所咨謀而猶緝述忘疲聞義能徙具於鄭志向有百科章句之徒曾不窺覽猶遵覆轍頗類刻舟王肅因之重茲開釋或多改駁仍按本篇又鄭學之徒有孫炎者雖扶玄義乃易前編自後條例支分針石間起馬胄增革向踰百篇葉遵刪修僅全十二魏公病羣言之錯雜紬衆説之精深經文不同未敢刊正注理睽誤寧不芟礱成畢上聞太宗嘉賞賚縑千匹録賜儲藩將期頒宣未有疏義聖皇纂業耽古崇儒高曾規矩宜所修襲乃制昏愚甄分舊義其有注移往説理變新文務加搜窮積稔方畢具録呈進敕付羣儒庶能斟詳以課疏密豈悟章句之士堅持昔言特嫌知新賣心欲仍舊貫沉疑多月擯壓不申優劣短長定於通識手成口答安敢銓量客曰當局稱迷傍觀見審纍朝銓定故是周詳何所為疑不為申列答曰是何言歟談豈容易昔孔安國注壁中書會巫蠱事經籍道息族兄臧與之書曰相如常忿俗儒淫詞冒義欲撥亂反正而未能果然雅達通博不代而生浮學守株比肩皆是衆非難正自古而然誠恐此道未申而以獨智為議也則知變易章句其難一矣漢有孔季産者專於古學有孔扶者隨俗浮沉扶謂産云今朝廷皆為章句內學而君獨修古義修古義則非章句內學非章句內學則危身之道也獨善不容於代必將貽患禍乎則知變易章句其難二矣劉歆以通書屬文待詔官署見左氏傳而大好之後蒙親近欲建斯業哀帝欣納令其討論各遷延推辭不肯置對劉歆移書責讓其言甚切諸博士等皆忿恨之名儒龔勝時為光祿見歆此議乃乞骸骨司空師丹因大發怒奏歆改亂前志非毀先朝所立帝曰此廣道術何為毀耶由是犯忤大臣懼誅求出為河南太守宗室不典三河又徙五原太守以君賓之著名好學仲公之深博守道猶迫同門朋黨之議卒令子駿負謗於時則知變易章句其難三矣子雍規玄數十百件守鄭學者時有中郎馬昭上書以為肅繆詔王學之輩占答以聞又遣博士張融案經論詰融登召集分別推處理之是非具聖證論王肅酬對疲於歲時則知變易章句其難四矣卜商疑聖納誚於曾輿木賜近賢貽嗤於武叔自此之後唯推鄭公王粲稱伊洛已東淮漢之北一人而已莫不宗焉咸云先儒多闕鄭氏道備粲竊嗟怪因求其學得尚書注退而思之以盡其意意皆盡矣所疑之者猶未喻焉凡有兩卷列於其集又王肅改鄭六十八條張融核之將定臧否融稱玄注泉深廣博兩漢四百餘年未有偉於玄者然二郊之祭殊天之祀此玄誤也其如皇天祖所自出之帝亦玄慮之失也及服虔釋傳未免差違後代言之思弘聖意非謂揚己之善掩人之名也何者君子用心願聞其過故仲尼曰過也人皆見之更也人皆仰之是也而專門之徒恕己及物或攻先師之誤如聞父母之名將謂亡者之德言而見壓於重壤也故王劭史論曰魏晉浮華古道夷替洎王肅杜預更開門戶歷載三百士大夫恥為章句唯草野生以專經自許不能究覽異義擇從其善徒欲父康成兄子慎寧道孔聖誤諱聞鄭服非然於鄭服甚憒憒鄭服之外皆讎也則知變易章句其難五也伏以安國尚書劉歆左傳悉遭擯於曩葉咸見重於來今故知二人之鑒高於漢廷遠矣孔季産云物極則變比及百年外當有明直君子恨不與吾同代者於戲道之行廢必有其時者歟僕非專經罕習章句高名不著易受輕誣頃者修撰殆淹年月賴諸賢輩能左右之免致愆尤仍叨賞賚內省昏朽其榮已多何遽持一己之區區抗羣情之噂捨勿矜之美成自我之私觸近名之誡興犯衆之禍一舉四失中材不為是用韜聲甘此沉默也行沖俄又纍表請致仕制許之十七年卒年七十七贈禮部尚書諡曰獻吳兢汴州浚儀人也勵志勤學博通經史宋州人魏元忠亳州人朱敬則深器重之及居相輔薦兢有史才堪居近侍因令直史館修國史纍月拜右拾遺內供奉神龍中遷右補闕與韋承慶崔融劉子玄撰則天實録成轉起居郎俄遷水部郎中丁憂還鄉里開元三年服闋抗疏言曰臣修史已成數十卷自停職還家匪忘紙札乞終餘功乃拜諫議大夫依前修史俄兼修文館學士歷衛尉少卿左庶子居職殆三十年事簡要人用稱之末年傷於太簡國史未成十七年出為荊州司馬制許以史稿自隨中書令蕭嵩監修國史奏取兢所撰國史得六十五卷纍遷台洪饒蘄四州刺史加銀青光祿大夫遷相州長史封襄垣縣子天寶初改官名為鄴郡太守入為恆王傅兢嘗以梁陳齊周隋五代史繁雜仍別撰梁齊周史各十卷陳史五卷隋史二十卷又傷疏略兢雖衰耗猶希史職而行步傴僂李林甫以其年老不用天寶八年卒於家時年八十餘兢卒後其子進兢所撰唐史八十餘卷事多紕繆不逮於壯年兢家聚書頗多嘗目録其卷第號吳氏西齋書目韋述司農卿弘機曾孫也父景駿房州刺史述少聰敏篤志文學家有書二千卷述為兒童時記覽皆遍人駭異之景龍中景駿為肥鄉令述從父至任洺州刺史元行沖景駿之姑子為時大儒常載書數車自隨述入其書齋忘寢與食行沖異之引與之談貫穿經史事如指掌探賾奧旨如遇師資又試以綴文操牘便就行沖大悅引之同榻曰此吾外家之寶也舉進士西入關時述甚少儀形眇小考功員外郎宋之問曰韋學士童年有何事業述對曰性好著書述有所撰唐春秋三十卷恨未終篇至如詞策仰待明試之問曰本求異才果得遷固是歲登科開元五年為櫟陽尉祕書監馬懷素受詔編次圖書乃奏用左散騎侍元行沖左庶子齊浣祕書少監王珣衛尉少卿吳兢並述等二十六人同於祕閣詳録四部書懷素尋卒行沖代掌其事五年而成其總目二百卷述好譜學祕閣中見常侍柳沖先撰姓族系録二百卷述於分課之外手自抄録暮則懷歸如是周歲寫録皆畢百氏源流轉益詳悉乃於柳録之中別撰成開元譜二十卷其篤志忘倦皆此類也轉右補闕中書令張説專集賢院事引述為直學士遷起居舍人説重詞學之士述與張九齡許景先袁暉趙冬曦孫逖王翰常遊其門趙冬曦兄冬日弟和壁居貞安貞頤貞等六人述弟迪逌禋㪺巡亦六人並詞學登科説曰趙韋昆季今之杞梓也十八年兼知史官事轉屯田員外郎職方吏部二郎中學士知史官事如故及張九齡為中書令即集賢之同職裴耀卿為侍中即述之舅皆相推重語必移晷二十七年轉國子司業停知史事俄而復兼史職充集賢學士天寶初歷左右庶子加銀青光祿大夫九載兼充禮儀使其載遷尚書工部侍郎封方城縣侯述在書府四十年居史職二十年嗜學著書手不釋卷國史自令狐德棻至於吳兢雖纍有修撰竟未成一家之言至述始定類例補遺續闕勒成國史一百一十三卷並史例一卷事簡而記詳雅有良史之才蘭陵蕭穎士以為譙周陳壽之流述早以儒術進當代宗仰而純厚長者淡於勢利道之同者無間貴賤皆禮接之家聚書二萬卷皆自校定鉛槧雖御府不逮也兼古今朝臣圖歷代知名人畫魏晉已來草隸真迹數百卷古碑古器藥方格式錢譜璽譜之類當代名公尺題無不畢備及祿山之亂兩京陷賊玄宗幸蜀述抱國史藏於南山經籍資産焚剽殆盡述亦陷於賊庭授偽官至德二年收兩京三司議罪流於渝州為刺史薛舒困辱不食而卒其甥蕭直為太尉李光弼判官廣德二年直因入奏言事稱旨乃上疏理述於蒼黃之際能存國史致聖朝大典得無遺逸以功補過合霑恩宥乃贈右散騎常侍議者云自唐已來氏族之盛無踰於韋氏其孝友詞學承慶嗣立為最明於音律則萬石為最達於禮儀則叔夏為最史才博識以述為最所撰唐職儀三十卷高宗實録三十卷御史臺記十卷兩京新記五卷凡著書二百餘卷皆行於代逌學業亦亞於述尤精三禮與述對為學士迪同為禮官時人榮之纍遷考功員外郎國子司業以風疾卒蕭穎士者聰俊過人富詞學有名於時賈曾席豫張及述皆引為談客開元二十三年登進士第考功員外郎孫逖稱之於朝褊躁無威儀與時不偶前後五授官旋即駁落乾元初終於揚府功曹述在祕閣時與鄠縣尉毋煚曹州司法殷踐猷並友善二人相次卒踐猷申州刺史仲容從子明班史通於族姓子寅有至性早孤事母以孝聞應宏詞舉為永寧尉史臣曰前代文學之士氣一矣然以道義偶乖遭遇斯難馬懷素褚量好古嗜學博識多聞遇好文之君隆師資之禮儒者之榮可謂際會矣劉徐等五公學際天人才兼文史俾西垣東觀一代粲然蓋諸公之用心也然而子玄鬱結於當年行沖倣徨於極筆官不過俗吏寵不逮常才非過使然蓋此道非趨時之具也其窮也宜哉贊曰學者如市博通甚難文士措翰典麗惟艱馬褚兢述徐元子玄文學之書胡寧比焉
