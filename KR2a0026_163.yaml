body:
  text: 舊唐書卷一百五十九列傳第一百九衛次公子洙鄭絪子秪德秪德子皓韋處厚崔羣路隨父泌衛次公字從周河東人器韻和雅弱冠舉進士禮部侍郎潘炎目為國器擢居上第參選調吏部侍郎盧翰嘉其才補崇文館校書郎改渭南尉次公善鼓琴京兆尹李齊運使其子交歡意欲次公授之琴次公拒之由是終身未嘗操絃嚴震之鎮興元辟為從事授監察轉殿中侍御史貞元八年徵為左補闕尋兼翰林學士二十一年正月德宗升遐時東宮疾恙方甚倉卒召學士鄭絪等至金鑾殿中人或云內中商量所立未定衆人未對次公遽言曰皇太子雖有疾地居冢嫡內外繫心必不得已當立廣陵王若有異圖禍難未已絪等隨而唱之衆議方定及順宗在諒暗外有王叔文輩操權樹黨無復經制次公與鄭絪同處內廷多所匡正轉司勳員外郎久之以本官知制誥賜紫金魚袋仍為學士權知中書舍人尋知禮部貢舉斥浮華進貞實不為時力所搖真拜中書舍人仍充史館修撰遷兵部侍郎知制誥復兼翰林學士與鄭絪善會鄭絪罷相次公左授太子賓客改尚書右丞兼判戶部事拜陝虢等州都防禦觀察處置等使請蠲錢三百萬人得蘇息政聞于朝徵為兵部侍郎選人李績徐有功之孫名在黜中次公召而謂之曰子之祖先勳在王府豈限常格並優秩而遣之改尚書左丞恩顧頗厚上方命為相已命翰林學士王涯草詔時淮夷宿兵歲久次公纍疏請罷會有捷書至相詔方出憲宗令追之遂出為淮南節度使檢校工部尚書兼揚州大都督府長史御史大夫元和十三年十月受代歸朝道次病卒贈太子少保年六十六諡曰敬次公自少入仕歷大僚節操趨尚始終如一為衆推重子洙登進士第尚憲宗女臨真公主纍官至給事中駙馬都尉工部侍郎鄭絪字文明父羡池州刺史絪少有奇志好學善屬文大曆中有儒學高名如張參蔣乂楊綰常衮皆相知重絪擢進士第登宏詞科授祕書省校書郎鄠縣尉張延賞鎮西川辟為書記入除補闕起居郎兼史職無幾擢為翰林轉司勳員外郎知制誥德宗朝在內職十三年小心兢謙上遇之頗厚貞元末德宗晏駕順宗初即位遺詔不時宣下絪與同列衛次公密申正論中人不敢違及王伾王叔文朋黨擅權之際絪又能守道中立憲宗監國遷中書舍人依前學士俄拜中書侍郎平章事加集賢殿大學士轉門下侍郎宏文館大學士憲宗初勵精求理絪與杜黃裳同當國柄黃裳多所關決首建議誅惠琳斬劉闢及他制置絪謙默多無所事由是貶秩為太子賓客出為嶺南節度觀察等使廣州刺史檢校禮部尚書以廉政稱為工部尚書轉太常卿又為同州刺史長春宮使改東都留守入歷兵部尚書旋為河中節度使大和二年入為御史大夫檢校左僕射兼太子少保絪以文學進恬淡踐歷華顯出入中外者踰四十年所居雖無赫奕之稱而守道敦篤耽悅墳典與當時博聞好古之士為講論名理之游時人皆仰其耆德焉及文宗即位以年力衰耄纍表陳乞遂以太子太傅致仕三年十月卒年七十八贈司空諡曰宣子秪德秪德子皓登進士第結綬弘文館校書遷右拾遺內供奉詔授銀青光祿大夫遷起居郎尚宣宗女萬壽公主拜駙馬都尉歷尚書郎給事中禮部侍郎典貢士二年振拔滯才至今稱之遷刑部吏部侍郎大中十三年檢校禮部尚書河南尹皓居戚里有器度大中時恩澤無對及宣宗棄代追感恩遇嘗為詩序曰去年壽昌節赴麟德殿上壽回于長興里第昏然晝寢夢與十數人納涼於別館館宇蕭灑相與聯句豫為數聯同遊甚稱賞既寤不全記諸聯唯省十字云石門霧露白玉殿莓苔青乃書之于楹私怪語不祥不敢言於人不數日宣宗不豫廢朝會及宮車上仙方悟其事追惟顧遇續石門之句為十韻云間歲流虹節歸軒出禁扃奔波陶畏景蕭灑夢殊庭境象非曾到崇嚴昔未經日車烏斂翼風動鶴飄翎異苑人爭集涼臺筆不停石門霧露白玉殿莓苔青若匪災先兆何當思入冥御爐虛仗馬華蓋負云亭白日成千古金縢閟九齡小臣哀絶筆湖上泣青萍未幾皓亦卒韋處厚字德載京兆人父萬監察御史為荊南節度參謀處厚本名淳避憲宗諱改名處厚幼有至性事繼母以孝聞居父母憂廬於墓次既免喪遊長安通五經博覽史籍而文思贍逸元和初登進士第應賢良方正擢居異等授祕書省校書郎裴以宰相監修國史奏以本官充直館改咸陽縣尉遷右拾遺並兼史職修德宗實録五十卷上之時稱信史轉左補闕禮部考功二員外早為宰相韋貫之所重時貫之以議兵不合旨出官處厚坐友善出為開州刺史入拜戶部郎中俄以本官知制誥穆宗以其學有師法召入翰林為侍講學士換諫議大夫改中書舍人侍講如故時張平叔以便佞詼諧他門捷進自京兆少尹為鴻臚卿判度支不數月宣授戶部侍郎平叔以征利中穆宗意欲希大任以榷鹽舊法為弊年深欲官自糶鹽可富國強兵勸農積貨疏利害十八條詔下其奏令公卿議處厚抗論不可以平叔條奏不周經慮未盡以為利者返害為簡者至煩乃取其條目尤不可者發十難以詰之時平叔傾巧有恩自謂言無不允及處厚條件駁奏穆宗稱善令示平叔平叔詞屈無以答其事遂寢處厚以幼主荒怠不親政務既居納誨之地宜有以啓導性靈乃銓擇經義雅言以類相從為二十卷謂之六經法言獻之錫以繒帛銀器仍賜金紫以憲宗實録未成詔處厚與路隨兼充史館修撰實録未成許二人分日入內仍放常參處厚俄又權兵部侍郎敬宗嗣位李逢吉用事素惡李紳乃構成其罪禍將不測處厚與紳皆以孤進同年進士心頗傷之乃上疏曰臣竊聞朋黨議論以李紳貶黜尚輕臣受恩至深職備顧問事關聖聽不合不言紳先朝奬用擢在翰林無過可書無罪可戮今羣黨得志讒嫉大興詢於人情皆甚歎駭詩云萋兮菲兮成是貝錦彼譖人者亦已太甚又曰讒言罔極交亂四國自古帝王未有遠君子近小人而致太平者古人云三年無改於父之道可謂孝矣李紳是前朝任使縱有罪愆猶宜洗釁滌瑕念舊忘過以成無改之美今逢吉門下故吏遍滿朝行侵毀加誣何詞不有所貶如此猶為太輕蓋曾參有投杼之疑先師有拾塵之戒伏望陛下斷自聖慮不惑奸邪則天下幸甚建中之初山東向化只緣宰相朋黨上負朝廷楊炎為元載復讎盧嵵為劉晏報怨兵連禍結天下不平伏乞聖明察臣愚懇帝悟其事紳得減死貶端州司馬處厚正拜兵部侍郎謝恩於思政殿時昭愍狂恣屢出畋遊每月坐朝不三四日處厚因謝從容奏曰臣有大罪伏乞面首帝曰何也處厚對曰臣前為諫官不能先朝死諫縱先聖好畋及色以至不壽臣合當誅然所以不死諫者亦為陛下此時在春宮年已十五今則陛下皇子始一歲矣臣安得更避死亡之誅上深感悟其意賜錦綵一百匹銀器四事寶曆元年四月羣臣上尊號御殿受冊肆赦李逢吉以李紳之故所撰赦文但云左降官已經量移者與量移不言未量移者蓋欲紳不受恩例處厚上疏曰伏見赦文節目中左降官有不該恩澤者在宥之體有所未弘臣聞物議皆言逢吉恐李紳量移故有此節若如此則應是近年流貶官因李紳一人皆不得量移事體至大豈敢不言李紳先朝奬任曾在內廷自經貶官未蒙恩宥古人云人君當記人之功忘人之過管仲拘囚齊桓舉為國相冶長縲紲仲尼選為密親有罪猶宜滌蕩無辜豈可終纍況鴻名大號冊禮重儀天地百靈之所鑒臨億兆八紘之所瞻戴恩澤不廣實非所宜臣與逢吉素無讎嫌與李紳本非親黨所論者全大體所陳者在至公伏乞聖慈察臣肝膽倘蒙允許仍望宣付宰臣應近年左降官並編入赦條令準舊例得量移近處帝覽奏深悟其事乃追改赦文紳方霑恩例處厚為翰林承旨學士每立視草愜會聖旨常奉急命於宣州徵鷹鷙及楊益兩浙索奇文綾綿皆抗疏不奉命且引前時赦書為證帝皆可其奏寶曆季年急變中起文宗底綏內難詔命將降未有所定處厚聞難奔赴昌言曰春秋之法大義滅親內惡必書以明逆順正名討罪於義何嫌安可依違有所避諱遂奉藩教行焉是夕詔命制置及踐祚禮儀不暇責所司皆出於處厚之議及禮行之後皆叶舊章以佐命功旋拜中書侍郎同中書門下平章事監修國史加銀青光祿大夫進爵靈昌郡公處厚在相位務在濟時不為身計中外補授咸得其宜初貞元中宰相齊抗奏減冗員罷諸州別駕其在京百司當入別駕者多處之朝列元和以來兩河用兵偏裨立功者往往擢在周行率以儲寀王官雜補之皆盛服趨朝朱紫填擁久次當進及受代間居者常數十人趨中書及宰相私第摩肩候謁繁於辭語及處厚秉政復奏置六雄十望十緊三十四州別駕以處之而清流不雜朝政清肅文宗勤於聽政然浮於決斷宰相奏事得請往往中變處厚常獨論奏曰陛下不以臣等不肖用為宰相參議大政凡有奏請初蒙聽納尋易聖懷若出自宸衷即示臣等不信若出於橫議臣等何名鼎司且裴度元勳宿德歷輔四朝孜孜竭誠人望所屬陛下固宜親重竇易直良厚忠事先朝陛下固當委信微臣才薄首蒙陛下擢用非出他門言既不從臣宜先退即趨下再拜陳乞上矍然曰何至此耶卿之志業朕素自知登庸作輔百職斯舉縱朕有所失安可遽辭以彰吾薄德處厚謝之而去出延英門復令召還謂曰凡卿所欲言並宜啓論處厚因對彰善疸惡歸之法制凡數百言又裴度勳高望重為人盡心切直宜久任可壯國威帝皆聽納自是宰臣敷奏人不敢橫議俄而滄州李同捷叛朝廷加兵魏博史憲誠中懷向背裴度以宿舊自任待憲誠於不疑嘗遣親吏請事至中書處厚謂曰晉公以百口於上前保爾使主處厚則不然但仰俟所為自有朝典耳憲誠聞之大懼自此輸竭竟有功於滄州又嘗以理財制用為國之本撰大和國計二十卷以獻李載義纍破滄鎮兩軍兵士每有俘執多遣刳剔處厚以書喻之載義深然其旨自此滄鎮所獲生口配隸遠地前後全活數百千人處厚居家循易如不克任至於廷諍敷啓及馭轄待胥吏徑確嶷然不可奪質狀非魁偉如甚懦者而庶僚請事畏惕相顧雖與語移晷不敢私謁急於用才酷嗜文學嘗病前古有以浮議坐廢者故推擇羣材往往棄瑕録用亦為時所譏雅信釋氏因果晚年尤甚聚書踰萬卷多手自刊校奉詔修元和實録未絶筆其統例取捨皆處厚創起焉大和二年十二月因延英奏對造膝之際忽奏臣病作遽退文宗命中官扶出歸第一夕而卒年五十六贈司空處厚當國柄二周歲啓沃之謀頗叶時譽咸共惜之崔羣字敦詩清河武城人山東著姓十九登進士第又制策登科授祕書省校書郎纍遷右補闕元和初召為翰林學士歷中書舍人羣在內職常以讜言正論聞於時憲宗嘉賞降宣旨云自今後學士進狀並取崔羣連署然後進來羣以禁密之司動為故事自爾學士或惡直醜正則其下學士無由上言羣堅不奉詔三疏論奏方允元和七年惠昭太子薨穆宗時為遂王憲宗以澧王居長又多內助將建儲二命羣與澧王作讓表羣上言曰大凡己合當之則有陳讓之儀己不合當因何遽有讓表今遂王嫡長所宜正位青宮竟從其奏時魏博節度使田季安進絹五千匹充助修開業寺羣以為事實無名體尤不可請止其所進羣前後所論多愜旨無不聽納遷禮部侍郎選拔才行咸為公當轉戶部侍郎十二年七月拜中書侍郎同中書門下平章事十四年誅李師道上顧謂宰臣曰李師古雖自襲祖父然朝廷待之始終其妻於師道即嫂叔也雖云逆族若量罪輕重亦宜降等又李宗奭雖抵嚴憲其情比之大逆亦有不同其妻士族也今與其子女俱在掖廷於法皆似稍深卿等留意否羣對曰聖情仁惻罪止元凶其妻近屬倘獲寬宥實合弘煦之道於是師古妻裴氏女宜娘詔出於鄧州安置宗奭妻韋氏及男女先沒掖廷並釋放其奴婢資貨皆復賜之又鹽鐵福建院官權長孺坐贓詔付京兆府決殺長孺母劉氏求哀於宰相羣因入對言之憲宗愍其母耄年乃曰朕將屈法赦長孺何如羣曰陛下仁惻即赦之當速令中使宣諭如待正敕即無及也長孺竟得免死長流羣之啓奏平恕多此類也時憲宗急於蕩寇頗奬聚斂之臣故藩府由是希旨往往捃拾目為進奉處州刺史苗稷進羡餘錢七千貫羣議以為違詔受之則失信於天下請却賜本州代貧下租稅時論美之度支使皇甫鎛陰結權幸以求宰相羣纍疏其奸邪嘗因對面論語及天寶開元中事羣曰安危在出令存亡繫所任玄宗用姚崇宋璟張九齡韓休李元紘杜暹則理用林甫楊國忠則亂人皆以天寶十五年祿山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡專任奸臣李林甫理亂自此已分矣用人得失所繫非小詞意激切左右為之感動鎛深恨之而憲宗終用鎛為宰相無何羣臣議上尊號皇甫鎛欲加孝德兩字羣曰有睿聖則孝德在其中矣竟為鎛所構憲宗不樂出為湖南觀察都團練使穆宗即位徵拜吏部侍郎召見別殿謂羣曰我升儲位知卿為羽翼羣曰先帝之意元在陛下頃者授陛下淮西節度使臣奉命草制且曰能辨南陽之牘允符東海之貴若不知先帝深旨臣豈敢輕言數日拜御史中丞浹旬授檢校兵部尚書兼徐州刺史武寧軍節度徐泗濠觀察等使初幽鎮逆命詔授沂州刺史王智興為武寧軍節度副使領徐州兵討伐羣以智興早得士心表請因授智興旄鉞竟寢不報智興自河北回戈城內皆是父兄開關延入羣為智興所逐朝廷坐其失守授祕書監分司東都未幾改華州刺史兼御史大夫復改宣州刺史歙池等州都團練觀察等使徵拜兵部尚書久之改檢校吏部尚書江陵尹荊南節度觀察使踰歲改檢校右僕射兼太常卿大和五年拜檢校左僕射兼吏部尚書六年八月卒年六十一冊贈司空羣有沖識精裁為時賢相清議以儉素之節其終不及厥初羣年未冠舉進士陸贄知舉訪於梁肅議其登第有才行者肅曰崔羣雖少年他日必至公輔果如其言羣弟于登進士官至郎署有令名子充亦以文學進歷三署終東都留守路隨字南式其先陽平人高祖節高宗朝為越王府東閣祭酒曾祖惟恕官至睦州刺史祖俊之仕終太子通事舍人父泌字安期少好學通五經尤嗜詩易左氏春秋能諷其章句皆究深旨博涉史傳工五言詩性端亮寡言以孝悌聞於宗族建中末以長安尉從調與李益韋綬等書判同居高第泌授城門郎屬德宗違難奉天泌時在京師棄妻子潛詣行在所又從幸梁州排潰軍而出再為流矢所中裂裳濡血以策說渾瑊瑊深重之辟為從事瑊討懷光纍奏為副元帥判官檢校戶部郎中兼御史中丞河中平隨瑊與吐蕃會盟于平涼因劫盟陷蕃在絶域纍年棲心於釋氏之教為贊普所重待以賓禮卒於戎鹿貞元十九年吐蕃遺邊將書求和隨哀泣上疏願允其請表三上德宗命中使諭旨朝廷懲其宿詐俟更要於後信訖數歲不報元和中蕃使復款塞隨復五獻封章請修和好又上書於宰執哀訴裴李藩皆協力敷奏憲宗可之命祠部郎中徐復報聘乃特於詔中疏平涼陷蕃者名氏令歸中國吐蕃因復等還遣使來朝遂以泌及鄭叔矩之喪與銘及遺録至朝野傷歎憲宗憫之贈絳州刺史賜絹二百匹至葬日委所在官給喪事泌纍贈太子少保泌陷蕃之歲隨方在孩提後稍長成知父在蕃乃日夜啼號坐必西嚮饌不食肉母氏言其形貌肖先君遂終身不照鏡後以通經調授潤州參軍為李錡所困使知市事隨翛然坐市中一不介意韋夏卿為東都留守聞而辟之由是聲名日振元和五年邊吏以訃至隨居喪益以孝聞服闋擢拜左補闕會李絳諷上納諫憲宗皇帝曰諫官路隨韋處厚章疏相繼朕常深用其言自是識者敬伏焉俄遷起居郎轉司勳員外郎自補闕至司勳員外皆充史館修撰穆宗即位遷司勳郎中賜緋魚袋與韋處厚同入翰林為侍講學士採三代皇王興衰著六經法言二十卷奏之拜諫議大夫依前侍講學士將修憲宗實録復命兼充史職敬宗登極拜中書舍人翰林學士仍賜紫有以金帛謝除制者必叱而却之曰吾以公事接私財耶終無所納文宗即位韋處厚入相隨代為承旨轉兵部侍郎知制誥大和二年處厚薨隨代為相拜中書侍郎加監修國史初韓愈撰順宗實録說禁中事頗切直內官惡之往往於上前言其不實纍朝有詔改修及隨進憲宗實録後文宗復令改正永貞時事隨奏曰臣昨面奉聖旨以順宗實録頗非詳實委臣等重加刊正畢日聞奏臣自奉宣命取史本欲加筆削近見衛尉卿周居巢諫議大夫王彥威給事中李固言史官蘇景胤等各上章疏具陳刊改非甚便宜又聞班行如此議論頗衆臣伏以史冊之作勸誡所存事有當書理宜歸實匹夫美惡尚不可誣人君得失無容虛載聖旨以前件實録記貞元末數事稍非托實蓋出傳聞審知差舛便令刊正頃因坐日屢形聖言通計前後至于數四臣及宗閔僧孺亦以永貞已來歲月至近禁中行事在外固難詳知陛下所言皆是接於耳目既聞乖謬因述古今引前史直不疑盜嫂之言及第五倫撾公之說皆多此比類難盡信書所冀睿鑒詳於聽言深宮慎於行事持此比類上開聰明特蒙降察稍恕前謬由是近垂宣命令有改修臣等伏以貞觀已來纍朝實録有經重撰不敢固辭但欲粗刪深誤亦固盡存諸說宗閔僧孺相與商量緣此書成於韓愈今史官李漢蔣係皆愈之子壻若遣參撰或致私嫌以臣既職監修盍令詳正及經奏請事遂施行今者庶僚競言不知本起表章交奏似有他疑臣雖至昧容非自請既迫羣議輒冒上聞縱臣果獲修成必懼終為時纍且韓愈所書亦非己出元和之後已是相循縱其密親豈害公理使歸本職實謂正名其實録伏望條示舊記最錯誤者宣付史官委之修定則冀聖祖垂休永無慚於傳信下臣非據獲減戾於侵官彰清朝立政之方表公器不私之義流言自弭時論攸宜詔曰其實録中所書德宗順宗朝禁中事尋訪根柢蓋起謬傳諒非信史宜令史官詳正刊去其他不要更修餘依所奏四年轉門下侍郎加崇文館大學士七年兼太子太師備禮冊拜表上史官所修憲宗穆宗實録八年辭疾不得謝會李德裕連貶至袁州長史隨不署奏狀始為鄭注所忌九年四月拜檢校尚書右僕射同中書門下平章事兼潤州刺史鎮海軍節度浙江西道觀察等使大和九年七月遘疾于路薨于揚子江之中流年六十冊贈太保諡曰貞隨有學行大度為諫官能直言在內廷匡益自寶曆初為承旨學士即參大政矣後十五年在相位宗閔德裕朋黨交興攘臂於其間李訓鄭注始終奸詐接武於其後而隨藏器韜光隆污一致可謂得君子中庸而常居之也史臣曰衛次公鄭絪韋處厚崔羣路隨等皆以文學飾身致位崇極兼之忠讜垂名簡書茲實有足多也絪有其位有其時懷獨善之謀晦衆濟之道左遷非不幸也次公因獻捷之書輟已成之詔命也夫處厚危言切議振士友之急稱同列之善君子哉贊曰衛鄭韋路兼之博陵文學政事為時所稱
