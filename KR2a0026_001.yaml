body:
  text: 舊唐書卷一本紀第一高祖高祖神堯大聖大光孝皇帝姓李氏諱淵其先隴西狄道人涼武昭王皓七代孫也皓生歆歆生重耳仕魏為弘農太守重耳生熙為金門鎮將領豪傑鎮武川因家焉儀鳳中追尊宣皇帝熙生天錫仕魏為幢主大統中贈司空儀鳳中追尊光皇帝皇祖諱虎後魏左僕射封隴西郡公與周文帝及太保李弼大司馬獨孤信等以功參佐命當時稱為八柱國家仍賜姓大野氏周受禪追封唐國公諡曰襄至隋文帝作相還復本姓武德初追尊景皇帝廟號太祖陵曰永康皇考諱昞周安州總管柱國大將軍襲唐國公諡曰仁武德初追尊元皇帝廟號世祖陵曰興寧高祖以周天和元年生於長安七歲襲唐國公及長倜儻豁達任性真率寬仁容衆無貴賤咸得其歡心隋受禪補千牛備身文帝獨孤皇后即高祖從母也由是特見親愛纍轉譙隴岐三州刺史有史世良者善相人謂高祖曰公骨法非常必為人主願自愛勿忘鄙言高祖頗以自負大業初為滎陽樓煩二郡太守徵為殿內少監九年遷衛尉少卿遼東之役督運於懷遠鎮及楊玄感反詔高祖馳驛鎮弘化郡兼知關右諸軍事高祖歷試中外素樹恩德及是結納豪傑衆多款附時煬帝多所猜忌人懷疑懼會有詔徵高祖詣行在所遇疾未謁時甥王氏在後宮帝問曰汝舅何遲王氏以疾對帝曰可得死否高祖聞之益懼因縱酒沉湎納賄以混其迹焉十一年煬帝幸汾陽宮命高祖往山西河東黜陟討捕師次龍門賊帥母端兒帥衆數千薄於城下高祖從十餘騎擊之所射七十發皆應弦而倒賊乃大潰十二年遷右驍衛將軍十三年為太原留守郡丞王威武牙郎將高君雅為副羣賊蜂起江都阻絶太宗與晉陽令劉文靜首謀勸舉義兵俄而馬邑校尉劉武周據汾陽宮舉兵反太宗與王威高君雅將集兵討之高祖乃命太宗與劉文靜及門下客長孫順德劉弘基各募兵旬日間衆且一萬密遣使召世子建成及元吉于河東威君雅見兵大集恐高祖為變相與疑懼請高祖祈雨於晉祠將為不利晉陽鄉長劉世龍知之以告高祖高祖陰為之備五月甲子高祖與威君雅視事太宗密嚴兵於外以備非常遣開陽府司馬劉政會告威等謀反即斬之以徇遂起義兵甲戍遣劉文靜使於突厥始畢可汗令率兵相應六月甲申命太宗將兵徇西河下之癸巳建大將軍府並置三軍分為左右以世子建成為隴西公左領大都督左統軍隸焉太宗為燉煌公右領大都督右統軍隸焉裴寂為大將軍府長史劉文靜為司馬石艾縣長殷開山為掾劉政會為屬長孫順德劉弘基竇琮等分為左右統軍開倉庫以賑窮乏遠近響應秋七月壬子高祖率兵西圖關中以元吉為鎮北將軍太原留守癸丑發自太原有兵三萬丙辰師次靈石縣營於賈胡堡隋武牙郎將宋老生屯霍邑以拒義師會霖雨積旬餽運不給高祖命旋師太宗切諫乃止有白衣老父詣軍門曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師高祖曰此神不欺趙無恤豈負我哉八月辛巳高祖引師趨霍邑斬宋老生平霍邑丙戌進下臨汾郡及絳郡癸巳至龍門突厥始畢可汗遣康稍利率兵五百人馬二千匹與劉文靜會于麾下隋驍衛大將軍屈突通鎮河東津梁斷絶關中向義者頗以為阻河東水濱居人競進舟楫不謀而至前後數百人九月壬寅馮翊賊帥孫華土門賊帥白玄度各率其衆送款並具舟楫以待義師高祖令華與統軍王長諧劉弘基引兵渡河屈突通遣其武牙郎將桑顯和率衆數千夜襲長諧義師不利太宗以遊騎數百掩其後顯和潰散義軍復振丙辰馮翊太守蕭造以郡來降戊午高祖親率衆圍河東屈突通自守不出乃命攻城不利而還文武將吏請高祖領太尉加置僚佐從之華陰令李孝常以永豐倉來降庚申高祖率軍濟河舍于長春宮三秦士庶至者日以千數高祖禮之咸過所望人皆喜悅丙寅遣隴西公建成司馬劉文靜屯兵永豐倉兼守潼關以備他盜太宗率劉弘基長孫順德等前後數萬人自渭北徇三輔所至皆下高祖從父弟神通起兵鄠縣柴氏婦舉兵於司竹至是並與太宗會郿縣賊帥丘師利李仲文盩厔賊帥何潘仁等合衆數萬來降乙亥命太宗自渭汭屯兵阿城隴西公建成自新豐趣霸上高祖率大軍自下邽西上經煬帝行宮園苑悉罷之宮女放還親屬冬十月辛巳至長樂宮有衆二十萬京師留守刑部尚書衛文升右翊衛將軍陰世師京兆郡丞滑儀挾代王侑以拒義師高祖遣使至城下諭以匡復之意再三皆不報諸將固請圍城十一月丙辰攻拔京城衛文升先已病死以陰世師滑儀等拒義兵並斬之癸亥率百僚備法駕立代王侑為天子遙尊煬帝為太上皇大赦改元為義寧甲子隋帝詔加高祖假黃鉞使持節大都督內外諸軍事大丞相進封唐王總録萬機以武德殿為丞相府改教為令以隴西公建成為唐國世子太宗為京兆尹改封秦公姑臧公元吉為齊公十二月癸未丞相府置長史司録已下官僚金城賊帥薛舉寇扶風命太宗為元帥擊之遣趙郡公孝恭招慰山南所至皆下癸巳太宗大破薛舉之衆於扶風屈突通自潼關奔東都劉文靜等追擒於閿鄉虜其衆數萬河池太守蕭瑀以郡降丙午遣雲陽令詹俊武功縣正李仲衮徇巴蜀下之二年春正月戊辰世子建成為撫寧大將軍東討元帥太宗為副總兵七萬徇地東都二月清河賊帥竇建德僭稱長樂王吳興人沈法興據丹陽起兵三月丙辰右屯衛將軍宇文化及弒隋太上皇於江都宮立秦王浩為帝自稱大丞相徙封太宗為趙國公戊辰隋帝進高祖相國總百揆備九錫之禮唐國置丞相以下立皇高祖已下四廟於長安通義里第夏四月辛卯停竹使符頒銀菟符於諸郡戊戌世子建成及太宗自東都班師五月乙巳天子詔高祖冕十有二旒建天子旌旗出警入蹕王后王女爵命之號一遵舊典戊午隋帝詔曰天禍隋國大行太上皇遇盜江都酷甚望夷釁深驪北憫豫小子奄造丕愆哀號永感心情糜潰仰惟荼毒仇復靡申形影相弔罔知啓處相國唐王膺期命世扶危拯溺自北徂南東征西怨致九合於諸侯決百勝於千里糾率夷夏大庇氓黎保乂朕躬繄王是賴德侔造化功格蒼旻兆庶歸心曆數斯在屈為人臣載違天命在昔虞夏揖讓相推苟非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布德顧己莫能私僮命駕須歸藩國豫本代王及豫而代天之所廢豈其如是庶憑稽古之聖以誅四凶幸值惟新之恩預充三恪雪冤恥於皇祖守禋祀為孝孫朝聞夕殞及泉無恨今遵故事遜于舊邸庶官羣辟改事唐朝宜依前典趨上尊號若釋重負感泰兼懷假手真人俾除醜逆濟濟多士明知朕意仍敕有司凡有表奏皆不得以聞遣使持節兼太保刑部尚書光祿大夫梁郡公蕭造兼太尉司農少卿裴之隱奉皇帝璽綬于高祖高祖辭讓百僚上表勸進至于再三乃從之隋帝遜于舊邸改大興殿為太極殿甲子高祖即皇帝位於太極殿命刑部尚書蕭造兼太尉告於南郊大赦天下改隋義寧二年為唐武德元年官人百姓賜爵一級義師所行之處給復三年罷郡置州改太守為刺史丁卯宴百官于太極殿賜帛有差東都留守官共立隋越王侗為帝壬申命相國長史裴寂等修律令六月甲戌太宗為尚書令相國府長史裴寂為尚書右僕射相國府司馬劉文靜為納言隋民部尚書蕭瑀相國府司録竇威並為內史令廢隋大業律令頒新格己卯備法駕迎皇高祖宣簡公已下神主祔於太廟追諡妃竇氏為太穆皇后陵曰壽安庚辰立世子建成為皇太子封太宗為秦王齊國公元吉為齊王封宗室蜀國公孝基為永安王柱國道玄為淮陽王長平公叔良為長平王鄭國公神通為永康王安吉公神符為襄邑王柱國德良為長樂王上開府道素為竟陵王上柱國博乂為隴西王奉慈為渤海王諸州總管加號使持節癸未封隋帝為酅國公薛舉寇涇州命秦王為西討元帥征之改封永康王神通為淮安王壬辰加秦王雍州牧餘官如故辛丑內史令竇威卒秋七月丙午刑部尚書蕭造為太子太保追封皇子玄霸為衛王西突厥遣使內附秦王與薛舉大戰於涇州我師敗績八月壬午薛舉死其子仁杲復僭稱帝命秦王為元帥以討之丁亥詔曰隋太常卿高熲上柱國賀若弼並抗節不阿矯枉無撓司隸大夫薛道衡刑部尚書宇文左翊衛將軍董純並懷忠抱義以陷極刑宜從褒飾以慰泉壤熲可贈上柱國郯國公弼贈上柱國嵵國公各令有司加諡道衡贈上開府臨河縣公贈上開府平昌縣公純贈柱國狄道縣公又詔曰隋右驍衛大將軍李金才左光祿大夫李敏並鼎族高門元功世胄橫受屠殺朝野稱冤然李氏將興天祚有應冥契深隱妄肆誅夷朕受命君臨志存刷蕩申冤旌善無忘寤寐金才可贈上柱國申國公敏可贈柱國觀國公又前代酷濫子孫被流者並放還鄉里涼州賊帥李軌以其地來降拜涼州總管封涼王九月乙巳親録囚徒改銀菟符為銅魚符辛未追諡隋太上皇為煬帝宇文化及至魏州鴆殺秦王浩僭稱天子國號許冬十月壬申朔日有蝕之李密率衆來降封皇從父弟襄武公琛為襄武王黃臺公瑗為廬江王癸巳詔行傅仁均所造戊寅曆十一月己酉以京師穀貴令四面入關者車馬牛驢各給課米充其自食秦王大破薛仁杲於淺水原降之隴右平乙巳涼王李軌僭稱天子於涼州詔頒五十三條格以約法緩刑十二月壬申加秦王太尉陝東道大行臺丁丑封上柱國李孝常為義安王庚子李密反於桃林行軍總管盛彥師追討斬之二年春正月乙卯初令文官遭父母喪者聽去職黃門侍郎陳叔達兼納言二月丙戌詔天下諸宗人無職任者不在徭役之限每州置宗師一人以相統攝丁酉竇建德攻宇文化及于聊城斬之傳首突厥閏月辛丑劉武周侵我並州己酉李密舊將徐世績以黎陽之衆及河南十郡降授黎州總管封曹國公賜姓李氏庚戌上微行都邑以察氓俗即日還宮甲寅賊帥朱粲殺我使散騎常侍段確奔洛陽夏四月乙巳王世充篡越王侗位僭稱天子國號鄭辛亥李軌為其僞尚書安興貴所執以降河右平突厥始畢可汗死五月己卯酅國公薨追崇為隋帝諡曰恭六月戊戌令國子學立周公孔子廟四時致祭仍博求其後癸亥尚書右僕射裴寂為晉州道行軍總管以討劉武周秋七月壬申置十二軍以關內諸府分隸焉王世充遣其將羅士信侵我穀州士信率其衆來降西突厥葉護可汗及高昌並遣使朝貢九月辛未賊帥李子通據江都僭稱天子國號吳沈法興據毗陵僭稱梁王丁丑和州賊帥杜伏威遣使來降授和州總管東南道行臺尚書令封楚王裴寂與劉武周將宋金剛戰於介州我師敗績右武衛大將軍姜寶誼死之並州總管齊王元吉懼武周所逼奔於京師並州陷乙未京師地震冬十月己亥封幽州總管羅藝為燕郡王賜姓李氏黃門侍郎楊恭仁為納言殺民部尚書魯國公劉文靜乙卯秦王世民討劉武周軍于蒲州為諸軍聲援壬子劉武周進圍晉州甲子上親祠華嶽十一月丙子竇建德陷黎陽盡有山東之地淮安王神通左武候大將軍李世績皆沒於賊十二月丙申永安王孝基工部尚書獨孤懷恩總管于筠為劉武周將宋金剛掩襲並沒焉甲辰狩于華山壬子大風拔木三年春正月辛巳幸蒲州命祀舜廟癸巳至自蒲州甲午李世績於竇建德所自拔歸國建德僭稱夏王二月丁酉京師西南地有聲如山崩庚子幸華陰工部尚書獨孤懷恩謀反伏誅三月癸酉西突厥葉護可汗高昌王麴伯雅遣使朝貢突厥貢條支巨鳥己卯改納言為侍中內史令為中書令給事郎為給事中甲戌內史侍郎封德彝兼中書令封賊帥劉孝真為彭城王賜姓李氏夏四月壬寅至