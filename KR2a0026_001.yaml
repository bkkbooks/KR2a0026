僧尼道士女冠等有精勤練行守戒律者並令大寺觀居住給衣食勿令乏短其不能精進戒行有闕不堪供養者並令罷遣各還桑梓所司明為條式務依法教違制之事悉宜停斷京城留寺三所觀二所其餘天下諸州各留一所餘悉罷之事竟不行六月庚申秦王以皇太子建成與齊王元吉同謀害己率兵誅之詔立秦王為皇太子繼統萬機大赦天下八月癸亥詔傳位于皇太子尊帝為太上皇徙居弘義宮改名太安宮貞觀八年三月甲戌高祖宴西突厥使者於兩儀殿顧謂長孫無忌曰當今蠻夷率服古未嘗有無忌上千萬歲壽高祖大悅以酒賜太宗太宗又奉觴上壽流涕而言曰百姓獲安四夷咸附皆奉遵聖旨豈臣之力於是太宗與文德皇后互進御膳並上服御衣物一同家人常禮是歲閲武於城西高祖親自臨視勞將士而還置酒於未央宮三品已上咸侍高祖命突厥頡利可汗起舞又遣南越酋長馮智戴詠詩既而笑曰胡越一家自古未之有也太宗奉觴上壽曰臣早蒙慈訓教以文道爰從義旗平定京邑重以薛舉武周世充建德皆上稟睿算幸而剋定三數年間混一區宇天慈崇寵遂蒙重任今上天垂祐時和歲阜被髮左袵並為臣妾此豈臣智力皆由上稟聖算高祖大悅羣臣皆呼萬歲極夜方罷九年五月庚子高祖大漸下詔既殯之後皇帝宜於別所視軍國大事其服輕重悉從漢制以日易月園陵制度務從儉約是日崩於太安宮之垂拱前殿年七十羣臣上諡曰大武皇帝廟號高祖十月庚寅葬於獻陵高宗上元元年八月改上尊號曰神堯皇帝天寶十三載二月上尊號神堯大聖大光孝皇帝史臣曰有隋季年皇圖板蕩荒主燀燎原之焰羣盜發逐鹿之機殄暴無厭橫流靡救高祖審獨夫之運去知新主之勃興密運雄圖未伸龍躍而屈己求可汗之援卑辭答李密之書決神機而速若疾雷驅豪傑而從如偃草洎謳謠允屬揖讓受終刑名大剗于煩苛爵位不踰於薖軸由是攫金有恥伏莽知非人懷漢道之寬平不責高皇之慢罵然而優柔失斷浸潤得行誅文靜則議法不從酬裴寂則曲恩太過姦佞由之貝錦嬖幸得以掇蜂獻公遂間於申生小白寧懷於召忽一旦兵交愛子矢集申孫胸奴尋犯於便橋京邑咸憂於左袵不有聖子王業殆哉贊曰高皇創圖勢若摧枯國運神武家難聖謨言生牀第禍切肌膚鴟梟之詠無損於吾校堪記
