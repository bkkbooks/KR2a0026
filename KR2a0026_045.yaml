body:
  text: 舊唐書卷四十一志第二十一地理四劍南道東西道九嶺南道五管十劍南道成都府隋蜀郡武德元年改為益州置總管府管益綿陵遂資雅嘉瀘戎會松翼巂南寧昆恭十七州益州領成都雒九隴郫雙流新津晉原青城陽安金水平泉玄武綿竹等十三縣又置唐隆導江二縣二年分置邛眉普榮登五州屬總管府又置新都什邡二縣三年罷總管置西南道行臺仍分綿竹導江九隴三縣立濛州陽安金水平泉三縣立簡州割玄武屬梓州又析置德陽新繁萬春三縣九年罷行臺置都督府督益綿簡嘉陵眉犍邛十州并督巂南寧會都督府貞觀二年廢濛州之九隴綿竹導江來屬仍改萬春為溫江六年罷南寧都督更置戎州都督屬益州八年兼領南金州都督十年又督益綿簡嘉陵雅眉邛八州茂巂二都督十七年置蜀縣龍朔二年升為大都督府仍置廣都縣咸亨二年置金堂儀鳳二年又置唐昌濛陽二縣垂拱三年分雒九隴等十三縣置彭蜀二州其年又置犀浦縣聖曆三年又置東陽縣天寶元年改益州為蜀郡依舊大都督府督劍南三十八郡十五載玄宗幸蜀駐蹕成都至德二年十月駕回西京改蜀郡為成都府長史為尹又分為劍南東川西川各置節度使廣德元年黃門侍郎嚴武為成都尹復併東西川為一節度自崔寧鎮蜀後分為西川自後不改舊領縣十六戶十一萬七千八百八十九口七十四萬三百一十二漢朝蜀郡戶二十六萬八千二百七十口一百二十四萬天寶領縣十戶十六萬九百五十口九十二萬八千一百九十九在京師西南二千三百七十九里至東都三千二百一十六里成都漢縣屬蜀郡漢朝成都一縣管戶一萬六千二百五十六蜀三代之時西南夷國或臣或否至秦惠王既霸西戎欲廣其地乃令其相張儀司馬錯伐蜀取其地立漢中巴蜀三郡蜀王本都廣都之樊鄉張儀平蜀後自赤里街移治於少城今州城是也蜀城張儀所築華陽貞觀十七年分成都縣置蜀縣在州郭下與成都分理乾元元年二月改為華陽新都漢縣屬廣漢郡新繁漢繁縣屬蜀郡劉禪時加新字犀浦垂拱二年分成都縣置雙流漢廣都縣地屬蜀郡隋置雙流縣廣都龍朔三年分雙流置取隋舊名郫漢縣屬蜀郡隋置濛州大業省為郫縣溫江漢郫縣地魏蜀郡治於此隋為萬春縣貞觀元年改為溫江靈池久視元年分蜀縣置東陽縣天寶元年改為靈池漢州上垂拱二年分益州五縣置漢州天寶元年改為德陽郡乾元元年復為漢州領縣五戶六萬九千五口三十萬八千二百三至京師二千二百里至東都三千一百一十六里雒漢縣屬廣漢郡後漢置益州治於雒晉置新都郡宋齊為廣漢郡垂拱二年置漢州皆治雒縣也德陽後周廢縣武德三年分雒置什邡漢縣屬廣漢郡後周改為方寧武德三年改為什邡雍齒侯邑在縣北四十步綿竹漢縣屬廣漢郡隋開皇二年置晉熙縣十八年又改為孝水縣大業三年改為綿竹武德三年屬濛州州廢來屬之金堂咸亨二年分雒縣新都置屬益州垂拱二年來屬彭州上垂拱二年分益州四縣置彭州天寶元年改為濛陽郡乾元元年復為彭州領縣四戶五萬五千九百二十二口三十五萬七千三百八十七至京師二千三百三十九里至東都三千一百六十九里九隴州所治漢繁縣地宋置晉壽郡古城在縣西北三里梁置東益州後魏為天水郡仍改為九隴初於縣東三里置濛州大業省武德三年復置濛州領九隴綿竹導江三縣置彭州之名也三縣置屬益州垂拱二年屬彭州長壽二年改為周昌神龍初復置濛陽儀鳳二年分九隴雒什邡三縣置屬益州垂拱三年來屬導江蜀置都安縣後周改為汶山武德元年改為盤龍尋改為導江三年割屬濛州州廢屬益州舊治灌口城武德元年移治導江郡垂拱二年來屬蜀州垂拱二年分益州四縣置天寶元年改為唐安郡乾元元年復為蜀州也領縣四戶五萬六千五百七十七口三十九萬六百九十四至京師三千三百三十二里至東都三千一百七十二里晉原漢江源地屬蜀州李雄立江源郡晉改為多融縣又改為晉原鶴鳴山在西北十里青城漢江源縣地南齊置齊基縣後周改為青城山在西北三十二里舊青字加水開元十八年去水為青唐安本漢江源縣地後魏於此立犍為郡及僰道縣隋省武德元年復置改為唐隆長壽二年為武隆先天元年改為唐安新津漢武陽縣屬犍為郡後周改為新津屬益州垂拱二年屬蜀州也眉州上隋眉山郡之通義縣武德二年割嘉州之通義丹稜洪雅青神南安五縣置眉州五年省南安貞觀二年置隆山縣天寶元年改為通義郡乾元元年復為眉州也舊領縣五戶三萬六千九口十六萬九千七百五十五天寶戶四萬三千五百二十九口一十七萬五千二百五十六至京師二千五百五十里至東都三千二百八十九里通義後漢置通義縣屬齊通郡梁改為青州後魏改為眉州後改通義為安洛又復通義隋初為廣通尋改為通義武德元年於縣置唐眉州也彭山漢武陽縣地屬犍為晉於郡置西江陽郡後魏增置隆山郡以界內有鼎鼻山地形隆故也隋改為陵州隆山縣先天元年改為彭山也丹稜本南齊齊樂郡後周改為洪雅縣隋改為丹稜屬嘉州武德二年來屬也洪雅後周洪雅鎮隋改為縣武德九年置犍州貞觀初州廢屬眉州也青神漢南安縣屬犍為郡縣臨青衣江西魏置青衣縣本治思蒙水口武德八年移於今治屬眉州也綿州上隋金山郡武德元年改為綿州領巴西昌隆涪城魏城金山萬安神泉七縣三年分置顯武龍安文義鹽泉四縣七年省金山縣貞觀元年又省文義縣舊領縣九戶四萬三千九百四口十九萬五千五百六十三天寶領縣九戶六萬五千六十六口二十六萬三千三百五十二至京師二千五百九里至東都三千二百五十九里巴西漢涪縣屬廣漢郡晉置梓潼郡西魏置潼州隋改為綿州煬帝改為金山郡隋改涪為巴西縣也涪城漢涪縣地東晉置始平郡後魏改為涪城及潼縣隋改潼為涪城昌明漢涪縣地晉置漢昌縣後魏為昌隆先天元年改為昌明舊有顯武縣神龍元年改為興聖開元二年廢併入昌明仍分巴西涪城萬安三縣地置興聖縣二十七年廢地各還本屬魏城隋置羅江漢涪縣地晉於梓潼水尾萬安故城置萬安縣後魏置萬安郡隋廢天寶元年改萬安為羅江廉泉讓水出縣北平地也神泉漢涪縣地晉置西充國縣隋改為神泉以縣西泉能愈疾故也鹽泉武德三年分魏城置也龍安隋金山縣武德三年復置改為龍安西昌隋金山縣隋末廢永淳元年復置改為西昌也劍州隋普安郡武德元年改為始州領縣七聖曆二年置劍門縣先天二年改始州為劍州天寶五年改為普安郡乾元元年復為劍州也舊領縣七戶三萬六千七百一十四口十九萬九十六天寶領縣八戶二萬三千五百一十口一十萬四百五十至京師一千六百六十二里至東都二千五百六十里普安漢梓潼縣廣漢郡治也宋置南安郡梁置南梁州又改為安州西魏改為始州兼置普安郡武德元年復為始州皆治於普安也黃安梁分梓潼縣置梁安縣尋改為黃安永歸隋分梓潼縣置梓潼漢縣蜀先分廣漢置梓潼西魏改為潼川郡隋為梓潼縣後魏自涪縣移梓潼郡於今縣屬始州仍改郡為縣也陰平晉流人入蜀於縣置北陰平郡山北有十八隴山山有隴十八也武連漢梓潼縣地宋置武都郡及下辨縣又改下辨為武功後魏改為武連也臨津漢梓潼縣地南齊置相厚縣隋改為臨津也劍門聖曆二年分普安永歸陰平三縣地於方期驛城置劍門縣界大劍山即梁山也其北三十里所有小劍山大劍山有劍閣道三十里至劍處張載刻銘之所劍山東西二百三十一里梓州上隋新城郡武德元年改為梓州領郪射洪鹽亭飛烏四縣三年又以益州玄武來屬四年又置永泰縣調露元年置銅山縣天寶元年改為梓潼郡乾元元年復為梓州乾元後分蜀為東西川梓州恆為東川節度使治所舊領縣七戶四萬五千九百二十九口二十四萬八千三百九十四天寶領縣八戶六萬一千八百二十四口二十四萬六千六百五十二至京師二千九十里至東都二千九百里郪漢縣屬廣漢郡歷晉宋齊不改梁於縣置新州西魏改為昌城郡隋改為梓州煬帝改為新城郡郡城左帶涪水右挾中江鄰居水陸之要梓州所治以梓潼水為名也射洪漢郪縣地後魏分置射洪縣婁縷灘東六里有射江語訛為洪通泉漢廣漢縣地隋縣也玄武漢底道縣屬蜀郡晉改為玄武武德元年屬益州三年割屬梓州也鹽亭漢廣漢縣地梁置鹽亭縣也飛烏漢郪縣地隋置飛烏鎮又改為縣取飛烏山為名也永泰武德四年分鹽亭武安二縣置銅山調露元年分郪飛烏二縣地置也閬州隋巴西郡武德元年改為隆州領閬中南部蒼溪南充相如西水三城奉國儀隴大寅十縣其年又立新井思恭二縣四年以南充相如屬果州儀隴大寅屬蓬州又置新政七年又以奉國屬西平州還以奉國來屬又省思恭入閬中縣先天元年改為閬州天寶元年改為閬中郡乾元元年復為閬州舊領縣八戶三萬八千九百四十九口二十七萬三千五百四十三今領縣九戶二萬五千五百八十八口十三萬二千一百九十二至京師一千九百一十五里至東都二千七百六十里閬中漢縣屬巴郡梁置北巴州西魏置隆州及盤龍郡煬帝改為巴西郡武德為隆州皆治閬中閬水迂曲經郡三面故曰閬中隋為閬內也晉安漢閬中縣地梁置金匱二又為金遷郡隋省郡改為晉城武德改為晉安也南部後漢分閬中置充國縣屬巴郡又分置南充國郡梁改為南充郡隋改為南部也蒼溪後漢分宕渠置漢昌縣屬巴郡隋改漢昌為蒼溪也西水漢閬中縣地梁置掌夫城後周改為西水縣奉國後漢分閬中置武德七年屬西平州貞觀元年還屬隆州新井漢充國縣地武德元年分南部晉安二縣置界內有鹽井新政武德四年分南部相如兩縣置岐坪舊屬利州開元二十三年來屬也果州中隋巴西郡之南充縣武德四年割隆州之南充相如二縣置果州因果山為名又置西充郎池二縣天寶元年為南充郡乾元元年復為果州也舊領縣四戶一萬三千五百一十口七萬五千八百一十一天寶領縣六戶三萬三千九百四口八萬九千二百二十五至京師二千五百五十八里至東都三千四百二十三里南充漢安漢縣屬巴郡宋於安漢故城置南宕渠郡隋改安漢為南充果山在縣南八里相如漢安漢縣地梁置梓潼郡周省郡立相如縣以縣城南二十里有相如故宅二相如坪有琴臺流溪開耀元年析南充縣於溪水側置也西充武德四年分南充置有西充山郎池武德四年分相如置嶽池萬歲通天二年分南充相如二縣置初治思嶽池開元二十年移治今所遂州中隋遂寧郡武德元年改為遂州領方義長江青石三縣二年置總管府管遂梓資普四州貞觀罷總管十年復置都督督遂果普合四州十七年罷都督府天寶元年改為遂寧郡乾元元年復為遂州舊領縣三戶一萬二千九百七十七口六萬六千四百六十九天寶領縣五戶三萬五千六百三十二口十萬七千七百一十六至京師二千三百二十九里至東京三千一百六十六里方義漢廣漢縣屬廣漢郡宋置遂寧郡齊梁加東字後周改東遂寧為遂州後魏改廣漢為方義長江東晉巴興縣魏改為長江舊治靈鷲山上元二年移治白桃川也蓬溪永淳元年分方義縣置唐興縣長壽二年改為武豐神龍初復景龍二年分唐興置唐安縣先天二年廢唐安縣移唐安廢縣置天寶元年改唐興為蓬溪也青石東晉晉興縣後魏改為始興隋改始興為青石以縣界有青石祠也遂寧景龍元年分置普州中隋資陽郡