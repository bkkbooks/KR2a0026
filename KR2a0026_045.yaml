以為珠崖儋耳二郡民以布如單被穿中從頭穿之民種禾稻紵麻女子蠶織無馬與虎有牛羊豕雞犬兵則矛盾木弓竹矢骨鏃郡縣吏卒多侵淩之故率數歲一反昭帝省儋耳併珠崖元帝用賈捐之之言乃棄之唐武德初復析珠崖郡置崖儋瓊振萬安五州於崖州置都督府領之後廢都督隸廣州經略使後又改隸安南都護府也舍城州所治隋舊縣其崖儋振瓊萬安五州都在海中洲之上方千里四面抵海北渡海揚帆一日一夜至雷州也澄邁隋縣文昌武德五年置平昌縣貞觀元年改為文昌儋州下隋儋耳郡武德五年置儋州領義倫昌化感恩富羅四縣貞元年分昌化置普安天寶元年改為昌化郡乾元元年復為儋州也舊領縣五戶三千九百五十六天寶戶三千三百九至京師七千四百四十二里與崖州同在海中洲上東至振州四百里義倫本漢儋耳郡城即此縣隋為義倫縣州所治也昌化隋縣感恩洛場新置富羅隋之毗善縣武德五年改置瓊州本隋珠崖郡之瓊山縣貞觀五年置瓊州領瓊山萬安二縣其年又割崖州臨機來屬十三年廢瓊州以屬崖州尋復置瓊州領瓊山容瓊曾口樂會顏羅五縣天寶元年改為瓊山郡乾元元年復為瓊州貞元五年十月嶺南節度使李復奏曰瓊州本隸廣府管內乾封年山洞草賊反叛遂茲淪陷至今一百餘年臣令判官薑孟京崖州刺史張少逸併力討除今已收復舊城且令降人權立城相保以瓊州控壓賊洞請升為下都督府加瓊崖振儋萬安等五州招討遊奕使其崖州都督請停從之領縣五戶六百四十九兩京與崖州道里相類西南至振州四百五十里與崖州同在大海中也瓊山州所治貞元七年十一月省容瓊縣併入臨高本屬崖州貞元七年割屬瓊州曾口樂會顏羅後漸析置振州隋臨振郡武德五年置振州天寶元年改為臨振郡乾元元年復為振州也領縣四戶八百一十九口二千八百二十一至京師八千六百六里至東都七千七百九十七里東至萬安州陵水縣一百六十里南至大海西北至儋州四百二十里北至瓊州四百五十里東南至大海二十七里西南至大海千里西北至延德縣九十里與崖州同在大海洲中寧遠州所治隋舊延德隋縣吉陽貞觀二年分延德置臨川隋縣落屯新置萬安州與崖儋同在大海洲中唐置萬安州失起置年月天寶元年改為萬安郡至德二年改為萬全郡乾元元年復為萬安州領縣四無戶口西接振州界兩京道里與振州相類也萬安州所治至德二年改為萬全後復置陵水富雲博遼與州同置赤土國州南渡海便風十四日至雞籠島即至其國亦海中之一洲丹丹國振州東南海中之一洲舟行十日至
