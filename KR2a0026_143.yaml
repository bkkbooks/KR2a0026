body:
  text: 舊唐書卷一百三十九列傳第八十九陸贄陸贄字敬輿蘇州嘉興人父侃溧陽令以贄貴贈禮部尚書贄少孤特立不羣頗勤儒學年十八登進士第以博學宏詞登科授華州鄭縣尉罷秩東歸省母路由壽州刺史張鎰有時名贄往謁之鎰初不甚知留三日再見與語遂大稱賞請結忘年之契及辭遺贄錢百萬曰願備太夫人一日之膳贄不納唯受新茶一串而已曰敢不承君厚意又以書判拔萃選授渭南縣主簿遷監察御史德宗在東宮時素知贄名乃召為翰林學士轉祠部員外郎贄性忠藎既居近密感人主重知思有以效報故政或有缺巨細必陳由是顧待益厚建中四年朱泚謀逆從駕幸奉天時天下叛亂機務填委徵發指蹤千端萬緒一日之內詔書數百贄揮翰起草思如泉注初若不經思慮既成之後莫不曲盡事情中於機會胥吏簡札不暇同舍皆伏其能轉考功郎中依前充職嘗啓德宗曰今盜遍天下輿駕播遷陛下宜痛自引過以感動人心昔成湯以罪己勃興楚昭以善言復國陛下誠能不吝改過以言謝天下使書詔無忌臣雖愚陋可以仰副聖情庶令反側之徒革心向化德宗然之故奉天所下書詔雖武夫悍卒無不揮涕感激多贄所為也其年冬議欲以新歲改元而卜祝之流皆以國家數鍾百六凡事宜有變革以應時數上謂贄曰往年羣臣請上尊號聖神文武四字今緣寇難諸事並宜改更衆欲朕舊號之中更加一兩字其事何如贄奏曰尊號之興本非古制行於安泰之日已纍謙沖襲乎喪亂之時尤傷事體今者鑾輿播越未復宮闈宗社震驚尚愆禋祀中區多梗大憝猶存此乃人情向背之秋天意去就之際陛下宜深自懲勵收攬羣心痛自貶損以謝靈譴不可近從末議重益美名帝曰卿所奏陳雖理體甚切然時運必須小有改變亦不可執滯卿更思量贄曰古之人君稱號或稱皇稱帝或稱王但一字而已至暴秦乃兼皇帝二字後代因之及昏僻之君乃有聖劉天元之號是知人主輕重不在自稱崇其號無補於徽猷損其名不傷其德美然而損之有謙光稽古之善崇之獲矜能納諂之譏得失不侔居然可辨況今時遭迍否事屬傾危尤宜懼思以自貶抑必也俯稽術數須有變更與其增美稱而失人心不若黜舊號以祗天戒天時人事理必相符人既好謙天亦助順陛下誠能斷自宸鑒煥發德音引咎降名深示刻責惟謙與順一舉而二美從之德宗從之但改興元年號而已初德宗倉皇出幸府藏委棄凝冽之際士衆多寒服御之外無尺縑丈帛及賊泚解圍諸藩貢奉繼至乃於奉天行在貯貢物於廊下仍題曰瓊林大盈二庫名贄諫曰瓊林大盈自古悉無其制傳諸耆舊之説皆云創自開元貴臣貪權飾巧求媚乃言郡邑貢賦所用盍各區分賦稅當委於有司以給經用貢獻宜歸於天子以奉私求玄宗悅之新是二庫蕩心侈欲萌柢於茲逮乎失邦終以餌寇記曰貨悖而入必悖而出豈其效歟陛下嗣位之初務遵理道敦行儉約斥遠貪叨雖內庫舊藏未歸太府而諸方曲獻不入禁闈清風肅然海內丕變近以寇逆亂常鑾輿外幸既屬憂危之運宜增警勵之誠臣昨奉使軍營出經行殿忽覩右廊之下榜列二庫之名戄然若驚不識所以何者天衢尚梗師旅方殷痛心呻吟之聲噢咻未息忠勤戰守之效賞賚未行諸道貢珍遽私別庫萬目所視孰能忍情竊揣軍情或生觖望或忿形謗讟或醜肆謳謠頗含思亂之情亦有悔忠之意是知氓俗昏鄙識昧高卑不可以尊極臨而可以誠義感頃者六師初降百物無儲外扞凶徒內防危堞晝夜不息殆將五旬凍餓交侵死傷相枕畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以啖功勞無猛制人而不攜懷所感也無厚賞士而不怨悉所無也今者攻圍已解衣食已豐而謗讟方興軍情稍沮豈不以勇夫常性嗜貨矜功其患難既與之同憂而好樂不與之同利苟異恬默能無怨咨此理之常故不足怪記曰財散則民聚豈其效歟陛下天資英聖見善必遷是將化蓄怨為銜恩反過差為至當促殄遺寇永垂鴻名大聖應機固當不俟終日上嘉納之令去其題署興元元年李懷光異志已萌欲激怒諸軍上表論諸軍衣糧薄神策衣糧厚厚薄不均難以驅戰意在撓沮進軍李晟密奏恐其有變上憂之遣贄使懷光軍宣諭使還贄奏事曰賊泚稽誅保聚宮苑勢窮援絶引日偷生懷光總仗順之軍乘制勝之氣鼓行芟翦易若摧枯而乃寇奔不追師老不用諸帥每欲進取懷光輒沮其謀據茲事情殊不可解陛下意在全護委曲聽從觀其所為亦未知感若不別為規略漸相制持唯以姑息求安終恐變故難測此誠事機危迫之秋也故不可以尋常容易處之今李晟奏請移軍適遇臣銜命宣慰懷光偶論此事臣遂泛問所宜懷光乃云李晟既欲別行某亦都不要藉臣猶慮有翻覆因美其軍強盛懷光大自矜夸轉有輕晟之意臣又從容問云昨發離行在之日未知有此商量今日從此却回或恐聖旨顧問事之可否決定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨要約再三非不詳審雖欲追悔固難為詞伏望即以李晟表出付中書敕下依奏別賜懷光手詔示以移軍事由其手詔大意云昨得李晟奏請移軍城東以分賊勢朕緣未知利害本欲委卿商量適會陸贄從彼宣慰回云見卿論軍情語及於此仍言許去事亦無妨遂敕本軍允其所請卿宜授以謀略分路夾攻務使叶齊克平寇孽如此詞婉而直理當而明雖蓄異端何由起怨臣初奉使諭旨本緣糧料不均偶屬移軍事相諧會又幸懷光詭對且無阻絶之言機宜合並若有幽贊一失其便後何可追幸垂裁察德宗初望懷光回意破賊故晟屢奏移軍不許及贄縷陳懷光反狀乃可晟之奏遂移軍東渭橋而鄜坊節度李建徽神策行營陽惠元猶在咸陽贄慮懷光併建徽等軍又奏曰懷光當管師徒足以獨制凶寇逗留未進抑有他由所患太強不資傍助比者又遣李晟李建徽陽惠元三節度之衆附麗其營無益成功祇憂生事何則四軍懸壘羣帥異心論勢力則懸絶高卑據職名則不相統屬懷光輕晟等兵微位下而忿其制不從心晟等疑懷光養寇蓄姦而怨其事多陵己端居則互防飛謗欲戰則遞恐分功齟齬不和嫌釁遂構俾之同處必不兩全強者惡積而後亡弱者勢危而先覆覆亡之禍翹足可期舊寇未平新患方起憂歎所切實堪疚心太上消慝於未萌其次救失於始兆況乎事情已露禍難垂成委而不謀何以制亂李晟見機慮變先請移軍就東建徽惠元勢轉孤弱為其吞噬理在必然他日雖有良圖亦恐不能自拔拯其危急唯在此時今因李晟願行便遣合軍同往託言晟兵素少慮為賊泚所邀藉此兩軍迭為掎角仍先諭旨密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心疾雷不及掩耳者也夫制軍馭將所貴見情離合疾徐各有宜適當離者合之則召亂當合者離之則寡功當疾而徐則失機當徐而疾則漏策得其要契其時然後舉無敗謀措無危勢而今者屯兵而不肯為用聚將而罔能叶心自為鯨鯢變在朝夕留之不足以相制徒長厲階析之各競於擅能或成勳績事有必應斷無可疑德宗曰卿之所料極善然李晟移軍懷光心已惆悵若更遣建徽惠元就東則使得為詞且俟旬時晟至東渭橋不旬日懷光果奪兩節度兵建徽單騎遁而獲免惠元中路被執害之報至行在人情大恐翌日移幸山南贄練達兵機率如此類二月從幸梁州轉諫議大夫依前充學士先是鳳翔衙將李楚琳乘涇師之亂殺節度使張鎰歸款朱泚及奉天解圍楚琳遣使貢奉時方艱阻不獲已命為鳳翔節度使然德宗忿其弒逆必不能容才至漢中欲令渾瑊代為節度贄諫曰楚琳之罪固不容誅但以乘輿未復大憝猶存勤王之師悉在畿內急宣速告晷刻是爭商嶺則道迂且遙駱谷復為賊所扼僅通王命唯在褒斜此路若又阻艱南北便成隔絶以諸鎮危疑之勢居二逆誘脅之中恟恟羣情各懷向背賊勝則往我勝則來其間事機不容差跌儻楚琳發憾公肆猖狂南塞要衝東延巨猾則我咽喉梗而心膂分矣其勢豈不病哉上釋然開悟乃善待楚琳使優詔安慰其心德宗至梁欲以谷口已北從臣賜號曰奉天定難功臣谷口已南隨扈者曰元從功臣不選朝官內官一例俱賜贄奏曰破賊扞難武臣之效至如宮闈近侍班列員僚但馳走從行而已忽與介胄奮命之士俱號功臣伏恐武臣憤惋乃止李晟既收京城遣中使宣付翰林院具録先散失宮人名字令草詔賜渾瑊遣於奉天尋訪以得為限仍量與資糧送赴行在贄不時奉詔進狀論之曰頃以理道乖錯禍亂薦鍾陛下思咎懼災裕人罪己屢降大號誓將更新天下之人垂涕相賀懲忿釋怨煦仁戴明畢力同心共平多難止土崩於絶岸收版蕩於橫流殄寇清都不失舊物實由陛下至誠動於天地深悔感於神人故得百靈降康兆庶歸德苟不如此自古何嘗有捐棄宮闕失守宗祧繼逆於赴難之師再遷於蒙塵之日不踰半歲而復興大業者乎今渠魁始平法駕將返近自郊甸遠周寰瀛百役疲瘵之氓重戰傷殘之卒皆忍死扶病傾耳聳肩想聞德聲翹望聖澤陛下固當感上天悔禍之眷荷列祖垂裕之休念將士鋒刃之殃愍黎元塗炭之酷以致寇為戒以居上為危以務理為憂以復宮為急損之又損尚懼汰侈之易滋艱之惟艱猶患戒慎之難久謀始盡善克終已稀始而不謀終則何有夫以內人為號蓋是中壼末流天子之尊富有宮掖如此等輩固繁有徒但恐傷多豈憂乏使翦除元惡曾未浹辰奔賀往來道途如織何必自虧君德首訪婦人又令資裝速赴行在萬目閲視衆口流傳恐非所以答慶賴之心副惟新之望也夫事有先後義有重輕重者宜先輕者宜後武王克殷有未及下車而為之者有下車而為之者蓋美其不失先後之宜也自翠華播越萬姓靡依清廟震驚三時乏祀當今所務莫大於斯誠宜速遣大臣馳傳先往迎復神主修整郊壇展禋享之儀申告謝之意然後弔恤死義慰犒有功綏輯黎蒸優問耆耋安定反側寬宥脅從宣暢鬱堙褒奬忠直官失職之士復廢業之人是皆宜先不可後也至如崇飾服器繕緝殿臺備耳目之娛選巾櫛之侍是皆宜後不可先也散失內人已經纍月既當離亂之際必為將士所私其人若稍有知不求當自陳獻其人若甚無識求之適使憂虞自因寇亂喪亡頗有大於此者一聞搜索懷懼必多餘孽尚繁羣情未一因而善撫猶恐危疑若又懼之於何不有昔人所以掩絶纓而飲盜馬者豈必忘其情愛蓋知為君之體然也以小妨大明者不為天下固多褻人何必獨在於此所令撰賜渾瑊詔書未敢順旨帝遂不降詔但遣使而已德宗還京轉中書舍人學士如故初贄受張鎰知得居內職及鎰為盧嵵所排贄常憂惴及嵵貶黜始敢上書言事德宗好文益深顧遇奉天解圍後德宗言及違離宗廟嗚咽流涕曰致寇之由實朕之過贄亦流涕而對曰臣思致今日之患者羣臣之罪也贄意蓋為盧嵵趙贊等也上欲掩嵵之失則曰雖朕德薄致茲禍亂亦運數前定事不由人贄又極言嵵等罪狀上雖貌從心頗不説吳通微兄弟俱在翰林亦承德宗寵遇文章才器不逮贄而能交結權幸共短贄於上前故劉從一薑公輔自卑品蒼黃之中皆登輔相而贄為朋黨所擠同職害其能加以言事激切動失上之歡心故久之不為輔相其於議論應對明練理體敷陳剖判下筆如神當時名流無不推挹貞元初李抱真入朝從容奏曰陛下幸奉天山南時赦書至山東宣諭之時士卒無不感泣臣即時見人情如此知賊不足平也時贄母韋氏在江東上遣中使迎至京師搢紳榮之俄丁母憂東歸洛陽寓居嵩山豐樂寺藩鎮賻贈及別陳餉遺一無所取與韋皋布衣時相善唯西川致遺奏而受之贄父初葬蘇州至是欲合葬上遣中使護其柩車至洛其禮遇如此免喪權知兵部侍郎依前充學士中謝日贄伏地而泣德宗為之改容慰恩遇既隆中外屬意為輔弼而宰相竇參素忌贄贄亦短參之所為言參黷貨由是與參不平七年罷學士正拜兵部侍郎知貢舉時崔元翰梁肅文藝冠時贄輸心於肅肅與元翰推薦藝實之士升第之日雖衆望不愜然一歲選士才十四五數年之內居臺省清近者十餘人八年四月竇參得罪以贄為中書侍郎門下同平章事贄久為邪黨所擠困而得位意在不負恩奬悉心報國以天下事為己任上即位之初用楊炎盧嵵秉政樹立朋黨排擯良善卒致天下沸騰鑾輿奔播懲是之失貞元已後雖立輔臣至於小官除擬上必再三詳問久之方下及贄知政事請許臺省長官自薦屬官仍保任之事有曠敗兼坐舉主上許之俄又宣旨曰外議云諸司所舉多引用親黨兼通賂遺不得實才此法行之非便今後卿等宜自選擇勿用諸司延薦贄論奏曰臣實頑鄙一無所堪猥蒙任使待罪宰相雖懷竊位之懼且乏知人之明自揣庸虛終難上報唯知廣求才之路使賢者各以彙征啓至公之門令職司皆得自達既蒙允許即宜宣行南宮舉人才至十數或非臺省舊吏則是使府佐僚纍經薦延多歷事任論其資望既不愧於班行考其行能又未聞于闕敗遽以騰口上煩聖聰道之難行亦可知矣陛下勤求理道務徇物情因謂舉薦非宜復委宰臣揀擇其為崇任輔弼博採輿詞可謂聖德之盛者然於委任責成之道聽言考實之方間邪存誠猶恐有闕陛下既納臣言而用之旋聞橫議而止之於臣謀不責成於橫議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是而行觸類而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家之病常必由之昔齊桓公問管仲害霸之事對曰得賢不能任害霸也用而不能終害霸也與賢人謀事而與小人議之害霸也為小人者不必悉懷險詖故覆邦家蓋以其意性回邪趣向狹促以沮議為出衆以自異為不羣趨近利而昧遠圖效小信而傷大道況又言行難保恣其非心者乎伏以宰輔常制不過數人人之所知固有限極不能遍諳諸士備閲羣才若令悉命羣官理須展轉詢訪是則變公舉為私薦易明揚為暗投儻如議者之言所舉多有情故舉于君上且未絶私薦於宰臣安肯無詐失人之弊必又甚焉所以承前命官罕有不涉私謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非遠聖鑒明知今又將徇浮言專任宰臣除吏宰臣不遍諳識踵前須訪於人若訪親朋則是悔其覆車不易故轍若訪於朝列則是求其私薦不如公舉之愈也二者利害惟陛下更詳擇焉恐不如委任長官慎揀僚屬所揀既少所求亦精得賢有鑑識之名失實當暗謬之責人之常性莫不愛身況於臺省長官皆是當朝華選孰肯徇私妄舉以傷名取責者耶所謂臺省長官即僕射尚書左右丞侍郎及御史大夫中丞是也陛下比擇輔相多亦出於其中今之宰臣則往日臺省長官也今之臺省長官乃將來之宰臣也但是職名暫異固非行業頓殊豈有為長官之時不能舉一二屬吏居宰臣之位則可擇千百具僚物議悠悠其惑斯甚夫求才貴廣考課貴精求廣在於各舉所知長吏之薦擇是也貴精在於按名責實宰臣之序進是也往者則天太后踐祚臨朝欲收人心尤務拔擢弘委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦許自舉其才所薦必行所舉輒試其於選士之道豈不傷於容易哉而課責既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之明纍朝賴多士之用此乃近於求才貴廣考課貴精之效也陛下誕膺寶曆思致理平雖好賢之心有踰於前哲而得人之盛未逮於往時蓋由賞鑒獨任於聖聰搜擇頗難於公舉仍啓登延之路罕施練核之方遂使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也則天舉用之法傷易而得人陛下慎揀之規太精而失士陛下選任宰相必異於庶官精擇長官必愈於末品及至宰相獻規長吏薦士陛下即但納橫議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辨所毀之虛實不校所試之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而已乎上雖嘉其所陳長官薦士之詔竟追寢之國朝舊制吏部選人每年調集自乾元已後屬宿兵于野歲或凶荒遂三年一置選由是選人停擁其數猥多文書不接真偽難辨吏緣為姦注授乖濫而有十年不得調者贄奏吏部分內外官員為三分計闕集人每年置選故選司之弊十去七八天下稱之贄與賈耽盧邁趙憬同知政事百司有所申覆皆更讓不言可否舊例宰臣當旬秉筆決事每十日一易贄請準故事令秉筆者以應之又以河隴陷蕃已來西北邊常以重兵守備謂之防秋皆河南江淮諸鎮之軍也更番往來疲於戍役贄以中原之兵不習邊事乃扞虜戰賊多有敗衄又苦邊將名目太多諸軍統制不一緩急無以應敵乃上疏論其事曰臣歷觀前代書史皆謂鎮撫四夷宰相之任不揆暗劣屢敢上言誠以備邊禦戎國家之重事理兵足食備禦之大經兵不治則無可用之師食不足則無可固之地理兵在制置得所足食在斂導有方陛下幸聽愚言先務積穀人無加賦官不費財坐致邊儲數逾百萬諸鎮收糴今已向終分貯軍城用防艱急縱有寇戎之患必無乏絶之憂守此成規以為永制常收冗費益贍邊農則更經二年可積十萬人三歲之糧矣足食之原粗立理兵之術未精敢議籌量庶備採擇伏以戎狄為患自古有之其於制禦之方得失之論備存史籍可得而言大抵尊即序者則曰非德無以化要荒曾莫知威不立則德不能馴也樂武威者則曰非兵無以服凶獷曾莫知德不修則兵不可恃也務和親者則曰要結可以睦鄰好曾莫知我結之而彼復解也美長城者則曰設險可以固邦國而扞寇讎曾莫知力不足兵不堪則險之不能有也尚薄伐者則曰驅遏可以禁侵暴而省征徭曾莫知兵不鋭壘不完則遏之不能勝驅之不能去也議邊之要略盡於斯雖互相譏評然各有偏駁聽一家之説則例理可徵考歷代所行則成敗異效是由執常理以御其不常之勢徇所見而昧於所遇之時夫中夏有盛衰夷狄有強弱事機有利害措置有安危故無必定之規亦無長勝之法夏后以序戎而聖化茂古公以避狄而王業興周城朔方而獫狁攘秦築臨洮而宗社覆漢武討胸奴而貽悔太宗征突厥而致安文景約和親而不能弭患於當年宣元弘撫納而足以保寧於纍葉蓋以中夏之盛衰異勢夷狄之強弱異時事機之利害異情措置之安危異便知其事而不度其時則敗附其時而不失其稱則成形變不同胡可專一夫以中國強盛夷狄衰微而能屈膝稱臣歸心受制拒之則阻其嚮化威之則類於殺降安得不存而撫之即而序之也又如中國強盛夷狄衰微而尚棄信姦盟蔑恩肆毒諭之不變責之不懲安得不取亂推亡息人固境也其有遇中國喪亡之弊當夷狄強盛之時圖之則彼釁未萌禦之則我力不足安得不卑詞降禮約好通和啖之以親紓其交禍縱不必信且無大侵雖非禦戎之善經蓋時事亦有不得已也儻或夷夏之勢強弱適同撫之不寧威之不靖力足以自保不足以出攻得不設險以固軍訓師以待寇來則薄伐以遏其深入去則攘斥而戒於遠追雖非安邊之令圖蓋勢力亦有不得不然也故夏之即序周之于攘太宗之翦亂皆乘其時而善用其勢也古公之避狄文景之和親神堯之降禮皆順其時而不失其稱也秦皇之長城漢武之窮討皆知其事而不度其時者也向若遇孔熾之勢行即序之方則見侮而不從矣乘可取之資懷畏避之志則失機而養寇矣有攘却之力用和親之謀則示弱而勞費矣當降屈之時務翦伐之略則召禍而危殆矣故曰知其事而不度其時則敗附其時而不失其稱則成是無必定之規亦無長勝之法得失著效不其然歟至於察安危之大情計成敗之大數百代之不變易者蓋有之矣其要在於失人肆欲則必蹶任人從衆則必全此乃古今所同而物理之所一也國家自祿山搆亂河隴用兵以來肅宗中興撤邊備以靖中邦借外威以寧內難於是吐蕃乘釁吞噬無厭回紇矜功憑陵亦甚中國不遑振旅四十餘年使傷耗遺氓竭力蠶織西輸賄幣北償馬資尚不足塞其煩言滿其驕志復乃遠徵士馬列戍疆陲猶不能遏其奔衝止其侵侮小入則驅略黎庶深入則震驚邦畿時有議安邊策者多務於所難而忽於所易勉於所短而略於所長遂使所易所長者行之而其要不精所難所短者圖之而其功靡就憂患未弭職斯之由夫制敵行師必量事勢勢有難易事有先後力大而敵脆則先其所難是謂奪人之心暫勞而永逸者也力寡而敵堅則先其所易是謂固國之本觀釁而後動者也頃屬多故人勞未瘳而欲廣發師徒深踐寇境復其侵地攻其堅城前有勝負未必之虞後有餽運不繼之患倘或撓敗適所以啓戎心而挫國威以此為安邊之謀可謂不量事勢而務於所難矣天之授者有分事無全功地之産者有物宜無兼利是以五方之俗長短各殊長者不可踰短者不可企勉所短而敵其所長必殆用所長而乘其短必安強者乃以水草為邑居以射獵供飲茹多馬而尤便馳突輕生而不恥敗亡此戎狄之所長也戎狄之所長乃中國之所短而欲益兵搜乘角力爭驅交鋒原野之間決命尋常之內以此為禦寇之術可謂勉所短而校其所長矣務所難勉所短勞費百倍終於無成雖果成之不挫則廢豈不以越天授而違地産虧時勢以反物宜者哉將欲去危就安息費從省在慎守所易精用所長而已若乃擇將吏以撫寧衆庶修紀律以訓齊師徒耀德以佐威能邇以柔遠禁侵抄之暴以彰吾信抑攻取之議以安戎心彼求和則善待而勿與結盟彼為寇則嚴備而不務報復此當今之所易也賤力而貴智惡殺而好生輕利而重人忍小以全大安其居而後動俟其時而後行是以修封疆守要害塹蹊隧壘軍營謹禁防明斥候務農以足食練卒以蓄威非萬全不謀非百克不鬬寇小至則張聲勢以遏其入寇大至則謀其人以邀其歸據險以乘之多方以誤之使其勇無所加衆無所用掠則靡獲攻則不能進有腹背受敵之虞退有首尾難救之患所謂乘其弊不戰而屈人之兵此中國之所長也我之所長乃戎狄之所短我之所易乃戎狄之所難以長制短則用力寡而見功多以易敵難則財不匱而事速就捨此不務而反為所乘斯謂倒持戈矛以鐏授寇者也今則皆務之矣猶且守封未固寇戎未懲者其病在於謀無定用衆無適從所任不必才才者不必任所聞不必實實者不必聞所信不必誠誠者不必信所行不必當當者未必行故令措置乖方課責虧度財匱於兵衆力分於將多怨生於不均機失於遙制臣請為陛下粗陳六者之失惟明主慎聽而熟察之臣聞工欲善其事必先利其器武欲勝其敵必先練其兵練兵之中所用復異用之於救急則權以紓難用之於暫敵則緩以應機故事有便宜而不拘常制謀有奇詭而不徇衆情進退死生唯將所命此所謂攻討之兵也用之於屯戍則事資可久勢異從權非物理所愜不寧非人情所欲不固夫人情者利焉則勸習焉則安保親戚則樂生顧家業則忘死故可以理術馭不可以法制驅此所謂鎮守之兵也夫欲備封疆禦戎狄非一朝一夕之事固當選鎮守之兵以置焉古之善選置者必量其性習辨其土宜察其伎能知其欲惡用其力而不違其性齊其俗而不易其宜引其善而不責其所不能禁其非而不處其所不欲而又類其部伍安其室家然後能使之樂其居定其志奮其氣勢結其恩情撫之以惠則感而不驕臨之以威則肅而不怨靡督課而人自為用弛禁防而衆自不攜故出則足兵居則足食守則固戰則強其術無他便於人情而已矣今者散徵士卒分戍邊陲更代往來以為守備是則不量性習不辨土宜邀其所不能強其所不欲求廣其數而不考其用將致其力而不察其情斯可以為羽衛之儀而無益於備禦之實也何者窮邊之地千里蕭條寒風裂膚驚沙慘目與豺狼為鄰伍以戰鬬為嬉遊晝則荷戈而耕夜則倚烽而覘日有剽害之慮永無休暇之娛地惡人勤於斯為甚自非生於其域習於其風幼而覩焉長而安焉不見樂土而遷焉則罕能寧其居而狎其敵也關東之地百物阜殷從軍之徒尤被優養慣於溫飽狎於歡康比諸邊隅若異天地聞絶塞荒陬之苦則辛酸動容聆強蕃徑虜之名則懾駭奪氣而乃使之去親族捨園廬甘其所辛酸抗其所懾駭將冀為用不亦疏乎矧又其休代之期無統帥之馭資奉若驕子姑息如倩人進不邀之以成功退不處之以嚴憲其來也咸負得色其止也莫有固心屈指計歸張頤待飼徼幸者猶患還期之賒緩常念戎醜之充斥王師挫傷則將乘其亂離布路東潰情志且爾得之奚為平居則殫耗資儲以奉浮冗之衆臨難則拔棄城鎮以搖遠近之心其弊豈惟無益哉固亦將有所撓也復有抵犯刑禁謫徙軍城意欲增戶實邊兼令展效自贖既是無良之類且加懷土之情思亂幸災又甚戍卒適足煩於防衛諒無望於功庸雖前代時或行之固非良算之可遵者也復有擁旄之帥身不臨邊但分偏師俾守疆埸大抵軍中壯鋭元戎例選自隨委其疲羸乃配諸鎮節將既居內地精兵祗備紀綱遂令守要禦衝常在寡弱之輩寇戎每至乃勢不支入壘者才足閉關在野者悉遭劫執恣其芟蹂盡其搜驅比及都府聞知虜已克獲旋返且安邊之本所切在兵理兵若斯可謂措置乖方矣夫賞以存勸罰以示懲勸以懋有庸懲以威不恪故賞罰之於馭衆也猶繩墨之於曲直權衡之揣重輕輗軏之所以行車銜勒之所以服馬也馭衆而不用賞罰則善惡相混而能否莫殊用之而不當功過則姦妄寵榮而忠實擯抑夫如是若聰明可衒律度無章則用與不用其弊一也自頃權移於下柄失於朝將之號令既鮮克行之於軍國之典章又不能施之於將務相遵養苟度歲時欲賞一有功翻慮無功者反側欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使忘身效節者獲誚於等夷率衆先登者取怨於士卒僨軍蹙國者不懷於愧畏緩救失期者自以為智能褒貶既闕而不行稱毀復紛然相亂人雖欲善誰為言之況又公忠者直己而不求於人反罹困厄敗撓者行私而苟媚於衆例獲優崇此義士所以痛心勇夫所以解體也又有遇敵而所守不固陳謀而其效靡成將帥則以資糧不足為詞有司復以供給無闕為解既相執證理合辨明朝廷每為含糊未嘗窮究曲直措理者吞聲而靡訴誣善者罔上而不慚馭衆若斯可謂課責虧度矣課責虧度措置乖方將不得竭其材卒不得盡其力屯集雖衆戰陳莫前虜每越境橫行若涉無人之地遞相推倚無敢誰何虛張賊勢上聞則曰兵少不敵朝廷莫之省察惟務徵發益師無裨備禦之功重增供億之弊閭井日耗徵求日繁以編戶傾家破産之資兼有司榷鹽稅酒之利總其所入半以事邊制用若斯可謂財匱於兵衆矣今四夷之最強盛為中國甚患者莫大於吐蕃舉國勝兵之徒才當中國十數大郡而已其於內虞外備亦與中國不殊所能寇邊數則蓋寡且又器非犀利甲不堅完識迷韜鈐藝乏趫敏動則中國畏其衆而不敢抗靜則中國憚其強而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥專一故也夫統帥專則人心不分人心不分則號令不二號令不二則進退可齊進退可齊則疾徐如意疾徐如意則機會靡愆機會靡愆則氣勢自壯斯乃以少為衆以弱為強變化翕闢在於反掌之內是猶臂之使指心之制形若所任得人則何敵之有夫節制多門則人心不一人心不一則號令不行號令不行則進退難必進退難必則疾徐失宜疾徐失宜則機會不及機會不及則氣勢自衰斯乃勇廢為尪衆散為弱逗撓離析兆乎戰陳之前是猶一國三公十羊九牧欲令齊肅其可得乎開元天寶之間控禦西北兩蕃唯朔方河西隴右三節度而已猶慮權分勢散或使兼而領之中興已來未遑外討橋隸四鎮於安定權附隴右於扶風所當西北兩蕃亦朔方涇原隴右河東節度而已關東戍卒至則屬焉雖委任未盡得人而措置尚存典制自頃逆泚誘涇隴之衆叛懷光汙朔方之軍割裂誅鋤所餘無幾而又分朔方之地建牙擁節者凡三使焉其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相稟屬每俟邊書告急方令計會用兵既無軍法下臨唯以客禮相待是乃從容拯溺揖讓救焚冀無阽危固亦難矣夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邊備勢弱氣消建軍若斯可謂力分於將多矣理戎之要最在均齊故軍法無貴賤之差軍實無多少之異是將所以同其志而盡其力也如或誘其志意勉其藝能則當閲其材程其勇校其勞逸度其安危明申練核優劣之科以為衣食等級之制使能者企及否者息心雖有薄厚之殊而無觖望之釁蓋所謂日省月試餼稟均事如權量之無情於物萬人莫不安其分而服其平也今者窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇角其所能則練習度其所處則孤危考其服役則勞察其臨敵則勇然衣糧所給唯止當身例為妻子所分常有凍餒之色而關東戍卒歲月踐更不安危城不習戎備怯於應敵懈於服勞然衣糧所頒厚踰數等繼以茶藥之饋益以蔬醬之資豐約相形懸絶斯甚又有素非禁旅本是邊軍將校詭為媚詞因請遙隸神策不離舊所唯改虛名其於稟賜之饒遂有三倍之益此儔類所以忿恨忠良所以憂嗟疲人所以流亡經費所以褊匱夫事業未異而給養有殊人情之所不能甘也況乎矯佞行而稟賜厚績藝劣而衣食優苟未忘懷能無慍怒不為戎首則已可嘉而欲使其叶力同心以攘寇難雖有韓白孫吳之將臣知其必不能焉養士若斯可謂怨生於不均矣凡欲選任將帥必先考察行能然後指以所授之方語以所委之事令其自揣可否自陳規模須某色甲兵藉某人參佐要若干士馬用若干資糧某處置軍某時成績始終要領悉俾經綸於是觀其計謀校其聲實若謂材無足取言不可行則當退之於初不宜貽慮於其後也若謂志氣足任方略可施則當要之於終不宜掣肘於其間也夫如是則疑者不使使者不疑勞神於選才端拱於委任既委其事既足其求然後可以核其否臧行其賞罰受賞者不以為濫當罰者無得而辭付授之柄既專苟且之心自息是以古之遣將帥者君親推轂而命之曰自閫以外將軍裁之又賜鈇鉞示令專斷故軍容不入國國容不入軍將在軍君命有所不受誠謂機宜不可以遠決號令不可以兩從未有委任不專而望其克敵成功者也自頃邊軍去就裁斷多出宸衷選置戎臣先求易制多其部以分其力輕其任以弱其心雖有所懲亦有所失遂令分閫責成之義廢死綏任咎之志衰一則聽命二亦聽命爽於軍情亦聽命乖於事宜亦聽命若所置將帥必取於承順無違則如斯可矣若有意平凶靖難則不可夫兩境相接兩軍相持事機之來間不容息蓄謀而俟猶恐失之臨時始謀固已疏矣況乎千里之遠九重之深陳述之難明聽覽之不一欲其事無遺策雖聖者亦有所不能焉設使謀慮能周其如權變無及戎虜馳突迅如風驛書上聞旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師逗留之間寇已奔逼託於救援未至各且閉壘自全牧馬屯牛鞠為椎剽穡夫樵婦罄作俘囚雖詔諸鎮發兵唯以虛聲應援互相瞻顧莫敢遮邀賊既縱掠退歸此乃陳功告捷其敗喪則減百而為一其捃獲則張百而成千將帥既幸於總制在朝不憂於罪纍陛下又以為大權由己不究事情用師若斯可謂機失於遙制矣理兵而措置乖方馭將而賞罰虧度制用而財匱建兵而力分養士而怨生用師而機失此六者疆埸之蟊賊軍旅之膏肓也蟊賊不除而但滋之以糞溉膏肓不療而唯啖之以滑甘適足以養其害速其災欲求稼穡豐登膚革充美固不可得也臣愚謂宜罷諸道將士番替防秋之制率因舊數而三分之其一分委本道節度使募少壯願住邊城者以徙焉其一分則本道但供衣糧委關內河東諸軍州募蕃漢子弟願傅邊軍者以給焉又一分亦令本道但出衣糧加給應募之人以資新徙之業又令度支散於諸道和市耕牛兼雇召工人就諸軍城繕造器具募人至者每家給耕牛一頭又給田農水火之器皆令充備初到之歲與家口二人糧並賜種子勸之播植待經一稔俾自給家若有餘糧官為收糴各酬倍價務奬營田既息踐更徵發之煩且無幸災苟免之弊寇至則人自為戰時至則家自力農是乃兵不得不強食不得不足與夫倏來忽往豈可同等而論哉臣又謂宜擇文武能臣一人為隴右元帥應涇隴鳳翔長武城山南西道等節度管內兵馬悉以屬焉又擇一人為朔方元帥應鄜坊邠寧靈夏等節度管內兵馬悉以屬焉又擇一人為河東元帥河東振武等節度管內兵馬悉以屬焉三帥各選臨邊要會之州以為理所見置節度有非要者隨所便近而併之唯元帥得置統軍餘並停罷其三帥部內太原鳳翔等府及諸郡戶口稍多者慎揀良吏以為尹守外奉師律內課農桑俾為軍糧以壯戎府理兵之宜既得選帥之授既明然後減姦濫虛浮之費以豐財定衣糧等級之制以和衆弘委任之道以宣其用懸賞罰之典以考其成而又慎守中國之所長謹行當今之所易則八利可致六失可除如是而戎狄不威懷疆埸不寧謐者未之有也諸侯軌道庶類服從如是而教令不行天下不理者亦未之有也以陛下之英鑒民心之思安四方之小休兩寇之方靜加以頻年豐稔所在積糧此皆天贊國家可以立制垂統之時也時不久居事不常兼已過而追雖悔無及明主者不以言為罪不以人廢言罄陳狂愚惟所省擇德宗極深嘉納優詔褒奬之贄在中書政不便於時者多所條奏德宗雖不能皆可而心頗重之初竇參既貶郴州節度使劉士寧餉參絹數千匹湖南觀察使李巽與參有隙具事奏聞德宗不悅會右庶子薑公輔於上前聞奏稱竇參嘗語臣云陛下怒臣未已德宗怒再貶參竟殺之時議云公輔奏竇參語得之於贄云參之死贄有力焉又素惡于公異于邵既輔政而逐之談者亦以為厄戶部侍郎判度支裴延齡姦宄用事天下嫉之如讎以得幸於天子無敢言者贄獨以身當之屢於延英面陳其不可纍上疏極言其弊延齡日加譖毀十年十二月除太子賓客罷知政事贄性畏慎及策免私居朝謁之外不通賓客無所過從十一年春旱邊軍芻粟不給具事論訴延齡言贄與張滂李充等搖動軍情語在延齡傳德宗怒將誅贄等四人會諫議大夫陽城等極言論奏乃貶贄為忠州別駕贄初入翰林特承德宗異顧歌詩戲狎朝夕陪遊及出居艱阻之中雖有宰臣而謀猷參決多出於贄故當時目為內相從幸山南道途艱險扈從不及與帝相失一夕不至上喻軍士曰得贄者賞千金翌日贄謁見上喜形顏色其寵待如此既與二吳不協漸加浸潤恩禮稍薄及通玄敗上知誣枉遂復見用贄以受人主殊遇不敢愛身事有不可極言無隱朋友規之以為太峻贄曰吾上不負天子下不負吾所學不恤其他精於吏事斟酌決斷不失錙銖嘗以詞詔所出中書舍人之職軍興之際促迫應務權令學士代之朝野乂寧合歸職分其命將相制詔却付中書行遣又言學士私臣玄宗初令待詔止於唱和文章而已物議是之德宗以贄指斥通微通玄故不可其奏贄在忠州十年常閉關靜處人不識其面復避謗不著書家居瘴鄉人多癘疫乃抄撮方書為陸氏集驗方五十卷行於代初贄秉政貶駕部員外郎李吉甫為明州長史量移忠州刺史贄在忠州與吉甫相遇昆弟門人咸為贄而吉甫欣然厚禮都不銜前事以宰相禮事之猶恐其未信不安日與贄相狎若平生交契者贄初猶慚懼後乃深交時論以吉甫為長者後有薛延者代吉甫為刺史延朝辭日德宗令宣旨慰安而韋臯纍上表請以贄代己順宗即位與陽城鄭餘慶同詔徵還詔未至而贄卒時年五十二贈兵部尚書諡曰宣子簡禮登進士第纍辟使府史臣曰近代論陸宣公比漢之賈誼而高邁之行剛正之節經國成務之要激切仗義之心初蒙天子重知末塗淪躓皆相類也而誼止中大夫贄及台鉉不為不遇矣昔公孫鞅挾三策説秦王淳于髠以隱語見齊君從古以還正言不易昔周昭戒急論議正為此也贄居珥筆之列調飪之地欲以片心除衆弊獨手遏羣邪君上不亮其誠羣小共攻其短欲無放逐其可得乎詩稱其維哲人告之話言又有誨爾聽我之恨此皆賢人君子歎言不見用也故堯咨禹拜千載一時攜手提耳豈容易哉贊曰良臣悟主我有嘉猷多僻之君為善不周忠言救失啓沃曰讎勿貽天問蒼昊悠悠
