body:
  text: 舊唐書卷七十九列傳第二十九祖孝孫傅仁均傅奕李淳風呂才祖孝孫幽州范陽人也父崇儒以學業知名仕至齊州長史孝孫博學曉曆算早以達識見稱初開皇中鍾律多缺雖何妥鄭譯蘇䕫萬寶常等亟共討詳紛然不定及平江左得陳樂官蔡子元于普明等因置清商署時牛弘為太常卿引孝孫為協律郎與子元普明參定雅樂時又得陳陽山太守毛爽妙知京房律法布琯飛灰順月皆驗爽時年老弘恐失其法於是奏孝孫從其受律孝孫得爽之法一律而生五音十二律而為六十音因而六之故有三百六十音以當一歲之日又祖述沈重依淮南本數用京房舊術求之得三百六十律各因其月律而為一部以律數為母以一中氣所有日為子以母命子隨所多少分直一歲以配七音起于冬至以黃鍾為宮太蔟為商林鍾為徵南呂為羽姑洗為角應鍾為變宮蕤賓為變徵其餘日建律皆依運行每日各以本律為宮旋宮之義由斯著矣然牛弘既初定樂難復改張至大業時又採晉宋舊樂唯奏皇夏等十有四曲旋宮之法亦不施用高祖受禪擢孝孫為著作郎歷吏部郎太常少卿漸見親委孝孫由是奏請作樂時軍國多務未遑改創樂府尚用隋氏舊文武德七年始命孝孫及祕書監竇璡修定雅樂孝孫又以陳梁舊樂雜用吳楚之音周齊舊樂多涉胡戎之伎於是斟酌南北考以古音作大唐雅樂以十二月各順其律旋相為宮制十二樂合三十二曲八十四調事具樂志旋宮之義亡絶已久世莫能知一朝復古自孝孫始也孝孫尋卒其後協律郎張文收復採三禮增損樂章然因孝孫之本音傅仁均滑州白馬人也善曆算推步之術武德初太史令庾儉太史丞傅奕表薦之高祖因召令改修舊曆仁均因上表陳七事其一曰昔洛下閎以漢武太初元年歲在丁丑創曆起元元在丁丑今大唐以戊寅年受命甲子日登極所造之曆即上元之歲歲在戊寅命日又起甲子以三元之法一百八十去其積歲武德元年戊寅為上元之首則合璧連珠懸合於今日其二曰堯典為日短星昴以正仲冬前代造曆莫能允合臣今創法五十餘年冬至輒差一度則却檢周漢千載無違其三曰經書日蝕毛詩為先十月之交朔日辛卯臣今立法却推得周幽王六年辛卯朔蝕即能明其中間並皆符合其四曰春秋命曆序云魯僖公五年壬子朔旦冬至諸曆莫能符合臣今造曆却推僖公五年正月壬子朔旦冬至則同自斯以降並無差爽其五曰古曆日蝕或在於晦或在二日月蝕或在望前或在望後臣今立法月有三大三小則日蝕常在於朔月蝕在望前却驗魯史並無違爽其六曰前代造曆命辰不從子半命度不起虛中臣今造曆命辰起子半度起於虛六度命合辰得中於子符陰陽之始會曆術之宜其七曰前代諸曆月行或有晦猶東見朔已西朓臣今以遲疾定朔永無此病經數月曆成奏上號曰戊寅元曆高祖善之武德元年七月詔頒新曆授仁均員外散騎常侍賜物二百段後中書令封德彝奏曆術差謬敕吏部郎中祖孝孫考其得失又太史丞王孝通執甲辰曆法以駁之曰案堯典云日短星昴以正仲冬孔氏云七宿畢見舉中者言耳是知中星無定故互舉一分兩至之星以為成驗也昴西方處中之宿虛為北方居中之星一分各舉中者即餘六星可知若乃仲春舉鳥仲夏舉火此一至一分又舉七星之體則餘二方可見今仁均專守昴中而為定朔執文害意不亦謬乎又案月令仲冬昏在東壁明知昴中則非常準若言陶唐之代定是昴中後代漸差遂至東壁然則堯前七千餘載冬至之日即便合翼中逾遠彌却尤成不隱且今驗東壁昏中日體在斗十有三度若昏於翼中日應在井十有三度夫井極北去人最近而斗極南去人最遠在井則大熱在斗乃大寒然堯前冬至即應翻熱及於夏至便應反寒四時倒錯寒暑易位以理推尋必不然矣又鄭康成博達之士也對弟子孫皓云日永星火只是大火之次三十度有其中者非謂心之火星也實正中也又平朔定朔舊有二家平望定望由來兩術然三大三小是定朔定望之法一大一小是平朔平望之義且日月之行有遲有疾每月一相及謂之合會故晦朔無定由人消息若定大小合朔者合會雖定而蔀元紀首三端並失若上合履端之始下得歸餘於終合會時有進退履端又皆允協則甲辰元曆為通術矣仁均對曰宋代祖沖之久立差術至於隋代張胄玄等因而修之雖差度不同各明其意今孝通不達宿度之差移未曉黃道之遷改乃執南斗為冬至之恆星東井為夏至之常宿率意生難豈為通理夫太陽行於宿度如郵傳之過逆旅宿度每歲既差黃道隨而變易豈得以膠柱之說而為斡運之難乎又案易云治曆明時禮云天子玄端聽朔於南門之外尚書云正月上日受終于文祖孔氏云上日朔日也又云季秋月朔辰不集于房孔氏云集合也不合則日蝕隨可知矣又云先時不及時皆殺無赦先時謂朔日不及時也若有先後之差是不知定朔之道矣詩云十月之交朔日辛卯又春秋日蝕三十有五左丘明云不書朔官失之也明聖人之教不論於晦唯取朔耳自春秋以後去聖久遠曆術差違莫能詳正故秦漢以來多非朔蝕而宋代御史中丞何承天微欲見意不能詳究乃為太史令錢樂之散騎侍郎皮延宗所抑止孝通今語乃是延宗舊辭承天既非甄明故有當時之屈今略陳梗概申以明之夫理曆之本必推上元之歲日月如合璧五星如連珠夜半甲子朔旦冬至自此以後既行度不同七曜分散不知何年更得餘分普盡還復總會之時也唯日分氣分得有可盡之理因其得盡即有三端之元故造經立法者小餘盡即為元首此乃紀其日數之元不關合璧之事矣時人相傳皆云大小餘俱盡即定夜半甲子朔旦冬至者此不達其意故也何者冬至自有常數朔名由於月起既月行遲疾無常三端豈得即合故必須日月相合與冬至同日者始可得名為合朔冬至耳故前代諸曆不明其意乃於大餘正盡之年而立其元法將以為常而知七曜散行氣朔不合今法唯取上元連珠合璧夜半甲子朔旦冬至合朔之始以定一九相因行至於今日常取定朔之宜不論三端之事皮延宗本來不知何承天亦自未悟何得引而相難耶孝孫以仁均之言為然貞觀初有益州人陰弘道又執孝通舊說以駁之終不能屈李淳風復駁仁均曆十有八事敕大理卿崔善為考二家得失七條改從淳風餘一十一條並依舊定仁均後除太史令卒官傅奕相州鄴人也尤曉天文曆數隋開皇中以儀曹事漢王諒及諒舉兵謂奕曰今茲熒惑入井是何祥也奕對曰天上東井黃道經其中正是熒惑行路所涉不為怪異若熒惑入地上井是為災也諒不悅及諒敗由是免誅徙扶風高祖為扶風太守深禮之及踐祚召拜太史丞太史令庾儉以其父質在隋言占候忤煬帝意竟死獄中遂懲其事又恥以數術進乃薦奕自代遂遷太史令奕既與儉同列數排毀儉而儉不之恨時人多儉仁厚而稱奕之率直奕所奏天文密狀屢會上旨置參旗井鉞等十二軍之號奕所定也武德三年進漏刻新法遂行於時七年奕上疏請除去釋教曰佛在西域言妖路遠漢譯胡書恣其假託故使不忠不孝削髮而揖君親遊手遊食易服以逃租賦演其妖書述其邪法僞啓三塗謬張六道恐嚇愚夫詐欺庸品凡百黎庶通識者稀不察根源信其矯詐乃追既往之罪虛規將來之福布施一錢希萬倍之報持齊一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章其有造作惡逆身墜刑網方乃獄中禮佛口誦佛經晝夜忘疲規免其罪且生死壽夭由於自然刑德威福關之人主乃謂貧富貴賤功業所招而愚僧矯詐皆云由佛竊人主之權擅造化之力其為害政良可悲矣案書云惟辟作福威惟辟玉食臣有作福作威玉食害于而家凶于而國人用側頗僻降自犧農至于漢魏皆無佛法君明臣忠祚長年久漢明帝假託夢想始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輒行髠髮之事洎于苻石羌胡亂華主庸臣佞政虐祚短皆由佛教致災也梁武齊襄足為明鏡昔褒姒一女妖惑幽王尚致亡國況天下僧尼數盈十萬翦刻繒綵裝束泥人而為厭魅迷惑萬姓者乎今之僧尼請令匹配即成十萬餘戶産育男女十年長養一紀教訓自然益國可以足兵四海免蠶食之殃百姓知威福所在則妖惑之風自革淳朴之化還興且古今忠諫鮮不及禍竊見齊朝章仇子他上表言僧尼徒衆糜損國家寺塔奢侈虛費金帛為諸僧附會宰相對朝讒毀諸尼依託妃主潛行謗讟子他竟被囚執刑於都市及周武平齊制封其墓臣雖不敏竊慕其蹤又上疏十一首詞甚切直高祖付羣官詳議唯太僕卿張道源稱奕奏合理中書令蕭瑀與之爭論曰佛聖人也奕為此議非聖人者無法請置嚴刑奕曰禮本於事親終於奉上此則忠孝之理著臣子之行成而佛踰城出家逃背其父以匹夫而抗天子以繼體而悖所親蕭瑀非出於空桑乃遵無父之教臣聞非孝者無親其瑀之謂矣瑀不能答但合掌曰地獄所設正為是人高祖將從奕言會傳位而止奕武德九年五月密奏太白見秦分秦王當有天下高祖以狀授太宗及太宗嗣位召奕賜之食謂曰汝前所奏幾纍於我然今後但須盡言無以前事為慮也太宗常臨朝謂奕曰佛道玄妙聖迹可師且報應顯然屢有徵驗卿獨不悟其理何也奕對曰佛是胡中桀黠欺誑夷狄初止西域漸流中國遵尚其教皆是邪僻小人模寫莊老玄言文飾妖幻之教耳於百姓無補於國家有害太宗頗然之貞觀十三年卒年八十五臨終誡其子曰老莊玄一之篇周孔六經之說是為名教汝宜習之妖胡亂華舉時皆惑唯獨竊歎衆不我從悲夫汝等勿學也古人裸葬汝宜行之奕生平遇患未嘗請醫服藥雖究陰陽數術之書而並不之信又嘗醉臥蹶然起曰吾其死矣因自為墓志曰傅奕青山白雲人也因酒醉死嗚呼哀哉其縱達皆此類注老子并撰音義又集魏晉已來駁佛教者為高識傳十卷行於世李淳風岐州雍人也其先自太原徙焉父播隋高唐尉以秩卑不得志棄官而為道士頗有文學自號黃冠子注老子撰方志圖文集十卷並行於代淳風幼俊爽博涉羣書尤明天文曆算陰陽之學貞觀初以駁傅仁均曆議多所折衷授將仕郎直太史局尋又上言曰今靈臺候儀是魏代遺範觀其制度疏漏實多臣案虞書稱舜在璿璣玉衡以齊七政則是古以混天儀考七曜之盈縮也周官大司徒職以土圭正日景以定地中此亦據混天儀日行黃道之明證也暨于周末此器乃亡漢孝武時洛下閎復造混天儀事多疏闕故賈逵張衡各有營鑄陸績王蕃遞加修補或綴附經星機應漏水或孤張規郭不依日行推驗七曜並循赤道今驗冬至極南夏至極北而赤道當定於中全無南北之異以測七曜豈得其真黃道渾儀之闕至今千餘載矣太宗異其說因令造之至貞觀七年造成其制以銅為之表𩹉三重下據準基狀如十字末樹鼇足以張四表焉第一儀名曰六合儀有天經雙規渾緯規金常規相結於四極之內備二十八宿十干十二辰經緯三百六十五度第二名三辰儀圓徑八尺有璿璣規黃道規月遊規天宿矩度七曜所行並備于此轉於六合之內第三名四遊儀玄樞為軸以連結玉衡遊筒而貫約規矩又玄樞北樹北辰南距地軸傍轉於內又玉衡在玄樞之間而南北遊仰以觀天之辰宿下以識器之晷度時稱其妙又論前代渾儀得失之差著書七卷名為法象志以奏之太宗稱善置其儀於凝暉閣加授承務郎十五年除太常博士尋轉太史丞預撰晉書及五代史其天文律曆五行志皆淳風所作也又預撰文思博要二十二年遷太史令初太宗之世有祕記云唐三世之後則女主武王代有天下太宗嘗密召淳風以訪其事淳風曰臣據象推算其兆已成然其人已生在陛下宮內從今不踰三十年當有天下誅殺唐氏子孫殲盡帝曰疑似者盡殺之如何淳風曰天之所命必無禳避之理王者不死多恐枉及無辜且據上象今已成復在宮內已是陛下眷屬更三十年又當衰老老則仁慈雖受終易姓其於陛下子孫或不甚損今若殺之即當復生少壯嚴毒殺之立讎若如此即殺戮陛下子孫必無遺類太宗善其言而止淳風每占候吉凶合若符契當時術者疑其別有役使不因學習所致然竟不能測也顯慶元年復以修國史功封昌樂縣男先是太史監候王思辨表稱五曹孫子十部算經理多踳駁淳風復與國子監算學博士梁述太學助教王真儒等受詔注五曹孫子十部算經書成高宗令國學行用龍朔二年改授祕閣郎中時戊寅曆法漸差淳風又增損劉焯皇極曆改撰麟德曆奏之術者稱其精密咸亨初官名復舊還為太史令年六十九卒所撰典章文物志乙巳占祕閣録并演齊民要術等凡十餘部多傳於代子諺孫仙宗並為太史令呂才博州清平人也少好學善陰陽方伎之書貞觀三年太宗令祖孝孫增損樂章孝孫乃與明音律人王長通白明達遞相長短太宗令侍臣更訪能者中書令溫彥博奏才聰明多能眼所未見耳所未聞一聞一見皆達其妙尤長於聲樂請令考之侍中王圭魏徵又盛稱才學術之妙徵曰才能為尺十二枚尺八長短不同各應律管無不諧韻太宗即徵才令直弘文館太宗嘗覽周武帝所撰三局象經不曉其旨太子洗馬蔡允恭年少時嘗為此戲太宗召問亦廢而不通乃召才使問焉才尋繹一宿便能作圖解釋允恭覽之依然記其舊法與才正同由是才遂知名纍遷太常博士太宗以陰陽書近代以來漸致訛僞穿鑿既甚拘忌亦多遂命才與學者十餘人共加刊正削其淺俗存其可用者勒成五十三卷并舊書四十七卷十五年書成詔頒行之才多以典故質正其理雖為術者所短然頗合經義今略載其數篇其宅經曰易曰上古穴居而野處後世聖人易以宮室蓋取諸大壯逮于殷周之際乃有卜宅之文故詩稱相其陰陽書云卜惟洛食此則卜宅吉凶其來尚矣至於近代師巫更加五姓之說言五姓者謂宮商角徵羽等天下萬物悉配屬之行事吉凶依此為法至如張王等為商武庾等為羽欲似同韻相求及其以柳姓為宮以趙姓為角又非四聲相管其間亦有同是一姓分屬宮商後有復姓數字徵羽不別驗於經典本無斯說諸陰陽書亦無此語直是野俗口傳竟無所出之處唯堪輿經黃帝對於天老乃有五姓之言且黃帝之時不過姬姜數姓暨於後代賜族者多至如管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇並是姬姓子孫孔殷宋華向蕭亳皇甫並是子姓苗裔自餘諸國準例皆然因邑因官分枝布葉未知此等諸姓是誰配屬又檢春秋以陳衛及秦並同水姓齊鄭及宋皆為火姓或承所出之祖或繫所屬之星或取所居之地亦非宮商角徵共相管攝此則事不稽古義理乖僻者也祿命曰謹案史記宋忠賈誼譏司馬季主云夫卜筮者高人祿命以悅人心矯言禍福以盡人財又案王充論衡云見骨體而知命祿覩命祿而知骨體此即祿命之書行之久矣多言或中人乃信之今更研尋本非實録但以積善餘慶不假建祿之吉積惡餘殃豈由劫殺之災皇天無親常與善人禍福之應其猶影響故有夏多罪天命剿絶宋景修德妖孛夜移學也祿在豈待生當建學文王勤憂損壽不關月值空亡長平坑卒未聞共犯三刑南陽貴士何必俱當六合歷陽成湖非獨河魁之上蜀郡炎燎豈由災厄之下今時亦有同年同祿而貴賤懸殊共命共胎而夭壽更異案春秋魯桓公六年七月魯莊公生今檢長曆莊公生當乙亥之歲建申之月以此推之莊公乃當祿之空亡依祿命書法合貧賤又犯勾絞六害背驛馬三刑當此生者並無官爵火命七月生當病鄉為人弱身合矬陋今案齊詩譏莊公猗嗟昌兮頎若長兮美目揚兮巧趨蹌兮唯有向命一條法當長命依檢春秋莊公薨時計年四十五矣此則祿命不驗一也又案史記秦莊襄王四十八年始皇帝生宋忠注云因正月生乃名政依檢襄王四十八年歲在壬寅此年正月生者命當背祿法無官爵假得祿合奴婢尚少始皇又當破驛馬三刑身剋驛馬法當望官不到金命正月生當絶下為人無始有終老而彌吉今檢史記始皇乃是有始無終老更彌凶唯建命生法合長壽計其崩時不過五十祿命不驗二也又漢武故事武帝以乙酉之歲七月七日平旦時生亦當祿空亡下法無官爵雖向驛馬尚隔四辰依祿命法少無官榮老而方盛今檢漢書武帝即位年始十六末年已後戶口減半祿命不驗三也又按後魏書云孝文皇帝皇興元年八月生今按長曆其年歲在丁未以此推之孝文皇帝背祿命并驛馬三刑身剋驛馬依祿命書法無官爵命當父死中生法當生不見父今檢魏書孝文皇帝身受其父顯祖之禪禮云嗣子位定於初喪踰年之後方始正號是以天子無父事三老也孝文受禪異於常禮躬率天下以事其親而祿命云不合識父祿命不驗四也又按沈約宋書云宋高祖癸亥歲三月生依此而推祿之與命並當空亡依祿命書法無官爵又當子墓中生唯宜嫡子假有次子法當早卒今檢宋書高祖長子先被篡弒次子義隆享國多年高祖又當祖祿下生法得嫡孫財祿今檢宋書其孫劉劭劉濬並為篡逆幾失宗祧祿命不驗五也葬書曰易曰古之葬者衣之以薪不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過禮云葬者藏也欲使人不得見之然孝經云卜其宅兆而安厝之以其顧復事畢長為感慕之所窀穸禮終永作魂神之宅朝市遷變不得豫測於將來泉石交侵不可先知於地下是以謀及龜筮庶無後艱斯乃備於慎終之禮曾無吉凶之義暨乎近代以來加之陰陽葬法或選年月便利或量墓田遠近一事失所禍及死生巫者利其貨賄莫不擅加妨害遂使葬書一術乃有百二十家各說吉凶拘而多忌且天覆地載乾坤之理備焉一剛一柔消息之義詳矣或成於晝夜之道感於男女之化三光運於上四氣通於下斯乃陰陽之大經不可失之於斯須也至於喪葬之吉凶乃附此為妖妄傳云王者七日而殯七月而葬諸侯五日而殯五月而葬大夫經時而葬士及庶人逾月而已此則貴賤不同禮亦異數欲使同盟同軌赴弔有期量事制宜遂為常式法既一定不得違之故先期而葬謂之不懷後期而不葬譏之殆禮此則葬有定期不擇年月一也春秋又云丁巳葬定公雨不克葬至於戊午襄事禮經善之禮記云卜葬先遠日者蓋選月終之日所以避不懷也今檢葬書以己亥之日用葬最凶謹按春秋之際此日葬者凡有二十餘件此則葬不擇日二也禮記又云周尚赤大事用平旦殷尚白大事用日中夏尚黑大事用昏時鄭玄注云大事者何謂喪葬也此則直取當代所尚不擇時之早晚春秋云鄭卿子産及子太叔葬鄭簡公於時司墓大夫室當葬路若壞其室即平旦而窆不壞其室即日中而窆子産不欲壞室欲待日中子太叔云若至日中而窆恐久勞諸侯大夫來會葬者然子産既云博物君子太叔乃為諸侯之選國之大事無過喪葬必是義有吉凶斯等豈得不用今乃不問時之得失唯論人事可否曾子問云葬逢日蝕捨於路左待明而行所以備非常也若依葬書多用乾艮二時並是近半夜此即文與禮違今檢禮傳葬不擇時三也葬書云富貴官品皆由安葬所致年命延促亦曰墳壠所招然今按孝經云立身行道則揚名於後世以顯父母易曰聖人之大寶曰位何以守位曰仁是以日慎一日則澤及於無疆苟德不建則而人無後此則非由安葬吉凶而論福祚延促臧孫有後於魯不關葬得吉日若敖絶祀於荊不由遷厝失所此則安葬吉凶不可信用其義四也今之喪葬吉凶皆依五姓便利古之葬者並在國都之北域兆既有常所何取姓墓之義趙氏之葬並在九原漢之山陵散在諸處上利下利蔑爾不論大墓小墓其義安在及其子孫富貴不絶或與三代同風或分六國而王此則五姓之義大無稽古吉凶之理何從而生其義五也且人臣名位進退何常亦有初賤而後貴亦有始泰而終否是以子文三已令尹展禽三黜士師卜葬一定更不回改冢墓既成曾不革易則何因名位無時暫安故知官爵弘之在人不由安葬所致其義六也野俗無識皆信葬書巫者詐其吉凶愚人因而徼幸遂使劈踊之際擇葬地而希官品荼毒之秋選葬時以規財祿或云辰日不宜哭泣遂莞爾而對賓客受弔或云同屬忌於臨壙乃吉服不送其親聖人設教豈其然也葬書敗俗一至於斯其義七也太宗又令才造方域圖及教飛騎戰陳圖皆稱旨擢授太常丞永徽初預修文思博要及姓氏録顯慶中高宗以琴曲古有白雪近代頓絶使太常增修舊曲才上言曰臣按禮記及家語云舜彈五弦之琴歌南風之詩是知琴操曲弄皆合於歌又張華博物志云白雪是天帝使素女鼓五十弦瑟曲名又楚大夫宋玉對襄王云有客於郢中歌陽春白雪國中和者數十人是知白雪琴曲本宜合歌以其調高人和遂寡自宋玉已來迄今千祀未有能歌白雪曲者臣今準敕依琴中舊曲定其宮商然後教習並合於歌輒以御製雪詩為白雪歌詞又案古今樂府奏正曲之後皆別有送聲君唱臣和事彰前史今取太尉長孫無忌僕射于志寧侍中許敬宗等奉和雪詩以為送聲合十六節今悉教訖並皆合韻高宗大悅更作白雪歌詞十六首付太常編於樂府時右監門長史蘇敬上言陶弘景所撰本草事多舛謬詔中書令許敬宗與才及李淳風禮部郎中孔志約并諸名醫增損舊本仍令司空李績總監定之并圖合成五十四卷大行於代才龍朔中為太子司更大夫麟德二年卒著隋記二十卷行於時子方毅七歲能誦周易毛詩太宗聞其幼敏召見甚奇之賜以縑帛後為右衛鎧曹參軍母終哀慟過禮竟以毀卒布車載喪隨母車而葬友人郎餘令以白粥玄酒生芻一束於路隅奠祭甚為時人之所哀惜史臣曰孝孫定音律仁均正曆數淳風候象緯呂才推陰陽訂於其倫咸以為裨梓京管之流也然旋宮三代之法秦火籍煬歷代缺其正音而云孝孫復始大可歎也淳風精於術數能知女主革命而不知其人則所未喻矣呂才核拘忌之曲學皆有經據不亦賢乎古人所以存而不議蓋有意焉贊曰祖傅淳才彰往考來裁筠嶰谷運箸清臺推迎斡運圖寫昭回重黎之後諸子賢哉
