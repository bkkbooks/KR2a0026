body:
  text: 舊唐書卷一百八十八列傳第一百三十八孝友李知本張志寬劉君良宋興貴張公藝附王君操周智壽智爽許坦王少玄附趙弘智陳集原元讓裴敬彝裴守真子子餘李日知崔沔陸南金弟趙璧張琇兄瑝梁文貞李處恭張義貞呂元簡附崔衍丁公著羅讓善父母為孝善兄弟為友夫善於父母必能隱身錫類仁惠逮于胤嗣矣善於兄弟必能因心廣濟德信被于宗族矣推而言之可以移於君施於有政承上而順下令終而善始雖蠻貊猶行焉雖窘迫猶亨焉自昔立身揚名未有不偕孝友而成者也前代史官所傳孝友傳多録當時旌表之士人或微細非衆所聞事出閭里又難詳究今録衣冠盛德衆所知者以為稱首至於州縣薦飾者必覆其殊尤可以勸世者亦載之李知本趙州元氏人後魏洛州刺史靈六世孫也父孝端隋獲嘉丞初孝端與族弟太沖俱有世閥而太沖官宦最高孝端方之為劣鄉族為之語曰太沖無兄孝端無弟知本頗涉經史事親至孝與弟知隱甚稱雍睦子孫百餘口財物僮僕纖毫無間隋末盜賊過其閭而不入因相誡曰無犯義門同時避難者五百餘家皆賴而獲免知本貞觀初官至夏津令知隱至伊闕丞知本孫瑱開元中為給事中揚州刺史知隱孫顒有文詞亦歷給事中太常少卿從祖兄弟凡為給事者四人張志寬蒲州安邑人隋末喪父哀毀骨立為州里所稱賊帥王君廓屢為寇掠聞其名獨不犯其閭鄰里賴之而免者百餘家後為里正詣縣稱母疾急求歸縣令問其狀對曰母嘗有所苦志寬亦有所苦向患心痛知母有疾令怒曰妖妄之辭也繫之於獄馳驗其母竟如所言令異之慰喻遣去及丁母憂負土成墳廬於墓側手植松柏千餘株高祖聞之遣使就弔授員外散騎常侍賜物四十段表其門閭劉君良瀛州饒陽人也纍代義居兄弟雖至四從皆如同氣尺布斗粟人無私焉大業末天下饑饉君良妻勸其分析乃竊取庭樹上鳥雛交置諸巢中令羣鳥鬬競舉家怪之其妻曰方今天下大亂爭鬬之秋禽鳥尚不能相容況於人乎君良從之分別後月餘方知其計中夜遂攬妻髮大呼曰此即破家賊耳召諸昆弟哭以告之是夜棄其妻更與諸兄弟同居處情契如初屬盜起閭里依之為堡者數百家因名為義成堡武德七年深州別駕楊弘業造其第見有六院唯一飼子弟數十人皆有禮節咨嗟而去貞觀六年詔加旌表又有宋興貴者雍州萬年人纍世同居躬耕致養至興貴已四從矣高祖聞而嘉之武德二年詔曰人稟五常仁義為重士有百行孝敬為先自古哲王經邦致治設教垂範皆尚於斯叔世澆訛人多僞薄修身克己事資誘勸朕恭膺靈命撫臨四海愍茲弊俗方思遷導宋興貴立操雍和志情友穆同居合爨纍代積年務本力農崇謙履順弘長名教敦勵風俗宜加褒顯以勸將來可表其門閭蠲免課役布告天下使明知之興貴尋卒鄆州壽張人張公藝九代同居北齊時東安王高永樂詣宅慰撫旌表焉隋開皇中大使邵陽公梁子恭亦親慰撫重表其門貞觀中特敕吏加旌表麟德中高宗有事泰山路過鄆州親幸其宅問其義由其人請紙筆但書百餘忍字高宗為之流涕賜以縑帛王君操萊州即墨人也其父隋大業中與鄉人李君則鬬競因被毆殺君操時年六歲其母劉氏告縣收捕君則棄家亡命追訪數年弗獲貞觀初君則自以世代遷革不慮國刑又見君操孤微謂其無復讎之志遂詣州府自首而君操密袖白刃刺殺之刳腹取其心肝噉食立盡詣刺史具自陳告州司以其擅殺戮問曰殺人償死律有明文何方自理以求生路對曰亡父被殺二十餘載聞諸典禮父讎不可同天早願圖之久而未遂常懼亡滅不展冤情今大恥既雪甘從刑憲州司據法處死列上其狀太宗特詔原免周智壽者雍州同官人其父永徽初被族人安吉所害智壽及弟智爽乃候安吉於途擊殺之兄弟相率歸罪於縣爭為謀首官司經數年不能決鄉人或證智爽先謀竟伏誅臨刑神色自若顧謂市人曰父讎已報死亦何恨智壽頓絶衢路流血遍體又收智爽尸取智爽血食之皆盡見者莫不傷焉豫州人許坦年十歲餘父入山採藥為猛獸所噬即號叫以杖擊之獸遂奔走父以得全太宗聞而謂侍臣曰坦雖幼童遂能致命救親至孝自中深可嘉尚授文林郎賜帛五十段博州聊城人王少玄者父隋末於郡西為亂兵所害少玄遺腹生年十餘歲問父所在其母告之因哀泣便欲求尸以葬時白骨蔽野無由可辨或曰以子血霑父骨即滲入焉少玄乃刺其體以試之凡經旬日竟獲父骸以葬盡體病瘡歷年方愈貞觀中本州聞薦拜徐王府參軍趙弘智洛州新安人後魏車騎大將軍肅孫父玄軌隋陝州刺史弘智早喪母事父以孝聞學通三禮史記漢書隋大業中為司隸從事武德初大理卿郎楚之應詔舉之授詹事府主簿又預修六代史初與祕書丞令狐德棻齊王文學袁朗等十數人同修藝文類聚轉太子舍人貞觀中纍遷黃門侍郎兼弘文館學士以疾出為萊州刺史弘智事兄弘安同於事父所得俸祿皆送于兄處及兄亡哀毀過禮事寡嫂甚謹撫孤姪以慈愛稱稍遷太子右庶子及宮廢坐除名尋起為光州刺史永徽初纍轉陳王師高宗令弘智於百福殿講孝經召中書門下三品及弘文館學士太學儒者並預講筵弘智演暢微言備陳五孝學士等難問相繼弘智酬應如響高宗怡然曰朕頗耽墳籍至於孝經偏所習覩然孝之為德弘益實深故云德教加於百姓刑于四海是知孝道之為大也顧謂弘智宜略陳此經切要者以輔不逮弘智對曰昔者天子有諍臣七人雖無道不失其天下微臣顓愚願以此言奏獻帝甚悅賜綵絹二百匹名馬一匹尋遷國子祭酒仍為崇賢館學士四年卒年八十二諡曰宣有文集二十卷陳集原瀧州開陽人也代為嶺表酋長父龍樹欽州刺史集原幼有孝行父才有疾即終日不食永徽中喪父嘔血數升枕服苫廬悲感行路資財田宅及僮僕三十餘人並以讓兄弟則天時官至左豹韜衛將軍元讓雍州武功人也弱冠明經擢第以母疾遂不求仕躬親藥膳承侍致養不出閭里者數十餘年及母終廬於墓側蓬髮不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭永淳元年巡察使奏讓孝悌殊異擢拜太子右內率府長史後以歲滿還鄉里鄉人有所爭訟不詣州縣皆就讓決焉聖曆中中宗居春宮召拜太子司議郎及謁見則天謂曰卿既能孝於家必能忠於國今授此職須知朕意宜以孝道輔弼我兒尋卒裴敬彝絳州聞喜人也曾祖子通隋開皇中太中大夫母終廬於墓側哭泣無節目遂喪明俄有白鳥巢於墳樹子通弟兄八人復以友悌著名詔旌表其門鄉人至今稱為義門裴氏敬彝少聰敏七歲解屬文性又端謹宗族咸重之號為甘露頂年十四侍御史唐臨為河北巡察使敬彝父智周時為內黃令為部人所訟敬彝詣臨論其冤臨大奇之因令作詞賦智周事得釋特表薦敬彝補陳王府典籤智周在官暴卒敬彝時在長安忽泣涕不食謂所親曰大人每有痛處吾即輒然不安今日心痛手足皆廢事在不測得無戚乎遂請急還倍道言歸果聞父喪羸毀逾禮事母復以孝聞乾封初纍轉監察御史時母病有醫人許仁則足疾不能乘馬敬彝每肩輿之以候母焉及母卒特詔贈以縑帛仍官造靈輿服闋拜著作郎兼修國史儀鳳中自中書舍人歷吏部侍郎左庶子則天臨朝為酷吏所陷配流嶺南尋卒裴守真絳州稷山人也後魏冀州刺史叔業六世孫也父大業中為淮南郡司戶屬郡人楊琳田瓚據郡作亂盡殺官吏以素有仁政相誡不許驚害仍令人護送及妻子還鄉貞觀中官至酇令守真早孤事母至孝及母終哀毀骨立殆不勝喪復事寡姊及兄甚謹閨門禮則士友所推初舉進士及應八科舉纍轉乾封尉屬永淳初關中大饑守真盡以祿俸供姊及諸甥身及妻子粗糲不充初無倦色尋授太常博士守真尤善禮儀之學當時以為稱職高宗時封嵩山詔禮官議射牲之事守真奏曰據周禮及國語郊祀天地天子自射其牲漢武唯封太山令侍中儒者射牲行事至於餘祀亦無射牲之文但親舂射牲雖是古禮久從廢省據封禪祀禮日未明十五刻宰人以鸞刀割牲質明而行事比鸞駕至時宰牲總畢天皇唯奠玉酌獻而已今祀前一日射牲事即傷早祀日方始射牲事又傷晚若依漢武故事即非親射之儀事不可行又神功破陳樂功成慶善樂二舞每奏上皆立對守真又議曰竊唯二舞肇興謳吟攸屬贊九功之茂烈叶萬國之歡心義均韶夏用兼賓祭皆祖宗盛德而子孫享之詳覽傳記未有皇王立觀之禮況升中大事華夷畢集九服仰垂拱之安百蠻懷率舞之慶甄陶化育莫匪神功豈於樂舞別申嚴敬臣等詳議奏二舞時天皇不合起立時並從守真議會高宗不豫事竟不行及高宗崩時無大行凶儀守真與同時博士韋叔夏輔抱素等討論舊事創為之當時稱為得禮之中守真天授中為司府丞則天特令推究詔獄務存平恕前後奏免數十家由是不合旨出為汴州司録纍轉成州刺史為政不務威刑甚為人吏所愛俄轉寧州刺史成州人送出境者數千人長安中卒子子餘事繼母以孝聞舉明經纍補鄠縣尉時同列李朝隱程行諶皆以文法著稱子餘獨以詞學知名或問雍州長史陳崇業子餘與朝隱行諶優劣崇業曰譬如春蘭秋菊俱不可廢也景龍中為左臺監察御史時涇岐二州有隋代蕃戶子孫數千家司農卿趙履溫奏悉沒為官戶奴婢仍充賜口以給貴幸子餘以為官戶承恩始為蕃戶又是子孫不可抑之為賤奏劾其事時履溫依附宗楚客等與子餘廷對曲直子餘詞色不撓履溫等詞屈從子餘奏為定開元初纍遷冀州刺史政存寬惠人吏稱之又為岐王府長史加銀青光祿大夫十四年卒諡曰孝子餘居官清儉友愛諸兄弟兄弟六人皆有志行次弟巨卿衛尉卿耀卿別有傳李日知鄭州滎陽人也舉進士天授中纍遷司刑丞時用法嚴急日知獨寬平無冤濫嘗免一死囚少卿胡元禮請斷殺之與日知往復至于數四元禮怒曰元禮不離刑曹此囚終無生理答曰日知不離刑曹此囚終無死法因以兩狀列上日知果直神龍初為給事中日知事母至孝時母老嘗疾病日知取急調侍數日而鬢髮變白尋加朝散大夫其母未受命婦邑號而卒將葬發引吏人賫告身而至日知於路上即時殞絶久之乃蘇左右皆哀慟莫能仰視巡察使衛州司馬路敬潛將聞其孝悌之跡使求其狀日知辭讓不報服闋纍遷黃門侍郎時安樂公主池館新成中宗親往臨幸從官皆預宴賦詩日知獨存規誡其末章曰所願暫思居者逸莫使時稱作者勞論者多之景雲元年同中書門下平章事轉御史大夫知政事如故明年進拜侍中先天元年轉刑部尚書罷知政事頻乞骸骨請致仕許之初日知將有陳請而不與妻謀歸家而使左右飾裝將出居別業妻驚曰家産屢空子弟名宦未立何為遽辭職也日知曰書生至此已過本分人情無厭若恣其心是無止足之日及歸田園不事産業但葺構池亭多引後進與之談宴開元三年卒初日知以官在權要諸子弟年才總角皆結婚名族時議以為失禮之中卒後少子伊衡以妾為妻費散田宅仍列訟諸兄家風替矣崔沔京兆長安人周隴州刺史士約玄孫也自博陵徙關中世為著姓父皚庫部員外郎汝州長史沔淳謹口無二言事親至孝博學有文詞初應制舉對策高第俄被落第者所援則天令所司重試沔所對策又工於前為天下第一由是大知名再轉陸渾主簿秩滿調遷吏部侍郎岑羲深賞重之謂人曰此今之郤詵也特表薦擢為左補闕纍遷祠部員外郎沔為人舒緩訥於造次當官正色未嘗撓沮睿宗時徵拜中書舍人時沔母老疾在東都沔不忍捨之固請閒官以申侍養由是改為虞部郎中無何檢校御史中丞時監察御史宋宣遠恃盧懷慎之親頗犯法沔舉劾之又姚崇之子光祿少卿彝留司東都頗通賓客廣納賄賂沔又將按驗其事姚盧時在政事遽薦沔有史才轉為著作郎其實去權也開元七年為太子左庶子母卒哀毀逾禮常於廬前受弔賓客未嘗至於靈座之室謂人曰平生非至親者未嘗升堂入謁豈可以存亡而變其禮也中書令張說數稱薦之服闋拜中書侍郎或謂沔曰今之中書皆是宰相承宣制命侍郎雖是副二但署位而已甚無事也沔曰不然設官分職上下相維各申所見方為濟理豈可俯默偷安而為懷祿士也自是每有制敕及曹事沔多所異同張說頗不悅焉尋出為魏州刺史奏課第一徵還朝廷分掌吏部十銓事以清直歷祕書監太子賓客二十四年制令禮官議加籩豆之數及服制之紀太常卿韋縚奏請君宗廟之奠每坐籩豆各十二外祖服請加至大功九月舅服加至小功五月堂姨堂舅舅母服請加至袒免時又令百官詳議可否沔建議曰竊聞識禮樂之情者能作達禮樂之文者能述述作之義聖賢所重禮樂之本古今所崇變而通之所以久也所謂變者變其文也所謂通者通其情也祭祀之興肇於太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麴糵汙樽抔飲則有玄酒之奠施及後王禮物漸備作為酒醴伏其犧牲以致馨香以極豐潔故有三牲八簋之盛五齊九獻之殷然以神道至玄可存而不可測也祭禮主敬可備而不敢廢也是以血腥爓熟玄樽犧象靡不畢登於明薦矣然而薦貴於新味不尚褻雖則備物猶存節制故禮云天之所生地之所長苟可薦者莫不咸在備物之情也三牲之俎八簋之實美物備矣昆蟲之異草木之實陰陽之物備矣此則節制之文也鉶俎籩豆簠簋樽罍之實皆周人之時饌也其用通於宴饗賓客而周公制禮咸與毛血玄酒同薦於先晉中郎盧諶近古之知禮著家祭禮者也觀其所薦皆晉時常食不復純用禮經舊文然則當時飲食不可闕於祭祀明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史於前典稽周漢之舊儀清廟時享禮饌畢陳用周制也而古式存焉園寢上食時膳具設遵漢法也而珍味極焉職貢來祭致遠物也有新必薦順時令也苑囿之內躬稼所收搜狩之時親發所中莫不割鮮擇美薦而後食盡誠敬也若此至矣復何加焉但當申敕有司祭如神在無或簡怠勗增虔誠其進貢珍羞或時物鮮美考諸祠典無有漏落皆詳名目編諸甲令因宜而薦以類相從則新鮮肥濃盡在是矣不必加於籩豆之數也至於祭器隨物所宜故太羹古食也盛於古器也和羹時饌也盛於鉶鉶時器也亦有古饌而盛於時器故毛血盛於盤玄酒盛於樽未有薦時饌而追用古器者由古質而今文便於事也雖加籩豆十二未足以盡天下美物而措諸清廟有兼倍之名近於侈矣魯人丹桓宮之楹又刻其桷春秋書以非禮御孫諫曰儉德之恭也侈惡之大也先君有恭德而君納諸惡無乃不可乎是不可以越禮而崇侈於宗廟也又據漢書藝文志墨家之流出於清廟是以貴儉由此觀之清廟之不尚於奢舊矣太常所請恐未可行又按太常奏狀今酌獻酒爵制度全小僅未一合執持甚難不可全依古制猶望稍須廣大者竊據禮文有以小為貴者獻以爵貴其小也小不及制敬而非禮是有司之失其傳也固可隨失釐正無待議而後革然禮失於敬猶奢而寧儉非大過也未知今制何所依準請兼詳令式據文而行又按太常奏狀外祖服請加至大功九月舅服請加至小功五月堂姨堂舅舅母請加至袒免者竊聞大道既隱天下為家聖人因之然後制禮禮教之設本於正家家道正而天下定矣正家之道不可以二總一之義理歸本宗所以父以尊崇母以厭降豈亡愛敬宜存倫序是以內有齊斬外服皆緦尊名所加不過一等此先王不易之道前聖所志後賢所傳其來久矣昔辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣往修新禮時改舊章漸廣渭陽之恩不遵洙泗之典及弘道之後唐元之間國命再移於外族矣禮亡徵兆倘或斯見天人之際可不戒哉開元初補闕盧履冰嘗進狀論喪服輕重敕令僉議于時羣議紛拿各安積習太常禮部奏依舊定陛下運稽古之明特降別敕一依古禮事符典故人知向方式固宗盟社稷之福更圖異議竊所未詳時職方郎中韋述戶部郎中楊伯成禮部員外郎楊冲昌監門兵曹劉秩等亦建議與沔相符俄又令中書門下參詳為定於是宗廟之典籩豆每座各加至六親姨舅為小功舅母加緦麻堂姨至袒免餘依舊定乃下制施行焉沔既善禮經朝廷每有疑議皆取決焉二十七年卒時年六十七贈禮部尚書陸南金蘇州吳郡人也祖士季從同郡顧野王學左氏傳兼通史記漢書隋末為越王侗記室兼侍讀侗稱制授著作郎時王世充將行篡奪侗不平之謂士季曰隋有天下三十餘載朝廷文武遂無烈者乎士季對曰見危授命臣之宿心請因其啓事便加手刃事頗泄遂停士季侍讀貞觀初為太學博士兼弘文館學士尋卒南金初為奉禮郎開元初太常少卿盧崇道犯罪流嶺表逃歸東都時南金以母喪在家崇道事急假稱弔賓造南金言其情南金哀而納焉崇道俄為讎人所發詔使侍御史王旭按其事遂捕獲崇道連引南金旭遂繩以重法南金弟趙璧詣旭自言藏崇道請代兄死南金固稱弟實自誣身請當罪兄弟讓死旭怪而問其故趙璧曰兄是長嫡又能幹家事亡母未葬小妹未嫁自惟幼劣生無所益身自請死旭遂列上狀上嘉其友義並特宥之南金由是大知名南金頗涉經史言行修謹左丞相張說及宗人太子少保象先皆欽重之纍轉庫部員外郎以疾固辭不堪繁劇轉為太子洗馬卒年五十餘張琇者蒲州解人也父審素為巂州都督在邊纍載俄有糾其軍中贓罪敕監察御史楊汪馳傳就軍按之汪在路為審素黨與所劫對汪殺告事者脅汪令奏雪審素之罪俄而州人翻殺審素之黨汪始得還至益州奏稱審素謀反因深按審素構成其罪斬之籍沒其家琇與兄瑝以年幼坐徙嶺外尋各逃歸纍年隱匿汪後纍轉殿中侍御史改名萬頃開元二十三年瑝琇候萬頃於都城挺刃殺之瑝雖年長其發謀及手刃皆琇為之既殺萬頃繫表於斧刃自言報讎之狀便逃奔將就江外殺與萬頃同謀構父罪者行至泛水為捕者所獲時都城士女皆矜琇等幼稚孝烈能復父讎多言其合矜恕者中書令張九齡又欲活之裴耀卿李林甫固言國法不可縱報讎上以為然因謂九齡等曰復讎雖禮法所許殺人亦格律具存孝子之情義不顧命國家設法焉得容此殺之成復讎之志赦之虧律格之條然道路喧議故須告示乃下敕曰張瑝等兄弟同殺推問款承律有正條俱各至死近聞士庶頗有喧詞矜其為父復讎或言本罪冤濫但國家設法事在經久蓋以濟人期於止殺各申為子之志誰非徇孝之夫展轉相繼相殺何限咎繇作士法在必行曾參殺人亦不可恕不能加以刑戮肆諸市朝宜付河南府告示決殺瑝琇既死士庶咸傷愍之為作哀誄榜於衢路市人斂錢於死所造義井并葬瑝琇於北邙又恐萬頃家人發之并作疑冢數所其為時人所傷如此梁文貞虢州閿鄉人少從征役比回而父母皆卒文貞恨不獲終養乃穿壙為門磴道出入晨夕灑掃其中結廬墓側未嘗暫離自是不言三十年家人有所問但畫字以對其後山水衝斷驛路更於原上開道經文貞墓前由是行旅見之遠近莫不欽歎有甘露降塋前樹白兔馴擾鄉人以為孝感所致開元初縣令崔季友刊石以紀之十四年刺史許景先奏文貞孝行絶倫泣血廬墓三十餘年請宣付史官是歲御史大夫崔隱甫廷奏恆州鹿泉人李處恭張義貞兩家祖父自國初已來異姓同居至今三代百有餘年又青州北海人呂元簡四代同居至所畜牛馬羊狗皆異母共乳請加旌表仍編入史館制皆許之崔衍左丞倫之子繼母李氏不慈於衍衍時為富平尉倫使于吐蕃久方歸李氏衣弊衣以見倫倫問其故李氏稱自倫使于蕃中衍不給衣食倫大怒召衍責詬命僕隸拉于地袒其背將鞭之衍涕泣終不自陳倫弟殷聞之趨往以身蔽衍杖不得下因大言曰衍每月俸錢皆送嫂處殷所具知何忍乃言衍不給衣食倫怒乃解由是倫遂不聽李氏之譖及倫卒衍事李氏益謹李氏所生子郃每多取子母錢使其主以契書徵負于衍衍歲為償之故衍官至江州刺史而妻子衣食無所餘後歷蘇虢二州刺史虢居陝華二州之間而稅重數倍其青苗錢華陝之郊畝出十有八而虢之郊每徵十之七衍乃上其事時裴延齡領度支方務聚斂乃紿衍以前後剌史無言者衍又上陳人困曰臣所治多是山田且當郵傳衝要屬歲不登頗甚流離舊額賦租特望蠲減臣伏見比來諸郡論百姓間事患在長吏因循不為申請不詣實不患朝廷不矜放有以不言受譴者未有言而獲罪者陛下拔臣牧大郡委臣撫疲民臣所以不敢顧望苟求自安敢罄狂瞽上干聖覽帝以衍詞理切直乃特敕度支令減虢州青苗錢遷宣歙池觀察使政務簡便人頗懷之其所擇從事多得名流時有位者待賓僚率輕傲衍獨加禮敬幕中之士後多顯達貞元中天下好進奉以結主恩徵求聚斂州郡耗竭韋臯劉贊裴肅為之首贊死而衍代其位衍雖不能驟革其弊居宣州十年頗勤儉府庫盈溢及穆贊代衍宣州歲饉遂以錢四十二萬貫代百姓稅故宣州人不至流散貞元二十一年詔加工部尚書丁公著字平子蘇州吳郡人祖衷父緒皆不仕公著生三歲喪所親七歲見鄰母抱其子哀感不食因請於父絶粒奉道冀其幽贊父憫而從之年十七父勉令就學年二十一五經及第明年又通開元禮授集賢校書郎秩未終歸侍鄉里不應請辟居父喪躬負土成墳哀毀之容人為憂之里閭聞風皆敦孝悌觀察使薛蘋表其行詔賜粟帛旌其門閭淮南節度使李吉甫慕其才行薦授太子文學兼集賢殿校理吉甫自淮南入相廷薦其行即日授右補闕遷集賢直學士尋授水部員外郎充皇太子及諸王侍讀著皇太子及諸王訓十卷轉駕部員外仍兼舊職穆宗即位未及聽政召居禁中詢訪朝典以宰相許之公著陳情詞意極切超授給事中賜紫金魚袋未幾遷工部侍郎仍兼集賢殿學士寵青宮之舊也知吏部選事公著知將欲大用以疾辭退因求外官遂授浙江西道都團練觀察使二年授河南尹皆以清靜為理改尚書右丞轉兵部吏部侍郎遷禮部尚書翰林侍講學士上以浙西災寇詢求良帥命檢校戶部尚書領之詔賜米七萬石以賑給浙民賴之改授太常卿以疾請歸鄉里未至而終年六十四贈右僕射廢朝一日著禮志十卷公著清儉守道每得一官未嘗不憂色滿容年四十四喪室以至終身無妓妾聲樂之好凶問至日中外痛惜之羅讓字景宣祖懷操父珦官至京兆尹讓少以文學知名舉進士應詔對策高等為咸陽尉丁父憂服除尚衣麻茹菜不從四方之辟者十餘年李鄘為淮南節度使就其所居請為從事除監察御史轉殿中歷尚書郎給事中纍遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓問其所因曰本某等家人兄姊九人皆為官所賣其留者唯老母耳讓慘然焚其券書以女奴歸其母入為散騎常侍未幾除江西都團練觀察使兼御史大夫年七十一卒贈禮部尚書子劭京字子峻進士擢第又登科讓再從弟詠詠子劭權字昭衡進士擢第劭京劭權知名於時並歷清貫贊曰麒麟鳳凰飛走之類唯孝與悌亦為人瑞表門賜爵勸乃錫類彼禽者梟傷仁害義
