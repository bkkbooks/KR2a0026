body:
  text: 舊唐書卷六本紀第六則天皇后則天皇后武氏諱曌并州文水人也父士彠隋大業末為鷹揚府隊正高祖行軍於汾晉每休止其家義旗初起從平京城貞觀中纍遷工部尚書荊州都督封應國公初則天年十四時太宗聞其美容止召入宮立為才人及太宗崩遂為尼居感業寺大帝於寺見之復召入宮拜昭儀時皇后王氏良娣蕭氏頻與武昭儀爭寵互讒毀之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃為皇后高宗稱天皇武后亦稱天后后素多智計兼涉文史帝自顯慶已後多苦風疾百司表奏皆委天后詳決自此內輔國政數十年威勢與帝無異當時稱為二聖弘道元年十二月丁巳大帝崩皇太子顯即位尊天后為皇太后既將篡奪是日自臨朝稱制庚午加授澤州刺史韓王元嘉為太尉豫州刺史滕王元嬰為開府儀同三司絳州刺史魯王靈夔為太子太師相州刺史越王貞為太子太傅安州都督紀王慎為太子太保元嘉等地尊望重恐其生變故進加虛位以安其心甲戌劉仁軌為尚書左僕射岑長倩為兵部尚書魏玄同為黃門侍郎並依舊知政事劉齊賢為侍中裴炎為中書令嗣聖元年春正月甲申朔改元二月戊午廢皇帝為廬陵王幽于別所仍改賜名哲己未立豫王輪為皇帝令居於別殿大赦天下改元文明皇太后仍臨朝稱制庚午廢皇太孫重照為庶人太常卿兼豫王府長史王德真為侍中中書侍郎豫王府司馬劉褘之同中書門下三品三月庶人賢死于巴州夏四月滕王元嬰薨改封畢王上金為澤王葛王素節為許王丁丑遷廬陵王哲於均州閏五月禮部尚書武承嗣同中書門下三品秋七月突厥骨咄祿元珍寇朔州命左威衛大將軍程務挺拒之彗星見西北方長二丈餘經三十三日乃滅九月大赦天下改元為光宅旗幟改從金色飾以紫畫以雜文改東都為神都又改尚書省及諸司官名初置右肅政御史臺官員故司空李績孫柳州司馬徐敬業僞稱揚州司馬殺長史陳敬之據揚州起兵自稱上將以匡復為辭冬十月楚州司馬李崇福率所部三縣以應敬業命左玉鈐衛大將軍李孝逸為大總管率兵三十萬以討之殺內史裴炎丁酉追削敬業父祖官爵復其本姓徐氏十二月前中書令薛元超卒殺左威衛大將軍程務挺垂拱元年春正月以敬業平大赦天下改元劉仁軌薨三月遷廬陵王哲於房州頒下親撰垂拱格於天下夏四月內史騫味道左授青州刺史五月秋官尚書裴居道為內史納言王德真配流象州冬官尚書蘇良嗣為納言詔內外文武九品已上及百姓咸令自舉是夏大旱二年春正月皇太后下詔復政於皇帝以皇太后既非實意乃固讓皇太后仍依舊臨朝稱制大赦天下初令都督刺史並準京官帶魚三月初置匭於朝堂有進書言事者聽投之由是人間善惡事多所知悉夏四月岑長倩為內史六月蘇良嗣為文昌左相天官尚書韋待價為文昌右相並同鳳閣鸞臺三品右肅政御史大夫韋思謙為納言三年春正月封皇子成義為恆王隆基為楚王隆範為衛王隆業為趙王二月韋思謙請致仕許之夏四月裴居道為納言夏官侍郎張光輔為鳳閣侍郎同鳳閣鸞臺平章事庚午劉褘之賜死於家秋八月地官尚書魏玄同檢校納言四年春二月毀乾元殿就其地造明堂山東河南甚飢乏詔司屬卿王及善司府卿歐陽通冬官侍郎狄仁傑巡撫賑給夏四月魏王武承嗣僞造瑞石文云聖母臨人永昌帝業令雍州人唐同泰表稱獲之洛水皇太后大悅號其石為寶圖擢授同泰游擊將軍五月皇太后加尊號曰聖母神皇秋七月大赦天下改寶圖曰天授聖圖封洛水神為顯聖加位特進并立廟就水側置永昌縣天下大酺五日八月壬寅博州刺史琅邪王沖據博州起兵命左金吾大將軍丘神績為行軍總管討之庚戌沖父豫州刺史越王貞又舉兵於豫州與沖相應九月命內史岑長倩鳳閣侍郎張光輔左監門大將軍鞠崇裕率兵討之丙寅斬貞及沖等傳首神都改姓為虺氏曲赦博州韓王元嘉魯王靈夔元嘉子黃國公撰靈夔子左散騎常侍范陽王藹霍王元軌及子江都王緒故虢王元鳳子東莞公融坐與貞通謀元嘉靈夔自殺元軌配流黔州撰等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年幼者咸配流嶺外誅其親黨數百餘家十二月己酉神皇拜洛水受天授聖圖是日還宮明堂成永昌元年春正月神皇親享明堂大赦天下改元大酺七日三月張光輔為內史武承嗣為納言夏四月誅蔣王惲道王元慶徐王元禮曹王明等諸子孫徙其家屬於巂州五月命文昌右相韋待價為安息道大總管以討吐蕃六月令文武官五品已上各舉所知秋七月紀王慎被誣告謀反載以檻車流于巴州改姓虺氏韋待價坐遲留不進士卒多飢饉而死配流繡州八月左肅政御史大夫王本立同鳳閣鸞臺三品辛巳誅內史張光輔九月納言魏玄同賜死于家冬十月春官尚書范履冰鳳閣侍郎邢文偉並同鳳閣鸞臺平章事改羽林軍百騎為千騎載初元年春正月神皇親享明堂大赦天下依周制建子月為正月改永昌元年十一月為載初元年正月十二月為臘月改舊正月為一月大酺三日神皇自以曌字為名遂改詔書為制書春一月蘇良嗣為特進武承嗣為文昌左相岑長倩為文昌右相裴居道為太子少傅並依舊同鳳閣鸞臺三品鳳閣侍郎武攸寧為納言邢文偉為內史秋七月殺豫章王亶遷其父舒王元名於和州有沙門十人僞撰大雲經表上之盛言神皇受命之事制頒於天下令諸州各置大雲寺總度僧千人丁亥殺隨州刺史澤王上金舒州刺史許王素節并其子數十人九月九日壬午革唐命改國號為周改元為天授大赦天下賜酺七日乙酉加尊號曰聖神皇帝降皇帝為皇嗣丙戌初立武氏七廟於神都追尊神皇父贈太尉太原王士彠為孝明皇帝兄子文昌左相承嗣為魏王天官尚書三思為梁王堂姪懿宗等十二人為郡王司賓卿史務滋為納言鳳閣侍郎宗秦客為內史給事中傅游藝為鸞臺侍郎仍依舊知鳳閣鸞臺平章事令史務滋等十人分道存撫天下改內外官所佩魚並作龜冬十月改并州文水縣為武興縣依漢豐沛例百姓子孫相承給復二年正月親祀明堂春三月改唐太廟為享德廟夏四月令釋教在道法之上僧尼處道士女冠之前六月命岑長倩率諸軍討吐蕃左肅政御史大夫格輔元為地官尚書鸞臺侍郎樂思晦並同鳳閣鸞臺平章事秋七月徙關內雍同等七州戶數十萬以實洛陽分京兆置鼎稷鴻宜四州夏官尚書歐陽通知納言事九月傅游藝下獄死右羽林衛大將軍建昌王攸寧為納言洛州司馬狄仁傑為地官侍郎同鳳閣鸞臺平章事冬十月制官人者咸令自舉殺文昌左相岑長倩納言歐陽通地官尚書格輔元三年正月親祀明堂春一月冬官尚書楊執柔同鳳閣鸞臺平章事三月五天竺國並遣使朝貢四月大赦天下改元為如意禁斷天下屠殺秋七月大雨洛水泛溢漂流居人五千餘家遣使巡問賑貸八月魏王承嗣為特進建昌王攸寧為冬官尚書楊執柔為地官尚書並罷知政事秋官侍郎崔元琮為鸞臺侍郎夏官侍郎李昭德為鳳閣侍郎檢校天官侍郎姚璹為文昌左丞地官侍郎李元素為文昌右丞並同鳳閣鸞臺平章事九月大赦天下改元為長壽改用九月為社大酺七日并州改置北都冬十月武威軍總管王孝傑大破吐蕃復龜茲于闐疏勒碎葉鎮二年春一月親享明堂癸亥殺皇嗣妃劉氏竇氏臘月改封皇孫成器為壽春郡王恆王成義為衡陽郡王隆基為臨淄郡王衛王隆範為巴陵郡王隆業為彭城郡王春二月尚方監裴匪躬坐潛謁皇嗣腰斬於都市秋九月上加金輪聖神皇帝號大赦天下大酺七日辛丑司賓卿豆盧欽望為內史文昌右丞韋巨源同鳳閣鸞臺平章事秋官侍郎陸元方為鸞臺侍郎同鳳閣鸞臺平章事三年春一月親享明堂三月鳳閣侍郎李昭德檢校內史鸞臺侍郎蘇味道同鳳閣鸞臺平章事韋巨源為夏官侍郎依舊知政事四月夏官尚書王孝傑同鳳閣鸞臺三品五月上加尊號為越古金輪聖神皇帝大赦天下改元為延載大酺七日秋八月司賓少卿姚璹為納言左肅政御史中丞楊再思為鸞臺侍郎洛州司馬杜景儉為鳳閣侍郎仍並同鳳閣鸞臺平章事梁王武三思勸率諸蕃酋長奏請大徵斂東都銅鐵造天樞於端門之外立頌以紀上之功業九月內史李昭德左授欽州南賓縣尉冬十月文昌右丞李元素為鳳閣鸞臺平章事證聖元年春一月上加尊號曰慈氏越古金輪聖神皇帝大赦天下改元大酺七日戊子豆盧欽望韋巨源杜景儉蘇味道陸元方並左授趙鄜集綏等州刺史丙申夜明堂災至明而並從煨燼庚子以明堂災告廟手詔責躬令內外文武九品已上各上封事極言正諫春二月上去慈氏越古尊號秋九月親祀南郊加尊號天冊金輪聖神皇帝大赦天下改元為天冊萬歲大辟罪已下及犯十惡常赦所不原者咸赦除之大酺九日萬歲登封元年臘月甲申上登封于嵩嶽大赦天下改元大酺九日丁亥禪于少室山己丑又制內外官三品已上通前賜爵二等四品已下加兩階洛州百姓給復二年登封告成縣三年癸巳至自嵩嶽甲午親謁太廟春三月重造明堂成夏四月親享明堂大赦天下改元為萬歲通天大酺七日以天下大旱命文武官九品以上極言時政得失五月營州城傍契丹首領松漠都督李盡忠與其妻兄歸誠州刺史孫萬榮殺都督趙文翽舉兵反攻陷營州盡忠自號可汗乙丑命鷹揚將軍曹仁師右金吾大將軍張玄遇右武威大將軍李多祚司農少卿麻仁節等二十八將討之秋七月命春官尚書梁王三思為安撫大使納言姚璹為之副制改李盡忠為盡滅孫萬榮為萬斬秋八月張玄遇曹仁師麻仁節與李盡滅戰于西硤石黃麞谷官軍敗績玄遇仁節並為賊所虜九月命右武衛大將軍建安王攸宜為大總管以討契丹并州長史王方慶為鸞臺侍郎與殿中監李道廣並同鳳閣鸞臺平章事吐蕃寇涼州都督許欽明為賊所執庚申王方慶為鳳閣侍郎仍依舊知政事李盡滅死其黨孫萬斬代領其衆冬十月孫萬斬攻陷冀州刺史陸寶積死之十一月又陷瀛州屬縣二年正月親享明堂鳳閣侍郎李元素夏官侍郎孫元亨坐與綦連耀謀反伏誅原州都督府司馬婁師德為鳳閣侍郎同鳳閣鸞臺平章事春二月王孝傑蘇宏暉等率兵十八萬與孫萬斬戰于硤石谷王師敗績孝傑沒於陳宏暉棄甲而遁夏四月鑄九鼎成置于明堂之庭前益州大都督府長史王及善為內史五月命右金吾大將軍河內王懿宗為大總管右肅政御史大夫婁師德為副大總管右武威衛大將軍沙吒忠義為前軍總管率兵二十萬以討孫萬斬六月內史李昭德司僕少卿來俊臣以罪伏誅孫萬斬為其家奴所殺餘黨大潰魏王承嗣梁王三思並同鳳閣鸞臺三品秋八月納言姚璹為益州大都督府長史九月以契丹李盡滅等平大赦天下改元為神功大酺七日婁師德為納言冬十月前幽州都督狄仁傑為鸞臺侍郎司刑卿杜景儉為鳳閣侍郎並同鳳閣鸞臺平章事聖曆元年正月親享明堂大赦天下改元大酺九日春三月召廬陵王哲於房州夏五月禁天下屠殺突厥默啜上言有女請和親秋七月令淮陽王武延秀往突厥納默啜女為妃遣右豹韜衛大將軍閻知微攝春官尚書赴虜庭八月突厥默啜以延秀非唐室諸王乃囚於別所率衆與閻知微入寇媯檀等州命司屬卿高平王重規右武威衛大將軍沙吒忠義幽州都督張仁亶右羽林衛大將軍李多祚等率兵二十萬逆擊乃放延秀還己丑默啜攻陷定州刺史孫彥高死之焚燒百姓廬舍遇害者數千人魏王承嗣卒庚子梁王三思為內史狄仁傑為納言九月建昌王攸寧同鳳閣鸞臺平章事默啜攻陷趙州刺史高睿遇害丙子廬陵王哲為皇太子令依舊名顯大赦天下大酺五日令納言狄仁傑為河北道行軍元帥辛巳皇太子謁太廟天官侍郎蘇味道鳳閣侍郎同鳳閣鸞臺平章事癸未默啜盡殺所掠趙定州男女萬餘人從五回道而去所至殘害不可勝紀冬十月夏官侍郎姚元崇麟臺少監李嶠並同鳳閣鸞臺平章事是月閻知微自突厥叛歸族誅之二年春二月封皇嗣旦為相王初為寵臣張易之及其弟昌宗置控鶴府官員尋改為奉宸府班在御史大夫下左肅政御史中丞魏元忠為鳳閣侍郎吉頊為天官侍郎並同鳳閣鸞臺平章事戊子幸嵩山過王子晉廟丙申幸緱山丁酉至自嵩山夏四月吐蕃大論贊婆來奔秋七月上以春秋高慮皇太子相王與梁王武三思定王武攸寧等不協令立誓文於明堂八月王及善為文昌左相豆盧欽望為文昌右相仍並同鳳閣鸞臺三品冬十月乙亥幸福昌縣王及善薨三年正月戊寅梁王三思為特進天官侍郎吉頊配流嶺表臘月辛巳封皇太子男重潤為邵王狄仁傑為內史戊寅幸汝州之溫湯甲戌至自溫湯造三陽宮于嵩山春三月李嶠為鸞臺侍郎知政事如故夏四月戊申幸三陽宮五月癸丑上以所疾康復大赦天下改元為久視停金輪等尊號大酺五日六月魏元忠為左肅政御史大夫仍舊知政事是夏大旱秋七月至自三陽宮天官侍郎張錫為鳳閣侍郎同鳳閣鸞臺平章事其甥鳳閣鸞臺平章事李嶠為成均祭酒罷知政事壬寅制曰隋尚書令楊素昔在本朝早荷殊遇稟凶邪之德有諂佞之才惑亂君上離間骨肉搖動冢嫡寧唯掘蠱之禍誘扇後主卒成請蹯之釁隋室喪亡蓋惟多僻究其萌兆職此之由生為不忠之人死為不義之鬼身雖幸免子竟族誅斯則姦逆之謀是為庭訓險薄之行遂成門風刑戮雖加枝胤仍在何得肩隨近侍齒列朝行朕接統百王恭臨四海上嘉賢佐下惡賊臣常欲從容於萬機之餘褒貶於千載之外況年代未遠耳目所存者乎其楊素及兄弟子孫已下並不得令任京官及侍衛九月內史狄仁傑卒冬十月甲寅復舊正朔改一月為正月仍以為歲首正月依舊為十一月大赦天下韋巨源為地官尚書文昌左丞韋安石為鸞臺侍郎同鳳閣鸞臺平章事丁卯幸新安曲赦其縣壬申至自新安十二月開屠禁諸祠祭令依舊用牲牢大足元年春正月制改元二月鸞臺侍郎李懷遠同鳳閣鸞臺平章事三月姚元崇為鳳閣侍郎依舊知政事丙申鳳閣侍郎張錫坐贓配循州夏五月幸三陽宮命左肅政御史大夫魏元忠為總管以備突厥天官侍郎顧琮同鳳閣鸞臺平章事六月夏官侍郎李䄄秀同鳳閣鸞臺平章事辛未曲赦告成縣秋七月甲戌至自三陽宮九月邵王重潤為易之讒構令自死冬十月幸京師大赦天下改元為長安二年春正月突厥寇鹽夏等州殺掠人吏秋九月乙丑日有蝕之不盡如鈎京師及四方見之冬十月日本國遣使貢方物十一月相王旦為司徒戊子親祀南郊大赦天下三年春三月壬戌日有蝕之夏四月庚子相王旦表讓司徒許之改文昌臺為中臺李嶠知納言事六月寧州雨山水暴漲漂流二千餘家溺死者千餘人秋七月殺右金吾大將軍唐休璟秋九月正諫大夫朱敬則同鳳閣鸞臺平章事戊申相王旦為雍州牧是月御史大夫兼知政事太子右庶子魏元忠為張昌宗所譖左授端州高要尉京師大雨雹人畜有凍死者冬十月丙寅駕還神都乙酉至自京師四年春正月造興泰宮於壽安縣之萬安山天官侍郎韋嗣立為鳳閣侍郎同鳳閣鸞臺平章事朱敬則請致仕許之三月進封平恩郡王重福為譙王夏官侍郎宗楚客同鳳閣鸞臺平章事夏四月韋安石知納言事李嶠知內史事丙子幸興泰宮六月天官侍郎崔玄暐同鳳閣鸞臺平章事李嶠為國子祭酒知政事如故七月丙戌楊再思為內史甲午至自興泰宮宗楚客左授原州都督八月姚元崇為司僕卿知政事韋安石檢校揚州大都督府長史冬十月秋官侍郎張柬之同鳳閣鸞臺平章事十一月李嶠為地官尚書張柬之為鳳閣鸞臺平章事自九月至於是日夜陰晦大雨雪都中人有飢凍死者令官司開倉賑給神龍元年春正月大赦改元上不豫制自文明元年已後得罪人除揚豫博三州及諸逆魁首咸赦除之癸亥麟臺監張易之與弟司僕卿昌宗謀反皇太子率左右羽林軍桓彥範敬暉等以羽林兵入禁中誅之甲辰皇太子監國總統萬機大赦天下是日上傳皇帝位于皇太子徙居上陽宮戊申皇帝上尊號曰則天大聖皇帝冬十一月壬寅則天將大漸遺制祔廟歸陵令去帝號稱則天大聖皇后其王蕭二家及褚遂良韓瑗等子孫親屬當時緣纍者咸令復業是日崩于上陽宮之仙居殿年八十三諡曰則天大聖皇后二年五月庚申祔葬于乾陵睿宗即位詔依上元年故事號為天后未幾追尊為大聖天后改號為則天皇太后太后嘗召文學之士周思茂范履冰衛敬業令撰玄覽及古今內範各百卷青宮紀要少陽政範各三十卷維城典訓鳳樓新誡孝子列女傳各二十卷內範要略樂書要録各十卷百僚新誡兆人本業各五卷臣軌兩卷垂拱格四卷并文集一百二十卷藏于祕閣史臣曰治亂時也存亡勢也使桀紂在上雖十堯不能治使堯舜在上雖十桀不能亂使懦夫女子乘時得勢亦足坐制羣生之命肆行不義之威觀夫武氏稱制之年英才接軫靡不痛心於家索扼腕於朝危竟不能報先帝之恩衛吾君之子俄至無辜被陷引頸就誅天地為籠去將安所悲夫昔掩鼻之讒古稱其毒人彘之酷世以為冤武后奪嫡之謀也振喉絶襁褓之兒葅醢碎椒塗之骨其不道也甚矣亦姦人妬婦之恆態也然猶泛延讜議時禮正人初雖牝雞司晨終能復子明辟飛語辨元忠之罪善言慰仁傑之心尊時憲而抑幸臣聽忠言而誅酷吏有旨哉有旨哉贊曰龍漦易貌丙殿昌儲胡為穹昊生此夔魖奪攘神器穢皇居窮妖白首降鑒何如
