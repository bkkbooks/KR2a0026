詔方鎮多以大將文符鬻之富賈曲為論奏以取朝秩者疊委於中書矣名臣扼腕無如之何癸巳以兵部尚書蕭俯為太子少保以前山南東道節度使李逢吉為兵部尚書壬寅左驍衛上將軍張奉國卒以鴻臚卿判度支張平叔為戶部侍郎充職平叔以曲承恩顧上疏請官自賣鹽可以富國強兵陳利害十八條詔下其疏令公卿詳議中書舍人韋處厚隨條詰難固言不可事遂不行朱克融王廷湊合兵攻深州不解裴度與書諭之克融還鎮廷湊攻城亦緩乃並加檢校工部尚書戊申裴度來朝對於麟德殿伏奏龍墀因河北用兵嗚咽流涕上改容慰勞之壬子以新授東都留守裴度為揚州大都督府長史充淮南節度使癸丑徐州節度使崔羣為其副使王智興所逐智興自專軍務甲寅以右僕射韓臯為左僕射以前淮南節度使李夷簡為右僕射前東都留守李絳復拜舊官丙辰守司徒裴度正衙受冊訖謁太廟赴尚書省上宰臣百僚皆送丁巳以左丞崔從檢校禮部尚書鄜州刺史鄜坊節度使以代王承元以承元為鳳翔隴節度使戊午司徒裴度復入中書知政事以中書侍郎平章事王播檢校右僕射兼揚州大都督府長史充淮南節度使依前兼諸道鹽鐵轉運使以鳳翔節度使崔倰為河南尹牛元翼率十餘騎突圍出深州來朝深州大將臧平等一百八十人皆為王廷湊所殺己未以武寧軍節度副使王智興檢校工部尚書兼徐州刺史充武寧軍節度使以德棣節度使李全略復為滄州節度使仍合滄景德棣為一鎮李光顏還鎮許州夏四月辛酉朔日有蝕之甲子左僕射韓臯赴省上中使賜酒饌宰臣百僚送一如近式雲陽縣角抵力人張蒞負羽林官騎康憲錢憲往徵之蒞乘醉打憲將殞憲男買德年十四持木鐘擊蒞首破三日而卒刑部奏覆敕曰買德尚在童年能知子道雖殺人當死為父可哀若從沉命之科恐失原情之意可減死罪一等欣州刺史李寰守博野王廷湊攻之不下其李寰所領兵宜割屬右神策以寰為軍使仍以欣州軍為名庚辰桂管觀察使杜式方卒癸未以武寧軍節度使崔羣為祕書監分司東都翰林侍講學士韋處厚路隨進所撰六經法言二十卷賜錦綵二百匹銀器二百事處厚改中書舍人隨改諫議大夫並賜金紫丁亥以祕書監嚴譽為桂管觀察使是夜東北有流星光彩燭地殷殷有聲出天市垣至郎位滅五月辛卯朔以德州刺史李景儉為諫議大夫癸丑太子少傅嚴綬卒戊午幽州朱克融上表進馬萬匹羊十萬口先請其價賞軍隴山有異獸如猴腰尾皆長色青赤而猛鷙見蕃人則躍而食之遇漢人則否六月庚申朔甲子司徒平章事裴度守尚書右僕射工部侍郎平章事元稹為同州刺史以正議大夫守兵部尚書輕車都尉李逢吉為門下侍郎同中書門下平章事乙丑大風震電墜太廟鴟吻霹御史臺樹丁卯以易州刺史柳公濟為定州刺史義武軍節度使壬申諫官論責裴度太重元稹太輕乃追稹制書削長春宮使戊寅以前右僕射李夷簡為太子少保分司東都戊子復置雍管以安南副使崔結為雍管經略使秋七月己丑朔丙申宋王結薨廢朝戊戌汴州軍亂逐節度使李願立牙將李為留後好畤縣山水漂溺居人三百家陳許蔡等州水壬寅出中書舍人白居易為杭州刺史乙巳詔南北省五品已上官議討李丙午貶李願為隨州刺史以鄭滑節度使韓充為汴州刺史宣武軍節度使汴宋亳潁觀察等使鄭滑如故以宣武軍節度押衙李為右金吾衛將軍丁未內出綾絹五十萬匹付度支以供軍用陳許水災賑粟五萬石己酉中使楊再昌使鎮州王廷湊奏奉詔取牛元翼家族請至秋末發遣其田弘正骸骨尋訪不知所在辛亥以贈司徒忠烈公李子源為諫議大夫賜緋魚袋乙卯敕員外郎知制誥二年後轉郎中又二年後轉前行郎中又一年即正除諫議大夫知同前郎中給事中並翰林學士別宣知者不在此限以前義武軍節度使陳楚為東都留守判尚書省事東畿汝防禦使本朝故事東都留守罕用武臣今用楚以李擾汴宋故也八月己未朔以絳州刺史崔弘禮為河南尹兼東畿防禦副使給事中韋穎以弘禮望輕封還詔書上遣中使諭之乃下詔陳許李光顏將兵收汴州戊辰以左僕射韓臯為東都留守判尚書省事東畿汝防禦使以東都留守陳楚為河陽懷節度使癸酉韓充奏今月六日發軍入汴州界營于千塔丙子汴州監軍姚文壽與兵馬使李質同謀斬李及其黨薛志忠秦鄰等丁丑韓充入汴州以前東都留守李絳為華州刺史充潼關防禦鎮國軍等使浙東處州大水溺居民以兗海沂密節度使曹華為滑州刺史充義成軍節度鄭滑潁等州觀察等使以宋州刺史高承簡為兗州刺史兗海沂密等州節度使以汴州防城兵馬使李質為右金吾衛將軍潁州棣鄭滑觀察使鹽鐵轉運使王播進開潁口圖九月戊子朔浙西大將王國清謀叛觀察使竇易直討平之同惡二百餘人並誅之韓充送李男道源道樞道瀹等三人斬於西市妻馬氏小男道本女汴娘配於掖庭壬子太子少師李夷簡卒贈太子太保癸卯以前河陽節度使郭釗為河中尹兼河中絳隰等州節度使御史中丞李德裕為潤州刺史兼御史大夫浙江西道都團練觀察處置等使以代竇易直以易直為吏部侍郎加晉州刺史李寰為晉慈等州都團練觀察使乙巳敕團練防禦州置判官一員其副使推巡並停辛亥以吏部侍郎柳公綽為御史大夫先有詔廣芙蓉苑南面居人廬舍墳墓並移之羣情駭擾癸丑降敕罷之德州軍亂害刺史王稷盡剽其家財奴僕丁巳以萬州刺史李元喜為安南都護陰山府沙突厥兵馬使朱耶執宜來朝貢賜官誥錦綵銀器冬十月戊午朔壬戌前河中晉絳慈隰等州節度使開府儀同三司守司徒中書令河中尹上柱國許國公韓弘可守司徒兼中書令甲子夜月掩牽牛中星戊辰興元節度使烏重胤來朝移授天平軍節度使己卯以工部侍郎鄭權為工部尚書以前華州刺史許季同為工部侍郎是日上由復道幸咸陽止於善因佛寺施僧錢百萬咸陽令絹百匹閏十月戊子朔入回紇使金吾大將軍胡證副使光祿卿李憲婚禮使衛尉卿李鋭副使宗正少卿李子鴻等送太和公主自蕃中回庚寅以吏部尚書鄭絪為太子少傅以太常卿趙宗儒為吏部尚書韋綬為興元尹充山南西道節度使壬辰右驍衛大將軍韓公武卒廢朝以戶部尚書楊於陵為太常卿丙申回紇可汗遣使獻國信四牀女口六人葛祿口四人己亥敕翰林侍講學士諫議大夫路隨中書舍人韋處厚兼充史館修撰憲宗實録仍更日入史館實録未成且許不入內署仍放朝參甲寅詔江淮諸州旱損頗多所在米價不免踊貴眷言疲困須議優矜宜委淮南浙西東宣歙江西福建等道觀察使各於當道有水旱處取常平義倉斛斗據時估減半價出糶以惠貧民丙辰以太子賓客令狐楚為陝虢觀察使十一月丁巳朔丁卯尚書左丞庾承宣為陝虢觀察使令狐楚復為太子賓客分司東都楚已至陝州視事一日追改之庚午命景王率禁軍五百騎侍從皇太后幸華清宮又幸石甕寺辛未以前安南都護桂仲武為雍管經略使癸酉上幸華清宮迎太后巡狩于驪山下即日馳還太后翌日方還丙子集王緗薨庚辰上與內官擊鞠禁中有內官歘然墜馬如物所擊上恐罷鞠升殿遽足不能履地風眩就牀自是外不聞上起居者三日是夜月近房十二月丁亥朔詔五坊鷹隼並解放獵具皆毀之庚寅宰臣李逢吉率百僚至延英門請見上不許中外與度等三上疏請立皇太子是夜司徒中書令韓弘卒辛卯上於紫宸殿御大繩牀見百官李逢吉奏景王成長請立為皇太子左僕射裴度又極言之癸巳詔景王為皇太子淮南奏和州飢烏江百姓殺縣令以取官米甲午內出絹二百匹賑兩市癃殘窮者己未兩軍容內司公主戚屬之家並以上疾痊平諸寺為僧齊仍敕在京諸司疏放繫囚丙午上御宣政殿冊皇太子受冊畢百僚謁太子於東宮太子舉簾執笏答拜宮僚拜則受之丁未判度支戶部侍郎張平叔貶通州刺史是夜月掩左角己酉以前天平軍節度使馬總檢校左僕射守戶部尚書庚戌以吏部侍郎竇易直為戶部侍郎判度支癸丑以太子冊禮畢宣制赦囚徒以前黔中觀察使崔元略為鄂嶽蘄黃安等州觀察使太子賓客孟簡卒乙卯以前陝虢觀察使衛中行為尚書右丞是冬十月頻雪其後恆燠水不冰凍草木萌發如正二月之後三年正月丁巳朔上以疾不受朝賀是日大風昏翳竟日嗣郢王佐宜於崖州安置坐妄傳禁中語也敕不得買新羅人為奴婢已在中國者即放歸其國禮部侍郎王起奏當司所試貢舉人試訖申送中書候覆訖下當司然後大字放榜從之二月天平軍監軍奏節度使烏重胤病牙將王贄割股肉以療河陽節度使陳楚奏移使府於三城未有門戟欲移懷州門戟於河陽從之諫議大夫殷侑奏禮部貢舉請置三傳三史科從之戶部尚書崔倰卒三月丁巳宰臣百僚賜宴於曲江亭敕應御服及器用在淮南兩浙宣歙等道合供進者並端午誕節常例進獻者一切權停其鷹犬之類除備搜狩外並令解放以牛僧孺同中書門下平章事日晡晚後有賊入通化門鬬死者一人傷者六人賜宣徽院供奉官錢自一百二十貫文已下有差五月山南西道奏移成州於寶井堡山南東道節度使牛元翼卒祕書少監李隨奏請造當司圖書印一面從之六月宰相監修國史杜元穎奏史官沈傳師除鎮湖南其本分修史便令將赴本任修撰從之敕京兆尹御史大夫韓愈宜放臺參後不得為例七月國子祭酒韋乾慶卒八月鄭滑節度使曹華卒檢校尚書右僕射戶部尚書馬總卒興元節度使韋綬卒上由復道幸興慶宮至通化門賜持盂僧絹二百匹因幸五方賜從官金銀鋌有差九月澤潞節度使劉悟進位平章事賜宰臣百僚重九宴于曲江亭南詔王丘佺進金碧文絲十有六品十月以京兆尹韓愈為兵部侍郎以御史中丞李紳為江西觀察使宰相李逢吉與李紳不協紳有時望恐用為相及紳為中丞乃除韓愈為京兆尹兼御史大夫仍放臺參紳性峭直屢上疏論其事遂與愈辭理往復逢吉乃兩罷之然紳出而愈留宰相杜元穎罷知政事除成都尹劍南西川節度使龍武統軍陳楚卒以兵部侍郎韓愈為吏部侍郎新除江西觀察使李紳為戶部侍郎紳既罷除江西上令中使就第賜玉帶紳因除泣而請留中使具奏故與愈俱改官召翰林學士龐嚴對因賜金紫賜內園使公廨本錢一萬貫軍器使三千貫杜元穎赴鎮蜀上御安福門餞因賜皇城留守及金吾衛率等帛有差十一月上御通化門觀作毗沙門神因賜絹五百匹停浙東貢甜菜海蚶十二月浙西觀察使李德裕奏去管內淫祠一千一十五所四年正月辛亥朔上御殿受朝如常儀上餌金石之藥處士張臯上疏切諫上悅召之求臯不獲澤潞判官賈直言新授諫議大夫劉悟上表乞留從之禮部尚書致仕孔戣卒辛未上大漸詔皇太子監國壬申上崩於寢殿時年三十羣臣上諡曰睿聖文惠孝皇帝廟號穆宗十一月庚申葬于光陵史臣曰臣觀五運之推遷百王之隆替亦無常治亦無常亂在人而已匪降自天當軒黃御宇之秋則百年無事及商辛握圖之日則四海橫流昔章武皇帝痛國命之不行惜朝綱之將墜乃求賢俊總攬英雄果能扼大盜之喉制姦臣之命五十載已終之土復入提封百萬戶受弊之氓重蘇景化元和之政幾致升平鴟梟方革於好音龍鼎俄傷於短祚苟或時有平勃之佐繼以文景之才則廷湊克融自縮螳螂之臂智興李敢萌狗鼠之謀強盜寧窺孟賁之金餓隸不拾嬰兒之餌觀夫孱主可謂痛心不知創業之艱難不恤黎元之疾苦謂威權在手可以力制萬方謂旒冕在躬可以坐馳九有曾不知聚則萬乘散則獨夫朝作股肱暮為讎敵仲長子所謂至於運徙勢去獨不覺悟者豈非富貴生不仁沉溺致愚疾存亡以之迭代治亂從此周復誠哉是言也贊曰惠王不令敗度亂政驕僻偶全實賴遺慶皇皇上帝為民立正此何人哉遽主鼎命
