body:
  text: 舊唐書卷十六本紀第十六穆宗穆宗睿聖文惠孝皇帝諱恆憲宗第三子母曰懿安皇后郭氏貞元十一年七月生於大明宮之別殿初名宥封建安郡王元和元年八月進封遂王五年三月領彰義軍節度大使七年十月冊為皇太子改今諱十五年正月庚子憲宗崩丙午即皇帝位於太極殿東序是日召翰林學士段文昌杜元穎沈傳師李肇侍讀薛放丁公著對於思政殿並賜金紫丁未集羣臣班於月華門外貶門下侍郎同平章事皇甫鎛為崖州司戶戊申上見宰臣於紫宸門外辛亥以朝議郎守御史中丞飛騎尉襲徐國公賜緋魚袋蕭俯為朝散大夫守中書舍人翰林學士武騎尉賜紫金魚袋段文昌為中書侍郎同平章事上始御延英對宰臣詔曰山人柳泌輕懷左道上惑先朝固求牧人貴欲疑衆自知虛誕仍更遁逃僧大通醫方不精藥術皆妄既延禍釁俱是姦邪邦國固有常刑人神所宜共棄付京兆府決杖處死金吾將軍李道古貶循州司馬憲宗末年鋭於服餌皇甫鎛與李道古薦術人柳泌僧大通待詔翰林泌於台州為上鍊神丹上服之日加躁渴遽棄萬國甲寅二王後介國公宇文仲達卒有司舉舊典葬祭之以監察御史李德裕右拾遺李紳禮部員外郎庾敬休並守本官充翰林學士丁巳以劍南東川節度使李逢吉為襄州刺史充山南東道節度使以吏部侍郎王涯檢校禮部尚書梓州刺史充劍南東川節度使己未改恆嶽為鎮嶽恆州為鎮州定州恆陽縣為曲陽縣恆王房子孫改為泜王房丙寅以右神策大將軍張維清為單于大都護充振武麟勝節度使丁卯上及羣臣皆釋服從吉戊辰羣臣始朝於宣政衙是夜地震庚午冊大行皇帝貴妃郭氏為皇太后貶諫議大夫李景儉為建州刺史二月癸酉朔丁丑御丹鳳樓大赦天下宣制畢陳俳優百戲於丹鳳門內上縱觀之丁亥幸左神策軍觀角抵及雜戲日昃而罷癸巳罷雍管經略使所管州縣隸雍府甲午以桂管觀察使裴行立為安南都護充本管經略使乙未以太僕卿杜式方為桂州刺史充桂管觀察使丙申丹王逾薨丁酉敕入回紇使宜與私覿正員官十三員入吐蕃使與八員庚子太子賓客呂元膺卒辛丑以戶部侍郎楊於陵為戶部尚書壬寅敕舉賢良方正直言極諫等科目人宜令中書門下尚書省四品已上於尚書省同試三月癸卯朔贈皇太后父郭曖太傅母虢國大長公主贈齊國大長公主壬子召侍講學士韋處厚路隨於太液亭講毛詩關雎尚書洪範等篇既罷並賜緋魚袋左右軍中尉馬進潭梁守謙魏弘簡等請立門戟從之以太子詹事分司東都韋貫之為河南尹丁巳御史中丞崔植奏元和十二年敕御史臺三院御史據除拜上日為先後未上日不得計月數又准其年九月十七日敕踰一箇月不在此限行立班次即宜以敕內先後為定臣觀此後敕未便事宜請自今後三院御史職事行立一切依敕文先後為定除拜上日便為月數從之戊午吏部尚書趙宗儒奏先奉敕先朝所放制科舉人令與中書門下四品已上官同於尚書省就試者臣伏以制科所設本在親臨南省策試亦非舊典今覃恩既畢庶政惟新況山陵日近公務繁迫待問之士就試非多臣等商量恐須停罷從之罷申州歲貢茶乙丑以皇太后兄司農卿郭釗為刑部尚書兼司農卿右金吾衛大將軍郭鏦檢校工部尚書丁卯貶太子賓客留司東都孟簡為吉州員外司馬戊辰夜大風雹夏四月壬申朔丁丑澧王寬薨乙酉三恪酅國公楊造卒丁亥敕內侍省見管高品官白身都四千六百一十八人除官員一千六百九十六人外其餘單貧無屋室居止宜每人加衣糧半分五月壬寅朔癸卯詔以國用不足應天下兩稅鹽利榷酒稅茶及戶部闕官除陌等錢兼諸道雜榷稅等應合送上都及留州留使諸道支用諸司使職掌人課料等錢並每貫除舊墊陌外量抽五十文仍委本道本司本使據數逐季收計其諸道錢便差綱部送付度支收管待國用稍充即依舊制其京百司俸料文官已抽修國學不可重有抽取武官所給校薄亦不在抽取之限壬子詔入景陵玄宮合供千味食魚肉肥鮮恐致薰穢宜令尚藥局以香藥代食庚申葬憲宗於景陵六月辛未朔丁丑以司徒兼中書令韓弘為河中尹充河中晉絳慈隰等州節度使安南都護桂仲武奏誅賊首楊清收復安南府戊寅以金吾將軍李佑檢校左散騎常侍兼夏州刺史充夏綏銀宥節度使代李聽以聽為靈州大都督府長史充朔方靈鹽節度使以中書舍人王仲舒為洪州刺史御史中丞充江西觀察使己卯放京兆府今年夏青苗錢八萬三千五百六十貫宜委令狐楚以楚山陵用不盡綾絹准實估付京兆府代所放青苗錢庚辰加邠寧慶節度使李光顏特進以城鹽州之功也以考功員外郎史館修撰李翺為朗州刺史坐與李景儉相善故也癸未併兗州萊蕪縣入乾封縣己丑工部尚書歸登卒壬辰詔帝王所重者國體所切者人情苟得其體必臻於大和如失其情是由於小利況設官求理頒祿責功教既有常寧宜就減近以每歲經費量入數少外官俸料據數收貫朕再三思度終所未安今則歲屬豐登兵方偃息自宜克己以足用何得剝下以為謀臨軒載懷實所增愧其今年五月敕應給用錢每貫抽五十文都計一百五十萬貫宜併停抽仍出內庫錢三十七萬五千貫付度支給用初憲宗用兵擢皇甫鎛為相苛斂剝下人皆咎之以至譴逐至是宰臣創抽貫之利制下人情不悅故罷之癸巳皇太后移居興慶宮皇帝與六宮侍從大合宴于南內回幸右軍頒賜中尉等有差自是凡三日一幸左右軍及御宸暉九仙等門觀角抵雜戲秋七月辛丑朔壬寅以河中晉絳觀察使李絳為兵部尚書甲辰以大理卿孔戢為潭州刺史湖南觀察使乙巳詔皇太后就安長樂朝夕承顏慈訓所加慶感兼極今月六日是朕載誕之辰奉迎皇太后於宮中上壽朕既深歡慰欲與臣下同之其日百僚命婦宜於光順門進名參賀朕於光順門內殿與百僚相見永為常式非典也鄆曹濮等州節度賜號天平軍從馬總奏也丙午敕乙巳詔書載誕受賀儀宜停先是左丞韋綬奏行之宰臣以古無降誕受賀之禮奏罷之丁未苑內假山毀壓死役者七人自五月不雨至此月壬子始雨甲寅御新成永安殿觀百戲極歡而罷乙卯敕自今後新除節度觀察使到任日具見在錢帛斛斗器械數目分析以聞安南都護裴行立卒是日上幸安國寺觀盂蘭盆雍管經略使楊旻卒平盧軍新加押新羅渤海兩蕃使賜印一面許置巡官一人新作寶慶殿庚申夜熒惑入羽林壬戌盛飾安國慈恩千福開業章敬等寺縱吐蕃使者觀之丙寅以新成永安殿與中宮貴主密宴以樂之嬪妃皆預丁卯以門下侍郎平章事令狐楚為宣州刺史兼御史大夫充宣歙池觀察使楚為山陵使縱吏于翬刻下不給工徒價錢積留錢十五萬貫為羡餘以獻故及于貶八月庚午朔辛未兵部尚書楊於陵總百僚錢貨輕重之議取天下兩稅榷酒鹽利等悉以布帛任土所産物充稅並不徵見錢則物漸重錢漸輕農人見免賤賣匹段請中書門下御史臺諸司官長重議施行從之癸酉太子少傅致仕李鄘卒甲戌安南都護桂仲武斬叛將楊清首以獻收復安南府乙亥賜教坊錢五千貫充息利本錢御勤政樓問人疾苦前江西觀察使裴次元卒己卯月掩牽牛同州雨雪害秋稼京兆府戶曹參軍韋正牧專知景陵工作刻削廚料充私用計贓八千七百貫文石作專知官奉仙縣令于翬刻削計贓一萬三千貫並宜決重杖處死壬辰幸魚藻池發神策軍二千人浚魚藻池戊戌以朝議郎守御史中丞武騎尉賜紫金魚袋崔植為朝散大夫守中書侍郎同中書門下平章事己亥宣歙觀察使令狐楚再貶衡州刺史九月庚子朔改河北稅鹽使為榷鹽使辛丑大合樂於魚藻宮觀競渡又召李訴李光顏入朝欲於重陽日宴羣臣拾遺李王玉等上疏諫云元朔未改園陵尚新雖易月之期俯從人欲而三年之制猶服心喪夫遏密弛禁蓋為齊人合樂內庭事將未可不聽乙巳以駕部郎中知制誥李宗閔為中書舍人宋州大水損田六千頃戊申以重陽節曲宴郭釗兄弟貴戚主壻等於宣和殿己酉大雨三日至是雨雪樹木無風而摧仆者十五六以吏部侍郎崔羣為御史大夫滄景水損田戊午加河東節度使金紫光祿大夫檢校尚書右僕射兼門下侍郎同平章事太原尹北都留守上柱國晉國公食邑三千戶裴度守司空門下侍郎同平章事以邠寧節度使檢校司空邠州刺史上柱國武威郡開國公食邑二千戶李光顏並同中書門下平章事又以武寧軍節度徐泗濠等州觀察等使檢校尚書左僕射徐州刺史上柱國涼國公食邑三千戶李訴為同中書門下平章事潞州大都督府長史充昭義軍節度澤潞磁邢洺觀察處置等使夏州奏移宥州于長澤縣置辛酉宴李光顏李訴於麟德殿頒賜優厚以袁州刺史韓愈為朝散大夫守國子祭酒復賜金紫丙寅以御史大夫崔羣檢校兵部尚書徐州刺史充武寧軍節度徐泗宿濠觀察等使以將作監崔能為廣州刺史充嶺南節度使丁卯以兵部尚書李絳為御史大夫戊辰以前嶺南節度使孔戣為吏部侍郎冬十月庚午朔闍婆國遣使朝貢庚辰宰相與吐蕃使於中書議事京百司共賜錢一萬貫仰御史臺據司額大小公事閒劇均之成德軍節度使王承宗卒其弟承元上表請朝廷命帥遣起居舍人柏耆宣慰之辛巳金公亮修成指南車記里鼓車千午吐蕃寇涇州命中尉梁守謙將神策軍四千人及八鎮兵赴援乙酉以魏博等州節度觀察等使光祿大夫檢校司徒兼侍中魏博大都督府長史上柱國沂國公食邑三千戶實封三百戶田弘正可檢校司徒兼中書令鎮州大都督府長史成德軍節度鎮冀深趙等州觀察處置等使以鎮冀深趙等觀察度支使朝議郎試金吾左衛胄曹參軍兼監察御史王承元可銀青光祿大夫檢校工部尚書使持節滑州諸軍事守滑州刺史御史大夫充義成軍度鄭滑等州觀察等使以昭義節度使檢校尚書左僕射同中書門下平章事李訴可本官為魏州大都督府長史充魏博等州節度觀察等使以義成軍節度使劉悟依前檢校右僕射兼潞州大都督府長史充昭義節度澤潞邢洺磁等州觀察等使以左金吾將軍田布為檢校左散騎常侍兼懷州刺史御史大夫充河陽三城懷孟節度使乙酉涇州奏吐蕃退去時夏州節度使田縉貪猥侵刻党項羌羌引西蕃入寇賴郝玼李光顏奮命拒之方退丁亥西川奏吐蕃侵雅州令發兵鎮守東川節度使王涯陳破吐蕃策言以厚賂北蕃俾入西蕃據地得人多少賞之十一月乙亥朔癸卯制朕聞帝王丕宅四海子育羣生如天無不覆如日無不燭乃眷冀方初喪戎帥念乎三軍之事洎于四州之人或懷忠積誠而思用莫展或災荒兵役而望恤何階今則昌運一開誠節咸著王承元首陳章疏願赴闕庭永念父兄之忠克固君臣之義已加殊奬別委重藩又念成德軍將士等叶謀向義丹款載申咸欲效其器能各宜列之爵秩大將史重歸牛元翼已超授寵榮今更都加厚賜宜令諫議大夫鄭覃往鎮州宣慰賜錢一百萬貫王澤所洽天網方恢宥過釋冤與人休泰其管內見禁囚徒罪無輕重並宜釋放朕以武俊之勳勞光于彝鼎士真之恭恪繼被節旄承宗感恩亦克立效永言十代之宥俾賜一門之榮承宗兄弟已授官爵其承宗葬事亦差官監視務令周厚丁未封王承宗祖母李氏為晉國太夫人辛亥田弘正奏王承元以今月九日領兵二千人赴鎮滑州成德軍徵賞錢頗急乃命柏耆先往諭之以華州刺史衛中行為陝州長史充陝虢觀察使以宗正卿李翱為華州刺史潼關防禦鎮國軍使乙卯上幸金吾將軍郭鏦城南莊鏦以莊為獻戊午詔曰朕來日暫往華清宮至暮却還御史大夫李絳常侍崔元略已下伏延英門切諫上曰朕已成行不煩章疏諫官再三論列是日田弘正奏今月十六日入鎮州訖己未上由復道出城幸華清宮左右中尉劈仗六軍諸使諸王駙馬千餘人從至晚還宮癸亥檢校司徒兼太子少師鄭餘慶卒以渭州刺史涇原行營兵馬使保定郡王郝玼為慶州刺史玼勇將深入吐蕃接戰朝廷恐失勇將故移之內地十二月己巳朔戊寅召故女學士宋若華妹若昭入宮掌文奏壬午幸右軍擊鞠遂畋於城西丙戌前昭義軍節度使辛祕卒己丑以庫部郎中知制誥牛僧孺為御史中丞嶺南奏崖州司戶參軍皇甫鎛卒丙申以司門員外郎白居易為主客郎中知制誥是歲計戶帳戶總二百三十七萬五千四百口總一千五百七十六萬定鹽夏劍南東西川嶺南黔中雍管容管安南合九十七州不申戶帳長慶元年正月己亥朔上親薦獻太清宮太廟是日法駕赴南郊日抱珥宰臣賀於前辛丑祀昊天上帝於圓丘即日還宮御丹鳳樓大赦天下改元長慶內外文武及致仕官三品已上賜爵一級四品已下加一階陪位白身人賜勳兩轉應緣大禮移仗宿衛御樓兵仗將士普恩之外賜勳爵有差仍准舊例賜錢物二十萬四千九百六十端匹禮畢羣臣於樓前稱賀仗退上朝太后於興慶宮壬寅夏州節度使奏浙東湖南等道防秋兵不習邊事請留其兵甲歸其人靈武節度使李聽奏請於淮南忠武武寧等道防秋兵中取三千人衣賜月糧賜當道自召募一千五百人馬驍勇者以備邊仍令五十人為一社每一馬死社人共補之馬永無闕從之癸卯以河陽懷節度使田布為涇州刺史充四鎮北庭行營涇原節度使以刑部尚書兼司農卿郭釗檢校戶部尚書懷州刺史充河陽三城懷節度使以涇原節度使王潛檢校兵部尚書江陵尹充荊南節度使乙巳鄜坊節度使韓璀改名充己酉以前檢校大理少卿駙馬都尉劉士涇為太僕卿給事中韋弘景薛存慶封還詔書上諭之曰士涇父昌有邊功久為少列十餘年又以尚雲安公主朕欲加恩制官敕下制命始行翰林學士司勳員外郎李德裕上疏曰臣見國朝故事駙馬國之親密不合與朝廷要官往來開元中禁止尤切近日駙馬多至宰相及要官宅此輩無他才可以延接唯是漏泄禁密交通中外伏望宣示駙馬等今後有事任至中書見宰臣此外不得至宰臣及臺省官私第從之戊午夜星孛于翼壬戌制朝議大夫守門下侍郎同中書門下平章事徐國公蕭俯為尚書右僕射纍表乞罷政事故也癸亥以左散騎常侍崔元略為黔州刺史充黔中觀察使丁卯星孛於辰近太微西垣南第一星二月戊辰朔癸酉以尚書右僕射蕭俯為吏部尚書甲戌以檢校右僕射兼吏部尚書韓臯守右僕射乙亥夜太白犯昴丙子上觀雜伎樂於麟德殿歡甚顧謂給事中丁公著曰此聞外間公卿士庶時為歡宴蓋時和民安甚慰豫心公著對曰誠有此事然臣之愚見風俗如此亦不足嘉百司庶務漸恐勞煩聖慮上曰何至於是對曰夫賓宴之禮務達誠敬不繼以淫故詩人美樂且有儀譏其屢舞前代名士良辰宴聚或清談賦詩投壺雅歌以杯酌獻酬不至於亂國家自天寶已後風俗奢靡宴席以喧譁沉湎為樂而居重位秉大權者優雜倨肆於公吏之間曾無愧恥公私相效漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下宜頒訓令禁其過差則天下幸甚時上荒于酒樂公著因對諷之頗深嘉納己卯幽州節度使劉總奏請去位落髮為僧又請分割幽州所管郡縣為三道請支三軍賞設錢一百萬貫壬申以中書侍郎平章事段文昌檢校刑部尚書同平章事成都尹充劍南西川節度等使以朝散大夫尚書戶部侍郎知制誥翰林學士上柱國建安縣開國男杜元穎守本官同中書門下平章事以劍南西川節度使王播為刑部尚書充鹽鐵轉運使乙酉天平軍節度使馬總奏當道見管軍士三萬三千五百人從去年正月已後情願居農者放逃亡者不捕先是平定河南及王承元去鎮州宰臣蕭俯等不顧遠圖乃獻銷兵之議請密詔天下軍鎮每年限百人內破八人逃死故總有是奏丁亥夜月犯歲星在尾十三度辛卯寒食節宴羣臣於麟德殿頒賜有差壬辰刑部侍郎李建卒癸巳九姓回紇毗伽保義可汗卒三月丁酉朔浙東奏移明州於鄮縣置劉總進馬一萬五千匹甲辰鄭滑節度使王承元祖母晉國太夫人李氏來朝既見上令朝太后於南內丁未宗正寺奏准貞元二十一年敕宗子陪位放五百七十人出身准今年敕放三百人伏緣人數至多不霑恩澤乞降特恩更放二百人出身從之平盧薛平奏海賊掠賣新羅人口於緣海郡縣請嚴加禁絶俾異俗懷恩從之戊申罷京西京北和糴使擾人故也罷河北榷鹽法許約計課利都數付榷鹽院庚戌以左丞韋綬為禮部尚書是夜太白近五車辛亥命給事中韋弘慶充幽州宣慰使左拾遺狄兼謨副之鹽鐵使王播奏江淮鹽估每斗加五十文兼舊三百文癸丑以幽州盧龍軍節度副大使知節度事押奚契丹兩蕃經略等使檢校司空同中書門下平章事楚國公劉總可檢校司徒兼侍中天平軍節度鄆曹濮等州觀察等使以宣武軍節度使檢校右僕射同平章事張弘靖為檢校司空同平章事兼幽州大都督府長史充幽州盧龍軍節度使從劉總所奏故也以鳳翔節度使李願檢校司空汴州刺史充宣武軍節度使以邠寧節度使李光顏為鳳翔尹依前檢校司空平章事充鳳翔隴右節度使以右衛大將軍高霞寓檢校工部尚書邠州刺史充邠寧節度使諫官上疏論霞寓敗軍左謫未宜拜方鎮不從乙卯以權知京兆尹盧士玫為瀛州刺史充瀛莫等州都團練觀察使從劉總奏析置也丁巳制劉總已極上台仍移重鎮兄弟子姪各授官榮大將賓僚亦宜超擢幽州百姓給復一年賜三軍賞設錢一百萬貫令