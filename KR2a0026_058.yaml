body:
  text: 舊唐書卷五十四列傳第四王世充竇建德王世充字行滿本姓支西域胡人也寓居新豐祖支頽耨早死父收隨母嫁霸城王氏因冒姓焉仕至汴州長史世充頗涉經史尤好兵法及龜策推步之術開皇中以軍功拜儀同纍轉兵部員外郎善敷奏明習法律然舞弄文法高下其心或有駁難之者世充利口飾非辭議鋒起衆雖知其不可而莫能屈大業中纍遷江都丞兼領江都宮監時煬帝數幸江都世充善候人主顏色阿諛順旨每入言事帝必稱善乃雕飾池臺陰奏遠方珍物以媚於帝由是益昵之世充知隋政將亂陰結豪俊多收羣心有繫獄抵罪皆枉法出之以樹私恩及楊玄感作亂吳人朱燮晉陵人管崇起兵江南以應之自稱將軍擁衆十餘萬隋遣將軍吐萬緒魚俱羅等討之不克世充為其偏將募江都萬餘人頻擊破之每有克捷必歸功於下所獲軍實皆推與士卒由此人爭為用功最居多十年齊郡賊帥孟讓自長白山寇掠諸郡至盱眙有衆十餘萬世充以兵拒之保都梁山為五柵相持不戰乃唱言兵走羸師示弱讓笑曰王世充文法小吏安能領兵吾令生縛取之鼓行而入江都時百姓皆入壁野無所掠賊衆漸餒又苦柵當其道不得南侵即分兵圍五柵世充每日擊之陽不利走還入柵如是數日讓益輕之乃稍分人於南方抄掠留兵才足以圍柵世充知其懈乃於營中夷竈撤幕設方陳四面外向毀柵而出奮擊大破之讓以數十騎遁去斬首萬餘級俘虜十餘萬人煬帝以世充有將帥才略復遣領兵討諸小盜所向盡平十一年突厥圍煬帝於鴈門世充盡發江都人將往赴難在軍中蓬首垢面悲泣無度曉夜不解甲藉草而臥煬帝聞之以為忠益信任之十二年遷江都通守時厭次人格謙為盜數年兵十餘萬在豆子中為太僕卿楊義臣所殺世充帥師擊其餘衆破之又擊盧明月於南陽虜獲數萬後還江都煬帝大悅自執杯酒以賜之及李密攻陷洛口倉進逼東都煬帝特詔世充大發兵於洛口拒密前後百餘戰未有勝負又遣就軍拜世充為將軍趣令破賊世充引軍渡洛水與李密戰世充軍敗績溺死者萬餘人乃率餘衆歸河陽時天寒大雪兵士在道凍死者又數萬人比至河陽才以千數世充自繫獄請罪越王侗遣使赦之徵還洛陽置營於含嘉倉城收合亡散復得萬餘人俄而宇文化及作難太府卿元文都武衛將軍皇甫無逸右司郎中盧楚奉越王侗嗣位於東都拜世充為吏部尚書封鄭國公文都謂楚等曰今化及弒逆讎恥未報吾雖志在枕戈而力所不及為國計者莫如以尊官寵李密以庫物權啖之使擊化及令兩賊自鬬化及既破而密之兵固亦疲矣又其士卒得我之賞居我之官內外相親易為反間我師養力以乘其弊則密亦可圖也楚等以為然即日遣使拜密為太尉尚書令令討化及密遂稱臣奉制以兵拒化及於黎陽每戰勝則遣使告捷衆皆悅世充獨謂其麾下諸將曰文都之輩刀筆吏耳吾觀其勢必為李密所擒且吾軍人每與密戰殺其父兄子弟前後已多一旦為之下吾屬無類矣出言以激怒其衆文都知而大懼與楚等謀因世充入內伏甲而殺之期有日矣納言段達庸懦恐事不果遣其女壻張志以楚等謀告世充其夜勒兵圍宮城將軍費曜田闍等拒戰於東太陽門外曜軍敗世充遂攻門而入無逸以單騎遁走獲楚殺之時宮門閉世充遣人扣門言於侗曰元文都等欲執皇帝降于李密段達知而告臣臣非敢反誅反者耳初文都聞變入奉侗於乾陽殿陳兵衛之令將帥乘城以拒難段達矯侗命執文都送於世充至則亂擊而死達又矯侗命開門以納世充世充悉遣人代宿衛者然後入謁陳謝曰文都等無狀謀相屠害事急為此不敢背國侗與之盟其日進拜尚書左僕射總督內外諸軍事世充去含嘉城移居尚書省專宰朝政以其兄世惲為內史令入居禁中子弟咸擁兵馬鎮諸城邑未幾李密破化及還其徑兵良馬多戰死士卒疲倦世充欲乘其弊而擊之恐人心不一乃假託鬼神言夢見周公乃立祠於洛水遣巫宣言周公欲令僕射急討李密當有大功不則兵皆疫死世充兵多楚人俗信妖言衆皆請戰世充簡練精勇得二萬餘人馬二千餘匹軍於洛水南密軍偃師北山上時密新破化及有輕世充之心不設壁壘世充夜遣三百餘騎潛入北山伏溪谷中令軍人秣馬蓐食遲明而薄密密出兵應之陳未成列而兩軍合戰其伏兵發乘高而下馳壓密營又縱火焚其廬舍密軍潰降其將張童仁陳智略進下偃師密走保洛口初世充兄世偉及子玄應隨化及至東郡密得而囚之於城中至是盡獲之又執密長史邴元真妻子司馬鄭虔象之母及諸將子弟皆撫慰之各令潛呼其父兄世充進兵次洛口邴元真鄭虔象等舉倉城以應之密以數十騎走河陽率餘衆入朝世充盡收其衆振旅而還侗進拜世充太尉以尚書省為其府備置官屬世充立三榜於府門之外一求文才學識堪濟世務者一求武藝絶人摧鋒陷陳者一求能理寃枉擁抑不申者於是上書陳事日有數百世充皆躬自省覽殷勤慰勞好行小惠下至軍營騎士皆飾辭以誘之當時有識者見其心口相違頗以懷二世充嘗於侗前賜食還家大嘔吐疑遇毒所致自是不復朝請與侗絶矣遣雲定興段達入奏於侗請加九錫之禮二年三月遂策授相國總百揆封鄭王加九錫備物有道士桓法嗣者自言解圖讖乃上孔子閉房記畫作丈夫持一竿以驅羊釋云隋楊姓也干一者王字也王居羊後明相國代隋為帝也又取莊子人間世德充符二篇上之法嗣釋曰上篇言世下篇言充此即相國名矣明當德被人間而應符命為天子也世充大悅曰此天命也再拜受之即以法嗣為諫議大夫世充又羅取雜鳥書帛繫其頸自言符命而散放之有彈射得鳥來而獻者亦拜官爵段達雲定興等入見於侗曰天命不常鄭王功德甚盛願陛下揖讓告禪遵唐虞之迹侗怒曰天下者高祖之天下若隋德未衰此言不可發必天命有改亦何論於禪讓公等皆是先朝舊臣忽有斯言朕復當何所望段達等莫不流涕世充又使人謂曰今海內未定須得長君待四方乂安復子明辟必若前盟義不違負四月假為侗詔策禪位遣兄世惲廢侗於含涼殿世充僭即皇帝位建元曰開明國號鄭先封同姓王隆為淮陽王整為東郡王楷為馮翊王素為樂安王次封叔瓊為陳王兄世衡為秦王世偉為楚王世惲為齊王又封瓊子辨為嵵王衡子虔壽為蔡王偉子弘烈為魏王行本為荊王琬為代王惲子仁則為唐王道誠為衛王道詢為趙王道稜為燕王兄世師子太為宋王君度為越王立子玄應為皇太子封子玄恕為漢王世充每聽朝必殷勤誨諭言辭重復千端萬緒百司奉事疲於聽受或輕騎遊歷街衢亦不清道百姓但避路而已按轡徐行謂百姓曰昔時天子深坐九重在下事情無由聞徹世充非貪寶位本欲救時今當如一州刺史每事親覽當與士庶共評朝政恐門禁有限慮致壅塞今止順天門外置座聽朝又令西朝堂受抑屈東朝堂受直諫於是獻書上事日有數百條疏既煩省覽難遍數日後不復更出五月世充禮部尚書裴仁基及其子左輔大將軍行儼尚書左丞宇文儒童等數十人謀誅世充復尊立侗事泄皆見害夷其三族六月世惲因勸世充害恫以絶衆望世充遣其姪行本鴆殺侗諡曰恭皇帝其將軍羅士信率其衆千餘人來降十月世充率衆東徇地至于滑州仍以兵臨黎陽十一月竇建德入世充之殷州殺掠居人焚燒積聚以報黎陽之役三年二月世充殿中監豆盧達來降世充見衆心日離乃嚴刑峻制家一人逃者無少長皆坐為戮父子兄弟夫妻許其相告而免之又令五家相保有全家叛去而鄰人不覺者誅及四鄰殺人相繼其逃亡益甚至於樵採之人出入皆有限數公私窘急皆不聊生又以宮城為大獄意有所忌即收繫其人及家屬於宮中又每使諸將出外亦收其親屬質於宮內囚者相次不減萬口既艱食餒死者日數十人世充屯兵不散倉粟日盡城中人相食或握土置瓮中用水淘汰沙石沉下取其上浮泥投以米屑作餅餌而食之人皆體腫而腳弱枕倚於道路其尚書郎盧君業郭子高等皆死於溝壑七月秦王率兵攻之師至新安世充鎮堡相次來降八月秦王陳兵於青城宮世充悉兵來拒隔澗而言曰隋末喪亂天下分崩長安洛陽各有分地世充唯願自守不敢西侵計熊穀二州相去非遠若欲取之豈非度內既敦鄰好所以不然王乃盛相侵軼遠入吾地三崤之道千里饋糧以此出師未見其可太宗謂曰四海之內皆承正朔唯公執迷獨阻聲教東都士庶亟請王師關中義勇感恩致力至尊重違衆願有斯弔伐若轉禍來降則富貴可保如欲相抗無假多言世充無以報太宗分遣諸將攻其城鎮所至輒下九月王君廓攻拔世充之轘轅縣東徇地至管城而還於是河南州縣相次降附竇建德自侵殷州之後與世充遂結深隙信使斷絶十一月竇建德又遣人結好並陳救援之意世充乃遣其兄子琬及內史令長孫安世報聘且乞師四年二月世充率兵出方諸門與王師相抗世充軍敗因乘勝追之屯其城門世充步卒不得入驚散南走追斬數千級虜五千餘人世充從此不復敢出但嬰城自守以待建德之援三月秦王擒建德並王琬長孫安世等于武牢回至東都城下以示之且遣安世入城使言敗狀世充惶惑不知所為將潰圍而出南走襄陽謀於諸將皆不答乃率其將吏詣軍門請降於是收其府庫頒賜將士世充黃門侍郎薛德音以文檄不遜先誅之次收世充黨與段達楊汪單雄信陽公卿郭士衡郭什柱董濬張童仁朱粲等十餘人皆戮于洛渚之上秦王以世充至長安高祖數其罪世充對曰計臣之罪誠不容誅但陛下愛子秦王許臣不死高祖乃釋之與兄苪妻子同徙于蜀將行為讎人定州刺史獨孤修所殺子玄應及兄世偉等在路謀叛伏誅世充自篡位凡三年而滅竇建德貝州漳南人也少時頗以然諾為事嘗有鄉人喪親家貧無以葬時建德耕於田中聞而嘆息遽輟耕牛往給喪事由是大為鄉黨所稱初為里長犯法亡去會赦得歸父卒送葬者千餘人凡有所贈皆讓而不受大業七年募人討高麗本郡選勇敢尤異者以充小帥遂補建德為二百人長時山東大水人多流散同縣有孫安祖家為水所漂妻子餒死縣以安祖驍勇亦選在行中安祖辭貧白言漳南令令怒笞之安祖刺殺令亡投建德建德舍之是歲山東大饑建德謂安祖曰文皇帝時天下殷盛發百萬之衆以伐遼東尚為高麗所敗今水潦為災黎庶窮困而主上不恤親駕臨遼加以往歲西征瘡痍未復百姓疲弊纍年之役行者不歸今重發兵易可搖動丈夫不死當立大功豈可為逃亡之虜也我知高雞泊中廣大數百里莞蒲阻深可以逃難承間而出虜掠足以自資既得聚人且觀時變必有大功於天下矣安祖然其計建德招誘逃兵及無産業者得數百人令安祖率之入泊中為羣盜安祖自稱將軍鄃人張金稱亦結聚得百人在河阻中蓨人高士達又起兵得千餘人在清河界中時諸盜往來漳南者所過皆殺掠居人焚燒舍宅獨不入建德之閭由是郡縣意建德與賊徒交結收繫家屬無少長皆殺之建德聞其家被屠滅率麾下二百人亡歸士達士達自稱東海公以建德為司兵後安祖為張金稱所殺其兵數千人又盡歸于建德自此漸盛兵至萬餘人猶往來高雞泊中每傾身接物與士卒均執勤苦由是能致人之死力十二年涿郡通守郭絢率兵萬餘人來討士達士達自以智略不及建德乃進為軍司馬咸以兵授焉建德既初董衆欲立奇功以威羣賊請士達守輜重自簡精兵七千人以拒絢詐為與士達有隙而叛之士達又宣言建德背亡而取虜獲婦人紿為建德妻子於軍中殺之建德僞遣人遺絢書請降願為前驅破士達以自效絢信之即引兵從建德至長河界期與為盟共圖士達絢兵益懈而不備建德襲之大破絢軍殺略數千人獲馬千餘匹絢以數十騎遁走遣將追及於平原斬其首以獻士達由是建德之勢益振隋遣太僕卿楊義臣率兵萬餘人討張金稱破之於清河所獲賊衆皆屠滅餘散在草澤間者復相聚而投建德義臣乘勝至平原欲入高雞泊中建德謂士達曰歷觀隋將善用兵者唯義臣耳新破金稱遠來襲我其鋒不可當請引兵避之令其欲戰不得空延歲月將士疲倦乘便襲擊可有大功今與爭鋒恐公不能敵也士達不從其言因留建德守壁自率精兵逆擊義臣戰小勝而縱酒高宴有輕義臣之心建德聞之曰東海公未能破賊而自矜大此禍至不久矣隋兵乘勝必長驅至此人心驚駭吾恐不全遂留人守壁自率精鋭百餘據險以防士達之敗後五日義臣果大破士達於陳斬之乘勢追奔將圍建德守兵既少聞士達敗衆皆潰散建德率百餘騎亡去行至饒陽觀其無守備攻陷之撫循士衆人多願從又得三千餘兵初義臣既殺士達以為建德不足憂建德復還平原收士達敗兵之死者悉收葬焉為士達發喪三軍皆縞素招集亡卒得數千人軍復大振始自稱將軍初羣盜得隋官及山東士子皆殺之唯建德每獲士人必加恩遇初得饒陽縣長宋正本引為上客與參謀議此後隋郡長吏稍以城降之軍容益盛勝兵十餘萬人十三年正月築壇場於河間樂壽界中自稱長樂王年號丁丑署置官屬七月隋遣右翊衛將軍薛世雄率兵三萬來討之至河間城南營於七里井建德聞世雄至選精兵數千人伏河間南界澤中悉拔諸城僞遁云亡入豆子中世雄以為建德畏己乃不設備建德覘知之自率敢死士一千人襲擊世雄會雲霧晝晦兩軍不辨隋軍大潰自相踏藉死者萬餘世雄以數百騎而遁餘軍悉陷於是建德進攻河間頻戰不下其後城中食盡又聞煬帝被弒郡丞王琮率士吏發喪建德遣使弔之琮因使者請降建德退舍具饌以待焉琮率官屬素服面縛詣軍門建德親解其縛與言隋亡之事琮俯伏悲哀建德亦為之泣諸賊帥或進言曰琮拒我久殺傷甚衆計窮方出今請烹之建德曰此義士也方加擢用以勵事君者安可殺之往在泊中共為小盜容可恣意殺人今欲安百姓以定天下何得害忠良乎因令軍中曰先與王琮有隙者今敢動搖罪三族即日授琮瀛州刺史始都樂壽號曰金城宮自是郡縣多下之武德元年冬至日於金城宮設會有五大鳥降于樂壽羣鳥數萬從之經日而去因改年為五鳳有宗城人獻玄圭一枚景城丞孔德紹曰昔夏禹膺籙天錫玄圭今瑞與禹同宜稱夏國建德從之先是有上谷賊帥王須拔自號漫天王擁衆數萬入掠幽州中流矢而死其亞將魏刀兒代領其衆自號歷山飛入據深澤有徒十萬建德與之和刀兒因弛守備建德襲破之又盡並其地二年宇文化及僭號於魏縣建德謂其納言宋正本內史侍郎孔德紹曰吾為隋之百姓數十年矣隋為吾君二代矣今化及殺之大逆無道此吾讎矣請與諸公討之何如德紹曰今海內無主英雄競逐大王以布衣而起漳浦隋郡縣官人莫不爭歸附者以大王仗順而動義安天下也宇文化及與國連姻父子兄弟受恩隋代身居不疑之地而行弒逆之禍篡隋自代乃天下之賊也此而不誅安用盟主建德稱善即日引兵討化及連戰大破之化及保聊城建德縱撞車拋石機巧絶妙四面攻城陷之建德入城先謁隋蕭皇后與語稱臣悉收弒煬帝元謀者宇文智及楊士覽元武達許弘仁孟景集隋文武官對而斬之梟首轅門之外化及並其二子同載以檻車至大陸縣斬之建德每平城破陳所得資財並散賞諸將一無所取又不噉肉常食唯有菜蔬脫粟之飯其妻曹氏不衣紈綺所使婢妾才十數人至此得宮人以千數並有容色應時放散得隋文武官及驍果尚且一萬亦放散聽其所去又以隋黃門侍郎裴矩為尚書左僕射兵部侍郎崔君肅為侍中少府令何稠為工部尚書自餘隨才拜授委以政事其有欲往關中及東都者亦恣聽之仍給其衣糧以兵援之送出其境攻陷洺州虜刺史袁子幹遷都于洺州號萬春宮遣使往灌津祠竇青之墓置守冢二十家又與王世充結好遣使朝隋越王侗於洛陽後世充廢侗自立乃絶之始自尊大建天子旌旗出警入蹕下書言詔追諡隋煬帝為閔帝封齊王暕子政道為鄖公然猶依倚突厥隋義城公主先嫁突厥及是遣使迎蕭皇后建德勒兵千餘騎送之入蕃又傳化及首以獻公主既與突厥相連兵鋒益盛九月南侵相州河北大使淮安王神通不能拒退奔黎陽相州陷殺刺史呂珉又進攻衛州陷黎陽左武衛大將軍李世績皇妹同安長公主及神通並為所虜滑州刺史王軌為奴所殺攜其首以奔建德曰奴殺主為大逆我何可納之命立斬奴而返軌首於滑州吏人感之即日而降齊濟二州及兗州賊帥徐圓朗皆聞風而下建德釋李世績使其領兵以鎮黎州三年正月世績捨其父而逃歸執法者請誅之建德曰績本唐臣為我所虜不忘其主逃還本朝此忠臣也其父何罪竟不誅舍同安長公主及神通於別館待以客禮高祖遣使與之連和建德即遣公主與使俱歸嘗破趙州執刺史張昂邢州刺史陳君賓大使張道源等以侵軼其境建德將戮之其國子祭酒凌敬進曰夫犬各吠非其主今鄰人堅守力屈就擒此乃忠確士也若加酷害何以勸大王之臣乎建德盛怒曰我至城下猶迷不降勞我師旅罪何可赦敬又曰今大王使大將軍高士興於易水抗禦羅藝兵才至士興即降大王之意復為可不建德乃悟即命釋之其寬厚從諫多此類也又遣士興進圍幽州攻之不克退軍於籠火城為藝所襲士興大潰先是其大將王伏寶多勇略功冠等倫羣帥嫉之或言其反建德將殺之伏寶曰我無罪也大王何聽讒言自斬左右手乎既殺之後用兵多不利九月建德自帥師圍幽州藝出兵與戰大破之斬首千二百級藝兵頻勝而驕進襲其營建德列陳於營中填塹而出擊藝敗之建德薄其城不克遂歸洺州其納言宋正本好直諫建德又聽讒言殺之是後人以為誡無復進言者由此政教益衰先曹州濟陰人孟海公擁精兵三萬據周橋城以掠河南之地其年十一月建德自率兵渡河以擊之時秦王攻王世充於洛陽建德中書舍人劉斌說建德曰今唐有關內鄭有河南夏居河北此鼎足相持之勢也聞唐兵悉衆攻鄭首尾二年鄭勢日蹙而唐兵不解唐強鄭弱其勢必破鄭鄭破則夏有齒寒之憂為大王計者莫若救鄭鄭拒其內夏攻其外破之必矣若却唐全鄭此常保三分之勢也若唐軍破後而鄭可圖則因而滅之總二國之衆乘唐軍之敗長驅西入京師可得而有此太平之基也建德大悅曰此良策矣適會世充遣使乞師于建德即遣其職方侍郎魏處繪入朝請解世充之圍四年二月建德克周橋虜海公留其將范願守曹州悉發海公及徐圓朗之衆來救世充軍至滑州世充行臺僕射韓洪開城納之遂進逼元州梁州管州皆陷之屯于滎陽三月秦王入武牢進薄其營多所傷殺並擒其將殷秋石瓚時世充弟世辨為徐州行臺遣其將郭士衡領兵數千人從之合衆十餘萬號為三十萬軍次成臯築宮于板渚以示必戰又遣間使約世充共為表𩹉經二月迫於武牢不得進秦王遣將軍王君廓領輕騎千餘抄其糧運獲其大將張青特虜獲甚衆建德數不利人情危駭將帥已下破孟海公皆有所獲思歸洺州凌敬進說曰宜悉兵濟河攻取懷州河陽使重將居守更率衆鳴鼓建旗踰太行入上黨先聲後實傳檄而定漸趨壺口稍駭蒲津收河東之地此策之上也行此必有三利一則入無人之境師有萬全二則拓土得兵三則鄭圍自解建德將從之而世充之使長孫安世陰齎金玉啖其諸將以亂其謀衆咸進諫曰凌敬書生耳豈可與言戰乎建德從之退而謝敬曰今衆心甚鋭此天贊我矣因此決戰必將大捷已依衆議不得從公言也敬固爭建德怒扶出焉其妻曹氏又言於建德曰祭酒之言可從大王何不納也請自滏口之道乘唐國之虛連營漸進以取山北又因突厥西抄關中唐必還師以自救此則鄭圍解矣今頓兵武牢之下日月淹久徒為自苦事恐無功建德曰此非女子所知也且鄭國懸命朝暮以待吾來既許救之豈可見難而退示天下以不信也於是悉衆進逼武牢官軍按甲挫其鋭及建德結陳於汜水秦王遣騎挑之建德進軍而戰竇抗當之建德少却秦王馳騎深入反覆四五合然後大破之建德中槍竄於牛口渚車騎將軍白士讓楊武威生獲之先是軍中有童謠曰豆入牛口勢不得久建德行至牛口渚甚惡之果敗於此地建德所領兵衆一時奔潰妻曹氏及其左僕射齊善行將數百騎遁于洺州餘黨欲立建德養子為主善行曰夏王平定河朔士馬精強一朝被擒如此豈非天命有所歸也不如委心請命無為塗炭生人遂以府庫財物悉分士卒各令散去善行乃與建德右僕射裴矩行臺曹旦及建德妻率僞官屬舉山東之地奉傳國等八璽來降七月秦王俘建德至京師斬于長安市年四十九自起軍至滅凡六歲河北悉平其年劉黑闥復盜據山東史臣曰世充姦人遭逢昏主上則諛佞詭俗以取榮名下則強辨飾非以制羣論終行篡逆自恣陸梁安忍殺人矯情馭衆凡所委任多是叛亡出降秦王不致顯戮其為幸也多矣建德義伏鄉閭盜據河朔撫馭士卒招集賢良中絶世充終斬化及不殺徐蓋生還神通沉機英斷靡不有初及宋正本王伏寶被讒見害凌敬曹氏陳謀不行遂至亡滅鮮克有終矣然天命有歸人謀不及贊曰世充篡逆建德愎諫二凶即誅中原弭亂
