body:
  text: 舊唐書卷十五本紀第十五憲宗下元和七年春正月辛酉朔己巳以刑部尚書趙宗儒檢校吏部尚書興元尹山南西道節度使庚午以兵部尚書王紹判戶部事辛未以京兆尹元義方為鄜州刺史鄜坊丹延觀察使以司農卿李銛為京兆尹是夜月掩熒惑壬申廢信州永豐縣越州山陰縣衢州盈川縣癸酉振武河溢毀東受降城二月庚寅朔壬辰詔以去秋旱歉賑京畿粟三十萬石其元和六年春賑貸百姓粟二十四萬石並宜放免辛丑尚書省重定左右僕射上事儀注壬寅以兵部侍郎許孟容為河南尹辛亥山南西道節度使裴玢卒癸丑入蕃使不得與私覿正員官量別支給以充私覿舊使絕域者許賣正員官十餘員取貨以備私覿雖優假遠使殊非典法故革之敕錢重物輕為弊頗甚詳求適變將以便人所貴緡貨通行里閭寬恤宜令羣臣各隨所見利害狀以聞三月己未朔辛酉以惠昭太子葬罷曲江上巳宴庚午以旱敕諸司疏決繫囚夏四月戊子朔癸巳敕天下州府民戶每田一畝種桑二樹長吏逐年檢計以聞辛亥鹽鐵使王播奏元和六年賣鹽鐵除峽內井鹽外計收六百八十五萬九千二百貫五月戊午朔庚申上謂宰臣曰卿等累言吳越去年水旱昨有御史自江淮迴言不至為災人非甚困李絳對曰臣得兩浙淮南狀繼言歉旱方隅授任皆朝廷信重之臣御史非良或容希媚此正當姦佞之臣況推誠之道君人大本任大臣以事不可以小臣言間之伏望明示御史姓名正之典刑上曰卿言是也朝廷大體以恤人為本一方不稔即宜賑救濟其饑寒況可疑之也向者不思而有此問朕言過矣絳等拜賀癸亥熒惑近太微右執法六月丁亥朔舒州桐城梅天陂內有黃白二龍自陂中乘風雷躍起高二百尺行六里入浮塘陂癸巳以金紫光祿大夫守司徒同平章事崇文館大學士太清宮使上柱國岐國公杜佑為光祿大夫守太保致仕宜朝朔望佑累表懇請故也己亥月近南斗魁第四星鎮州甲仗庫一十三間災兵仗都盡王承宗常畜叛謀至是始懼天罰兇氣稍奪仍殺主庫吏百餘人乙丑以兵部員外郎王涯知制誥乙亥制立遂王宥為皇太子改名恆己卯以新羅大宰相金彥昇為開府儀同三司檢校太尉使持節大都督雞林州諸軍事雞林州刺史兼寧海軍使上柱國封新羅國王仍冊彥昇妻貞氏為妃八月丁亥朔新除新羅國大宰相金崇斌等三人宜令本國准例賜戟戊戌魏博節度使田季安卒辛丑廢蓬州宕渠縣甲辰宣歙觀察使房式卒丙午以蘇州刺史范傳正為宣歙觀察使戊申制諸州府五品已上官替後委本道長官量其才行官業資歷每年冬季一度聞薦其罷使郎官御史許朝臣每年冬季准此聞薦諸使府參佐檢校官從元授官月日計如是五品已上官及臺省官經三十箇月外任與轉改餘官經三十六箇月奏轉改如未經考便有事故及停替官本限之外更加十箇月即任申奏辛亥以左龍武大將軍薛平為滑州刺史義成軍節度使冬十月乙未魏博三軍舉其衙將田興知軍州事時田季安死子懷諫年十一為副大使知軍府事軍政一決於家僮蔣士則數易大將軍情不安因田興入衙兵環而劫請興頓仆於地軍衆不散興曰欲聽吾命勿犯副大使衆曰諾但殺蔣士則等十數人而止即日移懷諫於外令朝京師甲辰以魏博都知兵馬使兼御史中丞沂國公田興為銀青光祿大夫檢校工部尚書兼魏州大都督府長史充魏博節度使庚戌澧王寬改名惲深王察改名悰洋王寰改名忻絳王寮改名悟建王審改名恪以鄭滑節度使袁滋為戶部尚書十一月丙辰朔乙丑詔田興以魏博請命宜令司封郎中知制誥裴度往彼宣慰賜三軍賞錢一百五十萬貫以河陰院諸道合進內庫物充六州百姓給復一年兼赦管內見繫囚徒及度至魏州田興禮待甚恭仍請度至六州諸縣宣達朝旨辛未太保致仕杜佑卒東川觀察使潘孟陽奏龍州武安縣嘉禾生有麟食之麟之來羣鹿環之光彩不可正視使畫工圖之以獻乙亥以給事中李逢吉司勳員外郎李巨並充皇太子諸王侍讀戊寅吏部尚書鄭餘慶請復置吏部考官三員吏部郎中楊於陵執奏以為不便乃詔考官韋顗等三人祇考及第科目人其餘吏部侍郎自定己卯江西觀察使崔芃卒辛巳以前魏博節度副使田懷諫為右監門衞將軍賜宅一區芻粟等甲申以同州刺史裴堪為江西觀察使十二月丙戌朔以吏部尚書鄭餘慶為太子少傅丙辰左拾遺楊歸厚以自娶婦進狀借禮會院貶國子主簿分司戊戌以京兆尹裴向為同州防禦使己亥魏博奏管內州縣官員二百五十三員請吏部銓注八年春正月乙卯朔庚午冊大言義為渤海國王授秘書監忽汗州都督辛未制以正議大夫守禮部尚書同平章事上柱國扶風郡開國公權德輿守禮部尚書罷知政事癸未以山南東道節度使李夷簡檢校戶部尚書成都尹充劍南西川節度使以戶部尚書袁滋檢校兵部尚書襄州刺史充山南東道節度使二月乙酉朔辛卯田興改名弘正宰相李吉甫進所撰元和郡國圖三十卷又進六代略三十卷又為十道州郡圖五十四卷宰相于男太常丞敏專殺梁正言奴棄溷中事發與男季友素服待罪貶恩王傅于敏長流雷州錮身發遣殿中少監駙馬都尉于季友誑罔公主藏隱內人轉授兇兄移貯外舍傷風黷禮莫大於茲宜削奪所任官令在家修省贊善大夫于正秘書丞于方並停見任皆之子也捕獲受于賂為致出鎮人梁正言及交構權貴僧鑒虛並付京兆府杖死甲子以劍南西川節度使銀青光祿大夫檢校吏部尚書兼門下侍郎同平章事上柱國臨淮郡開國公食邑二千戶武元衡復入中書知政事兼崇玄館大學士太清宮使辛未上以久旱親於禁中求雨是夜澍雨霑足丙子大風壞崇陵寢殿鴟尾折門戟六夏四月癸未朔乙酉以邕管經略使房啟為桂管觀察使以開州刺史竇羣為邕管經略使丙戌以錢重貨輕出庫錢五十萬貫令兩常平倉收市布帛每段匹於舊估加十之一鄜坊觀察使元義方卒辛卯以將作監薛伾為鄜坊觀察使乙未長安西市豕生三耳八足二尾僧鑒虛為高崇文納賂四萬五千貫與宰相杜黃裳共引致人永樂縣令吳憑付錢與黃裳男載敕吳憑配流昭州黃裳崇文已薨歿所用錢不須勘問杜載釋放辛亥賜魏博田弘正錢二十萬貫收市軍糧庚申河中尹張弘靖奏修古舜城六月辛巳朔時積雨延英不開十五日是日上謂宰臣曰今後每三日雨亦對來乙酉工部尚書致仕裴佶卒丙戌以東都留守韓臯檢校吏部尚書兼許州刺史充忠武軍節度使庚寅京師大風雨毀屋飄瓦人多壓死所在川瀆暴漲行人不通辛丑出宮人二百車任從所適以水災故也壬寅宰臣武元衡李吉甫李絳舊相鄭餘慶權德輿各奉詔令進舊詩秋七月辛亥朔癸丑以權德輿檢校吏部尚書東都留守丁卯以振武節度使李光進為靈州大都督府長史靈武節度使癸酉命中尉彭中獻修興唐觀壯其規制北拒禁城開複道以通行幸是夜月近五諸侯丁丑新授桂管觀察使房啟降為太僕少卿啟初拜桂管啟吏賂吏部主者私得官告以授啟俄有詔命中使賫告牒與啟曰受之五日矣上怒杖吏部令史罰郎官啟亦即降之以安南都護馬總為桂管觀察使以江州刺史張勔為安南都護本管經略招討使鄜坊觀察使薛伾卒八月辛巳朔癸未以蘄州刺史裴行立為安南都護本管經略招討使以張勔耄年也丁亥以司農卿裴武為鄜坊觀察使庚寅詔毀家徇國故徐州刺史李洧等一十家子孫並宣甄奬甲午太白近軒轅辛丑以東川節度使潘孟陽為戶部侍郎判度支盧坦為梓州刺史劍南東川節度使乙巳廢天武軍併入神策軍九月庚戌朔丙辰淄青李師道進鶻十二命還之戊午賜羣臣宴於曲江乙丑詔比聞嶺南五管幷福建黔中等道多以南口餉遺及於諸處博易骨肉離析良賤難分此後嚴加禁止如違長吏必當科罰淮西吳少陽獻馬三百匹丙寅詔減死戍邊前代美政量其遠邇亦有便宜今後兩京關內河南河東河北淮南山南東西道州府除大辟罪外輕犯不得配流天德五城戊辰以給事中竇易直為陝虢防禦使仍賜金紫壬申以恩王傅于為太子賓客以前朔方靈鹽節度使王佖為右衞將軍將相出入翰林草制謂之白麻至佖奏罷中書草制因為例也太常習樂始復用大鼓冬十月庚辰朔己丑熒惑近太微西垣南首星庚寅以湖南觀察使柳公綽為岳鄂沔蘄安黃觀察使辛卯涇原節度使朱忠亮卒壬辰汴州韓弘進所撰聖朝萬歲樂譜共三百首己巳以宗正少卿李道古為黔中觀察使以蘇州刺史張正甫為湖南觀察使丙申以大雪放朝人有凍踣者雀鼠多死戊戌以神策普潤鎮使蘇光榮為涇州刺史四鎮北庭行軍涇原節度使翰林學士司封員外郎韋弘景守本官以草光榮詔漏功勳故也壬辰振武奏迴紇千騎至鵜泉十一月庚戌朔丙辰以福建觀察使裴次元為河南尹丙寅以鹽州隸夏州自夏州至豐州初置八驛丁卯以泗州刺史薛謇為福建觀察使右龍武統軍劉昌裔卒癸酉昭義郗士美奏諸軍就食于臨洺京畿水旱霜損田三萬八千頃十二月庚辰朔以京兆尹李銛為鄜坊觀察使以代裴武入為京兆尹辛巳敕應賜王公公主百官等莊宅碾磑店鋪車坊園林等一任貼典貨賣其所緣稅役便令府縣收管敕張茂昭立功河朔舉族歸朝義烈之風史冊收載如聞身歿之後家無餘財追懷舊勳特越常典宜歲賜絹二千匹春秋二時支給羣臣上表請立德妃郭氏為皇后丙戌以桂管觀察使馬總為廣州刺史嶺南節度使以邕管經略使崔詠為桂管觀察使庚寅以夔州刺史馬平陽為邕管經略使振武軍亂逐其帥李進賢屠其家乃以夏州節度使張煦代進賢率兵二千赴鎮許便宜擊斷丙午以金吾衞將軍田進為夏州刺史夏綏銀節度使以河溢浸滑州羊馬城之半滑州薛平魏博田弘正徵役萬人於黎陽界開古黃河道南北長十四里東西闊六十步深一丈七尺決舊河水勢滑人遂無水患九年春正月己酉朔乙卯大霧而雪李吉甫累表辭相位不許乙亥張煦入單于都護府誅作亂軍士蘇國珍等二百五十二人二月己卯朔戶部侍郎判度支潘孟陽兼京北五城營田使丁丑貶前振武節度使李進賢為通州刺史監軍路朝見配役于定陵丁未詔以歲飢放關內元和八年已前逋租錢粟賑常平義倉粟三十萬石丙申賜振武軍絹二萬匹丁酉月近心大星癸卯制朝議大夫守中書侍郎同平章事上柱國高邑男李絳守禮部尚書累表辭相位故也三月己酉朔丙辰巂州地震晝夜八十震壓死者百餘人庚申妖人梁叔高自廣州來授書與吏部侍郎楊於陵使為己輔於陵執之以告殺之辛酉以太子少傅鄭餘慶檢校右僕射興元尹山南西道節度使代趙宗儒為御史大夫丁卯隕霜殺桑召大理卿裴棠棣男損前昭應令杜式方男悰見于麟德殿前各賜緋許尚公主夏四月戊寅朔庚寅詔贈太師咸寧王渾瑊宜配享德宗廟庭五月丁未朔以嶺南節度使鄭絪為工部尚書庚申移宥州於經略軍郭下置延恩縣隸夏州觀察使是月旱穀貴出太倉粟七十萬石開六場糶以惠飢民乙丑桂王綸薨以旱免京畿夏稅十三萬石青苗錢五萬貫六月丙子朔戊寅以天德軍經略使周懷乂卒廢朝一日經略使廢朝自懷乂始也庚辰以義武軍節度副使渾鎬檢校工部尚書兼定州大都督府長史充義武軍節度使易定觀察使北平軍等使丙戌以左龍武將軍燕重旰為豐州刺史天德軍豐州西城中城都防禦押蕃落等使乙未置禮賓院於長興里之北丙申以左丞孔戣為華州刺史潼關防禦鎮國軍等使壬寅制河中晉絳慈隰等州節度使張弘靖守刑部尚書同中書門下平章事秋七月丙午朔乙未以御史大夫趙宗儒檢校尚書右僕射兼河中尹河中晉絳等州節度使戊辰以太子司議郎杜悰為銀青光祿大夫殿中少監駙馬都尉尚岐陽公主閏八月乙巳朔辛酉以河陽節度使烏重胤兼汝州刺史壬戌以中書舍人王涯屯田郎中韋綬為皇太子諸王侍讀己巳加田弘正檢校右僕射賞三軍錢二十萬貫九月甲戌朔以洺州刺史李光顏為陳州刺史忠武軍都知兵馬使丙戌以山南東道節度使袁滋檢校兵部尚書兼江陵尹荊南節度使以荊南節度使嚴綬檢校司空襄州刺史山南東道節度使己丑月掩軒轅淮西節度使吳少陽卒其子元濟匿喪自總兵柄乃焚劫舞陽等四縣朝廷遣使弔祭拒而不納壬辰真臘國朝貢戊戌加河東節度使王鍔檢校司空同平章事以給事中孟簡為越州刺史浙東觀察使贈吳少陽尚書右僕射冬十月甲辰朔丙午金紫光祿大夫中書侍郎同平章事集賢大學士監修國史上柱國趙國公李吉甫卒甲寅以刑部員外郎令狐楚為職方員外郎知制話壬戌以忠武軍節度使韓臯為吏部尚書以忠武軍節度副使兼陳州刺史李光顏為許州刺史忠武軍節度使甲子制朕嗣膺寶位于茲十年每推至誠以御方夏庶以仁化臻于太和宵衣旰食意屬於此今淮西一道未達朝經擅自繼襲肆行寇掠將士等迫於受制非是本心思去三面之羅庶遵兩階之義宜以山南東道節度使嚴綬兼充申光蔡等州招撫使仍命內常侍崔潭峻為監軍戊辰以尚書左丞呂元膺檢校工部尚書東都留守舊例命留守賜旗甲與方鎮同及元膺受命不賜諫官援華汝壽三州例有賜居守之重不宜獨闕上曰此三處亦宜停賜十一月甲戌朔甲申以吏部尚書韓臯為太子賓客甲午以御史中丞胡証為單于大都護振武麟勝等軍節度使丁酉太子太傅范希朝卒戊戌以中書舍人裴度為御史中丞以左金吾大將軍郭釗檢校工部尚書邠州刺史充邠寧節度使以職方員外郎知制誥令狐楚為翰林學士十二月甲辰朔丁未振武節度使張煦卒辛亥邠寧節度使檢校右僕射閻巨源卒癸丑兵部尚書王紹卒己未右羽林統軍孟元陽卒丙寅太子少保趙昌卒戊辰制以中大夫守尚書右丞上騎都尉賜紫金魚袋韋貫之本官同中書門下平章事十年春正月癸酉朔乙酉宣武軍節度使韓弘守司徒平章事並如故丙申嚴綬帥師次蔡州界己亥制削奪吳元濟在身官爵庚子桂管奏移富州治於故城二月癸卯朔甲辰嚴綬軍為賊所襲賊於磁丘退守唐州田弘正子布韓弘子公武各率師隸李光顏討賊辛亥以禮部尚書李絳為華州潼關防禦鎮軍等使壬戌河東防秋將劉輔殺豐州刺史燕重旰己巳以羽林將軍李彙為涇原節度使三月壬申朔以右金吾將軍李奉仙為豐州刺史天德軍西城中城都防禦使己卯以劍南西川節度行軍司馬李程為兵部郎中知制誥乙酉以虔州司馬韓泰為漳州刺史以永州司馬柳宗元為柳州刺史饒州司馬韓曄為汀州刺史朗州司馬劉禹錫為播州刺史台州司馬陳諫為封州刺史御史中丞裴度以禹錫母老請移近處乃改授連州刺史贈故太常卿崔邠禮部尚書李光顏破賊於南頓辛亥盜焚河陰轉運院凡燒錢帛二十萬貫匹米二萬四千八百石倉室五十五間防院兵五百人營於縣南盜火發而不救呂元膺召其將殺之自盜火發河陰人情駭擾壬戌以長安縣令徐俊為邕管經略使五月辛未朔辛巳御史中丞裴度兼刑部侍郎時度自淮西行營宣慰還所言軍機多合上旨故以兼官寵之丙申李光顏大破賊黨於洄曲自徵兵討賊凡十餘鎮之師環於申蔡未立戰功裴度使還奏曰臣觀諸將惟光顏見義能勇必能立功至是告捷京師相賀上尤賞度之知人六月辛丑朔癸卯鎮州節度使王承宗遣盜夜伏於靖安坊刺宰相武元衡死之又遣盜於通化坊刺御史中丞裴度傷首而免是日京城大駭自京師至諸門加衞兵宰相導從加金吾騎士出入則彀弦露刃每過里門訶索甚諠公卿持事柄者以家僮兵仗自隨武元衡死數日未獲賊兵部侍郎許孟容請見奏曰豈有國相橫屍路隅不能擒賊因灑泣極言上為之憤歎乃詔京城諸道能捕賊者賞錢萬貫仍與五品官敢有蓋藏全家誅戮乃積錢二萬貫於東西市京城大索公卿節將複壁重轑者皆搜之庚戌神策將士王士則王士平以盜名上言且言王承宗所使乃捕得張晏等八人誅之乙丑制以朝議郎守御史中丞兼刑部侍郎飛騎尉賜紫金魚袋裴度為朝請大夫守刑部侍郎同中書門下平章事秋七月庚午朔靈武節度使李光進卒辛未以神策軍長武城使杜叔良為朔方靈鹽定遠城節度觀察使甲戌詔成德軍節度使王承宗自滌瑕疵累加奬拔列在維藩之任待以忠正之徒謂懷君父之恩克勵人臣之節而動思棄命恣逞非心傲狠反常橫辱無畏以其先祖嘗立忠勳每念含容庶聞悛革曾不知陰謀逆狀久則逾彰凶德禍機盈而自覆乃敢輕肆指斥妄陳表章潛遣姦人內懷兵刃賊殺元輔毒傷憲臣縱其兇殘無所顧望推窮事迹罪狀昭明周覽讞詞良用驚歎宜令絕其朝貢其所部博野樂壽兩縣本屬范陽宜却隸劉總駙馬都尉王承系太子贊善王承迪丹王府司馬王承榮等並宜遠郡安置先是承宗上表怨咎武元衡留中不報又肆指斥上使持其表以示百官羣臣皆請問罪丙戌涇原節度使李彙卒以將作監王潛為涇州刺史四鎮北庭涇原節度使乙未以京兆尹裴武為司農卿以捕賊弛慢故也八月己亥朔日有蝕之丙寅訶陵國遣使獻僧祗僮及五色鸚鵡頻伽鳥幷異香名寶丁未淄青節度使李師道陰與嵩山僧圓淨謀反勇士數百人伏於東都進奏院乘洛城無兵欲竊發焚燒宮殿而肆行剽掠小將楊進李再興告變留守呂元膺乃出兵圍之賊突圍而出入嵩岳山棚盡擒之訊其首僧圓淨主謀也僧臨刑歎曰誤我事不得使洛城流血九月癸酉以宣武軍節度使韓弘充淮西行營兵馬都統丁酉以太子賓客韓臯為兵部尚書冬十月庚子始析山南東道為兩節度以戶部侍郎李遜為襄州刺史充襄復郢均房節度使以右羽林將軍高霞寓為唐州刺史充唐隨鄧節度使刑部尚書權德輿奏請行用新刪定敕格三十卷從之壬子以太子賓客于為戶部尚書十一月戊辰詔出內庫繒絹五十五萬匹供軍乙亥以山南東道節度使嚴綬為太子少保戊寅盜焚獻陵寢宮詔發振武兵二千會義武軍以討王承宗十二月壬寅夜太白犯鎮星甲辰李愿擊敗李師道之衆九千斬首二千級壬子東都留守呂元膺請募置三河子弟以衞宮城甲寅越州復置山陰縣庚申新造指南車記里鼓出宮人七十二人置京城寺觀有家者歸之乙丑河東節度使王鍔卒是歲渤海新羅奚契丹黑水南詔牂柯並遣使朝貢十一年春正月丁卯朔以宿師于野不受朝賀己巳以中書侍郎平章事張弘靖檢校吏部尚書兼太原尹北都留守河東節度使戊寅詔羣臣曰今用兵已久利害相半其攻守之宜罰宥之要宜各具議狀以聞庚辰翰林學士錢徽蕭俛各守本官以上疏請罷兵故也癸未削奪王承宗在身官爵所襲封邑賜武俊子金吾將軍士平令河東河北道諸鎮加兵進討甲申盜斷建陵門戟四十七竿甲子李光顏奏破賊二月癸卯吐蕃贊普卒以中書舍人權知禮部貢舉賜緋魚袋李逢吉為門下侍郎同平章事賜紫金魚袋以內庫絹四萬匹賞幽魏將士甲寅以華州刺史李絳為兵部尚書丙辰月掩心戊午南詔蠻酋龍蒙盛卒三月庚午皇太后崩于興慶宮之咸寧殿是日羣臣發喪於西宮兩儀殿以宰臣裴度為禮儀使吏部尚書韓臯為大明宮留守設次于中書辛未敕諸司公事宜權取中書門下處分癸酉分命朝臣告哀于天下甲戌見羣臣于紫宸門外廡下己卯以宰臣李逢吉充大行皇太后山陵使出內庫繒帛五萬匹充奉山陵己丑月近鎮星夏四月壬寅西川節度使李夷簡遣使告哀於南詔后喪邊鎮告四夷舊制也庚戌貶戶部侍郎判度支楊於陵為郴州刺史坐供軍有闕也丁巳以徐宿飢賑粟八萬石五月丁卯夜辰歲二宿合于東井宥州軍亂逐刺史駱怡壬申李光顏破賊于凌雲柵六月甲辰高霞寓敗于鐵城退保新興柵是日人情悚駭宰相奏對多請罷兵上曰勝負兵家常勢不可以一將失利便沮成計今但議用兵方略朝廷庶務制置可否耳是夜月掩心後星庚戌田弘正軍討王承宗次于南宮辛酉羣臣上大行皇太后諡曰莊憲秋七月丁丑貶隨唐節度使高霞寓為歸州刺史以河南尹鄭權為襄州刺史充山南東道節度使以荊南節度使袁滋為唐州刺史彰義軍節度使申光唐蔡隨鄧州觀察使權以唐州為理所以華州刺史裴武為江陵尹充荊南節度使戊寅以隨州刺史楊旻為唐州刺史充行營都知兵馬使以滋儒者故復以旻將其兵壬午宣武軍奏破賊八月壬寅以宰臣韋貫之為吏部侍郎罷知政事貫之以淮西河北兩處用兵勞於供餉請緩承宗而專討元濟與裴度爭論上前故也戊申容州奏颶風海水毀州城甲申祔莊憲皇后於豐陵九月丁卯饒州奏浮梁樂平二縣五月內暴雨水溢失四千七百戶溺死者一百七十人丙子新除吏部侍郎韋貫之再貶湖南觀察使辛未貶吏部侍郎韋顗為陝州刺史刑部郎中李正辭為金州刺史度支郎中薛公幹為房州刺史屯田郎中李宣為忠州刺史考功郎中韋處厚為開州刺史禮部員外郎崔韶為果州刺史並為補闕張宿所搆言與貫之朋黨故也乙酉蔡州軍前奏拔凌雲柵冬十月丁巳以刑部尚書權德輿檢校吏部尚書兼興元尹充山南西道節度使丙寅幽州劉總加平章事鄆州李師道加檢校司空師道聞拔凌雲柵乃懼偽貢款誠故有是命庚午以司農卿王遂為宣州刺史宣歙池觀察使以京兆尹李翛為潤州刺史浙西觀察使以遂翛常歷計司能聚斂方藉供軍故有斯授壬申敕諸道奏事官非急切不得乘驛馬丁丑出內庫錢五十萬貫供軍戊寅夜月犯歲辛巳命內常侍梁守謙監淮西行營諸軍仍以空名告身五百通及金帛付之戊子夜土火合于虛危十二月丙午以易州刺史陳楚為定州刺史義武軍節度使丁未以翰林學士尚書工部侍郎知制誥王涯為中書侍郎同平章事甲寅以閑宮苑使李愬檢校左散騎常侍兼鄧州刺史充唐隨鄧等州節度使初置淮潁水運使運揚子院米自淮陰泝流至壽州四十里入潁口又泝流至潁州沈丘界五百里至于項城又泝流五百里入河又三百里輸于郾城得米五十萬石茭一千五百萬束省汴運七萬六千貫己未邕管奏黃洞賊屠巖州未央宮及飛龍草場火京畿水害田潤常湖衢陳許木水是歲冬雷桃杏花迴鶻靺鞨奚契丹牂柯渤海等朝貢十二年春正月辛酉朔以用兵不受朝賀癸未貶義武軍節度使渾鎬為循州刺史坐討賊失律也甲申貶唐鄧節度袁滋為撫州刺史以上疏請罷兵故也乙酉夜星見而雨戊子夜彗出畢南長丈餘指西南凡三日南近參旗而沒二月壬申出內庫絹布六十九萬段匹銀五千兩付度支供軍庚子敕京城居人五家相保以搜姦慝時王承宗李師道欲阻用兵之勢遣人折陵廟之戟焚芻藁之積流矢飛書恐駭京國故搜索以防姦及賊平復得淄青簿領中有賞蒲潼關吏案乃知容姦者關吏也搜索不足以為防庚申敕宜於許汝行營側近置行郾城以處賊中歸降人戶甲寅岳鄂團練使李道古師攻申州克羅城賊力戰道古之衆大敗三月壬戌昭義郗士美兵敗於柏鄉兵士死者千人戊辰滄州程執恭改名權太常定李吉甫諡曰敬憲度支郎中張仲方非之上怒貶為遂州司馬賜吉甫諡曰忠丁丑月犯心後星癸未賊將吳秀琳以文城柵兵三千降李愬夏四月辛卯李光顏破賊三萬於郾城殺其卒什二三獲馬千匹器甲三萬辛丑駙馬都尉于季友居嫡母喪與進士劉師服歡宴夜飲季友削官爵笞四十忠州安置師服笞四十配流連州于不能訓子削階己酉出太倉粟二十五萬石糶于西京以惠飢民庚戌敕改蔡州吳房縣為遂平縣移置於文城柵南新城內丁卯賊郾城守將鄧懷金與令董昌齡以郾城降甲戌渭南雨雹中人有死者丙子詔權罷河北行營專討淮蔡五月庚寅朔癸巳隨唐節度使李愬奏敗賊於吳房獲賊將李佑己亥以尚書左丞許孟容為東都留守充都畿防禦使時東畿民戶供軍尤苦車數千乘相錯于路牛皆饋軍民戶多以驢耕己酉作蓬萊池周廊四百間六月己未朔以衞尉卿程异為鹽鐵使代王播時异為鹽鐵使副自江南收拾到供軍錢一百八十五萬以進故得代播壬戌賊吳元濟上表請束身歸朝時連破三柵賊勢迫蹙實欲歸朝而制於左右故不果行乙酉京師大雨含元殿一柱傾市中水深三尺壞坊民二千家秋七月戊子朔壬辰詔以定州飢募人入粟受官及減選超資河北水災邢洺尤甚平地或深二丈甲辰戶部尚書于請致仕不允嶺南節度使崔詠卒乙酉敕今後左降官及責授正員官等宜從到任經五考滿許量移如未滿五考遇恩赦者從節文處分如犯十惡大逆贓賄緣坐奏取進止庚戌以國子祭酒孔戣為廣州刺史嶺南節度使丙辰制以中書侍郎平章事裴度守門下侍郎同平章事使持節蔡州諸軍事蔡州刺史充彰義軍節度申光蔡觀察處置等使仍充淮西宣慰處置使以朝散大夫守尚書戶部侍郎上護軍賜紫金魚袋崔羣為中書侍郎同中書門下平章事以刑部侍郎馬總兼御史大夫充淮西行營諸軍宣慰副使以太子右庶子韓愈兼御史中丞充彰義軍行軍司馬以司勳員外郎李正封都官員外郎馮宿禮部員外郎李宗閔皆兼侍御史為判官書記從度出征詔以郾城為行蔡州治所八月戊午朔庚申裴度發赴行營敕神策軍三百人衞從上御通化門勞遣之度望門再拜銜涕而辭上賜之犀帶以河南尹辛秘為潞府長史昭義軍節度使代郗士美以士美為工部尚書孟簡為戶部侍郎戊辰以同州刺史張正甫為河南尹甲申裴度至郾城九月丁亥朔戊子出內庫羅綺犀玉金帶之具送度支估計供軍甲午御史臺奏同制除官承前以名字高下為班位先後或名在前身在外及到却在舊人之上今請以上日為先後敕曰名在前上日在後未逾月不在此限行立班次即宜以敕內前後為定戊戌劍南東川節度盧坦卒己亥貶京兆尹竇易直為金州刺史以鞫獄得贓不實故也辛丑以御史中丞為京兆尹壬寅以湖南觀察使韋貫之為太子詹事分司乙巳以刑部郎中知雜崔元略為御史中丞丁未以朝議大夫門下侍郎同平章事李逢吉檢校兵部尚書使持節梓州諸軍事梓州刺史充劍南東川節度副大使知節度事庚子以撫州刺史袁滋為湖南觀察使冬十月壬申裴度往口觀板築五溝賊遽至注弩挺刃將及度而李光顏田布扼其歸路大敗之是日度幾陷癸酉內出元和辯謗略三卷付史館甲申以淮南節度使檢校左僕射李鄘為門下侍郎同中書門下平章事以左丞衞次公代鄘為淮南節度使己卯隨唐節度使李愬率師入蔡州執吳元濟以獻淮西平甲申詔淮西立功將士委韓弘裴度條疏奏聞淮西軍人一切不問宜準元敕給復二年十一月丙戌朔御興安門受淮西之俘以吳元濟徇兩市斬於獨柳樹妻沈氏沒入掖庭弟二人子三人配流尋誅之判官劉協等七人處斬錄平淮西功隨唐節度使檢校左散騎常侍李愬檢校尚書左僕射襄州刺史充山南東道節度襄鄧隨唐復郢均房等州觀察等使加宣武軍節度使韓弘兼侍中忠武軍節度使李光顏河陽節度使烏重胤並檢校司空以宣武軍都虞候韓公武檢校左散騎常侍鄜州刺史鄜坊丹延節度使以魏博行營兵馬使田布為右金吾衞將軍皆賞破賊功也甲午恩王連薨以蔡州郾城為州析上蔡西平遂平三縣隸焉戊申以淮西宣慰副使刑部侍郎馬總為彰義軍節度留後十二月壬戌以彰義軍節度淮西宣慰處置使門下侍郎同平章事裴度守本官賜上柱國晉國公食邑三千戶以蔡州留後馬總檢校工部尚書蔡州刺史彰義軍節度使州潁陳許節度使丙子以右庶子韓愈為刑部侍郎是歲河南河北水十三年春正月乙酉朔御含元殿受朝賀禮畢御丹鳳樓大赦天下己丑以文宣王三十八代孫孔惟晊襲文宣公庚寅敕李師道頻獻表章披露懇誠宜令諫議大夫張宿往彼宣慰辛亥以禮部尚書王播為成都尹劍南西川節度使二月乙亥御麟德殿宴羣臣大合樂凡三日而罷頒賜有差三月庚寅以前劍南西川節度使李夷簡為御史大夫丙申以同州刺史鄭絪為東都留守都畿汝防禦使庚子以御史大夫李夷簡為門下侍郎同平章事宰相李鄘守戶部尚書罷知政事丁未以太子少師鄭餘慶為左僕射辛亥詔百司職田多少不均為弊日久宜令逐司各收職田草粟都數自長官以下除留闕官物外分給至銀臺待罪請獻德棣二州兼入管內租稅壬戌前東都留守許孟容卒庚辰詔復王承宗官爵以華州刺史鄭權為德州刺史橫海軍節度德棣滄景等州觀察使五月乙酉鳳翔節度使李惟簡卒乙未月近心後星丙辰以忠武軍節度使李光顏為滑州刺史義成軍節度使以彰義軍節度使馬總為許州刺史忠武軍節度使陳許蔡觀察等使戊戌以山南東道節度使李愬為鳳翔尹鳳翔隴右節度使辛丑知渤海國務大仁秀檢校秘書監忽汗州都督冊為渤海國王丙午以戶部侍郎孟簡檢校工部尚書襄州刺史山南東道節度使六月癸丑朔日有食之乙丑湖南觀察使袁滋卒丁丑以滄景節度使程權為邠州刺史邠寧節度使出內庫絹三十萬匹錢三十萬貫付度支供軍秋七月癸未以新除鳳翔節度使李愬為徐州刺史武寧軍節度使甲申以田弘正檢校司空乙酉詔削奪淄青節度使李師道在身官爵仍令宣武魏博義成武寧橫海等五鎮之師分路進討辛丑以門下侍郎同平章事李夷簡檢校左僕射同平章事揚州大都督府長史淮南節度使己酉詔諸道節度使先帶度支營田使名者並罷之庚戌以左僕射鄭餘慶為鳳翔隴右節度使八月壬子以中書侍郎平章事王涯為兵部侍郎罷知政事戊午以尚書右丞崔從為興元尹山南西道節度使甲戌太白近左執法乙亥敕應同司官有大功已上親者但非連判及勾檢之官幷官長則不在迴避改換之限時刑部員外郎楊嗣復以父於陵除戶部侍郎遂以近例避嫌請出省不從因有是敕丁丑木金水三宿聚於軫戊寅前山南西道節度使權德輿卒九月甲申以左衞將軍高霞寓為單于大都護振武麟勝節度使甲辰以戶部侍郎判度支皇甫鎛同中書門下平章事依前判度支以衞尉卿充諸道鹽鐵轉運使程异為工部侍郎同中書門下平章事依前充使是時上切於財賦故用聚斂之臣居相位詔下羣情驚駭宰臣裴度崔羣極諫不納二人請退熒惑近哭星丁未出內庫絹十萬匹給東軍冬十月甲寅吐蕃寇宥州壬戌靈武奏破吐蕃二萬於定遠城癸亥前淮南節度使衞次公卒甲子平涼鎮遏兵馬使郝玼奏收復原州破吐蕃二萬是夜月近昴丙子以左金吾衞大將軍薛平檢校刑部尚書滑州刺史充義成軍節度使以義成軍節度使李光顏為許州刺史充忠武軍節度使陳許觀察等使十一月辛巳朔夏州破吐蕃五萬靈武奏攻破吐蕃長樂州羅城丁亥以山人柳泌為台州刺史為上於天台山採仙藥故也制下諫官論之不納壬寅以河陽節度使烏重胤為滄州刺史橫海軍節度滄景德棣觀察等使丁未以華州刺史令狐楚為懷州刺史充河陽三城懷孟節度使十二月辛亥敕左右龍武軍六軍及威遠營應納課戶共一千八百人衣糧並停仍付府縣收管戊寅軍前擒到李師道將夏侯澄等四十七人詔並釋付魏博及義成軍收管要還賊中者則量事優給放還上顧謂宰臣曰人臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是為朋黨上曰他人之言亦與卿等相似豈易辯之哉度曰君子小人觀其所行當自區別矣上曰凡好事口說則易躬行則難卿等既言之須行之勿空口說度等謝曰陛下處分可謂至矣臣等敢不激勵然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗欣納是歲迴紇南詔蠻渤海高麗吐蕃奚契丹訶陵國並朝貢十四年春正月庚辰朔以東師宿野不受朝賀壬午復置仗內教坊於延政里丁亥徐州軍破賊二萬於金鄉迎鳳翔法門寺佛骨至京師留禁中三日乃送詣寺王公士庶奔走捨施如不及刑部侍郎韓愈上疏極陳其弊癸巳貶愈為潮州刺史丙申魏博軍破賊五萬於東阿辛巳斬前滄州刺史李宗奭於獨柳樹朝廷初除鄭權滄州宗奭拒詔不受代既而為三軍所逐乃入朝故誅之癸卯夜月近南斗魁丙午魏博軍破賊萬人於陽穀二月己酉朔以商州刺史嚴謨為黔中觀察使乙卯敕淄青行營諸軍所至收下城邑不得妄行傷殺及焚燒廬舍掠奪民財開發墳墓宜嚴加止絕以鎮冀水災賜王承宗綾絹萬匹辛酉襄陽節度使孟簡舉鄖鄉鎮遏使趙潔為鄖鄉縣令有虧常式罰一月俸料壬戌田弘正奏今月九日淄青都知兵馬使劉悟斬李師道幷男二人首請降師道所管十二州平甲子上御宣政殿受賀己巳上御興安門受田弘正所獻賊俘羣臣賀於樓下庚午制以淄青兵馬使金紫光祿大夫試殿中監兼監察御史劉悟檢校工部尚書滑州刺史充義成軍節度使封彭城郡王食邑三千戶賜錢二萬貫莊宅各一區癸酉田弘正加檢校司徒同中書門下平章事三月己卯朔丁酉上以齊魯初平宴羣臣於麟德殿賜物有差戊子以華州刺史馬總鄆濮曹等州觀察等使己丑以義成軍節度使薛平為青州刺史充平盧軍節度淄青齊登萊等州觀察等使以淄青四面行營供軍使王遂為沂州刺史充沂海兗密等州都團練觀察等使析李師道所據十二州為三鎮也庚寅浙西觀察使李翛卒辛卯李師道妻魏氏幷男沒入掖庭堂弟師賢師智姪弘巽配流乙未以中書舍人衞中行華州刺史潼關防禦鎮國軍等使辛丑上顧謂宰臣曰聽受之間大是難事推誠選任所謂委寄必合盡心及至所行臨事不無偏黨朕臨御已來歲月斯久雖不明不敏然漸見物情每於行為務欲詳審比令學士集前代昧政之事為辯謗略每欲披閱以為鑒誡耳崔羣對曰無情曲直辯之至易稍懷欺詐審之實難故孔子有衆好衆惡之論浸潤膚受之說蓋以曖昧難辯故也若擇賢而任之待之以誠糾之以法則人自歸公孰敢行偽陛下詳觀載籍以廣聰明實天下幸甚丁未以撫州司馬令狐通為右衞將軍給事中崔植封還制書言通前刺史壽州用兵失律未宜奬用上令宰臣諭植以通父彰有功不忍遂棄其子其制方行夏四月戊申朔乙卯太白順行近東井戊午以刑部尚書李愿為鳳翔尹充鳳翔隴右節度使丙寅詔諸道節度都團練防禦經略等使所管支郡除本軍州外別置鎮遏守捉兵馬者並合屬刺史如刺史帶本州團練防禦鎮遏等使其兵馬額便隸此使如無別使即屬軍事其有邊於谿洞連接蕃蠻之處特建城鎮不關州郡者不在此限辛未工部侍郎同平章事諸道鹽鐵轉運等使程异卒丙子制金紫光祿大夫門下侍郎同中書門下平章事兼弘文館大學士上柱國晉國公食邑三千戶裴度可檢校左僕射兼門下侍郎平章事太原尹北都留守充河東節度觀察處置等使五月戊寅朔以刑部侍郎柳公綽充鹽鐵轉運等使庚辰以楚州刺史李聽為夏州刺史夏綏銀宥等州節度使丙戌以河東節度使檢校吏部尚書同平章事張弘靖為吏部尚書以忠武軍節度使李光顏為邠寧慶節度使仍以忠武軍六千人赴鎮庚寅以工部尚書郗士美檢校刑部尚書許州刺史充忠武軍節度使是夜月近心大星己亥置臨海監牧命淮南節度使兼之敕李師古妻裴氏女宜娘於鄧州安置李宗奭妻韋氏放出掖庭坐李師道族人籍沒上愍之宥以輕典以宣歙觀察使竇易直為潤州刺史充浙西觀察使韓弘進助平淄青絹二十萬匹女樂十人女樂還之六月丁未朔癸丑以福建觀察使元錫為宣州刺史宣歙池觀察使庚申以戶部侍郎歸登為工部尚書以鄭州刺史裴乂為福州刺史福建觀察使辛酉敕定州大都督府復上州甲子以前兵部尚書李絳檢校吏部尚書河中尹充河中晉絳慈隰觀察使癸酉詔左金吾大將軍胡証充京西北巡邊使所經鎮戍與守將審量利害具事實奏聞秋七月丁丑朔戊寅汴州韓弘來朝己卯左散騎常侍致仕薛苹卒乙酉夜月掩心大星辛巳羣臣上尊號曰元和聖文神武法天應道皇帝是日御宣政殿受冊禮畢御丹鳳樓大赦天下京畿今年秋稅青苗榷酒等錢每貫量放四百文元和五年已前逋租賦並放甲午韓弘進絁絹二十八萬匹銀器二百七十事丁酉以河陽三城懷州節度使朝議郎使持節懷州諸軍事守懷州刺史兼御史大夫賜紫金魚袋令狐楚可朝議大夫守中書侍郎同中書門下平章事壬寅以永州刺史韋正武為邕管經略使癸卯以前黔中觀察使魏義通為懷州刺史河陽三城懷孟節度使沂州軍亂殺節度使王遂甲辰以棣州刺史曹華為沂州刺史充沂海兗密等州都團練觀察使乙巳罷晉州防禦使八月丁未朔己酉制宣武軍節度副大使知節度事汴宋亳潁等州觀察處置等使開府儀同三司守司徒兼侍中汴州刺史上柱國許國公食邑三千戶韓弘可守司徒兼中書令弘堅辭戎鎮故也癸丑以吏部尚書張弘靖為檢校尚書左僕射同平章事汴州刺史宣武軍節度使甲寅於襄州穀城縣置臨漢監以牧馬仍令山南東道節度使兼充監牧使戊午王承宗進位檢校左僕射己未田弘正來朝上謂宰臣曰天下事重一日不可曠廢若遇連假不坐有事即詣延英請對崔羣以殘暑方甚目同列將退上止之曰數日一見卿等時雖暑熱朕不為勞久之方罷丁亥宴田弘正與大將判官二百人於麟德殿賜物有差戊辰陳許節度使檢校刑部尚書郗士美卒九月丙子朔戊寅考功郎中蕭祐進古畫古書二十卷斬沂州亂首王弁于東市癸未以國子祭酒李遜檢校禮部尚書許州刺史忠武軍節度陳許蔡等觀察使庚寅貶右衞大將軍田縉為衡王傅縉前鎮夏州私用軍糧四萬石強取党項羊馬致党項引吐蕃入寇故也甲午以太子少師鄭餘慶兼判國子祭酒辛丑以田弘正兄相州刺史田融檢校刑部尚書兼太子賓客分司東都甲辰以魏博節度使光祿大夫檢校司徒同平章事兼魏州大都督長史上柱國沂國公食邑三千戶田弘正依前檢校司徒兼侍中賜實封三百戶時弘正三上表乞留闕庭不許乙巳上顧謂宰臣曰朕讀玄宗實錄見開元初銳意求理至十六年已後稍似懈倦開元末又不及中年何也崔羣對曰玄宗少歷民間身經迍難故即位之初知人疾苦躬勤庶政加之姚崇宋璟蘇頲盧懷慎等守正之輔孜孜獻納故致治平乃後承平日久安於逸樂漸遠端士而近小人宇文融以聚斂媚上心李林甫以奸邪惑上意加之以國忠故及於亂願陛下以開元初為法以天寶末為戒即社稷無疆之福也時皇甫鎛以諂刻欺蔽在相位故羣因奏以諷之冬十月丙午朔壬戌安南軍亂殺都護李象古幷家屬部曲千餘人皆遇害丙寅以唐州刺史桂仲武為安南部護潮州刺史韓愈為袁州刺史是月吐蕃寇鹽州十一月乙亥朔以戶部尚書李鄘為太子賓客東都留守辛卯靈武大將史敬奉破吐蕃於鹽州城下賜敬奉實封五十戶賞之丁酉以原王傅鄭權為右金吾大將軍充右街使上服方士柳泌金丹藥起居舍人裴潾上表切諫以金石含酷烈之性加燒鍊則火毒難制若金丹已成且令方士自服一年觀其效用則進御可也上怒己亥貶裴潾為江陵令十二月乙巳朔庚戌國子祭酒鄭餘慶奏見任文官一品至九品外使兼京正員官者每月於所請料錢每貫抽十文修國子監從之乙卯以諫議大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋崔羣為潭州刺史兼御史大夫充湖南觀察使為皇甫鎛所譖及羣被貶人皆切齒於鎛十五年春正月甲戌朔上以餌金丹小不豫罷元會庚辰鎮冀觀察使王承宗奏鎮冀深趙等州每州請置錄事參軍一員判司三員每縣請置令一員從之壬午以前湖南觀察使崔倰權知戶部侍郎判度支丙戌沂海四州觀察使府移置於兗州改觀察使曹華為兗州刺史乙未命邠寧李光顏修築鹽州城此月七日已後晝常陰晦微雨雪夜則晴明凡十七日方澄霽丙申月犯心大星光彩相及廢齊州豐齊縣入長清廢全節縣入歷城廢亭山縣入章丘縣義成軍節度使劉悟來朝戊戌上對悟於麟德殿上自服藥不佳數不視朝人情恟懼及悟出道上語京城稍安庚子以少府監韓璀為鄜州刺史鄜坊丹延節度使是夕上崩於大明宮之中和殿享年四十三時以暴崩皆言內官陳弘志弒逆史氏諱而不書辛丑宣遺詔壬寅移仗西內五月丁酉羣臣上諡曰聖神章武孝皇帝廟號憲宗庚申葬于景陵史臣蔣係曰憲宗嗣位之初讀列聖實錄見貞觀開元故事竦慕不能釋卷顧謂丞相曰太宗之創業如此玄宗之致理如此既覽國史乃知萬倍不如先聖當先聖之代猶須宰執臣僚同心輔助豈朕今日獨能為理哉自是延英議政晝漏率下五六刻方退自貞元十年已後朝廷威福日削方鎮權重德宗不委政宰相人間細務多自臨決姦佞之臣如裴延齡輩數人得以錢穀數術進宰相備位而已及上自藩邸監國以至臨御訖于元和軍國樞機盡歸之於宰相由是中外咸理紀律再張果能剪削亂階誅除羣盜睿謀英斷近古罕儔唐室中興章武而已任异鎛之聚斂逐羣度於藩方政道國經未至衰紊惜乎服食過當閹豎竊發苟天假之年庶幾于理矣贊曰貞元失馭羣盜箕踞章武赫斯削平嘯聚我有宰衡耀德觀兵元和之政聞于頌聲
