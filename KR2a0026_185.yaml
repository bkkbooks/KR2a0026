body:
  text: 舊唐書卷一百八十一列傳第一百三十一史憲誠子孝章何進滔子弘敬韓允忠子簡樂彥禎子從訓羅弘信子威史憲誠其先出於奚虜今為靈武建康人祖道德開府儀同三司試太常卿上柱國懷澤郡王父周洛為魏博軍校事田季安至兵馬大使銀青光祿大夫檢校太子賓客兼御史中丞柱國北海郡王憲誠始以材勇隨父歷軍中右職兼監察御史元和中田弘正討李師道令憲誠以先鋒四千人濟河纍下其城柵復以大軍齊進乘勢逐北魏之全師迫于鄆之城下師道窮蹙劉悟斬首投魏軍録功超授憲誠兼中丞鎮州王承宗死弘正自魏移領鎮州居數月為王廷湊所殺遂以兵叛朝廷以弘正子布為魏博節度使領兵討伐俾復父冤時幽州朱克融援助廷湊布不能制因自引決軍情囂然憲誠為中軍都知兵馬使乘亂以河朔舊事動其人心諸軍即擁而歸魏共立為帥國家因而命之時克融廷湊並據兵為亂憲誠喜得旄節雖外順朝旨而中與朱王為輔車之勢長慶二年正月也尋遣司門郎中韋文恪宣慰時李為亂與憲誠書問交通憲誠表請與節鉞仍於黎陽檥舟示欲渡河及見文恪舉止驕倨其言甚悖旋聞為帳下所殺乃從改過謂文恪曰憲誠蕃人猶狗也唯能識主雖被棒打終不忍離其狡譎如此朝廷每為優容尋加左僕射敬宗即位進秩司空大和二年滄景節度使李全略卒其子同捷竊據軍城表邀符節舉兵伐之先是憲誠與全略婚媾及同捷叛復潛以糧餉為助上屢發使申諭尋又就加平章事憲誠嘗遣驍將至闕下恣為張大宰相韋處厚以語折銼之憲誠不敢復與同捷為應時憲誠示出師共討同捷及滄景平加司徒憲誠心不自安乃遣子孝章入覲又飛章願以所管奉命上嘉之乃加侍中移鎮河中憲誠素懷向背不能以忠誠感激其衆未及出城大和三年六月二十六日夜為軍衆所害冊贈太尉孝章幼聰悟好學元和中李訴為魏帥取大將子弟列于軍籍孝章倡言願效文職訴奇之令攝府參軍及憲誠領節鉞改士曹參軍兼監察御史賜緋孝章以父在鎮多違朝旨嘗雪涕極諫備陳逆順之理朝廷聞而嘉之乃授檢校太子左諭德兼侍御史充節度副使纍遷至散騎常侍兼御史大夫賜紫領本道兵同平滄景加工部尚書尋請赴闕文宗慰勞甚厚憲誠亦因懇乞朝覲上知憲誠之入覲自孝章之謀遂加禮部尚書分相衛澶三州別為一鎮俾孝章領之孝章未到鎮憲誠遇害上以孝章有忠節起復為右金吾衛將軍間歲授鄜坊節度使居四年遷于滑一歲入為右領軍大將軍改右金吾大將軍俄授邠寧節度孝章歷三鎮雖無異績而謹身畏法以保初終開成三年十月卒贈右僕射何進滔靈武人也曾祖孝物祖俊並本州軍校父默夏州衙前兵馬使檢校太子賓客試太常卿以進滔之貴贈左散騎常侍進滔客寄於魏委質軍門事節度使田弘正弘正奉詔討鄆州破李師道時進滔為衙內都知兵馬使以功授兼侍御史大和三年軍衆害史憲誠連聲而呼曰得衙內都知兵馬使何端公知留後即三軍安矣推而立之朝廷因授進滔左散騎常侍魏博等州節度觀察處置等使為魏帥十餘年大得民情纍官至司徒平章事卒子弘敬襲其位朝廷時遣河中帥李執方滄州帥劉約各遣使勸令歸闕別俟朝旨弘敬不從竟就加節制及劉稹反不時起兵鎮州王元逵下邢洺二州兵次上黨弘敬方出師壓境大中後宣宗務其姑息繼加官爵亦至使相咸通初卒子全皡嗣之朝廷尋降符節纍官亦至同平章事十一年為軍人所害子孫相繼四十餘年韓允忠魏州人也舊名君雄懿宗改賜今名父國昌歷本州右職會昌中從何弘敬破劉稹以功為貝州刺史兼御史中丞以允忠故纍贈兵部尚書允忠少仕軍門繼升裨校潞州之役亦與其行咸通十一年何全皡為軍衆所殺推允忠為帥時僖宗為普王即降詔遙領節度授允忠左散騎常侍兼御史中丞充節度觀察留後不數月轉檢校工部尚書魏州大都督府長史充魏博節度觀察等使纍加至檢校司空同平章事乾符元年十一月卒年六十一纍贈太尉子簡自允忠初授戎帥便為節度副使乾符初纍官至檢校工部尚書允忠卒即起復為節度觀察留後踰月加檢校右僕射其後纍加至侍中封昌黎郡王賊巢之亂諸葛爽受其僞命河陽節度使時僖宗在蜀寇盜蜂起簡據有六州甲兵強盛竊懷僭亂之志且欲啓其封疆乃舉兵攻河陽爽棄城而走簡遂留兵保守因北掠邢洺而歸遂移軍攻鄆鄆帥曹全晸出戰為簡所敗死之鄆將崔君裕收合殘衆保鄆州簡進攻其城半年不下河陽復為諸葛爽所襲簡因欲先討君裕次及河陽乃舉兵至鄆君裕請降尋移軍復攻河陽行及新鄉為爽軍逆擊敗之簡單騎奔回憂憤疽發背而卒時中和元年十一月也樂彥禎魏州人也父少寂歷澶博貝三州刺史贈工部尚書彥禎少為本州軍校韓簡之領節旄也以彥禎為馬步軍都虞候轉博州刺史下河陽走諸葛爽有功遷澶州刺史簡再討河陽之敗也彥禎以一軍先歸魏人遂共立之朝廷尋授檢校工部尚書知魏博留後俄加戶部尚書充節度觀察處置等使中和四年纍加至尚書左僕射同平章事僖宗自蜀回加開府儀同三司冊拜司徒彥禎志滿驕大動多不法一旦徵六州之衆板築羅城約河門舊堤周八十里月餘而畢人用怨咨又其子從訓天資悖逆王鐸自滑移鎮滄州過魏郊從訓見其女妓利之先伏兵於漳南高雞泊俟鐸之至圍而害之掠其所有時朝廷微弱不能詰魏人素知鐸名望議者惜之而罪從訓從訓又召亡命之徒五百餘輩出入臥內號為子將委以腹心軍人籍籍各有異議從訓聞而忌之易服遁出止於近縣彥禎因命為六州都指揮使未幾又兼相州刺史到任之後般輦軍器取索錢帛使人來往交午塗路軍府疑二彥禎危憤而卒衆推都將趙文知留後事從訓自相州領兵三萬餘人至城下文按兵不出衆懷疑懼復害文推羅弘信為帥弘信以兵出戰敗之從訓招集餘衆次於洹水弘信遣將程公佐領兵討擊大敗之梟從訓首於軍門時文德元年春也羅弘信字德孚魏州貴鄉人曾祖秀祖珍父讓皆為本州軍校弘信少從戎役歷事節度使韓簡樂彥禎光啓末彥禎子從訓忌牙軍出居於外軍衆廢彥禎推趙文權主軍州事衆復以為不便因推弘信為帥先是有鄰人密謂弘信曰某嘗夜遇一白鬚翁相告云君當為土地主如是者再三弘信竊異之及廢文軍人聚呼曰孰願為節度使者弘信即應之曰白鬚翁早以命我衆乃環而視之曰可也由是立之僖宗聞之文德元年四月詔加工部尚書權知節度留後七月復加金紫光祿大夫檢校尚書右僕射充魏博節度觀察處置等使龍紀中加檢校司空同平章事封豫章郡公乾寧中朱全忠急攻兗鄆朱瑄求援於太原太原發軍假道於魏令大將李存信屯莘縣存信御軍無法侵魏之芻牧弘信不平之全忠復遣人謂之曰太原志吞河朔回戈之日貴道堪憂弘信乃託好於汴出師三萬攻存信敗之太原怒舉兵攻魏營於觀音門外汴將葛從周援之屯於洹水李克用子落落時為鐵林軍使為從周所擒乃退歸自是太原之師每歲侵擾相魏魏人患之朱全忠方事兗鄆懼弘信離二每歲時賂遺必卑辭厚禮答貺全忠對魏使北面拜而受之曰六兄比豫倍年已上兄弟之國安得以常鄰遇之弘信以為厚己亦推心焉弘信纍官至檢校太師守侍中臨清王光化元年九月卒年六十三贈太師追封北平王諡曰莊肅子威威字端己文德初授左散騎常侍充天雄軍節度副使自龍紀至乾寧十年之中纍加官爵弘信卒襲父位為留後朝廷從而命之天復末纍加至檢校太傅兼侍中長沙王天祐初授檢校太尉守侍中進封鄴王賜號忠勤宣力致理功臣魏之牙中軍者自至德中田承嗣盜據相魏澶博衛貝等六州召募軍中子弟置之部下遂以為號皆豐給厚賜不勝驕寵年代寖遠父子相襲親黨膠固其凶戾者強買豪奪踰法犯令長吏不能禁變易主帥有同兒戲如史憲誠何進滔韓君雄樂彥禎皆為其所立優奬小不如意則舉族被害威懲其往弊雖以貨賂姑息而心銜之威嗣世之明年正月幽州劉仁恭擁兵十萬謀亂河朔進陷貝州長驅攻魏威求援於汴朱全忠遣將李思安屯於洹水葛從周自邢洺引軍入魏燕將劉守文單可及攻汴軍於內黃思安逆戰大敗之乘勝追躡從周出會掩擊復敗燕軍斬首三萬三年威引汴軍攻滄州以報之自是威感全忠援助之恩合從景附天祐二年七月十三日夜牙軍裨校李公佺作亂威僅以身免公佺出奔滄州自是愈懼遣使求援於全忠密謀破之全忠遣李思安會魏博軍再攻滄州全忠女妻威子廷規先是卒全忠遣長直軍校馬嗣勳選兵千人密於輿中實兵甲入魏言助女葬事三年正月五日嗣勳至全忠親率大軍濟河言視行營於滄景威欲因而出迎至期即假全忠帳下鋭卒入而夾攻之牙軍頗疑堅請不出威恐泄其事慰納之是月十四日夜率廝養百十輩與嗣勳合攻之時宿於牙城者千人遲明殺之殆盡凡八千家皆破其族魏軍攻滄州者在歷亭聞有變其將史仁遇擁之保于高唐六州之內皆為讎敵纍月平之威仕梁數年後卒年三十四位至守太師兼中書令贈尚書令諡曰貞壯威性明敏達於吏道伏膺儒術招納文人聚書至萬卷每花朝月夕與賓佐賦咏甚有情致錢塘人羅隱者有當世詩名自號江東生威遣使賂遺其宗姓推為叔父隱亦集其詩寄之威酷嗜其作目己所為曰偷江東集凡五卷今鄴中人士諷詠之史臣曰魏鎮燕三鎮不能制之也久矣兵強地廣合從連衡爵命雖假於朝廷羣臣自謀於元帥如史憲誠等五家其初皆因此而得之其後亦因此而失之蓋不知取之以權守之以仁則遠矣若善繼者史氏羅氏之二子有焉其餘不足觀也贊曰逆取順守古亦有之如其逆守滅亡必隨史何韓樂世數盛衰足以為鑒念茲在茲
