body:
  text: 舊唐書卷二十九志第九音樂二高祖登極之後享宴因隋舊制用九部之樂其後分為立坐二部今立部伎有安樂太平樂破陳樂慶善樂大定樂上元樂聖壽樂光聖樂凡八部安樂者後周武帝平齊所作也行列方正象城郭周世謂之城舞舞者八十人刻木為面狗喙獸耳以金飾之垂線為髮畫猰皮帽舞蹈姿制猶作羌胡狀太平樂亦謂之五方師子舞師子鷙獸出於西南夷天竺師子等國綴毛為之人居其中像其俯仰馴狎之容二人持繩秉拂為習弄之狀五師子各立其方色百四十人歌太平樂舞以足持繩者服飾作崑崙象破陳樂太宗所造也太宗為秦王之時征伐四方人間歌謠秦王破陳樂之曲及即位使呂才協音律李百藥虞世南褚亮魏徵等製歌辭百二十人披甲持戟甲以銀飾之發揚蹈厲聲韻慷慨享宴奏之天子避位坐宴者皆興慶善樂太宗所造也太宗生於武功之慶善宮既貴宴宮中賦詩被以管絃舞者六十四人衣紫大袖裙襦漆髻皮履舞蹈安徐以象文德洽而天下安樂也大定樂出自破陳樂舞者百四十人被五彩文甲持槊歌和云八紘同軌樂以象平遼東而邊隅大定也上元樂高宗所造舞者百八十人畫雲衣備五色以象元氣故曰上元聖壽樂高宗武后所作也舞者百四十人金銅冠五色畫衣舞之行列必成字十六變而畢有聖超千古道泰百王皇帝萬年寶祚彌昌字光聖樂玄宗所造也舞者八十人鳥冠五綵畫衣兼以上元聖壽之容以歌王迹所興自破陳舞以下皆雷大鼓雜以龜茲之樂聲振百里動蕩山谷大定樂加金鉦惟慶善舞獨用西涼樂最為間雅破陳上元慶善三舞皆易其衣冠合之鐘磬以享郊廟以破陳為武舞謂之七德慶善為文舞謂之九功自武后稱制毀唐太廟此禮遂有名而亡實安樂等八舞聲樂皆立奏之樂府謂之立部伎其餘總謂之坐部伎則天中宗之代大增造坐立諸舞尋以廢寢坐部伎有宴樂長壽樂天授樂鳥歌萬壽樂龍池樂破陳樂凡六部宴樂張文收所造也工人緋綾袍絲布袴舞二十人分為四部景雲樂舞八人花錦袍五色綾袴雲冠烏皮靴慶善樂舞四人紫綾袍大袖絲布袴假髻破陳樂舞四人緋綾袍錦襟褾緋綾褲承天樂舞四人紫袍進德冠並銅帶樂用玉磬一架大方響一架搊箏一臥箜篌一小箜篌一大琵琶一大五絃琵琶一小五絃琵琶一大笙一小笙一大篳篥一小篳篥一大簫一小簫一正銅拔一和銅拔一長笛一短笛一楷鼓一連鼓一鞉鼓一桴鼓一工歌二此樂惟景雲舞僅存餘並亡長壽樂武太后長壽年所造也舞十有二人畫衣冠天授樂武太后天授年所造也舞四人畫衣五采鳳冠鳥歌萬歲樂武太后所造也武太后時宮中養鳥能人言又常稱萬歲為樂以象之舞三人緋大袖並畫鸜鵒冠作鳥像今案嶺南有鳥似鸜鵒而稍大乍視之不相分辨籠養久則能言無不通南人謂之吉了亦云料開元初廣州獻之言音雄重如丈夫委曲識人情慧於鸚鵡遠矣疑即此鳥也漢書武帝本紀書南越獻馴象能言鳥注漢書者皆謂鳥為鸚鵡若是鸚鵡不得不舉其名而謂之能言鳥鸚鵡秦隴尤多亦不足重所謂能言鳥即吉了也北方常言鸜鵒踰嶺乃能言傳者誤矣嶺南甚多鸜鵒能言者非鸜鵒也龍池樂玄宗所作也玄宗龍潛之時宅在隆慶坊宅南坊人所居變為池望氣者亦異焉故中宗季年泛舟池中玄宗正位以坊為宮池水逾大瀰漫數里為此樂以歌其祥也舞十有二人人冠飾以芙蓉破陳樂玄宗所造也生於立部伎破陳樂舞四人金甲胄自長壽樂已下皆用龜茲樂舞人皆著靴惟龍池備用雅樂而無鐘磬舞人躡履清樂者南朝舊樂也永嘉之亂五都淪覆遺聲舊制散落江左宋梁之間南朝文物號為最盛人謠國俗亦世有新聲後魏孝文宣武用師淮漢收其所獲南音謂之清商樂隋平陳因置清商署總謂之清樂遭梁陳亡亂所存蓋鮮隋室已來日益淪缺武太后之時猶有六十三曲今其辭存者惟有白雪公莫舞巴渝明君鳳將雛明之君鐸舞白鳩白紵子夜吳聲四時歌前溪阿子及歡聞團扇懊長史督護讀曲烏夜啼石城莫愁襄陽棲烏夜飛估客楊伴雅歌驍壺常林歡三洲採桑春江花月夜玉樹後庭花堂堂泛龍舟等三十二曲明之君雅歌各二首四時歌四首合三十七首又七曲有聲無辭上林鳳雛平調清調瑟調平折命嘯通前為四十四曲存焉白雪周曲也平調清調瑟調皆周房中曲之遺聲也漢世謂之三調公莫舞晉宋謂之巾舞其説云漢高祖與項籍會於鴻門項莊劍舞將殺高祖項伯亦舞以袖隔之且云公莫害沛公也漢人德之故舞用巾以象項伯衣袖之遺式也巴渝漢高帝所作也帝自蜀漢伐楚以版楯蠻為前鋒其人勇而善鬬好為歌舞高帝觀之曰武王伐紂歌也使工習之號曰巴渝渝美也亦云巴有渝水故名之魏晉改其名梁復號巴渝隋文廢之明君漢元帝時胸奴單于入朝詔王嬙配之即昭君也及將去入辭光彩射人聳動左右天子悔焉漢人憐其遠嫁為作此歌晉石崇妓緑珠善舞以此曲教之而自製新歌曰我本漢家子將適單于庭昔為匣中玉今為糞土英晉文王諱昭故晉人謂之明君此中朝舊曲今為吳聲蓋吳人傳受訛變使然鳳將雛漢世舊歌曲也明之君本漢世鞞舞曲也梁武時改其辭以歌君德鐸舞漢曲也白鳩吳朝拂舞曲也楊泓拂舞序曰自到江南見白符舞或言白鳧鳩云有此來數十年察其辭旨乃是吳人患孫皓虐政思屬晉也隋牛弘請以鞞鐸巾拂等舞陳之殿庭帝從之而去其所持巾拂等白紵沈約云紵本吳地所出疑是吳舞也梁帝又令約改其辭其四時白紵之歌約集所載是也今中原有白紵曲辭旨與此全殊子夜晉曲也晉有女子夜造此聲聲過哀苦晉日常有鬼歌之前溪晉車騎將軍沈珫所制阿子及歡聞晉穆帝升平初歌畢輒呼阿子汝聞否後人演其聲以為此曲團扇晉中書令王珉與嫂婢有情愛好甚篤嫂捶撻婢過苦婢素善歌而珉好捉白團扇故云團扇復團扇持許自遮面憔悴無復理羞與郎相見懊晉隆安初民間訛謠之曲歌云春草可攬結女兒可攬擷齊太祖常謂之中朝歌長史變晉司徒左長史王廞臨敗所制督護晉宋間曲也彭城內史徐逵之為魯軌所殺徐宋高祖長壻也使府內直督護丁旿殯斂之其妻呼旿至閣下自問斂逵之事每問輒歎息曰丁督護其聲哀切後人因其聲廣其曲焉今歌是宋孝武帝所製云督護上征去儂亦惡聞許願作石尤風四面斷行旅讀曲宋人為彭城王義康所製也有死罪之辭烏夜啼宋臨川王義慶所作也元嘉十七年徙彭城王義康於豫章義慶時為江州至鎮相見而哭為帝所怪徵還宅大懼妓妾夜聞烏啼聲扣齋閣云明日應有赦其年更為南兗州刺史作此歌故其和云籠窗窗不開烏夜啼夜夜望郎來今所傳歌似非義慶本旨辭曰歌舞諸少年娉婷無種迹菖蒲花可憐聞名不相識石城宋臧質所作也石城在竟陵質嘗為竟陵郡於城上眺矚見羣少年歌謠通暢因作此曲歌云生長石城下開門對城樓城中美年少出入見依投莫愁樂出於石城樂石城有女子名莫愁善歌謠石城樂和中復有莫愁聲故歌云莫愁在何處莫愁石城西艇子打兩槳催送莫愁來襄陽樂宋隨王誕之所作也誕始為襄陽郡元嘉二十六年仍為雍州夜聞諸女歌謠因作之故歌和云襄陽來夜樂其歌曰朝發襄陽來暮至大堤宿大堤諸女兒花豔驚郎目裴子野宋略稱晉安侯劉道彥為雍州刺史有惠化百姓歌之號襄陽樂其辭旨非也棲烏夜飛沈攸之元徽五年所作也攸之未敗之前思歸京師故歌和云日落西山還去來估客樂齊武帝之製也布衣時常遊樊鄧追憶往事而作歌曰昔經樊鄧役阻潮梅根渚感憶追往事意滿情不使太樂令劉瑤教習百日無成或啓釋寶月善音律帝使寶月奏之便就敕歌者常重為感憶之聲梁改其名為商旅行楊伴本童謠歌也齊隆昌時女巫之子曰楊旻旻隨母入內及長為后所寵童謠云楊婆兒共戲來而歌語訛遂成楊伴兒歌云暫出白門前楊柳可藏烏歡作沈水香儂作博山爐驍壺疑是投壺樂也投壺者謂壺中躍矢為驍壺今謂之驍壺者是也常林歡疑是宋梁間曲宋梁世荊雍為南方重鎮皆皇子為之牧江左辭詠莫不稱之以為樂土故隨王作襄陽之歌齊武帝追憶樊鄧梁簡文樂府歌云分手桃林岸送別峴山頭若欲寄音信漢水向東流又曰宜城投音豆酒今行熟停鞍繫馬暫栖宿桃林在漢水上宜城在荊州北荊州有長林縣江南謂情人為歡常長聲相近蓋樂人誤謂長為常三洲商人歌也商人數行巴陵三江之間因作此歌採桑因三洲曲而生此聲也春江花月夜玉樹後庭花堂堂並陳後主所作叔寶常與宮中女學士及朝臣相和為詩太樂令何胥又善於文詠採其尤豔麗者以為此曲泛龍舟隋煬帝江都宮作餘五曲不知誰所作也其辭類皆淺俗而綿世不易惜其古曲是以備論之其他集録所不見亦闕而不載當江南之時巾舞白紵巴渝等衣服各異梁以前舞人並二八梁舞省之咸用八人而已令工人平巾幘緋袴褶舞四人碧輕紗衣裙襦大袖畫雲鳳之狀漆鬟髻飾以金銅雜花狀如雀叉錦履舞容間婉曲有姿態沈約宋書志江左諸曲哇淫至今其聲調猶然觀其政已亂其俗已淫既怨且思矣而從容雅緩猶有古士君子之遺風他樂則莫與為比樂用鐘一架磬一架琴一三絃琴一擊琴一瑟一秦琵琶一臥箜篌一築一箏一節鼓一笙二笛二蕭二篪二葉二歌二自長安已後朝廷不重古曲工伎轉缺能合于管絃者唯明君楊伴驍壺春歌秋歌白雪堂堂春江花月等八曲舊樂章多或數百言武太后時明君尚能四十言今所傳二十六言就之訛失與吳音轉遠劉貺以為宜取吳人使之傳習以問歌工李郎子李郎子北人聲調已失云學於俞才生才生江都人也今郎子逃清樂之歌闕焉又聞清樂唯雅歌一曲辭典而音雅閲舊記其辭信典漢有盤舞今隸散樂部中又有幡舞扇舞並亡自周隋已來管絃雜曲將數百曲多用西涼樂鼓舞曲多用龜茲樂其曲度皆時俗所知也惟彈琴家猶傳楚漢舊聲及清調瑟調蔡雍雜弄非朝廷郊廟所用故不載西涼樂者後魏平沮渠氏所得也晉宋末中原喪亂張軌據有河西苻秦通涼州旋復隔絶其樂具有鐘磬蓋涼人所傳中國舊樂而雜以羌胡之聲也魏世共隋咸重之工人平巾幘緋褶白舞一人方舞四人白舞今闕方舞四人假髻玉支叉紫絲布褶白大口袴五綵接袖烏皮靴樂用鐘一架磬一架彈箏一搊箏一臥箜篌一豎箜篌一琵琶一五絃琵琶一笙一簫一篳篥一小篳篥一笛一橫笛一腰鼓一齊鼓一簷鼓一銅拔一貝一編鐘今亡周官韎師掌教韎樂祭祀則帥其屬而舞之大享亦如之韎東夷之樂名也舉東方則三方可知矣又有鞮鞻氏掌四夷之樂與其聲歌祭祀則吹而歌之宴亦如之作先王樂者貴能包而用之納四夷之樂者美德廣之所及也東夷之樂曰韎離南蠻之樂曰任西戎之樂曰禁北狄之樂曰昧離言陽氣始通萬物離地而生也任言陽氣用事萬物懷任也禁言陰氣始通禁止萬物之生長也昧言陰氣用事萬物衆形暗昧也其聲不正作之四門之外各持其方兵獻其聲而已自周之衰此禮尋廢後魏有曹婆羅門受龜茲琵琶於商人世傳其業至孫妙達尤為北齊高洋所重常自擊胡鼓以和之周武帝聘虜女為后西域諸國來媵於是龜茲疏勒安國康國之樂大聚長安胡兒令羯人白智通教習頗雜以新聲張重華時天竺重譯貢樂伎後其國王子為沙門來遊又傳其方音宋世有高麗百濟伎樂魏平馮跋亦得之而未具周師滅齊二國獻其樂隋文帝平陳得清樂及文康禮畢曲列九部伎百濟伎不預焉煬帝平林邑國獲扶南工人及其匏琴陋不可用但以天竺樂轉寫其聲而不齒樂部西魏與高昌通始有高昌伎我太宗平高昌盡收其樂又造宴樂而去禮畢曲今著令者惟此十部雖不著令聲節存者樂府猶隸之德宗朝又有驃國亦遣使獻樂高麗樂工人紫羅帽飾以鳥羽黃大袖紫羅帶大口袴赤皮靴五色縚繩舞者四人椎髻於後以絳抹額飾以金璫二人黃裙襦赤黃袴極長其袖烏皮靴雙雙並立而舞樂用彈箏一搊箏一臥箜篌一豎箜篌一琵琶一義觜笛一笙一簫一小篳篥一大篳篥一桃皮篳篥一腰鼓一齊鼓一簷鼓一貝一武太后時尚二十五曲今惟習一曲衣服亦寖衰敗失其本風百濟樂中宗之代工人死散岐王範為太常卿復奏置之是以音伎多闕舞二人紫大袖裙襦章甫冠皮履樂之存者箏笛桃皮篳篥箜篌歌此二國東夷之樂也扶南樂舞二人朝霞行纏赤皮靴隋世全用天竺樂今其存者有羯鼓都曇鼓毛員鼓簫笛篳篥銅拔貝天竺樂工人皂絲布頭巾白練襦紫綾袴緋帔舞二人辮髮朝霞袈裟行纏碧麻鞋袈裟今僧衣是也樂用銅鼓羯鼓毛員鼓都曇鼓篳篥橫笛鳳首箜篌琵琶銅拔貝毛員鼓都曇鼓今亡驃國樂貞元中其王來獻本國樂凡一十二曲以樂工三十五人來朝樂曲皆演釋氏經論之辭此三國南蠻之樂高昌樂舞二人白襖錦袖赤皮靴赤皮帶紅抹額樂用答臘鼓一腰鼓一雞婁鼓一羯鼓一簫二橫笛二篳篥二琵琶二五絃琵琶二銅角一箜篌一箜篌今亡龜茲樂工人皂絲布頭巾緋絲布袍錦袖緋布袴舞者四人紅抹額緋襖白袴帑烏皮靴樂用豎箜篌一琵琶一五絃琵琶一笙一橫笛一簫一篳篥一毛員鼓一都曇鼓一答臘鼓一腰鼓一羯鼓一雞婁鼓一銅拔一貝一毛員鼓今亡疏勒樂工人皂絲布頭巾白絲布袴錦襟褾舞二人白襖錦袖赤皮靴赤皮帶樂用豎箜篌琵琶五絃琵琶橫笛簫篳篥答臘鼓腰鼓羯鼓雞婁鼓康國樂工人皂絲布頭巾緋絲布袍錦領舞二人緋襖錦領袖緑綾渾襠袴赤皮靴白袴帑舞急轉如風俗謂之胡旋樂用笛二正鼓一和鼓一銅拔一安國樂工人皂絲布頭巾錦褾領紫袖袴舞二人紫襖白袴帑赤皮靴樂用琵琶五絃琵琶豎箜篌簫橫笛篳篥正鼓和鼓銅拔箜篌五絃琵琶今亡此五國西戎之樂也南蠻北狄國俗皆隨髮際斷其髮今舞者咸用繩圍首反約髮杪內於繩下又有新聲河西至者號胡音聲與龜茲樂散樂俱為時重諸樂咸為之少寢北狄樂其可知者鮮卑吐谷渾部落稽三國皆馬上樂也鼓吹本軍旅之音馬上奏之故自漢以來北狄樂總歸鼓吹署後魏樂府始有北歌即魏史所謂真人代歌是也代都時命掖庭宮女晨夕歌之周隋世與西涼樂雜奏今存者五十三章其名目可解者六章慕容可汗吐谷渾部落稽巨鹿公主白淨王太子企喻也其不可解者咸多可汗之辭按今大角此即後魏世所謂簸邏回者是也其曲亦多可汗之辭北虜之俗呼主為可汗吐谷渾又慕容別種知此歌是燕魏之際鮮卑歌歌辭虜音竟不可曉梁有巨鹿公主歌辭似是姚萇時歌其辭華音與北歌不同梁樂府鼓吹又有大白淨皇太子小白淨皇太子企喻等曲隋鼓吹有白淨皇太子曲與北歌校之其音皆異開元初以問歌工長孫元忠云自高祖以來代傳其業元忠之祖受業於侯將軍名貴昌並州人也亦世習北歌貞觀中有詔令貴昌以其聲教樂府元忠之家世相傳如此雖譯者亦不能通知其辭蓋年歲久遠失其真矣絲桐惟琴曲有胡笳聲大角金吾所掌散樂者歷代有之非部伍之聲俳優歌舞雜奏漢天子臨軒設樂舍利獸從西方來戲於殿前激水成比目魚跳躍嗽水作霧翳日化成黃龍修八丈出水遊戲輝耀日光繩繫兩柱相去數丈二倡女對舞繩上切肩而不傾如是雜變總名百戲江左猶有高絙紫鹿跂行鱉食齊王捲衣鼠夏育扛鼎巨象行乳神龜抃戲背負靈嶽桂樹白雪畫地成川之伎晉成帝咸康七年散騎侍郎顧臻表曰末世之樂設外方之觀逆行連倒四海朝覲帝庭而足以蹈天頭以履地反天地之順傷彝倫之大乃命太常悉罷之其後復高絙紫鹿後魏北齊亦有魚龍辟邪鹿馬仙車吞刀吐火剝車剝驢種瓜拔井之戲周宣帝徵齊樂並會關中開皇初散遣之大業二年突厥單于來朝洛陽宮煬帝為之大合樂盡通漢晉周齊之術胡人大駭帝命樂署肄習常以歲首縱觀端門內大抵散樂雜戲多幻術幻術皆出西域天竺尤甚漢武帝通西域始以善幻人至中國安帝時天竺獻伎能自斷手足刳剔腸胃自是歷代有之我高宗惡其驚俗敕西域關令不令入中國苻堅嘗得西域倒舞伎睿宗時婆羅門獻樂舞人倒行而以足舞於極銛刀鋒倒植於地低目就刃以歷臉中又植於背下吹篳篥者立其腹上終曲而亦無傷又伏伸其手兩人躡之旋身繞手百轉無已漢世有橦木伎又有盤舞晉世加之以柸謂之柸盤舞樂府詩云妍袖陵七盤言舞用盤七枚也梁謂之舞盤伎梁有長蹻伎擲倒伎跳劍伎吞劍伎今並存又有舞輪伎蓋今戲車輪者透三峽伎蓋今透飛梯之類也高絙伎蓋今之戲繩者是也梁有獼猴幢伎今有緣竿又有獼猴緣竿未審何者為是又有弄碗珠伎丹珠伎歌舞戲有大面撥頭踏搖娘窟子等戲玄宗以其非正聲置教坊於禁中以處之婆羅門樂與四夷同列婆羅門樂用漆篳篥二齊鼓一散樂用橫笛一拍板一腰鼓三其餘雜戲變態多端皆不足稱大面出於北齊北齊蘭陵王長恭才武而面美常著假面以對敵嘗擊周師金墉城下勇冠三軍齊人壯之為此舞以效其指麾擊刺之容謂之蘭陵王入陳曲撥頭出西域胡人為猛獸所噬其子求獸殺之為此舞以像之也踏搖娘生於隋末隋末河內有人貌惡而嗜酒常自號郎中醉歸必毆其妻其妻美色善歌為怨苦之辭河朔演其曲而被之絃管因寫其妻之容妻悲訴每搖頓其身故號踏搖娘近代優人頗改其制度非舊旨也窟子亦云魁子作偶人以戲善歌舞本喪家樂也漢末始用之於嘉會齊後主高緯尤所好高麗國亦有之八音之屬協於八節匏瓠也女媧氏造列管於匏上內簧其中爾雅謂之巢大者曰竽小者曰和竽煦也立春之音煦生萬物也竽管三十六宮管在左和管十三宮管居中今之竽笙並以木代匏而漆之無復音矣荊梁之南尚存古制云管三孔曰籥春分之音萬物振躍而動也簫舜所造也爾雅謂之茭音交大曰山犮二十三管修尺四寸笛漢武帝工丘仲所造也其元出於羌中短笛修尺有咫長笛短笛之間謂之中管篪吹孔有觜如酸棗橫笛小篪也漢靈帝好胡笛五胡亂華石遵玩之不絶音宋書云有胡篪出於胡吹則謂此梁胡吹歌云快馬不須鞭反插楊柳枝下馬吹橫笛愁殺路傍兒此歌辭元出北國之橫笛皆去觜其加觜者謂之義觜笛篳篥本名悲篥出於胡中其聲悲亦云胡人吹之以驚中國馬云柷衆也立夏之音萬物衆皆成也方面各二尺餘傍開員孔內手於中擊之以舉樂敔如伏虎背皆有鬣二十七碎竹以擊其首而逆刮之以止樂也舂牘虛中如筒無底舉以頓地如舂杵亦謂之頓相相助也以節樂也或謂梁孝王築睢陽城擊鼓為下杵之節睢陽操用舂牘後世因之拍板長闊如手厚寸餘以韋連之擊以代抃琴伏羲所造琴禁也夏至之音陰氣初動禁物之淫心五絃以備五聲武王加之為七絃琴十有二柱如琵琶擊琴柳惲所造惲嘗為文詠思有所屬搖筆誤中琴絃因為此樂以管承絃又以片竹約而束之使絃急而聲亮舉竹擊之以為節曲瑟昔者大帝使素女鼓五十絃瑟悲不能自止破之為二十五絃大帝太昊也箏本秦聲也相傳云蒙恬所造非也制與瑟同而絃少案京房造五音準如瑟十三絃此乃箏也雜樂箏並十有二絃他樂皆十有三絃軋箏以片竹潤其端而軋之築如箏細頸以竹擊之如擊琴清樂箏用骨爪長寸餘以代指琵琶四絃漢樂也初秦長城之役有弦鼗而鼓之者及漢武帝嫁宗女於烏孫乃裁箏築為馬上樂以慰其鄉國之思推而遠之曰琵引而近之曰琶言其便於事也今清樂奏琵琶俗謂之秦漢子圓體修頸而小疑是弦鼗之遺制其他皆充上鋭下曲項形制稍大疑此是漢制兼似兩制者謂之秦漢蓋謂通用秦漢之法梁史稱侯景之將害簡文也使太樂令彭雋齎曲項琵琶就帝飲則南朝似無曲項者亦本出胡中五絃琵琶稍小蓋北國所出風俗通云以手琵琶之因為名案舊琵琶皆以木撥彈之太宗貞觀中始有手彈之法今所謂搊琵琶者是也風俗通所謂以手琵琶之乃非用撥之義豈上世固有搊之者耶阮咸亦秦琵琶也而項長過於今制列十有三柱武太后時蜀人蒯朗於古墓中得之晉竹林七賢圖阮咸所彈與此類因謂之阮咸咸晉世實以善琵琶知音律稱箜篌漢武帝使樂人侯調所作以祠太一或云侯輝所作其聲坎坎應節謂之坎侯聲訛為箜篌或謂師延靡靡樂非也舊説亦依琴制今按其形似瑟而小七絃用撥彈之如琵琶豎箜篌胡樂也漢靈帝好之體曲而長二十有二絃豎抱於懷用兩手齊奏俗謂之擘箜篌鳳首箜篌有項如軫七絃鄭善子作開元中進形如阮咸其下缺少而身大傍有少缺取其身便也絃十三隔孤柱一合散聲七隔聲九十一柱聲一總九十九聲隨調應律太一司馬縚開元中進十二絃六隔合散聲十二隔聲七十二絃散聲應律呂以隔聲旋相為宮合八十四調令編入雅樂宮縣內用之六絃史盛作天寶中進形如琵琶而長六絃四隔孤柱一合散聲六隔聲二十四柱聲一總三十一聲隔調應律天寶樂任偃作天寶中進類石幢十四絃六柱黃鐘一均足倍七聲移柱作調應律塤曛也立秋之音萬物將曛黃也埏土為之如鵝卵凡六孔鋭上豐下大者爾雅謂之曰嘂缶如足盆古西戎之樂秦俗應而用之其形似覆盆以四杖擊之秦趙會於澠池秦王擊缶而歌八缶唐永泰初司馬縚進廣平樂蓋八缶具黃鐘一均聲鐘黃帝之工垂所造鐘種也立秋之音萬物種成也大曰鎛鎛亦大鐘也爾雅謂之鏞小而編之曰編鐘中曰剽小曰棧錞于圜如碓頭大上小下縣以籠牀芒將之以和鼓沈約宋書云今人間時有之則宋日非廟庭所用後周平蜀獲之斛斯徵觀曰錞于也依干寶周禮注試之如其言鐃木舌搖之以和鼓梁有銅磬蓋今方響之類方響以鐵為之修八寸廣二寸圓上方下架如磬而不設業倚於架上以代鐘磬人間所用者才三四寸銅拔亦謂之銅盤出西戎及南蠻其圓數寸隱起若浮漚貫之以韋皮相擊以和樂也南蠻國大者圓數尺或謂南齊穆士素所造非也鉦如大銅疊縣而擊之節鼓銅鼓鑄銅為之虛其一面覆而擊其上南夷扶南天竺類皆如此嶺南豪家則有之大者廣丈餘磬叔所造也磬徑也立冬之音萬物皆堅徑書云泗濱浮磬言泗濱石可為磬今磬石皆出華原非泗濱也登歌磬以玉為之爾雅謂之毊鼓動也冬至之音萬物皆含陽氣而動雷鼓八面以祀天靈鼓六面以祀地路鼓四面以祀鬼神夏后加之以足謂之足鼓殷人貫之以柱謂之楹鼓周人縣之謂之縣鼓後世從殷制建之謂之建鼓晉鼓六尺六寸金奏則鼓之傍有鼓謂之應鼓以和大鼓小鼓有柄曰鞞搖之以和鼓大曰鞉腰鼓大者瓦小者木皆廣首而纖腹本胡鼓也石遵好之與橫笛不去左右齊鼓如漆桶大一頭設齊於鼓面如麝臍故曰齊鼓簷鼓如小甕先冒以革而漆之羯鼓正如漆桶兩手具擊以其出羯中故號羯鼓亦謂之兩杖鼓都曇鼓似腰鼓而小以槌擊之毛員鼓似都曇鼓而稍大答臘鼓制廣羯鼓而短以指揩之其聲甚震俗謂之揩鼓雞婁鼓正圓兩手所擊之處平可數寸正鼓和鼓者一以正一以和皆腰鼓也節鼓狀如博局中間員孔適容其鼓擊之節樂也撫拍以韋為之實之以粳撫之節樂也金石絲竹匏土革木謂之八音金木之音擊而成樂今東夷有管木者桃皮是也西戎有吹金者銅角是也長二尺形如牛角貝蠡也容可數升並吹之以節樂亦出南蠻桃皮卷之以為篳篥嘯葉銜葉而嘯其聲清震橘柚尤善四夷絲竹之量國異其制不可詳盡爾雅琴二十絃曰離瑟二十七絃曰灑漢世有洞簫又有管長尺圍寸而併漆之宋世有繞梁似臥箜篌今並亡矣今世又有篪其長盈尋曰七星如箏稍小曰雲和樂府所不用周天子宮縣諸侯軒縣大夫曲縣士特縣故孔子之堂聞金石之音魏絳之家有鐘磬之聲秦漢之際斯禮無聞漢丞相田蚡前庭羅鐘磬置曲旃光武又賜東海恭王鐘簴之樂即漢世人臣尚有金石漢樂歌云高張四縣神來宴饗謂宮縣也制氏在太樂能記鏗鏘鼓舞河間王著樂記八佾之舞與制氏不甚相遠又舞八佾之明文也漢儀云高廟撞千石之鐘十枚即上林賦所謂撞千石之鐘立萬石之鋌巨者也鐘當十二而此十枚未識其義議者皆云漢世不知用宮縣今案漢章和世用旋宮漢世羣儒備言其義牛弘祖孝孫所由準的也又河間王博採經籍與制氏不殊知漢世之樂為最備矣魏晉已來但云四廂金石而不言其禮或八架或十架或十六架梁武始用二十六架貞觀初增三十六架加鼓吹熊羆桉十二於四隅後魏周齊皆二十六架建德中復梁三十六架隋文省煬帝又復之樂縣橫曰簨豎曰簴飾簨以飛龍飾趺以飛廉鐘簴以摯獸磬簴以摯鳥上列樹羽傍垂流蘇周制也縣以崇牙殷制也飾以博山後世所加也宮縣每架金博山五軒縣三鼓承以花趺覆以華蓋上集翔鷺隋氏二十架先置建鼓於四隅鎛鐘方面各三依其辰位雜列編鐘磬各四架於其間二十六架則編鐘十二架磬亦如之軒縣九架鎛鐘三架在辰丑申地編鐘磬皆三架設路鼓二於縣內戌巳地之北設柷敔於四隅舞人立於其中錞于鐃鐸撫拍舂牘列於舞人間唐禮天子朝廟用三十六架高宗成蓬萊宮充庭七十二武后遷都乃省之皇后廟及郊祭並二十架同舞八佾先聖廟及皇太子廟並九架舞六佾縣間設柷敔各一柷於左敔於右錞于撫拍頓相鐃鐸次列於路鼓南舞人列於縣北登歌二架登於堂上兩楹之前編鐘在東編磬在西登歌工人坐堂上竹人立堂下所謂琴瑟在堂竽笙在庭也殿庭加設鼓吹於四隅宴享陳清樂西涼樂架對列於左右廂設舞筵於其間舊皇后庭但設絲管大業尚侈始置鐘磬猶不設鎛鐘以鎛磬代武太后稱制用鐘因而莫革樂縣庭廟以五綵雜飾軒縣以朱五郊則各從其方色每先奏樂三日太樂令宿設縣於庭其日率工人入居其次協律郎舉麾樂作仆麾樂止文舞退武舞進若常享會先一日具坐立部樂名封上請所奏御注而下及會先奏坐部伎次奏立部伎次奏蹀馬次奏散樂而畢矣廣明初巢賊干紀輿駕播遷兩都覆圮宗廟悉為煨燼樂工淪散金奏幾亡及僖宗還宮購募鐘縣之器一無存者昭宗即位將親謁郊廟有司請造樂縣詢於舊工皆莫知其制度修奉樂縣使宰相張濬悉集太常樂胥詳酌竟不得其法時太常博士殷盈孫深於典故乃案周官考工記之文究其欒銑于鼓鉦舞甬之法沈思三四夕用算法乘除鎛鐘之輕重高低乃定懸下編鐘正黃鐘九寸五分下至登歌倍應鐘三寸三分半凡四十八等口項之量徑衡之圍悉為圖遣金工依法鑄之凡二百四十口鑄成張濬求知聲者處士蕭承訓梨園樂工陳敬言與太樂令李從周令先校定石磬合而擊拊之八音克諧觀者聳聽濬既進呈昭宗陳於殿庭以試之時以宗廟焚毀之後修奉不及乃權以少府監廳為太廟其庭甚狹議者論縣樂之架不同濬奏議曰臣伏準舊制太廟含元殿並設宮縣三十六架太清宮南北郊社稷及諸殿庭並二十架今修奉樂懸太廟合造三十六架臣今參議請依古禮用二十架伏自兵興已來雅樂淪缺將為修奉事實重難變通宜務於酌中損益當循於寧儉臣聞諸舊史昔武王定天下至周公相成王始暇制樂魏初無樂器及伶人後稍得登歌食舉之樂明帝太寧末詔增益之咸和中鳩集遺逸尚未有金石之音至孝武太元中四廂金石始備郊祀猶不舉樂宋文帝元嘉九年初調金石二十四年南郊始設登歌廟舞猶闕孝武孝建中有司奏郊廟宜設備樂始為詳定故後魏孝文太和初司樂上書陳樂章有闕求集羣官議定廣修器數正立名品詔雖行之仍有殘缺隋文踐祚太常議正雅樂九年之後惟奏黃鐘一宮郊廟止用一調據禮文每一代之樂二調並奏六代之樂凡十二調其餘聲律皆不復通高祖受隋禪軍國多務未遑改創樂府尚用隋氏舊文武德九年命太常考正雅樂貞觀二年考畢上奏蓋其事體大故歷代不能速成伏以俯逼郊天式修雅樂必將集事須務相時今者帑藏未充貢奉多闕凡闕貨力不易方圓制度之間亦宜撙節臣伏惟儀禮宮懸之制陳鎛鐘二十架當十二辰之位甲丙庚壬各設編鐘一架乙丁辛癸各設編磬一架合為二十架樹建鼓於四隅當乾坤艮巽之位以象二十四氣宗廟殿庭郊丘社稷皆用此制無聞異同周漢魏晉宋齊六朝並祇用二十架隋氏平陳檢梁故事乃設三十六架國初因之不改高宗皇帝初成蓬萊宮充庭七十二架尋乃省之則簨簴架數太多本近於侈止於二十架正協禮經兼今太廟之中地位甚狹百官在列萬舞充庭雖三十六架具存亦施為不得廟庭難容未易開廣樂架不可重沓鋪陳今請依周漢魏晉宋齊六代故事用二十架從之古制雅樂宮縣之下編鐘四架十六口近代用二十四口正聲十二倍聲十二各有律呂凡二十四聲登歌一架亦二十四鐘雅樂淪滅至是復全
