入吐蕃報聘丙子親耕於興慶宮龍池己卯禁採捕鯉魚天下州府春秋二時社及釋奠停牲牢唯用酒酺永為常式二月甲午以崔琳為御史大夫三月乙酉朔崔琳使于吐蕃夏四月壬午於京城置禮院丙申令兩京及天下諸州各置太公尚父廟以張良配饗春秋二時仲月上戊日祭之五月壬戌五嶽各置老君廟六月乙酉大風拔木秋八月辛巳降天下死罪從流徒已下悉原之九月辛未吐蕃遣其國相論尚他硉來朝冬十月丙申幸東都十一月丙辰至自東都甲子太子少傅源乾曜薨十二月嶲州都督張審素以劫制使監察御史楊汪伏誅是冬浚苑內洛水六十餘日而罷戊戌裴光庭上瑤山往則維城前軌各一卷上令賜太子諸王各一本二十年春正月乙卯以禮部尚書信安王褘率兵討契丹丁巳幸長芬公主宅乙丑幸薛王業宅並即日還宮二月己未敕文武選人承前例三月三十日為例然開選門比團甲進官至夏來自今已後選門並正月內開團甲二月內訖分命宰相録京城諸獄繫囚三月信安王褘與幽州長史趙含章大破奚契丹於幽州之北山夏四月乙亥宴百僚於上陽東州醉者賜以牀褥肩輿而歸相屬于路癸巳改造天津橋毀皇津橋合為一橋五月癸卯寒食上墓宜編入五禮永為恆式辛亥金仙長公主薨戊辰信安王獻奚契丹之俘上御應天門受之六月丁丑單于大都護河北東道行軍元帥忠王浚加司徒都護如故副大使信安王褘加開府儀同三司庚寅幽州長史趙含章坐盜用庫物左監門員外將軍楊元方受含章饋餉並於朝堂決杖流瀼州皆賜死于路其月遣范安及於長安廣花萼樓築夾城至芙蓉園秋七月戊辰幸寧王憲宅即日還宮八月辛未朔日有蝕之己卯戶部尚書王晙卒九月乙巳中書令蕭嵩等奏上開元新禮一百五十卷制所司行用之渤海靺鞨寇登州殺刺史韋俊命左領軍將軍蓋福順發兵討之冬十月丙戌命巡幸所至有賢才未聞達者舉之仍令中書門下疏決囚徒辛卯至潞州之飛龍宮給復三年兵募丁防先差未發者令改出餘州辛丑至北都癸丑曲赦太原給復三年十一月庚午祀后土於脽上大赦天下左降官量移近處內外文武官加一階開元勳臣盡假紫及緋大酺三日十二月壬申至京師其年戶部計戶七百八十六萬一千二百三十六口四千五百四十三萬一千二百六十五二十一年春正月庚子朔制令士庶家藏老子一本每年貢舉人量減尚書論語兩條策加老子策乙巳遷祔肅明皇后神主于廟毀儀坤廟丁巳幸溫泉宮己未命工部尚書李嵩使于吐蕃癸亥至自溫泉宮三月乙巳侍中裴光庭薨甲寅尚書右丞韓休為黃門侍郎同中書門下平章事閏月幽州道副總管郭英傑等討契丹為所敗於都山之下英傑死之夏四月丁巳以久旱命太子少保陸象先戶部尚書杜暹等七人往諸道宣慰賑給及令黜陟官吏疏決囚徒丁酉寧王憲為太尉薛王業為司徒慶王潭為太子太師忠王浚為開府儀同三司棣王洽為太子少傅鄂王涓為太子太保五月甲申皇太子納妃薛氏制天下死罪降從流流已下釋放京文武官賜勳一轉秋七月乙丑朔日有蝕之九月壬午封皇子溢為濟王沔為信王泚為義王漼為陳王澄為豐王潓為恆王漎為涼王滔為深王冬十月庚戌幸溫泉宮十一月戊子尚書右丞相宋璟以年老請致仕許之十二月丁未兵部尚書徐國公蕭嵩為尚書右丞相黃門侍郎韓休為兵部尚書並罷知政事京兆尹裴耀卿為黃門侍郎前中書侍郎張九齡起復舊官並同中書門下平章事是歲關中久雨害稼京師饑詔出太倉米二百萬石給之二十二年春正月癸亥朔制古聖帝明皇嶽瀆海鎮用牲牢餘並以酒酺充奠己巳幸東都辛未太府卿嚴挺之戶部侍郎裴寬於河南存問賑給乙酉懷衛邢相等五州乏糧遣中書舍人裴敦復巡問量給種子己丑至東都二月壬寅秦州地震廨宇及居人廬舍崩壞殆盡壓死官吏以下四十餘人殷殷有聲仍連震不止命尚書右丞相蕭嵩往祭山川並遣使存問賑恤之壓死之家給復一年一家三人已上死者給復二年辛亥初置十道採訪處置使徵恆州張果先生授銀青光祿大夫號曰通玄先生三月沒京兆商人任令方資財六十餘萬貫壬午欲令不禁私鑄錢遣公卿百僚詳議可否衆以為不可遂止四月乙未伊西北庭且依舊為節度廢太廟署以太常寺奉宗廟庚子唐州界准勝州例立表測候日晷影長短乙巳詔京都見禁囚徒令中書門下及留守檢校覆降罪天下諸州委刺史丁未眉州鼎皇山下江水中得寶鼎甲寅北庭都護劉渙謀反伏誅五月戊子黃門侍郎裴耀卿為侍中中書侍郎張九齡為中書令黃門侍郎李林甫為禮部尚書同中書門下平章事關中大風拔木同州尤甚是夏上自於苑中種麥率皇太子已下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰比歲令人巡檢苗稼所對多不實故自種植以觀其成且春秋書麥禾豈非古人所重也六月乙未遣左金吾將軍李佺於赤嶺與吐蕃分界立碑七月己巳司徒薛王業薨追諡為惠宣太子甲申遣中書令張九齡充河南開稻田使八月先是駕至東都遣侍中裴耀卿充江淮河南轉運使河口置輸場壬寅於輸場東置河陰縣又遣張九齡於許豫陳亳等州置水屯九月壬申改饒樂都督府為奉誠都督府辛巳移登州平海軍於海口安置冬十月甲辰試司農卿陳思問以贓私配流瀼州十二月戊子朔日有蝕之乙巳幽州長史張守圭發兵討契丹斬其王屈烈及其大臣可突干於陳傳首東都餘叛奚皆散走山谷立其酋長李過折為契丹王是歲突厥毗伽可汗死斷京城乞兒二十三年春正月己亥親耕籍田上加至九推而止卿已下終其畝大赦天下京文武官及朝集採訪使三品已下加一爵四品已下加一階外官賜勳一轉其才有霸王之略學究天人之際及堪將帥牧宰者令五品已上清官及刺史各舉一人致仕官量與改職依前致仕賜酺三日三月丁卯殿中侍御史楊萬頃為讎人所殺夏五月戊寅宗子請率月俸於興慶宮建龍池上聖德頌秋七月丙子皇太子鴻改名瑛慶王直已下十四王並改名又封皇子玭為義王圭為陳王珙為豐王琪為恆王璿為涼王璥為汴王其榮王琬已下並開府置官屬各食實封二千戶八月戊子制魚衆寡惸獨免今年地稅之半江淮已南有遭水處本道使賑給之九月戊申移泗州就臨淮縣置冬十月辛亥移隸伊西北庭都護屬四鎮節度突騎施寇北庭及安西撥換城十一月壬申朔日有蝕之十二月新羅遣使朝獻二十四年春正月吐蕃遣使獻方物北庭都護蓋嘉運率兵擊突騎施破之三月乙未始移考功貢舉遣禮部侍郎掌之夏六月丙午京兆醴泉妖人劉志誠率衆為亂將趨京城咸陽官吏燒便橋以斷其路俄而散走京兆府盡擒斬之是夏大熱道路有暍死者秋七月庚子太子太保陸象先卒辛丑李林甫為兵部尚書依舊知政事己巳初置壽星壇祭老人星及角亢等七宿八月戊申朔加親舅小功服舅母緦麻服堂舅袒免己亥深王滔薨九月壬午改尚書主爵曰司封冬十月戊申車駕發東都還西京甲子至華州曲赦行在繫囚丁丑至自東都十一月壬寅侍中裴耀卿為尚書左丞相中書令張九齡為尚書右丞相並罷知政事兵部尚書李林甫兼中書令殿中監牛仙客兵部尚書同中書門下三品尚書右丞相蕭嵩為太子太師工部尚書韓休為太子少保十二月戊申太子太師慶王琮為司徒丙寅牛仙客知門下省事
