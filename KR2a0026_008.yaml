body:
  text: 舊唐書卷八本紀第八玄宗上玄宗至道大聖大明孝皇帝諱隆基睿宗第三子也母曰昭成順聖皇后竇氏垂拱元年秋八月戊寅生於東都性英斷多藝尤知音律善八分書儀範偉麗有非常之表三年閏七月丁卯封楚王天授三年十月戊戌出閣開府置官屬年始七歲朔望車騎至朝堂金吾將軍武懿宗忌上嚴整訶排儀仗因欲折之上叱之曰吾家朝堂干汝何事敢迫吾騎從則天聞而特加寵異之尋却入閣長壽二年臘月丁卯改封臨淄郡王聖曆元年出閣賜第於東都積善坊大足元年從幸西京賜宅於興慶坊長安中歷右衛郎將尚輦奉御神龍元年遷衛尉少卿景龍二年四月兼潞州別駕十二月加銀青光祿大夫州境有黃龍白日升天嘗出畋有紫雲在其上後從者望而得之前後符瑞凡一十九事四年中宗將祀南郊來朝京師將行使術士韓禮筮之蓍一莖孑然獨立禮驚曰蓍立奇瑞非常也不可言屬中宗末年王室多故上常陰引材力之士以自助上所居宅外有水池浸溢頃餘望氣者以為龍氣四年四月中宗幸其第因遊其池結綵為樓船令巨象踏之至六月中宗暴崩韋后臨朝稱制韋溫宗楚客紀處訥等謀傾宗社以睿宗介弟之重先謀不利道士馮道力處士劉承祖皆善於占兆詣上布誠款上所居里名隆慶時人語訛以隆為龍韋庶人稱制改元又為唐隆皆符御名上益自負乃與太平公主謀之公主喜以子崇簡從上乃與崇簡朝邑尉劉幽求長上折衝麻嗣宗押萬騎果毅葛福順李仙鳧寶昌寺僧普潤等定策誅之或曰先啓大王上曰我拯社稷之危赴君父之急事成福歸於宗社不成身死於忠孝安可先請憂怖大王乎若請而從是王與危事請而不從則吾計失矣遂以庚子夜率幽求等數十人自苑南入總監鍾紹京又率丁匠百餘以從分遣萬騎往玄武門殺羽林將軍韋播高嵩持首而至衆歡叫大集攻白獸玄德等門斬關而進左萬騎自左入右萬騎自右入合於凌煙閣前時太極殿前有宿衛梓宮萬騎聞譟聲皆披甲應之韋庶人惶惑走入飛騎營為亂兵所害於是分遣誅韋氏之黨比明內外討捕皆斬之乃馳謁睿宗謝不先啓請之罪睿宗遽前抱上而泣曰宗社禍難由汝安定神祇萬姓賴汝之力也拜殿中監同中書門下三品兼押左右萬騎進封平王睿宗即位與侍臣議立皇太子僉曰除天下之禍者享天下之福拯天下之危者受天下之安平王有聖德定天下又聞成器已下咸有推讓宜膺主鬯以副羣心睿宗從之丙午制曰舜去四凶而功格天地武有七德而戡定黎人故知有大勳者必受神明之福仗高義者必為匕鬯之主朕恭臨寶位亭育寰區以萬物之心為心以兆人之命為命雖承繼之道咸以冢嫡居尊而無私之懷必推功業為首然後可保安社稷永奉宗祧第三子平王基孝而克忠義而能勇比以朕居藩邸虔守國彝貴戚中人都無引接羣邪害正凶黨實繁利口巧言讒說罔極韋溫延秀朋黨競起晉卿楚客交搆其間潛結回邪排擠端善潛貯兵甲將害朕躬基密聞其期先難奮發推身鞠弭衆應如歸呼吸之間凶渠殄滅安七廟於幾墜拯羣臣於將殞方舜之功過四比武之德逾七靈祇望在昆弟樂推一人元良萬邦以定為副君者非此而誰可立為皇太子有司擇日備禮冊命七月己巳睿宗御承天門皇太子詣朝堂受冊是日有景雲之瑞改元為景雲大赦天下二年又制曰惟天生蒸人牧以元后維皇立國副以儲君將以保綏家邦安固後嗣者也朕纂承洪業欽奉寶圖夜分不寢日昃忘倦茫茫四海懼一人之未周蒸蒸萬姓恐一物之失所雖卿士竭誠守宰宣化緬懷庶域仍未小康是以求下人之變風遵先朝之故事皇太子基仁孝因心溫恭成德深達禮體能辨皇猷宜令監國俾爾為政其六品以下除授及徒罪已下並取基處分延和元年六月凶黨因術人聞睿宗曰據玄象帝座及前星有災皇太子合作天子不合更居東宮矣睿宗曰傳德避災吾意決矣七月壬午制曰朕以寡昧虔奉鴻休本殊王季之賢早達延陵之節昔在聖曆已讓皇嗣之尊爰暨神龍終辭太弟之授豈唯衣冠所覩抑亦兆庶咸知頃屬國步不夷時艱主幼大業有綴旒之懼寶位深墜地之憂議迫公卿遂司契篆日慎一日以至于今一紀之勞勤亦至矣萬方之俗化漸行矣將成宿願脫屣寰區昔堯之禪舜唯能是與禹以命啓匪私其親神器之重允歸公授皇太子基有大功於天地定阽危於社稷溫文既習聖敬克躋委之監國已移歲年時政益明庶工惟序朕之知子庶不負時曆數在躬宜陟元后可令即皇帝位有司擇日授冊朕方比迹洪古希風太皇神與化遊思與道合無為無事豈不美歟王公百僚宜識朕意上意惶懼馳見叩頭請所以傳位之旨睿宗曰吾因汝功業得宗社今帝座有眚思欲遜避唯聖德大勳始轉禍為福易位於汝吾知晚矣上始居武德殿視事三品以下除授及徒罪皆自決之先天二年七月三日尚書左僕射竇懷貞侍中岑羲中書令蕭至忠崔湜雍州長史李晉左羽林大將軍常元楷右羽林將軍李慈等與太平公主同謀期以其月四日以羽林軍作亂上密知之因以中旨告岐王範薛王業兵部尚書郭元振將軍王毛仲取間馬及家人三百餘人率太僕少卿李令問王守一內侍高力士果毅李守德等親信十數人出武德殿入虔化門梟常元楷李慈於北闕擒賈膺福李猷於內客省以出執蕭至忠岑羲於朝皆斬之睿宗明日下詔曰朕將高居無為自今軍國政刑一事已上並取皇帝處分上御承天門樓下制曰朕承纍聖之洪休荷重光之積慶昔因多難內屬搆屯寶位深墜地之憂神器有綴旒之懼事殷家國義感神祇吟嘯風雲龔行雷電致君親於堯舜濟黔首於休和遂以孟秋允升儲二旋承內禪繼體宸居拜首之請空勤讓立之誠莫展恭臨億兆二載于茲上稟聖謨下凝庶績八荒同軌瀛海無波不謂姦慝潛謀蕭牆竊發逆賊竇懷貞等並以庸妄權齒朝廷毫髮之效未申丘山之釁仍積共成梟獍將肆姦回太上皇聖斷宏通英謀獨運命朕率岐王範薛王業等躬事誅鋤齊斧一麾凶渠盡殪太陽朗耀澄氛靄於天衢高風順時厲肅殺於秋序神靈協贊夷夏相歡四族之慝既清七百之祚方永爰承後命載闡休期總軍國之大猷施雲雨之鴻澤承乾之道既光被於無垠作解之恩思式覃於品物當與億兆同此惟新可大赦天下大辟罪已下咸赦除之加邠王守禮實封三百戶宋王成器申王成義各加實封一千戶岐王範薛王業各加實封七百戶文武官三品以下賜爵一級四品已下各加一階內外官人被諸道按察使及御史所摘伏咸宜洗滌選日依次用丁卯崔湜盧藏用除名長流嶺表壬申王琚為銀青光祿大夫戶部尚書封趙國公實封三百戶姜皎銀青光祿大夫工部尚書封楚國公實封五百戶李令問銀青光祿大夫殿中監實封三百戶王毛仲輔國大將軍左武衛大將軍檢校內外間兼知監牧使霍國公實封五百戶王守一銀青光祿大夫太常卿同正員進封晉國公實封五百戶並賞其定策功琚皎令問固讓癸丑中書侍郎陸象先為益州大都督府長史兼劍南道按察兵馬使尚書左丞張說為檢校中書令甲戌令毀天樞取其銅鐵充軍國雜用庚辰王琚為中書侍郎加實封二百戶姜皎殿中監仍充內外間使加實封二百戶李令問殿中少監知尚食事加實封二百戶己丑周孝明高皇帝依舊追贈太原王宜去帝號孝明皇后宜稱太原王妃昊陵順陵並稱太原王及妃墓八月壬辰封州流人劉幽求為尚書左僕射知軍國重事徐國公仍依舊實封七百戶制曰凡有刑人國家常法掩骼埋胔王者用心自今已後輒有屠割刑人骨肉者依法科殘害之罪九月司空兼揚州大都督宋王成器為太尉兼揚州大都督益州大都督兼右金吾大將軍申王成義為司徒兼益州大都督單于大都護兼左金吾大將軍邠王守禮為司空癸丑封華嶽神為金天王九月丁卯宋王成器為開府儀同三司尚書左僕射劉幽求同中書門下三品檢校中書令燕國公張說為中書令特進王仁皎為開府儀同三司己卯宴王公百僚於承天門令左右於樓下撒金錢許中書門下五品已上官及諸司三品已上官爭拾之仍賜物有差郭元振兼御史大夫丙戌又置右御史臺冬十一月甲申幸新豐之溫湯癸卯講武於驪山兵部尚書代國公郭元振坐虧失軍容配流新州給事中攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵於渭川同州刺史梁國公姚元之為兵部尚書同中書門下三品乙巳至自溫湯十一月乙丑幽求兼知侍中戊子上加尊號為開元神武皇帝十二月庚寅朔大赦天下改元為開元內外官賜勳一轉改尚書左右僕射為左右丞相中書省為紫微省門下省為黃門省侍中為監雍州為京兆府洛州為河南府長史為尹司馬為少尹國初以來宰相及食實封功臣子孫一應沈翳未承恩者令量才擢用開元元年十二月己亥禁斷潑寒胡戲癸丑尚書左丞相兼黃門監劉幽求為太子少保罷知政事紫微令張說為相州刺史甲寅門下侍郎盧懷慎同紫微黃門平章事二年春正月關中自去秋至于是月不雨人多饑乏遣使賑給制求直諫昌言弘益政理者名山大川並令祈祭丙寅紫微令姚崇上言請檢責天下僧尼以僞濫還俗者二萬餘人甲申並州大都督府長史兼檢校左衛大將軍薛訥同紫微黃門三品仍總兵以討奚契丹二月突厥默啜遣其子同俄特勤率衆寇北庭都護府右驍衛將軍郭虔瓘擊敗之斬同俄於城下己酉以旱親録囚徒改太史監罷隸祕書省閏月癸亥令道士女冠僧尼致拜父母丁卯復置十道按察使己未突厥默啜妹壻火拔頡利發石失畢與其妻來奔封燕山郡王授左衛員外大將軍紫微侍郎趙國公王琚左授澤州刺史賜實封一百戶餘並停丁亥劉幽求為睦州刺史三月甲辰青州刺史郇國公韋安石為沔州別駕太子賓客逍遙公韋嗣立為嶽州別駕特進致仕李嶠先隨子在袁州又貶滁州別駕並員外置去年九月有詔毀天樞至今春始夏五月辛亥黃門監魏知古工部尚書罷知政事六月丁巳開府儀同三司宋王成器為岐州刺史司徒申王成義為豳州刺史司空邠王守禮為虢州刺史委務於上佐內出珠玉錦繡等服玩又令於正殿前焚之乙丑兵部尚書致仕韓國公張仁願卒七月薛訥與副將杜賓客崔宣道等總兵六萬自檀州道遇賊於灤河為賊所敗訥等屏甲遁歸減死除名為庶人辛未光祿卿竇希瑊為太子太傅房州刺史襄王重茂薨於梁州諡曰殤帝丙午昭文館學士柳沖太子左庶子劉子玄刊定姓族系録二百卷上之以興慶里舊邸為興慶宮諸王傅並停京官所帶跨巾算袋每朝參日著外官衙日著餘日停吐蕃寇臨洮軍又遊寇蘭州渭州掠羣牧起薛訥攝左羽林將軍隴右防禦使率杜賓客郭知運王晙安思順以禦之太常卿岐王範為華州刺史祕書監薛王業為同州刺史八月戊午西天竺國遣使獻方物九月戊申幸新豐之溫泉甲寅制曰自古帝王皆以厚葬為誡以其無益亡者有損生業故也近代以來共行奢靡遞相仿效浸成風俗既竭家産多至凋弊然則魂魄歸天明精誠之已遠卜宅於地蓋思慕之所存古者不封未為非達且墓為真宅自便有房今乃別造田園名為下帳又冥器等物皆競驕侈失禮違令殊非所宜戮尸暴骸實由於此承前雖有約束所司曾不申明喪葬之家無所依准宜令所司據品令高下明為節制冥器等物仍定色數及長短大小園宅下帳並宜禁絶墳墓塋域務遵簡儉凡諸送終之具並不得以金銀為飾如有違者先決杖一百州縣長官不能舉察並貶授遠官冬十月戊午至自溫泉薛訥破吐蕃於渭州西界武階驛斬首一萬七十級馬