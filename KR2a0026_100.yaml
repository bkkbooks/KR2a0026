body:
  text: 唐書卷九十六列傳第四十六姚崇宋璟姚崇本名元崇陝州硤石人也父善意貞觀中任巂州都督元崇為孝敬挽郎應下筆成章舉授濮州司倉五遷夏官郎中時契丹寇陷河北數州兵機填委元崇剖析若流皆有條貫則天甚奇之超遷夏官侍郎又尋同鳳閣鸞臺平章事聖曆初則天謂侍臣曰往者周興來俊臣等推勘詔獄朝臣遞相牽引咸承反逆國家有法朕豈能違中間疑有枉濫更使近臣就獄親問皆得手狀承引不虛朕不以為疑即可其奏近日周興來俊臣死後更無聞有反逆者然則以前就戮者不有冤濫耶元崇對曰自垂拱已後被告身死破家者皆是枉酷自誣而死告者特以為功天下號為羅織甚於漢之黨錮陛下令近臣就獄問者近臣亦不自保何敢輒有動搖被問者若翻又懼遭其毒手將軍張虔勗李安靜等皆是也賴上天降靈聖情發寤誅鋤凶豎朝廷乂安今日已後臣以微軀及一門百口保見在內外官更無反逆者乞陛下得告狀但收掌不須推問若後有徵驗反逆有實臣請受知而不告之罪則天大悅曰以前宰相皆順成其事陷朕為淫刑之主聞卿所説甚合朕心其日遣中使送銀千兩以賜元崇時突厥叱利元崇構逆則天不欲元崇與之同名乃改為元之俄遷鳳閣侍郎依舊知政事長安四年元之以母老表請解職侍養言甚哀切則天難違其意拜相王府長史罷知政事俾獲其養其月又令元之兼知夏官尚書事同鳳閣鸞臺三品元之上言臣事相王知兵馬不便臣非惜死恐不益相王則天深然其言改為春官尚書是時張易之請移京城大德僧十人配定州私置寺僧等苦訴元之斷停易之屢以為言元之終不納由是為易之所譖改為司僕卿知政事如故使充靈武道大總管神龍元年張柬之桓彥範等謀誅易之兄弟適會元之自軍還都遂預謀以功封梁縣侯賜實封二百戶則天移居上陽宮中宗率百官就閣起居王公已下皆欣躍稱慶元之獨嗚咽流涕彥範柬之謂元之曰今日豈是啼泣時恐公禍從此始元之曰事則天歲久乍此辭違情發於衷非忍所得昨預公誅凶逆者是臣子之常道豈敢言功今辭違舊主悲泣者亦臣子之終節緣此獲罪實所甘心無幾出為亳州刺史轉常州刺史睿宗即位召拜兵部尚書同中書門下三品尋遷中書令時玄宗在東宮太平公主干預朝政宋王成器為間使岐王範薛王業皆掌禁兵外議以為不便元之同侍中宋璟密奏請令公主往就東都出成器等諸王為刺史以息人心睿宗以告公主公主大怒玄宗乃上疏以元之璟等離間兄弟請加罪乃貶元之為申州刺史再轉揚州長史淮南按察使為政簡肅人吏立碑紀德俄除同州刺史先天二年玄宗講武在新豐驛召元之代郭元振為兵部尚書同中書門下三品復遷紫微令避開元尊號又改名崇進封梁國公固辭實封乃停其舊封特賜新封一百戶先是中宗時公主外戚皆奏請度人為僧尼亦有出私財造寺者富戶強丁皆經營避役遠近充滿至是崇奏曰佛不在外求之於心佛圖澄最賢無益於全趙羅什多藝不救於亡秦何充苻融皆遭敗滅齊襄梁武未免災殃但發心慈悲行事利益使蒼生安樂即是佛身何用妄度姦人令壞正法上納其言令有司隱括僧徒以偽濫還俗者萬二千餘人開元四年山東蝗蟲大起崇奏曰毛詩云秉彼蟊賊以付炎火又漢光武詔曰勉順時政勸督農桑去彼蝗蜮以及蟊賊此並除蝗之義也蟲既解畏人易為驅逐又苗稼皆有地主救護必不辭勞蝗既解飛夜必赴火夜中設火火邊掘坑且焚且瘞除之可盡時山東百姓皆燒香禮拜設祭祈恩眼看食苗手不敢近自古有討除不得者祇是人不用命但使齊心戮力必是可除乃遣御史分道殺蝗汴州刺史倪若水執奏曰蝗是天災自宜修德劉聰時除既不得為害更深仍拒御史不肯應命崇大怒牒報若水曰劉聰偽主德不勝妖今日聖朝妖不勝德古之良守蝗蟲避境若其修德可免彼豈無德致然今坐看食苗何忍不救因以飢饉將何自安幸勿遲回自招悔吝若水乃行焚瘞之法獲蝗一十四萬石投汴渠流下者不可勝紀時朝廷喧議皆以驅蝗為不便上聞之復以問崇崇曰庸儒執文不識通變凡事有違經而合道者亦有反道而適權者昔魏時山東有蝗傷稼緣小忍不除致使苗稼總盡人至相食後秦時有蝗禾稼及草木俱盡牛馬至相噉毛今山東蝗蟲所在流滿仍極繁息實所稀聞河北河南無多貯積倘不收穫豈免流離事繫安危不可膠柱縱使除之不盡猶勝養以成災陛下好生惡殺此事請不煩出敕乞容臣出牒處分若除不得臣在身官爵並請削除上許之黃門監盧懷慎謂崇曰蝗是天災豈可制以人事外議咸以為非又殺蟲太多有傷和氣今猶可復請公思之崇曰楚王吞蛭厥疾用瘳叔敖殺蛇其福乃降趙宣至賢也恨用其犬孔丘將聖也不愛其羊皆志在安人思不失禮今蝗蟲極盛驅除可得若其縱食所在皆空山東百姓豈宜餓殺此事崇已面經奏定訖請公勿復為言若救人殺蟲因緣致禍崇請獨受義不仰關懷慎既庶事曲從竟亦不敢逆崇之意蝗因此亦漸止息是時上初即位務修德政軍國庶務多訪於崇同時宰相盧懷慎源乾曜等但唯諾而已崇獨當重任明於吏道斷割不滯然縱其子光祿少卿彝宗正少卿異廣引賓客受納饋遺由是為時所譏時有中書主書趙誨為崇所親信受蕃人珍遺事發上親加鞫問下獄處死崇結奏其罪復營救之上由是不悅其冬曲赦京城敕文特標誨名令決杖一百配流嶺南崇自是憂懼頻面陳避相位薦宋璟自代俄授開府儀同三司罷知政事居月餘玄宗將幸東都而太廟屋壞上召宋璟蘇頲問其故璟等奏言陛下三年之制未畢誠不可行幸凡災變之發皆所以明教誡陛下宜增崇大道以答天意且停幸東都上又召崇問曰朕臨發京邑太廟無故崩壞恐神靈誡以東行不便耶崇對曰太廟殿本是苻堅時所造隋文帝創立新都移宇文朝故殿造此廟國家又因隋氏舊制歲月滋深朽𢀿而毀山有朽壤尚不免崩既久來枯木合將摧折偶與行期相會不是緣行乃崩且四海為家兩京相接陛下以關中不甚豐熟轉運又有勞費所以為人行幸豈是無事煩勞東都百司已作供擬不可失信於天下以臣愚見舊廟既朽爛不堪修理望移神主於太極殿安置更改造新廟以申誠敬車駕依前徑發上曰卿言正合朕意賜絹二百匹令所司奉七廟神主於太極殿改新廟車駕乃幸東都因令崇五日一參仍入閣供奉甚承恩遇後又除太子少保以疾不拜九年薨年七十二贈揚州大都督諡曰文獻崇先分其田園令諸子姪各守其分仍為遺令以誡子孫其略曰古人云富貴者人之怨也貴則神忌其滿人惡其上富則鬼瞰其室虜利其財自開闢已來書籍所載德薄任重而能壽考無咎者未之有也故范蠡疏廣之輩知止足之分前史多之況吾才不逮古人而久竊榮寵位逾高而益懼恩彌厚而增憂往在中書遘疾虛憊雖終匪懈而諸務多闕薦賢自代屢有誠祈人欲天從竟蒙哀允優遊園沼放浪形骸人生一代斯亦足矣田巴云百年之期未有能至王逸少云俯仰之間已為陳迹誠哉此言比見諸達官身亡以後子孫既失覆蔭多至貧寒斗尺之間參商是競豈唯自玷仍更辱先無論曲直俱受嗤毀莊田水碾既衆有之遞相推倚或致荒廢陸賈石苞皆古之賢達也所以預為定分將以絶其後爭吾靜思之深所歎服昔孔丘亞聖母墓毀而不修梁鴻至賢父亡席卷而葬昔楊震趙咨盧植張奐皆當代英達通識今古咸有遺言屬以薄葬或濯衣時服或單帛幅巾知真魂去身貴於速朽子孫皆遵成命迄今以為美談凡厚葬之家例非明哲或溺於流俗不察幽明咸以奢厚為忠孝以儉薄為慳惜至令亡者致戮尸暴骸之酷存者陷不忠不孝之誚可為痛哉可為痛哉死者無知自同糞土何煩厚葬使傷素業若也有知神不在柩復何用違君父之令破衣食之資吾身亡後可殮以常服四時之衣各一副而已吾性甚不愛冠衣必不得將入棺墓紫衣玉帶足便於身念爾等勿復違之且神道惡奢冥塗尚質若違吾處分使吾受戮於地下於汝心安乎念而思之今之佛經羅什所譯姚興執本與什對翻姚興造浮屠於永貴里傾竭府庫廣事莊嚴而興命不得延國亦隨滅又齊跨山東周據關右周則多除佛法而修繕兵威齊則廣置僧徒而依憑佛力及至交戰齊氏滅亡國既不存寺復何有修福之報何其蔑如梁武帝以萬乘為奴胡太后以六宮入道豈特身戮名辱皆以亡國破家近日孝和皇帝發使贖生傾國造寺太平公主武三思悖逆庶人張夫人等皆度人造寺竟術彌街咸不免受戮破家為天下所笑經云求長命得長命求富貴得富貴刀尋段段壞火坑變成池比來緣精進得富貴長命者為誰生前易知尚覺無應身後難究誰見有徵且五帝之時父不葬子兄不哭弟言其致仁壽無夭橫也三王之代國祚延長人用休息其人臣則彭祖老聃之類皆享遐齡當此之時未有佛教豈抄經鑄像之力設齋施物之功耶宋書西域傳有名僧為白黑論理證明白足解沈疑宜觀而行之且佛者覺也在乎方寸假有萬像之廣不出五蘊之中但平等慈悲行善不行惡則佛道備矣何必溺於小説惑於凡僧仍將喻品用為實録抄經寫像破業傾家乃至施身亦無所吝可謂大惑也亦有緣亡人造像名為追福方便之教雖則多端功德須自發心旁助寧應獲報遞相欺誑浸成風俗損耗生人無益亡者假有通才達識亦為時俗所拘如來普慈意存利物損衆生之不足厚豪僧之有餘必不然矣且死者是常古來不免所造經像何所施為夫釋迦之本法為蒼生之大弊汝等各宜警策正法在心勿效兒女子曹終身不悟也吾亡後必不得為此弊法若未能全依正道須順俗情從初七至終七任設七僧齋若隨齋須布施宜以吾緣身衣物充不得輒用餘財為無益之枉事亦不得妄出私物徇追福之虛談道士者本以玄牝為宗初無趨競之教而無識者慕僧家之有利約佛教而為業敬尋老君之説亦無過齋之文抑同僧例失之彌遠汝等勿拘鄙俗輒屈於家汝等身沒之後亦教子孫依吾此法云十七年重贈崇太子太保崇長子彝開元初光祿少卿次子異坊州刺史少子奕少而修謹開元末為禮部侍郎尚書右丞天寶元年右相牛仙客薨彝男閎為侍御史仙客判官見仙客疾亟逼為仙客表請以奕及兵部侍郎盧奐為宰相代己其妻因中使奏之玄宗聞而怒之閎決死奕出為永陽太守奐為臨淄太守玄孫合登進士第授武功尉遷監察御史位終給事中宋璟邢州南和人其先自廣平徙焉後魏吏部尚書辨七代孫也父玄撫以璟貴贈邢州刺史璟少耿介有大節博學工於文翰弱冠舉進士纍轉鳳閣舍人當官正色則天甚重之長安中幸臣張易之誣構御史大夫魏元忠有不順之言引鳳閣舍人張説令證之説將入於御前對覆惶惑迫懼璟謂曰名義至重神道難欺必不可黨邪陷正以求苟免若緣犯顏流貶芬芳多矣或至不測吾必叩閣救子將與子同死努力萬代瞻仰在此舉也説感其言及入乃保明元忠竟得免死璟尋遷左御史臺中丞張易之與弟昌宗縱恣益橫傾朝附之昌宗私引相工李弘泰觀占吉凶言涉不順為飛書所告璟廷奏請窮究其狀則天曰易之等已自奏聞不可加罪璟曰易之等事露自陳情在難恕且謀反大逆無容首免請勒就御史臺勘當以明國法易之等久蒙驅使分外承恩臣必知言出禍從然義激於心雖死不恨則天不悅內史楊再思恐忤旨遽宣敕令璟出璟曰天顏咫尺親奉德音不煩宰臣擅宣王命則天意稍解乃收易之等就臺將加鞫問俄有特敕原之仍令易之等詣璟辭謝璟拒而不見曰公事當公言之若私見則法無私也璟嘗侍宴朝堂時易之兄弟皆為列卿位三品璟本階六品在下座易之素畏璟妄悅其意虛位揖璟曰公第一人何乃下座璟曰才劣品卑張卿以為第一人何也當時朝列皆以二張內寵不名官呼易之為五郎昌宗為六郎天官侍郎鄭善果謂璟曰中丞奈何呼五郎為卿曰以官言之正當為卿若以親故當為張五足下非易之家奴何郎之有鄭善果一何懦哉其剛正皆此類也自是易之等常欲因事傷之則天察其情竟以獲免神龍元年遷吏部侍郎中宗嘉璟正直仍令兼諫議大夫內供奉仗下後言朝廷得失尋拜黃門侍郎時武三思恃寵執權嘗請託於璟璟正色謂之曰當今復子明辟王宜以侯就第何得尚干朝政王獨不見産祿之事乎俄有京兆人韋月將上書訟三思潛通宮掖將為禍患之漸三思諷有司奏月將大逆不道中宗特令誅之璟執奏請按其罪狀然後申明典憲月將竟免極刑配流嶺南而死中宗幸西京令璟權檢校並州長史未行又帶本官檢校貝州刺史時河北頻遭水潦百姓飢餒三思封邑在貝州專使徵其租賦璟又拒而不與由是為三思所擠又歷杭相二州刺史在官清嚴人吏莫有犯者中宗晏駕拜洛州長史睿宗踐祚遷吏部尚書同中書門下三品玄宗在春宮又兼右庶子加銀青光祿大夫先是外戚及諸公主干預朝政請託滋甚崔湜鄭愔相次典選為權門所制九流失預用兩年員闕注擬不足更置比冬選人大為士庶所歎至是璟與侍郎李乂盧從願等大革前弊取捨平允銓綜有時太平公主謀不利於玄宗嘗於光範門內乘輦伺執政以諷之衆皆失色璟昌言曰東宮有大功於天下真宗廟社稷之主安得有異議乃與姚崇同奏請令公主就東都玄宗懼抗表請加罪於璟等乃貶璟為楚州刺史無幾歷魏兗冀三州刺史河北按察使遷幽州都督兼御史大夫尋拜國子祭酒兼東都留守歲餘轉京兆尹復拜御史大夫坐事出為睦州刺史轉廣州都督仍為五府經略使廣州舊俗皆以竹茅為屋屢有火災璟教人燒瓦改造店肆自是無復延燒之患人皆懷惠立頌以紀其政開元初徵拜刑部尚書四年遷吏部尚書兼黃門監明年官名改易為侍中纍封廣平郡公其秋駕幸東都次永寧之崤谷馳道隘狹車騎停擁河南尹李朝隱知頓使王怡並失於部伍上令黜其官爵璟入奏曰陛下富有春秋方事巡狩一以墊隘致罪二臣竊恐將來人受艱弊於是遽令捨之璟曰陛下責之以臣言免之是過歸於上而恩由於下請且使待罪於朝然後詔復其職則進退得其度矣上深善之俄又令璟與中書侍郎蘇頲為皇子制名及封邑並公主等邑號璟等奏曰王子將封三十餘國周之麟趾漢之犬牙彼何足云於斯為盛竊以郯郟王等傍有古邑字臣等以類推擇謹件三十國名又王子先有名者皆上有嗣字又公主邑號亦選擇三十美名皆文不害意言足定體又令臣等別撰一佳名及一美邑號者七子均養百王至仁今若同等別封或緣母寵子愛骨肉之際人所難言天地之中典有常度昔袁盎降慎夫人之席文帝竟納之慎夫人亦不以為嫌美其得久長之計臣等故同進更不別封上彰覆載無偏之德上稱歎之七年開府儀同三司王皎卒及將築墳皎子駙馬都尉守一請同昭成皇后父竇孝諶故事其墳高五丈一尺璟及蘇頲請一依禮式上初從之翌日又令準孝諶舊例璟等上言曰夫儉德之恭侈惡之大高墳乃昔賢所誡厚葬實君子所非古者墓而不墳蓋此道也凡人子於哀送之際則不以禮制為思故周孔設齊斬緦免之差衣衾棺槨之度賢者俯就私懷不果且蒼梧之野驪山之徒善惡分區圖史所載衆人皆務奢靡而獨能革之斯所謂至孝要道也中宮若以為言則此理固可敦諭在外或云竇太尉墳甚高取則不遠者縱令往日無極言其事偶行令出一時故非常式又貞觀中文德皇后嫁所生女長樂公主奏請儀注加於長公主魏徵諫云皇帝之姑姊為長公主皇帝之女為公主既有長字合高於公主若加於長公主事甚不可引漢明故事云羣臣欲封皇子為王帝曰朕子豈敢與先帝子等時太宗嘉納之文德皇后奏降中使致謝於徵此則乾坤輔佐之間綽有餘裕豈若韋庶人父追加王位擅作酆陵禍不旋踵為天下笑則犯顏逆耳阿意順旨不可同日而言也況令之所載預作紀綱情既無窮故為之制度不因人以搖動不變法以愛憎頃謂金科玉條蓋以此也比來蕃夷等輩及城市間人遞以奢靡相高不將禮儀為意今以后父之寵開府之榮金穴玉衣之資不憂少物高墳大寢之役不畏無人百事皆出於官一朝亦可以就而臣等區區不已以聞諒欲成朝廷之政崇國母之德化浹寰區聲光竹素倘中宮情不可奪陛下不能苦違即準一品合陪陵葬者墳高三丈已上四丈已下降敕將同陪陵之例即極是高下得宜上謂璟等曰朕每事常欲正身以成綱紀至於妻子情豈有私然人所難言亦在於此卿等乃能再三堅執成朕美事足使萬代之後光揚我史策乃遣使賫綵絹四百匹分賜之先是朝集使每至春將還多有改轉率以為常璟奏請一切勒還絶其僥求之路又禁斷惡錢發使分道檢括銷毀之頗招士庶所怨俄授璟開府儀同三司罷知政事明年京兆人權梁山構逆伏誅制河南尹王怡馳傳往長安窮其枝黨怡禁繫極衆久之未能決斷乃詔璟兼京兆留守並按覆其獄璟至惟罪元謀數人其餘緣梁山詐稱婚禮因假借得罪及脅從者盡奏原之十二年駕又東巡璟復為留守上臨發謂璟曰卿國之元老為朕股肱耳目今將巡洛邑為別歷時所有嘉謨嘉猷宜相告也璟因極言得失特賜綵絹等仍手制曰所進之言書之座右出入觀省以誡終身其見重如此俄又兼吏部尚書十七年遷尚書右丞相與張説源乾曜同日拜官敕太官設饌太常奏樂於尚書都省大會百僚玄宗賦詩褒述自寫與之二十年以年老上表曰臣聞力不足者老則更衰心無主者疾而尤廢臣昔聞其語今驗諸身況且兼之何能為也臣自拔迹幽介欽屬盛明才不逮人藝非經國復以久承驅策歷參試用命偶時來榮因歲積遂使再升台座三入冢司進階開府增封本郡所更中外已紊彝章逮居端揆左叨名職何者丞相官師之長任重昔時愚臣衰朽之餘用慚他日位則愈盛人則浸微盡知其然何居而可頃僶俯從政蒼黃不言實懷覆載之德冀竭涓塵之效今積羸成憊沈錮莫瘳耳目更昏手足多廢顧惟殞越寧遂宿心安可以苟徇大名仍尸重祿且留章綬不上闕庭儀刑此乖禮法何設伏惟陛下審能以授為官而擇察臣之懇詞矜臣之不逮使罷歸私第養疾衡門上弭官謗下知死所則歸全之望獲在愚臣養老之恩成於聖代日暮途遠天高聽卑瞻望軒墀伏深感戀謹奉表陳乞以聞手敕許之仍令全給祿俸璟乃退歸東都私第屏絶人事以就醫藥二十二年駕幸東都璟於路左迎謁上遣榮王親勞問之自是頻遣使送藥餌二十五年薨年七十五贈太尉諡曰文貞子升天寶初太僕少卿次尚漢東太守次渾與右相李林甫善引為諫議大夫平原太守御史中丞東京採訪使次恕都官郎中劍南採訪判官依倚權勢頗為貪暴渾在平原重徵一年庸調作東畿採訪使又使河南尉楊朝宗影娶妻鄭氏鄭氏即薛稷外孫姊為宗婦孀居有色渾有妻使朝宗聘而渾納之奏朝宗為赤尉恕在劍南有雒縣令崔圭恕之表兄妻美恕誘而私之而貶圭官又養刺客李晏至九載並為人所發贓私各數萬貫林甫奏稱璟子渾就東京臺推恕就本使劍南推皆有實狀渾流嶺南高要郡恕流海康郡尚其載又為人訟其贓貶臨海長史其子華衡居官皆坐贓相次流貶其後渾會赦量移至東陽郡下請託過求及役使人吏求其資課人不堪其弊訟之配流潯江郡然兄弟盡善飲謔俳優雜戲衡最粗險廣平之風教無復存矣廣德後渾除太子諭德為物議薄之乃留寓於江嶺卒史臣曰履艱危則易見良臣處平定則難彰賢相故房杜預創業之功不可儔匹而姚宋經武韋二后政亂刑淫頗涉履於中克全聲迹抑無愧焉贊曰姚宋入用刑政多端為政匪易防刑益難諫諍以猛施張用寬不有其道將何以安
