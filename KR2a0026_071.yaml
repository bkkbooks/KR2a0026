body:
  text: 舊唐書卷六十七列傳第十七李靖客師令問彥芳李績孫敬業李靖本名藥師雍州三原人也祖崇義後魏殷州刺史永康公父詮隋趙郡守靖姿貌瓌偉少有文武材略每謂所親曰大丈夫若遇主逢時必當立功立事以取富貴其舅韓擒虎號為名將每與論兵未嘗不稱善撫之曰可與論孫吳之術者惟斯人矣初仕隋為長安縣功曹後歷駕部員外郎左僕射楊素吏部尚書牛弘皆善之素嘗拊其牀謂靖曰卿終當坐此大業末纍除馬邑郡丞會高祖擊突厥於塞外靖察高祖知有四方之志因自鎖上變將詣江都至長安道塞不通而止高祖克京城執靖將斬之靖大呼曰公起義兵本為天下除暴亂不欲就大事而以私怨斬壯士乎高祖壯其言太宗又固請遂捨之太宗尋召入幕府武德二年從討王世充以功授開府時蕭銑據荊州遣靖安輯之輕騎至金州遇蠻賊數萬屯聚山谷廬江王瑗討之數為所敗靖與瑗設謀擊之多所克獲既至硤州阻蕭銑久不得進高祖怒其遲留陰敕硤州都督許紹斬之紹惜其才為之請命於是獲免會開州蠻首冉肇則反率衆寇夔州趙郡王孝恭與戰不利靖率兵八百襲破其營後又要險設伏臨陳斬肇則俘獲五千餘人高祖甚悅謂公卿曰朕聞使功不如使過李靖果展其效因降璽書勞曰卿竭誠盡力功效特彰遠覽至誠極以嘉賞勿憂富貴也又手敕靖曰既往不咎舊事吾久忘之矣四年靖又陳十策以圖蕭銑高祖從之授靖行軍總管兼攝孝恭行軍長史高祖以孝恭未更戎旅三軍之任一以委靖其年八月集兵於夔州銑以時屬秋潦江水泛漲三峽路險必謂靖不能進遂休兵不設備九月靖乃率師而進將下峽諸將皆請停兵以待水退靖曰兵貴神速機不可失今兵始集銑尚未知若乘水漲之勢倏忽至城下所謂疾雷不及掩耳此兵家上策縱彼知我倉卒徵兵無以應敵此必成擒也孝恭從之進兵至夷陵銑將文士弘率精兵數萬屯清江孝恭欲擊之靖曰士弘銑之健將士卒驍勇今新失荊門盡兵出戰此是救敗之師恐不可當也宜且泊南岸勿與爭鋒待其氣衰然後奮擊破之必矣孝恭不從留靖守營率師與賊合戰孝恭果敗奔於南岸賊委舟大掠人皆負重靖見其軍亂縱兵擊破之獲其舟艦四百餘艘斬首及溺死將萬人孝恭遣靖率輕兵五千為先鋒至江陵屯營於城下士弘既敗銑甚懼始徵兵於江南果不能至孝恭以大軍繼進靖又破其驍將楊君茂鄭文秀俘甲卒四千餘人更勒兵圍銑城明日銑遣使請降靖即入據其城號令嚴肅軍無私焉時諸將咸請孝恭云銑之將帥與官軍拒戰死者罪狀既重請籍沒其家以賞將士靖曰王者之師義存弔伐百姓既受驅逼拒戰豈其所願且犬吠非其主無容同叛逆之科此蒯通所以免大戮於漢祖也今新定荊郢宜弘寬大以慰遠近之心降而籍之恐非救焚拯溺之義但恐自此已南城鎮各堅守不下非計之善於是遂止江漢之域聞之莫不爭下以功授上柱國封永康縣公賜物二千五百段詔命檢校荊州刺史承制拜授乃度嶺至桂州遣人分道招撫其大首領馮盎李光度寧真長等皆遣子弟來謁靖承制授其官爵凡所懷輯九十六州戶六十餘萬優詔勞勉授嶺南道撫慰大使檢校桂州總管六年輔公祏於丹陽反詔孝恭為元帥靖為副以討之李績任瓌張鎮州黃君漢等七總管並受節度師次舒州公祏遣將馮惠亮率舟師三萬屯當塗陳正通徐紹宗領步騎二萬屯青林山仍於梁山連鐵鎖以斷江路築却月城延袤十餘里與惠亮為掎角之勢孝恭集諸將會議皆云惠亮正通並握強兵為不戰之計城柵既固卒不可攻請直指丹陽掩其巢穴丹陽既破惠亮自降孝恭欲從其議靖曰公祏精鋭雖在水陸二軍然其自統之兵亦皆徑勇惠亮等城柵尚不可攻公祏既保石頭豈應易拔若我師至丹陽留停旬月進則公祏未平退則惠亮為患此便腹背受敵恐非萬全之計惠亮正通皆是百戰餘賊必不憚於野戰止為公祏立計令其持重但欲不戰以老我師今若攻其城柵乃是出其不意滅賊之機唯在此舉孝恭然之靖乃率黃君漢等先擊惠亮苦戰破之殺傷及溺死者萬餘人惠亮奔走靖率輕兵先至丹陽公祏大懼先遣偽將左遊仙領兵守會稽以為形援公祏擁兵東走以趨遊仙至吳郡與惠亮正通並相次擒獲江南悉平於是置東南道行臺拜靖行臺兵部尚書賜物千段奴婢百口馬百匹其年行臺廢又檢校揚州大都督府長史丹陽連罹兵寇百姓凋弊靖鎮撫之吳楚以安八年突厥寇太原以靖為行軍總管統江淮兵一萬與張瑾屯太谷時諸軍不利靖衆獨全尋檢校安州大都督高祖每云李靖是蕭銑輔公祏膏肓古之名將韓白衛霍豈能及也九年突厥莫賀咄設寇邊徵靖為靈州道行軍總管頡利可汗入涇陽靖率兵倍道趨豳州邀賊歸路既而與虜和親而罷太宗嗣位拜刑部尚書并録前後功賜實封四百戶貞觀二年以本官兼檢校中書令三年轉兵部尚書突厥諸部離叛朝廷將圖進取以靖為代州道行軍總管率驍騎三千自馬邑出其不意直趨惡陽嶺以逼之頡利可汗不虞於靖見官軍奄至於是大懼相謂曰唐兵若不傾國而來靖豈敢孤軍而至一日數驚靖候知之潛令間諜離其心腹其所親康蘇密來降四年靖進擊定襄破之獲隋齊王暕之子楊正道及煬帝蕭后送于京師可汗僅以身遁以功進封代國公賜物六百段及名馬寶器焉太宗嘗謂曰昔李陵提步卒五千不免身降胸奴尚得書名竹帛卿以三千輕騎深入虜庭克復定襄威振北狄古今所未有足報往年渭水之役自破定襄後頡利可汗大懼退保鐵山遣使入朝謝罪請舉國內附又以靖為定襄道行軍總管往迎頡利頡利雖外請朝謁而潛懷猶豫其年二月太宗遣鴻臚卿唐儉將軍安修仁慰諭靖揣知其意謂將軍張公謹曰詔使到彼虜必自寬遂選精騎一萬齎二十日糧引兵自白道襲之公謹曰詔許其降行人在彼未宜討擊靖曰此兵機也時不可失韓信所以破齊也如唐儉等輩何足可惜督軍疾進師至陰山遇其斥候千餘帳皆俘以隨軍頡利見使者大悅不虞官兵至也靖軍將逼其牙帳十五里虜始覺頡利畏威先走部衆因而潰散靖斬萬餘級俘男女十餘萬殺其妻隋義成公主頡利乘千里馬將走投吐谷渾西道行軍總管張寶相擒之以獻俄而突利可汗來奔遂復定襄常安之地斥土界自陰山北至於大漠太宗初聞靖破頡利大悅謂侍臣曰朕聞主憂臣辱主辱臣死往者國家草創太上皇以百姓之故稱臣於突厥朕未嘗不痛心疾首志滅胸奴坐不安席食不甘味今者暫動偏師無往不捷單于款塞恥其雪乎於是大赦天下酺五日御史大夫溫彥博害其功譖靖軍無綱紀致令虜中奇寶散於亂兵之手太宗大加責讓靖頓首謝久之太宗謂曰隋將史萬歲破達頭可汗有功不賞以罪致戮朕則不然當赦公之罪録公之勳詔加左光祿大夫賜絹千匹真食邑通前五百戶未幾太宗謂靖曰前有人讒公今朕意已悟公勿以為懷賜絹二千匹拜尚書右僕射靖性沉厚每與時宰參議恂恂然似不能言八年詔為畿內道大使伺察風俗尋以足疾上表乞骸骨言甚懇至太宗遣中書侍郎岑文本謂曰朕觀自古已來身居富貴能知止足者甚少不問愚智莫能自知才雖不堪強欲居職縱有疾病猶自勉強公能識達大體深足可嘉朕今非直成公雅志欲以公為一代楷模乃下優詔加授特進聽在第攝養賜物千段尚乘馬兩匹祿賜國官府佐並依舊給患若小瘳每三兩日至門下中書平章政事九年正月賜靖靈壽杖助足疾也未幾吐谷渾寇邊太宗顧謂侍臣曰得李靖為帥豈非善也靖乃見房玄齡曰靖雖年老固堪一行太宗大悅即以靖為西海道行軍大總管統兵部尚書侯君集刑部尚書任城王道宗涼州都督李大亮右衛將軍李道彥利州刺史高甑生等五總管征之九年軍次伏俟城吐谷渾燒去野草以餧我師退保大非川諸將咸言春草未生馬已羸瘦不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數十合殺傷甚衆大破其國吐谷渾之衆遂殺其可汗來降靖又立大寧王慕容順而還初利州刺史高甑生為鹽澤道總管以後軍期靖薄責之甑生因有憾於靖及是與廣州都督府長史唐奉義告靖謀反太宗命法官按其事甑生等竟以誣罔得罪靖乃闔門自守杜絶賓客雖親戚不得妄進十一年改封衛國公授濮州刺史仍令代襲例竟不行十四年靖妻卒有詔墳塋制度依漢衛霍故事築闕象突厥內鐵山吐谷渾內積石山形以旌殊績十七年詔圖畫靖及趙郡王孝恭等二十四人於凌煙閣十八年帝幸其第問疾仍賜絹五百匹進位衛國公開府儀同三司太宗將伐遼東召靖入閣賜坐御前謂曰公南平吳會北清沙漠西定慕容唯東有高麗未服公意如何對曰臣往者憑藉天威薄展微效今殘年朽骨唯擬此行陛下若不棄老臣病期瘳矣太宗愍其羸老不許二十三年薨于家年七十九册贈司徒并州都督給班劍四十人羽葆鼓吹陪葬昭陵諡曰景武子德謇嗣官至將作少匠靖弟客師貞觀中官至右武衛將軍以戰功纍封丹陽郡公永徽初以年老致仕性好馳獵四時從禽無暫止息有別業在昆明池南自京城之外西際灃水鳥獸皆識之每出則鳥鵲隨逐而噪野人謂之鳥賊總章中卒年九十餘客師孫令問玄宗在藩時與令問發狎及即位以協贊功纍遷至殿中少監先天中預誅竇懷貞等功封宋國公實封五百戶令問固辭實封詔不許開元中轉殿中監左散騎常侍知尚食事令問雖特承恩寵未嘗干預時政深為物論所稱然厚於自奉食饌豐侈廣畜芻豢躬臨宰殺時方奉佛其篤信之士或譏之令問曰此物畜生與果菜何異胡為強生分別不亦遠於道乎略不以恩眄自恃間適郊野從禽自娛十五年涼州都督王君奏回紇部落叛令問坐與連姻左授撫州別駕尋卒大和中令問孫彥芳任鳳翔府司録參軍詣闕進高祖太宗所賜衛國公靖官告敕書手詔等十餘卷內四卷太宗文皇帝筆迹文宗寶惜不能釋手其佩筆尚堪書金裝木匣製作精巧帝並留禁中令書工模寫本還之賜芳絹二百匹衣服靴笏以酬之李績曹州離狐人也隋末徙居滑州之衛南本姓徐氏名世績永徽中以犯太宗諱單名績焉家多僮僕積粟數千鍾與其父蓋皆好惠施拯濟貧乏不問親疏大業末韋城人翟讓聚衆為盜績往從之時年十七謂讓曰今此土地是公及績鄉壤人多相識不宜自相侵掠且宋鄭兩郡地管御河商旅往還船乘不絶就彼邀截足以自相資助讓然之於是劫公私船取物兵衆大振隋遣齊郡通守張須率師二萬討之績與頻戰竟斬須於陳初李密亡命在雍丘浚儀人王伯當匿於野伯當共績説翟讓奉密為主隋令王世充討密績以奇計敗世充於洛水之上密拜績為東海郡公時河南山東大水死者將半隋帝令飢人就食黎陽開倉賑給時政教已紊倉司不時賑給死者日數萬人績言於密曰天下大亂本是為飢今若得黎陽一倉大事濟矣密乃遣績領麾下五千人自原武濟河掩襲即日克之開倉恣食一旬之間勝兵二十萬餘經歲餘宇文化及於江都弒逆擁兵北上直指東郡時越王侗即位於東京赦密之罪拜為太尉封魏國公授績右武候大將軍命討化及密遣績守倉城績於城外掘深溝以固守化及設攻具四面攻倉阻不得至城下績於中為地道出兵擊之大敗而去武德二年密為王世充所破擁衆歸朝其舊境東至于海南至于江西至汝州北至魏郡績並據之未有所屬謂長史郭孝恪曰魏公既歸大唐今此人衆土地魏公所有也吾若上表獻之即是利主之敗自為己功以邀富貴吾所恥也今宜具録州縣名數及軍人戶口總啓魏公聽公自獻此則魏公之功也乃遣使啓密使人初至高祖聞其無表惟有啓與密甚怪之使者以績意聞奏高祖大喜曰徐世績感德推功實純臣也詔授黎陽總管上柱國萊國公尋加右武候大將軍改封曹國公賜姓李氏賜良田五十頃甲第一區封其父蓋為濟陰王蓋固辭王爵乃封舒國公授散騎常侍陵州刺史令績總統河南山東之兵以拒王世充及李密反叛伏誅高祖以績舊經事密遣使報其反狀績表請收葬詔許之績服衰絰與舊僚吏將士葬密於黎山之南墳高七仞釋服而散朝野義之尋而竇建德擒化及於魏縣復進軍攻績力屈降之建德收其父從軍為質令績復守黎陽三年自拔歸京師四年從太宗伐王世充於東都纍戰大捷又東略地至武牢偽鄭州司兵沈悅請翻武牢績夜潛兵應接克之擒其偽刺史荊王行本又從太宗平竇建德降王世充振旅而還論功行賞太宗為上將績為下將與太宗俱服金甲乘戎輅告捷于太廟其父自洺州與裴矩入朝高祖見之大喜復其官爵績又從太宗破劉黑闥徐圓朗纍遷左監門大將軍圓朗重據兗州反授績河南大總管以討之尋獲圓朗斬首以獻兗州平七年詔與趙郡王孝恭討輔公祏孝恭領舟師巡江而下績領步卒一萬渡淮拔其壽陽至硤石公祏之將陳正通率兵十萬屯於梁山又遣其大將馮惠亮帥水軍十萬鎖連大艦以斷江路仍於江西結壘分守水陸以禦王師績攻其壘尋克之惠亮單艓而遁績乘勝逼正通大潰以十餘騎奔於丹陽公祏棄城夜遁績縱騎追斬之於武康江南悉定八年突厥寇並州命績為行軍總管擊之於太谷走之太宗即位拜並州都督賜實封九百戶貞觀三年為通漢道行軍總管至雲中與突厥頡利可汗兵會大戰於白道突厥敗屯營於磧口遣使請和詔鴻臚卿唐儉往赦之績時與定襄道大總管李靖軍會相與議曰頡利雖敗人衆尚多若走渡磧保於九姓道遙阻深追則難及今詔使唐儉至彼其必弛備我等隨後襲之此不戰而平賊矣靖扼腕喜曰公之此言乃韓信滅田橫之策也於是定計靖將兵逼夜而發績勒兵繼進靖軍既至賊營大潰頡利與萬餘人欲走渡磧績屯軍於磧口頡利至不得渡磧其大酋長率其部落並降於績虜五萬餘口而還時高宗為晉王遙領並州大都督授績光祿大夫行並州大都督府長史父憂解尋起復舊職十一年改封英國公代襲蘄州刺史時並不就國復以本官遙領太子左衛率績在並州凡十六年令行禁止號為稱職太宗謂侍臣曰隋煬帝不能精選賢良安撫邊境惟解築長城以備突厥情識之惑一至於此朕今委任李世績於並州遂使突厥畏威遁走塞垣安靜豈不勝遠築長城耶十五年徵拜兵部尚書未赴京會薛延遣其子大度設帥騎八萬南侵李思摩部落命績為朔州行軍總管率輕騎三千追及延於青山擊大破之斬其名王一人俘獲首領虜五萬餘計以功封一子為縣公績時遇暴疾驗方云鬚灰可以療之太宗乃自翦鬚為其和藥績頓首見血泣以懇謝帝曰吾為社稷計耳不煩深謝十七年高宗為皇太子轉績太子詹事兼左衛率加位特進同中書門下三品太宗謂曰我兒新登儲二卿舊長史今以宮事相委故有此授雖屈階資可勿怪也太宗又嘗間宴顧績曰朕將屬以幼孤思之無越卿者公往不遺於李密今豈負於朕哉績雪涕致辭因噬指流血俄而沉醉乃解御服覆之其見委信如此十八年太宗將親征高麗授績遼東道行軍大總管攻破蓋牟遼東白崖等數城又從太宗摧殄駐蹕陳以功封一子為郡公二十年延部落擾亂詔績將二百騎便發突厥兵討擊至烏德鞬山大戰破之其大首領梯真達官率衆來降其可汗咄摩支南竄於荒谷遣通事舍人蕭嗣業招慰部領送於京師磧北悉定二十二年轉太常卿仍同中書門下三品旬日復除太子詹事二十三年太宗寢疾謂高宗曰汝於李績無恩我今將責出之我死後汝當授以僕射即荷汝恩必致其死力乃出為疊州都督高宗即位其月召拜洛州刺史尋加開府儀同三司令同中書門下參掌機密是歲册拜尚書左僕射永徽元年抗表求解僕射仍令以開府儀同三司依舊知政事四年册拜司空初貞觀中太宗以勳庸特著嘗圖其形於凌煙閣至是帝又命寫形焉仍親為之序顯慶三年從幸東都在路遇疾帝親臨問麟德初東封泰山詔績為封禪大使乃從駕次滑州其姊早寡居績舊閭皇后親自臨問賜以衣服仍封為東平郡君績又墜馬傷足上親降問以所乘賜之乾封元年高麗莫離支男生為其弟男建所逐保於國內城遣子獻誠詣闕乞師總章元年命績為遼東道行軍總管率兵二萬略地至鴨緑水賊遣其弟來拒戰績縱兵擊敗之追奔二百里至於平壤城男建閉門不敢出賊中諸城駭懼多拔人衆遁走降款者相繼績又引兵圍平壤遼東道副大總管劉仁軌郝處俊將軍薛仁貴並會於平壤掎角圍之經月餘克其城虜其王高藏及男建男産裂其諸城並為州縣振旅而旋令績便道以高藏及男建獻於昭陵禮畢備軍容入京城獻太廟二年加太子太師增食實封通前一千一百戶其年寢疾詔以績弟晉州刺史弼為司衛正卿使得視疾尋薨年七十六帝為之舉哀輟朝七日贈太尉揚州大都督諡曰貞武給東園祕器陪葬昭陵令司平太常伯楊昉攝同文正卿監護及葬日帝幸未央古城登樓臨送望柳車慟哭並為設祭皇太子亦從駕臨送哀慟悲感左右詔百官送至故城西北所築墳一準衛霍故事象陰山鐵山及烏德鞬山以旌破突厥薛延之功光宅元年詔績配享高宗廟庭績前後戰勝所得金帛皆散之於將士初得黎陽倉就食者數十萬人魏徵高季輔杜正倫郭孝恪皆客遊其所一見於衆人中即加禮敬引之臥內談謔忘倦及平武牢獲偽鄭州長史戴胄知其行能尋釋放竟推薦咸至顯達當時稱其有知人之鑒又初平王世充獲其故人單雄信依例處死績表稱其武藝絶倫若收之於合死之中必大感恩堪為國家盡命請以官爵贖之高祖不許臨將就戮績對之號慟割股肉以啖之曰生死永訣此肉同歸於土矣仍收養其子每行軍用師頗任籌算臨敵應變動合事機與人圖計識其臧否聞其片善扼腕而從事捷之日多推功於下以是人皆為用所向多克捷洎績之死聞者莫不悽愴與弟弼特存友愛閨門之內肅若嚴君自遇疾高宗及皇太子送藥即取服之家中召醫巫皆不許入門子弟固以藥進績謂曰我山東一田夫耳攀附明主濫居富貴位極三台年將八十豈非命乎修短必是有期寧容浪就醫人求活竟拒而不進忽謂弼曰我似得小差可置酒以申宴樂於是堂上奏女妓簷下列子孫宴罷謂弼曰我自量必死欲與汝一別耳恐汝悲哭誑言似差可未須啼泣聽我約束我見房玄齡杜如晦高季輔辛苦作得門戶亦望垂裕後昆並遭癡兒破家蕩盡我有如許豚犬將以付汝汝可防察有操行不倫交遊非類急即打殺然後奏知又見人多埋金玉亦不須爾惟以布裝露車載我棺柩棺中斂以常服惟加朝服一副死倘有知望著此奉見先帝明器惟作馬五六匹下帳用幔皂為頂白紗為裙其中著十箇木人示依古禮芻靈之義此外一物不用姬媼已下有兒女而願住自養者聽之餘並放出事畢汝即移入我堂撫恤小弱違我言者同於戮尸此後略不復語弼等遵行遺言績少弟感幼有志操李密之敗也陷於王世充世充逼令以書召績感曰家兄立身不虧名節今已事主君臣分定決不以感造次改圖卒不肯世充怒遂害焉時年十五績長子震顯慶初官至梓州刺史先績卒績孫敬業高宗崩則天太后臨朝既而廢帝為廬陵王立相王為皇帝而政由天后諸武皆當權任人情憤怨時給事中唐之奇貶授括蒼令長安主簿駱賓王貶授臨海丞詹事司直杜求仁黝縣丞敬業坐事左授柳州司馬其弟盩厔令敬猷亦坐纍左遷俱在揚州敬業用前盩厔尉魏思溫謀據揚州嗣聖元年七月敬業遣其黨監察御史薛璋先求使江都又令雍州人韋超詣璋告變云揚州長史陳敬之與唐之奇謀逆璋乃收敬之繫獄居數日敬業矯制殺敬之自稱揚州司馬詐言高州首領馮子猷叛逆奉密詔募兵進討是日開府庫令士曹參軍李宗臣解繫囚及丁役工匠得數百人皆授之以甲録事參軍孫處行拒命敬業斬之以徇遂據揚州鳩聚民衆以匡復廬陵為辭乃開三府一曰匡復府二曰英公府三曰揚州大都督府敬業自稱匡復府上將領揚州大都督以杜求仁唐之奇駱賓王為府屬餘皆偽署職位旬日之間勝兵有十餘萬仍移檄諸郡縣曰偽臨朝武氏者人非溫順地實寒微昔充太宗下陳嘗以更衣入侍洎乎晚節穢亂春宮密隱先帝之私陰圖後庭之嬖入門見嫉蛾眉不肯讓人掩袖工讒狐媚偏能惑主踐元后於翬翟陷吾君於聚麀加以虺蜴為心豺狼成性近狎邪僻殘害忠良殺姊屠兄弒君鴆母人神之所同嫉天地之所不容猶復包藏禍心窺竊神器君之愛子幽之於別宮賊之宗盟委之以重任嗚呼霍子孟之不作朱虛侯之已亡燕啄皇孫知漢祚之將盡龍漦帝后識夏廷之遽衰敬業皇唐舊臣公侯冢胤奉先君之成業荷本朝之舊恩宋微子之興悲良有以也袁君山之流涕豈徒然哉是用氣憤風雲志安社稷因天下之失望順宇內之推心爰舉義旗誓清妖孽南連百越北盡三河鐵騎成羣玉舳相接海陵紅粟倉儲之積靡窮江浦黃旗匡復之功何遠班聲動而北風起劍氣衝而南斗平喑嗚則山嶽崩頽叱吒則風雲變色以此制敵何敵不摧以此圖功何功不克公等或家傳漢爵或地協周親或膺重寄於爪牙或受顧命於宣室言猶在耳忠豈忘心一抔之土未乾六尺之孤何託倘能轉禍為福送往事居共立勤王之師無廢舊君之命凡諸爵賞同裂山河請看今日之域中竟是誰家之天下則天命左玉鈐衛大將軍李孝逸將兵三十萬討之追削敬業祖父官爵剖墳棺復本姓徐氏初敬業兵集圖其所向薛璋曰金陵王氣猶在大江設險可以自固且取常潤等州以為霸基然後治兵北渡魏思溫曰兵貴神速但宜早渡淮而北招合山東豪傑乘其未集直取東都據關決戰此上策也敬業不從十月率衆渡江攻拔潤州殺刺史李思文先是太子賢為天后所廢死於巴州敬業乃求狀貌似賢者置於城中奉之為主云賢本不死孝逸軍渡淮至楚州敬業之衆狼狽還江都屯兵高郵以拒之頻戰大敗孝逸乘勝追躡敬業奔至揚州與唐之奇杜求仁等乘小舸將入海投高麗追兵及皆捕獲之初敬業傳檄至京師則天讀之微哂至一抔之土未乾遽問侍臣曰此語誰為之或對曰駱賓王之辭也則天曰宰相之過安失此人中宗返正詔曰故司空績往因敬業毀廢墳塋朕追想元勳永懷佐命昔竇憲干紀無纍安豐之祠霍禹亂常猶全博陸之祀罪不相及國之通典宜特垂恩禮令所司速為起墳所有官爵並宜追復績諸子孫坐敬業誅殺靡有遺胤偶脫禍者皆竄迹胡越貞元十七年吐蕃陷麟州驅掠民畜而去至鹽州西橫槽烽蕃將號徐舍人者環集漢俘於呼延州謂僧延素曰師勿甚懼豫本漢人司空英國公五代孫也屬武太后喪王室吾祖建義不果子孫流落絶域今三代矣雖代居職任掌握兵要然思本之心無忘於國但族屬已多無由自拔耳此地蕃漢交境放師還鄉數千百人解縛而遣之史臣曰近代稱為名將者英衛二公誠煙閣之最英公振彭黥之迹自拔草莽常能以義藩身與物無忤遂得功名始終賢哉垂命之誡敬業不蹈貽謀至於覆族悲夫衛公將家子綽有渭陽之風臨戎出師然威斷位重能避功成益謙銘之鼎鍾何慚耿鄧美哉贊曰功以懋賞震主則危辭祿避位除猜破疑功定華夷志懷忠義白首平戎賢哉英衛
