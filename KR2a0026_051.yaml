  text: 舊唐書卷四十七志第二十七經籍下丙部子録十七家七百五十三部書一萬五千六百三十七卷儒家類一道家類二法家類三名家類四墨家類五縱橫家類六雜家類七農家類八小說類九天文類十曆算類十一兵書類十二五行類十三雜藝術類十四事類十五經脈類十六醫術類十七曾子二卷曾參撰晏子春秋七卷晏嬰撰子思子八卷孔伋撰公孫尼子一卷公孫尼撰孟子十四卷孟軻撰趙岐注又七卷劉熙注又七卷鄭玄注又七卷綦毋邃注孫卿子十二卷荀況撰董子二卷董無心撰魯連子五卷魯仲連撰新語二卷陸賈撰賈子九卷賈誼撰鹽鐵論十卷桓寬撰新序三十卷劉向撰說苑三十卷劉向撰楊子法言六卷楊雄撰又十卷宋衷注又十三卷李軌注楊子太玄經十二卷楊雄撰陸績注又十四卷虞翻注又十二卷范望注又一十卷蔡文邵注桓子新論十七卷桓談撰潛夫論十卷王符撰申鑒五卷荀悅撰魏子三卷魏朗注典論五卷魏文帝撰徐氏中論六卷徐幹撰去伐論集三卷王粲撰杜氏體論四卷杜恕撰顧子新語五卷顧談撰通語十卷文禮撰殷興續集誡二卷諸葛亮撰典訓十卷陸景撰譙子法訓八卷譙周撰古今通論三卷王嬰撰周生烈子五卷周生烈志譙子五教五卷譙周撰袁子正論二十卷袁準撰袁子正書二十五卷袁準撰孫氏成敗志三卷孫育撰新論十卷夏侯湛撰物理論十六卷楊泉撰太元經十四卷楊泉撰劉緝注新論十卷華談撰志林新書二十卷虞喜撰後林新書十卷虞喜撰顧子義訓十卷顧夷撰清化經十卷蔡洪撰正言十卷干寶撰要覽五卷呂竦撰立言十卷干寶撰正覽六卷周捨撰缺文十卷陸澄撰魯史欹器圖一卷劉徽撰誡林三卷綦毋氏撰家訓七卷顏之推撰典言四卷李若等撰墳典三十卷盧辨撰中說五卷王通撰讀書記三十二卷王邵撰正訓二十卷辛德源志太宗序志一卷太宗撰帝範四卷太宗撰賈行注天訓四卷高宗天皇大帝撰紫樞要録十卷大聖天后撰青宮記要三十卷天后撰少陽正範三十卷天后撰臣軌二卷天后撰百僚新誡四卷天后撰春宮要録十卷章懷太子撰君臣相發起事三卷章懷太子撰修身要録十卷章懷太子撰百里昌言二卷王滂撰崔子至言六卷崔靈童撰平臺百一寓言三卷張大素撰女誡一卷曹大家撰內訓二十卷辛德源王邵等撰女則要録十卷文德皇后撰鳳樓新誡二十卷張后撰右儒家二十八部凡七百七十六卷老子二卷老子撰老子二卷河上公注老子章句二卷安丘望之撰老子道德經指趣四卷安丘望之撰老子二卷湘注玄言新記道德二卷王弼注老子二卷鍾會注老子二卷羊祜注老子二卷程韶集注老子二卷王尚注老子二卷蜀才注老子二卷孫登注老子二卷袁真注老子二卷張憑注老子二卷鳩摩羅什注老子二卷釋惠嚴注老子四卷陶弘景注老子道德經品四卷梁曠注老子二卷樹鍾山注老子二卷傅奕注老子二卷楊上善注老子集注四卷張道相集注老子二卷辟閭仁諝注老子二卷成玄英注老子二卷李允願注老子二卷陳嗣古注老子二卷釋義盈注老子道德經集解四卷任真子注老子節解二卷老子指歸十四卷嚴遵志老子指歸十三卷馮廓撰老子道德經序訣二卷葛洪撰老子道德簡要義五卷玄景先生注太上玄元皇帝道德經二卷楊上器撰太上老君玄元皇帝聖紀十卷尹父操撰老子章門一卷老子玄旨八卷韓莊撰老子玄譜一卷劉道人撰老子道德論二卷何晏撰老子指例略二卷老子道德經義疏四卷顧歡撰老子解釋四卷羊祜撰老子義疏理綱一卷老子講疏六卷梁武帝撰老子私記十卷梁簡文帝撰老子講疏四卷老子義疏四卷孟智周撰老子述義十卷賈大隱撰老子道德指略論二卷楊上善撰道德經三卷略論三卷楊上善撰老子西升經一卷老子黃庭經一卷老子探真經一卷老君科律一卷老子宣時誡一卷老子入室經一卷老子華蓋觀天訣一卷老子消水經一卷老子神策百二十條經一卷莊子十卷崔撰注又十卷郭象注又二十卷向秀注又二十一卷司馬彪注莊子集解二十卷李頤集解又二十卷王玄古撰莊子十卷楊上善撰莊子講疏三十卷梁簡文撰莊子疏七卷南華仙人莊子論三十卷梁曠撰釋莊子論二卷李充撰南華真人道德論三卷莊子疏十卷王穆撰莊子音一卷王穆撰莊子文句義二十卷陸德明撰莊子古今正義十卷馮廓撰莊子疏十二卷成玄英撰文子十二卷鶡冠子三卷鶡冠子撰列子八卷列禦寇撰張湛注廣成子十二卷商洛公撰任子道論十卷任嘏撰渾輿經一卷姖威撰唐子十卷唐滂撰蘇子七卷蘇彥撰宣子二卷宣聘撰陸子十卷陸雲撰抱朴子內篇二十卷葛洪撰孫子十二卷孫綽撰顧道士論二卷顧谷撰幽求子三十卷杜夷撰符子三十卷符朗撰賀子十卷賀道養撰真誥十卷陶弘景撰無名子一卷張太衡撰養生要集十卷張湛撰無上祕要七十二卷玄書通義十卷張機撰道要三十卷登真隱訣二十五卷陶弘景撰同光子八卷劉無待撰侯儼注牟子二卷牟融撰淨住子二十卷蕭子良撰王融頌統略淨住子二卷釋道宣撰法苑十五卷釋僧祐撰內典博要三十卷虞孝景撰真言要集十卷釋賢明撰歷代三寶記三卷修多羅法門二十卷郭瑜撰集古今佛道論衡四卷釋道宣撰六趣論六卷楊上善撰十門辨惑論二卷釋復禮志經論纂要十卷駱子義撰通惑決疑録二卷釋道宣撰夷夏論二卷顧歡撰笑道論三卷甄鸞撰齊三教論七卷衛元嵩撰辨正論八卷釋法琳撰破邪論三卷釋法琳撰三教詮衡十卷楊上善撰甄正論三卷杜乂撰心鏡論十卷李思慎撰崇正論六卷釋彥琮撰右道家一百二十五部老子六十一家莊子十七家道釋諸說四十七家凡九百六十卷管子十八卷管夷吾撰商子五