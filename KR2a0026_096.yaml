body:
  text: 舊唐書卷九十二列傳第四十二魏元忠韋安石子陟斌從父兄子抗從祖兄子巨源趙彥昭附蕭至忠宗楚客紀處訥附魏元忠宋州宋城人也本名真宰以避則天母號改焉初為太學生志氣倜儻不以舉薦為意纍年不調時有左史盩厔人江融撰九州設險圖備載古今用兵成敗之事元忠就傳其術儀鳳中吐蕃頻犯塞元忠赴洛陽上封事言命將用兵之工拙曰臣聞理天下之柄二事焉文與武也然則文武之道雖有二門至於制勝御人其歸一揆方今王略遐宣皇威遠振建禮樂而陶士庶訓軍旅而懾生靈然論武者以弓馬為先而不稽之以權略談文者以篇章為首而不問之以經綸而奔競相因遂成浮俗臣嘗讀魏晉史每鄙何晏王衍終日談空近觀齊梁書才士亦復不少並何益於理亂哉從此而言則陸士衡著辨亡論而不救河橋之敗養由基射能穿札而不止鄢陵之奔斷可知矣昔趙岐撰禦寇之論山濤陳用兵之本皆坐運帷幄暗合孫吳宣尼稱有德者必有言仁者必有勇則何平叔王夷甫豈得同日而言哉臣聞才生於代代實須才何代而不生才何才而不生代故物有不求未有無物之歲士有不用未有無士之時夫有志之士在富貴之與貧賤皆思立於功名冀傳芳於竹帛故班超投筆而歎祖逖擊楫而誓此皆有其才而申其用矣且知己難逢英哲罕遇士之懷琬琰以就埃塵抱棟梁而困溝壑者則悠悠之流直覩此士之貧賤安知此士之方略哉故漢拜韓信舉軍驚笑蜀用魏延羣臣觖望嗟乎富貴者易為善貧賤者難為功至於此也亦有位處立功之際而不展其志略身為時主所知竟不能盡其才用則貧賤之士焉足道哉漢文帝時魏尚李廣並身任邊將位為郡守文帝不知魏尚之賢而囚之不知李廣之才而不能用之常歎李廣恨生不逢時令當高祖日萬戶侯豈足道哉夫以李廣才氣天下無雙胸奴畏之號為飛將爾時胡騎憑凌足伸其用文帝不能大任反歎其生不逢時近不知魏尚李廣之賢而乃遠想廉頗李牧故馮唐曰雖有頗牧而不能用近之矣從此言之疏斥賈誼復何怪哉此則身為時主所知竟不能盡其才用昔羊祜獻計平吳賈充荀勗沮其策祜歎曰天下不如意恆十居七八緣荀賈不同竟不大舉此則位處立功之際而不得展其志略而布衣韋帶之人懷一奇抱一策上書闕下朝進而望夕召何可得哉臣請歷訪內外文武職事五品已上得不有智計如羊祜武藝如李廣在用與不用之間不得騁其才略伏願降寬大之詔使各言其志無令汲黯直氣臥死於淮陽仲舒大才位屈於諸侯相又曰臣聞帝王之道務崇經略經略之術必仗英奇自國家良將可得言矣李靖破突厥侯君集滅高昌蘇定方開西域李績平遼東雖奉國威靈亦其才力所致古語有之人無常俗政有理亂兵無強弱將有能否由此觀之安邊境立功名在於良將也故趙充國征先零馮子明討南羌皆計不空施機不虛發則良將立功之驗也然兵革之用王者大事存亡所繫若任得其才則摧凶而扼暴苟非其任則敗國而殄人北齊段孝玄云持大兵者如擎盤水傾在俯仰間一致蹉跌求止豈得哉從此而言周亞夫堅壁以挫吳楚司馬懿閉營而困葛亮俱為上策此皆不戰而卻敵全軍以制勝是知大將臨戎以智為本漢高之英雄大度尚曰吾寧鬬智魏武之機神冠絶猶依法孫吳假有項籍之氣袁紹之基而皆泯智任情終以破滅何況復出其下哉且上智下愚明暗異等多算少謀衆寡殊科故魏用柏直以拒漢韓信輕為豎子燕任慕容評以抗秦王猛謂之奴才即柏直慕容評智勇俱亡者也夫中材之人素無智略一旦居元帥之任而意氣軒昂自謂當其鋒者無不摧碎豈知戎昭果毅敦詩說禮之事乎故李信求以二十萬衆獨舉鄢郢其後果辱秦軍樊噲願得十萬衆橫行胸奴登時見折季布皆其事也當今朝廷用人類取將門子弟亦有死事之家而蒙抽擢者此等本非幹略見知雖謁力盡誠亦不免於傾敗若之何使當閫外之任哉後漢馬賢討西羌皇甫規陳其必敗宋文帝使王玄謨收復河南沈慶之懸知不克謝玄以書生以姿拒苻堅天下之衆郗超明其必勝桓溫提數萬之兵萬里而襲成都劉真長期於決取雖時有今古人事皆可推之取驗大體觀其鋭志與識略耳明者隨分而察成敗之形昭然自露京房有言後之視今亦猶今之視古則昔賢之與今哲意況何殊當事機之際也皆隨時而立功豈復取賢於往代待才於未來也即論知與不知用與不用夫建功者言其所濟不言所起言其所能不言所藉若陳湯呂蒙馬隆孟觀並出自貧賤勳濟甚高未聞其家代為將帥董仲舒曰為政之用譬之琴瑟不調甚者必解絃而更張之乃可鼓也故陰陽不和擢士為相蠻夷不龔拔卒為將即更張之義也以四海之廣億兆之衆其中豈無卓越奇絶之士臣恐未之思也夫何遠之有又曰臣聞賞者禮之基罰者刑之本故禮崇謀夫竭其能賞厚義士輕其死刑正君子勗其心罰重小人懲其過然則賞罰者軍國之綱紀政教之藥石綱紀舉而衆務自理藥石行而文武用命彼吐蕃蟻結蜂聚本非勍敵薛仁貴郭待封受閫外之寄奉命專征不能激勵熊羆乘機掃撲敗軍之後又不能轉禍為福因事立功遂乃棄甲喪師脫身而走幸逢寬政罪止削除國家網漏吞舟何以過此天皇遲念舊恩收其後效當今朝廷所少豈此一二人乎且賞不勸謂之止善罰不懲謂之縱惡仁貴自宣力海東功無尺寸坐玩金帛瀆貨無厭今又不誅縱惡更甚臣以疏賤干非其事豈欲間天皇之君臣生厚薄於仁貴直以刑賞一虧百年不復區區所懷實在於此古人云國無賞罰雖堯舜不能為化今罰不能行賞亦難信故人間議者皆言近日征行虛有賞格而無其事良由中才之人不識大體恐賞賜勳庸傾竭倉庫留意錐刀將此益國徇目前之近利忘經久之遠圖所謂錯之毫釐失之千里者也且黔首雖微不可欺以得志瞻望恩澤必因事而生心既有所因須應之以實豈得懸不信之令設虛賞之科比者師出無功未必不由於此文子曰同言而信信在言前同令而行誠在令外故商君移木以表信曹公割髮以明法豈禮也哉有由然也自蘇定方定遼東李績破平壤賞絶不行勳仍淹滯數年紛紜真僞相雜縱加沙汰未至澄清臣以吏不奉法慢自京師僞勳所由主司之過其則不遠近在尚書省中不聞斬一臺郎戮一令史使天下知聞天皇何能照遠而不照近哉神州化首萬國共尊文昌政本四方是則軌物宣風理亂攸在臣是以披露不已冒死盡言且明鏡所以照形往事所以知今臣識不稽古請以近事言之貞觀年中萬年縣尉司馬玄景舞文飾智以邀乾沒太宗審其姦詐棄之都市及征高麗也總管張君乂擊賊不進斬之旗下臣以僞勳之罪多於玄景仁貴等敗重於君乂向使早誅薛仁貴郭待封則自餘諸將豈敢失利於後哉韓子云慈父多敗子嚴家無格虜此言雖小可以喻大公孫弘有言人主病不廣大人臣病不節儉臣恐天皇病之於不廣大過在於慈父斯亦日月之一蝕也又今之將吏率多貪暴所務唯口馬所求唯財物無趙奢吳起散金養士之風縱使行軍悉是此屬臣恐吐蕃之平未可旦夕望也帝甚歎異之授祕書省正字令直中書省仗內供奉尋除監察御史文明年遷殿中侍御史其年徐敬業據揚州作亂左玉鈐衛大將軍李孝逸督軍討之則天詔元忠監其軍事孝逸至臨淮而偏將雷仁智為敬業先鋒所敗敬業又攻陷潤州回兵以拒孝逸孝逸懼其鋒按甲不敢進元忠謂孝逸曰朝廷以公王室懿親故委以閫外之事天下安危實資一決且海內承平日久忽聞狂狡莫不注心傾耳以俟其誅今大軍留而不進則解遠近之望萬一朝廷更命他將代公其將何辭以逃逗撓之罪幸速進兵以立大效不然則禍難至矣孝逸然其言乃部勒士卒以圖進討時敬業屯於下阿溪敬業弟敬猷率偏師以逼淮陰元忠請先擊敬猷諸將咸曰不如先攻敬業敬業敗則敬猷不戰而擒矣若擊敬猷則敬業引兵救之是腹背受敵也元忠曰不然賊之徑兵精卒盡在下阿蟻聚而來利在一決萬一失捷則大事去矣敬猷本出博徒不習戰鬬其衆寡弱人情易搖大軍臨之其勢必克既克敬猷我軍乘勝而進彼若引救淮陰計程則不及又恐我之進掩江都必邀我於中路彼則勞倦我則以逸待之破之必矣譬之逐獸弱者先擒豈可捨必擒之弱獸趨難敵之強兵恐未可也孝逸從之乃引兵擊敬猷一戰而破之敬猷脫身而遁孝逸乃進軍與敬業隔溪相拒前軍總管蘇孝祥為賊所破孝逸又懼欲引退初敬業至下阿有流星墜其營及是有羣鳥飛噪於陳上元忠曰驗此即賊敗之兆也風順荻乾火攻之利固請決戰乃平敬業元忠以功擢司刑正稍遷洛陽令尋陷周興獄詣市將刑則天以元忠有討平敬業功特免死配流貴州時承敕者將至市先令傳呼監刑者遽釋元忠令起元忠曰未知敕虛實豈可造次徐待宣敕然始起謝觀者咸歎其臨刑而神色不撓聖曆元年召授侍御史擢拜御史中丞又為來俊臣侯思止所陷再被流于嶺表復還授御史中丞元忠前後三被流於時人多稱其無罪則天嘗謂曰卿纍負謗鑠何也對曰臣猶鹿也羅織之徒有如獵者苟須臣肉作羹耳此輩殺臣以求達臣復何辜聖曆二年擢拜鳳閣侍郎同鳳閣鸞臺平章事檢校並州長史未幾加銀青光祿大夫遷左肅政臺御史大夫兼檢校洛州長史政號清嚴長安中相王為並州元帥元忠為副時奉宸令張易之嘗縱其家奴凌暴百姓元忠笞殺之權豪莫不敬憚時突厥與吐蕃數犯塞元忠皆為大總管拒之元忠在軍唯持重自守竟無所克獲然亦未嘗敗失中宗在春宮時元忠檢校太子左庶子時張易之昌宗權寵日盛傾朝附之元忠嘗奏則天曰臣承先帝顧眄受陛下厚恩不徇忠死節使小人得在君側臣之罪也則天不悅易之昌宗由是含怒因則天不豫乃譖元忠與司禮丞高戩潛謀曰主上老矣吾屬當挾太子而令天下則天惑其言乃下元忠詔獄召太子相王及諸宰相令昌宗與元忠等殿前參對反復不決昌宗又引鳳閣舍人張說令執證元忠說初僞許之及則天召說驗問說確稱元忠實無此語則天乃悟元忠被誣然以昌宗之故特貶授端州高要尉中宗即位其日驛召元忠授衛尉卿同中書門下三品旬日又遷兵部尚書知政事如故尋進拜侍中兼檢校兵部尚書時則天崩中宗居諒暗多不視事軍國大政獨委元忠者數日未幾遷中書令加授光祿大夫纍封齊國公監修國史神龍二年元忠與武三思祝欽明徐彥伯柳沖韋承慶崔融岑羲徐堅等撰則天皇后實録二十卷編次文集一百二十卷奏之中宗稱善賜元忠物千段仍封其子衛王府咨議參軍升為任城縣男時元忠特承寵榮當朝用事初元忠作相於則天朝議者以為公清至是再居政事天下莫不延首傾屬冀有所弘益元忠乃親附權豪抑棄寒俊竟不能賞善罰惡勉修時政議者以此少之四年秋代唐璟為尚書右僕射兼中書令仍知兵部尚書事監修國史未幾元忠請歸鄉拜掃特賜錦袍一領銀千兩並給千騎四人充其左右手敕曰衣錦晝遊在乎茲日散金敷惠諒屬斯辰元忠至鄉里竟自藏其銀無所賑施及還帝又幸白馬寺以迎勞之其恩遇如此是時安樂公主嘗私請廢節愍太子立己為皇太女中宗以問元忠元忠固稱不可乃止尋遷左僕射餘並如故元忠又嫉武三思專權用事心常憤歎思欲誅之三年秋節愍太子起兵誅三思元忠及左羽林大將軍李多祚等皆潛預其事太子既斬三思又率兵詣闕將請廢韋后為庶人遇元忠子太僕少卿升於永安門脅令從己太子兵至玄武樓下多祚等猶豫不戰元忠又持兩端由是不克升為亂兵所殺中宗以元忠有平寇之功又素為高宗天后所禮遇竟不以升為纍委任如初是時三思之黨兵部尚書宗楚客與侍中紀處訥等又執證元忠及升云素與節愍太子同謀構逆請夷其三族中宗不許元忠懼不自安上表固請致仕手制聽解左僕射以特進齊國公致仕于家仍朝朔望楚客等又引右衛郎將姚庭筠為御史中丞令劾奏元忠由是貶渠州員外司馬侍中楊再思中書令李嶠皆依楚客之旨以致元忠之罪唯中書侍郎蕭至忠正議云當從寬宥楚客大怒又遣給事中冉祖雍與楊再思奏言元忠既緣犯逆不合更授內地官遂左遷思州務川尉頃之楚客又令御史袁守一奏言則天昔在三陽宮不豫內史狄仁傑奏請陛下監國元忠密進狀云不可據此則知元忠懷逆日久伏請加以嚴誅中宗謂楊再思等曰以朕思之此是守一大錯人臣事主必在一心豈有主上少有不安即請太子知事乃是狄仁傑樹私惠未見元忠有失守一假借前事羅織元忠豈是道理楚客等遂止元忠行至涪陵而卒年七十餘景龍四年追贈尚書左僕射齊國公本州刺史仍令所司給靈輿送至鄉里睿宗即位制令陪葬定陵景雲三年又降制曰故左僕射齊國公魏元忠代洽人望時稱國良歷事三朝俱展誠效晚年遷謫頗非其罪宜特還其子著作郎晃實封一百戶開元六年諡曰貞二子升晃韋安石京兆萬年人周大司空鄖國公孝寬曾孫也祖津大業末為民部侍郎煬帝之幸江都敕津與段達元文都等於洛陽留守仍檢校民部尚書事李密逼東都津拒戰於上東門外兵敗為密所囚及王世充殺文都等津獨免其難密敗歸東都世充僭號深被委遇及洛陽平高祖與津有舊徵授諫議大夫檢校黃門侍郎出為陵州刺史卒父琬成州刺史叔琨戶部侍郎琨弟璲倉部員外安石應明經舉纍授乾封尉蘇良嗣甚禮之永昌元年三遷雍州司兵良嗣時為文昌左相謂安石曰大材須大用何為徒勞於州縣也特薦於則天擢拜膳部員外郎永昌令並州司馬則天手制勞之曰聞卿在彼庶事存心善政表於能官仁明彰於鎮撫如此稱職深慰朕懷俄拜並州刺史又歷德鄭二州刺史安石性持重少言笑為政清嚴所在人吏咸畏憚之久視年遷文昌右丞尋拜鸞臺侍郎同鳳閣鸞臺平章事兼太子左庶子長安三年為神都留守兼判天官秋官二尚書事後與崔神慶等同為侍讀尋知納言事是歲又加檢校中臺左丞兼太子左庶子鳳閣鸞臺三品如故時張易之兄弟及武三思皆恃寵用權安石數折辱之甚為易之等所忌嘗於內殿賜宴易之引蜀商宋霸子等數人於前博戲安石跪奏曰蜀商等賤類不合預登此筵因顧左右令逐出之座者皆為失色則天以安石辭直深慰勉之時鳳閣侍郎陸元方在座退而告人曰此真宰相非吾等所及也則天嘗幸興泰宮欲就捷路安石奏曰千金之子且有垂堂之誡萬乘之尊不宜輕乘危險此路板築初成無自然之固鑾駕經之臣等敢不請罪則天登時為之回輦安石俄又舉奏易之等罪狀初有敕付安石及夏官尚書唐休璟推問未竟而事變四年出為揚州大都督府長史神龍初徵拜刑部尚書是歲又遷吏部尚書復知政事俄代張柬之為中書令封鄖國公以嘗為宮僚賜實封三百戶又兼相王府長史俄轉戶部尚書復為侍中監修國史中宗與庶人嘗因正月十五日夜幸其第賜賚不可勝數又中宗嘗幸安樂公主城西池館公主具舟楫請御樓船安石諫曰御輕舟乘不測臣恐非帝王之事乃止睿宗踐祚拜太子少保改封郇國公俄又歷侍中中書令景雲二年加開府儀同三司時太平公主與竇懷貞等潛有異圖將引安石預其事公主屢使子壻唐晙邀安石至宅安石竟拒而不往睿宗嘗密召安石謂曰聞朝廷傾心東宮卿何不察也安石對曰陛下何得亡國之言此必太平之計太子有大功於社稷仁明孝友天下所稱願陛下無信讒言以致惑也睿宗矍然曰朕知之矣卿勿言也太平於簾中竊聽之乃搆飛語欲令鞫之賴郭元振保護獲免俄而遷尚書左僕射兼太子賓客依舊同中書門下三品雖假以崇寵實去其權其冬罷知政事拜特進充東都留守太常主簿李元澄即安石之子壻其妻病死安石夫人薛氏疑元澄先所幸婢厭殺之其婢久已轉嫁薛氏使人捕而捶之致死由是為御史中丞楊茂謙所劾出為蒲州刺史無幾轉青州刺史安石初在蒲州時太常卿姜皎有所請託安石拒之皎大怒開元二年皎弟晦為御史中丞以安石等作相時同受中宗遺制宗楚客韋溫削除相王輔政之辭安石不能正其事令侍御史洪子輿舉劾之子輿以事經赦令固稱不可監察御史郭震希皎等意越次奏之於是下詔曰青州刺史韋安石太子賓客韋嗣立刑部尚書趙彥昭等往在先朝曲蒙厚賞因緣幸會久在廟堂朋黨比周聞於行路景龍之末長蛇縱禍倉卒之間人神憤怨未聞捨生取義直道昌言遂削太上皇輔政之辭用韋氏臨朝之策比常隱忍復以崇班將期愧畏稍懲前惡而尚款回邪苟安榮寵宜從謫官之典以勵事君之節安石可沔州別駕嗣立可嶽州別駕彥昭可袁州別駕並員外置安石既至沔州晦又奏云安石嘗檢校定陵造作隱官物入己敕符下州徵贓安石歎曰此祇應須我死耳憤激而卒年六十四開元十七年贈蒲州刺史天寶初以子貴追贈開府儀同三司尚書左僕射郇國公諡曰文貞二子陟斌並早知名陟字殷卿代為關中著姓人物衣冠奕世榮盛安石晚有子及為並州司馬始生陟及斌俱少聰敏頗異常童陟自幼風標整峻獨立不羣安石尤愛之神龍二年安石為中書令陟始十歲拜溫王府東閣祭酒加朝散大夫纍遷祕書太常丞有文彩善隸書辭人秀士已遊其門矣開元初丁父憂居喪過禮自此杜門不出八年與弟斌相勸勵探討典墳不捨晝夜文華當代俱有盛名于時才名之士王維崔皓盧象等常與陟唱和遊處廣平宋公見陟歎曰盛德遺範盡在是矣歷洛陽令轉吏部郎中張九齡一代辭宗為中書令引陟為中書舍人與孫逖梁涉對掌文誥時人以為美談後為禮部侍郎陟好接後輩尤鑒于文雖辭人後生靡不諳練曩者主司取與皆以一場之善登其科目不盡其才陟先責舊文仍令舉人自通所工詩筆先試一日知其所長然後依常式考核片善無遺美聲盈路後為吏部侍郎常病選人冒名接腳闕員既少取士良難正調者被擠僞集者冒進陟剛腸嫉惡風彩嚴正選人疑其有瑕案聲盤詰無不首伏每歲皆贖得數百員闕以待淹滯常謂所親曰使陟知銓衡一二年則無人可選矣陟門地豪華早踐清列侍兒閹閽列侍左右者十數衣書藥食咸有典掌而輿馬僮奴勢侔於王家主第自以才地人物坐取三公頗以簡貴自處善誘納後進其同列朝要視之蔑如也如道義相知靡隔貴賤而布衣韋帶之士恆虛席倒屣以迎之時人以此稱重李林甫忌之出為襄陽太守兼本道採訪使又改陳留採訪使復加銀青光祿大夫天寶中襲封郇國公以親纍貶鍾離太守重貶義陽太守尋移河東太守充本道採訪使十二年入考在華清宮右相楊國忠惡其才望恐踐台衡乃引河東人吳象之謂曰子能使人告陟乎吾以子為御史象之曰能乃告陟與御史中丞吉溫結託欲謀陷朝廷又誘陟姪韋元志證之陟坐貶為桂州桂嶺尉未之任再貶昭州平樂尉會祿山反陷洛陽陟愛弟斌為賊所得國忠欲構陟與賊通應潛令吏卒伺其所居欲脅之令陟憂死其土豪人勸陟曰昔張燕公竄逐藏於陳氏以免危亡詔命儻來誰敢申覆未若輕舟千里且泛溪洞候事清徐出豈不美也陟慨然應之曰我積信於國朝非一代也況素所秉心無負神理命之合爾其敢逃刑燕公之謀誠愧厚意不能從也因謝遣之乃堅臥不動經歲餘潼關失守肅宗即位於靈武起為吳郡太守兼江南東道採訪使未到郡肅宗使中官賈遊巖手詔追之未至鳳翔會江東永王擅起兵令陟招諭除御史大夫兼江東節度使陟以季廣琛從永王下江非其本意懼罪出奔未有所適乃有表請拜廣琛為丹陽太守兼御史中丞緣江防禦使以安反側因與淮南節度使高適淮西節度使來瑱等同至安州陟謂適瑱曰今中原未復江淮動搖人心安危實在茲日若不齊盟質信以示四方令知三帥協心萬里同力則難以集事矣陟推瑱為地主乃為載書登壇誓衆曰淮西節度使兼御史大夫瑱江東節度使御史大夫陟淮南節度使御史大夫適等銜國威命各鎮方隅糾合三垂翦除凶慝好惡同之無有異志有渝此盟墜命亡族皇天后土祖宗神明實鑒斯言陟等辭旨慷慨血淚俱下三軍感激莫不隕泣其後江表樹碑以紀忠烈無何有詔令陟赴行在陟以廣琛雖承恩命猶且遲回恐後變生禍貽於陟欲往招慰然後赴徵乃發使上表懇言其急陟馳至歷陽見廣琛且宣恩旨勞徠行賞陟自以私馬數匹賜之安其疑懼即日便赴行在謁見肅宗肅宗深器之拜御史大夫拾遺杜甫上表論房琯有大臣度真宰相器聖朝不容辭旨迂誕肅宗令崔光遠與陟及憲部尚書顏真卿同訊之陟因入奏曰杜甫所論房琯事雖被貶黜不失諫臣大體上由此疏之時朝臣立班多不整肅至有班頭相弔哭者乃罷陟御史大夫顏真卿代授吏部尚書自後任事寵臣皆後來初用望風畏忌道竟不行因宗人伐墓柏坐不能禁出為絳州刺史乾元二年入為太常卿呂諲再入相薦為禮部尚書東京留守判尚書省事兼東京畿觀察處置等使逆賊史思明寇逼河洛副元帥李光弼議守河陽令陟率東京官屬入關回避乃領兵守陝州有詔遷吏部尚書留守如故令止於永樂不許至京候光弼收復河洛令陟依前居守陟早有台輔之望間被李林甫楊國忠所擠及中原兵起天下事殷陟常自謂負經緯之器遭後生騰謗明主見疑常鬱鬱不得志乃歎曰吾道窮於此乎有志不伸得非天命乎因遘疾上元元年八月卒於虢州時年六十五贈荊州大都督永泰元年詔曰竭忠之臣歿不廢命奉上之節行固無私言念飾終抑惟恆典故金紫光祿大夫吏部尚書兼御史大夫充東京留守兼判留司尚書省事東京畿觀察處置使上柱國郇國公韋陟敦敏直方端嚴峻整弘敷典禮表正人倫學冠通儒文含大雅頃者詢謨舊德保釐成周眷彼郊圻資其慎固而凶胡殘醜密邇河洛命居陝虢時俟翦除才加喉舌之榮遽嬰霜露之疾方期克享眉壽冀其有瘳奄此殂歿良深震悼升車而復以申三禭之恩在牖加紳宜崇八座之寵可贈尚書左僕射太常博士程皓議諡為忠孝刑部尚書顏真卿以為忠則以身許國見危致命孝則晨昏色養取樂庭闈不合二行殊高以成忠孝主客員外郎歸崇敬又駁之紛議不已右僕射郭英乂不達其體請從太常之狀而奏陟子允斌景雲初安石為宰輔時授太子通事舍人早修整尚文藝容止嚴厲有大臣體與兄陟齊名開元十七年司徒薛王業為女平恩縣主求婚以斌才地奏配焉遷祕書丞天寶初轉國子司業徐安貞王維崔皓當代辭人特為推挹天寶中拜中書舍人兼集賢院學士兄陟先為中書舍人未幾遷禮部侍郎陟在南省斌又掌文誥改太常少卿天寶五載右相李林甫構陷刑部尚書韋堅斌以親纍貶巴陵太守移臨安太守加銀青光祿大夫斌授五品時兄陟為河東太守堂兄由為右金吾將軍縚為太子少師四人同時列戟衣冠之盛罕有其比十四載安祿山反陷洛陽斌為賊所得僞授黃門侍郎憂憤而卒及克復兩京肅宗乾元元年贈祕書監安石兄叔夏別有傳從父兄子抗從祖兄子巨源抗弱冠舉明經纍轉吏部郎中以清謹著稱景雲初為永昌令不務威刑而政令肅一都輦繁劇前後為政寬猛得中無如抗者無幾遷右臺御史中丞人吏詣闕請留不許因立碑於通衢紀其遺惠開元三年自左庶子出為益州長史四年入為黃門侍郎八年河曲叛胡康待賓擁徒作亂詔抗持節慰撫抗素無武略不為寇所憚在路遲留不敢進因墜馬稱疾竟不至賊所而還俄以本官檢校鴻臚卿代王晙為御史大夫兼按察京畿時抗弟拯為萬年令兄弟同領本部時人榮之尋以薦御史非其人出為安州都督轉蒲州刺史十一年入為大理卿其年代陸象先為刑部尚書尋又分掌吏部選事十四年卒抗歷職以清儉自守不務産業及終喪事殆不能給玄宗聞其貧特令給靈輿遞送還鄉贈太子少傅諡曰貞抗為京畿按察使時舉奉天尉梁升卿新豐尉王倕金城尉王冰華原尉王燾為判官及支使其後升卿等皆名位通顯時人以抗有知人之鑒巨源周京兆尹總曾孫也祖匡伯襲祖爵鄖國公入隋改封舒國公官至尚衣奉御巨源則天時纍遷司賓少卿轉司府卿文昌右丞同鳳閣鸞臺平章事三年轉夏官侍郎依前平章事有吏才勾覆省內文案下符剝徵雖為下所怨苦然亦頗收其利證聖初出為鄜州刺史尋拜地官尚書神都留守長安二年詔入轉刑部尚書又加太子賓客再為神都留守神龍初入拜工部尚書封同安縣子又遷吏部尚書同中書門下三品進封郇縣伯時安石為中書令以是巨源近屬罷知政事巨源尋遷侍中中書令進封舒國公附入韋后三等親為兄弟編在屬籍是歲巨源奉制與唐休璟李懷遠祝欽明蘇瓌等定垂拱格及格後敕前後計二十卷頒下施行時武三思先有實封數千戶在貝州時屬大水刺史宋璟議稱租庸及封丁並合捐免巨源以為穀稼雖被湮沉其蠶桑見在可勒輸庸調由是河朔戶口頗多流散景龍二年順天翊聖皇后衣箱中裙上有五色雲起久而方歇巨源以為非常佳瑞請布告天下許之中宗又令畫工圖其狀以示百僚仍大赦天下內外五品已上官母妻各加封邑時中宗既雅信符瑞巨源又贊成其妖妄是歲星墜如雷野雉皆雊咎徵若此不聞巨源有言蓋與韋皇后繼源流佞媚官爵疑其開導以踵則天時有驍衛將軍迦葉志忠太常少卿鄭愔兵部尚書宗楚客右補闕趙延禧等或相諷諭或上表章謬說符祥朋黨取媚識者嗟憤景龍三年拜尚書左僕射依舊知政事未幾又拜尚書令同中書門下三品仍舊監修國史時國家將有事於南郊而巨源希韋后之旨協同祝欽明之議言皇后合助郊祀竟以皇后為亞獻巨源為終獻又以大臣女為齊娘及韋庶人之難家人令巨源逃匿巨源曰吾國之大臣豈得聞難不赴乃出至都街為亂兵所殺時年八十睿宗即位贈特進荊州大都督太常博士李處直議巨源諡曰昭戶部員外郎李雍駁之曰三思引之為相阿韋託之為親無功而封無德而祿同族則醜正安石他人則附邪楚客諡之曰昭良恐不當初巨源與安石迭為宰相時人以為情不相協故雍以此稱之處直仍固請依前諡為定雍又駁曰夫古之諡在乎勸沮將杜小人之業冀長君子之風故為善者雖存不貴仕而沒有餘名此賢達所以砥節也為惡者雖生有所幸死懷所懲此回邪所以易心也嗚呼巨源嘗未斯察而乃聞義不從與惡相濟蓄罔上之志協羣凶之謀苟容聖朝貪昧厚祿自以宰臣之貴不崇朝而賈害者固鬼得而誅之也彼則匹夫之微未受命而行刑者固人得而誅之也幽明之憤斷焉可知天地之心自此而見矣頃者皇運中興功臣翼政時序未幾邪逆執權姦慝者拜爵於私門忠正者降黜於藩郡巨源此際用事方殷且於阿韋何親而結為昆季於國家何力而纍忝大官此則暗通中人附會武氏託城社之固亂皇家之基其罪一也又國之大事在祀與戎酌於禮經陳於郊祭將以對越天地光揚祖宗既告成功以觀海內惟昔亞獻不聞婦人阿韋蓄無君之誠懷自達之意潛圖帝位議啄皇孫升壇擬儀拜賜明命將預家事無守國章巨源創跡於前悖逆演成於後時有禮部侍郎徐堅太常博士唐紹蔣欽緒彭景直並言之莫從其罪二也又上天不弔先帝遇毒悔禍無徵阿韋將篡畫計未果逆心尚搖周章夷猶倉卒迷謬於是太平公主矯為陳謨上官昭容紿草遺詔故得今上輔政阿韋參謀將大業垂成而休命中輟者職由巨源躡韋溫之足楚客附巨源之耳梟聲遽發狼顧相驚以阿韋臨朝以韋溫當國其罪三也又人為邦本財實聚人奪其財則人心自離無其人則國本何恃巨源屢踐台輔專行勾徵廢越條章崇尚侵刻樹怨天下剝害生靈兆庶流離戶口減耗況以三思食邑往在貝州時屬久陰災逢多雨租庸捐免申令昭明匪今獨然自古不易三思慮其封物巨源啓此異端以為稼穡湮沉雖無菽粟蠶桑織可輸庸調致使河朔黎人海隅士女去其鄉井鬻其子孫飢寒切身朝夕奔命其罪四也但巨源長於華宗仕於纍代作萬國之相處具瞻之地蔽日月之層輝負丘山之重責今乃妄加褒述安能分謗者哉當時雖不從雍議而論者是之巨源與安石及則天時文昌右相待價並是五服之親自餘近屬至大官者數十人趙彥昭者甘州張掖人也父武孟初以馳騁佃獵為事嘗獲肥鮮以遺母母泣曰汝不讀書而佃獵如是吾無望矣竟不食其膳武孟感激勤學遂博通經史舉進士官至右臺侍御史撰河西人物志十卷彥昭少以文辭知名中宗時纍遷中書侍郎同中書門下三品兼修國史充修文館學士景龍四年金城公主出降吐蕃贊普中宗命彥昭為使彥昭以既充外使恐失其寵殊不悅司農卿趙履溫私謂曰公國之宰輔而為一介之使不亦鄙乎彥昭曰計將安出履溫因為陰託安樂公主密奏留之中宗乃遣左驍衛大將軍楊矩代彥昭而往睿宗時出為涼州都督為政清嚴將士已下皆動足股栗又為宋州刺史入為吏部侍郎又為刑部尚書關內道持節巡邊使檢校左御史臺大夫彥昭素與郭元振張說友善及蕭至忠等伏誅元振說等稱彥昭先嘗密圖其事乃以功遷刑部尚書封耿國公賜實封一百戶殿中侍御史郭震奏彥昭以女巫趙五娘左道亂常託為諸姑潛相影援既因提挈乃踐台階驅車造門著婦人之服攜妻就謁申猶子之情于時南憲直臣劾以霜憲暫加微貶旋登寵秩同惡相濟一至於此乾坤交泰宇宙再清不加貶削法將安措請付紫微黃門準法處分俄而姚崇入相甚惡彥昭之為人由是纍貶江州別駕卒蕭至忠祕書少監德言曾孫也少仕為畿尉以清謹稱嘗與友人期於路隅會風雪凍冽諸人皆奔避就宇下至忠曰寧有與人期而求安失信乎獨不去衆咸歎服神龍初武三思擅權至忠附之自吏部員外擢拜御史中丞遷吏部侍郎仍兼御史中丞恃武三思勢掌選無所忌憚請謁杜絶威風大行尋遷中書侍郎兼中書令節愍太子誅武三思後有三思黨與宗楚客紀處訥令侍御史冉祖雍奏言安國相王及鎮國太平公主亦與太子連謀舉兵請收付制獄中宗召至忠令按其事至忠泣而奏曰陛下富有四海貴為天子豈不能保一弟一妹受人羅織宗社存亡實在於此臣雖愚昧竊為陛下不取漢書云一尺布尚可縫一斗粟尚可舂兄弟二人不相容願陛下詳察此言且往者則天皇后欲令相王為太子王纍日不食請迎陛下固讓之誠天下傳說足明冉祖雍等所奏咸是構虛帝深納其言而止尋轉黃門侍郎同中書門下平章事至忠上疏陳時政曰臣聞王者列職分司為人求理求理之道必在用賢得其人則公務克修非其才則厥官如曠官曠則事廢事廢則人殘漸至凌遲率由於此頃者選曹授職政事官人或異才升多非德進皆因依貴要互為粉飾苟得即是曾無遠圖上下相蒙誰肯言及臣聞官爵者公器也恩幸者私惠也祇可金帛富之粱肉食之以存私澤也若以公器為私用則公議不行而勞人解體以小私而妨至公則私謁門開而正言路絶憸人遞進君子道消日削月朘卒見凋弊者為官非其人也昔漢館陶公主為子求郎明帝謂曰郎官上應列宿出宰百里苟非其人則人受其殃賜錢十萬而已此即至公之道不虧恩私之情無替良史直筆將為美談于今稱之不輟其口者也當今列位已廣冗員倍多祈求未厭日月增數陛下降不資之澤近戚有無涯之請賣官利己鬻法徇私臺寺之內朱紫盈滿官秩益輕恩賞彌數憸利之輩冒進而莫識廉隅方雅之流知難而斂分丘隴才者莫用用者不才二事相形十有其五故人不效力而官匪其人欲求其理實亦難成臣竊見宰相及近侍要官子弟多居美爵此並勢要親戚罕有才藝遞相囑託虛踐官榮詩云東人之子職勞不賚西人之子粲粲衣服私人之子百僚是試或以其酒不以其漿鞙鞙佩璲不以其長此言王政不平衆官廢職私家之子列試於榮班非任之人徒長其飾佩臣愚伏願陛下想居安思危之義行改絃易張之道愛惜爵賞審量材識官無虛授人必為官進大雅於樞近退小子於間僻政令惟一威恩以信私不害公情不撓法則天下幸甚臣伏見永徽故事宰相子弟多居外職者非直抑強宗分大族亦以退不肖擇賢才伏願陛下遠稽舊典近遵先聖特降明敕令宰相已下及諸司長官子弟並改授外官庶望分職四方共寧百姓表𩹉相統遐邇乂安疏奏不納明年代韋巨源為侍中仍依舊修史尋遷中書令時宗楚客紀處訥潛懷姦計自樹朋黨韋巨源楊再思李嶠皆唯諾自全無所匡正至忠處於其間頗存正道時議翕然重之中宗亦曰諸宰相中至忠最憐我韋庶人又為亡弟贈汝南王洵與至忠亡女為冥婚合葬及韋氏敗至忠發墓持其女柩歸人以此譏之至忠又以女適庶人舅崔從禮之子成禮日中宗為蕭氏婚主韋庶人為崔氏婚主時人謂之天子嫁女皇后娶婦睿宗即位景雲初出為晉州刺史甚有能名時太平公主用事至忠潛遣間使申意求入為京職誅韋氏之際至忠一子任千牛為亂兵所殺公主冀至忠以此怨望可與謀事即納其請召拜刑部尚書右御史大夫再遷吏部尚書先天二年復為中書令是歲至忠與竇懷貞魏知古崔湜陸象先柳沖徐堅劉子玄等撰成姓族系録二百卷有制加爵賜物各有差未幾左僕射竇懷貞侍中岑羲及至忠並戶部尚書李晉太子少保薛稷左散騎常侍賈膺福左羽林大將軍常元楷右羽林將軍李慈等與太平公主謀逆事泄至忠遽遁入山寺數日捕而伏誅籍沒其家至忠雖清儉刻己然簡約自高未嘗接待賓客所得俸祿亦無所賑施及籍沒財帛甚豐由是頓絶聲望矣弟元嘉工部侍郎廣微工部員外宗楚客者蒲州河東人則天從父姊之子也兄秦客垂拱中潛勸則天革命稱帝由是纍遷內史後與楚客及弟晉卿並以姦贓事發配流嶺外秦客死楚客等尋復追還楚客纍遷夏官侍郎同鳳閣鸞臺平章事神龍初為太僕卿武三思用事引楚客為兵部尚書同中書門下三品晉卿纍遷將作大匠節愍太子既殺武三思兵敗逃於鄠縣楚客遣使追斬之仍令以其首祭三思及崇訓喪柩韋庶人及安樂公主尤加親信未幾遷中書令楚客雖跡附韋氏而嘗別有異圖與侍中紀處訥共為朋黨故時人呼為宗紀景龍中西突厥娑葛與阿史那忠節不和屢相侵擾西陲不安安西都護郭元振奏請徒忠節於內地楚客與晉卿處訥等各納忠節重賂奏請發兵以討娑葛不納元振所奏娑葛知而大怒舉兵入寇甚為邊患於是監察御史崔琬劾奏楚客等曰臣聞四牡項領良御不乘二心事君明罰無捨謹案宗楚客紀處訥等性惟險詖志越溪壑幸以遭逢聖主纍忝殊榮承愷悌之恩居弼諧之地不能刻意砥操憂國如家微效涓塵以裨川嶽遂乃專作威福敢樹朋黨有無君之心闕大臣之節潛通獫狁納賄不資公引頑凶受賂無限醜問充斥穢行昭彰且境外之交情狀難測今娑葛反叛邊鄙不寧由此賊臣取怨中國論之者懼禍以結舌語之者避罪以鉗口但晉卿昔居榮職素闕忠誠屢抵嚴刑皆由黷貨今又叨忝頻沐殊恩厚祿重權當朝莫比曾無悛改仍徇贓私此而可容孰不可恕臣謬參直指義在觸邪請除巨𢀿用答天造楚客處訥晉卿等驕恣跋扈人神同疾不加天誅詎清王度並請收禁差三司推鞫舊制大臣有被御史對仗劾彈者即俯僂趨出立于朝堂待罪楚客更咤鰓作色而進自言以執性忠鯁被琬誣奏中宗竟不能窮核其事遽令琬與楚客等結為義兄弟以和解之韋氏敗楚客與晉卿等皆伏誅紀處訥者秦州上邽人也娶武三思妻之姊由是纍遷太府卿神龍中嘗因穀貴中宗召處訥親問其故武三思諷知太史事右驍衛將軍迦葉志忠太史令傅孝忠奏言其夜有攝提星入太微至帝座此則王者與大臣私相接大臣能納忠故有斯應帝以為然降敕褒述處訥賜衣一副綵六十段無幾進拜侍中與楚客等同時伏誅史官曰大帝孝和之朝政不由己則天在位已絶綴旒韋后司晨前蹤覆轍當是時姦邪有黨宰執求容順之則惡其名彰逆之則憂其禍及欲存身致理者非中智常才之所能也況元忠安石巨源至忠彥昭等行非純一識昧存亡徇利貪榮有始無卒不得其死宜哉楚客晉卿處訥等讒諂並進威虐貫盈不使逃刑可謂政正贊曰為唐重臣食唐重祿顛危不持富貴何足二宗一紀讒邪酷毒與前數公死不知辱
