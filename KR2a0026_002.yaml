body:
  text: 舊唐書卷二本紀第二太宗上太宗文武大聖大廣孝皇帝諱世民高祖第二子也母曰太穆順聖皇后竇氏隋開皇十八年十二月戊午生於武功之別館時有二龍戲於館門之外三日而去高祖之臨岐州太宗時年四歲有書生自言善相謁高祖曰公貴人也且有貴子見太宗曰龍鳳之姿天日之表年將二十必能濟世安民矣高祖懼其言泄將殺之忽失所在因採濟世安民之義以為名焉太宗幼聰睿玄鑒深遠臨機果斷不拘小節時人莫能測也大業末煬帝於鴈門為突厥所圍太宗應募救援隸屯衛將軍雲定興營將行謂定興曰必賫旗鼓以設疑兵且始畢可汗舉國之師敢圍天子必以國家倉卒無援我張軍容令數十里幡旗相續夜則鉦鼓相應虜必謂救兵雲集望塵而遁矣不然彼衆我寡悉軍來戰必不能支矣定興從焉師次崞縣突厥候騎馳告始畢曰王師大至由是解圍而遁及高祖之守太原太宗時年十八有高陽賊帥魏刀兒自號歷山飛來攻太原高祖擊之深入賊陳太宗以輕騎突圍而進射之所向皆披靡拔高祖於萬衆之中適會步兵至高祖與太宗又奮擊大破之時隋祚已終太宗潛圖義舉每折節下士推財養客羣盜大俠莫不願效死力及義兵起乃率兵略徇西河克之拜右領大都督右三軍皆隸焉封燉煌郡公大軍西上賈胡堡隋將宋老生率精兵二萬屯霍邑以拒義師會久雨糧盡高祖與裴寂議且還太原以圖後舉太宗曰本興大義以救蒼生當須先入咸陽號令天下遇小敵即班師將恐從義之徒一朝解體還守太原一城之地此為賊耳何以自全高祖不納促令引發太宗遂號泣於外聲聞帳中高祖召問其故對曰今兵以義動進戰則必克退還則必散衆散於前敵乘於後死亡須臾而至是以悲耳高祖乃悟而止八月己卯雨霽高祖引師趣霍邑太宗恐老生不出戰乃將數騎先詣其城下舉鞭指麾若將圍城者以激怒之老生果怒開門出兵背城而陳高祖與建成合陳於城東太宗及柴紹陳於城南老生麾兵疾進先薄高祖而建成墜馬老生乘之高祖與建成軍咸卻太宗自南原率二騎馳下峻坂衝斷其軍引兵奮擊賊衆大敗各捨仗而走懸門發老生引繩欲上遂斬之平霍邑至河東關中豪傑爭走赴義太宗請進師入關取永豐倉以賑窮乏收羣盜以圖京師高祖稱善太宗以前軍濟河先定渭北三輔吏民及諸豪猾詣軍門請自效者日以千計扶老攜幼滿於麾下收納英俊以備僚列遠近聞者咸自託焉師次于涇陽勝兵九萬破胡賊劉鷂子並其衆留殷開山劉弘基屯長安故城太宗自趣司竹賊帥李仲文何潘仁向善志等皆來會頓于阿城獲兵十三萬長安父老賫牛酒詣旌門者不可勝紀勞而遣之一無所受軍令嚴肅秋毫無所犯尋與大軍平京城高祖輔政受唐國內史改封秦國公會薛舉以徑卒十萬來逼渭濱太宗親擊之大破其衆追斬萬餘級略地至于隴坻義寧元年十二月復為右元帥總兵十萬徇東都及將旋謂左右曰賊見吾還必相追躡設三伏以待之俄而隋將段達率萬餘人自後而至度三王陵發伏擊之段達大敗追奔至于城下因於宜陽新安置熊穀二州戍之而還徙封趙國公高祖受禪拜尚書令右武候大將軍進封秦王加授雍州牧武德元年七月薛舉寇涇州太宗率衆討之不利而旋九月薛舉死其子仁杲嗣立太宗又為元帥以擊仁杲相持於折咵城深溝高壘者六十餘日賊衆十餘萬兵鋒甚鋭數來挑戰太宗按甲以挫之賊糧盡其將牟君才梁胡郎來降太宗謂諸將軍曰彼氣衰矣吾當取之遣將軍龐玉先陳於淺水原南以誘之賊將宗羅併軍來拒玉軍幾敗既而太宗親御大軍奄自原北出其不意羅望見復回師相拒太宗將驍騎數十入賊陳於是王師表𩹉齊奮羅大潰斬首數千級投澗谷而死者不可勝計太宗率左右二十餘騎追奔直趣折以乘之仁杲大懼嬰城自守將夕大軍繼至四面合圍詰朝仁杲請降俘其精兵萬餘人男女五萬口既而諸將奉賀因問曰始大王野戰破賊其主尚保堅城王無攻具輕騎騰逐不待步兵徑薄城下咸疑不克而竟下之何也太宗曰此以權道迫之使其計不暇發以故克也羅恃往年之勝兼復養鋭日久見吾不出意在相輕今喜吾出悉兵來戰雖擊破之擒殺蓋少若不急躡還走投城仁杲收而撫之則便未可得矣且其兵衆皆隴西人一敗披退不及回顧敗歸隴外則折咵自虛我軍隨而迫之所以懼而降也此可謂成算諸君盡不見耶諸將曰此非凡人所能及也獲賊兵精騎甚衆還令仁杲兄弟及賊帥宗羅翟長孫等領之太宗與之遊獵馳射無所間然賊徒荷恩懾氣咸願效死時李密初附高祖令密馳傳迎太宗於豳州密見太宗天姿神武軍威嚴肅驚悚歎服私謂殷開山曰真英主也不如此何以定禍亂乎凱旋獻捷於太廟拜太尉陝東道行臺尚書令鎮長春宮關東兵馬並受節度尋加左武候大將軍涼州總管宋金剛之陷澮州也兵鋒甚鋭高祖以王行本尚據蒲州呂崇茂反於夏縣晉澮二州相繼陷沒關中震駭乃手敕曰賊勢如此難與爭鋒宜棄河東之地謹守關西而已太宗上表曰太原王業所基國之根本河東殷實京邑所資若舉而棄之臣竊憤恨願假精兵三萬必能平殄武周克復汾晉高祖於是悉發關中兵以益之又幸長春宮親送太宗二年十一月太宗率衆趣龍門關履冰而渡之進屯柏壁與賊將宋金剛相持尋而永安王孝基敗於夏縣于筠獨孤懷恩唐儉並為賊將尋相尉遲敬德所執將還澮州太宗遣殷開山秦叔寶邀之於美良川大破之相等僅以身免悉虜其衆復歸柏壁於是諸將咸請戰太宗曰金剛懸軍千里深入吾地精兵驍將皆在於此武周據太原專倚金剛以為捍士卒雖衆內實空虛意在速戰我堅營蓄鋭以挫其鋒糧盡計窮自當遁走三年二月金剛竟以衆餒而遁太宗追之至介州金剛列陳南北七里以拒官軍太宗遣總管李世績程金秦叔寶當其北翟長孫秦武通當其南諸軍戰小卻為賊所乘太宗率精騎擊之衝其陳後賊衆大敗追奔數十里敬德相率衆八千來降還令敬德督之與軍營相參屈突通懼其為變驟以為請太宗曰昔蕭王推赤心置人腹中並能畢命今委任敬德又何疑也於是劉武周奔於突厥並汾悉復舊地詔就軍加拜益州道行臺尚書令七月總率諸軍攻王世充於洛邑師次穀州世充率精兵三萬陳於慈澗太宗以輕騎挑之時衆寡不敵陷於重圍左右咸懼太宗命左右先歸獨留後殿世充驍將單雄信數百騎夾道來逼交搶競進太宗幾為所敗太宗左右射之無不應弦而倒獲其大將燕頎世充乃拔慈澗之鎮歸於東都太宗遣行軍總管史萬寶自宜陽南據龍門劉德威自太行東圍河內王君廓自洛口斷賊糧道又遣黃君漢夜從孝水河中下舟師襲回洛城克之黃河已南莫不響應城堡相次來降大軍進屯邙山九月太宗以五百騎先觀戰地卒與世充萬餘人相遇會戰復破之斬首三千餘級獲大將陳智略世充僅以身免其所署筠州總管楊慶遣使請降遣李世績率師出轘轅道安撫其衆滎汴洧豫九州相繼來降世充遂求救於竇建德四年二月又進屯青城宮營壘未立世充衆二萬自方諸門臨穀水而陳太宗以精騎陳於北邙山令屈突通率卒五千渡水以擊之因誡通曰待兵交即放煙吾當率騎軍南下兵才接太宗以騎衝之挺身先進與通表𩹉相應賊衆殊死戰散而復合者數焉自辰及午賊衆始退縱兵乘之俘斬八千人於是進營城下世充不敢復出但嬰城自守以待建德之援太宗遣諸軍掘塹匝布長圍以守之吳王杜伏威遣其將陳正通徐召宗率精兵二千來會於軍所僞鄭州司馬沈悅以武牢降將軍王君廓應之擒其僞荊王王行本會竇建德以兵十餘萬來援世充至于酸棗蕭瑀屈突通封德彝皆以腹背受敵恐非萬全請退師穀州以觀之太宗曰世充糧盡內外離心我當不勞攻擊坐收其敝建德新破孟海公將驕卒惰吾當進據武牢扼其襟要賊若冒險與我爭鋒破之必矣如其不戰旬日間世充當自潰若不速進賊入武牢諸城新附必不能守二賊併力將若之何通又請解圍就險以候其變太宗不許於是留通輔齊王元吉以圍世充親率步騎三千五百人趣武牢建德自滎陽西上築壘於板渚太宗屯武牢相持二十餘日諜者曰建德伺官軍芻盡候牧馬於河北因將襲武牢太宗知其謀遂牧馬河北以誘之詰朝建德果悉衆而至陳兵汜水世充將郭士衡陳於其南綿亙數里鼓譟諸將大懼太宗將數騎升高丘以望之謂諸將曰賊起山東未見大敵今度險而囂是無政令逼城而陳有輕我心我按兵不出彼乃氣衰陳久卒饑必將自退追而擊之無往不克吾與公等約必以午時後破之建德列陳自辰至午兵士饑倦皆坐列又爭飲水逡巡斂退太宗曰可擊矣親率輕騎追而誘之衆繼至建德回師而陳未及整列太宗先登擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大奈程金秦叔寶宇文歆等揮幡而入直突出其陳後張我旗幟賊顧見之大潰追奔三十里斬首三千餘級虜其衆五萬生擒建德於陳太宗數之曰我以干戈問罪本在王世充得失存亡不預汝事何故越境犯我兵鋒建德股栗而言曰今若不來恐勞遠取高祖聞而大悅手詔曰隋氏分崩崤函隔絶兩雄合勢一朝清蕩兵既克捷更無死傷無愧為臣不憂其父並汝功也乃將建德至東都城下世充懼率其官屬二千餘人詣軍門請降山東悉平太宗入據宮城令蕭瑀竇軌等封守府庫一無所取令記室房玄齡收隋圖籍於是誅其同惡段達等五十餘人枉被囚禁者悉釋之非罪誅戮者祭而誄之大饗將士班賜有差高祖令尚書左僕射裴寂勞於軍中六月凱旋太宗親披黃金甲陳鐵馬一萬騎甲士三萬人前後部鼓吹俘二僞主及隋氏器物輦輅獻于太廟高祖大悅行飲至禮以享焉高祖以自古舊官不稱殊功乃別表徽號用旌勳德十月加號天策上將陝東道大行臺位在王公上增邑二萬戶通前三萬戶賜金輅一乘衮冕之服玉璧一雙黃金六千斤前後部鼓吹及九部之樂班劍四十人于時海內漸平太宗乃鋭意經籍開文學館以待四方之士行臺司勳郎中杜如晦等十有八人為學士每更直閣下降以溫顏與之討論經義或夜分而罷未幾竇建德舊將劉黑闥舉兵反據洺州十二月太宗總戎東討五年正月進軍肥鄉分兵絶其糧道相持兩月黑闥窘急求戰率步騎二萬南渡洺水晨壓官軍太宗親率精騎擊其馬軍破之乘勝蹂其步卒賊大潰斬首萬餘級先是太宗遣堰洺水上流使淺令黑闥得渡及戰乃令決堰水大至深丈餘賊徒既敗赴水者皆溺死焉黑闥與二百餘騎北走突厥悉虜其衆河北平時徐圓朗阻兵徐兗太宗回師討平之於是河濟江淮諸郡邑皆平十月加左右十二衛大將軍七年秋突厥頡利突利二可汗自原州入寇侵擾關中有說高祖云祗為府藏子女在京師故突厥來若燒卻長安而不都則胡寇自止高祖乃遣中書侍郎宇文士及行山南可居之地即欲移都蕭瑀等皆以為非然終不敢犯顏正諫太宗獨曰霍去病漢廷之將帥耳猶且志滅胸奴臣忝備藩維尚使胡塵不息遂令陛下議欲遷都此臣之責也幸乞聽臣一申微效取彼頡利若一兩年間不係其頸徐建移都之策臣當不敢復言高祖怒仍遣太宗將三十餘騎行剗還日固奏必不可移都高祖遂止八年加中書令九年皇太子建成齊王元吉謀害太宗六月四日太宗率長孫無忌尉遲敬德房玄齡杜如晦宇文士及高士廉侯君集程知節秦叔寶段志玄屈突通張士貴等於玄武門誅之甲子立為皇太子庶政皆斷決太宗乃縱禁苑所養鷹犬並停諸方所進珍異政尚簡肅天下大悅又令百官各上封事備陳安人理國之要己巳令曰依禮二名不偏諱近代已來兩字兼避廢闕已多率意而行有違經典其官號人名公私文籍有世民兩字不連續者並不須諱罷幽州大都督府辛未廢陝東道大行臺置洛州都督府廢益州道行臺置益州大都督府壬午幽州大都督廬江王瑗謀逆廢為庶人乙酉罷天策府七月壬辰太子左庶子高士廉為侍中右庶子房玄齡為中書令尚書右僕射蕭瑀為尚書左僕射吏部尚書楊恭仁為雍州牧太子左庶子長孫無忌為吏部尚書右庶子杜如晦為兵部尚書太子詹事宇文士及為中書令封德彝為尚書右僕射八月癸亥高祖傳位於皇太子太宗即位於東宮顯德殿遣司空魏國公裴寂柴告于南郊大赦天下武德元年以來責情流配者並放還文武官五品已上先無爵者賜爵一級六品已下加勳一轉天下給復一年癸酉放掖庭宮女三千餘人甲戌突厥頡利突利寇涇州乙亥突厥進寇武功京師戒嚴丙子立妃長孫氏為皇后己卯突厥寇高陵辛巳行軍總管尉遲敬德與突厥戰於涇陽大破之斬首千餘級癸未突厥頡利至于渭水便橋之北遣其酋帥執失思力入朝為覘自張形勢太宗命囚之親出玄武門馳六騎幸渭水上與頡利隔津而語責以負約俄而衆軍繼至頡利見軍容既盛又知思力就拘由是大懼遂請和詔許焉即日還宮乙酉又幸便橋頡利刑白馬設盟突厥引退九月丙戌頡利獻馬三千匹羊萬口帝不受令頡利歸所掠中國戶口丁未引諸衛騎兵統將等習射于顯德殿庭謂將軍已下曰自古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯鬻周宣驅馳方召亦能制勝太原至漢晉之君逮於隋代不使兵士素習干戈突厥來侵莫能抗禦致遺中國生民塗炭於寇手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬庶使汝鬬戰亦望汝前無橫敵於是每日引數百人於殿前教射帝親自臨試射中者隨賞弓刀布帛朝臣多有諫者曰先王制法有以兵刃至御所者刑之所以防萌杜漸備不虞也今引裨卒之人彎弧縱矢於軒陛之側陛下親在其間正恐禍出非意非所以為社稷計也上不納自是後士卒皆為精鋭壬子詔私家不得輒立妖神妄設淫祀非禮祠禱一皆禁絶其龜易五兆之外諸雜占卜亦皆停斷長孫無忌封齊國公房玄齡邢國公尉遲敬德吳國公杜如晦蔡國公侯君集潞國公冬十月丙辰朔日有蝕之癸亥立中山王承乾為皇太子癸酉裴寂食實封一千五百戶長孫無忌王君廓尉遲敬德房玄齡杜如晦一千三百戶長孫順德柴紹羅藝趙郡王孝恭一千二百戶侯君集張公謹劉師立一千戶李世績劉弘基九百戶高士廉宇文士及秦叔寶程知節七百戶安興貴安修仁唐儉竇軌屈突通蕭瑀封德彝劉義節六百戶錢九隴樊世興公孫武達李孟常段志玄龐卿惲張亮李藥師杜淹元仲文四百戶張長遜張平高李安遠李子和秦行師馬三寶三百戶十一月庚寅降宗室封郡王者並為縣公十二月癸酉親録囚徒是歲新羅龜茲突厥高麗百濟党項並遣使朝貢貞觀元年春正月乙酉改元辛丑燕郡王李藝據涇州反尋為左右所斬傳首京師庚午以僕射竇軌為益州大都督三月癸巳皇后親蠶尚書左僕射宋國公蕭瑀為太子少師丙午詔齊故尚書僕射崔季舒給事黃門侍郎郭遵尚書右丞封孝琰等昔仕鄴中名位通顯志存忠讜抗表極言無救社稷之亡遂見龍逢之酷其季舒子剛遵子雲孝琰子君遵並以門遭時譴淫刑濫及宜從褒奬特異常倫可免內侍量才別夏四月癸巳涼州都督長樂王幼良有罪伏誅六月辛巳尚書右僕射密國公封德彝薨壬辰太子少師宋國公蕭瑀為尚書左僕射是夏山東諸州大旱令所在賑恤無出今年租賦秋七月壬子吏部尚書齊國公長孫無忌為尚書右僕射八月戊戌貶侍中義興郡公高士廉為安州大都督戶部尚書裴矩卒是月關東及河南隴右沿邊諸州霜害秋稼九月辛酉命中書侍郎溫彥博尚書右丞魏徵等分往諸州賑恤中書令郢國公宇文士及為殿中監御史大夫檢校吏部尚書參預朝政安吉郡公杜淹署位十二月壬午上謂侍臣曰神仙事本虛妄空有其名秦始皇非分愛好遂為方士所詐乃遣童男女數千人隨徐福入海求仙藥方士避秦苛虐因留不歸始皇猶海側踟蹰以待之還至沙丘而死漢武帝為求仙乃將女嫁道術人事既無驗便行誅戮據此二事神仙不煩妄求也尚書左僕射宋國公蕭瑀坐事免戊申利州都督義安王孝常右武衛將軍劉德裕等謀反伏誅是歲關中饑至有鬻男女者二年春正月辛丑尚書右僕射齊國公長孫無忌為開府儀同三司徙封漢王恪為蜀王衛王泰為越王楚王祐為燕王復置六侍郎副六尚書事並置左右司郎中各一人前安州大都督趙王元景為雍州牧蜀王恪為益州大都督越王泰為揚州大都督二月丙戌靺鞨內屬三月戊申朔日有蝕之丁卯遣御史大夫杜淹巡關內諸州出御府金寶贖男女自賣者還其父母庚午大赦天下夏四月己卯詔骸骨暴露者令所在埋瘞丙申契丹內屬初詔天下州縣並置義倉夏州賊帥梁師都為其從父弟洛仁所殺以城降五月大雨雹六月庚寅皇子治生宴五品以上賜帛有差仍賜天下是日生者粟辛卯上謂侍臣曰君雖不君臣不可以不臣裴虔通煬帝舊左右也而親為亂首朕方崇奬敬義豈可猶使宰民訓俗詔曰天地定位君臣之義以彰卑高既陳人倫之道斯著是用篤厚風俗化成天下雖復時經治亂主或昏明疾風徑草芬芳無絶剖心焚體赴蹈如歸夫豈不愛七尺之軀重百年之命諒由君臣義重名教所先故能明大節於當時立清風於身後至如趙高之殞二世董卓之鴆弘農人神所疾異代同憤況凡庸小豎有懷凶悖遐觀典策莫不誅夷辰州刺史長蛇縣男裴虔通昔在隋代委質晉藩煬帝以舊邸之情特相愛幸遂乃志蔑君親潛圖弒逆密伺間隙招結羣醜長戟流矢一朝竊發天下之惡孰云可忍宜其夷宗焚首以彰大戮但年代異時纍逢赦令可特免極刑除名削爵遷配歡州秋七月戊申詔萊州刺史牛方裕絳州刺史薛世良廣州都督府長史唐奉義隋武牙郎將高元禮並於隋代俱蒙任用乃協契宇文化及構成弒逆宜依裴虔通除名配流嶺表太宗謂侍臣曰天下愚人好犯憲章凡赦宥之恩唯及不軌之輩古語曰小人之幸君子之不幸一歲再赦好人喑啞凡養稂莠者傷禾稼惠姦宄者賊良人昔文王作罰刑茲無赦又蜀先主嘗謂諸葛亮曰吾周旋陳元方鄭康成間每見啓告理亂之道備矣曾不語赦也夫小人者大人之賊故朕有天下已來不甚放赦今四海安靜禮義興行非常之恩施不可數將恐愚人常冀僥幸唯欲犯法不能改過八月甲戌朔幸朝堂親覽冤屈自是上以軍國無事每中視膳於西宮癸巳公卿奏曰依禮季夏之月可以居臺榭今隆暑未退秋霖方始宮中卑濕請營一閣以居之帝曰朕有氣病豈宜下濕若遂來請糜費良多昔漢文帝將起露臺而惜十家之産朕德不逮于漢帝而所費過之豈謂為民父母之道也竟不許是月河南河北大霜人饑九月丙午詔曰尚齒重舊先王以之垂範還章解組朝臣於是克終釋菜合樂之儀東膠西序之制養老之義遺文可覩朕恭膺大寶憲章故實乞言尊事彌切深衷然情存今古世踵澆季而策名就列或乖大體至若筋力將盡桑榆且迫徒竭夙興之勤未悟夜行之罪其有心驚止足行堪激勵謝事公門收骸閭里能以禮讓固可嘉焉內外文武羣官年高致仕抗表去職者參朝之日宜在本品見任之上丁未謂侍臣曰婦人幽閉深宮情實可愍隋氏末年求採無已至於離宮別館非幸御之所多聚宮人皆竭人財力朕所不取且灑掃之餘更何所用今將出之任求伉儷非獨以惜費亦人得各遂其性於是遣尚書左丞戴胄給事中杜正倫等於掖庭宮西門簡出之冬十月庚辰御史大夫安吉郡公杜淹卒戊子殺瀛州刺史盧祖尚十一月辛酉有事於圓丘十二月壬午黃門侍郎王圭為侍中三年春正月辛亥契丹渠帥來朝戊午謁太廟癸亥親耕籍田辛未司空魏國公裴寂坐事免二月戊寅中書令邢國公房玄齡為尚書左僕射兵部尚書檢校侍中蔡國公杜如晦為尚書右僕射刑部尚書檢校中書令永康縣公李靖為兵部尚書右丞魏徵為守祕書監參預朝政夏四月辛巳太上皇徙居大安宮甲午太宗始於太極殿聽政五月周王元方薨六月戊寅以旱親録囚徒遣長孫無忌房玄齡等祈雨於名山大川中書舍人杜正倫等往關內諸州慰撫又令文武官各上封事極言得失己卯大風折木秋八月己巳朔日有蝕之薛延陀遣使朝貢九月癸丑諸州置醫學冬十一月丙午西突厥高昌遣使朝貢庚申以並州都督李世績為通漢道行軍總管兵部尚書李靖為定襄道行軍總管以擊突厥十二月戊辰突利可汗來奔癸未杜如晦以疾辭位許之癸丑詔建義以來交兵之處為義士勇夫殞身戎陳者各立一寺命虞世南李伯藥褚亮顏師古岑文本許敬宗朱子奢等為之碑銘以紀功業是歲戶部奏言中國人自塞外來歸及突厥前後內附開四夷為州縣者男女一百二十餘萬口
