body:
  text: 舊唐書卷七十六列傳第二十六太宗諸子恆山王承乾楚王寬吳王恪子成王千里孫信安王褘濮王泰庶人祐蜀王愔蔣王惲越王貞子琅邪王沖紀王慎江王囂代王簡趙王福曹王明太宗十四子文德皇后生高宗大帝恆山王承乾濮王泰楊妃生吳王恪蜀王愔陰妃生庶人祐燕妃生越王貞江王囂韋妃生紀王慎楊妃生趙王福楊氏生曹王明王氏生莊王惲後宮生楚王寬代王簡恆山王承乾太宗長子也生於承乾殿因以名焉武德三年封恆山王七年徙封中山太宗即位為皇太子時年八歲性聰敏太宗甚愛之太宗居諒暗庶政皆令聽斷頗識大體自此太宗每行幸常令居守監國及長好聲色慢遊無度然懼太宗知之不敢見其迹每臨朝視事必言忠孝之道退朝後便與羣小褻狎宮臣或欲進諫者承乾必先揣其情便危坐斂容引咎自責樞機辨給智足飾非羣臣拜答不暇故在位者初皆以為明而莫之察也承乾先患足行甚艱難而魏王泰有當時美譽太宗漸愛重之承乾恐有廢立甚忌之泰亦負其材能潛懷奪嫡之計於是各樹朋黨遂成釁隙有太常樂人年十餘歲美姿容善歌舞承乾特加寵幸號曰稱心太宗知而大怒收稱心殺之坐稱心死者又數人承乾意泰告訐其事怨心逾甚痛悼稱心不已於宮中構室立其形像列偶人車馬於前令宮人朝暮奠祭承乾數至其處徘徊流涕仍於宮中起冢而葬之并贈官樹碑以申哀悼承乾自此託疾不朝參者輒逾數月常命戶奴數十百人專習伎樂學胡人椎髻翦綵為舞衣尋橦跳劍晝夜不絶鼓角之聲日聞於外時左庶子于志寧右庶子孔穎達受詔輔導志寧撰諫苑二十卷諷之穎達又多所規奏太宗並嘉之二人各賜帛百匹黃金十斤以勵承乾之意仍遷志寧為詹事未幾志寧以母憂去職承乾侈縱日甚太宗復起志寧為詹事志寧與左庶子張玄素數上書切諫承乾並不納又嘗召壯士左衛副率封師進及刺客張師政紇干承基深禮賜之令殺魏王泰不克而止尋與漢王元昌兵部尚書侯君集左屯衛中郎將李安儼洋州刺史趙節駙馬都尉杜荷等謀反將縱兵入西宮貞觀十七年齊王祐反於齊州承乾謂紇干承基曰我西畔宮牆去大內正可二十步來耳此間大親近豈可並齊王乎會承基亦外連齊王繫獄當死遂告其事太宗召承乾幽之別室命司徒長孫無忌司空房玄齡特進蕭瑀兵部尚書李績大理卿孫伏伽中書侍郎岑文本御史大夫馬周諫議大夫褚遂良等參鞫之事皆明驗廢承乾為庶人徙黔州元昌賜令自盡侯君集等咸伏誅其宮僚左庶子張玄素右庶子趙弘智令狐德棻中舍人蕭鈞並以材選用承乾既敗太宗引大義以讓之咸坐免十九年承乾卒於徙所太宗為之廢朝葬以國公之禮二子象厥象官至懷州別駕厥至鄂州別駕象子適之別有傳楚王寬太宗第二子也出繼叔父楚哀王智雲早薨貞觀初追封無後國除吳王恪太宗第三子也武德三年封蜀王授益州大都督以年幼不之官十年又徙封吳王十二年纍授安州都督及將赴職太宗書誡之曰吾以君臨兆庶表正萬邦汝地居茂親寄惟藩屏勉思橋梓之道善侔間平之德以義制事以禮制心三風十愆不可不慎如此則克固盤石永保維城外為君臣之忠內有父子之孝宜自勵志以勗日新汝方違膝下悽戀何已欲遺汝珍玩恐益驕奢故誡此一言以為庭訓高宗即位拜司空梁州都督恪母隋煬帝女也恪又有文武才太宗常稱其類己既名望素高甚為物情所向長孫無忌既輔立高宗深所忌嫉永徽中會房遺愛謀反遂因事誅恪以絶衆望海內寃之有子四人仁瑋琨並流于嶺表尋追封恪為鬱林王并為立廟又封仁為鬱林縣侯永昌元年授襄州刺史不知州事後改名千里天授後歷唐廬許衛蒲五州刺史時皇室諸王有德望者必見誅戮惟千里褊躁無才復數進獻符瑞事故則天朝竟免禍長安三年充嶺南安撫討擊使歷遷右金吾將軍中興初進封成王拜左金吾大將軍兼領益州大都督又追贈其父為司空三年又領廣州大都督五府經略安撫大使節愍太子誅武三思千里與其子天水王禧率左右數十人斫右延明門將殺三思黨與宗楚客紀處訥等及太子兵敗千里與禧等坐誅仍籍沒其家改姓蝮氏睿宗即位詔曰故左金吾衛大將軍成王千里保國安人克成忠義願除凶醜翻陷誅夷永言淪沒良深痛悼宜復舊班用加新寵可還舊官又令復姓瑋早卒中興初追封朗陵王子本名出繼蜀王愔景龍四年加銀青光祿大夫祕書少監開元十三年改封廣漢郡王太僕卿同正員薨琨則天朝歷淄衛宋鄭梁幽六州刺史有能名聖曆中嶺南獠反敕琨為招慰使安輯荒徼甚得其宜長安二年卒官贈司衛卿神龍初贈張掖郡王開元十七年以子禕貴贈工部尚書追封吳王中興初封歸政郡王歷宗正卿坐千里事貶南州司馬卒琨子禕禕少有志尚事母甚謹撫弟祗等以友愛稱景龍四年為太子僕兼徐州別駕加銀青光祿大夫少繼江王囂後封為嗣江王景雲元年復為德蔡衢等州刺史開元後纍轉蜀濮等州刺史政號清嚴人吏畏而服之漸見委任入為光祿卿遷將作大匠丁母憂去官起復授瀛州刺史又上表固請終制許之十二年改封信安郡王十五年服除拜左金吾衛大將軍朔方節度副大使知節度事兼攝御史大夫尋遷禮部尚書仍充朔方軍節度使先是石堡城為吐蕃所據侵擾河右敕禕與河西隴右議取之禕到軍總率士伍剋期攻之或曰此城據險又為吐蕃所惜今總軍深入賊必併力拒守事若不捷退則狼狽不如按軍持重以觀形勢禕曰人臣之節豈憚艱險必期衆寡不敵吾則以死繼之苟利國家此身何惜於是督率諸將倍道兼進併力攻之遂拔石堡城斬獲首級并獲糧儲器械其數甚衆仍分兵據守以遏賊路上聞之大悅始改石堡城為振武軍自是河隴諸軍遊奕拓地千餘里十九年契丹衙官可突干殺其王邵固率部落降于突厥玄宗遣忠王為河北道行軍元帥以討奚及契丹兩蕃以禕為副王既不行禕率戶部侍郎裴耀卿等諸副將分道統兵出於范陽之北大破兩蕃之衆擒其酋長餘黨竄入山谷軍還禕以功加開府儀同三司兼關內支度營田等使兼採訪處置使仍與二子官禕既有勳績執政頗害其功故其賞不厚甚為當時所歎二十二年遷兵部尚書入為朔方節度大使久之坐事出為衢州刺史俄歷滑懷二州刺史天寶初拜太子少師以年老仍聽致仕二年遷太子太師制出病薨年八十餘上聞而痛惜者久之禕居家嚴毅善訓諸子皆有令名三子峘嶧峴皆至達官別有傳祗神龍中封為嗣吳王景雲元年加銀青光祿大夫天寶十四載為東平太守安祿山反率衆渡河凶威甚盛河南陳留滎陽靈昌等郡皆陷於賊祗起兵勤王玄宗壯之十五載二月授祗靈昌太守又左金吾大將軍河南都知兵馬使其月又加兼御史中丞陳留太守持節充河南道節度採訪使本官如故五月詔以為太僕卿遣御史大夫虢王巨代之濮王泰字惠褒太宗第四子也少善屬文武德三年封宜都王四年進封衛王以繼衛懷王霸後貞觀二年改封越王授揚州大都督五年兼領左武候大都督並不之官八年除雍州牧左武候大將軍七年轉鄜州大都督十年徙封魏王遙領相州都督餘官如故太宗以泰好士愛文學特令就府別置文學館任自引召學士又以泰腰腹洪大趨拜稍難復令乘小輿至於朝所其寵異如此十二年司馬蘇勗以自古名王多引賓客以著述為美勸泰奏請撰括地志泰遂奏引著作郎蕭德言祕書郎顧胤記室參軍蔣亞卿功曹參軍謝偃等就府修撰十四年太宗幸泰延康坊宅因曲赦雍州及長安大辟罪已下免延康坊百姓無出今年租賦又賜泰府官僚帛有差十五年泰撰括地志功畢表上之詔令付祕閣賜泰物萬段蕭德言等咸加給賜物俄又每月給泰料物有踰於皇太子諫議大夫褚遂良上疏諫曰昔聖人制禮尊嫡卑庶謂之儲君道亞睿極其為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源而先王必本人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正體特須尊崇如當親者疏當尊者卑則佞巧之姦乘機而動私恩害公惑志亂國伏惟陛下功超邃古道冠百王發號施令為世作法一日萬機或未盡美臣職在諫諍無容靜默伏見儲君料物翻少魏王朝野見聞不以為是傳曰臣聞愛子教之以義方忠孝恭儉義方之謂昔漢竇太后及景帝遂驕恣梁孝王封四十餘城苑方三百里大營宮室復道彌望積財巨萬計出入警蹕小不得意發病而死宣帝亦驕恣淮陽憲王幾至於敗輔以退讓之臣僅乃獲免且魏王既新出閣伏願常存禮則言提其耳且示儉節自可在後月加歲增妙擇師傅示其成敗既敦之以謙儉又勸之以文學惟忠惟孝因而奬之道德齊禮乃為良器此所謂聖人之教不肅而成者也太宗又令泰入居武德殿侍中魏徵上奏曰伏見敕旨令魏王泰移居武德殿此殿在內處所寬閒參奉往來極為便近但魏王既是愛子陛下常欲其安全每事抑其驕奢不處嫌疑之地今移此殿便在東宮之西海陵昔居時人以為不可雖時與事異猶恐人之多言又王之本心亦不安息既能以寵為懼伏願成人之美明早是朔日或恐未得面陳愚慮有疑不敢寧寢輕干聽覽追深戰栗太宗並納其言時皇太子承乾有足疾泰潛有奪嫡之意招駙馬都尉柴令武房遺愛等二十餘人厚加贈遺寄以腹心黃門侍郎韋挺工部尚書杜楚客相繼攝泰府事二人俱為泰為結朝臣津通賂遺文武羣官各有附託自為朋黨承乾懼其凌奪陰遣人詐稱泰府典籤詣玄武門為泰進封事太宗省之其書皆言泰之罪狀太宗知其詐而捕之不獲十七年承乾敗太宗面加譴讓承乾曰臣貴為太子更何所求但為泰所圖特與朝臣謀自安之道不逞之人遂教臣為不軌之事今若以泰為太子所謂落其度內太宗因謂侍臣曰承乾言亦是我若立泰便是儲君之位可經求而得耳泰立承乾晉王皆不存晉王立泰共承乾可無恙也乃幽泰於將作監下詔曰朕聞生育品物莫大乎天地愛敬罔極莫重乎君親是故為臣貴於盡忠虧之者有罰為子在於行孝違之者必誅大則肆諸市朝小則終貽黜辱雍州牧相州都督左武候大將軍魏王泰朕之愛子實所鍾心幼而聰令頗好文學恩遇極於崇重爵位逾於寵章不思聖哲之誡自搆驕僭之咎惑讒諛之言信離間之說以承乾雖居長嫡久纏痾恙潛有代宗之望靡思孝義之則承乾懼其凌奪泰亦日增猜阻爭結朝士競引凶人遂使文武之官各有託附親戚之內分為朋黨朕志存公道義在無偏彰厥巨釁兩從廢黜非惟作則四海亦乃貽範百代可解泰雍州牧相州都督左武候大將軍降封東萊郡王太宗因謂侍臣曰自今太子不道藩王窺嗣者兩棄之傳之子孫以為永制尋改封泰為順陽王徙居均州之鄖鄉縣太宗後嘗持泰所上表謂近臣曰泰文辭美麗豈非才士我中心念泰卿等所知但社稷之計斷割恩寵責其居外者亦是兩相全也二十一年進封濮王高宗即位為泰開府置僚屬車服羞膳特加優異永徽三年薨于鄖鄉年三十有五贈太尉雍州牧諡曰恭文集二十卷二子欣徽欣封嗣濮王徽封新安郡王欣則天初陷酷吏獄貶昭州別駕卒子嶠本名餘慶中興初封嗣濮王景雲元年加銀青光祿大夫開元十二年為國子祭酒同正員以王守一妹壻貶邵州別駕移鄧州別駕後復其爵庶人祐太宗第五子也武德八年封宜陽王其年改封楚王貞觀二年徙封燕王纍轉豳州都督十年改封齊王授齊州都督其舅尚乘直長陰弘智謂祐曰王兄弟既多即上百年之後須得武士自助乃引其妻兄燕弘信謁祐祐接之甚厚多賜金帛令潛募劍士初太宗以子弟成長慮乖法度長史司馬必取正人王有虧違皆遣聞奏而祐溺情羣小尤好弋獵長史薛大鼎屢諫不聽太宗以大鼎輔導無方竟坐免權萬紀前為吳王恪長史有正直節以萬紀為祐長史以匡正之萬紀見祐非法常犯顏切諫有咱君梁猛彪者並以善騎射得幸於祐萬紀驟諫不納遂斥逐之而祐潛遣招延狎昵逾甚太宗慮其不能悔過數以書責讓祐萬紀恐並獲罪謂祐曰王帝之愛子陛下欲王改悔故加教訓若能飭躬引過萬紀請入朝言之祐因附表謝罪萬紀既至言祐必能改過太宗意稍解賜萬紀而諭之仍以祐前過敕書誥誡之祐聞萬紀勞勉而獨被責以為賣己意甚不平萬紀性又褊隘專以嚴急維持之城門外不許祐出所有鷹犬並令解放又斥出君猛彪不許與祐相見祐及君以此銜怒謀殺萬紀會事泄萬紀悉收繫獄而發驛奏聞十七年詔刑部尚書劉德威往按之並追祐及萬紀入京祐大懼俄而萬紀奉詔先行祐遣燕弘信兄弘亮追于路射殺之既殺萬紀君等勸祐起兵乃召城中男子年十五以上僞署上柱國開府儀同三司開官庫物以行賞驅百姓入城繕甲兵署官司其官有拓東王拓西王之號詔遣兵部尚書李績與劉威便道發兵討之祐每夜引弘亮等五人對妃宴樂以為得志戲笑之隙語及官軍弘亮曰不須憂也右手持酒啖左手刀拂之祐愛信弘亮聞之甚樂太宗手詔祐曰吾常誡汝勿近小人正為此也汝素乖誠德重惑邪言自延伊禍以取覆滅痛哉何愚之甚也遂乃為梟為獍忘孝忘忠擾亂齊郊誅夷無罪去維城之固就積薪之危壞盤石之親為尋戈之釁且夫背禮違義天地所不容棄父逃君人神所共怒往是吾子今為國讎萬紀存為忠烈死不妨義汝生為賊臣死為逆鬼彼則嘉聲不隤爾則惡跡無窮吾聞鄭叔漢戾並為猖獗豈期生子乃自為之吾所以上慚皇天下愧后土歎惋之甚知復何云太宗題書畢為之灑泣時李績等兵未至齊境而青淄等數州兵並不從祐之命祐又傳檄諸縣亦不從或勸祐虜城中子女走入豆子為盜計未決而兵曹杜行敏謀將執祐兵士多願從是夜乃鑿垣而入祐與弘亮等五人披甲控弦入室以自固行敏列兵圍之謂祐曰昔為帝子今乃國賊行敏為國討賊更無所顧王不速降當為煨燼命薪草欲積而焚之祐遂出就擒餘黨悉伏誅行敏送祐至京師賜死於內省貶為庶人國除尋以國公禮葬之蜀王愔太宗第六子也貞觀五年封梁王七年授襄州刺史十年改封蜀王轉益州都督十三年賜實封八百戶除岐州刺史愔常非理毆擊所部縣令又畋獵無度數為非法太宗怒曰禽獸調伏可以馴擾於人鐵石鐫鍊可為方圓之器至如愔者曾不如禽獸鐵石乎乃削封邑及國官之半貶為虢州刺史二十三年加實封滿千戶愔在州數遊獵不避禾稼深為百姓所怨典軍楊道整叩馬諫愔曳而捶之永徽元年為御史大夫李乾祐所劾高宗謂荊王元景等曰先朝櫛風沐雨平定四方遠近肅清車書混一上天降禍奄棄萬邦朕纂承洪業懼均馭朽與王共戚同憂為家為國蜀王畋獵無度侵擾黎庶縣令典軍無罪被罰阿諛即喜忤意便嗔如此居官何以共理百姓歷觀古來諸王若能動遵禮度則慶流子孫違越條章則誅不旋踵愔為法司所劾朕實恥之帝又引楊道整勞勉之拜為匡道府折衝都尉賜絹五十匹貶愔為黃州刺史四年坐與恪謀逆黜為庶人徙居巴州尋改為涪陵王乾封二年薨咸亨初復其爵土贈益州大都督陪葬昭陵諡曰悼封子璠為嗣蜀王永昌年配流歸誠州而死神龍初以吳王恪孫朗陵王瑋子為嗣蜀王蔣王惲太宗第七子也貞觀五年封郯王八年授洺州刺史十年改封蔣王安州都督賜實封八百戶二十三年加實封滿千戶永徽三年除梁州都督惲在安州多造器用服玩及將行有遞車四百兩州縣不堪其勞為有司所劾帝特宥之後歷遂相二州刺史上元年有人詣闕誣告惲謀反惶懼自殺贈司空荊州大都督陪葬昭陵子煒嗣歷沂州刺史垂拱中為則天所害子銑早卒神龍初封銑子紹宗為嗣蔣王景龍二年加銀青光祿大夫開元初為太子家令同正員卒子欽福嗣為率更令同正員天寶初削官於錦州安置十二載為南郡長史同正惲子煌蔡國公煌孫之芳幼有令譽頗善五言詩宗室推之開元末為駕部員外郎天寶十三載安祿山奏為范陽司馬及祿山起逆自拔歸西京授右司郎中歷工部侍郎太子右庶子廣德元年兵革未清吐蕃又犯邊侵軼原會乃遣之芳兼御史大夫使吐蕃被留境上二年而歸除禮部尚書尋改太子賓客惲子休道道子琚本名思順中興封嗣趙王加銀青光祿大夫開元十二年改封中山郡王右領軍將軍越王貞太宗第八子也貞觀五年封漢王七年授徐州都督十年改封原王尋徙封越王拜揚州都督賜實封八百戶十七年轉相州刺史二十三年加實封滿千戶永徽四年授安州都督咸亨中復轉相州刺史貞少善騎射頗涉文史兼有吏幹所在或偏受讒言官僚有正直者多被貶退又縱諸僮豎侵暴部人由是人伏其才而鄙其行則天臨朝加太子太傅除蔡州刺史自則天稱制貞與韓王元嘉魯王靈夔霍王元軌及元嘉子黃國公撰靈夔子范陽王藹元軌子江都王緒並貞長子博州刺史琅邪王沖等密有匡復之志垂拱四年七月撰作謬書與貞云內人病漸重恐須早療若至今冬恐成痼疾宜早下手仍速相報是歲則天以明堂成將行大享之禮追皇宗赴集元嘉因遞相語云大享之際神皇必遣人告諸王密因大行誅戮皇家子弟無遺種矣撰遂詐為皇帝璽書與沖云朕被幽縶王等宜各救拔我也沖在博州又僞為皇帝璽書云神皇欲傾李家之社稷移國祚於武氏遂命長史蕭德琮等召募士卒分報韓魯霍越紀等五王各令起兵應接以赴神都初沖與諸王連謀及沖先發而莫有應者惟貞以父子之故獨舉兵以應之尋遣兵破上蔡縣聞沖敗恐懼索鎖欲自拘馳驛詣闕謝罪會其所署新蔡令傅延慶得勇士二千餘人貞遂有拒敵之意乃宣言於其衆曰琅邪王已破魏相數州聚兵至二十萬朝夕即到爾宜勉之徵屬縣兵至七千人分為五營貞自為中營署其所親汝陽縣丞裴守德為大將軍內營總管趙成美為左中郎將押左營閭弘道為右中郎將押右營安摩訶為郎將後軍總管王孝志為右將軍前軍總管又以蔡州長史韋慶禮為銀青光祿大夫行其府司馬凡署九品已上官五百餘人令道士及僧轉讀諸經以祈事集家僮戰士咸帶符以辟兵其所署官皆迫脅見從本無鬬志惟裴守德實與之同守德驍勇善騎射貞將起事便以女良鄉縣主妻之而委以爪牙心腹之任則天命左豹韜衛大將軍麴崇裕為中軍大總管夏官尚書岑長倩為後軍大總管率兵十萬討之仍令鳳閣侍郎張光輔為諸軍節度於是制削貞及沖屬籍改姓虺氏崇裕等軍至蔡州城東四十里貞命少子規及裴守德拒戰規等兵潰而歸貞大懼閉門自守裴守德排閣入問王安在意欲殺貞以自購也官軍進逼州城貞家僮悉力衛貞曰事既如此豈得受戮辱當須自為計貞乃飲藥而死家僮方始一時散捨仗就擒規亦縊其母自殺守德攜良鄉縣主亦同縊于別所麴崇裕斬貞父子及裴守德等傳首東都梟於闕下貞起兵凡二十日而敗貞之在蔡州數奏免所部租賦以結人心家僮千人馬數千匹外託以畋獵內實習武備嘗遊于城西水門橋臨水自鑒不見其首心甚惡之未幾而及禍神龍初追復爵土與子沖俱復舊姓初貞將起兵作書與壽州刺史駙馬都尉趙瓌曰佇總義兵來入貴境瓌甚喜復許率兵相應瓌妻常樂長公主高祖第七女和思皇后之母也謂其使曰為我報越王與其進不與其退爾諸王若是男兒不應至許時尚未舉動我常見耆老云隋文帝將篡奪周室尉遲迥是周家外甥猶能起兵相州連結突厥天下聞風莫不響應況爾諸王並國家懿親宗社是託豈不學尉遲迥感恩效節捨生取義耶夫為臣子若救國家則為忠不救則為逆諸王必須以匡救為急不可虛生浪死取笑於後代及貞等敗瓌與公主亦伏誅沖貞長子也好文學善騎射歷密濟博三州刺史皆有能名初沖自博州募得五千餘人欲渡河攻濟州先取武水縣縣令郭務悌赴魏州請援魏州莘縣令馬玄素領兵千七百人邀之于路恐力不敵先入武水城閉門拒守沖乃令積草車上放火燒南門擬乘火突入火之未起南風甚急及火已燃遽回為北風未至城門燒草已甚沖軍由是沮氣有堂邑丞董玄寂為沖統帥兵仗及沖擊武水玄寂曰琅邪王與國家交戰此乃反也沖聞之斬玄寂以徇兵衆懼而散入草澤不可禁止惟有家僮左右不過數十而已乃卻走入博州城為守門者所殺則天命左金吾將軍丘神績為清平道行軍大總管以討沖兵未至沖已死傳首東都梟於闕下沖起兵凡七日而敗沖三弟蒨封常山公歷常州別駕坐與父兄連謀伏誅溫以告其朋黨得實減死流嶺南尋卒神龍初侍中敬暉等以沖父子翼戴皇家義存社稷請復其官爵武三思令昭容上官氏代中宗手詔不許開元四年詔追復爵土令備禮改葬太常奏諡議曰故越王貞往者願匡宗社夙懷誅呂之謀乃心王國用擊非劉之議以茲獲戾上悼聖心謹按諡法死不忘君曰敬請諡曰敬從之五年下詔曰九族以親克敦其教百代必祀允竟厥德故蔡州刺史越王貞執心不回臨事能斷粵自藩國勤于王家弘道之後寶圖將缺懷劉章之輔漢追鄭武之翊周遂能奮不顧身率先唱義雖英謀未克而忠節居多嗣絶國除年踰二紀奠享淪廢甚為憫焉永言興繼式備典冊其封貞姪孫故許王男左監門衛將軍夔國公琳為嗣越王以奉其祀仍官為立碑琳尋卒國除紀王慎太宗第十子也貞觀五年封申王七年授秦州都督十年改封紀王賜實封八百戶十七年遷襄州刺史以善政聞璽書勞勉百姓為之立碑二十三年加實封滿千戶永徽元年拜左衛大將軍二年授荊州都督纍除邢州刺史文明元年加授太子太師轉貝州刺史慎少好學長於文史皇族中與越王貞齊名時人號為紀越初貞將起事慎不肯同謀及貞敗慎亦下獄臨刑放免改姓虺氏仍載以檻車配流嶺表道至蒲州而卒慎長子和州刺史東平王續最知名早卒次子沂州刺史義陽王琮楚國公睿遂州別駕襄郡公秀廣化郡公獻建平郡公欽等五人垂拱中並遇害家屬徙嶺南中興初追復官爵令以禮改葬封慎少子鐵誠為嗣紀王後改名澄景雲元年加銀青光祿大夫開元初歷德瀛冀三州刺史左驍衛將軍薨子行同嗣天寶中為右贊善大夫同正員江王囂太宗第十一子也貞觀五年受封六年薨諡曰殤代王簡太宗第十二子也貞觀五年受封其年薨無後國除趙王福太宗第十三子也貞觀十三年受封出後隱太子建成十八年授秦州都督賜實封八百戶二十三年加右衛大將軍纍授梁州都督咸亨元年薨贈司空并州都督陪葬昭陵中興初封蔣王惲孫思順為嗣趙王曹王明太宗第十四子貞觀二十一年受封二十三年賜實封八百戶尋加滿千戶顯慶中授梁州都督後歷虢蔡蘇三州刺史詔令繼巢剌王元吉後永崇中坐與庶人賢通謀降封零陵王徙於黔州都督謝祐希旨逼脅令自殺帝深悼之黔府官僚咸坐免職景雲元年明喪柩歸于京師陪葬昭陵有二子南州別駕零陵王俊黎國公傑垂拱中並遇害中興初封傑子胤為嗣曹王胤叔父備自南州還又封備為嗣曹王衛尉少卿同正員胤遂停封後備招慰忠州叛獠沒于賊又封胤為王銀青光祿大夫右武衛將軍卒子戢嗣左衛率府中郎將卒子臯嗣臯自有傳史臣曰太宗諸子吳王恪濮王泰最賢皆以才高辨悟為長孫無忌忌嫉離間父子遽為豺狼而無忌破家非陰禍之報歟武后喪王室潛移龜鼎越王貞父子痛憤義不圖全毀室之悲鴟梟之詩傷矣比齊祐之妄作豈同年而語哉贊曰子弟作藩磐石維城驕侈取敗身無令名沖撰憤發視死如生承乾齊祐愚弟庸兄
