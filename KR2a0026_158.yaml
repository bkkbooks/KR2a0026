body:
  text: 舊唐書卷一百五十四列傳第一百四孔巢父從子戡戣戢許孟容呂元膺劉栖楚張宿熊望柏耆孔巢父冀州人字弱翁父如珪海州司戶參軍以巢父贈工部郎中巢父早勤文史少時與韓準裴政李白張叔明陶沔隱於徂來山時號竹溪六逸永王璘起兵江淮聞其賢以從事辟之巢父知其必敗側身潛遁由是知名廣德中李季卿為江淮宣撫使薦巢父授左衞兵曹參軍大曆初澤潞節度使李抱玉奏為賓幕累授監察御史轉殿中檢校庫部員外郎出授歸州刺史建中初涇原節度留後孟皡表巢父試祕書少監兼御史中丞行軍司馬尋拜汾州刺史入為諫議大夫出為潭州刺史湖南觀察使未行會普王為荊襄副元帥以巢父為元帥府行軍司馬兼御史大夫尋屬涇師之難從德宗幸奉天遷給事中河中陝華等州招討使累獻破賊之謀德宗甚賞之尋兼御史大夫充魏博宣慰使巢父博辯多智對田悅之衆陳逆順利害君臣之道士衆欣悚喜抃曰不圖今日復覩王化及就宴悅酒酣自矜其騎射之藝拳勇之略因曰若蒙見用無堅不摧巢父謂之曰若如公言而不早歸國者但為一好賊耳悅曰為賊既曰好賊為臣當作功臣巢父曰國方有虞待子而息悅起謝焉悅背叛日久其下厭亂且喜巢父之至數日田承嗣之子緒以失職怨望因人心之搖動遂構謀殺悅而與大將邢曹俊等稟命於巢父巢父因其衆意令田緒權知軍務以紓其難興元元年李懷光擁兵河中七月復以巢父兼御史大夫充宣慰使既傳詔旨懷光以巢父嘗使魏博田悅死於帳下恐禍及又朔方蕃渾之衆數千皆在行列頗驕悖不肅聞罷懷光兵權時懷光素服待命巢父不止之衆咸忿恚咄嗟曰太尉盡無官矣方宣詔讙譟懷光亦不禁止巢父守盈並遇害上聞之震悼贈尚書左僕射仍詔收河中日備禮葬祭賜其家布帛米粟甚厚仍授一子正員官從子戡戣戢戡巢父兄岑父之子方嚴有家法重然諾尚忠義盧從史鎮澤潞辟為書記從史寖驕與王承宗田緒陰相連結欲效河朔事以固其位戡每秉筆至不軌之言極諫以為不可從史怒戡歲餘謝病歸洛陽李吉甫鎮揚州召為賓佐從史知之上疏論列請行貶逐憲宗不得已授衞尉丞分司洛陽初貞元中藩帥誣奏從事者皆不驗理便行降黜及戡詔下給事中呂元膺執之上令中使慰喻元膺制書方下戡不調而卒贈駕部員外郎戣字君嚴登進士第鄭滑節度使盧羣辟為從事羣卒命戣權掌留務監軍使以氣凌之戣無所屈降入為侍御史累轉尚書郎元和初改諫議大夫侃然忠讜有諫臣體上疏論時政四條帝意嘉納六年十月內官劉希光受將軍孫璹賂二十萬貫以求方鎮事敗賜希光死時吐突承璀以出軍無功諫官論列坐希光事出為淮南監軍試太子通事舍人李涉知上待承璀意未衰欲投匭上疏論承璀有功希光無事久委心腹不宜遽棄戣為匭使得涉副章不受面詰責之涉乃進疏於光順門戣極論其與中官交結言甚激切詔貶涉為陝州司倉倖臣聞之側目人為危之戣高步公卿間以方嚴見憚俄兼太子侍讀遷吏部侍郎轉左丞九年信州刺史李位為州將韋岳讒譖於本使監軍高重謙言位結聚術士以圖不軌追位至京師鞫於禁中戣奏曰刺史得罪合歸法司按問不合劾於內仗乃出付御史臺戣與三司訊鞫得其狀位好黃老道時修齋籙與山人王恭合鍊藥物別無逆狀以岳誣告決殺貶位建州司馬時非戣論諫罪在不測人士稱之愈為中官所惡尋出為華州刺史潼關防禦等使入為大理卿改國子祭酒十二年嶺南節度使崔詠卒三軍請帥宰相奏擬皆不稱旨因入對上謂裴度曰嘗有上疏論南海進蚶菜者詞甚忠正此人何在卿第求之度退訪之或曰祭酒孔戣嘗論此事度徵疏進之即日授廣州刺史兼御史大夫嶺南節度使戣剛正清儉在南海請刺史俸料之外絕其取索先是帥南海者京師權要多託買南人為奴婢戣不受託至郡禁絕賣女口先是準詔禱南海神多令從事代祠戣每受詔自犯風波而往韓愈在潮州作詩以美之時桂管經略使楊旻桂仲武裴行立等騷動生蠻以求功伐遂至嶺表累歲用兵唯戣以清儉為理不務邀功交廣大理穆宗即位召為吏部侍郎長慶中或告戣在南海時家人受賂上不之責改右散騎常侍二年轉尚書左丞累請老詔以禮部尚書致仕優詔褒美仍令所司歲致羊酒如漢禮徵士故事長慶四年正月卒時年七十三子遵孺溫裕皆登進士第大中已後迭居顯職溫裕位京兆尹天平軍節度使遵孺子緯自有傳戢字方舉戣母弟也以季父巢父死難德宗嘉其忠詔與一子正員官因授戢修武尉以長兄戡未仕固乞迴授舉明經登第判入高等授祕書省校書郎陽翟尉入拜監察御史轉殿中分司東都時昭義節度判官徐玟以狡慝助成從史之惡從史既得罪孟元陽為昭義節度復欲用玟為賓佐戢遂牒澤潞收玟以俟命然後列狀上聞竟流玟播州轉侍御史庫部員外郎初涇師之亂朱泚署彭偃為舍人至是偃子充符為鄜坊從事或薦其才執事者召至京師戢謂京兆尹裴武曰朱泚為偽詔指斥乘輿皆彭偃之詞也悖逆之子不能鳥竄獸伏乃違道以干譽子盍效季孫行父之逐莒僕以勉事君者武即日逐充符遷京兆尹出為汝州刺史大理卿出為潭州刺史湖南觀察使時兄戣為嶺南兄弟皆居節鎮朝野榮之入為右散騎常侍拜京兆尹時累月亢旱深軫聖情戢自禱雨於曲池是夕大雨文宗甚悅詔兼御史大夫大和三年正月卒贈工部尚書子溫業登進士第大中後歷位通顯溫業子晦許孟容字公範京兆長安人也父鳴謙究通易象官至撫州刺史贈禮部尚書孟容少以文詞知名舉進士甲科後究王氏易登科授祕書省校書郎趙贊為荊襄等道黜陟使表為判官貞元初徐州節度使張建封辟為從事四遷侍御史李納屯兵境上揚言入寇建封遣將吏數輩告諭不聽於是遣孟容單車詣納為陳逆順禍福之計納即日發使追兵因請修好遂表孟容為濠州刺史無幾德宗知其才徵為禮部員外郎有公主之子請補弘文崇文館諸生孟容舉令式不許主訴於上命中使問狀孟容執奏竟得遷本曹郎中德宗降誕日御麟德殿命孟容等登座與釋老之徒講論十四年轉兵部郎中未滿歲遷給事中十七年夏好畤縣風雹傷麥上命品官覆視不實詔罰京兆尹顧少連已下敕出孟容執奏曰府縣上事不實罪止奪俸停官其於弘宥已是殊澤但陛下使品官覆視後更擇憲官一人再令驗察覆視轉審隱欺益明事宜觀聽法歸綱紀臣受官中謝日伏請詔敕有須詳議者則乞停留晷刻得以奏陳此敕既非急宣可以少駐詔雖不許公議是之十八年浙江東道觀察使裴肅卒以攝副使齊總為衢州刺史時總為肅剝下進奉以希恩遽授大郡物議喧然詔出孟容執奏曰陛下比者以兵戎之地或有不獲已超授者今衢州無他虞齊總無殊績忽此超授羣情驚駭總是浙東判官今詔敕稱權知留後攝都團練副使向來無此敕命便用此詔尤恐不可若總必有可錄陛下須要酬勞即明書課最超一兩資與改今舉朝之人不知總之功能衢州浙東大郡總自大理評事兼監察御史授之使遐邇不甘兇惡騰口如臣言不切乞陛下暫停此詔密使人聽察必賀聖朝無私今齊總詔謹隨狀封進尋有諫官論列乃留中不下德宗召孟容對於延英諭之曰使百執事皆如卿朕何憂也自給事中袁高論盧杞後未嘗有可否及聞孟容之奏四方皆感上之聽納嘉孟容之當官十九年夏旱孟容上疏曰臣伏聞陛下數月已來齋居損膳為兆庶心疲又敕有司走於羣望牲於百神而密雲不雨首種未入豈觴醪有闕祈祝非誠為陰陽適然豐歉前定何聖意精至甘澤未答也臣歷觀自古天人交感事未有不由百姓利病之急者切者邦家教令之大者遠者京師是萬國所會強幹弱枝自古通規其一年稅錢及地租出入一百萬貫臣伏冀陛下即日下令全放免之其次三分放二且使旱涸之際免更流亡若播種無望徵斂如舊則必愁怨遷徙不顧墳墓矣臣愚以為德音一發膏澤立應變災為福期在斯須戶部所收掌錢非度支歲計本防緩急別用今此炎旱直支一百餘萬貫代京兆百姓一年差科實陛下巍巍睿謀天下鼓舞歌揚者也復更省察庶政之中有流移征防當還而未還者徒役禁錮當釋而未釋者逋懸饋送當免而未免者沉滯鬱抑當伸而未伸者有一於此則特降明命令有司條列三日內聞奏其當還當釋當免當伸者下詔之日所在即時施行臣愚以為如此而神不監歲不稔古未之有事雖不行物議嘉之貞元末坐裴延齡李齊運等讒謗流貶者動十數年不量移故因旱歉孟容奏此以諷然終貞元世罕有遷移者孟容以諷諭太切改太常少卿元和初遷刑部侍郎尚書右丞四年拜京兆尹賜紫神策吏李昱假貸長安富人錢八千貫滿三歲不償孟容遣吏收捕械繫剋日命還之曰不及期當死自興元已後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益縱橫府縣不能制孟容剛正不懼以法繩之一軍盡驚冤訴於上立命中使宣旨令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪強錢未盡輸昱不可得上以其守正許之自此豪右斂迹威望大震改兵部侍郎俄以本官權知禮部貢舉頗抑浮華選擇才藝出為河南尹亦有威名俄知禮部選事徵拜吏部侍郎會十年六月盜殺宰相武元衡幷傷議臣裴度時淮夷逆命兇威方熾王師問罪未有成功言事者繼上章疏請罷兵是時盜賊竊發人情甚惑獨孟容詣中書雪涕而言曰昔漢廷有一汲黯姦臣尚為寢謀今主上英明朝廷未有過失而狂賊敢爾無狀寧謂國無人乎然轉禍為福此其時也莫若上聞起裴中丞為相令主兵柄大索賊黨窮其姦源後數日度果為相而下詔行誅時孟容議論人物有大臣風彩由太常卿為尚書左丞奉詔宣慰汴宋陳許河陽行營諸軍俄拜東都留守元和十三年四月卒年七十六贈太子少保諡曰憲孟容方勁富有文學其折衷禮法考詳訓典甚堅正論者稱焉而又好推轂樂善拔士士多歸之呂元膺字景夫鄆州東平人曾祖紹宗右拾遺祖霈殿中侍御史父長卿右衞倉曹參軍以元膺贈祕書監元膺質度瓌偉有公侯之器建中初策賢良對問第授同州安邑尉同州刺史侯鐈聞其名辟為長春宮判官屬蒲賊侵軼鐈失所元膺遂潛跡不務進取貞元初論惟明節制渭北延在賓席自是名達於朝廷惟明卒王栖曜代領其鎮德宗俾栖曜留署使職咨以軍政累轉殿中侍御史徵入真拜本官轉侍御史丁繼母憂服闋除右司員外郎出為蘄州刺史頗著恩信嘗歲終閱郡獄囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縱之與為期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者由是羣盜感義相引而去元和初徵拜右司郎中兼侍御史知雜事遷諫議大夫給事中規諫駁議大舉其職及鎮州王承宗之叛憲宗將以吐突承璀為招討處置使元膺與給事中穆質孟簡兵部侍郎許孟容等八人抗論不可且曰承璀雖貴寵然內臣也若為帥總兵恐不為諸將所伏指諭明切憲宗納之為改使號然猶專戎柄無功而還出為同州刺史及中謝上問時政得失元膺論奏辭氣激切上嘉之翌日謂宰相曰元膺有讜言直氣宜留在左右使言得失卿等以為何如李藩裴賀曰陛下納諫超冠百王乃宗社無疆之休臣等不能廣求端士又不能數進忠言孤負聖心合當罪戾請留元膺給事左右尋兼皇太子侍讀賜以金紫尋拜御史中丞未幾除鄂岳觀察使入為尚書左丞度支使潘孟陽與太府卿王遂迭相奏論孟陽除散騎常侍遂為鄧州刺史皆假以美詞元膺封還詔書請明示枉直江西觀察使裴堪奏虔州刺史李將順贓狀朝廷不覆按遽貶將順道州司戶元膺曰廉使奏刺史贓罪不覆檢即謫去縱堪之詞足信亦不可為天下法又封詔書請發御史按問宰臣不能奪代權德輿為東都留守檢校工部尚書兼御史大夫都畿防禦使舊例留守賜旗甲與方鎮同及元膺受任不賜朝論以淮西用兵特用元膺守洛不宜削其儀制以沮威望諫官論列援華汝壽三州例上曰此數處並宜不賜留守不賜旗甲自元膺始十年七月鄆州李師道留邸伏甲謀亂初師道於東都置邸院兵諜雜以往來吏不敢辨因吳元濟北犯郊畿多警防禦兵盡戍伊闕師道伏甲百餘於邸院將焚宮室而肆殺掠已烹牛饗衆明日將出會小將李再興告變元膺追兵伊闕圍之半日無敢進攻者防禦判官王茂元殺一人而後進或有毀其墉而入者賊衆突出圍兵奔駭賊乃團結以其孥偕行出長夏門轉掠郊墅奪牛馬東濟伊水望山而去元膺誡境上兵重購以捕之數月有山棚賣鹿於市賊過山棚乃召集其黨引官兵圍於谷中盡獲之窮理其魁乃中岳寺僧圓淨年八十餘嘗為史思明將偉悍過人初執之使折其脛鎚之不折圓淨罵曰脚猶不解折乃稱健兒乎自置其足教折之臨刑歎曰誤我事不得使洛城流血死者凡數十人留守防禦將二人都亭驛卒五人甘水驛卒三人皆潛受其職署而為之耳目自始謀及將敗無知者初師道多買田於伊闕陸渾之間凡十餘處故以舍山棚而衣食之有訾嘉珍門察者潛部分之以屬圓淨以師道錢千萬偽理佛寺期以嘉珍竊發時舉火於山中集二縣山棚人作亂及窮按之嘉珍門察皆稱害武元衡者元膺以聞送之上都賞告變人楊進李再興錦綵三百匹宅一區授之郎將元膺因請募山河子弟以衞宮城從之盜發之日都城震恐留守兵寡弱不可倚而元膺坐皇城門指使部分氣意自若以故居人帖然數年改河中尹充河中節度等使時方鎮多事姑息元膺獨以堅正自處監軍使洎往來中貴無不敬憚入拜吏部侍郎因疾固讓改太子賓客元和十五年二月卒年七十二贈吏部尚書元膺學識深遠處事得體正色立朝有台輔之望初遊京師時故相齊映謂人曰吾不及識婁郝殆斯人之類乎其業官行己始終無缺云劉栖楚出於寒微為吏鎮州王承宗甚奇之後有薦於李逢吉自鄧掾擢為拾遺性果敢逢吉以為鷹犬之用欲中傷裴度及殺李紳敬宗即位畋遊稍多坐朝常晚栖楚出班以額叩龍墀出血苦諫曰臣歷觀前王嗣位之初莫不躬勤庶政坐以待旦陛下即位已來放情嗜寢樂色忘憂安臥宮闈日晏方起西宮密邇未過山陵鼓吹之聲日喧於外伏以憲宗皇帝大行皇帝皆是長君恪勤庶政四方猶有叛亂陛下運當少主即位未幾惡德布聞臣慮福祚之不長也臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀久之不已宰臣李逢吉出位宣曰劉栖楚休叩頭候詔旨栖楚捧首而起因更陳論搕頭見血上為之動容以袖連揮令出栖楚又云不可臣奏臣即碎首死中書侍郎牛僧孺復宣示而出敬宗為之動容無何遷起居郎至諫議俄又宣授刑部侍郎丞郎宣授未之有也改京兆尹摧抑豪右甚有鈎距人多比之於西漢趙廣漢者後恃權寵常以詞氣凌宰相韋處厚遂出為桂州觀察使逾年卒於任時大和元年九月張宿者布衣諸生也憲宗為廣陵王時因軍使張茂宗薦達出入邸第及上在東宮宿時入謁辨譎敢言洎監撫之際驟承顧擢授左拾遺以舊恩數召對禁中機事不密貶郴州郴縣丞十餘年徵入歷贊善大夫左補闕比部員外郎宰相李逢吉惡之數於上前言其狡譎不可保信乃用為濠州刺史制下宿自理乞留乃追制上欲以為諫議大夫逢吉奏曰諫議職重當以能可否朝政者為之宿細人不足以汙賢者位陛下必須用宿請先去臣即可上不悅又逢吉與裴度是非不同上方委度討伐乃出逢吉為劍南東川節度乃用宿權知諫議大夫俄而內使宣授初宰相崔羣王涯奏曰諫議大夫前時亦有拔自山林起於卒伍者其例則少用皆有由或道義彰明不求聞達或山林卓異出於羣萃以此選求是愜公議或事迹未著恩由一時雖有例超升即時議未允宿本非文辭入用望實稍輕驟加不次之榮翻恐以身為累臣等所以累有論諫依資且與郎中事冀適中非於此人情有厚薄請授職方郎中上命如初羣等乃請權知尋又宣授宿怨執政擯己頗加讒毀依附皇甫鎛等傷害清正之士陰事中要以圖進取十三年正月充淄青宣慰使至東都暴病卒於是正人相賀詔贈祕書監熊望者登進士第粗有文詞而性憸險有口辯往往得遊公卿間率以大言詭意指抉時政既由此而得進士第務進不已而京兆尹劉栖楚以不次驟居清貫廣樹朋黨門庭無晝夜填委不息望出入栖楚之門為伺密機陰佐計畫人無知者昭愍嬉遊之隙學為歌詩以翰林學士崇重不可褻狎乃議別置東頭學士以備曲宴賦詩令採卑官才堪任學士者為之栖楚以望名薦送事未行而昭愍崩文宗即位韋處厚輔政大去姦黨既逐栖楚又詔曰孔門高懸百行由至順者其身必榮朝廷廣設衆官踐正途者其道必達前鄉貢進士熊望因緣薄伎偷冀褻幸營居中之密職擾惑朝經鼓逼下之囂聲因依邪隙及衆議波湧累月不寧司門驗繻累月至四考覆謬妄乃非坦途朕大啟康莊以端羣望俾示投荒之典用正向方之流可漳州司戶柏耆者將軍良器之子素負志略學縱橫家流會王承宗以常山叛朝廷厭兵欲以恩澤撫之耆於蔡州行營以畫干裴度請以朝旨奉使鎮州乃自處士授左拾遺既見承宗以大義陳說承宗泣下請質二男獻兩郡由是知名元和十五年王承元歸國移鎮滑州朝廷賜成德軍賞錢一百萬貫令諫議大夫鄭覃宣慰軍人賞錢未至浩浩然騰口穆宗詔耆往諭旨耆至令承元集三軍宣導上旨衆心乃安轉兵部郎中大和初遷諫議大夫俄而李同捷叛兩河藩帥加兵滄德宿師於野連年同捷窮蹙求降耆既宣諭訖與節度使李祐謀耆乃帥數百騎入滄州取同捷赴京滄德平諸將害耆邀功爭上表論列文宗不獲已貶循州司戶判官沈亞之貶虔州南康尉內官馬國亮又奏耆於同捷處取婢九人再命長流愛州尋賜死史臣曰人臣事君犯顏匡政不避死亡之誅議者以為徇名臣惡其訐也如許京兆之劾軍吏呂尚書之封詔書詞義可觀聳動人聽以為沽激傷善何多而栖楚張宿之徒鷹犬下材為人鳴吠誠可醜也柏耆恃縱橫之算欲俯拾卿相忘身蹈利旋踵而誅宜哉巢父使不辱命志在致君遭罹喪亂竟陷虎吻而戣戢諸子世載忠貞大中之後鬱為昌族為善之利豈虛言哉贊曰君子重義小人殉利巢殞耆誅其道即異許呂封駁照耀黃扉死而可作吾誰與歸
