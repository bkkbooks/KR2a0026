body:
  text: 舊唐書卷七十八列傳第二十八于志寧高季輔張行成族孫易之昌宗于志寧雍州高陵人周太師燕文公謹之曾孫也父宣道隋內史舍人志寧大業末為冠氏縣長時山東羣盜起乃棄官歸鄉里高祖將入關率羣從於長春宮迎接高祖以其有名於時甚加禮遇授銀青光祿大夫太宗為渭北道行軍元帥召補記室與殷開山等參贊軍謀及太宗為秦王天策上將志寧纍授天策府從事中郎每侍從征伐兼文學館學士貞觀三年纍遷中書侍郎太宗命貴臣內殿宴怪不見志寧或奏曰敕召三品已上志寧非三品所以不來太宗特令預宴即加授散騎常侍行太子左庶子纍封黎陽縣公時議者欲立七廟以涼武昭王為始祖房玄齡等皆以為然志寧獨建議以為武昭遠祖非王業所因不可為始祖太宗又以功臣為代襲刺史志寧以今古事殊恐非久安之道上疏爭之皆從志寧所議太宗因謂志寧曰古者太子既生士負之即置輔弼昔成王幼小周召為師傅日聞正道習以成性今皇太子既幼少卿當輔之以正道無使邪僻開其心勉之無怠當稱所委官賞可不次而得也志寧以承乾數虧禮度志在匡救撰諫苑二十卷諷之太宗大悅賜黃金十斤絹三百匹十四年兼太子詹事明年以母憂解尋起復本官屢表請終喪禮太宗遣中書侍郎岑文本就宅敦諭之曰忠孝不並我兒須人輔弼卿宜抑割不可徇以私情志寧遂起就職時皇太子承乾嘗以盛農之時營造曲室纍月不止所為多不法志寧上書諫曰臣聞克儉節用實弘道之源崇侈恣情乃敗德之本是以凌雲概日戎人於是致譏峻宇雕牆夏書以之作誡昔趙盾匡晉呂望師周或勸之以節財或諫之以厚斂莫不盡忠以佐國竭誠以奉君欲茂實播於無窮英聲被乎物聽咸著簡策以為美談今所居東宮隋日營建覩之者尚譏其侈見之者猶歎其華何容此中更有修造財帛日費土木不停窮斤斧之工極磨礱之妙且丁匠官奴入內比者曾無伏監此等或兄犯國章或弟罹王法往來御苑出入禁闈鉗鑿緣其身槌杵在其手監門本防非慮宿衛以備不虞直長既自不知千牛又復不見爪牙在外廝役在內所司何以自安臣下豈容無懼又鄭衛之樂古謂淫聲昔朝歌之鄉回車者墨翟夾谷之會揮劍者孔丘先聖既以為非通賢將以為失頃聞宮內屢有鼓聲大樂伎兒入便不出聞之者股栗言之者心戰往年口敕伏請重尋聖旨殷勤明誡懇切在於殿下不可不思至於微臣不得無懼臣自驅馳宮闕已積歲年犬馬尚解識恩木石猶能知感所有管見敢不盡言如鑒以丹誠則臣有生路若責其忤旨則臣是罪人但悅意取容臧孫方之疾疹犯顏逆耳春秋比之藥石伏望停工匠之作罷久役之人絶鄭衛之音斥羣小之輩則三善允備萬國作貞矣承乾不納承乾又令閹官多在左右志寧上書諫曰臣聞堯稱稽古功著於搜揚舜曰聰明績彰於去惡然開元立極布政辨方莫不旌賁英賢驅除不肖理亂之本咸在於茲況閹宦之徒體非全氣便蕃階闥左右宮闈託親近以立威權假出納以為禍福昔易牙被任變起齊邦張讓執鈞亂生漢室伊戾為詐宋國受其殃趙高作姦秦氏鍾其弊加以弘石用事京賈則連首受誅王曹掌權何竇則踵武被戮遂使縉紳重足宰司屏氣然順其情者則榮逮幼沖忤其意者則災及襁褓爰暨高齊都鄴亦弊閹官鄧長顒位至侍中陳德信爵隆開府外干朝政內預宴私宗枝藉其吹噓重臣仰其鼻息罪積山嶽靡挂於刑書功無涓塵已勒於鍾鼎富踰金穴財甚銅山是以家起怨嗟人懷憤歎骨鯁之士語不見聽謇諤之臣言必被斥齊都顛覆職此之由向使任諒直之臣退佞給之士據趙魏之地擁漳滏之兵修德行仁養政施化何區區周室而敢窺覦者焉然杜漸防萌古人所以遠禍以大喻小先哲於焉取則伏惟殿下道茂重離德光守器憲章古始祖述前修欲使休譽遠聞英聲遐暢臣竊見寺人一色未識上心或輕忽高班凌轢貴仕便是品命失序綱紀不立取笑通方之人見譏有識之士然典內職掌唯在門外通傳給使主司但緣階闥供奉今乃往來閣內出入宮中行路之人咸以為怪伏望狎近君子屏黜小人上副聖心下允衆望承乾覽書甚不悅承乾嘗驅使司馭等不許分番又私引突厥達哥支入宮內志寧上書諫曰臣聞上天蓋高日月以光其德明君至聖輔佐以贊其功是以周誦升儲見匡毛畢漢盈居震取資黃綺姬旦抗法於伯禽賈生陳事於文帝莫不殷勤於端士懇切於正人昔鄧禹名臣方居審諭之任疏受宿望始除輔導之官歷代賢君莫不丁寧於太子者良以地膺上嗣位處副君善則率土霑其恩惡則海內罹其禍近聞僕寺司馭爰及駕士獸醫始自春初迄茲夏晚常居內役不放分番或家有尊親闕於溫凊或室有幼弱絶於撫養春則廢其耕墾夏又妨其播殖事乖存愛恐致怨嗟且突厥達哥支等人面獸心豈得以禮教期不可以仁信待心則未識於忠孝言則莫辨其是非近之有損於英聲昵之無益於盛德引之入閣人皆驚駭豈臣愚識獨用不安臣下為殿下之股肱殿下為臣下之君父君父以存撫為務股肱以匡救為心是以苦口之藥以奉身逆耳之言以安位古人樹誹謗之木以求己愆懸敢諫之鼓以思身過由是從諫之主鼎祚克昌愎諫之君洪業隳墜承乾大怒陰遣刺客張師政紇干承基就殺之二人潛入其第見志寧寢處苫廬竟不忍而止及承乾敗後推鞫具知其事太宗謂志寧曰知公數有規諫事無所隱深加勉勞右庶子令狐德棻等以無諫書皆從貶責及高宗為皇太子復授志寧太子左庶子未幾遷侍中永徽元年加光祿大夫進封燕國公二年監修國史時洛陽人李弘泰坐誣告太尉長孫無忌詔令不待時而斬決志寧上疏諫曰伏惟陛下情篤功臣恩隆右戚以無忌橫遭誣告事並是虛欲戮告人以明賞罰一以絶誣告之路二以慰勳戚之心又以所犯是真無忌便有破家之罪今告為妄弘泰宜戮不待時且真犯之人事當罪逆誣謀之類罪唯及身以罪較量明非惡逆若欲依律合待秋分今時屬陽和萬物生育而特行刑罰此謂傷春竊案左傳聲子曰賞以春夏刑以秋冬順天時也又禮記月令曰孟春之月無殺孩蟲省囹圄去桎梏無肆掠止獄訟又漢書董仲舒曰王者欲有所為宜求其端於天道天道之大者在陰陽陽為德陰為刑刑主殺而德主生陽常居大夏而以生育養長為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也伏惟陛下纂聖升祚繼明御極追連胥之絶軌蹈軒頊之良規欲使舉動順於天時刑罰依於律令陰陽為之式序景宿於是靡差風雨不愆雩禜輟祀方今太蔟統律青陽應期當生長之辰施肅殺之令伏願暫回聖慮察古人言倘蒙垂納則生靈幸甚疏奏帝從之是時衡山公主欲出降長孫氏議者以時既公除合行吉禮志寧上疏曰臣聞明君馭曆當俟獻替之臣聖主握圖必資鹽梅之佐所以堯詢四嶽景化洽於區中舜任五臣懿德被於無外左有記言之史右立記事之官大小咸書善惡俱載著懲勸於簡牘垂褒貶於人倫為萬古之範圍作千齡之龜鏡伏見衡山公主出降欲就今秋成禮竊按禮記云女十五而筓二十而嫁有故二十三而嫁鄭玄云有故謂遭喪也固知須終三年春秋云魯莊公如齊納幣杜預云母喪未再期而圖婚二傳不譏失禮明故也此即史策具載是非歷然斷在聖情不待問於臣下其有議者云準制公除之後須並從吉此漢文創制其儀為天下百姓至於公主服是斬縗縱使服隨例除無宜情隨例改心喪之內方復成婚非唯違於禮經亦是人情不可伏惟陛下嗣膺寶位臨統萬方理宜繼美羲軒齊芳湯禹弘奬仁孝之日敦崇名教之秋此事行之苦難猶須抑而守禮況行之甚易何容廢而受譏此理有識之所共知非假愚臣之說也伏願遵高宗之令軌略孝文之權制國家於法無虧公主情禮得畢於是詔公主待三年服闋然後成禮其年拜尚書左僕射同中書門下三品三年以本官兼太子少師顯慶元年遷太子太傅嘗與右僕射張行成中書令高季輔俱蒙賜地志寧奏曰臣居關右代襲箕裘周魏以來基址不墜行成等新營莊宅尚少田園於臣有餘乞申私讓帝嘉其意乃分賜行成及季輔四年表請致仕聽解尚書左僕射拜太子太師仍同中書門下三品高宗之將廢王庶人也長孫無忌褚遂良執正不從而李績許敬宗密申勸請志寧獨無言以持兩端及許敬宗推鞫長孫無忌詔獄因誣構志寧黨附無忌坐是免職尋降授榮州刺史麟德元年纍轉華州刺史年老請致仕許之二年卒于家年七十八贈幽州都督諡曰定上元三年追復其左光祿大夫太子太師志寧雅愛賓客接引忘倦後進文筆之士無不影附然亦不能有所薦達議者以此少之前後預撰格式律令五經義疏及修禮修史等功賞賜不可勝計有集二十卷子立政太僕少卿志寧玄孫休烈休烈子益自有傳高季輔德州蓨人也祖表魏安德太守父衡隋萬年令季輔少好學兼習武藝居母喪以孝聞兄元道仕隋為汲令武德初縣人翻城從賊元道被害季輔率其黨出鬬竟擒殺其兄者斬之持首以祭墓甚為士友所稱由是羣盜多歸附之衆至數千尋與武陟人李厚德率衆來降授陟州總管府戶曹參軍貞觀初擢拜監察御史多所彈糾不避權要纍轉中書舍人時太宗數召近臣令指陳時政損益季輔上封事五條其略曰陛下平定九州富有四海德超邃古道高前烈時已平矣功已成矣然而刑典未措者何哉良由謀猷之臣不弘簡易之政臺閣之吏昧於經遠之道執憲者以深刻為奉公當官者以侵下為益國未有坦平恕之懷副聖明之旨至如設官分職各有司存尚書八座責成斯在王者司契義屬於茲伏願隨方訓誘使各揚其職仍須擢溫厚之人升清潔之吏敦朴素革澆浮先之以敬讓示之以好惡使家識孝慈人知廉恥醜言過行見嗤於鄉閭忘義私昵取擯於親族杜其利欲之心載以清淨之化自然家肥國富氣和物阜禮節於是競興禍亂何由而作又曰竊見聖躬每存節儉而凡諸營繕工徒未息正丁正匠不供驅使和雇和市非無勞費人主所欲何事不成猶願愛其財而勿殫惜其力而勿竭今畿內數州實惟邦本地狹人稠耕植不博菽粟雖賤儲蓄未多特宜優矜令得休息強本弱枝自古常事關河之外徭役全少帝京三輔差科非一江南河北彌復優閒須為差等均其勞逸又曰今公主之室封邑足以給資用勳貴之家俸祿足以供器服乃戚戚於儉約汲汲於華侈放息出舉追求什一公侯尚且求利黎庶豈覺其非錐刀必競實由於此有黷朝風謂宜懲革又曰仕以應務代耕外官卑品猶未得祿既離鄉家理必貧匱但妻子之戀賢達猶纍其懷飢寒之切夷惠罕全其行為政之道期於易從若不恤其匱乏唯欲責其清勤凡在末品中庸者多止恐巡察歲去輶軒繼軌不能肅其侵漁何以求其政術今戶口漸殷倉廩已實斟量給祿使得養親然後督以嚴科責其報效則庶官畢力物議斯允又曰竊見密王元曉等俱是懿親陛下友愛之懷義高古昔分以車服委以藩維須依禮儀以副瞻望比見帝子拜諸叔諸叔亦答拜王爵既同家人有禮豈合如此顛倒昭穆伏願一垂訓誡永循彝則書奏太宗稱善十七年授太子右庶子又上疏切諫時政得失特賜鍾乳一劑曰進藥石之言故以藥石相報十八年加銀青光祿大夫兼吏部侍郎凡所銓時稱允當太宗嘗賜金背鏡一面以表其清鑒焉二十二年遷中書令兼檢校吏部尚書監修國史賜爵蓨縣公永徽二年授光祿大夫行侍中兼太子少保以風疾廢於家乃召其兄虢州刺史季通為宗正少卿視其疾又屢降中使觀其進食問其增損尋卒年五十八帝為之舉哀廢朝三日贈開府儀同三司荊州都督諡曰憲子正業仕至中書舍人坐與上官儀善配流嶺外張行成定州義豐人也少師事河間劉炫勤學不倦炫謂門人曰張子體局方正廊廟才也大業末察孝廉為謁者臺散從員外郎王世充僭號以為度支尚書世充平以隋資補宋州穀熟尉又應制舉乙科授雍州富平縣主簿理有能名秩滿補殿中侍御史糾劾不避權戚太宗以為能謂房玄齡曰觀古今用人必因媒介若行成者朕自舉之無先容也太宗嘗言及山東關中人意有同異行成正侍宴跪而奏曰臣聞天子以四海為家不當以東西為限若如是則示人以隘太宗善其言賜名馬一匹錢十萬衣一襲自是每有大政常預議焉纍遷給事中太宗嘗臨軒謂侍臣曰朕所以不能恣情欲取樂當年而勵節苦心卑宮菲食者正為蒼生耳我為人主兼行將相之事豈不是奪公等名昔漢高祖得蕭曹韓彭天下寧宴舜禹湯武有稷契伊呂四海乂安此事朕並兼之行成退而上書諫曰有隋失道天下沸騰陛下撥亂反正拯生人於塗炭何周漢君臣之所能擬陛下聖德含光規模弘遠雖文武之烈實兼將相何用臨朝對衆與其較量以萬乘至尊共臣下爭功哉臣聞天何言哉四時行焉又聞汝惟不矜天下莫與汝爭能臣備員樞近非敢知獻替之事輒陳狂直伏待葅醢太宗深納之轉刑部侍郎太子少詹事太宗東征皇太子於定州監國即行成本邑也太子謂行成曰今者送公衣錦還鄉於是令有司祀其先人墓行成因薦鄉人魏唐卿崔寶權馬龍駒張君劼等皆以學行著聞太子召見以其老不任職皆厚賜而遣之太子又使行成詣行在所太宗見之甚悅賜馬二匹縑三百匹駕還京為河南巡察大使還稱旨以本官兼檢校尚書左丞是歲太宗幸靈州太子當從行成上疏曰伏承皇太子從幸靈州臣愚以為皇太子養德春宮日月未幾華夷遠邇佇聽嘉音如因以監國接對百僚決斷庶務明習政理既為京師重鎮且示四方盛德與其出陪私愛曷若俯從公道太宗以為忠進位銀青光祿大夫二十三年遷侍中兼刑部尚書太宗崩與高季輔侍高宗即位於太極殿梓宮前尋封北平縣公監修國史時晉州地連有聲如雷高宗以問行成行成對曰天陽也地陰也陽君象陰臣象君宜轉動臣宜安靜今晉州地動彌旬不休雖天道玄邈窺算不測而人事較量昭然作戒恐女謁用事大臣陰謀修德禳災在於陛下且陛下本封晉也今地震晉州下有徵應豈徒然耳伏願深思遠慮以杜未萌二年八月拜尚書左僕射尋加授太子少傅四年自三月不雨至于五月復抗表請致仕高宗手制答曰密雲不雨遂淹旬月此朕之寡德非宰臣咎實甘萬方之責用陳六事之過策免之科義乖罪己今敕斷表勿復為辭賜宮女黃金器物固請乞骸骨高宗曰公我之故舊腹心奈何舍我而去因愴然流涕行成不得已復起視事九月卒於尚書省時年六十七高宗哭之甚哀輟朝三日令九品已上就第哭比斂中使三至賜內衣服令尚宮宿於家以視殯斂贈開府儀同三司并州都督所司備禮冊命祭以少牢賻絹布八百段米粟八百石賜東園祕器諡曰定弘道元年詔以行成配享高宗廟庭子洛客嗣官至雍州渭南令行成族孫易之昌宗易之父希臧雍州司戶易之初以門蔭纍遷為尚乘奉御年二十餘白美姿容善音律歌詞則天臨朝通天二年太平公主薦易之弟昌宗入侍禁中既而昌宗啓天后曰臣兄易之器用過臣兼工合鍊即令召見甚悅由是兄弟俱侍宮中皆傅粉施朱衣錦繡服俱承辟陽之寵俄以昌宗為雲麾將軍行左千牛中郎將易之為司衛少卿賜第一區物五百段奴婢駝馬等信宿加昌宗銀青光祿大夫賜防閣同京官朔望朝參仍贈希臧襄州刺史母韋氏阿臧封太夫人使尚宮至宅問訊仍詔尚書李迥秀私侍阿臧武承嗣三思懿宗宗楚客宗晉卿候其門庭爭執鞭轡呼易之為五郎昌宗為六郎俄加昌宗左散騎常侍聖曆二年置控鶴府官員以易之為控鶴監內供奉餘官如故久視元年改控鶴府為奉宸府又以易之為奉宸令引辭人閻朝隱薛稷員半千並為奉宸供奉每因宴集則令嘲戲公卿以為笑樂若內殿曲宴則二張諸武侍坐樗蒱笑謔賜與無算時諛佞者奏云昌宗是王子晉後身乃令被羽衣吹簫乘木鶴奏樂於庭如子晉乘空辭人皆賦詩以美之崔融為其絶唱其句有昔遇浮丘伯今同丁令威中郎才貌是藏史姓名非天后令選美少年為左右奉宸供奉右補闕朱敬則諫曰臣聞志不可滿樂不可極啫欲之情愚智皆同賢者能節之不使過度則前聖格言也陛下內寵已有薛懷義張易之昌宗固應足矣近聞尚舍奉御柳模自言子良賓潔白美鬚眉左監門衛長史侯祥云陽道壯偉過於薛懷義專欲自進堪奉宸內供奉無禮無儀溢於朝聽臣愚職在諫諍不敢不奏則天勞之曰非卿直言朕不知此賜綵百段以昌宗醜聲聞于外欲以美事掩其迹乃詔昌宗撰三教珠英於內乃引文學之士李嶠閻朝隱徐彥伯張說宋之問崔湜富嘉謨等二十六人分門撰集成一千三百卷上之加昌宗司僕卿封鄴國公易之為麟臺監封恆國公各實封三百戶俄改昌宗為春官侍郎易之昌宗皆粗能屬文如應詔和詩則宋之問閻朝隱為之代作則天春秋高政事多委易之兄弟中宗為皇太子太子男邵王重潤及女弟永泰郡主竊言二張專政易之訴於則天付太子自鞫問處置太子並自縊殺之又御史大夫魏元忠嘗奏二張之罪易之懼不自安乃誣奏元忠與司禮丞高戩云天子老矣當挾太子為耐久朋則天曰汝何以知之易之曰鳳閣舍人張說為證翌日則天召元忠及說廷詰之皆妄則天尚以二張之故逐元忠為高要尉張說長流欽州長安二年易之贓賂事發為御史臺所劾下獄兄司府少卿昌儀司禮少卿同休皆貶黜及則天臥疾長生院宰臣希得進見唯易之兄弟侍側恐禍變及己乃引用朋黨陰為之備人有榜其事于路左臺御史中丞宋璟請按之則天陽許尋敕宋璟使幽州按都督屈突仲翔令司禮卿崔神慶鞫之神慶希旨雪昌宗兄弟神龍元年正月則天病甚是月二十日宰臣崔玄暐張柬之等起羽林兵迎太子至玄武門斬關而入誅易之昌宗於迎仙院並梟首於天津橋南則天遜居上陽宮易之兄昌期歷岐汝二州刺史所在苛猛暴橫是日亦同梟首朝官房融崔神慶崔融李嶠宋之問杜審言沈佺期閻朝隱等皆坐二張竄逐凡數十人史臣曰于燕公輔導儲皇高侍中敷陳理行張北平斥言陰沴皆人所難言者苟非金玉貞度松筠挺操安能咈人主之意獻苦口之忠宜其論道巖廊克終顯盛古所謂能以義匡主之失三君有焉贊曰猗歟于公獻替兩宮前修克繼嗣德彌隆高酬藥劑張感宸衷君臣之義斯為始終
