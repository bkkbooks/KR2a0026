body:
  text: 舊唐書卷九本紀第九玄宗下開元二十五年春正月壬午制朕猥集休運多謝哲王然而哀矜之情小大必慎自臨寰宇子育黎蒸未嘗行極刑起大獄上玄降鑒應以祥和思協平邦之典致之仁壽之域自今有犯死刑除十惡罪宜令中書門下與法官詳所犯輕重具狀奏聞崇德尚齒三代丕義敦風勸俗五教攸先其曾任五品已上清資官以禮去職者所司具録名奏老疾不堪釐務者與致仕道士女冠宜隸宗正寺僧尼令祠部檢校百司每旬節休假並不須入曹司任遊勝為樂宣示中外知朕意焉癸卯道士尹愔為諫議大夫集賢學士兼知史館事二月新羅王金興光卒其子承慶嗣位遣贊善大夫邢璹攝鴻臚少卿往弔祭冊立之壬子加宗正丞一員戊午罷江淮運停河北運癸酉張守圭破契丹餘衆於祿山殺獲甚衆三月乙卯河西節度使崔希逸自涼州南率衆入吐蕃界二千餘里己亥希逸至青海西郎佐素文子觜與賊相遇大破之斬首二千餘級夏四月庚戌陳許豫壽四州開稻田辛酉監察御史周子諒上書忤旨螥之殿庭朝堂決杖死之甲子尚書右丞相張九齡以曾薦引子諒左授荊州長史乙丑皇太子瑛鄂王瑤光王琚並廢為庶人太子妃兄駙馬都尉薛鏽長流瀼州至藍田驛賜死六月壬戌熒惑犯房至心星越度而過秋七月己卯大理少卿徐岵奏天下今歲斷死刑五十八幾致刑措鳥巢寺之獄上特推功元輔庚辰封李林甫為晉國公牛仙客為豳國公己卯敕諸陵廟並隸宗正寺其宗正寺官員自今並以宗枝為之九月壬申頒新定令式格及事類一百三十卷於天下冬十月制自今年每年立春日迎春於東郊其夏及秋冬如常以十二月朔日於正殿受朝讀時令十一月壬申幸溫泉宮丁丑開府儀同三司廣平郡公宋璟薨十二月丙午惠妃武氏薨追諡為貞順皇后葬於敬陵吐蕃使其大臣屬盧論莽藏來朝貢二十六年春正月乙亥工部尚書牛仙客為侍中丁丑親迎氣于東郊祀青帝制天下繫囚死罪流嶺南餘並放免鎮兵部還京兆府新開稻田並散給貧人百官賜勳絹長安萬年兩縣各與本錢一千貫收利供馹仍付雜馹天下州縣每鄉一學仍擇師資令其教授諸鄉貢每年令就國子監謁先師明經加口試內外八品已下及草澤有博學文辭之士各委本司本州聞薦二月辛卯以李林甫遙領隴右節度使甲辰禁大寒食以雞卵相饋送庚申葬貞順皇后于敬陵乙卯以牛仙客遙領河東道節度使辛酉廢仙州分其屬縣隸許汝等州三月己巳朔減祕書省校書正字官員丙子有星孛于紫微垣中歷斗魁十餘日因陰雲不見己酉河南洛陽兩縣亦借本錢一千貫收利充人吏課役癸未京兆地震吐蕃寇河西左散騎常侍崔希逸擊破之鄯州都督杜希望又攻拔新羅城制以其城為威戎軍夏四月己亥朔始令太常卿韋縚讀時令于宣政殿百僚於殿上列坐而聽之五月乙酉以李林甫遙領河西節度使兼判梁州事庚寅幸咸宜公主宅六月庚子立忠王璵為皇太子秋七月己巳冊皇太子大赦天下常赦所不免者咸赦除之內外文武官及五品已上為父後者各賜勳一轉忠王府官及侍講加一階賜酺三日庚辰分越州置明州九月丙申朔日有蝕之庚子於舊六胡州地置宥州益州長史王昱率兵攻吐蕃安戎城為賊所據官軍大敗昱棄甲而遁兵士死者數千人冬十月戊寅幸溫泉宮是歲渤海靺鞨王大武藝死其子欽茂嗣立遣使弔祭冊立之其冬兩京建行宮造殿宇各千餘間潤州刺史齊浣開伊婁河於揚州南瓜洲浦析左右羽林軍置左右龍武軍以左右萬騎營隸焉二十七年春正月乙巳大雨雪二月己巳加尊號開元聖文神武皇帝大赦天下常赦所不免者咸赦除之開元已來諸色痕瘕人咸從洗滌左降官量移近處百姓免今年租稅三品已上賜爵一級四品已上加一階宗廟薦饗自今已後並用宗子賜酺五日夏四月丁丑廢洮州隸蘭州改臨州為洮州乙酉太子少傅竇為開府儀同三司吏部尚書李皓為太子少傅丁酉侍中牛仙客為兵部尚書兼侍中兵部尚書兼中書令李林甫為吏部尚書依舊兼中書令以東宮內侍隸內侍省為署五月癸卯置龍武軍官員先是鄎國公主之子薛諗與其黨李談崔洽石如山同於京城殺人或利其財或違其志即白日椎殺而食之其夏事發皆決殺於京兆府門諗以國親流瀼州賜死於城東驛六月甲戌內常侍牛仙童坐贓決殺之幽州節度使兼御史大夫張守圭以賄貶為括州刺史太子太師徐國公蕭嵩以嘗賂仙童左授青州刺史秋七月辛丑熒惑犯南斗北庭都護蓋嘉運以輕騎襲破突騎施於碎葉城殺蘇祿威震西陲八月吐蕃寇白草安人等甲申制追贈孔宣父為文宣王顏回為兗國公餘十哲皆為侯夾坐後嗣褒聖侯改封為文宣公九月皇太子改名紹汴州刺史齊浣請開汴河下流自虹縣至淮陰北合于淮逾時而功畢因棄沙壅舊路行者弊之尋而新河之水勢淙急遂填塞矣前刑部尚書致仕崔隱甫卒冬十月將改作明堂訛言官取小兒埋於明堂之下以為厭勝村野童兒藏於山谷都城騷然咸言兵至上惡之遣主客郎中王佶往東都及諸州宣慰百姓久之定冬十月毀東都明堂之上層改拆下層為乾元殿戊戌幸溫泉宮辛丑至自溫泉宮十二月東都副留守太子賓客崔沔卒以益州司馬章仇兼瓊權劍南節度等使是歲蓋嘉運大破突騎施之衆擒其王吐火仙送于京師二十八年春正月兩京路及城中苑內種果樹癸巳幸溫泉宮庚子至自溫泉宮壬寅以望日御勤政樓宴羣臣連夜燒燈會大雪而罷因命自今常以二月望日夜為之三月丁亥朔日有蝕之壬子權判益州長史章仇兼瓊拔吐蕃安戎城分兵鎮守之夏五月乙未太子少師韓休太子少傅李皓卒六月懷州刺史信安王褘為太子少師庚寅太子賓客李尚隱卒秋七月壬寅追尊宣皇帝陵名曰建初光皇帝陵名曰啓運仍置官員九月魏州刺史盧暉開通濟渠自石灰窠引流至州城而西卻注魏橋九月庚寅封皇孫俶等十九人為郡王冬十月甲子幸溫泉宮辛巳至自溫泉宮乙酉夜東都新殿後佛光寺災吐蕃寇安戎城十一月牛仙客停遙兼朔方河東節度使十二月乙卯突騎施酋長莫賀達干率衆內屬己未禮部尚書杜暹卒是歲金城公主薨吐蕃遣使來告喪其時頻歲豐稔京師米斛不滿二百天下乂安雖行萬里不持兵刃二十九年春正月丁丑制兩京諸州各置玄元皇帝廟并崇玄學置生徒令習老子莊子列子文子每年准明經例考試內外官有伯叔兄弟子姪堪任刺史縣令所司親自保薦禁九品已下清資官置客舍邸店車坊士庶厚葬三月吐蕃突厥各遣使來朝丙午風霾日色無影夏四月庚戌朔丙辰以太原裴胄先為工部尚書韋虛心卒親王已下及內外官各賜錢令宴樂壬午以左右金吾大將軍裴寬為太原尹北都留守秋七月乙卯洛水泛漲毀天津橋及上陽宮仗舍洛渭之間廬舍壞溺死者千餘人突厥登利可汗死北州刺史王斛斯為幽州節度使幽州節度副使安祿山為營州刺史充平盧軍節度副使押兩番渤海黑水四府經略使九月大雨雪稻禾偃折又霖雨月餘道途阻滯是秋河北博洺等二十四州言雨水害稼命御史中丞張倚往東都及河北賑恤之壬申御興慶門試明四子人姚子産元載等冬十月丙申幸溫泉宮戊戌分遣大理卿崔翹等八人往諸道黜陟官吏十一月庚戌司空邠王守禮薨辛酉至自溫泉宮己巳雨木冰凝寒凍冽數日不解辛未太尉寧王憲薨諡為讓皇帝葬于惠陵十二月丁酉吐蕃入寇陷廓州達化縣及振武軍石堡城節度使蓋嘉運不能守女國王趙曳夫及佛逝國王日南國王遣其子來朝獻天寶元年春正月丁未朔大赦天下改元常赦不原咸赦除之百姓所缺負租稅及諸色並免之前資官及白身人有儒學博通文辭秀逸及軍謀武藝者所在具以名薦京文武官才堪為刺史者各令封狀自舉改黃鉞為金鉞內外官各賜勳兩轉甲寅陳王府參軍田同秀上言玄元皇帝降見于丹鳳門之通衢告賜靈符在尹喜之故宅上遣使就函谷故關尹喜臺西發得之乃置玄元廟於大寧坊陝郡太守李齊物先鑿三門辛未渠成放流二月丁亥上加尊號為開元天寶聖文神武皇帝辛卯親享玄元皇帝于新廟甲午親享太廟丙申合祭天地于南郊制天下囚徒罪無輕重並釋放流人移近處左降官依資用身死貶處者量加追贈枉法贓十五匹當絞今加至二十匹莊子號為南華真人文子號為通玄真人列子號為沖虛真人庚桑子號為洞虛真人其四子所著書改為真經崇玄學置博士助教各一員學生一百人桃林縣改為靈寶縣改侍中為左相中書令為右相左右丞相依舊為僕射又黃門侍郎為門下侍郎東都為東京北都為北京天下諸州改為郡刺史改為太守陝州河北縣為平陸縣老幼版授文武官三品已上加一爵四品已下加一階庚子平盧節度使安祿山進階驃騎大將軍夏六月庚寅武功山水暴漲壞人廬舍溺死數百人秋七月癸卯朔日有蝕之辛未左相豳國公牛仙客卒八月丁丑刑部尚書兼御史大夫李適之為左相丁亥突厥阿布思及默啜可汗之孫登利可汗之女相與率其黨屬來降壬辰吏部尚書兼右相李林甫加尚書左僕射左相李適之兼兵部尚書左僕射裴耀卿為尚書右僕射九月辛卯上御花萼樓出宮女宴毗伽可汗妻可登及男女等賞賜不可勝紀丙寅改天下縣名不穩及重名一百一十處兩京玄元廟改為太上玄元皇帝宮天下准此冬十月丁酉幸溫泉宮辛丑改驪山為會昌山仍於秦坑儒之所立祠宇以祀遭難諸儒新成長生殿名曰集靈臺以祀天神十一月己巳至自溫泉宮是歲命陝郡太守韋堅引滻水開廣運潭於望春亭之東以通河渭京兆尹韓朝宗又分渭水入自金光門置潭於西市之兩衙以貯材木是冬無冰其年天下郡府三百六十二縣一千五百二十八鄉一萬六千八百二十九戶部進計帳今年管戶八百五十二萬五千七百六十三口四千八百九十萬九千八百二年春正月丙辰追尊玄元皇帝為大聖祖玄元皇帝兩京崇玄學改為崇玄館博士為學士三月壬子親祀玄元廟以冊尊號制追尊聖祖玄元皇帝父周上御史大夫敬曰先天太上皇母益壽氏號先天太后仍於譙郡本鄉置廟尊咎繇為德明皇帝改西京玄元廟為太清宮東京為太微宮天下諸郡為紫極宮韋堅開廣運潭畢功盛陳舟艦丙寅上幸廣運樓以觀之即日還宮夏六月甲戌夜雷震東京應天門觀災延燒至左右延福門經日不滅七月癸丑致仕禮部尚書王丘卒丙辰尚書右僕射裴耀卿薨九月太子少保崔琳卒辛酉譙郡紫極宮改為太清宮冬十月戊辰太子太保信安王褘卒戊寅幸溫泉宮十一月乙卯至自溫泉宮十二月己亥東京應天門改為乾元門戊申幸溫泉宮丙辰至自溫泉宮十二月乙酉太子賓客賀知章請度為道士還鄉是冬無雪三載正月丙辰朔改年為載赦見禁囚徒庚子遣左右相已下祖別賀知章於長樂坡上賦詩贈之壬寅幸溫泉宮二月己巳還京丁丑封讓皇帝男琳為嗣寧王故邠王守禮男承寧為嗣邠王讓帝男璹為嗣申王惠宣太子男珍為嗣岐王王員為嗣薛王庚寅皇太子紹改名亨是月河南尹裴敦復卒閏月辛亥有星如月墜於東南墜後有聲京師訛言官遣棖捕人肝以祭天狗人相恐畿縣尤甚發使安之三月庚午武威郡上言番禾縣天寶山有醴泉湧出嶺石化為瑞牟遠近貧乏者取以給食改番禾為天寶縣癸酉制天下見禁囚徒死罪降流流已下並原之夏四月南海太守劉巨鱗擊破海賊吳令光永嘉郡平敕兩京天下州郡取官物鑄金銅天尊及佛各一軀送開元觀開元寺五月戊寅長