為昭薦以告者臨下之義故也辛卯幸楊國忠亭子辛丑立周武王漢高祖廟於京城司置官吏十二月乙亥還京十載春正月乙酉朔壬辰朝獻太清宮癸巳朝饗太廟甲午有事于南郊合祭天地禮畢大赦天下太廟置內官供灑掃諸陵廟己亥改傳國寶為承天大寶丁未李林甫領安北副大都護朔方節度使庚戌大風陝郡運船失火燒米船二百餘隻人死者五百計癸丑分遣嗣吳王祇等十三人祭嶽瀆海鎮二月丁巳安祿山兼雲中太守河東節度使夏四月劍南節度使鮮于仲通將兵六萬討雲南與雲南王閣羅鳳戰于瀘川官軍大敗死於瀘水者不可勝數五月丁亥改諸衛幡旗緋色者為赤黃以符土運秋八月乙卯廣陵郡大風潮水覆船數千艘丙辰京城武庫災燒器械四十七萬事是秋霖雨積旬牆屋多壞西京尤甚冬十月辛亥幸華清宮十一月乙未幸楊國忠宅丙午兵部侍郎兼御史中丞楊國忠兼領劍南節度使十一載春正月辛亥還京二月癸酋禁惡錢官出好錢以易之既而商旅不便訴於國忠乃止之三月朔方節度副使奉信王阿布思與安祿山同討契丹布思與祿山不協乃率其部下叛歸漠北丙午制今後每月朔望宜令薦食於太廟每室一牙盤仍五日一開室門灑掃改吏部為文部兵部為武部刑部為憲部其部內諸司有部字者並改將作大匠少匠為大少二監夏四月御史大夫兼京兆尹王鉷賜死坐弟銲與凶人邢縡謀逆故也楊國忠兼京兆尹五月戊申慶王琮薨贈靖德太子六月戊子東京大風拔樹發屋八月己丑幸左藏庫賜羣臣帛有差九月甲寅改諸衛士為武士冬十月戊寅幸華清宮十一月乙卯尚書左僕射兼右相晉國公李林甫薨於行在所庚申御史大夫兼蜀郡長史楊國忠為右相兼文部尚書十二月甲戌楊國忠奏請兩京選人銓日便定留放無長名己亥還京十二載春正月壬子楊國忠於尚書省注官注訖於都堂對左相與諸司長官唱名二月庚辰選人鄭懟等二十餘人以國忠銓注無滯設齊於勤政殿下立碑於尚書省門癸未追削故右相李林甫在身官爵男將作監岫宗黨李復道等五十人皆流貶國忠誣奏林甫陰結叛胡阿布思故也夏五月乙酉以魏周隋依舊為三恪及二王後復封韓介酅等公辛亥太廟諸陵署依舊隸太常寺七月壬子天下齊人不得鄉貢須補國子學生然後貢舉八月京城霖雨米貴令出太倉米十萬石減價糶與貧人仍令中書門下就京兆大理疏決囚徒九月己亥朔隴右節度使涼國公哥舒翰進封西平郡王食實封五百戶冬十月戊申幸華清宮和雇京城丁戶一萬三千人築興慶宮牆起樓觀至十二月改橫塞城為天德軍庚寅行從官憲部尚書張筠等請上尊號為開元天地大寶聖文神武孝德證道皇帝十三載春正月丁酉朔上御華清宮之觀風樓受朝賀己亥安慶緒獻俘于行在帝引見於禁中賞賜巨萬乙巳加安祿山尚書左僕射賜實封千戶奴婢十房莊宅各一區又加間五坊宮苑隴右羣牧都使以武部侍郎吉溫為副丙午還京二月癸酉上親朝獻太清宮上玄元皇帝尊號曰大聖祖高上大道金闕玄元天皇大帝甲戌親饗太廟上高祖諡曰神堯大聖大光孝皇帝太宗諡曰太宗文武大聖大廣孝皇帝高宗諡曰高宗天皇大聖大弘孝皇帝中宗諡曰中宗太和大聖大昭孝皇帝睿宗諡曰睿宗玄真大聖大興孝皇帝乙亥御興慶殿受徽號禮畢大赦天下左降官遭父母憂放歸獻陵等五署改為臺令丞各升一階文武三品已上賜爵一級四品已下加一階賜酺三日戊寅右相兼文部尚書楊國忠守司空餘如故甲申司空楊國忠受冊天雨黃土霑於朝服祿山奏前後討契丹立功將士跳蕩等請超三資告身仍望好寫於是超授將軍者五百餘人中郎將者二千餘人三月丁酉太常卿張貶盧溪郡司馬兄憲部尚書均貶建安太守丙午御躍龍殿門張樂宴羣臣賜右相絹一千五百匹綵羅三百匹綵綾五百匹左相絹三百匹綵羅綾各五十匹餘三品八十匹四品五品六十匹六品七品四十匹極歡而罷壬戌御勤政樓大酺北庭都護程千里生擒阿布思獻于樓下斬之於朱雀街乙丑左羽林上將軍封常清權北庭都護伊西節度使萬春公主出降楊朏夏五月熒惑守心五十餘日六月乙丑朔日有蝕之不盡如鈎侍御史劍南留後李宓率兵擊雲南蠻於西洱河糧盡軍旋馬足陷橋為閣羅鳳所擒舉軍皆沒廢濟陽郡以所領五縣隸東平郡秋八月丁亥以久雨左相許國公陳希烈為太子太師罷知政事文部侍郎韋見素為武部尚書同中書門下平章事是秋霖雨積六十餘日京城垣屋頽壞殆盡物價暴貴人多乏食令出太倉米一百萬石開十場賤糶以濟貧民東都瀍洛暴漲漂沒一十九坊上御勤政樓試四科制舉人策外加詩賦各一首制舉加詩賦自此始也冬十月壬寅幸華清宮貶河東太守韋陟為桂嶺尉武部侍郎吉溫為澧陽郡長史乙巳開府儀同三司畢國公竇薨戊午還京其載戶部計今年見管州縣戶口管郡總三百二十一縣一千五百三十八鄉一萬六千八百二十九戶九百六十一萬九千二百五十四三百八十八萬六千五百四不課五百三十萬一千四十四課口五千二百八十八萬四百八十八四千五百二十一萬八千四百八十不課七百六十六萬二千八百課十四載春三月丙寅宴羣臣於勤政樓奏九部樂上賦詩斆柏梁體癸未遣給事中裴士淹等巡撫河南河北淮南等道八月壬辰上親録囚徒冬十月壬辰幸華清宮甲午頒御注老子并義疏於天下十一月戊午朔始寧太守羅希奭以停止張博濟決杖而死吉溫自縊於獄丙寅范陽節度使安祿山率蕃漢之兵十餘萬自幽州南向詣闕以誅楊國忠為名先殺太原尹楊光翽於博陵郡壬申聞於行在所癸酉以郭子儀為靈武太守朔方節度使封常清自安西入奏至行在甲戌以常清為范陽平盧節度使兼御史大夫令募兵三萬以禦逆胡戊寅還京以羽林大將軍王承業為太原尹以衛尉卿張介然為陳留太守河南節度採訪使以金吾將軍程千里為潞州長史並令討賊甲申以京兆牧榮王琬為元帥命高仙芝副之於京城召募號曰天武軍其衆十萬丙戌高仙芝等進軍上御勤政樓送之十二月丙戌朔祿山於靈昌郡渡河辛卯陷陳留郡殺張介然甲午陷滎陽郡殺太守崔無詖丙申封常清與賊戰于成皋罌子谷官軍敗績常清奔於陝郡丁酉祿山陷東京殺留守李憕中丞盧奕判官蔣清時高仙芝鎮陝郡棄城西保潼關常山太守顏杲卿與長史袁履謙賈深等殺賊將李欽湊執賊將何千年高邈送京師辛丑詔皇太子統兵東討以永王璘為山南節度使以江陵長史源洧副之潁王為劍南節度使以蜀郡長史崔圓副之二王不出閣丙午斬封常清高仙芝于潼關以哥舒翰為太子先鋒兵馬元帥領河隴兵募守潼關以拒之辛亥榮王琬薨贈靖恭太子十五載春正月乙卯御宣政殿受朝其日祿山僭號於東京庚申以李光弼為雲中太守河東節度使壬戌賊將蔡希德陷常山郡執太守顏杲卿長史袁履謙殺民吏萬餘城中流血甲子哥舒翰進位尚書左僕射同中書門下平章事乙丑賊將安慶緒犯潼關哥舒翰擊退之乙巳加平原太守顏真卿戶部侍郎奬守城也二月丙戌李光弼郭子儀將兵東出井陘與賊將史思明戰大破之進取郡縣十餘丙辰誅工部尚書安思順三月壬午朔以河東節度使李光弼為御史大夫范陽節度使乙酉以平原太守顏真卿為河北採訪使己亥改常山郡為平山郡房山縣為平山縣鹿泉縣為獲鹿縣鹿成縣為束鹿縣夏四月丙午以贊善大夫來瑱為潁川太守招討使五月戊午南陽太守魯炅與賊將武令珣戰于滍水上官軍大敗為賊所虜進寇我南陽詔嗣虢王巨自藍田出師救南陽六月癸未朔顏真卿破賊將袁知泰於堂邑北海太守賀蘭進明收信都庚寅哥舒翰將兵八萬與賊將崔乾祐戰于靈寶西原官軍大敗死者十六七其日李光弼與賊將史思明戰于常山東嘉山大破之斬獲數萬計辛卯哥舒翰至潼關為其帳下火拔歸仁以左右數十騎執之降賊關門不守京師大駭河東華陰上洛等郡皆委城而走甲午將謀幸蜀乃下詔親征仗下後士庶恐駭奔走于路乙未凌晨自延秋門出微雨霑濕扈從惟宰相楊國忠韋見素內侍高力士及太子親王妃主皇孫已下多從之不及平明渡便橋國忠欲斷橋上曰後來者何以能濟命緩之辰時至咸陽望賢驛置頓官吏駭散無復儲供上於宮門之樹下亭午未進食俄有父老獻上謂之曰如何得飯於是百姓獻食相繼俄又尚食持御膳至上頒給從官而後食是夕次金城縣官吏已遁令魏方進男允招誘俄得智藏寺僧進芻粟行從方給丙辰次馬嵬驛諸衛頓軍不進龍武大將軍陳玄禮奏曰逆胡指闕以誅國忠為名然中外羣情不無嫌怨今國步艱阻乘輿震蕩陛下宜徇羣情為社稷大計國忠之徒可置之于法會吐蕃使二十一人遮國忠告訴於驛門衆呼曰楊國忠連蕃人謀逆兵士圍驛四合及誅楊國忠魏方進一族兵猶未解上令高力士詰之回奏曰諸將既誅國忠以貴妃在宮人情恐懼上即命力士賜貴妃自盡玄禮等見上請罪命釋之丁酉將發馬嵬驛朝臣唯韋見素一人乃命見素子京兆府司録諤為御史中丞充置頓使議其所向軍士或言河隴或言靈武太原或言還京為便韋諤曰還京須有捍賊之備兵馬未集恐非萬全不如且幸扶風徐圖所向上詢于衆咸以為然及行百姓遮路乞留皇太子願勠力破賊收復京城因留太子戊戌次扶風縣己亥次扶風郡軍士各懷去就咸出醜言陳玄禮不能制會益州貢春綵十萬匹上悉命置于庭召諸將諭之曰卿等國家功臣陳力久矣朕之優奬常亦不輕逆胡背恩事須回避甚知卿等不得別父母妻子朕亦不及親辭九廟言發涕流又曰朕須幸蜀路險狹人若多往恐難供承今有此綵卿等即宜分取各圖去就朕自有子弟中官相隨便與卿等訣別衆咸俯伏涕泣曰死生願從陛下上曰去住任卿自此悖亂之言稍息庚子以司勳郎中劍南節度留後崔圓為蜀郡長史劍南節度副大使以潁王為劍南節度大使以監察御史宋若思為御史中丞充置頓使韋諤充巡閣道使並令先發辛丑發扶風郡是夕次陳倉壬寅次散關分部下為六軍潁王先行壽王瑁等分統六軍前後左右相次丙午次河池郡崔圓奏劍南歲稔民安儲供無闕上大悅授圓中書侍郎同中書門下平章事蜀郡長史劍南節度如故以前華州刺史魏犀為梁州長史秋七月癸丑朔壬戌次益昌縣渡吉柏江有雙魚夾舟而躍議者以為龍甲子次普安郡憲部侍郎房琯自後至上與語甚悅即日拜為吏部尚書同中書門下平章事丁卯詔以皇太子諱充天下兵馬元帥都統朔方河東河北平盧等節度兵馬收復兩京永王璘江陵府都督統山南東路黔中江南西路等節度大使盛王琦廣陵郡大都督統江南東路淮南河南等路節度大使豐王珙武威郡都督領河西隴右安西北庭等路節度大使初京師陷賊車駕倉皇出幸人未知所向衆心震駭及聞是詔遠近相慶咸思效忠於興復庚午次巴西郡太守崔渙奉迎即日以渙為門下侍郎同中書門下平章事以韋見素為左相庚辰車駕至蜀郡扈從官吏軍士到者一千三百人宮女二十四人而已八月癸未朔御蜀都府衙宣詔曰朕以薄德嗣守神器每乾乾惕厲勤念生靈一物失所無忘罪己聿來四紀人亦小康推心于人不疑于物而姦臣凶豎棄義背恩割剝黎元擾亂區夏皆朕不明之過也今巡撫巴蜀訓厲師徒仍令太子諸王搜兵重鎮誅夷凶醜以謝昊穹思與羣臣重弘理道可大赦天下癸巳靈武使至始知皇太子即位丁酉上用靈武冊稱上皇詔稱誥己亥上皇臨軒冊肅宗命宰臣韋見素房琯使靈武冊命曰朕稱太上皇軍國大事先取皇帝處分後奏朕知候克復兩京朕當怡神姑射偃息大庭明年九月郭子儀收復兩京十月肅宗遣中使啖廷瑤入蜀奉迎丁卯上皇發蜀郡十一月丙申次鳳翔郡肅宗遣精騎三千至扶風迎衛十二月丙午肅宗具法駕至咸陽望賢驛迎奉上皇御宮之南樓肅宗拜慶樓下嗚咽流涕不自勝為上皇徒步控轡上皇撫背止之即騎馬前導丁未至京師文武百僚京城士庶夾道歡呼靡不流涕即日御大明宮之含元殿見百僚上皇親自撫問人人感咽時太廟為賊所焚權移神主於大內長安殿上皇謁廟請罪遂幸興慶宮三載二月肅宗與羣臣奉上皇尊號曰太上至道聖皇帝乾元三年七月丁未移幸西內之甘露殿時閹宦李輔國離間肅宗故移居西內高力士陳玄禮等遷謫上皇寖不自懌上元二年四月甲寅崩于神龍殿時年七十八羣臣上諡曰至道大聖大明孝皇帝廟號玄宗初上皇親拜五陵至橋陵見金粟山岡有龍盤鳳翥之勢復近先塋謂侍臣曰吾千秋後宜葬此地得奉先陵不忘孝敬矣至是追奉先旨以創寢園以廣德元年三月辛酉葬于泰陵史臣曰孔子稱王者必世而後仁李氏自武后移國三十餘年朝廷罕有正人附麗無非險輩持苞苴而請謁奔走權門效鷹犬以飛馳中傷端士以致喪王室屠害宗枝骨鯁大臣屢遭誣陷舞文酷吏坐致顯榮禮儀無復興行刑政壞於犬馬端揆出阿黨之語冕旒有和事之名朋比成風廉都盡我開元之有天下也糾之以典刑明之以禮樂愛之以慈儉律之以軌儀黜前朝徼幸之臣杜其姦也焚後庭珠翠之玩戒其奢也禁女樂而出宮嬪明其教也賜酺賞而放哇淫懼其荒也友于而敦骨肉厚其俗也搜兵而責帥明軍法也朝集而計最校吏能也廟堂之上無非經濟之才表著之中皆得論思之士而又旁求宏碩講道藝文昌言嘉謨日聞於獻納長轡遠馭志在於升平貞觀之風一朝復振于斯時也烽燧不驚華戎同軌西蕃君長越繩橋而競款玉關北狄酋渠捐毳幕而爭趨鴈塞象郡炎州之玩雞林鯷海之珍莫不結轍於象胥駢羅於典屬膜拜丹墀之下夷歌立仗之前可謂冠帶百蠻車書萬里天子乃覽雲臺之義草泥金之札然後封日觀禪雲亭訪道於穆清怡神於玄牝與民休息比屋可封於時垂髫之倪皆知禮讓戴白之老不識兵戈虜不敢乘月犯邊士不敢彎弓報怨康哉之頌溢于八紘所謂世而後仁見於開元者矣年踰三紀可謂太平於戲國無賢臣聖亦難理山有猛虎獸不敢窺得人者昌信不虛語昔齊桓公行同禽獸不失霸主之名梁武帝靜比桑門竟被臺城之酷蓋得管仲則淫不害霸任朱异則善不救亡開元之初賢臣當國四門俱穆百度唯貞而釋老之流頗以無為請見上乃務清淨事薰修留連軒后之文舞詠伯陽之說雖稍移於勤倦亦未至於怠荒俄而朝野怨咨政刑紕繆何哉用人之失也自天寶已還小人道長如山有朽壞雖大必虧木有蠹蟲其榮易落以百口百心之讒諂蔽兩目兩耳之聰明苟非鐵腸石心安得不惑而獻可替否靡聞姚宋之言妬賢害功但有甫忠之奏豪猾因茲而睥睨明哲於是乎卷懷故祿山之徒得行其僞厲階之作匪降自天謀之不臧前功併棄惜哉贊曰開元握圖永鑒前車景氣融朗昏氛滌除政才勤倦妖集廷除先民之言靡不有初
