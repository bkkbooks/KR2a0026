body:
  text: 舊唐書卷五十三列傳第三李密李密字玄邃本遼東襄平人魏司徒弼曾孫後周賜弼姓徒何氏祖曜周太保魏國公父寬隋上柱國蒲山公皆知名當代徙為京兆長安人密以父蔭為左親侍嘗在仗下煬帝顧見之退謂許公宇文述曰向者左仗下黑色小兒為誰許公對曰故蒲山公李寬子密也帝曰箇小兒視瞻異常勿令宿衛他日述謂密曰弟聰令如此當以才學取官三衛叢脞非養賢之所密大喜因謝病專以讀書為事時人希見其面嘗欲尋包愷乘一黃牛被以蒲韉仍將漢書一帙掛於角上一手捉牛靷一手翻卷書讀之尚書令越國公楊素見於道從後按轡躡之既及問曰何處書生耽學若此密識越公乃下牛再拜自言姓名又問所讀書答曰項羽傳越公奇之與語大悅謂其子玄感等曰吾觀李密識度汝等不及於是玄感傾心結託大業九年煬帝伐高麗使玄感於黎陽監運時天下騷動玄感將謀舉兵潛遣人入關迎密以為謀主密至謂玄感曰今天子出征遠在遼外地去幽州懸隔千里南有巨海之限北有胡戎之患中間一道理極艱危今公擁兵出其不意長驅入薊直扼其喉前有高麗退無歸路不過旬朔賫糧必盡舉麾一召其衆自降不戰而擒此計之上也關中四塞天府之國有衛文升不足為意若經城勿攻西入長安掩其無備天子雖還失其襟帶據險臨之固當必克萬全之勢此計之中也若隨近逐便先向東都頓堅城之下勝負殊未可知此計之下也玄感曰公之下計乃上策也今百官家口並在東都若不取之安能動物且經城不拔何以示威密計遂不行玄感既至東都頻戰皆捷自謂天下響應功在朝夕及獲內史舍人韋福嗣又委以腹心是以軍旅之事不專歸密福嗣既非同謀因戰被執每設籌畫皆持兩端玄感後使作檄文福嗣固辭不肯密揣其情因謂玄感曰福嗣既非同盟實懷觀望明公初起大事而姦人在側必為所誤請斬之以謝衆方可安輯玄感曰何至於此密知言之不用退謂所親曰楚公好反而不圖勝如何吾屬今為虜矣後玄感將西入福嗣竟亡歸東都隋左武衛大將軍李子雄坐事被收繫送行在所於路殺使者亡投玄感乃勸玄感速稱尊號玄感問於密密曰昔陳勝自欲稱王張耳諫而被外魏武將求九錫荀彧止而見疏今者密若正言還恐追蹤二子阿諛順意又非密之本圖何者兵起已來雖復頻捷至於郡縣未有從者東都守禦尚彊天下救兵益至公當身先士衆早定關中乃欲急自尊崇何示人不廣也玄感笑而止及隋將宇文述來護兒等率軍且至玄感謂曰計將安出密曰元弘嗣統彊兵於隴右今可陽言其反遣使迎公因此入關可得紿衆因引軍西入至陝縣欲圍弘農宮密諫之曰公今詐衆西入事宜在速況乃追兵將至安可稽留若前不得據關退無所守大衆一散何以自全玄感不從遂圍之三日不拔方引而西至於閿鄉追兵遂及玄感敗密乃間行入關為捕者所獲時煬帝在高陽密與其黨俱送帝所謂其徒曰吾等之命同於朝露若至高陽必為葅醢今在道中猶可為計安得行就鼎鑊不規逃避也衆然之其多有金者密令出示使者曰吾等死日幸用相瘞其餘即皆報德使者利其金許之及出關外防禁漸弛密請市酒食每夜宴飲喧譁竟夕使者不以為意行至邯鄲密等七人穿牆而遁抵平原賊帥郝孝德孝德不甚禮之密又捨去詣淮陽隱姓名自稱劉智遠聚徒教授經數月鬱鬱不得志為五言詩曰金風蕩初節玉露凋晚林此夕窮塗士鬱陶傷寸心野平葭葦合村荒藜藿深眺聽良多感徙倚獨霑襟霑襟何所為悵然懷古意秦俗猶未平漢道將何冀樊噲市井徒蕭何刀筆吏一朝時運會千古傳名諡寄言世上雄虛生真可愧詩成而泣下數行時人有怪之者以告太守趙他下縣捕之密又亡去會東郡賊帥翟讓聚黨萬餘人密往歸之或有知密是玄感亡將潛勸讓害之讓囚密於營外密因王伯當以策干讓曰當今主昏於上人怨於下鋭兵盡於遼東和親絶於突厥方乃巡遊揚越委棄京都此亦劉項奮起之會以足下之雄才大略士馬精勇席卷二京誅滅暴虐則隋氏之不足亡也讓深加敬慕遽釋之遣說諸小賊所至皆降密又說讓曰今兵衆既多糧無所出若曠日持久則人馬困弊大敵一臨死亡無日矣未若直取滎陽休兵館穀待士勇馬肥然後與人爭利讓以為然自是破金隄關掠滎陽諸縣城堡多下之滎陽太守楊慶及通守張須以兵討讓讓曾為須所敗聞其來大懼將遠避之密曰須勇而無謀兵又驟勝既驕且狠可一戰而擒之公但列陳以待為公破之讓不得已勒兵將戰密分兵千餘人於木林間設伏讓與戰不利稍却密發伏自後掩之須衆潰與讓合擊大破之遂斬須於陳讓於是令密別統所部密軍陳整肅凡號令兵士雖盛夏皆若背負霜雪躬服儉素所得金寶皆頒賜麾下由是人為之用尋復說讓曰昏主蒙塵播蕩吳越羣兵競起海內飢荒明公以英傑之才而統驍雄之旅宜當廓清天下誅剪羣凶豈可求食草間常為小盜而已今東都士庶中外離心留守諸官政令不一明公親率大衆直掩興洛倉發粟以賑窮乏遠近孰不歸附百萬之衆一朝可集先發制人此機不可失也讓曰僕起隴畝之間望不至此必如所圖請君先發僕領諸軍便為後殿得倉之日當別議之大業十三年春密與讓領精兵千人出陽城北踰方山自羅口襲興洛倉破之開倉恣人所取老弱襁負道路不絶衆至數十萬隋越王侗遣虎賁郎將劉長恭率步騎二萬五千討密密一戰破之長恭僅以身免讓於是推密為主號為魏公二月於鞏南設壇場即位稱元年其文書行下稱行軍元帥魏公府以房彥藻為左長史邴元真為右長史楊得方為左司馬鄭德韜為右司馬拜翟讓為司徒封東郡公單雄信為左武候大將軍徐世績為右武候大將軍祖君彥為記室其餘封拜各有差於是城洛口周回四十里以居之長白山賊孟讓率所部歸密鞏縣長柴孝和侍御史鄭頤以鞏縣降密隋虎賁郎將裴仁基率其子行儼以武牢歸密拜為上柱國封河東郡公因遣仁基與孟讓率兵三萬餘人襲回洛倉破之入東都俘掠居人燒天津橋東都出兵乘之仁基等大敗僅以身免密復親率兵三萬逼東都將軍段達虎賁郎將高毗劉長林等出兵七萬拒之戰於故都城隋軍敗走密復下回洛倉而據之大修營塹以逼東都仍作書以移郡縣曰自元氣肇闢厥初生人樹之帝王以為司牧是以羲農軒頊之后堯舜禹湯之君靡不祗畏上玄愛育黔首乾乾終日翼翼小心馭朽索而同危履春冰而是懼故一物失所若納隍而愧之一夫有罪遂下車而泣之謙德軫於責躬憂勞切於罪己普天之下率土之濱蟠木距於流沙瀚海窮於丹穴莫不鼓腹擊壤鑿井耕田治致升平驅之仁壽是以愛之如父母敬之若神明用能享國多年祚延長世未有暴虐臨人克終天位者也隋氏往因周末預奉綴衣狐媚而圖聖寶胠篋以取神器及纘承負扆狼虎其心始曀明兩之暉終干少陽之位先皇大漸侍疾禁中遂為梟獍便行鴆毒禍深於莒僕釁酷於商臣天地難容人神嗟憤州吁安忍閼伯日尋劍閣所以懷凶晉陽所以興亂甸人為罄淫刑斯逞夫九族既睦唐帝闡其欽明百世本枝文王表其光大況復隳壤盤石剿絶維城脣亡齒寒寧止虞虢欲其長久其可得乎其罪一也禽獸之行在於聚麀人倫之體別於內外而蘭陵公主逼幸告終誰謂敤首之賢翻見齊襄之恥逮於先皇嬪御並進銀鐶諸王子女咸貯金屋牝雞鳴於詰旦雄雉恣其羣飛衵衣戲陳侯之朝穹廬同冒頓之寢爵賞之出女謁遂成公卿宣淫無復綱紀其罪二也平章百姓一日萬機未曉求衣昃晷不食大禹不貴於尺璧光武不隔於支體以是憂勤深慮幽枉而荒湎于酒俾晝作夜式號且呼甘嗜聲伎常居窟室每藉糟丘朝謁罕見其身羣臣希覩其面斷決自此不行敷奏於是停擁中山千日之飲酩町無名襄陽三雅之杯留連詎比又廣召良家充選宮掖潛為九市親駕四驢自比商人見要逆旅殷辛之譴為小漢靈之罪更輕內外驚心遐邇失望其罪三也上棟下宇著在易爻茅茨采椽陳諸史籍聖人本意惟避風雨詎待朱玉之華寧須綈錦之麗故璿室崇構商辛以之滅亡阿房崛起二世是以傾覆而不遵古典不念前章廣立池臺多營宮觀金鋪玉戶青瑣丹墀蔽虧日月隔閡寒暑窮生人之筋力罄天下之資財使鬼尚難為之勞人固其不可其罪四也公田所徹不過十畝人力所供才止三日是以輕徭薄賦不奪農時寧積於人無藏於府而科稅繁猥不知紀極猛火屢燒漏巵難滿頭會箕斂逆折十年之租杼軸其空日損千金之費父母不保其赤子夫妻相棄於匡牀萬戶則城郭空虛千里則煙火斷滅西蜀王孫之室翻同原憲之貧東海糜竺之家俄成鄧通之鬼其罪五也古先哲王卜征巡狩唐虞五載周則一紀本欲親問疾苦觀省風謠乃復廣積薪芻多備饔餼年年歷覽處處登臨從臣疲弊供頓辛苦飄風凍雨聊竊比於先驅車轍馬跡遂周行於天下秦皇之心未已周穆之意難窮宴西母而歌雲浮東海而觀日家苦納秸之勤人阻來蘇之望且夫天子有道守在海外夷不亂華在德非險長城之役戰國所為乃是狙詐之風非關稽古之法而追蹤秦代板築更興襲其基墟延袤萬里尸骸蔽野血流成河積怨滿於山川號哭動於天地其罪六也遼水之東朝鮮之地禹貢以為荒服周王棄而不臣示以羈縻達其聲教苟欲愛人非求拓土又強弩末矢理無穿於魯縞衝風餘力詎能動於鴻毛石田得而無堪雞肋啖而何用而恃衆怙力強兵黷武惟在並吞不思長策夫兵猶火也不戢將自焚遂令億兆夷人隻輪莫返夫差喪國實為黃池之盟苻堅滅身良由壽春之役欲捕鳴蟬於前不知挾彈在後復矢相顧髽而成行義夫切齒壯士扼腕其罪七也直言啓沃王臣匪躬惟木從繩若金須礪唐堯建鼓思聞獻替之言夏禹懸鞀時聽針規之美而愎諫違卜𢀿賢嫉能直士正人皆由屠害左僕射齊國公高熲上柱國宋國公賀若弼或文昌上相或細柳功臣暫吐良藥之言翻加屬鏤之賜龍逢無罪便遭夏癸之誅王子何辜濫被商辛之戮遂令君子結舌賢人緘口指白日而比盛射蒼天而敢欺不悟國之將亡不知死之將至其罪八也設官分職貴在銓衡察獄問刑無聞販鬻而錢神起論銅臭為公梁冀受黃金之蛇孟他薦蒲萄之酒遂使彝倫攸斁政以賄成君子在野小人在位積薪居上同汲黯之言囊錢不如傷趙一之賦其罪九也宣尼有言無信不立用命賞祖義豈食言自昏主嗣位每歲行幸南北巡狩東西征伐至如浩亹陪蹕東都守固閿鄉野戰鴈門解圍自外征夫不可勝紀既立功勳須酬官爵而志懷翻覆言行浮詭危急則勳賞懸授克定則絲綸不行異商鞅之頒金同項王之刓印芳餌之下必有懸魚惜其重賞求人死力走丸逆坂匹此非難凡百驍雄誰不讎怨至於匹夫蕞爾宿諾不虧既在乘輿二三其德其罪十也有一於此未或不亡況四維不張三靈總瘁無小無大愚夫愚婦共識殷亡咸知夏滅罄南山之竹書罪未窮決東海之波流惡難盡是以窮奇災於上國貐暴於中原三河縱封豕之貪四海被長蛇之毒百姓殲亡殆無遺類十分為計才一而已蒼生懍懍咸憂嵵國之崩赤子嗷嗷但愁歷陽之陷且國祚將改必有常期六百殷亡之年三十姬終之世故讖籙云隋氏三十六年而滅此則厭德之象已彰代終之兆先見皇天無親惟德是輔況乃欃槍竟天申繻謂之除舊歲星入井甘公以為義興兼朱雀門燒正陽日蝕狐鳴鬼哭川竭山崩並是宗廟為墟之妖荊棘旅庭之事夏氏則災釁非多殷人則咎徵更少牽牛入漢方知大亂之期王良策馬始驗兵車之會今者順人將革先天不違大誓孟津陳命景亳三千列國八百諸侯不謀而同辭不召而自至轟轟隱隱如霆如雷彪虎嘯而谷風生應龍驤而景雲起我魏公聰明神武齊聖廣淵總七德而在躬包九功而挺出周太保魏公之孫上柱國蒲山公之子家傳盛德武王承季歷之基地啓元勳世祖嗣元皇之業篤生白水日角之相便彰載誕丹陵大寶之文斯著加以姓符圖緯名協歌謠六合所以歸心三靈所以改卜文王厄於羑里赤雀方來高祖隱於碭山彤雲自起兵誅不道赤伏至自長安鋒鋭難當黃星出於梁宋九五龍飛之始天人豹變之初歷試諸難大敵彌勇上柱國司徒東郡公翟讓功宣締構翼亮經綸伊尹之佐成湯蕭何之輔高帝上柱國總管齊國公孟讓柱國歷城公孟暢柱國絳郡公裴行儼大將軍左長史邴元真等並運籌千里勇冠三軍擊劍則截蛟斷鼇彎弧則吟猿落鴈韓彭絳灌成沛公之基寇賈吳馮奉蕭王之業復有蒙輪挾輈之士拔距投石之夫驥馬追風吳戈照日魏公屬當期運伏茲億兆躬擐甲胄跋涉山川櫛風沐雨豈辭勞倦遂起西伯之師將問南巢之罪百萬成旅四七為名呼吸則河渭絶流叱咤則嵩華自拔以此攻城何城不陷以此擊陳何陳不摧譬猶瀉滄海而灌殘熒舉崑崙而壓小卵鼓行而進百道俱前以今月二十一日屆於東都而昏朝文武留守段達等昆吾惡稔飛廉姦佞久迷天數敢拒義兵驅率醜徒衆有十萬回洛倉北遂來舉斧於是熊羆角逐貔虎爭先因其倒戈之心乘我破竹之勢曾未旋踵瓦解冰銷坑卒則長平未多積甲則熊耳為小達等助桀為虐嬰城自固梯衝亂舞徒設九拒之謀鼓角將鳴空憑百樓之險燕巢衛幕魚遊宋池殄滅之期匪朝伊暮然興洛虎牢國家儲積我已先據為日久矣既得回洛又取黎陽天下之倉盡非隋有四方起義足食足兵無前無敵裴光祿仁基雄才上將受脤專征遐邇攸憑安危是託乃識機知變遷殷事夏袁謙擒自藍水張須獲在滎陽竇慶戰沒於淮南郭詢授首於河北隋之亡候聊可知也清河公房彥藻近秉戎律略地東南師之所臨風行電擊安陸汝南隨機蕩定淮安濟陽俄然送款徐圓朗已平魯郡孟海公又破濟陽海內英雄咸來響應封民贍取平原之境郝孝德據黎陽之倉李士雄虎視於長平王德仁鷹揚於上黨滑公李景考功郎中房山基發自臨渝劉興祖起於白朔崔白駒在潁川起方獻伯以譙郡來各擁數萬之兵俱期牧野之會滄溟之右函谷以東牛酒獻於軍前壺漿盈於道路諸君等並衣冠世胄嵵梓良才神鼎靈繹之秋裂地封侯之始豹變鵲起今也其時鼉鳴鱉應見機而作宜各鳩率子弟共建功名耿弇之赴光武蕭何之奉高帝豈止金章紫綬華蓋朱輪富貴以重當年忠貞以傳奕葉豈不盛哉若隋代官人同吠堯之犬尚荷王莽之恩仍懷蒯聵之祿審配死於袁氏不如張郃歸曹范增困於項王未若陳平從漢魏公推以赤心當加好爵擇木而處令不自疑脫猛虎猶豫舟中敵國夙沙之人共縛其主彭寵之僕自殺其君高官上賞即以相授如暗於成事守迷不反崑山縱火玉石俱焚爾等噬臍悔將何及黃河帶地明余旦旦之言皎日麗天知我勤勤之意布告海內咸使聞知祖君彥之辭也俄而德韜德方俱死復以鄭頲為左司馬鄭虔象為右司馬柴孝和說密曰秦地阻山帶河西楚背之而亡漢高都之而霸如愚意者令仁基守回洛翟讓守洛口明公親簡精鋭西襲長安百姓孰不郊迎必當有征無戰既克京邑業固兵強方更長驅崤函掃蕩東洛傳檄指撝天下可定但今英雄競起實恐他人我先一朝失之噬臍何及密曰君之所圖僕亦思之久矣誠乃上策但昏主尚存從兵猶衆我之所部並是山東人既見未下洛陽何肯相隨西入諸將出於羣盜留之各競雄雌若然者殆將敗矣密恃兵鋒甚鋭每入苑與隋軍連戰會密為流矢所中臥於營內東都復出兵乘之密衆大潰棄回洛倉歸于洛口煬帝遣王世充率徑卒五萬擊之密與戰不利孝和溺死於洛水密哭之甚慟世充營於洛西與密相拒百餘日大小六十餘戰武陽郡丞元寶藏黎陽賊帥李文相洹水賊帥張升清河賊帥趙君德平原賊帥郝孝德並歸於密共襲破黎陽倉據之永安大族周法明舉江黃之地以附密齊郡賊帥徐圓朗任城大俠徐師仁淮陽太守趙他皆歸之翟讓部將王儒信勸讓為大冢宰總統衆務以奪密之權讓兄寬復謂讓曰天子止可自作安得與人汝若不能作我當為之密聞其言陰有圖讓之計會世充列陳而至讓出拒之為世充所擊讓軍少失利密與單雄信等率精鋭赴之世充敗走明日讓徑至密所欲為宴樂密具饌以待之其所將左右各分令就食密引讓入坐以良弓示讓讓方引滿密遣壯士自後斬之並殺其兄寬及王儒信讓部將徐世績為亂兵所斫中重瘡密遽止之得免單雄信等頓首求哀密並釋而慰諭之於是詣讓連營諭其將士無敢動者及命徐世績單雄信王伯當分統其衆未幾世充襲倉城密復破之世充復移營洛北造浮橋悉衆以擊密密與千餘騎拒之不利而退世充因薄其城下密簡鋭卒數百人以邀之世充大潰爭趣浮橋溺死者數萬虎賁郎將楊威王辨霍舉劉長恭梁德董智皆沒于陳世充僅而獲免其夜大雨雪士卒凍死者殆盡密乘勝陷偃師於是修金墉城居之有衆三十餘萬留守韋津又與密戰於上春門津大敗執於陳將作大匠宇文愷叛東都降于密東至海岱南至江淮郡縣莫不遣使歸密竇建德朱粲楊士林孟海公徐圓朗盧祖尚周法明等並隨使通表於密勸進於是密下官屬咸勸密即尊號密曰東都未平不可議此及義旗建密負其強盛欲自為盟主乃致書呼高祖為兄請合從以滅隋大略云欲與高祖為盟津之會殪商辛於牧野執子嬰於咸陽其旨以弒後主執代王為意高祖覽書笑曰李密陸梁放肆不可以折簡致之吾方安輯京師未遑東討即相阻絶便是更生一秦密今適所以為吾拒東都之兵守成臯之扼更求韓彭莫如用密宜卑辭推奬以驕其志使其不虞於我我得入關據蒲津而屯永豐阻崤函而臨伊洛吾大事濟矣令記室溫大雅作書報密曰頃者崑山火烈海水羣飛赤縣丘墟黔黎塗炭布衣戎卒鋤耰棘矜爭霸圖王狐鳴蜂起翼翼京洛強弩圍城膴膴周原僵尸滿路主上南巡泛膠舟而忘返胸奴北熾將被髮於伊川輦上無虞羣下結舌大盜移國莫之敢指忽焉至此自貽伊戚七百之基窮於二世周齊以往書契以還邦國淪胥未有如斯之酷者也天生蒸民必有司牧當今為牧非子而誰老夫年餘知命願不及此欣戴大弟攀鱗附翼惟冀早應圖籙以寧兆庶宗盟之長屬籍見容復封於唐斯榮足矣殪商辛於牧野所不忍言執子嬰於咸陽非敢聞命汾晉左右尚須安輯盟津之會未暇卜期今日鑾輿南幸恐同永嘉之勢顧此中原鞠為茂草興言感歎實疚于懷脫知動靜數遲貽報未面靈襟用增勞軫名利之地鋒鏑縱橫深慎垂堂勉茲鴻業密得書甚悅示其部下曰唐公見推天下不足定也於是不虞義師而專意於世充俄而宇文化及率衆自江都北指黎陽兵十餘萬密乃自將步騎二萬拒之隋越王侗稱尊號遣使授密太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政密將與化及相抗恐前後受敵因卑辭以報謝焉化及至黎陽與密相遇密知其軍少食利在急戰故不與交鋒又遏其歸路密遣徐世績守倉城化及攻之不能下密知化及糧且盡因僞與和以弊其衆化反弗之悟大喜恣其兵食冀密饋之後知其計化及怒與密大戰于衛州之童山下密為流矢所中頓於汲縣化及力竭糧盡衆多叛之掠汲縣北趣魏縣其將陳智略張童仁等率所部兵歸于密者前後相繼初化及留輜重於東郡遣其所署刑部尚書王軌守之至是軌舉郡降密密引兵而西遣使朝于東都執弒煬帝人于弘達獻越王侗侗召密入朝至溫縣聞世充作難而止乃歸金墉城時密兵少衣世充兵乏食乃請交易密初難之邴元真好求私利屢勸密密遂許焉初東都絶糧兵士歸密者日有數百至此得食而降人益少密方悔而止密雖據倉而無府庫兵數戰皆不獲賞又厚撫初附之兵由是衆心漸怨武德元年九月世充以其衆五千來決戰密留王伯當守金墉自引精兵就偃師北阻邙山以待之世充軍至密遂敗績裴仁基祖君彥並為世充所虜密與萬餘人馳向洛口世充圍偃師守將鄭頲之下兵士劫叛以城降世充密將入洛口倉城邴元真已遣人潛引世充密陰知之不發其事欲待世充兵半渡洛水然後擊之及世充軍至密候騎不時覺比將出戰世充軍已濟矣密自度不能支引騎而遁徑赴武牢元真竟以城降於世充密將如黎陽或謂密曰殺翟讓之際徐世績幾至於死今向其所安可保乎時王伯當棄金墉保河陽密以輕騎自武牢歸之謂伯當曰兵敗矣久苦諸君我今自刎請以謝衆伯當抱密號叫慟絶衆皆泣莫能仰視密復曰諸軍幸不相棄當共歸關中密身雖愧無功諸君必保富貴其府掾柳奭對曰昔盆子歸漢尚食均輸明公與唐公同族兼有疇昔之遇雖不陪從起義然而阻東都斷隋歸路使唐公不戰而據京師此亦公之功也衆咸曰然密又謂王伯當曰將軍室家重大豈復與孤俱行哉伯當曰昔漢高誅項蕭何率子弟以從伯當恨不昆季盡從以此為愧耳豈以公今日失利遂輕去就縱身分原野亦所甘心左右莫不感激於是從入關者尚二萬人高祖遣使迎勞相望於道密大喜謂其徒曰我有衆百萬一朝至此命也今事敗歸國幸蒙殊遇當思竭忠以事所奉耳且山東連城數百知吾至此遣使招之盡當歸國比於竇融勳亦不細豈不以一台司見處乎及至京師禮數益薄執政者又來求賄意甚不平尋拜光祿卿封邢國公未幾聞其所部將帥皆不附世充高祖使密領本兵往黎陽招集故時將士經略世充時王伯當為左武衛將軍亦令為副密行至桃林高祖復徵之密大懼謀將叛伯當頗止之密不從因謂密曰義士之立志也不以存亡易心伯當荷公恩禮期以性命相報公必不聽今祇可同去死生以之然終恐無益也乃簡驍勇數十人著婦人衣戴藏刀裙下詐為妻妾自率之入桃林縣舍須臾變服突出因據縣城驅掠畜産直趣南山乘險而東遣人馳告張善相令以兵應接時右翊衛將軍史萬寶留鎮熊州遣副將盛彥師率步騎數千追躡至陸渾縣南七十里與密相及彥師伏兵山谷密軍半度橫出擊敗之遂斬密時年三十七王伯當亦死之與密俱傳首京師時李績為黎陽總管高祖以績舊經事密遣使報其反狀績表請收葬詔許之高祖歸其尸績發喪行服備君臣之禮大具威儀三軍皆縞素葬于黎陽山南五里故人哭之多有歐血者邴元真之降世充也以為行臺僕射鎮滑州密故將杜才幹恨元真背密詐與之會伏甲斬之以其首祭于密冢單雄信者曹州人也翟讓與之友善少驍健尤能馬上用槍密軍號為飛將密偃師失利遂降於王世充署為大將軍太宗圍逼東都雄信出軍拒戰援槍而至幾及太宗徐世績呵止之曰此秦王也雄信惶懼遂退太宗由是獲免東都平斬於洛陽史臣曰當隋政板蕩煬帝荒淫搖動中原遠征遼海內無賢臣以匡國外乏良吏以理民兩京空虛兆庶疲弊李密因民不忍首為亂階心斷機謀身臨陳敵據鞏洛之口號百萬之師竇建德輩皆效樂推唐公紿以欣戴不亦偉哉及偃師失律猶存麾下數萬衆苟去猜忌疾趣黎陽任世績為將臣信魏徵為謀主成敗之勢或未可知至於天命有歸大事已去比陳涉有餘矣始則稱首舉義兵終乃甘心為降虜其為計也不亦危乎又不能委質為臣竭誠事上竟為叛者終是狂夫不取伯當之言遂及桃林之禍或以項羽擬之文武器度即有餘壯勇斷果則不及楊素既知密之才幹合為王之爪牙委之癡兒卒為謀主覆族之禍其宜也哉贊曰烏陽既升爝火不息狂哉李密始亂終逆
