body:
  text: 舊唐書卷五十九列傳第九屈突通子壽少子詮詮子仲翔任瓌丘和子行恭行恭子神績許紹孫力士力士子欽寂欽明紹次子智仁少子圉師李襲志弟襲譽子懷儼姜子行本行本子簡簡子晞簡弟柔遠柔遠子皎晦皎男慶初屈突通雍州長安人父長卿周邛州刺史通性剛毅志尚忠賣心檢身清正好武略善騎射開皇中為親衛大都督文帝遣通往隴西檢覆羣牧得隱藏馬二萬餘匹文帝盛怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重死不再生陛下至仁至聖子育羣下豈容以畜産之故而戮千有餘人愚臣狂狷輒以死請文帝瞋目叱之通又頓首曰臣一身如死望免千餘人命帝寤曰朕之不明以至於是感卿此意良用惻然今從所請以旌諫諍悉達等竟以減死論由是漸見委信擢為右武候車騎將軍奉公正直雖親戚犯法無所縱捨時通弟蓋為長安令亦以嚴整知名時人為之語曰寧食三斗艾不見屈突蓋寧服三斗葱不逢屈突通為人所忌憚如此及文帝崩煬帝遣通以詔徵漢王諒先是文帝與諒有密約曰若璽書召汝於敕字之傍別加一點又與玉麟符合者當就徵及發書無驗諒覺變詰通通占對無所屈竟得歸長安大業中纍轉左驍衛大將軍時秦隴盜賊蜂起以通為關內討捕大使有安定人劉迦論舉兵反據雕陰郡僭號建元署置百官有衆十餘萬稽胡首領劉鷂子聚衆與迦論相影響通發關中兵擊之師臨安定初不與戰軍中以通為怯通乃揚聲旋師而潛入上郡迦論不之覺遂進兵南寇去通七十里而舍分兵掠諸城邑通候其無備簡精甲夜襲之賊衆大潰斬迦論並首級萬餘於上郡南山築為京觀虜男女數萬口而還煬帝幸江都令通鎮長安義兵起代王遣通進屯河東既而義師濟河大破通將桑顯和於飲馬泉永豐倉又為義師所克通大懼留鷹揚郎將堯君素守河東將自武關趨藍田以赴長安軍至潼關為劉文靜所遏不得進相持月餘通又令顯和夜襲文靜詰朝大戰義軍不利顯和縱兵破二柵惟文靜一柵獨存顯和兵復入柵而戰者往覆數焉文靜為流矢所中義軍氣奪垂至於敗顯和以兵疲傳餐而食文靜因得分兵以實二柵又有遊軍數百騎自南山來擊其背三柵之兵復大呼而出表𩹉齊奮顯和軍潰僅以身免悉虜其衆通勢彌蹙或說通歸降通泣曰吾蒙國重恩歷事兩主受人厚祿安可逃難有死而已每自摩其頸曰要當為國家受人一刀耳勞勉將士未嘗不流涕人亦以此懷之高祖遣其家僮召之通遽命斬之通聞京師平家屬盡沒乃留顯和鎮潼關率兵東下將趨洛陽通適進路而顯和降於劉文靜遣副將竇琮段志玄等率精騎與顯和追之及於稠桑通結陳以自固竇琮縱通子壽令往諭之通大呼曰昔與汝為父子今與汝為仇讎命左右射之顯和呼其衆曰京師陷矣汝並關西人欲何所去衆皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祇實所鑒察遂擒通送于長安高祖謂曰何相見晚耶通泣對曰通不能盡人臣之節力屈而至為本朝之辱以愧相王高祖曰隋室忠臣也命釋之授兵部尚書封蔣國公仍為太宗行軍元帥長史從平薛舉時珍物山積諸將皆爭取之通獨無所犯高祖聞而謂曰公清正奉國著自終始名下定不虛也特賜金銀六百兩綵物一千段尋以本官判陝東道行臺僕射復從太宗討王世充時通有二子並在洛陽高祖謂通曰東征之事今以相屬其如兩子何通對曰臣以老朽誠不足以當重任但自惟疇昔執就軍門至尊釋其縲囚加之恩禮既不能死實荷再生當此之時心口相誓暗以身命奉許國家久矣今此行也臣願先驅兩兒若死自是其命終不以私害義高祖歎息曰徇義之夫一至於此及大兵圍洛陽竇建德且至太宗中分麾下以屬通令與齊王元吉圍守洛陽世充平通功為第一尋拜陝東大行臺右僕射鎮于洛陽數歲徵拜刑部尚書通自以不習文法固辭之轉工部尚書隱太子之誅也通復檢校行臺僕射馳鎮洛陽貞觀元年行臺廢授洛州都督賜實封六百戶加左光祿大夫明年卒年七十二太宗痛惜久之贈尚書右僕射諡曰忠子壽襲爵太宗幸洛陽宮思通忠節拜其少子詮果毅都尉賜束帛以恤其家焉十七年詔圖形於凌煙閣二十三年與房玄齡配饗太宗廟庭永徽五年重贈司空詮官至瀛州刺史詮子仲翔神龍中亦為瀛州刺史任瓌字瑋廬州合肥人陳鎮東大將軍蠻奴弟之子也父七寶仕陳定遠太守瓌早孤蠻奴愛之情踰己子每稱曰吾子姪雖多並傭保耳門戶所寄惟在於瓌年十九試守靈溪令俄遷衡州司馬都督王勇甚敬異之委以州府之務屬隋師滅陳瓌勸勇據嶺南求陳氏子孫立以為帝勇不能用以嶺外降隋瓌乃棄官而去仁壽中為韓城尉俄又罷職及高祖討捕於汾晉瓌謁高祖於轅門承制為河東縣戶曹高祖將之晉陽留隱太子建成以託於瓌義師起瓌至龍門謁見高祖謂之曰隋氏失馭天下沸騰吾忝以外戚屬當重寄不可坐觀時變晉陽是用武之地士馬精強今率驍雄以匡國難卿將家子深有智謀觀吾此舉將為濟否瓌曰後主殘酷無道征役不息天下恟恟思聞拯亂公天縱神武親舉義師所下城邑秋毫無犯軍令嚴明將士用命關中所在蜂起惟待義兵仗大順從衆欲何憂不濟瓌在馮翊積年人情諳練願為一介之使銜命入關同州已東必當款伏於梁山船濟直指韓城進逼郃陽分取朝邑且蕭造文吏本無武略仰懼威靈理當自下孫華諸賊未有適從必當相率而至然後鼓行整衆入據永豐雖未得京城關中固已定矣高祖曰是吾心也乃授銀青光祿大夫遣陳演壽史大奈領步騎六千趨梁山渡河使瓌及薛獻為招慰大使高祖謂演壽曰閫外之事宜與任瓌籌之孫華白玄度等聞兵且至果競來降並具舟于河師遂利涉瓌說下韓城縣與諸將進擊飲馬泉破之拜左光祿大夫留守永豐倉高祖即位改授穀州刺史王世充數率衆攻新安瓌拒戰破之以功纍封管國公太宗率師討世充瓌從至邙山使檢校水運以供餉饋關東初定持節為河南道安撫大使世充弟辨為徐州行臺尚書令率所部詣瓌降瓌至宋州屬徐圓朗據兗州反曹戴諸州咸應之副使柳濬勸瓌退保汴州瓌笑曰柳公何怯也老將居邊甚久自當有計非公所知圓朗俄又攻陷楚丘引兵將圍虞城瓌遣崔樞張公謹自鄢陵領諸州豪右質子百餘人守虞城以拒賊濬又諫曰樞與公謹並世充之將又諸州質子父兄皆反此必為變瓌不答樞至則分配質子並與土人合隊居守賊既稍近質子有叛者樞因斬其隊帥城中人懼曰質子父兄悉來為賊賊之子弟安可守城樞因縱諸隊各殺質子梟首于門外遣使報瓌瓌陽怒曰遣將去者欲招慰耳何罪而殺之退謂濬曰固知崔樞辦之既遣縣人殺賊質子冤隙已大吾何患焉樞果拒却圓朗事平遷徐州總管仍為大使瓌選補官吏頗私親故或依倚其勢多所求納瓌知而不禁又妻劉氏妬悍無禮為世所譏及輔公祏平拜邢州都督隱太子之誅也瓌弟璨時為典膳監瓌坐左遷通州都督貞三年卒丘和河南洛陽人也父壽魏鎮東將軍和少便弓馬重氣任俠及長始折節與物無忤無貴賤皆愛之周為開府儀同三司入隋纍遷右武衛將軍封平城郡公漢王諒之反也以和為蒲州刺史諒使兵士服婦人服戴奄至城中和脫身而免由是除名時宇文述方被任遇和傾心附之又以發武陵公元胄罪拜代州刺史屬煬帝北巡過代州和獻食甚精及至朔州刺史楊廓獨無所獻帝不悅而宇文述又盛稱之乃以和為博陵太守仍令楊廓至博陵觀和為式及駕至博陵和上食又豐帝益稱之由是所幸處獻食者競為華侈和在郡善撫吏士甚得歡心尋遷天水郡守大業末以海南僻遠吏多侵漁百姓咸怨數為亂逆於是選淳良太守以撫之黃門侍郎裴矩奏言丘和歷居二郡皆以惠政著聞寬而不擾煬帝從之遣和為交趾太守既至撫諸豪傑甚得蠻夷之心會煬帝為化及所弒鴻臚卿寧長真以鬱林始安之地附於蕭銑馮盎以蒼梧高涼珠崖番禺之地附于林士弘各遣人召之和初未知隋亡皆不就林邑之西諸國並遣遺和明珠文犀金寶之物富埒王者銑利之遣長真率百越之衆渡海侵和和遣高士廉率交愛首領擊之長真退走境內獲全郡中樹碑頌德會舊驍果從江都還者審知隋滅遂以州從銑及銑平和以海南之地歸國詔使李道裕即授上柱國談國公交州總管和遣司馬高士廉奉表請入朝詔許之高祖遣其子師利迎之及謁見高祖為之興引入臥內語及平生甚歡奏九部樂以饗之拜左武候大將軍和時年已衰老乃拜稷州刺史以是本鄉令自怡養九年除特進貞觀十一年卒年八十六贈荊州總管諡曰襄賜東園祕器陪葬獻陵有子十五人多至大官惟行恭知名行恭善騎射勇敢絶倫大業末與兄師利聚兵於岐雍間有衆一萬保故郿城百姓多附之羣盜不敢入境初原州奴賊數萬人圍扶風郡太守竇璡堅守經數月賊中食盡野無所掠衆多離散投行恭者千餘騎行恭遣其酋渠說諸奴賊共迎義軍行恭又率五百人皆負米麥持牛酒自詣賊營奴帥長揖行恭手斬之謂其衆曰汝等並是好人何因事奴為主使天下號為奴賊衆皆俯伏曰願改事公行恭率其衆與師利共謁太宗于渭北拜光祿大夫從平京城討薛舉劉武周王世充竇建德皆立殊勳授左一府驃騎賞賜甚厚隱太子之誅也行恭以功遷左衛將軍貞觀中坐與嫡兄爭葬所生母為法司所劾除名因從侯君集平高昌封天水郡公纍除右武候將軍高宗嗣位歷遷右武候大將軍冀陝二州刺史尋請致仕拜光祿大夫麟德二年卒年八十贈荊州都督諡曰襄賜溫明祕器陪葬昭陵行恭性嚴酷所在僚列皆懾憚之數坐事解免太宗每思其功不踰時月復其官初從討王世充會戰於邙山之上太宗欲知其虛實強弱乃與數十騎衝之直出其後衆皆披靡莫敢當其鋒所殺傷甚衆既而限以長隄與諸騎相失惟行恭獨從尋有徑騎數人追及太宗矢中御馬行恭乃回騎射之發無不中餘賊不敢復前然後下馬拔箭以其所乘馬進太宗行恭於御馬前步執長刀巨躍大呼斬數人突陳而出得入大軍貞觀中有詔刻石為人馬以象行恭拔箭之狀立於昭陵闕前子神績嗣聖元年為左金吾將軍則天使於巴州害章懷太子既而歸罪於神績左遷疊州刺史尋復入為左金吾衛大將軍深見親委嘗受詔鞫獄與周興來俊臣等俱號為酷吏尋以罪伏誅神龍初禁錮其子孫和少子行掩高宗時為少府監許紹字嗣宗本高陽人也梁末徙于周因家于安陸祖弘父法光俱為楚州刺史元皇帝為安州總管故紹兒童時得與高祖同學特相友愛大業末為夷陵郡通守是時盜賊競起紹保全郡境流戶自歸者數十萬口開倉賑給甚得人心及江都弒逆紹率郡人大臨三日仍以郡遙屬越王侗王世充篡位乃率黔安武陵澧陽等諸郡遣使歸國授硤州刺史封安陸郡公高祖降敕書曰昔在子襟同遊庠序博士吳琰其妻姓仇追想此時宛然心目荏苒歲月遂成纍紀且在安州之日公家乃蒞嶽州渡遼之時伯裔又同戎旅安危契闊纍葉同之其間遊處觸事可想雖盧綰與劉邦同里吳質共曹丕接席以今方古何足稱焉而公追硯席之舊歡存通家之曩好明鑒去就之理洞識成敗之機爰自荊門馳心絳闕綏懷士庶糾合賓僚踰越江山遠申誠款覽此忠至彌以慰懷及蕭銑將董景珍以長沙來降命紹率兵應之以破銑功拜其子智仁為溫州刺史委以招慰時蕭銑遣其將楊道生圍硤州紹縱兵擊破之銑又遣其將陳普環乘大艦泝江入硤與開州賊蕭闍提規取巴蜀紹遣智仁及録事參軍李弘節子壻張玄靜追至西陵硤大破之生擒普環收其船艦江南岸有安蜀城與硤州相對次東有荊門城皆險峻銑並以兵鎮守紹遣智仁及李弘節攻荊門鎮破之高祖大悅下制褒美許以便宜從事紹與王世充蕭銑疆界連接紹之士卒為賊所虜者輒見殺害紹執敵人皆資給而遣之賊感其義不復侵掠闔境獲安趙郡王孝恭之擊蕭銑也復令紹督兵以圖荊州會卒於軍高祖聞而流涕貞觀中贈荊州都督嫡孫力士襲爵官至洛州長史卒子欽寂嗣萬歲登封年為夔州都督府長史時契丹入寇以欽寂兼龍山軍討擊副使軍次崇州戰敗被擒其後賊將圍安東令欽寂說屬城之未下者安東都督裴玄圭時在城下欽寂謂之曰狂賊天殃滅在朝夕公但謹守勵兵以全忠節賊大怒遂害之則天下制褒美贈蘄州刺史諡曰忠又授其子輔乾左監門衛中候仍為海東慰勞使令迎其喪柩以禮改葬輔乾開元中官至光祿卿欽寂弟欽明少以軍功歷左玉鈐衛將軍安西大都護封鹽山郡公萬歲通天元年授金紫光祿大夫涼州都督欽明嘗出按部突厥默啜率衆數萬奄至城下欽明拒戰久之力屈被執賊將欽明至靈州城下令說城中早降欽明大呼曰賊中都無飲食城內有美醬乞二升粱米乞二斗墨乞一梃是時賊營處四面阻泥河惟有一路得入欽明乞此物以喻城中冀其簡兵陳將候夜掩襲城中無悟其旨者尋遇害兄弟同年皆死王事論者稱之紹次子智仁初以父勳授溫州刺史封孝昌縣公尋繼其父為硤州刺史後歷太僕少卿涼州都督貞觀中卒紹少子圉師有器幹博涉藝文舉進士顯慶二年纍遷黃門侍郎同中書門下三品兼修國史三年以修實録功封平恩縣公賜物三百段四遷龍朔中為左相俄以子自然因獵射殺人隱而不奏又為李義府所擠左遷虔州刺史尋轉相州刺史政存寬惠人吏刊石以頌之嘗有官吏犯贓事露圉師不令推究但賜清白詩以激之犯者愧懼遂改節為廉士其寬厚如此上元中再遷戶部尚書儀鳳四年卒贈幽州都督陪葬恭陵諡曰簡李襲志字重光本隴西狄道人也五葉祖景避地安康復稱金州安康人也周信州總管安康郡公遷哲孫也父敬猷隋台州刺史安康郡公襲志初仕隋歷始安郡丞大業末江外盜賊尤甚襲志散家産招募得三千人以守郡城時蕭銑林士弘曹武徹等爭來攻擊襲志固守久之後聞宇文化及弒逆乃集士庶舉哀三日有郡人勸襲志曰公纍葉冠族久臨鄙郡蠻夷畏威士女悅服雖曰隋臣實我之君長今江都篡逆四海鼎沸王號者非止一人公宜因此時據有嶺表則百越之人皆拱手向化追蹤尉他亦千載一遇也襲志厲聲曰吾世樹忠貞見危授命今雖江都陷沒而宗社猶存當與諸君戮力中原共雪讎恥豈可怙亂稱兵以圖不義吾寧蹈忠而死不為逆節而求生尉他愚鄙無識何足景慕於是欲斬勸者從衆議而止襲志固守經二年而無援卒為蕭銑所陷銑署為工部尚書檢校桂州總管武德初高祖遣其子玄嗣齎書召之襲志乃密說嶺南首領隨永平郡守李光度與之歸國高祖又令間使齎書諭襲志曰卿昔久在桂州仍屬隋室運終四方圮絶率衆保境未知所統朕撫臨天下志在綏育眷彼幽遐思沾聲教況卿朕之宗姓情異於常一家弟姪並立誠效公又分遣首領申諭諸州情深奉國甚副所望卿之子弟並據州縣俱展誠績每所嘉歎不能已已令並入屬籍著於宗正及蕭銑平江南道大使趙郡王孝恭授襲志桂州總管武德五年入朝授柱國封始安郡公拜江州都督及輔公祏反又以襲志為水軍總管討平之轉桂州都督襲志前後凡任桂州二十八載政尚清簡嶺外安之後表請入朝拜右光祿大夫行汾州刺史致仕卒於家襲志弟襲譽襲譽字茂實少通敏有識度隋末為冠軍府司兵時陰世師輔代王為京師留守所在盜賊蜂起襲譽說世師遣兵據永豐倉發粟以賑窮乏出庫物賞戰士移檄郡縣同心討賊世師不能用乃求外出募山南士馬世師許之既至漢中會高祖定長安召授太府少卿封安康郡公仍令與兄襲志附籍於宗正太宗討王世充以襲譽為潞州總管時突厥與國和親又通使於世充襲譽掩擊悉斬之因委令轉運以餽大軍後歷光祿卿蒲州刺史轉揚州大都督府長史為江南道巡察大使多所黜陟江都俗好商賈不事農桑襲譽乃引雷陂水又築勾城塘溉田八百餘頃百姓獲其利召拜太府卿襲譽性嚴整所在以威肅聞凡獲俸祿必散之宗親其餘資多寫書而已及從揚州罷職經史遂盈數車嘗謂子孫曰吾近京城有賜田十頃耕之可以充食河內有賜桑千樹蠶之可以充衣江東所寫之書讀之可以求官吾沒之後爾曹但能勤此三事亦何羡於人尋轉涼州都督加金紫光祿大夫行同州刺史坐在涼州陰憾番禾縣丞劉武杖而殺之至是有司議當死制除名流於泉州無幾而卒撰五經妙言四十卷江東記三十卷忠孝圖二十卷兄子懷儼頗以文才著名歷蘭臺侍郎受制檢校寫四部書進內以書有汙左授郢州刺史後卒于禮部侍郎姜秦州上邽人祖真後魏南秦州刺史父景周梁州總管建平郡公大業末為晉陽長會高祖留守太原見深器之退謂所親曰隋祚將亡必有命世大才以應圖籙唐公有霸王之度以吾觀之必為撥亂之主由是深自結納及大將軍府建引為司功參軍從平霍邑拔絳郡監督大軍濟河時兵士爭渡部勒諸軍自昏至曉六軍畢濟高祖稱歎之平京城除相國兵曹參軍封長道縣公時薛舉寇秦隴以西州之望詔於隴右安撫承制以便宜從事將行奏曰天人之望誠有所歸願早膺圖籙以寧兆庶老夫犬馬暮齒恐先朝露得一覩升紫殿死無所恨高祖大悅與竇軌出散關下河池漢陽二郡軍次長道與薛舉相遇軌輕敵為舉所敗徵還京拜員外散騎常侍及平薛仁杲拜秦州刺史高祖謂曰衣錦還鄉古人所尚今以本州相授用答元功涼州之路近為荒梗宜弘方略有以靜之至州撫以恩信州人相謂曰吾輩復見太平官府矣盜賊悉來歸首士庶安之尋轉隴州刺史七年以老疾去職貞觀元年卒贈岷州都督諡曰安子行本貞觀中為將作大匠太宗修九成洛陽二宮行本總領之以勤濟稱旨賞賜甚厚有所遊幸未嘗不從又轉左屯衛將軍時太宗選趫捷之士衣五色袍乘六間馬直屯營以充仗內宿衛名為飛騎每遊幸即騎以從分隸於行本及高昌之役以行本為行軍副總管率衆先出伊州未至柳谷百餘里依山造攻具其處有班超紀功碑行本磨去其文更刻頌陳國威德而去遂與侯君集進平高昌璽書勞之曰攻戰之重器械為先將士屬心待以制敵卿星言就路躬事修營干戈才動梯衝暫臨三軍勇士因斯樹績萬里逋寇用是克平方之前古豈足相況及還進封金城郡公賜物一百五十段奴婢七十人十七年太宗將征高麗行本諫以為師未可動太宗不從行本從至蓋牟城中流矢卒太宗賦詩以悼之贈左衛大將軍郕國公諡曰襄陪葬昭陵子簡嗣永徽中官至安北都護卒子晞嗣開元初左散騎常侍簡弟柔遠美姿容善於敷奏則天時至左鷹揚衛將軍通事舍人內供奉柔遠子皎長安中纍遷尚衣奉御時玄宗在藩見而悅之皎察玄宗有非常之度尤委心焉尋出為潤州長史玄宗即位召拜殿中少監數召入臥內命之捨敬曲侍宴私與后妃連榻間以擊毬鬬雞常呼之為姜七而不名也兼賜以宮女名馬及諸珍物不可勝數玄宗又嘗與皎在殿庭玩一嘉樹皎稱其美玄宗遽令徙植於其家其寵遇如此及竇懷貞等潛謀逆亂玄宗將討之皎協贊謀議以功拜殿中監封楚國公實封四百戶玄宗以皎在藩之舊皎又有先見之明欲宣布其事乃下敕曰朕聞士之生代始於事親中於事君終於立身此其本也若乃移孝成忠策名委質命有太山之重義徇則為輕草有疾風之力節全則知徑況君臣之相遇而故舊之不遺乎銀青光祿大夫殿中監楚國公姜皎簪紱聯華圭璋特秀寬厚為量體靜而安仁精微用心理和而專直往居藩邸潛款風雲亦由彭祖之同書子陵之共學朕常遊幸于外至長楊鄠杜之間皎於此時與之纍宿私謂朕曰太上皇即登九五王必為儲副凡如此者數四朕叱而後止寧知非僕雖玩於鄧晨可收護軍遂訶於朱祐皎復言於朕兄弟及諸駙馬等因聞徹太上皇太上皇遽奏於中宗孝和皇帝尋遣嗣虢王雍等鞫問皎保護無怠辭意轉堅李通之讖記不言田叔之髠鉗罔憚仍為宗楚客紀處訥等密奏請投皎炎荒中宗特降恩私左遷潤州長史讒邪每構忠懇逾深戴于朕躬憂存王室以為天且有命預覩成龍之徵人而無禮常懷逐鳥之志游辭枉陷旋罹貶斥嚴憲將及殆見誅夷履危本於初心遭險期於不二雖禍福之際昭然可圖而艱難之中是所繄賴洎朕祗膺寶位又共翦姦臣拜以光寵不忘撝挹敬愛之極神明所知造膝則曾莫詭隨匪躬則動多規諫補朕之闕斯人孔臧而悠悠之談嗷嗷妄作醜正惡直竊生於謗考言詢事益亮其誠昔漢昭帝之保霍光魏太祖之明程昱朕之不德庶幾於此矧夫否當其悔則滅宗毀族朕負之必深泰至其亨則如山如河朕酬之未補豈流言之足聽而厚德之遂忘謀始有之圖終可也宜告示中外咸令知悉尋遷太常卿監修國史弟晦又歷御史中丞吏部侍郎兄弟當朝用事侍中宋璟以其權寵太盛恐非久安之道屢奏請稍抑損之開元五年下敕曰西漢諸將多以權貴不全南陽故人並以優閒自保觀夫先後之迹吉凶之數較然可知良有以也太常卿上柱國楚國公監修國史姜皎衣纓奕代忠讜立誠精識比於橋玄密私方於朱祐朕昔在藩邸早申款洽當謂我以不遺亦起豫以自愛及膺大位屢錫崇班茅土列爵山河傳誓備蒙光寵時冠等夷朕每欲戒盈用克終吉未若避榮公府守靖私第自弘高尚之風不涉囂塵之境沐我恩貸庇爾子孫宜放歸田園以恣娛樂又遷晦為宗正卿以去其權久之皎復起為祕書監十年坐漏泄禁中語為嗣濮王嶠所奏敕中書門下究其狀嶠即王守一之妹夫中書令張嘉貞希守一意構成其罪仍奏請先決杖配流嶺外下制曰祕書監姜皎往屬艱難頗效誠信功則可録寵是以加既忘滿盈之誡又虧靜慎之道假說休咎妄談宮掖據其作孽合處極刑念茲舊勳免此殊死宜決一頓配流欽州皎既決杖行至汝州而卒年五十餘皎之所親都水使者劉承祖配流雷州自餘流死者數人時朝廷頗以皎為冤而咎嘉貞焉源乾曜時為侍中不能有所持正論者亦深譏之玄宗復思皎舊勳令遞其柩還以禮葬之仍遣中使存問其家十五年追贈澤州刺史晦坐皎左遷春州司馬俄遷海州刺史卒天寶六載授皎男慶初等官七載贈皎吏部尚書仍贈實封二百戶以充享祀慶初襲封楚國公慶初生未晬玄宗許尚公主後淪落二十餘年李林甫為相當軸用事林甫即皎之甥從容奏之故驟加恩命天寶十載詔慶初尚新平公主授駙馬都尉永泰元年拜太常卿史臣曰或問屈突通盡忠於隋而功立於唐事兩國而名愈彰者何也答云若立純誠遇明主一心可事百君寧限於兩國爾被稠桑之擒臨難無苟免破仁杲之衆臨財無苟得君子哉任瓌丘和許紹李襲志咸遇真主得為故人或舊立功或率衆歸國尋其履迹皆有可稱襲志為政襲譽訓子庶幾弘遠矣姜恩信有能官之譽行本勤濟多克敵之功皎雖故舊恩幸不倫雖嘉貞致冤亦冒寵自掇豈非無德而祿福過災生之驗歟任瓌縱妬妻無禮任親戚求財丘和進食邀幸皆無取焉贊曰屈突守節求仁得仁諸君遇主不足擬倫
