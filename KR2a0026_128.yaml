body:
  text: 舊唐書卷一百二十四列傳第七十四薛嵩弟瑖嵩子平嵩族子雄令狐彰子建運通田神功弟神玉侯希逸李正己子納納子師古師道宗人洧附薛嵩絳州萬泉人祖仁貴高宗朝名將封平陽郡公父楚玉為范陽平盧節度使嵩少以門蔭落拓不事家産有膂力善騎射不知書自天下兵起束身戎伍委質逆徒廣德元年東都平時皇太子為天下兵馬元帥遺僕固懷恩東收河朔嵩為賊守相州聞賊朝義兵潰王師至嵩惶惑迎拜于懷恩馬前懷恩釋之令守舊職時懷恩二心已萌懷恩平河朔旋乃奏嵩及田承嗣張忠志李懷仙分理河北道詔遂以嵩為相州刺史充相衛洺邢等州節度觀察使承嗣鎮魏州忠志鎮恆州懷仙鎮幽州各據數州之地時多事之後姑欲安人遂以重寄委嵩嵩感恩奉職數年間管內粗理纍遷檢校右僕射大曆八年正月卒詔遣弟瑖知留後纍加瑖太子少師大曆十年正月丁酉昭義軍兵馬使裴志清盜所將兵逐瑖舉衆歸田承嗣以叛瑖奔于洺州上表乞入朝許之至京素服於銀臺門待罪詔釋之嵩子平年十二為磁州刺史嵩卒軍吏欲用河北故事脅平知留後務平偽許之讓於叔父瑖一夕以喪歸及免喪纍授右衛將軍在南衙凡三十年宰相杜黃裳深器之薦為汝州刺史兼御史中丞理有能名元和七年淮西用兵自左龍武大將軍授兼御史大夫滑州刺史鄭滑節度觀察等使纍有戰功滑州城西距黃河二里每歲常為水患平詢訪得古河道接衛州黎陽縣界平率魏博節度使田弘正同上聞開古河南北長十四里決舊河以分水勢滑人遂無水患居鎮六年入為左金吾大將軍未幾復為鄭滑節度觀察使及平李師道朝廷以東平十二州析為三道以淄青齊登萊五州為平盧軍以平為節度觀察等使仍押新羅渤海兩蕃使長慶元年幽鎮叛杜叔良統橫海全軍討伐不勝王庭湊圍牛元翼於深州棣州為賊所窘朝廷乃委平以偏師援棣州平即遣將李叔佐以兵五百救之居數月刺史王稷餽給稍薄兵士怨怒叔佐不能戢宵潰而歸仍推突將馬狼兒為帥行及青城鎮劫鎮將李自勸並其衆次至博昌鎮復劫其鎮兵共得七千餘人徑逼青州城城中兵士不敵平悉府庫並家財募二千精卒逆擊之仍先以騎兵掩其家屬輜重賊衆惶惑反顧因大敗狼兒與其同惡十數輩脫身竄匿餘黨降稍後者斬於鞠場明日狼兒亦就擒戮脅從者放歸田里詔加右僕射進封魏國公由是遠近畏伏平之威略在鎮六周歲兵甲完利井賦均一至是入覲百姓遮道乞留數日乃得出時人以為近日節制罕有其比寶曆元年歸朝進加檢校左僕射兼戶部尚書踰月復檢校司空兼河中絳隰節度觀察等使大和二年復以晉州慈州隸河中益兵三千人加平檢校司徒在河中凡六年召拜太子太保明年上疏乞老以司徒致仕居一年卒册贈太傅嵩族子雄初為嵩屬吏知衛州事嵩歿特詔授衛州刺史魏博節度田承嗣誘為亂雄不從承嗣遣刺客盜殺之令狐彰京兆富平人也遠祖自燉煌徙家焉代有冠冕父濞天寶中任鄧州録事參軍以清白聞本道採訪使宋鼎引為判官初任范陽縣尉通幽州人女生彰及秩滿留彰于母氏彰遂少長范陽倜儻有膽氣涉獵書傳粗知文義善弓矢乃策名從軍事安祿山天寶中以軍功纍遷至左衛員外郎將安祿山叛逆以本官隨賊黨張通儒赴京師通儒偽署為城內左街使王師收復二京隨通儒等遁走河朔又陷逆賊史思明偽署為博州刺史及滑州刺史令統數千兵戍滑臺彰感激忠義思立名節乃潛謀歸順會中官楊萬定監滑州軍彰遂募勇士善於水者俾乘夜涉河達表奏于萬定請以所管賊一將兵馬及州縣歸順萬定以聞自祿山構逆為賊守者未有舉州向化肅宗得彰表大悅賜書慰勞時彰移鎮杏園渡遂為思明所疑思明乃遣所親薛岌統精卒圍杏園攻之彰乃明示三軍曉以逆順衆心感附咸悉力為用與賊兵戰大破之潰圍而出遂以麾下將士數百人隨萬定入朝肅宗深奬之禮甚優厚賜甲第一區名馬數匹並帷帳什器頗盛拜御史中丞兼滑州刺史滑亳魏博等六州節度仍加銀青光祿大夫鎮滑州委平殘寇及史朝義滅遷御史大夫封霍國公尋加檢校工部尚書未幾檢校右僕射餘並如故彰在職風化大行滑州瘡痍未復城邑為墟彰以身勵下一志農戰內檢軍戎外牧黎庶法令嚴酷人不敢犯數年間田疇大闢庫藏充積歲奉王稅及修貢獻未嘗暫闕時犬戎犯邊徵兵防秋彰遣屬吏部統營伍自滑至京之西郊向二千餘里甲士三千人率自齎糧所過州縣路次供擬皆讓而不受經閭里不犯秋毫識者稱之然性識猜阻人有忤意不加省察輒至斃踣此其短也臨終手疏辭表誡子以忠孝守節又舉能自代表曰臣自事陛下得備藩守受恩則重效節未終長辭聖朝痛入心骨臣誠哀懇頓首頓首臣受性剛拙亦能包含頃因魚朝恩將掠亳州遂與臣結怨當其縱暴臣不敢入朝專聽天誅即欲奔謁及魚朝恩死即臣屬疾苦又遭家艱力微眼暗行動須人拜舞不能數月有闕欲請替辭退即日望稍瘳冀得康強榮歸朝覲自冬末舊疾益重瘡腫又生氣息奄奄遂期殞歿不遂一朝天闕一拜龍顏臣禮不終忠誠莫展臣之大罪下慚先代仰愧聖朝臣竭誠事上誓立大節天地神明實知臣心心不遂行言發自痛當使倉糧錢絹羊馬牛畜一切已上並先有部署三軍兵士州縣官吏等各恭舊職祗待聖恩臣伏見吏部尚書劉晏及工部尚書李勉知識忠貞堪委大事伏願陛下速令檢校上副聖心臣男建等性不為非行亦近道今勒歸東都私第使他年為臣報國下慰幽魂臨歿昏亂伏表哀咽上覽表嗟悼久之特下詔褒美曰中衛社稷外修疆事合於一體以靖庶邦其在有終謂之不朽觀前代文武通賢有匡時戡難迫於大化不忘時君未嘗不嘉尚而流歎也今有忠烈之臣彰剛直形外純和積中本於孝敬輔以才略統制藩閫服勞王家往以母老躬於就養豈不戀闕以茲曠年及苴麻在艱優諭權奪踴絶傷足淚盡喪明入覲之期良願莫遂想其風彩久軫顧懷遽見淪沒用深追悼嗟乎方疾之時以情自疏無所有隱見之於詞復節守常條上軍簿請擇良帥命于中朝乃令遺胤爰歸東洛教忠以報國約禮以居喪古人所謂生不交利死不屬其子夫豈遠哉節概誠亮高絶無鄰喟然感傷鑒寐增慟有以見東州士大夫勤王尊主之志用嘉其休可以垂範宣付史館式昭名臣子建運通建大曆四年十二月彰遣入朝特加兼御史中丞歸滑州及彰卒滑三軍逼奪情禮建守死不從舉家歸京師服闋纍轉至右龍虎軍使德宗以涇原兵亂出幸奉天建方教射於軍中遂以四百人隨駕為後殿至奉天以建為行在中軍鼓角使幸梁州轉行在右廂兵馬使右羽林大將軍兼御史大夫興元元年六月加檢校左散騎常侍行在都知兵馬使左神武大將軍建妻李氏恆帥寶臣女也建惡將棄之乃誣與傭教生邢士倫姦通建召士倫榜殺之因逐其妻士倫母聞不勝其痛卒李氏奏請按劾詔令三司詰之李氏及奴婢款證被誣頗明白建方自首伏建會赦免坐德宗詔曰子育黎元未能禁暴在豫之責用軫于懷宜輟常膳五百千文充葬士倫母子其父既衰耄至無所歸良深矜念委京兆尹厚加存恤貞元四年七月以前官為右領軍大將軍五年三月以專殺不辜德宗念舊勳特容貸之復陳訴詞甚虛罔遂貶施州別駕同正卒於貶所貞元六年九月贈右領軍大將軍十年贈揚州大都督運為東都留守將逐賊出郊其日有劫轉運絹於道者杜亞以運豪家子意其為之乃令判官穆員及從事張弘靖同鞫其事員與弘靖皆以運職在牙門必不為盜抗請不按亞不聽而怒斥逐員等令親事將武金鞫之金笞箠運從者十餘人一人笞死九人不勝考掠自誣竟無贓狀亞具以聞請流運於嶺表德宗令侍御史李元素刑部員外崔從質大理司直盧士瞻三司覆按運獄既竟明運迹非行盜以曾捕掠人於家配流歸州武金肆虐作威教人通款配流建州後歲餘齊抗捕得劫轉運絹賊郭鵠朱瞿曇等七人及贓絹詔令杜亞與留臺同劾之皆首伏然終不原運運死於歸州衆冤之通元和中宰相李吉甫奏曰臣伏見代宗朝滑州節度使令狐彰臨終上表悉以土地兵甲籍上朝廷遣諸子隨表歸闕代宗以彰遺表宣示百僚當時在位者聞之無不感歎今有次子通在臣每感彰同時河朔諸鎮付子傳孫無不燻灼數代唯彰忠義感激奉國忘家遣子入朝以土地歸於先帝貞元中長子建坐事死於施州幼子運亦無罪流於歸州欲使忠義之人何所激勸今通幸存得遇明聖伏乞陛下召之與語如堪用望垂奬録憲宗念彰之忠即授通贊善大夫出為宿州刺史時討淮蔡用為泗州刺史歲中改壽州團練使檢校御史中丞每與賊戰必虛張虜獲得賊數人即為露布上之宰相武元衡笑而不奏如有敗衄即不敢上聞後為賊所攻境上城柵並陷通走固州城閉壁不出憲宗遣李文通往宣慰度其將至遂令代通貶為昭州司戶移撫州司馬十四年徵為右衛將軍制下給事中崔植封還制書言通前刺壽州失律不宜遽加奬任憲宗令宰相宣喻門下言通父有功於國不宜逐棄其子制命方行歲餘出為淄州刺史長慶初入為左衛大將軍卒田神功冀州人也家本微賤天寶末為縣里胥會河朔兵興從事幽薊上元元年為平盧節度都知兵馬使兼鴻臚卿於鄭州破賊四千餘衆生擒逆賊大將四人牛馬器械不可勝數尋為鄧景山所引至揚州大掠百姓商人資産郡內比屋發掘略遍商胡波斯被殺者數千人二年二月生擒逆賊劉展送于闕下以擒展功纍遷檢校工部尚書兼御史大夫汴宋等八州節度使大曆三年三月朝京師獻馬十匹金銀器五十件繒綵一萬匹時郭子儀入朝請宴宰臣等於私第神功效其請亦以許之尋加檢校右僕射赴尚書省視事特詔宰臣已下百官送上仍加知省事以寵之神功忠朴幹勇當時所稱八年冬復覲闕廷遘疾信宿而終上悼惜為之徹樂廢朝三日贈司徒賻絹一千匹布五百端特許百官弔喪賜屏風茵褥於靈座並賜千僧齋以追福至德已來將帥不兼三事者哀榮無比弟神玉自曹州刺史權汴州留後大曆十年正月加檢校兵部郎中兼御史中丞為汴州刺史知汴州節度觀察留後事並河陽澤潞等兵馬直據淇門會李承昭討魏博田承嗣十一年卒詔滑州李勉代之侯希逸平盧人也少習武藝天寶末安祿山反署其腹心徐歸道為平盧節度希逸時為平盧裨將率兵與安東都護王玄志襲殺歸道使以聞詔以玄志為平盧節度使乾元元年冬玄志病卒軍人共推立希逸為平盧軍使朝廷因授節度使既數為賊所迫希逸率勵將士纍破賊徒向潤客李懷仙等既淹歲月且無救援又為奚虜所侵希逸拔其軍二萬餘人且行且戰遂達于青州會田神功能元皓於兗州青州遂陷於希逸詔就加希逸為平盧淄青節度使自是迄今淄青節度皆帶平盧之名也希逸初領淄青甚著聲稱理兵務農遠近美之寶應元年與諸節度同討襲史朝義平之加檢校工部尚書賜實封圖形凌煙閣以私艱去職大曆十一年九月起復檢校尚書右僕射上柱國封淮陽郡王後漸縱恣政事怠惰尤崇奉釋教且好畋遊興功創寺宇軍州苦之永泰元年因與巫者夜宿於城外軍士乃閉之不納希逸奔歸朝廷拜檢校右僕射久之加知省事遷司空詔出而卒廢朝三日贈太保李正己高麗人也本名懷玉生於平盧乾元元年平盧節度使王玄志卒會有敕遣使來存問懷玉恐玄志子為節度遂殺之與軍人共推立侯希逸為軍帥希逸母即懷玉姑也後與希逸同至青州纍至折衝將軍驍健有勇力寶應中衆軍討史朝義至鄭州回紇方強暴恣橫諸節度皆下之正己時為軍候獨欲以氣吞之因與其角逐衆軍聚觀約曰後者批之既逐而先正己擒其領而批其背回紇尿液俱下衆軍呼笑虜慚繇是不敢為暴節度使侯希逸即其外兄也用為兵馬使正己沉毅得衆心希逸因事解其職軍中皆言其非罪不當廢會軍人逐希逸希逸奔走遂立正己為帥朝廷因授平盧淄青節度觀察使海運押新羅渤海兩蕃使檢校工部尚書兼御史大夫青州刺史賜今名尋加檢校尚書右僕射封饒陽郡王大曆十一年十月檢校司空同中書門下平章事十三年請入屬籍從之為政嚴酷所在不敢偶語初有淄青齊海登萊沂密德棣等州之地與田承嗣令狐彰薛嵩李寶臣梁崇義更相影響大曆中薛嵩死及李靈曜之亂諸道共攻其地得者為己邑正己復得曹濮徐兗鄆共十有五州內視同列貨市渤海名馬歲歲不絶法令齊一賦稅均輕最稱強大嘗攻田承嗣威震鄰敵歷檢校司空左僕射兼御史大夫加平章事太子太保司徒後自青州徙居鄆州使子納及腹心之將分理其地建中後畏懼朝廷多不自安聞將築汴州乃移兵屯濟陰晝夜教習為備河南騷然天下為憂羽檄馳走徵兵以益備又於徐州增兵以扼江淮於是運輸為之改道未幾發疽卒時年四十九子納擅總兵政祕之數月乃發喪納阻兵興元元年四月歸順方贈正己太尉納少時正己遣將兵備秋代宗召見嘉之自奉禮郎超拜殿中丞兼侍御史賜紫金魚袋歷檢校倉部郎中兼總父兵奏署淄州刺史正己將兵擊田承嗣奏署節度觀察留後尋遷青州刺史又奏署行軍司馬兼曹州刺史曹濮徐兗沂海留後又加御史大夫建中初正己田悅梁崇義張惟嶽皆反二年正己卒納祕喪統父衆仍復為亂比會悅於濮陽遣大將衛俊將兵一千救悅為河東節度使馬燧敗於洹水殺傷殆盡詔諸軍誅之納從叔父洧以徐州李士真以德州及棣州李長卿皆以州歸順納以彭城險厄又怒洧背宗乃悉兵圍之詔宣武軍節度劉洽與諸軍救之大敗納兵於城下後將兵於濮陽洽攻破其城外納自城上見洽涕泣悔罪遣判官房説以其弟經男成務朝京師請因洽從順會中使宋鳳朝見之謂納計蹙欲誅破之以為己功奏請無捨上乃械説等繫禁中納遂歸鄆州復與李希烈朱滔王武俊田悅合謀皆反偽稱齊王建置百官及興元之降罪己詔納乃效順詔加檢校工部尚書平盧軍節度淄青等州觀察使無幾檢校右僕射同中書門下平章事時希烈圍陳州納遣兵與諸軍奮擊大破之因解圍加檢校司空封五百戶貞元初升鄆州為大都督府改授長史年三十四薨於位廢朝三日贈賻有差子師古纍奏至青州刺史貞元八年納死軍中以師古代其位而上請朝廷因而授之起復右金吾大將軍同正平盧及青淄齊節度營田觀察海運陸運押新羅渤海兩蕃使成德軍節度王武俊率師次于德棣二州將取蛤及三汊城棣州之鹽池與蛤歲出鹽數十萬斛棣州之隸淄青也其刺史李長卿以城入朱滔而蛤為納所據因城而戍之以專鹽利其後武俊以敗朱滔功以德棣二州隸之蛤猶為納戍納初於德州南跨河而城以守之謂之三汊交田緒以通魏博路而侵掠德州為武俊患及納卒師古繼之武俊以其年弱初立舊將多死心頗易之乃率衆兵以取蛤三汊為名其實欲窺納之境師古令棣州降將趙鎬拒之武俊令其子士清將兵先濟於滴河會士清營中火起軍驚惡之未進德宗遣使諭旨武俊即罷還師古毀三汊口城從詔旨師古雖外奉朝命而嘗畜侵軼之謀招集亡命必厚養之其得罪於朝而逃詣師古者因即用之其有任使于外者皆留其妻子或謀歸款於朝事泄族其家衆畏死而不敢異圖貞元十年五月師古服闋加檢校禮部尚書十二年正月檢校尚書右僕射十一月師古丁母憂起復左金吾上將軍同正十五年正月師古杜佑李欒妾媵並為國夫人十六年六月與淮南節度使杜佑同制加中書門下平章事及德宗遺詔下告哀使未至義成軍節度使李元素以與師古鄰道録遺詔報師古以示無外師古遂集將士引元素使者謂曰師古近得邸吏狀具承聖躬萬福李元素豈欲反乃忽偽録遺詔以寄師古三代受國恩位兼將相見賊不可以不討遂杖元素使者遽出兵以討元素為名冀因國喪以侵州縣俄聞順宗即位師古乃罷兵後纍官至檢校司徒兼侍中卒贈太傅師道師古異母弟其母張忠志女師道時知密州事師古死其奴不發喪潛使迎師道於密而奉之朝命久未至師道謀於將吏或欲加兵於四境其判官高沐固止之乃請進兩稅守鹽法申官員遣判官崔承寵孔目官林英相繼奏事時杜黃裳作相欲乘其未定也以計分削之憲宗以蜀川方擾不能加兵於師道元和元年七月遂命建王審遙領節度授師道檢校左散騎常侍兼御史大夫權知鄆州事充淄青節度留後十月加檢校工部尚書兼鄆州大都督府長史充平盧軍及淄青節度副大使知節度事管內支度營田觀察處置陸運海運押新羅渤海兩蕃等使自正己至師道竊有鄆曹等十二州六十年矣懼衆不附己皆用嚴法制之大將持兵鎮于外者皆質其妻子或謀歸款於朝事泄其家無少長皆殺之以故能劫其衆父子兄弟相傳焉五年七月檢校尚書右僕射十年王師討蔡州師道使賊燒河陰倉斷建陵橋初師道置留邸於河南府兵諜雜以往來吏不敢辨因吳元濟北犯汝鄭郊畿多警防禦兵盡戍伊闕師道潛以兵數十百人內其邸謀焚宮闕而肆殺掠既烹牛饗衆矣明日將出會有小將楊進李再興者詣留守呂元膺告變元膺追伊闕兵圍之半日不敢進攻防禦判官王茂元殺一人而後進或有毀其墉而入者賊衆突出殺人圍兵奔駭賊得結伍中衢內其妻子於囊橐中以甲胄殿而行防禦兵不敢追賊出長夏門轉掠郊墅東濟伊水入嵩山元膺誡境上兵重購以捕之數月有山棚鬻鹿於市賊遇而奪之山棚走而徵其黨或引官軍共圍之谷中盡獲之窮理得其魁首乃中嶽寺僧圓靜年八十餘嘗為史思明將偉悍過人初執之使巨力者奮鎚不能折脛圓靜罵曰鼠子折人腳猶不能敢稱健兒乎乃自置其足教折之臨刑乃曰誤我事不得使洛城流血死者凡數十人留守禦將二人都亭驛卒五人甘水驛卒三人皆潛受其職署而為之耳目自始謀及將敗無知者初師道多買田於伊闕陸渾之間凡十所處欲以舍山棚而衣食之有訾嘉珍門察者潛部分之以屬圓靜以師道錢千萬偽理嵩山之佛光寺期以嘉珍竊發時舉火於山中集二縣山棚人作亂及窮按之嘉珍門察乃賊武元衡者元膺具狀以聞及誅吳元濟師道恐懼上表乞聽朝旨請割三州並遣長子入侍宿衛詔許之師道識暗政事皆決於羣婢婢有號蒲大姊袁七娘者為謀主乃言曰自先司徒以來有此十二州奈何一日無苦而割之耶今境內兵士數十萬人不獻三州不過發兵相加可以力戰戰不勝乃議割地未晚也師道從之而止表言軍情不叶乃詔諸軍討伐十年十二月武寧節度使李願遣將王智興擊破師道之衆九千斬首二千餘級獲牛馬四千遂至平陰十一年十一月加師道司空仍遣給事中柳公綽往宣慰且觀所為欲寬容之師道苟以遜順為辭長惡不悛十三年七月滄州節度使鄭權破淄青賊於齊州福城縣斬首五百餘級十月徐州節度使李訴兵馬使李祐於兗州魚臺縣破賊三千餘人魏博節度使田弘正率本軍自陽劉渡河距鄆州九十里下營再接戰破賊三萬餘衆生擒三千人收器械不可勝紀陳許節度使李光顏於濮陽縣界破賊收斗門城杜莊柵田弘正復於故東阿縣界破賊五萬諸軍四合纍下城柵師道使劉悟將兵當魏博軍既敗數令促戰師未進乃使奴召悟計事悟知其來殺己乃稱病不出召將吏謀曰魏博兵強乘勝出戰必敗吾師不出則死今天子所誅司空一人而已悟與公等皆被驅逐就死地何如轉禍為福殺其來使以兵趣鄆州立大功以求富貴衆皆曰善乃迎其使而斬之遂齎師道追牒以兵趣鄆州及夜至門示以師道追牒乃得入兵士繼進至毬場因圍其內城以火攻之擒師道而斬其首送于魏博軍元和十四年二月也是月弘正獻於京師天子命左右軍如受馘儀先獻于太廟郊社憲宗御興安門受之百僚稱賀初東軍諸道行營節度擒逆賊將夏侯澄等共四十七人詔曰附麗凶黨拒抗王師國有常刑悉合誅戮朕以久居樜俗皆被脅從況討伐已來時日未幾縱懷轉禍之計未有效款之由情似可矜朕不忍殺況三軍百姓孰非吾人詔令頒行罪止師道方欲拯於塗炭是用活其性命誠為屈法庶使知恩並宜特從釋放仍令却遞送至魏博及義成行營各委節度收管驅使如父母血屬猶在賊中或羸老疾病情切歸還者仍量事優當放去務相全貸何所疑留及澄等至行營賊覘知傳告叛徒皆感朝恩由是劉悟得行其謀焉師道妻魏氏及小男並配掖庭堂弟師賢師智配流春州姪弘巽配流雷州詔分其十二州為三節度俾馬總薛平王遂分鎮焉仍命宰臣崔羣撰碑以紀其績國家自天寶末安祿山首亂兩河至寶應元年王師平史朝義其將薛嵩李懷仙田承嗣李寶臣等受偽命分領州郡朝廷厭兵因僕固懷恩請就加官爵及侯希逸為軍人逐出正己又據齊魯之地既而遞相膠固聯結姻好職貢不入法令不加率以為常仍皆署其子為副大使父死子立則以三軍之請聞亦有為大將所殺而自立者自安史以後迄至于貞元朝廷多務優容每聞擅襲因而授之以故六十餘年兩河號為反側之俗憲宗知人善任削平亂迹兩河復為王土焉師道妻魏氏元和十五年出家為尼洧正己從父兄也正己用為徐州刺史正己死子納犯宋州洧以其州歸順加御史大夫封潮陽郡王食實封二百戶充招諭使初洧遣攝巡官崔程奉表至京師令口奏並白宰相徐州恐不能獨當賊若得徐海沂三州節度都團練使即必立功況海沂兩州亦並為賊納所據非國家州縣其刺史王涉馬萬通等洧並素與之約若有詔命冀必成功程乍自外到闕以為宰相一也乃先以其言白張鎰鎰言於盧嵵嵵怒程不先白己故洧所請不行嵵妨公害私皆此類也及李納遣兵攻徐州劉洽與諸將擊退之賊勢未衰始加洧徐海沂都團練觀察使尋加密州時海密州皆為賊所據不受洧命旋加洧檢校戶部尚書未幾疽發背稍平乃大具糜餅飯僧於市洧乘平肩輿自臨其場市人歡呼洧驚疽潰於背而卒贈左僕射史臣曰自安史亂離河朔割據雖外尊朝旨而內蓄姦謀薛嵩祖父國之名將及身濡足賊廷既沐國恩尚存家法守土奉職終身一心果有令人克全餘慶彰居喪循禮有士子之風馭衆權謀著將軍之業中外善政終始令名成功不居告老致仕方之者鮮矣背逆歸國治兵牧民上表推誠舉賢代己時稱能善始善終者也建志稟遺訓克全令名不能終保功業惜哉神功忠勇竟著勳名希逸荒狂自失茅土師道祖父弟兄盜據青鄆得計則潛圖凶逆失勢則偽奉朝旨向背任情數十年矣或問曰師古之前三帥而不滅師道繼立數年而亡者何哉答曰納與師古自運姦謀躬臨戎事朝廷任盧嵵以私妨公致懷光變忠為逆李納父子宜其苟延洎憲宗當朝裴度為相君臣道合中外情通師道外任諸奴內聽羣婢軍民攜二家族滅亡不亦宜乎假息數年猶為多矣何所疑焉贊曰田神功勇能立勳令狐彰死不失節薛平振家世以顯揚師道任臧獲而亡滅
