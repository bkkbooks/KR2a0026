body:
  text: 舊唐書卷一百四十九列傳第九十九于休烈子肅肅子敖敖子琮令狐峘歸崇敬子登登子融奚陟張薦子又新希復希復子讀蔣乂子係伸柳登弟冕子璟沈傳師子詢于休烈河南人也高祖志寧貞觀中任左僕射為十八學士父默成沛縣令早卒休烈至性貞賣心機鑒敏悟自幼好學善屬文與會稽賀朝萬齊融延陵包融為文詞之友齊名一時舉進士又應制策登科授祕書省正字纍遷右補闕起居郎集賢殿學士轉比部員外郎郎中楊國忠輔政排不附己者出為中部郡太守值祿山構難肅宗踐祚休烈自中部赴行在擢拜給事中遷太常少卿知禮儀事兼修國史肅宗自鳳翔還京勵精聽受嘗謂休烈曰君舉必書良史也朕有過失卿書之否對曰禹湯罪己其興也勃焉有德之君不忘規過臣不勝大慶時中原蕩覆典章殆盡無史籍檢尋休烈奏曰國史一百六卷開元實録四十七卷起居注並餘書三千六百八十二卷並在興慶宮史館京城陷賊後皆被焚燒且國史實録聖朝大典修撰多時今並無本伏望下御史臺推勘史館所由令府縣招訪有人別收得國史實録如送官司重加購賞若是史官收得仍赦其罪得一部超授官資得一卷賞絹十匹數月之內唯得一兩卷前修史官工部侍郎韋述陷賊入東京至是以其家藏國史一百一十三卷送于官肅宗以太常鐘磬自隋已來所傳五音或有不調乾元初謂休烈曰古者聖人作樂以應天地之和以合陰陽之序則人不夭札物不疵癘且金石絲竹樂之器也比親享郊廟每聽懸樂宮商不備或鐘磬失度可盡將鐘磬來朕當於內自定太常集樂工考試數日審知差錯然後令別鑄造磨刻及事畢上臨殿親試考擊皆合五音羣臣稱慶休烈尋轉工部侍郎修國史獻五代帝王論帝甚嘉之宰相李揆矜能忌賢以休烈修國史與己齊列嫉之奏為國子祭酒權留史館修撰以下之休烈恬然自持殊不介意舊儀元正冬至百官不於光順門朝賀皇后乾元元年張皇后遂行此禮休烈奏曰周禮有命夫朝人主命婦朝女君自顯慶已來則天皇后始行此禮其日命婦又朝光順門與百官雜處殊為失禮肅宗詔停之代宗即位甄別名品宰臣元載稱之乃拜右散騎常侍依前兼修國史尋加禮儀使遷工部侍郎又改檢校工部尚書兼判太常卿事正拜工部尚書纍封東海郡公加金紫光祿大夫在朝凡三十餘年歷掌清要家無儋石之蓄恭儉溫仁未嘗以喜慍形於顏色而親賢下士推轂後進雖位崇年高曾無倦色篤好墳籍手不釋卷以至于終大曆七年卒年八十一有集十卷行於代嗣子益次子肅相繼為翰林學士是歲春休烈妻韋氏卒上以休烈父子儒行著聞特詔贈韋氏國夫人葬日給鹵簿鼓吹及聞休烈卒追悼久之褒贈尚書左僕射賻絹百匹布五十端遣謁者內常侍吳承倩就私第宣慰儒者之榮少有其比肅官至給事中肅子敖敖字蹈中以家世文史盛名少為時彥所稱志行修謹登進士第釋褐祕書省校書郎湖南觀察使楊憑辟為從事府罷鳳翔節度使李鄘鄂嶽觀察使呂元膺相繼辟召自協律郎大理評事試監察御史元和六年真拜監察御史轉殿中歷倉部司勳二員外萬年令拜右司郎中出為商州刺史長慶四年入為吏部郎中其年遷給事中昭愍初即位李逢吉用事與翰林學士李紳素不叶遂誣紳以不測之罪逐於嶺外紳同職駕部郎中知制誥龐嚴司封員外郎知制誥蔣防坐紳黨左遷信汀等州刺史黜詔下敖封還詔書時人以為與嚴相善訴其非罪皆曰于給事犯宰執之怒伸龐蔣之屈不亦仁乎及駁奏出乃是論龐嚴貶黜太輕中外無不大噱而逢吉由是奬之尋轉工部侍郎遷刑部出為宣歙觀察使兼御史中丞敖溫裕長者與物無忤居官亦未嘗有立周踐臺閣三為列曹侍郎謹順自容而已大和四年八月卒年六十六贈禮部尚書四子球圭瓌琮皆登進士第琮落拓有大志雖以門資為吏久不見用大中朝駙馬都尉鄭皓以琮世故獨以器度奇之會有詔於士族中選人才尚公主衣冠多避之皓謂琮曰子人才甚佳但不護細行為世譽所抑久而不調能應此命乎琮然之會李藩知貢舉皓託之登第其年遂升諫列尚廣德公主拜駙馬都尉纍踐臺閣揚歷藩府乾符中同平章事黃寇犯京師僖宗出幸琮病不能從既僭號起琮為相琮以疾辭迫脅不已琮曰吾病亟矣死在旦夕加以唐室親姻義不受命死即甘心竟為賊所害而赦公主主視琮受禍謂賊曰妾李氏女也義不獨存願與于公並命賊不許公主入室自縊而卒廣德閨門有禮咸通乾符中譽在人口于族內外冠婚喪祭主必自預行禮諸婦班而見之尊卑答勞咸有儀法為時所稱圭球皆至清顯令狐峘德棻之玄孫登進士第祿山之亂隱居南山豹林谷谷中有峘別墅司徒楊綰未仕時避亂南山止於峘舍峘博學貫通羣書有口辨綰甚稱之及綰為禮部侍郎修國史乃引峘入史館自華原尉拜右拾遺纍遷起居舍人皆兼史職修玄宗實録一百卷代宗實録四十卷著述雖勤屬大亂之後起居注亡失峘纂開元天寶事雖得諸家文集編其詔策名臣傳記十無三四後人以漏落處多不稱良史大曆八年改刑部員外郎德宗即位將厚奉元陵峘上疏諫曰臣聞傳曰近臣盡規禮記曰事君有犯而無隱臣幸偶昌運謬參近列敢竭狂愚庶裨分寸伏惟陛下詳察臣讀漢書劉向傳見論王者山陵之誡良史稱歎萬古芬芳何者聖賢之心勤儉是務必求諸道不作無益故舜葬蒼梧不變其肆禹葬會稽不改其列周武葬于畢陌無丘壠之處漢文葬於霸陵因山谷之勢禹非不忠也啓非不順也周公非不悌也景帝非不孝也其奉君親皆從微薄昔宋文公始為厚葬用蜃炭益車馬其臣華元樂舉春秋書為不臣秦始皇葬驪山魚膏為燈燭水銀為江海珍寶之藏不可勝計千載非之宋桓魋為石椁夫子曰不如速朽子游問喪具夫子曰稱家之有無張釋之對孝文曰使其中無可欲雖無石椁又何戚焉漢文帝霸陵皆以瓦器不以金銀為飾由是觀之有德者葬逾薄無德者葬逾厚昭然可覩矣陛下自臨御天下聖政日新進忠去邪減膳節用不珍雲物之瑞不近鷹犬之娛有司給物悉依元估利於人也遠方底貢唯供祀事薄於己也故澤州奏慶雲詔曰以時和為嘉祥雍州奏金坑詔曰以不貪為寶恭惟聖慮無非至理而獨六月一日制節文云應緣山陵制度務從優厚當竭帑藏以供費用者此誠仁孝之德切於聖衷伏以尊親之義貴於合禮陛下每下明詔發德音皆比蹤唐虞超邁周漢豈取悅凡常之目有違賢哲之心與失德之君競其奢侈者也臣又伏讀遺詔曰其喪儀制度務從儉約不得以金銀錦綵為飾陛下恭順先志動無違者若制度優厚豈顧命之意耶伏惟陛下遠覽虞夏周漢之制深惟夫子張釋之之誡虔奉先旨俯遵禮經為萬代法天下幸甚今赦書雖已頒行諸條尚猶未出此時奉遺制敷聖理固未晚也伏望速詔有司悉從古禮臣聞愚夫之言明主擇焉況臣忝職史官親逢睿德恥同華元樂舉之為不臣也願以舜禹之理紀聖猷也夙夜懇迫不敢不言抵犯聖明實憂罪譴言行身黜雖死猶生優詔答曰朕頃議山陵心方迷謬忘遵先旨遂有優厚之文卿聞見該通識度弘遠深知不可形於至言援引古今依據經禮非唯中朕之病抑亦成朕之躬免朕獲不子之名皆卿之力也敢不聞義而徙收之桑榆奉以始終期無失墜古之遺直何以加焉初大曆中劉晏為吏部尚書楊炎為侍郎晏用峘判吏部南曹事峘荷晏之舉每分闕必擇其善者送晏不善者送炎炎心不平之及建中初峘為禮部侍郎炎為宰相不念舊事有士子杜封者故相鴻漸子求補弘文生炎嘗出杜氏門下託封於峘峘謂使者曰相公誠憐封欲成一名乞署封名下一字峘得以志之炎不意峘賣即署名託封峘以炎所署奏論言宰相迫臣以私臣若從之則負陛下不從則炎當害臣德宗出疏問炎炎具言其事德宗怒甚曰此姦人無可奈何欲決杖流之炎苦救解貶衡州別駕遷衡州刺史貞元中李泌輔政召拜右庶子史館修撰性既僻異動失人和在史館與同職孔述睿等爭忿細故數侵述睿述睿長者讓而不爭無何泌卒竇參秉政惡其為人貶吉州別駕久之授吉州刺史齊映廉察江西行部過吉州故事刺史始見觀察使皆戎服趨庭致禮映雖嘗為宰相然驟達後進峘自恃前輩有以過映不欲以戎服謁入告其妻韋氏恥抹首趨庭謂峘曰卿自視何如人白頭走小生前卿如不以此禮見映雖黜死我亦無恨峘曰諾即以客禮謁之映雖不言深以為憾映至州奏峘糾前政過失鞫之無狀不宜按部臨人貶衢州別駕衢州刺史田敦峘知舉時進士門生也初峘當貢部放榜日貶逐與敦不相面敦聞峘來喜曰始見座主迎謁之禮甚厚敦月分俸之半以奉峘峘在衢州殆十年順宗即位以祕書少監徵既至而卒元和三年峘子太僕寺丞丕始獻峘所撰代宗實録四十卷初峘坐李泌貶監修國史奏峘所撰實録一分請於貶所畢功至是方奏以功贈工部尚書歸崇敬字正禮蘇州吳郡人也曾祖奧以崇敬故追贈祕書監祖樂贈房州刺史父待聘亦贈祕書監崇敬少勤學以經業擢第遭喪哀毀以孝聞調授四門助教天寶末對策高第授左拾遺改祕書郎遷起居郎贊善大夫兼史館修撰又加集賢殿校理以家貧求為外職歷同州潤州長史會玄宗肅宗二帝山陵參掌禮儀遷主客員外郎又兼史館修撰改膳部郎中崇敬以百官朔望朝服袴褶非古上疏云按三代典禮兩漢史籍並無袴褶之制亦未詳所起之由隋代已來始有服者事不師古伏請停罷從之又諫東都太廟不合置木主謹按典禮虞主用桑練主用栗作桑主則埋栗主作栗主則埋桑主所以神無二主天無二日土無二王也東都太廟是則天皇后所建以置武氏木主中宗去其主而存其廟蓋將以備行幸遷都之置也且殷人屢遷前八後五則前後遷都一十三度不可每都而別立神主也議者或云東都神主已曾虔奉而禮之豈可一朝廢之乎且虞祭則立桑主而虔祀練祭則立栗主而埋桑主豈桑主不曾虔祀而乃埋之又所闕之主何須更作作之不時恐非禮也又議云每年春秋二時釋奠文宣王祝板御署訖北面揖臣以為禮太重謹按大戴禮師尚父授周武王丹書武王東面而立今署祝板伏請準武王東面之禮輕重庶得其中時有術士巨彭祖上疏云大唐土德千年合符請每四季郊祀天地詔禮官儒者議之崇敬議曰按舊禮立春之日迎春於東郊祭青帝立夏之日迎夏於南郊祭赤帝先立秋十八日迎黃靈於中地祀黃帝秋冬各於其方黃帝於五行為土王在四季生於火故火用事之末而祭之三季則否漢魏周隋共行此禮國家土德乘時亦以每歲六月土王之日祀黃帝於南郊以后土配所謂合禮今彭祖請用四季祠祀多憑緯候之文且據陰陽之說事涉不經恐難行用又議祭五人帝不稱臣云太昊五帝人帝也於國家即為前後之禮無君臣之義若於人帝而稱臣則於天帝復何稱也議者或云五人帝列於月令分配五時則五神五音五祀五蟲五臭皆備五數以備其時之色數非謂別有尊崇也又請太祖景皇帝配天事已具禮儀志自是國典大禮崇敬常參議焉大曆初以新羅王卒授崇敬倉部郎中兼御史中丞賜紫金魚袋充弔祭冊立新羅使至海中流波濤迅急舟船壞漏衆咸驚駭舟人請以小艇載崇敬避禍崇敬曰舟中凡數十百人我何獨濟逡巡波濤稍息竟免為害故事使新羅者至海東多有所求或攜資帛而往貿易貨物規以為利崇敬一皆絶之東夷稱重其德使還授國子司業兼集賢學士與諸儒官同修通志崇敬知禮儀志衆稱允當時皇太子欲以仲秋之月於國學行齒胄之禮崇敬以國學及官名不稱請改國學之制兼更其名曰禮記王制曰天子學曰辟雍又五經通義云辟雍養老教學之所也以形制言之雍壅也辟璧也壅水環之圓如璧形以義理言之辟明也雍和也言以禮樂明和天下禮記亦謂之澤宮射義云天子將祭必先習射於澤宮故前代文士亦呼云璧池亦曰璧沼亦謂之學省後漢光武立明堂辟雍靈臺謂之三雍宮至明帝躬行養老於其中晉武帝亦作明堂辟雍靈臺親臨辟雍行鄉飲酒之禮又別立國子學以殊士庶永嘉南遷唯有國子學不立辟雍北齊立國子寺隋初亦然至煬帝大業十三年改為國子監今國家富有四海聲明文物之盛唯辟雍獨闕伏請改國子監為辟雍省又以祭酒之名非學官所宜按周禮師氏掌以美詔王教國子請改祭酒為太師氏位正三品又司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設簴崇牙樹羽則業是懸鐘磬之栒簴也今太學既不教樂於義則無所取請改司業一為左師一為右師位正四品上又以五經六籍古先哲王致理之式也國家創業制取賢之法立明經發微言於衆學釋回增美選賢與能自艱難已來取人頗易考試不求其文義及第先取於帖經遂使專門業廢請益無從師資禮虧傳受義絶今請以禮記左傳為大經周禮儀禮毛詩為中經尚書周易為小經各置博士一員其公羊穀梁文疏少請共準一中經通置博士一員所擇博士兼通孝經論語依憑章疏講解分明注引旁通問十得九兼德行純潔文詞雅正儀形規範可為師表者令四品以上各舉所知在外者給驛年七十已上者蒲輪其國子太學四門三館各立五經博士品秩上下生徒之數各有差其舊博士助教直講經直及律館算館助教請皆罷省其教授之法學生至監謁同業師其所執贄脯修一束清酒一壺衫布一段其色隨師所服師出中門延入與坐割修斟酒三爵而止乃發篋出經摳衣前請師為依經辨理略舉一隅然後就室每朝晡二時請益師亦二時居講堂說釋道義發明大體兼教以文行忠信之道示以孝悌睦友之義旬省月試時考歲貢以生徒及第多少為博士考課上下其有不率教者則檟楚撲之國子不率教者則申禮部移為太學太學之不變者移之四門四門之不變者歸本州之學州學之不變者復本役終身不齒雖率教九年而學不成者亦歸之州學其禮部考試之法請無帖經但於所習經中問大義二十得十八為通兼論語孝經各問十得八兼讀所問文注義疏必令通熟者為一通又於本經問時務策三道通二為及第其中有孝行聞於鄉閭者舉解具言於習業之下省試之日觀其所實義少兩道亦請兼收其天下鄉貢亦如之習業考試並以明經為名得第者授官之資與進士同若此則教義日深而禮讓興禮讓興則強不犯弱衆不暴寡此由太學而來者也詔下尚書集百僚定議以聞議者以為省者禁也非外司所宜名周禮代掌其職者曰氏國學非代官不宜曰太師氏其餘大抵以習俗既久重難改作其事不行會國學胥吏以餐錢差舛御史臺按問坐貶饒州司馬建中初又拜國子司業尋選為翰林學士遷左散騎常侍加銀青光祿大夫尋兼普王元帥參謀纍加光祿大夫以兩河叛換之徒初稟朝命令崇敬以本官兼御史大夫持節宣慰奉使稱旨及還上表請歸拜墓許之賜以繒帛儒者榮之尋加特進檢校戶部尚書遷工部尚書並依前翰林學士充皇太子侍讀纍表辭以年老乞骸骨改兵部尚書致仕貞元十五年卒時年八十廢朝一日贈左僕射子登嗣登字冲之雅實弘厚事繼母以孝稱大曆七年舉孝廉高第補四門助教貞元初復登賢良科自美原尉拜右拾遺時裴延齡以姦佞有恩欲為相諫議大夫陽城上疏切直德宗赫怒右補闕熊執易等亦以危言忤旨初執易草疏成示登登愕然曰願寄一名雷電之下安忍令足下獨當自是同列切諫登每聯署其奏無所回避時人稱重轉右補闕起居舍人三任十五年同列嘗出其下者多以馳騖至顯官而登與右拾遺蔣武退然自守不以淹速介意後遷兵部員外郎充皇子侍讀尋加史館修撰順宗初以東朝舊恩超拜給事中旋賜金紫仍錫衫笏焉遷工部侍郎與孟簡劉伯芻蕭俯受詔同翻譯大乘本生心地觀經又為東宮及諸王侍讀獻龍樓針以諷久之改左散騎常侍因中謝憲宗問時所切登以納諫為對時論美之轉兵部侍郎兼判國子祭酒事遷工部尚書元和十五年卒年六十七贈太子少保登有文學工草隸寬博容物嘗使僮飼馬馬蹄踶僮怒擊折馬足登知而不責晚年頗好服食有饋金石之藥者且云先嘗之矣登服之不疑藥發毒幾死方訊云未之嘗他人為之怒登視之無慍色常慕陸象先之為人議者亦以為近之子融嗣融進士擢第自監察拾遺入省拜工部員外郎遷考功員外六年轉工部郎中充翰林學士八年正拜舍人九年轉戶部侍郎開成元年兼御史中丞湖南觀察使盧周仁違敕進羡餘錢十萬貫融奏曰天下一家何非君土中外財賦皆陛下府庫也周仁輒陳小利妄設異端言南方火災恐成灰燼進於京國姑徇私誠入財貨以希恩待朝廷而何淺臣恐天下放效以羡餘為名因緣刻剝生人受弊周仁請行重責以例列藩其所進錢請還湖南代貧下租稅詔周仁所進於河陰院收貯以備水旱金部員外郎韓益判度支案子弟受人賂三千餘貫半是擬贓上問融曰韓益所犯與盧元中姚康孰甚對曰元中與康枉破官錢三萬餘貫益所取受人事比之殊輕乃貶梧州司戶尋遷京兆尹時府司物力不充特敕賜錢五萬貫府司以所賜之半還司農寺菜錢融因對言之上以融學家因問蔬糲字有賴音何也糲是飯之極粗者耶融以義類對之時兩公主出降府司供帳事殷又俯近上巳曲江賜宴奏請改日上曰去年重陽取九月十九日未失重陽之意今改取十三日可也既而李固言作相素不悅融罷尹月餘授祕書監俄而固言罷楊嗣復輔政以融權知兵部侍郎一年內拜吏部三年檢校禮部尚書興元尹兼御史大夫充山南西道節度使融子仁晦仁翰仁憲仁召仁澤皆登進士第咸通中並至達官奚陟字殷卿亳州人也祖乾繹天寶中弋陽郡太守陟少好讀書登進士第又登制舉文詞清麗科授弘文館校書尋拜大理評事佐入吐蕃使不行授左拾遺丁父母憂哀毀過禮親朋愍之車駕幸興元召拜起居郎翰林學士辭以疾病久不赴職改太子司議郎歷金部吏部員外郎左司郎中彌綸省闥又纍奉使皆稱旨貞元八年擢拜中書舍人是歲江南淮西大雨為災令陟勞問巡慰所在人安悅之中書省故事姑息胥徒以常在宰相左右也陟皆以公道處之先是右省雜給率分等第皆據職田頃畝即主書所受與右史等陟乃約以料錢為率自是主書所得減拾遺時中書令李晟所請紙筆雜給皆不受但告雜事舍人令且貯之他日便悉以遺舍人前例雜事舍人自攜私入陟以所得均分省內官又躬親庶務下至園蔬皆悉自點閲人以為難陟處之無倦遷刑部侍郎裴延齡惡京兆尹李充有能政專意陷害之誣奏充結陸贄數厚賂遺金帛充既貶官又奏充比者妄破用京兆府錢穀至多請令比部勾覆以比部郎中崔元翰陷充怨惡贄也詔許之元翰曲附延齡劾治府史府史到者雖無過犯皆笞決以立威時論喧然陟乃躬自閲視府案具得其實奏言據度支奏京兆府貞元九年兩稅及已前諸色羡餘錢共六十八萬餘貫李充並妄破用今所勾勘一千二百貫已來是諸縣供館驛加破及在諸色人戶腹內合收其斛斗共三十二萬石唯三百餘石諸色輸納所由缺折其餘並是準敕及度支符牒給用已盡陟之寬平守法多如此類元翰既不遂其志因此憤恚而卒陟尋以本官知吏部選事銓綜平允有能名遷吏部侍郎所蒞之官時以為稱職貞元十五年卒年五十五贈禮部尚書張薦字孝舉深州陸澤人祖鷟字文成聰警絶倫書無不覽為兒童時夢紫色大鳥五彩成文降于家庭其祖謂之曰五色赤文鳳也紫文鸑鷟也為鳳之佐吾兒當以文章瑞於明廷因以為名字初登進士第對策尤工考功員外郎騫味道賞之曰如此生天下無雙矣調授岐王府參軍又應下筆成章及才高位下詞標文苑等科鷟凡應八皆登甲科再授長安尉遷鴻臚丞凡四參選判策為銓府之最員外郎員半千謂人曰張子之文如青錢萬蕳萬中未聞退時時流重之目為青錢學士然性褊躁不持士行尤為端士所惡姚崇甚薄之開元初澄正風俗鷟為御史李全交所糾言鷟語多譏刺時坐貶嶺南刑部尚書李日知奏論乃追敕移於近處開元中入為司門員外郎卒鷟下筆敏速著述尤多言頗詼諧是時天下知名無賢不肖皆記誦其文天后朝中使馬仙童陷默啜默啜謂仙童曰張文成在否曰近自御史貶官默啜曰國有此人而不用漢無能為也新羅日本東夷諸蕃尤重其文每遣使入朝必重出金貝以購其文其才名遠播如此薦少精史傳顏真卿一見歎賞之大曆中浙西觀察使李涵表薦其才可當史任乃詔授左司禦率府兵曹參軍既至闕下以母老疾竟不拜命母喪闋禮部侍郎于邵舉前事以聞召充史館修撰兼陽翟尉朱泚之亂變姓名伏匿城中因著史遁先生傳德宗還宮擢拜左拾遺貞元元年冬上親郊時初克復簿籍多失禮文錯亂乃以薦為太常博士參典禮儀四年回紇和親以檢校右僕射刑部尚書關播充使送咸安公主入蕃以薦為判官轉殿中侍御史使還轉工部員外郎改戶部本司郎中十一年拜諫議大夫仍充史館修撰時裴延齡恃寵譖毀士大夫薦欲上書論之屢揚言未果延齡聞之怒奏曰諫官論朝政得失史官書人君善惡則領史職者不宜兼諫議德宗以為然薦為諫議月餘改祕書少監延齡排擯不已會差使冊回紇毗伽懷信可汗及弔祭乃命薦兼御史中丞入回紇二十年吐蕃贊普死以薦為工部侍郎兼御史大夫充入吐蕃弔祭使涉蕃界二千餘里至赤嶺東被病歿於紇壁驛吐蕃傳其柩以歸順宗即位凶問至詔贈禮部尚書薦自拾遺至侍郎僅二十年皆兼史館修撰三使絶域皆兼憲職以博洽多能敏於占對被選有文集三十卷及所撰五服圖宰輔略靈怪集江左寓居録等並傳于時子又新希復皆登進士第又新幼工文善於傅會長慶中宰相李逢吉用事翰林學士李紳深為穆宗所寵逢吉惡之求朝臣中凶險敢言者掎托紳陰事俾暴揚於搢紳間又新與拾遺李續之劉棲楚尤蒙逢吉眷待指為鷹犬穆宗崩昭愍初即位又新等構紳貶端州司馬朝臣表賀又至中書賀宰相及門門者止之曰請少留緣張補闕在齊內與相公談俄而又新揮汗而出旅揖羣官曰端溪之事又新不敢多讓人皆辟易憚之與續之等七人時號八關十六子寶曆三年逢吉出為山南東道節度使請又新為副使李續之為行軍司馬逢吉為宰相時用門下省主事田伾伾犯贓亡命逢吉保之于外及罷相裴度發其事逢吉坐罰俸又詔曰朕在億兆人之上不令而人化不言而人信者法也法行則君主重法廢則朝廷輕田伾常挂亡命之章偷請養賢之祿迹在搜捕公行人間而更冒選吏曹顯擬郡佐及黃樞覆驗烏府追擒證逮皆明姦狀盡得三移憲牒一無申陳衆狀滿前羣議溢耳終則步健不至琅璫空來蔑視紀綱頗同侮謔顧茲參畫負我上台閲視連名伊爾二子又新可汀州刺史李續之可涪州刺史及逢吉致仕李訓用事復召二子為尚書郎訓敗復貶而卒希復子讀登進士第有俊才纍官至中書舍人禮部侍郎典貢舉時稱得士位終尚書左丞蔣乂字德源常州義興人也祖瓌太子洗馬開元中弘文館學士父將明纍遷至左司郎中國子司業集賢殿學士副知院事代為名儒而乂史官吳兢之外孫以外舍富墳史幼便記覽不倦七歲時誦庾信哀江南賦數遍而成誦在口以聰悟強力聞於親黨間弱冠博通羣籍而史才尤長其父在集賢時以兵亂之後圖籍溷雜乃白執政請攜乂入院令整比之宰相張鎰見而奇之乃署為集賢小職乂編次踰年於亂中勒成部帙得二萬餘卷再遷王屋尉充太常禮院修撰貞元九年轉右拾遺充史館修撰十三年以故河中節度使張茂昭弟光祿少卿同正茂宗尚義章公主茂宗方居母喪有詔起復雲麾將軍成禮詔下乂上疏諫曰墨縗之禮本緣金革從古已來未有駙馬起復尚主者既乖典禮且違人情切恐不可上令中使宣諭云茂宗母臨亡有請重違其心乂又拜疏辭逾激切德宗於延英特召入對上曰卿所言古禮也朕聞如今人家往往有借吉為婚嫁者卿何苦固執對曰臣聞里俗有不甚知禮法者或女居父母服內家既貧匱旁無至親即有借吉以就禮者男子借吉而娶臣未嘗聞之況陛下臨御已來每事憲章典禮建中年郡縣主出降皆詔有司依禮不用俗儀天下慶戴忽今駙馬起復成禮實恐驚駭物聽臣或聞公主年甚幼小即更俟一年出降時既未失且合禮經實天下幸甚上曰卿言甚善更俟商量俄而韋彤裴堪諫疏繼入上不悅促令奉行前詔然上心頗重乂上嘗登淩煙閣見左壁頽剝文字殘缺每行僅有三五字命録之以問宰臣宰臣遽受宣無以對即令召乂至對曰此聖曆中侍臣圖贊臣皆記憶即於御前口誦以補其缺不失一字上歎曰虞世南暗寫列女傳無以加也十八年遷起居舍人轉司勳員外郎皆兼史職時集賢學士甚衆會詔問神策軍建置之由相府討求不知所出諸學士悉不能對乃訪於乂乂徵引根源事甚詳悉宰臣高郢鄭珣瑜相對曰集賢有人矣翌日詔兼判集賢院事父子代為學士儒者榮之時順宗祔廟將行祧遷之禮詔公卿議咸云中宗中興之主不當遷乂建議云中宗既正位柩前乃受母后篡奪五王翼戴方復大業此乃由我失之因人得之止可同於反正不得號為中興羣議紛然竟依乂所執元和二年遷兵部郎中與許孟容韋貫之等受詔刪定制敕成三十卷奏行用改祕書少監復兼史館修撰尋奉詔與獨孤郁韋處厚同修德宗實録五年書成奏御以功拜右諫議大夫明年監修國史裴罷相李吉甫再入以乂之修撰改授太常少卿久之遷祕書監乂性朴直不能事人或遇權臣專政輒數歲不遷官在朝垂三十年前後每有大政事大議論宰執不能裁決者必召以咨訪乂徵引典故以參時事多合其宜然亦以此自滯而好學不倦老而彌篤雖甚寒暑手不釋卷旁通百家尤精歷代沿革家藏書一萬五千卷本名武因憲宗召對奏曰陛下已誅羣寇偃武修文臣名於義未允請改名乂上欣然從之時帝方用兵兩河乂亦因此諷諭耳乂居史任二十年所著大唐宰輔録七十卷淩煙閣功臣秦府十八學士史臣等傳四十卷長慶元年卒年七十五贈禮部尚書諡曰懿子係伸偕仙佶係大和初授昭應尉直史館二年拜右拾遺史館修撰典實有父風與同職沈傳師鄭浣陳夷行李漢等受詔撰憲宗實録四年書成奏御轉尚書工部員外遷本司郎中仍兼史職宰相宋申錫為北軍羅織罪在不測係與諫官崔玄亮泣諫於玉階之下申錫亦減死時論稱之開成中轉諫議大夫武宗朝李德裕用事惡李漢以係與漢僚壻出為桂管都防禦觀察使宣宗即位徵拜給事中集賢殿學士判院事轉吏部侍郎改左丞出為興元節度使入為刑部尚書俄檢校戶部尚書鳳翔尹充鳳翔隴節度使入為兵部尚書以弟伸為丞相懇辭朝秩檢校尚書左僕射襄州刺史山南東道節度使封淮陽縣開國公食邑五百戶伸登進士第歷佐使府大中初入朝右補闕史館修撰轉中書舍人召入翰林為學士自員外郎中至戶部侍郎學士承旨轉兵部侍郎大中末中書侍郎平章事仙佶皆至刺史偕有史才以父任歷官左拾遺史館修撰轉補闕咸通中與同職盧耽牛叢等受詔修文宗實録蔣氏世以儒史稱不以文藻為事唯伸及係子兆有文才登進士第然不為文士所譽與柳氏沈氏父子相繼修國史實録時推良史京師云蔣氏日曆士族靡不家藏焉柳登字成伯河東人父芳肅宗朝史官與同職韋述受詔添修吳兢所撰國史殺青未竟而述亡芳緒述凡例勒成國史一百三十卷上自高祖下止乾元而天寶後事絶無倫類取捨非工不為史氏所稱然芳勤於記注含毫罔倦屬安史亂離國史散落編綴所聞率多闕漏上元中坐事徙黔中遇內官高力士亦貶巫州遇諸途芳以所疑禁中事咨於力士力士說開元天寶中時政事芳隨口志之又以國史已成經於奏御不可復改乃別撰唐曆四十卷以力士所傳載於年曆之下芳自永寧尉直史館轉拾遺補闕員外郎皆居史任位終右司郎中集賢學士登少嗜學與弟冕咸以該博著稱登年六十餘方從宦遊纍遷至膳部郎中元和初為大理少卿與刑部侍郎許孟容等七人奉詔刪定開元已後敕格再遷右庶子以衰病改祕書監不拜授右散騎常侍致仕長慶二年卒時九十餘輟朝一日贈工部尚書弟冕冕文史兼該長於吏職貞元初為太常博士二年昭德王皇后之喪論皇太子服紀左補闕穆質請依禮周期而除冕與同職張薦等奏議曰準開元禮子為母齊衰三年此王公已下服紀皇太子為皇后喪服國禮無聞昔晉武帝元皇后崩其時亦疑太子所服杜元凱奏議曰古者天子三年之喪既葬除服魏氏革命亦以既葬為節故天子諸侯之禮嘗已具矣惡其害己而削去其籍今其存者唯士喪禮一篇戴聖之記錯雜其內亦難以取正皇太子配至尊與國為體固宜卒哭而除服於是山濤魏舒並同其議晉朝從之歷代遵行垂之不朽臣謹按實録文德皇后以貞觀十年九月崩十一月葬至十一年正月除晉王治為並州都督晉王即高宗在藩所封文德皇后幼子據其命官當已除之義也今請皇太子依魏晉故事為大行皇后喪服葬而虞虞而卒哭卒哭而除心喪終制庶存厭降之禮事下中書宰臣召問禮官曰語云子食於有喪者之側未嘗飽也今豈可令皇太子衰服侍膳至於既葬乎準令羣臣齊衰給假三十日即公除約於此制更審議之張薦曰請依宋齊間皇后為父母服三十日公除例為皇太子喪服之節薦以既公除詣於正內則服墨慘歸至本院衰麻如故穆質曰杜元凱既葬除服之論不足為法臣愚以為遵三年之制則太重從三十日之變太輕唯行古之道以周年為定詔宰臣與禮官定可否宰臣以穆質所奏問博士冕對曰準禮三年喪無貴賤一也豈有以父母貴賤而差降喪服之節乎且禮有公門脫齊衰開元禮皇后為父母服十三月其稟朝旨十三日而除皇太子為外祖父母服五月其從朝旨則五日而除所以然者恐喪服侍奉有傷至尊之意也故從權制昭著國章公門脫衰義亦在此豈皆為金革乎皇太子今若抑哀公除墨慘朝覲歸至本院依舊衰麻酌於變通庶可傳繼宰臣然其議遂命太常卿鄭叔則草奏以冕議為是而穆質堅執前義請依古禮不妨太子墨衰於內也宰臣齊映劉滋參酌羣議請依叔則之議制從之及董晉為太常卿德宗謂之曰皇太子所行周服非朕本意有諫官橫論之今熟計之即禮官請依魏晉故事斯甚折衷明年冬上以太子久在喪合至正月晦受吉服欲以其年十一月釋衰麻以及新正稱慶有司皆論不可乃止六年十一月上親行郊享上重慎祀典每事依禮時冕為吏部郎中攝太常博士與司封郎中徐岱倉部郎中陸質工部郎中張薦皆攝禮官同修郊祀儀注以備顧問初詔以皇太子亞獻親王終獻上令問柳冕當受誓戒否冕對曰準開元禮有之然誓詞云不供其職國有常刑今太子受誓請改云各揚其職肅奉常儀上又問升郊廟去劍履及象劍尺寸之度祝文輕重之宜冕據禮經沿革聞奏上甚嘉之冕言事頗切執政不便之出為婺州刺史十三年兼御史中丞福州刺史充福建都團練觀察使冕在福州奏置萬安監牧於泉州界置羣牧五悉索部內馬五千七百匹驢騾牛八百頭羊三千口以為監牧之資人情大擾期年無所滋息詔罷之以政無狀詔以閻濟美代歸而卒子璟登進士第亦以著述知名璟寶曆初登進士第三遷監察御史時郊廟告祭差攝三公行事多以雜品璟時監察奏曰準開元二十三年敕宗廟大祠宜差左右丞相嗣王特進少保少傅尚書賓客御史大夫又二十五年敕太廟五享差丞相師傅尚書嗣郡王通攝餘司不在差限又元和四年敕太廟告祭攝官太尉以宰相充其攝司空司徒以僕射尚書師傅充餘司不在差限比來吏部因循不守前後敕文用人稍輕請自今年冬季勒吏部準開元元和敕例差官從之再遷度支員外郎轉吏部開成初換庫部員外郎知制誥尋以本官充翰林學士初璟祖芳精於譜學永泰中按宗正譜牒自武德已來宗枝昭穆相承撰皇室譜二十卷號曰永泰新譜自後無人修續璟因召對言及圖譜事文宗曰卿祖嘗為皇家圖譜朕昨觀之甚為詳悉卿檢永泰後試修續之璟依芳舊式續德宗後事成十卷以附前譜仍詔戶部供紙筆廚料五年拜中書舍人充職武宗朝轉禮部侍郎再司貢籍時號得人子韜亦以進士擢第沈傳師字子言吳人父既濟博通羣籍史筆尤工吏部侍郎楊炎見而稱之建中初炎為宰相薦既濟才堪史任召拜左拾遺史館修撰既濟以吳兢撰國史以則天事立本紀奏議非之曰史氏之作本乎懲勸以正君臣以維家邦前端千古後法萬代使其生不敢差死不忘懼緯人倫而經世道為百王準的不止屬辭比事以日繫月而已故善惡之道在乎勸誡勸誡之柄存乎褒貶是以春秋之義尊卑輕重升降幾微髣佛雖一字二字必有微旨存焉況鴻名大統其可以貸乎伏以則天皇后初以聰明睿哲內輔時政厥功茂矣及弘道之際孝和以長君嗣位而太后以專制臨朝俄又廢帝或幽或徙既而握圖稱籙移運革名牝司燕啄之蹤難乎備述其後五王建策皇運復興議名之際得無降損必將義以親隱禮從國諱苟不及損當如其常安可橫絶彝典超居帝籍昔仲尼有言必也正名故夏殷二代為帝者三十世矣而周人通名之曰王吳楚越之君為王者百餘年而春秋書之為子蓋高下自乎彼而是非稽乎我過者抑之不及者援之不為弱減不為僭奪握中持平不振不傾使其求不可得而蓋不可掩斯古君子所以慎其名也夫則天體自坤順位居乾極以柔乘剛天紀倒張進以強有退非德讓今史臣追書當稱之太后不宜曰上孝和雖迫母后之命降居藩邸而體元繼代本吾君也史臣追書宜稱曰皇帝不宜曰廬陵王睿宗在景龍已前天命未集徒稟后制假臨大寶於倫非次於義無名史臣書之宜曰相王未宜曰帝若以得失既往遂而不舉則是非褒貶安所辨正載筆執簡謂之何哉則天廢國家曆數用周正朔廢國家太廟立周七廟鼎命革矣徽號易矣旗裳服色既已殊矣今安得以周氏年曆而列為唐書帝紀徵諸禮經是謂亂名且孝和繼天踐祚在太后之前而年製紀居太后之下方之躋僖是謂不智詳今考古並未為可或曰班馬良史也編述漢事立高后以續帝載豈有非之者乎答曰昔高后稱制因其曠嗣獨有分王諸呂負於漢約無遷鼎革命之甚況其時孝惠已歿孝文在下宮中二子非劉氏種不紀呂后將紀誰焉雖云其然議者猶為不可況遷鼎革命者乎或曰若天后不紀帝緒缺矣則二十二年行事何所繫乎曰孝和以始年登大位以季年復舊業雖尊名中奪而天命未改足以首事足以表年何所拘閡裂為二紀昔魯昭之出也春秋歲書其居曰公在乾侯且君在雖失位不敢廢也今請併天后紀合孝和紀每於歲首必書孝和所在以統之書曰某年春正月皇帝在房陵太后行某事改某制云云則紀稱孝和而事述太后俾名不失正而禮不違常名禮兩得人無間矣其姓氏名諱入宮之由歷位之資才藝智略年辰崩葬別纂録入皇后傳列於廢后王庶人之下題其篇曰則天順聖武后云事雖不行而史氏稱之德宗初即位鋭於求理建中二年夏敕中書門下兩省分置待詔官三十員以見官前任及同正試攝九品已上擇文學理道韜鈐法度之深者為之各準品秩給俸錢廩餼幹力什器館宇之設以公錢為之本收息以贍用物論以為兩省皆名侍臣足備顧問無勞別置冗員既濟上疏論之曰臣伏以陛下今日之理患在官煩不患員少患在不問不患無人且中書門下兩省常侍諫議補闕拾遺總四十員及常參待制之官日有兩人皆備顧問亦不少矣中有二十一員尚闕人未充他司缺職纍倍其數陛下若謂見官非才不足與議則當選求能者以代其人若欲務廣聰明畢收淹滯則當擇其可者先補缺員則朝無曠官俸不徒費且夫置錢息利是有司權宜非陛下經理之法今官三十員皆給俸錢幹力及廚廩什器建造廳宇約計一月不減百萬以他司息例準之當以錢二千萬為之本方獲百萬之利若均本配人當復除二百戶或許其入流反覆計之所損滋甚當今關輔大病皆為百司息錢傷人破産積於府縣實思改革以正本源又臣嘗計天下財賦耗斁之大者唯二事焉最多者兵資次多者官俸其餘雜費十不當二事之一所以黎人重困杼軸猶空方期緝熙必藉裁減今四方形勢兵罷未得資費之廣蓋非獲已陛下躬行儉約節用愛人豈俾間官復為冗食籍舊而置猶可省也若之何加焉陛下必以制出不可改請重難慎擇遷延寢罷其事竟不得行既而楊炎譴逐既濟坐貶處州司戶後復入朝位終禮部員外郎傳師擢進士登制科乙第授太子校書郎鄠縣尉直史館轉左拾遺左補闕並兼史職遷司門員外郎知制誥召充翰林學士歷司勳兵部郎中遷中書舍人性恬退無競時翰林未有承旨次當傳師為之固稱疾宣召不起乞以本官兼史職俄兼御史中丞出為潭州刺史湖南觀察使入為尚書右丞出為洪州刺史江南西道觀察使轉宣州刺史宣歙池觀察使入為吏部侍郎大和元年卒年五十九贈吏部尚書初傳師父既濟撰建中實録十卷為時所稱傳師在史館預修憲宗實録未成廉察湖南特詔齎一分史稿成於理所有子樞詢皆登進士第詢歷清顯中書舍人翰林學士禮部侍郎咸通中檢校戶部尚書潞州長史昭義節度使為政簡易性本恬和奴歸秦者通詢侍者詢將戮之未果奴結牙將為亂夜攻府第詢舉家遇害史臣曰前代以史為學者率不偶於時多罹放逐其故何哉誠以褒貶是非在於手賢愚輕重繫乎言君子道微俗多忌諱一言切己嫉之如讎所以峘薦坎罈於仕塗沈柳不登於顯貴後之載筆執簡者可以為之痛心道在必伸物不終否子孫藉其餘祐多至公卿者蓋有天道存焉贊曰褒貶以言孔道是模誅亂以筆亦有董狐邦家大典班馬何辜懲惡勸善史不可無
