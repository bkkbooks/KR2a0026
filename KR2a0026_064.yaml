body:
  text: 舊唐書卷六十列傳第十宗室太祖諸子代祖諸子永安王孝基淮安王神通子道彥孝察孝同孝慈孝友孝節孝義孝逸襄邑王神符子德懋文暕長平王叔良子孝協孝斌孝斌子思訓思誨叔良弟德良幼良襄武王琛河間王孝恭子晦孝斌弟瑊瓌廬江王瑗王君廓附淮陽王道玄江夏王道宗隴西王博乂永安王孝基高祖從父弟也父璋周梁州刺史與趙王祐謀殺隋文帝事泄被誅高祖即位追封畢王孝基武德元年封永安王歷陝州總管鴻臚卿以罪免二年劉武周將宋金剛來寇汾澮夏縣人呂崇茂殺縣令舉兵反自稱魏王請援於武周復以孝基為行軍總管討之工部尚書獨孤懷恩內史侍郎唐儉陝州總管于筠悉隸焉武周遣其將尉遲敬德潛援崇茂大戰於夏縣王師敗績孝基與唐儉等皆沒於賊後謀歸國為武周所害高祖為之發哀廢朝三日賜其家帛千匹賊平購其尸不得招魂而葬之贈左衛大將軍諡曰壯無子以從兄韶子道立為嗣封高平郡王九年降為縣公永徽初卒於陳州刺史淮安王神通高祖從父弟也父亮隋海州刺史武德初追封鄭王神通隋末在京師義師起隋人捕之神通潛入鄠縣山南與京師大俠史萬寶河東裴績柳崇禮等舉兵以應義師遣使與司竹賊帥何潘仁連結潘仁奉平陽公主而至神通與之合勢進下鄠縣衆踰一萬自稱關中道行軍總管以史萬寶為副裴績為長史柳崇禮為司馬令狐德棻為記室高祖聞之大悅授光祿大夫從平京師拜宗正卿武德元年拜右翊衛大將軍封永康王尋改封淮安王為山東道安撫大使擊宇文化及於魏縣化及不能抗東走聊城神通進兵躡之至聊城會化及糧盡請降神通不受其副使黃門侍郎崔幹勸納之神通曰兵士暴露已久賊計窮糧盡克在旦暮正當攻取以示國威散其玉帛以為軍賞若受降者吾何以藉手乎幹曰今建德方至化及未平兩賊之間事必危迫不攻而下之此勳甚大今貪其玉帛敗無日矣神通怒囚幹于軍中既而士及自濟北餽之化及軍稍振遂拒戰神通督兵薄而擊之貝州刺史趙君德攀堞而上神通心害其功因止軍不戰君德大詬而下城又堅守神通乃分兵數千人往魏州取攻具中路復為莘人所敗竇建德軍且至遂引軍而退後二日化及為建德所虜賊勢益張山東城邑多歸建德神通兵漸散退保黎陽依徐績俄為建德所陷及建德敗復授河北道行臺尚書左僕射從太宗平劉黑闥遷左武衛大將軍貞觀元年拜開府儀同三司賜實封五百戶時太宗謂諸功臣曰朕公等勳效量定封邑恐不能盡當各自言神通曰義旗初起臣率兵先至今房玄齡杜如晦等刀筆之人功居第一臣且不服上曰義旗初起人皆有心叔父雖率兵先至未嘗身履行陳山東未定受委專征建德南侵全軍陷沒及劉黑闥翻動叔父望風而破今計勳行賞玄齡等有籌謀帷幄定社稷功所以漢之蕭何雖無汗馬指縱推轂故功居第一叔父于國至親誠無所愛必不可緣私濫與勳臣同賞耳四年薨太宗為之廢朝贈司空諡曰靖十四年詔與河間王孝恭贈陝州大行臺右僕射鄖節公殷開山贈民部尚書渝襄公劉政會配饗高祖廟庭有子十一人長子道彥武德五年封膠東王次孝察高密王孝同淄川王孝慈廣平王孝友河間王孝節清河王孝義膠西王初高祖受禪以天下未定廣封宗室以威天下皇從弟及姪年始孩童者數十人皆封為郡王太宗即位因舉宗正屬籍問侍臣曰遍封宗子於天下便乎尚書右僕射封德彝對曰歷觀往古封王者今最為多兩漢已降唯封帝子及親兄弟若宗室疏遠者非有大功如周之郇漢之賈澤並不得濫封所以別親疏也先朝敦睦九族一切封王爵命既隆多給力役蓋以天下為私殊非至公馭物之道太宗曰朕理天下本為百姓非欲勞百姓以養己之親也於是宗室率以屬疏降爵為郡公唯有功者數人封王是時道彥等並隨例降爵道彥與季弟孝逸最知名道彥幼而事親甚謹初義師起神通逃難被疾于山谷綿歷數旬山中食盡道彥著故弊衣出人間乞丐及採野實以供其父身無所噉其父分以食之輒詐言已啖而覆藏留之以備闕乏及神通應義舉授朝請大夫高祖受禪封義興郡公進封膠東王授隴州刺史貞觀初轉相州都督例降爵為公拜岷州都督丁父憂廬於墓側負土成墳躬植松柏容貌哀毀親友皆不復識之太宗聞而嘉歎令侍中王圭就加開喻復授岷州都督道彥遣使告喻党項諸部申國威靈多有降附李靖之擊吐谷渾也詔道彥為赤水道行軍總管時朝廷復厚幣遺党項令為鄉導党項首領拓拔赤辭來詣靖軍請諸將曰往者隋人來擊吐谷渾我党項每資軍用而隋人無信必見侵掠今將軍若無他心者我當資給糧運如或我欺當即固險以塞軍路諸將與之歃血而盟赤辭信之道彥既至闊水見赤辭無備遂襲之虜牛羊數千頭於是諸羌怨怒屯兵野狐硤道彥不能進為赤辭所乘軍大敗死者數萬人道彥退保松州竟坐減死徙邊後起為涼州都督尋卒贈禮部尚書孝逸少好學解屬文初封梁郡公高宗末歷給事中四遷益州大都督府長史則天臨朝入為左衛將軍甚見親遇光宅元年徐敬業據揚州作亂以孝逸為左玉鈐衛大將軍揚州行軍大總管督軍以討之孝逸引軍至淮而敬業方南攻潤州遣其弟敬猷屯兵淮陰僞將韋超據都梁山以拒孝逸裨將馬敬臣擊斬賊之別帥尉遲昭夏侯瓚等超乃擁衆憑山以自固或謂孝逸曰超衆守險且憑山為阻攻之則士無所施其力騎無所騁其足窮寇殊死殺傷必衆不若分兵守之大軍直趣揚州未數日其勢必降也支度使廣府司馬薛克構曰超雖據險其卒非多今逢小寇不擊何以示武若加兵以守則有闕前機捨之而前則終為後患不如擊之克超則淮陰自懾淮陰破則楚州諸縣必開門而候官軍然後進兵高郵直趣江都逆豎之首可指掌而懸也孝逸從其言進兵擊超賊衆壓伏官軍登山急擊之殺數百人日暮圍解超銜枚夜遁孝逸引兵擊淮陰大破敬猷之衆時敬業回軍屯於下阿溪以拒官軍有流星墜其營孝逸引兵渡溪以擊之敬業初勝後敗孝逸乘勝追奔數十里敬業窘迫與其黨攜妻子逃入海曲孝逸進據揚州盡捕斬敬業等振旅而還以功進授鎮軍大將軍轉左豹韜衛大將軍改封吳國公孝逸素有名望自是時譽益重武承嗣等深所忌嫉數讒毀之垂拱二年左遷施州刺史其冬承嗣等又使人誣告孝逸往任益州嘗自解逸字云走繞兔者常在月中月既近天合有天分則天以孝逸常有功減死配徙儋州尋卒景雲初贈益州大都督孝鋭孫齊物孝同曾孫國貞別有傳襄邑王神符神通弟也幼孤事兄以友悌聞義寧初授光祿大夫封安吉郡公武德元年進封襄邑郡王四年纍遷并州總管突厥頡利可汗率衆來寇神符出兵與戰於汾水東敗之斬首五百級虜其馬二千匹又戰於沙河之北獲其乙利達官并可汗所乘馬及甲獻之由是召拜太府卿九年遷揚州大都督移州府及居人自丹陽渡江州人賴焉貞觀初再遷宗正卿後以疾辭職太宗幸其第問疾賜以縑帛每給羊酒又令乘小輿引入紫微殿以神符腳疾乃遣三衛輿之而升尋授開府儀同三司永徽二年薨年七十三贈司空荊州都督陪葬獻陵諡曰恭有子七人武德初並封郡王後例降封縣公次子德懋少子文暕最知名德懋官至少府監臨川郡公文暕歷幽州都督魏郡公垂拱中坐事貶為州別駕尋被誅文暕子佺開元中為宗正卿長平王叔良高祖從父弟也父褘隋上儀同三司武德初追封郇王叔良義寧中授左光祿大夫封長平郡公武德元年拜刑部侍郎進爵為王師鎮涇州以禦薛舉舉乃陽言食盡引兵南去遣高咵人僞以降叔良遣驃騎劉感率衆赴之至百里細川伏兵發官軍敗績劉感沒于陳叔良大懼出金以賜士卒嚴為守備涇州僅全四年突厥入寇命叔良率五軍擊之叔良中流矢而薨贈左翊衛大將軍靈州總管諡曰肅子孝協嗣武德五年封范陽郡王貞觀初以屬疏例降封郇國公纍遷魏州刺史麟德中坐受贓賜死孝協弟孝斌官至原州都督府長史孝斌子思訓高宗時纍轉江都令屬則天革命宗室多見構陷思訓遂棄官潛匿神龍初中宗初復宗社以思訓舊齒驟遷宗正卿封隴西郡公實封二百戶歷益州長史開元初左羽林大將軍進封彭國公更加實封二百戶尋轉右武衛大將軍開元六年卒贈秦州都督陪葬橋陵思訓尤善丹青迄今繪事者推李將軍山水思訓弟思誨垂拱中揚州參軍思誨子林甫別有傳叔良弟德良少有疾不仕武德初封新興王貞觀十一年薨贈涼州都督德良孫晉先天中為殿中監兼雍州長史甚有威名紹封新興王尋坐附會太平公主伏誅改姓厲氏初晉之就誅僚吏皆奔散唯司功李撝步從不失在官之禮仍哭其尸姚崇聞之曰欒向之儔也擢為尚書郎後官至澤州刺史德良弟幼良武德初封長樂王時有人盜其馬者幼良獲盜而擅殺之高祖怒曰昔人賜盜馬者酒終獲其報爾輒行戮何無古風盜者信有罪矣專殺豈非枉邪遣禮部尚書李綱於朝堂集宗室王公而撻之自後纍遷涼州都督嘗引不逞百餘人為左右多侵暴市里行旅苦之太宗即位有告幼良陰養死士交通境外恐謀為反叛詔遣中書令宇文士及代為都督并按其事士及慮其為變遂縊殺之襄武王琛高祖從父兄子也祖蔚周朔州總管父安隋領軍大將軍武德初追封蔚為蔡王安為西平王琛義寧中封襄武郡公與太常卿鄭元璹賫女妓遺突厥始畢可汗以結和親始畢甚重之贈名馬數百匹遣骨咄祿特勤隨琛貢方物高祖大悅拜刑部侍郎進爵為王歷蒲絳二州總管及宋金剛陷澮州時稽胡多叛轉琛為隰州總管以鎮之馭衆寬簡夷夏安之三年薨子儉嗣後隨例降爵為公河間王孝恭琛之弟也高祖克京師拜左光祿大夫尋為山南道招慰大使自金州出于巴蜀招攜以禮降附者三十餘州孝恭進擊朱粲破之諸將曰此食人賊也為害實深請坑之孝恭曰不可自此已東皆為寇境若聞此事豈有來降者乎盡赦而不殺由是書檄所至相繼降款武德二年授信州總管承制拜假蕭銑據江陵孝恭獻平銑之策高祖嘉納之三年進爵為王改信州為夔州使拜孝恭為總管令大造舟楫教習水戰以圖蕭銑孝恭召巴蜀首領子弟量才授用致之左右外示引擢而實以為質也尋授荊湘道行軍總管統水陸十二總管發自硤州進軍江陵攻其水城克之所得船散於江中諸將皆曰虜得賊船當藉其用何為棄之無乃資賊耶孝恭曰不然蕭銑僞境南極嶺外東至洞庭若攻城未拔援兵復到我則內外受敵進退不可雖有舟楫何所用之今銑緣江州鎮忽見船舸亂下必知銑敗未敢進兵來去覘伺動淹旬月用緩其救吾克之必矣銑救兵至巴陵見船被江而下果狐疑不敢輕進既內外阻絶銑於是出降高祖大悅拜孝恭荊州大總管使畫工貌而視之於是開置屯田創立銅冶百姓利焉六年遷襄州道行臺尚書左僕射時荊襄雖定嶺表尚未悉平孝恭分遣使人撫慰嶺南四十九州皆來款附及輔公祏據江東反發兵寇壽陽命孝恭為行軍元帥以擊之七年孝恭自荊州趣九江時李靖李績黃君漢張鎮州盧祖尚並受孝恭節度將發與諸將宴集命取水忽變為血在座者皆失色孝恭舉止自若徐諭之曰禍福無門唯人所召自顧無負於物諸公何見憂之深公祏惡積禍盈今承廟算以致討碗中之血乃公祏授首之後徵遂盡飲而罷時人服其識度而能安衆公祏遣其僞將馮惠亮陳當時領水軍屯于博望山陳正通徐紹宗率步騎軍于青林山孝恭至堅壁不與鬬使奇兵斷其糧道賊漸餧夜薄我營孝恭安臥不動明日縱羸兵以攻賊壘使盧祖尚率精騎列陳以待之俄而攻壘者敗走賊出追奔數里遇祖尚軍與戰大敗之正通棄營而走復與馮惠亮保梁山孝恭乘勝攻之破其梁山別鎮赴水死者數千人正通率陸軍夜遁總管李靖又下廣陵城拔楊子鎮公祏窮蹙棄丹陽東走孝恭命騎將追之至武康擒公祏及其僞僕射西門君儀等數十人致于麾下江南悉平璽書褒賞賜甲第一區女樂二部奴婢七百人金寶珍玩甚衆授東南道行臺尚書左僕射後廢行臺拜揚州大都督孝恭既破公祏江淮及嶺南皆統攝之自大業末羣雄競起皆為太宗所平謀臣猛將並在麾下罕有別立勳庸者唯孝恭著方面之功聲名甚盛厚自崇重欲以威名鎮遠築宅於石頭陳廬徼以自衛尋徵拜宗正卿九年賜實封一千二百戶貞觀初遷禮部尚書以功臣封河間郡王除觀州刺史與長孫無忌等代襲刺史孝恭性奢豪重遊宴歌姬舞女百有餘人然而寬恕退讓無驕矜自伐之色太宗甚加親待諸宗室中莫與為比孝恭嘗悵然謂所親曰吾所居宅微為宏壯非吾心也當賣之別營一所粗令充事而已身歿之後諸子若才守此足矣如其不才冀免他人所利也十四年暴薨年五十太宗素服舉哀哭之甚慟贈司空揚州都督陪葬獻陵諡曰元配享高祖廟庭子崇義嗣降爵為譙國公歷蒲同二州刺史益州大都督長史甚有威名後卒於宗正卿孝恭次子晦乾封中纍除營州都督以善政聞璽書勞問賜物三百段轉右金吾將軍兼檢校雍州長史糾發姦豪無所容貸為人吏畏服晦私第有樓下臨酒肆其人嘗候晦言曰微賤之人雖則禮所不及然家有長幼不欲外人窺之家迫明公之樓出入非便請從此辭晦即日毀其樓高宗將幸洛陽令在京居守顧謂之曰關中之事一以付卿但令式局人不可以成官政令式之外有利於人者隨事即行不須聞奏晦纍有異績則天臨朝遷戶部尚書垂拱初拜右金吾衛大將軍轉秋官尚書永昌元年卒贈幽州都督子榮為酷吏所殺孝恭弟瑊武德中為尚書右丞封濟北郡王卒於始州刺史瑊弟瓌義師克京城授瓌左光祿大夫武德元年封漢陽郡公五年進爵為王時突厥屢為侵寇高祖使瓌賫布帛數萬段與結和親頡利可汗初見瓌箕踞瓌餌以厚利頡利大悅改容加敬遣使隨瓌獻名馬後復將命頡利謂左右曰李瓌前來恨不屈之今者必令下拜瓌微知之及見頡利長揖不屈節頡利大怒乃留瓌不遣瓌神意自若竟不為之屈頡利知不可以威脅終禮遣之拜左武候將軍轉衛尉卿代兄孝恭為荊州都督政存清靜深為士庶所懷嶺外豪帥屢相攻擊遣使喻以威德皆相次歸附嶺表遂定太宗即位例降爵為公時長史馮長命曾為御史大夫素矜衒事多專決瓌怒杖之坐是免貞觀四年拜宜州刺史加散騎常侍卒子沖玄垂拱中官至冬官尚書沖虛卒于尚方監廬江王瑗高祖從父兄子也父哲隋柱國備身將軍追封濟南王瑗武德元年歷信州總管封廬江王九年纍遷幽州大都督朝廷以瑗儒磱非邊將才遣右領軍將軍王君廓助典兵事君廓故嘗為盜勇力絶人瑗倚仗之許結婚姻以布心腹時隱太子建成將有異圖外結於瑗及建成誅死遣通事舍人崔敦禮召瑗入朝瑗有懼色君廓素險薄欲因事陷之以為己功遂紿瑗曰京都有變事未可知大王國之懿親受委作鎮寧得擁兵數萬而從一使召耶且聞趙郡王先以被拘太子齊王又言若此大王今去能自保乎相與共泣瑗乃囚敦禮舉兵反召北燕州刺史王詵將與計事兵曹參軍王利涉說瑗曰王不奉詔而擅發兵此為反矣須改易法度以權宜應變先定衆心今諸州刺史或有逆命王徵兵不集何以保全瑗曰若之何利涉曰山東之地先從竇建德酋豪首領皆是僞官今並黜之退居匹庶此人思亂若旱苗之望雨王宜發使復其舊職各於所在遣募本兵諸州倘有不從即委隨便誅戮此計若行河北之地可呼吸而定也然後分遣王詵北連突厥道自太原南臨蒲絳大王整駕親詣洛陽西入潼關兩軍合勢不盈旬月天下定矣瑗從之瑗以內外機務悉付君廓利涉以君廓多翻覆又說瑗委兵於王詵而除君廓瑗不能決君廓知之馳斬詵持首告其衆曰李瑗與王詵共反禁錮敕使擅追兵集今王詵已斬獨李瑗在無能為也汝若從之終亦族滅從我取之立得富貴禍福如是意欲何從衆曰皆願討賊君廓領其麾下登城西面瑗未之覺君廓自領千餘人先往獄中出敦禮瑗始知之遽率數百人披甲才出至門外與君廓相遇君廓謂其衆曰李瑗作逆誤人何忽從之自取塗炭衆皆倒戈一時潰走瑗塊然獨存謂君廓曰小人賣我以自媚汝行當自及矣君廓擒瑗縊殺之年四十一傳首京師絶其屬籍君廓并州石艾人也少亡命為羣盜聚徒千餘人轉掠長平進逼夏縣李密遣使召之遂投於密尋又率衆歸國歷遷右武衛將軍纍封彭國公從平劉黑闥令鎮幽州會突厥入寇君廓邀擊破之俘斬二千餘人獲馬五千匹高祖大悅徵入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目眥出血君廓往擊竇建德將出戰李績遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶還鎮幽州尋以誅瑗功拜左領軍大將軍兼幽州都督以瑗家口賜之加左光祿大夫賜物千段食實封千三百戶在職多縱逸長史李玄道數以朝憲脅之懼為所奏殊不自安後追入朝行至渭南殺驛吏而遁將奔突厥為野人所殺追削其封邑淮陽王道玄高祖從父兄子也祖繪隋夏州總管武德初追封雍王父贄追封河南王道玄武德元年封淮陽王授右千牛從太宗擊宋金剛于介州先登陷陳時年十五太宗壯之賞物千段後從討王世充頻戰皆捷竇建德至武牢太宗以輕騎誘賊令道玄率伏兵於道左會賊至追擊破之又從太宗轉戰于汜水麾戈陷陳直出賊後衆披靡復衝突而歸太宗大悅命副乘以給道玄又從太宗赴賊再入再出飛矢亂下箭如蝟毛猛氣益厲射人無不應弦而倒東都平拜洛州總管及府廢改授洛州刺史五年劉黑闥引突厥寇河北復授山東道行軍總管師次下博與賊軍遇道玄帥騎先登命副將史萬寶督軍繼進萬寶與之不協及道玄深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為將而軍之進止皆委於吾今其輕脫越濘交戰大軍若動必陷泥溺莫如結陳以待之雖不利於王而利於國道玄遂為賊所擒全軍盡沒惟萬寶逃歸道玄遇害年十九太宗追悼久之嘗從容謂侍臣曰道玄終始從朕見朕深入賊陳所向必克意嘗企慕所以每陳先登蓋學朕也惜其年少不遂遠圖因為之流涕贈左驍衛大將軍諡曰壯無子詔封其弟武都郡公道明為淮陽王令主道玄之祀纍遷左驍衛將軍送弘化公主還蕃坐泄主非太宗女奪爵國除後卒於鄆州刺史江夏王道宗道玄從父弟也父韶追封東平王贈戶部尚書道宗武德元年封略陽郡公起家左千牛備身裴寂討劉武周戰于度索原軍敗賊徒進逼河東道宗時年十七從太宗率衆拒之太宗登玉壁城望賊顧謂道宗曰賊恃其衆來邀我戰汝謂如何對曰羣賊乘勝其鋒不可當易以計屈難與力競今深壁高壘以挫其鋒烏合之徒莫能持久糧運致竭自當離散可不戰而擒太宗曰汝意暗與我合後賊果食盡夜遁追及介州一戰滅之又從平竇建德破王世充屢有殊效五年授靈州總管梁師都據夏州遣弟洛仁引突厥兵數萬至于城下道宗閉門拒守伺隙而戰賊徒大敗高祖聞而嘉之謂左僕射裴寂中書令蕭瑀曰道宗今能守邊以寡制衆昔魏任城王彰臨戎却敵道宗勇敢有同於彼遂封為任城王初突厥連於梁師都其郁射設入居五原舊地道宗逐出之振耀威武開拓疆界斥地千餘里邊人悅服貞觀元年徵拜鴻臚卿歷左領軍大理卿時太宗將經略突厥又拜靈州都督三年為大同道行軍總管遇李靖襲破頡利可汗頡利以十餘騎來奔其部道宗引兵逼之徵其執送頡利頡利以數騎夜走匿于荒谷沙鉢羅懼馳追獲之遣使送於京師以功賜實封六百戶召拜刑部尚書吐谷渾寇邊詔右僕射李靖為崑丘道行軍大總管道宗與吏部尚書侯君集為之副賊聞兵至走入嶂山已行數千里諸將議欲息兵道宗固請追討李靖然之而君集不從道宗遂率偏師并行倍道去大軍十日追及之賊據險苦戰道宗潛遣千餘騎踰山襲其後賊表𩹉受敵一時奔潰十二年遷禮部尚書改封江夏王尋坐贓下獄太宗謂侍臣曰朕富有四海士馬如林欲使轍跡周宇內遊觀無休息絶域採奇玩海外訪珍羞豈不得耶勞萬姓而樂一人朕所不取也人心無厭唯當以理制之道宗俸料甚高宴賜不少足有餘財而貪婪如此使人嗟惋豈不鄙乎遂免官削封邑十三年起為茂州都督未行轉晉州刺史十四年復拜禮部尚書時侯君集立功於高昌自負其才潛有異志道宗嘗因侍宴從容言曰君集智小言大舉止不倫以臣觀之必為戎首太宗曰何以知之對曰見其恃有微功深懷矜伐恥在房玄齡李靖之下雖為吏部尚書未滿其志非毀時賢常有不平之語太宗曰不可億度浪生猜二其功勳才用無所不堪朕豈惜重位第未到耳俄而君集謀反誅太宗笑謂道宗曰君集之事果如公所揣及大軍討高麗令道宗與李績為前鋒濟遼水克蓋牟城逢賊兵大至軍中僉欲深溝保險待太宗至徐進道宗曰不可賊赴急遠來兵實疲頓恃衆輕我一戰必摧昔耿弇不以賊遺君父我既職在前軍當須清道以待輿駕李績然之乃與壯士數十騎直衝賊陳左右出入績因合擊大破之太宗至深加賞勞賜奴婢四十人又築土山攻安市城土山崩道宗失於部署為賊所據歸罪於果毅傅伏愛斬之道宗跣行詣旗下請罪太宗曰漢武殺王恢不如秦穆赦孟明土山之失且非其罪捨而不問道宗在陳損足太宗親為其針賜以御膳二十一年以疾請居間職轉太常卿永徽元年加授特進增實封并前六百戶四年房遺愛伏誅長孫無忌褚遂良素與道宗不協上言道宗與遺愛交結配流象州道病卒年五十四及無忌遂良得罪詔復其官爵道宗晚年頗好學敬慕賢士不以地勢凌人宗室中唯道宗及河間王孝恭昆季最為當代所重道宗子景恆降封盧國公官至相州刺史隴西王博乂高祖兄子也高祖長兄曰澄次曰湛次曰洪並早卒武德初追封澄為梁王湛為蜀王洪為鄭王澄洪並無後博乂即湛第二子也武德元年受封高祖時歷宗正卿禮部尚書加特進博乂有妓妾數百人皆衣羅綺食必粱肉朝夕絃歌自娛驕侈無比與其弟渤海王奉慈俱為高祖所鄙帝謂曰我怨讎有善猶擢以不次況於親戚而不委任聞汝等唯昵近小人好為不軌先王墳典不聞習學今賜絹二百匹可各買經史習讀務為善事咸亨二年薨贈開府儀同三司荊州都督諡曰恭奉慈武德初封渤海王顯慶中纍遷原州都督薨諡曰敬史臣曰無私於物物亦公焉高祖才定中原先封疏屬致廬江為叛神通爭功封德彝論之於前房玄齡譏之於後若河間機謀深沉識度弘遠縱虛舟而降蕭銑飲妖血而平公祏入朝定君臣之分賣第為子孫之謀善始令終論功行賞即無私矣或問曰水變為血信妖矣竟成功而無咎者何也答曰河間節貫神明志匡宗社故妖不勝德明矣道宗軍謀武勇好學下賢於羣從之中稱一時之傑無忌遂良銜不協之素致千載之冤永徽中無忌遂良忠而獲罪人皆哀之殊不知誣陷劉洎吳王恪於前枉害道宗於後天網不漏不得其死也宜哉贊曰疏屬盡封啓亂害公河間孝恭獨稱軍功
