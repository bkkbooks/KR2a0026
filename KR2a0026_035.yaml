body:
  text: 舊唐書卷三十一志第十一音樂四享太廟樂章十三首貞觀中魏徵褚亮等作迎神用永和黃鐘宮三成大呂角二成太簇徵二成應鐘羽二成總九變同用於穆烈祖弘此丕基永言配命子孫保之百神既洽萬國在茲是用孝享神其格思皇帝行用太和詞同冬至圓丘登歌酌鬯用肅和夾鐘均之黃鐘羽大哉至德允茲明聖格於上下聿遵誠敬喜樂斯登鳴球以詠神其降止式隆景命迎俎用雍和崇茲享祀誠敬兼至樂以感靈禮以昭事粢盛咸潔牲牷孔備永言孝思庶幾不匱皇祖宣簡公酌獻用長發無射宮濬哲惟唐長發其祥帝命斯祐王業克昌配天載德就日重光本枝百代申錫無疆皇祖懿王酌獻用長發同前詞黃鐘宮太祖景皇帝酌獻用大基太簇宮猗歟祖業皇矣帝先翦商德厚封唐慶延在姬猶稷方晉踰宣基我鼎運於萬斯年世祖元皇帝酌獻用大成姑洗宮周稱王季晉美帝文明明盛德穆穆齊芬藏用四履屈道三分鏗鏘鐘石載紀鴻勳高祖大武皇帝酌獻用大明蕤賓宮五紀更運三正遞昇勛華既沒禹湯勃興神武命代靈睠是膺望雲彰德察緯告徵上紐天維下安地軸徵師涿野萬國咸服偃伯靈臺九官允穆殊域委賮懷生介福大禮既飾大樂已和黑章擾囿赤字浮河功宣載籍德被詠歌克昌厥後百祿是荷皇帝飲福用壽和八音斯奏三獻畢陳寶祚惟永暉光日新送文舞出迎武舞入用舒和聖敬通神光七廟靈心薦祚和萬方嚴禋克配鴻基遠明德惟馨鳳曆昌武舞用凱安詞同冬至圓丘徹俎用雍和於穆清廟聿修嚴祀四縣載陳三獻斯止籩豆徹薦人祇介祉神惟格思錫祚不已送神用永和肅肅清祀蒸蒸孝思薦享昭備虔恭在茲雍歌徹俎祝嘏陳辭用光武志永固鴻基又享太廟樂章五首永徽已後續撰不詳撰者太宗文皇帝酌獻用崇德夷則宮永徽元年造五運改卜千齡啟聖彤雲曉聚黃星夜映葉闡珠囊基開玉鏡後為圖開下臨萬宇上齊七政霧開三象塵清九服海溓星暉遠安邇肅天地交泰華夷輯睦翔泳歸仁中外禔福績踰黜夏勳高翦商武陳七德刑設三章祥禽巢閣仁獸遊梁卜年惟永景福無疆高宗天皇大帝酌獻用鈞天黃鐘宮光宅元年造承天撫籙纂聖登皇遐清萬宇仰協三光功成日用道濟時康璇圖載永寶曆斯昌日月揚暉烟雲爛色河岳修貢神祇效職舜風攸偃堯曦先就睿感通寰孝思浹宙奉揚先德虔遵曩狩展義天扃飛英雲岫化逸王表神凝帝先乘雲厭俗馭日登玄中宗孝和皇帝酌獻用太和太簇宮景雲元年造廣樂既備嘉薦既新述先惟德孝饗惟親七獻具舉五齊畢陳錫茲祚福於萬斯春睿宗大聖真皇帝酌獻用景雲黃鐘宮開元四年造惟睿作聖惟聖登皇精感耀魄時膺會昌舜慙大孝堯推讓王能事斯極振古誰方文明履運車書同軌巍巍赫赫盡善盡美衢室凝旒大庭端扆釋負之寄事光復子脫屣高天登遐上玄龍湖超忽象野芊綿遊衣複道薦果初年新廟奕奕明德配天皇祖宣皇帝酌獻用光大無射宮舊樂章宣光二宮同用長發其詞亦同開元十年始定宣皇帝用光大詞更別造大業龍祉徽音駿尊潛居皇德赫嗣天昆展儀宗祖重誠孝孫春秋無極享奏存存又享太廟樂章三首太樂舊有此詞不詳所起迎神黃鐘宮太呂角太簇徵應鐘羽並同此詞七廟觀德百靈攸仰俗荷財成物資含養道光執契化籠提象肅肅雍雍神其來享金奏無射宮次迎神肅肅清廟巍巍盛唐配天立極累聖重光樂和管磬禮備蒸嘗永惟來格降福無疆送神五聲備奏三獻終祠車移鳳輦旆轉紅旗禮周籩豆誠效虔祇皇靈徙蹕簪紳拜辭則天皇后享清廟樂章十首第一建清廟贊玄功擇吉日展禋宗樂已變禮方崇望神駕降仙宮第二隆周創業寶命惟新敬宗茂典爰表虔禋聲明已備文物斯陳肅容如在懇志方申第三登歌肅敷大禮上謁尊靈敬陳筐幣載表丹誠第四迎神敬奠蘋藻式罄虔襟潔誠斯展佇降靈歆第五飲福爰陳玉醴式奠瓊漿靈心有穆介福無疆第六送文舞帝圖草創王業初開功高佐命業贊雲雷第七迎武舞赫赫玄功被穹壤皇皇至德洽生靈開基撥亂祅氛廓佐命宣威海內清第八武舞作荷恩承顧託執契恭臨撫廟略靜邊荒天兵耀神武第九徹俎登歌已闋獻禮方周欽承景福肅奉鴻休第十送神大禮言畢仙衞將歸莫申丹懇空瞻紫微中宗孝和皇帝神龍元年享太廟樂章二十首不詳所撰迎神用嚴和黃鐘宮三成大呂角三成太簇徵三成應鐘羽二成同用此詞肅肅清廟赫赫玄猷功高萬古化奄十洲中興丕業上荷天休祗奉先構禮被懷柔皇帝行用昇和黃鐘宮顧惟菲薄纂曆應期中外同軌夷狄來思樂用崇德禮以陳詞夕惕若厲欽奉宏基登歌祼鬯用虔和大呂均之無射羽禮標薦鬯肅事祠庭敬申如在敢託非馨送文舞出迎武舞入用同和太簇羽惟聖配天敷盛禮惟天為大闡洪名恭禋展敬光先德蘋藻申虔表志誠武舞用寧和林鐘徵炎馭失天綱土德承天命英猷被寰宇懿躅隆邦政七德已綏邊九夷咸底定景化覃遐邇深仁洽翔泳徹俎用恭和大呂均之無射羽禮周三獻樂闋九成肅承靈福悚惕兼盈送神用通和黃鐘宮祠容既畢仙座爰興停停鳳舉靄靄雲昇長隆寶運永錫休徵福覃貽厥恩被黎蒸皇后助享皇后行用正和黃鐘宮詞同貞觀中宮朝會正和登歌奠鬯用昭和大呂均之無射羽道洽二儀交泰時休四宇和平環珮肅於庭實鐘石揚乎頌聲皇后酌獻飲福用誠敬黃鐘宮顧惟菲質忝位椒宮虔奉蘋藻肅事神宗敢申誠潔庶罄深衷睟容有裕靈享無窮徹俎用肅和大呂均之無射羽月禮已周雲和將變爰獻其醑載遷其奠明德逾隆非馨是薦澤霑動植仁覃宇縣送神用昭感黃鐘羽鏗鏘韶濩肅穆神容洪規赫赫祠典雍雍已周三獻將乘六龍虔誠有託懇志無從玄宗開元七年享太廟樂章十六首特進行尚書左丞相燕國公張說作迎神用永和三章肅九室諧八音歌皇慕動神心禮宿設樂妙尋聲明備祼奠臨律迓氣音入玄依玉几御黼筵聆愾息僾周旋九韶遍百福傳信工祝永頌聲來祖考聽和平相百辟貢九瀛神休委帝孝成皇帝行用太和一章時文聖后清廟肅邕致誠勤薦在貌思恭玉節肆夏金鏘五鐘繩繩雲步穆穆天容登歌酌瓚用肅和一章天子孝享工歌溥將躬祼鬱鬯乃焚膋薌臭以達旨聲以求陽奉時烝嘗永代不忘迎俎用雍和二章在滌嘉豢麗碑敬牲角握之牡色純之騂火傳陽燧水溉陰精太公胖俎傅說和羹俎豆有馥齋盛絜豐亦有和羹既戒既平鼓鐘管磬肅唱和鳴皇皇后祖賚我思成皇帝酌醴齊用文舞一章聖九德真言五千慶集昌冑符開帝先高文杖鉞克配彼天三宗握鏡六合煥然帝其承祀率禮罔愆圖書霧出日月清懸舞形德類詠諗功傳黃龍蜿蟺綵雲蹁躚五行氣順八佾風宣介此百祿於皇萬年獻祖宣皇帝室奠獻用光大之舞一章肅肅藝祖滔滔濬源有雄玉劍作鎮金門玄王貽緒后稷謀孫肇禋九廟四海來尊懿祖光皇帝室奠獻用長發之舞一章具禮崇德備樂承風魏推幢主周贈司空不行而至無成有終神興王業天歸帝功太祖景皇帝室奠獻用大政之舞一章於赫元命權輿帝文天齊八柱地半三分宗廟觀德笙鏞樂勳封唐之兆成天下君代祖元皇帝室奠獻用大成之舞一章帝舞季歷襲聖生昌后歌有蟜胎炎孕黃天地合德日月齊光肅邕孝享祚我萬方高祖神堯皇帝室奠獻用大明之舞一章赤精亂德四海困窮黃旗舉義三靈會同旱望春雨雲披大風溥天來祭高祖之功太宗文武聖皇帝室奠獻用崇德之舞一章皇合一德朝宗百神削平天下大拯生人上帝配食單于入臣戎歌陳舞曄曄震震高宗天皇大帝室奠獻用鈞天之舞一章高皇邁道端拱無為化懷獯鬻兵戢句驪禮尊封禪樂盛來儀合位媧后同稱伏羲中宗孝和皇帝室奠獻用太和之舞一章退居江水鬱起丹陵禮物還舊朝章中興龍圖友及駿命恭膺鳴球秉瓚大糦是承睿宗大聖真皇帝室奠獻用景雲之舞一章景雲霏爛告我帝符噫帝沖德與天為徒笙鏞遙遠俎豆虛無春秋孝獻迴復此都又享太廟樂章十四首玄宗至道大聖大明孝皇帝室奠獻用廣運之舞一章司徒兼中書令汾陽郡王郭子儀撰於赫皇祖昭明有融惟文之德惟武之功河海靜謐車書混同虔恭孝饗穆穆玄風肅宗文明武德大聖大宣孝皇帝室奠獻用惟新之舞一章吏部尚書平章事彭城郡公劉晏撰漢祚惟永神功中興風驅氛祲天覆黎蒸三光再朗庶績其凝重熙累葉景命是膺皇帝飲福受脤用福和一章備禮用樂崇親致尊誠通慈降敬徹愛存獻懷稱壽啐感承恩皇帝孝德子孫千億大包天域長亙不極送文舞出迎武舞入用舒和一章六鐘翕協六變成八佾倘佯八風生樂九韶兮人神感美七德兮天地清亞獻終獻行事武舞用凱安四章瑟彼瑤爵亞維上公室如屏氣門不容躬禮殷其本樂執其中聖皇永慕天地幽通禮匝三獻樂遍九成降循軒陛仰欷皇情福與仁合德因孝明百年神畏四海風行總總干戚填填鼓鐘奮揚增氣坐作為容離若鷙鳥合如戰龍萬方觀德肅肅邕邕烈祖順三靈文宗威四海黃鉞誅羣盜朱旗掃多罪戢兵天下安約法人心改大哉干羽意長見風雲在徹豆登歌一章止笙磬徹豆籩廓無響窅入玄主在室神在天情餘慕禮罔愆喜黍稷屢豐年送神用永和一章眇嘉樂授靈爽感若來思如往休氣散迴風上返寂寞還惚恍懷靈駕結空想代宗睿文孝武皇帝室奠獻用保大之舞一章尚父郭子儀撰於穆文考聖神昭彰簫勺羣慝含光遠方萬物茂遂九夷賓王愔愔雲韶德音不忘德宗神武孝文皇帝室奠獻用文明之舞一章尚書左丞平章事鄭餘慶撰開邸除暴時邁勛尊三元告命四極駿奔金枝翠葉煇燭瑤琨象德億載貽慶湯孫順宗至德大聖大安孝皇帝室奠獻用大順之舞一章中書侍郎平章事鄭絪撰於穆時文受天明命允恭玄默化成理定出震嗣德應乾傳聖猗歟緝熙千億流慶憲宗聖神章武孝皇帝室奠獻用象德之舞一章中書侍郎平章事段文昌撰肅肅清廟登顯至德澤周八荒兵定四極生物咸遂羣盜滅息明聖欽承子孫千億儀坤廟樂章十二首迎神用永和林鐘宮散騎常侍昭文館學士徐彥伯作猗若清廟肅肅熒熒國薦嚴祀坤輿淑靈有几在室有樂在庭臨茲孝享百祿惟寧金奏夷則宮不詳作者一本無此章陰靈效祉軒曜降精祥符淑氣慶集柔明瑤俎既列雕桐發聲徽猷永遠比德皇英皇帝行用太和黃鐘宮左諭德昭文館學士邱說撰孝哉我后沖乎迺聖道映重華德輝文命慕深視篋情殷撫鏡萬國移風兆人承慶酌獻登歌用肅和中呂均之太簇羽一云蕤賓均之夾鐘羽太子洗馬昭文館學士張齊賢撰祼圭既濯鬱鬯既陳畫雲舉黃流玉醇儀充獻酌禮盛衆禋地察惟孝愉焉饗親迎俎用雍和姑洗羽太中大夫昭文館學士鄭善玉作酌鬱既灌取蕭方爇籩豆靜嘉簠簋芬飶魚腊薦美牲牷表潔是戢是將載迎載列肅明皇后室酌獻用昭升林鐘宮禮部尚書昭文館學士薛稷作陽靈配德陰魄昭升堯壇鳳下漢室龍興俔天作對前旒是凝化行南國道盛西陵造舟集灌無德而稱我粢既潔我醴既澄陰陰靈廟光靈若憑德馨惟饗孝思蒸蒸昭成皇后室酌獻用坤貞不詳作者乾道既亨坤元以貞肅雍攸在輔佐斯成外睦九族內光一庭克生叡哲祚我休明欽若徽範悠哉淑靈建茲清宮于彼上京縮茅以獻潔秬惟馨實受其福期乎億齡飲福用壽和黃鐘宮太子詹事崇文館學士徐堅作於穆清廟肅雍嚴祀合福受釐介以繁祉送文舞出迎武舞入用舒和南呂商銀青光祿大夫崇文館學士胡雄作送文迎武遞參差一始一終光聖儀四海生人歌有慶千齡孝享肅無虧武舞用安和太簇徵祕書少監崇文館學士劉子玄作妙算申帷幄神謀出廟庭兩階文物備七德武功成校獵長楊苑屯軍細柳營將軍獻凱入歌舞溢重城徹俎用雍和蕤賓均之夾鐘羽銀青光祿大夫崇文館學士員半千作孝享云畢維徹有章雲感玄羽風悽素商瞻望神座祗戀匪遑禮終樂闋肅雍鏘鏘送神用永和林鐘宮金紫光祿大夫崇文館學士祝欽明作閟宮實實清廟微微降格無象馨香有依式昭纂慶方融嗣徽明禋是享神保聿歸又儀坤廟樂章二首太樂又有一本與前本略同二章不同如左不詳撰者迎神一本有此章而無徐彥伯之詞月靈降德坤元授光娥英比秀任姒均芳瑤臺薦祉金屋延祥迎神有樂歆此嘉薌送神一本有此章而無祝欽明之詞玉帛儀大金絲奏廣靈應有孚冥徵不爽降彼休福歆茲禋享送樂有章神麾其上昭德皇后室酌獻用坤元樂章九首內出迎神用永和穆清廟薦嚴禋昭禮備和樂新望靈光集元辰祚無極享萬春登歌酌鬯用肅和誠心達娛樂分升蕭膋鬱氛氳茅既縮鬯既薰后來思福如雲迎俎用雍和我將我享盡明而誠載芬黍稷載滌犧牲懿矣元良萬邦以貞心乎愛敬若覩容聲酌獻用坤元於穆先后儷聖稱崇母臨萬宇道被六宮昌時協慶理內成功殷薦明德傳芳國風送文舞出迎武舞入用舒和金枝羽部輟清歌瑤堂肅穆笙磬羅諧音遍響合明意萬類昭融靈應多武舞用凱安辰位列四星帝功參十亂進賢勤內輔扈蹕清多難承天厚載均並曜宵光燦留徽藹前躅萬古披圖煥徹俎用雍和公尸既起享禮載終稱歌進徹盡敬由衷澤流惠下大小咸同送神用永和昭事終幽享餘移月御返仙居璇庭寂靈幄虛顧徘徊感皇儲孝敬皇帝廟樂章九首迎神用永和詞同貞觀太廟永和皇帝行用太和詞同貞觀太廟太和登歌酌鬯用肅和詞同貞觀太廟肅和迎俎用雍和詞同貞觀太廟雍和酌獻用承光詞同中宗享孝敬承光送文舞出迎武舞入用舒和詞同太廟武舞用凱安詞同太廟徹俎用雍和詞同迎俎送神用永和詞同太廟享隱太子廟樂章六首貞觀中撰迎神用誠和道閟鶴關運纏鳩里門集大命俾歆嘉祀禮亞六瑚誠殫二簋有誠顒若神斯戾止登歌奠玉帛用肅和歲肇春宗乾開震長瑤山既寂戾園斯享玉肅其事物昭其象絃誦成風笙歌合響迎俎用雍和明典肅陳神居邃啟春伯聯事秋官相禮有來雍雍登歌濟濟緬惟主鬯庶歆芳醴送文舞出迎武舞入用舒和三縣已判歌鐘列六佾將開羽鏚分尚想燕飛來蔽日終疑鶴影降凌雲武舞用凱安天步昔將開商郊初欲踐撫戎金陣廓貳極瑤圖闡鷄戟遂崇儀龍樓期好善弄兵隳震業啟聖隆祠典送神用誠和詞同迎神又隱太子廟樂章二首太樂舊有此詞不詳所出迎神蒼震有位黃離蔽明江充禍結戾據災成銜冤昔痛贈典今榮享靈有秩奉樂以迎送神皇情悼往祀儀增設鐘鼓鏗鍠羽旄昭晣掌禮云備司筵告徹樂以送神靈其鑒闋章懷太子廟樂章六首神龍初作迎神第一姑洗宮副君昭象道應黃離銅樓備德玉裕成規仙氣靄靄靈從師師前驅戾止控鶴來儀登歌酌鬯第二南呂均之蕤賓羽忠孝本著羽翼先成寢門昭德馳道為程幣帛有典容衞無聲司存既肅廟享惟清迎俎及酌獻第三大呂羽通三錫胤明兩承英太山比赫伊水聞笙宗祧是寄禮樂其亨嘉辰薦俎以發聲明送文舞出迎武舞入第四蕤賓商羽籥崇文禮以畢干鏚奮武事將行用捨由來其有致壯志宣威樂太平武舞作第五夷則角綠林熾炎曆黃虞格有苗沙塵驚塞外帷幄命嫖姚七德干戈止三邊雲霧消寶祚長無極歌舞盛今朝送神第六詞同隱廟懿德太子廟樂章六首神龍初作迎神第一姑洗宮甲觀昭祥畫堂昇位禮絕羣后望尊儲貳啟誦慙德莊丕掩粹伊浦鳳翔緱峯鶴至登歌酌鬯第二南呂均之蕤賓羽譽闡元儲寄崇明兩玉裕雖晦銅樓可想絃誦輟音笙歌罷響幣帛言設禮容無爽迎俎酌獻第三大呂羽雍雍盛典肅肅靈祠賓天有聖對日無期飄颻羽服掣曳雲旗眷言主鬯心乎愴茲送文舞出迎武舞入第四蕤賓商八音協奏陳金石六佾分行整禮容滄溟赴海還稱少素月開輪即是重武舞作第五夷則角隋季昔云終唐年初啟聖纂戎將禁暴崇儒更敷政威略靜三邊仁恩覃萬姓送神第六詞同隱廟節愍太子廟樂章六首景雲中作迎神第一姑洗宮儲后望崇元良寄切寢門是仰馳道不絕仙袂雲會靈旗電晣煌煌而來禮物攸設登歌酌鬯第二南呂均之蕤賓羽灼灼重明仰承元首既賢且哲惟孝與友惟孝雖遙靈規不朽祀因誠致備潔玄酒迎俎及酌獻第三大呂羽嘉薦有典至誠莫愆畫梁雲亙雕俎星聯樂器周列禮容備宣依俙如在若未賓天送文舞出迎武舞入第四蕤賓商邕邕闡化憑文德赫赫宣威藉武功既執羽旄先拂吹還持玉鏚更揮空武舞作第五夷則角武德諒雄雄由來掃寇戎劍光揮作電旗影列成虹霧廓三邊靜波澄四海同睿圖今已盛相共舞皇風送神第六詞同隱太子廟則天大聖皇后崇先廟樂章一首御撰先德謙撝冠昔嚴規節素超今奉國忠誠每竭承家至孝純深追崇懼乖尊意顯號恐玷徽音既迫王公屢請方乃俯遂羣心有限無由展敬奠醑每闕親斟大禮虔申典冊蘋藻敬薦翹襟褒德廟樂章五首神龍中為皇后韋氏祖考所立詞並內出迎神用昭德姑洗宮二成道赫梧宮悲盈蒿里爰暢徽烈載敷嘉祀享洽四時規陳二簋靈應昭格神其戾止登歌用進德南呂均之蕤賓羽塗山懿戚媯汭崇姻祠筵肇啟祭典方申禮以備物樂以感神用隆敦載穆彝倫俎入初獻用褒德大呂角家著累仁門昭積善瑤篚既列金縣式展武舞作昭昭竹殿開奕奕蘭宮啟懿範隆丹掖殊榮闢朱邸六佾薦徽容三簋陳芳醴萬古覃貽厥分珪崇祖禰亞獻及送神用彰德名隆五岳秩映三台嚴祠已備睟影方迴
