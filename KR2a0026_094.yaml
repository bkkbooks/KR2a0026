body:
  text: 舊唐書卷九十列傳第四十王及善杜景儉朱敬則楊再思李懷遠子景伯景伯子彭年附豆盧欽望張光輔史務滋崔元綜周允元附王及善洺州邯鄲人也父君愕隋大業末並州人王君廓掠邯鄲君愕往說君廓曰方今萬乘失御英雄競起誠宜撫納遺氓保全形勝按甲以觀時變擁衆而歸真主此富貴可圖也今足下居無尺土之地守無兼旬之糧恣行殘忍所過攘奪竊為足下寒心矣君廓曰計將安出君愕為陳井陘之險可先往據之君廓從其言乃屯井陘山歲餘會義師入定關中乃與君廓率所部萬餘人來降拜大將軍頻以戰功封新興縣公纍遷左武衛將軍從太宗征遼東兼領左屯營兵馬與高麗戰於駐蹕山君愕先鋒陷陳力戰而死太宗深痛悼之贈左衛大將軍幽州都督邢國公賜東園祕器陪葬昭陵及善年十四以父死王事授朝散大夫襲爵邢國公高宗時纍遷左奉裕率孝敬之居春宮因宴集命宮官擲倒次至及善辭曰殿下自有樂官臣止當守職此非臣任也臣將奉令恐非殿下羽翼之備太子謝而遣之高宗聞而特加賞慰賜絹百匹尋除右千牛衛將軍高宗謂曰朕以卿忠謹故與卿三品要職他人非搜辟不得至朕所卿佩大橫刀在朕側知此官貴否俄以病免尋起為衛尉卿垂拱中歷司屬卿時山東饑及善為巡撫賑給使尋拜春官尚書秦州都督轉益州大都督府長史以老病請乞致仕加授光祿大夫後契丹作亂山東不安起授滑州刺史則天謂曰邊賊反叛卿雖疾病可將妻子日行三十里緩步至彼與朕臥理此州以斷河路也因問朝廷得失及善備陳理亂之宜十餘道則天曰彼末事也此為本也卿不可行乃留拜內史時御史中丞來俊臣常以飛禍陷良善自侯王將相被其羅織受戮者不可勝計後俊臣坐事繫獄有司斷以極刑則天欲赦之及善執奏曰俊臣凶狡不軌所信任者皆屠販小人所誅戮者多名德君子臣愚以為若不剿絶元惡恐搖動朝廷禍從此始則天納之俄而則天將追廬陵王立為太子及善贊成其計及太子立又請太子外朝以慰人心則天從之及善雖無學術在官每以清正見知臨事難奪有大臣之節時張易之兄弟恃寵每內宴皆無人臣之禮及善數奏抑之則天不悅謂及善曰卿既高年不宜更侍遊宴但檢校閣中可也及善因病請假月餘則天都不問之及善歎曰豈有中書令而天子得一日不見乎事可知矣乃上疏乞骸骨三上不許聖曆二年拜文昌左相旬日而薨年八十二廢朝三日贈益州大都督諡曰貞陪葬乾陵杜景儉冀州武邑人也少舉明經纍除殿中侍御史出為益州録事參軍時隆州司馬房嗣業除益州司馬除書未到即欲視事又鞭笞僚吏將以示威景儉謂曰公雖受命為此州司馬而州司未受命也何藉數日之祿而不待九重之旨即欲視事不亦急耶嗣業益怒景儉又曰公今持咫尺之制真僞未知即欲攬一州之權誰敢相保揚州之禍非此類耶乃叱左右各令罷散嗣業慙赧而止俄有制除嗣業荊州司馬竟不如志人吏為之語曰録事意與天通益州司馬折威風景儉由是稍知名入為司賓主簿轉司刑丞天授中與徐有功來俊臣侯思止專理制獄時人稱云遇徐杜者必生遇來侯者必死纍遷洛州司馬尋轉鳳閣侍郎同鳳閣鸞臺平章事則天嘗以季秋內出梨花一枝示宰臣曰是何祥也諸宰臣曰陛下德及草木故能秋木再花雖周文德及行葦無以過也景儉獨曰謹按洪範五行傳陰陽不相奪倫瀆之即為災又春秋云冬無愆陽夏無伏陰春無淒風秋無苦雨今已秋矣草木黃落而忽生此花瀆陰陽也臣慮陛下布教施令有虧禮典又臣等忝為宰臣助天理物理而不和臣之罪也於是再拜謝罪則天曰卿真宰相也延載初為鳳閣侍郎周允元奏景儉黨於李昭德左遷秦州刺史後纍除司刑卿聖曆二年復拜鳳閣侍郎同鳳閣鸞臺平章事時契丹入寇河北諸州多陷賊中及事定河內王武懿宗將盡論其罪景儉以為皆是驅逼非其本心請悉原之則天竟從景儉議歲餘轉秋官尚書坐漏泄禁中語左授司刑少卿出為並州長史道病卒贈相州刺史子澄頗以文藻著名官至鞏縣尉朱敬則字少連亳州永城人也代以孝義稱自周至唐三代旌表門標六闕州黨美之敬則倜儻重節義早以辭學知名與三從兄同居財産無異又與左史江融左僕射魏元忠特相友善咸亨中高宗聞而召見與語甚奇之將加擢用為中書舍人李敬玄所毀乃授洹水尉長壽中纍除右補闕敬則以則天初臨朝稱制天下頗多流言異議至是既漸寧晏宜絶告密羅織之徒上疏曰臣聞李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費損不急之官惜日愛功疾耕急戰人繁國富乃屠諸侯此救弊之術也故曰刻薄可施於進趨變詐可陳於攻戰兵猶火也不戢將自焚況鋒鏑已銷石城又毀諒可易之以寬泰潤之以淳和八風之樂以柔之三代之禮以導之秦既不然淫虐滋甚往而不返卒至土崩此不知變之禍也陸賈叔孫通之事漢王也當滎陽成臯之間糧饋已窮智勇俱困不敢開一說效一奇唯進豪猾之材薦貪暴之客及區宇適平干戈向戢金鼓之聲未歇傷痍之痛尚聞二子顧眄綽有餘態乃陳詩書說禮樂開王道謀帝圖高皇帝忿然曰吾以馬上得之安事詩書乎對曰馬上得之可馬上理之乎高皇默然於是陸賈著新語叔孫通定禮儀始知天子之尊此知變之善也向使高皇排二子而不用置詩書而不顧重攻戰之吏尊首級之材復道爭功張良已知其變拔劍擊柱吾屬不得無謀即晷漏難逾何十二帝乎亡秦之續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然則祝祠向畢芻狗須投淳精已流糟粕可棄仁義尚捨況輕此者乎自文明草昧天地屯蒙二叔流言四凶構難不設鉤距無以應天順人不切刑名不可摧姦息暴故置神器開告端曲直之影必呈包藏之心盡露神道助直無罪不除人心保能無妖不戮以茲妙算窮造化之幽深用此神謀入天人之祕術故能計不下席聽不出闈蒼生晏然紫宸易主大哉偉哉無得而稱也豈比造攻鳴條大戰牧野血變草木頭折不周可同年而語乎然而急趨無善迹促柱少和聲拯溺不規行療飢非鼎食即向時之妙策乃當今之芻狗也伏願覽秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毀見機而作豈勞終日乎陛下必不可偃蹇太平徘徊中路伏願改法制立章程下恬愈之辭流曠蕩之澤去萋菲之牙角頓姦險之鋒芒窒羅織之源掃朋黨之迹使天下蒼生坦然大悅豈不樂哉則天甚善之長安三年纍遷正諫大夫尋同鳳閣鸞臺平章事時御史大夫魏元忠鳳閣舍人張說為張易之兄弟所誣構將陷重辟諸宰相無敢言者敬則獨抗疏申理曰元忠張說素稱忠正而所坐無名若令得罪豈不失天下之望也乃得減死四年以老疾請罷知政事許之纍轉冬官侍郎仍依舊兼修國史張易之昌宗嘗命畫工圖寫武三思及納言李嶠鳳閣侍郎蘇味道夏官侍郎李迥秀麟臺少監王紹宗等十八人形像號為高士圖每引敬則預其事固辭不就其高潔守正如此神龍元年出為鄭州刺史尋以老致仕二年侍御史冉祖雍素與敬則不協乃誣奏云與王同皎親善貶授廬州刺史經數月洎代到還鄉里無淮南一物唯有所乘馬一匹諸子姪步從而歸敬則重然諾善與人交每拯人急難不求其報又嘗與三從兄同居四十餘年財産無異雅有知人之鑒凡在品論者後皆如其言景龍三年五月卒于家年七十五敬則嘗採魏晉已來君臣成敗之事著十代興亡論又以前代文士論廢五等者以秦為失事未折衷乃著五等論曰昔秦廢五等崔實仲長統王朗曹冏等皆以為秦之失豫竊異之試通其志云蓋明王之理天下也先之以博愛本之以仁義張四維尊五美懸禮樂於庭宇置軌範於中衢然後決玄波使橫流揚薰風以高扇流愷悌之甘澤浸曠蕩之膏腴正理革其淫邪淳風柔其骨髓使天下之人心醉而神足其於忠義也立則見其參於前其於進趨也若章程之在目禮經所及等日月之難踰聲教所行雖風雨之不輟聖人知俗之漸化也王道之已行也於是體國經野庸功勳親分山裂河設磐石之固內守外禦有維城之基連絡遍於域中膠葛盡於封內雖道昏時喪澤竭政塞鄭伯逐王申侯弒主魯不供物宋不城周吳徵百牢楚問九鼎小白之一匡天下重耳之一戰諸侯無君之迹顯然篡奪之謀中寢者直以周禮尚存簡書不隕故曰不敢失墜天威在顏自春秋之後禮義漸頽風俗塵昏愧恥心盡疾走先得者為上奪攘投會者為能加以八世專齊三家分晉子貢之亂五國蘇秦之鬬七雄苛刻繁興經籍道息莫不長詐術貴攻戰萬姓皆戴爪牙無人不屬觜距所以商鞅欺故友李斯囚舊交孫臏喪足於龐涓張儀得志于陳軫一旅之衆便欲稱王再戰之雄爭來奉帝先王會盟之禮昔時樽俎之容三代玄風掃地至盡況始皇削平區宇殊非至公李斯之作股肱罕循大道人無見德唯虐是聞當此時也主猜於上人駭於下父不能保之於子君不能得之於臣欲使始皇分土姦雄建侯薄俗若喻晉鄭之可依便借賊兵而資盜糧寄龍魚而助風雨不可行也是以秦鑒周德之綿深懼己圖之不遠罷侯置守高下在心天下制在一人百姓不聞二主直是不得行其世封非薄功臣而賤骨肉也高皇帝揭日月之明懷天地之量算財不足以分賞論地不足以受封邑皆百城土有千里人殷國富地廣兵強五十年間七國同反賈誼憂失其國鼂錯請削其地若言由大而反也不若召陵之師踐土之衆也若言有材而起也劉濞非王霸之材田祿無先管之略也直是齊晉以逆禮為慙吳楚以犯上非愧釁由教起其所由來遠矣自此之後雜霸又衰中興不能改物創圖黃初不能深謀遠慮緬觀漢魏之際尋其經緯之初未有積德重光澤及萬物觀其教偷薄於秦風察其人豺狼於漢日故魏太祖曰若使無孤天下幾人稱帝幾人稱王明竊號議者觸目皆是欲以此時開四履之祚垂萬代之封必有通車三川以窺周室介馬汾隰而逐翼侯而王司徒屢請於當時曹元首又勤於宗室皆不知時也當時賢者是之敬則知政事時每以用人為先桂州蠻叛薦裴懷古鳳閣舍人缺薦魏知古右史缺薦張思敬則天以為知人睿宗即位嘗謂侍臣曰神龍已來李多祚王同皎並復舊官韋月將燕欽融咸有褒贈不知更有何人尚抱冤抑吏部尚書劉幽求對曰故鄭州刺史朱敬則往在則天朝任正諫大夫知政事忠貞義烈為天下所推神龍時被宗楚客冉祖雍等誣構左授廬州刺史長安年中嘗謂臣云相王必膺期受命當須盡節事之及韋氏篡逆干紀臣遂見危赴難翼戴興曆雖則天誘其事亦是敬則先啓之心今陛下龍興寶位凶黨就戮敬則尚銜冤泉壤未蒙昭雪況復事符先覺誠即可嘉睿宗然之贈敬則祕書監諡曰元楊再思鄭州原武人也少舉明經授玄武尉充使詣京師止於客舍會盜竊其囊裝再思邂逅遇之盜者伏罪再思謂曰足下當苦貧匱至此無行速去勿作聲恐為他人所擒幸留公文餘財盡以相遺盜者齎去再思初不言其事假貸以歸纍遷天官員外郎歷左右肅政臺御史大夫延載初守鸞臺侍郎同鳳閣鸞臺平章事證聖初轉鳳閣侍郎依前同平章事兼太子右庶子尋遷內史自弘農縣男纍封至鄭國公再思自歷事三主知政十餘年未嘗有所薦達為人巧佞邪媚能得人主微旨主意所不欲必因而毀之主意所欲必因而譽之然恭慎畏忌未嘗忤物或謂再思曰公名高位重何為屈折如此再思曰世路艱難直者受禍苟不如此何以全其身哉長安末昌宗既為法司所鞫司刑少卿桓彥範斷解其職昌宗俄又抗表稱冤則天意將申理昌宗廷問宰臣曰昌宗於國有功否再思對曰昌宗往因合鍊神丹聖躬服之有效此實莫大之功則天甚悅昌宗竟以復職時人貴彥範而賤再思也時左補闕戴令言作兩腳野狐賦以譏刺之再思聞之甚怒出令言為長社令朝士尤加嗤笑再思為御史大夫時張易之兄司禮少卿同休嘗奏請公卿大臣宴于司禮寺預其會者皆盡醉極歡同休戲曰楊內史面似高麗再思欣然請剪紙自帖於巾卻披紫袍為高麗舞縈頭舒手舉動合節滿座嗤笑又易之弟昌宗以姿貌見寵幸再思又諛之曰人言六郎面似蓮花再思以為蓮花似六郎非六郎似蓮花也其傾巧取媚也如此長安四年以本官檢校京兆府長史又遷檢校揚州大都督府長史中宗即位拜戶部尚書兼中書令轉侍中以宮僚封鄭國公賜實封三百戶又為冊順天皇后使賜物五百段鞍馬稱是時武三思將誣殺王同皎再思與吏部尚書李嶠刑部尚書韋巨源並受制考按其獄竟不能發明其枉致同皎至死衆冤之再思俄復為中書令吏部尚書景龍三年遷尚書右僕射加光祿大夫其年薨贈特進並州大都督陪葬乾陵諡曰恭子植植子獻並為司勳員外郎再思弟季昭為考功郎中溫玉為戶部侍郎李懷遠邢州柏仁人也早孤貧好學善屬文有宗人欲以高蔭相假者懷遠竟拒之退而歎曰因人之勢高士不為假蔭求官豈吾本志未幾應四科舉擢第纍除司禮少卿出為邢州刺史以其本鄉固辭不就改授冀州刺史俄歷揚益等州大都督府長史未行又授同州刺史在職以清簡稱入為太子左庶子兼太子賓客歷遷右散騎常侍春官侍郎大足年遷鸞臺侍郎尋同鳳閣鸞臺平章事歲餘加銀青光祿大夫拜秋官尚書兼檢校太子左庶子賜爵平鄉縣男長安四年以老辭職聽解秋官尚書正除太子左庶子尋授太子賓客神龍初除左散騎常侍兵部尚書同中書門下三品加金紫光祿大夫進封趙郡公特賜實封三百戶俄以疾請致仕許之中宗將幸京師又令以本官知東都留守懷遠雖久居榮位而彌尚簡率園林宅室無所改作常乘款段馬左僕射豆盧欽望謂曰公榮貴如此何不買駿馬乘之答曰此馬幸免驚蹶無假別求聞者莫不歎美神龍二年八月卒中宗特賜錦被以充斂輟朝一日親為文以祭之贈侍中諡曰成子景伯景伯景龍中為給事中又遷諫議大夫中宗嘗宴侍臣及朝集使酒酣令各為回波辭衆皆為諂佞之辭及自要榮位次至景伯曰回波爾時酒巵微臣職在針規侍宴既過三爵喧譁竊恐非儀中宗不悅中書令蕭至忠稱之曰此真諫官也景雲中纍遷右散騎常侍尋以老疾致仕開元中卒子彭年彭年有吏才工於剖析當時稱之開元中歷考功員外郎知舉又遷中書舍人給事中兵部侍郎天寶初又為吏部侍郎與右相李林甫善慕山東著姓為婚姻引就清列以大其門典銓管七年後以贓污為御史中丞宋渾所劾長流嶺南臨賀郡纍月渾及弟恕又以贓下獄詔渾流嶺南高要郡恕流南康郡天寶十二載起彭年為濟陰太守又遷馮翊太守入為中書舍人給事中吏部侍郎十五載玄宗幸蜀賊陷西京彭年沒於賊脅授僞官憂憤忽忽不得志與韋斌相次而卒及克復兩京優制贈彭年為禮部尚書豆盧欽望京兆萬年人也曾祖通隋相州刺史南陳郡公祖寬即隋文帝之甥也大業末為梁泉令及高祖定關中寬與郡守蕭瑀率豪右赴京師由是纍授殿中監仍詔其子懷讓尚萬春公主高祖以寬曾祖萇魏太和中例稱單姓至是改寬為盧氏貞觀中歷遷禮部尚書左衛大將軍封芮國公永徽元年卒贈特進並州都督陪葬昭陵諡曰定又復其姓為豆盧氏父仁業高宗時為左衛將軍欽望則天時纍遷司賓卿長壽二年代宗秦客為內史時李昭德亦為內史執權用事欽望與同時宰相韋巨源陸元方蘇味道杜景儉等並委曲從之證聖元年昭德坐事左遷涪陵尉則天以欽望等不能執正又為司刑少卿皇甫文備奏欽望附會昭德罔上附下乃左遷欽望為趙州刺史韋巨源自右丞為鄜州刺史陸元方自秋官侍郎為綏州刺史蘇味道自鳳閣侍郎為集州刺史其年欽望入為司禮卿遷秋官尚書封芮國公出為河北道宣勞使俄而廬陵王復為皇太子以欽望為皇太子宮尹聖曆二年拜文昌右相同鳳閣鸞臺三品尋授太子賓客停知政事中宗即位以欽望宮僚舊臣拜尚書左僕射知軍國重事兼檢校安國相王府長史兼中書令知兵部事監修國史欽望作相兩朝前後十餘年張易之兄弟及武三思父子皆專權驕縱圖為逆亂欽望獨謹其身不能有所匡正以此獲譏於代神龍二年拜開府儀同三司景龍三年五月表請乞骸不許十一月卒年八十餘贈司空並州大都督諡曰元賜東園祕器陪葬乾陵則天時宰相又有張光輔史務滋崔元綜周允元等並有名績張光輔者京兆人也少明辨有吏幹纍遷司農少卿文昌右丞以討平越王貞之功拜鳳閣侍郎知政事永昌元年遷納言旬日又拜內史皆有能名其年洛州司馬房嗣業洛陽令張嗣明坐與徐敬業弟敬真陰相交結敬真自流所繡州逃歸將北投突厥引虜入寇途經洛下嗣業嗣明二人給其衣糧而遣之行至定州為人所覺嗣業於獄中自縊死嗣明與敬真多引海內相識冀緩其死嗣明稱光輔征豫州日私說圖讖天文陰懷兩端顧望以觀成敗光輔由是被誅家口籍沒史務滋者宣州溧陽人纍至內史天授中雅州刺史劉行實及弟渠州刺史行瑜尚衣奉御行感並兄子左鷹揚將軍虔通並為侍御史來子珣誣以謀反誅又於盱眙毀其父左監門大將軍伯英棺柩初務滋素與行感周密意欲寢其反狀則天怒令俊臣鞫之務滋恐被陷刑乃自殺崔元綜者鄭州新鄭人也祖君肅武德中黃門侍郎鴻臚卿元綜天授中纍轉秋官侍郎長壽元年遷鸞臺侍郎同鳳閣鸞臺平章事元綜勤於政事每在中書必束帶至晚未嘗休偃好潔細行薰辛不歷口者二十餘年雖外示謹厚而情深刻薄每受制鞫獄必披毛求疵陷於重辟以此故人多畏而鄙之明年犯罪配流振州朝野莫不稱慶尋赦還復拜監察御史中宗時纍遷尚書左丞蒲州刺史以老疾致仕晚年好攝養導引之術年九十餘卒周允元者豫州人也弱冠舉進士延載初纍轉左肅政御史中丞俄除鳳閣鸞臺平章事嘗與諸宰臣侍宴則天令各述書傳中善言允元曰恥其君不如堯舜武三思以為語有指斥糾而駁之則天曰聞此言足以為誡豈特將為過耶證聖元年卒贈貝州刺史則天為七言詩以傷之又自繕寫時以為榮史官曰王及善在孝敬東宮誠能奉職當俊臣下獄力諫除凶是憂濫及賢良而欲明彰羽翼興復之志不謂無心杜景儉五刑有濫濟活為心四氣不和歸罪在己則天謂曰真宰相然奈柔順李昭德不無吐剛之過也朱敬則文學有稱節行無愧諫諍果決推擇精真苟非洞鑒古今深識王霸何由立其高論哉惜乎相不得時矣楊再思佞而取貴苟以全身掩不善而自欺謂無十目十手也李懷遠名不苟於假蔭貴不衒於故鄉無改陋居常乘劣駟亦一時之善矣然匪躬之道未之聞也豆盧欽望張光輔史務滋崔元綜周允元等或有片言非無小善登于大用可謂具臣贊曰及善奉職非無智力景儉當權不謂不賢雄文高節少連為絶守道安貧懷遠當仁欽望之屬片善何足諂媚再思祇宜遄速
