body:
  text: 舊唐書卷一百六十列傳卷第一百一十韓愈張籍孟郊唐衢李翺宇文籍劉禹錫柳宗元韋辭韓愈字退之昌黎人父仲卿無名位愈生三歲而孤養於從父兄愈自以孤子幼刻苦學儒不俟奬勵大曆貞元之間文字多尚古學效楊雄董仲舒之述作而獨孤及梁肅最稱淵奧儒林推重愈從其徒遊鋭意鑽仰欲自振於一代洎舉進士投文於公卿間故相鄭餘慶頗為之延譽由是知名於時尋登進士第宰相董晉出鎮大梁辟為巡官府除徐州張建封又請為其賓佐愈發言真率無所畏避操行堅正拙於世務調授四門博士轉監察御史德宗晚年政出多門宰相不專機務宮市之弊諫官論之不聽愈嘗上章數千言極論之不聽怒貶為連州陽山令量移江陵府掾曹元和初召為國子博士遷都官員外郎時華州刺史閻濟美以公事停華陰令柳澗縣務俾攝掾曹居數月濟美罷郡出居公館澗遂諷百姓遮道索前年軍頓役直後刺史趙昌按得澗罪以聞貶房州司馬愈因使過華知其事以為刺史相黨上疏理澗留中不下詔監察御史李宗奭按驗得澗贓狀再貶澗封溪尉以愈妄論復為國子博士愈自以才高纍被擯黜作進學解以自喻曰國子先生晨入太學召諸生立館下誨之曰業精于勤荒于嬉行成于思毀于隨方今聖賢相逢治具畢張拔去凶邪登崇俊良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光蓋有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑于列者曰先生欺豫哉弟子事先生于茲有年矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鈎其玄貪多務得細大不捐燒膏油以繼晷常矻矻以窮年先生之業可謂勤矣抵排異端攘斥佛老補苴罅漏張皇幽眇尋墜緒之茫茫獨旁搜而遠紹障百川而東之回狂瀾於既倒先生之於儒可謂有勞矣沉浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣然而公不見信於人私不見助於友跋前躓後動輒得咎暫為御史遂竄南夷三為博士冗不見治命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢頭童齒豁竟死何裨不知慮此而反教人為先生曰吁子來前夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收并蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長唯器是適者宰相之方也昔者孟軻好辨孔道以明轍環天下卒老于行荀卿守正大論是弘逃讒于楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇于世何如也今先生學雖勤不由其統言雖多不要其中文雖奇不濟於用行雖修不顯於衆猶且月費俸錢歲靡廩粟子不知耕婦不知織乘馬從徒安坐而食踵常塗之促促窺陳編以盜竊然而聖主不加誅宰臣不見斥此非其幸哉動而得謗名亦隨之投間置散乃分之宜若夫商財賄之有無計班資之崇庳忘己量之所稱指前人之瑕疵是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也執政覽其文而憐之以其有史才改比部郎中史館修撰踰歲轉考功郎中知制誥拜中書舍人俄有不悅愈者托其舊事言愈前左降為江陵掾曹荊南節度使裴均館之頗厚均子鍔凡鄙近者鍔還省父愈為序餞鍔仍呼其字此論喧於朝列坐是改太子右庶子元和十二年八月宰臣裴度為淮西宣慰處置使兼彰義軍節度使請愈為行軍司馬仍賜金紫淮蔡平十二月隨度還朝以功授刑部侍郎仍詔愈撰平淮西碑其辭多裴度事時先入蔡州擒吳元濟李訴功第一訴不平之訴妻出入禁中因訴碑辭不實詔令磨愈文憲宗命翰林學士段文昌重撰文勒石鳳翔法門寺有護國真身塔塔內有釋迦文佛指骨一節其書本傳法三十年一開開則歲豐人泰十四年正月上令中使杜英奇押宮人三十人持香花赴臨臯驛迎佛骨自光順門入大內留禁中三日乃送諸寺王公士庶奔走捨施唯恐在後百姓有廢業破産燒頂灼臂而求供養者愈素不喜佛上疏諫曰伏以佛者夷狄之一法耳自後漢時始流入中國上古未嘗有也昔黃帝在位百年年百一十歲少昊在位八十年年百歲顓頊在位七十九年年九十八歲帝嚳在位七十年年百五歲帝堯在位九十八年年百一十八歲帝舜及禹年皆百歲此時天下太平百姓安樂壽考然而中國未有佛也其後殷湯亦年百歲湯孫太戊在位七十五年武丁在位五十年書史不言其壽推其年數蓋亦俱不減百歲周文王年九十七歲武王年九十三歲穆王在位百年此時佛法亦未至中國非因事佛而致此也漢明帝時始有佛法明帝在位才十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促唯梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止於菜果其後竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更得禍由此觀之佛不足信亦可知矣高祖始受隋禪則議除之當時羣臣識見不遠不能深究先王之道古今之宜推闡聖明以救斯弊其事遂止臣嘗恨焉伏惟皇帝陛下神聖英武數千百年以來未有倫比即位之初即不許度人為僧尼道士又不許別立寺觀臣當時以為高祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令羣僧迎佛骨於鳳翔御樓以觀舁入大內令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以年豐人樂徇人之心為京都士庶設詭異之觀戲玩之具耳安有聖明若此而肯信此等事哉然百姓愚冥易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓微賤於佛豈合惜身命所以灼頂燔指百十為羣解衣散錢自朝至暮轉相倣效唯恐後時老幼奔波棄其生業若不即加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也佛本夷狄之人與中國言語不通衣服殊製口不道先王之法言身不服先王之法服不知君臣之義父子之情假如其身尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出之於境不令惑於衆也況其身死已久枯朽之骨凶穢之餘豈宜以入宮禁孔子曰敬鬼神而遠之古之諸侯行弔於國尚令巫祝先以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付之水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍祟凡有殃咎宜加臣身上天鑒臨臣不怨悔疏奏憲宗怒甚間一日出疏以示宰臣將加極法裴度崔羣奏曰韓愈上忤尊聽誠宜得罪然而非內懷忠懇不避黜責豈能至此伏乞稍賜寬容以來諫者上曰愈言我奉佛太過我猶為容之至謂東漢奉佛之後帝王咸致夭促何言之乖剌也愈為人臣敢爾狂妄固不可赦于是人情驚惋乃至國戚諸貴亦以罪愈太重因事言之乃貶為潮州刺史愈至潮陽上表曰臣今年正月十四日蒙恩授潮州刺史即日馳驛就路經涉嶺海水陸萬里臣所領州在廣府極東去廣府雖云二千里然來往動皆踰月過海口下惡水濤瀧壯猛難計期程颶風鱷魚患禍不測州南近界漲海連天毒霧瘴氛日夕發作臣少多病年才五十髮白齒落理不久長加以罪犯至重所處又極遠惡憂惶慚悸死亡無日單立一身朝無親黨居蠻夷之地與魑魅同羣苟非陛下哀而念之誰肯為臣言者臣受性愚陋人事多所不通唯酷好學問文章未嘗一日暫廢實為時輩推許臣於當時之文亦未有過人者至於論述陛下功德與詩書相表𩹉作為歌詩薦之郊廟紀太山之封鏤白玉之牒鋪張對天之宏休揚厲無前之偉迹編於詩書之策而無愧措於天地之間而無虧雖使古人復生臣未肯多讓伏以大唐受命有天下四海之內莫不臣妾南北東西地各萬里自天寶之後政治少懈文致未優武克不綱孽臣姦隸外順內悖父死子代以祖以孫如古諸侯自擅其地不朝不貢六七十年四聖傳序以至陛下躬親聽斷干戈所麾無不從順宜定樂章以告神明東巡泰山奏功皇天使永永萬年服我成烈當此之際所謂千載一時不可逢之嘉會而臣負罪嬰釁自拘海島戚戚嗟嗟日與死迫曾不得奏薄伎於從官之內隸御之間窮思畢精以贖前過懷痛窮天死不閉目瞻望宸極魂神飛去伏惟陛下天地父母哀而憐之憲宗謂宰臣曰昨得韓愈到潮州表因思其所諫佛骨事大是愛我我豈不知然愈為人臣不當言人主事佛乃年促也我以是惡其容易上欲復用愈故先語及觀宰臣之奏對而皇甫鎛惡愈狷直恐其復用率先對曰愈終太狂疏且可量移一郡乃授袁州刺史初愈至潮陽既視事詢吏民疾苦皆曰郡西湫水有鱷魚卵而化長數丈食民畜産將盡以是民貧居數日愈往視之令判官秦濟炮一豚一羊投之湫水呪之曰前代德薄之君棄楚越之地則鱷魚涵泳於此可也今天子神聖四海之外撫而有之況揚州之境刺史縣令之所治出貢賦以共天地宗廟之祀鱷魚豈可與刺史雜處此土哉刺史受天子命令守此土而鱷魚睅然不安溪潭食民畜熊鹿麞豕以肥其身以繁其卵與刺史爭為長刺史雖駑弱安肯為鱷魚低首而下哉今潮州大海在其南鯨鵬之大蝦木義之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙須為物害則刺史選材伎壯夫操徑弓毒矢與鱷魚從事矣呪之夕有暴風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患袁州之俗男女隸於人者踰約則沒入出錢之家愈至設法贖其所沒男女歸其父母仍削其俗法不許隸人十五年徵為國子祭酒轉兵部侍郎會鎮州殺田弘正立王廷湊令愈往鎮州宣諭愈既至集軍民諭以逆順辭情切至廷湊畏重之改吏部侍郎轉京兆尹兼御史大夫以不臺參為御史中丞李紳所劾愈不伏言準敕仍不臺參紳愈性皆褊僻移刺往來紛然不止乃出紳為浙西觀察使愈亦罷尹為兵部侍郎及紳面辭赴鎮泣涕陳穆宗憐之乃追制以紳為兵部侍郎愈復為吏部侍郎長慶四年十二月卒時年五十七贈禮部尚書諡曰文愈性弘通與人交榮悴不易少時與洛陽人孟郊東郡人張籍友善二人名位未振愈不避寒暑稱薦於公卿間而籍終成科第榮於祿仕後雖通貴每退公之隙則相與談宴論文賦詩如平昔焉而觀諸權門豪士如僕隸焉瞪然不顧而頗能誘厲後進館之者十六七雖晨炊不給怡然不介意大抵以興起名教弘奬仁義為事凡嫁內外及友朋孤女僅十人常以為自魏晉已還為文者多拘偶對而經誥之指歸遷雄之氣格不復振起矣故愈所為文務反近體抒意立言自成一家新語後學之士取為師法當時作者甚衆無以過之故世稱韓文焉然時有恃才肆意亦有盩孔孟之旨若南人妄以柳宗元為羅池神而愈撰碑以實之李賀父名晉不應進士而愈為賀作諱辨令舉進士又為毛穎傳譏戲不近人情此文章之甚紕繆者時謂愈有史筆及撰順宗實録繁簡不當事拙於取捨頗為當代所非穆宗文宗嘗詔史臣添改時愈壻李漢蔣係在顯位諸公難之而韋處厚竟別撰順宗實録三卷有文集四十卷李漢為之序子昶亦登進士第張籍者貞元中登進士第性詭激能為古體詩有警策之句傳於時調補太常寺太祝轉國子助教祕書郎以詩名當代公卿裴度令狐楚才名如白居易元稹皆與之遊而韓愈尤重之纍授國子博士水部員外郎轉水部郎中卒世謂之張水部云孟郊者少隱於嵩山稱處士李翺分司洛中與之遊薦於留守鄭餘慶辟為賓佐性孤僻寡合韓愈一見以為忘形之契常稱其字曰東野與之唱和於文酒之間鄭餘慶鎮興元又奏為從事辟書下而卒餘慶給錢數萬葬送贍給其妻子者纍年唐衢者應進士久而不第能為歌詩意多感發見人文章有所傷歎者讀訖必哭涕泗不能已每與人言論既相別發聲一號音辭哀切聞之者莫不悽然泣下嘗客遊太原屬戎帥軍宴衢得預會酒酣言事抗音而哭一席不樂為之罷會故世稱唐衢善哭左拾遺白居易遺之詩曰賈誼哭時事阮籍哭路歧唐生今亦哭異代同其悲唐生者何人五十寒且飢不悲口無食不悲身無衣所悲忠與義悲甚則哭之太尉擊賊日尚書叱盜時大夫死凶寇諫議謫蠻夷每見如此事聲發涕輒隨我亦君之徒鬱鬱何所為不能發聲哭轉作樂府辭其為名流稱重若此竟不登一命而卒李翺字習之涼武昭王之後父楚金貝州司法參軍翺幼勤於儒學博雅好古為文尚氣質貞元十四年登進士第授校書郎三遷至京兆府司録參軍元和初轉國子博士史館修撰十四年太常丞王涇上疏請去太廟朔望上食詔百官議議者以開元禮太廟每歲礿祠蒸嘗臘凡五享天寶末玄宗令尚食每月朔望具常饌令宮闈令上食於太廟後遂為常由是朔望不視朝比之大祠翺奏議曰國語曰王者日祭禮記曰王立七廟皆月祭之周禮時祭禴祠蒸嘗漢氏皆雜而用之蓋遭秦火詩書禮經燼滅編殘簡缺漢乃求之先儒穿鑿各伸己見皆託古聖賢之名以信其語故所記各不同也古者廟有寢而不墓祭秦漢始建寢廟於園陵而上食焉國家因之而不改貞觀開元禮並無宗廟日祭月祭之禮蓋以日祭月祭既已行於陵寢矣故太廟之中每歲五饗六告而已不然者房玄齡魏徵輩皆一代名臣窮極經史豈不見國語禮記有日祭月祭之詞乎斯足以明矣伏以太廟之饗籩豆牲牢三代之通禮是貴誠之義也園陵之奠改用常饌秦漢之權制乃食味之道也今朔望上食於太廟豈非用常褻味而貴多品乎且非禮所謂至敬不饗味而貴氣臭之義也傳稱屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祭薦芰其子違命去芰而用羊饋籩豆脯醢君子是之言事祖考之義當以禮為重不以其生存所嗜為獻蓋明非食味也然則薦常饌於太廟無乃與芰為比乎且非三代聖王之所行也況祭器不陳俎豆祭官不命三公執事者唯宮闈令與宗正卿而已謂之上食也安得以為祭乎且時享于太廟有司攝事祝文曰孝曾孫皇帝臣某謹遣太尉臣名敢昭告于高祖神堯皇帝祖妣太穆皇后竇氏時惟孟春永懷罔極謹以一元大武柔毛剛鬣明粢薌萁嘉蔬嘉薦醴齊敬修時享以申追慕此祝辭也前享七日質明太尉誓百官於尚書省曰某月某日時享于太廟各揚其職不供其事國有常刑凡陪享之官散齋四日致齋三日然後可以為祭也宗廟之禮非敢擅議雖有知者其誰敢言故六十餘年行之不廢今聖朝以弓矢既櫜禮樂為大故下百僚可得詳議臣等以為貞觀開元禮并無太廟上食之文以禮斷情罷之可也至若陵寢上食採國語禮記日祭月祭之詞因秦漢之制修而存之以廣孝道可也如此則經義可據故事不遺大禮既明永息異論可以繼二帝三王而為萬代法與其瀆禮越古貴因循而憚改作猶天地之相遠也知禮者是之事竟不行翺性剛急論議無所避執政雖重其學而惡其激訐故久次不遷翺以史官記事不實奏狀曰臣謬得秉筆史館以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠賢事業載姦臣醜行以傳無窮者史官之任也凡人事迹非大善大惡則衆人無由得知舊例皆訪於人又取行狀諡議以為依據今之作行狀者多是其門生故吏莫不虛加仁義禮智妄言忠肅惠和此不唯其處心不實苟欲虛美於受恩之地耳蓋為文者又非遊夏遷雄之列務於華而忘其實溺於文而棄其理故為文則失六經之古風紀事則非史遷之實録臣今請作行狀者但指事實直載事功假如作魏徵傳但記其諫諍之辭足以為正直段秀實但記其倒用司農印以追逆兵以象笏擊朱泚足以為忠烈若考功視行狀不依此者不得受依此則考功下太常牒史館然後定諡伏乞以臣此奏下考功從之尋權知職方員外郎十五年六月授考功員外郎並兼史職翺與李景儉友善初景儉拜諫議大夫舉翺自代至是景儉貶黜七月出翺為朗州刺史俄而景儉復為諫議大夫翺亦入為禮部郎中翺自負辭藝以為合知制誥以久未如志鬱鬱不樂因入中書謁宰相面數李逢吉之過失逢吉不之校翺心不自安乃請告滿百日有司準例停官逢吉奏授廬州刺史大和初入朝為諫議大夫尋以本官知制誥三年二月拜中書舍人初諫議大夫柏耆將使滄州軍前宣諭翺嘗贊成此行柏耆尋以擅入滄州得罪翺坐謬舉左授少府少監俄出為鄭州刺史五年出為桂州刺史御史中丞充桂管都防禦使七年改授潭州刺史湖南觀察使八年徵為刑部侍郎九年轉戶部侍郎七月檢校戶部尚書襄州刺史充山南東道節度使會昌中卒於鎮諡曰文宇文籍字夏龜父滔官卑少好學尤通春秋竇羣自處士徵為右拾遺表籍自代由是知名登進士第宰相武元衡出鎮西蜀奏為從事以咸陽尉直史館與韓愈同修順宗實録遷監察御史王承宗叛詔捕其弟駙馬都尉承系其賓客中有為誤識者又蘇表以破淮西策干宰相武元衡元衡不用以籍舊從事令召表訊之籍因與表狎元衡怒坐貶江陵府戶曹參軍至任節度使孫簡知重之欲令兼幕府職事籍辭曰籍以君命譴黜亦當以君命升假榮偷奬非所願也後考滿連辟藩府入為侍御史轉著作郎遷駕部員外郎史館修撰與韋處厚韋表微路隨沈傳師同修憲宗實録俄以本官知制誥轉庫部郎中大和中遷諫議大夫專掌史筆罷知制誥籍性簡淡寡合耽玩經史精於著述而風望峻整為時輩推重大和二年正月卒時年五十九贈工部侍郎子臨大中初登進士第劉禹錫字夢得彭城人祖雲父漵仕歷州縣令佐世以儒學稱禹錫貞元九年擢進士第又登宏辭科禹錫精於古文善五言詩今體文章復多才麗從事淮南節度使杜佑幕典記室尤加禮異從佑入朝為監察御史與吏部郎中韋執誼相善貞元末王叔文於東宮用事後輩務進多附麗之禹錫尤為叔文知奬以宰相器待之順宗即位久疾不任政事禁中文誥皆出於叔文引禹錫及柳宗元入禁中與之圖議言無不從轉屯田員外郎判度支鹽鐵案兼崇陵使判官頗怙威權中傷端士宗元素不悅武元衡時武元衡為御史中丞乃左授右庶子侍御史竇羣奏禹錫挾邪亂政不宜在朝羣即日罷官韓臯憑藉貴門不附叔文黨出為湖南觀察使既任喜怒凌人京師人士不敢指名道路以目時號二王劉柳叔文敗坐貶連州刺史在道貶朗州司馬地居西南夷土風僻陋舉目殊俗無可與言者禹錫在朗州十年唯以文章吟詠陶冶情性蠻俗好巫每淫祠鼓舞必歌俚辭禹錫或從事於其間乃依騷人之作為新辭以教巫祝故武陵溪洞間夷歌率多禹錫之辭也初禹錫宗元等八人犯衆怒憲宗亦怒故再貶制有逢恩不原之令然執政惜其才欲洗滌痕纍漸序用之會程虉復掌轉運有詔以韓臯及禹錫等為遠郡刺史屬武元衡在中書諫官十餘人論列言不可復用而止禹錫積歲在湘澧間鬱悒不怡因讀張九齡文集乃其意曰世稱曲江為相建言放臣不宜於善地多徙五溪不毛之鄉今讀其文章自內職牧始安有瘴癘之歎自退相守荊州有拘囚之思託諷禽鳥寄辭草樹鬱然與騷人同風嗟夫身出於遐陬一失意而不能堪矧華人士族而必致醜地然後快意哉議者以曲江為良臣識胡雛有反相羞與凡器同列密啓廷諍雖古哲人不及而燕翼無似終為餒魂豈忮心失恕陰謫最大雖二美莫贖耶不然何袁公一言明楚獄而鍾祉四葉以是相較神可誣乎元和十年自武陵召還宰相復欲置之郎署時禹錫作遊玄都觀詠看花君子詩語涉譏刺執政不悅復出為播州刺史詔下御史中丞裴度奏曰劉禹錫有母年八十餘今播州西南極遠猿狖所居人迹罕至禹錫誠合得罪然其老母必去不得則與此子為死別臣恐傷陛下孝理之風伏請屈法稍移近處憲宗曰夫為人子每事尤須謹慎常恐貽親之憂今禹錫所坐更合重於他人卿豈可以此論之度無以對良久帝改容而言曰朕所言是責人子之事然終不欲傷其所親之心乃改授連州刺史去京師又十餘年連刺數郡大和二年自和州刺史徵還拜主客郎中禹錫銜前事未已復作遊玄都觀詩序曰豫貞元二十一年為尚書屯田員外郎時此觀中未有花木是歲出牧連州尋貶朗州司馬居十年召還京師人人皆言有道士手植紅桃滿觀如爍晨霞遂有詩以志一時之事旋又出牧于今十有四年得為主客郎中重遊茲觀蕩然無復一樹唯兔葵燕麥動搖於春風因再題二十八字以俟後遊其前篇有玄都觀𩹉桃千樹總是劉郎去後栽之句後篇有種桃道士今何在前度劉郎又到來之句人嘉其才而薄其行禹錫甚怒武元衡李逢吉而裴度稍知之大和中度在中書欲令知制誥執政又聞詩序滋不悅纍轉禮部郎中集賢院學士度罷知政事禹錫求分司東都終以恃才褊心不得久處朝列六月授蘇州刺史就賜金紫秩滿入朝授汝州刺史遷太子賓客分司東都禹錫晚年與少傅白居易友善詩筆文章時無在其右者常與禹錫唱和往來因集其詩而序之曰彭城劉夢得詩豪者也其鋒森然少敢當者豫不量力往往犯之夫合應者聲同交爭者力敵一往一復欲罷不能由是每制一篇先於視草視竟則興作興作則文成一二年來日尋筆硯同和贈答不覺滋多大和三年春以前紙墨所存者凡一百三十八首其餘乘興仗醉率然口號者不在此數因命小姪龜兒編録勒成兩軸仍寫二本一付龜兒一授夢得小男崙郎各令收藏附兩家文集豫頃與元微之唱和頗多或在人口嘗戲微之云僕與足下二十年來為文友詩敵幸也亦不幸也吟詠情性播揚名聲其適遺形其樂忘老幸也然江南士女語才子者多云元白以子之故使僕不得獨步於吳越間此亦不幸也今垂老復遇夢得非重不幸耶夢得夢得文之神妙莫先於詩若妙與神則吾豈敢如夢得雪𩹉高山頭白早海中仙果子生遲沉舟側畔千帆過病樹前頭萬木春之句之類真謂神妙矣在在處處應有靈物護持豈止兩家子弟祕藏而已其為名流許與如此夢得嘗為西塞懷古金陵五題等詩江南文士稱為佳作雖名位不達公卿大僚多與之交開成初復為太子賓客分司俄授同州刺史秩滿檢校禮部尚書太子賓客分司會昌二年七月卒時年七十一贈戶部尚書子承雍登進士第亦有才藻柳宗元字子厚河東人後魏侍中濟陰公之系孫曾伯祖奭高宗朝宰相父鎮太常博士終侍御史宗元少聰警絶衆尤精西漢詩騷下筆搆思與古為侔精裁密緻璨若珠貝當時流輩咸推之登進士第應舉宏辭授校書郎藍田尉貞元十九年為監察御史順宗即位王叔文韋執誼用事尤奇待宗元與監察呂溫密引禁中與之圖事轉尚書禮部員外郎叔文欲大用之會居位不久叔文敗與同輩七人俱貶宗元為邵州刺史在道再貶永州司馬既罹竄逐涉履蠻瘴崎嶇堙厄蘊騷人之鬱悼寫情事動必以文為騷文十數篇覽之者為之悽惻元和十年例移為柳州刺史時朗州司馬劉禹錫得播州刺史制書下宗元謂所親曰禹錫有母年高今為郡蠻方西南絶域往復萬里如何與母偕行如母子異方便為永訣吾於禹錫為執友胡忍見其若是即草章奏請以柳州授禹錫自往播州會裴度亦奏其事禹錫終易連州柳州土俗以男女質錢過期則沒入錢主宗元革其鄉法其已沒者仍出私錢贖之歸其父母江嶺間為進士者不遠數千里皆隨宗元師法凡經其門必為名士著述之盛名動於時時號柳州云有文集四十卷元和十四年十月五日卒時年四十七子周六周七才三四歲觀察使裴行立為營護其喪及妻子還於京師時人義之韋辭字踐之祖召卿洛陽丞父翃官至侍御史辭少以兩經擢第判入等為祕書省校書郎貞元末東都留守韋夏卿辟為從事後纍佐使府皆以參畫稱職元和九年自藍田令入拜侍御史以事纍出為朗州刺史再貶江州司馬長慶初韋處厚路隨以公望居顯要素知辭有文學理行亟稱薦之擢為戶部員外轉刑部郎中充京西北和糴使尋為戶部郎中兼御史中丞充鹽鐵副使轉吏部郎中文宗即位韋處厚執政且以澄汰浮華登用藝實為事乃以辭與李翺同拜中書舍人辭素無清藻文筆不過中才然處事端實遊官無黨與李翺特相善俱擅文學高名疏達自用不事檢操處厚以激時用頗不厭公論辭亦倦於潤色苦求外任乃出為潭州刺史御史中丞湖南觀察使在鎮二年吏民稱治大和四年卒時年五十八贈右散騎常侍史臣曰貞元大和之間以文學聳動搢紳之伍者宗元禹錫而已其巧麗淵博屬辭比事誠一代之宏才如俾之詠歌帝載黼藻王言足以平揖古賢氣吞時輩而蹈道不謹昵比小人自致流離遂隳素業故君子羣而不黨戒懼慎獨正為此也韓李二文公於陵遲之末遑遑仁義有志於持世範欲以人文化成而道未果也至若抑楊墨排釋老雖於道未弘亦端士之用心也贊曰天地經綸無出斯文愈翺揮翰語切典墳犧雞斷尾害馬敗羣僻塗自噬劉柳諸君
