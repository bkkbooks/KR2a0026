body:
  text: 舊唐書卷二十五志第五禮儀五唐禮四時各以孟月享太廟每室用太牢季冬蠟祭之後以辰日臘享於太廟用牲如時祭三年一祫以孟冬五年一禘以孟夏又時享之日修七祀於太廟西門內之道南司命戶以春竈以夏門厲以秋行以冬中霤則於季夏迎氣日祀之若品物時新堪進御者所司先送太常與尚食相知簡擇精好者以滋味與新物相宜者配之太常卿奉薦於太廟不出神主仲春薦冰亦如之武德元年五月備法駕迎宣簡公懿王景皇帝元皇帝神主祔於太廟始享四室貞觀九年高祖崩將行遷祔之禮太宗命有司詳議廟制諫議大夫朱子奢建議曰按漢丞相韋玄成奏立五廟諸侯亦同五劉子駿議開七祖邦君降二鄭司農踵玄成之轍王子雍揚國師之波分塗並驅各相師祖咸玩其所習好同惡異遂令歷代祧祀多少參差優劣去取曾無畫一傳稱名位不同禮亦異數易云卑高以陳貴賤位矣豈非別嫌疑慎微遠防陵僭尊君卑佐升降無舛所貴禮者義在茲乎若使天子諸侯俱立五廟便是賤可以同貴臣可以濫主名器無準冠屨同歸禮亦異數義將安設戴記又稱禮有以多為貴者天子七廟諸侯五廟若天子五廟才與子男相埒以多為貴何所表乎愚以為諸侯立高祖以下并太祖五廟一國之貴也天子立高祖以上并太祖七廟四海之尊也降殺以兩禮之正焉前史所謂德厚者流光德薄者流卑此其義也伏惟聖祖在天山陵有日祔祖嚴配大事在斯宜依七廟用崇大禮若親盡之外有王業之所基者如殷之玄王周之后稷尊為始祖倘無其例請三昭三穆各置神主太祖一室考而虛位將待七百之祚遞遷方處庶上依晉宋傍愜人情於是八座奉曰臣聞揖讓受終之后革命創制之君何嘗不崇親親之義篤尊尊之道虔奉祖宗致敬郊廟自義乖闕里學滅秦庭儒雅既喪經籍湮殄雖兩漢纂修絶業魏晉敦尚斯文而宗廟制度典章散逸習所傳而競偏說執淺見而起異端自昔迄茲多歷年代語其大略兩家而已祖鄭玄者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定陛下至德自然孝思罔極孺慕踰匹夫之志制作窮聖人之道誠宜定一代之宏規為萬世之彝則臣奉述睿旨討論往載紀七廟者實多稱四祖者蓋寡校其得失昭然可見春秋穀梁傳及禮記王制祭法禮器孔子家語並云天子七廟諸侯五廟大夫三廟士二廟尚書曰七世之廟可以觀德至於孫卿孔安國劉歆班彪父子孔朝虞喜干寶之徒或學推碩儒或才稱博物商較今古咸以為然故其文曰天子三昭三穆與太祖之廟而七晉宋齊梁皆依斯義立親廟六豈非有國之茂典不刊之休烈乎若使違羣經之明文從纍代之疑議背子雍之篤論尊康成之舊學則天子之禮下逼於人臣諸侯之制上僭於王者非所謂尊卑有序名位不同者也況復禮由人情自非天墜大孝莫重於尊親厚本莫先於嚴配數盡四廟非貴多之道祀逮七世得加隆之心是知德厚者流光乃可久之高義德薄者流卑實不易之令範臣等參議請依晉宋故事立親廟六其祖宗之制式遵舊典庶承宗之道興於理定之辰尊祖之義成於孝治之日制從之於是增修太廟始崇祔弘農府君及高祖神主并舊四室為六室二十三年太宗崩將行崇祔之禮禮部尚書許敬宗奏言弘農府君廟應迭毀謹按舊儀漢丞相韋玄成以為毀主瘞埋但萬國宗饗有所從來一旦瘞埋事不允愜晉博士范宣意欲別立廟宇奉征西等主安置其中方之瘞埋頗叶情理事無典故亦未足依又議者或言毀主藏於天府祥瑞所藏本非斯意今謹準量去祧之外猶有壇墠祈禱所及竊謂合宜今時廟制與古不同共基別室西方為首若在西夾之中仍處尊位祈禱則祭未絶祗享方諸舊儀情實可安弘農府君廟遠親殺詳據舊章禮合迭毀臣等參議遷奉神主藏於夾室本情篤教在理為弘從之其年八月庚子太宗文皇帝神主祔於太廟文明元年八月奉高宗神主祔於太廟中始遷宣皇帝神主於夾室垂拱四年正月又於東都立高祖太宗高宗三廟四時享祀如京廟之儀別立崇先廟以享武氏祖考則天尋又令所司議立崇先廟室數司禮博士崇文館學士周悰希旨請立崇先廟為七室其皇室太廟減為五室春官侍郎賈大隱奏曰臣竊準秦漢皇太后臨朝稱制并據禮經正文天子七廟諸侯五廟蓋百王不易之義萬代常行之法未有越禮違古而擅裁儀注者也今周悰別引浮議廣述異文直崇臨朝權儀不依國家常度升崇先之廟而七降國家之廟而五臣聞皇圖廣闢實崇宗社之尊帝業弘基實等山河之固伏以天步多艱時逢遏密代天理物自古有之伏惟皇太后親承顧託憂勤黎庶納孝慈之請垂矜撫之懷實所謂光顯大猷恢崇聖載其崇先廟室合同諸侯之數國家宗廟不合輒有移變臣之愚直並依正禮周悰之請實乖古儀則天由是且止天授二年則天既革命稱帝於東都改制太廟為七廟室奉武氏七代神主祔於太廟改西京太廟為享德廟四時唯享高祖已下三室餘四室令所司閉其門廢其享祀之禮又改西京崇先廟為崇尊廟其享祀如太廟之儀萬歲登封元年臘月封嵩山回親謁太廟明年七月又改京崇尊廟為太廟仍改太廟署為清廟臺加官員崇其班秩聖曆二年四月又親祀太廟曲赦東都城內中宗即位神龍元年正月改享德廟依舊為京太廟五月遷武氏七廟神主於西京之崇尊廟東都創置太廟太常博士張齊賢建議曰昔孫卿子云有天下者事七代有一國者事五代則天子七廟古今達禮故尚書稱七代之廟可以觀德祭法稱王立七廟一壇一墠王制云天子七廟三昭三穆與太祖之廟而七莫不尊始封之君謂之太祖太祖之廟百代不遷祫祭之禮毀廟之主陳於太祖未毀廟之主皆升合食於太祖之室太祖東向昭南向穆北向太祖者商之玄王周之后稷是也太祖之外更無始祖但商自玄王以後十有四代至湯而有天下周自后稷已後十有七代至武王而有天下其間代數既遠遷廟親廟皆出太祖之後故得合食有序尊卑不差其後漢高祖受命無始封祖即以高皇帝為太祖太上皇高帝之父立廟享祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其高皇太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西豫章潁川京兆府君等並為屬尊不在昭穆合食之列歷茲已降至於有隋宗廟之制斯禮不改故宇文氏以文皇帝為太祖隋室以武元皇帝為太祖國家誕受天命纍葉重光景皇帝始封唐公實為太祖中間代數既近列在三昭三穆之內故皇家太廟唯有六室其弘農府君宣光二帝尊於太祖親盡則遷不在昭穆合食之數今皇極再造孝思匪寧奉二月二十九日敕七室已下依舊號尊崇又奉三月一日敕既立七廟須尊崇始祖速令詳定者伏尋禮經始祖即是太祖太祖之更無始祖周朝太祖之外以周文王為始祖不合禮經或有引白虎通義云后稷為始祖文王為太祖武王為太宗及鄭玄注詩雍序云太祖謂文王以為說者其義不然何者彼以禮王者祖有功宗有德周人祖文王而宗武王故謂文王為太祖耳非祫祭羣主合食之太祖今之議者或有欲立涼武昭王為始祖者殊為不可何者昔在商周稷𪅂始封湯武之興祚由稷𪅂故以稷𪅂為太祖即皇家之景帝是也涼武昭王勳業未廣後主失國土宇不傳景皇始封實基明命今乃捨封唐之盛烈崇西涼之遠構考之前古實乖典禮魏氏不以曹參為太祖晉氏不以殷王卬為太祖宋氏不以楚元王為太祖齊梁不以蕭何為太祖陳隋不以胡公楊震為太祖則皇家安可以涼武昭王為太祖乎漢之東京大議郊祀多以周郊后稷漢當郊堯制下公卿議議者多同帝亦然之杜林正議獨以為周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循竟從林議又傳稱欲知天上事問長人以其近之武德貞觀之時主聖臣賢其去涼武昭王蓋亦近於今矣當時不立者必不可立故也今既年代寖遠方復立之是非三祖二宗之意實恐景皇失職而震怒武昭虛位而不答非社稷之福也宗廟事重禘祫禮崇先王以之觀德或者不知其說既灌而往孔子不欲觀之今朝命惟新宜應慎禮祭如神在理不可誣請準敕加太廟為七室享宣皇帝以備七代其始祖不合別有尊崇太常博士劉承慶尹知章又議云謹按王制天子七廟三昭三穆與太祖之廟而七此載籍之明文古今之通制皇唐稽考前範詳採列辟崇建宗靈式遵斯典但以開基之主受命之君王迹有淺深太祖有遠近湯文祚基稷𪅂太祖代遠出乎昭穆之上故七廟可全若夏繼唐虞功非由鯀漢除秦項力不因堯及魏晉經圖周隋撥亂皆勛隆近代祖業非遠受命始封之主不離昭穆之親故肇立宗祊罕聞全制夫太祖以功建昭穆以親崇有功百代而不遷親盡七葉而當毀或以太祖代淺廟數非備更於昭穆之上遠立合遷之君曲從七廟之文深乖迭毀之制皇家千齡啓旦百葉重光景皇帝濬德基唐代數猶近號雖崇於太祖親尚列於昭穆且臨六室之位未申七代之尊是知太廟當六未合有七故先朝惟有宣光景元神堯文武六代親廟大帝登遐神主升祔於廟室以宣皇帝代數當滿準禮復遷今止有光皇帝已下六代親廟非是天子之廟數不當有七本由太祖有遠近之異故初建有多少之殊敬惟三后臨朝代多儒雅神祊事重禮豈虛存規模可沿理難變革宣皇既非始祖又廟無祖宗之號親盡既遷其廟不合重立若禮終運往建議復崇實違王制之文不合先朝之旨請依貞觀之故事無改三聖之宏規光崇六室不虧古議時有制令宰相更加詳定禮部尚書祝欽明等奏言博士三人自分兩議張齊賢以始同太祖不合更祖昭王劉承慶以王制三昭三穆不合重崇宣帝臣等商量請依張齊賢以景皇帝為太祖依劉承慶尊崇六室制從之尋有制以孝敬皇帝為義宗升祔於太廟其年八月崇祔光皇帝太祖景皇帝代祖元皇帝高祖神堯皇帝太宗文武聖皇帝皇考高宗天皇大帝皇兄義宗孝敬皇帝於東都之太廟躬行享獻之禮二年駕還京師太廟自是亦崇享七室仍改武氏崇尊廟為崇恩廟明年二月復令崇恩廟一依天授時享祭時武三思用事密令安樂公主諷中宗故有此制尋又特令武氏崇恩廟齊郎取五品子充太常博士楊孚奏言太廟齊郎承前只七品已下子今崇恩廟齊郎既取五品子即太廟齊郎作何等級上曰太廟齊郎亦準崇恩廟置孚奏曰崇恩廟為太廟之臣太廟為崇恩廟之君以臣準君猶為僭逆以君準臣天下疑懼孔子曰名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則人無所措手足故君子名之必可言也伏願無惑邪言以為亂始其事乃寢崇恩廟至睿宗踐祚乃廢毀之景雲元年冬將葬中宗孝和皇帝於定陵中書令姚元之吏部尚書宋璟奏言準禮大行皇帝山陵事終即合祔廟其太廟第七室先祔皇兄義宗孝敬皇帝哀皇后裴氏神主伏以義宗未登大位崩後追尊神龍之初乃特令遷祔春秋之義國君即位未踰年者不合列昭穆又古者祖宗各別立廟孝敬皇帝恭陵既在洛州望於東都別立義宗之廟遷祔孝敬皇帝哀皇后神主命有司以時享祭則不違先旨又協古訓人神允穆進退得宜在此神主望入夾室安置伏願陛下以禮斷恩制從之及既葬祔中宗孝和皇帝和思皇后趙氏神主於太廟其義宗即於東都從善里建廟享祀時又追尊昭成肅明二皇后於親仁里別置儀坤廟四時享祭開元四年睿宗崩及行祔廟之禮太常博士陳貞節蘇獻等奏議曰謹按孝和皇帝在廟七室已滿今睿宗大聖真皇帝是孝和之弟甫及仲冬禮當祔遷但兄弟入廟古則有焉遞遷之禮昭穆須正謹按禮論太常賀循議云兄弟不相為後也故殷之盤庚不序於陽甲而上繼於先君漢之光武不嗣於孝成而上承於元帝又曰晉惠帝無後懷帝承統懷帝自繼於世祖而不繼於惠帝其惠帝當同陽甲孝成別出為廟又曰若兄弟相代則共是一代昭穆位同至其當遷不可兼毀二廟此蓋禮之常例也荀卿子曰有天下者事七代謂從禰已上也尊者統廣故恩及遠祖若傍容兄弟上毀祖考此則天子有不得全事於七代之義矣孝和皇帝有中興之功而無後嗣請同殷之陽甲漢之成帝出為別廟時祭不虧大祫之辰合食太祖奉睿宗神主升祔太廟上繼高宗則昭穆永貞獻祼長序制從之初令以儀坤廟為中宗廟尋又改造中宗廟於太廟之西貞節等又以肅明皇后不合與昭成皇后配祔睿宗奏議曰禮宗廟父昭子穆皆有配座每室一帝一后禮之正儀自夏殷而來無易茲典伏惟昭成皇后有太姒之德已配食於睿宗則肅明皇后無啓母之尊自應別立一廟謹按周禮云奏夷則歌小呂以享先妣者姜嫄是也姜嫄是帝嚳之妃后稷之母特為立廟名曰閟宮又禮論云晉伏系之議云晉簡文鄭宣后既不配食乃築宮於外歲時就廟享祭而已今肅明皇后無祔配之位請同姜嫄宣后別廟而處四時享祭如舊儀制從之於是遷昭成皇后神主祔於睿宗之室惟留肅明神主於儀坤廟時太常卿姜皎復與禮官上表曰臣聞敬宗尊祖享德崇恩必也正名用光時憲禮也伏見太廟中則天皇后配高宗天皇大帝題云天后聖帝武氏伏尋昔居寵秩親承顧託因攝大政事乃從權神龍之初已去帝號岑羲等不間政體復題帝名若又使帝號長存恐非聖朝通典夫七廟者高祖神堯皇帝之廟也父昭子穆祖德宗功非夫帝子天孫乘乾出震者不得升祔於斯矣但皇后祔廟配食高宗位號舊章無宜稱帝今山陵日近升祔非遙請申陳告之儀因除聖帝之字直題云則天皇后武氏詔從之時既別造義宗廟將作大匠韋湊上疏曰臣聞王者制禮是曰規模規模之興實資師古師古之道必也正名惟名與實固當相副其在宗廟禮之大者豈可失哉禮祖有功而宗有德祖宗之廟百代不毀故殷太甲曰太宗太戊曰中宗武丁曰高宗周宗文王武王漢則文帝為太宗武帝為世宗其後代有稱宗皆以方制海內德澤可宗列於昭穆期于不毀祖宗之義不亦大乎況孝敬皇帝位止東宮未嘗南面聖道誠冠於儲副德教不被於寰瀛立廟稱宗恐非合禮況別起寢廟不入昭穆稽諸祀典何義稱宗而廟號義宗稱之萬代以臣庸識竊謂不可望更令有司詳定務合於禮於是太常請以本諡孝敬為廟稱從之五年正月玄宗將行幸東都而太廟屋壞乃奉七廟神主於太極殿玄宗素服避正殿輟朝三日親謁神主于太極殿而後發幸東都乃敕有司修太廟明年廟成玄宗還京行親祔之禮時有司撰儀注以祔祭之日車駕發宮中玄宗謂宋璟蘇頲曰祭必先齊所以齊心也據儀注祭之日發大明宮又以質明行事縱使侵星而發猶是移辰方到質明之禮其可及乎又朕不宿齊宮即安正殿情所不敢宜於廟所設齊宮五日赴行宮宿齊六日質明行事庶合於禮璟等稱聖情深至請即奉行詔有司改定儀注六日玄宗自齊宮步詣太廟入自東門就立位樂奏九成升自阼階行祼獻之禮至睿宗室俯伏嗚咽侍臣莫不流涕有河南府人孫平子詣闕上言中宗孝和皇帝既承大統不合遷於別廟玄宗令宰相召平子與禮官對定可否太常博士蘇獻等固執前議平子口辨所引咸有經據獻等不能屈時蘇頲知政事以獻是其從祖之兄頗黨助之平子之議竟不得行平子論竟不已遂謫平子為康州都城尉仍差使領送至任不許東西平子之任尋卒時雖貶平子議者深以其言為是至十年正月下制曰朕聞王者乘時以設教因事以制禮沿革以從宜為本取舍以適會為先故損益之道有殊質文之用斯異且夫至德之謂孝所以通乎神明大事之謂祀所以虔乎宗廟國家握紀命曆重光纍盛四方由其繼明七代可以觀德朕嗣守丕業祗奉睿圖聿懷昭事罔不恤祀嘗覽古典詢諸舊制遠則夏殷事異近則漢晉道殊雖禮文之不一固嚴敬之無二朕以為立愛自親始教人睦也立敬自長始教人順也是知朕率於禮緣於情或教以道存或禮從時變將因宜以創制豈沿古而限今況恩以降殺而疏廟以遷毀而廢雖式瞻古訓禮則不違而永言孝思情所未足享嘗則止豈愛崇而禮備有禱而祭非德盛而流永其祧室宜列為正室使親而不盡遠而不祧廟以貌存宗猶尊立俾四時式薦不間於毀主百代靡遷匪惟於始廟所謂變以合禮動而得中嚴配之典克崇肅雍之美茲在又兄弟繼及古有明文今中宗神主猶居別處詳求故實當寧不安移就正廟用章大典仍創立九室宜令所司擇日啓告移遷十一年春玄宗還京師下制曰崇建宗廟禮之大者聿追孝饗德莫至焉今宗以立尊親無遷序永惟嚴配致用蠲潔棟宇式崇祼奠斯授顧茲薄德獲承禋祀不躬不親曷展誠敬宜用八月十九日祗見九室於是追尊宣皇帝為獻祖復列於正室光皇帝為懿祖並還中宗神主於太廟及將親祔會雨而止乃令所司行事其京師中宗舊廟便毀拆之東都舊廟始移孝敬神主祔焉其從善里孝敬舊廟亦令毀拆二十一年玄宗又特令遷肅明皇后神主祔於睿宗之室仍以舊儀坤廟為肅明觀大曆十四年十月代宗神主將祔禮儀使顏真卿以元皇帝代數已遠準禮合祧請遷於西夾室其奏議曰王制天子七廟三昭三穆與太祖之廟而七又禮器云有以多為貴者天子七廟又伊尹曰七代之廟可以觀德此經典之明證也七廟之外則曰去祧為壇去壇為墠故歷代儒者制迭毀之禮皆親盡宜毀伏以太宗文皇帝七代之祖高祖神堯皇帝國朝首祚萬葉所承太祖景皇帝受命於天始封於唐元本皆在不毀之典代祖元皇帝地非開統親在七廟之外代宗皇帝升祔有日元皇帝神主禮合祧遷或議者以祖宗之名難於迭毀昔漢朝近古不敢以私滅公故前漢十二帝為祖宗者四而已至後漢漸違經意子孫以推美為先自光武已下皆有廟號則祖宗之名莫不建也安帝信讒害大臣廢太子及崩無上宗之奏後自建武以來無毀者因以陵號稱宗至桓帝失德尚有宗號故初平中左中郎蔡雍以和帝以下功德無殊而有過差不應為宗餘非宗者追尊三代皆奏毀之是知祖有功宗有德存至公之義非其人不居蓋三代立禮之本也自東漢已來則此道衰矣魏明帝自稱烈祖論者以為逆自稱祖宗故近代此名悉為廟號未有子孫踐祚而不祖宗先王者以此明之則不得獨據兩字而為不合祧遷之證假令傳祚百代豈可上崇百代以為孝乎請依三昭三穆之義永為通典寶應二年升祔玄宗肅宗則獻祖懿祖已從迭毀伏以代宗睿文孝皇帝卒哭而祔則合上遷一室元皇帝代數已遠其神主準禮當祧至禘祫之時然後享祀於是祧元皇帝於西夾室祔代宗神主焉永貞元年十一月德宗神主將祔禮儀使杜黃裳與禮官王涇等請遷高宗神主於西夾室其議曰自漢魏已降沿革不同古者祖有功宗有德皆不毀之名也自東漢魏晉迄於陳隋漸違經意子孫以推美為先光武已下皆有祖宗之號故至於迭毀親盡禮亦迭遷國家九廟之尊皆法周制伏以太祖景皇帝受命於天始封元本德同周之后稷也高祖神堯皇帝國朝首祚萬葉所承德同周之文王也太宗文皇帝應天靖亂垂統立極德同周武王也周人郊后稷而祖文王宗武王聖唐郊景皇帝祖高祖而宗太宗皆在不遷之典高宗皇帝今在三昭三穆之外謂之親盡新主入廟禮合迭遷藏於從西第一夾室每至禘祫之月合食如常於是祧高宗神主於西夾室祔德宗神主焉元和元年七月順宗神主將祔有司疑於遷毀太常博士王涇建議曰禮經祖有功宗有德皆不毀之名也惟三代行之漢魏已降雖曰祖宗親盡則遷無功亦毀不得行古之道也昔夏后氏十五代祖顓頊而宗禹殷人十七代祖契而宗湯周人三十六王以后稷為太祖祖文王而宗武王聖唐德厚流廣遠法殷周奉景皇帝為太祖祖高祖而宗太宗皆在百代不遷之典故代宗升祔遷代祖也德宗升祔遷高宗也今順宗升祔中宗在三昭三穆之外謂之親盡遷於太廟夾室禮則然矣或諫者以則天太后革命中宗復而興之不在遷藏之例臣竊未諭也昔者高宗晏駕中宗奉遺詔自儲副而陟元后則天太后臨朝廢為廬陵王聖曆元年太后詔復立為皇太子屬太后聖壽延長御下日久奸臣擅命紊其紀度敬暉桓彥範等五臣俱唐舊臣匡輔王室翊中宗而承大統此乃子繼父業是中宗得之而且失之母授子位是中宗失之而復得之二十年間再為皇太子復踐皇帝位失之在己得之在己可謂革命中興之義殊也又以周漢之例推之幽王為犬戎所滅平王東遷周不以平王為中興不遷之廟其例一也漢呂后專權産祿秉政文帝自代邸而立之漢不以文帝為中興不遷之廟其例二也霍光輔宣帝再盛基業而不以宣帝為不遷之廟其例三也伏以中宗孝和皇帝於聖上為六代伯祖尊非正統廟亦親盡爰及周漢故事是與中興功德之主不同奉遷夾室固無疑也是月二十四日禮儀使杜黃裳奏曰順宗皇帝神主已升祔太廟告祧之後即合遞遷中宗皇帝神主今在三昭三穆之外準禮合遷於太廟從西第一夾室每至禘祫之日合食如常於是祧中宗神主於西夾室祔順宗神主焉有司先是以山陵將畢議遷廟之禮有司以中宗為中興之君當百代不遷之位宰臣召史官蔣武問之武對曰中宗以弘道元年於高宗柩前即位時春秋已壯矣及母后篡奪神器潛移其後賴張柬之等同謀國祚再復此蓋同於反正恐不得號為中興之君凡非我失之自我復之謂之中興漢光武晉元帝是也自我失之因人復之晉孝惠孝安是也今中宗於惠安二帝事同即不可為不遷之主也有司又云五王有再安社稷之功今若遷中宗廟則五王永絶配享之例武曰凡配享功臣每至禘祫年方合食太廟居常即無享禮今遷中宗神主而禘祫之年毀廟之主並陳於太廟此則五王配食與前時如一也有司不能答十五年四月禮部侍郎李建奏上大行皇帝諡曰聖神章武孝皇帝廟號憲宗先是河南節度使李夷簡上議曰王者祖有功宗有德大行皇帝戡翦寇逆纍有武功廟號合稱祖陛下正當決在宸斷無信齷齪書生也遂詔下公卿與禮官議其可否太常博士王彥威奏議大行廟號不宜稱祖宜稱宗從之其月禮部奏準貞觀故事遷廟之主藏於夾室西壁南北三間第一間代祖室第二間高宗室第三間中宗室伏以山陵日近睿宗皇帝祧遷有期夾室西壁三室外無置室處準江都集禮古者遷廟之主藏於太室北壁之中今請於夾室北壁以西為上置睿宗皇帝神主石室制從之長慶四年正月禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟而七荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七廟典籍通規祖功宗德不在其數國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷高祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王其下三昭三穆謂之親廟四時常饗自如禮文今以新主入廟玄宗明皇帝在三昭三穆之外是親盡之祖雖有功德禮合祧遷禘祫之歲則從合食制從之開成五年禮儀使奏謹按天子七廟祖功宗德不在其中國朝制度太廟九室伏以太祖景皇帝受封於唐高祖太宗創業受命有功之主百代不遷今文宗元聖昭獻皇帝升祔有時代宗睿文孝武皇帝是親盡之祖禮合祧遷每至禘祫合食如常從之會昌元年六月制曰朕近因載誕之日展承顏之敬太皇太后謂朕曰天子之孝莫大於丕承人倫之義莫大於嗣續穆宗睿聖文惠孝皇帝厭代已久星霜屢遷禰宮曠合食之禮惟帝深濡露之感宣懿皇太后長慶之際德冠後宮夙表沙麓之祥實茂河洲之範先朝恩禮之厚中壼莫偕況誕我聖君纘承昌運已協華於先帝方延祚於後昆思廣貽謀庶弘博愛爰從舊典以慰孝思當以宣懿皇太后祔太廟穆宗睿聖文惠孝皇帝之室率是彝訓其敬承之朕祗奉慈旨載深感咽宜令宣示中外咸使聞知會昌六年五月禮儀使奏武宗昭肅皇帝祔廟並合祧遷者伏以自敬宗文宗武宗兄弟相及已歷三朝昭穆之位與承前不同所可疑者其事有四一者兄弟昭穆同位不相為後二者已祧之主復入舊廟三者廟數有限無後之主則宜出置別廟四者兄弟既不相為後昭為父道穆為子道則昭穆同班不合異位據春秋文公二年躋僖公何休云躋升也謂西上也惠公與莊公當同南面西上隱桓與閔僖當同北面西上孔穎達亦引此義釋經又賀循云殷之盤庚不序陽甲漢之光武上繼元帝晉元帝簡文皆用此義毀之蓋以昭穆位同不可兼毀二廟故也尚書曰七代之廟可以觀德且殷家兄弟相及有至四帝不及祖禰何容更言七代於理無矣二者今已兄弟相及同為一代矯前之失則合復祔代宗神主於太廟或疑已祧之主不合更入太廟者按晉代元明之時已遷豫章潁川矣及簡文即位乃元帝之子故復豫章潁川二神主於廟又國朝中宗已祔太廟至開元四年乃出置別廟至十年置九廟而中宗神主復祔太廟則已遷復入亦可無疑三者廟有定數無後之主出置別廟者按魏晉之初多同廟蓋取上古清廟一宮尊遠神祇之義自後晉武所立之廟雖云七主而實六代蓋景文同廟故也又按魯立姜嫄文王之廟不計昭穆以尊尚功德也晉元帝上繼武帝而惠懷愍三帝時賀循等諸儒議以為別立廟親遠義疏都邑遷異於理無嫌也今以文宗棄代才六七年武宗甫邇復土遽移別廟不齒祖宗在於有司非所宜議四者添置廟之室按禮論晉太常賀循云廟以容主為限無拘常數故晉武帝時廟有七主六代至元帝明帝廟皆十室及成康穆三帝皆至十一室自後雖遷故祔新大抵以七代為準而不限室數伏以江左大儒通賾覩奧事有明據固可施行今若不行是議更以迭毀為制則當上不及高曾未盡之親下有忍臣子恩義之道今備討古今參校經史上請復代宗神主於太廟以存高曾之親下以敬宗文宗武宗同為一代於太廟東間添置兩室定為九代十一室之制以全臣子恩敬之義庶協大順之宜得變禮之正折古今之紛互立羣疑之杓指俾因心廣孝永燭於皇明昭德事神無虧於聖代敕曰宗廟事重實資參詳宜令尚書省兩省御史臺四品以上官大理卿京兆尹等集議以聞尚書左丞鄭涯等奏議曰夫禮經垂則莫重於嚴配必參損益之道則合典禮之文況有明徵是資折衷伏自敬宗文宗武宗三朝嗣位皆以兄弟考之前代理有顯據今謹詳禮院所奏並上稽古文旁托史氏協於通變允謂得宜臣等商議請依禮官所議從之大中三年十一月制追尊憲宗順宗諡號事下有司太常博士李稠奏請別造憲宗順宗神主改題新諡上疑其事詔都省集議右司郎中楊發都官員外郎劉彥模等奏考尋故事無別造神主改題之例事在楊發傳時宰臣奏改造改題並無所據酌情順理題則為宜況今士族之家通行此例雖尊卑有異而情理則同望就神主改題則為通允依之黃巢犯長安僖宗避狄於成都府中和元年夏四月有司請享太祖已下十一室詔公卿議其儀太常卿牛叢與儒者同議其事或曰王者巡狩以遷廟主行如無遷廟之主則祝奉幣帛皮圭告於祖禰遂奉以出載於齊車每舍奠焉今非巡狩是失守宗廟夫失守宗廟則當罷宗廟之事叢疑之將作監王儉太子賓客李匡乂虞部員外郎袁皓建議同異及左丞崔厚為太常卿遂議立行廟以玄宗幸蜀時道宮玄元殿之前架幄幕為十一室又無神主題神版位而行事達禮者非之以為止之可也明年乃特造神主以祔行廟光啓元年十二月二十五日僖宗再幸寶雞其太廟十一室並祧廟八室及孝明太皇太后等別廟三室等神主緣室法物宗正寺官屬奉之隨駕鄠縣為賊所劫神主法物皆遺失三年二月車駕自興元還京以宮室未備權駐鳳翔禮院奏皇帝還宮先謁太廟今宗廟焚毀神主失墜請準禮例修奉者禮院獻議曰按春秋新宮災三日哭傳曰新宮宣公廟也三日哭禮也按國史開元五年正月二日太廟四室摧毀時神主皆存迎奉於太極殿安置玄宗素服避正殿寶應元年肅宗還京師以宗廟為賊所焚於光順門外設次向廟哭歷檢故事不見百官奉慰之儀然上既素服避殿百官奉慰亦合情禮竊循故事比附參詳恐須宗正寺具宗廟焚毀及神主失墜事由奏皇帝素服避殿受慰訖輟朝三日下詔委少府監擇日依禮新造列聖神主如此方似合宜伏緣採栗須十一月漸恐遲晚修奉使宰相鄭延昌具議中書門下奏曰伏以前年冬再有震驚俄然巡幸主司宗祝迫以蒼黃伏緣移蹕鳳翔未敢陳奏今則將回鑾輅皆舉典章清廟再營孝思咸備伏請降敕命所司參詳典禮修奉敕曰朕以涼德祗嗣寶圖不能上承天休下正人紀兵革競興於宇縣車輿再越於藩垣宗廟震驚蒸嘗廢闕敬修典禮倍切哀摧宜付所司又修奉太廟使宰相鄭延昌奏太廟大殿十一室二十三間十一架功績至大計料支費不少兼宗廟制度有數難為損益今不審依元料修奉為復更有商量請下禮官詳議太常博士殷盈孫奏議言如依元料難以速成況帑藏方虛須資變禮竊以至德二年以新修太廟未成其新造神主權於長安殿安置便行饗告之禮如同宗廟之儀以俟廟成方為遷祔今京城除充大內及正衙外別無殿宇伏聞先有詔旨欲以少府監大廳權充太廟其廳五間伏緣十一室於五間之中陳設隘狹請更接續修建成十一間以備十一室薦饗之所其三太后廟即於少府監取西南屋三間以備三室告饗之所敕旨從之大順元年將行禘祭有司請以三太后神主祔饗於太廟三太后者孝明太皇太后鄭氏宣宗之母也恭僖皇太后王氏敬宗之母也貞獻皇太后蕭氏文宗之母也三后之崩皆作神主有故不當入太廟當時禮官建議並置別廟每年五享及三年一祫五年一禘皆於本廟行事無奉神主入太廟之文至是亂離之後舊章散失禮院憑曲臺禮欲以三太后祔享太廟博士殷盈孫獻議非之曰臣謹按三太后憲宗穆宗之后也二帝已祔太廟三后所以立別廟者不可入太廟故也與帝在位皇后別廟不同今有司誤用王彥威曲臺禮禘別廟太后於太廟乖戾之甚臣竊究事體有五不可曲臺禮云別廟皇后禘祫於太廟祔於祖姑之下此乃皇后先崩已造神主夫在帝位如昭成肅明元獻昭德之比昭成肅明之崩也睿宗在位元獻之崩也玄宗在位昭德之崩也肅宗在位四后於太廟未有本室故創別廟當為太廟合食之主故禘祫乃奉以入饗其神主但題云某諡皇后明其後太廟有本室即當遷祔帝方在位故皇后暫立別廟耳本是太廟合食之祖故禘祫乃升太廟未有位故祔祖姑之下今恭僖貞獻二太后皆穆宗之后恭僖會昌四年造神主合祔穆宗廟室時穆宗廟已祔武宗母宣懿皇后神主故為恭僖別立廟其神主直題云皇太后明其終安別廟不入太廟故也貞獻太后大中元年作神主立別廟其神主亦題為太后並與恭僖義同孝明咸通五年作神主合祔憲宗廟室憲宗廟已祔穆宗之母懿安皇后故孝明亦別立廟是懿宗祖母故題其主為太皇太后與恭僖貞獻亦同帝在位后先作神主之例今以別廟太后神主禘祭升享太廟一不可也曲臺禮別廟皇后禘祫於太廟儀注云內常侍奉別廟皇后神主入置於廟庭赤黃褥位奏云某諡皇后禘祫祔享太廟然後以神主升今即須奏云某諡太皇太后且太廟中皇后神主二十一室今忽以太皇太后入列於昭穆二不可也若但云某諡皇后即與所題都異神何依憑此三不可也古今禮要云舊典周立姜嫄別廟四時祭薦及禘祫於七廟皆祭惟不入太祖廟為別配魏文思甄后明帝母廟及寢依姜嫄之廟四時及禘皆與諸廟同此舊禮明文得以為證今以別廟太后禘祫於太廟四不可也所以置別廟太后以孝明不可與懿安並祔憲宗之室今禘享乃處懿安於舅姑之上此五不可也且祫合祭也合猶不入太祖之廟而況於禘乎竊以為並皆禘於別廟為宜且恭僖貞獻二廟比在朱陽坊禘祫赴太廟皆須備法駕典禮甚重儀衛至多咸通之時纍遇大饗耳目相接歲代未遙人皆見聞事可詢訪非敢以臆斷也或曰以三廟故禘祫於別廟或可矣而將來有可疑焉謹案睿宗親盡已祧今昭成肅明二后同在夾室如或後代憲宗穆宗親盡而祧三太后神主其得不入夾室乎若遇禘祫則如之何對曰此又大誤也三太后廟若親盡合祧但當閟而不享安得處於夾室禘祫則就別廟行之歷代已來何嘗有別廟神主復入太廟夾室乎禘祫禮之大者無宜錯失宰相孔緯曰博士之言是也昨禮院所奏儀注今已敕下大祭日迫不可遽改且依行之於是遂以三太后祔祫太廟達禮者譏其大謬至今未正會昌六年十一月太常博士任疇上言去月十七日饗德明興聖廟得廟直候論狀稱懿祖室在獻祖室之上當時雖以為然便依行事猶牒報監察使及宗正寺請過祭詳窺玉牒如有不同即相知聞奏爾後伏檢高祖神堯皇帝本紀伏審獻祖為懿祖之昭懿祖為獻祖之穆昭穆之位天地極殊今廟室奪倫不即陳奏然尚為苟且罪不容誅仍敕修撰朱儔檢討王研精詳覆得報稱天寶二年制追尊咎繇為德明皇帝涼武昭王為興聖皇帝十載立廟至貞元十九年制從給事中陳京右僕射姚南仲等一百五十人之議以為禘祫是祖宗以序之祭凡有國者必尊太祖今國家以景皇帝為太祖太祖之上施於禘祫不可為位請按德明興聖廟共成四室祔遷獻懿二祖謹尋儔等所報即當時表奏並獻居懿上伏以國之大事宗廟為先禘祫之禮不當失序四十餘載理難尋詰伏祈聖鑒即垂詔敕具禮遷正其月疇又奏曰伏聞今月十三日敕以臣所奏獻懿祖二室倒置事宜令禮官集議聞奏者臣去月十七日緣遇太廟祫饗太祖景皇帝已下羣主準貞元十九年所祔獻懿祖於德明廟共為四室準元敕各於本室行享禮審知獻祖合居懿祖之上昭穆方正其時親見獻祖之室倒居懿祖之下於後遍校圖籍實見差殊遂敢聞奏今奉敕宜令禮官集議聞奏者臣得奉禮郎李岡太祝柳仲年協律郎諸葛畋李潼檢討官王皡修撰朱儔博士閔慶之等七人狀稱謹按高祖神堯皇帝本紀及皇室圖譜并武德貞觀永徽開元已來諸禮著在甲令者並云獻祖宣皇帝是神堯之高祖懿祖光皇帝是神堯皇帝之曾祖以高曾辨之則獻祖是懿祖之父懿祖是獻祖之子即博士任疇所奏倒祀不虛臣等伏乞即垂詔敕具禮遷正其事遂行僖宗自興元還京夏四月將行禘祭有司引舊儀禘德明興聖二廟及懿祖獻祖神主祔興聖德明廟通為四室黃巢之亂廟已焚毀及是將禘俾議其儀博士殷盈孫議曰臣以德明等四廟功非創業義止追封且於今皇帝年代極遙昭穆甚遠可依晉韋泓屋毀乃已之例因而廢之敕下百僚都省會議禮部員外薛昭緯奏議曰伏以禮貴從宜過猶不及祀有常典理當據經謹按德明追尊實為遐遠徵諸歷代莫有其倫自古典禮該詳無踰周室后稷實始封之祖文王乃建極之君且不聞后稷之前別議立廟以至二漢則可明徵劉纍梁魏則近有蕭曹稽彼簡書並無追號逮于興聖事非有據蓋以始王於涼遂列為祖類長沙於後漢之代等楚元於宋高之朝悉無尊祀之名足為憲章之驗重以獻祖懿祖皆非宗有德而祖有功親盡宜祧理當毀瘞遷於二廟亦出一時且武德之初議宗廟之事神堯聽之太宗參之碩學通儒森然在列而不議立臯陶涼武昭之廟蓋知其非所宜立也尊太祖代祖為帝而以獻祖為宣簡公懿祖為懿王卒不加帝號者謂其親盡則毀明矣春秋左氏傳孔子在陳聞魯廟災曰其桓僖乎已而果然蓋以親盡不毀宜致天災炯然之徵不可忽也據太常禮院狀所引至德二年克復後不作弘農府君廟神主及晉韋泓屋朽乃已之議頗為明據深協禮經其興聖等四室請依禮院之議奉敕敬依典禮付所司開元二十二年正月制以籩豆之薦或未能備物宜令禮官學士詳議具奏太常卿韋縚請宗廟之奠每室籩豆各加十二又今之酌獻酒爵制度全小僅無一合執持甚難請稍令廣大其郊祀奠獻亦準此仍望付尚書省集衆官詳議務從折衷於是兵部侍郎張均及職方郎中韋述等建議曰謹按禮祭統曰凡天之所生地之所長苟可薦者莫不咸在水草陸海三牲八簋昆蟲之異草木之實陰陽之物皆備薦矣聖人知孝子之情深而物類之無限故為之節制使祭有常禮物有其品器有其數上自天子下至公卿貴賤差降無相踰越百代常行無易之道也又按周禮膳夫掌王之食飲膳羞食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十瓮則與祭祀之物豐省本殊左傳曰享以訓恭儉宴以示慈惠恭儉以行禮慈惠以布政又曰享有體薦宴有折俎杜預曰享有體薦爵盈而不飲豆乾而不食宴則相與食之享之與宴猶且異文祭奠所陳固不同矣又按周禮籩人豆人各掌四籩四豆之實供祭祀與賓客所用各殊據此數文祭奠不同常時其來久矣且人之嗜好本無憑準宴私之饌與時遷移故聖人一切同歸於古雖平生所嗜非禮亦不薦也平生所惡是禮即不去也楚語曰屈到嗜芰有疾召宗老而屬曰祭我必以芰及卒宗老將薦芰屈建命去之曰祭典有之國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下安之不羞珍異不陳庶侈不以私欲干國之典遂不用此則禮外之食前賢不敢薦也今欲取甘旨之物肥濃之味隨所有者皆充祭用苟踰舊制其何限焉雖籩豆有加豈能備也傳曰大羹不致粢食不鑿昭其儉也書曰黍稷非馨明德惟馨事神在於虔誠不求厭飫三年一禘不欲黷也三獻而終禮有成也風有采蘋采蘩雅有行葦泂酌守以忠信神其捨諸若以今之珍饌平生所習求神無方何必師古簠簋可去而盤盂杯案當在御矣韶頀可息而箜篌笛笙當在奏矣凡斯之流皆非正物或興於近代或出於蕃夷耳目之娛本無則象用之宗廟後嗣何觀欲為永式恐未可也且自漢已降諸陵皆有寢宮歲時朔望薦以常饌此既常行亦足盡至孝之情矣宗廟正禮宜依典故率情變革人情所難又按舊制一升曰爵五升曰散禮器稱宗廟之祭貴者獻以爵賤者獻以散此明貴小賤大示之節儉又按國語觀射父曰郊禘不過繭栗蒸嘗不過把握夫神以精明臨人者也所求備物不求豐大苟失於禮雖多何為豈可捨先王之遺法徇一時之所尚廢棄禮經以從流俗裂冠毀冕將安用之且君子愛人以禮不求苟合況在宗廟敢忘舊章請依古制庶可經久禮部員外郎楊仲昌議曰謹按禮曰夫祭不欲煩煩則黷亦不欲簡簡則怠又鄭玄云人生尚褻食鬼神則不然神農時雖有黍稷猶未有酒醴及後聖作為醴酪猶存玄酒示不忘古春秋曰蘋蘩薀藻之菜潢污行潦之水可羞於王公可薦於鬼神又曰大羹不和粢食不鑿此明君人者有國奉先敬神嚴享豈肥濃以為尚將儉約以表誠則陸海之物鮮肥之類既乖禮文之情而變作者之法皆充祭用非所詳也易曰樽酒簋二用缶納約自牖此明祭存簡易不在繁奢所以一樽之酒二簋之奠為明祀也抑又聞之夫義以出禮禮以體政違則有紊是稱不經薦肥濃則褻味有登加籩爵則事非師古與其別行新制寧如謹守舊章時太子賓客崔沔戶部郎中楊伯成左衛兵曹劉秩等皆建議以為請依舊禮不可改易於是宰臣等具沔述等議以奏玄宗曰朕承祖宗休德至於享祀粢盛實思豐潔禮物之具諒在昭忠其非芳潔不應法制者亦不可用以是更令太常量加品味韋縚又奏請每室加籩豆各六每四時異品以當時新果及珍羞同薦制可之又酌獻酒爵玄宗令用籥升一升合於古義而多少適中自是常依行焉後漢世祖光武皇帝葬于原陵其子孝明帝追思不已永平元年乃率諸侯王公卿正月朝于原陵親奉先后陰氏葬奩篋笥悲慟左右侍臣莫不嗚咽梁武帝父丹陽尹順之追尊為太祖文帝先葬丹徒亦尊為建陵武帝即大位後大同十五年亦朝于建陵有紫雲蔭覆陵上食頃方滅梁主著單衣介幘設次而拜望陵流哭淚之所霑草皆變色陵傍有枯泉至時而水流香潔因謂侍臣曰陵陰石虎與陵俱創二百餘年恨小可更造碑石柱麟並二陵中道門為三闥園陵職司並賜一級奉辭諸陵哭踴而拜周太祖文帝葬於成陵其子明帝初立元年十二月謁于成陵高祖神堯葬於獻陵貞觀十三年正月乙巳太宗朝于獻陵先是日宿衛設黃麾仗周衛陵寢至是質明七廟子孫及諸侯百僚蕃夷君長皆陪列于司馬門內皇帝至小次降輿納履哭於闕門西面再拜慟絶不能興禮畢改服入于寢宮親執饌閲視高祖及先后服御之物匍匐牀前悲慟左右侍御者莫不歔欷初甲辰之夜大雨雪及皇帝入陵院悲號哽咽百辟哀慟是時雪益甚寒風暴起有蒼雲出於山陵之上俄而流布天地晦冥至禮畢皇帝出自寢宮步過司馬門北泥行二百餘步於是風靜雪止雲氣歇滅天色開霽觀者竊議以為孝感之所致焉是日曲赦三原縣及從官衛士等大辟已下已發覺未發覺皆釋其罪免民一年租賦有八十已上及孝子順孫義夫節婦魚衆寡孤獨有篤疾者賜物各有差宿衛陵邑中郎將衛士齊員及三原令以下各賜爵一級丁未至自獻陵己酉朝于太極殿庚子會羣臣奏功成慶善及破陳之樂玄宗開元十七年十一月丙申親謁橋陵皇帝望陵涕泣左右並哀感進奉先縣同赤縣以所管萬三百戶供陵寢三府兵馬供衛曲赦縣內大辟罪已下戊戌謁定陵己亥謁獻陵壬寅謁昭陵己巳謁乾陵戊申車駕還宮大赦天下流移人並放還左降官移近處百姓無出今年地稅之半每陵取側近六鄉以供陵寢皇帝初至橋陵質明柏樹甘露降曙後祥煙遍空皇帝謁昭陵陪葬功臣盡來受饗風吹飀飀若神祇之所集陪位文武百僚皆聞先聖嘆息功臣蹈舞之聲皆以為至孝所感天寶二年八月制自今已後每至九月一日薦衣於陵寢十三載改獻昭乾定橋五陵署為臺其署令改為臺令加舊一級
