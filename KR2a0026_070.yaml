body:
  text: 舊唐書卷六十六列傳第十六房玄齡子遺直遺愛杜如晦弟楚客叔淹房喬字玄齡齊州臨淄人曾祖翼後魏鎮遠將軍宋安郡守襲壯武伯祖熊字子釋褐州主簿父彥謙好學通涉五經隋涇陽令隋書有傳玄齡幼聰敏博覽經史工草隸善屬文嘗從其父至京師時天下寧晏論者咸以國祚方永玄齡乃避左右告父曰隋帝本無功德但誑惑黔黎不為後嗣長計混諸嫡庶使相傾奪儲后藩枝競崇淫侈終當內相誅夷不足保全家國今雖清平其亡可翹足而待彥謙驚而異之年十八本州舉進士授羽騎尉吏部侍郎高孝基素稱知人見之深相嗟挹謂裴矩曰僕閲人多矣未見如此郎者必成偉器但恨不覩其聳壑凌霄耳父病綿歷十旬玄齡盡心藥膳未嘗解衣交睫父終酌飲不入口者五日後補隰城尉會義旗入關太宗徇地渭北玄齡杖策謁於軍門溫彥博又薦焉太宗一見便如舊識署渭北道行軍記室參軍玄齡既遇知己罄竭心力知無不為賊寇每平衆人競求珍玩玄齡獨先收人物致之幕府及有謀臣猛將皆與之潛相申結各盡其死力既而隱太子見太宗勳德尤盛轉生猜間太宗嘗至隱太子所食中毒而歸府中震駭計無所出玄齡因謂長孫無忌曰今嫌隙已成禍機將發天下恟恟人懷異志變端一作大亂必興非直禍及府朝正恐傾危社稷此之際會安可不深思也僕有愚計莫若遵周公之事外寧區夏內安宗社申孝養之禮古人有云為國者不顧小節此之謂歟孰若家國淪亡身名俱滅乎無忌曰久懷此謀未敢披露公今所説深會宿心無忌乃入白之太宗召玄齡謂曰阽危之兆其迹已見將若之何對曰國家患難今古何殊自非睿聖欽明不能安輯大王功蓋天地事鍾壓紐神贊所在匪藉人謀因與府屬杜如晦同心戮力仍隨府遷授秦王府記室封臨淄侯又以本職兼陝東道大行臺考功郎中加文學館學士玄齡在秦府十餘年常典管記每軍書表奏駐馬立成文約理贍初無稿草高祖嘗謂侍臣曰此人深識機宜足堪委任每為我兒陳事必會人心千里之外猶對面語耳隱太子以玄齡如晦為太宗所親禮甚惡之譖之於高祖由是與如晦並被驅斥隱太子將有變也太宗令長孫無忌召玄齡及如晦令衣道士服潛引入閣計事及太宗入春宮擢拜太子右庶子賜絹五千匹貞觀元年代蕭瑀為中書令論功行賞以玄齡及長孫無忌杜如晦尉遲敬德侯君集五人為第一進爵邢國公賜實封千三百戶太宗因謂諸功臣曰朕公等勳效量定封邑恐不能盡當各許自言皇從父淮安王神通進曰義旗初起臣率兵先至今房玄齡杜如晦等刀筆之吏功居第一臣竊不服上曰義旗初起人皆有心叔父雖率得兵來未嘗身履行陳山東未定受委專征建德南侵全軍陷沒及劉黑闥翻動叔父望風而破今計勳行賞玄齡等有籌謀帷幄定社稷之功所以漢之蕭何雖無汗馬指蹤推轂故得功居第一叔父於國至親誠無所愛必不可緣私濫與功臣同賞耳初將軍丘師利等咸自矜其功或攘袂指天以手畫地及見神通理屈自相謂曰陛下以至公行賞不私其親吾屬何可妄訴三年拜太子少師固讓不受攝太子詹事兼禮部尚書明年代長孫無忌為尚書左僕射改封魏國公監修國史既任總百司虔恭夙夜盡心竭節不欲一物失所聞人有善若己有之明達吏事飾以文學審定法令意在寬平不以求備取人不以己長格物隨能收無隔卑賤論者稱為良相焉或時以事被譴則纍日朝堂稽顙請罪悚懼踧踖若無所容九年護高祖山陵制度以功加開府儀同三司十一年與司空長孫無忌等十四人並代襲刺史以本官為宋州刺史改封梁國公事竟不行十三年加太子少師玄齡頻表請解僕射詔報曰夫選賢之義無私為本奉上之道當仁是貴列代所以弘風通賢所以協德公忠肅恭懿明允篤誠草昧霸圖綢繆帝道儀刑黃閣庶政惟和輔翼春宮望實斯著而忘彼大體徇茲小節雖恭教諭之職乃辭機衡之務豈所謂弼豫一人共安四海者也玄齡遂以本官就職時皇太子將行拜禮備儀以待之玄齡深自卑損不敢修謁遂歸於家有識者莫不重其崇讓玄齡自以居端揆十五年女為韓王妃男遺愛尚高陽公主實顯貴之極頻表辭位優詔不許十六年又與士廉等同撰文思博要成錫賚甚優進拜司空仍綜朝政依舊監修國史玄齡抗表陳讓太宗遣使謂之曰昔留侯讓位竇融辭榮自懼盈滿知進能退善鑒止足前代美之公亦欲齊蹤往哲實可嘉尚然國家久相任使一朝忽無良相如失兩手公若筋力不衰無煩此讓玄齡遂止十七年與司徒長孫無忌等圖形於凌煙閣贊曰才兼藻翰思入機神當官勵節奉上忘身高宗居春宮加玄齡太子太傅仍知門下省事監修國史如故尋以撰高祖太宗實録成降璽書褒美賜物一千五百段其年玄齡丁繼母憂去職特敕賜以昭陵葬地未幾起復本官太宗親征遼東命玄齡京城留守手詔曰公當蕭何之任朕無西顧之憂矣軍戎器械戰士糧廩並委令處分發遣玄齡屢上言敵不可輕尤宜誡慎尋與中書侍郎褚遂良受詔重撰晉書於是奏取太子左庶子許敬宗中書舍人來濟著作郎陸元仕劉子翼前雍州刺史令狐德棻太子舍人李義府薛元超起居郎上官儀等八人分功撰録以臧榮緒晉書為主參考諸家甚為詳洽然史官多是文詠之士好採詭謬碎事以廣異聞又所評論競為綺豔不求篤實由是頗為學者所譏唯李淳風深明星曆善於著述所修天文律曆五行三志最可觀採太宗自著宣武二帝及陸機王羲之四論於是總題云御撰至二十年書成凡一百三十卷詔藏于祕府頒賜加級各有差玄齡嘗因微譴歸第黃門侍郎褚遂良上疏曰君為元首臣號股肱龍躍雲興不嘯而集苟有時來千年朝暮陛下昔在布衣心懷拯溺手提輕劍仗義而起平諸寇亂皆自神功文經之助頗由輔翼為臣之勤玄齡為最昔呂望之扶周武伊尹之佐成湯蕭何關中王導江外方之於斯可以為匹且武德初策名伏事忠勤恭孝衆所同歸而前宮海陵憑凶恃亂干時事主人不自安居纍卵之危有倒懸之急命視一刻身縻寸景玄齡之心終始無變及九年之際機臨事迫身被斥逐闕於謨謀猶服道士之衣與文德皇后同心影助其於臣節自無所負及貞觀之始萬物惟新甄吏事君物論推與而勳庸無比委質惟舊自非罪狀無赦搢紳同尤不可以一犯一愆輕示遐棄陛下必矜玄齡齒髮薄其所為古者有諷諭大臣遣其致仕自可在後式遵前事退之以禮不失善聲今數十年勳舊以一事而斥逐在外云云以為非是夫天子重大臣則人盡其力輕去就則物不自安臣以庸薄忝預左右敢冒天威以申管見二十一年太宗幸翠微宮授司農卿李緯為民部尚書玄齡時在京城留守會有自京師來者太宗問曰玄齡聞李緯拜尚書如何對曰玄齡但云李緯好髭鬚更無他語太宗遽改授緯洛州刺史其為當時準的如此二十二年駕幸玉華宮時玄齡舊疾發詔令臥總留臺及漸篤追赴宮所乘擔輿入殿將至御座乃下太宗對之流涕玄齡亦感咽不能自勝敕遣名醫救療尚食每日供御膳若微得減損太宗即喜見顏色如聞增劇便為改容悽愴玄齡因謂諸子曰吾自度危篤而恩澤轉深若孤負聖君則死有餘責當今天下清謐咸得其宜唯東討高麗不止方為國患主上含怒意決臣下莫敢犯顏吾知而不言則銜恨入地遂抗表諫曰臣聞兵惡不戢武貴止戈當今聖化所覃無遠不屆洎上古所不臣者陛下皆能臣之所不制者皆能制之詳觀今古為中國患害者無如突厥遂能坐運神策不下殿堂大小可汗相次束手分典禁衛執戟行間其後延陀鴟張尋就夷滅鐵勒慕義請置州縣沙漠以北萬里無塵至如高昌叛換於流沙吐渾首鼠於積石偏師薄伐俱從平蕩高麗歷代逋誅莫能討擊陛下責其逆亂弒主虐人親總六軍問罪遼碣未經旬月即拔遼東前後虜獲數十萬計分配諸州無處不滿雪往代之宿恥掩崤陵之枯骨比功較德萬倍前王此聖心之所自知微臣安敢備説且陛下仁風被於率土孝德彰於配天覩夷狄之將亡則指期數歲授將帥之節度則決機萬里屈指而候驛視景而望書符應若神算無遺策擢將於行伍之中取士於凡庸之末遠夷單使一見不忘小臣之名未嘗再問箭穿七札弓貫六鈞加以留情墳典屬意篇什筆邁鍾張辭窮班馬文鋒既振則管磬自諧輕翰暫飛則花花競發撫萬姓以慈遇羣臣以禮褒秋毫之善解吞舟之網逆耳之諫必聽膚受之訴斯絶好生之德焚障塞於江湖惡殺之仁息鼓刀於屠肆鳧鶴荷稻粱之惠犬馬蒙帷蓋之恩降乘吮思摩之瘡登堂臨魏徵之柩哭戰亡之卒則哀動六軍負填道之薪則精感天地重黔黎之大命特盡心於庶獄臣心識昏憒豈足論聖功之深遠談天德之高大哉陛下兼衆美而有之靡不備具微臣深為陛下惜之重之愛之寶之周易曰知進而不知退知存而不知亡知得而不知喪又曰知進退存亡不失其正者惟聖人乎由此言之進有退之義存有亡之機得有喪之理老臣所以為陛下惜之者蓋此謂也老子曰知足不辱知止不殆謂陛下威名功德亦可足矣拓地開疆亦可止矣彼高麗者邊夷賤類不足待以仁義不可責以常禮古來以魚鱉畜之宜從闊略若必欲絶其種類恐獸窮則搏且陛下每決一死囚必令三覆五奏進素食停音樂者蓋以人命所重感動聖慈也況今兵士之徒無一罪戾無故驅之於行陳之間委之於鋒刃之下使肝腦塗地魂魄無歸令其老父孤兒寡妻慈母望轊車而掩泣抱枯骨以摧心足以變動陰陽感傷和氣實天下冤痛也且兵者凶器戰者危事不得已而用之向使高麗違失臣節陛下誅之可也侵擾百姓而陛下滅之可也久長能為中國患而陛下除之可也有一於此雖日殺萬夫不足為愧今無此三條坐煩中國內為舊王雪恥外為新羅報讎豈非所存者小所損者大願陛下遵皇祖老子止足之誡以保萬代巍巍之名發霈然之恩降寬大之詔順陽春以布澤許高麗以自新焚凌波之船罷應募之衆自然華夷慶賴遠肅邇安臣老病三公旦夕入地所恨竟無塵露微增海嶽謹罄殘魂餘息預代結草之誠倘蒙録此哀鳴即臣死且不朽太宗見表謂玄齡子婦高陽公主曰此人危惙如此尚能憂我國家後疾增劇遂鑿苑牆開門纍遣中使候問上又親臨握手別悲不自勝皇太子亦就之與之訣即目授其子遺愛右衛中郎將遺則中散大夫使及目前見其通顯尋薨年七十廢朝三日册贈太尉并州都督諡曰文昭給東園祕器陪葬昭陵玄齡嘗誡諸子以驕奢沉溺必不可以地望凌人故集古今聖賢家誡書於屏風令各取一具謂曰若能留意足以保身成名又云袁家纍葉忠節是吾所尚汝宜師之高宗嗣位詔配享太宗廟庭子遺直嗣永徽初為禮部尚書汴州刺史次子遺愛尚太宗女高陽公主拜駙馬都尉官至太府卿散騎常侍初主有寵於太宗故遺愛特承恩遇與諸主壻禮秩絶異主既驕恣謀黜遺直而奪其封爵永徽中誣告遺直無禮於己高宗令長孫無忌鞠其事因得公主與遺愛謀反之狀遺愛伏誅公主賜自盡諸子配流嶺表遺直以父功特宥之除名為庶人停玄齡配享杜如晦字克明京兆杜陵人也曾祖皎周贈開府儀同大將軍遂州刺史祖徽周河內太守祖果周溫州刺史入隋工部尚書義興公周書有傳父吒隋昌州長史如晦少聰悟好談文史隋大業中以常調預選吏部侍郎高孝基深所器重顧謂之曰公有應變之才當為棟梁之用願保崇令德今欲俯就卑職為須少祿俸耳遂補滏陽尉尋棄宮而歸太宗平京城引為秦王府兵曹參軍俄遷陝州總管府長史時府中多英俊被外遷者衆太宗患之記室房玄齡曰府僚去者雖多蓋不足惜杜如晦聰明識達王佐才也若大王守藩端拱無所用之必欲經營四方非此人莫可太宗大驚曰爾不言幾失此人矣遂奏為府屬後從征薛仁杲劉武周王世充竇建德嘗參謀帷幄時軍國多事剖斷如流深為時輩所服纍遷陝東道大行臺司勳郎中封建平縣男食邑三百戶尋以本官兼文學館學士天策府建以為從事中郎畫象於丹青者十有八人而如晦為冠首令文學褚亮為之贊曰建平文雅休有烈光懷忠履義身立名揚其見重如此隱太子深忌之謂齊王元吉曰秦王府中所可憚者唯杜如晦與房玄齡耳因譖之於高祖乃與玄齡同被斥逐後又潛入畫策及事捷與房玄齡功等擢拜太子左庶子俄遷兵部尚書進封蔡國公賜實封千三百戶貞觀二年以本官檢校侍中攝吏部尚書仍總監東宮兵馬事號為稱職三年代長孫無忌為尚書右僕射仍知選事與房玄齡共掌朝政至於臺閣規模及典章文物皆二人所定甚獲當代之譽談良相者至今稱房杜焉如晦以高孝基有知人之鑒為其樹神道碑以紀其德其年冬遇疾表請解職許之祿賜特依舊太宗深憂其疾頻遣使存問名醫上藥相望於道四年疾篤令皇太子就第臨問上親幸其宅撫之流涕賜物千段及其未終見子拜官遂超遷其子左千牛構為尚舍奉御尋薨年四十六太宗哭之甚慟廢朝三日贈司空徙封萊國公諡曰成太宗手詔著作郎虞世南曰朕與如晦君臣義重不幸奄從物化追念勳舊痛悼于懷卿體吾此意為制碑文也太宗後因食瓜而美愴然悼之遂輟食之半遣使奠於靈座又嘗賜房玄齡黃銀帶顧謂玄齡曰昔如晦與公同心輔朕今日所賜唯獨見公因泫然流涕又曰朕聞黃銀多為鬼神所畏命取黃金帶遣玄齡親送於靈所其後太宗忽夢見如晦若平生及曉以告玄齡言之歔欷令送御饌以祭焉明年如晦亡日太宗復遣尚宮至第慰問其妻子其國官府佐並不之罷終始恩遇未之有焉子構襲爵官至慈州刺史坐弟荷謀逆徙於嶺表而卒初荷以功臣子尚城陽公主賜爵襄陽郡公授尚乘奉御貞觀中與太子承乾謀反坐斬如晦弟楚客少隨叔父淹沒於王世充淹素與如晦兄弟不睦譖如晦兄於王行滿王世充殺之并囚楚客幾至餓死楚客竟無怨色洛陽平淹當死楚客泣涕請如晦救之如晦初不從楚客曰叔已殺大兄今兄又結恨棄叔一門之內相殺而盡豈不痛哉因欲自剄如晦感其言請於太宗淹遂蒙恩宥楚客因隱於嵩山貞觀四年召拜給事中上謂曰聞卿山居日久志意甚高自非宰相之任則不能出何有是理耶夫涉遠者必自邇升高者必自下但在官為衆所許無慮官之不大爾兄雖與我體異其心猶一於我國家非無大功為憶爾兄意欲見爾宜識朕意繼爾兄之忠義也拜楚客蒲州刺史甚有能名後歷魏王府長史拜工部尚書攝魏王泰府事楚客知太宗不悅承乾魏王泰又潛令楚客友朝臣用事者至有懷金以賂之因説泰聰明可為嫡嗣人或以聞太宗隱而不言及釁發太宗始揚其事以其兄有佐命功免死廢于家尋授虔化令卒如晦叔父淹淹字執禮祖周豫州刺史父徵河內太守淹聰辨多才藝弱冠有美名與同郡韋福嗣為莫逆之交相與謀曰上好用嘉遁蘇威以幽人見徵擢居美職遂共入太白山揚言隱逸實欲邀求時譽隋文帝聞而惡之謫戍江表後還鄉里雍州司馬高孝基上表薦之授承奉郎大業末官至御史中丞王世充僭號署為吏部大見親用及洛陽平初不得調淹將委質於隱太子時封德彝典選以告房玄齡恐隱太子得之長其姦計於是遽啓太宗引為天策府兵曹參軍文學館學士武德八年慶州總管楊文幹作亂辭連東宮歸罪於淹及王圭韋挺等並流於越巂太宗知淹非罪贈以黃金三百兩及即位徵拜御史大夫封安吉郡公賜實封四百戶以淹多識典故特詔東宮儀式簿領並取淹節度尋判吏部尚書參議朝政前後表薦四十餘人後多知名者淹嘗薦刑部員外郎邸懷道太宗因問淹懷道才行何如淹對曰懷道在隋日作吏部主事甚有清慎之名又煬帝向江都之日召百官問去住之計時行計已決公卿皆阿旨請去懷道官位極卑獨言不可臣目見此事太宗曰卿爾日從何計對曰臣從行計太宗曰事君之義有犯無隱卿稱懷道為是何因自不正諫對曰臣爾日不居重任又知諫必不從徒死無益太宗曰孔子稱從父之命未為孝子故父有爭子國有爭臣若以主之無道何為仍仕其世既食其祿豈得不匡其非因謂羣臣曰公等各言諫事如何王圭曰昔比干諫紂而死孔子稱其仁泄冶諫而被戮孔子曰民之多辟無自立辟是則祿重責深理須極諫官卑望下許其從容太宗又召淹笑謂曰卿在隋日可以位下不言近仕世充何不極諫對曰亦有諫但不見從太宗曰世充若修德從善當不滅亡既無道拒諫卿何免禍淹無以對太宗又曰卿在今日可為備任復欲極諫否對曰臣在今日必盡死無隱且百里奚在虞虞亡在秦秦霸臣竊比之太宗笑時淹兼二職而無清潔之譽又素與無忌不協為時論所譏及有疾太宗親自臨問賜帛三百匹貞觀二年卒贈尚書右僕射諡曰襄子敬同襲爵官至鴻臚少卿敬同子從則中宗時為蒲州刺史史臣曰房杜二公皆以命世之才遭逢明主謀猷允協以致升平議者以比漢之蕭曹信矣然萊成之見用文昭之所舉也世傳太宗嘗與文昭圖事則曰非如晦莫能籌之及如晦至焉竟從玄齡之策也蓋房知杜之能斷大事杜知房之善建嘉謀裨諶草創東里潤色相須而成俾無悔事賢達用心良有以也若以往哲方之房則管仲子産杜則鮑叔罕虎矣贊曰肇啓聖君必生賢輔猗歟二公實開運祚文含經緯謀深夾輔笙磬同音唯房與杜
