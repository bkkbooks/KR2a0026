body:
  text: 舊書卷十一本紀第十一代宗代宗睿文孝武皇帝諱豫肅宗長子母曰章敬皇太后吳氏以開元十四年十二月十三日生于東都上陽宮初名俶年十五封廣平王玄宗諸孫百餘上為嫡皇孫宇量弘深寬而能斷喜懼不形於色仁孝溫恭動必由禮幼而好學尤專禮易玄宗鍾愛之祿山之亂京城陷賊從肅宗搜兵靈武以上為天下兵馬元帥時朝廷草創兵募寡弱上推心示信招懷流散比至彭原兵衆數萬及肅宗回幸鳳翔時房琯郭子儀繼戰不利賊鋒方鋭屢來寇襲上選求勇幹頻挫其鋒聖慮遑寧士心大振及師進討百官辭送步出闕門方始乘馬回紇葉護王子率兵入助勇冠諸蕃上接以優恩結為兄弟故香積之戰賊徒大敗遂委西京而遁雖子儀嗣業之奮命由上恩信結於士心故人思自效既收京城令行禁止民庶按堵秋毫不犯耆老歡迎對之歔欷聞賊殘衆猶保陝郊即日長驅東趨虢洛新店之役一戰大捷慶緒之黨十殲七八數旬之間河南底定兩都恢復二聖回鑾統率之功推而不受肅宗還京大赦改封楚王乾元元年三月改封成王四月庚寅立為皇太子改名豫上元末年兩宮不豫太子往來侍疾躬嘗藥膳衣不解帶者久之及承監國之命流涕從之寶應元年四月肅宗大漸所幸張皇后無子后懼上功高難制陰引越王係於宮中將圖廢立乙丑皇后矯詔召太子中官李輔國程元振素知之乃勒兵於凌霄門俟太子至即衛從太子入飛龍以俟其變是夕勒兵於三殿收捕越王係及內官朱光輝馬英俊等禁錮之幽皇后於別殿丁卯肅宗崩元振等始迎上於九仙門見羣臣行監國之禮己巳即皇帝位於柩前甲戌詔國之大事戎馬為先朝有舊章親賢是屬故求諸必當用制於中權存乎至公豈慚於內舉特進奉郡王適可天下兵馬元帥乙亥以兵部尚書判元帥行軍間等使李輔國進號尚父飛龍間副使程元振為右監門將軍流宦官朱光輝啖庭瑤陳仙甫等於黔中五月己卯朔以李輔國為司空兼中書令餘如故辛卯制曰三年之喪天下達禮苟或變革何以教人朕遘此閔凶攀號罔極公卿固請俾聽朝務斬焉縗絰痛貫心靈豈可便議公除遽移諒暗昨見所司儀注今月十三日大祥十五日從吉仰憑遺制又欲抑豫竊惟哀思深謂未可其百僚並以此釋服朕將繼武丁之道素冠之詩恭默再周不忍權奪凡庶在位宜悉哀懷宰臣苗晉卿等三上表請依遺制方聽政丙戌嗣魯王宇改封鄒王奉節郡王適進封魯王李光弼進封臨淮王貶禮部尚書蕭華為陝州司馬改行乾元錢重稜小錢一當二重稜大錢一當三丙申以戶部侍郎元載同中書門下平章事充度支轉運使改乾元大小錢並一當一丁酉御丹鳳樓大赦子儀光弼李光進諸道節度使並加實封四月十七日立功人並號寶應功臣內外文武官三品已上進爵四品已下加階諸州防禦使並停內外官三考一轉益昌郡王邈進封鄭王延慶郡王迥進封韓王故庶人皇后王氏故庶人太子瑛鄂王瑤光王琚並宜復封號棣王琰永王璘並與昭雪建昌王追封齊王崇恩王追封衛王靈昌王追封鄆王壬寅以來瑱復為襄州刺史山南東道節度使六月己酉朔百僚臨于西宮上不視朝自是每朔望皆如之迄于山陵凡人臣有事辭見先臨西宮然後詣朝改豫州為蔡州避上名也侍中苗晉卿以老疾請三日一入中書從之己未罷尚父李輔國判元帥行軍及兵部尚書間等使輔國請遜位辛酉以輔國為博陸王罷中書令許朝朔望壬申以通州刺史劉晏為戶部侍郎兼御史大夫京兆尹充度支轉運鹽鐵諸道鑄錢等使秋七月己卯朔辛巳觀軍容使魚朝恩封馮翊郡開國公宦官程元振為鎮軍大將軍保定郡開國公乙酉襄州刺史裴茙長流費州賜死於藍田驛庚寅詔不許匭使閲投匭人文狀賜道州司馬敬羽自盡來瑱自襄州來朝郭子儀自河中來朝八月己酉朔自七月不雨至此月癸丑方雨庚午夜西北有赤光亙天貫紫微漸移東北彌漫半天貶太子少傅李遵為袁州刺史台州賊袁朝陷台州連陷浙東州縣九月丁丑朔魯王適改封雍王以山南東道節度使來瑱為兵部尚書同中書門下平章事節度如故程元振進封邠國公丙申右僕射山陵使裴冕貶施州刺史戊戌回紇登里可汗率衆來助國討逆令御史大夫尚衡宣慰之甲午太州至陝州二百餘里黃河清澄徹見底甲午祕書監韓穎中書舍人劉烜配流嶺表尋賜死坐狎昵李輔國也冬十月辛酉詔天下兵馬元帥雍王統河東朔方及諸道行營回紇等兵十餘萬討史朝義會軍於陝州加朔方行營節度使大寧郡王僕固懷恩同中書門下平章事丁卯夜盜殺李輔國於其第竊首而去戊辰元帥雍王率諸軍進發留郭英乂魚朝恩鎮陝州壬申王師次洛陽北郊甲戌戰于橫水賊大敗俘斬六萬計史朝義奔冀州乙亥雍王奏收東京河陽汴鄭滑相魏等州乙酉陝西節度使郭英乂權知東京留守丁酉僞恆州節度使張忠志以趙定深恆易五州歸順以忠志檢校禮部尚書恆州刺史充成德軍節度使賜姓名曰李寶臣於是河北州郡悉平賊范陽尹李懷仙斬史朝義首來獻請降十二月庚戌太子太師邠國公韋見素薨辛未僕固懷恩為尚書左僕射兼中書令靈州大都督府長史河北副元帥邛州新置鎮南軍是歲江東大疫死者過半吐蕃陷我臨洮秦成渭等州二年春正月丁亥朔甲午戶部尚書兼御史大夫都統淮南節度觀察等使越國公李峘卒國子祭酒兼御史大夫京兆尹劉晏為吏部尚書同中書門下平章事度支諸使如故壬寅制開府儀同三司行兵部尚書同中書門下平章事充山南東道節度觀察處置等使上柱國潁國公來瑱削在身官爵長流播州尋賜死于路閏月戊申以史朝義下降將李寶臣為檢校禮部尚書兼御史大夫恆州刺史清河郡王充成德軍節度使薛嵩為檢校刑部尚書相州刺史相衛等州節度使李懷仙檢校兵部尚書兼侍中武威郡王幽州節度使田承嗣檢校戶部尚書魏州刺史鴈門郡王魏博等州都防禦使二月甲午回紇登里可汗辭歸蕃三月甲辰朔襄州右兵馬使梁崇義殺大將李昭據城自固乃授崇義襄州刺史山南東道節度使丁未袁破袁朝之衆於浙東玄宗肅宗歸祔山陵自三月一日廢朝至於晦日百僚素服詣延英門通名起居四月戊寅朔太州依舊為華州太陰縣為華陰縣庚辰河南副元帥李光弼奏生擒袁朝浙東州縣盡平辛巳羣臣請上尊號五月癸卯朔丙寅尚書省試制舉人命左右丞侍郎對試賜食如舊儀太常卿杜鴻漸奏婚葬合給鹵簿望於國立大功及二等已上親則給餘不在給限從之六月癸酉朔癸未以陳鄭澤潞節度使李抱玉檢校司空封武威郡王河中節度使王昂檢校刑部尚書封國公同華節度使李懷讓檢校工部尚書同日入省宰相送上甲申以前淮西節度使王仲升為右羽林大將軍兼御史大夫六軍將軍兼大夫自仲升始也甲午觀軍容使魚朝恩自陝州入朝上御達禮門命公卿百僚觀兵馬同華節度使李懷讓自殺為程元振所構秋七月壬寅朔戊申羣臣上尊號曰寶應元聖文武皇帝御含元殿受冊壬子御宣政殿宣制改元曰廣德大赦天下常赦不原者咸赦除之安祿山史思明親族應在諸道一切原免不問民戶三丁免一丁庸租稅依舊每畝二升男子二十成丁五十入老元帥雍王兼尚書令河北副元帥僕固懷恩加太保回紇登里可汗進徽號功臣皆賜鐵券藏名太廟畫像凌烟閣刺史縣令自今後改轉刺史以三年為限縣令四年為限員外及攝試不得釐務丁巳僕固瑒兼御史大夫充朔方行營節度是月吐蕃大寇河隴陷我秦成渭三州入大震關陷蘭廓河鄯洮岷等州盜有隴右之地八月以荊南節度使李峴為宗正卿九月壬戌朔僕固懷恩拒命於汾州遣宰臣裴遵慶往宣撫之己丑吐蕃寇涇州刺史高暉以城降因為吐蕃鄉導冬十月庚午朔辛未高暉引吐蕃犯京畿寇奉天武功盩厔等縣蕃軍自司竹園渡渭循南山而東丙子駕幸陝州上出苑門射生將王獻忠率四百騎叛脅豐王已下十王歸京從官多由南山諸谷赴行在郭子儀收合散卒屯於商州丁丑次華州官吏藏竄無復儲擬會魚朝恩領神策軍自陝來迎駕乃幸朝恩軍戊寅吐蕃入京師立廣武王承宏為帝仍逼前翰林學士于可封為制封拜辛巳車駕至陝州子儀在商州會六軍使張知節烏崇福長孫全緒等率兵繼至軍威遂振舊將王甫誘聚京城惡少齊擊街鼓於朱雀街蕃軍震懾狼狽奔潰庚寅子儀收京城壬辰以宰臣元載判天下元帥行軍司馬京兆尹兼吏部侍郎嚴武為黃門侍郎朗州刺史第五琦為京兆尹兼御史大夫癸巳以郭子儀為京留守高暉聞吐蕃潰以三百騎東奔至潼關為關守李伯越所殺十一月辛丑朔太常博士柳伉上疏以蕃寇犯京師罪由程元振請斬之以謝天下上甚嘉納以元振有保護之功削在身官爵放歸田里十二月甲辰宦官市舶使呂太一逐廣南節度使張休縱下大掠廣州丁亥車駕發陝郡還京辛卯鄂州大風火發江中焚船三千艘焚居人廬舍二千家甲午上至自陝州乙未以侍中苗晉卿為太保黃門侍郎同平章事裴遵慶為太子少傅並罷知政事宗正卿梁國公李峴為黃門侍郎同中書門下平章事丙申放廣武王承宏于華州一切不問丁酉朔方行營節度使僕固瑒為帳下梟首來獻懷恩聞瑒死燒營遁入吐蕃朝臣稱賀上不悅曰朕之涼德信不及人致勳臣顛覆用增愧恧何至賀焉程元振自三原縣衣婦人服入京城京兆府擒之以聞乃下御史臺鞫問吐蕃陷松州維州雲山城籠城二年春正月己亥朔壬寅御史臺以程元振獄狀聞配流溱州既行追念舊勳特矜遐裔令於江陵府安置甲辰復置京畿觀察使以御史中丞領之癸卯尚書右丞顏真卿為刑部尚書兼御史大夫充朔方宣慰使癸亥吏部尚書同平章事度支轉運使劉晏為太子賓客黃門侍郎同平章事李峴為太子詹事並罷知政事以前右散騎常侍王縉為黃門侍郎太常卿杜鴻漸為兵部侍郎並同中書門下平章事罷度支使以戶部侍郎第五琦專判度支及諸道鹽鐵轉運鑄錢等使甲子元帥尚書令雍王三上章讓皇太子第五琦奏諸道置常平倉使司量置本錢和糴許之丁卯司徒兼中書令郭子儀充河東副元帥河中等處觀察兼雲州大都督單于鎮北大都護二月己巳朔冊天下兵馬元帥尚書令雍王適皇太子癸酉上親薦獻太清宮太廟乙亥祀昊天上帝於圓丘即日還宮戊寅以澧州刺史裴冕為左僕射兼御史大夫充東都河南江南淮南轉運使乙未第五琦開決汴河五月丁酉朔戊午敕中書門下兩省加置散騎常侍四員官為正三品庚申罷歲貢孝悌力田童子等科甲子禁鈿作珠翠等委所司切加捉搦癸未制太保兼中書令靈州大都督府長史單于鎮北副大都護充朔方節度關內度支營田鹽池押諸蕃部落副大使知節度事六城水運使河北副元帥上柱國大寧郡王僕固懷恩先任靈州大都督府長史單于鎮北副元帥朔方節度使宜並停其太保兼尚書令大寧郡王如故七月己酉河南副元帥太尉兼侍中臨淮王李光弼薨於徐州廢朝三日判度支第五琦兼京兆尹御史大夫八月丁卯宰臣王縉為侍中持節都統河南淮西淮南山南東道節度行營事進封太原郡公固讓侍中從之宰相杜鴻漸判門下省事癸巳王縉兼領東京留守九月乙未朔丙申詔徵河中兵討吐蕃將發是夜軍衆喧譟劫節度使崔寓家財及民家財産殆盡皆重裝而行吏不能禁自七月大雨未止京城米斗值一千文蝗食田丙午河東節度使辛雲京檢校尚書右僕射同中書門下平章事太原尹北京留守己酉江南西道觀察洪州刺史張鎬卒辛亥河東副元帥中書令汾陽郡王郭子儀加太尉充北道邠寧涇原河西已東通和吐蕃及朔方招撫使陳鄭澤潞節度使李抱玉進位司徒充南道通和吐蕃使鳳翔秦隴臨洮已東觀察使子儀三表懇讓太尉許之己未劍南節度嚴武攻拔吐藩當狗城破蕃軍七萬尚書左丞楊綰知東京選禮部侍郎賈至知東都舉兩都分舉選自此始也辛酉以太子詹事李峴為吏部尚書兼御史大夫知江南東西及福建道選事並觀農宣慰使仍命洪州刺史李勉副知選事是秋蝗食田殆盡關輔尤甚米斗千錢冬十月丙寅僕固懷恩引吐蕃二萬寇邠州節度使白孝德閉城拒守丁卯寇奉天京師戒嚴先鋒郭晞斬賊營於邠州西俘斬數百計子儀屯涇陽蕃軍挑戰子儀不出甲申河南尹蘇震卒劍南嚴武奏收吐蕃鹽川城十一月乙未懷恩與蕃軍自潰京師解嚴丁未子儀自涇陽入覲詔宰臣百僚迎之於開遠門上御安福寺待之十二月乙丑加子儀關內河中副元帥兼尚書令吏部侍郎暢璀為左散騎常侍河中尹子儀三表讓尚書令詞情懇切優詔從之丁卯夜星流如雨戊辰子儀於都省領副元帥事宰臣百僚送仍令射生五百騎戎服自光範門送至省門右僕射郭英乂以樂迎之是日便赴奉天是歲戶部計帳管戶二百九十三萬三千一百二十五口一千六百九十二萬三百八十六永泰元年春正月癸巳朔制曰叶五紀者建號以體元授四時者布和而順氣天心可見人欲是從爰立大中之道式受惟新之命朕嗣膺下武獲主萬方顧以薄德乘茲艱運戎麾問罪今已十年飲至策勳惟凶渠之授首勞師黷武豈人主之用心軍役屢興干戈未戢茫茫士庶斃于鋒鏑皇穹以朕為子蒼生以朕為父至德不能被物精誠不能動天俾我生靈淪於溝壑非朕之咎孰之過歟朕所以馭朽懸旌坐而待曙勞懷罪己之念延想安人之策亦惟羣公卿士百辟庶僚咸聽朕命協宣乃力履清白之道還淳素之風率是黎元歸于仁壽君臣一德何以尚茲乃者刑政不修惠化未洽既盡財力良多抵犯靜惟哀矜實軫于懷今將大振綱維益明懲勸肇舉改元之典弘敷在宥之澤可大赦天下改廣德三年為永泰元年是日雪盈尺戊申澤潞李抱玉兼鳳翔隴右節度使兼南道通和吐蕃鳳翔秦隴臨洮已東觀察處置等使仍命四鎮行營節度使馬璘為副和吐蕃使癸丑罷岐州之鳳翔縣併入天興縣乙卯左散騎常侍高適卒戊午劍南節度使嚴武加檢校吏部尚書山南節度使張獻誠加檢校工部尚書以前太子少保王璵為太子少師前袁州刺史李遵為太子少保聽朝朔望二月甲子夜雷霆震擊丁丑內出宮女千人品官六百人守洛陽宮戊寅党項羌寇富平焚定陵寢殿庚辰儀王璲薨諸陵署復隸太常寺戊子河西党項永定等十二州部落內屬請置宜芳等十五州許之三月壬辰朔詔左僕射裴冕右僕射郭英乂太子少傅裴遵慶檢校太子少保白志貞太子詹事臧希讓左散騎常侍暢璀檢校刑部尚書王昂高升檢校工部尚書崔渙吏部侍郎李季卿王延昌禮部侍郎賈至涇王傅吳令瑤等十三人並集賢院待詔上以勳臣罷節制者京師無職事乃合於禁門書院間以文儒公卿寵之也仍特給飧本錢三千貫庚子夜降霜木有冰歲饑米斗千錢諸穀皆貴丙午鳳翔李抱玉讓司徒從之授左僕射同平章事庚戌吐蕃請和詔宰臣元載杜鴻漸與蕃使同盟于興唐寺辛亥大風拔木是春大旱京師米貴斛至萬錢夏四月己巳乃雨戊子太保致仕苗晉卿薨庚寅劍南節度使檢校吏部尚書嚴武卒五月癸丑以尚書右僕射定襄郡王郭英乂為成都尹御史大夫充劍南節度使是月麥稔判度支第五琦奏請十畝稅一畝效古什一而徵從之六月癸亥吏部尚書李峴南選回至江陵貶衢州刺史自春無雷至此月甲申大風而雷代州置代北軍平州置柳城析通州石鼓縣置巴渠縣秋七月辛卯朔淄青節度使侯希逸為副將李懷玉所逐制以鄭王邈為平盧淄青節度大使令懷玉權知留後事以久旱遣近臣分録京城諸獄繫囚甲午升平公主出降駙馬都尉郭曖庚子雨時久旱京師米斗一千四百他穀食稱是八月乙亥河南道副元帥涇原節度使馬璘封扶風郡王九月辛卯太白經天丁酉僕固懷恩死于靈州之鳴沙縣時懷恩誘吐蕃數十萬寇邠州客將尚品息贊磨尚悉東贊等寇奉天醴泉党項羌渾奴剌寇同州及奉天逼鳳翔府盩厔縣京師戒嚴時以星變羌虜入寇內出仁王佛經兩輿付資聖西明二佛寺置百尺高座講之及奴虜寇逼京畿方罷講己酉郭子儀自河中至進屯涇陽李忠臣屯東渭橋李光進屯雲陽馬璘郝玉屯便橋駱奉仙李伯越屯盩厔李抱玉屯鳳翔周智光屯同州杜冕屯坊州上親率六軍屯苑內庚戌下詔親征內官魚朝恩上言請括私馬京城男子悉皂衣團結塞京城二門之一士庶大駭有踰垣鑿竇出城者吏不能禁自丙午至甲寅大雨平地水流丁巳吐蕃大掠京畿男女數萬計焚廬舍而去同華節度周智光以兵追擊于澄城破賊萬計冬十月己未復講仁王經於資聖寺吐蕃至邠州與回紇相遇復合從入寇辛酉逼奉天癸亥党項攻同州焚州民廬舍丁丑郭子儀說諭回紇令與吐蕃疑二庚辰子儀先鋒將白元光合回紇軍擊吐蕃之衆於靈臺縣之西原斬首五萬級俘獲人畜凡三百里不絶辛巳京師解嚴壬午僕固懷恩大將僕固名臣以千騎來降詔稅百官錢市絹十萬以賞回紇乙酉回紇首領胡祿都督來朝癸卯朔方將李回方奏收靈武郡丁亥分宣饒歙戶口於秋浦縣置池州分信州弋陽置貴溪縣閨十月辛卯以京兆少尹黎幹為京兆尹丙午封朔方大將孫守亮等九人為異姓王李國臣等十三人為同姓王丁未百僚上表以軍興急於糧餉請納職田以助費從之戊申進封渭北節度使李光進為武威郡王以刑部侍郎路嗣恭檢校工部尚書兼御史大夫靈州大都督府長史充關內副元帥兼知朔方節度等使劍南節度使郭英乂為其檢校西山兵馬使崔旰所殺邛州柏茂林瀘州楊子琳劍南李昌皆起兵討旰蜀中亂十一月宰臣河南都統王縉請減諸道軍資錢四十萬貫修洛陽宮從之十二月己酉敕如聞諸州承本道節度觀察使牒科役百姓致戶口凋弊此後委轉運使察訪以聞二年春正月丁巳朔大雪平地二尺壬申減子孫襲實封者半租永為常式乙酉制治道同歸師氏為上化人成俗必務于學俊造之士皆從此途國之貴遊罔不受業修文行忠信之教崇祗庸孝友之德盡其師道乃謂成人然後揚于王庭敷以政事徵之以理任之以官置於周行莫匪邦彥樂得賢也其在茲乎朕志承理體尤重儒術先王設教敢不虔行頃以戎狄多虞急於經略太學空設諸生蓋寡絃誦之地寂寥無聲函丈之間殆將不掃上庠及此甚用閔焉今宇縣乂寧文武並備方投戈而講藝俾釋菜以行禮使四科咸進六藝復興神人以和風化浸美日用此道將無間然其諸道節度觀察都防禦等使朕之腹心久鎮方面眷其子弟為奉義方修德立身是資藝業恐干戈之後學校尚微僻居遠方無所咨稟負經來學宜集京師其宰相朝官六軍諸將子弟欲得習學可並補國子學生其中身雖有官欲附學讀書者亦聽其學官委中書門下選行業堪為師範者充其學生員數所習經業供承糧料增修學館委本司條奏以聞丙戌以戶部尚書劉晏充東都京畿河南淮南江南東西道湖南荊南山南東道轉運常平鑄錢鹽鐵等使以戶部侍郎第五琦充京畿關內河東劍南西道轉運常平鑄錢鹽鐵等使至是天下財賦始分理焉二月丁亥朔釋奠於國學賜宰臣百官飧錢五百貫於國學食壬辰鎮南都護依舊為安南都護府乙未貶刑部尚書顏真卿為峽州員外別駕以不附元載載陷之於罪也壬子命黃門侍郎同平章事杜鴻漸兼成都尹持節充山南西道劍南東川等道副元帥仍充劍南西川節度使以平郭英乂之亂也以四鎮行營節度使馬璘兼邠州刺史癸丑以山南西道節度使梁州刺史張獻誠兼充劍南東川節度觀察使邛州刺史柏茂林充邛南防禦使劍南西山兵馬使崔旰為茂州刺史充劍南西山防禦使從杜鴻漸請也三月辛未張獻誠與崔旰戰于梓州為旰所敗僅以身免夏四月辛亥詔尚書省郎中授中州刺史員外郎授下州刺史為定制五月丙辰稅青苗地錢使殿中侍御韋光裔諸道稅地回是歲得錢四百九十萬貫自乾元已來天下用兵百官俸錢折乃議於天下地畝青苗上量配稅錢命御史府差使徵之以充百官俸料每年據數均給之歲以為常式六月戊戌以淮南節度使崔圓檢校尚書右僕射自春旱此月庚子始雨丁未日重輪其夜月重輪秋七月辛酉檢校兵部尚書衢州刺史李峴卒自五月大雨洛水泛溢漂溺居人廬舍二十坊河南諸州水加荊南節度使衛伯玉檢校工部尚書癸未太廟二室芝草生八月丁亥國子監釋奠復用牲牢上元二年詔諸祠獻熟至是魚朝恩請復舊制壬寅以茂州刺史崔旰為成都尹兼御史大夫劍南西川節度行軍司馬邛南防禦使邛州刺史柏茂林為邛南節度使從杜鴻漸所請也癸卯太子少保裴遵慶為吏部尚書吏部尚書崔寓為太子少傅甲辰以開府儀同三司右監衛大將軍觀軍容宣慰處置使神策軍兵馬使上柱國馮翊郡開國公魚朝恩加內侍監判國子監事充鴻臚禮賓等使進封鄭國公辛亥以檢校禮部尚書裴士淹充禮儀使九月庚申京兆尹黎幹以京城薪炭不給奏開漕渠自南山谷口入京城至薦福寺東街北抵景風延喜門入苑闊八尺深一丈渠成是日上幸安福門以觀之丙子宣州刺史李佚坐贓二十四萬貫集衆杖死籍沒其家冬十月癸未朔己丑宗正卿吳王祗奏上皇室永泰新論二十卷太常博士柳芳撰和蕃使楊濟與蕃使論位藏等來朝丙申令宰臣宴論位藏於中書省十一月甲寅乾陵令於陵署得赤兔以獻丙辰詔古者量其國用而立稅典必於經費由之重輕公田之籍可謂通制履畝而稅斯誠弊法所期折中以便於時億兆不康君孰與足故愛人之體先以博施富國之源必均節用朕自臨宸極比屬艱難嘗欲闡淳朴之風守冲儉之道每念黎庶思致和平而邊事猶殷戎車屢駕軍興取給皆出邦畿九伐之師尚勤王略千金之費重困吾人乃者遵冉有之言守周公之制什而稅一務於行古今則編戶流亡而懇田減稅計量入之數甚倍征之法納隍之懼當寧軫懷慮失三農憂深萬姓務從省約稍冀蠲除用申勤恤之懷以救惸嫠之弊京兆府今年合徵八十二萬五千石數內宜減放一十七萬五千石青苗地頭錢宜三分取一在京諸司官員久不請俸頗聞艱辛其諸州府縣官及折衝府官職田據苗子多少三分取一隨處糶貨市輕貨以送上都納青苗錢庫以助均給百官甲子日長至上御含元殿下制大赦天下改永泰二年為大曆元年十二月己亥彗起匏瓜其長尺餘犯宦者星癸卯同華節度使周智光專殺陝州監軍張志斌前虢州刺史龐充據華州謀叛是冬無雪二年春正月壬子朔丁巳密詔關內河東副元帥郭子儀治兵討周智光壬戌貶智光為澧州刺史甲子以兵部侍郎張仲光為華州刺史潼關防禦使大理卿敬括為同州刺史長春宮等使是日周智光帳下將斬智光並子元耀元幹三首傳之以獻己巳詔潼關置兵三千癸酉詔天文著象職在於疇人讖緯不經蠹深於疑衆蓋有國之禁非私家所藏雖裨竈明徵子産尚推之人事王彤必驗景略猶置於典刑况動皆訛謬率是矯誣者乎故聖人以經籍之義資理化之本側言曲學實紊大猷去左道之亂政俾彝倫而攸敘自四方多故一紀于茲或有妄庸輒陳休咎假造符命私習星曆共肆窮鄉之辨相傳委巷之談作僞多端順非僥澤熒惑州縣詿誤閭閻壞紀挾邪莫逾於此其玄象器局天文圖書七曜曆太一雷公式等私家不合輒有今後天下諸州府切宜禁斷本處分明榜示嚴加捉搦先藏蓄此等書者敕到十日內送官本處長吏集衆焚毀限外隱藏為人所告者先決一百留禁奏聞所告人有官即與超資注擬無官者給賞錢五百貫兩京委御史臺處分各州方面勳臣洎百僚庶尹罔不誠亮王室簡于朕心無近憸人慎乃有位端本靜末其誡之哉丁丑升魏州為大都督府戊寅敕同華兩州頃因盜據民力凋殘宜給復二年一切蠲免庚辰禁王公宗子郡縣主之家不得與軍將婚姻交好委御史臺察訪彈奏二月壬午幸昆明池踏青丙戌封華州牙將姚懷為感義郡王李延俊為承化郡王以斬智光之功也郭子儀自河中來朝癸卯宰臣元載王縉左僕射裴冕戶部侍郎第五琦京兆尹黎幹各出錢三十萬置宴於子儀之第三月辛亥夜大風丁巳河中府獻玄狐汴宋節度使田神功來朝戊辰貶太子少保李遵永州司馬坐贓也甲戌魚朝恩宴子儀宰相節度度支使京兆尹於私第乙亥子儀亦置宴于其第戊寅田神功宴于其第時以子儀元臣寇難漸平蹈舞王化乃置酒連宴酒酣皆起舞公卿大臣列坐於席者百人子儀朝恩神功一宴費至十萬貫夏四月己亥以江南西道都團練觀察等使洪州刺史李勉為京兆尹刑部侍郎魏少遊為洪州刺史兼御史大夫江西觀察團練等使庚子宰臣內侍魚朝恩與吐蕃同盟於興唐寺丙午加田神功檢校右僕射癸酉以工部侍郎徐浩為廣州刺史嶺南節度觀察使六月戊戌山南劍南副元帥杜鴻漸自蜀入朝壬寅荊南節度使衛伯玉封城陽郡王癸卯御史大夫王翊卒秋七月戊申朔以右散騎常侍于休烈為檢校工部尚書知省事時方面勳臣升八座者多非正員朝命正員者以知省事為名以中書舍人張延賞檢校河南尹丙寅以劍南西川節度行軍司馬崔旰為劍南西川節度觀察等使遂州刺史杜濟為劍南東川節度觀察等使以杭州刺史張伯儀為安南都護癸酉析道州延唐縣置大曆縣甲戌酉時有白氣竟天八月庚辰鳳翔節度使李抱玉來朝壬午月入氐丙戌渤海朝貢辛卯潭衡水災丙申月犯畢任寅太常卿駙馬都尉姜慶初得罪賜自盡敕陵廟署復隸宗正寺九月戊申朔歲星守東井七日甲寅吐蕃寇靈州進寇邠州詔子儀率師三萬自河中鎮涇陽京師戒嚴戊午夜白霧起西北竟天子儀移鎮奉天乙丑晝有大流星出于午沒于亥命左丞李涵宣慰河北熒惑犯南斗辛未靺鞨使來朝桂州山獠陷州城刺史李良遁去十月戊寅靈州奏破吐蕃二萬京師解嚴甲申減京官職田三分之一給軍糧乙酉醴泉出于櫟陽飲之愈疾回紇党項使來朝癸卯上御紫宸殿策試茂才異行安貧樂道孝悌力田高蹈不仕等四科舉人十一月庚申改黃門侍郎依舊為門下侍郎詔曰春秋以九命作上公而謂之宰臣者三公之職漢制中書令出納詔命典司樞密侍中上殿稱制參議政事魏晉已還益重其任職有關於公府事不係於尚書雖陳啓沃之謀未專宰臣之稱所以委遇斯大品秩非崇至于國朝實執其政當左輔右弼之寄總代天理物之名典領百僚陶鎔景化豈可具瞻之地命數不加固當進以等威副其僉屬其侍中中書令宜升入正二品門下中書侍郎升入正三品壬戌夜月暈南北河東井鎮星入輿鬼久之方散甲子月去軒轅一尺己丑率百官京城士庶出錢以助軍壬申京師地震自東北來其聲如雷十二月甲申鳳翔李抱玉來朝丁酉太原節度使辛雲京來朝熒惑入壁壘戊戌黑氣如塵竟北方是秋河東河南淮南浙江東西福建等道五十五州奏水災三年春正月丙午朔辛亥劍南西山置乾州管招武寧遠二縣壬子夜月掩畢甲子冊新羅國王金乾運母為太妃甲戌以工部侍郎蔣渙為尚書左丞浙西團練觀察使蘇州刺史韋元甫為尚書右丞左丞李涵右丞賈至並為兵部侍郎乙亥永和公主薨二月己卯以常州刺史李栖筠為蘇州刺史兼御史中丞浙西團練觀察使壬午邠寧節度使馬璘來朝三月乙巳朔日月蝕之壬申割恆州行唐縣置泜州以靈壽恆陽隸之夏四月戊寅以山南西道節度使鄧國公張獻誠為檢校戶部尚書以疾辭位也右羽林將軍張獻恭為梁州刺史兼御史中丞充山南西道節度觀察使兄獻誠所薦也壬寅滑亳節度使令狐彰加檢校工部尚書劍南西川節度使兼御史大夫崔旰來朝五月戊申加崔旰檢校右散騎常侍乙卯追諡故齊王倓為承天皇帝興信公主亡女張氏為恭順皇后祔葬辛酉改桂州臨源縣為全義縣癸酉以左散騎常侍崔昭為京兆尹是日地震戊辰以劍南西川節度使崔旰檢校工部尚書改名寧寧為柏茂林楊子琳所攻寧既入朝子琳乘虛襲據成都府朝廷憂之即日詔寧還成都庚午以邛州刺史鮮于叔明為梓州刺史充劍南東川節度使六月戊子承天皇帝祔奉天皇帝廟同殿異室庚寅太子少師王璵卒壬辰幽州節度使檢校侍中幽州大都督府長史李懷仙為麾下兵馬使朱希彩所殺庚子淮南節度使檢校尚書左僕射知省事揚州大都督府長史趙國公崔圓卒閏月己酉郭子儀加司徒庚申宰臣充河南副元帥王縉兼幽州節度使以尚書右丞韋元甫揚州大都督府長史兼御史大夫充淮南節度觀察等使丁卯以幽州節度副使試太常卿朱希彩知幽州留後遣兵部侍郎李涵兼御史大夫使河北宣慰以幽州亂故也庚午相州薛嵩魏州田承嗣恆州李寶臣並加左右僕射七月壬申崔寧弟寬攻破楊子琳收復成都府是月五星並聚於東井占曰中國之利也乙亥王縉赴鎮州八月己未月掩畢辛酉月入東井壬戌吐蕃十萬寇靈武熒惑犯太微垣丁卯吐蕃寇邠州京師戒嚴戊辰邠寧節度使馬璘破吐蕃二萬於邠州御史大夫崔渙為稅地青苗錢使給百官俸錢不平詔尚書