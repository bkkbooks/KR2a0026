而統五行元本於是乎在九卿之職亦中臺之輔助小大之政多所關決自王室多難一紀于茲東征西伐略無寧歲內外荐費徵求調發皆迫於國計切於軍期率於權便裁之新書從事且救當時之急殊非致理之道今外虞既平罔不率俾天時人事表𩹉相符將明畫一之法大布惟新之命陶甄化源去末歸本魏晉有度支尚書校計軍國之用國朝但以郎官署領辦集有餘時艱之後方立使額參佐既衆簿書轉煩終無弘益又失事體其度支使及關內河東山南西道劍南西川轉運常平鹽鐵等使宜停禮儀之本職在奉常往年置使因循未改有乖舊制實曠司存委太常卿自舉本職其使宜停漢朝丞相與公卿已下五日一決事帝親斷可否且國之安危不獨注於將相考之理亂固亦在於庶官尚書侍郎左右丞及九卿參領要重朕所親倚固當朝夕進見以之匡益也並宜詳校所掌具陳損益如非時宜須有奏議亦聽詣閣請對當親覽其意擇善而從朕受昊天之成命承纍聖之鴻業齊心滌慮夙夜憂勞顧以不敏不明薄於德化致使舊章多廢至理未弘其心愧恥終食三歎雖詔書屢下以申振恤且朝典未舉猶深鬱悼思與百辟卿士勵精於理俾國經王道可舉而行各宜承式以恭爾位諸州置屯亦宜停于是悉以度支之務委於宰相辛卯以兵部侍郎賈至為京兆尹以京西兵馬使李忠臣為鳳翔尹代皇甫溫溫移鎮陝州夏四月庚子湖南都團練使崔瓘為其兵馬使臧玠所殺玠據潭州為亂澧州刺史楊子琳道州刺史裴虬衡州刺史楊濟出軍討玠乙巳夜歲星入軒轅丙午復置先農馬祖壇祀之丁未封幽州節度使朱希彩為高密郡王己未夜彗起五車長三丈庚申宰臣太原尹王縉入朝五月辛未刑部侍郎黎幹為桂州刺史桂管防禦經略招討觀察等使己卯夜彗起北方其色白庚辰貶禮儀使禮部尚書裴士淹為虔州刺史戶部侍郎判度支第五琦為饒州刺史皆魚朝恩黨也元載既誅朝恩下制罷使仍放黜之癸未以羽林大將軍辛京杲為潭州刺史湖南觀察使甲申西北白氣竟天徙置當悉柘靜恭五州於山險要害地備吐蕃也六月己未彗星始滅赦天下見禁囚徒秋七月丁卯以浙東觀察使越州刺史御史大夫薛兼訓為檢校工部尚書太原尹北都留守充河東節度使是月京城斗米千文八月辛卯宰臣元載上疏請置中都於河中府秋杪行幸春中還京以避蕃戎侵寇之患疏入不報載疏大旨以關輔河東等十州戶稅入奉京師創置精兵五萬以威四方辭多捭闔欲權歸於己也九月丁丑以宣歙池等州都團練觀察使宣州刺史兼御史中丞陳少遊充浙江東道團練觀察使吐蕃寇永壽汴州田神功來朝十二月乙未改巫州為蝄州業州為蔣州六年春正月己未朔戊寅於鄜州之鄜城置肅戎軍二月乙酉御史大夫敬括卒夏四月丁巳上御宣政殿試制舉人至夕策未成者令太官給燭俾盡其才己未澧州刺史楊子琳來朝賜名猷丁丑改果州為充州戊寅詔纂組文繡正害女紅今師旅未息黎元空虛豈可使淫巧之風有虧常制其綾錦花文所織盤龍對鳳麒麟獅子天馬辟邪孔雀仙鶴芝草萬字雙勝透背及大綿竭鑿六破已上並宜禁斷其長行高麗白錦大小花綾錦任依舊例織造有司明行曉諭五月癸卯以河南尹張延賞為御史大夫秋七月乙巳月掩畢八月乙卯淮南節度使韋元甫卒丙辰以東都副留守常休明為檢校左散騎常侍河陽三城使夏旱此月己未始雨庚午以御史大夫張延賞為揚州大都督府長史淮南節度使丙午以蘇州刺史浙江觀察使李栖筠為御史大夫丁丑獲白兔於太極殿之內廊庚辰夜月入紫微垣九月壬辰夜熒惑犯哭星自八月連雨害秋稼戊申於輪臺置靜塞軍辛亥熒惑入壁壘冬十月壬午滄州置橫海軍十一月己亥文單國王婆彌來朝獻馴象一十一壬寅夜月入太微又掩氐十二月己未江西觀察使檢校刑部尚書魏少遊卒庚午制以文單王婆彌為開府儀同三司試殿中監是歲春旱米斛至萬錢七年春正月癸未朔戊子於魏州頓邱縣置澶州以頓邱縣之觀城店置觀城縣以張之清豐店置清豐縣并割魏州之臨黃縣並隸澶州以貝州臨清縣之張橋店置永濟縣乙未月犯軒轅庚子以檢校戶部尚書路嗣恭為洪州刺史兼御史大夫江西觀察使辛丑太常卿楊綰兼充禮儀使甲辰回紇使出鴻臚寺劫掠坊市吏不能禁止復三百騎犯金光朱雀等門是日皇城諸門皆閉慰諭之方止二月甲寅以兵部侍郎李涵為蘇州刺史兼御史中丞充浙西觀察使鎮星臨太微戊午夜月掩天關三月壬辰詔諫議大夫置四員為定夏四月甲寅回紇王子李秉義卒歸國宿衛賜名也五月乙酉雨雹大風折樹丙戌夜月入太微辛卯徙欣州之七聖容於太原府之紫極宮乙未詔躋於道者化淳而刑措善於理者綱舉而網疏朕涉道未弘燭理多昧常亦遐想太古高挹玄風保合太和在宥天下蓋德薄而未臻也是用因時以設教便俗以立防務盡平恕用申哀恤又化淺而多犯也加以邊虞未戢徭賦適繁荒廢之際寇攘斯起遂令圜土嘉石之下積有繫囚竹章牙簡之中困於法吏屬盛陽之候大暑方蒸仍念狴牢何堪鬱灼所以汨傷和氣感致咎徵天道人事豈相遠也如聞天下諸州或愆時雨首種不入宿麥未登哀我矜人何時不恐皆由朕過益用懼焉惕然憂嗟深自咎責所以減膳徹樂別居齊宮禱于神明冀獲嘉應仲夏之月靜事無為以助晏陰以弘長養斷薄決小已過於麥秋繼長增高宜順乎天意可大赦天下見禁囚徒罪無輕重一切釋放癸亥以檢校禮部尚書蔣渙充東都留守六月庚戌朔有司言日蝕陰雲不見丁丑詔誡薄葬不得造假花果及金手脫寶鈿等物秋七月癸巳回紇蕃客奪長安縣令邵說所乘馬人吏不能禁八月庚戌賜北庭都護曹令忠姓名曰李元忠九月乙未工部尚書于休烈卒冬十月壬子上畋于苑中矢一發貫二兔從臣皆賀辛未以權知幽州盧龍節度留後朱泚檢校左散騎常侍充幽州盧龍節度使丙子以太府卿呂崇賁為廣州都督充嶺南節度使十一月庚辰詔自頃蕃戎入寇巴南屢多征役其巴蓬渠集壁充通開等州宜放二年租庸甲申以福建觀察使李承昭為禮部尚書華州刺史李琦為福州刺史福建都團練觀察使辛卯以嶺南節度李勉為工部尚書十二月丙寅雨土是夜長星出於參辛未滑州置永平軍壬子禁鑄銅器癸酉大雪是秋稔回紇吐蕃大食渤海室韋靺鞨契丹奚牂柯康國石國並遣使朝貢八年春正月丁丑朔壬午昭義軍節度檢校右僕射相州刺史薛嵩卒癸卯敕天下青苗地頭錢每畝十五文率京畿三十文自今一例十五文京官三品已上郎官御史每年各舉一人堪為刺史縣令者二月甲子御史大夫李栖筠彈吏部侍郎徐浩丁卯幽州節度使朱泚加檢校戶部尚書封懷寧郡王徐浩薛雍違格並停知選事壬申永平軍節度使檢校右僕射滑州刺史霍國公令狐彰卒遺表薦劉晏李勉代己三月丙子以工部尚書李勉兼御史大夫滑州刺史充永平軍節度滑亳觀察等使夏四月戊申乾陵上仙觀天尊殿有雙鵲銜紫泥補殿之隙缺凡十五處戊午以太僕卿吳仲孺為鄂州刺史鄂嶽沔等州團練觀察使五月乙酉貶吏部侍郎徐浩明州別駕薛雍歙州刺史京兆尹杜濟杭州刺史皆坐典選也以太府卿于頎為京兆尹辛卯鄭王邈薨贈昭靜太子壬辰曲赦京城繫囚癸卯詔赦天下繫囚死罪降從流流已下並放六月隴州華亭縣置義寧軍癸亥戶部侍郎判度支韓滉奏安邑鹽池生乳鹽是夏城奉天以備蕃寇秋七月己卯太白入東井乙未月掩畢八月甲寅詔吏部尚書劉晏知三銓選事己未吐蕃寇靈武庚午靈武奏蕃軍退去辛未幽州節度使朱泚弟滔率五千騎來朝請河西防秋詔千騎迓於國門許自皇城南面出開遠門赴涇州行營九月癸酉臨晉公主薨壬午嶺南節度使廣州刺史呂崇賁為部將哥舒晃所殺癸未晉州男子郇謨以麻辮髮持竹筐及葦席哭於東市請進三十字如不稱旨請裹尸於席筐上召見賜衣館之禁中內二字曰監團欲去諸道監軍團練使也丁亥貶左巡使殿中侍御史楊護以其抑郇謨而不上聞也戊子詔京官五品以上各上封事言政得失己丑夜太白入太微甲午東都留守蔣瓊兼知東都貢舉戊戌以辰錦觀察使李昌為桂州刺史桂管防禦觀察使大鳥見武功肉翅狐首四足有爪爪長四尺三寸毛赤如蝙蝠羣鳥隨而噪之神策將張日芬射斃以獻冬十月癸卯魏博田承嗣加同平章事丁巳夜月掩畢吐蕃寇涇州邠州甲子子儀先鋒將渾瑊與吐蕃戰于宜祿我師不利瑊與涇原馬璘極力追躡蕃軍潰去乙丑以江西觀察使路嗣恭為廣州刺史充嶺南節度使封翼國公以浙東觀察使越州刺史陳少遊為揚州大都督府長史充淮南節度使戊辰郭子儀奏破吐蕃十萬百僚稱賀己卯夜月入羽林癸巳月入太微十一月壬寅朔庚戌汴宋節度使田神功來朝辛酉淮西節度使李忠臣來朝十二月癸酉月入羽林是冬無雪是歲大有年九年春正月庚子朔壬寅汴宋節度使太子少師檢校尚書右僕射兼御史大夫汴州刺史田神功卒澧朗兩州鎮遏使澧州刺史楊猷擅浮江而下至鄂州詔許赴汝州遂泝漢而上復郢襄等州皆閉城拒之二月己丑以田神功弟神玉權知汴宋留後癸巳郭子儀自邠州來朝李抱玉自鳳翔來朝三月丙午禁畿內漁獵採捕自正月至五月晦永為常式戊子以澧州刺史楊猷為洮州刺史夏四月丁丑月入太微己卯以桂管觀察使黎幹為京兆尹兼御史大夫甲申中書舍人常衮率兩省官一十八人詣閣請論事詔三人各盡所懷乙酉詔郭子儀等大閲兵師以備吐蕃壬辰詔赦大辟以下繫囚無輕重釋放乙未華陽公主薨上悲惜之纍日不聽朝宰臣抗疏陳請五月庚戌廢泜州庚申詔度支使支七十萬貫轉運使五十萬貫和糴歲豐穀賤也乙丑詔四海之內方協大寧西戎無厭獨阻王命不可忘戰尚勞邊事朕頃以兵革之後軍國空耗躬率節儉務勤農桑上玄儲休仍歲大稔益用多愧不知其然雖屬此人和近於家給而邊穀未實戎備猶虛因其天時思致豐積將設平糴以之餽軍然以中都所供內府不足粗充常入之數豈齊倍餘之收其在方面藎臣成茲大計共佐公家之急以資塞下之儲每道歲有防秋兵馬其淮南四千人浙西三千人魏博四千人昭義二千人成德三千人山南東道三千人荊南二千人湖南三千人山南西道二千人劍南西川三千人東川二千人鄂嶽一千五百人宣歙三千人福建一千五百人其嶺南浙東浙西亦合準例恐路遠往來增費各委本道每年取當使諸色雜錢及回易利潤贓贖錢等每人計二十貫每道據合配防秋人數多少都計錢數市輕貨送納上都以備和糴仍以秋收送畢涇原節度使馬璘來朝丙寅加馬璘尚書左僕射知省事璘諷將士進狀求宰相故有是授幽州節度使朱泚遣弟滔奉表請自入朝兼自率五千騎防秋許之詔所司築第待之六月己卯月掩南斗庚辰月入太微秋七月甲辰月掩房又入羽林久旱京兆尹黎幹歷禱諸祠未雨又請禱文宣廟上曰丘之禱久矣八月辛未以虢州刺史宋晦為同州刺史充長春宮營田等使戊寅以陝州大都督府長史皇甫溫為越州刺史充浙東觀察使辛卯月掩軒轅九月庚子幽州節度使朱泚來朝乙巳渭北節度使坊州刺史臧希讓卒是秋大雨冬十月壬申信王瑝薨乙亥梁王璿薨以前宣州刺史季廣琛為右散騎常侍十一月戊戌大雪平地盈尺庚子以商州刺史李國清為陝州大都督府長史充陝州觀察使十二月庚寅以中書舍人楊炎祕書少監韋肇並為吏部侍郎中書舍人常衮為禮部侍郎壬辰赦京繫囚死罪降從流流已下並釋放十年春正月乙未朔己酉昭義牙將裴志清逐其帥薛薛奔洺州上章待罪志清率衆歸田承嗣壬寅壽王瑁薨乙未朱泚抗表乞留京師西征吐蕃請以弟滔權為幽州留後許之以昭義將薛擇為相州刺史薛雄為衛州刺史薛堅為洺州刺史皆嵩之族人也戊申遣使慰諭田承嗣令各守封疆承嗣不奉詔壬子充州復為果州癸丑田承嗣盜取洺州又破衛州二月乙丑盜殺衛州刺史薛雄丙寅罷辰錦溪奬蝄五州經略使復隸黔中辛未制第四子述封睦王充嶺南節度度支營田五府經略觀察處置等大使第五子逾可封郴王充渭北鄜坊等州節度大使第六子連封恩王第七子韓王迥可充汴宋節度大使第八子遘可封鄜王第十三子造封欣王充昭義節度大使第十四子暹封韶王十五子運封嘉王十六子遇封端王十七子遹封循王十八子通封恭王十九子達封原王二十子逸封雅王並可開府儀同三司不出閣丙子以華州刺史李承昭為相州刺史知昭義兵馬留後時田承嗣盡盜入相衛所管四州之地自署長吏是日河陽軍亂逐城使常休明迫牙將王惟恭為留後軍士大掠數日休明奔東都甲申以平盧淄青節度觀察海運押新羅渤海兩蕃等使檢校工部尚書青州刺史李正己檢校尚書左僕射前隴右節度副使隴州刺史馬燧為商州刺史充本州防禦使三月甲午陝州軍亂逐觀察使李國清縱兵大掠國清卑詞遍拜將士方免禍一夕而定乙巳薛常休明至闕下素服待罪丁未以左散騎常侍孟為華州刺史充潼關防禦使庚戌熒惑入壁壘四月太常寺奏諸州府所用斗稱當寺給銅斗稱州府依樣製造而行從之乙丑制魏博節度使開府儀同三司太尉檢校尚書左僕射同中書門下平章事魏州大都督府長史上柱國鴈門郡王田承嗣可貶永州刺史仍詔河東鎮冀幽州淄青淮西滑亳汴宋澤潞河陽道出師進討甲申大雨雹暴風拔樹飄屋瓦落鴟吻人震死者十之二京畿損稼者七縣五月乙未田承嗣部將霍榮國以磁州歸癸卯劍南置昌州罷兩都貢舉都集上都停童子科六月辛未田承嗣遣其黨裴志清攻圍冀州為李寶臣所敗秋七月己未戶部尚書暢璀卒杭州大風海水翻潮溺州民五千家船千艘八月丁卯田承嗣上表請束身歸朝戊子夜月入太微己丑田承嗣將盧子期攻磁州九月戊戌荊南節度使衛伯玉來朝壬寅宥京城繫囚戊申回紇白晝殺人於市吏捕之拘於萬年獄其首領赤心持兵入縣劫囚而出斫傷獄吏月暈熒惑犯昴五車參東井等星癸丑吐蕃寇隴州鳳翔李抱玉擊退之戊午幽州節度使朱泚鎮奉天冬十月辛酉日有蝕之癸亥以商州刺史馬燧檢校左散騎常侍河陽三城使甲子昭義節度使李承昭與盧子期戰於磁州清水縣大破之生擒子期以獻丙寅貴妃獨孤氏薨追贈曰貞懿皇后己丑尚書右僕射裴遵慶卒十一月辛卯新平公主薨丁酉田承嗣所署瀛州刺史吳希光以城降丁未路嗣恭攻破廣州擒哥舒晃斬首以獻十一年春正月庚寅朔田承嗣上表請罪壬辰遣諫議大夫杜亞使魏州宣慰許其自新辛亥劍南節度使崔寧奏大破吐蕃二十萬斬首萬級生擒首領一千一百五十人獻于闕下二月癸亥荊南節度使衛伯玉卒于京師戊子河陽軍復亂大掠三日監軍使冉廷蘭率兵斬其亂首方定戊申昌樂公主薨辛亥御史大夫李栖筠卒夏四月戊午朔丙子以浙西觀察使蘇州刺史御史大夫李涵知臺事充京畿觀察使己卯以前淮南節度使揚州大都督府長史御史大夫張延賞為江陵尹兼御史大夫充荊南節度使五月癸巳以永平軍節度使李勉為汴州刺史充汴宋等八州節度觀察留後時汴將李靈耀專殺濮州刺史孟鑒北連田承嗣故命勉兼領汴州授靈耀濮州刺史靈耀不受詔六月戊戌以李靈耀為汴州刺史充節度留後秋七月戊子夜暴澍雨平地水深盈尺溝渠漲溢壞坊民千二百家庚寅田承嗣兵寇滑州李勉拒戰而敗八月丙寅幽州節度使朱泚加同中書門下平章事李靈耀據汴州叛甲申命淮西李忠臣滑州李勉河陽馬燧三鎮兵討之閏月丁酉太白經天九月乙丑李忠臣等兵進營鄭州靈耀之衆來薄戰淮西兵亂乃退軍於滎澤戊辰淄青李正己奏取鄆濮二州冬十月乙酉忠臣等軍破賊於中牟進軍又敗賊於汴州郭外乃攻之乙丑承嗣遣姪悅率兵三萬援靈耀丙午淮西河陽之師合擊田悅營其衆大敗悅脫身北走靈耀聞悅之敗棄城遁走汴州平丁未滑將杜如江生擒靈耀而獻十二月丁亥加平盧淄青節度使檢校尚書左僕射青州刺史饒陽王李正己為檢校司空同中書門下平章事成德軍節度使太子太傅檢校尚書左僕射隴西郡王李寶臣檢校司空同中書門下平章事庚寅涇原節度使檢校尚書左僕射知省事扶風郡王馬璘卒丁酉以涇原節度副使試太常卿張掖郡王段秀實權知河東節度留後北都留守薛兼訓病故也昭義節度使李承昭抗表稱疾以澤潞行軍司馬李抱真權知磁邢兵馬留後庚戌加淮西節度檢校右僕射安州刺史西平郡王李忠臣檢校司空同中書門下平章事仍兼汴州刺史十二年春正月甲寅朔辛酉以四鎮北庭涇原節度副使知節度使事張掖郡王段秀實為涇州刺史兼御史大夫充本州團練使月掩軒轅渤海使獻日本國舞女十一人癸酉夜月掩心前大星又入南斗魁京師旱分命祈禱二月戊子淄青節度使李正己之子納為青州刺史充淄青節度留後丁未以朗州刺史李國清為黔州刺史經略招討觀察使三月乙卯河西隴右副元帥鳳翔懷澤潞秦隴等州節度觀察等使兵部尚書同中書門下平章事潞州大都督府長史知鳳翔府事上柱國涼國公李抱玉卒壬戌月入太微癸亥以太原少尹河東節度行軍司馬權知河東留後鮑防為太原尹御史大夫充北都留守河東節度使戊辰夜月逼心前星庚午左降官永州刺史田承嗣復授魏博節度使官並如故承嗣姪悅子綰緒綸並復舊官庚辰宰相元載王縉得罪下獄命吏部尚書劉晏訊鞫之辛巳制中書侍郎平章事元載賜自盡門下侍郎平章事王縉貶括州刺史夏四月壬午以朝議大夫守太常卿兼修國史楊綰為中書侍郎尚書禮部侍郎集賢院學士常衮為門下侍郎並同中書門下平章事癸未以右庶子潘炎為禮部侍郎貶吏部侍郎楊炎為道州司馬元載黨也諫議大夫知制誥韓洄王定包佶徐璜戶部侍郎趙縱大理少卿裴翼太常少卿王紞起居舍人韓會等十餘人皆坐元載貶官也給事中杜亞使魏州賜田承嗣鐵券癸巳以前祕書監李揆為睦州刺史揆故宰相為元載所忌二十年流落丐食江湖間載誅方得為郡又召顏真卿於湖州亦載所忌斥外也乙未月掩心前星丁酉西川破吐蕃於望漢城擒蕃將大籠官論器然以獻壬寅以前商州刺史烏崇福為安南都護本管經略使渤海奚契丹室韋靺鞨並遣使朝貢己酉加京官料錢文武班諸司共二千七百九十六員文官一千八百五十四員武官九百四十二員歲加給一十五萬六千貫并舊給凡二十六萬貫以關內副元帥兵馬使渾瑊兼邠州刺史五月辛亥罷天下州團練守捉使名甲寅諸道邸務在上都名曰留後改為進奏院丙辰夜月入太微辛酉貶刑部尚書王昂連州刺史昂至萬州卒庚午敕毀元載祖父墳剖棺棄骸焚毀私廟主於大寧里甲戌以前安南都護張伯儀為廣州刺史兼御史大夫充嶺南節度使六月癸巳時小旱上齊居祈禱聖體不康是日不視朝秋七月戊午罷潤州丹陽軍蘇州長洲軍己巳中書侍郎同中書門下平章事集賢殿崇文館大學士兼修國史楊綰卒八月癸巳賜東川節度使鮮于叔明姓李氏癸卯宰臣讓賜食先是元載王縉輔政每日賜食因為故事至是常衮等上表云𧹞錢已多更頒御膳胡顏自安乞停賜食從之甲辰以湖州刺史顏真卿為刑部尚書乙巳以久雨宥常參百僚不許御史點班九月乙卯許以庶人禮葬元載辛酉以涇原節度副使段秀實為四鎮北庭行營涇原鄭潁等節度使庚午吐蕃寇坊州掠党項羊馬而去是秋宋亳陳滑等州水冬十月丁亥戶部侍郎判度支韓滉言解縣兩池生瑞鹽乃置祠號寶應靈慶池壬寅夜月掩昴又入太微乙巳以滑州牙將劉洽為宋州刺史京兆尹黎幹奏水損田三萬一千頃度支使韓滉奏所損不多兼渭南令劉藻曲附滉亦云部內田不損差御史趙計檢渭南田亦附滉云不損上曰水旱咸均不宜渭南獨免復命御史朱敖檢之渭南損田三千頃上歎息曰縣令職在字人不損亦宜稱損損而不聞豈有恤隱之意耶劉藻趙計皆貶官十一月癸丑太白臨哭星乙卯夜月入羽林癸酉以右散騎常侍蕭昕為工部尚書刑部尚書顏真卿獻所著韻海鏡源三百六十卷十二月丁亥西川崔寧奏於西山破吐蕃十萬斬首八千生擒九百人己亥天下仙洞靈迹禁樵捕庚子以幽州節度使朱泚兼隴右節度副大使權知河西澤潞行營兵馬事京兆尹請修六門堰許之十三年春正月戊申朔辛酉壞白渠碾磑八十餘所以奪農溉田也壬戌刑部尚書魯郡公顏真卿三抗章乞致仕不允淄青節度使李正己請附屬籍從之戊辰回紇寇太原鮑防與之戰我師不利朱泚徙封遂寧郡王二月庚辰代州都督張光晟擊回紇戰于羊武谷破之北人乃安己亥吐蕃寇靈武甲辰太僕寺佛堂有小脫空金剛右臂忽有黑汗滴下以紙承之色類血三月甲戌河陽將士劫回紇輜重因與相鬬縱兵大掠久之方定四月丁亥以浙西觀察留後李道昌為蘇州刺史兼御史中丞充浙西都團練觀察使己丑以前浙西觀察使李涵為御史大夫甲辰吐蕃寇靈州朔方留後常謙光擊敗之五月戊午宦官劉清潭賜名忠翼六月戊戌隴右節度使朱泚於軍士趙貴家得貓鼠同乳不相害籠而獻之秋七月壬子中書舍人崔祐甫知吏部選事癸丑劍南節度使崔寧加檢校司空東川李叔明加檢校工部尚書辛未吐蕃寇鹽州慶州八月甲戌朔成德軍節度使李寶臣抗章請復本姓張氏從之冬十月丁酉葬貞懿皇后於莊陵十一月丁卯日長至有司祀昊天上帝於南郊上不視朝故也十二月丙戌以吏部尚書劉晏為左僕射判使如故以給事中杜亞為洪州刺史兼御史中丞充江西觀察使以江西觀察使路嗣恭為兵部尚書是歲郴州黃芩山崩壓死者有數百人十四年春正月壬寅朔壬戌以楚州刺史李泌為澧州刺史二月癸未魏博七州節度使太尉檢校尚書左僕射同中書門下平章事魏州大都督府長史田承嗣卒甲申以魏博中軍兵馬使左司馬田悅兼御史中丞充魏博節度留後三月丁未汴宋節度使李忠臣為麾下將族姪李希烈所逐忠臣狼狽歸朝上以忠臣立功於國乃授檢校司空同平章事庚戌以河南尹嚴郢為京兆尹河中少尹知府事趙惠伯為河南尹辛酉以前容管經略使容州刺史王翃為河中少尹知府事夏四月癸未成德軍節度使張寶臣復請姓李從之五月癸卯上不康至辛亥不視朝北都留守鮑防以北庭歸朝辛酉詔皇太子監國是夕上崩于紫宸之內殿遺詔皇太子柩前即位壬戌遷神柩于太極殿發喪八月庚申羣臣上尊諡曰睿文孝武皇帝廟號代宗十月己酉葬於元陵十二月丁酉祔於太廟史臣曰嗚呼治道之失也若河決金隄火炎崑岡雖神禹之乘四載玄冥之灑八瀛亦不能堙洪濤而撲烈焰者何也良以勢既壞而不能遽救也觀夫開元之治也則橫制六合駿奔百蠻及天寶之亂也天子不能守兩都諸侯不能安九牧是知有天下者治道其可忽乎明皇之失馭也則祿山暴起於幽陵至德之失馭也則思明再陷於河洛大曆之失馭也則懷恩鄉導於犬戎自三盜合從九州羹沸軍士膏於原野民力殫於轉輸室家相弔人不聊生而子儀號泣於用兵元載殷憂於避狄然而代宗皇帝少屬亂離老於軍旅識人間之情僞知稼穡之艱難內有李郭之效忠外有昆戎之幸利遂得凶渠傳首叛黨革心關輔載寧獯戎漸弭至如稔輔國之惡議元振之罪去朝恩之權不以酷刑俾之自咎亦立法念功之旨也罪己以傷僕固徹樂而悼神功懲縉載之姦回重衮綰之儒雅修己以禳星變側身以謝咎徵古之賢君未能及此而猶有李靈耀作梗田承嗣負恩命將出軍勞師弊賦者蓋陽九之未泰豈君道之過歟贊曰羣盜方梗諸戎競侵猛士嘗膽忠臣痛心掃除沴氣敷衍德音延洪納祉帝慮何深
