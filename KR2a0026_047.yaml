body:
  text: 舊唐書卷四十三志第二十三職官二太師太傅太保各一員謂之三師並正一品後漢初太傅置府僚至周隋三師不置府僚初拜於尚書省上隋煬帝廢三師之官武德復置一如隋制三師訓導之官天子所師法大抵無所統職然非道德崇重則不居其位無其人則闕之太尉司徒司空各一員謂之三公並正一品魏晉至北齊三公置府僚隋初亦置府僚尋省府僚初拜於尚書省上唐因之武德初太宗為之其後親王拜三公皆不視事祭祀則攝者行也三公論道之官也蓋以佐天子理陰陽平邦國無所不統故不以一職名其官大祭祀則太尉亞獻司徒奉俎司空掃除尚書都省龍朔二年改為中臺光宅元年改為文昌臺神龍初復尚書省領二十四司六尚書各分領四司尚書令一員正二品武德中太宗為之自是闕而不置令總領百官儀刑端揆其屬有六尚書一曰吏部二曰戶部三曰禮部四曰兵部五曰刑部六曰工部凡庶務皆會而決之左右僕射各一員從二品龍朔二年改為左右匡政光宅元年改為文昌左右相開元元年改為左右丞相天寶元年復為左右僕射掌統理六官綱紀庶務以二令之職自不置令僕射總判省事御史糾劾不當兼得彈之左右丞各一員左丞正四品上右丞正四品下龍朔改為左右肅機咸亨復永昌元年升為從三品也如意元年復四品也左丞掌管轄諸司糾正省內勾吏部戶部禮部十二司通判都省事若右丞闕則併行之右丞管兵部刑部工部十二司若左丞闕右丞兼知其事御史有糾劾不當兼得彈之左右司郎中各一員並從五品上隋置武德初省貞觀初復置龍朔二年改為左右丞務咸亨復也左司郎中副左丞所管諸司事省署鈔目勘稽失知省內宿直之事若右司郎中闕則併行之左右司員外郎各一員天后永昌元年置左右司員外郎各一人神龍初省後復置左右司郎中員外郎各掌副十有二司之事以舉正稽違省署符目焉凡都省掌舉諸司之綱紀與百僚之程式以正邦理以宣邦教凡上之所以逮下其制有六曰制敕冊令教符天子曰制曰敕曰冊皇太子曰令親王公主曰教尚書省下於州州下縣縣下鄉皆曰符也凡下之所以達上其制亦有六曰表狀箋啓辭牒表上於天子其近臣亦為狀箋啓上皇太子然於其長亦為之非公文所施有品已上公文皆曰牒庶人言曰辭也諸司自相質問其義有三關刺移關謂關通其事刺謂刺舉之移謂移其事於他司移則通判之官皆連署也凡內外百司所受之事皆印其發日為之程限凡尚書省施行制敕案成則給程以鈔之若急速者不出其日若諸州計奏達于京師量事之大小與多少以為之節凡京師諸司有符移關牒下諸州者必由於都省以遣之凡文案既成勾司行朱訖皆書其上端記年月日納諸庫凡施行公文應印者監印之官考其事目無差然後印之必書於曆每月終納諸庫凡尚書省官每日一人宿直都司執直簿轉以為次凡內外百僚日出而視事既午而退有事則直官省之其務繁不在此例凡天下制敕計奏之數省符宣告之節率以歲終為斷京師諸司皆以四月一日納于都省其天下諸州則本司推校以授勾官勾官審之連署封印附計帳使納于都省常以六月一日都事集諸司令史對覆若有隱漏不同皆附于考課焉主事六人從九品上令史十八人書令史三十六人亭長六人掌固十四人凡令史掌案文簿亭長掌固檢校省門戶倉庫廳事陳設之事也吏部尚書一員正三品龍朔二年改為司列太常伯光宅元年改為天官尚書神龍復為吏部尚書也侍郎二員正四品上隋煬帝大業三年尚書六曹各置侍郎一人以二尚書之職並正四品國家定令諸曹侍郎降為正四品下唯吏部侍郎為正四品上龍朔改為司列少常伯咸亨復總章元年吏部兵部各增置侍郎一員也尚書侍郎之職掌天下官吏選授勳封考課之政令其屬有四一曰吏部二曰司封三曰司勳四曰考功總其職務而行其制命凡中外百司之事由於所屬皆質正焉凡選授之制每歲集於孟冬去王城五百里之內以上旬千里之內以中旬千里之外以下旬尚書侍郎分為三銓尚書為尚書銓侍郎二人分為中銓東銓也凡擇人以四才校功以三實四才謂身言書判其優長者有可取焉三實謂德行才用勞效德均以才才均以勞勞必考其實而進退之較之優劣而定其留放所以正權衡明與奪抑貪冒進賢能然後據其官資量其注擬五品已上以名上中書門下聽制授其官六品已下量資任定其才職頗高可擢為拾遺補闕監察御史者亦以名送中書門下聽敕授其有歷職清要考第頗深者得隔品授之不然即否凡出身非清流者不注清資官凡注官若官資未相當及以為非便者聽至三注凡伎術之官皆本司定送吏部附甲凡同司聯事勾檢之官皆不得注大功已上親凡皇親諸親及軍功兼注員外郎凡注擬必先具官階團甲送門下以聞注官階高擬卑曰行階卑擬高曰守三銓注擬訖皆當銓團甲過左右僕射若中銓東銓則過尚書訖乃上門下省給事中讀黃門侍郎省侍中審然後進甲以聞聽旨授而施行焉若左右僕射門下批官不當者別改注亦有重執而上者也凡大選終於季春之月若選人有身在軍旅則軍中試書判封送吏部亦有春中下解而後集謂之春選若優勞人有敕則有處分及即與官者並聽非時選一百日內注擬之所以定九流之品格補萬方之闕政官人之道備焉郎中二員並從五品上龍朔為司列大夫咸亨光宅並隨曹改也員外郎二員並從六品上令史三十人書令史六十人亭長八人掌固十二人郎中一人掌考天下文吏之班秩階品凡階二十有九品在都序自一品至九品品有上下凡散官四品已下九品已上並於吏部當番上下其應當番四十五日若都省須人送符諸司須人者並兵部吏部散官上經兩番已上聽簡入選不第者依番名不過五六也凡階之法有以封爵有以親戚有以勳庸有以資蔭有以秀孝有以勞考有除免而復者皆循法以申之無或枉冒凡應入三品五品者皆待別制而進之不然則否凡文武百僚之班序官同者先爵爵同者先齒凡京司有常參官謂五品以上職事官八品已上供奉官員外郎監察御史太常博士供奉官兩省自侍中中書令已下盡名供奉官諸司長官清望官四品已下八品已上清官每日以六品已上清官兩人待制於衙供奉官宿衛官不在此例凡授四品已下清望官才職相當不應進讓凡職事官應覲省及移疾不得過程年七十已上應致仕若齒力未衰亦聽釐務凡官人身及同居大功已上親自執工商家專其業及風疾使酒皆不得入仕凡內外官有清白著聞應以名薦則中書門下改授五品已上量加升進六品已下有付吏部即量等第遷轉若第二第三等人五品已上改日稍優之六品已下秩滿聽選不在放限其嶺南黔中三年一置選補使號為南選凡天下官吏各有常員凡諸司置直皆有定數諸司諸色有品直官內外官吏則有假寧之節行李之命簿書景迹功賞殿最具員皆與員外郎分掌之郎中一人掌小銓亦分為九品通謂之行署以其在九流之外故謂之流外銓亦謂之小選其校試銓注與流內銓略同其吏部兵部禮部考功都省御史臺中書門下謂之前八司其餘則曰後行凡擇流外取工書計兼頗曉時務三事中有一優長則在限每經三考轉選量其才能而進之不則從舊任小銓舊委郎中專知開元二十五年又敕銓試訖留放皆尚書侍郎定之也員外郎一人掌判南遭曹在選曹之南故謂之南曹每歲選人有解狀簿書資歷考課必由之以核其實乃上三銓其三銓進甲則署焉員外郎一人掌判曹務凡預太廟齊郎帖試如貢舉之制司封郎中一員從五品上隋曰主爵郎武德因之龍朔二年改為司封大夫光宅改司封郎中也司封員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人司封郎中員外郎之職掌國之封爵凡有九等一曰王正一品食邑一萬戶二曰郡王從一品食邑五千戶三曰國公從一品食邑三千戶四曰郡公正二品食邑二千戶五曰縣公從二品食邑一千五百戶六曰縣侯從三品食邑一千戶七曰縣伯正四品食邑七百戶八曰縣子正五品食邑五百戶九曰縣男從五品食邑三百戶凡名山大川及畿內諸縣皆不以封至郡公有餘爵聽回授子孫其國公皆特封凡天下觀有定數每觀立三綱以道德高者充凡三元諸齊日修金録明真等齊凡道士女道士簿籍三年一造凡外命婦之制皇之姑封大長公主皇姊妹封長公主皇女封公主皆視正一品皇太子之女封郡主視從一品王之女封縣主視正二品王母妻為妃一品及國公母妻為國夫人三品已上母妻為郡夫人四品母妻為郡君五品若勳官三品有封母妻為縣君散官並同職事勳官四品有封母妻為鄉君其母邑號皆加太字各視其夫子之品若兩有官爵者從其高若內命婦一品之母為正四品郡君二品之母為從四品郡君三品四品之母並為正五品縣君凡婦人不因夫及子而別加邑號夫人云某品夫人郡君為某品郡君縣君鄉君亦然凡庶子有五品已上官皆封嫡母無嫡母封所生母凡二王後夫人職事五品已上散官三品已上王及國公母妻朝參各視其夫及子之禮凡親王孺人二人視正五品媵十人視正六品嗣王郡王及一品媵十人視從六品二品媵八人視正七品三品及國公媵六人視從七品四品媵四人視正八品五品媵三人視從八品降此外皆為妾凡皇家五等親及諸親三等存亡升降皆立簿書籍每三年一造除附之制並載於宗正寺司勳郎中一員從五品上隋曰司勳郎武德初乃加中字龍朔改為司勳大夫咸亨復也司勳員外郎二員從六品上主事四人從九品上令史三十三人書令史六十人掌固四人郎中員外郎之職掌邦國官人之勳級凡勳十有二轉為上柱國比正二品十一轉為柱國比從二品十轉為上護軍比正三品九轉為護軍比從三品八轉為上輕車都尉比正四品七轉為輕車都尉比從四品六轉為上騎都尉比正五品五轉為騎都尉比從五品四轉為驍騎尉比正六品三轉為飛騎尉比從六品二轉為雲騎尉比正七品一轉為武騎尉比從七品凡有功效之人合授勳官者皆委之覆定然後奏擬考功郎中一員從五品上龍朔二年改為司績大夫咸亨初乃復考功員外郎一員從六品上龍朔改為司績員外郎咸亨復主事三人從八品上令史十三人書令史二十五人掌固四人郎中員外郎之職掌內外文武官吏之考課凡應考之官家具録當年功過行能本司及本州長官對衆讀議其優劣定為九等考第各於所由司準額校定然後送省內外文武官量遠近以程之有差附朝集使送簿至省每年別敕定京官位望高者二人其一人校京官考一人校外官考又定給事中中書舍人各一人其一人監京官考一人監外官考郎中判京官考員外判外官考其檢覆同者皆以功過上使京官則集應考之人對讀注定外官對朝集使注定凡考課之法有四善一曰德義有聞二曰清慎明著三曰公平可稱四曰恪勤匪懈善狀之外有二十七最其一曰獻可替否拾遺補闕為近侍之最其二曰銓衡人物擢盡才良為選司之最其三曰揚清激濁褒貶必當為考校之最其四曰禮制儀式動合經典為禮官之最其五曰音律克諧不失節奏為樂官之最其六曰決斷不滯與奪合理為判事之最其七曰都統有方警守無失為宿衛之最其八曰兵士調習戎裝充備為督領之最其九曰推鞫得情處斷平允為法官之最其十曰讎校精審明為刊定為校正之最其十一曰承旨敷奏吐納明敏為宣納之最其十二曰訓導有方生徒充業為學官之最其十三曰賞罰嚴明政戰必勝為將帥之最其十四曰禮義興行肅清所部為政教之最其十五曰詳録典正辭理兼舉為文史之最其十六曰訪察精審彈舉必當為糾正之最其十七曰明於勘覆稽失無隱為勾檢之最其十八曰職事修理供承強濟為監掌之最其十九曰功課皆充丁匠無怨為役使之最其二十曰耕耨以時收穫成課為屯官之最其二十一曰謹於蓋藏明於出納為倉庫之最其二十二曰推步盈虛究理精密為曆官之最其二十三曰占候醫卜效驗居多為方術之最其二十四曰譏察有方行旅無壅為關津之最其二十五曰市廛不擾姦濫不作為市司之最其二十六曰牧養肥碩蕃息孳多為牧官之最其二十七曰邊境肅清城隍修理為鎮防之最一最以上有四善為上上一最以上有三善或無最而有四善為上中一最以上有二善或無最而有三善為上下一最以上而有一善或無最而有二善為中上一最以上或無最而有一善為中中職事粗理善最不聞為中下愛憎任情處斷乖理為下上背公向私職務廢闕為下中居官諂詐貪濁有狀為下下若於善最之外別可加尚及罪雖成殿情狀可矜雖不成殿而情狀可責者省校之日皆聽考官臨時量定內外官從見任改為別官者其年考從日申校百司量其閒劇諸州據其上下進考之人皆有定限苟無其功不要充數功過於限亦聽量進其流外官本司量其行能功過立四等考第而勉進之凡親勳翊衛皆有考第考第之中略有三等衛主帥如三衛之考其監門校尉直長如主帥之考凡諡議之法古之通典皆審其事以為旌別戶部尚書一員正三品隋為民部尚書貞觀二十三年改為戶部明慶元年改為度支龍朔二年改為司元太常伯光宅元年改為地官尚書神龍復為戶部侍郎二員正四品下因隋已來改易名位皆隨尚書也尚書侍郎之職掌天下田戶均輸錢穀之政令其屬有四一曰戶部二曰度支三曰金部四曰倉部總其職務而行其制命凡中外百司之事由於所屬皆質正焉郎中二員從五品上員外郎二員從六品上郎中員外自隋已來隨曹改易主事四人從九品上令史十五人書令史三十四人亭長六人掌固十人郎中員外郎之職掌分理戶口井田之事凡天下十道任土所出為貢賦之差凡天下之州府三百一十有五而羈縻之州逮八百焉四萬戶已上為上州二萬戶以上為中州不滿為下州凡三都之縣在內曰京縣城外曰畿又望縣有八十五焉其餘則六千戶以上為上縣二千戶已上為中縣一千戶已上為中下縣不滿一千戶皆為下縣凡天下之戶八百一萬八千七百一十口四千六百二十八萬五千一百六十一百戶為里五里為鄉兩京及州縣之郭內分為坊郊外為村里及坊村皆有正以司督察四家為鄰五鄰為保保有長以相禁約凡男女始生為黃四歲為小十六為中二十有一為丁六十為老每一歲一造計帳三年一造戶籍縣以籍成于州州成于省戶部總而領焉凡天下之戶量其資定為九等每定戶以仲年造籍以季年州縣之籍恆留五比省籍留九比凡戶之兩貫者先從邊州為定次從關內次從軍府州若俱者各從其先貫焉樂住之制居狹鄉者聽其從寬居遠者聽其從近居輕役之地者聽其從重辨天下之四人使各專其業凡習學文武者為士肆力耕桑者為農巧作器用者為工屠沽興販者為商工商之家不得預於士食祿之人不得奪下人之利凡天下之田五尺為步步二百有四十為畝畝百為頃度其肥瘠寬狹以居其人凡給田之制有差園宅之地亦如之凡給口分田皆從便近居城之人本縣無田者則隔縣給授凡應收授之田皆起十月畢十二月凡授田先課後不課先貧後富先多後少凡州縣界內所部受田悉足者為寬鄉不足者為狹鄉凡官人及勳授永業田凡天下諸州有公廨田凡諸州及都護府官人有職分田凡賦役之制有四一曰租二曰調三曰役四曰雜徭課戶每丁租粟二石其調隨鄉土所産綾絹絁各二丈布加五分之一輸綾絹絁者綿三兩輸布者麻三斤皆書印焉凡丁歲役二旬無事則收其庸每日三尺有事而加役者旬有五日免調三旬則租調俱免凡庸調之物仲秋斂之季秋發於州租則準州土收穫早晚量事而斂之仲冬起輸孟春而納畢本州納者季冬而畢凡諸國蕃胡內附者亦定為九等凡嶺南諸州稅米及天下諸州稅錢各有準常凡丁戶皆有優復蠲免之制若孝子順孫義夫節婦志行聞於鄉閭者州縣申省奏聞而表其門閭同籍悉免課役有精誠致應者則加優賞焉凡京司文武職事官皆有防閣凡州縣官僚皆有白直凡州縣官及在外監官皆有執衣凡諸親王府屬並給士力具品數如白直凡有功之臣賜實封者皆以課戶充凡食封皆傳于子孫凡庶人年八十及篤疾給侍丁一人九十給二人百歲三人凡天下朝集使皆以十月二十五日至京師十一月一日戶部引見訖於尚書省與羣官禮見然後集于考堂應考績之事元日陳其貢篚於殿廷凡京都諸縣令每季一朝度支郎中一員從五品上龍朔改為司度大夫咸亨復員外郎一員從六品上主事二人從九品上令史十六人書令史三十三人計史一人掌固四人郎中員外郎之職掌判天下租賦多少之數物産豐約之宜水陸道途之利每歲計其所出而度其所用轉運徵斂送納皆準程而節其遲速凡和糴和市皆量其貴賤均天下之貨以利於人凡金銀寶貨綾羅之屬皆折庸調以造凡天下舟車水陸載運皆具為腳直輕重貴賤平易險澀而為之制凡天下邊軍有支度使以計軍資糧仗之用每歲所費皆申度支會計以長行旨為準金部郎中一員從五品上龍朔為司珍大夫咸亨復員外郎一員從六品上主事三人從九品上令史八人書令史二十一人計史一人掌固四人郎中員外郎之職掌判天下庫藏錢帛出納之事頒其節制而司其簿領凡度以北方秬黍中者一黍之廣為分十分為寸十寸為尺一尺二寸為大尺十尺為丈凡量以秬黍中者容一千二百為籥二籥為合十合為升十升為斗三斗為大斗十斗為斛凡權衡以秬黍中者百黍之重為銖二十四銖為兩三兩為大兩十六兩為斤凡積秬黍為度量權衡調鐘律測晷景合湯藥及冠冕之制用之內外官私悉用大者凡庫藏出納皆行文榜季終會之若承命出納則於中書門下省覆而行之百司應請月俸符牒到所由皆遞覆而行之乃置木契與應出物之司相合凡官私互市物數有制凡縑帛之類有長短廣狹端匹屯綟之差凡賜十段其率絹三匹布三端綿三屯若雜綵十段則絲布二匹紬二匹綾二匹縵四匹若賜蕃客錦綵率十段則錦一張綾二匹縵三匹綿四屯凡遣使覆囚則給時服若諸使經二年不還亦如之凡時服稱一具者全給之一副者減給之正冬之會稱束帛有差者皆賜絹五品已上五匹六品已下三匹命婦視其夫子倉部郎中一員從五品上龍朔為司度大夫咸亨復也員外郎一員從六品上主事三人從九品上令史九人書令史二十人計史一人掌固四人郎中員外郎之職掌判天下倉儲受納租稅出給祿廩之事凡中外文武官品秩有差歲再給之乃置木契一百枚以與出給之司合諸司官人及諸色人應給食者皆給米凡致仕之官五品已上及解官充侍者各給半祿即遷官者通計前祿以充後數凡都已東租納含嘉倉自含嘉轉運以實京太倉自洛至陝為陸運自陝至京為水運置使以監充之凡王公已下每歲田苗皆有簿書凡義倉所以備歲不足常平倉所以均貴賤也禮部尚書一員正三品隋舊龍朔改為司禮太常伯光宅改為春官尚書神龍復也侍郎一員正四品下名因隨曹改易也尚書侍郎之職掌天下禮儀祭享貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客總其職務而行其制命凡中外百司之事由於所屬皆質正焉凡舉試之制每歲仲冬率與計偕其科有六一曰秀才試方略策五條此科取人稍峻貞觀已後遂絶二曰明經三曰進士四曰明法五曰書六曰算凡此六科求人之本必取精究理實而升為第其有博綜兼學須加甄奬不得限以常科其弘文崇文館學生雖同明經進士以其資蔭全高試取粗通文義其郊社齊郎簡試如太廟齊郎其國子監大成十二員取明經及第人聰明灼然者試日誦千言並口試仍策所習業十條通七然後補充各授散官依舊令於學內習業以通四經為限郎中一員從五品上員外郎一員從六品上隋曰儀曹郎武德改禮部郎中員外龍朔為司禮大夫司禮員外咸亨復主事二人從八品上令史五人書令史十一人亭長六人掌固八人郎中員外郎之職掌二尚書侍郎舉其儀制而辨其名數凡五禮之儀一百五十有二一曰吉禮其儀五十有五二曰賓禮其儀有六三曰軍禮其儀二十有三四曰嘉禮其儀五十五曰凶禮其儀一十有八凡元日大陳設於含元殿服衮冕臨軒展宮懸之樂陳歷代寶玉輿輅備黃麾仗二王後及百官朝集使皇親並朝服陪位大會之日陳設如初凡冬至大陳設如元正之儀其異者無諸州表奏祥瑞貢獻凡元正冬至大會之明日百官朝集使等皆詣東宮慶賀凡千秋節御樓設九部之樂百官袴褶陪位凡京司文武職事九品已上每朔望朝參五品已上及供奉官員外郎監察御史太常博士每日參凡諸蕃國來朝皆設宮懸之樂及黃麾仗若蕃國使則減黃麾之半凡冊皇后太子太子妃諸王諸王妃公主並臨軒冊命陳設如冬正之儀訖皆拜太廟凡祥瑞皆辨其名物有大瑞上瑞中瑞皆有等差凡太陽虧所司預奏其日置五鼓五兵於太社而不視事百官各素服守本司不聽事過時乃罷月蝕則擊鼓於所司若五嶽四鎮四瀆崩竭皆不視事三日凡二分之月三公巡行山陵則太常卿為之副凡百官拜禮各有差致敬之士若非連屬應敬之官相見或自親戚者各從其私禮凡樂有五聲八音六律六呂陳四懸之度分二舞之節以和人倫以調節氣以享鬼神以序賓客凡私家不得設鐘磬三品已上得備女樂五品女樂不得過三人居大功已上喪受冊及之官雖有鼓樂從而不作凡太廟太社及諸宮殿門東宮及一品已下諸州施戟有差凡內外百官皆給銅印有魚符之制並出於門下省凡服飾尚黃旗幟尚赤天子皇后太子已下之服事在輿服志也凡百僚冠笏繖幰珂珮各有差常服亦如之凡凶服不入公門凡授都督刺史階未入五品者並聽著緋珮魚離任則停凡文武官赴朝詣府導從各有差凡職事官薨卒有賻贈柳翣碑碣各有制度祠部郎中一員從五品上龍朔為司禋大夫咸亨復員外郎一員從六品上主事二人從九品上令史五人書令史十一人亭長六人掌固八人郎中員外郎之職掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥僧尼之事凡祭祀之名有四一曰祀天神二曰祭地祇三曰享人鬼四曰釋奠于先聖先師其差有三若昊天上帝皇地祇神州宗廟為大祀祀天地皆以祖宗配享日月星辰社稷先代帝王嶽鎮海瀆帝社先蠶孔宣父齊太公諸太子廟為中祀司中司命風師雨師衆星山林川澤五龍祠等及州縣社稷釋奠為小祀大祀皇帝親祭則太尉為亞獻光祿卿為終獻若有司攝事則太尉為初獻太常卿為亞獻凡大祀散齊四日致齊三日大祀齊官皆於散齊日平明集尚書省受誓誡中祀散齊三日致齊二日小祀散齊二日致齊一日皆祀前習禮沐浴並給明衣凡官爵二品已上祠四廟五品已上祠三廟六品已下達於庶人祭祖禰而已凡國有封禪之禮則依圓丘方澤之神位凡天下寺有定數每寺立三綱以行業高者充諸州寺總五千三百五十八所三千二百三十五所僧二千一百二十二所尼每寺上座一人寺主一人都維那一人凡僧簿籍三年一造凡別敕設齊應行道並官給料凡國忌日兩京大寺各二以散齊僧尼文武五品已上清官七品已上皆集行香而退天下州府亦然凡遠忌日雖不廢務然非軍務急切亦不舉事餘如常式膳部郎中一員從五品上龍朔為司膳大夫咸亨復也員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌邦之祭器牲豆酒膳辨其品數及藏冰食料之事主客郎中一員從五品上隋曰司蕃郎武德改主客郎中龍朔為司蕃大夫咸亨復員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌二王後及諸蕃朝聘之事二王之後酅公介公凡四蕃之國經朝貢之後自相誅絶及有罪滅者蓋三百餘國今所存者七十餘蕃其朝貢之儀享宴之數高下之等往來之命皆載於鴻臚之職焉兵部尚書一員正三品南朝謂之五兵尚書隋曰兵部尚書龍朔改為司戎太常伯咸亨復也侍郎二員正四品下龍朔為司戎少常伯咸亨復尚書侍郎之職掌天下武官選授及地圖與甲仗之政令其屬有四一曰兵部二曰職方三曰駕部四曰庫部總其職務而行其制命凡中外百官之事由於所屬咸質正焉凡選授之制每歲集於孟冬去王城五百里以上旬千里之內以中旬千里之外以下旬尚書侍郎分為三銓尚書為中銓侍郎分東西凡試能有五五謂長垛馬步射馬槍步射應對互有優長即可取之較異有三三謂驍勇材藝及可為統領之用也審其功能而定其留放所以録才藝備軍國辨虛冒勳勞也然後據其資勞量為注擬五品已上送中書門下六品已下量資注定其在軍鎮要籍不得赴選委節度使銓試其等第申省凡官階注擬團甲進甲皆如吏部之制凡大選終於季春之月所以約資之淺深審才略之優劣軍國之用在焉郎中二員從五品上龍朔為司戎大夫咸亨復也員外郎二人從六品上主事四人從八品下令史三十人書令史六十人亭長八人掌固十二人郎中一員掌判帳及天下武官之階品衛府之名數凡階有二十九將軍之階具於目凡階之法一如文散官之制凡天下之府五百九十有四有上中下並載於諸衛之職凡應宿衛官各從番第凡千牛備身左右及太子千牛備身皆取三品已上職事官子孫四品清官子儀容端正武藝可稱者充五考本司隨文武簡試聽選四品謂諸司侍郎左右庶子也凡殿中省進馬取左右衛三衛及高蔭簡儀容可觀者補充簡試同千牛例僕寺進馬亦如之五品已下七品已上五年多至八年年滿簡送吏部不第者如初無文聽以武選凡左右衛親衛勳衛翊衛及左右率府親勳翊衛及諸衛之翊衛通謂之三衛擇其資蔭高者為親衛其次者為勳衛及率府之親衛又次者為翊衛及率府之勳衛又次者為諸衛及率府之翊衛又次者為親王府之執仗執乘量遠邇以定其番第應補之人周親已上有犯刑戮者配令兵部上下凡諸衛及率府三衛貫京兆河南蒲同華岐陝懷汝鄭等州皆令番上餘州皆納資凡左右衛之三衛分為五仗凡王公已下皆有親事帳內限年十八已下舉諸州率萬人以充之皆限十周年則聽其簡試文理高者送吏部其餘留本司全下者退還本色凡兵士隸衛各有其名左右衛曰驍騎左右驍衛曰豹騎左右武衛曰熊渠左右威衛曰羽林左右領軍衛曰射聲左右金吾衛曰佽飛東宮左右衛率府曰超乘左右司禦率府曰旅賁左右清道率府曰直蕩總名曰衛士皆取六品已下子孫及白丁無職役者點充凡三年一簡點成丁而入六十而免量其遠邇以定番第凡衛士各立名簿其三年已來征防差遣仍定優劣為三第每年正月十日送本府印記仍録一道送本衛府若有差行上番折衝府據簿而發之凡差衛士征戍鎮防亦有團伍其善弓馬者為越騎團餘為步兵團主帥已下統領之火十人有六馱馬若父兄子弟不併遣之若祖父母老疾家無兼丁免征行及番上其居常則皆習射唱大角歌番集之日府官率而課試凡左右金吾衛有角手諸衛有弩手左右羽林軍有飛騎及左右萬騎彍騎天下諸軍有健兒皆定其名籍每季上中書門下凡關內有團結兵秦成岷渭河蘭六州有高麗羌兵黎雅邛翼茂五州有鎮防團結兵天下諸州差兵募取戶殷丁多人材驍勇選前資官勳官部分強明堪統攝者節級擢補主帥以領之其義征者別為行伍不入募人之營凡軍行器物皆於當州分給之如不足則令自備貧富必以均焉凡諸州軍府應行兵之名簿器物之多少皆申兵部軍散之日亦録其存亡多少以申而勘會之凡諸道回兵糧糒之物衣資之費皆令所在州縣分而給之郎中一人掌判簿以總軍戎差遣之名數凡天下節度使有八若諸州在節度內者皆受節度焉其福州經略使登州平海軍則不在節度之內節度名與所管軍鎮名並見地理志也凡親王總戎曰元帥文武官總統者則曰總管以奉使言之則曰節度使有大使副使判官若大使加旌節以統軍置木契以行凡將帥出行兵滿一萬人已上置長史司馬倉曹兵曹胄曹等參軍各一人五千人已上減司馬諸軍各置使一人五千人已上置副使一人一萬人已上置營田副使一人每軍各有倉兵胄三參軍其橫海高陽唐興恆陽北平等五軍皆本州刺史為使凡鎮皆有使一人副使一人萬人已上置司馬倉兵二曹參軍五千人已下減司馬凡諸軍鎮每五百人置押官一人千人置子總管一人五千人置總管一人凡諸軍鎮使副使已上皆四年一替總管已下二年一替押官隨兵交替凡諸軍鎮大使副使已下皆有傔人別奏以從之凡幸三京即東都南北衙皆置左右屯營別立使以統之若在都則京城亦如之凡大將出征皆告廟授鉞辭齊太公廟訖不宿於家臨軍對寇士卒不用命並得專行其罰既捷及軍未散皆會衆而書勞與其費用乃告太廟元帥凱旋之日皆使郊勞有司先獻捷於太廟又告齊太公廟員外郎一人掌貢舉及雜請之事凡貢舉每歲孟春亦與計偕有二科一曰平射二曰武舉凡科之優劣勳獲之等級皆審其實而受焉員外郎一人掌判南曹每歲選人有解狀簿書資歷考課必由之以核其實乃上三銓進甲則署焉職方郎中一員從五品上龍朔為司域大夫也員外郎一員正六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌天下地圖及城隍鎮戍烽堠之數辨其邦國都鄙之遠近及四夷之歸化凡五方之區域都邑之廢置疆埸之爭訟者舉而正之凡天下上鎮二十中鎮九十下鎮一百三十五上戍十有一中戍八十六下戍二百四十五凡烽堠所置大率相去三十里其逼邊境者築城置之每烽置帥一人副一人凡州縣城門及倉庫門須有備守駕部郎中一員從五品上龍朔為司輿大夫也員外郎一人從六品上主事三人從九品上令史十人書令史二十人掌固四人郎中員外郎之職掌邦國輿輦車乘傳驛廄牧官私馬牛雜畜簿籍辨其出入司其名數凡三十里一驛天下驛凡一千六百三十九而監牧六十有五皆分使統之若畜養之宜孳生之數皆載於太僕之職凡諸衛有承直之馬凡諸司有備運之牛皆審其制以定數焉庫部郎中一員從五品上龍朔為司庫大夫也員外郎一員從六品上主事二人從九品上令史七人書令史十五人掌固四人郎中員外郎之職掌邦國軍州戎器儀仗凡元正冬至陳設並祠祭喪葬所貢之物皆辨其出入之數量其繕造之功以分給焉刑部尚書一員正三品隋初改都官尚書又改為刑部龍朔改為司刑太常伯光宅改為秋官尚書神龍復也侍郎一員正四品下龍朔為司刑少常伯尚書侍郎之職掌天下刑法及徒隸勾覆關禁之政令其屬有四一曰刑部二曰都官三曰比部四曰司門總其職務而行其制命凡中外百司之事由於所屬咸質正焉郎中二員從五品上隋曰憲部郎武德為刑部郎中龍朔改為司刑大夫員外郎二員從六品上主事四人從九品上令史十九人書令史三十八人亭長六人掌固十人郎中員外郎之職掌二尚書侍郎舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律十有二章一名例二禁衛三職制四戶婚五庫六擅興七賊盜八鬬訟九詐僞十雜律十一捕亡十二斷獄而大凡五百條令二十有七篇分為三十卷第一至第七曰官品職員八祠九戶十選舉十一考課十二宮衛十三軍防十四衣服十五儀制十六鹵簿十七公式十八田十九賦役二十倉庫二十一牧二十二關市二十三醫疾二十四獄官二十五營繕二十六喪葬二十七雜令而大凡一千五百四十六條凡格二十四篇式三十三篇以尚書御史臺九寺三監諸軍為目凡律以正刑定罪令以設範立制格以禁違正邪式以軌物程事乃立刑名之制五焉一笞二仗三徒四流五死笞刑五仗刑五徒刑五流刑三死刑二而斷獄之大典有十惡八議五聽六贓贖配之典具在刑法志凡決死刑皆於中書門下詳覆凡死罪枷而杻婦人及流徒枷而不杻官品及勳散之階第七已上鎖而不枷在京諸司則徒已上送大理杖已下當司斷之若金吾糾獲亦送大理凡決大辟罪在京者行決之司皆五覆奏在外者刑部三覆奏若犯惡逆已上及部曲奴婢殺主者一覆奏凡京城決囚之日減膳徹樂每歲立春後至秋分不得決死刑大祭祀及致齊朔望上下弦二十四氣雨未晴夜未明斷屠月日及休假亦如之凡犯流罪已下應除免官當未奏身死者免其追奪流移之人皆不得𠫓廾放妻妾及私遁還鄉至六載然後聽仕即本犯不應流而特配流者三載已後聽仕其應徒則皆配居作凡禁囚五日一慮凡鞫獄官與被鞫人有親屬讎嫌者皆聽更之凡在京諸司見禁囚每月二十五已前本司録其所犯及禁時月日以報刑部凡國有赦宥之事先集囚徒於闕下命衛尉樹金雞待宣制訖乃釋之都官郎中一員從五品上龍朔改司僕大夫咸亨復員外郎一員從六品上主事二人從九品上令史九人書令史十二人掌固四人郎中員外郎之職掌配役隸簿録俘囚以給衣糧藥療以理訴競雪冤凡公私良賤必周知之凡反逆相坐沒其家為官奴婢一免為蕃戶再免為雜戶三免為良民皆因赦宥所及則免之年六十及廢疾雖赦令不該亦並免為蕃戶七十則免為良人任所樂處而編附之凡初被沒有伎藝者各從其能而配諸司婦人工巧者入于掖庭其餘無能咸隸司農比部郎中一員從五品上龍朔為司計大夫員外郎一員從六品上主事二人從九品上令史十四人書令史二十七人計史一人掌固四人郎中員外郎之職掌勾諸司百僚俸料公廨贓贖調斂徒役課程逋懸數物周知內外之經費而總勾之凡內外官料俸以品第高下為差外官以州縣府之上中下為差凡稅天下戶錢以充州縣官月料皆分公廨本錢之利羈縻州所補漢官給以當土之物關監之官以品第為差其給以年支輕貨鎮軍司馬判官俸祿同京官鎮戍之官以鎮戍上中下為差凡京師有別借食本每季一申省諸州歲終而申省比部總勾覆之凡倉庫出內營造傭市丁匠功程贓贖賦斂勳賞賜與軍資器仗和糴屯牧亦勾覆之司門郎中一員從五品上龍朔曰司門大夫員外郎一員從六品上主事二人從九品上令史六人書令史十三人掌固四人郎中員外郎之職掌天下諸門及關出入往來之籍賦而審其政凡關二十有六為上中下之差京城四面關有驛道者為上關餘關有驛道及四面無驛道者為中關他皆為下關關所以限中外隔華夷設險作固間邪正禁者也凡關呵而不征司貨賄之出入其犯禁者舉其貨罰其人凡度關者先經本部本司請過所在京則省給之在外則州給之而雖非所部有來文者所在亦給工部尚書一員正三品南朝謂之起部有所營造則置起部尚書畢則省之隋初改置工部尚書龍朔為司平太常伯光宅改為冬官尚書神龍復舊也侍郎一員正四品下龍朔為司平少常伯尚書侍郎之職掌天下百工屯田山澤之政令其屬有四一曰工部二曰屯田三曰虞部四曰水部總其職務而行其制命凡中外百司之事由於所屬咸質正焉郎中一員從五品上龍朔為司平大夫也員外郎一員從六品上主事二人從九品上令史十二人書令史二十一人亭長六人掌固八人郎中員外郎之職掌經營興造之衆務凡城池之修濬土木之繕葺工匠之程式咸經度之凡京師東都有營繕則下少府將作以供其事屯田郎中一員從五品上龍朔為司田大夫也員外郎一員從六品上主事二人從九品上令史七人書令史十二人計史一人掌固四人郎中員外郎之職掌天下屯田之政令凡邊防鎮守轉運不給則設屯田以益軍儲其水陸腴瘠播種地宜功庸煩省收率等級咸取決焉諸屯田役力各有程數凡天下諸軍州管屯總九百九十有二大者五十頃小者二十頃凡當屯之中地有良薄歲有豐儉各定為三等凡屯皆有屯官屯副凡京文武職事官有職分田京兆河南府及京縣官亦準此凡在京諸司有公廨田皆視其品命而審其分給虞部郎中一員從五品上龍朔司虞大夫員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌京城街巷種植山澤苑囿草木薪炭供頓田獵之事凡採捕漁獵必以其時凡京兆河南二都其近為四郊三百里皆不得弋獵採捕殿中太僕所管間馬兩都皆五百里內供其芻其關內隴右西使南使諸牧監馬牛駝羊皆貯及茭草其柴炭木橦進內及供百官蕃客並於農隙納之水部郎中一員從五品上龍朔為司川大夫員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌天下川瀆陂池之政令以導達溝洫堰決河渠凡舟楫溉灌之利咸總而舉之凡天下水泉三億二萬三千五百五十九其在遐荒絶域逮不可得而知矣其江河自西極達于東溟中國之大川者也其餘百三十五水是為中川其又千二百五十二水斯為小川也若渭洛汾濟漳淇淮漢皆亙達方域通濟舳艫從有之無利於生人者也凡天下造舟之梁四河則蒲津大陽河陽洛則孝義也石柱之梁四洛則天津永濟中橋灞則灞橋木柱之梁三皆渭川便橋中渭橋東渭橋也巨梁十有一皆國工修之其餘皆所管州縣隨時營葺其大津無梁皆給船人量其大小難易以定其差門下省秦漢初置侍中曾無臺省之名自晉始置門下省南北朝皆因之龍朔改為東臺光宅改為鸞臺神龍復侍中二員隋曰納言又名侍內武德為納言又改為侍中龍朔改東臺左相光宅元年改為納言神龍復為侍中開元元年改為黃門監五年復為侍中天寶二年改為左相至德二年復改為侍中武德定令侍中正三品大曆二年十一月九日升為正二品舊制宰相常於門下省議事謂之政事堂永淳二年七月中書令裴炎以中書執政事筆遂移政事堂於中書省開元十一年中書令張說改政事堂為中書門下其政事印改為中書門下之印也侍中之職掌出納帝命緝熙皇極總典吏職贊相禮儀以和萬邦以弼庶務所謂佐天子而統大政者也凡軍國之務與中書令參而總焉坐而論之舉而行之此其大較也凡下之通上其制有六一曰奏抄二曰奏彈三曰露布四曰議五曰表六曰狀皆審署申覆而施行焉凡法駕行幸則負寶而從大朝會大祭祀則板奏中嚴外辦以為出入之節輿駕還宮則請解嚴所以告禮成也凡大祭祀皇帝致齊既朝則請就齊室將奠則奉玉及幣以進盥手則取匜以沃洗爵則酌罍水以奉及贊酌泛齊進福酒以成其禮焉若享宗廟則進瓚而贊酌鬱酒以祼既祼則贊酌醴齊其餘如饗神祇之禮藉田則奉耒以贊事凡諸侯王及四夷之君長朝見則承詔而勞問之臨軒命使冊后及太子則承詔以命之凡制敕慰問外方之臣及徵召者則監其封題若發驛遣使則給其傳符以通天下之信凡官爵廢置刑政損益皆授之於記事之官既書於策則監其記注焉凡文武職事六品已下所司進擬則量其階資校其才用以審定之若擬職不當隨其優屈退而量焉門下侍郎二員隋曰黃門侍郎龍朔為東臺侍郎咸亨改為黃門侍郎垂拱改為鸞臺侍郎天寶二年改為門下侍郎乾元元年改為黃門侍郎大曆二年四月復為門下侍郎武德定令中書門下侍郎同尚書侍郎正四品上大曆二年九月敕升為正三品也門下侍郎掌二侍中之職凡政之弛張事之與奪皆參議焉若大祭祀則從升壇以陪禮皇帝盥手則奉巾以進既帨則奠巾于篚奉瓠爵以贊獻凡元正冬至天子視朝則以天下祥瑞奏聞給事中四員正五品上隋曰給事郎置四員位次門下侍郎武德定令曰給事中龍朔改為東臺舍人咸亨復給事中掌陪侍左右分判省事凡百司奏抄侍中審定則先讀而署之以駁正違失凡制敕宣行大事則稱揚德澤褒美功業覆奏而請施行小事則署而頒之凡國之大獄三司詳決若刑名不當輕重或失則援法例退而裁之凡發驛遣使則審其事宜與黃門侍郎給之其緩者給傳即不應給罷之凡文武六品已下授職官所司奏擬則校其仕歷淺深功狀殿最訪其德行量其才藝若官非其人理失其事則白侍中而退量焉若弘文館圖書之繕寫讎校亦課而察之凡天下寃滯未申及官吏刻害者必聽其訟與御史中書舍人同計其事宜而申理之録事四人從七品上主事四人從八品下令史十一人書令史二十二人甲庫令史七人傳制八人亭長六人掌固十人修補制敕匠五人左散騎常侍二人從三品魏晉置散騎常侍侍郎與侍中黃門侍郎共平尚書奏事其後用人或雜江左不重此官或省或置隋初省散騎侍郎置常侍四人從三品掌陪從朝直煬帝又省之武德初以為加官貞觀初置常侍二人隸門下省明慶二年又置二員隸中書省始有左右之號並金蟬珥貂左常侍與侍中左貂右常侍與中書令右貂謂之八貂龍朔為左侍極咸亨復廣德二年五月升為正三品加置四員興元元年正月左右各加一員貞元四年正月敕依舊四員也常侍掌侍奉規諷備顧問應對寶應二年敕左右散騎常侍各置參官兩人令自揀擇聞奏參典亦置兩人後省諫議大夫四員秦漢曰諫大夫光武加議字隋於門下省置諫議大夫七員從四品下武德四年敕置四員正五品上龍朔改為正諫大夫神龍復大曆四年敕只四員正五品上龍朔七年三月敕其諫議四員內供奉不得為正員至貞元四年五月十五日敕諫議分為左右加置八員四員隸門下為左會昌二年十一月中書奏隋於門下省置諫議大夫七員從四品下今正五品上自大曆二年門下中書侍郎升為正三品兩省遂闕四品官其諫議大夫望升為正四品下分為左右以備兩省四品之闕向後與丞郎出入迭用以重其選敕可之諫議大夫掌侍從贊相規諫諷諭凡諫有五一曰諷諫二曰順諫三曰規諫四曰致諫五曰直諫起居郎二員從六品上古無其名隋始置起居舍人二員貞觀二年省起居舍人移其職於門下置起居郎二員明慶中又置起居舍人始與起居郎分在左右龍朔二年改為左史咸亨復天授元年又改為左史神龍復也楷書手三人起居郎掌起居注録天子之言動法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀曆數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季終則授之國史焉自漢獻帝後歷代帝王有起居注著作編之每季為卷送史館也左補闕二員從七品上左拾遺二員從八品上古無此官名天后垂拱元年二月二十九日敕記言書事每切於旁求補闕拾遺未弘於注選瞻言共理必藉衆才寄以登賢期之進善宜置左右補闕各二員從七品上左右拾遺各二員從八品上掌供奉諷諫行立次左右史之下仍附于令天授二年二月加置三員通前五員大曆四年補闕拾遺各置內供奉兩員七年五月十一日敕補闕拾遺宜各置兩員也補闕拾遺之職掌供奉諷諫扈從乘輿凡發令舉事有不便於時不合于道大則廷議小則上封若賢良之遺滯於下忠孝之不聞于上則條其事狀而薦言之典儀二員從九品南齊有典儀録事一員梁有典儀之官後省皇朝又置典儀二人隸門下省初用人皆輕貞觀末李義府為之自是用士人為之贊者十二人隋太常鴻臚二寺皆有贊者皇朝因置之隸門下省掌贊唱為行事之節分番上下謂之番官典儀掌殿上贊唱之節及殿廷版位之次凡國有大禮侍中行事及進中嚴外辦之版皆贊相焉城門郎四員從六品上漢有城門校尉掌京城諸門啓閉之節隋改校尉為城門郎置四員從六品皇朝因之也令史一人書令史二人門僕八百人門僕晉代有之皇朝隸城門局分番上下掌送管鑰城門郎掌京城皇城宮殿諸門啓閉之節奉出納管鑰開則先外而後內闔則先內而後外所以重中禁尊皇居也候其晨昏擊鼓之節而啓閉之凡皇城宮城闔門之鑰先酉而出後戌而入開門之鑰後丑而出夜盡而入京城闔門之鑰後申而出先子而入開門之鑰後子而出先卯而入若非其時而有命啓閉則詣閣覆奏符寶郎四員從六品上周有典瑞之職秦有符璽令漢曰符璽郎兩漢得秦六璽及傳國璽後代傳之隋置符璽郎二員從六品天后惡璽字改為寶其受命傳國等八璽文並改雕寶字神龍初復為符璽郎開元初又改為符寶從璽文也令史二人書令史三人主寶六人主符三十人主節十八人符寶郎掌天子八寶及國之符節辨其所用有事則請於內既事則奉而藏之八寶一曰神寶所以承百王鎮萬國二曰受命寶所以修封禪禮神祇三曰皇帝行寶答疏於王公則用之四曰皇帝之寶勞來勳賢則用之五曰皇帝信寶徵召臣下則用之六曰天子行寶答四夷書則用之七曰天子之寶慰撫蠻夷則用之八曰天子信寶發番國兵則用之凡大朝會則捧寶以進于御座車駕行幸則奉寶以從于黃鉞之內凡國有大事則出納符節辨其左右之異藏其左而班其右以合中外之契焉一曰銅魚符所以起軍旅易守長二曰傳符所以給郵驛通制命三曰隨身魚符所以明貴賤應徵召四曰木契所以重鎮守慎出納五曰旌節所以委良能假賞罰魚符之制王畿之內左三右一王畿之外左五右一左者在內右者在外行用之日從第一為首後事須用以次發之周而復始大事兼敕書小事但降符函封遣使合而行之傳符之制太子監國曰雙龍之符左右各十京都留守曰麟符左二十其右一十有九東方曰青龍之符西方曰騶虞之符南方曰朱雀之符北方曰玄武之符左四右三左者進內右者付外隨身魚符之制左二右一太子以玉親王以金庶官以銅佩以為飾刻姓名者去官而納焉不刻者傳而佩之木契之制太子監國則王畿之內左右各三王畿之外左右各五庶官鎮守則左右各十旌節之制命大將帥及遣使於四方則請而佩之旌以專賞節以專殺周禮之制山國用虎節土國用人節澤國用龍節皆金也又云道路用旌節即漢使所持者是也弘文館後漢有東觀魏有崇文館宋有玄史二館南齊有總明館梁有士林館北齊有文林館後周有崇文館皆著撰文史鳩聚學徒之所也武德初置修文館後改為弘文館後避太子諱改曰昭文館開元七年復為弘文館隸門下省學士學士無員數自武德已來皆妙簡賢良為學士故事五品已上稱學士六品已下為直學士又有文學直館學士不定員數館中有四部書及圖籍自垂拱已後皆宰相兼領號為館主常令給事中一人判館事學生三十人校書郎二人從九品上令史二人楷書手三十人典書二人搨書手三人筆匠三人熟紙裝潢匠九人亭長二人掌固四人弘文館學士掌詳正圖籍教授生徒凡朝廷有制度沿革禮儀輕重得參議焉校書郎掌校理典籍刊正錯謬其學生教授考試如國子學之制焉中書省秦始置中書謁者漢元帝去謁者二字歷代但云中書後周謂之內史省隋因為內史省置內史監令各一員煬帝改為內書省武德復為內史省三年改為中書省龍朔改為西臺光宅改為鳳閣神龍復為中書省開元元年改為紫微省五年復舊中書令二員漢魏品卑而付重魏置監令各一員歷南朝不改隋省監置令二人正三品隋文帝廢三公府僚令中書令與侍中知政事遂為宰相之職隋曰內書令武德曰內史令尋改為中書令龍朔為西臺右相咸亨復為中書令光宅為鳳閣令開元元年改為紫微令五年復為中書令天寶改為右相至德二年復為中書令本正三品大曆二年十一月九日與侍中同升正二品自後不改也中書令之職掌軍國之政令緝熙帝載統和天人入則告之出則奉之以釐萬邦以度百揆蓋佐天子而執大政也凡王言之制有七一曰冊書二曰制書三曰慰勞制書四曰發敕五曰敕旨六曰論事敕書七曰敕牒皆宣署申覆而施行之凡大祭祀羣神則從升壇以相禮享宗廟則從升阼階親征纂嚴戒敕百僚冊命親賢臨軒則使讀冊若命之于朝則宣而授之凡冊太子則授璽凡制詔宣傳文章獻納皆授之於記事之官武德貞觀故事以尚書省左右僕射各一人及侍中中書令各二人為知政事官其時以他官預議國政者云與宰相參議朝政或云平章國計或云專典機密或參議政事貞觀十七年李績為太子詹事特詔同知政事始謂同中書門下三品自是僕射常帶此稱自餘非兩省長官預知政事者亦皆以此為名永淳中始詔郭正一郭待舉魏玄同等與中書門下同承受進旨平章事自天后已後兩省長官及同中書門下三品并平章事為宰相其僕射不帶同中書門下三品者但釐尚書省而已總章二年東臺侍郎張文瓘西臺侍郎戴至德等始以同中書門下三品著之入銜自是相承至今永淳二年黃門侍郎劉齊賢知政事稱同中書門下平章事自後兩省長官及他官執政未至侍中書令者皆稱同中書門下平章事也中書侍郎二員漢置中書掌密詔有令僕丞郎四官魏曰中書郎晉加侍字隋置內書省改為內書侍郎正四品武德初為內史侍郎三年改為中書侍郎龍朔光宅開元隨曹易號至德復為中書侍郎武德定令與尚書侍郎俱第四品大曆二年九月與門下侍郎共升為正三品也中書侍郎掌二令之職凡邦國之庶務朝廷之大政皆參議焉凡臨軒冊命大臣令為之使則持冊書以授之凡四夷來朝臨軒則受其表疏升于西階而奏若獻贄幣則受之以授於所司中書舍人六員正五品上曹魏於中書置通事一人掌呈奏按章高貴鄉公於通事下加舍人二字晉於中書置舍人通事各一人自魏晉齊梁詔誥皆出於中書令中書侍郎中書通事舍人但掌呈奏而已或通事有文字者別敕知詔誥至梁武制誥專令舍人掌之兼去通事二字但云中書舍人隋曰內史舍人置八員掌制誥品第六尋升五品上煬帝改內書舍人置四員武德初為內史舍人三年改為中書舍人龍朔光宅開元隨曹改易舍人掌侍奉進奏參議表章凡詔旨敕制及璽書冊命皆按典故起草進畫既下則署而行之其禁有四一曰漏泄二曰稽緩三曰違失四曰忘誤所以重王命也制敕既行有誤則奏而正之凡大朝會諸方起居則受其表狀而奏之國有大事若大克捷及大祥瑞百僚表賀亦如之凡冊命大臣于朝則使持節讀冊命之凡將帥有功及有大賓客皆使勞問之凡察天下冤滯與給事中及御史三司鞫其事凡百司奏議文武考課皆預裁焉主書四人從七品上主事四人從八品下令史二十五人書令史五十人傳制十人亭長十八人修補敕匠五十人右散騎常侍二員從三品右補闕二員從七品上右拾遺二員從八品上起居舍人二員從六品上右常侍補闕拾遺掌事同左省起居舍人掌修記言之史録天子之制誥德音如記事之制以記時政損益季終則授之於國史通事舍人十六人從六品上通事舍人秦謁者之官也掌賓贊贊受事隸光祿勳晉置舍人通事各一人隸中書東晉曰通事舍人隋因晉制置十六人從六品上又為通事謁者武德初廢謁者臺改通事謁者為通事舍人隸四方館屬中書省也通事舍人掌朝見引納及辭謝者於殿廷通奏凡近臣入侍文武就列引以進退而告其拜起出入之節凡四方通表華夷納貢皆受而進之凡軍旅之出則命受慰勞而遣之既行則每月存問將士之家以視其疾苦凱旋則郊迓之皆復命凡致仕之臣與邦之耋老時巡問亦如之令史十人亭長十八人掌固二十四人集賢殿書院開元十三年置漢魏已來職在祕書梁於文德殿內藏聚羣書北齊有文林館學士後周有麟趾殿學士皆掌著述隋平陳之後寫羣書正副二本藏于宮中其餘以實祕書外閣煬帝於東都觀文殿東西廂貯書自漢延熹至隋皆祕書掌國籍而禁中之書時或有焉及太宗在藩府時有秦府學士十八人其後弘文崇文二館皆有玄宗即位大校羣書開元五年於乾元殿東廊下寫四部書以充內庫置校定官四人七年駕在東都於麗正殿置修書使十二年駕在東都十三年與學士張說等宴於集仙殿因改名集賢改修書使為集賢書院學士其大明宮所置書院本命婦院屋宇宏敞永泰元年三月詔僕射裴冕等十三人每日於集賢書院待詔集賢學士初定制以五品已上官為學士六品已下為直學士每宰相為學士者為知院事常侍一人為副知院事學士知院事一人開元初以褚𣰋量馬懷素元行冲相次知乾元殿寫書及在麗正乃有使名張說代元行冲改院為集賢以說為大學士知院事說懇讓大字詔許之自是每以宰相一人知院事副知院事一人初宰相張說知院事以左常侍徐堅為副知院事因為故事判院一人初在乾元殿刊正官一人判事其後因之押院中使一人自乾元殿寫書則置掌出入宣進奏兼領中官監守院門掌同宮禁待講學士開元初褚𣰋量馬懷素侍講禁中名為侍讀其後康子元為侍講學士修撰官校理官並無常員以官人兼之侍制官古之待詔金馬門是留院官檢討官皆以學士別敕留之孔目官一人專知御書典四人並開元五年置知書官八人開元五年置掌分四庫書書直寫御書一百人搨書六人書直八人裝書直十四人造筆直四人並開元六年置集賢學士之職掌刊緝古今之經籍以辨明邦國之大典凡天下圖書之遺逸賢才之隱滯則承旨而徵求焉其有籌策之可施於時著述之可行於代者較其才藝而考其學術而申表之凡承旨撰集文章校理經籍月終則進課于內歲終則考最於外史館歷代史官隸祕書省著作局皆著作郎掌修國史武德因隋舊制貞觀三年閏十二月始移史館於禁中在門下省北宰相監修國史自是著作郎始罷史職及大明宮初成置史館於門下省之南館門下東西有棗樹七十四株無雜樹開元二十五年三月右相李林甫以中書地切樞密記事者官宜附近史官尹愔奏移史館於中書省北以舊尚藥院充館也史官古者天子諸侯皆有史官以紀言動曆數之事至後漢明帝召當時名士入東觀撰光武紀而史官因以他官兼之魏明帝始置著作郎專掌國史隸中書晉改隸祕書省因而不改貞觀年修五代史移史館於禁中史官無常員如有修撰大事則用他官兼之事畢日停監修國史貞觀已後多以宰相監修國史遂成故事也修撰直館天寶已後他官兼領史職者謂之史館修撰初入為直館也元和六年宰相裴奏登朝官領史職者並為修撰未登朝官入館者並為直館修撰中以一人官高者判館事其餘名目並請不置從之楷書手二十五人典書四人亭長二人掌固六人裝潢直一人熟紙匠六人史官掌修國史不虛美不隱惡直書其事凡天地日月之祥山川封域之分昭穆繼代之序禮樂師旅之事誅賞廢興之政皆本於起居注時政記以為實録然後立編年之體為褒貶焉既終藏之于府知匭使天后垂拱元年置匭以達冤滯其制一房四面各以方色東曰延恩西曰申冤南曰招諫北曰通玄所以申天下之冤滯達萬人之情狀蓋古善旌誹謗木之意也天寶九年改匭為獻納乾元元年復名曰匭垂拱已來常以諫議大夫及補闕拾遺一人充使受納訴狀每日暮進內而晨出之也翰林院天子在大明宮其院在右銀臺門內在興慶宮院在金明門內若在西內院在顯福門若在東都華清宮皆有待詔之所其待詔者有詞學經術合鍊僧道卜祝術藝書奕各別院以廩之日晚而退其所重者詞學武德貞觀時有溫大雅魏徵李百藥岑文本許敬宗褚遂良永徽後有許敬宗上官儀皆召入禁中驅使未有名目乾封中劉懿之劉禕之兄弟周思茂元萬頃范履冰皆以文詞召入待詔常於北門候進止時號北門學士天后時蘇味道韋承慶皆待詔禁中中宗時上官昭容獨當書詔之任睿宗時薛稷賈膺福崔湜又代其任玄宗即位張說陸堅張九齡徐安貞張等召入禁中謂之翰林待詔王者尊極一日萬機四方進奏中外表疏批答或詔從中出宸翰所揮亦資其檢討謂之視草故嘗簡當代士人以備顧問至德已後天下用兵軍國多務深謀密詔皆從中出尤擇名士翰林學士得充選者文士為榮亦如中書舍人例置學士六人內擇年深德重者一人為承旨所以獨承密命故也德宗好文尤難其選貞元已後為學士承旨者多至宰相焉內教坊武德已來置於禁中以按習雅樂以中官人充使則天改為雲韶府神龍復為教坊習藝館本名內文學館選宮人有儒學者一人為學士教習宮人則天改為習藝館又改為翰林內教坊以事在禁中故也祕書省隸中書之下漢代藏書之所有延閣廣內石渠之藏又御史中丞在殿內掌蘭臺祕書圖籍後漢桓帝延熹二年始置祕書監屬太常寺掌禁中圖書祕文後併入中書至晉惠帝別置祕書寺掌中外二閣圖書梁武改寺為省龍朔改為蘭臺光宅改為麟臺神龍復為祕書省祕書監一員從三品監之名後漢桓帝置魏晉不改後周謂之外史下大夫隋復為祕書監從第三品煬帝改為祕書令武德復為監龍朔改為蘭臺太史天授改為麟臺監神龍復為祕書監也少監二員從四品上少監隋煬帝置龍朔改為蘭臺侍郎天授為麟臺少監神龍復為祕書少監比置一員太極初增置一員也丞一員從五品上魏武帝置丞二人隋置一人正第五品也祕書監之職掌邦國經籍圖書之事有二局一曰著作二曰太史皆率其屬而修其職少監為之二丞掌判省事祕書郎四員從六品上校書郎八人正九品上正字四人正九品下主事一人從九品上令史四人書令史九人典書八人楷書手八十人亭長六人掌固八人祕書郎掌甲乙丙丁四部之圖籍謂之四庫經庫類十史庫類十三子庫類十四集庫類三事在經籍志著作局龍朔為司文局著作郎二人從五品上龍朔為司文郎中咸亨復也佐郎四人從六品上校書郎二人正九品上正字二人正九品下楷書手五人掌固四人著作郎佐郎掌修撰碑志祝文祭文與佐郎分判局事也司天臺舊太史局隸祕書監龍朔二年改為祕閣局久視元年改為渾儀監景雲元年改為太史監復為太史局隸祕書乾元元年三月十九日敕改太史監為司天臺改置官屬舊置於子城內祕書省西今在永寧坊東南角也監一人從三品本太史局令從五品下乾元元年改為監升從三品一如殿中祕書品秩也少監二人本曰太史丞從七品下乾元升為少監與諸司少監卿同品也太史令掌觀察天文稽定曆數凡日月星辰之變風雲氣色之異率其屬而占候之其屬有司曆二人掌造曆保章正一人掌教曆生四十一人監候五人掌候天文觀生九十人掌晝夜司候天文氣色靈臺郎二人掌教習天文氣色天文生六十人挈壺正二人掌知漏刻司辰七十人漏刻典事二十二人漏刻博士九人漏刻生三百六十人典鐘一百一十二人典鼓八十八人楷書手二人亭長掌固各四人自乾元元年別置司天臺改置官吏不同太史局舊數今據司天職掌書之也凡玄象器物天文圖書苟非其任不得預焉每季録所見災祥送門下中書省入起居注歲終總録封送史館每年預造來年曆頒于天下五官正五員正五品乾元元年置五官有春夏秋冬中五官之名丞二員正七品主簿二員正七品定額直五人五官靈臺郎五員正七品舊靈臺郎正八品下掌觀天文之變而占候之凡二十八宿分為十二次事具天文志也五官保章正五員正七品五官司曆五員正八品舊司曆二人從九品上掌國之曆法造曆以頒四方其曆有戊寅曆麟德曆神龍曆大衍曆天下之測量之處分至表準其詳可載故參考星度稽驗晷影各有典章五官監候五員正八品五官挈壺正五員正九品五官司辰十五員正九品舊挈壺正二員從八品下司辰十七人正九品下皆掌知漏刻孔壺為漏浮箭為刻以告中星昏明之候也五官禮生十五人五官楷書手五人令史五人漏刻博士二十人漏刻之法孔壺為漏浮箭為刻其箭四十有八晝夜共百刻冬夏之間有長短冬至之日晝漏四十刻夜漏六十刻夏至晝漏六十刻夜漏四十刻春分秋分之時晝夜各五十刻秋分之後減晝益夜凡九日加一刻春分已後減夜益晝九日減一刻二至前後加減遲用日多二分之間加減速用日少候夜以為更點之節每夜分為五更每更分為五點更以擊鼓為節點以擊鐘為節也典鐘典鼓三百五十人天文觀生九十人天文生五十人曆生五十五人漏生四十人視品十人已上官吏皆乾元元年隨監司新置也
