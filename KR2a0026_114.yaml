body:
  text: 舊唐書卷一百一十列傳第六十李光弼王思禮鄧景山辛雲京李光弼營州柳城人其先契丹之酋長父楷洛開元初左羽林將軍同正朔方節度副使封薊國公以驍果聞光弼幼持節行善騎射能讀班氏漢書少從戎嚴毅有大略起家左衛郎丁父憂終喪不入妻室天寶初纍遷左清道率兼安北都護府朔方都虞候五載河西節度王忠嗣補為兵馬使充赤水軍使忠嗣遇之甚厚常云光弼必居我位邊上稱為名將八載充節度副使封蘇郡公十一載拜單于副使都護十三載朔方節度安思順奏為副使知留後事思順愛其材欲妻之光弼稱疾辭官隴右節度哥舒翰聞而奏之得還京師祿山之亂封常清高仙芝戰敗斬於潼關又以哥舒翰率師拒賊尋命郭子儀為朔方節度收兵河西玄宗眷求良將委以河北河東之事以問子儀子儀薦光弼堪當閫寄十五載正月以光弼為雲中太守攝御史大夫充河東節度副使知節度事二月轉魏郡太守河北道採訪使以朔方兵五千會郭子儀軍東下井陘收常山郡賊將史思明以卒數萬來援常山追擊破之進收藁城等十餘縣南攻趙郡三月八日光弼兼范陽長史河北節度使拔趙郡自祿山反常山為戰場死人蔽野光弼酹其尸而哭之為賊幽閉者出之誓平寇難以慰其心六月與賊將蔡希德史思明尹子奇戰于常山郡之嘉山大破賊黨斬首萬計生擒四千思明露髮跣足奔于博陵河北歸順者十餘郡光弼以范陽祿山之巢穴將先斷之使絶根本會哥舒翰潼關失守玄宗幸蜀人心驚駭肅宗理兵於靈武遣中使劉智達追光弼子儀赴行在授光弼戶部尚書兼太原尹北京留守同中書門下平章事以景城河間之卒五千赴太原時節度王承業軍政不修詔御史崔衆交兵於河東衆侮易承業或裹甲持槍突入承業廳事玩謔之光弼聞之素不平至是交衆兵於光弼衆以麾下來光弼出迎旌旗相接而不避光弼怒其無禮又不即交兵令收繫之頃中使至除衆御史中丞懷其敕問衆所在光弼曰衆有罪繫之矣中使以敕示光弼光弼曰今只斬侍御史若宣制命即斬中丞若拜宰相亦斬宰相中使懼遂寢之而還翌日以兵仗圍衆至碑堂下斬之威震三軍命其親屬弔之二年賊將史思明蔡希德高秀巖牛廷玠等四偽帥率衆十餘萬來攻太原光弼經河北苦戰精兵盡赴朔方麾下皆烏合之衆不滿萬人思明謂諸將曰光弼之兵寡弱可屈指而取太原鼓行而西圖河隴朔方無後顧矣光弼所部將士聞之皆懼議欲修城以待之光弼曰城周四十里賊垂至今興功役是未見敵而自疲矣乃躬率士卒百姓外城掘壕以自固作塹數十萬衆莫知所用及賊攻城於外光弼即令增壘於內壞輒補之賊城外詬詈戲侮者光弼令穿地道一夕而擒之自此賊將行皆視地不敢逼城強弩發石以擊之賊驍將徑卒死者十二三城中長幼咸伏其勤智懦兵增氣而皆欲出戰史思明揣知之先歸留蔡希德等攻之月餘我怒而寇怠光弼率敢死之士出擊大破之斬首七萬餘級軍資器械一皆委棄賊始至及遁五十餘日光弼設小幕宿於城東南隅有急即應行過府門未嘗回顧賊退三日決軍事畢始歸府第轉檢校司徒收清夷橫野等軍擒賊將李弘義以歸詔曰銀青光祿大夫檢校司徒兼戶部尚書同中書門下平章事兼御史大夫鴻臚卿太原尹北京留守河東節度副大使薊國公光弼全德挺生英才間出干城禦侮坐甲安邊可守司空兼兵部尚書中書門下平章事進封魏國公食實封八百戶乾元元年與關內節度使王思禮入朝敕朝官四品已上出城迎謁遷侍中改封鄭國公二年七月制曰元帥之任實屬於師貞左軍之選諒資於邦傑自非道申啓沃學富韜鈐則何以翊分閫而專征膺鑿門而受律求諸將相允得其人司空兼侍中鄭國公光弼器識弘遠志懷沉毅蘊孫吳之略有文武之材往屬艱難備彰忠勇協風雲而經始保宗社於阽危由是出備長城入扶大廈茂功懸於日月嘉績被於巖廊屬殘寇猶虞總戎有命用擇惟賢之佐式弘建親之典必能緝寧邦國協贊天人誓于丹浦之師勦彼緑林之盜載明朝奬爰籍舊勳宜副出車之命仍踐分麾之寵為天下兵馬元帥趙王係之副知節度行營事八月兼幽州大都督府長史河北節度支度營田經略等使餘如故與九節度兵圍安慶緒於相州拔有日矣史思明自范陽來救屢絶糧道光弼身先士卒苦戰勝之屬大風晦冥諸將引衆而退所在剽掠唯光弼所部不散東京留守崔圓河南尹蘇震南奔襄陽郭子儀率衆屯于穀水史思明因殺安慶緒即偽位縱兵河南加光弼太尉兼中書令代郭子儀為朔方節度兵馬副元帥以東師委之左廂兵馬使張用濟承子儀之寬懼光弼之令與諸將頗有異議欲逗留其衆光弼以數千騎出次泛水縣用濟單騎迎謁即斬於轅門諸將懾伏都兵馬使僕固懷恩先期而至初光弼次汴州聞思明悉衆且至謂許叔冀曰大夫能守此城浹旬我必將兵來救叔冀曰諾光弼還東京思明至汴叔冀與戰不利遂與董秦梁浦劉從諫率衆降思明賊勢甚熾遣梁浦劉從諫田神功等將兵徇江淮謂之曰收得其地每人貢兩船玉帛思明乘勝而西光弼整衆徐行至洛謂留守韋陟曰賊乘鄴下之勝再犯王畿宜按甲以挫其鋒不利速戰洛城非禦備之所公計若何陟曰加兵陝州退守潼關據險以待之足挫其鋭矣光弼曰此蓋兵家常勢非用奇之策也夫兩軍相寇貴進尺寸之間耳今委五百里而不顧是張賊勢也若移軍河陽北阻澤潞三城以抗勝則擒之敗則自守表𩹉相應使賊不敢西侵此則猿臂之勢也夫辨朝廷之禮光弼不如公論軍旅之事公不如光弼陟無以應判官韋損曰東京帝宅侍中何不守之光弼曰若守洛城泛水崿嶺皆須人守子為兵馬判官能守之乎遂移牒留守及河南尹並留司官坊市居人出城避寇空其城率軍士運油鐵諸物以為戰守之備時史思明已至偃師光弼悉軍赴河陽賊已至洛城光弼軍方至石橋日暮令秉炬徐行與賊相隨而不敢來犯乙夜入河陽三城排閲守備號令嚴明與士卒同甘苦咸誓力戰賊憚光弼威略頓兵白馬寺南不出百里西不敢犯宮闕於河陽南築月城掘壕以拒光弼十月賊攻城於中灘城西大破逆黨五千餘衆斬首千餘級生擒五百餘人溺死者大半初光弼謂李抱玉曰將軍能為我守南城二日乎抱玉曰過期若何光弼曰過期而救不至任棄也抱玉稟命勒兵守南城將陷抱玉紿賊曰吾糧盡明日當降賊衆大喜斂軍以俟之抱玉復得繕完設備明日堅壁請戰賊怒見欺急攻之抱玉出奇兵表𩹉夾擊殺傷甚衆賊帥周摯領軍而退光弼自將於中灘城城外置柵柵外大掘塹濶二丈深亦如之周摯捨南城併力攻中灘光弼命荔非元禮出徑卒於羊馬城以拒賊光弼於城東北角樹小紅旗下望賊軍賊恃衆直逼其城以車二乘載木鵝蒙衝鬬樓橦車隨其後督兵填城下塹三面各八道過其兵又當塹開柵各置一門光弼遙望賊逼城使人語荔非元禮曰中丞看賊填塹開柵過兵居然不顧何也元禮報曰太尉擬守乎擬戰乎光弼曰戰元禮曰若戰賊為我填塹復何嫌也光弼曰吾智不及公公其勉之元禮俟柵開率其勇敢出戰一逼賊軍退走數百步元禮料敵陳堅雖出入馳突不足破賊收軍稍退以怠其寇而攻之光弼望見收軍大怒使人喚元禮欲按軍令元禮曰戰正忙喚作何物良久令軍中鼓譟出柵門徒搏齊進賊大潰周摯復整軍押北城而下將攻之光弼遽率衆入北城登城望曰彼雖衆亂而囂不足懼也當為公等日午而破之命出將戰及期不決謂諸將曰向來戰何處最堅而難犯或曰西北角遽命郝玉曰爾往擊之玉曰玉步卒也請騎軍五百翼之光弼與之三百又問何處最堅曰東南隅即命論惟貞以所部往擊之對曰貞蕃將也不知步戰請鐵騎三百與之百光弼又出賜馬四十匹分給且令之曰爾等望吾旗而戰若麾旗緩任爾觀望便宜吾旗連麾三至地則萬衆齊入生死以之少退者斬無捨玉策馬赴賊有一人將援槍刺賊洞馬腹連刺數人一人逢賊不戰而退光弼召不戰者斬賞援槍者絹五百匹須臾郝玉奔歸光弼望之驚曰郝玉退吾事危矣命左右取玉頭來玉見使者曰馬中箭非敢敗也使者馳報光弼令換馬遣之玉換馬復入決死而前光弼連麾三軍望旗俱進聲動天地一鼓而賊大潰斬萬餘級生擒八千餘人軍資器械糧儲數萬計臨陳擒其大將徐璜玉李秦授周摯其大將安太清走保懷州思明不知摯等敗尚攻南城光弼悉驅俘囚臨河以示之殺數十人以威之餘衆懼投河赴南岸光弼皆斬之初光弼將戰謂左右曰戰危事勝負繫之光弼位為三公不可死於賊手苟事之不捷繼之以死及是擊賊常納短刀於靴中有決死之志城上面西拜舞三軍感動賊既敗走光弼收懷州思明來救迎擊於沁水之上又敗之城將安太清極力拒守月餘不下光弼令僕固懷恩郝玉由地道而入得其軍號乃登陴大呼我師同登城遂拔生擒安太清周摯楊希文等送於闕下即日懷州平以功進爵臨淮郡王纍加實封至一千五百戶觀軍容使魚朝恩屢言賊可滅之狀朝旨令光弼速收東都光弼屢表賊鋒尚鋭請候時而動不可輕進僕固懷恩又害光弼之功潛附朝恩言賊可滅由是中使督戰光弼不獲已進軍列陳於北邙山下賊悉精鋭來戰光弼敗績軍資器械並為賊所有時李抱玉亦棄河陽光弼渡河保聞喜朝旨以懷恩異同致敗優詔徵之光弼自河中入朝抗表請罪詔釋之光弼懇讓太尉遂加開府儀同三司侍中河南尹行營節度使俄復拜太尉充河南淮南山南東道荊南等副元帥侍中如故出鎮臨淮史朝義乘邙山之勝寇申光等十三州自領精騎圍李岑於宋州將士皆懼請南保揚州光弼徑赴徐州以鎮之遣田神功擊敗之浙東賊首袁朝攻剽郡縣浙東大亂光弼分兵除討克定江左人心乃安初光弼將赴臨淮在道舁疾而行監軍使以袁朝方擾江淮光弼兵少請保潤州以避其鋒光弼曰朝廷寄安危於我今賊雖強未測吾衆寡若出其不意當自退矣遂徑往泗州光弼未至河南也田神功平劉展後逗留於揚府尚衡殷仲卿相攻於兗鄆來瑱旅拒於襄陽朝廷患之及光弼輕騎至徐州史朝義退走田神功遽歸河南尚衡殷仲卿來瑱皆懼其威名相繼赴闕寶應元年進封臨淮王賜鐵券圖形凌煙閣廣德初吐蕃入寇京畿代宗詔徵天下兵光弼與程元振不協遷延不至十月西戎犯京師代宗幸陝朝廷方倚光弼為援恐成嫌疑數詔問其母吐蕃退乃除光弼東都留守以察其去就光弼伺知之辭以久待敕不至且歸徐州欲收江淮租賦以自給代宗還京二年正月遣中使往宣慰光弼母在河中密詔子儀輿歸京師其弟光進與李輔國同掌禁兵委以心膂至是以光進為太子太保兼御史大夫涼國公渭北節度使上遇之益厚光弼御軍嚴肅天下服其威名每申號令諸將不敢仰視及懼朝恩之害不敢入朝田神功等皆不稟命因愧恥成疾遣衙將孫珍奉遺表自陳廣德二年七月薨於徐州時年五十七輟朝三日贈太保諡曰武穆光弼既疾亟將吏問以後事曰吾久在軍中不得就養既為不孝子夫復何言因取已封絹布各三千匹錢三千貫文分給將士部下護喪柩還京師代宗遣中官開府魚朝恩弔問其母於私第又命京兆尹第五琦監護喪事十一月葬於三原詔宰臣百官祖送於延平門外母李氏有鬚數十莖長五六寸以子貴封韓國太夫人二子皆節制一品光弼十年間三入朝與弟光進在京師雖與光弼異母性亦孝悌雙旌在門鼎味就養甲第並開往來追歡極一時之榮王思禮營州城傍高麗人也父虔威為朔方軍將以習戰聞思禮少習戎旅隨節度使王忠嗣至河西與哥舒翰對為押衙及翰為隴右節度使思禮與中郎周泌為翰押衙以拔石堡城功除右金吾衛將軍充關西兵馬使兼河源軍使十一載加雲麾將軍十二載翰征九曲思禮後期欲引斬之續使命釋之思禮徐言曰斬則斬却喚何物諸將皆壯之十三年吐蕃蘇毗王款塞詔翰至磨環川應接之思禮墜馬損腳翰謂中使李大宜曰思禮既損腳更欲何之十四載六月加金城太守祿山反哥舒翰為元帥奏思禮加開府儀同三司兼太常卿同正員充元帥府馬軍都將每事獨與思禮決之十五載二月思禮白翰謀殺安思順父元貞於紙隔上密語翰請抗表誅楊國忠翰不應復請以三十騎劫之橫馱來潼關殺之翰曰此乃翰反何預祿山事六月潼關失守思禮西赴行在至安化郡思禮與呂崇賁李承光並引於纛下責以不能堅守並從軍令或救之可收後效遂斬承光而釋思禮崇賁與房琯為副使便橋之戰又不利除為關內節度使尋遣守武功賊將安守忠及李歸仁安泰清來戰思禮以其衆退守扶風賊兵分至大和關去鳳翔五十里王師大駭鳳翔戒嚴中官及朝官皆出其孥上使左右巡御史虞候書其名乃止遂命司徒郭子儀以朔方之衆擊之而退至德二年九月思禮從元帥廣平王收西京既破賊思禮領兵先入景清宮又從子儀戰陝城曲沃新店賊軍繼敗收東京思禮又於絳郡破賊六千餘衆器械山積牛馬萬計遷戶部尚書霍國公食實封三百戶乾元二年與子儀等九節度圍安慶緒於相州思禮領關內及潞府行營步卒三萬馬軍八千大軍潰唯思禮與李光弼兩軍獨全及光弼鎮河陽制以思禮為太原尹北京留守河東節度使兼御史大夫貯軍糧百萬器械精鋭尋加守司空自武德已來三公不居宰輔唯思禮而已上元二年四月以疾薨輟朝一日贈太尉諡曰武烈命鴻臚卿監護喪事思禮長於支計短於用兵然立法嚴整士卒不敢犯時議稱之鄧景山曹州人也文吏見稱天寶中自大理評事至監察御史至德初擢拜青齊節度使遷揚州長史淮南節度為政簡肅聞於朝廷居職四年會劉展作亂引平盧副大使田神功兵馬討賊神功至揚州大掠居人資産鞭笞發掘略盡商胡大食波斯等商旅死者數千人上元二年十月追入朝拜尚書左丞太原尹北京留守王思禮軍儲豐實其外又別積米萬石奏請割其半送京師屬思禮薨以管崇嗣代之委任左右失於寬緩數月之間費散殆盡唯存陳爛萬餘石上聞之即日召景山代崇嗣及至太原以鎮撫紀綱為己任檢覆軍吏隱沒者衆懼有一偏將抵罪當死諸將各請贖其罪景山不許其弟請以身代其兄又不許弟請納馬一匹以贖兄罪景山許其減死衆咸怒謂景山曰我等人命輕如一馬乎軍衆憤怒遂殺景山上以景山統馭失所不復驗其罪遣使諭之軍中因請以都知兵馬使代州刺史辛雲京為節度使從之辛雲京者河西之大族也代掌戎旅兄弟數人並以將帥知名雲京有膽略志氣剛決不畏強禦每在戎行以擒生斬馘為務纍建勳勞官至北京都知兵馬使代州刺史鄧景山統馭失所為軍士所殺請雲京為節度使因授兼太原尹以北門委之雲京質性沉毅部下有犯令者不貸絲毫其賞功效亦如之故三軍整肅回紇恃舊勳每入漢界必肆狼貪至太原雲京以戎狄之道待之虜畏雲京不敢惕息數年間太原大理無烽警之虞纍加檢校左僕射同中書門下平章事大曆三年八月庚午薨上追悼發哀為之流涕册贈太尉輟朝三日諡曰忠獻後宰臣子儀元載等見上言及雲京泫然久之十一月葬命中使弔祭時宰相及諸道節度使祭者凡七十餘幄史臣曰凡言將者以孫吳韓白為首如光弼至性居喪人子之情顯矣雄才出將軍旅之政肅然以奇用兵以少敗衆將今比古詢事考言彼四子者或有慚德邙山之敗閫外之權不專徐州之留君側之人伺隙失律之尤雖免匪躬之義或虧令名不全良可惜也然閫外之事君側之人得不慎諸思禮法令嚴整儲廩豐盈節制之才固不易得景山始以文吏或有虛名仗鉞揚州召匪人而劫掠士庶分茅並部持小法而全昧機權貴馬賤人衆怒身死宜哉雲京賞善懲惡靜亂安邊功著軍中寵加身後不亦美歟贊曰光弼雄名思禮刑清始致亂者鄧景山何以救之辛雲京
