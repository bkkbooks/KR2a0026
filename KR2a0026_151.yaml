body:
  text: 舊唐書卷一百四十七列傳第九十七杜黃裳高郢子定杜佑子式方從郁式方子悰從郁子牧杜黃裳字遵素京兆杜陵人也登進士第宏辭科杜鴻漸深器重之為郭子儀朔方從事子儀入朝令黃裳主留務于朔方邠將李懷光與監軍陰謀代子儀乃為偽詔書欲誅大將溫儒雅等黃裳立辨其偽以詰懷光懷光流汗伏罪諸將有難制者黃裳矯子儀命盡出之數月而亂不作後入為臺省官為裴延齡所惡十年不遷貞元末為太常卿王叔文之竊權黃裳終不造其門嘗語其子壻韋執誼令率百官請皇太子監國執誼遽曰丈人纔得一官可復開口議禁中事耶黃裳勃然曰黃裳受恩三朝豈可以一官見買即拂衣而出尋拜平章事邠州節度使韓全義曾居討伐之任無功黃裳奏罷之劉闢作亂議者以劍南險固不宜生事唯黃裳堅請討除憲宗從之又奏請不以中官為監軍祇委高崇文為使黃裳自經營伐蜀以至成功指授崇文無不懸合崇文素憚劉澭黃裳使人謂崇文曰若不奮命當以劉澭代之由是得崇文之死力既平闢宰臣入賀帝目黃裳曰此卿之功也後與憲宗語及方鎮除授黃裳奏曰德宗自艱難之後事多姑息貞元中每帥守物故必先命中使偵伺其軍動息其副貳大將中有物望者必厚賂近臣以求見用帝必隨其稱美而命之以是因循方鎮罕有特命帥守者陛下宜熟思貞元故事稍以法度整肅諸侯則天下何憂不治憲宗然其言由是用兵誅蜀夏之後不容藩臣蹇傲克復兩河威令復振蓋黃裳啟其衷也黃裳有經畫之才達於權變然檢身律物寡廉潔之譽以是居鼎職不久二年正月檢校司空同平章事兼河中尹河中晉絳等州節度使八月封邠國公三年九月卒於河中年七十一贈司徒諡曰宣黃裳性雅澹寬恕心雖從長口不忤物始為卿士女嫁韋執誼深不為執誼所稱及執誼譴逐黃裳終保全之洎死嶺表請歸其喪以辦葬事及是被疾醫人誤進其藥疾甚而不怒然為宰相除授不分流品或官以賂遷時論惜之黃裳歿後賄賂事發八年四月御史臺奏前永樂令吳憑為僧鑒虛受託與故司空杜黃裳於故州邠寧節度使高崇文處納賂四萬五千貫並付黃裳男載按問引伏敕曰吳憑曾佐使府忝履宦途自宜畏法惜身豈得為人通貨事關非道理合懲愆宜配流昭州其付杜載錢物宰輔之任寵寄實深致茲貨財不能拒絕已令按問悉合徵收貴全終始之恩俾弘寬大之典其所取錢物並宜矜免杜載等並釋放載為太子僕長慶中遷太僕少卿兼御史中丞充入吐蕃使載弟勝登進士第大中朝位給事中勝子庭堅亦進士擢第高郢字公楚其先渤海蓨人九歲通春秋能屬文天寶末盜據京邑父伯祥先為好畤尉抵賊禁將加極刑郢時年十五被髮解衣請代其父賊黨義之乃俱釋後舉進士擢第應制舉登茂才異行科授華陰尉嘗以魯不合用天子禮樂乃引公羊傳著魯議見稱於時由是授咸陽尉郭子儀節制朔方辟為掌書記子儀嘗怒從事張曇奏殺之郢極言爭救忤子儀旨奏貶猗氏丞李懷光節制邠寧奏為從事累轉副元帥判官檢校禮部郎中懷光背叛將歸河中郢言西迎大駕豈非忠乎懷光忿而不聽及歸鎮又欲悉衆而西時渾瑊軍孤羣帥未集郢與李鄘誓死駐之屬懷光長子候郢郢乃諭以逆順曰人臣所宜效順且自天寶以來阻兵者今復誰在況國家自有天命非獨人力今若恃衆西向自絕于天十室之邑必有忠信安知三軍不有奔潰者乎李震懼流淚氣索明年春郢與都知兵馬使呂鳴岳都虞候張延英同謀間道上表及受密詔事洩二將立死懷光乃大集將卒白刃盈庭引郢詰之郢挺然抗辭無所慚隱憤氣感發觀者淚下懷光慚沮而止德宗還京命諫議大夫孔巢父中人啖守盈赴河中宣慰懷光授以太保而懷光怒激其親兵詬詈殺守盈及巢父巢父之被刃也委於地郢就而撫之及懷光被誅馬燧辟郢為掌書記未幾徵拜主客員外遷刑部郎中改中書舍人凡九歲拜禮部侍郎時應進士舉者多務朋游馳逐聲名每歲冬州府薦送後唯追奉讌集罕肄其業郢性剛正尤嫉其風既領職拒絕請託雖同列通熟無敢言者志在經藝專考程試凡掌貢部三歲進幽獨抑浮華朋濫之風翕然一變拜太常卿貞元十九年冬進位銀青光祿大夫守中書侍郎同中書門下平章事順宗即位轉刑部尚書為韋執誼等所憚尋罷知政事以本官判吏部尚書事明年出鎮華州元和元年冬復拜太常卿尋除御史大夫數月轉兵部尚書逾月再表乞骸不許又上言曰臣聞勞生佚老天理自然蠕動翾飛日入皆息自非貢禹之守經據古趙喜之正身匪懈韓暨之志節高潔山濤之道德模表縱過常期詎為貪冒其有當仁不讓急病忘身豈止君命猶宜身舉臣郢不才久辱高位無任由衷瀝懇之至乃授尚書右僕射致仕六年七月卒年七十二贈太子太保諡曰貞郢性恭慎廉潔罕與人交游守官奉法勤恪掌誥累年家無制草或謂之曰前輩皆留制集公焚之何也曰王言不可存私家時人重其慎密與鄭珣瑜並命拜相未幾德宗升遐時同在相位杜佑以宿舊居上而韋執誼由朋黨專柄順宗風恙方甚樞機不宣而王叔文以翰林學士兼戶部侍郎充度支副使是時政事王叔文謀議王伾通導李忠言宣下韋執誼奉行珣瑜自受命憂形顏色至是以勢不可奪因稱疾不起郢則因循竟無所發以至於罷物論定此為優劣焉子定嗣定幼聰警絕倫年七歲時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不為非道又問曰用命賞于祖不用命戮于社是順人乎父不能對仕至京兆參軍小字董二人以幼慧多以字稱之尤精王氏易嘗為易圖合八出以畫八卦上圓下方合則重轉則演七轉而六十四卦六甲八節備焉著易外傳二十二卷杜佑字君卿京兆萬年人曾祖行敏荊益二州都督府長史南陽郡公祖売心右司員外郎詳正學士父希望歷鴻臚卿恆州刺史西河太守贈右僕射佑以蔭入仕補濟南郡參軍剡縣丞時潤州刺史韋元甫嘗受恩於希望佑謁見元甫未之知以故人子待之他日元甫視事有疑獄不能決佑時在旁元甫試訊於佑佑口對響應皆得其要元甫奇之乃奏為司法參軍元甫為浙西觀察淮南節度皆辟為從事深所委信累官至檢校主客員外郎入為工部郎中充江西青苗使轉撫州刺史改御史中丞充容管經略使楊炎入相徵入朝歷工部金部二郎中並充水陸轉運使改度支郎中兼和糴等使時方軍興餽運之務悉委於佑遷戶部侍郎判度支為盧嵵所惡出為蘇州刺史佑母在嵵以蘇州憂闕授之佑不行俄換饒州刺史未幾兼御史大夫充嶺南節度使時德宗在興元朝廷故事執政往往遺脫舊嶺南節度常兼五管經略使佑獨不兼故五管不屬嶺南自佑始也貞元三年徵為尚書左丞又出為陝州觀察使遷檢校禮部尚書揚州大都督府長史充淮南節度使丁母憂特詔起復累轉刑部尚書檢校右僕射十六年徐州節度使張建封卒其子愔為三軍所立詔佑以淮南節制檢校左僕射同平章事兼徐泗節度使委以討伐佑乃大具舟艦遣將孟準先當之準渡淮而敗佑杖之固境不敢進及詔以徐州授愔而加佑兼濠泗等州觀察使在揚州開設營壘三十餘所士馬修葺然於賓僚間依阿無制判官南宮僔李亞鄭元均爭權頗紊軍政德宗知之並竄於嶺外十九年入朝拜檢校司空同平章事充太清宮使德宗崩佑攝冢宰尋進位檢校司徒充度支鹽鐵等使依前平章事旋又加弘文館大學士時王叔文為副使佑雖總統而權歸叔文叔文敗又奏李巽為副使頗有所立順宗崩佑復攝冢宰尋讓金穀之務引李巽自代先是度支以制用惜費漸權百司之職廣署吏員繁而難理佑始奏營繕歸之將作木炭歸之司農染練歸之少府綱條頗整公議多之朝廷允其議元和元年冊拜司徒同平章事封岐國公時河西党項潛導吐蕃入寇邊將邀功亟請擊之佑上疏論之曰臣伏見党項與西戎潛通屢有降人指陳事迹而公卿廷議以為誠當謹兵戎備侵軼益發甲卒邀其寇暴此蓋未達事機匹夫之常論也夫蠻夷猾夏唐虞已然周宣中興獫狁為害但命南仲往城朔方追之太原及境而止誠不欲弊中國而怒遠夷也秦平六國恃其兵力北築長城以拒匈奴西逐諸羌出於塞外勞力擾人結怨階亂中國未靜白徒競起海內雲擾實生謫戍漢武因文景之富命將興師遂至戶口減半竟下哀痛之詔罷田輪臺前史書之尚嘉其先迷而後復蓋聖王之理天下也唯務綏靜蒸人西至流沙東漸于海在南與北亦存聲教不以遠物為珍匪求遐方之貢豈疲內而事外終得少而失多故前代納忠之臣並有匡君之議淮南王請息師于閩越賈捐之願棄地于珠崖安危利害高懸前史昔馮奉世矯漢帝之詔擊莎車傳其王首於京師威震西域宣帝大悅議加爵土之賞蕭望之獨以為矯制違命雖有功效不可為法恐後之奉使者爭逐發兵為國家生事述理明白其言遂行國家自天后已來突厥默啜兵強氣勇屢寇邊城為害頗甚開元初邊將郝靈佺親捕斬之傳首闕下自以為功代莫與二坐望榮寵宋璟為相慮武臣邀功為國生事止授以郎將由是訖開元之盛無人復議開邊中國遂寧外夷亦靜此皆成敗可徵鑒戒非遠且党項小蕃雜處中國本懷我德當示撫綏間者邊將非廉亟有侵刻或利其善馬或取其子女便賄方物徵發役徒勞苦既多叛亡遂起或與北狄通使或與西戎寇邊有為使然固當懲革傳曰遠人不服則修文德以來之管子曰國家無使勇猛者為邊境此誠聖哲識微知著之遠略也今戎醜方強邊備未實誠宜慎擇良將誡之完葺使保誠信絕其求取用示懷柔來則懲禦去則謹備自然彼懷革其姦謀何必遽圖興師坐致勞費陛下上聖君人覆育羣類動必師古謀無不臧伏望堅保永圖置兵袵席天下幸甚臣識昧經綸學慚博究竊鼎鉉之寵任為朝廷之老臣恩深莫倫志懇思報臧否備閱芻蕘上陳有瀆旒扆伏深惶悚上深嘉納歲餘請致仕詔不許但令三五日一入中書平章政事每入奏事憲宗優禮之不名常呼司徒佑城南樊川有佳林亭卉木幽邃佑每與公卿讌集其間廣陳妓樂諸子咸居朝列當時貴盛莫之與比元和七年被疾六月復乞骸骨表四上情理切至憲宗不獲已許之詔曰宣力濟時為臣之懿躅辭榮告老行己之高風況乎任重公台義深翼贊秉沖讓之志堅金石之誠敦諭既勤所執彌固則當遂其衷懇進以崇名尚齒優賢斯王化之本也金紫光祿大夫守司徒同中書門下平章事兼充弘文館大學士太清宮使上柱國岐國公食邑三千戶杜佑巖廊上才邦國茂器蘊經通之識履溫厚之姿寬裕本乎性情謀猷彰乎事業博聞強學知歷代沿革之宜為政惠人審羣黎利病之要由是再司邦用累歷藩方出總戎麾入和鼎實聿膺重寄歷事先朝左右朕躬夙夜不懈命以詔冊登之上公肅恭在廷華髮承弁茲可謂國之元老人之具瞻者也朕纘承丕業思弘景化選勞求舊期致時邕方伸引翼之儀遽抗懸車之請而又固辭年疾乞就休閑已而復來星琯屢變有不可抑良用耿然永惟古先哲王君臣之際臣有耆艾以求其退君有優賜以徇其情乃輟鄧禹敷教之功仍增王祥輔導之秩俾養浩然之氣安於敬止之鄉庶乎怡神葆和永綏福履仍加階級以厚寵章可光祿大夫守太保致仕宜朝朔望是日上遣中使就佑第賜絹五百匹錢五百千其年十一月薨壽七十八廢朝三日冊贈太傅諡曰安簡佑性敦厚強力尤精吏職雖外示寬和而持身有術為政弘易不尚皦察掌計治民物便而濟馭戎應變即非所長性嗜學該涉古今以富國安人之術為己任初開元末劉秩採經史百家之言取周禮六官所職撰分門書三十五卷號曰政典大為時賢稱賞房琯以為才過劉更生佑得其書尋味厥旨以為條目未盡因而廣之加以開元禮樂書成二百卷號曰通典貞元十七年自淮南使人詣闕獻之曰臣聞太上立德不可庶幾其次立功遂行當代其次立言見志後學由是往哲遞相祖述將施有政用乂邦家臣本以門資幼登官序仕非遊藝才不逮人徒懷自強頗玩墳籍雖履歷叨幸或職劇務殷竊惜光陰未嘗輕廢夫孝經尚書毛詩周易三傳皆父子君臣之要道十倫五教之宏綱如日月之下臨天地之大德百王是式終古攸遵然多記言罕存法制愚管窺測莫達高深輒肆荒虛誠為億度每念懵學莫探政經略觀歷代衆賢著論多陳紊失之弊或闕匡拯之方臣既庸淺寧詳損益未原其始莫暢其終尚賴周氏典禮秦皇蕩滅不盡縱有繁雜且用準繩至於往昔是非可為來今龜鏡布在方冊亦粗研尋自頃纘修年踰三紀識寡思拙心昧辭蕪圖籍實多事目非少將事功畢罔愧乖疏固不足發揮大猷但竭愚盡慮而已書凡九門計貳百卷不敢不具上獻庶明鄙志所之塵瀆聖聰兢惶無措優詔嘉之命藏書府其書大傳於時禮樂刑政之源千載如指諸掌大為士君子所稱佑性勤而無倦雖位極將相手不釋卷質明視事接對賓客夜則燈下讀書孜孜不怠與賓佐談論人憚其辯而伏其博設有疑誤亦能質正始終言行無所玷缺唯在淮南時妻梁氏亡後升嬖妾李氏為正室封密國夫人親族子弟言之不從時論非之三子師損嗣位終司農少卿式方字考元以蔭授揚府參軍轉常州晉陵尉浙西觀察使王緯辟為從事入為太子通事舍人改太常寺主簿明練鐘律有所考定深為高郢所賞時父作鎮揚州家財鉅萬甲第在安仁里杜城有別墅亭館林池為城南之最昆仲皆在朝廷與時賢遊從樂而有節既而佑入中書出為昭應令丁父憂服闋遷司農少卿賜金紫加正議大夫太僕卿時少子悰選尚公主式方以右戚移病不視事久之穆宗即位轉兼御史中丞充桂管觀察都防禦使長慶二年三月卒於位贈禮部尚書式方性孝友弟兄尤睦季弟從郁少多疾病式方每躬自煎調藥膳水飲非經式方之手不入於口及從郁夭喪終年號泣殆不勝情士友多之子惲憓悰恂惲嗣富平尉憓興平尉悰以蔭三遷太子司議郎元和九年選尚公主召見于麟德殿尋尚岐陽公主加銀青光祿大夫殿中少監駙馬都尉岐陽憲宗長女郭妃之所生自頃選尚多於貴戚或武臣節將之家于時翰林學士獨孤郁權德輿之女壻時德輿作相郁避嫌辭內職上頗重學士不獲已許之且歎德輿有佳壻遂令宰臣於卿士家選尚文雅之士可居清列者初於文學後進中選擇皆辭疾不應唯悰願焉累遷至司農卿太和六年轉京兆尹七年檢校刑部尚書出為鳳翔尹鳳翔隴右節度丁內艱八年起復授忠武軍節度使陳許蔡觀察等使就加兵部尚書開成初入為工部尚書判度支屬岐陽公主薨久而未謝文宗怪之問左右戶部侍郎李王玉對曰近日駙馬為公主服斬衰三年所以士族之家不願為國戚者半為此也杜悰未謝拘此服紀也上愕然曰予初不知乃詔曰制服輕重必由典禮如聞往者駙馬為公主服三年緣情之義殊非故實違經之制今乃聞知宜令行杖周永為通制三年改戶部尚書兼判戶部度支事會昌中拜中書侍郎同中書門下平章事尋加左僕射大中初出鎮西川降先沒吐蕃維州州即古西戎地也其地南界江陽岷山連嶺而西不知其極北望隴山積雪如玉東望成都若在井底地接石紐山夏禹生于石紐山是也其州在岷山之孤峰三面臨江天寶後河隴繼陷惟此州在焉吐蕃利其險要二十年間設計得之遂據其城因號曰無憂城吐蕃由是不虞邛蜀之兵先是李德裕鎮西川維州吐蕃首領悉怛謀以城來降德裕奏之執政者與德裕不協遽勒還其城至是復收之亦不因兵刃乃人情所歸也俄復入相加司空繼加司徒歷鎮重藩至是加太傅邠國公悰無他才常延接寒素甘食竊位而已從郁以蔭貞元末再遷太子司議郎元和初轉左補闕諫官崔羣韋貫之獨孤郁等以從郁宰相子不合為諫官乃降授左拾遺羣等復執曰拾遺之與補闕雖資品有殊皆名諫列父為宰相子為諫官若政有得失不可使子論父乃改為祕書丞終駕部員外郎子牧顗俱登進士第顗後病目而卒牧字牧之既以進士擢第又制舉登乙第解褐弘文館校書郎試左武衞兵曹參軍沈傳師廉察江西宣州辟牧為從事試大理評事又為淮南節度推官監察御史𩹉行轉掌書記俄真拜監察御史分司東都以弟顗病目棄官授宣州團練判官殿中侍御史內供奉遷左補闕史館修撰轉膳部比部員外郎並兼史職出牧黃池睦三郡復遷司勳員外郎史館修撰轉吏部員外郎又以弟病免歸授湖州刺史入拜考功郎中知制誥歲中遷中書舍人牧好讀書工詩為文嘗自負經緯才略武宗朝誅昆夷鮮卑牧上宰相書論兵事言胡戎入寇在秋冬之間盛夏無備宜五六月中擊胡為便李德裕稱之注曹公所定孫武十三篇行於代牧從兄悰隆盛于時牧居下位心常不樂將及知命得病自為墓志祭文又嘗夢人告曰爾改名畢踰月奴自家來告曰炊將熟而甑裂牧曰皆不祥也俄又夢書行紙曰皎皎白駒在彼空谷寤寢而歎曰此過隙也吾生於角徵還於角為第八宮吾之甚厄也予自湖守遷舍人木還角足矣其年以疾終於安仁里年五十有集二十卷曰杜氏樊川集行於代子德祥官至丞郎史臣曰黃裳以道致君持誠奉主辨懷光之詐罷全義之征討賊闢之凶舉無遺算葬執誼之柩豈曰不仁郢天縱之性總丱之年代父命於臨刑孝也懷光之亂王人被傷撫巢父於賊庭義也抑浮濫之流考藝文之士盡搜幽滯大變時風正也保止足之名辭榮辱之路高避世利遐躅昔賢智也忠孝全矣仁智備矣此二子者皆臨大節而不可奪也佑承蔭入仕讞獄受知博古該今輸忠效用位居極品榮逮子孫操修之報不亦宜哉及其賓僚紊法嬖妾受封事重因循難乎語於正矣牧之文章悰之長厚能否既異才位不倫命矣夫贊曰貞公壯節臨難奮發言行無玷斯為明哲戡亂阜俗時泰位隆國之名臣邠公岐公
