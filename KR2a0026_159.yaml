body:
  text: 舊唐書卷一百五十五列傳第一百五穆寧子贊質員賞崔邠弟鄯郾鄲竇羣兄常牟弟庠鞏李遜弟建薛戎弟放穆寧懷州河內人也父元休以文學著撰洪範外傳十篇開元中獻之玄宗賜帛授偃師縣丞安陽令寧清慎剛正重交遊以氣節自任少以明經調授鹽山尉是時安祿山始叛偽署劉道玄為景城守寧唱義起兵斬道玄首傳檄郡邑多有應者賊將史思明來寇郡寧以攝東光令將兵禦之思明遣使説誘寧立斬之郡懼賊怨深後大兵至奪寧兵及攝縣初寧佐採訪使巡按常過平原與太守顏真卿密揣祿山必叛至是真卿亦唱義舉郡兵以拒祿山會間使持書遺真卿曰夫子為衛君乎更無他詞真卿得書大喜因奏署大理評事河北採訪支使寧以長子屬母弟曰惟爾所適苟不乏嗣吾無纍矣因往平原謂真卿曰先人有嗣矣古所謂死有輕於鴻毛者寧是也願佐公以定危難真卿深然之其後寧計或不行真卿迫蹙棄郡夜渡河而南見肅宗於鳳翔帝問拒賊之狀真卿曰臣不用穆寧之言功業不成帝奇之發驛召寧將以右職待之會真卿以抗直失旨事遂止上元二年纍官至殿中侍御史佐鹽鐵轉運使副元帥李光弼以餉運不繼或惡寧者誣譖於光弼光弼揚言欲殺寧寧直抵徐州見光弼喻以大義不為撓折光弼深重之寧得行其職寶應初轉侍御史為河南轉運租庸鹽鐵等副使明年遷戶部員外郎無幾加兼御史中丞為河南江南轉運使廣德初加庫部郎中是時河運不通漕挽由漢沔自商山達京師選鎮夏口者詔以寧為鄂州刺史鄂嶽沔都團練使及淮西鄂嶽租庸鹽鐵沿江轉運使賜金紫時淮西節度使李忠臣貪暴不奉法設防戍以稅商賈又縱兵士剽劫行人殆絶與寧夾淮為理憚寧威名寇盜輒止沔州別駕薛彥偉坐事忤旨寧杖之致死寧坐貶虔州司馬重貶昭州平集尉大曆四年起授監察御史領轉運留後事於淄青間一年改檢校司封郎中兼侍御史領轉運留後事於江西明年拜檢校祕書少監兼和州刺史理有善政居無何官罷代寧者以天寶版籍校見戶誣以逋亡多坐貶泉州司戶寧子贊守闕三年告冤詔遣御史按覆而人戶增倍詔書召寧除右諭德寧強毅不能事權貴執政者以為不附己且憚其難制故處之散位寧默默不得志且曰時不我容我不時徇則非吾之進也在於退乎辭病居家請告幾十旬者數矣親友強之復一朝請上居奉天寧詣行在拜祕書少監興元初改右庶子德宗還京師寧曰可以行吾志矣因移病罷歸東都貞元六年就拜祕書監致仕寧好學善教諸子家道以嚴稱事寡姊以悌聞通達體命未嘗服藥每誡諸子曰吾聞君子之事親養志為大直道而已慎無為諂吾之志也貞元十年十月卒時年七十九四子贊質員賞贊字相明釋褐為濟源主簿時父寧為和州刺史以剛直不屈於廉使遂被誣奏貶泉州司戶參軍贊奔赴闕庭號泣上訴詔御史覆問寧方得雪詔曰令子申父之冤憲臣奉君之命楚劍不衝於牛斗秦臺自洗於塵埃由是知名纍遷京兆兵曹參軍殿中侍御史轉侍御史分司東都時陝州觀察使盧嶽妾裴氏以有子嶽妻分財不及訴於官贊鞫其事御史中丞盧紹佐之令深繩裴罪贊持平不許宰臣竇參與紹善參紹俱持權怒贊以小事不受指使遂下贊獄侍御史杜倫希其意誣贊受裴之金鞭其使以成其獄甚急贊弟賞馳詣闕撾登聞鼓詔三司使覆理無驗出為郴州刺史參敗徵拜刑部郎中因次對德宗嘉其才擢為御史中丞時裴延齡判度支以姦巧承恩屬吏有贓犯贊鞫理承伏延齡請曲法出之贊三執不許以款狀聞延齡誣贊不平貶饒州別駕丁母憂再轉虔常二州刺史憲宗即位拜宣州刺史御史中丞充宣歙觀察使所蒞皆有政聲永貞元年十一月卒時年五十八贈工部尚書贊與弟質員賞以家行人材為搢紳所仰贊官達父母尚無恙家法清嚴贊兄弟奉指使笞責如僮僕贊最孝謹質強直應制策入第三等其所條對至今傳之自補闕至給事中時政得失未嘗不先論諫元和初掌賦使院多擅禁繫戶人而有笞掠至死者質乃論奏鹽鐵轉運司應決私鹽繫囚須與州府長吏監決自是刑名畫一憲宗以王承宗叛用內官吐突承璀為招討使質率同列伏閣論奏言自古無以中官為將帥者上雖改其名心頗不悅尋改質為太子左庶子五年坐與楊憑善出為開州刺史未幾卒員工文辭尚節義杜亞為東都留守辟為從事檢校員外郎早卒有文集十卷質兄弟俱有令譽而和粹世以滋味目之贊俗而有格為酪質美而多入為酥員為醍醐賞為乳腐近代士大夫言家法者以穆氏為高崔邠字處仁清河武城人祖結父倕官卑邠少舉進士又登賢良方正科貞元中授渭南尉遷拾遺補闕常疏論裴延齡為時所知以兵部員外郎知制誥至中書舍人凡七年又權知吏部選事明年為禮部侍郎轉吏部侍郎賜以金紫邠溫裕沉密尤敦清儉上亦器重之裴將引為相病難於承答事竟寢兄弟同時奉朝請者四人頗以孝敬怡睦聞後改太常卿知吏部尚書銓事故事太常卿初上大閲四部樂於署觀者縱焉邠自私第去帽親導母輿公卿逢者回騎避之衢路以為榮居母憂歲餘卒元和十年三月也時年六十二贈吏部尚書諡曰文簡弟鄯郾鄲等六人子璀璜璀子彥融皆登進士第歷位臺閣鄯少有文學舉進士元和中歷監察御史大和元年十月自太子詹事拜左金吾衛大將軍鄯昆弟六人仕官皆至三品邠郾鄲三人知貢舉掌銓衡冠族聞望為時名德鄯大和九年冬為左金吾大將軍無病暴亡不旬日有訓注之亂其亂始自金吾君子乃知鄯之亡崔氏積善之徵也贈禮部尚書子瑄郾字廣略舉進士平判入等授集賢殿校書郎三命升朝為監察御史刑部員外郎資質秀偉神情重雅人望而愛之終不可捨不知者以為事高簡拘靜默耳居內憂釋服為吏部員外姦吏不敢欺孤寒無援者未嘗留滯銓之美為時所稱再遷左司郎中元和十三年鄭餘慶為禮儀詳定使選時有禮學者共事以郾為詳定判官吏部郎中十五年遷諫議大夫穆宗即位荒於禽酒坐朝常晚郾與同列鄭覃等延英切諫穆宗甚嘉之畋遊稍簡長慶中轉給事中昭愍即位選侍講學士轉中書舍人入思政殿謝恩郾奏曰陛下用臣為侍講半歲有餘未嘗問臣經義今蒙轉改實慚尸素有愧厚恩帝曰朕機務稍間即當請益高鉞曰陛下意雖樂善既未延接儒生天下之人寧知重道帝深引咎賜之錦綵郾退與同列高重抄撮六經嘉言要道區分事類凡十卷名曰諸經纂要冀人主易於省覽上嘉之賜錦綵二百匹銀器等其年轉禮部侍郎東都試舉人凡兩歲掌貢士平心閲試賞拔藝能所擢者無非名士至大中咸通之代為輔相名卿者十數人出為陝州觀察使舊弊有上供不足奪吏俸以益之歲八十萬郾以廉使常用之直代之居二年政績聞於朝遷鄂嶽安黃等州觀察使又五年移浙西道都團練觀察使所至用寬政安疲人及居鄂渚則峻法嚴刑未常貰一死罪江湖之間雈蒲是叢因造蒙衝小艦上下千里期月而盡獲羣盜凡三按廉車率由清簡少事財用有餘人遂寧泰開成元年卒年六十九贈吏部尚書諡曰德郾與兄邠弟鄲等皆有令譽而郾疏財恢廓昆仲所不及子瑤瓌瑾珮璆瑤大和三年登進士第出佐藩方入升朝列纍至中書舍人大中六年知貢舉旋拜禮部侍郎出為浙西觀察使又遷鄂州刺史鄂嶽觀察使終於位瓌珮璆官至郎署給諫瑾大中十年登進士第纍居使府歷尚書郎知制誥咸通十三年知貢舉選拔頗為得人尋拜禮部侍郎出為湖南觀察使鄲登進士第纍遷監察御史三遷考功郎中大和三年以本官充翰林學士轉中書舍人六年罷學士八年為工部侍郎集賢殿學士權知禮部真拜兵部侍郎本官判吏部東銓事文宗勤於政道每苦選曹訛弊延英謂宰臣曰吏部殊不選才安得托實無濫可釐革否李石對曰令録可以商量他官且宜循舊上曰循舊如配官耳賢不肖安能甄別帝召三銓謂之曰卿等比選令録如何注擬鄲對曰資相當問其為治之術視可否而擬之帝曰依資合得而才劣者何授對曰與邊遠慢官帝曰如以不肖之才治邊民則疾苦可知也凡朝廷求理遠近皆須得人苟非其才人受其弊矣尋拜吏部侍郎開成二年出為宣州刺史兼御史中丞宣歙觀察使四年入為太常卿七月以本官同中書門下平章事尋加中書侍郎銀青光祿大夫會昌初李德裕用事與鄲弟兄素善鄲在相位纍年歷方鎮太子師保卒竇羣字丹列扶風平陵人祖亶同昌郡司馬父叔向以工詩稱代宗朝官至左拾遺羣兄常牟弟鞏皆登進士第唯羣獨為處士隱居毗陵以節操聞及母卒囓一指置棺中因廬墓次終喪後學春秋於啖助之門人盧庇者著書三十四卷號史記名臣疏貞元中蘇州刺史韋夏卿以丘園茂異薦兼獻其書不報及夏卿入為吏部侍郎改京兆尹中謝日因對復薦羣徵拜左拾遺遷侍御史充入蕃使祕書監張薦判官羣因入對奏曰陛下即位二十年始自草澤擢臣為拾遺是難其進也今陛下以二十年難進之臣用為和蕃判官一何易也德宗異其言留之復為侍御史王叔文之黨柳宗元劉禹錫皆慢羣羣不附之其黨議欲貶羣官韋執誼止之羣嘗謁王叔文叔文命撤榻而進羣揖之曰夫事有不可知者叔文曰如何羣曰去年李實伐恩恃貴傾動一時此時公逡巡路旁乃江南一吏耳今公已處實形勢又安得不慮路旁有公者乎叔文雖異其言竟不之用憲宗即位轉膳部員外兼侍御史知雜出為唐州刺史節度使于素聞其名既謁見羣危言激切甚悅奏留充山南東道節度副使檢校兵部郎中兼御史中丞賜紫金魚袋宰相武元衡李吉甫皆愛重之召入為吏部郎中元衡輔政舉羣代己為中丞羣奏刑部郎中呂溫羊士諤為御史吉甫以羊呂險躁持之數日不下羣等怒怨吉甫三年八月吉甫罷相出鎮淮南羣等欲因失恩傾之吉甫嘗召術士陳登宿于安邑里第翌日羣令吏捕登考劾偽構吉甫陰事密以上聞帝召登面訊之立辨其偽憲宗怒將誅羣等吉甫救之出為湖南觀察使數日改黔州刺史黔州觀察使在黔中屬大水壞其城郭復築其城徵督溪洞諸蠻程作頗急於是辰錦生蠻乘險作亂羣討之不能定六年九月貶開州刺史在郡二年改容州刺史容管經略觀察使九年詔還朝至衡州病卒時年五十羣性狠戾頗復恩讎臨事不顧生死是時徵入云欲大用人皆懼駭聞其卒方安二子謙餘審餘兄常字中行大曆十四年登進士第居廣陵之柳楊結廬種樹不求苟進以講學著書為事凡二十年不出貞元十四年鎮州節度使王武俊聞其賢遣人致聘辟為掌書記不就其年杜佑鎮淮南奏授校書郎為節度參謀元和六年自湖南判官入為侍御史轉水部員外郎出為朗州刺史歷固陵潯陽臨川三郡守入為國子祭酒求致仕寶曆元年卒時年七十子弘餘會昌中為黃州刺史牟字貽周貞元二年登進士第試祕書省校書郎東都留守巡官歷河陽昭義從事檢校水部郎中賜緋再為留守判官入為都官郎中出為澤州刺史入為國子祭酒長慶二年卒時年七十四子周餘大中年祕書監牟弟庠字胄卿釋褐國子主簿吏部侍郎韓臯出鎮武昌辟為推官臯移鎮浙西奏庠為節度副使殿中侍御史遷澤州刺史又為宣歙副使除奉天令登州刺史東都留守判官歷信婺二州刺史卒年六十三子繇載鞏字友封元和二年登進士第袁滋鎮滑州辟為從事滋改荊襄二鎮皆從之掌管記之任平盧薛平又辟為副使入朝拜侍御史歷司勳員外刑部郎中元稹觀察浙東奏為副使檢校祕書少監兼御史中丞賜金紫稹移鎮武昌鞏又從之鞏能五言詩昆仲之間與牟詩俱為時所賞重性溫雅多不能持論士友言議之際吻動而不發白居易等目為囁嚅翁終于鄂渚時年六十子六人景餘師裕最知名李遜字友道後魏申公發之後於趙郡謂之申公房曾祖進德太子中允祖珍玉昌明令父震雅州別駕世寓於荊州之石首遜登進士第辟襄陽掌書記復從事於湖南主其留務頗有聲績纍拜池濠二州刺史先是濠州之都將楊騰削刻士卒州兵三千人謀殺騰騰覺之走揚州家屬皆死濠兵不自戢因行攘剽及遜至郡餘亂未殄徐驅其間為陳逆順利害之勢衆皆釋甲請罪因以寧息觀察使旨限外徵役皆不從入拜虞部郎中元和初出為衢州刺史以政績殊尤遷越州刺史兼御史大夫浙東都團練觀察使先是貞元初皇甫政鎮浙東嘗福建兵亂逐觀察使吳詵政以所鎮實壓閩境請權益兵三千俟賊平而罷賊平向三十年而所益兵仍舊遜視事數日舉奏停之遜為政以均一貧富扶弱抑強為己任故所至稱理九年入為給事中遜以舊制隻日視事對羣臣遜奏論曰事君之義有犯無隱陳誠啓沃不必擇辰今羣臣敷奏乃候隻日是畢歲臣下覩天顏獻可否能幾何憲宗嘉之乃許不擇時奏對俄遷戶部侍郎元和十年拜襄州刺史充山南東道節度觀察等使襄陽前領八郡唐鄧隋在焉是時方討吳元濟朝議以唐蔡鄰接遂以鄧隸唐州三郡別為節制命高霞寓領之專俟攻討遜以五州賦餉之時遜代嚴綬鎮襄陽綬以八州兵討賊在唐州既而綬以無功罷兵柄命高霞寓代綬將兵於唐州其襄陽軍隸于霞寓軍士家口在襄州者遜厚撫之士卒多捨霞寓亡歸既而霞寓為賊所敗乃移過于遜言供饋不時霞寓本出禁軍內官皆佐之既貶官中人皆言遜撓霞寓軍所以致敗上令中使至襄州聽察曲直奏言遜不直乃左授太子賓客分司又降為恩王傅十三年李師道效順命遜為左散騎常侍馳赴東平諭之師道得詔意動即請效順旋為其下所惑而止遜還未幾除京兆尹改國子祭酒十四年拜許州刺史充忠武節度陳許蔡等州觀察處置等使是時新罹兵戰難遽完緝及遜至集大軍與之約束嚴具示賞罰必信號令數百言士皆感悅長慶元年幽鎮繼亂遜請身先討賊不許但命以兵一萬會于行營遜奉詔即日發兵故先諸軍而至由是進位檢校吏部尚書尋改鳳翔節度使行至京師以疾陳乞改刑部尚書長慶三年正月卒年六十三廢朝一日贈右僕射遜幼孤寓居江陵與其弟建皆安貧苦易衣併食講習不倦遜兄造知二弟賢日為營丐成其志業建先遜一年卒兄弟同致休顯士君子多之諡曰恭肅造早卒建字杓直家素清貧無舊業與兄造遜於荊南躬耕致養嗜學力文舉進士選授祕書省校書郎德宗聞其名用為右拾遺翰林學士元和六年坐事罷職降詹事府司直高郢為御史大夫奏為殿中侍御史遷兵部郎中知制誥自以草詔思遲不願司文翰改京兆尹與宰相韋貫之友善貫之罷相建亦出為澧州刺史徵拜太常少卿尋以本官知禮部貢舉建取捨非其人又惑於請託故其年選士不精坐罰俸料明年除禮部侍郎竟以人情不洽改為刑部建名位雖顯以廉儉自處家不理垣屋士友推之長慶二年二月卒贈工部尚書三子訥恪朴訥最知名官至華州刺史檢校尚書右僕射薛戎字元夫河中寶鼎人少有學術不求聞達居於毗陵之陽羡山年餘四十不易其操江西觀察使李衡辟為從事使者三返方應故相齊映代衡又留署職府罷歸山福建觀察使柳冕表為從事纍月轉殿中侍御史會泉州闕刺史冕署戎權領州事是時姚南仲節制鄭滑從事馬總以其道直為監軍使誣奏貶泉州別駕冕附會權勢欲構成總罪使戎按問曲成之戎以總無辜不從冕意別白其狀戎還自泉州冕盛氣據衙而見賓客戎遂歷東廂從容而入冕度勢未可屈徐起以見一揖而退又構其罪以狀聞置戎于佛寺環以武夫恣其侵辱如是纍月誘令成總之罪操心如一竟不動搖杜佑鎮淮南知戎之冤乃上其表發書諭冕戎難方解遂辭職寓居於江湖間後閻濟美為福建觀察使備聞其事奏充副使又隨濟美移鎮浙東改侍御史入拜刑部員外郎出為河南令纍改衢湖常三州刺史遷浙東觀察使所蒞皆以政績聞居數歲以疾辭官長慶元年十月卒贈左散騎常侍戎檢身處約不務虛名俸入之餘散於宗族身歿之後人無譏焉兄弟五人季弟放最知名放登進士第性端厚寡言於是非不甚繫意纍佐藩府蒞事幹敏官至試大理評事擢拜右拾遺轉補闕歷水部兵部二員外遷兵部郎中遇憲宗以儲皇好書求端士輔導經義選充皇太子侍讀及穆宗嗣位未聽政間放多在左右密參機命穆宗常謂放曰小子初承大寶懼不克荷先生宜為相以匡不逮放叩頭曰臣實庸淺獲侍冕旒固不足猥塵大位輔弼之任自有賢能其言無矯飾皆此類也穆宗深嘉其誠因召對思政殿賜以金紫之服轉工部侍郎集賢學士雖任非峻切而恩顧轉隆轉刑部侍郎職如故穆宗常謂侍臣曰朕欲習學經史何先放對曰經者先聖之至言仲尼之所發明皆天人之極致誠萬代不刊之典也史記前代成敗得失之迹亦足鑒其興亡然得失相參是非無準的固不可為經典比也帝曰六經所尚不一志學之士白首不能盡通如何得其要對曰論語者六經之菁華孝經者人倫之本窮理執要真可謂聖人至言是以漢朝論語首列學官光武令虎賁之士皆習孝經玄宗親為孝經注解皆使當時大理四海乂寧蓋人知孝慈氣感和樂之所致也上曰聖人以孝為至德要道其信然乎轉兵部侍郎禮部尚書判院事放閨門之內尤推孝睦孤孀百口家貧每不給贍常苦俸薄放因召對懇求外任其時偶以節制無闕乃授以廉問及鎮江西惟用清潔為理一方之人至今思之寶曆元年卒於江西觀察使廢朝一日史臣曰穆祕監之剛正不奪如寒松倚巖千丈徑節而竇容州之敢決如鷙鳥逐雀英氣動人巖穴之流罕能及此然矯激過當君子不為如塤如篪不通不介士行之美崔氏諸子有焉建遜之貞方戎放之道義元和已來稱為令族宜哉贊曰穆之贊質竇之常羣迹參時傑氣爽人文二李英英四崔濟濟薛氏三門難兄難弟
