body:
  text: 舊唐書卷一百二十列傳第七十郭子儀子曜晞曖曙晤映晞子鋼曖子釗鏦釗子仲文弟幼明子昕郭子儀華州鄭縣人父敬之歷綏渭桂壽泗五州刺史以子儀貴贈太保追封祁國公子儀長六尺餘體貌秀傑始以武舉高等補左衛長史纍歷諸軍使天寶八載於木剌山置橫塞軍及安北都護府命子儀領其使拜左衛大將軍十三載移橫塞軍及安北都護府於永清柵北築城仍改橫塞為天德軍子儀為之使兼九原太守朔方節度右兵馬使十四載安祿山反十一月以子儀為衛尉卿兼靈武郡太守充朔方節度使詔子儀以本軍東討遂舉兵出單于府收靜邊軍斬賊將周萬頃傳首闕下祿山遣大同軍使高秀巖寇河曲子儀擊敗之進收雲中馬邑開東陘以功加御史大夫十五載正月賊將蔡希德陷常山郡執顏杲卿河北郡縣皆為賊守二月子儀與河東節度使李光弼率師下井陘拔常山郡破賊於九門南攻趙郡生擒賊四千皆捨之斬僞太守郭獻璆獲兵仗數萬師還常山賊將史思明以數萬人踵其後我行亦行我止亦止子儀選驍騎五百更挑之三日至行唐賊疲乃退我軍乘之又敗於沙河祿山聞思明敗乃以精兵益之我軍至恆陽賊亦隨至子儀堅壁自固賊來則守賊去則追晝揚其兵夕襲其幕賊人不及息數日光弼議曰賊怠矣可以戰六月子儀光弼率僕固懷恩渾釋之陳回光等陳於嘉山賊將史思明蔡希德尹子奇等亦結陳而至一戰敗之斬馘四萬級生擒五千人獲馬五千匹思明露髮跣足奔于博陵於是河北十餘郡皆斬賊守者以迎王師子儀將北圖范陽軍聲大振是月哥舒翰為賊所敗潼關不守玄宗幸蜀肅宗幸靈武子儀副使杜鴻漸為朔方留後奏迎車駕七月肅宗即位以賊據兩京方謀收復詔子儀班師八月子儀與李光弼率步騎五萬至自河北時朝廷初立兵衆寡弱雖得牧馬軍容缺然及子儀光弼全師赴行在軍聲遂振興復之勢民有望焉詔以子儀為兵部尚書同中書門下平章事依前靈州大都督府長史朔方軍節度使肅宗大閲六軍南趨關輔至彭原郡宰相房琯請兵萬人自為統帥以討賊帝素重琯許之兵及陳濤為賊所敗喪師殆盡方事討除而軍半殪唯倚朔方軍為根本十一月賊將阿史那從禮以同羅僕骨五千騎出塞誘河曲九府六胡州部落數萬欲迫行在子儀與回紇首領葛邏支往擊敗之斬獲數萬河曲平定賊將崔乾祐守潼關二年三月子儀大破賊於潼關崔乾祐退保蒲津時永樂尉趙復河東司戶韓旻司士徐炅宗子李藏鋒等陷賊在蒲州四人密謀俟王師至則為內應及子儀攻蒲州趙復等斬賊守陴者開門納子儀乾祐與麾下數千人北走安邑安邑百姓僞降乾祐兵入將半下懸門擊之乾祐未入遂得脫身東走子儀遂收陝郡永豐倉自是潼陝之間無復寇鈔是月安祿山死朝廷欲圖大舉詔子儀還鳳翔四月進位司空充關內河東副元帥五月詔子儀帥師趨京城師於潏水之西與賊將安太清安守忠戰王師不利其衆大潰盡委兵仗於清渠之上子儀收合餘衆保武功詣闕請罪乞降官資乃降為左僕射餘如故九月從元帥廣平王率蕃漢之師十五萬進收長安回紇遣葉護太子領四千騎助國討賊子儀與葉護宴狎修好相與誓平國難相得甚好子儀奉元帥為中軍與賊將安守忠李歸仁戰於京西香積寺之北王師結陳橫亙三十里賊衆十萬陳於北歸仁先薄我軍我軍亂李嗣業奮命馳突擒賊十餘騎乃定回紇以奇兵出賊陳之後夾攻之賊軍大潰自午至酉斬首六萬級賊將張通儒守長安聞歸仁等敗是夜奔陝郡翌日廣平王入京師老幼百萬夾道歡叫涕泣而言曰不圖今日復見官軍廣平王休士三日率師東趨肅宗在鳳翔聞捷羣臣稱賀帝以宗廟被焚悲咽不自勝臣僚無不感泣十月安慶緒遣嚴莊悉其衆十萬來赴陝州與張通儒同抗官軍賊聞官軍至悉其衆屯於陝西負山為陳子儀以大軍擊其前回紇登山乘其背遇賊潛師於山中與鬬過期大軍稍卻賊分兵三千人絶我歸路衆心大搖子儀麾回紇令進盡殺之師馳至其後於黃埃中發十餘箭賊驚顧曰回紇來即時大敗僵尸遍山澤嚴莊張通儒走歸洛陽遂與安慶緒渡河保相州子儀奉廣平王入東都陳兵於天津橋南士庶歡呼於路僞侍中陳希烈僞中書令張等三百餘人素服請罪王慰撫遣之是時河東河西河南賊所盜郡邑皆平以功加司徒封代國公食邑千戶尋入朝天子遣兵仗戎容迎於灞上肅宗勞之曰雖吾之家國實由卿再造子儀頓首感謝十二月還東都命子儀經營北討乾元元年七月破賊河上擒僞將安守忠以獻遂朝京師敕百僚班迎於長樂驛帝御望春樓待之進位中書令九月奉詔大舉子儀與河東節度使李光弼關內節度使王思禮北庭行營節度李嗣業襄鄧節度史魯炅荊南節度季廣堔河南節度使崔光遠滑濮度許淑冀平盧兵馬使董秦等九節度之師討安慶緒帝以子儀光弼俱是元勳難相統屬故不立元帥唯以中官魚朝恩為觀軍容宣慰史十月子儀自杏園渡河衛州安慶緒與其驍將安雄俊崔乾祐薛嵩田承嗣悉其衆來援分為三軍子儀陳以待之預選射者三千人伏於壁內誡之曰俟吾小卻賊必爭進則登城鼓譟弓弩齊發以迫之既戰子儀僞遁賊果乘之及壘門遽聞鼓譟俄而弓弩齊發矢注如雨賊徒震駭子儀整衆追之賊衆大敗是役也獲僞鄭王安慶和以獻遂收衛州進軍趨鄴與賊再戰於愁思岡賊軍又敗乃連營圍之慶緒遣薛嵩以所乘馬十匹求救於史思明且言禪代十二月思明遣將李歸仁率衆赴之營于滏陽二年正月史思明自率范陽精卒復陷魏州乃僞稱燕王王師雖衆軍無統帥進退無所承稟自冬徂春竟未破賊但引漳水以灌其城城中食盡易子而食二月思明率衆自魏州來李光弼王思禮許叔冀魯炅前軍遇賊于鄴南與之接戰夷傷相半魯炅中流矢子儀為後陳未及合戰大風遽起吹沙拔木天地晦暝跬步不辨物色我師潰而南賊軍潰而北委棄兵仗輜重纍積於路諸軍各還本鎮子儀以朔方軍保河陽斷浮橋有詔令留守東都三月以子儀為東都畿山南東道河南諸道行營元帥中官魚朝恩素害子儀之功因其不振媒孽之尋召還京師天子以趙王係為天下兵馬元帥李光弼副之委以陝東軍事代子儀之任子儀雖失兵柄乃心王室以禍難未平不遑寢息俄而史思明再陷河洛朝廷旰食復慮蕃寇逼迫京畿三年正月授子儀邠寧鄜坊兩鎮節度使仍留京師言事者以子儀有社稷大功今殘孽未除不宜置之散地肅宗深然之上元元年九月以子儀為諸道兵馬都統管崇嗣副之令率英武威遠等禁軍及河西河東諸鎮之師取邠寧朔方大同橫野徑抵范陽詔下旬日復為朝恩所間事竟不行上元二年二月李光弼兵敗於邙山河陽失守魚朝恩退保陝州三年二月河中軍亂殺其帥李國貞時太原節度鄧景山亦為部下所殺恐其合從連賊朝廷憂之後輩帥臣未能彈壓勢不獲已遂用子儀為朔方河中北庭潞儀澤沁等州節度行營兼興平定國副元帥充本管觀察處置使進封汾陽郡王出鎮絳州三月子儀辭赴鎮肅宗不豫羣臣莫有見者子儀請曰老臣受命將死於外不見陛下目不瞑矣帝乃引至臥內謂子儀曰河東之事一以委卿子儀嗚咽流涕賜御馬銀器雜綵別賜絹四萬匹布五萬端以賞軍子儀至絳擒其殺國貞賊首王元振數十人誅之太原辛雲京聞子儀誅元振亦誅害景山者由是河東諸鎮率皆奉法四月代宗即位內官程元振用事自矜定策之功忌嫉宿將以子儀功高難制巧行離間請罷副元帥加實封七百戶充肅宗山陵使子儀既謝恩上表進肅宗所賜前後詔敕因自陳訴曰臣德薄蟬翼命輕鴻毛纍蒙國恩猥廁朝列會天地震蕩中原血戰臣北自靈武冊先皇帝乃舉兵而南大搜於岐陽先帝憂勤宗社託臣以家國俾副陛下掃兩京之妖祲陛下雄圖丕斷再造區宇自後不以臣寡劣委文武之二柄外敷邦教內調鼎飪是以常許國家之死實荷日月之明臣本愚淺言多詆直慮此招謗上瀆冕旒陛下居高聽卑察臣不二皇天后土察臣無私伏以器忌滿盈日增兢惕焉敢偷全久妨賢路自受恩塞下制敵行間東西十年前後百戰天寒劍折濺血霑衣野宿魂驚飲冰傷骨跋涉難阻出沒死生所仗唯天以至今日陛下曲垂惠奬念及勤勞貽臣詔書一千餘首聖旨微婉慰諭綢繆彰微臣一時之功成子孫萬代之寶自靈武河北河南彭原鄜坊河東鳳翔兩京絳州臣所經行賜手詔敕書凡二十卷昧死上進庶煩聽覽詔答曰朕不德不明俾大臣憂疑朕之過也朕甚自愧公勿以為慮代宗以子儀頃同患難收復兩京禮之逾厚時史朝義尚據洛陽元帥雍王率師進討代宗欲以子儀副之而魚朝恩程元振亂政殺裴茙來瑱子儀既為所間其事遂寢乃留京師俄而梁崇義據襄陽叛僕固懷恩阻兵於汾州引回紇吐蕃之衆入寇河西明年十月吐蕃陷涇州虜刺史高暉暉遂與蕃軍為鄉導引賊深入京畿掠奉天武功濟渭而南緣山而東渭北行營兵馬使呂日將逆戰于盩厔自辰至酉殺蕃軍數千然其徒多殞賊將逼京師君上計無所出遽詔子儀為關內副元帥出鎮咸陽子儀自相州不利李光弼代掌兵柄及徵還朝廷部曲散去及是承詔部下唯二十騎強取民家畜産以助軍至咸陽蕃軍已過渭水其日天子避狄幸陝州子儀聞上避狄雪涕還京至則車駕已發射生將王獻忠從駕沿路遂以四百騎叛仍逼豐王已下十王欲投於賊子儀入開遠門遇之詰豐王等所向遂護送行在子儀以三千騎傍南山至商州得武關防兵及六軍散卒四千人招輯亡逸其軍漸振蕃寇犯京城得故邠王守禮子廣武王承宏立帝號假署百官子儀遣六軍兵馬使張知節烏崇福羽林軍使長孫全緒等將兵萬人為前鋒營於韓公堆盛張旗幟鼓鞞震山谷全緒遣禁軍舊將王甫入長安陰結少年豪俠以為內應一日齊擊鼓於朱雀街蕃軍惶駭而去大將李忠義先屯兵苑中渭北節度使王仲升守朝堂子儀以大軍續進至滻西射生將王撫自署為京兆尹聚兵二千人擾亂京城子儀召撫殺之詔子儀權京城留守自西蕃入寇車駕東幸天下皆咎程元振諫官屢論之元振懼又以子儀復立功不欲天子還京勸帝且都洛陽以避蕃寇代宗然之下詔有日子儀聞之因兵部侍郎張重光宣慰回附章論奏曰臣聞雍州之地古稱天府右控隴蜀左扼崤函前有終南太華之險後有清渭濁河之固神明之奧王者所都地方數千里帶甲十餘萬兵強士勇雄視八方有利則出攻無利則入守此用武之國非諸夏所同秦漢因之卒成帝業其後或處之而泰去之而亡前史所書不唯一姓及隋氏季末煬帝南遷河洛丘墟兵戈亂起高祖唱義亦先入關惟能翦滅姦雄底定區宇以至于太宗高宗之盛中宗玄宗之明多在秦川鮮居東洛間者羯胡構亂九服分崩河北河南盡從逆命然而先帝仗朔方之衆慶緒奔亡陛下藉西土之師朝義就戮豈唯天道助順抑亦地形使然此陛下所知非臣飾說近因吐蕃凌逼鑾駕東巡蓋以六軍之兵素非精練皆市肆屠沽之人務挂虛名苟避征賦及驅以就戰百無一堪亦有潛輸貨財因以求免又中官掩蔽庶政多荒遂令陛下振蕩不安退居陝服斯蓋關於委任失所豈可謂秦地非良者哉今道路云云不知信否咸謂陛下已有成命將幸洛都臣熟思其端未見其利夫以東周之地久陷賊中宮室焚燒十不存一百曹荒廢曾無尺椽中間畿內不滿千戶井邑榛棘豺狼所嘷既乏軍儲又鮮人力東至鄭汴達于徐方北自覃懷經于相土人烟斷絶千里蕭條將何以奉萬乘之牲餼供百官之次舍矧其土地狹厄才數百里間東有成皋南有二室險不足恃適為戰場陛下奈何棄久安之勢從至危之策忽社稷之計生天下之心臣雖至愚竊為陛下不取且聖旨所慮豈不以京畿新遭剽掠田野空虛恐糧食不充國用有闕以臣所見深謂不然昔衛文公小國之君諸侯之主耳遭懿公為狄所滅始廬于曹衣大布之衣冠大帛之冠元年革車三十乘季年三百乘卒能恢復舊業享無疆之休況明明天子躬儉節用苟能黜素餐之吏去冗食之官抑豎刁易牙之權任蘧瑗史鰌之直薄征弛力恤隱逮魚衆委諸相以簡賢任能付老臣以練兵禦侮則黎元自理寇盜自平中興之功旬月可冀卜年之期永永無極矣願時邁順動回鑾上都再造邦家唯新庶政奉宗廟以修薦享謁陵寢以崇孝思臣雖隕越死無所恨代宗省表垂泣謂左右曰子儀用心真社稷臣也可亟還京師十一月車駕自陝還宮子儀伏地請罪帝駐車勞之曰朕用卿不早故及於此乃賜鐵券圖形凌煙閣是時河北副元帥僕固懷恩方頓軍汾州掠並汾諸縣以為己邑乃以子儀兼關內河東副元帥河中節度觀察使出鎮河中蕃戎既退僕固懷恩部下離散是月懷恩子瑒主兵榆次為帳下將張惟嶽所殺傳首京師惟嶽以瑒之衆歸於子儀懷恩懼棄其母而走靈州明年九月以子儀守太尉充北道邠寧涇原河西已東通和蕃及朔方招撫觀察使其關內河東副元帥中書令如故子儀以懷恩未誅不宜讓使堅辭太尉曰太尉職雄任重竊憂非據輒敢上聞伏奉詔書未允誠懇臣疇昔之分早知止足今茲纍請竊懼滿盈義實由衷事非矯飾志之所至敢不盡言自兵亂已來紀綱寖壞時多躁競俗少廉隅德薄而位尊功微而賞厚實繁有衆不可殫論臣每見之深以為念昔范宣子讓其下皆讓欒黶為汰不敢違也臣誠薄劣竊慕古人務欲以身率先大變浮俗是用勤勤懇懇願罷此官庶禮讓興行由臣而致也臣位為上相爵為真王參啓沃之謀受腹心之寄恩榮已極功業已成尋合乞骸保全餘齒但以寇讎在近家國未安臣子之心不敢寧處苟西戎即懷恩就擒疇昔官爵誓無所受必當追蹤范蠡繼迹留侯臣之鄙懷切在於此優詔不許子儀見上感泣懇讓乃止十月僕固懷恩引吐蕃回紇党項數十萬南下京師大恐子儀出鎮奉天帝召子儀問禦戎之計子儀曰以臣所見懷恩無能為也帝問其故對曰懷恩雖稱驍勇素失士心今所以能為亂者引思歸之人耳懷恩本臣偏將其下皆臣之部曲臣恩信嘗及之今臣為大將必不忍以鋒刃相向以此知其無能為也虜寇邠州子儀在涇陽子儀令長男朔方兵馬使曜率師援之與邠寧節度使白孝德閉城拒守懷恩前鋒至奉天近城挑戰諸將請擊之子儀止之曰夫客兵深入利在速戰不可爭鋒彼皆吾之部曲緩之自當攜二若迫之是速其戰戰則勝負未可知敢言戰者斬堅壁待之果不戰而退子儀自涇陽入朝帝御安福門待之命子儀樓上行朝見之禮宴賜隆厚十一月以子儀為尚書令上表懇辭曰臣以薄劣素乏行能逢時擾攘猥蒙驅策內參朝政外總兵權上不能翼戴三光下不能糾逖羣慝功微賞厚任重恩深覆餗之憂實盈寤寐臣昨所以固辭太尉乞保餘年殊私曲臨遂見矜許竊謂陛下已知其願深察其心豈意未歷旬時復延寵命以臣褊淺又寡智謀安可謬職南宮當茲大任況太宗昔居藩邸嘗踐此官纍聖相承曠而不置皇太子為雍王之日陛下以其總兵薄伐平定關東飲至策勳再有斯授豈臣末職敢亂大倫德薄位尊難逃天子之責負乘致寇復速神明之誅伏乞天慈俯停新命答詔不允翌日敕所司令子儀於尚書省視事詔宰相百僚送上遣射生五百騎執戟翼從自朝堂至省賜教坊樂子儀不受復上表曰臣伏以尚書令武德之際太宗為之昨瀝懇上陳請罷斯職而陛下未垂亮察務欲褒崇區區微誠益用惶懼何則太宗立極之主聖德在人自後因廢此官永代作則陛下守文繼體固當奉而行之豈可猥私老臣隳厥成式上掩陛下之德下貽萬方之非臣雖至愚安敢輕受況久經兵亂僭賞者多一人之身兼官數四朱紫同色清濁不分爛羊之謠復聞聖代臣頃觀其弊思革其源以逆寇猶存未敢輕議今元凶沮敗計日成擒中外無虞妖氛漸息此陛下作法之際審官之時固合始於老臣化及班列豈可輕為此舉以亂國章國章亂於上則庶政隳於下海內之政皆亂則國家又安得永代而無患哉陛下苟能從臣之言俯察誠請彼貪榮冒進者亦將各讓其所兼之官自然天下文明百工式太平之業可得而復也臣誠蒙鄙識昧古今志之所切實在於此手詔答曰優崇之命所以報功總領之司期於賦政卿入居台鉉出統戎旃爰自先朝纍匡多難靖羣氛於海表凝庶績於天階敏事而寡言居敬而行簡人難其易爾易其難所以命掌六聯首茲百辟顧循時議僉謂允諧而屢拜封章懇懷讓挹守淳素之道語政理之源無待禮成曲從德讓宜宣示於外編之史冊遣內侍魚朝恩傳詔賜美人盧氏等六人從者八人並車服帷帳牀蓐珍玩之具時蕃虜屢寇京畿倚蒲陝為內地常以重兵鎮之永泰元年五月以子儀都統河南道節度行營出鎮河中八月僕固懷恩誘吐蕃回紇党項羌渾奴剌山賊任敷鄭庭郝德劉開元等三十餘萬南下先發數萬人掠同州期自華陰趨藍田以扼南路懷恩率重兵繼其後回紇吐蕃自涇邠鳳翔數道寇京畿掠奉天醴泉京師震恐天子下詔親征命李忠臣屯東渭橋李光進屯雲陽馬璘郝廷玉屯便橋駱奉先李日越屯盩厔李抱玉屯鳳翔周智光屯同州杜冕屯坊州天子以禁軍屯苑內京城壯丁並令團結城二門塞其一魚朝恩括士庶私馬重兵捉城門市民由竇穴而遁去人情危迫是時急召子儀自河中至屯於涇陽而虜騎已合子儀一軍萬餘人而雜虜圍之數重子儀使李國臣高升拒其東魏楚玉當其南陳回光當其西朱元琮當其北子儀率甲騎二千出沒於左右前後虜見而問曰此誰也報曰郭令公也回紇曰令公存乎僕固懷恩言天可汗已棄四海令公亦謝世中國無主故從其來今令公存天可汗存乎報之曰皇帝萬歲無疆回紇皆曰懷恩欺我子儀又使諭之曰公等頃年遠涉萬里翦除凶逆恢復二京是時子儀與公等周旋艱難何日忘之今忽棄舊好助一叛臣何其愚也且懷恩背主棄親於公等何有回紇曰謂令公亡矣不然何以至此令公誠存安得而見之子儀將出諸將諫曰戎狄之心不可信也請無往子儀曰虜有數十倍之衆今力固不敵且至誠感神況虜輩乎諸將曰請選鐵騎五百衛從子儀曰適足以為害也乃傳呼曰令公來虜初疑持滿注矢以待之子儀以數十騎徐出免胄而勞之曰安乎久同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領各飲之酒與之羅錦歡言如初子儀說回紇曰吐蕃本吾舅甥之國無負而至是無親也若倒戈乘之如拾地芥耳其羊馬滿野長數百里是謂天賜不可失也今能逐戎以利舉與我繼好而凱旋不亦善乎會懷恩暴死于鳴沙羣虜無所統攝遂許諾乃遣首領石野那等入朝子儀遣朔方兵馬使白元光與回紇會軍吐蕃知其謀是夜奔退回紇與元光追之子儀大軍繼其後大破吐蕃十餘萬於靈武臺西原斬首五萬生擒萬人收其所掠士女四千人獲牛羊駝馬三百里內不絶子儀自涇陽入朝加實封二百戶還鎮河中大曆元年十二月華州節度使周智光殺監軍張志斌謀叛帝以同華路阻召子儀女壻工部侍郎趙縱受口詔往河中令子儀起軍討之縱請為蠟書令家僮間道賜子儀奉詔大閲軍戎將發同華將吏聞軍起乃斬智光父子傳首京師二年二月子儀入朝宰相元載王縉僕射裴冕京兆尹黎幹內侍魚朝恩共出錢三十萬置宴於子儀第恩出羅錦二百匹為子儀纏頭之費極歡而罷九月吐蕃寇涇州詔子儀以步騎三萬自河中移屯涇陽十月蕃軍退至靈州邀擊敗之斬馘二萬十二月盜發子儀父墓捕盜未獲人以魚朝恩素惡子儀疑其使之子儀心知其故及自涇陽將入議者慮其構變公卿憂之及子儀入見帝言之子儀號泣奏曰臣久主兵不能禁暴軍士殘人之墓固亦多矣此臣不忠不孝上獲天譴非人患也朝廷乃安三年三月還河中八月吐蕃寇靈武九月詔子儀率師五萬自河中移鎮奉天是月白元光大破吐蕃於靈武十月子儀入朝還鎮河中時議以西蕃侵寇京師不安馬璘雖在邠州力不能拒乃以子儀兼邠寧慶節度自河中移鎮邠州徙馬璘為涇原節度使八年十月吐蕃寇涇州子儀遣先鋒兵馬使渾瑊逆戰于宜祿不利會馬璘設伏於潘源與瑊合擊大破蕃軍俘斬數萬計回紇赤心賣馬一萬匹有司以國計不充請市千匹子儀以回紇前後立功不宜阻意請自納一年俸物充回紇馬價雖詔旨不允內外稱之九年入朝代宗召對延英語及西蕃充斥苦戰不暇言發涕零既退復上封論備吐蕃利害曰朔方國之北門西禦犬戎北虞獫狁五城相去三千餘里開元天寶中戰士十萬戰馬三萬才敵一隅自先皇帝龍飛靈武戰士從陛下收復兩京東西南北曾無寧歲中年以僕固之役又經耗散人亡三分之二比於天寶中有十分之一今吐蕃充斥勢強十倍兼河隴之地雜羌渾之衆每歲來窺近郊以朔方減十倍之軍當吐蕃加十倍之騎欲求制勝豈易為力近入內地稱四節度每將盈萬每賊兼乘數四臣所統將士不當賊四分之一所有征馬不當賊百分之二誠合固守不宜與戰又得馬璘牒賊擬涉渭而南臣若堅壁恐犯畿甸若過畿內則國人大恐諸道易搖外有吐蕃之強中有易搖之衆外畏內懼將何以安臣伏以陛下橫制勝之術力非不足但慮簡練未精進退未一時淹師老地闊勢分願陛下更詢讜議慎擇名將俾之統軍於諸道各抽精卒成四五萬則制勝之道必矣未可失時臣又料河南河北山南江淮小鎮數千大鎮數萬空耗月餼曾不習戰臣請抽赴關中教之戰陳則軍聲益振攻守必全亦長久之計也臣猥蒙任遇垂二十年今齒髮已衰願避賢路止足之誡神明所鑒詔曰卿憂深慮遠殊沃朕心始終倚賴未可執辭也德宗即位詔還朝攝冢宰充山陵使賜號尚父進位太尉中書令增實封通計二千戶給一千五百人糧二百匹馬草料所領諸使副元帥並罷諸子弟女壻拜官者十餘人建中二年夏子儀病甚德宗令舒王誼傳詔省問及門郭氏子弟迎拜於外王不答拜子儀臥不能興以手叩頭謝恩而已六月十四日薨時年八十五德宗聞之震悼廢朝五日詔曰天地以四時成物元首以股肱作輔公台之任鼎足相承上以調三光下以蒙五嶽允釐庶績鎮撫四夷體元和之氣根貞一之德功至大而不伐身處高而更安尚父比呂望之名為師增周公之位盛業可久歿而彌光故太尉兼中書令上柱國汾陽郡王尚父子儀天降人傑生知王佐訓師如子料敵若神昔天寶多難羯胡作禍咸秦失險河洛為戎公能扶翼肅宗載造區夏於國有患勞其戡定於邊有寇藉其驅除安社稷必在於絳侯定羌戎無踰於充國絳臺綏四散之衆涇陽降十萬之虜勳高今古名讋夷狄而勞乎征鎮二紀于茲頃以春秋既高疆埸多事罷彼旌鉞寵在台衡以公柱石四朝藩翰萬里忠貞懸於日月寵遇冠於人臣尊其元老加以崇號期壽考之永養勳賢之德膏肓生疾藥石靡攻人之云亡梁木斯壞雖賻禮加等輟朝增日悼之流涕曷可弭忘更議追崇名位斯極而尊為尚父官協太師雖爵秩則同而體望尤重斂以衮冕旌我元臣聖祖園陵所宜陪葬式墓表文終之德象山追去病之勳千載如存九原可作冊命之禮有司備焉可贈太師陪葬建陵仍令所司備禮冊命賻絹三千匹布三千端米麥三千石舊令一品墳高丈八而詔特加十尺羣臣以次赴宅弔哭凶喪所須並令官給及葬上御安福門臨哭送之百僚陪位隕泣賜諡曰忠武配饗代宗廟庭子曜旰晞昢晤曖曙映等八人壻七人皆朝廷重官諸孫數十人每羣孫問安不盡辨頷之而已參佐官吏六十餘人後位至將相升朝秩貴位勒其姓名於石今在河中府人士榮之史臣裴曰汾陽事上誠藎臨下寬厚每降城下邑所至之處必得士心前後遭罹幸臣程元振魚朝恩譖毀百端時方握強兵或方臨戎敵詔命徵之未嘗不即日應召故讒謗不能行代宗幸陝時令以數十騎覘賊及在涇陽又陷於胡虜重圍之中皆以身許國未嘗以危亡易慮亦遇天幸竟免患難田承嗣方跋扈魏州傲狠無禮子儀嘗遣使至承嗣西望拜之指其膝謂使者曰茲膝不屈於人若干歲矣今為公拜李靈曜據汴州公私財賦一皆遏絶獨子儀封幣經其境莫敢留之必持兵衛送其為豺虎所服如此麾下老將若李懷光輩數十人皆王侯重貴子儀頤指進退如僕隸焉幕府之盛近代無比始與李光弼齊名雖威略不逮而寬厚得人過之歲入官俸二十四萬貫私利不在焉其宅在親仁里居其里四分之一中通永巷家人三千相出入者不知其居前後賜良田美器名園甲館聲色珍玩堆積羡溢不可勝紀代宗不名呼為大臣天下以其身為安危者殆二十年校中書令考二十有四權傾天下而朝不忌功蓋一代而主不疑侈窮人欲而君子不之罪富貴壽考繁衍安泰哀榮終始人道之盛此無缺焉唯以讒怒誣奏判官戶部郎中張談杖殺之物議為薄曜子儀長子性孝友廉謹子儀出征於外留曜治家少長千人皆得其所諸弟爭飾池館盛其車服曜以儉朴自處纍遷至太子賓客建中初子儀罷兵柄乃遍加諸子官以曜為太子少保子儀薨曜遵遺命四朝所賜名馬珍玩悉皆上獻德宗復賜之曜乃散諸昆弟子儀薨後楊炎盧杞相次秉政姦諂用事尤忌勳族子儀之壻太僕卿趙縱少府少監李洞清光祿卿王宰皆以家人告訐細過相次貶黜曜家大恐賴宰相張鎰力為庇護姦人幸其危懼多論奪田宅奴婢曜不敢訴德宗微知之詔曰尚父子儀有大勳力保乂皇家嘗誓以山河琢之金石十世之宥其可忘也其家前時與人為市以子儀身歿或被誣構欲論奪之有司無得為理詔下方已曜居喪得禮若儒家子服未闋寢疾或勸其茹葱薤曜竟不屬口建中四年三月卒贈太子太傅晞子儀第三子少善騎射常從父征伐初以戰功授左贊善大夫從廣平王收復兩京晞力戰於香積寺陝西皆出奇兵克捷以功加銀青光祿大夫鴻臚卿後河中軍亂殺節度使李國貞荔非元禮於絳詔以子儀為河東關內副元帥鎮絳州時四方擾叛多逐戎帥子儀至絳誅其元惡其黨頗不自安欲謀翻變晞知其謀選親兵四千伏甲以防之常持弓警夜不寐者凡七十日叛將竟不敢發以功拜殿中監廣德二年僕固懷恩誘吐蕃回紇入寇加晞御史中丞領朔方軍以援邠州與馬璘合勢大破蕃軍其年冬懷恩誘虜再寇邠州陳于涇北子儀令晞率步卒五千騎軍五百出西南掩擊之晞以兵寡不敵持而不戰及至晡晚乘其半濟而擊之大破獯虜斬首五千級是時連戰皆捷詔加御史大夫子儀固讓不受永泰二年檢校左散騎常侍大曆七年加開府儀同三司十二年丁母憂服除加檢校工部尚書判祕書省事建中二年丁父喪持服京城朱泚構逆遣人就第問訊欲令掌兵晞佯瘖噤口不言泚以兵脅之晞終不語賊知其不可用乃止晞潛奔奉天僅而獲免初晞兄曜襲父代國公實封二千戶及曜卒詔曰故尚父太尉中書令汾陽王功格上玄道光下土積其善慶垂裕無窮雖嫡長云殂支宗斯盛汾陽舊邑盍有丕承其男前左散騎常侍駙馬都尉食實封五百戶曖夙稟義方居忠履孝儷崇銀榜攄美金章繼撫先封允宜聽復曖兄檢校工部尚書守太子賓客趙國公晞並弟右金吾將軍祁國公食實封二百五十戶曙太子左諭德映等並休有令名保其先業宜允推恩之典以明延嗣之誠其實封二千戶宜準式減半餘可分襲曖可襲代國公仍通前襲三百戶晞可二百五十戶曙可五十戶通前三百七十戶映可二百三十五戶尋又詔尚父子儀男晞曖映曙四人所襲實封各減五十戶以賜郭曜男鉾郭晤男鐇各襲一百戶晞至行在復檢校工部尚書太子詹事從駕還京改太子賓客晞子鋼為朔方節度使杜希全賓佐希全以鋼攝豐州刺史晞以鋼幼弱恐不任邊職貞元七年晞上章請罷鋼官德宗遣中使召之鋼疑以他事見攝乃單騎走入吐蕃蕃將見鋼獨叛不納置之筏上流入黃河令歸杜希全得之送赴京師賜鋼自盡晞亦坐子免官明年復授太子賓客貞元十年卒贈兵部尚書晞次子鈞鈞子承嘏別有傳曖子儀第六子年十餘歲尚代宗第四女升平公主時升平年亦與曖相類大曆中恩寵冠於戚里歲時錫賚珍玩不可勝紀大曆十三年有詔毀除白渠水支流碾磑以妨民溉田升平有脂粉磑兩輪郭子儀私磑兩輪所司未敢毀徹公主見代宗訴之帝謂公主曰吾行此詔蓋為蒼生爾豈不識我意耶可為衆率先公主即日命毀由是勢門碾磑八十餘所皆毀之曖檢校左散騎常侍建中末公主坐事留之禁中曖亦不令出入既而朱泚之亂不知車駕幸奉天為賊所逼欲授僞官曖辭以居喪被疾既而與兄晞弟曙及升平公主皆奔奉天德宗喜並釋前咎待之如初復銀青光祿大夫檢校左散騎常侍從駕至山南改太常卿同正員貞元中帝為皇孫廣陵郡王納曖女為妃曖貞元十六年七月卒贈尚書左僕射升平公主元和五年十月薨贈虢國大長公主諡曰懿廣陵王即位為憲宗皇帝妃生穆宗皇帝元和十五年穆宗即位尊郭妃為皇太后詔曰追遠飾終先王令典況積仁纍義事已顯於身前祥會慶傳福遂流於天下式光盛德爰舉徽章尊尊親親於是乎在皇太后父贈尚書左僕射曖克荷崇構有勞王家孝友本於生知英華發於事任實修一德歷仕三朝建中末年屬有大難畢力扈駕忘軀即戎忠貞之節國史明備才高望洽是膺沁水之祥德厚流光乃啓塗山之祚肆豫小子獲纘大業未展定申之命敢緣褒紀之恩俾繼維師用光縟禮可贈太傅曖子釗鏦銛曙代宗朝纍歷司農卿居父憂建中三年冬舒王誼為淮西山南諸道大元帥以曙檢校左庶子為元帥府都押牙京城亂從幸山南轉太府卿隨駕還京拜左金吾衛大將軍貞元末卒釗偉姿儀身長七尺方口豐下沉默寡言母升平長公主代宗朝釗為外孫恩寵踰等起家為太常寺奉禮郎德宗朝纍官至太子右庶子元和初為左金吾衛大將軍充左街使九年十一月檢校工部尚書兼邠州刺史充邠寧節度使數歲檢校戶部尚書入為司農卿釗大勳之後姻聯戚里而謙和接物恭慎自持居家臨民無驕怠之色無奢侈之失士君子重之十五年正月憲宗寢疾彌旬諸中貴人秉權者欲議廢立紛紛未定穆宗在東宮心甚憂之遣人問計於釗釗曰殿下身為皇太子但旦夕視膳謹守以俟又何慮乎迄今稱釗得元舅之體穆宗即位冊皇太后南內推崇外氏以釗兼司農卿未幾檢校戶部尚書充河陽三城懷節度使歲中換河中尹河中晉絳慈隰節度使釗歷踐藩鎮以汾陽胄胤材能選用不獨憑椒房之勢所蒞簡約不撓其俗自理敬宗即位尊郭太后為太皇太后徵釗為兵部尚書兼檢校尚書左僕射明年出為梓州刺史劍南東川節度使文宗即位加司空大和三年冬南蠻陷巂州遂寇西川杜元穎失於控禦蠻軍陷成都府外城朝廷未暇除帥乃以釗兼領西川節度蠻軍已寇梓州諸道援軍未至川軍寡弱不可令戰釗致書於蠻首領巔責以侵寇之意巔曰杜元穎不守疆埸屢侵吾圉以是修報也與釗修好而退朝廷嘉之授成都尹劍南西川節度使與南詔立約疆陲不擾以疾求代四年入為太常卿檢校司徒十二月在道卒詔贈司徒子仲文仲辭鏦母升平長公主大曆貞元之間恩禮冠諸主順宗在東宮以女德陽郡主尚鏦時鏦與公主年未及冠郡主尤為德宗之所鍾愛故鏦之貴寵焜耀一時順宗即位改封德陽為漢陽公主鏦纍官至衛尉卿駙馬都尉改殿中監穆宗即位鏦為叔舅改右金吾衛大將軍兼御史大夫充左街使城南有汾陽王別墅林泉之致莫之與比穆宗常遊幸之置酒極歡而罷賜鏦甚厚俄加檢校工部尚書兼太子詹事充間宮苑使從容貴位三十餘年而椒房之寵國舅之恩近代已來無有其比而鏦恭遜虔恪不以富貴驕人士無賢不肖接之以禮由是中外稱之長慶二年十月卒贈尚書左僕射仍以其弟銛代鏦為太子詹事充間宮苑使仲文大和末為殿中少監開成初詔仲文襲父太原郡公制下給事中封敕奏曰伏準制書贈司徒郭釗嫡男仲文襲封太原郡公者臣近訪知郭釗妻沈氏公主之女代宗皇帝外孫有男仲辭已選尚主仲文不合假冒自稱嫡子若仲文承嫡即沈氏須黜居別室仲辭不合配尚貴主伏以郭仲文尚父子儀之孫太皇太后之姪戚里勳門無與儔比婚姻嫡庶朝野具知奪宗之配實玷風教且仲文仲辭既非同出襲封尚主不可並行伏請付臺勘當詔曰以萬年縣尉仲辭襲封仲文落下以太皇太后姪不之罪尋以仲辭為銀青光祿大夫檢校殿中少監駙馬都尉襲封太原郡公尚饒陽公主又仲辭兄詹事府丞仲恭為銀青光祿大夫尚金堂公主幼明尚父子儀之母弟也性謹願無過不工武藝喜賓客飲宴居家御衆皆得其歡心以子儀勳業纍歷大卿監大曆八年卒贈太子太傅子昕肅宗末為四鎮留後自關隴陷蕃為虜所隔其四鎮北庭使額李嗣業荔非元禮皆遙領之昕阻隔十五年建中二年與伊西北庭節度使李元忠俱遣使于朝德宗嘉之詔曰四鎮二庭統任西夏五十七蕃十姓部落國朝以來相次率職自關隴失守東西阻絶忠義之徒泣血相守慎固封略奉尊朝法皆侯伯守將交修共理之所致也伊西北庭節度使李元忠可北庭大都護四鎮節度留後郭昕可安西大都護四鎮節度使其將吏已下官可超七資李元忠本姓曹名令忠以功賜姓名時昕使自回紇歷諸蕃部方達於朝又有袁光庭者為伊州刺史隴右諸郡皆陷光庭堅守伊州吐蕃攻之纍年兵盡食竭光庭先刃其妻子自焚而死因昕使知之贈工部尚書史臣曰天寶之季盜起幽陵萬乘播遷兩都覆沒天祚土德實生汾陽自河朔班師關西殄寇身扞豺虎手披荊榛七八年間其勤至矣再造王室勳高一代及國威復振羣小肆讒位重懇辭失寵無怨不幸危而邀君父不挾撼以報仇讎晏然效忠有死無二誠大雅君子社稷純臣自秦漢已還勳力之盛無與倫比而晞曖於縗粗之中拔身虎口赴難奉天可謂忠孝之門有嗣矣贊曰猗歟汾陽功扶昊蒼秉仁蹈義鐵心石腸四朝靜亂五福其昌為臣之節敢告忠良
