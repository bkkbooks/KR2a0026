body:
  text: 舊唐書卷七十三列傳第二十三薛收兄子元敬收子元超元超從子稷姚思廉顏師古弟相時令狐德棻鄧世隆顧胤李延壽李仁實等附孔穎達司馬才章王恭馬嘉運等附薛收字伯褒蒲州汾陰人隋內史侍郎道衡子也事繼從父孺以孝聞年十二解屬文以父在隋非命乃潔志不仕大業末郡舉秀才固辭不應義旗起遁於首陽山將協義舉蒲州通守堯君素潛知收謀乃遣人迎收所生母王氏置城內收乃還城後君素將應王世充收遂踰城歸國秦府記室房玄齡薦之於太宗即日召見問以經略收辨對縱橫皆合旨要授秦府主簿判陝東道大行臺金部郎中時太宗專任征伐檄書露布多出於收言辭敏速還同宿構馬上即成曾無點竄太宗討王世充也竇建德率兵來拒諸將皆以為宜且退軍以觀賊形勢收獨建策曰世充據有東都府庫填積其兵皆是江淮精鋭所患者在於乏食是以為我所持求戰不可建德親總軍旅來拒我師亦當盡彼驍雄期於奮決若縱其至此兩寇相連轉河北之糧以相資給則伊洛之間戰鬬不已今宜分兵守營深其溝防即世充欲戰慎勿出兵大王親率猛鋭先據成臯之險訓兵坐甲以待其至彼以疲弊之師當我堂堂之勢一戰必克建德即破世充自下矣不過兩旬二國之君可面縛麾下若退兵自守計之下也太宗納之卒擒建德東都平太宗入觀隋氏宮室嗟後主罄人力以逞奢侈收進曰竊聞峻宇雕牆殷辛以滅土階茅棟唐堯以昌秦帝增阿房之飾漢后罷露臺之費故漢祚延而秦禍速自古如此後主曾不能察以萬乘之尊困一夫之手使土崩瓦解取譏後代以奢虐所致也太宗悅其對及軍還授天策府記室參軍太宗初授天策上將尚書令命收與世南並作第一讓表竟用收者太宗曾侍高祖遊後園中獲白魚命收為獻表收援筆立就不復停思時人推其二表贍而速從平劉黑闥封汾陰縣男武德六年以本官兼文學館學士與房玄齡杜如晦特蒙殊禮受心腹之寄又嘗上書諫獵太宗手詔曰覽讀所陳實悟心膽今日成我卿之力也明珠兼乘豈比來言當以誡心書何能盡今賜卿黃金四十鋌以酬雅意七年寢疾太宗遣使臨問相望於道尋命輿疾詣府太宗親以衣袂撫收論生平潸然流涕尋卒年三十三太宗親自臨哭哀慟左右與收從父兄子元敬書曰吾與卿叔共事或軍旅多務或文詠從容何嘗不驅馳經略款曲襟抱比雖疾苦日冀痊除何期一朝忽成萬古追尋痛惋彌用傷懷且聞其兒子幼小家徒壁立未知何處安置宜加安撫以慰吾懷因使人弔祭贈物三百段及後遍圖學士等形像太宗歎曰薛收遂成故人恨不早圖其像及登極顧謂房玄齡曰薛收若在朕當以中書令處之又嘗夢收如平生又敕有司特賜其家粟帛貞觀七年贈定州刺史永徽六年又贈太常卿陪葬昭陵文集十卷元敬隋選部侍郎邁子也有文學少與收及收族兄德音齊名時人謂之河東三鳳收為長離德音為鸑鷟元敬以年最小為鵷雛武德中元敬為祕書郎太宗召為天策府參軍兼直記室收與元敬俱為文學館學士時房杜等處心腹之寄深相友託元敬畏於權勢竟不之狎如晦常云小記室不可得而親不可得而疏太宗入東宮除太子舍人時軍國之務總於東宮元敬專掌文翰號為稱職尋卒收子元超元超早孤九歲襲爵汾陰男及長好學善屬文太宗甚重之令尚巢剌王女和靜縣主纍授太子舍人預撰晉書高宗即位擢拜給事中時年二十六數上書陳君臣政體及時事得失高宗皆嘉納之俄轉中書舍人加弘文館學士兼修國史中書省有一盤石初道衡為內史侍郎嘗踞而草制元超每見此石未嘗不泫然流涕永徽五年丁母憂解明年起授黃門侍郎兼檢校太子左庶子元超既擅文辭兼好引寒俊嘗表薦任希古高智周郭正一王義方孟利貞等十餘人由是時論稱美後以疾出為饒州刺史三年拜東臺侍郎右相李義府以罪配流巂州舊制流人禁乘馬元超奏請給之坐貶為簡州刺史歲餘西臺侍郎上官儀伏誅又坐與文章款密配流巂州上元初遇赦還拜正諫大夫三年遷中書侍郎尋同中書門下三品時高宗幸溫泉校獵諸蕃酋長亦持弓矢而從元超以為既非族類深可為虞上疏切諫帝納焉時元超特承恩遇常召入與諸王同預私宴又重其文學政理之才曾謂元超曰長得卿在中書固不藉多人也永隆二年拜中書令兼太子左庶子高宗幸東都太子於京師監國因留元超以侍太子帝臨行謂元超曰朕之留卿如去一臂但吾子未間庶務關西之事悉以委卿所寄既深不得默爾於是元超表薦鄭祖玄鄧玄挺崔融為崇文館學士又數上疏諫太子高宗知而稱善遣使慰諭賜物百段弘道元年以疾乞骸加金紫光祿大夫聽致仕其年冬卒年六十二贈光祿大夫秦州都督陪葬乾陵文集四十卷子曜亦以文學知名聖曆中修三教珠英官至正諫大夫元超從子稷稷舉進士纍轉中書舍人時從祖兄曜為正諫大夫與稷俱以辭學知名同在兩省為時所稱景龍末為諫議大夫昭文館學士好古博雅尤工隸書自貞觀永徽之際虞世南褚遂良時人宗其書迹自後罕能繼者稷外祖魏徵家富圖籍多有虞褚舊迹稷鋭精模倣筆態遒麗當時無及之者又善畫博探古迹睿宗在藩留意於小學稷於是特見招引俄又令其子伯陽尚仙源公主及踐祚纍拜中書侍郎與蘇頲等對掌制誥俄與中書侍郎崔日用參知政事睿宗以鍾紹京為中書令稷勸令禮讓因入言於帝曰紹京素無才望出自胥吏雖有功勳未聞令德一朝超居元宰師長百僚臣恐清濁同貫失於聖朝具瞻之美帝然其言因紹京表讓遂轉為戶部尚書稷又於帝前面折崔日用遞相短長由是罷知政事遷左散騎常侍歷工部禮部二尚書以翊贊睿宗功封晉國公賜實封三百戶除太子少保睿宗常召稷入宮中參決庶政恩遇莫與為比及竇懷貞伏誅稷以知其謀賜死於萬年縣獄中子伯陽以尚公主拜右千牛衛將軍駙馬都尉亦以功封安邑郡公別食實封四百戶及父死特免坐左遷晉州員外別駕尋而配徙嶺表在道自殺伯陽子談開元十六年尚常山公主拜駙馬都尉光祿員外卿旬日暴卒姚思廉字簡之雍州萬年人父察陳吏部尚書入隋歷太子內舍人祕書丞北絳公學兼儒史見重於二代陳亡察自吳興始遷關中思廉少受漢史於其父能盡傳家業勤學寡欲未嘗言及家人産業在陳為揚州主簿入隋為漢王府參軍丁父憂解職初察在陳嘗修梁陳二史未就臨終令思廉續成其志丁繼母憂廬於墓側毀瘠加人服闋補河間郡司法書佐思廉上表陳父遺言有詔許其續成梁陳史煬帝又令與起居舍人崔祖濬修區宇圖志後為代王侑侍讀會義師克京城侑府僚奔駭唯思廉侍王不離其側兵將升殿思廉厲聲謂曰唐公舉義本匡王室卿等不宜無禮於王衆服其言於是布列階下高祖聞而義之許其扶侑至順陽閣下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂乎高祖受禪授秦王文學後太宗征徐圓朗思廉時在洛陽太宗嘗從容言及隋亡之事慨然歎曰姚思廉不懼兵刃以明大節求諸古人亦何以加也因寄物三百段以遺之書曰想節義之風故有斯贈尋引為文學館學士太宗入春宮遷太子洗馬貞觀初遷著作郎弘文館學士寫其形像列於十八學士圖令文學褚亮為之讚曰志苦精勤紀言實録臨危殉義餘風勵俗三年又受詔與祕書監魏徵同撰梁陳二史思廉又採謝炅等諸家梁史續成父書并推究陳事刪益傅縡顧野王所修舊史撰成梁書五十卷陳書三十卷魏徵雖裁其總論其編次筆削皆思廉之功也賜綵絹五百段加通直散騎常侍思廉以藩邸之舊深被禮遇政有得失常遣密奏之思廉亦直言無隱太宗將幸九成宮思廉諫曰離宮遊幸秦皇漢武之事固非堯舜禹湯之所為也言甚切至太宗諭曰朕有氣疾熱便頓劇固非情好遊賞也因賜帛五十匹九年拜散騎常侍賜爵豐城縣男十一年卒太宗深悼惜之廢朝一日贈太常卿諡曰康賜葬地於昭陵子處平官至通事舍人處平子璹珽別有傳顏字師古雍州萬年人齊黃門侍郎之推孫也其先本居琅邪世仕江左及之推歷事周齊齊滅始居關中父思魯以學藝稱武德初為秦王府記室參軍師古少傳家業博覽羣書尤精詁訓善屬文隋仁壽中為尚書左丞李綱所薦授安養尉尚書左僕射楊素見師古年弱貌羸因謂曰安養劇縣何以克當師古曰割雞焉用牛刀素奇其對到官果以幹理聞時薛道衡為襄州總管與高祖有舊又悅其才有所綴文嘗使其掎托利病甚親昵之尋坐事免歸長安十年不得調家貧以教授為業及起義師古至長春宮謁見授朝散大夫從平京城拜燉煌公府文學轉起居舍人再遷中書舍人專掌機密于時軍國多務凡有制誥皆成其手師古達於政理册奏之工時無及者太宗踐祚擢拜中書侍郎封琅邪縣男以母憂去職服闋復為中書侍郎歲餘坐事免太宗以經籍去聖久遠文字訛謬令師古於祕書省考定五經師古多所釐正既成奏之太宗復遣諸儒重加詳議于時諸儒傳習已久皆共非之師古輒引晉宋已來古今本隨言曉答援據詳明皆出其意表諸儒莫不歎服於是兼通直郎散騎常侍頒其所定之書於天下令學者習焉貞觀七年拜祕書少監專典刊正所有奇書難字衆所共惑者隨疑剖析曲盡其源是時多引後進之士為讎校師古抑素流先貴勢雖富商大賈亦引進之物論稱其納賄由是出為郴州刺史未行太宗惜其才謂之曰卿之學識良有可稱但事親居官未為清論所許今之此授卿自取之朕以卿曩日任使不忍遐棄宜深自誡勵也於是復以為祕書少監師古既負其才又早見驅策纍被任用及頻有罪譴意甚喪沮自是闔門守靜杜絶賓客放志園亭葛巾野服然搜求古迹及古器耽好不已俄又奉詔與博士等撰定五禮十一年禮成進爵為子時承乾在東宮命師古注班固漢書解釋詳明深為學者所重承乾表上之太宗令編之祕閣賜師古物二百段良馬一匹十五年太宗下詔將有事於泰山所司與公卿并諸儒博士詳定儀注太常卿韋挺禮部侍郎令狐德棻為封禪使參考其儀時論者競起異端師古奏曰臣撰定封禪儀注書在十一年春于時諸儒參詳以為適中於是詔公卿定其可否多從師古之説然而事竟不行師古俄遷祕書監弘文館學士十九年從駕東巡道病卒年六十五諡曰戴有集六十卷其所注漢書及急就章大行於世永徽三年師古子揚庭為符璽郎又表上師古所撰匡謬正俗八卷高宗下詔付祕書閣仍賜揚庭帛五十匹師古弟相時亦有學業武德中與房玄齡等為秦府學士貞觀中纍遷諫議大夫拾遺補闕有諍臣之風尋轉禮部侍郎相時羸瘠多疾病太宗常使賜以醫藥性仁友及師古卒不勝哀慕而卒師古叔父遊秦武德初纍遷廉州刺史封臨沂縣男時劉黑闥初平人多以強暴寡禮風俗未安遊秦撫恤境內敬讓大行邑里歌曰廉州顏有道性行同莊老愛人如赤子不殺非時草高祖璽書勞勉之俄拜鄆州刺史卒官撰漢書決疑十二卷為學者所稱後師古注漢書亦多取其義耳令狐德棻宜州華原人隋鴻臚少卿熙之子也先居燉煌代為河西右族德棻博涉文史早知名大業末為藥城長以世亂不就職及義旗建淮安王神通據太平宮自稱總管以德棻為記室參軍高祖入關引直大丞相府記室武德元年轉起居舍人甚見親待五年遷祕書丞與侍中陳叔達等受詔撰藝文類聚高祖問德棻曰比者丈夫冠婦人髻競為高大何也對曰在人之身冠為上飾所以古人方諸君上昔東晉之末君弱臣強江左士女皆衣小而裳大及宋武正位之後君德尊嚴衣服之製俄亦變改此即近事之徵高祖然之時承喪亂之餘經籍亡逸德棻奏請購募遺書重加錢帛增置楷書令繕寫數年間羣書略備德棻嘗從容言於高祖曰竊見近代已來多無正史梁陳及齊猶有文籍至周隋遭大業離亂多有遺闕當今耳目猶接尚有可憑如更十數年後恐事迹湮沒陛下既受禪於隋復承周氏歷數國家二祖功業並在周時如文史不存何以貽鑑今古如臣愚見並請修之高祖然其奏下詔曰司典序言史官記事考論得失究盡變通所以裁成義類懲惡勸善多識前古貽鑑將來伏犧以降周秦斯及兩漢傳緒三國受命迄于晉宋載籍備焉自有魏南徙乘機撫運周隋禪代歷世相仍梁氏稱邦跨據淮海齊遷龜鼎陳建皇宗莫不自命正朔綿歷歲祀各殊徽號刪定禮儀至於發迹開基受終告代嘉謀善政名臣奇士立言著績無乏於時然而簡牘未編紀傳咸闕炎涼已積謠俗遷訛餘烈遺風倏焉將墜朕握圖馭宇長世字人方立典謨永垂憲則顧彼湮落用深軫悼有懷撰次實資良直中書令蕭瑀給事中王敬業著作郎殷聞禮可修魏史侍中陳叔達祕書丞令狐德棻太史令庾儉可修周史兼中書令封德彝中書舍人顏師古可修隋史大理卿崔善為中書舍人孔紹安太子洗馬蕭德言可修梁史太子詹事裴矩兼吏部郎中祖孝孫前祕書丞魏徵可修齊史祕書監竇璡給事中歐陽詢秦王文學姚思廉可修陳史務加詳核博採舊聞義在不刊書法無隱瑀等受詔歷數年竟不能就而罷貞觀三年太宗復敕修撰乃令德棻祕書郎岑文本修周史中書舍人李百藥修齊史著作郎姚思廉修梁陳史祕書監魏徵修隋史與尚書左僕射房玄齡總監諸代史衆議以魏史既有魏收魏淡二家已為詳備遂不復修德棻又奏引殿中侍御史崔仁師佐修周史德棻仍總知類會梁陳齊隋諸史武德已來創修撰之源自德棻始也六年纍遷禮部侍郎兼修國史賜爵彭陽男十年以修周史賜絹四百匹十一年修新禮成進爵為子又以撰氏族志成賜帛二百匹十五年轉太子右庶子承乾敗隨例除名十八年起為雅州刺史以公事免尋有詔改撰晉書房玄齡奏德棻令預修撰當時同修一十八人並推德棻為首其體制多取決焉書成除祕書少監永徽元年又受詔撰定律令復為禮部侍郎兼弘文館學士監修國史及五代史志尋遷太常卿兼弘文館學士時高宗初嗣位留心政道嘗召宰臣及弘文館學士於中華殿而問曰何者為王道霸道又孰為先後德棻對曰王道任德霸道任刑自三王已上皆行王道唯秦任霸術漢則雜而行之魏晉已下王霸俱失如欲用之王道為最而行之為難高宗曰今之所行何政為要德棻對曰古者為政清其心簡其事以此為本當今天下無虞年穀豐稔薄賦斂少征役此乃合於古道為政之要道莫過於此高宗曰政道莫尚於無為也又問曰禹湯何以興桀紂何以亡德棻對曰傳稱禹湯罪己其興也勃焉桀紂罪人其亡也忽焉二主惑於妹喜妲己誅戮諫者造炮烙之刑是其所以亡也高宗甚悅既罷各賜以繒綵四年遷國子祭酒以修貞觀十三年以後實録功賜物四百段兼授崇賢館學士尋又撰高宗實録三十卷進爵為公龍朔二年表請致仕許之仍加金紫光祿大夫乾封元年卒于家年八十四諡曰憲德棻暮年尤勤於著述國家凡有修撰無不參預自武德已後有鄧世隆顧胤李延壽李仁實前後修撰國史頗為當時所稱鄧世隆者相州人也大業末王世充兄子太守河陽引世隆為賓客大見親遇及太宗攻洛陽遣書諭太世隆為復書言辭不遜洛陽平後世隆懼罪變姓名自號隱玄先生竄於白鹿山貞觀初徵授國子主簿與崔仁師慕容善行劉顗庾安禮敬播等俱為修史學士世隆負宿罪猶不自安太宗聞之遣房玄齡諭之曰爾為王太作書誠合重罪但各為其主於朕豈有惡哉朕今為天子何能追責匹夫之過爾宜坦然勿懷危懼也擢授著作佐郎歷衛尉丞初太宗以武功定海內櫛風沐雨不暇於詩書暨于嗣業進引忠良鋭精思政數年之後道致隆平遂於聽覽之暇留情文史事言懷時有構屬天才宏麗興託玄遠貞觀十三年世隆上疏請編録御集太宗竟不許之世隆又採隋代舊事撰為東都記三十卷遷著作郎尋卒顧胤者蘇州吳人也祖越陳給事黃門侍郎父覽隋祕書學士胤永徽中歷遷起居郎兼修國史撰太宗實録二十卷成以功加朝散大夫授弘文館學士以撰武德貞觀兩朝國史八十卷成加朝請大夫封餘杭縣男賜帛五百段龍朔三年遷司文郎中尋卒胤又撰漢書古今集二十卷行於代子琮長安中為天官侍郎同鳳閣鸞臺平章事李延壽者本隴西著姓世居相州貞觀中纍補太子典膳丞崇賢館學士嘗受詔與著作佐郎敬播同修五代史志又預撰晉書尋轉御史臺主簿兼直國史延壽嘗撰太宗政典三十卷表上之歷遷符璽郎兼修國史尋卒調露中高宗嘗觀其所撰政典歎美久之令藏于祕閣賜其家帛五十段延壽又嘗刪補宋齊梁陳及魏齊周隋等八代史謂之南北史凡一百八十卷頗行於代李仁實魏州頓丘人官至左史嘗著格論三卷通曆八卷戎州記並行於時孔穎達字沖遠冀州衡水人也祖碩後魏南臺丞父安齊青州法曹參軍穎達八歲就學日誦千餘言及長尤明左氏傳鄭氏尚書王氏易毛詩禮記兼善算曆解屬文同郡劉焯名重海內穎達造其門焯初不之禮穎達請質疑滯多出其意表焯改容敬之穎達固辭歸焯固留不可還家以教授為務隋大業初舉明經高第授河內郡博士時煬帝徵諸郡儒官集于東都令國子祕書學士與之論難穎達為最時穎達少年而先輩宿儒恥為之屈潛遣刺客圖之禮部尚書楊玄感舍之於家由是獲免補太學助教屬隋亂避地於武牢太宗平王世充引為秦府文學館學士武德九年擢授國子博士貞觀初封曲阜縣男轉給事中時太宗初即位留心庶政穎達數進忠言益見親待太宗嘗問曰論語云以能問於不能以多問於寡有若無實若虛何謂也穎達對曰聖人設教欲人謙光己雖有能不自矜大仍就不能之人求訪能事己之才藝雖多猶以為少仍就寡少之人更求所益己之雖有其狀若無己之雖實其容若虛非唯匹庶帝王之德亦當如此夫帝王內蘊神明外須玄默使深不可測度不可知易稱以蒙養正以明夷蒞衆若其位居尊極炫耀聰明以才凌人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗深善其對六年纍除國子司業歲餘遷太子右庶子仍兼國子司業與諸儒議曆及明堂皆從穎達之説又與魏徵撰成隋史加位散騎常侍十一年又與朝賢修定五禮所有疑滯咸咨決之書成進爵為子賜物三百段庶人承乾令撰孝經義疏穎達因文見意更廣規諷之道學者稱之太宗以穎達在東宮數有匡諫與左庶子于志寧各賜黃金一斤絹百匹十二年拜國子祭酒仍侍講東宮十四年太宗幸國學觀釋奠命穎達講孝經既畢穎達上釋奠頌手詔褒美後承乾不循法度穎達每犯顏進諫承乾乳母遂安夫人謂曰太子成長何宜屢致面折穎達對曰蒙國厚恩死無所恨諫諍逾切承乾不能納先是與顏師古司馬才章王恭王琰等諸儒受詔撰定五經義訓凡一百八十卷名曰五經正義太宗下詔曰卿等博綜古今義理該洽考前儒之異説符聖人之幽旨實為不朽付國子監施行賜穎達物三百段時又有太學博士馬嘉運駁穎達所撰正義詔更令詳定功竟未就十七年以年老致仕十八年圖形於凌煙閣讚曰道光列第風傳闕里精義霞開掞辭飈起二十二年卒陪葬昭陵贈太常卿諡曰憲司馬才章者魏州貴鄉人也父烜博涉五經善緯候才章少傳其業隋末為郡博士貞觀六年左僕射房玄齡薦之屢蒙召問擢授國子助教論議該洽學者稱之王恭者滑州白馬人也少篤學博涉六經每於鄉閭教授弟子自遠方至數百人貞觀初徵拜太學博士其所講三禮皆別立義證甚為精博蓋文懿文達等皆當時大儒罕所推借每講三禮皆遍舉先達義而亦暢恭所説馬嘉運者魏州繁水人也少出家為沙門明於三論後更還俗專精儒業尤善論難貞觀初纍除越王東閣祭酒頃之罷歸隱居白鹿山十一年召拜太學博士兼弘文館學士預修文思博要嘉運以穎達所撰正義頗多繁雜每掎托之諸儒亦稱為允當高宗居春宮引為崇賢館學士數與洗馬秦暐侍講殿中甚蒙禮異十九年遷國子博士卒史臣曰唐德勃興英儒間出佐命協力實有其人薛收左右厥猷經謀雅道不幸短命殲我良士上言恨不圖形若在當以中書令處之才可知矣元敬藻翰明敏而畏權勢竟不狎房杜深沉至慎不亦優哉元超藉父風望弼亮宏略諒非其罪而再遷流及登大任益有嘉謀汲引多才以隆弘納其感恩之重時共聞諸有始有卒其殆庶幾乎稷出自名家涉于大用及自貽謀釁如貞亮何姚思廉篤學寡欲受漢史於家尊果執明義臨大節而不可奪及筆削成書針規翊聖言其命世亦當仁乎師古家籍儒風該博經義至于詳注史策探測典禮清明在躬天有才格然而三黜之負竟在時譏孔子曰才難不其然乎令狐德棻貞度應時待問平直徵舊史修新禮以暢國風辨治亂談王霸以資帝業元首明哉股肱良哉其斯之謂歟鄧世隆國史時譽固有諒直其復書不遜何不知之甚也上疏請編御集其弼直乎顧胤清芬可觀彝範積善餘慶其有子哉李延壽研考史學修撰刪補克成大典方之班馬何代無人仁實捃托抑又次焉孔穎達風格高爽幼而有聞探賾明敏辨析應對天有通才人道惡盈必有毀訐及正義炳煥乃異人也雖其掎托亦何損於明司馬才章藉時崇儒明核致業王恭弘闡聲教禮學研詳馬嘉運達識自通克成典雅並符才用潤色丹青其掎托繁雜蓋求備者也贊曰河東三鳳俱瑞黃圖棻為良史頴實名儒解經不窮希顏之徒登瀛入館不其盛乎
