body:
  text: 舊唐書卷九十三列傳第四十三婁師德王孝傑唐休璟張仁願薛訥王晙婁師德鄭州原武人也弱冠進士擢第授江都尉揚州長史盧承業奇其才嘗謂之曰吾子台輔之器當以子孫相託豈可以官屬常禮待也上元初纍補監察御史屬吐蕃犯塞募猛士以討之師德抗表請為猛士高宗大悅特假朝散大夫從軍西討頻有戰功遷殿中侍御史兼河源軍司馬並知營田事天授初纍授左金吾將軍兼檢校豐州都督仍依舊知營田事則天降書勞曰卿素積忠勤兼懷武略朕所以寄之襟要授以甲兵自卿受委北陲總司軍任往還靈夏檢校屯田收率既多京坻遽積不煩和糴之費無復轉輸之艱兩軍及北鎮兵數年咸得支給勤勞之誠久而彌著覽以嘉尚欣悅良深長壽元年召拜夏官侍郎判尚書事明年同鳳閣鸞臺平章事則天謂師德曰王師外鎮必藉邊境營田卿須不憚劬勞更充使檢校又以為河源積石懷遠等軍及河蘭鄯廓等州檢校營田大使稍遷秋官尚書萬歲登封元年轉左肅政御史大夫仍並依舊知政事證聖元年吐蕃寇洮州令師德與夏官尚書王孝傑討之與吐蕃大將論欽陵贊婆戰於素羅汗山官軍敗績師德貶授原州員外司馬萬歲通天二年入為鳳閣侍郎同鳳閣鸞臺平章事是歲兼檢校右肅政御史大夫仍知左肅政臺事又與王懿宗狄仁傑分道安撫河北諸州神功元年拜納言纍封譙縣子尋詔師德充隴右諸軍大使仍檢校河西營田事聖曆二年突厥入寇復令檢校並州長史仍充天兵軍大總管是歲九月卒贈涼州都督諡曰貞初狄仁傑未入相時師德嘗薦之及為宰相不知師德薦己數排師德令充外使則天嘗出師德舊表示之仁傑大慚謂人曰吾為婁公所含如此方知不逮婁公遠矣師德頗有學涉器量寬厚喜怒不形於色自專綜邊任前後三十餘年恭勤接下孜孜不怠雖參知政事深懷畏避竟能以功名始終甚為識者所重王孝傑京兆新豐人也高宗末為副總管從工部尚書劉審禮西討吐蕃戰於大非川為賊所獲吐蕃贊普見孝傑垂泣曰貌類吾父厚加敬禮由是免死尋得歸則天時纍遷右鷹揚衛將軍孝傑久在吐蕃中悉其虛實長壽元年為武威軍總管與左武衛大將軍阿史那忠節率衆以討吐蕃乃克復龜茲于闐疏勒碎葉四鎮而還則天大悅謂侍臣曰昔貞觀中具得此蕃城其後西陲不守並陷吐蕃今既盡復於舊邊境自然無事孝傑建斯功效竭此款誠遂能裹足徒行身與士卒齊力如此忠懇深是可嘉乃拜孝傑為左衛大將軍明年遷夏官尚書同鳳閣鸞臺三品封清源男延載初出為瀚海道行軍總管餘如故證聖初又為朔方道總管尋坐與吐蕃戰敗免官萬歲通天年契丹李盡忠孫萬榮反叛復詔孝傑白衣起為清邊道總管統兵十八萬以討之孝傑軍至東峽石谷遇賊道隘虜甚衆孝傑率精鋭之士為先鋒且戰且前及出谷布方陳以捍賊後軍總管蘇宏暉畏賊衆棄甲而遁孝傑既無後繼為賊所乘營中潰亂孝傑墮谷而死兵士為賊所殺及奔踐而死殆盡時張説為節度管記馳奏其事則天問孝傑敗亡之狀説曰孝傑忠勇敢死乃誠奉國深入寇境以少禦衆但為後援不至所以致敗於是追贈孝傑夏官尚書封耿國公拜其子無擇為朝散大夫遣使斬宏暉以徇使未至幽州而宏暉已立功贖罪竟免誅開元中無擇官至左驍衛將軍以恩例贈孝傑特進唐休璟京兆始平人也曾祖規周驃騎大將軍安邑縣公祖宗隋大業末為朔方郡丞時為梁師都舉兵將據城宗抗節不從乃為所害休璟少以明經擢第永徽中解褐吳王府典籤無異材調授營府戶曹調露中單于突厥背叛誘扇奚契丹侵掠州縣其後奚羯胡又與桑乾突厥同反都督周道務遣休璟將兵擊破之於獨護山斬獲甚衆超拜豐州司馬永淳中突厥圍豐州都督崔智辨戰歿朝議欲罷豐州徙百姓于靈夏休璟以為不可上書曰豐州控河遏賊實為襟帶自秦漢已來列為郡縣田疇良美尤宜耕牧隋季喪亂不能堅守乃遷徙百姓就寧慶二州致使戎羯交侵乃以靈夏為邊界貞觀之末始募人以實之西北一隅方得寧謐今若廢棄則河傍之地復為賊有靈夏等州人不安業非國家之利也朝廷從其言豐州復存垂拱中遷安西副都護會吐蕃攻破焉耆安息道大總管文昌右相韋待價及副使閻溫古失利休璟收其餘衆以安西土遷西州都督上表請復取四鎮則天遣王孝傑破吐蕃拔四鎮亦休璟之謀也聖曆中為司衛卿兼涼州都督右肅政御史大夫持節隴右諸軍州大使久視元年秋吐蕃大將麴莽布支率騎數萬寇涼州入自洪源谷將圍昌松縣休璟以數千人往擊之臨陳登高望見賊衣甲鮮盛謂麾下曰自欽陵死贊婆降麴莽布支新知賊兵欲曜威武故其國中貴臣酋豪子弟皆從之人馬雖精不習軍事吾為諸君取之乃被甲先登與賊六戰六克大破之斬其副將二人獲首二千五百級築京觀而還是後休璟入朝吐蕃亦遣使來請和因宴屢覘休璟則天問其故對曰往歲洪源戰時此將軍雄猛無比殺臣將士甚衆故欲識之則天大加歎異擢拜右武威右金吾二衛大將軍休璟尤諳練邊事自碣石西踰四鎮綿亙萬里山川要害皆能記之長安中西突厥烏質勒與諸蕃不和舉兵相持安西道絶表奏相繼則天令休璟與宰相商度事勢俄頃間草奏便遣施行後十餘日安西諸州表請兵馬應接程期一如休璟所畫則天謂休璟曰恨用卿晚因遷夏官尚書同鳳閣鸞臺三品又謂魏元忠及楊再思李嶠姚元崇李迥秀等曰休璟諳練邊事卿等十不當一也尋轉太子右庶子依舊知政事以契丹入寇復拜夏官尚書兼檢校幽營等州都督兼安東都護時中宗在春宮將行進啓於皇太子曰張易之兄弟幸蒙寵遇數侍宴禁中縱情失禮非人臣之道惟加防察中宗即位召拜輔國大將軍同中書門下三品封酒泉郡公顧謂曰卿曩日直言朕今不忘初欲召卿計事但以遐遠兼懷北狄之憂耳未幾加特進拜尚書右僕射是歲秋大水休璟兩上表自咎請免官甚切辭多不載中宗竟不允手制答曰陰陽乖爽事屬在豫待罪私門難依來表尋遷中書令充京師留守俄加檢校吏部尚書又以宮僚之舊賜實封三百戶纍封宋國公休璟在任無所弘益景龍二年致仕于家年力雖衰進取彌鋭時尚宮賀婁氏頗關預國政憑附者皆得寵榮休璟乃為其子娶賀婁氏養女為妻因以自達由是起為太子少師同中書門下三品監修國史仍封宋國公休璟年踰八十而不知止足依託求進為時所譏景雲元年又拜特進充朔方道行軍大總管以備突厥停其舊封別賜實封一百戶二年表請致仕許之祿及一品子課並令全給休璟初得封時以絹數千匹分散親族又以家財數十萬大開塋域備禮葬其五服之親時人稱之延和元年七月薨年八十六贈荊州大都督諡曰忠子先慎襲爵官至陳州刺史次子先擇開元中為右金吾衛將軍張仁願華州下邽人也本名仁亶以音類睿宗諱改焉少有文武材幹纍遷殿中侍御史時有御史郭霸上表稱則天是彌勒佛身鳳閣舍人張嘉福與洛州人王慶之等請立武承嗣為皇太子皆請仁願連名署表仁願正色拒之甚為有識所重尋而夏官尚書王孝傑為吐剌軍總管統衆以禦吐蕃詔仁願往監之仁願與孝傑不協因入奏事稱孝傑軍敗誣罔之狀孝傑由是免為庶人仁願遽遷侍御史萬歲通天二年監察御史孫承景監清邊軍戰還畫戰圖以奏每陳必畫承景躬當矢石先鋒禦賊之狀則天歎曰御史乃能盡誠如此擢拜右肅政臺中丞令仁願録承景下立功人仁願未發都先問承景對陳勝負之狀承景身實不行問之皆不能對又虛增功狀仁願廷奏承景罔上之罪於是左遷崇仁令擢仁願為肅政臺中丞檢校幽州都督會突厥默啜入寇攻陷趙定擁衆回至幽州仁願勒兵出城邀擊之流矢中手賊亦引退則天遣使勞問賜以醫藥纍遷並州大都督府長史神龍二年中宗還京以仁願為左屯衛大將軍兼檢校洛州長史時都城穀貴盜竊甚衆仁願一切皆捕獲杖殺之積尸府門遠近震懾無敢犯者初高宗時賈敦頤為洛州刺史亦有政績與仁願皆為一時之最故時人為之語曰洛州有前賈後張可敵京兆三王其見稱如此三年突厥入寇朔方軍總管沙吒忠義為賊所敗詔仁願攝御史大夫代忠義統衆仁願至軍而賊衆已退乃躡其後夜掩大破之先朔方軍北與突厥以河為界河北岸有拂雲神祠突厥將入寇必先詣祠祭酹求福因牧馬料兵而後渡河時突厥默啜盡衆西擊突騎施娑葛仁願請乘虛奪取漠南之地於河北築三受降城首尾相應以絶其南寇之路太子少師唐休璟以為兩漢已來皆北守黃河今於寇境築城恐勞人費功終為賊虜所有建議以為不便仁願固請不已中宗竟從之仁願表留年滿鎮兵以助其功時咸陽兵二百餘人逃歸仁願盡擒之一時斬於城下軍中股栗役者盡力六旬而三城俱就以拂雲祠為中城與東西兩城相去各四百餘里皆據津濟遙相應接北拓地三百餘里於牛頭朝那山北置烽候一千八百所自是突厥不得度山放牧朔方無復寇掠減鎮兵數萬人仁願初建三城不置壅門及曲敵戰格之具或問曰此邊城禦賊之所不為守備何也仁願曰兵貴在攻取不宜退守寇若至此即當併力出戰回顧望城猶須斬之何用守備生其退恧之心也其後常元楷為朔方軍總管始築壅門以備寇議者以此重仁願而輕元楷焉仁願在朔方奏用監察御史張敬忠何鸞長安尉寇泚鄠縣尉王易從始平主簿劉體微分判軍事太子文學柳彥昭為管記義烏尉朝良貞為隨機敬忠等皆以文吏著稱多至大官時稱仁願有知人之鑒景龍二年拜左衛大將軍同中書門下三品纍封韓國公春還朝秋復督軍備邊中宗賦詩祖餞賞賜不可勝紀尋加鎮軍大將軍睿宗即位以老致仕特全給祿俸又拜兵部尚書加光祿大夫依舊致仕開元二年卒贈太子少傅賻物二百段命五品官一人為監護使子之輔開元初為趙州刺史薛訥絳州萬泉人也左武衛大將軍仁貴子也為藍田令有富商倪氏於御史臺理其私債中丞來俊臣受其貨財斷出義倉米數千石以給之訥曰義倉本備水旱以為儲蓄安敢絶衆人之命以資一家之産竟報上不與會俊臣得罪其事乃不行其後突厥入寇河北則天以訥將門使攝左武威衛將軍安東道經略臨行於同明殿召見與語訥因奏曰醜虜憑凌以廬陵為辭今雖有制升儲外議猶恐未定若此命不易則狂賊自然款伏則天深然其言尋拜幽州都督兼安東都護轉並州大都督府長史兼檢校左衛大將軍久當邊鎮之任纍有戰功玄宗即位於新豐講武訥為左軍節度時元帥與禮官得罪諸部頗亦失序唯訥及解琬之軍不動玄宗令輕騎召訥等至軍門皆不得入禮畢上甚慰勞時契丹及奚與突厥連和屢為邊患訥建議請出師討之開元二年夏詔與左監門將軍杜賓客定州刺史崔宣道等率衆二萬出檀州道以討契丹等杜賓客以為時屬炎暑將士負戈甲齎資糧深入寇境恐難為制勝中書令姚元崇亦以為然訥獨曰夏月草茂羔犢生息之際不費糧儲亦可漸進一舉振國威靈不可失也時議咸以為不便玄宗方欲威服四夷特令訥同紫微黃門三品總兵擊奚契丹議者乃息六月師至灤河遇賊時既蒸暑諸將失計會盡為契丹等所覆訥脫身走免歸罪於崔宣道及蕃將李思敬等八人詔盡令斬之特免杜賓客之罪下制曰並州大都督府長史兼檢校左衛大將軍和戎大武等諸軍州節度大使同紫微黃門三品薛訥總戎禦邊建議為首暗於料敵輕於接戰張我王師衄之虜境觀其疇昔頗常輸罄每欲資忠報主見義忘身特緩嚴刑俾期來效宜赦其罪所有官爵等並從除削其年八月吐蕃大將坌達延乞力徐等率衆十萬寇臨洮軍又進寇蘭州及渭州之渭源縣掠羣牧而去詔訥白衣攝左羽林將軍為隴右防禦使與太僕少卿王晙等率兵邀擊之十月訥領衆至渭源遇賊戰於武階驛與王晙掎角夾攻之大破賊衆追奔至洮水又戰于長城堡豐安軍使王海賓先鋒力戰死之將士乘勢進擊又敗之殺獲萬人擒其將六指鄉彌洪盡收其所掠羊馬並獲其器械不可勝數時有詔將以十二月親征吐蕃及聞訥等克捷玄宗大悅乃停親征追贈王海賓左金吾衛大將軍賻物三百段粟三百石名其稚子為忠嗣拜朝散大夫命紫微舍人倪若水往即便録功狀拜訥為左羽林軍大將軍復封平陽郡公仍拜子暢朝散大夫俄又充涼州鎮軍大總管尋以年老特聽致仕八年卒年七十餘贈太常卿諡曰昭定訥沉勇寡言臨大敵而益壯訥弟楚玉開元中為幽州大都督府長史以不稱職見代而卒王晙滄州景城人徙家于洛陽祖有方岷州刺史晙弱冠明經擢第歷遷殿中侍御史加朝散大夫時朔方軍元帥魏元忠討賊失利歸罪於副將韓思忠奏請誅之晙以思忠既是偏裨制不由己又有勇智可惜不可獨殺非辜乃廷議爭之思忠竟得釋而晙亦由是出為渭南令景龍末纍轉為桂州都督桂州舊有屯兵常運衡永等州糧以饋之晙始改築羅郭奏罷屯兵及轉運又堰江水開屯田數千頃百姓賴之尋上疏請歸鄉拜墓州人詣闕請留晙乃下敕曰彼州往緣寇盜戶口凋殘委任失材乃令至此卿處事強濟遠邇寧靜築城務農利益已廣隱括綏緝復業者多宜須政成安此黎庶百姓又有表請不須來也晙在州又一年州人立碑以頌其政再轉鴻臚大卿充朔方軍副大總管兼安北大都護豐安定遠三城及側近軍並受晙節度後轉太僕少卿隴右羣牧使開元二年吐蕃精甲十萬寇臨洮軍晙率所部二千人卷甲倍程與臨洮兩軍合勢以拒之賊營於大來谷口吐蕃將坌達延又率兵繼至晙乃出奇兵七百人衣之蕃服夜襲之相去五里置鼓角令前者遇寇大呼後者擊鼓以應之賊衆大懼疑有伏兵自相殺傷死者萬計俄而攝右羽林將軍薛訥率衆邀擊吐蕃至武階谷去大來谷二十里為賊所隔晙率兵迎訥之軍賊置兵於兩軍之間連亙數十里晙夜出壯士銜枚擊之賊又大潰乃與訥合軍掩其餘衆追奔至洮水殺獲不可勝數盡收所掠牧馬而還以功加銀青光祿大夫封清源縣男兼原州都督仍拜其子珽為朝散大夫尋除並州大都督府長史明年突厥默啜為九姓所殺其下酋長多款塞投降置之河曲之內俄而小殺繼立降者漸叛晙上疏曰突厥時屬亂離所以款塞降附其與部落非有讎嫌情異北風理固明矣養成其釁雖悔可追今者河曲之中安置降虜此輩生梗實難處置日月漸久姦詐逾深窺邊間隙必為患難今有降者部落不受軍州進止輒動兵馬屢有傷殺詢問勝州左側被損五百餘人私置烽鋪潛為抗拒公私行李頗實危懼北虜如或南牧降戶必與連衡臣問沒蕃歸人云却逃者甚衆南北信使委曲通傳此輩降人翻成細作倘收合餘燼來逼軍州虜騎憑凌胡兵應接表𩹉有敵進退無援雖復韓彭之勇孫吳之策令其制勝其可必乎望至秋冬之際令朔方軍盛陳兵馬告其禍福啖以繒帛之利示以麋鹿之饒説其魚米之鄉陳其畜牧之地並分配淮南河南寬鄉安置仍給程糧送至配所雖復一時勞弊必得久長安穩二十年外漸染淳風持以充兵皆為徑卒若以北狄降者不可南中安置則高麗俘虜置之沙漠之曲西域編氓散在青徐之右唯利是視務安疆埸何獨降胡不可移徙近者在邊將士爰及安蕃使人多作諛辭不為實對或言北虜破滅或言降戶安靜志欲自言功效非有以徇邦家伏願察斯利口行茲遠慮邊荒清晏黎元幸甚臣料留住之議謀者云遵故事必言降戶之輩舊置河曲之中昔年既得康寧今日還應穩便但同時異事先典攸傳往者頡利破亡邊境寧謐降戶之輩無復他心所以多歷歲年此類皆無動靜今虜見未破滅降戶私使往來或畏北虜之威或懷北虜之惠又是北虜戚屬夫豈不識親疏將比昔年安可同日臣料其中頗有三策若盛陳兵馬散令分配內獲精兵之實外袪黠虜之謀暫勞永安此上策也若多屯士卒廣為備擬亭障之地蕃漢相參費甚人勞此下策也若置之朔塞任之來往通傳信息結成禍胎此無策也伏願察斯三者詳其善惡利害之狀長短可尋縱因遷移或致逃叛但有移得之者即是今日良圖留待河冰恐即有變臣蒙天澤叨居重鎮逆耳利行敢不盡言疏奏未報降虜果叛敕晙帥並州兵西濟河以討之晙乃間行倍道以夜繼晝卷甲捨幕而趨之夜於山中忽遇風雪甚盛晙恐失期仰天誓曰晙若事君不忠不討有罪明靈所殛固自當之而士衆何辜令其艱苦若誠心忠烈天監孔明當止雪回風以濟戎事言訖風回而雪止時叛者分為兩道其在東者晙追及之殺一千五百餘人生獲一千四百餘人駝馬牛羊甚衆晙以功遷左散騎常侍持節朔方道行軍大總管尋遷御史大夫時突厥跌部落及僕固都督勺磨等散在受降城左右居止且謀引突厥共為表𩹉陷軍城而叛晙因入奏密請誅之八年秋晙誘跌等黨與八百餘人於中受降城誅之由是乃授晙兵部尚書復充朔方軍大總管九年蘭池州胡苦於賦役誘降虜餘燼攻夏州反叛詔隴右節度使羽林將軍郭知運與晙相知討之晙奏朔方軍兵自有餘力其郭知運請還本軍未報而知運兵至與晙頗不相協晙所招撫降者知運縱兵擊之賊以為晙所賣皆相率叛走晙進封清源縣公仍兼御史大夫俄而賊衆復相結聚晙坐左遷梓州刺史十年拜太子詹事纍封中山郡公屬車駕北巡以晙為吏部尚書兼太原尹十一年夏代張説為兵部尚書同中書門下三品追録破胡之功加金紫光祿大夫仍充朔方軍節度大使其年冬上親郊祀追晙赴京以會大禮晙以時屬冰壯恐虜騎乘隙入寇表辭不赴手敕慰勉仍賜衣一副會許州刺史王喬家奴告喬與晙潛謀構逆敕侍中源乾曜中書令張説鞫其狀晙既無反狀乃以違詔追不到左遷蘄州刺史十四年纍遷戶部尚書復為朔方軍節度使二十年卒年七十餘贈尚書左丞相諡曰忠烈往歲魏元忠為張易之昌宗所構左授高要尉晙密狀申明之宋璟時為鳳閣舍人謂晙曰魏公且全矣子冒威嚴而理坐恐子之狼狽也晙曰魏公忠而獲罪晙為義所激顛沛無恨璟歎曰璟不能申魏公之枉深負朝廷矣晙氣貌雄壯時人謂之有熊虎之狀然慕義激勵有古人之風御下整肅人吏畏而愛之晙卒後信安王禕於幽州討奚告捷奏稱軍士咸見晙與蕃將高昭領兵馬先軍討賊上聞而嗟異久之戶部郎中陽伯城上疏請晙等墳特乞增修封域量加表異降使饗祭優其子孫玄宗乃遣使就其家廟祭仍加其子官秩史臣曰婁師德應召而慷愾勇也薦仁傑而入用忠也不使仁傑知之公也營田贍軍智也恭勤接下和也參知政事功名有卒是人之難也又何愧於將相乎王孝傑唐休璟張仁願薛訥王晙等皆韜武幹亟立邊功然孝傑失於再擒休璟虧於餘行先敗後勝薛訥何慚止雪回風王晙難掩仁願操履中否相兼贊曰拯物之心不形於色將相之材人何以測臣有始終功無爽忒多忌梁公自招慚德唐張訥晙善陳能師共服戎虜不憂邊陲
