body:
  text: 舊唐書卷一百四十列傳第九十韋臯劉闢附張建封盧羣韋臯字城武京兆人大曆初以建陵挽郎調補華州參軍纍授使府監察御史宰相張鎰出為鳳翔隴右節度使奏臯為營田判官得殿中侍御史權知隴州行營留後事建中四年涇師犯闕德宗幸奉天鳳翔兵馬使李楚琳殺張鎰以府城叛歸於朱泚隴州刺史郝通奔于楚琳先是朱泚自范陽入朝以甲士自隨後泚為鳳翔節度使既罷留范陽五百人戍隴州而泚舊將牛雲光督之時泚既以逆徒圍奉天雲光因稱疾請臯為帥將謀亂擒臯以赴泚臯將翟曄伺知之白臯為備雲光知事泄遂率其兵以奔泚行及汧陽遇泚家僮蘇玉將使于臯所蘇玉謂雲光曰太尉已登寶位使我持詔以韋臯為御史中丞君可以兵歸隴州臯若承命即為吾人如不受詔彼書生可以圖之事無不濟矣乃反旆疾趨隴州臯迎勞之先納蘇玉受其僞命乃問雲光曰始不告而去今又來何也雲光曰前未知公心故潛去知公有新命今乃復還願與公戮力定功同其生死臯曰善又謂雲光曰大使苟不懷詐請納器甲使城中無所危疑乃可入雲光以書生待臯且以為信然乃盡付弓矢戈甲臯既受之乃內其兵明日臯犒宴蘇玉雲光之卒於郡舍伏甲於兩廊酒既行伏發盡誅之斬雲光蘇玉首以徇泚又使家僮劉海廣以臯為鳳翔節度使臯斬海廣及從者三人生一人使報泚於是詔以臯為御史大夫隴州刺史置奉義軍節度以旌之臯遣從兄平及弇繼入奉天城城中聞臯有備士氣增倍臯乃築壇于廷血牲與將士等盟曰上天不弔國家多難逆臣乘間盜據宮闈而李楚琳亦扇凶徒傾陷城邑酷虐所加爰及本使既不事上安能恤下臯是用激心憤氣不遑底寧誓與羣公竭誠王室凡我同盟一心協力仗順除凶先祖之靈必當幽贊言誠則志合善感則心齊粉骨糜軀決無所顧有渝此志明神殛之逮於子孫亦罔遺類皇天后土當兆斯言又遣使入吐蕃求援十一月加檢校禮部尚書興元元年德宗還京徵為左金吾衛將軍尋遷大將軍貞元元年拜檢校戶部尚書兼成都尹御史大夫劍南西川節度使代張延賞臯以雲南蠻衆數十萬與吐蕃和好蕃人入寇必以蠻為前鋒四年臯遣判官崔佐時入南詔蠻說令向化以離吐蕃之助佐時至蠻國羊咀咩城其王異牟尋欣然接遇請絶吐蕃遣使朝貢其年遣東蠻鬼主驃傍苴夢衝苴烏等相率入朝南蠻自巂州陷沒臣屬吐蕃絶朝貢者二十餘年至是復通五年臯遣大將王有道簡習精卒以入蕃界與東蠻於故巂州臺登北谷大破吐蕃青海臘城二節度斬首二千級生擒籠官四十五人其投崖谷而死者不可勝計蕃將乞臧遮遮者蕃之驍將也久為邊患自擒遮遮城柵無不降數年之內終復巂州以功加吏部尚書九年朝廷築鹽州城慮為吐蕃掩襲詔臯出兵牽維之乃命大將董勔張芬出西山及南道破峨和城通鶴軍吐蕃南道元帥論莽熱率衆來援又破之殺傷數千人焚定廉城凡平堡柵五十餘所以功進位檢校右僕射臯又招撫西山羌女訶陵白狗逋租弱水南水等八國酋長入貢闕廷十一年九月加統押近界諸蠻西山八國兼雲南安撫等使十二年二月就加同中書門下平章事十三年收復巂州城十六年臯命將出軍纍破吐蕃於黎巂二州吐蕃怒遂大搜閲築壘造舟欲謀入寇臯悉挫之於是吐蕃酋帥兼監統曩貢臘城等九節度嬰籠官馬定德與其大將八十七人舉部落來降定德有計略習知兵法及山川地形吐蕃每用兵定德常乘驛計事蕃中諸將稟其成算至是自以扞邊失律懼得罪而歸心焉十七年吐蕃昆明城管磨些蠻千餘戶又降贊普以其衆外潰遂北寇靈朔陷麟州德宗遣使至成都府令臯出兵深入蕃界臯乃令鎮靜軍使陳洎等統兵萬人出三奇路威戎軍使崔堯臣兵千人出龍溪石門路南維保二州兵馬使仇冕保霸二州刺史董振等兵二千趨吐蕃維州城中北路兵馬使邢玼等四千趨吐蕃棲雞老翁城都將高倜王英俊兵二千趨故松州隴東兵馬使元膺兵八千人出南道雅邛黎巂路又令鎮南軍使韋良金兵一千三百續進雅州經略使路惟明等兵三千趨吐蕃租松等城黎州經略使王有道兵二千人過大渡河深入蕃界巂州經略使陳孝陽兵馬使何大海韋義等及磨些蠻東蠻二部落主苴那時等兵四千進攻昆明城諾濟城自八月出軍齊入至十月破蕃兵十六萬拔城七軍鎮五戶三千擒生六千斬首萬餘級遂進攻維州救軍再至轉戰千里蕃軍連敗於是寇靈朔之衆引而南下贊普遣論莽熱以內大相兼東境五道節度兵馬都羣牧大使率雜虜十萬而來解維州之圍蜀師萬人據險設伏以待之先出千人挑戰莽熱見我師之少悉衆追之發伏掩擊鼓譟雷駭蕃兵自潰生擒論莽熱虜衆十萬殲夷者半是歲十月遣使獻論莽熱于朝德宗數而釋之賜第於崇仁里臯以功加檢校司徒兼中書令封南康郡王順宗即位加檢校太尉順宗久疾不能臨朝聽政宦者李忠言侍棋待詔王叔文侍書待詔王伾等三人頗干國政高下在心臯乃遣支度副使劉闢使於京師闢私謁王叔文曰太尉使致誠於足下若能致某都領劍南三川必有以相酬如不留意亦有以奉報叔文大怒將斬闢以徇韋執誼固止之闢乃私去臯知王叔文人情不附又知與韋執誼有隙自以大臣可議社稷大計乃上表請皇太子監國曰臣聞上承宗廟下鎮黎元永固無疆莫先儲兩伏聞聖明以山陵未祔哀毀逾制心勞萬幾伏計旬月之間未甚痊復皇太子睿質已長淑問日彰四海之心實所倚賴伏望權令皇太子監撫庶政以俟聖躬痊平一日萬幾免令壅滯又上皇太子箋曰殿下體重離之德當儲二之重所以克昌九廟式固萬方天下安危繫於殿下臯位居將相志切匡扶先朝奬知早承恩顧人臣之分知無不為願上答眷私罄輸肝鬲伏以聖上嗣膺鴻業睿哲英明攀感先朝志存孝理諒暗之際方委大臣但付託偶失於善人而參決多虧於公政今羣小得志隳紊紀綱官以勢遷政由情改朋黨交構熒惑宸聰樹置腹心遍於貴位潛結左右難在蕭牆國賦散於權門王稅不入天府褻慢無忌高下在心貨賄流聞遷轉失先聖屏黜贓犯之類咸擢居省寺之間至令忠臣隕涕正人結舌遐邇痛心人知不可伏恐姦雄乘便因此謀動干戈危殿下之家邦傾太宗之王業伏惟太宗櫛沐風雨經營廟朝將垂二百年欲及千萬祀而一朝使叔文姦佞之徒侮弄朝政恣其胸臆坐致傾危臣每思之痛心疾首伏望殿下斥逐羣小委任賢良慺慺血誠輸寫於此太子優令答之而裴均嚴綬箋表繼至由是政歸太子盡逐伾文之黨是歲暴疾卒時年六十一贈太師廢朝五日臯在蜀二十一年重賦斂以事月進卒致蜀土虛竭時論非之其從事纍官稍崇者則奏為屬郡刺史或又署在府幕多不令還朝蓋不欲泄所為於闕下故也故劉闢因臯故態圖不軌以求三川厲階之作蓋有由然臯兄聿時為國子司業劉闢與盧文若據西川叛臯姪行式先娶文若妹而聿不奏既收行式以其妻沒官詔御史臺按聿聿下獄有司以行式妻在遠不與兄同情不當連坐詔歸行式妻而釋聿劉闢者貞元中進士擢第宏詞登科韋臯辟為從事纍遷至御史中丞支度副使永貞元年八月韋臯卒闢自為西川節度留後率成都將校上表請降節鉞朝廷不許除給事中便令赴闕闢不奉詔時憲宗初即位以無事息人為務遂授闢檢校工部尚書充劍南西川節度使闢益凶悖出不臣之言而求都統三川與同幕盧文若相善欲以文若為東川節度使遂舉兵圍梓州憲宗難於用兵宰相杜黃裳奏劉闢一狂蹶書生耳王師鼓行而俘之兵不血刃臣知神策軍使高崇文驍果可任舉必成功帝數日方從之於是令高崇文李元奕將神策京西行營兵相續進發令與嚴礪李康掎角相應以討之仍許其自新元和元年正月崇文出師三月收復東川乃下詔曰朕聞皇祖玄元之誡曰兵者凶器也不得已而用之恭惟聖謨常所祗服故惟文誥有所不至誠信有所未孚始務安人必能忍恥朕之此志亦可明徵近者德宗皇帝舉柔服之規授宰衡之傑弘我廟勝遂康巴庸故得南詔入貢西戎寢患成績始究元臣喪亡劉闢乘此變故坐邀符節朕以成狂命者雖乖於理體從權便者所冀於輯寧竟乖卿士之謀遂允幸求之志朕之於闢恩亦弘矣曾不知恩負牛羊之力飽則逾凶畜梟獍之心馴之益悖誑惑士伍圍逼梓州誘陷戎臣塞絶劍路師徒所至燒劫無遺干紀之辜擢髮難數朕為人司牧字彼黎元如闢之罪非朕敢捨可削奪在身官爵六月崇文破鹿頭關進收漢州九月崇文收成都府劉闢以數十騎遁走投水不死騎將酈定進入水擒闢於成都府西洋灌田盧文若先自刃其妻子然後縋石投江失其尸闢檻送京師在路飲食自若以為不當死及至京西臨臯驛左右神策兵士迎之以帛繫首及手足曳而入乃驚曰何至於是或紿之曰國法當爾無憂也是日詔曰劉闢生於士族敢蓄梟心驅劫蜀人拒扞王命肆其狂逆詿誤一州俾我黎元肝腦塗地賊將崔綱等同惡相扇至死不回咸宜伏辜以正刑典劉闢男超郎等九人並處斬闢入京城上御興安樓受俘馘令中使於樓下詰闢反狀闢曰臣不敢反五院子弟為惡臣不能制又遣詰之曰朕遣中使送旌節官告何故不受闢乃伏罪令獻太廟郊社徇于市即日戮於子城西南隅初闢嘗病見諸問疾者來皆以手據地倒行入闢口闢因磔裂食之惟盧文若至則如平常故尤與文若厚竟以同惡俱赤族不其怪歟張建封字本立兗州人祖仁範洪州南昌縣令貞元初贈鄭州刺史父玠少豪俠輕財重士安祿山反令僞將李庭偉率蕃兵脅下城邑至魯郡太守韓擇木具禮郊迎置於郵館玠率鄉豪張貴孫邑段絳等集兵將殺之擇木怯懦大懼唯員外司兵張孚然其計遂殺庭偉並其黨數十人擇木方遣使奏聞擇木張孚俱受官賞玠因遊蕩江南不言其功以建封貴贈祕書監建封少頗屬文好談論慷慨負氣以功名為己任寶應中李光弼鎮河南時蘇常等州草賊寇掠郡邑代宗遣中使馬日新與光弼將兵馬同征討之建封乃見日新自請說喻賊徒日新從之遂入虎窟蒸里等賊營以利害禍福喻之一夕賊黨數千人並詣日新請降遂悉放歸田里大曆初道州刺史裴虬薦建封於觀察使韋之晉辟為參謀奏授左清道兵曹不樂吏役而去滑亳節度使令狐彰聞其名辟之彰既未曾朝覲建封心不悅之遂投刺於轉運使劉晏自述其志不願仕於彰也晏奏試大理評事勾當軍務歲餘復罷歸建封素與馬燧友善大曆十年燧為河陽三城鎮遏使辟為判官奏授監察御史賜緋魚袋李靈曜反於梁宋間與田悅掎角同為叛逆燧與李忠臣同討平之軍務多咨於建封及燧為河東節度使復奏建封為判官特拜侍御史建中初燧薦之於朝楊炎將用為度支郎中盧嵵惡之出為嶽州刺史時淮西節度使李希烈乘破滅梁崇義之勢漸縱恣跋扈壽州刺史崔昭數書疏往來淮南節度使陳少遊奏之上遽召宰相令選壽州刺史盧嵵本惡建封是日蒼黃遂薦建封以代崔昭牧壽陽李希烈稱兵寇陷汝州擒李元平擊走劉德信唐漢臣等又摧破哥舒曜於襄城連陷鄭汴等州李勉棄城而遁涇師內逆駕幸奉天賊鋒益盛淮南陳少遊潛通希烈尋稱僞號改元遣將楊豐齎僞赦書二道令送少遊及建封至壽州建封縛楊豐徇於軍中適會中使自行在及使江南回者同至建封集衆對中使斬豐於通衢封僞赦書送行在遠近震駭陳少遊聞之既怒且懼建封乃具奏少遊與希烈往來事狀希烈又僞署其黨杜少誠為淮南節度使令先平壽州趣江都建封令其將賀蘭元均邵怡等守霍丘秋柵少誠竟不能侵軼乃南掠蘄黃等州又為伊慎所挫衄尋加建封兼御史中丞本州團練使車駕還京陳少遊憂憤而卒興元元年十二月乃加兼御史大夫充濠壽廬三州都團練觀察使於是大修緝城池悉心綏撫遠近悅附自是威望益重李希烈選凶黨精悍者率徑卒以攻建封曠日持久無所克獲而去及希烈平進階封賜一子正員官初建中年李洧以徐州歸附洧尋卒其後高承宗父子獨孤華相繼為刺史為賊侵削貧困不能自存又咽喉要地據江淮運路朝廷思擇重臣以鎮者久之貞元四年以建封為徐州刺史兼御史大夫徐泗濠節度支度營田觀察使既創置軍伍建封觸事躬親性寬厚容納人過誤而按據綱紀不妄曲法貸人每言事忠義感激人皆畏悅七年進位檢校禮部尚書十二年加檢校右僕射十三年冬入覲京師德宗禮遇加等特以雙日開延英召對又令朝參入大夫班以示殊寵建封賦朝天行一章上獻賜名馬珍玩頗厚時宦者主宮中市買謂之宮市抑買人物稍不如本估末年不復行文書置白望數十百人於兩市及要鬧坊曲閲人所賣物但稱宮市則斂手付與真僞不復可辨無敢問所從來及論價之高下者率用直百錢物買人直數千物仍索進奉門戶及腳價銀人將物詣市至有空手而歸者名為宮市其實奪之嘗有農夫以驢馱柴宦者市之與絹數尺又就索門戶仍邀驢送柴至內農夫啼泣以所得絹與之不肯受曰須得爾驢農夫曰我有父母妻子待此而後食今與汝柴而不取直而歸汝尚不肯我有死而已遂毆宦者街使擒之以聞乃黜宦者賜農夫絹十匹然宮市不為之改諫官御史表疏論列皆不聽吳湊以戚里為京兆尹深言其弊建封入覲具奏之德宗頗深嘉納而戶部侍郎判度支蘇辨希宦者之旨因入奏事上問之辨對曰京師游手墮業者數千萬家無土著生業仰宮市取給上信之凡言宮市者皆不聽用詔書矜免百姓諸色逋賦上問建封對曰凡逋賦殘缺皆是纍積年月無可徵收雖蒙陛下憂恤百姓亦無所裨益時河東節度使李說華州刺史盧徵皆中風疾口不能言足不能行但信任左右胥吏決遣之建封皆悉聞奏上深嘉納又金吾大將軍李翰好伺察城中細事加諸聞奏冀求恩寵人畏而惡之建封亦奏之乃下詔曰比來朝官或諸處過從金吾皆有上聞其間如素是親故或曾同僚友伏臘歲序時有還往亦是常禮人情所通自今以後金吾不須聞十四年春上巳賜宰臣百僚宴於曲江亭特令建封與宰相同座而食貞元已後藩帥入朝及還鎮如馬燧渾瑊劉玄佐李抱真曲環之崇秩鴻勳未有獲御製詩以送者建封將還鎮特賜詩曰牧守寄所重才賢生為時宣風自淮甸授鉞膺藩維入覲展遐戀臨軒慰來思忠誠在方寸感激陳清詞報國爾所尚恤人豫是資歡宴不盡懷車馬當還期穀雨將應候行春猶未遲勿以千里遙而云無己知又令高品中使齎常所執鞭以賜之曰以卿忠貞節義歲寒不移此鞭朕久執用故以賜卿表卿忠節也建封又獻詩一篇以自警勵建封在彭城十年軍州稱理復又禮賢下士無賢不肖遊其門者皆禮遇之天下名士嚮風延頸其往如歸貞元時文人如許孟容韓愈諸公皆為之從事十六年遇疾連上表請速除代方用韋夏卿為徐泗行軍司馬未至而建封卒時年六十六冊贈司徒子愔愔以蔭授虢州參軍初建封卒判官鄭通誠權知留後事通誠懼軍士謀亂適遇浙西兵遷鎮通誠欲引入州城為援事泄三軍怒五六千人斫甲仗庫取戈甲執帶環繞衙城請愔為留後乃殺通誠楊德宗大將段伯熊吉遂曲澄張秀等軍衆請於朝廷乞授愔旄節初不之許乃割濠泗二州隸淮南加杜佑同平章事以討徐州既而泗州刺史張伾以兵攻甬橋與徐軍接戰伾大敗而還朝廷不獲已乃授愔起復右驍衛將軍同正兼徐州刺史御史中丞充本州團練使知徐州留後仍以泗州刺史張伾為泗州留後濠州刺史杜兼為濠州留後正授武寧軍節度檢校工部尚書元和元年被疾上表請代徵為兵部尚書以東都留守王紹為武寧軍節度代愔復隸濠泗二州於徐徐軍喜復得二州不敢為亂而愔遂赴京師未出界卒愔在徐州七年百姓稱理詔贈右僕射盧羣字載初范陽人少好讀書初學於太安山淮南節度使陳少遊聞其名辟為從事建中末薦於朝廷會李希烈反叛詔諸將討之以羣為監察御史江西行營糧料使興元元年江西節度嗣曹王臯奏為判官曹王移鎮江陵襄陽羣皆從之幕府之事委以咨決以正直聞貞元六年入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寶玉者張氏兄弟又與尚父家子孫相告訴詔促按其獄羣奏曰張氏以子儀在時分財子弟不合爭奪然張氏宅與子儀親仁宅皆子儀家事子儀有大勳伏望陛下特赦而勿問俾私自引退德宗從其言時人嘉其識大體纍轉左司職方兵部三員外郎中淮西節度使吳少誠擅開決司洧等水漕挽溉田遣中使止之少誠不奉詔令羣使蔡州詰之少誠曰開大渠大利於人羣曰為臣之道不合自專雖便於人須俟君命且人臣須以恭恪為事若事君不盡恭恪即責下吏恭恪固亦難矣凡數百千言諭以君臣之分忠順之義少誠乃從命即停工役羣博涉有口辨好談論與少誠言古今成敗之事無不聳聽又與唱和賦詩自言以反側常蒙隔在恩外羣於筵中醉而歌曰祥瑞不在鳳凰麒麟太平須得邊將忠臣衛霍真誠奉主貔虎十萬一身江河潛注息浪蠻貊款塞無塵但得百僚師長肝膽不用三軍羅綺金銀少誠大感悅羣以奉使稱旨俄遷檢校祕書監兼御史中丞義成軍節度行軍司馬貞元十六年四月節度姚南仲歸朝拜羣義成軍節度鄭滑觀察等使先寓居鄭州典質良田數頃及為節度使至鎮各與本地契書分付所管令長令召還本主時論稱美尋遇疾其年十月卒時年五十九廢朝一日贈工部尚書賵賻布帛米粟有差史臣曰韋南康張徐州慷慨下位之中橫身喪亂之際力扶衰運氣激壯圖義風聳動羣醜舂盜之喉折賊之角可謂忠矣而韋公季年惑賊闢之姦說欲兼巴益則志未可量徐州請覲頗有規諫之言所謂以道匡君能以功名始終者盧載初喻少誠還地券君子哉三子之賢不可多得贊曰南康英壯力匡交喪張侯義烈志平亂象見危能振蹈利無謗韋德不周張心可亮
