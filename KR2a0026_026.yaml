body:
  text: 舊唐書卷二十二志第二禮儀二隋文帝開皇中將作大匠宇文愷依月令造明堂木樣以獻帝令有司於京城安業里內規兆其地方欲崇建而諸儒爭論不定竟議罷之煬帝時愷復獻明堂木樣幷議狀屬遷都興役事又不就終於隋代季秋大享恆在雩壇設祀高祖受禪不遑創儀太宗平定天下命儒官議其制貞觀五年太子中允孔穎達以諸儒立議違古上言曰臣伏尋前敕依禮部尚書盧寬國子助教劉伯莊等議以為從崑崙道上層祭天又尋後敕云為左右閣道登樓設祭臣檢六藝羣書百家諸史皆名基上曰堂樓上曰觀未聞重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其義一也又明堂法天聖王示儉或有翦蒿為柱葺茅作蓋雖復古今異制不可恆然猶依大典惟在朴素是以席惟秸器尚陶匏用繭栗以貴誠服大裘以訓儉今若飛樓架道綺閣凌雲考古之文實堪疑慮按郊祀志漢武明堂之制四面無壁上覆以茅祭五帝於上座祀后土於下防臣以上座正為基上下防惟是基下既云無四壁未審伯莊以何知上層祭神下有五室且漢武所為多用方士之說違經背正不可師祖又盧寬等議云上層祭天下堂布政欲使人神位別事不相干臣以古者敬重大事與接神相似是以朝覲祭祀皆在廟堂豈有樓上祭祖樓下視朝閣道升樓路便窄隘乘輦則接神不敬步往則勞勩聖躬侍衞在旁百司供奉求之典誥全無此理臣非敢固執愚見以求己長伏以國之大典不可不慎乞以臣言下羣臣詳議侍中魏徵議曰稽諸古訓參以舊圖其上圓下方複廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端蜂起是非舛互靡所適從遂乃以人廢言止為一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未弘夫孝因心生禮緣情立心不可極故備物以表其誠情無以盡故飾宮以廣其敬宣尼美意其在茲乎臣等親奉德音令參大議思竭塵露微增山海凡聖人有作義重隨時萬物斯覩事資通變若據蔡邕之說則至理失於文繁若依裴頠所為則又傷於質略求之情理未允厥中今之所議非無用捨請為五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其高下廣袤之規几筵尺丈之制則並隨時立法因事制宜自我而作何必師古廓千載之疑議為百王之懿範不使泰山之下惟聞黃帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日議猶未決十七年五月秘書監顏師古議曰明堂之制爰自古昔求之簡牘全文莫覩始之黃帝降及有虞彌歷夏殷迄于周代各立名號別創規模衆說舛駁互執所見巨儒碩學莫有詳通裴然成章不知裁斷究其指要實布政之宮也徒以戰國縱橫典籍廢棄暴秦酷烈經禮湮亡今之所存傳記雜說用為準的理實蕪昧然周書之明堂紀其四面則有應門雉門據此一堂固是王者之常居耳其青陽總章玄堂太廟及左个右个與四時之次相同則路寢之義足為明證又文王居明堂之篇帶以弓祠于高禖下九門磔禳以禦疾疫置梁除道以利農夫令國有酒以合三族凡此等事皆合月令之文觀其所為皆在路寢者也戴禮昔周公朝諸侯于明堂之位天子負斧扆南向而立明堂也者明諸侯之尊卑也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也尸子亦曰黃帝曰合宮有虞氏曰總章殷曰陽館周曰明堂斯皆路寢之徵知非別處大戴所說初有近郊之言復稱文王之廟進退無據自為矛盾原夫負扆受朝常居出入既在皋庫之內亦何云於郊野哉孝經傳云在國之陽又無里數漢武有懷創造詢於搢紳言論紛然終無定據乃立於汶水之上而宗祀焉明其不拘遠近無擇方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營創孔牢等乃以為明堂辟雍太學其實一也而有三名金褒等又稱經傳無文不能分別同異中興之後蔡邕作論復云明堂太廟一物二名鄭玄則曰在國之陽三里之外淳于登又云三里之外七里之內丙巳之地潁容釋例亦云明堂太廟凡有八名其體一也苟立同異競為巧說並出自胸懷曾無師祖審夫功成作樂理定制禮草創從宜質文遞變旌旗冠冕古今不同律度權衡前後不一隨時之義斷可知矣假如周公舊章猶當擇其可否宣尼彝則尚或補其闕漏況鄭氏臆說淳于謏聞匪異守株何殊膠柱愚謂不出墉雉邇接宮闈實允事宜諒無所惑但當上遵天旨祗奉德音作皇代之明堂永貽範於來葉區區碎議皆略而不論又上表曰明堂之制陛下已發德音久令詳議但以學者專固人人異言損益不同是非莫定臣愚以為五帝之後兩漢已前高下方圓皆不相襲惟在陛下聖情創造即為大唐明堂足以傳於萬代何必論戶牖之多少疑階庭之廣狹若恣儒者互說一端久無斷決徒稽盛禮昔漢武欲草封禪儀博望諸生所說不同莫知孰是唯御史大夫倪寬勸上自定制度遂成登封之禮臣之愚誠亦望陛下斟酌繁省為其節文不可謙拒以淹大典尋以有事遼海未暇營創永徽二年七月二日敕曰上玄幽贊處崇高而不言皇王提象代神功而理物是知五精降德爰應帝者之尊九室垂文用紀配天之業且合宮靈府創鴻規於上代太室總章標茂範於中葉雖質文殊制奢儉異時然其立天中作人極布政施教其歸一揆朕嗣膺下武丕承上烈思所以答眷上靈聿遵孝享而法宮曠禮明堂寢構今國家四表無虞人和歲稔作範垂訓今也其時宜令所司與禮官學士等考覈故事詳議得失務依典禮造立明堂庶曠代闕文獲申於茲日因心展敬永垂於後昆其明堂制度令諸曹尚書及左右丞侍郎太常國子秘書官弘文館學士同共詳議於是太常博士柳宣依鄭玄義以為明堂之制當為五室內直丞孔志約據大戴禮及盧植蔡邕等義以為九室曹王友趙慈皓秘書郎薛文思等各造明堂圖諸儒紛爭互有不同上初以九室之議為是乃令所司詳定形制及辟雍門闕等明年六月內出九室樣仍更令有司損益之有司奏言內樣堂基三重每基階各十二上基方九雉八角高一尺中基方三百尺高一筵下基方三百六十尺高一丈二尺上基象黃琮為八角四面安十二階請從內樣為定基高下仍請準周制高九尺其方共作司約準一百四十八尺中基下基望並不用又內樣室各方三筵開四闥八窗屋圓楣徑二百九十一尺按季秋大饗五帝各在一室商量不便請依兩漢季秋合饗總於太室若四時迎氣之祀則各於其方之室其安置九室之制增損明堂故事三三相重太室在中央方六丈其四隅之室謂之左右房各方二丈四尺當太室四面青陽明堂總章玄堂等室各長六丈以應太室闊二丈四尺以應左右房室間並通巷各廣一丈八尺其九室幷巷在堂上總方一百四十四尺法坤之策屋圓楣楯檐或為未允請據鄭玄盧植等說以前梁為楣其徑二百一十六尺法乾之策圓柱旁出九室四隅各七尺法天以七紀柱外餘基共作司約準面別各餘一丈一尺內樣室別四闥八窗檢與古同請依為定其戶依古外設而不開內樣外有柱三十六每柱十梁內有七間柱根以上至梁高三丈梁以上至屋峻起計高八十一尺上圓下方飛檐應規請依內樣為定其屋蓋形制仍望據考工記改為四阿幷依禮加重檐準太廟安鴟尾堂四向五色請依周禮白盛為便其四向各隨方色請施四垣及四門辟雍按大戴禮及前代說辟雍多無水廣內徑之數蔡邕云水廣二十四丈四周於外三輔黃圖云水廣四周與蔡邕不異仍云水外周堤又張衡東京賦稱造舟為梁禮記明堂位陰陽錄云水左旋以象天商量水廣二十四丈恐傷於闊今請減為二十四步垣外量取周足仍依故事造舟為梁其外周以圓堤幷取陰陽水行左旋之制殿垣按三輔黃圖殿垣四周方在水內高不蔽日殿門去殿七十二步準今行事陳設猶恐窄小其方垣四門去堂步數請準太廟南門去廟基遠近為制仍立四門八觀依太廟門別各安三門施玄閫四角造三重魏闕此後羣儒紛競各執異議尚書左僕射于志寧等請為九室太常博士唐眕等請為五室高宗令於觀德殿依兩議張設親與公卿觀之帝曰明堂之禮自古有之議者不同未果營建今設兩議公等以何者為宜工部尚書閻立德對曰兩議不同俱有典故九室似闇五室似明取捨之宜斷在聖慮上以五室為便議又不定由是且止至乾封二年二月詳宜略定乃下詔曰朕以寡薄忝承丕緒奉二聖之遺訓撫億兆以初臨馭朽兢懷推溝在念而上玄垂祐宗社降休歲稔時和人殷俗阜車書混一文軌大同檢玉泥金升中告禪百蠻執贄萬國來庭朝野懽娛華夷胥悅但為郊禋嚴配未安太室布政施行猶闕合宮朕所以日昃忘疲中宵輟寢討論墳籍錯綜羣言採三代之精微探九皇之至賾斟酌前載製造明堂棟宇方圓之規雖兼故實度筵陳俎之法獨運財成宣諸內外博考詳議求其長短冀廣異聞而鴻生碩儒俱稱盡善搢紳士子並奏該通創此宏模自我作古因心既展情禮獲伸永言宗祀良深感慰宜命有司及時起作務從折中稱朕意焉於是大赦天下改元為總章分萬年置明堂縣明年三月又具規製廣狹下詔曰合宮聽朔闡皇軒之茂範靈府通和敷帝勛之景化殷人陽館青珪備禮姬氏玄堂彤璋合獻雖運殊驪翰時變質文至於立天中建皇極軌物施教其歸一揆考圖汶上僅存公玉之儀度室圭躔才紀中元之製屬炎精墜駕璿宮毀籥四海淪於沸鼎九土陷於塗原高祖太武皇帝杖鉞唐郊收鈐雍野納祥符於蒼水受靈命於丕山飛沉泳沫動植游源太宗文皇帝盟津光誓協降火而登壇豐谷斷蛇應屯雲而鞠旅封金岱嶺昭累聖之鴻勳勒石丸都成文考之先志固可以作化明堂顯庸太室傍羅八柱周建四門木工不琢土事無文豐約折衷經始勿亟闕文斯備大禮聿修其明堂院每面三百六十步當中置堂按周易乾之策二百一十有六坤之策一百四十有四總成三百六十故方三百六十步當中置堂處二儀之中定三才之本構茲一宇臨此萬方自降院每面三門同為一宇徘徊五間按尚書一期有四時故四面各一所開門每時有三月故每一所開三門一期十有二月故周迴總十二門所以面別一門應茲四序既一時而統三月故於一舍而置三門又周易三為陽數二為陰數合而為五所以每門舍五間院四隅各置重樓其四墉各依本方色按淮南子地有四維故四樓又按月令水火金木土五方各異色故其牆各依本方之色基八面象八方按周禮黃琮禮地鄭玄注琮者八方之玉以象地形故以祀地則知地形八方又按漢書武帝立八觚壇以祀地登地之壇形象地故令為八方之基以象地形基高一丈二尺徑二百八十尺按漢書陽為六律陰為六呂陽與陰合故高一丈二尺又按周易三為陽數八為陰數三八相乘得二百四十尺按漢書九會之數有四十合為二百八十所以基徑二百八十尺故以交通天地之和錯綜陰陽之數以明陽不獨運資陰和以助成陰不孤行待陽唱而方應陰陽兩順天地咸亨則百寶斯興九疇攸序基每面三階周迴十二階每階為二十五級按漢書天有三階故每面三階地有十二辰故周迴十二階又按文子從凡至聖有二十五等故每階二十五級所以應符星而設階法台耀以疏陛上擬霄漢之儀下則地辰之數又列茲重級用準聖凡象皇極之高居俯庶類而臨耀基之上為一堂其宇上圓按道德經天得一以清地得一以寧侯王得一以為天下貞又曰道生一一生二二生三三生萬物又按漢書太極元氣函三為一又曰天子以四海為家故置一堂以象元氣幷取四海為家之義又按周禮蒼璧禮天鄭玄注璧圓以象天故為宇上圓堂每面九間各廣一丈九尺按尚書地有九州故立九間又按周易陰數十故間別一丈九尺所以規模厚地準則陰陽法二氣以通基置九州於一宇堂周迴十二門每門高一丈七尺闊一丈三尺按禮記一歲有十二月所以置十二門又按周易陰數十陽數七故高一丈七尺又曰陽數五陰數八故闊一丈三尺所以調茲玉燭應彼金輝叶二氣以循環逐四序而迎節堂周迴二十四窗高一丈三尺闊一丈一尺二十三櫺二十四明按史記天有二十四氣故置二十四窗又按書一年十二月幷象閏故高一丈三尺又按周易天數一地數十故闊一丈一尺又天數九地數十幷四時成二十三故二十三櫺又按周易八純卦之本體合二十四爻故有二十四明列牖疏窗象風候氣遠周天地之數曲準陰陽之和堂心八柱各長五十五尺按河圖八柱承天故置八柱又按周易大衍之數五十有五故長五十五尺聳茲八柱承彼九間數該大衍之規形符立極之制且柱為陰數天實陽元柱以陰氣上升天以陽和下降固陰陽之交泰乃天地之相承堂心之外置四柱為四輔按漢書天有四輔星故置四柱以象四星內以八柱承天外象四輔明化上交下泰表𩹉相成叶台耀以分輝契編珠而拱極八柱四輔之外第一重二十柱按周易天數五地數十幷五行之數合而為二十故置二十柱體二儀而立數叶五位以裁規式符立極之功允應剛柔之道八柱四輔之外第二重二十八柱按史記天有二十八宿故有二十八柱所以仰則乾圖上符景宿考編珠而紀度觀列宿以迎時八柱四輔之外第三重三十二柱按漢書有八節八政八風八音四八三十二柱調風御節萬物資以化成布政流音九區仰而貽則外面周迴三十六柱按漢書一期三十六旬故法之以置三十六柱所以象歲時而致用順寒暑以通微璿璣之度無愆玉曆之期永契八柱之外修短總有三等按周易天地人為三才故置柱長短三等所以擬三才以定位高下相形體萬物以資生長短兼運八柱之外都合一百二十柱按禮記天子置三公九卿二十七大夫八十一元士合為一百二十是以置一百二十柱分職設官翊化資於多士開物成務構廈藉於羣材其上檻周迴二百四柱按周易坤之策一百四十有四又漢書九會之數有六十故置二百四柱所以採坤策之玄妙法甲乙之精微環迴契辰象之規結構準陰陽之數又基以象地故叶策於坤元柱各依方復規模於甲子重楣二百一十六條按周易乾之策二百一十有六故置二百一十六條所以規模易象擬法乾元應大衍之深玄叶神策之至數大小節級拱總六千三百四十五按漢書會月之數六千三百四十五故置六千三百四十五枚所以遠採三統之文傍符會月之數契金儀而調節偶璇曆以和時重幹四百八十九枚按漢書章月二百三十五閏月周迴二百五十四總成四百八十九故置四百八十九枚所以法履端之奧義象舉正之芳猷規模曆象發明章閏下七十二枚按易緯有七十二候故置七十二枚所以式模芳節取規貞候契至和於昌曆偶神數於休期上八十四枚按漢書九會之數有七十八又按莊子六合之外聖人存不論司馬彪注天地四方為六合總成八十四故置八十四枚所以模範二儀包羅六合準會陰陽之數周通氣候之源枅六十枚按漢書推太歲之法有六十故置六十枚所以兼該曆數包括陰陽採甲乙之深微窮辰子之玄奧連栱三百六十枚按周易當期之日三百有六十故置三百六十枚所以叶周天之度準當期之日順平分而成歲應晷運以循環小梁六十枚按漢書有六十甲子故置六十枚構此虹梁遐規鳳曆傍竦四宇之製遙符六甲之源二百二十八枚按漢書章中二百二十八故置二百二十八枚所以應長曆之規象中月之度廣綜陰陽之數傍通寒暑之和方衡一十五重按尚書五行生數一十有五故置十五重結棟分間法五行而演秘疏楹疊構叶生數以成規南北大梁二根按周易太極生兩儀故置二大梁軌範乾坤模擬天地象玄黃之合德表覆載以生成陽馬三十六道按易緯有三十六節故置三十六道所以顯茲嘉節契此貞辰分六氣以燮陰陽環四象而調風雨椽二千九百九十根按漢書月法二千三百九十二通法五百九十八共成二千九百九十所以偶推步之規合通法之數是知疏椽構宇則大壯之架斯隆積月成年則會曆之規無爽大梠兩重重別三十六條總七十二按淮南子太平之時五日一風一年有七十二風故置七十二條所以通規瑞曆叶數祥風遙符淳俗之年遠則休徵之契飛檐椽七百二十九枚按漢書從子至午其數七百二十九故置七百二十九枚所以採辰象之宏模法周天之至數且午為陰本子實陽源子午分時則生成之道自著陰陽合德則覆載之義茲隆堂檐徑二百八十八尺按周易乾之策二百一十六易緯云年有七十二候合為二百八十八故徑二百八十八尺所以仰叶乾策遠承貞候順和氣而調序擬圓蓋以照臨堂上棟去基上面九十尺按周易天數九地數十以九乘十數當九十故去基上面九十尺所以上法圓清下儀方載契陰陽之至數叶交泰之貞符又以茲天九乘於地十象陽唱而陰和法乾施而坤成檐去地五十五尺按周易大衍之數五十有五故去地五十五尺所以擬大易之嘉數通惟神之至賾道合萬象理貫三才上以清陽玉葉覆之按淮南子清陽為天合以清陽之色詔下之後猶羣議未決終高宗之世未能創立則天臨朝儒者屢上言請創明堂則天以高宗遺意乃與北門學士議其制不聽羣言垂拱三年春毀東都之乾元殿就其地創之四年正月五日明堂成凡高二百九十四尺東西南北各三百尺有三層下層象四時各隨方色中層法十二辰圓蓋蓋上盤九龍捧之上層法二十四氣亦圓蓋亭中有巨木十圍上下通貫栭櫨橕藉以為本亙之以鐵索蓋為鸑鷟黃金飾之勢若飛翥刻木為瓦夾紵漆之明堂之下施鐵渠以為辟雍之象號萬象神宮因改河南縣為合宮縣詔曰黃軒御曆朝萬方於合宮丹陵握符咨四岳於衢室有虞輯瑞總章之號既存大禹錫珪重屋之名攸建殷人受命置陽館以辨方周室凝圖立明堂以經野用能範圍三極幽贊五神展尊祖之懷申宗祀之典爰從漢魏迨及周隋經始之制雖興修廣之規未備朕以庸昧虔膺厚託受寄於綴衣之夕荷顧於仍几之前伏以高宗往年已屬意於陽館故京輔之縣預紀明堂之名改元之期先著總章之號朕於乾封之際已奉表上塵雖簡宸心未遑營構今以鼎郊勝壤圭邑奧區處天地之中順陰陽之序舟車是湊貢賦攸均爰藉子來之功式遵奉先之旨夫明堂者天子宗祀之堂朝諸侯之位也開乾坤之奧策法氣象之運行故能使災害不生禍亂不作眷言盛烈豈不美歟比者鴻儒禮官所執各異咸以為明堂者置之三里之外七里之內在國陽明之地今既俯邇宮掖恐黷靈祇誠乃布政之居未為宗祀之所朕乃為丙巳之地去宮室遙遠每月所居因時饗祭常備文物動有煩勞在於朕懷殊非所謂今故裁基紫掖闢宇彤闈經始肇興成之匪日但敬事天地神明之德乃彰尊祀祖宗嚴恭之志方展若使惟云布政負扆臨人則茅宇土階取適而已豈必勞百姓之力制九筵而御哉誠以獲執蘋蘩虔奉宗廟故也時既沿革莫或相遵自我作古用適於事今以上堂為嚴配之所下堂為布政之居光敷禮訓式展誠敬來年正月一日可於明堂宗祀三聖以配上帝宜令禮官博士學士內外明禮者詳定儀禮務從典要速以奏聞永昌元年正月元日始親享明堂大赦改元其月四日御明堂布政頒九條以訓于百官文多不載翌日又御明堂饗羣臣賜縑纁有差自明堂成後縱東都婦人及諸州父老入觀兼賜酒食久之乃止吐蕃及諸夷以明堂成亦各遣使來賀載初元年冬正月庚辰朔日南至復親饗明堂大赦改元用周正翼日布政于羣后其年二月則天又御明堂大開三教內史邢文偉講孝經命侍臣及僧道士等以次論議日昃乃罷天授二年正月乙酉日南至親祀明堂合祭天地以周文王及武氏先考先妣配百神從祀並於壇位次第布席以祀之於是春官郎中韋叔夏奏曰謹按明堂大享唯祀五帝故月令云是月也大享帝則曲禮所云大享不問卜鄭玄注云謂徧祭五帝於明堂莫適卜是也又按祭法云祖文王而宗武王鄭玄注云祭五帝五神於明堂曰祖宗故孝經云宗祀文王於明堂以配上帝據此諸文明堂正禮唯祀五帝配以祖宗及五帝五官神等自外餘神並不合預伏惟陛下追遠情深崇禋志切於明堂享祀加昊天上帝皇地祇重之以先帝先后配享此乃補前王之闕典弘嚴配之虔誠往以神都郊壇未建乃於明堂之下廣祭衆神蓋義出權時非不刊之禮也謹按禮經其內官中官五岳四瀆諸神並合從祀於二至明堂總奠事乃不經然則宗祀配天之親雜與小神同薦於嚴敬之道理有不安望請每歲元日惟祀天地大神配以帝后其五岳以下請依禮於冬夏二至從祀方丘圜丘庶不煩黷從之時則天又於明堂後造天堂以安佛像高百餘尺始起建構為大風振倒俄又重營其功未畢證聖元年正月丙申夜佛堂災延燒明堂至曙二堂並盡尋時又無雲而雷起自西北則天欲責躬避正殿宰相姚璹曰此實人火非是天災至如成周宣榭卜代逾長漢武建章盛德彌永今明堂是布政之所非宗祀也則天乃御端門觀酺宴下詔令文武九品已上各上封事極言無有所隱左拾遺劉承慶上疏曰臣聞自古帝王皆有美惡休祥所以昭其德災變所以知其咎天道之常理王者之常事然則休祥屢臻不可矜功而自滿災變奄降不可輕忽而靡驚故殷宗以桑穀生朝懷懼而自省妖不勝德遂立中興之功辛紂以雀生大鳥恃福而自盈祥不勝驕終致傾亡之禍故知災變之生將以覺悟明主扶持大業使盛而不衰理須祗畏神心警懼天誡飭身正事業業兢兢則凶往而吉來轉禍而為福昔殷湯禱身而降雨成王省事以反風宋公憂熒惑之災而應三舍之壽高宗懲雊鼎之異而享百年之福此其類也自陛下承天理物至道事神美瑞嘉祥洊臻狎委非臣所能盡述日者變生人火損及神宮驚惕聖心震動黎庶臣謹按左傳曰人火曰火天火曰災人火因人而興故指火體而為稱天火不知何起直以所災言之其名雖殊為害不別又漢書五行志曰火失性則自上而降及濫燄妄起災宗廟燒宮館自上而降所謂天火濫燄妄起所謂人火其來雖異為患實同王者舉措營為必關幽顯幽為天道顯為人事幽顯迹通天人理合今工匠宿藏其火本無放燎之心明堂教化之宮復非延火之所孽煨潛扇倏忽成災雖則因人亦關神理臣愚以為火發既先從麻主後及總章意將所營佛舍恐勞而無益但崇其教即是津梁何假紺宮方存汲引既僻在明堂之後又前逼牲牢之筵兼以厥構崇大功多難畢立像弘法本擬利益黎元傷財役人却且煩勞家國承前大風摧木天誡已顯今者毒燄冥熾人孽復彰聖人動作必假天人之助一興功役二者俱違厥應昭然殆將緣此臣以為明堂是正陽之位至尊所居展禮班常崇化立政玉帛朝會神靈依憑營之可曰大功損之實非輕事既失嚴禋之所復傷孝理之情陛下昨降明制猶申寅畏之旨羣僚理合兢畏震悚勉力司存豈合承恩耽樂安然酺宴又下人感荷聖德覩變憎惶神體克寧豈非深悅但以火氣初止尚多驚懼餘憂未息遽以歡事遏之臣恐憂喜相爭傷於情理故傳曰可憂而為樂取憂之道又古者有火祭四墉四墉積陰之氣祈之以禳火災火陽之氣歡樂陽事火氣方勝不可復興陽事臣聞災變之興至聖不免聿修其德來患可禳陛下垂制博訪許陳至理而左史張鼎以為今既火流王屋彌顯大周之祥通事舍人逢敏奏稱當彌勒初成佛道時有天魔燒宮七寶臺須臾散壞斯實諂妄之邪言實非君臣之正論晻昧王化無益萬機夫天道雖高其察彌近神心雖寂其聽彌聰交際皇王事均影響今大風烈火譴告相仍實天人丁寧匡諭聖主使鴻基益固天祿永終之意也伏願陛下乾乾在慮翼翼為懷若涉巨川如承大祭審其致災之理詳其降眚之由無瞢天人之心而興不急之役則兆人蒙賴福祿靡窮幸甚幸甚則天尋令依舊規制重造明堂凡高二百九十四尺東西南北廣三百尺上施寶鳳俄以火珠代之明堂之下圜遶施鐵渠以為辟雍之象天冊萬歲二年三月重造明堂成號為通天宮四月朔日又行親享之禮大赦改元為萬歲通天翼日則天御通天宮之端扆殿命有司讀時令布政于羣后其年鑄銅為九州鼎既成置於明堂之庭各依方位列焉神都鼎高一丈八尺受一千八百石冀州鼎名武興雍州鼎名長安兗州名日觀青州名少陽徐州名東原揚州名江都荊州名江陵梁州名成都其八州鼎高一丈四尺各受一千二百石司農卿宗晉卿為九鼎使都用銅五十六萬七百一十二斤鼎上圖寫本州山川物產之像仍令工書人著作郎賈膺福殿中丞薛昌容鳳閣主事李元振司農錄事鍾紹京等分題之左尚方署令曹元廓圖畫之鼎成自玄武門外曳入令宰相諸王率南北衙宿衞兵十餘萬人幷仗內大牛白象共曳之則天自為曳鼎歌令相唱和其時又造大儀鐘斂天下三品金竟不成九鼎初成欲以黃金千兩塗之納言姚璹曰鼎者神器貴於質朴無假別為浮飾臣觀其狀光有五彩輝煥錯雜其間豈待金色為之炫燿乃止其年九月又大享於通天宮以契丹破滅九鼎初成大赦改元為神功聖曆元年正月又親享及受朝賀尋制每月一日於明堂行告朔之禮司禮博士辟閭仁諝奏議曰謹按經史正文無天子每月告朔之事惟禮記玉藻云天子聽朔於南門之外周禮天官太宰正月之吉布政于邦國都鄙干寶注云周正建子之月告朔日也此即玉藻之聽朔矣今每歲首元日於通天宮受朝讀時令布政事京官九品以上諸州朝集使等咸列於庭此則聽朔之禮畢而合于周禮玉藻之文矣而鄭玄注玉藻聽朔以秦制月令有五帝五官之事遂云凡聽朔必特牲告其時帝及其神配以文王武王此鄭注之誤也故漢魏至今莫之用按月令云其帝太昊其神勾芒者謂宣布時令告示下人其令詞云其帝其神耳所以為敬授之文欲使人奉其時而務其業每月有令故謂之月令非謂天子月朔日以祖配帝而祭告之其每月告朔者諸侯之禮也故春秋左氏傳曰公既視朔遂登觀臺又鄭注論語云禮人君每月告朔於廟有祭謂之朝享魯自文公始不視朔是諸侯之禮明矣今王者行之非所聞也按鄭所謂告其帝者即太昊等五人帝其神者即重黎等五行官雖並功施於人列在祀典無天子每月拜祭告朔之文臣等謹檢禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令並無天子每月告朔之事若以為代無明堂故無告朔之禮則江都集禮貞觀禮顯慶禮及祠令著祀五方上帝於明堂即孝經宗祀文王於明堂也此則無明堂而著其享祭何為告朔獨闕其文若以君有明堂即合告朔則周秦有明堂而經典正文無天子每月告朔之事臣等歷觀今古博考載籍既無其禮不可習非望請停每月一日告朔之祭以正國經竊以天子之尊而用諸侯之禮非所謂頒告朔令諸侯使奉而行之之義也鳳閣侍郎王方慶又奏議曰謹按明堂天子布政之宮也蓋所以順天氣統萬物動法於兩儀德被於四海者也夏曰世室殷曰重屋姬曰明堂此三代之名也明堂天子太廟所以宗祀其祖以配上帝東曰青陽南曰明堂西曰總章北曰玄堂中曰太室雖有五名而以明堂為主漢代達學通儒咸以明堂太廟為一漢左中郎將蔡邕立議亦以為然取其宗祀則謂之清廟取其正室則謂之太室取其向陽則謂之明堂取其建學則謂之太學取其圜水則謂之辟雍異名而同事古之制也天子以孟春正月上辛日於南郊總受十二月之政還藏於祖廟月取一政班於明堂諸侯孟春之月朝於天子受十二月之政藏於祖廟月取一政而行之蓋所以和陰陽順天道也如此則禍亂不作災害不生矣故仲尼美而稱之曰明王之以孝理天下也人君以其禮告廟則謂之告朔聽視此月之政則謂之視朔亦曰聽朔雖有三名其實一也今禮官議稱經史正文無天子每月告朔之事者臣謹按春秋文公六年閏十月不告朔穀梁傳曰閏附月之餘日天子不以告朔左氏傳云閏月不告朔非禮也閏以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣寧有他月而廢其禮者乎博考經籍其文甚著何以明之周禮太史職云頒告朔於邦國閏月告王居門終月又禮記玉藻云閏月則闔門左扉立于其中並是天子閏月而行告朔之事也禮官又稱玉藻天子聽朔於南門之外周禮天官太宰正月之吉布政于邦國都鄙干寶注云周正建子之月告朔日也此即玉藻之聽朔矣今每歲首元日通天宮受朝讀時令布政事京官九品以上諸州朝集使等咸列於庭此聽朔之禮畢而合于周禮玉藻之文矣禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令無王者告朔之事者臣謹按玉藻云玄冕而朝日於東門之外聽朔於南門之外鄭注云朝日春分之時也東門南門皆謂國門也明堂在國之陽每月就其時之堂而聽朔焉卒事反宿於路寢凡聽朔必以特牲告其時帝及其神配以文王武王臣謂今歲首元日通天宮受朝讀時令及布政自是古禮孟春上辛受十二月之政藏於祖廟之禮耳而月取一政班於明堂其義昭然猶未行也即如禮官所言遂闕其事臣又按禮記月令天子每月居青陽明堂總章玄堂即是每月告朔之事先儒舊說天子行事一年十八度入明堂大享不問卜一入也每月告朔十二入也四時迎氣四入也巡狩之年一入也今禮官立議王惟歲首一入耳與先儒既異臣不敢同鄭玄云凡聽朔告其帝臣愚以為告朔之日則五方上帝之一帝也春則靈威仰夏則赤熛怒秋則白招拒冬則叶光紀季月則含樞紐也並以始祖而配之焉人帝及神列在祀典亦於其月而享祭之魯自文公始不視朔子貢見其禮廢欲去其羊孔子以羊存猶可識其禮羊亡其禮遂廢故云爾愛其羊我愛其禮漢承秦滅學庶事草創明堂辟雍其制遂闕漢武帝封禪始造明堂於太山既不立於京師所以無告朔之事至漢平帝元始中王莽輔政庶幾復古乃建明堂辟雍焉帝祫祭於明堂諸侯王列侯宗室子弟九百餘人助祭畢皆益戶賜爵及金帛增秩補吏各有差漢末喪亂尚傳其禮爰至後漢祀典仍存明帝永平二年郊祀五帝於明堂以光武配祭牲各一犢奏樂如南郊董卓西移載籍湮滅告朔之禮於此而墜暨于晉末戎馬生郊禮樂衣冠掃地總盡元帝過江是稱狼狽禮樂制度南遷蓋寡彝典殘缺無復舊章軍國所資臨事議之既闕明堂寧論告朔宋朝何承天纂集其文以為禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃摭前儒因循故事而已隋大業中煬帝命學士撰江都集禮只抄撮禮論更無異文貞觀顯慶禮及祠令不言告朔者蓋為歷代不傳其文遂闕各有由緒不足依據今禮官引為明證在臣誠實有疑陛下肇建明堂聿遵古典告朔之禮猶闕舊章欽若稽古應須補葺若每月聽政於明堂事亦煩數孟月視朔恐不可廢上又命奉常廣集衆儒取方慶仁諝所奏議定得失當時大儒成均博士吳揚吾太學博士郭山惲曰臣等謹按周禮禮記及三傳皆有天子告朔之禮夫天子頒告朔於諸侯秦政焚滅詩書由是告朔禮廢今明堂肇建總章新立紹百王之絕軌樹萬代之鴻規上以嚴配祖宗下以敬授人時使人知禮樂道適中和災害不生禍亂不作今若因循頒朔每月依行禮貴隨時事須沿革望依王方慶議用四時孟月日及季夏於明堂修復告朔之禮以頒天下其帝及神亦請依方慶用鄭玄義告五時帝於明堂上則嚴配之道通於神明至孝之德光於四海制從之長安四年始制元日明堂受朝停讀時令中宗即位神龍元年九月親享明堂合祭天地以高宗配禮畢曲赦京師明年駕入京於季秋大享復就圜丘行事迄于睿宗之世開元二年八月太子賓客薛謙光獻九鼎銘其蔡州鼎銘天后御撰曰羲農首出軒昊膺期唐虞繼踵湯禹乘時天地光宅域中雍熙上天降鑒方建隆基紫微令姚崇奏曰聖人啟運休兆必彰請宣付史館從之五年正月幸東都將行大享之禮太常少卿王仁忠博士馮宗陳貞節等議以武氏所造明堂有乖典制奏議曰明堂之建其所從來遠矣自天垂象聖人則之蒿柱茅簷之規上圓下方之制考之大數不踰三七之間定之方中必居丙巳之地者豈非得房心布政之所當太微上帝之宮乎故仰叶俯從正名定位人神不雜各司其序則嘉應響至保合太和昔漢氏承秦經籍道息旁求湮墜詳究難明孝武初議立明堂於長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立於城南議其制度莫之能決至孝平元始四年始創造於南郊以申嚴配光武中元元年立於國城之南自魏晉迄於梁朝雖規制或殊而所居之地常取丙巳者斯蓋百王不易之道也高宗天皇大帝纂承平之運崇朴素之風四夷來賓九有咸乂永徽三年詔禮官學士議明堂制度羣儒紛競各執異端久之不決因而遂止者何也非謂財不足力不堪也將以周孔既遙禮經且紊事不師古或爽天心難用作程神不孚祐者也則天太后總禁闈之政藉軒臺之威屬皇室中圮之期躡和熹從權之制以為乾元大殿承慶小寢當正陽亭午之地實先聖聽斷之宮表順端闈儲精營室爰從朝享未始臨御乃起工徒挽令摧覆既毀之後雷聲隱然衆庶聞之或以為神靈感動之象也於是增土木之麗因府庫之饒南街北闕建天樞大儀之制乾元遺趾興重閣層樓之業煙焰蔽日梁柱排雲人斯告勞天實貽誡煨燼甫爾遽加修復況乎地殊丙巳未答靈心跡匪膺期乃申嚴配事昧彝典神不昭格此其不可者一也又明堂之制木不鏤土不文今體式乖宜違經紊禮雕鐫所及窮侈極麗此其不可者二也高明爽塏事資虔敬密邇宮掖何以祈天人神雜擾不可放物此其不可者三也況兩京上都萬方取則而天子闕當陽之位聽政居便殿之中職司其憂豈容沉默當須審考歷之計擇煩省之宜不便者量事改修可因者隨宜適用削彼明堂之號克復乾元之名則當宁無偏人識其舊矣詔令所司詳議奏聞刑部尚書王志愔等奏議咸以此堂所置實乖典制多請改削依舊造乾元殿乃下詔曰古之操皇綱執大象者何嘗不上稽天道下順人極或變通以隨時爰損益以成務且衢室創制度堂以筵用之以禮神是光孝享用之以布政蓋稱視朔先王所以厚人倫感天地者也少陽有位上帝斯歆此則神貴於不黷禮殷於至敬今之明堂俯鄰宮掖此之嚴祀有異肅恭苟非憲章將何軌物由是禮官博士公卿大夫廣參羣議欽若前古宜存露寢之式用罷辟雍之號可改為乾元殿每臨御宜依正殿禮自是駕在東都常以元日冬至於乾元殿受朝賀季秋大享祀依舊於圓丘行事十年復題乾元殿為明堂而不行享祀之禮二十五年駕在西京詔將作大匠康素往東都毀之素以毀拆勞人乃奏請且拆上層卑於舊制九十五尺又去柱心木平座上置八角樓樓上有八龍騰身捧火珠又小於舊制周圍五尺覆以真瓦取其永逸依舊為乾元殿
