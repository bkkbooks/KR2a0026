body:
  text: 舊唐書卷九十一列傳第四十一桓彥範敬暉崔玄暐張柬之袁恕己桓彥範潤州曲阿人也祖法嗣雍王府咨議參軍弘文館學士彥範慷慨俊爽少以門蔭調補右翊衛聖曆初纍除司衛寺主簿納言狄仁傑特相禮異嘗謂曰足下才識如是必能自致遠大尋擢授監察御史長安三年歷遷御史中丞四年轉司刑少卿時司僕卿張昌宗坐遣術人李弘泰占己有天分御史中丞宋璟請收付制獄窮理其罪則天不許彥範上疏曰昌宗無德無才謬承恩寵自宜粉骨碎肌以答殊造豈得苞藏禍心有此占相陛下以簪履恩久不忍先刑昌宗以逆亂罪多自招其咎此是皇天降怒非唯陛下故誅違天不祥乞陛下裁擇原其本奏以防事敗事敗即言奏訖不敗則候時為逆此乃姦臣詭計疑惑聖心今果遂其所謀陛下何忍不察若昌宗措此占相奏後不合更與弘泰往還尚令修福復擬禳厄此則期於必遂元無悔心縱雖奏聞情實難恕此而可捨誰其可刑況經兩度事彰天恩並垂捨宥昌宗自為得計人亦以為應運即不勞兵甲天下皆從萬方譏之以為陛下縱成其亂也君在臣圖天分是為逆臣不誅社稷亡矣伏請付鸞臺鳳閣三司考竟其罪疏奏不報時又內史李嶠等奏稱往屬革命之時人多逆節鞫訊決斷刑獄至嚴刻薄之吏恣行酷法其周興丘績來俊臣所劾破家者並請雪免彥範又奏請自文明元年以後得罪人除揚豫博三州及諸謀逆魁首一切赦之表疏前後十奏辭旨激切至是方見允納彥範凡所奏議若逢人主詰責則辭色無懼爭之愈厲又嘗謂所親曰今既躬為大理人命所懸必不能順旨詭辭以求苟免是歲冬則天不豫張易之與弟昌宗入閣侍疾潛圖逆亂鳳閣侍郎張柬之與桓彥範及中臺右丞敬暉等建策將誅之柬之遽引彥範及暉並為左右羽林將軍委以禁兵共圖其事時皇太子每於北門起居彥範與暉因得謁見密陳其計太子從之神龍元年正月彥範與敬暉及左羽林將軍李湛李多祚右羽林將軍楊元琰左威衛將軍薛思行等率左右羽林兵及千騎五百餘人討易之昌宗於宮中令李湛李多祚就東宮迎皇太子兵至玄武門彥範等奉太子斬關而入兵士大譟時則天在迎仙宮之集仙殿斬易之昌宗於廊下並就第斬其兄汴州刺史昌期司禮少卿同休並梟首於天津橋南士庶見者莫不歡叫相賀或臠割其肉一夕都盡明日太子即位彥範以功加銀青光祿大夫拜納言賜勳上柱國封譙郡公賜實封五百戶又改為侍中從新令也彥範嘗表論時政數條其大略曰昔孔子論詩以關雎為始言后妃者人倫之本理亂之端也故皇英降而虞道興任姒歸而姬宗盛桀奔南巢禍階妹喜魯桓滅國惑以齊媛伏見陛下每臨朝聽政皇后必施帷幔坐於殿上預聞政事臣愚歷選列辟詳求往代帝王有與婦人謀及政者莫不破國亡身傾輈繼路且以陰乘陽違天也以婦凌夫違人也違天不祥違人不義由是古人譬以牝雞之晨惟家之索易曰無攸遂在中饋言婦人不得預於國政也伏願陛下覽古人之言察古人之意上以社稷為重下以蒼生在念宜令皇后無往正殿干預外朝專在中宮聿修陰教則坤儀式固鼎命惟永又曰臣聞京師喧喧道路籍籍皆云胡僧慧範矯託佛教詭惑后妃故得出入禁闈撓亂時政陛下又輕騎微行數幸其室上下媟黷有虧尊嚴臣抑嘗聞興化致理必由進善康國寧人莫大棄惡故孔子曰執左道以亂政者殺假鬼神以危人者殺今慧範之罪不殊於此也若不急誅必生變亂除惡務本去邪勿疑實願天聰早加裁貶疏奏不納時有墨敕授方術人鄭普思祕書監葉淨能國子祭酒彥範苦言其不可帝曰既要用之無容便止彥範又對曰陛下自龍飛寶位遽下制云軍國政化皆依貞觀故事昔貞觀中嘗以魏徵虞世南顏師古為祕書監孔穎達為國子祭酒至如普思等是方伎庸流豈足以比蹤前烈臣恐物議謂陛下官不擇才濫以天秩加於私愛惟陛下少加慎擇帝竟不納時韋皇后既干朝政德靜郡王武三思又居中用事以則天為彥範等所廢常深憤怨又慮彥範等漸除武氏乃先事圖之皇后韋氏既雅為帝所信寵言無不從三思又私通於韋氏乃日夕讒毀彥範等帝竟用三思計進封彥範為扶陽郡王敬暉為平陽郡王張柬之為漢陽郡王崔玄暐為博陵郡王袁恕己為南陽郡王並加特進令罷知政事彥範仍賜姓韋氏令與皇后同屬籍仍賜雜綵錦繡金銀鞍馬等雖外示優崇而實奪其權也易州刺史趙履溫者即彥範之妻兄也彥範誅易之後奏言先與履溫共謀其事於是召拜司農少卿履溫德之乃以二婢遺彥範及彥範罷知政事履溫又脅奪其婢大為時論所譏尋出為洺州刺史轉濠州刺史二年光祿卿駙馬都尉王同皎以武三思與韋氏姦通潛謀誅之事泄為三思誣構言同皎將廢皇后韋氏彥範等通知其情乃貶彥範為瀧州司馬敬暉崖州司馬袁恕己竇州司馬崔玄暐白州司馬張柬之新州司馬並仍令長任勳封並削彥範仍復其本姓桓氏是歲秋武三思又陰令人疏皇后穢行榜於天津橋請加廢黜中宗聞之怒命御史大夫李承嘉推求其人承嘉希三思旨奏言彥範與敬暉張柬之袁恕己崔玄暐等教人密為此榜雖託廢后為名實有危君之計請加族滅制依承嘉所奏大理丞李朝隱執奏云敬暉等既未經鞫問不可即肆誅夷請差御史按罪待至準法處分大理卿裴談奏云敬暉等祇合據敕斷罪不可別俟推鞫請並處斬籍沒中宗納其議仍以彥範等五人嘗賜鐵券許以不死乃長流彥範於瀼州敬暉於崖州張柬之於瀧州袁恕己於環州崔玄暐於古州並終身禁錮子弟年十六已上者亦配流嶺外擢授承嘉金紫光祿大夫進封襄武郡公韋氏又特賜承嘉綵物五百段瑞錦被一張擢拜裴談為刑部尚書左貶李朝隱為聞喜令三思俄又諷節愍太子抗表請夷彥範等三族中宗以既有前命不依其請三思猶慮彥範等重被進用又納中書舍人崔湜之計特令湜姨兄嘉州司馬周利貞攝右臺侍御史就嶺外並矯制殺之彥範赴流所行至貴州利貞遇之於途乃令左右執縛曳於竹槎之上肉盡至骨然後杖殺時年五十四睿宗即位延和元年並追復其官爵仍特還其子孫實封二百戶玄宗即位開元六年詔曰皇輿肇建必有輔佐之臣天步多艱爰仗經綸之業故侍中譙國公桓彥範侍中平陽郡公敬暉中書令兼吏部尚書漢陽郡公張柬之特進博陵郡公崔玄暐中書令南陽郡公袁恕己等並德惟神降材與運生道協台嶽名書讖緯寅亮帝載勤勞王家參復禹之元謀奉升唐之景命雖殂謝既久而勳烈益彰撫彝鼎以念功想旗常而增感緬遵故實用表徽懿俾列在清廟登于明堂克申從祀之儀式茂疇庸之典並可配享中宗孝和皇帝廟庭其子弟咸加收擢建中元年重贈司徒敬暉絳州太平人也弱冠舉明經聖曆初纍除衛州刺史時河北新有突厥之寇方秋而修城不輟暉下車謂曰金湯非粟而不守豈有棄收穫而繕城郭哉悉令罷散由是人吏咸歌詠之再遷夏官侍郎出為泰州刺史大足元年遷洛州長史天后幸長安令暉知副留守事在職以清幹著聞璽書勞勉賜物百段長安三年拜中臺右丞加銀青光祿大夫神龍元年轉右羽林將軍以誅張易之昌宗功加金紫光祿大夫擢拜侍中賜爵平陽郡公食實封五百戶尋進封齊國公天后崩遺制加實封通前滿七百戶暉等以唐室中興武氏諸王咸宜降爵上章論奏於是諸武降為公武三思益怒乃諷帝陽尊暉等為郡王罷知政事仍賜鐵券恕十死朔望趨朝初暉與彥範等誅張易之兄弟也洛州長史薛季昶謂暉曰二凶雖除産祿猶在請因兵勢誅武三思之屬匡正王室以安天下暉與張柬之屢陳不可乃止季昶歎曰吾不知死所矣翌日三思因韋后之助潛入宮中內行相事反易國政為天下所患時議以此歸咎於暉暉等既失政柄受制於三思暉每推牀嗟惋或彈指出血柬之歎曰主上疇昔為英王時素稱勇烈吾留諸武冀自誅鋤耳今事勢已去知復何道三思既深憤惋以許州司功參軍鄭愔素被暉等廢黜因令上表陳其罪狀中宗詔曰則天大聖皇后往以憂勞不豫凶豎弄權暉等因興甲兵剗除妖孽朕録其勞效備極寵勞自謂勳高一時遂欲權傾四海擅作威福輕侮國章悖道棄義莫斯之甚然收其薄效猶為隱忍錫其郡王之重優以特進之榮不謂溪壑之志殊難盈滿既失大權多懷怨望乃與王同皎窺覘內禁潛相謀結更欲權兵絳闕圖廢椒宮險迹醜辭驚視駭聽屬以帝圖伊始務靜狴牢所以久為含容未能暴諸遐邇自同皎伏法釁迹彌彰倘若無其發明何以懲茲悖亂迹其巨逆合置嚴誅緣其昔立微功所以特從寬宥咸宜貶降出佐遐藩暉可崖州司馬柬之可新州司馬恕己可竇州司馬玄暐可白州司馬並員外置暉到崖州竟為周利貞所殺睿宗即位追復五王官爵贈暉秦州都督諡曰肅愍建中初重贈太尉曾孫元膺開成三年自試太子通事舍人為河南縣丞崔玄暐博陵安平人也父行謹為胡蘇令本名以字下體有則天祖諱乃改為玄暐少有學行深為叔父祕書監行功所器重龍朔中舉明經纍補庫部員外郎其母盧氏嘗誡之曰吾見姨兄屯田郎中辛玄馭云兒子從宦者有人來云貧乏不能存此是好消息若聞資貨充足衣馬輕肥此惡消息吾常重此言以為確論比見親表中仕宦者多將錢物上其父母父母但知喜悅竟不問此物從何而來必是祿俸餘資誠亦善事如其非理所得此與盜賊何別縱無大咎獨不內愧於心孟母不受魚鮓之饋蓋為此也汝今坐食祿俸榮幸已多若其不能忠清何以戴天履地孔子云雖日殺三牲之養猶為不孝又曰父母惟其疾之憂特宜修身潔己勿纍吾此意也玄暐遵奉母氏教誡以清謹見稱尋授天官郎中遷鳳閣舍人長安元年超拜天官侍郎每介然自守都絶請謁頗為執政者所忌轉文昌左丞經月餘則天謂曰自卿改職以來選司大有罪過或聞令史乃設齋自慶此欲盛為貪惡耳今要卿復舊任又除天官侍郎賜雜綵七十段三年拜鸞臺侍郎同鳳閣鸞臺平章事兼太子左庶子四年遷鳳閣侍郎加銀青光祿大夫仍依舊知政事先是來俊臣周興等誣陷良善冀圖爵賞因緣籍沒者數百家玄暐固陳其枉狀則天乃感悟咸從雪免則天季年宋璟劾奏張昌宗謀為不軌玄暐亦屢有讜言則天乃令法司正斷其罪玄暐弟升時為司刑少卿又請置以大辟其兄弟守正如此是時則天不豫宰相不得召見者纍月及疾少間玄暐奏言皇太子相王仁明孝友足可親侍湯藥宮禁事重伏願不令異姓出入則天曰深領卿厚意尋以預誅張易之功擢拜中書令封博陵郡公中宗將授方術人鄭普思為祕書監玄暐切諫竟不納尋進爵為王賜實封四百戶檢校益州大都督府長史兼知都督事其後纍被貶授白州司馬在道病卒建中初贈太子太師玄暐與弟升甚相友愛諸子弟孤貧者多躬自撫養教授頗為當時所稱升官至尚書左丞玄暐少時頗屬詩賦晚年以為非己所長乃不復構思唯篤志經籍述作為事所撰行己要範十卷友義傳十卷義士傳十五卷訓注文館辭林策二十卷並行於代子璩頗以文學知名官歷中書舍人禮部侍郎璩子渙自有傳曾孫郢開成三年自商州防禦判官兼殿中侍御史入為監察御史張柬之字孟將襄州襄陽人也少補太學生涉獵經史尤好三禮國子祭酒令狐德棻甚重之進士擢第纍補青城丞永昌元年以賢良徵試同時策者千餘人柬之獨為當時第一擢拜監察御史聖曆初纍遷鳳閣舍人時弘文館直學士王元感著論云三年之喪合三十六月柬之著論駁之曰三年之喪二十五月不刊之典也謹案春秋魯僖公三十三年十二月乙巳公薨文公二年冬公子遂如齊納幣左傳曰禮也杜預注云僖公喪終此年十一月納幣在十二月士婚禮納采納徵皆有玄纁束帛諸侯則謂之納幣蓋公為太子已行婚禮故傳稱禮也公羊傳曰納幣不書此何以書譏喪娶在三年之外何以譏三年之內不圖婚何休注云僖公以十二月薨至此冬未滿二十五月納采問名納吉皆在三年之內故譏何休以公十二月薨至此冬十二月才二十四月非二十五月是未三年而圖婚也按經書十二月乙巳公薨杜預以長曆推乙巳是十一月十二日非十二月書十二月是經誤文公元年四月葬我君僖公傳曰緩也諸侯五月而葬若是十二月薨即是五月不得言緩明知是十一月薨故注僖公喪終此年至十二月而滿二十五月故丘明傳曰禮也據此推步杜之考校豈公羊之所能逮況丘明親受經於仲尼乎且二傳何杜所爭唯爭一月不爭一年其二十五月除喪由來無別此則春秋三年之喪二十五月之明驗也尚書伊訓云成湯既沒太甲元年惟元祀十有二月伊尹祀于先王奉嗣王祗見厥祖孔安國注云湯以元年十一月崩據此則二年十一月小祥三年十一月大祥故太甲中篇云惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳是十一月大祥訖十二月朔日加王冕服吉而歸亳也是孔言湯元年十一月之明驗顧命云四月哉生魄王不懌是四月十六日也翌日乙丑王崩是十七日也丁卯命作册度是十九日也越七日癸酉伯相命士須材是四月二十五日也則成王崩至康王麻冕黼裳中間有十日康王方始見廟則知湯崩在十一月淹停至殮訖方始十二月祗見其祖顧命見廟訖諸侯出廟門俟伊訓言祗見厥祖侯甸羣后咸在則崩及見廟殷周之禮並同此周因於殷禮損益可知也不得元年以前別有一年此尚書三年之喪二十五月之明驗也禮記三年問云三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節又喪服四制云變而從宜故大祥鼓素琴告人以終又間傳云期而小祥食菜果又期而大祥有醯醬中月而禫食酒肉又喪服小記云再期之喪三年也期之喪二年也九月七月之喪三時也五月之喪二時也三月之喪一時也此禮記三年之喪二十五月之明驗也儀禮士虞禮云期而小祥又期而大祥中月而禫是月也吉祭此禮周公所制則儀禮三年之喪二十五月之明驗也此四驗者並禮經正文或周公所制或仲尼所述吾子豈得以禮記戴聖所修輒欲排毀漢初高堂生傳禮既未周備宣帝時少傅后蒼因淹中孔壁所得五十六篇著曲臺記以授弟子戴德戴聖慶溥三人合以正經及孫卿所述並相符會列于學官年代已久今無端構造異論既無依據深可歎息其二十五月先儒考校唯鄭康成注儀禮中月而禫以中月間一月自死至禫凡二十七月又解禫云言淡淡然平安之意也今皆二十七月復常從鄭議也踰月入禫禫既復常則二十五月為免喪矣二十五月二十七月其議本同竊以子之於父母喪也有終身之痛創巨者日久痛深者愈遲豈徒歲月而已乎故練而慨然者蓋悲慕之懷未盡而踊劈之情已歇祥而廓然者蓋哀傷之痛已除而孤邈之念更起此皆情之所致豈外飾哉故記曰三年之喪義同過隙先王立其中制以成文理是以祥則縞帶素紕禫則無所不佩今吾子將徇情棄禮實為乖僻夫棄縗麻之服襲錦縠之衣行道之人皆不忍也直為節之以禮無可奈何故由也不能過制為姊服鯉也不能過期哭其母夫豈不懷懼名教逼己也若孔鄭何杜之徒並命代挺生範模來裔宮牆積仞未易可窺但鑽仰不休當漸入勝境詎勞終年矻矻虛肆莠言請所有掎擲先儒願且以時消息時人以柬之所駁頗合於禮典是歲突厥默啜表言有女請和親則天盛意許之欲令淮陽郡王延秀娶之柬之奏曰自古無天子求娶夷狄女以配中國王者表入頗忤其旨神功初出為合州刺史尋轉蜀州刺史舊例每歲差兵募五百人往姚州鎮守路越山險死者甚多柬之表論其弊曰臣竊按姚州者古哀牢之舊國絶域荒外山高水深自生人以來洎於後漢不與中國交通前漢唐蒙開夜郎滇筰而哀牢不附至光武季年始請內屬漢置永昌郡以統理之乃收其鹽布罽之稅以利中土其國西通大秦南通交趾奇珍異寶進貢歲時不闕劉備據有巴蜀常以甲兵不充及備死諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯岐選其徑卒搜兵以增武備故蜀志稱自亮南征之後國以富饒甲兵充足由此言之則前代置郡其利頗深今鹽布之稅不供珍奇之貢不入戈戟之用不實於戎行寶貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之昔漢以得利既多歷博南山涉蘭倉水更置博南哀牢二縣蜀人愁怨行者作歌曰歷博南越蘭津渡蘭倉為他人蓋譏漢貪珍奇鹽布之利而為蠻夷之所驅役也漢獲其利人且怨歌今減耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母幼子哀號望祭於千里之外於國家無絲髮之利在百姓受終身之酷臣竊為國家痛之往者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎮守人問其故亮言置官留兵有三不易大意以置官夷漢雜居猜嫌必起留兵運糧為患更重忽若反叛勞費更多但粗設紀綱自然安定臣竊以亮之此策妙得羈縻蠻夷之術今姚府所置之官既無安邊靜寇之心又無葛亮且縱且擒之伎唯知詭謀狡算恣情割剝貪叨劫掠積以為常扇動酋渠遣成朋黨折支諂笑取媚蠻夷拜跪趨伏無復慚恥提挈子弟嘯引凶愚聚會蒱博一擲纍萬劍南逋逃中原亡命有二千餘戶見散在彼州專以掠奪為業姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文協並為羣蠻所殺前朝遣郎將趙武貴討擊貴及蜀兵應時破敗噍類無遺又使將軍李義總等往征郎將劉惠基在陳戰死其州乃廢臣竊以諸葛亮稱置官留兵有三不易其言乃驗至垂拱四年蠻郎將王善寶昆州刺史爨乾福又請置州奏言所有課稅自出姚府管內更不勞擾蜀中及置州後録事參軍李稜為蠻所殺延載中司馬成琛奏請於瀘南置鎮七所遣蜀兵防守自此蜀中騷擾于今不息且姚府總管五十七州巨猾遊客不可勝數國家設官分職本以化俗防姦無恥無厭狼籍至此今不問夷夏負罪並深見道路劫殺不能禁止恐一旦驚擾為禍轉大伏乞省罷姚州使隸嶲府歲時朝覲同之蕃國瀘南諸鎮亦皆悉廢於瀘北置關百姓自非奉使入蕃不許交通往來增嶲府兵選擇清良宰牧以統理之臣愚將為穩便疏奏則天不納後纍拜荊州大都督府長史長安中召為司刑少卿遷秋官侍郎時夏官尚書姚崇為靈武軍使將行則天令舉外司堪為宰相者崇對曰張柬之沉厚有謀能斷大事且其人年老惟陛下急用之則天登時召見尋同鳳閣鸞臺平章事未幾遷鳳閣侍郎仍知政事及誅張易之兄弟柬之首謀其事中宗即位以功擢拜天官尚書鳳閣鸞臺三品封漢陽郡公食實封五百戶未幾遷中書令監修國史月餘進封漢陽郡王加授特進令罷知政事其年秋柬之表請歸襄州養疾許之仍特授襄州刺史又拜其子漪為著作郎令隨父之任上親賦詩祖道又令羣公餞送於定鼎門外柬之至襄州有鄉親舊交抵罪者必深文致法無所縱捨其子漪恃以立功每見諸少長不以禮接時議以為不能易荊楚之剽性焉尋為武三思所構貶授新州司馬柬之至新州憤恚而卒年八十餘景雲元年制曰褒德紀功事華典册飾終追遠理光名教故吏部尚書張柬之翼戴興運謨明帝道經綸謇諤風範猶存往屬回邪構成釁咎無辜放逐淪沒荒遐言念勳賢良深軫悼宜加寵贈式賁幽泉可贈中書令封漢陽郡公建中初又贈司徒玄孫璟開成三年自宜城尉遷壽安尉袁恕己滄州東光人也長安中歷遷司刑少卿兼知相王府司馬事敬暉等將誅張易之兄弟恕己預其謀議又從相王統率南衙兵仗以備非常及事定加銀青光祿大夫行中書侍郎同中書門下三品封南陽郡公食實封五百戶將作少匠楊務廉素以工巧見用中興初恕己恐其更啓遊娛侈靡之端言於中宗曰務廉致位九卿積有歲年苦言嘉謀無足可紀每宮室營構必務其侈若不斥之何以廣昭聖德由是左授務廉陵州刺史恕己俄擢拜中書令仍加特進封南陽郡王罷知政事則天崩遺制加實封滿七百戶後與敬暉等纍遭貶黜流于環州尋為周利貞所逼飲野葛汁數升恕己常服黃金飲毒發憤悶以手掘地取土而食爪甲殆盡竟不死乃擊殺之建中初贈太子太傅曾孫德文舉進士開成三年授祕書省校書郎史臣曰昔夫差入越勾踐保於會稽不聽子胥之言而有甬東之歎此五王除凶返正得計成功當是時彥範敬暉握兵全勢三思攸暨其黨半殲若從季昶之言寧有利貞之禍蓋以心懷不忍遽失後圖黜削流移理固然也且芟蔓而不能拔本建謀而尚欠防微死即無辜禍由自掇失斷召亂也不亦宜哉贊曰嗟彼五王忠于有唐知火在木謂其無傷禍發既克勢摧靡當何事不敏周身之防
