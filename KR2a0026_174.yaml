body:
  text: 舊唐書卷一百七十列傳第一百二十裴度裴度字中立河東聞喜人祖有鄰濮州濮陽令父漵河南府澠池丞度貞元五年進士擢第登宏辭科應制舉賢良方正能直言極諫科對策高等授河陰縣尉遷監察御史密疏論權幸語切忤旨出為河南府功曹遷起居舍人元和六年以司封員外郎知制誥尋轉本司郎中七年魏博節度使田季安卒其子懷諫幼年不任軍政牙軍立小將田興為留後興布心腹於朝廷請守國法除吏輸常賦憲宗遣度使魏州宣諭興承僭侈之後車服垣屋有踰制度視事齋閣尤加宏敞興惡之不於其間視事乃除舊採訪使廳居之請度為壁記述興謙降奉法魏人深德之興又請度遍至屬郡宣述詔旨魏人郊迎感悅使還拜中書舍人九年十月改御史中丞宣徽院五坊小使每歲秋按鷹犬於畿甸所至官吏必厚邀供餉小不如意即恣其須索百姓畏之如寇盜先是貞元末此輩暴橫尤甚乃至張網羅於民家門及井不令出入汲水曰驚我供奉鳥雀又羣聚於賣酒食家肆情飲啖將去留蛇一篋誡之曰吾以此蛇致供奉鳥雀可善飼之無使飢渴主人賂而謝之方肯攜蛇篋而去至元和初雖數治其弊故態未絶小使嘗至下邽縣縣令裴寰性嚴刻嫉其凶暴公館之外一無曲奉小使怒構寰出慢言及上聞憲宗怒促令攝寰下獄欲以大不敬論宰相武元衡等以理開悟帝怒不解度入延英奏事因極言論列言寰無罪上愈怒曰如卿之言寰無罪即決五坊小使如小使無罪即決裴寰度對曰按罪誠如聖旨但以裴寰為令長憂惜陛下百姓如此豈可加罪上怒色遽霽翌日令釋寰尋以度兼刑部侍郎奉使蔡州行營宣諭諸軍既還帝問諸將之才度曰臣觀李光顏見義能勇終有所成不數日光顏奏大破賊軍於時曲帝尤歎度之知人十年六月王承宗李師道俱遣刺客刺宰相武元衡亦令刺度是日度出通化里盜三以劍擊度初斷鞾帶次中背才絶單衣後微傷其首度墮馬會度帶氈帽故創不至深賊又揮刃追度度從人王義乃持賊連呼甚急賊反刃斷義手乃得去度已墮溝中賊謂度已死乃捨去居三日詔以度為門下侍郎同中書門下平章事度徑正而言辨尤長於政體凡所陳諭感動物情自魏博使還宣達稱旨帝深嘉屬又自蔡州勞軍還益聽其言尚以元衡秉政大用未果自盜發都邑便以大計屬之初元衡遇害獻計者或請罷度官以安二鎮之心憲宗大怒曰若罷度官是姦計得行朝綱何以振舉吾用度一人足以破此二賊矣度亦以平賊為己任度以所傷請告二十餘日詔以衛兵宿度私第中使問訊不絶未拜前一日宣旨謂度曰不用宣政參假即延英對來及度入對撫諭周至時羣盜干紀變起都城朝野恐駭及度命相制下人情始安以為必能殄寇自是誅賊之計日聞獻替用軍愈急十一年莊憲皇后崩度為禮儀使上不聽政欲準故事置冢宰以總百司度獻議曰冢宰是殷周六官之首既掌邦理實統百司故王者諒暗百官有權聽之制後代設官既無此號不可虛設且國朝故事或置或否古今異制不必因循敕旨曰諸司公事宜權取中書門下處分識者是之六月蔡州行營唐鄧節度使高霞寓兵敗于鐵城中外恟駭先是詔羣臣各獻誅吳元濟可否之狀朝臣多言罷兵赦罪為便翰林學士錢徽蕭俯語尤切唯度言賊不可赦及霞寓敗宰相以上必厭兵欲以罷兵為對延英方奏憲宗曰夫一勝一負兵家常勢若帝王之兵不合敗則自古何難於用兵纍聖不應留此凶賊今但論此兵合用與否及朝廷制置當否卿等唯須要害處置將帥有不可者去之勿疑兵力有不足者速與應接何可以一將不利便沮成計於是宰臣不得措言朝廷無敢言罷兵者故度計得行王稷家二奴告稷換父遺表隱沒進奉物留其奴於仗內遣中使往東都檢責稷之家財度奏曰王鍔身歿之後其家進奉已多今因其奴告檢責其家事臣恐天下將帥聞之必有以家為計者憲宗即日遣中使還二奴付京兆府決殺十二年李訴李光顏屢奏破賊然國家聚兵淮右四年度支供餉不勝其弊諸將玩寇相視未有成功上亦病之宰相李逢吉王涯等三人以勞師弊賦意欲罷兵見上互陳利害度獨無言帝問之對曰臣請身自督戰明日延英重議逢吉等出獨留度謂之曰卿必能為朕行乎度俯伏流涕曰臣誓不與此賊偕全上亦為之改容度復奏曰臣昨見吳元濟乞降表料此逆賊勢實窘蹙但諸將不一未能迫之故未降耳若臣自赴行營則諸將各欲立功以固恩寵破賊必矣上然之翌日詔曰輔弼之臣軍國是賴興化致理秉鈞以居取威定功則分閫而出所以同君臣之體一中外之任焉屬者問罪汝南致誅淮右蓋欲刷其汙俗弔彼頑人雖挈地求生者實繁有徒而嬰城執迷者未翦其類何獸困而猶鬬豈鳥窮之無歸歟由是遙聽鼓鼙更張琴瑟煩我台席董茲戎旃朝議大夫守中書侍郎同平章事飛騎尉賜紫金魚袋裴度為時降生協朕夢卜精辨宣力堅明納忠當軸而才謀老成運籌而智略有定司其樞務備知四方之事付以兵要必得萬人之心是用禱於上玄揀此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾宜宣布清問恢壯皇猷感勵連營蕩平多壘招懷孤疾字撫夷傷況淮西一軍素效忠節過海赴難史册書勳建中初攻破襄陽擒滅崇義比者脅於凶逆歸命無由每念前勞常思安撫所以內輟輔臣俾為師率實欲保全慰諭各使得宜汝往欽哉無越我丕訓可門下侍郎同中書門下平章事蔡州刺史充彰義軍節度申光蔡觀察等使仍充淮西宣慰招討處置使詔出度以韓弘為淮西行營都統不欲更為招討請祇稱宣慰處置使又以此行既兼招撫請改翦其類為革其志又以弘已為都統請改更張琴瑟為近輟樞衡請改煩我台席為授以成算皆從之仍奏刑部侍郎馬總為宣慰副使太子右庶子韓愈為彰義行軍司馬司勳員外郎李正封都官員外郎馮宿禮部員外郎李宗閔等為兩使判官書記皆從之初德宗朝政多僻朝官或相過從多令金吾伺察密奏宰相不敢於私第見賓客及度輔政以羣賊未誅宜延接奇士共為籌畫乃請於私居接延賓客憲宗許之自是天下賢俊得以效計議於丞相接士於私第由度之請也自討淮西王師屢敗論者以殺傷滋甚轉輸不逮擬議密疏紛紜交進度以腹心之疾不時去之終為大患不然兩河之盜亦將視此為高下遂堅請討伐上深委信故聽之不疑度既受命召對於延英奏曰主憂臣辱義在必死賊滅則朝天有日賊在則歸闕無期上為之惻然流涕十二年八月三日度赴淮西詔以神策軍三百騎衛從上御通化門慰勉之度樓下銜涕而辭賜之犀帶度名雖宣慰其實行元帥事仍以郾城為治所上以李逢吉與度不協乃罷知政事出為劍南東川節度既離京淮西行營大將李光顏烏重胤謂監軍梁守謙曰若俟度至而有功即非我利可疾戰先事立功是月六日將出兵與賊戰於賈店為賊所敗度二十七日至郾城巡撫諸軍宣達上旨士皆賈勇時諸道兵皆有中使監陳進退不由主將戰勝則先使獻捷偶創則凌挫百端度至行營並奏去之兵柄專制之於將衆皆喜悅軍法嚴肅號令畫一以是出戰皆捷度遣使入蔡州元濟與度書曰比密有降款而索日進隔河大呼遂令三軍防元濟故歸首無路十月十一日唐鄧節度使李訴襲破懸瓠城擒吳元濟度先遣宣慰副使馬總入城安撫明日度建彰義軍節領洄曲降卒萬人繼進李訴具櫜鞬以軍禮迎度拜之路左度既視事蔡人大悅舊令途無偶語夜不燃燭人或以酒食相過從者以軍法論度乃約法唯盜賊鬬殺外餘盡除之其往來者不復以晝夜為限於是蔡之遺黎始知有生人之樂初度以蔡卒為牙兵或以為反側之子其心未安不可自去其備度笑而答曰吾受命為彰義軍節度使元惡就擒蔡人即吾人也蔡之父老無不感泣申光之民即時平定十一月二十八日度自蔡州入朝留副使馬總為彰義軍留後初度入蔡州或譖度沒入元濟婦女珍寶聞上頗疑之上欲盡誅元濟舊將封二劍以授梁守謙使往蔡州度回至郾城遇之乃復與守謙入蔡州量罪加刑不盡如詔守謙固以詔止度先以疏陳乃徑赴闕下二月詔加度金紫光祿大夫弘文館大學士賜勳上柱國封晉國公食邑三千戶復知政事憲宗以淮西賊平因功臣李光顏等來朝欲開內宴詔六軍使修麟德殿之東廊軍使張奉國以公費不足出私財以助用訴於執政度從容啓曰陛下營造有將作監等司局豈可使功臣破産營繕上怒奉國泄漏乃令致仕其浚龍首渠起凝暉殿雕飾綺煥徙佛寺花木以植于庭有程虉皇甫鎛者姦纖用事二人領度支鹽鐵數貢羡餘錢助帝營造帝又以虉鎛平蔡時供饋不乏二人並命拜同平章事度延英面論曰程虉皇甫鎛錢穀吏耳非代天理物之器也陛下徇耳目之欲拔置相位天下人騰口掉舌以為不可於陛下無益願徐思其宜帝不省納度三上疏論之請罷己相位上都不省事見鎛傳又賈人張陟負五坊使楊朝汶息利錢潛匿朝汶於陟家得私簿記有負錢人盧載初云是故西川節度使盧坦大夫書迹朝汶即捕坦家人拘之坦男不敢申理即以私錢償之及徵驗書迹乃故鄭滑節度盧羣手書也坦男理其事朝汶曰錢已進過不可復得御史中丞蕭俯及諫官上疏陳其暴橫之狀度與崔羣因延英對極言之憲宗曰且欲與卿商量東軍此小事我自處置度奏曰用兵小事也五坊追捕平人大事也兵事不理祇憂山東五坊使暴橫恐亂輦轂上不悅帝久方省悟召楊朝汶數之曰向者為爾使我羞見宰相遽命誅之初淮蔡既平鎮冀王承宗甚懼度遣辨士遊説客於趙魏間使説承宗令割地入質以效順故承宗求援於田弘正由度使客諷動之故兵不血刃而承宗鼠伏十三年李師道翻覆違命詔宣武義成武寧橫海四節度之師與田弘正會軍討之弘正奏請取黎陽渡河會李光顏等軍齊進帝召宰臣於延英議可否皆曰閫外之事大將制之既有奏陳宜遂其請度獨以為不可奏曰魏博一軍不同諸道過河之後却退不得便須進擊方見成功若取黎陽渡河既才離本界便至滑州徒有供餉之勞又生顧望之勢況弘正光顏並少威斷更相疑惑必恐遷延然兵事不從中制一定處分或慮不可若欲於河南持重則不如河北養威不然則且秣馬厲兵候霜降水落於楊劉渡河直抵鄆州但得至陽穀已來下營則兵勢自盛賊形自撓上曰卿言是矣乃詔弘正取楊劉渡河及弘正軍既濟河而南距鄆州四十里築壘賊勢果蹙頃之誅師道度執性不回忠於事上時政或有所闕靡不極言之故為姦臣皇甫鎛所構憲宗不悅十四年檢校左僕射同中書門下平章事太原尹北都留守河東節度使穆宗即位長慶元年秋張弘靖為幽州軍所囚田弘正於鎮州遇害朱克融王廷湊復亂河朔詔度以本官充鎮州四面行營招討使時驕主荒僻輔相庸才制置非宜致其復亂雖李光顏烏重胤等稱為名將以十數萬兵擊賊無尺寸之功蓋以勢既橫流無能復振然度受命之日搜兵補卒不遑寢息自董西師臨於賊境屠城斬將屢以捷聞穆宗深嘉其忠款中使撫諭無虛月進位檢校司空兼充押北山諸蕃使時翰林學士元稹交結內官求為宰相與知樞密魏弘簡為刎頸之交稹雖與度無憾然頗忌前達加於己上度方用兵山東每處置軍事有所論奏多為稹輩所持天下皆言稹恃寵熒惑上聽度在軍上疏論之曰臣聞主聖臣直今既遇聖主輒為直臣上答殊私下塞羣謗誓除國蠹無以家為苟獻替之可行何性命之足惜伏惟皇帝陛下恭承丕業光啓雄圖方殄頑人之風以立太平之事而逆豎構亂震驚山東姦臣作朋撓敗國政陛下欲掃蕩幽鎮宜肅清朝廷何者為患有大小議事有先後河朔逆賊祇亂山東禁闈姦臣必亂天下是則河朔患小禁闈患大小者臣等與諸戎臣必能翦滅大者非陛下制斷非陛下覺悟無計驅除今文武百僚中外萬品有心者無不憤忿有口者無不咨嗟直以威權方重奬用方深無所畏避不敢抵觸恐事未行禍已及不為國計且為身謀臣比者猶思隱忍不願發明一則以罪惡如山怨謗如雷伏料聖明必自誅殛一則以四方無事萬樞且過雖紀綱潛壞賄賂公行俟其貫盈必自顛覆今屬凶徒擾攘宸衷憂軫凡有制命計於安危痛此姦邪恣行欺罔干亂聖略非止一途又翰苑舊臣結為朋黨陛下聽其所説更訪於近臣私相計會更唱迭和蔽惑聰明所以臣自兵興已來所陳章疏事皆要切所奉書詔多有參差惜陛下委付之意不輕被姦臣抑損之事不少臣素知佞幸亦無讎嫌祇是昨者臣請乘傳詣闕面陳戎事姦臣之徒最所畏懼知臣若到御坐之前必能悉數其過以此百計止臣此行臣又請領兵齊進逐便攻討姦臣之黨曲加阻礙恐臣統率諸道或有成功進退皆受羈牽意見悉遭蔽塞復共一二憸狡同辭合力或兩道招撫逗留旬時或遣蔚州行營拖曳日月但欲令臣失所使臣無成則天下理亂山東勝負悉不顧矣為臣事君一至於此且陛下左右前後忠良至多亦有熟會典章亦有飽諳師旅足得任使何獨斯人以臣愚見若朝中姦臣盡去則河朔逆賊不討而自平若朝中姦臣尚在則逆賊縱平無益臣讀國史知代宗朝蕃戎侵軼直犯都城代宗不知蓋被程元振蒙蔽幾危社稷當時柳伉乃太常一博士耳猶能抗表歸罪為國除害今臣所處兼總將相豈肯坐觀凶邪有噎日月不勝感憤嫉惡之至謹附中使趙奉國以聞倘陛下未信忠言猶惑姦黨伏乞出臣此表令三事大夫與百僚集議彼不受責臣合伏辜天鑒孔明照臣肝血但得天下之人知臣不負陛下則雖死之日猶生之年繼上三章辭情激切穆宗雖不悅然懼大臣正議乃以魏弘簡為弓箭庫使罷元稹內職然寵稹之意未衰俄拜稹平章事尋罷度兵權守司徒同平章事充東都留守諫官相率伏閣詣延英門者日二三帝知其諫不即被召皆上疏言時未偃兵度有將相全才不宜置之散地帝以章疏旁午無如之何知人情在度遂詔度自太原由京師赴洛及元稹為相請上罷兵洗雪廷湊克融解深州之圍蓋欲罷度兵柄故也二年三月度至京師既見先克融廷湊暴亂河朔受命討賊無功次陳除職東都許令入覲辭和氣徑感動左右度伏奏龍墀涕泗嗚咽帝為之動容口自諭之曰所謝知朕於延英待卿初人以度無左右之助為姦邪排擯雖度勳德恐不能感動人主及度奏河北事慷慨激切揚於殿廷在位者無不聳動雖武夫貴介亦有咨嗟出涕者翌日以度守司徒揚州大都督府長史充淮南節度使進階光祿大夫時朱克融王廷湊雖受朝廷節鉞未解深州之圍度初發太原與二鎮書諭以大義克融解圍而去廷湊亦退舍有中使自深州來言之穆宗甚喜即日又遣中使往深州取牛元翼更命度致書與廷湊度沿路奉詔中使得度書云朝謝後即歸留務恐廷湊知度無兵權即背前約請度易之中使乃進度書草具奏其事及度至京師進對明辨帝方憂深州之圍遂授度淮南節度使先是監軍使劉承偕恃寵凌節度使劉悟三軍憤發大譟擒承偕欲殺之已殺其二傔悟救之獲免而囚承偕詔遣歸京悟託以軍情不時奉詔至是宰臣延英奏事度亦在列上顧謂度曰劉悟拘承偕而不遣如何處置度辭以藩臣不合議軍國事上固問之且曰劉悟負我我以僕射寵之近又賜絹五萬匹不思報功翻縱軍衆凌辱監軍我實難奈此事度對曰承偕在昭義不法臣盡知之昨劉悟在行營與臣書數論其事是時有中使趙弘亮在臣軍仍持悟書將去欲自奏不知奏否上曰我都不知悟何不密奏其事我豈不能處置度曰劉悟武臣不知大臣體例雖然臣竊以悟縱有密奏陛下必不能處置今日事狀如此臣等面論陛下猶未能決悟單辭豈能動聖聽哉上曰前事勿論直言此時如何處置度曰陛下必欲收忠義之心使天下戎臣為陛下死節唯有下半紙詔書言任使不明致承偕亂法如此令悟集三軍斬之如此則萬方畢命羣盜破膽天下無事矣苟不能如此雖與劉悟改官賜絹臣亦恐於事無益上俯首良久曰朕不惜承偕緣是太后養子今被囚縶太后未知如卿處置未得可更議其宜度與王播等復奏曰但配流遠惡處承偕必得出上以為然承偕果得歸度方受册司徒徐州奏節度副使王智興自河北行營率師還逐節度使崔羣自稱留後朝廷駭懼即日宣制以度守司徒同平章事復知政事乃以宰相王播代度鎮淮南度與李逢吉素不協度自太原入朝而惡度者以逢吉善於陰計足能構度乃自襄陽召逢吉入朝為兵部尚書度既復知政事而魏弘簡劉承偕之黨在禁中逢吉用族子仲言之謀因醫人鄭注與中尉王守澄交結內官皆為之助五月左神策軍奏告事人李賞稱和王府司馬于方受元稹所使結客欲刺裴度詔左僕射韓臯給事中鄭覃與李逢吉三人鞫于方之獄未竟罷元稹為同州刺史罷度為左僕射李逢吉代度為宰相自是逢吉之黨李仲言張又新李續等內結中官外扇朝士立朋黨以沮度時號八關十六子皆交結相關之人數也而度之醜譽日聞俄出度為山南西道節度使不帶平章事長慶四年襄陽節度使牛元翼卒其家先在鎮州朝廷纍遣中使取之王廷湊遷延不遣至是聞元翼卒乃盡屠其家昭愍皇帝聞之嗟惋纍日因歎宰輔非才致姦臣悖逆如此翰林學士韋處厚上言曰臣聞汲黯在朝淮南不敢謀叛干木處魏諸侯不敢加兵王霸之理皆以一士而止百萬之師以一賢而制千里之難臣伏以裴度勳高中夏聲播外夷廷湊克融皆憚其用吐蕃回鶻悉服其名今若置之巖廊委其參決西夷北虜未測中華河北山東必稟廟算況幽鎮未靜尤資重臣管仲曰人離而聽之則愚合而聽之則聖理亂之本非有他術順人則理違人則亂伏承陛下當食歎息恨無蕭曹今有一裴度尚不留驅使此馮生所以感悟漢文云雖有廉頗李牧不能用也夫御宰相當委之信之親之禮之如於事不效於國無勞則置之散僚黜之遠郡如此則在位者不敢不勵將進者不敢苟求陛下存終始之分但不永棄則君臣之厚也今進皆負四海責望退不失六部尚書不肖者無因而勸臣與李逢吉素無讎嫌臣嘗被裴度因事貶黜今之所陳上答聖明下達羣議披肝感激伏地涕流伏望鑒臣愛君矜臣體國則天下幸甚昭愍愕然省悟見度奏狀不帶平章事謂處厚曰度曾為宰相何無平章事處厚因奏為逢吉所擠度自僕射出鎮興元遂於舊使銜中減落帝曰何至是也翌日下制復兼同平章事然逢吉之黨巧為毀沮恐度復用有陳留人武昭者性果敢而辨舌度之討淮西也昭求進於軍門乃令入蔡州説吳元濟元濟臨之以兵昭氣色自若善待而還度以為可用署之軍職隨度鎮太原奏授石州刺史罷郡除袁王府長史昭既在散位心微悒鬱而有怨逢吉之言而姦邪之黨使衛尉卿劉遵古從人安再榮告事言武昭欲謀害李逢吉獄具而武昭死蓋欲訐度舊事以汙之也然士君子公論皆佑度而罪逢吉天子漸明其端每中使過興元必傳密旨撫諭且有徵還之約寶曆元年十一月度疏請入覲京師明年正月度至帝禮遇隆厚數日宣制復知政事而逢吉黨有左拾遺張權輿者尤出死力度自興元請入朝也權輿上疏曰度名應圖讖宅據岡原不召自來其心可見先是姦黨忌度作謠辭云非衣小兒坦其腹天上有口被驅逐天口言度嘗平吳元濟也又帝城東西橫亙六岡合易象乾卦之數度平樂里第偶當第五岡故權輿取為語辭昭愍雖少年深明其誣謗奬度之意不衰姦邪無能措言時昭愍欲行幸洛陽宰相李逢吉及兩省諫官纍疏論列帝正色曰朕去意已定其從官宮人悉令自備糗糧不勞百姓供饋逢吉頓首言曰東都千里而近宮闕具存以時巡遊固亦常典但以法駕一動事須備儀千乘萬騎不可減省縱不費用絶廣亦須豐儉得宜豈可自備糗糧頓失大體今干戈未甚戢邊鄙未甚寧恐人心動搖伏乞稍回宸慮帝不聽令度支員外郎盧貞往東都已來檢計行宮及洛陽大內朝廷方懷憂恐會度自興元來因延英奏事帝語及巡幸度曰國家營創兩都蓋備巡幸然自艱難已來此事遂絶東都宮闕及六軍營壘百司廨署悉多荒廢陛下必欲行幸亦須稍稍修葺一年半歲後方可議行帝曰羣臣意不及此但云不合去若如卿奏不行亦得何止後期旋又朱克融史憲誠各請以丁匠五千助修東都帝遂停東幸幽州朱克融執留賜春衣使楊文端奏稱衣段疏薄又奏今歲三軍春衣不足擬於度支請給一季春衣約三十萬端匹又請助丁匠五千修東都上憂其不遜問宰臣曰克融所奏如何處分我欲遣一重臣往宣慰便索春衣使可乎度對曰克融家本凶族無故又行凌悖必將滅亡陛下不足為慮譬如一豺虎於山林間自吼自躍但不以為事則自無能為此賊祇敢於巢穴中無禮動即不得今亦不須遣使宣慰亦不要索所留敕使但更緩旬日已來與一詔云聞中官到彼稍失去就待到我當有處分所賜卿春衣有司製造不謹我甚要知之已令科處所請丁匠五千人及兵馬赴東都固是虛語臣料賊中必出不得今欲直挫其姦意即報云卿所請丁匠修宮闕可速遣來已敕魏博等道令所在排比供擬料得此詔必章惶失計若未能如此猶示含容則報云東都宮闕所要修葺事在有司不假卿遣丁匠遠來又所言三軍春衣自是本道常事比來朝廷或有事賜與皆緣徵發須是優恩若尋常則無此例我固不惜三二十萬端匹祇是事體不可獨與范陽卿宜知悉祇如此處分即得陛下更不要介意上從之遂進詔草至皆如度所料不旬日幽州殺克融并其二子時帝童年驕縱倦接羣臣度從容奏曰比者陛下每月約六七度坐朝天下人心無不知陛下躬親庶政乃至河北賊臣遠聞亦皆聳聽自兩月已來入閣開延英稍稀或恐大段公事須稟睿謀者有所擁滯伏冀陛下乘涼數坐以廣延問伏以頤養聖躬在於順適時候若飲食有節寢興有常四體唯和萬壽可保道書云春夏早起取雞鳴時秋冬晏起取日出時蓋在陽則欲及陰涼在陰則欲及溫暖今陛下憂勤庶政親覽萬機每御延英召臣等奏對方屬盛夏宜在清晨如至巳午之間即當炎赫之際雖日昃忘食不憚其勞仰瞻扆旒亦似煩熱臣等已曾陳論切望聽納自後視事稍頻未幾兼領度支屬盜起禁闈宮車晏駕度與中貴人密謀誅劉克明等迎江王立為天子以功加門下侍郎集賢殿大學士太清宮使餘如故以贊導之勳進階特進時滄景節度使李全略死其子同捷竊弄兵柄以求繼襲度請行誅伐踰年而同捷誅因拜疏上陳調兵食非宰相事請歸諸有司詔從之賜實封三百戶度年高多病上疏懇辭機務恩禮彌厚文宗遣御醫診視日令中使撫問四年六月詔曰昔漢以孔光降置几之詔晉以鄭沖申奉册之命雖優隆耆德顯重元臣而議政不及於咨詢用禮止在於安逸朕勤求至理所寶唯賢顧諟舊勞敢不加敬由是委宰制於大政釋參決於繁務時因聽斷誠望弼諧遷秩上公式是殊寵特進守司徒兼門下侍郎同中書門下平章事充集賢殿大學士上柱國晉國公食邑三千戶食實封三百戶裴度稟河嶽之英靈受乾坤之間氣圭璋特達城府洞開外茂九功內苞一德器為社稷之鎮才實邦國之楨故能祗事纍朝宣融景化在憲宗時掃滌區宇爾則有出車殄寇之勳在穆宗時混同文軌爾則有參戎入輔之績在敬宗時阜康兆庶爾則有活國庇人之勤逮弼朕躬總齊方夏爾則有弔伐底寧之力皆不遺廟算布在簡編功利及人不可悉數而朝論益重我心實知方用臯陶之謨適值留侯之疾瀝懇牢讓備列奏章塞詔上言動形顏色果聞勿藥之喜更俟調鼎之功而體力未和音容尚阻不有優崇之命孰彰寵待之恩宜其協贊機衡弘敷教典論道而儀刑卿士宣德而鎮撫華夷嗇養精神保綏福履為國元老毗豫一人可司徒平章軍國重事待疾損日每三日五日一度入中書散官勳封實封如故仍備禮册命度表辭曰伏以公台崇禮典册盛儀庸臣當之實謂忝越況纍承寵命亦為便蕃前後三度已行此禮令臣猶參樞近竊懼無以弼諧重此勞煩有靦面目伏乞天恩且課臣效官責臣實事册命之儀特賜停罷則素餐高位空負恥於中心辨冕輕車免譏誚於衆口優詔從之九月加守司徒兼侍中襄州刺史充山南東道節度觀察臨漢監牧等使度素稱堅正事上不回故纍為姦邪所排幾至顛沛及晚節稍浮沉以避禍初度支鹽鐵使王播廣事進奉以希寵度亦掇拾羡餘以效播士君子少之復引韋厚叔南卓為補闕拾遺俾彌縫結納為自安之計而後進宰相李宗閔牛僧孺等不悅其所為故因度謝病罷相位復出為襄陽節度初元和十四年於襄陽置臨漢監牧廢百姓田四百頃其牧馬三千二百餘匹度以牧馬數少虛廢民田奏罷之除其使名八年三月以本官判東都尚書省事充東都留守九年十月進位中書令十一月誅李訓王涯賈餗舒元輿等四宰相其親屬門人從坐者數十百人下獄訊劾欲加流竄度上疏理之全活者數十家自是中官用事衣冠道喪度以年及懸輿王綱版蕩不復以出處為意東都立第於集賢里築山穿池竹木叢萃有風亭水榭梯橋架閣島嶼回環極都城之勝概又於午橋創別墅花木萬株中起涼臺暑館名曰緑野堂引甘水貫其中釃引脈分映帶左右度視事之隙與詩人白居易劉禹錫酣宴終日高歌放言以詩酒琴書自樂當時名士皆從之遊每有人士自都還京文宗必先問之曰卿見裴度否上以其足疾不便朝謁而年未甚衰開成二年五月復以本官兼太原尹北都留守河東節度使詔出度纍表固辭老疾不願更典兵權優詔不允文宗遣吏部郎中盧弘往東都宣旨曰卿雖多病年未甚老為朕臥鎮北門可也促令上路度不獲已之任三年冬病甚乞還東都養病四年正月詔許還京拜中書令以疾未任朝謝詔曰司徒中書令度綽有大勳纍居台鼎今以疾恙未任謝上其本官俸料宜自計日支給又遣國醫就第診視屬上巳曲江賜宴羣臣賦詩度以疾不能赴文宗遣中使賜度詩曰注想待元老識君恨不早我家柱石衰憂來學丘禱仍賜御札曰朕詩集中欲得見卿唱和詩故令示此卿疾恙未痊固無心力但異日進來春時俗説難於將攝勉加調護速就和平千百胸懷不具一二藥物所須無憚奏請之煩也御札及門而度已薨四年三月四日也上聞之震悼久之重令繕寫置之靈座時年七十五册贈太傅輟朝四日賵賻加等詔京兆尹鄭復監護喪事所須皆官給上怪度無遺表中使問之家人進其稿草其旨以未定儲二為憂言不及家事度始自書生以辭策中科選數年之間翔泳清切逢時艱否而能奮命決策橫身討賊為中興宗臣當元和長慶間亂臣賊子蓄鋭喪氣憚度之威稜度狀貌不踰中人而風彩俊爽占對雄辨觀聽者為之聳然時有奉使絶域者四夷君長必問度之年齡幾何狀貌孰似天子用否其威名播於憬俗為華夷畏服也如此時威望德業侔於郭子儀出入中外以身繫國之安危時之輕重者二十年凡命將相無賢不肖皆推度為首其為士君子愛重也如此雖江左王導謝安坐鎮雅俗而訏謨方略度又過之有子五人識撰讓諗議識以蔭授官纍遷至通議大夫檢校右散騎常侍壽州刺史本州團練使上柱國襲晉國公食邑三千戶實封一百五十戶賜紫金魚袋大中初改潭州刺史御史中丞充河南都團練觀察使八年加檢校戶部尚書鳳翔尹鳳翔隴右節度使十一年本官移許州刺史忠武軍節度陳許觀察等使撰長慶元年登進士第讓初任京兆府參軍大和中度鎮襄陽奏乞讓從行諗大中五年自大中大夫檢校右散騎常侍御史大夫宣州刺史宣歙觀察使上柱國河東男食邑三百戶賜紫金魚袋入朝權知刑部侍郎兄弟並列方鎮時人榮之史臣曰德宗懲建中之難姑息藩臣貞元季年威令衰削章武皇帝志攄宿憤廷訪嘉猷始得杜邠公用高崇文誅劉闢中得武丞相運籌訓戎贊成睿斷終得裴晉公耀武伸威竟殄兩河宿盜雄哉章武之果斷也晉公以書生素業致位台衡逢時遘屯扼腕凶醜誓以身徇不亦壯乎夫人臣事君唯忠與義大則以訏謨排禍難小則以讜正匡過失內不慮身計外不恤人言古之所難也晉公能之誠社稷之良臣股肱之賢相元和中興之力公胡讓焉昔仲尼歎周室陵遲齊桓霸翼而有微管之論當承宗師道之濟惡也姦人遍四海刺客滿京師乃至關吏禁兵附賊陰計議臣言未出口刃已揕胸苟非死義之臣孰肯橫身冒難以輔天子者苟裴令不用元和之世則時運未可知也臣所以明左衽之歎宣聖奬賢之深贊曰晉公伐叛以身犯難用之則治捨之則亂公去巖廊復失冀方穎植之謀信為不臧
