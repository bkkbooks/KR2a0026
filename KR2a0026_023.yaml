使並檢校太保同平章事殺神策軍使李師虔徐彥回敕曰朕臨御已來十有四載常慕好生之德固無樂殺之心昨季述等幽辱朕躬迫脅太子李師虔是逆賊親厚選來東內主持動息之間俾其偵伺每有須索皆不供承要紙筆則恐作詔書索錐刀則慮為利器凌辱萬狀出入搜羅朕所御之衣晝服夜濯凝冽之際寒苦難勝嬪嬙公主衾裯皆闕緡錢則貫百不入繒帛則尺寸難求六輩同其主張五人權其威勢若言狀罪翰墨難窮若許生全是為貸法宜並處斬時朱全忠既服河朔三鎮欲窺圖王室篡代之謀以李克用在太原懼其角逐是月全忠令大將張存敬率兵三萬由含山襲河中王珂晉州刺史張漢瑜絳州刺史陶建不意賊至城守無備皆以郡降存敬移兵圍河中王珂求救於太原克用不能救乃嬰城謂存敬曰吾與汴王有舊俟王至即降二月甲寅朔戊辰朱全忠至河中遂移王珂及兄璘弟瓚舉室徙於汴以張存敬守河中是月制以全忠檢校太師守中書令進封梁王三月癸未朔全忠引軍歸汴奏河中節度使歲貢課鹽三千車臣今代領池場請加二千車歲貢五千車候五池完葺則依平時供課額從之四月癸丑朔汴軍大舉攻太原氏叔琮以兵三萬由天井關進攻澤潞節度使孟遷以上黨降叔琮長驅出圍柏營于洞渦驛葛從周率趙魏中山之兵由土門入陷承天軍與叔琮會時屬大雨芻糧不給汴將保衆而還甲戌天子有事於宗廟是日御長樂門大赦天下改元天復李茂貞自鎮來朝賜宴於壽春殿進錢數萬緡時中尉韓全誨及北司與茂貞相善宰相崔胤與朱全忠相善四人各為表𩹉全忠欲遷都洛陽茂貞欲迎駕鳳翔各有挾天子令諸侯之意五月壬午朔庚子制門下侍郎戶部尚書平章事陸扆加兵部尚書進階特進壬寅制以朱全忠兼河中尹河中節度晉絳慈隰觀察處置安邑解縣兩池榷鹽制置等使閏六月辛巳朔制以河陽節度丁會依前檢校司徒兼潞州大都督府長史昭義節度等使代孟遷以遷檢校司徒為河陽節度全忠奏也仍請於昭義節度官階內落下邢洺磁三州卻以澤州為屬郡其河陽節度只以懷州為屬郡從之全忠又奏請以齊州隸鄆州從之十月己卯朔戊戌全忠引四鎮之師七萬赴河中京師聞之大恐豪民皆亡竄山谷十一月己酉朔壬子中尉韓全誨與鳳翔護駕都將李繼誨奉車駕出幸鳳翔是日汴軍陷同州執州將司馬鄴華州節度使韓建遣判官李巨川送款甲寅汴軍駐靈口乙卯全忠知帝出幸乃回兵攻華州大軍駐赤水全忠以親兵駐西溪韓建出降乃署為忠武軍節度使以陳州為理所丁巳宰相崔胤令戶部侍郎王溥至赤水寨促全忠以兵迎駕戊午全忠自赤水趨長安崔胤率文武百僚太子太師盧知猷已下迎全忠於坡頭庚申汴軍趨鳳翔戊辰至岐下全忠令判官李擇裴鑄入城奏事言臣在河中得崔胤書言奉密詔令臣以兵士迎駕臣不敢擅自迎鑾昭宗怒胤矯命連詔全忠以兵士還鎮辛未全忠引軍離鳳翔退攻邠州甲戌制扶危致理功臣開府儀同三司守司空門下侍郎平章事充太清宮使弘文館大學士延資庫使諸道鹽鐵轉運等使判度支上柱國魏國公食邑五千戶食實封二百戶崔胤可責授朝散大夫守工部尚書乙亥邠州節度使李繼徽以城降全忠乃舍其孥於河中以繼徽從軍以汴軍營於三原十二月己卯崔胤自長安至三原寨與全忠謀攻鳳翔二年春正月戊申朔車駕在鳳翔全忠在三原李克用遣大將周德威攻慈隰晉等州全忠歸河中令其將朱友寧率衆五萬屯絳州大敗太原軍於蒲縣西北友寧乘勝追奔陷汾州進圍太原天子遣諫議大夫張顗至晉州諭全忠令與太原通和屬友寧再戰不利乃還關西四月丁丑朱友寧總大軍屯於興平五月岐軍出戰大敗於武功南之漢谷全忠聞捷自引汴軍五萬西征六月進營虢縣丁亥進圍鳳翔遣判官入城迎駕九月岐軍出戰又敗十一月鄜州節度使李周彝率衆救鳳翔十二月癸酉汴將孔勍乘虛襲下鄜州獲周彝妻子周彝即以兵士來降於是邠寧鄜坊等州皆陷於汴軍茂貞懼謀誅內官以解三年春正月癸卯朔車駕在鳳翔甲辰天子遣中使到全忠軍茂貞亦令軍將郭啓奇來達上欲還京之旨丙午青州牙將劉鄩陷全忠之兗州又令牙將張厚入奏是日亦竊發於華州殺州將婁敬思上又令戶部侍郎韓偓趙國夫人寵顏宣諭於全忠軍辛亥全忠令判官李振入奏上令翰林學士姚洎傳宣令全忠喚崔胤令率文武百僚來迎駕癸丑上令禮部尚書蘇循傳詔賜全忠玉帶仍令全忠處分蔣玄暉侍帝左右丁巳蔣玄暉與中使同押送中尉韓全誨張弘彥已下二十人首級告諭四鎮兵士回鑾之期戊午遣中使走馬華州追崔胤胤託疾不至甲子巳時車駕出鳳翔幸全忠軍全忠素服待罪泣下不自勝上親解玉帶賜之乙丑次扶風令朱友倫總兵侍衛丙寅次武功丁卯次興平宰臣崔胤率百官迎謁即日降制以崔胤守司空門下侍郎平章事復太清宮使弘文館大學士延資庫使諸道鹽鐵轉運使判度支魏國公封邑如故戊辰次咸陽己巳入京師天子素服哭于太廟改服冕旒謁九廟禮畢御長樂樓大赦百僚稱賀全忠處左軍辛未宴全忠於內殿內弟子奏樂是日制內官第五可範已下七百人並賜死於內侍省其諸道監軍及小使仰本道節度使處斬訖奏從全忠崔胤所奏也帝悲惜之自為奠文祭之二月壬申朔甲戌制賜全忠回天再造竭忠守正功臣名己卯制以輝王祚充諸道兵馬元帥又制以回天再造竭忠守正功臣宣武宣義天平護國等軍節度使汴宋亳輝河中晉絳慈隰鄭滑潁鄆齊曹等州觀察處置等使太清宮修葺宮闕制置度支解縣池場等使開府儀同三司檢校太師守中書令河中尹汴滑鄆等州刺史上柱國梁王食邑九千戶食實封六百戶朱全忠可守太尉中書令充諸道兵馬副元帥進邑三千戶以宰臣崔胤守司徒兼侍中判六軍十二衛以吏部尚書平章事裴樞檢校右僕射同平章事兼廣州刺史清海軍節度嶺南東道觀察等使甲戌制以門下侍郎兵部尚書同平章事監修國史陸扆責授沂王傅分司己丑上宴全忠於壽春殿又令全忠與茂貞書取平原公主同州節度使趙翊陝州節度使朱友謙來朝制以朱友裕為華州刺史充感化軍節度使乙未會鞠於保寧殿全忠得頭籌令內弟子送酒仍面賜副元帥官告以新除廣州節度使裴樞為門下侍郎吏部尚書平章事監修國史以戶部侍郎王溥同平章事戊戌全忠歸大梁上宴之內殿置酒於延喜門是日全忠與四鎮判官皆預席上臨軒泣別又令中使走送御制楊柳枝詞五首賜之辛丑平原公主至京師三月壬寅朔全忠引四鎮之兵征王師範先是大將朱友寧楊師厚前軍臨淄青師範求援于淮南楊行密遣將王景仁帥衆萬人赴之四月辛未朔西川王建以兵攻秦隴乘茂貞之弱也仍遣判官韋莊入貢修好于全忠五月制鳳翔隴右四鎮北庭行軍彰義軍節度涇原渭武觀察處置押蕃落等使開府儀同三司守尚書令兼侍中鳳翔尹上柱國秦王李茂貞可檢校太師守中書令初茂貞凌弱王室朝廷姑息加尚書令及是全忠方守太尉茂貞懼乞罷尚書令故也崔胤奏六軍十二衛名額空存實無兵士京師侍衛亦藉親軍請每軍量召募一千一百人共置六千六百人從之乃令六軍諸衛副使京兆尹鄭元規立格招收於市制以潁州刺史朱友恭檢校司空兼徐州刺史充武寧軍節度使從全忠奏也六月青州淮南軍與汴人戰于臨淄汴軍大敗朱友寧戰死傳首淮南九月汴將楊師厚大敗青州軍於臨朐荊南節度使成汭以舟師赴援鄂州澧朗雷彥恭承虛襲陷江陵汭軍士聞之潰歸汭憤怒投水而死趙匡凝遂以兵襲荊州據之辛巳汴州護駕都將朱友倫擊鞠墜馬卒全忠怒殺同鞠將校數人十一月丁酉朔王師範以青州降楊師厚全忠復令師範知青州事邠州鳳翔兵士逼京畿汴軍屯河中青州牙將劉鄩以兗州降葛從周稟師範命也全忠嘉之署為元帥府都押衙權知鄜州留後事十二月丁卯朔辛巳制以禮部尚書獨孤損為兵部侍郎同平章事丙申制守司徒侍中太清宮使弘文館大學士延資庫使判六軍十二衛事諸道鹽鐵轉運使判度支上柱國魏國公食邑四千五百戶崔胤責授太子賓客守刑部尚書兼京兆尹六軍諸衛副使鄭元規責授循州司戶是日汴州扈駕指揮使朱友諒殺胤及元規皇城使王建勳飛龍使陳班閣門使王建襲客省使王建乂前左僕射上柱國河間郡公張濬全忠將逼車駕幸洛陽懼胤濬立異也天祐元年春正月丁酉朔以翰林學士左拾遺柳璨為右諫議大夫同平章事賜紫金魚袋己亥制以兵部尚書崔遠為中書侍郎同平章事集賢殿大學士己酉全忠率師屯河中遣牙將寇彥卿奉表請車駕遷都洛陽全忠令長安居人按籍遷居徹屋木自渭浮河而下連甍號哭月餘不息秦人大罵於路曰國賊崔胤召朱溫傾覆社稷俾我及此天乎天乎丁巳車駕發京師癸亥次陝州全忠迎謁于路二月丙寅朔乙亥全忠辭赴洛陽親督工作四月丙寅朔癸巳帝遣晉國夫人可證傳詔諭全忠言中宮誕蓐未安取十月入洛陽宮全忠意上遲留俟變怒甚謂牙將寇彥卿曰亟往陝州到日便促官家發來閏四月乙未朔丁酉車駕發陝州壬寅次穀水行宮時崔胤所募六軍兵士胤死後亡散並盡從上東遷者唯諸王小黃門十數打毬供奉內園小兒共二百餘人全忠在陝仍慮此輩為變欲盡去之以汴卒為侍衛至穀水頓全忠令醫官許昭遠告內園等謀變因會設幄酒食次並坑之乃以謀逆聞由是帝左右前後侍衛職掌皆汴人也甲辰車駕由徽安門入朱全忠張全義宰相裴樞獨孤損前導是日大風雨土跬步不辨物色日暝稍止上謁太廟禮畢還宮御正殿宣勞從官衛士受賀乙巳上御光政門大赦制曰乃眷中州便侯伯會朝之路運逢百六順古今禳避之宜況建鼎舊京我家二宅轘轅通其左郟鄏引其前周平王之東遷更延姬姓漢光武之定業克茂劉宗肇葺新都祈天永命皆因否運復啓昌期或西避於戎狄或載殲於妖孽朕遭家不造布德不明十載已來三罹播越亦屬災纏秦雍叛起邠岐始幸石門以避衛兵之亂載遷華嶽仍驚畿邑之侵憂危則矢及車輿凌脅則火延宮廟逮至逆連宮豎構結姦凶致劉季述幽朕於下宮韓全誨劫豫於右輔莫匪兵圍內殿焰亙九重皆思假武以容身唯效指鹿而威衆矯宣天憲欺蔑外藩行書詔以任情欲忠良而獲罪雖羣方嶽牧協力匡扶拘戎律於阻修報朝恩而隔越副元帥梁王全忠以兼鎮近輔總兵四藩遠赴岐陽躬迎大駕辛勤百戰盡剿凶渠營野三年竟回鑾輅咸鎬載新其宮闕讓圭絶類於閹徒方崇再造之功以正中興之運又邠岐結釁巴蜀連兵上負國恩下隳鄰好焚宮烈火更延爇於親鄰卻駕凶鋒復延侵於禁苑抑又太一遊處併集六宮罰星熒惑久纏東井玄象荐災於秦分地形無過於洛陽爰有一二藎臣洎四方同志竭心王室共誓嘉謀魏鎮定燕航大河而畢至陳徐潞蔡輦巨軸以偕來披荊棘而立朝廷剗灰燼而化輪奐左郊祧而右社稷肅爾崇嚴前廣殿而後重廊藹然華邃公卿僉議龜筮協從甲子令年孟夏初吉備法駕而離陝分列百官而入洛郊觀此殷繁良多嘉慰謝罪太廟憂惕驚懷登御端門軫惻興感蓋以一人寡祐致萬姓靡寧工役艱疲忠良盡瘁克建再遷之業冀延八百之基宜覃渙汗之恩俟此雍熙之慶滌瑕蕩垢咸與惟新可大赦天下改天復四年為天祐元年於戲肆眚閶闔即安宮闈雖九廟几筵已閟於新室而諸陵松柏遙隔於舊都將務乂寧難申綣慕文武百辟執事具僚從我千里而來端爾一心蒞政恩覃既往效責從新方當開國之初必舉慢官之罰戊申敕今後除留宣徽兩院小馬坊豐德庫御廚客省閣門飛龍莊宅九使外其餘並停內園冰井公事委河南尹仍不差內夫人傳宣殺醫官閻祐之國子博士歐陽特言星讖也宰相裴樞兼右僕射諸道鹽鐵轉運等使監修國史戶部尚書門下侍郎平章事獨孤損判度支中書侍郎平章事柳璨判戶部事五月乙丑朔丙寅制河陽節度使張漢瑜同平章事宴百僚於崇勳殿上贊述全忠之功業因言御樓前一日所司亡失赦書賴元帥府收得副本施行幾失事矣中書不得無過裴樞等起待罪中飲帝更衣召全忠曲宴閣中全忠懇辭帝曰朕以全忠功業崇高欲齋中款曲以表庇賴耳全忠既不欲來即令敬翔來朕與之言全忠令敬翔私退奏曰敬翔亦醉而出矣己巳全忠辭赴大梁宴于崇勳殿是日雨甚乙酉翰林學士左諫議大夫知制誥沈棲遠守本官以病陳乞故也丁亥敕河南府畿縣先減尉一員可準京兆府例復置縣尉一員癸巳中書奏準今年四月十一日赦文陝州都督府改為興唐府其都督府長史宜改為尹左右司馬為少尹録事為司録陝縣為次赤餘為次畿從之六月甲午朔邠州楊崇本侵掠關內全忠遣朱友裕屯軍於百仁村丙申通議大夫中書舍人賜紫金魚袋楊注可充翰林學士庚子三佛齊國入朝使蒲訶粟可寧遠將軍丁未制金紫光祿大夫太子少傅盧紹可太子太保致仕銀青光祿大夫太子少師天水男食邑三百戶趙崇可檢校右僕射甲寅以京兆少尹鄭韜光為太常少卿前侍御史韋説為右司員外郎前進士姚顗為校書郎前進士趙頎劉明濟竇專並可祕書省校書郎正字從柳璨奏也荊南襄州忠義軍節度開府儀同三司檢校太師中書令江陵尹襄州刺史上柱國楚王食邑六千戶趙匡凝宜備禮册命七月癸亥朔全忠率師討邠鳳甲子自汴至洛陽宴於文思毬場全忠入百官或坐於廊下全忠怒笞通引官何凝丙寅制金紫光祿大夫行御史中丞上柱國韓儀責授棣州司馬侍御史歸藹責授登州司戶坐百官傲全忠也甲戌制以中大夫中書舍人上柱國賜紫金魚袋杜彥林為太中大夫守御史中丞丁丑制以兵部郎中蕭頎為吏部郎中戶部郎中徐綰為兵部郎中司勳員外郎張茂樞為禮部郎中監察御史郤殷象為右補闕己卯制武昌軍節度鄂嶽蘄黃等州觀察處置兼三司水陸發運淮南西面行營招討等使開府儀同三司檢校太師中書令西平王食邑三千戶杜洪加食邑一千戶實封二百戶庚寅中書奏西京舊有凌煙閣圖畫功臣今遷都洛陽合議修建副元帥梁王勳庸冠世請凌煙閣之側別創一閣以表殊勳從之八月壬辰朔壬寅夜朱全忠令左龍武統軍朱友恭右龍武統軍氏叔琮樞密使蔣玄暉弒昭宗於椒殿自帝遷洛李克用李茂貞西川王建襄陽趙匡凝知全忠篡奪之謀連盟舉義以興復為辭而帝英傑不羣全忠方事西討慮變起於中故害帝以絶人望帝自離長安日憂不測與皇后內人唯沉飲自寬是月壬寅全忠令判官李振自河中至洛陽與友恭等圖之是夜二鼓蔣玄暉選龍武衙官史太等百人叩內門言軍前有急奏面見上內門開玄暉每門留卒十人至椒殿院貞一夫人啓關謂玄暉曰急奏不應以卒來史太執貞一殺之急趨殿下玄暉曰至尊何在昭儀李漸榮臨軒謂玄暉曰院使莫傷官家寧殺我輩帝方醉聞之遽起史太持劍入椒殿帝單衣旋柱而走太追而弒之漸榮以身護帝亦為太所殺復執何皇后將害之后求哀於玄暉玄暉以全忠止令害帝釋后而去帝殂年三十八羣臣上諡曰聖穆景文孝皇帝廟號昭宗二年二月二十日葬于和陵
