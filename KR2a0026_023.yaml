body:
  text: 舊唐書卷二十上本紀第二十上昭宗昭宗聖穆景文孝皇帝諱曄懿宗第七子母曰惠安太后王氏以咸通八年二月二十二日生於東內十三年四月封壽王名傑乾符四年授開府儀同三司幽州大都督幽州盧龍等軍節度押奚契丹管內觀察處置等使帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右握兵中要皆奇而愛之文德元年二月僖宗暴不豫時初復宮闈人心傾矚遽聞被疾軍民駭愕及大漸之夕而未知所立羣臣以吉王最賢又在壽王之上將立之唯軍容楊復恭請以壽王監國三月六日宣遺詔立為皇太弟八日柩前即位時年二十二以司空韋昭度攝冢宰己丑見羣臣始聽政帝攻書好文尤重儒術神氣雄俊有會昌之遺風以先朝威武不振國命寖微而尊禮大臣詳延道術意在恢張舊業號令天下即位之始中外稱之四月戊辰朔庚午追諡聖母惠安太后曰恭獻乙亥河南尹張全義以兵襲李罕之於河陽罕之出據澤州魏博衙軍殺其帥樂彥禎於龍興寺又擊樂從訓敗之從訓以殘衆保洹水為羅宗辨陷其城而殺之壬午蔡賊孫儒陷揚州楊行密潰圍而出據宣州孫儒自稱淮南節度仍率其衆攻宣州五月丁酉朔制以宣武軍節度使檢校侍中沛郡王朱全忠為蔡州四面行營兵馬都統自秦賢石璠敗後蔡賊漸弱時溥方為全忠所攻故移溥都統之命授全忠壬寅蔡賊將偽署荊襄節度使趙德諲遣使歸朝願討賊自效乃以德諲為蔡州四面行營副都統德諲遂以荊襄之兵屬全忠六月丁卯朔以川賊王建大亂劍南陳敬瑄告難制以開府儀同三司守司空門下侍郎同平章事太清宮使弘文館大學士延資庫使上柱國扶陽郡開國公食邑二千戶韋昭度檢校司徒門下侍郎平章事兼成都尹充劍南西川節度副大使知節度事兼兩川招撫制置等使蔡州行營奏大破賊於龍陂進軍以逼賊城七月丙申朔澤州刺史李罕之引太原之師攻河陽為汴將丁會所敗退還高平九月乙未汴將朱珍敗時溥之師于甬橋遂陷宿州自是溥嬰城不敢復出汴將胡元琮急攻蔡州十二月甲子朔蔡州牙將申叢執秦宗權撾折其足乞降詔中使宣諭便以叢權知留後比中使至別將郭璠殺申叢篡宗權縶送汴州蔡申光等州平詔賜蔡州行營兵士錢二十五萬貫令度支逐近支給是月葬僖宗於靖陵龍紀元年春正月癸巳朔上御武德殿受朝賀宣制大赦改元中外文武臣僚進秩頒爵有差以劍南西川節度兩川招撫制置使韋昭度檢校司空為東都留守以翰林學士承旨兵部侍郎知制誥劉崇望本官同平章事以刑部侍郎孫揆為京兆尹二月癸亥朔己丑汴州行軍司馬李璠監送逆賊秦宗權并妻趙氏以獻上御延喜門受俘百僚稱賀以之徇市告廟社斬於獨柳趙氏笞死初自諸侯收長安黃巢東出關與宗權合巢賊雖平而宗權之凶徒大集西至金商陝虢南極荊襄東過淮甸北侵徐兗汴鄭幅員數十州五六年間民無耕織千室之邑不存一二歲既凶荒皆膾人而食喪亂之酷未之前聞宗權既平而朱全忠連兵十萬吞噬河南兗鄆青徐之間血戰不解唐祚以至於亡中書奏請以二月二十二日為嘉會節從之三月壬辰朔以右僕射門下侍郎同平章事孔緯守司空太清宮使弘文館大學士延資庫使領諸道鹽鐵轉運等使以右僕射門下侍郎集賢殿大學士杜讓能為左僕射監修國史判度支以中書侍郎戶部尚書同平章事張濬為集賢殿大學士判戶部事四月壬戌朔以宣武淮南等節度副大使知節度事管內營田觀察處置等使開府儀同三司檢校太傅兼侍中揚州大都督府長史汴州刺史充蔡州四面行營都統上柱國沛郡王食邑四千戶朱全忠為檢校太尉中書令進封東平王仍賜賞軍錢十萬貫五月壬辰朔漢州刺史王建陷成都府遷陳敬瑄于雅州建自稱西川兵馬留後復用田令孜為監軍六月辛酉朔邢洺節度使孟方立卒三軍推其弟洺州刺史遷為留後太原李克用出軍攻之杭州刺史錢鏐攻宣州下之擒劉浩剖心以祭周寶七月詔於杭州置武勝軍以鏐為本軍防禦觀察等使十月己未朔青州節度使王敬武卒制以特進太子少師博陵郡開國侯食邑一千戶崔安潛檢校太傅兼侍中青州刺史平盧軍節度觀察押新羅渤海兩蕃等使青州三軍以敬武子師範權知兵馬事十一月己丑朔將有事於圓丘改御名曰曄辛亥上宿齋於武德殿宰相百僚朝服于位時兩軍中尉楊復恭及兩樞密皆朝服侍上太常博士錢珝李綽等奏論之曰皇帝赴齋宮內臣皆服朝服臣檢國朝故事及近代禮令並無內官朝服助祭之文伏惟皇帝陛下承天御曆聖祚中興祗見宗祧克陳大禮皆稟高祖太宗之成制必循虞夏商周之舊經軒冕服章式遵彝憲禮院先準大禮使牒稱得內侍省牒要知內臣朝服品秩禮院已準禮令報訖今參詳近朝事例若內官及諸衛將軍必須製冠服即各依所兼正官隨資品依令式服本官之服事存傳聽且可俯從然亦不分明著在禮令乞聖慈允臣所奏狀入至晚不報錢珝又進狀曰臣今日巳時進狀論內官冠服制度未奉聖旨伏以陛下虔事郊禋式遵彝範凡關典禮必守憲章今陛下行先王之大禮而內臣遂服先王之法服來日朝獻大聖祖臣贊導皇帝行事若侍臣服章有違制度是為非禮上瀆祖宗臣期不奉敕臣謬當聖代叨備禮官獲正朝儀死且不朽脂膏泥滓是所甘心狀入降朱書御札曰卿等所論至當事可從權勿以小瑕遂妨大禮於是內四臣遂以法服侍祠甲寅圓丘禮畢御承天門大赦十二月戊午宰臣杜讓能兼司空大順元年春正月戊子朔御武德殿受朝賀宰臣百僚上徽號曰聖文睿德光武弘孝皇帝禮畢大赦改元大順二月丁巳宰臣兼國子祭酒孔緯以孔子廟經兵火有司釋奠無所請內外文臣自觀察使制使下及令佐於本官料錢上緡抽十文助修國學從之宣武節度使朱全忠進位守中書令加食邑千戶餘如故太原都將安金俊攻圍邢州歷年城中食盡邢洺觀察使孟遷以城降乃以孟遷之族歸太原克用以大將安建為邢洺留後三月丁亥朔朱全忠上表關東藩鎮請除用朝廷名德為節度觀察使如藩臣固位不受代臣請以兵誅之如王徽裴璩孔晦崔安潛等皆縉紳名族踐歷素高宜用為徐鄆青兗等道節度使從之昭義節度使李克修卒太原帥克用之弟也三軍推克修弟克恭知留後事四月丙辰朔李克用遣大將安金俊率師攻雲州赫連鐸求援於幽州李匡威出兵援之戰于蔚州太原軍大敗燕軍執安金俊獻之于朝李匡威赫連鐸朱全忠等上表請因沙陀敗亡臣與河北三鎮及臣所鎮汴滑河陽之兵平定太原願朝廷命重臣一人都總戎事昭宗以太原於艱難時立興復大功心疑其事下兩省御史臺尚書省四品已上官議唯黨全忠者言其可伐不可者十之七宰臣杜讓能劉崇望深以為不可惟張濬議曰先朝再幸興元實沙陀之罪比慮河北諸侯與之膠固無以滌除今兩河大藩皆願誅討不因其離二而除之是當斷失斷也孔緯曰濬言是也軍容楊復恭曰先朝蒙犯霜露播越草莽七八年間寢不安席雖賊臣搖蕩於外亦由失制於中陛下纘承人心欣戴不宜輕舉干戈為國生事望優詔報全忠且以柔服為辭上然之全忠密遣濬之親黨賂濬濬恃全忠之援論奏不已天子僶俯從之五月制特進中書侍郎兵部尚書同平章事集賢殿大學士上柱國河間郡開國伯食邑七百戶張濬為太原四面行營兵馬都統京兆尹孫揆副之以華州節度使韓建為北面行營招討都虞候供軍等使以宣武節度使朱全忠為太原東南面招討使成德軍節度使王鎔為太原東面招討使幽州節度使李匡威為太原北面招討使雲州防禦使赫連鐸副之丙午潞州軍亂殺其帥李克恭監軍使薛繢本函克恭首獻之于朝濬方起兵朝廷稱賀壬子都招討使張濬孫揆率神策諸軍三千赴行營昭宗御安喜門臨送誡誓之六月乙卯李克用大將權知邢洺兵馬留後安建上表請以三州歸順遣中使往勞之制以德州刺史權知滄州兵馬留後盧彥威檢校尚書右僕射兼滄州刺史御史大夫充義昌軍節度滄德觀察處置等使彥威光啓初逐其帥楊全玫求旄節朝廷以扈蹕都將曹誠為滄德節度使誠雖不至任而彥威之請不行至是王鎔羅弘信因張濬用兵為彥威論請故有斯授以京兆尹行營兵馬副招討孫揆檢校兵部尚書兼潞州大都督府長史充昭義節度副大使知節度事張濬會諸軍於晉州朱全忠選汴卒三千為張濬牙隊秋七月乙酉朔王師屯于陰地太原大將康君立以兵拒戰朱全忠遣大將葛從周率千騎入潞州從周權充兵馬留後朱全忠奏已差兵士守潞州請節度使孫揆赴鎮時中使韓歸範押揆旌節官告送至行營丙申揆建節率兵二千自晉州赴鎮昭義戊申至長子縣山谷中太原騎將李存孝伏兵執揆與韓歸範牙兵五百俘送太原餘兵悉為存孝所殺太原將康君立率兵二萬攻潞州九月甲申幽州雲州蕃漢兵三萬攻鴈門太原將李存信薛阿檀擊敗之汴將葛從周棄上黨康君立入據之克用以君立為澤潞兵馬留後十一月癸丑朔太原將邢州刺史李存孝自恃擒孫揆功合為昭義帥怨克用授康君立存孝自晉州率行營兵歸邢州據城上表歸朝仍致書與張濬王鎔求援克用遣大將李存信薛阿檀拒王師于陰地三戰三捷由是河西鄜夏邠岐之軍渡河西歸韓建以諸軍保平陽存信追之建軍又敗建退保絳州張濬以汴卒禁軍萬人在晉州存信攻之三日相與謀曰張濬宰相俘之無益天子禁兵不宜加害如得平陽於我無利遂退舍五十里而軍十二月千午朔張濬韓建拔晉絳遁去李存信收晉絳大掠河中四郡丙寅制特進中書侍郎平章事太原四面行營都統張濬可檢校兵部尚書兼鄂州刺史御史大夫充鄂嶽觀察使以開府儀同三司守司徒門下侍郎同平章事上柱國魯國公食邑三千戶充諸道鹽鐵轉運等使孔緯檢校司徒兼江陵尹荊南節度觀察處置使庚午新除鄂嶽觀察使張濬責授連州刺史新除荊南節度使孔緯責授均州刺史並馳驛赴任太原軍屯晉州李克用遣中使韓歸範還朝因上表訴冤言被賊臣張濬依倚朱全忠離間功臣致削奪臣官爵朝廷欲令釋憾下羣臣議其可否左僕射韋昭度等議曰賞功罰否前聖之令猷含垢匿瑕百王之垂訓是以雷解而羲文象德網開而湯化歸仁用彼懷柔式存彝範上自軒農之代下臻文武之朝罔不允洽寬弘以流霈澤況國家德祖守成之日憲宗致理之時車軌一同桑麻萬里燭龍外野悉在梯航火鼠窮郊咸歸正朔然猶王承宗擁兵鎮冀詔范希朝討之仍歲無功卒行赦宥而又朱滔以幽州之衆結田悅李納王武俊之強遣馬燧等征之不克旋又寬之以纍聖之典謀睿哲大朝之紀律文明非不欲厲彼風驅快其電掃然且考春秋之義稽楚鄭之文或退而許平或服而更捨存於舊史載彼新書李克用代漠強宗陰山貴胤呼吸而風雲作氣指麾而草樹成形仰天指心誓獻秩訾之首伏韜歐血屢親都護之營所謂勇多上人自匪窮來歸我及陛下聖考懿宗皇帝之朝彭門失守親驅鋭卒首建殊功而先帝即位之初渚宮大擾復提義旅克靜妖氛其後封豕長蛇荐食上國繼以子朝之亂皆因重耳之盟保大朝之宗祧垂中興於簡册蓋聖王之御天下也有勳可書有績可載宥過不忘於十代念功豈止於一時天高聽卑請事斯語且四海之內創痏猶殷九貢之邦綱條未理昨者遽起邠岐之衆尋已退還又徵燕薊之師倏聞內變出於餉饋失職資屝絶供致此投戈是乖借箸蓋下計之未熟非聖謀之不臧儻宸斷重離天機間出録茲成款散彼師徒虛其念舊之懷待以如初之禮臣等所議實以在斯抑又聞往者漢將趙充國欲因邊境衰弱出兵擊之於是魏相上書畫陳利害且曰恃國家之大矜人物之衆欲見威於敵者謂之驕兵兵驕者滅非但人事乃天道也又曰臣不知此兵何名者也兵出無名事乃不成漢宣納之竟罷其伐伏惟皇帝陛下鑒往古用師之難採列聖遷善之美恩加區宇信及豚魚則臣等不勝懇願況今汴魏猶艱幽定方困縱遣之調發豈能集事虛行號令徒召寇讎將以勦人非唯辱國且黠戞斯舉勤王之衆推效命之誠未能虜騎獨攻所望漢兵同力令茲數鎮奔命不遑難致濟師恐又生事諭其漸當暑熱非利戎旃悉力頒霑遣還蕃部重盈陳五郡之卒益謹關防王珙振兩河之雄更嚴旗鼓然後奬其上表哀以自陳録彼前勞責之後效徵神爵之往典還日逐之故封諭其已斥王恭不使更疑晉帝凡百臣子實切乃誠其克用在身官爵並請卻還仍依前編入屬籍從之以翰林學士承旨兵部侍郎崔昭緯本官同平章事御史中丞徐彥若為戶部侍郎同平章事尚書右僕射王徽卒贈司空諡曰貞二年春正月壬子朔李克用急攻邢州李存孝求援於王鎔鎔出軍援之屯于堯山克用自太原至擊敗之進圍邢州司徒門下侍郎平章事杜讓能進位太尉太清宮使弘文館大學士延資庫使領諸道鹽鐵轉運等使以中書侍郎吏部尚書平章事劉崇望為門下侍郎監修國史判度支事工部侍郎平章事崔昭緯判戶部事二月辛巳李克用復檢校太師中書令太原尹北都留守河東節度觀察處置等使時張濬韓建兵敗後為太原將李存信等所追至是方自含山踰王屋出河清達于河陽屬河溢無舟楫建壞人廬舍為木罌數百方獲渡人多覆溺休其徒於司徒廟是役也朝廷倚朱全忠及三鎮兵全忠方連兵徐鄆乃求兵糧于鎮魏全忠終不至行營鎮魏倚太原為扞蔽如破太原郡恐危鎮魏王鎔羅弘信亦不出師唯邠岐華鄜夏烏合之衆會晉州兵未交而孫揆擒燕卒敗所以河西岐下之師望風潰散而濬建至敗全忠以鎮魏不助兵糧觀望遣龐師古將兵討魏陷十縣羅弘信乞盟乃退棣州刺史張蟾為青州將王師範所敗新授平盧節度使崔安潛自棣州歸朝復授太子少師三月辛亥朔以青州權知兵馬留後王師範檢校兵部尚書兼青州刺史御史大夫充平盧軍節度觀察押新羅渤海兩蕃等使淮南節度孫儒為宣州觀察使楊行密所殺初行密揚州失守據宣州孫儒以兵攻圍三年是春淮南大飢軍中疫癘死者十三四是月孫儒亦病為帳下所執降行密行密乃併孫儒之衆復據廣陵六月王鎔出軍援李存孝克用大舉討鎮州七月太原軍出井陘屯於常山鎮大掠鎮趙深諸郡幽州節度使李匡威自率步騎三萬援王鎔八月克用班師九月丁未朔乙卯天子賜左軍中尉楊復恭几杖以大將軍致仕恭怒稱病不受詔十月丁丑朔甲申天威軍使李順節率禁兵討楊復恭復恭假子玉山軍使楊守信以兵拒之列陳于昌化里昭宗登延喜樓陳兵自衛以俟變相持至晚不戰而退是夜守信乃擁其衆衛復恭出京師且戰且行出通化門由七盤路之商州又令義兒張綰為後殿永安都頭安權追及綰擒之而還十一月朱全忠上表請移時溥節鎮是月汴軍陷宿州乃授溥太子太師溥將劉知俊降汴軍鎮州王鎔幽州李匡威復謀攻定州以分其地王處存求援於太原十二月丙子朔以光祿大夫門下侍郎右僕射平章事監修國史判度支上柱國彭城縣開國男劉崇望檢校司空同平章事兼徐州刺史充武寧軍節度徐宿觀察制置使時李順節恃恩恣橫出入以兵仗自隨兩軍中尉劉景宣西門君遂懼其窺圖非望丁亥兩中尉傳詔召順節順節以甲士三百自隨至銀臺門門司傳詔止從者兩中尉在仗舍邀順節坐次令部將嗣光審斫順節頭隨劍落其部下知順節死大譟出延喜門是日天威捧日登封三都亂剽永寧里至晚方定戶部尚書鄭延昌為中書侍郎平章事判度支景福元年春正月丙午朔上御武德殿受朝賀大赦改元景福鳳翔李茂貞邠州王行瑜華州韓建同州王行約秦州李茂莊等上表疏興元楊守亮納叛臣楊復恭請同出本軍討伐兼自備供軍糧料不取給於度支只請加茂貞山南招討使名內臣皆不可其奏昭宗亦以茂貞得山南之後有問鼎之志詔久之不下茂貞怒與王行瑜不俟進止發兵攻興元纍請招討之命兼與宰相杜讓能中尉西門君遂書詞語詬詈凌蔑王室昭宗心不能容二月丙子朔庚寅太原易定之兵合勢攻鎮州王鎔復告難於幽州李匡威率步騎三萬赴之時太原之衆軍於常山鎮易定之衆軍堅固鎮燕趙之卒分拒之三月克用處存斂軍而退四月乙亥左軍中尉西門君遂殺天威軍使賈德晟時德晟與李順節俱掌天威軍順節死中尉惡德晟誣奏殺之是日德晟部下千餘騎出奔鳳翔自是岐軍益盛五月甲辰制以河南尹張全義檢校司徒同平章事兼孟州刺史充河陽三城節度孟懷澤觀察等使七月燕趙之卒合勢援邢州太原大將李存信率軍拒於堯山王鎔大敗而還十一月辛丑鳳翔邠寧之衆攻興元府陷之山南西道節度使楊守亮與前左軍中尉楊復恭判官李巨川突圍而遁將奔太原李茂貞表其子繼密權知興元府事十二月辛未朔華州節度使韓建奏於乾元縣遇興元潰散兵士擊敗之其楊守亮楊復恭並已處斬訖皆傳首京師二年春正月辛丑朔制以權知劍南東川兵馬留後顧彥暉檢校尚書右僕射兼梓州刺史御史大夫充劍南東川節度觀察等使時王建連年攻彥暉李茂貞欲與建爭東川故表請彥暉正授旄鉞示修好也二月庚午朔太原李克用以兵攻鎮州師出井陘王鎔懼再求救于幽州甲申李匡威復來赴援太原之軍還邢州三月庚子制以捧日都頭陳珮為廣州刺史嶺南東道節度使扈蹕都頭曹誠為黔州刺史黔中節度使耀德都頭李鋋為潤州刺史鎮海軍節度使宣威都頭孫惟晟為江陵尹荊南節度使並加特進同平章事各令赴鎮並落軍權時朝議以茂貞傲侮王命武臣難制欲用杜讓能及親王典禁兵故罷五將之權兼以平章事悅其心太尉杜讓能册拜加食邑至六千戶是月幽州節度使李匡威弟匡籌據幽州自稱留後以符追行營兵兵皆還幽州匡威既無歸路遣判官李貞抱入奏請朝覲王鎔感匡威援助之惠乃築第於恆州迎匡威處之四月己巳汴將王重師牛存節陷徐州節度使時溥舉家自燔而死朱全忠遣將龐師古守徐州六月丁酉朔乙卯幽州節度使李匡威謀害王鎔而奪其帥恆州三軍攻匡威殺之戊午制太尉門下侍郎平章事晉國公杜讓能加食邑至九千戶門下侍郎吏部尚書平章事崔昭緯進階光祿大夫中書侍郎平章事鄭延昌兼刑部尚書並加食邑至千戶以祠部郎中知制誥陸扆為中書舍人依前翰林學士幽州節度使李匡籌遣使檄王鎔訊殺匡威之罪二藩結怨朱全忠遣判官韋震使幽州和解之七月李克用興兵攻鎮州敗王鎔軍於平山鎔懼乞盟請以兵糧助攻邢州許之克用遂旋軍襄國癸未制以鳳翔隴州節度使檢校太尉中書令鳳翔尹上柱國岐王食邑四千五百戶李茂貞為興元尹山南西道節度等使以中書侍郎同平章事徐彥若檢校尚書左僕射同平章事兼鳳翔尹充鳳翔隴州節度使時茂貞恃兵求兼領山南節度昭宗久之不行茂貞表章不遜深詆時政上不能容將加兵問罪故以彥若代之八月丙申朔以嗣覃王為京西招討使神策大將軍李鐬副之九月丙寅朔以武勝軍防禦使錢鏐為鎮海軍節度浙江西道觀察處置等使仍移鎮海軍額於杭州乙亥覃王率扈駕五十四軍進攻岐陽屯于興平李茂貞以兵逆戰屯于盩厔壬午岐軍進迫興平王師自潰茂貞乘勝逼京師進屯三橋甲申昭宗御安福門斬觀軍容使西門君遂內樞密使李周潼遣中使賜茂貞詔令收兵歸鎮茂貞陳兵臨臯驛數宰臣杜讓能之罪請誅之制貶太尉平章事晉國公杜讓能為雷州司戶十月乙未賜杜讓能自盡其弟戶部侍郎弘徽坐讓能賜死十一月制以鳳翔節度使李茂貞守中書令進封秦王兼興元尹山南西道節度使邠州節度使王行瑜賜號尚父賜鐵券以門下侍郎吏部尚書平章事監修國史崔昭緯兼尚書左僕射充諸道鹽鐵轉運等使以特進行右僕射韋昭度為司空門下侍郎同平章事弘文館大學士太清宮使延資庫使中書侍郎刑部尚書平章事判度支鄭延昌罷知政事守尚書左僕射以病求罷故也以新除鳳翔節度使徐彥若復知政事戶部侍郎判戶部事王摶本官同平章事乾寧元年春正月乙丑朔上御武德殿受朝宣制大赦改元乾寧鳳翔李茂貞來朝大陳兵衛獻妓女三十人宴之內殿數日還藩時茂貞有山南梁洋興鳳岐隴秦涇原等十五餘郡甲兵雄盛淩弱王室頗有問鼎之志二月汴人大敗兗鄆之軍於東阿瑄瑾勢蹙求援於太原李克用出師援之三月甲子朔太原軍攻邢州陷之執其逆將李存孝檻送太原裂之克用以大將馬師素權知邢洺團練事五月蔡賊孫儒部將劉建鋒攻陷潭州自稱湖南節度使以翰林學士中書舍人陸扆為戶部侍郎知制誥充職六月壬辰李克用攻陷雲州執大同防禦使赫連鐸以其牙將薛志勤守雲中十月庚寅以中書侍郎平章事王摶為湖南節度使以翰林學士承旨禮部尚書知制誥李磎為戶部侍郎同平章事宣制之日水部郎中知制誥劉崇魯出班而泣言磎姦邪黨附內官不可居輔弼之地由是制命不行戊申制御史中丞崔胤為兵部侍郎同平章事是月李克用以太原之衆進攻幽州十二月幽州節度使李匡籌潰圍而遁克用陷幽州以李匡威故將劉仁恭為幽州兵馬留後是月李匡籌南奔赴關至景城為滄州節度使盧彥威所殺二年春正月己未朔河中節度使檢校太師中書令河中尹上柱國琅邪郡王王重盈卒三軍立重榮子行軍司馬珂知留後事二月己丑朔王重盈子陝州節度使珙絳州刺史瑤舉兵討王珂兼上章訴珂冒姓非重榮子珂珙爭為蒲帥上遣中使慰勞三月制以中書侍郎同平章事崔胤檢校尚書左僕射同平章事河中尹充河中節度晉絳慈隰觀察處置等使浙東節度使董昌僭號稱羅平國年稱大聖用婺州刺史蔣瓌為宰相仍偽署官員鎮海軍節度使錢鏐請以本軍進討從之以翰林學士承旨兵部侍郎知制誥趙光逢為尚書左丞依前充職太原李克用上章言王重榮有功於國其子珂宜承襲請賜節鉞邠州王行瑜鳳翔李茂貞華州韓建各上章言珂螟蛉不宜纘襲請以王珂為陝州王珙為河中天子以先允克用之奏久之不下五月丁巳朔甲子李茂貞王行瑜韓建等各率精甲數千人入覲京師大恐人皆亡竄吏不能止昭宗御安福門以俟之三帥既至拜舞樓下昭宗臨軒自諭之曰卿等藩侯宜存臣節稱兵入朝不由奏請意在何也茂貞行瑜汗流洽背不能對唯韓建陳入覲之由上並召升樓賜之巵酒宴之於同文殿茂貞行瑜極言南北司相傾深蠹時政請誅其太甚者乃貶宰相韋昭度李磎尋殺之於都亭驛殺內官數人而去王行瑜留弟行約茂貞留假子閻圭各以兵二千人宿衛時三帥同謀廢昭宗立吉王聞太原起軍乃止留兵宿衛而還壬申以責授均州司戶孔緯繡州司戶張濬並為太子賓客以翰林學士戶部侍郎知制誥陸扆為兵部侍郎充職六月丁亥朔以京兆尹嗣薛王知柔兼戶部尚書判度支兼諸道鹽鐵轉運等使壬辰以太子賓客孔緯為吏部尚書尋復開府儀同三司守司空門下侍郎同平章事弘文館大學士太清宮延資庫使上柱國魯郡開國公食邑四千戶食實封二百戶仍號持危啓運保乂功臣時緯在華州尋屬太原軍至而止以太子賓客張濬復光祿大夫行兵部尚書上柱國河間郡開國侯食邑二千戶濬在長水亦不至京師復以王摶為中書侍郎平章事七月丙辰朔李克用舉軍渡河以討王行瑜李茂貞韓建等稱兵詣闕之罪庚申同州節度使王行實棄郡入京師謂兩軍中尉駱全瓘劉景宣曰沙陀十萬至矣請奉車駕幸邠州且有城守時景宣附鳳翔癸亥夜閻圭與劉景宣子繼晟同州王行實縱火剽東市請上出幸上聞亂登承天門遣諸王率禁兵禦之捧日都頭李筠率本軍侍衛樓上閻圭以鳳翔之卒攻李筠矢及御座之樓扉上懼下樓與親王公主內人數百幸永興坊李筠營扈蹕都頭李君實以兵繼至乃與筠兩都兵士侍衛出啓夏門憩於華嚴寺以候內人繼至其日晚幸莎城鎮京師士庶從幸者數十萬比至南山谷口暍死者三之一至暮為盜寇掠慟哭之聲殷動山谷權令京兆尹知柔中書事及隨駕置頓使信宿宰相徐彥若王摶崔胤三人至乃移石門鎮之佛宮仍令知樞密劉光裕薛王知柔歸京師制置合禁軍以備宮禁丙寅李克用遣牙將閻諤奉表奔問奏屯軍河中候進止發赴邠州丁卯上遣內官張承業傳詔克用軍便令監太原行營兵馬發赴新平又令內官郤廷立傳詔涇州令張鐇起涇原之師會克用軍上在南山半月餘克用仍在河中未至渭北上懼鳳翔兵士劫遷乃令延王將御服鞍馬玉器等至河中宣諭曰朕以景宣全瓘行實繼鵬為表𩹉之姦謀縱干戈於雙闕煙塵倏忽劫殺縱橫朕偶脫鋒鋩遂移輦輅所為巡幸止在近郊蓋知卿統領雄師駐臨蒲坂纍飛書詔繼遣使人期卿以社稷為憂君親在念必思響應速議龔行豈謂將涉兩旬未有來表憂虞是切寢食不遑豈忠義不切疚懷而道途或有阻滯今則專令親信懇託勳賢故遣延王戒丕丹王允與供奉官王魯紆等宣示卿宜便董貔貅徑臨邠鳳蕩平妖穴以拯阽危是所望也八月乙酉朔延王至河中克用已發前鋒至渭北又令史儼率五百騎赴行在侍衛己丑克用自至渭橋寨癸巳於梨園殺邠軍數千獲其大將王令陶以獻又詔鄜州節度使李思孝本軍進討丁酉制以河東節度使開府儀同三司守太師中書令兼太原尹北都留守上柱國隴西郡王李克用為邠寧四面行營都招討使夏州節度使李思諫充邠寧東北面招討使涇原節度使張鐇充邠寧西面招討使河中節度使王珂充行營供軍糧料使李茂貞聞之懼斬閻圭武禿子傳首行在上章請罪辛丑制削奪王行瑜在身官爵改授李克用邠寧四面行營都統其大將蓋寓李存信閻鍔判官王讓李襲吉等並降詔錫賚又以河中都監袁季貞充邠寧四面行營兵馬都監押壬寅李克用遣子存貞奉表行在請車駕還宮答詔曰昨延王回言卿憂時體國執禮輸忠接遇之間周旋盡節備知肺腑識我恩榮靜惟尊主之心果契知臣之分朕欲取今月二十四日却復都城冀寧兆庶倚我勳德有若長城速伸翦蕩之謀以慰黔黎之望癸卯又令延王傳詔令克用發騎軍三千赴三橋屯駐以備回鑾辛亥車駕還宮壬子司空門下侍郎平章事監修國史諸道鹽鐵轉運使崔昭緯罷知政事為太子賓客以河中兵馬留後王珂檢校司空兼河中尹御史大夫充護國軍節度河中晉絳慈隰觀察等使以幽州兵馬留後劉仁恭檢校司空兼幽州大都督府長史充幽州盧龍軍節度押奚契丹等使以故左軍中尉楊復恭開府魏國公並從克用奏請也九月甲寅朔丙辰制光祿大夫守尚書左僕射門下侍郎同平章事監修國史上柱國東莞郡公徐彥若為司空門下侍郎同平章事太清宮修奉太廟等使弘文館大學士延資庫使充諸道鹽鐵轉運等使正議大夫中書侍郎同平章事王摶為金紫光祿大夫戶部尚書門下侍郎監修國史判度支正議大夫中書侍郎同平章事崔胤為金紫光祿大夫兼禮部尚書集賢殿大學士判戶部事並賜號扶危匡國致理功臣癸亥司空門下侍郎平章事太清宮修奉太廟等使弘文館大學士延資庫使上柱國魯郡開國公孔緯卒贈太尉十月甲申朔王師破賊梨園寨俘斬萬計行瑜由是嬰城自固丁亥制赦繫囚其節文曰其有任崇柱石位重台衡或委以軍權或參諸宥密竟因連謗終至禍名鬱我好生嗟乎強死應大順已來有非罪而加削奪者並復官資其杜讓能西門君遂李周潼已下並與昭雪還其爵秩韋昭度頃處台司每伸相業王行瑜求尚書令獨能抑之致於沉冤諒由此事李磎文章宏贍迥出輩流竟以朋黨之間擠於死地凡在有識孰不咨嗟宜並與昭洗仍復官爵又敕太子賓客崔昭緯責授梧州司馬水部郎中知制誥劉崇魯貶崖州司戶又詔邠州行營都統曰邠州節度副使崔鋋破賊之時勿令漏網鋋與昭緯去年朋黨交結行瑜構合禍胎原由此賊付四面行營知委是月四面行營大集邠州十一月癸未朔壬寅王行瑜與其妻子部曲五百餘人潰圍出奔至慶州行瑜為部下所殺並其家二百口並詣行營乞降李克用遣牙將閻鍔獻于京師十二月甲申朔昭宗御延喜門受俘馘百僚樓前稱賀制以李克用守太師中書令進封晉王食邑九千戶改賜忠貞平難功臣是月克用班師太原制皇第三子祤封棣王第五子禊封虔王第六子禋封沂王第七子禕封遂王三年春正月癸丑朔制以特進戶部尚書兼京兆尹嗣薛王知柔檢校司徒兼廣州刺史御史大夫充清海軍節度嶺南東道觀察處置等使以尚書右丞崔澤為鳳州刺史魏博羅弘信擊敗太原軍於莘縣初兗鄆求援于太原克用令蕃將史完府何懷寶等千騎赴之至是又令大將李存信屯于莘縣魏人常假其道存信戢軍不謹或侵撓魏民弘信怒伏兵擊之其軍宵潰自是弘信南結于梁與太原絶兗鄆已至俱陷二月壬子朔制以通王滋為開府儀同三司判侍衛諸道軍事以銀青光祿大夫戶部尚書嘉興縣子食邑五百戶陸扆為兵部尚書三月壬子朔以考功員外郎集賢殿學士杜德祥為工部郎中知制誥四月壬午朔湖南軍亂殺其帥劉建鋒三軍立其部將權知邵州刺史馬殷為兵馬留後鎮海軍節度使錢鏐攻越州下之斬董昌平浙東制加錢鏐檢校太尉中書令五月辛巳責授梧州司馬崔昭緯賜自盡制金紫光祿大夫戶部尚書門下侍郎平章事監修國史上柱國太原郡開國公王摶為檢校尚書左僕射同平章事兼越州刺史充鎮東軍節度浙江東道觀察處置等使六月庚戌李克用率沙陀並汾之衆五萬攻魏州及其郛大掠於其六郡陷成安洹水臨漳十餘邑報莘之怨也鳳翔李茂貞怨國家有朱玫之討絶朝貢謀將犯闕天子命覃王治兵以俟變是月茂貞上章請以兵師入覲上令通王覃王延王分統安聖捧宸保寧宣化等四軍以衛近畿丙寅鳳翔軍犯京畿覃王拒之於婁館接戰不利秋七月庚辰朔壬辰岐軍逼京師諸王率禁兵奉車駕將幸太原癸巳次渭北華州韓建遣子充奉表起居請駐蹕華州乃授建京畿都指揮安撫制置催促諸道綱運等使詔謂建曰啓途之行已在河東今且幸鄜畤甲午次富平韓建來朝泣奏曰藩臣倔強非止茂貞雖太原勤王無宜巡幸臣之鎮守控扼關畿兵力雖微足以自固陛下若輕捨近畿遠巡極塞去園陵宗廟寧不痛心失魏闕金湯又非良算若輿駕渡河必難再復謀苟不臧悔之寧及願陛下且駐三峯以圖恢復上亦泣下曰朕難奈茂貞忿不思難卿言是也乙未次下邽丙申駐蹕華州以衙城為行宮時岐軍犯京師宮室廛閭鞠為灰燼自中和已來葺構之功掃地盡矣乙巳制以金紫光祿大夫中書侍郎兼禮部尚書同平章事集賢殿大學士判戶部事上柱國博陵縣開國伯崔胤檢校尚書左僕射兼廣州刺史御史大夫充清海軍節度嶺南東道觀察處置等使丙午制以翰林學士承旨尚書左丞知制誥嘉興縣開國子食邑五百戶陸扆為戶部侍郎同平章事八月己酉朔甲寅新除鎮東軍節度使錢鏐權領浙江東道軍州事戊午制以戶部侍郎平章事陸扆為中書侍郎兼判戶部事九月己卯朔汴州朱全忠河南尹張全義與關東諸侯俱上表言秦中有災請車駕遷都洛陽全忠全義言臣已表率諸藩繕治洛陽宮室優詔答之乙未制新除清海軍節度使崔胤復知政事胤之出鎮朱全忠再表請論奏言胤不宜去相位故有是命丁酉制中書侍郎集賢殿大學士判戶部事陸扆責授硤州刺史崔胤怒扆代己誣奏扆黨庇茂貞故也丙午制以鎮國軍節度使韓建檢校太尉兼中書令充修復宮闕京畿制置催促諸道綱運等使以京兆尹孫偓為兵部侍郎同平章事十月戊申朔以中書舍人權知禮部貢舉薛昭緯為禮部侍郎壬子制以兵部侍郎平章事孫偓為中書侍郎充鳳翔行營招討使甲寅偓於驛舍會諸將以議進軍戊午李茂貞上表章請罪願改事君之禮繼修職貢仍獻錢十五萬助修京闕韓建左右之師遂不行十一月丁丑朔以韓建兼領京兆尹京城把截使十二月丁未李克用縱兵俘剽魏博諸郡邑以前翰林學士承旨尚書左丞知制誥趙光遠為御史中丞太常禮院奏權立行廟以備告饗從之四年春正月丁丑朔車駕在華州行宮受羣臣朝賀癸未汴將龐師古陷鄆州節度使朱瑄與妻榮氏潰圍瑄至中都為野人所殺榮氏俘於汴軍朱全忠署龐師古為鄆州兵馬留後宰相孫偓罷知政事守兵部尚書二月丙午朔戊申汴將葛從周攻兗州陷之節度使朱瑾奔楊行密其將康懷貞降從周朱全忠署從周為兗州兵馬留後自是鄆齊曹棣兗沂密徐宿陳許鄭滑濮等州皆沒於全忠唯王師範守青州亦納款於汴己未制朝議大夫守右散騎常侍上柱國滎陽縣男鄭綮為禮部侍郎同平章事癸丑責授硤州刺史陸扆為工部尚書甲寅華州防城將花重武告睦王已下八王欲謀殺韓建移車駕幸河中帝聞之駭然召韓建諭之建辭疾不敢行帝即令通王已下詣建治所自陳建奏曰今日未時睦王濟王韶王通王彭王韓王儀王陳王等八人到臣治所不測事由臣酌量事體不合與諸王相見兼恐久在臣所於事非宜況睦王等與臣中外事殊尊卑禮隔至於事柄未有相侵忽然及門意不可測又引晉室八王撓亂天下事請依舊制令諸王在十六宅不合典兵其殿後捧日扈蹕等軍人皆坊市無賴之徒不堪侍衛伏乞放散以寧衆心昭宗不得已皆從之是日囚八王於別第殿後侍衛四軍二萬餘人皆放散殺捧日都頭李筠於大雲橋下自是天子之衛士盡矣丙辰韓建上表請封拜皇太子親王以為維城之計己未制德王裕宜册為皇太子辛酉制第八男祕可封景王第九男祚可封輝王第十男祺可封祁王第十一男禛可封雅王第十二男祥可封瓊王三月丙子朔戊寅制韓建進封昌黎郡王改賜資忠靖國功臣以光祿大夫兵部尚書上柱國河間郡開國侯食邑二千戶張濬為尚書左僕射依前充租庸使四月丙午朔就加福建節度使王潮檢校尚書右僕射韓建獻封事十條其三太子諸王請置師傅教導乃以太子賓客王牘為諸王侍讀宰相鄭綮以病乞骸乃罷知政事五月乙亥朔以國子博士朱朴為右諫議大夫同平章事七月甲戌帝與學士親王登齊雲樓西望長安令樂工唱御製菩薩蠻詞奏畢皆泣下霑襟覃王已下並有屬和八月甲辰朔以工部尚書陸扆為兵部尚書韓建與邠岐三鎮素有無君之迹及李克用誅行瑜心常切齒去歲車駕將幸河東乃令延王戒丕使太原見克用陳省方之意是月延王自太原還韓建奏曰自陛下即位已來與近輔交惡皆因諸王典兵凶徒樂禍遂致輿駕不安比者臣奏罷兵權實慮有不測之變今聞延王覃王尚苞陰計願陛下宸斷不疑制於未亂即社稷之福也上曰豈至是耶居數日以上無報乃與知樞密劉季述矯制發兵圍十六宅諸王懼披髮沿垣而呼曰官家救兒命或登屋沿樹是日通王覃王已下十一王並其侍者皆為建兵所擁至石堤谷無長少皆殺之而建以謀逆聞尋殺太子詹事馬道殷將作監許巖士貶平章事朱朴皆上所寵昵者九月癸酉朔以御史中丞狄歸昌為尚書右丞以刑部侍郎楊涉為吏部侍郎制以鎮海軍節度使錢鏐為鎮海軍節度浙江東西道觀察處置等使杭州越州刺史上柱國吳王冬十月癸卯朔以華州節度使韓建兼同州刺史匡國軍節度使朱全忠遣其將權徐州兵馬留後龐師古兗州留後葛從周率兗鄆曹濮徐宿滑等兵士七萬渡淮討楊行密制以太中大夫前御史中丞裴贄為禮部尚書知貢舉幽州節度使劉仁恭大敗沙陀於安塞李克用單騎僅免十一月壬申朔癸酉淮南大將朱瑾潛出舟師襲汴軍於清口龐師古舉軍皆沒師古被執時葛從周自霍丘渡淮至濠州聞師古敗乃退軍信宿至卑河方渡而朱瑾至是日殺傷溺死殆盡還者不滿千人唯牛存節一軍先渡獲免比至潁州大雪寒凍死者十五六自古喪師之甚無如此也由是行密據有江淮之間以檢校司空權知兗州兵馬事葛從周為兗州刺史充泰寧軍節度使以潁州刺史王敬蕘檢校尚書左僕射兼徐州刺史充武寧軍節度使從全忠奏也光化元年春正月辛未朔車駕在華州以兵部侍郎崔遠為戶部侍郎同平章事諸道貢修宮闕錢命京兆尹韓建入京城計度朱全忠遣判官韋震奏事求兼領鄆州時全忠軍敗之後欲自大其權以扼鄰藩之變幽州節度使劉仁恭恃安塞之捷欲吞噬河朔是月遣其子守文將兵襲滄州節度使盧彥威棄城而遁守文遂據之自稱留後四月庚子制淑妃何氏宜册為皇后上幸陟屺寺宴從官於韓建所獻御莊五月己巳朔以立后大赦汴將葛從周率衆攻李克用邢洺磁等州陷之全忠署從周為三州兵馬留後六月己亥帝幸西溪觀競渡天下藩牧文武百僚上表請車駕還京七月汴將氏叔琮陷趙匡凝之隨唐鄧等州敕升華州為興德府刺史為尹左右司馬為少尹鄭縣為次赤官員資望一同五府封華嶽廟為佑順侯八月戊戌朔己未車駕自華還京師甲子御端門大赦改元光化九月戊辰朔以御史中丞狄歸昌為尚書左丞制以鎮國匡國等軍節度使韓建守太傅中書令興德尹封潁川郡王賜鐵券並御寫忠貞以遺之建纍上表辭王爵乃改封許國公魏博節度使羅弘信進封臨清郡王是月弘信卒贈太師諡曰莊肅衙軍立其子副大使紹威知兵馬事尋賜之節鉞十月丁酉朔河南尹張全義就加侍中汴將朱友恭自江西行營還過安州殺刺史武渝遣部將守之汴將張存敬以兵襲蔡州刺史崔洪納款請以弟賢質于汴許之十二月丙寅李克用將潞州節度使薛志勤死澤州刺史李罕之乘其無帥襲潞取之遣其子皓乞降于汴全忠表罕之為節度使二年春正月乙未朔丁未以兵部尚書陸扆為兵部侍郎同平章事二月蔡州刺史崔洪為衙兵所迫同竄淮南時洪以弟賢質于汴汴人遣賢還蔡徵兵三千出征蔡兵亂殺賢遂擁洪渡淮朱全忠令其子友裕守蔡州幽州節度使劉仁恭驅燕軍十萬將兼趙魏是月陷貝州人無少長皆屠之投尸清水為之不流遂進攻魏州羅紹威求救于汴三月朱全忠遣大將張存敬率師援之屯于內黃葛從周自邢洺率徑騎八百入魏州燕將劉守文單可及聞汴軍在內黃引軍往擊之存敬設伏內黃東大敗燕軍俘斬三萬生擒單可及劉守文以餘衆還魏州為存敬從周所乘燕軍復敗仁恭父子僅免汴魏合兵躡之趙人復邀之東境自魏至滄五百里間僵尸相枕是春有白氣竟天如練自西南徹東北而旋有燕卒之敗四月汴將氏叔琮由上黨進軍攻太原出石會為沙陀擒其前鋒將陳章叔琮乃退去六月制以昭義節度使檢校太尉兼太師侍中潞州大都督府長史隴西郡開國公食邑三千戶李罕之為孟州刺史充河陽三城節度孟懷觀察等使以檢校司徒孟州刺史河陽節度使丁會為澤潞等節度使從全忠奏也丁丑李罕之至懷州卒于傳舍陝州軍亂殺其帥王珙立都將軍李璠為留後丁亥制以前太常卿劉崇望為吏部尚書兵部侍郎裴樞為吏部侍郎戶部侍郎薛昭緯為兵部侍郎七月青州守海州將牛從毅擁郡人投淮南行密遂有海州十一月陝州衙將朱簡殺李璠自稱留後降汴全忠表簡為帥守三年春正月庚子朔以禮部尚書裴贄為刑部尚書癸卯朱全忠奏本貫宋州碭山縣蒙恩升為輝州其地卑濕難葺廬舍請移輝州治所於單父縣從之仍賜號為崇德軍四月戊午汴魏合軍攻滄州以報入郛之役葛從周連陷滄德郡邑王鎔遣使和解于全忠令劉仁恭修好汴魏班師辛未皇后太子謁九廟六月丁巳朱全忠表陝州兵馬留後朱簡鄉里同宗改名友謙乞真授節鉞從之戊辰特進司空門下侍郎平章事監修國史王摶貶崖州司戶尋賜死於藍田驛樞密使宋道弼景務修並死為崔胤所誣言三人中外相結也七月丁亥朔兵部尚書劉崇望卒贈司空甲午兵部郎中薛正表為右諫議大夫以許州刺史朱友恭檢校司徒為潁州刺史以左武衛將軍趙霖檢校左僕射為許州刺史宣武押衙劉知俊檢校右僕射為鄭州刺史從全忠奏也戊申制以武貞軍節度澧朗等州觀察處置等使開府儀同三司檢校司徒同平章事朗州刺史上柱國馮翊郡開國侯食邑一千五百戶雷滿檢校太保封馮翊郡王餘如故以武泰軍節度黔中觀察處置等使光祿大夫檢校尚書左僕射黔州刺史御史大夫上柱國趙崇封天水縣開國子食邑五百戶庚戌制昭義節度留後光祿大夫檢校司空上柱國孟遷為檢校司徒兼潞州大都督府長史充昭義節度副大使知節度事潞磁邢洺等州觀察處置使仍封平昌縣男食邑三百戶從李克用奏也以金紫光祿大夫守兵部尚書上柱國樂安郡開國公食邑一千五百戶孫儲守兵部尚書兼京兆尹乙卯制忠烈衛聖鎮國功臣劍南西川節度副