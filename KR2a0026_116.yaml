body:
  text: 舊唐書卷一百一十二列傳第六十二李暠族弟齊物齊物子復暠族弟若水李麟李國貞子錡李峘弟嶧峴李巨子則之李暠淮安王神通玄孫清河王孝節孫也暠少孤事母甚謹睿宗時累轉衞尉少卿丁憂去職在喪柴毀家人密親未嘗窺其言笑開元初授汝州刺史為政嚴簡州境肅然與兄昇弟暈尤相篤睦昇等每月自東都省暠往來微行州人不之覺其清慎如此俄入授太常少卿三遷黃門侍郎兼太原尹仍充太原已北諸軍節度使太原舊俗有僧徒以習禪為業及死不殮但以屍送近郊以飼鳥獸如是積年土人號其地為黃坑側有餓狗千數食死人肉因侵害幼弱遠近患之前後官吏不能禁止暠到官申明禮憲期不再犯發兵捕殺羣狗其風遂革久之轉太常卿旬日拜工部尚書東都留守開元二十一年正月制曰繼好之義雖屬邊鄙受命以出必在親賢事欲重於當時禮故崇於殊俗選衆之舉無出宗英工部尚書李暠體含柔嘉識致明允為公族之領袖是朝廷之羽儀金城公主既在蕃中漢庭公卿非無專對有懷於遠夫豈能忘宜持節充入吐蕃使准式發遣以國信物一萬匹私覿物二千匹皆雜以五綵遣之及還金城公主上言請以今年九月一日樹碑於赤嶺定蕃漢界樹碑之日詔張守珪李行褘與吐蕃使莽布支同往觀焉既而吐蕃遣其臣隨漢使分往劍南及河西磧西歷告邊州曰兩國和好無相侵掠漢使告亦如之以暠奉使稱職轉吏部尚書時吏部告身印與曹印文同行用參雜難以區分暠奏請准司勳兵部印文例加官告兩字至今行之暠風儀秀整所歷皆以威重見稱朝廷稱其有宰相之望累封武都縣伯俄為太子少傅病卒年六十餘贈益州大都督齊物淮安王神通子鹽州刺史銳孫也齊物無學術在官嚴整開元二十四年後歷懷陝二州刺史齊物天寶初開砥柱之險以通流運於石中得古鐵犂鏵有平陸字改河北縣為平陸縣加齊物銀青光祿大夫為鴻臚卿河南尹齊物與右相李適之善適之為林甫所構貶官齊物坐謫竟陵太守入為司農鴻臚卿至德初拜太子賓客遷刑部尚書鳳翔尹太常卿京兆尹為政發官吏陰事以察為能於物少恩而清廉自飭人吏莫敢抵犯晚年除太子太傅兼宗正卿上元二年五月卒輟朝一日詔曰故金紫光祿大夫太子太傅兼宗正卿齊物宗室珪璋士林楨幹清廉獨斷剛毅不羣歷踐周行備經中外威名益振忠效彌彰三尹神州一登會府擒姦掩鈎距之術恤獄正喉舌之官遂令調護儲闈再登師傅從容賓友師長官僚桑榆之時壯志逾勵松柏之性晚歲常堅天不憖遺奄然殂謝念親感舊深軫于懷宜錫寵章載光營魄可贈太子太師子復字初陽以父蔭累官至江陵府司錄精曉吏道衞伯玉厚遇之府中之事多以咨委性苛刻為伯玉所信奏為江陵縣令遷少尹歷饒州蘇州刺史皆著政聲李希烈背叛荊南節度張伯儀數出兵為希烈所敗朝廷憂之以復久在江陵得軍民心復方在母喪起為江陵少尹兼御史中丞充節度行軍司馬伯儀既受代以復為容州刺史兼御史中丞充本管招討使加檢校常侍先時西原叛亂前後經略使征討反者獲其人皆沒為官奴婢配作坊重役復乃令訪其親屬悉歸還之在容州三歲南人安悅遷廣州刺史兼御史大夫嶺南節度觀察使會安南經略使高正平張應相次卒官其下參佐偏裨李元度胡懷義等阻兵黷亂州縣姦贓狼藉復誘懷義杖殺之奏元度流於荒裔又勸導百姓令變茅屋為瓦舍瓊州久陷於蠻獠中復累遣使喻之因奏置瓊州都督府以綏撫之復曉於政道所在稱理徵拜宗正卿加檢校工部尚書未一歲會華州節度李元諒卒以復為華州刺史潼關防禦鎮國軍使仍檢校戶部尚書兼御史大夫貞元十年鄭滑節度使李融卒軍中潰亂以復檢校兵部尚書兼滑州刺史義成軍節度鄭滑觀察營田等使兼御史大夫復到任置營田數百頃以資軍食不率於民衆皆悅之十二年加檢校左僕射十三年四月卒官年五十九廢朝三日贈司空賻布帛米粟有差復久典方面積財頗甚為時所譏若水齊物族弟累官至左金吾大將軍兼通事舍人容貌甚偉在館三十年多識舊儀每宣勞贊導周旋俯仰有可觀者建中元年八月卒李麟皇室之疏屬太宗之從孫也父濬開元初置十道按察使精選吏才以濬為潤州刺史江南東道按察使轉虢潞二州刺史益州大都督府長史攝御史大夫劍南節度按察使所歷以誠信待物稱為良吏八年卒贈戶部尚書諡曰誠麟以父任補職累授京兆府戶曹開元二十二年舉宗室異能轉殿中侍御史歷戶部考功吏部三員外郎天寶元年遷郎中尋改諫議大夫五載充河西隴右磧西等道黜陟使稱旨遷給事中七載遷兵部侍郎同列楊國忠專權不悅麟同職宰臣奏麟以本官權知禮部貢舉俄而國忠為御史大夫麟復本官十一載遷銀青光祿大夫國子祭酒十四年七月以本官出為河東太守河東道採訪使為政清簡民吏稱之其年冬祿山構逆朝廷以麟儒者恐非禦侮之用乃以將軍呂崇賁代還復以祭酒歸朝賜爵渭源縣男六月玄宗幸蜀麟奔赴行在既至成都拜戶部侍郎兼左丞遷憲部尚書至德二年正月拜同中書門下平章事時扈從宰相韋見素房琯崔渙已赴鳳翔俄而崔圓繼去玄宗以麟宗室子獨留之行在百司麟總攝其事其年十一月從上皇還京策勳行賞加金紫光祿大夫刑部尚書同中書門下三品進封褒國公時張皇后干預朝政殿中監李輔國以翊衞肅宗之勞判天下兵馬事充元帥府行軍司馬勢傾同朝宰相苗晉卿崔圓已下懼其威權傾心事之唯麟正身謹事無所依附輔國不悅乾元元年罷麟知政事守太子少傅二年八月卒時年六十六贈太子太傅賻絹二百匹葬日詔京兆府差官護送官給所須麟好學能文嘗編聚皇朝已來制集五十卷行於時李國貞淮安王神通子淄川王孝同之曾孫父廣業劍州長史國貞本名若幽性剛正有吏才歷安定扶風錄事參軍皆稱職乾元中累遷長安令尋拜河南尹會史思明逼城元帥李光弼東保河陽國貞領官吏寓于陝數月徵為京兆尹上元初改成都尹兼御史大夫充劍南節度使入為殿中監二年八月遷戶部尚書兼御史大夫持節充朔方鎮西北庭興平陳鄭等節度行營兵馬及河中節度都統處置使鎮于絳賜名國貞既至又加充管內河中晉絳慈隰沁等州觀察處置等使餘並如故國貞既至絳屬軍中素無儲積百姓飢饉難為聚斂將士等糧賜多闕國貞頻以狀聞未報軍中諠諠怨讟左右以告國貞國貞喻之曰軍將何苦如是已為奏聞終有所給信宿軍亂攻國貞夜燒衙城門國貞莫知所圖左右勸國貞棄城遁去國貞曰吾銜命為將不能靖難安可棄城乎左右固勸迴避乃隱於州獄詐負縲紲會國貞麾下為賊所擒因指所在遂於獄中執國貞將害之國貞曰軍中乏糧已有陳請人不堪賦予無負於將士耳衆引退突將王元振獨曰今日之事豈須問焉抽刀害國貞及二男三大將國貞有風采清白守法為政急於操下時論以辨吏稱之追贈揚州大都督子錡以父蔭貞元中累至湖杭二州刺史多以寶貨賂李齊運由是遷潤州刺史兼鹽鐵使持積財進奉以結恩澤德宗甚寵之錡恃恩驕恣有浙西人布衣崔善貞詣闕上封論錡罪狀而德宗械送賜錡錡遂坑殺善貞天下切齒乃增置兵額選善弓矢者聚之一營名曰挽硬隨身以胡奚雜類虬鬚者為一將名曰蕃落健兒德宗復於潤州置鎮海軍以錡為節度使罷其鹽鐵使務錡雖罷其利權且得節度反狀未發憲宗即位已二年諸道倔強者入朝而錡不自安亦請入朝乃拜錡左僕射錡乃署判官王澹為留後既而遷延發期澹與中使頻喻之不悅遂諷將士以給冬衣日殺澹而食之監軍使聞亂遣衙將趙琦慰喻又臠食之復以兵注中使之頸錡佯驚救解之囚於別館遂稱兵室五劍分授管內鎮將令殺刺史於是常州刺史顏防用客李雲謀矯制傳檄于蘇杭湖睦等州遂殺其鎮將李深湖州辛秘亦殺其鎮將趙惟忠而蘇州刺史李素為鎮將姚志安所繫釘於船舷生致於錡未至而錡敗得免初錡以宣州富饒有并吞之意遣兵馬使張子良李奉仙田少卿領兵三千分略宣池等州三將夙有向順志而錡甥裴行立亦思向順其密謀多決於行立乃迴戈趣城執錡於幕縋而出之斬於闕下年六十七其挽硬蕃落將士或投井自縊紛紛枕藉而死者不可勝紀宰相鄭絪等議錡所坐親疏未定乃召兵部郎中蔣武問曰詔罪李錡一房當是大功內耶武曰大功是錡堂兄弟即淮安王神通之下淮安有大功於國不可以孽孫而上累又問錡親兄弟從坐否武曰錡親兄弟是若幽之子若幽有死王事之功如令錡兄弟從坐若幽即宜削籍亦所未安宰相頗以為然故誅錡詔下唯止元惡一房而已李峘太宗第三子吳王恪之孫恪第三子琨生信安王褘褘生三子峘嶧峴峘志行修立天寶中為南宮郎歷典諸曹十餘年居父喪哀毀得禮服闋以郡王子例封趙國公楊國忠秉政郎官不附己者悉出於外峘自考功郎中出為睢陽太守尋而弟峴出為魏郡太守兄弟夾河典郡皆以理行稱十四載入計京師屬祿山之亂玄宗幸蜀峘奔赴行在除武部侍郎兼御史大夫俄拜蜀郡太守劍南節度採訪使上皇在成都健兒郭千仞夜謀亂上皇御玄英樓招諭不從峘與六軍兵馬使陳玄禮等平之以功加金紫光祿大夫時峴為鳳翔太守匡翊肅宗兄弟俱効勳力從上皇還京為戶部尚書峴為御史大夫兼京兆尹封梁國公兄弟同制封公乾元初兼御史大夫持節都統淮南江南江西節度宣慰觀察處置等使二年以宋州刺史劉展握兵河南有異志乃陽拜展淮南節度使而密詔揚州長史鄧景山與峘圖之時展徒黨方強既受詔即以兵渡淮景山峘拒之壽春為展所敗峘走渡江保丹陽坐貶袁州司馬寶應二年病卒於貶所追贈揚州大都督官給遞乘護柩還京初峘為戶部尚書峴為吏部尚書知政事嶧為戶部侍郎銀青光祿大夫兄弟同居長興里第門列三戟兩國公門十六戟一三品門十二戟榮耀冠時嶧位終蜀州刺史峴樂善下士少有吏幹以門蔭入仕累遷高陵令政術知名特遷萬年令河南少尹魏郡太守入為金吾將軍遷將作監改京兆府尹所在皆著聲績天寶十三載連雨六十餘日宰臣楊國忠惡其不附己以雨災歸咎京兆尹乃出為長沙郡太守時京師米麥踊貴百姓謠曰欲得米粟賤無過追李峴其為政得人心如此至德初朝廷務收才傑以清寇難峴召至行在拜扶風太守兼御史大夫至德二年十二月制曰銀青光祿大夫守禮部尚書李峴饋軍周給開物成務可光祿大夫行御史大夫兼京兆尹封梁國公乾元二年制曰李峴朝廷碩德宗室藎臣可中書侍郎同中書門下平章事與呂諲李揆第五琦同拜相峴位望稍高軍國大事諸公莫敢言皆獨決於峴由是諲等銜之初李輔國判行軍司馬潛令官軍於人間聽察是非謂之察事忠良被誣構者繼有之須有追呼諸司莫敢抗御史臺大理寺重囚在獄推斷未了牒追就銀臺不問輕重一時釋放莫敢違者每日於銀臺門決天下事須處分便稱制敕禁中符印悉佩之出入縱有敕輔國押署然後施行及峴為相叩頭論輔國專權亂國上悟賞峴正直事並變革輔國以此讓行軍司馬請歸本官察事等並停由是深怨峴鳳翔七馬坊押官先頗為盜劫掠平人州縣不能制天興縣令知捕賊謝夷甫擒獲決殺之其妻進狀訴夫冤輔國先為飛龍使黨其人為之上訴詔監察御史孫鎣推之鎣初直其事其妻又訴詔令御史中丞崔伯陽刑部侍郎李曄大理卿權獻三司訊之三司與鎣同妻論訴不已詔令侍御史毛若虛覆之若虛歸罪於夷甫又言伯陽等有情不能質定刑獄伯陽怒使人召若虛詞氣不順伯陽欲上言之若虛先馳謁告急於肅宗云已知卿出去若虛奏曰臣出即死上因留在簾內有頃伯陽至上問之伯陽頗言若虛順旨附會中人上怒叱出之伯陽貶端州高要尉權獻郴州桂陽尉鳳翔尹嚴向及李曄皆貶嶺下一尉鎣除名長流播州峴以數人咸非其罪所責太重欲理之遂奏若虛希旨用刑不守國法陛下若信之重輕是無御史臺上怒峴言出峴為蜀州刺史時右散騎常侍韓擇木入對上謂之曰峴欲專權耶何乃云任毛若虛是無御史臺也令貶蜀州刺史朕自覺用法太寬擇木對曰峴言直非專權陛下寬之祇益聖德爾代宗即位徵峴為荊南節度江陵尹知江淮選補使入為禮部尚書兼宗正卿屬鑾輿幸陝峴由商山路赴行在既還京師拜峴為黃門侍郎同中書門下平章事故事宰臣不于政事堂邀客時海內多務宰相元載等見中官傳詔命至中書者引之升政事堂仍置榻待之峴為宰相令去其榻奏請常參官各舉堪任諫官憲官者不限人數初收東京受偽官陳希烈已下數百人崔器希旨深刻奏皆處死上意亦欲懲勸天下欲從器議時峴為三司使執之曰夫事有首從情有輕重若一概處死恐非陛下含弘之義又失國家惟新之典且羯胡亂常無不凌據二京全陷萬乘南巡各顧其生衣冠蕩覆或陛下親戚或勳舊子孫皆置極法恐乖仁恕之旨昔者明王用刑殲厥渠魁脅從罔理況河北殘寇未平官吏多陷苟容漏網適開自新之路若盡行誅是堅叛逆之黨誰人更圖効順困獸猶鬬況數萬人乎崔器呂諲皆守文之吏不識大體殊無變通廷議數日方從峴奏全活甚衆其料敵決事皆此類竟為中官所擠罷知政事為太子詹事尋遷吏部尚書知江淮舉選置銓洪州明年改檢校兵部尚書兼衢州刺史永泰二年七月以疾終時年五十八李巨曾祖父虢王鳳高祖之第十四子也鳳孫邕嗣虢王巨即邕之第二子也剛銳果決頗涉獵書史好屬文開元中為嗣虢王天寶五載出為西河太守皇太子杜良娣之妹婿柳勣陷詔獄巨母扶餘氏吉溫嫡母之妹也溫為京兆士曹推勣之黨以徐徵等往來巨家資給之由是坐貶義陽郡司馬六載御史中丞楊慎矜為李林甫王鉷構陷得罪其黨史敬忠亦伏法以巨與敬忠相識坐解官於南賓郡安置又起為夷陵郡太守及祿山陷東京玄宗方擇將帥張言巨善騎射有謀略玄宗追至京師楊國忠素與巨相識忌之謂人曰如此小兒豈得令見人主經月餘日不得見玄宗使中官召入奏事玄宗大悅遂令中官劉奉庭宣敕令宰相與巨語幾亭午方出國忠頗怠對奉庭謂巨曰比來人多口打賊公不爾乎巨曰不知若箇軍將能與相公手打賊乎尋授陳留譙郡太守攝御史大夫河南節度使翌日巨稱官銜奉謝玄宗驚曰何得令攝即日詔兼御史大夫巨奏曰方今艱難恐為賊所詐如忽召臣不知何以取信玄宗劈木契分授之遂以臣兼統嶺南節度使何履光黔中節度使趙國珍南陽節度使魯炅先領三節度事有詔貶炅為果毅以潁川太守來瑱兼御史中丞代之巨奏曰若炅能存孤城其功足以補過則何以處之玄宗曰卿隨宜處置之巨至內鄉趣南陽賊將畢思琛聞之解圍走巨趣何履光趙國珍同至南陽宣敕貶炅削其章服令隨軍効力至日晚以恩命令炅復位至德二年為太子少傅十月收西京為留守兼御史大夫三年夏四月加太子少師兼河南尹充東京留守判尚書省事充東畿採訪等使於城市橋梁稅出入車牛等錢以供國用頗有乾沒士庶怨讟後與妃張氏不睦張氏即皇后從父妹也宗正卿李遵構之發其所犯贓賄貶為遂州刺史屬劍南東川節度兵馬使梓州刺史段子璋反以衆襲節度使李奐於綿州路經遂州巨蒼黃修屬郡禮迎之為子璋所殺子則之以宗室歷官好學年五十餘每執經詣太學聽受嗣曹王臯自荊南來朝稱薦之貞元二年自睦王府長史遷左金吾衞大將軍以從父甥竇申追遊無閒親累貶昭州司馬史臣曰暠孝友清慎居官有稱齊物貞廉整肅復節制權謀國貞清白守法皆神通之曾玄宗室之翹楚錡之為逆不累其親前人之積德彰矣當朝之用法明矣然暠發人陰私齊物積財興議國貞急於操下皆尺之短也麟修整峘循良匪躬立事始終無玷者皆宗室之英也峴之剛正才略有足可稱初為國忠所憎終沮朝恩之勢處羣邪之內堅獨正之心是不吐也活東都之命是不茹也庶幾乎仲山甫之道焉巨以剛銳果決亦可嘉焉終以贓賄貪殘良可痛也贊曰宗室賢良枝葉茂盛最尤者誰峴獨守正
