body:
  text: 舊唐書卷三十志第十音樂三貞觀二年太常少卿祖孝孫既定雅樂至六年詔褚亮虞世南魏徵等分制樂章其後至則天稱制多所改易歌辭皆是內出開元初則中書令張説奉制所作然雜用貞觀舊詞自後郊廟歌工樂師傳授多缺或祭用宴樂或郊稱廟詞二十五年太常卿韋縚令博士韋逌直太樂尚沖樂正沈元福郊社令陳虔申懷操等銓前後所行用樂章為五卷以付太樂鼓吹兩署令工人習之時太常舊相傳有宮商角徵羽宴樂五調歌詞各一卷或云貞觀中侍中楊恭仁妾趙方等所銓集詞多鄭衛皆近代詞人雜詩至縚又令太樂令孫玄成更加整比為七卷又自開元已來歌者雜用胡夷里巷之曲其孫玄成所集者工人多不能通相傳謂為法曲今依前史舊例録雅樂歌詞前後常行用者附於此志其五調法曲詞多不經不復載之冬至祀昊天於圓丘樂章八首貞觀二年祖孝孫定雅樂貞觀六年褚亮虞世南魏徵等作此詞今行用降神用豫和上靈眷命兮膺會昌盛德殷薦叶辰良景福降兮聖德遠玄化穆兮天曆長皇帝行用太和穆穆我后道應千齡登三處大得一居貞禮唯崇德樂以和聲百神仰止天下文明登歌奠玉帛用肅和闓陽播氣甄耀垂明有赫圓宰深仁曲成日麗蒼璧煙開紫營聿遵虔享式降鴻禎迎俎入用雍和欽惟大帝載仰皇穹始命田燭爰啓郊宮雲門駭聽雷鼓鳴空神其介祀景祚斯融酌獻飲福用壽和八音斯奏三獻畢陳寶祚惟永暉光日新送文舞出迎武舞入用舒和疊璧凝影皇壇路編珠流彩帝郊前已奏黃鐘歌大呂還符寶曆祚昌年武舞作用凱安昔在炎運終中華亂無象酆郊赤烏見邙山黑雲上大賚下周車禁暴開殷網幽明同叶贊鼎祚齊天壤送神用豫和歌奏畢兮禮獻終六龍馭兮神將升明德感兮非黍稷降福簡兮祚休徵又郊天樂章一首太樂舊有此辭不詳所起送神用豫和蘋蘩禮著黍稷誠微音盈鳳管彩駐龍旗洪歆式就介福攸歸送樂有闋靈馭遄飛則天大聖皇后大享昊天樂章十二首御撰第一太陰凝至化貞耀蘊軒儀德邁娥臺敞仁高姒幄披捫天遂啓極夢日乃升曦第二瞻紫極望玄穹翹至懇罄深衷聽雖遠誠必通垂厚澤降雲宮第三乾儀混成沖邃天道下濟高明闓陽晨披紫闕太一曉降黃庭圓壇敢申昭報方璧冀展虔情丹襟式敷衷懇玄鑒庶察微誠第四巍巍睿業廣赫赫聖基隆菲德承先顧禎符萃眇躬銘開武巖側圖薦洛川中微誠詎幽感景命忽昭融有懷慙紫極無以謝玄穹第五朝壇霧卷曙嶺煙沈爰設筐幣式表誠心筵輝麗璧樂暢和音仰惟靈鑒俯察翹襟第六昭昭上帝穆穆下臨禮崇備物樂奏鏘金蘭羞委薦桂醑盈斟敢希明德聿罄莊心第七鐏浮九醞禮備三周陳誠菲奠契福神猷第八奠璧郊壇昭大禮鏘金拊石表虔誠始奏承雲娛帝賞復歌調露暢韶英第九荷恩承顧託執契恭臨撫廟略靜邊荒天兵曜神武有截資先化無為遵舊矩禎符降昊穹大業光寰宇第十肅肅祀典雍雍禮秩三獻已周九成斯畢爰撤其俎載遷其實或升或降唯誠唯質第十一禮終肆類樂闋九成仰惟明德敢薦非馨顧慙菲奠久駐雲軿瞻荷靈澤悚戀兼盈第十二式乾路闢天扉回日馭動雲衣登金闕入紫微望仙駕仰恩徽景龍三年中宗親祀昊天上帝樂章十首降神用豫和天之曆數歸睿唐顧惟菲德欽昊蒼選吉日兮表殷薦冀神鑒兮降闓陽皇帝行用太和圜鐘宮恭臨寶位肅奉瑤圖恆思解網每軫泣辜德慙巢燧化劣唐虞期我良弼式贊嘉謨告謝圜鐘宮得一流玄澤通三御紫宸遠叶千齡運遐銷九域塵絶瑞駢闐集殊祥絡繹臻年登慶西畝稔歲賀盈囷登歌用肅和無射均之林鐘羽悠哉廣覆大矣曲成九玄著象七曜甄明圭璧是奠醞酎斯盈作樂崇德爰暢咸英迎俎用雍和圜鐘均之黃鐘羽郊壇展敬嚴配因心孤竹簫管空桑瑟琴肅穆大禮鏗鏘八音恭惟上帝希降靈歆酌獻用福和圜鐘宮九成爰奏三獻式陳欽承景福恭託明禋中宮助祭升壇用函鐘宮坤元光至德柔訓闡皇風芣苡芳聲遠螽斯美化隆睿範超千載嘉猷備六宮肅恭陪盛典欽若薦禋宗亞獻用函鐘宮三靈降饗三后配神虔敷藻奠敬展郊禋送文舞出迎武舞入用舒和圜鐘均之中呂商已陳粢盛敷嚴祀更奏笙鏞協雅聲璇圖寶曆欣寧謐晏俗淳風樂太平武舞作用凱安圜鐘均之無射徵堂堂聖祖興赫赫昌基泰戎車盟津偃玉帛塗山會舜日啓祥暉堯雲卷征旆風猷被有截聲教覃無外開元十一年玄宗祀昊天於圓丘樂章十一首降神用豫和圜鐘宮三成黃鐘角一成太簇徵一成姑洗羽一成已上六變詞同至矣丕構蒸哉太平授犧膺籙復禹繼明草木仁化鳧鷖頌聲祀宗陳德無愧斯誠迎神用歆和崇禋已備粢盛聿修潔誠斯展鐘石方遒皇祖光皇帝室酌獻用長發黃鐘宮詞同貞觀長發太祖景皇帝室酌獻用大基太簇宮詞同貞觀大基代祖元皇帝室酌獻用大成姑洗宮詞同貞觀大成高祖神堯皇帝室酌獻用大明蕤賓宮詞同貞觀大明太宗文武聖皇帝室酌獻用崇德夷則宮詞同貞觀崇德高宗天皇大帝室酌獻用鈞天黃鐘宮詞同光宅鈞天義宗孝敬皇帝室酌獻用承光黃鐘宮金相載穆玉裕重暉養德清禁承光紫微乾宮候色震象增威監國方永賓天不歸孝友自衷溫文性與龍樓正啓鶴駕斯舉丹扆流念鴻名式序中興考室永陳彝俎皇帝飲福用延和黃鐘宮巍巍纍聖穆穆重光奄有區夏祚啓隆唐百蠻飲澤萬國來王本枝億載鼎祚逾長皇帝行用太和郊壇齊帝禮樂祠天丹青寰宇宮徵山川神祇畢降行止重旋融融穆穆納祉洪延登歌奠玉帛用肅和止奏潛聆登儀宿轉大玉躬奉參鍾首奠簠簋聿升犧牲遞薦昭事顒若存存以俔迎俎入用雍和爛雲普洽律風無外千品其凝九賓斯會禋樽晉燭純犧滌汰玄覆攸廣鴻休汪濊皇帝酌獻天神用壽和六變爰闋八階載虔祐我皇祚於萬斯年酌獻配座用壽和於赫聖祖龍飛晉陽底定萬國奄有四方功格上下道冠農黃郊天配享德合無疆飲福酒用壽和崇崇太畤肅肅嚴禋粢盛既潔金石畢陳上帝來享介福爰臻受釐合福寶祚惟新送文舞出迎武舞入用舒和祝史正辭人神慶叶福以德昭享以誠接六變云備百禮斯浹祀事孔明祚流萬葉武舞用凱安馨香惟后德明命光天保肅和崇聖靈陳信表皇道玉鏚初蹈厲金匏既靜好禮畢送神用豫和大號成命思文配天神光肸蠁龍駕言旋眇眇閶闔昭昭上玄俾昌而大於萬斯年皇帝還大次用太和六成既闋三薦云終神心具醉聖敬愈崇受釐皇邸回蹕帷宮穰穰之福永永無窮玄宗開元十三年封泰山祀天樂章十四首中書令燕國公張説作今行用降神用豫和六變夾鐘宮之一款泰壇柴泰清受天命報天成竦皇心薦樂聲志上達歌下迎夾鐘宮之二億上帝臨下庭騎日月陪列星嘉祝信大糦馨淡神心醉皇靈夾鐘宮之三相百辟貢八荒九歌萬舞翔肅振振鏘皇皇帝欣欣福穰穰黃鐘宮高在上道光明物資始德難名承眷命牧蒼生寰宇謐太階平太簇徵天道無親至誠與鄰山川遍禮宮徵惟新玉帛非盛聰明會貞正斯一德通乎百神姑洗羽饗帝饗親維孝維聖緝熙懿德敷揚成命華夷志同笙鏞禮盛明靈降止感此誠敬迎送皇帝用太和孝敬中發和容外彰騰華照宇如升太陽貞璧就奠玄靈垂光禮樂具舉濟濟洋洋登歌奠玉帛用肅和羽調奠祖配天承天享帝百靈咸秩四海來祭植我蒼璧布我玄製華日徘徊神靈容裔迎俎入用雍和俎豆有馝潔粢豐盛亦有和羹既戒既平鼓鐘管磬肅唱和鳴皇皇后祖賚我思成酌獻用壽和黃鐘宮調蒸蒸我后享獻惟夤躬酌鬱鬯跪奠明神孝莫孝乎配上帝以親敬莫敬乎教天下為臣皇帝飲福用壽和皇祖嚴配配享皇天皇皇降嘏天子萬年送文舞出迎武舞入用舒和商調六鐘翕協六變成八佾倘佯八風生樂九韶兮人神感美七德兮天地清終獻亞獻用凱安列祖順三靈文宗威四海黃鉞誅羣盜朱旗掃多罪戢兵天下安約法人心改大哉干羽意長見風雲在送神用豫和夾鐘宮調禮樂終煙燎上懷靈惠結皇想歸風疾回風爽百福來衆神往正月上辛祈穀於南郊樂章八首貞觀中褚亮作今行用降神用豫和詞同冬至圓丘皇帝行用太和詞同冬至圓丘登歌奠玉帛用肅和貞觀禮祀感帝用此詞顯慶已後詞同冬至圓丘履艮斯繩居中體正龍運垂祉昭符啓聖式事嚴禋聿懷嘉慶惟帝永錫時皇休命迎俎用雍和殷薦乘春太壇臨曙八簋盈和六瑚登御嘉稷匪歆德馨斯飫祝嘏無易靈心有豫皇帝酌獻飲福酒用壽和詞同冬至圓丘送文舞出迎武舞入用舒和玉帛犧牲申敬享金絲鏚羽盛音容庶俾億齡禔景福長欣萬宇洽時雍武舞用凱安詞同冬至圓丘送神用豫和詞同冬至圓丘季秋享上帝於明堂樂章八首貞觀中褚亮等作今行用降神用豫和詞同冬至圓丘皇帝行用太和詞同冬至圓丘登歌奠玉帛用肅和象天御宇乘時布政嚴配申虔宗禋展敬樽罍盈列樹羽交映玉幣通誠祚隆皇聖迎俎用雍和八牖晨披五精朝奠霧凝璇篚風清金縣神滌備全明粢豐衍載結彝俎陳誠以薦皇帝酌獻飲福用壽和詞同冬至圓丘送文舞出迎武舞入用舒和御扆合宮承寶曆席圖重館奉明靈偃武修文九圍泰沉烽靜柝八荒寧武舞用凱安詞同冬至圓丘送神用豫和詞同冬至圓丘則天大聖皇后享明堂樂章十二首御撰外辦將出總章陳昔典衢室禮惟神宏規則天地神用叶陶鈞負扆三春旦充庭萬宇賓顧己誠虛薄空慙馭兆人皇帝行用黃鐘宮仰膺曆數俯順謳歌遠安邇肅俗阜時和化光玉鏡訟息金科方興典禮永戢干戈皇嗣出入升降至人光俗大孝通神謙以表性恭惟立身洪規載啓茂典方陳譽隆三善祥開萬春迎送王公千官肅事萬國朝宗載延百辟爰集三宮君臣得合魚水斯同睿圖方永周曆長隆登歌大呂均無射羽禮崇宗祀志表嚴禋笙鏞合奏文物惟新敬遵茂典敢擇良辰潔誠斯著奠謁方申配饗笙鏞間鳴玉文物昭清暉粹影臨芳奠休光下太微孝思期有感明潔庶無違宮音履艮苞羣望居中冠百靈萬方資廣運庶品荷裁成神功諒匪測盛德實難名藻奠申誠敬恭祀表惟馨角音出震位開平秩扇條風乘甲乙龍德盛鳥星出薦圭篚陳誠實徵音赫赫離精御炎陸滔滔熾景開隆暑冀延神鑒俯蘭樽式表虔襟陳桂俎商音律中夷則序應收成功宣建武儀表惟明爰申禮奠庶展翹誠九秋是式百穀斯盈羽音葭律肇啓隆冬蘋藻攸陳饗祭黃鐘既陳玉燭紅粒方殷稔歲孟夏雩祀上帝于南郊樂章八首貞觀中褚亮等作今行用降神用豫和詞同冬至圓丘皇帝行用太和詞同冬至圓丘登歌奠玉帛用肅和朱鳥開辰蒼龍啓映大帝昭饗羣生展敬禮備懷柔功宣舞詠旬液應序年祥叶慶迎俎用雍和紺筵分彩瑤圖吐絢風管晨凝雲歌曉囀肅事蘋藻虔申桂奠百穀斯登萬箱攸薦皇帝酌獻飲福酒用壽和詞同冬至圓丘送文舞出迎武舞入用舒和鳳曲登歌調令序龍雩集舞泛祥風綵旞雲回昭睿德朱干電發表神功武舞用凱安詞同冬至圓丘送神用豫和詞同冬至圓丘又雩祀樂章二首太樂舊有此詞不詳所起或云開元初造降神用豫和鳥緯遷序龍星見辰純陽在律明德崇禋五方降帝萬宇安人恭以致享肅以迎神送神用豫和祀遵經設享緣誠舉獻畢于樽撤臨于俎舞止干戚樂停柷敔歌以送神神還其所祀五方上帝於五郊樂章四十首貞觀中魏徵等作今行用祀黃帝降神奏宮音黃中正位含章居貞既彰六律兼和五聲畢陳萬舞乃薦斯牲神其下降永祚休平皇帝行用太和詞同冬至圓丘登歌奠玉帛用肅和渺渺方輿蒼蒼圓蓋至哉樞紐宅中圖大氣調