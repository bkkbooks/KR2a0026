明德吐正詞爛遺光流禎祺祭神州于北郊樂章八首貞觀中褚亮作送神用順和詞同夏至方丘皇帝行用太和詞同冬至圓丘登歌奠玉帛用肅和大矣坤儀至哉神縣包含日域牢籠月竁露潔三清風調六變皇祇屆止式歆恭薦迎俎用雍和泰折嚴享陰郊展敬禮以導神樂以和性黝牲在列黃琮俯映九土既平萬邦貽慶皇帝酌獻飲福用壽和詞同冬至圓丘送文舞出迎武舞入用舒和坤道降祥和庶品靈心載德厚羣生水土既調三極泰文武畢備九區平武舞用凱安詞同冬至圓丘送神用順和詞同冬至圓丘又祭神州樂章二首太樂舊有此詞不詳所起迎神黃輿厚載赤寰歸德含育九區保安萬國誠敬無怠禋祀有則樂以迎神其儀不忒送神神州陰祀洪恩廣濟草樹霑和飛沉沐惠禮修鼎俎奠歆瑤幣送樂有章靈軒其逝祭太社樂章八首貞觀中褚亮等作迎神用順和詞同夏至方丘皇帝行用太和詞同冬至圓丘登歌奠玉帛用肅和后土凝德神功叶契九域底平兩儀交際戊期應序陰墉展幣靈車少留俯歆樽桂迎俎用雍和美報崇本嚴恭展事受露疏壇承風啓地潔粢登俎醇犧入饋介福遠流羣生畢遂皇帝酌獻飲福用壽和詞同冬至圓丘送文舞出迎武舞入用舒和神道發生敷九稼陰陽乘仁暢八埏緯武經文陶景化登祥薦祉啓豐年武舞用凱安詞同冬至圓丘送神用順和詞同冬至圓丘又太社樂章二首太樂舊有此詞不詳所起迎神烈山有子后土有臣播種百穀濟育兆人春官緝禮宗伯司禋戊為吉日迎享茲辰送神告祥式就酬功載畢親地尊天禮文經術貺徵令序福流初日神馭爰歸祠官其出享先農樂章貞觀中褚亮等作迎神用咸和粒食伊始農之所先古今攸賴是曰人天耕斯帝藉播厥公田式崇明祀神其福焉皇帝行用太和詞同冬至圓丘登歌奠玉帛用肅和尊彝既列瑚簋有薦歌工載登幣禮斯奠肅肅享祀顒顒纓辨神之聽之福流寰縣迎俎用雍和前夕親牲質明奉俎沐芳整辨其儀式序盛禮畢陳嘉樂備舉歆我懿德非馨稷黍皇帝酌獻飲福用壽和詞同冬至圓丘送文舞出迎武舞入用舒和羽籥低昂文綴已干鏚蹈厲武行初望歲祈農神所聽延祥介福豈云虛武舞用凱安詞同冬至圓丘送神用承和又享先農樂章一首太樂舊有此詞不詳所起送神用承和三推禮就萬庾祈凝夤賓志遠藨蓘惟興降歆肅薦垂祐祗膺送神有樂神其上升享先蠶樂章五首顯慶中皇后親蠶奉敕內出此詞迎神用永和亦曰順德芳春開令序韶苑暢和風惟靈申廣祐利物表神功綺會周天宇黼黻藻寰中庶幾承慶節歆奠下帷宮皇后升壇用肅和明靈光至德深功掩百神祥源應節啓福緒逐年新萬宇承恩覆七廟佇恭禋于茲申至懇方期遠慶臻登歌奠幣用展敬霞莊列寶衛雲集動和聲金巵薦綺席玉幣委芳庭因心罄丹款先己勵蒼生所冀延明福於茲享至誠迎俎用潔誠桂筵開玉俎蘭圃薦瓊芳八音調鳳律三獻奉鸞觴潔粢申大享庭宇冀降祥神其覃有慶錫福永無疆飲福送神用昭慶仙壇禮既畢神駕儼將升佇屬深祥啓方期庶績凝虔誠資宇內務本勗黎蒸靈心昭備享率土洽休徵皇太子親釋奠樂章五首迎神用承和亦曰宣和聖道日用神機不測金石以陳絃歌載陟爰釋其菜匪馨于稷來顧來享是宗是極皇太子行用承和萬國以貞光上嗣三善茂德表重輪視膳寢門遵要道高闢崇賢引正人登歌奠幣用肅和粵惟上聖有縱自天旁周萬物俯應千年舊章允著嘉贄孔虔王化茲首儒風是宣迎俎用雍和堂獻瑤篚庭敷璆縣禮備其容樂和其變肅肅親享雍雍執奠明禮惟馨蘋蘩可薦送文舞出迎武舞入用舒和隼集龜開昭聖列龍蹲鳳跱肅神儀尊儒敬業宏圖闡緯武經文盛德施武舞用凱安詞同冬至圓丘送神用承和詞同迎神又享孔廟樂章二首太樂舊有此詞不詳所起迎神通吳表聖問老探貞三千弟子五百賢人億齡規法萬載祠禋潔誠以祭奏樂迎神送神醴溢犧象羞陳俎豆魯壁類聞泗川如覯里校覃福胄筵承祐雅樂清音送神其奏享龍池樂章十首第一章紫微令姚崇作也恭聞帝里生靈沼應報明君鼎業新既叶翠泉光寶命還符白水出真人此時舜海潛龍躍北地堯河帶馬巡獨有前池一小雁叨承舊惠入天津第二章左拾遺蔡孚作帝宅王家大道邊神馬龍龜涌聖泉昔日昔時經此地看來看去漸成川歌臺舞榭宜正月柳岸梅洲勝往年莫言波上春雲少祇為從龍直上天第三章太府少卿沈佺期作龍池躍龍龍已飛龍德先天天不違池開天漢分黃道龍向天門入紫微邸第樓臺多氣色君王鳧雁有光輝為報寰中百川水來朝上地莫東歸第四章黃門侍郎盧懷慎作代邸東南龍躍泉清漪碧浪遠浮天樓臺影就波中出日月光疑鏡𩹉懸雁沼回流成舜海龜書薦祉應堯年大川既濟慙為楫報德空思奉細涓第五章殿中監薑皎作龍池初出此龍山常經此地謁龍顏日日芙蓉生夏水年年楊柳變春灣堯壇寶匣餘煙霧舜海漁舟尚往還願以飄颻五雲影從來從去九天間第六章吏部尚書崔日用作龍興白水漢興符聖主時乘運斗樞岸上茸五花樹波中的皪千金珠操環昔聞迎夏啓發匣先來瑞有虞風色雲光隨隱見赤雲神化象江湖第七章紫微侍郎蘇頲作西京鳳邸躍龍泉佳氣休光鍾在天軒后霧圖今已得秦王水劍昔常傳恩魚不似昆明釣瑞鶴長如太液仙願侍巡遊同舊里更聞簫鼓濟樓船第八章黃門侍郎李乂作星分邑里四人居水洊源流萬頃餘魏國君王稱象處晉家藩邸化龍初青蒲暫似遊梁馬緑藻還疑宴鎬魚自有神靈滋液地年年雲物史官書第九章工部侍郎薑晞作靈沼縈回邸第前浴日涵春寫曙天始見龍臺升鳳闕應如霄漢起神泉石匱渚傍還啓聖桃李初開更有仙欲化帝圖從此受正同河變一千年第十章兵部郎中裴璀作乾坤啓聖吐龍泉泉水年年勝一年始看魚躍方成海即覩龍飛利在天洲渚遙將銀漢接樓臺直與紫微連休氣榮光常不散懸知此地是神仙
