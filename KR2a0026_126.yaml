body:
  text: 舊唐書卷一百二十二列傳第七十二張獻誠弟獻恭獻甫獻恭子煦路嗣恭子恕曲環崔漢衡楊朝晟樊澤李叔明裴胄張獻誠陝州平陸人幽州節度使幽州大都督府長史守圭之子也天寶末陷逆賊安祿山受偽官連陷史思明為思明守汴州統逆兵數萬寶應元年冬東都平史朝義逃歸汴州獻誠不納舉州及所統兵歸國詔拜汴州刺史充汴州節度使踰年來朝代宗寵賜甚厚三遷檢校工部尚書兼梁州刺史充山南西道觀察使廣德二年十月擒南山賊帥高玉以獻永泰二年正月獻名馬二絲絹雜貨共十萬匹是月兼充劍南東川節度觀察使封鄧國公西川崔旰殺郭英乂獻誠率衆戰於梓州為旰所敗獻誠僅以身免大曆二年四月獻誠以疾上表乞歸私第仍薦堂弟試太常卿兼右羽林將軍獻恭以自代詔許之以獻誠檢校戶部尚書知省事八月獻誠以疾抗疏辭官無幾卒於私第獻恭守圭之弟守瑜子纍以軍功官至試太常卿兼右羽林將軍代獻誠為梁州刺史兼御史中丞充山南西道節度觀察使大曆十二年七月獻恭破吐蕃萬餘衆於岷州建中二年正月加檢校兵部尚書為東都留守三年正月為太府卿容州刺史本管經略招討使四年七月與渾瑊盧杞司農卿段秀實與吐蕃尚結贊築壇於京城之西會盟如清水之儀興元元年六月轉檢校吏部尚書仍與一子正員官盧杞移饒州刺史給事中袁高論其不可獻恭因入對紫宸殿上言高所奏至當臣恐煩聖聽不敢縷陳其事德宗不悟獻恭復奏曰袁高是陛下一良臣望特優異德宗顧謂宰臣李勉等曰朕欲授杞一小州刺史可乎對曰陛下授大州亦可其奈士庶失望何獻恭守正不撓也如此獻甫守圭弟左武衛將軍贈戶部尚書守琦之子獻甫少隨諸兄從軍初為偏裨以軍功纍授試光祿卿殿中監河中節度副元帥都知兵馬使檢校兵部尚書兼御史大夫建中初從節度使賈耽征梁崇義於襄漢以功加太子詹事及幸奉天興元獻甫首至從渾瑊征討有功及復京邑入為金吾將軍時李懷光未平吐蕃侵擾西邊獻甫領禁軍出鎮咸陽凡纍年軍民悅之貞元四年遷檢校刑部尚書兼邠州刺史邠寧慶節度觀察使乃於彭原置義倉方渠馬嶺等縣選險要之地以為烽堡又上疏請復鹽州及洪門洛原等鎮各置兵防以備蕃寇朝廷從之貞元四年九月吐蕃將尚志董星論莽羅等寇寧州獻甫率衆禦之斬首百餘級吐蕃遁邊城貞元十二年加檢校左僕射五月丙申卒年六十一廢朝三日贈司空賻物有差獻恭子煦嘗隨獻甫征討積戰功纍遷至夏州節度使元和八年十二月振武軍逐出節度使李進賢而屠其家殺判官嚴徹憲宗怒遣煦以夏州兵二千人赴振武仍許以便宜擊斷九年正月賜絹三萬匹以助軍資河東節度使王鍔遣兵五千會煦於善羊柵詔煦入振武誅作亂蘇國珍等二百五十三人乃定是歲十二月卒贈太子太保路嗣恭京兆三原人始名劍客歷仕郡縣有能名纍至神烏令考績上上為天下最以其能賜名嗣恭歷工部尚書兼御史大夫靈州大都督府長史充關內副元帥郭子儀副使知朔方節度營田押諸蕃部落等使嗣恭披荊棘以守之大將御史中丞孫守亮握重兵倔強不受制嗣恭稱疾召至因殺之威信大行永泰三年檢校刑部尚書知省事大曆六年七月為江南西道都團練觀察使在官恭恪善理財賦賈明觀者事北軍都虞候劉希暹魚朝恩誅希暹從坐明觀積惡犯衆怒時宰相元載受賂遣江南效力魏少遊承載意苟容之及嗣恭代少遊即日杖殺識者稱之大曆八年嶺南將哥舒晃殺節度使呂崇賁反五嶺騷擾詔加嗣恭兼嶺南節度觀察使嗣恭擢流人孟瑤敬冕使分其務瑤主大軍當其衝冕自間道輕入招集義勇得八千人以撓其心腹二人皆有全策詭計出其不意遂斬晃及誅其同惡萬餘人築為京觀俚洞之宿惡者皆族誅之五嶺削平拜檢校兵部尚書知省事嗣恭起於郡縣吏以至大官皆以恭恪為理著稱及平廣州商舶之徒多因晃事誅之嗣恭前後沒其家財寶數百萬貫盡入私室不以貢獻代宗心甚銜之故嗣恭雖有平方面功止轉檢校兵部尚書無所酬勞及德宗即位楊炎受其貨始前功除兵部尚書東都留守尋加懷鄭汝陝四州河陽三城節度及東都畿觀察使徵至京師卒時年七十一廢朝一日贈左僕射子恕字體仁初嶺南衙將哥舒晃反詔嗣恭自江西致討授檢校工部員外郎得以軍前便宜從事俄而降者繼路於是擢降將伊慎推心用之賊平恕功居多年才三十為懷州刺史久之轉京兆少尹監門衛大將軍兼御史中丞教練招討等使其後為鄜坊觀察使太子詹事坐事貶吉州刺史遷太子賓客以右散騎常侍致仕卒年七十三贈洪州都督恕私第有佳林園自貞元初李紓包佶輩迄于元和末僅四十年朝之名卿咸從之遊高歌縱酒不屑外慮未嘗問家事人亦以和易稱之曲環陝州安邑人也父彬為南使正監因家於隴右以環故纍贈兵部尚書環少讀兵書尤以勇敢騎射聞天寶中從哥舒翰攻拔石堡城收黃河九曲洪濟等城纍授果毅別將安祿山反從襄陽節度魯炅守鄧州拒賊將武令珣戰數十合環功居多超授左清道率又從李抱玉守河陽南城尋將兵守澤州破賊驍將安曉敕特拜羽林將軍又將別部兵合諸軍同討史朝義平河北纍轉金吾大將軍並同正員隨李抱玉移軍京西大曆中領兵隴州頻破吐蕃加特進太常卿上初嗣位吐蕃大寇劍南詔環以邠隴兵五千馳往大破戎虜收七盤城威武軍及維茂二州西戎奔遁環大振功名而還加太子賓客賜以名馬與諸將討涇州叛將劉文喜平之加開府儀同三司兼御史中丞充邠隴兩軍都知兵馬使時李納擁兵侵逼徐州令環與劉玄佐同救援纍破李納叛黨環以功最加御史大夫建中三年十月加檢校左常侍充邠隴行營節度使李希烈侵陷汴州環與諸軍守固寧陵陳州大破希烈軍於陳州城下殺逆黨三萬五千人擒其驍將翟暉以獻希烈因遁歸蔡州環以功加檢校工部尚書兼陳州刺史希烈平加環兼許州刺史陳許等州節度觀察加實封三百戶陳蔡二州以希烈擾亂遭剽劫頗甚人多逃竄他邑以避禍環勤身恭儉賦稅均平政令寬簡不三二歲襁負而歸者相屬訓農理戎兵食皆豐羡十二年加檢校左僕射卒時年七十四廢朝一日贈司空賻布帛米粟有差崔漢衡博陵人也性沉厚寬博善與人交釋褐授沂州費令滑州節度使令狐彰奏署掌記纍遷殿中侍御史大曆六年拜檢校禮部員外郎為和吐蕃副使還遷右司郎中改萬年令建中三年為殿中少監兼御史大夫充和蕃使與吐蕃使區頰贊至自蕃中時吐蕃大相尚結息忍而好殺以常覆敗於劍南思刷其恥不肯約和其次相尚結贊有材略因言於贊普請定界明約以息邊人贊普然之竟以結贊代結息為大相約和好期以十月十五日會盟於境上戊申以漢衡為鴻臚卿四年吐蕃朝貢加檢校工部尚書復使吐蕃興元初上居奉天吐蕃遣帥佐渾瑊敗朱泚兵於武功以功轉檢校兵部尚書兼祕書監西京留守無幾真拜兵部尚書為東都淄青魏博賑給宣慰使明年為幽州宣慰使所至皆稱職貞元三年副侍中渾瑊與吐蕃會盟於平涼吐蕃背約瑊僅免時無備預在會免者什無一二士卒死者以千數漢衡與同陷者並至河州結贊令召之以頻使於蕃結贊素信重與孟日華中官劉延雍俱至石門而遣五騎送至境上四年七月加檢校吏部尚書晉慈隰觀察使尋加都防禦使十一年四月卒楊朝晟字叔明夏州朔方人也初在朔方為步軍先鋒嘗有功授甘泉府果毅建中初從李懷光討劉文喜于涇州斬獲生擒居多授驃騎大將軍稍為右先鋒兵馬使後李納寇徐州從唐朝臣征討嘗冠軍鋒以功授開府儀同三司檢校太子賓客上在奉天李懷光自山東赴難以朝晟為左廂兵馬使將千餘人下咸陽以挫朱泚加御史中丞實封一百五十戶及懷光反於河中朝晟被脅在軍上幸梁洋韓遊瓌退於邠寧懷光以嘗在邠寧迫制如屬城以賊黨張昕在邠州總後務昕懼難作乃大索軍資徵卒乘約明潛發歸于懷光朝晟父懷賓為遊瓌將因夜以數十騎斬昕及同謀遊瓌即日使懷賓奉表聞奏上召勞問授兼御史中丞正除遊瓌邠寧節度使間諜至河中朝晟聞其事泣告懷光曰父立功於國子合誅戮不可主兵矣懷光遂縶之及諸軍進圍河中韓遊瓌營于長春宮懷賓身當戰伐及懷光平上念其忠俾副元帥渾瑊特原朝晟遂為遊瓌都虞候時父子同軍皆為開府賓客御史中丞榮於軍中後詔徵遊瓌宿衛以左金吾將軍張獻甫為檢校刑部尚書兼御史大夫邠寧慶節度觀察使代韓遊瓌初遊瓌以吐蕃犯塞自將兵戍寧州及受代以是月壬子夜輕騎潛遁歸闕其將卒素驕怠畏張獻甫之嚴因遊瓌夜出衙內千餘人遂叛掠且因監軍楊明義邀奏出奔將范希朝為節度朝晟時為都虞候初逃於郊翌日乃來紿其衆曰所請甚愜我來賀也由是稍安朝晟及諸將謀誅首惡者乙卯朝晟率諸將經數日以告曰前請者不獲張尚書昨日已入邠州汝等皆當死吾不能盡殺各言戎首以歸罪焉餘無所問於是衆中唱二百餘人斬之乃定上擢希朝為寧州刺史以副獻甫獻甫入奏朝晟功加御史大夫九年城鹽州徵兵以護外境朝晟分統士馬鎮木波獻甫卒詔以朝晟代之其年丁母憂起復左金吾大將軍同正邠州刺史大夫如故十年春朝晟奏方渠合道木波皆賊路也請城其地以備之詔問所須幾何朝晟奏曰臣部下兵自可集事不煩外助復問前築鹽州凡興師七萬今何其易也朝晟曰鹽州之役諸軍蕃戎盡知之今臣境迫虜若大興兵即蕃戎來寇寇則戰戰則無暇城矣今請密發軍士不十日至塞下未三旬而功畢蕃人始乘障數日而退初軍次方渠無水師徒囂然遽有青蛇乘高而下視其迹水隨而流朝晟令築防環之遂為停泉軍人仰飲以足圖其事上聞詔置祠焉十五年二月免喪加檢校工部尚書是夏以防秋移軍寧州遘疾來年正月卒樊澤字安時河中人也父詠開元中舉草澤授試大理評事纍贈兵部尚書澤長於河朔相衛節度薛嵩奏為磁州司倉堯山縣令建中元年舉賢良對策禮部侍郎于邵厚遇之與楊炎善薦為補闕歷都官員外郎澤好讀兵書朝廷以其有將帥材尋兼御史中丞充通和蕃使蕃中用事宰相尚結贊深禮之尋從鳳翔節度張鎰與吐蕃會盟於清水遷金部郎中御史中丞山南節度行軍司馬時李希烈背叛詔以普王為行軍元帥徵澤為諫議大夫元帥行軍右司馬屬駕幸奉天普王不行澤改右庶子兼中丞復為山南東道行軍司馬尋代賈耽為襄州刺史兼御史大夫山南東道節度觀察等使澤有武藝每與諸將射獵常出其右人心服之賊衆畏焉頻與李希烈凶黨接戰前後擒降其驍將張嘉瑜杜文朝梁俊之李克誠薛翼等收唐隨二州希烈既平澤丁母憂起復右衛大將軍同正餘如故三年代張伯儀為荊南節度觀察等使江陵尹兼御史大夫三歲加檢校禮部尚書會襄州節度曹王臯卒於鎮軍中剽劫擾亂以澤威惠素著於襄漢復代曹王臯為襄州刺史山南東道節度使十二年加檢校右僕射卒年五十贈司空賻布帛米粟有差其日將宴百官廢朝改取他日李叔明字晉卿閬州新政人本姓鮮于氏代為豪族兄仲通天寶末為京兆尹劍南節度使兄弟並涉學輕財好施叔明初為劍南節度使楊國忠判官乾元後為司勳員外郎副漢中王瑀使回紇回紇接禮稍倨叔明離位責之曰大國通好賢王奉使可汗於大唐子壻豈可恃微功而傲乎唐法不然可汗改容加敬復命遷司門郎中後為京兆少尹無幾以疾辭除右庶子出為邛州刺史尋拜東川節度遂州刺史後移鎮梓州檢校戶部尚書時東川兵荒之後凋殘頗甚叔明理之近二十年招撫氓庶夷落獲安大曆末有閬州嚴氏子上疏稱叔明少孤養子於外族遂冒姓焉請復之詔從焉叔明初不知其從外氏姓意醜其事遂抗表乞賜宗姓代宗以戎鎮寄重許之仍置嚴氏子於法及駕幸奉天其子升翊從叔明每私疏誡勵見危臨難當誓以死升奉父嚴訓果著勳效識者嘉之叔明既朝京師以本官兼右僕射乞骸骨改太子太傅致仕卒諡曰襄叔明總戎年深積聚財貨子孫驕淫歿才數年遺業蕩盡裴胄字胤叔其先河東聞喜人今代葬河南伯父寬戶部尚書有名於開元天寶間胄明經及第解褐補太僕寺主簿屬二京陷覆淪避他州賊平授祕書省正字纍轉祕書郎陳少遊陳鄭節度留後奏胄試大理司直少遊罷隴右節度李抱玉奏授監察御史不得意歸免陳少遊為宣歙觀察復辟在幕府抱玉怒奏貶桐廬尉浙西觀察使李栖筠有重望虛心下士幕府盛選才彥觀察判官許鴻謙有學識栖筠常異席事多咨之崔造輩皆所薦引一見胄深重之薦於栖筠奏授大理評事觀察支度使代宗以元載隳紊朝綱徵栖筠入朝內制授御史大夫方將大用載怙權栖筠居顧問刺舉之職與不平及栖筠卒胄護栖筠喪歸洛陽衆論危之胄坦然行心無所顧望淮南節度陳少遊奏檢校主客員外兼侍御史觀察判官尋為行軍司馬遷宣州刺史楊炎初作相鋭意為元載報讎凡其枝黨無漏適會胄部人積胄官時服雜俸錢為贓者炎命酷吏員𧜛深按其事貶汀州司馬尋徵為少府少監除京兆少尹以父名不拜換國子司遷湖南觀察都團練使移江南西道前江西觀察使李兼罷省南昌軍千餘人收其資糧分為月進胄至奏其本末罷之會荊南節度樊澤移鎮襄陽宰相方議其人上首命胄代澤仍兼御史大夫胄簡儉恆一時諸道節度觀察使競剝下厚斂製奇錦異綾以進奉為名又貴人宣命必竭公藏以買其歡胄待之有節皆不盈數金常賦之外無橫斂宴勞禮止三爵未嘗酣樂時武臣多廝養畜賓介微失則奏流死胄以書生始奏貶書記梁易從君子薄其進退賓客不以禮物議薄之貞元十九年十月卒時年七十五贈右僕射諡曰成史臣曰三獻軍謀臣節克紹家風路嗣恭從微至著執法簡廉環理兵勸農獨彰善政漢衡誠賣心奉職朝晟忠孝權謀澤威惠荊襄叔明見危誓死立政惠民胄抱義危行守政奉公皆賢帥矣然嗣恭聚財為功名之瑕玷叔明聚財致子孫之驕淫財之污人誠可誡也贊曰張路曲崔樊楊李裴守忠臣之道皆賢帥之才
