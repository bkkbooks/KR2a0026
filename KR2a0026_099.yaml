body:
  text: 舊唐書卷九十五列傳第四十五睿宗諸子讓皇帝憲惠莊太子撝惠文太子範惠宣太子業隋王隆悌睿宗六子昭成順聖皇后竇氏生玄宗肅明順聖皇后劉氏生讓皇帝宮人柳氏生惠莊太子崔孺人生惠文太子王德妃生惠宣太子後宮生隋王隆悌讓皇帝憲本名成器睿宗長子也初封永平郡王文明元年立為皇太子時年六歲及睿宗降為皇嗣則天冊授成器為皇孫與諸弟同日出閣開府置官屬長壽二年改封壽春郡王仍卻入閣長安中纍轉左贊善大夫加銀青光祿大夫中宗即位改封蔡王遷宗正員外卿加賜實封四百戶通舊為七百戶成器固辭不敢當大國依舊為壽春郡王唐隆元年進封宋王其月睿宗踐祚拜左衛大將軍時將建儲二以成器嫡長而玄宗有討平韋氏之功意久不定成器辭曰儲副者天下之公器時平則先嫡長國難則歸有功若失其宜海內失望非社稷之福臣今敢以死請纍日涕泣固讓言甚切至時諸王公卿亦言平王有社稷大功合居儲位睿宗嘉成器之意乃許之玄宗又以成器嫡長再抗表固讓睿宗不許乃下制曰左衛大將軍宋王成器朕之元子當踐副君以隆基有社稷大功人神僉屬由是朕前懇讓言在必行天下至公誠不可奪爰符立季之典庶協從人之願成器可雍州牧揚州大都督太子太師別加實封二千戶賜物五千段細馬二十匹奴婢十房甲第一區良田三十頃其年十一月拜尚書左僕射尋遷司徒其太師都督並如故明年表讓司徒拜太子賓客兼揚州大都督如故時太平公主陰有異圖姚元之宋璟等請出成器及申王成義為刺史以絶謀者之心由是成器以司徒兼蒲州刺史玄宗嘗製一大被長枕將與成器等共申友悌之好睿宗知而大悅纍加賞歎先天元年八月進封司空及玄宗討平蕭至忠岑羲等成器又進位太尉依舊兼揚州大都督加實封一千戶月餘加授開府儀同三司其太尉揚州大都督並停開元初歷岐州刺史開府如故四年避昭成皇后尊號改名憲封為寧王實封纍至五千五百戶又歷澤涇等州刺史初玄宗兄弟聖曆初出閣列第於東都積善坊五人分院同居號五王宅大足元年從幸西京賜宅於興慶坊亦號五王宅及先天之後興慶是龍潛舊邸因以為宮憲於勝業東南角賜宅申王撝岐王範於安興坊東南賜宅薛王業於勝業西北角賜宅邸第相望環於宮側玄宗於興慶宮西南置樓西面題曰花萼相輝之樓南面題曰勤政務本之樓玄宗時登樓聞諸王音樂之聲咸召登樓同榻宴謔或便幸其第賜金分帛厚其歡賞諸王每日於側門朝見歸宅之後即奏樂縱飲擊毬鬬雞或近郊從禽或別墅追賞不絶於歲月矣遊踐之所中使相望以為天子友悌近古無比故人無間然玄宗既篤於昆季雖有讒言交搆其間而友愛如初憲尤恭謹畏慎未曾干議時政及與人交結玄宗尤加信重之嘗與憲及岐王範等書曰昔魏文帝詩云西山一何高高處殊無極上有兩仙童不飲亦不食賜我一丸藥光耀有五色服藥四五日身輕生羽翼朕每思服藥而求羽翼何如骨肉兄弟天生之羽翼乎陳思有超代之才堪佐經綸之務絶其朝謁卒令憂死魏祚未終遭司馬宣王之奪豈神丸之效也虞舜至聖捨象傲之愆以親九族九族既睦平章百姓此為帝王之軌則于今數千歲天下歸善焉朕未嘗不廢寢忘食欽歎者也頃因餘暇妙選仙經得此神方古老云服之必驗今分此藥願與兄弟等同保長齡永無限極憲開元九年兼太常卿十四年停太常卿依舊為開府儀同三司二十一年復拜太尉二十八年冬憲寢疾上令中使送醫藥及珍膳相望於路僧崇一療憲稍瘳上大悅特賜緋袍魚袋以賞異崇一時申王等皆先薨唯憲獨在上尤加恩貸每年至憲生日必幸其宅移時宴樂居常無日不賜酒酪及異饌等尚食總監及四方有所進獻食之稍甘即皆分以賜之憲嘗奏請年終録付史館每年至數百紙二十九年冬京城寒甚凝霜封樹時學者以為春秋雨木冰即此是亦名樹介言其象介胄也憲見而歎曰此俗謂樹稼者也諺曰樹稼達官怕必有大臣當之吾其死矣十一月薨時年六十三上聞之號叫失聲左右皆掩涕翌日下制曰能以位讓為吳太伯存則用成其節歿則當表其賢非常之稱旌德斯在故太尉寧王憲誕含粹靈允膺大雅孝悌之至本乎中誠仁和之深非因外奬率由禮度雅尚文儒謙以自牧樂以為善比兩獻而有光與二南而合德自出臨方鎮入配台階逾勵忠勤益聞周慎實謂永為藩屏以輔邦家曾不憖遺奄焉殂沒友于之痛震慟良深惟王朕之元昆合升上嗣以朕奉先朝之睿略定宗社之阽危推而不居請豫主鬯又承慈旨焉敢固違不然者則宸極之尊豈歸於薄德茂行若此易名是憑自非大號孰副休烈按諡法推功尚善曰讓德性寬柔曰讓敬追諡曰讓皇帝宜令所司擇日備禮冊命憲長子汝陽郡王璡又上表懇辭盛陳先意謙退不敢當帝號手制不許及冊斂之日內出御衣一副仍令右監門大將軍高力士賫手書置于靈座之前其書曰隆基白一代兄弟一朝存歿家人之禮是用申情興言感思悲涕交集大哥孝友近古莫儔嘗號五王同開邸第遠自童幼洎乎長成出則同遊學則同業事均形影無不相隨頃以國步艱危義資克定先帝御極日月照臨大哥嫡長合當儲二以功見讓爰在薄躬既嗣守紫宸萬機事總聽朝之暇得展于懷十數年間棣華凋落謂之手足唯有大哥今復淪亡眇然無對以茲感慕何恨如之然以厥初生人孰不殂謝所貴光昭德行以示崇高立德立名斯為不朽大哥事跡身歿讓存故冊曰讓皇帝神之昭格當茲寵榮況庭訓傳家璡等申讓善述先志實有遺風成其美也恭惟緒言恍焉如在寄之翰墨悲不自勝又制追贈憲妃元氏為恭皇后祔葬于橋陵之側及將葬上遣中使敕璡等務令儉約送終之物皆令衆見所司請依諸陵舊例壙內置千味食監護使左僕射裴耀卿奏曰尚食所料水陸等味一千餘種每色瓶盛安於藏內皆是非時瓜果及馬牛驢犢麞鹿等肉並諸藥酒三十餘色儀注禮料皆無所憑臣據禮司所料奠祭相次事無不備典制分明天恩每申讓帝之志務令儉約禮外加數竊恐不安又非時之物馬犢驢等並野味魚雁鵝鴨之屬所用銖兩動皆宰殺盛夏胎養聖情所禁又須造作什物動逾千計求徵市井實謂煩勞千味不供禮無所闕伏望依禮減省以取折衷制從之及發引時屬大雨上令慶王潭已下泥中步送十數里制號其墓為惠陵憲凡十子璡嗣莊琳璹珣瑀玢珽琯璀等十人歷官封襲璡封汝陽郡王歷太僕卿與賀知章褚庭誨為詩酒之交天寶初終父喪加特進九載卒贈太子太師嗣莊封濟陰郡王早卒琳封嗣寧王歷祕書員外監從玄宗幸蜀郡至德二載卒璹封嗣申王珣封同安郡王珣修身淳謹不自矜貴閨門之內常默如也開元二十五年薨玄宗甚悼之輟朝三日制曰猶子之恩特深於情禮睦親之義必備於哀榮同安郡王珣稟氣淳和執心忠順邦國垣翰宗枝羽儀磐石疏封將期永固逝川不捨俄歎促齡悼往之懷因心所切宜增寵命用飾幽泉可贈太子少保葬事官給陪葬橋陵瑀封漢中王歷都水使者恆王府司馬衛尉員外卿瑀早有才望偉儀表初為隴西郡公天寶十五載從玄宗幸蜀至漢中因封漢中王仍加銀青光祿大夫漢中郡太守乾元二年以特進試太常卿送寧國公主至回紇充冊立使玢蒼梧郡開國公歷銀青光祿大夫祕書監員外置同正員卒贈江陵大都督珽封晉昌郡開國公琯魏郡開國公璀文安郡開國公天寶十一載珽琯璀並食邑三千戶惠莊太子撝睿宗第二子也本名成義母柳氏掖庭宮人撝之初生則天嘗以示僧萬回萬回曰此兒是西域大樹之精養之宜兄弟則天甚悅始令列於兄弟之次垂拱三年封恆王尋卻入閣改封衡陽郡王纍授尚衣奉御神龍元年加賜實封二百戶通前五百戶遷司農少卿加銀青光祿大夫睿宗踐祚進封申王遷右衛大將軍景雲元年七月遷殿中監兼檢校右衛大將軍二年轉光祿卿右金吾衛大將軍先天元年七月加實封一千戶八月行司徒兼益州大都督開元二年帶司徒兼幽州刺史俄避昭成太后之稱改名撝歷鄧虢絳三州刺史八年因入朝停刺史依舊為司徒性弘裕儀形瓌偉善於飲啖十二年病薨冊贈惠莊太子陪葬橋陵無子初養讓帝子珣封同安郡王先卒天寶三載又以讓帝子璹為嗣申王授鴻臚員外卿惠文太子範睿宗第四子也本名隆範後避玄宗連名改單稱範初封鄭王尋改封衛王長壽二年隨例卻入閣徙封巴陵郡王纍授尚食奉御神龍元年遷太府員外少卿加賜實封二百戶通前五百戶景龍年兼隴州別駕加銀青光祿大夫睿宗踐祚進封岐王又加實封五百戶拜太常卿兼左羽林大將軍先天二年從上討竇懷貞蕭至忠等以功加賜實封滿五千戶下制褒美開元初拜太子少師帶本官歷絳鄭岐三州刺史八年遷太子太傅範好學工書雅愛文章之士士無貴賤皆盡禮接待與閻朝隱劉庭琦張諤鄭繇篇題唱和又多聚書畫古跡為時所稱時上禁約王公不令與外人交結駙馬都尉裴虛己坐與範遊宴兼私挾讖緯之書配徙嶺外萬年尉劉庭琦太祝張諤皆坐與範飲酒賦詩黜庭琦為雅州司戶諤為山茌丞然上未嘗間範恩情如初謂左右曰我兄弟友愛天至必無異意祇是趨競之輩強相託附耳我終不以纖芥之故責及兄弟也時王毛仲等本起微賤皆崇貴傾於朝廷諸王每相見假立引待獨範見之色莊十四年病薨上哭之甚慟輟朝三日為之追福手寫老子經徹膳纍旬百僚上表勸喻然後復常開元十四年命工部尚書攝太尉盧從願冊贈王為惠文太子陪葬橋陵一子瑾封河東郡王官至太僕卿冒于酒色竟暴卒贈太子少師天寶三載又以惠宣太子男略陽公珍為嗣岐王銀青光祿大夫宗正員外卿上元二年珍與朱融善珍儀表偉如頗類玄宗融乃誘崔昌趙非熊等並中官六軍人同謀逆融謂金吾將軍邢濟曰今城中草草關外近更憑凌若何濟曰我金吾天子押衙死生隨之安能自脫融曰有一人足下見之自當知縱不出城亦無慮乃引以見珍濟奏之乃令御史中丞敬羽訊之珍賜死其同謀右武衛將軍竇如玢試都水使者崔昌右羽林軍大將軍劉從諫蔚州長塞鎮將朱融右衛將軍胡冽直司天臺通玄院高抱素右司禦率府率魏兆內侍省內謁者監王道成等九人特宜斬決試太子洗馬兼知司天臺冬官正事趙非熊陳王府長史陳閎楚州司馬張昂右武衛兵曹焦自榮前鳳翔府郿縣主簿李屺國子監廣文進士張奐等六人特宜決殺駙馬都尉薛履謙預逆謀宜賜自盡乃以濟兼桂州都督侍御史充桂管防禦都使左散騎常侍張鎬坐與交通貶辰州司戶鄭繇者鄭州滎陽人北齊吏部尚書述五代孫也工五言詩開元初範為岐州刺史繇為長史範失白鷹繇為失白鷹詩當時以為絶唱後為湖州刺史子審亦善詩詠乾元中任袁州刺史惠宣太子業睿宗第五子也本名隆業後單名業垂拱三年封趙王開府置官屬長壽二年隨例卻入閣改封中山郡王纍授都水使者尋又改封彭城郡王神龍元年加賜實封二百戶通前五百戶景龍二年兼陳州別駕銀青光祿大夫太僕少卿別駕如故睿宗即位進封薛王加封滿一千戶拜祕書監兼右羽林大將軍俄轉宗正卿睿宗以業好學而授祕書監及玄宗誅蕭至忠岑羲等業以翊從之功加實封通舊為五千戶開元初歷太子少保同涇豳衛虢等州刺史八年遷太子太保初業母早終從母賢妃親鞠養之至是迎賢妃出就外宅事之甚謹業同母妹淮陽涼國二公主亦早卒業撫愛其子逾於己子上以業孝友特加親愛業嘗疾病上親為祈禱及愈車駕幸其第置酒宴樂更為初生之歡玄宗賦詩曰昔見漳濱臥言將人事違今逢誕慶日猶謂學仙歸棠棣花重滿鴒原鳥再飛其恩意如此十三年上嘗不豫業妃弟內直郎韋賓與殿中監皇甫恂私議休咎事發玄宗令杖殺韋賓左遷皇甫恂為錦州刺史妃惶懼降服待罪業亦不敢入謁上遽令召之業至階下逡巡請罪上降階就執其手曰吾若有心猜阻兄弟者天地神明所共咎罪乃歡宴久之仍慰諭妃令復其位二十一年業進拜司徒二十二年正月薨冊贈惠宣太子陪葬橋陵有子十一人瑗樂安郡王瑒宗正卿滎陽郡王琄封嗣薛王珍嗣岐王琄為金紫光祿大夫鴻臚卿同正員天寶五載坐舅刑部尚書韋堅為右相李林甫所構貶夷陵郡別駕長任母隨琄竟以憂死七載琄於夜郎安置後移南浦郡十四載安祿山反赴于西京隋王隆悌睿宗第六子也初封汝南郡王長安初拜尚乘直長早薨睿宗踐極追封隋王贈荊州大都督無子史臣曰夫得天下而治者其道舒而有變讓天下而退者其道卷而常存何者飛龍在天舒也亢龍有悔變也讓皇帝守無咎於或躍利終吉於勞謙其用有光其聞莫朽惠莊惠文惠宣隋王等或守常而獲免終保皇枝或過望而包羞竟塵青史略陽公信魁偉之狀起圖謀之心福善禍淫宜哉不令贊曰謙而受益讓以成賢唐屬之美憲得其先長不居震剛不乘乾讓之大者胡可比焉撝範已降同氣連枝性習何遠非革即睽有善有惡禍福不欺
