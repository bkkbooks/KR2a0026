body:
  text: 舊唐書卷九十九列傳第四十九崔日用從兄日知張嘉貞弟嘉祐蕭嵩子華張九齡仲方李適之子季卿嚴挺之崔日用滑州靈昌人其先自博陵徙家焉進士舉初為芮城尉大足元年則天幸長安路次陝州宗楚客時為刺史日用支供頓事廣求珍味稱楚客之命遍饋從官楚客知而大加賞歎盛稱薦之由是擢為新豐尉無幾拜監察御史神龍中祕書監鄭普思納女後宮潛謀左道日用遽奏劾之普思方承恩中宗不之省日用廷爭懇至詞甚抗直普思竟伏其罪時宗楚客武三思武延秀等遞為朋黨日用潛皆附之驟遷兵部侍郎兼修文館學士中宗暴崩韋庶人稱制日用恐禍及己知玄宗將圖義舉乃因沙門普潤道士王曄密詣藩邸深自結納潛謀翼戴玄宗嘗謂曰今謀此舉直為親不為身日用曰此乃孝感動天事必克捷望速發出其不意若少遲延或恐生變及討平韋氏其夜令權知雍州長史事以功授銀青光祿大夫黃門侍郎參知機務封齊國公食實封二百戶為相月餘與中書侍郎薛稷不協於中書忿競由是轉雍州長史停知政事尋出為揚州長史歷婺汴二州刺史兗州都督荊州長史因入奏事言太平公主謀逆有期陛下往在宮府欲有討捕猶是子道臣道須用謀用力今既光臨大寶但須下一制誰敢不從忽姦宄得志則禍亂不小上曰誠如此直恐驚動太上皇卿宜更思之日用曰臣聞天子孝與庶人孝全別庶人孝謹身節用承順顏色天子孝安國家定社稷今若逆黨竊發即大業都棄豈得成天子之孝乎伏請先定北軍次收逆黨即不驚動太上皇玄宗從其議及討蕭至忠竇懷貞之際又令權檢校雍州長史加實封通前滿四百戶尋拜吏部尚書日用嘗採毛詩大雅小雅二十篇及司馬相如封禪書因上生日表上之以申規諷并述告成之事手詔答曰夫詩者動天地感鬼神厚於人美於教矣朕志之所尚思與之齊庶乎採詩之官補朕之闕且古者封禪升中告成朕以菲德未明于至道竦然以聽頗壯相如之詞惕然載懷復慚夷吾之語卿洽聞殫見溫故知新逮此發揮益彰忠懇豈非討蓬山之籍心不忘於起豫因蘭殿之祥言固深於啓沃朕循環覽諷用慰于懷今賜卿衣裳一副物五十段以示無言不酬之信也尋出為常州刺史削實封三百戶轉汝州刺史開元七年差降口賦特下敕曰唐元之際逆黨搆凶崔日用當時潛論其事及于戡翦實預元謀而所食之封後以例減功既居多特宜準初食之封與二百戶十年轉并州大都督長史尋卒時年五十贈吏部尚書諡曰昭後又贈荊州大都督子宗之襲日用才辨過人見事敏速每朝廷有事轉禍為福以取富貴及先天已後復求入相竟亦不遂常謂人曰吾一生行事皆臨時制變不必重專守始謀每一念之不覺芒刺在於背也日用從父兄日知亦有吏幹景雲中為洛州司馬會譙王重福入東都作亂羣臣皆避難逃匿日知獨督率人吏赴留守與屯營合勢討賊重福既死以功加銀青光祿大夫纍遷京兆尹坐贓為御史李如璧所劾左遷歙縣丞俄又歷遷殿中監日知素與張説友善説薦之奏請授御史大夫上不許遂以為左羽林衛大將軍而以河南尹崔隱甫為御史大夫隱甫由是與説不叶日知俄遷太常卿自以歷任年久每朝士參集常與尚書同列時人號為尚書𩹉行遂為口實開元十六年出為潞州大都督府長史尋以年老致仕卒諡曰襄張嘉貞蒲州猗氏人也弱冠應五經舉拜平鄉尉坐事免歸鄉里長安中侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以己之官秩授之則天召見垂簾與之言嘉貞奏曰以臣草萊而得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大悅擢拜監察御史纍遷中書舍人歷秦州都督并州長史為政嚴肅甚為人吏所畏開元初因奏事至京師上聞其善政數加賞慰嘉貞因奏曰臣少孤兄弟相依以至今臣弟嘉祐今授鄯州別駕與臣各在一方同心離居魂絶萬里乞移就臣側近臣兄弟盡力報國死無所恨上嘉其友愛特改嘉祐為欣州刺史時突厥九姓新來內附散居太原以北嘉貞奏請置軍以鎮之於是始於并州置天兵軍以嘉貞為使六年春嘉貞又入朝俄有告其在軍奢僭及贓賄者御史大夫王晙因而劾奏之按驗無狀上將加告者反坐之罪嘉貞奏曰昔者天子聽政於上瞍賦矇誦百工諫庶人謗而後天子斟酌焉今反坐此輩是塞言者之路則天下之事無由上達特望免此罪以廣謗誦之道從之遂令減死自是帝以嘉貞為忠嘉貞又嘗奏曰今志力方壯是效命之秋更三數年即衰老無能為也惟陛下早垂任使死且不憚上以其明辨尤重之八年春宋璟蘇頲罷知政事擢嘉貞為中書侍郎同中書門下平章事數月加銀青光祿大夫遷中書令嘉貞斷決敏速善於敷奏然性強躁自用頗為時論所譏時中書舍人苗延嗣呂太一考功員外郎員嘉靜殿中侍御史崔訓皆嘉貞所引位列清要常在嘉貞門下共議朝政時人為之語曰令公四俊苗呂崔員開元十年車駕幸東都有洛陽主簿王鈞為嘉貞修宅將以求御史因受贓事發上特令朝堂集衆決殺之嘉貞促所由速其刑以滅口乃歸罪於御史大夫韋抗中丞韋虛心皆貶黜之其冬祕書監薑皎犯罪嘉貞又附會王守一奏請杖之皎遂死于路俄而廣州都督裴胄先下獄上召侍臣問當何罪嘉貞又請杖之兵部尚書張説進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱臣今秋受詔巡邊中途聞薑皎以罪於朝堂決杖配流而死皎官是三品亦有微功若其有犯應死即殺應流即流不宜決杖廷辱以卒伍待之且律有八議勳貴在焉皎事已往不可追悔胄先祇宜據狀流貶不可輕又決罰上然其言嘉貞不悅退謂説曰何言事之深也説曰宰相者時來即為豈能長據若貴臣盡當可杖但恐吾等行當及之此言非為胄先乃為天下士君子也初嘉貞為兵部員外郎時張説為侍郎及是説位在嘉貞下既無所推讓説頗不平因以此言激怒嘉貞由是與説不叶上又以嘉貞弟嘉祐為金吾將軍兄弟並居將相之位甚為時人之所畏憚十一年上幸太原行在所嘉祐贓汙事發張説勸嘉貞素服待罪不得入謁因出為幽州刺史説遂代為中書令嘉貞惋恨謂人曰中書令幸有二員何相迫之甚也明年復拜戶部尚書兼益州長史判都督事敕嘉貞就中書省與宰相會宴嘉貞既恨張説擠己因攘袂勃罵源乾曜王晙共和解之明年坐與王守一交往左轉台州刺史復代盧從願為工部尚書定州刺史知北平軍事纍封河東侯將行上自賦詩詔百僚於上東門外餞之至州於恆嶽廟中立頌嘉貞自為其文乃書於石其碑用白石為之素質黑文甚為奇麗先是嶽祠為遠近祈賽有錢數百萬嘉貞自以為頌文之功納其數萬十七年嘉貞以疾請就醫東都制從之至都目瞑無所見上令醫人內直郎田休裕郎將呂弘泰馳傳往省療之其秋卒年六十四贈益州大都督諡曰恭肅嘉貞雖久歷清要然不立田園及在定州所親有勸植田業者嘉貞曰吾忝歷官榮曾任國相未死之際豈憂飢餒若負譴責雖富田莊亦無用也比見朝士廣占良田及身沒後皆為無賴子弟作酒色之資甚無謂也聞者皆歎伏初嘉貞作相薦萬年縣主簿韓朝宗擢為監察御史及嘉貞卒後十數歲朝宗為京兆尹因奏曰自陛下臨御已來所用宰相皆進退以禮善始令終身雖已沒子孫咸在朝廷唯張嘉貞晚年一子今猶未登官序上亦惘然遽令召之賜名延賞特拜左內率府兵曹參軍德宗朝位至宰輔自有傳嘉祐有幹略自右金吾將軍貶浦陽府折衝至二十五年為相州刺史相州自開元已來刺史死貶者十數人嘉祐訪知尉遲迥周末為相州總管身死國難乃立其神祠以邀福經三考改左金吾將軍後吳兢為鄴郡守又加尉遲神冕服自後郡守無患蕭嵩貞觀初左僕射宋國公瑀之曾姪孫祖鈞中書舍人有名於時嵩美鬚髯儀形偉麗初娶會稽賀晦女與吳郡陸象先為僚壻象先時為洛陽尉宰相子門望甚高嵩尚未入仕宣州人夏榮稱有相術謂象先曰陸郎十年內位極人臣然不及蕭郎一門盡貴官位高而有壽時人未之許神龍元年嵩調補洺州參軍尋而侍中扶陽王桓彥範出為洺州刺史見之推重待以殊禮景雲元年為醴泉尉時陸象先已為中書侍郎引為監察御史及象先知政事嵩又驟遷殿中侍御史開元初為中書舍人與崔琳王丘齊浣同列皆以嵩寡學術未異之而紫微令姚崇許其致遠眷之特深歷宋州刺史三遷為尚書左丞兵部侍郎十五年涼州刺史河西節度王君馼恃衆每歲攻擊吐蕃吐蕃大將悉諾邏恭祿及燭龍莽布支攻陷瓜州城執刺史田元獻及君馼父壽盡取城中軍資及倉糧仍毀其城而去又攻玉門軍及常樂縣縣令賈師順嬰城固守賊遂引退無何君馼又為回紇諸部殺之於鞏筆驛河隴震駭玄宗以君馼勇將無謀果及於難擇堪邊任者乃以嵩為兵部尚書河西節度使判涼州事嵩乃請以裴寬郭虛己牛仙客在其幕下又請以建康軍使左金吾將軍張守圭為瓜州刺史修築州城招輯百姓令其復業又加嵩銀青光祿大夫時悉諾邏恭祿威名甚振嵩乃縱反間於吐蕃言其與中國潛通贊普遂召而誅之明年秋吐蕃大下悉末朗復率衆攻瓜州守圭出兵擊走之隴右節度使鄯州都督張志亮引兵至青海西南渴波谷與吐蕃接戰大破之八月嵩又遣副將杜賓客率弩手四千人與吐蕃戰于祁連城下自晨至暮散而復合賊徒大潰臨陳斬其副將一人散走山谷哭聲四合露布至玄宗大悅乃加嵩同中書門下三品恩顧莫比十七年授宇文融裴光庭宰相又加嵩兼中書令自十四年燕國公張説罷中書令後缺此位四年而嵩居之常帶河西節度遙領之加集賢殿學士知院事兼修國史進位金紫光祿大夫子衡尚新昌公主嵩夫人賀氏入覲拜席玄宗呼為親家母禮儀甚盛尋又進封徐國公二十一年二月侍中裴光庭卒光庭與嵩同位數年情頗不協及是玄宗遣嵩擇相嵩以右丞韓休長者舉之及休入相嵩舉事休峭直輒不相假互於玄宗前論曲直因讓位玄宗眷嵩厚乃許嵩授尚書右丞相令罷相以休為工部尚書尋又以嵩子華為給事中二十四年拜太子太師及幽州節度使張守圭坐賂遺中官牛仙童貶為括州刺史嵩嘗賄仙童李林甫發之貶青州刺史尋又追拜太子太師嵩又請老嵩性好服餌及罷相於林園植藥合鍊自適華時為工部侍郎衡以主壻三品嵩皤然就養十餘年家財豐贍衣冠榮之天寶八年薨年八十餘贈開府儀同三司子華天寶末轉兵部侍郎祿山之亂從駕不及陷賊偽署魏州刺史乾元元年郭子儀與九節度之師渡河攻安慶緒於相州華潛通表疏俟官軍至為內應賊伺知之禁錮華於獄崔光遠收魏州破械出華魏人美華之惠政詣光遠請留朝廷正授魏州刺史既而史思明率衆南下子儀懼華復陷乃表崔光遠代華召至軍中及相州兵潰華歸京仍以偽命所汙降授試祕書少監華謹重方雅綽有家法人士稱之尋遷尚書右丞乾元二年出為河中尹河中晉絳節度使上元元年十二月制曰弼豫之選審象是求天步未平廟謨尤切必資明表佇以佐時畫一之才取則不遠正議大夫前河中尹兼御史中丞充本府晉絳等州節度觀察等使上柱國嗣徐國公賜紫金魚袋蕭華公輔成名承家繼業詞標麗則德蘊謨明再履宮坊尤知至行致君望美閲相求能且推伊陟之賢更啓漢臣之閣還依日月佐理陰陽俾參政於紫宸用建中於皇極可中書侍郎同中書門下平章事集賢殿崇文館大學士監修國史時中官李輔國專典禁兵怙寵用事求為宰相諷宰臣裴冕等薦己華頗拒之輔國怒肅宗方寢疾輔國矯命罷華相位守禮部尚書仍引元載代華肅宗崩代宗在諒暗元載希輔國旨貶華為硤州員外司馬卒於貶所衡子復德宗朝位亦至宰輔華子恆悟恆子俯大和中宰輔悟子倣咸通中宰輔皆自有傳張九齡字子壽一名博物曾祖君政韶州別駕因家于始興今為曲江人父弘愈以九齡貴贈廣州刺史九齡幼聰敏善屬文年十三以書干廣州刺史王方慶大嗟賞之曰此子必能致遠登進士第應舉登乙第拜校書郎玄宗在東宮舉天下文藻之士親加策問九齡對策高第遷右拾遺時帝未行親郊之禮九齡上疏曰伏以天者百神之君而王者之所由受命也自古繼統之主必有郊配之義蓋以敬天命以報所受故於郊之義則不以德澤未洽年穀不登凡事之故而闕其禮孝經云昔者周公郊祀后稷以配天斯謂成王幼沖周公居攝猶用其禮明不暫廢漢丞相匡衡亦云帝王之事莫重乎郊祀董仲舒又云不郊而祭山川失祭之序逆於禮正故春秋非之臣愚以為匡衡仲舒古之知禮者皆謂郊之為祭所宜先也伏惟陛下紹休聖緒其命惟新御極已來於今五載既光太平之業未行大報之禮竊考經傳義或未通今百穀嘉生鳥獸咸若夷狄內附兵革用寧將欲鑄劍為農泥金封禪用彰功德之美允答神祇之心能事畢行光耀帝載況郊祀常典猶闕其儀有若怠於事天臣恐不可以訓伏望以迎日之至展焚柴之禮升紫壇陳采席定天位明天道則聖朝典則可謂無遺矣九齡以才鑒見推當時吏部試拔萃選人及應舉者咸令九齡與右拾遺趙冬曦考其等第前後數四每稱平允開元十年三遷司勳員外郎時張説為中書令與九齡同姓為昭穆尤親重之常謂人曰後來詞人稱首也九齡既欣知己亦依附焉十一年拜中書舍人十三年車駕東巡行封禪之禮説自定侍從升中之官多引兩省録事主書及己之所親攝官而上遂加特進階超授五品初令九齡草詔九齡言於説曰官爵者天下之公器德望為先勞舊次焉若顛倒衣裳則譏謗起矣今登封霈澤千載一遇清流高品不沐殊恩胥吏末班先加章紱但恐制出之後四方失望今進草之際事猶可改唯令公審籌之無貽後悔也説曰事已決矣悠悠之談何足慮也竟不從及制出內外甚咎於説時御史中丞宇文融方知田戶之事每有所奏説多建議違之融亦以此不平於説九齡復勸説為備説又不從其言無幾説果為融所劾罷知政事九齡亦改太常少卿尋出為冀州刺史九齡以母老在鄉而河北道里遼遠上疏固請換江南一州望得數承母音耗優制許之改為洪州都督俄轉桂州都督仍充嶺南道按察使上又以其弟九章九臯為嶺南道刺史令歲時伏臘皆得寧覲初張説知集賢院事常薦九齡堪為學士以備顧問説卒後上思其言召拜九齡為祕書少監集賢院學士副知院事再遷中書侍郎常密有陳奏多見納用尋丁母喪歸鄉里二十一年十二月起復拜中書侍郎同中書門下平章事明年遷中書令兼修國史時范陽節度使張守圭以裨將安祿山討奚契丹敗衄執送京師請行朝典九齡奏劾曰穰苴出軍必誅莊賈孫武教戰亦斬宮嬪守圭軍令必行祿山不宜免死上特捨之九齡奏曰祿山狼子野心面有逆相臣請因罪戮之冀絶後患上曰卿勿以王夷甫知石勒故事誤害忠良遂放歸藩二十三年加金紫光祿大夫纍封始興縣伯李林甫自無學術以九齡文行為上所知心頗忌之乃引牛仙客知政事九齡屢言不可帝不悅二十四年遷尚書右丞相罷知政事後宰執每薦引公卿上必問風度得如九齡否故事皆搢笏於帶而後乘馬九齡體羸常使人持之因設笏囊笏囊之設自九齡始也初九齡為相薦長安尉周子諒為監察御史至是子諒以妄陳休咎上親加詰問令於朝堂決殺之九齡坐引非其人左遷荊州大都督府長史俄請歸拜墓因遇疾卒年六十八贈荊州大都督諡曰文獻九齡在相位時建議復置十道採訪使又教河南數州水種稻以廣屯田議置屯田費功無利竟不能就罷之性頗躁急動輒忿詈議者以此少之子拯伊闕令祿山之亂陷賊不受偽命兩京克復詔加太子右贊善弟九臯自尚書郎歷唐徐宋襄廣五州刺史九章歷吉明曹三州刺史鴻臚卿九齡為中書令時天長節百僚上壽多獻珍異唯九齡進金鏡録五卷言前古興廢之道上賞異之又與中書侍郎嚴挺之尚書左丞袁仁敬右庶子梁升卿御史中丞盧怡結交友善挺之等有才幹而交道終始不渝甚為當時之所稱至德初上皇在蜀思九齡之先覺下詔褒贈曰正大廈者柱石之力昌帝業者輔相之臣生則保其榮名歿乃稱其盛德飾終未允於人望加贈實存乎國章故中書令張九齡維嶽降神濟川作相開元之際寅亮成功讜言定其社稷先覺合於蓍策永懷賢弼可謂大臣竹帛猶存樵蘇必禁爰從八命之秩更進三台之位可贈司徒仍遣使就韶州致祭有集二十卷九臯曾孫仲方少朗秀為兒童時父友高郢見而奇之曰此子非常必為國器吾獲高位必振發之後郢為御史大夫首請仲方為御史歷金州刺史郡人有田産為中人所奪仲方三疏奏聞竟理其冤入為度支郎中駁李吉甫諡吉甫之黨惡之出為遂州司馬稍遷復曹鄭三郡守為諫議大夫時鄠縣令崔發因辱小黃門敬宗赫怒付臺推鞫及元日大赦獨發不得宥仲方上疏其略曰鴻恩將布於天下而不行御前霈澤始被於昆蟲而獨遺崔發由是發得不死時論美之大和九年為京兆尹將相從纍者皆大戮仲方密令識之旋詔下許令收葬得認遺骸實仲方之力也是時軍人橫恣仲方脂韋坐不稱職出為華州刺史改祕書監開成二年卒年七十二贈禮部尚書諡曰成李適之一名昌恆山王承乾之孫也父象官至懷州別駕適之神龍初起家拜左衛郎將開元中纍遷通州刺史以強幹見稱時給事中韓朝宗為按察使特表薦之擢拜秦州都督俄轉陝州刺史入為河南尹適之性簡率不務苛細人吏便之歲餘拜御史大夫開元二十七年兼幽州大都督府長史知節度事適之以祖得罪見廢父又遭則天所黜葬禮有闕上疏請歸葬昭陵之闕內於是下詔追贈承乾為恆山愍王象為越州都督郇國公伯父厥及亡兄數人並有褒贈數喪同至京師葬禮甚盛仍刊石於墳所俄拜刑部尚書適之雅好賓友飲酒一斗不亂夜則宴賞晝決公務庭無留事天寶元年代牛仙客為左相纍封清和縣公與李林甫爭權不叶適之性疏為其陰中林甫嘗謂適之曰華山有金礦採之可以富國上未之知適之心善其言他日從容奏之玄宗大悅顧問林甫對曰臣知之久矣然華山陛下本命王氣所在不可穿鑿臣故不敢上言帝以為愛己薄適之言疏隴右節度皇甫惟明刑部尚書韋堅戶部尚書裴寬京兆尹韓朝宗悉與適之善林甫皆中傷之構成其罪相繼放逐適之懼不自安求為散職五載罷知政事守太子少保遽命親故歡會賦詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾箇來竟坐與韋堅等相善貶宜春太守後御史羅希奭奉使殺韋堅盧幼臨裴敦復李雍等於貶所州縣且聞希奭到無不惶駭希奭過宜春郡適之聞其來仰藥而死子季卿弱冠舉明經頗工文詞應制舉登博學宏詞科再遷京兆府鄠縣尉肅宗朝纍遷中書舍人以公事坐貶通州別駕代宗即位大舉淹抑自通州徵為京兆少尹尋復中書舍人拜吏部侍郎俄兼御史大夫奉使河南江淮宣慰振拔幽滯進用忠廉時人稱之在銓衡數年轉右散騎常侍季卿有宇量性識博達善與人交襟懷豁如其在朝以進賢為務士以此多之大曆二年卒贈禮部尚書孫融立性嚴整善吏事貞元十年歷官至渭州節度使卒嚴挺之華州華陰人叔父方嶷景雲中戶部郎中挺之少好學舉進士神龍元年制舉擢第授義興尉遇姚崇為常州刺史見其體質昂藏雅有吏幹深器異之及崇再入為中書令引挺之為右拾遺睿宗好樂聽之忘倦玄宗又善音律先天二年正月望胡僧婆陀請夜開門燃百千燈睿宗御延喜門觀樂凡經四日又追作先天元年大酺睿宗御安福門樓觀百司酺宴以夜繼晝經月餘日挺之上疏諫曰微臣竊惟陛下應天順人發號施令躬親大禮昭布鴻澤孜孜庶政業業萬幾蓋以天下心為心深戒安危之理此誠堯舜禹湯之德教也奈何親御城門以觀大酺纍日兼夜臣愚竊所未諭夫酺者因人所利合醵為歡無相奪倫不至糜弊且臣卜其晝史册攸存君舉必書帝王重慎今乃暴衣冠於上路羅妓樂於中宵雜鄭衛之音縱倡優之樂陛下還淳復古宵衣旰食不矜細行恐非聖德所宜臣以為一不可也誰何警夜伐鼓通晨以備非常存之善教今陛下不深惟戒慎輕違動息重門弛禁巨猾多徒倘有躍馬奔車流言駭叫一塵聽覽有纍宸衷臣以為二不可也且一人向隅滿堂不樂一物失所納隍增慮陛下北宮多暇西墉暫臨青春日長已積埃塵之弊紫微漏永重窮歌舞之樂倘令有司跛倚下人飢倦以陛下近猶不恤而況於遠乎聖情攸聞豈不懍然祗畏臣以為三不可也且元正首祚大禮頻光百姓顒顒咸謂業盛配天功垂曠代今陛下恩似薄於衆望酺即過於往年王公貴人各承微旨州縣坊曲競為課稅吁嗟道路貿易家産損萬人之力營百戲之資適欲同其歡而乃遺其患復令兼夜人何以堪臣以為四不可也書曰罔咈百姓以從己之欲況自去夏霪霖經今亢旱農乏收成市有騰貴損其實崇其虛馳不急之務擾方春之業前代聖主明王忽於細微而成過患多矣陛下可效之哉伏望晝則歡娛暮令休息要令兼夜恐無益於聖朝上納其言而止時侍御史任知古恃憲威於朝行詬詈衣冠挺之深讓之以為不敬乃為臺司所劾左遷萬州員外參軍開元中為考功員外郎典舉二年大稱平允登科者頓減二分之一遷考功郎中特敕又令知考功貢舉事稍遷給事中時黃門侍郎杜暹中書侍郎李元紘同列為相不叶暹與挺之善元紘素重宋遙引為中書舍人及與起居舍人張咺等同考吏部等第判遙復與挺之好尚不同遙言於元紘元紘詰譙挺之挺之曰明公位尊國相情溺小人乃有憎惡甚為不取也詞色俱厲元紘曰小人為誰挺之曰即宋遙也因出為登州刺史太原少尹殿中監王毛仲使太原朔方幽州計會兵馬事隔數年乃牒太原索器仗挺之以不挾敕毛仲寵幸久恐有變故密奏之尋遷濮汴二州刺史挺之所歷皆嚴整吏不敢犯及蒞大郡人乃重足側息二十年毛仲得罪賜死玄宗思曩日之奏擢為刑部侍郎深見恩遇改太府卿與張九齡相善九齡入相用挺之為尚書左丞知吏部選陸景融知兵部選皆為一時精選時侍中裴耀卿禮部尚書李林甫與九齡同在相位九齡以詞學進入視草翰林又為中書令甚承恩顧耀卿與九齡素善林甫巧密知九齡方承恩遇善事之意未相與林甫引蕭炅為戶部侍郎嘗與挺之同行慶弔客次有禮記蕭炅讀之曰蒸嘗伏獵炅早從官無學術不識伏臘之意誤讀之挺之戲問炅對如初挺之白九齡曰省中豈有伏獵侍郎由是出為岐州刺史林甫深恨之九齡嘗欲引挺之同居相位謂之曰李尚書深承聖恩足下宜一造門款狎挺之素負氣薄其為人三年非公事竟不私造其門以此彌為林甫所嫉及挺之囑蔚州刺史王元琰林甫使人詰於禁中以此九齡罷相挺之出為洺州刺史二十九年移絳郡太守天寶元年玄宗嘗謂林甫曰嚴挺之何在此人亦堪進用林甫乃召其弟損之至門故云當授子員外郎因謂之曰聖人視賢兄極深要須作一計入城對見當有大用令損之取絳郡一狀云有少風氣請入京就醫林甫將狀奏云挺之年高近患風且須授間官就醫玄宗歎叱久之林甫奏授員外詹事便令東京養疾挺之素歸心釋典事僧惠義及至東都鬱鬱不得志成疾自為墓志曰天寶元年嚴挺之自絳郡太守抗疏陳乞天恩允請許養疾歸間兼授太子詹事前後歷任二十五官每承聖恩嘗忝奬擢不盡驅策駑蹇何階仰答鴻造春秋七十無所展用為人士所悲其年九月寢疾終於洛陽某里之私第十一月葬於大照和尚塔次西原禮也盡忠事君叨載國史勉拙從仕或布人謠陵谷可以自紀文章焉用為飾遺文薄葬斂以時服挺之與裴寬皆奉佛開元末惠義卒挺之服縗麻送於龕所寬為河南尹僧普寂卒寬與妻子皆服縗絰設次哭臨妻子送喪至嵩山故挺之志文云葬於大照塔側祈其靈祐也挺之素重交結有許與凡舊交先歿者厚撫其妻子凡嫁孤女數十人時人重之子武廣德中黃門侍郎成都尹劍南節度使史臣曰崔日用附會三思以取高位預討韋氏遂握重權自言吾一生行事皆臨時制變不必專守始謀信矣與夫守死善道者不可同年而語也張嘉貞雖不立田園奈急於勢利朋比近習杖薑皎胄先非中立之士也蕭嵩位極中令異政無聞樹破虜之勳真致遠之器九齡文學政事咸有所稱一時之選也適之臨下雖簡在公克勤惜乎不得其死也挺之才略器識不下諸公恥近權門為人所惡不登台輔養疾宮僚雖富貴在天窮達有命彼林甫者誠可投畀豺虎也贊曰開元之代多士盈庭日用無守嘉貞近名嵩齡適挺各有度程大位俱極半慚德馨
