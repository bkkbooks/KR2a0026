body:
  text: 舊唐書卷八十八列傳第三十八韋思謙子承慶嗣立陸元方子象先蘇瓌子頲韋思謙鄭州陽武人也本名仁約字思謙以音類則天父諱故稱字焉其先自京兆南徙家于襄陽舉進士纍補應城令歲餘調選思謙在官坐公事微殿舊制多未進吏部尚書高季輔曰自居選部今始得此一人豈以小疵而棄大德擢授監察御史由是知名嘗謂人曰御史出都若不動搖山嶽震懾州縣誠曠職耳時中書令褚遂良賤市中書譯語人地思謙奏劾其事遂良左授同州刺史及遂良復用思謙不得進出為清水令謂人曰吾狂鄙之性假以雄權觸機便發固宜為身災也大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子耳左肅機皇甫公義檢校沛王府長史引思謙為同府倉曹謂思謙曰公豈池中之物屈公為數旬之客以望此府耳纍遷右司郎中永淳初歷尚書左丞御史大夫時武候將軍田仁會與侍御史張仁禕不協而誣奏之高宗臨軒問仁禕仁禕惶懼應對失次思謙歷階而進曰臣與仁禕連曹頗知事由仁禕懦而不能自理若仁會眩惑聖聰致仁禕非常之罪即臣亦事君不盡矣請專對其狀辭辨縱橫音旨明暢高宗深納之思謙在憲司每見王公未嘗行拜禮或勸之答曰雕鶚鷹鸇豈衆禽之偶奈何設拜以狎之且耳目之官固當獨立也初拜左丞奏曰陛下為官擇人非其人則闕今不惜美錦令臣製之此陛下知臣之深亦微臣盡命之秋振舉綱目朝廷肅然則天臨朝轉宗正卿會官名改易改為司屬卿光宅元年分置左右肅政臺復以思謙為右肅政大夫大夫舊與御史抗禮思謙獨坐受其拜或以為辭思謙曰國家班列自有差等奈何以姑息為事耶垂拱初賜爵博昌縣男遷鳳閣鸞臺三品二年代蘇良嗣為納言三年上表告老請致仕許之仍加太中大夫永昌元年九月卒於家贈幽州都督二子承慶嗣立承慶字延休少恭謹事繼母以孝聞弱冠舉進士補雍王府參軍府中文翰皆出於承慶辭藻之美擅於一時纍遷太子司議郎儀鳳四年五月詔皇太子賢監國時太子頗近聲色與戶奴等款狎承慶上書諫曰臣聞太子者君之二國之本也所以承宗廟之重繫億兆之心萬國以貞四海屬望殿下以仁孝之德明睿之姿嶽峙泉渟金貞玉裕天皇升殿下以儲副寄殿下以監撫欲使照無不及恩無不覃百僚仰重曜之暉萬姓聞洊雷之響夫君無民無以保其位人非食無以全其生故孔子曰百姓足君孰與不足百姓不足君孰與足自頃年已來頻有水旱菽粟不能豐稔黎庶自致煎窮今夏亢陽米價騰踊貧窶之室無以自資朝夕遑遑唯憂餒饉下人之瘼實可哀矜稼穡艱難所宜詳悉天皇所以垂衣北極殿下所以守器東宮為天下之所尊得天下之所利者豈唯上玄之幽贊亦百姓之力也百姓危則社稷不得獨安百姓亂則帝王不能獨理故古之明君飽而知人飢溫而知人寒每以天下為憂不以四海為樂今關隴之外凶寇憑凌西土編氓凋喪將盡干戈日用烽柝荐興千里有勞於饋糧三農不遑於稼穡殿下為臣為子乃國乃家為臣在於竭忠為子期於盡孝在家不可以自逸在國不可以自康一物有虧聖上每留神念三邊或梗殿下豈不兢懷況當養德之秋非是任情之日伏承北門之內造作不常玩好所營或有煩費倡優雜伎不息於前鼓吹繁聲亟聞於外既喧聽覽且黷宮闈兼之僕隸小人緣此得親左右亦既奉承顏色能不恃託恩光作福作威莫不由此不加防慎必有愆非儻使微纍德音於後悔之何及書云不作無益害有益此皆無益之事固不可耽而悅之臣又聞高而不危所以長守貴滿而不溢所以長守富是知高危不可不慎滿溢不可不持易曰君子終日乾乾夕惕若厲無咎敬慎之謂也在於凡庶能守而行之猶可以高振聲華坐致榮祿況殿下有少陽之位有天挺之姿片善而天下必聞小能而天下咸服豈可不為盡善盡美之道以取可大可久之名哉伏願博覽經書以廣其德屏退聲色以抑其情靜默無為恬虛寡欲非禮勿動非法不言居處服玩必循節儉畋獵遊娛不為縱逞正人端士必引而親之便僻側媚必斥而遠之使惠聲溢於遠近仁風翔於內外則可以克享終吉長保利貞為上嗣之稱首奉聖人之鴻業者矣又嘗為諭善針以獻太子太子善之賜物甚厚承慶又以人之用心多擾濁浮躁罕詣沖和之境乃著靈臺賦以廣其志辭多不載調露初東宮廢出為烏程令風化大行長壽中纍遷鳳閣舍人兼掌天官選事承慶屬文迅捷雖軍國大事下筆輒成未嘗起草尋坐忤大臣旨出為沂州刺史未幾詔復舊職依前掌天官選事久之以病免改授太子諭德後歷豫虢等州刺史頗著聲績制書褒美長安初入為司僕少卿轉天官侍郎兼修國史承慶自天授以來三掌天官選事銓授平允海內稱之尋拜鳳閣侍郎同鳳閣鸞臺平章事仍依舊兼修國史神龍初坐附推張易之弟昌宗失實配流嶺表時易之等既伏誅承慶去巾解帶而待罪時欲草赦書衆議以為無如承慶者乃召承慶為之承慶神色不撓援筆而成辭甚典美當時咸歎服之歲餘起授辰州刺史未之任入為祕書員外少監兼修國史尋以修則天實録之功賜爵扶陽縣子賚物五百段又制撰則天皇后紀聖文中宗稱善特加銀青光祿大夫俄授黃門侍郎仍依舊兼修國史未拜而卒中宗傷悼久之乃召其弟相州刺史嗣立令赴葬事仍拜黃門侍郎令繼兄位其見用如此贈祕書監諡曰溫子長裕膳部員外郎嗣立承慶異母弟也母王氏遇承慶甚嚴每有杖罰嗣立必解衣請代母不聽輒私自杖母察知之漸加恩貸議者比晉人王祥王覽少舉進士纍補雙流令政有殊績為蜀中之最三遷萊蕪令會承慶自鳳閣舍人以疾去職則天召嗣立謂曰卿父往日嘗謂朕曰臣有兩男忠孝堪事陛下自卿兄弟效職如卿父言今授卿鳳閣舍人令卿兄弟自相替代即日遷鳳閣舍人時學校頽廢刑法濫酷嗣立上疏諫曰臣聞古先哲王立學官掌教國子以六德六行六藝三教備而人道畢矣禮記曰化人成俗必由學乎學之於人其用蓋博故立太學以教於國設庠序以化於邑王之諸子卿大夫士之子及國之俊選皆造焉八歲入小學十五入太學春秋教以禮樂冬夏教以詩書是以教洽而化流行成而不悖自天子以至於庶人未有不須學而成者也國家自永淳已來二十餘載國學廢散胄子衰缺時輕儒學之官莫存章句之選貴門後進競以僥幸升班寒族常流復因凌替弛業考試之際秀茂罕登驅之臨人何以從政又垂拱之後文明在辰盛典鴻休日書月至因藉際會入仕尤多加以讒邪凶黨來俊臣之屬妄執威權恣行枉陷正直之伍死亡為憂道路以目人無固志罕有執不撓之懷殉至公之節偷安苟免聊以卒歲遂使綱領不振請託公行選舉之曹彌長渝濫隨班少經術之士攝職多庸瑣之才徒以猛暴相誇罕能清惠自勗使海內黔首騷然不安州縣官僚貪鄙未息而望事必循理俗致康寧不可得也陛下誠能下明制發德音廣開庠序大敦學校三館生徒即令追集王公已下子弟不容別求仕進皆入國學服膺訓典崇飾館廟尊尚儒師盛陳奠菜之儀宏敷講説之會使士庶觀聽有所發揚弘奬道德於是乎在則四海之內靡然向風延頸舉足咸知所向然後審持衡鏡妙擇良能以之臨人寄之調俗則官無侵暴之政人有安樂之心居人則相與樂業百姓則皆戀桑梓豈復憂其逃散而貧窶哉今天下戶口亡逃過半租調既減國用不足理人之急尤切於茲故知務學之源豈唯潤身進德而已將以誨人利國可不務之哉臣聞堯舜之日畫其衣冠文景之時幾致刑措歷茲千載以為美談臣伏惟陛下睿哲欽明窮神知化自軒昊已降莫之與京獨有往之論法或未盡善皆由主司姦凶惑亂視聽尋而陛下聖察具詳之矣然竟未能顯其本源明其前事令天下萬姓識陛下本心尚使四海多銜冤之人九泉有抱痛之鬼臣誠愚暗不識大綱請為陛下始末而言其事揚豫之後刑獄漸興用法之伍務於窮竟連坐相牽數年不絶遂使巨姦大猾伺隙乘間內苞豺狼之心外示鷹鸇之迹陰圖潛結共相影會構似是之言成不赦之罪皆深為巧詆恣行楚毒人不勝痛便乞自誣公卿士庶連頸受戮道路籍籍雖知非辜而鍛鍊已成辨占皆合縱臯陶為理于公定刑則謂汙宮毀柩猶未塞責雖陛下仁慈哀念恤獄緩死及覽辭狀便已周密皆謂勘鞫得情是其實犯雖欲寬捨其如法何於是小乃身誅大則族滅相緣共坐者不可勝言此豈宿構讎嫌將申報復皆圖苟成功效自求官賞當時稱傳謂為羅織其中陷刑得罪者雖有敏識通材被告言者便遭枉抑心徒痛其冤酷口莫能以自明或受誅夷或遭竄殛並甘心引分赴之如歸故知弄法徙文傷人實甚賴陛下特回聖察昭然詳究周興丘績之類弘義俊臣之徒皆相次伏誅事暴遐邇而朝野慶泰若再覩陽和且如仁傑元忠俱罹枉陷被勘鞫之際亦皆已自誣向非陛下至明垂以省察則葅醢之戮已及其身欲望輸忠聖代安可復得陛下擢而升之各為良輔國之棟幹稱此二人何乃前非而後是哉誠由枉陷與甄明爾但恐往之得罪者多並此流則向時之冤者其數甚衆昔殺一孝婦尚或降災而濫者蓋多寧無怨氣怨氣上達則水旱所興欲望歲登不可得也倘陛下弘天地之大德施雷雨之深仁歸罪於削刻之徒降恩於枉濫之伍自垂拱已來大辟罪已下常赦所不原者罪無輕重一皆原洗被以昭蘇伏法之輩追還官爵緣纍之徒普霑恩造如此則天下知比所陷罪元非陛下之意咸是虐吏之辜幽明歡欣則感通和氣和氣下降則風雨以時風雨以時則五穀豐稔歲既稔矣人亦安矣太平之美亦何遠哉伏願陛下深察尋遷秋官侍郎三遷鳳閣侍郎同鳳閣鸞臺平章事長安中則天嘗與宰臣議及州縣官吏納言李嶠夏官尚書唐休璟等奏曰臣等謬膺大任不能使兵革止息倉府殷盈戶口尚有逋逃官人未免貪濁使陛下臨朝軫歎屢以為言夙夜慚惶不知啓處伏思當今要務莫過富國安人富國安人之方在擇刺史竊見朝廷物議莫不重內官輕外職每除授牧伯皆再三披訴比來所遣外任多是貶纍之人風俗不澄實由於此今望於臺閣寺監妙簡賢良分典大州共康庶績臣等請輟近侍率先具僚務在憂國濟人庶當有所補益則天曰卿等處鸞臺鳳閣誰為此行嗣立率先對曰臣以庸愚謬膺奬擢內掌機密非臣所堪承乏外臺庶當盡節倘垂採録臣願此行於是嗣立帶本官檢校汴州刺史無幾嗣立兄承慶入知政事嗣立轉成均祭酒兼檢校魏州刺史又徙洺州刺史尋坐承慶左授饒州長史歲餘徵為太僕少卿兼掌吏部選事神龍二年為相州刺史及承慶卒代為黃門侍郎轉太府卿加修文館學士景龍三年轉兵部尚書同中書門下三品時中宗崇飾寺觀又濫食封邑者衆國用虛竭嗣立上疏諫曰臣聞國無九年之儲家無三年之蓄家非其家國非其國故知立國立家皆資於儲蓄矣夫水旱之災關之陰陽運數非人智力所能及也堯遭大水湯遭大旱則知仁聖之君所不能免當此時不至於困弊者積也今陛下倉庫之內比稍空竭尋常用度不支一年倘有水旱人須賑給徵發時動兵要資裝則將何以備之其緣倉庫不實妨於政化者觸類而是臣竊見比者營造寺觀其數極多皆務取宏博競崇瓌麗大則費耗百十萬小則尚用三五萬餘略計都用資財動至千萬已上轉運木石人牛不停廢人功害農務事既非急時多怨咨故書曰不作無益害有益功乃成不貴異物賤用物民乃足誠哉此言非虛談也且玄旨祕妙歸於空寂苟非修心定慧諸法皆涉有為至如土木雕刻等功唯是殫竭人力但學相誇壯麗豈關降伏身心且凡所興功皆須掘鑿蟄蟲在土種類實多每日殺傷動盈萬計連年如此損害可知聖人慈悲為心豈有須行此事不然之理皎在目前世俗衆僧未通其旨不慮府庫空竭不思聖人憂勞謂廣樹福田即是增修法教倘水旱為災人至飢餒夷狄作梗兵無資糧陛下雖有龍象如雲伽藍概日豈能裨萬分之一救元元之苦哉於道法既有乖在生人極為損陛下豈可不深思之臣竊見食封之家其數甚衆昨略問戶部云用六十餘萬丁一丁兩匹即是一百二十萬已上臣頃在太府知每年庸調絹數多不過百萬少則七八十萬已來比諸封家所入全少倘有蟲霜旱潦曾不半在國家支供何以取給臣聞自封茅土裂山河皆須業著經綸功申草昧然後配宗廟之享承帶礪之恩皇運之初功臣共定天下當時食封才上三二十家今以尋常特恩遂至百家已上國家租賦太半私門私門則資用有餘國家則支計不足有餘則或致奢侈不足則坐致憂危制國之方豈謂為得封戶之物諸家自徵或是官典或是奴僕多挾勢騁威凌突州縣凡是封戶不勝侵擾或輸物多索裹頭或相知要取中物百姓怨歎遠近共知復有因將貨易轉更生釁徵打紛紛曾不寧息貧乏百姓何以克堪若必限丁物送太府封家但於左藏請受不得輒自徵催則必免侵擾人冀蘇息臣又聞設官分職量事置吏此本於理人而務安之也故書曰在官人在安人官人則哲安人則惠能哲而惠何憂乎歡兜何畏乎有苗者也是明官得其人而天下自理矣古者取人必先採鄉曲之譽然後辟於州郡州郡有聲然後辟於五府才著五府然後升之天朝此則用一人所擇者甚悉擢一士所歷者甚深孔子曰譬有美錦不可使人學製此明用人不可不審擇也用得其才則理非其才則亂理亂所繫焉可不深擇之哉今之取人有異此道多未甚試效即頓至遷擢夫趨競者人之常情僥幸者人之所趣而今務進不避僥幸者接踵比肩布於文武之列有文者用理內外則有回邪贓汙上下敗亂之憂有武者用將軍戎則有庸懦怯弱師旅喪亡之患補授無限員闕不供遂至員外置官數倍正闕曹署典吏困於祗承府庫倉儲竭於資奉國家大事豈甚於此古者懸爵待士唯有才者得之若任用無才則有才之路塞賢人君子所以遁迹銷聲常懷歎恨者也且賢人君子守於正直之道遠於僥幸之門若僥幸開則賢者不可復出矣賢者遂退若欲求人安化洽復不可得也人若不安國將危矣陛下安可不深慮之又刺史縣令理人之首近年已來不存簡擇京官有犯及聲望下者方遣牧州吏部選人暮年無手筆者方擬縣令此風久扇上下同知將此理人何以率化今歲非豐稔戶口流亡國用空虛租調減削陛下不以此留念將何以理國乎臣望下明制具論前事使有司改換簡擇天下刺史縣令皆取才能有稱望者充自今已往應有遷除諸曹侍郎兩省兩臺及五品已上清望官先於刺史縣令中選用牧宰得人天下大理萬姓欣欣然豈非太平樂事哉唯陛下詳擇疏奏不納嗣立與韋庶人宗屬疏遠中宗特令編入屬籍由是顧賞尤重嘗於驪山構營別業中宗親往幸焉自製詩序令從官賦詩賜絹二千匹因封嗣立為逍遙公名其所居為清虛原幽棲谷韋氏敗幾為亂兵所害寧王憲以嗣立是從母之夫救護免之睿宗踐祚拜中書令旬日出為許州刺史以定册尊立睿宗之功賜實封一百戶開元初入為國子祭酒先是中宗遺制睿宗輔政宗楚客韋溫等改削藁草嗣立時在政事府不能正之至是為憲司所劾左遷嶽州別駕久之遷陳州刺史時河南道巡察使工部尚書劉知柔奏嗣立清白可陟之狀詔命未下開元七年卒贈兵部尚書諡曰孝中書門下又奏嗣立衣冠之內夙表才名兄弟之間特稱和睦承恩歷事位列宰臣中年以不能正身頗近凶戚為憲司糾劾因茲出貶若循其始終是吉人宜棄其瑕以從衆望請贈物一百段從之嗣立承慶俱以學行齊名長壽中嗣立代承慶為鳳閣舍人長安三年承慶代嗣立為天官侍郎頃之又代嗣立知政事及承慶卒嗣立又代為黃門侍郎前後四職相代又父子三人皆至宰相有唐已來莫與為比嗣立三子孚恆濟皆知名孚纍遷至左司員外郎恆開元初為碭山令為政寬惠人吏愛之會車駕東巡縣當供帳時山東州縣皆懼不辦務於鞭撲恆獨不杖罰而事皆濟理遠近稱焉御史中丞宇文融即恆之姑子也嘗密薦恆有經濟之才請以己之官秩回授乃擢拜殿中侍御史歷度支左司等員外太常少卿給事中二十九年為隴右道河西黜陟使恆至河西時節度使蓋嘉運恃託中貴公為非法兼偽功勞恆抗表請劾之人代其懼因出為陳留太守未行而卒時人甚傷惜之濟早以辭翰聞開元初調補鄄城令時有人密奏玄宗曰今歲吏部選太濫縣令非材全不簡擇及縣令謝官日引入殿庭問安人策一道試者二百餘人獨濟策第一或有不書紙者擢濟為醴泉令二十餘人還舊官四五十人放歸習讀侍郎盧從願李朝隱貶為刺史濟至醴泉以簡易為政人用稱之三遷為庫部員外郎二十四年為尚書戶部侍郎纍歲轉太原尹製先德詩四章述祖父之行辭致高雅天寶七載又為河南尹遷尚書左丞三代為省轄衣冠榮之濟從容雅度所蒞人推善政後出為馮翊太守陸元方蘇州吳縣人世為著姓曾祖琛陳給事黃門侍郎伯父柬之以工書知名官至太子司議郎元方舉明經又應八科舉纍轉監察御史則天革命使元方安輯嶺外將涉海時風濤甚壯舟人莫敢舉帆元方曰我受命無私神豈害我遽命之濟既而風濤果息使還稱旨除殿中侍御史即以其月擢拜鳳閣舍人仍判侍郎事俄為來俊臣所陷則天手敕特赦之長壽二年再遷鸞臺侍郎同鳳閣鸞臺平章事延載初又加鳳閣侍郎證聖初內史李昭德得罪以元方附會昭德貶綏州刺史尋復為春官侍郎又轉天官侍郎尚書左丞尋拜鸞臺侍郎平章事則天嘗問以外事對曰臣備位宰臣有大事即奏人間碎務不敢以煩聖覽由是忤旨責授太子右庶子罷知政事尋轉文昌左丞病卒元方在官清謹再為宰相則天將有遷除每先以訪之必密封以進未嘗露其私恩臨終取前後草奏悉命焚之且曰吾陰德於人多矣其後庶幾福不衰矣又有書一匣常自緘封家人莫有見者及卒視之乃前後敕書其慎密如此贈越州都督開元十八年又贈揚州大都督子象先象先本名景初少有器量應制舉拜揚州參軍秩滿調選時吉頊為吏部侍郎擢授洛陽尉元方時亦為吏部固辭不敢當頊曰為官擇人至公之道陸景初才望高雅非常流所及實不以吏部之子妄推薦也竟奏授之遷左臺監察御史轉殿中歷授中書侍郎景雲二年冬同中書門下平章事監修國史初太平公主將引中書侍郎崔湜知政事密以告之湜固讓象先主不許之湜因亦請辭主遽言於睿宗乃並拜焉象先清淨寡欲不以細務介意言論高遠雅為時賢所服湜每謂人曰陸公加於人一等太平公主時既用事同時宰相蕭至忠岑羲及湜等咸傾附之唯象先孤立未嘗造謁先天二年至忠等伏誅象先獨免其難以保護功封國公賜實封二百戶加銀青光祿大夫時窮討至忠等枝黨連纍稍衆象先密有申理全濟甚多然未嘗言及當時無知之者其年出為益州大都督府長史仍為劍南道按察使在官務以寬仁為政司馬韋抱真言曰望明公稍行杖罰以立威名不然恐下人怠墮無所懼也象先曰為政者理則可矣何必嚴刑樹威損人益己恐非仁恕之道竟不從抱真之言歷遷河中尹六年廢河中府依舊為蒲州象先為刺史仍為河東道按察使嘗有小吏犯罪但示語而遣之録事白曰此例當合與杖象先曰人情相去不遠此豈不解吾言若必須行杖即當自汝為始録事慚懼而退象先嘗謂人曰天下本自無事祗是庸人擾之始為繁耳但當靜之於源則亦何憂不簡前後為刺史其政如一人吏咸懷思之按察使停入為太子詹事歷工部尚書十年冬知吏部選事又加刑部尚書以繼母憂免官十三年起復同州刺史尋遷太子少保二十四年卒年七十二贈尚書左丞相諡曰文貞象先弟景倩歷監察御史景融歷大理正滎陽郡太守河南尹兵吏部侍郎左右丞工部尚書東都留守襄陽郡太守陳留郡太守並兼採訪使景獻歷殿中侍御史屯田員外郎景裔河南令庫部郎中皆有美譽僧一行少時嘗與象先昆弟相善常謂人曰陸氏兄弟皆有才行古之荀陳無以加也其為當時所稱如此元方從叔餘慶陳右軍將軍珣孫也少與知名之士陳子昂宋之問盧藏用道士司馬承禎道人法成等交遊雖才學不逮子昂等而風流強辨過之纍遷中書舍人則天嘗引入草詔餘慶惶惑至晚竟不能措一辭責授左司郎中纍除大理卿散騎常侍太子詹事以老疾致仕尋卒象先四代蘇瓌字昌容京兆武功人隋尚書右僕射威曾孫也祖夔隋鴻臚卿父亶貞觀中台州刺史瓌弱冠本州舉進士纍授豫王府録事參軍長史王德真司馬劉禕之皆器重之長安中纍遷揚州大都督府長史揚州地當衝要多富商大賈珠翠珍怪之産前長史張潛于辨機皆致之數萬唯瓌挺身而去神龍初入為尚書右丞以明習法律多識臺閣故事特命刪定律令格式尋加銀青光祿大夫是歲再遷戶部尚書奏計帳所管戶時有六百一十五萬六千一百四十一尋加侍中封淮陽縣子充西京留守時祕書員外監鄭普思謀為妖逆雍岐二州妖黨大發瓌收普思繫獄考訊之普思妻第五氏以鬼道為韋庶人所寵居止禁中由是中宗特敕慰諭瓌令釋普思之罪瓖上言普思幻惑罪當不赦中宗至京瓌又面陳其狀尚書左僕射魏元忠奏曰蘇瓌長者其忠懇如此願陛下察之帝乃配流普思於儋州其黨並誅瓌遷吏部尚書進封淮陽縣侯景龍三年轉尚書右僕射同中書門下三品進封許國公是歲將拜南郊國子祭酒祝欽明希庶人旨建議請皇后為亞獻安樂公主為終獻瓌深非其議嘗於御前面折欽明帝雖悟竟從欽明所奏公卿大臣初拜官者例許獻食名為燒尾瓌拜僕射無所獻後因侍宴將作大匠宗晉卿曰拜僕射竟不燒尾豈不喜耶帝默然瓌奏曰臣聞宰相者主調陰陽代天理物今粒食踊貴百姓不足臣見宿衛兵至有三日不得食者臣愚不稱職所以不敢燒尾是歲六月與唐休璟並加監修國史四年中宗崩祕不發喪韋庶人召諸宰相韋安石韋巨源蕭至忠宗楚客紀處訥韋溫李嶠韋嗣立唐休璟趙彥昭及瓌等十九人入禁中會議初遺制遣韋庶人輔少主知政事授安國相王太尉參謀輔政中書令宗楚客謂溫曰今須請皇太后臨朝宜停相王輔政且皇太后於相王居嫂叔不通問之地甚難為儀注理全不可瓌獨正色拒之謂楚客等曰遺制是先帝意安可更改楚客及韋溫大怒遂削相王輔政而宣行焉是月韋氏敗相王即帝位下詔曰尚書右僕射同中書門下三品監修國史許國公蘇瓌自周旋近密損益樞機謀猷有成匡贊無忌頃者遺恩顧託先意昭明姦回動搖內外危逼獨申讜議實挫邪謀況藩邸僚屬念殷惟舊無德不報抑惟令典可尚書左僕射餘如故景雲元年以老疾轉太子少傅是歲十一月薨贈司空荊州大都督諡曰文貞瓌臨終遺令薄葬及祖載之日官給儀仗外唯有布車一乘論者稱焉開元二年下詔曰疇庸賞善百王攸先追遠飾終千載同德故尚書左丞相太子少傅贈司空荊州大都督許國文貞公瓌履正體道外方內直悉心奉上卑身率禮協贊帷幄三朝有鹽梅之任燮諧台九命為社稷之臣先朝晏駕釁起宮掖國擅稱制之姦人懷綴旒之懼凶威孔熾宗祀幾傾顧命遺恩太皇輔政逆臣刊削韋氏臨朝遂能首發昌言侃然正色列諸視聽暴於朝野松檟已遠風烈猶存緬懷誠節良深耿歎可賜實封一百戶四年詔與徐國公劉幽求配享睿宗廟庭十七年加贈司徒瓌子頲少有俊才一覽千言弱冠舉進士授烏程尉纍遷左臺監察御史長安中詔頲按覆來俊臣等舊獄頲皆申明其枉由此雪冤者甚衆神龍中纍遷給事中加修文館學士俄拜中書舍人尋而頲父同中書門下三品父子同掌樞密時以為榮機事填委文誥皆出頲手中書令李嶠歎曰舍人思如湧泉嶠所不及也俄遷太常少卿景雲中瓌薨詔頲起復為工部侍郎加銀青光祿大夫頲抗表固辭辭理懇切詔許其終制服闋就職襲父爵許國公玄宗謂宰臣曰有從工部侍郎得中書侍郎否對曰任賢用能非臣等所及玄宗曰蘇頲可中書侍郎仍供政事食明日加知制誥有政事食自頲始也頲入謝玄宗曰常欲用卿每有好官闕即望宰相論及宰相皆卿之故人卒無言者朕為卿歎息中書侍郎朕極重惜自陸象先歿後朕每思之無出卿者時李乂為紫微侍郎與頲對掌文誥他日上謂頲曰前朝有李嶠蘇味道謂之蘇李今有卿及李乂亦不讓之卿所製文誥可録一本封進題云臣某撰朕要留中披覽其禮遇如此玄宗欲於靖陵建碑頲諫曰帝王及后無神道碑且事不師古動皆不法若靖陵獨建陛下祖宗之陵皆須追造玄宗從其言而止開元四年遷紫微侍郎同紫微黃門平章事與侍中宋璟同知政事璟剛正多所裁斷頲皆順從其美若上前承旨敷奏及應對則頲為之助相得甚悅璟嘗謂人曰吾與蘇家父子前後同時為宰相僕射長厚誠為國器若獻可替否罄盡臣節斷割吏事至公無私即頲過其父也八年除禮部尚書罷政事俄知益州大都督府長史事前司馬皇甫恂破庫物織新樣錦以進頲一切罷之或謂頲曰公今在遠豈得忤聖意頲曰明主不以私愛奪至公豈以遠近間易忠臣節也竟奏罷之嶲州蠻酋苴院私與吐蕃連謀將為內寇頲獲其間諜將士咸請出兵討之頲不從乃作書並間諜以送苴院苴院慚悔竟不敢入寇十三年從駕東封玄宗令頲撰朝覲碑文俄又知吏部選事頲性廉儉所得俸祿盡推與諸弟或散之親族家無餘資十五年卒年五十八初優贈之制未出起居舍人韋述上疏曰臣伏見貞觀永徽之時每有公卿大臣薨卒皆輟朝舉哀所以成終始之恩厚君臣之義上有旌賢録舊之德下有生榮死哀之美列於史册以示將來昔智悼子卒平公宴樂杜蒯一言方始感悟春秋載其盛烈禮經以為美談今古舊事昭然可覩臣伏見故禮部尚書蘇頲纍葉輔弼代傳忠清頲又伏事軒陛二十餘載入參謀猷出總藩牧誠績斯著操履無虧天不遺奄違聖代伏願陛下思帷蓋之舊念股肱之親修先朝之盛典鑒晉平之遠迹為之輟朝舉哀以明同體之義使歿者荷德於泉壤存者盡節於周行凡百卿士孰不幸甚臣官忝記事君舉必書敢申舊典上黷宸扆希降恩貸俯垂詳擇即日於洛城南門舉哀輟朝兩日贈尚書右丞相諡曰文憲及葬日玄宗遊咸宜宮將出獵聞頲喪出愴然曰蘇頲今日葬吾寧忍娛遊中路還宮頲弟詵冰乂詵歷授右司郎中給事中徐州刺史先是拜給事中時頲為中書侍郎上表讓詵所授玄宗曰古來有內舉不避親乎頲曰晉祁奚是也玄宗曰若然則朕用蘇詵何得屢言近日卿父子猶同在中書兄弟有何不得卿言非至公也冰為虞部郎中乂為職方郎中幹瓌從父兄也父勗武德中為秦王府文學館學士貞觀中尚南康公主拜駙馬都尉纍選魏王泰府司馬勗既博學有美名甚為泰所重因勸泰請開文學館引才名之士撰括地志後歷吏部郎太子左庶子卒幹少以明經纍授徐王府記室參軍徐王好畋獵幹每諫止之垂拱中歷遷魏州刺史時河北飢饉舊吏苛酷百姓多有逃散幹乃督察姦吏務勸農桑由是逃散者皆來復業稱為良牧召拜右羽林將軍尋遷冬官尚書酷吏來俊臣素忌嫉之遂誣奏幹在魏州與琅邪王沖私書往復因繫獄鞫訊幹發憤而卒瓌四代孫翔文宗大和四年釋褐文學參軍史臣曰韋思謙始以州縣奮於煙霄持綱不避於權豪報國能忘於妻子自強不息剛毅近仁信有之矣高季輔皇甫公義可謂知人矣且福善餘慶不謂無徵二子構堂俱列相輔文皆經濟政盡明能加以承慶方危染翰而曾非恐悚嗣立見用襲封而罔墜逍遙無忝父風寧慚祖德諡溫諡孝何愧易名陸元方博學大度再踐鈞衡當則天時非有忠貞應無黜責綏州之任抑又何慚觀其濟海無私狂風自止臨終焚藁溫樹始彰故知正可以動神明德可以延家代象先益高人品尤著相才全濟有名孤立無禍景倩景融景獻景裔等咸居清列得非有後於魯乎蘇瓌孔子云居其室出其言善則千里之外應之況其邇者乎又言行君子之樞機樞機之發榮辱之主也當中宗棄代韋氏奪權預謀者十有九人咸生異議瓌志存大節獨發讜言其後善惡顯彰黜陟明著聖人之言驗於斯矣頲唯公是相以儉承家李嶠許之湧泉宋璟稱其過父艱難之際節操不回善始令終先後無愧贊曰善人君子懷忠秉正盡富文章咸推諫諍豈愧明廷無慚重柄子子孫孫演承餘慶
